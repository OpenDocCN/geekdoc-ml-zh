  md: 'The personal best for particle 3 at $(0.49, -1.92)$ is $f(P_3^{pbest}) = 3143.43$.
    The global best for the swarm will be selected as the minimum among $f(P_1^{pbest}),
    \cdots, f(P_5^{pbest})$. Let us now evolve particle 3 from generation 0 to 1.
    For an inertia weight of $w = 0.9$, $R_1 = 0.8659$ and $R_2 = 0.7489$, the new
    speed for particle 3 is computed as follows:


    $V_x = 0.9 \cdot 0 + 1.5 \cdot 0.8659 \cdot (0.49 - 0.49) + 1.5 \cdot 0.7489 \cdot
    (1.87 - 0.49)$

    $= 1.55 \mod 1 = 0.55$


    $V_y = 0.9 \cdot 0 + 1.5 \cdot 0.8659 \cdot (-1.92 + 1.92) + 1.5 \cdot 0.7489
    \cdot (1.49 + 1.92)$

    $= 3.83 \mod 1 = 0.83$.


    Using the new speed, we now compute the new position for particle 3 as follows:


    $P_3^1(x) = 0.49 + V_x = 1.04$

    $P_3^1(y) = -1.92 + V_y = -1.08$.


    The fitness for the new position $P_3^1 = (0.49, 1.04)$ is computed as $f(P_3^1)
    = 504.63$. Since $f(P_3^1) < f(P_3^{(best)})$, the new position is better and
    will be stored as the new personal best. Therefore, for particle 3 we have the
    new location $P_3^1 = (0.49, 1.04)$ with a speed of $V = (0.55, 0.83)$ and a personal
    best of $P_3^{(best)} = (1.04, -1.08)$. Fitness values, personal and global best
    positions for five particles are shown in Figure 18.4. We see that the global
    best is position $G^{best} = (0.12, 1.44)$, which is the position of particle

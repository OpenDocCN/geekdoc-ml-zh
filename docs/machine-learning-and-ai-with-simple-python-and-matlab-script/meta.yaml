    $$I_{ann} = F_{cl} \times \left(\frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}}
    + 1\right) \times \left(\frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1\right).$$



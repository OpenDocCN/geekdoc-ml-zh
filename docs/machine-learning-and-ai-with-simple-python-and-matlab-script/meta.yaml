  md: '# 3

    ANNs for Optimized Prediction


    # 3.1 Introduction


    ANNs can be effectively used for prediction of outcomes based on historical data
    if they are properly designed and effectively trained with sufficiently large
    numbers of samples. To be able train the weights of an ANN, a set of sample input
    and output data collected from the field or observed during an experiment are
    needed, as described in Chapter 2. Depending on the application, the number of
    samples typically ranges from thousands to hundreds of millions or even more.
    Input values of data samples are applied to the neurons of a hidden layer after
    being multiplied by the link weights. Following modification by summation and
    activation functions at each neuron, input signals propagate to the next hidden
    layer and finally to the ANN output layer. An error value is computed based on
    the difference between the real and calculated output values. These steps are
    called a forward propagation. Then, as part of the error minimization (or at least
    reduction) process, a back propagation is performed by computing partial derivatives
    of the error with respect to the link weights starting at output layer and working
    back to the input layer, as described in Chapter 2.


    Consecutive forward and back propagation iterations (called epochs) over ANN layers
    reduces the error until either a satisfactorily small value is obtained, a limit
    for the number of epochs is reached or another stopping criterion is met. As mentioned
    earlier, for an ANN to be properly trained, large sets of data are needed. The
    larger the sample size, the more accurate the predictions are expected to be from
    an ANN. Training with fewer data samples tends to over-fit link weights to satisfy
    the input and output values, which causes inaccurate predictions when inputs with
    different value ranges are applied to the ANN. The intention of using a large
    number of samples is that they hopefully have a wide range of input and output
    values to cover the operation space adequately – having many samples with similar
    values will not help to train an effective ANN.


    In this chapter, we provide two examples of arguably one of the most popular applications
    of ANNs: outcome prediction based on historical data. The first example, presented
    in Section 3.5, involves designing an ANN to be used to predict the grade from
    an exam based on two inputs, namely, the hours of sleep and study spent by a student
    in preparation for the exam (the example is taken from [31]). For this simplistic
    but very relatable example, we present step-by-step descriptions of forward- and
    back-propagation operations.


    The second example, in Section 3.6, constructs and trains an ANN to predict the
    number of rental bikes needed for a future date based on several inputs, including
    the day of the week, the air temperature and the wind speed (taken from [38]).
    This case study is inspired by data obtained for bike rentals in London, UK.'
  merge: -1
  pgno: 44
- img_proc: true
  md: 'Real-life versions of these example ANNs can be used to predict the outcomes
    for new situations. For example, a student can predict the expected number of
    hours to sleep and study for an incoming exam in order to receive a grade over
    90, which may require schedule adjustments accordingly. Similarly, a bike rental
    company can predict how many bikes will be needed at the weekend and perhaps hire
    extra help to manage the rentals as needed.


    # 3.2 Selection of ANN Inputs


    When constructing an ANN for a given application, one of the most important decisions
    is the selection of ANN inputs. For example, one may consider using the data collected
    from experiments to be considered as ANN inputs (e.g. the number of hours that
    a plant is exposed to the sun, the amount and frequency of water given to the
    plant and so on). For some applications, measurements in the field utilized as
    ANN inputs may be effective in generating acceptable predictions. However, applying
    observed data directly as ANN inputs may not be preferable for certain cases,
    especially if the number of inputs is infeasibly large or is not directly related
    to outputs (e.g. it may be irrelevant to use names of the weekdays for a plant
    growth application). ANN inputs may also be derivatives of data collected from
    field experiments or observations of events, typically statistical or mathematical
    transformations of the observed data. For example, it may be preferable to use
    the average, highest or lowest daily temperatures as an ANN input instead of hourly
    measurements recorded during experiments. In another application, the moving average
    of a financial stock calculated over the last several weeks may be preferable
    to directly using its selling price obtained from stock exchange records. It is
    also possible to combine directly observed measurements with the values derived
    from them. For example, average air temperature together with the day of a week
    could be relevant inputs for an ANN designed for predicting daily bus repairs
    in a transportation company. If a weekday is Friday, Saturday or Monday may be
    irrelevant to a plant watering study but has considerable significance for bus
    schedules. In practice, designers employ whatever available data they deem to
    be suitable for their purposes and decide which combination of inputs will train
    an ANN for the most accurate prediction. Selection of proper inputs is an ongoing
    process and may take significant effort in considering different inputs sets until
    a satisfactory set is defined.


    For the two examples studied in this chapter, to keep them as simple as possible,
    all inputs are directly measured parameters in the respective fields: number of
    hours a student sleeps and studies for the first example, and various measurements
    kept by the bike rental company, such as wind speed, temperature, time of day
    and similar measurements.


    # 3.3 Selection of ANN Outputs


    In addition to selection of its inputs, successful deployment of an ANN also requires
    that the outputs are chosen in such a way that the ANN generates the most useful,
    accurate and reliable predictions. Similar to the selection of inputs, outputs
    can be assigned either as directly measured observations for an experiment or
    as derived values based on measurements. For example, for an ANN constructed to
    predict growth of a cancerous tumour, possible output selections may include the
    tumour size measurements or the growth rate of the tumour. For the latter case,
    the tumour size of a patient would need to be measured over a period of time and
    a growth (or shrinkage) rate computed based on the measurements. In other examples
    of ANNs, outputs can represent classification decisions. For example, for an ANN
    whose input is the text of an email, a possible output may be'
  merge: -1
  pgno: 45
- img_proc: true
  md: 'the decision as to whether the email is genuine or spam. For this case, there
    may be two outputs (e.g. labelled as genuine and spam), only one of which will
    be true, or a single output whose value indicates the ANN decision (e.g. 1 is
    a genuine email and 0 is spam). For a given ANN application, selection of suitable
    outputs typically requires experience and domain knowledge.


    In the two case studies presented in this chapter, for the sake of simplicity,
    directly observable outputs are selected: expected exam grade for the so-called
    sleep-study ANN and the number of rentals for the London bike sharing ANN.


    # 3.4 Construction of Hidden Layers


    Another important design component is the selection of the number of hidden layers
    and the number of neurons in each layer. There is no straightforward formula that
    dictates the rules for these decisions. Similar to other ANN design parameters,
    a knowledge- and experience-guided trial-and-error approach seems to be a reasonable
    path in constructing an ANN architecture that consistently generates reliable
    and accurate solutions for a given application. For instance, image processing
    problems may require ANNs with many hidden layers to detect various features in
    an input image (e.g. tumours, nodules or other anomalies), whereas financial applications
    may be more successful with ANN architectures employing smaller numbers of hidden
    layers but each having a large number of neurons (e.g. for detection of financial
    trends without over-fitting the link weights over many hidden layers).


    The time required to train an ANN is an important performance metric, especially
    for cases where they need to be trained often (e.g. a few times per day or more
    frequently). As discussed in Section 2.10 in Chapter 2, training time is directly
    proportional to the number of hidden layers and the number of neurons in each
    layer, together with the number of connections between consecutive layers. As
    implied by Eqs. (2.18) and (2.19), increasing the number of hidden layers will
    exponentially increase the computational cost of training, which is a serious
    issue to be handled by the ANN designer if there are a large number of input/output
    samples to be used for training.


    Another important observation from Eqs. (2.18) and (2.19) is the selection of
    number of epochs to be used in training, where link weights and biases are adjusted
    based on error values observed at the outputs. It is clear that for ANNs requiring
    large sets of data samples (e.g. hundreds of thousands or millions), one cannot
    arbitrarily increase the number of hidden layers, neurons and epochs for applications
    where the ANN will be re-trained often (e.g. hourly, daily or weekly). If an ANN
    for reliable predictions of stock movements for the next day requires a week to
    train, the ANN outputs will not be meaningful to its users no matter how accurate
    they may be. These trade-offs are an essential part of the ANN design process,
    especially for critically important applications, such as medical, military, live
    traffic, power, water supply or nuclear control tasks.


    # 3.5 Case Study 1: Sleep-Study Example


    In our first example (from [31]), which we will refer to as the `sleep-study`

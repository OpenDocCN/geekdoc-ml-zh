    where $x_i = 1$ if item $i$ is selected and $x_i = 0$ otherwise. Let us repeat
    the fitness function defined in Eqn (15.1) for convenience:


    $$\text{maximize} \sum_{i=1}^{n} x_i \cdot p_i \quad \text{subject to} \quad \sum_{i=1}^{n}
    x_i \cdot c_i \leq K_W.$$


    The computation of the first summation in Eqn. (15.1) implies that the chromosome
    (which can be considered as a one-dimensional matrix) and the column of the food
    table that contains the protein values must be multiplied as follows:


    $$\text{protein} = [x_1 \quad x_2 \quad \cdots \quad x_n] \cdot \begin{bmatrix}
    p_1 \ p_2 \ \vdots \ p_n \end{bmatrix} = x_1 p_1 + x_2 p_2 + \cdots + x_n p_n.
    \tag{15.2}$$


    To find the total sugar in a given chromosome in this context means that the chromosome
    must be multiplied by the sugar column of the food table:


    $$\text{calorie} = [x_1 \quad x_2 \quad \cdots \quad x_n] \cdot \begin{bmatrix}
    c_1 \ c_2 \ \vdots \ c_n \end{bmatrix} = x_1 c_1 + x_2 c_2 + \cdots + x_n c_n
    \leq K_W,$$


    where $c_i$ is the calorie amount for a food item $i$ taken from the food table
    given in Figure 15.7. As an example, consider an individual defined as


    ```

    [ 1 0 1 0 1 0 0 0 0 1 ].


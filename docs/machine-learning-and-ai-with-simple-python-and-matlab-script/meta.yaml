    ## 3.7 总结性评述


    在本章中，我们介绍了两个使用 ANN 进行事件优化预测的简化案例研究。第一个是基于学生为考试学习的小时数和睡眠小时数来预测考试成绩的 ANN。对于这个简单的例子，我们详细介绍了前向和反向传播操作，展示了训练每一步的参数值以及第
    2 章推导出的公式。第二个例子涉及构建和训练一个 ANN，基于样本数据（如星期几、一天中的时间、空气温度和风速）来预测自行车租赁数量。这个例子的灵感来源于在英国伦敦运营的自行车租赁公司。


    我们提供了用于实现这些 ANN 的 Python 和 Matlab 脚本示例。尽管我们使用了最简单的 ANN 架构（只有几个神经元的最少隐藏层数）和非常少的数据点，但
    ANN 生成的预测与训练数据兼容，这清楚地表明了基于 ANN 的优化预测方法的强大能力。


    ## 3.8 第 3 章练习题



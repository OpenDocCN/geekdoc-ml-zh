  md: '# # 17

    ## GAs for Route Optimization


    # ### 17.1 Introduction


    In this chapter, we present another important application of GAs, namely the route
    optimization problem, where a set of nodes interconnected with segments with different
    cost values are to be covered with minimum cost. We can visualize this problem
    as follows: we are given a set of cities and we need to visit all of them such
    that the total length of the route is a minimum. If the cost is defined as the
    time to travel between cities, then the goal is to visit the cities in minimum
    time. This problem is known in computer science as the `travelling salesman problem`
    (TSP), where a salesman needs to visit each city only once, starting and returning
    to the same one [122]. Requirements that the salesman can visit each city only
    once and that the total length (or its equivalent cost) of the entire trip must
    be minimized make the travelling salesman class of problems a formidable challenge.
    Their solution complexity grows as the factorial of the number of cities and the
    connections between them.


    Optimization problems for engineering tasks are often complex and frequently need
    to determine the most effective ordering of a sequence of actions to accomplish
    a given set of goals. Consider a delivery company that dispatches a fleet of hundreds
    of trucks to distribute packages to a set of locations every morning. Each truck
    starts at a base location, makes multiple stops during the day and returns to
    the base at the end of its shift. The goal for a manager is to ensure that each
    trip visits as many delivery points as possible while travelling the shortest
    distance.


    In another application, consider the motor vehicle manufacturing industry, which
    produces more than 70 million cars every year globally. For each car, there are
    thousands of screws to be tightened and thousands of spot welding operations to
    be performed. The order in which the screws are to be tightened or the metal points
    welded can be formulated as a TSP. A robot starts welding from a selected point
    and visits dozens of points in a given order until returning to its initial position
    after completing the last spot weld. In this case, the robot and points to be
    welded correspond to the salesman and the cities of the TSP, respectively. A spot
    welding or screw tightening robot, if not programmed carefully, may waste time
    on each car and, hence, may significantly impact factory output and operating
    budget. The savings for these applications is in the tens of billions of dollars.
    Similarly, in the electronics industry, finding the best order to solder components
    or pierce holes on printed circuit boards by robot are problems with high impact
    on productivity. TSP solutions can minimize soldering time, path complexity, energy
    and material consumption for any electronics manufacturer [123].'

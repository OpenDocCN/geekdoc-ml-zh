    $$X = \begin{bmatrix} 3 & 5 \ 5 & 1 \ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \ 82 \ 93 \end{bmatrix}.$$


    Once the inputs and outputs are represented as matrices, instead of handling each
    sample separately, multiple samples can be handled all at once in training using
    matrix operations. Although computational cost is not reduced, using matrices
    make script implementation of ANNs considerably more convenient compared to additions
    and multiplications of each individual sample separately.



    operating environment, there are always trade-offs among various parameters of
    a swarm. In this case, we see that increasing UAV speed arbitrarily may partition
    the swarm.


    # 16.7 Concluding Remarks


    In this chapter, we introduced an example of a popular application, namely flight
    control of autonomous drones operating as a swarm. In this example application,
    the goal for the swarm of autonomous drones is set as spreading uniformly over
    a geographical area of interest, without any intervention from a human pilot or
    central controller. We assumed that drones do not have information about the swarm
    member positions except for the near neighbours within their immediate communication
    range, and that there is no form of coordination or synchronization among the
    drones. This example in fact can be considered as a simplified version of many
    real-life drone applications such as rescue missions, environmental protection
    tasks, fire-fighting operations, multi-vehicle transportation, and others.


    We introduce a UAV flight control mechanism employing a GA, where a chromosome
    represents the direction in which a UAV will move at the next step. A fitness
    function is defined where virtual forces are imagined to be applied to a node
    by its immediate neighbours. The GA favours positions that place a UAV away from
    its neighbours without losing communication with them. Candidate positions that
    may isolate a UAV or move it too close to its neighbours will not have good fitness
    values.


    In Python and Matlab implementations of this flight control algorithm, we show
    that relatively simple scripts can successfully realize a GA for a set of autonomous
    drones operating as a swarm. In these simple scripts, we see that drone speed
    and communication range are the major variables to prevent swarm partitioning.'

    我们将首先检查四个步骤的前向传播过程。假设这个简单RNN-Att的网络参数随机初始化如下：


    $$U = [0.144 \ -0.232 \ -0.669 \ 1.159], \ W = [-0.587], \ b = [0]$$


    $$V = \begin{bmatrix} -0.225 \ -0.305 \ 0.491 \ 0.277 \end{bmatrix}, \ c = \begin{bmatrix}
    0 \ 0 \ 0 \ 0 \end{bmatrix}.$$


    表12.1 一对一RNN-Att示例的先前和当前输入、期望输出及其独热形式（†表示矩阵转置操作）。


    | 先前字符 | 输入字符 | 独热编码 | 目标输出 | 独热编码 |

    | :--- | :--- | :--- | :--- | :--- |

    | - | h | $x_1 = [1\ 0\ 0\ 0]^\dagger$ | e | $y_1 = [0\ 1\ 0\ 0]^\dagger$ |

    | h | e | $x_2 = [0\ 1\ 0\ 0]^\dagger$ | l | $y_2 = [0\ 0\ 1\ 0]^\dagger$ |

    | e | l | $x_3 = [0\ 0\ 1\ 0]^\dagger$ | l | $y_3 = [0\ 0\ 1\ 0]^\dagger$ |

    | l | l | $x_4 = [0\ 0\ 1\ 0]^\dagger$ | o | $y_4 = [0\ 0\ 0\ 1]^\dagger$ |


    由于注意力机制需要所有先前的隐藏状态信息，让我们首先计算步骤$t = 1, \cdots, 4$的$h_1, \cdots, h_4$，如下所示：


    $h_t = \tanh(U \cdot x_t + W \cdot h_{t-1} + b)$


    $h_1 = \tanh \left( [0.144\ -0.232\ -0.669\ 1.159] \cdot \begin{bmatrix} 1 \ 0
    \ 0 \ 0 \end{bmatrix} + [-0.587] [0] + [0] \right) = [0.143]$


    $h_2 = \tanh \left( [0.144\ -0.232\ -0.669\ 1.159] \cdot \begin{bmatrix} 0 \ 1
    \ 0 \ 0 \end{bmatrix} + [-0.587] [0.143] + [0] \right) = [-0.306]$


    $h_3 = \tanh \left( [0.144\ -0.232\ -0.669\ 1.159] \cdot \begin{bmatrix} 0 \ 0
    \ 1 \ 0 \end{bmatrix} + [-0.587] [-0.306] + [0] \right) = [-0.454]$


    $h_4 = \tanh \left( [0.144\ -0.232\ -0.669\ 1.159] \cdot \begin{bmatrix} 0 \ 0
    \ 1 \ 0 \end{bmatrix} + [-0.587] [-0.454] + [0] \right) = [-0.382].$


    在步骤$t = 1$，对于输入$x_1 = \mathbf{h}$，预测输出$\hat{y}_1$计算如下：


    $\mathcal{A}_{1,1} = h_1^\dagger \cdot h_1 = [0.143] \cdot [0.143] = [0.020]$


    $\mathcal{Z}_1 = \Theta_h(\mathcal{A}_{1,1}) \cdot h_1 = \text{softmax}(\mathcal{A}_{1,1})
    \cdot h_1 = 1\ [0.143]$


    $\Omega_1 = V \cdot \mathcal{Z}_1 + c = \begin{bmatrix} -0.225 \ -0.305 \ 0.491
    \ 0.277 \end{bmatrix} \cdot [0.143] + \begin{bmatrix} 0 \ 0 \ 0 \ 0 \end{bmatrix}
    = \begin{bmatrix} -0.032 \ -0.044 \ 0.070 \ 0.040 \end{bmatrix}$


    $\hat{y}_1 = \Theta_{\hat{y}}(\Omega_1) = \text{softmax}(\Omega_1) = \begin{bmatrix}

    # 16.5 Python Script for UAV Flight Control Using a GA


    In this section we present a sample implementation of a Python script for UAV
    flight control. Because this Python script runs on a single-board computer, we
    assumed that a swarm operation with multiple, independent and autonomous UAVs
    can be simulated as follows. A UAV runs an FGA using its near neighbour information
    to compute a new position, but it will not move there until all other UAVs complete
    their own computations. After all UAVs compute their next locations to move, we
    assume they all move to these new locations simultaneously. This will constitute
    the first step of the simulation experiment. Then, again one by one they run the
    FGA to compute the next position based on new neighbour information and will move
    to their respective new positions at the end of the second step of the simulation
    experiment. The number of steps is a variable defined by the user.


    This lock-step implementation without any inter-UAV communication is a rough approximation
    of the parallel and independent computation that takes place in real-life drones.
    However, it demonstrates that the FGA may be a promising candidate in providing
    a uniform distribution of swarm members. More advanced readers are encouraged
    to implement an FGA using threads [121] and separate near neighbour tables for
    each UAV, which will be one step closer to a more realistic implementation.


    In lines 21–26, the number of simulation steps, speed, communication range, number
    of UAVs, population size and number of generations are defined. In lines 33–41,
    initial UAV positions are assigned randomly. Each altitude is increased by R_COM
    so that the UAVs do not crash into the ground. In lines 93–97, displacement vectors
    are defined using the formulas given in Figure 16.8. In lines 105–140, displacement
    is computed based on a given chromosome. In lines 142–154, the function named
    get_neighbours finds the neighbours of a UAV based on indices of a UAV and the
    current simulation step. In lines 156–168, the function named fit_func computes
    a fitness score for a given position and the positions of the neighbours. In lines
    170–193, a function named animate creates a rudimentary animation of UAV positions
    for each step of the simulation.


    In lines 206–212, GA attributes are registered into the toolbox library, including
    codons, chromosomes, population, crossover, mutation and selection operations.


    In lines 214 to 240, a main function is introduced, which calls the functions
    described above. Crossover and mutation probabilities are defined in line 218.
    The loop starting in line 219 iterates the number of simulation steps. The loop
    starting in 221 iteration for the number of UAVs. Therefore, inside these two
    loops, UAV[i][j] represents a UAV with id j at time step i. UAV neighbours are
    set at line 225 by calling the get_neighbours function. After the loops complete,
    the function animate is called with UAV positions for all steps of the simulation.



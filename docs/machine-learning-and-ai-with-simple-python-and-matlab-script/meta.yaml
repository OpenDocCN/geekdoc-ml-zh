    # # 18

    ## Evolutionary Methods


    # ### 18.1 Introduction


    In this chapter, we outline prominent evolutionary computation methods, including
    `particle swarm optimization` in Section 18.2, `differential evolution` in Section
    18.3 and `grammatical evolution` in Section 18.4. For each one, we present a numerical
    example to illustrate the mechanics of implementing the method in any language
    and software environment.


    We would like to point out the ever powerful parallelizable characteristics of
    evolutionary algorithms, which make them excellent candidates for very-large-scale
    problems. One can easily envision that, in the near future, millions of wetware
    computers running a particle swarm optimization algorithm in parallel can solve
    a space travel problem with low overhead. Similarly, the best flight control program
    for an autonomous spacecraft exploring galaxies can be generated by a grammatical
    evolution algorithm using a realistic grammar and running in parallel on a few
    million biological computers.


    # ### 18.2 Particle Swarm Optimization


    Based on mechanisms observed in biological organizations, swarm artificial intelligence
    (SAI) is used to control and analyse the collective behaviour of decentralized
    autonomous systems [132]. The agents in SAI systems interact with their nearest
    neighbours and their external environment to manifest a global intelligence.


    Self-organization can be defined as a capacity that emerges from interactions
    among lower-level components that have not been explicitly designed to achieve
    a goal [133]. For example, social wasps are able to build an elaborate nest with
    each worker depositing building materials based on a local environment. Typically,
    wasps are more likely to add to a corner area of an existing wall than start building
    a new wall [134]. With the deposit of new material, the nest configuration is
    altered, which then provides new information for other wasps that visit that location
    later. This indirect communication through the environment is called *stigmergy*.
    Consequently, even simple insects, such as wasps, are able to build very complex
    structures. Self-organized systems may rely on positive and negative feedback,
    amplification of random fluctuations and multiple direct or indirect stigmergic
    interactions among individuals to obtain a dynamic system exhibiting emergent
    properties with bifurcation (i.e. capable of obtaining a new stable solution if
    and when the properties of a system change).'

    选项：\n1 - 训练新的人工神经网络模型\n2 - 加载现有模型\n\n通过输入数字选择选项：1\n***** 现在使用 study_data.csv 训练人工神经网络\
    \ *********\n*********** 人工神经网络训练完成 ***********\n*********** 按回车键开始使用人工神经网络 ***********\n\
    输入学习小时数：7\n输入睡眠小时数：3\n人工神经网络预测成绩：82\n```\n\n图 3.4 由 Matlab 脚本生成的睡眠-学习示例的示例截图，用户分别输入\
    \ 7 和 3 作为学习和睡眠的小时数，人工神经网络预测的成绩为 82。\n\n```\n1  % 纽约市立学院，纽约城市大学\n2  % 由 Olga Chsherbakova\
    \ 编写\n3  % 日期：2023年11月\n4  \n5  % 使用基于睡眠和学习时间的人工神经网络预测考试成绩\n6  \n7  clc;\n8  clear;\n\

    # 9.2 A Simple CNN for Speech Recognition


    Since audio signals can be represented as digital information in a spectrogram,
    they can be used as inputs to a CNN. Similar methods to those used for character
    recognition by CNNs introduced in Chapter 8 can now be employed for speech recognition.
    The CNN in this example reads a spectrogram image of a spoken word with size (1
    × 40 × 198) and identifies the spoken word input as one of the stored reference
    audio files. Similar to the example CNN presented in Chapter 8 for OCR applications,
    multiple CL–PL pairs are employed for speech recognition to reduce the size of
    the spectrogram input (i.e. to down-sample the input) and to improve the CNN’s
    predictive power. In this way, the CNN will work with smaller sized inputs, which
    in turn will reduce the time and


    ![](img/a83d807f9a9119b1472555c0ef55797e_155_1.png)


    Figure 9.2 A typical CNN architecture example for speech recognition applications
    (multiple layers are used in the CNN to reduce the size of the spectrogram input
    so that training is faster and over-fitting is reduced).'

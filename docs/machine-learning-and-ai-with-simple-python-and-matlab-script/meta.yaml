    # 16.4.2 FGA Progression


    Progression of the FGA in a given node takes place as follows. Initially, for
    a given node $a$ and a population size of $N$, the FGA considers $N$ randomly
    chosen positions as the candidate locations for node $a$ to move to (i.e. forming
    the initial population):


    $P_0^0(a), P_1^0(a), \cdots, P_{(N-1)}^0(a)$,


    where $P_j^g(a)$ represents individual $j$ (i.e. the candidate position $j$) for
    node $a$ in generation $g$ ($g = 0$ for the initial population). Selecting the
    initial population randomly is one of the strengths of GAs since a wide range
    of initial positions can be considered in parallel. Success of many traditional
    optimization algorithms heavily depends on the quality of the initial conditions,
    which implies that the user must be familiar with the solution space to make a
    good initial guess. This is a drawback of traditional approaches since it is difficult
    to find suitable initial conditions for complex optimization problems even if
    one is an expert in that particular subject.


    For the general case, the fitness of a candidate position $p_C$ is computed as


    $$\text{fitness}(p_C) = \begin{cases} \sum_{i=0}^n (R_{COM} - d_i) & \text{if
    } n \geq 1, \ \infty & \text{otherwise}, \end{cases}$$'

    # 18.2.3 Remarks for PSO


    PSO is a robust stochastic optimization technique based on the movement and intelligence
    of swarms. It was developed in 1995 by James Kennedy (social psychologist) and
    Russell Eberhart (electrical engineer) [105]. PSO applies the concept of social
    interaction to multi-dimensional optimization problems. In PSO, if one of the
    individuals finds a good solution, all the other individuals also use that knowledge.
    Implementation of PSO is relatively simple with only a few parameters to adjust
    (e.g. the particle velocity). PSO is a multi-agent parallel search method, where
    each particle (i.e. agent) flies over the search space. The population of particles
    is called a swarm. PSO is easily parallelizable and therefore ideal for problems
    with large search spaces. PSO algorithms are a natural fit in controlling the
    topology of autonomous drones, where the drone positions can be modelled as a
    swarm of particles [142]. Due to its special way of moving the particles between
    generations, it may avoid being stuck at a local extreme points compared to traditional
    AI methods.


    # 18.3 Differential Evolution


    Differential evolution (DE) is an evolutionary computation technique originally
    proposed by Price and Storn in 1995 to solve high-order Chebychev polynomial equations
    [106]. DE is different from other evolutionary computation methods such as GA
    and PSO in that it does not use classical crossover and mutation operators but
    generates offspring by a new `differential` operator. This new operator first
    generates a `difference` vector of two randomly chosen individuals in the population
    to create a new individual. Because a different difference vector is created for
    every individual, DE has a better chance of generating diverse populations compared
    to traditional evolutionary computation methods, where typically a fixed probability
    distribution determines perturbations. DE is self-organizing and requires very
    little input from the user.


    In DE, a population with $N$ individuals operating in a $d$-dimensional space,
    an individual $i$ is represented as a $d$-dimensional vector. At a given time
    $t$, DE creates two solutions for each individual $i$, called `variant` and `trial`
    solutions. If the trial solution performs better than individual $i$, it replaces
    individual $i$ at time $(t + 1)$. Let us represent $i$ at generation $g$ as $P_i^g$.
    DE evolves this individual to the next generation of $(g + 1)$ (i.e. $P_i^g \rightarrow
    P_i^{g+1}$) as follows. First a'
  merge: -1
  pgno: 319
- img_proc: true
  md: 'variant solution $V_i$ is created by picking three other individuals from the
    population (say with the indices of $k$, $r$ and $m$). These three indices must
    be distinct and different than $i$. A variant for individual $i$ at generation
    $g$ is calculated as follows [143]:


    $V_i = P_m^g + E \cdot (P_k^g + P_r^g)$


    where $E$ is a scaling factor to control the amount of amplification of the difference
    vector (typically $E \in [0, 2]$). After variant $V_i$ is created, DE generates
    a trial solution called $U_i$ as follows. For dimension $x$, real numbers $rand_x$
    and $rnbr$ (both random and in the range of $[0, 1]$) and a crossover constant
    (called $CR$), a real number in the range of $[0, 1]$ are utilized. If $rand_x
    < CR$ or $rnbr = 0$, variation solution $V_i$ for dimension $x$ is assigned as
    the $x$ dimension of the trial solution $U_i$. Otherwise, the existing value of
    $P_{ix}^g$ (i.e. the $x$ dimension of the existing solution) is used in determining
    the trial solution $U_i$ in dimension $x$. The other dimensions of the trial solution
    are computed in a similar manner. For $U_i$, if fitness $f(U_i)$ is better than
    $f(P_i^g)$, it replaces individual $P_i^g$ in generation $(g + 1)$; otherwise
    $P_i^g$ is kept as the solution for the next generation.


    # 18.3.1 Different Versions of DE


    Different versions of DE algorithms are proposed by researchers, each aiming to
    improve its outcome accuracy and computational performance when applied to a particular
    problem. The main differences among these algorithms stem from the methods used
    in selection of individuals for a variant solution, the number of pairs of individuals
    to be selected and the methods used to combine the individuals. For example, in
    a DE variation called $DE/rand/Np/bin$, $Np$ pairs of individuals are selected
    randomly for a binomial combining method. In a binomial combination, one parent
    is chosen with probability $p_a$ from a vector and the other with probability
    $(1 - p_a)$ [144].


    Other variations of DE use the best individual in the current population as the
    base vector (e.g. in $DE/best/Np/bin$) or calculate parents using at least two
    difference vectors, one obtained from the best vector and the parent vector while
    others are calculated using randomly selected vectors (e.g. in $DE/current-to-best/Np/bin$).
    It is also possible to combine the trial solution with an individual by using
    a multi-point combination operator that randomly selects many cut points at which
    vectors should be combined to obtain offspring [145].


    # 18.3.2 Applications of DE


    Because of its simple computational requirements, DE has a wide range of applications
    that require multi-objective optimization, where the goal is to find an optimal
    (or near-optimal) solution that satisfies multiple, and often contradicting, goals
    at the same time. Due to its parallelizable nature, DE can be performed such that
    each candidate solution in a population is evaluated in parallel. For problems
    with large search spaces, computation of a fitness function may require a long
    time (e.g. days of computation for each individual). This is typical, for example,
    in space exploration applications, where each step involves millions of iterations
    of heavy computation for each of the thousands of individuals in a population
    for an experiment that requires millions of steps [142, 146].


    # 18.3.3 A Simple Algorithm for DE


    A simple algorithm to implement DE is shown in Figure 18.8. First, a random population
    of $N$ individuals is created as candidate solutions. Then, each individual is
    evaluated to obtain its fitness value. At each generation of DE, a variant and
    a trial solution are created for each individual in the'

    % (index) [unit displacement vector]\n% 1=(0+1) [0, 1] - north (xx000 is binary\
    \ 0)\n% 2=(1+1) [1/sqrt(2), 1/sqrt(2)] - northeast (xx001 is binary 1)\n% 3=(2+1)\
    \ [1, 0] - east (xx010 is binary 2)\n% 4=(3+1) [1/sqrt(2), -1/sqrt(2)] - southeast\
    \ (xx011 is binary 3)\n% 5=(4+1) [0, -1] - south (xx100 is binary 4)\n% 6=(5+1)\
    \ [-1/sqrt(2)), -1/sqrt(2)] - southwest (xx101 is binary 5)\n% 7=(6+1) [-1, 0]\
    \ - west (xx110 is binary 6)\n% 8=(7+1) [-1/sqrt(2)), 1/sqrt(2)] - northwest (xx110\

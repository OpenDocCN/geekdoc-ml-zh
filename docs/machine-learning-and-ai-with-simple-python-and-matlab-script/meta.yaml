- md: "## 11.4 Python Script for a Chatbot Using an RNN\n\nAs presented in Section\
    \ 10.5 in Chapter 10, adopting an embedding layer in RNNs generates compact representations\
    \ of input vectors and, hence, significantly reduces the computational cost of\
    \ the training process. Figure 11.4 shows the weight matrix dimensions for an\
    \ RNN with 256 hidden layers and an embedding matrix $E$ of size ($128 \\times\
    \ 565$) with a 565-word dictionary used in the Python and Matlab scripts. Recall\
    \ from Eq. (10.20) in Chapter 10 that for the embedding layer the matrix multiplication\
    \ is defined as $X = E \\cdot X^o$, where $X^o$ is the one-hot-encoded input vector.\n\
    \nIn this section we present a sample Python script implementing the simplistic\
    \ chatbot described in Section 11.3 as a many-to-many RNN. This RNN is constructed\
    \ with the same architecture shown in Figure 11.4 with 256 hidden layers and an\
    \ embedding size of 128 for processing user queries from a dictionary of 565 unique\
    \ words. After digesting the sample code presented below, the reader is encouraged\
    \ to experiment by changing the parameters for the RNN architecture and training\
    \ in order to gain a good understanding of the impact of each one on the RNN prediction\
    \ accuracy.\n\nIn line 23, the number of samples to train the RNN is set as 500.\
    \ In line 24, the `batch size` is set to 16, which is a training parameter for\
    \ the number of input samples to be handled at one time per epoch. For example,\
    \ if there are 1000 data samples and the batch size is 100, during one epoch,\
    \ the RNN will process 10 batches, each of which has 100 input samples. By processing\
    \ sample data in small chunks, we limit the matrix dimensions during training\
    \ (in this case to 16), whereas handling all input samples at once would require\
    \ manipulating matrices with much larger dimensions (in this case 1000) with a\
    \ much higher computational cost. In line 25, the number of hidden layers is set\
    \ to 256, which implies that the RNN utilizes 256 encoders operating in parallel.\
    \ In this case, if embedding is not used, the dimensions of U would be (256 ×\
    \ 565), where we use I = 500 samples containing a total of |I| = 565 unique words.\
    \ In line 26, we set the number of epochs as 1000, which is the total number of\
    \ forward and back propagations used training the RNN. In line 27, the embedding\
    \ layer size is set as 128, which means that dimensions of E will be (128 × 565).\
    \ With embedding, a single input sample size is reduced from (565 × 1) to (128\
    \ × 1) as shown in Figure 11.4. Embedding reduces the dimensions of U from (256\
    \ × 565) to (256 × 128).\n\nIn lines 29–41, the function named `tokenize` accepts\
    \ the data sample set as its input, converts the words into numeric tokens and\
    \ adds padding based on a user-defined maximum sequence length. Padding [101]\
    \ is a useful technique in handling variable-length input and output sequences,\
    \ where all inputs and outputs are padded with blank characters to make them appear\
    \ to have equal lengths. In line 33, an alphabet called `lang_tokenizer` is created\
    \ based on input samples, which is encoded in line 37 using sparse one-hot encoding\
    \ [92]. In lines 39 and 40, padding is added to the encoded alphabet. In lines\
    \ 43–51, the `load_dataset` function, whose inputs are the sample inputs and the\
    \ expected outputs, generates the encoded and padded sample inputs called `input_tensor`\
    \ (i.e. the X set), the expected outputs called `target_tensor` (i.e. the Y set)\
    \ and the alphabets for both inputs and expected outputs called `lang_tokenizer`.\n\
    \nIn lines 53–64, the `create_rnn_model` function creates the RNN model. In line\
    \ 58, an embedding layer using the alphabet size and embedding dimension is created;\
    \ similarly, an encoder using the number of hidden layers is created in line 60\
    \ and a decoder using the size of expected output alphabet in line 62.\n\nIn lines\
    \ 66–92, the `predict` function is implemented, which generates a response for\
    \ a given user input sentence as follows. In line 69, special start and end words\
    \ are added. In line 71, the words are converted to numeric vectors and, in lines\
    \ 72–74, padding is added. In line 76, the input queries are converted to the\
    \ tensor flow data type to be used later in the RNN model on line 78. A vector\
    \ called `prediction` containing the outputs of the `softmax` unit is also created\
    \ at line 78. In line 83, the index of the highest probability value in the prediction\
    \ is found by the `tf.argmax` function. In lines 88 and 89, the tokens are converted\
    \ to words. After removing the tags, the function returns the predicted output\
    \ sentence.\n\nIn lines 94–104, the input samples are read from a file and split\
    \ into sample inputs and corresponding outputs, which are then loaded into matrices\
    \ called `input_tensor_train` and `target_tensor_train`, respectively, in line\
    \ 103. An RNN model is created in line 110 using the parameters defined above,\
    \ namely the alphabet size, embedding dimension and number of hidden layers. In\
    \ line 113, a tensor flow object called `optimizer`, which uses gradient descent\
    \ for optimization (i.e. the Adam option), is created. In lines 114–115, the loss\
    \ function is defined as a sparse cross-entropy loss [93]. In lines 127 and 128,\
    \ the RNN is trained using the input and output matrices, the number of epochs,\
    \ the batch size and the choice for the `shuffle` operation (if true, the order\
    \ of input samples is shuffled at each epoch) and stored into an object called\
    \ `model`. The remaining lines are for a simplistic user interface to either train\
    \ a new RNN or use a previously trained one, to ask queries either directly on\
    \ screen or from a previously recorded file and for storing the current results.\n\
    \n```python\n# The City College of New York, City University of New York\n# Written\
    \ by: Hasan Suca Kayman\n# June 2024\n# chatbot_RNN is a simple chatbot that uses\
    \ a Recurrent Neural Network\n# to generate responses to user queries. Training\
    \ materials is a set of\n# dialogs taken from the text messages arbitrarily chosen\
    \ from the Internet.\n\n# Importing necessary libraries\nimport tensorflow as\
    \ tf\nfrom datetime import datetime\nimport os\nimport time\n\n# Setting a random\
    \ seed for reproducibility\nseed = 301\ntf.keras.utils.set_random_seed(seed)\n\
    \n# Example queries file\nqueries_path = 'questions.txt'\n# Data input file\n\
    data_path = 'cleaned_dialogs.txt'\n\nnoof_samples = 500\nbatch_size = 16\nnoof_hidden_layers\
    \ = 256\nnoof_epochs = 1000\nembedding_dim = 128\n\n# Tokenize a list of sentences\
    \ and pad them to ensure equal length\n# Convert words into numeric tokens and\
    \ add padding based on max length\ndef tokenize(lang):\n    # Create a tokenizer\n\
    \    lang_tokenizer = tf.keras.preprocessing.text.Tokenizer(filters='')\n    #\
    \ Fit tokenizer to the given text\n    lang_tokenizer.fit_on_texts(lang)\n   \
    \ # Convert text to sequences of numbers\n    tensor = lang_tokenizer.texts_to_sequences(lang)\n\
    \    # Pad sequences\n    tensor = tf.keras.preprocessing.sequence.pad_sequences(tensor,\
    \ padding='post')\n    return tensor, lang_tokenizer\n\n# Load a dataset and tokenize\
    \ both input and target (expected) languages\ndef load_dataset(inp_lang, targ_lang):\n\
    \    # Unpack the given data into target and input languages\n    lang = inp_lang\
    \ + targ_lang\n    # Tokenize both the input and target languages\n    data, lang_tokenizer\
    \ = tokenize(lang)\n    input_tensor, target_tensor = data[:len(inp_lang)], data[len(inp_lang):]\n\
    \    # Return tokenized inputs, targets, and their tokenizers\n    return input_tensor,\
    \ target_tensor, lang_tokenizer\n\n# Create a simple RNN model with specified\
    \ parameters\ndef create_rnn_model(alph_size, embedding_dim, rnn_units):\n   \
    \ # Define a sequential model with embedding, RNN, and output layer\n    model\
    \ = tf.keras.Sequential([\n        # Embedding layer\n        tf.keras.layers.Embedding(alph_size,\
    \ embedding_dim),\n        # Simple RNN layer\n        tf.keras.layers.SimpleRNN(rnn_units,\
    \ return_sequences=True),\n        # Dense output layer\n        tf.keras.layers.Dense(alph_size)\n\
    \    ])\n    return model\n\n# Given an input sentence, generate a response using\
    \ the model\ndef predict(sentence, model, tokenizer, max_length=20):\n    # Preprocess\
    \ the input sentence\n    preprocessed_sentence = '<start> ' + sentence.lower()\
    \ + ' <end>'\n    # Tokenize the sentence and pad it to the max_length\n    input_sequence\
    \ = tokenizer.texts_to_sequences([preprocessed_sentence])\n    input_tensor =\
    \ tf.keras.preprocessing.sequence.pad_sequences(\n        input_sequence, maxlen=max_length,\
    \ padding='post')\n    # Generate a prediction using the model\n    predictions\
    \ = model(input_tensor)\n    # Get the index of the highest probability value\n\
    \    predicted_index = tf.argmax(predictions, axis=-1).numpy()[0]\n    # Convert\
    \ the index back to a word\n    predicted_word = tokenizer.index_word.get(predicted_index,\
    \ '')\n    return predicted_word\n```"
  mdcn: "## 11.4 使用RNN的聊天机器人Python脚本\n\n如第10章第10.5节所述，在RNN中采用嵌入层可以生成输入向量的紧凑表示，从而显著降低训练过程的计算成本。图11.4展示了Python和Matlab脚本中使用的RNN的权重矩阵维度，该RNN具有256个隐藏层和一个大小为（$128\
    \ \\times 565$）的嵌入矩阵$E$，其词典包含565个单词。回顾第10章公式（10.20），对于嵌入层，矩阵乘法定义为$X = E \\cdot\
    \ X^o$，其中$X^o$是独热编码的输入向量。\n\n本节我们将展示一个示例Python脚本，该脚本实现了第11.3节描述的简单聊天机器人，将其构建为一个多对多RNN。该RNN采用图11.4所示的相同架构，具有256个隐藏层和128的嵌入维度，用于处理来自包含565个唯一单词词典的用户查询。在理解下面提供的示例代码后，建议读者尝试更改RNN架构和训练的参数，以深入理解每个参数对RNN预测精度的影响。\n\
    \n在第23行，用于训练RNN的样本数量设置为500。在第24行，`batch size`（批大小）设置为16，这是一个训练参数，指定每个训练周期（epoch）一次处理的输入样本数量。例如，如果有1000个数据样本且批大小为100，那么在一个训练周期内，RNN将处理10个批次，每个批次包含100个输入样本。通过以小块处理样本数据，我们在训练期间限制了矩阵维度（在此例中为16），而一次性处理所有输入样本则需要操作维度大得多的矩阵（在此例中为1000），计算成本会高得多。在第25行，隐藏层数量设置为256，这意味着RNN使用256个并行运行的编码器。在这种情况下，如果不使用嵌入，U的维度将是（256\
    \ × 565），其中我们使用$I = 500$个样本，包含总共$|I| = 565$个唯一单词。在第26行，我们将训练周期数设置为1000，这是训练RNN所使用的前向和反向传播的总次数。在第27行，嵌入层大小设置为128，这意味着E的维度将是（128\
    \ × 565）。使用嵌入后，单个输入样本的大小从（565 × 1）减少到（128 × 1），如图11.4所示。嵌入将U的维度从（256 × 565）降低到（256\
    \ × 128）。\n\n在第29-41行，名为`tokenize`的函数接受数据样本集作为输入，将单词转换为数字标记（token），并根据用户定义的最大序列长度添加填充（padding）。填充[101]是处理可变长度输入和输出序列的有用技术，其中所有输入和输出都用空字符填充，使其看起来具有相等的长度。在第33行，基于输入样本创建了一个名为`lang_tokenizer`的字母表，它在第37行使用稀疏独热编码[92]进行编码。在第39和40行，为编码后的字母表添加了填充。在第43-51行，`load_dataset`函数（其输入是样本输入和期望输出）生成编码并填充后的样本输入（称为`input_tensor`，即X集）、期望输出（称为`target_tensor`，即Y集）以及输入和期望输出的字母表（称为`lang_tokenizer`）。\n\
    \n在第53-64行，`create_rnn_model`函数创建了RNN模型。在第58行，创建了一个使用字母表大小和嵌入维度的嵌入层；类似地，在第60行创建了一个使用隐藏层数量的编码器，在第62行创建了一个使用期望输出字母表大小的解码器。\n\
    \n在第66-92行，实现了`predict`函数，该函数为给定的用户输入句子生成响应，过程如下。在第69行，添加了特殊的起始和结束词。在第71行，单词被转换为数字向量，在第72-74行添加了填充。在第76行，输入查询被转换为张量流（tensor\
    \ flow）数据类型，以便稍后在第78行的RNN模型中使用。在第78行还创建了一个名为`prediction`的向量，其中包含`softmax`单元的输出。在第83行，通过`tf.argmax`函数找到预测中概率值最高的索引。在第88和89行，标记被转换回单词。移除标签后，函数返回预测的输出句子。\n\
    \n在第94-104行，从文件中读取输入样本，并将其拆分为样本输入和对应的输出，然后在第103行分别加载到名为`input_tensor_train`和`target_tensor_train`的矩阵中。在第110行，使用上面定义的参数（即字母表大小、嵌入维度和隐藏层数量）创建了一个RNN模型。在第113行，创建了一个名为`optimizer`的张量流对象，它使用梯度下降进行优化（即Adam选项）。在第114-115行，损失函数被定义为稀疏交叉熵损失[93]。在第127和128行，使用输入和输出矩阵、训练周期数、批大小以及`shuffle`操作的选择（如果为true，则在每个训练周期打乱输入样本的顺序）来训练RNN，并将结果存储到名为`model`的对象中。其余行用于一个简单的用户界面，用于训练新的RNN或使用先前训练好的模型，直接在屏幕上或从先前记录的文件中提问，以及存储当前结果。\n\
    \n```python\n# The City College of New York, City University of New York\n# Written\
    \ by: Hasan Suca Kayman\n# June 2024\n# chatbot_RNN is a simple chatbot that uses\
    \ a Recurrent Neural Network\n# to generate responses to user queries. Training\
    \ materials is a set of\n# dialogs taken from the text messages arbitrarily chosen\
    \ from the Internet.\n\n# Importing necessary libraries\nimport tensorflow as\
    \ tf\nfrom datetime import datetime\nimport os\nimport time\n\n# Setting a random\
    \ seed for reproducibility\nseed = 301\ntf.keras.utils.set_random_seed(seed)\n\
    \n# Example queries file\nqueries_path = 'questions.txt'\n# Data input file\n\
    data_path = 'cleaned_dialogs.txt'\n\nnoof_samples = 500\nbatch_size = 16\nnoof_hidden_layers\
    \ = 256\nnoof_epochs = 1000\nembedding_dim = 128\n\n# Tokenize a list of sentences\
    \ and pad them to ensure equal length\n# Convert words into numeric tokens and\
    \ add padding based on max length\ndef tokenize(lang):\n    # Create a tokenizer\n\
    \    lang_tokenizer = tf.keras.preprocessing.text.Tokenizer(filters='')\n    #\
    \ Fit tokenizer to the given text\n    lang_tokenizer.fit_on_texts(lang)\n   \
    \ # Convert text to sequences of numbers\n    tensor = lang_tokenizer.texts_to_sequences(lang)\n\
    \    # Pad sequences\n    tensor = tf.keras.preprocessing.sequence.pad_sequences(tensor,\
    \ padding='post')\n    return tensor, lang_tokenizer\n\n# Load a dataset and tokenize\
    \ both input and target (expected) languages\ndef load_dataset(inp_lang, targ_lang):\n\
    \    # Unpack the given data into target and input languages\n    lang = inp_lang\
    \ + targ_lang\n    # Tokenize both the input and target languages\n    data, lang_tokenizer\
    \ = tokenize(lang)\n    input_tensor, target_tensor = data[:len(inp_lang)], data[len(inp_lang):]\n\
    \    # Return tokenized inputs, targets, and their tokenizers\n    return input_tensor,\
    \ target_tensor, lang_tokenizer\n\n# Create a simple RNN model with specified\
    \ parameters\ndef create_rnn_model(alph_size, embedding_dim, rnn_units):\n   \
    \ # Define a sequential model with embedding, RNN, and output layer\n    model\
    \ = tf.keras.Sequential([\n        # Embedding layer\n        tf.keras.layers.Embedding(alph_size,\
    \ embedding_dim),\n        # Simple RNN layer\n        tf.keras.layers.SimpleRNN(rnn_units,\
    \ return_sequences=True),\n        # Dense output layer\n        tf.keras.layers.Dense(alph_size)\n\
    \    ])\n    return model\n\n# Given an input sentence, generate a response using\
    \ the model\ndef predict(sentence, model, tokenizer, max_length=20):\n    # Preprocess\
    \ the input sentence\n    preprocessed_sentence = '<start> ' + sentence.lower()\
    \ + ' <end>'\n    # Tokenize the sentence and pad it to the max_length\n    input_sequence\
    \ = tokenizer.texts_to_sequences([preprocessed_sentence])\n    input_tensor =\
    \ tf.keras.preprocessing.sequence.pad_sequences(\n        input_sequence, maxlen=max_length,\
    \ padding='post')\n    # Generate a prediction using the model\n    predictions\
    \ = model(input_tensor)\n    # Get the index of the highest probability value\n\
    \    predicted_index = tf.argmax(predictions, axis=-1).numpy()[0]\n    # Convert\
    \ the index back to a word\n    predicted_word = tokenizer.index_word.get(predicted_index,\
    \ '')\n    return predicted_word\n```"

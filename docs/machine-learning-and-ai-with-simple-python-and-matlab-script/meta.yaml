  md: 'If the computation load of flight control is kept light, bio-inspired algorithms
    such as GAs can be perform in real-time (or near-real-time) flight control. If
    more conditions are included in a chromosome or a more advanced fitness function
    is employed, more powerful flight control algorithms may be constructed. However,
    increased complexity implies that computational time for flight control will most
    likely increase, which may prevent some applications from operating in real time.


    It is possible that other biologically inspired algorithms could be used for flight
    control of autonomous drones operating as a swarm. For example, one could easily
    adapt a similar flight control mechanism by replacing the GAs with particle swarm
    optimization or differential evolution algorithms (see Sections 18.2 and 18.3
    in Chapter 18).



    This formulation is known as a *knapsack problem* (KP) [113]. The name knapsack
    problem was coined by mathematician Tobias Dantzig in the early twentieth century
    [109]. As discussed further in this chapter, there are different versions of the
    KP, where the items may have single or multiple copies with single or multiple
    constraints (e.g. weight and volume). For the example given in Figure 15.4, if
    multiple copies of items are available, the solution is selecting three yellow
    and three grey boxes with a total weight of 15 kg and a value of 36 dollars. If
    only a single copy of each item can be selected, the solution includes all items
    except for the green box, with a total weight of 8 kg and a value of 15 dollars.


    For a given set of items, each with a weight and value, to be added into a knapsack
    which has a limited capacity, the KP is defined as selecting items from this set
    such that the total value of the selected items is maximized without exceeding
    its capacity. Since the solution space grows exponentially with the number of
    elements to be placed into the knapsack, the KP has been recognized as a computationally
    difficult problem.


    Let us consider a knapsack with a weight capacity of $K_W$. Let there be $n$ items
    to be loaded into the knapsack, each item $j$ with weight $w_j$ and a value of
    $v_j$ dollars. A good solution to the KP should'

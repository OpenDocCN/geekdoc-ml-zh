  mdcn: "## 17 用于路径优化的遗传算法\n\n```python\n## 配置遗传算法的种群，使每条染色体初始化为从0到CHROM_LENGTH-1序列的随机排列\n\
    ## range(CHROM_LENGTH): 创建一个从0到CHROM_LENGTH-1的列表\n## range: [0,1,...,9] indices\
    \ 是 range 的一个随机排列\ntoolbox.register(\"indices\", random.sample, range(CHROM_LENGTH),\
    \ CHROM_LENGTH)\n## 将 indices 的内容分配为基因组中的基因\ntoolbox.register(\"genome\", tools.initIterate,\
    \ creator.Individual,\n                toolbox.indices)\n## 为种群中的每条染色体重复染色体分配\n\
    toolbox.register(\"population\", tools.initRepeat, list, toolbox.genome)\n\n##\
    \ 定义适应度函数\ndef TSP_fit_func(chromosome):\n    ## 对染色体中存储的路径总距离求和\n    ## 初始化从最后一个元素到第一个元素的距离\n\
    \    distance = distance_matrix[chromosome[-1]][chromosome[0]]\n    ## 对所有 i，求和从\
    \ i 到 i+1 的所有距离\n    for i in range(len(chromosome)-1):\n        distance += distance_matrix[chromosome[i]][chromosome[i+1]]\n\
    \    ## 返回路径距离作为适应度\n    ## (在 deap 中，return 至少需要一个逗号 - 这是条愚蠢的规则)\n    return\
    \ distance,\n## 通过传递适应度函数来配置评估参数\ntoolbox.register(\"evaluate\", TSP_fit_func)\n\
    \n## 交叉算子的实现：\n## 将繁殖函数设置为部分匹配交叉，该操作产生的子代也是排列\ntoolbox.register(\"mate\", tools.cxPartiallyMatched)\n\
    ## 设置5%的变异率，这会导致染色体中的基因被随机交换，且变异结果也是一个排列\ntoolbox.register(\"mutate\", tools.mutShuffleIndexes,\
    \ indpb=0.05)\n## 将选择函数设置为锦标赛选择，该方法会随机挑选三条染色体并选择适应度最好的那条\ntoolbox.register(\"\

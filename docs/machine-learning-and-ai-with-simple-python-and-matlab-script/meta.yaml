    79 latest_inputs = table2array(df(end, {'SMA', 'EMA', 'Momentum', 'BB'}));\n80\
    \ prediction = predict(model, latest_inputs);\n81 \n82 % 打印结果\n83 fprintf('\\\
    n********** 神经网络训练完成 **********')\n84 fprintf('\\n*******************************************\\\

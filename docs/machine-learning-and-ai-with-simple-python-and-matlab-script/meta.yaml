    # 12


    # 带注意力机制的RNN


    ## 12.1 引言


    在本章中，我们介绍`注意力`（attention），这是一种RNN的增强机制，它提供了这样的能力：先前隐藏状态生成的信息在每一步都*直接*可用[102, 103]。回顾第10章，在RNN中，在步骤$t$，只能直接使用前一步$t-1$的隐藏状态信息$h_{t-1}$。递归地，$h_{t-1}$只能直接访问步骤$(t-2)$的隐藏状态信息$h_{t-2}$，而$h_{t-2}$又利用了$h_{t-3}$的隐藏状态，依此类推。但是，来自遥远过去隐藏状态的间接信息对当前隐藏状态的影响很弱，尤其是当与过去隐藏状态的距离增加时。另一方面，在带有注意力机制的RNN（记为RNN-Att）中，当计算步骤$t$的隐藏状态$h_t$和输出预测$\hat{y}_t$时，所有先前步骤生成的隐藏状态（即对于$(k+1)$个连续输入序列，$h_{t-1},
    h_{t-2}, \cdots h_{t-k}$）都是直接可用的。在每一步利用所有先前隐藏状态的主要目的是探索当前输入与先前输入生成的隐藏状态之间可能存在的关系。当处理输入序列时，如果当前输入的处理方式与先前使用的输入（通常不止一个）有显著关系，注意力机制就显得尤为重要。这类系统的典型例子是机器翻译器，它将一种自然语言书写（或口述）的句子转换为另一种语言。我们将在第13章介绍一个使用RNN-Att的简单机器翻译示例。


    ## 12.2 带注意力机制的一对一RNN单元


    图12.1展示了一个带注意力机制的一对一单单元RNN，它由三个功能部分组成，即`编码器`（encoder）、`注意力`（attention）和`解码器`（decoder）。与第10章介绍的RNN类似，RNN-Att的编码器单元在步骤$t$接受一个输入向量$x_t$，该向量通过权重矩阵$U$进行缩放，并与偏置向量$b$以及通过权重矩阵$W$的前一步隐藏状态信息$h_{t-1}$相结合。在应用激活函数（图12.1中选择为`tanh`）后，生成隐藏状态$h_t$作为编码器的输出。


    在RNN-Att的注意力单元中，来自编码器的当前隐藏状态信息$h_t$分别与该步骤之前生成的每个先前隐藏状态（即$\forall h_{\delta}$，其中$\delta
    < t$）相乘，结果分别输入到一个`softmax`单元。这些输入被称为`注意力系数`（attention coefficients），如图12.1所示。`softmax`单元的输出被称为`注意力权重`（attention
    weights）。`softmax`的每个输出随后分别乘以'

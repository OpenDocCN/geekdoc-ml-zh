    ```\n\nwhere the predicted percentage change of price for the new day is stored\
    \ in the variable `prediction`.\n\n```matlab\n1 % The City College of New York,\
    \ City University of New York\n2 % Written by Olga Chsherbakova\n3 % Date: November,\
    \ 2023\n4 % ANN for algorithmic trading of financial assets\n5 clc;\n6 clear;\n\
    7 \n8 % start training ANN using the df file contains historical data and\n9 %\

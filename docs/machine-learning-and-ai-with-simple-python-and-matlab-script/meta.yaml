    \ dollars.\n\nFor a given set of items, each with a weight and value, to be added\
    \ into a knapsack which has a limited capacity, the KP is defined as selecting\
    \ items from this set such that the total value of the selected items is maximized\
    \ without exceeding its capacity. Since the solution space grows exponentially\
    \ with the number of elements to be placed into the knapsack, the KP has been\
    \ recognized as a computationally difficult problem.\n\nLet us consider a knapsack\

    \n```\ncnn_trained = load_data.cnn_trained;\n```\n\n在第47-50行设置录音参数（如采样率、位深和录音时长）后，提示用户对着设备的麦克风说一个短语，该短语在第51-53行被录制为名为`recObj`的对象。此录音首先在第59行回放，然后在第64-83行，要求用户选择一个目标语言，该短语将被翻译成该语言。在第85行，调用`CNN_predict`：\n\
    \n```\ncnn_prediction = CNN_Predict(recObj, cnn_trained);\n```\n\n其中`cnn_prediction`包含预测结果的位置，然后在第90行以用户选择的语言回放。最后，在第96-100行，询问用户是否要保存训练好的CNN以备后用。\n\
    \n```\n% The City College of New York, City University of New York\n% Written\

  md: '# Benchmark for PSO: Rosenbrock Function


    A benchmark function for PSO is the Rosenbrock function [141], which is defined
    for the two-dimensional case as


    $$f(x, y) = (1 - x^2) + 100(y - x^2)^2.$$


    The goal for PSO is to find the minimum value for the Rosenbrock function, which
    is in (0, 0), as shown in Figure 18.2. Let us now demonstrate the steps of PSO
    operation for this benchmark. We use a simple PSO with five particles and the
    parameters shown in Figure 18.3a. Let the initial random positions of the particles
    be as given in Figure 18.3b. In this example, we focus on particle 3 and observe
    how it evolves as the PSO algorithm progresses. The initial position of particle
    3 is selected randomly as $P_3^0 = (0.49, -1.92)$ (Figure 18.3b). The fitness
    for particle 3 is


    $$f(P_3^0) = (1 - 0.49)^2 + 100(-1.92 - (0.49)^2)^2 = 3143.43.$$


    ![](img/a83d807f9a9119b1472555c0ef55797e_316_0.png)


    **Figure 18.2** Rosenbrock function as a benchmark for PSO.


    **Figure 18.3** Numerical example for PSO using Rosenbrock function: (a) PSO parameter
    values, and (b) randomly selected initial positions of five particles.


    | Parameter values for this example: |

    | :--- |

    | Population size: 5 |

    | Number of generations: 4 |

    | maxSpeed_x = +/- 1 |

    | maxSpeed_y = +/- 1 |

    | Range_x = [-2,2] |

    | Range_y = [-2,2] |

    | Fitness: $f(x,y) = (1-x)^2+100(y-x^2)^2$ |

    | $C_1 = 1.5; C_2 = 1.5$ |

    | w = 0.9 |

    | (a) |


    | Initial positions |

    | :---: | :---: |

    | Particles | Position |

    | 1 | (-0.2, 1.93) |

    | 2 | (-0.52, 1.53) |

    | 3 | (0.49, -1.92) |

    | 4 | (-0.13, -1.51) |

    | 5 | (1.87, 1.49) |

    | (b) |'

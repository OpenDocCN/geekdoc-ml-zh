    \ 0.0494\n\nThe predicted change for 11-Mar-2020 was: 0.00827\nActual change was\
    \ for 11-Mar-2020 was: -0.0489\n\nANN was correct in predicting the movement 56.00%\
    \ of the time in 100 predictions.\nThe average error of the correct predictions\
    \ was 0.9%\n>>\n```\n\n**图6.9** Matlab脚本一次示例运行的输出结果：在100次人工神经网络运行中，获得了62次正确预测，平均误差为0.9%。\n\
    \n## 6.6 结论性评述\n\n社交媒体上的帖子、印刷媒体上出现的文章以及在新闻机构新闻发布会上发表的评论，可能会影响各种外部且看似不相关事件的结果（例如，金融证券价值、公司估值或就业决策）。自然语言处理技术允许探索自然语言内容（例如，口头、书面或发布的文本）与外部事件（例如，房价）之间的相互作用。人工神经网络可用于实现基于统计的自然语言处理技术，方法是首先从文本主体中提取关键词，然后将它们与时间上与该内容相关的外部事件记录相关联。这些关键词及其使用频率可以被输入到一个人工神经网络中，该网络经过训练可以预测各种外部事件的结果。\n\
    \n在本章中，我们使用了美国前总统特朗普的推文，以探讨其对标准普尔500指数成分股可能产生的影响。首先，我们确定了一组在推文中使用的、可能与金融资产走势相关的关键词。每天发布的这些关键词的数量，连同开盘价和每日交易量，被用作人工神经网络的输入。股票价格走势的预测是人工神经网络的输出。利用推文以及与推文发布日期相对应的历史金融数据，训练一个人工神经网络，以使用未来的推文来预测未来的股票走势。\n\
    \n在现实生活中成功运用人工神经网络解决自然语言处理类问题，取决于正确识别人工神经网络的输入和输出、恰当选择关键词以及设计人工神经网络架构。人工智能和自然语言处理技术能够解决的现实问题的复杂性，需要结合通常由各类主题专家（例如，科学家、基金经理、企业高管、医疗人员等）和计算专业人员（例如，统计学家、数学家、计算机科学家和软件工程师）所具备的经验和技能组合。"

    # 15


    # GAs for Dietary Menu Selection


    # 15.1 Introduction


    AI-based computational methods are capable of obtaining satisfactory solutions
    for otherwise intractable problems if a proper model can be constructed for the
    problem. In this chapter, we study a well-known computationally expensive problem,
    namely the so-called knapsack problem (KP)¹ [109], and present a computationally
    feasible solution using genetic algorithms. KP is designed specifically to solve
    the types of challenges where decisions are choices that must obey a set of limitations
    with the goal of maximizing the outcome of a task.


    In the engineering domain, the KP represents a class of optimization problems
    where there are multiple and often conflicting requirements to be selected to
    satisfy objectives such as to maximize a profit or minimize a loss. Airlines and
    naval cargo ships have to select freight to maximize their profits while staying
    within the weight and capacity limitations of a given flight. A portfolio manager
    considers potential investment opportunities and their expected returns to maximize
    gains without exceeding their allocated budget. A project manager may need to
    select a team from a pool of engineers with different levels of expertise and
    salaries, while including individuals with the highest talent level and keeping
    the total cost as low as possible.


    As an example, we choose a dietary menu selection problem, where a set of food
    items, each with a calorie and protein value, will be selected such that the total
    calorie amount of the selected items is below a given limit while the total protein
    amount is kept as large as possible. Consider the fictitious cinema menu shown
    in Figure 15.1 [110]. Suppose one has to select items from this menu such that
    total calorie count should stay below 1000 calories. This restriction implies
    that one cannot select both medium plain popcorn (600 calories) and butter topping
    (480 calories) since the total calories will be above the 1000 calorie limit.
    A valid solution, on the other hand, may include medium plain popcorn with nacho
    cheese (160 calories), which has a total of 640 calories and 17 grams of protein.
    However, selecting small plain popcorn (300 calories) and a hot dog (530 calories)
    is a better solution since it has a total of 26 grams of protein. We can easily
    see that if the calorie limit is higher or the number of food items is large,
    making a good menu selection will be a challenging task even for such simple examples.


    We can see from this simple example that to find a solution for a proper selection
    of menu items, we have to try many combinations of items and check if they satisfy
    the dietary constraints. If there are more items in the menu (e.g. in a typical
    dietary menu, there are hundreds of items), this selection becomes a formidable
    problem. In fact, the computational cost of the KP grows exponentially



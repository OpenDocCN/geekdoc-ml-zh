    \ terminals cannot be on the left"
- md: "## Variations of GE\n\nSome GE implementations use PSO to explore the search\
    \ space of possible solutions in an attempt to improve the fitnesses of population\
    \ members when moving from one generation to the next. This variation of GE is\
    \ called a grammatical swarm [151]. In πGrammatical Evolution (πGE), a different\
    \ order for derivation of candidate solutions from BNF is proposed [152]. In πGE,\
    \ codon values are used to specify which non-terminal will be developed next,\
    \ instead of the traditional order of processing from left to right. This variation\
    \ provides a more flexible means to generate candidate solutions and, hence, is\
    \ expected to be more effective for applications where population diversity is\
    \ critical. To improve the search power of GE, weighted hierarchical GE imposes\
    \ a hierarchy based on the genotype and encodes grammar symbols with a varying\
    \ number of bits based on the relative expressive power of those symbols [153].\n\
    \n## Applications of GE\n\nGE has been applied to solving a broad range of engineering\
    \ problems in a wide range of disciplines. For example, GE can be used in swarm\
    \ robotics to manage multiple robots operating as a single system. The collective\
    \ behaviour of autonomous robots can be synthesized by evolving a set of rules\
    \ for each individual robot. A program that dictates actions for a robot may be\
    \ derived from BNF grammar rules [154].\n\nIn finance, algorithmic trading policies\
    \ can be represented by BNF grammars to populate different meta-parameters in\
    \ a variety of technical indicators [155]. Similarly, bankruptcy, corporate analysis\
    \ and credit classification are within the scope of GE applications [156]. In\
    \ bioinformatics, GE can be employed to recognize eukaryotic promoters in identification\
    \ of biological genes [157].\n\nIn telecommunications, GE can generate programs\
    \ that are capable of recognizing malicious activities on a network and setting\
    \ appropriate access policies to prevent unauthorized use of network resources\
    \ [158]. A BNF grammar can be designed to consider network traffic in a way that\
    \ allows for generated programs to detect cyberattacks [159]. GE may also be used\
    \ to formulate security rules that balance potentially conflicting goals (e.g.\
    \ security risks, exposure of network nodes and convenient access to network resources\
    \ for authorized users). In this application, the BNF grammar of GE can infer\
    \ multi-level security policies to determine trustworthy entities and their appropriate\
    \ need-to-know access rights [160].\n\n## BNF Notation\n\nBNF notation expresses\
    \ a grammar of a language as production rules as follows [149]:\n\n- terminals:\
    \ items that appear in a language (e.g. +,-,0,1,...,9, etc.)\n- non-terminals:\
    \ they are terms that can be expanded into one or more terminals and non-terminals\n\
    - A grammar can be represented by a tuple G = {N, T, P, S}, where\n  - N: a set\
    \ of non-terminals; for example, N = {exp, op, cond}\n  - T: a set of terminals;\
    \ for example, T = {1, 2, ..., 9, (, ), if, else}\n  - P: a set of production\
    \ rules; for example, < exp > ::= < exp > | < int >< cond >< int >\n  - S: a start\
    \ symbol (S ∈ N); for example, S = < exp >\n\n## Santa Fe Trail Problem\n\nThe\
    \ Santa Fe trail problem is an instance of the artificial ant problem [107], where\
    \ the objective is to find a computer program to control an artificial ant so\
    \ that the ant can find all food pieces. Figure 18.17 shows the Santa Fe trail,\
    \ which contains 89 pieces of food placed on a trail over a 32 × 32 toroidal grid.\
    \ The trail has 144 squares and 21 turns. An example BNF for the Santa Fe trail\
    \ problem is shown in Figure 18.18. An artificial ant can perform one of the following\
    \ actions in one time unit:\n\n- turn left\n- turn right\n- move ahead\n\nAn artificial\
    \ ant can look into the square it is currently facing and decide if the square\
    \ contains a food piece or is empty. If there is food in the square the ant moves\
    \ into, it is assumed that the ant automatically consumes the food, without requiring\
    \ a specific command to do so. The best reported solution completes the trail\
    \ in 545 steps [161]. The best performing program generated using the BNF grammar\
    \ shown in Figure 18.18 is shown in Figure 18.19 [107].\n\n## A Simple BNF for\
    \ an Artificial Ant\n\nLet us now consider an example BNF as shown in Figure 18.20,\
    \ which is simpler than the one shown in Figure 18.18. Figure 18.21 presents an\
    \ example chromosome (i.e. a genotype) and the expression tree (i.e. a phenotype)\
    \ generated using this chromosome and the BNF grammar of Figure 18.20. Step-by-step\
    \ generation of this expression tree is presented in Figures 18.22 to 18.23. Derivation\
    \ starts by considering the start symbol S expression of the BNF, which is S =\
    \ <expr> for this example (Figure 18.22). After <expr> is located at the root\
    \ of the expression tree, we observe that there are two choices for expanding\
    \ the non-terminal called <expr>, namely if food ahead then <act> else <act> and\
    \ <expr>. To resolve this choice, we use the first codon of the genome, which\
    \ is a 0, which implies that if food ahead then <act> else <act> will be placed\
    \ below <expr>. At this point, terminals if food ahead then will be placed below\
    \ <expr>, but the non-terminal <act> must be resolved. The non-terminal <act>\
    \ has three choices, namely <move><expr>, <move> and <move><act>. This choice\
    \ is resolved by the next codon of the genome, which is a 2. Therefore, the third\
    \ choice of <move><act> will be placed into the expression tree below <act>. Derivation\
    \ continues similarly until all non-terminals in the tree are resolved in terms\
    \ of terminals using the codon values from the genome.\n\nThe example above is\
    \ constructed in such a way that the codon values of the genotype shown in Figure\
    \ 18.20 were defined in advance to match the number of choices available for each\
    \ BNF rule. However, in general, the codon values of a genotype may be arbitrarily\
    \ large. For these cases, we can use the modulo function to obtain proper codon\
    \ values as dictated by the number of choices in a given BNF rule that is being\
    \ considered. For example, Figure 18.24 shows a genotype which has arbitrarily\
    \ large integer values. In this case, the modulo operator will be applied to resolve\
    \ the choices of the non-terminal to be evaluated. For example, after <expr> is\
    \ located at the root of the expression tree, the two choices for expanding the\
    \ non-terminal called <expr>, namely if food ahead then <act> else <act> and <expr>,\
    \ are resolved by using the codon value of 0, which is if food ahead then <act>\
    \ else <act>. Terminals if food ahead then will be placed below <expr>, but the\
    \ non-terminal <act> must be resolved. The non-terminal <act> has three choices,\
    \ namely <move><expr>, <move> and <move><act>. This choice is resolved by the\
    \ next codon of the genome, which is a 5. This means that the selection will be\
    \ 5 modulo 3 = 2, which is <move><act>. In general, when there are c choices for\
    \ a non-terminal and a codon value of r, the choice will be (r modulo c). For\
    \ simplicity, genotype values in Figure 18.24 are selected such that they generate\
    \ the same program in Figure 18.23 by applying the BNF of Figure 18.20.\n\n---\n\

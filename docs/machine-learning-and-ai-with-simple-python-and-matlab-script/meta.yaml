- md: "## 8 CNNs for Optical Character Recognition\n\n![](img/a83d807f9a9119b1472555c0ef55797e_139_0.png)\n\
    \nFigure 8.4 In this sample implementation, images used for training the CNN are\
    \ stored in a folder called TrainingSet, where there are as many folders as the\

    ## 10.2.2 前向传播与反向传播


    现在，我们将使用简单的字母表示 $I = \{\mathbf{h}, \mathbf{e}, \mathbf{1}, \mathbf{o}\}$，来演示当输入应用于图
    10.2a 和 b 所示的一对一单单元 RNN 时的操作。假设一个输入字符序列 $x_1, x_2, \cdots$ 被应用于 RNN。对于时间 $t$ 的用户输入

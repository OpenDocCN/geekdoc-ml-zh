    我们定义了一个具有四个隐藏层的神经网络架构，第一至第四隐藏层分别包含 120、60、15 和 5 个神经元，如图 5.3 所示（称为 120-60-15-5-1
    架构）。请注意，在尝试了不同的架构后，这种隐藏层数量和每层神经元数量的组合恰好表现最佳。


    在训练过程中，为了减少样本数据中可能存在的异常值对神经网络权重计算的影响，我们采用了所谓的留一交叉验证法来衡量训练好的神经网络的性能 [61]。假设有 100
    个数据样本（即 100 组输入和相应的输出）用于训练一个神经网络。在留一交叉验证中，从 100 个样本中取出一个数据样本（我们称之为样本 1），并使用剩余的
    99 个样本来训练神经网络。训练完成后，通过使用样本 1 作为测试来衡量神经网络的性能，即将样本 1 的输入应用于神经网络，由神经网络生成输出，并计算误差值。之后，从
    100 个样本中取出另一个样本（例如样本 2）重复相同的过程，依此类推。最终，会得到 100 个不同的误差值，这些值表示神经网络相对于样本数据的性能。在一般情况下，留一交叉验证可以通过从
    $N$ 个样本中移除 $k$ 个样本，使用 $(N - k)$ 个样本来训练神经网络，并为 $k$ 次测试计算性能来进行。$k$ 的选择取决于神经网络设计的应用场景。


    当一个神经网络在训练所用的样本数据集上表现良好，但在新数据元素上表现不佳时，就称该神经网络对其样本数据过拟合。过拟合在具有过多隐藏层和/或隐藏层中神经元过多的神经网络中尤其常见。这是由于样本数据中的噪声误导了神经网络权重，使其认为这些噪声是重要信息。避免过拟合的方法之一是采用正则化技术，并在权重计算中减少噪声的影响，即修改损失函数，使得小值权重在误差计算中扮演不那么重要的角色。例如，在
    L1 正则化中，鼓励小权重变为零，从而显著降低它们对性能的影响 [62]。在本文介绍的神经网络实现中，在具有 120 和 60 个神经元的前两个隐藏层中采用了
    L1 正则化。



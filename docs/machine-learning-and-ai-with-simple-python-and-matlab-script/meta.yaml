    \ in csv (today)\n57 X = table2array(df(long_window:end-1, {'SMA', 'EMA', 'Momentum',\
    \ 'BB'}));\n58 Y = table2array(df(long_window:end-1, {'Percent_Change'}));\n59\
    \ \n60 % create a model for the ANN\n61 % Create ANN with 4 inputs + 2 hidden\
    \ layers + 1 output layer\n62 % first hidden layer that accepts 4 indicators (SMA,\
    \ EMA, Momentum, BB);\n63 layers = [\n64     featureInputLayer(4)\n65     fullyConnectedLayer(4)\n\

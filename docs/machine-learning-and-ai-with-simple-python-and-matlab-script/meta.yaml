    # 4

    ANNs for Financial Stock Trading


    # 4.1 Introduction


    The use of computer programs to conduct transactions involving financial securities
    such as stocks and bonds is referred to as `algorithmic trading`. Within this
    realm, decisions to buy, sell or hold a diverse set of securities are performed
    in either autonomous or semi-autonomous fashion, depending on how comfortable
    a user is in surrendering control to algorithms.

    The clearest advantage of algorithmic trading is its ability to make trading decisions
    by taking into account a large number of factors, including analysis of many years
    of historical trading data; outside sources, such as media reports, speeches given
    by leaders and daily events; and many other inputs influencing trading decisions.
    Traditional stock traders, no matter how intelligent and experienced they may
    be, cannot handle such large quantities of information optimally. In current financial
    markets, over 60% of the traded volume utilizes some form of algorithmic trading
    mechanism. This volume is expected to increase as AI-based tools developed for
    algorithmic trading become more sophisticated over time.


    # 4.2 Programs that Buy and Sell Stocks


    Finance applications played an important role in the development of various AI
    methods. The trading rooms in the New York Stock Exchange from the “old days”
    have been replaced with the display screens of remote computers (Figure 4.1).

    So-called quants are designers of quantitative analysis and trading algorithms.
    They are typically engineers and physicists with mathematical and algorithm backgrounds
    combined with finance training.


    # 4.3 Technical Indicators


    Algorithmic trading programs typically make their trading decisions by observing
    so-called `technical indicators`, which are mathematical formulations derived
    from historical trading data such as price and volume. Technical indicators are
    useful tools to help identify any patterns that may be hidden in historical data
    [39]. In this chapter we include the most commonly used indicators, namely momentum,
    different types of moving averages and Bollinger bands. Although not described
    here due to space restrictions, stochastic oscillator [40], rate of change [41],
    on-balance'

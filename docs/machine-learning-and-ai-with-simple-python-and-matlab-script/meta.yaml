    \ × f）的滤波器可以通过用相邻（f × f）单元格中的最大值替换它们，将相邻单元格中的像素（即最小的图像元素）合并为一个单元格。CNN的修正线性单元（RELU）是一种非线性激活函数，用于控制相邻层之间的信息传播。通常，RELU通过将激活图中的负值设置为零来移除它们。这类似于第2章中ANN神经元使用的激活函数。在CNN的最后一个CL之后，激活图通过将其输入矩阵转换为一维向量然后连接它们来“展开”。这一层称为展开层（UL），生成一个输入向量，然后将其发送到全连接ANN以生成CNN的输出。图7.2展示了一个简单的CNN如何通过将图像传递给CL、RELU和PL，然后展开结果并馈入全连接ANN以生成输出来处理图像。\n\
    \n### 7.1.1 训练CNN\n\nCNN滤波器和ANN连接中使用的权重系数最初被赋予随机值。在类似于第2章描述的ANN训练过程中，这些权重的值通过连续的前向和反向传播步骤（称为epoch）进行演化。图7.3显示了一个训练CNN的简单算法。首先定义CNN的结构和用于训练的epoch数量。接下来，将所有层的权重和偏置初始化为随机值。在前向传播阶段，在每个CL处，对输入矩阵与每个滤波器执行卷积。在与所有滤波器完成卷积后，将RELU应用于CL输出并传递给PL。最后，UL展开PL的输出并将其馈入全连接ANN。通过ANN执行的前向和反向传播操作，生成一个初步输出及其相关误差。ANN的反向传播继续通过CNN层传播，以计算误差并调整CNN输入处的权重和偏置。此过程重复进行，直到达到预定的epoch数量。如果CNN中有多个CL和PL层，则对每一层连续重复这些操作。\n\
    \n```\nN_{CL} , N_{F}; // number of CLs and filters in each CL\ninitialize random\
    \ weights for all links W_{NN};\ninitialized random bias for all layers B_{NN};\n\
    set number of epochs for training CNN N_{E};\nfor i = 1 to N_{E} do\n    // forward\

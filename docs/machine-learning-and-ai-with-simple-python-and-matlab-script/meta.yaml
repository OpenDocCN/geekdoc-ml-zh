- md: "## 13 RNNs with Attention for Machine Translation\n\n```matlab\n[targ_lang_tokenizer,\
    \ reverseTokenizer, unique_words] = ...\n    tokenDictionary(targ_lang);\n\n%\
    \ Initialize cell arrays for storing sentences\ninput_tensor = cell(length(inp_lang),\
    \ 1);\ntarget_tensor = cell(length(targ_lang), 1);\n\n% Encode all of input and\
    \ target data\nfor i = 1:length(inp_lang)\n    input_tensor{i} = encoder(lang_tokenizer,\
    \ inp_lang{i}, 10);\n    target_tensor{i} = encoder(targ_lang_tokenizer, targ_lang{i},\
    \ 10);\nend\n% Transpose them to correct dimensions\ninput_tensor = input_tensor';\n\
    target_tensor = target_tensor';\nend\n```\n\n```matlab\nfunction [tokenizer,reverseTokenizer,unique_words]\
    \ = tokenDictionary(texts)\n    joined_texts = join(string(texts));\n    unique_words\
    \ = unique(strsplit(joined_texts));\n    unique_words = ['<pad>', unique_words];\n\
    \    indices = 1:numel(unique_words);\n    tokenizer = containers.Map(unique_words,\
    \ indices);\n    reverseTokenizer = containers.Map(indices, unique_words);\nend\n\
    ```\n\n```matlab\n% Create a RNNwAtt model with specified parameters\nfunction\
    \ layers = create_rnn_model_with_attention(alph_size, ...\n    embedding_dim,\
    \ rnn_units,unique_words)\n    ClassLayer = classificationLayer;\n    layers =\
    \ [\n        sequenceInputLayer(1)\n        wordEmbeddingLayer(embedding_dim,\
    \ alph_size)\n        lstmLayer(rnn_units, 'OutputMode', 'sequence')\n       \
    \ % Dot product attention layer\n        DotProductAttentionLayer('attention')\n\
    \        fullyConnectedLayer(alph_size)\n        softmaxLayer\n        ClassLayer];\n\
    \    ClassLayer.Classes = unique_words;\n    ClassLayer.ClassWeights = ones(1,\
    \ alph_size-1);\n    % Ignore padding while calculating loss\n    ClassLayer.ClassWeights(1.0)\
    \ = 0.0001;\nend\n```\n\n```matlab\nfunction predicted_sentence = predictResponse(model,\
    \ lang_tokenizer, ...\n    rev_tokenizer, user_input)\n    % Preprocess the input\
    \ sentence\n    preprocessed_sentence = '<start> '+ lower(user_input)+ ' <end>';\n\
    \    % Tokenize the sentence and pad it to the max_length\n    input_sequence\
    \ = encoder(lang_tokenizer, preprocessed_sentence, ...\n        length(strsplit(preprocessed_sentence)));\n\
    \    % Generate predictions\n    predictions = classify(model, input_sequence);\n\
    \    % Convert tokens back to words\n    predicted_words = decoder(rev_tokenizer,\
    \ predictions);\n    % Remove start and end tags and join into a single sentence\n\
    \    predicted_sentence = strrep(predicted_words,'<start> ','');\n    predicted_sentence\
    \ = strrep(predicted_sentence,' <end>','');\n    predicted_sentence = strrep(predicted_sentence,'<pad>','');\n\
    end\n```\n\n```matlab\nfunction text = decoder(reverseTokenizer, sequence)\n%\
    \ Sequences that are in sparse one-hot encoding are converted to\n% words:\n \
    \   words = cell(1, numel(sequence));\n    for i = 1:numel(sequence)\n       \
    \ intVal = double(string(sequence(i)));\n        if intVal ~= 0 && reverseTokenizer.isKey(intVal)\n\
    \            words{i} = reverseTokenizer(intVal);\n        else\n            words{i}\
    \ = '';\n        end\n    end\n    text = strjoin(words);\nend\n\nfunction sequence\
    \ = encoder(tokenizer, text, max_length)\n% Word by word, sparse one-hot encoding\
    \ is applied to sequences that\n% include words:\n    words = strsplit(text);\n\
    \    sequence = zeros(1, max_length);\n    sequence(:) = tokenizer('<pad>');\n\
    \    for i = 1:length(words)\n        if isKey(tokenizer, words{i})\n        \
    \    sequence(i) = tokenizer(words{i});\n        end\n    end\nend\n```\n\nWe\
    \ now present the implementation of the DotProductAttentionLayer class for constructing\
    \ the attention mechanism, which is a skeleton function defined in Matlab. This\
    \ function was customized for our example here such that first the hidden state\
    \ values are computed using Eq. (12.1), then the attention weights as defined\
    \ by Eq. (12.2) (lines 36 to 40) and finally the context vector as shown in Eq.\
    \ (12.3) (lines 42 to 53).\n\n```matlab\nclassdef DotProductAttentionLayer < nnet.layer.Layer\n\
    \    methods\n        function layer = DotProductAttentionLayer(name)\n      \

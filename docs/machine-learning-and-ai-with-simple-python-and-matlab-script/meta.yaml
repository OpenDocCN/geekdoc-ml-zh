    \ ANN USING MSFT.csv **********')\n11 % load the historical stock data\n12 historical_data_file\
    \ = 'MSFT.csv';\n13 % df stands for data frame\n14 df = readtable(historical_data_file,\
    \ 'PreserveVariableNames', true);\n15 \n16 % keep only the closing prices\n17\
    \ df = df(:, {'Close'});\n18 \n19 short_window = 5;\n20 long_window = 25;\n21\
    \ \n22 % calculate the Simple Moving Average and add it to a new column in df;\n\

  md: "# 17 GAs for Route Optimization\n\n```\n## configure the population of the\
    \ GA so that each chromosome is initialized\n## as a random permutation of the\
    \ sequence from 0 to CHROM_LENGTH-1\n## range(CHROM_LENGTH): creates a list from\
    \ 0 to CHROM_LENGTH-1\n## range: [0,1,...,9] indices is a random permutation of\
    \ range\ntoolbox.register(\"indices\", random.sample, range(CHROM_LENGTH), CHROM_LENGTH)\n\
    ## assign contents of indices as genes in genome\ntoolbox.register(\"genome\"\
    , tools.initIterate, creator.Individual,\n                toolbox.indices)\n##\
    \ repeat chromosome assignment for each chromosome in the population\ntoolbox.register(\"\
    population\", tools.initRepeat, list, toolbox.genome)\n\n## define the fitness\
    \ function\ndef TSP_fit_func(chromosome):\n    ## sum up the total distance of\
    \ the path stored in chromosome\n    ## initialize distance from last element\
    \ to the first element\n    distance = distance_matrix[chromosome[-1]][chromosome[0]]\n\
    \    ## sum all distances from i to i+1 for all i\n    for i in range(len(chromosome)-1):\n\
    \        distance += distance_matrix[chromosome[i]][chromosome[i+1]]\n    ## return\
    \ the path's distance as the fitness\n    ## (at least one comma is needed in\
    \ return in deap - stupid rule)\n    return distance,\n## configure the evaluate\
    \ parameter by passing the fitness function\ntoolbox.register(\"evaluate\", TSP_fit_func)\n\
    \n## implementation of crossover oeprator:\n## set the reproduction function to\
    \ partially matched crossover which\n## produces children that are also permutations\n\
    toolbox.register(\"mate\", tools.cxPartiallyMatched)\n## set a 5 percent of mutation,\
    \ which causes genes in the chromosome to\n## be randomly swapped and the result\
    \ of the mutation is also a permutation\ntoolbox.register(\"mutate\", tools.mutShuffleIndexes,\
    \ indpb=0.05)\n## set the selection function to tournament selection, which will\
    \ pick three\n## chromosomes at random and select the one with the best fitness\n\
    toolbox.register(\"select\", tools.selTournament, tournsize=3)\n\n## set population\
    \ size to n=100 (n=20 or n=10 see the impact of n)\npop = toolbox.population(n=100)\n\
    ## have variable best_genome store the chromosome with the best fitness\nbest_genome\
    \ = tools.HallOfFame(1)\n\n## run GA to get the solution\n#algorithms.eaSimple(pop,\
    \ toolbox, xo prob, mut prob, gens, store best)\nalgorithms.eaSimple(pop, toolbox,\
    \ 0.7, 0.2, 40, halloffame=best_genome)\n\n## store the solution into best_path\n\
    best_path = best_genome[0]\n## print best_path\nprint('\\nBEST PATH:\\n')\nfor\
    \ i in range(len(best_path)):\n    print(df['city'][best_path[i]])\nprint(df['city'][best_path[0]])\n\
    cost = 0\nprint('\\nBEST PATH COST:\\n')\nfor i in range(len(best_path)-1):\n\
    \    tempo = distance_matrix[best_path[i]][best_path[i+1]]\n    cost+= tempo\n\
    \    print(df['city'][best_path[i]], tempo)\nprint(df['city'][best_path[0]],distance_matrix[len(best_path)-1][best_path[0]])\n\
    cost += distance_matrix[len(best_path)-1][best_path[0]]\nprint(\"TOTAL COST: \"\
    ,cost)\n\n# PLOTTING BEST PATH\n\n# create a figure to draw the plot on\nfig =\
    \ plt.figure(figsize=(10, 10))\n\n## determine the size and position of the map\n\
    ## resolution is set to low to reduce run time\nm = Basemap(projection='lcc',\
    \ resolution='l',\n            width=5.5E6, height=3.5E6,\n            lat_0=39,\
    \ lon_0=-96,)\n```"

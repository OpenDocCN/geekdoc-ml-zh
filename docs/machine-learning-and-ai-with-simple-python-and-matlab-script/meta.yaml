    numerical example here is to underline the fact that the computational cost of
    training a CNN can easily be prohibitively high if special attention is not paid
    to the characteristics of each CNN layer.'
- md: '## 7.7 Concluding Remarks


    In this chapter, we introduce the main concepts governing the operations and functionalities
    of CNNs, which are ideal for the identification of multi-dimensional inputs such
    as images and speech. A typical CNN consists of convolution, pooling and unrolling
    layers; rectilinear activation units; and a fully-connected ANN. The main goal
    for engaging different types of layers is to reduce the high dimensions of the
    inputs. Each layer reduces the input image size by the order of the square of
    the filter sizes. Depending on the level of precision sought, multiple layers
    are employed.


    In general, training CNNs requires a high number of operations. One has to keep
    in mind their effect on training cost when selecting filter sizes, the number
    of filters and CL-PL pairs, and ANN architecture. It is highly recommended that
    techniques such as embedding are utilized to keep the computational cost of training
    within feasible boundaries.


    ## 7.8 Exercises for Chapter 7


    1) Discuss the impacts of increasing the number of CL-PL pairs on CNN training
    and performance.

    2) Discuss the impacts of using large filter sizes on CNN training and performance.

    3) Discuss the impacts of using small filter sizes on CNN training and performance.

    4) Discuss the impacts of having an ANN with a large number of hidden layers on
    CNN training and performance.

    5) How will the changes suggested in Exercises 1 and 2 together impact CNN training
    and performance? Can you support your answer by deriving matrix sizes as information
    is processed through the CNN?

    6) Repeat Exercise 5 for the changes suggested in Exercises 1 and 3.

    7) Repeat Exercise 5 for the changes suggested in Exercises 1 and 4.

    8) Repeat Exercise 5 for the changes suggested in Exercises 2 and 4.


    # 8 CNNs for Optical Character Recognition


    ## 8.1 Introduction


    Optical character recognition (OCR) is the process of digitizing and recognizing
    images of written, typed or printed text [78]. A typical example of OCR usage
    is postal automation, where letters and packages are classified based on their
    hand-written or typed addresses and labels. Rather than manually reading and typing
    the address of each letter into a computer, OCR allows the computer to recognize
    and process the addresses automatically. Other applications of OCR include capturing
    licence plate numbers, conversion of physical documents to editable text documents
    and assistance for the blind and visually impaired. A popular information source
    used for OCR is the MNIST dataset [79]. It consists of 70,000 greyscale images
    of handwritten numerical digits ranging from 0 to 9. Each digit is stored as a
    (28 × 28) pixel image. The dataset is divided into 60,000 training samples and
    10,000 test samples. Figure 8.1a displays a few examples from the MNIST dataset
    [80]. The MNIST website contains the performance of various classification methods
    trained on the dataset. It is reported on the MNIST website that CNNs currently
    outperform every other classifier for character recognition applications. In Figure
    8.1b, the lowest error rate corresponding to each classifier is listed.


    ## 8.2 A Simple CNN for OCR


    In this chapter, we introduce a CNN for implementing a simple OCR task, namely
    recognizing several hand-written characters. The CNN in this example reads a hand-drawn
    greyscale image of size (1 × 28 × 28) and identifies the input character as one
    of the reference images that it has stored. Multiple consecutive CL–PL pairs are
    employed to increase the prediction capability of the CNN (Figure 8.2). There
    are three convolutional layers (CLs), using $F_{cl} = 8$, 16 and 32 filters in
    three CLs, each with a size of $f_{cl} = 3 \times 3$. There are three RELU entities
    and two pooling layers (PLs), each with a pooling size of $p = 2$ using stride
    of $s_{pl} = 2$. The outputs of the ANN also constitute the output layer of the
    CNN. The number of ANN outputs is the number of distinct characters that the CNN
    was trained on. Based on the input image given to the CNN, only one of these CNN
    outputs will be set to $true$ (whichever output the CNN predicts as the correct
    match for the input image), while the others will be set to $false$. Let us now
    examine the image dimensions as the input goes through the layers of the CNN for
    this example (Figure 8.3). Using Eqns. (7.1), (7.2) and (7.3) presented in Chapter
    7, we have:


    - **Input:** Image size is (1 × 28 × 28).

    - **1st CL:** Using $F_{cl} = 8$ filters, each with size of $f_{cl} = 3 \times
    3$, dimensions are changed from (1 × 28 × 28) to (8 × 28 × 28).

    - **1st PL:** Using a pool size of $p = 2$ and stride $s_{pl} = 2$, dimensions
    are reduced from (8 × 28 × 28) to (8 × 14 × 14).

    - **2nd CL:** Using $F_{cl} = 16$ filters (i.e. twice the previous number of filters),
    each with size $f_{cl} = 3 \times 3$, dimensions are changed from (8 × 14 × 14)
    to (16 × 14 × 14).

    - **2nd PL:** Using a pool size of $p = 2$ and stride $s_{pl} = 2$, dimensions
    are reduced from (16 × 14 × 14) to (16 × 7 × 7).

    - **3rd CL:** Using $F_{cl} = 32$ filters (i.e. twice the previous number of filters),
    each with size of $f_{cl} = 3 \times 3$, dimensions are changed from (16 × 7 ×
    7) to (32 × 7 × 7).

    - **UL:** Unrolling changes its input from (32 × 7 × 7) to (1568 × 1 × 1).

    - **ANN:** This has one fully connected layer and output size of (C × 1 × 1),
    where C is the number of unique characters to be identified by the CNN.


    **Figure 8.1** Essential information for OCR applications in MNIST website: (a)
    sample images of digits and (b) CNNs outperform all other OCR classifiers. Adapted
    from [77].


    | Classifier type | Best test error rate |

    | :--- | :--- |

    | Linear | 7.6 % |

    | K-Nearest Neighbors | 0.52 % |

    | Boosted Stumps | 0.87 % |

    | Non-Linear | 3.3 % |

    | SVM | 0.56 % |

    | ANN | 0.35 % |

    | CNN | 0.23 % |


    **Figure 8.3** Image dimensions as it is processed through CNN layers: An input
    image with size (1 × 28 × 28) is fed to CNN; first CL changes size to (8 × 28
    × 28), the first PL to (8 × 14 × 14), the second CL to (16 × 14 × 14), the second
    PL to (16 × 7 × 7), the third CL to (32 × 7 × 7), and UL to (1568 × 1 × 1) before
    feeding it to the ANN.


    ## 8.3 Organization of Training and Reference Files


    Before introducing the scripts implementing a CNN, let us present a folder structure
    to store the files used in training and prediction. Note that this organization
    is only meant to be illustrative and may not be followed verbatim. Suppose we
    create two folders, named `TrainingSet` and `ReferenceSet`, to hold training and
    reference images, respectively.


    - `TrainingSet`: This folder stores the image files used for training the CNN.
    There is one sub-folder for each distinct character to be identified by the CNN.
    For an output layer with dimensions of C × 1 × 1, there are C sub-folders below
    the `TrainingSet` folder, one for each output character. In each sub-folder, there
    are image files to be used in training the CNN for recognizing that particular
    image. An example for the `TrainingSet` folder is shown in Figure 8.4, with five
    distinct images to be recognized by the CNN, named as `eleven`, `seven`, `six`,
    `umlaut`, and `w`. For example, in sub-folder `six`, we see that there are five
    different images to be used in training the CNN for this output, stored in files
    `six_1.png` to `six_5.png`.

    - `ReferenceSet`: Files under this folder contain the official (i.e. reference)
    images to be displayed to a user after the CNN identifies an input image. It contains
    the same number of sub-folders as `TrainingSet`, which is the number of outputs
    defined for the CNN. For simplicity, we assumed that both folders have the same
    sub-folder names. When the CNN identifies that an input image belongs to one of
    the images in sub-folder F in `TrainingSet`, the corresponding image in sub-folder
    F under `ReferenceSet` will be displayed to the user.'
  mdcn: '## 7.7 结语


    本章介绍了卷积神经网络（CNN）的主要概念，这些网络在识别图像和语音等多维输入方面表现出色。典型的CNN由卷积层、池化层和展平层、线性整流单元以及一个全连接的人工神经网络（ANN）组成。使用不同类型层的主要目的是降低输入的高维度。每一层通过滤波器尺寸的平方量级来减小输入图像的尺寸。根据所需的精度水平，会使用多个层。


    通常，训练CNN需要大量的运算。在选择滤波器尺寸、滤波器数量、CL-PL对的数量以及ANN架构时，必须考虑其对训练成本的影响。强烈建议使用嵌入等技术，将训练的计算成本控制在可行的范围内。


    ## 7.8 第7章习题


    1) 讨论增加CL-PL对数量对CNN训练和性能的影响。

    2) 讨论使用大尺寸滤波器对CNN训练和性能的影响。

    3) 讨论使用小尺寸滤波器对CNN训练和性能的影响。

    4) 讨论使用具有大量隐藏层的ANN对CNN训练和性能的影响。

    5) 习题1和习题2中建议的改变共同作用，将如何影响CNN的训练和性能？你能否通过推导信息在CNN中处理时的矩阵大小来支持你的答案？

    6) 针对习题1和习题3中建议的改变，重复习题5。

    7) 针对习题1和习题4中建议的改变，重复习题5。

    8) 针对习题2和习题4中建议的改变，重复习题5。


    # 8 用于光学字符识别的CNN


    ## 8.1 引言


    光学字符识别（OCR）是将手写、打字或印刷文本的图像数字化并识别的过程[78]。OCR应用的一个典型例子是邮政自动化，其中信件和包裹根据其手写或打印的地址和标签进行分类。OCR允许计算机自动识别和处理地址，而无需手动阅读并将每封信的地址输入计算机。OCR的其他应用包括捕获车牌号码、将物理文档转换为可编辑的文本文档，以及为盲人和视力障碍者提供辅助。用于OCR的一个流行信息源是MNIST数据集[79]。它包含70,000张灰度图像，这些图像是0到9的手写数字。每个数字存储为一个（28
    × 28）像素的图像。该数据集分为60,000个训练样本和10,000个测试样本。图8.1a展示了MNIST数据集中的几个示例[80]。MNIST网站包含了在该数据集上训练的各种分类方法的性能。MNIST网站报告称，目前CNN在字符识别应用中的性能优于所有其他分类器。图8.1b列出了每个分类器对应的最低错误率。


    ## 8.2 用于OCR的简单CNN


    在本章中，我们介绍一个用于实现简单OCR任务的CNN，即识别几个手写字符。本例中的CNN读取一个大小为（1 × 28 × 28）的手绘灰度图像，并将输入字符识别为其存储的参考图像之一。使用多个连续的CL–PL对来提高CNN的预测能力（图8.2）。有三个卷积层（CL），在三个CL中分别使用$F_{cl}
    = 8$、16和32个滤波器，每个滤波器的大小为$f_{cl} = 3 \times 3$。有三个RELU单元和两个池化层（PL），每个池化层的池化大小为$p
    = 2$，步幅为$s_{pl} = 2$。ANN的输出也构成了CNN的输出层。ANN的输出数量是CNN训练时所识别的不同字符的数量。根据输入到CNN的图像，这些CNN输出中只有一个会被设置为$true$（即CNN预测为与输入图像正确匹配的那个输出），而其他输出将被设置为$false$。现在让我们检查一下在这个例子中，输入图像经过CNN各层时的尺寸变化（图8.3）。使用第7章中给出的公式（7.1）、（7.2）和（7.3），我们有：


    - **输入：** 图像尺寸为（1 × 28 × 28）。

    - **第1个CL：** 使用$F_{cl} = 8$个滤波器，每个大小为$f_{cl} = 3 \times 3$，尺寸从（1 × 28 × 28）变为（8
    × 28 × 28）。

    - **第1个PL：** 使用池化大小$p = 2$和步幅$s_{pl} = 2$，尺寸从（8 × 28 × 28）减小到（8 × 14 × 14）。

    - **第2个CL：** 使用$F_{cl} = 16$个滤波器（即前一个数量的两倍），每个大小为$f_{cl} = 3 \times 3$，尺寸从（8 ×
    14 × 14）变为（16 × 14 × 14）。

    - **第2个PL：** 使用池化大小$p = 2$和步幅$s_{pl} = 2$，尺寸从（16 × 14 × 14）减小到（16 × 7 × 7）。

    - **第3个CL：** 使用$F_{cl} = 32$个滤波器（即前一个数量的两倍），每个大小为$f_{cl} = 3 \times 3$，尺寸从（16
    × 7 × 7）变为（32 × 7 × 7）。

    - **展平层（UL）：** 展平操作将其输入从（32 × 7 × 7）变为（1568 × 1 × 1）。

    - **ANN：** 这是一个全连接层，输出尺寸为（C × 1 × 1），其中C是CNN要识别的唯一字符的数量。


    **图8.1** MNIST网站上OCR应用的基本信息：(a) 数字样本图像，(b) CNN优于所有其他OCR分类器。改编自[77]。


    | 分类器类型 | 最佳测试错误率 |

    | :--- | :--- |

    | 线性 | 7.6 % |

    | K-近邻 | 0.52 % |

    | 提升决策桩 | 0.87 % |

    | 非线性 | 3.3 % |

    | 支持向量机 | 0.56 % |

    | 人工神经网络 | 0.35 % |

    | 卷积神经网络 | 0.23 % |


    **图8.3** 图像在CNN层中处理时的尺寸变化：一个大小为（1 × 28 × 28）的输入图像被送入CNN；第一个CL将其尺寸变为（8 × 28 × 28），第一个PL变为（8
    × 14 × 14），第二个CL变为（16 × 14 × 14），第二个PL变为（16 × 7 × 7），第三个CL变为（32 × 7 × 7），展平层变为（1568
    × 1 × 1），然后才送入ANN。


    ## 8.3 训练和参考文件的组织


    在介绍实现CNN的脚本之前，让我们先介绍一个用于存储训练和预测所用文件的文件夹结构。请注意，此组织结构仅为示例，不一定需要完全照搬。假设我们创建两个文件夹，分别命名为`TrainingSet`和`ReferenceSet`，用于存放训练图像和参考图像。


    - `TrainingSet`：此文件夹存储用于训练CNN的图像文件。对于CNN要识别的每个不同字符，都有一个子文件夹。对于一个尺寸为C × 1 × 1的输出层，`TrainingSet`文件夹下有C个子文件夹，每个输出字符对应一个。在每个子文件夹中，都有用于训练CNN识别该特定图像的图像文件。图8.4展示了`TrainingSet`文件夹的一个示例，其中有五个CNN要识别的不同图像，分别命名为`eleven`、`seven`、`six`、`umlaut`和`w`。例如，在子文件夹`six`中，我们可以看到有五个不同的图像用于训练CNN识别该输出，存储在文件`six_1.png`到`six_5.png`中。

    - `ReferenceSet`：此文件夹下的文件包含官方（即参考）图像，这些图像将在CNN识别输入图像后显示给用户。它包含与`TrainingSet`相同数量的子文件夹，即CNN定义的输出数量。为简单起见，我们假设两个文件夹具有相同的子文件夹名称。当CNN识别出输入图像属于`TrainingSet`中子文件夹F中的某个图像时，`ReferenceSet`中子文件夹F下的相应图像将显示给用户。'

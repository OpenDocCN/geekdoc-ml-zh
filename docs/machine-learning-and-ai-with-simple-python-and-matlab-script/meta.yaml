    # 10.6 Concluding Remarks


    In this chapter, we introduced RNNs, which are powerful tools that capture complex
    relations among elements of input sample data for realistic applications such
    as chatbots or machine translation. The main strength of RNNs stems from the fact
    that, through their hidden states, they retain information generated at earlier
    steps from previously applied inputs. This capability enables a form of memory
    generated by earlier inputs and makes RNNs excellent candidates to handle sequence-based
    information. Another important feature of RNNs is that they can process variable-length
    input sequences thanks to the recursive nature of hidden states, which is presented
    in Chapter 11 implementing a simple chatbot using a many-to-many RNN.


    With the help of a simplistic example, we provided step-by-step descriptions for
    RNN training operations, namely obtaining gradients of a loss function with respect
    to partial derivatives of its parameters and mechanisms for updating weight matrices
    during forward- and back-propagation training steps. We examined the impact of
    embedding layers as a means of reducing input data dimensions to reduce the computational
    cost of the training process. However, due to their ability to deal with sequences
    of inputs, an output at each step needs the information from earlier steps, which
    disqualifies RNNs from operating in parallelized fashion and, hence, makes them
    computationally inefficient.


    Although very useful for modelling sequences, other significant disadvantages
    of RNNs are so-called vanishing and exploding gradient problems, which lead to
    long-term memory problems in RNNs [95]. A vanishing gradient problem is observed
    when the element values in weight matrices become so small that learning either
    becomes very slow or stops altogether. Conversely, if weight values become large,
    they can create divergent solutions over a search space, which is referred to
    as an exploding gradient problem. Different modifications for RNNs have been proposed
    to handle such situations, including LSTMs [8], transformers [9] and attention
    mechanisms [96]. The reader is encouraged to study these solutions after digesting
    the materials provided in Chapters 10, 11, 12 and 13 of this book.



    \ - 它们是：\n% 北、东北、东、东南、南、西南、西、西北\n% 我们可以用染色体的最低有效位3位进行编码：\n%     [x, x, 0,0,0]\
    \ = 北     [x, x, 0,0,1] = 东北\n%     [x, x, 0,1,0] = 东      [x, x, 0,1,1] = 东南\n\

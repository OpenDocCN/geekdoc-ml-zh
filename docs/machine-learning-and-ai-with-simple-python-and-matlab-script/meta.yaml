  md: 'computation cost required for training the CNN and enable inclusion of a wide
    variety of inputs into its training set.


    As shown in Figure 9.2, our example CNN for speech recognition consists of four
    CL–PL pairs, one single CL and five ReLU entities. The fourth and final PL feeds
    into a fully-connected ANN through a UL. There are $L$ outputs for the ANN, which
    correspond to the number of unique words that the CNN was trained on. Only one
    of those ANN $L$ outputs will be selected as $true$ for a given input spectrogram,
    while the remaining outputs will be $false$. The ANN outputs are also the outputs
    of the CNN. If a $softmax$ layer is adopted [85], the CNN outputs will be converted
    to probabilities rather than selecting one out of the $L$ outputs. The dimensions
    of an input spectrogram change as it is processed through the various layers of
    a CNN. Using Eqs. (7.1) – (7.3) presented in Chapter 7, and employing zero padding
    in the CLs, the dimensions change at each CNN layer as follows (Figure 9.3):


    ![](img/a83d807f9a9119b1472555c0ef55797e_156_0.png)


    **Figure 9.3** Spectrogram dimensions as it is processed through CNN layers: The
    input image size of ($1 \times 40 \times 198$) is fed into CNN; first CL changes
    the image size to ($12 \times 40 \times 198$), the first PL to ($12 \times 20
    \times 99$), the second CL to ($24 \times 20 \times 99$), the second PL to ($24
    \times 10 \times 50$), the third CL to ($48 \times 10 \times 50$), the third PL
    to ($48 \times 5 \times 25$), the fourth and fifth CLs to ($48 \times 5 \times
    25$), the fourth PL to ($48 \times 5 \times 13$) and the UL to ($3, 120 \times
    1 \times 1$) before feeding to the ANN.'

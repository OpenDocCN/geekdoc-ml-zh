    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) x_k \right). \quad (D.21)$$


    以相同方式继续，$L$ 关于 $b$ 的梯度可类似公式 (D.19) 计算如下：


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} \frac{\partial
    L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \left( \prod_{j=k}^{t-1}
    \frac{\partial h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial b}
    \right). \quad (D.22)$$



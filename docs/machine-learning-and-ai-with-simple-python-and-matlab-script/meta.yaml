    # 13 用于机器翻译的带注意力的 RNN


    ## 13.1 引言


    在本章中，我们介绍一个使用带注意力机制的 RNN 进行机器翻译的简单例子。如第 12 章所讨论的，对于在翻译中记住先前单词生成的隐藏状态很重要的应用，我们需要注意力机制。


    在自然语言中，句子中主语、动词、介词和时态信息的位置因语言而异。例如，如果想用波兰语说“天空只被我看见”，应该是“Niebo oglądam tylko ja”。然而，“天空只被你看见”这句话翻译成波兰语是“Niebo
    oglądasz tylko ty”。如图 13.1a 和 b 所示，这个句子的波兰语翻译只有在用户输入最后一个英语单词（第一句中的 me 或第二句中的 you）后才能确定。输入最后一个单词
    me 会导致波兰语翻译中包含单词 oglądam 和 ja，而最后一个单词 you 则会将单词 oglądasz 和 ty 放入波兰语句子中。


    从图 13.1 中观察到的另一个差异是英语输入句子和波兰语输出句子中的单词数量不同。如第 11 章第 11.4 节所述，处理不同长度的输入和输出序列的一个流行解决方案是采用填充技术，即为较短的序列插入空白字符，以使所有输入和输出看起来长度相等。


    这个例子清楚地说明，在机器翻译等应用中，输入序列末尾的一个单词有可能完全改变预测输出，这就需要在每一步都保持先前的隐藏状态可用。此外，在翻译中，输入序列可能生成长度不同的输出序列。这些特性表明，对于像机器翻译这样的应用类别，我们需要采用多对多
    RNN-Att。由于样本数量庞大，且每个样本都有一个大词典，通常使用具有多个隐藏层和嵌入层的 RNN-Att 架构。


    在本章中，我们展示了一个机器翻译示例，其中实现了一个简化的、具有隐藏层和嵌入层的多对多 RNN-Att，用于将句子从德语翻译成英语。由于篇幅限制，我们使用了一个包含
    3000 个翻译样本的小型数据集，总共有 1576 个德语单词和 896 个英语单词。翻译器的 Python 和 Matlab 实现分别在第 13.3 节和第
    13.4 节中介绍。'

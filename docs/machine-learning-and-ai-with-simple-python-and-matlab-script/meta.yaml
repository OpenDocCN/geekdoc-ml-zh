    # 10.5 Embedding Layer


    Earlier in this chapter, we introduced one-hot encoding as a method for converting
    input characters to numerical representations in an RNN implementation. However,
    there are serious drawbacks in'
- md: 'using one-hot encoding and methods similar to it in terms of the size of the
    input vectors. In one-hot encoding, for each input character $x_t^o$, the input
    vector size is $(|I| \times 1)$ for an alphabet size of $|I|$, in which only a
    single element is set to one (i.e. one element is hot) and the remaining elements
    are all zeros. Recall that, in the example presented in Section 10.2.1, we defined
    one-hot encoding for input $\mathbf{h}$ as $\mathbf{h}^o = [1, 0, 0, 0]^\dagger$,
    where $\dagger$ represents the matrix transpose operation. However, if we were
    to use a realistic dictionary with tens of thousands of elements, it is clear
    that one-hot encoding would have generated infeasibly large input vectors. For
    these situations, to reduce the input vector size, we utilize embedding layers
    [94] at the front end of the RNN. The main goal of an embedding layer is to convert
    sparse input vectors (e.g. one-hot encoded words or characters) into dense vectors
    through matrix manipulations so that the computational complexity of RNN training
    is significantly reduced. For an embedding layer, we define a weight matrix, called
    $E$, with dimensions of $(e \times |I|)$, where $e$ and $|I|$ are the embedding
    width (sometimes referred to as embedding size) and the alphabet size, respectively.
    A one-hot-encoded input element $x_t^o$ is multiplied by the embedding matrix
    $E$ before being applied to the RNN encoder as $x_t = E \cdot x_t^o$. We can see
    from this equation that, for an input $x_t^o$ with dimensions of $(|I| \times
    1)$, multiplication by $E$ will result in an input vector $x_t$ whose dimensions
    are reduced to $(e \times 1)$. As an example, suppose we have $x_t^o$ and the
    elements of $E$ given as follows:


    $$x_t^o = \mathbf{h}^o = \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix}, \quad
    E = \begin{bmatrix} 0.8 & -0.3 & 0.1 & -0.1 \\ 0.4 & -0.4 & 0.1 & -0.5 \end{bmatrix}.$$


    Implementing an embedding layer reduces the $x_t^o$ dimensions when applied to
    the RNN encoder as follows:


    $$x_t = E \cdot x_t^o = \begin{bmatrix} 0.8 & -0.3 & 0.1 & -0.1 \\ 0.4 & -0.4
    & 0.1 & -0.5 \end{bmatrix} \cdot \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.8 \\ 0.4 \end{bmatrix}.$$


    Figure 10.7 presents a one-to-one single-cell RNN with an embedding layer of size
    2. Comparing the dimensions of the weights in Figure 10.7 with the example RNN
    without an embedding layer in Figure 10.6, we can clearly see the reduced dimensions
    in weight matrices due to embedding.


    In the general case, using an alphabet size of $|I|$ and $\mathcal{N}$ hidden
    layers in a one-to-one RNN with an embedding layer size of $|I| \times e$, parameter
    matrix dimensions are shaped as follows:


    - **Embedding:** $X^o : (|I| \times 1)$, $E : (e \times |I|)$

    - **Encoder:** $X : (e \times 1)$, $U : (\mathcal{N} \times e)$, $W : (\mathcal{N}
    \times \mathcal{N})$, $b : (\mathcal{N} \times 1)$, $H : (\mathcal{N} \times 1)$

    - **Decoder:** $V : (|I| \times \mathcal{N})$, $c : (|I| \times 1)$, $\Omega :
    (|I| \times 1)$

    - **Output:** $\hat{Y} : (|I| \times 1)$


    In the example shown in Figure 10.7, we have $|I| = 4$ and $\mathcal{N} = 2$.
    Selection of embedding layer width is based on user preference and depends on
    the characteristics of a given problem. For applications operating in or near
    real time with conditions changing rapidly, smaller embedding sizes are acceptable,
    whereas applications requiring less frequent training may employ larger widths.
    When an embedding layer is utilized in an RNN, the elements of the weight matrix
    $E$ are trained during the forward and back propagation processes just like the
    other RNN weight matrices, which is described next in Section 10.5.1.


    ![Figure 10.7](img/a83d807f9a9119b1472555c0ef55797e_188_0.png)


    **Figure 10.7** Vector dimensions in a one-to-one RNN with one embedding layer
    and one hidden layer.


    ## 10.5.1 Forward and Back Propagation with Embedding


    Let us now examine the impact of implementing an embedding layer on RNN operations
    during the forward and back propagation processes. The first step in forward propagation
    is the application of the $E$ matrix to the one-hot-encoded input elements:


    $x_t = E \cdot x_t^o$. (10.20)


    After one-hot-encoded input $x_t^o$ is converted to a dense vector $x_t$ by multiplying
    it by the embedding weight matrix of $E$, the forward propagation process described
    by Eqs. (10.3)–(10.7) given in Section 10.2.2 remain valid for an RNN with an
    embedding layer. Similarly, back propagation operations and partial derivatives
    of $L$ with respect to the RNN weight matrices presented by Eqs. (10.8)–(10.13)
    are the same with an embedding layer. However, since we now have an additional
    parameter of weight matrix $E$, we need to compute the partial derivative of $L$
    with respect to $E$ as follows (detailed steps for obtaining this formula are
    presented in Appendix D):


    $\frac{\partial L}{\partial E} = \sum_{t=1}^{S} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) U x_k^o \right)$. (10.21)


    Eqs. (10.14)–(10.15) given in Section 10.2.2 show how to update the RNN parameters
    with a learning rate $\eta$ after a back propagation is complete. For an RNN with
    an embedding layer, we need to add a similar equation for updating $E$ as follows:


    $$E = E - \eta \frac{\partial L}{\partial E}$$


    ## 10.5.2 A Numerical Example with Embedding


    In this section we present a step-by-step description of operations for one epoch
    of training of an RNN employing an embedding layer. We will use the same simple
    example from Section 10.2.1, whose inputs and outputs are given in Table 10.1.
    Suppose the network parameters are randomly initialized as follows:


    $$E = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix}$$

    $$U = [0.144 \quad -0.232]$$

    $$W = [-0.535]$$

    $$b = [0]$$

    $$V = [0.695 \quad -0.440 \quad -0.225 \quad -0.305]^\dagger$$

    $$c = [0 \quad 0 \quad 0 \quad 0]^\dagger$$


    At step $t_1$, for input $x_1 = \mathbf{h}$, we generate prediction $\hat{y}_1$
    as follows:


    $$x_1 = E \cdot x_1^o = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461
    & -0.482 & 0.154 & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0
    \end{bmatrix} = \begin{bmatrix} 0.818 \\ 0.461 \end{bmatrix}$$


    $$h_1 = \tanh(U \cdot x_1 + W \cdot h_0 + b)$$

    $$= \tanh\left([0.144 \quad -0.232] \cdot \begin{bmatrix} 0.818 \\ 0.461 \end{bmatrix}
    + [-0.535] \cdot [0] + [0]\right) = [0.011]$$


    $$\Omega_1 = V \cdot h_1 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225 \\ -0.305
    \end{bmatrix} \cdot [0.011] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.008 \\ -0.005 \\ -0.003 \\ -0.003 \end{bmatrix}$$


    $$\hat{y}_1 = \Theta_y(\Omega_1) = softmax(\Omega_1) = \begin{bmatrix} 0.252 \\
    0.249 \\ 0.250 \\ 0.249 \end{bmatrix}$$


    The highest value of $softmax$ shows that, for input $x_1 = \mathbf{h}$, the prediction
    is $\hat{y}_1 = \mathbf{h}$, whereas the expected output is $y_1^o = \mathbf{e}$.
    The loss $L_1$ is


    $$L_1 = -y_1^o \ln(\hat{y}_1) = -\begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.252 \\ 0.249 \\ 0.250 \\ 0.249 \end{bmatrix} = 1.390$$


    Continuing with step $t = 2$, for input $x_2 = \mathbf{e}$, we compute $\hat{y}_2$
    as follows:


    $$x_2 = E \cdot x_2^o = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461
    & -0.482 & 0.154 & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0
    \end{bmatrix} = \begin{bmatrix} -0.360 \\ -0.482 \end{bmatrix}$$


    $$h_2 = \tanh(U \cdot x_2 + W \cdot h_1 + b)$$

    $$= \tanh\left([0.144 \quad -0.232] \cdot \begin{bmatrix} -0.360 \\ -0.482 \end{bmatrix}
    + [-0.535] \cdot [0.011] + [0]\right) = [0.054]$$


    $$\Omega_2 = V \cdot h_2 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225 \\ -0.305
    \end{bmatrix} \cdot [0.054] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.037 \\ -0.024 \\ -0.012 \\ -0.016 \end{bmatrix}$$


    $$\hat{y}_2 = \Theta_y(\Omega_2) = softmax(\Omega_2) = \begin{bmatrix} 0.260 \\
    0.245 \\ 0.248 \\ 0.247 \end{bmatrix}$$


    Based on the $softmax$ unit, for input $x_2 = \mathbf{e}$, the RNN with embedding
    predicts that $\hat{y}_2 = \mathbf{h}$, whereas the expected output is $y_2^o
    = 1$. The loss is


    $$L_2 = -y_2^o \ln(\hat{y}_2) = -\begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.260 \\ 0.245 \\ 0.248 \\ 0.247 \end{bmatrix} = 1.395$$


    At step $t = 3$, we continue with input $x_3 = 1$ and compute $\hat{y}_3$ as follows:


    $$x_3 = E \cdot x_3^o = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461
    & -0.482 & 0.154 & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0
    \end{bmatrix} = \begin{bmatrix} 0.127 \\ 0.154 \end{bmatrix}$$



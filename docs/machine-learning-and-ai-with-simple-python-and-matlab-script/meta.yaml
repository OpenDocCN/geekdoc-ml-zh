    Particle swarm optimization (PSO) is an SAI optimization technique inspired by
    social and collective behaviour observed in nature, such as bird flocking and
    fish schooling. It was developed as a tool for solving problems in which the best
    solution can be represented as a point in the space [105]. PSO is a robust stochastic
    optimization technique based on the movement and intelligence of swarms. PSO implements
    social interaction principles to solve multi-dimensional optimization problems.
    In PSO, if one of the individuals finds a good solution, the remaining individuals
    make use of that knowledge.


    PSO is a multi-agent parallel search method where each particle flying over a
    search space adjusts its flight path based on its own experience (i.e. historical
    data) as well as the experiences of other particles. At a given time $t$, a particle
    $j$, with a position $P_j^t$ and velocity $V(t)$, keeps track of the best fitness
    it has achieved so far individually (called $P_j^{best}$) and the best value global
    value obtained so far by the swarm overall (called $G^{best}$). Let $P_j^{g+1}$
    be the new position for particle $j$ and $P_j^g$ be its current position. We evolve
    the speed for particle $j$ as


    $V_{g+1} = w V_g + C_1 R_1 (P_j^{best} - P_j^g) + C_2 R_2 (G^{best} - P_j^g)$


    where $V_{g+1}$ and $V_g$ are the new and current speeds for particle $j$, respectively,
    and $w$ is a real number in $[0, 1]$ and is a weight factor for inertia. Real
    numbers $C_1$ and $C_2$ are in $[0, 4]$, and the real numbers $R_1$ and $R_2$
    are in $[0, 1]$.


    In Eq. (18.1), the momentum of a particle $j$ is controlled by $w$ as a trade-off
    between a particle''s previous experience and the overall swarm experience. For
    $w = 0$, particle $j$ does not consider any of its previous knowledge, whereas
    $w = 1$ implies that particles do not easily change their directions. In velocity
    updates, $R_1$ influences $P_j^{best}$, while $R_2$ impacts $G^{best}$. For contribution
    of experience to the search, $C_1$ represents self-confidence of a particle and
    $C_2$ indicates the particle''s confidence in the motion of the entire swarm.
    The new position of $j$ is defined as $P_j^{g+1} = P_j^g + V_{g+1}$. The personal
    and global best fitness values are updated if the new position of particle $j$
    has a better fitness. Regardless of its fitness, particle $j$ moves to the new
    location.


    # Variations of PSO


    There are several different types of PSO algorithms that have been developed in
    order to address a diverse range of engineering applications. One commonly use
    swarm optimization method, called discrete PSO (DPSO), solves combinatorial optimization
    problems over a discrete-valued search space [135]. In this algorithm, the position
    and velocity of each particle are denoted by discrete values that could be real
    numbers or integers. Another version of the PSO algorithm, called neighbourhood
    search PSO (NSPSO), considers both local neighbours and the global swarm to find
    its trial solutions. In NSPSO, a particle first explores the local neighbourhood
    of each of its neighbours before considering the global solution space [136].
    In a different variation, called neighbourhood guaranteed convergence PSO (GCPSO),
    the structure of social networks is implemented by preserving the diversity within
    the swarm where a distance limit is applied when finding the best next positions
    [137].


    # 18.2.1 Applications of PSO


    PSO can be easily adopted to solve a diverse range of engineering problems. For
    example, it has been popular for solving maintenance and path discovery types
    of applications in communication and computer networks, especially for power constrained
    mobile nodes. PSO can minimize the communication cost by obtaining optimal or
    near-optimal transmission paths while considering'

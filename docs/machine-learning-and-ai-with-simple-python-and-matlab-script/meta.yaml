    size of p and stride of s_pl generates F_cl matrices, each with the size of


    $$\left( \frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right) \times
    \left( \frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right)$$


    Pooling size p is typically selected such that w_i and h_i are divisible by p.
    Stride s_pl is set as s_pl = p so that there is no overlap between different pooling
    regions. For s_cl = 1, as shown in Figure 7.18,


    ![](img/a83d807f9a9119b1472555c0ef55797e_130_1.png)'

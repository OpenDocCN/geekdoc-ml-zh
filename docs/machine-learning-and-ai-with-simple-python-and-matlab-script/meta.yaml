  md: 'by SMA, and it is much easier to detect trends over time on an SMA curve. Calculation
    of an $n$-day SMA on day $t$ is defined as


    $$\text{EMA}(t) = \frac{1}{n} \sum_{i=0}^{n-1} \text{price}(t-i),$$


    where the price of a stock is averaged over the last $n$ days. For example, a
    30-day SMA of a stock for a given day $t$ is the sum of the closing prices from
    day $t$ to day $(t-30)$ divided by 30. The SMA can be computed for any of the
    financial features of a security (e.g., SMA of opening, closing, maximum or minimum
    price or daily volume).


    # 4.3.2 Momentum


    The rate of change in a financial asset feature (e.g., price or volume) over a
    given time interval is defined as the momentum. This metric is used to determine
    the strength of a trend for a given stock over a selected time period. The momentum
    of two separate points in time is the slope of a line that connects them. Calculation
    of momentum on day $t$ over a period of $n$ days is defined as:


    $$M(t) = \frac{\text{price}(t)}{\text{price}(t-n)},$$


    where $M(t)$ is the momentum at day $t$. Selecting the most appropriate period
    of $n$ days to compute momentum for a given financial asset is an important decision
    for a financial professional since it may give different trends for short, medium
    or large intervals.


    A 10-day momentum is shown for the S&P 500 Index in Figure 4.3 (taken from [46]).
    If the most recent closing price of the index is more than the closing price 10
    trading days ago (i.e., $M(t) > 1$), a positive number is plotted above the zero
    line. Similarly, if the latest closing price is lower than what it was 10 days
    ago (i.e., $M(t) < 1$), a negative measurement is plotted below the zero line.
    The zero line represents the index that does not exhibit a trend.


    ![](img/a83d807f9a9119b1472555c0ef55797e_74_0.png)


    **Figure 4.3** Momentum of price movements of S&P 500 Index (taken from [46]).'

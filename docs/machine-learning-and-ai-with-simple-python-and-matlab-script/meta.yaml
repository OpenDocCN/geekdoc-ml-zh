    \ file name (do not forget .mat extension): ',...\n        's');\n    save(file_name,\
    \ 'cnn_trained');\nelse\nend\ndisp('Have a predictably nice day!');\n```\n\n下面展示了一个`CNN_Predict`函数的示例实现，该函数通过训练好的CNN生成预测。此函数的输入包括录制的用户输入、数据采样率、训练好的CNN对象以及TrainingSet文件夹的地址。在第18-22行设置音频参数后，在第26-29行为用户输入的音频计算频谱图，并保存在`X_test`对象中。使用训练好的CNN，在第31行为此输入生成预测：\n\
    \n```\npredictions = model.predict(X_test)\n```\n\n其中名为`predictions`的对象包含所有CNN输出的概率。在第32行获取具有最大概率的输出的索引：\n\
    \n```\npredicted_class = np.argmax(predictions, axis=1)[0]\n```\n\n然后使用该索引来选择TrainingSet文件夹中的音频文件。\n\
    \n```\nimport os\nimport numpy as np\nimport soundfile as sf\nfrom Speech_Spectrograms\
    \ import speech_spectrograms\n\n# CNN_Predict: Use CNN to predict the word\ndef\
    \ CNN_Predict(rec_data, sample_rate, model, audio_files):\n\n    # Save audio\
    \ data to a temporary file\n    temp_file = \"temp.wav\"\n    sf.write(temp_file,\
    \ rec_data, sample_rate)\n\n    # Compute the mel-spectrogram from the audio data\n\
    \    # set audio parameters\n    # Duration of the entire recording\n    segment_duration\
    \ = len(rec_data) / sample_rate\n    frame_duration = 0.025\n    hop_duration\
    \ = 0.010\n    num_bands = 40\n    epsil = 1e-6\n\n    # compute speech spectrograms,\
    \ they will be the inputs\n    # to the CNN\n    X_test = speech_spectrograms([temp_file],\
    \ segment_duration,\n                                frame_duration, hop_duration,\
    \ num_bands)\n    X_test = np.log10(X_test + epsil)\n    X_test = np.expand_dims(X_test,\
    \ axis=-1)\n    # Use the model to predict the class\n    predictions = model.predict(X_test)\n\
    \    predicted_class = np.argmax(predictions, axis=1)[0]\n\n    # Delete the temporary\
    \ file\n    os.remove(temp_file)\n\n    return audio_files[predicted_class]\n\
    ```\n\n下面给出了`speech_spectrograms`函数的一个Python示例实现，该函数计算音频文件的频谱图。此函数的输入参数包括存储音频文件的文件夹地址以及音频文件的特性，例如音频录制中使用的片段和帧时长。\n\
    \n```\nimport librosa\nimport numpy as np\n\ndef speech_spectrograms(files, segment_duration,\
    \ frame_duration,\n                        hop_duration, num_bands, sr=16000):\n\
    \    print(\"Computing speech spectrograms...\")\n\n    hop_length = int(hop_duration\
    \ * sr)\n\n    all_spectrograms = []\n\n    # 1. Calculate the spectrograms for\
    \ all files\n    for file in files:\n        y, _ = librosa.load(file, sr=sr)\n\
    \        mel_spec = librosa.feature.melspectrogram(y=y, sr=sr, n_fft=512,\n  \
    \                                                hop_length=hop_length, n_mels=num_bands)\n\
    \        all_spectrograms.append(mel_spec)\n\n    # 2. Determine the maximum width\
    \ among all spectrograms\n    max_width = 419\n\n    final_spectrograms = []\n\
    \n    # 3. Pad each spectrogram to the maximum width\n    for i, mel_spec in enumerate(all_spectrograms):\n\
    \        spec_width = mel_spec.shape[1]\n        left = (max_width - spec_width)\

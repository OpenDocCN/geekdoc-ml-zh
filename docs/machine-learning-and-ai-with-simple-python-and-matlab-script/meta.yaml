    the network parameters for this simple RNN-Att are initialized randomly as follows:


    $$U = [0.144 \ -0.232 \ -0.669 \ 1.159], \ W = [-0.587], \ b = [0]$$


    $$V = \begin{bmatrix} -0.225 \ -0.305 \ 0.491 \ 0.277 \end{bmatrix}, \ c = \begin{bmatrix}
    0 \ 0 \ 0 \ 0 \end{bmatrix}.$$'

- md: '## 14.3 A Simple Algorithm for a GA


    Let us now present the basic operations of a GA as shown in Figure 14.2:


    - **Evaluation**: Goodness of each individual is assessed by a fitness function,
    which assigns a numeric value for quantitative comparison of individuals.

    - **Selection**: Based on a predetermined criteria, parents are selected to generate
    offspring (typically giving preference to better-performing individuals).

    - **Reproduction**: Using the selected parents, offspring are generated and their
    fitness is evaluated.

    - **Replacement**: Children fitter than existing members of a population replace
    those less-performing individuals as a new generation is formed.


    In Figure 14.3 we present pseudo-code for implementing a simple GA [108]. First,
    an initial population of candidate solutions is formed, where chromosome values
    are set randomly. Then the fitness of each individual is computed. Based on fitness,
    parents are selected and offspring are formed by crossover and mutation operations.
    Finally, offspring are evaluated for their possible inclusion in the next generation.


    This process is repeated for a predetermined number of iterations or until a satisfactory
    solution is found. Every time better-performing offspring are included in a population,
    it is said that a new generation is formed. There are several mechanisms to select
    offspring as part of a new generation. The most popular selection mechanisms include
    roulette wheel selection, where the fitness level of a chromosome is indicative
    of its chance of being selected as a parent for the next generation, and elitist
    selection, in which the fittest individuals are advanced to the next generation
    without modification, while typically keeping the ratio of the elite group to
    the population size small.


    The Single-point crossover operation is popular in generating offspring out of
    two parent chromosomes, where one pivotal point bit is randomly selected in both
    parents, and the data between parent chromosomes are swapped around this bit.
    To perform a single-point crossover between two parents, each with a chromosome
    length of K bits, first a random integer CR ∈ (0, K − 1) is selected. The first
    child is created by taking the most significant CR bits from parent 1 and the
    least significant (K – CR) bits from parent 2. A second child is created by taking
    the most significant CR bits from parent 2 and the least significant (K – CR)
    bits from parent 1. In the example shown in Figure 14.4, a single-point crossover
    is performed for CR = 2 for two parents, each with six-bit chromosomes, where
    child 1 has the top two bits from parent 2 and the lower four bits from parent
    1, whereas child 2 receives its top two bits from parent 1 and the remaining ones
    from parent 2.


    In different GA realizations, crossover operation can be implemented using multiple
    points or with more than two parents. For example, in a *two-point crossover*
    with two parents, two points, CR₁ and CR₂, are randomly selected to swap the parent
    chromosomes. Figure 14.5 shows an example for a two-point crossover with CR₁ =
    2 and CR₂ = 4. Compared to single-point crossover, two-point crossover is preferable
    to keep a population with a diverse set of individuals for more effective exploration
    of a search space.


    Mutation is defined as a genetic operation that randomly changes one or more bits
    in a chromosome. With a small probability or using a predefined probability distribution
    model (e.g. Gaussian), mutation introduces diversity into a population so that
    candidates do not get stuck at local extreme points but instead fully explore
    a search space for global extreme points.


    ## 14.4 An Example of a GA


    Let us now present a simplistic example illustrating the basic steps of a GA.
    In Figure 14.6, we see a population of 8 individuals, whose chromosomes consist
    of 12 codons. In step 1, an initial population of individuals with randomly selected
    codon values is formed. In step 2, the fitness of each individual is computed,
    which is symbolically represented as a dollar sign. In this illustration, we assumed
    that the more dollar signs an individual has, the fitter it is. In step 3, the
    two fittest individuals are selected as parents. In typical applications, multiple
    pairs of parents may be selected to generate multiple children at each generation.
    For example, 20% of individuals may be selected as parents, giving a preference
    to the fitter ones as described in Section 14.3. These three steps correspond
    to the evaluation and selection operations in Figure 14.2.


    Now it is time to generate offspring out of the selected parents as shown in Figure
    14.7. With a single-point crossover operation for CR = 4, two children are generated.
    Mutation is performed for one child (whether it will be applied is determined
    by a mutation probability, which is typically a small value), whose codon 7 (determined
    randomly) is replaced with a random value (codon 7 was 51 and was changed to 22).
    These actions correspond to the reproduction operation in Figure 14.2.


    The fitness of newly generated children must be calculated and a decision must
    be made as to whether they will be included in the next generation, as shown in
    Figure 14.8. In this simple example, we assumed that children 1 and 2 have fitness
    values of 2 and 5 dollar signs, respectively. As shown in Step 6 in Figure 14.8,
    both children are better than some of the existing individuals in the population.
    Therefore, these children are included in the new generation, while two existing
    non-performing individuals are dropped from the population (each with a fitness
    of 1 dollar sign). These actions are represented as the selection operation in
    Figure 14.2.


    At this point, our simple example has a new generation of individuals (with two
    new members). The steps shown in Figures 14.6 to 14.8 are repeated for the following
    generations until either an acceptable result is obtained (e.g. an individual
    with 10 dollar signs is generated) or a predetermined upper limit for the number
    of generations is reached (e.g. 20 generations).


    ## 14.5 Convergence in GAs


    Convergence is a metric indicating if the solutions found by a GA from one generation
    to the next are approaching an acceptable and good-quality solution. A desirable
    outcome is that the best (or average) fitness of a population steadily improves.
    Sometimes, a bio-inspired method cannot find a solution due to improper setting
    up of a problem. Possible reasons for a non-convergent GA include:


    - the chromosome size is too small

    - the number of generations is insufficient

    - the population size is too small

    - the fitness function cannot properly identify fit and unfit individuals

    - the GA mechanism is not suitable to find a solution for this problem type


    | Individual | Good fitness | Bad fitness |

    | :--- | :--- | :--- |

    | A location to move for a UAV | UAV moves away from crowded neighborhood | UAV
    stays in a crowded neighborhood |

    | A price to buy or sell a stock | Buy low and sell with a high price (make profit)
    | Buy high and sell low price (lose money) |

    | A voltage to apply to a port | Voltage is within the limits of the port | Voltage
    is out of the limits of the port |

    | An angle to cut a machine part | The machine part fits into its place | The
    machine part does not fit into its place |

    | Amount of drug in a medicine | Drug is effective | Drug is too strong or too
    weak |


    **Figure 14.1** Examples of fitness functions and individuals with good and bad
    fitness.


    Examples of various fitness functions and individuals with good and bad fitness
    are presented in Figure 14.1. In the first one, suppose a UAV (unmanned aerial
    vehicle or a drone) operating in a swarm of UAVs is using a flight control algorithm
    based on a GA in deciding which location to move in the next time step. In this

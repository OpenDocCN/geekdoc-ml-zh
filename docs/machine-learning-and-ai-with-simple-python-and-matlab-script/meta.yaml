    \n## 16.4 用于无人机飞行控制的简单遗传算法\n\n现在，我们来介绍一种基于遗传算法的飞行控制算法框架，该算法可以引导自主无人机。获得一个良好的适应度函数对于遗传算法充分控制自主无人机的行为至关重要。应定义一个计算效率高的适应度函数，使其与飞行和任务目标紧密相关。仔细定义的染色体结构和适应度函数对于基于遗传算法的飞行控制算法收敛到良好解至关重要。在我们的语境中，收敛意味着无人机均匀分布在感兴趣的区域。如果无人机最终彼此之间的距离尽可能远（达到其通信范围允许的程度），则无人机对操作区域的覆盖将接近最大化。交叉和变异操作会极大地影响找到满意解所需的计算时间，同时消除无人机不必要的移动[18,\
    \ 19]。\n\n让一条染色体代表无人机在下一个时间点移动到的候选位置。在图16.2所示的伪代码中，遗传算法首先生成一个个体种群（即一组候选移动位置）。对于我们的示例，每个候选位置都使用适应度函数进行评估，该函数考虑了无人机的近邻位置。在每一代中，选择最佳的父代进行交叉操作，以获得下一代（希望是改进的）候选位置集合。这个过程在许多代中重复进行，直到找到满意的下一个位置或达到预定的代数。然后，无人机移动到遗传算法找到的最佳位置。\n\
    \n```\n获取局部邻域信息； // 使用范围内的邻近无人机\n生成新位置的初始种群； // 随机种群；\n评估候选位置的适应度；\nwhile (结束条件\
    \ == false)\n{\n    选择用于繁殖的父代；\n        // 通常从最适应的个体中选择作为父代；\n    通过交叉和变异生成后代；\n\
    \        // 这些是新的候选位置\n    评估后代并形成新一代；\n        // 后代替换种群中适应度较低的成员（如果有）\n}\n移动到具有最佳适应度的位置；\n\
    ```\n\n图16.2 一种基于遗传算法的无人机飞行控制简单算法。\n\n### 16.4.1 基于虚拟力的适应度函数\n\n让我们介绍一种采用基于虚拟力的适应度函数的遗传算法，该虚拟力假设由相邻节点施加于一个节点。我们将此遗传算法称为**基于力的遗传算法（FGA）**[18]。位于以节点\
    \ $i$ 位置为中心、通信范围 $R_{COM}$ 为半径的球体内的节点，称为节点 $i$ 的*近邻*。在实现FGA时，我们提出每个近邻对节点 $i$ 施加一个虚拟（即想象的）力。这个虚拟力与节点\
    \ $i$ 和近邻之间的距离成反比。施加在节点 $i$ 上的总虚拟力，称为 $F_i$，是其所有近邻施加在 $i$ 上的力的总和。FGA使用移动节点上的总虚拟力作为该位置的适应度值。如果位置\
    \ $j$ 的总虚拟力小于位置 $k$，我们得出结论 $j$ 是比 $k$ *更适应*的位置。因此，对于一组候选位置，FGA适应度函数倾向于选择施加在给定节点上总力最小的位置。\n\
    \n假设移动节点 $i$ 在其通信范围内有两个邻居，即节点 $j$ 和 $k$。其两个近邻 $j$ 和 $k$ 施加在节点 $i$ 上的虚拟（即想象的）力\
    \ $R_{COM}$ 可以表述如下：\n\n$$F_i = f_{j \\rightarrow i} + f_{k \\rightarrow i} = R_{COM}\
    \ - \\left( \\sqrt{(x_i - x_j)^2 + (y_i - y_j)^2} \\right) + R_{COM} - \\left(\
    \ \\sqrt{(x_i - x_k)^2 + (y_i - y_k)^2} \\right), \\quad (16.1)$$\n\n其中 $f_{j\
    \ \\rightarrow i}$ 和 $f_{k \\rightarrow i}$ 分别表示近邻 $j$ 和 $k$ 施加在节点 $i$ 上的力，$x_v$\
    \ 和 $y_v$ 是节点 $v$ 的坐标（$v = i, j, k$）。如公式 (16.1) 所示，当每个近邻距离节点 $i$ 为 $R_{COM}$ 单位时，$F_i$\
    \ 变为 0，这是适应度的最佳值。因此，对于具有 $n$ 个近邻的给定节点 $i$ 的一般情况，如果所有邻居距离节点 $i$ 都是 $R_{COM}$ 单位，则获得最佳适应度。当所有节点独立获得此适应度时，将获得节点的均匀分布。\n\
    \n图16.3 节点 $i$ 及其两个近邻，即节点 $j$ 和 $k$；节点 $m$ 距离 $i$ 太远（即位于以节点 $i$ 位置为中心、半径为 $R_{COM}$\
    \ 的球体之外），因此对节点 $i$ 的适应度计算没有影响。\n\n![](img/a83d807f9a9119b1472555c0ef55797e_276_0.png)\n\
    \nFGA可以使用其他适应度函数，例如Voronoi镶嵌[119]或Yao图[120]。例如，当采用Voronoi镶嵌时，候选位置与其镶嵌几何中心的距离可用作其适应度值[119]。\n\
    \n现在让我们展示FGA适应度函数计算的可视化。在图16.3中，我们观察到节点 $i$ 有两个近邻，即节点 $j$ 和 $k$。另一方面，节点 $m$ 距离\
    \ $i$ 太远（即它位于以节点 $i$ 为中心、半径为 $R_{COM}$ 的球体之外），因此对节点 $i$ 的适应度计算没有影响。请注意，节点 $m$\
    \ 将被纳入节点 $k$ 的适应度计算中，因为从 $k$ 到 $m$ 的距离小于 $R_{COM}$（即它们是近邻）。\n\n### 16.4.2 FGA的演进过程\n\
    \nFGA在给定节点中的演进过程如下。最初，对于给定节点 $a$ 和种群大小 $N$，FGA考虑 $N$ 个随机选择的位置作为节点 $a$ 移动到的候选位置（即形成初始种群）：\n\
    \n$P_0^0(a), P_1^0(a), \\cdots, P_{(N-1)}^0(a)$,\n\n其中 $P_j^g(a)$ 表示节点 $a$ 在第\
    \ $g$ 代中的个体 $j$（即候选位置 $j$）（$g = 0$ 代表初始种群）。随机选择初始种群是遗传算法的优势之一，因为可以并行考虑广泛的初始位置。许多传统优化算法的成功在很大程度上取决于初始条件的质量，这意味着用户必须熟悉解空间才能做出良好的初始猜测。这是传统方法的一个缺点，因为即使对于特定主题的专家来说，也很难为复杂的优化问题找到合适的初始条件。\n\
    \n对于一般情况，候选位置 $p_C$ 的适应度计算为\n\n$$\\text{fitness}(p_C) = \\begin{cases} \\sum_{i=0}^n\
    \ (R_{COM} - d_i) & \\text{if } n \\geq 1, \\ \\infty & \\text{otherwise}, \\\
    end{cases}$$"

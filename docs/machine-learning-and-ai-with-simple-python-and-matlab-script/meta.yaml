    ## 18.2.3 PSO 备注


    PSO 是一种基于群体运动和智能的鲁棒随机优化技术。它由 James Kennedy（社会心理学家）和 Russell Eberhart（电气工程师）于 1995
    年开发 [105]。PSO 将社会互动的概念应用于多维优化问题。在 PSO 中，如果一个个体找到了一个好的解决方案，所有其他个体也会利用该知识。PSO 的实现相对简单，只需调整少数参数（例如粒子速度）。PSO
    是一种多智能体并行搜索方法，其中每个粒子（即智能体）在搜索空间中飞行。粒子的种群称为群体。PSO 易于并行化，因此非常适合具有大搜索空间的问题。PSO 算法非常适合控制自主无人机的拓扑结构，其中无人机的位置可以建模为粒子群
    [142]。由于其在代际间移动粒子的特殊方式，与传统 AI 方法相比，它可能避免陷入局部极值点。


    ## 18.3 差分进化


    差分进化（DE）是一种进化计算技术，最初由 Price 和 Storn 于 1995 年提出，用于求解高阶切比雪夫多项式方程 [106]。DE 与其他进化计算方法（如
    GA 和 PSO）的不同之处在于，它不使用经典的交叉和变异算子，而是通过一个新的 `差分` 算子生成后代。这个新算子首先生成种群中两个随机选择的个体的 `差分`
    向量，以创建一个新个体。由于为每个个体创建了不同的差分向量，与传统进化计算方法（通常由固定概率分布决定扰动）相比，DE 有更好的机会生成多样化的种群。DE
    是自组织的，需要用户输入很少。


    在 DE 中，一个在 $d$ 维空间中运行的具有 $N$ 个个体的种群，个体 $i$ 表示为一个 $d$ 维向量。在给定时间 $t$，DE 为每个个体 $i$
    创建两个解，称为 `变体` 解和 `试验` 解。如果试验解的表现优于个体 $i$，它将在时间 $(t + 1)$ 替换个体 $i$。让我们将第 $g$ 代的
    $i$ 表示为 $P_i^g$。DE 将该个体演化到下一代 $(g + 1)$（即 $P_i^g \rightarrow P_i^{g+1}$）的过程如下。首先，通过从种群中选择三个其他个体（假设索引为
    $k$、$r$ 和 $m$）来创建变体解 $V_i$。这三个索引必须互不相同且不同于 $i$。第 $g$ 代个体 $i$ 的变体计算如下 [143]：


    $V_i = P_m^g + E \cdot (P_k^g + P_r^g)$


    其中 $E$ 是控制差分向量放大程度的缩放因子（通常 $E \in [0, 2]$）。创建变体 $V_i$ 后，DE 生成一个称为 $U_i$ 的试验解，过程如下。对于维度
    $x$，使用实数 $rand_x$ 和 $rnbr$（两者都是随机数且在 $[0, 1]$ 范围内）以及一个交叉常数（称为 $CR$），一个在 $[0, 1]$
    范围内的实数。如果 $rand_x < CR$ 或 $rnbr = 0$，则将维度 $x$ 的变体解 $V_i$ 赋值为试验解 $U_i$ 的 $x$ 维度。否则，使用
    $P_{ix}^g$ 的现有值（即现有解的 $x$ 维度）来确定试验解 $U_i$ 在维度 $x$ 的值。试验解的其他维度以类似方式计算。对于 $U_i$，如果适应度
    $f(U_i)$ 优于 $f(P_i^g)$，则它在第 $(g + 1)$ 代替换个体 $P_i^g$；否则，$P_i^g$ 作为下一代的解被保留。


    ### 18.3.1 DE 的不同版本


    研究人员提出了不同版本的 DE 算法，每种算法都旨在应用于特定问题时提高其结果精度和计算性能。这些算法之间的主要差异源于用于选择变体解个体的方法、要选择的个体对数量以及用于组合个体的方法。例如，在一种称为
    $DE/rand/Np/bin$ 的 DE 变体中，随机选择 $Np$ 对个体用于二项式组合方法。在二项式组合中，一个父代以概率 $p_a$ 从一个向量中选择，另一个以概率
    $(1 - p_a)$ 选择 [144]。


    其他 DE 变体使用当前种群中的最佳个体作为基础向量（例如在 $DE/best/Np/bin$ 中），或者使用至少两个差分向量来计算父代，其中一个从最佳向量和父代向量获得，其他则使用随机选择的向量计算（例如在
    $DE/current-to-best/Np/bin$ 中）。也可以通过使用多点组合算子将试验解与一个个体组合，该算子随机选择多个切割点，在这些点上组合向量以获得后代
    [145]。


    ### 18.3.2 DE 的应用


    由于其简单的计算要求，DE 在需要多目标优化的领域有广泛的应用，其目标是找到一个满足多个且通常相互矛盾的目标的最优（或近似最优）解。由于其可并行化的特性，DE
    可以并行执行，其中种群中的每个候选解可以并行评估。对于具有大搜索空间的问题，计算适应度函数可能需要很长时间（例如，每个个体需要数天的计算）。这在空间探索应用中很典型，其中每一步都涉及对种群中数千个个体中的每一个进行数百万次迭代的繁重计算，而实验需要数百万步
    [142, 146]。


    ### 18.3.3 DE 的简单算法


    实现 DE 的一个简单算法如图 18.8 所示。首先，创建一个包含 $N$ 个个体的随机种群作为候选解。然后，评估每个个体以获得其适应度值。在 DE 的每一代中，为种群中的每个个体创建一个变体解和一个试验解。'

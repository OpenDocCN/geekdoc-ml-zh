    # 16


    # GAs for Drone Flight Control


    # 16.1 Introduction


    In this chapter, we introduce a popular application of GAs to a real-life problem,
    namely flight control of a drone that operates as a member of a swarm. Typically,
    a drone is capable of making its own flight decisions. In this example application
    we assume that the goal for each drone is to spread uniformly over an area of
    interest such that each drone positions itself as far away from its near neighbours
    as its communication range allows. This task is especially formidable when there
    are no mechanisms for synchronization, collaboration or a leader–follower scheme
    among the drones. Drone flight control is selected for this chapter to illustrate
    the power of GAs in handling these otherwise intractable problems.


    # 16.2 UAV Swarms


    Unmanned aerial vehicles (UAVs), commonly referred to as drones, are capable of
    eliminating the need for deploying costly equipment and dispatching personnel
    to accomplish complex objectives in many engineering applications. A swarm of
    UAVs can be rapidly sent into areas of interest to operate as a group without
    preexisting infrastructural support. UAVs can form and maintain a mobile ad-hoc
    network (MANET) to accomplish tasks that are difficult with traditional communication
    infrastructures with centralized controllers, human operators and synchronization
    among UAVs [18]. Typical examples include unmanned aerial patrols being deployed
    over industrial sites to detect harmful gas leakages, checking agricultural fields
    for crop health, early detection of forest fires, maintaining a temporary communication
    infrastructure (constellation of access points and base stations) for ground entities
    such as fire-fighters in a disaster scenario, or localization of radio sources
    in rescue missions [19].


    A UAV is typically considered small if its weight is less than 2 kg and its wingspan
    is under one metre. Using small, cheap and disposable UAVs, swarms with tens or
    even hundreds of members can be formed. It is possible to launch them from different
    areas, such as a stationary ground (e.g. from a base station), moving ground (e.g.
    from a truck) or airborne platforms (e.g. a helicopter). These types of small
    swarms are especially useful for operations in hard-to-reach locations. Despite
    their advantages, small UAVs may have inherent restrictions imposed by their limited
    power supply and payload capabilities that restrict their usage to short-duration
    flights. They also have limited on-board processing capabilities, which requires
    lightweight yet fast flight'
  - '[PAGE 273]


    ![](img/a83d807f9a9119b1472555c0ef55797e_273_0.png)


    **Figure 16.1** Examples of swarms by different-sized drones: (a) a swarm of 103
    small drones launched from an airborne platform [117]/Military Times, and (b)
    swarm of three large drones each capable of 15 kg of payload; Background – Peter
    Griffin/Public Domain Pictures.


    control algorithms. In the example shown in Figure 16.1a, a swarm of more than
    100 small drones were successfully deployed from military planes during a set
    of experiments conducted by the US Department of Defense. After being launched
    from an airborne platform, autonomous 3D-printed Perdix UAVs communicated with
    each other to accomplish missions of hovering over a target and forming a circle
    in the sky [117].


    Larger UAVs have a wide range of weights and sizes. A large drone may weigh as
    much as a ton and have a wingspan of over 10 metres. They have advantages over
    smaller versions by being able to carry heavier payloads and fly farther distances
    for longer durations. However, compared to their smaller counterparts, they also
    tend to be more expensive to operate and require much more extensive infrastructure
    to maintain. Since risks associated with potential crashing of large UAVs could
    be catastrophic, they tend to be pilot-operated throughout their flights. Therefore,
    large UAVs are typically used in forming small swarms. Agricultural tasks, such
    as crop dusting and field watering, are among applications often assigned to large
    drones. Figure 16.1b shows a swarm of large drones, where each UAV is capable
    of carrying 10-litre tanks for weed-controlling substances and can spray tens
    of acres per hour. Swarms of large UAVs are mostly used in rural areas and are
    operated by human pilots with limited autonomy [118].


    Small UAV swarms are much more widely used due to their operational flexibility
    and with low maintenance costs. In the rest of this chapter, without loss of generality,
    we will focus on small UAVs operating as swarms using MANETs as a means of communication.
    However, we should note that the GA-based flight control algorithms introduced
    in this chapter can be implemented equally effectively for large-UAV swarms. We
    will use the terms `drone`, `node`, `mobile node` and `UAV` interchangeably throughout
    this chapter.


    # 16.3 UAV Flight Control


    Without loss of generality and for the sake of simplicity, all drones are assumed
    to be identical in terms of their flight and communication capabilities. In this
    setting, all UAVs have the same maximum communication range, can broadcast messages
    to their near neighbours within range, aerial speed and manoeuvring capabilities
    are identical, and have on-board computers capable of making flight decisions.


    There are several factors that have to be considered when designing flight control
    algorithms for autonomous UAVs. Limitations in power, flight duration and payload
    capacity are just a few of'
- md: "many aspects that influence operation of a drone and the types of tasks that\
    \ it can perform. Flight control algorithms must be designed such that these hardware\
    \ limitations are taken into account to fully utilize UAV capabilities in a diverse\
    \ set of operations.\n\nLet us also consider the environmental conditions in which\
    \ small UAV swarms commonly operate. MANETs are typically deployed for applications\
    \ with severe restrictions in communication, power and knowledge. Dynamically\
    \ and rapidly changing operational conditions make topology control tasks even\
    \ more challenging for swarms of autonomous UAVs using MANETs:\n\n- Each UAV makes\
    \ movement decisions independently and without humans.\n- The UAVs have limited\
    \ power and range of sensing.\n- Range of communication is limited such that each\
    \ UAV can only communicate with its near neighbours.\n- There are no central controllers.\n\
    - The UAVs do not have global network knowledge since the topology changes continuously.\n\
    - Each UAV has to use only information in its locale for making movement decisions\
    \ (e.g. obstacles and terrain surface knowledge).\n- The UAVs do not have any\
    \ knowledge of the deployment terrain in advance.\n\nA swarm of autonomous UAVs,\
    \ an arrangement in which each drone makes independent flight decisions and controls\
    \ its own actions, is necessary to accomplish a broad range of applications. Such\
    \ drones are specifically designed to operate in dynamic environments. Among various\
    \ flight control strategies, GA-based techniques are good candidates to provide\
    \ autonomous control for each drone. If correctly implemented, GA-based flight\
    \ control can provide real-time guidance for tasks requiring independence and\
    \ agility. Well-designed GAs can adapt to unpredictable situations without the\
    \ need for superfluous computations and high-speed coordination with other swarm\
    \ members.\n\n## 16.4 A Simple GA for UAV Flight Control\n\nLet us now present\
    \ a sketch for a GA-based flight control algorithm that can guide an autonomous\
    \ UAV. Obtaining a good fitness function is crucial for a GA to adequately control\
    \ the actions of autonomous UAVs. A computationally efficient fitness function\
    \ should be defined to closely correlate flight and assignment goals. Carefully\
    \ defined chromosome structure and fitness function(s) are essential for a GA-based\
    \ flight control algorithm to converge to a good solution. In our context, convergence\
    \ means that UAVs are spread uniformly over an area of interest. Coverage of operational\
    \ area by UAVs approaches a maximum if the UAVs end up being separated from each\
    \ other as far away as their communication range allows. Crossover and mutation\
    \ operations can greatly affect computation time to find a satisfactory solution\
    \ while eliminating unnecessary movements of the UAVs [18, 19].\n\nLet a chromosome\
    \ represent a candidate position for a UAV to move to at the next time point.\
    \ In the pseudocode shown in Figure 16.2, the GA starts by generating a population\
    \ of individuals (i.e. a set of candidate positions to move). For our example,\
    \ each candidate position is evaluated using a fitness function, which considers\
    \ the near-neighbour locations of the UAV. At each generation, the best parents\
    \ are selected for a crossover operation to obtain the next (and hopefully improved)\
    \ set of candidate positions. This process is repeated throughout many generations\
    \ until a satisfactory next location is found or a predetermined number of generations\
    \ is reached. The UAV then moves to the best location found by the GA.\n\n```\n\
    obtain local neighborhood info; // using neighbor UAVs within range\ngenerate\
    \ initial population of new positions; // random population;\nevaluate fitness\
    \ for candidate positions;\nwhile (EndCriteria == false)\n{\n    select parents\
    \ for reproduction;\n        // typically among the fittest\n        // individuals\
    \ are selected\n        // as parents;\n    generate offspring by crossover and\
    \ mutation;\n        // these are the new candidate positions\n    evaluate offspring\
    \ and form new generation;\n        // offspring replaces less fit\n        //\
    \ members of the population (if any)\n}\nmove to location with best fitness;\n\
    ```\n\nFigure 16.2  A simple algorithm for GA-based UAV flight control.\n\n###\
    \ 16.4.1  Virtual Force-Based Fitness Function\n\nLet us introduce a GA employing\
    \ a fitness function based on virtual forces that are assumed to be applied to\
    \ a node by its neighbouring nodes. Let us refer to this GA as a **force-based\
    \ GA** (FGA) [18]. A node that resides inside the sphere centred at the location\
    \ of node $i$ with a radius of communication range $R_{COM}$ is called a *near\
    \ neighbour* of node $i$. In implementing an FGA, we propose that a virtual (i.e.\
    \ imaginary) force is inflicted on node $i$ by each of its near neighbours. This\
    \ virtual force is inversely proportional to the distance between node $i$ and\
    \ a near neighbour. The total virtual force inflicted on node $i$, called $F_i$,\
    \ is the summation of the forces applied to $i$ by all of its near neighbours.\
    \ The FGA uses the total virtual force on a mobile node as the fitness value for\
    \ this position. If the total virtual force is smaller for a location $j$ than\
    \ for $k$, we conclude that $j$ is a *fitter* position than $k$. Therefore, for\
    \ a set of candidate positions, the FGA fitness function prefers a location at\
    \ which the least amount of total force is applied to the given node.\n\nSuppose\
    \ mobile node $i$ has two neighbours within its communication range, namely, nodes\
    \ $j$ and $k$. A virtual (i.e. imaginary) force $R_{COM}$ inflicted on node $i$\
    \ by its two near neighbours $j$ and $k$ can be formulated as follows:\n\n$$F_i\
    \ = f_{j \\rightarrow i} + f_{k \\rightarrow i} = R_{COM} - \\left( \\sqrt{(x_i\
    \ - x_j)^2 + (y_i - y_j)^2} \\right) + R_{COM} - \\left( \\sqrt{(x_i - x_k)^2\
    \ + (y_i - y_k)^2} \\right), \\quad (16.1)$$\n\nwhere $f_{j \\rightarrow i}$ and\
    \ $f_{k \\rightarrow i}$ represent the forces applied to node $i$ by near neighbours\
    \ $j$ and $k$, respectively, and $x_v$ and $y_v$ are the coordinates of node $v$\
    \ (for $v = i, j, k$). As can be seen in Eqn. (16.1), $F_i$ becomes 0 when each\
    \ near neighbour is $R_{COM}$ units away from node $i$, which is the best value\
    \ of the fitness. Therefore, for the general case of a given node $i$ with $n$\
    \ near neighbours, if all neighbours are $R_{COM}$ units apart from node $i$,\
    \ the best fitness is obtained. When all nodes independently obtain this fitness,\
    \ a uniform distribution of nodes will be obtained.\n\nFigure 16.3 Node $i$ and\
    \ its two near neighbours, namely nodes $j$ and $k$; node $m$ is too far from\
    \ $i$ (i.e. outside the sphere centred on node $i$'s position with a radius of\
    \ $R_{COM}$) and, therefore, has no impact on the fitness calculation for node\
    \ $i$.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_276_0.png)\n\nAn FGA may use\
    \ other fitness functions, such as Voronoi tessellations [119] or Yao diagrams\
    \ [120]. For example, when employing Voronoi tessellations, a candidate position's\
    \ distance from the geometric centre of its tessellation may be used as its fitness\
    \ value [119].\n\nLet us now present a visualization of FGA fitness function computation.\
    \ In Figure 16.3, we observe that node $i$ has two near neighbours, namely, nodes\
    \ $j$ and $k$. Node $m$, on the other hand, is too far from $i$ (i.e. it is outside\
    \ the sphere centred at node $i$ with a radius of $R_{COM}$) and, therefore, has\
    \ no impact on the fitness calculations for node $i$. Note that node $m$ will\
    \ be considered in the fitness computation for node $k$ since the distance from\
    \ $k$ to $m$ is less than $R_{COM}$ (i.e. they are near neighbours).\n\n### 16.4.2\
    \ FGA Progression\n\nProgression of the FGA in a given node takes place as follows.\
    \ Initially, for a given node $a$ and a population size of $N$, the FGA considers\
    \ $N$ randomly chosen positions as the candidate locations for node $a$ to move\
    \ to (i.e. forming the initial population):\n\n$P_0^0(a), P_1^0(a), \\cdots, P_{(N-1)}^0(a)$,\n\
    \nwhere $P_j^g(a)$ represents individual $j$ (i.e. the candidate position $j$)\
    \ for node $a$ in generation $g$ ($g = 0$ for the initial population). Selecting\
    \ the initial population randomly is one of the strengths of GAs since a wide\
    \ range of initial positions can be considered in parallel. Success of many traditional\
    \ optimization algorithms heavily depends on the quality of the initial conditions,\
    \ which implies that the user must be familiar with the solution space to make\
    \ a good initial guess. This is a drawback of traditional approaches since it\
    \ is difficult to find suitable initial conditions for complex optimization problems\

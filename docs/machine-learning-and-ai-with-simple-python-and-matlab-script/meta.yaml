    \ flight control.\n\n# 16.4.1  Virtual Force-Based Fitness Function\n\nLet us\
    \ introduce a GA employing a fitness function based on virtual forces that are\
    \ assumed to be applied to a node by its neighbouring nodes. Let us refer to this\
    \ GA as a **force-based GA** (FGA) [18]. A node that resides inside the sphere\
    \ centred at the location of node $i$ with a radius of communication range $R_{COM}$\
    \ is called a *near neighbour* of node $i$. In implementing an FGA, we propose\
    \ that a virtual (i.e. imaginary) force is inflicted on node $i$ by each of its\
    \ near neighbours. This virtual force is inversely proportional to the distance\
    \ between node $i$ and a near neighbour. The total virtual force inflicted on\
    \ node $i$, called $F_i$, is the summation of the forces applied to $i$ by all\
    \ of its near neighbours. The FGA uses the total virtual force on a mobile node\
    \ as the fitness value for this position. If the total virtual force is smaller\
    \ for a location $j$ than for $k$, we conclude that $j$ is a *fitter* position\
    \ than $k$. Therefore, for a set of candidate positions, the FGA fitness function\
    \ prefers a location at which the least amount of total force is applied to the\
    \ given node.\n\nSuppose mobile node $i$ has two neighbours within its communication\
    \ range, namely, nodes $j$ and $k$. A virtual (i.e. imaginary) force $R_{COM}$\
    \ inflicted on node $i$ by its two near neighbours $j$ and $k$ can be formulated\
    \ as follows:\n\n$$F_i = f_{j \\rightarrow i} + f_{k \\rightarrow i} = R_{COM}\
    \ - \\left( \\sqrt{(x_i - x_j)^2 + (y_i - y_j)^2} \\right) + R_{COM} - \\left(\
    \ \\sqrt{(x_i - x_k)^2 + (y_i - y_k)^2} \\right), \\quad (16.1)$$\n\nwhere $f_{j\
    \ \\rightarrow i}$ and $f_{k \\rightarrow i}$ represent the forces applied to\
    \ node $i$ by near neighbours $j$ and $k$, respectively, and $x_v$ and $y_v$ are\
    \ the coordinates of node $v$ (for $v = i, j, k$). As can be seen in Eqn. (16.1),\
    \ $F_i$ becomes 0 when each near neighbour is $R_{COM}$ units away from node $i$,\
    \ which is the best value of the fitness. Therefore, for the general case of a\
    \ given node $i$ with $n$ near neighbours, if all neighbours are $R_{COM}$ units\
    \ apart from node $i$, the best fitness is obtained. When all nodes independently\
    \ obtain this fitness, a uniform distribution of nodes will be obtained."

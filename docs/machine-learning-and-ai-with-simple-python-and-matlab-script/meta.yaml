    $$\mathcal{A}_{2,1} = h_2^\top \cdot h_1 = [-0.306] \cdot [0.143] = [-0.044]$$

    $$\mathcal{A}_{2,2} = h_2^\top \cdot h_2 = [-0.306] \cdot [-0.306] = [0.094]$$


    $$\mathcal{Z}_2 = \sum_{k=1}^2 \Theta_{\mathcal{Z}}(\mathcal{A}_{2,k}) \cdot h_k
    = [0.466] \cdot [0.143] + [0.534] \cdot [-0.306] = [-0.097]$$


    $$\Omega_2 = V \cdot \mathcal{Z}_2 + c = \begin{bmatrix} -0.225 & -0.305 & 0.490
    & 0.277 \end{bmatrix} [-0.097] + \begin{bmatrix} 0 & 0 & 0 & 0 \end{bmatrix} =
    \begin{bmatrix} 0.022 & 0.029 & -0.047 & -0.027 \end{bmatrix}$$


    $$\hat{y}_2 = \Theta_{\hat{y}} = \text{softmax}(\Omega_2) = \begin{bmatrix} 0.257
    & \mathbf{0.259} & 0.240 & 0.245 \end{bmatrix}.$$


    Based on the softmax unit outputs, for input $x_2 = \mathbf{e}$, our simple RNN-Att
    generates a predicted output as $\hat{y}_2 = \mathbf{e}$, whereas the expected
    output from Table 12.1 is $y_2^o = 1$. For this step, the loss is computed as


    $$L_2 = -y_2^o \ln(\hat{y}_2) = -\begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.257 & 0.259 & 0.240 & 0.245 \end{bmatrix} = 1.428.$$


    At step $t = 3$, the predicted output $\hat{y}_3$ for input $x_3 = \mathbf{1}$
    is computed as follows:


    $$\mathcal{A}_{3,1} = h_3^\top \cdot h_1 = [-0.454] [0.143] = [-0.065]$$

    $$\mathcal{A}_{3,2} = h_3^\top \cdot h_2 = [-0.454] [-0.306] = [0.139]$$

    $$\mathcal{A}_{3,3} = h_3^\top \cdot h_3 = [-0.454] [-0.454] = [0.206]$$


    $$\mathcal{Z}_3 = \sum_{k=1}^3 \Theta_{\mathcal{Z}}(\mathcal{A}_{3,k}) h_k = [0.283]
    [0.143] + [0.347] [-0.306] + [0.371] [-0.454] = [-0.234]$$


    $$\Omega_3 = V \cdot \mathcal{Z}_3 + c = \begin{bmatrix} -0.225 & -0.305 & 0.491
    & 0.277 \end{bmatrix} \cdot [-0.234] + \begin{bmatrix} 0 & 0 & 0 & 0 \end{bmatrix}
    = \begin{bmatrix} 0.053 & 0.071 & -0.115 & -0.065 \end{bmatrix}$$


    $$\hat{y}_3 = \Theta_y(\Omega_3) = \text{softmax}(\Omega_3) = \begin{bmatrix}
    0.266 & \mathbf{0.271} & 0.225 & 0.237 \end{bmatrix}.$$


    Based on the highest value of the softmax unit output, for input $x_3 = 1$, our
    model generates a prediction of $\hat{y}_3 = \mathbf{e}$, as opposed to the expected
    output of $y_3^o = 1$ from Table 12.1. For step $t = 3$, the loss is


    $$L_3 = -y_3^o \ln(\hat{y}_3) = -\begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.266 & 0.271 & 0.225 & 0.237 \end{bmatrix} = 1.490.$$


    Similarly, at step $t = 4$ of forward propagation in training, for input $x_4
    = 1$, the output prediction $\hat{y}_4$ is computed as


    $$\mathcal{A}_{4,1} = h_4^\top \cdot h_1 = [-0.382] [0.143] = [-0.055]$$

    $$\mathcal{A}_{4,2} = h_4^\top \cdot h_2 = [-0.382] [-0.306] = [0.117]$$

    $$\mathcal{A}_{4,3} = h_4^\top \cdot h_3 = [-0.382] [-0.454] = [0.173]$$

    $$\mathcal{A}_{4,4} = h_4^\top \cdot h_4 = [-0.382] [-0.382] = [0.146]$$


    $$\mathcal{Z}_4 = \sum_{k=1}^{4} \Theta_z(\mathcal{A}_{4,k}) h_k$$

    $$= [0.214] [0.143] + [0.254] [-0.306] + [0.269] [-0.454] + [0.262] [-0.382]$$

    $$= [-0.269]$$


    $$\Omega_4 = V \cdot \mathcal{Z}_4 + c = \begin{bmatrix} -0.225 & -0.305 & 0.491
    & 0.277 \end{bmatrix} \cdot [-0.269] + \begin{bmatrix} 0 & 0 & 0 & 0 \end{bmatrix}
    = \begin{bmatrix} 0.060 & 0.082 & -0.132 & -0.075 \end{bmatrix}$$


    $$\hat{y}_4 = \Theta_y(\Omega_4) = \text{softmax}(\Omega_4) = \begin{bmatrix}
    0.269 & \mathbf{0.275} & 0.222 & 0.235 \end{bmatrix}.$$


    From the softmax unit output, for applying input $x_4 = 1$ a second time, our
    model generates as $\hat{y}_4 = \mathbf{e}$, instead of $y_4^o = \mathbf{o}$.
    The loss at step $t = 4$ is computed as


    $$L_4 = -y_4^o \ln(\hat{y}_4) = -\begin{bmatrix} 0 & 0 & 0 & 1 \end{bmatrix} \ln
    \begin{bmatrix} 0.269 & 0.275 & 0.222 & 0.235 \end{bmatrix} = 1.449.$$


    The total loss for $\mathcal{T} = 4$ steps then becomes


    $$L = \sum_{t=1}^{\mathcal{T}} L_t = 1.440 + 1.428 + 1.490 + 1.449 = 5.807.$$


    Let us now focus on the back propagation process using the partial derivatives
    of total loss with respect to model parameters. From Eq. (12.7), we have


    $$\frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial \hat{y}_1}{\partial \Omega_1}
    = (\hat{y}_1 - y_1^o) = \begin{bmatrix} 0.240 & 0.237 & 0.266 & 0.258 \end{bmatrix}
    - \begin{bmatrix} 0 & 1 & 0 & 0 \end{bmatrix} = \begin{bmatrix} 0.240 & -0.763
    & 0.266 & 0.258 \end{bmatrix}$$


    $$\frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial \Omega_2}
    = (\hat{y}_2 - y_2^o) = \begin{bmatrix} 0.257 & 0.259 & 0.240 & 0.245 \end{bmatrix}
    - \begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} = \begin{bmatrix} 0.257 & 0.259
    & -0.760 & 0.245 \end{bmatrix}$$


    $$\frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial \Omega_3}
    = (\hat{y}_3 - y_3^o) = \begin{bmatrix} 0.266 & 0.271 & 0.225 & 0.237 \end{bmatrix}
    - \begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} = \begin{bmatrix} 0.266 & 0.271
    & -0.775 & 0.237 \end{bmatrix}$$


    $$\frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial \Omega_4}
    = (\hat{y}_4 - y_4^o) = \begin{bmatrix} 0.269 & 0.275 & 0.222 & 0.235 \end{bmatrix}
    - \begin{bmatrix} 0 & 0 & 0 & 1 \end{bmatrix} = \begin{bmatrix} 0.269 & 0.275
    & 0.222 & -0.765 \end{bmatrix}$$


    Partial derivatives of $L$ with respect to $V$, $c$, $W$, $U$ and $b$ are computed
    using Eqs. (12.8), (12.9), (12.10), (12.11), and (12.12), respectively, as follows:


    $$\frac{\partial L}{\partial V} = \begin{bmatrix} -0.268 & -0.417 & 0.537 & 0.147
    \end{bmatrix} \quad \frac{\partial L}{\partial c} = \begin{bmatrix} 1.032 & 0.042
    & -1.048 & -0.026 \end{bmatrix} \quad \frac{\partial L}{\partial W} = [0.0274]$$


    $$\frac{\partial L}{\partial U} = [0.1817 \quad -0.3287 \quad -0.2169 \quad 0]
    \quad \frac{\partial L}{\partial b} = [-0.364]$$


    Using a learning rate of $\eta = 0.1$ (an arbitrarily chosen value), we update
    parameters of $V$, $c$, $W$, $U$ and $b$ using Eqs. (12.13), (12.14), (12.15),
    (12.16) and (12.17), respectively, as follows:


    $$V_{new} = V - \eta \frac{\partial L}{\partial V} = \begin{bmatrix} -0.225 &
    -0.305 & 0.491 & 0.277 \end{bmatrix} - 0.1 \begin{bmatrix} -0.268 & -0.417 & 0.537
    & 0.147 \end{bmatrix} = \begin{bmatrix} -0.222 & -0.301 & 0.485 & 0.275 \end{bmatrix}$$


    $$c_{new} = c - \eta \frac{\partial L}{\partial c} = \begin{bmatrix} 0 & 0 & 0
    & 0 \end{bmatrix} - 0.1 \begin{bmatrix} 1.032 & 0.042 & -1.048 & -0.026 \end{bmatrix}
    = \begin{bmatrix} -0.0103 & -0.0004 & 0.0105 & 0.0003 \end{bmatrix}$$


    $$W_{new} = W - \eta \frac{\partial L}{\partial W} = [-0.5870] - 0.1 \cdot [0.0274]
    = [-0.5872]$$


    $$U_{new} = U - \eta \frac{\partial L}{\partial U}$$

    $$= [0.144 \quad -0.232 \quad -0.669 \quad 1.159] - 0.1 [0.182 \quad -0.329 \quad
    -0.217 \quad 0.0]$$

    $$= [0.142 \quad -0.228 \quad -0.667 \quad 1.159]$$


    $$b_{new} = b - \eta \frac{\partial L}{\partial b} = [0] - 0.1 [-0.364] = [0.0036]$$


    where subscript *new* is used on the left-hand sides of these equations to denote
    the updated values of the parameters, whereas the values on the right-hand side
    correspond to the values before the update. Using the updated parameter values,
    we continue with another forward propagation with four steps as above, which yields
    the following loss values (computations are not shown):


    $$L_1 = -y_1^o \ln(\hat{y}_1) = -\begin{bmatrix} 0 & 1 & 0 & 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.237 & 0.239 & \mathbf{0.268} & 0.258 \end{bmatrix} = 1.440$$


    $$L_2 = -y_2^o \ln(\hat{y}_2) = -\begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.254 & \mathbf{0.258} & 0.243 & 0.245 \end{bmatrix} = 1.416$$


    $$L_3 = -y_3^o \ln(\hat{y}_3) = -\begin{bmatrix} 0 & 0 & 1 & 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.2633 & \mathbf{0.271} & 0.229 & 0.237 \end{bmatrix} = 1.476$$


    $$L_4 = -y_4^o \ln(\hat{y}_4) = -\begin{bmatrix} 0 & 0 & 0 & 1 \end{bmatrix} \ln
    \begin{bmatrix} 0.266 & \mathbf{0.274} & 0.225 & 0.235 \end{bmatrix} = 1.447$$


    where the predictions for the second forward propagation are shown as boldface
    characters (i.e. the inputs of $x_1 = \mathbf{h}$, $x_2 = \mathbf{e}$, $x_3 =
    \mathbf{1}$, and $x_4 = \mathbf{1}$ generate the predictions of $\hat{y}_1 = \mathbf{1}$,
    $\hat{y}_2 = \mathbf{e}$, $\hat{y}_3 = \mathbf{e}$, and $\hat{y}_4 = \mathbf{e}$,
    respectively). The total loss $L$ for four steps is


    $$L = \sum_{t=1}^T L_t = 1.440 + 1.416 + 1.476 + 1.447 = 5.779$$


    which was 5.807 for the first epoch as shown above. As training continues with
    more epochs, the total error value is expected to reduce. For this example, the
    error values are found as 4.679 and 2.104 for 100 and 1000 epochs, respectively.



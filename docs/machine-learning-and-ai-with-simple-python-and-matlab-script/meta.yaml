    \ = np.array(Y[\"m-coef(mmse-points/week)\"]).reshape(-1,1)\nY_scaled = MinMaxScaler().fit_transform(mmse_slopes)\n\
    \n# hold all percent errors for each sample that was left out for LOOCV\npercent_slope_errors\

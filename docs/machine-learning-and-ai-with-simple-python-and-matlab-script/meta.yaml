    \ generated by a sample run of the Matlab script: out of 100 runs of the ANN,\
    \ 62 correct predictions are obtained with an average error of 0.9%.\n\n## 6.6\
    \ Concluding Remarks\n\nPosts in social media, articles appearing in the printed\
    \ press and comments made in press conferences for news outlets may affect the\
    \ outcomes of various external and seemingly unrelated events (e.g. financial\
    \ securities values, company valuations or employment decisions). NLP techniques\
    \ allow interactions between natural language content (e.g. spoken, written or\
    \ posted text) and external events (e.g. house prices) to be explored. ANNs can\
    \ be used to implement statistics-based NLP techniques by first extracting keywords\
    \ from a body of text and then associating them with external event recordings\
    \ temporally related to this content. These keywords, together with their usage\
    \ frequencies, may be passed into an ANN that can be trained to predict the outcome\
    \ of various external events.\n\nIn this chapter, tweets from former US President\
    \ Trump are used to explore their possible impact on financial securities listed\
    \ on the S&P 500 index. First a set of keywords used in tweets is identified that\
    \ could potentially be related to financial asset movements. The numbers of these\
    \ keywords tweeted each day together with opening price and daily traded volume\
    \ are used as inputs to an ANN. Prediction of stock price movements is the output\
    \ of the ANN. Using tweets and historical financial data corresponding to those\
    \ days that tweets were published, an ANN is trained to predict future stock movements\
    \ using future tweets.\n\nSuccess in employing ANNs for the NLP class of problems\
    \ in real-life situations depends on correct identification of inputs and outputs\
    \ for an ANN, appropriate selection of keywords and design of the ANN architecture.\
    \ The complexity of real-life problems that can be solved by AI and NLP techniques\
    \ require the combined experience and skill-sets typically available to various\
    \ subject matter experts (e.g. scientists, money managers, business executives,\
    \ medical personnel and others) and computing professionals (e.g. statisticians,\
    \ mathematicians, computer scientists and software engineers)."

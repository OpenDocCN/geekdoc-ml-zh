    small subset of patients are shown in Figure 5.1. The output of the ANN is selected
    as the slope of MMSE score decline, which indicates the rate at which the disease
    will progress. MMSE score slopes for the sample set of patients whose gene expressions
    are given in Figure 5.1 are used as the ANN outputs, as shown in 5.2.


    We defined an ANN architecture with four hidden layers with 120, 60, 15 and 5
    neurons in the first through the fourth hidden layers, respectively, as shown
    in Figure 5.3 (referred to as 120-60-15-5-1 architecture). Note that after experimenting
    with different architectures, this combination of the number of hidden layers
    and the number of neurons in each layer happen to perform the best.


    During training, to reduce the influence of possible outliers on the sample data
    on ANN weight computations, we employed the so-called leave-one-out-cross-validation
    (LOOCV) method to measure the performance of the trained ANN [61]. Suppose there
    are 100 data samples (i.e. 100 sets of inputs and corresponding outputs) to be
    used for training an ANN. In LOOCV, one data sample out of 100 (let us call it
    sample 1) is taken out of the data set, and the ANN is trained using the remaining
    99 samples. After the training is complete, ANN performance is measured by using
    sample 1 as a test, where inputs of sample 1 are applied to the ANN, the output(s)
    are generated by the ANN and an error value is computed. After that, the same
    process is repeated taking another sample (e.g. sample 2) out of the 100 samples,
    and so on. At the end, there are 100 different error values, which indicate the
    performance of the ANN with respect to the sample data. In the general case, LOOCV
    can be conducted by removing $k$ samples out of $N$, training the ANN with $(N
    - k)$ samples and computing the performance for $k$ tests. Selection of $k$ depends
    on the application for which the ANN is designed.


    When an ANN performs well for a sample data set used in training but fails to
    perform for new data elements, it is said that the ANN is over-fitted to its sample
    data. Over-fitting is especially observed in ANNs with too many hidden layers
    and/or too many neurons in hidden layers. This is due to noise in the sample data
    that fools the ANN weights as being important information. One of the methods
    to avoid over-fitting is engaging regularization techniques and reducing noise'

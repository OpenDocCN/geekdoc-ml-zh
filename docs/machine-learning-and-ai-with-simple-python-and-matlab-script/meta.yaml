    of the 2-kg item. This class of KP is called the KP with repetitions (KPR). Consider
    a disaster relief organization with virtually unlimited resources but with limited
    transportation capabilities. This organization will benefit from KPR solutions
    to select items to dispatch to a crisis area [115]. Let us define $s_j$ as the
    maximum number of times that an item $j$ can be selected for a knapsack with a
    capacity of $K_w$. The KPR is then formally stated as


    $$\text{maximize} \sum_{j=1}^{n} x_j \cdot v_j \quad \text{subject to} \quad \sum_{j=1}^{n}
    w_j \cdot x_j \leq K_W, \quad 0 \leq x_j \leq s_j \text{ for } j = 1, \cdots n,$$


    where $x_j$ is the number of times item $j$ is selected ($0 \leq x_j \leq s_j$
    for $j = 1, \cdots n$).


    The KP that aims to satisfy multiple constraints at the same time, for example
    when both limited weight and volume capacities of a knapsack have to be considered,
    is referred to as the multidimensional KP (MKP). The objective of the MKP is to
    maximize the value of all items that fit into a knapsack, while examining the
    weight and volume of each item before determining its suitability for packing.
    There are many applications of the MKP in real-life tasks. A transportation company
    that must determine the selection of goods to be dispatched while considering
    the volume and weight limitations of a truck may construct its problem as a MKP
    [116]. A similar MKP application is dietary menu selection, where there are food
    items with different nutritional characteristics (e.g. vitamins, fibres, calories),
    each with a lower or upper limit for a healthy intake. If each food item is associated
    with a price, the objective would be to keep the cost within a budgetary limit
    while adhering to multiple nutritional restrictions. Furthermore, there could
    be a requirement for diversity in a diet such that a menu consisting of only vegetables
    may not be desirable and a variety of items must be included in a successful selection.
    Formally, we can define the MKP as


    $$\text{maximize} \sum_{j=1}^{n} x_j \cdot v_j \quad \text{subject to} \quad \sum_{j=1}^{n}
    w_{ij} \cdot x_j \leq c_i, \quad \text{for } i = 1, \cdots m,$$


    where a set of $n$ items are considered for a knapsack with $m$ restrictions.
    For example, $m = 2$ could reflect constraints $c_1$ and $c_2$ referring to weight
    and volume restrictions of a knapsack, respectively. An item $j$ with a value
    of $v_j \geq 0$ uses an amount $w_{ij} \geq 0$ that is bound by constraint $c_i$.
    In our example of the MKP that has limited volume and weight capacities, $w_{1j}$
    indicates the weight of item $j$, and $w_{2j}$ represents its size.


    # 15.5 GAs for KP Solution


    Let us now illustrate how GAs can be employed to solve the knapsack class of problems
    requiring computation cost that is linearly proportional to the number items.
    Suppose a list of food items for this example is given in Figure 15.7, where each
    item has its calorie count and the amount of protein it provides.


    For a GA designed as a solution for KPs, a binary chromosome can be defined to
    represent the selected items, where a chromosome bit is a 1 if the corresponding
    item will be included in the knapsack and 0 otherwise. The fitness function can
    be defined as the total value of the selected items only if the total weight is
    below the knapsack capacity. Only the chromosomes representing valid selections
    of items are to be considered in further generations of the GA. For a set of $n$
    food items, the chromosome will then be


    $[x_1 \ x_2 \ \dots \ x_n] \text{ for } x_i \in \{0, 1\},$'

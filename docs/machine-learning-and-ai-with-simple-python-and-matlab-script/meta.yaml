    For $\delta = -(y - \hat{y})f''(e)$, we have


    $$\frac{\partial J}{\partial w_b} = \delta \frac{\partial e}{\partial w_b} = \delta
    x_b.$$


    Similarly, the partial derivative of $J$ with respect to $B$ is


    $$\frac{\partial J}{\partial B} = -(y - \hat{y})\frac{\partial \hat{y}}{\partial
    B}Z = -(y - \hat{y})\frac{\partial \hat{y}}{\partial e}\frac{\partial e}{\partial
    B}.$$


    Again, using $\delta = -(y - \hat{y})f''(e)$, we have


    $$\frac{\partial J}{\partial B} = \delta \frac{\partial e}{\partial B} = \delta.$$


    Using these values, the weights will be updated for a learning rate of $\alpha$
    as follows:


    $$w_a = w_a - \alpha \frac{\partial J}{\partial w_a}, \quad w_b = w_b - \alpha
    \frac{\partial J}{\partial w_b}, \quad B = B - \alpha \frac{\partial J}{\partial
    B}.$$'

    # 12.7 Concluding Remarks


    In this chapter we introduced an attention mechanism, where all previous hidden
    states are directly used at each step during training. This is especially important
    for applications such as machine translation, where the current output must use
    previously applied inputs, whereas in an ordinary RNN the main focus for the current
    input is the current and the immediate previous hidden states. Forward and back
    propagation operations, computation of loss function and updating the parameters
    were explained in detail for a simple one-to-one single cell RNN-Att. An RNN with
    attention is a basic building block of several more advanced language models,
    including LSTM and transformers [ref]. We expect that the reader will be able
    to understand these advanced models without difficulty after digesting the materials
    presented in this book.



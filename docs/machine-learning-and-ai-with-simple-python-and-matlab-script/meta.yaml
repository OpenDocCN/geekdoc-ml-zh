  md: 'Particle swarm optimization (PSO) is an SAI optimization technique inspired
    by social and collective behaviour observed in nature, such as bird flocking and
    fish schooling. It was developed as a tool for solving problems in which the best
    solution can be represented as a point in the space [105]. PSO is a robust stochastic
    optimization technique based on the movement and intelligence of swarms. PSO implements
    social interaction principles to solve multi-dimensional optimization problems.
    In PSO, if one of the individuals finds a good solution, the remaining individuals
    make use of that knowledge.


    PSO is a multi-agent parallel search method where each particle flying over a
    search space adjusts its flight path based on its own experience (i.e. historical
    data) as well as the experiences of other particles. At a given time $t$, a particle
    $j$, with a position $P_j^t$ and velocity $V(t)$, keeps track of the best fitness
    it has achieved so far individually (called $P_j^{best}$) and the best value global
    value obtained so far by the swarm overall (called $G^{best}$). Let $P_j^{g+1}$
    be the new position for particle $j$ and $P_j^g$ be its current position. We evolve
    the speed for particle $j$ as


    $V_{g+1} = w V_g + C_1 R_1 (P_j^{best} - P_j^g) + C_2 R_2 (G^{best} - P_j^g)$


    where $V_{g+1}$ and $V_g$ are the new and current speeds for particle $j$, respectively,
    and $w$ is a real number in $[0, 1]$ and is a weight factor for inertia. Real
    numbers $C_1$ and $C_2$ are in $[0, 4]$, and the real numbers $R_1$ and $R_2$
    are in $[0, 1]$.


    In Eq. (18.1), the momentum of a particle $j$ is controlled by $w$ as a trade-off
    between a particle''s previous experience and the overall swarm experience. For
    $w = 0$, particle $j$ does not consider any of its previous knowledge, whereas
    $w = 1$ implies that particles do not easily change their directions. In velocity
    updates, $R_1$ influences $P_j^{best}$, while $R_2$ impacts $G^{best}$. For contribution
    of experience to the search, $C_1$ represents self-confidence of a particle and
    $C_2$ indicates the particle''s confidence in the motion of the entire swarm.
    The new position of $j$ is defined as $P_j^{g+1} = P_j^g + V_{g+1}$. The personal
    and global best fitness values are updated if the new position of particle $j$
    has a better fitness. Regardless of its fitness, particle $j$ moves to the new
    location.


    # Variations of PSO


    There are several different types of PSO algorithms that have been developed in
    order to address a diverse range of engineering applications. One commonly use
    swarm optimization method, called discrete PSO (DPSO), solves combinatorial optimization
    problems over a discrete-valued search space [135]. In this algorithm, the position
    and velocity of each particle are denoted by discrete values that could be real
    numbers or integers. Another version of the PSO algorithm, called neighbourhood
    search PSO (NSPSO), considers both local neighbours and the global swarm to find
    its trial solutions. In NSPSO, a particle first explores the local neighbourhood
    of each of its neighbours before considering the global solution space [136].
    In a different variation, called neighbourhood guaranteed convergence PSO (GCPSO),
    the structure of social networks is implemented by preserving the diversity within
    the swarm where a distance limit is applied when finding the best next positions
    [137].


    # 18.2.1 Applications of PSO


    PSO can be easily adopted to solve a diverse range of engineering problems. For
    example, it has been popular for solving maintenance and path discovery types
    of applications in communication and computer networks, especially for power constrained
    mobile nodes. PSO can minimize the communication cost by obtaining optimal or
    near-optimal transmission paths while considering'
  merge: -1
  pgno: 313
- img_proc: true
  md: 'energy consumption and traffic intensity [138]. PSO can be useful in power
    management problems in large-scale wireless ad-hoc networks, where nodes are clustered
    into smaller subnetworks with only relatively few links between them. PSO finds
    stable clusters of nodes to ensure energy-efficient and stable communication in
    the network [139].


    In data mining applications, large amounts of information are handled such that
    chunks of data with similar characteristics need to be grouped together. PSO can
    automatically determine an optimal number of clusters needed for accurate classification
    of input data. Each particle represents a data element located at the centre of
    a cluster, where distance is measured by the similarity between two data elements.
    A corresponding fitness function is used to promote clusters that are denser and
    with larger numbers of data points [140].


    # 18.2.2 PSO Operation


    PSO uses a number of agents (i.e. particles) that constitute a swarm flying over
    a search space looking for the best solution:


    +   - A particle adjusts its flying based on its own flying experience as well
    as the flying experience of other particles.

    - Each particle keeps track of its coordinates in the solution space which are
    associated with the best solution (fitness) that has been achieved so far by that
    particle. This value is called the *personal best*: $P_j^{(best)}$.

    - Another important value tracked by the PSO is the best value obtained so far
    by any particle in the swarm. This value is called the *global best*: $G^{best}$.


    At generation $g$, a particle $j$ has a position $P_j^g$ and a velocity of $v(t)$.
    Each particle knows its own personal best position and the global best position
    of all particles. In PSO, evolving the speed of a particle $j$ from generation
    $g$ to $(g + 1)$ (i.e. $P_j^g \rightarrow P_j^{g+1}$) is accomplished as follows:


    $V_{g+1} = w \cdot V_g + C_1 \cdot R_1 \cdot (P_j^{(best)} - P_j^g) + C_2 \cdot
    R_2 \cdot (G^{best} - P_j^g)$, (18.2)


    where the following PSO optimization parameters are used:


    +   - $V_{g+1}$: new speed for the particle

    - $V_g$: current speed for the particle

    - $P_j^g$: current position of the particle

    - $w$: weight factor for inertia (a real number in the range [0, 1])

    - $R_1$: influence of $P_j^{(best)}$ in velocity update (a random real number
    in the range [0, 1])

    - $R_2$: influence of $G^{best}$ in velocity update (a random real number in the
    range [0, 1]) [105]

    - $C_1$: self-confidence of a particle in velocity update (a real number in the
    range [0, 4])

    - $C_2$: swarm-confidence of the entire population in velocity update (a real
    number in the range [0, 4])

    - $P_j^{(best)}$: the personal best position that particle $j$ has flown over
    so far

    - $G^{best}$: the global best position that any particle in the swarm has flown
    over so far


    Parameter $w$ controls the momentum of a particle:


    +   - $w \ll 1$: very little momentum is kept from the last generation.

    - $w = 0$: no knowledge from last time-step is kept; each generation is independent.

    - $w = 1$: particles do not easily change their directions – typically used to
    explore larger areas in the beginning.'
  merge: -1
  pgno: 314
- img_proc: true
  md: "+   - $w$ can be decreased as a function of number of generations (e.g. more\
    \ exploration at the beginning and more trust on swarm intelligence towards the\
    \ end).\n- Typically inertia weight $w$ is reduced as the number of generations\
    \ grow (e.g. from 0.9 to 0.4) [105].\n\n$C_1$ is the self-confidence of a given\
    \ particle: how much of a particle's own experience contributes to the search\
    \ at a given generation (self-exploration). $C_2$ represents swarm confidence,\
    \ the motion of all particles in the swarm at a given generation (swarm-exploration).\
    \ Typically, $C_1$ and $C_2$ are set to 1.5.\n\n# Computing a New Position for\
    \ a Particle\n\nFor the two-dimensional case, let a new position for a particle\
    \ $j$ be:\n\n$$P_{j,x}^{g+1} = P_{j,x}^g + V_{g+1,x}$$\n$$P_{j,y}^{g+1} = P_{j,y}^g\
    \ + V_{g+1,y}$$\n\nwhere\n\n+   - $P_{j,x}^{g+1}$: new position for particle $j$\
    \ in generation $(g + 1)$ in $x$ dimension\n- $P_{j,x}^g$: current position for\
    \ particle $j$ in generation $g$ in $x$ dimension\n- $V_{g+1,x}$: new speed for\
    \ particle $j$ in $x$ dimension\n- $P_{j,y}^{g+1}$: new position for particle\
    \ $j$ in generation $(g + 1)$ in $y$ dimension\n- $P_{j,y}^g$: current position\
    \ for particle $j$ in generation $g$ in $y$ dimension\n- $V_{g+1,y}$: new speed\
    \ for particle $j$ in $y$ dimension\n\nAfter finding the new position for the\
    \ particle $j$, PSO calculates the fitness for this new position. If the new fitness\
    \ is better than the personal and/or global best fitness, it updates those parameters\
    \ accordingly. Regardless of the fitness value, particle $j$ moves to the new\
    \ location in the new generation. A simple implementation of the PSO algorithm\
    \ is given in Figure 18.1.\n\n```\nfor each particle\n    initialize particle\
    \ with feasible random number;\nend\nwhile (stopping criteria is not attained)\n\
    \    for each particle\n        Calculate the fitness value;\n        if (fitness\
    \ better than fitness value of P_best)\n            Set current value as the new\
    \ P_best;\n        end\n    end\n    Choose the particle with the best fitness\
    \ value among\n    all particles as g_best;\n    for each particle\n        Calculate\
    \ particle velocity;\n        Calculate particle position;\n        Update equation;\n\
    \    end\nend\n```\n\nFigure 18.1 A simple implementation of PSO."

    \ (e.g. literal symbols such as numbers or values of Boolean variables), P is\
    \ a set of production rules and S ∈ N is the start symbol [148]. Every rule in\
    \ P uses a meta-symbol ::= to define how to expand the non-terminals. In a production\
    \ rule, the symbol “|” separates alternative definitions for non-terminals. A\
    \ pair of symbols < and > define the start and the end of a non-terminal, respectively.\
    \ Elements of N are mapped to T using a sequence of rules. In these rules, an\

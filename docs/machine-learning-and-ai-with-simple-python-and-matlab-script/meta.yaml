    ## 7.4 CNN Components


    In general, a CNN is a neural network with special convolutional and pooling layers
    that perform operations on small regions of their inputs. These layers allow a
    CNN to handle large volumes of inputs and learn relationships between adjacent
    input pixels. CNNs are suited to applications where the inputs have spatial significance,
    such as pixels in image recognition or the words of a natural language sentence.
    The following are the different layers defined for a CNN (Figure 7.4):


    - **Convolutional layer (CL):** scans an input for a given set of features by
    performing convolutions on the input image using small filters; it is always followed
    by a RELU.

    - **Recti-linear unit (RELU):** applies the RELU activation function to its input,
    which is the output of a CL, setting all negative values to zero.

    - **Pooling layer (PL):** reduces the dimensions of its input, which is typically
    from a RELU, by keeping only the maximum value of local regions in its input.

    - **Unrolling layer (UL):** reshapes the 3-D input, which is typically from a
    PL or a ReLU, into a 1-D column of values that are readable by an ANN.

    - **ANN:** one or more fully-connected layers to generate CNN outputs.


    ## 7.5 A Numerical Example of a CNN


    Let us now consider an numerical example to classify a simple input image looking
    either like an **X** or an **O**, as shown in Figure 7.5. These two shapes are
    typically referred to as the two *classes* that the CNN will be designed to recognize.
    Therefore, there are two outputs for the CNN, namely $Y_1$ and $Y_2$, defined
    as follows:


    - If an input image is classified as an **O**, the outputs are: $Y_1 = 1, Y_2
    = 0$

    - If an input image is classified as an **X**, the outputs are: $Y_1 = 0, Y_2
    = 1$


    Suppose there are two filters, each of size $(2 \times 2)$, initialized to random

    select a combination of items that can be carried in the knapsack while offering
    the highest possible total value for the knapsack. Hence, a solution to the KP
    attempts to accomplish the following goal:


    $$\text{maximize} \sum_{j=1}^{n} x_j \cdot v_j \quad \text{subject to} \quad \sum_{j=1}^{n}
    w_j \cdot x_j \leq K_W, \qquad (15.1)$$


    where the binary variable $x_j$ is used to determine if an item $j$ should be
    placed in knapsack or not; hence $x_j \in \{0, 1\}$, $j = 1, 2, \cdots, n$. Since
    each item is either selected or not, this version of KP is referred to as *0-1
    KP*.


    # 15.3 A Simple Algorithm for the KP


    If one uses a straightforward approach for solving the KP by testing all possible
    solutions to it, for a KP with $n$ items to select, there are a total of $2^n$
    combinations of items to be considered. A simple algorithm with a similar approach
    for implementing 0-1 KP is shown in Figure 15.5, where all possible assignments
    of items are considered, then the knapsack is packed with items that make it the
    most valuable as the final solution.


    As seen in Figure 15.5, the number of steps needed to find a solution to the KP
    is exponential with respect to the number of items to be placed in the knapsack,
    as opposed to algorithms with linear or polynomial growth with the input size.
    Types of problems that do not have linear- or polynomial-time solutions are called
    *NP-complete* [114]. The amount of time to obtain a solution to an NP-complete
    problem grows exponentially as the input size grows linearly, which makes such
    problems prohibitively expensive for practical applications. The algorithm in
    Figure 15.5 has a complexity of $O(n2^n)$ (i.e. for $n$ items, it needs in the
    order of $n \cdot 2^n$ steps to complete), implying that addition of a single
    item to the set of items will double the time needed to complete its computation.
    Therefore, the algorithm in Figure 15.5 would be suitable only to solve KP applications
    with very small numbers of items. Considering that a realistic menu contains hundreds
    of food choices, computing KP solutions may easily require examining billions
    of combinations for even a modest-sized real-life problem. Therefore, techniques
    based on bio-inspired algorithms are a necessity for solving realistic knapsack
    class of problems in feasible time. In Section 15.5, we introduce a GA to solve
    the KP in linear time, even though the solution may not be an absolute global
    minimum or maximum but an approximation.'

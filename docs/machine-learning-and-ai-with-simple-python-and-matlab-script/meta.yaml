- img_proc: true
  md: 'using one-hot encoding and methods similar to it in terms of the size of the
    input vectors. In one-hot encoding, for each input character $x_t^o$, the input
    vector size is $(|I| \times 1)$ for an alphabet size of $|I|$, in which only a
    single element is set to one (i.e. one element is hot) and the remaining elements
    are all zeros. Recall that, in the example presented in Section 10.2.1, we defined
    one-hot encoding for input $\mathbf{h}$ as $\mathbf{h}^o = [1, 0, 0, 0]^\dagger$,
    where $\dagger$ represents the matrix transpose operation. However, if we were
    to use a realistic dictionary with tens of thousands of elements, it is clear
    that one-hot encoding would have generated infeasibly large input vectors. For
    these situations, to reduce the input vector size, we utilize embedding layers
    [94] at the front end of the RNN. The main goal of an embedding layer is to convert
    sparse input vectors (e.g. one-hot encoded words or characters) into dense vectors
    through matrix manipulations so that the computational complexity of RNN training
    is significantly reduced. For an embedding layer, we define a weight matrix, called
    $E$, with dimensions of $(e \times |I|)$, where $e$ and $|I|$ are the embedding
    width (sometimes referred to as embedding size) and the alphabet size, respectively.
    A one-hot-encoded input element $x_t^o$ is multiplied by the embedding matrix
    $E$ before being applied to the RNN encoder as $x_t = E \cdot x_t^o$. We can see
    from this equation that, for an input $x_t^o$ with dimensions of $(|I| \times
    1)$, multiplication by $E$ will result in an input vector $x_t$ whose dimensions
    are reduced to $(e \times 1)$. As an example, suppose we have $x_t^o$ and the
    elements of $E$ given as follows:


    ```

    $$x_t^o = \mathbf{h}^o = \begin{bmatrix} 1 \ 0 \ 0 \ 0 \end{bmatrix}, \quad \begin{bmatrix}
    0.8 & -0.3 & 0.1 & -0.1 \ 0.4 & -0.4 & 0.1 & -0.5 \end{bmatrix}.$$

    ```


    Implementing an embedding layer reduces the $x_t^o$ dimensions when applied to
    the RNN encoder as follows:


    ```

    $$x_t = E \cdot x_t^o = \begin{bmatrix} 0.8 & -0.3 & 0.1 & -0.1 \ 0.4 & -0.4 &
    0.1 & -0.5 \end{bmatrix} \cdot \begin{bmatrix} 1 \ 0 \ 0 \ 0 \end{bmatrix} = \begin{bmatrix}
    0.8 \ 0.4 \end{bmatrix}.$$

    ```


    Figure 10.7 presents a one-to-one single-cell RNN with an embedding layer of size
    2. Comparing the dimensions of the weights in Figure 10.7 with the example RNN
    without an embedding layer in Figure 10.6, we can clearly see the reduced dimensions
    in weight matrices due to embedding.

    In the general case, using an alphabet size of $|I|$ and $\mathcal{N}$ hidden
    layers in a one-to-one RNN with an embedding layer size of $|I| \times e$, parameter
    matrix dimensions are shaped as follows:


    +   - **Embedding:** $X^o : (|I| \times 1)$, $E : (e \times |I|)$

    - **Encoder:** $X : (e \times 1)$, $U : (\mathcal{N} \times e)$, $W : (\mathcal{N}
    \times \mathcal{N})$, $b : (\mathcal{N} \times 1)$, $H : (\mathcal{N} \times 1)$

    - **Decoder:** $V : (|I| \times \mathcal{N})$, $c : (|I| \times 1)$, $\Omega :
    (|I| \times 1)$

    - **Output:** $\hat{Y} : (|I| \times 1)$


    In the example shown in Figure 10.7, we have $|I| = 4$ and $\mathcal{N} = 2$.
    Selection of embedding layer width is based on user preference and depends on
    the characteristics of a given problem. For applications operating in or near
    real time with conditions changing rapidly, smaller embedding sizes are acceptable,
    whereas applications requiring less frequent training may employ larger widths.
    When an embedding layer is utilized in an RNN, the elements of the weight matrix
    $E$ are trained during the forward and back propagation processes just like the
    other RNN weight matrices, which is described next in Section 10.5.1.'

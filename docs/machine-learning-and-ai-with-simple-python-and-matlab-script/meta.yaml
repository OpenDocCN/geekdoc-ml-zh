    **Figure 11.4** Weight matrix dimensions in a many-to-many RNN with 256 hidden
    layers and an embedding layer of size 128 used in chatbot implementation for a
    dictionary size of 565 words.


    As presented in Section 10.5 in Chapter 10, adopting an embedding layer in RNNs
    generates compact representations of input vectors and, hence, significantly reduces
    the computational cost of the training process. Figure 11.4 shows the weight matrix
    dimensions for an RNN with 256 hidden layers and an embedding matrix $E$ of size
    ($128 \times 565$) with a 565-word dictionary used in the Python and Matlab scripts.
    Recall from Eq. (10.20) in Chapter 10 that for the embedding layer the matrix
    multiplication is defined as $X = E \cdot X^o$, where $X^o$ is the one-hot-encoded
    input vector.


    # 11.4 Python Script for a Chatbot Using an RNN


    In this section we present a sample Python script implementing the simplistic
    chatbot described in Section 11.3 as a many-to-many RNN. This RNN is constructed
    with the same architecture shown in Figure 11.4 with 256 hidden layers and an
    embedding size of 128 for processing user queries from a dictionary of 565 unique
    words. After digesting the sample code presented below, the reader is encouraged
    to experiment by changing the parameters for the RNN architecture and training
    in order to gain a good understanding of the impact of each one on the RNN prediction
    accuracy.


    In line 23, the number of samples to train the RNN is set as 500. In line 24,
    the `batch size` is set to 16, which is a training parameter for the number of
    input samples to be handled at one time per'
  - '[PAGE 201]


    epoch. For example, if there are 1000 data samples and the batch size is 100,
    during one epoch, the RNN will process 10 batches, each of which has 100 input
    samples. By processing sample data in small chunks, we limit the matrix dimensions
    during training (in this case to 16), whereas handling all input samples at once
    would require manipulating matrices with much larger dimensions (in this case
    1000) with a much higher computational cost. In line 25, the number of hidden
    layers is set to 256, which implies that the RNN utilizes 256 encoders operating
    in parallel. In this case, if embedding is not used, the dimensions of U would
    be (256 × 565), where we use I = 500 samples containing a total of |I| = 565 unique
    words. In line 26, we set the number of epochs as 1000, which is the total number
    of forward and back propagations used training the RNN. In line 27, the embedding
    layer size is set as 128, which means that dimensions of E will be (128 × 565).
    With embedding, a single input sample size is reduced from (565 × 1) to (128 ×
    1) as shown in Figure 11.4. Embedding reduces the dimensions of U from (256 ×
    565) to (256 × 128).


    In lines 29–41, the function named `tokenize` accepts the data sample set as its
    input, converts the words into numeric tokens and adds padding based on a user-defined
    maximum sequence length. Padding [101] is a useful technique in handling variable-length
    input and output sequences, where all inputs and outputs are padded with blank
    characters to make them appear to have equal lengths. In line 33, an alphabet
    called `lang_tokenizer` is created based on input samples, which is encoded in
    line 37 using sparse one-hot encoding [92]. In lines 39 and 40, padding is added
    to the encoded alphabet. In lines 43–51, the `load_dataset` function, whose inputs
    are the sample inputs and the expected outputs, generates the encoded and padded
    sample inputs called `input_tensor` (i.e. the X set), the expected outputs called
    `target_tensor` (i.e. the Y set) and the alphabets for both inputs and expected
    outputs called `lang_tokenizer`.


    In lines 53–64, the `create_rnn_model` function creates the RNN model. In line
    58, an embedding layer using the alphabet size and embedding dimension is created;
    similarly, an encoder using the number of hidden layers is created in line 60
    and a decoder using the size of expected output alphabet in line 62.


    In lines 66–92, the `predict` function is implemented, which generates a response
    for a given user input sentence as follows. In line 69, special start and end
    words are added. In line 71, the words are converted to numeric vectors and, in
    lines 72–74, padding is added. In line 76, the input queries are converted to
    the tensor flow data type to be used later in the RNN model on line 78. A vector
    called `prediction` containing the outputs of the `softmax` unit is also created
    at line 78. In line 83, the index of the highest probability value in the prediction
    is found by the `tf.argmax` function. In lines 88 and 89, the tokens are converted
    to words. After removing the tags, the function returns the predicted output sentence.


    In lines 94–104, the input samples are read from a file and split into sample
    inputs and corresponding outputs, which are then loaded into matrices called `input_tensor_train`
    and `target_tensor_train`, respectively, in line 103. An RNN model is created
    in line 110 using the parameters defined above, namely the alphabet size, embedding
    dimension and number of hidden layers. In line 113, a tensor flow object called
    `optimizer`, which uses gradient descent for optimization (i.e. the Adam option),
    is created. In lines 114–115, the loss function is defined as a sparse cross-entropy
    loss [93]. In lines 127 and 128, the RNN is trained using the input and output
    matrices, the number of epochs, the batch size and the choice for the `shuffle`
    operation (if true, the order of input samples is shuffled at each epoch) and
    stored into an object called `model`. The remaining lines are for a simplistic
    user interface to either train a new RNN or use a previously trained one, to ask
    queries either directly on screen or from a previously recorded file and for storing
    the current results.'

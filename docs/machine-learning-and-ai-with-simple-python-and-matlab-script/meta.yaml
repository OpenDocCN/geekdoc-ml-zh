    \ 'MSFT.csv';\n12 % df代表数据框\n13 df = readtable(historical_data_file, 'PreserveVariableNames',\
    \ true);\n14 \n15 % 仅保留收盘价\n16 df = df(:, {'Close'});\n17 \n18 short_window =\
    \ 5;\n19 long_window = 25;\n20 \n21 % 计算简单移动平均线并将其添加到df的新列中；\n22 % rolling表示从当前条目开始的移动窗口\n\
    23 % 和过去5天（在变量浏览器中打开df查看数值）\n24 df.SMA = movmean(df.Close, short_window);\n25\
    \ % 计算指数移动平均线并将其添加到df的新列中；\n26 % ewm表示指数移动平均线\n27 df.EMA = movavg(df.Close, 'exponential',\
    \ long_window);\n28 % 计算动量并将其添加到df的新列中；\n29 % 动量定义为收盘价[今日] / 收盘价[5天前]\n30 df.Momentum\
    \ = df.Close./ lagmatrix(df.Close, short_window);\n31 std_vals = movstd(df.Close,\
    \ short_window, 'Endpoints', 'discard');\n32 % 计算滚动窗口内SMA的标准差\n33 % 将自由度设为零以获得总体标准差\n\
    34 df.STD = padarray(std_vals, [short_window-1 0], NaN, 'pre');\n35 % 计算每日的布林带\n\
    36 % BB > 1 表示收盘价高于上轨\n37 % BB < -1 表示收盘价低于下轨\n38 df.BB = (df.Close - df.SMA)./\
    \ (2 * df.STD);\n39 \n40 % 计算每日收盘价的百分比变化\n41 % shift(1) 表示昨天（适用于df的每个元素）\n42 increase\
    \ = df.Close - lagmatrix(df.Close, 1);\n43 % 将百分比变化移动到前一天，使其现在代表\n44 % 次日的百分比变化（使用-1将df元素向上移动1位）\n\
    45 df.Percent_Change = (increase./ lagmatrix(df.Close, 1)) * 100;\n46 df.Percent_Change\

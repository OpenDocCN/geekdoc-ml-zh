    **Figure 17.3** Covering cities and towns in Sweden and Germany with near-optimal
    total length cycles (taken from [124]/University of Waterloo).


    ![](img/a83d807f9a9119b1472555c0ef55797e_296_1.png)


    **Figure 17.4** A near-optimal tour of 3100 county seats in the USA is 93 466
    miles (taken from [126]/University of Waterloo).


    these cities, together with their lengths, are shown in Figure 17.5, where several
    possible solutions are presented. The trip that visits Detroit, Chicago, Indianapolis,
    Columbus and back to Detroit is the minimum-cost solution in Figure 17.5b. Note
    that the solution to a TSP may not be unique, and there may be multiple cycles
    with the same minimal cost.


    Let us now formally define the TSP. Suppose an edge-weighted, undirected graph
    $G$ is given as $G = (V, E, w)$, where $V$ is a set of vertices with $|V| = n$
    (i.e. $V = v_1, v_2, \cdots, v_n$) and $E$ is a set of directed edges with $|E|
    = m$ (i.e. $E = e_1, e_2, \cdots, e_m$). A function $w$ maps the edges to their
    corresponding weights (e.g. traversal costs, lengths or difficulty); hence $w(e_i)
    = w_i, \forall e_i \in E$. In other words, each edge $e_i \in E$ is associated
    with a cost $w_i$. A *path* in $G$ is defined as a sequence of edges, where each
    edge appears only once (all edges may not be included in a path). A *cycle* in
    $G$ is defined as a path that starts and ends at the same node. A *Hamiltonian
    cycle* $H_c$ is a cycle that covers all nodes in $G$ exactly once except for the
    starting and ending nodes. Based on these definitions, the goal of the TSP is
    to find a Hamiltonian cycle with the lowest total weight in'

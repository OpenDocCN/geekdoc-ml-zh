    \n```matlab\nprediction=predict(model,latest_inputs)\n```\n\n其中，预测的新一天价格百分比变化存储在变量`prediction`中。\n\
    \n```matlab\n1 % 纽约市立学院，纽约城市大学\n2 % 由Olga Chsherbakova编写\n3 % 日期：2023年11月\n4 %\

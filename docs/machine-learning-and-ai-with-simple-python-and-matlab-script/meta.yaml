    # 6.3.4 ANN Architecture


    A fully-connected ANN architecture is selected for this NLP example as shown in
    Figure 6.7, where there are 16 inputs (14 keywords, opening price and traded volume),
    two hidden layers with four and eight neurons, respectively, and one output layer
    (percentage change in closing price). As noted in earlier chapters, inputs, the
    number of inputs, hidden layers, neurons in each hidden layer, outputs and other
    ANN architecture parameters are selected based on collaboration among various
    subject matter experts and software engineers.


    The training process for the ANN defined in this example can be summarized as
    follows. Initially, random values are assigned to the weights and biases of the
    ANN. Then, the 193 input samples are propagated through the ANN by forming an
    input matrix with size of (193 × 16) as described in Chapter 2. For each input
    sample, an error is calculated based on the difference between the generated ANN
    output and the historical financial market data for that day. Using back propagation,
    the error values for weights and biases are reduced by updating the weight and
    bias values. After a pre-determined number of epochs, the training process ends,
    at which point the ANN is ready to generate predictions of financial market movements
    based on new tweets. When there is a new



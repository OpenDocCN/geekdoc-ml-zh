    \ CNN implemented in Matlab above is shown in Figures 8.8a and b, where a CNN\
    \ is trained and the user is asked to draw a character. The input is then predicted\
    \ by CNN_Predict, and both the user input and the corresponding reference image\
    \ from the ReferenceSet folder are displayed.\n\n## 130 | 8 CNNs for Optical Character\
    \ Recognition\n\n![](img/a83d807f9a9119b1472555c0ef55797e_151_0.png)\n\n![](img/a83d807f9a9119b1472555c0ef55797e_151_1.png)\n\
    \n(a)\n\n(b)\n\nFigure 8.8 A sample run of the Matlab scripts given in Section\
    \ 8.5: (a) a CNN is trained and the user is asked to draw a character, and (b)\
    \ the user input is fed into the trained CNN on the left, which first identifies\
    \ the image and displays the corresponding reference image from the ReferenceSet\
    \ folder on the right.\n\n## 8.6 Concluding Remarks\n\nIn this chapter, we introduce\
    \ a CNN for the OCR class of problems, where a set of input image samples are\
    \ used to train a CNN. OCR is widely used in applications such as postal automation,\
    \ capturing licence plate numbers, conversion of physical documents to editable\
    \ text files and assistance for the blind and visually impaired. We cannot employ\
    \ ANNs for OCR applications since they would be overwhelmed if multi-dimensional\
    \ images with high pixel counts were directly fed into them, which makes CNNs\
    \ the most suitable AI tools for OCR applications. A CNN architecture designed\
    \ for OCR contains multiple CL-PL pairs to improve prediction capabilities. The\
    \ designers have to be mindful of the computational cost of training when constructing\
    \ a CNN topology since, especially with a high number of samples, it could easily\
    \ make a realistic project infeasibly expensive.\n\n## 8.7 Exercises for Chapter\
    \ 8\n\n- 1) Implement a CNN in Python similar to the one given in Section 8.4\
    \ to recognize the following words: yes, no, up, down. User input will be written\
    \ using Japanese characters. Display the result in a user-selected language: (1)\
    \ Japanese, (2) Polish, (3) Spanish, (4) Filipino, (5) Swedish, and (6) English.\n\
    - 2) For the example in Exercise 1, if you increase the number of CL-PL pairs\
    \ in the CNN, how do you think this change will impact the CNN prediction performance?\
    \ For each additional CL-PL pair, can you detect a difference in time for training\
    \ on your own processor?\n- 3) For the example in Exercise 1, if you keep the\
    \ CL–PL pairs the same but increase the pool and filter sizes, how do you think\
    \ this change will impact the CNN prediction performance? How much do you have\
    \ to increase their sizes until you can detect a difference in training time on\
    \ your own processor?\n- 4) Repeat to Exercise 1 for the input language of Polish.\n\
    - 5) Repeat to Exercise 1 for the input language of Spanish.\n- 6) Repeat to Exercise\
    \ 1 for the input language of Filipino.\n- 7) Repeat to Exercise 1 for the input\
    \ language of Swedish.\n- 8) Repeat Exercise 1 for a CNN implemented in Matlab\
    \ similar to the one presented in Section 8.5.\n\n# 9\n\n## CNNs for Speech Recognition\n\
    \n### 9.1 Introduction\n\nIn this chapter, we introduce a simple CNN implementation\
    \ for speech recognition, which is the ability for a computer program to recognize\
    \ speech or recorded audio in any format. In typical applications, recognized\
    \ and identified speech will most likely be converted to another format such as\
    \ text or a digital record, thereby significantly increasing the influence of\
    \ speech recognition in the daily usage of various intelligent systems. Many modern\
    \ devices have built-in speech recognition capabilities through virtual assistant\
    \ applications such as Alexa from Amazon and Siri from Apple [81]. Other popular\
    \ speech recognition applications include customer service systems used by many\
    \ commercial entities ranging from car rental companies to credit card services,\
    \ automatic generation of subtitles, machine translation tasks, assistance for\
    \ the disabled and background noise elimination in loud environments (e.g. noise\
    \ cancellation devices used in helicopters or submarine vessels).\n\nA spectrogram\
    \ [82] is a diagram that plots the spectrum of frequencies in an audio sample\
    \ over time. The spectrogram is calculated by using the Fourier transform to identify\
    \ the frequencies present in an audio clip in a given time window [83]. The pixel\
    \ width of a spectrogram represents the number of time divisions in an audio file.\
    \ For each time division, the Fourier transform is calculated, producing a column\
    \ of pixels that show the spectrum of frequencies during that sliver of time.\
    \ Pixels with high values signify that a certain frequency is active in the audio\
    \ clip during that moment in time. An example spectrogram is shown in Figure 9.1\
    \ for an audio sample, where each black pixel represents the frequencies present\
    \ in the audio at certain times [84]. In a spectrum, the y axis represents different\
    \ frequency values, whereas the x axis shows the elapsed time. In Figure 9.1,\
    \ the frequency values are between 0 and 10^4 Hz, while the time extends from\
    \ 0 to 0.836 seconds.\n\nIn this chapter, we introduce Python and Matlab scripts\
    \ to implement CNN architectures to recognize a specific a set of spoken words\
    \ and translate them into different languages. Although it is rather simplistic,\
    \ the example CNN presented in this chapter illustrates the basic principles of\
    \ employing CNNs for the speech recognition class of problems. Readers are encouraged\
    \ to experiment with CNN parameters such as the number and types of layers, filter\
    \ quantities and sizes, and the number of epochs for training and observe their\
    \ impact on prediction accuracy.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_155_0.png)\n\
    \nFigure 9.1 A speech spectrogram; each black pixel represents the frequencies\
    \ present in the audio at certain times.\n\n### 9.2 A Simple CNN for Speech Recognition\n\
    \nSince audio signals can be represented as digital information in a spectrogram,\
    \ they can be used as inputs to a CNN. Similar methods to those used for character\
    \ recognition by CNNs introduced in Chapter 8 can now be employed for speech recognition.\
    \ The CNN in this example reads a spectrogram image of a spoken word with size\
    \ (1 × 40 × 198) and identifies the spoken word input as one of the stored reference\
    \ audio files. Similar to the example CNN presented in Chapter 8 for OCR applications,\
    \ multiple CL–PL pairs are employed for speech recognition to reduce the size\
    \ of the spectrogram input (i.e. to down-sample the input) and to improve the\
    \ CNN’s predictive power. In this way, the CNN will work with smaller sized inputs,\
    \ which in turn will reduce the time and\n\n![](img/a83d807f9a9119b1472555c0ef55797e_155_1.png)\n\
    \nFigure 9.2 A typical CNN architecture example for speech recognition applications\
    \ (multiple layers are used in the CNN to reduce the size of the spectrogram input\
    \ so that training is faster and over-fitting is reduced)."

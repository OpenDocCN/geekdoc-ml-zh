  - '[PAGE 301]


    created using this input file in line 20. In line 22, a function defined in the
    gps library called `generate_distance_matrix` is invoked to compute the connectivity
    matrix for the cities. Chromosome length is defined as the number of cities in
    line 25. In lines 32 to 50, the chromosome and population are defined for use
    later by the GA implementation in the Python library. In lines 53 to 62, the fitness
    function is implemented as a loop adding the cities'' distances as presented in
    the connectivity matrix. The fitness value includes the distance for the return
    journey from the last city to the start in line 56. Crossover, mutation and selection
    operators are defined in lines 69, 72 and 75, respectively. The GA implementation
    in Python has the following format:


    ```

    algorithms.eaSimple(pop, toolbox, xoProb, mutProb, gens, selectCrit)

    ```


    where `pop`, `toolbox`, `xoProb`, `mutProb`, `gens` and `selectCrit` are the population,
    Python library name, crossover probability, mutation probability, number of generations
    and selection criteria, respectively. Therefore, the call to invoke the GA in
    line 84 becomes


    ```

    algorithms.eaSimple(pop, toolbox, 0.7, 0.2, 40, halloffame=best_genome)

    ```


    where `halloffame` is identified as the best genome to be selected. In lines 103
    to 156, the best solution is plotted on a map.


    Note that a regular crossover operator for GA-based TSP implementation may be
    problematic if it is not designed carefully. It is possible that a pair of valid
    chromosomes may generate invalid offspring after the crossover operator is applied.
    For example, consider the parent chromosomes shown in Figure 17.12a defined as
    [1 2 3 4 5] and [3 2 1 5 4]. Suppose crossover will be applied after the top two
    most significant positions. In this case, the offspring will be [1 2 1 5 4] and
    [3 2 3 4 5], which are invalid since there are duplicate cities in both cases.
    A crossover operation where the codons of an offspring are generated as permutations
    of the parent codons is implemented in line 69 as


    ```

    toolbox.register("mate", cxPartiallyMatched)

    ```


    where partially matched (or mapped) crossover [131] is implemented with two crossover
    points as shown in Figure 17.12b. First the middle sections of parents 1 and 2
    are copied into offspring 2 and 1, respectively, which defines a mapping as: 3
    ⇔ 2, 4 ⇔ 6, and 5 ⇔ 1. Then, based on this mapping, the most significant two bits
    of parent 1 (i.e. 1 and 2) are mapped into offspring 1 as bits 5 and 3. Similarly
    the least significant bit of parent 1 (i.e. 6) is mapped into offspring 1 as bit
    4. Offspring 2 is obtained in the same manner.


    ![](img/a83d807f9a9119b1472555c0ef55797e_301_0.png)'
  - "[PAGE 302]\n\nFigure 17.13 (a) Mutation operator generates an invalid offspring\
    \ with duplicated cities, and (b) shuffling indices for mutation preserves the\
    \ validity of an offspring.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_302_0.png)\n\
    \nA similar concern is also present for the mutation operator. If it is implemented\
    \ without special care, a mutated offspring may be invalid. Consider the example\
    \ in Figure 17.13a, where an offspring defined as [ 1 2 3 4 5 ] will be mutated\
    \ at the second most significant position. By replacing this codon randomly (e.g.\
    \ from 2 to 4), an offspring may end up as [ 1 4 3 4 5 ], which is invalid since\
    \ there is a duplicate codon value. However, implementing mutation as shuffling\
    \ two codons will always preserve the validity of an offspring. In Figure 17.13b,\
    \ mutation operator selects two codons and shuffles them, resulting in a mutated\
    \ but valid offspring. This mutation operator that shuffles the codon values is\
    \ implemented in line 72 as\n\n```\ntoolbox.register(\"mutate\", mutShuffleIndexes,\
    \ indpb=0.05)\n```\n\nwhich indicates that the mutation operator is to be executed\
    \ with a probability of 0.05. In line 87, the best solution is saved in an array\
    \ called best_path. In lines 93–101, the cost of the best path is computed. Between\
    \ lines 106 and 156, this path is shown on a map using Python libraries.\n\n```\n\
    1 # The City College of New York, City University of New York\n2 # Written by\
    \ Ricardo Valdez\n3 # August, 2020\n4 \n5 # travelling SALESMAN PROBLEM IMPLEMENTATION\
    \ USING GA\n6 # THIS IMPLEMENTATION USES deap LIBRARY FUNCTION CALLED eaSimple()\n\
    7 # deap: distributed evolutionary algorithms in python\n8 # ea: evolutionary\
    \ algorithm\n9 # DEPENDENCIES: deap, basemap, and basemap-data-hires\n10 from\
    \ deap import creator, base, tools, algorithms\n11 import random\n12 import gps\n\
    13 import pandas as pd\n14 import matplotlib.pyplot as plt\n15 from mpl_toolkits.basemap\
    \ import Basemap\n16 \n17 cities_file = 'cities.csv'\n18 \n19 # load city data\
    \ into a dataframe df\n20 df = pd.read_csv(cities_file)\n21 ## generate a weight\
    \ matrix where the weights are the distances between cities\n22 distance_matrix\
    \ = gps.generate_distance_matrix(df)\n23 \n24 ## set chromosome length to the\
    \ number of cities\n25 CHROM_LENGTH = len(distance_matrix)\n26 \n27 ## create\
    \ a variable called FitnessMin with the create() function.\n28 ## FitnessMin inherits\
    \ from base.Fitness and it will store whether\n29 ## the fitness should be minimized\
    \ or maximized:\n30 ##     if weights == -1.0, then minimize the fitness\n31 ##\
    \     if weights == 1.0, then maximize the fitness\n32 creator.create(\"FitnessMin\"\
    , base.Fitness, weights=(-1.0,))\n33 ## create a variable called Individual that\
    \ will determine the\n34 ## datastructure used for the chromosome.\n35 ## Individual\
    \ inherits from list and it will store integers.\n36 creator.create(\"Individual\"\
    , list, typecode='i', fitness=creator.FitnessMin)\n37 \n38 ## initialize a new\
    \ toolbox variable to configure GA parameters:\n39 toolbox = base.Toolbox()\n\
    40\n```"
- md: "## 17 GAs for Route Optimization\n\n```python\n## configure the population\
    \ of the GA so that each chromosome is initialized\n## as a random permutation\
    \ of the sequence from 0 to CHROM_LENGTH-1\n## range(CHROM_LENGTH): creates a\

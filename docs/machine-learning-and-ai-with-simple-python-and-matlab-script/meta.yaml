  - '[PAGE 40]


    links to 3 neurons, there are 6 sets of multiplications and 3 computations of
    the activation function. For the single output layer, there are 3 incoming links,
    there are 3 multiplications and 3 computations of activation function. Let the
    number of links and neurons in the $i^{th}$ layer be $|W^{(i)}|$ and $|S^{(i)}|$,
    respectively. For the general case, for forward propagation, the number of multiplications
    and activation function computations for one input–output sample are


    $$cost_M^1 = \sum_{i=1}^{H} |W^{(i)}||S^{(i)}|c_m \quad cost_A^1 = \sum_{i=1}^{H}
    |W^{(i)}||S^{(i)}|c_a,$$


    where $c_m$ and $c_a$ are the computational costs for multiplication and activation
    function computation, respectively. For the sake of simplicity, suppose back-propagation
    cost is comparable to forward propagation for a given iteration. If there are
    $|X|$ samples, the computational cost of training for one epoch is


    $$cost_{ANN}^1 = 2|X| \left( \sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m + c_a) \right).$$


    For $N$ forward- and back-propagation iterations, the training cost becomes


    $$cost_{ANN}^N = 2N|X| \left( \sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m + c_a) \right).
    \tag{2.18}$$


    Using $\mathcal{O}$ notation to indicate the order of magnitude for computational
    complexity [35], the cost for training a fully-connected ANN (i.e. all neurons
    are connected to all others in consecutive hidden layers), we have


    $$cost_{ANN}^N = \mathcal{O}(N \ |X| \ H \ |W| \ |S|)(c_m + \cdot c_a). \tag{2.19}$$


    Consider a typical numerical application for a fully-connected ANN with $H = 32$
    layers, each with $S = 32$ neurons, using $X = 10^5$ data samples over $N = 10^4$
    iterations. Using Eq. 2.18, the computational cost for training such an ANN is


    $$cost_{ANN}^{10^4} = 2 \cdot 10^4 \cdot 10^5 \left( \sum_{i=1}^{32} 10^3(c_m
    + c_a) \right) = \mathcal{O}(10^{13})(c_m + c_a).$$


    Since for realistic applications, training may require hundreds or thousands of
    iterations using tens of thousands of samples over ANNs with tens of hidden layers
    each of which has tens of neurons, computational complexity may quickly become
    infeasibly large if design engineers are not cognizant of such costs.


    # 2.11 Normalization of ANN Inputs and Outputs


    For applications where there are numerical imbalances between input and output
    values, it is possible to experience computational inaccuracies due to rounding,
    truncation and similar types of approximations. To alleviate such numerical problems,
    inputs and outputs are typically scaled down (i.e. normalized) to be within the
    range of relatively small integers. An example of normalization is as follows:


    $$\overline{X}_i = \frac{X_i - \min(X)}{\max(X) - \min(X)}, \quad \overline{Y}_i
    = \frac{Y_i - \min(Y)}{\max(Y) - \min(Y)},$$'
  - '[PAGE 41]


    where $X_i$ and $\overline{X}_i$ are the values of the $i^{th}$ input before and
    after normalization, respectively. Similarly, $Y_i$ and $\overline{Y}_i$ are the
    $i^{th}$ output values before and after normalization, respectively. Depending
    on the application, inputs are normalized separately over multiple samples. Similarly,
    values of a single output over multiple samples are normalized. If a group of
    inputs are at the same level of importance, they may be normalized together. For
    example, if the input values are positive, we can use $\min(X) = 0$. Similarly,
    if the output range is $[0, 100]$, we have $\min(Y) = 0$ and $\max(Y) = 100$.
    Normalization is a sound practice since it tries to prevent precision issues in
    calculations and helps accelerate convergence to better solutions [36].


    # 2.12 Concluding Remarks


    In this chapter, general concepts of ANN architecture and training process are
    outlined. ANNs are one of the most popular tools in AI for solving problems that
    are based on large amounts of data. In an ANN, a given set of inputs are modified
    by a set of weights and activation functions to generate outputs that match the
    real data points measured in an experiment or an event. There are a class of problems
    that are suitable to be solved by ANNs. For example, `classification problems`
    and image identification tasks are excellent candidates for ANNs. In such applications,
    there are typically a large number of inputs, and their respective outputs are
    available (typically sample sizes range from tens to hundreds of thousands or
    higher). A process called `training` aims to find the weight values such that
    the difference between real and calculated values of outputs are minimized (or
    they are as small as possible within the limits defined for the process).


    There have been several different types of ANNs developed in recent years. Convolutional
    neural networks (CNNs), recurrent neural networks (RNNs), large language models
    (LLMs) and transformers are among the most popular ones. In an RNN (See Chapters
    10 and 11), values from the output layer are sent back to the hidden layers to
    be used in follow-up processing of the signal. Using the attention mechanism in
    RNNs, machine translation tasks become feasible, as discussed in Chapters 12 and
    13. A good survey for language models can be found in [37].


    Modelling challenging real-life problems to be solved by ANNs requires experience
    and the analytical skill set of engineering disciplines. Computational complexity
    of training grows by the product of the number of neurons and the number of hidden
    layers. Therefore, one has to be cognizant of computational cost of training when
    designing ANN architectures for real-life applications.


    # 2.13 Exercises for Chapter 2


    +   1) How would the performance of the ANN given in Figure 2.6 be impacted if
    there were two hidden layers?

    2) How would the performance of the ANN given in Figure 2.6 be impacted if the
    learning rate of $\alpha$ were increased tenfold in terms of converging to an
    acceptable solution by reducing the output error?

    3) How would the performance of the ANN given in Figure 2.6 be impacted if the
    learning rate of $\alpha$ were decreased tenfold in terms of converging to an
    acceptable solution by reducing the output error? Compare your answer with Exercise
    2.

    4) Consider the ANN given in Figure 2.6. Suppose one doubles the number of neurons.
    How will the ANN performance be impacted in terms of converging to an acceptable
    solution by reducing the output error?'
- md: '## 3 ANNs for Optimized Prediction


    ### 3.1 Introduction


    ANNs can be effectively used for prediction of outcomes based on historical data
    if they are properly designed and effectively trained with sufficiently large
    numbers of samples. To be able train the weights of an ANN, a set of sample input
    and output data collected from the field or observed during an experiment are
    needed, as described in Chapter 2. Depending on the application, the number of
    samples typically ranges from thousands to hundreds of millions or even more.
    Input values of data samples are applied to the neurons of a hidden layer after
    being multiplied by the link weights. Following modification by summation and
    activation functions at each neuron, input signals propagate to the next hidden
    layer and finally to the ANN output layer. An error value is computed based on
    the difference between the real and calculated output values. These steps are
    called a forward propagation. Then, as part of the error minimization (or at least
    reduction) process, a back propagation is performed by computing partial derivatives
    of the error with respect to the link weights starting at output layer and working
    back to the input layer, as described in Chapter 2.


    Consecutive forward and back propagation iterations (called epochs) over ANN layers
    reduces the error until either a satisfactorily small value is obtained, a limit
    for the number of epochs is reached or another stopping criterion is met. As mentioned
    earlier, for an ANN to be properly trained, large sets of data are needed. The
    larger the sample size, the more accurate the predictions are expected to be from
    an ANN. Training with fewer data samples tends to over-fit link weights to satisfy
    the input and output values, which causes inaccurate predictions when inputs with
    different value ranges are applied to the ANN. The intention of using a large
    number of samples is that they hopefully have a wide range of input and output
    values to cover the operation space adequately – having many samples with similar
    values will not help to train an effective ANN.


    In this chapter, we provide two examples of arguably one of the most popular applications
    of ANNs: outcome prediction based on historical data. The first example, presented
    in Section 3.5, involves designing an ANN to be used to predict the grade from
    an exam based on two inputs, namely, the hours of sleep and study spent by a student
    in preparation for the exam (the example is taken from [31]). For this simplistic
    but very relatable example, we present step-by-step descriptions of forward- and
    back-propagation operations.


    The second example, in Section 3.6, constructs and trains an ANN to predict the
    number of rental bikes needed for a future date based on several inputs, including
    the day of the week, the air temperature and the wind speed (taken from [38]).
    This case study is inspired by data obtained for bike rentals in London, UK.


    Real-life versions of these example ANNs can be used to predict the outcomes for
    new situations. For example, a student can predict the expected number of hours
    to sleep and study for an incoming exam in order to receive a grade over 90, which
    may require schedule adjustments accordingly. Similarly, a bike rental company
    can predict how many bikes will be needed at the weekend and perhaps hire extra
    help to manage the rentals as needed.


    ### 3.2 Selection of ANN Inputs


    When constructing an ANN for a given application, one of the most important decisions
    is the selection of ANN inputs. For example, one may consider using the data collected
    from experiments to be considered as ANN inputs (e.g. the number of hours that
    a plant is exposed to the sun, the amount and frequency of water given to the
    plant and so on). For some applications, measurements in the field utilized as
    ANN inputs may be effective in generating acceptable predictions. However, applying
    observed data directly as ANN inputs may not be preferable for certain cases,
    especially if the number of inputs is infeasibly large or is not directly related
    to outputs (e.g. it may be irrelevant to use names of the weekdays for a plant
    growth application). ANN inputs may also be derivatives of data collected from
    field experiments or observations of events, typically statistical or mathematical
    transformations of the observed data. For example, it may be preferable to use
    the average, highest or lowest daily temperatures as an ANN input instead of hourly
    measurements recorded during experiments. In another application, the moving average
    of a financial stock calculated over the last several weeks may be preferable
    to directly using its selling price obtained from stock exchange records. It is
    also possible to combine directly observed measurements with the values derived
    from them. For example, average air temperature together with the day of a week
    could be relevant inputs for an ANN designed for predicting daily bus repairs
    in a transportation company. If a weekday is Friday, Saturday or Monday may be
    irrelevant to a plant watering study but has considerable significance for bus
    schedules. In practice, designers employ whatever available data they deem to
    be suitable for their purposes and decide which combination of inputs will train
    an ANN for the most accurate prediction. Selection of proper inputs is an ongoing
    process and may take significant effort in considering different inputs sets until
    a satisfactory set is defined.


    For the two examples studied in this chapter, to keep them as simple as possible,
    all inputs are directly measured parameters in the respective fields: number of
    hours a student sleeps and studies for the first example, and various measurements
    kept by the bike rental company, such as wind speed, temperature, time of day
    and similar measurements.


    ### 3.3 Selection of ANN Outputs


    In addition to selection of its inputs, successful deployment of an ANN also requires
    that the outputs are chosen in such a way that the ANN generates the most useful,
    accurate and reliable predictions. Similar to the selection of inputs, outputs
    can be assigned either as directly measured observations for an experiment or
    as derived values based on measurements. For example, for an ANN constructed to
    predict growth of a cancerous tumour, possible output selections may include the
    tumour size measurements or the growth rate of the tumour. For the latter case,
    the tumour size of a patient would need to be measured over a period of time and
    a growth (or shrinkage) rate computed based on the measurements. In other examples
    of ANNs, outputs can represent classification decisions. For example, for an ANN
    whose input is the text of an email, a possible output may be the decision as
    to whether the email is genuine or spam. For this case, there may be two outputs
    (e.g. labelled as genuine and spam), only one of which will be true, or a single
    output whose value indicates the ANN decision (e.g. 1 is a genuine email and 0
    is spam). For a given ANN application, selection of suitable outputs typically
    requires experience and domain knowledge.


    In the two case studies presented in this chapter, for the sake of simplicity,
    directly observable outputs are selected: expected exam grade for the so-called
    sleep-study ANN and the number of rentals for the London bike sharing ANN.


    ### 3.4 Construction of Hidden Layers


    Another important design component is the selection of the number of hidden layers
    and the number of neurons in each layer. There is no straightforward formula that
    dictates the rules for these decisions. Similar to other ANN design parameters,
    a knowledge- and experience-guided trial-and-error approach seems to be a reasonable
    path in constructing an ANN architecture that consistently generates reliable
    and accurate solutions for a given application. For instance, image processing
    problems may require ANNs with many hidden layers to detect various features in
    an input image (e.g. tumours, nodules or other anomalies), whereas financial applications
    may be more successful with ANN architectures employing smaller numbers of hidden
    layers but each having a large number of neurons (e.g. for detection of financial
    trends without over-fitting the link weights over many hidden layers).


    The time required to train an ANN is an important performance metric, especially
    for cases where they need to be trained often (e.g. a few times per day or more
    frequently). As discussed in Section 2.10 in Chapter 2, training time is directly
    proportional to the number of hidden layers and the number of neurons in each
    layer, together with the number of connections between consecutive layers. As
    implied by Eqs. (2.18) and (2.19), increasing the number of hidden layers will
    exponentially increase the computational cost of training, which is a serious
    issue to be handled by the ANN designer if there are a large number of input/output
    samples to be used for training.


    Another important observation from Eqs. (2.18) and (2.19) is the selection of
    number of epochs to be used in training, where link weights and biases are adjusted
    based on error values observed at the outputs. It is clear that for ANNs requiring
    large sets of data samples (e.g. hundreds of thousands or millions), one cannot
    arbitrarily increase the number of hidden layers, neurons and epochs for applications
    where the ANN will be re-trained often (e.g. hourly, daily or weekly). If an ANN
    for reliable predictions of stock movements for the next day requires a week to
    train, the ANN outputs will not be meaningful to its users no matter how accurate
    they may be. These trade-offs are an essential part of the ANN design process,
    especially for critically important applications, such as medical, military, live
    traffic, power, water supply or nuclear control tasks.


    ### 3.5 Case Study 1: Sleep-Study Example


    In our first example (from [31]), which we will refer to as the `sleep-study`
    example, an ANN is set up to predict the exam grade of a student based on two
    measurements, namely the number of hours that the student spent studying and the
    number of hours slept during exam preparation. ANN inputs are selected as the
    direct measurements of these two parameters. ANN output is the expected grade
    for that exam. For the sake of simplicity, suppose that the training data for
    this simple example contains the samples shown in Figure 3.1.


    5) Consider the ANN given in Figure 2.6. How will its performance be impacted
    in terms of converging to an acceptable solution by reducing the output error
    if one doubles the number of neurons and the number of hidden layers? Compare
    your answer with Exercise 4.


    6) How will the performance of the ANN given in Figure 2.6 be impacted in terms
    of converging to an acceptable solution by reducing the output error if one doubles
    the number of neurons and the number of hidden layers in addition to the modification
    suggested in Exercise 2?'
  mdcn: '## 3 用于优化预测的人工神经网络


    ### 3.1 引言


    如果设计得当并使用足够大量的样本进行有效训练，人工神经网络可以有效地用于基于历史数据的结果预测。为了能够训练人工神经网络的权重，需要一组从现场收集或在实验中观察到的样本输入和输出数据，如第2章所述。根据应用的不同，样本数量通常从数千到数亿甚至更多不等。数据样本的输入值在乘以连接权重后，被应用于隐藏层的神经元。经过每个神经元的求和与激活函数处理后，输入信号传播到下一个隐藏层，最终到达人工神经网络的输出层。根据真实输出值与计算输出值之间的差异计算误差值。这些步骤称为前向传播。然后，作为误差最小化（或至少减少）过程的一部分，通过从输出层开始反向传播到输入层，计算误差相对于连接权重的偏导数，执行反向传播，如第2章所述。


    在人工神经网络层上连续进行的前向和反向传播迭代（称为训练轮次）会减少误差，直到获得令人满意的较小值、达到训练轮次数量限制或满足其他停止标准为止。如前所述，为了正确训练人工神经网络，需要大量的数据。样本量越大，人工神经网络的预测结果预期就越准确。使用较少的数据样本进行训练往往会使连接权重过度拟合以满足输入和输出值，这会导致当输入具有不同值范围时，人工神经网络的预测不准确。使用大量样本的目的是希望它们具有广泛的输入和输出值范围，以充分覆盖操作空间——拥有许多具有相似值的样本无助于训练有效的人工神经网络。


    在本章中，我们提供了两个可以说是人工神经网络最流行应用之一的例子：基于历史数据的结果预测。第一个例子在第3.5节中介绍，涉及设计一个用于根据两个输入（即学生为准备考试而花费的睡眠时间和学习时间）预测考试成绩的人工神经网络（该例子取自[31]）。对于这个简单但非常贴近实际的例子，我们逐步描述了前向和反向传播操作。


    第二个例子在第3.6节中，构建并训练一个人工神经网络，根据多个输入（包括星期几、空气温度和风速）预测未来日期所需的租赁自行车数量（取自[38]）。这个案例研究的灵感来源于英国伦敦的自行车租赁数据。


    这些示例人工神经网络的实际版本可用于预测新情况的结果。例如，学生可以预测为了在即将到来的考试中获得90分以上的成绩，预期需要睡眠和学习的小时数，这可能需要相应地调整日程安排。同样，自行车租赁公司可以预测周末需要多少辆自行车，并可能根据需要雇用额外的帮手来管理租赁业务。


    ### 3.2 人工神经网络输入的选择


    在为特定应用构建人工神经网络时，最重要的决策之一是选择人工神经网络的输入。例如，可以考虑使用从实验中收集的数据作为人工神经网络的输入（例如，植物暴露在阳光下的小时数、给植物浇水的量和频率等）。对于某些应用，将现场测量值用作人工神经网络的输入可能在生成可接受的预测方面是有效的。然而，将观察到的数据直接作为人工神经网络的输入可能并不总是可取的，特别是当输入数量过多或与输出没有直接关系时（例如，在植物生长应用中使用星期几的名称可能是无关的）。人工神经网络的输入也可以是来自现场实验或事件观察的数据的导数，通常是观察数据的统计或数学变换。例如，使用每日平均、最高或最低温度作为人工神经网络的输入可能比使用实验中记录的每小时测量值更可取。在另一个应用中，计算过去几周的金融股票移动平均值可能比直接使用从证券交易所记录中获得的销售价格更可取。也可以将直接观察到的测量值与其派生值结合起来。例如，平均空气温度加上星期几可能是为预测运输公司每日公交车维修而设计的人工神经网络的相关输入。如果工作日是星期五、星期六或星期一，对于植物浇水研究可能无关紧要，但对于公交车时刻表却具有相当重要的意义。在实践中，设计者会使用他们认为适合其目的的所有可用数据，并决定哪种输入组合将训练出预测最准确的人工神经网络。选择合适的输入是一个持续的过程，可能需要花费大量精力考虑不同的输入集，直到定义出令人满意的集合为止。


    对于本章研究的两个例子，为了尽可能保持简单，所有输入都是各自领域中直接测量的参数：第一个例子是学生睡眠和学习的小时数，第二个例子是自行车租赁公司保存的各种测量值，如风速、温度、一天中的时间以及类似的测量值。


    ### 3.3 人工神经网络输出的选择


    除了选择输入之外，成功部署人工神经网络还需要以能够生成最有用、最准确和最可靠预测的方式选择输出。与输入的选择类似，输出可以分配为实验的直接测量观察值，也可以是基于测量值的派生值。例如，对于为预测癌性肿瘤生长而构建的人工神经网络，可能的输出选择包括肿瘤大小测量值或肿瘤生长率。对于后一种情况，需要在一段时间内测量患者的肿瘤大小，并根据测量值计算生长（或缩小）率。在其他人工神经网络示例中，输出可以代表分类决策。例如，对于输入是电子邮件文本的人工神经网络，一个可能的输出可能是决定该电子邮件是真实邮件还是垃圾邮件。在这种情况下，可能有两个输出（例如，标记为真实邮件和垃圾邮件），其中只有一个为真，或者只有一个输出，其值表示人工神经网络的决策（例如，1表示真实邮件，0表示垃圾邮件）。对于给定的人工神经网络应用，选择合适的输出通常需要经验和领域知识。


    在本章介绍的两个案例研究中，为了简单起见，选择了直接可观察的输出：所谓的睡眠-学习人工神经网络的预期考试成绩，以及伦敦共享单车人工神经网络的租赁数量。


    ### 3.4 隐藏层的构建


    另一个重要的设计组件是选择隐藏层的数量和每层中的神经元数量。没有简单的公式来规定这些决策的规则。与其他人工神经网络设计参数类似，基于知识和经验的试错方法似乎是构建人工神经网络架构的合理途径，该架构能持续为给定应用生成可靠和准确的解决方案。例如，图像处理问题可能需要具有许多隐藏层的人工神经网络来检测输入图像中的各种特征（例如，肿瘤、结节或其他异常），而金融应用可能在采用较少隐藏层但每层具有大量神经元的人工神经网络架构时更成功（例如，用于检测金融趋势而不会在多个隐藏层上过度拟合连接权重）。


    训练人工神经网络所需的时间是一个重要的性能指标，特别是对于需要经常训练的情况（例如，每天几次或更频繁）。如第2章第2.10节所述，训练时间与隐藏层的数量、每层中的神经元数量以及连续层之间的连接数量成正比。如公式（2.18）和（2.19）所示，增加隐藏层的数量将指数级增加训练的计算成本，如果要使用大量输入/输出样本进行训练，这是人工神经网络设计者需要处理的一个严重问题。


    从公式（2.18）和（2.19）得出的另一个重要观察是选择用于训练的训练轮次数量，其中连接权重和偏置根据输出处观察到的误差值进行调整。很明显，对于需要大量数据样本（例如，数十万或数百万）的人工神经网络，不能任意增加隐藏层、神经元和训练轮次的数量，特别是对于需要经常重新训练（例如，每小时、每天或每周）的应用。如果一个用于可靠预测第二天股票走势的人工神经网络需要一周时间来训练，那么无论其输出多么准确，对用户来说都没有意义。这些权衡是人工神经网络设计过程的重要组成部分，特别是对于至关重要的应用，如医疗、军事、实时交通、电力、供水或核控制任务。


    ### 3.5 案例研究1：睡眠-学习示例


    在我们的第一个例子（来自[31]）中，我们将其称为`sleep-study`示例，构建一个人工神经网络，根据两个测量值（即学生为准备考试而花费的学习小时数和睡眠小时数）预测学生的考试成绩。人工神经网络的输入选择为这两个参数的直接测量值。人工神经网络的输出是该考试的预期成绩。为简单起见，假设这个简单示例的训练数据包含图3.1所示的样本。


    5) 考虑图2.6中给出的人工神经网络。如果将神经元数量和隐藏层数量加倍，其在通过减少输出误差收敛到可接受解决方案方面的性能将受到怎样的影响？将你的答案与练习4进行比较。


    6) 如果除了练习2中建议的修改外，还将图2.6中给出的人工神经网络的神经元数量和隐藏层数量加倍，其在通过减少输出误差收敛到可接受解决方案方面的性能将受到怎样的影响？'

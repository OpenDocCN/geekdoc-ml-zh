    # 15.8 Concluding Remarks


    A wide variety of real-life applications can be modeled as the KP or MKP class
    of problems. Modeling a real-life problem as a KP or MKP requires the experience
    and skill-set typically available to computationally trained engineers. Because
    the KP and MKP are NP-complete problems, evolutionary algorithms such as GAs are
    required to obtain solutions in linear time. When employing off-the-shelf software
    packages such as Matlab, Python or similar software, one has to be careful about
    the assumptions used, not typically stated, in the implementations since they
    may restrain evolutionary searches in exploring large solution spaces. For this
    reason, it may be necessary to implement special-purpose software custom-tailored
    to handling computationally expensive problems with large sets of data to control
    mutation probabilities, number of generations and stopping criteria for the GA.



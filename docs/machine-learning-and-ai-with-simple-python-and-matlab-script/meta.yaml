    \ solutions are called *NP-complete* [114]. The amount of time to obtain a solution\
    \ to an NP-complete problem grows exponentially as the input size grows linearly,\
    \ which makes such problems prohibitively expensive for practical applications.\
    \ The algorithm in Figure 15.5 has a complexity of $O(n2^n)$ (i.e. for $n$ items,\
    \ it needs in the order of $n \\cdot 2^n$ steps to complete), implying that addition\
    \ of a single item to the set of items will double the time needed to complete\
    \ its computation. Therefore, the algorithm in Figure 15.5 would be suitable only\
    \ to solve KP applications with very small numbers of items. Considering that\
    \ a realistic menu contains hundreds of food choices, computing KP solutions may\
    \ easily require examining billions of combinations for even a modest-sized real-life\
    \ problem. Therefore, techniques based on bio-inspired algorithms are a necessity\
    \ for solving realistic knapsack class of problems in feasible time. In Section\
    \ 15.5, we introduce a GA to solve the KP in linear time, even though the solution\
    \ may not be an absolute global minimum or maximum but an approximation.\n\n```\n\
    // try all possible combinations for items for the knapsack\nfor i = 1 to 2^n\n\
    \    K_t = ∅  // empty knapsack\n    w_t = 0; // knapsack weight\n    v_t = 0;\
    \ // knapsack value;\n    // add times to the knapsack until it is full\n    for\
    \ i = 1 to n\n        if(w_t + w_k ≤ K_w) then\n            K_t ← x_k;\n     \
    \       w_t = w_t + w_k;\n            v_t = v_t + v_k;\n        end if\n    end\
    \ for\n    // update the best solution as needed\n    if (v_t ≥ v_best) then\n\
    \        K_best = K_t;\n        w_best = w_t;\n        v_best = v_t;\n    end\
    \ if\nend for\n```\n\nFigure 15.5 A simple algorithm to find the best combination\
    \ of items for KP.\n\n## 15.4 Variations of the KP\n\nThere are several variants\
    \ of the KP, each tailored to solve a specific application. In one version, multiple\
    \ copies of an item are available for selection. In a situation where it is permissible\
    \ to select multiple copies of each item, Figure 15.6 shows possible items that\
    \ can be placed into the knapsack of Figure 15.2. For example, the choice shown\
    \ in Figure 15.6a has four copies of the 2-kg item. This class of KP is called\
    \ the KP with repetitions (KPR). Consider a disaster relief organization with\
    \ virtually unlimited resources but with limited transportation capabilities.\
    \ This organization will benefit from KPR solutions to select items to dispatch\
    \ to a crisis area [115]. Let us define $s_j$ as the maximum number of times that\
    \ an item $j$ can be selected for a knapsack with a capacity of $K_w$. The KPR\
    \ is then formally stated as\n\n$$\\text{maximize} \\sum_{j=1}^{n} x_j \\cdot\
    \ v_j \\quad \\text{subject to} \\quad \\sum_{j=1}^{n} w_j \\cdot x_j \\leq K_W,\
    \ \\quad 0 \\leq x_j \\leq s_j \\text{ for } j = 1, \\cdots n,$$\n\nwhere $x_j$\
    \ is the number of times item $j$ is selected ($0 \\leq x_j \\leq s_j$ for $j\
    \ = 1, \\cdots n$).\n\nThe KP that aims to satisfy multiple constraints at the\
    \ same time, for example when both limited weight and volume capacities of a knapsack\
    \ have to be considered, is referred to as the multidimensional KP (MKP). The\
    \ objective of the MKP is to maximize the value of all items that fit into a knapsack,\
    \ while examining the weight and volume of each item before determining its suitability\
    \ for packing. There are many applications of the MKP in real-life tasks. A transportation\
    \ company that must determine the selection of goods to be dispatched while considering\
    \ the volume and weight limitations of a truck may construct its problem as a\
    \ MKP [116]. A similar MKP application is dietary menu selection, where there\
    \ are food items with different nutritional characteristics (e.g. vitamins, fibres,\
    \ calories), each with a lower or upper limit for a healthy intake. If each food\
    \ item is associated with a price, the objective would be to keep the cost within\
    \ a budgetary limit while adhering to multiple nutritional restrictions. Furthermore,\
    \ there could be a requirement for diversity in a diet such that a menu consisting\
    \ of only vegetables may not be desirable and a variety of items must be included\
    \ in a successful selection. Formally, we can define the MKP as\n\n$$\\text{maximize}\
    \ \\sum_{j=1}^{n} x_j \\cdot v_j \\quad \\text{subject to} \\quad \\sum_{j=1}^{n}\
    \ w_{ij} \\cdot x_j \\leq c_i, \\quad \\text{for } i = 1, \\cdots m,$$\n\nwhere\
    \ a set of $n$ items are considered for a knapsack with $m$ restrictions. For\
    \ example, $m = 2$ could reflect constraints $c_1$ and $c_2$ referring to weight\
    \ and volume restrictions of a knapsack, respectively. An item $j$ with a value\
    \ of $v_j \\geq 0$ uses an amount $w_{ij} \\geq 0$ that is bound by constraint\
    \ $c_i$. In our example of the MKP that has limited volume and weight capacities,\
    \ $w_{1j}$ indicates the weight of item $j$, and $w_{2j}$ represents its size.\n\
    \n## 15.5 GAs for KP Solution\n\nLet us now illustrate how GAs can be employed\
    \ to solve the knapsack class of problems requiring computation cost that is linearly\
    \ proportional to the number items. Suppose a list of food items for this example\
    \ is given in Figure 15.7, where each item has its calorie count and the amount\
    \ of protein it provides.\n\nFor a GA designed as a solution for KPs, a binary\
    \ chromosome can be defined to represent the selected items, where a chromosome\
    \ bit is a 1 if the corresponding item will be included in the knapsack and 0\
    \ otherwise. The fitness function can be defined as the total value of the selected\
    \ items only if the total weight is below the knapsack capacity. Only the chromosomes\
    \ representing valid selections of items are to be considered in further generations\
    \ of the GA. For a set of $n$ food items, the chromosome will then be\n\n$[x_1\
    \ \\ x_2 \\ \\dots \\ x_n] \\text{ for } x_i \\in \\{0, 1\\},$"

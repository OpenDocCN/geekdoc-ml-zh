- md: "## 8 CNNs for Optical Character Recognition\n\n```matlab\n% The City College\
    \ of New York, City University of New York\n% Written by Ricardo Valdez\n% August,\
    \ 2020\n% Optical character recognition using CNNs\nclc;\nclear;\n% select training\
    \ directory\ntrain_dir = 'TrainingSet';\n% select reference directory\nref_dir\
    \ = 'ReferenceSet';\n%output directory\nsaved_cnns = 'Saved_CNNs';\nif exist('functions','dir')\
    \ == 7\n    % get access to all files in the 'functions' directory\n    addpath('functions');\n\
    else\n    error(\"Error: Unable to locate 'functions' directory\")\nend\nmessage\
    \ = sprintf('WELCOME TO USING CNN. MAKE YOUR SELECTION:');\ndisp(message);\ndisp('Enter\
    \ 1 to train a new CNN 2 to load an existing CNN');\nuser_entry = input('Enter\
    \ your choice: ');\nif (user_entry == 1)\n    % train a new CNN:\n    disp('Be\
    \ patient until statistics are displayed...');\n    cnn_trained = CNN_Train(train_dir);\n\
    \    input('CNN training is complete. Press enter to start using CNN.\\n');\n\
    elseif (user_entry == 2)\n    % use an existing CNN:\n    cnn_file = input('Enter\
    \ CNN name (dont forget .mat extension): ', 's');\n    cnn_path = pwd;\n    disp(cnn_file);\n\
    \    try\n        % load the CNN and assign it to cnn_trained\n        load_data\
    \ = load(fullfile(cnn_path, saved_cnns, cnn_file));\n        cnn_trained = load_data.cnn_trained;\n\
    \    catch\n        disp('Enter a valid file name next time... Leaving... Bye');\n\
    \        return;\n    end\nelse\n    disp('Enter a valid choice next time... Leaving...\
    \ Bye');\n    return;\nend\n\n% Use trained CNN to make predictions:\n% start\
    \ drawing a character\nimage = draw_tool();\n\n% CNN predicts the character\n\
    cnn_prediction = CNN_Predict(cnn_trained, ref_dir, image);\n\nuser_entry = input('Do\
    \ you want to save CNN? (y/n) ','s');\nif(user_entry == 'y')\n    file_name =\
    \ input('Enter file name (do not forget.mat extension): ',...\n        's');\n\
    \    save(fullfile(saved_cnns,file_name), 'cnn_trained');\nelse\nend\ndisp('Have\
    \ a predictably nice day!');\n```\n\nBelow we present the function named CNN_Train,\
    \ which defines the architecture of the CNN in lines 16–66 as follows. In line\
    \ 25, the first CL with its filter size of $f_{cl} = 3$ and number of filters\
    \ of $F_{cl} = 8$ is defined. As discussed in Chapter 7, padding is set so that\
    \ zeros are added to the input image to keep it the same size after convolution,\
    \ to avoid losing information due to the smaller size of the CL filter $f_{cl}$.\
    \ After batch normalization in line 29, RELU is defined in line 32 and the first\
    \ PL is set with its size of $p = 2$ and stride of $s_{pl} = 2$ in line 36. The\
    \ second CL–PL pair is defined in lines 41 and 47. Then the third CL with its\
    \ size, number of filters, RELU and normalization are in lines 51 to 53. Finally\
    \ the fully-connected ANN is defined in line 58. Note that in Matlab, the UL is\
    \ implemented automatically. In lines 71–73, the options for training are defined\
    \ as sgdm (i.e. stochastic gradient descent), a learning rate of 0.01 and maximum\
    \ number of epochs of 50. The trained CNN is saved in an object named net in line\
    \ 82.\n\n```matlab\nfunction net = CNN_Train(train_dir)\n%\n% Train a new CNN\
    \ using information from TrainingSet directory\n% Then return trained CNN\n\n\
    \    %%%%%%%%%%% TRAIN THE CNN %%%%%%%%%%%\n\n    % load the training image dataset\
    \ into an imageDatastore\n    % train_path contains the path to the dataset\n\
    \    imds_train = imageDatastore(train_dir, ...\n                            \
    \    'IncludeSubfolders',true,...\n                                'LabelSource','foldernames');\n\
    \    % get the number of unique training labels in the training data\n    noof_labels\
    \ = height(countEachLabel(imds_train));\n\n    layers = [\n        % set the size\
    \ of the input image as 28x28 pixels with 1 color\n        % channel (grayscale)\n\
    \        imageInputLayer([28 28 1])\n\n        % create the first convolution\
    \ layer, it has 8 convolutional\n        % filters, each with a height and width\
    \ of 3 and input is 0 padded.\n        % the input is padded with the appropriate\
    \ number of zeros so that\n        % the size of the output is the same size as\
    \ the input.\n        convolution2dLayer(3,8,'Padding','same')\n        % normalize\
    \ the output of the convolution between the range -1\n        % and 1. this prevents\
    \ the updated weights from increasing\n        % explosively during training.\n\
    \        batchNormalizationLayer\n        % apply rectilinear unit activation\
    \ function that sets all negative\n        % values to zero\n        reluLayer\n\
    \n        % apply max pooling using a pooling size of (2x2), and using a\n   \
    \     % stride of 2\n        maxPooling2dLayer(2,'Stride',2)\n\n        % create\
    \ a second convolution layer, it has 16 convolutional\n        % filters, each\
    \ filter has a height and width of 3 and the input is\n        % zero padded.\n\
    \        convolution2dLayer(3,16,'Padding','same')\n        batchNormalizationLayer\n\
    \        reluLayer\n\n        % apply max pooling using a pooling size of (2x2),\
    \ and using a\n        % stride of\n        maxPooling2dLayer(2,'Stride',2)\n\
    \        % create a third convolution layer, it has 32 convolutional\n       \
    \ % filters, each filter has a height and width of 3 and the input is\n      \
    \  % zero padded.\n        convolution2dLayer(3,32,'Padding','same')\n       \
    \ batchNormalizationLayer\n        reluLayer\n\n        % create the ouput layer\n\
    \        % the number of neurons in the output layer is equal to the number\n\
    \        % of image labels\n        fullyConnectedLayer(noof_labels)\n       \
    \ % use a softmax layer to convert the outputs to a set of\n        % probalities\
    \ where each output represents the probability that the\n        % image is a\
    \ corresponding label.\n        softmaxLayer\n        % add a classification layer\
    \ to make each output mutually\n        % exclusive, in other words there's only\
    \ a single correct label for\n        % each image\n        classificationLayer];\n\
    \        %END OF layers\n\n\n        % specify CNN training options\n        options\
    \ = trainingOptions('sgdm', ...\n                                    'InitialLearnRate',0.01,\
    \ ...\n                                    'MaxEpochs',500);\n\n        % sleep\
    \ for a second to display the GUI\n        pause(1);\n        % start training\
    \ the CNN\n        % imds_train is imageDatastore that holds all training images\
    \ and labels\n        % layers is the architecture of the CNN\n        % options\
    \ contains the training parameters\n        net = trainNetwork(imds_train,layers,options);\n\
    end\n```\n\nNow we present the function named `CNN_Predict` with three input parameters,\
    \ named `net`, `ref_path` and `char_img`, which are pointers to the trained CNN,\
    \ the address of the ReferenceSet folder and the user drawn input image, respectively.\
    \ The trained CNN generates an output in line 19 as follows:\n\n```matlab\n[Prediction,\
    \ ] = classify(net, char_img);\n```\n\nwhere `Prediction` contains an index to\
    \ one of the sub-folders of the `ReferenceSet` folder. In lines 22–33, the reference\
    \ output image, which is pointed to by the top element of `Prediction`, is displayed.\n\
    \n```matlab\nfunction Prediction = CNN_Predict(net,ref_path,char_img)\n% this\
    \ GUI shows prediction for the character drawn by the user\n\n    S.net = net;\n\
    \    S.ref = ref_path;\n    % open a window(figure) for the GUI\n    S.fh = figure('units','pixels',...\n\
    \                'position',[500 300 600 400],...\n                'menubar','none',...\n\
    \               'name','Character Recognition Using CNN',...\n               'numbertitle','off',...\n\
    \               'resize','off',...\n               'Color',[0.8588 0.9412 0.8275]);\n\
    \n   % create an axes to hold the images\n   S.ax = axes('units','pix',...\n \
    \              'position',[100 250 200 90]);\n   % pass the drawing to the CNN\
    \ and get a prediction\n   [Prediction,~] = classify(net, char_img);\n\n   % retrieve\
    \ the appropriate reference image for prediction\n   full_ref_path = fullfile(ref_path,char(Prediction));\n\
    \   ref_imd = imageDatastore(full_ref_path);\n\n   % display user input image\n\
    \   subplot(1,2,1);\n   imshow(char_img);\n   title('YOUR CHARACTER','FontSize',15);\n\
    \n   % display prediction image\n   subplot(1,2,2);\n   imshow(ref_imd.Files{1});\n\
    \   title('CNN PREDICTION','FontSize',15);\nend\n```"

    \n        % 记录这些位置以便下一次遗传算法使用\n        UAV_positions(UAV_num,:,t+1) = next_position;\n\
    \        fprintf(\"\\t选择的适应度 = %f\\n\", fit_func(selection))\n        fprintf(\"\
    ****** 在时间 %d 完成无人机 #%d 的遗传算法 *****\\n\", ...\n            UAV_num, t)\n    end\n\
    end\n\n% 可视化无人机\nvisualize_UAVs3D(UAV_positions, noof_moves, noof_UAVs, rcom);\n\
    open_anim = true;\nwhile open_anim == true\n    fprintf(\"重播动画？\\n\\t输入1表示是\\\

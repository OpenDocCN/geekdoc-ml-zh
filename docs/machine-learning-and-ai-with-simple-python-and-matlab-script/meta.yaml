  md: '![](img/a83d807f9a9119b1472555c0ef55797e_173_0.png)


    **Figure 10.1** Input, hidden and output layers of an RNN and a recurrent connection
    combining hidden states (compact and unfolded-through-time presentations).


    +   - **Recurrent Connection**: the connection combining information from previous
    hidden layers with the current input; this is the most important feature of an
    RNN in handling a sequence of inputs.

    - **Output Layer**: the layer that generates predictions at every step (or after
    multiple inputs are applied depending on the RNN architecture as discussed later
    in this chapter). The output layer is also referred to as the `decoder` of an
    RNN.


    In the context of an RNN, the `encoder` is the part of the network that processes
    an input sequence and encodes it into a fixed-length vector representation. In
    this way, an RNN can evaluate input sequences in a numerical form. The output
    of the encoder is called the `current hidden state`, which combines the current
    input with the previously generated hidden layer outputs (i.e. previous hidden
    states). The purpose of the encoder is to ensure that previous inputs applied
    to the RNN are taken into consideration while the current input is processed by
    the RNN. The output of the encoder (i.e. the current hidden state) is then passed
    to the decoder of the RNN for further processing.


    In an RNN, the `decoder` is the component responsible for generating an output
    sequence based on a fixed-length hidden-state vector produced by the encoder.
    Operation of the decoder is similar to an encoder, but in reverse: it takes the
    hidden state as its initial input and generates an element of the output.


    There are different types of RNNs, where the outputs are generated either at every
    step, after multiple inputs are applied, or any combination of the two cases [87].
    A `one-to-one` RNN generates one output for each input applied to it (e.g. a search
    engine suggesting the next word based on the last word that you typed), whereas
    a `one-to-many` RNN produces multiple outputs for a single input (e.g. in generating
    music). In `many-to-one` (e.g. in sentiment analysis) and `many-to-many` RNNs
    (e.g. in natural language translation), a sequence of inputs generates a single
    or a sequence of outputs, respectively.


    In the remainder of this chapter, without loss of generality, we will focus on
    a one-to-one single cell RNN for generating hidden states, outputs and partial
    derivations of loss, as well as updating'

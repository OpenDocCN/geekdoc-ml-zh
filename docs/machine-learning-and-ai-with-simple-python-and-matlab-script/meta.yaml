  md: "Figure 17.13 (a) Mutation operator generates an invalid offspring with duplicated\
    \ cities, and (b) shuffling indices for mutation preserves the validity of an\
    \ offspring.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_302_0.png)\n\nA similar\
    \ concern is also present for the mutation operator. If it is implemented without\
    \ special care, a mutated offspring may be invalid. Consider the example in Figure\
    \ 17.13a, where an offspring defined as [ 1 2 3 4 5 ] will be mutated at the second\
    \ most significant position. By replacing this codon randomly (e.g. from 2 to\
    \ 4), an offspring may end up as [ 1 4 3 4 5 ], which is invalid since there is\
    \ a duplicate codon value. However, implementing mutation as shuffling two codons\
    \ will always preserve the validity of an offspring. In Figure 17.13b, mutation\
    \ operator selects two codons and shuffles them, resulting in a mutated but valid\
    \ offspring. This mutation operator that shuffles the codon values is implemented\
    \ in line 72 as\n\n```\ntoolbox.register(\"mutate\", mutShuffleIndexes, indpb=0.05)\n\
    ```\n\nwhich indicates that the mutation operator is to be executed with a probability\
    \ of 0.05. In line 87, the best solution is saved in an array called best_path.\
    \ In lines 93–101, the cost of the best path is computed. Between lines 106 and\
    \ 156, this path is shown on a map using Python libraries.\n\n```\n1 # The City\
    \ College of New York, City University of New York\n2 # Written by Ricardo Valdez\n\
    3 # August, 2020\n4 \n5 # travelling SALESMAN PROBLEM IMPLEMENTATION USING GA\n\
    6 # THIS IMPLEMENTATION USES deap LIBRARY FUNCTION CALLED eaSimple()\n7 # deap:\
    \ distributed evolutionary algorithms in python\n8 # ea: evolutionary algorithm\n\
    9 # DEPENDENCIES: deap, basemap, and basemap-data-hires\n10 from deap import creator,\
    \ base, tools, algorithms\n11 import random\n12 import gps\n13 import pandas as\
    \ pd\n14 import matplotlib.pyplot as plt\n15 from mpl_toolkits.basemap import\
    \ Basemap\n16 \n17 cities_file = 'cities.csv'\n18 \n19 # load city data into a\
    \ dataframe df\n20 df = pd.read_csv(cities_file)\n21 ## generate a weight matrix\
    \ where the weights are the distances between cities\n22 distance_matrix = gps.generate_distance_matrix(df)\n\
    23 \n24 ## set chromosome length to the number of cities\n25 CHROM_LENGTH = len(distance_matrix)\n\
    26 \n27 ## create a variable called FitnessMin with the create() function.\n28\
    \ ## FitnessMin inherits from base.Fitness and it will store whether\n29 ## the\
    \ fitness should be minimized or maximized:\n30 ##     if weights == -1.0, then\
    \ minimize the fitness\n31 ##     if weights == 1.0, then maximize the fitness\n\
    32 creator.create(\"FitnessMin\", base.Fitness, weights=(-1.0,))\n33 ## create\
    \ a variable called Individual that will determine the\n34 ## datastructure used\
    \ for the chromosome.\n35 ## Individual inherits from list and it will store integers.\n\
    36 creator.create(\"Individual\", list, typecode='i', fitness=creator.FitnessMin)\n\
    37 \n38 ## initialize a new toolbox variable to configure GA parameters:\n39 toolbox\
    \ = base.Toolbox()\n40\n```"

    # ### 16.4.3 Chromosome for FGA


    In GAs, the role of a chromosome is to generate candidate solutions, which will
    be evaluated by a fitness function to be considered for inclusion in the population.
    The chromosome is a numerical representation of the parameters of the optimization
    problem at hand. Since the FGA aims to spread a swarm of autonomous mobile nodes
    uniformly over an area of interest, its chromosome must generate candidate positions
    for a mobile node to move to in the next time step. In our simple example, if
    we assume that the speed of a mobile node is constant, then the chromosome represents
    a candidate direction in which a mobile node will move.


    Let us now define a chromosome that can be used in an FGA to guide mobile swarm
    nodes. We will employ a binary chromosome, where the codons are either 0 or 1.
    In our example, we assume that, in a two-dimensional space, a mobile node may
    only move in eight different directions, namely east, west, north, south, north-east,
    north-west, south-east and south-west. Three bits are needed to represent the
    eight possible directions in which the UAV can move. It is clear that for a higher
    granularity of movements (e.g. 16, 32 or more positions), additional bits will
    be needed in the chromosome. To accommodate three-dimensional node movement, we
    will need additional bits in the chromosome. If we only consider moving in three
    possible vertical directions, namely up, down and the same altitude, we will need
    two more bits in the chromosome.'

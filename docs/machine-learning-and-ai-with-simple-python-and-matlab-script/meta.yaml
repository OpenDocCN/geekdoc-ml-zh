    $L$ 对 $W$ 的偏导数必须通过递归计算，如公式 (E.1) 所示。我们从 $t=1$ 时 $L_1$ 对 $W$ 的偏导数开始：


    $$\frac{\partial L_1}{\partial W} = \frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial
    \hat{y}_1}{\partial \Omega_1} \frac{\partial \Omega_1}{\partial Z_1} \frac{\partial
    Z_1}{\partial h_1} \frac{\partial h_1}{\partial W}.$$


    对于 $t=2$，$W$ 包含对 $h_1$ 和 $h_2$ 的依赖，因此有：


    $$\frac{\partial L_2}{\partial W} = \left( \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial \Omega_2} \frac{\partial \Omega_2}{\partial
    Z_2} \frac{\partial Z_2}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial
    \Omega_2} \frac{\partial \Omega_2}{\partial Z_2} \frac{\partial Z_2}{\partial
    h_2} \frac{\partial h_2}{\partial W} + \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial \Omega_2} \frac{\partial \Omega_2}{\partial
    Z_2} \frac{\partial Z_2}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W} \right).$$


    类似地，在 $t=3$ 时，$W$ 包含对 $h_1$、$h_2$ 和 $h_3$ 的依赖，如下所示：


    $$\frac{\partial L_3}{\partial W} = \left( \frac{\partial L_3}{\partial \hat{y}_3}
    \frac{\partial \hat{y}_3}{\partial \Omega_3} \frac{\partial \Omega_3}{\partial
    Z_3} \frac{\partial Z_3}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    \Omega_3} \frac{\partial \Omega_3}{\partial Z_3} \frac{\partial Z_3}{\partial

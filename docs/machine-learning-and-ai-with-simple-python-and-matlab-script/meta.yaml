    end\n```\n\n## 9.5 使用CNN进行语音识别的Matlab脚本\n\n我们现在展示一个名为 `CNN_Predict` 的函数的示例实现，其输入是用户录制的音频输入和训练好的CNN。在第19行到第21行将音频输入转换为频谱图（即名为XTest的对象）后，它在第23行作为输入提供给CNN，CNN返回预测结果作为其输出之一：\n\

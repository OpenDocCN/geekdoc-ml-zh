    # 8.3 Organization of Training and Reference Files


    Before introducing the scripts implementing a CNN, let us present a folder structure
    to store the files used in training and prediction. Note that this organization
    is only meant to be illustrative and may not be followed verbatim. Suppose we
    create two folders, named `TrainingSet` and `ReferenceSet`, to hold training and
    reference images, respectively.


    +   - `TrainingSet`: This folder stores the image files used for training the
    CNN. There is one sub-folder for each distinct character to be identified by the
    CNN. For an output layer with dimensions of C × 1 × 1, there are C sub-folders
    below the `TrainingSet` folder, one for each output character. In each sub-folder,
    there are image files to be used in training the CNN for recognizing that particular
    image. An example for the `TrainingSet` folder is shown in Figure 8.4, with five

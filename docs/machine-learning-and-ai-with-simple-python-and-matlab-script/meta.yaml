  md: 'For the general case, if there are multiple hidden layers in an ANN, inputs
    and outputs of consecutive hidden layers are computed in the same manner explained
    here. The output layer may contain more than one neuron as an ANN may be designed
    for multiple outputs depending on the application. For example, an ANN to guide
    a drone may generate three outputs (speed, direction and altitude) for a flight
    controller using multiple inputs such as current position, speed, altitude, flight
    plan and information obstacle sensors.


    # 2.4 Training an ANN


    In order for an ANN to generate predictions, it first has to be trained using
    existing sample data of input and output values, in a manner similar to traditional
    trial-and-error approaches. During training, weights associated with the synapses
    (e.g. $w_1$ to $w_8$ in Figure 2.5) are adjusted so that the difference between
    the outputs generated by the ANN and the actual output values of the existing
    data are as small as possible. This difference is called the error or loss. The
    goal of training is to minimize (or reduce as much as possible) the loss by adjusting
    the weight values.


    Let us now illustrate the training process using the example ANN given in Figure
    2.5. Suppose we have the following data points observed in field as the inputs
    and output of an event for which an ANN is to be trained:


    input 1: $x_1 = 3$ &nbsp;&nbsp;&nbsp;&nbsp; input 2: $x_2 = 5$ &nbsp;&nbsp;&nbsp;&nbsp;
    output: $y = 75$.


    Suppose that current initial values of the ANN weights are


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.5$

    $w_7 = w_8 = w_9 = 4.0$.


    Using Eqn. (A.1) we have


    $e_1 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$.


    Using a rectilinear activation function, from Eq. (2.6), we have


    $a_1 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_2 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_3
    = 5.5$.


    From Eq. (A.1), we then have


    $e_4 = (5.5 \cdot 4) + (5.5 \cdot 4) + (5.5 \cdot 4) = 66$.


    Using a rectilinear activation function, from Eq. (2.7), we have


    $\hat{y} = 66$.


    The error is defined as the difference between the ANN-generated output and the
    real output value from the training data. For this example, the error is


    error $= y - \hat{y} = 75 - 66 = 9$.'

    # 12


    # RNNs with Attention


    ## 12.1 Introduction


    In this chapter we introduce `attention`, an enhancement mechanism for an RNN
    providing the capability that the information generated by the previous hidden
    states is *directly* available at each step [102, 103]. Recall from Chapter 10
    that in an RNN, at step $t$, only the hidden state information from the previous
    step $h_{t-1}$ can be directly used. Recursively, $h_{t-1}$ only has direct access
    to the hidden state information of $h_{t-2}$ from step $(t-2)$, which, in turn,
    has utilized the hidden state of $h_{t-3}$, and so on. But the indirect information
    from distant past hidden states only has a weak influence on the current hidden
    state, especially as the distance to a past hidden state grows. On the other hand,
    in an RNN with attention, denoted as RNN-Att, all hidden states generated at the
    previous steps (i.e. $h_{t-1}, h_{t-2}, \cdots h_{t-k}$ for a sequence of $(k+1)$
    consecutive inputs) are directly available when computing the hidden state $h_t$
    and the output prediction $\hat{y}_t$ at step $t$. The main purpose of utilizing
    all previous hidden states at every step is to explore a possible relationship
    between a current input and the previous hidden states generated by the inputs
    applied earlier. The attention mechanism is especially important when processing
    input sequences where the relationship with previously used inputs (typically
    more than one previous input) has a significant impact on how to process the current
    input. Typical examples of such systems are machine translators, which convert
    sentences written (or spoken) in one natural language to another. We will introduce
    a simple machine translation example using an RNN-Att in Chapter 13.


    ## 12.2 One-to-One RNN Cell with Attention


    A one-to-one single cell RNN with attention is shown in Figure 12.1, which consists
    of three functional parts, namely an `encoder`, `attention` and `decoder`. Similar
    to the RNN presented in Chapter 10, the encoder unit of an RNN-Att accepts an
    input vector $x_t$ at step $t$, which is scaled by a weight matrix $U$ and combined
    with both a bias vector $b$ and the previous hidden state information $h_{t-1}$
    via a weight matrix $W$. After applying an activation function, which is selected
    as `tanh` in Figure 12.1, hidden state $h_t$ is generated as the output of the
    encoder.


    In the attention unit of an RNN-Att, current hidden state information $h_t$ from
    the encoder is individually multiplied with each of the previous hidden states
    generated before this step (i.e. $\forall h_{\delta}$ where $\delta < t$), and
    the results are individually fed into a `softmax` unit. These inputs are called
    `attention coefficients` as shown in Figure 12.1. The outputs of the `softmax`
    unit are called `attention weights`. Each output of `softmax` is then individually
    multiplied by'

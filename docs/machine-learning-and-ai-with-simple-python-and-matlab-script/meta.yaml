    L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \left( \prod_{j=k}^{t-1}
    \frac{\partial h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial W}
    \right)$. (D.13)



    \ 15.3c 中的那个。\n\n这种表述被称为*背包问题*（KP）[113]。背包问题的名称由数学家托比亚斯·丹齐格在二十世纪初提出 [109]。正如本章将进一步讨论的，KP\
    \ 有不同的版本，其中物品可能有单个或多个副本，并且有单个或多个约束条件（例如重量和体积）。对于图 15.4 给出的示例，如果每种物品有多个副本可用，解决方案是选择三个黄色和三个灰色盒子，总重量为\
    \ 15 公斤，价值为 36 美元。如果每种物品只能选择一个副本，解决方案则包括除绿色盒子外的所有物品，总重量为 8 公斤，价值为 15 美元。\n\n对于一组给定的物品，每个物品都有重量和价值，要放入一个容量有限的背包中，KP\
    \ 被定义为从这组物品中选择物品，使得所选物品的总价值最大化，同时不超过其容量。由于解空间随着要放入背包的物品数量呈指数增长，KP 已被公认为一个计算上困难的问题。\n\
    \n让我们考虑一个重量容量为 $K_W$ 的背包。假设有 $n$ 个物品要装入背包，每个物品 $j$ 的重量为 $w_j$，价值为 $v_j$ 美元。KP\
    \ 的一个好的解决方案应该选择一组可以放入背包的物品组合，同时为背包提供尽可能高的总价值。因此，KP 的解决方案试图实现以下目标：\n\n$$\\text{最大化}\
    \ \\sum_{j=1}^{n} x_j \\cdot v_j \\quad \\text{约束条件为} \\quad \\sum_{j=1}^{n} w_j\
    \ \\cdot x_j \\leq K_W, \\qquad (15.1)$$\n\n其中二元变量 $x_j$ 用于确定物品 $j$ 是否应放入背包；因此\
    \ $x_j \\in \\{0, 1\\}$，$j = 1, 2, \\cdots, n$。由于每个物品要么被选中，要么不被选中，这个版本的 KP 被称为\
    \ *0-1 KP*。\n\n## 15.3 KP 的一个简单算法\n\n如果使用直接的方法来解决 KP，即测试所有可能的解决方案，那么对于一个有 $n$\
    \ 个物品需要选择的 KP，总共有 $2^n$ 种物品组合需要考虑。图 15.5 展示了一个实现 0-1 KP 的类似方法的简单算法，其中考虑了所有可能的物品分配，然后将背包装满使其价值最高的物品作为最终解决方案。\n\
    \n如图 15.5 所示，找到 KP 解决方案所需的步骤数量相对于要放入背包的物品数量呈指数增长，这与具有线性或多项式增长的算法形成对比。没有线性或多项式时间解决方案的问题类型被称为\
    \ *NP 完全* [114]。获得 NP 完全问题解决方案所需的时间随着输入大小的线性增长而呈指数增长，这使得此类问题在实际应用中代价高昂。图 15.5\
    \ 中的算法复杂度为 $O(n2^n)$（即对于 $n$ 个物品，它需要大约 $n \\cdot 2^n$ 步来完成），这意味着向物品集中添加一个物品将使完成计算所需的时间加倍。因此，图\
    \ 15.5 中的算法仅适用于解决物品数量非常少的 KP 应用。考虑到一个现实的菜单包含数百种食物选择，即使对于一个中等规模的现实问题，计算 KP 解决方案也可能需要检查数十亿种组合。因此，基于生物启发算法的技术对于在可行时间内解决现实的背包类问题是必要的。在第\
    \ 15.5 节中，我们将介绍一种遗传算法（GA）来在线性时间内解决 KP，尽管解决方案可能不是绝对的全局最小值或最大值，而是一个近似值。\n\n```\n\
    // 尝试背包物品的所有可能组合\nfor i = 1 to 2^n\n    K_t = ∅  // 空背包\n    w_t = 0; // 背包重量\n\
    \    v_t = 0; // 背包价值;\n    // 将物品添加到背包直到装满\n    for i = 1 to n\n        if(w_t\
    \ + w_k ≤ K_w) then\n            K_t ← x_k;\n            w_t = w_t + w_k;\n  \
    \          v_t = v_t + v_k;\n        end if\n    end for\n    // 根据需要更新最佳解决方案\n\
    \    if (v_t ≥ v_best) then\n        K_best = K_t;\n        w_best = w_t;\n  \
    \      v_best = v_t;\n    end if\nend for\n```\n\n图 15.5 一个寻找 KP 最佳物品组合的简单算法。\n\
    \n## 15.4 KP 的变体\n\nKP 有几种变体，每种都针对特定的应用进行定制。在一个版本中，每种物品有多个副本可供选择。在允许选择每种物品多个副本的情况下，图\
    \ 15.6 展示了可以放入图 15.2 所示背包的可能物品。例如，图 15.6a 所示的选择包含了四个 2 公斤物品的副本。这类 KP 被称为有重复的背包问题（KPR）。考虑一个资源几乎无限但运输能力有限的救灾组织。该组织将从\
    \ KPR 解决方案中受益，以选择要派往危机地区的物品 [115]。让我们定义 $s_j$ 为物品 $j$ 在容量为 $K_w$ 的背包中可以被选择的最大次数。KPR\
    \ 的正式表述为\n\n$$\\text{最大化} \\sum_{j=1}^{n} x_j \\cdot v_j \\quad \\text{约束条件为}\
    \ \\quad \\sum_{j=1}^{n} w_j \\cdot x_j \\leq K_W, \\quad 0 \\leq x_j \\leq s_j\
    \ \\text{ 对于 } j = 1, \\cdots n,$$\n\n其中 $x_j$ 是物品 $j$ 被选择的次数（$0 \\leq x_j \\\
    leq s_j$ 对于 $j = 1, \\cdots n$）。\n\n旨在同时满足多个约束条件的 KP，例如当必须同时考虑背包有限的重量和体积容量时，被称为多维背包问题（MKP）。MKP\
    \ 的目标是最大化适合背包的所有物品的价值，同时在确定其是否适合装箱之前检查每个物品的重量和体积。MKP 在现实任务中有许多应用。一家必须确定要派送的货物选择，同时考虑卡车的体积和重量限制的运输公司，可以将其问题构建为\
    \ MKP [116]。一个类似的 MKP 应用是膳食菜单选择，其中食物具有不同的营养特性（例如维生素、纤维、卡路里），每种都有健康摄入量的下限或上限。如果每种食物都与价格相关联，目标将是在遵守多种营养限制的同时，将成本控制在预算限制内。此外，饮食可能要求多样性，因此仅由蔬菜组成的菜单可能不受欢迎，成功的饮食选择必须包含多种物品。形式上，我们可以将\
    \ MKP 定义为\n\n$$\\text{最大化} \\sum_{j=1}^{n} x_j \\cdot v_j \\quad \\text{约束条件为}\
    \ \\quad \\sum_{j=1}^{n} w_{ij} \\cdot x_j \\leq c_i, \\quad \\text{对于 } i = 1,\
    \ \\cdots m,$$\n\n其中考虑了一组 $n$ 个物品用于一个有 $m$ 个限制的背包。例如，$m = 2$ 可以反映约束 $c_1$ 和 $c_2$，分别指背包的重量和体积限制。一个价值为\
    \ $v_j \\geq 0$ 的物品 $j$ 使用受约束 $c_i$ 限制的量 $w_{ij} \\geq 0$。在我们具有有限体积和重量容量的 MKP\
    \ 示例中，$w_{1j}$ 表示物品 $j$ 的重量，$w_{2j}$ 表示其尺寸。\n\n## 15.5 用于 KP 解决方案的遗传算法\n\n现在让我们说明如何使用遗传算法（GA）来解决需要计算成本与物品数量成线性比例的背包类问题。假设本例的食物物品列表如图\
    \ 15.7 所示，其中每个物品都有其卡路里数和提供的蛋白质含量。\n\n对于设计为 KP 解决方案的 GA，可以定义一个二进制染色体来表示所选物品，其中如果相应的物品将被包含在背包中，则染色体位为\
    \ 1，否则为 0。适应度函数可以定义为所选物品的总价值，但前提是总重量低于背包容量。只有代表有效物品选择的染色体才会在 GA 的后续世代中被考虑。对于一组\
    \ $n$ 个食物物品，染色体将是\n\n$[x_1 \\ x_2 \\ \\dots \\ x_n] \\text{ 其中 } x_i \\in \\{0,\
    \ 1\\},$"

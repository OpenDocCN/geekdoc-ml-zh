  mdcn: "## 13 带注意力机制的RNN用于机器翻译\n\n在第70-74行，为梯度下降算法（即所谓的Adam选项）、训练轮数、批处理大小、`每轮打乱`模式（即每轮改变样本顺序）以及硬件执行环境类型（即GPU、CPU等）设置了训练参数。在第76-163行，实现了一个简单的用户界面来运行脚本。在第85行和第96行，当用户选择选项1时，将使用上述定义的输入和目标张量、层和选项来训练一个新的RNN-Att模型。对于选项2，将在第91行加载一个先前训练好的模型。加载RNN-Att模型后，系统会提示用户：在第108至112行，通过输入选项1，从命令窗口应用单个查询；在第113至149行，运行之前保存在`questions.txt`文件中的一组查询；在第150至158行，通过输入选项3，保存当前的查询、响应和模型；或者在第159至161行，通过输入选项4，退出程序。\n\
    \n在第165-184行，实现了一个名为`load_dataset`的函数，其参数包括输入和目标字典。它根据德语字典生成编码后的输入数据，根据英语字典生成目标数据，分别称为`input_tensor`和`target_tensor`。它还为输入生成一个从词到数字的映射，称为`lang_tokenizer`，以及为目标生成一个从数字到词的映射，称为`reverseTokenizer`。在第186-193行，一个名为`tokenDictionary`的函数执行填充操作，并为输入和目标语言创建字典和唯一词列表。在第195至212行，`create_rnn_model_with_attention`函数创建了一个RNN-Att模型。它分别在第200、201和202行定义了输入层、嵌入层和多对多编码器层。在第204行调用了一个名为`DotProductAttentionLayer`的函数，该函数实现了注意力层。在第205-207行，定义了一个基于softmax的解码器，用于找到最高概率值的索引。在第208-211行，使用目标语言（即英语）中唯一词的数量定义了解码器层，所有权重均设为1，并且填充系数被设置为一个非常小的数字，以防止填充字符被用作预测的一部分（否则，连续的填充字符会看起来像合法的翻译）。在第214至229行，一个名为`predictResponse`的函数处理用户查询，将其应用于训练好的RNN-Att模型，并使用上述建立的映射生成输出句子。在第231至244行，`decoder`函数将稀疏的独热编码序列转换为目标语言中的单词。在第246至257行，一个名为`encoder`的函数对输入句子逐词应用稀疏独热编码。\n\
    \n## 13.4 用于RNN-Att机器翻译的Matlab脚本\n\n```matlab\n% The City College of New York,\
    \ City University of New York\n% Written by: Hasan Suca Kayman\n% July 2024\n\
    % ml_translate_RNNwAtt is a simple machine translator that uses a\n% Recurrent\
    \ Neural Network with an Attention mechanism to translate from\n% German to English.\
    \ The training materials are a set of sentence pairs\n% in German and English\
    \ taken from the Internet.\n\n% Setting a random seed for reproducibility\nrng(301)\n\
    \n% Example queries file\nqueries_path = 'queries_words.txt';\n% Data input file\n\
    data_path = 'cleaned_words.txt';\n\nnoof_samples = 3000;\nbatch_size = 16;\nnoof_hidden_layers\
    \ = 256;\nnoof_epochs = 1000;\nembedding_dim = 128;\n\n% Read dialogs from a text\
    \ file\nfileID = fopen(data_path, 'r');\ntextData = textscan(fileID, '%s', 'Delimiter',\
    \ '\\n');\nfclose(fileID);\n% This gives us a cell array of strings (each line\
    \ from the file)\ntextData = textData{1};\n\n% Converting data type to cell\n\
    qna_list = cell(size(textData));\ngerman_sentences_ = cell(noof_samples+1, 1);\n\
    english_sentences_ = cell(noof_samples+1, 1);\n\n% Split each line into german\
    \ sentences and english sentences\nfor i = 1:numel(textData)\n    qna_list{i}\
    \ = strsplit(textData{i}, '\\t');\nend\n\n% Extract german sentences and english\
    \ sentences\nfor i = 1:noof_samples+1\n    german_sentences_{i} = qna_list{i}{1};\n\
    \    english_sentences_{i} = qna_list{i}{2};\nend\n\n% Load and tokenize the dataset\n\
    [input_tensor_train, target_tensor_train, ...\n    lang_tokenizer,rev_tokenizer,unique_words]\
    \ = ...\n    load_dataset(german_sentences_, english_sentences_);\n\n% Set the\
    \ unit count for alphabet sizes\nalph_size = 0;\nfor i = 1:noof_samples+1\n  \
    \  if max(target_tensor_train{i}(:)) > alph_size\n        alph_size = max(target_tensor_train{i}(:));\n\
    \    end\nend\n% Add one for padding token\nalph_size = alph_size + 1;\n\n% Converting\
    \ data type to categorical\nfor idx = 1:numel(target_tensor_train)\n    target_tensor_train{idx}\
    \ = categorical(target_tensor_train{idx},...\n                               \
    \           0:alph_size-1);\nend\n% Create the RNNwAtt model with specified parameters\n\
    layers = create_rnn_model_with_attention(alph_size, ...\n    embedding_dim, noof_hidden_layers,unique_words);\n\
    \n% Training the model\noptions = trainingOptions('adam', 'MaxEpochs', noof_epochs,\
    \ ...\n                          'MiniBatchSize', batch_size, ...\n          \
    \                'Shuffle', 'every-epoch', ...\n                          'ExecutionEnvironment','cpu');\n\
    \n% User interaction for training or loading a model\ndisp('OPTIONS:');\ndisp('1\
    \ - Train a new RNN-Att model');\ndisp('2 - Load an existing model');\n\noption\
    \ = input('Select an option by entering a number: ', 's');\nswitch option\n  \
    \  case '1'\n        disp('********** NOW TRAINING A NEW RNN-Att MODEL **********');\n\
    \        model = trainNetwork(input_tensor_train, target_tensor_train, ...\n \
    \           layers, options);\n        disp('********** RNN training complete\
    \ **********');\n    case '2'\n        modelFileName = input(['Enter the file\
    \ name of the' ...\n            ' RNN-Att Model you want to load: '], 's');\n\
    \        load(modelFileName, 'model');\n        disp(['****** SUCCESSFULLY LOADED\
    \ RNN-Att MODEL ' ...\n            modelFileName,'******']);\n    otherwise\n\
    \        error('Invalid input: Input must be 1 or 2');\nend\n\n% User interaction\
    \ for testing or saving a model\nwhile true\n    disp('OPTIONS:');\n    disp('1\
    \ - Test this RNN-Att model with input');\n    disp('2 - Test queries given in\
    \ a file');\n    disp('3 - Save existing model and logs');\n    disp('4 - Exit');\n\
    \n    option = input('Select an option by entering a number: ', 's');\n    switch\
    \ option\n        case '1'\n            user_input = input('Enter your input:\
    \ ', 's');\n            predicted_sentence = predictResponse(model, lang_tokenizer,\
    \ ...\n                rev_tokenizer, string(user_input));\n            disp(['Predicted\
    \ English Translation: ', predicted_sentence]);\n        case '2'\n          \
    \  fileID = fopen(queries_path, 'r');\n            queries = textscan(fileID,\
    \ '%s', 'Delimiter', '\\n');\n            queries = queries{1};\n            fclose(fileID);\n\
    \            % Initialize cell arrays for storing sentences\n            german_sentences\
    \ = cell(length(queries), 1);\n            english_sentences = cell(length(queries),\
    \ 1);\n            % Split each line into German and English sentences\n     \
    \       for i = 1:length(queries)\n                split_data = strsplit(queries{i},\
    \ '\\t');\n                german_sentences{i} = split_data{1};\n            \
    \    if numel(split_data) > 1\n                    english_sentences{i} = split_data{2};\n\
    \                else\n                    % Handling cases where there is no\
    \ tab character\n                    english_sentences{i} = '';\n            \
    \    end\n            end\n            % Convert cell arrays to string arrays\n\
    \            german_sentences = string(german_sentences);\n            english_sentences\
    \ = string(english_sentences);\n            for index = 1:length(german_sentences)\n\
    \                if isempty(german_sentences{index})\n                    continue;\n\
    \                end\n                % Prediction function\n                predicted_sentence\
    \ = predictResponse(model, ...\n                    lang_tokenizer, rev_tokenizer,\
    \ german_sentences(index));\n                % Display the results\n         \
    \       fprintf('%d. German Input: %s\\n', index, ...\n                    german_sentences(index));\n\
    \                fprintf('%d. Correct English Translation: %s\\n', ...\n     \
    \               index, english_sentences(index));\n                fprintf('%d.\
    \ Predicted English Translation: %s\\n', ...\n                    index, predicted_sentence);\n\
    \            end\n        case '3'\n            dtw = datestr(now, 'yyyy_mm_dd_HH_MM_SS');\n\
    \            model_path =sprintf(...\n                ('RNNwAtt_model_N%d_B%d_U%d_EP%d_EM%d_%s.mat'),\
    \ ...\n                noof_samples, batch_size, noof_hidden_layers, ...\n   \
    \             noof_epochs, embedding_dim, dtw);\n\n            save(model_path,\
    \ 'model');\n            disp(['Successfully saved to', model_path]);\n      \
    \  case '4'\n            disp('Exiting program');\n            break;\n    end\n\
    end\n\nfunction [input_tensor, target_tensor, lang_tokenizer, reverseTokenizer,\
    \ ...\n    unique_words] = load_dataset(inp_lang, targ_lang)\n    % Create dictionaries\
    \ for inputs and targets\n    [lang_tokenizer, ] = tokenDictionary(inp_lang);\n\
    ```"

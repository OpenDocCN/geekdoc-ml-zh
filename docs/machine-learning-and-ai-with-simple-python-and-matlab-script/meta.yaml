  md: '# 2.7 Updating Weights


    During training of an ANN, after each back propagation, the weights are updated
    such that the error is reduced after each iteration, which is based on the modifications
    of the gradients modified through the hidden layers as described above.


    Let $\alpha$ be defined as the *learning rate*, a real number that specifies the
    amount of modification chosen in updating the weights during training. Using the
    derivatives in Eqs. (2.14) and (2.16), the weights will be updated at each iteration
    as follows:


    $$W_{new}^{(1)} = W^{(1)} - \alpha \frac{\partial J}{\partial W^{(1)}}$$

    $$W_{new}^{(2)} = W^{(2)} - \alpha \frac{\partial J}{\partial W^{(2)}},$$

    (2.17)


    where the weights on the left-hand side with subscript *new* are the updated values
    at that iteration, whereas the right-hand side of the equations have the current
    weight values. After updating the weights, a new forward and back propagation
    are performed. At each iteration the weights are updated using the new gradients
    with Eq. (2.17). Successive updatings of weights are expected to reduce the error
    in ANN outputs. Training continues until a satisfactorily small amount of error
    is obtained or a pre-determined number of iterations are performed.


    # 2.8 ANN with Input Bias


    In real-life problems, adjusting the weights to minimize output errors requires
    that a bias is employed at every layer of the ANN, as shown in Figure 2.8. Bias
    values, similar to synapse weights, are first randomly initialized. During training,
    they are propagated forward and back and updated at each iteration of training.
    Step by step derivation of updating bias and weight values during the training
    process using input bias is presented in Appendix B.


    ![](img/a83d807f9a9119b1472555c0ef55797e_38_0.png)'

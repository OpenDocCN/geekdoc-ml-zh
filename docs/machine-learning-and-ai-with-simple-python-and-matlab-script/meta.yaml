    that they can be feasibly implemented for real-life applications.


    # 13.5 Concluding Remarks


    In this chapter we focus on machine translation applications using RNNs with the
    attention mechanism. Because even the last words in a sentence may change its
    translation to another language, output generation does not start until all words
    in the input sentence have been processed by the RNN-Att. Another feature of machine
    translation is that the length of an input sentence may be different to its translation.
    Such characteristics necessitate a many-to-many RNN-Att architecture. Because
    natural languages tend to have large vocabularies and the size of the sample data
    may be in millions, RNN-Att architectures with multiple hidden and embedding layers
    are customary for machine translators.



    ## D.2 Embedding Layer


    When an embedding layer is used in an RNN as discussed in Section 10.5 in Chapter
    10, we have


    $$x_t = E \cdot x_t^o, \quad (D.24)$$


    where $x_t^o$''s the one-hot-encoded input vector and $E$ is the embedding weight

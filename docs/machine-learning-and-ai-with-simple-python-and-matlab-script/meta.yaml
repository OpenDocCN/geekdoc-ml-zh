    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) h_{k-1} \right)$$ (10.11)


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) x_k \right)$$ (10.12)


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) \right),$$ (10.13)


    where $\dagger$ represents the matrix transpose operation. Using these gradients,
    values of the $U$, $W$, $V$, $b$ and $c$ matrices are updated after a back propagation
    by subtracting the current value scaled by a learning rate of $\eta$ (similar
    to the learning rate $\alpha$ used in ANNs in Chapter 2):


    $$V_{new} = V - \eta \frac{\partial L}{\partial V}$$ (10.14)


    $$c_{new} = c - \eta \frac{\partial L}{\partial c}$$ (10.15)


    $$W_{new} = W - \eta \frac{\partial L}{\partial W}$$ (10.16)


    $$U_{new} = U - \eta \frac{\partial L}{\partial U}$$ (10.17)


    $$b_{new} = b - \eta \frac{\partial L}{\partial b},$$ (10.18)


    where subscript $new$ is used to represent the updated parameter values. Since
    these parameters are updated by using gradients of loss $L$, it is expected that
    the next forward propagation using the updated parameters will yield a smaller

  md: 'A trial solution for the $x$ dimension is determined as follows:


    +   - if ($rand_x \leq CR$ OR $rnbr = 0$): variant solution for $x$ dimension
    is used as the trial solution''s $x$ dimension: select the trial solution as $u_{ix}
    = v_{ix}$.

    - if ($rand_x > CR$ AND $rnbr \neq 0$): trial solution''s $x$ dimension is the
    same as the $x$ dimension of the individual from generation $g$: $u_{ix} = P_{ix}^g$.


    Similarly, a trial solution for the $y$ dimension is obtained as follows:


    +   - if ($rand_y \leq CR$ OR $rnbr = 1$): variant solution for $y$ dimension
    is used as the trial solution''s $y$ dimension: select the trial solution as $u_{iy}
    = v_{iy}$.

    - if ($rand_y > CR$ AND $rnbr \neq 1$): trial solution''s $y$ dimension is the
    same as the $y$ dimension of the individual from generation $g$: $u_{iy} = P_{iy}^g$.


    Figure 18.9 shows examples of generating a trial solution for all four possible
    cases (i.e. only $x$, only $y$ or both $x$ and $y$ dimension solutions being selected
    from the trial solution).


    After constructing a trial solution $U_i$, its fitness $f(U_i)$ is calculated.
    Then $f(U_i)$ is compared with the fitness of the current individual $f(P_i^g)$.
    Then a selection is performed as follows. If the trial solution has better fitness
    than the current individual from generation $g$, then it is selected for generation
    $(g + 1)$; otherwise, the current individual from generation $g$ is selected such
    that:


    ```

    if ($f(U_i) < f(P_i^g)$) then $P_i^{g+1} = U_i$

    else $P_i^{g+1} = P_i^g$.

    ```



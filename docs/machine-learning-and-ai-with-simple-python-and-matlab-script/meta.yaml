    # 4.3.3 Exponential Moving Average


    Similar to an SMA, the `exponential moving average` (EMA) is the average price
    of a stock over a fixed window of days such that the most recent prices are weighted
    more than the older ones in the calculation [47]. To recursively compute an $n$-day
    EMA on day $t$, a percentage of the price for a day is added to the EMA of the
    previous day for $n$ days as follows:


    $$EMA(t) = price(t) \cdot \frac{2}{(n+1)} - EMA(t-1) \cdot \left(1 - \frac{2}{(n+1)}\right),$$


    where $2/(n+1)$ is called the `cooling` period. In a period of $n$ days, when
    calculating the EMA for the earliest day (let us call it $t_0$), the SMA for day
    $t_0$ is used:


    $$EMA(t_0) = SMA(t_0).$$


    The result of the EMA is similar to that of the SMA, except that the older days
    have less impact on the outcome. Thus, in theory, the EMA will have less delay
    in reflecting the latest stock movements compared to the SMA (Figure 4.4) – since
    the EMA applies more weight to current data, it follows prices more closely than
    a corresponding SMA. However, one has to be aware that the EMA may be overly sensitive
    to price changes compared to a comparable SMA. During trading, if the EMA rises
    when prices go below the EMA, this may trigger a buy `signal` (i.e., an indication
    generated by an algorithmic trading system that a user should buy this particular
    stock). Similarly, if the EMA falls when prices are above the EMA, a sell signal
    may be generated.


    # 4.3.4 Bollinger Bands


    A pair of curves calculated for a given stock based on two standard deviations
    above and below the SMA are referred to as `Bollinger bands` (BBs) [48]. The main
    idea for using BBs is that the price for a non-volatile stock will typically stay
    within the limits of the BBs. If an asset price moves


    ![](img/a83d807f9a9119b1472555c0ef55797e_75_0.png)'
  - '[PAGE 76]


    ![](img/a83d807f9a9119b1472555c0ef55797e_76_0.png)


    Figure 4.5 Bolinger bands for a fictitious stock computed using 20-day SMA and
    2 σ (taken from [49] / FMR LLC).


    out of the BBs, it is expected to return back into the BB range. This expectation
    may be a useful guide in dictating buy or sell decisions for a given stock.


    For example, if an asset price goes above the BB, this does not necessarily indicate
    a buy signal since it is expected that it will soon return into its BB. Similarly,
    a stock price falling below its BB may not trigger and automatic a sell signal
    since it is expected to rise up into its BB again (Figure 4.5). For a given day
    t, BB is computed as follows:


    $$BB(t) = \pm \frac{price(t) - SMA(t)}{2 \cdot \sigma(t)}$$


    where σ stands for the standard deviation of price changes during the same period
    of n days. Typical values for a short-term BB is a 10-day SMA and a band of (±1.5
    · σ), whereas a long-term BB uses a 20-day SMA and a band of (±2.5 · σ) [49].


    # 4.4 A Simple Algorithmic Trading Policy


    Technical indicators can be used in determining an `algorithmic trading policy`,
    by which decisions are made to buy, sell or hold a given stock. The first step
    of employing technical indicators is to define their parameters, which are referred
    to as `hyper-parameters`. For M, the hyper-parameter is the time range used to
    compute its slope, whereas for the SMA and EMA, it is the time range over which
    the SMA and EMA are to be calculated. For BBs, the hyper-parameters are the time
    range for the SMA and the number of standard deviations the bands are away from
    the SMA. Selection of hyper-parameter values to be used in technical indicators
    is a formidable and non-trivial challenge in algorithmic trading.


    An overly simplified example of using the SMA in algorithmic trading can be constructed
    as follows. For a given stock, whenever a short-term SMA (e.g., 50 days) crosses
    above a long-term SMA (e.g., 200 days), a `price increase trend` is detected.
    With the expectation that this'
- md: 'trend will continue, a signal to buy this stock may be generated. If the price
    keeps increasing, a profit will be made. Similarly, if a short-term SMA crosses
    below a long-term SMA, a down trend is detected and the stock will lose value
    in the coming days and, hence, should be sold before its price gets even lower.
    This way, a loss is prevented.


    It is not obvious how to choose the period over which an SMA is calculated. It
    requires experience and knowledge of the specific financial sector in which the
    stock is traded. If a relatively large n is selected, the SMA makes the price
    curve smoother and, hence, it becomes easier to extract information from it since
    the noise and outliers are eliminated from the price curve. However, the SMA over
    larger periods may create a delay between the price movement and SMA curves, which
    may lessen the ability to detect recent price movements for traders. On the other
    hand, a short-period SMA can respond more quickly to price changes, but with the
    risk of being more volatile (i.e., a measure that fluctuates in value more than
    others).


    As an example, consider the two separate SMA curves (for 50 and 200 days) displayed
    in Figure 4.6 for Bitcoin. One can form a policy called moving average crossover
    [50] such that when a short-term SMA crosses over a long-term SMA from beneath,
    it indicates a potential buy signal. This means that the short-term SMA is showing
    a value gain, whereas the long-term SMA has not responded yet. Similarly, a cross
    from above indicates a sell signal for a stock (i.e., an indication from an algorithmic
    trading system to a user to sell the stock), which implies that the short-term
    SMA has detected a loss of value before the long-term SMA. This crossover strategy
    can be also used with the EMA [50].


    In other applications, if M for a given stock has a relatively large positive
    value, one may conclude that the price will keep rising (i.e., a buy signal).
    Similarly, a relatively large negative value may be a sign that its value will
    keep decreasing, implying a sell signal. When using BBs, if the current price
    goes above the upper band, it is usually considered a potential sell signal. Likewise,
    if the current price goes below the lower band, it is considered to be a potential
    buy signal. The assumption in this approach is that the price will stay within
    the lower and upper bands of the BBs and that, if the price goes outside of the
    BBs, it is expected that it will return into the band shortly. This assumption
    implies that if the price is above the upper BB, one must sell the stock since
    it will soon get back to the band by dropping its price. Similarly, if the price
    is below the lower BB, it is expected to come back into the BB by increasing its
    price and, hence, a buy signal may be generated.


    ![](img/a83d807f9a9119b1472555c0ef55797e_77_0.png)


    Figure 4.6 50-day and 200-day SMA price curves for Bitcoin (taken from [50] /
    MYSMP, LLC).


    ## 4.5 A Simple ANN for Algorithmic Stock Trading


    ANNs are perfect candidates for predicting stock prices based on historical data
    recorded during trading hours over long periods of time (typically in the order
    of years or decades). Recorded trading information includes many useful metrics,
    such as daily opening and closing prices, minimum and maximum buy and sell prices,
    and volume, recorded over all functioning financial markets. This information
    is referred to as tick data since it was recorded using ticker tapes in the old
    days of trading in the early twentieth century using wired connections between
    stock exchange buildings and trading houses [51]. Tick data also includes timestamp
    information for each bid (i.e., the highest price a buyer is willing to pay for
    an asset) and ask (i.e., the lowest price a seller is willing to accept), typically
    for every minute of a trading day.


    In utilizing an ANN for algorithmic trading, a popular approach is to employ a
    set of technical indicators computed up to a selected day t as the ANN inputs,
    whereas output(s) may be selected as prediction(s) about this financial asset
    for the following day t + 1 (or the next hour if computed hourly, etc.). During
    training, the selected technical indicators are computed for day t as inputs with
    a corresponding sample output computed from the tick data. For example, if the
    ANN output is selected as percentage change in stock price, the sample output
    for day t is x percent if the closing price from day t to day t + 1 was recorded
    as an increase by x percent. Similarly, if the stock lost its value by x percent
    at day t + 1, the output for this sample will be −x percent. Training continues
    with the samples obtained from historical tick data recorded for a selected period
    of several years or decades. Once the training is over, the ANN is ready to be
    used for predictions to buy, sell or hold this stock until a new model is trained
    in the future.


    ### 4.5.1 ANN Inputs and Outputs


    In this section we introduce a simplistic ANN to be used for our algorithmic trading
    example, where the inputs are a set of technical indicators calculated for user-defined
    periods (i.e., hyper-parameter values), and the ANN output is the predicted movement
    of the price. For this example, we utilize four technical indicators as ANN inputs,
    namely, M, SMA, EMA and BB, computed for the closing price of a given stock (or
    group of stocks) up to day t. We define prediction of percentage change in stock
    price on day t + 1 as the output of the ANN. After an architecture is defined
    (i.e., the number of hidden layers and the number of neurons at each layer, activation
    function assignments, and so on), the ANN is trained using technical indicators
    computed based on the historical tick data.


    Typically, a professional stock trader makes the final policy decisions with the
    help of the predictions generated by the ANN. For example, as discussed in Section
    4.4, if a decrease in price is predicted, it may trigger a sell signal, whereas
    a predicted price increase may suggest a buy signal. In real-life situations,
    however, a trader may also have other inputs to consider which are not defined
    as ANN inputs (e.g., upcoming elections, economic strength, state of the housing
    market, unemployment rate, natural disasters) before making policy decisions.
    For such cases, the ANN provides enhanced clarity through its predictions based
    on various technical indicators.


    Back-testing is a method that helps in determining an optimal combination of technical
    indicators and hyper-parameters for an ANN. Suppose a trader wishes to use the
    tick data covering five years of trading information. The ANN designer may choose
    the data from the first four years to train and the data from the last year to
    test whether the trained ANN performance is acceptable. In this case, once the
    ANN weights are updated properly over a chosen number of epochs with the data
    from years 1 through 4, performance of the trained ANN is tested using the data
    from year 5. This is called back-testing, which measures the accuracy of the ANN
    predictions as if it were executing algorithmic trading instructions during year
    5. If back-testing results are not satisfactory, the designers modify ANN components
    until an acceptable combination of architecture, inputs with proper hyper-parameter
    values, meaningful outputs, number of epochs to train over and other similar aspects
    are determined. Dividing the historical tick data between training and back-testing
    is a trade-off that the designers must tackle for the specific market conditions
    under which they are operating. For some applications, the ANN is trained daily,
    whereas for other markets ANNs trained a few times a year are preferred. In summary,
    to engage an ANN for algorithmic trading, at minimum, the following steps should
    be performed:


    - Select technical indicators and/or other variables to be used as ANN inputs
    (e.g., M, SMA, EMA and BB, interest rates, unemployment rate).

    - Define hyper-parameter values for the selected technical indicators (e.g., SMA
    (5), EMA (20), the latest interest rates averaged over last two quarters).

    - Define an ANN architecture (i.e., number of layers, number of neurons per layer,
    connections between layers, activation functions, etc.).

    - Split the historical data for training and back-testing.

    - Determine or compute the ANN inputs and corresponding outputs for each training
    day using the training portion of the historical data.

    - Train the ANN by applying the inputs, computing the errors in its output and
    updating the weights for a pre-determined number of epochs.

    - Using the back-testing portion of historical data, measure the ANN’s performance.

    - Based on the back-testing results, if needed, modify the ANN architecture as
    well as the selection of ANN inputs and outputs and repeat the above steps until
    a satisfactory performance is obtained.

    - Once the ANN is trained properly, it is ready to be used in the field: new inputs
    are provided using the latest information to obtain predictions.


    ### 4.5.2 ANN Architecture


    For the simplistic ANN architecture used in this chapter, as shown in Figure 4.7,
    we define four inputs, namely M, SMA, EMA and BB, and one output as the percentage
    change in price for the following day. Note that W and B in the figure are the
    weight matrices and the bias vector defined in Chapter 3. In this simplistic ANN,
    there are two hidden layers with four and three neurons, respectively. The ANN
    is fully connected. A sample of the tick data used for training this ANN is shown
    in Figure 4.8, which contains daily opening, highest, lowest, closing and adjusted
    closing prices (i.e., the closing price re-computed after the trading day ends
    to reflect actions on the stock price, such as paying dividends, stock splitting,
    etc. [51]) and volume (i.e., the number of units sold and bought) for the selected
    example of Microsoft stock.'

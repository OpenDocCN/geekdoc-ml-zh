    # 5.6 Concluding Remarks


    With recent advances in machine learning and increased power of personal medical
    data collection capabilities, it is possible to develop predictive models of neurodegenerative
    disease prognosis by mining multimodal datasets. Aggregating information from
    the ADNI database, where a wide range of information for AD patients is stored,
    possible correlations can be explored for cognitive decline rate of MCI patients
    and certain continuous personalized measurements. In this chapter, we show that
    it is feasible for an ANN to exploit the possible relationship between gene expressions
    of AD patients and their cognitive decline measured by MMSE scores taken over
    time.


    Subject matter experts (in this case, biologists and medical researchers) combine
    their experience with computational experts (e.g. statisticians, software engineers
    and data scientists) to design effective ANN architectures (e.g. selection of
    ANN inputs and outputs, number of hidden layers, neurons per layer, activation
    functions, number of epochs and learning rates). Equally important decisions include
    selection of biomarkers which may be important, such as blood elements, proteins,
    MRI information and hippocampal images of the brain [60].


    Through the simplistic example presented in this chapter, we show that the use
    of an ANN in estimating personalized disease progression for AD patients is worth
    further research and experimentation. It is our hope that, by integrating effective
    computational methods and comprehensive'

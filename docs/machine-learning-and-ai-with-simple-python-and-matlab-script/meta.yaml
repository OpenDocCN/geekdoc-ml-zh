    energy consumption and traffic intensity [138]. PSO can be useful in power management
    problems in large-scale wireless ad-hoc networks, where nodes are clustered into
    smaller subnetworks with only relatively few links between them. PSO finds stable
    clusters of nodes to ensure energy-efficient and stable communication in the network
    [139].


    In data mining applications, large amounts of information are handled such that
    chunks of data with similar characteristics need to be grouped together. PSO can
    automatically determine an optimal number of clusters needed for accurate classification
    of input data. Each particle represents a data element located at the centre of
    a cluster, where distance is measured by the similarity between two data elements.
    A corresponding fitness function is used to promote clusters that are denser and
    with larger numbers of data points [140].


    # 18.2.2 PSO Operation


    PSO uses a number of agents (i.e. particles) that constitute a swarm flying over
    a search space looking for the best solution:


    +   - A particle adjusts its flying based on its own flying experience as well
    as the flying experience of other particles.

    - Each particle keeps track of its coordinates in the solution space which are
    associated with the best solution (fitness) that has been achieved so far by that
    particle. This value is called the *personal best*: $P_j^{(best)}$.

    - Another important value tracked by the PSO is the best value obtained so far
    by any particle in the swarm. This value is called the *global best*: $G^{best}$.


    At generation $g$, a particle $j$ has a position $P_j^g$ and a velocity of $v(t)$.
    Each particle knows its own personal best position and the global best position
    of all particles. In PSO, evolving the speed of a particle $j$ from generation
    $g$ to $(g + 1)$ (i.e. $P_j^g \rightarrow P_j^{g+1}$) is accomplished as follows:


    $V_{g+1} = w \cdot V_g + C_1 \cdot R_1 \cdot (P_j^{(best)} - P_j^g) + C_2 \cdot
    R_2 \cdot (G^{best} - P_j^g)$, (18.2)


    where the following PSO optimization parameters are used:


    +   - $V_{g+1}$: new speed for the particle

    - $V_g$: current speed for the particle

    - $P_j^g$: current position of the particle

    - $w$: weight factor for inertia (a real number in the range [0, 1])

    - $R_1$: influence of $P_j^{(best)}$ in velocity update (a random real number
    in the range [0, 1])

    - $R_2$: influence of $G^{best}$ in velocity update (a random real number in the
    range [0, 1]) [105]

    - $C_1$: self-confidence of a particle in velocity update (a real number in the
    range [0, 4])

    - $C_2$: swarm-confidence of the entire population in velocity update (a real
    number in the range [0, 4])

    - $P_j^{(best)}$: the personal best position that particle $j$ has flown over
    so far

    - $G^{best}$: the global best position that any particle in the swarm has flown
    over so far


    Parameter $w$ controls the momentum of a particle:


    +   - $w \ll 1$: very little momentum is kept from the last generation.

    - $w = 0$: no knowledge from last time-step is kept; each generation is independent.

    - $w = 1$: particles do not easily change their directions – typically used to
    explore larger areas in the beginning.'
  - "[PAGE 315]\n\n+   - $w$ can be decreased as a function of number of generations\
    \ (e.g. more exploration at the beginning and more trust on swarm intelligence\
    \ towards the end).\n- Typically inertia weight $w$ is reduced as the number of\
    \ generations grow (e.g. from 0.9 to 0.4) [105].\n\n$C_1$ is the self-confidence\
    \ of a given particle: how much of a particle's own experience contributes to\
    \ the search at a given generation (self-exploration). $C_2$ represents swarm\
    \ confidence, the motion of all particles in the swarm at a given generation (swarm-exploration).\
    \ Typically, $C_1$ and $C_2$ are set to 1.5.\n\n# Computing a New Position for\

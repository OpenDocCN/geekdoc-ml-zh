    \n# plot the line of the predicted output, sets color of line to skyeblue,\n#\
    \ and for the legend, it adds a label title\nplt.plot(x, prediction*x+baseline,\
    \ color='skyblue',\n         label ='predicted MMSE score decline')\n\nplt.xlabel('Weeks\
    \ Since First Mini-Mental State Exam') # sets x axis label\nplt.ylabel('MMSE Score')\
    \ # sets y axis label\nplt.xlim([0, 52]) # sets x axis range from 0 to 52\n\n\
    # set title\ntitle = \"MMSE Score Decline \\n Predicted vs Actual \\n Patient:\"\
    \nplt.title(title + patient_ID)\n\nplt.legend() # shows the legend\n\n# save the\
    \ graph into predictions directory\nplt.savefig(f'predictions/{patient_ID}.png')\n\
    \nprint(\"***************************\")\nprint(\"LOOP DONE \\n\")\n\n# List the\
    \ percent error, slopes\n```"
- md: "## 5.5 Matlab Script for AD Prognosis Using an ANN\n\nIn this section we present\
    \ a sample Matlab script implementing the ANN given in Figure 5.3. The structure\
    \ of the program is kept similar to the Python script in Section 5.4 so that readers\
    \ can easily compare the two versions.\n\nIn lines 10–18, the inputs and outputs\
    \ for the ANN are saved into `X_int` and `Y`, respectively. The output values\
    \ are normalized in line 18. In the loop in lines 30–80, four patients are selected\
    \ to be tested as part of the LOOCV method. In lines 43 and 45, the $i^{th}$ data\
    \ point is taken out of the training set. In lines 48 and 49, the input and output\
    \ samples are put into table format. Between lines 52 and 64, the ANN is defined\
    \ with the number of hidden layers shown in Figure 5.3 and saved in an object\
    \ named `layers`. In lines 67–69, the options for the ANN training are defined,\
    \ with the optimization as gradient descent (i.e. adam), the learning rate as\
    \ 0.01, the number of epochs as 100, the batch size as 10 (i.e. the number sample\
    \ inputs to be used at one time during the training) and the `Shuffle` option\
    \ is set to `every-epoch` (i.e. the input samples are shuffled at each epoch to\
    \ reduce over-fitting in training). In line 73, the ANN is trained:\n\n```\nmodel\
    \ = trainNetwork(InputsTrain, Outputstrain, layers, options)\n```\n\nand a prediction\
    \ for the $i^{th}$ patient is generated in line 80:\n\n```\nprediction_scaled\
    \ = predict(model, LOOCV_inputArray)\n```\n\nwhere the `LOOCV_inputArray` holds\
    \ the $i^{th}$ patient input (this was set in line 38). In lines 82–87, the prediction\
    \ is normalized. In lines 89–93, the error percentage for the prediction is computed.\
    \ In the rest of the script, the predicted and actual prognosis lines are plotted.\n\
    \n## 5 ANNs for Alzheimer's Disease Prognosis\n\nFigure 5.4 Sample error rates\
    \ generated by the Python script for four patients.\n\n```\n**********************************\n\
    LEAVING OUT ROW 0\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 62ms/step\n\nThe relative error is : 19.66%\nThe predicted MMSE Score slope\
    \ is: -0.029 mmse-points/week\nThe actual slope is : -0.036\n**********************************\n\
    LEAVING OUT ROW 1\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 78ms/step\n\nThe relative error is : 44.37%\nThe predicted MMSE Score slope\
    \ is: -0.032 mmse-points/week\nThe actual slope is : -0.058\n**********************************\n\
    LEAVING OUT ROW 2\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 109ms/step\n\nThe relative error is : 7.57%\nThe predicted MMSE Score slope\
    \ is: -0.021 mmse-points/week\nThe actual slope is : -0.019\n**********************************\n\
    LEAVING OUT ROW 3\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 76ms/step\n\nThe relative error is : 23.54%\nThe predicted MMSE Score slope\
    \ is: -0.027 mmse-points/week\nThe actual slope is : -0.022\n**********************************\n\
    LOOP DONE\n\nPatient ID: 002_S_2043\nSlope of Cognitive Decline: Actual: -0.036\
    \  Predicted: -0.029\nPercent Slope Error: 19.66\nMMSE score at Week 52: Actual:\
    \ 27.71  Predicted: 28.07\nPercent MMSE Score Error at Week 52:    0.01\n\nPatient\
    \ ID: 002_S_4171\nSlope of Cognitive Decline: Actual: -0.058  Predicted: -0.032\n\
    Percent Slope Error: 44.37\nMMSE score at Week 52: Actual: 25.25  Predicted: 26.61\n\
    Percent MMSE Score Error at Week 52:    0.05\n\nPatient ID: 002_S_4219\nSlope\
    \ of Cognitive Decline: Actual: -0.019  Predicted: -0.021\nPercent Slope Error:\
    \ 7.57\nMMSE score at Week 52: Actual: 28.86  Predicted: 28.76\nPercent MMSE Score\
    \ Error at Week 52:   -0.0\n\nPatient ID: 002_S_4237\nSlope of Cognitive Decline:\
    \ Actual: -0.022  Predicted: -0.027\nPercent Slope Error: 23.54\nMMSE score at\
    \ Week 52: Actual: 27.89  Predicted: 27.63\nPercent MMSE Score Error at Week 52:\
    \   -0.01\n\nAverage % Slope Error: 23.785%\nAverage % MMSE Score Error at Week\
    \ 52: 0.013%\n```\n\nThe error rates generated by a sample run of the Python script\
    \ above for four patients are presented in Figure 5.4. Training employed LOOCV\
    \ and generated AD prognosis for four randomly selected patients, namely, 002_S_2043,\
    \ 002_S_4171, 002_S_4219, and 002_S_4237. For this specific run, the best result\
    \ was obtained for patient 002_S_4219, for whom the cognitive decline was predicted\
    \ by the ANN as the line equation $y = -0.021x + 29.58$, whereas the actual decline\
    \ was given by the line equation $y = -0.019x + 29.58$ (Figure 5.5(c)). Based\
    \ on this prediction, patient 002_S_4237 receives an MMSE score of 28.76 one year\
    \ after the first MMSE score was recorded. However, the real data shows that the\
    \ patient's score was 28.86. The worst prediction was for patient 002_S_4171 with\
    \ predicted and actual decline functions of $y = -0.032x + 28.27$ and $y = 0.058x\
    \ + 28.27$, respectively, corresponding to MMSE scores of 26.71 and 25.25 one\
    \ year after the first exam (Figure 5.5(b)).\n\n## 5.5 Matlab Script for AD Prognosis\
    \ Using an ANN\n\n![](img/a83d807f9a9119b1472555c0ef55797e_98_0.png)\n\n```\n\
    1  % The City College of New York, City University of New York\n2  % Written by\
    \ Sultana Begum\n3  % August, 2024\n4  \n5  % GA for Alzheimer disease Prognosis\
    \ based gene expressions and\n6  % MMSE scores\n7  \n8  clear; clc;\n9  \n10 %\
    \ Load training data\n11 training_X = 'training_data/gene_expressions.csv';\n\
    12 X = readtable(training_X);\n13 \n14 % Extract input features\n15 X_in = X(:,\
    \ contains(X.Properties.VariableNames, 'x_at'));\n16 \n17 training_Y = 'training_data/mmse_score_slopes.csv';\n\
    18 Y = readtable(training_Y);\n19 \n20 mmse_slopes = Y.('m_coef_mmse_points_week_');\
    \ % Access column\n21 Y_scaled = rescale(mmse_slopes, 0, 1); % Min-max scaling\n\
    22 \n23 % Initialize variables\n24 percent_errors = [];\n25 predictions = [];\n\
    26 actual_slopes = [];\n27 patient_IDs = [];\n28 \n29 % Leave-One-Out Cross-Validation\n\
    30 for i = 1:4\n31     fprintf(\"\\n***********************************\\n\");\n\
    32     fprintf(\"LEAVING OUT ROW %d \\n\", i);\n33 \n34     inputs = X_in;\n35\
    \     outputs = Y_scaled;\n36 \n37     % Save the input for test sample\n38  \
    \   LOOCV_input = inputs(i,:);\n39     % Get the slope of test sample\n40    \
    \ actual_slope = mmse_slopes(i);\n41 \n42     % Drop the row with test sample\
    \ inputs\n43     inputs(i,:) = [];\n44     % Remove the output of test sample\n\
    45     outputs(i) = [];\n46 \n47     % Convert data to table format for training\n\
    48     inputsTrain = table2array(inputs);\n49     outputsTrain = table2array(table(outputs,\
    \ 'VariableNames',{'Output'}));\n50 \n51     % Define ANN model: 160-60-15-5-1\
    \ architecture\n52     layers = [\n53         featureInputLayer(size(inputsTrain,\
    \ 2), 'Name', 'input')\n54         fullyConnectedLayer(120, 'Name', 'fc1')\n55\
    \         reluLayer('Name', 'relu1')\n56         fullyConnectedLayer(60, 'Name',\
    \ 'fc2')\n57         reluLayer('Name', 'relu2')\n58         fullyConnectedLayer(15,\
    \ 'Name', 'fc3')\n59         reluLayer('Name', 'relu3')\n60         fullyConnectedLayer(5,\
    \ 'Name', 'fc4')\n61         reluLayer('Name', 'relu4')\n62         fullyConnectedLayer(1,\
    \ 'Name', 'output')\n63         regressionLayer('Name', 'regression')\n64    \
    \ ];\n65 \n66     % Set options for training\n67     options = trainingOptions('adam',\
    \ 'InitialLearnRate', 0.01, ...\n68         'MaxEpochs', 1000, 'Verbose', true,\
    \ 'MiniBatchSize', 10, ...\n69         'Shuffle', 'every-epoch', 'Plots', 'training-progress');\n\
    70 \n71     % Train the model\n72     fprintf(\"Training Started\\n\");\n73  \
    \   model = trainNetwork(inputsTrain, outputsTrain, layers, options);\n74    \
    \ fprintf(\"Training Finished\\n\");\n75 \n76     % Prepare LOOCV input for prediction\n\
    77     LOOCV_inputArray = table2array(LOOCV_input);\n78 \n79     % Predict the\
    \ test sample\n80     prediction_scaled = predict(model, LOOCV_inputArray);\n\
    81 \n82     % Normalize prediction\n83     mmse_score_min = min(mmse_slopes);\n\
    84     mmse_score_max = max(mmse_slopes);\n85     mmse_max_min_difference = mmse_score_max\
    \ - mmse_score_min;\n86     prediction = mmse_score_min + ...\n87            \
    \      prediction_scaled * mmse_max_min_difference;\n88 \n89     % Calculate percent\
    \ error\n90     rel_err = abs(((prediction - actual_slope) / actual_slope) * 100);\n\
    91     rel_error = round(rel_err, 2);\n92     fprintf(\"\\nThe relative error\
    \ is: %.2f%%\\n\", rel_error);\n93     percent_errors = [percent_errors; rel_error];\
    \ % Append percent error\n94 \n95     % Store predictions and actual values\n\
    96     predictions = [predictions; prediction];\n97     actual_slopes = [actual_slopes;\
    \ actual_slope];\n98 \n99     % Get patient ID and ensure it is a string\n100\
    \    patient_ID = X.('patient_id')(i); % Access column\n```"
  mdcn: "## 5.5 用于阿尔茨海默病预后的Matlab脚本（基于ANN）\n\n本节我们展示一个实现图5.3所示ANN的Matlab脚本示例。程序结构与第5.4节的Python脚本保持相似，以便读者能轻松比较两个版本。\n\
    \n在第10-18行，ANN的输入和输出分别保存到`X_int`和`Y`中。输出值在第18行进行了归一化处理。在第30-80行的循环中，作为留一交叉验证方法的一部分，选择了四名患者进行测试。在第43和45行，第$i^{th}$个数据点从训练集中移除。在第48和49行，输入和输出样本被转换为表格格式。在第52至64行之间，ANN被定义为图5.3所示的隐藏层数量，并保存在名为`layers`的对象中。在第67-69行，定义了ANN训练的选项，优化器为梯度下降（即adam），学习率为0.01，训练轮数为100，批量大小为10（即训练过程中一次使用的样本输入数量），`Shuffle`选项设置为`every-epoch`（即在每个训练轮次打乱输入样本以减少训练中的过拟合）。在第73行，训练ANN：\n\
    \n```\nmodel = trainNetwork(InputsTrain, Outputstrain, layers, options)\n```\n\
    \n并在第80行生成对第$i^{th}$名患者的预测：\n\n```\nprediction_scaled = predict(model, LOOCV_inputArray)\n\
    ```\n\n其中`LOOCV_inputArray`保存了第$i^{th}$名患者的输入（这在第38行设置）。在第82-87行，预测值被归一化。在第89-93行，计算了预测的误差百分比。在脚本的其余部分，绘制了预测和实际的预后曲线。\n\
    \n## 5 用于阿尔茨海默病预后的ANN\n\n图5.4 Python脚本为四名患者生成的样本误差率。\n\n```\n**********************************\n\
    LEAVING OUT ROW 0\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 62ms/step\n\nThe relative error is : 19.66%\nThe predicted MMSE Score slope\
    \ is: -0.029 mmse-points/week\nThe actual slope is : -0.036\n**********************************\n\
    LEAVING OUT ROW 1\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 78ms/step\n\nThe relative error is : 44.37%\nThe predicted MMSE Score slope\
    \ is: -0.032 mmse-points/week\nThe actual slope is : -0.058\n**********************************\n\
    LEAVING OUT ROW 2\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 109ms/step\n\nThe relative error is : 7.57%\nThe predicted MMSE Score slope\
    \ is: -0.021 mmse-points/week\nThe actual slope is : -0.019\n**********************************\n\
    LEAVING OUT ROW 3\n\nTraining Started\nTraining Finished\n\n1/1 [==============================]\
    \ - 0s 76ms/step\n\nThe relative error is : 23.54%\nThe predicted MMSE Score slope\
    \ is: -0.027 mmse-points/week\nThe actual slope is : -0.022\n**********************************\n\
    LOOP DONE\n\nPatient ID: 002_S_2043\nSlope of Cognitive Decline: Actual: -0.036\
    \  Predicted: -0.029\nPercent Slope Error: 19.66\nMMSE score at Week 52: Actual:\
    \ 27.71  Predicted: 28.07\nPercent MMSE Score Error at Week 52:    0.01\n\nPatient\
    \ ID: 002_S_4171\nSlope of Cognitive Decline: Actual: -0.058  Predicted: -0.032\n\
    Percent Slope Error: 44.37\nMMSE score at Week 52: Actual: 25.25  Predicted: 26.61\n\
    Percent MMSE Score Error at Week 52:    0.05\n\nPatient ID: 002_S_4219\nSlope\
    \ of Cognitive Decline: Actual: -0.019  Predicted: -0.021\nPercent Slope Error:\
    \ 7.57\nMMSE score at Week 52: Actual: 28.86  Predicted: 28.76\nPercent MMSE Score\
    \ Error at Week 52:   -0.0\n\nPatient ID: 002_S_4237\nSlope of Cognitive Decline:\
    \ Actual: -0.022  Predicted: -0.027\nPercent Slope Error: 23.54\nMMSE score at\
    \ Week 52: Actual: 27.89  Predicted: 27.63\nPercent MMSE Score Error at Week 52:\
    \   -0.01\n\nAverage % Slope Error: 23.785%\nAverage % MMSE Score Error at Week\
    \ 52: 0.013%\n```\n\n图5.4展示了上述Python脚本为四名患者生成的误差率。训练采用了留一交叉验证，并为四名随机选择的患者（即002_S_2043、002_S_4171、002_S_4219和002_S_4237）生成了AD预后。对于这次特定的运行，患者002_S_4219获得了最佳结果，ANN预测其认知衰退的直线方程为$y\
    \ = -0.021x + 29.58$，而实际衰退的直线方程为$y = -0.019x + 29.58$（图5.5(c)）。基于此预测，患者002_S_4237在首次记录MMSE分数一年后得分为28.76。然而，实际数据显示该患者的分数为28.86。预测最差的是患者002_S_4171，其预测和实际的衰退函数分别为$y\
    \ = -0.032x + 28.27$和$y = 0.058x + 28.27$，对应首次检查一年后的MMSE分数分别为26.71和25.25（图5.5(b)）。\n\
    \n## 5.5 用于阿尔茨海默病预后的Matlab脚本（基于ANN）\n\n![](img/a83d807f9a9119b1472555c0ef55797e_98_0.png)\n\
    \n```\n1  % The City College of New York, City University of New York\n2  % Written\
    \ by Sultana Begum\n3  % August, 2024\n4  \n5  % GA for Alzheimer disease Prognosis\
    \ based gene expressions and\n6  % MMSE scores\n7  \n8  clear; clc;\n9  \n10 %\
    \ Load training data\n11 training_X = 'training_data/gene_expressions.csv';\n\
    12 X = readtable(training_X);\n13 \n14 % Extract input features\n15 X_in = X(:,\
    \ contains(X.Properties.VariableNames, 'x_at'));\n16 \n17 training_Y = 'training_data/mmse_score_slopes.csv';\n\
    18 Y = readtable(training_Y);\n19 \n20 mmse_slopes = Y.('m_coef_mmse_points_week_');\
    \ % Access column\n21 Y_scaled = rescale(mmse_slopes, 0, 1); % Min-max scaling\n\
    22 \n23 % Initialize variables\n24 percent_errors = [];\n25 predictions = [];\n\
    26 actual_slopes = [];\n27 patient_IDs = [];\n28 \n29 % Leave-One-Out Cross-Validation\n\
    30 for i = 1:4\n31     fprintf(\"\\n***********************************\\n\");\n\
    32     fprintf(\"LEAVING OUT ROW %d \\n\", i);\n33 \n34     inputs = X_in;\n35\
    \     outputs = Y_scaled;\n36 \n37     % Save the input for test sample\n38  \
    \   LOOCV_input = inputs(i,:);\n39     % Get the slope of test sample\n40    \
    \ actual_slope = mmse_slopes(i);\n41 \n42     % Drop the row with test sample\
    \ inputs\n43     inputs(i,:) = [];\n44     % Remove the output of test sample\n\
    45     outputs(i) = [];\n46 \n47     % Convert data to table format for training\n\
    48     inputsTrain = table2array(inputs);\n49     outputsTrain = table2array(table(outputs,\
    \ 'VariableNames',{'Output'}));\n50 \n51     % Define ANN model: 160-60-15-5-1\
    \ architecture\n52     layers = [\n53         featureInputLayer(size(inputsTrain,\
    \ 2), 'Name', 'input')\n54         fullyConnectedLayer(120, 'Name', 'fc1')\n55\
    \         reluLayer('Name', 'relu1')\n56         fullyConnectedLayer(60, 'Name',\
    \ 'fc2')\n57         reluLayer('Name', 'relu2')\n58         fullyConnectedLayer(15,\
    \ 'Name', 'fc3')\n59         reluLayer('Name', 'relu3')\n60         fullyConnectedLayer(5,\
    \ 'Name', 'fc4')\n61         reluLayer('Name', 'relu4')\n62         fullyConnectedLayer(1,\
    \ 'Name', 'output')\n63         regressionLayer('Name', 'regression')\n64    \
    \ ];\n65 \n66     % Set options for training\n67     options = trainingOptions('adam',\
    \ 'InitialLearnRate', 0.01, ...\n68         'MaxEpochs', 1000, 'Verbose', true,\
    \ 'MiniBatchSize', 10, ...\n69         'Shuffle', 'every-epoch', 'Plots', 'training-progress');\n\
    70 \n71     % Train the model\n72     fprintf(\"Training Started\\n\");\n73  \
    \   model = trainNetwork(inputsTrain, outputsTrain, layers, options);\n74    \
    \ fprintf(\"Training Finished\\n\");\n75 \n76     % Prepare LOOCV input for prediction\n\
    77     LOOCV_inputArray = table2array(LOOCV_input);\n78 \n79     % Predict the\
    \ test sample\n80     prediction_scaled = predict(model, LOOCV_inputArray);\n\
    81 \n82     % Normalize prediction\n83     mmse_score_min = min(mmse_slopes);\n\
    84     mmse_score_max = max(mmse_slopes);\n85     mmse_max_min_difference = mmse_score_max\
    \ - mmse_score_min;\n86     prediction = mmse_score_min + ...\n87            \
    \      prediction_scaled * mmse_max_min_difference;\n88 \n89     % Calculate percent\
    \ error\n90     rel_err = abs(((prediction - actual_slope) / actual_slope) * 100);\n\
    91     rel_error = round(rel_err, 2);\n92     fprintf(\"\\nThe relative error\
    \ is: %.2f%%\\n\", rel_error);\n93     percent_errors = [percent_errors; rel_error];\
    \ % Append percent error\n94 \n95     % Store predictions and actual values\n\
    96     predictions = [predictions; prediction];\n97     actual_slopes = [actual_slopes;\
    \ actual_slope];\n98 \n99     % Get patient ID and ensure it is a string\n100\
    \    patient_ID = X.('patient_id')(i); % Access column\n```"

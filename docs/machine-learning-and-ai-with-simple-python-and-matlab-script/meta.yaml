    # 12.5 Embedding Layer


    As described in Section 10.5 in Chapter 10, embedding is used to lower the dimensions
    of input vectors during training and, hence, reduce the computational cost of
    training for real-life applications typically engaging hundreds of thousands of
    samples. In Figure 12.3, we show inclusion of embedding in a one-to-one single
    RNN-Att cell, where an embedding matrix $E$ is multiplied with a one-hot encoded
    input vector before it is applied to the encoder. The dimensions of the $E$ matrix
    is $(e \times |I|)$, where $e$ and $|I|$ are the embedding width and the dictionary
    size, respectively. Application'
- md: '## 12.6 A Numerical Example with Embedding


    Let us now examine the training process for one epoch in a one-to-one single cell
    RNN-Att that employs an embedding layer at its inputs (Figure 12.4). Consider
    the same example given in Table 12.1 in Section 12.4, where four characters are
    applied at four steps. Suppose the weight matrices for the RNN-Att are randomly
    initialized as follows:


    $$E = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \quad U = [0.144 \quad -0.2315] \quad W = [-0.535]$$


    $$b = [0] \quad V = [0.695 \quad -0.440 \quad -0.225 \quad -0.305]^\dagger \quad
    c = [0 \quad 0 \quad 0 \quad 0]^\dagger.$$


    At steps $t = 1, \cdots, 4$, we have the outputs of embedding layer from Eq. (12.19)
    and the corresponding hidden states from Eq. (12.1) as follows:


    $$x_1 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.818 \\ 0.461 \end{bmatrix}$$


    $$x_2 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} -0.360 \\ -0.482 \end{bmatrix}$$


    $$x_3 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.127 \\ 0.154 \end{bmatrix}$$


    $$x_4 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.127 \\ 0.154 \end{bmatrix}$$


    $$h_1 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \cdot \begin{bmatrix}
    0.818 \\ 0.461 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix} 0.011
    \end{bmatrix}$$


    $$h_2 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    -0.360 \\ -0.482 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0.011 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    0.054 \end{bmatrix}$$


    $$h_3 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    0.127 \\ 0.154 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0.054 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    -0.046 \end{bmatrix}$$


    $$h_4 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    0.127 \\ 0.154 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    -0.046 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    0.007 \end{bmatrix}.$$


    At step $t = 1$, computation of predicted output $\hat{y}_1$ proceeds as follows:


    $$\mathcal{A}_{1,1} = h_1^\dagger \cdot h_1 = \begin{bmatrix} 0.011 \end{bmatrix}
    \cdot \begin{bmatrix} 0.011 \end{bmatrix} = \begin{bmatrix} 0.0001 \end{bmatrix}$$


    $$\bar{Z}_1 = \Theta_z(\mathcal{A}_{1,1}) \cdot h_1 = softmax(\mathcal{A}_{1,1})
    \cdot h_1 = \begin{bmatrix} 0.011 \end{bmatrix}$$


    $$\Omega_1 = V \cdot \bar{Z}_1 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot \begin{bmatrix} 0.011 \end{bmatrix} + \begin{bmatrix}
    0 \\ 0 \\ 0 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.008 \\ -0.005 \\ -0.003 \\
    -0.003 \end{bmatrix}$$


    $$\hat{y}_1 = \Theta_y(\Omega_1) = softmax(\Omega_1) = \begin{bmatrix} 0.252 \\
    0.249 \\ 0.250 \\ 0.249 \end{bmatrix}.$$


    For input $x_1 = \mathbf{h}$, our model generates a prediction of $\hat{y}_1 =
    \mathbf{h}$ instead of the expected output of $y_1^o = \mathbf{e}$. The loss is


    $$L_1 = -y_1^o \ln(\hat{y}_1) = - \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.252 \\ 0.249 \\ 0.250 \\ 0.249 \end{bmatrix} = 1.390.$$


    At step $t = 2$, for input $x_1 = \mathbf{e}$, the predicted output $\hat{y}_2$
    is computed as follows:


    $$\mathcal{A}_{2,1} = h_2^\dagger \cdot h_1 = [0.054] \cdot [0.011] = [0.001]
    \quad \mathcal{A}_{2,2} = h_2^\dagger \cdot h_2 = [0.054] \cdot [0.054] = [0.003]$$


    $$\mathcal{Z}_2 = \sum_{k=1}^{2} \Theta_{\mathcal{Z}}(\mathcal{A}_{2,k}) \cdot
    h_k = [0.500] \cdot [0.011] + [0.500] \cdot [0.054] = [0.033]$$


    $$\Omega_2 = V \cdot \mathcal{Z}_2 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.033] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.023 \\ -0.014 \\ -0.007 \\ -0.010 \end{bmatrix}$$


    $$\hat{y}_2 = \Theta_{\hat{y}}(\Omega_2) = \text{softmax}(\Omega_2) = \begin{bmatrix}
    0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix}.$$


    For input $x_2 = \mathbf{e}$, the prediction generated by our model is $\hat{y}_2
    = \mathbf{h}$ instead of $y_2^o = \mathbf{1}$. The loss is


    $$L_2 = -y_2^o \ln(\hat{y}_2) = -\begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix} = 1.392.$$


    At step $t = 3$, the user applies input $x_3 = \mathbf{1}$, for which a predicted
    output $\hat{y}_3$ is computed as follows:


    $$\mathcal{A}_{3,1} = [-0.046] \cdot [0.011] = [-0.0005] \quad \mathcal{A}_{3,2}
    = [-0.046] \cdot [0.054] = [-0.002]$$

    $$\mathcal{A}_{3,3} = [-0.046] \cdot [-0.046] = [0.002]$$


    $$\mathcal{Z}_3 = \sum_{k=1}^{3} \Theta_{\mathcal{Z}}(\mathcal{A}_{3,k}) \cdot
    h_k$$

    $$= [0.333] \cdot [0.011] + [0.333] \cdot [0.054] + [0.334] \cdot [-0.046] = [0.006]$$


    $$\Omega_3 = V \cdot \mathcal{Z}_3 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.006] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.004 \\ -0.003 \\ -0.001 \\ -0.002 \end{bmatrix}$$


    $$\hat{y}_3 = \Theta_{\hat{y}}(\Omega_3) = \text{softmax}(\Omega_3) = \begin{bmatrix}
    0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix}.$$


    For input $x_3 = \mathbf{1}$, the prediction is $\hat{y}_3 = \mathbf{h}$ instead
    of $y_3^o = \mathbf{1}$. The loss $L_3$ is


    $$L_3 = -y_3^o \ln(\hat{y}_3) = -\begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix} = 1.387.$$


    Similarly, at step $t = 4$, for input is $x_4 = 1$, the expected output $\hat{y}_4$
    is computed as follows:


    $$\mathcal{A}_{4,1} = [0.007] \cdot [0.011] = [0.0001] \quad \mathcal{A}_{4,2}
    = [0.007] \cdot [0.054] = [0.0004]$$

    $$\mathcal{A}_{4,3} = [0.007] \cdot [-0.046] = [-0.0003] \quad \mathcal{A}_{4,4}
    = [0.007] \cdot [0.007] = [0.0001]$$


    $$\mathcal{Z}_4 = \sum_{k=1}^{4} \Theta_{\mathcal{Z}}(\mathcal{A}_{4,k}) \cdot
    h_k$$


    $$\mathcal{Z}_4 = [0.250] \cdot [0.011] + [0.250] \cdot [0.054] + [0.250] \cdot
    [-0.046] + [0.250] \cdot [0.007] = [0.007]$$


    $$\Omega_4 = V \cdot \mathcal{Z}_4 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.007] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.005 \\ -0.003 \\ -0.002 \\ -0.002 \end{bmatrix}$$


    $$\hat{y}_4 = \Theta_y(\Omega_4) = softmax(\Omega_4) = \begin{bmatrix} 0.251 \\
    0.249 \\ 0.250 \\ 0.250 \end{bmatrix}.$$


    Based on the highest value out of the softmax unit, the prediction is $\hat{y}_4
    = \mathbf{h}$ instead of $y_4^o = \mathbf{o}$.

    For this prediction, the loss is


    $$L_4 = -y_4^o \ln(\hat{y}_4) = -\begin{bmatrix} 0 \\ 0 \\ 0 \\ 1 \end{bmatrix}
    \ln \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix} = 1.388.$$


    The total loss for $\mathcal{T} = 4$ steps is


    $$L = \sum_{t=1}^{\mathcal{T}} L_t = 1.390 + 1.392 + 1.387 + 1.388 = 5.557.$$


    After the forward propagation is complete, let us now consider operations for
    a back propagation.

    From Eq. (12.7), we have


    $$\frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial \hat{y}_1}{\partial \Omega_1}
    = (\hat{y}_1 - y_1^o) = \begin{bmatrix} 0.252 \\ 0.249 \\ 0.250 \\ 0.249 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.252 \\ -0.751
    \\ 0.250 \\ 0.249 \end{bmatrix}$$


    $$\frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial \Omega_2}
    = (\hat{y}_2 - y_2^o) = \begin{bmatrix} 0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.256 \\ 0.247
    \\ -0.751 \\ 0.248 \end{bmatrix}$$


    $$\frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial \Omega_3}
    = (\hat{y}_3 - y_3^o) = \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.251 \\ 0.249
    \\ -0.750 \\ 0.250 \end{bmatrix}$$'
  mdcn: '## 12.6 一个使用嵌入层的数值示例


    现在，让我们来考察一个采用输入嵌入层（如图12.4所示）的一对一单细胞RNN-Att模型在一个训练周期（epoch）内的训练过程。考虑第12.4节表12.1中给出的相同示例，其中四个字符在四个步骤上被应用。假设RNN-Att的权重矩阵随机初始化如下：


    $$E = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \quad U = [0.144 \quad -0.2315] \quad W = [-0.535]$$


    $$b = [0] \quad V = [0.695 \quad -0.440 \quad -0.225 \quad -0.305]^\dagger \quad
    c = [0 \quad 0 \quad 0 \quad 0]^\dagger.$$


    在步骤 $t = 1, \cdots, 4$，我们根据公式 (12.19) 得到嵌入层的输出，并根据公式 (12.1) 得到相应的隐藏状态，如下所示：


    $$x_1 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.818 \\ 0.461 \end{bmatrix}$$


    $$x_2 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix} =
    \begin{bmatrix} -0.360 \\ -0.482 \end{bmatrix}$$


    $$x_3 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.127 \\ 0.154 \end{bmatrix}$$


    $$x_4 = \begin{bmatrix} 0.818 & -0.360 & 0.127 & -0.036 \\ 0.461 & -0.482 & 0.154
    & -0.568 \end{bmatrix} \cdot \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} =
    \begin{bmatrix} 0.127 \\ 0.154 \end{bmatrix}$$


    $$h_1 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \cdot \begin{bmatrix}
    0.818 \\ 0.461 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix} 0.011
    \end{bmatrix}$$


    $$h_2 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    -0.360 \\ -0.482 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0.011 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    0.054 \end{bmatrix}$$


    $$h_3 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    0.127 \\ 0.154 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    0.054 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    -0.046 \end{bmatrix}$$


    $$h_4 = \tanh \left( \begin{bmatrix} 0.144 & -0.232 \end{bmatrix} \begin{bmatrix}
    0.127 \\ 0.154 \end{bmatrix} + \begin{bmatrix} -0.535 \end{bmatrix} \begin{bmatrix}
    -0.046 \end{bmatrix} + \begin{bmatrix} 0 \end{bmatrix} \right) = \begin{bmatrix}
    0.007 \end{bmatrix}.$$


    在步骤 $t = 1$，预测输出 $\hat{y}_1$ 的计算过程如下：


    $$\mathcal{A}_{1,1} = h_1^\dagger \cdot h_1 = \begin{bmatrix} 0.011 \end{bmatrix}
    \cdot \begin{bmatrix} 0.011 \end{bmatrix} = \begin{bmatrix} 0.0001 \end{bmatrix}$$


    $$\bar{Z}_1 = \Theta_z(\mathcal{A}_{1,1}) \cdot h_1 = softmax(\mathcal{A}_{1,1})
    \cdot h_1 = \begin{bmatrix} 0.011 \end{bmatrix}$$


    $$\Omega_1 = V \cdot \bar{Z}_1 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot \begin{bmatrix} 0.011 \end{bmatrix} + \begin{bmatrix}
    0 \\ 0 \\ 0 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.008 \\ -0.005 \\ -0.003 \\
    -0.003 \end{bmatrix}$$


    $$\hat{y}_1 = \Theta_y(\Omega_1) = softmax(\Omega_1) = \begin{bmatrix} 0.252 \\
    0.249 \\ 0.250 \\ 0.249 \end{bmatrix}.$$


    对于输入 $x_1 = \mathbf{h}$，我们的模型生成了预测 $\hat{y}_1 = \mathbf{h}$，而不是期望的输出 $y_1^o =
    \mathbf{e}$。损失为


    $$L_1 = -y_1^o \ln(\hat{y}_1) = - \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.252 \\ 0.249 \\ 0.250 \\ 0.249 \end{bmatrix} = 1.390.$$


    在步骤 $t = 2$，对于输入 $x_1 = \mathbf{e}$，预测输出 $\hat{y}_2$ 的计算过程如下：


    $$\mathcal{A}_{2,1} = h_2^\dagger \cdot h_1 = [0.054] \cdot [0.011] = [0.001]
    \quad \mathcal{A}_{2,2} = h_2^\dagger \cdot h_2 = [0.054] \cdot [0.054] = [0.003]$$


    $$\mathcal{Z}_2 = \sum_{k=1}^{2} \Theta_{\mathcal{Z}}(\mathcal{A}_{2,k}) \cdot
    h_k = [0.500] \cdot [0.011] + [0.500] \cdot [0.054] = [0.033]$$


    $$\Omega_2 = V \cdot \mathcal{Z}_2 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.033] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.023 \\ -0.014 \\ -0.007 \\ -0.010 \end{bmatrix}$$


    $$\hat{y}_2 = \Theta_{\hat{y}}(\Omega_2) = \text{softmax}(\Omega_2) = \begin{bmatrix}
    0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix}.$$


    对于输入 $x_2 = \mathbf{e}$，我们的模型生成的预测是 $\hat{y}_2 = \mathbf{h}$，而不是 $y_2^o = \mathbf{1}$。损失为


    $$L_2 = -y_2^o \ln(\hat{y}_2) = -\begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix} = 1.392.$$


    在步骤 $t = 3$，用户应用输入 $x_3 = \mathbf{1}$，其预测输出 $\hat{y}_3$ 的计算过程如下：


    $$\mathcal{A}_{3,1} = [-0.046] \cdot [0.011] = [-0.0005] \quad \mathcal{A}_{3,2}
    = [-0.046] \cdot [0.054] = [-0.002]$$

    $$\mathcal{A}_{3,3} = [-0.046] \cdot [-0.046] = [0.002]$$


    $$\mathcal{Z}_3 = \sum_{k=1}^{3} \Theta_{\mathcal{Z}}(\mathcal{A}_{3,k}) \cdot
    h_k$$

    $$= [0.333] \cdot [0.011] + [0.333] \cdot [0.054] + [0.334] \cdot [-0.046] = [0.006]$$


    $$\Omega_3 = V \cdot \mathcal{Z}_3 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.006] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.004 \\ -0.003 \\ -0.001 \\ -0.002 \end{bmatrix}$$


    $$\hat{y}_3 = \Theta_{\hat{y}}(\Omega_3) = \text{softmax}(\Omega_3) = \begin{bmatrix}
    0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix}.$$


    对于输入 $x_3 = \mathbf{1}$，预测是 $\hat{y}_3 = \mathbf{h}$，而不是 $y_3^o = \mathbf{1}$。损失
    $L_3$ 为


    $$L_3 = -y_3^o \ln(\hat{y}_3) = -\begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix}
    \ln \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix} = 1.387.$$


    类似地，在步骤 $t = 4$，对于输入 $x_4 = 1$，期望输出 $\hat{y}_4$ 的计算过程如下：


    $$\mathcal{A}_{4,1} = [0.007] \cdot [0.011] = [0.0001] \quad \mathcal{A}_{4,2}
    = [0.007] \cdot [0.054] = [0.0004]$$

    $$\mathcal{A}_{4,3} = [0.007] \cdot [-0.046] = [-0.0003] \quad \mathcal{A}_{4,4}
    = [0.007] \cdot [0.007] = [0.0001]$$


    $$\mathcal{Z}_4 = \sum_{k=1}^{4} \Theta_{\mathcal{Z}}(\mathcal{A}_{4,k}) \cdot
    h_k$$


    $$\mathcal{Z}_4 = [0.250] \cdot [0.011] + [0.250] \cdot [0.054] + [0.250] \cdot
    [-0.046] + [0.250] \cdot [0.007] = [0.007]$$


    $$\Omega_4 = V \cdot \mathcal{Z}_4 + c = \begin{bmatrix} 0.695 \\ -0.440 \\ -0.225
    \\ -0.305 \end{bmatrix} \cdot [0.007] + \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.005 \\ -0.003 \\ -0.002 \\ -0.002 \end{bmatrix}$$


    $$\hat{y}_4 = \Theta_y(\Omega_4) = softmax(\Omega_4) = \begin{bmatrix} 0.251 \\
    0.249 \\ 0.250 \\ 0.250 \end{bmatrix}.$$


    根据softmax单元的最高值，预测是 $\hat{y}_4 = \mathbf{h}$，而不是 $y_4^o = \mathbf{o}$。

    对于这个预测，损失为


    $$L_4 = -y_4^o \ln(\hat{y}_4) = -\begin{bmatrix} 0 \\ 0 \\ 0 \\ 1 \end{bmatrix}
    \ln \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix} = 1.388.$$


    $\mathcal{T} = 4$ 步的总损失为


    $$L = \sum_{t=1}^{\mathcal{T}} L_t = 1.390 + 1.392 + 1.387 + 1.388 = 5.557.$$


    前向传播完成后，现在让我们考虑反向传播的操作。

    根据公式 (12.7)，我们有


    $$\frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial \hat{y}_1}{\partial \Omega_1}
    = (\hat{y}_1 - y_1^o) = \begin{bmatrix} 0.252 \\ 0.249 \\ 0.250 \\ 0.249 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 1 \\ 0 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.252 \\ -0.751
    \\ 0.250 \\ 0.249 \end{bmatrix}$$


    $$\frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial \Omega_2}
    = (\hat{y}_2 - y_2^o) = \begin{bmatrix} 0.256 \\ 0.247 \\ 0.249 \\ 0.248 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.256 \\ 0.247
    \\ -0.751 \\ 0.248 \end{bmatrix}$$


    $$\frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial \Omega_3}
    = (\hat{y}_3 - y_3^o) = \begin{bmatrix} 0.251 \\ 0.249 \\ 0.250 \\ 0.250 \end{bmatrix}
    - \begin{bmatrix} 0 \\ 0 \\ 1 \\ 0 \end{bmatrix} = \begin{bmatrix} 0.251 \\ 0.249
    \\ -0.750 \\ 0.250 \end{bmatrix}$$'

  md: 'For real-life applications, different methods of error computation are possible,
    for example using squares of differences or logarithmic values [30]. For the sake
    of argument, suppose the weights are adjusted through the ANN training process
    such that the new weight values are now as follows:


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.8$

    $w_7 = w_8 = w_9 = 3.5$.


    Using these weight values with the sample data, we have


    $e_1 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.8) = 7$,

    which yields

    $e_4 = (7 \cdot 3.5) + (7 \cdot 3.5) + (7 \cdot 3.5) = 73.5$.


    In this case, the difference between the real output value of $y$ and the output
    generated by the ANN of $\hat{y}$ (i.e. the error) becomes


    $\text{error} = y - \hat{y} = 75 - 73.5 = 1.5$. \hfill (2.9)


    We can clearly see from this simple enumeration shown in Eqs. (2.8) and (2.9)
    that it is possible to reduce the error by adjusting the values of the synapse
    weights, which is the fundamental idea behind the ANN training process. An ANN
    is trained by using the input and output data (also referred to as historic, sample
    or field data) to assign proper weight values to links. The training process can
    be summarized by the following steps:


    +   - To start, randomly chosen values are assigned to the link weights.

    - Using these random values, the output values are calculated by multiplying the
    inputs and weights and applying the activation functions at each neuron of the
    ANN.

    - The steps up to this point are referred to as `forward propagation` (see Section
    2.5 below).

    - The outputs are then compared with the expected values from the sample data.
    The difference between the ANN-generated and real output values is the error generated
    by the ANN.

    - After forward propagation and calculation of loss, a `back propagation` is performed
    based on partial derivations of loss with respect to ANN weights at each layer
    (see Section 2.6 below).

    - Based on the partial derivations, the weight values are updated.

    - Using the new weights, consecutive forward and back propagation steps (called
    `epochs`) are performed as above.

    - End of training is determined by the designers based on various criteria, including
    performing a pre-determined number of epochs, the loss value reaching a desired
    low value or lack of progress from epoch to epoch in terms of loss reduction.



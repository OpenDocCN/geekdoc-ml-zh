    have


    $$I_{ann} = F_{cl} \times \left(\frac{h_i - f_{cl} + 1 - p}{s_{pl}} + 1\right)^2.$$


    An additional function, called softmax, can be applied to the outputs of a CNN
    to convert values of $L$ to probabilities. The sum of all probabilities adds up
    to 1, where each output probability



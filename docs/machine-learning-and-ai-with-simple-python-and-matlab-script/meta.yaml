    # 6.6 Concluding Remarks


    Posts in social media, articles appearing in the printed press and comments made
    in press conferences for news outlets may affect the outcomes of various external
    and seemingly unrelated events (e.g. financial securities values, company valuations
    or employment decisions). NLP techniques allow interactions between natural language
    content (e.g. spoken, written or posted text) and external events (e.g. house
    prices) to be explored. ANNs can be used to implement statistics-based NLP techniques
    by first extracting keywords from a body of text and then associating them with
    external event recordings temporally related to this content. These keywords,
    together with their usage frequencies, may be passed into an ANN that can be trained
    to predict the outcome of various external events.


    In this chapter, tweets from former US President Trump are used to explore their
    possible impact on financial securities listed on the S&P 500 index. First a set
    of keywords used in tweets is identified that could potentially be related to
    financial asset movements. The numbers of these keywords tweeted each day together
    with opening price and daily traded volume are used as inputs to an ANN. Prediction
    of stock price movements is the output of the ANN. Using tweets and historical
    financial data corresponding to those days that tweets were published, an ANN
    is trained to predict future stock movements using future tweets.


    Success in employing ANNs for the NLP class of problems in real-life situations
    depends on correct identification of inputs and outputs for an ANN, appropriate
    selection of keywords and design of the ANN architecture. The complexity of real-life
    problems that can be solved by AI and NLP techniques require the combined experience
    and skill-sets typically available to various subject matter experts (e.g. scientists,
    money managers, business executives, medical personnel and others) and computing
    professionals (e.g. statisticians, mathematicians, computer scientists and software
    engineers).'
- md: "## 6.7 Exercises for Chapter 6\n\n1) Explore a possible relationship between\
    \ the tweets issued from Centers for Disease Control and Prevention (CDC) about\
    \ COVID-19 pandemic updates and the movement of Delta Airline stocks. It is expected\
    \ that if CDC relaxes conditions for isolation, travel stocks will gain value.\
    \ Use tweets issued between June 2020 and Aug 2020.\n\n- Use an ANN similar to\
    \ the one in Figure 6.7.\n- Define your own keywords.\n- Experiment with the ANN\
    \ architecture to improve NLP performance.\n- Experiment with different sets of\
    \ keywords to improve NLP performance.\n- Suggest ways to improve performance\
    \ of the NLP.\n\n2) Repeat Exercise 1 for tweets from the Food and Drug Administration\
    \ (FDA) to predict the movement of Moderna stocks.\n\n3) Repeat Exercise 1 for\
    \ Google twitter feed and Google stocks. Use tweets issued between June 2020 and\
    \ Aug 2020.\n\n4) Repeat Exercise 1 for Apple twitter and Apple stocks.\n\n5)\
    \ Repeat Exercise 1 for CNN News twitter and the Dow Jones market index.\n\n6)\
    \ The City University of New York (CUNY) is the largest public higher education\
    \ system in the USA with 25 colleges under its umbrella, serving more than 250,000\
    \ students. Any decision of using remote meeting tool Zoom is expected to have\
    \ a major impact on Zoom stock prices. Repeat Exercise 1 for tweets from the CUNY\
    \ chancellor and movement of Zoom stocks.\n\n# 7 Convolutional Neural Networks\n\
    \n## 7.1 Introduction\n\nIt is understood that when humans process visual information,\
    \ they condense a broader visual field of view into multiple overlapping smaller\
    \ receptive fields that are controlled by respective neurons in different areas\
    \ of the brain (i.e. visual cortices). In order to recognize an object, a visual\
    \ input is processed through hierarchically-connected receptive fields. Neurons\
    \ that control receptive fields respond to relatively small and simple visual\
    \ stimuli, whereas neurons associated with receptive fields located deeper in\
    \ the brain process increasingly larger and more complex optical features. As\
    \ visual information progresses along the hierarchically connected receptive fields,\
    \ neurons begin to represent visual objects in progressively more accurate ways\
    \ until an object can be recognized by the brain (Figure 7.1a).\n\nFigure 7.1b\
    \ shows the growth of receptive field sizes as the brain processes visual stimuli\
    \ by passing them from the primary visual cortex (called V1) through secondary\
    \ visual cortices (called V2 and V4) and, finally, recognizing the object at its\
    \ inferior temporal (IT) cortex. Figure 7.1c shows how neurons process an image\
    \ as the brain processes it through the layers, each with increasingly larger\
    \ receptive fields (indicated by the red path in Figure 7.1a).\n\nConvolutional\
    \ neural networks (CNNs) are inspired by processes occurring in the brain region\
    \ that receive, integrate and process visual information transmitted from the\
    \ retinas of human eyes. Deep neural networks (DNNs) are a class of ANNs characterized\
    \ by having two or more hidden layers. CNNs belong to a class of DNNs whose hidden\
    \ layers typically consisting of a series of convolutional layers (CLs), each\
    \ converting an input image into smaller sized information via a multiplication\
    \ or a dot-product operation. A typical CL uses multiple small feature detectors,\
    \ called convolutional filters, that are individually slid over a larger image\
    \ and, by performing a weighted sum operation, generate an activation map indicating\
    \ the presence or absence of a given feature within the image. The number of convolutional\
    \ filters used in a given CL is dictated by the number of features that need to\
    \ be detected by the CNN. For example, CNNs for line detection typically use a\
    \ low number of filters (e.g. 10), whereas detection of complex features may require\
    \ over 100 filters.\n\nAnother type of CNN layer is called a pooling layer (PL),\
    \ whose role is to down-sample (i.e. reduce the dimensions of a matrix without\
    \ losing important information contained by its elements) activation maps to reduce\
    \ amount of data to be processed. A PL uses a filter to perform down-sampling,\
    \ where a filter of size (f × f) can merge the pixels (i.e. the smallest image\
    \ elements) in adjacent (f × f) cells into a single cell by replacing them with\
    \ the maximum value among the cells. A rectified linear unit (RELU) of a CNN is\
    \ a non-linear activation function to control propagation of information between\
    \ adjacent layers. Typically, a RELU removes negative values from an activation\
    \ map by setting them to zero. This is analogous to the activation function used\
    \ in the neurons of an ANN in Chapter 2. After the last CL of a CNN, activation\
    \ maps are “unrolled” by converting their input matrices into a one-dimensional\
    \ vector and then concatenating them. This layer, called the unrolling layer (UL),\
    \ generates an input vector, which is then sent to a fully-connected ANN to generate\
    \ the outputs of the CNN. Figure 7.2 shows a simple CNN processing an image by\
    \ passing it through a CL, a RELU and a PL before unrolling the results to be\
    \ fed into a fully-connected ANN to generate outputs.\n\n### 7.1.1 Training CNNs\n\
    \nThe weight coefficients used in CNN filters and ANN links are initially assigned\
    \ random values. In a training process similar to that in ANNs described in Chapter\
    \ 2, values of these weights are evolved through consecutive forward and back\
    \ propagation steps, called epochs. A simple algorithm for training a CNN is shown\
    \ in Figure 7.3. First the structure of the CNN and the number of epochs to be\
    \ used for training are defined. Next, weights and biases for all layers are initialized\
    \ to random values. During the forward propagation phase, at each CL, a convolution\
    \ is performed over the input matrix with each filter. After convolution with\
    \ all filters has been completed, RELU is applied to the CL outputs and passed\
    \ to the PL. Finally, UL unrolls the outputs of the PL and feeds it to a fully-connected\
    \ ANN. With forward and back propagation operations performed by the ANN, a preliminary\
    \ output with its associated error are generated. Back propagation of the ANN\
    \ is continued through the CNN layers to compute the error and adjust the weights\
    \ and biases at the inputs of the CNN. This process is repeated until a pre-determined\
    \ number of epochs have been reached. If there are multiple layers of CLs and\
    \ PLs in a CNN, these operations are repeated consecutively for each layer.\n\n\
    ```\nN_{CL} , N_{F}; // number of CLs and filters in each CL\ninitialize random\
    \ weights for all links W_{NN};\ninitialized random bias for all layers B_{NN};\n\
    set number of epochs for training CNN N_{E};\nfor i = 1 to N_{E} do\n    // forward\
    \ propagation through CNN:\n    for j = 1 to N_{CL} do\n        for k = 1 to N_{F}\
    \ do\n            perform convolution;\n        end for\n        perform activation;\n\
    \        apply pooling;\n    end for\n    unroll;\n    pass to fully-connected\
    \ ANN for forward propagation;\n\n    // back propagation through CNN:\n    perform\

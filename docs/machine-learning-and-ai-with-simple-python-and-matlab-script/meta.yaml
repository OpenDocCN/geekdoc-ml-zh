  md: '# 10

    Recurrent Neural Networks


    # 10.1 Introduction


    There are many real-life systems whose outputs depend on the sequence in which
    the inputs are applied to them. For example, in understanding natural languages,
    one has to consider multiple words to make sense of a given sentence (e.g. subject,
    verb, prepositions, adverbs and adjectives), as opposed to analysing each word
    independently. The next state of such a system depends not only on the current
    input applied to it but also on the previous inputs. Such a `recurrent` system
    possesses the ability to utilize the knowledge that it previously generated, be
    its previous outputs or other relevant information. The ANNs that we studied in
    Chapters 2 to 6 consider each input as being independent of the previously applied
    inputs and, therefore, are not suitable to handle a sequence of inputs.


    A `recurrent neural network` (RNN) is a type of artificial neural network, but
    with a significant distinction that its intermediate state information and/or
    outputs are fed as inputs into other neurons (hence the word `recurrent` in the
    name). Similar to other neural networks such as ANNs or CNNs, RNNs are also trained
    by existing field data. However, while the inputs and outputs of ANNs and CNNs
    are supposed to be independent for each sample, RNN outputs depend on previously
    applied inputs, their outputs and some of the information created in the process
    (e.g. so-called hidden states). In Figure 10.1, two versions of an RNN are shown:
    compact and unfolded through time. As can be seen in the unfolded version, a previous
    hidden state of an RNN generated by an earlier input is re-used at a later step
    when processing a new input. For example, when predicting $\hat{y}_t$ at step
    $t$, the RNN uses both the inputs of $x_t$ and the hidden state information generated
    at step $(t-1)$ for input $x_{t-1}$ (i.e. $h_{t-1}$). As step $(t-1)$ information
    influences the output at step $t$, the hidden state generated at time $t$ has
    an impact on prediction $\hat{y}_{t+1}$ at step $(t+1)$. Therefore, step $(t-1)$
    indirectly influences step $(t+1)$, which is why they are called recurrent networks.
    This re-use of internal information creates a type of internal memory, which makes
    RNNs suitable for temporal applications, including language translation, speech
    recognition, and image captioning. RNNs are essential building blocks of many
    popular AI applications, such as Siri, voice search, Google Translate and others
    [86].


    The main elements of an RNN can be listed as follows:


    +   - **Input layer:** the layer that accepts inputs (typically in the form of
    a sequence) at every step.

    - **Hidden Layer:** the layer that stores information generated by current and
    previous steps; it represents the memory of an RNN and is updated at every step
    using current inputs and previous hidden state information. It is also referred
    to as the `encoder` of an RNN.'

    # 9.6 Concluding Remarks


    CNN applications for speech recognition have great potential for significant impact
    on real-life applications such as automatic subtitles, universal speech recognition
    and background noise cancellation. Speech recognition also enables a hands-free
    way for people to interact with intelligent systems, making these systems more
    accessible, especially for disabled and elderly people.


    In designing a CNN architecture for speech recognition tasks, spectrogram images
    must be down-sampled sufficiently by convolutional and pooling layers before being
    fed to the ANN. For different applications executing in various venues, designers
    should experiment with CNN architectures, including the number of CL–PL pairs,
    filter quantities and sizes, and the number of ANN layers and neurons in each
    layer to obtain an acceptable trade-off between training cost and prediction accuracy.



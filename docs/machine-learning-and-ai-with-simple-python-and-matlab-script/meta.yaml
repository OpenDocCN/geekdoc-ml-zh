    Figure 12.3 A one-to-one single RNN-Att cell with an embedding layer.


    of the $E$ matrix to the one-hot-encoded input elements reduces the dimensions
    of the input vector from $(|I| \times 1)$ to $(e \times 1)$ as follows:


    $x_t = E \cdot x_t^o$, (12.19)


    where $\dagger$ represents the matrix transpose operation. After embedding weight
    matrix $E$ is applied to the one-hot-coded input vector, the forward propagation
    process described by Eqs. (12.1)–(12.12) given in Section 12.2 remains the same
    for this case. Similarly, the back propagation operations and partial derivatives
    of $L$ with respect to RNN-Att parameters given in Eqs. (12.7)–(12.12) are valid
    after adding an embedding layer. However, since there is now an additional parameter
    called $E$, we need to compute the partial derivation of $L$ with respect to $E$
    as follows (step-by-step description of the derivation of the formulas is presented
    in Appendix E):


    $\dfrac{\partial L}{\partial E} = \sum_{t=1}^{T} (\hat{y}_t - y_t) V^\dagger \left(
    \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 - h_{j+1}^2)
    \right) ((1 - h_k^2) U x_k^o)$. (12.20)


    Eqs. (12.13)–(12.17) given in Section 12.2 show how to update the RNN-Att parameters
    for a learning rate of $\eta$ after a back propagation operation is completed.
    When an embedding layer is employed, a similar equation for updating $E$ will
    be needed as follows:


    $E_{new} = E - \eta \dfrac{\partial L}{\partial E}$. (12.21)'

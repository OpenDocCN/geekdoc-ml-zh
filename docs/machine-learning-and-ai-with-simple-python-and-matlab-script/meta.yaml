  md: "a given weighted graph. Formally, we define the TSP as an optimization problem\
    \ as follows:\n\n$$\\text{minimize} \\sum_{j=1}^{n} w_j \\text{ for } \\forall\
    \ e_i \\in H_c \\text{ and a given start vertex } v_s. \\quad (17.1)$$\n\n# 17.3\
    \ A Simple Algorithm for the TSP\n\nA straightforward solution for the TSP the\
    \ compares travelling costs of all possible cycles among $n$ nodes is shown in\
    \ Figure 17.6. All possible cycles starting and ending at a selected city, while\
    \ visiting the remaining $(n - 1)$ cities, are considered before selecting a cycle\
    \ with the lowest cost as the solution.\n\nAs can be seen in Figure 17.6, the\
    \ number of steps needed to find a solution to the TSP is exponential with respect\
    \ to the number of cities to be visited and, hence, belongs to the NP-complete\
    \ class of problems [128]. The algorithm in Figure 17.6 has a complexity of $\\\
    mathcal{O}(n!)$, which means that it will need $n!$ iterations to complete for\
    \ $n$ cities, making it applicable only to problems with relatively small numbers\
    \ of cities. In Section 17.5 of this chapter, we will introduce a computationally\
    \ lightweight implementation for the TSP class of problems using GAs.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_297_0.png)\n\
    \n```\nTSP = \\phi; // empty TSP cycle\nTSP_{best} = TSP; // initialize best solution;\n\
    C_{best} = C_{TSP}; // initialize best cost;\n\n// for all permutations of n cities\
    \ in a cycle:\nwhile ( there are more permutations of TSP ) do\n    TSP = get\
    \ a new combination of n cities;\n    if(C_{TSP} \\leq C_{best}) then\n      \
    \  TSP_{best} = TSP; // update best solution;\n        C_{best} = C_{TSP}; //\
    \ update best cost;\n    end if\nend while\n\nreturn TSP_{best} as the best cycle\
    \ with cost of C_{best};\n```\n\nFigure 17.6 A simple algorithm to find the lowest-cost\
    \ Hamiltonian cycles in a graph."

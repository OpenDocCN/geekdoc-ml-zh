    $|I|$ 时，输入向量的大小为 $(|I| \times 1)$，其中只有一个元素被设置为1（即一个元素是“热”的），其余元素均为零。回顾第10.2.1节中的示例，我们将输入
    $\mathbf{h}$ 的独热编码定义为 $\mathbf{h}^o = [1, 0, 0, 0]^\dagger$，其中 $\dagger$ 表示矩阵转置操作。然而，如果我们使用一个包含数万个元素的真实词典，显然独热编码会产生大到不切实际的输入向量。对于这些情况，为了减小输入向量的大小，我们在RNN的前端使用嵌入层（embedding
    layers）[94]。嵌入层的主要目标是通过矩阵操作将稀疏的输入向量（例如独热编码的单词或字符）转换为稠密向量，从而显著降低RNN训练的计算复杂度。对于嵌入层，我们定义一个权重矩阵
    $E$，其维度为 $(e \times |I|)$，其中 $e$ 和 $|I|$ 分别是嵌入宽度（有时称为嵌入大小）和字母表大小。一个独热编码的输入元素 $x_t^o$
    在被送入RNN编码器之前，会与嵌入矩阵 $E$ 相乘，即 $x_t = E \cdot x_t^o$。从这个等式可以看出，对于维度为 $(|I| \times
    1)$ 的输入 $x_t^o$，乘以 $E$ 后得到的输入向量 $x_t$ 的维度将减小到 $(e \times 1)$。例如，假设我们有 $x_t^o$
    和 $E$ 的元素如下：


    $$x_t^o = \mathbf{h}^o = \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix}, \quad
    E = \begin{bmatrix} 0.8 & -0.3 & 0.1 & -0.1 \\ 0.4 & -0.4 & 0.1 & -0.5 \end{bmatrix}.$$


    实现嵌入层后，当应用于RNN编码器时，$x_t^o$ 的维度减小如下：


    $$x_t = E \cdot x_t^o = \begin{bmatrix} 0.8 & -0.3 & 0.1 & -0.1 \\ 0.4 & -0.4
    & 0.1 & -0.5 \end{bmatrix} \cdot \begin{bmatrix} 1 \\ 0 \\ 0 \\ 0 \end{bmatrix}
    = \begin{bmatrix} 0.8 \\ 0.4 \end{bmatrix}.$$


    图10.7展示了一个具有大小为2的嵌入层的一对一单单元RNN。将图10.7中权重的维度与图10.6中没有嵌入层的示例RNN进行比较，我们可以清楚地看到由于嵌入导致的权重矩阵维度减小。


    在一般情况下，使用字母表大小 $|I|$ 和 $\mathcal{N}$ 个隐藏层的一对一RNN，其嵌入层大小为 $|I| \times e$，参数矩阵的维度如下：


    - **嵌入层：** $X^o : (|I| \times 1)$, $E : (e \times |I|)$

    - **编码器：** $X : (e \times 1)$, $U : (\mathcal{N} \times e)$, $W : (\mathcal{N}
    \times \mathcal{N})$, $b : (\mathcal{N} \times 1)$, $H : (\mathcal{N} \times 1)$

    - **解码器：** $V : (|I| \times \mathcal{N})$, $c : (|I| \times 1)$, $\Omega : (|I|
    \times 1)$

    - **输出：** $\hat{Y} : (|I| \times 1)$


    在图10.7所示的示例中，我们有 $|I| = 4$ 和 $\mathcal{N} = 2$。嵌入层宽度的选择基于用户偏好，并取决于给定问题的特性。对于需要实时或接近实时运行且条件变化迅速的应用，较小的嵌入大小是可以接受的，而需要较少频繁训练的应用则可以采用较大的宽度。当在RNN中使用嵌入层时，权重矩阵

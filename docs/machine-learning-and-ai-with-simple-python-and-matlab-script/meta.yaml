    # 7


    # Convolutional Neural Networks


    # 7.1 Introduction


    It is understood that when humans process visual information, they condense a
    broader visual field of view into multiple overlapping smaller receptive fields
    that are controlled by respective neurons in different areas of the brain (i.e.
    visual cortices). In order to recognize an object, a visual input is processed
    through hierarchically-connected receptive fields. Neurons that control receptive
    fields respond to relatively small and simple visual stimuli, whereas neurons
    associated with receptive fields located deeper in the brain process increasingly
    larger and more complex optical features. As visual information progresses along
    the hierarchically connected receptive fields, neurons begin to represent visual
    objects in progressively more accurate ways until an object can be recognized
    by the brain (Figure 7.1a).


    Figure 7.1b shows the growth of receptive field sizes as the brain processes visual
    stimuli by passing them from the primary visual cortex (called V1) through secondary
    visual cortices (called V2 and V4) and, finally, recognizing the object at its
    inferior temporal (IT) cortex. Figure 7.1c shows how neurons process an image
    as the brain processes it through the layers, each with increasingly larger receptive
    fields (indicated by the red path in Figure 7.1a).


    Convolutional neural networks (CNNs) are inspired by processes occurring in the
    brain region that receive, integrate and process visual information transmitted
    from the retinas of human eyes. Deep neural networks (DNNs) are a class of ANNs
    characterized by having two or more hidden layers. CNNs belong to a class of DNNs
    whose hidden layers typically consisting of a series of convolutional layers (CLs),
    each converting an input image into smaller sized information via a multiplication
    or a dot-product operation. A typical CL uses multiple small feature detectors,
    called convolutional filters, that are individually slid over a larger image and,
    by performing a weighted sum operation, generate an activation map indicating
    the presence or absence of a given feature within the image. The number of convolutional
    filters used in a given CL is dictated by the number of features that need to
    be detected by the CNN. For example, CNNs for line detection typically use a low
    number of filters (e.g. 10), whereas detection of complex features may require
    over 100 filters.


    Another type of CNN layer is called a pooling layer (PL), whose role is to down-sample
    (i.e. reduce the dimensions of a matrix without losing important information contained
    by its elements) activation maps to reduce amount of data to be processed. A PL
    uses a filter to perform down-sampling, where a filter of size (f × f) can merge
    the pixels (i.e. the smallest image elements) in adjacent (f × f) cells into a
    single cell by replacing them with the maximum value among the cells. A rectified
    linear unit (RELU) of a CNN is a non-linear activation function to control propagation
    of information between adjacent layers. Typically, a RELU removes negative'

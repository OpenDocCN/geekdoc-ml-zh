- md: "## 3 ANNs for Optimized Prediction\n\nFigure 3.3 (a) Sample data used for sleep-study\
    \ example, and (b) screenshot generated by Python script, where the user enters\
    \ 7 and 3 as the number of hours studied and slept, respectively, for which the\
    \ ANN predicts grade of 98.\n\ncalled `df` is created by reading an input file.\
    \ Sample inputs of X and outputs of Y are set in lines 37 and 39, respectively.\
    \ Matlab uses some percentage of the sample data to train an ANN and the remaining\
    \ samples to test the accuracy of the training. These percentages are set in lines\
    \ 60, 63 and 70 for the percentages of data to be used for training, validation\
    \ and testing, respectively. The number of inputs is set in line 43 and the number\
    \ of hidden layers in line 45. An ANN object called `net` is created in line 47\
    \ by\n\n```\nnet = fitnet(hiddenLayerSize);\n```\n\nIn line 73, the ANN object\
    \ `net` is trained using inputs and outputs:\n\n```\n[net, tr] = train(net, X,\
    \ Y);\n```\n\nwhere `tr` is a structure that keeps a training record of details\
    \ such as performance, best performing epoch and intermediate variable values.\
    \ If the user entered 2, the name of a trained ANN is requested in line 78 and\
    \ is loaded into the `net` object in line 84. At this point `net` contains an\
    \ ANN, either a newly or previously trained one. Between lines 95 and 120, there\
    \ is a loop that keeps asking the user to enter two inputs (study hours kept in\
    \ variable `studied` in line 97 and sleep hours in `slept` line 98) and generates\
    \ an output saved in `prediction` in line 100 as\n\n```\nprediction = net(studied,\
    \ slept);\n```\n\nEvery time the user enters `y` in line 177, the loop repeats\
    \ asking for study hours in line 97 and sleep in line 98, generating a new prediction\
    \ in line 100 as above. The loop terminates when the user enters `n` in line 177.\
    \ If the user enters `y` in line 124, the trained ANN is saved in lines 125 to\
    \ 127.\n\nFigure 3.4 shows a screenshot generated by the Matlab script where the\
    \ user enters 7 and 3 as the number of hours studied and slept, respectively,\
    \ for which the ANN predicts a grade of 82. This result is slightly different\
    \ than the one from the Python script in Figure 3.3, which predicts the grade\
    \ to be 98 for 7 hours of study and 3 hours of sleep. This is to be expected since\
    \ the libraries used in Python and Matlab have different internal implementations\
    \ for ANN training.\n\n```\n**************************************************\n\
    **          WELCOME TO GRADE PREDICTIONS USING ANNS          **\n**************************************************\n\
    OPTIONS:\n1 - Train a new ANN model\n2 - Load an existing model\n\nSelect an option\
    \ by entering a number: 1\n***** NOW TRAINING ANN USING study_data.csv *********\n\
    *********** ANN training complete ***********\n*********** Press ENTER to start\
    \ using the ANN ***********\nEnter number of hours studied: 7\nEnter number of\
    \ hours slept: 3\nANN Predicted Grade: 82\n```\n\nFigure 3.4 Sample screenshot\
    \ generated by the Matlab script for the sleep-study example, where the user enters\
    \ 7 and 3 as the number of hours studied and slept, respectively, for which the\
    \ ANN predicts a grade of 82.\n\n```\n1  % The City College of New York, City\
    \ University of New York\n2  % Written by Olga Chsherbakova\n3  % Date: November,\
    \ 2023\n4  \n5  % Prediction of exam grade using an ANN based on number of sleep\
    \ and study\n6  \n7  clc;\n8  clear;\n9  \n10 % ANN TRAINING\n11 disp('**************************************************')\n\
    12 disp('**          WELCOME TO GRADE PREDICTIONS USING ANNS          **')\n13\
    \ disp('**************************************************')\n14 \n15 % prompt\
    \ user to train or load an ANN model\n16 option = '';\n17 while ~any(strcmp(option,\
    \ {'1', '2'}))\n18     disp('OPTIONS:');\n19     disp('1 - Train a new ANN model');\n\
    20     disp('2 - Load an existing model');\n21     option = input('\\nSelect an\
    \ option by entering a number: ', 's');\n22     if ~any(strcmp(option, {'1', '2'}))\n\
    23         disp('Invalid input: Input must be {''1'', ''2''}');\n24         pause(2);\n\
    25     end\n26 end\n27 \n28 if strcmp(option, '1')\n29     % OPTION 1: TRAIN A\
    \ NEW ANN MODEL\n30     train_data_file = 'study_data.csv';\n31     disp(['*****\
    \ NOW TRAINING ANN USING ', train_data_file, ' *********']);\n32     pause(3);\n\
    33 \n34     % load the training data\n35     df = readtable(train_data_file);\n\
    36     % define input matrix X (get rid of column called exam_grade)\n37     X\
    \ = df{:, {'hours_studied', 'hours_slept'}}';\n38     % define expected output\
    \ matrix Y\n39     Y = df{:, 'exam_grade'};\n40 \n41     % create a model for\
    \ the ANN\n42     % Two inputs (hours to study and hours to sleep)\n43     inputSize\
    \ = 2;\n44     % Add two hidden layers\n45     hiddenLayerSize = 2;\n46     %\
    \ fit function\n47     net = fitnet(hiddenLayerSize);\n48 \n49     % The reason\
    \ for this data split is to avoid overfitting, which is when\n50     % a model\
    \ becomes too specific to the training data and doesn't\n51     % generalize well\
    \ to new data. By having a separate validation set,\n52     % you can monitor\
    \ the model's performance during training and\n53     % make adjustments if necessary.\
    \ The test set is used to evaluate\n54     % the model's performance in a final\
    \ assessment.\n55 \n56     % sets the ratio of the dataset used for training.\n\
    57     % In this case, 70% of the data is used for training the ANN.\n58     %\
    \ This is the data that the ANN learns from to update its weights\n59     % and\
    \ minimize the training error.\n60     net.divideParam.trainRatio = 70/100;\n\
    61     % sets the ratio of the dataset used for validation. In this case, 15%\n\
    62     % of the data is used for validation. The validation set is used to\n63\
    \     % monitor the ANN's performance during training.\n64     % It helps to detect\
    \ overfitting and allows fine-tune hyperparameters.\n65     net.divideParam.valRatio\
    \ = 15/100;\n66     % sets the ratio of the dataset used for testing. In this\
    \ case, 15%\n67     % of the data is reserved for testing the trained ANN. The\
    \ test set is\n68     % used to evaluate the final performance of the trained\
    \ ANN on data\n69     % it has never seen before.\n70     net.divideParam.testRatio\
    \ = 15/100;\n71 \n72     % train the ANN model\n73     [net, tr] = train(net,\
    \ X, Y);\n74 \n75     disp('*********** ANN training complete ***********');\n\
    76 elseif strcmp(option, '2')\n77     % OPTION 2: LOAD ANN MODEL FROM FILE\n78\
    \     load_file = input('Enter the file name of ANN model to load: ', 's');\n\
    79     if ~endsWith(load_file, '.mat')\n80         load_file = [load_file '.mat'];\n\
    81         %load_file = input('It must be a .mat file')\n82         % if file\
    \ name does not end with '.mat', add '.mat'\n83     end\n84     load(load_file,\
    \ 'net');\n85     \n86     disp(['**** SUCCESSFULLY LOADED ANN MODEL FROM ', load_file,\
    \ ' ****']);\n87 end\n88 \n89 % Display the nets of the models\n90 % disp(net)\n\
    91 \n92 % GRADE PREDICTION USING ANN\n93 input('*********** Press ENTER to start\
    \ using the ANN ***********', 's');\n94 finished = false;\n95 while ~finished\n\
    96     % prompt user for inputs\n97     studied = input('Enter number of hours\
    \ studied: ');\n98     slept = input('Enter number of hours slept: ');\n99   \
    \  \n100     prediction = net([studied; slept]);\n101     \n102     % restrict\
    \ prediction between 0 and 100\n103     prediction = min(max(prediction, 0), 100);\n\
    104     \n105     % display prediction\n106     fprintf('ANN Predicted Grade:\
    \ %d\\n', round(prediction));\n107     \n108     % ask user if they would like\
    \ to continue\n109     choice = '';\n110     while ~any(strcmp(choice, {'y', 'n'}))\n\
    111         choice = input('Would you like to continue? (y/n): ', 's');\n112 \
    \        if strcmp(choice, 'y')\n113             % Do nothing and continue the\
    \ loop\n114         elseif strcmp(choice, 'n')\n115             finished = true;\n\
    116         else\n117             disp(\"Invalid input: Input must be 'y' or 'n'\"\
    );\n118         end\n119     end\n120 end\n121 \n122 % ask user if they would\
    \ like to save the ANN model\n123 choice = input('Would you like to save the ANN\
    \ model? (y/n): ', 's');\n124 if strcmp(choice, 'y')\n125     save_file = input('Enter\
    \ the file name to save the ANN Model: ', 's');\n126     save([save_file '.mat'],\
    \ 'net');\n127     disp(['**** ANN MODEL SUCCESSFULLY SAVED TO ', save_file, '.mat\
    \ ****']);\n128 end\n129 disp('Thank you for using the ANN for grade prediction.\
    \ Goodbye!');\n```\n\n## 3.6 Case Study 2: Prediction of Bike Rentals\n\nIn this\
    \ section, we present an ANN designed to predict the number of new bike rentals\
    \ in a given hour in London, UK. As shown in Figure 3.5, there are five inputs\
    \ defined for the ANN, namely the time of the day, temperature, wind speed, a\
    \ weather code that describes the current climate conditions and a Boolean value\
    \ indicating whether the day is a weekend or not. The ANN output is the number\
    \ of bike rentals for a given hour. These input values are measurements observed\
    \ in the field, which are used as inputs without processing (e.g. finding minimum,\
    \ maximum, average, and so on). The ANN architecture is fully connected and consists\
    \ of an input layer with five inputs, two hidden layers with five and six neurons,\
    \ and one output layer for the predicted number of bike rentals in the next hour.\
    \ Figure 3.6 illustrates the ANN layers for the bike rental example, where most\
    \ of the links between layers are omitted in the figure for simplicity. The training\
    \ process is similar to the one described above for the sleep-study example in\
    \ Section 3.5, with each epoch consisting of a forward propagation to make a prediction\
    \ followed by adjustment of the ANN weights and bias via back propagation. The\
    \ number of epochs in this simple is kept as 2 000. Real-life ANN training typically\
    \ uses up to millions of data samples and tens of thousands of epochs.\n\n###\
    \ 3.6.1 Python Script for Bike Rentals Using an ANN\n\nA sample Python script\
    \ implementing the ANN in Figure 3.6 is presented below. In lines 32–125, user\
    \ selection of either to train a new ANN or load an existing one is evaluated.\
    \ If user enters 1 as a selection, in line 51, data from bike rentals in London\
    \ [38], of which a small sample is displayed in Figure 3.7, is defined as the\
    \ training data saved as a multidimensional array of df.\nIn line 77, a function\
    \ which converts a time-stamp to the hour of the day is invoked. All time-stamps\
    \ from sample data are converted to hours of the day in line 80. An ANN model\
    \ is\n\n| Inputs (data is from [2]) | | | | | Output |\n|---|---|---|---|---|---|\n\
    | Time stamp | Weekend | Temp (Celsius) | Wind speed | Weather code | Number of\
    \ bikes shared |\n| 1/4/2015 0:00 | true | 3 | 6 | 3 | 182 |\n| 1/4/2015 1:00\
    \ | true | 3 | 5 | 1 | 138 |\n| 1/4/2015 2:00 | true | 2 | 5 | 1 | 72 |\n| 1/4/2015\
    \ 3:00 | true | 2 | 0 | 1 | 47 |\n| 1/4/2015 4:00 | true | 1 | 6 | 1 | 46 |\n\
    | 1/4/2015 5:00 | true | 1 | 4 | 1 | 51 |\n\nFigure 3.5 ANN training data with\
    \ five inputs and one output to be used for bike rentals example (Data taken from\
    \ [38])."
  mdcn: "## 3 用于优化预测的人工神经网络\n\n图 3.3 (a) 用于睡眠-学习示例的样本数据，以及 (b) 由 Python 脚本生成的截图，用户分别输入\
    \ 7 和 3 作为学习和睡眠的小时数，人工神经网络预测的成绩为 98。\n\n名为 `df` 的变量是通过读取输入文件创建的。X 的样本输入和 Y 的输出分别在第\
    \ 37 行和第 39 行设置。Matlab 使用部分样本数据来训练人工神经网络，其余样本用于测试训练的准确性。这些百分比分别在第 60、63 和 70 行设置，用于训练、验证和测试的数据比例。输入数量在第\
    \ 43 行设置，隐藏层数量在第 45 行设置。一个名为 `net` 的人工神经网络对象在第 47 行通过以下代码创建：\n\n```\nnet = fitnet(hiddenLayerSize);\n\
    ```\n\n在第 73 行，使用输入和输出训练人工神经网络对象 `net`：\n\n```\n[net, tr] = train(net, X, Y);\n\
    ```\n\n其中 `tr` 是一个结构体，用于保存训练记录的详细信息，例如性能、最佳执行周期和中间变量值。如果用户输入 2，则在第 78 行请求已训练的人工神经网络的名称，并在第\
    \ 84 行加载到 `net` 对象中。此时 `net` 包含一个人工神经网络，无论是新训练的还是之前训练的。在第 95 行到第 120 行之间，有一个循环不断要求用户输入两个输入（学习时间存储在第\
    \ 97 行的变量 `studied` 中，睡眠时间存储在第 98 行的 `slept` 中），并在第 100 行生成保存在 `prediction` 中的输出，如下所示：\n\
    \n```\nprediction = net(studied, slept);\n```\n\n每次用户在第 177 行输入 `y` 时，循环会重复要求输入学习时间（第\

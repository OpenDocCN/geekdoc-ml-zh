    $$h_t = \tanh(U \cdot x_t + W \cdot h_{t-1} + b).$$


    如图 10.2a 和 b 所示，softmax 单元之前的原始输出 $\Omega_t$ 计算如下：


    $$\Omega_t = V \cdot h_t + c.$$


    回顾公式 (10.1)，softmax 单元将 $\Omega_t$ 的元素转换为 0 到 1 之间的概率值，并将其分配给 $\hat{y}_t$：


    $$\hat{y}_t = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}},$$


    其中 $\Omega_{t,j}$ 表示向量 $\Omega_t$ 的第 $j$ 个元素。交叉熵损失 $L$ [93] 是一个用于表示 RNN 预测值与真实输出值之间差异的实体。对于步骤
    $t$ 的预测 $\hat{y}_t$，$L$ 计算如下：


    $$L_t = -y_t^o \ln(\hat{y}_t),$$


    其中 $y_t^o$ 是目标（即正确预测的）输出的独热编码值。对于长度为 $\mathcal{T}$ 的输入序列，$\mathcal{T}$ 步后的总损失为：


    $$L = \sum_{t=1}^{\mathcal{T}} L_t.$$


    为了最小化公式 (10.7) 中的损失 $L$，必须计算其相对于 RNN 参数（如 $U, W, V, b$ 和 $c$）的梯度。梯度的计算对应于从预测输出开始反向传播到输入的操作，每一步都通过偏导数执行。这些梯度的逐步推导过程在附录
    D 中给出。我们强烈建议读者阅读这部分材料，以理解训练 RNN 所采取的操作。$L$ 相对于权重的偏导数如下：


    $$\frac{\partial L_t}{\partial \Omega_t} = (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)
    \cdot h_t^\top$$


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) h_{k-1} \right)$$ (10.11)


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) x_k \right)$$ (10.12)


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) \right),$$ (10.13)


    其中 $\dagger$ 表示矩阵转置操作。使用这些梯度，在反向传播后，通过减去当前值乘以学习率 $\eta$（类似于第 2 章 ANNs 中使用的学习率

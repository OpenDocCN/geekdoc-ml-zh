    data, which consists of the number of hours spent on sleeping and studying with
    the outcomes of the grades received for those exams. At the start of training,
    link weights and bias are assigned randomly selected values. After one forward
    propagation from the input to the output layers through the hidden layer, a prediction
    for output is obtained, and its error is computed as the difference between the
    real and calculated values of the grades. Through a back propagation, partial
    derivations of the error with respect to the link weights and bias are computed
    such that the weight matrix and bias values are adjusted to reduce the error.
    In our Python and Matlab implementations of this ANN, presented in Sections 3.5.9
    and 3.5.10, respectively, forward and back propagations are repeated 2 000 times.


    After training is complete, the ANN can be used to predict scores for new exams.
    When anticipated number of hours for sleep and study are entered to the ANN for
    an incoming exam, it generates a grade prediction. If the grade is satisfactory,
    the student may follow that schedule for sleep and study. However, if the grade
    is too low, the student has a chance to experiment with the ANN by using different
    sets of input values to find optimal sleep and study hours yielding a satisfactory
    grade. Of course, we recommend that students not spend too much time experimenting
    with an ANN but instead focus on learning the course materials as much as possible,
    regardless of the grade desired.


    # 3.5.1 Using Matrices for ANN Training


    Let us now consider representing multiple samples used during training as matrices.
    The input values shown in Figure 3.1 can be presented as a matrix, called X, with
    two columns and three rows'

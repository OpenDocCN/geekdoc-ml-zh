    ## 11.7 Exercises for Chapter 11


    - 1) Increase the number of epochs and observe its impact on training time and
    prediction power (i.e. compare the responses to the same user queries).

    - 2) Increase the number of hidden layers and observe its impact on training time
    and prediction power (i.e. compare the responses to the same user queries).

    - 3) Repeat Exercise 1 for batch size.

    - 4) Repeat Exercise 1 for embedding layer size.

    - 5) If you train the example RNN presented in Section 11.4 with a data set that
    has roughly twice as many elements, what will be the impact on training cost and

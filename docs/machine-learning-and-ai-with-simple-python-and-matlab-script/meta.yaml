    # 17.4 Variations of the TSP


    There are several variations of the TSP, each with a different set of restrictions
    imposed on its solutions. It is possible that visiting each city exactly once
    may be too restrictive for certain applications. For example, if there is a costly
    edge between two cities (e.g. due to a congested highway, speed limitations or
    a traffic condition), it may be preferable to avoid such edges by visiting some
    of the remaining cities more than once. In the TSP with multiple visits (TSPM),
    the aim is to minimize the total cost of the trip while visiting each vertex at
    least once (i.e. allowing multiple visits at each city as needed). The path shown
    in Figure 17.7a is a solution to the TSP which visits each city exactly once with
    a cost of 510 miles. If the problem is formulated as a TSPM, the solution has
    a total travelled distance of 320 miles with Toledo visited twice, as shown in
    Figure 17.7b.


    In another variation of the TSP, called the clustered TSP (CTSP), the cities are
    partitioned into clusters such that a minimum-cost tour of all clusters is to
    be determined and each city within a cluster has to be visited before moving to
    the next cluster. A solution to the CTSP may aim to optimize both an ordering
    of cities to be visited within each cluster and a sequence in which clusters are
    toured [129]. As an example of the CTSP, consider testing integrated circuits
    where it is common to cluster ports such that any port in a cluster will have
    the same voltage requirements [123]. To complete the inspection of an integrated
    circuit, a robotic test probe has to measure the voltages at all ports of a cluster
    before moving to the next one. Minimizing the movements of the robot is equivalent
    to the CTSP, where every port at every cluster has to be visited with minimal
    cost.


    The TSP variation that divides the graph vertices into subsets and aims to find
    the minimum-cost tour by passing through exactly one node from each of the subsets
    is called the set TSP (STSP). In some cases the STSP is also referred to as the
    covering salesmen problem (CSP) since it can be applied to find a minimum-cost
    tour among a subset of n cities such that every city not in the tour is within
    a predefined distance of a city that is in the tour. In the CSP, each visited
    city together with its neighbouring cities constitute a neighbourhood set [130].
    As a typical STSP application, consider the task of testing integrated circuits
    by measuring several ports, where the ports are divided into groups such that
    only one port in each group needs to be measured. Minimizing the movements of
    a robotic test probe can be modelled as an STSP.


    # 17.5 GA Solution for the TSP


    Genetic algorithms can find solutions for the travelling salesman class of problems,
    even for cases where the number of nodes to be covered is in the tens of thousands
    or more. For simplicity and without loss of generality, suppose that all cities
    are interconnected by two-way roads,


    ![](img/a83d807f9a9119b1472555c0ef55797e_298_0.png)'
  - '[PAGE 299]


    which corresponds to a completely-connected graph $G$ with undirected edges, as
    presented in Section 17.2. For this simplified case, a chromosome may encode the
    cities in the order to be visited. A fitness function can be defined to represent
    the total cost of a cycle that is dictated by a chromosome as its fitness as defined
    in Eqn. (17.1). A generation of the GA will evolve a set of individuals in its
    population, where each individual corresponds to a TSP solution.


    In Figure 17.8a, an example graph is shown where the nodes are connected with
    undirected edges, each of which is associated with an integer cost value representing
    the difficulty of traversing the edge. This example uses a `completely-connected
    graph`, where every node is connected to every other one with an undirected edge.
    In this simplified form, the salesman can travel either from node $i$ to $j$ or
    from $j$ to $i$ with the same cost. However, in the general case, the TSP graph
    does not have to be completely-connected and the edges may not be undirected (i.e.
    an edge directed from node $i$ to $j$ does not imply in general that the salesman
    can also travel from $j$ to $i$). The TSP aims to find the minimum cost cycle
    among all possible cycles starting and ending at $A$ while covering all edges
    only once. Even for this simple example, there are $4^5$ possibilities to consider.


    In Figure 17.8b, a connectivity matrix called $CM$ is presented, which is derived
    from the completely-connected graph in Figure 17.8a. Connectivity matrix $CM$
    is an ($n \times n$) matrix where an element $CM[i][j]$ represents the cost from
    node $i$ to node $j$. For example, using a $CM$ matrix of size ($5 \times 5$),
    the cost associated with the edge from node 0 to 2 (i.e. from node A to node C)
    is $CM[0][2] = 12$. Since we are using an undirected graph $G$ for this example,
    an edge from $i$ to $j$ implies that there is also a connection from $j$ to $i$
    with the same cost. As seen in Figure 17.8b, $CM[0][2] = 12$ implies that $CM[2][0]
    = 12$. Diagonal elements of $CM$ are zero (i.e. $CM[i][i] = 0$ for ($i = 0, \cdots,
    n-1$)), since the distance to itself is zero for each city.


    Let us now define a chromosome as the order to visit cities $[c_i, c_j, \cdots,
    c_x]$, where we assume that the last city $c_x$ and the first city $c_i$ are connected
    covering all vertices in $V$. For the example in Figure 17.8, chromosome length
    is 5 since there are five cities. The fitness function is the total weight (i.e.
    the cost) for the edges selected in a chromosome:


    $$\text{Fitness of a candidate} = \sum_{(i=1)}^{m} w_i + w_R,$$


    where $w_i$ is the weight of the edge in codon $c_m$ (i.e. the last one in the
    chromosome) and $w_R$ the weight of the return edge from the last node to the
    start. For the example in Figure 17.8, starting from node $A$, the TSP is defined
    as finding the order in which a salesman must visit each node once and return
    to $A$ with a minimum total cost. Two candidate solutions are given in Figure
    17.9, namely $P_1 = A, B, C, D, E, A$ and $P_2 = A, B, C, E, D, A$. The total
    cost for cycle $P_1$ is 24, whereas it is 31 for $P_2$. Between these two candidates,
    it is clear that $P_1$ is fitter than $P_2$.



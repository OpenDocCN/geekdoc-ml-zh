  - '[PAGE 30]


    A rectilinear activation function, on the other hand, generates an output signal
    equal to the input signal strength for all positive signal values, and outputs
    zero for any input with non-positive values.


    # 2.3.2 Sigmoid Activation Function


    The Sigmoid is convenient to efficiently calculate gradients used in ANN training
    (Figure 2.3). Sigmoid activation limits neuron output within the interval of [0,
    1]:


    $$f(Z) = \frac{1}{1 + e^{-Z}}$$


    The derivative of the sigmoid is given by


    $$f''(Z) = \frac{e^{-Z}}{(1 + e^{-Z})^2}$$


    # 2.3.3 Rectilinear Activation Function


    The rectilinear activation function (ReLU) and its derivative are shown in Figure
    2.4. It is cheaper to calculate gradients used in ANN training with rectilinear
    activation.


    $$f(Z) = \begin{cases} Z & \text{if } Z > 0; \ 0 & \text{otherwise.} \end{cases}$$


    The derivative of the rectilinear function is 1 for positive values of Z and 0
    for negative values:


    $$f''(Z) = \begin{cases} 1 & \text{if } Z > 0; \ 0 & \text{if } Z < 0; \ \text{undefined}
    & \text{if } Z = 0. \end{cases}$$


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_1.png)'
  - '[PAGE 31]


    The rectilinear function prevents negative signals from propagating further in
    an ANN. However, in the output layer of an ANN, eliminating negative values via
    a rectilinear function may be problematic if the outputs of the ANN are allowed
    to be negative. In these cases, rectilinear activation functions should not be
    employed in the output layer.


    # 2.3.4 Weights of Synapses


    The value of a signal after it leaves an intermediate neuron is further altered
    by multiplying it by the weight of the link over which it is travelling. Figure
    2.5 shows an example ANN, where $x_1$ and $x_2$ are the input signals to three
    nodes of a hidden layer. At the three hidden neurons, the weights of the input
    synapses are multiplied by the input neuron values and aggregated at the hidden
    neurons as follows:


    $e_1 = (x_1 \cdot w_1) + (x_2 \cdot w_4)$

    $e_2 = (x_1 \cdot w_2) + (x_2 \cdot w_5)$

    $e_3 = (x_1 \cdot w_3) + (x_2 \cdot w_6)$.


    An activation function $f(.)$ is applied to the summed signals at each hidden
    neuron as follows:

    $a_1 = f(e_1)$

    $a_2 = f(e_2)$

    $a_3 = f(e_3)$,

    where the $a_1$, $a_2$ and $a_3$ values are determined based on the activation
    function employed at the neurons, as presented in Eqs. (2.1) and (2.3). Similarly,
    at the output layer, the output neuron has three inputs which are aggregated as


    $e_4 = (a_1 \cdot w_7) + (a_2 \cdot w_8) + (a_3 \cdot w_9)$,


    where the weights $w_7$, $w_8$ and $w_9$ are applied to the outputs of hidden
    neurons $a_1$, $a_2$ and $a_3$, respectively. The output is obtained after applying
    an activation function to the summation shown in Eq. (A.1):


    $\hat{y} = f(e_4)$.


    As discussed earlier, one has to be careful when employing a rectilinear activation
    function at an output neuron as shown in Eq. (2.7), which allows for only positive
    output values, since negative values may be important for certain applications.



    \n# 7 卷积神经网络\n\n## 7.1 引言\n\n我们知道，当人类处理视觉信息时，他们会将更广阔的视野浓缩成多个重叠的较小感受野，这些感受野由大脑不同区域（即视觉皮层）的相应神经元控制。为了识别一个物体，视觉输入会通过分层连接的感受野进行处理。控制感受野的神经元对相对较小和简单的视觉刺激做出反应，而与位于大脑更深层的感受野相关的神经元则处理越来越大、越来越复杂的光学特征。随着视觉信息沿着分层连接的感受野传递，神经元开始以越来越精确的方式表征视觉物体，直到大脑能够识别出该物体（图7.1a）。\n\
    \n图7.1b展示了大脑在处理视觉刺激时，感受野大小如何从初级视觉皮层（称为V1）经过次级视觉皮层（称为V2和V4），最终在颞下皮层（IT）识别出物体而增长的过程。图7.1c展示了神经元如何在大脑通过各层处理图像时进行处理，每一层的感受野都越来越大（如图7.1a中的红色路径所示）。\n\
    \n卷积神经网络（CNN）的灵感来源于大脑中接收、整合和处理从人眼视网膜传递的视觉信息的区域所发生的过程。深度神经网络（DNN）是一类具有两个或更多隐藏层的人工神经网络（ANN）。CNN属于DNN的一类，其隐藏层通常由一系列卷积层（CL）组成，每个卷积层通过乘法或点积运算将输入图像转换为尺寸更小的信息。一个典型的CL使用多个小型特征检测器，称为卷积核，每个卷积核在较大的图像上单独滑动，并通过执行加权求和操作生成一个激活图，该图指示图像中是否存在给定特征。特定CL中使用的卷积核数量由CNN需要检测的特征数量决定。例如，用于线条检测的CNN通常使用较少的滤波器（例如10个），而检测复杂特征可能需要超过100个滤波器。\n\

    # 2

    Artificial Neural Networks


    # 2.1 Introduction


    Biological nervous systems process information using nerve cells called neurons
    that transmit messages to other cells using connections referred to as synapses.
    Information in the brain is stored by strengthening synapses among a group of
    neurons through a reinforcement process that repeatedly interchanges messages
    among these cells. Neurons operate in groups and react to inputs applied to them
    by further propagating these inputs to other neurons only over the strengthened
    synapses. No single neuron stores any particular piece of information, but a group
    of neurons together with established synapses represent information in the brain
    [23].


    Brain-inspired systems, called artificial neural networks (ANNs), intend to replicate
    the way that humans learn. ANNs are built of nodes (i.e. artificial neurons) which
    are interconnected by directed links (i.e. synapses) representing a connection
    from the output of one artificial neuron to the input of another. Each link in
    this system is associated with a weight, which alters the information as it travels
    from one neuron to another. In an ANN, nodes are organized in layers responsible
    for processing information in sequence. Signals are processed starting from the
    input layer, passing intermediate hidden layers until reaching the output layer,
    which generates observable outputs. Figure 2.1 shows an example of an ANN consisting
    of an input, two hidden and one output layers. Note that an engineer designing
    an ANN selects the number of nodes and layers depending on the requirements of
    the problem to be solved. This design process requires experience and specific
    domain knowledge for each application at hand.


    # 2.2 Applications of ANNs


    ANNs may be employed in solving many engineering problems ranging from cybersecurity
    [24] to image processing [25]. In general, applications of ANNs fall into one
    of three categories: classification, prediction or optimization problems. In classification
    problems, a real-life observation is recognized as a particular category. One
    example is setting up an ANN to classify activities of a credit card as either
    legitimate or fraudulent actions [26]. In this example, an ANN can be built using
    legitimate actions on a given credit card based on the historic usage data of
    this card (e.g. types of items bought, places visited, times of shopping, etc.).
    When an interaction does not fit into the class of regular actions, it will be
    flagged as suspicious activity. Another example of a classification problem involves
    recognizing handwritten characters as particular letters or digits [27].'
  - '[PAGE 29]


    8 | 2 Artificial Neural Networks


    ![](img/a83d807f9a9119b1472555c0ef55797e_29_0.png)


    Figure 2.1 An ANN with two hidden layers.


    Prediction problems aim to estimate unknown outcomes based on historical data.
    For example, an ANN can be built using past atmospheric data to predict future
    precipitation patterns and temperature levels [28]. Similarly, in stock market
    predictions, using historical data (e.g. recent market behaviour, geopolitical
    situations and commodity prices), an ANN can be set up to predict whether a given
    stock is expected to gain or lose value [29].


    In optimization problems, valid outcomes, which often have to satisfy multiple
    and possibly conflicting constraints, must be found in typically very large solution
    spaces. For example, finding an optimal dose of a chemotherapy drug to be administered
    to a cancer patient based on personal tumour growth data and overall health characteristics
    (e.g. heart condition, blood-sugar measurements, physiological indicators and
    others) may be addressed by an optimization-type ANN.


    # 2.3 Components of ANNs


    # 2.3.1 Neurons


    In an ANN, each node (i.e. neuron) performs a calculation to determine if its
    input signals should be forwarded to the next layer. This task is performed by
    so-called summation and activation functions. First, a summation function adds
    the incoming signal strengths, and then an activation function makes a decision
    whether or not to propagate them further to other layers of the ANN. An example
    of summation and activation functions embedded in an artificial neuron are shown
    in Figure 2.2, where inputs of $x_i$ and $x_j$ with weights $w_i$ and $w_j$, respectively,
    are first summed as a combined signal $e$. An activation function $f(e)$ then
    determines if the resulting signal $e$ should be forwarded to the next layer.
    Most common activation functions are in the form of sigmoid or rectilinear functions
    as discussed below. A sigmoid activation function transforms its input into an
    output ranging between 0.0 and 1.0, which is useful when an output is probabilistic.


    ![](img/a83d807f9a9119b1472555c0ef55797e_29_1.png)


    Figure 2.2 An ANN neuron employing summation and activation functions.'
- md: 'A rectilinear activation function, on the other hand, generates an output signal
    equal to the input signal strength for all positive signal values, and outputs
    zero for any input with non-positive values.


    ## 2.3.2 Sigmoid Activation Function


    The Sigmoid is convenient to efficiently calculate gradients used in ANN training
    (Figure 2.3). Sigmoid activation limits neuron output within the interval of [0,
    1]:


    $$f(Z) = \frac{1}{1 + e^{-Z}}$$


    The derivative of the sigmoid is given by


    $$f''(Z) = \frac{e^{-Z}}{(1 + e^{-Z})^2}$$


    ## 2.3.3 Rectilinear Activation Function


    The rectilinear activation function (ReLU) and its derivative are shown in Figure
    2.4. It is cheaper to calculate gradients used in ANN training with rectilinear
    activation.


    $$f(Z) = \begin{cases} Z & \text{if } Z > 0; \\ 0 & \text{otherwise.} \end{cases}$$


    The derivative of the rectilinear function is 1 for positive values of Z and 0
    for negative values:


    $$f''(Z) = \begin{cases} 1 & \text{if } Z > 0; \\ 0 & \text{if } Z < 0; \\ \text{undefined}
    & \text{if } Z = 0. \end{cases}$$


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_1.png)


    The rectilinear function prevents negative signals from propagating further in
    an ANN. However, in the output layer of an ANN, eliminating negative values via
    a rectilinear function may be problematic if the outputs of the ANN are allowed
    to be negative. In these cases, rectilinear activation functions should not be
    employed in the output layer.


    ## 2.3.4 Weights of Synapses


    The value of a signal after it leaves an intermediate neuron is further altered
    by multiplying it by the weight of the link over which it is travelling. Figure
    2.5 shows an example ANN, where $x_1$ and $x_2$ are the input signals to three
    nodes of a hidden layer. At the three hidden neurons, the weights of the input
    synapses are multiplied by the input neuron values and aggregated at the hidden
    neurons as follows:


    $e_1 = (x_1 \cdot w_1) + (x_2 \cdot w_4)$

    $e_2 = (x_1 \cdot w_2) + (x_2 \cdot w_5)$

    $e_3 = (x_1 \cdot w_3) + (x_2 \cdot w_6)$.


    An activation function $f(.)$ is applied to the summed signals at each hidden
    neuron as follows:

    $a_1 = f(e_1)$

    $a_2 = f(e_2)$

    $a_3 = f(e_3)$,

    where the $a_1$, $a_2$ and $a_3$ values are determined based on the activation
    function employed at the neurons, as presented in Eqs. (2.1) and (2.3). Similarly,
    at the output layer, the output neuron has three inputs which are aggregated as


    $e_4 = (a_1 \cdot w_7) + (a_2 \cdot w_8) + (a_3 \cdot w_9)$,


    where the weights $w_7$, $w_8$ and $w_9$ are applied to the outputs of hidden
    neurons $a_1$, $a_2$ and $a_3$, respectively. The output is obtained after applying
    an activation function to the summation shown in Eq. (A.1):


    $\hat{y} = f(e_4)$.


    As discussed earlier, one has to be careful when employing a rectilinear activation
    function at an output neuron as shown in Eq. (2.7), which allows for only positive
    output values, since negative values may be important for certain applications.


    ![](img/a83d807f9a9119b1472555c0ef55797e_31_0.png)


    For the general case, if there are multiple hidden layers in an ANN, inputs and
    outputs of consecutive hidden layers are computed in the same manner explained
    here. The output layer may contain more than one neuron as an ANN may be designed
    for multiple outputs depending on the application. For example, an ANN to guide
    a drone may generate three outputs (speed, direction and altitude) for a flight
    controller using multiple inputs such as current position, speed, altitude, flight
    plan and information obstacle sensors.


    ## 2.4 Training an ANN


    In order for an ANN to generate predictions, it first has to be trained using
    existing sample data of input and output values, in a manner similar to traditional
    trial-and-error approaches. During training, weights associated with the synapses
    (e.g. $w_1$ to $w_8$ in Figure 2.5) are adjusted so that the difference between
    the outputs generated by the ANN and the actual output values of the existing
    data are as small as possible. This difference is called the error or loss. The
    goal of training is to minimize (or reduce as much as possible) the loss by adjusting
    the weight values.


    Let us now illustrate the training process using the example ANN given in Figure
    2.5. Suppose we have the following data points observed in field as the inputs
    and output of an event for which an ANN is to be trained:


    input 1: $x_1 = 3$ &nbsp;&nbsp;&nbsp;&nbsp; input 2: $x_2 = 5$ &nbsp;&nbsp;&nbsp;&nbsp;
    output: $y = 75$.


    Suppose that current initial values of the ANN weights are


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.5$

    $w_7 = w_8 = w_9 = 4.0$.


    Using Eqn. (A.1) we have


    $e_1 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$.


    Using a rectilinear activation function, from Eq. (2.6), we have


    $a_1 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_2 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_3
    = 5.5$.


    From Eq. (A.1), we then have


    $e_4 = (5.5 \cdot 4) + (5.5 \cdot 4) + (5.5 \cdot 4) = 66$.


    Using a rectilinear activation function, from Eq. (2.7), we have


    $\hat{y} = 66$.


    The error is defined as the difference between the ANN-generated output and the
    real output value from the training data. For this example, the error is


    error $= y - \hat{y} = 75 - 66 = 9$.


    For real-life applications, different methods of error computation are possible,
    for example using squares of differences or logarithmic values [30]. For the sake
    of argument, suppose the weights are adjusted through the ANN training process
    such that the new weight values are now as follows:


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.8$

    $w_7 = w_8 = w_9 = 3.5$.


    Using these weight values with the sample data, we have


    $e_1 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.8) = 7$,

    which yields

    $e_4 = (7 \cdot 3.5) + (7 \cdot 3.5) + (7 \cdot 3.5) = 73.5$.


    In this case, the difference between the real output value of $y$ and the output
    generated by the ANN of $\hat{y}$ (i.e. the error) becomes


    $\text{error} = y - \hat{y} = 75 - 73.5 = 1.5$. \hfill (2.9)


    We can clearly see from this simple enumeration shown in Eqs. (2.8) and (2.9)
    that it is possible to reduce the error by adjusting the values of the synapse
    weights, which is the fundamental idea behind the ANN training process. An ANN
    is trained by using the input and output data (also referred to as historic, sample
    or field data) to assign proper weight values to links. The training process can
    be summarized by the following steps:


    - To start, randomly chosen values are assigned to the link weights.

    - Using these random values, the output values are calculated by multiplying the
    inputs and weights and applying the activation functions at each neuron of the
    ANN.

    - The steps up to this point are referred to as `forward propagation` (see Section
    2.5 below).

    - The outputs are then compared with the expected values from the sample data.
    The difference between the ANN-generated and real output values is the error generated
    by the ANN.

    - After forward propagation and calculation of loss, a `back propagation` is performed
    based on partial derivations of loss with respect to ANN weights at each layer
    (see Section 2.6 below).

    - Based on the partial derivations, the weight values are updated.

    - Using the new weights, consecutive forward and back propagation steps (called
    `epochs`) are performed as above.

    - End of training is determined by the designers based on various criteria, including
    performing a pre-determined number of epochs, the loss value reaching a desired
    low value or lack of progress from epoch to epoch in terms of loss reduction.


    ## 2.5 Forward Propagation


    Let us now explore the forward propagation step of the ANN training process. For
    the derivations in this section, without loss of generality, we will use a simple
    ANN with one hidden layer as given in Figure 2.6 (inspired by the example in [31]).
    For the general case, with ANNs having multiple inputs, outputs and hidden layers,
    the derivations are valid with weight matrix dimensions'
  mdcn: '另一方面，线性整流激活函数对于所有正信号值，会生成一个等于输入信号强度的输出信号，而对于任何非正值的输入，则输出零。


    ## 2.3.2 Sigmoid 激活函数


    Sigmoid 函数便于高效计算人工神经网络训练中使用的梯度（图 2.3）。Sigmoid 激活将神经元输出限制在 [0, 1] 区间内：


    $$f(Z) = \frac{1}{1 + e^{-Z}}$$


    Sigmoid 的导数为


    $$f''(Z) = \frac{e^{-Z}}{(1 + e^{-Z})^2}$$


    ## 2.3.3 线性整流激活函数


    线性整流激活函数（ReLU）及其导数如图 2.4 所示。使用线性整流激活计算人工神经网络训练中的梯度成本更低。


    $$f(Z) = \begin{cases} Z & \text{if } Z > 0; \\ 0 & \text{otherwise.} \end{cases}$$


    线性整流函数的导数在 Z 为正值时为 1，在 Z 为负值时为 0：


    $$f''(Z) = \begin{cases} 1 & \text{if } Z > 0; \\ 0 & \text{if } Z < 0; \\ \text{undefined}
    & \text{if } Z = 0. \end{cases}$$


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_30_1.png)


    线性整流函数可防止负信号在人工神经网络中进一步传播。然而，在人工神经网络的输出层，如果允许网络输出为负值，那么通过线性整流函数消除负值可能会带来问题。在这些情况下，输出层不应使用线性整流激活函数。


    ## 2.3.4 突触权重


    信号离开中间神经元后，其值会通过乘以它所经过的连接权重而进一步改变。图 2.5 展示了一个示例人工神经网络，其中 $x_1$ 和 $x_2$ 是输入到隐藏层三个节点的输入信号。在三个隐藏神经元处，输入突触的权重乘以输入神经元的值，并在隐藏神经元处聚合如下：


    $e_1 = (x_1 \cdot w_1) + (x_2 \cdot w_4)$

    $e_2 = (x_1 \cdot w_2) + (x_2 \cdot w_5)$

    $e_3 = (x_1 \cdot w_3) + (x_2 \cdot w_6)$。


    对每个隐藏神经元的求和信号应用激活函数 $f(.)$，如下所示：

    $a_1 = f(e_1)$

    $a_2 = f(e_2)$

    $a_3 = f(e_3)$，

    其中 $a_1$、$a_2$ 和 $a_3$ 的值是根据神经元所采用的激活函数确定的，如公式 (2.1) 和 (2.3) 所述。类似地，在输出层，输出神经元有三个输入，它们被聚合为


    $e_4 = (a_1 \cdot w_7) + (a_2 \cdot w_8) + (a_3 \cdot w_9)$，


    其中权重 $w_7$、$w_8$ 和 $w_9$ 分别应用于隐藏神经元 $a_1$、$a_2$ 和 $a_3$ 的输出。对公式 (A.1) 所示的求和应用激活函数后，得到输出：


    $\hat{y} = f(e_4)$。


    如前所述，在输出神经元使用线性整流激活函数时必须谨慎，如公式 (2.7) 所示，因为它只允许正输出值，而对于某些应用，负值可能很重要。


    ![](img/a83d807f9a9119b1472555c0ef55797e_31_0.png)


    对于一般情况，如果人工神经网络中有多个隐藏层，则连续隐藏层的输入和输出以与此处解释的相同方式计算。输出层可能包含多个神经元，因为根据应用，人工神经网络可以设计为具有多个输出。例如，用于引导无人机的人工神经网络可以使用多个输入（如当前位置、速度、高度、飞行计划和障碍物传感器信息）为飞行控制器生成三个输出（速度、方向和高度）。


    ## 2.4 训练人工神经网络


    为了使人能够生成预测，首先必须使用现有的输入和输出值的样本数据对其进行训练，其方式类似于传统的试错方法。在训练过程中，与突触相关的权重（例如图 2.5 中的
    $w_1$ 到 $w_8$）会被调整，以使人工神经网络生成的输出与现有数据的实际输出值之间的差异尽可能小。这种差异被称为误差或损失。训练的目标是通过调整权重值来最小化（或尽可能减少）损失。


    现在让我们用图 2.5 中给出的示例人工神经网络来说明训练过程。假设我们有以下在野外观察到的数据点，作为需要训练的人工神经网络的输入和输出：


    输入 1：$x_1 = 3$ &nbsp;&nbsp;&nbsp;&nbsp; 输入 2：$x_2 = 5$ &nbsp;&nbsp;&nbsp;&nbsp;
    输出：$y = 75$。


    假设当前人工神经网络权重的初始值为


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.5$

    $w_7 = w_8 = w_9 = 4.0$。


    使用公式 (A.1)，我们有


    $e_1 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.5) = 5.5$。


    使用线性整流激活函数，根据公式 (2.6)，我们有


    $a_1 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_2 = 5.5$ &nbsp;&nbsp;&nbsp;&nbsp; $a_3
    = 5.5$。


    根据公式 (A.1)，我们得到


    $e_4 = (5.5 \cdot 4) + (5.5 \cdot 4) + (5.5 \cdot 4) = 66$。


    使用线性整流激活函数，根据公式 (2.7)，我们有


    $\hat{y} = 66$。


    误差定义为人工神经网络生成的输出与训练数据中真实输出值之间的差异。对于此示例，误差为


    误差 $= y - \hat{y} = 75 - 66 = 9$。


    对于实际应用，可以使用不同的误差计算方法，例如使用差值的平方或对数值 [30]。为了论证，假设通过人工神经网络训练过程调整了权重，使得新的权重值现在如下：


    $w_1 = w_2 = w_3 = 1.0$

    $w_4 = w_5 = w_6 = 0.8$

    $w_7 = w_8 = w_9 = 3.5$。


    使用这些权重值和样本数据，我们有


    $e_1 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_2 = (3 \cdot 1) + (5 \cdot 0.8) = 7$

    $e_3 = (3 \cdot 1) + (5 \cdot 0.8) = 7$，

    从而得到

    $e_4 = (7 \cdot 3.5) + (7 \cdot 3.5) + (7 \cdot 3.5) = 73.5$。


    在这种情况下，真实输出值 $y$ 与人工神经网络生成的输出 $\hat{y}$ 之间的差异（即误差）变为


    $\text{误差} = y - \hat{y} = 75 - 73.5 = 1.5$。 \hfill (2.9)


    我们可以从公式 (2.8) 和 (2.9) 所示的这个简单枚举中清楚地看到，通过调整突触权重的值来减少误差是可能的，这是人工神经网络训练过程背后的基本思想。人工神经网络通过使用输入和输出数据（也称为历史数据、样本数据或现场数据）来为连接分配适当的权重值。训练过程可以总结为以下步骤：


    -   首先，为连接权重分配随机选择的值。

    -   使用这些随机值，通过将输入与权重相乘并在人工神经网络的每个神经元处应用激活函数来计算输出值。

    -   到目前为止的步骤称为 `前向传播`（见下文第 2.5 节）。

    -   然后将输出与样本数据中的期望值进行比较。人工神经网络生成的输出值与真实输出值之间的差异就是人工神经网络产生的误差。

    -   在前向传播和损失计算之后，基于损失对每一层人工神经网络权重的偏导数执行 `反向传播`（见下文第 2.6 节）。

    -   根据偏导数更新权重值。

    -   使用新的权重，如上所述执行连续的前向和反向传播步骤（称为 `训练周期`）。

    -   训练结束由设计者根据各种标准确定，包括执行预定数量的训练周期、损失值达到期望的低值，或者损失减少在训练周期之间没有进展。


    ## 2.5 前向传播


    现在让我们探讨人工神经网络训练过程中的前向传播步骤。对于本节的推导，不失一般性，我们将使用图 2.6 所示的具有一个隐藏层的简单人工神经网络（灵感来源于 [31]
    中的示例）。对于具有多个输入、输出和隐藏层的人工神经网络的一般情况，推导在权重矩阵维度上是有效的'

    $\hat{y} = f(Z^{(3)}) = \frac{1}{1 + e^{-Z}} = \frac{1}{1 + e^{-(a_{11}^{(2)}
    \cdot w_1^{(2)} + a_{12}^{(2)} \cdot w_2^{(2)} + a_{13}^{(2)} \cdot w_3^{(2)})}}$.


    ## 2.6 反向传播


    ### 2.6.1 单个神经元的反向传播


    一旦执行了前向传播，就必须从输出层开始，一直反向传播到输入层，以便根据误差值更新突触权重。让我们探讨一下给定神经元的反向传播过程是如何工作的。不失一般性，假设通过两条传入链路有两个输入，即
    $x_a$ 和 $x_b$，其权重分别为 $w_a$ 和 $w_b$，如图2.7所示。设该神经元的输出为 $\hat{y} = f(e)$，其中 $e$ 是聚合值，定义为
    $e = x_a w_a + x_b w_b$。为了最小化 $\hat{y}$ 上的误差，必须计算其对 $e$ 的导数。对于线性激活函数，我们有


    $f''(e) = \frac{\partial \hat{y}}{\partial e}$.


    $\hat{y}$ 对 $w_a$ 和 $w_b$ 的偏导数如下：


    $\frac{\partial \hat{y}}{\partial w_a} = \frac{\partial (x_a w_a + x_b w_b)}{\partial
    w_a} = x_a$


    $\frac{\partial \hat{y}}{\partial w_b} = \frac{\partial (x_a w_a + x_b w_b)}{\partial
    w_b} = x_b$.


    对于该神经元处 $y$ 的真实值，误差 $E$ 定义为


    $E = \frac{1}{2}(y - \hat{y})^2$.


    $E$ 对 $w_a$ 的偏导数为


    $\frac{\partial E}{\partial w_a} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial
    w_a} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial e} \frac{\partial e}{\partial
    w_a}$.


    让我们定义 $\delta = -(y - \hat{y})f''(e)$ 并将其代入上述误差方程：


    $\frac{\partial E}{\partial w_a} = \delta \frac{\partial e}{\partial w_a} = \delta
    x_i$. (2.10)



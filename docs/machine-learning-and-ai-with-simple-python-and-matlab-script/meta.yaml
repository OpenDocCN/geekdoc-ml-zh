  md: 'For certain applications, the outputs of the $\Omega_t$ vector are required
    to be generated as probabilities. However, it is possible that they may have negative
    values. To prevent such results, a unit called softmax is employed, which converts
    the raw output values into probabilities with values between 0 and 1, inclusive,
    and hence eliminates negative values in outputs. With softmax, the sum of all
    outputs add up to 1, where each output represents how confident the RNN is that
    it is the correct prediction. For an input alphabet size of $|I|$, output $\hat{y}_t$
    is the value of the prediction at step $t$, which is calculated as a probability
    based on the raw output of value at step $t$ (i.e. $\Omega_t$). Therefore, the
    predicted output of $\hat{y}_t$ is computed as follows:


    $$\hat{y}_t = \Theta_{\hat{y}} = \text{softmax}(\Omega_t) = \begin{bmatrix} \frac{e^{\Omega_{t,1}}}{\sum_{j=1}^{|I|}
    e^{\Omega_{t,j}}} \ \frac{e^{\Omega_{t,2}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}
    \ \vdots \ \frac{e^{\Omega_{t,|I|}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}} \end{bmatrix}
    = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}, \quad (10.1)$$


    where $|I|$ is the size of the alphabet $I$, and $\Omega_{t,i}$ is the $i^{th}$
    element of the $\Omega_t$ matrix. We can see in Eqn. (10.1) that the $\hat{y}_t$
    elements have values between 0 and 1 (excluding 0). It shows that elements of
    raw output $\Omega_t$, whose values may be negative, are replaced with their power
    of $e$ (i.e. $e^{\Omega_{t,i}}$) and divided by the summation of all raw output
    values as powers of $e$. The values for the $\hat{y}_t$ vector, therefore, are
    probabilities with values between 0 and 1 (excluding 0).


    Let us now consider the dimensions of the input, output and weight matrices in
    a one-to-one single RNN cell for an input alphabet of four characters encoded

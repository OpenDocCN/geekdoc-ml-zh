    # 10.2 One-to-One Single RNN Cell


    Let us now analyse the operation of a simple RNN, where there is one input (e.g.
    a single letter selected from a given alphabet of letters), one hidden layer and
    one output (e.g. a single character from the same alphabet). This type of an RNN
    is referred to as a one-to-one RNN. Figure 10.2a presents a compact depiction
    of a one-to-one single RNN cell. This compressed RNN cell functions as a series
    of RNN cells concatenated one after another, as shown in Figure 10.2b. The hidden
    state generated at the immediate previous step (i.e. $h_{t-1}$) is fed into the
    RNN encoder at step $t$. The encoder converts the input into a vector so that
    the RNN can process it and by incorporating the previous hidden states, generates
    the current hidden state, based on which the decoder generates the RNN output.
    Let us now examine the elements of an RNN, as shown in Figure 10.2:


    +   - $X_t$: input vector at step $t$

    - $U$: weight matrix scaling the input values

    - $b$: bias vector for encoder

    - $h_t$: hidden state at step $t$

    - $W$: weight matrix controlling the previous hidden state information of $h_{t-1}$

    - $\tanh$ unit: an example activation function used in encoder to filter out weaker
    signals

    - $V$: weight matrix for controlling current hidden state information

    - $c$: bias vector for decoder

    - $\Omega_t$: raw output vector generated by encoder before being fed into the
    softmax unit at step $t$

    - softmax unit: a unit to convert decoder outputs to probabilities

    - $\hat{Y}_t$: output vector containing the prediction generated by the RNN at
    step $t$


    An encoder of an RNN cell applies the weight matrix of $U$ to the current input
    vector $X_t$ while scaling the previous hidden state $h_{t-1}$ by weight matrix
    $W$ and scaling by a bias vector $b$, and then sums them and feeds the result
    into the activation unit (e.g. $\tanh$) to generate the current hidden state information,
    $h_t$ (Figure 10.2b). A decoder, on the other hand, scales the hidden state information
    $h_t$ by a weight matrix of $V$ and a bias vector of $c$ to generate raw outputs
    of $\Omega_t$, which are then fed into an activation unit (e.g. softmax) to obtain
    an output prediction of $\hat{Y}_t$. It is important to note that, in Figure 10.2b,
    during different steps, the same weight matrices (i.e. $U, b, W, V$ and $c$) are
    used for different inputs.


    In an RNN, a recurrence formula is applied to an input at step $t$ as follows:


    ```

    $h_t = \Theta_h(U \cdot x_t + W \cdot h_{t-1} + b)$

    ```


    where $h_t$ and $h_{t-1}$ are the current and previous hidden states, respectively,
    $\Theta_h$ is an activation function and $x_t$ is the current input. For most
    RNNs, the activation function $\Theta_h$ in the encoder is typically chosen as
    $\tanh$. It is preferred to other functions because it maintains non-zero values
    for longer ranges of epochs during training. The pre-softmax outputs generated
    by the decoder are called raw outputs and defined as the $\Omega_t$ vector at
    step $t$:


    ```

    $\Omega_t = V \cdot h_t + c$

    ```'

    ## 10.4 Multiple Hidden Layers


    One way of improving the prediction power of an RNN is to employ multiple hidden
    layers (Fig. 10.4). In an RNN with additional hidden layers, information captured
    by the hidden states for the same input vector is increased. The hidden layers
    operate in parallel to generate different approximations at each step, of which
    the better performing ones will eventually yield more accurate predictions during
    the training process. In Figure 10.5, we show a one-to-one RNN with two hidden
    layers (also referred to as two cells). In this case, there are two encoder cells,
    which are operating in parallel using different weights. We may envision that
    using two hidden layers in an RNN as equivalent to using two neurons in an ANN
    layer. As discussed in Chapter 2, multiple neurons in an ANN represent parallel
    and simultaneous searches for the same input values.


    **Figure 10.6** Vector dimensions in the one-input to one-output two-cell RNN
    shown in Figure 10.5, which is equivalent to having more neurons in an ANN layer,
    as discussed in Chapter 2.


    When multiple hidden layers are implemented in an RNN, the dimensions of the weight
    matrices are accordingly increased to accommodate the additional weights due to
    the extra hidden layers. In Figure 10.6 we show the dimensions of weight matrices
    for the RNN with two hidden layers given in Figure 10.5. To better visualize the
    search power added by the extra hidden layers, the reader should compare the weight
    matrices for this RNN with the ones given in Figure 10.3 employing a single hidden
    layer. In the general case, by including $\mathcal{N}$ hidden layers, the matrix
    dimensions in a one-to-one RNN are shaped as follows:


    - **Encoder:** $X : (|I| \times 1)$, $U : (\mathcal{N} \times |I|)$, $W : (\mathcal{N}
    \times \mathcal{N})$, $b : (\mathcal{N} \times 1)$, $H : (\mathcal{N} \times 1)$

    - **Decoder:** $V : (|I| \times \mathcal{N})$, $c : (|I| \times 1)$, $\Omega :
    (|I| \times 1)$

    - **Output:** $\hat{Y} : (|I| \times 1)$


    where $|I|$ is the alphabet size and $\mathcal{N}$ is the number of hidden layers.
    Note that for the example shown in Figure 10.6, we have $|I| = 4$ and $\mathcal{N}
    = 2$.



    between the inputs and hidden layer (i.e. $|W^{(1)}| = 32$) and (1 × 4) for bias
    (i.e. $|B^{(1)}| = 4$), and (4 × 2) neurons between the hidden layer and the output
    layer (i.e. $|W^{(2)}| = 8$) and (1 × 2) for bias (i.e. $|B^{(2)}| = 2$).


    Figure 7.14c. Therefore there will be eight inputs in the ANN to be placed after
    the UL. For simplicity, we select a fully-connected ANN with a four-neuron hidden
    layer (Figure 7.15). Since there are two outputs for this example, one for shape
    O and the other for X, the output layer of the ANN will have two neurons.


    As shown in Figure 7.14c, the inputs and weights for the ANN layer are


    $X = [1.03 \ 0.53 \ 0.53 \ 1.03 \ 1.05 \ 1.05 \ 0.55 \ 1.05]$.


    Since the example input is in the shape of an O (Figure 7.7), the outputs of the
    ANN will be $Y_1 = 1$ and $Y_2 = 0$. In matrix form, these outputs are


    $Y = [1 \ 0]$.


    There are eight inputs generated by the UL to be fed into the ANN. Since there
    are four neurons selected for the hidden layer, there are (8 × 4) synapses connecting
    the inputs to the hidden layer. In addition, there will be a bias connected to
    each neuron of the hidden layer, represented as a vector of (4 × 1) (see Chapter
    2). Similarly, between the neurons of the hidden and output layers there are (4
    × 2) synapses and bias vector of (1 × 2). The back-propagation operation starting
    at the ANN and flowing through the layers of the CNN is presented in Appendix
    C.


    Let us consider the computational cost of CNN training. Suppose the dimensions
    of a CNN input are given as (d_i × h_i × w_i) and the CL uses a total of F_cl
    filters, each with the size of (d_i × f_cl × f_cl). As presented in Figure 7.16,
    using a stride size of s_cl, after applying the convolution operation, the CL
    will then generate F_cl matrices, each of size

    $$\left(\frac{h_i - f_{cl}}{s_{cl}} + 1\right) \times \left(\frac{w_i - f_{cl}}{s_{cl}}
    + 1\right)$$.


    Note that even though an input matrix may be d_i-dimensional, the CL always generates
    a 2-D matrix. For typical applications, the number of convolutional filters F_cl
    in CL is selected between 32 and 512, the filter size f_cl as an odd integer (so
    that the filter contains a central pixel) and the stride size as s_cl = 1. Then,
    the size of each of F_cl output matrices becomes

    $$(h_i - f_{cl} + 1) \times (w_i - f_{cl} + 1)$$.

    (7.1)


    Due to the nature of the convolution operation, a CL results in a matrix that
    is smaller in size than its input. This is because the filter cannot cover input
    matrix elements near the borders, resulting in information loss at the borders.
    A solution to remedy this shortcoming is zero padding [77], where additional rows
    and columns of zeros are added to the input matrix. In Figure 7.17a, convolution
    of an input matrix of size (4 × 4) using a (3 × 3) filter generates an output
    matrix of (2 × 2). However, after adding zeros to surround the input matrix, an
    output matrix of (3 × 3) is generated (Figure 7.17b). If necessary, with more
    padding, the output and input matrices can be made the same size.


    ![](img/a83d807f9a9119b1472555c0ef55797e_129_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_130_0.png)


    Figure 7.17 Zero padding prevents loss of information during convolution operation:
    (a) input image generates a matrix with smaller dimensions, (b) by zero padding,
    information loss can be prevented (for no information loss, input matrix must
    be padded to be size of (1 × 8 × 8) for this example).


    After RELU, which does not change the dimensions of the matrices, PL with a pool
    size of p and stride of s_pl generates F_cl matrices, each with the size of


    $$\left( \frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right) \times
    \left( \frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right)$$


    Pooling size p is typically selected such that w_i and h_i are divisible by p.
    Stride s_pl is set as s_pl = p so that there is no overlap between different pooling
    regions. For s_cl = 1, as shown in Figure 7.18,


    ![](img/a83d807f9a9119b1472555c0ef55797e_130_1.png)


    we have the dimensions of each $F_{cl}$ matrix as


    $$\left(\frac{h_i - f_{cl} + 1 - p}{s_{pl}} + 1\right) \times \left(\frac{w_i
    - f_{cl} + 1 - p}{s_{pl}} + 1\right).$$


    The size of the UL input is the total amount of data contained in all $F_{cl}$
    matrices generated by PL. The output of the UL is also the number of inputs to
    the ANN:


    $$I_{ann} = F_{cl} \times \left(\frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}}
    + 1\right) \times \left(\frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1\right).$$


    As shown in Figures 7.19 and Figure 7.20, for $s_{cl} = 1$ and $h_i = w_i$, we
    have


    $$I_{ann} = F_{cl} \times \left(\frac{h_i - f_{cl} + 1 - p}{s_{pl}} + 1\right)^2.$$


    An additional function, called softmax, can be applied to the outputs of a CNN
    to convert values of $L$ to probabilities. The sum of all probabilities adds up
    to 1, where each output probability


    ![](img/a83d807f9a9119b1472555c0ef55797e_131_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_131_1.png)


    represents how confident the CNN is that a particular output is the solution.
    The probability of an output $Y_k$ is calculated as


    $$P(Y_k) = \frac{e^{Y_k}}{\sum_{i=1}^{L} Y_i},$$


    where each probability is between 0 and 1 even for negative values of CNN outputs.


    For a fully-connected ANN with a single hidden layer containing $H$ neurons, the
    computational cost of training will be $\mathcal{O}(I_{ann} \times H)$ for one
    epoch, where $\mathcal{O}$ shows the order of magnitude of the number of computational
    operations [35]. If there are multiple hidden layers, for each layer $i$ with
    $H_i$ neurons, a computation load of $\mathcal{O}(H_{i-1} \times H_i)$ is added.
    For training a CNN for $E$ epochs, the computational cost is multiplied by $E$.
    In addition, if there are $N$ input matrices used in a sample set, the cost must
    also be multiplied by $N$.


    In real-life applications, it is customary to employ several consecutive CL–PL
    pairs in a CNN to improve its prediction ability and reduce the dimensions of
    the matrices before they are fed into the ANN, where each additional CL–PL pair
    typically uses twice as many filters as the previous pair, thereby reducing the
    matrix size by the order of $\mathcal{O}(1/s_{pl})$ while increasing the number
    of output matrices by $\mathcal{O}(f_{cl})$. There are several mechanisms employed
    to reduce matrix sizes in neural networks, such as embedding layers (see Section
    10.5 in Chapter 10). In Appendix C, we present training steps for a CNN using
    a numerical example. We recommend the readers study the CNN training process to
    appreciate its computational cost.


    Let us now present a simple numerical example to examine the number of operations
    needed to train a CNN. Suppose an image of $(3 \times 1000 \times 1000)$ is used
    to train a CNN with 3 CL–PL pairs. From Eq. (7.1), the first CL (let us call it
    CL-1), using $F = 20$ filters each of size $f_{cl} = 5$, generates 20 output matrices,
    each of size $(996 \times 996)$. Based on Eq. (7.2), for the first PL (let us
    call it PL-1), using a pool size of $p = 3$ and stride of $s = 3$, the output
    will be 20 matrices, each of size $(332 \times 332)$. At CL-2, suppose there are
    $F = 35$ filters, each of size $f_{cl} = 5$. Using the outputs of PL-1, CL-2 generates
    35 output matrices, each of size $(328 \times 328)$. In turn, PL-2, with pool
    size of $p = 3$ and stride of $s = 3$, generates 35 output matrices, each of size
    $(109 \times 109)$. Similarly, CL-3, using $F = 50$ filters, each of size $f_{cl}
    = 5$, generates 50 output matrices, each of size $(105 \times 105)$. PL-3, with
    pool size of $p = 3$ and stride of $s = 3$, generates 50 output matrices, each
    of size $(35 \times 35)$. At this point the output is fed into the UL, which will
    unroll the matrices and generate an input for the ANN of size $(61\,250 \times
    1 \times 1)$. Suppose the fully-connected ANN has three hidden layers, each with
    1000 neurons. In this case, the number of operations for ANN training in forward
    propagation is


    $T_{cnn} = (61\,250 \times 1000) + (1000 \times 1000) + (1000 \times 1000) + (1000
    \times L) \approx 63M,$


    where $L$ is the number of CNN outputs (insignificant in the total, which is why
    it is not shown in the estimate). With back-propagation, the number of operations
    are doubled to approximately $126M$. For a typical ANN training with $E = 1000$
    epochs, the total cost for one input image is $126B$ operations. If there are
    10000 images in a moderate-sized sample set, the training cost adds up to one
    quadrillion operations: $T_{cnn} = \mathcal{O}(10^{15})$. Figure 7.21 illustrates
    this example.


    The cost could be much higher if larger images, more CL–PL layer pairs and ANN
    hidden layers with higher numbers of epochs are employed. Depending on the specific
    requirements of an application, the data scientists and subject matter experts
    should find an optimal balance among such parameters. Our goal by giving this
    numerical example here is to underline the fact that the computational cost of
    training a CNN can easily be prohibitively high if special attention is not paid
    to the characteristics of each CNN layer.'
  mdcn: '## 7.6 CNN训练的计算成本


    图7.14 展开层操作：(a) $C_1$ 矩阵和 (b) $C_2$ 矩阵，以及 (c) 将两者合并为一个展开矩阵。


    ![](img/a83d807f9a9119b1472555c0ef55797e_128_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_128_1.png)


    图7.15 本例中CNN使用的全连接ANN，输入与隐藏层之间有 (8 × 4) 个突触（即 $|W^{(1)}| = 32$），偏置为 (1 × 4)（即
    $|B^{(1)}| = 4$）；隐藏层与输出层之间有 (4 × 2) 个神经元（即 $|W^{(2)}| = 8$），偏置为 (1 × 2)（即 $|B^{(2)}|
    = 2$）。


    图7.14c。因此，ANN将有八个输入放置在UL之后。为简化起见，我们选择一个具有四神经元隐藏层的全连接ANN（图7.15）。由于本例有两个输出，一个对应形状O，另一个对应X，因此ANN的输出层将有两个神经元。


    如图7.14c所示，ANN层的输入和权重为


    $X = [1.03 \ 0.53 \ 0.53 \ 1.03 \ 1.05 \ 1.05 \ 0.55 \ 1.05]$。


    由于示例输入是O形（图7.7），ANN的输出将是 $Y_1 = 1$ 和 $Y_2 = 0$。以矩阵形式表示，这些输出为


    $Y = [1 \ 0]$。


    UL生成八个输入馈入ANN。由于隐藏层选择了四个神经元，因此有 (8 × 4) 个突触连接输入到隐藏层。此外，隐藏层的每个神经元都将连接一个偏置，表示为 (4
    × 1) 的向量（参见第2章）。类似地，隐藏层和输出层的神经元之间有 (4 × 2) 个突触和 (1 × 2) 的偏置向量。从ANN开始并流经CNN各层的反向传播操作在附录C中介绍。


    让我们考虑CNN训练的计算成本。假设CNN输入的维度为 $(d_i \times h_i \times w_i)$，CL总共使用 $F_{cl}$ 个滤波器，每个滤波器的大小为
    $(d_i \times f_{cl} \times f_{cl})$。如图7.16所示，使用步幅 $s_{cl}$，应用卷积操作后，CL将生成 $F_{cl}$
    个矩阵，每个矩阵的大小为

    $$\left(\frac{h_i - f_{cl}}{s_{cl}} + 1\right) \times \left(\frac{w_i - f_{cl}}{s_{cl}}
    + 1\right)$$。


    请注意，即使输入矩阵可能是 $d_i$ 维的，CL总是生成一个二维矩阵。对于典型应用，CL中的卷积滤波器数量 $F_{cl}$ 通常选择在32到512之间，滤波器大小
    $f_{cl}$ 为奇数（以便滤波器包含一个中心像素），步幅 $s_{cl} = 1$。那么，每个 $F_{cl}$ 输出矩阵的大小变为

    $$(h_i - f_{cl} + 1) \times (w_i - f_{cl} + 1)$$。

    (7.1)


    由于卷积操作的性质，CL生成的矩阵尺寸小于其输入。这是因为滤波器无法覆盖输入矩阵边界附近的元素，导致边界信息丢失。解决此缺点的一个方法是零填充[77]，即在输入矩阵中添加额外的零行和零列。在图7.17a中，使用
    (3 × 3) 滤波器对大小为 (4 × 4) 的输入矩阵进行卷积，生成 (2 × 2) 的输出矩阵。然而，在输入矩阵周围添加零后，生成了 (3 × 3)
    的输出矩阵（图7.17b）。如有必要，通过更多填充，可以使输出和输入矩阵大小相同。


    ![](img/a83d807f9a9119b1472555c0ef55797e_129_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_130_0.png)


    图7.17 零填充防止卷积操作期间的信息丢失：(a) 输入图像生成尺寸较小的矩阵，(b) 通过零填充，可以防止信息丢失（对于本例，要实现无信息丢失，输入矩阵必须填充至大小为
    (1 × 8 × 8)）。


    经过RELU（不改变矩阵维度）后，池大小为 $p$、步幅为 $s_{pl}$ 的PL生成 $F_{cl}$ 个矩阵，每个矩阵的大小为


    $$\left( \frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right) \times
    \left( \frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1 \right)$$


    池大小 $p$ 的选择通常使得 $w_i$ 和 $h_i$ 能被 $p$ 整除。步幅 $s_{pl}$ 设置为 $s_{pl} = p$，以便不同池化区域之间没有重叠。对于
    $s_{cl} = 1$，如图7.18所示，


    ![](img/a83d807f9a9119b1472555c0ef55797e_130_1.png)


    我们得到每个 $F_{cl}$ 矩阵的维度为


    $$\left(\frac{h_i - f_{cl} + 1 - p}{s_{pl}} + 1\right) \times \left(\frac{w_i
    - f_{cl} + 1 - p}{s_{pl}} + 1\right).$$


    UL输入的大小是PL生成的所有 $F_{cl}$ 矩阵包含的数据总量。UL的输出也是ANN的输入数量：


    $$I_{ann} = F_{cl} \times \left(\frac{\frac{h_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}}
    + 1\right) \times \left(\frac{\frac{w_i - f_{cl}}{s_{cl}} + 1 - p}{s_{pl}} + 1\right).$$


    如图7.19和图7.20所示，对于 $s_{cl} = 1$ 且 $h_i = w_i$，我们有


    $$I_{ann} = F_{cl} \times \left(\frac{h_i - f_{cl} + 1 - p}{s_{pl}} + 1\right)^2.$$


    一个额外的函数，称为softmax，可以应用于CNN的输出，将 $L$ 的值转换为概率。所有概率之和为1，其中每个输出概率


    ![](img/a83d807f9a9119b1472555c0ef55797e_131_0.png)


    ![](img/a83d807f9a9119b1472555c0ef55797e_131_1.png)


    表示CNN对特定输出是解决方案的置信度。输出 $Y_k$ 的概率计算为


    $$P(Y_k) = \frac{e^{Y_k}}{\sum_{i=1}^{L} Y_i},$$


    其中每个概率在0到1之间，即使对于CNN输出的负值也是如此。


    对于具有单个包含 $H$ 个神经元的隐藏层的全连接ANN，一个epoch的训练计算成本为 $\mathcal{O}(I_{ann} \times H)$，其中
    $\mathcal{O}$ 表示计算操作数量的数量级[35]。如果有多个隐藏层，对于每个具有 $H_i$ 个神经元的层 $i$，将增加 $\mathcal{O}(H_{i-1}
    \times H_i)$ 的计算负载。训练CNN $E$ 个epoch，计算成本乘以 $E$。此外，如果样本集中使用了 $N$ 个输入矩阵，成本还必须乘以
    $N$。


    在实际应用中，通常在CNN中使用几个连续的CL-PL对，以提高其预测能力并在馈入ANN之前降低矩阵维度，每个额外的CL-PL对通常使用比前一对多一倍的滤波器，从而将矩阵大小减少
    $\mathcal{O}(1/s_{pl})$ 的数量级，同时将输出矩阵数量增加 $\mathcal{O}(f_{cl})$。有几种机制用于减少神经网络中的矩阵大小，例如嵌入层（参见第10章第10.5节）。在附录C中，我们使用数值示例介绍了CNN的训练步骤。我们建议读者研究CNN训练过程，以理解其计算成本。


    现在让我们给出一个简单的数值示例，以检查训练CNN所需的操作数量。假设使用大小为 $(3 \times 1000 \times 1000)$ 的图像来训练一个具有3个CL-PL对的CNN。根据公式(7.1)，第一个CL（我们称之为CL-1），使用
    $F = 20$ 个滤波器，每个大小为 $f_{cl} = 5$，生成20个输出矩阵，每个大小为 $(996 \times 996)$。根据公式(7.2)，对于第一个PL（我们称之为PL-1），使用池大小
    $p = 3$ 和步幅 $s = 3$，输出将是20个矩阵，每个大小为 $(332 \times 332)$。在CL-2，假设有 $F = 35$ 个滤波器，每个大小为
    $f_{cl} = 5$。使用PL-1的输出，CL-2生成35个输出矩阵，每个大小为 $(328 \times 328)$。相应地，PL-2，池大小 $p
    = 3$ 和步幅 $s = 3$，生成35个输出矩阵，每个大小为 $(109 \times 109)$。类似地，CL-3，使用 $F = 50$ 个滤波器，每个大小为
    $f_{cl} = 5$，生成50个输出矩阵，每个大小为 $(105 \times 105)$。PL-3，池大小 $p = 3$ 和步幅 $s = 3$，生成50个输出矩阵，每个大小为
    $(35 \times 35)$。此时，输出被馈入UL，UL将展开矩阵并生成大小为 $(61\,250 \times 1 \times 1)$ 的ANN输入。假设全连接ANN有三个隐藏层，每层有1000个神经元。在这种情况下，ANN训练前向传播的操作数量为


    $T_{cnn} = (61\,250 \times 1000) + (1000 \times 1000) + (1000 \times 1000) + (1000
    \times L) \approx 63M,$


    其中 $L$ 是CNN输出的数量（在总量中微不足道，这就是为什么在估计中未显示）。通过反向传播，操作数量加倍至约 $126M$。对于典型的ANN训练，$E
    = 1000$ 个epoch，单个输入图像的总成本为 $126B$ 次操作。如果中等规模的样本集中有10000张图像，训练成本总计达到一千万亿次操作：$T_{cnn}
    = \mathcal{O}(10^{15})$。图7.21说明了此示例。


    如果使用更大的图像、更多的CL-PL层对、具有更多epoch的ANN隐藏层，成本可能会高得多。根据应用程序的具体要求，数据科学家和领域专家应在这些参数之间找到最佳平衡。我们在此给出这个数值示例的目的，是为了强调这样一个事实：如果不特别注意每个CNN层的特性，训练CNN的计算成本很容易变得高得令人望而却步。'

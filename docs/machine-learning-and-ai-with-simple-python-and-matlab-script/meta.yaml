    $$a^{(2)} = f(Z^{(2)}) = \begin{bmatrix} 7 & 0 & 0 \\ 0 & 13 & 4 \\ 0 & 26 & 8
    \end{bmatrix}.$$


    使用上面的 $a^{(2)}$，可以计算 $Z^{(3)}$ 如下：


    $$Z^{(3)} = a^{(2)} \cdot W^{(2)} = \begin{bmatrix} 7 & 0 & 0 \\ 0 & 13 & 4 \\
    0 & 26 & 8 \end{bmatrix} \cdot \begin{bmatrix} -1 \\ 1 \\ 2 \end{bmatrix} = \begin{bmatrix}
    -7 \\ 21 \\ 42 \end{bmatrix}.$$


    那么，使用线性整流激活函数的 ANN 输出将是（注意，由于输出是成绩，不允许负值，因此线性整流激活是可接受的）：


    $$\hat{y} = f(Z^{(3)}) = \begin{bmatrix} 0 \\ 21 \\ 42 \end{bmatrix}.$$


    本次迭代的误差 $J$ 是真实输出值与计算输出值之差的平方的一半：


    $$J = \sum \frac{1}{2}(y - \hat{y})^2 = \frac{1}{2}((75 - 0)^2 + (82 - 21)^2 +
    (93 - 42)^2) = 5974. \tag{3.4}$$


    ## 3.5.3 反向传播


    现在让我们从输出层开始执行反向传播。使用第 2.6.3 节公式 (2.13) 中 $\delta^{(3)}$ 的定义，我们有


    $$\delta^{(3)} = -(y - \hat{y}) * f''(Z^{(3)}) = -\begin{bmatrix} 75 \\ 61 \\
    51 \end{bmatrix} * \begin{bmatrix} 0 \\ 1 \\ 1 \end{bmatrix} = \begin{bmatrix}
    0 \\ -61 \\ -51 \end{bmatrix},$$


    其中 $\cdot *$ 表示逐元素乘法。根据第 2.6.3 节公式 (2.15) 中 $\delta^{(2)}$ 的定义，我们有


    $$\delta^{(2)} = \delta^{(3)} \cdot W^{(2)\dagger} \cdot * f(Z^{(2)}) = \begin{bmatrix}
    0 \\ -61 \\ -51 \end{bmatrix} \cdot [-1 \ -1 \ 2] \cdot * \begin{bmatrix} 1 &
    0 & 0 \\ 0 & 1 & 1 \\ 0 & 1 & 1 \end{bmatrix}$$

    $$= \begin{bmatrix} 0 & 0 & 0 \\ 61 & -61 & -122 \\ 51 & -51 & -102 \end{bmatrix}
    \cdot * \begin{bmatrix} 1 & 0 & 0 \\ 0 & 1 & 1 \\ 0 & 1 & 1 \end{bmatrix} = \begin{bmatrix}
    0 & 0 & 0 \\ 0 & -61 & -122 \\ 0 & -51 & -102 \end{bmatrix}.$$


    使用公式 (2.14)，我们有


    $$\frac{\partial J}{\partial W^{(2)}} = a^{(2)\dagger} \cdot \delta^{(3)} = \begin{bmatrix}
    7 & 0 & 0 \\ 0 & 13 & 26 \\ 0 & 4 & 8 \end{bmatrix} \cdot \begin{bmatrix} 0 \\
    -61 \\ -51 \end{bmatrix} = \begin{bmatrix} 0 \\ -2119 \\ -652 \end{bmatrix},$$


    其中 $\dagger$ 表示矩阵转置操作。根据公式 (2.16)，我们有


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \cdot \delta^{(2)} = \begin{bmatrix}
    3 & 5 & 10 \\ 5 & 1 & 2 \end{bmatrix} \cdot \begin{bmatrix} 0 & 0 & 0 \\ 61 &
    -61 & -122 \\ 51 & -51 & -102 \end{bmatrix} = \begin{bmatrix} 0 & -815 & -1630
    \\ 0 & -163 & -326 \end{bmatrix}.$$


    ## 3.5.4 更新权重


    设学习率为 $\alpha = 0.001$，其中 $\alpha$ 是一个用户定义的参数，用于指示权重应修改的速度。以 $\alpha$ 的速率更新权重被称为*学习*。$\alpha$
    值越高，学习越快，但由于采取更大的修改步长，可能容易出错。另一方面，较小的 $\alpha$ 值收敛到可接受解的速度较慢，因此会增加训练成本。根据公式 (2.17)，我们有


    $$W_{new}^{(1)} = W^{(1)} - \alpha \frac{\partial J}{\partial W^{(1)}} = \begin{bmatrix}
    -1 & 3 & -1 \\ 2 & -2 & -1 \end{bmatrix} - 0.001 \begin{bmatrix} 0 & -815 & -1630
    \\ 0 & -163 & -326 \end{bmatrix}$$

    $$= \begin{bmatrix} -1 & 3.8 & 2.6 \\ 2 & -1.8 & -0.7 \end{bmatrix}$$


    $$W_{new}^{(2)} = W^{(2)} - \alpha \frac{\partial J}{\partial W^{(2)}} = \begin{bmatrix}
    -1 \\ 1 \\ 2 \end{bmatrix} - 0.001 \begin{bmatrix} 0 \\ -2119 \\ -652 \end{bmatrix}
    = \begin{bmatrix} -1 \\ 3.1 \\ 2.7 \end{bmatrix},$$


    其中等式左侧的下标 *new* 表示权重的更新值。


    ## 3.5.5 使用新权重进行前向传播


    现在让我们使用新权重执行一次新的前向传播：


    $$W^{(1)} = \begin{bmatrix} -1 & 3.8 & 2.6 \\ 2 & -1.8 & -0.7 \end{bmatrix} \quad
    W^{(2)} = \begin{bmatrix} -1 \\ 3.1 \\ 2.7 \end{bmatrix}$$'

  mdcn: '## 14.3 遗传算法的简单算法


    现在，让我们介绍遗传算法的基本操作，如图14.2所示：


    - **评估**：每个个体的优劣由适应度函数评估，该函数为个体分配一个数值，以便进行定量比较。

    - **选择**：根据预定标准，选择父代以生成后代（通常优先选择表现更优的个体）。

    - **繁殖**：使用选定的父代生成后代，并评估其适应度。

    - **替换**：比现有种群成员更适应的后代将取代那些表现较差的个体，从而形成新一代。


    在图14.3中，我们展示了实现简单遗传算法的伪代码[108]。首先，形成一个初始的候选解种群，其中染色体值是随机设置的。然后计算每个个体的适应度。根据适应度，选择父代，并通过交叉和变异操作形成后代。最后，评估后代是否可能被纳入下一代。


    这个过程会重复预定的迭代次数，或者直到找到满意的解为止。每当表现更优的后代被纳入种群时，就称为形成了新一代。有几种机制可以选择后代作为新一代的一部分。最受欢迎的选择机制包括轮盘赌选择，其中染色体的适应度水平表示其被选为下一代父代的机会；以及精英选择，其中最适应的个体未经修改直接进入下一代，同时通常保持精英群体与种群规模的比例较小。


    单点交叉操作在从两个父代染色体生成后代时很受欢迎，其中在两个父代中随机选择一个关键位点，并围绕该位点交换父代染色体之间的数据。要在两个父代之间执行单点交叉，每个父代的染色体长度为K位，首先选择一个随机整数CR
    ∈ (0, K − 1)。第一个子代通过取父代1的最高有效CR位和父代2的最低有效（K – CR）位创建。第二个子代通过取父代2的最高有效CR位和父代1的最低有效（K
    – CR）位创建。在图14.4所示的示例中，对两个父代执行了CR = 2的单点交叉，每个父代都有六位染色体，其中子代1的前两位来自父代2，后四位来自父代1，而子代2的前两位来自父代1，其余位来自父代2。


    在不同的遗传算法实现中，交叉操作可以使用多个点或两个以上的父代来实现。例如，在两个父代的*两点交叉*中，随机选择两个点CR₁和CR₂来交换父代染色体。图14.5展示了CR₁
    = 2和CR₂ = 4的两点交叉示例。与单点交叉相比，两点交叉更有利于保持种群中个体的多样性，从而更有效地探索搜索空间。


    变异被定义为一种遗传操作，它随机改变染色体中的一个或多个位。通过小概率或使用预定义的概率分布模型（例如高斯分布），变异为种群引入多样性，使候选解不会陷入局部极值点，而是充分探索搜索空间以寻找全局极值点。


    ## 14.4 遗传算法示例


    现在，让我们展示一个简单的例子来说明遗传算法的基本步骤。在图14.6中，我们看到一个由8个个体组成的种群，其染色体由12个密码子组成。在步骤1中，形成一个初始种群，个体的密码子值是随机选择的。在步骤2中，计算每个个体的适应度，用美元符号象征性表示。在此图中，我们假设个体拥有的美元符号越多，其适应度越高。在步骤3中，选择两个最适应的个体作为父代。在典型应用中，可能会选择多对父代在每一代生成多个子代。例如，可能会选择20%的个体作为父代，优先选择更适应的个体，如第14.3节所述。这三个步骤对应于图14.2中的评估和选择操作。


    现在，是时候从选定的父代生成后代了，如图14.7所示。通过CR = 4的单点交叉操作，生成了两个子代。对一个子代执行了变异操作（是否应用变异由变异概率决定，通常是一个较小的值），其密码子7（随机确定）被替换为一个随机值（密码子7原来是51，被改为22）。这些操作对应于图14.2中的繁殖操作。


    必须计算新生成子代的适应度，并决定它们是否将被纳入下一代，如图14.8所示。在这个简单的例子中，我们假设子代1和子代2的适应度值分别为2和5个美元符号。如图14.8的步骤6所示，两个子代都比种群中一些现有个体更适应。因此，这些子代被纳入新一代，而两个现有的表现不佳的个体（每个适应度为1个美元符号）被从种群中移除。这些操作在图14.2中表示为选择操作。


    此时，我们的简单例子有了新一代的个体（包含两个新成员）。图14.6至图14.8所示的步骤将在后续世代中重复，直到获得可接受的结果（例如，生成一个具有10个美元符号的个体）或达到预定的世代数上限（例如，20代）。


    ## 14.5 遗传算法的收敛性


    收敛性是一个指标，用于表明遗传算法从一代到下一代找到的解是否正在接近一个可接受且高质量的解。一个理想的结果是种群的最佳（或平均）适应度稳步提高。有时，由于问题设置不当，生物启发式方法可能找不到解。遗传算法不收敛的可能原因包括：


    - 染色体大小太小

    - 世代数不足

    - 种群规模太小

    - 适应度函数无法正确识别适应和不适应的个体

    - 遗传算法机制不适合解决此类问题


    | 个体 | 良好适应度 | 不良适应度 |

    | :--- | :--- | :--- |

    | 无人机移动的位置 | 无人机远离拥挤的社区 | 无人机停留在拥挤的社区 |

    | 买卖股票的价格 | 低买高卖（获利） | 高买低卖（亏损） |

    | 施加到端口的电压 | 电压在端口限制范围内 | 电压超出端口限制范围 |

    | 切割机器零件的角度 | 机器零件能安装到位 | 机器零件无法安装到位 |

    | 药物中的药物含量 | 药物有效 | 药物过强或过弱 |


    **图14.1** 适应度函数以及具有良好和不良适应度的个体示例。


    图14.1展示了各种适应度函数以及具有良好和不良适应度的个体示例。在第一个例子中，假设一个在无人机群中运行的无人机（无人驾驶飞行器或无人机）正在使用基于遗传算法的飞行控制算法来决定下一步移动到哪个位置。在这种情况下，染色体代表无人机可能移动到的位置。一个候选位置要具有良好的适应度值，它必须使无人机远离拥挤的无人机区域，但又不能使其与邻居断开连接。适应度差的位置会使无人机停留在其他无人机拥挤的区域，或者停留在没有邻居的孤立位置。在下一个例子中，染色体代表买卖金融股票的决策。一个卖出部分股票并买入其他股票，最终获利的候选解具有良好的适应度。一个在交易后亏损的解具有不良适应度。利润的大小代表了在多个良好解中解的优劣程度（即，获利最多的候选解是最好的）。同样，在最后一个例子中，遗传算法用于决定给患者使用多少抗癌药物。如果一个候选解导致肿瘤缩小，它就具有良好的适应度。缩小的程度可能是决定哪些解比其他解更好的标准之一。'

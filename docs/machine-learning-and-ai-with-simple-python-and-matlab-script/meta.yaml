    can also be assigned decimal values as shown for the biases in Figure 7.6. Note
    that the size of a CL filter has to be smaller than the input matrix over which
    it will operate. In the example below, a filter of $(2 \times 2)$ is defined to
    operate over a $(4 \times 4)$ image. There may be multiple filters defined for
    a CL. Each filter corresponds to a feature that image may contain (e.g. the ears
    or eyes of a cat). If there are multiple CLs, there will be separate unique filters
    for each CL. For each CL filter, there is a bias, whose value is also initialized
    randomly. One may consider the CL filters as equivalent to weights in an ANN.
    As CNN training progresses through forward and backpropagation, the initial random
    filter shapes are updated to identify key features of an input image.


    Let us now consider the sample input with a size of $(4 \times 4)$ shown in Figure
    7.7. The goal of the example CNN is to classify its input as an **X** or an **O**.
    The input image shown in Figure 7.7 should be classified by the CNN as a circle
    since it looks more like an **O** than an **X**.


    **Convolution layer with Filter 1:** Figures 7.8 and 7.9 illustrate the steps
    of convolution when Filter 1 is convolved with the input image given in Figure
    7.7. At each step, the numerical contents of Filter 1 are multiplied with the
    contents of the corresponding image pixels. Since the size of Filter 1 is (2 ×
    2) and it is convolved with a (4 × 4) image, there are a total of 9 steps to complete
    the convolution with Filter 1, as shown in Figures 7.8 and 7.9.


    **Convolution layer with Filter 2:** Convolution of the input image given in Figure
    7.7 with the elements of Filter 2 are shown in Figures 7.10 and 7.11. Similar
    to the case of Filter 1, there are 9 steps for this operation since Filter 2 of
    size (2 × 2) convolves with a (4 × 4) image.


    **RELU operations:** After CL operations are complete, the resulting matrix has
    smaller dimensions. Reduction in dimensions after CL operations depends on the
    dimensions of the filters. For this example, CL generates convolution matrices,
    called $C_1$ and $C_2$, whose elements are results of convolutions performed using
    Filters 1 and 2, respectively. The dimensions of the input matrix are (4 × 4),
    whereas the $C_1$ and $C_2$ matrices have dimensions of (3 × 3) since CL uses
    two filters with dimensions of (2 × 2). Elements of $C_1$ correspond to the results
    of the convolution operations shown in Figures 7.8 and 7.9. Similarly, the elements
    of $C_2$ are generated by the convolution operations shown in Figures 7.10 and
    7.11. RELU first replaces the negative-valued elements in $C_1$ and $C_2$ by zero,
    generating $f(C_1)$ and $f(C_2)$, respectively, as shown in Figure 7.12b. It then
    normalizes them by dividing each element by the number of elements used in the

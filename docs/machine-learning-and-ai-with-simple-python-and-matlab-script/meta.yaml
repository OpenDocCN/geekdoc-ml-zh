    \n## 18.4 文法进化\n\n文法进化（GE）是一种强大的技术，用于生成解决方案为计算机程序的问题。与任何编程语言一样，GE要求为可接受的解决方案定义一种语法，该语法针对每个应用是特定的。GE生成的程序可以使用任何标准编程语言实现。GE是一个强大的人工智能工具，特别是在需要考虑大量参数（每个参数都有自己的搜索空间）才能得出解决方案的问题中。一个GE应用的例子是为自动驾驶车辆设计有效的自动驾驶协议，其中需要评估数百个具有不同参数值的输入变量，以便实时做出安全决策。\n\
    \n### 18.4.1 GE的一个简单算法\n\n图18.16展示了实现GE的一个简单算法。在此算法中，首先创建一个由随机选择的候选解组成的初始种群。这一步骤在大多数基于进化的计算技术（如GA、PSO和DE）中是常见的。候选解由染色体表示，染色体由一系列密码子数组成。程序使用个体的密码子值和为此应用定义的语言规则生成。在GE中，使用巴科斯-诺尔范式（BNF）[148,\
    \ 149]来定义一组规则，以描述当前应用的语法。基于BNF规则从给定染色体推导程序的过程将在下一节描述。\n\n一旦从染色体推导出程序，就必须计算其适应度值。由于解决方案是一个程序，因此必须有一个媒介让该程序执行并为应用生成结果。与其他进化方法类似，根据候选解的表现，将为其分配一个适应度值。例如，如果候选程序用于算法交易应用，它将在历史金融数据上执行。适应度可以是候选程序在一段时间内产生的利润。图18.16中的GE实现使用了传统GA中常见的标准选择、交叉和变异操作，以促进更适应的个体从一代传递到下一代。进化操作重复进行，直到找到满意的解决方案或达到停止标准。\n\
    \n```\ninitialize population; // random population;\nfor each individual in population\
    \ do\n    generate candidate solution using BNF rules;\n    evaluate fitness of\
    \ candidate;\nend for\n\nwhile (EndCriteria == false)\n{\n    select parents for\
    \ reproduction;\n        // typically among the fittest\n        // individuals\
    \ are selected\n        // as parents;\n    generate offspring by crossover and\
    \ mutation;\n    generate candidate solution using BNF rules;\n    evaluate offspring\
    \ and form new generation;\n        // offspring replaces less fit\n        //\
    \ members of the population (if any)\n}\n```\n\n**图18.16** 用于PSO的基准测试函数Rosenbrock函数。\n\
    \n### 18.4.2 GE的定义\n\n由于GE中的解决方案是计算机程序，因此每个特定应用都需要一个定义可接受程序的有效语法的语法。在BNF中，编程语言的语法由一个元组\
    \ {N, T, P, S} 给出，其中 N 是非终结符变量的集合，T 是终结符（例如，数字或布尔变量值等字面符号），P 是一组产生式规则，S ∈ N 是开始符号\
    \ [148]。P 中的每条规则都使用元符号 ::= 来定义如何扩展非终结符。在产生式规则中，符号“|”分隔非终结符的替代定义。一对符号 < 和 > 分别定义非终结符的开始和结束。N\
    \ 的元素通过一系列规则映射到 T。在这些规则中，N 的一个元素可以出现在规则的左侧或右侧。然而，终结符不能出现在左侧"

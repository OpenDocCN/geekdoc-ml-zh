    # 4.5 A Simple ANN for Algorithmic Stock Trading


    ANNs are perfect candidates for predicting stock prices based on historical data
    recorded during trading hours over long periods of time (typically in the order
    of years or decades). Recorded trading information includes many useful metrics,
    such as daily opening and closing prices, minimum and maximum buy and sell prices,
    and volume, recorded over all functioning financial markets. This information
    is referred to as tick data since it was recorded using ticker tapes in the old
    days of trading in the early twentieth century using wired connections between
    stock exchange buildings and trading houses [51]. Tick data also includes timestamp
    information for each bid (i.e., the highest price a buyer is willing to pay for
    an asset) and ask (i.e., the lowest price a seller is willing to accept), typically
    for every minute of a trading day.


    In utilizing an ANN for algorithmic trading, a popular approach is to employ a
    set of technical indicators computed up to a selected day t as the ANN inputs,
    whereas output(s) may be selected as prediction(s) about this financial asset
    for the following day t + 1 (or the next hour if computed hourly, etc.). During
    training, the selected technical indicators are computed for day t as inputs with
    a corresponding sample output computed from the tick data. For example, if the
    ANN output is selected as percentage change in stock price, the sample output
    for day t is x percent if the closing price from day t to day t + 1 was recorded
    as an increase by x percent. Similarly, if the stock lost its value by x percent
    at day t + 1, the output for this sample will be −x percent. Training continues
    with the samples obtained from historical tick data recorded for a selected period
    of several years or decades. Once the training is over, the ANN is ready to be
    used for predictions to buy, sell or hold this stock until a new model is trained
    in the future.


    # 4.5.1 ANN Inputs and Outputs


    In this section we introduce a simplistic ANN to be used for our algorithmic trading
    example, where the inputs are a set of technical indicators calculated for user-defined
    periods (i.e., hyper-parameter values), and the ANN output is the predicted movement
    of the price. For this example, we utilize four technical indicators as ANN inputs,
    namely, M, SMA, EMA and BB, computed for the closing price of a given stock (or
    group of stocks) up to day t. We define prediction of percentage change in stock
    price on day t + 1 as the output of the ANN. After an architecture is defined
    (i.e., the number of hidden layers and the number of neurons at each layer, activation
    function assignments, and so on), the ANN is trained using technical indicators
    computed based on the historical tick data.


    Typically, a professional stock trader makes the final policy decisions with the
    help of the predictions generated by the ANN. For example, as discussed in Section
    4.4, if a decrease in price is predicted, it may trigger a sell signal, whereas
    a predicted price increase may suggest a buy signal. In real-life situations,
    however, a trader may also have other inputs to consider which are not defined
    as ANN inputs (e.g., upcoming elections, economic strength, state of the housing
    market,'
  - '[PAGE 79]


    unemployment rate, natural disasters) before making policy decisions. For such
    cases, the ANN provides enhanced clarity through its predictions based on various
    technical indicators.


    Back-testing is a method that helps in determining an optimal combination of technical
    indicators and hyper-parameters for an ANN. Suppose a trader wishes to use the
    tick data covering five years of trading information. The ANN designer may choose
    the data from the first four years to train and the data from the last year to
    test whether the trained ANN performance is acceptable. In this case, once the
    ANN weights are updated properly over a chosen number of epochs with the data
    from years 1 through 4, performance of the trained ANN is tested using the data
    from year 5. This is called back-testing, which measures the accuracy of the ANN
    predictions as if it were executing algorithmic trading instructions during year
    5. If back-testing results are not satisfactory, the designers modify ANN components
    until an acceptable combination of architecture, inputs with proper hyper-parameter
    values, meaningful outputs, number of epochs to train over and other similar aspects
    are determined. Dividing the historical tick data between training and back-testing
    is a trade-off that the designers must tackle for the specific market conditions
    under which they are operating. For some applications, the ANN is trained daily,
    whereas for other markets ANNs trained a few times a year are preferred. In summary,
    to engage an ANN for algorithmic trading, at minimum, the following steps should
    be performed:


    +   - Select technical indicators and/or other variables to be used as ANN inputs
    (e.g., M, SMA, EMA and BB, interest rates, unemployment rate).

    - Define hyper-parameter values for the selected technical indicators (e.g., SMA
    (5), EMA (20), the latest interest rates averaged over last two quarters).

    - Define an ANN architecture (i.e., number of layers, number of neurons per layer,
    connections between layers, activation functions, etc.).

    - Split the historical data for training and back-testing.

    - Determine or compute the ANN inputs and corresponding outputs for each training
    day using the training portion of the historical data.

    - Train the ANN by applying the inputs, computing the errors in its output and
    updating the weights for a pre-determined number of epochs.

    - Using the back-testing portion of historical data, measure the ANN’s performance.

    - Based on the back-testing results, if needed, modify the ANN architecture as
    well as the selection of ANN inputs and outputs and repeat the above steps until
    a satisfactory performance is obtained.

    - Once the ANN is trained properly, it is ready to be used in the field: new inputs
    are provided using the latest information to obtain predictions.


    # 4.5.2 ANN Architecture


    For the simplistic ANN architecture used in this chapter, as shown in Figure 4.7,
    we define four inputs, namely M, SMA, EMA and BB, and one output as the percentage
    change in price for the following day. Note that W and B in the figure are the
    weight matrices and the bias vector defined in Chapter 3. In this simplistic ANN,
    there are two hidden layers with four and three neurons, respectively. The ANN
    is fully connected. A sample of the tick data used for training this ANN is shown
    in Figure 4.8, which contains daily opening, highest, lowest, closing and adjusted
    closing prices (i.e., the closing price re-computed after the trading day ends
    to reflect actions on the stock price, such as paying dividends, stock splitting,
    etc. [51]) and volume (i.e., the number of units sold and bought) for the selected
    example of Microsoft stock.'

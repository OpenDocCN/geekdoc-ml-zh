    # 16.5 Python Script for UAV Flight Control Using a GA


    In this section we present a sample implementation of a Python script for UAV
    flight control. Because this Python script runs on a single-board computer, we
    assumed that a swarm operation with multiple, independent and autonomous UAVs
    can be simulated as follows. A UAV runs an FGA using its near neighbour information
    to compute a new position, but it will not move there until all other UAVs complete
    their own computations. After all UAVs compute their next locations to move, we
    assume they all move to these new locations simultaneously. This will constitute
    the first step of the simulation experiment. Then, again one by one they run the
    FGA to compute the next position based on new neighbour information and will move
    to their respective new positions at the end of the second step of the simulation
    experiment. The number of steps is a variable defined by the user.


    This lock-step implementation without any inter-UAV communication is a rough approximation
    of the parallel and independent computation that takes place in real-life drones.
    However, it demonstrates that the FGA may be a promising candidate in providing
    a uniform distribution of swarm members. More advanced readers are encouraged
    to implement an FGA using threads [121] and separate near neighbour tables for
    each UAV, which will be one step closer to a more realistic implementation.



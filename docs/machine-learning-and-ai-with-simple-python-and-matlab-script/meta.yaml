    # 8.6 Concluding Remarks


    In this chapter, we introduce a CNN for the OCR class of problems, where a set
    of input image samples are used to train a CNN. OCR is widely used in applications
    such as postal automation, capturing licence plate numbers, conversion of physical
    documents to editable text files and assistance for the blind and visually impaired.
    We cannot employ ANNs for OCR applications since they would be overwhelmed if
    multi-dimensional images with high pixel counts were directly fed into them, which
    makes CNNs the most suitable AI tools for OCR applications. A CNN architecture
    designed for OCR contains multiple CL-PL pairs to improve prediction capabilities.
    The designers have to be mindful of the computational cost of training when constructing
    a CNN topology since, especially with a high number of samples, it could easily
    make a realistic project infeasibly expensive.



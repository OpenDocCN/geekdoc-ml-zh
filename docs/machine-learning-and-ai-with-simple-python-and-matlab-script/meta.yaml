- md: '## 4 ANNs for Financial Stock Trading


    ## 4.1 Introduction


    The use of computer programs to conduct transactions involving financial securities
    such as stocks and bonds is referred to as `algorithmic trading`. Within this
    realm, decisions to buy, sell or hold a diverse set of securities are performed
    in either autonomous or semi-autonomous fashion, depending on how comfortable
    a user is in surrendering control to algorithms.


    The clearest advantage of algorithmic trading is its ability to make trading decisions
    by taking into account a large number of factors, including analysis of many years
    of historical trading data; outside sources, such as media reports, speeches given
    by leaders and daily events; and many other inputs influencing trading decisions.
    Traditional stock traders, no matter how intelligent and experienced they may
    be, cannot handle such large quantities of information optimally. In current financial
    markets, over 60% of the traded volume utilizes some form of algorithmic trading
    mechanism. This volume is expected to increase as AI-based tools developed for
    algorithmic trading become more sophisticated over time.


    ## 4.2 Programs that Buy and Sell Stocks


    Finance applications played an important role in the development of various AI
    methods. The trading rooms in the New York Stock Exchange from the “old days”
    have been replaced with the display screens of remote computers (Figure 4.1).


    So-called quants are designers of quantitative analysis and trading algorithms.
    They are typically engineers and physicists with mathematical and algorithm backgrounds
    combined with finance training.


    ## 4.3 Technical Indicators


    Algorithmic trading programs typically make their trading decisions by observing
    so-called `technical indicators`, which are mathematical formulations derived
    from historical trading data such as price and volume. Technical indicators are
    useful tools to help identify any patterns that may be hidden in historical data
    [39]. In this chapter we include the most commonly used indicators, namely momentum,
    different types of moving averages and Bollinger bands. Although not described
    here due to space restrictions, stochastic oscillator [40], rate of change [41],
    on-balance volume [42] and Williams %R [43] are among the popular technical indicators.
    An interested reader can find many other technical indicators employed in algorithmic
    trading in [44].


    **Figure 4.1** NYSE trading floor: (a) when trading was done by stock brokers
    (Carol M. Highsmith / The Library of Congress / Public domain), and (b) after
    deployment of algorithmic trading by computers (Nicky Pe / Public Domain Pictures).


    ### 4.3.1 Simple Moving Average


    One of the most popular technical indicators, simple moving average (SMA), is
    defined as the average price of a stock over a fixed time window of days, weeks
    or years. SMA is useful in smoothing out small fluctuations in price by essentially
    reducing the noise over a selected period of time. Figure 4.2 (taken from [45])
    shows daily stock price movements for S&P 500 stocks and the corresponding SMA
    calculated for a 10-month period. As can be seen, fluctuations are eliminated
    by SMA, and it is much easier to detect trends over time on an SMA curve. Calculation
    of an $n$-day SMA on day $t$ is defined as


    $$\text{SMA}(t) = \frac{1}{n} \sum_{i=0}^{n-1} \text{price}(t-i),$$


    where the price of a stock is averaged over the last $n$ days. For example, a
    30-day SMA of a stock for a given day $t$ is the sum of the closing prices from
    day $t$ to day $(t-30)$ divided by 30. The SMA can be computed for any of the
    financial features of a security (e.g., SMA of opening, closing, maximum or minimum
    price or daily volume).


    **Figure 4.2** SMA smooths out fluctuations in daily stock movements.


    ### 4.3.2 Momentum


    The rate of change in a financial asset feature (e.g., price or volume) over a
    given time interval is defined as the momentum. This metric is used to determine
    the strength of a trend for a given stock over a selected time period. The momentum
    of two separate points in time is the slope of a line that connects them. Calculation
    of momentum on day $t$ over a period of $n$ days is defined as:


    $$M(t) = \frac{\text{price}(t)}{\text{price}(t-n)},$$


    where $M(t)$ is the momentum at day $t$. Selecting the most appropriate period
    of $n$ days to compute momentum for a given financial asset is an important decision
    for a financial professional since it may give different trends for short, medium
    or large intervals.


    A 10-day momentum is shown for the S&P 500 Index in Figure 4.3 (taken from [46]).
    If the most recent closing price of the index is more than the closing price 10
    trading days ago (i.e., $M(t) > 1$), a positive number is plotted above the zero
    line. Similarly, if the latest closing price is lower than what it was 10 days
    ago (i.e., $M(t) < 1$), a negative measurement is plotted below the zero line.
    The zero line represents the index that does not exhibit a trend.


    **Figure 4.3** Momentum of price movements of S&P 500 Index (taken from [46]).


    ### 4.3.3 Exponential Moving Average


    Similar to an SMA, the `exponential moving average` (EMA) is the average price
    of a stock over a fixed window of days such that the most recent prices are weighted
    more than the older ones in the calculation [47]. To recursively compute an $n$-day
    EMA on day $t$, a percentage of the price for a day is added to the EMA of the
    previous day for $n$ days as follows:


    $$EMA(t) = price(t) \cdot \frac{2}{(n+1)} - EMA(t-1) \cdot \left(1 - \frac{2}{(n+1)}\right),$$


    where $2/(n+1)$ is called the `cooling` period. In a period of $n$ days, when
    calculating the EMA for the earliest day (let us call it $t_0$), the SMA for day
    $t_0$ is used:


    $$EMA(t_0) = SMA(t_0).$$


    The result of the EMA is similar to that of the SMA, except that the older days
    have less impact on the outcome. Thus, in theory, the EMA will have less delay
    in reflecting the latest stock movements compared to the SMA (Figure 4.4) – since
    the EMA applies more weight to current data, it follows prices more closely than
    a corresponding SMA. However, one has to be aware that the EMA may be overly sensitive
    to price changes compared to a comparable SMA. During trading, if the EMA rises
    when prices go below the EMA, this may trigger a buy `signal` (i.e., an indication
    generated by an algorithmic trading system that a user should buy this particular
    stock). Similarly, if the EMA falls when prices are above the EMA, a sell signal
    may be generated.


    ### 4.3.4 Bollinger Bands


    A pair of curves calculated for a given stock based on two standard deviations
    above and below the SMA are referred to as `Bollinger bands` (BBs) [48]. The main
    idea for using BBs is that the price for a non-volatile stock will typically stay
    within the limits of the BBs. If an asset price moves out of the BBs, it is expected
    to return back into the BB range. This expectation may be a useful guide in dictating
    buy or sell decisions for a given stock.


    For example, if an asset price goes above the BB, this does not necessarily indicate
    a buy signal since it is expected that it will soon return into its BB. Similarly,
    a stock price falling below its BB may not trigger an automatic sell signal since
    it is expected to rise up into its BB again (Figure 4.5). For a given day t, BB
    is computed as follows:


    $$BB(t) = \pm \frac{price(t) - SMA(t)}{2 \cdot \sigma(t)}$$


    where σ stands for the standard deviation of price changes during the same period
    of n days. Typical values for a short-term BB is a 10-day SMA and a band of (±1.5
    · σ), whereas a long-term BB uses a 20-day SMA and a band of (±2.5 · σ) [49].


    **Figure 4.5** Bollinger bands for a fictitious stock computed using 20-day SMA
    and 2 σ (taken from [49] / FMR LLC).


    ## 4.4 A Simple Algorithmic Trading Policy


    Technical indicators can be used in determining an `algorithmic trading policy`,
    by which decisions are made to buy, sell or hold a given stock. The first step
    of employing technical indicators is to define their parameters, which are referred
    to as `hyper-parameters`. For M, the hyper-parameter is the time range used to
    compute its slope, whereas for the SMA and EMA, it is the time range over which
    the SMA and EMA are to be calculated. For BBs, the hyper-parameters are the time
    range for the SMA and the number of standard deviations the bands are away from
    the SMA. Selection of hyper-parameter values to be used in technical indicators
    is a formidable and non-trivial challenge in algorithmic trading.


    An overly simplified example of using the SMA in algorithmic trading can be constructed
    as follows. For a given stock, whenever a short-term SMA (e.g., 50 days) crosses
    above a long-term SMA (e.g., 200 days), a `price increase trend` is detected.
    With the expectation that this'
  mdcn: '## 4 用于金融股票交易的人工神经网络


    ## 4.1 引言


    使用计算机程序进行涉及股票和债券等金融证券的交易被称为`算法交易`。在此领域内，对多种证券的买卖或持有决策，会根据用户对将控制权交给算法的接受程度，以自主或半自主的方式执行。


    算法交易最明显的优势在于，它能够通过考虑大量因素来做出交易决策，这些因素包括对多年历史交易数据的分析；外部来源，如媒体报道、领导人讲话和日常事件；以及许多其他影响交易决策的输入。传统的股票交易员，无论多么聪明和经验丰富，都无法最优地处理如此大量的信息。在当前金融市场中，超过60%的交易量使用了某种形式的算法交易机制。随着为算法交易开发的基于人工智能的工具日益成熟，这一交易量预计将会增加。


    ## 4.2 买卖股票的程序


    金融应用在各种人工智能方法的发展中扮演了重要角色。纽约证券交易所“旧时代”的交易大厅已被远程计算机的显示屏所取代（图4.1）。


    所谓的量化分析师是量化分析和交易算法的设计者。他们通常是具有数学和算法背景，并结合了金融培训的工程师和物理学家。


    ## 4.3 技术指标


    算法交易程序通常通过观察所谓的`技术指标`来做出交易决策，这些指标是从历史交易数据（如价格和成交量）中推导出的数学公式。技术指标是帮助识别可能隐藏在历史数据中的任何模式的有用工具[39]。在本章中，我们包含了最常用的指标，即动量、不同类型的移动平均线和布林带。尽管由于篇幅限制未在此描述，但随机振荡器[40]、变化率[41]、平衡成交量[42]和威廉指标%R[43]也是流行的技术指标。感兴趣的读者可以在[44]中找到算法交易中使用的许多其他技术指标。


    **图4.1** 纽约证券交易所交易大厅：(a) 交易由股票经纪人完成时（Carol M. Highsmith / 美国国会图书馆 / 公共领域），以及 (b)
    计算机部署算法交易后（Nicky Pe / 公共领域图片）。


    ### 4.3.1 简单移动平均线


    最受欢迎的技术指标之一，简单移动平均线（SMA），定义为股票在固定时间窗口（天、周或年）内的平均价格。SMA通过基本上减少选定时间段内的噪声，有助于平滑价格的小幅波动。图4.2（取自[45]）显示了标普500指数股票的每日价格走势以及为10个月期间计算的相应SMA。可以看出，SMA消除了波动，并且在SMA曲线上更容易检测随时间变化的趋势。在第$t$天计算$n$日SMA定义为：


    $$\text{SMA}(t) = \frac{1}{n} \sum_{i=0}^{n-1} \text{price}(t-i),$$


    其中股票价格是过去$n$天的平均值。例如，给定某天$t$的股票30日SMA是从第$t$天到第$(t-30)$天的收盘价之和除以30。SMA可以针对证券的任何金融特征计算（例如，开盘价、收盘价、最高价或最低价或每日成交量的SMA）。


    **图4.2** SMA平滑了每日股票走势中的波动。


    ### 4.3.2 动量


    金融资产特征（例如价格或成交量）在给定时间间隔内的变化率被定义为动量。该指标用于确定给定股票在选定时间段内的趋势强度。两个不同时间点的动量是连接它们的直线的斜率。在第$t$天计算$n$天期间的动量定义为：


    $$M(t) = \frac{\text{price}(t)}{\text{price}(t-n)},$$


    其中$M(t)$是第$t$天的动量。为给定金融资产选择最合适的$n$天周期来计算动量，对金融专业人士来说是一个重要的决定，因为它可能对短期、中期或长期区间给出不同的趋势。


    图4.3（取自[46]）显示了标普500指数的10日动量。如果指数的最新收盘价高于10个交易日前的收盘价（即$M(t) > 1$），则在零线上方绘制一个正数。类似地，如果最新收盘价低于10天前的收盘价（即$M(t)
    < 1$），则在零线下方绘制一个负值。零线代表没有表现出趋势的指数。


    **图4.3** 标普500指数价格走势的动量（取自[46]）。


    ### 4.3.3 指数移动平均线


    与SMA类似，`指数移动平均线`（EMA）是股票在固定天数窗口内的平均价格，但在计算中，最近的价格比旧的价格权重更大[47]。为了递归计算第$t$天的$n$日EMA，将一天价格的百分比加到前一天的EMA上，持续$n$天，如下所示：


    $$EMA(t) = price(t) \cdot \frac{2}{(n+1)} - EMA(t-1) \cdot \left(1 - \frac{2}{(n+1)}\right),$$


    其中$2/(n+1)$被称为`冷却`周期。在$n$天的周期内，当计算最早一天（我们称之为$t_0$）的EMA时，使用第$t_0$天的SMA：


    $$EMA(t_0) = SMA(t_0).$$


    EMA的结果与SMA相似，只是旧日期对结果的影响较小。因此，理论上，EMA在反映最新股票走势方面比SMA延迟更少（图4.4）——因为EMA对当前数据应用了更大的权重，它比相应的SMA更紧密地跟随价格。然而，必须意识到，与可比的SMA相比，EMA可能对价格变化过于敏感。在交易中，如果当价格跌破EMA时EMA上升，这可能会触发买入`信号`（即，由算法交易系统生成的用户应购买该特定股票的指示）。类似地，如果当价格高于EMA时EMA下降，则可能生成卖出信号。


    ### 4.3.4 布林带


    基于SMA上下两个标准差为给定股票计算的一对曲线被称为`布林带`（BBs）[48]。使用BBs的主要思想是，非波动性股票的价格通常会保持在BBs的范围内。如果资产价格移出BBs，预计它会返回到BB范围内。这一预期可能是指导给定股票买卖决策的有用指南。


    例如，如果资产价格高于BB，这并不一定表示买入信号，因为预计它很快会返回到其BB内。同样，股票价格跌破其BB可能不会触发自动卖出信号，因为预计它会再次上涨到其BB内（图4.5）。对于给定的第t天，BB计算如下：


    $$BB(t) = \pm \frac{price(t) - SMA(t)}{2 \cdot \sigma(t)}$$


    其中σ代表同一n天期间内价格变化的标准差。短期BB的典型值是10日SMA和(±1.5 · σ)的带宽，而长期BB使用20日SMA和(±2.5 · σ)的带宽[49]。


    **图4.5** 使用20日SMA和2 σ计算的虚构股票的布林带（取自[49] / FMR LLC）。


    ## 4.4 一个简单的算法交易策略


    技术指标可用于确定`算法交易策略`，据此做出买卖或持有给定股票的决策。使用技术指标的第一步是定义它们的参数，这些参数被称为`超参数`。对于动量M，超参数是用于计算其斜率的时间范围，而对于SMA和EMA，它是计算SMA和EMA的时间范围。对于BBs，超参数是SMA的时间范围和带宽偏离SMA的标准差数量。在算法交易中，选择用于技术指标的超参数值是一个艰巨且非平凡的挑战。


    一个使用SMA进行算法交易的过度简化示例可以构建如下。对于给定的股票，每当短期SMA（例如50天）上穿长期SMA（例如200天）时，就检测到`价格上涨趋势`。预期这种'

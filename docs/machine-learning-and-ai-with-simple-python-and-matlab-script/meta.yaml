  md: 'In this chapter, we present a GA-based solution for the TSP which computes
    optimal routes (although not necessarily the absolute minimum-cost ones) in linear
    time using GAs. We show that this relatively simple transformation of the problem
    to the AI domain can be implemented using the library functions in Python and
    Matlab.


    # 17.2 Definition of the TSP


    An example of the TSP is presented in Figure 17.1a, where each red dot must be
    visited once with minimum total length of the cycle [124]. A possible solution
    is shown in Figure 17.1b. Another TSP example and one possible solution are shown
    in Figure 17.2 [125]. There are worldwide competitions among researchers for measuring
    the effectiveness of their TSP solutions. Examples include covering 24 978 cities
    and towns in Sweden and 15 112 in Germany (Figure 17.3) [124] and 3143 counties
    of the USA (a near-optimal length of 93 466 miles) (Figure 17.4) [126]. For these
    benchmarks, the length of the road between two cities is taken as the cost of
    the edge.


    Another simple example of TSP is shown in Figure 17.5, where a traveller starting
    in Detroit has to visit Chicago, Columbus and Indianapolis before returning to
    Detroit. The roads connecting



    # 9.2 A Simple CNN for Speech Recognition


    Since audio signals can be represented as digital information in a spectrogram,
    they can be used as inputs to a CNN. Similar methods to those used for character
    recognition by CNNs introduced in Chapter 8 can now be employed for speech recognition.
    The CNN in this example reads a spectrogram image of a spoken word with size (1
    × 40 × 198) and identifies the spoken word input as one of the stored reference
    audio files. Similar to the example CNN presented in Chapter 8 for OCR applications,
    multiple CL–PL pairs are employed for speech recognition to reduce the size of
    the spectrogram input (i.e. to down-sample the input) and to improve the CNN’s
    predictive power. In this way, the CNN will work with smaller sized inputs, which
    in turn will reduce the time and


    ![](img/a83d807f9a9119b1472555c0ef55797e_155_1.png)


    Figure 9.2 A typical CNN architecture example for speech recognition applications
    (multiple layers are used in the CNN to reduce the size of the spectrogram input
    so that training is faster and over-fitting is reduced).'
- md: 'computation cost required for training the CNN and enable inclusion of a wide
    variety of inputs into its training set.


    As shown in Figure 9.2, our example CNN for speech recognition consists of four
    CL–PL pairs, one single CL and five ReLU entities. The fourth and final PL feeds
    into a fully-connected ANN through a UL. There are $L$ outputs for the ANN, which
    correspond to the number of unique words that the CNN was trained on. Only one
    of those ANN $L$ outputs will be selected as $true$ for a given input spectrogram,
    while the remaining outputs will be $false$. The ANN outputs are also the outputs
    of the CNN. If a $softmax$ layer is adopted [85], the CNN outputs will be converted
    to probabilities rather than selecting one out of the $L$ outputs. The dimensions
    of an input spectrogram change as it is processed through the various layers of
    a CNN. Using Eqs. (7.1) – (7.3) presented in Chapter 7, and employing zero padding
    in the CLs, the dimensions change at each CNN layer as follows (Figure 9.3):


    ![](img/a83d807f9a9119b1472555c0ef55797e_156_0.png)


    **Figure 9.3** Spectrogram dimensions as it is processed through CNN layers: The
    input image size of ($1 \times 40 \times 198$) is fed into CNN; first CL changes
    the image size to ($12 \times 40 \times 198$), the first PL to ($12 \times 20
    \times 99$), the second CL to ($24 \times 20 \times 99$), the second PL to ($24
    \times 10 \times 50$), the third CL to ($48 \times 10 \times 50$), the third PL
    to ($48 \times 5 \times 25$), the fourth and fifth CLs to ($48 \times 5 \times
    25$), the fourth PL to ($48 \times 5 \times 13$) and the UL to ($3, 120 \times
    1 \times 1$) before feeding to the ANN.


    - **Input:** Spectrogram of user audio input with size $(1 \times 40 \times 198)$.

    - **1st CL:** With $F_{cl} = 12$ filters (typical for audio applications in Python
    and Matlab), each of size $f_{cl} = 3 \times 3$, input spectrogram dimensions
    change from $(1 \times 40 \times 198)$ to $(12 \times 40 \times 198)$ (using zero
    padding).

    - **1st PL:** Using a pool size of $p = (3 \times 3)$ and stride of $s_{pl} =
    2$, spectrogram dimensions are further reduced from $(12 \times 40 \times 198)$
    to $(12 \times 20 \times 99)$.

    - **2nd CL:** There are $F_{cl} = 24$ filters (twice the number of filters in
    the previous layer), each of size $f_{cl} = 3 \times 3$; spectrogram dimensions
    are changed from $(12 \times 20 \times 99)$ to $(24 \times 20 \times 99)$.

    - **2nd PL:** Using a pool size of $p = 3 \times 3$ and stride $s_{pl} = 2$, spectrogram
    dimensions are reduced from $(24 \times 20 \times 99)$ to $(24 \times 10 \times
    50)$.

    - **3rd CL:** There are $F_{cl} = 48$ filters (twice the number of filters in
    the previous layer), each of size $f_{cl} = 3 \times 3$; spectrogram dimensions
    are changed from $(24 \times 10 \times 50)$ to $(48 \times 10 \times 50)$.

    - **3rd PL:** Using a pool size of $p = 3 \times 3$ and stride of $s_{pl} = 2$,
    spectrogram dimensions are reduced from $(48 \times 10 \times 50)$ to $(48 \times
    5 \times 25)$.

    - **4th CL:** There are $F_{cl} = 48$ filters (same as previous CL), each of size
    $f_{cl} = 3 \times 3$; spectrogram dimensions remain at $(48 \times 5 \times 25)$.

    - **5th CL:** There are $F_{cl} = 48$ filters (same as previous CL), each of size
    $f_{cl} = 3 \times 3$; spectrogram dimensions remain at $(48 \times 5 \times 25)$.

    - **4th PL:** Using a pool size of $p = 1 \times 13$ and stride of $s_{pl} = 1$,
    spectrogram dimensions are reduced from $(48 \times 5 \times 25)$ to $(48 \times
    5 \times 13)$.

    - **UL:** After unrolling, spectrogram dimensions are changed from $(48 \times
    5 \times 13)$ to $(3, 127 \times 1 \times 1)$

    - **ANN:** Using a fully-connected layer and no hidden layers, input and output
    sizes are 3127 and $(L \times 1 \times 1)$, respectively, where $L$ is the number
    of unique words to predict.


    ## 9.3 Organization of Training and Reference Files


    Similar to the OCR implementation presented in Chapter 8, a directory structure
    is assumed to be present in the host processor running the scripts. Two folders,
    named `TrainingSet` and `ReferenceSet`, are to be created to store the spectrogram
    files used for training and reference purposes, respectively. Figures 9.4 and
    9.5 show a sample organization for the training and reference audio files, which
    is only meant to be an illustrative design and may not to be followed verbatim.
    Contents of the `TrainingSet` and `ReferenceSet` folders are summarized as follows:


    - `TrainingSet` folder: The audio files to be used for training the CNN are stored
    in this folder. For each distinct word, there is one sub-folder containing the
    training files for that word. For a CNN with $L$ outputs, there are $L$ sub-folders
    under the `TrainingSet` folder, one for each output word. For example, in the
    `TrainingSet` folder shown in Figure 9.4, there are six different sub-folders,
    namely `Goodbye`, `Hello`, `Nazdarovya`, `Sagol`, `SunnySideUp` and `Welcome`,
    which are the names of the words to be recognized by this example CNN. In each
    sub-folder, there are audio files to be used in training for this word. Note that
    if multiple language inputs are to be accepted by this CNN, then all samples corresponding
    to the same word will be placed into the same sub-folder. For example, in sub-folder
    `SunnySideUp`, there are audio files for English, Korean and Polish pronunciations
    of the word(s) “sunny side up” (there are several files for each language).

    - `ReferenceSet` folder: In this folder, there are the same number of sub-folders
    as in `TrainingSet` (for simplicity, with the same names). When the trained CNN
    identifies a spoken input word contained in a sub-folder in TrainingSet, the audio
    file with the reference pronunciation is replayed, which is located in ReferenceSet,
    in a sub-folder with the same name. When a different language pronunciation is
    desired, appropriate sub-folders for each language are placed under ReferenceSet.
    For example, in Figure 9.5, a spoken word can be translated into four different
    languages, namely Arabic, Korean, Polish and Spanish, each of which has a dedicated
    sub-folder under `ReferenceSet`. The reference audio files for each distinct output
    are placed in the same order as in `TrainingSet` within each language sub-folder.
    Based on user selection of a target language, the CNN will identify the spoken
    word and replay the translation (i.e. the audio file) in the desired language
    placed in the corresponding sub-folder. Suppose user input of “goodbye” is to
    be translated into Korean. First a trained CNN identifies the spoken word as it
    belongs to the first sub-folder in `TrainingSet`, then identifies the sub-folder
    corresponding to Korean in `ReferenceSet` and replays the audio file named `Ref_GoodBye_in_Korean.wav`.



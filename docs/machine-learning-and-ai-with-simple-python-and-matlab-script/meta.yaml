- md: '## 16.7 Concluding Remarks


    In this chapter, we introduced an example of a popular application, namely flight
    control of autonomous drones operating as a swarm. In this example application,
    the goal for the swarm of autonomous drones is set as spreading uniformly over
    a geographical area of interest, without any intervention from a human pilot or
    central controller. We assumed that drones do not have information about the swarm
    member positions except for the near neighbours within their immediate communication
    range, and that there is no form of coordination or synchronization among the
    drones. This example in fact can be considered as a simplified version of many
    real-life drone applications such as rescue missions, environmental protection
    tasks, fire-fighting operations, multi-vehicle transportation, and others.


    We introduce a UAV flight control mechanism employing a GA, where a chromosome
    represents the direction in which a UAV will move at the next step. A fitness
    function is defined where virtual forces are imagined to be applied to a node
    by its immediate neighbours. The GA favours positions that place a UAV away from
    its neighbours without losing communication with them. Candidate positions that
    may isolate a UAV or move it too close to its neighbours will not have good fitness
    values.


    In Python and Matlab implementations of this flight control algorithm, we show
    that relatively simple scripts can successfully realize a GA for a set of autonomous
    drones operating as a swarm. In these simple scripts, we see that drone speed
    and communication range are the major variables to prevent swarm partitioning.


    If the computation load of flight control is kept light, bio-inspired algorithms
    such as GAs can be performed in real-time (or near-real-time) flight control.
    If more conditions are included in a chromosome or a more advanced fitness function
    is employed, more powerful flight control algorithms may be constructed. However,
    increased complexity implies that computational time for flight control will most
    likely increase, which may prevent some applications from operating in real time.


    It is possible that other biologically inspired algorithms could be used for flight
    control of autonomous drones operating as a swarm. For example, one could easily
    adapt a similar flight control mechanism by replacing the GAs with particle swarm
    optimization or differential evolution algorithms (see Sections 18.2 and 18.3
    in Chapter 18).


    ## 16.8 Exercises for Chapter 16


    1.  Construct a chromosome for the FGA presented in Figure 16.5 that is capable
    of selecting 64 different directions for a UAV to move at each step. What are
    the advantages and disadvantages of using this chromosome?

    2.  Propose a different chromosome for the FGA presented in Figure 16.5 using
    three codons, each using decimal values. Are there any advantages of using this
    chromosome? Any disadvantages?

    3.  Propose a fitness function that will force the UAVs to stay in a straight
    line.

    4.  Modify the Python script given in Section 16.5 using threads. Run it several
    times with the same parameter values. Do you see any difference between each run?
    Why do you think this happens?

    5.  Repeat Exercise 1 for the Matlab script given in Section 16.6 using threads.


    # 17 GAs for Route Optimization


    ## 17.1 Introduction


    In this chapter, we present another important application of GAs, namely the route
    optimization problem, where a set of nodes interconnected with segments with different
    cost values are to be covered with minimum cost. We can visualize this problem
    as follows: we are given a set of cities and we need to visit all of them such
    that the total length of the route is a minimum. If the cost is defined as the
    time to travel between cities, then the goal is to visit the cities in minimum
    time. This problem is known in computer science as the `travelling salesman problem`
    (TSP), where a salesman needs to visit each city only once, starting and returning
    to the same one [122]. Requirements that the salesman can visit each city only
    once and that the total length (or its equivalent cost) of the entire trip must
    be minimized make the travelling salesman class of problems a formidable challenge.
    Their solution complexity grows as the factorial of the number of cities and the
    connections between them.


    Optimization problems for engineering tasks are often complex and frequently need
    to determine the most effective ordering of a sequence of actions to accomplish
    a given set of goals. Consider a delivery company that dispatches a fleet of hundreds
    of trucks to distribute packages to a set of locations every morning. Each truck
    starts at a base location, makes multiple stops during the day and returns to
    the base at the end of its shift. The goal for a manager is to ensure that each
    trip visits as many delivery points as possible while travelling the shortest
    distance.


    In another application, consider the motor vehicle manufacturing industry, which
    produces more than 70 million cars every year globally. For each car, there are
    thousands of screws to be tightened and thousands of spot welding operations to
    be performed. The order in which the screws are to be tightened or the metal points
    welded can be formulated as a TSP. A robot starts welding from a selected point
    and visits dozens of points in a given order until returning to its initial position
    after completing the last spot weld. In this case, the robot and points to be
    welded correspond to the salesman and the cities of the TSP, respectively. A spot
    welding or screw tightening robot, if not programmed carefully, may waste time
    on each car and, hence, may significantly impact factory output and operating
    budget. The savings for these applications is in the tens of billions of dollars.
    Similarly, in the electronics industry, finding the best order to solder components
    or pierce holes on printed circuit boards by robot are problems with high impact
    on productivity. TSP solutions can minimize soldering time, path complexity, energy
    and material consumption for any electronics manufacturer [123].'
  mdcn: '## 16.7 结语


    在本章中，我们介绍了一个流行应用的示例，即作为集群运行的自主无人机的飞行控制。在这个示例应用中，集群自主无人机的目标被设定为均匀分布在感兴趣的地理区域内，无需人类飞行员或中央控制器的任何干预。我们假设无人机除了其直接通信范围内的近邻外，没有关于集群成员位置的信息，并且无人机之间没有任何形式的协调或同步。这个示例实际上可以被视为许多现实世界无人机应用的简化版本，例如救援任务、环境保护任务、消防行动、多车辆运输等。


    我们介绍了一种采用遗传算法的无人机飞行控制机制，其中染色体代表无人机在下一步将移动的方向。定义了一个适应度函数，想象虚拟力由其直接邻居施加到节点上。遗传算法倾向于选择使无人机远离其邻居但又不失去与它们通信的位置。可能使无人机孤立或使其过于靠近邻居的候选位置将不会具有良好的适应度值。


    在该飞行控制算法的Python和Matlab实现中，我们展示了相对简单的脚本可以成功地为一组作为集群运行的自主无人机实现遗传算法。在这些简单的脚本中，我们看到无人机速度和通信范围是防止集群分裂的主要变量。


    如果飞行控制的计算负载保持较轻，生物启发算法（如遗传算法）可以在实时（或近实时）飞行控制中执行。如果在染色体中包含更多条件或采用更先进的适应度函数，则可以构建更强大的飞行控制算法。然而，复杂性的增加意味着飞行控制的计算时间很可能会增加，这可能会阻止某些应用实时运行。


    其他生物启发算法也可能用于作为集群运行的自主无人机的飞行控制。例如，通过将遗传算法替换为粒子群优化或差分进化算法（参见第18章第18.2节和第18.3节），可以轻松地采用类似的飞行控制机制。


    ## 16.8 第16章习题


    1.  为图16.5中展示的FGA构建一个染色体，使其能够为无人机在每一步选择64个不同的移动方向。使用这种染色体有哪些优点和缺点？

    2.  为图16.5中展示的FGA提出一个使用三个密码子（每个使用十进制值）的不同染色体。使用这种染色体有任何优点吗？有什么缺点？

    3.  提出一个适应度函数，迫使无人机保持在一条直线上。

    4.  使用线程修改第16.5节中给出的Python脚本。使用相同的参数值运行多次。你看到每次运行之间有任何差异吗？你认为为什么会发生这种情况？

    5.  使用线程，对第16.6节中给出的Matlab脚本重复习题1。


    # 17 用于路径优化的遗传算法


    ## 17.1 引言


    在本章中，我们介绍遗传算法的另一个重要应用，即路径优化问题，其中需要以最小成本覆盖一组由具有不同成本值的线段互连的节点。我们可以将此问题可视化如下：给定一组城市，我们需要访问所有城市，使得路径的总长度最小。如果成本定义为在城市之间旅行的时间，那么目标就是以最短时间访问所有城市。这个问题在计算机科学中被称为`旅行商问题`（TSP），其中一名旅行商需要从同一个城市出发并返回，仅访问每个城市一次[122]。旅行商只能访问每个城市一次以及整个行程的总长度（或其等效成本）必须最小化的要求，使得旅行商问题类别成为一个艰巨的挑战。它们的解决方案复杂度随着城市数量及其之间连接的阶乘而增长。


    工程任务的优化问题通常很复杂，并且经常需要确定一系列行动的最有效排序以完成给定的一组目标。考虑一家每天早上派遣数百辆卡车车队向一组地点分发包裹的快递公司。每辆卡车从一个基地位置出发，在一天中进行多次停靠，并在轮班结束时返回基地。管理者的目的是确保每次行程在行驶最短距离的同时访问尽可能多的投递点。


    在另一个应用中，考虑全球每年生产超过7000万辆汽车的汽车制造业。对于每辆汽车，都有数千个螺丝需要拧紧，数千个点焊操作需要执行。拧紧螺丝或焊接金属点的顺序可以被表述为一个TSP。机器人从一个选定的点开始焊接，按照给定的顺序访问数十个点，直到完成最后一个点焊后返回其初始位置。在这种情况下，机器人和待焊接点分别对应于TSP的旅行商和城市。如果点焊或拧紧螺丝的机器人没有经过仔细编程，可能会在每辆汽车上浪费时间，从而可能显著影响工厂的产出和运营预算。这些应用节省的成本高达数百亿美元。同样，在电子行业，寻找机器人焊接元件或在印刷电路板上打孔的最佳顺序是对生产力有重大影响的问题。TSP解决方案可以最大限度地减少任何电子制造商的焊接时间、路径复杂性、能源和材料消耗[123]。'

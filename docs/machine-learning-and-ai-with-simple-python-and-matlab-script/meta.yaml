  - '[PAGE 105]


    ![](img/a83d807f9a9119b1472555c0ef55797e_105_0.png)


    **Figure 6.1** NLP algorithms can explore possible associations between various
    forms of natural language content (e.g. speeches, texts, conversations, sound
    bites or articles) and other seemingly unrelated events in different venues (e.g.
    stock market movements, increasing popularity of soft drinks or labour union decisions).


    trees are useful for pattern matching and parsing content. Statistics-based approaches,
    on the other hand, make probabilistic decisions at each decision point in order
    to assign weights to each possible outcome. Statistical NLP techniques can express
    a relative certainty of many different outputs and, hence, can produce reliable
    results in complex situations for which unique outcomes may not be determined.


    Question answering (QA) systems are often used in chatbots (i.e. AI-based chatting
    systems such as Siri) that search for answers in a database or on the internet.
    QA systems may implement NLP algorithms to first extract information from a question
    and then search a body of text for an appropriate answer [66]. In Chapter 11,
    a chatbot is implemented as a recurrent neural network (RNN). Text summarization
    is another application of NLP, where it can identify topics or keywords used in
    a body of text to generate sentences that best summarize the text [67].


    NLP techniques can also be instrumental for machine translation of a given text
    segment from one natural language to another, while keeping the meaning intact.
    Often during translating between languages, sentence structure varies according
    to the syntactical rules of the two languages. NLP algorithms, utilizing ANNs,
    can be implemented to search for connections between words and sentence structures
    in both languages. In Chapter 13, we present a recurrent neural network with attention
    mechanism for a simplistic German to English translator.


    # 6.2 Impact of Text Messages on Stock Markets


    In this chapter, we present a simple example application of NLP, where an ANN
    is designed to explore a possible relationship between text messages sent by an
    individual and movements of stock market assets. Specifically, the tweets from
    former US President Mr. Trump are analysed for their possible impact on financial
    securities listed in the S&P 500 index (Standard and Poor''s 500 Index) [68],
    where the market values of 500 leading publicly traded companies in the USA are
    listed. ANNs are a natural fit for implementation of NLP algorithms for this task.


    When implementing NLP algorithms for cases similar to this example, proper training
    of an effective ANN requires a large set of samples to be used as ANN inputs and
    corresponding outputs. For this example, inputs are in the form of content generated
    in a spoken language (i.e. English) presented as tweets sent by a person (i.e.
    former US President Mr. Trump). For each input tweet, the'
  - '[PAGE 106]


    corresponding output will be the price movement reported on financial websites
    after this tweet is sent (i.e. stocks listed in S&P 500 index).


    Often, to reduce noise in input data, natural language content needs to be pre-processed
    before being considered as an ANN input. Depending on the application, punctuation
    marks, words unrelated to a given subject and some other information regarded
    as irrelevant may be removed from content without affecting the presumed relationship
    between inputs and outputs. The process of successful trimming of noise from sample
    data is not a trivial task and depends heavily on specialized field expertise.
    For some applications, some words used in a sentence may be important to determine
    how self-centered the communication is (e.g. how many times someone uses the pronoun
    "you") and others negligible (e.g. usage of the article "the"), whereas in another
    application the opposite may be true (e.g. in identifying specificity of language
    used by people by frequency of using the article "the" but not caring about the
    number of times a pronoun such as "you" appears).


    # 6.3 A Simple ANN for NLP


    Let us now present a simple ANN to implement an NLP application, where movements
    of financial markets are predicted based on the tweets sent by a US president
    and historical financial data. As discussed in Chapter 2, in order to construct
    and operate an effective ANN for a given application, after selection of ANN inputs
    and outputs, one has to define the ANN architecture, including the number of inputs,
    hidden layers and neurons at each one, selection of activation functions, the
    number of epochs and the learning rates to be used during training.


    # 6.3.1 ANN Inputs and Outputs


    Although ANN inputs will be taken from the tweets, extracting information from
    a tweet [69] – defined as a text message of up to 140 characters – so that it
    can be employed as an ANN input is not straightforward. Let us consider defining
    a set of keywords that may have influence on financial market movements. For example,
    it is possible that words like prosper, enrichment or success may be interpreted
    by the public as words associated with a successful economy and, hence, may suggest
    confidence in markets and influence an increase in stock values. Similarly, tweets
    using words like sacrifice, difficulty or failure may hint at difficult times
    and may cause markets to fall. However, if this relationship between a set of
    keywords and stock market movements were trivial, then everyone would be able
    to make such inferences and easily predict outcomes. For realistic cases, there
    is a lot more subtlety in this relationship, which is why the selection of keywords
    requires subject matter expertise.


    If a set of keywords is to be used as ANN inputs, then the tweets will be combed
    to identify which keywords are used and how often in each tweet. In this way,
    the number of ANN inputs is the number of keywords, and the value of each input
    is the frequency of usage of that keyword in a given tweet. To form the sample
    output values for the ANN, historical financial information for the S&P 500 is
    used for the days corresponding to the presidential tweets in the input dataset.
    For a tweet issued on a particular date, an increase or decrease in the market
    value is computed for that day and used as the output value for that tweet.


    # 6.3.2 Keywords


    Suppose a set of keywords that may have an influence on financial market movement
    are identified with the help of experts from a variety of areas, including sociologists,
    economists,'
  - '[PAGE 107]


    journalists, historians and scientists. For the example presented here, the 14
    keywords selected are banks, jobs, Xi, stock market, tariff, money, employment,
    China, dollar, growth, trade, deal, economy and euro, as shown in Figure 6.2.
    These keywords are collected from tweets sent over a period of 13 months. Out
    of the 7 000 posted tweets, there are approximately 193 tweets that include one
    or more of the identified keywords and were sent on a day that the relevant stock
    market was operational. Figure 6.3 shows a sample set of tweets, where the keywords
    are highlighted. The number of keywords is the number of inputs of the ANN. For
    a given tweet, each input value reflects how many times that keyword is used in
    that tweet. Figure 6.4 shows the ANN inputs based on the tweets in Figure 6.3.


    In addition to the frequency of each keyword used in a tweet, historical tick
    data is also employed as part of the ANN input. In this example, the opening price
    of a day and the volume traded on that day (an example is shown in Figure 6.5)
    are included in the ANN inputs. Percentage change of daily price is the ANN output.


    # 6.3.3 Formation of Training Data


    Tweets are first pre-processed by removing images, hyperlinks and re-tweet signatures.
    Also, tweets from weekends and holidays are shifted to the next day that the market
    was open. There are 193 tweets suitable for training (i.e. those that contain

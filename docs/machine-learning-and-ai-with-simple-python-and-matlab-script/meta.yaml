  md: "# 5.4 Python Script for AD Prognosis Using an ANN\n\n```\n# add another hidden\
    \ layer with 60 neurons\nmodel.add(keras.layers.Dense(60,kernel_regularizer='l1',\
    \ activation='relu'))\n\n# add another hidden layer with 15 neurons\nmodel.add(keras.layers.Dense(15,\
    \ activation='relu'))\n\n# add another hidden layer with 5 neurons\nmodel.add(keras.layers.Dense(5,activation='relu'))\n\
    \n# add an output layer with one output (the slope of the cognitive decline)\n\

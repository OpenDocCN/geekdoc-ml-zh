- md: '## Appendix D


    ## Back Propagation Through Time in an RNN


    ### D.1 Back Propagation in an RNN


    In this appendix, we present expressions for computing the partial derivatives
    of loss with respect to RNN parameters of $h$, $W$, $\Omega$, $V$, $c$ and $b$
    during the back propagation through time used in RNNs as discussed in Chapter
    10. Let us first present the definitions of RNN parameters from Chapter 10:


    $h_t = \Theta_h(W h_{t-1} + U x_t + b)$ (D.1)

    $\Omega_t = V h_t + c$ (D.2)

    $\hat{y}_t = \Theta_y(\Omega_t)$ (D.3)

    $L_t = -\sum_{i=1}^{|I|} y_{t(i)}^o \ln(\hat{y}_{t(i)})$, (D.4)


    where $\Theta_h$ is realized as $\tanh$ and $\Theta_y$ as $\text{softmax}$. In
    order to minimize the loss $L$, its gradients with respect to $U$, $W$, $V$, $b$
    and $c$ must be computed. Recall from Eq. (10.7) in Chapter 10 that cross-entropy
    loss is defined as


    $L = -\sum_{t=1}^{\mathcal{T}} \sum_{i=1}^{|I|} y_{t(i)}^o \ln(\hat{y}_{t(i)})$.


    Using Eq. (D.4), let us now compute the partial derivative of $L_t$ with respect
    to the $i^{\text{th}}$ element of $\Omega_t$ (i.e. $\Omega_{t(i)}$) as follows:


    $\frac{\partial L_t}{\partial \Omega_{t(i)}} = -\frac{\partial}{\partial \Omega_{t(i)}}(y_{t(i)}^o
    \ln(\hat{y}_{t(i)})) = -y_{t(i)}^o \frac{1}{\hat{y}_{t(i)}} \frac{\partial \hat{y}}{\partial
    \Omega_{t(i)}}$. (D.5)


    From Chapter 10, we have the definition of $\text{softmax}$ as


    $\hat{y}_t = \Theta_y = \text{softmax}(\Omega_t) = \begin{bmatrix} \frac{e^{\Omega_{t,1}}}{\sum_{j=1}^{|I|}
    e^{\Omega_{t,j}}} \\ \frac{e^{\Omega_{t,2}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}
    \\ \vdots \\ \frac{e^{\Omega_{t,|I|}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}} \end{bmatrix}
    = \frac{e^{\Omega_{t,i}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}$, (D.6)


    where $|I|$ is the size of an alphabet $I$, and $\Omega_{t,i}$ is the $i^{\text{th}}$
    element of the $\Omega_t$ matrix. We can see in Eqn. (D.6) that $\hat{y}_t$ elements
    have values between 0 and 1. It shows that elements of raw output $\Omega_t$,
    whose values may be negative, are replaced with their power over $e$ (i.e. $e^{\Omega_{t,i}}$)
    and divided by the summation of all raw output values as powers of $e$. The values
    for $\hat{y}_t$ vector, therefore, are probabilities with values between 0 and
    1.


    Since softmax is a $\mathbb{R}^{|I|} \to \mathbb{R}^{|I|}$ mapping function, the
    derivative with respect to $\Omega_i$ is as follows:


    $$\frac{\partial \hat{y}_t}{\Omega_t} = \begin{bmatrix} \frac{\partial \hat{y}_{t(1)}}{\partial
    \Omega_{t(1)}} & \cdots & \frac{\partial \hat{y}_{t(1)}}{\partial \Omega_{t(i)}}
    & \cdots & \frac{\partial \hat{y}_{t(1)}}{\partial \Omega_{t(|I|)}} \\ \vdots
    & & \vdots & & \vdots \\ \frac{\partial \hat{y}_{t(j)}}{\partial \Omega_{t(1)}}
    & \cdots & \frac{\partial \hat{y}_{t(j)}}{\partial \Omega_{t(i)}} & \cdots & \frac{\partial
    \hat{y}_{t(j)}}{\partial \Omega_{t(|I|)}} \\ \vdots & & \vdots & & \vdots \\ \frac{\partial
    \hat{y}_{t(|I|)}}{\partial \Omega_{t(1)}} & \cdots & \frac{\partial \hat{y}_{t(|I|)}}{\partial
    \Omega_{t(i)}} & \cdots & \frac{\partial \hat{y}_{t(|I|)}}{\partial \Omega_{t(|I|)}}
    \end{bmatrix}, \quad \text{(D.7)}$$


    where the number of rows and the columns are the alphabet size of $\|I\|$. Let
    us now compute the value for the partial derivative of $\hat{y}_t$ with respect
    to $\Omega_i$ for arbitrary $i$ and $j$ values in the matrix shown in Eq. (D.7):


    $$\frac{\partial \hat{y}_{t(j)}}{\partial \Omega_{t(i)}} = \frac{\partial}{\partial
    \Omega_{t(i)}} \left( \frac{e^{\Omega_{t(j)}}}{\sum_{k=1}^{|I|} e^{\Omega_{t(k)}}}
    \right),$$


    where $i$ and $j$ represent different elements of the matrix in Eq. (D.7). Let
    us consider the case where $i = j$:


    $$\frac{\partial \hat{y}_{t(j)}}{\partial \Omega_{t(i)}} = \frac{e^{\Omega_{t(j)}}
    \sum_{k=1}^{|I|} e^{\Omega_{t(k)}} - e^{\Omega_{t(j)}} e^{\Omega_{t(i)}}}{\left(
    \sum_{k=1}^{|I|} e^{\Omega_{t(k)}} \right)^2}$$

    $$= \frac{e^{\Omega_{t(j)}}}{\sum_{k=1}^{|I|} e^{\Omega_{t(k)}}} \left( \frac{\sum_{k=1}^{|I|}
    e^{\Omega_{t(k)}} - e^{\Omega_{t(i)}}}{\sum_{k=1}^{|I|} e^{\Omega_{t(k)}}} \right)
    = \frac{e^{\Omega_{t(j)}}}{\sum_{k=1}^{|I|} e^{\Omega_{t(k)}}} \left( 1 - \frac{e^{\Omega_{t(i)}}}{\sum_{k=1}^{|I|}
    e^{\Omega_{t(k)}}} \right)$$

    $$= \hat{y}_{t(j)} (1 - \hat{y}_{t(i)}). \quad \text{(D.8)}$$


    Let us now consider the case of $i \neq j$:


    $$\frac{\partial \hat{y}_{t(j)}}{\partial \Omega_{t(i)}} = \frac{-e^{\Omega_{t(j)}}
    e^{\Omega_{t(i)}}}{\left( \sum_{k=1}^{|I|} e^{\Omega_{t(k)}} \right)^2} = \frac{-e^{\Omega_{t(j)}}}{\sum_{k=1}^{|I|}
    e^{\Omega_{t(k)}}} \cdot \frac{e^{\Omega_{t(i)}}}{\sum_{k=1}^{|I|} e^{\Omega_{t(k)}}}$$

    $$= -\hat{y}_{t(j)} \hat{y}_{t(i)}. \quad \text{(D.9)}$$


    For step $t$ and $i = j$, plugging Eq. (D.8) into Eq. (D.5) we have


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = -\sum_{j=1}^{|I|} y_{t(j)}^o \frac{1}{\hat{y}_{t(j)}}
    \hat{y}_{t(j)} (1 - \hat{y}_{t(i)}) = -y_{t(i)}^o (1 - \hat{y}_{t(i)}) = -y_{t(i)}^o
    + y_{t(i)}^o \hat{y}_{t(i)},$$


    where only one element is evaluated under the summation (i.e. $i = j$ case). For
    step $t$ and $i \neq j$, plugging Eq. (D.9) into Eq. (D.5) we have


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = -\sum_{j=1}^{|I|} y_{t(j)}^o \frac{1}{\hat{y}_{t(j)}}
    (-\hat{y}_{t(j)} \hat{y}_{t(i)}) = \sum_{j=1, j \neq i}^{|I|} y_{t(j)}^o \hat{y}_{t(i)}.$$


    Therefore, for the general case we have


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = -y_{t(i)}^o + y_{t(i)}^o \hat{y}_{t(i)}
    + \sum_{j=1, j \neq i}^{|I|} y_{t(j)}^o \hat{y}_{t(i)},$$


    where we can include $y_{t(i)}^o \hat{y}_{t(i)}$ into the summation since $j \neq
    i$ is missing in it, and change the summation limits as follows:


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = -y_{t(i)}^o + \sum_{j=1}^{|I|}
    y_{t(j)}^o \hat{y}_{t(i)},$$


    where $\hat{y}_{t(i)}$ is independent of index $j$ and hence can be taken out
    of the summation:


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = -y_{t(i)}^o + \hat{y}_{t(i)} \sum_{j=1}^{|I|}
    y_{t(j)}^o,$$


    where the summation of all one-hot encoded values of the expected RNN outputs
    is equal to one:


    $$\frac{\partial L_t}{\partial \Omega_{t(i)}} = \hat{y}_{t(i)} - y_{t(i)}^o,$$


    which can be used to generalize the loss for $T$ steps:


    $$\frac{\partial L}{\partial \Omega_t} = \sum_{t=1}^T (\hat{y}_t - y_t^o). \tag{D.10}$$


    Let us now consider the partial derivative of $L$ with respect to $V$:


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^T \frac{\partial L_t}{\partial V}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial V} = \sum_{t=1}^T \frac{\partial L_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial V}.$$


    From Eq. (D.2), we know that $\partial \Omega_t / \partial V = h_t^\dagger$. Substituting
    Eq. (D.10), we obtain


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^T (\hat{y}_t - y_t^o) \cdot h_t^\dagger.
    \tag{D.11}$$


    For the partial derivative of $L$ with respect to $c$, we have


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^T \frac{\partial L_t}{\partial c}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial c} = \sum_{t=1}^T \frac{\partial L_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial c}.$$


    From Eq. (D.2), we have $\partial \Omega_t / \partial c = 1$. Substituting Eq.
    (D.10), we get


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^T (\hat{y}_t - y_t^o). \tag{D.12}$$


    We now consider the partial derivative of $L$ with respect to $W$. Since $W$ is
    related to the previous hidden state, we use recursion in Eq. (D.1) for $t = 1,
    \dots, 4$:


    $$h_1 = \Theta_h(W h_0 + U x_1 + b) \quad h_2 = \Theta_h(W h_1 + U x_2 + b)$$

    $$h_3 = \Theta_h(W h_2 + U x_3 + b) \quad h_4 = \Theta_h(W h_3 + U x_4 + b).$$


    By placing previous hidden-state terms into the current hidden state, we get


    $$h_1 = \Theta_h(W h_0 + U x_1 + b)$$

    $$h_2 = \Theta_h(W (\Theta_h(W h_0 + U x_1 + b)) + U x_2 + b)$$

    $$h_3 = \Theta_h(W (\Theta_h(W (\Theta_h(W h_0 + U x_1 + b)) + U x_2 + b)) + U
    x_3 + b)$$

    $$h_4 = \Theta_h(W \Theta_h(W \Theta_h(W \Theta_h(W h_0 + U x_1 + b)) + U x_2
    + b)) + U x_3 + b) + U x_4 + b),$$


    where $\Theta_h = \tanh$. Let us obtain the partial derivatives of $L_t$ for $t
    = 1, \cdots, 4$:


    $\frac{\partial L_1}{\partial W} = \frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial
    \hat{y}_1}{\partial h_1} \frac{\partial h_1}{\partial W}$

    $\frac{\partial L_2}{\partial W} = \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial
    \hat{y}_2}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    W} + \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial
    h_2} \frac{\partial h_2}{\partial W}$

    $\frac{\partial L_3}{\partial W} = \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial
    \hat{y}_3}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial
    h_1} \frac{\partial h_1}{\partial W} + \frac{\partial L_3}{\partial \hat{y}_3}
    \frac{\partial \hat{y}_3}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial W} + \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    h_3} \frac{\partial h_3}{\partial W}$

    $\frac{\partial L_4}{\partial W} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial W} + \frac{\partial
    L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial
    h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial
    W} + \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial W} + \frac{\partial
    L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial
    h_4}{\partial W}$


    We can then generalize the derivative terms for step $t$ as follows:

    $\frac{\partial L_t}{\partial W} = \sum_{k=1}^{t} \frac{\partial L_t}{\partial
    \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \left( \prod_{j=k}^{t-1} \frac{\partial
    h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial W}$.


    Let us now present the formula for $T$ steps:

    $\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} \frac{\partial
    L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \left( \prod_{j=k}^{t-1}
    \frac{\partial h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial W}
    \right)$. (D.13)


    Finally, we insert the following partial derivatives into above formulas:

    From Eq. (D.10): $\frac{\partial L_t}{\partial \Omega_t} = (\hat{y}_t - y_t^o)$
    (D.14)

    From Eq. (D.2): $\frac{\partial \Omega_t}{\partial h_t} = V^\dagger$ (D.15)

    From Eq. (D.1): $\frac{\partial h_{j+1}}{\partial h_j} = W^\dagger (1 - h_{j+1}^2)$
    (D.16)

    From Eq. (D.1): $\frac{\partial h_k}{\partial W} = (1 - h_k^2) h_{k-1}$. (D.17)


    Inserting Eqs. (D.14), (D.15), (D.16) and (D.17) into Eq. (D.13), we have

    $\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) h_{k-1} \right)$. (D.18)


    Now, let us compute the partial derivative of $L$ with respect to $U$. Similar
    to the case of $W$ in Eq. (D.18), for $U$ we have

    $\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} \frac{\partial
    L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \left( \prod_{j=k}^{t-1}
    \frac{\partial h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial U}
    \right)$. (D.19)


    From Eq. (D.1) we have the partial derivative of $h_k$ with respect to $U$ as

    $\frac{\partial h_k}{\partial U} = (1 - h_k^2) x_k$. (D.20)'

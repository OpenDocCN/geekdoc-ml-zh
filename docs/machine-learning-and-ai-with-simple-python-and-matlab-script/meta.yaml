  md: '# 4.3.3 Exponential Moving Average


    Similar to an SMA, the `exponential moving average` (EMA) is the average price
    of a stock over a fixed window of days such that the most recent prices are weighted
    more than the older ones in the calculation [47]. To recursively compute an $n$-day
    EMA on day $t$, a percentage of the price for a day is added to the EMA of the
    previous day for $n$ days as follows:


    $$EMA(t) = price(t) \cdot \frac{2}{(n+1)} - EMA(t-1) \cdot \left(1 - \frac{2}{(n+1)}\right),$$


    where $2/(n+1)$ is called the `cooling` period. In a period of $n$ days, when
    calculating the EMA for the earliest day (let us call it $t_0$), the SMA for day
    $t_0$ is used:


    $$EMA(t_0) = SMA(t_0).$$


    The result of the EMA is similar to that of the SMA, except that the older days
    have less impact on the outcome. Thus, in theory, the EMA will have less delay
    in reflecting the latest stock movements compared to the SMA (Figure 4.4) – since
    the EMA applies more weight to current data, it follows prices more closely than
    a corresponding SMA. However, one has to be aware that the EMA may be overly sensitive
    to price changes compared to a comparable SMA. During trading, if the EMA rises
    when prices go below the EMA, this may trigger a buy `signal` (i.e., an indication
    generated by an algorithmic trading system that a user should buy this particular
    stock). Similarly, if the EMA falls when prices are above the EMA, a sell signal
    may be generated.


    # 4.3.4 Bollinger Bands


    A pair of curves calculated for a given stock based on two standard deviations
    above and below the SMA are referred to as `Bollinger bands` (BBs) [48]. The main
    idea for using BBs is that the price for a non-volatile stock will typically stay
    within the limits of the BBs. If an asset price moves


    ![](img/a83d807f9a9119b1472555c0ef55797e_75_0.png)'
  merge: -1
  pgno: 75
- img_proc: true
  md: '![](img/a83d807f9a9119b1472555c0ef55797e_76_0.png)


    Figure 4.5 Bolinger bands for a fictitious stock computed using 20-day SMA and
    2 σ (taken from [49] / FMR LLC).


    out of the BBs, it is expected to return back into the BB range. This expectation
    may be a useful guide in dictating buy or sell decisions for a given stock.


    For example, if an asset price goes above the BB, this does not necessarily indicate
    a buy signal since it is expected that it will soon return into its BB. Similarly,
    a stock price falling below its BB may not trigger and automatic a sell signal
    since it is expected to rise up into its BB again (Figure 4.5). For a given day
    t, BB is computed as follows:


    $$BB(t) = \pm \frac{price(t) - SMA(t)}{2 \cdot \sigma(t)}$$


    where σ stands for the standard deviation of price changes during the same period
    of n days. Typical values for a short-term BB is a 10-day SMA and a band of (±1.5
    · σ), whereas a long-term BB uses a 20-day SMA and a band of (±2.5 · σ) [49].


    # 4.4 A Simple Algorithmic Trading Policy


    Technical indicators can be used in determining an `algorithmic trading policy`,
    by which decisions are made to buy, sell or hold a given stock. The first step
    of employing technical indicators is to define their parameters, which are referred
    to as `hyper-parameters`. For M, the hyper-parameter is the time range used to
    compute its slope, whereas for the SMA and EMA, it is the time range over which
    the SMA and EMA are to be calculated. For BBs, the hyper-parameters are the time
    range for the SMA and the number of standard deviations the bands are away from
    the SMA. Selection of hyper-parameter values to be used in technical indicators
    is a formidable and non-trivial challenge in algorithmic trading.


    An overly simplified example of using the SMA in algorithmic trading can be constructed
    as follows. For a given stock, whenever a short-term SMA (e.g., 50 days) crosses
    above a long-term SMA (e.g., 200 days), a `price increase trend` is detected.
    With the expectation that this'
  merge: -1
  pgno: 76
- img_proc: true
  md: 'trend will continue, a signal to buy this stock may be generated. If the price
    keeps increasing, a profit will be made. Similarly, if a short-term SMA crosses
    below a long-term SMA, a down trend is detected and the stock will lose value
    in in the coming days and, hence, should be sold before its price gets even lower.
    This way, a loss is prevented.


    It is not obvious how to choose the period over which an SMA is calculated. It
    requires experience and knowledge of the specific financial sector in which the
    stock is traded. If a relatively large n is selected, the SMA makes the price
    curve smoother and, hence, it becomes easier to extract information from it since
    the noise and outliers are eliminated from the price curve. However, the SMA over
    larger periods may create a delay between the price movement and SMA curves, which
    may lessen the ability to detect recent price movements for traders. On the other
    hand, a short-period SMA can respond more quickly to price changes, but with the
    risk of being more volatile (i.e., a measure that fluctuates in value more than
    others).


    As an example, consider the two separate SMA curves (for 50 and 200 days) displayed
    in Figure 4.6 for Bitcoin. One can form a policy called moving average crossover
    [50] such that when a short-term SMA crosses over a long-term SMA from beneath,
    it indicates a potential buy signal. This means that the short-term SMA is showing
    a value gain, whereas the long-term SMA has not responded yet. Similarly, a cross
    from above indicates a sell signal for a stock (i.e., an indication from an algorithmic
    trading system to a user to sell the stock), which implies that the short-term
    SMA has detected a loss of value before the long-term SMA. This crossover strategy
    can be also used with the EMA [50].


    In other applications, if M for a given stock has a relatively large positive
    value, one may conclude that the price will keep rising (i.e., a buy signal).
    Similarly, a relatively large negative value may be a sign that its value will
    keep decreasing, implying a sell signal. When using BBs, if the current price
    goes above the upper band, it is usually considered a potential sell signal. Likewise,
    if the current price goes below the lower band, it is considered to be a potential
    buy signal. The assumption in


    ![](img/a83d807f9a9119b1472555c0ef55797e_77_0.png)


    Figure 4.6 50-day and 200-day SMA price curves for Bitcoin (taken from [50] /
    MYSMP, LLC).'

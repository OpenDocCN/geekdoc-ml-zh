    # 7.7 Concluding Remarks


    In this chapter, we introduce the main concepts governing the operations and functionalities
    of CNNs, which are ideal for the identification of multi-dimensional inputs such
    as images and speech. A typical CNN consists of convolution, pooling and unrolling
    layers; rectilinear activation units; and a fully-connected ANN. The main goal
    for engaging different types of layers is to reduce the high dimensions of the
    inputs. Each layer reduces the input image size by the order of the square of
    the filter sizes. Depending on the level of precision sought, multiple layers
    are employed.


    In general, training CNNs requires a high number of operations. One has to keep
    in mind their effect on training cost when selecting filter sizes, the number
    of filters and CL-PL pairs, and ANN architecture. It is highly recommended that
    techniques such as embedding are utilized to keep the computational cost of training
    within feasible boundaries.



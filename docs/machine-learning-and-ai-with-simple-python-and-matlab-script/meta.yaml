    ANN，以找到能产生满意成绩的最佳睡眠和学习小时数。当然，我们建议学生不要花太多时间试验 ANN，而应尽可能专注于学习课程材料，无论期望的成绩如何。


    ## 3.5.1 使用矩阵进行 ANN 训练


    现在让我们考虑将训练期间使用的多个样本表示为矩阵。图 3.1 中显示的输入值可以表示为一个矩阵，称为 X，它有两列和三行，分别代表不同输入的数量和样本数量。类似地，样本输出值可以排列成一个称为
    $Y$ 的向量：


    $$X = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \\ 82 \\ 93 \end{bmatrix}.$$


    一旦输入和输出表示为矩阵，在训练中就可以使用矩阵运算一次性处理多个样本，而不是单独处理每个样本。虽然计算成本没有降低，但与单独处理每个样本的加法和乘法相比，使用矩阵使得
    ANN 的脚本实现要方便得多。


    为简单起见且不失一般性，让我们使用图 3.1 中给出的样本来确定下面简单 ANN 各阶段权重的矩阵元素。如上所述，对于输入样本，矩阵维度是样本数量乘以 ANN
    输入数量。对于图 3.2 中显示的样本，输入矩阵的维度将是 $(3 \times 2)$：


    $$X = \begin{bmatrix} x_{11} & x_{12} \\ x_{21} & x_{22} \\ x_{31} & x_{32} \end{bmatrix}.$$


    输入层和隐藏层之间权重的矩阵维度是 ANN 输入数量乘以隐藏层神经元数量。对于图 3.2 中的 ANN，权重矩阵将是一个 $(2 \times 3)$ 矩阵：


    $$W^{(1)} = \begin{bmatrix} w_{11}^{(1)} & w_{12}^{(1)} & w_{13}^{(1)} \\ w_{21}^{(1)}
    & w_{22}^{(1)} & w_{23}^{(1)} \end{bmatrix}.$$


    对于隐藏层的输出，我们有


    $$Z^{(2)} = X \cdot W^{(1)} = \begin{bmatrix} x_{11} & x_{12} \\ x_{21} & x_{22}
    \\ x_{31} & x_{32} \end{bmatrix} \cdot \begin{bmatrix} w_{11}^{(1)} & w_{12}^{(1)}
    & w_{13}^{(1)} \\ w_{21}^{(1)} & w_{22}^{(1)} & w_{23}^{(1)} \end{bmatrix} = \begin{bmatrix}
    z_{11}^{(2)} & z_{12}^{(2)} & z_{13}^{(2)} \\ z_{21}^{(2)} & z_{22}^{(2)} & z_{23}^{(2)}
    \\ z_{31}^{(2)} & z_{32}^{(2)} & z_{33}^{(2)} \end{bmatrix}.$$


    对于一般情况，两个隐藏层之间权重的矩阵维度是当前隐藏层神经元数量乘以下一个隐藏层神经元数量。由于图 3.2 中的示例只有一个隐藏层，隐藏层和输出层之间的权重矩阵维度将是隐藏神经元数量乘以
    ANN 输出数量，这是一个 $(3 \times 1)$ 矩阵，如下所示：


    $$W^{(2)} = \begin{bmatrix} w_{1}^{(2)} \\ w_{2}^{(2)} \\ w_{3}^{(2)} \end{bmatrix}.$$


    因此，表示图 3.2 中 ANN 输出的矩阵，即公式 (3.1) 和 (3.2) 中矩阵相乘的结果，其维度是样本数量乘以输出数量：


    $$Z^{(3)} = a^{(2)} \cdot W^{(2)} = \begin{bmatrix} z_{11}^{(2)} & z_{12}^{(2)}
    & z_{13}^{(2)} \\ z_{21}^{(2)} & z_{22}^{(2)} & z_{23}^{(2)} \\ z_{31}^{(2)} &
    z_{32}^{(2)} & z_{33}^{(2)} \end{bmatrix} \cdot \begin{bmatrix} w_{1}^{(2)} \\
    w_{2}^{(2)} \\ w_{3}^{(2)} \end{bmatrix} = \begin{bmatrix} z_{1}^{(3)} \\ z_{2}^{(3)}
    \\ z_{3}^{(3)} \end{bmatrix}.$$


    ## 3.5.2 前向传播


    图 3.1 中所示样本的输入和输出值可以用以下矩阵表示：


    $$X = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \\ 82 \\ 93 \end{bmatrix}.$$


    让我们假设 $W^{(1)}$ 和 $W^{(2)}$ 矩阵的连接权重值被随机分配如下：


    $$W^{(1)} = \begin{bmatrix} -1 & 3 & 1 \\ 2 & -2 & 1 \end{bmatrix} \quad W^{(2)}
    = \begin{bmatrix} -1 \\ 1 \\ 2 \end{bmatrix}. \tag{3.3}$$


    使用 $X$ 和 $W^{(1)}$ 矩阵，我们得到


    $$Z^{(2)} = X \cdot W^{(1)} = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix}
    \cdot \begin{bmatrix} -1 & 3 & 1 \\ 2 & -2 & -1 \end{bmatrix} = \begin{bmatrix}
    7 & -1 & -2 \\ -3 & 13 & 4 \\ -6 & 26 & 8 \end{bmatrix}.$$



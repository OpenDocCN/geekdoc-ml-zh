    \ $U$ for generation 1: $P_1^1 = (6.2, 10)$.\n\n**Evolving Position 2 from Generation\
    \ 0 to 1:** Evolving position 2 from generation 0 to 1 (i.e. $P_2^0 \\rightarrow\
    \ P_2^1$), $V = (v_x, v_y)$ is constructed as follows:\n\n- Suppose we pick: $m\
    \ = 3, k = 0, r = 1; rnbr = 0; rand_x = 0.4; rand_y = 0.9$. Recall that $CR =\
    \ 0.7$.\n  $$v_x = 1 + 0.8 \\cdot (5 - 0) = 5 \\quad v_y = 2 + 0.8 \\cdot (9 -\
    \ 4) = 6.$$\n- For the $x$ dimension of $U = (u_x, u_y)$, $(rand_x \\le CR)$ is\
    \ true, then: $u_x = v_x = 5$. For the $y$ dimension, since $(rand_y \\le CR)$\
    \ is false and $rnbr = 0$, we have: $u_y = P_{2y}^1 = 7$.\n- $f(5, 7) = -0.0852$\
    \ and $f(3, 7) = 0.1276$, which means that $f(U) < f(P_2^0)$. In other words,\
    \ the position $(5, 7)$ suggested by the trial solution for generation 1 is not\
    \ a better position than $P_2^0 = (3, 7)$. Therefore, we use position $P_2^0$\
    \ for generation 1: $P_2^1 = (3, 7)$.\n\n**Evolving Position 3 from Generation\
    \ 0 to 1:** Evolving position 3 from generation 0 to 1 (i.e. $P_3^0 \\rightarrow\
    \ P_3^1$), variant $V = (v_x, v_y)$ is constructed as follows:\n\n- Suppose we\
    \ pick: $m = 0, k = 1, r = 2; rnbr = 0; rand_x = 0.5; rand_y = 0.9$. Using $CR\
    \ = 0.7$, we have:\n  $$v_x = 5 + 0.8 \\cdot (0 - 3) = 2.6 \\quad v_y = 9 + 0.8\
    \ \\cdot (4 - 7) = 6.6.$$\n- Let us construct a trial solution $U = (u_x, u_y)$.\
    \ For the $x$ dimension, since $(rand_x \\le CR)$ is true, we have: $u_x = v_x\
    \ = 2.6$. For the $y$ dimension, since $(rand_y \\le CR)$ is false and $rnbr =\
    \ 1$, we have: $u_y = v_y = 6.6$.\n\n---\n\n```\ninitialize population; // random\
    \ population;\nfor each individual in population do\n    evaluate fitness of candidate;\n\
    end for\n\nwhile (EndCriteria == false)\n{\n    for each individual i in population\
    \ do\n        create a variant solution;\n        create a trial solution;\n \
    \       if (fitness(trial) < fitness(i))\n            replace individual i with\
    \ trial solution;\n        else\n            keep individual i in population;\n\
    \        end if\n    end for\n}\n```\n\n**Figure 18.8** A simple algorithm implementing\
    \ DE (here smaller fitness values are assumed to be preferable in selecting individuals\
    \ for the next generation).\n\npopulation. DE decides if it will replace an individual\
    \ $i$ at step $(t + 1)$ by its trial solution using their fitness values. The\
    \ algorithm continuously evolves a population of individuals for a predetermined\
    \ time or until a satisfactory solution of the fitness function is reached.\n\n\
    Let us consider a two-dimensional solution space whose candidate solutions can\
    \ be evaluated by a fitness function $f$ (extension to a higher-dimensional space\
    \ is straightforward). After the initialization of the population, individual\
    \ $P_i^g$ evolves from generation $g$ to $(g + 1)$ (i.e. $P_i^g \\rightarrow P_i^{g+1}$)\
    \ by creating a variant solution $V_i = (v_{ix}, v_{iy})$:\n\n- Select three distinct\
    \ individuals from the current population as $k$, $r$ and $m$ such that all three\
    \ indices and $i$ are distinct: $i \\neq k \\neq r \\neq m$.\n- Individuals $P_k^g$,\
    \ $P_r^g$ and $P_m^g$ will be used to calculate a variant as follows:\n  $$v_i\
    \ = P_m^g + E \\cdot (P_k^g - P_r^g),$$\n  where $P_m^g$ is called the base vector,\
    \ $(P_k^g - P_r^g)$ is called the difference vector and $E$ (typically $E \\in\
    \ [0, 2]$) is the scaling factor controlling amplification of the difference vector.\n\
    - For a two-dimensional variant, we have:\n  $$v_{ix} = P_{mx}^g + E \\cdot (P_{kx}^g\
    \ - P_{rx}^g) \\quad v_{iy} = P_{my}^g + E \\cdot (P_{ky}^g - P_{ry}^g).$$\n\n\
    For the special case of $E = 1$, the variant becomes $V_i = P_m^g + P_k^g - P_r^g$.\
    \ Using the variant solution $V_i$, create a trial solution $U_i = (u_{ix}, u_{iy})$\
    \ as follows:\n\n- Generate $rand_x$ and $rand_y$ – random real numbers in the\
    \ range $(0, 1)$.\n- Generate $rnbr$ – a random integer in the range $(0, 1)$\
    \ (for the general case, $rnbr$ is a random integer in the range $(0, d - 1)$).\n\
    - The $CR$ (crossover constant) parameter is selected as a real number in the\
    \ range $(0,1)$.\n\nA trial solution for the $x$ dimension is determined as follows:\n\
    \n- if ($rand_x \\leq CR$ OR $rnbr = 0$): variant solution for $x$ dimension is\
    \ used as the trial solution's $x$ dimension: select the trial solution as $u_{ix}\
    \ = v_{ix}$.\n- if ($rand_x > CR$ AND $rnbr \\neq 0$): trial solution's $x$ dimension\
    \ is the same as the $x$ dimension of the individual from generation $g$: $u_{ix}\
    \ = P_{ix}^g$.\n\nSimilarly, a trial solution for the $y$ dimension is obtained\
    \ as follows:\n\n- if ($rand_y \\leq CR$ OR $rnbr = 1$): variant solution for\
    \ $y$ dimension is used as the trial solution's $y$ dimension: select the trial\
    \ solution as $u_{iy} = v_{iy}$.\n- if ($rand_y > CR$ AND $rnbr \\neq 1$): trial\
    \ solution's $y$ dimension is the same as the $y$ dimension of the individual\
    \ from generation $g$: $u_{iy} = P_{iy}^g$.\n\nFigure 18.9 shows examples of generating\
    \ a trial solution for all four possible cases (i.e. only $x$, only $y$ or both\
    \ $x$ and $y$ dimension solutions being selected from the trial solution).\n\n\
    After constructing a trial solution $U_i$, its fitness $f(U_i)$ is calculated.\
    \ Then $f(U_i)$ is compared with the fitness of the current individual $f(P_i^g)$.\
    \ Then a selection is performed as follows. If the trial solution has better fitness\
    \ than the current individual from generation $g$, then it is selected for generation\
    \ $(g + 1)$; otherwise, the current individual from generation $g$ is selected\
    \ such that:\n\n```\nif ($f(U_i) < f(P_i^g)$) then $P_i^{g+1} = U_i$\nelse $P_i^{g+1}\
    \ = P_i^g$.\n```\n\n![](img/a83d807f9a9119b1472555c0ef55797e_322_0.png)\n\n**Figure\
    \ 18.9** Examples of generating a trial solution – all possible cases."

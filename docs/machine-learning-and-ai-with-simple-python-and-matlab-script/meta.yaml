    # 10.2.2 Forward and Back Propagation


    It is time to demonstrate the operations when an input is applied to the one-to-one
    single cell RNN given in Figures 10.2a and b using our simple example alphabet
    of $I = \{\mathbf{h}, \mathbf{e}, \mathbf{1}, \mathbf{o}\}$. Suppose a sequence
    of input characters $x_1, x_2, \cdots$ is applied to the RNN. For a user input
    $x_t$ at time $t$, the RNN computes a hidden state as follows:


    $$h_t = \tanh(U \cdot x_t + W \cdot h_{t-1} + b).$$


    As shown in Figures 10.2a and b, the raw output before the softmax unit, $\Omega_t$,
    is computed as


    $$\Omega_t = V \cdot h_t + c.$$


    Recall from Eqn. (10.1) that the softmax unit converts elements of $\Omega_t$
    to probability values between 0 and 1 and assigns these to $\hat{y}_t$:


    $$\hat{y}_t = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}},$$


    where $\Omega_{t,j}$ represents the $j^{th}$ element of the $\Omega_t$ vector.
    Cross-entropy loss $L$ [93] is an entity defined to represent the difference between
    the RNN prediction and the real output value. For the prediction $\hat{y}_t$ at
    step $t$, $L$ is computed as


    $$L_t = -y_t^o \ln(\hat{y}_t),$$


    where $y_t^o$ is the one-hot encoded value of the target (i.e. correctly predicted)
    output. For an input sequence of length $\mathcal{T}$, the total loss after $\mathcal{T}$
    steps becomes


    $$L = \sum_{t=1}^{\mathcal{T}} L_t.$$


    In order to minimize the loss $L$ in Eq. (10.7), its gradients with respect to
    RNN parameters such as $U, W, V, b$ and $c$ must be computed. Computation of gradients
    corresponds to a back-propagation operation starting from the predicted output
    back to the input, each step performed by a partial derivation. Step-by-step derivations
    of these gradients are presented in Appendix D. We strongly encourage the reader
    to go over this material to understand the actions taken to train an RNN. The
    partial derivatives of $L$ with respect to the weights are as follows:


    $$\frac{\partial L_t}{\partial \Omega_t} = (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)
    \cdot h_t^\top$$


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)$$'

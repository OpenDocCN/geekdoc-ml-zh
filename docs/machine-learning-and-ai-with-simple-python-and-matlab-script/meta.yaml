    # 14 Genetic Algorithms


    ## 14.1 Introduction


    Optimization is different from finding an absolute maximum or minimum for a given
    constraint in that it finds the most suitable solution for the problem under a
    *set* of constraints. For non-linear, discrete or discontinuous space problems,
    which are the characteristics of many real-life applications in the twenty-first
    century, finding an optimal solution is often a challenging task. Most optimization
    problems associated with current engineering and managerial tasks tend to involve
    a large number of requirements typically conflicting with each other. A passenger
    plane on its route to Hawaii aims to optimize fuel consumption by selecting the
    shortest path, while avoiding thick clouds on its way to reduce turbulence which
    may cause extra stress to its wings, but without sharp movements that may make
    passengers uncomfortable. A manager in charge of manufacturing a brain-monitoring
    chip to reduce the effects of Parkinson’s disease on elderly patients has to construct
    a team with doctors, engineers, scientists, chip manufacturers, legal experts,
    and sales and marketing experts from a pool of candidates with different experience
    levels and salary requirements, while staying within a given budget. They will
    be forced to make decisions with adverse effects on their project since they probably
    cannot afford to choose only the top candidate from each field due to budgetary
    restrictions or their availability. Every movie producer, football team manager,
    or space mission commander faces these types of challenges daily. By introducing
    extra layers of complexity, modern tasks necessitate that a new problem-solving
    framework is employed since these requirements are typically beyond the scope
    of conventional optimization methods. Although satisfying multiple conflicting
    criteria is a formidable challenge for traditional methods, multi-objective optimization
    problems are excellent candidates for *biologically inspired* (or *bio-inspired*)
    computation techniques, which are designed to mimic processes found in nature.
    Typical examples of biologically inspired methods include:


    -   *survival of the fittest*: in a given population, only the better (fitter)
    individuals survive, usually the ones who can adapt to dynamically changing environmental
    conditions.

    -   *swarm behaviour*: a flock of birds acts as a single entity for tasks vital
    to the livelihood of the flock; for example, if one of the birds in a flock sees
    a good food source while flying, all birds of the flock benefit from this knowledge.

    -   *evolution of species*: in a given population of species, for survival, individuals
    evolve to adapt to changing environmental conditions; for example, birds in rocky
    islands grow long beaks to pick worms from between rocks.

    -   *social behaviour*: survival among different species and within a population
    of the same species favour those with even the slightest advantage, and hence
    there is fierce competition between different species as well as among the members
    of a given species.


    Being satisfied with an optimal or a near-optimal solution (as opposed to a global
    minimum or maximum), bio-inspired algorithms are capable of operating in otherwise
    prohibitively large problem spaces by emulating an evolutionary process observed
    in nature. Characteristics of bio-inspired techniques include:


    -   handling non-differentiable, nonlinear and multi-modal problems;

    -   parallelization to cope with computation-intensive cost functions;

    -   observability of control variables (e.g. convergence, fitness, diversity);
    and

    -   low computational complexity provided that they are setup properly.


    The most popular bio-inspired computation methods include:


    -   `genetic algorithms` [104] (Chapters 14, 15, 16 and 17)

    -   `particle swarm optimization` [105] (Section 18.2 in Chapter 18)

    -   `differential evolution` [106] (Section 18.3 in Chapter 18) and

    -   `grammatical evolution` [107] (Section 18.4 in Chapter 18).


    In the rest of this chapter, we introduce the basic elements of genetic algorithms
    together with their basic operation and functionality.


    ## 14.2 Genetic Algorithm Elements


    Genetic algorithms (GAs) mimic the evolution processes observed in nature. Hence,
    biological terms are embraced to describe these parallels. A so-called `chromosome`
    represents a possible solution to a given problem and is referred to as an `individual`.
    Typically, a chromosome consists of indivisible building blocks called `codons`,
    whose values are updated as the GA progresses. Below are a few examples for individuals
    in various GA applications:


    -   a location to move for a mobile node

    -   a price to buy or sell a specific financial stock

    -   a voltage to apply to a given port

    -   an angle to cut a specific machine part

    -   an amount of drug to add into a given medicine

    -   a period to wait until repeating an experiment


    A collection of individuals at a given generation is called a `population`. Each
    individual in a population independently seeks to find an optimal solution. The
    number of individuals in a population represents the amount of parallelism employed
    by the GA in a search space. Although individuals of a population change at each
    generation (fitter children replacing less fit parents), population size is usually
    kept constant throughout generations.


    A selection mechanism picks parent chromosomes for a `crossover` operation that
    yields one or more `offspring`. With a small probability, codons may be `mutated`
    (some of its properties are randomly altered). A population evolves from one `generation`
    to the next by selection, crossover and mutation operations. A mathematical function,
    called `fitness`, provides a numerical representation of the proximity of a candidate
    solution to the overall optimization goal. Determining an appropriate fitness
    function for a given problem is crucial in all bio-inspired algorithms.'

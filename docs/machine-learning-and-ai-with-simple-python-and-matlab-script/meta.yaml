    $$\hat{y}_3 = \Theta_{\hat{y}}(\Omega_3) = \text{softmax}(\Omega_3) = \begin{bmatrix}
    0.251 \ 0.249 \ 0.250 \ 0.250 \end{bmatrix}.$$


    For input $x_3 = \mathbf{1}$, the prediction is $\hat{y}_3 = \mathbf{h}$ instead

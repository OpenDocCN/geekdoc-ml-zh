  md: 'Let us now rearrange the terms in the equation above:


    $$\frac{\partial L_4}{\partial E} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \left( \frac{\partial
    Z_4}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial x_1}{\partial
    E} + \frac{\partial Z_4}{\partial h_2} \frac{\partial h_2}{\partial W} + \frac{\partial
    Z_4}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    x_1} \frac{\partial x_1}{\partial E} + \frac{\partial Z_4}{\partial h_3} \frac{\partial
    h_3}{\partial x_3} \frac{\partial x_3}{\partial E} + \frac{\partial Z_4}{\partial
    h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial
    x_2}{\partial E} + \frac{\partial Z_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial
    x_1}{\partial E} + \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial
    x_4} \frac{\partial x_4}{\partial E} + \frac{\partial Z_4}{\partial h_4} \frac{\partial
    h_4}{\partial h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial
    E} + \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial
    h_3}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial x_2}{\partial
    E} + \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial
    h_3}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    x_1} \frac{\partial x_1}{\partial E} \right).$$


    A more compact form of the partial derivative the becomes


    $$\frac{\partial L_4}{\partial E} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \left( \sum_{m=1}^4
    \sum_{k=1}^m \frac{\partial Z_4}{\partial h_m} \prod_{j=k}^{m-1} \frac{\partial
    h_{j+1}}{\partial h_j} \left( \frac{\partial h_k}{\partial x_k} \frac{\partial
    x_k}{\partial E} \right) \right).$$


    For $\mathcal{T}$ steps, we have


    $$\frac{\partial L}{\partial E} = \sum_{t=1}^{\mathcal{T}} \frac{\partial L_t}{\partial
    \hat{y}_t} \frac{\partial \hat{y}_t}{\partial \Omega_t} \frac{\partial \Omega_t}{\partial
    Z_t} \left( \sum_{m=1}^t \sum_{k=1}^m \frac{\partial Z_t}{\partial h_m} \prod_{j=k}^{m-1}
    \frac{\partial h_{j+1}}{\partial h_j} \left( \frac{\partial h_k}{\partial x_k}
    \frac{\partial x_k}{\partial E} \right) \right). \quad (\text{E.24})$$


    We have the individual partial derivatives from above as


    $$\frac{\partial L_t}{\partial \Omega_t} = (\hat{y}_t - y_t^o)$$

    $$\frac{\partial \Omega_t}{\partial Z_t} = V^\dagger$$

    $$\frac{\partial Z_t}{\partial h_m} = \mathcal{A}_{t,m}$$

    $$\frac{\partial h_{j+1}}{\partial h_j} = W^\dagger (1 - h_{j+1}^2)$$

    $$\frac{\partial h_k}{\partial x_k} = (1 - h_k^2) U$$

    $$\frac{\partial x_k}{\partial E} = x_k^o.$$


    By substituting these into Eq. (E.24), we have the partial derivative of $L$ with
    respect to $E$ as


    $$\frac{\partial L}{\partial E} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)
    V^\dagger \left( \sum_{m=1}^t \sum_{k=1}^m \mathcal{A}_{t,m} \prod_{j=k}^{m-1}
    W^\dagger (1 - h_{j+1}^2) \left( (1 - h_k^2) U x_k^o \right) \right). \quad (\text{E.25})$$'

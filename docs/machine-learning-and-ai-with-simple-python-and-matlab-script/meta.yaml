    $$L_3 = -y_3^o \ln(\hat{y}_3) = -\begin{bmatrix} 0 \ 0 \ 1 \ 0 \end{bmatrix} \ln
    \begin{bmatrix} 0.251 \ 0.249 \ 0.250 \ 0.250 \end{bmatrix} = 1.387.$$'

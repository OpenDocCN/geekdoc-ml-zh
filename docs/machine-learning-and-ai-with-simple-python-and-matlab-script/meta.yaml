    \ 9.1 中，频率值在 0 到 10^4 Hz 之间，而时间从 0 延伸到 0.836 秒。\n\n在本章中，我们介绍 Python 和 Matlab 脚本，以实现\
    \ CNN 架构来识别一组特定的口语单词并将其翻译成不同的语言。尽管相当简单，但本章介绍的示例 CNN 阐明了将 CNN 用于语音识别类问题的基本原理。鼓励读者尝试\
    \ CNN 参数，例如层数和类型、滤波器数量和大小以及训练周期数，并观察它们对预测精度的影响。\n\n![](img/a83d807f9a9119b1472555c0ef55797e_155_0.png)\n\
    \n图 9.1 语音频谱图；每个黑色像素代表音频在特定时间存在的频率。\n\n### 9.2 用于语音识别的简单 CNN\n\n由于音频信号可以在频谱图中表示为数字信息，因此它们可以用作\
    \ CNN 的输入。现在可以采用类似于第 8 章介绍的 CNN 字符识别所使用的方法来进行语音识别。本例中的 CNN 读取一个大小为 (1 × 40 × 198)\
    \ 的口语单词频谱图图像，并将输入的口语单词识别为存储的参考音频文件之一。与第 8 章中用于 OCR 应用的示例 CNN 类似，语音识别采用了多个 CL-PL\
    \ 对，以减小频谱图输入的大小（即对输入进行下采样）并提高 CNN 的预测能力。通过这种方式，CNN 将处理更小尺寸的输入，这反过来将减少时间和\n\n![](img/a83d807f9a9119b1472555c0ef55797e_155_1.png)\n\
    \n图 9.2 用于语音识别应用的典型 CNN 架构示例（CNN 中使用多个层来减小频谱图输入的大小，以便训练更快并减少过拟合）。"

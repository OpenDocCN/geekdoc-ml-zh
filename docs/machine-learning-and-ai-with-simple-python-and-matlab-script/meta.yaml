    \ “|” separates alternative definitions for non-terminals. A pair of symbols <\
    \ and > define the start and the end of a non-terminal, respectively. Elements\
    \ of N are mapped to T using a sequence of rules. In these rules, an element of\
    \ N may appear either on the left or right side of a rule. However, terminals\
    \ cannot be on the left"

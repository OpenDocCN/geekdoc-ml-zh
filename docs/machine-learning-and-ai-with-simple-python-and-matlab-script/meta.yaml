    # 5 ANNs for Alzheimer''s Disease Prognosis


    ## 5.1 Introduction


    In this chapter we discuss how machine learning techniques can be exploited for
    solving otherwise formidable and sometimes intractable problems in life sciences.
    As a case study, we show how an ANN can be employed for prediction of Alzheimer''s
    disease (AD) prognosis based on personalized biological information. We also present
    sample Python and Matlab script implementations of such an ANN, trained by field
    data for biomarkers collected from AD patients over time.


    ## 5.2 Alzheimer''s Disease


    Alzheimer''s disease (AD) is an incurable progressive neurodegenerative disorder
    caused by destruction of neurons within the brain, with typical symptoms of cognitive
    decline, memory loss, behavioural changes and functional impairment of an individual.
    As the disease progresses, individuals with AD often experience worsening symptoms
    and a decline in overall health.


    Everyone who develops Alzheimer''s dementia first experiences mild cognitive impairment
    (MCI). Among those with MCI, about 15% develop dementia after two years and approximately
    one-third within five years. However, some individuals with MCI do not have additional
    cognitive decline or revert to normal cognition. Among population-based studies,
    a systematic review and meta-analysis reported a reversion rate of 26% [52]. Therefore,
    it is vitally important to develop tools to predict whether a patient with MCI
    will decline (i.e. progressive MCI) or remain stable (i.e. stable MCI). Determining
    disease trajectories for individuals diagnosed with MCI has major societal impact
    through personalized interventions for patients, their families, caregivers and
    the insurance industry.


    AD is associated with alterations in gene expression patterns in the brain. These
    changes affect various biological processes, including inflammation, synaptic
    functions and neuronal survival. The morbidity rate after an AD diagnosis refers
    to the frequency and incidence of health complications, disabilities and adverse
    events experienced by patients. It depends on several factors, including the age
    at diagnosis, overall health of an individual, access to healthcare and presence
    of other underlying medical conditions. AD is typically a chronic condition that
    leads to significant disability and dependence on others for daily activities
    as it advances. However, it is important to note that AD is a highly individualized
    disease, and the rate and progression of morbidity vary among individuals. Adequate
    support, management of symptoms, access to healthcare and appropriate care-giving
    can help mitigate some of the morbidities associated with AD and improve patient
    quality of life despite the challenges posed by the disease [53].


    Measures to assess an individual''s cognitive abilities, including memory, attention,
    language and executive functions, are called `cognitive scores`. Standardized
    tests are often used to evaluate the severity of cognitive decline in patients.
    `Mini Mental State Exam (MMSE)` scores are popular for assessing cognitive functions
    of a patient over a period of time [54]. In MMSE, there are 30 questions that
    a patient is asked (starting from as simple a question as the names of siblings).


    Another important biomarker is `gene expressions`, which can act as strong indicators
    of AD, as alteration of certain genes can influence disease progression [55].
    Gene expression is a process by which a gene gets turned on in a cell to make
    ribonucleic acid (RNA) and proteins. Gene expression may be measured by looking
    at what the protein does in a cell. The relationship between gene expressions
    and cognitive scores is complex and multifaceted. Gene expression changes can
    contribute to the development and progression of AD, influencing the pathological
    processes involved. These changes can ultimately impact cognitive abilities, leading
    to declines in scores. The `Alzheimer''s disease Neuroimaging Initiative (ADNI)`
    recorded the scores of each patient every week for up to two years, along with
    their gene expressions [56]. The ADNI database contains data from a wide breadth
    of participants, including individuals with AD, MCI and no cognitive issues. Its
    primary objective is to identify and validate biomarkers for AD progression, develop
    improved diagnostic criteria and accelerate the development of new therapies.
    ADNI data includes detailed clinical assessments, neuropsychological test results,
    medical histories, genetic information, brain imaging data and cerebrospinal fluid
    biomarker measurements. The ADNI project has had a significant impact on the field
    of AD research and has resulted in numerous scientific publications, collaborations
    and insights into the disease.


    It has been an ongoing research effort for utilizing ANNs for AD prognosis using
    various biomarkers as inputs to generate a prediction of rate of decline in cognitive
    abilities. For example, imaging modalities, clinical measures and cognitive status
    markers are used in [57]. MRI images of the brain sourced from multiple databases
    for healthy individuals and those diagnosed with AD to form similarities via ANNs
    for disease progression [58]. In [59], the researchers focus on biomarkers that
    may influence AD progression, such as cerebrospinal fluid, plasma biomarkers,
    oxidative stress, metal ions, vascular disorders, protein dysfunctions and alterations
    in the mitochondrial populations, along with markers obtained from amyloid imaging.
    In another study [60], researchers employ MRI information for hippocampal images
    and gene expressions together with MMSE scores to predict AD progression.



    # 15 用于膳食菜单选择的遗传算法


    ## 15.1 引言


    基于人工智能的计算方法能够为原本难以处理的问题获得令人满意的解决方案，前提是能够为问题构建一个合适的模型。在本章中，我们研究一个众所周知的计算成本高昂的问题，即所谓的背包问题（KP）¹
    [109]，并提出一个使用遗传算法的计算可行的解决方案。KP专门设计用于解决那些决策选择必须遵守一系列限制、以最大化任务结果为目标的挑战类型。


    在工程领域，KP代表一类优化问题，其中存在多个且常常相互冲突的要求需要被选择以满足诸如最大化利润或最小化损失等目标。航空公司和海运货船必须选择货物以最大化利润，同时遵守给定航班的重量和容量限制。投资组合经理考虑潜在的投资机会及其预期回报，以在不超过分配预算的情况下最大化收益。项目经理可能需要从具有不同专业水平和薪资的工程师库中选择一个团队，同时包含最高才能水平的个体并保持总成本尽可能低。


    作为一个例子，我们选择一个膳食菜单选择问题，其中将选择一组食物项目，每个项目都有卡路里和蛋白质值，使得所选项目的总卡路里量低于给定限制，同时总蛋白质含量尽可能大。考虑图15.1
    [110]中显示的虚构电影院菜单。假设必须从此菜单中选择项目，使得总卡路里数保持在1000卡路里以下。这一限制意味着不能同时选择中份原味爆米花（600卡路里）和黄油配料（480卡路里），因为总卡路里将超过1000卡路里的限制。另一方面，一个有效的解决方案可能包括中份原味爆米花配纳乔奶酪（160卡路里），总卡路里为640，蛋白质为17克。然而，选择小份原味爆米花（300卡路里）和热狗（530卡路里）是一个更好的解决方案，因为它总共有26克蛋白质。我们可以很容易地看到，如果卡路里限制更高或食物项目数量很多，即使对于这样简单的例子，做出好的菜单选择也将是一项具有挑战性的任务。


    从这个简单的例子中我们可以看到，要找到一个合适的菜单项目选择解决方案，我们必须尝试许多项目组合并检查它们是否满足饮食约束。如果菜单中有更多项目（例如，在典型的饮食菜单中，有数百个项目），这种选择就变成了一个艰巨的问题。事实上，KP的计算成本随着项目数量的线性增长而呈指数级增长¹。因此，我们不能使用传统方法来为背包类问题找到好的解决方案。


    KP的应用领域通常超越工程问题，延伸到商业、金融、制造、任务选择、项目管理和战略决策。例如，在规划投资时，将财务资源分配到股票可以映射为一个最大化长期价值的KP。通过将预期回报、股价和预算分别表示为价值、权重和背包容量，可以通过解决KP来确定每只股票在拟议投资策略中的优先级和重要性
    [111]。以下列表展示了KP典型应用的一小部分：


    -   资源分配问题，其中必须在遵守给定预算和某些时间约束的情况下，对不可分割的项目或任务进行选择和调度。

    -   在金属加工设施中，寻找切割原材料的最省料方法。

    -   在保持关于卡路里、糖和碳水化合物的各种饮食限制的同时，选择营养项目，同时最大化蛋白质或纤维。

    -   项目团队选择，以在特定预算内最大化生产力。

    -   识别移动节点以进行路由网络连接，以最小化延迟并最大化整体吞吐量。

    -   建筑工地、工厂、炼油厂、工厂车间等的电力分配管理和优化调度。



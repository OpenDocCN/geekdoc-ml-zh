    # 3.5.2 Forward Propagation


    The input and output values of the samples shown in Figure 3.1 can be represented
    by the following matrices:


    $$X = \begin{bmatrix} 3 & 5 \ 5 & 1 \ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \ 82 \ 93 \end{bmatrix}.$$


    Let us assume that the link weight values for the $W^{(1)}$ and $W^{(2)}$ matrices
    are assigned randomly as follows:


    $$W^{(1)} = \begin{bmatrix} -1 & 3 & 1 \ 2 & -2 & 1 \end{bmatrix} \quad W^{(2)}
    = \begin{bmatrix} -1 \ 1 \ 2 \end{bmatrix}. \tag{3.3}$$


    Using the $X$ and $W^{(1)}$ matrices, we then have


    $$Z^{(2)} = X \cdot W^{(1)} = \begin{bmatrix} 3 & 5 \ 5 & 1 \ 10 & 2 \end{bmatrix}
    \cdot \begin{bmatrix} -1 & 3 & 1 \ 2 & -2 & -1 \end{bmatrix} = \begin{bmatrix}
    7 & -1 & -2 \ -3 & 13 & 4 \ -6 & 26 & 8 \end{bmatrix}.$$



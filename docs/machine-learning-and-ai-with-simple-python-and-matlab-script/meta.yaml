    ## 12.5 嵌入层


    如第10章第10.5节所述，嵌入用于在训练期间降低输入向量的维度，从而降低通常涉及数十万样本的实际应用的训练计算成本。在图12.3中，我们展示了在一对一单个RNN-Att单元中包含嵌入的情况，其中嵌入矩阵
    $E$ 在应用于编码器之前与独热编码输入向量相乘。$E$ 矩阵的维度为 $(e \times |I|)$，其中 $e$ 和 $|I|$ 分别是嵌入宽度和词典大小。应用'

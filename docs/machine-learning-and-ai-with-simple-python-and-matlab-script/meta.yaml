    # 16


    ## GAs for Drone Flight Control


    ### 16.1 Introduction


    In this chapter, we introduce a popular application of GAs to a real-life problem,
    namely flight control of a drone that operates as a member of a swarm. Typically,
    a drone is capable of making its own flight decisions. In this example application
    we assume that the goal for each drone is to spread uniformly over an area of
    interest such that each drone positions itself as far away from its near neighbours
    as its communication range allows. This task is especially formidable when there
    are no mechanisms for synchronization, collaboration or a leader–follower scheme
    among the drones. Drone flight control is selected for this chapter to illustrate
    the power of GAs in handling these otherwise intractable problems.


    ### 16.2 UAV Swarms


    Unmanned aerial vehicles (UAVs), commonly referred to as drones, are capable of
    eliminating the need for deploying costly equipment and dispatching personnel
    to accomplish complex objectives in many engineering applications. A swarm of
    UAVs can be rapidly sent into areas of interest to operate as a group without
    preexisting infrastructural support. UAVs can form and maintain a mobile ad-hoc
    network (MANET) to accomplish tasks that are difficult with traditional communication
    infrastructures with centralized controllers, human operators and synchronization
    among UAVs [18]. Typical examples include unmanned aerial patrols being deployed
    over industrial sites to detect harmful gas leakages, checking agricultural fields
    for crop health, early detection of forest fires, maintaining a temporary communication
    infrastructure (constellation of access points and base stations) for ground entities
    such as fire-fighters in a disaster scenario, or localization of radio sources
    in rescue missions [19].


    A UAV is typically considered small if its weight is less than 2 kg and its wingspan
    is under one metre. Using small, cheap and disposable UAVs, swarms with tens or
    even hundreds of members can be formed. It is possible to launch them from different
    areas, such as a stationary ground (e.g. from a base station), moving ground (e.g.
    from a truck) or airborne platforms (e.g. a helicopter). These types of small
    swarms are especially useful for operations in hard-to-reach locations. Despite
    their advantages, small UAVs may have inherent restrictions imposed by their limited
    power supply and payload capabilities that restrict their usage to short-duration
    flights. They also have limited on-board processing capabilities, which requires
    lightweight yet fast flight control algorithms. In the example shown in Figure
    16.1a, a swarm of more than 100 small drones were successfully deployed from military
    planes during a set of experiments conducted by the US Department of Defense.
    After being launched from an airborne platform, autonomous 3D-printed Perdix UAVs
    communicated with each other to accomplish missions of hovering over a target
    and forming a circle in the sky [117].


    Larger UAVs have a wide range of weights and sizes. A large drone may weigh as
    much as a ton and have a wingspan of over 10 metres. They have advantages over
    smaller versions by being able to carry heavier payloads and fly farther distances
    for longer durations. However, compared to their smaller counterparts, they also
    tend to be more expensive to operate and require much more extensive infrastructure
    to maintain. Since risks associated with potential crashing of large UAVs could
    be catastrophic, they tend to be pilot-operated throughout their flights. Therefore,
    large UAVs are typically used in forming small swarms. Agricultural tasks, such
    as crop dusting and field watering, are among applications often assigned to large
    drones. Figure 16.1b shows a swarm of large drones, where each UAV is capable
    of carrying 10-litre tanks for weed-controlling substances and can spray tens
    of acres per hour. Swarms of large UAVs are mostly used in rural areas and are
    operated by human pilots with limited autonomy [118].


    Small UAV swarms are much more widely used due to their operational flexibility
    and with low maintenance costs. In the rest of this chapter, without loss of generality,
    we will focus on small UAVs operating as swarms using MANETs as a means of communication.
    However, we should note that the GA-based flight control algorithms introduced
    in this chapter can be implemented equally effectively for large-UAV swarms. We
    will use the terms `drone`, `node`, `mobile node` and `UAV` interchangeably throughout
    this chapter.


    ### 16.3 UAV Flight Control


    Without loss of generality and for the sake of simplicity, all drones are assumed
    to be identical in terms of their flight and communication capabilities. In this
    setting, all UAVs have the same maximum communication range, can broadcast messages
    to their near neighbours within range, aerial speed and manoeuvring capabilities
    are identical, and have on-board computers capable of making flight decisions.


    There are several factors that have to be considered when designing flight control
    algorithms for autonomous UAVs. Limitations in power, flight duration and payload
    capacity are just a few of'

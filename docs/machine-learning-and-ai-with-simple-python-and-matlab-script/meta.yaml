    \n## 6.1 引言\n\n作为人工智能增长最快的应用之一，`自然语言处理`（NLP）旨在让计算机能够理解、解释和处理人类语言。在本章中，我们介绍一个NLP应用，该应用试图识别内容（例如语音、书面文档或短信）中呈现的词语与发生在各种看似不相关的场所的外部事件之间可能存在的、通常是先前未揭示的关系。这类应用的例子包括：一位政治家发表演讲后油价上涨，或一位著名歌手在演唱会上称赞某个特定品牌的鞋子，导致该鞋业对外国劳动力的需求增加。NLP通常被视为语言学、计算学科和工程学的交叉领域，涉及对自然语言的算法分析[63]。\n\
    \nNLP算法的输入通常是一组基于从外部来源或各种现有平台收集的信息生成的`特征`。NLP应用要探索的信息可以是口头或书面内容，从中可以使用各种方法（例如，从特定内容中提取一组关键词，如来自特定领域知名人士的短信）派生出输入特征。例如，给定一组交互片段（例如，一系列电子邮件、语音消息或短信交流），NLP算法可以分析它们，以探索它们之间是否能形成联系（例如，它们是否讨论同一主题）。同样，NLP技术可以通过定义与特定主题强相关的关键词，或为具有多重解释的词语分配相关含义，来识别单个文本中涵盖的主题。在另一个应用中，NLP算法可能会探索篮球队经理的赛前评论与比赛结果之间是否存在关系。有可能经理在对球队那场比赛没有信心但又不能公开这么说的情况下，无意中使用了较弱的措辞（例如，说“我们应该赢”而不是“我们将赢”）。如果通过NLP，对手识别出这种关联，他们可能会在博彩网站上利用这一点，或者通过派出较弱的队伍并让主力球员休息以备其他比赛。同样，政治领导人可能会通过他们在社交媒体上的帖子或为新闻机构举行的新闻发布会，影响各种看似不相关的事件的结果。可以想象，一位领导人慷慨激昂的演讲可能会对金融市场、工会或经济政策决策等外部因素产生积极或不利的影响（图6.1）。如果没有NLP等专业工具的帮助，这些依赖关系通常非常难以识别，甚至不可能识别。\n\
    \n一般来说，NLP技术可以分为两类：基于规则的方法和基于统计的方法[64]。`决策树`[65]是基于规则的NLP技术的典型例子，其中树的顶点和边分别代表条件和可能的结果。决策"

    # 18 进化方法


    ## 18.1 引言


    在本章中，我们概述了主要的进化计算方法，包括第 18.2 节的 `粒子群优化`、第 18.3 节的 `差分进化` 和第 18.4 节的 `语法进化`。对于每种方法，我们都提供一个数值示例，以说明如何在任何语言和软件环境中实现该方法。


    我们想指出进化算法日益强大的可并行化特性，这使其成为解决超大规模问题的绝佳候选者。人们可以轻易地设想，在不久的将来，数百万台湿件计算机并行运行粒子群优化算法，能够以低开销解决太空旅行问题。同样，用于探索星系的自主航天器的最佳飞行控制程序，可以通过语法进化算法生成，该算法使用真实的语法并在数百万台生物计算机上并行运行。


    ## 18.2 粒子群优化


    基于在生物组织中观察到的机制，群体人工智能（SAI）被用于控制和分析分散自主系统的集体行为 [132]。SAI 系统中的智能体与其最近的邻居和外部环境进行交互，以表现出全局智能。


    自组织可以定义为一种从低层级组件之间的交互中涌现出来的能力，这些组件并未被明确设计以实现某个目标 [133]。例如，社会性黄蜂能够建造精致的巢穴，每个工蜂根据局部环境放置建筑材料。通常，黄蜂更有可能在现有墙壁的角落区域添加材料，而不是开始建造一堵新墙
    [134]。随着新材料的放置，巢穴的构型发生改变，这为后来访问该地点的其他黄蜂提供了新的信息。这种通过环境进行的间接通信被称为*共识主动性*。因此，即使是像黄蜂这样简单的昆虫，也能建造非常复杂的结构。自组织系统可能依赖于正反馈和负反馈、随机波动的放大以及个体之间多种直接或间接的共识主动性交互，以获得一个表现出涌现特性的动态系统，该系统具有分叉特性（即，当系统属性改变时，能够获得一个新的稳定解）。


    粒子群优化（PSO）是一种受自然界中观察到的社会和集体行为（如鸟群和鱼群）启发的群体人工智能优化技术。它被开发为一种工具，用于解决最佳解决方案可以表示为空间中一个点的问题
    [105]。PSO 是一种基于群体运动和智能的鲁棒随机优化技术。PSO 实现了社会交互原则来解决多维优化问题。在 PSO 中，如果一个个体找到了一个好的解决方案，其余个体会利用该知识。


    PSO 是一种多智能体并行搜索方法，其中每个在搜索空间中飞行的粒子根据其自身经验（即历史数据）以及其他粒子的经验来调整其飞行路径。在给定时间 $t$，一个位置为
    $P_j^t$、速度为 $V(t)$ 的粒子 $j$ 会跟踪其迄今为止达到的最佳适应度（称为 $P_j^{best}$）以及整个群体迄今为止获得的最佳全局值（称为
    $G^{best}$）。令 $P_j^{g+1}$ 为粒子 $j$ 的新位置，$P_j^g$ 为其当前位置。我们按以下公式更新粒子 $j$ 的速度：


    $V_{g+1} = w V_g + C_1 R_1 (P_j^{best} - P_j^g) + C_2 R_2 (G^{best} - P_j^g)$


    其中 $V_{g+1}$ 和 $V_g$ 分别是粒子 $j$ 的新速度和当前速度，$w$ 是 $[0, 1]$ 范围内的实数，是惯性权重因子。实数 $C_1$
    和 $C_2$ 在 $[0, 4]$ 范围内，实数 $R_1$ 和 $R_2$ 在 $[0, 1]$ 范围内。


    在公式 (18.1) 中，粒子 $j$ 的动量由 $w$ 控制，作为粒子先前经验与整体群体经验之间的权衡。当 $w = 0$ 时，粒子 $j$ 不考虑其任何先前知识，而
    $w = 1$ 则意味着粒子不容易改变其方向。在速度更新中，$R_1$ 影响 $P_j^{best}$，而 $R_2$ 影响 $G^{best}$。对于经验对搜索的贡献，$C_1$
    代表粒子的自信程度，$C_2$ 表示粒子对整个群体运动的信心。粒子 $j$ 的新位置定义为 $P_j^{g+1} = P_j^g + V_{g+1}$。如果粒子
    $j$ 的新位置具有更好的适应度，则更新其个人最佳和全局最佳适应度值。无论其适应度如何，粒子 $j$ 都会移动到新位置。


    ### PSO 的变体


    为了应对多样化的工程应用，已经开发了几种不同类型的 PSO 算法。一种常用的群体优化方法称为离散 PSO（DPSO），它在离散值搜索空间上解决组合优化问题
    [135]。在该算法中，每个粒子的位置和速度用离散值表示，这些值可以是实数或整数。另一种版本的 PSO 算法称为邻域搜索 PSO（NSPSO），它同时考虑局部邻域和全局群体来寻找其试验解。在
    NSPSO 中，粒子首先探索其每个邻居的局部邻域，然后再考虑全局解空间 [136]。在另一种称为邻域保证收敛 PSO（GCPSO）的变体中，通过保持群体内的多样性来实现社交网络的结构，在寻找最佳下一位置时应用了距离限制
    [137]。


    ### 18.2.1 PSO 的应用


    PSO 可以轻松地应用于解决各种工程问题。例如，它在解决通信和计算机网络中的维护和路径发现类应用方面很受欢迎，特别是对于功率受限的移动节点。PSO 可以通过获得最优或近优传输路径来最小化通信成本，同时考虑'

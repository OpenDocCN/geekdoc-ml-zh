  md: '# 18.3.4 Numerical Example: Maximum of sinc by DE


    Let us use DE to find the maximum of the sinc function [147], which is defined
    as


    $$\frac{\sin \sqrt{(x^2 + y^2)}}{\sqrt{(x^2 + y^2)}}$$


    It is well known that traditional methods (e.g. Newtonian approaches or gradient
    ascent and its variations) are likely get stuck at a local maximum. The value
    of the sinc function is analytic everywhere, as the removable singularity at zero
    has the limit value of one (Figure 18.10a). In practice, sinc functions with more
    than 50 dimensions are common. In this simplified example, a two-dimensional sinc
    function will be considered in the range [0, 10]. The extension of this example
    to a sinc function with a high-dimensional space is straightforward. In a typical
    realistic case, the population size for DE is selected as 10 times the number
    of dimensions. For our simple example, the initial population consists of a randomly
    selected four points. The parameters used in the example are presented in Figure
    18.10b.


    The initial randomly chosen population of DE and their depiction as vectors in
    the sinc function are shown in Figures 18.11a and b, respectively. In Figure 18.11a,
    $P_j^0$ represents position $j$ in generation 0 as a potential maximum value for
    the sinc function.



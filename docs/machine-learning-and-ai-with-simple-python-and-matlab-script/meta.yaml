  md: 'If one or more of these parameters are not set up properly, the GA may not
    converge to an optimal (or a near-optimal) solution. Many analytical and numerical
    metrics can be defined to predict and measure GA convergence, including:


    +   - the best fitness in the population improves

    - variance among the fitness of individuals diminishes

    - fitness value oscillation through generations (if any) decreases or diminishes


    As generations progress, we may observe signs of non-convergence:


    +   - population diversity decreases (i.e. all individuals look like each other)

    - fitness values start fluctuating from one generation to another

    - solutions with better fitness are not distinguishable from the less fit ones


    # 14.6 Concluding Remarks


    Bio-inspired computation techniques are typically applied to problems that are
    intractable or computationally too intensive to be solved using classical methods
    (e.g. non-linear optimization problems). As one of the most popular bio-inspired
    techniques, GAs, with their relatively simple design, low cost computational requirements
    and independence from software development platforms, are perfect candidates for
    many real-life optimization problems in a wide variety of settings. For a successful
    implementation, one must be careful in selecting GA parameters, including chromosome
    structure, parent selection mechanism, crossover method, mutation probabilities
    and fitness function definition.


    We cover applications of GAs in the following chapters of this book: finding dietary
    menu selections under nutritional restrictions (i.e. solving the knapsack class
    of problems) in Chapter 15, flight control of autonomous drones in Chapter 16,
    finding optimum routes for travel (i.e. solving the travelling salesman class
    of problems) in Chapter 17 and generating syntactically correct programs for a
    given BNF grammar in Chapter 18.



  md: '# 17.4 Variations of the TSP


    There are several variations of the TSP, each with a different set of restrictions
    imposed on its solutions. It is possible that visiting each city exactly once
    may be too restrictive for certain applications. For example, if there is a costly
    edge between two cities (e.g. due to a congested highway, speed limitations or
    a traffic condition), it may be preferable to avoid such edges by visiting some
    of the remaining cities more than once. In the TSP with multiple visits (TSPM),
    the aim is to minimize the total cost of the trip while visiting each vertex at
    least once (i.e. allowing multiple visits at each city as needed). The path shown
    in Figure 17.7a is a solution to the TSP which visits each city exactly once with
    a cost of 510 miles. If the problem is formulated as a TSPM, the solution has
    a total travelled distance of 320 miles with Toledo visited twice, as shown in
    Figure 17.7b.


    In another variation of the TSP, called the clustered TSP (CTSP), the cities are
    partitioned into clusters such that a minimum-cost tour of all clusters is to
    be determined and each city within a cluster has to be visited before moving to
    the next cluster. A solution to the CTSP may aim to optimize both an ordering
    of cities to be visited within each cluster and a sequence in which clusters are
    toured [129]. As an example of the CTSP, consider testing integrated circuits
    where it is common to cluster ports such that any port in a cluster will have
    the same voltage requirements [123]. To complete the inspection of an integrated
    circuit, a robotic test probe has to measure the voltages at all ports of a cluster
    before moving to the next one. Minimizing the movements of the robot is equivalent
    to the CTSP, where every port at every cluster has to be visited with minimal
    cost.


    The TSP variation that divides the graph vertices into subsets and aims to find
    the minimum-cost tour by passing through exactly one node from each of the subsets
    is called the set TSP (STSP). In some cases the STSP is also referred to as the
    covering salesmen problem (CSP) since it can be applied to find a minimum-cost
    tour among a subset of n cities such that every city not in the tour is within
    a predefined distance of a city that is in the tour. In the CSP, each visited
    city together with its neighbouring cities constitute a neighbourhood set [130].
    As a typical STSP application, consider the task of testing integrated circuits
    by measuring several ports, where the ports are divided into groups such that
    only one port in each group needs to be measured. Minimizing the movements of
    a robotic test probe can be modelled as an STSP.


    # 17.5 GA Solution for the TSP


    Genetic algorithms can find solutions for the travelling salesman class of problems,
    even for cases where the number of nodes to be covered is in the tens of thousands
    or more. For simplicity and without loss of generality, suppose that all cities
    are interconnected by two-way roads,


    ![](img/a83d807f9a9119b1472555c0ef55797e_298_0.png)'

    # 10

    Recurrent Neural Networks


    # 10.1 Introduction


    There are many real-life systems whose outputs depend on the sequence in which
    the inputs are applied to them. For example, in understanding natural languages,
    one has to consider multiple words to make sense of a given sentence (e.g. subject,
    verb, prepositions, adverbs and adjectives), as opposed to analysing each word
    independently. The next state of such a system depends not only on the current
    input applied to it but also on the previous inputs. Such a `recurrent` system
    possesses the ability to utilize the knowledge that it previously generated, be
    its previous outputs or other relevant information. The ANNs that we studied in
    Chapters 2 to 6 consider each input as being independent of the previously applied
    inputs and, therefore, are not suitable to handle a sequence of inputs.


    A `recurrent neural network` (RNN) is a type of artificial neural network, but
    with a significant distinction that its intermediate state information and/or
    outputs are fed as inputs into other neurons (hence the word `recurrent` in the
    name). Similar to other neural networks such as ANNs or CNNs, RNNs are also trained
    by existing field data. However, while the inputs and outputs of ANNs and CNNs
    are supposed to be independent for each sample, RNN outputs depend on previously
    applied inputs, their outputs and some of the information created in the process
    (e.g. so-called hidden states). In Figure 10.1, two versions of an RNN are shown:
    compact and unfolded through time. As can be seen in the unfolded version, a previous
    hidden state of an RNN generated by an earlier input is re-used at a later step
    when processing a new input. For example, when predicting $\hat{y}_t$ at step
    $t$, the RNN uses both the inputs of $x_t$ and the hidden state information generated
    at step $(t-1)$ for input $x_{t-1}$ (i.e. $h_{t-1}$). As step $(t-1)$ information
    influences the output at step $t$, the hidden state generated at time $t$ has
    an impact on prediction $\hat{y}_{t+1}$ at step $(t+1)$. Therefore, step $(t-1)$
    indirectly influences step $(t+1)$, which is why they are called recurrent networks.
    This re-use of internal information creates a type of internal memory, which makes
    RNNs suitable for temporal applications, including language translation, speech
    recognition, and image captioning. RNNs are essential building blocks of many
    popular AI applications, such as Siri, voice search, Google Translate and others
    [86].


    The main elements of an RNN can be listed as follows:


    +   - **Input layer:** the layer that accepts inputs (typically in the form of
    a sequence) at every step.

    - **Hidden Layer:** the layer that stores information generated by current and
    previous steps; it represents the memory of an RNN and is updated at every step
    using current inputs and previous hidden state information. It is also referred
    to as the `encoder` of an RNN.'
  - '[PAGE 173]


    ![](img/a83d807f9a9119b1472555c0ef55797e_173_0.png)


    **Figure 10.1** Input, hidden and output layers of an RNN and a recurrent connection
    combining hidden states (compact and unfolded-through-time presentations).


    +   - **Recurrent Connection**: the connection combining information from previous
    hidden layers with the current input; this is the most important feature of an
    RNN in handling a sequence of inputs.

    - **Output Layer**: the layer that generates predictions at every step (or after
    multiple inputs are applied depending on the RNN architecture as discussed later
    in this chapter). The output layer is also referred to as the `decoder` of an
    RNN.


    In the context of an RNN, the `encoder` is the part of the network that processes
    an input sequence and encodes it into a fixed-length vector representation. In
    this way, an RNN can evaluate input sequences in a numerical form. The output
    of the encoder is called the `current hidden state`, which combines the current
    input with the previously generated hidden layer outputs (i.e. previous hidden
    states). The purpose of the encoder is to ensure that previous inputs applied
    to the RNN are taken into consideration while the current input is processed by
    the RNN. The output of the encoder (i.e. the current hidden state) is then passed
    to the decoder of the RNN for further processing.


    In an RNN, the `decoder` is the component responsible for generating an output
    sequence based on a fixed-length hidden-state vector produced by the encoder.
    Operation of the decoder is similar to an encoder, but in reverse: it takes the
    hidden state as its initial input and generates an element of the output.


    There are different types of RNNs, where the outputs are generated either at every
    step, after multiple inputs are applied, or any combination of the two cases [87].
    A `one-to-one` RNN generates one output for each input applied to it (e.g. a search
    engine suggesting the next word based on the last word that you typed), whereas
    a `one-to-many` RNN produces multiple outputs for a single input (e.g. in generating
    music). In `many-to-one` (e.g. in sentiment analysis) and `many-to-many` RNNs
    (e.g. in natural language translation), a sequence of inputs generates a single
    or a sequence of outputs, respectively.


    In the remainder of this chapter, without loss of generality, we will focus on
    a one-to-one single cell RNN for generating hidden states, outputs and partial
    derivations of loss, as well as updating'
- md: '## 10.2 One-to-One Single RNN Cell


    Let us now analyse the operation of a simple RNN, where there is one input (e.g.
    a single letter selected from a given alphabet of letters), one hidden layer and
    one output (e.g. a single character from the same alphabet). This type of an RNN
    is referred to as a one-to-one RNN. Figure 10.2a presents a compact depiction
    of a one-to-one single RNN cell. This compressed RNN cell functions as a series
    of RNN cells concatenated one after another, as shown in Figure 10.2b. The hidden
    state generated at the immediate previous step (i.e. $h_{t-1}$) is fed into the
    RNN encoder at step $t$. The encoder converts the input into a vector so that
    the RNN can process it and by incorporating the previous hidden states, generates
    the current hidden state, based on which the decoder generates the RNN output.
    Let us now examine the elements of an RNN, as shown in Figure 10.2:


    - $X_t$: input vector at step $t$

    - $U$: weight matrix scaling the input values

    - $b$: bias vector for encoder

    - $h_t$: hidden state at step $t$

    - $W$: weight matrix controlling the previous hidden state information of $h_{t-1}$

    - $\tanh$ unit: an example activation function used in encoder to filter out weaker
    signals

    - $V$: weight matrix for controlling current hidden state information

    - $c$: bias vector for decoder

    - $\Omega_t$: raw output vector generated by encoder before being fed into the
    softmax unit at step $t$

    - softmax unit: a unit to convert decoder outputs to probabilities

    - $\hat{Y}_t$: output vector containing the prediction generated by the RNN at
    step $t$


    An encoder of an RNN cell applies the weight matrix of $U$ to the current input
    vector $X_t$ while scaling the previous hidden state $h_{t-1}$ by weight matrix
    $W$ and scaling by a bias vector $b$, and then sums them and feeds the result
    into the activation unit (e.g. $\tanh$) to generate the current hidden state information,
    $h_t$ (Figure 10.2b). A decoder, on the other hand, scales the hidden state information
    $h_t$ by a weight matrix of $V$ and a bias vector of $c$ to generate raw outputs
    of $\Omega_t$, which are then fed into an activation unit (e.g. softmax) to obtain
    an output prediction of $\hat{Y}_t$. It is important to note that, in Figure 10.2b,
    during different steps, the same weight matrices (i.e. $U, b, W, V$ and $c$) are
    used for different inputs.


    In an RNN, a recurrence formula is applied to an input at step $t$ as follows:


    $$h_t = \Theta_h(U \cdot x_t + W \cdot h_{t-1} + b)$$


    where $h_t$ and $h_{t-1}$ are the current and previous hidden states, respectively,
    $\Theta_h$ is an activation function and $x_t$ is the current input. For most
    RNNs, the activation function $\Theta_h$ in the encoder is typically chosen as
    $\tanh$. It is preferred to other functions because it maintains non-zero values
    for longer ranges of epochs during training. The pre-softmax outputs generated
    by the decoder are called raw outputs and defined as the $\Omega_t$ vector at
    step $t$:


    $$\Omega_t = V \cdot h_t + c$$


    For certain applications, the outputs of the $\Omega_t$ vector are required to
    be generated as probabilities. However, it is possible that they may have negative
    values. To prevent such results, a unit called softmax is employed, which converts
    the raw output values into probabilities with values between 0 and 1, inclusive,
    and hence eliminates negative values in outputs. With softmax, the sum of all
    outputs add up to 1, where each output represents how confident the RNN is that
    it is the correct prediction. For an input alphabet size of $|I|$, output $\hat{y}_t$
    is the value of the prediction at step $t$, which is calculated as a probability
    based on the raw output of value at step $t$ (i.e. $\Omega_t$). Therefore, the
    predicted output of $\hat{y}_t$ is computed as follows:


    $$\hat{y}_t = \Theta_{\hat{y}} = \text{softmax}(\Omega_t) = \begin{bmatrix} \frac{e^{\Omega_{t,1}}}{\sum_{j=1}^{|I|}
    e^{\Omega_{t,j}}} \\ \frac{e^{\Omega_{t,2}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}
    \\ \vdots \\ \frac{e^{\Omega_{t,|I|}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}} \end{bmatrix}
    = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}, \quad (10.1)$$


    where $|I|$ is the size of the alphabet $I$, and $\Omega_{t,i}$ is the $i^{th}$
    element of the $\Omega_t$ matrix. We can see in Eqn. (10.1) that the $\hat{y}_t$
    elements have values between 0 and 1 (excluding 0). It shows that elements of
    raw output $\Omega_t$, whose values may be negative, are replaced with their power
    of $e$ (i.e. $e^{\Omega_{t,i}}$) and divided by the summation of all raw output
    values as powers of $e$. The values for the $\hat{y}_t$ vector, therefore, are
    probabilities with values between 0 and 1 (excluding 0).


    Let us now consider the dimensions of the input, output and weight matrices in
    a one-to-one single RNN cell for an input alphabet of four characters encoded
    with one-hot encoding (a special encoding to represent characters as inputs for
    an RNN as discussed in Section 10.2.1), as shown in Figure 10.3. For this example,
    in the encoder, the dimensions of input vector $X$ and the $U$ matrix are (4 ×
    1) and (1 × 4), respectively. Dimensions for each of $h_{t-1}$, $W$ and $b$ will
    be (1 × 1). Therefore, the dimensions for the inputs applied to and the outputs
    generated by the activation unit (which is realized as tanh in Figure 10.3) will
    be (1 × 1). In the decoder unit, the dimensions for both the $V$ and $c$ matrices
    are (4 × 1). The activation function of the decoder (i.e. $\Theta_y$), realized
    as softmax in Figure 10.3, generates an output prediction vector of $\hat{Y}$
    with the same dimensions as its inputs, which are (4 × 1).


    ### 10.2.1 A Simple Alphabet and One-Hot Encoding


    RNN algorithms cannot easily operate on textual data since numeric representation
    of text is needed for algorithmic procedures. Text inputs for an RNN have to be
    pre-processed using encoding techniques. One such method is called one-hot encoding
    [88, 89], where a sparse vector is populated for each string character in the
    alphabet such that only a single element of this vector is set to one, while the
    others are zero.


    Let us now consider a simple alphabet $I$ consisting of four letters, defined
    as $I = \{\mathbf{h}, \mathbf{e}, \mathbf{l}, \mathbf{o}\}$. Using one-hot encoding,
    each character $d_i$ in $I$ is represented as a vector of length $|I|$ (i.e. the
    total number characters in $I$) with the character''s position in $I$ set to one
    and remaining elements to zeros (i.e. only one position of the vector is hot,
    whereas the remaining positions are cold, hence the name one-hot encoding):


    $$d_i^o = \begin{cases} 1 & \text{if } I_i = d_i, \\ 0 & \text{otherwise.} \end{cases}
    \quad (10.2)$$


    where $I_i$ means the $i^{th}$ position in alphabet $I$. For example, for $d =
    \mathbf{h}$ in alphabet $I = \{\mathbf{h}, \mathbf{e}, \mathbf{l}, \mathbf{o}\}$,
    the one-hot encoding is $\mathbf{h}^o = [1, 0, 0, 0]^\dagger$, where $\dagger$
    represents the transpose operator. Similarly, for $d = \mathbf{e}$, the one-hot
    encoding is $\mathbf{e}^o = [0, 1, 0, 0]^\dagger$.


    Note that one-hot encoding generates sparse vectors of length $|I|$, of which
    only a single element is one. This encoding can be prohibitively inefficient if
    an RNN uses the words in natural language alphabets with tens of thousands of
    words as its inputs, which is the case for machine translation problems. For these
    types of applications, different methods of encoding are preferred depending on
    the input characteristics, including Word2Vec [90], GloVe [91] and sparse encoding
    [92].


    Another popular method to reduce the dimensions of input vectors is to employ
    so-called embedding layers, where the dimensions of input vectors are significantly
    reduced via weight matrices of the embedding layer; we will look at this technique
    in Section 10.5 of this chapter.


    For this simple example, where an alphabet with four letters is used, the expected
    output for inputs, together with the previous input, are given in Table 10.1.
    This example assumes that, as a user enters single inputs, the predictions by
    the RNN will lead the user to spell the word.


    **Table 10.1** Previous and current inputs and expected outputs for the simplistic
    example for a one-to-one RNN.


    | Previous input | Current input | Expected output |

    | :--- | :--- | :--- |

    | - | h | e |

    | h | e | l |

    | e | l | l |

    | l | l | o |'
  mdcn: '## 10.2 一对一单RNN单元


    现在让我们分析一个简单RNN的操作，其中有一个输入（例如，从给定字母表中选出的一个字母）、一个隐藏层和一个输出（例如，来自同一字母表的一个字符）。这种类型的RNN被称为一对一RNN。图10.2a展示了一个一对一单RNN单元的紧凑描述。这个压缩的RNN单元的功能相当于一系列首尾相连的RNN单元，如图10.2b所示。在前一步骤（即
    $h_{t-1}$）生成的隐藏状态被输入到步骤 $t$ 的RNN编码器中。编码器将输入转换为一个向量，以便RNN可以处理它，并通过结合先前的隐藏状态，生成当前的隐藏状态，解码器基于此生成RNN输出。现在让我们查看RNN的各个组成部分，如图10.2所示：


    - $X_t$：步骤 $t$ 的输入向量

    - $U$：缩放输入值的权重矩阵

    - $b$：编码器的偏置向量

    - $h_t$：步骤 $t$ 的隐藏状态

    - $W$：控制 $h_{t-1}$ 先前隐藏状态信息的权重矩阵

    - $\tanh$ 单元：编码器中用于过滤较弱信号的激活函数示例

    - $V$：控制当前隐藏状态信息的权重矩阵

    - $c$：解码器的偏置向量

    - $\Omega_t$：编码器在步骤 $t$ 生成的原始输出向量，在输入softmax单元之前

    - softmax单元：将解码器输出转换为概率的单元

    - $\hat{Y}_t$：包含RNN在步骤 $t$ 生成的预测的输出向量


    RNN单元的编码器将权重矩阵 $U$ 应用于当前输入向量 $X_t$，同时用权重矩阵 $W$ 缩放先前的隐藏状态 $h_{t-1}$，并用偏置向量 $b$
    缩放，然后将它们求和并将结果输入激活单元（例如 $\tanh$）以生成当前的隐藏状态信息 $h_t$（图10.2b）。另一方面，解码器用权重矩阵 $V$ 和偏置向量
    $c$ 缩放隐藏状态信息 $h_t$，以生成原始输出 $\Omega_t$，然后将其输入激活单元（例如softmax）以获得输出预测 $\hat{Y}_t$。需要注意的是，在图10.2b中，在不同的步骤中，相同的权重矩阵（即
    $U, b, W, V$ 和 $c$）被用于不同的输入。


    在RNN中，对步骤 $t$ 的输入应用如下递归公式：


    $$h_t = \Theta_h(U \cdot x_t + W \cdot h_{t-1} + b)$$


    其中 $h_t$ 和 $h_{t-1}$ 分别是当前和先前的隐藏状态，$\Theta_h$ 是激活函数，$x_t$ 是当前输入。对于大多数RNN，编码器中的激活函数
    $\Theta_h$ 通常选择为 $\tanh$。它优于其他函数，因为在训练期间，它能在更长的epoch范围内保持非零值。解码器生成的softmax前输出称为原始输出，并定义为步骤
    $t$ 的 $\Omega_t$ 向量：


    $$\Omega_t = V \cdot h_t + c$$


    对于某些应用，$\Omega_t$ 向量的输出需要以概率形式生成。然而，它们可能具有负值。为了防止这种结果，使用了一个称为softmax的单元，它将原始输出值转换为0到1之间（包括0和1）的概率值，从而消除了输出中的负值。通过softmax，所有输出的总和为1，其中每个输出代表RNN对其是正确预测的置信度。对于输入字母表大小为
    $|I|$，输出 $\hat{y}_t$ 是步骤 $t$ 的预测值，它是基于步骤 $t$ 的原始输出值（即 $\Omega_t$）计算的概率。因此，$\hat{y}_t$
    的预测输出计算如下：


    $$\hat{y}_t = \Theta_{\hat{y}} = \text{softmax}(\Omega_t) = \begin{bmatrix} \frac{e^{\Omega_{t,1}}}{\sum_{j=1}^{|I|}
    e^{\Omega_{t,j}}} \\ \frac{e^{\Omega_{t,2}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}
    \\ \vdots \\ \frac{e^{\Omega_{t,|I|}}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}} \end{bmatrix}
    = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}}, \quad (10.1)$$


    其中 $|I|$ 是字母表 $I$ 的大小，$\Omega_{t,i}$ 是 $\Omega_t$ 矩阵的第 $i^{th}$ 个元素。我们可以从公式 (10.1)
    中看到，$\hat{y}_t$ 元素的值在0到1之间（不包括0）。它表明原始输出 $\Omega_t$ 的元素（其值可能为负）被替换为它们的 $e$ 的幂（即
    $e^{\Omega_{t,i}}$），并除以所有原始输出值作为 $e$ 的幂的总和。因此，$\hat{y}_t$ 向量的值是0到1之间（不包括0）的概率值。


    现在让我们考虑一个一对一单RNN单元中输入、输出和权重矩阵的维度，其中输入字母表包含四个字符，使用独热编码（一种特殊的编码，用于将字符表示为RNN的输入，如第10.2.1节所述），如图10.3所示。对于此示例，在编码器中，输入向量
    $X$ 和 $U$ 矩阵的维度分别为 (4 × 1) 和 (1 × 4)。$h_{t-1}$、$W$ 和 $b$ 的维度均为 (1 × 1)。因此，应用于激活单元（在图10.3中实现为tanh）的输入和生成的输出的维度为
    (1 × 1)。在解码器单元中，$V$ 和 $c$ 矩阵的维度均为 (4 × 1)。解码器的激活函数（即 $\Theta_y$，在图10.3中实现为softmax）生成一个输出预测向量
    $\hat{Y}$，其维度与其输入相同，即 (4 × 1)。


    ### 10.2.1 简单字母表与独热编码


    RNN算法不能轻松处理文本数据，因为算法过程需要文本的数值表示。RNN的文本输入必须使用编码技术进行预处理。其中一种方法称为独热编码 [88, 89]，其中为字母表中的每个字符串字符填充一个稀疏向量，使得该向量中只有一个元素设置为1，而其他元素为零。


    现在让我们考虑一个简单的字母表 $I$，由四个字母组成，定义为 $I = \{\mathbf{h}, \mathbf{e}, \mathbf{l}, \mathbf{o}\}$。使用独热编码，$I$
    中的每个字符 $d_i$ 被表示为一个长度为 $|I|$（即 $I$ 中的总字符数）的向量，其中字符在 $I$ 中的位置设置为1，其余元素设置为零（即向量中只有一个位置是热的，而其余位置是冷的，因此得名独热编码）：


    $$d_i^o = \begin{cases} 1 & \text{if } I_i = d_i, \\ 0 & \text{otherwise.} \end{cases}
    \quad (10.2)$$


    其中 $I_i$ 表示字母表 $I$ 中的第 $i^{th}$ 个位置。例如，对于字母表 $I = \{\mathbf{h}, \mathbf{e}, \mathbf{l},
    \mathbf{o}\}$ 中的 $d = \mathbf{h}$，独热编码为 $\mathbf{h}^o = [1, 0, 0, 0]^\dagger$，其中
    $\dagger$ 表示转置运算符。类似地，对于 $d = \mathbf{e}$，独热编码为 $\mathbf{e}^o = [0, 1, 0, 0]^\dagger$。


    请注意，独热编码生成长度为 $|I|$ 的稀疏向量，其中只有一个元素为1。如果RNN使用自然语言字母表中包含数万个单词的单词作为输入（机器翻译问题就是这种情况），这种编码可能效率极低。对于这类应用，根据输入特性，首选不同的编码方法，包括Word2Vec
    [90]、GloVe [91]和稀疏编码 [92]。


    另一种降低输入向量维度的流行方法是使用所谓的嵌入层，其中输入向量的维度通过嵌入层的权重矩阵显著降低；我们将在本章的第10.5节中探讨这项技术。


    对于这个简单示例，其中使用了一个包含四个字母的字母表，输入与先前输入一起的预期输出在表10.1中给出。此示例假设，随着用户输入单个输入，RNN的预测将引导用户拼写出单词。


    **表10.1** 一对一RNN简单示例的先前输入、当前输入和预期输出。


    | 先前输入 | 当前输入 | 预期输出 |

    | :--- | :--- | :--- |

    | - | h | e |

    | h | e | l |

    | e | l | l |

    | l | l | o |'

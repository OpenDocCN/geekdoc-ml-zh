  md: "# 5.4 Python Script for AD Prognosis Using an ANN\n\nIn this section we present\
    \ a sample Python script implementing the 120-60-15-5-1 architecture shown in\
    \ Figure 5.3, whose inputs are the expressions of 63 AD-related genes and the\
    \ output is the prediction of weekly decline rate for the MMSE score.\n\nAn input\
    \ file is defined as the source of sample data points in line 14. In lines 16\
    \ and 21, input samples are saved in a vector called X. Similarly, outputs from\
    \ the samples are saved in Y in line 25. In lines 36 and 37, output values (i.e.\
    \ decline slopes of MMSE scores) are normalized to avoid numerical inaccuracies\
    \ during training. The loop between lines 56 and 245 processes four patients,\
    \ which are taken out of sample set during training as part of LOOCV method described\
    \ above. In this LOOCV implementation, only four patients are taken out of the\
    \ 215-patient sample set during training (one patient at a time for each iteration\
    \ of the loop), and hence the ANN was trained four separate times, each with 214\
    \ patients. In line 83, an object named model is created to hold the ANN. In lines\
    \ 96–100, a hidden layer with 63 inputs and 120 neurons is created. Consecutive\
    \ hidden layers with 60, 15 and 5 neurons are created in lines 103, 106 and 109,\
    \ respectively. The output layer with a single neuron is created in line 113.\n\
    \nIn all hidden layers, the activation function is selected as rectified linear\
    \ unit (i.e. relu), whereas the output layer uses linear activation (so as not\
    \ to disallow negative results in the output). As mentioned earlier, L1 regularizers\
    \ are employed in the first two hidden layers as a prevention measure against\
    \ over-fitting, as they have high numbers of neurons. All hidden layers are defined\
    \ as dense for a fully-connected ANN. In line 122, the optimizer option is defined\
    \ as adam to employ a gradient descent algorithm to update the parameters of the\
    \ weights/bias based on loss, which is defined to be measured using the mean absolute\
    \ error (i.e. the option mae). A learning rate of α = 0.01 is selected. The number\
    \ of epochs used to train the ANN is set as 500 in line 128.\n\nIn line 139 a\
    \ prediction is generated for the selected gene expressions of the i<sup>th</sup>\
    \ individual in the loop. The prediction is normalized between lines 144 and 151.\
    \ The error is computed in lines 153–158. Plots for the predictions and for the\
    \ real sample data are generated in lines 168 to 256.\n\n```\n1  # The City College\
    \ of New York, City University of New York\n2  # Written by Grace McGrath and\

    57 \n58 % 为神经网络创建模型\n59 % 创建具有4个输入 + 2个隐藏层 + 1个输出层的神经网络\n60 % 第一个隐藏层接受4个指标（SMA、EMA、动量、BB）；\n\
    61 layers = [\n62     featureInputLayer(4)\n63     fullyConnectedLayer(4)\n64\
    \     reluLayer\n65     fullyConnectedLayer(3)\n66     reluLayer\n67     fullyConnectedLayer(1)\n\
    68     regressionLayer];\n69 % 绘图\n70 options = trainingOptions('adam', ...\n\
    71     'MaxEpochs', 200, 'MiniBatchSize', 10, 'InitialLearnRate', 0.01, ...\n\
    72     'LearnRateSchedule', 'piecewise', 'LearnRateDropPeriod', 125, ...\n73 \

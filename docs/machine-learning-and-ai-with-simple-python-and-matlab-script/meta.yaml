    # 3.5.4 Updating Weights


    Let the learning rate be $\alpha = 0.001$, where $\alpha$ is a user-defined parameter
    to indicate how fast the weights should be modified. Updating the weights at a
    rate of $\alpha$ is referred to as *learning*. With higher values of $\alpha$,
    learning will be faster but possibly error prone due to taking larger steps to
    modify. On the other hand, smaller $\alpha$ values will be slower to converge
    to an acceptable solution and will hence increase the cost of training. From Eq.
    (2.17), we have


    $$W_{new}^{(1)} = W^{(1)} - \alpha \frac{\partial J}{\partial W^{(1)}} = \begin{bmatrix}

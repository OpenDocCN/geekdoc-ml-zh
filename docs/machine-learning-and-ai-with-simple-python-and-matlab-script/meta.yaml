    # Preface


    This book is an introduction to artificial intelligence (AI)-based problem solving
    techniques, together with the basic concepts they originated from and their computational
    principles. Readers will see how several real-life problems can be modelled so
    that AI methods can be applied to solve them.


    Each chapter focuses on a realistic challenge but with reduced dimensions, presenting
    a simple, easy-to-follow solution as both Python and Matlab scripts. Projects
    include making financial stock market predictions based on text messages from
    famous people, algorithmic trading of financial assets, bike rental predictions
    for the City of London, personalized prediction of Alzheimer’s disease based on
    genetic information, speech recognition, chatbot implementation and translation
    of written text from one language to another.


    The emphasis on these projects is not to write programs to implement the AI algorithms
    in computer languages but rather to demonstrate the relative simplicity of the
    AI algorithms used to solve these problems.


    After finishing this book, it will become apparent to the reader that although
    much has been accomplished in the world of AI, there is still much more to be
    learned. This book will prepare them for tackling a wide range of complex problems
    by applying cutting-edge AI techniques and advancing on new frontiers.


    **About the cover:** *Yeni Arkadaş (New Friend)* by Mümtaz Yener (private collection
    of his daughter Prof. Dr. Nina Göksun Say-Yener).


    **Mümtaz Yener** (1918–2007) worked and lived in Istanbul as a painter with his
    best friend and wife Şadan Yener. His extensive artwork has been critically acclaimed
    around the world and featured in renowned museum exhibitions and private art collections
    in Turkey, Europe, the United States, Japan and Brazil. He believed that “`freedom
    depends on the amount of domination that humans have over machines.`”'

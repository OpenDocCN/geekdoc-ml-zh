    \n在第18行，将tick数据读入`df`数组。第19行和第20行分别将短期和长期窗口大小定义为5和25。在第25、29、32和40行，分别定义了SMA、EMA、M和BB的技术指标。在第47行，通过将每日价格差除以前一天的收盘价来计算价格的百分比变化。在第48行，将它们移动一天，以便将次日的涨幅对齐为当日。包含上述计算的技术指标每日值的输入向量X在第57行定义，包含价格百分比变化的输出向量Y在第58行定义。\n\
    \n神经网络架构在第63-70行定义，使得神经网络具有两个隐藏层，分别有四个和三个神经元，以及一个具有一个神经元的输出层。所有层都是全连接的，这意味着所有前一层的输入都连接到当前层的所有神经元，如图4.7所示。在第72到76行，定义了神经网络训练的选项：训练周期数为200，批量大小为10（即每次处理10个样本以降低矩阵乘法复杂度），学习率α\

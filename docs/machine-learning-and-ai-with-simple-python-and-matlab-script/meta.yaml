  mdcn: '## 附录 C


    ## CNN 中的反向传播


    图 C.1 展示了第 7 章示例中使用的 ANN。这个全连接 ANN 在输入层和隐藏层之间有 (8x4) 个突触（即 $|W^{(1)}| = 32$），以及
    (1x4) 个偏置（即 $|B^{(1)}| = 4$）；在隐藏层和输出层之间有 (4x2) 个神经元（即 $|W^{(2)}| = 8$），以及 (1x2)
    个偏置（即 $|B^{(2)}| = 2$）。


    回顾图 7.14c，由 UL 生成的 ANN 层的输入和权重为：


    $X = [1.03 \ 0.53 \ 0.53 \ 1.03 \ 1.05 \ 1.05 \ 0.55 \ 1.05]$。


    由于示例输入是 $O$ 形（图 7.7），预期的 ANN 输出为 $Y_1 = 1$ 和 $Y_2 = 0$。以矩阵形式表示，这些输出为：


    $Y = [1 \ 0]$。


    ## ANN 的权重和偏置


    为了说明 CNN 中的反向传播过程，假设初始 ANN 权重和偏置随机选择如下：


    $W^{(1)} = \begin{bmatrix} -0.4 & -0.1 & 0.1 & 0.5 \\ 0.5 & -0.1 & 0.3 & 0.5 \\
    -0.5 & 0.2 & 0.2 & 0.4 \\ 0.2 & -0.4 & 0.2 & 0.4 \\ 0.3 & -0.2 & 0.3 & -0.3 \\
    0.2 & 0.4 & 0.5 & 0.4 \\ 0.2 & -0.1 & 0.1 & 0.2 \\ -0.4 & 0.5 & 0.3 & -0.3 \end{bmatrix}$


    $W^{(2)} = \begin{bmatrix} 0.4 & 0.2 \\ 0.3 & -0.2 \\ 0.5 & -0.3 \\ 0.1 & 0.3
    \end{bmatrix}$


    $B^{(1)} = [0.1 \ 0.3 \ 0.4 \ -0.2]$


    $B^{(2)} = [0.1 \ 0.1]$。


    ## 从 ANN 开始的反向传播


    假设我们通过全连接 ANN 进行前向和反向传播后获得了以下值（为简洁起见省略了中间计算，但它们与第 2 章中呈现的相同）：


    $Y = [0.53 \ 0.41]$


    $W^{(1)} = \begin{bmatrix} -0.4 & -0.8 & 0.12 & 0.52 \\ 0.51 & -0.11 & 0.31 &
    0.49 \\ -0.52 & 0.22 & 0.2 & 0.36 \\ 0.2 & -0.35 & 0.21 & 0.4 \\ 0.33 & -0.2 &
    0.27 & -0.31 \\ 0.19 & 0.37 & 0.41 & 0.42 \\ 0.2 & -0.17 & 0.17 & 0.23 \\ -0.31
    & 0.51 & 0.32 & -0.31 \end{bmatrix}$


    $W^{(2)} = \begin{bmatrix} 0.4 & 0.2 \\ 0.3 & -0.2 \\ 0.5 & -0.3 \\ 0.1 & 0.3
    \end{bmatrix}$


    $\delta^{(2)} = [0.8 \quad -0.7 \quad 0.13 \quad -0.11]$。


    ## 通过 CL 的反向传播


    对于表示卷积层 delta 的 $\delta^C$ 和逐元素乘法 $.*$，我们有：


    $$\delta^C = \delta^{(2)} \cdot W^{(1)T} .* f''(C) = [0.8 \quad -0.7 \quad 0.13
    \quad -0.11] \begin{bmatrix} -0.4 & -0.8 & 0.12 & 0.52 \\ 0.51 & -0.11 & 0.31
    & 0.49 \\ -0.52 & 0.22 & 0.2 & 0.36 \\ 0.2 & -0.35 & 0.21 & 0.4 \\ 0.33 & -0.2
    & 0.27 & -0.31 \\ 0.19 & 0.37 & 0.41 & 0.42 \\ 0.2 & -0.17 & 0.17 & 0.23 \\ -0.31
    & 0.51 & 0.32 & -0.31 \end{bmatrix}^T .* [1 \quad 1 \quad 1 \quad 1 \quad 1 \quad
    1 \quad 1 \quad 1] = [-0.7 \quad 0.03 \quad -0.07 \quad 0.03 \quad 0.11 \quad
    -0.01 \quad 0.01 \quad 0.01].$$


    ## 从 PL 到 CL 的映射


    基于 PL 在前向传播期间先前选择的每个最大值，我们现在将这些最大值映射到它们在 CL 生成的相应输入区域，如图 C.2a 和 b 所示。


    对于滤波器 1，我们有：


    $$\left(\frac{\partial J}{\partial F_1}\right)_1 = I_{C=1} \cdot \delta^{(2)}
    = [-1 \quad 1 \quad 1 \quad -1] \cdot (-0.07) = [0.07 \quad -0.07 \quad -0.07
    \quad 0.07]$$


    $$\left(\frac{\partial J}{\partial F_1}\right)_2 = I_{C=5} \cdot \delta^{(2)}
    = [-1 \quad 1 \quad -1 \quad -1] \cdot (0.03) = [-0.03 \quad 0.03 \quad -0.03
    \quad -0.03]$$


    $$\left(\frac{\partial J}{\partial F_1}\right)_3 = I_{C=5} \cdot \delta^{(2)}
    = [-1 \quad 1 \quad -1 \quad -1] \cdot (-0.07) = [0.07 \quad -0.07 \quad 0.07
    \quad 0.07]$$


    $$\left(\frac{\partial J}{\partial F_1}\right)_4 = I_{C=9} \cdot \delta^{(2)}
    = [-1 \quad 1 \quad 1 \quad -1] \cdot (0.03) = [-0.03 \quad 0.03 \quad 0.03 \quad
    -0.03],$$


    其中 $I_{C=i}$ 表示第 $i^{th}$ 次卷积期间使用的输入矩阵区域，如图 C.2a 所示，而 $\left(\frac{\partial J}{\partial
    F_1}\right)_i$ 表示在第 $i^{th}$ 次池化输出处 $J$ 对滤波器 $F_1$ 的偏导数。


    $$\frac{\partial J}{\partial F_1} = \sum_{i=1}^{4} \left(\frac{\partial J}{\partial
    F_1}\right)_i = [0.07 \quad -0.07 \quad -0.07 \quad 0.07] + [-0.03 \quad 0.03
    \quad -0.03 \quad -0.03]$$

    $$+ [0.07 \quad -0.07 \quad 0.07 \quad 0.07] + [-0.03 \quad 0.03 \quad 0.03 \quad
    -0.03]$$

    $$= [0.08 \quad -0.08 \quad 0 \quad 0.08]$$


    $$\frac{\partial J}{\partial B^{(1)}} = \sum_{n=1}^{4} \delta_n^C = (-0.07) +
    (0.03) + (-0.07) + (0.03) = -0.08.$$


    类似地，对于滤波器 2，我们有：


    $$\left(\frac{\partial J}{\partial F_2}\right)_1 = I_{C=2} \cdot \delta^{(2)}
    = [1 \quad -1 \quad -1 \quad 1] \cdot (0.11) = [0.11 \quad -0.11 \quad -0.11 \quad
    0.11]$$


    $$\left(\frac{\partial J}{\partial F_2}\right)_2 = I_{C=6} \cdot \delta^{(2)}
    = [1 \quad -1 \quad -1 \quad 1] \cdot (0.01) = [0.01 \quad -0.01 \quad -0.01 \quad
    0.01]$$


    $$\left(\frac{\partial J}{\partial F_2}\right)_3 = I_{C=7} \cdot \delta^{(2)}
    = [1 \quad -1 \quad 1 \quad 1] \cdot (0.01) = [0.01 \quad -0.01 \quad 0.01 \quad
    0.01]$$


    $$\left(\frac{\partial J}{\partial F_2}\right)_4 = I_{C=6} \cdot \delta^{(2)}
    = [1 \quad -1 \quad -1 \quad 1] \cdot (0.01) = [0.01 \quad -0.01 \quad -0.01 \quad
    0.01],$$


    其中 $I_{C=i}$ 表示第 $i^{th}$ 次卷积期间使用的输入矩阵区域，如图 C.2b 所示，而 $\left(\frac{\partial J}{\partial
    F_2}\right)_i$ 表示在第 $i^{th}$ 次池化输出处 $J$ 对滤波器 $F_2$ 的偏导数。


    $$\frac{\partial J}{\partial F_2} = \sum_{i=1}^{4} \left(\frac{\partial J}{\partial
    F_2}\right)_i = [0.11 \quad -0.11 \quad -0.11 \quad 0.11] + [0.01 \quad -0.01
    \quad -0.01 \quad 0.01]$$

    $$+ [0.01 \quad -0.01 \quad 0.01 \quad 0.01] + [0.01 \quad -0.01 \quad -0.01 \quad
    0.01]$$

    $$= [0.14 \quad -0.14 \quad -0.12 \quad 0.14]$$


    $$\frac{\partial J}{\partial B^{(2)}} = \sum_{n=5}^{8} \delta_n^C = (0.11) + (0.01)
    + (0.01) + (0.01) = 0.14.$$


    ## CNN 的新权重和偏置


    设学习率为 $\alpha = 0.5$（这个速率在实际情况下通常过高，但这里选择它是为了演示权重的收敛）：


    $$F_{1(new)} = F_1 - \alpha \frac{\partial J}{\partial F_1} = [1 \quad -1 \quad
    -1 \quad 1] - 0.5 [0.08 \quad -0.08 \quad 0 \quad 0.08]$$

    $$= [0.96 \quad -0.96 \quad -1 \quad 0.96]$$


    $$F_{2(new)} = F_2 - \alpha \frac{\partial J}{\partial F_2} = [-1 \quad 1 \quad
    1 \quad -1] - 0.5 [0.14 \quad -0.14 \quad -0.12 \quad 0.14]$$

    $$= [-1.07 \quad 1.07 \quad 1.06 \quad -1.07]$$


    $$B_{(new)}^{(1)} = B^{(1)} - \alpha \frac{\partial J}{\partial B^{(1)}} = [0.1]
    - 0.5 [-0.08] = [0.14]$$


    $$B_{(new)}^{(2)} = B^{(2)} - \alpha \frac{\partial J}{\partial B^{(2)}} = [0.2]
    - 0.5 [0.14] = [0.13],$$


    其中方程左侧使用的下标 $(new)$ 表示滤波器和偏置的更新值，而当前值在右侧。修改滤波器和偏置后，训练继续进行，使用 ANN 输出进行新的前向传播和误差计算，然后进行反向传播以修改滤波器，如此循环往复。


    $$\frac{\partial J}{\partial b^{(2)}} = mean \ \delta^{(3)} = [-0.31]$$


    $$\frac{\partial J}{\partial b^{(1)}} = mean \ \delta^{(2)} = \begin{bmatrix}
    -0.04 & -0.03 & -0.11 \end{bmatrix}.$$


    对于第 2 个训练周期，我们现在可以使用学习率 $\alpha = 0.25$ 计算归一化值的新权重和偏置：


    $$W^{(1)} = W^{(1)} - \alpha \frac{\partial J}{\partial W^{(1)}} = \begin{bmatrix}
    -0.24 & 0.84 & 0.34 \\ 0.57 & -0.39 & -0.17 \end{bmatrix} - 0.25 \begin{bmatrix}
    0.07 & -0.08 & -0.21 \\ 0.05 & -0.03 & -0.17 \end{bmatrix}$$

    $$= \begin{bmatrix} -0.22 & 0.86 & 0.39 \\ 0.58 & -0.38 & -0.13 \end{bmatrix}$$


    $$W^{(2)} = W^{(2)} - \alpha \frac{\partial J}{\partial W^{(2)}} = \begin{bmatrix}
    0.11 & 0.23 \\ 0.36 \end{bmatrix} - 0.25 \begin{bmatrix} -0.3 \\ -0.06 \\ -0.51
    \end{bmatrix} = \begin{bmatrix} 0.19 \\ 0.25 \\ 0.49 \end{bmatrix}$$


    $$b^{(1)} = b^{(1)} - \alpha \frac{\partial J}{\partial b^{(1)}} = [0.18 \quad
    -0.49 \quad 0.42] - 0.25 [0.04 \quad -0.03 \quad -0.11]$$

    $$= [0.19 \quad -0.48 \quad 0.45]$$


    $$b^{(2)} = b^{(2)} - \alpha \frac{\partial J}{\partial b^{(2)}} = [0.28] - 0.25
    [0.31] = [0.36].$$


    使用这些新值，随着训练的继续，新的前向传播为新的训练周期开始。'

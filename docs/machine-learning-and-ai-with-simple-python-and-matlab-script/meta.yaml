    \   displacement_vectors);\n\n        % 为当前节点运行遗传算法\n        % Matlab有其默认的种群大小和代数\n\
    \        % selection包含ga返回的最佳染色体（它是下一个移动方向）：\n        selection = ga(fit_func,chromosome_length,[],[],\
    \ ...\n                    [],[],Lb,Ub,[],int_indices, options);\n\n        %\
    \ 根据ga的选择计算下一个位置：\n        displacement=displacement_vectors(bi2de(selection(3:end),...\n\

    even the last words in an input sequence may affect the translation, generation
    of outputs does not start until the entire input sequence is entered. Therefore,
    an attention mechanism with a many-to-many structure is needed in the RNN architecture.
    Figure 13.2 shows a many-to-many RNN-Att with multiple hidden layers used for
    a machine translator, where no outputs are generated until the user completes
    entering an input sequence in step k, after which external outputs are generated
    and fed back into the RNN-Att as inputs. As can be seen in Figure 13.2, the outputs
    \(\hat{Y}_k, \hat{Y}_{k+1}, \dots\) are applied to the RNN-Att as inputs \(X_{k+1},
    X_{k+2}, \dots\), respectively.


    Since machine translators require a large set of sample data for training and
    use dictionaries with high numbers of words, it is necessary to use multiple embedding
    layers to reduce the input



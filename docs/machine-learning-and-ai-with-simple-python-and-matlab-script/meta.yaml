    # Appendix E


    # Back Propagation Through Time in an RNN with Attention


    # E.1 Back Propagation in an RNN-Att


    In this appendix, for an RNN utilizing an attention mechanism, we present computing
    the partial derivatives of loss with respect to parameters of $h$, $A$, $W$, $Z$,
    $\Omega$, $V$, $c$ and $b$ during a back propagation through time used in RNN-Att
    in Chapter 12.


    $h_t = \Theta_h(W h_{t-1} + U x_t + b)$ (E.1)


    $A_{t,i} = h_i \cdot h_t$ for $i = 1, \dots t$ (E.2)


    $softmax(A_{t,i}) = \frac{e^{A_{t,i}}}{\sum_{k=0}^t e^{A_{t,k}}}$ for $i = 1,
    \dots t$ (E.3)


    $Z_t = \sum_{k=0}^t softmax(A_{t,k}) \cdot h_k$ (E.4)


    $\Omega_t = V \cdot Z_t + c$ (E.5)


    $\hat{y}_t = \Theta_y(\Omega_t)$ (E.6)


    $L_t = -\sum_{i=1}^{|I|} y_{t(i)}^o \ ln(\hat{y}_{t(i)}),$ (E.7)


    where $\Theta_h$ and $\Theta_y$ represent $tanh$ in Eq. (E.1) and $softmax$ in
    Eq. (E.6), respectively. The partial derivative of $\hat{y}_t$ with respect to
    $\Omega_t$ presented in Eq. (D.5) in Appendix D is also valid for an RNN-Att as
    follows:


    $\frac{\partial L_t}{\partial \Omega_t} = \hat{y}_t - y_t^o.$ (E.8)


    Since weight matrix V stays consistent during time steps, we can perform differentiation
    at each time step and then aggregate the results. From Eqs. (E.8), (E.4) and (E.5),
    we have


    $\frac{\partial L}{\partial V} = \sum_{t=1}^T \frac{\partial L_t}{\partial V}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial V} = \sum_{t=1}^T (\hat{y}_t - y_t^o)
    \cdot h_t^\top.$ (E.9)


    For $c$, from Eqs. (E.8) and (E.5), we have


    $\frac{\partial L}{\partial c} = \sum_{t=1}^T \frac{\partial L_t}{\partial c}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial c} = \sum_{t=1}^T (\hat{y}_t - y_t^o).$
    (E.10)'
- md: '## Appendix E Back Propagation Through Time in an RNN with Attention


    The partial derivative of $L$ with respect to $W$ has to be computed through recursion
    as shown in Eq. (E.1). We start from the partial derivative of $L_1$ with respect
    to $W$ at $t = 1$:


    $$\frac{\partial L_1}{\partial W} = \frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial
    \hat{y}_1}{\partial \Omega_1} \frac{\partial \Omega_1}{\partial Z_1} \frac{\partial
    Z_1}{\partial h_1} \frac{\partial h_1}{\partial W}.$$


    For $t = 2$, $W$ includes a dependency on $h_1$ and $h_2$, which yields


    $$\frac{\partial L_2}{\partial W} = \left( \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial \Omega_2} \frac{\partial \Omega_2}{\partial
    Z_2} \frac{\partial Z_2}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial \hat{y}_2}{\partial
    \Omega_2} \frac{\partial \Omega_2}{\partial Z_2} \frac{\partial Z_2}{\partial
    h_2} \frac{\partial h_2}{\partial W} + \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial \Omega_2} \frac{\partial \Omega_2}{\partial
    Z_2} \frac{\partial Z_2}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W} \right).$$


    Similarly, at $t = 3$, $W$ includes $h_1$, $h_2$ and $h_3$ dependencies as follows:


    $$\frac{\partial L_3}{\partial W} = \left( \frac{\partial L_3}{\partial \hat{y}_3}
    \frac{\partial \hat{y}_3}{\partial \Omega_3} \frac{\partial \Omega_3}{\partial
    Z_3} \frac{\partial Z_3}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    \Omega_3} \frac{\partial \Omega_3}{\partial Z_3} \frac{\partial Z_3}{\partial
    h_2} \frac{\partial h_2}{\partial W} + \frac{\partial L_3}{\partial \hat{y}_3}
    \frac{\partial \hat{y}_3}{\partial \Omega_3} \frac{\partial \Omega_3}{\partial
    Z_3} \frac{\partial Z_3}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    \Omega_3} \frac{\partial \Omega_3}{\partial Z_3} \frac{\partial Z_3}{\partial
    h_3} \frac{\partial h_3}{\partial W} + \frac{\partial L_3}{\partial \hat{y}_3}
    \frac{\partial \hat{y}_3}{\partial \Omega_3} \frac{\partial \Omega_3}{\partial
    Z_3} \frac{\partial Z_3}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial W} \right)$$

    $$+ \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    \Omega_3} \frac{\partial \Omega_3}{\partial Z_3} \frac{\partial Z_3}{\partial
    h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W}.$$


    For $t = 4$, the partial derivative of $L_4$ will include terms of $h_1$, $h_2$,
    $h_3$ and $h_4$:


    $$\frac{\partial L_4}{\partial W} = \left( \frac{\partial L_4}{\partial \hat{y}_4}
    \frac{\partial \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial
    Z_4} \frac{\partial Z_4}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_2} \frac{\partial h_2}{\partial W} + \frac{\partial L_4}{\partial \hat{y}_4}
    \frac{\partial \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial
    Z_4} \frac{\partial Z_4}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W} \right)$$

    $$+ \left( \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_3} \frac{\partial h_3}{\partial W} + \frac{\partial L_4}{\partial \hat{y}_4}
    \frac{\partial \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial
    Z_4} \frac{\partial Z_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial W} \right)$$

    $$+ \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial
    h_1}{\partial W}$$

    $$+ \left( \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_4} \frac{\partial h_4}{\partial W} + \frac{\partial L_4}{\partial \hat{y}_4}
    \frac{\partial \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial
    Z_4} \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial
    h_3}{\partial W} \right)$$

    $$+ \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial W} + \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \frac{\partial Z_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial h_1} \frac{\partial h_1}{\partial W}.$$


    Let us now group the common terms:


    $$\frac{\partial L_4}{\partial W} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \left( \left(
    \frac{\partial Z_4}{\partial h_1} \frac{\partial h_1}{\partial W} \right) + \left(
    \frac{\partial Z_4}{\partial h_2} \frac{\partial h_2}{\partial W} + \frac{\partial
    Z_4}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    W} \right) \right.$$

    $$+ \left( \frac{\partial Z_4}{\partial h_3} \frac{\partial h_3}{\partial W} +
    \frac{\partial Z_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial W} + \frac{\partial Z_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial W} \right)$$

    $$+ \left. \left( \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial
    W} + \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial
    h_3}{\partial W} + \frac{\partial Z_4}{\partial h_4} \frac{\partial h_4}{\partial
    h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial W} + \frac{\partial
    Z_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial W} \right)
    \right).$$


    Let us introduce a more compact version of this formula:


    $$\frac{\partial L_4}{\partial W} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial \Omega_4} \frac{\partial \Omega_4}{\partial Z_4} \left( \sum_{m=1}^{4}
    \sum_{k=1}^{m} \frac{\partial Z_4}{\partial h_m} \prod_{j=k}^{m-1} \frac{\partial
    h_{j+1}}{\partial h_j} \left( \frac{\partial h_k}{\partial W} \right) \right).
    \tag{E.11}$$


    Let us generalize Eq. (E.11) for $S$ steps:


    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial
    W} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial Z_t} \left( \sum_{m=1}^{t} \sum_{k=1}^{m}
    \frac{\partial Z_t}{\partial h_m} \prod_{j=k}^{m-1} \frac{\partial h_{j+1}}{\partial
    h_j} \left( \frac{\partial h_k}{\partial W} \right) \right). \tag{E.12}$$


    From Eqs. (E.1)-(E.7), we obtain the following partial derivatives:


    $$\frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial \Omega_t}
    = (\hat{y}_t - y_t^o) \tag{E.13}$$


    $$\frac{\partial \Omega_t}{\partial Z_t} = V^\dagger \tag{E.14}$$


    $$\frac{\partial Z_t}{\partial h_m} = A_{t,m} \tag{E.15}$$


    $$\frac{\partial h_{j+1}}{\partial h_j} = W^\dagger (1 - h_{j+1}^2) \tag{E.16}$$


    $$\frac{\partial h_k}{\partial W} = (1 - h_k^2) h_{k-1}. \tag{E.17}$$


    Substituting Eqs. (E.13) to (E.17) into the partial derivative of $L$ with respect
    to $W$ in Eq. (E.12), we have


    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) \left( (1 - h_k^2) h_{k-1} \right) \right). \tag{E.18}$$


    Now, let us compute the partial derivative of $L$ with respect to $U$. Similarly
    to the case of $W$ in Eq. (E.12) above, for $U$ we have


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial
    U} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial Z_t} \left( \sum_{m=1}^{t} \sum_{k=1}^{m}
    \frac{\partial Z_t}{\partial h_m} \prod_{j=k}^{m-1} \frac{\partial h_{j+1}}{\partial
    h_j} \left( \frac{\partial h_k}{\partial U} \right) \right). \tag{E.19}$$


    Substituting Eqs. (E.13) to (E.17) into the partial derivative of $L$ with respect
    to $U$ in Eq. (E.19), we obtain


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) \left( (1 - h_k^2) x_k \right) \right). \tag{E.20}$$


    The partial derivative of $L$ with respect to $b$ is calculated in a similar manner.
    As in the case of $U$ in Eq. (E.19), for $b$ we have


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial
    b} = \sum_{t=1}^{T} \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial Z_t} \left( \sum_{m=1}^{t} \sum_{k=1}^{m}
    \frac{\partial Z_t}{\partial h_m} \prod_{j=k}^{m-1} \frac{\partial h_{j+1}}{\partial
    h_j} \left( \frac{\partial h_k}{\partial b} \right) \right). \tag{E.21}$$


    We substitute Eqs. (E.13) to (E.17) into Eq. (E.21), and obtain


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) \left( (1 - h_k^2) \right) \right). \tag{E.22}$$'

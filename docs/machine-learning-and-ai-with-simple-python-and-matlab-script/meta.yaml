    Let us select a fully-connected ANN with only one hidden layer containing three
    neurons (Figure 3.2). As described in Chapter 2, the ANN is first trained on historical
    data, which consists of the number of hours spent on sleeping and studying with
    the outcomes of the grades received for those exams. At the start of training,
    link weights and bias are assigned randomly selected values. After one forward
    propagation from the input to the output layers through the hidden layer, a prediction
    for output is obtained, and its error is computed as the difference between the
    real and calculated values of the grades. Through a back propagation, partial
    derivations of the error with respect to the link weights and bias are computed
    such that the weight matrix and bias values are adjusted to reduce the error.
    In our Python and Matlab implementations of this ANN, presented in Sections 3.5.9
    and 3.5.10, respectively, forward and back propagations are repeated 2 000 times.


    After training is complete, the ANN can be used to predict scores for new exams.
    When anticipated number of hours for sleep and study are entered to the ANN for
    an incoming exam, it generates a grade prediction. If the grade is satisfactory,
    the student may follow that schedule for sleep and study. However, if the grade
    is too low, the student has a chance to experiment with the ANN by using different
    sets of input values to find optimal sleep and study hours yielding a satisfactory
    grade. Of course, we recommend that students not spend too much time experimenting
    with an ANN but instead focus on learning the course materials as much as possible,
    regardless of the grade desired.


    ## 3.5.1 Using Matrices for ANN Training


    Let us now consider representing multiple samples used during training as matrices.
    The input values shown in Figure 3.1 can be presented as a matrix, called X, with
    two columns and three rows representing the number of different inputs and the
    number of samples, respectively. Similarly, the sample output values can be arranged
    to form a vector called $Y$:


    $$X = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \\ 82 \\ 93 \end{bmatrix}.$$


    Once the inputs and outputs are represented as matrices, instead of handling each
    sample separately, multiple samples can be handled all at once in training using
    matrix operations. Although computational cost is not reduced, using matrices
    make script implementation of ANNs considerably more convenient compared to additions
    and multiplications of each individual sample separately.


    For the sake of simplicity and without loss of generality, let us use the samples
    given in Figure 3.1 in determining the matrix elements below for the weights at
    various stages of the simple ANN. As mentioned above, for input samples, matrix
    dimensions are the number of samples by the number of ANN inputs. For the samples
    shown in Figure 3.2, the matrix for the inputs will have dimensions of $(3 \times
    2)$:


    $$X = \begin{bmatrix} x_{11} & x_{12} \\ x_{21} & x_{22} \\ x_{31} & x_{32} \end{bmatrix}.$$


    Matrix dimensions for the weights between the input and hidden layers is the number
    of ANN inputs by the number of neurons in the hidden layer. For the ANN in Figure
    3.2, the matrix for the weights will be a $(2 \times 3)$ matrix:


    $$W^{(1)} = \begin{bmatrix} w_{11}^{(1)} & w_{12}^{(1)} & w_{13}^{(1)} \\ w_{21}^{(1)}
    & w_{22}^{(1)} & w_{23}^{(1)} \end{bmatrix}.$$


    For the outputs of hidden layer, we then have


    $$Z^{(2)} = X \cdot W^{(1)} = \begin{bmatrix} x_{11} & x_{12} \\ x_{21} & x_{22}
    \\ x_{31} & x_{32} \end{bmatrix} \cdot \begin{bmatrix} w_{11}^{(1)} & w_{12}^{(1)}
    & w_{13}^{(1)} \\ w_{21}^{(1)} & w_{22}^{(1)} & w_{23}^{(1)} \end{bmatrix} = \begin{bmatrix}
    z_{11}^{(2)} & z_{12}^{(2)} & z_{13}^{(2)} \\ z_{21}^{(2)} & z_{22}^{(2)} & z_{23}^{(2)}
    \\ z_{31}^{(2)} & z_{32}^{(2)} & z_{33}^{(2)} \end{bmatrix}.$$


    For the general case, the matrix for weights between two hidden layers will be
    the number of neurons of current hidden layer by the number of neurons of the
    next hidden layer. Since the example in Figure 3.2 has only one hidden layer,
    the number of neurons between the hidden and output layers will be the number
    of hidden neurons by the number of ANN outputs, which is a $(3 \times 1)$ matrix
    as follows:


    $$W^{(2)} = \begin{bmatrix} w_{1}^{(2)} \\ w_{2}^{(2)} \\ w_{3}^{(2)} \end{bmatrix}.$$


    Therefore, the matrix representing the outputs of the ANN in Figure 3.2, which
    is the matrix resulting from multiplication of matrices in Eqs. (3.1) and (3.2),
    has the dimensions of the number of samples by the number of outputs:


    $$Z^{(3)} = a^{(2)} \cdot W^{(2)} = \begin{bmatrix} z_{11}^{(2)} & z_{12}^{(2)}
    & z_{13}^{(2)} \\ z_{21}^{(2)} & z_{22}^{(2)} & z_{23}^{(2)} \\ z_{31}^{(2)} &
    z_{32}^{(2)} & z_{33}^{(2)} \end{bmatrix} \cdot \begin{bmatrix} w_{1}^{(2)} \\
    w_{2}^{(2)} \\ w_{3}^{(2)} \end{bmatrix} = \begin{bmatrix} z_{1}^{(3)} \\ z_{2}^{(3)}
    \\ z_{3}^{(3)} \end{bmatrix}.$$


    ## 3.5.2 Forward Propagation


    The input and output values of the samples shown in Figure 3.1 can be represented
    by the following matrices:


    $$X = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix} \quad Y = \begin{bmatrix}
    75 \\ 82 \\ 93 \end{bmatrix}.$$


    Let us assume that the link weight values for the $W^{(1)}$ and $W^{(2)}$ matrices
    are assigned randomly as follows:


    $$W^{(1)} = \begin{bmatrix} -1 & 3 & 1 \\ 2 & -2 & 1 \end{bmatrix} \quad W^{(2)}
    = \begin{bmatrix} -1 \\ 1 \\ 2 \end{bmatrix}. \tag{3.3}$$


    Using the $X$ and $W^{(1)}$ matrices, we then have


    $$Z^{(2)} = X \cdot W^{(1)} = \begin{bmatrix} 3 & 5 \\ 5 & 1 \\ 10 & 2 \end{bmatrix}
    \cdot \begin{bmatrix} -1 & 3 & 1 \\ 2 & -2 & -1 \end{bmatrix} = \begin{bmatrix}
    7 & -1 & -2 \\ -3 & 13 & 4 \\ -6 & 26 & 8 \end{bmatrix}.$$


    Suppose a rectilinear activation function is employed in the neurons, which eliminates
    negative values in $Z^{(2)}$. We then compute $a^{(2)}$ as follows:


    $$a^{(2)} = f(Z^{(2)}) = \begin{bmatrix} 7 & 0 & 0 \\ 0 & 13 & 4 \\ 0 & 26 & 8
    \end{bmatrix}.$$


    Using $a^{(2)}$ from above, $Z^{(3)}$ can be computed as follows:


    $$Z^{(3)} = a^{(2)} \cdot W^{(2)} = \begin{bmatrix} 7 & 0 & 0 \\ 0 & 13 & 4 \\
    0 & 26 & 8 \end{bmatrix} \cdot \begin{bmatrix} -1 \\ 1 \\ 2 \end{bmatrix} = \begin{bmatrix}
    -7 \\ 21 \\ 42 \end{bmatrix}.$$


    Then the ANN output for a rectilinear activation function will be (note that since
    the outputs are grades, no negative values are allowed, and, hence, a rectilinear
    activation is acceptable):


    $$\hat{y} = f(Z^{(3)}) = \begin{bmatrix} 0 \\ 21 \\ 42 \end{bmatrix}.$$


    Error $J$ for this iteration is half of the square of the difference between the
    real and computed output values:


    $$J = \sum \frac{1}{2}(y - \hat{y})^2 = \frac{1}{2}((75 - 0)^2 + (82 - 21)^2 +
    (93 - 42)^2) = 5974. \tag{3.4}$$


    ## 3.5.3 Back Propagation


    Let us now perform a back propagation starting from the output layer. Using the
    definition of $\delta^{(3)}$ in Eq. (2.13) from Section 2.6.3, we have


    $$\delta^{(3)} = -(y - \hat{y}) * f''(Z^{(3)}) = -\begin{bmatrix} 75 \\ 61 \\
    51 \end{bmatrix} * \begin{bmatrix} 0 \\ 1 \\ 1 \end{bmatrix} = \begin{bmatrix}
    0 \\ -61 \\ -51 \end{bmatrix},$$


    where $\cdot *$ represents element-wise multiplication. Based on the definition
    of $\delta^{(2)}$ in Eq. (2.15) from Section 2.6.3, we have


    $$\delta^{(2)} = \delta^{(3)} \cdot W^{(2)\dagger} \cdot * f(Z^{(2)}) = \begin{bmatrix}
    0 \\ -61 \\ -51 \end{bmatrix} \cdot [-1 \ -1 \ 2] \cdot * \begin{bmatrix} 1 &
    0 & 0 \\ 0 & 1 & 1 \\ 0 & 1 & 1 \end{bmatrix}$$

    $$= \begin{bmatrix} 0 & 0 & 0 \\ 61 & -61 & -122 \\ 51 & -51 & -102 \end{bmatrix}
    \cdot * \begin{bmatrix} 1 & 0 & 0 \\ 0 & 1 & 1 \\ 0 & 1 & 1 \end{bmatrix} = \begin{bmatrix}
    0 & 0 & 0 \\ 0 & -61 & -122 \\ 0 & -51 & -102 \end{bmatrix}.$$


    Using Eq. (2.14), we have


    $$\frac{\partial J}{\partial W^{(2)}} = a^{(2)\dagger} \cdot \delta^{(3)} = \begin{bmatrix}
    7 & 0 & 0 \\ 0 & 13 & 26 \\ 0 & 4 & 8 \end{bmatrix} \cdot \begin{bmatrix} 0 \\
    -61 \\ -51 \end{bmatrix} = \begin{bmatrix} 0 \\ -2119 \\ -652 \end{bmatrix},$$


    where $\dagger$ represents the matrix transpose operation. With Eq. (2.16), we
    have


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \cdot \delta^{(2)} = \begin{bmatrix}
    3 & 5 & 10 \\ 5 & 1 & 2 \end{bmatrix} \cdot \begin{bmatrix} 0 & 0 & 0 \\ 61 &
    -61 & -122 \\ 51 & -51 & -102 \end{bmatrix} = \begin{bmatrix} 0 & -815 & -1630
    \\ 0 & -163 & -326 \end{bmatrix}.$$


    ## 3.5.4 Updating Weights


    Let the learning rate be $\alpha = 0.001$, where $\alpha$ is a user-defined parameter
    to indicate how fast the weights should be modified. Updating the weights at a
    rate of $\alpha$ is referred to as *learning*. With higher values of $\alpha$,
    learning will be faster but possibly error prone due to taking larger steps to
    modify. On the other hand, smaller $\alpha$ values will be slower to converge
    to an acceptable solution and will hence increase the cost of training. From Eq.
    (2.17), we have


    $$W_{new}^{(1)} = W^{(1)} - \alpha \frac{\partial J}{\partial W^{(1)}} = \begin{bmatrix}
    -1 & 3 & -1 \\ 2 & -2 & -1 \end{bmatrix} - 0.001 \begin{bmatrix} 0 & -815 & -1630
    \\ 0 & -163 & -326 \end{bmatrix}$$

    $$= \begin{bmatrix} -1 & 3.8 & 2.6 \\ 2 & -1.8 & -0.7 \end{bmatrix}$$


    $$W_{new}^{(2)} = W^{(2)} - \alpha \frac{\partial J}{\partial W^{(2)}} = \begin{bmatrix}
    -1 \\ 1 \\ 2 \end{bmatrix} - 0.001 \begin{bmatrix} 0 \\ -2119 \\ -652 \end{bmatrix}
    = \begin{bmatrix} -1 \\ 3.1 \\ 2.7 \end{bmatrix},$$


    where the subscript *new* on the left-hand side of the equations denotes the updated
    values of the weights.


    ## 3.5.5 Forward Propagation with New Weights


    Let us now perform a new forward propagation using the new weights:


    $$W^{(1)} = \begin{bmatrix} -1 & 3.8 & 2.6 \\ 2 & -1.8 & -0.7 \end{bmatrix} \quad
    W^{(2)} = \begin{bmatrix} -1 \\ 3.1 \\ 2.7 \end{bmatrix}$$'

  md: '+   - **Input:** Spectrogram of user audio input with size $(1 \times 40 \times
    198)$.

    - **1st CL:** With $F_{cl} = 12$ filters (typical for audio applications in Python
    and Matlab), each of size $f_{cl} = 3 \times 3$, input spectrogram dimensions
    change from $(1 \times 40 \times 198)$ to $(12 \times 40 \times 198)$ (using zero
    padding).

    - **1st PL:** Using a pool size of $p = (3 \times 3)$ and stride of $s_{pl} =
    2$, spectrogram dimensions are further reduced from $(12 \times 40 \times 198)$
    to $(12 \times 20 \times 99)$.

    - **2nd CL:** There are $F_{cl} = 24$ filters (twice the number of filters in
    the previous layer), each of size $f_{cl} = 3 \times 3$; spectrogram dimensions
    are changed from $(12 \times 20 \times 99)$ to $(24 \times 20 \times 99)$.

    - **2nd PL:** Using a pool size of $p = 3 \times 3$ and stride $s_{pl} = 2$, spectrogram
    dimensions are reduced from $(24 \times 20 \times 99)$ to $(24 \times 10 \times
    50)$.

    - **3rd CL:** There are $F_{cl} = 48$ filters (twice the number of filters in
    the previous layer), each of size $f_{cl} = 3 \times 3$; spectrogram dimensions
    are changed from $(24 \times 10 \times 50)$ to $(48 \times 10 \times 50)$.

    - **3rd PL:** Using a pool size of $p = 3 \times 3$ and stride of $s_{pl} = 2$,
    spectrogram dimensions are reduced from $(48 \times 10 \times 50)$ to $(48 \times
    5 \times 25)$.

    - **4th CL:** There are $F_{cl} = 48$ filters (same as previous CL), each of size
    $f_{cl} = 3 \times 3$; spectrogram dimensions remain at $(48 \times 5 \times 25)$.

    - **5th CL:** There are $F_{cl} = 48$ filters (same as previous CL), each of size
    $f_{cl} = 3 \times 3$; spectrogram dimensions remain at $(48 \times 5 \times 25)$.

    - **4th PL:** Using a pool size of $p = 1 \times 13$ and stride of $s_{pl} = 1$,
    spectrogram dimensions are reduced from $(48 \times 5 \times 25)$ to $(48 \times
    5 \times 13)$.

    - **UL:** After unrolling, spectrogram dimensions are changed from $(48 \times
    5 \times 13)$ to $(3, 127 \times 1 \times 1)$

    - **ANN:** Using a fully-connected layer and no hidden layers, input and output
    sizes are 3127 and $(L \times 1 \times 1)$, respectively, where $L$ is the number
    of unique words to predict.


    # 9.3 Organization of Training and Reference Files


    Similar to the OCR implementation presented in Chapter 8, a directory structure
    is assumed to be present in the host processor running the scripts. Two folders,
    named `TrainingSet` and `ReferenceSet`, are to be created to store the spectrogram
    files used for training and reference purposes, respectively. Figures 9.4 and
    9.5 show a sample organization for the training and reference audio files, which
    is only meant to be an illustrative design and may not to be followed verbatim.
    Contents of the `TrainingSet` and `ReferenceSet` folders are summarized as follows:


    +   - `TrainingSet` folder: The audio files to be used for training the CNN are
    stored in this folder. For each distinct word, there is one sub-folder containing
    the training files for that word. For a CNN with $L$ outputs, there are $L$ sub-folders
    under the `TrainingSet` folder, one for each output word. For example, in the
    `TrainingSet` folder shown in Figure 9.4, there are six different sub-folders,
    namely `Goodbye`, `Hello`, `Nazdarovya`, `Sagol`, `SunnySideUp` and `Welcome`,
    which are the names of the words to be recognized by this example CNN. In each
    sub-folder, there are audio files to be used in training for this word. Note that
    if multiple language inputs are to be accepted by this CNN, then all samples corresponding
    to the same word will be placed into the same sub-folder. For example, in sub-folder
    `SunnySideUp`, there are audio files for English, Korean and Polish pronunciations
    of the word(s) “sunny side up” (there are several files for each language).

    - `ReferenceSet` folder: In this folder, there are the same number of sub-folders
    as in `TrainingSet` (for simplicity, with the same names). When the trained CNN
    identifies a spoken input'

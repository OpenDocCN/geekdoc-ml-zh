    # 18.4 Grammatical Evolution


    Grammatical evolution (GE) is a powerful technique to generate solutions to problems
    where the solutions are computer programs. As for any programming language, GE
    requires that a syntax must be defined for acceptable solutions, specific for
    each application. The programs generated by GE can be implemented using any standard
    programming language. GE is a powerful AI tool, especially for problems where
    a large number of parameters, each with its own search space, need to be considered
    before reaching a solution. An example GE application would be designing an effective
    autonomous driving protocol for self-driven vehicles, where hundreds of input
    variables with different parameter values are required to be evaluated in order
    to make safe decisions in real time.



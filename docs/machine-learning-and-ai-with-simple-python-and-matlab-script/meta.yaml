    \ London, UK. As shown in Figure 3.5, there are five inputs defined for the ANN,\
    \ namely the time of the day, temperature, wind speed, a weather code that describes\
    \ the current climate conditions and a Boolean value indicating whether the day\
    \ is a weekend or not. The ANN output is the number of bike rentals for a given\
    \ hour. These input values are measurements observed in the field, which are used\
    \ as inputs without processing (e.g. finding minimum, maximum, average, and so\
    \ on). The ANN architecture is fully connected and consists of an input layer\
    \ with five inputs, two hidden layers with five and six neurons, and one output\
    \ layer for the predicted number of bike rentals in the next hour. Figure 3.6\
    \ illustrates the ANN layers for the bike rental example, where most of the links\
    \ between layers are omitted in the figure for simplicity. The training process\
    \ is similar to the one described above for the sleep-study example in Section\

    ## 5.4 使用神经网络进行阿尔茨海默病预后的 Python 脚本


    在本节中，我们提供一个实现图 5.3 所示 120-60-15-5-1 架构的示例 Python 脚本，其输入是 63 个阿尔茨海默病相关基因的表达，输出是对
    MMSE 评分每周下降率的预测。


    第 14 行定义了一个输入文件作为样本数据点的来源。在第 16 行和第 21 行，输入样本被保存在一个名为 X 的向量中。类似地，样本的输出在第 25 行被保存在
    Y 中。在第 36 行和第 37 行，输出值（即 MMSE 评分的下降斜率）被归一化，以避免训练过程中的数值不准确。第 56 行到第 245 行之间的循环处理了四名患者，他们在训练过程中被移出样本集，作为上述留一交叉验证方法的一部分。在这个留一交叉验证实现中，训练期间仅从
    215 名患者的样本集中移除了四名患者（每次循环迭代移除一名患者），因此神经网络被单独训练了四次，每次使用 214 名患者。第 83 行创建了一个名为 model
    的对象来保存神经网络。在第 96–100 行，创建了一个具有 63 个输入和 120 个神经元的隐藏层。在第 103、106 和 109 行，分别创建了具有
    60、15 和 5 个神经元的连续隐藏层。第 113 行创建了具有单个神经元的输出层。


    在所有隐藏层中，激活函数被选为修正线性单元（即 relu），而输出层使用线性激活（以避免在输出中禁止负结果）。如前所述，在前两个隐藏层中采用了 L1 正则化器作为防止过拟合的措施，因为它们具有大量的神经元。所有隐藏层都被定义为密集层，以构成一个全连接的神经网络。在第
    122 行，优化器选项被定义为 adam，以采用梯度下降算法根据损失更新权重/偏置的参数，损失被定义为使用平均绝对误差（即选项 mae）来衡量。选择了学习率
    α = 0.01。在第 128 行，用于训练神经网络的周期数被设置为 500。


    在第 139 行，为循环中第 i<sup>th</sup> 个体的选定基因表达生成了一个预测。预测在第 144 行到第 151 行之间被归一化。误差在第 153–158

    # 10.3 A Numerical Example


    Recall the simple alphabet of four characters: $I = \{\mathbf{h}, \mathbf{e},
    \mathbf{1}, \mathbf{o}\}$. One-hot encodings of each character in $I$ are


    $$\mathbf{h}^o : [1, 0, 0, 0]^\dagger \quad \mathbf{e}^o : [0, 1, 0, 0]^\dagger
    \quad \mathbf{1}^o : [0, 0, 1, 0]^\dagger \quad \mathbf{o}^o : [0, 0, 0, 1]^\dagger,$$



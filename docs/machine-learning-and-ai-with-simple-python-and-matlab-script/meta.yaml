    ## 12.7 总结性评述


    在本章中，我们介绍了一种注意力机制，其中在训练的每一步都直接使用所有先前的隐藏状态。这对于机器翻译等应用尤为重要，因为当前输出必须使用先前应用的输入，而在普通
    RNN 中，当前输入的主要关注点是当前和紧邻的前一个隐藏状态。我们详细解释了简单的一对一单单元 RNN-Att 的前向和反向传播操作、损失函数的计算以及参数的更新。带有注意力的
    RNN 是几种更高级语言模型（包括 LSTM 和 transformers [ref]）的基本构建模块。我们期望读者在消化本书所呈现的材料后，能够轻松理解这些高级模型。



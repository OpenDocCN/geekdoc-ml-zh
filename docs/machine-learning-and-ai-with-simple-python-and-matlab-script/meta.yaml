    ## 4.8 Concluding Remarks


    ANNs are excellent candidates for implementing algorithmic trading of financial
    assets based on historical tick data. An underlying assumption is that financial
    tick data may have certain characteristics that can be captured by properly designed
    and trained ANNs, giving an advantage to traders, who would otherwise be forced
    to use their own personal experience and skills to extract or infer such information.
    A known problem in ANN training is inadvertently over-fitting ANN weights to tick
    data, where back-testing results perform well for historical data and not for
    real market situations. Avoiding over-fitting in ANN training is currently an
    open research topic.


    In this chapter we introduce a simplistic ANN model with four popular financial
    technical indicators as inputs generating percentage change of price as its output.
    This ANN model is fully connected and contains two hidden layers. Using Python
    and Matlab scripts, we illustrate how to implement the simplistic ANN model together
    with its hidden layers, activation functions, error calculation method on output
    and the number of epochs to be used for algorithmic trading of financial stocks.
    Although library functions available in Python and Matlab make such implementations
    trivial in principle, poor execution speeds and restricted control over ANN parameters
    mean that professional-level applications require custom software that is developed,
    monitored and maintained by expert programmers and finance experts.


    Although modern computer systems can provide considerable computational power,
    one has to be cautious in selecting the ANN architecture and its inputs and outputs,
    as well as devising trading policies based on such information. It is not clear
    how best to select technical indicators used, hyper-parameters, number of hidden
    layers and activation functions to provide meaningful guidance to professional
    stock traders. It seems that current algorithmic trading applications require
    experience both in computing and finance: the skill-set required for selection
    of technical indicators requires expertise in the finance industry, whereas constructing
    an effective ANN architecture is typically a task for data scientists.



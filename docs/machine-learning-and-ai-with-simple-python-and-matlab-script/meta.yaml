    print_best_path(cell2mat(best_path),cities_data_,distances);\n\n% Functions used\
    \ for TSP GA\n% Compute distance between two locations\nfunction distance = get_distance(latitude1,longitude1,latitude2,longitude2)\n\
    \    R = 6373.0; % radius of the Earth in km\n    % Convert from degrees to radians\n\
    \    lat1 = deg2rad(latitude1);\n    lon1 = deg2rad(longitude1);\n    lat2 = deg2rad(latitude2);\n\
    \    lon2 = deg2rad(longitude2);\n    % Get the change in coordinates\n    dlon\
    \ = lon2 - lon1;\n    dlat = lat2 - lat1;\n\n    % calculate the distance between\
    \ the two coordinates\n    % using Haversine formula\n    a = sin(dlat / 2)^2\
    \ + cos(lat1) * cos(lat2) * sin(dlon / 2)^2;\n    c = 2 * atan2(sqrt(a), sqrt(1\
    \ - a));\n\n    distance = R * c;\n    % convert distance to miles\n    distance\
    \ = distance * 0.621371;\nend\n\n% Function to generate distance matrix for a\

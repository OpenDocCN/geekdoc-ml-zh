    # 7.6 Computational Cost of CNN Training


    Let us consider the computational cost of CNN training. Suppose the dimensions
    of a CNN input are given as (d_i × h_i × w_i) and the CL uses a total of F_cl
    filters, each with the size of (d_i × f_cl × f_cl). As presented in Figure 7.16,
    using a stride size of s_cl, after applying the convolution operation, the CL
    will then generate F_cl matrices, each of size

    $$\left(\frac{h_i - f_{cl}}{s_{cl}} + 1\right) \times \left(\frac{w_i - f_{cl}}{s_{cl}}
    + 1\right)$$.


    Note that even though an input matrix may be d_i-dimensional, the CL always generates
    a 2-D matrix. For typical applications, the number of convolutional filters F_cl
    in CL is selected between 32 and 512, the filter size f_cl as an odd integer (so
    that the filter contains a central pixel) and the stride size as s_cl = 1. Then,
    the size of each of F_cl output matrices becomes

    $$(h_i - f_{cl} + 1) \times (w_i - f_{cl} + 1)$$.

    (7.1)


    Due to the nature of the convolution operation, a CL results in a matrix that
    is smaller in size than its input. This is because the filter cannot cover input
    matrix elements near the borders, resulting in information loss at the borders.
    A solution to remedy this shortcoming is zero padding [77], where additional rows
    and columns of zeros are added to the input matrix. In Figure 7.17a, convolution
    of an input matrix of size (4 × 4) using a (3 × 3) filter generates an output
    matrix of (2 × 2). However, after adding zeros to surround the input matrix, an
    output matrix of (3 × 3) is generated (Figure 7.17b). If necessary, with more
    padding, the output and input matrices can be made the same size.


    ![](img/a83d807f9a9119b1472555c0ef55797e_129_0.png)'

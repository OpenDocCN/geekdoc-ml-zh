- img_proc: true
  md: 'However, there are a few issues to keep in mind when reducing the loss value.
    For example, the problem of "over-fitting" can arise. In this case the model "remembers"
    the training examples so precisely that higher error values occur once again when
    using the different samples of the test set.


    Over-fitting also occurs in cases when a very complex model with an unreasonably
    high number of free parameters is used. Here, the parameters are also adjusted
    so precisely to the training set, that they deliver worse results for other values.


    The accuracy of a model is determined after the model parameters have been optimized
    and established and the learning process is finalized. Then the test samples are
    fed into the model and the number of errors is related to all results. If, for
    example, 1000 results are determined and the model classifies 987 of them correctly,
    the accuracy of the model is 98.7%.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_146_0.png)


    Figure 12.9 shows two typical learning curves. As expected, the accuracy function
    increases over the course of the training. The loss values decrease accordingly.
    In addition, it can be seen that the values finally converge to a certain saturation
    level. If this point is reached, even longer training times fail to improve network
    performance.



  md: '![](img/eafea07aa3f8586de75dade7e29c5aeb_20_0.png)


    Figure 3.2: A neuronal network.


    The layers contain so-called artificial neurons. The function of these neutrons
    is emulated by mathematical operations (see Chapter 11). The aim of this development
    is to simulate the structure of the human brain with its network of neurons, axons,
    dendrites and synapses as efficiently as possible. Deep learning is characterized
    by the use of multiple layers in the neural networks. The input layer processes
    either the direct raw data, for example, the individual pixels of an image, or
    preprocessed or filtered data streams.


    The inner or "hidden" layers take on the further processing and data reduction.
    The output layer finally delivers the results. The typical structure of such a
    neural network is shown in Figure 3.2. The deep learning methods can also be used
    to model complex relationships. The large number of network levels also allows
    to map highly non-linear functions. Without this structure, even simple logical
    gate functions would be unsolvable, as can be seen for example with the XOR gate
    (see Chapter 2).


    In contrast, deep learning algorithms are able to solve comparatively complex
    tasks. Through multiple "training runs", the in-depth learning can be improved
    with each calculation step. It has thus developed into one of the central development
    drivers in the field of artificial intelligence [11].


    The main differences between machine learning and deep learning are conveniently
    summarized in a table.'

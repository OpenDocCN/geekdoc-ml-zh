  md: 'Since a pure facial recognition system does not compare image data with databases,
    no personal biometric data is stored. Without data storage, users in principle
    have less to worry about in terms of data breaches. Facial recognition systems
    for customer counting, etc., are therefore less critical in terms of data security.
    Nevertheless, the current legal situation should always be carefully checked before
    using these devices.


    Some systems are able to provide general information, such as age or gender, without
    specifically identifying the person itself. An example of these techniques is
    presented in Section 15.12. Retailers are thus able to determine which age groups
    the majority of their customers belong to. Accordingly, they can optimize product
    selection or marketing strategies.


    Facial recognition is therefore not completely unacceptable in all cases. In areas
    with a high security requirements, such as in military facilities or at certain
    official buildings the technology can be very useful. If specific personal identification
    is not required, pure facial recognition might be quite uncritical in terms of
    data protection.


    Things are different with facial identification. Here, under certain circumstances,
    the personal rights of the people recorded are deeply interfered with. The mere
    recognition of a person at a certain location is in principle already a violation
    of personal rights. If this information is collected in extensive databases, the
    "transparent person" quickly becomes a reality. The creation of movement profiles
    or the extraction of typical habits and behaviors is no longer a technical problem.
    What possibilities this will open up for interested groups of people can hardly
    be estimated today...


    > **Note:** In order to draw attention to this problem, the pictures of persons
    used in this book were alienated with various procedures.

    Tests of methods, programs, and routines must of course be carried out on original
    images without alienation.


    # 15.2 Machines recognize people and faces


    After the first approaches of machine face recognition, it took over 30 years
    until the first really useful results were achieved with an algorithm called Eigenfaces.
    Since then, however, the topic has been gaining more and more attention and one
    can assume a bright future for this field of research. There is no doubt that
    security applications will continue to play a central role in the future. Both
    facial recognition and identification can be used here.


    Many facial recognition algorithms start by searching for human eyes. These form
    a so-called valley region and are thus one of the easiest features to recognize.
    Once the eyes are detected, the algorithm typically tries to detect other facial
    areas such as the eyebrows, mouth, nose, and iris. Once the initial assumption
    that a facial region has been recognized is confirmed, further tests can be applied.
    These then check whether a human face has actually been detected or whether it
    is a random distribution of features that only resemble a human face. Face identification
    is thus ultimately a biometric procedure that goes far beyond capturing a human
    face in the field of view of a camera.'

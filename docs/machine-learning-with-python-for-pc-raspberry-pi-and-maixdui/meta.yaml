    \ localization was not implemented. The images of the digits must therefore be\
    \ placed directly in front of the camera as well as in order, for identification\
    \ by the network.\n\n## 12.6 Convolutional networks\n\nConvolution is a special\
    \ mathematical operation that enables the similarity of two functions to be determined.\
    \ If the two functions under consideration are very different, their convolution\
    \ integral is almost zero. If there is a certain similarity, the convolution integral\
    \ takes on a higher value.\n\nThis property can also be used to good effect in\
    \ neural networks. The resulting convolutional networks (or convNets for short)\
    \ therefore only partly consist of neurons with trainable weights. Another essential\
    \ component are network segments with preset values. One variant here is to set\
    \ up the ConvNet structures in such a way that they are optimized for input data\
    \ consisting of images. This allows certain properties to be firmly anchored in\
    \ the architecture. Through the convolution function it can be determined in advance\
    \ whether an image contains elements that resemble an arc of a circle, for example,\
    \ or whether rather angular objects such as triangles or squares predominate.\n\
    \nThis makes image evaluation more efficient and the number of parameters required\
    \ in the network can be significantly reduced. In contrast to simple neural networks,\
    \ ConvNets can process inputs in the form of data matrices. Images displayed as\
    \ a matrix (image width × image height × number of color channels) can be used\
    \ directly as input data. A classic neural network in the form of a multi-layer\
    \ perceptron only accepts one-dimensional vectors as input format. In order to\
    \ be able to use images as input data, the individual image pixels must be available\
    \ in a long data series, as in the numerical values in the Iris flower data set\
    \ from Chapter 11.\n\nBecause of this restriction, conventional neural networks\
    \ are for example not able to recognize objects regardless of their orientation\
    \ in the picture. After a slight shift or rotation, identical objects would have\
    \ completely different input vectors. In contrast to this, convolution networks\
    \ are able to recognize structures in the input data. Filters in the input layers\
    \ are optimized to recognize simple geometric structures such as lines, edges\
    \ or colored areas, etc. The filters are automatically adjusted by the network.\
    \ In the next level, more complex elements such as rectangles, circles or ellipses\
    \ etc. are identified. The level of abstraction of the network increases with\
    \ each filter level. Ultimately, even entire objects such as tables and chairs\
    \ or vehicles can be recognized. After appropriate optimization, it is even possible\
    \ to recognize and identify people or animals. Further details are given in more\
    \ detail in subsequent chapters. Which abstractions ultimately lead to the activation\
    \ of the higher layers, depends on the characteristic features of the given classes.\
    \ For a more precise recording of the functionality of a convolution network,\
    \ it can therefore be very interesting to visualize the patterns which lead to\
    \ the activation of the filters on different levels.\n\nThe MNIST data set can\
    \ also be used to train a Convolutional Network. The associated program\n\n```\n\
    MNIST_keras_Train_1V0.py\n```\n\nis once again included in the download package.\
    \ The network topology can be specified by the instruction\n\n```\nmodel.summary()\n\
    ```\n\nand spawns the following output:\n\n```\nModel: \"sequential\"\n_________________________________________________________________\n\
    Layer (type)                Output Shape              Param #   \n=================================================================\n\
    conv2d (Conv2D)             (None, 26, 26, 32)        320       \n_________________________________________________________________\n\
    max_pooling2d (MaxPooling2D (None, 13, 13, 32)        0         \n_________________________________________________________________\n\
    conv2d_1 (Conv2D)           (None, 11, 11, 64)        18496     \n_________________________________________________________________\n\
    max_pooling2d_1 (MaxPooling2 (None, 5, 5, 64)          0         \n_________________________________________________________________\n\
    flatten (Flatten)           (None, 1600)              0         \n_________________________________________________________________\n\
    dropout (Dropout)           (None, 1600)              0         \n_________________________________________________________________\n\
    dense (Dense)               (None, 10)                16010     \n=================================================================\n\
    Total params: 34,826\nTrainable params: 34,826\nNon-trainable params: 0\n```\n\
    \nThe model printout shows that the network already consists of more than 34,000\
    \ trainable parameters. Using graphviz, a clear graphic representation can be\
    \ created (see Figure 12.6). The module (see Section 10.8 or *LINKS.txt* in the\
    \ download package) leads to the following graphical representation of the ConvNet:\n\
    \nMachine Learning with Python\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_143_0.png)\n\
    \nThe graphic once again shows that the network expects data in the first layer\
    \ in the form of images with 28 × 28 = 784 pixels in black and white, i.e., each\
    \ with a single bit:\n\n```\ninput: (?, 28, 28, 1)\n```\n\nBy contrast, the last\
    \ network level consists of a fully connected (\"dense\") layer. It provides 10\
    \ output values:\n\n```\noutput: (?, 10)\n```\n\nwhich are each assigned to one\
    \ of the 10 digits from 0 to 9.\n\nThe entry \"None\", or the question mark in\
    \ the graphic, is a placeholder indicating the network is able to process more\

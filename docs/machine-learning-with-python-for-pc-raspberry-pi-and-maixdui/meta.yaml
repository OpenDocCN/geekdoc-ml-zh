    \ the second option (MicroPython device) must be selected.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_45_0.png)\n\
    \nFigure 8.5: Query when saving.\n\nThe file is now uploaded to the board and\
    \ appears in the Files sub-window. From there it can now be started using the\
    \ green arrow or the **F5** key.\n\nAlternatively, it is also possible to load\

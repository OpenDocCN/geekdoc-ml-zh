- md: "# Machine Learning with Python\n\n## For PC, Raspberry Pi, and Maixduino\n\n\
    ```python\nimport sensor\nimport image\nimport lcd\nimport KPU as kpu\n\nsensor.reset()\n\
    sensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\nsensor.run(1)\n\
    task = kpu.load(0x300000)\nanchor = (1.889, 2.5245, 2.9465, 3.94056, 3.99987,\
    \ 5.3658, 5.155437)\nkpu.init_yolo2(task, 0.5, 0.3, 5, anchor)\nwhile(True):\n\
    \    img = sensor.snapshot()\n    code = kpu.run_yolo2(task, img)\n    if code:\n\
    \        for i in code:\n            print(i)\n            a = img.draw_rectangle(i.rect())\n\
    \    a = lcd.display(img)\n= kpu.deinit(task)\n```\n\nGünter Spanner\n\n# Machine\

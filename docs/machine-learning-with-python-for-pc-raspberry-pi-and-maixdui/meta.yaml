    \ projects."
  mdcn: "通过这种方式，可以获得一个全面的鸢尾花物种数据集，例如：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_101_0.png)\n\
    \n该数据集将在第11.2节的鸢尾花分类示例中发挥核心作用。\n\n## 10.4 使用Scikit、Scipy、SkImage等进行学习和可视化\n\n\
    SciPy（**科学Python**）通常与NumPy结合使用。SciPy通过更多实用函数扩展了NumPy的功能，例如\n\n- 快速最小化/最大化；\n\
    - 回归\n- （快速）傅里叶变换 — FFT\n- 样条\n- 滤波器\n\n以及许多其他功能。\n\n此外，SciPy提供了一些用于处理图像的基本函数。例如，提供了从磁盘读取图像并将图像数据转换为numpy数组的方法。这些方法可用于通过矩阵运算处理图像。这样，图像处理如旋转、缩放、更改图像尺寸或分辨率就很容易处理。下图展示了一个简单的示例，说明了这些功能（参考下载包中的\
    \ *scipy_demo.ipynb*）：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_102_0.png)\n\
    \n图10.12：使用Scipy进行图像处理。\n\n这里，第一步是从原始图像中剪切出一个区域。然后，向图像添加人工噪声。这在测试基于机器学习的噪声滤波器等场景中很有用。最后，使用样条边缘滤波器来增强和强化图像中的边缘。\n\
    \n库 **scikit** 和 **skimage** 提供了进一步的图像处理方法。详细信息可以在后续章节的各种示例中找到。\n\n## 10.5 使用OpenCV进行机器视觉\n\
    \n**计算机视觉（CV）** 是人工智能中最有趣的主题之一。它提供了功能和例程，允许树莓派等设备使用相应的库执行惊人的任务。如果将PiCam连接到树莓派，OpenCV非常适合录制和处理图像或视频。\n\
    \n经典PiCam提供以下特性：\n\n- **尺寸：** 25 mm × 20 mm × 9 mm\n- **传感器：** 500万像素，定焦镜头\n-\
    \ **图像分辨率：** 最高2592 × 1944像素\n- **视频分辨率：** 1920 × 1080 @ 30帧/秒，1280 × 720 @ 60帧/秒，640\
    \ × 480 @ 60至90帧/秒\n- **连接：** 通过排线连接的CSI接口\n\n相机通过树莓派上的15针串行CSI接口（**Camera Serial\
    \ Interface**）连接。与USB相比，该接口的优势在于相机模块与博通芯片之间的直接连接。\n\n使用Python进行机器学习\n\n这意味着即使在较高分辨率下也能实现高帧率。CSI接口位于HDMI和以太网插座之间。要将相机模块的15针排线连接到电路板，请向上拉起CSI连接器的上部，然后将带有蓝色标记的排线插入（朝向以太网连接器），并将锁扣压回原位。这提供了良好的接触，并且排线牢固地连接到树莓派。\n\
    \n现在需要在Raspbian IO中激活相机支持。可以使用配置工具完成：\n\n设置 → 树莓派\n\n在配置菜单中，转到接口选项卡，将相机设置为启用。最后，需要重启，然后就可以使用相机了。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_103_0.png)\n\n图10.13：激活PiCam。\n\n相机模块可以通过两个标准程序进行寻址：\n\
    \n- raspistill（用于图像）；\n- raspivid（用于视频）。\n\n两者都有众多选项。使用指令\n\n```\nraspistill -o\
    \ image.jpg\n```\n\n可以录制测试图像。图片保存在主目录（... / home / pi）中。\n\n如果PiCam成功激活，就可以测试将其集成到Python程序中。OpenCV库非常适合此目的。安装该库的指令序列可以在下载包中找到。使用程序（另见下载包）：\n\
    \n```\nCamCheck_1V0.py\n```\n\n可以检查相机的视频功能。启动程序后：\n\n```\nimport cv2\ncap=cv2.VideoCapture(0)\n\
    cap.set(3,320) # set Width\ncap.set(4,240) # set Height\nwhile(True):\n    ret,\
    \ frame = cap.read()\n    # frame = cv2.flip(frame, 1) # Flip camera\n    gray\
    \ = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)\n    cv2.imshow('frame', frame)\n\
    \    cv2.imshow('gray', gray)\n    key = cv2.waitKey(1) & 0xFF\n    if key ==\
    \ ord(\"q\"):\n        print(\"bye...\")\n        break\ncap.release()\ncv2.destroyAllWindows()\n\
    ```\n\n会打开两个活动的视频窗口。一个显示来自连接相机的视频流的全彩版本，另一个显示黑白版本。视频输出的大小可以通过cap.set控制。视频流在主循环中处理。视频图像方向可以通过以下方式设置\n\
    \n```\nframe = cv2.flip(frame, 1) # Flip camera\n```\n\n这样，即使相机处于不利位置，也总能显示正立的图像。第二个参数控制对齐方式：\n\
    \n- = 0：沿x轴镜像图像（垂直镜像）\n- > 0：沿y轴镜像（水平镜像）\n- < 0：沿两个轴镜像\n\n如果图像方向不需要任何更改，可以注释掉该行。转换为黑白图像通过以下方式完成\n\
    \n```\ngray = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)\n```\n\n视频流使用以下方式可视化：\n\n\
    ```\ncv2.imshow('frame', frame)\n```\n\n其余行是协调程序终止所必需的。使用\n\n```\ncap.release()\n\
    cv2.destroyAllWindows()\n```\n\n终止流并关闭所有打开的视频窗口。\n\n使用Python进行机器学习\n\n或者，可以使用以下Python程序（参见下载包中的\
    \ *OpenCV_demo.py*）进行PiCam的简单实时视频显示：\n\n```\nfrom picamera.array import PiRGBArray\n\
    from picamera import PiCamera\nimport time\nimport cv2\n\ncamera = PiCamera()\n\
    camera.resolution = (320, 240)\ncamera.framerate = 60\nrawCapture = PiRGBArray(camera,\
    \ size=(320, 240))\ntime.sleep(0.1)\n\nfor frame in camera.capture_continuous(rawCapture,\
    \ format=\"bgr\", use_video_port=True):\n    image = frame.array\n    cv2.imshow(\"\
    press 'q' to quit\", image)\n    key = cv2.waitKey(1) & 0xFF\n    rawCapture.truncate(0)\n\
    \    if key == ord(\"q\"):\n        cv2.destroyAllWindows()\n        print(\"\
    bye...\")\n        break\n```\n\nOpenCV的真正优势在于其高效的图像和视频处理。得益于优化的算法，即使使用Pi相对适中的计算能力，也能实现非常有趣的项目。\n\
    \n下图展示了例如在RPi上实时视频流中的轮廓检测（*ContourDetector_1V0.py*）：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_106_0.png)\n\
    \n图10.14：openCV中的实时视频轮廓捕获\n\n也可以在树莓派上同时操作多个相机。除了PiCam，还可以连接USB网络摄像头，如下图所示：\n\n\
    ![](img/eafea07aa3f8586de75dade7e29c5aeb_106_1.png)\n\n图10.15：连接到树莓派的USB网络摄像头和声卡。\n\
    \n如果网络摄像头还包含麦克风，它甚至可以用作声学输入设备。这可以替代树莓派上缺失的麦克风输入。更多详细信息可以在第14章中找到。程序 *DoubleCam.py*\
    \ 展示了如何在RPi上同时操作相机：\n\n使用Python进行机器学习\n\n```\nimport cv2\n\ncap1 = cv2.VideoCapture(0)\n\
    cap1.set(3,320) # set Width\ncap1.set(4,240) # set Height\n\ncap2 = cv2.VideoCapture(1)\n\
    cap2.set(3,320) # set Width\ncap2.set(4,240) # set Height\n\n'''\ncap3 = cv2.VideoCapture(2)\n\
    cap3.set(3,320) # set Width\ncap3.set(4,240) # set Height\n'''\n\nwhile True:\n\
    \    ret1, img1 = cap1.read()\n    cv2.imshow('CAM 1', img1)\n\n    ret2, img2\
    \ = cap2.read()\n    cv2.imshow('CAM 2', img2)\n\n    key = cv2.waitKey(1) & 0xFF\n\
    \    if key == ord(\"q\"):\n        print(\"bye...\")\n        break\n\ncap1.release()\n\
    cap2.release()\ncv2.destroyAllWindows()\n```\n\n通过同时操作两个相机模块，甚至可以捕获3D物体。然而，使用扩展的3D模型进行图像处理时，Pi目前很快就会达到其容量极限。\n\
    \n由于对视频数据的高效处理，openCV也经常用于机器人项目（参见参考文献）。在第13节中，openCV用于物体检测和人脸识别项目。"

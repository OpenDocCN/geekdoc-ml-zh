    Power Supply: 5 V / 3 A (via USB-C)


    # 6.1 The Remote Desktop


    The Raspberry Pi has 4 USB ports and one or, in the case of the RPi 4, even two
    HDMI interfaces. Consequently, the mini-computer can be equipped with a keyboard,
    mouse and screen. Alternatively, it can also be controlled via the Windows Remote
    Desktop. This variant offers several advantages. The keyboard, mouse and screen
    can be used together with the PC. There is no need for separate equipment for
    the RPi. This is particularly advantageous in confined spaces. For example, you
    don''t need an additional monitor or have to switch back and forth between the
    two systems.


    A remote desktop connection to the Raspberry Pi allows complete control of the
    RPi via LAN or WLAN. In principle, the Raspberry Pi can also be controlled almost
    exclusively via the ASCII console, but a graphical interface is usually advantageous,
    specifically for ML applications.


    The remote-desktop connection is already preinstalled on all recent Windows systems
    and is therefore ideal for controlling the RPi. So, if you want to control the
    RPi remotely, the remote desktop connection is a very efficient option, also in
    terms of data volume.


    On the RPi''s side, only a single package is required. This can be downloaded
    by entering


    ```

    sudo apt-get install xrdp

    ```


    All of the important settings are already predefined. You can therefore log on
    to the RPi immediately after completing the installation. On a Windows PC, the
    required program can be found as Remote Desktop Connection in the Start menu.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_27_0.png)


    Figure 6.2: Start window of the Remote Desktop utility.


    In the start window, either the IP of the Pi or the name of the Raspberry (default:
    raspberrypi) is entered as the host name. After that, the login screen of the
    Pi is displayed.'
- md: '## 6.2 Using smartphones and tablets as displays


    The remote desktop functionality is not restricted to MS Windows PCs. Remote Desktop
    apps can also be installed on Android smartphones or tablets. These devices can
    subsequently be used as wireless displays. Since there are no particularly high
    requirements for this application in terms of memory capacity or CPU power, even
    older Android-based devices can be used. Possibly, some older tablets or smartphones
    may find a useful application once again.


    The Remote Desktop App from Microsoft can easily be installed via the Play Store.
    After starting the app, the Raspberry, for example, can be called up via the +
    sign in the app. Figure 6.5 shows how an older tablet can be used as a compact
    screen for the Pi.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_29_0.png)


    Figure 6.5: A tablet-PC acting as a wireless display (via WLAN ) for the Raspberry
    Pi.


    ## 6.3 FileZilla


    If you want to exchange data not only via copy & paste, but also transfer entire
    files between a PC and an RPi, then FileZilla is the right choice. This program
    is available free of charge as server and client software for file transfer via
    FTP and SFTP. With the FileZilla client, the user can connect to an FTP/SFTP server
    and then upload and download files. The program can be downloaded from the Internet
    (see *LINKS.txt* in the download package for the book). After installing and starting
    the program, a connection can be established directly from the PC to the Raspberry
    Pi. The following entries are required for this:


    Server: IP of the Raspberry Pi

    User Name: User Name of the Raspberry (Standard: pi)

    Password: Password for user pi (Standard: raspberry)

    Port: 22


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_30_0.png)


    *Figure 6.6: FileZilla in action.*


    Now you can exchange, copy or move files between the PC and the active Pi in the
    same way as with the Explorer in Windows.


    ## 6.4 Pimp my Pi


    Since the Raspberry does heavy work when training an extensive neural network
    or with complex image processing applications, you should ensure that the processor
    is not subjected to too much thermal stress. Immediate destruction is unlikely,
    as various internal protective mechanisms take effect. Nevertheless, an increased
    chip temperature always has a negative effect on the lifespan of the component
    in question. A first measure is to attach a heatsink to the main processor:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_31_0.png)


    *Figure 6.7: BroadCom-Processor with attached heatsink.*


    However, active cooling with a fan is even more effective. This significantly
    reduces the processor temperature. It makes the Pi a real "number cruncher", not
    easily upset by a high computing load.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_31_1.png)


    *Figure 6.8: Raspberry Pi with cooling fan.*


    With this simple measure, the CPU temperature can easily be reduced by 15ºC or
    more (Figure 6.9).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_32_0.png)


    Figure 6.9: RPi CPU temperature reduction with the help of a fan.


    # Chapter 7 • Sipeed Maix, aka "MaixDuino"


    With the MaixDuino, a low-cost system is available that supports the application
    of artificial intelligence algorithms in particular. With Python, it is no problem
    to get AI algorithms running on a PC or a workstation. However, single-board computers
    such as the MaixDuino also allow equipping small and inexpensive hardware systems
    with appropriate functions and processes [10,11].


    In addition to selecting a system with sufficient computing power, there is always
    the question of which additional hardware components such as cameras, displays,
    microphones, actuators or sensors should be used for data acquisition. Available
    for around 30 euros, the MaixDuino (Figure 7.1) solves this problem in a convenient
    way. In addition to a camera and display interface, the board also provides several
    I/O pins. These are arranged in such a way that the connectors are compatible
    with the familiar Arduino UNO board. Thus, it is in principle possible to operate
    so-called Arduino shields with the MaixDuino as well.


    Not only the hardware is based on the Arduino system. There are also strong similarities
    on the software side. The MaixDuino can also be programmed via the Arduino IDE.
    However, for ML applications, it is advantageous to use Python as programming
    language.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_33_0.png)


    Figure 7.1: The MaixDuino.


    Since the MaixDuino is currently less widespread than the Raspberry Pi, the following
    section will present the most important features of the "Maix" in more detail.


    ## 7.1 Small but mighty: the performance figures of the MaixDuino


    Among other well-known chips, the Kendryte K210 processor works on the MaixDuino
    board. Figure 7.2 shows the most important functional units of this chip.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_34_0.png)


    Figure 7.2: Internal structure of the Kendrite K210.


    Two 64-bit processors (CPU) clocked at 400 megahertz form the core of the system.
    Instead of the familiar ARM architecture, the open-source ISA RISC-V version is
    applied here. Each core is also assigned an FPU (floating-point unit). The license
    fees saved in this way certainly contribute to the low price of the processor.


    The most interesting functional unit is the KPU with the CCN accelerator. KPU
    stands for **Knowledge Processing Unit**. This central function block is able
    to drastically accelerate the processing of mathematical operations that frequently
    occur in special neural networks (e.g., Convolutional Neural Networks).


    KPUs or "AI accelerators" were developed to speed up artificial intelligence applications.
    In particular, artificial neural networks, machine learning or computer-aided
    "vision" can work much more effectively with them. Typical applications can be
    found in robotics or IoT projects [12].


    In addition, an audio processor (APU) ensures the rapid processing of audio signals.
    Other modules are also available, for example for fast Fourier transforms (FFT).
    This makes the board particularly well-equipped for image processing projects
    and audio analysis. In this way, intelligent applications in the AIoT area (**Artificial
    Intelligence of Things**) can be implemented extremely fast and cost-effectively.


    In addition, controller-specific units such as


    - GPIO

    - UART, SPI, I²C

    - Timer

    - PWM


    are available. The following overview summarizes the most important features of
    the Maix-Duino:


    Main Processor: K210 RISC-V Dual Core 64bit, with FPU @ 400 MHz Neural Network
    Processor

    Flash: 16 MB

    RAM: 6 MB + 2 MB exclusively for the KPU

    Co-Controller: ESP32

    Interfaces: Pinheaders compatible with Arduino UNO USB type C 24 LCD connector
    24P Camera connector SD card slot Speaker Output

    Power Supply: USB Type-C or DC 6–12V (converted internally to 5 V / 1.2 A)

    Audio: Onboard bidirectional I2S digital output MEMS Microphone 3 W Speaker output
    (DAC + internal amplifier)

    WLAN: 2.4G 802.11.b/g/n

    Bluetooth: 4.2

    Buttons: Reset and Boot Button

    Periphery: I²C, SPI, I²S, WDT, TIMER, RTC, UART, GPIO


    The board supports direct video output with a resolution of 320×240 pixels (QVGA)
    at a frame rate of 60 frames per second (fps) or VGA (640×480) with 30 fps. The
    MaixDuino is available as a single board or as a starter set (see also the Materials
    section at the end of the book). In addition to the board itself, the latter contains
    two other components:


    - a 2.4" TFT display

    - a suitable camera module


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_35_0.png)


    It is not possible to add more memory to the built-in 8 MB SRAM. The Kendryte
    K210 is primarily intended for IoT devices that (pre-)process image or sound signals.
    Up to eight microphones to be used as a microphone array can be connected directly.
    The digitized signals can then be processed with the FFT and KI units [10,11].'
  mdcn: '## 6.2 使用智能手机和平板电脑作为显示器


    远程桌面功能不仅限于MS Windows PC。远程桌面应用也可以安装在Android智能手机或平板电脑上。这些设备随后可用作无线显示器。由于此应用对内存容量或CPU性能没有特别高的要求，即使是较旧的Android设备也可以使用。也许，一些较旧的平板电脑或智能手机会再次找到有用的应用场景。


    微软的远程桌面应用可以通过Play Store轻松安装。启动应用后，例如可以通过应用中的+号调用树莓派。图6.5展示了如何将一个旧平板电脑用作树莓派的紧凑型屏幕。


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_29_0.png)


    图6.5：一台平板电脑作为树莓派的无线显示器（通过WLAN）。


    ## 6.3 FileZilla


    如果你想不仅通过复制粘贴来交换数据，还要在PC和RPi之间传输整个文件，那么FileZilla是正确的选择。该程序作为通过FTP和SFTP进行文件传输的服务器和客户端软件，可以免费获取。使用FileZilla客户端，用户可以连接到FTP/SFTP服务器，然后上传和下载文件。该程序可以从互联网下载（参见下载包中的*LINKS.txt*）。安装并启动程序后，可以直接从PC建立到树莓派的连接。需要以下条目：


    服务器：树莓派的IP地址

    用户名：树莓派的用户名（默认：pi）

    密码：用户pi的密码（默认：raspberry）

    端口：22


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_30_0.png)


    *图6.6：FileZilla运行中。*


    现在你可以像在Windows资源管理器中一样，在PC和活动的Pi之间交换、复制或移动文件。


    ## 6.4 改造我的Pi


    由于树莓派在训练大型神经网络或处理复杂图像应用时工作繁重，你应该确保处理器不会承受过大的热应力。立即损坏的可能性不大，因为各种内部保护机制会生效。然而，芯片温度升高总是会对相关组件的寿命产生负面影响。第一个措施是在主处理器上安装散热片：


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_31_0.png)


    *图6.7：安装了散热片的BroadCom处理器。*


    然而，使用风扇进行主动冷却甚至更有效。这可以显著降低处理器温度。它使Pi成为一个真正的“数字处理器”，不会轻易被高计算负载所困扰。


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_31_1.png)


    *图6.8：带有冷却风扇的树莓派。*


    通过这个简单的措施，CPU温度可以轻松降低15ºC或更多（图6.9）。


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_32_0.png)


    图6.9：借助风扇降低RPi CPU温度。


    # 第7章 • Sipeed Maix，又名“MaixDuino”


    MaixDuino提供了一个低成本系统，特别支持人工智能算法的应用。使用Python，在PC或工作站上运行AI算法没有问题。然而，像MaixDuino这样的单板计算机也允许为小型且廉价的硬件系统配备相应的功能和流程[10,11]。


    除了选择具有足够计算能力的系统外，总是需要考虑使用哪些额外的硬件组件，如摄像头、显示器、麦克风、执行器或传感器来进行数据采集。售价约30欧元的MaixDuino（图7.1）以一种便捷的方式解决了这个问题。除了摄像头和显示器接口外，该板还提供了多个I/O引脚。这些引脚的排列方式使得连接器与熟悉的Arduino
    UNO板兼容。因此，原则上也可以使用所谓的Arduino扩展板与MaixDuino一起工作。


    不仅硬件基于Arduino系统。在软件方面也有很强的相似性。MaixDuino也可以通过Arduino IDE进行编程。然而，对于机器学习应用，使用Python作为编程语言是有利的。


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_33_0.png)


    图7.1：MaixDuino。


    由于MaixDuino目前不如树莓派普及，下一节将更详细地介绍“Maix”的主要特性。


    ## 7.1 小而强大：MaixDuino的性能数据


    除了其他知名芯片外，Kendryte K210处理器在MaixDuino板上工作。图7.2展示了该芯片最重要的功能单元。


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_34_0.png)


    图7.2：Kendrite K210的内部结构。


    两个时钟频率为400兆赫兹的64位处理器（CPU）构成了系统的核心。这里采用的是开源的ISA RISC-V版本，而不是熟悉的ARM架构。每个核心还分配了一个FPU（浮点单元）。通过这种方式节省的许可费用无疑有助于降低处理器的价格。


    最有趣的功能单元是带有CCN加速器的KPU。KPU代表**知识处理单元**。这个核心功能块能够显著加速在特殊神经网络（例如卷积神经网络）中频繁出现的数学运算处理。


    开发KPU或“AI加速器”是为了加速人工智能应用。特别是，人工神经网络、机器学习或计算机辅助“视觉”可以借助它们更有效地工作。典型应用可以在机器人或物联网项目中找到[12]。


    此外，音频处理器（APU）确保音频信号的快速处理。还有其他模块可用，例如用于快速傅里叶变换（FFT）。这使得该板特别适合图像处理项目和音频分析。通过这种方式，可以在AIoT领域（**人工智能物联网**）极其快速且经济高效地实现智能应用。


    此外，控制器特定的单元，例如


    - GPIO

    - UART, SPI, I²C

    - 定时器

    - PWM


    也是可用的。以下概述总结了Maix-Duino的主要特性：


    主处理器：K210 RISC-V双核64位，带FPU @ 400 MHz神经网络处理器


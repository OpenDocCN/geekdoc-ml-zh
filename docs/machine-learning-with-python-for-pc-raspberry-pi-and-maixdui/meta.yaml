    cv2.destroyAllWindows()\n```\n\nAfter loading the OpenCV library, the cascade\
    \ to be used is loaded from the above-mentioned directory:\n\n```\ncascade=\"\
    HaarCascades/haarcascade_frontalface_default.xml\"\n```\n\nthen the associated\
    \ classifier is defined as \"detector\":\n\n```\ndetector = cv2.CascadeClassifier(cascade)\n\
    ```\n\nThe video stream of the active camera is evaluated using:\n\n```\ncap =\
    \ cv2.VideoCapture(0)\ncap.set(3,320) # set Width\ncap.set(4,240) # set Height\n\
    ```\n\nThe resolution of the video image is also set in these lines. The parameters\

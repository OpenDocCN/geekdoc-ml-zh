- md: "## 13.7 Recognizing, counting and sorting objects\n\nWith the detection and\
    \ marking of a recognized object on a display, the AI task is basically solved.\
    \ This is also where most PC-based projects come to an end. With a Raspberry Pi\
    \ or the MaixDuino, however, you can go one essential step further. In addition\
    \ to an HDMI or display output, these embedded systems offer a number of readily\
    \ available I/O pins. Based on the ML results, actuators such as servos, robot\
    \ arms or even entire robots can be controlled [12].\n\nIn this section, a very\
    \ simple actuator in the form of an LED will be controlled. The LED needs to be\
    \ connected to port \"13\" of the MaixDuino via a 220-ohm series resistor. The\
    \ following image shows the circuit:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_168_0.png)\n\
    \nThe aim of a simple bottle detector is to light up the red LED whenever a bottle\
    \ is detected. This is the basis for the well-known deposit machines in beverage\
    \ markets and discounters.\n\nIn addition to the barcode, these machines also\
    \ evaluate the shape of the returned item in order to exclude fraud as far as\
    \ possible. Instead of the LED, a relay can be used that enables the bottle to\
    \ be accepted — or not.\n\nOn the software side, the program from the last section\
    \ can be extended accordingly (*bottle_detector.py*):\n\n```python\nimport sensor,image,lcd,time\n\
    import KPU as kpu\nfrom Maix import GPIO\nfrom fpioa_manager import fm\nfrom board\
    \ import board_info\n\nfm.register(3, fm.fpioa.GPIO0)    # silk Arduino P13\n\
    led_r=GPIO(GPIO.GPIO0,GPIO.OUT)\n\nfor i in range(10):\n    led_r.value(1)\n \
    \   time.sleep(.1)\n    led_r.value(0)\n    time.sleep(.1)\n\nlcd.init(freq=15000000)\n\
    sensor.reset()\nsensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\n\
    sensor.set_vflip(0)\nsensor.run(1)\nclock = time.clock()\nclasses = ['aeroplane',\
    \ 'bicycle', 'bird', 'boat', 'bottle', 'bus', 'car', 'cat',\n'chair', 'cow', 'diningtable',\
    \ 'dog', 'horse', 'motorbike', 'person', 'pottedplant',\n'sheep', 'sofa', 'train',\
    \ 'tvmonitor']\n# task = kpu.load(0x500000)\ntask=kpu.load(\"/sd/models/20class.kmodel\"\
    )\nanchor = (1.889, 2.5245, 2.9465, 3.94056, 3.99987, 5.3658, 5.155437, 6.92275,\
    \ 6.718375,\n9.01025)\na = kpu.init_yolo2(task, 0.5, 0.3, 5, anchor)\nwhile(True):\n\
    \    clock.tick()\n    img = sensor.snapshot()\n    code = kpu.run_yolo2(task,\
    \ img)\n    # print(clock.fps())\n    led_r.value(0)\n    if code:\n        for\
    \ i in code:\n            a=img.draw_rectangle(i.rect())\n            a = lcd.display(img)\n\
    \            print(classes[i.classid()])\n\n            if (classes[i.classid()]\
    \ == \"bottle\"):\n                print(\"DETECTED\")\n                led_r.value(1)\n\
    \n        for i in code:\n            lcd.draw_string(i.x(), i.y(), classes[i.classid()],\
    \ lcd.RED, lcd.WHITE)\n            lcd.draw_string(i.x(), i.y()+12, '%f1.3'%i.value(),\
    \ lcd.RED, lcd.WHITE)\n    else:\n        a = lcd.display(img)\na = kpu.deinit(task)\n\
    ```\n\nThe lines\n\n```python\nfm.register(3, fm.fpioa.GPIO0)    # silk Arduino\
    \ P13\nled_r=GPIO(GPIO.GPIO0,GPIO.OUT)\n```\n\nactivate port 13 as an output.\
    \ When the program starts, the connected LED should first flash 10 times in rapid\
    \ succession as a functional check.\n\n```python\nfor i in range(10):\n    led_r.value(1)\n\
    \    time.sleep(.1)\n    led_r.value(0)\n    time.sleep(.1)\n```\n\nThen, the\
    \ established program part for object recognition follows. Additionally, the lines\n\
    \n```python\nif (classes[i.classid()] == \"bottle\"):\n    print(\"DETECTED\"\
    )\n    led_r.value(1)\n```\n\nwere inserted in the main loop. They ensure that\
    \ the LED is activated as soon as a bottle is detected. In addition, the word\
    \ DETECTED is displayed in the console.\n\nTo make sure that the LED is not permanently\
    \ lit, the line\n\n```python\nled_r.value(0)\n```\n\nwas also added.\n\n## Chapter\
    \ 14 • Machines Learn to Listen and Speak\n\nBesides the eyes, the ears are among\
    \ the most important sensory organs for human beings. Acoustic information contributes\
    \ significantly to the perception of the environment. In principle, audio technology\
    \ is much easier to handle than image and video processing. Historically, radio\
    \ technology was available long before the first television broadcasts. Electronic\
    \ recording and playback of sounds via vinyl records and tapes were also developed\
    \ and commercialized long before the first video recorders.\n\nIn computer technology,\
    \ things were somewhat different. Right from the beginning, computers had some\
    \ form of screen. So, visual output was always in the foreground. Sound signals\
    \ usually played a subordinate role. Computers with speech output were a much\
    \ bigger challenge and properly working systems were not available until recently.\
    \ For a long time, primitive voice computer communication was reserved for films\
    \ and TV series such as *Star Trek*, *War Games*, or *Knight Rider*.\n\nIt was\
    \ not until the turn of the millennium that voice-capable devices became available,\
    \ although slowly. The first classic telephone voice systems at public authorities,\
    \ banks and insurance companies were eventually joined by voice assistants such\
    \ as Siri and Alexa. In the meantime, e-book readers such as Amazon's Echo are\
    \ able to read Kindle books aloud in almost natural language. The latest generation\
    \ of laptops or tablets explain their functions using synthetic speech when they\
    \ are first used. At the same time, the formerly widespread speech chips have\
    \ become obsolete mainly because standard processors are now completely sufficient\
    \ to build speaking systems [5]. Thus, the Raspberry Pi is also able to communicate\
    \ via voice instructions. Both speech playback and the recognition of spoken information\
    \ are possible.\n\nAlthough speech systems are not so clearly in the focus of\
    \ current machine-learning development, they are certainly also among the desirable\
    \ functionalities of artificial intelligence. Particularly in robotics, communication\
    \ in natural language plays an increasingly important role. This chapter will\
    \ therefore take a closer look at the possibilities of speech output and recognition,\
    \ specifically on the Raspberry Pi. In combination with other technologies, such\
    \ as various sensors or the object recognition already discussed, very impressive\
    \ and practically applicable projects can be implemented using speech communication.\n\
    \n## 14.1 Talk to me!\n\nThe first devices and systems with a rudimentary capability\
    \ of generating human speech were constructed over 200 years ago. Modern speech\
    \ synthesis can therefore look back on a long history. With simple components\
    \ such as a bellows as a lungs, tubes, and wooden resonators, scientists eager\
    \ to experiment began to synthesize word elements. Amazingly, it was already possible\
    \ at that time to produce sounds that had certain similarities with human speech.\n\
    \nA big step towards speech synthesis as we know it today was taken with the first\
    \ digital speech synthesizers in the 1960s when analog electronic components started\
    \ to supersede the purely mechanical devices from the old days. However, at first\
    \ it was hardly possible"

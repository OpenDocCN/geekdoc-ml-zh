    \ solution for the XOR problem already presented in the first chapters of the\
    \ book (Keras_EXOR_1V0.ipynb).\n\nAfter loading the required libs, the desired\
    \ input and output values are defined:\n\n```\ninputValues=np.array([[0, 0], [0,\
    \ 1], [1, 0], [1, 1]])\noutputValues=np.array([[0], [1], [1], [0]])\n```\n\nIt\
    \ is easy to see that the values correspond to the table in Chapter 2. Now, a\
    \ neural network using\n\n- two input nodes;\n- two hidden nodes;\n- one output\
    \ neuron\n\ncan be constructed:\n\n```\nnum_inner = 2\nmodel = Sequential()\n\
    model.add(Dense(num_inner, input_dim=2, activation='sigmoid'))\nmodel.add(Dense(1))\n\
    ```\n\nafter finalizing the training procedure:\n\n```\nmodel.compile(loss='mean_squared_error',optimizer='adam',metrics=['accuracy'])\n\
    model.fit(x=inputValues, y=outputValues, epochs=10000, verbose=0)\nprint(model.predict(inputValues))\n\
    ```\n\nthe following typical result can be obtained:\n\n```\n[[ 0.00000132]  \
    \  # Input 0, 0    - Output: 0\n [ 0.9999364]     # Input 0, 1    - Output: 1\n\
    \ [ 0.9999851]     # Input 1, 0    - Output: 1\n [ 0.0000268]]    # Input 1, 1\
    \    - Output: 0\n```\n\nThe remaining code lines provide a graphical representation\
    \ of the result:\n\nIt can be seen that the network draws two isolated separation\
    \ lines. Between the lines, values close to one are calculated. In the outer area,\
    \ the results are close to zero. Thus, the XOR perceptron problem has been successfully\
    \ solved by a KERAS network.\n\n## 10.10 Virtual environments\n\nAs different\
    \ modules or libraries such as NumPy, MatPlotLib, KERAS, and TensorFlow are evaluated,\
    \ they accumulate in the global Python installation. Since machine learning and\
    \ AI are rapidly evolving research areas, new versions and updates become available\

  md: '# 10.1 MatPlotLib as a graphics artist


    Most people are visually-oriented, so a single graph is often preferred to extensive
    lists of data or numerical tables. In addition, relationships can usually be captured
    much faster if they are presented in a graphical form. MatPlotLib is a classical
    Python lib which facilitates the development of graphical representations. Together
    with Python, MatPlotLib is also enjoying increasing popularity. In combination
    with NumPy and SciPy, it is at least as good as, if not superior, to classical
    mathematics programs. In addition, MatPlotLib is available free of charge; it
    is open source and can be programmed in an object-oriented manner.


    Using MatPlotLib, diagrams and representations can be created in various forms
    and formats. The quality that can be achieved in this way easily approaches the
    requirements for scientific publications. Even beginners can quickly achieve considerable
    success with MatPlotLib. With just a few lines of code, you can create simple
    x/y plots, histograms, power spectra, bar charts, error charts, scatter plots
    and so on.


    The easiest way to integrate MatPlotLib on a PC is via Anaconda. For the Raspberry
    Pi, a specific routine is available:


    ```

    pip3 install matplotlib

    ```


    The installation takes only a few minutes. After that, the lib can be used for
    a wide variety of applications.


    A MatPlotLib graphic consists of the following components:


    +   **Figure:** This refers to the entire current figure. It can contain one or
    several diagrams. A "Figure" is to be understood as a kind of canvas that contains
    individual diagrams.


    **Axes:** A figure can contain several axes. Each axis has

    - a title;

    - an X-label;

    - a Y-label;

    - optionally, a Z-label (for 3-D representations).


    **Axis:** Axis objects are used to provide the axes with scales and diagram boundaries.


    **Artist:** Contains text, line-, 2-D- or 3-D-objects, etc.



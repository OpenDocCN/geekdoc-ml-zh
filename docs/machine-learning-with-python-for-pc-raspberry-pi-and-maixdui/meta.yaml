    \ 由多个神经元层组成。通常（但并非总是）每一层都与下一层完全连接。各层的节点使用非线性激活函数。这个概念基于高度发达大脑中生物神经元的行为，它们也通过活跃或不活跃的动作电位进行通信。有趣的是，这里使用了纯数字开关和模拟信号处理之间的一种中间方式。在机器学习中，人工神经网络通过应用阈值函数来替代这种行为。\n\

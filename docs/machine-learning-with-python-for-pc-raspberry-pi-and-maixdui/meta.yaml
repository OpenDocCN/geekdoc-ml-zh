  md: 'Simple "expert systems" nevertheless have their justification. They can still
    be used successfully in narrowly defined areas. As shown in the last chapter,
    a few instructions are sufficient for a home automation system to adjust lighting
    or temperature conditions in a living room.


    Therefore, chatbots are often used in special dialogue systems. Corresponding
    applications can be found in the most diverse areas such as


    +   - customer service, order taking or support;

    - entertainment, finance, games;

    - health care;

    - human resources and marketing;

    - news, social, sports and travel agencies.


    The progressive improvement of technology eventually formed the basis for the
    voice recognition systems Google Assistant, Siri, Cortana, or Alexa.


    Simple systems search directly for keywords in the input. More advanced methods
    perform extensive analyses of the text spoken by the user before searching for
    a complex suitable answer or action. This already allows a very reliable speech
    recognition to be built up. Nevertheless, it can be seen, for example when working
    with the Raspberry Pi ChatBot, that the reliability is still significantly worse
    than with direct human-to-human communication.


    The forefather of all chatbots was ELIZA, an early computer program for natural
    language processing. Of course, at that time, in the mid-1960s, communication
    still took place via keyboards and screens. ELIZA was supposed to imitate the
    typical responses of a psychotherapist. The conversation was kept going with the
    help of "pattern matching" and substitution methods. Simple random elements were
    also included.


    One of the most interesting results of this experiment was that many people revealed
    their most intimate thoughts and problems unfiltered, without the chatbot having
    even the slightest idea of the conversant''s problems.


    A typical "conversation" with Eliza looked something like this:


    ```

    ELIZA >>> Hello my name is ELIZA

    Person: Can I ask you something?

    ELIZA >>> Did you come because you have a question?

    Person: Yes

    ELIZA >>> Are you all right?

    Person: Yes, thank you for asking

    ELIZA >>> That''s nice!

    Person: What are you doing today?

    ELIZA >>> We are supposed to talk about you, not about me.

    Person: I have problems with my mother

    ELIZA >>> Why do you have problems with your mother?

    ...

    ```'

    \ that the MaixDuino has been running for\n\n977309 ms = 977.309 s = 16 minutes,\
    \ 17 seconds, and 309 milliseconds\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_78_0.png)\n\
    \nA classic application of **ticks()** is the measurement of code runtime. For\
    \ example, the following code can be used to show that math operations take a\
    \ certain amount of time:\n\nMachine Learning with Python\n\n```\n# runtime.py\n\
    \nimport time\nimport math\n\nwhile(True):\n    start = time.ticks_us()\n    time.sleep(1)\n\
    \n    # x = math.exp(math.sin(22.5))\n\n    stop = time.ticks_us()\n    print(stop-start)\n\
    ```\n\nIf the comment symbol in front of the calculation is removed, the displayed\
    \ processing time increases from approx. 100.015 µs to 100.025 µs. The calculation\
    \ time for the formula is therefore approx. 10 µs. In addition to the time library,\
    \ \"math\" was also imported here in order to be able to evaluate somewhat more\
    \ complex mathematical functions.\n\n## 9.6 Hardware under control: digital inputs\
    \ and outputs\n\nIn contrast to programming a PC or laptop, MicroPython often\
    \ focuses on direct access to hardware units. In particular, the control of individual\

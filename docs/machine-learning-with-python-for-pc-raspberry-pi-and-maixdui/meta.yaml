    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_44_0.png)\n\n*Figure 8.4: The RGB LED\
    \ of the MaixDuino in action.*\n\n## 8.3 Working with files\n\nTo create a file\
    \ with a unique name using the Thonny IDE on the Maix, the following steps are\
    \ required:\n\n- Create the new file proper.\n- Save the file with the desired\

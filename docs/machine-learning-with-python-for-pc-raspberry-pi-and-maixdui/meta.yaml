- md: "## 8.14 Communication setup to the MaixDuino\n\nNow you can communicate via\
    \ Jupyter with an external board, such as the MaixDuino. To establish a corresponding\
    \ connection to the controller, you can display all available ports using\n\n\
    ```\n%serialconnect\n```\n\nin the first Jupyter cell. Then select the correct\
    \ port and set the baud rate. Usually, 115200 baud works without problems:\n\n\
    ```\n%serialconnect to --port=COM14 --baud=115200\n```\n\nNow you can write directly\
    \ on the screen of the MaixDuino via a notebook.\n\n```\nimport lcd\n\nlcd.init()\n\
    lcd.draw_string(100, 100, \"Hello MaixDuino!\", lcd.WHITE, lcd.BLACK)\n```\n\n\
    In the notebook, the entire process looks like this:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_64_0.png)\n\
    \nAfter starting the cell, the message appears on the display of the MaixDuino.\n\
    \n## 8.15 Kernels\n\nWhen program statements are executed in a cell, the associated\
    \ code is processed in a kernel. Each output of the kernel is returned to the\
    \ corresponding cell. The status of the kernel remains the same in this way since\
    \ it refers to the entire document and not to individual cells.\n\nIf, for example,\
    \ libraries have been imported or variables declared in a cell, then these are\
    \ also available in other cells. The following example illustrates this with the\
    \ definition of a function:\n\n```\ndef pythago(x,y):\n    return x*x + y*y\n\
    ```\n\nOnce the above cell has been executed, pythago() can be used in any other\
    \ cell:\n\n```\npythago(3,4)\n\n25\n```\n\nThis also works regardless of the order\
    \ of the cells within the notebook. As soon as a cell has been executed, all variables\
    \ declared in it and all imported libraries are available in all other cells.\n\
    \nJupyter offers the possibility to change the kernel. This option was already\
    \ used when activating the MicroPython kernel in the last section. There are several\
    \ different options for changing the kernel.\n\nBy selecting the Python version\
    \ for a new notebook, the kernel to be used is chosen automatically. Kernels are\
    \ available for different versions of Python and also for over one hundred other\
    \ languages, including Java, C and even FORTRAN. So, it is also possible for example,\
    \ to install a MicroPython kernel in Jupyter in addition to the classic Python3\
    \ kernel and use it to program external controllers such as the ESP32, an ESP-Eye\
    \ or the MaixDuino.\n\n## 8.16 Working with Notebooks\n\nBefore a new project\
    \ is started, the current notebook should be given a meaningful name. To do this,\
    \ click on the name \"Untitled\" and choose a suitable new name. Saving is done\
    \ by clicking on the disk symbol. Closing the notebook tab in the browser is different\
    \ from closing a document in a traditional application such as Word or Excel.\n\
    \nThe notebook's kernel continues to run in the background and must be shut down\
    \ separately before it is actually closed. This has the advantage that the kernel\
    \ does not have to be restarted if a tab or the browser is accidentally closed.\
    \ Only when the kernel has been shut down, the tab can be completely closed without\
    \ any problems. The easiest way to do this is by choosing\n\nFile → Close and\
    \ Halt\n\nfrom the notebook menu. Alternatively, the kernel can also be terminated\
    \ using\n\nKernel → Shutdown\n\nIt is generally recommended that you save your\
    \ current work regularly. By pressing\n\nCntr+S\n\nthe notebook is saved and a\
    \ so-called checkpoint. With each new notebook, a checkpoint file is created along\
    \ with the notebook file itself. The checkpoint file is located in a hidden sub-directory\
    \ and has the suffix `.ipynb_checkpoints`. By default, Jupyter automatically saves\
    \ the current notebook to this checkpoint file every 120 seconds without changing\
    \ the primary notebook file. Via Ctrl+S, both the notebook and the checkpoint\
    \ files are updated. Therefore, unsaved work can be restored with the checkpoint\
    \ in the event of an unexpected problem. Using the menu\n\nFile → Revert to Checkpoint\n\
    \nit is possible to return to the checkpoint.\n\n## 8.17 All libraries available?\n\
    \nSpecifically in the area of machine learning, neural networks and artificial\
    \ intelligence, many highly powerful \"libs\" have been developed in recent years.\
    \ Depending on your needs, these can be reloaded using the Anaconda Navigator.\
    \ For a quick overview of which library is available in which version, `Library_test_1V0.ipynb`\
    \ (see download package) can be used in a Jupyter notebook. If the corresponding\
    \ libs are loaded, the following information should be displayed after executing\
    \ the first cell:\n\n```\nIn [1]: try:import sys; print('Python: {}'.format(sys.version))\n\
    except:print(\"no Python available\")\ntry:import matplotlib; print('matplotlib:\
    \ {}'.format(matplotlib.__version__))\nexcept:print(\"no matplotlib available\"\
    )\ntry:import tensorflow; print('tensorflow: {}'.format(tensorflow.__version__))\n\
    except:print(\"no tensorflow available\")\ntry:import keras; print('keras: {}'.format(keras.__version__))\n\
    except:print(\"no keras available\")\ntry:import pandas; print('pandas: {}'.format(pandas.__version__))\n\
    except:print(\"no pandas available\")\ntry:import scipy; print('scipy: {}'.format(scipy.__version__))\n\
    except:print(\"no scipy available\")\ntry:import numpy; print('numpy: {}'.format(numpy.__version__))\n\
    except:print(\"no numpy available\")\ntry:import scikit; print('scikit: {}'.format(scikit.__version__))\n\
    except:print(\"no scikit available\")\ntry:import sklearn; print('sklearn: {}'.format(sklearn.__version__))\n\
    except:print(\"no sklearn available\")\ntry:import skimage; print('skimage: {}'.format(skimage.__version__))\n\
    except:print(\"no skimage available\")\ntry:import seaborn; print('seaborn: {}'.format(seaborn.__version__))\n\
    except:print(\"no seaborn available\")\ntry:import statsmodels; print('statsmodels:\
    \ %s' % statsmodels.__version__)\nexcept:print(\"no statsmodels available\")\n\
    \nPython: 3.8.8 (default, Feb 24 2021, 15:54:32) [MSC v.1928 64 bit (AMD64)]\n\
    matplotlib: 3.1.4\ntensorflow: 2.3.0\nkeras: 2.4.3\npandas: 1.2.3\nscipy: 1.6.1\n\
    numpy: 1.19.5\nno scikit available\nsklearn: 0.24.1\nno skimage available\nno\
    \ seaborn available\nno statsmodels available\n```\n\nFigure 8.22: Library-Test\
    \ in Jupyter.\n\nMachine Learning with Python\n\nYou can see that in this special\
    \ case, TensorFlow version 2.3.0 is available. The libs \"skimage\" or \"seaborn,\"\
    \ on the other hand, are not installed, but could of course be loaded via Anaconda,\
    \ if necessary. For standard Python, the program *Library_test_1V0.py* can be\
    \ used to check the availability of libraries. In Thonny missing libraries can\
    \ be installed via:\n\nTools → Manage plug-ins...\n\nFor the Raspberry Pi, special\

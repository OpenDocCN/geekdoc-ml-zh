- md: "## Cautionary Notices\n\n1. The circuits and boards (Raspberry Pi, MaixDuino)\
    \ in this book may only be operated with approved, double-insulated AC power supplies.\
    \ Insulation faults in a simple power supply unit can result in life-threatening\
    \ voltages on non-insulated components.\n2. Powerful LEDs can cause eye damage.\
    \ Never look directly into an LED!\n3. Neither the Author nor the Publisher assume\
    \ any liability for any damage, loss, or injury caused by, or as a result of,\
    \ setting up the projects described.\n4. Electronic circuits can emit electromagnetic\
    \ interference. Neither the Publisher nor the Author have any control over the\
    \ technical implementations of the user. Consequently, the user is responsible\
    \ for compliance with the relevant emission limit values.\n\n## Program Downloads\n\
    \nThe programs discussed in this book can be downloaded free of charge from the\
    \ Elektor Store website:\n\n[www.elektor.com](http://www.elektor.com)\n\nOnce\
    \ at the Elektor Store, enter the book title in the Search box. Once at the book\
    \ resources and info page, click on the **Downloads** tab. Download the .zip archive\
    \ file, save it locally on your computer, then extract it.\n\nIf a program is\
    \ not identical to the one described in the book, the version from the download\
    \ package should be used, as this is the most current one.\n\n## Chapter 1 • Introduction\n\
    \nWe are increasingly confronted with the applications of \"Artificial Intelligence\"\
    \ (AI): recommendations for music or video, navigation systems, shopping suggestions\
    \ and so on are based on procedures that can be more or less assigned to this\
    \ area. However, there is often a lack of clarity regarding the terms\n\n- Artificial\
    \ Intelligence (AI)\n- Machine Learning (ML)\n- Deep Learning (DL)\n- Neural Networks\
    \ (NN)\n\nOne of the most frequent queries to popular search engines is therefore:\n\
    \n> \"What is the actual difference between AI and Machine Learning?\"\n\nAlthough\
    \ the terms are closely related, they are by no means synonymous:\n\n**Artificial\
    \ Intelligence** is, in principle, the general knowledge base. It forms the *foundation*,\
    \ just as mathematics is the basis for physics or electrical engineering. AI tries\
    \ to solve problems without rigid algorithms using highly developed machines.\n\
    \n**Machine Learning** is a branch of artificial intelligence. The focus is on\
    \ automatic learning from experience, i.e., without a special program being created\
    \ for it. There are various methods for this, for example neural networks or general\
    \ statistical methods.\n\n**Deep Learning** or **Deep Neural Learning** is again\
    \ a subset of machine learning. Here, with the help of neural networks, methods\
    \ and systems get developed that are modeled on biological brains.\n\nThe term\
    \ Artificial Intelligence was coined in 1956 at an international conference called\
    \ *The Dartmouth Summer Research Project*. A fundamental idea was to model the\
    \ human brain and to construct more advanced computer systems based on this knowledge.\
    \ It was believed that it would soon transpire how the human mind works. The transfer\
    \ to a machine should then only be a small step.\nThis turned out to be slightly\
    \ overoptimistic. Nevertheless, some important findings have been gathered at\
    \ the conference. It was stated, for example, that the key factors for an intelligent\
    \ machine should be\n\n- independent learning;\n- natural language processing;\n\
    - creativity.\n\nWisdom, creativity and social skills are terms that hardly apply\
    \ to machines up to now. Rather, the tasks that AI scientists are currently concentrating\
    \ on are:\n\n- speech recognition and machine language translation;\n- medical\
    \ diagnosis such as evaluation of x-rays or computer tomography scans;\n- Internet\
    \ search engines;\n- optimization of sales strategies;\n- scientific and technical\
    \ applications, in astronomy and geophysics etc.;\n- forecast of stock prices\
    \ and foreign exchange rates;\n- handwriting recognition;\n- personal identification\
    \ using face and fingerprint recognition.\n\nAll of these applications require\
    \ a certain number of skills originally reserved to humans. But whether this is\
    \ already \"intelligence\" is often questioned. It therefore makes sense to take\
    \ a look at what the term intelligence should actually include.\n\n### 1.1 \"\
    Super Intelligence\" in three steps?\n\nFirst of all, artificial intelligence\
    \ can be divided into two areas: weak and strong AI. The \"strong\" or general\
    \ AI is essentially the attempt to create artificial human beings. The goal would\
    \ be machines or robots that have all the mental powers of humans, including a\
    \ consciousness [12].\n\nA \"weak\" AI, on the other hand, can perform only certain\
    \ tasks very well, but does not even come close to human capabilities in other\
    \ areas. Examples of weak AI include computers that can beat people at chess —\
    \ not only average players but also world chess champions. Weak artificial intelligence\
    \ is nowadays widespread in science, business, and healthcare. For example, AI\
    \ enterprise systems contain powerful analytical tools and can provide recommendations\
    \ and insights for business development. They are used for risk management and\
    \ planning.\n\nStrong AI begins as soon as machines become \"human\", make their\
    \ own decisions, or learn new skills without human help. These systems are not\
    \ only able to solve classical mathematical or logical problems, but also have\
    \ certain emotional abilities. It is quite easy to program machines to perform\
    \ some \"emotional\" or \"verbal\" actions in response to certain stimuli. ChatBots\
    \ and virtual assistants are for example already quite good at having a conversation.\
    \ Some experiments in which robots learn to read human emotions have also been\
    \ carried out successfully. However, these efforts were more concerned with producing\
    \ emotional responses than real mental competences.\n\nThe next step would be\
    \ a so-called \"super intelligence\". This is a name given to systems or machines\
    \ that are superior to humans in many or even all areas of intelligence. It includes\
    \ all, or at least many, areas of the intellect, in particular, creative and problem-solving\
    \ skills or emotional and social skills. Self-confidence or a comprehensive memory\
    \ are also frequently considered prerequisites for real super intelligence. It\
    \ does not matter whether these functions are based on biological or technical\
    \ principles.\n\nHowever, considerations about a Super Intelligence quickly led\
    \ to dystopian scenarios. Once an artificial intelligence has been created that\
    \ can continue to learn completely independently, the step to a superhuman level\
    \ of intelligence is ultimately only a matter of time. The controllability of\
    \ such an AI could ultimately become an existential question for all of humanity.\n\
    \nScientists who work in this area and make a good living from it, are downplaying\
    \ this danger. This is certainly all too human. It is therefore important that\
    \ as many people as possible deal with these topics. Only in this way, a realistic\
    \ assessment of the potentials and risks will be possible in the end.\n\n### 1.2\
    \ How machines can learn\n\nMachine learning is part of the broad field of artificial\
    \ intelligence that focuses on how to teach systems to learn without being programmed\
    \ to perform specific tasks. The key idea behind ML is that it is possible to\
    \ develop machines that independently learn from data, generate knowledge and\
    \ make useful predictions. To get closer to this goal, three requirements must\
    \ be met:\n\n1. **Availability of extensive data sets**\n   These can consist\
    \ of numbers, images, text, audio samples or other information. Creating the data\
    \ sets is often the most extensive part of creating an AI system.\n\n2. **Formulation\
    \ of a learning objective**\n   In so-called supervised learning, the training\
    \ data contains \"correct\" and \"incorrect\" solutions. These are marked accordingly.\
    \ During the learning process, the system learns how to make correct assessments.\n\
    \   In the case of unsupervised learning, on the other hand, the system must decide\
    \ by itself in which categories a data record can be divided. A typical example\
    \ is a data set with pictures of people. Various systems have already succeeded\
    \ in independently recognizing that they can be divided into men and women.\n\n\
    3. **An adaptive system**\n   In order to achieve the best performance, different\
    \ procedures are often combined. At the beginning of the learning phase, the ML\
    \ system only contains a large number of default parameters. With an appropriate\
    \ algorithm, the parameters are varied until the system delivers results that\
    \ are as correct as possible. Although neural networks are a widespread variant\
    \ here, they are not the only possibility for the development of adaptive systems.\n\
    \nDeep learning is a machine-learning method that was inspired by the structure\
    \ of a human brain. With deep learning algorithms, complex, multilayered neural\
    \ networks can be trained efficiently. In particular, the \"back propagation\"\
    \ algorithm is considered to be one of the most promising approaches.\n\nIn neural\
    \ networks, information is transmitted via virtual connection channels. During\
    \ a learning or \"training\" session the connection strengths of these channels\
    \ are optimized. Using a huge amount of data, a large number of parameters are\

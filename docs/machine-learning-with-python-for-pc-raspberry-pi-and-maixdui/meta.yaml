    # 12.7 Power training


    For a quick and effective training, the Python file


    MNIST_keras_Train_1V0.py


    should be executed on a computer that''s as powerful as possible. Using KERAS,
    a deep neural network model is constructed, compiled, and finally trained in this
    program. After completion of the training and validation phases, the weights of
    the network are saved as an external file. The following table shows the training
    times for different computer systems.


    | Periods | Raspberry Pi 4 (8 GB) | Dual-Core (2.8 GHz) | Quad-Core (3.6 GHz)
    |

    | :--- | :--- | :--- | :--- |

    | 1 | 10 min | 3 min | 70 s |

    | 12 | 2 h | 4 h | 15 min |


    Twelve epochs run for about a quarter of an hour, even on a high-performance PC.
    By using an NVIDIA graphics card and including the full GPU (Graphics Processing
    Unit) power, the training time could be significantly reduced to a few minutes.
    Therefore, if your computer provides the appropriate resources, do not forget
    to activate them. All you need to do is install the associated version of TensorFlow
    and the executable CUDA file from NVIDIA. Further details can be found in the
    respective manuals for the graphics card used.


    The calculated weights of the network are saved in an *.h5 file. The file can
    be copied to the Raspberry Pi and executed there in order to recognize the digits
    in the live video stream. For copying, say, a USB stick or Filezilla can be used
    (Section 6.3). In principle, the training could also be carried out on the RPi
    itself. Then, however, training times of several hours are required. The download
    package contains some .h5 files that can be used for initial tests on your Raspberry
    Pi.


    # 12.8 Quality control — an absolute must!


    Just as in the production of food or electronic components, quality assessment
    is of crucial importance when using machine-learning systems. In particular, complex
    systems such as autonomous vehicles or medical technology applications require
    sophisticated test procedures.


    For this reason, extensive parameters are available for evaluating the quality
    of a trained neural network. Of particular importance are the parameters like
    prediction accuracy and the loss function.


    The lower the "loss" value of a network, the better the corresponding model was
    trained. The loss is calculated for training and validation and indicates how
    well the model performs on these two sets. In contrast to "accuracy", loss is
    not a percentage value. It is a summary of the errors made for each sample in
    the training or validation set. The main goal while training a model is usually
    to reduce or minimize the value of the loss function.'
  - '[PAGE 146]


    However, there are a few issues to keep in mind when reducing the loss value.
    For example, the problem of "over-fitting" can arise. In this case the model "remembers"
    the training examples so precisely that higher error values occur once again when
    using the different samples of the test set.


    Over-fitting also occurs in cases when a very complex model with an unreasonably
    high number of free parameters is used. Here, the parameters are also adjusted
    so precisely to the training set, that they deliver worse results for other values.


    The accuracy of a model is determined after the model parameters have been optimized
    and established and the learning process is finalized. Then the test samples are
    fed into the model and the number of errors is related to all results. If, for
    example, 1000 results are determined and the model classifies 987 of them correctly,
    the accuracy of the model is 98.7%.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_146_0.png)


    Figure 12.9 shows two typical learning curves. As expected, the accuracy function
    increases over the course of the training. The loss values decrease accordingly.
    In addition, it can be seen that the values finally converge to a certain saturation
    level. If this point is reached, even longer training times fail to improve network
    performance.


    # 12.9 Recognizing live images


    If the *.h5 file has been saved successfully, the network can be tested. Both
    handwritten and printed digits can be used for this. How good the forecast accuracy
    actually is, depends on various factors. In particular, the image illumination,
    the camera viewing angle or the image sharpness and resolution play an important
    role.


    Of course, it also depends on how legible the digits actually are. Just like a
    human observer, the network can also recognize clearly-written digits much more
    easily. The Python pro-'

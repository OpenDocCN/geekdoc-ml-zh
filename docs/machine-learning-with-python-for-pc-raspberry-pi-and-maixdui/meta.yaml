    (Section 6.3). In principle, the training could also be carried out on the RPi
    itself. Then, however, training times of several hours are required. The download
    package contains some .h5 files that can be used for initial tests on your Raspberry
    Pi.


    # 12.8 Quality control — an absolute must!


    Just as in the production of food or electronic components, quality assessment
    is of crucial importance when using machine-learning systems. In particular, complex
    systems such as autonomous vehicles or medical technology applications require
    sophisticated test procedures.


    For this reason, extensive parameters are available for evaluating the quality
    of a trained neural network. Of particular importance are the parameters like
    prediction accuracy and the loss function.


    The lower the "loss" value of a network, the better the corresponding model was
    trained. The loss is calculated for training and validation and indicates how
    well the model performs on these two sets. In contrast to "accuracy", loss is
    not a percentage value. It is a summary of the errors made for each sample in
    the training or validation set. The main goal while training a model is usually
    to reduce or minimize the value of the loss function.'
  merge: -1

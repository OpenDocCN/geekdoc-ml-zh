  md: '# 13.7 Recognizing, counting and sorting objects


    With the detection and marking of a recognized object on a display, the AI task
    is basically solved. This is also where most PC-based projects come to an end.
    With a Raspberry Pi or the MaixDuino, however, you can go one essential step further.
    In addition to an HDMI or display output, these embedded systems offer a number
    of readily available I/O pins. Based on the ML results, actuators such as servos,
    robot arms or even entire robots can be controlled [12].


    In this section, a very simple actuator in the form of an LED will to be controlled.
    The LED needs to be connected to port "13" of the MaixDuino via a 220-ohm series
    resistor. The following image shows the circuit:



    # 12.6 Convolutional networks


    Convolution is a special mathematical operation that enables the similarity of
    two functions to be determined. If the two functions under consideration are very
    different, their convolution integral is almost zero. If there is a certain similarity,
    the convolution integral takes on a higher value.


    This property can also be used to good effect in neural networks. The resulting
    convolutional networks (or convNets for short) therefore only partly consist of
    neurons with trainable weights. Another essential component are network segments
    with preset values. One variant here is to set up the ConvNet structures in such
    a way that they are optimized for input data consisting of images. This allows
    certain properties to be firmly anchored in the architecture. Through the convolution
    function it can be determined in advance whether an image contains elements that
    resemble an arc of a circle, for example, or whether rather angular objects such
    as triangles or squares predominate.


    This makes image evaluation more efficient and the number of parameters required
    in the network can be significantly reduced. In contrast to simple neural networks,
    ConvNets can process inputs in the form of data matrices. Images displayed as
    a matrix (image width × image height × number of color channels) can be used directly
    as input data. A classic neural network in the form of a multi-layer perceptron
    only accepts one-dimensional vectors as input format. In order to be able to use
    images as input data, the individual image pixels must be available in a long
    data series, as in the numerical values in the Iris flower data set from Chapter
    11.


    Because of this restriction, conventional neural networks are for example not
    able to recognize objects regardless of their orientation in the picture. After
    a slight shift or rotation, identical objects would have completely different
    input vectors. In contrast to this, convolution networks are able to recognize
    structures in the input data. Filters in the input layers are optimized to recognize
    simple geometric structures such as lines, edges or colored areas, etc. The filters
    are automatically adjusted by the network. In the next level, more complex elements
    such as rectangles, circles or ellipses etc. are identified. The level of abstraction
    of the network increases with each filter level. Ultimately, even entire objects
    such as tables and chairs or vehicles can be recognized. After appropriate optimization,
    it is even possible to recognize and identify people or animals. Further details
    are given in more detail in subsequent chapters. Which abstractions ultimately
    lead to the activation of the higher layers, depends on the characteristic features
    of the given classes. For a more precise recording of the functionality of a convolution
    network, it can therefore be very interesting to visualize the patterns which
    lead to the activation of the filters on different levels.


    The MNIST data set can also be used to train a Convolutional Network. The associated
    program


    ```

    MNIST_keras_Train_1V0.py

    ```'

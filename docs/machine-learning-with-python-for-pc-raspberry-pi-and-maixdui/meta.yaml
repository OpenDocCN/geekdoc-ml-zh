    # Chapter 18 • Electronic Components


    Machine learning and neural networks are mainly software-based topics. Many introductions
    deal exclusively with PCs running Windows or Linux. Therefore, it is difficult
    to include hardware components such as light-emitting diodes (LEDs), transistors
    or sensors, as modern computers do not provide suitable interfaces for these devices.


    However, in this book the Raspberry Pi and the MaixDuino are used, hardware systems
    that provide various interface possibilities via the GPIO pins (General Purpose
    Input/Output) readily available on the boards. Thus, it is possible to connect
    electronic components with little effort.


    In this way, the software-based ML applications can also be used in the real world,
    and new interesting projects are emerging in the field of IoT or physical computing.
    The biometric scanner from Section 15.11 or the bottle detector from Chapter 13.7
    are just two examples.


    So, if you want to work with ML projects not just on the screen, you need a few
    additional components. With these, both the RPi and the MaixDuino can be expanded
    into complete stand-alone systems. In the simplest case, an external LED with
    series resistor can be used to set up a person recognition system, for example.


    However, as the complexity of the projects increases, so does the number of components
    required. This section therefore describes the most important basic components,
    such as:


    +   - jumper wires

    - resistors

    - light-emitting diodes (LEDs)

    - transistors

    - sensors


    The following sections go into more detail about the most important components
    and their applications. These chapters cannot possibly provide a complete introduction
    to electronics. If necessary, further sources can be found in the Bibliography.


    # 18.1 Breadboards


    Various methods are available for electronic circuit construction. One variant
    is the creation of a printed-circuit board onto which the components are soldered.
    This allows reliable and durable circuits and devices to be created.


    In addition, special "perfboards" or "Veroboards" are widely used for hobby applications.
    These have a regular conductor track structure, which allows the construction
    of more complex circuits with components and connecting wires. However, this method
    is not very suitable for experimental purposes as it is always necessary to re-solder
    parts in case of modifications or changes.'
  - '[PAGE 236]


    Recently, so-called "breadboards" became popular for experimental applications.
    These are solderless boards that allow fairly complex circuits to be put together
    without soldering. These boards are ideal for teaching and experimenting with
    the Raspberry Pi or the Maix-Duino [13,15].


    Electronic components can be connected to the boards without soldering. Most breadboards
    are divided into two parts:


    +   1) the main connector panel

    2) two or more supply voltage ("power") rails.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_236_0.png)


    Figure 18.1: Some breadboards.


    The main panel consists of several rows of metal springs. The rows each have five
    holes for receiving component wires. Component wires inserted into one of these
    five holes are electrically connected to each other. The lines in Figure 18.1
    indicate this.


    Bus rails are connected over half or the full length of the plug-in board. If
    you want to use split rails across the entire breadboard, you have to connect
    the rails using wire jumpers. The bus rails are often used as power supply rails.
    But they can also be used for other purposes. Plug-in boards come in a wide variety
    of shapes, colors, designs and sizes. Many variants have mechanical connectors
    at the edges so that several boards can be plugged together.


    Breadboards are widely used in electronics industry for circuit development. With
    proper use, they achieve a long lifetime. It should be noted that thin wires are
    easily bent when plugged in. Therefore, the fragile component wires must always
    be inserted exactly perpendicularly. With new boards, inserting the wires requires
    some force. Tweezers can be useful here.'
  - '[PAGE 237]


    # 18.2 Wires and jumpers


    Since thin individual wires often do not provide good electrical contact, so-called
    "jumper wires" can be used to make electrical connections on a breadboard. These
    are flexible stranded wires with contact pins at both ends. This method allows
    electrical connections to be made quickly and securely. In addition, the contact
    pins bend less easily than bare wire ends. In this way, even breadboards with
    stiff contact springs can be wired without problems.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_237_0.png)


    As an alternative to the "jumpers", so-called Dupont cables can be used. These
    can also be used to connect components such as the DHT-11 sensor to a breadboard.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_237_1.png)


    # 18.3 Resistors


    Virtually no electronic circuit can do without resistors. These most basic components
    of electronics have no polarity, i.e., it does not matter in which way around
    they are inserted into a circuit. Resistor values are coded by color rings. Four
    color rings are used for resis-'
  - '[PAGE 238]


    tors with higher tolerances. Three rings indicate the resistance value, the fourth
    shows the tolerance value (gold (5%) or silver (10%)). Metal-film resistors have
    five colored rings, here the fifth, usually brown, ring indicates the tolerance.
    The ring for the tolerance value can be recognized by the fact that it is slightly
    wider than the others.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_238_0.png)


    Resistors with the values 150 or 220 ohm are often used as series resistors for
    LEDs. Values of 1 kilo-ohm, 10 kilo-ohm and 100 kilo-ohm are also frequently required.
    Additional values can be generated via parallel or series connections. (e.g.,
    500 ohms by parallel connection of 2 × 1 kilo-ohm or 20 kilo-ohm by series connection
    of 2 × 10 kilo-ohm, etc.). For starters, the following values are recommended
    for approx. 10 pieces each:


    | Value | Color Rings for 5% Tolerance | Color Rings for 1% Tolerance |

    |---|---|---|

    | 220 ohm | Red - Red - Brown | Red - Red - Black - Black |

    | 1 kilo-ohm | Brown - Black - Red | Brown - Black - Black - Brown |

    | 10 kilo-ohms | Brown - Black - Orange | Brown - Black - Black - Red |


    Assortment boxes with the most important resistor values are often offered in
    electronics and online shops. In general, it is much cheaper to purchase such
    an assortment than to order the resistors individually.


    # 18.4 Light-emitting diodes (LEDs)


    Light-emitting diodes (LEDs) are often used to indicate port states (high/low).
    They only light up if their polarity is correct. If, contrary to expectations,
    an LED does not light up, first check the polarity. The cathode of an LED has
    a flattening on the plastic housing. This terminal must be connected to the more
    negative voltage potential (–). The anode must be connected to the more positive
    potential (+). Often, the cathode can also be recognized by the shorter connecting
    wire.'
- md: "When connecting standard LEDs to a voltage source, a series resistor is required.\
    \ Since the signal levels of both the MaixDuino and the Raspberry Pi are 3.3 V,\
    \ 220-ohm or 150-ohm resistors are best suited. Depending on the color, an LED\
    \ drops between 1.6 V and 2.5 V, leaving approx. 0.8 V to 1.6 V for the series\
    \ resistor. The LED currents are therefore around 4 to 7 mA. Thus, modern LEDs\
    \ show sufficient brightness and both the LED and the microcontroller operate\
    \ in a safe range.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_239_0.png)\n\n\
    *Figure 18.5: Light-emitting diodes (LEDs).*\n\nEven simpler is the use of so-called\
    \ 5 V LEDs. With this type, the series resistor is already integrated into the\
    \ housing. A separate series resistor is therefore not required. Modern 5 V LEDs\
    \ also are sufficiently bright when operated at 3.3 V.\n\n## 18.5 Transistors\n\
    \nFor the control of higher power levels, a transistor is still the method of\
    \ choice. The following figure shows a classic small-signal transistor. Its connections\
    \ are marked with\n\n- collector (C)\n- base (B)\n- emitter (E)\n\nThese three\
    \ connections can also be found in the circuit diagram.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_239_1.png)\n\
    \n*Figure 18.6: Transistor.*\n\nThe figure shows the different representations\
    \ of a transistor. At the top left is a 3-dimensional view. This is the standard\
    \ representation of a transistor in an assembly diagram. The letter N indicates\
    \ that it is a so-called npn transistor. This designation refers to the internal\
    \ structure of the transistor [13].\n\nBelow is a top view. This is advantageous\
    \ if the 3-D representation takes up too much space. In addition, the individual\
    \ connections (B, C, E) are also recognizable in the symbol in this representation.\
    \ To the right is the circuit diagram.\n\nFinally, on the far right is a photo\
    \ of a BC548 transistor type. The marking can be found on the flattened side of\
    \ the transistor. This flattening also indicates the direction of installation.\
    \ In the 3-D image, it is marked \"N\". The flattened side can also be seen in\
    \ the top view.\n\nIndividual transistors are sensitive components that break\
    \ down even at small overloads. From the outside, it is impossible to tell whether\
    \ the transistor is still usable or defective. In case of doubt, a transistor\
    \ that does not work as expected must be replaced.\n\nIf a small base current\
    \ goes into a functioning transistor, a current can also flow across the main\
    \ path (emitter-collector). The stronger the base current, the stronger the emitter-collector\
    \ current. In this way, a very small current can be used to control a large one.\n\
    \nThis makes transistors ideally suited for controlling larger loads with small\
    \ currents. Using transistors, a small current drawn from a Raspberry or MaixDuino\
    \ pin, can easily control the fan motor of the ChatBot in Chapter 14.5.\n\n##\
    \ 18.6 Sensors\n\nThe DHT-11/22 is a relatively inexpensive temperature and humidity\
    \ sensor. The air humidity is recorded in both types via a capacitive measuring\
    \ method. A thermistor is used to measure the air temperature. The transducer\
    \ provides an internally generated digital signal on its data pin, so there is\
    \ no need to use an analog input. However, the module only provides a new value\
    \ every two seconds. Since room temperature and air humidity usually do not change\
    \ very quickly, the measuring speed should be perfectly sufficient in most cases.\
    \ The following two figures show a photo of the module and the corresponding pin\
    \ assignment.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_240_0.png)\n\nThe DHT11\
    \ requires a so-called pull-up resistor of approx. 5 kilo-ohms. This must be connected\
    \ from the data output to the positive supply voltage. This value is not critical\
    \ and the sensor usually works with a 10 kilo-ohm pull-up. If in doubt, two 10\
    \ kilo-ohm resistors can also be connected in parallel. In some cases, the pull-up\
    \ can be omitted, as internal pull-ups in the controller used in each case take\
    \ over the function.\n\n## 18.7 Ultrasound range finder\n\nUltrasonic transducers\
    \ are used in many applications such as parking assistance systems for cars, in\
    \ robotics or in ultrasonic remote controls. The use of ready-made modules is\
    \ usually the most cost-effective solution. A popular version is the US-020 module.\
    \ This is available from many electronics companies. In addition to the transmitter\
    \ and receiver, the module also contains all the necessary evaluation electronics.\
    \ A compatible component is also available under the designation HC-SR04.\n\n\
    In addition to ground (GND) and supply voltage, the module has the two connections\
    \ \"Trig\" for the trigger input and \"Echo\". Trig is used to start an ultrasonic\
    \ pulse train; the echo pin provides information on the received ultrasound signal.\
    \ The following four connections are required to connect the module to the Raspberry\
    \ Pi:\n\n| US-020 | Raspberry Pi |\n|---|---|\n| GND | Ground |\n| Vcc | 3.3 V\
    \ |\n| Trig | 18 |\n| Echo | 20 |\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_241_0.png)\n\
    \n*Figure 18.8: Ultrasound module.*\n\nWhen purchasing the module, make sure that\
    \ it also works with 3.3 V (input voltage: 3.3–5 V), which obviates a level converter.\n\
    \n## Chapter 19 • Troubleshooting\n\nThe following list shows the most common\
    \ causes of errors in breadboard assemblies. Assuming a circuit is carefully checked\
    \ in the event of an error, there is a high probability that it will work properly\
    \ in the end.\n\n1. Hardware\n    - Are all polarized components inserted in the\
    \ correct orientation? Check LEDs and transistors in particular!\n    - Make sure\
    \ that bare connecting wires of components do not touch each other unintentionally.\n\
    \    - Are all resistors correctly selected? In poor lighting conditions, the\
    \ color rings (specifically red and orange) can easily be mixed up.\n    - \"\
    Reverse engineering\": If a circuit refuses to work at all, it can be very useful\
    \ if you draw your own circuit diagram according to the actual setup. This often\
    \ makes the assignment of the individual components clearer.\n    - Is the USB\
    \ or programming cable connected correctly?\n\n2. Errors can also occur during\
    \ programming or upload. The following general actions can be helpful here:\n\
    \    - reload the MicroPython system;\n    - press the Boot or Enable buttons\
    \ on the MaixDuino;\n    - restart Thonny;\n    - disconnect and reconnect your\
    \ USB link.\n\nMore specific and detailed information on troubleshooting can be\
    \ found in the individual chapters.\n\n## Chapter 20 • Buyers Guide\n\nThe two\
    \ embedded boards mainly used in this book, the Raspberry Pi and the MaixDuino,\
    \ are readily available on the market:\n\n- The MaixDuino can be ordered from\
    \ the Elektor Store as a complete kit with display and camera.\n- Raspberry Pi\
    \ boards and other electronic components, parts and modules are available from\
    \ the major electronics companies:\n    - Elektor Store: www.elektor.com\n   \
    \ - Amazon\n    - eBay\n    - Aliexpress\n    - and others\n\nThese are all good\
    \ sources for component assortment boxes, product bundles with various interesting\
    \ components, and modules.\n\n## Chapter 21 • References; Bibliography\n\nMore\
    \ in-depth information and many applications on the topic of Python and MicroPython\
    \ can be found in the book\n\n- [1] *MicroPython for Microcontrollers*, G. Spanner,\
    \ Elektor 2020.\n\nFurther suggestions and details on individual chapters can\
    \ be found in various editions of *ELV Journal* (available in German only):\n\n\
    - [2] Machine Learning und Neuronale Netze, ELV 3/21\n- [3] Start in die KI-Praxis,\
    \ ELV 4/21\n- [4] Maschinelles Handschriftenlesen, ELV 5/21\n- [5] Spracherkennung\
    \ und Sprachsynthese, ELV 6/21\n- [6] Objekterkennung, ELV 1/22\n- [7] Gesichtserkennung,\
    \ ELV 2/22\n\nAn introduction to MicroPython is provided by the following articles\
    \ in *Elektor Magazine*:\n\n- [8] MicroPython for the ESP32 & Co. – Part 1. G.\
    \ Spanner, *Elektor* April 2021\n- [9] MicroPython for the ESP32 & Co. – Part\
    \ 2. G. Spanner, *Elektor* June 2021\n\nThe following articles in *Elektor Magazine*\
    \ introduce the MaixDuino in general:\n\n- [10] W. Trojan, AI for Beginners (1),\
    \ *Elektor* 04/2020\n- [11] W. Trojan, AI for Beginners (2), *Elektor* 06/2020\n\
    \nThe book:\n\n- [12] *Robotics and Artificial Intelligence*, G. Spanner, Elektor\
    \ 2019\n\noffers many applications and practical examples of machine-learning\
    \ techniques and artificial intelligence in robotics.\n\nSupplementary information\
    \ on the subject of electronics in general can be found in the following (German-only)\
    \ e-books. This series is continuously updated and expanded:\n\n- [13] E-Book\
    \ Elektronik! – Transistors: www.amazon.de/dp/B00OXNCB02\n- [14] E-book Elektronik!\
    \ – Audio: www.amazon.de/dp/B013NSPPY6\n- [15] E-book Elektronik! – Measurement\
    \ and Instrumentation: www.amazon.de/dp/B0753GXHVP"
  mdcn: "当将标准LED连接到电压源时，需要串联一个电阻。由于MaixDuino和树莓派的信号电平均为3.3V，因此220欧姆或150欧姆的电阻最为合适。根据颜色不同，LED的压降在1.6V到2.5V之间，留给串联电阻的电压约为0.8V到1.6V。因此，LED电流大约在4到7毫安之间。这样，现代LED能显示出足够的亮度，并且LED和微控制器都能在安全范围内工作。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_239_0.png)\n\n*图18.5：发光二极管（LED）。*\n\
    \n更简单的是使用所谓的5V LED。对于这种类型，串联电阻已经集成在封装内。因此，不需要单独的串联电阻。现代5V LED在3.3V电压下工作时也足够明亮。\n\
    \n## 18.5 晶体管\n\n对于控制更高功率的电平，晶体管仍然是首选方法。下图展示了一个经典的小信号晶体管。其引脚标记为：\n\n- 集电极（C）\n\
    - 基极（B）\n- 发射极（E）\n\n这三个引脚也可以在电路图中找到。\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_239_1.png)\n\
    \n*图18.6：晶体管。*\n\n该图展示了晶体管的不同表示方式。左上角是三维视图。这是装配图中晶体管的标准表示法。字母N表示它是一个所谓的npn晶体管。这个名称指的是晶体管的内部结构[13]。\n\
    \n下方是俯视图。当三维表示占用空间过多时，这种表示法很有优势。此外，在这种表示法中，各个引脚（B、C、E）在符号中也是可识别的。右侧是电路图。\n\n最右侧是一张BC548晶体管型号的照片。标记可以在晶体管的扁平侧找到。这个扁平侧也指示了安装方向。在三维图像中，它被标记为“N”。在俯视图中也可以看到扁平侧。\n\
    \n单个晶体管是敏感元件，即使在小的过载下也会损坏。从外观上无法判断晶体管是否仍然可用或已损坏。如有疑问，必须更换未按预期工作的晶体管。\n\n如果一个小的基极电流流入一个功能正常的晶体管，那么电流也可以通过主路径（发射极-集电极）流动。基极电流越强，发射极-集电极电流就越强。通过这种方式，一个非常小的电流可以用来控制一个大电流。\n\
    \n这使得晶体管非常适合用小电流控制较大的负载。使用晶体管，从树莓派或MaixDuino引脚汲取的小电流可以轻松控制第14.5章中ChatBot的风扇电机。\n\
    \n## 18.6 传感器\n\nDHT-11/22是一种相对廉价的温湿度传感器。两种型号的空气湿度都是通过电容式测量方法记录的。空气温度则使用热敏电阻测量。该传感器在其数据引脚上提供内部生成的数字信号，因此无需使用模拟输入。但是，该模块每两秒才提供一个新值。由于室温和空气湿度通常不会变化得非常快，因此在大多数情况下，测量速度应该是完全足够的。以下两幅图展示了该模块的照片和相应的引脚分配。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_240_0.png)\n\nDHT11需要一个约5千欧的所谓上拉电阻。该电阻必须从数据输出连接到正电源电压。这个值并不关键，传感器通常使用10千欧的上拉电阻也能工作。如有疑问，也可以将两个10千欧电阻并联。在某些情况下，可以省略上拉电阻，因为所使用的控制器内部的上拉电阻会承担此功能。\n\
    \n## 18.7 超声波测距仪\n\n超声波传感器用于许多应用，例如汽车的停车辅助系统、机器人技术或超声波遥控器。使用现成的模块通常是最经济高效的解决方案。一个流行的版本是US-020模块。许多电子公司都有售。除了发射器和接收器，该模块还包含所有必要的评估电路。一个兼容的组件也可以在HC-SR04的名称下找到。\n\
    \n除了接地（GND）和电源电压外，该模块还有两个连接：“Trig”用于触发输入，“Echo”用于回波。Trig用于启动超声波脉冲序列；回波引脚提供关于接收到的超声波信号的信息。将该模块连接到树莓派需要以下四个连接：\n\
    \n| US-020 | 树莓派 |\n|---|---|\n| GND | Ground |\n| Vcc | 3.3 V |\n| Trig | 18\
    \ |\n| Echo | 20 |\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_241_0.png)\n\n\
    *图18.8：超声波模块。*\n\n购买模块时，请确保它也能在3.3V下工作（输入电压：3.3–5V），这样就不需要电平转换器了。\n\n## 第19章 •\
    \ 故障排除\n\n以下列表显示了面包板组装中最常见的错误原因。假设在出现错误时仔细检查电路，最终正常工作的可能性很高。\n\n1. 硬件\n    - 所有极性元件是否都以正确的方向插入？特别检查LED和晶体管！\n\
    \    - 确保元件的裸露连接线不会意外相互接触。\n    - 所有电阻是否都正确选择？在光线不足的情况下，色环（特别是红色和橙色）很容易混淆。\n \
    \   - “逆向工程”：如果一个电路完全拒绝工作，根据实际设置绘制自己的电路图会非常有用。这通常能使各个元件的分配更加清晰。\n    - USB或编程电缆是否连接正确？\n\
    \n2. 在编程或上传过程中也可能发生错误。以下通用操作可能有所帮助：\n    - 重新加载MicroPython系统；\n    - 按下MaixDuino上的Boot或Enable按钮；\n\
    \    - 重启Thonny；\n    - 断开并重新连接您的USB连接。\n\n更具体和详细的故障排除信息可以在各个章节中找到。\n\n## 第20章\
    \ • 购买指南\n\n本书主要使用的两个嵌入式板——树莓派和MaixDuino——在市场上很容易买到：\n\n- MaixDuino可以从Elektor\
    \ Store订购，作为包含显示屏和摄像头的完整套件。\n- 树莓派板和其他电子元件、零件和模块可从主要电子公司购买：\n    - Elektor Store:\
    \ www.elektor.com\n    - Amazon\n    - eBay\n    - Aliexpress\n    - 以及其他\n\n\
    这些都是获取元件分类盒、包含各种有趣元件的产品捆绑包以及模块的良好来源。\n\n## 第21章 • 参考文献；书目\n\n关于Python和MicroPython主题的更深入信息和许多应用可以在以下书中找到：\n\
    \n- [1] *MicroPython for Microcontrollers*, G. Spanner, Elektor 2020.\n\n关于各个章节的更多建议和细节可以在*ELV\
    \ Journal*的各期中找到（仅提供德语版）：\n\n- [2] Machine Learning und Neuronale Netze, ELV 3/21\n\
    - [3] Start in die KI-Praxis, ELV 4/21\n- [4] Maschinelles Handschiftenlesen,\
    \ ELV 5/21\n- [5] Spracherkennung und Sprachsynthese, ELV 6/21\n- [6] Objekterkennung,\
    \ ELV 1/22\n- [7] Gesichtserkennung, ELV 2/22\n\n*Elektor Magazine*中的以下文章提供了MicroPython的入门介绍：\n\
    \n- [8] MicroPython for the ESP32 & Co. – Part 1. G. Spanner, *Elektor* April\
    \ 2021\n- [9] MicroPython for the ESP32 & Co. – Part 2. G. Spanner, *Elektor*\
    \ June 2021\n\n*Elektor Magazine*中的以下文章介绍了MaixDuino的概况：\n\n- [10] W. Trojan, AI\
    \ for Beginners (1), *Elektor* 04/2020\n- [11] W. Trojan, AI for Beginners (2),\
    \ *Elektor* 06/2020\n\n这本书：\n\n- [12] *Robotics and Artificial Intelligence*,\
    \ G. Spanner, Elektor 2019\n\n提供了许多关于机器人技术中机器学习技术和人工智能的应用和实际示例。\n\n关于电子学一般主题的补充信息可以在以下（仅德语）电子书中找到。该系列持续更新和扩展：\n\
    \n- [13] E-Book Elektronik! – Transistors: www.amazon.de/dp/B00OXNCB02\n- [14]\
    \ E-book Elektronik! – Audio: www.amazon.de/dp/B013NSPPY6\n- [15] E-book Elektronik!\
    \ – Measurement and Instrumentation: www.amazon.de/dp/B0753GXHVP"

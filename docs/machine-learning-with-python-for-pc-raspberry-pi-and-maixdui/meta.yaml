    \ slow down the image processing considerably. However, with the 0.7 megapixel\
    \ resolution (320 × 240) used here, almost real-time processing can be achieved.\
    \ Using\n\n```\nret, img = cap.read()\n```\n\nthe continuous video stream of the\
    \ camera is broken down into individual images (frames)."
  - "[PAGE 207]\n\n# Machine Learning with Python\n\nThe read() function reads directly\
    \ from the specified video source, in this example the webcam. The return values\
    \ are:\n\n+   - the actual video frame read - i.e., one frame per loop pass;\n\
    - a return code.\n\nThe return code shows, for example, whether frames are actually\
    \ read. If a video file is used, the end of the video can be recognized in this\
    \ way. When reading from the webcam, this does not apply, since the video stream\
    \ runs practically endlessly.\n\nIn the main loop, the video images are first\
    \ converted into a black and white version, as the hair cascades work more efficiently\
    \ in this way. Then the detector is applied to the B/W video stream just generated:\n\
    \n```\nfaces = detector.\ndetectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30),\n\
    \                  flags=cv2.CASCADE_SCALE_IMAGE)\n```\n\nThe detector uses three\
    \ other parameters in addition to the video stream itself:\n\n+   1. scaleFactor:\
    \ for faster detection, the value can be increased up to 1.4, but then there is\
    \ an increasing risk that faces will be overlooked.\n2. minNeighbors: values of\
    \ 3-6 are optimal for this application; higher values lead to fewer detections,\
    \ but with better detection accuracy.\n3. minSize — minimum detected face size.\
    \ Smaller objects are ignored. Normally a value of 30x30 pixels leads to good\
    \ results.\n\nOnce a face is detected, four parameters are returned:\n\n+   x:\
    \ x-coordinate, upper left image border\ny: y-coordinate, upper left image border\n\
    w: width of the detected face in the video stream in pixels\nh: height of the\
    \ detected face in the video stream in pixels\n\nUsing the function\n\n```\ncv2.rectangle(img,(x,y),(x+w,y+h),blue,framewidth)\n\
    ```\n\na frame with the corresponding coordinates in the desired color (here blue)\
    \ and the thickness \"framewidth\" is drawn around each recognized face (Figure\
    \ 15.9)."

    # 15.6 Social minefields? — face identification


    As already explained in the introduction to this chapter, face identification
    must be clearly distinguished from pure face recognition. In many parts of the
    world, face identification in particular is increasingly viewed critically. For
    example, the use of face recognition technology by police or authorities has already
    been banned in some cities. Politicians consider the danger of using facial recognition
    technology to be greater than the potential benefits in the fight against crime.
    The "uninterrupted surveillance by camera systems threatens the possibility of
    living free from observation by police, authorities or government," is a statement
    in a city council resolution of a Californian city.


    Yet the technology is poorly regulated in many countries. In addition to potential
    misuse of the systems by dictatorial regimes, unacceptable invasions of privacy
    could therefore also occur in democratic states.


    The biometric data collected via facial identification is unique to each person.
    In addition to faces, however, the eyes alone (retina scan), the course of veins
    under the skin, human voices, the way of walking or typing on a keyboard can also
    be used for personal identification. Authorities, governments and even companies
    all over the world use recording devices to collect biometric data. This means
    that in principle any person, once recorded, could be tracked in all their movements.
    When the person accesses office equipment, checks in at an airports, or gets its

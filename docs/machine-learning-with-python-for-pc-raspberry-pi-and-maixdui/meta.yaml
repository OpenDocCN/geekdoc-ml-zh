    \ for the MaixDuino\n\nThe following steps are required to create your own model\
    \ for the MaixDuino:\n\n- create a Jupyter notebook as a training base;\n- export\
    \ a tflite model;\n- convert the tflite model into a kmodel readable by the MaixDuino;\n\
    - loading the kmodel onto the MaixDuino;\n- create a Python program to evaluate\
    \ the kmodel\n\nThese steps will be explained using the MNIST data set as an example.\
    \ Although this consists of prefabricated image data, these could easily be replaced\

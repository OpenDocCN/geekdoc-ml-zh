    control low-level hardware such as LEDs, displays or motors. The acquisition of
    analog voltage values or working with SD cards becomes very simple with the available
    libraries. Integrated garbage collection and a dynamic allocation process enable
    efficient memory management in Python. There is therefore hardly any need to use
    pointers or similar constructs that are usually difficult for beginners to penetrate.


    The often cryptic C symbols such as x ++, <<, >> etc. as well as the complex variable
    declaration represent a hurdle for beginners that should not be underestimated.
    Python is known for its simplicity and the excellent legibility of the code.


    Since MicroPython was developed as a "light version" for microcontroller applications,
    not all libraries and functions available in standard Python are supported. Nevertheless,
    you can easily switch to the micro version if you are already familiar with Python.
    There are just a few syntactic structures or instructions that are not available
    or applicable in MicroPython.


    Python is interpreted. This means that the original program code is processed
    directly by the target processor. Compilation is not required. Python therefore
    offers the possibility of executing code on a wide variety of systems. All you
    need is an up-to-date interpreter. One of the greatest advantages of Python code
    is its broad compatibility and portability. Python programs can be executed on

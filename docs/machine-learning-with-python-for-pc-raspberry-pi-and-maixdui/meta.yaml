  - '[PAGE 50]


    • Within the Thonny IDE, pressing the Stop / Restart Backend button (or CTRL-F2)
    can often solve communication problems between PC and board.


    Otherwise, the following hints may help:


    **Error 1:** No connection to the board established.

    In this case, the following error messages are printed:


    ```

    ============================== RESTART ==============================

    Unable to connect to COM14

    Error: could not open port ''COM14'': FileNotFoundError(2, ''The system cannot
    find the file specified.'', None, 2)

    or:


    ============================== RESTART ==============================

    Could not connect to REPL.

    Make sure your device has suitable firmware and is not in boot-loader mode!

    Disconnecting.

    or:

    ============================== RESTART ==============================

    Lost connection to the device (EOF).

    ```


    Here, it is often helpful to interrupt and then re-establish the USB connection
    to the module. You should also check whether the correct serial port is selected
    under:


    Run → Select Interpreter


    This error could also indicate that the serial port is already in use by another
    program, such as a serial terminal or the Arduino IDE. In that case, make sure
    that all programs potentially establishing serial communication are closed. The
    Thonny IDE should then be restarted.


    **Error 2:** The Thonny IDE does not respond or issues an internal error

    After closing and reopening the active window, you should be able to continue
    working as usual. If crashes occur repeatedly, the entire Thonny IDE should be
    restarted.


    **Error 3:** The Thonny IDE no longer responds to the Stop / Restart Backend button

    After pressing the button called Stop / Restart Backend, you should wait a few
    seconds. The MaixDuino needs time to restart and to re-establish the serial communication
    with Thonny. If the Stop button is clicked in rapid succession several times,
    the board does not have enough time to restart properly. This may cause the Thonny
    IDE to crash.


    **Error 4:** Problems when restarting the MaixDuino, executing a new script, or
    opening the serial interface.'

- md: "## 8.11 Jupyter\n\nJupyter notebook is a very powerful tool for the interactive\
    \ development of data-based projects. In the field of AI and Machine Learning\
    \ it has established itself as an important development tool. This chapter shows\
    \ how to set up and use Jupyter for data science projects on a PC or laptop computer.\n\
    \nThe \"notebook\" integrates code and output into a single document. This makes\
    \ it easy to combine graphics, text, mathematical equations, etc. The result is\
    \ therefore a single document which\n\n- executes code;\n- displays output.\n\n\
    Additionally,\n\n- explanations;\n- formulas;\n- diagrams\n\ncan be inserted and\
    \ displayed. Working with Python thus becomes more transparent, understandable\
    \ and reproducible. In addition, the joint development and use of code and programs\
    \ in a work group is greatly simplified. Notebooks have been used for several\
    \ years in many companies around the world. They allow for improved communication\
    \ and rapid sharing of results.\n\nAlthough it is possible to use many different\
    \ programming languages in Jupyter Notebooks, this chapter focuses on Python because\
    \ this language is particularly well suited for use in a notebook.\n\nThe easiest\
    \ way for beginners to get started with Jupyter Notebooks is to install Anaconda\
    \ (see previous chapter). Anaconda provides a full-featured machine learning environment\
    \ without the need to manage multiple installations. Operating system-specific\
    \ installation problems are also largely avoided with Anaconda.\n\n## 8.12 Installation\
    \ and Start-Up\n\nAdvanced users who have already installed Python and prefer\
    \ to manage their packages manually can also install Jupyter via pip:\n\n```\n\
    pip3 install jupyter\n```\n\nThis variant is also often used in Linux systems.\
    \ For small systems like the Raspberry Pi, ANACONDA is often not used and Jupyter\
    \ is installed directly. On Windows, Jupyter can be started using the shortcut\
    \ that was added to the start menu via Anaconda. This opens a new tab in the standard\
    \ web browser (see figure 8.18)\n\nThis is a so-called notebook dashboard that\
    \ was specially developed for the management of individual notebooks. It serves\
    \ as a launchpad for editing and creating notebooks. The dashboard can only be\
    \ used to access the files and sub-folders that are visible in the Jupyter start\
    \ directory.\n\nWhen Jupyter Notebook is open in the browser, the dashboard is\
    \ displayed in the URL bar as\n\n```\nhttp://localhost:8888/tree\n```\n\nThis\
    \ indicates that the content is provided by the local computer. It shows that\
    \ Notebooks are web applications. Jupyter starts a local Python server to deal\
    \ with the apps to the web browser. This makes them essentially platform-independent\
    \ and allows easy sharing on the web.\n\nTo create the first notebook, select\
    \ \"New\" in the drop-down button at the top right and then \"Python 3\" (see\
    \ figure above). This opens the first Jupyter notebook in a new tab. A new file\
    \ \"Untitled.ipynb\" appears in the browser. A green bordered text field indicates\
    \ that the notebook is actively running. Each notebook uses its own tab so that\
    \ several notebooks can be opened at the same time.\n\nThe .ipynb file (**interactive\
    \ Python Jupyter notebook**) contains a text file describing the contents of a\
    \ notebook in the so-called JSON format. Each cell, including graphs, comments\
    \ or formulas etc. is stored in it, together with the associated metadata.\n\n\
    When working with Jupyter, the terms \"cells\" and \"kernel\" play a central role:\n\
    \n- A kernel is a \"calculating machine\" that executes the code contained in\
    \ the notebook.\n- A cell is a container for text to be displayed in the notebook\
    \ or for code to be executed by the notebook's kernel.\n\nIn a new notebook (Figure\
    \ 8.19), the field with the green border is called a cell. There are two main\
    \ cell types:\n\n- Code cells contain program instructions to be executed by the\
    \ kernel. When the code is executed, the notebook displays the output under the\
    \ code cell that generated it.\n- A Markdown cell contains formatted text and\
    \ just displays its output directly when the Markdown cell is executed.\n\nJupyter\
    \ can also be tested with the classic hello world example. The input\n\n```\n\
    print('Hello World!')\n```\n\ninto the first cell and clicking the 'Run' button\
    \ or the key combination\n\nCtrl + Enter\n\nshould give the following result:\n\
    \nIf the cell has been successfully executed, the output is displayed directly\
    \ below and the label to the left of it changes from In [ ] to In [1].\n\nThe\
    \ output of a code cell is also part of the document. The difference between code\
    \ cells and Markdown cells can be seen in the fact that code cells have the In\
    \ [ ] label on the left, whereas Markdown cells do not.\n\nThe \"In\" part of\
    \ the label stands for \"Input\", while the number indicates, in which order the\
    \ cell was executed on the kernel - in this case, this cell was the first to be\
    \ executed.\n\nIf the cell is executed again, In [1] changes to In [2], as the\
    \ cell was now the second to be executed on the kernel.\n\nThe following code:\n\
    \n```\nimport time\ntime.sleep(5)\n```\n\ndoes not produce any output but takes\
    \ five seconds to execute. Jupyter indicates that the cell is currently active\
    \ by displaying In [*] on the left.\n\nIn a Jupyter notebook there is always an\
    \ 'active' cell, highlighted with a border whose color indicates the current mode:\n\
    \n- a green outline means that the cell is in \"edit mode\".\n- a blue outline\
    \ indicates the \"command mode\"\n\nCells in command mode can be executed with\
    \ \"Ctrl + Enter\". There are also a number of other commands that can be applied\
    \ to cells with a blue outline. Various keyboard shortcuts are available for this\
    \ purpose. These keyboard shortcuts allow a quick cell-based workflow. Some important\
    \ examples are listed below:\n\n- Esc or Enter switches between edit and command\
    \ mode\n- In command mode:\n    - Scrolling is possible using \"up\" and \"down\"\
    \ keys.\n    - by pressing A or B, a new cell is inserted above or below the active\
    \ cell.\n    - M converts the active cell into a Markdown cell\n    - Y converts\
    \ the active cell to a code cell\n    - D + D (i.e., twice D) deletes the active\
    \ cell\n    - Z undoes the deletion of cells\n- Ctrl+Shift+\"-\" divides the active\
    \ cell at the cursor in edit mode\n\nWith \"Markdown\", Jupyter provides an easy-to-learn\
    \ markup language for formatting simple text. The syntax corresponds to the HTML\
    \ tags. In the context of this book, however, it will hardly be used, as comprehensive\
    \ formal formatting is mainly required for scientific publications or presentations.\n\
    \n## 8.13 Using MicroPython Kernels in Jupyter\n\nTo interact with a MicroPython\
    \ enabled controller, a special kernel must be installed. If Python 3 is already\
    \ installed on the host computer, the following repository can be loaded via the\
    \ shell:\n\n```\ngit clone https://github.com/goatchurchprime/jupyter_micropython_kernel.git\n\
    ```\n\nSubsequently the library is installed via the corresponding shell command:\n\
    \n```\npip3 install jupyter_micropython_kernel\n```\n\nFinally, the kernel can\
    \ be configured using\n\n```\npython -m jupyter_micropython_kernel.install\n```\n\
    \nAfter (re-)starting Jupyter Notebook, a new MicroPython USB kernel is available\
    \ now."
  mdcn: "## 8.11 Jupyter\n\nJupyter notebook 是一个非常强大的工具，用于基于数据的项目交互式开发。在人工智能和机器学习领域，它已成为一个重要的开发工具。本章将展示如何在个人电脑或笔记本电脑上为数据科学项目设置和使用\
    \ Jupyter。\n\n“notebook”将代码和输出集成到一个文档中。这使得结合图形、文本、数学方程式等变得非常容易。因此，最终得到的是一个单一文档，它：\n\
    \n-   执行代码；\n-   显示输出。\n\n此外，还可以插入和显示：\n\n-   解释说明；\n-   公式；\n-   图表。\n\n因此，使用\
    \ Python 变得更加透明、易于理解且可复现。此外，它极大地简化了工作小组内代码和程序的共同开发与使用。多年来，notebook 已在全球许多公司中使用。它们有助于改善沟通并快速分享成果。\n\
    \n尽管可以在 Jupyter Notebook 中使用多种不同的编程语言，但本章重点关注 Python，因为这种语言特别适合在 notebook 中使用。\n\
    \n对于初学者来说，开始使用 Jupyter Notebook 最简单的方法是安装 Anaconda（参见上一章）。Anaconda 提供了一个功能齐全的机器学习环境，无需管理多个安装。使用\
    \ Anaconda 也能在很大程度上避免特定操作系统带来的安装问题。\n\n## 8.12 安装与启动\n\n已经安装了 Python 并且更喜欢手动管理软件包的高级用户，也可以通过\
    \ pip 安装 Jupyter：\n\n```\npip3 install jupyter\n```\n\n这种变体也常用于 Linux 系统。对于像树莓派这样的小型系统，通常不使用\
    \ ANACONDA，而是直接安装 Jupyter。在 Windows 上，可以使用通过 Anaconda 添加到开始菜单的快捷方式来启动 Jupyter。这会在标准网络浏览器中打开一个新标签页（见图\
    \ 8.18）。\n\n这是一个所谓的 notebook 仪表板，专门用于管理各个 notebook。它作为编辑和创建 notebook 的启动板。仪表板只能访问在\
    \ Jupyter 启动目录中可见的文件和子文件夹。\n\n当 Jupyter Notebook 在浏览器中打开时，仪表板在 URL 栏中显示为：\n\n\
    ```\nhttp://localhost:8888/tree\n```\n\n这表明内容由本地计算机提供。它表明 Notebook 是 Web 应用程序。Jupyter\
    \ 启动一个本地 Python 服务器来处理与 Web 浏览器的交互。这使得它们本质上是平台无关的，并允许在 Web 上轻松共享。\n\n要创建第一个 notebook，请在右上角的下拉按钮中选择“New”，然后选择“Python\
    \ 3”（见上图）。这将在新标签页中打开第一个 Jupyter notebook。浏览器中会出现一个新文件“Untitled.ipynb”。一个绿色边框的文本框表示\
    \ notebook 正在活跃运行。每个 notebook 使用自己的标签页，因此可以同时打开多个 notebook。\n\n.ipynb 文件（**交互式\
    \ Python Jupyter notebook**）包含一个文本文件，该文件以所谓的 JSON 格式描述 notebook 的内容。每个单元格，包括图形、注释或公式等，都存储在其中，并附带相关的元数据。\n\
    \n在使用 Jupyter 时，“单元格”和“内核”这两个术语起着核心作用：\n\n-   内核是一个“计算机器”，用于执行 notebook 中包含的代码。\n\
    -   单元格是一个容器，用于存放要在 notebook 中显示的文本或由 notebook 内核执行的代码。\n\n在一个新的 notebook（图 8.19）中，带有绿色边框的字段称为单元格。主要有两种单元格类型：\n\
    \n-   代码单元格包含由内核执行的程序指令。当代码执行时，notebook 会在生成输出的代码单元格下方显示输出。\n-   Markdown 单元格包含格式化文本，当执行\
    \ Markdown 单元格时，它会直接显示其输出。\n\nJupyter 也可以用经典的 hello world 示例进行测试。在第一个单元格中输入：\n\
    \n```\nprint('Hello World!')\n```\n\n然后点击“Run”按钮或按键组合：\n\nCtrl + Enter\n\n应该会得到以下结果：\n\
    \n如果单元格已成功执行，输出将直接显示在其下方，其左侧的标签从 In [ ] 变为 In [1]。\n\n代码单元格的输出也是文档的一部分。代码单元格和\
    \ Markdown 单元格之间的区别在于，代码单元格左侧有 In [ ] 标签，而 Markdown 单元格没有。\n\n标签中的“In”部分代表“Input”，而数字表示该单元格在内核上执行的顺序——在本例中，该单元格是第一个被执行的。\n\
    \n如果再次执行该单元格，In [1] 会变为 In [2]，因为该单元格现在是第二个在内核上执行的。\n\n以下代码：\n\n```\nimport time\n\
    time.sleep(5)\n```\n\n不产生任何输出，但执行需要五秒钟。Jupyter 通过在左侧显示 In [*] 来指示该单元格当前处于活动状态。\n\
    \n在 Jupyter notebook 中，总有一个“活动”单元格，其边框颜色表示当前模式：\n\n-   绿色轮廓表示单元格处于“编辑模式”。\n- \
    \  蓝色轮廓表示“命令模式”。\n\n命令模式下的单元格可以通过“Ctrl + Enter”执行。还有许多其他命令可以应用于带有蓝色轮廓的单元格。为此提供了各种键盘快捷键。这些键盘快捷键允许快速的基于单元格的工作流程。下面列出了一些重要的示例：\n\
    \n-   Esc 或 Enter 在编辑模式和命令模式之间切换\n-   在命令模式下：\n    -   可以使用“向上”和“向下”键滚动。\n   \
    \ -   按 A 或 B，可以在活动单元格上方或下方插入一个新单元格。\n    -   M 将活动单元格转换为 Markdown 单元格\n    -\
    \   Y 将活动单元格转换为代码单元格\n    -   D + D（即按两次 D）删除活动单元格\n    -   Z 撤销单元格的删除\n-   Ctrl+Shift+\"\
    -\" 在编辑模式下将活动单元格在光标处分割\n\nJupyter 提供了一种易于学习的标记语言“Markdown”，用于格式化简单文本。其语法对应于 HTML\
    \ 标签。然而，在本书的上下文中，它几乎不会被使用，因为全面的正式格式化主要用于科学出版物或演示文稿。\n\n## 8.13 在 Jupyter 中使用 MicroPython\
    \ 内核\n\n要与支持 MicroPython 的控制器进行交互，必须安装一个特殊的内核。如果主机计算机上已经安装了 Python 3，可以通过 shell\
    \ 加载以下仓库：\n\n```\ngit clone https://github.com/goatchurchprime/jupyter_micropython_kernel.git\n\
    ```\n\n随后通过相应的 shell 命令安装该库：\n\n```\npip3 install jupyter_micropython_kernel\n\
    ```\n\n最后，可以使用以下命令配置内核：\n\n```\npython -m jupyter_micropython_kernel.install\n\
    ```\n\n（重新）启动 Jupyter Notebook 后，一个新的 MicroPython USB 内核现在就可用了。"

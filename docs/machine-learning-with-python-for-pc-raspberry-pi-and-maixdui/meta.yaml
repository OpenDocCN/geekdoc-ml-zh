    # Chapter 4 • The Hardware Base


    Just a few years ago, the prevailing opinion was that machine learning or AI could
    only run on server farms or super computers. The high-performance machines that
    won chess games became "Jeopardy" masters or beat human GO specialists, shaped
    the public image of AI. However, with advances in hardware and software, the situation
    has changed dramatically. Even a mid-range PC now has several gigabytes of RAM
    and small single-board systems like a Raspberry Pi 4 are available with up to
    8 GB of memory.


    Even on microcontrollers like the ESP32, ML applications are now performing amazingly.
    In addition, special chips such as the Kendrite K210 are increasingly seen in
    the market. The hardware structure of these chips is already specifically designed
    for neural structures.


    Several different systems will therefore be used in this book. In addition to
    the classic universal PC, both the **Raspberry Pi** and the **MaixDuino** will
    prove their capabilities in the individual projects. The following table provides
    an overview of the projects related to the hardware. This should not exclude porting
    a solution to a different hardware base.


    Unfortunately, it is relatively time-consuming, for example, to control peripheral
    devices directly with a PC, since it often lacks the appropriate interfaces. With
    the Raspberry Pi or the MaixDuino, on the other hand, LEDs or relays can easily
    be controlled via the existing input/output lines and pins. Speech recognition
    and synthesis, on the other hand, would also be feasible on a PC. However, the
    implementation in Python is much easier on a Raspberry Pi system.


    | | PC, Laptop | Raspberry Pi | Sipeed MaixDuino |

    |---|---|---|---|

    | Basics | X | X | |

    | Iris classification | X | X | |

    | Handwriting recognition | X | X | X |

    | Clothes sorting | X | X | |

    | Speech recognition / synthesis | | X | |

    | Object recognition | | X | X |

    | Face recognition | | X | X |

    | Home automation | | X | X |

    | Size (approx. cm) | 30 × 40 × 15 | 9 × 6 × 1.5 | 7 × 6 × 1 |

    | Price (approx. €) | 500 | 50 | 30 |

    | Power consumption (W) | 50 | 10 | 5 |'

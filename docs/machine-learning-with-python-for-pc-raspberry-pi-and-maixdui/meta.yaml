    # 8.11 Jupyter


    Jupyter notebook is a very powerful tool for the interactive development of data-based
    projects. In the field of AI and Machine Learning it has established itself as
    an important development tool. This chapter shows how to set up and use Jupyter
    for data science projects on a PC or laptop computer.


    The "notebook" integrates code and output into a single document. This makes it
    easy to combine graphics, text, mathematical equations, etc. The result is therefore
    a single document which


    +   - executes code;

    - displays output.'
  - '[PAGE 60]


    Additionally,


    +   - explanations;

    - formulas;

    - diagrams


    can be inserted and displayed. Working with Python thus becomes more transparent,
    understandable and reproducible. In addition, the joint development and use of
    code and programs in a work group is greatly simplified. Notebooks have been used
    for several years in many companies around the world. They allow for improved
    communication and rapid sharing of results.


    Although it is possible to use many different programming languages in Jupyter
    Notebooks, this chapter focuses on Python because this language is particularly
    well suited for use in a notebook.


    The easiest way for beginners to get started with Jupyter Notebooks is to install
    Anaconda (see previous chapter). Anaconda provides a full-featured machine learning
    environment without the need to manage multiple installations. Operating system-specific
    installation problems are also largely avoided with Anaconda.


    # 8.12 Installation and Start-Up


    Advanced users who have already installed Python and prefer to manage their packages
    manually can also install Jupyter via pip:


    ```

    pip3 install jupyter

    ```


    This variant is also often used in Linux systems. For small systems like the Raspberry
    Pi, ANACONDA is often not used and Jupyter is installed directly. On Windows,
    Jupyter can be started using the shortcut that was added to the start menu via
    Anaconda. This opens a new tab in the standard web browser (see figure 8.18)


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_60_0.png)


    Figure 8.18: Jupyter Notebook after Start-Up'

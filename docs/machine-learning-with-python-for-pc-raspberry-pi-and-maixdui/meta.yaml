    # 15.7 Big Brother RPi: face identification in practice


    The ''openCV'' software library, which was already introduced in Section 10.5,
    is also suitable for applications in the field of face recognition and identification.
    Among other things, the library contains ML-based algorithms to search for faces
    in an image. Since faces have a complex structure and are subject to considerable
    individual variation, there is no simple test that could find a face in any image
    via an "if" decision. Instead, there is a multitude of patterns and functions
    that are coordinated with each other. The algorithms divide the problem of identifying
    a face into several sub-tasks, each of which is easy for a machine algorithm to
    solve. These associated algorithms are also called "classifiers".


    For the most efficient image recognition, OpenCV uses so-called cascades. Like
    a series of waterfalls, the problem is thus divided into several stages. For each
    image block, a rough but quick test is performed. If one of these tests leads
    to a positive result, a slightly more detailed test is performed and so on. The
    algorithm can perform 30 to 50 of these stages or cascades in succession. Only
    when all stages have been passed with positive results, the recognition of a face
    is confirmed.


    A significant advantage of this procedure is that the majority of an image in
    the first stages only yield negative results. This means that the algorithm does
    not waste time testing all the functions for each block in detail. This can speed
    up the process considerably. Face recognition procedures can thus be carried out
    almost in real time even on less powerful systems such as the RPi.


    Since face recognition is one of the most important applications of machine learning,
    OpenCV has a whole series of integrated cascades with which not only faces but
    also eyes, hands or legs etc. can be recognized. Moreover, it is even possible
    to interpret the mood



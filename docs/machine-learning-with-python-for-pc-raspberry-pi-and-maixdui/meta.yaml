  - '[PAGE 205]


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_205_0.png)


    Now you can install the **face recognition software**:


    ```

    sudo pip3 install face-recognition

    ```


    and **imutils**:


    ```

    sudo pip3 install imutils.

    ```


    It may take another hour or so to download these packages. After they have been
    successfully installed, practical applications can be explored. The first step
    in the following chapter is to try to localize faces in the field of vision of
    a camera.


    # 15.8 Smile, please ;-)


    The downloaded packages contains both a trainer and a detector for face identification.
    Here, the focus is on the detector first. OpenCV already contains many pre-trained
    classifiers, e.g., for


    +   - faces;

    - eyes;

    - a smile.


    The download link can be found in the LINKS.txt file (XML-files). The classifier
    files are stored in a folder, e.g., under


    ```

    face_detection_recognition/HairCascades

    ```


    Then, with just a few lines, a very effective face detection system can be built.
    The Python program for this (FaceDetector_1V0.py) is again included in the download
    package and appears to be very compact:


    ```

    import cv2


    cascade="HaarCascades/haarcascade_frontalface_default.xml"

    detector = cv2.CascadeClassifier(cascade)

    ```'

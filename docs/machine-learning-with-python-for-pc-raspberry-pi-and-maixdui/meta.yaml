  md: '# Machine Learning with Python

    For PC, Raspberry Pi,

    and Maixduino


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_247_0.png)


    Most people are increasingly confronted with the applications of Artificial Intelligence
    (AI). Music or video ratings, navigation systems, shopping advice, etc. are based
    on methods that can be attributed to this field.


    The term Artificial Intelligence was coined in 1956 at an international conference
    known as the Dartmouth Summer Research Project. One basic approach was to model
    the functioning of the human brain and to construct advanced computer systems
    based on this. Soon it should be clear how the human mind works. Transferring
    it to a machine was considered only a small step. This notion proved to be a bit
    too optimistic. Nevertheless, the progress of modern AI, or rather its subspecialty
    called Machine Learning (ML), can no longer be denied.


    **Dr. Günter Spanner** has been working in the field of electronics development
    and physics technology for various large corporations for more than 20 years.
    In addition to his work as a lecturer, he has published successful technical articles
    and books on electronics, semiconductor technology and microcontrollers, and has
    created courses and learning packages on these topics.


    In this book, several different systems will be used to get to know the methods
    of machine learning in more detail. In addition to the PC, both the Raspberry
    Pi and the Maixduino will demonstrate their capabilities in the individual projects.
    In addition to applications such as object and facial recognition, practical systems
    such as bottle detectors, person counters, or a “talking eye” will also be created.


    The latter is capable of acoustically describing objects or faces that are detected
    automatically. For example, if a vehicle is in the field of view of the connected
    camera, the information "I see a car!" is output via electronically generated
    speech. Such devices are highly interesting examples of how, for example, blind
    or severely visually impaired people can also benefit from AI systems.


    Elektor International Media. b.v.

    www.elektor.com


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_247_1.png)'
  merge: -1

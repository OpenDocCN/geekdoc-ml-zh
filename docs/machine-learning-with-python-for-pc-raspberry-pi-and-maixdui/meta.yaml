- md: "## 14.5 RPi as a ChatBot\n\nUsing the instruction\n\n```\narecord -l\n```\n\
    \nyou can once again create a list of the existing sound components. USB sound\
    \ cards or webcams should also appear here. The command\n\n```\narecord -D plughw:\
    \ 1,0 test.wav\n```\n\nstarts sound recording. The recording is saved in the file\
    \ *test.wav*. The playback via headphones or active boxes is done via the command\n\
    \n```\naplay test.wav\n```\n\nIf the recorded sound is audible, the microphone\
    \ and sound output are working properly. Otherwise, settings and volume adjustment\
    \ should be checked again.\n\nWith the sound card or the camera microphone, a\
    \ sound input is now available that can also serve as the basis for a speech recognition\
    \ system.\n\nAs shown in the last sections, a well understandable speech output\
    \ can be built without any problems using the local resources of a Raspberry Pi.\
    \ However, for efficient speech recognition, even the resources of a Pi4 with\
    \ 8 GB are still insufficient. At this point, online services cannot be avoided.\
    \ One possibility is the use of the \"SpeechRecognition\" module provided by Google.\
    \ This can be installed via a series of **apt-get** instructions. Via the file\
    \ *SpeechRecognition.txt* in the download package, the commands can be transferred\
    \ directly into the terminal using copy-and-paste. The complete installation takes\
    \ about one hour.\n\nFor the Speech-Recognition application, the user's voice\
    \ commands are first captured by the microphone and then digitized by the sound\
    \ card. In the Google API, the phonemes are converted into machine-readable text.\
    \ In this way, a corresponding program can be used as part of an interactive voice\
    \ response system. With suitable Python code, the Raspberry can finally react\
    \ to given instructions via voice command. Figure 14.5 illustrates the basic structure\
    \ of the ChatBot created in this way:\n\nThe corresponding code (*ChatBot_DHT11_1V2.py*)\
    \ is again included in the download package. In the following, the essential parts\
    \ of the program will be discussed in more detail. First, some keywords are defined:\n\
    \n```python\ngreetings=['hello', 'hi', 'hey']\nquestions=['how are you', 'how\
    \ are you doing']\nresponses=['okay', 'i am fine']\ndatabase={\n 'hello Robert':'hello,\
    \ dr Falken, how can i help you',\n 'name':'Robert',\n 'what is your name':'my\
    \ name is Robert',\n 'what can you do for me':'i can do many things..',\n 'I love\
    \ you':'i love you too'\n }\nexitWord=['quit','exit','bye','goodbye']\n```\n\n\
    Then some predefined answers are included. To prevent the dialogues from becoming\
    \ too monotonous, a certain flexibility has been integrated. The question \"How\
    \ are you?\" can be answered with \"okay\" or \"I am fine\".\n\nThe audio signal\
    \ is received from the microphone using\n\n```python\naudio = r.listen(source)\n\
    ```\n\nWith m as source. Next, the following statement is used\n\n```\nvalue =\
    \ r.recognise_google(audio)\n```\n\nto search for intelligible speech in the audio\
    \ signal. If recognizable words or whole sentences are found, they are converted\
    \ into text. This information is subsequently available in the variable \"data\"\
    \ for further processing. The variable can be searched for keywords. Individual\
    \ subroutines such as\n\n```python\nelif 'temperature' in data:\n    print(\"\
    You said: %s\" % reply)\n    humidity, temperature = DHT.read_retry(sensorType,\
    \ humiturePin)\n    print(\"The room temperature is: \", temperature, end=\"\"\
    ); print(\" °C\")\n    number=num2words(temperature)\n    esng.say(\"the room\
    \ temperature is\", sync=True)\n    esng.say(number, sync=True)\n    esng.say(phrase3,\
    \ sync=True)\n```\n\nor\n\n```python\nelif 'CPU temperature' in data:\n    print(\"\
    You said: %s\" % reply)\n    tempCPU=getCPUTemperature()\n    print(\"CPU temperature:\
    \ \", tempCPU, end=\"\"); print(\" °C\")\n    number=num2words(tempCPU)\n    esng.say(\"\
    the CPU temperature is\", sync=True)\n    esng.say(number, sync=True)\n    esng.say(phrase3,\
    \ sync=True)\n```\n\nreact accordingly to different instructions. The first routine\
    \ acoustically spells out the room temperature detected by the connected DHT11\
    \ sensor. In the second case, the ChatBot delivers the RPi's current CPU temperature.\n\
    \nAs already mentioned, the Raspberry Pi differs from a PC or laptop in providing\
    \ readily programmable I/O pins. This makes the board ideal for home automation\
    \ applications. In this respect, the RPi is clearly superior to a classic computer.\
    \ The library for controlling the hardware pins is included using the instruction\n\
    \n```\npip install Rpi.GPIO\n```\n\nTogether with the speech recognition and output\
    \ modules, this library provides a powerful basis for controlling external hardware\
    \ components. From a simple LED to small motor or servos, to a relay-controlled\
    \ air-conditioning system, there are almost no limits for the possible applications.\n\
    \nSimple keyword queries such as\n\n```python\nelif 'light on' in data:\n    print(\"\
    turning light on\")\n    esng.say(\"turning light on\", sync=True)\n    GPIO.output(LEDPin,True)\n\
    ```\n\ncan be used to switch and control lighting, fans or cooling units using\
    \ the I/O port specified.\n\nThe program in the download package can evaluate\
    \ the following instructions, among others:\n\n| Query | Action |\n|---|---|\n\
    | light on / off | switches pin 23 or the LED connected there on or off. |\n|\
    \ fan on / off | controls a fan connected to pin 24. |\n| time | reads out the\
    \ current time |\n| room temperature | reads out the room temperature via DHT11\
    \ sensor |\n| humidity | reads out the air humidity via DHT11 sensor |\n| CPU\
    \ temperature | reads out the CPU temperature |\n\nThe program also contains some\
    \ answers that could bring special joy, not only to children. For example, the\
    \ system also responds to the query \"what does the cat say?\" In this context,\
    \ it is also interesting how precisely the speech recognition distinguishes between\
    \ \"dog\" and \"duck\". Of course, the system can easily be extended to other\
    \ instructions.\n\nThe download also contains a link to a video that demonstrates\
    \ the basic application of a voice-controlled home automation system. The following\
    \ figure shows how the DHT11 sensor, a LED or a small motor can be connected to\
    \ the RPi.\n\nFigure 14.6: Circuit for a Home Automation ChatBot\n\nThe entire\
    \ system can be easily built on a breadboard. The resistors have the following\
    \ values:\n\n- orange - orange - orange 33 kiloohm\n- brown - black - orange 10\
    \ kiloohm\n- red - red - brown 220 ohm\n\nThe complete system looks like the version\
    \ in Figure 14.7.\n\nMachine Learning with Python\n\nFigure 14.7: Setup proposal\
    \ for a chatbot.\n\nFurther information on the components used here can be found\
    \ in Chapter 18.\n\n## 14.6 From ELIZA to ChatterBots\n\nStarting in the early\
    \ days of AI research, attempts were made to transfer the mental abilities of\
    \ humans to machines in order to solve certain problems. The goal was to make\
    \ the comprehensive in-depth knowledge of highly qualified \"experts\" as universally\
    \ accessible as possible. For example, the diagnosis of infectious diseases was\
    \ to be automated in order to relieve highly trained medical doctors from routine\
    \ tasks.\n\nHowever, it quickly became apparent that the knowledge representation\
    \ of even a narrowly defined field quickly became extremely complex. Rule-based\
    \ diagnoses quickly required decision trees that were no longer manageable. For\
    \ example, the simple flu symptoms like cough, hoarseness and aching limbs can\
    \ indicate a multitude of different diseases. Experienced doctors can quickly\
    \ rule out unlikely diagnoses, whereas an expert system has to ask dozens of questions\
    \ to do so.\n\nThe maintenance of these systems also became a problem: the systems\
    \ were not adaptive! Innovative approaches and better computer systems therefore\
    \ led to the development of machine learning in this area, among others.\n\nSimple\
    \ \"expert systems\" nevertheless have their justification. They can still be\
    \ used successfully in narrowly defined areas. As shown in the last chapter, a\
    \ few instructions are sufficient for a home automation system to adjust lighting\
    \ or temperature conditions in a living room.\n\nTherefore, chatbots are often\
    \ used in special dialogue systems. Corresponding applications can be found in\
    \ the most diverse areas such as\n\n- customer service, order taking or support;\n\
    - entertainment, finance, games;\n- health care;\n- human resources and marketing;\n\
    - news, social, sports and travel agencies.\n\nThe progressive improvement of\
    \ technology eventually formed the basis for the voice recognition systems Google\
    \ Assistant, Siri, Cortana, or Alexa.\n\nSimple systems search directly for keywords\
    \ in the input. More advanced methods perform extensive analyses of the text spoken\
    \ by the user before searching for a complex suitable answer or action. This already\
    \ allows a very reliable speech recognition to be built up. Nevertheless, it can\
    \ be seen, for example when working with the Raspberry Pi ChatBot, that the reliability\
    \ is still significantly worse than with direct human-to-human communication.\n\
    \nThe forefather of all chatbots was ELIZA, an early computer program for natural\
    \ language processing. Of course, at that time, in the mid-1960s, communication\
    \ still took place via keyboards and screens. ELIZA was supposed to imitate the\
    \ typical responses of a psychotherapist. The conversation was kept going with\
    \ the help of \"pattern matching\" and substitution methods. Simple random elements\
    \ were also included.\n\nOne of the most interesting results of this experiment\
    \ was that many people revealed their most intimate thoughts and problems unfiltered,\
    \ without the chatbot having even the slightest idea of the conversant's problems.\n\
    \nA typical \"conversation\" with Eliza looked something like this:\n\n```\nELIZA\
    \ >>> Hello my name is ELIZA\nPerson: Can I ask you something?\nELIZA >>> Did\
    \ you come because you have a question?\nPerson: Yes\nELIZA >>> Are you all right?\n\
    Person: Yes, thank you for asking\nELIZA >>> That's nice!\nPerson: What are you\
    \ doing today?\nELIZA >>> We are supposed to talk about you, not about me.\nPerson:\
    \ I have problems with my mother\nELIZA >>> Why do you have problems with your\
    \ mother?\n...\n```"

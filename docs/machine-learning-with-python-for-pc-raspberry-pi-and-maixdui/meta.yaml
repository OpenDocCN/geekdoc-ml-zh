  md: 'Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_19_0.png)


    Figure 3.1: Different areas of artificial intelligence.


    Machine learning as a subregion of artificial intelligence is increasingly becoming
    the central core of current research. Independent "learning" from extensive amounts
    of data replaces personnel-intensive and problem-specific, explicit programming.
    The processing of data with known correlations and the "learning" of structures
    through so-called training play a central role.


    Later, the extracted rules can also be applied to new data and initially unknown
    contexts. The new methods analyze known data, establish certain rules, and finally
    make decisions based on them. Based on various mathematical methods, data sets
    are divided into hierarchical levels. This can eventually lead to practical applications
    such as image recognition or categorization. With the help of Python, the complex
    mathematics of neural networks can be reduced to simple functions. This allows
    users to quickly implement practical projects and yields relevant results in a
    short period of time.


    So-called deep learning can in turn be considered a special field of machine-learning
    methods. The goal is to imitate human learning behavior as effectively as possible.
    The basis for this is the use of large amounts of data as "learning material".
    Deep-learning algorithms for neural networks currently deliver the best results
    in the area of image or pattern recognition, etc. The neural networks used for
    this purpose usually consist of several intermediate layers that serve as a connection
    between the input and output nodes.'

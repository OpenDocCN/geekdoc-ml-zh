    \ detail.\n\n## 8.2 Thonny as a universal IDE for RPi and MaixDuino\n\nThere are\
    \ several different sections in the Thonny IDE, including the editor and the MicroPython\
    \ shell or terminal:\n\n- Code is created and edited in the editor area. Multiple\
    \ files can be opened, with a new tab available for each file.\n- In the MicroPython\
    \ shell, commands that are to be executed immediately are entered. The terminal\
    \ also provides information about the status of a running program, displays errors\

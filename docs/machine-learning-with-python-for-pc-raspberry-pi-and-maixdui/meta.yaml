    # 9.8 Numbers and variable types


    MicroPython supports the following number types:


    +   - integer (int);

    - floating-point (float);

    - boolean (bool);

    - complex.


    A number object is created whenever a value is specified. With **del()** the objects
    can be deleted again. In the console it looks like this:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_82_0.png)


    It is also possible to assign several variables in one line by just assigning
    values separated by commas, like so:


    ```

    a, b = 1, 2

    ```'

    # Chapter 3 • Learning from "Big Data"


    One of the important tasks in the research area of Machine Learning is to analyze,
    recognize or interpret all kind of data. In most cases, a large accumulation of
    randomly distributed data is more or less useless. Only the categorization and
    division into meaningful groups, statistical evaluations or trend analyses etc.,
    give the data a certain practical use. One goal of machine learning is therefore
    to transform data into knowledge and draw useful conclusions from it.


    For a long time, the application of ML methods was reserved to a small group of
    experts. The algorithms used were complex and hardly understandable for laymen.
    It was only through the development of open-source libraries that non-experts
    were given the opportunity to deal with AI topics and machine learning in more
    detail. This made AI procedures and data structures accessible to a wide range
    of users. The Python programming language in particular made it possible to embed
    extensive functions in simple "wrappers". With the help of uncomplicated Python
    instructions, today nearly anyone can use the powerful algorithms. No supercomputers
    are required. Rather, even small systems can recognize patterns in large amounts
    of data or derive predictions about future events and developments [2].


    In the next section, the basic structure of artificial intelligence and machine
    learning will be presented. In addition, the associated terminology will be explained
    in more detail. This will provide the basics for solving practical applications.
    In particular, the following topics will play a major role:


    +   - Different variants of machine learning and AI.

    - Learning systems, neural networks and training methods.

    - Installation of a development environment for the programming language "Python"
    or its interactive variant IPython.

    - Creating a software basis for ML methods and procedures.


    # 3.1 Machine Learning and Artificial Intelligence


    The research fields of artificial intelligence are closely related. It is often
    difficult to separate the individual sub-areas from each other. In addition to
    machine learning methods, there are other areas such as classical expert systems
    or so-called evolutionary algorithms. However, many of these different regions
    have lost some of their importance in recent years, as current developments are
    increasingly focusing on neural networks and deep learning.'
  - '[PAGE 19]


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_19_0.png)


    Figure 3.1: Different areas of artificial intelligence.


    Machine learning as a subregion of artificial intelligence is increasingly becoming
    the central core of current research. Independent "learning" from extensive amounts
    of data replaces personnel-intensive and problem-specific, explicit programming.
    The processing of data with known correlations and the "learning" of structures
    through so-called training play a central role.


    Later, the extracted rules can also be applied to new data and initially unknown
    contexts. The new methods analyze known data, establish certain rules, and finally
    make decisions based on them. Based on various mathematical methods, data sets
    are divided into hierarchical levels. This can eventually lead to practical applications
    such as image recognition or categorization. With the help of Python, the complex
    mathematics of neural networks can be reduced to simple functions. This allows
    users to quickly implement practical projects and yields relevant results in a
    short period of time.


    So-called deep learning can in turn be considered a special field of machine-learning
    methods. The goal is to imitate human learning behavior as effectively as possible.
    The basis for this is the use of large amounts of data as "learning material".
    Deep-learning algorithms for neural networks currently deliver the best results
    in the area of image or pattern recognition, etc. The neural networks used for
    this purpose usually consist of several intermediate layers that serve as a connection
    between the input and output nodes.'
  - '[PAGE 20]


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_20_0.png)


    Figure 3.2: A neuronal network.


    The layers contain so-called artificial neurons. The function of these neutrons
    is emulated by mathematical operations (see Chapter 11). The aim of this development
    is to simulate the structure of the human brain with its network of neurons, axons,
    dendrites and synapses as efficiently as possible. Deep learning is characterized
    by the use of multiple layers in the neural networks. The input layer processes
    either the direct raw data, for example, the individual pixels of an image, or
    preprocessed or filtered data streams.


    The inner or "hidden" layers take on the further processing and data reduction.
    The output layer finally delivers the results. The typical structure of such a
    neural network is shown in Figure 3.2. The deep learning methods can also be used
    to model complex relationships. The large number of network levels also allows
    to map highly non-linear functions. Without this structure, even simple logical
    gate functions would be unsolvable, as can be seen for example with the XOR gate
    (see Chapter 2).


    In contrast, deep learning algorithms are able to solve comparatively complex
    tasks. Through multiple "training runs", the in-depth learning can be improved
    with each calculation step. It has thus developed into one of the central development
    drivers in the field of artificial intelligence [11].


    The main differences between machine learning and deep learning are conveniently
    summarized in a table.'
  - '[PAGE 21]


    Machine Learning with Python


    | | Learning data | Size of the data sets required for learning | Necessary Hardware
    structure | Required Training times | Interpretation of decisions |

    |---|---|---|---|---|---|

    | **Machine Learning** | structured | All Sizes | Simple | Short | Simple |

    | **Deep Learning** | No special requirements | Extensive | Challenging | Days
    to weeks | Almost impossible |


    An important advantage of deep learning compared to general machine learning is
    the ability to process unstructured data. Real information such as images, sounds
    and videos etc. can be used here more or less directly as input data. Other machine
    learning algorithms, such as decision tree methods do not have this capability.
    If, for example, images are used as input data, complex and special program adjustments
    must always be carried out by real people.


    Examples of AI processes that work without neural networks are the so-called evolutionary
    algorithms. These programs are also based on a natural learning process. However,
    it is not the brain that is modeled, but the biological evolution. Here, the algorithms
    follow one another in different generations. According to Darwin''s principle
    of "survival of the fittest", every possible solution is evaluated and the best
    version is selected in each case. The "mutated" variants thus lead to an optimized
    algorithm that is better adapted to the given problem than the previous one.


    The last column of the table indicates a possibly serious problem with AI algorithms.
    In the case of complex neural networks, it is usually no longer possible to understand
    exactly how decisions are made. In the case of massive wrong decisions by AI systems,
    this can lead to considerable legal or social problems. Ultimately, the acceptance
    of such decisions will depend to a large extent on their perceivability. AI applications
    that do not have a minimum level of transparency will therefore hardly be able
    to establish themselves in (vital) areas.'
- md: '## Chapter 4 • The Hardware Base


    Just a few years ago, the prevailing opinion was that machine learning or AI could
    only run on server farms or super computers. The high-performance machines that
    won chess games became "Jeopardy" masters or beat human GO specialists, shaped
    the public image of AI. However, with advances in hardware and software, the situation
    has changed dramatically. Even a mid-range PC now has several gigabytes of RAM
    and small single-board systems like a Raspberry Pi 4 are available with up to
    8 GB of memory.


    Even on microcontrollers like the ESP32, ML applications are now performing amazingly.
    In addition, special chips such as the Kendrite K210 are increasingly seen in
    the market. The hardware structure of these chips is already specifically designed
    for neural structures.


    Several different systems will therefore be used in this book. In addition to
    the classic universal PC, both the **Raspberry Pi** and the **MaixDuino** will
    prove their capabilities in the individual projects. The following table provides
    an overview of the projects related to the hardware. This should not exclude porting
    a solution to a different hardware base.


    Unfortunately, it is relatively time-consuming, for example, to control peripheral
    devices directly with a PC, since it often lacks the appropriate interfaces. With
    the Raspberry Pi or the MaixDuino, on the other hand, LEDs or relays can easily
    be controlled via the existing input/output lines and pins. Speech recognition
    and synthesis, on the other hand, would also be feasible on a PC. However, the
    implementation in Python is much easier on a Raspberry Pi system.


    | | PC, Laptop | Raspberry Pi | Sipeed MaixDuino |

    |---|---|---|---|

    | Basics | X | X | |

    | Iris classification | X | X | |

    | Handwriting recognition | X | X | X |

    | Clothes sorting | X | X | |

    | Speech recognition / synthesis | | X | |

    | Object recognition | | X | X |

    | Face recognition | | X | X |

    | Home automation | | X | X |

    | Size (approx. cm) | 30 × 40 × 15 | 9 × 6 × 1.5 | 7 × 6 × 1 |

    | Price (approx. €) | 500 | 50 | 30 |

    | Power consumption (W) | 50 | 10 | 5 |


    ## Chapter 5 • The PC as Universal AI Machine


    A modern PC or laptop can do a good job in the field of machine learning. However,
    some requirements should be met for this. The following table provides an overview
    of the minimum requirements:


    | CPU | Quadcore with at least 3 GHz |

    | RAM | minimum 16 GB |

    | HDD | 1 TB |


    It is certainly possible to implement some entry-level projects with less powerful
    equipment. However, in this case the training times for neural networks, for example,
    become very tedious even for simpler applications.


    ### 5.1 The computer as a programming center


    The PC is not only used as a basis for getting started with ML projects. Rather,
    it is also required for other purposes. For example, the MaixDuino cannot be programmed
    directly. The PC is required here as a host computer which programs the Maix board
    via the USB interface.


    An active USB hub can do a good job here. It has the particular advantage in offering
    a certain protection for the USB port of the PC or laptop used. It is important
    that it is actually an **active** hub, meaning the device must have its own 5
    V power supply via a separate power supply unit. This is the only way to ensure
    that the computer port is protected in the event of a short-circuit behind the
    hub.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_23_0.png)


    Of course, even an active hub does not offer absolute protection. However, it
    is very unlikely that a short-circuit will break through an active hub and reach
    the computer''s USB port.


    If you want to use the Maix board without a PC, i.e., in a stand-alone mode, an
    external 5 V power supply unit is required too. Ideally, the hub''s power supply
    unit can be used for this. After programming, the board can be used independently
    of an USB port. It is important for the power supply to provide sufficient current.
    About 2000 milliamps (2 A) nominal current should be the minimum. If the power
    supply still has a USB-micro connector, an adapter to USB-C is required (see Figure
    5.2). Further information on stand-alone operation can be found in section 7.4.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_24_0.png)


    Figure 5.2: A USB-C adapter.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_24_1.png)


    Figure 5.3: A USB power supply.


    At this point, it should be mentioned that the MaixDuino has an integrated voltage
    regulator, just as the Arduino. This means that the boards can also be supplied
    via any power supply with an output voltage of 6 V to 12 V. The unit must be able
    to supply a current of at least 2 A. For the connection to the respective board,
    the power supply unit must have a standard coaxial power connector.


    In various applications, the Maix board runs somewhat more stable when it is operated
    via the coaxial power connector. Specifically, when an SD card is used and additional
    hardware is connected to the pins of the MaixDuino, the USB supply seems to reach
    its limits. Section 7.4 provides further information on this topic.


    ## Chapter 6 • The Raspberry Pi


    The Raspberry Pi has become one of the most popular controller boards in recent
    years. Although it is often used in hardware-related projects, it can also be
    successfully used for machine-learning applications. In particular, the newer
    generation of the Raspberry Pi 4 already brings sufficient computing power for
    this. However, the available RAM size is of crucial importance. With a Pi 4 with
    8 GB RAM, you are well-equipped. With the faster CPU, the new GPU, 4 K support,
    USB 3.0, USB-C, Bluetooth 5.0, Gigabit Ethernet, even more challenging projects
    can be implemented.


    The Raspberry Pi 4 thus sets another milestone in terms of performance and features.
    The Pi 4 is 3 times faster than its predecessor and offers significantly faster
    multimedia performance, which is particularly advantageous for image processing.
    Overall, the Pi 4 thus approaches the performance of an x86-based PC in many respects.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_26_0.png)


    Figure 6.1: The Raspberry Pi 4.


    The following table summarizes the most important parameters of the Pi 4:


    | Processor: | 64-bit-Quad-Core - ARM Cortex-A72 (4× 1.5 GHz) |

    | Video | Dual Display Support with resolutions up to 4 K via two Micro HDMI Ports<br>Hardware
    Video Decoder with up to 4Kp60<br>2× Micro HDMI (up to 4Kp60 Support)<br>2 channel
    MIPI DSI-Port (Display)<br>2 channel MIPI CSI-Port (Camera) |

    | Audio: | 4-wire Stereo Audio |

    | RAM | up to 8 GB RAM - LPDDR4 |

    | WLAN: | Dual Band 2.4 / 5 GHz<br>2.4 GHz and 5 GHz IEEE 802.11b/g/n/ac wireless
    LAN |

    | Bluetooth: | 5.0, BLE |

    | LAN: | Gigabit-Ethernet |

    | Interfaces: | 2× USB 3.0<br>2× USB 2.0 |

    | GPIO: | Standard 40 Pin GPIO-Header (compatible with older boards) |

    | SD-Card: | microSD (for Operating System and Data Storage) |

    | Power Supply: | 5 V / 3 A (via USB-C) |


    ### 6.1 The Remote Desktop


    The Raspberry Pi has 4 USB ports and one or, in the case of the RPi 4, even two
    HDMI interfaces. Consequently, the mini-computer can be equipped with a keyboard,
    mouse and screen. Alternatively, it can also be controlled via the Windows Remote
    Desktop. This variant offers several advantages. The keyboard, mouse and screen
    can be used together with the PC. There is no need for separate equipment for
    the RPi. This is particularly advantageous in confined spaces. For example, you
    don''t need an additional monitor or have to switch back and forth between the
    two systems.


    A remote desktop connection to the Raspberry Pi allows complete control of the
    RPi via LAN or WLAN. In principle, the Raspberry Pi can also be controlled almost
    exclusively via the ASCII console, but a graphical interface is usually advantageous,
    specifically for ML applications.


    The remote-desktop connection is already preinstalled on all recent Windows systems
    and is therefore ideal for controlling the RPi. So, if you want to control the
    RPi remotely, the remote desktop connection is a very efficient option, also in
    terms of data volume.


    On the RPi''s side, only a single package is required. This can be downloaded
    by entering


    ```

    sudo apt-get install xrdp

    ```


    All of the important settings are already predefined. You can therefore log on
    to the RPi immediately after completing the installation. On a Windows PC, the
    required program can be found as Remote Desktop Connection in the Start menu.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_27_0.png)


    Figure 6.2: Start window of the Remote Desktop utility.


    In the start window, either the IP of the Pi or the name of the Raspberry (default:
    raspberrypi) is entered as the host name. After that, the login screen of the
    Pi is displayed.'

  - '[PAGE 14]


    Not only numerical or visual data can be processed. Speech recognition systems
    can also be implemented in this way. The soundwaves can be displayed as spectrograms
    to which a neural network can assign certain words.


    However, there is currently no perfect, universal algorithm that works equally
    well for all tasks. There are actually four main groups of ML algorithms. In addition
    to monitored and unsupervised learning, a distinction is made between semi-monitored
    and "reinforcement learning". Each variant has its own strengths and weaknesses.


    Supervised learning is commonly used for classification and regressions. Application
    examples are spam filtering, speech recognition, computer vision, image recognition
    and classification.


    In the case of unsupervised learning, initially the program is not given any pre-classification.
    The system automatically divides the samples into groups. Unsupervised learning
    is often used to break down data based on certain similarities. The method is
    therefore well suited for complex data analysis. This enables machines to find
    patterns that humans cannot recognize due to their inability to process huge amounts
    of data. This variant is suitable, among other things, for discovering fraudulent
    financial transactions, forecasting sales or analyzing customer preferences. The
    classic applications are data segmentation, detection of anomalies, customer recommendation
    systems, risk management and the detection of fake data or images.


    In semi-supervised learning, there is a mixture of labeled and unlabeled data.
    In principle, certain prediction results are known, but the model can and may
    also find its own patterns in order to find a certain date structure and optimize
    predictions.


    Reinforcement learning comes closest to its human counterpart. People don''t need
    constant supervision to learn effectively. Rather, new insights are drawn from
    positive or negative experiences. Touching a hot saucepan or riding a bicycle
    over a pin or nail led to a corresponding learning success. Training with ready-made
    data sets is no longer necessary. Instead, the system can learn in dynamic, real-world
    environments.


    In a first step, simulated worlds are often used in intensified learning research.
    These offer ideal, data-rich environments. The achievable scores in video games
    are ideally suited to train reward-motivated behaviors. The main applications
    are autopilot systems, self-driving cars and trains or autonomous robots [12].


    In some areas these methods have already been used to develop systems that are
    superior to humans. For example, when diagnosing X-ray images, certain types of
    cancer are already better recognized by ML systems than by trained X-ray specialists.
    In addition, unlike the doctors, these machines can carry out routine evaluations
    24 hours a day, 7 days a week.'

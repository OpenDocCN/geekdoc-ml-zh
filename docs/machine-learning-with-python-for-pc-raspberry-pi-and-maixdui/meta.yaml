    ## 使用 Python 进行机器学习

    适用于 PC、树莓派

    和 Maixduino


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_247_0.png)


    越来越多的人正面对着人工智能（AI）的应用。音乐或视频评分、导航系统、购物建议等，都基于可归因于该领域的方法。


    “人工智能”一词是在 1956 年一个被称为达特茅斯夏季研究项目的国际会议上提出的。一个基本方法是模拟人脑的功能，并在此基础上构建先进的计算机系统。很快人们就清楚了人类思维是如何工作的。将其转移到机器上被认为只是一个小步骤。这个想法被证明有点过于乐观。尽管如此，现代
    AI，或者更确切地说，其称为机器学习（ML）的子专业的进展已不容否认。


    **Günter 博士** 在电子开发和物理技术领域为多家大型公司工作了 20 多年。除了担任讲师的工作外，他还发表了关于电子学、半导体技术和微控制器的成功技术文章和书籍，并创建了这些主题的课程和学习包。


    在本书中，将使用几个不同的系统来更详细地了解机器学习的方法。除了 PC，树莓派和 Maixduino 都将在各个项目中展示其能力。除了物体和人脸识别等应用外，还将创建瓶子检测器、人员计数器或“会说话的眼睛”等实用系统。


    后者能够通过声音描述自动检测到的物体或人脸。例如，如果一辆汽车在连接摄像头的视野内，系统会通过电子生成的语音输出信息“我看到一辆车！”。此类设备是盲人或严重视力障碍者也能从
    AI 系统中受益的非常有趣的例子。



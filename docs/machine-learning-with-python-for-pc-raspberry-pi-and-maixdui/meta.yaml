    The results of divisions (/) always return a floating point value, e.g.:


    ```

    12/3 = 4.0

    ```


    The **integer** format corresponds to whole numbers like in mathematics, including
    signs:


    ```

    1, 100, -8080, 0 ,.....

    ```


    **Float** corresponds to the real numbers. Scientific notation using exponential
    expressions can also be used:


    ```

    >>> a = 1.234e3

    >>> a

    > 1234.0

    ```


    An important difference between integer and float is, that integer values are
    stored exactly. In the case of float numbers, on the other hand, numeric rounding
    occurs. Variables of the Boolean type can only have the two values True and False.
    Here, too, a distinction is made between upper- and lower-case.


    The variable type **complex** consists of a real and an imaginary part in the
    form of a + bj or complex(a, b). Both the real part and the imaginary value b
    can be floating-point numbers. This also allows calculations using complex numbers:


    ```

    >>> a = 1j

    >>> b = 1j

    >>> a*b

    >>> (-1+0j)

    ```


    Binary (0b ...) and hexadecimal (0x ...) numbers can also be used:


    ```

    >>> a= 0b1010

    >>> a

    >>> 10


    >>> a = 0xff

    >>> a

    >>> 255

    ```



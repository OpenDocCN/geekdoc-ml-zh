    sensor.set_framesize(sensor.QVGA)\nsensor.run(1)\ntask = kpu.load(0x300000)\n\
    anchor = (1.889, 2.5245, 2.9465, 3.94056, 3.99987, 5.3658, 5.155437)\nkpu.init_yolo2(task,\
    \ 0.5, 0.3, 5, anchor)\nwhile(True):\n    img = sensor.snapshot()\n    code =\
    \ kpu.run_yolo2(task, img)\n    if code:\n        for i in code:\n           \

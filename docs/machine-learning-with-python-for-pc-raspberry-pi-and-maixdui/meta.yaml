  md: '# 2. Further evaluation criteria for issuing:


    precision , recall, f1-score, and support


    These values provide the ratios of correctly or incorrectly predicted values to
    the overall possible predictions. The f1 score is of particular importance. The
    f1 rating is a measure of the accuracy of the network. An f1 value of 1 means
    high; 0 means low accuracy. An f1 value of 0.97 is comparatively good, as only
    120 data sets were used for training. All in all, the accuracy should always be
    better than 90% under the conditions given here.


    In addition to these percentage statements, the quality of the learning behavior
    can also be shown using so-called learning curves. The general statement that
    someone has a "somewhat flat learning curve" is not exactly a compliment among
    students. In the field of ML research, on the other hand, learning curves are
    an important and objective evaluation criterion for a specific network model.


    Learning curves represent the relationship between the number of training periods
    and the learning success of a network in a graphical form. The remaining prediction
    error is often used as an evaluation criterion. This usually results in a steadily
    falling curve. Rapid learning success is shown by a steep drop in the graph [3].
    There is often a very fast decrease in the error rate at the start of the training.
    So, in the beginning, the network makes rapid learning progress. In the further
    course of the curve, a certain flattening can be observed. This is due to the
    fact that the network has "finalized the learning process". Even with further
    training cycles, no remarkable improvements can then be achieved anymore. Consequently,
    the network has reached its maximum performance. At this point, the training can
    finally be stopped.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_130_0.png)


    Figure 11.9: Learning curve of a neural network with 3 layers.


    The learning curve shown in Figure 11.9 illustrates the typical training course
    for a network with 4 inputs, 6 inner neurons, and 3 outputs (Figure 11.2). To
    achieve an accuracy of 0.2, nearly 2000 training cycles are required.


    It is possible to optimize the learning curve by varying the network structure
    and the learning parameters. Usually, the learning curve is improved by adding
    more layers. However, it has been shown that when using more and more extensive
    networks, the training time increases significantly. The influence of other parameters
    such as the activation function'

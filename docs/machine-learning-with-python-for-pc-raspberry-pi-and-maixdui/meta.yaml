    ## 7.2 A wealth of applications


    There are various application areas of the small board. The focus is of course
    on machine learning, image acquisition and all variations of neural network applications.
    Due to the high-performance audio processor, acoustic signal acquisition and recognition
    processes can also be implemented. The resulting applications range from simple
    projects to almost professional areas of application. The following list gives
    a first impression of the possibilities:


    Machine Learning with Python


    Smart home applications:

    - Cleaning robots

    - Intelligent speakers

    - Smart door openers


    Medical technology:

    - Medical image recognition

    - Automatic medical emergency alerts


    Industrial applications:

    - Intelligent sorting

    - Monitoring electrical devices


    Educational Applications:

    - Learning robots

    - Intelligent interactive platforms


    Agricultural Applications:

    - Monitoring plant growth

    - Detection of pests and plant diseases

    - Automated control of harvesting machines


    The use of neural networks and other methods from the field of machine learning
    or AI opens up completely new perspectives in the evaluation of image data. In
    contrast to conventional techniques, however, this requires a comparatively high
    computing capability and thus powerful hardware. Mobile applications or devices
    without internet access were therefore difficult or even impossible for a long
    time. In order to be able to use AI systems more universally and to increase their
    popularity, several specialized chip sets have been developed in recent years.
    The aim was to offer sufficient computing power even with a small size and low
    power consumption.


    In this case, sufficient computing power is to be understood as sufficient for
    the task. These chips are usually not really suitable for complex training procedures.
    The training of the neural networks should therefore take place on powerful computers.
    The finalized models can then be transferred to the smaller boards and used there
    in practical applications.


    Kendryte''s K210 chip belongs to this new type of chip. With the two RISC cores
    and the specialized neural network unit, the computing power is quite impressive
    in comparison to other chips. This is all the truer when you consider that the
    K210 gets by with a low power consumption. This even brings battery operation
    into the realm of possibilities (see Section 7.4).


    ## 7.3 Initial start-up and functional test


    For an initial test, the MaixDuino can simply be connected to any USB port. Please
    note that a USB-C cable is required for this connection. As with all open boards,
    however, some safety instructions should be observed:


    - The board should never be operated on a conductive surface. Due to the open
    solder joints, short circuits could occur, which could destroy the MaixDuino.

    - If available, an active USB hub should be connected between the PC and the board.
    In the event of a short circuit, this can in most cases at least prevent damage
    to the USB port of the PC, since the hub prevents over currents on the PC side.
    In addition, a hub usually provides more power than a PC USB port. This prevents
    undesired voltage drops in the supply of the MaixDuino, especially when using
    laptops.


    When the cable is connected, the red power LED should light up. If not, the board
    must be disconnected from the port immediately. In this way, it may be possible
    to prevent a potential short-circuit from causing extensive damage. Only then
    should troubleshooting be started. Helpful hints for troubleshooting can be found
    in the corresponding chapter at the end of the book.


    If the power LED lights up properly, you can connect the display to the MaixDuino.
    To do this, you should first disconnect the Maix once again from the supply voltage
    (USB or coaxial power connector). Then the ribbon cable of the display is connected
    to the socket labeled ''LCD''. After reconnecting the USB cable, the MaixDuino
    reports with a red start screen and the white characters "Welcome to MaixPy".
    The version of the firmware loaded may also be on the display. If there is a newer
    or different firmware on the Pi, the start screen may look a little different.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_38_0.png)


    *Figure 7.6: Start-Up screen on the MaixDuino display.*


    The Maix can be powered via the USB-C socket as well as via a coaxial power connector.
    A direct voltage of 6 to 12 volts is required for the coaxial power connector.
    The source should be able to deliver a current of up to 2 amps.


    Although the Maix can also be operated with just one supply at a time, it has
    proven to be beneficial to use both sources in parallel. This leads to a significantly
    better operational reliability, particularly in the case of computationally intensive
    applications.


    ## 7.4 Power supply and stand-alone operation


    In many cases, the MaixDuino and the Raspberry Pi get their supply voltages via
    the USB port. However, when a project is completed, it is often desirable to operate
    the boards independently of a PC or laptop. In this case you can either use external
    power supplies, or (rechargeable) batteries.


    Since the Raspberry does not have an integrated voltage regulator, powering the
    board is only possible via the USB-C connector. For this purpose, special power
    supplies are available that deliver a voltage of 5.1 V at a maximum current of
    around 3 A. The slightly higher voltage ensures that the Pi works reliably even
    with extended loads. With standard 5-V power supplies, sometimes the undervoltage
    symbol appears (a lightning bolt in the upper right segment of the screen). In
    this case unexpected errors or even system crashes can occur.


    With the MaixDuino, two alternative power supply variants are available. Either
    the USB-C or the coaxial power connector can be used as a voltage input. In the
    second case, a direct voltage between 6 and 12 volts with a maximum capacity of
    approx. 1.5 A is required. The internal regulator of the MaixDuino generates the
    lower voltages required for safe operation.


    As already mentioned, in certain situations it is advisable to use both sources
    at the same time. Particularly when operating with an SD card or when various
    external loads such as LEDs or sensors are connected to the Maix, problems occur
    more frequently when using the USB supply alone.


    If you want to operate your MaixDuino completely independently of the mains, common
    USB powerbanks offer a good solution. These allow the boards to be operated mobile
    or in remote locations for many hours.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_39_0.png)


    Figure 7.7: MaixDuino with a USB powerbank connected.


    ## Chapter 8 • Programming and Development Environments


    Since Python has developed into a quasi-standard in the field of programming languages
    for machine learning and AI, various **Integrated Development Environments (IDEs)**
    have emerged over time. Each of these variants has its own specific advantages
    and disadvantages. The most important IDEs for Python programming are:


    - Thonny

    - MaixPy IDE

    - Anaconda

    - Spyder


    Thonny is especially popular because it comes installed on the Raspberry Pi by
    default. This made the IDE the classic programming tool in the maker scene.


    With MaixPy, an IDE specially tailored to the MaixDuino is available. This allows
    the specific performance features of this board to be used most efficiently. In
    particular, the video output of this IDE can be used.


    Anaconda and Spyder are the classic tools when it comes to implementing machine
    learning projects in Python. They offer installation packages for all common operating
    systems, ranging from Windows, Linux and MacOS to Raspberry Pi OS.


    The individual versions are described in more detail in the following sections.
    It also explains what advantages and disadvantages they offer for the respective
    applications and systems. After working through the chapters, it should no longer
    be a problem for the user to select the optimal IDE for a particular project.


    ### 8.1 Thonny — a Python IDE for beginners and intermediates


    Thonny is the standard IDE for Python and MicroPython programming. This IDE enjoys
    continuous updating and ongoing development, and it is therefore quite future-proof.
    Thonny is also available for all common operating systems. It is even preinstalled
    as standard on the current Raspberry Pi OS. In general, the installation is quite
    easy, so no problems should occur with the installation process.


    In this book, **Thonny 3.3.10** in the version for PCs under Windows 10 was used.
    In principle, future versions should be compatible. However, if unexpected problems
    occur, consider reverting to this version.


    The appropriate download package can be found on the Internet (see LINKS.txt).
    When the download is finished, the installation file can be started. Now you just
    have to follow the wizard until the installation process is complete and the Thonny
    IDE can be opened.'

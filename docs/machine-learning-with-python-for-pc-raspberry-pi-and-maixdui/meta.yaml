    ## 8.5 Tips for troubleshooting the Thonny IDE


    Below, some error messages of the Thonny IDE are discussed. The corresponding
    problems are usually relatively easy to solve:


    - In many cases, restarting the MaixDuino with the integrated Boot/RST button
    solves the issue.

    - Within the Thonny IDE, pressing the Stop / Restart Backend button (or CTRL-F2)
    can often solve communication problems between PC and board.


    Otherwise, the following hints may help:


    **Error 1:** No connection to the board established.

    In this case, the following error messages are printed:


    ```

    ============================== RESTART ==============================

    Unable to connect to COM14

    Error: could not open port ''COM14'': FileNotFoundError(2, ''The system cannot
    find the file specified.'', None, 2)

    or:


    ============================== RESTART ==============================

    Could not connect to REPL.

    Make sure your device has suitable firmware and is not in boot-loader mode!

    Disconnecting.

    or:

    ============================== RESTART ==============================

    Lost connection to the device (EOF).

    ```


    Here, it is often helpful to interrupt and then re-establish the USB connection
    to the module. You should also check whether the correct serial port is selected
    under:


    Run → Select Interpreter


    This error could also indicate that the serial port is already in use by another
    program, such as a serial terminal or the Arduino IDE. In that case, make sure
    that all programs potentially establishing serial communication are closed. The
    Thonny IDE should then be restarted.


    **Error 2:** The Thonny IDE does not respond or issues an internal error

    After closing and reopening the active window, you should be able to continue
    working as usual. If crashes occur repeatedly, the entire Thonny IDE should be
    restarted.


    **Error 3:** The Thonny IDE no longer responds to the Stop / Restart Backend button

    After pressing the button called Stop / Restart Backend, you should wait a few
    seconds. The MaixDuino needs time to restart and to re-establish the serial communication
    with Thonny. If the Stop button is clicked in rapid succession several times,
    the board does not have enough time to restart properly. This may cause the Thonny
    IDE to crash.


    **Error 4:** Problems when restarting the MaixDuino, executing a new script, or
    opening the serial interface.


    Machine Learning with Python


    If the error message:


    ```

    Brownout detector was triggered

    ```


    appears or continual reboots occur or an information similar to:


    ```

    ets Jun 8 2016 00:22:57


    rst:0x1 (POWERON_RESET),boot:0x13 (SPI_FAST_FLASH_BOOT)

    configsip: 0, SPIWP:0xee

    clk_drv:0x00,q_drv:0x00,d_drv:0x00,cs0_drv:0x00,hd_drv:0x00,wp_drv:0x00

    mode:DIO, clock div:2

    load:0x3fff0018,len:4

    load:0x3fff001c,len:4732

    load:0x40078000,len:7496

    load:0x40080400,len:5512

    ```


    is displayed, this may indicate a hardware problem. Often, the cause is one of
    the following issues:


    - poor quality USB cable;

    - USB cable too long;

    - the board is defective (e.g., a bad solder joint);

    - faulty computer USB connection;

    - the computer''s USB port does not supply enough power.


    In these cases, using a high-quality USB cable that is as short as possible will
    help. Switching to a different USB socket on the PC can also be helpful. For laptops,
    an active USB hub with its own external power supply should be used. In this way,
    you are no longer dependent on the capacity of the laptop''s internal USB power
    supply.

    If the problems persist or other strange error messages appear, it is advisable
    to update the board with the latest version of the MicroPython firmware. This
    will at least eliminate the possibility that errors already fixed cause further
    difficulties.


    **Error 5:** No connection between PC and MaixDuino possible.

    Sometimes the Maix is too busy to establish a USB connection. Clicking the Stop/
    Restart Backend button several times may help. However, this repeated clicking
    should be done at reasonable time intervals (see above).

    If a script is executed that uses Wi-Fi or the energy-saving mode or executes
    several tasks in parallel, it is recommended to try three or four times to establish
    the communication. If this is still not possible, the ESP should be flashed again
    with the most current MicroPython firmware.


    ## 8.6 The MaixPy IDE


    Especially for working with the MaixDuino, the MaixPy IDE can also be used. The
    IDE is also quite usable for MicroPython syntax. The IDE is installed via the
    Sipeed web page (see *LINKS.txt*).


    The use of the IDE enables you to:


    - edit scripts on the PC;

    - upload programs on the Maix;

    - execute scripts directly on the MaixDuino;

    - save and manage files on the controller board;

    - view camera images on the computer in real time (Figure 8.12).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_52_0.png)


    The last topic is a significant advantage of the MaixPy IDE over other systems
    such as Thonny or Jupyter. In addition to the live camera image, a three-part
    color live histogram of the RGB color space is also displayed. Other histogram
    versions can also be selected via the small triangle symbol next to the diagram
    header.

    You should be aware that the use of this IDE version consumes some resources for
    the compression and transmission of the camera image, which is at the expense
    of the computing power of the controller board.

    After installation, the IDE can be started for a first test run. Using


    Tools → Select Board


    the correct controller board (Sipeed MaixDuino; Figure 8.13) is selected.


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_53_0.png)


    Figure 8.13: Selection of the MaixDuino board.


    To connect to the MaixPy board, click on the chain symbol at the bottom on the
    left side. Then the correct COM interface must be selected. If in doubt, all options
    must be tested here again.


    After the connection has been successfully established, the color of the Connect
    button changes from green to red. Below the Connect button is the Execute button.
    This executes the Python file currently opened in the editor.


    Clicking the Run button again stops the running program. Options for uploading
    files can be found in the corresponding drop-down menu.


    Please note that only one serial port may be open at a time. It must therefore
    be ensured that all previous connections have been closed before opening new ones.


    If the connection fails, try to update the firmware or IDE. Not all IDE versions
    are compatible with all firmware variants. However, the following combination


    - MaixPy IDE 0.2.5

    - maixpy_v0.5.0_125_gd4bdb25.bin


    was tested successfully. Other combinations should be checked before use. Any
    errors are displayed in a message box. Unfortunately, the error information is
    not always complete. Further information on the possible sources of errors can
    be found in the terminal output. For this purpose, the IDE can be closed and a
    serial terminal can be started. The terminal printout will then often contain
    further hints for troubleshooting. Although the MaixPy IDE is hardly used in the
    context of this book, it can certainly be utilized for control and test purposes.
    In particular, if the display or camera do not work correctly, this IDE version
    can provide valuable error information. The functions such as the live image analysis
    system or the color space diagram can also be helpful in various ML projects.



    none\",scale=5)\n        led_r.value(0)\n    lcd.display(img)\n\na=kpu.deinit(task)\n\
    ```\n\nswitches an LED connected to port 13 as an alarm signal as soon as at least\
    \ one face has been detected. The hardware setup for this can be seen in Figure\
    \ 15.7. The display output looks like this:\n\nIn this way, no PC is required\
    \ and the MaixDuino can be used in stand-alone mode.\n\n### 15.6 Social minefields?\
    \ — face identification\n\nAs already explained in the introduction to this chapter,\
    \ face identification must be clearly distinguished from pure face recognition.\
    \ In many parts of the world, face identification in particular is increasingly\
    \ viewed critically. For example, the use of face recognition technology by police\
    \ or authorities has already been banned in some cities. Politicians consider\
    \ the danger of using facial recognition technology to be greater than the potential\
    \ benefits in the fight against crime. The \"uninterrupted surveillance by camera\
    \ systems threatens the possibility of living free from observation by police,\
    \ authorities or government,\" is a statement in a city council resolution of\
    \ a Californian city.\n\nYet the technology is poorly regulated in many countries.\
    \ In addition to potential misuse of the systems by dictatorial regimes, unacceptable\
    \ invasions of privacy could therefore also occur in democratic states.\n\nThe\
    \ biometric data collected via facial identification is unique to each person.\
    \ In addition to faces, however, the eyes alone (retina scan), the course of veins\
    \ under the skin, human voices, the way of walking or typing on a keyboard can\
    \ also be used for personal identification. Authorities, governments and even\
    \ companies all over the world use recording devices to collect biometric data.\
    \ This means that in principle any person, once recorded, could be tracked in\
    \ all their movements. When the person accesses office equipment, checks in at\
    \ an airports, or gets its train tickets checked - facial identification is playing\
    \ a central role in more and more areas of life. Specifically in the Far East,\
    \ biometric applications are experiencing a real boom. In the major Asian cities,\
    \ the new technologies are already changing every-day's life to a considerable\
    \ extent. For example, employees no longer have to swipe chip cards through a\
    \ reader when entering their office building. A glance at a dedicated camera is\
    \ sufficient to identify the employee. In railway stations or airports, automatic\
    \ recognition systems check passenger tickets against their ID cards. In some\
    \ Asian cities, entire subway systems are already monitored using facial recognition\
    \ techniques.\n\nThe algorithms behind facial identification are trained with\
    \ huge data sets. Often, proprietary deep learning platforms are used to train\
    \ large and multi-layered neural networks. However, it does not remain a static\
    \ system, rather the parameters are constantly adjusted until all desired information\
    \ is reliably delivered.\n\nAutomatic person identification should therefore always\
    \ be viewed with a certain degree of skepticism. For this reason, too, it is of\
    \ utmost importance to know the potentials and possibilities in this field as\
    \ precisely as possible. In the following sections, the technique of face identification\
    \ will be examined in more detail. In addition to the purely technical circumstances,\
    \ one should also think about the possible areas of application. Because ultimately,\
    \ only people who have dealt with the new technology, at least to a certain extent,\
    \ will be able to assess its benefits and dangers.\n\n### 15.7 Big Brother RPi:\
    \ face identification in practice\n\nThe 'openCV' software library, which was\
    \ already introduced in Section 10.5, is also suitable for applications in the\
    \ field of face recognition and identification. Among other things, the library\
    \ contains ML-based algorithms to search for faces in an image. Since faces have\
    \ a complex structure and are subject to considerable individual variation, there\
    \ is no simple test that could find a face in any image via an \"if\" decision.\
    \ Instead, there is a multitude of patterns and functions that are coordinated\
    \ with each other. The algorithms divide the problem of identifying a face into\
    \ several sub-tasks, each of which is easy for a machine algorithm to solve. These\
    \ associated algorithms are also called \"classifiers\".\n\nFor the most efficient\
    \ image recognition, OpenCV uses so-called cascades. Like a series of waterfalls,\
    \ the problem is thus divided into several stages. For each image block, a rough\
    \ but quick test is performed. If one of these tests leads to a positive result,\
    \ a slightly more detailed test is performed and so on. The algorithm can perform\
    \ 30 to 50 of these stages or cascades in succession. Only when all stages have\
    \ been passed with positive results, the recognition of a face is confirmed.\n\
    \nA significant advantage of this procedure is that the majority of an image in\
    \ the first stages only yield negative results. This means that the algorithm\
    \ does not waste time testing all the functions for each block in detail. This\
    \ can speed up the process considerably. Face recognition procedures can thus\
    \ be carried out almost in real time even on less powerful systems such as the\
    \ RPi.\n\nSince face recognition is one of the most important applications of\
    \ machine learning, OpenCV has a whole series of integrated cascades with which\
    \ not only faces but also eyes, hands or legs etc. can be recognized. Moreover,\
    \ it is even possible to interpret the mood of a person by analyzing the shape\
    \ of the mouth, for example. These principles are also the basis of the well-known\
    \ procedures in digital cameras, which automatically trigger the shutter as soon\
    \ as a person's smile is detected in the image.\n\nDue to the high efficiency\
    \ of the OpenCV algorithms, even with the relatively modest computing power of\
    \ a Raspberry Pi, a quite reliable face recognition can be performed. The following\
    \ software packages are required for this project:\n\n- **OpenCV** for basic processing\
    \ of images and videos in real time. The package also includes some machine learning\
    \ algorithms.\n- **Face-recognition** for actual face recognition, the creation\
    \ of reference frames around faces, etc.\n- **Imutils** including a number of\
    \ handy functions to speed up OpenCV algorithms on the Raspberry Pi\n\nAfter the\
    \ libraries are installed, the RPi can be trained using a series of face images.\
    \ The images are automatically compiled into a training data set. Afterwards,\
    \ the Raspberry can not only detect the known people as faces in a live video\
    \ stream, but also identify them. However, you should keep in mind that video\
    \ recordings in public areas are usually illegal.\n\nInstalling and setting up\
    \ the packages and libraries necessary for face recognition requires advanced\
    \ knowledge and experience in using the Raspberry Pi. But even experienced users\
    \ should plan at least two hours for this task. The exact duration depends, among\
    \ other things, on the download speed of the available internet connection.\n\n\
    Since the library versions in this currently very active area change rapidly,\
    \ a certain amount of experimentation is necessary here, as it is quite possible\
    \ that a newer program version is not compatible with the one presented here.\
    \ As usual, the first step should be\n\n```bash\nsudo apt-get update & sudo apt-get\
    \ upgrade\n```\n\nbefore starting a major new project. Then the actual installation\
    \ can be started. The individual instructions for this can be copied from the\
    \ file \"Install_FaceRecognition.txt\" directly into the terminal window of the\
    \ Raspberry. Any prompts or questions (\"Would you like to continue? (y/n)\")\
    \ must be acknowledged with the y and the enter key.\n\nFigure 15.8 shows the\
    \ successful installation of version 4.5.1 of openCV on the Raspberry Pi."
  mdcn: "## 第15章 • 人脸识别与身份识别\n\n如果仅打印数值（参见 *face_counter_numeric.py*），可以使用Thonny IDE的绘图功能，如下所示：\n\
    \n视图 → 绘图器\n\n通过此功能，可以图形化记录在特定时间段内捕获的人脸数量。\n\n## 使用Python进行机器学习\n\n其结果是一个非常强大的工具，可广泛应用于安防技术或市场营销。例如，在机场，可以自动记录乘客数量。店主和零售商可以自动确定营业时间内的顾客数量，等等。许多其他不道德甚至非法的应用在此就不提了。\n\
    \n### 15.5 人员检测报警\n\n不必总是使用显示屏仅在人脸周围显示框。使用MaixDuino的I/O引脚可以更有趣。\n\n程序 *face_alarm.py*：\n\

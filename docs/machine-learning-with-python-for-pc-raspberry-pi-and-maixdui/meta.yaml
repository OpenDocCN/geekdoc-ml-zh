  md: 'NumPy is an acronym for "**Numeric Python**" or "**Numerical Python**". It
    is an extension module for Python, which is mostly written in C. This ensures
    that the mathematical and numerical functions and routines provide the best possible
    execution speed.


    NumPy also supplements the Python programming language with powerful data structures
    for efficient computation with large arrays and matrices. The implementation aims
    at vast data structures ("big data"). Furthermore, the module offers a comprehensive
    selection of mathematical functions that are useful when working with these data.


    Both NumPy and SciPy (see below) are not usually included in a standard Python
    installation. However, NumPy and all the other modules mentioned are available
    in Anaconda and can be included there without any problems.


    On the Raspberry Pi, the installation is done via


    ```

    pip3 install numpy

    ```


    In NumPy, basic mathematical functions operate element-wise on arrays. The library
    provides powerful multi-dimensional array functions and basic tools for calculating
    and manipulating arrays. SciPy builds on this and provides a variety of functions
    that work with NumPy arrays. The available function are highly useful for various
    types of scientific and engineering applications.


    It should be noted that in NumPy the * operator is, contrary to the usual mathematical
    definition, an element-wise multiplication and not a matrix multiplication. The
    @ operator is reserved for matrix multiplication via NumPy. The Jupiter notebook
    *numpy-demo.ipynb* program contained in the download package provides some interesting
    examples of using NumPy in practice.


    An important aspect of NumPy is the processing speed of matrix operations. For

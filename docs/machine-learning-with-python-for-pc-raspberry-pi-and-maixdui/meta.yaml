    Hence, the XOR problem cannot be solved with a perceptron. The other logic operators
    AND, OR and NOT could be emulated without any problems, but not the XOR function!
    This realization plunged AI development into a deep crisis. It took several years
    until research groups seriously addressed the topic of neural networks and machine
    learning again.


    The solution to the problem is to go beyond the single-layer architecture. Additional
    layers of "neurons", in particular so-called hidden layers, finally made it possible
    to solve the XOR problem. How this solution looks in detail is explained in section
    10.9.


    Despite its long, colorful history and considerable success rate, artificial intelligence

    # Chapter 16 • Train Your Own Models


    So far, mainly readily available models have been used for the tasks at hand.
    This is certainly also the typical approach if you want to implement machine learning
    projects on the Raspberry Pi or the MaixDuino. The Internet offers an almost inexhaustible
    variety of pre-trained neural networks and models. This covers a large number
    of applications. In the last chapters, models for


    +   - digit recognition;

    - object detection;

    - face recognition;

    - face identification,


    were used. The models often even have a certain learning ability. For example,
    it was not only possible to recognize predefined persons with the face identification
    code. Rather, after appropriate training, it was also possible to use new, self-defined
    faces as "keys".


    Things are somewhat different if you want to train neural networks completely
    on your own. This usually involves considerable effort. Creating the recognition
    program in Python is usually the least of the problems.


    The biggest task is collecting extensive "learning material" for the neural network.
    In the case of the ready-made models available on the Internet, people often revert
    to abundant data material from general websites or even from social networks.
    As already mentioned, users have often granted the data collectors extensive rights
    of use without really being aware of it.


    If, on the other hand, you want to train your own special model, you have to collect
    the data yourself. In this chapter two examples will be used to demonstrate how
    this can be done.


    # 16.1 Creation of a model for the MaixDuino


    The following steps are required to create your own model for the MaixDuino:


    +   - create a Jupyter notebook as a training base;

    - exporte a tflite model;

    - convert the tflite model into a kmodel readable by the MaixDuino;

    - loading the kmodel onto the MaixDuino;

    - create a Python program to evaluate the kmodel


    These steps will be explained using the MNIST data set as an example. Although
    this consists of prefabricated image data, these could easily be replaced by your
    own images, similar to the fashion data in section 13.4. Training with self-created
    images will be discussed in the next chapter.


    In order to create a custom model for the MaixDuino, first the notebook'
  - '[PAGE 220]


    MNIST_to_tflite.ipynb


    must be loaded into Jupyter on a PC. This notebook essentially contains the cells
    already known from Chapter 12. However, a cell has been added at the end which
    allows the model to be saved in tflite format:


    ```

    #convert model to tflite


    import tensorflow as tf

    converter = tf.lite.TFLiteConverter.from_keras_model(model)

    converter.experimental_new_converter = True


    tflite_model = converter.convert()


    open(''MNIST_01.tflite'', ''wb'').write(tflite_model)

    ```


    After the model has been processed, a file named *MNIST_01.tflite* is present
    in the current directory. This must now be converted into the kmodel format that
    can be read by the MaixDuino. A program called *ncc.exe* is required for this
    task. The download link can be found in the file *LINKS.txt*.


    The just created *MNIST_01.tflite* file and the *ncc.exe* program should be copied
    into a new directory. In addition, some training images must be loaded into a
    sub-directory named images. These images are needed as calibration data for the
    conversion. In a Windows console (cmd.exe), first change to the directory created
    above and then execute the following conversion command


    ```

    ncc compile MNIST_01.tflite MNIST_01.kmodel -i tflite --dataset images

    ```


    The conversion is completed after a few seconds (Figure 16.1).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_220_0.png)'
  - '[PAGE 221]


    The kmodel file created in this way can now be copied to the MaixDuino in the
    usual way. Then only the appropriate Python program is needed(**MNIST_2_KPU.py**).
    There, the standard model must be replaced by the new **MNIST_01.kmodel**:


    ```


    ...

    # task = kpu.load("/sd/MNIST.kmodel")

    task = kpu.load("/sd/MNIST_01.kmodel")

    kpu.set_outputs(task, 0, 1, 10, 1)

    ...

    ```


    Additionally, the output format of the model must be specified:


    ```


    kpu.set_outputs(task, 0, 1, 10, 1)

    ```


    because the new kmodel (version 4) also allows multi-output models. The statement
    kpu.set_outputs(task, output_idx, w,h,ch) has 5 arguments:


    +   - task: the current model;

    - output_idx: the index of the output, as kmodel-V4 supports multi-outputs;

    - w, h, ch: width, height and output channel of the output vector.


    Since the MNIST model is coded as one-hot output, this results in a 1 × 10 vector,
    with a single output channel:


    ```


    kpu.set_outputs(task, 0, 1, 10, 1)

    ```


    Since no multi-output is used, output_idx = 0 is to be set. This means that the
    same results can now be read out as in the previous version V3. Note that a MaixPy
    version ≥ 6.0 is required to use V4 models.


    Now the new model can be tested. As soon as a digit is visible in the camera''s
    field of view, it should be recognized and evaluated. Of course, the recognition
    quality of the system depends on the quality of the training, the data set in
    use and the parameter adjustment.


    A direct comparison with the professionally created model from Section 12.11 shows
    that the home made network usually performs worse. However, by optimizing the
    training parameters or increasing the number of epochs, etc., the new model can
    still be improved. Ultimately, it should be possible to achieve the quality of
    the original network in this way.


    # 16.2 Electronic parts recognition with the MaixDuino


    In a final application, we go even one step further. Not only training and conversion
    are carried out by the user, but also new, self-created images will be used. This
    is, to a certain extent, the supreme discipline when working with ML applications.
    You gain maximum freedom, and self-created networks can be used for practically
    all desired image data. This includes an ample number of applications:'
  - '[PAGE 222]


    +   - recognition of animals and animal species;

    - sorting of goods or objects such as tools or toys;

    - waste separation, deposit bottle recognition, etc.;

    - recognition of vehicles and vehicle types;

    - recognition and sorting of electronic components;

    - categorization and sorting of fruits and vegetables.

    - ...


    However, you must be aware that this project is a demanding task. Moreover, you
    should approach this task with a certain willingness for experimentation. The
    current process is not only quite complex but also subject to rapid changes due
    to the fast developments in this field. Consequently, it cannot always be guaranteed
    that the versions of the various programs and tools given here will work without
    problems in all combinations.


    In particular, the conversion of Tflite models into readable Maix models does
    not appear to be fully developed yet. Ultimately, the only hope here is that the
    corresponding processes will be simplified and standardized in the near future.
    In particular, direct export options from Python to different model variants would
    be desirable.


    The following graphic shows, using the example of a classification for electronic
    components, an overview of the individual steps required for the construction
    and training of a network with its own (image) data:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_222_0.png)


    Figure 16.2: Training with your own data.'
- md: 'If you want to run a training round with your own pictures, you have to take
    them yourself, of course. This is certainly one of the most time-consuming tasks
    of such a project. Typically, several hundred pictures are required for an effective
    training. However, for a first success test under simplified conditions, less
    than one hundred images may also be sufficient.


    The main focus of the application is on the recognition and classification of
    electronic components. The goal of the project is to enable the MaixDuino to categorize
    **resistors** and **transistors** as individual electronic components — a task
    that already overburdens some of the average purchasing agents in big electronics
    companies!


    First of all, a few dozen images of resistors or transistors are required. These
    can either be taken using a camera or collected from the Internet. In the second
    case, the relevant legal situation must be observed, specifically if the data
    and results are to be published.


    To make the task a little easier, the components should be photographed using
    a simple and uniform background. In this way, you can achieve reasonable classification
    results even with a relatively small number of images.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_223_0.png)


    *Figure 16.3: Resistors and transistors.*


    The photos must be copied into separate directories (transistors/resistors). The
    following image shows the entire directory structure of the project:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_223_1.png)


    *Figure 16.4: Directory structure for the component classifier.*


    The training program (**ElectronicsClassifier_1V0.ipynb**) is based on this structure
    and is designed in such a way that it can easily be adapted to other data sets.
    The division of the data into a training and a test set is done via the parameter


    val_ratio (default: 0.2)


    This ratio is usually appropriate if the number of images is sufficient. However,
    there is no fixed rule. With other ratios (e.g., 90:10), greater fluctuations
    often occur during validation.


    The network itself is based on the MobileNet developed by Google. Since only 2
    megabytes of RAM of the KPU are available in the MaixDuino, the number of parameters
    of the network was reduced accordingly. If there are still problems with the memory
    size, for example, with other converter versions, a further reduction by the user
    is required.


    The complete model is trained in two steps. In order to train the classifier separately,
    some convolution layers are "frozen" after the model definition, i.e., they are
    not included in this training run. Subsequently, the training is continued for
    all parameters with a lower learning rate. After the training is completed, the
    model is saved in both **h5** and **Tflite** format.


    The learning curves show a continuous increase. However, there are also significant
    fluctuations. This is due to the relatively small validation data set. With increasing
    data size, the curves should approach a smooth curve similar to Figure 12.9.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_224_0.png)


    *Figure 16.5: Learning curves for the electronics classifier.*


    ## 16.3 Performance of the trained network


    Accuracy is typically around 70–80% for a training data set of less than 100 images.
    Figure 16.6 shows the corresponding confusion matrix.


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_225_0.png)


    The matrix shows that although 34 transistors were classified as resistors, 81
    resistors could also be recognized correctly. These results can certainly still
    be improved. Larger training data sets in particular should significantly improve
    the recognition accuracy. Nevertheless, the precision achieved here is sufficient
    to be able to test the system in practical applications.


    ## 16.4 Field test


    Due to the low resources of the MaixDuino having only 2 MB RAM, it is impossible
    to run a complete TensorFlow system on the K210. To execute the model, the TensorFlow
    operations must first be translated to a special instruction set for the KPU of
    the Maix. In addition, the conversion also optimizes the model in order to reduce
    the required computing power and the memory requirements.


    The ncc tool is used again for the conversion. After the *ElectronicsClassifier_1V0.ipynb*
    notebook has been completely processed, the file *ec.tflite* can be found in the
    current directory. This file must be converted into the kmodel format. After copying
    the training images into a sub-folder named *images_ElectronicsClassifier*, the
    corresponding conversion command is executed in a Windows console:


    ```

    ncc compile ec.tflite MNIST_ec.kmodel -i tflite --dataset images_ElectronicsClassifier

    ```


    After copying the kmodel file to the MaixDuino, the appropriate Python program
    (*ElectronicsClassifier.py*) can be started. Due to the very limited memory resources,
    the compiler version


    maixpy_v0.6.2_41_g02d12688e_minimum_with_kmodel_v4_support.bin


    should be installed via the kflash tool. This version is optimized for minimum
    memory requirements. This leaves the largest possible share of the scarce memory
    space for the network model. In the example presented here, the memory capacity
    of the Maix board was completely exhausted. With other versions of the board (e.g.,
    Sipeed MAIX Bit Suit) or with newer tools, errors may therefore occur due to a
    lack of memory. In this case, the original model in *ElectronicsClassifier_1V0.ipynb*
    must be cut down.


    After successfully starting the program, a live image of the camera is displayed.
    The name of the detected components is displayed in the upper left corner (Figure
    16.7).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_226_0.png)


    As already stated, the quality of the classifier depends mainly on the number
    of training pictures. If less than 100 images are used per category, the results
    are usually not very dependable. Experiments show that using up to about 500 pictures
    per class improves the recognition accuracy significantly. Of course, other factors
    also have a significant influence. For example, the quality of the pictures themselves
    is very important. Lighting conditions or the respective background also play
    a significant role.


    The training or the structure of the network itself can also be improved. This
    offers a wide field of experimentation. The following parameters are of particular
    interest:


    - number of training epochs;

    - structure of the neural networks used;

    - division of the data into training and validation sets.


    However, it must always be kept in mind that the MaixDuino only offers a relatively
    small amount of memory. When expanding the structure of the neural network, the
    limits are quickly reached.


    However, once the system is running more or less problem-free, other training
    images (for animal recognition or vehicle classification, etc.) can be used. It
    is also possible to use more than two categories. However, this also multiplies
    the number of training images required.


    ## 16.5 Outlook: Multi-object detectors


    The image recognition and classification models used so far in this chapter utilized
    the whole image as input. The output was a list of probabilities for each class
    to be recognized. The best results were achieved when the respective object took
    up a large part of the image. The exact location of the object in the field of
    view was not important. However, many applications, such as object or face tracking,
    require not only the recognition of objects in the image, but also its exact location.
    Also, detection of multiple objects in an image requires the determination of
    the respective locations of the objects in the camera image.


    For these tasks, more complex object recognition models are required. So-called
    YOLO (**Y**ou **O**nly **L**ook **O**nce) architectures can be used here. The
    method first adds a coordinate grid to the image data to be examined. Then the
    presence or absence of the objects in question is determined in each grid with
    the already known methods. In addition, so-called "anchors" are used. The "anchor
    points" are adapted to the expected object size and facilitate a pre-selection
    of possible image features. Anchors have also already been used in the pre-trained
    models (see Section 13.6, among others).


    If individual features are detected, a set of predictions is calculated for each
    grid cell. Predictions with low probability are discarded. In this way, the remaining
    cells contain the searched objects with a high probability.


    The basic idea behind You-Only-Look-Once is thus to divide the overall image into
    small regions or grid areas and apply a neural network search to each grid. Three
    parameters play an important role here:


    1. **S**: number of grid cells into which the image is divided.

    2. **B**: number of bounding boxes calculated for each grid cell.

    3. **C**: number of different classes that can be predicted for each grid cell.


    Figure 16.8 illustrates the YOLO principle.'

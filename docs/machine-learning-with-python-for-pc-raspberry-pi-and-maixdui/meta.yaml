    )\nkpu.set_outputs(task, 0, 1, 10, 1)\n...\n```\n\nAdditionally, the output format\
    \ of the model must be specified:\n\n```\nkpu.set_outputs(task, 0, 1, 10, 1)\n\
    ```\n\nbecause the new kmodel (version 4) also allows multi-output models. The\

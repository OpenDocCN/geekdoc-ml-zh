- md: '## 8.8 The Flash tool in action


    The kflash tool can not only be used for uploading the Python interpreter. Rather,
    it is a universal tool that allows to load any kind of data into the flash memory
    of the MaixDuino.


    When working with ML projects, in many cases various models are available for
    testing. These models usually contain fully trained neural network data. A large
    number of ready-made models are available for the MaixDuino. These models can
    be available in two different variants:


    1. as .kfpkg-File

    2. as .kmodel


    In the first case, the .kfpkg file (the e.g., face_model_at_0x300000.kfpkg) can
    be loaded directly to a specific HEX address using the Flash tool. A kmodel (e.g.,
    facedetect.kmodel), on the other hand, can be written to the Maix''s SD card via
    Thonny.


    Of course, the correct version must be considered in the Python program. In the
    first case, the model is read from the hex address, for example, via:


    ```

    task = kpu.load(0x200000)

    ```


    In the second case, the file, including the path, must be specified, for example,
    using:


    ```

    task = kpu.load("/sd/MNIST.kmodel")

    ```


    A .kfpkg file is just a .zip archive file whose extension has been renamed to
    "kfpkg". The files can be opened with a ZIP tool. You get two files:


    1. the kmodel itself;

    2. a .json-file.


    The JSON part tells the kflash_gui to which address the kmodel should be written.
    For this reason, the file name of a kfpkg usually contains the hex address (e.g.,
    0x300000) to which it is written. In this way it is possible to load two (or more)
    files, for example the Python interpreter and a model, without overlapping memory
    areas.


    ## 8.9 Machine Learning and interactive Python


    The term "interactive" goes back to the Latin expression *inter agere*. The verb
    *agere* means "to act". The word component "inter" points to something in between.
    In this sense, one can say that an interactive shell is between the acting user
    and the operating system.


    An interactive system therefore waits for commands from the user and immediately
    carries them out. It returns straightaway the result of the execution. After that,
    the Shell waits for the next input.


    Python offers a convenient command line interface, also called the Python Interactive
    Shell. Python thus has two basic modes:


    - Script Mode;

    - Interactive mode.


    In script mode, complete .py files are executed in the interpreter. The interactive
    mode, on the other hand, offers a command-line shell that provides immediate feedback
    for each instruction. The interactive mode is thus well suited for testing new
    program constructions.


    Interactive Python or "IPython" offers a comprehensive architecture for interactive
    computing:


    - a powerful interactive shell;

    - support for data visualization and use of GUI tool kits.


    Over time, various IPython variants had evolved. These were finally combined into
    a development system called Jupyter a few years ago. Jupyter (formerly: IPython
    Notebook) is an open-source project in which Markdown text and executable Python
    source code can be easily combined. Using Markdown thus provides a simple commenting
    language that can be easily formatted without further conversion and is easy to
    read.


    To work with Jupyter notebooks, an Anaconda environment can be used. Once this
    is installed, code cells can be created and executed immediately.


    In addition to working on the local computer (e. g. under Windows), a connection
    can also be made to a remote Jupyter server. Then code cells can be processed
    on this system and Python files or Jupyter notebooks can be exported. As a result,
    the MaixDuino can also be addressed via Jupyter.


    The Jupyter system is also ideally suited for use on the Raspberry Pi itself.
    The Pi 4 in particular provides sufficient resources to allow fluent working.
    This makes IPython and Jupyter a universal system for a wide variety of hardware
    versions, including those used in this book. Therefore, it is not a huge surprise,
    that Jupyter notebooks have become a universal and extremely popular tool for
    machine learning and AI programming.


    Anaconda, on the other hand, is a fully equipped data science system that allows
    easy installation of an Ipython IDE. This development environment will therefore
    be examined in more detail in the next sections.


    ## 8.10 Anaconda


    The Anaconda Navigator provides a graphical user interface which is easy to install
    under Windows as well as Linux. Anaconda is available as a free download for private
    applications (link in download package). It is possible to download the latest
    version of Anaconda for the current Python version. The appropriate operating
    system (Windows, MacOS or Linux, each in 32 or 64 bit version) must be selected.
    The installation of Anaconda usually runs smoothly if you follow the instructions
    on the download page exactly.


    For use in this book, the following options should be selected:


    1. For all users.

    2. Add Anaconda to PATH environment.

    3. Register Anaconda as default Python.


    Experience has shown that using these options, there are few problems if, for
    example, the MicroPython kernel is to be integrated into Jupyter later. However,
    one should be aware that Anaconda is a very complex and advanced application.
    This means that you can never guarantee that everything will always run according
    to a Plug & Play scheme.


    Anaconda is therefore not recommended for absolute beginners. But even the more
    experienced user will have to fix errors in some cases. Search engines or relevant
    forums usually do a good job here. If Anaconda has been installed successfully,
    the program can be started via the Desktop icon or the entry in the Start menu.
    It should be noted that the program launch can take some time even with a high-performance
    system. After completing the start procedure, the navigator appears:


    At first glance, this offers an almost unmanageable variety of possible applications.
    The most important ones in the further course of the book include **Jupyter**
    and **Spyder**. The spelling with "y", is generally believed to go back to the
    "y" in Python in both cases.


    Jupyter is one of the most popular applications for data analysis, machine learning
    and neural networks. It provides a so-called IPython notebook ("interactive Python",
    see above). There, each code block can be executed separately. Additionally, diagrams
    can be displayed in each block. Subsequently, further code can be processed and
    the data can be displayed in a new diagram and so on. Furthermore, functions such
    as % timeit are also provided, which allow to check the runtime requirements of
    the code.


    Spyder, on the other hand, is an integrated development environment (IDE) for
    Python, similar to Thonny. It is mainly used to develop complete Python programs.


    Often, the Jupyter notebook is preferred for analyzing data in the field of AI
    applications, testing experimental code or evaluating different code variations.
    For classical Python programming, on the other hand, Spyder is preferred.


    The "Environments" selection in the Anaconda Navigator can be used to create special
    isolated programming environments. Libraries installed here are only available
    within this environment. In this way, different versions of a library can be used
    in different environments.'
  mdcn: '## 8.8 Flash 工具实战


    kflash 工具不仅可用于上传 Python 解释器。它更是一个通用工具，允许将任何类型的数据加载到 MaixDuino 的闪存中。


    在进行机器学习项目时，通常有多种模型可供测试。这些模型通常包含完全训练好的神经网络数据。MaixDuino 有大量现成的模型可用。这些模型通常以两种不同的变体提供：


    1.  作为 .kfpkg 文件

    2.  作为 .kmodel 文件


    在第一种情况下，.kfpkg 文件（例如，face_model_at_0x300000.kfpkg）可以直接使用 Flash 工具加载到特定的十六进制地址。而
    kmodel 文件（例如，facedetect.kmodel）则可以通过 Thonny 写入 Maix 的 SD 卡。


    当然，在 Python 程序中必须考虑正确的版本。在第一种情况下，模型是从十六进制地址读取的，例如，通过：


    ```

    task = kpu.load(0x200000)

    ```


    在第二种情况下，必须指定文件（包括路径），例如，使用：


    ```

    task = kpu.load("/sd/MNIST.kmodel")

    ```


    .kfpkg 文件实际上是一个 .zip 归档文件，其扩展名被重命名为 "kfpkg"。这些文件可以使用 ZIP 工具打开。你会得到两个文件：


    1.  kmodel 本身；

    2.  一个 .json 文件。


    JSON 部分会告诉 kflash_gui 应该将 kmodel 写入哪个地址。因此，kfpkg 的文件名通常包含其写入的十六进制地址（例如，0x300000）。通过这种方式，可以加载两个（或更多）文件，例如
    Python 解释器和一个模型，而不会发生内存区域重叠。


    ## 8.9 机器学习与交互式 Python


    “交互式”一词源于拉丁语表达 *inter agere*。动词 *agere* 意为“行动”。词素“inter”指向两者之间。从这个意义上说，可以说交互式
    shell 位于行动的用户和操作系统之间。


    因此，交互式系统会等待用户的命令并立即执行它们。它会立即返回执行结果。之后，Shell 等待下一次输入。


    Python 提供了一个便捷的命令行界面，也称为 Python 交互式 Shell。因此，Python 有两种基本模式：


    -   脚本模式；

    -   交互模式。


    在脚本模式下，完整的 .py 文件在解释器中执行。另一方面，交互模式提供了一个命令行 shell，为每条指令提供即时反馈。因此，交互模式非常适合测试新的程序结构。


    交互式 Python 或 "IPython" 为交互式计算提供了一个全面的架构：


    -   一个强大的交互式 shell；

    -   支持数据可视化和使用 GUI 工具包。


    随着时间的推移，各种 IPython 变体已经发展起来。这些最终在几年前被合并到一个名为 Jupyter 的开发系统中。Jupyter（以前称为：IPython
    Notebook）是一个开源项目，可以轻松地将 Markdown 文本和可执行的 Python 源代码结合在一起。因此，使用 Markdown 提供了一种简单的注释语言，无需进一步转换即可轻松格式化，并且易于阅读。


    要使用 Jupyter notebooks，可以使用 Anaconda 环境。一旦安装完成，就可以立即创建和执行代码单元格。


    除了在本地计算机上工作（例如，在 Windows 下），还可以连接到远程 Jupyter 服务器。然后可以在该系统上处理代码单元格，并导出 Python 文件或
    Jupyter notebooks。因此，也可以通过 Jupyter 访问 MaixDuino。


    Jupyter 系统也非常适合在 Raspberry Pi 本身上使用。特别是 Pi 4 提供了足够的资源，允许流畅地工作。这使得 IPython 和 Jupyter
    成为适用于各种硬件版本的通用系统，包括本书中使用的那些。因此，Jupyter notebooks 成为机器学习和 AI 编程中通用且极其流行的工具也就不足为奇了。


    另一方面，Anaconda 是一个功能齐全的数据科学系统，允许轻松安装 Ipython IDE。因此，下一节将更详细地探讨这个开发环境。


    ## 8.10 Anaconda


    Anaconda Navigator 提供了一个图形用户界面，在 Windows 和 Linux 下都易于安装。Anaconda 可以免费下载用于私人应用（下载包中的链接）。可以下载适用于当前
    Python 版本的最新版 Anaconda。必须选择相应的操作系统（Windows、MacOS 或 Linux，各有 32 位或 64 位版本）。如果完全按照下载页面上的说明操作，Anaconda
    的安装通常会顺利进行。


    对于本书的使用，应选择以下选项：


    1.  为所有用户安装。

    2.  将 Anaconda 添加到 PATH 环境。

    3.  将 Anaconda 注册为默认 Python。


    经验表明，使用这些选项，如果以后要将 MicroPython 内核集成到 Jupyter 中，问题会很少。但是，应该意识到 Anaconda 是一个非常复杂和高级的应用程序。这意味着你永远无法保证一切总是按照即插即用方案运行。


    因此，不建议绝对初学者使用 Anaconda。但即使是更有经验的用户，在某些情况下也必须修复错误。搜索引擎或相关论坛通常在这方面做得很好。如果 Anaconda
    已成功安装，可以通过桌面图标或开始菜单中的条目启动该程序。需要注意的是，即使在高性能系统上，程序启动也可能需要一些时间。启动过程完成后，导航器会出现：


    乍一看，这提供了几乎难以管理的各种可能应用。在本书后续过程中最重要的包括 **Jupyter** 和 **Spyder**。据信，两者的拼写中的 "y" 都源于
    Python 中的 "y"。


    Jupyter 是数据分析、机器学习和神经网络领域最受欢迎的应用程序之一。它提供了一个所谓的 IPython notebook（“交互式 Python”，见上文）。在那里，每个代码块都可以单独执行。此外，可以在每个块中显示图表。随后，可以处理进一步的代码，并将数据显示在新的图表中，依此类推。此外，还提供了诸如
    % timeit 之类的功能，允许检查代码的运行时要求。


    另一方面，Spyder 是一个用于 Python 的集成开发环境（IDE），类似于 Thonny。它主要用于开发完整的 Python 程序。


    通常，在 AI 应用领域，Jupyter notebook 更适合分析数据、测试实验代码或评估不同的代码变体。而对于经典的 Python 编程，则更倾向于使用
    Spyder。


    Anaconda Navigator 中的“环境”选择可用于创建特殊的隔离编程环境。在此处安装的库仅在此环境中可用。通过这种方式，可以在不同的环境中使用不同版本的库。'

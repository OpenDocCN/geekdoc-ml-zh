  md: '# Chapter 3 • Learning from "Big Data"


    One of the important tasks in the research area of Machine Learning is to analyze,
    recognize or interpret all kind of data. In most cases, a large accumulation of
    randomly distributed data is more or less useless. Only the categorization and
    division into meaningful groups, statistical evaluations or trend analyses etc.,
    give the data a certain practical use. One goal of machine learning is therefore
    to transform data into knowledge and draw useful conclusions from it.


    For a long time, the application of ML methods was reserved to a small group of
    experts. The algorithms used were complex and hardly understandable for laymen.
    It was only through the development of open-source libraries that non-experts
    were given the opportunity to deal with AI topics and machine learning in more
    detail. This made AI procedures and data structures accessible to a wide range
    of users. The Python programming language in particular made it possible to embed
    extensive functions in simple "wrappers". With the help of uncomplicated Python
    instructions, today nearly anyone can use the powerful algorithms. No supercomputers
    are required. Rather, even small systems can recognize patterns in large amounts
    of data or derive predictions about future events and developments [2].


    In the next section, the basic structure of artificial intelligence and machine
    learning will be presented. In addition, the associated terminology will be explained
    in more detail. This will provide the basics for solving practical applications.
    In particular, the following topics will play a major role:


    +   - Different variants of machine learning and AI.

    - Learning systems, neural networks and training methods.

    - Installation of a development environment for the programming language "Python"
    or its interactive variant IPython.

    - Creating a software basis for ML methods and procedures.


    # 3.1 Machine Learning and Artificial Intelligence


    The research fields of artificial intelligence are closely related. It is often
    difficult to separate the individual sub-areas from each other. In addition to
    machine learning methods, there are other areas such as classical expert systems
    or so-called evolutionary algorithms. However, many of these different regions
    have lost some of their importance in recent years, as current developments are
    increasingly focusing on neural networks and deep learning.'

    If, for example, a door opener is to be operated with this setup, the LED only
    has to be replaced by a relay that is able to control an electro-mechanical opener.
    However, in practical applications, you should always bear in mind that this simple
    facial identification by no means meets any security standards. For securing the
    door of your house or flat you should in any case resort to professional systems.


    # 15.12 Recognizing gender and age


    Estimating a person''s age often leads to problems. For females, an overestimated
    age is unlikely to go down very well. Many people find it difficult to quantify
    the exact age of other persons. Yet this can be of considerable importance. Just
    think of applications in marketing. Here, it is quite important to have information
    about the age distribution of your own customer base.


    Recognizing the gender of a person, on the other hand, is relatively unproblematic
    for most people (in most cases...). But here, too, automatic recognition could
    result in many interesting applications.


    After faces have been successfully recognized and even identified in the last
    sections, the Python programs we already discussed will be extended in such a
    way that they also enable estimates regarding the gender and age of a person.


    Ready-trained "Caffe" models can be used for this purpose. You will find the link

    \ be found in the file *LINKS.txt*.\n\nThe just created *MNIST_01.tflite* file\
    \ and the *ncc.exe* program should be copied into a new directory. In addition,\
    \ some training images must be loaded into a sub-directory named images. These\
    \ images are needed as calibration data for the conversion. In a Windows console\
    \ (cmd.exe), first change to the directory created above and then execute the\
    \ following conversion command\n\n```\nncc compile MNIST_01.tflite MNIST_01.kmodel\
    \ -i tflite --dataset images\n```\n\nThe conversion is completed after a few seconds\
    \ (Figure 16.1).\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_220_0.png)\n\nThe\
    \ kmodel file created in this way can now be copied to the MaixDuino in the usual\

  md: '# Chapter 15 • Facial Recognition and Identification


    Many smartphones, tablets and the like now offer the option of using automatic
    facial recognition rather than a password to unlock the device. In more and more
    companies, employees can sit down at their workstation and be identified via webcams
    for access to the internal network. This procedure provides complete access to
    all the resources they need — there is no longer any requirement to enter a password
    or use fingerprint scanners or card readers for company ID cards. Comparable functions
    are also directly integrated in various computer operating systems now.


    The ability of robots and computers to recognize people or human faces and then
    interact with the person in question holds a special fascination for many people
    [12]. In this chapter, a face recognition system will be built using a Raspberry
    Pi and the PiCam or a USB webcam.


    It is important to distinguish between two different concepts:


    +   - Face detection;

    - Face identification (FaceID).


    In the first case, human faces are just detected in the field of vision of a camera.
    The faces can be automatically tagged or counted. In addition to faces, the images
    may also include landscapes, buildings and other parts of the human being, such
    as legs, shoulders and arms, etc. The limitations of the first recognition systems,
    which could only recognize faces in front of uniform backgrounds, are obsolete.


    The first face recognition systems were used in electronic autofocus cameras.
    Here, just the recognition of a human face within the field of view of the camera
    lens is required. In a second step, the camera can automatically focus on the
    face. It is not necessary to identify the person. Other applications include determining
    the number of people in a certain area. In addition to security-related tasks,
    marketing perspectives also may come into focus here.


    Facial identification, on the other hand, is able to determine the identity of
    a specific person. Originally, access control to sensitive areas was one of the
    most important applications of this technology. In the meantime, however, the
    method is also used for everyday tasks, such as unlocking laptops, mobile phones
    or tablets. This is much more demanding than simply recognizing human faces or
    people.


    Moreover, this procedure bears considerable risks for individual privacy. When
    a modern smartphone is unlocked via FaceID by simply looking into the front camera,
    artificial intelligence is already at work. If you let Google or Apple sort your
    holiday photos, the results are based on machine-learning algorithms yet again.
    Everyone must decide for themselves whether this is a good idea in every respect,
    as there is no guarantee whatsoever that the biometric data collected in the process
    will really be processed securely [7].'

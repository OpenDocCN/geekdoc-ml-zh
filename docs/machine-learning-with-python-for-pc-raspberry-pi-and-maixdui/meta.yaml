    The so-called learning rate (LR) in the range from 0 to 1 defines how much the
    model is varied with each training run. Small values lead to long training processes.
    On the other hand, learning rates that are too high lead to that sub-optimal training
    result or even to an entirely unstable training process. A good strategy for setting
    the learning rate is to start with relatively large values such like LR = 0.7...0.9.
    If the training runs without any stability problems, the LR value can be reduced
    and the results can be successively optimized at the expense of longer training
    times [4].



    # Chapter 7 • Sipeed Maix, aka "MaixDuino"


    With the MaixDuino, a low-cost system is available that supports the application
    of artificial intelligence algorithms in particular. With Python, it is no problem
    to get AI algorithms running on a PC or a workstation. However, single-board computers
    such as the MaixDuino also allow equipping small and inexpensive hardware systems
    with appropriate functions and processes [10,11].


    In addition to selecting a system with sufficient computing power, there is always
    the question of which additional hardware components such as cameras, displays,
    microphones, actuators or sensors should be used for data acquisition. Available
    for around 30 euros, the MaixDuino (Figure 7.1) solves this problem in a convenient
    way. In addition to a camera and display interface, the board also provides several
    I/O pins. These are arranged in such a way that the connectors are compatible
    with the familiar Arduino UNO board. Thus, it is in principle possible to operate
    so-called Arduino shields with the MaixDuino as well.


    Not only the hardware is based on the Arduino system. There are also strong similarities
    on the software side. The MaixDuino can also be programmed via the Arduino IDE.
    However, for ML applications, it is advantageous to use Python as programming
    language.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_33_0.png)


    Figure 7.1: The MaixDuino.


    Since the MaixDuino is currently less widespread than the Raspberry Pi, the following
    section will present the most important features of the "Maix" in more detail.


    # 7.1 Small but mighty: the performance figures of the MaixDuino


    Among other well-known chips, the Kendryte K210 processor works on the MaixDuino
    board. Figure 7.2 shows the most important functional units of this chip.



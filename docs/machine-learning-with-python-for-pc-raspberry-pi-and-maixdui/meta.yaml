  mdcn: "# 使用Python进行机器学习\n\n## 适用于PC、树莓派和Maixduino\n\n```python\nimport sensor\n\
    import image\nimport lcd\nimport KPU as kpu\n\nsensor.reset()\nsensor.set_pixformat(sensor.RGB565)\n\
    sensor.set_framesize(sensor.QVGA)\nsensor.run(1)\ntask = kpu.load(0x300000)\n\
    anchor = (1.889, 2.5245, 2.9465, 3.94056, 3.99987, 5.3658, 5.155437)\nkpu.init_yolo2(task,\
    \ 0.5, 0.3, 5, anchor)\nwhile(True):\n    img = sensor.snapshot()\n    code =\
    \ kpu.run_yolo2(task, img)\n    if code:\n        for i in code:\n           \
    \ print(i)\n            a = img.draw_rectangle(i.rect())\n    a = lcd.display(img)\n\
    = kpu.deinit(task)\n```\n\n京特·斯帕纳\n\n# 使用Python进行机器学习\n\n适用于PC、树莓派和MaixDuino\n\

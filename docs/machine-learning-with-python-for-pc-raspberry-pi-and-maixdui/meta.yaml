  - '[PAGE 192]


    Despite all the concerns about privacy and data protection, facial recognition
    has become one of the most important applications of artificial intelligence.
    Due to its high economic importance and its various applications, it has been
    intensively studied in recent decades. Facial identification has therefore achieved
    a high level of reliability. In addition, it is possible to determine exactly
    the probability, that a certain face matches a person in a database. This opens
    up further possibilities. One of them is the so-called **augmented reality** (AR).
    The term is used for computer-assisted extensions of reality by virtual elements.
    The technology provides additional information to the human perception, including
    sensitive data of a certain person, for example. An important feature of AR is
    real-time data processing. All information is displayed immediately and the user
    is able to access the content via touch-screen or gesture control.


    With the success of smartphones, as well as the constant improvement in their
    performance and camera capabilities, interest in AR continues to grow. Large corporations
    have been working for years on the mass-market production of devices for mobile
    augmented reality. The development of special AR devices, such as data glasses
    (smart glasses), continues at full speed. In the future, there will undoubtedly
    be more and more powerful smartphones and smart glasses equipped with augmented
    reality applications. The associated software captures camera images, reads sensors
    or GPS data and supplements them with information from extensive databases. The
    visual augmentation is then embedded in the real environment. A typical application
    of augmented reality technology is shown as an example in Figure 15.1. For each
    visible person, various data, such as age, profession and nationality, etc., are
    displayed.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_192_0.png)


    *Figure 15.1: Personal identification and augmented reality.*


    # 15.1 The right to your own image


    With the development of image recognition techniques capable of analyzing faces,
    questions about the safety of this technology quickly arose. Ultimately, you can
    only assess the risks with sound personal knowledge and comprehensive expertise.'
  - '[PAGE 193]


    Since a pure facial recognition system does not compare image data with databases,
    no personal biometric data is stored. Without data storage, users in principle
    have less to worry about in terms of data breaches. Facial recognition systems
    for customer counting, etc., are therefore less critical in terms of data security.
    Nevertheless, the current legal situation should always be carefully checked before
    using these devices.


    Some systems are able to provide general information, such as age or gender, without
    specifically identifying the person itself. An example of these techniques is
    presented in Section 15.12. Retailers are thus able to determine which age groups
    the majority of their customers belong to. Accordingly, they can optimize product
    selection or marketing strategies.


    Facial recognition is therefore not completely unacceptable in all cases. In areas
    with a high security requirements, such as in military facilities or at certain
    official buildings the technology can be very useful. If specific personal identification
    is not required, pure facial recognition might be quite uncritical in terms of
    data protection.


    Things are different with facial identification. Here, under certain circumstances,
    the personal rights of the people recorded are deeply interfered with. The mere
    recognition of a person at a certain location is in principle already a violation
    of personal rights. If this information is collected in extensive databases, the
    "transparent person" quickly becomes a reality. The creation of movement profiles
    or the extraction of typical habits and behaviors is no longer a technical problem.
    What possibilities this will open up for interested groups of people can hardly
    be estimated today...


    > **Note:** In order to draw attention to this problem, the pictures of persons
    used in this book were alienated with various procedures.

    Tests of methods, programs, and routines must of course be carried out on original
    images without alienation.


    # 15.2 Machines recognize people and faces


    After the first approaches of machine face recognition, it took over 30 years
    until the first really useful results were achieved with an algorithm called Eigenfaces.
    Since then, however, the topic has been gaining more and more attention and one
    can assume a bright future for this field of research. There is no doubt that
    security applications will continue to play a central role in the future. Both
    facial recognition and identification can be used here.


    Many facial recognition algorithms start by searching for human eyes. These form
    a so-called valley region and are thus one of the easiest features to recognize.
    Once the eyes are detected, the algorithm typically tries to detect other facial
    areas such as the eyebrows, mouth, nose, and iris. Once the initial assumption
    that a facial region has been recognized is confirmed, further tests can be applied.
    These then check whether a human face has actually been detected or whether it
    is a random distribution of features that only resemble a human face. Face identification
    is thus ultimately a biometric procedure that goes far beyond capturing a human
    face in the field of view of a camera.'
  - '[PAGE 194]


    # Chapter 15 • Facial Recognition and Identification


    Airport security systems are an interesting example for person identification.
    Facial identification is used to automate passenger screening. In this way, people
    wanted by the police or potential suspects can be identified before they commit
    a crime, such as hijacking an aircraft. Facial recognition, on the other hand,
    can be used to record passenger numbers. This allows travelers to be directed
    in the best possible way. Larger accumulations of people or long queues are automatically
    and quickly detected in order to be able to open additional counters or check-in
    facilities, for example.


    In commercial use, facial recognition can also be used to speed up the identification
    of people. For example, systems are conceivable that recognize customers as soon
    as they enter a bank or insurance offices. An employee can already greet the person
    in question by name and prepare their data before they actually get to the employee''s
    counter or office.


    Active billboards could adapt their content to the people passing by. After analyzing
    the persons, advertising spots would adapt to gender, age or even personal style.
    Here, however, the first conflicts with data protection laws may well arise. In
    many countries private companies, are not allowed to photograph or film people
    in public places.


    With the use of 3-D cameras, the technology can be significantly improved once
    again. Thanks to the ability to capture three-dimensional images of a face, these
    systems achieve significantly improved accuracy. Simple camera systems can already
    be fooled with photographs. This can easily be verified with the PiCam. A simple
    setup is practically unable to distinguish between photographs and the persons
    themselves (Section 15.8).


    Facial recognition will undoubtedly become even more common in the future. The
    amount of data generated in recent years allows for new ways to analyze the information
    captured. Machine learning methods will be used to find more ways to make sense
    of this information. On the other hand, one should never forget the dangers of
    these technologies. It is therefore advisable that as many people as possible
    get to grips with the methods in a practical way. Keeping this in mind, it may
    be possible to prevent certain people from abusing the new powers of AI.


    In principle, the classic methods of machine learning and object detection can
    also be used for face recognition [6]. Ultimately, a human face is nothing else
    but an object with special properties. Instead of the number images in the section
    of machine based reading of handwriting digits, a large number of faces could
    be used as a training basis. The internet with its applications such as YouTube
    or Facebook (!) provides an almost inexhaustible data source. The comprehensive
    information is also used intensively by the well-known internet corporations,
    as many subscribers have often even unknowingly given their consent for using
    their personal data.


    The advances in facial recognition are thus based in no small part to the boom
    in social media. The huge amount of data accumulated there contains a myriad of
    facial images, often even along with a large amount of more or less personal and
    sensitive information.'
- md: "Machine Learning with Python\n\nTo understand how an algorithm can detect faces,\
    \ one can first ask how people actually recognize a face. On most (frontal) images\
    \ of human faces, there are two eyes, a nose, lips, forehead, chin, ears and hair.\
    \ Even so, these basic components are practically always present, faces also differ\
    \ from each other. So, the problem is to separate the common features from the\
    \ individual differences.\n\nAn additional problem arises from the fact that the\
    \ face of one and the same person changes constantly with emotions such as laughter,\
    \ anger, joy or annoyance etc. In addition, age, cosmetics or haircut often have\
    \ a significant influence. Furthermore, even just changing the viewing angle produces\
    \ a different facial image.\n\nHowever, a closer look reveals that there are some\
    \ features in every face that are largely independent of age, emotion and orientation,\
    \ etc. Various research groups therefore began using unsupervised learning methods\
    \ to separate and identify different types of faces. Others followed the approach\
    \ with extensive training of models based on each feature of the face. Different\
    \ approaches were used such as the\n\n- Principal Component Analyses (PCA);\n\
    - Linear Discrimination Analysis;\n- Independent Component Analysis;\n- Gabor\
    \ filters.\n\nGabor filters, commonly used in image processing, can capture important\
    \ visual features. They are of particular importance because they can localize\
    \ essential features such as eyes, nose or mouth in an image. Consequently, they\
    \ are used for both face recognition and identification [7].\n\nThe classical\
    \ method of comparing face images pixel by pixel, on the other hand, is hardly\
    \ effective. For example, background and hair pixels would provide little information.\
    \ Moreover, for a direct comparison, all faces in all images would have to be\
    \ perfectly aligned in order to expect usable results at all.\n\nTo solve this\
    \ problem, the PCA algorithm creates a set of principal components called eigenfaces.\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_196_0.png)\n\nFigure 15.2: Fundamental\
    \ and unalterable features of a face\n\nFrom a mathematical point of view, eigenfaces\
    \ are a graphical representation of so-called eigenvectors or characteristic values\
    \ of a data matrix. With a sufficiently large data set, any human face could in\
    \ principle be represented by a combination of eigenfaces, just as in mathematics\
    \ any vector can be constructed by a combination of basis vectors. Other analytical\
    \ methods such as linear component analysis also are based on the eigenface algorithm.\
    \ In Gabor filters, the most important features in the face are captured first.\
    \ A subsequent eigenface algorithm then uses these as a basis for comparison.\n\
    \nThe focus is on values such as the relative distance between the eyes or the\
    \ distance between the ears and the tip of the nose, etc. These values are very\
    \ specific to a face. Therefore they are also very specific for a particular person\
    \ and can hardly be changed. The position of the corners of the mouth or the hair\
    \ line play a less important role, as these values are quite variable.\n\nSeveral\
    \ open-source libraries for both face recognition and identification, in which\
    \ one or more of these methods have been implemented are currently available.\n\
    \nFigure 15.3 illustrates the steps from face recognition to face identification.\
    \ For identification, a recognition method is required first. Subsequently, a\
    \ database can be built using the corresponding image material. By training a\
    \ special neural network, the essential facial features can then be extracted.\
    \ These finally serve as the basis for identifying individual persons or faces.\n\
    \nMachine Learning with Python\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_197_0.png)\n\
    \nFigure 15.3: Steps from face recognition to identification.\n\n## 15.3 MaixDuino\
    \ as a Door Viewer\n\nPeople or institutions with increased security requirements\
    \ often want an automatic door viewer or \"door spy\". This should forward a message\
    \ or trigger an alarm as soon as any person is within a certain area.\n\nVarious\
    \ applications are also conceivable outside of security-relevant areas. For example,\
    \ in smaller retail shops, the staff could be notified as soon as a person enters\
    \ the salesroom.\n\nThese examples are classic applications of facial recognition\
    \ methods. A face only has to be detected; identification is not necessary. For\
    \ facial recognition, for the MaixDuino a fully trained network model called\n\
    \n```\nfacedetect.kmodel\n```\n\nis available. In addition, the Maix can once\
    \ again make use of its advantage as an embedded system. It is not only possible\
    \ to draw a frame around a person or a face on a display, but also to activate\
    \ an I/O pin, after it has been detected. This can then be used to switch on an\
    \ LED or an audible alarm or similar.\n\nThe corresponding download link is included\
    \ in *LINKS.txt* (\"MaixDuino Face detection\"). In the download package with\
    \ this book, the Python program can be found as\n\n```\nface_detection_simple.py\n\
    ```\n\n```python\nimport sensor,image,lcd\nimport KPU as kpu\n\nlcd.init()\nsensor.reset()\n\
    sensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\nsensor.run(1)\n\
    frameColor=(0,255,255)\n\n# task = kpu.load(0x300000) # kmodel in flash at address\
    \ 0x300000\ntask=kpu.load(\"/sd/models/facedetect.kmodel\")\n\nanchor=(1.889,2.5245,2.9465,3.94056,3.99987,5.3658,5.155437,6.92275,6.718375,9.01025)\n\
    a=kpu.init_yolo2(task,0.5,0.3,5,anchor)\n\nwhile(True):\n    img=sensor.snapshot()\n\
    \    code=kpu.run_yolo2(task,img)\n    if code:\n        for i in code:\n    \
    \        a=img.draw_rectangle(i.rect(),color=frameColor,scale=10)\n    a=lcd.display(img)\n\
    a=kpu.deinit(task)\n```\n\nAfter importing the libraries, display and camera are\
    \ initialized in the program. Then the model is loaded. Here again, it is possible\
    \ to switch between direct loading from the memory under the address 30000_hex\
    \ using\n\n```\ntask = kpu.load(0x300000) # kmodel in flash at address 0x300000\n\
    ```\n\nor, from a separate file,\n\n```\ntask = kpu.load(\"/sd/models/facedetect.kmodel\"\
    )\n```\n\nAfter setting the anchor points, the model is initialized. In the main\
    \ loop, the video image is captured:\n\n```\nimg=sensor.snapshot()\n```\n\nand\
    \ evaluated via the loaded model:\n\n```\ncode=kpu.run_yolo2(task,img)\n```\n\n\
    As soon as the variable **code** contains relevant data, a frame is drawn around\
    \ the detected face:\n\nMachine Learning with Python\n\n```\na=img.draw_rectangle(i.rect(),color=frameColor,scale=10)\n\
    ```\n\nThe content of the variable **code** is explained in more detail in the\
    \ following section.\n\nAfter starting the program, each face captured by the\
    \ MaixDuino camera is surrounded by a frame in the color \"frameColor\". The line\
    \ width of the frame can be adjusted via the variable **scale**.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_199_0.png)\n\
    \nFigure 15.4: MaixDuino detected a face.\n\nSimilar to object recognition, the\
    \ recognition function can also be used to activate further functions.\n\n## 15.4\
    \ How many guests were at the party?\n\nOne application of the detection functions\
    \ is the automatic counting of persons. If, for example, three persons were detected,\
    \ the variable **code** in the program *face_detection_simple.py* from the last\
    \ section shows the following content:\n\n```json\n[{\"x\":26, \"y\":98, \"w\"\
    :47, \"h\":79, \"value\":0.905853, \"classid\":0, \"index\":0, \"objnum\":3},\n\
    {\"x\":150, \"y\":104, \"w\":38, \"h\":63, \"value\":0.938012, \"classid\":0,\
    \ \"index\":1, \"objnum\":3},\n{\"x\":251, \"y\":109, \"w\":47, \"h\":63, \"value\"\
    :0.859508, \"classid\":0, \"index\":2, \"objnum\":3}]\n```\n\nThe array elements\
    \ x, y, w and h contain the coordinates (x, y) and the width and height (w, h)\
    \ of the faces. **Value** indicates the probability that actually a human face\
    \ is detected. Since only one class is detected here (\"face\"), the **classid**\
    \ is always zero.\n\nAlso interesting is \"objnum\". This variable indicates how\
    \ many faces were found in total. With \"index\", a number is assigned to each\
    \ hit. Using\n\n```\ncode[0].objnum()\n```\n\nthe number of faces found can be\
    \ determined. The program *face_counter.py* thus continuously provides the current\
    \ number of faces in the field of vision of the MaixDuino cam:"
  mdcn: "**Python机器学习**\n\n要理解算法如何识别人脸，首先可以思考人类是如何实际识别面孔的。在大多数（正面）人脸图像中，都存在两只眼睛、鼻子、嘴唇、额头、下巴、耳朵和头发。尽管这些基本组成部分几乎总是存在，但面孔之间仍然存在差异。因此，问题在于如何将共同特征与个体差异区分开来。\n\
    \n另一个问题源于同一个人的面孔会随着笑、怒、喜、恼等情绪而不断变化。此外，年龄、化妆或发型也常常产生显著影响。再者，仅仅改变观察角度也会产生不同的人脸图像。\n\
    \n然而，仔细观察会发现，每张面孔都有一些特征在很大程度上独立于年龄、情绪和朝向等因素。因此，各种研究小组开始使用无监督学习方法来分离和识别不同类型的人脸。其他研究者则采用基于人脸每个特征进行大量模型训练的方法。使用了不同的方法，例如：\n\
    \n- 主成分分析（PCA）；\n- 线性判别分析；\n- 独立成分分析；\n- Gabor滤波器。\n\nGabor滤波器在图像处理中常用，能够捕捉重要的视觉特征。它们尤为重要，因为可以在图像中定位眼睛、鼻子或嘴巴等关键特征。因此，它们被用于人脸识别和身份验证[7]。\n\
    \n另一方面，逐像素比较人脸图像的经典方法效果甚微。例如，背景和头发像素提供的信息很少。此外，为了直接比较，所有图像中的人脸都必须完美对齐，才有可能获得可用的结果。\n\
    \n为了解决这个问题，PCA算法创建了一组称为特征脸的主成分。\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_196_0.png)\n\
    \n图15.2：人脸的基本且不可改变的特征\n\n从数学角度来看，特征脸是数据矩阵的所谓特征向量或特征值的图形表示。在足够大的数据集下，任何人脸原则上都可以通过特征脸的组合来表示，就像在数学中任何向量都可以通过基向量的组合来构建一样。其他分析方法，如线性成分分析，也基于特征脸算法。在Gabor滤波器中，首先捕捉人脸中最重要的特征。随后的特征脸算法则将这些特征用作比较的基础。\n\
    \n重点在于眼睛之间的相对距离、耳朵与鼻尖之间的距离等数值。这些数值对人脸非常特定。因此，它们对特定个人也非常特定，且很难改变。嘴角的位置或发际线的作用较小，因为这些数值变化较大。\n\
    \n目前有多个开源库可用于人脸识别和身份验证，其中实现了一种或多种这些方法。\n\n图15.3说明了从人脸识别到身份验证的步骤。对于身份验证，首先需要一种识别方法。随后，可以使用相应的图像材料构建数据库。通过训练一个特殊的神经网络，可以提取关键的人脸特征。这些特征最终作为识别个人或面孔的基础。\n\
    \n**Python机器学习**\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_197_0.png)\n\n图15.3：从人脸识别到身份验证的步骤。\n\
    \n## 15.3 MaixDuino作为门禁监视器\n\n具有较高安全要求的个人或机构通常希望拥有一个自动门禁监视器或“门眼”。它应在任何人进入特定区域时立即发送消息或触发警报。\n\
    \n在安全相关领域之外，也可以构想各种应用。例如，在小型零售店中，一旦有人进入销售区，就可以通知员工。\n\n这些例子是人脸识别方法的经典应用。只需检测人脸；无需进行身份验证。对于人脸识别，MaixDuino提供了一个名为\n\
    \n```\nfacedetect.kmodel\n```\n\n的完全训练好的网络模型。此外，MaixDuino可以再次利用其作为嵌入式系统的优势。不仅可以在显示屏上为人或人脸绘制边框，还可以在检测到后激活I/O引脚。然后，该引脚可用于打开LED灯、声音警报或类似设备。\n\
    \n相应的下载链接包含在*LINKS.txt*（“MaixDuino人脸检测”）中。在本书的下载包中，Python程序可找到为\n\n```\nface_detection_simple.py\n\
    ```\n\n```python\nimport sensor,image,lcd\nimport KPU as kpu\n\nlcd.init()\nsensor.reset()\n\
    sensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\nsensor.run(1)\n\
    frameColor=(0,255,255)\n\n# task = kpu.load(0x300000) # kmodel in flash at address\
    \ 0x300000\ntask=kpu.load(\"/sd/models/facedetect.kmodel\")\n\nanchor=(1.889,2.5245,2.9465,3.94056,3.99987,5.3658,5.155437,6.92275,6.718375,9.01025)\n\
    a=kpu.init_yolo2(task,0.5,0.3,5,anchor)\n\nwhile(True):\n    img=sensor.snapshot()\n\
    \    code=kpu.run_yolo2(task,img)\n    if code:\n        for i in code:\n    \
    \        a=img.draw_rectangle(i.rect(),color=frameColor,scale=10)\n    a=lcd.display(img)\n\
    a=kpu.deinit(task)\n```\n\n导入库后，程序初始化显示屏和摄像头。然后加载模型。这里同样可以切换使用地址30000_hex下的内存直接加载\n\
    \n```\ntask = kpu.load(0x300000) # kmodel in flash at address 0x300000\n```\n\n\
    或从单独文件加载\n\n```\ntask = kpu.load(\"/sd/models/facedetect.kmodel\")\n```\n\n设置锚点后，模型被初始化。在主循环中，捕获视频图像：\n\
    \n```\nimg=sensor.snapshot()\n```\n\n并通过加载的模型进行评估：\n\n```\ncode=kpu.run_yolo2(task,img)\n\
    ```\n\n一旦变量**code**包含相关数据，就会在检测到的人脸周围绘制边框：\n\n**Python机器学习**\n\n```\na=img.draw_rectangle(i.rect(),color=frameColor,scale=10)\n\
    ```\n\n变量**code**的内容将在下一节中更详细地解释。\n\n启动程序后，MaixDuino摄像头捕获的每张人脸都会被“frameColor”颜色的边框包围。边框的线宽可以通过变量**scale**进行调整。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_199_0.png)\n\n图15.4：MaixDuino检测到一张人脸。\n\
    \n与物体识别类似，识别功能也可用于激活其他功能。\n\n## 15.4 派对上有多少位客人？\n\n检测功能的一个应用是自动计数人数。例如，如果检测到三个人，上一节程序*face_detection_simple.py*中的变量**code**显示以下内容：\n\
    \n```json\n[{\"x\":26, \"y\":98, \"w\":47, \"h\":79, \"value\":0.905853, \"classid\"\
    :0, \"index\":0, \"objnum\":3},\n{\"x\":150, \"y\":104, \"w\":38, \"h\":63, \"\
    value\":0.938012, \"classid\":0, \"index\":1, \"objnum\":3},\n{\"x\":251, \"y\"\
    :109, \"w\":47, \"h\":63, \"value\":0.859508, \"classid\":0, \"index\":2, \"objnum\"\
    :3}]\n```\n\n数组元素x、y、w和h包含人脸的坐标（x, y）以及宽度和高度（w, h）。**Value**表示实际检测到人脸的概率。由于这里只检测到一个类别（“人脸”），**classid**始终为零。\n\
    \n同样有趣的是“objnum”。此变量表示总共找到了多少张人脸。通过“index”，为每个命中分配一个编号。使用\n\n```\ncode[0].objnum()\n\
    ```\n\n可以确定找到的人脸数量。因此，程序*face_counter.py*持续提供MaixDuino摄像头视野中当前的人脸数量："

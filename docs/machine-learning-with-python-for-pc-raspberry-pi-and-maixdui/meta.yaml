  md: "# Chapter 19 • Troubleshooting\n\nThe following list shows the most common\
    \ causes of errors in breadboard assemblies. Assuming a circuit is carefully checked\
    \ in the event of an error, there is a high probability that it will work properly\
    \ in the end.\n\n+   1. Hardware\n    - Are all polarized components inserted\
    \ in the correct orientation? Check LEDs and transistors in particular!\n    -\
    \ Make sure that bare connecting wires of components do not touch each other unintentionally.\n\
    \    - Are all resistors correctly selected? In poor lighting conditions, the\
    \ color rings (specifically red and orange) can easily be mixed up.\n    - \"\
    Reverse engineering\": If a circuit refuses to work at all, it can be very useful\
    \ if you draw your own circuit diagram according to the actual setup. This often\
    \ makes the assignment of the individual components clearer.\n    - Is the USB\
    \ or programming cable connected correctly?\n\n+   2. Errors can also occur during\
    \ programming or upload. The following general actions can be helpful here:\n\
    \    - reload the MicroPython system;\n    - press the Boot or Enable buttons\
    \ on the MaixDuino;\n    - restart Thonny;\n    - disconnect and reconnect your\
    \ USB link.\n\nMore specific and detailed information on troubleshooting can be\
    \ found in the individual chapters."
  merge: -1

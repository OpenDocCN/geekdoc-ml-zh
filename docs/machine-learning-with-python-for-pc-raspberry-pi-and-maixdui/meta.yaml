    Figure 14.7: Setup proposal for a chatbot.


    Further information on the components used here can be found in Chapter 18.


    # 14.6 From ELIZA to ChatterBots


    Starting in the early days of AI research, attempts were made to transfer the
    mental abilities of humans to machines in order to solve certain problems. The
    goal was to make the comprehensive in-depth knowledge of highly qualified "experts"
    as universally accessible as possible. For example, the diagnosis of infectious
    diseases was to be automated in order to relieve highly trained medical doctors
    from routine tasks.


    However, it quickly became apparent that the knowledge representation of even
    a narrowly defined field quickly became extremely complex. Rule-based diagnoses
    quickly required decision trees that were no longer manageable. For example, the
    simple flu symptoms like cough, hoarseness and aching limbs can indicate a multitude
    of different diseases. Experienced doctors can quickly rule out unlikely diagnoses,
    whereas an expert system has to ask dozens of questions to do so.


    The maintenance of these systems also became a problem: the systems were not adaptive!
    Innovative approaches and better computer systems therefore led to the development
    of machine learning in this area, among others.


    • 186'
  - '[PAGE 186]


    Simple "expert systems" nevertheless have their justification. They can still
    be used successfully in narrowly defined areas. As shown in the last chapter,
    a few instructions are sufficient for a home automation system to adjust lighting
    or temperature conditions in a living room.


    Therefore, chatbots are often used in special dialogue systems. Corresponding
    applications can be found in the most diverse areas such as


    +   - customer service, order taking or support;

    - entertainment, finance, games;

    - health care;

    - human resources and marketing;

    - news, social, sports and travel agencies.


    The progressive improvement of technology eventually formed the basis for the
    voice recognition systems Google Assistant, Siri, Cortana, or Alexa.


    Simple systems search directly for keywords in the input. More advanced methods
    perform extensive analyses of the text spoken by the user before searching for
    a complex suitable answer or action. This already allows a very reliable speech
    recognition to be built up. Nevertheless, it can be seen, for example when working
    with the Raspberry Pi ChatBot, that the reliability is still significantly worse
    than with direct human-to-human communication.


    The forefather of all chatbots was ELIZA, an early computer program for natural
    language processing. Of course, at that time, in the mid-1960s, communication
    still took place via keyboards and screens. ELIZA was supposed to imitate the
    typical responses of a psychotherapist. The conversation was kept going with the
    help of "pattern matching" and substitution methods. Simple random elements were
    also included.


    One of the most interesting results of this experiment was that many people revealed
    their most intimate thoughts and problems unfiltered, without the chatbot having
    even the slightest idea of the conversant''s problems.


    A typical "conversation" with Eliza looked something like this:


    ```

    ELIZA >>> Hello my name is ELIZA

    Person: Can I ask you something?

    ELIZA >>> Did you come because you have a question?

    Person: Yes

    ELIZA >>> Are you all right?

    Person: Yes, thank you for asking

    ELIZA >>> That''s nice!

    Person: What are you doing today?

    ELIZA >>> We are supposed to talk about you, not about me.

    Person: I have problems with my mother

    ELIZA >>> Why do you have problems with your mother?

    ...

    ```'
- md: "Machine Learning with Python\n\nPractically no information about human thinking\
    \ or about emotions was used, yet the program often delivered amazingly human-ish\
    \ answers. Since those early days, chatbots have often been perceived as creepy\
    \ or Big Brother-like. Nevertheless, households around the world are increasingly\
    \ using digital voice assistants such as Alexa or Google Home. Interestingly,\
    \ according to various surveys, about 25% of users would not miss a conversation\
    \ with a real human being if an intelligent ChatBot system answered their questions\
    \ in an acceptable manner — and the trend is rising!\n\nChatBots will undoubtedly\
    \ appear in more and more applications in the near future. Most experts even assume\
    \ that in a few years it will be practically impossible for many people to distinguish\
    \ whether they are talking to a human being or a ChatBot.\n\nTo conclude this\
    \ chapter, we will now present two applications that show that it is possible\
    \ to implement quite interesting projects with speech output alone.\n\n## 14.7\
    \ The Talking Eye\n\nIn addition to the applications in home automation, speech\
    \ output in combination with the object recognition methods from Chapter 13 offer\
    \ highly interesting practical applications. If the object detection routines\
    \ are already installed, it is also possible to get the information about detected\
    \ objects via speech output [6]. To do this, simply connect an active speaker\
    \ to the 3.5 mm audio socket of the Raspberry Pi. Figure 14.8 shows a circuit\
    \ diagram for an overall setup, which already includes the optional ultrasound\
    \ extension used in the next chapter.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_187_0.png)\n\
    \nOn the software side, the object recognition program just has to be extended\
    \ by the speech output. For this purpose, the eSpeak module already known from\
    \ the previous section is used again. By inserting the lines\n\n```python\nos.system(\"\
    espeak 'I see a'\")\nspeak = str(object_name)\nos.popen('espeak \"' + speak +\
    \ '\" --stdout | aplay 2> /dev/null').read()\n```\n\nafter the object detection\
    \ code, the individual objects are identified one after the other via the voice\
    \ output. The entire program is available in the download package as `TFLite_detection_PiCam_speaker_1V0.py`.\n\
    \nOf course, the program must be started again in the virtual environment created\
    \ for object detection purposes.\n\nThe resulting \"speaking eye\" can be an important\
    \ everyday aid for the blind or visually impaired, for example. Such systems are\
    \ also increasingly being used on a commercial level to support people with corresponding\
    \ disabilities. Of course, highly integrated versions are usually used here, so\
    \ that the devices are much more compact than the design presented here. For example,\
    \ it is already possible to integrate the entire system into a pair of glasses,\
    \ which hardly differ from an ordinary version. Nevertheless, the system contains\
    \ a camera, the object recognition module and an audio output in the earpiece\
    \ of the glasses.\n\nHowever, simple object recognition is by no means the end\
    \ of the story. For example, miniature computers that can be worn like classic\
    \ glasses are available, providing an integrated optical display in addition to\
    \ the acoustic output. The display is mounted on the frame of the glasses at the\
    \ edge of the field of vision. This setup can be used to show general information\
    \ and additional data on the objects detected by the camera.\n\nOne of the first\
    \ commercially available devices in this field was the Google Glass system. This\
    \ is without doubt a highly innovative application project for AI processes. However,\
    \ the device also very clearly shows the dangers of the new technology. Of particular\
    \ importance is the threat to the privacy of persons observed. The glasses are\
    \ definitely capable of inconspicuously spying on the wearer's surroundings and\
    \ wirelessly transmitting recordings of all sorts to a server. You can only imagine\
    \ the possibilities that such devices offer to those in power in a totalitarian\
    \ surveillance state...\n\n## 14.8 An AI Bat\n\nEven with simple means, you can\
    \ go one step further and equip the system with an ultrasonic range finder. This\
    \ makes it even superior to its human counterpart in a certain sense. Of course,\
    \ humans are also able to estimate distances based on their experience and stereoscopic\
    \ vision with two eyes. However, an ultrasound module can detect distances up\
    \ to a few meters with centimeter-accuracy (see Section 13 and list of references).\n\
    \nWith regard to the ultrasonic range finder, it should be noted that it must\
    \ be designed for operation at 3.3 V. Alternatively, a conventional transducer\
    \ for 5 V can be used. In this case, however, an additional 3.3 V / 5 V level\
    \ converter is needed in the trigger/echo signal lines, as the I/O pins of the\
    \ Raspberry Pi permit 3.3 V only. Figure 14.8 can be used for the setup, as the\
    \ connection of the ultrasonic sensor is already shown there. Further information\
    \ on the ultrasound module itself and the connection to the Raspberry can be found\
    \ in Section 18.7.\n\nThe program `TFLite_detection_webcam_distance_speaker_1V0.py`\
    \ contains the additional instructions for evaluating the ultrasonic rangefinder.\
    \ After initializing the pins:\n\n```python\nTRIG=18 #trigger pin of HC-SR04 ultrasound\
    \ module\nECHO=24 #echo pin of HC-SR04 ultrasound module\nGPIO.setmode(GPIO.BCM)\
    \ #or GPIO.setmode(GPIO.BOARD)\nGPIO.setup(TRIG, GPIO.OUT)\nGPIO.setup(ECHO, GPIO.IN)\n\
    ```\n\nthe distance of an object (in centimeters) can be determined using the\
    \ routine\n\n```python\ndef distance():\n    GPIO.output(TRIG, 1)\n    time.sleep(0.00001)\n\
    \    GPIO.output(TRIG, 0)\n    while GPIO.input(ECHO)==0:\n        start_time=time.time()\n\
    \    while GPIO.input(ECHO)==1:\n        stop_time=time.time()\n    return (stop_time-start_time)*340/2*100\
    \ #calculate distance from time\n```\n\nHere, the speed of sound in air (340 m/s)\
    \ is used:\n\n```python\nreturn (stop_time-start_time)*340/2*100 #calculate distance\
    \ from time\n```\n\nThe factor 2 results from the fact that the round trip time\
    \ to and from the object must be considered.\n\nOnce an object has been detected\
    \ and recognized, its distance can be indicated acoustically via eSpeak. It should\
    \ be noted that the object with the largest reflective surface always dominates\
    \ the distance information. Thus, although small objects in the foreground are\
    \ correctly recognized by the AI system, the ultrasonic sensor provides the distance\
    \ of the background object. By means of more sharply focused ultrasound sources,\
    \ a certain improvement could be achieved here. For principal physical reasons,\
    \ however, a detailed ultrasonic identification of individual objects is hardly\
    \ possible.\n\nFor this reason, laser scanners are predominantly used in autonomous\
    \ vehicles. These provide an actual three-dimensional image of the surroundings.\
    \ The distance information no longer has to be obtained additionally, as it is\
    \ supplied directly by the laser system.\n\nFor simpler applications, such as\
    \ in the field of visual aids, a device equipped with low-cost ultrasonic sensors\
    \ is, nevertheless quite practicable. Applications that combine the advantages\
    \ of AI-supported image recognition and ultrasonic distance measurement are also\
    \ being used more and more frequently in automation technology and robotics.\n\
    \n## Chapter 15 • Facial Recognition and Identification\n\nMany smartphones, tablets\
    \ and the like now offer the option of using automatic facial recognition rather\
    \ than a password to unlock the device. In more and more companies, employees\
    \ can sit down at their workstation and be identified via webcams for access to\
    \ the internal network. This procedure provides complete access to all the resources\
    \ they need — there is no longer any requirement to enter a password or use fingerprint\
    \ scanners or card readers for company ID cards. Comparable functions are also\
    \ directly integrated in various computer operating systems now.\n\nThe ability\
    \ of robots and computers to recognize people or human faces and then interact\
    \ with the person in question holds a special fascination for many people [12].\
    \ In this chapter, a face recognition system will be built using a Raspberry Pi\
    \ and the PiCam or a USB webcam.\n\nIt is important to distinguish between two\
    \ different concepts:\n\n- Face detection;\n- Face identification (FaceID).\n\n\
    In the first case, human faces are just detected in the field of vision of a camera.\
    \ The faces can be automatically tagged or counted. In addition to faces, the\
    \ images may also include landscapes, buildings and other parts of the human being,\
    \ such as legs, shoulders and arms, etc. The limitations of the first recognition\
    \ systems, which could only recognize faces in front of uniform backgrounds, are\
    \ obsolete.\n\nThe first face recognition systems were used in electronic autofocus\
    \ cameras. Here, just the recognition of a human face within the field of view\
    \ of the camera lens is required. In a second step, the camera can automatically\
    \ focus on the face. It is not necessary to identify the person. Other applications\
    \ include determining the number of people in a certain area. In addition to security-related\
    \ tasks, marketing perspectives also may come into focus here.\n\nFacial identification,\
    \ on the other hand, is able to determine the identity of a specific person. Originally,\
    \ access control to sensitive areas was one of the most important applications\
    \ of this technology. In the meantime, however, the method is also used for everyday\
    \ tasks, such as unlocking laptops, mobile phones or tablets. This is much more\
    \ demanding than simply recognizing human faces or people.\n\nMoreover, this procedure\
    \ bears considerable risks for individual privacy. When a modern smartphone is\
    \ unlocked via FaceID by simply looking into the front camera, artificial intelligence\
    \ is already at work. If you let Google or Apple sort your holiday photos, the\
    \ results are based on machine-learning algorithms yet again. Everyone must decide\
    \ for themselves whether this is a good idea in every respect, as there is no\
    \ guarantee whatsoever that the biometric data collected in the process will really\
    \ be processed securely [7]."
  mdcn: "**Python机器学习**\n\n尽管几乎没有使用任何关于人类思维或情感的信息，但该程序却常常能给出惊人地接近人类的回答。自早期以来，聊天机器人常被视为令人毛骨悚然或类似“老大哥”的存在。然而，全球各地的家庭正越来越多地使用诸如Alexa或Google\
    \ Home之类的数字语音助手。有趣的是，根据各种调查，约25%的用户表示，如果智能聊天机器人系统能以可接受的方式回答他们的问题，他们将不会怀念与真人交谈——而且这一趋势正在上升！\n\
    \n毫无疑问，聊天机器人将在不久的将来出现在越来越多的应用中。大多数专家甚至假设，几年后，许多人将几乎无法分辨他们是在与真人还是聊天机器人交谈。\n\n为了结束本章，我们现在将展示两个应用，它们表明仅通过语音输出就有可能实现相当有趣的项目。\n\
    \n## 14.7 会说话的眼睛\n\n除了家庭自动化中的应用，语音输出与第13章中的物体识别方法相结合，提供了极具趣味性的实际应用。如果物体检测程序已经安装，也可以通过语音输出获取关于检测到物体的信息[6]。为此，只需将一个有源扬声器连接到树莓派的3.5毫米音频插孔。图14.8展示了整体设置的电路图，其中已经包含了下一章将使用的可选超声波扩展。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_187_0.png)\n\n在软件方面，物体识别程序只需扩展语音输出功能。为此，再次使用了前一节中已知的eSpeak模块。在物体检测代码之后插入以下几行：\n\
    \n```python\nos.system(\"espeak 'I see a'\")\nspeak = str(object_name)\nos.popen('espeak\
    \ \"' + speak + '\" --stdout | aplay 2> /dev/null').read()\n```\n\n各个物体就会通过语音输出被逐一识别。整个程序在下载包中以\
    \ `TFLite_detection_PiCam_speaker_1V0.py` 的形式提供。\n\n当然，程序必须在为物体检测目的创建的虚拟环境中再次启动。\n\
    \n由此产生的“会说话的眼睛”可以成为盲人或视力障碍者重要的日常辅助工具。此类系统也越来越多地在商业层面被用于支持有相应残疾的人士。当然，这里通常使用高度集成的版本，因此设备比此处介绍的设计要紧凑得多。例如，已经可以将整个系统集成到一副眼镜中，这副眼镜与普通版本几乎没有区别。尽管如此，该系统包含了摄像头、物体识别模块以及眼镜耳罩中的音频输出。\n\

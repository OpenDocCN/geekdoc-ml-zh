    # Chapter 14 • Machines Learn to Listen and Speak


    Besides the eyes, the ears are among the most important sensory organs for human
    beings. Acoustic information contributes significantly to the perception of the
    environment. In principle, audio technology is much easier to handle than image
    and video processing. Historically, radio technology was available long before
    the first television broadcasts. Electronic recording and playback of sounds via
    vinyl records and tapes were also developed and commercialized long before the
    first video recorders.


    In computer technology, things were somewhat different. Right from the beginning,
    computers had some form of screen. So, visual output was always in the foreground.
    Sound signals usually played a subordinate role. Computers with speech output
    were a much bigger challenge and properly working systems were not available until
    recently. For a long time, primitive voice computer communication was reserved
    for films and TV series such as *Star Trek*, *War Games*, or *Knight Rider*.


    It was not until the turn of the millennium that voice-capable devices became
    available, although slowly. The first classic telephone voice systems at public
    authorities, banks and insurance companies were eventually joined by voice assistants
    such as Siri and Alexa. In the meantime, e-book readers such as Amazon''s Echo
    are able to read Kindle books aloud in almost natural language. The latest generation
    of laptops or tablets explain their functions using synthetic speech when they
    are first used. At the same time, the formerly widespread speech chips have become
    obsolete mainly because standard processors are now completely sufficient to build
    speaking systems [5]. Thus, the Raspberry Pi is also able to communicate via voice
    instructions. Both speech playback and the recognition of spoken information are
    possible.


    Although speech systems are not so clearly in the focus of current machine-learning
    development, they are certainly also among the desirable functionalities of artificial
    intelligence. Particularly in robotics, communication in natural language plays
    an increasingly important role. This chapter will therefore take a closer look
    at the possibilities of speech output and recognition, specifically on the Raspberry
    Pi. In combination with other technologies, such as various sensors or the object
    recognition already discussed, very impressive and practically applicable projects
    can be implemented using speech communication.


    # 14.1 Talk to me!


    The first devices and systems with a rudimentary capability of generating human
    speech were constructed over 200 years ago. Modern speech synthesis can therefore
    look back on a long history. With simple components such as a bellows as a lungs,
    tubes, and wooden resonators, scientists eager to experiment began to synthesize
    word elements. Amazingly, it was already possible at that time to produce sounds
    that had certain similarities with human speech.


    A big step towards speech synthesis as we know it today was taken with the first
    digital speech synthesizers in the 1960s when analog electronic components started
    to supersede the purely mechanical devices from the old days. However, at first
    it was hardly possible'
- md: '## 14.2 RPi Learns to talk


    To produce intelligible speech with these devices, the electronically generated
    waveforms had little to do with real language. Later on, digital **text-to-speech
    synthesis (TTS)** brought some progress. For the first time, speech elements were
    constructed from a given number of phonemes and word elements. Long after the
    first sound recordings, fully synthesized words and eventually entire sentences
    could finally be reproduced intelligibly over audio systems. The first "talking
    machines" were soon used in automated telephone information systems.


    The recognition and decoding of human speech, on the other hand, is once again
    much more complex than its synthesis. Even when talking machines were already
    widespread, speech recognition was still in its infancy. Despite intensive efforts,
    the breakthrough was a long time coming. With elaborate mathematical procedures
    such as Fourier transformations or decomposition of words into phonetic units,
    only minimal success could be achieved. In particular the problem that different
    speakers and voices have very different acoustic signatures, could not be solved
    for a long time. Again and again, acoustic queries were met with, "I didn''t get
    you..." Complete speech systems thus remained fiction for a long time.


    Similar to image processing, self-learning systems led to the breakthrough. With
    the help of neural networks, speech recognition software could finally be trained
    to capture human speech and convert it to text or instructions. After pre-filtering
    and digitization, the sounds are fed into appropriately trained networks. Now
    that the training could be automated, it was no longer a problem to use hundreds
    of speakers, i.e., men or women and children as well as senior citizens as "language
    teachers". This ultimately solved the problem of voice variation between different
    speakers and opened the door to various speech recognition applications.


    Thus, voice-assisted data entry, call forwarding and routing, automatic voice
    dialing, voice search, and voice control became ubiquitous. Banks and insurance
    companies replaced their call center staff with computerized voice systems. So-called
    "telephone banking" led to massive savings in the financial sector. The direct
    dictation of spoken words into the computer and machine translations replaced
    the typical tasks of secretaries and interpreters.


    Deep-learning methods make it possible to perform high-quality word and speech
    recognition. The software systems use so-called **Natural Language Processing
    (NLP)** to break down speech into easily interpretable elements. Pre-trained models
    provide precise word classifications and interpretations in real time. In this
    way, the spoken word is converted into text or even complex instructions.


    However, the mere recognition of sound signals is not sufficient for comprehensive
    speech recognition. Speech recognition software must, for example, also detect
    the difference between synonyms and homophones or distinguish between proper names
    and regular words. For example, the word "newton" can denote the unit of mechanical
    force as well as one of the greatest physicists in history.


    Speech recognition must therefore provide a process that is, to a certain extent,
    intelligent and capable of linking knowledge sources and linguistic information.
    This is where even the most modern systems reach their limits. However, the "Watson"
    AI system provided an impressive example of natural speech understanding in 2011.
    In a US TV quiz show, Watson competed with human opponents and easily defeated
    the previous human champions. The rules of the game stated that the contestant
    who first presses a switch and is able to answer correctly, is the winner. The
    questions are formulated in such a way that not only general knowledge, but also
    the recognition of complex correlations and mental associations as well as irony
    and linguistic wit play an important role. The system proved that it understands
    natural language and can also answer difficult questions quickly and correctly.


    Nevertheless, the task of recognizing spoken words remains significantly more
    difficult than generating speech electronically. The models used must capture
    phonetic units and then identify specific phonemes or sounds in a database. Finally,
    a language model is required that recognizes meaningful words and sentences and
    interprets them correctly. Only the combination of these procedures ultimately
    provides useful results.


    Current language models are by no means unchanging or static. Just as a language
    itself changes, speech recognition must also be continuously adapted. By learning
    new terms and phonemes, speech recognition can eventually understand indistinct
    pronunciations or dialects, just like a toddler is learning the native tongue.
    Speech recognition software is thus determined in the long term by the quality
    of the machine learning algorithms [5].


    This is one of the reasons why it is hardly possible to implement high-quality
    speech recognition systems completely autonomously on small systems such as a
    Raspberry Pi or the MaixDuino. The following chapters therefore use a web interface
    provided by Google for this purpose.


    Since the Raspberry Pi does not have an audio input, it cannot be used for speech
    recognition without additional hardware. However, voice output is certainly within
    the realms of possibility. For example, headphones, active speakers or other audio
    output systems can be connected to the 3.5-mm jack socket of the Raspberry Pi.
    Alternatively, a small audio amplifier can be built [5, 14].


    The audio output is activated via the Rpi-config menu and the corresponding:


    ```

    Advanced Options → Audio

    ```


    The best results are achieved with the


    ```

    Forced 3.5 mm (''headphone'') Jack

    ```


    setting. However, it turns out that the audio system under Pi OS is quite complex.
    In addition, the sound output does not work properly with some operating system
    versions or on different board variants. In these cases, the optimal sound setting
    must be found out experimentally. Basically, the parameter **snd-usb-audio** in


    ```

    /etc/modprobe.d/alsa-base.conf

    ```


    must be adapted from -2 to 0.

    When testing different settings, the sound output can be checked using the instruction


    ```

    speaker-test -t wav -c 2

    ```


    If successful, "front left" should be heard on the left channel and "front right"
    on the right channel. If this is the case, the sound output via the audio socket
    is set correctly. With this, you are well prepared for setting up a Raspberry-based
    speech system.


    The well-known eSpeak text-to-speech system has been widely used, especially on
    Linux systems. It should therefore form a good basis for a port to RPi OS. However,
    the system had not been further developed for several years. Moreover, it required
    an extensive installation procedure and some special adaptations to ensure a reasonably
    smooth operation.


    With eSpeak-NG, on the other hand, a new software system is available that is
    largely compatible with the current Raspberry Pi OS. NG stands for **Next Generation**.
    This version can be installed very easily. The corresponding installation instructions
    can again be taken directly from the LINKS.txt file in the download package. There
    is also a Python interface that can be loaded onto the Pi via PIP3 install (see
    *LINKS.txt*).


    ESpeak-NG has several language modules. Besides English, German and French are
    also available for example. With the *eSpeak_NG_tst.py* from the download package,
    the speech quality of the system can be tested:


    ```python

    from time import sleep

    from espeakng import ESpeakNG


    phrase1_en="Hello, how are you today?"

    phrase1_de="Guten morgen Doktor!"

    phrase2_de="Ist der Fluxkompensator bereit?"


    print(phrase1_en)

    esng=ESpeakNG(voice=''en'')

    esng.pitch = 5

    esng.speed = 120

    esng.say(phrase1_en, sync=True)


    pause(1)


    print(phrase1_de); print(phrase2_de);

    esng=ESpeakNG(voice=''de'')

    esng.pitch = 10

    ```'
  mdcn: '## 14.2 树莓派学习说话


    要使用这些设备产生可理解的语音，电子生成的波形与真实语言关系不大。后来，数字**文本转语音合成（TTS）**带来了一些进展。语音元素首次由给定数量的音素和单词元素构成。在首次录音很久之后，完全合成的单词以及最终整个句子终于能够通过音频系统清晰地再现。第一批“会说话的机器”很快被用于自动电话信息系统。


    另一方面，人类语音的识别和解码再次比其合成复杂得多。即使在会说话的机器已经普及的时候，语音识别仍处于起步阶段。尽管付出了巨大努力，突破却姗姗来迟。通过傅里叶变换或将单词分解为语音单元等复杂的数学程序，只能取得微小的成功。特别是不同说话者和声音具有非常不同的声学特征这一问题，长期以来无法解决。声学查询一次又一次地得到“我没听懂……”的回应。因此，完整的语音系统在很长一段时间内仍然是虚构的。


    与图像处理类似，自学习系统带来了突破。借助神经网络，语音识别软件最终可以被训练来捕捉人类语音并将其转换为文本或指令。经过预过滤和数字化后，声音被输入到经过适当训练的网络中。既然训练可以自动化，那么使用数百名说话者，即男性、女性、儿童以及老年人作为“语言教师”就不再是问题。这最终解决了不同说话者之间声音差异的问题，并为各种语音识别应用打开了大门。


    因此，语音辅助数据输入、呼叫转移和路由、自动语音拨号、语音搜索和语音控制变得无处不在。银行和保险公司用计算机化的语音系统取代了他们的呼叫中心员工。所谓的“电话银行”为金融行业带来了巨大的节省。将口语直接听写到计算机中以及机器翻译取代了秘书和口译员的典型任务。


    深度学习方法使得执行高质量的单词和语音识别成为可能。软件系统使用所谓的**自然语言处理（NLP）**将语音分解为易于解释的元素。预训练模型提供实时的精确单词分类和解释。通过这种方式，口语被转换为文本甚至复杂的指令。


    然而，仅仅识别声音信号不足以实现全面的语音识别。例如，语音识别软件还必须检测同义词和同音词之间的区别，或者区分专有名词和普通单词。例如，“newton”这个词既可以表示机械力的单位，也可以表示历史上最伟大的物理学家之一。


    因此，语音识别必须提供一个在某种程度上智能的、能够链接知识源和语言信息的过程。即使是最现代的系统也在此达到极限。然而，“Watson”人工智能系统在2011年提供了一个令人印象深刻的自然语音理解示例。在美国的一档电视智力竞赛节目中，Watson与人类对手竞争，并轻松击败了之前的人类冠军。游戏规则规定，首先按下开关并能正确回答问题的参赛者获胜。问题的设置方式使得不仅需要常识，还需要识别复杂的关联和心理联想，以及讽刺和语言机智。该系统证明它理解自然语言，并且能够快速正确地回答难题。


    尽管如此，识别口语的任务仍然比电子生成语音困难得多。所使用的模型必须捕捉语音单元，然后在数据库中识别特定的音素或声音。最后，需要一个语言模型来识别有意义的单词和句子并正确解释它们。只有这些程序的结合最终才能提供有用的结果。


    当前的语言模型绝非一成不变或静态的。正如语言本身会变化一样，语音识别也必须不断调整。通过学习新的术语和音素，语音识别最终可以理解模糊的发音或方言，就像一个蹒跚学步的孩子学习母语一样。因此，语音识别软件在长期上由机器学习算法的质量决定[5]。


    这就是为什么在像树莓派或MaixDuino这样的小型系统上完全自主地实现高质量语音识别系统几乎不可能的原因之一。因此，以下章节使用Google为此目的提供的网络接口。


    由于树莓派没有音频输入，没有额外的硬件就无法用于语音识别。然而，语音输出当然是可能的。例如，耳机、有源扬声器或其他音频输出系统可以连接到树莓派的3.5毫米插孔。或者，可以构建一个小型音频放大器[5,
    14]。


    音频输出通过Rpi-config菜单和相应的：


    ```

    Advanced Options → Audio

    ```


    激活。


    使用


    ```

    Forced 3.5 mm (''headphone'') Jack

    ```


    设置可以获得最佳结果。然而，事实证明，Pi OS下的音频系统相当复杂。此外，在某些操作系统版本或不同的板卡变体上，声音输出无法正常工作。在这些情况下，必须通过实验找到最佳的声音设置。基本上，必须将


    ```

    /etc/modprobe.d/alsa-base.conf

    ```


    中的参数**snd-usb-audio**从-2调整为0。


    在测试不同的设置时，可以使用以下指令检查声音输出：


    ```

    speaker-test -t wav -c 2

    ```


    如果成功，应该在左声道听到“front left”，在右声道听到“front right”。如果情况如此，则通过音频插孔的声音输出设置正确。这样，你就为建立基于树莓派的语音系统做好了充分准备。


    著名的eSpeak文本转语音系统已被广泛使用，尤其是在Linux系统上。因此，它应该为移植到RPi OS提供一个良好的基础。然而，该系统已经多年没有进一步开发。此外，它需要一个广泛的安装过程和一些特殊的调整，以确保相当顺畅的运行。


    另一方面，eSpeak-NG是一个新的软件系统，与当前的树莓派OS基本兼容。NG代表**下一代**。这个版本可以非常容易地安装。相应的安装说明可以直接从下载包中的LINKS.txt文件获取。还有一个Python接口，可以通过PIP3
    install加载到Pi上（参见*LINKS.txt*）。


    ESpeak-NG有多个语言模块。除了英语，例如还有德语和法语。使用下载包中的*eSpeak_NG_tst.py*，可以测试系统的语音质量：


    ```python

    from time import sleep

    from espeakng import ESpeakNG


    phrase1_en="Hello, how are you today?"

    phrase1_de="Guten morgen Doktor!"

    phrase2_de="Ist der Fluxkompensator bereit?"


    print(phrase1_en)

    esng=ESpeakNG(voice=''en'')

    esng.pitch = 5

    esng.speed = 120

    esng.say(phrase1_en, sync=True)


    pause(1)


    print(phrase1_de); print(phrase2_de);

    esng=ESpeakNG(voice=''de'')

    esng.pitch = 10

    ```'

    \    print(\"a!\")\nelse:\n    print(\"NOT a!\")\n```\n\n## 9.12 Conditions, branches\
    \ and loops\n\nNo programming language can do without control structures. Branch\
    \ and loop instructions are available in (Micro)Python for this purpose. In programming,\
    \ many identical or similar processes often have to be repeated. Loops offer a\
    \ much more elegant method for this purpose than simply repeating statements in\
    \ code [8,9].\n\nBranch instructions are used when decisions are required. These\
    \ allow a program to react correctly to different situations. In contrast to other\
    \ programming languages, Python offers a very extensive functionality for loops.\
    \ In the following, however, only the basic loop instructions are explained briefly.\n\
    \nUsing loops allows blocks of code to be executed multiple times. The execution\
    \ continues until a specified condition is met. There are two types of loops available\
    \ in MicroPython:\n\n- while loops\n- for loops\n\nIf you want to output numbers\
    \ from 1 to 10 to the console, the following **while** loop can be used:\n\n```python\n\
    number = 1\nwhile number <= 10:\n    print(number)\n    number = number + 1\n\
    ```\n\nThe code to be repeated is indicated again by the indentation. It is executed\

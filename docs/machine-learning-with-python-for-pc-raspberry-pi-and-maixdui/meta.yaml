  - '[PAGE 228]


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_228_0.png)


    Figure 16.8: YOLO principle.


    In this case, the image is divided into 4 × 8 grid cells (S = 32). Each cell is
    assigned a certain probability that it contains an object of interest. The cells
    with high probabilities are marked with frames.


    From here on it becomes clear where objects could be located in the image. However,
    it is not yet determined what the object really is. Therefore, each cell is subsequently
    assigned a class probability. The individual results are subsequently combined
    to object frames.


    Then, the probability is determined that the object frame contains a certain object,
    such as a car, a dog, or a person. If this probability exceeds a certain threshold,
    the object is assigned to the corresponding category.


    The projects presented in Chapter 13 already made partial use of this YOLO technology.
    However, the training of YOLO systems is once again significantly more complex
    than the procedure presented in the last section. In particular, not only large
    numbers of images or photos are required. Rather, the searched-for object must
    be marked and categorized manually on each of the pictures. This requires considerable
    effort, even with tools specifically developed for the purpose. Using the respective
    category and the determined coordinates, the YOLO system can finally be trained.


    Classifying and determining coordinates on hundreds of images can take days or
    even weeks. Here it becomes clear, that this effort is only justified in very
    special cases, for example, if certain animal species or a specific types of vehicles
    should be automatically detected.


    In general, therefore, you should first try to find a pre-trained model for a
    specific project. Many different versions can be found on the Internet. Only after
    if this approach is not successful, it might make sense to train your own YOLO
    systems.'

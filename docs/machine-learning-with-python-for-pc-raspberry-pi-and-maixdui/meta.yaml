    **T**echnology". Various data sets for scientific and technical applications are
    available from this institution. Many of them are particularly suitable for AI
    applications of all kinds.


    The *MNIST Handwritten Digit Classification Dataset* has gained particular importance
    (the link to this data set can be found in the download package). The data set
    contains 60,000 images of handwritten single digits. All digits from 0 to 9 are
    included with almost equal frequency. The readability of the individual samples
    ranges from virtually print quality to almost illegible. Figure 12.2 shows the
    first 12 samples of the data set. Each digit is recorded as a square, grey-scale
    image with 28 × 28 = 784 pixels (picture elements).



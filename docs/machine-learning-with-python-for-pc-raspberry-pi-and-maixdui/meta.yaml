    # # Chapter 6 • The Raspberry Pi


    The Raspberry Pi has become one of the most popular controller boards in recent
    years. Although it is often used in hardware-related projects, it can also be
    successfully used for machine-learning applications. In particular, the newer
    generation of the Raspberry Pi 4 already brings sufficient computing power for
    this. However, the available RAM size is of crucial importance. With a Pi 4 with
    8 GB RAM, you are well-equipped. With the faster CPU, the new GPU, 4 K support,
    USB 3.0, USB-C, Bluetooth 5.0, Gigabit Ethernet, even more challenging projects
    can be implemented.


    The Raspberry Pi 4 thus sets another milestone in terms of performance and features.
    The Pi 4 is 3 times faster than its predecessor and offers significantly faster
    multimedia performance, which is particularly advantageous for image processing.
    Overall, the Pi 4 thus approaches the performance of an x86-based PC in many respects.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_26_0.png)


    Figure 6.1: The Raspberry Pi 4.


    The following table summarizes the most important parameters of the Pi 4:


    | Processor: | 64-bit-Quad-Core - ARM Cortex-A72 (4× 1.5 GHz) |

    | Video | Dual Display Support with resolutions up to 4 K via two Micro HDMI Ports<br>Hardware
    Video Decoder with up to 4Kp60<br>2× Micro HDMI (up to 4Kp60 Support)<br>2 channel
    MIPI DSI-Port (Display)<br>2 channel MIPI CSI-Port (Camera) |

    | Audio: | 4-wire Stereo Audio |

    | RAM | up to 8 GB RAM - LPDDR4 |

    | WLAN: | Dual Band 2.4 / 5 GHz<br>2.4 GHz and 5 GHz IEEE 802.11b/g/n/ac wireless
    LAN |

    | Bluetooth: | 5.0, BLE |

    | LAN: | Gigabit-Ethernet |'

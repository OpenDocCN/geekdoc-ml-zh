- md: '## 10.6 Brainiacs: KERAS and TensorFlow


    KERAS is a deep-learning platform, which was developed specifically for Python
    applications. The lib is mainly based on TensorFlow. The platform was built to
    enable rapid experimentation. TensorFlow, on the other hand, is a framework for
    data stream-oriented programming. In recent years, TensorFlow has become one of
    the most important open source platforms in the field of machine learning.


    The name TensorFlow originates from mathematical elements, so-called **tensors**,
    which play a central role in multidimensional algebra. Since artificial neural
    networks are based on multidimensional data fields, tensors are of fundamental
    importance in this area. The Google Brain team originally developed TensorFlow
    for internal Google projects. In 2017, however, it was released under the Apache
    2.0 open-source license.


    KERAS means horn in Greek (κέρας). This is a reference to ancient Greek mythology.
    There are spirits, who had deceived people with false visions, that were sent
    into the mortal world through a horn gate.


    The KERAS library provides an interface to machine learning with a focus on deep
    learning. With KERAS, the cross-platform functions of TensorFlow can be used in
    an easy way.


    KERAS models created on powerful mainframes can be easily exported. They can be
    executed in a browser, on a smartphone or even small single-board computers such
    as the Raspberry Pi.


    The KERAS library plays a major role in this book. The details are discussed in
    detail when used in the various applications. For this reason, only a few basic
    uses of the library are to be outlined here. Figure 10.17 shows how the Lib is
    essentially used to create AI models.


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_109_0.png)


    Figure 10.17: Construction of a neural network application using KERAS.


    The detailed sequence of instructions for installing KERAS on the Raspberry Pi
    can be found in the download package released for this book. The file *MNIST_keras_01.ipynb*
    provides a first impression of KERAS. The following steps are required for a KERAS
    project:


    1.  First, the desired data set must be loaded. Under certain circumstances, other
    libs such as Panda can also be used beneficially here.

    2.  Then the data are typically divided into a training data set and a test data
    set.

    3.  Now a neural network can be created in the form of a specific model. For this
    purpose, the individual layers are defined one after the other, for example:


    ```

    myANN = Sequential()

    myANN.add(Convolution2D(32, (3, 3), activation=''relu'', input_shape=(28,28,1)))

    myANN.add(Convolution2D(32, 3, 3, activation=''relu''))

    myANN.add(MaxPooling2D(pool_size=(2,2)))

    myANN.add(Dropout(0.25))


    myANN.add(Flatten())

    myANN.add(Dense(128, activation=''relu''))

    myANN.add(Dropout(0.5))

    myANN.add(Dense(10, activation=''softmax''))

    ```


    The individual layers can be lined up like in a construction kit for kids. An
    overview of the networks constructed in this way can be displayed using the instruction


    ```

    myANN.summary()

    ```


    The result looks like this:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_110_0.png)


    4.  Now the newly constructed network has to be compiled:


    ```

    myANN.compile(loss=keras.losses.categorical_crossentropy, optimizer=keras.optimizers.Adadelta(),metrics=[''accuracy''])

    ```


    Here, various options can be selected:


    -   loss=keras.losses.categorical_crossentropy;

    -   optimizer=keras.optimizers.Adadelta();

    -   metrics=[''accuracy''].


    5.  Finally, the network can be trained using


    ```

    myANN.fit(x_train, y_train, batch_size=100, epochs=10, verbose=True, validation_data=(x_test,
    y_test))

    ```


    Machine Learning with Python


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_111_0.png)


    6.  After successful training, the quality of the network can be evaluated:


    ```

    from keras.models import load_model


    mnist_model = load_model(model_path)

    loss_and_metrics = mnist_model.evaluate(x_test, y_test, verbose=1)


    print("Test Loss", loss_and_metrics[0])

    print("Test Accuracy", loss_and_metrics[1])

    ```


    This provides information concerning the training speed:


    ```

    313/313 [==============================] - 32s 101ms/step

    ```


    and the quality of the training success achieved for the training data:


    ```

    loss: 0.0016 - accuracy: 0.9905

    ```


    as well as for the test data:


    ```

    Test Loss 0.0016376518178731203

    Test Accuracy 0.9904999732971191

    ```


    Moreover, it is possible to show the learning success in so-called learning curves:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_112_0.png)


    Further details will be presented once again in the according practical applications.


    7.  Finally, the network is available for applications and individual data, like
    images or sounds, can be classified.


    ## 10.7 Knowledge transfer: sharing the learning achievements


    The transfer of learning performance is a special feature of machine learning
    and artificial intelligence. In biological systems, learning achievements are
    usually not transferable. Human beings as well as animals have to perform all
    important learning activities individually again and again.


    After birth, the brain of a human being is empty in terms of useful knowledge.
    The memory is present but the content is almost completely missing. A newborn
    is not able to feed itself independently. Walking, running, talking, ... — all
    of these abilities, which are so natural for adults, have to be learned by every
    newborn human being. Later, reading, writing, riding a bicycle, etc., are added.
    Learning these skills requires years of practice and training. The fact that the
    parents have learned these activities is of little use to the child. It has to
    learn everything all over again in painstaking detail.


    In the technical field, however, things are completely different. Once a neural
    network has mastered a certain task, this learning success can be transferred
    to other systems in a fraction of a second. As soon as a vehicle is able to move
    autonomously through a large city, this performance can be transferred to other
    cars or trucks without any real limit. Unlike human kids, a new autonomously driving
    car does not need to acquire its "driver''s license" afresh.


    It is perfectly sufficient to copy the weights of the trained network and transfer
    them to a new system. This can be done millions of times in a very short time.
    The possibility to copy acquired knowledge in a fraction of a second is certainly
    also one of the greatest dangers of the new technology. Not only good, desirable
    and controllable learning successes can be reproduced in this way. Dangerous developments
    could also spread at breakneck pace — quite similar to a (computer) virus.


    This danger is always present when transferring painstakingly acquired learning
    achievements from one neural network to another.


    However, in KERAS, this procedure is possible without any problems. If necessary,
    a fully trained model can be saved using


    ```

    myANN.save(model_path)

    ```


    for later use on an external storage medium. There, it is available for immediate
    applications on other systems, possibly millions of them.


    On the other hand, this transfer offers the possibility of carrying out the training
    on a fast high-performance computer and then transferring the finished weights
    to a low-cost small system such as the Raspberry Pi or a MaixDuino. You are not
    even limited to a local computer. Various companies offer training services on
    high-performance systems. For private applications, computing time is often even
    made available free of charge.


    ## 10.8 Graphical representation of network structures


    With increasing complexity, the representation of models in pure text form quickly
    becomes confusing. A graphical representation can help here. With **graphviz**
    (for installation, information see links in the download package), a useful tool
    is available for the descriptive representation of network structures. It makes
    it much easier to keep track of the individual layers of a neural network.


    The notebook *Network_graphics_graphviz.ipynb* can be used as an example. In a
    graphviz representation, the structure and function of the respective layer is
    given in short form. In addition, the number of input and output parameters etc.,
    can be displayed alongside the individual layers. Further details and information
    on this display version can be found in Section 12.6.


    Figure 10.21 shows a typical output of graphviz:'

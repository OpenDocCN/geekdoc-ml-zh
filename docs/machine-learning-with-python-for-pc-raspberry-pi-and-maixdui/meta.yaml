    simultaneously.


    However, KERAS networks can handle processing (see "batch size" in the training
    phase) with selectable batch size. This means that several images can be used
    for training at the same time. It should be noted, that although large stacks
    lead to shorter training times, they also require larger amounts of available
    memory.



  md: '# 13.6 MaixDuino recognizes 20 objects


    For the MaixDuino, a model is available with a capability of distinguishing 20
    different objects. The *20class.kmodel* offers a ready-to-use classifier that
    recognizes everyday objects, vehicles or animals. The 20 classes are, in alphabetical
    order,


    | airplane |

    | bicycle |

    | bird |

    | boat |

    | bottle |

    | bus |

    | car |

    | cat |

    | chair |

    | cow |

    | dining table |

    | dog |

    | horse |

    | motorbike |

    | person |

    | potted plant |

    | sheep |

    | sofa |

    | train |

    | monitor or TV |


    The download link for the model can once again be found in the *LINKS.txt* file.
    The model is available as *kmodel* and as *20class.kfpkg* file and can therefore
    be loaded onto the MaixDuino via Flash-Tool or using the Thonny IDE.


    The associated program (20class.py) can then be used to identify these objects:


    ```

    import sensor,image,lcd,time

    import KPU as kpu


    lcd.init(freq=15000000)

    sensor.reset()

    sensor.set_pixformat(sensor.RGB565)

    sensor.set_framesize(sensor.QVGA)

    sensor.set_vflip(0)

    sensor.run(1)

    ```'

    \n当需要做出决策时，使用分支指令。这些指令允许程序对不同情况做出正确反应。与其他编程语言相比，Python为循环提供了非常广泛的功能。然而，下面只简要解释基本的循环指令。\n\
    \n使用循环允许多次执行代码块。执行持续到满足指定条件为止。MicroPython中有两种类型的循环可用：\n\n- while循环\n- for循环\n\n\

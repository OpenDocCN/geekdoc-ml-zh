    - the length and width of the petals.


    each in centimeters (Figure 11.3). This data set is ideal for training a classifier.
    The two Jupyter notebooks are used for classification and graphical data display:


    +   - iris_train_MLP_1V0.ipynb

    - iris_graphics_1V1.ipynb


    The notebooks can be run on a Windows PC as well as on a Raspberry Pi.'

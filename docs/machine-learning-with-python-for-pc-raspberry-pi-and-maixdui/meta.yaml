    # 11.5 Training and testing


    If only one data set is available, it makes sense to divide it into training and
    test data. The first data set is used to train the neural network. The test data
    is used to evaluate the performance of the neural network independently of the
    training data. This can reduce the problem of so-called overfitting. This phenomenon
    can occur when a machine-learning system is over-adapted to the test data. The
    training data are then evaluated very well, but new and previously unknown data
    lead to worse results than would be possible in principle.


    Using the instructions:


    ```

    data_train_array = data_train.to_numpy()

    X_train, X_test, y_train, y_test = train_test_split(data_train_array[:,:4],

    data_train_array[:,4], test_size=0.2)

    ```


    20% (test_size = 0.2) of the data are cut off. This frees up 150 * 0.2 = 30 test
    data sets that are not used for training. They will be used later for the independent
    evaluation of the network.


    With only two instructions, a neural network can now be trained:


    ```

    mlp = MLPClassifier(hidden_layer_sizes=(6,), max_iter=1000)

    mlp.fit(X_train, y_train)

    ```


    These two lines of code are sufficient to create a powerful neural network that
    can take on tasks that are quite relevant in practice. The power of Python libraries
    like SciKit is impressively demonstrated here. With just a few instructions, a
    system can be created that would require a whole stack of code pages in other
    languages.


    In a first step, the MLPClassifier is initialized using two parameters:


    +   - hidden_layer_sizes

    - max_iter


    The first parameter (hidden_layer_sizes) is used to define the size of the hidden
    layers. For example, a layer with six nodes is defined in this case (Figure 11.2).


    • 126'
  - '[PAGE 126]


    Using these parameters, the topology of the network can be varied within wide
    limits. For example:


    ```

    mlp = MLPClassifier(hidden_layer_sizes=(5, 7, 4), max_iter=1000)

    ```


    leads to a network with three hidden layers. It provides five neurons in the first,
    seven in the second and four neurons in the third inner layer. Python automatically
    determines the number of input (four leaf sizes) and output neurons (three Tris
    types) from the format specifications of the data set.


    The second parameter in the MLPClassifier ("max_iter") determines the maximum
    number of iterations that the neural network should execute. When the internally
    specified accuracy or this maximum number of iterations is reached, the training
    will be terminated.


    In addition, further optional parameters are available in the MLP classifier,
    among others [2]:


    +   - activation{''identity'', ''logistic'', ''tanh'', ''relu''}, default=''relu''

    - Definition of the activation function for the hidden layers.


    Here, for example, the variants


    +   - **logistic**: logistic sigmoid function

    - **relu**, linear unit function (max(0, x))


    and others are available.


    +   - **solver**{''lbfgs'', ''sgd'', ''adam''}, default=''adam''


    The solver determines the function for optimizing the weights.


    +   - Using **Adam**, a gradient-based optimizer is used. This is preferred for
    large data sets. For smaller data sets, **lbfgs** may be able to converge faster
    and thus achieve better performance.

    - **verbose**: bool, default=False


    For continuous monitoring of the iteration progress during the training, the variable
    **verbose** must be set to True.


    The activation function **relu** and the optimizer **adam** are set as default
    values. If necessary, the functions can be adapted to the respective tasks with
    the help of the activation or solver parameters.



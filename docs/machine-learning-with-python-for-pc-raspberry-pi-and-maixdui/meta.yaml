    # 14.6 From ELIZA to ChatterBots


    Starting in the early days of AI research, attempts were made to transfer the
    mental abilities of humans to machines in order to solve certain problems. The
    goal was to make the comprehensive in-depth knowledge of highly qualified "experts"
    as universally accessible as possible. For example, the diagnosis of infectious
    diseases was to be automated in order to relieve highly trained medical doctors
    from routine tasks.


    However, it quickly became apparent that the knowledge representation of even
    a narrowly defined field quickly became extremely complex. Rule-based diagnoses
    quickly required decision trees that were no longer manageable. For example, the
    simple flu symptoms like cough, hoarseness and aching limbs can indicate a multitude
    of different diseases. Experienced doctors can quickly rule out unlikely diagnoses,
    whereas an expert system has to ask dozens of questions to do so.


    The maintenance of these systems also became a problem: the systems were not adaptive!
    Innovative approaches and better computer systems therefore led to the development
    of machine learning in this area, among others.


    • 186'

    \ instruction\n\n```\npip install \"picamera [array]\"\n```\n\nWhen all libraries\
    \ have been successfully installed on the Pi, it is recommended to create a backup\
    \ of the SD card. In this case, a working system image is still available if unexpected\
    \ problems with the subsequent projects occur.\n\nAn important advantage of KERAS\

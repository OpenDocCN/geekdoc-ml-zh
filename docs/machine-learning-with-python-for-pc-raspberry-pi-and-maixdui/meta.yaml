    The training program (**ElectronicsClassifier_1V0.ipynb**) is based on this structure
    and is designed in such a way that it can easily be adapted to other data sets.
    The division of the data into a training and a test set is done via the parameter


    val_ratio (default: 0.2)


    This ratio is usually appropriate if the number of images is sufficient. However,
    there is no fixed rule. With other ratios (e.g., 90:10), greater fluctuations
    often occur during validation.


    The network itself is based on the MobileNet developed by Google. Since only 2
    megabytes of RAM of the KPU are available in the MaixDuino, the number of parameters
    of the network was reduced accordingly. If there are still problems with the memory
    size, for example, with other converter versions, a further reduction by the user
    is required.


    The complete model is trained in two steps. In order to train the classifier separately,
    some convolution layers are "frozen" after the model definition, i.e., they are
    not included in this training run. Subsequently, the training is continued for
    all parameters with a lower learning rate. After the training is completed, the
    model is saved in both **h5** and **Tflite** format.


    The learning curves show a continuous increase. However, there are also significant
    fluctuations. This is due to the relatively small validation data set. With increasing

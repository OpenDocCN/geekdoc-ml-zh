    An important advantage of deep learning compared to general machine learning is
    the ability to process unstructured data. Real information such as images, sounds
    and videos etc. can be used here more or less directly as input data. Other machine
    learning algorithms, such as decision tree methods do not have this capability.
    If, for example, images are used as input data, complex and special program adjustments
    must always be carried out by real people.


    Examples of AI processes that work without neural networks are the so-called evolutionary
    algorithms. These programs are also based on a natural learning process. However,
    it is not the brain that is modeled, but the biological evolution. Here, the algorithms
    follow one another in different generations. According to Darwin''s principle
    of "survival of the fittest", every possible solution is evaluated and the best
    version is selected in each case. The "mutated" variants thus lead to an optimized
    algorithm that is better adapted to the given problem than the previous one.


    The last column of the table indicates a possibly serious problem with AI algorithms.
    In the case of complex neural networks, it is usually no longer possible to understand
    exactly how decisions are made. In the case of massive wrong decisions by AI systems,
    this can lead to considerable legal or social problems. Ultimately, the acceptance
    of such decisions will depend to a large extent on their perceivability. AI applications
    that do not have a minimum level of transparency will therefore hardly be able
    to establish themselves in (vital) areas.'

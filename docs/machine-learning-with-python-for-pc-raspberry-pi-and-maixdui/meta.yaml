  md: '# Chapter 10 • Useful Assistants: Libraries!


    Python relies on its libraries. This is certainly true for general programming
    tasks, but even more so for ML applications. Some simple "libs" like **time**
    or **math** were already used in the previous chapter. If simple libraries could
    be created by experienced users on their own in some cases, this would be inefficient
    at best for complex ML libs.


    Often, ML libs include C routines, as these provide very fast and efficient code.
    The Python "wrappers" in this case ensure that the number-crunching work can conveniently
    be used by Python programmers.


    Figure 10.1 shows the most important libraries for ML applications. These are
    closely related and partly build on each other. Python itself forms the foundation
    of the construction.


    Since the libs were often developed by different teams, some libraries contain
    routines that perform almost the same tasks as other functions in different libraries.
    It is up to the user''s experience to select the best routines and functions in
    each case.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_90_0.png)


    Figure 10.1: The most important libraries.


    A certain problem with the use of the library system arises from the fact that
    not every version of a Lib is compatible with all versions of.. another library.
    In a research area that is developing as quickly as machine learning, it can hardly
    be avoided that newly-developed libraries are not completely compatible with older
    versions.


    So-called virtual environments offer a certain way to avoid complications. They
    allow to create a kind of isolated laboratory in which the required version of
    a library can be installed without interference with external libs. This concept
    is explained in more detail in Section 10.10. The following sections introduce
    the most important functions of the individual libs. The examples can be evaluated
    on a PC under Windows or on a Raspberry Pi. Either Thonny or Jupyter can be used
    as the programming environment.'

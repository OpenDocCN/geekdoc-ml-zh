    ## Chapter 9 • Python in a Nutshell


    For several years now, Python is established as one of the most widely used programming
    languages. Due to its simple structure and ease of learning, Python has established
    itself among professionals as well as makers [8,9].


    A complete introduction to Python or MicroPython is beyond the scope of this book.
    Moreover, extensive literature is readily available on this topic (see Bibliography).
    Nevertheless, the most important basics will be recapitulated here. The focus
    is, of course, on the commands and instructions that are of particular importance
    in the machine learning area. In particular, the specifics for the MaixDuino board
    will be discussed.


    The development of MicroPython made the programming of microcontroller systems
    simple and straightforward. This makes the programming language well suited for
    mainframe systems and also for the world of embedded systems. Python programs
    can be found in the hobby sector as well as in education or scientific applications.
    Also, commercial developers are increasingly working with Python. In the IT industry,
    numerous market leaders such as Google or Amazon have used Python for their software
    developments for a long time [1].


    In addition, freely available modules and libraries such as MatPlotLib, NumPy,
    SciKit or SciPy provide extensive possibilities. Thus, the applications range
    from simple LED control and scientific data analysis to machine learning and artificial
    intelligence.


    MicroPython was developed as a lean version of Python 3. Because the language
    is interpreted, it is generally slower than compiled systems. MicroPython was
    designed to work as efficiently as possible on small, embedded systems. This makes
    it best suited to run on microcontrollers, which have much slower clock speeds
    and significantly less memory than typical personal computers. This variant is
    therefore well suited for small systems such as the MaixDuino.


    The disadvantage that classic Python programming for low-level controllers is
    difficult to implement is eliminated with the "micro version" of Python. Following
    the standard, this version is also strongly based on Python 3 in terms of syntax.
    Virtual machines and extensive libraries ensure that controller programming becomes
    as simple as software development for classic computers.


    A comparison of the two most popular programming languages in the microcontroller
    environment shows that Python is increasingly preferred over C / C ++. In the
    rankings of the most popular programming languages, Python can now usually be
    found at the top position and its competitor C /C++ is increasingly relegated
    to the back ranks. The reason for this development is mainly due to the following
    advantages of Python:


    - the simple language structure makes Python very beginner-friendly;

    - various internet forums support the programmer with tutorials and sample codes;

    - extensive libraries are available.


    Beginners can usually find solutions to their problems very quickly in various
    forums. With other programming languages, this form of mutual support is less
    distinct.


    In C, programming is carried out using control registers, pointers and other structures
    that are often difficult to understand. The firmware for the target controller
    must be programmed, compiled and finally transferred to the controller chip using
    a programming device.


    MicroPython integrates all of these steps. With a simple mouse click, users can
    control low-level hardware such as LEDs, displays or motors. The acquisition of
    analog voltage values or working with SD cards becomes very simple with the available
    libraries. Integrated garbage collection and a dynamic allocation process enable
    efficient memory management in Python. There is therefore hardly any need to use
    pointers or similar constructs that are usually difficult for beginners to penetrate.


    The often cryptic C symbols such as x ++, <<, >> etc. as well as the complex variable
    declaration represent a hurdle for beginners that should not be underestimated.
    Python is known for its simplicity and the excellent legibility of the code.


    Since MicroPython was developed as a "light version" for microcontroller applications,
    not all libraries and functions available in standard Python are supported. Nevertheless,
    you can easily switch to the micro version if you are already familiar with Python.
    There are just a few syntactic structures or instructions that are not available
    or applicable in MicroPython.


    Python is interpreted. This means that the original program code is processed
    directly by the target processor. Compilation is not required. Python therefore
    offers the possibility of executing code on a wide variety of systems. All you
    need is an up-to-date interpreter. One of the greatest advantages of Python code
    is its broad compatibility and portability. Python programs can be executed on
    classic computers running Windows, MacOS or Linux as well as on small single-board
    systems such as the Raspberry Pi, MaixDuino or similar micro systems.


    Above all, the use on the well-known "RPi" has also contributed to the increasing
    popularity of Python. A universal syntax ensures that programs can be developed
    easily on small as well as large systems. This makes Python extremely scalable.
    The possible encapsulation of data and program code in clear, reusable modules,
    i.e., "objects", makes Python an object-oriented programming language.


    Nowadays, C ++ is generally used primarily in low-level programming. Classical
    Python variants have so far not been well suited for this. This gap is now closed
    with MicroPython. In addition to client applications, C ++ also includes powerful
    server applications as well as device drivers and embedded driver components.
    The area of application extends from system software to application programming.
    Since Python is still a relatively young programming language compared to C, it

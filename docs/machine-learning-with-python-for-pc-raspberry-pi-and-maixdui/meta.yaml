    # Chapter 5 • The PC as Universal AI Machine


    A modern PC or laptop can do a good job in the field of machine learning. However,
    some requirements should be met for this. The following table provides an overview
    of the minimum requirements:


    | CPU | Quadcore with at least 3 GHz |

    | RAM | minimum 16 GB |

    | HDD | 1 TB |


    It is certainly possible to implement some entry-level projects with less powerful
    equipment. However, in this case the training times for neural networks, for example,
    become very tedious even for simpler applications.


    # 5.1 The computer as a programming center


    The PC is not only used as a basis for getting started with ML projects. Rather,
    it is also required for other purposes. For example, the MaixDuino cannot be programmed
    directly. The PC is required here as a host computer which programs the Maix board
    via the USB interface.


    An active USB hub can do a good job here. It has the particular advantage in offering
    a certain protection for the USB port of the PC or laptop used. It is important
    that it is actually an **active** hub, meaning the device must have its own 5
    V power supply via a separate power supply unit. This is the only way to ensure
    that the computer port is protected in the event of a short-circuit behind the
    hub.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_23_0.png)


    Of course, even an active hub does not offer absolute protection. However, it
    is very unlikely that a short-circuit will break through an active hub and reach
    the computer''s USB port.'
  - '[PAGE 24]


    If you want to use the Maix board without a PC, i.e., in a stand-alone mode, an
    external 5 V power supply unit is required too. Ideally, the hub''s power supply
    unit can be used for this. After programming, the board can be used independently
    of an USB port. It is important for the power supply to provide sufficient current.
    About 2000 milliamps (2 A) nominal current should be the minimum. If the power
    supply still has a USB-micro connector, an adapter to USB-C is required (see Figure
    5.2). Further information on stand-alone operation can be found in section 7.4.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_24_0.png)


    Figure 5.2: A USB-C adapter.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_24_1.png)


    Figure 5.3: A USB power supply.


    At this point, it should be mentioned that the MaixDuino has an integrated voltage
    regulator, just as the Arduino,. This means that the boards can also be supplied
    via any power supply with an output voltage of 6 V to 12 V. The unit must be able
    to supply a current of at least 2 A. For the connection to the respective board,
    the power supply unit must have a standard coaxial power connector.'

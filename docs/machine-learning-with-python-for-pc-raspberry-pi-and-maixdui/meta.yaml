    \nLED=14   # 12: green, 13: red, 14: blue\nfm.register(LED, fm.fpioa.GPIO0)\n\
    led=GPIO(GPIO.GPIO0, GPIO.OUT)\nled.value(1)\ntime.sleep(1)\nled.value(0)\ntime.sleep(1)\n\
    fm.unregister(LED)\n```\n\nAfter starting the program, first the green, then the\

    # Chapter 13 • How Machines Learn to See: Object Recognition


    The development of autonomous cars, trains and airplanes is considered to be one
    of the most important projects of the next few years, both technically and economically.
    Various driver-less rail vehicles are already in use at airports around the world.
    Autonomous cars have been tested in everyday traffic for several years.


    For the smooth and safe operation of self-driving cars or trucks, the reliable
    detection of people, lanes, other vehicles or traffic signs has the highest priority.
    But not only for this reason the recognition and identification of objects became
    one of the most important research areas in artificial intelligence and machine
    learning.


    Object recognition and localization is also of fundamental importance in robotics
    and industrial automation [12]. This chapter first explains the step-by-step setup
    of TensorFlow Lite on the Raspberry Pi. This program system allows, among other
    things, the implementation of object recognition systems, both on static images
    and in a video stream. Subsequently, object recognition models are executed and
    tested using the Raspberry Pi with the PiCam connected.


    The TensorFlow system can also be trained to recognize clothes. The methods already
    known from the previous chapters can be reused for this task. This bridges the
    gap between simple pattern recognition (geometric figures, digits, etc.) and the
    classification of real objects.


    Finally, the compact MaixDuino system is used to classify 20 everyday objects
    such as bicycles, cars, chairs or sofas. Together with the voice output discussed
    in the following chapter, an object recognition system even allows the construction
    of a "speaking eye". This device is able to acoustically describe optically detected
    objects. For example, if a car was detected in the camera''s field of view, this
    information is acoustically announced via "I see a car." Such systems can, for
    example, make life much easier for visually impaired people.


    # 13.1 TensorFlow for Raspberry Pi


    TensorFlow was used in various applications in earlier chapters. In particular,
    KERAS uses this system. A light version of TensorFlow has also been available
    for some time. This is particularly suitable for "embedded systems" such as the
    Raspberry Pi. The computing power of a Raspberry Pi 4 with 8 GB RAM is sufficient
    to carry out ML-based object recognition almost in real time. TFlite (**TensorFlow
    lite**) basically consists of a series of tools that enable the efficient application
    of machine learning methods on small and mobile devices [6].


    TFLite models run much faster on the Raspberry Pi 4 than classic TensorFlow versions.
    The installation of TensorFlow Lite on the Raspberry Pi is also much easier than
    the corresponding procedure for general TensorFlow packages in Linux. The following
    steps are recommended or required for the successful use of TensorFlow Lite:'
- md: '## 13.2 Virtual environments in action


    The basic concept of virtual environments was already presented in Section 10.10.
    To create a specific virtual environment called "TFlite-env", the appropriate
    package is required:


    ```

    sudo pip3 install virtualenv

    ```


    Subsequently a folder called "Tflite" is created. After switching into this folder,
    the actual environment called "TFlite-env", is created using


    ```

    python3 -m venv TFlite-env

    ```


    This will also automatically create a new folder named tflite-env within the TFLite
    directory. All libraries relevant for this environment are to be installed in
    the new TFLite-env folder. Eventually the virtual environment will be activated
    using


    ```

    source TFLite-env/bin/activate

    ```


    This instruction has to be executed in the directory


    ```

    /home/pi/tflite

    ```


    whenever the environment is to be reactivated. The prefix "TFLite-env" in front
    of the path name in the command prompt shows that the TFLite environment is actually
    active:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_155_0.png)


    *Figure 13.1: The occurrence of (Tflite-env) indicates the virtual environment.*


    The TensorFlow and OpenCV libraries are now installed in this new virtual environment.
    OpenCV is only required for taking pictures with the PiCam and displaying them
    in separate windows. All required instructions can be copied directly from the
    file


    ```

    install_TFlite_openCV.txt

    ```


    in the download package and subsequently be transferred to the terminal window
    of the Raspberry Pi. The installation includes a data volume of approx. 0.5 GB,
    causing long download times. Finally, the complete package installation can be
    checked using the


    ```

    pip freeze

    ```


    command.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_155_1.png)


    *Figure 13.2: The installation of the libraries is completed.*


    As Figure 13.2 shows, only the newly installed libraries "tflite" and "openCV"
    are actually visible in the virtual environment. Numpy only appears here because
    it got installed by default via the tflite installation procedure.


    ## 13.3 Using a Universal TFLite Model


    The preliminary work is now completed and the actual recognition model can be
    built. In principle, it would already be possible at this point to train your
    own model. However, this involves considerable effort, as the examples in Chapter
    16 show.


    For this reason, a pre-trained TFLite example model provided by Google is used
    here. Two files are required for this model:


    1.  the model itself as *.tflite file.

    2.  the table of object names ("label map") as a labelmap.txt file.


    The network was trained with the MSCOCO dataset (MicroSoft Common Objects in Context)
    and transferred to TensorFlow Lite. The model is able to recognize 80 different
    objects such as


    - people and animals;

    - plants and fruits;

    - office and computer accessories;

    - vehicles;

    - furniture, such as tables and chairs;

    - dishes.


    The object names are completely contained in the labelmap.txt file, so that this
    file can serve as a list of all detectable objects. If the objects are to be named,
    for example, with their French- or German-language equivalents, just use the French
    or German expressions in the label map.


    The link to download the model including the label map can be found in LINKS.txt
    (mobilenet model). The instruction:


    ```

    unzip coco_ssd_mobilenet_v1_1.0_quant_2018_06_29.zip -d Sample_TFlite_model

    ```


    automatically creates the destination folder named "Sample_TFLite_model" and saves
    the unpacked model there. After connection the PiCam (see section 12.4), the setup
    is ready for use.


    But first, the network should be tested in detail. The corresponding Python code
    can be found in the download package as


    Tflite_detection_PiCam_1V1.py.


    The program must be copied into the directory


    ```

    /home/pi/Tflite

    ```


    After switching to this directory (cd Tflite) the virtual environment is activated
    via


    ```

    source TFlite-env/bin/activate

    ```


    The object recognition itself is started via


    ```

    python3 TFlite_detection_PiCam_1V1.py

    ```


    The program requires considerable computing power and extensive memory space.
    Therefore, the use of a Raspberry Pi 4 with 8 GB RAM is recommended. Smaller or
    older Pi versions will probably have problems processing the code.


    In addition, all unnecessary applications on the Raspberry Pi should be closed
    to free up as much memory and computing power as possible. Starting the program
    takes a few seconds, even on the Pi 4, as extensive initializations are required.


    Finally, a window with the live image of the connected camera is displayed. As
    soon as an object has been detected, it is marked by a light green bounding box.
    In addition, the name of the object appears, including the probability (in percent)
    with which it was classified (Figure 13.3).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_157_0.png)


    The image shows that the recognition of technical objects works quite well. Different
    types of fruit are also recognized without any problems:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_158_0.png)


    Figure 13.4: The algorithm also recognizes fruit.


    The fact that the tangerines are labeled as oranges is mainly caused by the fact
    that this type of fruit was not trained separately and is therefore not included
    in the model and the label map.


    Depending on the amount of information contained in the images, up to 20 images
    per second can be analyzed. This means that real-time acquisition is already within
    reach. To further increase the frame rate, AI accelerator sticks such as the Movidius
    or Coral stick could be used on the USB port of the Raspberry Pi. For simple video
    surveillance applications, however, the processing speed achievable with the RPi
    alone is often sufficient.


    More extensive tests show that the classification is not only based on relative
    shapes, sizes or colors. For example, yellow apples are recognized as such and
    not as bananas. Model cars are also correctly identified as vehicles, just like
    their larger counterparts.


    The fact that the system does not always yield impeccable results is demonstrated
    by two obviously incorrect classifications shown in Figure 13.5. These erroneous
    decisions occur when objects have quite similar features and one of the actual
    objects is not available as a separate category. In this case, the network often
    puts the objects into the category that seems most likely.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_158_1.png)


    Figure 13.5: Nothing and no one is perfect!


    ## 13.4 Ideal for sloths: clothes-sorting


    Some people have the tendency not to dispose of items, specifically clothing,
    even if the piece in question is beyond repair. This can lead to the so-called
    "sloth syndrome", i.e., compulsive hoarding, when the excessive accumulation of
    more or less worthless objects in one''s home becomes a serious problem.


    The project presented in this section will not be able to eliminate these difficulties
    completely. However, a first step in avoiding absolute chaos could be sorting
    useless clothing. The following system can certainly do a good job here. For this
    purpose, a neural network model is trained that allows trousers, shirts or even
    bags to be classified. In a way, the model closes the gap from the simple number
    recognition of Chapter 12 to the identification of objects in image data.


    The so-called Fashion MNIST data set poses a much more challenging problem than
    the classical MNIST data set of handwritten digits. In particular, the comparison
    of both data sets and the associated algorithms offers deeper insights into how
    ML systems work.


    The classification again requires KERAS, NumPy and MatPlotLib (Section 12.5).
    The implementation can be carried out in a Jupyter notebook on a PC or on a Raspberry
    Pi.


    First, the proper installation of KERAS in should be checked:


    ```

    import tensorflow as tf

    import numpy as np

    import matplotlib.pyplot as plt

    print(tf.__version__)

    ```


    The fashion classifier runs from version 2.2. Once the installation has been verified,
    the data record can be loaded:


    ```

    fashion_mnist = tf.keras.datasets.fashion_mnist

    (train_images, train_labels), (test_images, test_labels) = fashion_mnist.load_data()

    ```


    The data should be loaded in less than a minute. Four arrays are available:


    - train_images and train_labels as a training set

    - test_images and test_labels as test data


    Similar to the handwriting data set, the images consist of 28 × 28 pixel NumPy
    arrays. The individual pixels contain gray-scale values in the range from 0 to
    255. Whole numbers between 0 and 9 are assigned to the labels. The numbers correspond
    to the clothing class of the respective picture:



    \ from 0 to 1:\n\n```\ntrain_images = train_images / 255.0\ntest_images = test_images\
    \ / 255.0\n```\n\nTo check the data format, you can look at some images from the\
    \ training set. Since the class names are already stored in the class-names array,\
    \ these can also be displayed for each image:\n\n```\nplt.figure(figsize=(12,12))\n\
    for i in range(12):\n    plt.subplot(4,4,i+1)\n    plt.xticks([])\n    plt.yticks([])\n\
    \    plt.grid(False)\n    plt.imshow(train_images[i], cmap=plt.cm.binary)\n  \
    \  plt.xlabel(class_names[train_labels[i]])\nplt.show()\n```\n\nFig 13.7 shows\
    \ the result:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_162_0.png)\n\nFigure\
    \ 13.7: Various clothing pieces.\n\n## 13.5 Construction and training of the model\n\
    \nThe following model is used for sorting clothes:\n\n```\nmodel = tf.keras.Sequential([\n\
    \    tf.keras.layers.Flatten(input_shape=(28, 28)),\n    tf.keras.layers.Dense(128,\
    \ activation='relu'),\n    tf.keras.layers.Dense(10)\n])\n```\n\nThe first level\
    \ converts the format of the images from a two-dimensional array (28 × 28 pixels)\
    \ to a one-dimensional array with 28 × 28 = 784 values. The rows of pixels in\
    \ the images are simply lined up to form a long vector. This first layer does\
    \ not have any learning parameters to be trained, it is only used for reformatting.\
    \ Two dense layers follow. The first one has 128 nodes or neurons. The second\
    \ and final layer returns an array with a length of 10. Each output node contains\
    \ a score that indicates which of the 10 classes the current image was sorted\
    \ into. Before the training, the various parameters must be set:\n\n- the loss\
    \ function, which measures how accurately the model is already working during\
    \ training;\n- the optimizer;\n- the metrics to monitor the training and testing\
    \ steps.\n\nThe following values are used in the example:\n\n```\nmodel.compile(optimizer='adam',\n\
    \              loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),\n\
    \              metrics=['accuracy'])\n```\n\nMachine Learning with Python\n\n\
    With the usual steps:\n\n1. feed the training data (train_images and train_labels)\
    \ into the model;\n2. execute the actual training process;\n3. make predictions\
    \ based on test series (test_images).\n\nthe training of the model is carried\
    \ out via the \"fit\" function with a certain number of epochs:\n\n```\nmodel.fit(train_images,\
    \ train_labels, epochs=10)\n```\n\nThe model achieves an accuracy of approx. 0.9,\
    \ or 90%, after about 10 epochs. The performance of the model is then checked\
    \ with the test data set:\n\n```\ntest_loss, test_acc = model.evaluate(test_images,\
    \ test_labels, verbose=2)\nprint('\\nTest accuracy:', test_acc)\n```\n\nThe test\
    \ accuracy is usually less than 90%. This difference between training and test\
    \ accuracy again indicates overfitting.\n\nWhen the model is trained, predictions\
    \ can be made on selected images. The outputs of the model, in the form of a one-hot\
    \ vector, can be converted into probabilities via a softmax function:\n\n```\n\
    probability_model = tf.keras.Sequential([model, tf.keras.layers.Softmax()])\n\
    predictions = probability_model.predict(test_images)\n```\n\nFor picture no. 10\
    \ (sample=10), for example, the result is:\n\n```\npredictions[10]\n```\n\n```\n\
    array([7.4302930e-05, 2.0597602e-06, 4.5739021e-02, 5.9046588e-06,\n       9.1672379e-01,\
    \ 4.4173207e-09, 3.7454229e-02, 2.3479103e-09,\n       1.3121125e-07, 7.5306295e-09],\
    \ dtype=float32)\n```\n\nThe ten values of the array represent the model's \"\
    confidence\" that the image corresponds to one of the 10 different garments. The\
    \ highest confidence value (9.17e-1 = 0.917 = 91.7%) results from:\n\n```\nnp.argmax(predictions[sample])\n\
    ```\n\nto be \"4\", i.e., a \"coat or jacket\".\n\nSo, the model is quite sure\
    \ that this picture is a coat or jacket (class_names[4]). According to the test\
    \ label, this classification is correct:\n\n```\ntest_labels[10]\n```\n\nreturns\
    \ the value 4 (coat/jacket).\n\nThe visual inspection of picture no. 10 also confirms\
    \ that it is a coat or jacket:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_164_0.png)\n\
    \nThe inspection of further images shows that the prediction performance of the\
    \ network is already quite good:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_164_1.png)\n\
    \nThe net mostly delivers correct predictions with probabilities of over 90%.\
    \ Only about 15% of the shirts could also be T-shirts. An error that could certainly\
    \ also befall a human being at this image resolution.\n\nThe example shows that\
    \ KERAS is not only able to recognize abstract figures such as numbers relatively\
    \ easily. Even everyday objects such as clothes can be successfully categorized\
    \ with the help of a KERAS-based neural network.\n\nCamera images could also be\
    \ directly evaluated here again. In cooperation with a robotic arm, the project\
    \ might even be extended to the extent that the arm automatically sorts laundry\
    \ after the individual items of clothing have been recognized by the ML algorithm.\n\
    \n## 13.6 MaixDuino recognizes 20 objects\n\nFor the MaixDuino, a model is available\
    \ with a capability of distinguishing 20 different objects. The *20class.kmodel*\
    \ offers a ready-to-use classifier that recognizes everyday objects, vehicles\
    \ or animals. The 20 classes are, in alphabetical order,\n\n| airplane |\n| bicycle\
    \ |\n| bird |\n| boat |\n| bottle |\n| bus |\n| car |\n| cat |\n| chair |\n| cow\
    \ |\n| dining table |\n| dog |\n| horse |\n| motorbike |\n| person |\n| potted\
    \ plant |\n| sheep |\n| sofa |\n| train |\n| monitor or TV |\n\nThe download link\
    \ for the model can once again be found in the *LINKS.txt* file. The model is\
    \ available as *kmodel* and as *20class.kfpkg* file and can therefore be loaded\
    \ onto the MaixDuino via Flash-Tool or using the Thonny IDE.\n\nThe associated\
    \ program (20class.py) can then be used to identify these objects:\n\n```\nimport\
    \ sensor,image,lcd,time\nimport KPU as kpu\n\nlcd.init(freq=15000000)\nsensor.reset()\n\
    sensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\nsensor.set_vflip(0)\n\
    sensor.run(1)\n```\n\n# Chapter 13 • How Machines Learn to See: Object Recognition\n\
    \n```\nclock = time.clock()\nclasses = ['aeroplane', 'bicycle', 'bird', 'boat',\
    \ 'bottle', 'bus', 'car', 'cat',\n'chair', 'cow', 'diningtable', 'dog', 'horse',\
    \ 'motorbike', 'person', 'pottedplant',\n'sheep', 'sofa', 'train', 'tvmonitor']\n\
    # task = kpu.load(0x500000)\ntask=kpu.load(\"/sd/20class.kmodel\")\nanchor = (1.889,\
    \ 2.5245, 2.9465, 3.94056, 3.99987, 5.3658, 5.155437, 6.92275, 6.718375,\n9.01025)\n\
    a = kpu.init_yolo2(task, 0.5, 0.3, 5, anchor)\nwhile(True):\n    clock.tick()\n\
    \    img = sensor.snapshot()\n    code = kpu.run_yolo2(task, img)\n    # print(clock.fps())\n\
    \    if code:\n        for i in code:\n            a=img.draw_rectangle(i.rect())\n\
    \            a = lcd.display(img)\n            print(classes[i.classid()])\n \
    \           for i in code:\n                lcd.draw_string(i.x(), i.y(), classes[i.classid()],\
    \ lcd.RED, lcd.WHITE)\n                lcd.draw_string(i.x(), i.y()+12, '%f1.3'%i.value(),\
    \ lcd.RED, lcd.WHITE)\n    else:\n        a = lcd.display(img)\na = kpu.deinit(task)\n\
    ```\n\nThe libraries called sensor, image, and lcd ensure smooth operation of\
    \ the camera (\"Image Sensor\") on the LCD screen. With \"KPU\" the **Knowledge\
    \ Processing Unit** is integrated (Chapter 7.1). The camera is initialized with\
    \ the default values. Using\n\n```\nsensor.set_vflip(0)\n```\n\nthe image orientation\
    \ can be set. The standard orientation is selected with the parameter \"0\".\n\
    \nThen, the object classes are defined:\n\n```\nclasses = ['aeroplane', 'bicycle',\
    \ 'bird', 'boat', ...]\n```\n\nWhen loading the model, you can choose between\
    \ direct loading from the memory at address 50000_hex, using\n\n```\ntask = kpu.load(0x500000)\n\
    ```"

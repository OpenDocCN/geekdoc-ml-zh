  md: '# Chapter 11 • Practical Machine Learning Applications


    In the first chapters, the basics of machine learning were briefly discussed as
    a subarea of AI. The following sections delve deeper into practical matters and
    implement the methods of deep learning using neural networks. Either a Windows
    PC or a Raspberry Pi can be used for these tasks.


    In machine learning, the equivalent of the Hello World program is the classification
    of Iris flower types. The associated data set consists of measured values of sepal
    and petal lengths and widths for different Iris species.


    # 11.1 Transfer functions and multilayer networks


    One of the ways to perform Iris classification is to use multi-layer perceptrons
    (MLPs). This variant of an artificial neural network can map any numerical input
    data to given output data. The MLP consists of several neuronal layers. Often,
    but not always, each layer is fully connected to the following one. The nodes
    of the layers work with non-linear activation functions. This concept is based
    on the behavior of biological neurons in highly-developed brains, which also communicate
    via active or inactive action potentials. Interestingly, an intermediate way between
    pure digital switching and analog signal processing is used here. In machine learning,
    artificial neural networks replace this behavior by applying a threshold function.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_118_0.png)


    Figure 11.1: Important transfer functions.


    Different variants are used for the threshold or transfer functions:


    +   - Step functions;

    - ReLu as "rectifier function" (**Rectified Linear Unit**);

    - Sigmoid functions such as the logistic or tangent hyperbolic function.


    The computational effort is higher in the latter case, but sigmoid functions usually
    behave less critically in the training phase of a network compared to the step
    or ReLu functions.


    With these threshold functions, a neural network can also model non-linear relationships.
    Only then is it able to effectively solve complex tasks such as image or speech
    recognition.'

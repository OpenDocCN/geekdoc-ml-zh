  - '[PAGE 54]


    +   - the Maix has been programmed with the Arduino IDE in the meantime. In this
    case, the Python interpreter will be deleted.

    - the interpreter is out of date and requires an update.

    - the memory content of the board has been damaged due to voltage dips or improper
    shutdown.


    In addition, you can never completely exclude that the hardware is delivered without
    a preinstalled interpreter.


    For uploading the interpreter, a so-called kflash GUI is required. The tool can
    be downloaded from the internet (see LINKS.txt). After loading and unpacking the
    file:


    ```

    kflash_gui.exe

    ```


    can be started (Figure 8.14).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_54_0.png)


    The firmware itself can be found on the Sipeed website or on GitHub (see LINKS.txt).
    The file names look like


    ```

    maixpy_v0.6.2_53_g4fe0efb56.bin

    ```


    or similar. The file is now loaded into the kflash GUI via "Open File". After
    selecting the correct parameters:


    +   - Board: Sipeed MaixDuino

    - Burn To: Flash

    - Serial Port: COM-Ports of the Maix (e.g., 13)'
  - '[PAGE 55]


    Machine Learning with Python


    Baud rate: 115200

    Speed mode: Slow mode (recommended)


    The firmware can be sent to the MaixDuino via the Download button. Again, make
    sure that the COM port is not occupied by another program (Arduino, MaixPy-IDE,
    etc.).


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_55_0.png)


    Figure 8.15: Download of the firmware to the MaixDuino.


    Downloading and burning the firmware can take several minutes. Afterwards, the
    Maix is available again for the new Python projects. For the upload speed (Speed
    mode), the option Slow mode is recommended. This works fine in most cases. Fast
    mode should only be used if highly reliable connections and short and high-quality
    USB cables are available.


    # 8.8 The Flash tool in action


    The kflash tool can not only be used for uploading the Python interpreter. Rather,
    it is a universal tool that allows to load any kind of data into the flash memory
    of the MaixDuino.


    When working with ML projects, in many cases various models are available for
    testing. These models usually contain fully trained neural network data. A large
    number of ready-made models are available for the MaixDuino. These models can
    be available in two different variants:


    +   1. as .kfpkg-File

    2. as .kmodel


    In the first case, the .kfpkg file (the e.g., face_model_at_0x300000.kfpkg) can
    be loaded directly to a specific HEX address using the Flash tool. A kmodel (e.g.,
    facedetect.kmodel), on the other hand, can be written to the Maix''s SD card via
    Thonny.


    • 56'
  - '[PAGE 56]


    Of course, the correct version must be considered in the Python program. In the
    first case, the model is read from the hex address, for example, via:


    ```

    task = kpu.load(0x200000)

    ```


    In the second case, the file, including the path, must be specified, for example,
    using:


    ```

    task = kpu.load("/sd/MNIST.kmodel")

    ```


    A .kfpkg file is just a .zip archive file whose extension has been renamed to
    "kfpkg". The files can be opened with a ZIP tool. You get two files:


    +   1. the kmodel itself;

    2. a .json-file.


    The JSON part tells the kflash_gui to which address the kmodel should be written.
    For this reason, the file name of a kfpkg usually contains the hex address (e.g.,
    0x300000) to which it is written. In this way it is possible to load two (or more)
    files, for example the Python interpreter and a model, without overlapping memory
    areas.


    # 8.9 Machine Learning and interactive Python


    The term "interactive" goes back to the Latin expression *inter agere*. The verb
    *agere* means "to act". The word component "inter" points to something in between.
    In this sense, one can say that an interactive shell is between the acting user
    and the operating system.


    An interactive system therefore waits for commands from the user and immediately
    carries them out. It returns straightaway the result of the execution. After that,
    the Shell waits for the next input.


    Python offers a convenient command line interface, also called the Python Interactive
    Shell. Python thus has two basic modes:


    +   - Script Mode;

    - Interactive mode.


    In script mode, complete .py files are executed in the interpreter. The interactive
    mode, on the other hand, offers a command-line shell that provides immediate feedback
    for each instruction. The interactive mode is thus well suited for testing new
    program constructions.


    Interactive Python or "IPython" offers a comprehensive architecture for interactive
    computing:


    +   - a powerful interactive shell;

    - support for data visualization and use of GUI tool kits.'

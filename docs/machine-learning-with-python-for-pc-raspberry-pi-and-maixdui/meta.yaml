    Figure 15.12: Eye detection.


    Capturing a smile goes even one step further. This function is already implemented
    in many digital cameras. It is thus possible to activate the camera''s self-timer
    and ensure that a picture is only taken when all the people in front of the lens
    are showing smiles and friendly faces.


    What is interesting here is that not only the mouth is localized. Rather, its
    specific shape must also be detected, since not every mouth automatically means
    a smile. This already shows that ML methods can definitely be capable of determining
    the emotional state of a person.


    Some experiments in this area can be carried out using the program *Smile_detect_1V0.py*.
    Although this is still a very rudimentary implementation, it shows that the program
    is quite capable of distinguishing between serious and friendly faces.'
- md: "## 15.9 Photo Training\n\nIn order to extend face recognition to face identification,\
    \ two more steps are required:\n\n- 1. taking test images and creating a test\
    \ data set;\n- 2. training the network with this new data set.\n\nFirst of all,\
    \ it is necessary to transfer the Python programs:\n\n- CollectTestPICs_1V0.py\n\
    - TrainFaces_1V0.py\n- FaceRecognizer_1V0.py\n\nfrom the download package to the\
    \ Raspberry Pi. This can be done either by downloading it to a PC then transferring\
    \ it via USB stick or by downloading it directly to the Pi.\n\nTo take the test\
    \ images, a folder must first be created with the name of the respective test\
    \ subject, like\n\n/home/pi/face_detection_recognition/dataset/Sandy\n\nIn Thonny,\
    \ the program\n\nCollectTestPICs_1V0.py\n\nis opened. The name (e.g., Sandy) is\
    \ also entered there within the inverted commas:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_213_0.png)\n\
    \nFigure 15.14: Names in \"TakeTestPics.py\".\n\nOf course, the name in the data\
    \ set folder and in the file must match exactly. After starting the program in\
    \ Thonny, a window showing the video stream from the camera opens up. This can\
    \ take several seconds even on a Raspberry Pi 4.\n\nNow the camera used must be\
    \ aligned with the test person's face. By pressing the space bar, a series of\
    \ photos can be taken. About ten photos are sufficient for a first test. Ideally,\
    \ the head should be slightly turned, raised or lowered to allow for different\
    \ perspective angles. People who wear glasses should take a few pictures with\
    \ and without glasses so that the face can later be recognized in both cases.\
    \ The program can be stopped by pressing the \"q\" key (for **quit**).\n\nAfterwards,\
    \ you can check the photos in the file manager:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_213_1.png)\n\
    \nFigure 15.15: Test images in the file manager, and a sample image.\n\nIf desired,\
    \ the procedure can be repeated for other persons. After the training data set\
    \ has been compiled, the next step is to train the model. For this purpose, it\
    \ is only necessary to execute the program\n\n```\nTrainFaces_1V0.py\n```\n\n\
    It takes about 3 to 4 seconds for the Pi to analyze a single photo of the data\
    \ set. For a data set with 20 pictures (e.g., two people with ten pictures each),\
    \ about one to two minutes are required. The training data obtained in this way\
    \ are finally saved in the file *encodings.pickle*. The **HOG method (Histogram\
    \ of Oriented Gradients)** is used here as the recognition method.\n\n## 15.10\
    \ \"Know thyself!\" ... and others\n\n\"Know (recognize) thyself\" was once written\
    \ above the Oracle of Delphi — a reminder to mankind to not fall into arrogance.\
    \ Perhaps this is also a maxim that would suit the developers of ML systems well\
    \ ...\nFrom a purely technical point of view, however, self-knowledge is not a\
    \ big problem. Now that the preliminary work has been completed, the actual face\
    \ recognition with\n\n```\nFaceRecognizer_1V0.py\n```\n\ncan be started. After\
    \ a few seconds, the webcam view opens again.\n\nIf there is a face in the webcam's\
    \ field of vision, it is automatically analyzed. If the face was recognized, it\
    \ is marked with a rectangle. If the model was trained correctly, the name of\
    \ the person should also appear. If other faces have been trained, they should\
    \ be recognized as well. If an unknown face is detected, it is marked with \"\
    unknown\" correspondingly. The program can be terminated again by hitting \"q\"\
    .\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_214_0.png)\n\nFigure 15.16: Person\
    \ identification using RPi and a PiCam.\n\n## 15.11 A Biometric scanner as a door\
    \ opener\n\nNow that individual faces can be successfully identified, the procedure\
    \ may be used for various applications. The I/O pins of the Raspberry allow electronic\
    \ or electro-mechanical devices to be controlled directly or via relays or transistors.\
    \ In this way, a face identification system can be extended to a biometric scanner.\
    \ Together with a conventional electromagnetic door opener, for example, a lock\
    \ can now be opened automatically as soon as a known person has been detected\
    \ by the PiCam.\n\nTo do this, the *FaceRecognizer_1V0.py* program only needs\
    \ to be extended by a few lines. Besides initializing the GPIO pins:\n\n```\n\
    import RPi.GPIO as GPIO\nGPIO.setmode(GPIO.BCM)\nGPIO.setup(23, GPIO.OUT)\n```\n\
    \nonly the activation of the port is required. As soon as a known person is recognized\
    \ by the system:\n\n```\nif \"\" in names:\n    print(names)\n    GPIO.output(23,\
    \ GPIO.HIGH)\nelse:\n    GPIO.output(23, GPIO.LOW)\n```\n\nthe corresponding pin\
    \ is switched to High potential. The complete program *FaceKey_1V0.py* is included\
    \ in the download package with this book.\n\nIn the following hardware setup,\
    \ the LED lights up when a person known to the system appears in the PiCam's field\
    \ of view:\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_216_0.png)\n\nFigure 15.17:\
    \ Switching an LED when a face is recognized.\n\nIf, for example, a door opener\
    \ is to be operated with this setup, the LED only has to be replaced by a relay\
    \ that is able to control an electro-mechanical opener. However, in practical\
    \ applications, you should always bear in mind that this simple facial identification\
    \ by no means meets any security standards. For securing the door of your house\
    \ or flat you should in any case resort to professional systems.\n\n## 15.12 Recognizing\
    \ gender and age\n\nEstimating a person's age often leads to problems. For females,\
    \ an overestimated age is unlikely to go down very well. Many people find it difficult\
    \ to quantify the exact age of other persons. Yet this can be of considerable\
    \ importance. Just think of applications in marketing. Here, it is quite important\
    \ to have information about the age distribution of your own customer base.\n\n\
    Recognizing the gender of a person, on the other hand, is relatively unproblematic\
    \ for most people (in most cases...). But here, too, automatic recognition could\
    \ result in many interesting applications.\n\nAfter faces have been successfully\
    \ recognized and even identified in the last sections, the Python programs we\
    \ already discussed will be extended in such a way that they also enable estimates\
    \ regarding the gender and age of a person.\n\nReady-trained \"Caffe\" models\
    \ can be used for this purpose. You will find the link to this in the download\
    \ package. A compressed file *age_gender_model.tar.gz* containing the four files:\n\
    \n- age_net.caffemodel\n- deploy_age.prototxt\n- deploy_gender.prototxt\n- gender_net.caffemodel\n\
    \nis available in the LINKS.txt file. These files must be copied into a sub-folder\
    \ called age_gender_models of the project folder. With Caffe (Convolutional Architecture\
    \ for Fast Feature Embedding), a deep-learning framework is available that is\
    \ particularly characterized by the high classification speed of its models. This\
    \ is reflected in this application by the fast gender recognition and age estimation\
    \ and the associated high frame rate. A detailed description of Caffe is beyond\
    \ the scope of this book. Interested readers are referred to the relevant literature\
    \ (see LINKS.txt).\n\nThe associated Python program AgeGenderDetector_1V0 looks\
    \ like this:\n\n```\nfrom picamera.array import PiRGBArray\nfrom picamera import\
    \ PiCamera\nimport imutils\nimport time\nimport cv2\n\ncascade=\"haarcascade_frontalface_default.xml\"\
    \ndetector = cv2.CascadeClassifier(cascade)\ncamera = PiCamera()\ncamera.resolution\
    \ = (320,240)\nrawCapture = PiRGBArray(camera, size=(320,240))\nMODEL_MEAN_VALUES\
    \ = (78.4263377603, 87.7689143744, 114.895847746)\nage_list=['(0-3)','(4-6)','(7-12)','(13-20)','(21-32)','(33-43)','(44-53)','(54-100)']\n\
    gender_list = ['Male', 'Female']\ngreen=(0,255,0)\ntime.sleep(0.1)\n\ndef initialize_caffe_model():\n\
    \    print('Loading models...')\n    age_net = cv2.dnn.readNetFromCaffe(\"age_gender_models/deploy_age.prototxt\"\
    ,\"age_gender_models/age_net.caffemodel\")\n    gender_net = cv2.dnn.readNetFromCaffe(\"\
    age_gender_models/deploy_gender.prototxt\",\"age_gender_models/gender_net.caffemodel\"\
    )\n    return (age_net, gender_net)\ndef capture_loop(age_net, gender_net):\n\
    \    for frame in camera.capture_continuous(rawCapture, format=\"bgr\", use_video_port=True):\n\
    \        image = frame.array\n        face_cascade = cv2.CascadeClassifier('haarcascade_frontalface.xml')\n\
    \        gray = cv2.cvtColor(image,cv2.COLOR_BGR2GRAY)\n```"
  mdcn: "## 15.9 照片训练\n\n为了将人脸识别扩展到人脸身份识别，还需要两个步骤：\n\n- 1. 拍摄测试图像并创建测试数据集；\n- 2. 使用这个新数据集训练网络。\n\
    \n首先，需要将以下Python程序：\n\n- CollectTestPICs_1V0.py\n- TrainFaces_1V0.py\n- FaceRecognizer_1V0.py\n\
    \n从下载包传输到树莓派。这可以通过先下载到PC然后通过U盘传输，或者直接下载到树莓派来完成。\n\n要拍摄测试图像，首先必须创建一个以相应测试对象命名的文件夹，例如\n\
    \n/home/pi/face_detection_recognition/dataset/Sandy\n\n在Thonny中，打开程序\n\nCollectTestPICs_1V0.py\n\
    \n在那里也需要在引号内输入名称（例如，Sandy）：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_213_0.png)\n\
    \n图15.14：\"TakeTestPics.py\"中的名称。\n\n当然，数据集文件夹中的名称和文件中的名称必须完全匹配。在Thonny中启动程序后，会打开一个显示摄像头视频流的窗口。即使在树莓派4上，这可能也需要几秒钟。\n\
    \n现在必须将使用的摄像头与测试人员的脸部对齐。通过按空格键，可以拍摄一系列照片。对于初次测试，大约十张照片就足够了。理想情况下，头部应稍微转动、抬起或低下，以允许不同的视角角度。戴眼镜的人应该拍摄几张戴眼镜和不戴眼镜的照片，以便以后在两种情况下都能识别面部。可以通过按“q”键（代表**退出**）来停止程序。\n\
    \n之后，您可以在文件管理器中检查照片：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_213_1.png)\n\n\
    图15.15：文件管理器中的测试图像，以及一张示例图像。\n\n如果需要，可以对其他人重复此过程。编译完训练数据集后，下一步是训练模型。为此，只需执行程序\n\
    \n```\nTrainFaces_1V0.py\n```\n\n树莓派分析数据集中的一张照片大约需要3到4秒。对于包含20张图片的数据集（例如，两个人各十张图片），大约需要一到两分钟。以这种方式获得的训练数据最终保存在文件*encodings.pickle*中。这里使用**HOG方法（方向梯度直方图）**作为识别方法。\n\
    \n## 15.10 \"认识你自己！\"... 以及其他\n\n\"认识（识别）你自己\"曾被写在德尔斐神庙的入口处——提醒人类不要陷入傲慢。也许这也是一个非常适合ML系统开发者的格言...\n\
    然而，从纯粹的技术角度来看，自我认知并不是一个大问题。现在前期工作已经完成，可以使用\n\n```\nFaceRecognizer_1V0.py\n```\n\
    \n开始实际的人脸识别。几秒钟后，网络摄像头视图再次打开。\n\n如果网络摄像头的视野中有一张脸，它会被自动分析。如果面部被识别，它会用矩形标记。如果模型训练正确，应该还会出现人的名字。如果训练了其他面孔，它们也应该被识别。如果检测到未知的面孔，它会相应地标记为“unknown”。再次按“q”可以终止程序。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_214_0.png)\n\n图15.16：使用RPi和PiCam进行人员识别。\n\
    \n## 15.11 生物识别扫描仪作为开门器\n\n既然可以成功识别个人面孔，那么该过程可用于各种应用。树莓派的I/O引脚允许直接或通过继电器或晶体管控制电子或机电设备。这样，人脸识别系统可以扩展为生物识别扫描仪。例如，与传统的电磁门开启器结合使用，一旦PiCam检测到已知人员，就可以自动打开锁。\n\
    \n为此，只需在*FaceRecognizer_1V0.py*程序中添加几行代码。除了初始化GPIO引脚：\n\n```\nimport RPi.GPIO\
    \ as GPIO\nGPIO.setmode(GPIO.BCM)\nGPIO.setup(23, GPIO.OUT)\n```\n\n只需要激活端口。一旦系统识别出已知人员：\n\
    \n```\nif \"\" in names:\n    print(names)\n    GPIO.output(23, GPIO.HIGH)\nelse:\n\
    \    GPIO.output(23, GPIO.LOW)\n```\n\n相应的引脚就会切换到高电平。完整的程序*FaceKey_1V0.py*包含在本书的下载包中。\n\
    \n在以下硬件设置中，当系统已知的人员出现在PiCam的视野中时，LED会亮起：\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_216_0.png)\n\
    \n图15.17：识别到面部时切换LED。\n\n例如，如果要用此设置操作门开启器，只需将LED替换为能够控制机电开启器的继电器。然而，在实际应用中，您应始终牢记，这种简单的人脸识别绝不符合任何安全标准。为了保护您房屋或公寓的门，您应该始终使用专业系统。\n\
    \n## 15.12 识别性别和年龄\n\n估计一个人的年龄常常会导致问题。对于女性来说，高估年龄不太可能受欢迎。许多人发现很难量化其他人的确切年龄。然而，这可能具有相当大的重要性。想想营销中的应用。在这里，了解自己客户群的年龄分布信息非常重要。\n\
    \n另一方面，对大多数人来说（在大多数情况下...），识别一个人的性别相对没有问题。但在这里，自动识别也可能带来许多有趣的应用。\n\n在前面的部分中，人脸已被成功识别甚至识别身份后，我们将已经讨论过的Python程序进行扩展，使其也能估计一个人的性别和年龄。\n\
    \n为此，可以使用预先训练好的“Caffe”模型。您可以在下载包中找到相关链接。一个名为*age_gender_model.tar.gz*的压缩文件，包含四个文件：\n\
    \n- age_net.caffemodel\n- deploy_age.prototxt\n- deploy_gender.prototxt\n- gender_net.caffemodel\n\
    \n可在LINKS.txt文件中找到。这些文件必须复制到项目文件夹中名为age_gender_models的子文件夹中。Caffe（用于快速特征嵌入的卷积架构）是一个深度学习框架，其特点是模型的高分类速度。这在本应用中体现为快速的性别识别和年龄估计以及相关的高帧率。Caffe的详细描述超出了本书的范围。感兴趣的读者请参阅相关文献（见LINKS.txt）。\n\
    \n相关的Python程序AgeGenderDetector_1V0如下所示：\n\n```\nfrom picamera.array import PiRGBArray\n\
    from picamera import PiCamera\nimport imutils\nimport time\nimport cv2\n\ncascade=\"\
    haarcascade_frontalface_default.xml\"\ndetector = cv2.CascadeClassifier(cascade)\n\
    camera = PiCamera()\ncamera.resolution = (320,240)\nrawCapture = PiRGBArray(camera,\
    \ size=(320,240))\nMODEL_MEAN_VALUES = (78.4263377603, 87.7689143744, 114.895847746)\n\
    age_list=['(0-3)','(4-6)','(7-12)','(13-20)','(21-32)','(33-43)','(44-53)','(54-100)']\n\
    gender_list = ['Male', 'Female']\ngreen=(0,255,0)\ntime.sleep(0.1)\n\ndef initialize_caffe_model():\n\
    \    print('Loading models...')\n    age_net = cv2.dnn.readNetFromCaffe(\"age_gender_models/deploy_age.prototxt\"\
    ,\"age_gender_models/age_net.caffemodel\")\n    gender_net = cv2.dnn.readNetFromCaffe(\"\
    age_gender_models/deploy_gender.prototxt\",\"age_gender_models/gender_net.caffemodel\"\
    )\n    return (age_net, gender_net)\ndef capture_loop(age_net, gender_net):\n\
    \    for frame in camera.capture_continuous(rawCapture, format=\"bgr\", use_video_port=True):\n\
    \        image = frame.array\n        face_cascade = cv2.CascadeClassifier('haarcascade_frontalface.xml')\n\
    \        gray = cv2.cvtColor(image,cv2.COLOR_BGR2GRAY)\n```"

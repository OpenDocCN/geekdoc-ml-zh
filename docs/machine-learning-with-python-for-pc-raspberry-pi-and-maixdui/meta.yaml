    \ 10. The current number is printed in each loop and then the value of the number\
    \ is increased by 1.\n\nThe task can also be done using a **for** loop:\n\n```python\n\
    number = 1\nfor number in range(1, 10):\n    print(number)\n```\n\nThe **for**\

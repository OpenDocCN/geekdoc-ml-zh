    # 14.4 Sorry, didn''t get you ...


    In their early days, voice recognition systems had a bad reputation. In telephone
    banking, many entries were acknowledged with the terse reply "Sorry, I didn''t
    get you...". Since many customers were annoyed by this in the end, some credit
    institutions then even advertised with the slogan "With us, you still talk to
    real people!".


    Over the years, however, the systems quickly improved. In the meantime, simple
    orders, appointment requests and the like can be handled without problems via
    voice systems, not only at banks and public authorities but also in many other
    lines of business.


    If you want to set up a speech recognition system with the RPi, you are initially
    faced with the problem that the board does not have an audio input. So, you have
    to resort to external solutions. Either a USB sound card with an external microphone
    or a webcam with an integrated microphone can be used (see Figures 14.2 or 10.15).



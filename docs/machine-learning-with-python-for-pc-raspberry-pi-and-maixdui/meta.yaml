- md: "## 12.7 Power training\n\nFor a quick and effective training, the Python file\n\
    \nMNIST_keras_Train_1V0.py\n\nshould be executed on a computer that's as powerful\
    \ as possible. Using KERAS, a deep neural network model is constructed, compiled,\
    \ and finally trained in this program. After completion of the training and validation\
    \ phases, the weights of the network are saved as an external file. The following\
    \ table shows the training times for different computer systems.\n\n| Periods\
    \ | Raspberry Pi 4 (8 GB) | Dual-Core (2.8 GHz) | Quad-Core (3.6 GHz) |\n| :---\
    \ | :--- | :--- | :--- |\n| 1 | 10 min | 3 min | 70 s |\n| 12 | 2 h | 4 h | 15\
    \ min |\n\nTwelve epochs run for about a quarter of an hour, even on a high-performance\
    \ PC. By using an NVIDIA graphics card and including the full GPU (Graphics Processing\
    \ Unit) power, the training time could be significantly reduced to a few minutes.\
    \ Therefore, if your computer provides the appropriate resources, do not forget\
    \ to activate them. All you need to do is install the associated version of TensorFlow\
    \ and the executable CUDA file from NVIDIA. Further details can be found in the\
    \ respective manuals for the graphics card used.\n\nThe calculated weights of\
    \ the network are saved in an *.h5 file. The file can be copied to the Raspberry\
    \ Pi and executed there in order to recognize the digits in the live video stream.\
    \ For copying, say, a USB stick or Filezilla can be used (Section 6.3). In principle,\
    \ the training could also be carried out on the RPi itself. Then, however, training\
    \ times of several hours are required. The download package contains some .h5\
    \ files that can be used for initial tests on your Raspberry Pi.\n\n## 12.8 Quality\
    \ control — an absolute must!\n\nJust as in the production of food or electronic\
    \ components, quality assessment is of crucial importance when using machine-learning\
    \ systems. In particular, complex systems such as autonomous vehicles or medical\
    \ technology applications require sophisticated test procedures.\n\nFor this reason,\
    \ extensive parameters are available for evaluating the quality of a trained neural\
    \ network. Of particular importance are the parameters like prediction accuracy\
    \ and the loss function.\n\nThe lower the \"loss\" value of a network, the better\
    \ the corresponding model was trained. The loss is calculated for training and\
    \ validation and indicates how well the model performs on these two sets. In contrast\
    \ to \"accuracy\", loss is not a percentage value. It is a summary of the errors\
    \ made for each sample in the training or validation set. The main goal while\
    \ training a model is usually to reduce or minimize the value of the loss function.\n\
    \nHowever, there are a few issues to keep in mind when reducing the loss value.\
    \ For example, the problem of \"over-fitting\" can arise. In this case the model\
    \ \"remembers\" the training examples so precisely that higher error values occur\
    \ once again when using the different samples of the test set.\n\nOver-fitting\
    \ also occurs in cases when a very complex model with an unreasonably high number\
    \ of free parameters is used. Here, the parameters are also adjusted so precisely\
    \ to the training set, that they deliver worse results for other values.\n\nThe\
    \ accuracy of a model is determined after the model parameters have been optimized\
    \ and established and the learning process is finalized. Then the test samples\
    \ are fed into the model and the number of errors is related to all results. If,\
    \ for example, 1000 results are determined and the model classifies 987 of them\
    \ correctly, the accuracy of the model is 98.7%.\n\nFigure 12.9 shows two typical\
    \ learning curves. As expected, the accuracy function increases over the course\
    \ of the training. The loss values decrease accordingly. In addition, it can be\
    \ seen that the values finally converge to a certain saturation level. If this\
    \ point is reached, even longer training times fail to improve network performance.\n\
    \n## 12.9 Recognizing live images\n\nIf the *.h5 file has been saved successfully,\
    \ the network can be tested. Both handwritten and printed digits can be used for\
    \ this. How good the forecast accuracy actually is, depends on various factors.\
    \ In particular, the image illumination, the camera viewing angle or the image\
    \ sharpness and resolution play an important role.\n\nOf course, it also depends\
    \ on how legible the digits actually are. Just like a human observer, the network\
    \ can also recognize clearly-written digits much more easily. The Python program\
    \ *MNIST_keras_PiCam_live_1V0.py* is again included in the download package and\
    \ can be started on the Raspberry via Thonny.\n\nAfter loading the parameter set,\
    \ a live camera image is displayed. When the appropriate handwritten digits are\
    \ within the field of view of the camera, a picture can be taken using the \"\
    a\" key (for analyze). Before the data are forwarded to the neural network, various\
    \ transformation steps, such as the conversion into gray scale values or a color\
    \ inversion, are carried out. Finally, the image data are displayed, and a preprocessed\
    \ black-and-white version of the data array is shown beside the original live\
    \ video image. This serves as an additional checking option for the image quality.\n\
    \nAfter the neural network has calculated the most likely value of the digit,\
    \ it is printed as a 1-in-10 vector and additionally as the digit value itself\
    \ to the console (Figure 12.10). The following listing shows the complete Python\
    \ code for digit recognition:\n\n```python\n#!/usr/bin/env python\n\nprint(\"\
    importing libs...\")\nfrom skimage import img_as_ubyte\nfrom skimage.color import\
    \ rgb2gray\nimport cv2, imutils, time\nfrom imutils.video import VideoStream\n\
    from keras.models import load_model\n\nprint(\"load model...\")\nmodel=load_model('MNIST_trained_model_RasPi401_30_epochs__001.h5')\n\
    model.summary()\n\nvs=VideoStream(usePiCamera=[\"picamera\"]).start()\ntime.sleep(1.0)\n\
    \nwhile True:\n    frame=vs.read()\n    frame=imutils.resize(frame, width=400)\n\
    \    cv2.imshow(\"press 'a' to analyze - 'q' to quit\", frame)\n    key=cv2.waitKey(1)&0xFF\n\
    \    if key == ord(\"a\"):\n        img_gray=rgb2gray(frame)\n        img_gray_u8=img_as_ubyte(img_gray)\n\
    \        (thresh, img_bw)=cv2.threshold(img_gray_u8,128,255,cv2.THRESH_BINARY|cv2.THRESH_OTSU)\n\
    \        img_resized=cv2.resize(img_bw,(28,28))\n        img_gray_invert=255-img_resized\n\
    \        cv2.imshow(\"gray\", img_gray_invert)\n        img_final=img_gray_invert.reshape(1,28,28,1)\n\
    \        ans = model.predict(img_final)\n        print(ans)\n        ans = ans[0].tolist().index(max(ans[0].tolist()))\n\
    \        print('reading digit as: ',ans)\n        print(\"========================================\"\
    )\n    if key == ord(\"q\"):\n        break\ncv2.destroyAllWindows()\nvs.stop()\n\
    print(\"bye...\")\n```\n\nFirst, the required libraries are loaded again. Then\
    \ the pretrained model from the *.h5* file must be included:\n\n```python\nmodel=load_model('MNIST_trained_model_RasPi401_30_epochs__001.h5')\n\
    ```\n\nFinally, the live video stream of the PiCam can be started:\n\n```python\n\
    vs=VideoStream(usePiCamera=[\"picamera\"]).start()\n```\n\nThe main loop continuously\
    \ displays the currently recorded video image in a separate window. If the \"\
    a\" key is pressed, the program derives an array of floating point numbers from\
    \ the original color image. Additionally, a gray-scale image is generated from\
    \ these data. Finally, the floating point format of the image is converted to\
    \ an 8-bit number with values in the range of 0 to 255.\n\nOpenCV is then used\
    \ to generate a threshold value. The library offers extensive possibilities for\
    \ such image processing. In this case, the \"Otsu method\" was used. The method\
    \ is named after Nobuyuki Otsu and performs a comprehensive image analysis. It\
    \ returns an automatically calculated intensity threshold value, which divides\
    \ the pixels into two classes. This allows the image to be broken down into an\
    \ essential foreground and a less important background."
  mdcn: "## 12.7 功率训练\n\n为了进行快速有效的训练，Python文件\n\nMNIST_keras_Train_1V0.py\n\n应在尽可能强大的计算机上执行。该程序使用KERAS构建、编译并最终训练一个深度神经网络模型。训练和验证阶段完成后，网络的权重将保存为外部文件。下表显示了不同计算机系统的训练时间。\n\
    \n| 周期 | 树莓派 4 (8 GB) | 双核 (2.8 GHz) | 四核 (3.6 GHz) |\n| :--- | :--- | :--- |\
    \ :--- |\n| 1 | 10 分钟 | 3 分钟 | 70 秒 |\n| 12 | 2 小时 | 4 小时 | 15 分钟 |\n\n即使在高性能PC上，十二个周期的运行也大约需要一刻钟。通过使用NVIDIA显卡并利用完整的GPU（图形处理单元）能力，训练时间可以显著减少到几分钟。因此，如果你的计算机提供了相应的资源，别忘了激活它们。你只需安装相应版本的TensorFlow和NVIDIA的可执行CUDA文件即可。更多详细信息可以在所用显卡的相关手册中找到。\n\
    \n计算出的网络权重保存在*.h5文件中。该文件可以复制到树莓派上并在那里执行，以便识别实时视频流中的数字。复制时，可以使用U盘或Filezilla（第6.3节）。原则上，训练也可以在RPi本身上进行。然而，这需要数小时的训练时间。下载包中包含一些.h5文件，可用于在你的树莓派上进行初步测试。\n\
    \n## 12.8 质量控制——绝对必要！\n\n就像在食品或电子元件生产中一样，质量评估在使用机器学习系统时至关重要。特别是像自动驾驶汽车或医疗技术应用这样的复杂系统，需要复杂的测试程序。\n\
    \n因此，有广泛的参数可用于评估训练好的神经网络的质量。其中特别重要的参数是预测准确率和损失函数。\n\n网络的“损失”值越低，相应的模型训练得越好。损失是针对训练和验证计算的，表明模型在这两个数据集上的表现如何。与“准确率”不同，损失不是百分比值。它是对训练或验证集中每个样本所犯错误的总结。训练模型的主要目标通常是减少或最小化损失函数的值。\n\
    \n然而，在降低损失值时，有几个问题需要注意。例如，可能会出现“过拟合”问题。在这种情况下，模型会如此精确地“记住”训练样本，以至于在使用测试集的不同样本时，错误值会再次升高。\n\
    \n当使用一个具有不合理数量的自由参数的非常复杂的模型时，也会发生过拟合。在这种情况下，参数也会被精确地调整到训练集，以至于它们在其他值上表现更差。\n\n\
    模型的准确率是在模型参数优化并确定、学习过程完成后确定的。然后将测试样本输入模型，并将错误数量与所有结果相关联。例如，如果确定了1000个结果，而模型正确分类了其中的987个，则模型的准确率为98.7%。\n\
    \n图12.9显示了两条典型的学习曲线。正如预期的那样，准确率函数在训练过程中增加。相应的，损失值减少。此外，可以看到这些值最终收敛到某个饱和水平。如果达到这个点，即使更长的训练时间也无法提高网络性能。\n\
    \n## 12.9 识别实时图像\n\n如果*.h5文件已成功保存，则可以测试网络。手写和印刷数字都可以用于此。预测准确率实际上有多好，取决于各种因素。特别是图像照明、相机视角或图像清晰度和分辨率起着重要作用。\n\
    \n当然，这也取决于数字实际的可读性。就像人类观察者一样，网络也能更容易地识别清晰书写的数字。Python程序*MNIST_keras_PiCam_live_1V0.py*也包含在下载包中，可以通过Thonny在树莓派上启动。\n\
    \n加载参数集后，会显示实时相机图像。当适当的手写数字进入相机视野时，可以使用“a”键（用于分析）拍照。在将数据转发到神经网络之前，会执行各种转换步骤，例如转换为灰度值或颜色反转。最后，显示图像数据，并在原始实时视频图像旁边显示数据数组的预处理黑白版本。这作为图像质量的额外检查选项。\n\
    \n在神经网络计算出最可能的数字值后，它会作为1对10的向量以及数字值本身打印到控制台（图12.10）。以下清单显示了数字识别的完整Python代码：\n\n\
    ```python\n#!/usr/bin/env python\n\nprint(\"importing libs...\")\nfrom skimage\
    \ import img_as_ubyte\nfrom skimage.color import rgb2gray\nimport cv2, imutils,\
    \ time\nfrom imutils.video import VideoStream\nfrom keras.models import load_model\n\
    \nprint(\"load model...\")\nmodel=load_model('MNIST_trained_model_RasPi401_30_epochs__001.h5')\n\
    model.summary()\n\nvs=VideoStream(usePiCamera=[\"picamera\"]).start()\ntime.sleep(1.0)\n\
    \nwhile True:\n    frame=vs.read()\n    frame=imutils.resize(frame, width=400)\n\
    \    cv2.imshow(\"press 'a' to analyze - 'q' to quit\", frame)\n    key=cv2.waitKey(1)&0xFF\n\
    \    if key == ord(\"a\"):\n        img_gray=rgb2gray(frame)\n        img_gray_u8=img_as_ubyte(img_gray)\n\
    \        (thresh, img_bw)=cv2.threshold(img_gray_u8,128,255,cv2.THRESH_BINARY|cv2.THRESH_OTSU)\n\
    \        img_resized=cv2.resize(img_bw,(28,28))\n        img_gray_invert=255-img_resized\n\
    \        cv2.imshow(\"gray\", img_gray_invert)\n        img_final=img_gray_invert.reshape(1,28,28,1)\n\
    \        ans = model.predict(img_final)\n        print(ans)\n        ans = ans[0].tolist().index(max(ans[0].tolist()))\n\
    \        print('reading digit as: ',ans)\n        print(\"========================================\"\
    )\n    if key == ord(\"q\"):\n        break\ncv2.destroyAllWindows()\nvs.stop()\n\
    print(\"bye...\")\n```\n\n首先，再次加载所需的库。然后必须包含来自*.h5*文件的预训练模型：\n\n```python\nmodel=load_model('MNIST_trained_model_RasPi401_30_epochs__001.h5')\n\
    ```\n\n最后，可以启动PiCam的实时视频流：\n\n```python\nvs=VideoStream(usePiCamera=[\"picamera\"\
    ]).start()\n```\n\n主循环在单独的窗口中持续显示当前录制的视频图像。如果按下“a”键，程序会从原始彩色图像中派生出一个浮点数数组。此外，从这些数据生成灰度图像。最后，将图像的浮点格式转换为值在0到255范围内的8位数字。\n\
    \n然后使用OpenCV生成阈值。该库为此类图像处理提供了广泛的可能性。在这种情况下，使用了“Otsu方法”。该方法以Nobuyuki Otsu命名，执行全面的图像分析。它返回一个自动计算的强度阈值，将像素分为两类。这允许将图像分解为重要的前景和不太重要的背景。"

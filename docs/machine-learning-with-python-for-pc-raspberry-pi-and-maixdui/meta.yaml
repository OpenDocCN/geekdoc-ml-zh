    \ link to the MNIST model can be found again in the download package.\n\nHere,\
    \ only the *mnist.kfpkg* file contained in the ZIP file is required (Figure 12.11).\
    \ After the model has been loaded, the associated Python program (*MNIST_2_KPU.py*)\
    \ can be started in Thonny.\n\n```python\nimport sensor,lcd,image\nimport KPU\
    \ as kpu\nlcd.init()\nsensor.reset()\nsensor.set_pixformat(sensor.RGB565)\nsensor.set_framesize(sensor.QVGA)\n\
    sensor.set_windowing((224, 224))\nsensor.set_hmirror(0)\ntask = kpu.load(0x200000)\n\
    #task = kpu.load(\"/sd/MNIST.kmodel\")\nprint(task)\nsensor.run(1)\nwhile True:\n\
    \    img=sensor.snapshot()\n    lcd.display(img,oft=(0,0))\n    img1=img.to_grayscale(1)\n\
    \    img2=img1.resize(28,28)\n    a=img2.invert()\n    a=img2.strech_char(1)\n\
    \    lcd.display(img2,oft=(260,30))\n    a=img2.pix_to_ai();\n    fmap=kpu.forward(task,img2)\n\
    \    plist=fmap[:]\n    pmax=max(plist)\n    max_index=plist.index(pmax)\n   \
    \ img = image.Image(size=(30, 60))\n    img.draw_string(0,0, \"%d\" %max_index,\
    \ scale=5)\n    lcd.display(img, oft=(260,100))\n    lcd.draw_string(240,180,\"\
    p = %.2f\" %pmax,lcd.WHITE,lcd.BLACK)\n```\n\nAlternatively, you can copy the\
    \ model (*MNIST.kmodel* in the ZIP file) directly to the SD card of the MaixDuino.\
    \ In that case, the model can be accessed by typing\n\n```python\ntask = kpu.load(\"\
    /sd/MNIST.kmodel\")\n```\n\nThe corresponding line must be activated by deleting\
    \ the comment character (#) while the line above must be deactivated accordingly.\n\
    \nAfter starting the program, the live image of the camera module is displayed.\
    \ In addition, a preprocessed control image appears in the upper left corner of\
    \ the screen. The recognized digit is displayed below the control picture. In\
    \ addition, the probability for the correct recognition (P) of the respective\
    \ digit is displayed.\n\n![Figure 12.12: MaixDuino reads a digit.](img/eafea07aa3f8586de75dade7e29c5aeb_152_0.png)\n\
    \n## Chapter 13 • How Machines Learn to See: Object Recognition\n\nThe development\
    \ of autonomous cars, trains and airplanes is considered to be one of the most\
    \ important projects of the next few years, both technically and economically.\
    \ Various driver-less rail vehicles are already in use at airports around the\
    \ world. Autonomous cars have been tested in everyday traffic for several years.\n\
    \nFor the smooth and safe operation of self-driving cars or trucks, the reliable\
    \ detection of people, lanes, other vehicles or traffic signs has the highest\
    \ priority. But not only for this reason the recognition and identification of\
    \ objects became one of the most important research areas in artificial intelligence\
    \ and machine learning.\n\nObject recognition and localization is also of fundamental\
    \ importance in robotics and industrial automation [12]. This chapter first explains\
    \ the step-by-step setup of TensorFlow Lite on the Raspberry Pi. This program\
    \ system allows, among other things, the implementation of object recognition\
    \ systems, both on static images and in a video stream. Subsequently, object recognition\
    \ models are executed and tested using the Raspberry Pi with the PiCam connected.\n\
    \nThe TensorFlow system can also be trained to recognize clothes. The methods\
    \ already known from the previous chapters can be reused for this task. This bridges\
    \ the gap between simple pattern recognition (geometric figures, digits, etc.)\
    \ and the classification of real objects.\n\nFinally, the compact MaixDuino system\
    \ is used to classify 20 everyday objects such as bicycles, cars, chairs or sofas.\
    \ Together with the voice output discussed in the following chapter, an object\
    \ recognition system even allows the construction of a \"speaking eye\". This\
    \ device is able to acoustically describe optically detected objects. For example,\
    \ if a car was detected in the camera's field of view, this information is acoustically\
    \ announced via \"I see a car.\" Such systems can, for example, make life much\
    \ easier for visually impaired people.\n\n## 13.1 TensorFlow for Raspberry Pi\n\
    \nTensorFlow was used in various applications in earlier chapters. In particular,\
    \ KERAS uses this system. A light version of TensorFlow has also been available\
    \ for some time. This is particularly suitable for \"embedded systems\" such as\
    \ the Raspberry Pi. The computing power of a Raspberry Pi 4 with 8 GB RAM is sufficient\
    \ to carry out ML-based object recognition almost in real time. TFlite (**TensorFlow\
    \ lite**) basically consists of a series of tools that enable the efficient application\
    \ of machine learning methods on small and mobile devices [6].\n\nTFLite models\
    \ run much faster on the Raspberry Pi 4 than classic TensorFlow versions. The\
    \ installation of TensorFlow Lite on the Raspberry Pi is also much easier than\
    \ the corresponding procedure for general TensorFlow packages in Linux. The following\
    \ steps are recommended or required for the successful use of TensorFlow Lite:"
  mdcn: "## 12.10 批量大小与训练轮次\n\n在前面的章节中，两个超参数被多次提及：\n\n- 1. 批量大小\n- 2. 训练轮次\n\n在这两种情况下，它们都是整数值，在神经网络的训练阶段扮演着至关重要的角色。然而，这两个参数应被明确区分。\n\
    \n一个数据集通常由若干行、甚至海量的数据行组成。每一行对应一个样本或测量值，例如，一个特定的花卉标本，或者在MNIST数字集中，一张手写数字的图片。这一行数据也被称为样本或输入向量。批量大小定义了在单次训练运行中要处理和考虑的数据行或样本数量。在一批次运行结束时，预测结果会与期望输出进行比较，并计算出一个误差值。基于这个误差值，算法会改进模型的性能。\n\
    \n理想情况下，数据行数应能被批量大小整除。例如，如果有1000行数据，可以创建10个批次，每个批次包含100个样本。对于大多数算法来说，这是最佳的配置。如果情况并非如此，最后一个批次包含的样本数会少于其他批次。然而，不均匀的批量大小常常会导致训练过程变慢。此时，从数据集中移除一些样本或调整批量大小，使得数据集中的样本数能被批量大小整除，可能会更有利。\n\
    \n另一方面，训练轮次的数量决定了学习算法遍历整个训练数据集的次数。当一个训练轮次结束时，每个样本都已对学习过程贡献了一次。因此，一个训练轮次可以包含一个或多个批次。为了训练复杂的网络，训练轮次的数量通常需要非常大。1000或10000甚至更多的值并不少见。将训练轮次绘制在x轴上，网络误差绘制在y轴上，就得到了第10.6节和第11.7节中已经介绍过的学习曲线。\n\
    \n总结来说，这意味着：\n\n- 批量大小是在模型更新之前要处理的样本数量。\n- 训练轮次是完整遍历训练数据集的次数。\n- 批量的大小必须小于或等于训练数据集中的样本数量。\n\
    \n同样，配置这些参数没有通用的规则。最佳值通常只能通过测试和经验来找到。\n\n例如，使用：\n\n- 一个包含100个样本（数据行）的数据集；\n- 批量大小为5；\n\
    - 1000个训练轮次，\n\n意味着数据集被划分为100/5 = 20个批次，每个批次包含五个样本。模型权重在每个批次后更新，即在每处理五个样本后更新。因此，一个训练轮次包含20次模型更新。\n\
    \n模型将整个数据集运行1000次。这对应于在整个训练过程中总共进行1000 * 20 = 20,000次更新。通常，使用更大的批量大小可以加快神经网络的训练速度。然而，更大的批量也需要更大的RAM内存。在这里，根据具体应用，你需要在可用内存大小和处理速度之间找到一个最佳平衡点。\n\
    \n## 12.11 MaixDuino也能读取数字\n\nMaixDuino开发板，作为这里考虑的最小系统，能够读取手写数字。MaixDuino的一大优势是其标准配置中自带摄像头。结合已有的显示屏，可以创建一个紧凑的数字读取系统。\n\
    \n为此，可以使用kflash工具将一个完全训练好的模型（MNIST.kfpkg）加载到MaixDuino上：\n\n![图12.11：使用Kflash加载MNIST模型。](img/eafea07aa3f8586de75dade7e29c5aeb_151_0.png)\n\
    \nMNIST模型的互联网链接可以在下载包中再次找到。\n\n这里只需要ZIP文件中包含的*mnist.kfpkg*文件（图12.11）。模型加载后，可以在Thonny中启动相应的Python程序（*MNIST_2_KPU.py*）。\n\

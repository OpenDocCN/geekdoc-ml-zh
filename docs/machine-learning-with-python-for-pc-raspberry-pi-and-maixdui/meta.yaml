  md: '# Chapter 12 • Recognition of Handwritten Numbers


    The previous chapter focused on the processing of numerical data. These were obtained
    manually from the measurement of Iris-flower petal sizes. This task could also
    be automated. However, the recognition or classification of images requires skills
    that were long reserved for humans. Modern machine learning methods, however,
    also allow technical systems to advance into the field of image recognition [4].
    This also made machine-reading of handwritten characters and numbers possible.


    The ability to capture handwriting by computer systems opens up a multitude of
    new and important applications. Bank receipts, forms filled out with handwritten

    ```\ntime.sleep_ms(milliseconds)\n```\n\nfor very short delay times, since this\
    \ version shows an improved precision for small time intervals.\n\nThe disadvantage\
    \ of these functions is that they are blocking. This means that the controller\
    \ cannot perform any other tasks during the waiting time as it is busy counting\
    \ processor cycles.\n\nThe use of interrupts or other programming techniques is\
    \ an alternative. Since these methods are hardly needed in the context of the\
    \ book, they will not be pursued further here. If necessary, appropriate explanations\
    \ can be found in the literature (see Bibliography).\n\nThe following two routines\
    \ are available for calculating time queries:\n\n```\ntime.ticks_ms()  # or  \
    \  time.ticks()\ntime.ticks_us()\n```\n\nThey indicate the current system runtime\

    \n此外，该过程对个人隐私构成相当大的风险。当通过FaceID简单地注视前置摄像头来解锁现代智能手机时，人工智能已经在工作。如果你让Google或苹果整理你的假期照片，结果再次基于机器学习算法。每个人都必须自己决定这在各方面是否都是一个好主意，因为无法保证在此过程中收集的生物特征数据真的会被安全处理[7]。"

    The dashboard can only be used to access the files and sub-folders that are visible
    in the Jupyter start directory.


    When Jupyter Notebook is open in the browser, the dashboard is displayed in the
    URL bar as


    ```

    http://localhost:8888/tree

    ```


    This indicates that the content is provided by the local computer. It shows that
    Notebooks are web applications. Jupyter starts a local Python server to deal with
    the apps to the web browser. This makes them essentially platform-independent
    and allows easy sharing on the web.


    To create the first notebook, select "New" in the drop-down button at the top
    right and then "Python 3" (see figure above). This opens the first Jupyter notebook
    in a new tab. A new file "Untitled.ipynb" appears in the browser. A green bordered
    text field indicates that the notebook is actively running. Each notebook uses
    its own tab so that several notebooks can be opened at the same time.


    The .ipynb file (**interactive Python Jupyter notebook**) contains a text file
    describing the contents of a notebook in the so-called JSON format. Each cell,
    including graphs, comments or formulas etc. is stored in it, together with the
    associated metadata.


    When working with Jupyter, the terms "cells" and "kernel" play a central role:


    +   - A kernel is a "calculating machine" that executes the code contained in
    the notebook.

    - A cell is a container for text to be displayed in the notebook or for code to
    be executed by the notebook''s kernel.


    In a new notebook (Figure 8.19), the field with the green border is called a cell.
    There are two main cell types:


    +   - Code cells contain program instructions to be executed by the kernel. When
    the code is executed, the notebook displays the output under the code cell that
    generated it.

    - A Markdown cell contains formatted text and just displays its output directly
    when the Markdown cell is executed.


    Jupyter can also be tested with the classic hello world example. The input


    ```

    print(''Hello World!'')

    ```'

    \n如前所述，树莓派与PC或笔记本电脑的不同之处在于它提供了易于编程的I/O引脚。这使得该板非常适合家庭自动化应用。在这方面，树莓派明显优于传统计算机。使用以下指令包含控制硬件引脚的库\n\

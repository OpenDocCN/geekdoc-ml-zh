    # 12.10 Batch sizes and epochs


    In the previous sections, two hyper-parameters were used several times:


    +   1. Batch size

    2. Number of epochs


    In both cases, these are whole-number values that play an essential role in the
    training phase of a neural network. Nevertheless, the two parameters should be
    clearly distinguished.


    A data record generally consists of several, usually even a huge amount of data
    lines. Each line corresponds to a sample or measurement, for example, a special
    flower specimen, or, with the MNIST number set, a picture of a handwritten digit.
    The line of data is also known as a sample or input vector. The batch size defines
    the number of data lines or samples to be processed and considered in a single
    training run. At the end of a batch run, the predictions are compared with the
    expected outputs and an error is calculated. Based on this error value, an algorithm
    improves the model performance.


    Ideally, the number of rows of data can be divided by the batch size without a
    remainder. For example, if 1000 rows of data are available, 10 batches with a
    batch size of 100 each can be created. This is the best constellation for most
    algorithms. If this is not the case, the last batch contains fewer samples than
    the others. However, unequal batch sizes often lead to a slowdown in the training
    process. It may then be more beneficial to remove some samples from the data set
    or to change the batch size so that the number of samples in the data set can
    be divided by the batch size without remainder.'
  - '[PAGE 150]


    The number of epochs, on the other hand, determines how often the learning algorithm
    runs through the entire training data set. When an epoch is finalized, each sample
    has contributed once to the learning process. An epoch can therefore use one or
    more batches. In order to train complex networks, the number of epochs usually
    has to be very large. Values of 1000 or 10000 and more are not uncommon. Plotting
    the number of epochs along the x-axis and the network errors along the y-axis,
    leads to the learning curves already presented in Sections 10.6 and 11.7.


    In summary, this means:


    +   - The batch size is a number of samples that will be processed before the
    model is updated.

    - The number of epochs is the number of complete passes through the training data
    set.

    - The size of a batch must be less than or equal to the number of samples in the
    training data set.


    Again, there are no general rules for configuring these parameters. The optimum
    values can usually only be found via testing and experience.


    For example, using


    +   - a data set with 100 samples (data lines);

    - a batch size of 5 and;

    - 1,000 epochs,


    means that the data record is divided into 100/5 = 20 batches with five samples
    each. The model weights are updated after each batch, i.e., after each five samples.
    Therefore, an epoch includes 20 updates of the model.


    The model runs through the entire data set 1,000 times. This corresponds to a
    total of 1000 * 20 = 20,000 updates during the entire training process. In general,
    the training of a neural network is faster, if a larger the batch size is used.
    However, larger batches also require larger RAM memory. Here, depending on the
    application, you have to find an optimum between the available memory size and
    processing speed.



    # 12.5 KERAS can do even better!


    Up to now, for the evaluation of handwritten numbers, only the NumPy library was
    used. However, this library is mainly optimized for general numerical data processing.


    With the help of libraries especially designed for machine learning, the performance
    of the application can be significantly improved. However, the use of these libraries
    also has its downside. Working with these program libraries requires in-depth
    knowledge of Raspbian, Python and Jupyter, etc. Specifically, when using the Raspberry
    Pi, complex installation procedures are required in many cases. For beginners,
    it can therefore make sense to work with Anaconda on a PC first, since here, the
    necessary libraries can be integrated quite easily (see Chapter 8).


    Later on, with some basic knowledge available, it will be easier to install the
    ML libs on the Raspberry Pi. In particular, working with ML systems such as TensorFlow
    or KERAS requires some experience on the RPi, especially when installing components
    and libraries under Raspberry Pi OS. You therefore should only try to install
    the ML-specific applications if you are familiar with the basics.


    If KERAS is to be used for a few short tests only, it is advisable to work with
    a high-performance Windows or Linux computer first. With Anaconda, the "installation"
    of KERAS can be carried out by just ticking a box.


    But, once the first hurdles with PI OS have been overcome and all KERAS components
    are successfully installed on the Raspberry Pi, KERAS provides a comprehensive
    base for advanced neural network applications. Deep-learning frameworks such as
    TensorFlow or Theano can also be integrated into Python quite easily using KERAS.
    This also enables the efficient construction and subsequent training of more complex
    neural networks.'

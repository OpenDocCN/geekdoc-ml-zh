    \ formed in the same way in conditions and loops.\n\n## 9.5 Time Control and Sleep\n\
    \nThe **sleep** instruction was already used in the example of the flashing LED\
    \ (Section 8.2). It is included in the \"time\" module and accessed via\n\n```\n\
    import time\n```\n\nThe instruction\n\n```\ntime.sleep(seconds)\n```\n\nsets a\
    \ fixed delay time in seconds. Alternatively, only the sleep command itself can\
    \ be imported:\n\n```\nfrom time import sleep\n```\n\nIn this case, the statement\
    \ can be reduced to\n\n```\nsleep(seconds)\n```\n\nEven so the command can also\

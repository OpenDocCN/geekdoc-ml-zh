    # 10.5 Machine Vision using OpenCV


    **Computer Vision (CV)** is one of the most interesting topics of AI. It provides
    functionalities and routines that allow the Raspberry Pi, for example, to perform
    amazing tasks using the appropriate libraries. OpenCV is ideally suited to record
    and process images or videos if a PiCam is connected to the Raspberry Pi.


    The classic PiCam provides the following features:


    +   - **Dimensions:** 25 mm × 20 mm × 9 mm

    - **Sensor:** 5 megapixels with fixed focus lens

    - **Image Resolution:** up to 2592 × 1944 pixels

    - **Video resolution:** 1920 × 1080 at 30 frames/s, 1280 × 720 at 60 frames/s,
    640 × 480 at 60 to 90 frames/s

    - **Connection:** CSI via ribbon cable



  md: '# Chapter 1 • Introduction


    We are increasingly confronted with the applications of "Artificial Intelligence"
    (AI): recommendations for music or video, navigation systems, shopping suggestions
    and so on are based on procedures that can be more or less assigned to this area.
    However, there is often a lack of clarity regarding the terms


    +   - Artificial Intelligence (AI)

    - Machine Learning (ML)

    - Deep Learning (DL)

    - Neural Networks (NN)


    One of the most frequent queries to popular search engines is therefore:


    > "What is the actual difference between AI and Machine Learning?"


    Although the terms are closely related, they are by no means synonymous:


    **Artificial Intelligence** is, in principle, the general knowledge base. It forms
    the *foundation*, just as mathematics is the basis for physics or electrical engineering.
    AI tries to solve problems without rigid algorithms using highly developed machines.


    **Machine Learning** is a branch of artificial intelligence. The focus is on automatic
    learning from experience, i.e., without a special program being created for it.
    There are various methods for this, for example neural networks or general statistical
    methods.


    **Deep Learning** or **Deep Neural Learning** is again a subset of machine learning.
    Here, with the help of neural networks, methods and systems get developed that
    are modeled on biological brains.


    The term Artificial Intelligence was coined in 1956 at an international conference
    called *The Dartmouth Summer Research Project*. A fundamental idea was to model
    the human brain and to construct more advanced computer systems based on this
    knowledge. It was believed that it would soon transpire how the human mind works.
    The transfer to a machine should then only be a small step.

    This turned out to be slightly overoptimistic. Nevertheless, some important findings
    have been gathered at the conference. It was stated, for example, that the key
    factors for an intelligent machine should be


    +   - independent learning;

    - natural language processing;

    - creativity.


    Wisdom, creativity and social skills are terms that hardly apply to machines up
    to now. Rather, the tasks that AI scientists are currently concentrating on are:'
  merge: -1

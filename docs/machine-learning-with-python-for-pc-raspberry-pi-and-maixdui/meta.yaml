    Machine Learning with Python


    External USB sound cards usually also provide better sound quality than the direct
    output of the Raspberry Pi. However, there are considerable differences here,
    so you should inform yourself about the quality to be expected before buying a
    specific system. It should also be noted that not all USB sound cards are compatible
    with the Raspberry Pi.


    If a webcam with integrated microphone is used instead of the sound card, the
    camera is also available to other AI projects such as object and face recognition,
    etc.


    Both solutions require no further configuration on the RPi. If the devices are
    compatible with the Pi OS currently in use, they are automatically detected and
    integrated into the system (Figure 14.3). The instruction


    ```

    lsusb

    ```


    returns a list of all connected USB devices. If the webcam or the sound card are
    plugged in, they appear in the list.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_179_0.png)



  md: '# Chapter 8 • Programming and Development Environments


    Since Python has developed into a quasi-standard in the field of programming languages
    for machine learning and AI, various **Integrated Development Environments (IDEs)**
    have emerged over time. Each of these variants has its own specific advantages
    and disadvantages. The most important IDEs for Python programming are:


    +   - Thonny

    - MaixPy IDE

    - Anaconda

    - Spyder


    Thonny is especially popular because it comes installed on the Raspberry Pi by
    default. This made the IDE the classic programming tool in the maker scene.


    With MaixPy, an IDE specially tailored to the MaixDuino is available. This allows
    the specific performance features of this board to be used most efficiently. In
    particular, the video output of this IDE can be used.


    Anaconda and Spyder are the classic tools when it comes to implementing machine
    learning projects in Python. They offer installation packages for all common operating
    systems, ranging from Windows, Linux and MacOS to Raspberry Pi OS.


    The individual versions are described in more detail in the following sections.
    It also explains what advantages and disadvantages they offer for the respective
    applications and systems. After working through the chapters, it should no longer
    be a problem for the user to select the optimal IDE for a particular project.


    # 8.1 Thonny — a Python IDE for beginners and intermediates


    Thonny is the standard IDE for Python and MicroPython programming. This IDE enjoys
    continuous updating and ongoing development, and it is therefore quite future-proof.
    Thonny is also available for all common operating systems. It is even preinstalled
    as standard on the current Raspberry Pi OS. In general, the installation is quite
    easy, so no problems should occur with the installation process.


    In this book, **Thonny 3.3.10** in the version for PCs under Windows 10 was used.
    In principle, future versions should be compatible. However, if unexpected problems
    occur, consider reverting to this version.


    The appropriate download package can be found on the Internet (see LINKS.txt).
    When the download is finished, the installation file can be started. Now you just
    have to follow the wizard until the installation process is complete and the Thonny
    IDE can be opened.'

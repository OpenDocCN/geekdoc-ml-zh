- md: 'However, based on the success of the GPUs, several large chip manufacturers
    began to develop and produce new types of chips without the classic Von Neumann
    architecture. Instead of the conventional structure, neuromorphic structures were
    now used. Figure 17.1 shows the basic structure of these chips:


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_231_0.png)


    Instead of a CPU and a central memory, the chips contain a large number of combined
    and independent CPU/memory units that can communicate via a tight network. The
    structure thus approximates the human brain, which also consists of a dense neuronal
    network. The chips often contain thousands of computer cores and thus a multitude
    of individually programmable "neurons". The individual cores are connected via
    a complex network of configurable connections. The "electronic neurons" transmit,
    receive and collect signals in the form of so-called spikes, whereby a new spike
    is generated whenever the summed input signals reach the activation threshold
    set in the training phase [12]. The chips thus behave very similar on the hardware
    level as the neural networks presented in Chapter 11 worked in the software range.


    By transferring the back-propagation algorithm to the hardware level, the first
    self-learning chips were created. With the help of extensive data sets from the
    Internet, the internal neuromorphic connections could now be trained and optimized,
    so that increasingly better results were achieved in many applications. The hardware
    systems could thus cope with new tasks without special programming and, in a certain
    sense, "learn" new relationships independently.


    Especially in robotics and in the field of autonomous driving, neuromorphic computing
    has an outstanding potential for innovation. Audiovisual information, i.e., images
    and speech, but also sensor data can be captured and processed extremely effectively.
    Since neuromorphic structures can be implemented directly on conventional silicon
    chips, no costly new technological developments are necessary. This is another
    reason why development in this area is progressing at high speed [2, 12].


    ## Chapter 17 • Dreams of the Future: from KPU to Neuromorphic Chips


    Modern lawn mowers are capable of independently covering the lawn area assigned
    to them. Obstacles such as bushes or trees are automatically detected and subsequently
    avoided. In this way, the machines can practically create a "picture" of their
    surroundings on their own and set up their actions accordingly. The same applies
    to cleaning robots. These are also able to learn the structure of their domestic
    environment. Problems such as getting stuck on furniture or other furnishings
    can thus be avoided. Robot systems based on neuromorphic chips will increasingly
    interact with their environment in a more human-like way. In medical technology,
    the technology has already taken over various routine tasks. For example, automated
    image processing systems relieve doctors of the burden of analyzing X-rays or
    computer tomographic images. In the detection of certain types of cancer, the
    systems already outperform experienced specialists in some areas.


    In future, tablets and smartphones will adapt automatically to the habits of their
    users. The devices will thus become genuine personal assistants. The setup and
    personalization that is often still tedious today can then be completely eliminated.
    The recognition of faces or fingerprints to unlock devices is already a typical
    task for neuromorphic chips.


    Neuromorphic structures will increasingly blur the boundaries between technical
    and biological systems. So far, these applications are only to be found in a few
    niches. However, the successes in medicine, in smart home applications or in facial
    and fingerprint recognition leave no doubt about the direction of future developments.


    Classical processors and microcontrollers will undoubtedly reach their technical
    limits at some point. Moore''s Law, i.e., the continuous doubling of the performance
    of electronic systems within approx. 1½ years, cannot apply forever. Moreover,
    ever smaller chip structures and higher clock frequencies do not automatically
    lead to "smarter" systems. Other physical limits, such as power dissipation or
    the laws of quantum mechanics, are also increasingly limiting the performance
    of modern chips. This limits the possibilities of classical systems with regard
    to sensory data processing, image and speech recognition. Conventional technologies
    require supercomputers or entire server farms for these projects. As a result,
    voice-controlled assistants such as Alexa or Siri are dependent on an online connection
    with powerful computers in a cloud set-up.


    Neuromorphic chips, on the other hand, do not process audiovisual data sequentially,
    but highly parallel. Similar to a biological brain, "sensory impressions" can
    thus be evaluated quickly and efficiently. Neurons in the brain are also capable
    of reacting flexibly to changing sounds, images or other sensory impressions because
    the connection structures in the brain are flexible. Comparable to classical "learning",
    this facilitates adaptation to new situations. Systems with brain-like structures
    are much more suitable for corresponding tasks than conventional computers. Neuromorphic
    units can therefore adapt very efficiently to changes and variations, for example
    in speech and image recognition.


    To further increase efficiency, the latest developments are also trying to use
    the third spatial dimension. Similar to the human brain, this would create a compact
    system with highly efficient three-dimensional networking. Such a geometry can
    be scaled to almost any size. Due to the dual function of artificial neurons as
    memory and CPU, neuromorphic chips achieve high computing power densities and
    work on low electrical power requirements. Neuromorphic chips consume only a few
    watts of electrical power and get by with a fraction of the energy required by
    a conventional computer.


    So far, the performance of neuromorphic systems is still far from that of a human
    brain. At best, neuromorphic structures are currently comparable to a mouse brain
    in some special areas. However, when it comes to processing motoric and sensory
    data as well as "learning", current chips are already significantly faster than
    Von Neumann computers. Obviously, it is not practical to emulate the brain with
    special software on conventional processors. The software-based recognition of
    dogs or cats in videos has clearly demonstrated this. Such procedures are not
    suitable for developing machines with greater "intelligence".


    The task of conventional computers is to process numerical data. The systems were
    never optimized for processes requiring intelligence. Thus, it is becoming increasingly
    clear, that chip technology must be fundamentally changed if machines are to behave
    more intelligently.


    The basic ideas on neuromorphic chip technology have been known for decades. Corresponding
    analogue circuits were already developed in the 1990s. These were already able
    to simulate the electrical activity of neurons and synapses in the brain. Development
    activities aimed at integrating complex analogue circuits into compact chips were
    applied in highly specialized ICs for noise suppression. Using this technology,
    so-called cochlear implants, i.e., systems that convert sound directly into signals
    for the human auditory nerve, have already restored a certain degree of hearing
    to many people.


    Such technologies are also increasingly being used in smartphones and other audiovisual
    devices. However, the application of this "analog AI technology" has also remained
    limited to a few specialized areas. Up to now, digital processors and units such
    as CPUs, GPUs, gate arrays or highly specialized digital ICs have been predominantly
    used for training and deploying AI algorithms. However, true neuromorphic hardware
    structures are expected to speed up AI applications 1000- to 10,000-fold when
    analog computing elements are used. The signals will then no longer be in digital
    form as pure zero and one values but will change continuously. In biological brains,
    signal processing and transmission also takes place via quasi-analog signals.
    In this way, significantly more information can be transmitted per data channel
    and the required power is reduced considerably.'
  mdcn: '然而，基于GPU的成功，几家大型芯片制造商开始开发和生产新型芯片，这些芯片不再采用经典的冯·诺依曼架构。取而代之的是，它们采用了神经形态结构。图17.1展示了这些芯片的基本结构：


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_231_0.png)


    这些芯片不再包含一个CPU和一个中央存储器，而是包含大量组合且独立的CPU/存储单元，这些单元可以通过一个紧密的网络进行通信。因此，这种结构近似于人脑，人脑也是由密集的神经元网络组成的。这些芯片通常包含数千个计算核心，因此也就有了大量可单独编程的“神经元”。各个核心通过一个复杂的可配置连接网络相互连接。“电子神经元”以所谓的脉冲形式传输、接收和收集信号，每当输入信号的总和达到训练阶段设定的激活阈值时，就会产生一个新的脉冲[12]。因此，这些芯片在硬件层面的行为与第11章介绍的在软件层面运行的神经网络非常相似。


    通过将反向传播算法转移到硬件层面，第一批自学习芯片诞生了。借助来自互联网的大量数据集，现在可以训练和优化内部的神经形态连接，从而在许多应用中取得越来越好的结果。因此，硬件系统无需特殊编程就能处理新任务，并且在某种意义上能够独立“学习”新的关系。


    特别是在机器人技术和自动驾驶领域，神经形态计算具有卓越的创新潜力。视听信息，即图像和语音，以及传感器数据，都可以被极其有效地捕获和处理。由于神经形态结构可以直接在传统硅芯片上实现，因此不需要昂贵的新技术开发。这也是该领域发展迅速的另一个原因[2,
    12]。


    ## 第17章 • 未来的梦想：从KPU到神经形态芯片


    现代割草机能够独立覆盖分配给它们的草坪区域。灌木或树木等障碍物会被自动检测并随后避开。通过这种方式，这些机器实际上可以自行创建周围环境的“图像”，并相应地设置其行动。清洁机器人也是如此。它们也能够学习其家庭环境的结构。这样就可以避免卡在家具或其他陈设上的问题。基于神经形态芯片的机器人系统将越来越多地以更人性化的方式与其环境互动。在医疗技术领域，该技术已经接管了各种常规任务。例如，自动化的图像处理系统减轻了医生分析X射线或计算机断层扫描图像的负担。在检测某些类型的癌症方面，这些系统在某些领域已经超越了经验丰富的专家。


    未来，平板电脑和智能手机将自动适应其用户的习惯。因此，这些设备将成为真正的个人助理。如今仍然繁琐的设置和个性化过程届时可以完全消除。识别面部或指纹以解锁设备已经是神经形态芯片的典型任务。


    神经形态结构将日益模糊技术系统和生物系统之间的界限。到目前为止，这些应用仅存在于少数利基市场。然而，在医疗、智能家居应用或面部和指纹识别方面的成功，无疑指明了未来发展的方向。


    经典处理器和微控制器无疑将在某个时候达到其技术极限。摩尔定律，即电子系统的性能在大约1.5年内持续翻倍，不可能永远适用。此外，不断缩小的芯片结构和更高的时钟频率并不会自动导致“更智能”的系统。其他物理限制，如功耗或量子力学定律，也日益限制着现代芯片的性能。这限制了经典系统在感官数据处理、图像和语音识别方面的能力。传统技术需要超级计算机或整个服务器集群来完成这些项目。因此，像Alexa或Siri这样的语音控制助手依赖于与云端强大计算机的在线连接。


    另一方面，神经形态芯片不是顺序处理视听数据，而是高度并行地处理。类似于生物大脑，因此可以快速高效地评估“感官印象”。大脑中的神经元也能够灵活地对变化的声音、图像或其他感官印象做出反应，因为大脑中的连接结构是灵活的。这类似于经典的“学习”，有助于适应新情况。具有类脑结构的系统比传统计算机更适合相应的任务。因此，神经形态单元可以非常高效地适应变化和差异，例如在语音和图像识别中。


    为了进一步提高效率，最新的发展也在尝试利用第三维空间。类似于人脑，这将创建一个具有高效三维网络的紧凑系统。这种几何结构可以扩展到几乎任何尺寸。由于人工神经元兼具存储器和CPU的双重功能，神经形态芯片实现了高计算功率密度，并且在低电功耗下工作。神经形态芯片仅消耗几瓦电功率，所需能量仅为传统计算机的一小部分。


    到目前为止，神经形态系统的性能还远不及人脑。目前，神经形态结构在某些特定领域最多只能与小鼠大脑相媲美。然而，在处理运动和感官数据以及“学习”方面，当前的芯片已经明显快于冯·诺依曼计算机。显然，在传统处理器上用特殊软件来模拟大脑是不切实际的。基于软件的视频中狗或猫的识别已经清楚地证明了这一点。这种方法不适合开发具有更高“智能”的机器。


    传统计算机的任务是处理数值数据。这些系统从未针对需要智能的过程进行优化。因此，越来越清楚的是，如果机器要表现得更智能，芯片技术必须从根本上改变。


    关于神经形态芯片技术的基本思想已经为人所知数十年。相应的模拟电路早在20世纪90年代就已经开发出来。这些电路已经能够模拟大脑中神经元和突触的电活动。旨在将复杂模拟电路集成到紧凑芯片中的开发活动被应用于用于降噪的高度专用集成电路。利用这项技术，所谓的耳蜗植入物，即将声音直接转换为人类听觉神经信号的系统，已经为许多人恢复了一定程度的听力。


    此类技术也越来越多地用于智能手机和其他视听设备。然而，这种“模拟AI技术”的应用仍然局限于少数专业领域。到目前为止，数字处理器和单元，如CPU、GPU、门阵列或高度专用的数字IC，主要用于训练和部署AI算法。然而，当使用模拟计算元件时，真正的神经形态硬件结构预计将使AI应用加速1000到10000倍。信号将不再是纯0和1值的数字形式，而是连续变化的。在生物大脑中，信号处理和传输也是通过准模拟信号进行的。通过这种方式，每个数据通道可以传输显著更多的信息，并且所需功率大大降低。'

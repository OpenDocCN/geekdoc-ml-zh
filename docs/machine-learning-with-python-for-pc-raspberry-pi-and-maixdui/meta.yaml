    # 15.6 Social minefields? — face identification


    As already explained in the introduction to this chapter, face identification
    must be clearly distinguished from pure face recognition. In many parts of the
    world, face identification in particular is increasingly viewed critically. For
    example, the use of face recognition technology by police or authorities has already
    been banned in some cities. Politicians consider the danger of using facial recognition
    technology to be greater than the potential benefits in the fight against crime.
    The "uninterrupted surveillance by camera systems threatens the possibility of
    living free from observation by police, authorities or government," is a statement
    in a city council resolution of a Californian city.


    Yet the technology is poorly regulated in many countries. In addition to potential
    misuse of the systems by dictatorial regimes, unacceptable invasions of privacy
    could therefore also occur in democratic states.


    The biometric data collected via facial identification is unique to each person.
    In addition to faces, however, the eyes alone (retina scan), the course of veins
    under the skin, human voices, the way of walking or typing on a keyboard can also
    be used for personal identification. Authorities, governments and even companies
    all over the world use recording devices to collect biometric data. This means
    that in principle any person, once recorded, could be tracked in all their movements.
    When the person accesses office equipment, checks in at an airports, or gets its
    train tickets checked - facial identification is playing a central role in more
    and more areas of life. Specifically in the Far East, biometric applications are
    experi-'
  - '[PAGE 203]


    Machine Learning with Python


    encing a real boom. In the major Asian cities, the new technologies are already
    changing every-day''s life to a considerable extent. For example, employees no
    longer have to swipe chip cards through a reader when entering their office building.
    A glance at a dedicated camera is sufficient to identify the employee. In railway
    stations or airports, automatic recognition systems check passenger tickets against
    their ID cards. In some Asian cities, entire subway systems are already monitored
    using facial recognition techniques.


    The algorithms behind facial identification are trained with huge data sets. Often,
    proprietary deep learning platforms are used to train large and multi-layered
    neural networks. However, it does not remain a static system, rather the parameters
    are constantly adjusted until all desired information is reliably delivered.


    Automatic person identification should therefore always be viewed with a certain
    degree of skepticism. For this reason, too, it is of utmost importance to know
    the potentials and possibilities in this field as precisely as possible. In the
    following sections, the technique of face identification will be examined in more
    detail. In addition to the purely technical circumstances, one should also think
    about the possible areas of application. Because ultimately, only people who have
    dealt with the new technology, at least to a certain extent, will be able to assess
    its benefits and dangers.


    # 15.7 Big Brother RPi: face identification in practice


    The ''openCV'' software library, which was already introduced in Section 10.5,
    is also suitable for applications in the field of face recognition and identification.
    Among other things, the library contains ML-based algorithms to search for faces
    in an image. Since faces have a complex structure and are subject to considerable
    individual variation, there is no simple test that could find a face in any image
    via an "if" decision. Instead, there is a multitude of patterns and functions
    that are coordinated with each other. The algorithms divide the problem of identifying
    a face into several sub-tasks, each of which is easy for a machine algorithm to
    solve. These associated algorithms are also called "classifiers".


    For the most efficient image recognition, OpenCV uses so-called cascades. Like
    a series of waterfalls, the problem is thus divided into several stages. For each
    image block, a rough but quick test is performed. If one of these tests leads
    to a positive result, a slightly more detailed test is performed and so on. The
    algorithm can perform 30 to 50 of these stages or cascades in succession. Only
    when all stages have been passed with positive results, the recognition of a face
    is confirmed.


    A significant advantage of this procedure is that the majority of an image in
    the first stages only yield negative results. This means that the algorithm does
    not waste time testing all the functions for each block in detail. This can speed
    up the process considerably. Face recognition procedures can thus be carried out
    almost in real time even on less powerful systems such as the RPi.


    Since face recognition is one of the most important applications of machine learning,
    OpenCV has a whole series of integrated cascades with which not only faces but
    also eyes, hands or legs etc. can be recognized. Moreover, it is even possible
    to interpret the mood


    • 204'
  - '[PAGE 204]


    of a person by analyzing the shape of the mouth, for example. These principles
    are also the basis of the well-known procedures in digital cameras, which automatically
    trigger the shutter as soon as a person''s smile is detected in the image.


    Due to the high efficiency of the OpenCV algorithms, even with the relatively
    modest computing power of a Raspberry Pi, a quite reliable face recognition can
    be performed. The following software packages are required for this project:


    +   - **OpenCV** for basic processing of images and videos in real time. The package
    also includes some machine learning algorithms.

    - **Face-recognition** for actual face recognition, the creation of reference
    frames around faces, etc.

    - **Imutils** including a number of handy functions to speed up OpenCV algorithms
    on the Raspberry Pi


    After the libraries are installed, the RPi can be trained using a series of face
    images. The images are automatically compiled into a training data set. Afterwards,
    the Raspberry can not only detect the known people as faces in a live video stream,
    but also identify them. However, you should keep in mind that video recordings
    in public areas are usually illegal.


    Installing and setting up the packages and libraries necessary for face recognition
    requires advanced knowledge and experience in using the Raspberry Pi. But even
    experienced users should plan at least two hours for this task. The exact duration
    depends, among other things, on the download speed of the available internet connection.


    Since the library versions in this currently very active area change rapidly,
    a certain amount of experimentation is necessary here, as it is quite possible
    that a newer program version is not compatible with the one presented here. As
    usual, the first step should be


    ```

    sudo apt-get update & sudo apt-get upgrade

    ```


    before starting a major new project. Then the actual installation can be started.
    The individual instructions for this can be copied from the file "Install_FaceRecognition.txt"
    directly into the terminal window of the Raspberry. Any prompts or questions ("Would
    you like to continue? (y/n)") must be acknowledged with the y and the enter key.


    Figure 15.8 shows the successful installation of version 4.5.1 of openCV on the
    Raspberry Pi.'
- md: "Machine Learning with Python\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_205_0.png)\n\
    \nNow you can install the **face recognition software**:\n\n```\nsudo pip3 install\
    \ face-recognition\n```\n\nand **imutils**:\n\n```\nsudo pip3 install imutils.\n\
    ```\n\nIt may take another hour or so to download these packages. After they have\
    \ been successfully installed, practical applications can be explored. The first\
    \ step in the following chapter is to try to localize faces in the field of vision\
    \ of a camera.\n\n## 15.8 Smile, please ;-)\n\nThe downloaded packages contains\
    \ both a trainer and a detector for face identification. Here, the focus is on\
    \ the detector first. OpenCV already contains many pre-trained classifiers, e.g.,\
    \ for\n\n- faces;\n- eyes;\n- a smile.\n\nThe download link can be found in the\
    \ LINKS.txt file (XML-files). The classifier files are stored in a folder, e.g.,\
    \ under\n\n```\nface_detection_recognition/HairCascades\n```\n\nThen, with just\
    \ a few lines, a very effective face detection system can be built. The Python\
    \ program for this (FaceDetector_1V0.py) is again included in the download package\
    \ and appears to be very compact:\n\n```\nimport cv2\n\ncascade=\"HaarCascades/haarcascade_frontalface_default.xml\"\
    \ndetector = cv2.CascadeClassifier(cascade)\nblue=(255,0,0)\nframeworkwidth=3\n\
    \ncap = cv2.VideoCapture(0)\ncap.set(3,320) # set Width\ncap.set(4,240) # set\
    \ Height\n\nwhile True:\n    ret, img = cap.read()\n    gray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n    faces = detector.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30))\n\
    \    for (x,y,w,h) in faces:\n        cv2.rectangle(img,(x,y),(x+w,y+h),blue,frameworkwidth)\n\
    \    cv2.imshow(\"Press 'q' quit\",img)\n    key = cv2.waitKey(1) & 0xFF\n   \
    \ if key == ord(\"q\"):\n        print(\"bye...\")\n        break\ncap.release()\n\
    cv2.destroyAllWindows()\n```\n\nAfter loading the OpenCV library, the cascade\
    \ to be used is loaded from the above-mentioned directory:\n\n```\ncascade=\"\
    HaarCascades/haarcascade_frontalface_default.xml\"\n```\n\nthen the associated\
    \ classifier is defined as \"detector\":\n\n```\ndetector = cv2.CascadeClassifier(cascade)\n\
    ```\n\nThe video stream of the active camera is evaluated using:\n\n```\ncap =\
    \ cv2.VideoCapture(0)\ncap.set(3,320) # set Width\ncap.set(4,240) # set Height\n\
    ```\n\nThe resolution of the video image is also set in these lines. The parameters\
    \ \"3\" and \"4\" of the cap.set function are used to define the width and height\
    \ of the video stream in pixel units. It should be noted that high resolutions\
    \ slow down the image processing considerably. However, with the 0.7 megapixel\
    \ resolution (320 × 240) used here, almost real-time processing can be achieved.\
    \ Using\n\n```\nret, img = cap.read()\n```\n\nthe continuous video stream of the\
    \ camera is broken down into individual images (frames).\n\n# Machine Learning\
    \ with Python\n\nThe read() function reads directly from the specified video source,\
    \ in this example the webcam. The return values are:\n\n- the actual video frame\
    \ read - i.e., one frame per loop pass;\n- a return code.\n\nThe return code shows,\
    \ for example, whether frames are actually read. If a video file is used, the\
    \ end of the video can be recognized in this way. When reading from the webcam,\
    \ this does not apply, since the video stream runs practically endlessly.\n\n\
    In the main loop, the video images are first converted into a black and white\
    \ version, as the hair cascades work more efficiently in this way. Then the detector\
    \ is applied to the B/W video stream just generated:\n\n```\nfaces = detector.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30),\n\
    \                  flags=cv2.CASCADE_SCALE_IMAGE)\n```\n\nThe detector uses three\
    \ other parameters in addition to the video stream itself:\n\n1. scaleFactor:\
    \ for faster detection, the value can be increased up to 1.4, but then there is\
    \ an increasing risk that faces will be overlooked.\n2. minNeighbors: values of\
    \ 3-6 are optimal for this application; higher values lead to fewer detections,\
    \ but with better detection accuracy.\n3. minSize — minimum detected face size.\
    \ Smaller objects are ignored. Normally a value of 30x30 pixels leads to good\
    \ results.\n\nOnce a face is detected, four parameters are returned:\n\n- x: x-coordinate,\
    \ upper left image border\n- y: y-coordinate, upper left image border\n- w: width\
    \ of the detected face in the video stream in pixels\n- h: height of the detected\
    \ face in the video stream in pixels\n\nUsing the function\n\n```\ncv2.rectangle(img,(x,y),(x+w,y+h),blue,framewidth)\n\
    ```\n\na frame with the corresponding coordinates in the desired color (here blue)\
    \ and the thickness \"framewidth\" is drawn around each recognized face (Figure\
    \ 15.9).\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_208_0.png)\n\nFigure 15.9:\
    \ Definition of the detector frame.\n\nUsing the **for loop:**\n\n```\nfor (x,y,w,h)\
    \ in faces\n```\n\nall faces recognized by \"faces\" are collected. Therefore,\
    \ even the detection of several faces in one image is no problem for the detector.\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_208_1.png)\n\nFigure 15.10: Multiple\
    \ faces are also captured without any problems.\n\nThe length of the return vector\
    \ of \"faces\" allows you to determine how many faces were detected in the image.\
    \ This can be done using:\n\n```\nprint(\"numer of faces detected:\", len(faces))\n\
    ```\n\nWith this, the applications already presented in Section 15.3, such as\
    \ determining the number of guests at a party or the number of customers in a\
    \ salesroom, etc., can be implemented.\n\nMachine Learning with Python\n\nAs can\
    \ be easily determined through your own experiments, photos of faces are also\
    \ recognized without any problems with this setup. This also highlights a major\
    \ problem of the method. In security applications, it would be very easy to deceive\
    \ the system by using photos. This is where the superiority of 3-D measurement\
    \ methods becomes apparent. With the help of two or more cameras, it is easily\
    \ possible to distinguish a simple two-dimensional photo from a real three-dimensional\
    \ person.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_209_0.png)\n\nAnother way\
    \ to prevent users from using someone else's photo is to use so-called live tests.\
    \ Here, not only a static image is used but a live video stream as well in which\
    \ the persons in question have to speak or move their heads.\n\nNow that faces\
    \ have been successfully detected, you can also try to gain further information\
    \ and details. For example, the eyes can be localized in a face. This can be necessary\
    \ for iris recognition, for example. The following program (*Eye_detector_1V0.py*)\
    \ puts \"glasses on a face\":\n\n```\nimport cv2\n\nfaceCascade=\"HaarCascades/haarcascade_frontalface_default.xml\"\
    \neyesCascade=\"HaarCascades/haarcascade_eye.xml\"\n\ncap = cv2.VideoCapture(0)\n\
    cap.set(3,640) # set Width\ncap.set(4,480) # set Height\n\ndetectorFace=cv2.CascadeClassifier(faceCascade)\n\
    detectorEyes=cv2.CascadeClassifier(eyesCascade)\n\nwhile True:\n    ret, img =\
    \ cap.read()\n    # img = cv2.flip(img, -1)\n    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \    #faces = faceCascade.detectMultiScale(gray,scaleFactor=1.3,minNeighbors=5,minSize=(30,\
    \ 30))\n    faces = detectorFace.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30),flags=cv2.CASCADE_SCALE_IMAGE)\n\
    \n    for (x,y,w,h) in faces:\n        print(\"face detected\")\n        print(x,y,w,h)\n\
    \        cv2.rectangle(img,(x,y),(x+w,y+h),(255,0,0),2)\n        roi_gray = gray[y:y+h,\
    \ x:x+w]\n        roi_color = img[y:y+h, x:x+w]\n\n        eyes = detectorEyes.detectMultiScale(roi_gray,scaleFactor=1.5,minNeighbors=10,minSize=(5,\
    \ 5),)\n\n        for (ex, ey, ew, eh) in eyes:\n            print(\"eyes detected\"\
    )\n            print(ex,ey,ew,eh)\n            cv2.rectangle(roi_color, (ex, ey),\
    \ (ex + ew, ey + eh), (0, 255, 0),2)\n\n    cv2.imshow('\"q\" to quit', img)\n\
    \n    key = cv2.waitKey(1) & 0xFF\n    if key == ord(\"q\"):\n        print(\"\
    bye...\")\n        break\n\ncap.release()\ncv2.destroyAllWindows()\n```\n\nThe\
    \ result is shown in Figure 15.12.\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_211_0.png)\n\
    \nFigure 15.12: Eye detection.\n\nCapturing a smile goes even one step further.\
    \ This function is already implemented in many digital cameras. It is thus possible\
    \ to activate the camera's self-timer and ensure that a picture is only taken\
    \ when all the people in front of the lens are showing smiles and friendly faces.\n\
    \nWhat is interesting here is that not only the mouth is localized. Rather, its\
    \ specific shape must also be detected, since not every mouth automatically means\
    \ a smile. This already shows that ML methods can definitely be capable of determining\
    \ the emotional state of a person.\n\nSome experiments in this area can be carried\
    \ out using the program *Smile_detect_1V0.py*. Although this is still a very rudimentary\
    \ implementation, it shows that the program is quite capable of distinguishing\
    \ between serious and friendly faces."
  mdcn: "# 使用Python进行机器学习\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_205_0.png)\n\
    \n现在你可以安装**人脸识别软件**：\n\n```\nsudo pip3 install face-recognition\n```\n\n以及**imutils**：\n\
    \n```\nsudo pip3 install imutils.\n```\n\n下载这些包可能还需要一个小时左右。成功安装后，就可以探索实际应用了。下一章的第一步是尝试在摄像头的视野中定位人脸。\n\
    \n## 15.8 请微笑 ;-)\n\n下载的包包含用于人脸识别的训练器和检测器。这里首先关注检测器。OpenCV已经包含了许多预训练的分类器，例如用于：\n\
    \n- 人脸；\n- 眼睛；\n- 微笑。\n\n下载链接可以在LINKS.txt文件（XML文件）中找到。分类器文件存储在一个文件夹中，例如在\n\n```\n\
    face_detection_recognition/HairCascades\n```\n\n下。\n\n然后，只需几行代码，就可以构建一个非常有效的人脸检测系统。为此的Python程序（FaceDetector_1V0.py）再次包含在下载包中，并且看起来非常紧凑：\n\
    \n```\nimport cv2\n\ncascade=\"HaarCascades/haarcascade_frontalface_default.xml\"\
    \ndetector = cv2.CascadeClassifier(cascade)\nblue=(255,0,0)\nframeworkwidth=3\n\
    \ncap = cv2.VideoCapture(0)\ncap.set(3,320) # set Width\ncap.set(4,240) # set\
    \ Height\n\nwhile True:\n    ret, img = cap.read()\n    gray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n    faces = detector.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30))\n\
    \    for (x,y,w,h) in faces:\n        cv2.rectangle(img,(x,y),(x+w,y+h),blue,frameworkwidth)\n\
    \    cv2.imshow(\"Press 'q' quit\",img)\n    key = cv2.waitKey(1) & 0xFF\n   \
    \ if key == ord(\"q\"):\n        print(\"bye...\")\n        break\ncap.release()\n\
    cv2.destroyAllWindows()\n```\n\n加载OpenCV库后，从上述目录加载要使用的级联文件：\n\n```\ncascade=\"\
    HaarCascades/haarcascade_frontalface_default.xml\"\n```\n\n然后将关联的分类器定义为\"detector\"\
    ：\n\n```\ndetector = cv2.CascadeClassifier(cascade)\n```\n\n使用以下代码评估活动摄像头的视频流：\n\
    \n```\ncap = cv2.VideoCapture(0)\ncap.set(3,320) # set Width\ncap.set(4,240) #\
    \ set Height\n```\n\n这些行中还设置了视频图像的分辨率。cap.set函数的参数\"3\"和\"4\"用于以像素为单位定义视频流的宽度和高度。需要注意的是，高分辨率会显著减慢图像处理速度。然而，使用此处采用的0.7百万像素分辨率（320\
    \ × 240），几乎可以实现实时处理。使用\n\n```\nret, img = cap.read()\n```\n\n摄像头的连续视频流被分解为单个图像（帧）。\n\
    \n# 使用Python进行机器学习\n\nread()函数直接从指定的视频源（在此示例中为网络摄像头）读取。返回值为：\n\n- 读取的实际视频帧——即每次循环传递一帧；\n\
    - 返回码。\n\n返回码显示，例如，是否实际读取了帧。如果使用视频文件，可以通过这种方式识别视频的结束。从网络摄像头读取时，这不适用，因为视频流实际上是无限运行的。\n\
    \n在主循环中，视频图像首先转换为黑白版本，因为这样Haar级联工作更高效。然后将检测器应用于刚刚生成的黑白视频流：\n\n```\nfaces = detector.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30),\n\
    \                  flags=cv2.CASCADE_SCALE_IMAGE)\n```\n\n除了视频流本身，检测器还使用三个其他参数：\n\
    \n1. scaleFactor：为了加快检测速度，可以将该值增加到1.4，但这样会增加遗漏人脸的风险。\n2. minNeighbors：对于此应用，3-6的值是最佳的；更高的值会导致检测数量减少，但检测精度更高。\n\
    3. minSize —— 最小检测人脸尺寸。较小的对象将被忽略。通常30x30像素的值会产生良好的结果。\n\n一旦检测到人脸，将返回四个参数：\n\n\
    - x：x坐标，图像左上边界\n- y：y坐标，图像左上边界\n- w：视频流中检测到的人脸宽度（像素）\n- h：视频流中检测到的人脸高度（像素）\n\n\
    使用函数\n\n```\ncv2.rectangle(img,(x,y),(x+w,y+h),blue,framewidth)\n```\n\n在每个识别出的人脸周围绘制一个具有相应坐标、所需颜色（此处为蓝色）和厚度\"\
    framewidth\"的边框（图15.9）。\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_208_0.png)\n\
    \n图15.9：检测器边框的定义。\n\n使用**for循环：**\n\n```\nfor (x,y,w,h) in faces\n```\n\n收集\"\
    faces\"识别出的所有人脸。因此，即使在一张图像中检测多张人脸，对检测器来说也不是问题。\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_208_1.png)\n\
    \n图15.10：多张人脸也能毫无问题地被捕获。\n\n\"faces\"返回向量的长度允许你确定图像中检测到了多少张人脸。这可以使用：\n\n```\n\
    print(\"numer of faces detected:\", len(faces))\n```\n\n来完成。这样，第15.3节中已经介绍的应用，例如确定派对上的客人数量或销售厅中的顾客数量等，就可以实现了。\n\
    \n使用Python进行机器学习\n\n通过自己的实验可以轻松确定，使用此设置也能毫无问题地识别面部照片。这也突出了该方法的一个主要问题。在安全应用中，使用照片欺骗系统将非常容易。这就是3D测量方法优越性显现的地方。借助两个或多个摄像头，可以轻松区分简单的二维照片和真实的三维人。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_290_0.png)\n\n防止用户使用他人照片的另一种方法是使用所谓的活体检测。这里不仅使用静态图像，还使用实时视频流，其中相关人员必须说话或移动头部。\n\
    \n既然人脸已经成功检测到，你也可以尝试获取更多信息和细节。例如，可以在人脸中定位眼睛。这对于虹膜识别等可能是必要的。以下程序（*Eye_detector_1V0.py*）为\"\
    人脸戴上眼镜\"：\n\n```\nimport cv2\n\nfaceCascade=\"HaarCascades/haarcascade_frontalface_default.xml\"\
    \neyesCascade=\"HaarCascades/haarcascade_eye.xml\"\n\ncap = cv2.VideoCapture(0)\n\
    cap.set(3,640) # set Width\ncap.set(4,480) # set Height\n\ndetectorFace=cv2.CascadeClassifier(faceCascade)\n\
    detectorEyes=cv2.CascadeClassifier(eyesCascade)\n\nwhile True:\n    ret, img =\
    \ cap.read()\n    # img = cv2.flip(img, -1)\n    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \    #faces = faceCascade.detectMultiScale(gray,scaleFactor=1.3,minNeighbors=5,minSize=(30,\
    \ 30))\n    faces = detectorFace.detectMultiScale(gray,scaleFactor=1.1,minNeighbors=5,minSize=(30,30),flags=cv2.CASCADE_SCALE_IMAGE)\n\
    \n    for (x,y,w,h) in faces:\n        print(\"face detected\")\n        print(x,y,w,h)\n\
    \        cv2.rectangle(img,(x,y),(x+w,y+h),(255,0,0),2)\n        roi_gray = gray[y:y+h,\
    \ x:x+w]\n        roi_color = img[y:y+h, x:x+w]\n\n        eyes = detectorEyes.detectMultiScale(roi_gray,scaleFactor=1.5,minNeighbors=10,minSize=(5,\
    \ 5),)\n\n        for (ex, ey, ew, eh) in eyes:\n            print(\"eyes detected\"\
    )\n            print(ex,ey,ew,eh)\n            cv2.rectangle(roi_color, (ex, ey),\
    \ (ex + ew, ey + eh), (0, 255, 0),2)\n\n    cv2.imshow('\"q\" to quit', img)\n\
    \n    key = cv2.waitKey(1) & 0xFF\n    if key == ord(\"q\"):\n        print(\"\
    bye...\")\n        break\n\ncap.release()\ncv2.destroyAllWindows()\n```\n\n结果如图15.12所示。\n\
    \n![](img/eafea07aa3f8586de75dade7e29c5aeb_211_0.png)\n\n图15.12：眼睛检测。\n\n捕捉微笑则更进一步。此功能已在许多数码相机中实现。因此，可以激活相机的自拍定时器，并确保只有在镜头前的所有人都露出微笑和友好的面孔时才拍照。\n\
    \n这里有趣的是，不仅定位了嘴巴。相反，还必须检测其特定形状，因为并非每张嘴都自动意味着微笑。这已经表明，机器学习方法绝对能够确定一个人的情绪状态。\n\n\
    可以使用程序*Smile_detect_1V0.py*在该领域进行一些实验。虽然这仍然是一个非常基础的实现，但它表明该程序完全能够区分严肃和友好的面孔。"

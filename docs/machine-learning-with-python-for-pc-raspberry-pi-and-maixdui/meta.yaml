    controller programming to AI applications — with Python there are no limits to
    intuition and creativity. Therefore, the basics of Python and MicroPython are
    explained and demonstrated in this chapter.


    # 9.1 Comments make your life easier


    In any programming language, explanatory comments are important. This is the only
    way to know what a certain program section does. Using comments allows you and
    others to understand code even months or years later without having to delve into
    all the details again and again.


    It is not necessary to comment on each line of a given program. Experienced coders
    should be able to understand individual instructions without comment. A single-line
    comment is only recommended for special constructs or unusual or innovative lines
    of code. On the other hand, in the case of subroutines or entire enclosed program
    sections, a brief explanation of how they work should be included.


    Simple comments will be introduced with the #-sign. They start with # and end
    with the end of the line:


    ```

    >>> print("Hello MaixDuino")   # this is a comment


    Hello MaixDuino

    ```


    Multi-line comments can also be marked with a triple " sign (" " "). The same
    string ends the comment:


    ```

    """

    first comment line

    second line of comment

    """

    ```'

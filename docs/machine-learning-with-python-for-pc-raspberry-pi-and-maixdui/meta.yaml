    2. aUSB WebCam (UOA101).


    If the devices are not listed, a reboot usually solves the problem. With the so-called
    alsamixer you can check the correct function of the audio components. The corresponding
    console instruction:


    ```

    alsamixer

    ```


    starts the graphic interface for the sound settings. Here, the recording and playback
    volume can be set. The desired sound device is selected via the [F6] key. The

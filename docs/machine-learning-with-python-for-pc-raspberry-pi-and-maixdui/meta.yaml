    # 11.4 A net for iris flowers


    After the graphical analysis of the iris data set, in this section a neural network
    that can be used to determine the flower species from the petal data [2,3] will
    be designed. The associated Jupyter Notebook (iris_train_MLP_1V0.ipynb) can be
    loaded from the download package onto either a PC or a Raspberry. Figure 11.8
    shows the opened notebook on a Pi.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_123_1.png)


    124'
  - '[PAGE 124]


    As can be seen in Figure 11.4, the IRIS data set contains five columns. The task
    for an ML algorithm is therefore to predict the class, i.e., the values in the
    fifth column. The input data is found in the first four columns and correspond
    to the measures of sepal length, sepal width, petal length and petal width in
    centimeters.


    After including the required libraries:


    ```

    import pandas as pd

    from sklearn.neural_network import MLPClassifier

    from sklearn.model_selection import train_test_split

    from sklearn.metrics import classification_report, confusion_matrix

    import matplotlib.pyplot as plt

    import time

    ```


    the Iris data set is loaded directly from the Internet:


    ```

    url = "https://raw.githubusercontent.com/jbrownlee/Datasets/master/iris.csv"

    names = [''sepal-length'', ''sepal-width'', ''petal-length'', ''petal-width'',
    ''species'']

    data_train = pd.read_csv(url, names=names)

    ```


    Then the individual columns are given names. Using


    ```

    print(data_train)

    ```


    the freshly loaded table can be checked. If the Raspberry Pi does not have an
    Internet connection, the data (iris_D.csv) could also be loaded as a table, for
    example, from a USB stick or similar storage medium. In this case, the conversion
    into an array can be done via the instruction:


    ```

    data_train = pd.read_csv(''/home/pi/DATA/IRIS/iris_D.csv'')

    ```


    The last column contains the botanical names for the respective category. The
    data thus consist of alpha-numeric entries. Although these are easily readable
    by humans, neural networks can process purely numerical data more easily. Therefore,
    the names are converted into pure numerical values:


    ```

    data_train.loc[data_train[''species''] ==''Iris-setosa'', ''species'']    =0

    data_train.loc[data_train[''species''] ==''Iris-versicolor'', ''species''] =1

    data_train.loc[data_train[''species''] ==''Iris-virginica'', ''species'']  =2

    ```



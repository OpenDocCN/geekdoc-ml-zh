  md: 'Despite all the concerns about privacy and data protection, facial recognition
    has become one of the most important applications of artificial intelligence.
    Due to its high economic importance and its various applications, it has been
    intensively studied in recent decades. Facial identification has therefore achieved
    a high level of reliability. In addition, it is possible to determine exactly
    the probability, that a certain face matches a person in a database. This opens
    up further possibilities. One of them is the so-called **augmented reality** (AR).
    The term is used for computer-assisted extensions of reality by virtual elements.
    The technology provides additional information to the human perception, including
    sensitive data of a certain person, for example. An important feature of AR is
    real-time data processing. All information is displayed immediately and the user
    is able to access the content via touch-screen or gesture control.


    With the success of smartphones, as well as the constant improvement in their
    performance and camera capabilities, interest in AR continues to grow. Large corporations
    have been working for years on the mass-market production of devices for mobile
    augmented reality. The development of special AR devices, such as data glasses

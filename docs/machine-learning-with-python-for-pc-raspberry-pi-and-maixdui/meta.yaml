    The content of the variable **code** is explained in more detail in the following
    section.


    After starting the program, each face captured by the MaixDuino camera is surrounded
    by a frame in the color "frameColor". The line width of the frame can be adjusted
    via the variable **scale**.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_199_0.png)


    Figure 15.4: MaixDuino detected a face.


    Similar to object recognition, the recognition function can also be used to activate
    further functions.


    # 15.4 How many guest were at the party?


    One application of the detection functions is the automatic counting of persons.
    If, for example, three persons were detected, the variable **code** in the program
    *face_detection_simple.py* from the last section shows the following content:


    ```

    [{"x":26, "y":98, "w":47, "h":79, "value":0.905853, "classid":0, "index":0, "objnum":3},

    {"x":150, "y":104, "w":38, "h":63, "value":0.938012, "classid":0, "index":1, "objnum":3},

    {"x":251, "y":109, "w":47, "h":63, "value":0.859508, "classid":0, "index":2, "objnum":3}]

    ```


    The array elements x, y, w and h contain the coordinates (x, y) and the width
    and height (w, h) of the faces. **Value** indicates the probability that actually
    a human face is detected. Since only one class is detected here ("face"), the
    **classid** is always zero.


    Also interesting is "objnum". This variable indicates how many faces were found
    in total. With "index", a number is assigned to each hit. Using


    ```

    code[0].objnum()

    ```


    the number of faces found can be determined. The program *face_counter.py* thus
    continuously provides the current number of faces in the field of vision of the
    MaixDuino cam:



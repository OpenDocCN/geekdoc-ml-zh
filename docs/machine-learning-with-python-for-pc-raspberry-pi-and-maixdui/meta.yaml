    First of all, artificial intelligence can be divided into two areas: weak and
    strong AI. The "strong" or general AI is essentially the attempt to create artificial
    human beings. The goal would be machines or robots that have all the mental powers
    of humans, including a consciousness [12].


    A "weak" AI, on the other hand, can perform only certain tasks very well, but
    does not even come close to human capabilities in other areas. Examples of weak
    AI include computers that can beat people at chess — not only average players
    but also world chess champions. Weak artificial intelligence is nowadays widespread
    in science, business, and healthcare. For example, AI enterprise systems contain
    powerful analytical tools and can provide recommendations and insights for business
    development. They are used for risk management and planning.


    Strong AI begins as soon as machines become "human", make their own decisions,
    or learn new skills without human help. These systems are not only able to solve
    classical mathematical or logical problems, but also have certain emotional abilities.
    It is quite easy to program machines to perform some "emotional" or "verbal" actions
    in response to certain stimuli. ChatBots and virtual assistants are for example
    already quite good at having a conversation. Some experiments in which robots
    learn to read human emotions have also been carried out successfully. However,
    these efforts were more concerned with producing emotional responses than real
    mental competences.


    The next step would be a so-called "super intelligence". This is a name given
    to systems or machines that are superior to humans in many or even all areas of
    intelligence. It includes all, or at least many, areas of the intellect, in particular,
    creative and problem-solving skills or emotional and social skills. Self-confidence
    or a comprehensive memory are also frequently considered prerequisites for real
    super intelligence. It does not matter whether these functions are based on biological
    or technical principles.


    However, considerations about a Super Intelligence quickly led to dystopian scenarios.
    Once an artificial intelligence has been created that can continue to learn completely
    independently, the step to a superhuman level of intelligence is ultimately only
    a matter of'

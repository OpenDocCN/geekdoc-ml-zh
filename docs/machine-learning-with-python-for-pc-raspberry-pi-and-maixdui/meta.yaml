    \nKERAS 的一个重要优势是能够导出训练好的网络数据并将其存储在外部。这使得在强大的计算机系统上快速高效地训练神经网络系统成为可能。这样，使用 GPU（参见第\
    \ 12.2 节）也将成为可能。训练阶段完成后，数据被传输到低成本的单板计算机，如树莓派或 MaixDuino，在那里可用于新的、特定的应用。\n\n在接下来的章节中，将训练一个所谓的深度卷积神经网络来识别手写数字。学习阶段的数据将用于通过\
    \ Pi 摄像头再次读取和识别数字。通过 KERAS 访问 TensorFlow。然而，为了使已经复杂的项目不至于变得过于复杂，没有实现对象定位。因此，数字图像必须直接放置在摄像头前，并且顺序正确，以便网络进行识别。\n\
    \n## 12.6 卷积网络\n\n卷积是一种特殊的数学运算，用于确定两个函数的相似性。如果所考虑的两个函数差异很大，它们的卷积积分几乎为零。如果存在一定的相似性，卷积积分则会取较高的值。\n\
    \n这一特性在神经网络中也能得到很好的应用。由此产生的卷积网络（简称 convNets）因此部分由具有可训练权重的神经元组成。另一个基本组成部分是具有预设值的网络段。这里的一个变体是将\
    \ ConvNet 结构设置为针对由图像组成的输入数据进行优化。这允许将某些特性牢固地锚定在架构中。通过卷积函数，可以预先确定图像是否包含类似于圆弧的元素，或者是否以三角形或正方形等有棱角的物体为主。\n\
    \n这使得图像评估更加高效，并且可以显著减少网络中所需的参数数量。与简单的神经网络相比，ConvNets 可以处理以数据矩阵形式输入的输入。显示为矩阵（图像宽度\
    \ × 图像高度 × 颜色通道数）的图像可以直接用作输入数据。经典的多层感知机形式的神经网络仅接受一维向量作为输入格式。为了能够使用图像作为输入数据，单个图像像素必须以长数据序列的形式提供，就像第\
    \ 11 章中的鸢尾花数据集中的数值一样。\n\n由于这种限制，传统的神经网络例如无法识别与图像中方向无关的对象。经过轻微的平移或旋转后，相同的对象将具有完全不同的输入向量。与此相反，卷积网络能够识别输入数据中的结构。输入层中的滤波器经过优化，可以识别简单的几何结构，如线条、边缘或彩色区域等。滤波器由网络自动调整。在下一层级，识别出更复杂的元素，如矩形、圆形或椭圆等。网络的抽象级别随着每个滤波器层级而增加。最终，甚至可以识别整个对象，如桌椅或车辆。经过适当的优化，甚至可以识别和识别人或动物。更多细节将在后续章节中详细说明。最终导致更高层级激活的抽象取决于给定类别的特征。因此，为了更精确地记录卷积网络的功能，可视化导致不同层级滤波器激活的模式可能非常有趣。\n\
    \nMNIST 数据集也可用于训练卷积网络。相关程序\n\n```\nMNIST_keras_Train_1V0.py\n```\n\n再次包含在下载包中。网络拓扑可以通过以下指令指定\n\
    \n```\nmodel.summary()\n```\n\n并产生以下输出：\n\n```\nModel: \"sequential\"\n_________________________________________________________________\n\
    Layer (type)                Output Shape              Param #   \n=================================================================\n\
    conv2d (Conv2D)             (None, 26, 26, 32)        320       \n_________________________________________________________________\n\
    max_pooling2d (MaxPooling2D (None, 13, 13, 32)        0         \n_________________________________________________________________\n\
    conv2d_1 (Conv2D)           (None, 11, 11, 64)        18496     \n_________________________________________________________________\n\
    max_pooling2d_1 (MaxPooling2 (None, 5, 5, 64)          0         \n_________________________________________________________________\n\
    flatten (Flatten)           (None, 1600)              0         \n_________________________________________________________________\n\
    dropout (Dropout)           (None, 1600)              0         \n_________________________________________________________________\n\
    dense (Dense)               (None, 10)                16010     \n=================================================================\n\
    Total params: 34,826\nTrainable params: 34,826\nNon-trainable params: 0\n```\n\
    \n模型输出显示，该网络已经包含超过 34,000 个可训练参数。使用 graphviz，可以创建清晰的图形表示（参见图 12.6）。该模块（参见第 10.8\
    \ 节或下载包中的 *LINKS.txt*）生成了以下 ConvNet 的图形表示：\n\nPython 机器学习\n\n![](img/eafea07aa3f8586de75dade7e29c5aeb_143_0.png)\n\
    \n该图形再次显示，网络在第一层期望接收 28 × 28 = 784 像素的黑白图像数据，即每个像素为单比特：\n\n```\ninput: (?, 28,\
    \ 28, 1)\n```\n\n相比之下，最后一个网络层级由一个全连接（“dense”）层组成。它提供 10 个输出值：\n\n```\noutput:\
    \ (?, 10)\n```\n\n每个输出值分别对应 0 到 9 这 10 个数字中的一个。\n\n条目 \"None\"，或图形中的问号，是一个占位符，表示网络能够同时处理多个样本。输入形式\
    \ (28, 28, 1) 表示网络一次只能处理单张图像。\n\n然而，KERAS 网络可以处理具有可选批量大小的处理（参见训练阶段的“批量大小”）。这意味着可以同时使用多张图像进行训练。需要注意的是，虽然较大的批量会导致更短的训练时间，但它们也需要更大的可用内存。\n\
    \n与上一章的鸢尾花模型相比，使用 KERAS 可以非常容易地将训练和应用分开。因此，上面概述的网络可以在强大的计算机（最好是带有 GPU 的计算机）上用于训练。然后，计算出的网络权重可以被传输，并用于在另一个系统的实时摄像头馈送中识别数字。图\
    \ 12.7 显示了树莓派和连接的 PiCam 的相应设置：\n\n• 144"

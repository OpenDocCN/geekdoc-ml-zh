  md: 'However, once the system is running more or less problem-free, other training
    images (for animal recognition or vehicle classification, etc.) can be used. It
    is also possible to use more than two categories. However, this also multiplies
    the number of training images required.


    # 16.5 Outlook: Multi-object detectors


    The image recognition and classification models used so far in this chapter utilized
    the whole image as input. The output was a list of probabilities for each class
    to be recognized. The best results were achieved when the respective object took
    up a large part of the image. The exact location of the object in the field of
    view was not important. However, many applications, such as object or face tracking,
    require not only the recognition of objects in the image, but also its exact location.
    Also, detection of multiple objects in an image requires the determination of
    the respective locations of the objects in the camera image.


    For these tasks, more complex object recognition models are required. So-called
    YOLO (**Y**ou **O**nly **L**ook **O**nce) architectures can be used here. The
    method first adds a coordinate grid to the image data to be examined. Then the
    presence or absence of the objects in question is determined in each grid with
    the already known methods. In addition, so-called "anchors" are used. The "anchor
    points" are adapted to the expected object size and facilitate a pre-selection
    of possible image features. Anchors have also already been used in the pre-trained
    models (see Section 13.6, among others).


    If individual features are detected, a set of predictions is calculated for each
    grid cell. Predictions with low probability are discarded. In this way, the remaining
    cells contain the searched objects with a high probability.


    The basic idea behind You-Only-Look-Once is thus to divide the overall image into
    small regions or grid areas and apply a neural network search to each grid. Three
    parameters play an important role here:


    +   1. **S**: number of grid cells into which the image is divided.

    2. **B**: number of bounding boxes calculated for each grid cell

    3. **C**: number of different classes that can be predicted for each grid cell.


    Figure 16.8 illustrates the YOLO principle.'
  merge: -1
  pgno: 227
- img_proc: true
  md: '![](img/eafea07aa3f8586de75dade7e29c5aeb_228_0.png)


    Figure 16.8: YOLO principle.


    In this case, the image is divided into 4 × 8 grid cells (S = 32). Each cell is
    assigned a certain probability that it contains an object of interest. The cells
    with high probabilities are marked with frames.


    From here on it becomes clear where objects could be located in the image. However,
    it is not yet determined what the object really is. Therefore, each cell is subsequently
    assigned a class probability. The individual results are subsequently combined
    to object frames.


    Then, the probability is determined that the object frame contains a certain object,
    such as a car, a dog, or a person. If this probability exceeds a certain threshold,
    the object is assigned to the corresponding category.


    The projects presented in Chapter 13 already made partial use of this YOLO technology.
    However, the training of YOLO systems is once again significantly more complex
    than the procedure presented in the last section. In particular, not only large
    numbers of images or photos are required. Rather, the searched-for object must
    be marked and categorized manually on each of the pictures. This requires considerable
    effort, even with tools specifically developed for the purpose. Using the respective
    category and the determined coordinates, the YOLO system can finally be trained.


    Classifying and determining coordinates on hundreds of images can take days or
    even weeks. Here it becomes clear, that this effort is only justified in very
    special cases, for example, if certain animal species or a specific types of vehicles
    should be automatically detected.


    In general, therefore, you should first try to find a pre-trained model for a
    specific project. Many different versions can be found on the Internet. Only after
    if this approach is not successful, it might make sense to train your own YOLO
    systems.'

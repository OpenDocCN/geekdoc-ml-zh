    # 12.4 Live recognition of digits


    Working with generally available data sets is an important first step towards
    an automatic handwriting reader based on ML technology. For a truly universal
    system, for example to recognize meter readings, house numbers or handwritten
    notes, however, it must be possible to reliably read any available digits.


    The next paragraphs will show that your own handwriting can also be read with
    the network that has already been trained. Of course, the system can be expanded
    to include the recording of license plates or identification numbers on rail vehicles
    etc. with appropriate training sets.


    To recognize your own handwriting, you first have to digitize some handwritten
    sample digits. Simple scanners or mobile phone cameras can be used for this task.
    The images must be in .png format. For use with the present neural network, an
    image resolution of 28 x 28 pixels is required. Image processing programs such
    as IrfanView for Windows or the ImageMagick program on the Raspberry Pi can do
    a good job here.


    However, initial tests can also be carried out with the sample images contained
    in the download package. Next, self-created images can be analyzed instead of
    the MNIST data. The following image, for example, shows the reliable detection
    of a "three" (left) as only the value "three" shows a light color in the column,
    all other values show dark colors, i.e., low probabilities.


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_138_0.png)


    The result on the right-hand side shows that the ML algorithm was once again "not
    quite sure". Besides the correct value of five, the number six also has a certain
    probability (green coloring). Nevertheless, the correct result was given.


    It is not only possible to process still images. Also, live images in a video
    stream can be recognized with the PiCam.


    For this purpose, the program *MNIST_numpy__PiCam_live_1V4.py* from the download
    package can be used on the Raspberry. After a training phase, a live image of
    the camera appears. This shows the preprocessed field of view of the PiCam. If
    the camera is pointed at a digit, the numerical value recognized by the neural
    network appears in the shell. Figure 12.5 shows an example for the digit "7".'

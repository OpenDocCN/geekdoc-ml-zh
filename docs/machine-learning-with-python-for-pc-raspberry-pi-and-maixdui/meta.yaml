  - '[PAGE 195]


    Machine Learning with Python


    To understand how an algorithm can detect faces, one can first ask how people
    actually recognize a face. On most (frontal) images of human faces, there are
    two eyes, a nose, lips, forehead, chin, ears and hair. Even so, these basic components
    are practically always present, faces also differ from each other. So, the problem
    is to separate the common features from the individual differences.


    An additional problem arises from the fact that the face of one and the same person
    changes constantly with emotions such as laughter, anger, joy or annoyance etc.
    In addition, age, cosmetics or haircut often have a significant influence. Furthermore,
    even just changing the viewing angle produces a different facial image.


    However, a closer look reveals that there are some features in every face that
    are largely independent of age, emotion and orientation, etc. Various research
    groups therefore began using unsupervised learning methods to separate and identify
    different types of faces. Others followed the approach with extensive training
    of models based on each feature of the face. Different approaches were used such
    as the


    +   - Principal Component Analyses (PCA);

    - Linear Discrimination Analysis;

    - Independent Component Analysis;

    - Gabor filters.


    Gabor filters, commonly used in image processing, can capture important visual
    features. They are of particular importance because they can localize essential
    features such as eyes, nose or mouth in an image. Consequently, they are used
    for both face recognition and identification [7].


    The classical method of comparing face images pixel by pixel, on the other hand,
    is hardly effective. For example, background and hair pixels would provide little
    information. Moreover, for a direct comparison, all faces in all images would
    have to be perfectly aligned in order to expect usable results at all.


    To solve this problem, the PCA algorithm creates a set of principal components
    called eigenfaces.


    • 196'
  - '[PAGE 196]


    ![](img/eafea07aa3f8586de75dade7e29c5aeb_196_0.png)


    Figure 15.2: Fundamental and unalterable features of a face


    From a mathematical point of view, eigenfaces are a graphical representation of
    so-called eigenvectors or characteristic values of a data matrix. With a sufficiently
    large data set, any human face could in principle be represented by a combination
    of eigenfaces, just as in mathematics any vector can be constructed by a combination
    of basis vectors. Other analytical methods such as linear component analysis also
    are based on the eigenface algorithm. In Gabor filters, the most important features
    in the face are captured first. A subsequent eigenface algorithm then uses these
    as a basis for comparison.


    The focus is on values such as the relative distance between the eyes or the distance
    between the ears and the tip of the nose, etc. These values are very specific
    to a face. Therefor they are also very specific for a particular person and can
    hardly be changed. The position of the corners of the mouth or the hair line play
    a less important role, as these values are quite variable.


    Several open-source libraries for both face recognition and identification, in
    which one or more of these methods have been implemented are currently available.


    Figure 15.3 illustrates the steps from face recognition to face identification.
    For identification, a recognition method is required first. Subsequently, a database
    can be built using the corresponding image material. By training a special neural
    network, the essential facial features can then be extracted. These finally serve
    as the basis for identifying individual persons or faces.'

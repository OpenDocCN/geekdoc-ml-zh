    20, Ansari Road, Darya Ganj\n\nNew Delhi-110002\n\nPh: 23254990/23254991\n\n##\
    \ MICRO MEDIA\n\nShop No. 5, Mahendra Chambers,\n\n150 DN Rd. Next to Capital\
    \ Cinema,\n\nV.T. (C.S.T.) Station, MUMBAI-400 001\n\nPh: 22078296/22078297\n\n\
    ## DECCAN AGENCIES\n\n4-3-329, Bank Street,\n\nHyderabad-500195\n\nPh: 24756967/24756400\n\
    \n## BPB BOOK CENTRE\n\n376 Old Lajpat Rai Market,\n\nDelhi-110006\n\nPh: 23861747\n\
    \n![](img/127fa3260d3bb89f8119b3b5ddc3f83f_4_0.png)\n\nPublished by Manish Jain\
    \ for BPB Publications, 20 Ansari Road, Darya Ganj, New Delhi-110002 and Printed\
    \ by him at Repro India Ltd, Mumbai\n\n[www.bpbonline.com](http://www.bpbonline.com)\n\
    \n## Dedicated to\n\nMy Family and Friends\nWho are always with me to love, support\
    \ and care.\n\n## About the Author\n\n**Dr. Deepti Chopra** is working as Assistant\
    \ Professor (IT) at Lal Bahadur Shastri Institute of Management, Delhi. She has\
    \ around 7 years of teaching experience. Her area of interest includes Natural\
    \ Language Processing, Computational Linguistics and Artificial Intelligence.\
    \ She is author of 3 books and has written several research papers in various\
    \ International Conferences and Journals.\n\n## About the Reviewer\n\n**Anmol**\
    \ has 3 years of experience in the software industry. He has honed his skills\
    \ in Machine Learning, Deep Learning, build and maintain ETL/ELT data pipelines\
    \ and data-driven systems. Some of the industries Anmol has worked in are Airline,\
    \ E-Commerce, Human Resource and HealthCare. His everyday work involves analysing\
    \ and solving complex business problems, breaking down the work into feasible\
    \ actionable tasks, and collaborating with his team and project manager to plan\
    \ and communicate delivery commitments to our business clients.\n\nWhen he is\
    \ not working, Anmol spends most of his time reading, traveling the world, playing\
    \ Fifa and catching his favourite Broadway shows. An admitted sports fanatic,\
    \ he feeds his addiction to football by watching Real Madrid games on Sunday afternoons.\n\
    \n## Acknowledgement\n\nI want to thank God most of all, because without God I\
    \ wouldn’t be able to do any of this.\n\nI acknowledge with gratitude and sincerely\
    \ thank all my family and friends for the blessings and good wishes conveyed to\
    \ me to achieve the goal to publish this machine learning based book.\n\nMy sincere\
    \ thanks are due to few friends/TR of this book who encourages and motivate me\
    \ every time and proves that they are always here for me. Such relations are the\
    \ perfect example of ‘Quality over Quantity’.\n\nThis book wouldn’t have happened\
    \ if I hadn’t had the support from content editor of BPB Publications. My gratitude\
    \ goes to the editorial and publishing professionals of BPB Publications for their\
    \ keen interest and support in bringing out this book.\n\nFinally, I would like\
    \ to thank Mr. Manish Jain at BPB Publications for giving me this opportunity\
    \ to write my first book for them.\n\n## Preface\n\nWith the increase in availability\
    \ of data from different sources, there is a growing need of data driven fields\
    \ such as analytics and machine learning. This book intends to cover basic concepts\
    \ of machine learning, various learning paradigms and different architectures\
    \ and algorithms used in these paradigms.\n\nThis book is meant for the beginners\
    \ who want to get knowledge about machine learning in detail. This book can also\
    \ be used by machine learning users for a quick reference for fundamentals in\
    \ machine learning.\n\nFollowing are the chapters covered in this book:\n\n[Chapter\
    \ 1: Introduction to Machine Learning](Chapter 1: Introduction to Machine Learning)\n\
    \n**Description:** This chapter covers basic concepts of machine learning, areas\
    \ in which ML is performed, input-output functions\n\n**Topics to be covered:**\n\
    \n- What is machine learning?\n- Utility of ML\n- Applications of ML\n\n## Chapter\
    \ 2: Linear Regression\n\n**Description:** This chapter discusses about Linear\
    \ Regression\n\n**Topics to be covered:** List of topics covered in this chapter\
    \ are:\n\n- Linear Regression in one variable\n- Linear Regression in multiple\
    \ variables\n- Gradient descent\n- Polynomial Regression\n\n## Chapter 3: Classification\
    \ using Logistic Regression\n\n**Description:** This chapter discusses about classification\
    \ using Logistic Regression\n\n**Topics to be covered:** List of topics covered\
    \ in this book are:\n\n- Binary Classification\n- Logistic Regression\n- Multi\
    \ class Classification\n\n## Chapter 4: Overfitting and Regularization\n\n**Description:**\
    \ This chapter discusses about overfitting and regularization\n\n**Topics to be\
    \ covered:** List of topics covered in this chapter are:\n\n- Overfitting and\
    \ regularization in linear regression\n- Overfitting and regularization in logistic\
    \ regression\n\n## Chapter 5: Feasibility of Learning\n\n**Description:** This\
    \ chapter discusses about feasibility of learning\n\n**Topics to be covered:**\
    \ Topics covered in this chapter are:\n\n- Feasibility of learning an unknown\
    \ target function\n- In-sample error\n- Out-of-sample error\n\n## Chapter 6: Support\
    \ Vector Machine\n\n**Description:** This chapter discusses about Support Vector\
    \ Machine\n\n**Topics to be covered:** Please provide the list of topics to be\
    \ covered through the book:\n\nIntroduction\n\n1.1 Margin\n\n1.2 Large Margin\
    \ methods\n\nKernel methods\n\n## Chapter 7: Neural Network\n\n**Description:**\
    \ This chapter discusses about Neural Network\n\n**Topics to be covered:** List\
    \ of topics covered in this chapter are:\n\nIntroduction\n\nEarly models\n\nPerceptron\
    \ learning\n\nBackpropagation\n\nStochastic Gradient Descent\n\n## Chapter 8:\
    \ Decision Trees\n\n**Description:** This chapter discusses about decision trees\n\
    \n**Topics to be covered:** List of topics covered in this chapter are:\n\n- Decision\
    \ Trees\n- Regression Tree\n- Stopping Criterion and Pruning Loss functions in\
    \ Decision Tree\n- Categorical Attributes, Multiway Splits and Missing Values\
    \ in Decision Trees\n- Instability in Decision Trees\n\n## Chapter 9: Unsupervised\
    \ Learning\n\n**Description:** This chapter discusses about Unsupervised Learning\n\
    \n**Topics to be covered:** List of topics covered in this chapter are:\n\n- Introduction\n\
    - Clustering\n  - 2.1 K-means Clustering\n  - 2.2 Hierarchical Clustering\n- Principal\
    \ Component Analysis\n\n## Chapter 10: Theory of Generalization\n\n**Description:**\
    \ This chapter discusses about theory of generalization\n\n**Topics to be covered:**\
    \ List of topics covered in this chapter are:\n\n- Training versus Testing\n-\
    \ Bounding the testing error\n- Vapnik Chervonenkis inequality\n- VC Dimension\n\
    - Proof of VC inequality\n\n## Chapter 11: Bias and Fairness in ML\n\n**Description:**\
    \ This chapter discusses about bias and fairness in ML\n\n**Topics to be covered:**\
    \ List of topics covered in this chapter are:"

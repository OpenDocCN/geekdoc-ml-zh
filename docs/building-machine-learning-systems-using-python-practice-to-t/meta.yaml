    \n$$J(\\theta_0, \\theta_1) = \\frac{1}{2m} \\sum_{i=1}^{m} (h_{\\theta}(x^i)\
    \ - y^i)^2$$\n\n这里，$J$ 是代价函数，$m$ 指的是我们数据集中的数据点数量，$y$ 指的是我们希望预测的实际值。为了给代价函数添加归一化，我们引入一个常数\

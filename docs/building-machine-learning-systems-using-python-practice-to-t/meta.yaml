    - 了解梯度下降\n- 理解多项式回归\n\n## 单变量线性回归\n\n线性回归是一种描述自变量 $x$ 和因变量之间关系的技术。线性回归指出，一个或多个输入特征与相对输出或目标向量之间存在的关系大致是线性的。线性回归找到输入特征的加权和以及一个称为偏置项或截距的常数。线性回归有许多实际应用。这些应用分为两类：\n\
    \n- 如果应用包括预测、预报或误差减少，那么可以将线性回归应用于数据集值并对响应进行预测。\n- 当需要解释响应中的变化时，这可以归因于其他解释变量的存在。\n\
    \n线性回归用于在行为、生物和社会科学领域中寻找变量之间可能存在的关系。在单变量线性回归中，假设定义为：\n\n$h_{\\theta}(x) = \\theta_0\
    \ + \\theta_1x$\n\n这里，$x$ 被称为自变量，我们的假设依赖于它。例如，以毫米为单位测量的*降雨量*可以是 $x$，而我们试图预测的*雨伞数量*可以是假设。$\\\

  md: '# Overfitting and regularization in logistic regression


    Logistic regression may be defined as a generalized linear model, but instead
    of continuous output, it produces a categorical output. One of the common problems
    occurring in machine learning is overfitting where a model is able to respond
    well on the training data rather than the testing data. Overfitting takes place
    when the model is complex due to the number of observations being more as compared
    to the number of parameters.


    Regularization is one way of dealing with overfitting. Regularization can handle
    high correlation among various features, filtering out noise from data and prevent
    overfitting. The regularization term may be represented as follows:


    $\frac{\lambda}{2} ||w||^2 = \frac{\lambda}{2} \sum_{j=1}^{m} w_j^2$


    Here, $\lambda$ is the regularization parameter. In order to apply regularization
    to logistic regression, the regularization term is added to the cost function
    to shrink weights.


    The inverse of regularization is represented by the parameter C as:


    $C = 1/\lambda$'

    \ 1\n\n## Introduction\n\nMachine learning is one of the applications of artificial\
    \ intelligence. Machine learning may be defined as the ability of the system to\
    \ learn automatically through experience without being explicitly programmed.\
    \ It is based on the development of programs that can access data and use this\
    \ data to perform learning on their own. In this chapter, we will discuss the\
    \ classification of machine learning, the various challenges faced in machine\
    \ learning, and the applications of machine learning.\n\n## Structure\n\nHistory\
    \ of machine learning\n\nClassification of machine learning\n\nChallenges faced\
    \ in adopting machine learning\n\nApplications\n\n## Objectives\n\nUnderstanding\
    \ the origin of machine learning\n\nUnderstanding the classification of machine\
    \ learning algorithm\n\nChallenges faced in machine learning\n\nApplications of\
    \ machine learning\n\n## History of machine learning\n\nIn 1940s, the first manually-operated\
    \ computer, **ENIAC Numerical Integrator and** was invented. At this time, the\
    \ word *computer* was used which meant, '*a machine having intensive numerical\
    \ computation*' Since 1940s, the idea was to build a machine that could mimic\
    \ human behavior of learning and thinking. In 1950s, the first computer game program\
    \ was developed that could beat the checkers world champion. This helped checker\
    \ players in improving their skills. At this time, *Frank Rosenblatt* invented\
    \ Perceptron, which is a very simple classifier. Machine learning became popular\
    \ in 1990s when probabilistic approaches of AI were born as a result of the combination\
    \ of statistics and computer science. Because of the large data available, scientists\
    \ started building intelligent systems that could analyze and learn from a large\
    \ amount of data. For example, the IBMs Deep Blue could beat the World Chess Champion,\
    \ *Garry* Machine learning is a kind of algorithm in which the software applications\
    \ can accurately predict the outcomes without being explicitly programmed. The\
    \ basic essence of machine learning is to build algorithms that, on receiving\
    \ input data, predicts the output using statistical analysis and updates the output\
    \ as the new data is made available. The term *Machine learning* was coined by\
    \ an American scientist, *Arthur Samuel*, in 1959 who had expertise in computer\
    \ gaming and artificial intelligence. According to *Arthur gives computers the\
    \ ability to learn without being explicitly* According to *Tom Mitchell* in 1997,\
    \ *computer program is said to learn from*"

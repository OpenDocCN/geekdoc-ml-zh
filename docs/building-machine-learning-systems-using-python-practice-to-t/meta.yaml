  md: "# Gradient descent\n\nGradient descent is a method to minimize the value of\
    \ Cost Function. It can alter the values of Theta o and Theta 1 of a point based\
    \ on the slope or gradient of the Cost Function curve. The changes introduced\
    \ in the values of Theta o and Theta 1 also bring changes to the hypothesis, thereby\
    \ bringing a better fit to the data. Gradient descent estimates the derivative\
    \ of cost function. It is represented by the following formula:\n\n$$\\theta^{new}\
    \ = \\theta^{old} - \\alpha 1/m \\sum_{i=1}^{m} [(h_{\\theta}X - y)X^T]$$\n\n\
    Here, X-y is referred to as error.\n\nis referred to as the learning rate. In\
    \ this method, we first fetch and clean the data and analyze it. Then, we define\
    \ the hypothesis, regression parameters, and cost function. Then, we run the gradient\
    \ descent algorithm on all the data points and update the hypothesis. This algorithm\
    \ is implemented in Python as follows:\n\n```\ndef gradientDescent(X, y, theta,\
    \ alpha, numiters):\n    # number of training examples\n    p = len(y)\n    #\
    \ Initialize J_history and Theta_history\n    Jhistory = []\n    Thetahistory\
    \ = []\n    for i in range(numiters):\n```"
  merge: -1
  pgno: 64
- img_proc: true
  md: '```

    # Calculate h = X * theta

    h = np.sum(np.multiply(X,theta), axis=1)

    # Calculate the error = (h - y)

    error = np.subtract(h, y)

    # Calculate the new theta


    thetanew = alpha * 1/p * np.sum(np.multiply(X.T, error), axis=1)

    # Update theta

    theta = np.subtract(theta, thetanew)

    # Collect all the theta and J

    Thetahistory.append(theta.tolist())

    Jhistory.append(calcCostFunction(X,y,theta).tolist())

    return theta, Thetahistory, Jhistory

    # Running the Gradient Descent

    # Initialize theta

    theta = np.asarray([0,0]).astype(float)

    # Set the number of iterations for the Gradient Descent

    iterations = 2000

    # Set the Learning Rate

    alpha = 0.01

    # Run the gradientDescent() function, and collect the output in "results"

    results = gradientDescent(X, y, theta, alpha, iterations)

    # Get the theta from the results

    theta = results[0] # new theta

    # Get the theta history

    Thetahistory = results[1] # Theta history

    # Get the J history


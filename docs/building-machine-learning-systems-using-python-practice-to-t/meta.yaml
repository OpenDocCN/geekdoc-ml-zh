    # Hierarchical clustering


    Hierarchical clustering is also referred to as Hierarchical Cluster Analysis.
    This method involves building a hierarchy of clusters. Two approaches used in
    hierarchical clustering analysis include the following:


    Agglomerative clustering


    Divisive clustering


    Agglomerative clustering is a ‘bottom-up’ approach that involves each individual
    cluster, and the pairs of clusters merge and move higher in the hierarchy. Divisive
    clustering is a ‘top-down’ approach in which a single cluster is further split
    into multiple clusters as we proceed down in the hierarchy.


    Cluster dissimilarity is a metric that measures the distance between the pair
    of observations and the linkage criterion that specifies a dissimilarity between
    the pair of observations. Cluster dissimilarity is used in agglomerative clustering
    to decide which cluster would join together to form the bigger cluster. It is
    also used in divisive clustering to decide which cluster would finally break.'

    ## 逻辑回归中的过拟合与正则化


    逻辑回归可以被定义为一个广义线性模型，但它产生的不是连续输出，而是分类输出。机器学习中常见的问题之一是过拟合，即模型在训练数据上表现良好，但在测试数据上表现不佳。当模型由于观测值数量相对于参数数量过多而变得复杂时，就会发生过拟合。


    正则化是处理过拟合的一种方法。正则化可以处理各种特征之间的高相关性，从数据中过滤噪声并防止过拟合。正则化项可以表示如下：


    $\frac{\lambda}{2} ||w||^2 = \frac{\lambda}{2} \sum_{j=1}^{m} w_j^2$


    这里，$\lambda$是正则化参数。为了将正则化应用于逻辑回归，需要将正则化项添加到代价函数中以收缩权重。


    正则化的倒数由参数C表示为：


    $C = 1/\lambda$



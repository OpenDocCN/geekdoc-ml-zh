    决策树算法可用于基于给定数据预测结果的过程。决策树算法有两种类型，即：分类树和回归树算法。**分类与回归树**方法论于1984年出现。它由*Leo Jerome
    Richard*和*Charles*提出。在分类树算法中，结果变量是分类的或固定的。例如，使用分类树算法，我们可以决定客户将购买哪种类型的汽车。在回归树算法中，目标结果值是一个实数。例如，可以使用回归树算法预测住宅的售价。在分类树算法中，数据集被分为是或否等类别。在回归树算法中，目标变量是连续的，例如温度、价格等。决策树算法的分类如[图](figure)所示。



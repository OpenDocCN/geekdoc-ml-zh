  md: '# How to detect bias?


    Bias is one of the popular topics that one encounters while building AI-based
    models. Many uncommon and common biases may be found in the following stages of
    AI model development:


    +   - Data collection

    - Data preprocessing

    - Data analysis

    - Modeling


    During data collection, biases may take place. This happens due to the occurrence
    of outliers and errors that happen while collecting data.


    Biases that are found during the data collection process include the following:


    **Selection** While preparing the sample data, selection of data must be done
    in a proper manner to avoid bias. For example, if the participants are students
    who are to undergo tests, then they may include the bias results.'
  merge: -1
  pgno: 230
- img_proc: true
  md: '**The Framing** Survey questions are framed in such a manner that biases are
    avoided and displays positivity in sentences, else biases crop up.


    **Systematic** It occurs because of faulty equipment. It leads to repeatable and
    consistent errors.


    **Response** It occurs due to questions that are answered incorrectly by the participants.


    During data preprocessing, the following steps may be undertaken:


    +   - Outlier detection

    - Missing values

    - Filtering data


    Outliers lead to a disproportionate effect on many of the analyses that are conducted.


    While dealing with the missing values, if all the missing values are replaced
    by the mean values, then it would mean being biased towards a particular group
    that is closer to the mean.


    Biases may be found during the process of data analysis. Biases may be found using
    the following approaches:'
  merge: -1
  pgno: 231
- img_proc: true
  md: '**Missing** Incorrect conclusions may be drawn from a distorted graph that
    provides incorrect information.


    **Confirmation** It involves the tendency to focus and confirm information that
    is related to someone''s preconceptions.


    When performing data modelling, it is very important to detect biases. For example,
    Amazon created a hiring algorithm that showed gender bias by favoring men as high
    potential candidates. A model that has high variance focuses on training data
    and doesn''t generalize well. Data always behaves in the same way in high bias.
    When we increase bias, variance decreases and vice versa. In supervised machine
    learning, training is performed on the input variables in such a manner that there
    is closeness between the predicted values and the actual values. Error refers
    to the difference between the actual and the predicted values. There are 3 types
    of errors in supervised machine learning:


    +   - Bias error

    - Variance error

    - Noise


    Bias and variance are reducible errors that we can minimize to a large extent.
    Noise is said to be an irreducible error that cannot be eliminated.'
  merge: -1
  pgno: 232
- img_proc: true

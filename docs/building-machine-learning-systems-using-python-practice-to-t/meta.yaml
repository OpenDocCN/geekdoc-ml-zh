  md: '# Back propagation


    Back propagation is also referred to as Gradient Computation. Back propagation
    learning algorithm comprises two phases, namely: Gradient Computation Phase and
    Weight Updation Phase. The first phase is the Propagation phase. It involves the
    following steps:


    **Forward Propagation** - Here, the training input pattern is sent to the neural
    network and the propagation''s output activation is generated.


    **Backward Propagation** – Here, the input is the propagation''s output activation
    that is sent to the neural network, and it generates the deltas of all the output
    and hidden neurons.


    Second phase is the Weight Updation phase. It involves the following steps:


    Gradient of the weight is calculated by multiplying the output delta and the input
    activation.


    A ratio or percentage of the gradient is subtracted from the weight. This ratio
    or percentage affects the quality of learning and speed. It is referred to as
    the learning rate. A neuron is able to train faster if the learning rate is higher.
    If the learning rate is lower, then the training is considered accurate.'

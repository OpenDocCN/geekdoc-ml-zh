    # CHAPTER 7.


    ## Neural Network


    ## Introduction


    Support Vector Machine is used for the purpose of classification and regression.
    In the previous chapter, we discussed about Support Vector Machine, margin and
    large margin methods, and kernel methods. Neural network refers to the parallel
    computing device that attempts to mimic the model of the brain. In the following
    chapter, we will discuss the early models of Neural Network as well as Perceptron
    learning model, back propagation, and Stochastic Gradient Descent. We discussed
    the implementation of perceptron learning, back propagation, and stochastic gradient
    descent in Python.


    ## Structure


    Neural network refers to a collection of algorithms that recognizes the relationships
    in data sets and mimics the working of a human brain. In this chapter, we will
    cover the following topics:


    - Early Models

    - Perceptron Learning

    - Back propagation

    - Stochastic Gradient Descent


    ## Objectives


    Neural network is a means of performing a machine learning task, in which a computer
    learns by the analysis of training examples. Following are the objectives covered
    in this chapter:


    - To know early models and perceptron learning

    - Understanding back propagation

    - Understanding stochastic gradient descent


    ## Early models


    Neural network is one of the subfields of machine learning. Neural network accepts
    the input data, performs training on the data, and produces the output based on
    the training performed. In 1943, *Warren Mc Culloch* and *Walter Pits* described
    the working of neurons. They modeled neural networks with the help of electrical
    circuits in order to explain the working of neurons in the brain. In 1949, *Donald
    Hebb* wrote *The Organization* of which pointed that the connection between the
    two neurons is enhanced if they are fired together. In 1959, *Bernard Widrow*
    and *Marcian Hoff* at Stanford developed neural network based models called ''**ADALINE**''
    and **ADALINE** stands for **Adaptive Linear Elements** and **MADALINE** stands
    for **Multiple Adaptive Linear**. ADALINE was used for the recognition of binary
    patterns. For a given stream of bits, it can predict the occurrence of the next
    bit. MADALINE stands for Multiple Adaptive Linear Elements. It is the first neural
    network that is applied to real-world problems and is still in use for commercial
    purposes.'

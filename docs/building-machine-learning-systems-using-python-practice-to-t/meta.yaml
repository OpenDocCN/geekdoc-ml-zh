  md: '# VC dimension


    VC dimension was originally given by *Vladimir Vapnik* and *Alexey* VC dimension
    may be defined as a measure of some of the features in terms of complexity, flexibility,
    richness or expressive power of the set of functions that may be learned using
    statistical binary classification algorithm.


    Uses of VC dimension include the following:


    VC dimension is used in the statistical learning theory for the prediction of
    the probabilistic upper bound of the test error of a classification model.


    VC dimension is also used in sample complexity bounds. Sample complexity may be
    defined as the linear function of the VC dimension of the hypothesis space.


    VC dimension is used in computational geometry for the prediction of the complexity
    of approximation algorithms.'

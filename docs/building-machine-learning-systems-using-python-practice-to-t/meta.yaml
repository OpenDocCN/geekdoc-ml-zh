    \n+   - [引言](Introduction)\n- [结构](Structure)\n- [目标](Objectives)\n- [引言](Introduction)\n\
    - [如何检测偏差？](How_to_detect_bias?)\n- [如何在机器学习中修正偏差或实现公平性？](How_to_fix_biases_or_achieve_fairness_in_ML?)\n\
    - [结论](Conclusion)\n- [问题](Questions)\n\n## 索引\n\n## 第1章\n\n## 引言\n\n机器学习是人工智能的应用之一。机器学习可以定义为系统在没有明确编程的情况下，通过经验自动学习的能力。它基于能够访问数据并利用这些数据自行执行学习的程序开发。在本章中，我们将讨论机器学习的分类、机器学习面临的各种挑战以及机器学习的应用。\n\
    \n## 结构\n\n机器学习的历史\n\n机器学习的分类\n\n采用机器学习面临的挑战\n\n应用\n\n## 目标\n\n理解机器学习的起源\n\n理解机器学习算法的分类\n\
    \n机器学习面临的挑战\n\n机器学习的应用\n\n## 机器学习的历史\n\n在20世纪40年代，第一台手动操作的计算机，**ENIAC数值积分器**被发明。此时，使用了*计算机*一词，意为“*一台具有密集数值计算能力的机器*”。自20世纪40年代以来，人们的想法是制造一台能够模仿人类学习和思考行为的机器。在20世纪50年代，第一个能够击败跳棋世界冠军的计算机游戏程序被开发出来。这帮助跳棋选手提高了他们的技能。此时，*弗兰克·罗森布拉特*发明了感知器，这是一个非常简单的分类器。机器学习在20世纪90年代变得流行，当时人工智能的概率方法作为统计学和计算机科学结合的产物诞生了。由于可用数据量巨大，科学家们开始构建能够分析和学习大量数据的智能系统。例如，IBM的深蓝能够击败世界国际象棋冠军*加里·卡斯帕罗夫*。机器学习是一种算法，其中的软件应用程序可以在没有明确编程的情况下准确预测结果。机器学习的基本本质是构建算法，在接收到输入数据时，使用统计分析预测输出，并在新数据可用时更新输出。*机器学习*一词由美国科学家*亚瑟·塞缪尔*在1959年创造，他在计算机游戏和人工智能方面具有专业知识。根据*亚瑟·塞缪尔*的说法，*机器学习是赋予计算机在没有被明确编程的情况下学习的能力*。根据*汤姆·米切尔*在1997年的说法，*一个计算机程序被称为从经验E中学习，关于某类任务T和性能度量P，如果它在T上的性能，由P衡量，随着经验E而提高*。"

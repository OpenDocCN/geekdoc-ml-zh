    - 欠拟合\n\n过拟合、适当拟合和欠拟合分别如图、图和图所示。在分类问题中，当我们处理数据集以执行预测任务时，我们通过在训练数据和测试数据上实施来计算准确率。如果获得令人满意的性能，我们尝试通过添加或移除某些特征集来增强性能。有时，设计的模型可能表现不佳。当设计的模型过于简单或过于复杂而无法处理目标时，它会显示出较差的性能：\n\

    \n### 结构\n\n无监督学习是一个复杂的处理任务，涉及在数据点既未标记也未分类的数据集中识别模式。本章将包括以下主题：\n\n- 训练与测试\n- 测试误差的界限\n\
    - VC维\n\n### 目标\n\n在无监督学习中，未分类和未标记的数据被发送到AI系统，算法在没有任何先前训练的情况下对这些数据进行操作。以下是本章的目标：\n\
    \n- 了解机器学习中训练与测试的区别\n- 理解VC维\n\n### 训练与测试\n\n训练数据帮助算法从经验中学习。在监督学习中，每个观测值包含输入变量和相应的目标变量。为了构建模型，需要实施训练集；为了验证测试集，需要测试集。数据集被分为训练集和测试集。\n\
    \n在机器学习中，创建模型是为了在测试数据上进行测试。为了拟合模型，使用训练数据；为了进行测试，使用测试数据。不一定需要使用数据集的70%来开发训练集，其余用于测试。这取决于所使用的数据集和需要完成的任务。\n\
    \n### 测试误差的界限\n\n主成分分析是一种降维方法，可用于将大型数据集的维度减少到更小的维度，同时仍然保留尽可能多的信息。\n\n主成分分析中执行的步骤包括：\n\
    \n- 标准化\n- 计算协方差矩阵\n- 通过计算协方差矩阵的特征值和特征向量来识别主成分\n- 创建特征向量\n- 重新投影数据\n\n第一步，标准化很重要，因为如果存在一些值很大，一些值很小，那么较大的范围将主导较小的范围。因此，执行标准化来解决这个问题。标准化可以通过从值中减去均值并除以标准差来完成。这表示如下：\n\
    \n*Z=(value-mean)/standard deviation*\n\n在第二步中，计算协方差矩阵以确定是否存在冗余信息。\n\n### VC维\n\
    \nVC维最初由*弗拉基米尔·瓦普尼克*和*阿列克谢*提出。VC维可以定义为使用统计二元分类算法可能学习的函数集的复杂性、灵活性、丰富性或表达能力的某些特征的度量。\n\
    \nVC维的用途包括：\n\n- VC维在统计学习理论中用于预测分类模型测试误差的概率上界。\n- VC维也用于样本复杂性界限。样本复杂性可以定义为假设空间VC维的线性函数。\n\
    - VC维在计算几何中用于预测近似算法的复杂性。"

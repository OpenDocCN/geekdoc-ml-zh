  md: '# Categorical attributes, multiway splits, and missing values in decision trees


    CART refers to the decision tree algorithm that either generates binary regression
    or classification trees based on whether the target variable is numeric or categorical.
    Optimal partitioning must be followed while performing partitioning of decision
    trees. In CART, same variables may be reused in the different parts of decision
    trees. Splitting may be binary or multiway.


    In a binary splitting, each node is further divided into at most two subgroups,
    whereas in the case of multiway splitting, each node is further split into multiple
    subgroups. Decision trees are very easy to comprehend if we follow multiway splitting
    as a particular attribute rarely reappears while traversing a path from the root
    to the leaf.


    There are several methods used for dealing with missing values in decision trees.
    Missing values may be ignored or may be assigned some other category.


    Missing values instances may be distributed among the child nodes as follows:


    Everything goes to a node having the largest number of instances.


    Distribution is done among all child nodes but with minimum weights, which is
    proportional to the number of instances from'

    \n迪普蒂·乔普拉\n\n# 使用Python构建机器学习系统\n\n通过真实用例实践训练预测模型并分析机器学习结果\n\n迪普蒂·乔普拉\n\n![](img/127fa3260d3bb89f8119b3b5ddc3f83f_1_0.png)\n\

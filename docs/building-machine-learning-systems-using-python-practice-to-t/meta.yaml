  md: '# History of machine learning


    In 1940s, the first manually-operated computer, **ENIAC Numerical Integrator and**
    was invented. At this time, the word *computer* was used which meant, ''*a machine
    having intensive numerical computation*'' Since 1940s, the idea was to build a
    machine that could mimic human behavior of learning and thinking. In 1950s, the
    first computer game program was developed that could beat the checkers world champion.
    This helped checker players in improving their skills. At this time, *Frank Rosenblatt*
    invented Perceptron, which is a very simple classifier. Machine learning became
    popular in 1990s when probabilistic approaches of AI were born as a result of
    the combination of statistics and computer science. Because of the large data
    available, scientists started building intelligent systems that could analyze
    and learn from a large amount of data. For example, the IBMs Deep Blue could beat
    the World Chess Champion, *Garry* Machine learning is a kind of algorithm in which
    the software applications can accurately predict the outcomes without being explicitly
    programmed. The basic essence of machine learning is to build algorithms that,
    on receiving input data, predicts the output using statistical analysis and updates
    the output as the new data is made available. The term *Machine learning* was
    coined by an American scientist, *Arthur Samuel*, in 1959 who had expertise in
    computer gaming and artificial intelligence. According to *Arthur gives computers
    the ability to learn without being explicitly* According to *Tom Mitchell* in
    1997, *computer program is said to learn from*'
  merge: -1
  pgno: 27
- img_proc: true
  md: '> experience E with respect to some task T and some performance measure P,
    if its performance on T, as measured by P, improves with experience E."


    Consider a machine learning based system which can help us find the traffic patterns
    in the busiest location. We can run a machine learning algorithm and use the traffic
    patterns of the past experience for training the system. If the system has learned
    successfully, then it will predict the traffic patterns in a better way with performance
    measure,


    As machine learning is in boom in today''s era, it is conducive to know the various
    applications as well as the challenges faced in machine learning. In this chapter,
    we will discuss the different machine learning techniques, the challenges faced
    in adopting machine learning, and the various application areas of machine learning.'
  merge: -1
  pgno: 28
- img_proc: true
  md: '# Classification of machine learning


    On the basis of the nature of learning and the response or output available to
    the learning system, machine learning implementations are of three types:


    **Supervised learning:** In supervised learning, the learning is performed using
    example data and its corresponding target response. During testing, when new examples
    are provided, it predicts the corresponding response. This learning is similar
    to how a student learns from a teacher. A teacher provides some good examples
    for the student to memorize. The student is then able to frame general rules to
    solve problems and draw useful conclusions.


    **Unsupervised learning:** In unsupervised learning, the learning is performed
    using example data without its associated target response. In this type of algorithm,
    a restructuring of data is performed where the data is segmented into different
    classes. The objects that belong to the same class have a high degree of similarity.


    **Reinforcement learning:** Reinforcement learning is similar to unsupervised
    learning in which, corresponding to the example data, there is no target response
    and each example is accompanied by a positive or a negative feedback. A positive'

    ## MICRO MEDIA\n\nShop No. 5, Mahendra Chambers,\n\n150 DN Rd. Next to Capital\
    \ Cinema,\n\nV.T. (C.S.T.) Station, MUMBAI-400 001\n\n电话: 22078296/22078297\n\n\
    ## DECCAN AGENCIES\n\n4-3-329, Bank Street,\n\nHyderabad-500195\n\n电话: 24756967/24756400\n\
    \n## BPB BOOK CENTRE\n\n376 Old Lajpat Rai Market,\n\nDelhi-110006\n\n电话: 23861747\n\
    \n![](img/127fa3260d3bb89f8119b3b5ddc3f83f_4_0.png)\n\n由Manish Jain为BPB Publications出版，地址：20\
    \ Ansari Road, Darya Ganj, New Delhi-110002，并由他安排在Mumbai的Repro India Ltd印刷\n\n\
    [www.bpbonline.com](http://www.bpbonline.com)\n\n## 献给\n\n我的家人和朋友\n他们始终与我同在，给予我爱、支持和关怀。\n\
    \n## 关于作者\n\n**迪普蒂·乔普拉博士** 在德里的Lal Bahadur Shastri管理学院担任助理教授（IT）。她拥有约7年的教学经验。她的研究兴趣包括自然语言处理、计算语言学和人工智能。她是3本书的作者，并在多个国际会议和期刊上发表了多篇研究论文。\n\
    \n## 关于审稿人\n\n**Anmol** 在软件行业拥有3年经验。他磨练了自己在机器学习、深度学习、构建和维护ETL/ELT数据管道以及数据驱动系统方面的技能。Anmol曾工作过的行业包括航空、电子商务、人力资源和医疗保健。他的日常工作涉及分析和解决复杂的业务问题，将工作分解为可行的可操作任务，并与他的团队和项目经理合作，规划并向我们的业务客户传达交付承诺。\n\
    \n当不工作时，Anmol大部分时间都在阅读、环游世界、玩Fifa以及观看他最喜欢的百老汇演出。作为一个公认的体育迷，他通过在周日下午观看皇家马德里的比赛来满足自己对足球的痴迷。\n\
    \n## 致谢\n\n我首先要感谢上帝，因为没有上帝，我无法完成这一切。\n\n我怀着感激之情，衷心感谢我所有的家人和朋友，感谢他们给予我的祝福和美好祝愿，使我能够实现出版这本基于机器学习的书籍的目标。\n\
    \n我衷心感谢本书的几位朋友/技术审稿人，他们每次都在鼓励和激励我，并证明他们始终在我身边。这样的关系是“质量胜于数量”的完美例证。\n\n如果没有BPB\
    \ Publications内容编辑的支持，这本书就不会问世。我感谢BPB Publications的编辑和出版专业人士，感谢他们对出版本书的浓厚兴趣和支持。\n\
    \n最后，我要感谢BPB Publications的Manish Jain先生，感谢他给我这个机会为他们写我的第一本书。\n\n## 前言\n\n随着来自不同来源的数据可用性增加，对数据分析和机器学习等数据驱动领域的需求日益增长。本书旨在涵盖机器学习的基本概念、各种学习范式以及这些范式中使用的不同架构和算法。\n\
    \n本书面向希望详细了解机器学习的初学者。本书也可供机器学习用户快速参考机器学习基础知识。\n\n以下是本书涵盖的章节：\n\n[第1章：机器学习简介](Chapter\
    \ 1: Introduction to Machine Learning)\n\n**描述：** 本章涵盖机器学习的基本概念、执行ML的领域、输入-输出函数\n\
    \n**涵盖的主题：**\n\n- 什么是机器学习？\n- ML的效用\n- ML的应用\n\n## 第2章：线性回归\n\n**描述：** 本章讨论线性回归\n\
    \n**涵盖的主题：** 本章涵盖的主题列表：\n\n- 单变量线性回归\n- 多变量线性回归\n- 梯度下降\n- 多项式回归\n\n## 第3章：使用逻辑回归进行分类\n\
    \n**描述：** 本章讨论使用逻辑回归进行分类\n\n**涵盖的主题：** 本书涵盖的主题列表：\n\n- 二元分类\n- 逻辑回归\n- 多类分类\n\n\
    ## 第4章：过拟合与正则化\n\n**描述：** 本章讨论过拟合和正则化\n\n**涵盖的主题：** 本章涵盖的主题列表：\n\n- 线性回归中的过拟合和正则化\n\
    - 逻辑回归中的过拟合和正则化\n\n## 第5章：学习的可行性\n\n**描述：** 本章讨论学习的可行性\n\n**涵盖的主题：** 本章涵盖的主题：\n\
    \n- 学习未知目标函数的可行性\n- 样本内误差\n- 样本外误差\n\n## 第6章：支持向量机\n\n**描述：** 本章讨论支持向量机\n\n**涵盖的主题：**\
    \ 请提供本书涵盖的主题列表：\n\n简介\n\n1.1 间隔\n\n1.2 大间隔方法\n\n核方法\n\n## 第7章：神经网络\n\n**描述：**\
    \ 本章讨论神经网络\n\n**涵盖的主题：** 本章涵盖的主题列表：\n\n简介\n\n早期模型\n\n感知器学习\n\n反向传播\n\n随机梯度下降\n\
    \n## 第8章：决策树\n\n**描述：** 本章讨论决策树\n\n**涵盖的主题：** 本章涵盖的主题列表：\n\n- 决策树\n- 回归树\n- 决策树中的停止准则和剪枝损失函数\n\
    - 决策树中的分类属性、多路分裂和缺失值\n- 决策树的不稳定性\n\n## 第9章：无监督学习\n\n**描述：** 本章讨论无监督学习\n\n**涵盖的主题：**\
    \ 本章涵盖的主题列表：\n\n- 简介\n- 聚类\n  - 2.1 K-means聚类\n  - 2.2 层次聚类\n- 主成分分析\n\n## 第10章：泛化理论\n\
    \n**描述：** 本章讨论泛化理论\n\n**涵盖的主题：** 本章涵盖的主题列表：\n\n- 训练与测试\n- 测试误差的界限\n- Vapnik Chervonenkis不等式\n\
    - VC维\n- VC不等式的证明\n\n## 第11章：机器学习中的偏差与公平性\n\n**描述：** 本章讨论机器学习中的偏差和公平性\n\n**涵盖的主题：**\
    \ 本章涵盖的主题列表："

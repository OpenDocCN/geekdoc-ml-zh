    \ etc. A doctor can use this information for analyzing the health condition of\
    \ an individual, draw pattern using patient history, and predict any sort of ailment\
    \ in the future. A machine may also be trained to have human-like intelligence.\
    \ A machine may behave as a doctor and predict a disease or suggest medicine on\
    \ the basis of past health condition records.\n\n**Oil and gas:** This industry\
    \ requires the need of machine learning the most. Machine learning applications\
    \ in oil and gas industry are vast. It not only includes streaming oil distribution\
    \ but also finding new sources of energy and the analyzing of underground minerals.\n\
    \n**Self-driving cars:** A self-driving car is one of the latest and most exciting\
    \ applications of machine learning. Tesla is a famous car manufacturing firm,\
    \ which is working on developing self-driving cars. It is building a self-driving\
    \ car using an unsupervised machine learning algorithm that is able to detect\
    \ objects and people while driving.\n\n**Automatic text translation:** Today,\
    \ if you visit any new place, the language is not a barrier to understand the\
    \ thoughts of the locals or to share your thoughts with them. With the help of\
    \ machine learning, we can perform translation from one language into another,\
    \ and also perform the conversion of text to speech and vice versa. **GNMT Neural\
    \ Machine** is based on neural machine learning that performs the translation\
    \ of text from one language into another language. GNMT is also referred to as\
    \ automatic translation system. Complex English to Hindi translations given by\
    \ Google Translator is shown in *Figure 1.5*.\n\n![](img/127fa3260d3bb89f8119b3b5ddc3f83f_44_0.png)\n\
    \n*Figure 1.5: Complex English to Hindi translation by Google Translator*\n\n\
    **Dynamic pricing:** Dynamic pricing refers to the pricing strategy that wholly\
    \ depends on the objective thought. For example, plane ticket, movie ticket, cab\
    \ fare, etc. are dynamically priced. Using machine learning, buying trends can\
    \ be found out and the dynamic prices of products can be determined. Uber uses\
    \ a machine learning model called *Geosurge* to perform the dynamic pricing of\
    \ individual rides.\n\n**Classification of news:** Machine learning helps in the\
    \ classification of vast news into different categories like National News, International\

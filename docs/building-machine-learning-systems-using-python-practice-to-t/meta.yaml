  md: '# Linear regression in one variable


    Linear regression is a technique to depict the relationship between an independent
    variable $x$ and a dependent variable Linear regression states that the relationship
    that exists between one or more input features and the relative output or target
    vector is approximately linear in nature. Linear regression finds the weighted
    sum of the input features along with the constant referred to as bias term or
    intercept. Linear regression has numerous real-life applications. These applications
    fall into two categories:


    If the application comprises forecasting, prediction, or error reduction, then
    linear regression may be applied to the data set values and make predictions in
    the response.


    When there is a need of variations in the response, then it may be attributed
    by the presence of other explanatory variables.


    Linear regression is used to find possible relationships between the variables
    in the field of behavioral, biological, and social sciences. In linear regression
    with one variable, hypothesis is defined as:


    $(x) =$


    Here, $x$ is referred to as an independent variable on which depends our hypothesis.
    For example, measured in mm could be'
  merge: -1
  pgno: 51
- img_proc: true
  md: 'x and *Number of Umbrellas* could be the hypothesis that we are trying to predict.
    and are referred to as the bias variable and weight variable, respectively and
    they together constitute the weight matrix.


    Cost function is an equation that gives an estimate of how close we are to the
    hypothesis. Smaller the value of cost function, closer we are from the required
    curve. So, we try to minimize the cost function in order to reduce error. The
    mean squared error cost function is defined as follows:


    $$J(\theta_0, \theta_1) = 1/2m \sum_{i=1}^{m} (h_{\theta}(x^i) - y^i)^2$$


    Here, *J* is a cost function, *m* refers to the number of data points in our data
    set, and *y* refers to the actual values that we will like to predict. To add
    normalization to the cost function, we introduce a constant *1/2m* to it.


    The code for linear regression in one variable in Python is as follows:



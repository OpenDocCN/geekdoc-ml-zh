  md: '# Challenges faced in adopting machine learning


    There are various challenges in adopting machine learning for developing projects.
    Some of these are as follows:


    **Requirement of proper experimentation and testing:** We need to conduct frequent
    tests in a machine learning system in order to obtain the desired outcome with
    proper experimentation. The method used to test the machine learning algorithm
    is referred to as stratification. In this method, we randomly split the data set
    mainly into two subsets, training set and testing set.


    **Inflexible business models:** We should follow an agile and flexible business
    policy in implementing machine learning. If one of the machine learning strategies
    is not working, then we need to perform more experimentation and consequently
    build a new robust machine learning model.


    Is the machine learning results ethical? Google is developing software that is
    used in military project called *Project* This project makes use of drone and
    will create autonomous weapons. Consequently, 12 employees of Google resigned
    in protest and more than 4000, along with over 1000 well-known scientists, signed
    a petition requesting the company to abandon the project.'
  merge: -1
  pgno: 32
- img_proc: true
  md: '**Impact of machine learning on humans:** A machine learning based system such
    as a movie recommendation system changes the choice of human over time and narrows
    them with time. It is interesting to know that people don''t notice how they get
    manipulated by algorithms. Examples include movie recommendation systems, news,
    propaganda, etc.


    **False correlation:** A false correlation comes into play when two parameters
    that are completely independent of each other show similar behavior. This creates
    an illusion that these parameters are somehow connected to each other. They are
    also known as **spurious** For example, if there is an increase in the number
    of car seat belts, there is a decrease in the number of astronaut deaths. This
    is a false correlation since a car seat belt has nothing to do with accidents
    occurring in space.


    **Feedback loops:** Feedback loops are worse than false correlations. It is a
    condition where the decision of an algorithm affects reality while convincing
    that the conclusion is correct. For example, a crime prevention program suggested
    that more police officials to be sent to a particular area on the basis of an
    increase in the crime rate. This led to the local residents reporting crimes more
    frequently as somebody was right there they can report them. This also led to
    the police officials writing more reports and implementing protocols resulting
    in a higher crime rate, which meant that more police had to be sent to the area.
    Earlier, when police officials were not present in the area, people didn''t report
    crimes frequently.'
  merge: -1
  pgno: 33
- img_proc: true
  md: '**Poisoned or contaminated reference data:** The outcome of a machine learning
    algorithm purely depends on the reference data or training data that a machine
    learns. If the training data or reference data is poisoned or contaminated, then
    the outcome of machine learning will also be incorrect. For example, if we want
    to develop a machine translation system, and if the training file consists of
    incorrect translations, then the output will also be incorrect.


    **Trickery:** Even if a machine learning algorithm is working perfectly, it can
    be tricked. A noise or distortion can completely alter the outcome of the algorithm.
    In the near future, if a machine learning algorithm is used for the analyses of
    X-rays emitted from the luggage at the airport and an object is placed next to
    a gun, then the algorithm will not be able to detect the gun.


    **Mastering machine learning:** A data scientist is a person who has expertise
    in machine learning. Those who are not data scientists may not acquire all of
    the knowledge related to machine learning. They need to find the key issues in
    a particular domain of machine learning and then try to overcome these issues.
    For example, a person who is working on predictive modeling may not have a complete
    knowledge of a **Natural Language Processing** task.


    **Wrong assumptions are drawn:** A machine learning based system needs to deal
    with missing values in the data sets. For example, the missing value issue can
    be resolved by using the mean value as the replacement to the missing value. Here,
    reliable'
  merge: -1

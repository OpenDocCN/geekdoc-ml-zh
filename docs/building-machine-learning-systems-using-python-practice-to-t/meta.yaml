    \ y 和自变量 x 之间的关系由多项式的 n 次方建模。它拟合 x 及其对应的 y 的条件均值之间存在的非线性关系。这表示为 E(y|x)。在某些情况下，对于从数据中收集的未知参数，E(y|x)\
    \ 是线性的。因此，多项式回归被称为具有多个变量的线性回归的特例。\n\n多项式回归表示如下：\n\n$Y = \\beta_0 + \\beta_1 X\
    \ + \\beta_2 X^2 + ... + \\beta_n X^n + \\epsilon$\n\n考虑以下关于多项式回归的 Python 代码：\n\
    \n```python\nimport operator\nimport numpy as np\nimport matplotlib.pyplot as\
    \ plt\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.metrics\
    \ import mean_squared_error, r2_score\nfrom sklearn.preprocessing import PolynomialFeatures\n\
    \nnp.random.seed(0)\nx = 1 - 3 * np.random.normal(0, 1, 50)\ny = x - 3 * (x **\
    \ 2) + 0.5 * (x ** 3) + np.random.normal(-3, 3, 50)\n\n# Data is transformed to\
    \ include another axis\nx = x[:, np.newaxis]\ny = y[:, np.newaxis]\n\npolyfeatures\
    \ = PolynomialFeatures(degree=3)\nxpoly = polyfeatures.fit_transform(x)\nmodel\
    \ = LinearRegression()\nmodel.fit(xpoly, y)\nypoly_pred = model.predict(xpoly)\n\
    rmse = np.sqrt(mean_squared_error(y, ypoly_pred))\nr2 = r2_score(y, ypoly_pred)\n\
    print(rmse)\nprint(r2)\n\nplt.scatter(x, y, s=20)\n# The values of x are sorted\
    \ according to the degree before the line plot\nsort_axis = operator.itemgetter(0)\n\
    sorted_zip = sorted(zip(x, ypoly_pred), key=sort_axis)\nx, y_poly_pred = zip(*sorted_zip)\n\
    plt.plot(x, ypoly_pred, color='m')\nplt.show()\n```\n\n在上面的代码中，我们执行了多项式回归，其中自变量\
    \ $x$ 的次数为 3。我们还绘制了图形，并生成了结果曲线的 RMSE 和 $R_2$ 分数。上述代码的输出如下：\n\n2.5898697824172037\n\

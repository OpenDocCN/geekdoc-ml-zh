  md: '# CHAPTER 1


    # Introduction


    Machine learning is one of the applications of artificial intelligence. Machine
    learning may be defined as the ability of the system to learn automatically through
    experience without being explicitly programmed. It is based on the development
    of programs that can access data and use this data to perform learning on their
    own. In this chapter, we will discuss the classification of machine learning,
    the various challenges faced in machine learning, and the applications of machine
    learning.'

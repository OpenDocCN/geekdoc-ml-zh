    # Instability in decision trees


    The instability problem in a decision tree classifier means the resulting constructed
    rules might be different from the original or the actual ones if there is a modification
    in the training sample. This instability is caused due to invalid selection of
    the split candidate. The split candidate is found using a split evaluation function
    that can be used to partition the data. If at a particular stage, no dominant
    split is found, then the split candidate is used to partition the node. If a different
    split is selected at any stage, then it results in a tree which is absolutely
    different from the original tree. So, the selection of the correct splitting candidate
    is very important in order to prevent inaccuracy or instability in decision trees.'

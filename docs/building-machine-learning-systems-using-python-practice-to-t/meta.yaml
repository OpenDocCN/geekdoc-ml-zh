    # Conclusion


    In this chapter, we learned about training versus testing, bounding the testing
    error, and VC dimension. In the next chapter, we will discuss how to detect bias
    and how to fix bias or achieve fairness in ML.'
  - '[PAGE 224]


    # Questions


    Explain the difference between training and testing in machine learning.


    Explain bounding the testing error.'
  - '[PAGE 225]


    # CHAPTER 11


    # Bias and Fairness in Machine Learning'
  - '[PAGE 226]


    # Introduction


    In machine learning and AI, future predictions are based on past observations
    and bias is based on prior information. Harmful biases occur because of human
    biases which are learnt by an algorithm from the training data. In the previous
    chapter, we discussed about training versus testing, bounding the testing error,
    and VC dimension. In the following chapter, we will discuss about bias and fairness.'
  - '[PAGE 227]


    # Structure


    Human biases are most found in data sets such as medical, educational, criminal,
    text, financial, etc. Human bias is little or no impacted on the weather data.
    This chapter will comprise the following topics:


    Introduction of bias


    How to detect bias?


    How to fix bias or achieve fairness in ML?'
  - '[PAGE 228]


    # Objectives


    In machine learning, algorithmic biases are referred to as unwarranted associations.
    Algorithmic biases are the bugs that can be harmful to the business and people.
    Following are the objectives of this chapter:


    Understanding how to identify bias.


    Understanding how to achieve fairness in ML.'
  - '[PAGE 229]


    # Introduction


    Bias is referred to as a disproportionate prejudice or inclination towards a particular
    thing or an idea. Bias may be found in the following different fields:


    +   - Research

    - Statistics

    - Social sciences'
  - '[PAGE 230]


    # How to detect bias?


    Bias is one of the popular topics that one encounters while building AI-based
    models. Many uncommon and common biases may be found in the following stages of
    AI model development:


    +   - Data collection

    - Data preprocessing

    - Data analysis

    - Modeling


    During data collection, biases may take place. This happens due to the occurrence
    of outliers and errors that happen while collecting data.


    Biases that are found during the data collection process include the following:


    **Selection** While preparing the sample data, selection of data must be done
    in a proper manner to avoid bias. For example, if the participants are students
    who are to undergo tests, then they may include the bias results.'
  - '[PAGE 231]


    **The Framing** Survey questions are framed in such a manner that biases are avoided
    and displays positivity in sentences, else biases crop up.


    **Systematic** It occurs because of faulty equipment. It leads to repeatable and
    consistent errors.


    **Response** It occurs due to questions that are answered incorrectly by the participants.


    During data preprocessing, the following steps may be undertaken:


    +   - Outlier detection

    - Missing values

    - Filtering data


    Outliers lead to a disproportionate effect on many of the analyses that are conducted.


    While dealing with the missing values, if all the missing values are replaced
    by the mean values, then it would mean being biased towards a particular group
    that is closer to the mean.


    Biases may be found during the process of data analysis. Biases may be found using
    the following approaches:'
  - '[PAGE 232]


    **Missing** Incorrect conclusions may be drawn from a distorted graph that provides
    incorrect information.


    **Confirmation** It involves the tendency to focus and confirm information that
    is related to someone''s preconceptions.


    When performing data modelling, it is very important to detect biases. For example,
    Amazon created a hiring algorithm that showed gender bias by favoring men as high
    potential candidates. A model that has high variance focuses on training data
    and doesn''t generalize well. Data always behaves in the same way in high bias.
    When we increase bias, variance decreases and vice versa. In supervised machine
    learning, training is performed on the input variables in such a manner that there
    is closeness between the predicted values and the actual values. Error refers
    to the difference between the actual and the predicted values. There are 3 types
    of errors in supervised machine learning:


    +   - Bias error

    - Variance error

    - Noise


    Bias and variance are reducible errors that we can minimize to a large extent.
    Noise is said to be an irreducible error that cannot be eliminated.'
  - '[PAGE 233]


    # How to fix biases or achieve fairness in ML?


    There are already many definitions of fairness as per literature and these cover
    the following elements:


    +   - Equalized odds

    - Unawareness

    - Individual fairness

    - Demographic parity

    - Counterfactual fairness

    - Predictive rate parity


    We should avoid including sensitive attribute as one of the features in training
    data. There are many ways to mitigate biases. Some of these techniques include:


    +   - Preprocessing

    - In-processing'
  - '[PAGE 234]


    # Post-processing


    The pre-processing approach takes place before the development of a model. Its
    main intent is to eliminate the underlying bias from the data set before modelling.
    This is one of the basic approaches of removing biases from the data. In-processing
    is the process of removing biases during the training phase. In post-processing,
    elimination of biases takes place after the training phase is over.'
  - '[PAGE 235]


    # Conclusion


    In this chapter, we learnt about biases, how to detect bias, and how to fix bias
    and achieve fairness.'
  - '[PAGE 236]


    # Questions


    Explain how we can detect bias.


    Explain how we can fix bias.'

    In the above code, DTclf.predict() is used for the prediction of the samples of
    a class. DTclf.predict_proba() is used to find the probability of each class.
    DecisionTreeClassifier can be used for binary classification and multi-class classification.
    plot_tree function can be used to plot the tree.


    ## Regression trees


    Decision tree algorithms may be used for the process of the prediction of results
    based on the given data. Decision tree algorithms are of two types, namely: classification
    tree and regression tree algorithm. **Classification and Regression Tree** methodology
    came into existence in 1984. It was introduced by *Leo Jerome Richard* and *Charles*.
    In a classification tree algorithm, the outcome variable is categorical or fixed.
    For example, using the classification tree algorithm, we may decide what type
    of car a customer will purchase. In regression tree algorithm, the target outcome
    value is a real number. For example, the selling price of residential places may
    be predicted using the regression tree algorithm. In the classification tree algorithm,
    the data set is split into classes such as Yes or No. In regression tree algorithm,
    the target variable is continuous, for example, temperature, price, etc. The classification
    of decision tree algorithms is shown in [figure](figure)


    ![](img/127fa3260d3bb89f8119b3b5ddc3f83f_189_0.png)


    Figure 8.1: Classification of decision trees algorithms


    ## Stopping criterion and pruning loss functions in decision trees


    The pruning technique is associated with the decision trees that can perform a
    reduction in the size of the decision trees by eliminating the parts of the tree
    that do not classify instances. Overfitting can be prevented by including pruning
    along with the decision trees. Overfitting occurs when the training is done so
    thoroughly that it also learns noise along with the pattern. Underfitting occurs
    when the amount of training is so insufficient that all the patterns cannot be
    identified. Pruning means that the tree is cut back. *Quinlan* in 1987 suggested
    a simple method for pruning decision trees, referred to as the reduced error pruning.
    In reduced error pruning, internal nodes are traversed from bottom to top and
    pruned only if it doesn''t reduce the tree''s accuracy. *Olaru* and *Wehenkel*
    in 2003 suggested the use of minimum error pruning. In minimum error pruning,
    for every node we perform a comparison of 1-probability error rate estimation
    without and with pruning. Pessimistic pruning is a fast method of pruning in which
    the nodes are traversed in a top to down manner. If a given internal node is pruned
    then all the descendents of this internal node are not sent for the pruning process.
    Optimal pruning is used to guarantee optimality and is based on the concept of
    dynamic programming. In optimal pruning, the tree obtained after pruning is much
    smaller as compared to the original tree and the number of internal nodes are
    much smaller as compared to the number of leaves.


    ## Categorical attributes, multiway splits, and missing values in decision trees


    CART refers to the decision tree algorithm that either generates binary regression
    or classification trees based on whether the target variable is numeric or categorical.
    Optimal partitioning must be followed while performing partitioning of decision
    trees. In CART, same variables may be reused in the different parts of decision
    trees. Splitting may be binary or multiway.


    In a binary splitting, each node is further divided into at most two subgroups,
    whereas in the case of multiway splitting, each node is further split into multiple
    subgroups. Decision trees are very easy to comprehend if we follow multiway splitting
    as a particular attribute rarely reappears while traversing a path from the root
    to the leaf.


    There are several methods used for dealing with missing values in decision trees.
    Missing values may be ignored or may be assigned some other category.


    Missing values instances may be distributed among the child nodes as follows:


    Everything goes to a node having the largest number of instances.


    Distribution is done among all child nodes but with minimum weights, which is
    proportional to the number of instances from'

    assumptions need to be drawn related to the replacement of the missing values.
    So, we must make sure that the data doesn''t come with the missing values and
    assumptions drawn are of substantial amount.


    **Machine learning based systems are still not intelligent:** While machine learning
    based systems are constantly evolving, there exists failure as well in the current
    machine learning based systems. For example, as an experiment, Microsoft''s chatbot
    Tay was released on Twitter that mimicked a teenage girl. It was a failure and
    consequently the company had to close the experiment and apologize to the whole
    internet crowd for the hurtful and offensive tweets by chatbot Tay.


    **Computational needs are expensive:** In order to perform large data processing,
    GPUs are used instead of CPUs. Some companies don''t have GPUs, so it takes a
    longer time for the conventional CPUs to process large amounts of data. In some
    situations, even with GPUs, it may take days or weeks to complete the processing
    as compared to the traditional software development that may take a few minutes
    or hours to complete the task.'
- md: '## Applications


    Machine learning is a buzzword today. There are numerous applications of machine
    learning. Some of the applications are shown in Figure 1.2.


    **Figure 1.2:** *Applications of machine learning*


    **Virtual personal assistants:** Some of the most popular examples of virtual
    personal assistants used today include Alexa, Siri, and Google Now. These virtual
    personal assistants help in finding information, whenever asked over voice. We
    can activate these virtual personal assistants and ask questions like *are the
    flights from London to...* or *what are the tasks that need to be performed?*
    For answering such queries, virtual personal assistants collect information or
    search previously asked queries or collect information from phone apps. Machine
    learning is an integral part of virtual personal assistants as they collect information
    and refine it based on the previous information which is then used to generate
    results based on the given preferences. Virtual personal assistants are integrated
    to various platforms such as mobile apps (for example, Google Allo), smartphones
    (for example, Samsung Bixby on Samsung S8), smart speakers (for example, Amazon
    Echo, Google Home), etc. Virtual personal assistants are small, portable devices.
    Google Home is shown in Figure 1.3.


    **Figure 1.3:** Google Home


    **Traffic prediction:** In order to manage traffic, GPS navigation devices are
    used. GPS devices track the current location and velocity of a vehicle, and store
    the information in the central server. This information is used to generate the
    current traffic report. This prevents traffic and helps in congestion analysis.
    A GPS device equipped in a car is shown in Figure 1.4. So, machine learning is
    used for estimating the areas where congestion can be found on the basis of daily
    GPS reports.


    *Figure 1.4: A GPS device equipped in a car*


    **Online transportation networks:** When we book a cab using an app, it estimates
    the price of the ride. Machine learning is used to minimize the detour. It plays
    a very important role in predicting the travel time, price of the ride, and reduce
    detour.


    **Video surveillance system:** A single person cannot monitor multiple video cameras.
    A video surveillance system uses machine learning at its back end to detect unusual
    behavior in people, like napping, stumbling, standing, etc. The video surveillance
    system on detecting unusual behavior will alert a human attendant and prevent
    any mishap from taking place.


    **Social media services:** Machine learning is vastly used in social media platforms
    for personalizing news feed and targeting better ads. Other applications of machine
    learning in social media services include the following:


    - **People you may know:** Machine learning is based on the concept of gaining
    knowledge with experience. Facebook notices people that we connect with, the profiles
    that we often visit, our workplace, groups that we share, our interest, etc. On
    the basis of all this information, Facebook gives a suggestion of the list of
    people we would like to become friends with.


    - **Face recognition:** When we upload a photograph of ours along with a friend,
    Facebook can immediately recognize that friend. This is because Facebook identifies
    unique features, poses, and projections and matches them with the photographs
    of the people in our friend list. It is a very complicated application at the
    back end as it considers the precision factor, but at the front end, it is a very
    simple application of machine learning. Facebook uses DeepFace, which is a deep
    learning project responsible for the identification of a person''s face in images.
    Facebook also provides a feature of alternative tags for an image that is already
    uploaded on Facebook.


    - **Similar pins:** Computer vision involves extraction of useful information
    from videos and images. Machine learning is one of the applications of computer
    vision. Pinterest makes use of computer vision to detect pins or objects in an
    image and recommend pins which are similar to it.


    - **Sentiment analysis:** Sentiment analysis is one of the applications of machine
    learning. It is a process of determining emotion or the opinion of a person from
    the given text. It is also referred to as opinion mining or sentiment classification.
    The application of sentiment analysis is found in decision-making applications,
    review-based websites, etc.


    **Email spam and malware filtering:** Email clients use numerous spam filtering
    techniques. In order to ensure that these approaches are continuously updated,
    machine learning is used. A rule-based spam filtering technique does not track
    the latest tricks adopted by the spammers. Examples of a spam filtering technique
    that is influenced by machine learning are multilayer perceptron, C4.5 Decision
    Tree Induction, etc. Every day, nearly 325,000 malwares are detected and about
    90-98% of the code is similar to its previous version. The system security programs
    that are based on machine learning are able to learn the coding pattern. Hence,
    they are able to find malware with a variation of 2-10% and also provide protection
    against them.


    **Online customer support:** Many websites today provide the facility to chat
    with the company’s customer support representatives while the user is scrolling
    the website. But not all the websites provide live executives to answer the queries.
    In some websites, the user talks to a chatbot. These chatbots extract useful information
    from the website and present it to the customer as a response to their query.
    Chatbots have advanced with time. They are based on a machine learning algorithm
    that gains knowledge from past experiences. Chatbots try to understand the user
    queries and then serve them with better responses every time.


    **Result refinement of a search engine:** Google and many other search engines
    make use of machine learning in order to improve the searching capability. Whenever
    we perform a search, an algorithm is run at the back end to see how we respond
    to the results provided by a search engine. If we open the top-most result and
    stay on the page for a very long time, then the search engine assumes that the
    result displayed is appropriate in accordance with the query. Also, if we reach
    the second or the third page of the search results but do not open any of the
    pages, then the search engine assumes that the result displayed is not in accordance
    with the query. In this way, the algorithm running at the back end tries to improve
    the performance of the search results.


    **Product recommendations:** When we shop an online product from a website, we
    notice that we start receiving emails containing shopping suggestions. Also, the
    app or the shopping website recommends items that match our choices. Product recommendations
    are displayed on the basis of past purchases, items browsed or added to the cart,
    or brand preferences. This magical shopping experience is due to machine learning.


    **Online fraud detection:** With the help of machine learning, we can track online
    financial frauds. For example, to prevent money laundering, Paypal uses the machine
    learning approach. Using certain tools, Paypal can compare millions of transactions
    occurring between buyers and sellers, and be able to distinguish between legal
    and illegal transactions.


    **Online gaming:** Machine learning is used in online gaming. For example, in
    Chess, it uses machine learning. On the basis of previous moves that gave winning
    situations, the algorithm running at the back end tries to improve its performance
    and make similar moves that it considers the best. In this way, machine learning
    tries to imbibe human-like intelligence in computer that can play like any human
    chess champion.


    **Financial services:** According to the experts, online credit card fraud has
    risen to $32 billion in 2020. Companies that are related to the financial sector
    can see the flow of financial data and prevent financial fraud. This is possible
    using machine learning. Machine learning helps in the identification of opportunities
    in trading and investment. With the help of cyber surveillance, we can identify
    those institutions and individuals that are at financial risk and take timely
    action to prevent any cyber fraud.


    **Healthcare:** There has been an advancement in technology in the field of medical
    healthcare by the incorporation of machine learning. Wearable sensors and devices
    can provide real-time'
  mdcn: '## 应用


    机器学习是当今的热门词汇。机器学习的应用非常广泛。其中一些应用如图1.2所示。


    **图1.2：** *机器学习的应用*


    **虚拟个人助理：** 当今使用的一些最受欢迎的虚拟个人助理示例包括Alexa、Siri和Google Now。这些虚拟个人助理在通过语音询问时，有助于查找信息。我们可以激活这些虚拟个人助理，并提出诸如*从伦敦到...的航班有哪些？*或*需要执行哪些任务？*之类的问题。为了回答此类查询，虚拟个人助理会收集信息或搜索之前询问过的查询，或从手机应用程序中收集信息。机器学习是虚拟个人助理不可或缺的一部分，因为它们收集信息并根据先前的信息进行提炼，然后用于根据给定的偏好生成结果。虚拟个人助理集成到各种平台中，例如移动应用程序（例如，Google
    Allo）、智能手机（例如，三星S8上的Samsung Bixby）、智能音箱（例如，Amazon Echo、Google Home）等。虚拟个人助理是小型、便携的设备。图1.3展示了Google
    Home。


    **图1.3：** Google Home


    **交通预测：** 为了管理交通，使用了GPS导航设备。GPS设备跟踪车辆的当前位置和速度，并将信息存储在中央服务器中。此信息用于生成当前的交通报告。这可以防止交通拥堵并有助于拥堵分析。图1.4展示了一辆汽车中配备的GPS设备。因此，机器学习用于根据每日GPS报告估算可能发生拥堵的区域。


    *图1.4：汽车中配备的GPS设备*


    **在线交通网络：** 当我们使用应用程序预订出租车时，它会估算行程价格。机器学习用于最小化绕行。它在预测行程时间、行程价格和减少绕行方面发挥着非常重要的作用。


    **视频监控系统：** 单个人无法监控多个摄像头。视频监控系统在其后端使用机器学习来检测人们的异常行为，如打瞌睡、绊倒、站立等。视频监控系统在检测到异常行为时会提醒人类值班员，并防止任何事故的发生。


    **社交媒体服务：** 机器学习在社交媒体平台上被广泛用于个性化新闻推送和定向投放更精准的广告。机器学习在社交媒体服务中的其他应用包括以下内容：


    - **你可能认识的人：** 机器学习基于通过经验获取知识的概念。Facebook会关注我们联系的人、我们经常访问的个人资料、我们的工作场所、我们共享的群组、我们的兴趣等。基于所有这些信息，Facebook会建议我们可能想成为朋友的人的列表。


    - **人脸识别：** 当我们上传一张自己和朋友的照片时，Facebook可以立即识别出那位朋友。这是因为Facebook会识别独特的特征、姿势和投影，并将其与我们朋友列表中的人的照片进行匹配。这是一个在后端非常复杂的应用，因为它考虑了精确度因素，但在前端，它是一个非常简单的机器学习应用。Facebook使用DeepFace，这是一个深度学习项目，负责识别图像中的人脸。Facebook还为已上传到Facebook的图像提供了替代标签功能。


    - **相似图钉：** 计算机视觉涉及从视频和图像中提取有用信息。机器学习是计算机视觉的应用之一。Pinterest利用计算机视觉来检测图像中的图钉或物体，并推荐与之相似的图钉。


    - **情感分析：** 情感分析是机器学习的应用之一。它是一个从给定文本中确定个人情绪或观点的过程。它也被称为意见挖掘或情感分类。情感分析的应用见于决策应用、基于评论的网站等。


    **电子邮件垃圾邮件和恶意软件过滤：** 电子邮件客户端使用多种垃圾邮件过滤技术。为了确保这些方法持续更新，使用了机器学习。基于规则的垃圾邮件过滤技术无法跟踪垃圾邮件发送者采用的最新技巧。受机器学习影响的垃圾邮件过滤技术示例包括多层感知器、C4.5决策树归纳等。每天检测到近325,000个恶意软件，其中约90-98%的代码与其先前版本相似。基于机器学习的系统安全程序能够学习编码模式。因此，它们能够发现具有2-10%变异的恶意软件，并提供相应的防护。


    **在线客户支持：** 如今许多网站提供在用户浏览网站时与公司客户支持代表聊天的功能。但并非所有网站都提供实时客服来回答查询。在某些网站中，用户与聊天机器人对话。这些聊天机器人从网站中提取有用信息，并将其作为对用户查询的响应呈现给客户。聊天机器人随着时间的推移而进步。它们基于一种从过去经验中获取知识的机器学习算法。聊天机器人试图理解用户查询，然后每次提供更好的响应。


    **搜索引擎结果优化：** 谷歌和许多其他搜索引擎利用机器学习来提高搜索能力。每当我们进行搜索时，后端会运行一个算法，查看我们如何响应搜索引擎提供的结果。如果我们打开最顶部的结果并在页面上停留很长时间，那么搜索引擎会假设显示的结果与查询相符。此外，如果我们到达搜索结果的第二页或第三页但没有打开任何页面，那么搜索引擎会假设显示的结果与查询不符。通过这种方式，后端运行的算法试图提高搜索结果的性能。


    **产品推荐：** 当我们从网站购买在线产品时，我们会注意到开始收到包含购物建议的电子邮件。此外，应用程序或购物网站会推荐符合我们选择的商品。产品推荐是基于过去的购买记录、浏览过或添加到购物车的商品，或品牌偏好来显示的。这种神奇的购物体验归功于机器学习。


    **在线欺诈检测：** 借助机器学习，我们可以追踪在线金融欺诈。例如，为了防止洗钱，Paypal使用了机器学习方法。使用某些工具，Paypal可以比较买家和卖家之间发生的数百万笔交易，并能够区分合法和非法交易。


    **在线游戏：** 机器学习应用于在线游戏中。例如，在国际象棋中，它使用了机器学习。基于之前带来胜利局面的走法，后端运行的算法试图提高其性能，并做出它认为最佳的类似走法。通过这种方式，机器学习试图将类似人类的智能注入计算机，使其能够像任何人类国际象棋冠军一样下棋。


    **金融服务：** 据专家称，在线信用卡欺诈在2020年已上升至320亿美元。与金融相关的公司可以查看金融数据的流动并防止金融欺诈。这通过机器学习成为可能。机器学习有助于识别交易和投资中的机会。借助网络监控，我们可以识别那些面临金融风险的机构和个人，并采取及时行动防止任何网络欺诈。


    **医疗保健：** 通过引入机器学习，医疗保健领域的技术取得了进步。可穿戴传感器和设备可以提供实时'

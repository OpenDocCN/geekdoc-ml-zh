- md: '## Classification of machine learning


    On the basis of the nature of learning and the response or output available to
    the learning system, machine learning implementations are of three types:


    **Supervised learning:** In supervised learning, the learning is performed using
    example data and its corresponding target response. During testing, when new examples
    are provided, it predicts the corresponding response. This learning is similar
    to how a student learns from a teacher. A teacher provides some good examples
    for the student to memorize. The student is then able to frame general rules to
    solve problems and draw useful conclusions.


    **Unsupervised learning:** In unsupervised learning, the learning is performed
    using example data without its associated target response. In this type of algorithm,
    a restructuring of data is performed where the data is segmented into different
    classes. The objects that belong to the same class have a high degree of similarity.


    **Reinforcement learning:** Reinforcement learning is similar to unsupervised
    learning in which, corresponding to the example data, there is no target response
    and each example is accompanied by a positive or a negative feedback. A positive
    feedback or credit is given when, during testing, a correct response is obtained
    corresponding to the example data. In a negative feedback, the error or penalty
    is awarded because, during testing, an incorrect response is obtained corresponding
    to the example data.


    **Semi-supervised learning:** In semi-supervised learning, during training, we
    have example data and some of the corresponding target responses are missing.
    It is a combination of supervised and unsupervised learning.


    On the basis of the desired output, machine learning implementation is divided
    into the following types:


    **Classification:** In this type of learning, two or more classes are assigned
    to the input present in the training data. During testing, when we provide the
    input, it is classified into two or more classes. For example, in spam filtering,
    it classifies whether an email is spam or not spam.


    **Regression:** Regression is performed during supervised learning. In this type
    of learning, the output is continuous rather than discrete.


    **Clustering:** Clustering is performed during unsupervised learning in which
    the testing data is classified into groups and, unlike the task of classification,
    these groups or classes are not known beforehand.


    The different types of machine learning algorithms are depicted in Figure 1.1
    as follows:


    ![](img/127fa3260d3bb89f8119b3b5ddc3f83f_31_0.png)


    **Figure 1.1:** *Classification of machine learning algorithm*


    ## Challenges faced in adopting machine learning


    There are various challenges in adopting machine learning for developing projects.
    Some of these are as follows:


    **Requirement of proper experimentation and testing:** We need to conduct frequent
    tests in a machine learning system in order to obtain the desired outcome with
    proper experimentation. The method used to test the machine learning algorithm
    is referred to as stratification. In this method, we randomly split the data set
    mainly into two subsets, training set and testing set.


    **Inflexible business models:** We should follow an agile and flexible business
    policy in implementing machine learning. If one of the machine learning strategies
    is not working, then we need to perform more experimentation and consequently
    build a new robust machine learning model.


    **Ethical concerns:** Is the machine learning results ethical? Google is developing
    software that is used in a military project called *Project Maven*. This project
    makes use of drones and will create autonomous weapons. Consequently, 12 employees
    of Google resigned in protest and more than 4000, along with over 1000 well-known
    scientists, signed a petition requesting the company to abandon the project.


    **Impact of machine learning on humans:** A machine learning based system such
    as a movie recommendation system changes the choice of human over time and narrows
    them with time. It is interesting to know that people don''t notice how they get
    manipulated by algorithms. Examples include movie recommendation systems, news,
    propaganda, etc.


    **False correlation:** A false correlation comes into play when two parameters
    that are completely independent of each other show similar behavior. This creates
    an illusion that these parameters are somehow connected to each other. They are
    also known as **spurious correlations**. For example, if there is an increase
    in the number of car seat belts, there is a decrease in the number of astronaut
    deaths. This is a false correlation since a car seat belt has nothing to do with
    accidents occurring in space.


    **Feedback loops:** Feedback loops are worse than false correlations. It is a
    condition where the decision of an algorithm affects reality while convincing
    that the conclusion is correct. For example, a crime prevention program suggested
    that more police officials be sent to a particular area on the basis of an increase
    in the crime rate. This led to the local residents reporting crimes more frequently
    as somebody was right there they could report them. This also led to the police
    officials writing more reports and implementing protocols resulting in a higher
    crime rate, which meant that more police had to be sent to the area. Earlier,
    when police officials were not present in the area, people didn''t report crimes
    frequently.


    **Poisoned or contaminated reference data:** The outcome of a machine learning
    algorithm purely depends on the reference data or training data that a machine
    learns. If the training data or reference data is poisoned or contaminated, then
    the outcome of machine learning will also be incorrect. For example, if we want
    to develop a machine translation system, and if the training file consists of
    incorrect translations, then the output will also be incorrect.


    **Trickery:** Even if a machine learning algorithm is working perfectly, it can
    be tricked. A noise or distortion can completely alter the outcome of the algorithm.
    In the near future, if a machine learning algorithm is used for the analyses of
    X-rays emitted from the luggage at the airport and an object is placed next to
    a gun, then the algorithm will not be able to detect the gun.


    **Mastering machine learning:** A data scientist is a person who has expertise
    in machine learning. Those who are not data scientists may not acquire all of
    the knowledge related to machine learning. They need to find the key issues in
    a particular domain of machine learning and then try to overcome these issues.
    For example, a person who is working on predictive modeling may not have a complete
    knowledge of a **Natural Language Processing** task.


    **Wrong assumptions are drawn:** A machine learning based system needs to deal
    with missing values in the data sets. For example, the missing value issue can
    be resolved by using the mean value as the replacement to the missing value. Here,
    reliable assumptions need to be drawn related to the replacement of the missing
    values. So, we must make sure that the data doesn''t come with the missing values
    and assumptions drawn are of substantial amount.


    **Machine learning based systems are still not intelligent:** While machine learning
    based systems are constantly evolving, there exists failure as well in the current
    machine learning based systems. For example, as an experiment, Microsoft''s chatbot
    Tay was released on Twitter that mimicked a teenage girl. It was a failure and
    consequently the company had to close the experiment and apologize to the whole
    internet crowd for the hurtful and offensive tweets by chatbot Tay.


    **Computational needs are expensive:** In order to perform large data processing,
    GPUs are used instead of CPUs. Some companies don''t have GPUs, so it takes a
    longer time for the conventional CPUs to process large amounts of data. In some
    situations, even with GPUs, it may take days or weeks to complete the processing
    as compared to the traditional software development that may take a few minutes
    or hours to complete the task.'
  mdcn: '## 机器学习的分类


    根据学习的本质以及学习系统可用的响应或输出，机器学习实现分为三种类型：


    **监督学习：** 在监督学习中，学习是使用示例数据及其对应的目标响应来执行的。在测试阶段，当提供新的示例时，它会预测相应的响应。这种学习类似于学生从老师那里学习的方式。老师为学生提供一些好的示例来记忆。然后学生能够制定通用规则来解决问题并得出有用的结论。


    **无监督学习：** 在无监督学习中，学习是使用没有关联目标响应的示例数据来执行的。在这类算法中，会对数据进行重组，将数据分割成不同的类别。属于同一类别的对象具有高度的相似性。


    **强化学习：** 强化学习类似于无监督学习，其中对于示例数据，没有目标响应，每个示例都伴随着正面或负面的反馈。在测试期间，当针对示例数据获得正确的响应时，会给予正面反馈或奖励。在负面反馈中，会给予错误或惩罚，因为在测试期间，针对示例数据获得了不正确的响应。


    **半监督学习：** 在半监督学习中，在训练期间，我们拥有示例数据，但其中一些对应的目标响应缺失。它是监督学习和无监督学习的结合。


    根据期望的输出，机器学习实现分为以下类型：


    **分类：** 在这种类型的学习中，将两个或多个类别分配给训练数据中存在的输入。在测试阶段，当我们提供输入时，它会被分类到两个或多个类别中。例如，在垃圾邮件过滤中，它会分类一封电子邮件是垃圾邮件还是非垃圾邮件。


    **回归：** 回归是在监督学习期间执行的。在这种类型的学习中，输出是连续的而不是离散的。


    **聚类：** 聚类是在无监督学习期间执行的，其中测试数据被分类成组，并且与分类任务不同，这些组或类别事先是未知的。


    不同类型的机器学习算法如图1.1所示：


    ![](img/127fa3260d3bb89f8119b3b5ddc3f83f_31_0.png)


    **图1.1：** *机器学习算法的分类*


    ## 采用机器学习面临的挑战


    在采用机器学习开发项目时，存在各种挑战。其中一些如下：


    **需要适当的实验和测试：** 我们需要在机器学习系统中进行频繁测试，以便通过适当的实验获得期望的结果。用于测试机器学习算法的方法称为分层。在这种方法中，我们主要将数据集随机分成两个子集：训练集和测试集。


    **不灵活的业务模型：** 在实施机器学习时，我们应该遵循敏捷和灵活的业务策略。如果其中一个机器学习策略不起作用，那么我们需要进行更多的实验，从而构建一个新的、稳健的机器学习模型。


    **伦理问题：** 机器学习的结果是否符合伦理？谷歌正在开发用于一个名为*Project Maven*的军事项目的软件。该项目使用无人机并将制造自主武器。因此，谷歌的12名员工辞职以示抗议，超过4000名员工以及1000多名著名科学家签署了一份请愿书，要求公司放弃该项目。


    **机器学习对人类的影响：** 基于机器学习的系统，如电影推荐系统，会随着时间的推移改变人类的选择，并使其范围变窄。有趣的是，人们没有注意到他们是如何被算法操纵的。例子包括电影推荐系统、新闻、宣传等。


    **虚假相关性：** 当两个完全独立的参数表现出相似的行为时，就会出现虚假相关性。这会产生一种错觉，认为这些参数之间以某种方式相互关联。它们也被称为**伪相关**。例如，如果汽车安全带的数量增加，宇航员死亡人数就会减少。这是一个虚假相关性，因为汽车安全带与太空事故无关。


    **反馈循环：** 反馈循环比虚假相关性更糟糕。这是一种算法的决策影响现实，同时让人相信结论是正确的情况。例如，一个犯罪预防程序建议根据犯罪率的上升向特定区域派遣更多警察。这导致当地居民更频繁地报告犯罪，因为有人就在那里，他们可以报告。这也导致警察官员撰写更多报告并实施协议，从而导致更高的犯罪率，这意味着必须向该地区派遣更多警察。早些时候，当该地区没有警察官员时，人们并不经常报告犯罪。


    **被污染或受污染的参考数据：** 机器学习算法的结果完全取决于机器学习的参考数据或训练数据。如果训练数据或参考数据被污染或受污染，那么机器学习的结果也将是不正确的。例如，如果我们想开发一个机器翻译系统，并且训练文件包含不正确的翻译，那么输出也将是不正确的。


    **欺骗：** 即使机器学习算法运行完美，它也可能被欺骗。噪声或失真可以完全改变算法的结果。在不久的将来，如果使用机器学习算法分析机场行李发出的X射线，并且在枪支旁边放置一个物体，那么该算法将无法检测到枪支。


    **掌握机器学习：** 数据科学家是精通机器学习的人。非数据科学家可能无法掌握所有与机器学习相关的知识。他们需要找到机器学习特定领域的关键问题，然后尝试克服这些问题。例如，从事预测建模的人可能没有**自然语言处理**任务的完整知识。


    **得出错误的假设：** 基于机器学习的系统需要处理数据集中的缺失值。例如，缺失值问题可以通过使用平均值作为缺失值的替代来解决。这里，需要就缺失值的替代做出可靠的假设。因此，我们必须确保数据没有缺失值，并且得出的假设具有实质性。


    **基于机器学习的系统仍然不智能：** 虽然基于机器学习的系统在不断发展，但当前基于机器学习的系统也存在失败。例如，作为一项实验，微软的聊天机器人Tay在Twitter上发布，模仿一个十几岁的女孩。这是一个失败，因此公司不得不关闭实验，并为聊天机器人Tay发布的伤人和冒犯性推文向整个互联网人群道歉。


    **计算需求昂贵：** 为了进行大数据处理，使用GPU而不是CPU。一些公司没有GPU，因此传统CPU处理大量数据需要更长的时间。在某些情况下，即使使用GPU，也可能需要数天或数周才能完成处理，而传统软件开发可能只需要几分钟或几小时就能完成任务。'

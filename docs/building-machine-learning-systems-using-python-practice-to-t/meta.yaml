  md: '# In-sample error and out-of-sample error


    The data points that are used for making a model are referred to as in-sample
    data. In-sample error may be defined as the error that is obtained on the same
    data set that is used for building the machine learning model.


    The data points that are new and do not belong to any of the training data sample
    are referred to as out-of-sample data. Out-of-sample error may be defined as the
    error that is obtained on the new data set. It is also referred to as the generalization
    error.



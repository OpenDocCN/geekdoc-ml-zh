    matrix:


    **Binary classification** These are the parameters that are derived from the confusion
    matrix. They involve the following parameters:


    **Classification accuracy:** It may be stated as the ratio of the instances that
    are correctly classified. It can be depicted as follows:


    $Classification\_Accuracy = \frac{(True\_Positives + True\_Negatives)}{(Total\
    instances)}$


    **Error rate:** It may be stated as the ratio of instances that will not be classified
    correctly. It can be depicted as follows:


    $Error\ Rate = \frac{(False\_Positives + False\_Negatives)}{(Total\ instances)}$


    **Sensitivity:** It can be stated as the ratio of the correct positives and the
    total number of positives. It is also referred to as recall or true positive rate.
    It can be depicted as follows:


    $Sensitivity = \frac{(True\_Positives\ )}{(Total\ Positive\ instances)}$'
  - '[PAGE 88]


    **Specificity**: It can be stated as the ratio of the correct negatives and the
    total number of negatives. It is also referred to as the true negative rate. It
    can be depicted as follows:


    $$Specificity = \frac{(True\_Negatives)}{(Total\ Negative\ instances)}$$


    From the above mentioned confusion matrix, we obtain 25% error rate, 75% accuracy,
    75% sensitivity, and 75% specificity.'
  - '[PAGE 89]


    # Logistic regression


    Logistic regression is a statistical model that makes use of the logistic function
    to model a binary dependent variable. It may be defined as the transformation
    of linear regression *mot del* that can probabilistically model the binary variables.


    It may be represented by the following probability:


    $$p = \frac{1}{1 + e^{-(\theta_0 + \theta_1 X_1 + \dots + \theta_n X_n)}} = \frac{1}{1
    + e^{-(\theta_0 + \sum \theta_i X_i)}}$$


    The output in linear regression is continuous, whereas in logistic regression,
    the output is discrete. Assumptions of logistic regression include the following:


    In logistic regression, the dependent variable should be binary.


    In logistic regression, Linearity must exist between logit and independent variables.


    There is no chance of multicollinearity.


    It requires a large sample size.'

    # Polynomial regression


    Polynomial regression is a type of regression analysis in which the relationship
    that exists between a dependent variable y and an independent variable x is modeled
    by the nth degree of the polynomial It fits a nonlinear relation that exists between
    x and its corresponding conditional mean of This is denoted as In some of the
    cases, for the unknown parameters that are collected from the data, E(y|x) is
    linear. So, polynomial regression is referred to as a special case of linear regression
    with multiple variables.


    Polynomial regression is represented as follows:



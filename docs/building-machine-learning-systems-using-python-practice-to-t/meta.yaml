- md: "## Gradient descent\n\nGradient descent is a method to minimize the value of\
    \ Cost Function. It can alter the values of Theta 0 and Theta 1 of a point based\
    \ on the slope or gradient of the Cost Function curve. The changes introduced\
    \ in the values of Theta 0 and Theta 1 also bring changes to the hypothesis, thereby\
    \ bringing a better fit to the data. Gradient descent estimates the derivative\
    \ of cost function. It is represented by the following formula:\n\n$$\\theta^{new}\
    \ = \\theta^{old} - \\alpha \\frac{1}{m} \\sum_{i=1}^{m} [(h_{\\theta}(X) - y)X^T]$$\n\
    \nHere, $X-y$ is referred to as error. $\\alpha$ is referred to as the learning\
    \ rate. In this method, we first fetch and clean the data and analyze it. Then,\
    \ we define the hypothesis, regression parameters, and cost function. Then, we\
    \ run the gradient descent algorithm on all the data points and update the hypothesis.\
    \ This algorithm is implemented in Python as follows:\n\n```python\ndef gradientDescent(X,\
    \ y, theta, alpha, numiters):\n    # number of training examples\n    p = len(y)\n\
    \    # Initialize J_history and Theta_history\n    Jhistory = []\n    Thetahistory\
    \ = []\n    for i in range(numiters):\n        # Calculate h = X * theta\n   \
    \     h = np.sum(np.multiply(X, theta), axis=1)\n        # Calculate the error\
    \ = (h - y)\n        error = np.subtract(h, y)\n        # Calculate the new theta\n\
    \        thetanew = alpha * (1/p) * np.sum(np.multiply(X.T, error), axis=1)\n\
    \        # Update theta\n        theta = np.subtract(theta, thetanew)\n      \
    \  # Collect all the theta and J\n        Thetahistory.append(theta.tolist())\n\
    \        Jhistory.append(calcCostFunction(X, y, theta).tolist())\n    return theta,\
    \ Thetahistory, Jhistory\n\n# Running the Gradient Descent\n# Initialize theta\n\
    theta = np.asarray([0, 0]).astype(float)\n# Set the number of iterations for the\
    \ Gradient Descent\niterations = 2000\n# Set the Learning Rate\nalpha = 0.01\n\
    # Run the gradientDescent() function, and collect the output in \"results\"\n\
    results = gradientDescent(X, y, theta, alpha, iterations)\n# Get the theta from\
    \ the results\ntheta = results[0]  # new theta\n# Get the theta history\nThetahistory\
    \ = results[1]  # Theta history\n# Get the J history\nJhistory = results[2]  #\

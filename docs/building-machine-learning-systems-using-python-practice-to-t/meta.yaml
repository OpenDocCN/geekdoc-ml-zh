    Let us now consider the following testing analysis methods:


    **Confusion** It is used to present the performance of a binary classifier. The
    decision threshold, *T* may be used to find out whether the given set of instances
    is positive or negative. If the probability allotted to the given instance of
    a classifier is greater than then it is referred to as *positive* otherwise, it
    is referred to as'
  - '[PAGE 86]


    When all the given testing instances are classified, then the target labels are
    compared with the outcome labels to generate the following four terms:


    **True positives (TP)** – The total number of instances that are positive and
    are classified as positive


    **False positives (FP)** – The total number of instances that are negative and
    are classified as positive


    **False negatives (FN)** – The total number of instances that are positive and
    are classified as negative


    **True negatives (TN)** – The total number of instances that are negative and
    are classified as negative


    The confusion matrix is represented as follows:


    | follows: follows: |

    |---|

    | follows: follows: |

    | follows: follows: |


    Here, the column represents the outcome classes and the rows represent the target
    classes. The diagonal cells show the number of cases that are classified correctly
    and the off-diagonal cells show the number of cases that are not classified correctly.'
  - '[PAGE 87]


    Let the value of the decision threshold be Consider the testing data table given
    above. We get the following confusion matrix:


    matrix: matrix:



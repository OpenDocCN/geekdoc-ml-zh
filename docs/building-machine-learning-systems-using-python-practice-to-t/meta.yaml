    # Binary classification


    Binary classification, also referred to as binomial classification, may be defined
    as the process of classification of elements into two groups on the basis of the
    classification rule. It is found in the following fields:


    In the medical field, it is used to test whether a patient has any disease or
    not.


    In factories, it is used to decide whether a product is in accordance with the
    quality standards or not, or to check if some specification is met or not.


    In information retrieval, it is used in deciding whether a given page or an article
    should be in the result set of a search or not on the basis of the relevance of
    an article or the usefulness to the user.


    In spam filtering, it is used in deciding whether an email message received is
    a spam mail or not.


    It is also used in credit card fraudulent transaction detection.


    Some of the techniques used for learning binary classifiers include the following:'

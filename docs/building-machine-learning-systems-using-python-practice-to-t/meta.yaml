    project that we desire to make. Data may be gathered from various sources such
    as files, sensors, databases, etc.


    **Pre-processing of** The data collected from different sources for building the
    machine learning model cannot be directly used for analysis purpose, as it may
    contain a large amount of noisy data, unorganized text, missing values, large
    values, or irrelevant text. All such unwanted data may be eliminated in order
    to obtain clean data. While developing a machine learning model, we must follow
    the 80/20 rule. According to this rule, we must spend 80% of time in pre-processing
    of the data and 20% of time in analysis. Data may be classified into the following
    categories:



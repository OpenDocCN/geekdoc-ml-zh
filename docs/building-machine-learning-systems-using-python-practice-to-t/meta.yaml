    在二元分裂中，每个节点进一步分为最多两个子组，而在多路分裂的情况下，每个节点进一步分为多个子组。如果我们遵循多路分裂，决策树非常容易理解，因为在从根到叶遍历路径时，特定属性很少重新出现。



  mdcn: "## 结论\n\n在本章中，我们学习了训练与测试、测试误差的界定以及VC维度。在下一章中，我们将讨论如何检测偏差，以及如何在机器学习中修正偏差或实现公平性。\n\
    \n## 问题\n\n解释机器学习中训练与测试的区别。\n\n解释测试误差的界定。\n\n## 第11章\n\n## 机器学习中的偏差与公平性\n\n##\
    \ 引言\n\n在机器学习和人工智能中，未来的预测基于过去的观察，而偏差则基于先验信息。有害偏差的产生源于人类偏见，而算法从训练数据中学习了这些偏见。在上一章中，我们讨论了训练与测试、测试误差的界定以及VC维度。在接下来的章节中，我们将讨论偏差与公平性。\n\
    \n## 结构\n\n人类偏见最常见于医疗、教育、犯罪、文本、金融等数据集中。人类偏见对天气数据的影响很小或几乎没有。本章将包含以下主题：\n\n- 偏差简介\n\
    - 如何检测偏差？\n- 如何在机器学习中修正偏差或实现公平性？\n\n## 目标\n\n在机器学习中，算法偏差被称为无根据的关联。算法偏差是可能对业务和人员造成危害的缺陷。以下是本章的目标：\n\
    \n- 理解如何识别偏差。\n- 理解如何在机器学习中实现公平性。\n\n## 引言\n\n偏差指的是对特定事物或想法不成比例的偏见或倾向。偏差可能存在于以下不同领域：\n\
    \n- 研究\n- 统计学\n- 社会科学\n\n## 如何检测偏差？\n\n偏差是构建基于人工智能模型时遇到的热门话题之一。在人工智能模型开发的以下阶段，可能会发现许多不常见和常见的偏差：\n\
    \n- 数据收集\n- 数据预处理\n- 数据分析\n- 建模\n\n在数据收集过程中，可能会发生偏差。这是由于在收集数据时出现的异常值和错误导致的。\n\n\
    在数据收集过程中发现的偏差包括以下几种：\n\n**选择偏差** 在准备样本数据时，必须以适当的方式选择数据以避免偏差。例如，如果参与者是需要接受测试的学生，那么他们可能会包含有偏差的结果。\n\
    \n**框架效应** 调查问题的构建方式旨在避免偏差并在句子中显示积极性，否则偏差就会产生。\n\n**系统性偏差** 它是由于设备故障引起的。它会导致可重复且一致的错误。\n\
    \n**响应偏差** 它是由于参与者错误回答问题而引起的。\n\n在数据预处理期间，可以采取以下步骤：\n\n- 异常值检测\n- 缺失值处理\n- 数据过滤\n\
    \n异常值会对许多进行的分析产生不成比例的影响。\n\n在处理缺失值时，如果所有缺失值都用平均值替换，那么这意味着对更接近平均值的特定群体存在偏差。\n\n\
    在数据分析过程中可能会发现偏差。可以使用以下方法发现偏差：\n\n**遗漏偏差** 从提供错误信息的扭曲图表中可能会得出不正确的结论。\n\n**确认偏差**\
    \ 它涉及关注和确认与某人先入之见相关的信息的倾向。\n\n在执行数据建模时，检测偏差非常重要。例如，亚马逊创建了一个招聘算法，该算法显示出性别偏见，倾向于将男性视为高潜力候选人。具有高方差的模型专注于训练数据，泛化能力不佳。在高偏差的情况下，数据总是以相同的方式表现。当我们增加偏差时，方差会减少，反之亦然。在监督机器学习中，对输入变量进行训练的方式使得预测值与实际值之间具有接近性。误差指的是实际值与预测值之间的差异。监督机器学习中有三种类型的误差：\n\
    \n- 偏差误差\n- 方差误差\n- 噪声\n\n偏差和方差是可减少的误差，我们可以在很大程度上将其最小化。噪声被认为是不可减少的误差，无法消除。\n\n\
    ## 如何在机器学习中修正偏差或实现公平性？\n\n根据文献，已经有许多关于公平性的定义，这些定义涵盖了以下要素：\n\n- 均等机会\n- 无知性\n-\
    \ 个体公平性\n- 人口统计学均等\n- 反事实公平性\n- 预测率均等\n\n我们应避免将敏感属性作为训练数据中的特征之一。有许多方法可以减轻偏差。其中一些技术包括：\n\
    \n- 预处理\n- 过程中处理\n- 后处理\n\n预处理方法在模型开发之前进行。其主要目的是在建模之前消除数据集中的潜在偏差。这是从数据中消除偏差的基本方法之一。过程中处理是在训练阶段消除偏差的过程。在后处理中，偏差的消除发生在训练阶段结束后。\n\
    \n## 结论\n\n在本章中，我们学习了偏差、如何检测偏差以及如何修正偏差并实现公平性。\n\n## 问题\n\n解释我们如何检测偏差。\n\n解释我们如何修正偏差。\n\

  - '[PAGE 220]


    # Bounding the testing error


    Principal Component Analysis refers to the dimensionality reduction methodology
    that can be used for reducing the dimensions of large data sets into smaller ones,
    while still preserving as much as large amounts of information possible.


    Steps performed in Principal Component Analysis include the following:


    +   - Standardization

    - Computation of Covariance Matrix

    - Identification of Principal Components by computing the Eigen Values and the
    Eigen Vectors of Covariance Matrix

    - Creating a Feature Vector

    - Recasting the data


    The first step, Standardization, is important because if there are some values
    that are large and some small, then the larger ranges would dominate over the
    smaller ranges. So, Standardization is performed to solve this problem. Standardization'

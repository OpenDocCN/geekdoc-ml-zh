    \ test_y = y[:train_samples], y[train_samples:]\n# Finding train and test errors\n\
    alphas = np.logspace(-5, 1, 60)\nenet = linear_model.ElasticNet(l1_ratio=0.7,\
    \ max_iter=10000)\ntrain_errors = list()\ntest_errors = list()\nfor alpha in alphas:\n\
    \    enet.set_params(alpha=alpha)\n    enet.fit(train_X, train_y)\n    train_errors.append(enet.score(train_X,\
    \ train_y))\n    test_errors.append(enet.score(test_X, test_y))\n\ni_alpha_optimum\
    \ = np.argmax(test_errors)\nalphaoptimum = alphas[i_alpha_optimum]\nprint(\"Optimal\
    \ regularization parameter is: %s\" % alphaoptimum)\n```\n\n```python\n# Finding\

    tree, categorical attributes, multiway splits and missing values in decision trees,
    and instability in decision trees.


    ## Structure


    Decision trees may be used for representing decisions and decision-making. This
    chapter will comprise the following topics:


    - Decision trees

    - Regression trees

    - Stopping criterion and pruning loss functions in a decision tree

    - Categorical attributes, multiway splits, and missing values in decision trees

    - Instability in decision trees


    ## Objectives


    Decision trees refer to a popular and powerful tool for the purpose of prediction
    and classification. Following are the objectives of this chapter:


    - To know about decision trees and regression trees

    - Understanding the stopping criterion and pruning loss functions in decision
    trees

    - Understanding categorical attributes, multiway splits, and missing values in
    decision trees

    - Understanding the instability in decision trees


    ## Decision trees


    Decision trees refer to the non-parametric method of supervised learning. Decision
    trees are used for the purpose of regression and classification.


    Consider the following code on decision trees using scikit learn. Here, DecisionTreeClassifier
    is a class that can perform multi-class classification on a given data set. DecisionTreeClassifier
    takes two arrays as input, namely P and



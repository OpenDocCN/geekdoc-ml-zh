    ## 决策树中的停止准则和剪枝损失函数


    剪枝技术与决策树相关，它可以通过消除树中不分类实例的部分来减小决策树的大小。通过在决策树中加入剪枝可以防止过拟合。当训练进行得如此彻底，以至于它不仅学习了模式，还学习了噪声时，就会发生过拟合。当训练量不足，以至于无法识别所有模式时，就会发生欠拟合。剪枝意味着树被修剪。*Quinlan*在1987年提出了一种简单的决策树剪枝方法，称为错误减少剪枝。在错误减少剪枝中，从下到上遍历内部节点，并且仅在不会降低树的准确性时才进行剪枝。*Olaru*和*Wehenkel*在2003年提出了最小错误剪枝的使用。在最小错误剪枝中，对于每个节点，我们比较不剪枝和剪枝时的1-概率错误率估计。悲观剪枝是一种快速的剪枝方法，其中节点以从上到下的方式遍历。如果给定的内部节点被剪枝，那么该内部节点的所有后代都不会被送入剪枝过程。最优剪枝用于保证最优性，并基于动态规划的概念。在最优剪枝中，剪枝后获得的树比原始树小得多，并且内部节点的数量比叶节点的数量少得多。



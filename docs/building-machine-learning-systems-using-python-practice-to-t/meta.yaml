  - '[PAGE 165]


    # Early models


    Neural network is one of the subfields of machine learning. Neural network accepts
    the input data, performs training on the data, and produces the output based on
    the training performed. In 1943, *Warren Mc Culloch* and *Walter Pits* described
    the working of neurons. They modeled neural networks with the help of electrical
    circuits in order to explain the working of neurons in the brain. In 1949, *Donald
    Hebb* wrote *The Organization* of which pointed that the connection between the
    two neurons is enhanced if they are fired together. In 1959, *Bernard Widrow*
    and *Marcian Hoff* at Stanford developed neural network based models called ''**ADALINE**''
    and **ADALINE** stands for **Adaptive Linear Elements** and **MADALINE** stands
    for **Multiple Adaptive Linear** ADALINE was used for the recognition of binary
    patterns. For a given stream of bits, it can predict the occurrence of the next
    bit. MADALINE stands for Multiple Adaptive Linear Elements. It is the first neural
    network that is applied to real-world problems and is still in use for commercial
    purposes.'
- md: "## Perceptron learning\n\nPerceptron is based on a neuron, which is the basic\
    \ processing unit of a brain. A neuron comprises of dendrites, cell body, and\
    \ axon. Signal flows from the axon to the dendrites. An action signal is fired\
    \ by a neuron when a particular threshold is met by a cell. This action either\
    \ takes place or it does not. There is no concept of partial firing by a neuron.\
    \ Consider Figure 7.1 depicting the Perceptron model:\n\n![Perceptron model](img/127fa3260d3bb89f8119b3b5ddc3f83f_167_0.png)\n\
    \n**Figure 7.1:** *Perceptron model*\n\nPerceptron can be used for solving binary\
    \ classification problems where the sample that needs to be identified belongs\
    \ to two classes. Many features or inputs are sent to the linear unit of a Perceptron\
    \ and it generates one binary output. Consider the following code on Perceptron\
    \ learning. In this code, we have added 1 to the input_size in order to include\
    \ bias in the weight vector:\n\n```python\nimport numpy as np\n\nclass Perceptronlearning(object):\n\
    \    \"\"\"Implementation of a perceptron learning network\"\"\"\n    def __init__(self,\
    \ input_size, lr=1, epochs=10):\n        self.W = np.zeros(input_size+1)\n   \
    \     # add one for bias\n        self.epochs = epochs\n        self.lr = lr\n\
    \n    def activation_fn(self, p):\n        \"\"\" 1 is returned if p>=0 otherwise\
    \ it returns 0\"\"\"\n        return 1 if p >= 0 else 0\n\n    def predict(self,\
    \ p):\n        \"\"\" Prediction is a process of sending an input to the perceptron\n\
    \        and returning an output. Bias is added to the input vector. We\n    \
    \    can compute the inner product, and the activation function is\n        applied\
    \ \"\"\"\n        p = np.insert(p, 0, 1)\n        q = self.W.T.dot(p)\n      \
    \  r = self.activation_fn(q)\n        return r\n\n    def fit(self, P, d):\n \
    \       for _ in range(self.epochs):\n            for i in range(d.shape[0]):\n\
    \                y = self.predict(P[i])\n                e = d[i] - y\n      \
    \          self.W = self.W + self.lr * e * np.insert(P[i], 0, 1)\n```\n\nSo, a\
    \ single neuron neural network is referred to as a Perceptron. It accepts the\
    \ input and the weight, performs the weighted sum of the inputs, and applies an\
    \ activation function over it. It accepts and generates only binary values. One\
    \ of the limitations of the Perceptron learning model is that it can solve only\
    \ linearly separable problems.\n\n## Back propagation\n\nBack propagation is also\
    \ referred to as Gradient Computation. Back propagation learning algorithm comprises\
    \ two phases, namely: Gradient Computation Phase and Weight Updation Phase. The\
    \ first phase is the Propagation phase. It involves the following steps:\n\n**Forward\
    \ Propagation** - Here, the training input pattern is sent to the neural network\
    \ and the propagation's output activation is generated.\n\n**Backward Propagation**\
    \ – Here, the input is the propagation's output activation that is sent to the\
    \ neural network, and it generates the deltas of all the output and hidden neurons.\n\
    \nSecond phase is the Weight Updation phase. It involves the following steps:\n\
    \nGradient of the weight is calculated by multiplying the output delta and the\
    \ input activation.\n\nA ratio or percentage of the gradient is subtracted from\
    \ the weight. This ratio or percentage affects the quality of learning and speed.\
    \ It is referred to as the learning rate. A neuron is able to train faster if\
    \ the learning rate is higher. If the learning rate is lower, then the training\
    \ is considered accurate.\n\nConsider the following code on back propagation.\n\
    \n```python\nimport numpy as np\n\ndef sigmoidfun(x):\n    return 1.0/(1.0 + np.exp(-x))\n\
    \ndef sigmoid_primefun(x):\n    return sigmoidfun(x)*(1.0-sigmoidfun(x))\n\ndef\
    \ tanh(x):\n    return np.tanh(x)\n\ndef tanh_prime(x):\n    return 1.0 - x**2\n\
    \nclass NeuralNetwork:\n    def __init__(self, layers, activation='tanh'):\n \
    \       if activation == 'sigmoid':\n            self.activation = sigmoidfun\n\
    \            self.activation_prime = sigmoid_primefun\n        elif activation\
    \ == 'tanh':\n            self.activation = tanh\n            self.activation_prime\
    \ = tanh_prime\n        # Setting weights\n        self.weights = []\n       \
    \ # let layers is [2,2,1]\n        # weight values range= (-1,1)\n        # hidden\
    \ and input layers - random((2+1, 2+1)) : 3 x 3\n        for i in range(1, len(layers)\
    \ - 1):\n            r = 2*np.random.random((layers[i-1] + 1, layers[i] + 1))\
    \ -1\n            self.weights.append(r)\n        # output layer - random\n  \
    \      r = 2*np.random.random((layers[i] + 1, layers[i+1])) - 1\n        self.weights.append(r)\n\
    \n    def fit(self, P, q, learning_rate=0.2, epochs=100000):\n        # Adding\
    \ the column of ones to P\n        # This is to add the bias unit to the input\
    \ layer\n        ones = np.atleast_2d(np.ones(P.shape[0]))\n        P = np.concatenate((ones.T,\
    \ P), axis=1)\n        for k in range(epochs):\n            i = np.random.randint(P.shape[0])\n\
    \            a = [P[i]]\n            for l in range(len(self.weights)):\n    \
    \            dot_value = np.dot(a[l], self.weights[l])\n                activation\
    \ = self.activation(dot_value)\n                a.append(activation)\n       \
    \     # output layer\n            error = q[i] - a[-1]\n            deltas = [error\
    \ * self.activation_prime(a[-1])]\n            # we need to begin at the second\
    \ to last layer\n            # (a layer before the output layer)\n           \
    \ for l in range(len(a) - 2, 0, -1):\n                deltas.append(deltas[-1].dot(self.weights[l].T)*self.activation_prime(a[l]))\n\
    \            # reverse\n            # [level3(output)->level2(hidden)] => [level2(hidden)->level3(output)]\n\
    \            deltas.reverse()\n            # backpropagation\n            # 1.\
    \ Multiply its output delta and input activation\n            #    to get the\
    \ gradient of the weight.\n            # 2. Subtract a ratio (percentage) of the\
    \ gradient from the weight.\n            for i in range(len(self.weights)):\n\
    \                layer = np.atleast_2d(a[i])\n                delta = np.atleast_2d(deltas[i])\n\
    \                self.weights[i] += learning_rate * layer.T.dot(delta)\n     \
    \       if k % 10000 == 0: print('epochs:', k)\n\n    def predict(self, x):\n\
    \        c = np.concatenate((np.ones(1).T, np.array(x)))\n        for l in range(0,\
    \ len(self.weights)):\n            c = self.activation(np.dot(c, self.weights[l]))\n\
    \        return c\n\nif __name__ == '__main__':\n    neu = NeuralNetwork([2,2,1])\n\
    \    P = np.array([[0, 0],\n                  [0, 1],\n                  [1, 0],\n\
    \                  [1, 1]])\n    q = np.array([0, 1, 1, 0])\n    neu.fit(P, q)\n\
    \    for x in P:\n        print(x, neu.predict(x))\n```\n\nepochs: 0\nepochs:\
    \ 10000\nepochs: 20000\nepochs: 30000\nepochs: 40000\nepochs: 50000\nepochs: 60000\n\
    epochs: 70000\nepochs: 80000\nepochs: 90000\n[0 0] [4.28817961e-05]\n[0 1] [0.99667242]\n\
    [1 0] [0.99666444]\n[1 1] [4.62864326e-05]\n\n## Stochastic Gradient Descent\n\
    \nStochastic gradient descent is referred to as an iterative method that can be\
    \ used for the optimization of an objective function with the necessary properties\
    \ (subdifferentiable or differentiable). Stochastic gradient descent may be used\
    \ to minimize the computations to be performed. It randomly selects a data point\
    \ at a given iteration that reduces the computations enormously. Consider the\
    \ following code using stochastic gradient descent. Here, we take 2 arrays, P\
    \ and Q. Array P comprises the training samples. Array Q holds the target values.\n\
    \n```python\nimport numpy as np\nfrom sklearn import linear_model\n\nP = np.array([[-1,\
    \ 2], [1, -1], [2, 1], [2, 2]])\nQ = np.array([1, 2, 1, 1])\n\nSGDClassif = linear_model.SGDClassifier(max_iter=1000,\
    \ tol=1e-3, penalty=\"elasticnet\")\nSGDClassif.fit(P, Q)\nSGDClassifier(alpha=0.0001,\
    \ average=False, class_weight=None,\n              early_stopping=False, epsilon=0.1,\
    \ eta0=0.0, fit_intercept=True,\n              l1_ratio=0.15, learning_rate='optimal',\
    \ loss='hinge',\n              max_iter=1000, n_iter_no_change=5, n_jobs=None,\n\
    \              penalty='elasticnet', power_t=0.5, random_state=None,\n       \
    \       shuffle=True, tol=0.001, validation_fraction=0.1, verbose=0,\n       \
    \       warm_start=False)\n\nSGDClassif.predict([[3., 3.]])\narray([1])\n```"
  mdcn: "## 感知机学习\n\n感知机基于神经元，神经元是大脑的基本处理单元。神经元由树突、细胞体和轴突组成。信号从轴突流向树突。当细胞达到特定阈值时，神经元会触发一个动作信号。这个动作要么发生，要么不发生。神经元没有部分触发的概念。请看图7.1所示的感知机模型：\n\
    \n![感知机模型](img/127fa3260d3bb89f8119b3b5ddc3f83f_167_0.png)\n\n**图7.1：** *感知机模型*\n\
    \n感知机可用于解决二元分类问题，其中需要识别的样本属于两个类别。许多特征或输入被发送到感知机的线性单元，它生成一个二元输出。请看以下关于感知机学习的代码。在此代码中，我们在input_size上加1，以便在权重向量中包含偏置：\n\
    \n```python\nimport numpy as np\n\nclass Perceptronlearning(object):\n    \"\"\
    \"Implementation of a perceptron learning network\"\"\"\n    def __init__(self,\
    \ input_size, lr=1, epochs=10):\n        self.W = np.zeros(input_size+1)\n   \
    \     # add one for bias\n        self.epochs = epochs\n        self.lr = lr\n\
    \n    def activation_fn(self, p):\n        \"\"\" 1 is returned if p>=0 otherwise\
    \ it returns 0\"\"\"\n        return 1 if p >= 0 else 0\n\n    def predict(self,\
    \ p):\n        \"\"\" Prediction is a process of sending an input to the perceptron\n\
    \        and returning an output. Bias is added to the input vector. We\n    \
    \    can compute the inner product, and the activation function is\n        applied\
    \ \"\"\"\n        p = np.insert(p, 0, 1)\n        q = self.W.T.dot(p)\n      \
    \  r = self.activation_fn(q)\n        return r\n\n    def fit(self, P, d):\n \
    \       for _ in range(self.epochs):\n            for i in range(d.shape[0]):\n\
    \                y = self.predict(P[i])\n                e = d[i] - y\n      \
    \          self.W = self.W + self.lr * e * np.insert(P[i], 0, 1)\n```\n\n因此，单个神经元的神经网络被称为感知机。它接受输入和权重，执行输入的加权和，并对其应用激活函数。它只接受和生成二元值。感知机学习模型的一个局限性是它只能解决线性可分的问题。\n\
    \n## 反向传播\n\n反向传播也称为梯度计算。反向传播学习算法包含两个阶段，即：梯度计算阶段和权重更新阶段。第一个阶段是传播阶段。它涉及以下步骤：\n\n\
    **前向传播** - 在此阶段，训练输入模式被发送到神经网络，并生成传播的输出激活。\n\n**反向传播** – 在此阶段，输入是传播的输出激活，它被发送到神经网络，并生成所有输出和隐藏神经元的增量。\n\
    \n第二个阶段是权重更新阶段。它涉及以下步骤：\n\n通过将输出增量与输入激活相乘来计算权重的梯度。\n\n从权重中减去梯度的一个比例或百分比。这个比例或百分比会影响学习的质量和速度。它被称为学习率。如果学习率较高，神经元能够更快地训练。如果学习率较低，则认为训练更准确。\n\
    \n请看以下关于反向传播的代码。\n\n```python\nimport numpy as np\n\ndef sigmoidfun(x):\n    return\
    \ 1.0/(1.0 + np.exp(-x))\n\ndef sigmoid_primefun(x):\n    return sigmoidfun(x)*(1.0-sigmoidfun(x))\n\
    \ndef tanh(x):\n    return np.tanh(x)\n\ndef tanh_prime(x):\n    return 1.0 -\
    \ x**2\n\nclass NeuralNetwork:\n    def __init__(self, layers, activation='tanh'):\n\
    \        if activation == 'sigmoid':\n            self.activation = sigmoidfun\n\
    \            self.activation_prime = sigmoid_primefun\n        elif activation\
    \ == 'tanh':\n            self.activation = tanh\n            self.activation_prime\
    \ = tanh_prime\n        # Setting weights\n        self.weights = []\n       \
    \ # let layers is [2,2,1]\n        # weight values range= (-1,1)\n        # hidden\
    \ and input layers - random((2+1, 2+1)) : 3 x 3\n        for i in range(1, len(layers)\
    \ - 1):\n            r = 2*np.random.random((layers[i-1] + 1, layers[i] + 1))\
    \ -1\n            self.weights.append(r)\n        # output layer - random\n  \
    \      r = 2*np.random.random((layers[i] + 1, layers[i+1])) - 1\n        self.weights.append(r)\n\
    \n    def fit(self, P, q, learning_rate=0.2, epochs=100000):\n        # Adding\
    \ the column of ones to P\n        # This is to add the bias unit to the input\
    \ layer\n        ones = np.atleast_2d(np.ones(P.shape[0]))\n        P = np.concatenate((ones.T,\
    \ P), axis=1)\n        for k in range(epochs):\n            i = np.random.randint(P.shape[0])\n\
    \            a = [P[i]]\n            for l in range(len(self.weights)):\n    \
    \            dot_value = np.dot(a[l], self.weights[l])\n                activation\
    \ = self.activation(dot_value)\n                a.append(activation)\n       \
    \     # output layer\n            error = q[i] - a[-1]\n            deltas = [error\
    \ * self.activation_prime(a[-1])]\n            # we need to begin at the second\
    \ to last layer\n            # (a layer before the output layer)\n           \

    - 举例说明机器学习在社交媒体服务中的应用。\n\n# 第 2 章\n\n## 线性回归\n\n监督学习是一种机器学习任务，它基于标记的输入-输出示例对将输入映射到输出。监督学习可以分为两种类型：分类和回归。在本章中，我们将讨论单变量线性回归、多变量线性回归、梯度下降和多项式回归。\n\

  md: '# Principal Component Analysis (PCA)


    PCA refers to the dimensionality reduction methodology that can be used for reducing
    the dimensions of large data sets into smaller ones, while still preserving as
    much as information as possible.


    Steps performed in PCA include the following:


    +   - Standardization

    - Computation of Covariance Matrix

    - Identification of Principal Components by computing the Eigen Values and Eigen
    Vectors of Covariance Matrix

    - Creating a Feature Vector

    - Recasting the data


    In the first step, standardization is important because if there are some values
    that are large and some that are small, then the larger ranges would dominate
    over the smaller ranges. So, standardization is performed to solve this problem.
    Standardization can be done by subtracting the mean from the value and dividing
    by the standard deviation. This is represented as follows:'
  merge: -1
  pgno: 207
- img_proc: true
  md: 'Z=(value-mean)/standard deviation


    In the second step, covariance matrix is computed to find whether there exists
    redundant information in the input data. In the third step, the principle components
    are generated, which are nothing but the variables that are formed by the linear
    combination of the initial variables. In the fourth step, a feature vector is
    created by considering those principle components that are of a higher significance
    over the ones with a lower significance.


    Consider the following code in Python on PCA. We are considering a two-dimensional
    data set having 600 points:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    import seaborn as sns; sns.set()

    ranstat = np.random.RandomState(1)

    P = np.dot(ranstat.rand(2, 2), ranstat.randn(2, 600)).T

    plt.scatter(P[:, 0], P[:, 1])

    plt.axis(''equal'');

    ```'

    Pits* 描述了神经元的工作原理。他们借助电路对神经网络进行建模，以解释大脑中神经元的工作方式。1949 年，*Donald Hebb* 撰写了《组织》一书，其中指出如果两个神经元同时被激发，它们之间的连接就会增强。1959

    \n新的且不属于任何训练数据样本的数据点被称为样本外数据。样本外误差可以定义为在新数据集上获得的误差。它也被称为泛化误差。\n\n在上一章中，我们讨论了过拟合和欠拟合。考虑下表，它从训练误差和测试误差的角度区分了欠拟合、过拟合和恰到好处的拟合状态：\n\
    \n| 状态 | 训练误差 | 测试误差 |\n| --- | --- | --- |\n| 欠拟合 | 高 | 高 |\n| 过拟合 | 低 | 高 |\n\
    | 恰到好处的拟合 | 低 | 低 |\n\n**表5.1：** 欠拟合、过拟合和恰到好处的拟合的比较\n\n考虑以下关于样本内误差和样本外误差的代码：\n\
    \n```python\nprint(__doc__)\n\nimport numpy as np\nfrom sklearn import linear_model\n\

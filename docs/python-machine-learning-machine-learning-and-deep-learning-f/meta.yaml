  md: '# CHAPTER 2. PYTHON DEEP BASIC MACHINE LEARNING


    Artificial Intelligence (AI) is any technique, code or algorithm that enables
    a computer to mimic human intelligence or cognitive behavior. Machine Learning
    (ML) is a subset of AI that uses statistical methods to enable machines to learn
    and improve with experience. Deep Learning is a subset of Machine Learning, which
    makes the computation of multi-layer neural networks feasible. Machine Learning
    is seen as shallow learning while Deep Learning is seen as hierarchical learning
    with abstraction.


    Machine learning deals with a wide range of concepts. The concepts are listed
    below –


    +   - supervised

    - unsupervised

    - linear regression

    - cost functions

    - reinforcement learning

    - under-fitting

    - overfitting

    - hyper-parameter, etc.


    The supervised learning learns to predict values from labelled data. One ML technique
    that widely used is classification, where target values are discrete values; for
    example, cats and dogs. Another type technique in machine learning is regression.
    Regression works on the target values. The target values are continuous values;
    for example, the stock market data can be analyzed using Regression.


    In unsupervised learning, the inferences are made from the input data that is
    not structured or labeled. Imagine if we need to make sense of million medical
    records and, find the outliers, underlying structure or detect'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'anomalies, clustering technique is used to divide data into broad clusters.


    Data sets are divided into testing sets, training sets, validation sets and so
    on.


    In 2012 a breakthrough brought the concept of Deep Learning into prominence. An
    algorithm classified 1 million images into 1000 categories successfully using
    2 GPUs and latest technologies like Big Data.


    # 2.1 RELATING TRADITIONAL MACHINE LEARNING AND DEEP LEARNING


    One of the major challenges encountered in traditional machine learning models
    is a process called feature extraction. The programmer specifies the features
    to be looked out for and tell the computer. These features help in making decisions.


    Many algorithms rarely work well with entering raw data, so feature extraction
    is a critical part of the traditional machine learning workflow.


    This places a huge responsibility on the programmer, and the algorithm''s efficiency
    relies heavily on how inventive the programmer is. For complex problems such as
    handwriting recognition or object recognition, this is a huge task.


    Deep learning, with the ability to learn multiple layers of representation, is
    one of the few methods that has helped automatic feature extraction. The lower
    layers perform automatic feature extraction, without requiring guidance from the
    programmer.'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# CHAPTER 3. ARTIFICIAL NEURAL NETWORKS


    Artificial Neural Network, or just neural network for short, is not a new idea.
    It has been around for about 80 years.


    However, until 2011 Deep Neural Networks became popular, with the use of new techniques,
    powerful computers, and huge dataset availability.


    A neural network mimics a neuron, which has axon, dendrites, a nucleus, and terminal
    axon.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_8_0.png)


    Two neurons compose a network. These neurons transfer information via synapse
    between the dendrites of one and the terminal axon of another.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_8_1.png)'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'A probable model of an artificial neuron looks like this –


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_9_0.png)


    A neural network will look like as shown below –


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_9_1.png)


    The circles are nodes or neurons, with their functions on the data and the edges/lines
    connecting them are the weights/information being passed along.


    Each column represents a layer. The first layer of your data is the input layer.
    Then, the hidden layers are located between the input layer and the output layer.


    If you have one or a few hidden layers, then you have a shallow neural'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'network. If you have many hidden layers, then you have a deep neural network.


    In this model, you have input data, you weight it, and pass it through the function
    in the neuron that is called activation function or threshold function.


    Basically, it is the sum of all of the values after comparing it with a certain
    value. If you fire a signal, then the result is (1) out, or nothing is fired out,
    then (0). That is then weighted and passed along to the next neuron, and the same
    sort of function is run.


    The activation function could be a relu or sigmoid (s-shape) function.


    As for the weights, they are just random to start, and they are unique per input
    into the neuron/node.


    The most basic type of neural network in a typical "feed forward", your information
    pass straight through the network you created, and you compare the output to what
    you hoped the output would have been using your sample data.


    From here, you need the weights need to be adjusted to help you get your output
    to match your desired output.


    The act of sending data straight through a neural network is called a **feed forward
    neural network**.


    Our data goes from input, to the layers, in order, then to the output.


    When we go backwards and begin adjusting weights to minimize loss/cost, this process
    is known as **back propagation**.


    This is an **optimization problem**. With the neural network, in real practice,
    we have to deal with hundreds of thousands of variables, or millions, or more.


    The first solution used the algorithm stochastic gradient descent as optimization
    method. Now, there are options like Adam Optimizer, AdaGrad and so on. Either
    way, this is a massive computational operation. That is why Neural Networks were
    mostly left on the shelf for over half a century. It was only very recently that
    we even had the powerfull machines to even consider doing these operations, and
    the properly sized datasets to match.'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'For simple classification tasks, the neural network is relatively close in
    performance to other simple algorithms like K Nearest Neighbors. The real utility
    of neural networks is realized when we have much larger data, and much more complex
    questions, both of which outperform other machine learning models.


    # 3.1 Deep Neural Networks


    A deep neural network (DNN) is an ANN with multiple hidden layers between the
    input and output layers. Similar to shallow ANNs, DNNs models complex non-linear
    functions.


    The main purpose of a neural network is to receive a set of inputs, perform progressively
    complex calculations on them, and give output to solve real world problems like
    classification.


    We have an input, an output, and a flow of sequential data in a deep network.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_11_0.png)'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'Neural networks are widely used in reinforcement learning and supervised learning
    problems. These networks are based on a set of layers connected to each other.


    In deep learning, the number of hidden layers, mostly non-linear, can be as large
    as 1000 layers.


    DL models produce more accurate results than normal ML networks.


    Gradient descent method is used for minimising the loss function and optimizing
    the network.


    We can use the **Imagenet**, a repository of millions of digital images to classify
    a dataset into categories like dogs and cats. DL nets are increasingly used for
    dynamic images apart from static ones and for text analysis and time series.


    Training the data sets forms an important part of Deep Learning models. In addition,
    Backpropagation is the main algorithm in training DL models.


    DL deals with training large neural networks with complex input output transformations.


    One example of DL is the mapping of a photo to the name of the person(s) in photo
    as they do on social networks and describing a picture with a phrase is another
    recent application of DL.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_12_0.png)


    Neural networks are functions that have inputs like x1,x2,x3...that are transformed
    to outputs like z1,z2,z3 and so on in two (shallow networks) or several intermediate
    operations also called layers (deep networks).


    The biases and weights change from layer to layer. ‘w’ and ‘v’ are the'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'weights or synapses of layers of the neural networks.

    Supervised learning is considered to be the best use case of deep learning problem.
    Here we have large set of data inputs with a desired set of outputs.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_13_0.png)


    Here back propagation algorithm is applied to get correct output prediction.

    The basic data set of deep learning is the MNIST, a dataset of handwritten digits.

    To classify images of handwritten digits from this dataset. we train deep a Convolutional
    Neural Network with Keras.

    The activation or firing of a neural net classifier produces a score. For example,
    to classify patients as healthy or sick, the parameters such as body temperature,
    weight, height and blood pressure etc. can be considered.

    A low score means he is healthy and a high score means patient is sick.

    Each node in output and hidden layers has its own classifiers. The input layer
    takes inputs and passes on its scores to the next hidden layer for further activation
    and this goes on till the output is reached.

    This progress from input to output from left to right in the forward direction
    is called **forward propagation**.

    Credit assignment path (CAP) in a neural network is the series of'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'transformations starting from the input to the output. CAPs elaborate probable
    causal connections between the input and the output.


    CAP depth for a given feed forward neural network or the CAP depth is the number
    of hidden layers plus one as the output layer is included. For recurrent neural
    networks, where a signal may propagate through a layer several times, the CAP
    depth can be potentially limitless.


    # 3.2 DEEP NETS AND SHALLOW NETS


    There is no clear threshold of depth that divides shallow learning from deep learning;
    but it is mostly agreed that for deep learning which has multiple non-linear layers,
    CAP have to be greater than two.


    Basic node in a neural net is a perception mimicking a neuron in a biological
    neural network. Then we have multi-layered Perception or MLP. Each set of inputs
    is modified by a set of weights and biases; each edge has a unique weight and
    each node has a unique bias.


    The prediction **accuracy** of a neural net depends on its **biases and weights**.


    The process of improving the accuracy of neural network is called **training**.
    The output from a forward prop net is compared to that value which is known to
    be correct.


    The **the loss function or cost function** is the difference between the actual
    output and the generated output.


    The point of training is to make the cost of training as small as possible across
    millions of training examples. To do this, the network tweaks the biases and weights
    until the prediction matches the correct output.


    Once trained well, a neural net has the potential to make an accurate prediction
    every time.


    When the pattern gets complex and you want your computer to recognize them, you
    have to go for neural networks.In such complex pattern scenarios, neural network
    outperformsall other competing algorithms.


    The current GPUs can train the network faster than ever before. Deep neural networks
    are already revolutionizing the field of AI


    Computers have proved to be good at following detailed instructions and'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'performing repetitive calculations and but have been not so good at recognizing
    complex detailed patterns.


    If there is the problem of recognition of simple patterns, logistic regression
    classifier or support vector machine (svm) can do the job well, but as the complexity
    of pattern increases, there is no way but to go for deep neural networks.


    Therefore, for complex patterns like human face, shallow neural networks fail
    and have no alternative but to go for deep neural networks with more layers. The
    deep nets are able to do their job by breaking down the complex patterns into
    simpler ones. For example, human face; adeep net would use edges to detect parts
    like lips, nose, eyes, ears and so on and then re- combine these together to form
    a human face


    The accuracy of correct prediction has become so accurate that recently at a Google
    Pattern Recognition Challenge, a deep net beat a human.


    This idea of a web of layered perceptron has been around for some time; in this
    area, deep nets mimic the human brain. But one downside to this is that they take
    long time to train, a hardware constraint


    However recent high performance GPUs have been able to train such deep nets under
    a week; while fast cpus could have taken weeks or perhaps months to do the same.


    # 3.3 CHOOSING A DEEP NET


    How to choose a deep net? We have to decide if we are if we are trying to find
    patterns in the data or building a classifier and if we are going to use unsupervised
    learning. To extract patterns from a set of unlabelled data, we use a Restricted
    Boltzman machine or an Auto encoder.


    The following points are considered while choosing a deep net –


    +   - For text processing, sentiment analysis, parsing and name entity recognition,
    we use a recursive neural tensor network or a recurrent net or RNTN;

    - The recurrent net is used for any language model that operates at character
    level.'

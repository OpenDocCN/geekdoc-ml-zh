- md: '## 3.3 CHOOSING A DEEP NET


    How to choose a deep net? We have to decide if we are trying to find patterns
    in the data or building a classifier and if we are going to use unsupervised learning.
    To extract patterns from a set of unlabelled data, we use a Restricted Boltzmann
    machine or an Auto encoder.


    The following points are considered while choosing a deep net:


    - For text processing, sentiment analysis, parsing and name entity recognition,
    we use a recursive neural tensor network or a recurrent net or RNTN.

    - The recurrent net is used for any language model that operates at character
    level.

    - Convolutional network or deep belief network (DBN) used for image recognition.

    - Convolutional network or a RNTN used for object recognition.

    - Recurrent net is used for speech recognition.


    In general, multilayer perceptrons with rectified linear units (RELU) and deep
    belief networks are both good choices for classification. It is recommended to
    use Recurrent net in time series analysis.


    ## 3.4 RESTRICTED BOLTZMANN NETWORKS OR AUTOENCODERS - RBNs


    The issue of vanishing gradients have been tackled in 2006 by Geoff Hinton. He
    developed a novel strategy that led to the **Restricted Boltzmann Machine - RBM**,
    a shallow two layer net. The first layer is the **visible** layer and the second
    layer is the **hidden** layer. The visible layer nodes are connected to every
    node in the hidden layer. The network is known as restricted as no two nodes within
    the same layer are allowed to share a connection.


    Encoding input data as vectors in network is achieved by the Autoencoders. They
    create a compressed, hidden, or representation of the raw data. The vectors are
    useful in compressing the raw data; this is the motivation behind dimensionality
    reduction. The reconstruction of input data based on its hidden representation
    is accomplished by Autoencoders which are paired with decoders.


    RBM is considered to be the mathematical equivalent of a two-way translator. A
    set of numbers encodes the inputs which are received from the forward pass. This
    set of numbers are translated back into reconstructed inputs by a backward pass.
    A high degree of accuracy is achieved by a well-trained net.


    The RBM is re-constructed to the input by training with different biases and weights
    until the input and the reconstruction are as close as possible. Note that the
    RBM data are not labelled. RBM sorts through data automatically; by adjusting
    the biases and weights, an RBM is extracting important features to reconstruct
    the input. RBM is designed to recognize inherent patterns in data by applying
    feature extracting. Since they encode their own structure, they are also called
    auto-encoders.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_17_0.png)


    ## 3.5 DEEP BELIEF NETWORKS - DBNs


    By introducing a clever training method and combining RBMs, deep belief networks
    (DBNs) are formed. The problem of vanishing gradient is finally solved by this
    model.


    A DBN is similar in structure to a MLP (Multi-layer perceptron), but very different
    when it comes to training. It is the training that enables DBNs to outperform
    their shallow counterparts.


    The first RBM hidden layer is taken as the visible layer of the second RBM, and
    the second RBM is trained using the outputs from the first RBM. This process is
    iterated until every layer in the network is trained. Each RBM in a DBN learns
    the entire input. A DBN is fine-tuning the entire input in succession as the model
    slowly improves. At this level, inherent patterns in the data are detected by
    RBMs but without any label or names. To complete training the DBN, we introduce
    labels to the patterns and fine tune the net with supervised learning. A very
    small set of labelled samples is studied such that the features and patterns are
    associated with a name. This small-labelled set of data is used for training.
    This set of labelled data can be very small when compared to the original data
    set.


    ## 3.6 GENERATIVE ADVERSARIAL NETWORKS - GANs


    When deep neural nets comprising two nets, pitted one against the other, thus
    we call them Generative adversarial networks. GANs were considered as the most
    interesting idea in the last 10 years in ML. GANs pose huge potential, as the
    networks can learn to mimic any distribution of data. GANs can create parallel
    worlds strikingly similar to our own in any domain: music, speech, images. They
    are machine (robot) artists in a way, and their output is quite impressive. In
    a GAN, one neural network, called the generator, generates new data instances,
    while the other, the discriminator, evaluates them for authenticity.


    ## 3.7 RECURRENT NEURAL NETWORKS - RNNs


    **RNN**s are neural networks in which data can flow in any direction. Such networks
    are used for applications such as Natural Language Processing (NLP) or language
    modelling. Utilizing sequential information is the basic concept underlying RNNs.
    In a normal neural network all outputs and inputs are independent of each other.
    In order to predict the next word in a sentence we need to determine which words
    came before it.


    RNNs are called recurrent because the same task for every element of a sequence
    is repeated, with the output being based on the previous computations. RNNs thus
    can be said to have a “memory” that captures information about what has been previously
    calculated. In theory, RNNs can use information in very long sequences, but in
    reality, they can look back only a few steps.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_19_0.png)


    Long short-term memory networks (LSTMs) are most commonly used RNNs. Together
    with convolutional Neural Networks, RNNs have been used as part of a model to
    generate descriptions for unlabelled images.


    ## 3.8 Convolutional Deep Neural Networks - CNNs


    To make a neural network deeper, increase the number of layers but this increases
    the complexity of the network and allows us to model functions that are more complicated.
    However, the number of biases and weights will increase exponentially. As a matter
    of fact, learning such difficult problems can become challenging. Hence, the solution
    is the convolutional neural networks.


    CNNs are used; have been extensively used in computer vision and acoustic modelling
    for automatic speech recognition.


    The idea behind convolutional neural networks is the idea of a “moving filter”
    which passes through the image. This moving filter, or convolution, applies to
    a certain neighbourhood of nodes which for example may be pixels, where the filter
    applied is 0.5 x the node value.


    In a nutshell, Convolutional Neural Networks (CNNs) are composed of multi-layer
    neural networks. The layers are sometimes up to 20 or more with images as input
    data.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_20_0.png)


    CNNs can reduce the number of parameters drastically that need to be tuned. Therefore,
    CNNs efficiently are able to manage the high dimensionality of raw images.'
  mdcn: '## 3.3 选择深度网络


    如何选择深度网络？我们必须决定是试图在数据中寻找模式，还是构建一个分类器，以及是否将使用无监督学习。要从一组无标签数据中提取模式，我们使用受限玻尔兹曼机或自编码器。


    选择深度网络时考虑以下几点：


    -   对于文本处理、情感分析、解析和命名实体识别，我们使用递归神经张量网络或循环网络或RNTN。

    -   循环网络用于任何在字符级别操作的语言模型。

    -   卷积网络或深度信念网络用于图像识别。

    -   卷积网络或RNTN用于物体识别。

    -   循环网络用于语音识别。


    一般来说，带有修正线性单元的多层感知机和深度信念网络都是分类的良好选择。建议在时间序列分析中使用循环网络。


    ## 3.4 受限玻尔兹曼网络或自编码器 - RBNs


    梯度消失问题在2006年由Geoff Hinton解决。他开发了一种新颖的策略，从而产生了**受限玻尔兹曼机 - RBM**，一个浅层的两层网络。第一层是**可见**层，第二层是**隐藏**层。可见层节点与隐藏层中的每个节点相连。该网络被称为受限的，因为同一层内的两个节点不允许共享连接。


    自编码器将输入数据编码为网络中的向量。它们创建原始数据的压缩、隐藏或表示。这些向量在压缩原始数据方面很有用；这是降维背后的动机。自编码器与解码器配对，基于其隐藏表示重建输入数据。


    RBM被认为是双向翻译器的数学等价物。一组数字编码来自前向传递的输入。这组数字通过反向传递被翻译回重建的输入。训练有素的网络可以达到很高的准确度。


    RBM通过使用不同的偏置和权重进行训练，直到输入和重建尽可能接近，从而重建到输入。请注意，RBM数据没有标签。RBM自动对数据进行排序；通过调整偏置和权重，RBM提取重要特征以重建输入。RBM旨在通过应用特征提取来识别数据中的固有模式。由于它们编码自己的结构，它们也被称为自编码器。


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_17_0.png)


    ## 3.5 深度信念网络 - DBNs


    通过引入一种巧妙的训练方法并结合RBM，形成了深度信念网络。梯度消失问题最终由这个模型解决。


    DBN在结构上类似于MLP，但在训练方面非常不同。正是训练使得DBN能够超越其浅层对应物。


    第一个RBM隐藏层被用作第二个RBM的可见层，第二个RBM使用第一个RBM的输出进行训练。这个过程被迭代，直到网络中的每一层都被训练。DBN中的每个RBM学习整个输入。随着模型的缓慢改进，DBN连续微调整个输入。在这个层面上，RBM检测到数据中的固有模式，但没有任何标签或名称。为了完成DBN的训练，我们为模式引入标签，并使用监督学习微调网络。研究非常小的一组标记样本，以便将特征和模式与名称关联起来。这小组标记数据用于训练。与原始数据集相比，这组标记数据可以非常小。


    ## 3.6 生成对抗网络 - GANs


    当包含两个网络的深度神经网络相互对抗时，我们称之为生成对抗网络。GAN被认为是过去10年机器学习中最有趣的想法。GAN具有巨大的潜力，因为网络可以学习模仿任何数据分布。GAN可以在任何领域创建与我们自己惊人相似的平行世界：音乐、语音、图像。它们在某种程度上是机器（机器人）艺术家，它们的输出相当令人印象深刻。在GAN中，一个称为生成器的神经网络生成新的数据实例，而另一个称为判别器的神经网络评估它们的真实性。


    ## 3.7 循环神经网络 - RNNs


    **RNN**是数据可以向任何方向流动的神经网络。此类网络用于自然语言处理或语言建模等应用。利用序列信息是RNN背后的基本概念。在普通神经网络中，所有输出和输入彼此独立。为了预测句子中的下一个词，我们需要确定它前面的词是什么。


    RNN被称为循环的，因为序列中每个元素的相同任务被重复，输出基于先前的计算。因此，可以说RNN具有“记忆”，可以捕获先前计算的信息。理论上，RNN可以使用非常长序列中的信息，但实际上，它们只能回顾几步。


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_19_0.png)


    长短期记忆网络是最常用的RNN。与卷积神经网络一起，RNN已被用作生成无标签图像描述的模型的一部分。


    ## 3.8 卷积深度神经网络 - CNNs


    要使神经网络更深，增加层数，但这会增加网络的复杂性，并允许我们对更复杂的函数进行建模。然而，偏置和权重的数量将呈指数级增长。事实上，学习如此困难的问题可能变得具有挑战性。因此，解决方案是卷积神经网络。


    CNN已被广泛用于计算机视觉和用于自动语音识别的声学建模。


    卷积神经网络背后的思想是“移动滤波器”通过图像的思想。这个移动滤波器或卷积应用于节点的某个邻域，例如可能是像素，其中应用的滤波器是节点值的0.5倍。


    简而言之，卷积神经网络由多层神经网络组成。这些层有时多达20层或更多，以图像作为输入数据。


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_20_0.png)


    CNN可以大大减少需要调整的参数数量。因此，CNN能够有效地管理原始图像的高维性。'

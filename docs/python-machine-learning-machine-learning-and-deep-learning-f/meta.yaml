    # CHAPTER 1. PYTHON DEEP LEARNING TUTORIAL


    [Python](https://www.python.org/) is a general-purpose high level programming
    language that is used widely in data science and for designing deep learning algorithms.


    This brief tutorial introduces [Python](https://www.python.org/) and its libraries
    like Scipy, Pandas, Numpy, Matplotlib; frameworks like Theano, Keras, TensorFlow.
    The tutorial book explains how the different libraries and frameworks can be applied
    to solve complex real world problems.


    ## 1.1 INTRODUCTION TO PYTHON DEEP LEARNING


    Hierarchical learning or structured deep learning or deep learning in short is
    part of the family of machine learning methods which are themselves a subset of
    the broader field of Artificial Intelligence.


    Deep learning defined as a class of machine learning algorithms that use several
    layers of nonlinear processing units for transformation and feature extraction.
    The output of each successive layer from the previous layer is used as input.


    Deep neural networks, recurrent neural networks and deep belief networks have
    been used in several fields such as speech recognition, computer vision, audio
    recognition, natural language processing, social network filtering, machine translation,
    and bioinformatics where they produced results comparable to and in some cases
    better than human experts have.


    Deep Learning Algorithms and Networks –


    - are based on the unsupervised learning of multiple levels of representations
    or features of the data. Higher-level features are derived from lower level features
    to form a hierarchical representation.

    - use some form of gradient descent algorithm for training.


    ## PYTHON DEEP LEARNING ENVIRONMENT


    This subsection studies the environment set up for [Python](https://www.python.org/)
    Deep Learning. The following software has to be installed for using deep learning
    algorithms.


    - Python 3.9+

    - Matplotlib

    - Scipy with Numpy

    - TensorFlow

    - Keras

    - Theano


    It is strongly recommended to install Anaconda distribution that comes with all
    of those packages NumPy, [Python](https://www.python.org/), Matplotlib, and SciPy.


    Ensure that the different types of software are installed properly.


    Let us go to our command line program and type in the following command –


    ```

    $ python

    Python 3.7 |Anaconda custom (32-bit)| (default, Oct 13 2020, 14:21:34)

    [GCC 7.2.0] on linux

    ```


    Next, required libraries are imported and their versions are printed –


    ```

    import numpy

    print numpy.__version__

    ```


    # OUTPUT


    ```

    1.14.2

    ```


    ## 1.3 INSTALLATION OF TENSORFLOW, THEANO AND KERAS


    Before installing the packages – Theano, Keras and TensorFlow, confirm that the
    **pip** is installed. The package management system in Anaconda is called the
    pip.


    To confirm the installation of pip, type the following in the command line –


    ```

    $ pip

    ```


    Once the installation of pip is confirmed, TensorFlow and Keras can be installed
    by executing the following command –


    ```

    $pip install theano

    $pip install tensorflow

    $pip install keras

    ```


    Check the installation of Theano by running the following line of code –


    ```

    $python –c “import theano: print (theano.__version__)”

    ```


    # OUTPUT


    ```

    1.0.1

    ```


    Confirm the installation of Tensorflow by executing the following line of code
    –


    ```

    $python –c “import tensorflow: print tensorflow.__version__”

    ```


    # OUTPUT


    ```

    1.7.0

    ```


    Execute the following line of code to confirm the installation of Keras by –


    ```

    $python –c “import keras: print keras.__version__”

    Using TensorFlow backend

    ```


    # OUTPUT


    ```

    2.1.5

    ```


    # CHAPTER 2. PYTHON DEEP BASIC MACHINE LEARNING


    Artificial Intelligence (AI) is any technique, code or algorithm that enables
    a computer to mimic human intelligence or cognitive behavior. Machine Learning
    (ML) is a subset of AI that uses statistical methods to enable machines to learn
    and improve with experience. Deep Learning is a subset of Machine Learning, which
    makes the computation of multi-layer neural networks feasible. Machine Learning
    is seen as shallow learning while Deep Learning is seen as hierarchical learning
    with abstraction.


    Machine learning deals with a wide range of concepts. The concepts are listed
    below –


    - supervised

    - unsupervised

    - linear regression

    - cost functions

    - reinforcement learning

    - under-fitting

    - overfitting

    - hyper-parameter, etc.


    The supervised learning learns to predict values from labelled data. One ML technique
    that widely used is classification, where target values are discrete values; for
    example, cats and dogs. Another type technique in machine learning is regression.
    Regression works on the target values. The target values are continuous values;
    for example, the stock market data can be analyzed using Regression.


    In unsupervised learning, the inferences are made from the input data that is
    not structured or labeled. Imagine if we need to make sense of million medical
    records and, find the outliers, underlying structure or detect anomalies, clustering
    technique is used to divide data into broad clusters.


    Data sets are divided into testing sets, training sets, validation sets and so
    on.


    In 2012 a breakthrough brought the concept of Deep Learning into prominence. An
    algorithm classified 1 million images into 1000 categories successfully using
    2 GPUs and latest technologies like Big Data.


    ## 2.1 RELATING TRADITIONAL MACHINE LEARNING AND DEEP LEARNING


    One of the major challenges encountered in traditional machine learning models
    is a process called feature extraction. The programmer specifies the features
    to be looked out for and tell the computer. These features help in making decisions.


    Many algorithms rarely work well with entering raw data, so feature extraction
    is a critical part of the traditional machine learning workflow.


    This places a huge responsibility on the programmer, and the algorithm''s efficiency
    relies heavily on how inventive the programmer is. For complex problems such as
    handwriting recognition or object recognition, this is a huge task.


    Deep learning, with the ability to learn multiple layers of representation, is
    one of the few methods that has helped automatic feature extraction. The lower
    layers perform automatic feature extraction, without requiring guidance from the
    programmer.


    # CHAPTER 3. ARTIFICIAL NEURAL NETWORKS


    Artificial Neural Network, or just neural network for short, is not a new idea.
    It has been around for about 80 years.


    However, until 2011 Deep Neural Networks became popular, with the use of new techniques,
    powerful computers, and huge dataset availability.


    A neural network mimics a neuron, which has axon, dendrites, a nucleus, and terminal
    axon.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_8_0.png)


    Two neurons compose a network. These neurons transfer information via synapse
    between the dendrites of one and the terminal axon of another.



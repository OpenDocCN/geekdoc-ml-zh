    create a compressed, hidden, or representation of the raw data. The vectors are
    useful in compressing the raw data this is the motivation behind dimensionality
    reduction. The reconstruction of input data based on its hidden representation
    is accomplished by Autoencoders which paired with decoders.


    RBM is considered to be the mathematical equivalent of a two-way translator. A
    set of numbers that encodes the inputs which received from the forward pass. This
    set of numbers are translated back into reconstructed inputs by a backward pass.
    A high degree of accuracy is achieved by a well-trained net.



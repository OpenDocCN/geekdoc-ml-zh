- md: "## CHAPTER 4. TRAINING A NEURAL NETWORK\n\nThis chapter explains how to train\
    \ a neural network. We will also learn back propagation algorithm and backward\
    \ pass in Python Deep Learning.\n\nTo get the desired output, the optimal values\
    \ of the weights of a neural network are defined. The neural network is trained\
    \ by the iterative gradient descent method. We randomly initialize the weights.\
    \ After random initialization, we make predictions on some subset of the data\
    \ with forward-propagation process, compute the corresponding cost function C,\
    \ and update each weight w by an amount proportional to dC/dw, i.e., the derivative\
    \ of the cost functions w.r.t. the weight. The proportionality constant is known\
    \ as the learning rate.\n\nThe back-propagation algorithm is used to calculate\
    \ the gradients efficiently. The key observation of backward prop or backward\
    \ propagation is that because of the chain rule’s differentiation, using the gradient\
    \ at the neurons the gradient in the neural network can be calculated. Hence,\
    \ we calculate the gradients backwards, i.e., first calculate the gradients of\
    \ the output layer, then the top-most hidden layer, followed by the preceding\
    \ hidden layer, and so on, ending at the input layer.\n\nThe back-propagation\
    \ algorithm is deploying the idea of a computational graph, where each neuron\
    \ is expanded to many nodes in the computational graph and performs a simple mathematical\
    \ operation. The computational graph assumes that no any weights on the edges;\
    \ all weights are assigned to the nodes, so the weights become their own nodes.\
    \ The backward propagation algorithm is then run on the computational graph. Once\
    \ the calculation is complete, only the gradients of the weight nodes are required\
    \ for update. The rest of the gradients can be ignored.\n\n## 4.1 GRADIENT DESCENT\
    \ OPTIMIZATION TECHNIQUE\n\nOne commonly used optimization function that adjusts\
    \ weights according to the error they caused is called the “gradient descent.”\n\
    \nGradient is another name for slope, and slope, on an x-y graph, represents how\
    \ two variables are related to each other: the rise over the run, the change in\
    \ distance over the change in time, etc. In this case, the slope is the ratio\
    \ between the network’s error and a single weight; i.e., how does the error change\
    \ as the weight is varied.\n\nTo put it more precisely, we need to find which\
    \ weight produces the least error. We want to find the weight that correctly represents\
    \ the signals contained in the input data, and translates them to a correct classification.\n\
    \nAs a neural network learns, it slowly adjusts many weights so that they can\
    \ map signal to meaning correctly. The ratio between network Error and each of\
    \ those weights is a derivative, dE/dw that calculates the extent to which a slight\
    \ change in a weight causes a slight change in the error.\n\nEach weight is just\
    \ one factor in a deep network that involves many transforms; the signal of the\
    \ weight passes through activations and sums over several layers.\n\nConsider\
    \ two variables, weight and error, are mediated by a third variable, **activation**,\
    \ through which the weight is passed. We can calculate how a change in weight\
    \ affects a change in error by first calculating how a change in activation affects\
    \ a change in Error, and how a change in weight affects a change in activation.\n\
    \nDeep learning is nothing more than that adjusting a model’s weights in response\
    \ to the error it produces, until you cannot reduce the error any more.\n\nWhen\
    \ the gradient value is small, the deep net trains slowly and if fast the value\
    \ is high. Inaccuracies in training results in inaccurate outputs. The process\
    \ of training the nets from the output back to the input is called back propagation\
    \ or back prop. We know that forward propagation starts with the input and works\
    \ forward. Back prop does the reverse/opposite calculating the gradient from right\
    \ to left.\n\nLet consider a node in the output layer. The edge uses the gradient\
    \ at that node. As we go back into the hidden layers, it gets more complex. The\
    \ product of two numbers between 0 and 1 gives you a smaller number. The gradient\
    \ value keeps getting smaller and as a result back prop takes a lot of time to\
    \ train and accuracy suffers.\n\n## 4.2 CHALLENGES IN DEEP LEARNING ALGORITHMS\n\
    \nSeveral challenges limit the performance of both deep neural networks and shallow\
    \ neural networks, like computation time and overfitting. The use of added layers\
    \ of abstraction which allow them to model rare dependencies in the training data\
    \ affected DNNs by causing overfitting.\n\n**Regularization** methods such as\
    \ drop out, data augmentation, early stopping, and transfer learning are applied\
    \ during training to overcome overfitting. Drop out regularization during training\
    \ randomly deletes units from the hidden layers which avoids rare dependencies.\
    \ DNNs consider several training parameters such as the size, i.e., the number\
    \ of layers and the number of units per layer, the initial weights and learning\
    \ rate. Finding optimal parameters is not always practical due to the high computational\
    \ resources and cost in time. Several hacks such as batching can speed up computation.\
    \ The large processing power of GPUs has significantly helped the training process,\
    \ as the matrix and vector computations required are well-executed on the GPUs.\n\
    \n## 4.3 DROPOUT\n\nDropout is a famous regularization technique for neural networks.\
    \ Deep neural networks are particularly prone to overfitting.\n\nOne of the pioneers\
    \ of Deep Learning Geoffrey Hinton said ‘If you have a deep neural net and it's\
    \ not overfitting, you should probably be using a bigger one and using dropout’.\n\
    \nDropout is a technique where during each iteration of gradient descent, a set\
    \ of randomly selected nodes are dropped. This means that we ignore some nodes\
    \ randomly as if they do not exist.\n\nEach neuron is kept with a probability\
    \ of q and dropped randomly with probability 1-q. The value q may be different\
    \ for each layer in the neural network. A value of 0.5 for the hidden layers,\
    \ and 0 for input layer works well on a wide range of tasks.\n\nDuring evaluation\
    \ and prediction, no dropout is used. The output of each neuron is multiplied\
    \ by q so that the input to the next layer has the same expected value.\n\nThe\
    \ idea behind Dropout is as follows – In a neural network without dropout regularization,\
    \ neurons develop co-dependency amongst each other that leads to overfitting.\n\
    \n**Implementation trick**\n\nDropout is implemented in libraries such as Pytorch\
    \ and TensorFlow by keeping the output of the randomly selected neurons as 0.\
    \ That is, though the neuron exists, its output is overwritten as 0.\n\n## Chapter\
    \ 5. Python Deep Learning - Implementations\n\nThis chapter of Deep learning uses\
    \ data of a certain bank. The objective is to predict the customer churning or\
    \ data attrition - which customers are likely to leave this bank service. We use\
    \ small Dataset is that contains 10000 rows with 14 columns. We already installed\
    \ an Anaconda distribution, and frameworks like TensorFlow, Theano and Keras.\
    \ Keras is built on top of Theano and Tensorflow.\n\n```\n# Artificial Neural\
    \ Network\n# Installing Theano\npip install --upgrade theano\n```\n\n```\n# Installing\
    \ Tensorflow\npip install --upgrade tensorflow\n```\n\n```\n# Installing Keras\n\
    pip install --upgrade keras\n```\n\n## Step 1: Data preprocessing\n\n```\nIn[]:\n\
    ```\n\n```\n# Importing the libraries\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nimport pandas as pd\n```\n\n```\n# Importing the database\ndataset =\
    \ pd.read_csv('Churn_Modelling.csv')\n```\n\n## Step 2\n\nMatrices of the dataset\
    \ features and the target variable have been created, which is column 14, labeled\
    \ as “Exited”.\n\nThe initial look of data is as shown below –\n\n```\nIn[]:\n\
    X = dataset.iloc[:, 3:13].values\nY = dataset.iloc[:, 13].values\nX\n```\n\n##\

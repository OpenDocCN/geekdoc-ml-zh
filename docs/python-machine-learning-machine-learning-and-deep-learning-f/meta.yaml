- img_proc: true
  md: '+   - Convolutional network or deep belief network DBN used for image recognition.

    - convolutional network or a RNTN used for object recognition.

    - Recurrent net is used for speech recognition.


    In general, multilayer perceptrons with rectified linear units or RELU and deep
    belief networks are both good choices for classification.

    Its recommended to use Recurrent net in time series analysis.


    # 3.4 RESTRICTED BOLTZMAN NETWORKS OR AUTOENCODERS - RBNs


    The issue of vanishing gradients have been tackled in 2006 by Geoff Hinton. He
    developed novel strategy that led to the **Restricted Boltzman Machine - RBM**,
    a shallow two layer net.

    The first layer is the **visible** layer and the second layer is the **hidden**
    layer. The visible layer nodes are connected to every node in the hidden layer.
    The network is known as restricted as no two layers within the same layer are
    allowed to share a connection.


    Encoding input data as vectors in network is achieved by the Autoencoders. They
    create a compressed, hidden, or representation of the raw data. The vectors are
    useful in compressing the raw data this is the motivation behind dimensionality
    reduction. The reconstruction of input data based on its hidden representation
    is accomplished by Autoencoders which paired with decoders.


    RBM is considered to be the mathematical equivalent of a two-way translator. A
    set of numbers that encodes the inputs which received from the forward pass. This
    set of numbers are translated back into reconstructed inputs by a backward pass.
    A high degree of accuracy is achieved by a well-trained net.


    The RBM is re-constructed to the input by trainin with different biases and weights
    until the input and there-construction are as close as possible. Note that the
    RBM data are not labelled. RBM sorts through data automatically;'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'by adjusting the biases and weights, an RBM is extracting important features
    to reconstruct the input. RBM is designed to recognize inherent patterns in data
    by applying feature extracting. Since they encode their own structure, they are
    also called auto-encoders.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_17_0.png)


    # 3.5 DEEP BELIEF NETWORKS - DBNs


    By introducing a clever training method and combining RBMs, deep belief networks
    (DBNs) are formed. The problem of vanishing gradient is finally solved by this
    model.


    A DBN is similar in structure to a MLP (Multi-layer perceptron), but very different
    when it comes to training. it is the training that enables DBNs to outperform
    their shallow counterparts


    The first RBM hidden layer is taken as the visible layer of the second RBM'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'and the second RBM is trained using the outputs from the first RBM. This process
    is iterated untill every layer in the network is trained.

    Each RBM in a DBN learns the entire input. A DBN is fine-tuning the entire input
    in succession as the model slowly improves.

    At this level, inherent patterns in the data is detected by RBMs but without any
    label or names. To complete training the DBN, we introduce labels to the patterns
    and fine tune the net with supervised learning.

    A very small set of labelled samples is studied such that the features and patterns
    are associated with a name. This small-labelled set of data is used for training.
    This set of labelled data can be very small when compared to the original data
    set.


    # 3.6 GENERATIVE ADVERSARIAL NETWORKS - GANs


    When deep neural nets comprising two nets, pitted one against the other, thus
    we called Generative adversarial networks

    GANs were considered as the most interesting idea in the last 10 years in ML.

    GANs poses huge potential, as the network-scan learn to mimic any distribution
    of data. GANs can create parallel worlds strikingly similar to our own in any
    domain: music, speech, images. They are machine (robot) artists in a way, and
    their output is quite impressive.

    In a GAN, one neural network, is called generator, generates new data instances,
    while the other, the discriminator, evaluates them for authenticity.


    # 3.7 RECURRENT NEURAL NETWORKS - RNNs


    **RNN**sare neural networks in which data can flow in any direction. Such networks
    are used for applications such as Natural Language Processing (NLP) or language
    modelling.

    Utilizeing sequential information is the basic concept underlying RNNs. In a normal
    neural network all outputs and inputs are independent of each other. In order
    to predict the next word in a sentence we need to determine which words came before
    it.'

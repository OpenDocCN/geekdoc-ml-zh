    \ Their weights are pre-loaded as **weights['node_1_0']** and **weights['node_1_1']**\
    \ respectively."
  - '[PAGE 36]


    We then create a model output from the hidden nodes using weights pre-loaded as
    **weights[''output'']**.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_36_0.png)


    node_0_0_input is calculated based on its weights weights[''node_0_0''] and the
    given input_data. Then the relu() function is applied to get node_0_0_output.


    node_1_0_input is calculated based on its weights weights[''node_1_0''] and the
    outputs from the first hidden layer - hidden_0_outputs. Then the relu() function
    is applied to get node_1_0_output.


    The same process as above are performed for node_1_1_input to get node_1_1_output.


    model_output is calculated using weights[''output''] and the outputs from the
    second hidden layer hidden_1_outputs array. The relu()function to this output
    is applied.'
  - "[PAGE 37]\n\n# MULTIPLE HIDDEN LAYERS\n\n![](img/7a4c5766421175e96a6dd74e9f9977a2_37_0.png)\n\
    \n# CALCULATING WITH ReLU ACTIVATION FUNCTION\n\n```\nimport numpy as np\ninput_data\
    \ = np.array([3, 5])\nweights = {\n    'node_0_0': np.array([2, 4]),\n    'node_0_1':\
    \ np.array([4, -5]),\n    'node_1_0': np.array([-1, 1]),\n    'node_1_1': np.array([2,\
    \ 2]),\n    'output': np.array([2, 7])\n}\ndef predict_with_network(input_data):\n\
    \    # Calculate node 0 in the first hidden layer\n    node_0_0_input = (input_data\
    \ * weights['node_0_0']).sum()\n    node_0_0_output = relu(node_0_0_input)\n\n\
    \    # Calculate node 1 in the first hidden layer\n    node_0_1_input = (input_data*weights['node_0_1']).sum()\n\
    \    node_0_1_output = relu(node_0_1_input)\n\n    # Put node values into array:\
    \ hidden_0_outputs\n    hidden_0_outputs = np.array([node_0_0_output, node_0_1_output])\n\
    ```"
  - "[PAGE 38]\n\n```\n# Calculate node 0 in the second hidden layer\nnode_1_0_input\
    \ = (hidden_0_outputs*weights['node_1_0']).sum()\nnode_1_0_output = relu(node_1_0_input)\n\
    \n# Calculate node 1 in the second hidden layer\nnode_1_1_input = (hidden_0_outputs*weights['node_1_1']).sum()\n\
    node_1_1_output = relu(node_1_1_input)\n\n# Put node values into array: hidden_1_outputs\n\
    hidden_1_outputs = np.array([node_1_0_output, node_1_1_output])\n\n# Calculate\
    \ model output: model_output\nmodel_output = (hidden_1_outputs*weights['output']).sum()\n\
    \    # Return model_output\n    return(model_output)\noutput = predict_with_network(input_data)\n\
    print(output)\n```\n\n# Output\n\n364"

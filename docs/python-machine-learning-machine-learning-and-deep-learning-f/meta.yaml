- img_proc: true
  md: 'RNNs are called recurrent because they the same task for every element of a
    sequence is repeated, with the output being based on the previous computations.
    RNNs thus can be said to have a “memory” that captures information about what
    has been previously calculated. In theory, RNNs can use information in very long
    sequences, but in reality, they can look back only a few steps.


    ![](img/7a4c5766421175e96a6dd74e9f9977a2_19_0.png)


    Long short-term memory networks (LSTMs) are most commonly used RNNs.


    Together with convolutional Neural Networks, RNNs have been used as part of a
    model to generate descriptions for unlabelled images.


    # 3.8 Convolutional Deep Neural Networks - CNNs



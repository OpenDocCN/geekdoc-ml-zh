    However, the number of biases and weights will increase exponentially. As a matter
    of fact, learning such difficult problems can become challenging. Hence, the solution
    is the convolutional neural networks.


    CNNs are used; have been extensively used in computer vision and acoustic modelling
    for automatic speech recognition.


    The idea behind convolutional neural networks is the idea of a “moving filter”
    which passes through the image. This moving filter, or convolution,'

  md: '# CHAPTER 1. PYTHON DEEP LEARNING TUTORIAL


    [Python](https://www.python.org/) is a general-purpose high level programming
    language that is used widely in data science and for designing deep learning algorithms.


    This brief tutorial introduces [Python](https://www.python.org/) and its libraries
    like Scipy, Pandas, Numpy, Matplotlib; frameworks like Theano, Keras, TensorFlow.
    The tutorial book explains how the different libraries and frameworks can be applied
    to solve complex real world problems.


    # 1.1 INTRODUCTION TO PYTHON DEEP LEARNING


    Hierarchical learning or structured deep learning or deep learning in short is
    part of the family of machine learning methods which are themselves a subset of
    the broader field of Artificial Intelligence.


    Deep learning defined as a class of machine learning algorithms that use several
    layers of nonlinear processing units for transformation and feature extraction.
    The output of each successive layer from the previous layer is used as input.


    Deep neural networks, recurrent neural networks and deep belief networks have
    been used in several fields such as speech recognition, computer vision, audio
    recognition, natural language processing, social network filtering, machine translation,
    and bioinformatics where they produced results comparable to and in some cases
    better than human experts have.


    Deep Learning Algorithms and Networks –


    +   - are based on the unsupervised learning of multiple levels of representations
    or features of the data. Higher-level features are derived from lower level features
    to form a hierarchical representation.

    - use some form of gradient descent algorithm for training.


    # PYTHON DEEP LEARNING ENVIRONMENT


    This subsection studies the environment set up for [Python](https://www.python.org/)
    Deep Learning. the following software is have to be installed for using deep learning
    algorithms.


    +   - Python 3.9+'

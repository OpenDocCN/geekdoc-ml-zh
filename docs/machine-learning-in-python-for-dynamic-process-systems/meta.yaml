  md: 'Guided by our own experience from building process models for varied industrial
    applications over the past several years, this book covers a curated set of ML
    techniques that have proven useful for DPM. The broad objectives of the book can
    be summarized as follows:


    +   - reduce barrier-to-entry for those new to the field of SysID

    - provide working-level knowledge of SysID techniques to the readers

    - enable readers to make judicious selection of a SysID technique appropriate
    for their problems through intuitive understanding of the advantages and drawbacks
    of different methods

    - provide step-by-step guidance for developing tools for soft sensing, process
    monitoring, predictive maintenance, etc. using SysID methods


    This book adopts a tutorial-style approach. The focus is on guidelines and practical
    illustrations with a delicate balance between theory and conceptual insights.
    Hands-on-learning is emphasized and therefore detailed code examples with industrial-scale
    datasets are provided to concretize the implementation details. A deliberate attempt
    is made to not weigh readers down with mathematical details, but rather use it
    as a vehicle for better conceptual understanding. Complete code implementations
    have been provided in the GitHub repository. Although most of the existing literature
    on SysID use MATLAB as the programming environment, we have adopted Python in
    this book due to its immense popularity among the broad ML community. Several
    Python libraries are now available which makes DPM using Python convenient.


    We are quite confident that this text will enable its readers to build dynamic
    models for challenging problems with confidence. We wish them the best of luck
    in their career.


    # Who should read this book


    The application-oriented approach in this book is meant to give a quick and comprehensive
    coverage of dynamic modeling methodologies in a coherent, reader-friendly, and
    easy-to-understand manner. The following categories of readers will find the book
    useful:


    +   1) Data scientists new to the field of system identification

    2) Regular users of commercial process modeling software looking to obtain a deeper
    understanding of the underlying concepts

    3) Practicing process data scientists looking for guidance for developing process
    modeling and monitoring solutions for dynamic systems

    4) Process engineers or process engineering students making their entry into the
    world of data science'

    GBN 信号类似于 PRBS，但非周期性。它在两个值 $-a$ 和 $a$ 之间切换，序列生成方式如下


    $P[u(k) = -u(k-1)] = p_{sw}$

    $P[u(k) = u(k-1)] = 1 - p_{sw}$


    $; p_{sw} \in (0,1)$ 是切换概率


    当 $p_{sw} = 0.5$ 时，GBN 信号具有类似白噪声的特性。然而，通常建议使用较低的 $p_{sw}$ 值（0.1 或 0.05）。SIPPY
    库提供了生成 GBN 信号的函数。示例如下。


    ### 示例 4.2：


    让我们生成一个在 -1 和 1 之间波动的 GBN 输入信号。


    ```


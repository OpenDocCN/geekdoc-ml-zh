    ```\n\n## 向量化操作\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_43_0.png)\n\n> 假设你需要对两个一维数组进行逐元素求和。一种方法是在循环中一次访问每个索引处的元素并求和。另一种方法是一次性对多个索引处的元素求和。后一种方法称为向量化操作，对于大型数据集和复杂操作，可以显著提升计算时间。\n\
    \n```\n# 向量化操作\nvec1 = np.array([1,2,3,4])\nvec2 = np.array([5,6,7,8])\nvec_sum\

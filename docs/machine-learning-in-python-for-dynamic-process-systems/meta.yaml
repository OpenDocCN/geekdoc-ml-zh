    PRBS 信号在两个电平之间切换，脉冲宽度可变，如下图所示。宽脉冲有助于估计稳态增益，而窄脉冲有助于捕捉瞬态动态。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_68_0.png)


    对于 $n$ 阶，可以生成长度为 $M = 2^n-1$ 的唯一序列。对于更长的信号长度，该唯一序列会重复自身，因此具有长度为 $M$ 的周期，如下例所示。尽管
    PRBS 序列是确定性的，但对于较大的 $M$（且信号长度 $\ge M$），该信号具有类似白噪声的特性，因此其名称中包含“伪随机”一词。Scipy 库提供了生成

    $$\varepsilon_x(k) = \hat{x}(k+1) - (\hat{A}\hat{x}(k) + \hat{B}u(k)) \implies
    \hat{Q} = \Sigma_{\varepsilon_x\varepsilon_x}$$

    $$\varepsilon_y(k) = y(k) - (\hat{C}\hat{x}(k) + \hat{D}u(k)) \implies \hat{R}
    = \Sigma_{\varepsilon_y\varepsilon_y}$$


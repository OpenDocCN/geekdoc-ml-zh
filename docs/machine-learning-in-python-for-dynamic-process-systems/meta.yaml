    With $e(k) = y(k) - \sum_{i=1}^{M} g(i)u(k-i)$ as equation error, the data can
    be put in the following matrix form


    $$\begin{bmatrix} y(M) \ y(M+1) \ \vdots \ y(N-1) \end{bmatrix} = \begin{bmatrix}
    u(M-1) & u(M-2) & \cdots & u(0) \ u(M) & u(M-1) & \cdots & u(1) \ \vdots & \ddots
    & \cdots & \vdots \ u(N-2) & \cdots & \cdots & u(N-1-M) \end{bmatrix} \begin{bmatrix}
    g_1 \ g_2 \ \vdots \ g_M \end{bmatrix} + \begin{bmatrix} e(M) \ e(M+1) \ \vdots
    \ e(N-1) \end{bmatrix}$$


    $$Y = \Phi\theta + E$$


    Estimate of the parameter vector, $\hat{\theta}$, is obtained by minimizing the
    error vector. You probably would already know that an analytical solution for
    $\hat{\theta}$ exists and is given as $\hat{\theta} = [\Phi^T\Phi]^{-1}\Phi^TY$.


    # Model order selection


    Correct order selection is important in FIR modeling. Too low model order won''t
    catch complex process dynamics and lead to inaccurate process gain estimates,
    and too high model order can lead to overfitting resulting in noisy impulse/step
    response curves. If any approximate prior knowledge is available about the process
    settling time or the time to steady state (TTSS), then it can be used to set the
    model order. For example, if TTSS is 120 then as many coefficients would be required
    in the model.


    **Example 6.1:**


    File *FIR_illustrate.csv* contains I/O data for the below process whose shown
    step response suggests a TTSS of ~30. The variance of the noise signal was adjusted
    to provide signal-to-noise ratio of 20. We will fit three FIR models with model
    orders 3, 30, and 60, respectively, and compare their step responses with the
    true curve.


    $$y(k) = \frac{2q^{-2}}{1 - 1.1q^{-1} + 0.8q^{-2}} u(k) + v(k)$$


    $$v(k) = \frac{1}{1 - 0.6q^{-1}} e(k)$$



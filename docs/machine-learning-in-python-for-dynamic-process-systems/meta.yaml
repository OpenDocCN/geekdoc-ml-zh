    \ ARIMA 过程：$v(k) = \\frac{C(q^{-1})}{(1-q^{-1})^d A(q^{-1})} e(k)$，其中 $d$ 是差分阶数$^{58}$，最终模型如图\
    \ 7.7 所示。\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_149_0.png)\n\n图 7.7：ARIMAX\
    \ 的模型结构。注意，这里的 $d$ 表示差分阶数，而不是过程延迟。\n\n让我们进行一些快速的代数运算，以理解采用此模型的含义。\n\nARIMAX 模型：$y(k)\
    \ = q^{-n_d} \\frac{B(q^{-1})}{A(q^{-1})} u(k) + \\frac{C(q^{-1})}{(1-q^{-1})^d\

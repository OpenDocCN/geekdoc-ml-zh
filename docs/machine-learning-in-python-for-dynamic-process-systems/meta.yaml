- md: "## Equivalence between AR and MA models\n\nAR and MA models may appear to be\
    \ very different, but, under some conditions, they are inter-convertible. Any\
    \ stationary AR model can be rewritten as an MA(∞) model and any invertible (definition\
    \ of invertibility will be provided soon) MA model can be equivalently rewritten\
    \ as an AR(∞) model. For example, consider the MA(1) model $y(k) = c_1e(k-1) +\
    \ e(k)$, which can be rewritten as\n\n$y(k) = c_1(y(k-1) - c_1e(k-2)) + e(k)$\n\
    $= c_1y(k-1) - c_1^2e(k-2) + e(k)$\n\n$\\vdots$ after repeated substitutions\n\
    \nAR(∞) model! $y(k) = -\\sum_{j=1}^{\\infty} (-c_1)^j y(k-j) + e(k)$ eq. 5\n\n\
    > An alternative and quicker derivation:\n$y(k) = (1 + c_1q^{-1})e(k)$\n$\\Rightarrow\
    \ (1 + c_1q^{-1})^{-1}y(k) = e(k)$ using polynomial long division\n$\\Rightarrow\
    \ (\\sum_{j=0}^{\\infty} (-c_1)^j q^{-j})y(k) = e(k)$\n\nNote that Eq. 5 represents\
    \ a valid/sensible model only if $|c_1| < 1$ (otherwise $c_1^j$ grows unbounded).\
    \ This is also the condition of invertibility for a MA(1) model. An AR(1) model\
    \ can be rewritten as MA(∞) model via recursive substitution of $y(k-1)$, $y(k-2)$,\
    \ and so on.\n\nACF/PACF plots may sometime suggest both AR and MA models as adequate\
    \ representations of the underlying process. Given the equivalence between the\
    \ two class of models, you can choose either. Just keep a note that while AR parameters\
    \ are easy to estimate, MA model may be more parsimonious (i.e., require much\
    \ fewer parameters).\n\n## 5.4 Autoregressive Moving Average (ARMA) Models: An\
    \ Introduction\n\nSometimes a more compact and parsimonious model (compared to\
    \ AR or MA models) can be built by combining the autoregressive and moving average\
    \ terms. Such models are called ARMA models and take the following form\n\n$$y(k)\
    \ = -a_1y(k-1) \\cdots - a_py(k-p) + c_1e(k-1) \\cdots + c_re(k-r) + e(k)$$\n\n\
    $$= \\left(-\\sum_{j=1}^{p} a_j q^{-j}\\right)y(k) + \\left(\\sum_{j=1}^{r} c_j\
    \ q^{-j}\\right)e(k) + e(k) \\quad \\text{eq. 6}$$\n\nAR terms \nMA terms\n\n\
    The above model is called ARMA(p,r) due to the $p^{th}$ order autoregressive component\
    \ and $r^{th}$ order moving average component. It is apparent that AR and MA models\
    \ are special cases of ARMA model. Additionally, any stationary and invertible\
    \ ARMA model can equivalently be rewritten an AR($\\infty$) or a MA($\\infty$)\
    \ model.\n\nARMA models are not just for mathematical convenience but are commonly\
    \ encountered in process industry. To see the reason, consider an example scenario\
    \ below where output from a pure AR process is contaminated by a random white\
    \ noise disturbance\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_102_0.png)\n\n\
    $$y(k) = a(y(k-1) - e(k-1)) + e(k)$$\n$$\\Rightarrow y(k) = ay(k-1) - ae(k-1)\
    \ + e(k)$$\nOverall, an ARMA(1,1) process!\n\nPlots below provide a sample of\
    \ patterns generated from ARMA models.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_103_0.png)\n\
    \n## Model order selection\n\nACF and PACF plots for the ARMA(2,2) plot in Figure\
    \ 5.5 are provided below.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_103_1.png)\n\
    \n> Both ACF and PACF plots tails off in exponential-like pattern (with mixture\
    \ of damped sine waves) which is characteristic of ARMA process\n\nAs is apparent,\
    \ not much help is provided regarding the specific values of $p$ and $r$. The\
    \ general recourse is to use model order selection techniques introduced in Chapter\
    \ 4.\n\n## Example 5.3: We will create an ARMA(1,2) signal with 1000 samples.\
    \ Thereafter, the AR and MA orders will be automatically determined via AIC and\
    \ the corresponding model will be fitted to the data. The imported packages are\
    \ the same as that in Example 5.1\n\n```\n# generate data for ARMA(1,2) process\n\
    ARMAprocess = ArmaProcess(ar=[1, -0.3], ma=[1, 0.3, 0.45])\ny_ARMA = ARMAprocess.generate_sample(nsample=1000)\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_104_0.png)\n\n```\n# generate\
    \ ACF and PACF plots for y_ARMA\nplot_acf(y_ARMA, lags= 20, alpha=None, title='')\n\
    plot_pacf(y_ARMA, lags= 20, alpha=None, title='')\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_104_1.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_104_2.png)\n\nThe ACF and PACF plots\
    \ are not very conclusive. Fortunately, the tsa package provides a function arma_order_select_ic\
    \ that can help estimate the orders via AIC.\n\n```\n# Determine the optimal AR\
    \ and MA orders\nfrom statsmodels.tsa.stattools import arma_order_select_ic\n\n\
    y_ARMA_centered = y_ARMA - np.mean(y_ARMA)\nres = arma_order_select_ic(y_ARMA_centered,\
    \ max_ma=4, ic=[\"aic\"])\np, r = res.aic_min_order\nprint('(p, r) = ', res.aic_min_order)\n\
    ```\n\n>>> (p, r) = (1, 2)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_104_3.png)\n\
    \n```\n# Fit an ARMA(p,r) model\nmodel = ARIMA(y_ARMA_centered, order=(p, 0, r))\n\
    results = model.fit()\nprint('[a1] = ', -results.arparams); print('[c1, c2] =\
    \ ', results.maparams)\n```\n\n>>> [a1] = [-0.29]\n[c1, c2] = [0.30 0.53]\n\n\
    The estimated parameters are close to the true values. Next, the residuals are\
    \ generated as in the previous examples and whiteness of the residual sequence\
    \ is confirmed.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_104_4.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_104_5.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_104_6.png)\n\n## 5.5 Monitoring Controlled\
    \ Variables in a CSTR using ARMA Models\n\nTo illustrate a practical application\
    \ of time series analysis, we will consider the continuous stirred-tank reactor\
    \ described in the chapter introduction. Here, the product temperature will be\
    \ monitored to ensure it is not deviating away from its optimal setpoint due to\
    \ any process fault. The datafile *CSTR_controlledTemperature.csv* contains 4\
    \ hours of temperature measurements<sup>40</sup> sampled at 0.1 seconds (totaling\
    \ 2401 samples). A process fault occurs at 3.5 hours (around sample # 2100) causing\
    \ a 20% decrease in the heat transfer coefficient. Let's see if this process fault\
    \ causes any deviations in the product temperature and if our monitoring methodology\
    \ can detect these deviations.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_105_0.png)\n\
    \nLet's start by importing the required packages and exploring the provided I/O\
    \ dataset. The first 3 hours of data will be used to build a model and the last\
    \ 1 hour will be used as test data.\n\n```\n# import packages\nimport matplotlib.pyplot\
    \ as plt, numpy as np, control\nfrom statsmodels.graphics.tsaplots import plot_acf,\
    \ plot_pacf\nfrom statsmodels.tsa.stattools import arma_order_select_ic\nfrom\
    \ statsmodels.tsa.arima.model import ARIMA\n```\n\n```\n# read data and split\
    \ into training and test data\nT = np.loadtxt('CSTR_controlledTemperature.csv',\
    \ delimiter=',')\nT_train = T[:1800]; T_test = T[1800:]\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_106_0.png)\n\
    \nThe plot above shows that the temperature seems to show only a short-lived<sup>42</sup>\
    \ deviation in its absolute value due to the process fault. Therefore, on the\
    \ basis of this time-plot alone, plant operators could very well ignore this as\
    \ an unimportant fluctuation and the process fault could go unattended.\n\nThe\
    \ trivial univariate monitoring approach of using *mean ± 2 * standard deviation*\
    \ bounds would also be inadequate because this approach assumes that the samples\
    \ are independent of each-other, which as shown by the below ACF plot of *T_train*\
    \ data, is certainly not true for the product outlet temperature (and dynamic\
    \ processes in general). The control chart shown below shows the failure of this\
    \ approach as the controlled variable does not show any sustained unusual violations\
    \ of the control bounds (bounds are computed using the training data only).\n\n\
    ![](img/6cffacf6247d6f7caa7eacc348cef427_106_1.png)\n\nLet's now see if the time-series\
    \ models can do a better job of fault detection. We will attempt to fit an ARMA\
    \ model.\n\n```\n# Determine the optimal AR and MA orders\nT_train_centered =\
    \ T_train - np.mean(T_train); T_test_centered = T_test - np.mean(T_train)\nres\
    \ = arma_order_select_ic(T_train_centered, max_ar=5, max_ma=5, ic=[\"aic\"])\n\
    p, r = res.aic_min_order\nprint('(p, r) = ', res.aic_min_order)\n\n>>> (p, r)\
    \ = (2, 4)\n\n# Fit an ARMA(p,r) model and get residuals\nmodel = ARIMA(T_train_centered,\
    \ order=(p, 0, r))\nresults = model.fit()\nT_train_centered_pred = results.fittedvalues\
    \ # same as results.predict()\nresiduals_train = T_train_centered - T_train_centered_pred\
    \ # same as results.resid\n```\n\nThe residuals pass the model quality check.\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_107_0.png)\n\nIt is time now to use\
    \ the fitted ARMA model for fault detection. The rationale is straight-forward:\
    \ if any process-fault leads to changes in process behavior then the model fitted\
    \ using ‘normal’ operating condition data won’t be very accurate with faulty data\
    \ and therefore, the residuals will show higher values. Consequently, the residuals\
    \ are monitored for fault detection as summarized in Figure 5.6.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_107_1.png)"
  mdcn: '## AR模型与MA模型的等价性


    AR模型和MA模型表面上看起来可能差异很大，但在某些条件下，它们可以相互转换。任何平稳的AR模型都可以重写为MA(∞)模型，任何可逆的（可逆性的定义稍后给出）MA模型也可以等价地重写为AR(∞)模型。例如，考虑MA(1)模型
    $y(k) = c_1e(k-1) + e(k)$，它可以被重写为


    $y(k) = c_1(y(k-1) - c_1e(k-2)) + e(k)$

    $= c_1y(k-1) - c_1^2e(k-2) + e(k)$


    $\vdots$ 经过反复代入


    AR(∞)模型！ $y(k) = -\sum_{j=1}^{\infty} (-c_1)^j y(k-j) + e(k)$ 公式 5


    > 另一种更快的推导方法：

    $y(k) = (1 + c_1q^{-1})e(k)$

    $\Rightarrow (1 + c_1q^{-1})^{-1}y(k) = e(k)$ 使用多项式长除法

    $\Rightarrow (\sum_{j=0}^{\infty} (-c_1)^j q^{-j})y(k) = e(k)$


    注意，公式5仅在 $|c_1| < 1$ 时才表示一个有效/合理的模型（否则 $c_1^j$ 会无界增长）。这也是MA(1)模型的可逆性条件。AR(1)模型可以通过递归代入
    $y(k-1)$、$y(k-2)$ 等，重写为MA(∞)模型。


    ACF/PACF图有时可能表明AR和MA模型都是底层过程的合适表示。鉴于这两类模型的等价性，你可以任选其一。只需注意，虽然AR参数易于估计，但MA模型可能更简约（即需要少得多的参数）。


    ## 5.4 自回归移动平均（ARMA）模型：简介


    有时，通过结合自回归项和移动平均项，可以构建一个比AR或MA模型更紧凑、更简约的模型。这类模型称为ARMA模型，其形式如下


    $$y(k) = -a_1y(k-1) \cdots - a_py(k-p) + c_1e(k-1) \cdots + c_re(k-r) + e(k)$$


    $$= \left(-\sum_{j=1}^{p} a_j q^{-j}\right)y(k) + \left(\sum_{j=1}^{r} c_j q^{-j}\right)e(k)
    + e(k) \quad \text{公式 6}$$


    AR项

    MA项


    上述模型被称为ARMA(p,r)，这是由于其包含 $p^{th}$ 阶自回归分量和 $r^{th}$ 阶移动平均分量。显然，AR和MA模型是ARMA模型的特例。此外，任何平稳且可逆的ARMA模型都可以等价地重写为AR($\infty$)或MA($\infty$)模型。


    ARMA模型不仅仅是为了数学上的便利，在过程工业中也很常见。要理解原因，请考虑下面的示例场景，其中纯AR过程的输出被随机白噪声干扰所污染


    ![](img/6cffacf6247d6f7caa7eacc348cef427_102_0.png)


    $$y(k) = a(y(k-1) - e(k-1)) + e(k)$$

    $$\Rightarrow y(k) = ay(k-1) - ae(k-1) + e(k)$$

    总体而言，这是一个ARMA(1,1)过程！


    下面的图提供了ARMA模型生成的模式示例。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_103_0.png)


    ## 模型阶数选择


    图5.5中ARMA(2,2)图的ACF和PACF图如下所示。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_103_1.png)


    > ACF和PACF图都呈现指数衰减的拖尾模式（混合了阻尼正弦波），这是ARMA过程的特征


    很明显，这些图对于确定 $p$ 和 $r$ 的具体值帮助不大。通常的解决方法是使用第4章介绍的模型阶数选择技术。


    ## 示例5.3：我们将创建一个包含1000个样本的ARMA(1,2)信号。之后，将通过AIC自动确定AR和MA阶数，并将相应的模型拟合到数据上。导入的包与示例5.1相同


    ```

    # 为ARMA(1,2)过程生成数据

    ARMAprocess = ArmaProcess(ar=[1, -0.3], ma=[1, 0.3, 0.45])

    y_ARMA = ARMAprocess.generate_sample(nsample=1000)

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_0.png)


    ```

    # 为y_ARMA生成ACF和PACF图

    plot_acf(y_ARMA, lags= 20, alpha=None, title='''')

    plot_pacf(y_ARMA, lags= 20, alpha=None, title='''')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_1.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_2.png)


    ACF和PACF图的结论不是很明确。幸运的是，tsa包提供了一个函数 `arma_order_select_ic`，可以帮助通过AIC估计阶数。


    ```

    # 确定最优的AR和MA阶数

    from statsmodels.tsa.stattools import arma_order_select_ic


    y_ARMA_centered = y_ARMA - np.mean(y_ARMA)

    res = arma_order_select_ic(y_ARMA_centered, max_ma=4, ic=["aic"])

    p, r = res.aic_min_order

    print(''(p, r) = '', res.aic_min_order)

    ```


    >>> (p, r) = (1, 2)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_3.png)


    ```

    # 拟合一个ARMA(p,r)模型

    model = ARIMA(y_ARMA_centered, order=(p, 0, r))

    results = model.fit()

    print(''[a1] = '', -results.arparams); print(''[c1, c2] = '', results.maparams)

    ```


    >>> [a1] = [-0.29]

    [c1, c2] = [0.30 0.53]


    估计的参数接近真实值。接下来，按照前面示例中的方法生成残差，并确认残差序列的白噪声特性。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_4.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_5.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_104_6.png)


    ## 5.5 使用ARMA模型监控CSTR中的受控变量


    为了说明时间序列分析的实际应用，我们将考虑章节引言中描述的连续搅拌釜式反应器。这里，将监控产品温度，以确保其不会因任何过程故障而偏离其最佳设定点。数据文件
    *CSTR_controlledTemperature.csv* 包含4小时的温度测量值<sup>40</sup>，采样间隔为0.1秒（共2401个样本）。在3.5小时（约第2100个样本）时发生过程故障，导致传热系数降低20%。让我们看看这个过程故障是否会导致产品温度的任何偏差，以及我们的监控方法能否检测到这些偏差。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_105_0.png)


    让我们从导入所需的包并探索提供的输入/输出数据集开始。前3小时的数据将用于构建模型，后1小时的数据将用作测试数据。


    ```

    # 导入包

    import matplotlib.pyplot as plt, numpy as np, control

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    from statsmodels.tsa.stattools import arma_order_select_ic

    from statsmodels.tsa.arima.model import ARIMA

    ```


    ```

    # 读取数据并分为训练数据和测试数据

    T = np.loadtxt(''CSTR_controlledTemperature.csv'', delimiter='','')

    T_train = T[:1800]; T_test = T[1800:]

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_106_0.png)


    上面的图显示，由于过程故障，温度似乎只表现出短暂的<sup>42</sup>绝对值偏差。因此，仅基于此时间图，工厂操作员很可能将其视为不重要的波动而忽略，过程故障可能得不到处理。


    使用 *均值 ± 2 * 标准差* 界限的简单单变量监控方法也是不够的，因为该方法假设样本之间是相互独立的，而正如下面 *T_train* 数据的ACF图所示，对于产品出口温度（以及一般的动态过程）来说，这显然不是真的。下面显示的控制图表明了这种方法的失败，因为受控变量没有显示出任何持续的、异常的控制界限违反（界限仅使用训练数据计算）。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_106_1.png)


    现在让我们看看时间序列模型是否能在故障检测方面做得更好。我们将尝试拟合一个ARMA模型。


    ```

    # 确定最优的AR和MA阶数

    T_train_centered = T_train - np.mean(T_train); T_test_centered = T_test - np.mean(T_train)

    res = arma_order_select_ic(T_train_centered, max_ar=5, max_ma=5, ic=["aic"])

    p, r = res.aic_min_order

    print(''(p, r) = '', res.aic_min_order)


    >>> (p, r) = (2, 4)


    # 拟合一个ARMA(p,r)模型并获取残差

    model = ARIMA(T_train_centered, order=(p, 0, r))

    results = model.fit()

    T_train_centered_pred = results.fittedvalues # 与 results.predict() 相同

    residuals_train = T_train_centered - T_train_centered_pred # 与 results.resid 相同

    ```


    残差通过了模型质量检查。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_107_0.png)


    现在是时候使用拟合好的ARMA模型进行故障检测了。其原理很直接：如果任何过程故障导致过程行为发生变化，那么使用“正常”运行条件数据拟合的模型在故障数据上就不会非常准确，因此残差会显示出更高的值。因此，通过监控残差来进行故障检测，如图5.6所示。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_107_1.png)'

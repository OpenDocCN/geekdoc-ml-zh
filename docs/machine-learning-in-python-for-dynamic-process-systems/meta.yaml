  md: '# 7.6 ARIMAX Models: An Introduction


    So far we have worked under the assumption that the process disturbances ($v(k)$)
    are stationary. However, this may not always be true. Nonetheless, if $v(k)$ is
    difference stationary, then it can be modeled as an ARIMA process: $v(k) = \frac{C(q^{-1})}{(1-q^{-1})^d
    A(q^{-1})} e(k)$ where $d$ is the differencing order$^{58}$, and the final model
    looks as shown in Figure 7.7.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_149_0.png)


    Figure 7.7: Model structure of ARIMAX. Note that here $d$ denotes the differencing
    order and not the process delay.


    Let''s do some quick algebraic manipulation to understand the implications of
    employing this model.


    ARIMAX model: $y(k) = q^{-n_d} \frac{B(q^{-1})}{A(q^{-1})} u(k) + \frac{C(q^{-1})}{(1-q^{-1})^d
    A(q^{-1})} e(k)$


    $\Rightarrow (1-q^{-1})^d y(k) = q^{-n_d} \frac{B(q^{-1})}{A(q^{-1})} (1-q^{-1})^d
    u(k) + \frac{C(q^{-1})}{A(q^{-1})} e(k)$


    $\Rightarrow \tilde{y}(k) = q^{-n_d} \frac{B(q^{-1})}{A(q^{-1})} \tilde{u}(k)
    + \frac{C(q^{-1})}{A(q^{-1})} e(k)$


    where $\tilde{y}(k) = (1-q^{-1})^d y(k)$

    $\tilde{u}(k) = (1-q^{-1})^d u(k)$


    ARMAX model!'
  merge: -1
  pgno: 149

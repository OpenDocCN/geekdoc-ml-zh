  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_25_0.png)


    Figure 1.5: Some popular SysID methods and models covered in this book


    There are several noteworthy points in Figure 1.5. First, the apparent domination
    of linear models: you may have expected nonlinear models to be preferable for
    modeling complex industrial process systems, however, as it turns out, linear
    models are often justified for DPM. The justification stems from the fact that
    industrial processes often operate around an optimal point making the linear models
    pretty good approximation for usage in process control and process monitoring
    applications. If the end use of the model is process simulation or design where
    the system response over wide range of input variables is of interest, then nonlinear
    models can prove to be more suitable. Within linear category, different modeling
    options exist to cater to process systems with different characteristics, viz,
    multivariable outputs, presence of correlated noise, disturbances sharing dynamics
    with inputs, presence of measurement noise only, presence of drifts or non-stationarities,
    etc.


    The classification at the root of linear model sub-tree is based on the methodology
    used for model fitting. While PEM methods employ minimization of prediction errors,
    subspace methods are based on matrix algebra and do not involve any optimization
    for parameter optimization.³ Do not worry if these terms do not make much sense
    right now; they will soon become ‘obvious’ to you. If not trained about the nuanced
    differences between these different models and methods, you may not have much
    idea at the outset about which model would be the best one for your system. This
    book will help you gain adequate conceptual understanding to become adept at making
    the right choice and obtaining your coveted model quickly.


    ³ Another distinction is that PEM is used to obtain input-output models while
    SIM is used to obtain state-space models.'

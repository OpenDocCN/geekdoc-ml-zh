    # Summary


    In this chapter, we looked at state-space models and saw how it offers more insights
    into the internal process dynamics compared to input-output models. For fitting
    state-space models we studied subspace identification techniques with the focus
    on CVA models. Through a couple of industrial-scale case-studies, we learnt how
    to build dynamic models for usage in process control and process monitoring. In
    the next chapter we will see some classical techniques for modeling nonlinear
    processes.'

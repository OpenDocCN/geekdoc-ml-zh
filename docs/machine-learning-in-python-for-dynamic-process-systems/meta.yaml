    Engineering*’ covers the basic foundations of machine learning and provides an
    overview of broad spectrum of ML methods primarily suited for static systems.
    Step-by-step guidance on building ML solutions for process monitoring, soft sensing,
    predictive maintenance, etc. are provided using real process datasets. Aspects
    relevant to process systems such as modeling correlated variables via PCA/PLS,
    handling outliers in noisy multidimensional dataset, controlling processes using
    reinforcement learning, etc. are covered. This second book of the series is focused
    on dynamic systems and provides a guided tour along the wide range of available
    dynamic modeling choices. Emphasis is paid to both the classical methods (ARX,
    CVA, ARMAX, OE, etc.) and modern neural network methods. Applications on time
    series analysis, noise modeling, system identification, and process fault detection
    are illustrated with examples. Future books of the series will continue to focus
    on other aspects and needs of process industry. It is hoped that these books can
    help process data scientists find innovative ML solutions to the real-world problems
    faced by the process industry.


    Books of the series will be useful to practicing process engineers looking to
    ‘pick up’ machine learning as well as data scientists looking to understand the
    needs and characteristics of process systems. With the focus on practical guidelines
    and real industrial case studies, we hope that these books lead to wider spread
    of data science in the process industry.'

- md: '## 6.3 ARX Models: An Introduction


    ARX (autoregressive with eXogenous input) model is extension of AR time series
    model to I/O systems. Here, as shown in Figure 6.3, the current output state is
    written as a linear combination of past inputs as well as past output measurements$^{50}$.
    The FIR model may be seen as a special case of ARX model with $n_a = 0$. However,
    the inclusion of past measurements in the ARX model allows for more compact description
    of the process and helps to overcome the high parameter-dimensionality issue faced
    by FIR model. The price for parsimonious representation is paid for by having
    to specify more hyperparameters ($d, n_a, n_b$).


    ![](img/6cffacf6247d6f7caa7eacc348cef427_125_0.png)


    A salient (and often overlooked) feature of ARX model is the implicit assumption
    that the noise enters the system at such a point that it is subjected to the same
    process dynamics ($\frac{1}{A(q^{-1})}$) as the deterministic signal $u(k)$. The
    block diagram in Figure 6.3 emphasizes this aspect. In real world, an example
    scenario could be perturbations affecting the process feed which then passes through
    the entire process dynamics. Not many systems that you will encounter will show
    such noise characteristics. Moreover, the dependent parametrization of $G$ and
    $H$ operators imply that an ARX model is biased for incorrect noise model specification
    even if you choose your model orders for the deterministic part correctly. Despite
    the shortcomings, the convenience of estimating ARX models often makes them the
    first choice for an initial solution in any SysID exercise.


    $^{50}$ We have not included the term $u(k)$ in the difference equation forms
    of FIR and ARX models. This is because we are working with discrete-time models
    and any changes in $u(k)$ most often does not have instantaneous impact on $y(k)$.


    ## Model estimation


    Least squares method can again be employed here. For illustration, let''s consider
    a 2nd order ARX<sup>51</sup> model with delay = 1: $y(k) = -a_1y(k-1) - a_2y(k-2)
    + b_1u(k-2) + b_2u(k-3) + e(k)$. Let $\varphi_k = [-y(k-1), -y(k-2), u(k-2), u(k-3)]^T$
    be the regressor vector and $\theta_0 = [a_1, a_2, b_1, b_2]^T$ be the parameter
    vector. Therefore, $y(k) = \varphi_k^T\theta_0 + e(k)$ and the matrix form would
    look as follows


    $$\begin{bmatrix} y(3) \\ y(4) \\ \vdots \\ y(N-1) \end{bmatrix} = \begin{bmatrix}
    -y(2) & -y(1) & u(1) & u(0) \\ -y(3) & -y(2) & u(2) & u(1) \\ \vdots & \ddots
    & \dots & \vdots \\ -y(N-2) & \dots & \dots & u(N-4) \end{bmatrix} \begin{bmatrix}
    a_1 \\ a_2 \\ \vdots \\ b_2 \end{bmatrix} + \begin{bmatrix} e(3) \\ e(4) \\ \vdots
    \\ e(N-1) \end{bmatrix}$$


    $$Y = \Phi\theta + E$$


    The analytical solution, $\hat{\theta} = [\Phi^T\Phi]^{-1}\Phi^TY$, exists if
    the matrix $\Phi^T\Phi$ is invertible which is guaranteed if the input signal
    $u(k)$ is persistent exciting of sufficient order.


    > Model bias in ARX and FIR models


    We have noted that the ARX model''s assumption on noise signal is pretty restrictive.
    If the actual process has a stochastic part different from $\frac{e(k)}{A(q^{-1})}$,
    then $\hat{\theta}$ estimated via least squares will be biased<sup>52</sup> even
    if $G(q^{-1})$''s structure is correct because $G(q^{-1})$ and $H(q^{-1})$ are
    not independently parameterized.


    We can look at this aspect from another perspective: one of the requirements in
    least squares method for bias-free estimates is that the equation error is uncorrelated
    with the regressor vector. Now let''s consider an example scenario where the actual
    process is given by $y(k) = -a_{10}y(k-1) + b_{10}u(k-1) + e(k) + c_{10}e(k-1)$
    and the fitted model is 1st order ARX model $y(k) = -a_1y(k-1) + b_1u(k-1)$. Since
    the equation error $\epsilon(k)$ equals $e(k) + c_{10}e(k-1)$, it becomes correlated
    to the regressor vector as $y(k-1)$ is correlated to $e(k-1)$. Correspondingly,
    parameter estimates are biased<sup>53</sup>. The amount of bias in parameter estimates
    depend on the level of noise. For high SNR, the bias can be negligible.


    In FIR model, $H(q^{-1})$ is not modeled and therefore, FIR model''s least-squares
    estimates are unbiased. Note that these discussions assume that the disturbance
    signal is not correlated to input which is true for open-loop processes.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_126_0.png)


    <sup>51</sup> An ARX model requires specification of two orders: order of the
    numerator ($B(q^{-1})$) and denominator ($A(q^{-1})$) polynomials. Specification
    of only a single order value usually implies $n_a = n_b$.

    <sup>52</sup> A simple way to understand bias is that if multiple estimates of
    a parameter is obtained from different sets of I/O data, then the difference between
    the average of the estimates and the true parameter value is the bias.


    ## Example 6.2:


    In this example we will study the impact of SNR on ARX model bias. We will assume
    the following true process


    $$y(k) = \frac{0.7q^{-1}}{1 - 0.7q^{-1}}u(k) + \frac{1}{1 - 0.2q^{-1}}e(k)$$


    We will use SNRs of 10 and 100. The data files ARX_illustrate_SNR10.csv and ARX_illustrate_SNR100.csv
    contain I/O data with 1000 samples each. We will fit 1<sup>st</sup> order ARX
    models using least squares and compare the model''s step responses and estimated
    parameters with those from the true process.


    ```python

    # import packages

    import matplotlib.pyplot as plt, numpy as np

    from sklearn.preprocessing import StandardScaler

    from sippy import system_identification as SysID

    import control


    # read data

    data = np.loadtxt(''ARX_illustrate_SNR10.csv'', delimiter='','')

    u = data[:,0, None]; y = data[:,1, None]


    # center data before model fitting

    u_scaler = StandardScaler(with_std=False); u_centered = u_scaler.fit_transform(u)

    y_scaler = StandardScaler(with_std=False); y_centered = y_scaler.fit_transform(y)


    # fit ARX model

    ARXmodel = SysID(y_centered, u_centered, ''ARX'', ARX_orders=[1,1,0])

    print(ARXmodel.G) # shows the transfer operator G (in terms of q); Note that symbol
    z is used instead of q in the package

    ```


    $$G(q^{-1}) = \frac{0.92q^{-1}}{1 - 0.56q^{-1}}$$


    <sup>53</sup> Alternatives to least squares method such as instrumental variable
    (IV) method exist which can provide bias-free estimates for ARX model. However,
    expectedly, these alternative methods are computationally more involved.


    We can see that with significant level of disturbance, the parameter estimates
    are not very accurate. Let''s see how the model''s step response compares against
    that of the true process.


    ```python

    # generate step response of ARX model

    step_response_model, _ = control.matlab.step(ARXmodel.G, T=30)


    # generate step response of original process

    NUM_G, DEN_G = [0.7], [1, -0.7]

    sys_G = control.matlab.tf(NUM_G, DEN_G, 1)

    step_response_process, _ = control.matlab.step(sys_G, T=30)


    # overlay the step responses

    plt.plot(step_response_model, ''m--'', linewidth=0.8, label="ARX model")

    plt.plot(step_response_process, ''c'', linewidth=0.8, label="Actual process")

    plt.ylabel(''Step responses''), plt.xlabel(''k''), plt.legend()

    ```


    Plots below shows the step response curves and the estimated parameters. As expected,
    for SNR=10, the estimated step response curve is farther away from the true curve
    compared to those from SNR=100 dataset. However, high noise level is not solely
    responsible for this inaccuracy. Incorrect noise model contributes significantly
    as well. To illustrate this fact, the plots show curves from an OE model (it is
    covered in the next chapter, but it suffices to know that an OE model uses similar
    structure for operator G as an ARX model but ignores H) as well. Theoretically,
    OE model provides unbiased estimated and therefore its curves are much closer
    to the true curves.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_0.png)


    To further clarify the bias aspect, 500 different sets of I/O data was generated
    for SNR=10 and least squares estimation method was used. The histograms below
    show the distribution of the parameters. The systematic bias is evident in the
    plots.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_1.png)'
  mdcn: '## 6.3 ARX 模型简介


    ARX（带外生输入的自回归）模型是 AR 时间序列模型在输入/输出系统中的扩展。如图 6.3 所示，当前输出状态被表示为过去输入和过去输出测量值的线性组合$^{50}$。FIR
    模型可以看作是 ARX 模型在 $n_a = 0$ 时的特例。然而，ARX 模型中包含过去测量值，使得对过程的描述更为紧凑，并有助于克服 FIR 模型面临的高参数维度问题。这种简约表示的代价是需要指定更多的超参数（$d,
    n_a, n_b$）。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_125_0.png)


    ARX 模型的一个显著（且常被忽视）特征是其隐含假设：噪声进入系统的位置使其受到与确定性信号 $u(k)$ 相同的过程动力学（$\frac{1}{A(q^{-1})}$）的影响。图
    6.3 中的框图强调了这一方面。在现实世界中，一个例子场景可能是扰动影响过程进料，然后通过整个过程动力学。你遇到的许多系统都不会表现出这样的噪声特性。此外，$G$
    和 $H$ 算子的依赖参数化意味着，即使你为确定性部分正确选择了模型阶数，ARX 模型在噪声模型指定不正确时也是有偏的。尽管存在这些缺点，ARX 模型估计的便利性通常使其成为任何系统辨识练习中初始解决方案的首选。


    $^{50}$ 我们在 FIR 和 ARX 模型的差分方程形式中没有包含 $u(k)$ 项。这是因为我们处理的是离散时间模型，$u(k)$ 的任何变化通常不会对
    $y(k)$ 产生瞬时影响。


    ## 模型估计


    最小二乘法可以再次应用于此。为了说明，让我们考虑一个延迟 = 1 的二阶 ARX<sup>51</sup> 模型：$y(k) = -a_1y(k-1) -
    a_2y(k-2) + b_1u(k-2) + b_2u(k-3) + e(k)$。令 $\varphi_k = [-y(k-1), -y(k-2), u(k-2),
    u(k-3)]^T$ 为回归向量，$\theta_0 = [a_1, a_2, b_1, b_2]^T$ 为参数向量。因此，$y(k) = \varphi_k^T\theta_0
    + e(k)$，矩阵形式如下


    $$\begin{bmatrix} y(3) \\ y(4) \\ \vdots \\ y(N-1) \end{bmatrix} = \begin{bmatrix}
    -y(2) & -y(1) & u(1) & u(0) \\ -y(3) & -y(2) & u(2) & u(1) \\ \vdots & \ddots
    & \dots & \vdots \\ -y(N-2) & \dots & \dots & u(N-4) \end{bmatrix} \begin{bmatrix}
    a_1 \\ a_2 \\ \vdots \\ b_2 \end{bmatrix} + \begin{bmatrix} e(3) \\ e(4) \\ \vdots
    \\ e(N-1) \end{bmatrix}$$


    $$Y = \Phi\theta + E$$


    解析解 $\hat{\theta} = [\Phi^T\Phi]^{-1}\Phi^TY$ 存在的条件是矩阵 $\Phi^T\Phi$ 可逆，如果输入信号
    $u(k)$ 是足够阶次的持续激励，则此条件得到保证。


    > ARX 和 FIR 模型中的模型偏差


    我们已经注意到，ARX 模型对噪声信号的假设相当严格。如果实际过程具有与 $\frac{e(k)}{A(q^{-1})}$ 不同的随机部分，那么即使 $G(q^{-1})$
    的结构正确，通过最小二乘法估计的 $\hat{\theta}$ 也将是有偏的<sup>52</sup>，因为 $G(q^{-1})$ 和 $H(q^{-1})$
    不是独立参数化的。


    我们可以从另一个角度来看待这个问题：最小二乘法获得无偏估计的要求之一是方程误差与回归向量不相关。现在让我们考虑一个实际过程由 $y(k) = -a_{10}y(k-1)
    + b_{10}u(k-1) + e(k) + c_{10}e(k-1)$ 给出，而拟合模型是一阶 ARX 模型 $y(k) = -a_1y(k-1) +
    b_1u(k-1)$ 的示例场景。由于方程误差 $\epsilon(k)$ 等于 $e(k) + c_{10}e(k-1)$，它变得与回归向量相关，因为 $y(k-1)$
    与 $e(k-1)$ 相关。相应地，参数估计是有偏的<sup>53</sup>。参数估计中的偏差量取决于噪声水平。对于高信噪比，偏差可以忽略不计。


    在 FIR 模型中，$H(q^{-1})$ 没有被建模，因此 FIR 模型的最小二乘估计是无偏的。请注意，这些讨论假设扰动信号与输入不相关，这对于开环过程是成立的。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_126_0.png)


    <sup>51</sup> ARX 模型需要指定两个阶数：分子（$B(q^{-1})$）和分母（$A(q^{-1})$）多项式的阶数。仅指定单个阶数值通常意味着
    $n_a = n_b$。

    <sup>52</sup> 理解偏差的一种简单方法是，如果从不同的输入/输出数据集获得参数的多个估计值，那么这些估计值的平均值与真实参数值之间的差异就是偏差。


    ## 示例 6.2：


    在这个例子中，我们将研究信噪比对 ARX 模型偏差的影响。我们将假设以下真实过程


    $$y(k) = \frac{0.7q^{-1}}{1 - 0.7q^{-1}}u(k) + \frac{1}{1 - 0.2q^{-1}}e(k)$$


    我们将使用信噪比为 10 和 100。数据文件 ARX_illustrate_SNR10.csv 和 ARX_illustrate_SNR100.csv 包含各
    1000 个样本的输入/输出数据。我们将使用最小二乘法拟合一阶 ARX 模型，并将模型的阶跃响应和估计参数与真实过程的进行比较。


    ```python

    # import packages

    import matplotlib.pyplot as plt, numpy as np

    from sklearn.preprocessing import StandardScaler

    from sippy import system_identification as SysID

    import control


    # read data

    data = np.loadtxt(''ARX_illustrate_SNR10.csv'', delimiter='','')

    u = data[:,0, None]; y = data[:,1, None]


    # center data before model fitting

    u_scaler = StandardScaler(with_std=False); u_centered = u_scaler.fit_transform(u)

    y_scaler = StandardScaler(with_std=False); y_centered = y_scaler.fit_transform(y)


    # fit ARX model

    ARXmodel = SysID(y_centered, u_centered, ''ARX'', ARX_orders=[1,1,0])

    print(ARXmodel.G) # shows the transfer operator G (in terms of q); Note that symbol
    z is used instead of q in the package

    ```


    $$G(q^{-1}) = \frac{0.92q^{-1}}{1 - 0.56q^{-1}}$$


    <sup>53</sup> 存在最小二乘法的替代方法，例如工具变量（IV）法，它可以为 ARX 模型提供无偏估计。然而，可以预期，这些替代方法在计算上更为复杂。


    我们可以看到，在显著的扰动水平下，参数估计不是很准确。让我们看看模型的阶跃响应与真实过程的相比如何。


    ```python

    # generate step response of ARX model

    step_response_model, _ = control.matlab.step(ARXmodel.G, T=30)


    # generate step response of original process

    NUM_G, DEN_G = [0.7], [1, -0.7]

    sys_G = control.matlab.tf(NUM_G, DEN_G, 1)

    step_response_process, _ = control.matlab.step(sys_G, T=30)


    # overlay the step responses

    plt.plot(step_response_model, ''m--'', linewidth=0.8, label="ARX model")

    plt.plot(step_response_process, ''c'', linewidth=0.8, label="Actual process")

    plt.ylabel(''Step responses''), plt.xlabel(''k''), plt.legend()

    ```


    下面的图表显示了阶跃响应曲线和估计参数。正如预期的那样，对于 SNR=10，估计的阶跃响应曲线比 SNR=100 数据集的曲线更远离真实曲线。然而，高噪声水平并非造成这种不准确性的唯一原因。不正确的噪声模型也贡献显著。为了说明这一点，图表还显示了来自
    OE 模型的曲线（它将在下一章中介绍，但只需知道 OE 模型使用与 ARX 模型类似的算子 G 结构，但忽略了 H）。理论上，OE 模型提供无偏估计，因此其曲线更接近真实曲线。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_0.png)


    为了进一步澄清偏差方面，为 SNR=10 生成了 500 组不同的输入/输出数据，并使用了最小二乘估计方法。下面的直方图显示了参数的分布。系统偏差在图中显而易见。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_1.png)'

- img_proc: true
  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_205_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_205_1.png)


    Ideally, we should check the predictions on a dataset completely separate from
    fitting and validation datasets; but we are checking it on validation dataset
    in the current case-study just to be consistent with the assessment dataset used
    for FFNN-NARX and polynomial-NARX (from Chapter 9).


    This concludes our quick peep into the world of artificial neural networks. We
    are guilty of condensing a lot of concepts into a single chapter. However, you
    should hopefully now be comfortable developing ANN-based solutions for your nonlinear
    SysID needs. Do keep in mind that we only barely scratched the surface of the
    vast field of ANNs. Nonetheless, you should be able to navigate the ANN literature
    comfortably now and build upon the knowledge you have gained in this chapter.


    # Summary


    In this chapter we studied the application of ANNs for dynamic systems. We first
    looked at how to build FFNN-based NARX models and saw its application for heat-exchanger
    modeling. Then, we learnt the remarkable capabilities of LSTM networks in handling
    temporal data. After working out these examples, you would have gained a very
    good understanding on how to setup the ANN-based solution for your specific problems.
    With this we will sign-off now and wish you all the best in your ML journey.'
  merge: -1

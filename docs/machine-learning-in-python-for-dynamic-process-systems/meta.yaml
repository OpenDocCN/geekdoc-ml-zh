    \ as fsetSIM\nXid_train, Vid_train_centered = fsetSIM.SS_lsim_process_form(model.A,\
    \ model.B, model.C, model.D,\n                                               \
    \             np.transpose(U_train_centered), model.x0) # Xid -> states\nVid_train_centered\
    \ = np.transpose(Vid_train_centered)\n\nXid_test, Vid_test_centered = fsetSIM.SS_lsim_process_form(model.A,\
    \ model.B, model.C, model.D,\n                                               \
    \             np.transpose(U_test_centered), Xid_train[:,-1, None]) # passing\
    \ the\n                                                            state at the\
    \ end of training as the starting state for test data\nVid_test_centered = np.transpose(Vid_test_centered)\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_164_0.png)\n\nThe comparison of\
    \ simulation responses and measurements suggests that although the model tends\
    \ to underpredict for some instances, overall, the model does well to capture\
    \ the broad variations in the outputs."
- md: "## 8.4 Monitoring Industrial Chemical Plants using CVA\n\nIn this section we\
    \ will see another application of CVA. We will learn the details of CVA-based\
    \ monitoring tool development through step-by-step application for a large-scale\
    \ industrial chemical plant. The process under study is called Tennessee Eastman\
    \ process (TEP) and Figure 8.5 shows the process flowsheet. This process consists\
    \ of several unit operations: a reactor, a condenser, a separator, a stripper,\
    \ and a recycle compressor. There are 22 continuous process measurements, 19 composition\
    \ measurements, and 11 manipulated variables. A dataset for this process has been\
    \ made available at https://github.com/camaramm/tennessee-eastman-profBraatz.71\
    \ The dataset contains training and test data from normal operation period and\
    \ 21 faulty periods with distinct fault causes. For each fault class, training\
    \ dataset contains 480 samples collected over 24 operation hours and test dataset\
    \ contains 960 samples collected over 48 operation hours. For the faulty data,\
    \ faulty operation starts from sample 160 onwards.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_165_0.png)\n\
    \n71 Detailed information about the process and the faults can be obtained from\
    \ the original paper by Downs and Vogel titled ‘A plant-wide industrial process\
    \ control problem’\n\n72 Adapted from the original flowsheet by Gilberto Xavier\
    \ (https://github.com/gmxavier/TEP-meets-LSTM) provided under Creative-Commons\
    \ Attribution 4.0 International License (https://creativecommons.org/licenses/by/4.0/).\n\
    \nAs alluded to before, the CVA modeling and monitoring procedures provided in\
    \ this book mirror the description in the work<sup>68</sup> of Russell et al.,\
    \ and we will therefore attempt to replicate the CVA-based fault detection results\
    \ from their paper titled ‘*Fault detection in industrial processes using canonical\
    \ variate analysis and dynamic principal component analysis*’. Specifically, we\
    \ will use the *Fault 5* dataset (file *d05_te.dat*) as our test data and normal\
    \ operation dataset (file *d00.dat*) as our training data. We will use the manipulated\
    \ variables as our inputs and the process measurements as our outputs. Our objective\
    \ is to build a monitoring tool that can accurately flag the presence of a process\
    \ fault with low frequency of false alerts. Let’s begin with a quick exploration\
    \ of the dataset.\n\n```\n# import packages\nimport matplotlib.pyplot as plt,\
    \ numpy as np\nfrom sklearn.preprocessing import StandardScaler\n\n# read data\
    \ and separate input-output variables\ntrainingData = np.loadtxt('d00.dat').T\n\
    FaultyData = np.loadtxt('d05_te.dat')\nuData_training, yData_training = trainingData[:,41:52],\
    \ trainingData[:,0:22]\nuData_test, yData_test = FaultyData[:,41:52], FaultyData[:,0:22]\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_166_0.png)\n\nIt is obvious that\
    \ continuously monitoring all the 22 output (and 11 input) variables is not practical.\
    \ The single combined output plots above do seem to clearly indicate a process\
    \ upset around sample number 200 in faulty dataset; however, they also seem to\
    \ give a wrong impression of normal process conditions sample number 500 onwards.\
    \ It is known that Fault 5 continues until the end of the dataset. Fortunately,\
    \ CVA makes the monitoring task easy by summarizing the state of any complex multivariate\
    \ process into three simple indicators or monitoring indices as shown in Figure\
    \ 8.6. During model training, statistical thresholds are determined for the indices\
    \ and for a new data-point, the new indices’ values are compared against the thresholds.\
    \ If any of the three thresholds are violated, then presence of abnormal process\
    \ conditions is confirmed. Let’s look into how these monitoring indices are computed.\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_167_0.png)\n\n### Process monitoring/fault\
    \ detection indices\n\nIn CVA-based method, 3 indices - $T_s^2$, $T_e^2$, $Q$\
    \ - are computed. The computation of these metrics and their corresponding threshold\
    \ are shown below. Note that the threshold expressions are based on the assumption\
    \ that process variables are gaussian distributed; if this assumption is invalid\
    \ then empirical techniques such as KDE or percentile may be employed.\n\n| Metric\
    \ 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |\n| :--- | :--- | :--- |\n|\
    \ $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T\
    \ J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |\n| Threshold\
    \ @ significance level $\\alpha$ | Threshold @ significance level $\\alpha$ |\
    \ Threshold @ significance level $\\alpha$ |\n| $T_{s,CL}^2 = \\frac{n(N^2-1)}{N(N-n)}\
    \ F_{\\alpha}(n, N-n)$ | $T_{e,CL}^2 = \\frac{z(N^2-1)}{N(N-z)} F_{\\alpha}(z,\
    \ N-z)$ | $Q_{CL} = \\frac{\\sigma}{2\\mu} g \\chi_{\\alpha}^2 \\left( \\frac{2\\\
    mu^2}{\\sigma} \\right)$ |\n\n- $J_e$ contains all except the first $n$ rows of\
    \ $J$ i.e., the last $l(m+r) - n$ rows of $J$\n- $z = l(m+r) - n$\n- $F_{\\alpha}(n,\
    \ N-n)$ is the 1-$\\alpha$ percentile of the $F$ distribution with $n$ and $N-n$\
    \ degrees of freedom\n- $\\chi_{\\alpha}^2$ is the (1-$\\alpha$) percentile of\
    \ a chi-squared distribution with $h$ degrees of freedom; $\\mu$ denotes the mean\
    \ value and $\\sigma$ denotes the variance of the Q metric\n- Significance level\
    \ of $\\alpha = 0.05$ would mean that there is a 5% chance that an alert is false\n\
    \nLet's compute the monitoring indices for the training dataset. To ensure a better\
    \ understanding of the methodology, we will skip the usage of SIPPY package for\
    \ CVA modeling and carry out each step from scratch.\n\n```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## generate past (p) and future (f) vectors for training dataset and center them\n\
    %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\nN = trainingData.shape[0]\n\
    l = 3 # as used by Russell et. al\nm = uData_training.shape[1]\nr = yData_training.shape[1]\n\
    \npMatrix_train = np.zeros((N-2*l, l*(m+r)))\nfMatrix_train = np.zeros((N-2*l,\
    \ (l+1)*r))\nfor i in range(l, N-l):\n    pMatrix_train[i-l,:] = np.hstack((yData_training[i-l:i,:].flatten(),\
    \ uData_training[i-l:i,:].flatten()))\n    fMatrix_train[i-l,:] = yData_training[i:i+l+1,:].flatten()\n\
    \n# center data\np_scaler = StandardScaler(with_std=False); pMatrix_train_centered\
    \ = p_scaler.fit_transform(pMatrix_train)\nf_scaler = StandardScaler(with_std=False);\
    \ fMatrix_train_centered = f_scaler.fit_transform(fMatrix_train)\n\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## computes covariances and perform SVD\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    import scipy\n\nsigma_pp = np.cov(pMatrix_train_centered, rowvar=False)\nsigma_ff\
    \ = np.cov(fMatrix_train_centered, rowvar=False)\nsigma_pf = np.cov(pMatrix_train_centered,\
    \ fMatrix_train_centered,\n                   rowvar=False)[:len(sigma_pp),len(sigma_pp):]\n\
    \nmatrixProduct = np.dot(np.dot(np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real),\
    \ sigma_pf),\n                       np.linalg.inv(scipy.linalg.sqrtm(sigma_ff).real))\n\
    \nU, S, V = np.linalg.svd(matrixProduct)\nJ = np.dot(np.transpose(U), np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real))\n\
    \n# get the reduced order matrices\nn = 29 # as used by Russell et. al\nJn = J[:n,:]\n\
    Je = J[n:,:]\n```\n\n```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ##          get fault detection metrics for training data\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    Xn_train = np.dot(Jn, pMatrix_train_centered.T)\nTs2_train = [np.dot(Xn_train[:,i],\
    \ Xn_train[:,i]) for i in range(pMatrix_train_centered.shape[0])]\n\nXe_train\
    \ = np.dot(Je, pMatrix_train_centered.T)\nTe2_train = [np.dot(Xe_train[:,i], Xe_train[:,i])\
    \ for i in range(pMatrix_train_centered.shape[0])]\n\nr_train = pMatrix_train_centered.T\
    \ - np.dot(Jn.T, Xn_train)\nQ_train = [np.dot(r_train[:,i], r_train[:,i]) for\
    \ i in range(pMatrix_train_centered.shape[0])]\n\n# determine thresholds as 99th\
    \ percentile of respective metrics\nTs2_CL = np.percentile(Ts2_train, 99)\nTe2_CL\
    \ = np.percentile(Te2_train, 99)\nQ_CL = np.percentile(Q_train, 99)\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_169_0.png)\n\
    \nThe $T_s^2$ metric measures the systematic variations ‘inside’ the state space\
    \ defined by the state variables. Correspondingly, $T_r^2$ quantifies the variations\
    \ ‘outside’ the state space. When only $T_s^2$ violates the threshold, it indicates\
    \ that the state variables are ‘out-of-control’ but the process can still be well\
    \ explained by the estimated state-space model. When $T_s^2$ or $Q$ violates the\
    \ threshold, it indicates that the characteristics of noise affecting the system\
    \ has changed or the estimated model cannot explain the new faulty observations.\n\
    \n> ### CVA vs PCA (or PLS) for process monitoring\n\nYou may notice the similarity\
    \ between CVA-based and PCA-based monitoring methodologies in terms of metric\
    \ definitions. While dynamic PCA (and dynamic PLS) are sometimes used to monitor\
    \ dynamic processes, several studies have shown the superiority of CVA over DPCA\
    \ (and DPLS) for dynamic process monitoring."
  mdcn: "## 8.4 使用CVA监控工业化工厂\n\n本节我们将探讨CVA的另一个应用。我们将通过一个大型工业化工厂的逐步应用，学习基于CVA的监控工具开发的详细过程。所研究的过程称为田纳西-伊士曼过程（TEP），其工艺流程图如图8.5所示。该过程包含多个单元操作：反应器、冷凝器、分离器、汽提塔和循环压缩机。它有22个连续过程测量变量、19个组分测量变量和11个操纵变量。该过程的数据集已发布在\
    \ https://github.com/camaramm/tennessee-eastman-profBraatz.71 数据集包含来自正常运行期和21个具有不同故障原因的故障期的训练和测试数据。对于每个故障类别，训练数据集包含在24个操作小时内收集的480个样本，测试数据集包含在48个操作小时内收集的960个样本。对于故障数据，故障操作从第160个样本开始。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_165_0.png)\n\n71 关于该过程和故障的详细信息可从Downs和Vogel题为‘A\
    \ plant-wide industrial process control problem’的原始论文中获得。\n\n72 改编自Gilberto Xavier\
    \ (https://github.com/gmxavier/TEP-meets-LSTM) 在知识共享署名4.0国际许可协议 (https://creativecommons.org/licenses/by/4.0/)\
    \ 下提供的原始流程图。\n\n如前所述，本书提供的CVA建模和监控流程反映了Russell等人<sup>68</sup>工作中的描述，因此我们将尝试复现他们题为‘*Fault\
    \ detection in industrial processes using canonical variate analysis and dynamic\
    \ principal component analysis*’的论文中基于CVA的故障检测结果。具体来说，我们将使用*故障5*数据集（文件*d05_te.dat*）作为测试数据，正常运行数据集（文件*d00.dat*）作为训练数据。我们将使用操纵变量作为输入，过程测量变量作为输出。我们的目标是构建一个监控工具，能够准确地标记过程故障的存在，同时保持较低的误报频率。让我们首先快速探索一下数据集。\n\
    \n```\n# import packages\nimport matplotlib.pyplot as plt, numpy as np\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\n# read data and separate input-output variables\ntrainingData\
    \ = np.loadtxt('d00.dat').T\nFaultyData = np.loadtxt('d05_te.dat')\nuData_training,\
    \ yData_training = trainingData[:,41:52], trainingData[:,0:22]\nuData_test, yData_test\
    \ = FaultyData[:,41:52], FaultyData[:,0:22]\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_166_0.png)\n\
    \n显然，持续监控所有22个输出（和11个输入）变量是不切实际的。上面的单个组合输出图似乎确实清楚地表明故障数据集中在样本编号200左右发生了过程扰动；然而，它们似乎也给人一种从样本编号500开始过程条件正常的错误印象。已知故障5一直持续到数据集结束。幸运的是，CVA通过将任何复杂多变量过程的状态总结为三个简单的指示器或监控指数（如图8.6所示），使监控任务变得容易。在模型训练期间，为这些指数确定统计阈值，对于新的数据点，将新的指数值与阈值进行比较。如果三个阈值中的任何一个被违反，则确认存在异常过程条件。让我们深入了解这些监控指数是如何计算的。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_167_0.png)\n\n### 过程监控/故障检测指数\n\n在基于CVA的方法中，计算3个指数\
    \ - $T_s^2$, $T_e^2$, $Q$。这些指标及其相应阈值的计算如下所示。注意，阈值表达式基于过程变量服从高斯分布的假设；如果此假设无效，则可以采用经验技术，如核密度估计（KDE）或百分位数法。\n\
    \n| 指标 1: $T_s^2$ | 指标 2: $T_e^2$ | 指标 3: $Q$ |\n| :--- | :--- | :--- |\n| $T_s^2(k)\
    \ = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T J_e p(k)$\
    \ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |\n| 显著性水平 $\\alpha$\
    \ 下的阈值 | 显著性水平 $\\alpha$ 下的阈值 | 显著性水平 $\\alpha$ 下的阈值 |\n| $T_{s,CL}^2 = \\frac{n(N^2-1)}{N(N-n)}\
    \ F_{\\alpha}(n, N-n)$ | $T_{e,CL}^2 = \\frac{z(N^2-1)}{N(N-z)} F_{\\alpha}(z,\
    \ N-z)$ | $Q_{CL} = \\frac{\\sigma}{2\\mu} g \\chi_{\\alpha}^2 \\left( \\frac{2\\\
    mu^2}{\\sigma} \\right)$ |\n\n- $J_e$ 包含 $J$ 中除前 $n$ 行外的所有行，即 $J$ 的最后 $l(m+r)\
    \ - n$ 行\n- $z = l(m+r) - n$\n- $F_{\\alpha}(n, N-n)$ 是自由度为 $n$ 和 $N-n$ 的 $F$\
    \ 分布的 (1-$\\alpha$) 百分位数\n- $\\chi_{\\alpha}^2$ 是自由度为 $h$ 的卡方分布的 (1-$\\alpha$)\
    \ 百分位数；$\\mu$ 表示 $Q$ 指标的均值，$\\sigma$ 表示其方差\n- 显著性水平 $\\alpha = 0.05$ 意味着警报有5%的概率是误报\n\
    \n让我们为训练数据集计算监控指数。为了确保更好地理解该方法，我们将跳过使用SIPPY包进行CVA建模，而是从头开始执行每个步骤。\n\n```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## generate past (p) and future (f) vectors for training dataset and center them\n\
    %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\nN = trainingData.shape[0]\n\
    l = 3 # as used by Russell et. al\nm = uData_training.shape[1]\nr = yData_training.shape[1]\n\
    \npMatrix_train = np.zeros((N-2*l, l*(m+r)))\nfMatrix_train = np.zeros((N-2*l,\
    \ (l+1)*r))\nfor i in range(l, N-l):\n    pMatrix_train[i-l,:] = np.hstack((yData_training[i-l:i,:].flatten(),\
    \ uData_training[i-l:i,:].flatten()))\n    fMatrix_train[i-l,:] = yData_training[i:i+l+1,:].flatten()\n\
    \n# center data\np_scaler = StandardScaler(with_std=False); pMatrix_train_centered\
    \ = p_scaler.fit_transform(pMatrix_train)\nf_scaler = StandardScaler(with_std=False);\
    \ fMatrix_train_centered = f_scaler.fit_transform(fMatrix_train)\n\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## computes covariances and perform SVD\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    import scipy\n\nsigma_pp = np.cov(pMatrix_train_centered, rowvar=False)\nsigma_ff\
    \ = np.cov(fMatrix_train_centered, rowvar=False)\nsigma_pf = np.cov(pMatrix_train_centered,\
    \ fMatrix_train_centered,\n                   rowvar=False)[:len(sigma_pp),len(sigma_pp):]\n\
    \nmatrixProduct = np.dot(np.dot(np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real),\
    \ sigma_pf),\n                       np.linalg.inv(scipy.linalg.sqrtm(sigma_ff).real))\n\
    \nU, S, V = np.linalg.svd(matrixProduct)\nJ = np.dot(np.transpose(U), np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real))\n\
    \n# get the reduced order matrices\nn = 29 # as used by Russell et. al\nJn = J[:n,:]\n\
    Je = J[n:,:]\n```\n\n```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ##          get fault detection metrics for training data\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    Xn_train = np.dot(Jn, pMatrix_train_centered.T)\nTs2_train = [np.dot(Xn_train[:,i],\
    \ Xn_train[:,i]) for i in range(pMatrix_train_centered.shape[0])]\n\nXe_train\
    \ = np.dot(Je, pMatrix_train_centered.T)\nTe2_train = [np.dot(Xe_train[:,i], Xe_train[:,i])\
    \ for i in range(pMatrix_train_centered.shape[0])]\n\nr_train = pMatrix_train_centered.T\
    \ - np.dot(Jn.T, Xn_train)\nQ_train = [np.dot(r_train[:,i], r_train[:,i]) for\
    \ i in range(pMatrix_train_centered.shape[0])]\n\n# determine thresholds as 99th\
    \ percentile of respective metrics\nTs2_CL = np.percentile(Ts2_train, 99)\nTe2_CL\
    \ = np.percentile(Te2_train, 99)\nQ_CL = np.percentile(Q_train, 99)\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_169_0.png)\n\
    \n$T_s^2$ 指标衡量状态变量定义的状态空间‘内部’的系统性变化。相应地，$T_r^2$ 量化状态空间‘外部’的变化。当只有 $T_s^2$ 超过阈值时，表明状态变量‘失控’，但过程仍能被估计的状态空间模型很好地解释。当\
    \ $T_s^2$ 或 $Q$ 超过阈值时，表明影响系统的噪声特性发生了变化，或者估计的模型无法解释新的故障观测值。\n\n> ### CVA与PCA（或PLS）在过程监控中的比较\n\
    \n您可能会注意到基于CVA和基于PCA的监控方法在指标定义上的相似性。虽然动态PCA（和动态PLS）有时用于监控动态过程，但多项研究表明CVA在动态过程监控方面优于DPCA（和DPLS）。"

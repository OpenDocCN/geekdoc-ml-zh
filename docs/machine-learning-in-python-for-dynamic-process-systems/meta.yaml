    \n## 5.1 时间序列分析：简介\n\n时间序列分析是指研究和建模时间序列信号中连续数据点之间的依赖性。存在多种建模时间序列的方法。在本章中，我们将研究如图5.1所示的四种最常见的模型。虽然AR、MA和ARMA模型用于描述平稳信号，但ARIMA用于（齐次）非平稳信号。在本章中，我们将理解这些模型之间的差异、相似性和内在联系。\n\

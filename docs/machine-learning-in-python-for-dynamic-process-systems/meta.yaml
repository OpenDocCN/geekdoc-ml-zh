    # Summary


    In this chapter we studied the application of ANNs for dynamic systems. We first
    looked at how to build FFNN-based NARX models and saw its application for heat-exchanger
    modeling. Then, we learnt the remarkable capabilities of LSTM networks in handling
    temporal data. After working out these examples, you would have gained a very
    good understanding on how to setup the ANN-based solution for your specific problems.
    With this we will sign-off now and wish you all the best in your ML journey.'

  md: "```\n# fit NARX model\nbasis_function = Polynomial(degree=2)\nmodel = FROLS(\n\
    \    order_selection=True,\n    n_info_values=75,\n    ylag=3, xlag=9,\n    info_criteria='aic',\n\
    \    estimator='least_squares',\n    basis_function=basis_function\n)\nmodel.fit(X=u_fit_centered,\
    \ y=y_fit_centered)\n```\n\nA total of 57 polynomial terms are selected by SysIdentPy\
    \ as part of the regressor set. The snippet below shows some of the terms ['x1'\
    \ to be read as 'u'].\n\n| Regressors | Parameters | ERR |\n|---|---|---|\n| 0\
    \ | y(k-1) | 6.0490E-01 | 9.45813556E-01 |\n| 1 | y(k-2) | -5.5109E-01 | 2.63576840E-03\
    \ |\n| 2 | x1(k-5)y(k-1) | 5.6995E-01 | 1.19429351E-03 |\n| 3 | x1(k-3) | -2.1264E+00\
    \ | 7.19976894E-04 |\n| 4 | x1(k-2) | -2.4622E+00 | 6.25218348E-04 |\n| 5 | x1(k-4)\
    \ | -1.9460E+00 | 6.39866753E-04 |\n| 6 | y(k-3) | 2.3011E-01 | 5.98553280E-04\
    \ |\n| 7 | x1(k-5)^2 | -2.2581E+00 | 4.96492047E-04 |\n| 8 | x1(k-6)y(k-2) | -4.3001E-01\
    \ | 2.22025182E-04 |\n| 9 | x1(k-2)^2 | -3.0755E+00 | 3.18688092E-04 |\n| 10 |\
    \ x1(k-1) | -1.3935E+00 | 3.00926941E-04 |\n| 11 | x1(k-5) | 1.5733E+00 | 4.40167349E-04\
    \ |\n\nWith the model now available, let's start with residual analysis.\n\n```\n\
    # get model (1-step ahead) predictions and residuals on training dataset\ny_fit_predicted_centered\
    \ = model.predict(X=u_fit_centered, y=y_fit_centered, steps_ahead=1)\ny_fit_predicted\
    \ = y_scaler.inverse_transform(y_fit_predicted_centered)\nresiduals_fit = y_fit\
    \ - y_fit_predicted\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_180_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_180_1.png)"

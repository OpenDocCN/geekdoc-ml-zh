    Simulation can sometimes throw surprising results as a result of model inaccuracy.
    For example, simulated outputs may show divergent trend while 1-step ahead predictions
    may be perfect! Furthermore, predicted outputs from two models may be very similar,
    but the simulated responses can be significantly different.


    # Parameter error checks


    Post model ID, the value of the parameetrs should be checked against their estimation
    error. Ideally, the errors should be insignificant relative to the estimated parameter
    values. In practice, a 95% confidence interval is generated for each parameter
    and if the confidence interval includes 0, then that parameter is removed from
    the model. A new model excluding the removed variables is re-identified.


    This completes our quick look at the model diagnostics. There are a few other
    checks that we did not cover such as pole-zero cancellation, stationarity checks
    using poles, invertibility checks using zeros, etc. Overall, this chapter has
    equipped you with several tools to help you along the SysID journey. We hope that
    you already feel comfortable that you have all the necessary weapons in your arsenal
    to handle each step of the SysID process. We will end this chapter with two advices.
    First, don''t forget that SysID is an iterative process and therefore don''t get
    disheartened if your model fails in first attempt. Second, remember the famous
    quote³⁷ we alluded to in Chapter 1, “*All models are wrong, but some are useful!*”


    # Summary


    In this chapter we learnt the best practices of setting up a system identification
    workflow. We familiarized ourselves with practice-relevant concepts around identification
    test design, data pre-treatment, model structure and order selection, and model
    quality checks. Next, we will begin learning about arguably the most important
    and interesting task of SysID, i.e., model identification.'

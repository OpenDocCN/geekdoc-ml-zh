  md: '# 7.2 ARMAX Models: An Introduction


    Autoregressive moving average with eXogenous inputs (ARMAX) model is extension
    of ARMA time series model to I/O systems. As shown in Figure 7.2, the current
    output value is related to the past measurements of inputs and outputs, and the
    past noise values as well! With ARMA disturbances, greater flexibility is provided
    to the noise model (compared to ARX) and therefore, ARMAX is a popular model for
    industrial processes. Note that if $n_c= 0$, then ARMAX model reduces to an ARX
    model, and if additionally, $n_a= 0$, then a FIR model results. Also note that
    the $G$ and $H$ operators are not independently parametrized due to the common
    denominator polynomial, and therefore, the potential for model bias (due to inaccurate
    noise model) remains.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_139_0.png)'
  merge: -1
  pgno: 139
- img_proc: true
  md: '# ARMAX predictor


    To derive an expression for the 1-step ahead prediction, we may simply replace
    the unpredictable part $e(k)$ in the difference equation form of ARMAX to zero
    and get the following


    $$\hat{y}(k) = -\sum_{i=1}^{n_a} a_i y(k-i) + \sum_{i=1}^{n_b} b_i u(k-d-i) +
    \sum_{i=1}^{n_c} c_i e(k-i) \quad \text{eq. 2}$$


    Alternatively, Eq. 1 can be used as well:


    $$\hat{y}(k) = \left[ 1 - \frac{A(q^{-1})}{C(q^{-1})} \right] y(k) + \frac{A(q^{-1})}{C(q^{-1})}
    \frac{q^{-d} B(q^{-1})}{A(q^{-1})} u(k)$$

    $$\Rightarrow C(q^{-1})\hat{y}(k) = [C(q^{-1}) - A(q^{-1})] y(k) + q^{-d} B(q^{-1})u(k)$$

    $$\Rightarrow \hat{y}(k) = \sum_{i=1}^{n_c} c_i y(k-i) - \sum_{i=1}^{n_a} a_i
    y(k-i) - \sum_{i=1}^{n_c} c_i \hat{y}(k-i) + \sum_{i=1}^{n_b} b_i u(k-d-i)$$


    Current prediction is a function of past predictions as well


    The above expression can also be derived from Eq. 2 by substituting $e(k) = y(k)
    - \hat{y}(k)$. Another noteworthy point is that the ARMAX predictor is nonlinear-in-unknowns
    during model fitting due to the product terms in $\sum_{i=1}^{n_c} c_i \hat{y}(k-i)$
    and therefore, nonlinear optimization is needed for parameter estimation.'

    ```\n\nNumPy允许不同维度的数组之间进行逐元素操作，这得益于“广播”，其中较小的数组被隐式扩展以与较大的数组兼容，如下图所示。可以想象，这是一个非常方便的特性，有关广播规则及不同示例场景的更多细节，建议查阅官方文档⁹。\n\

    # Unbiased high-order ARX modeling


    In SysID literature, you may encounter statements stating that high-order ARX
    models are unbiased. To understand this, let''s consider an example where the
    true process is given by


    $$y(k) = \frac{B(q^{-1})}{A(q^{-1})}u(k) + \frac{e(k)}{A(q^{-1})D(q^{-1})}$$


    Now instead of fitting an ARX model $y = \frac{B}{A}u + \frac{e}{A}$, we can fit
    the model $y = \frac{BD}{AD}u + \frac{e}{AD}$ [$q^{-1}$ and $k$ not explicitly
    specified for brevity]. Therefore, if the degree of $D(q^{-1})$ is $r$ then we
    are basically fitting an ARX model with orders $n_a+r$ and $n_b+r$ instead of
    an ARX model with orders $n_a$ and $n_b$. The higher order ARX model will be unbiased
    because both $G$ and $H$ operators are correctly specified! Furthermore, your
    model residuals will be white now. One can recover the true transfer operator
    $\frac{B}{A}$ from the estimated transfer operator $\frac{BD}{AD}$.


    It has been shown that a sufficiently high-order ARX model can approximate any
    linear system arbitrarily well. Model order reduction techniques exist to subsequently
    reduce the order of the estimated ARX model to make it more tractable.


    # Hyperparameter selection


    Complete specification of an ARX model structure requires values of the input-output
    delay ($d$) and the orders ($n_a$ and $n_b$ which are the number of poles and
    zeros of the input transfer operator $G$). The most common way of estimating these
    values is to select a range of potential values for $d$, $n_a$, and $n_b$, and
    use information criteria such as AIC or cross-validation to find the most optimal
    combination. SIPPY implements the AIC-based methodology. As a thumb-rule, for
    industrial plants, $n_a$ is usually three or less.


    Approaches alternative to the above brute-force approach exist as well. For example,
    you can first build an FIR model to get an estimate of the delay, or a CCF plot
    between $u(k)$ and $y(k)$ can be utilized. A process delay of $d$ will imply that
    the CCF possesses its first significant peak at lag $d + 1$, while the coefficients
    will be close to zero for lag $\leq d$. With the delay estimate in hand, you may
    then proceed for order estimation via brute-force. Here again, an approximate

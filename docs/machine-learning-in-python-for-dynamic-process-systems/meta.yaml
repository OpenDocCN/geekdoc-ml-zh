- md: '## 5.7 Forecasting Signals using ARIMA


    Previously we saw how time series models can be used to build process monitoring
    solutions. As alluded to before, another common use of such models is in forecasting
    of stochastic signals. Although the *Statsmodels* package provides native support
    for generating forecasts, it would be instructive to see what the forecasting
    work process actually entails. We will use a simple ARIMA(1,1,1) model for this
    illustration. Let the model be the following


    $$(1 - q^{-1})y(k) = \frac{1 - 0.7q^{-1}}{1 - 0.5q^{-1}} e(k)$$


    Let''s expand the above into a difference equation with only $y(k)$ on the L.H.S.


    $$y(k) = 1.5y(k-1) - 0.5y(k-2) - 0.7e(k-1) + e(k) \quad \text{eq. 7}$$


    To derive the expression for the forecasts from Eq. 7, the following notation/rules
    apply:


    - $\hat{y}(k+l|k) \equiv \hat{y}(l)$ denotes the $l^{th}$ step-ahead forecast/prediction
    using all information available at time $k$

    - Any $y$ on R.H.S. of Eq. 7 that has not yet occurred is replaced with its forecast
    $\hat{y}$

    - Any future noise term is replaced with zero and past noise term with the 1-step
    ahead residuals (for example, $e(k-1) = y(k-1) - \hat{y}(k-1|k-2)$)


    Let''s see how the forecast expressions look like for $l = 1, 2, 3, ...$


    $$\hat{y}(1) = 1.5y(k) - 0.5y(k-1) - 0.7e(k)$$

    $$\hat{y}(2) = 1.5\hat{y}(1) - 0.5y(k)$$

    $$\hat{y}(3) = 1.5\hat{y}(2) - 0.5\hat{y}(1)$$

    $$\vdots$$


    to be replaced with $y(k) - \hat{y}(k|k-1)$


    both error terms in Eq. 7 replaced with zero


    A somewhat incomplete aspect in the above forecast expressions is computation
    of $e(k)$. The annotation text suggests making use of $\hat{y}(k|k-1)$, but it
    would involve the term $e(k-1)$. This leads to a recursive approach to find the
    past noise values. The established approach is to start from time $p + d$, set
    estimated noise values for times $\leq p + d$ to zero and then recursively estimate
    the noise values until time $k$ using the forecast expression for the 1-step ahead
    forecast. For our ARIMA(1,1,1) model, the computation would look like the following:


    ```

    (approximation) 0 0(replacement with conditional mean)

    \hat{y}(2|1) = 1.5y(1) - 0.5y(0) - 0.7e(1) + e(2)

    \downarrow

    e(2) = y(2) - \hat{y}(2)

    \downarrow

    \hat{y}(3|2) = 1.5y(2) - 0.5y(1) - 0.7e(2) + e(3)

    \downarrow

    e(3) = y(3) - \hat{y}(3)

    \vdots

    ```


    This completes our quick overview of time-series analysis and its applications.
    Hopefully, you have gained an in-depth understanding of the concepts behind time-series
    analysis and can appreciate its usefulness in describing process systems.


    ## Summary


    In this chapter we looked at the four common models used to describe time series,
    namely, AR, MA, ARMA, and ARIMA models. We studied their model forms and procedures
    behind the corresponding model order selection. We looked at how ACF and PACF
    tools provide useful clues regarding model structure. We also looked into more
    details the stationarity requirements of TSA models and ways of assessing stationarity
    of signals. We will build upon the concepts covered in this chapter and look at
    models used to describe input-output dynamic signals in the next chapter.


    # Chapter 6

    ## Input-Output Modeling - Part 1: Simple Yet Popular Classical Linear Models


    There is beauty in simplicity - this age-old truth perfectly sums up the reason
    behind the popularity of two simple input-output models, FIR and ARX models, that
    we will learn about in this chapter. In the age of artificial neural networks,
    these models still hold on their own and are an essential part of any PDS''s toolkit.
    As alluded to before, I/O processes have inputs signals that can be manipulated
    to control the output signals. The objective, therefore, of I/O modeling is to
    find the deterministic relationship between the input and output signals, and,
    optionally, find a suitable model for the stochastic disturbances affecting the
    outputs.


    FIR model is a non-parametric model and is used in thousands of MPC solutions
    in process industry globally. The remarkable success of the FIR-based MPCs is
    testament to the fact that simple models can be quite useful representation of
    complex industrial processes. FIR models are intuitive and simple enough to be
    understood by plant operators. However, nothing is all rosy with anything. FIR
    models, owing to their flexibility often lead to overfitting. ARX models, on the
    other hand, are parametric models and require much lower number of parameters.
    Consequently, the resulting models are ''smoother''. ARX models are often the
    initial choice in any SysID exercise. Nonetheless, ARX models can easily suffer
    from high bias errors. Since these two models are so critical, this chapter is
    devoted to understanding their various aspects, along with their pros and cons,
    in detail.


    Specifically, the following are covered in the chapter.


    - Introduction to FIR and ARX models

    - SysID of industrial furnaces using FIR and ARX models

    - Hyperparameter selection for FIR and ARX models

    - Stochastic component of ARX models

    - Model bias in FIR and ARX models


    ## 6.1 FIR Models: An Introduction


    Impulse response of a system is its response to a special impulse input as shown
    in Figure 6.1. The impulse response model approximates the system output as a
    linear combination of several impulse responses due to past inputs. Since the
    impulse responses usually decay to zero, it suffices to include only the past
    few values (say $M$) of $u(k)$ to approximate $y(k)$. The value ''$M$'' is called
    the model order and the resulting model is called the finite impulse response
    (FIR) model. You will notice that there is no attempt to model stochastic disturbances
    and a non-parametric modeling form (there is no compact mathematical structure)
    is adopted. Consequently, FIR model is among the simplest SysID model.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_117_0.png)


    Fitting a FIR model entails estimation of the impulse response coefficients. Although
    a FIR model''s structure is quite simple, it is very flexible and given sufficiently
    large $M$, any type of complex impulse response can be fitted. It is common to
    employ model orders of 90 to 120 to get all the impulse coefficients. However,
    such large parameters dimensionality often leads to overfitting (impulse response
    curves show wiggles or spikes due to output signal corruption by process disturbances).
    Apart from model flexibility, another advantage of FIR model is that an estimate
    of I/O delay is automatically obtained after model fitting. For a system with
    delay $d$, the first $d$ impulse coefficients will be zero or close to zero. This
    is in fact a classical method for delay estimation. FIR models also provide unbiased
    parameter estimates as the deterministic part of the model is independently parametrized
    (recall our discussion from Chapter 4). These favorable properties of FIR models
    make them the dominant SysID model deployed in industrial MPCs$^{45}$.


    ## Step-response curves


    Step response is response of a system to a step change in its input as shown below


    ![](img/6cffacf6247d6f7caa7eacc348cef427_118_0.png)


    As should be apparent, a step response curve can provide a quick assessment of
    process delay, time-constant of the process, and steady-state gain. System nonlinearity
    can also be quickly assessed by looking at response curves to steps of different
    magnitudes. Due to these favorable properties and the ease of inducing step inputs
    (compared to impulse inputs), step response curves are popularly used to visualize
    a system''s behavior in process industry.


    The step response coefficient, $s(k)$, can be easily estimated from the impulse
    coefficients as follows


    $$s(k) = \sum_{j=1}^{k} g(j)$$


    ## Model estimation


    An FIR model$^{46}$ can be conveniently estimated using least squares method.
    Consider an FIR model of order $M$ and the following data sequence


    $$\begin{aligned} y(0), y(1), ..., y(N-1) \\ u(0), u(1), ..., u(N-1) \end{aligned}$$


    Available historical SISO process data


    $^{46}$ A FIR model can compactly be written as $y(k) = \varphi_k^T \theta_0 +
    v(k)$ where $\varphi_k$ is regressor vector ($[u(k-1), u(k-2), ..., u(k-M)]^T$),
    $\theta_0$ is parameter vector ($[g(1), g(2), ..., g(M)]^T$), and $v(k)$ is disturbance
    signal which is ignored during estimation of $\theta_0$. Note that $v(k)$ is not
    restricted to be white noise.'
  mdcn: '## 5.7 使用ARIMA预测信号


    之前我们了解了如何利用时间序列模型构建过程监控解决方案。如前所述，此类模型的另一个常见用途是预测随机信号。尽管*Statsmodels*包提供了生成预测的原生支持，但了解预测工作流程的实际内容将很有启发性。我们将使用一个简单的ARIMA(1,1,1)模型进行说明。设模型如下：


    $$(1 - q^{-1})y(k) = \frac{1 - 0.7q^{-1}}{1 - 0.5q^{-1}} e(k)$$


    让我们将上述方程展开为一个差分方程，其左侧仅包含$y(k)$：


    $$y(k) = 1.5y(k-1) - 0.5y(k-2) - 0.7e(k-1) + e(k) \quad \text{式 7}$$


    为了从式7推导出预测表达式，适用以下符号/规则：


    - $\hat{y}(k+l|k) \equiv \hat{y}(l)$ 表示使用时间$k$所有可用信息进行的$l$步超前预测/估计

    - 式7右侧任何尚未发生的$y$值，都用其预测值$\hat{y}$替换

    - 任何未来的噪声项替换为零，过去的噪声项替换为1步超前残差（例如，$e(k-1) = y(k-1) - \hat{y}(k-1|k-2)$）


    让我们看看当$l = 1, 2, 3, ...$时，预测表达式是什么样子：


    $$\hat{y}(1) = 1.5y(k) - 0.5y(k-1) - 0.7e(k)$$

    $$\hat{y}(2) = 1.5\hat{y}(1) - 0.5y(k)$$

    $$\hat{y}(3) = 1.5\hat{y}(2) - 0.5\hat{y}(1)$$

    $$\vdots$$


    其中，$e(k)$将被替换为$y(k) - \hat{y}(k|k-1)$


    式7中的两个误差项均替换为零



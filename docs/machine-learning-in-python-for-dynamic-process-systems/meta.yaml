  md: 'By the process data scientists, for the process data scientists, of process
    data science


    ![](img/6cffacf6247d6f7caa7eacc348cef427_207_0.png)


    # Machine Learning in Python for Dynamic Process Systems


    > This book is designed to help readers gain a working-level knowledge of machine
    learning-based modeling techniques for dynamic processes. Readers can leverage
    the concepts learned to build advanced solutions for process monitoring, soft
    sensing, predictive maintenance, and process control for dynamic systems. The
    application-focused approach of the book is reader friendly and easily digestible
    to the practicing and aspiring process engineers, and data scientists. Upon completion,
    readers will be able to confidently navigate the system identification literature
    and make judicious selection of modeling approaches suitable for their problems.


    The following topics are broadly covered:

    - Exploratory analysis of dynamic dataset

    - Best practices for dynamic modeling

    - Linear and discrete-time classical parametric and non-parametric models

    - State-space models for MIMO systems

    - Nonlinear system identification and closed-loop identification

    - Neural networks-based dynamic process modeling


    www.MLforPSE.com'

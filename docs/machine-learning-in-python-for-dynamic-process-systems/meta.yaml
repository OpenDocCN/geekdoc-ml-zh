    - Applications of DPM in process industry


    Let’s now tighten our seat-belts as we embark upon this exciting journey of de-mystifying
    machine learning for dynamic process modeling.'
  - '[PAGE 18]


    # 1.1 Process Systems Engineering, Dynamic Process Modeling, and Machine Learning


    Process industry is a parent term used to refer to industries like petrochemical,
    chemical, power, paper, cement, pharmaceutical, etc. These industries use processing
    plants to manufacture intermediate or final consumer products. As emphasized in
    Figure 1.1, the prime concern of the management of these plants is optimal design
    and operations, and high reliability through proactive process monitoring, quality
    control, data reconciliation, etc. All these tasks fall under the ambit of process
    systems engineering (PSE).


    ![](img/6cffacf6247d6f7caa7eacc348cef427_18_0.png)


    Figure 1.1: Overview of industries that constitute process industry and the tasks
    process systems engineers perform


    The common theme among the PSE tasks is that they all rely on reliable dynamic
    mathematical process models that can accurately predict the future state of the
    process using current and past process measurements. Therefore, DPM is one of
    the defining skills of process systems engineers. Process industry has historically
    utilized both first principles/phenomenological and empirical/data-based models
    for DPM. While the former models provide higher fidelity, the later models are
    easier to build for complex systems. The immense rise in popularity of machine
    learning/data science in recent years and exponential increase in sensor measurements
    collected at plants have led to renewed interest in ML-based DPM. Several classical
    and ‘modern’ ML methods for DPM are at a process data scientist’s disposal. The
    rest of the book will take you on a whirlwind tour of these methods. Let’s now
    jump straight into the nitty-gritty of ML-DPM.'
  - '[PAGE 19]


    # Components of a dynamic process model


    In the context of DPM, there are three types of variables/signals in a process
    system as shown in Figure 1.2. The measured signals that we desire to predict
    are termed outputs while the measured signals that can be manipulated to influence
    the outputs are called inputs. In industrial processes, these outputs are seldom
    solely influenced or completely explained by inputs. This unexplained component
    is attributed to the noise signals which can manifest as measurement noise or
    process noise (unmeasured disturbances or unmeasured signals that impact the system
    are often the cause of process noise). In the pH neutralization process example
    shown below, process noise corresponds to unmeasured fluctuations in the wastewater
    acidity and/or flow which causes disturbances in the process output.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_19_0.png)


    The impact of measurement and process noise can be clubbed together and explained
    via a stochastic model as shown in the figure above. The resulting disturbance
    signal summarizes all the uncertain characteristics of the process. The stochastic
    and deterministic models can be estimated simultaneously as well as separately.


    > In the engineering community, the task of building mathematical models of a
    dynamic system using measured data is called system identification (SysID). Additionally,
    the task of modeling dynamic systems without input variables is termed time-series
    analysis.'
  - '[PAGE 20]


    # Dynamic modeling notation


    In this book, we will focus on time-invariant discrete-time models wherein the
    signals will be assumed to be recorded at regular sampling interval of $T$ time
    units. The output $y$ at time $kT$ ($k$ is any integer) will be denoted as $y(k)$.
    System identification therefore entails finding the relationship between the three
    signals $y(k)$, $u(k)$, and $v(k)$. For the pH example, a simple discrete-time
    linear model could look like the following


    $$\hat{y}_{pH}(k) = \alpha \hat{y}_{pH}(k-1) + \beta u_{alkaline}(k-1)$$

    $$y_{pH}(k) = \hat{y}_{pH}(k) + v(k)$$


    where $\alpha$ and $\beta$ are estimable model parameters and the disturbance
    variable, $v(k)$, summarizes all the uncertainties. Here, the value of the output
    at the $k^{th}$ time instant is predicated upon the past values of both output
    and input, and the disturbance. In the later chapters, we will study how to characterize
    $v(k)$ using stochastic models.


    > We cannot emphasize enough the importance of proper handling of process disturbance
    signals. When in hurry, you may be tempted to ignore the stochastic component.
    However, doing so would only be inviting disappointment as you may end up with
    biased deterministic models with unsatisfactory performance. This interlink between
    stochastic and deterministic models would probably not be obvious to beginner
    PDSs. By the time you finish this book, this connection will become obvious.


    # Static vs dynamic model


    Before we proceed further, let''s take a quick look at how a dynamic model differs
    from a static model. Consider a SISO process in Figure 1.3 where a step change
    in input is induced and the corresponding change in output is observed.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_20_0.png)'
  - '[PAGE 21]


    +   - In static model, we are only concerned with being able to predict $y_{steady}$
    as the impact of the step change in $u$.

    - On the other hand, in dynamic model, we care about the transition dynamics as
    well.

    - It is obvious that a dynamic model estimation is a more demanding problem and
    the complexity only increases for multivariable systems with stochastic components.


    # Validity of discrete-time models


    It won’t be wrong to say that continuous-time description of process systems (which
    are inherently continuous in nature) is more natural than discrete-time description.
    However, in computer controlled industrial plants, signals from the underlying
    continuous process are sampled and made available at discrete time-points. Therefore,
    there is sound rationale for focusing on discrete-time models.


    When using first principles approach, discrete-time model can be obtained as an
    approximation as well as an exact description of the underlying process. For example,
    consider the following differential equation


    $$\frac{dy}{dt} = f(y(t), u(t))$$


    Approximating the derivative via forward difference gives,


    $$\frac{y(t+T) - y(t)}{T} = f(y(t), u(t)); \quad T \text{ is sampling interval}$$


    $$\Rightarrow y(t+T) = y(t) + T f(y(t), u(t))$$


    or


    $$y(k+1) = y(k) + T f(y(k), u(k)); \quad k = \frac{t}{T}$$


    Discrete-time model


    In an alternate scenario, if the input variables are constant between samples,
    then an exact analytical discrete-time representation can be derived for linear
    processes.'
- md: "## 1.2 ML-DPM Workflow\n\nFigure 1.4 shows the typical steps involved in system\
    \ identification. As you can see, SysID is more than just curve fitting. Overall,\
    \ there are five broad tasks: data collection, exploratory data analysis, data\
    \ pre-treatment, model identification, and model validation. Although we will\
    \ study each step in detail in Chapter 4, let’s take a quick overview:\n\n- **Data\
    \ collection and exploratory data analysis**: Availability of ‘proper’ data is\
    \ absolutely critical and the requirement of ‘richness’ of training data is indispensable.\
    \ In the previous section we saw that dynamic modeling is more demanding than\
    \ static modeling and consequently, there are more stringent requirements on training\
    \ data for dynamic modeling. Training data may be taken from historical database\
    \ or fresh experiments may be performed. The training inputs should be such that\
    \ the output data contains the dynamic variations of interest.\n\nExploratory\
    \ data analysis (EDA) involves preliminary (and usually manual) investigation\
    \ of data to get a ‘feel’ of the system’s characteristics. The activities may\
    \ include generating some graphical plots to check the presence of trends, seasonality,\
    \ and non-stationarity in data. Inferences made during EDA help make the right\
    \ choices in the subsequent steps of SysID.\n\n- **Data pre-treatment**: This\
    \ step consists of several activities that are designed to remove the portions\
    \ of training data that are unimportant (or even detrimental) to model identification.\
    \ It may entail removal of outliers and noise, removal of trends, etc. Alternatively,\
    \ training data can also be massaged to manipulate the model’s accuracy as suited\
    \ for the end purpose of the model. For example, if the model is to be used for\
    \ control purpose, then the training data may be pre-filtered to bolster model’s\
    \ accuracy for high frequency signals. Overall, the generic guideline is that\
    \ you have better chances of a successful SysID with a better conditioned dataset.\n\
    \n- **Model training**: Model training is the most critical step in SysID and\
    \ entails a few sub-steps. First, a choice must be made on the type of disturbance\
    \ model and deterministic model. The end use of the model, the available *a priori*\
    \ system knowledge, and the desired degree of modeling complexity dictate these\
    \ selections. For example, if the model is to be used for simulation purposes,\
    \ then OE¹ structure may be preferred over ARX; if process disturbance has different\
    \ dynamics compared to process input, then ARMAX will be preferable; if computational\
    \ convenience is sought, then ARX is usually the first choice and is preferred\
    \ over other complex structures such as recurrent neural networks. Model structure\
    \ selection is followed by model parameter estimation. This sub-step is mostly\
    \ ‘hands-off’ due to the availability of several specialized libraries that perform\
    \ parameter estimation.\n\n¹ We will cover these model structures in the upcoming\
    \ chapters\n\n- **Model validation**: Once a model has been fitted, the next step\
    \ is to check if the model truly represents the underlying process. Several techniques\
    \ are at a modeler's disposal. For example, you could check the model's performance\
    \ on a dataset that has not been used during parameter estimation, plot the modeling\
    \ errors to look for leftover patterns, or check if the model agrees with the\
    \ *a priori* information about the system. Often, your first model will fail the\
    \ validation procedure. An expert modeler can use the validation results to infer\
    \ the reasons for the failure. Some examples of the cause could be\n    - Training\
    \ data was not ‘rich’ enough\n    - Training data was not pre-treated adequately\n\
    \    - Choice of model structure was wrong\n    - Estimation algorithm did not\
    \ converge\n\nOnce diagnosed, appropriate corrections are made, and the iterative\
    \ procedure continues.\n\nWe hope that you get the understanding that SysID is\
    \ more than just black-box application of modeling algorithm for estimation of\
    \ model parameters. There are several practical aspects that require active participation\
    \ of the modeler during the SysID process. Without exaggeration, we can say that\
    \ SysID is an art, and the rest of the book will help you obtain the necessary\
    \ skills to become the SysID artist!\n\n## 1.3 Taxonomy of ML-based Dynamic Models\n\
    \nThe field of system identification is overwhelmingly extensive owing to the\
    \ decades of research that has led to the development of several specialized techniques.\
    \ Figure 1.5 gives an overview of some of the popular methods and models that\
    \ we will cover in this book. These models represent only a subset of all the\
    \ SysID models out there and this selection is based on our experience regarding\
    \ the relevance of these models for process systems modeling. We largely focus\
    \ on time-invariant², discrete-time models and these shown models can help you\
    \ handle a large majority of DPM problems you will encounter in process industry.\n\
    \n² Models where time variable does not appear as an explicit variable.\n\nFigure\
    \ 1.5: Some popular SysID methods and models covered in this book\n\nThere are\
    \ several noteworthy points in Figure 1.5. First, the apparent domination of linear\
    \ models: you may have expected nonlinear models to be preferable for modeling\
    \ complex industrial process systems, however, as it turns out, linear models\
    \ are often justified for DPM. The justification stems from the fact that industrial\
    \ processes often operate around an optimal point making the linear models pretty\
    \ good approximation for usage in process control and process monitoring applications.\
    \ If the end use of the model is process simulation or design where the system\
    \ response over wide range of input variables is of interest, then nonlinear models\
    \ can prove to be more suitable. Within linear category, different modeling options\
    \ exist to cater to process systems with different characteristics, viz, multivariable\
    \ outputs, presence of correlated noise, disturbances sharing dynamics with inputs,\
    \ presence of measurement noise only, presence of drifts or non-stationarities,\
    \ etc.\n\nThe classification at the root of linear model sub-tree is based on\
    \ the methodology used for model fitting. While PEM methods employ minimization\
    \ of prediction errors, subspace methods are based on matrix algebra and do not\
    \ involve any optimization for parameter optimization.³ Do not worry if these\
    \ terms do not make much sense right now; they will soon become ‘obvious’ to you.\
    \ If not trained about the nuanced differences between these different models\
    \ and methods, you may not have much idea at the outset about which model would\
    \ be the best one for your system. This book will help you gain adequate conceptual\
    \ understanding to become adept at making the right choice and obtaining your\
    \ coveted model quickly.\n\n³ Another distinction is that PEM is used to obtain\
    \ input-output models while SIM is used to obtain state-space models.\n\n## Types\
    \ of models\n\nIn Eq. 1 we saw one way of representing a dynamic process model.\
    \ The models from Figure 1.5 can be used to generate other representations of\
    \ your dynamic systems; the figure below shows the different forms/types of models\
    \ that we will learn to derive in this book using machine learning. We will also\
    \ understand the pros and cons of these different model forms.\n\nFigure 1.6:\
    \ Different forms of dynamic process model (that we will learn to generate in\
    \ this book), their defining characteristics, and corresponding representative\
    \ examples\n\n## Why careful choice of model matters: A simple illustration\n\n\
    Consider the shown process:\n\nIf not careful, you may just ignore the presence\
    \ of measurement noise and attempt to fit the following input-output model to\
    \ estimate the model parameters $a$ and $b$.\n\n**Fitted Model (ARX form):** $y(k+1)\
    \ + a y(k) = b u(k)$\n\nData file ‘simpleProcess.csv’ contains 1000 samples of\
    \ $u$ and $y$ obtained from the true process. Below are the parameter estimates\
    \ we get using this data,\n\n$\\hat{a} = -0.6628 (\\pm 0.016) , \\hat{b} = 0.7174\
    \ (\\pm 0.035)$\n\nvalues in bracket denote standard errors\n\nTwo things are\
    \ striking here: the estimates are grossly inaccurate, and the parameter error\
    \ estimates seem to suggest high confidence in these wrong values! What went wrong\
    \ in our approach? The reason is that the SNR (signal-to-noise ratio) value is\
    \ not very high (data was generated with SNR ~ 10) and the fitted ARX model is\
    \ wrong input-output form of the true process. The correct form would be the following\n\
    \n**Correct input-output model**\n\nEquation error is not white (as assumed in\
    \ ARX model) but colored!\n\nIgnoring the presence of correlated equation error\
    \ leads to biased (inaccurate) parameter estimates. Hopefully, this simple illustration\
    \ has convinced you against blind application of ‘convenient’ models. Part II\
    \ of this book will add several modeling tools to your ML-DPM arsenal to help\
    \ avoid such modeling mistakes."
  mdcn: "## 1.2 ML-DPM 工作流程\n\n图 1.4 展示了系统辨识中涉及的典型步骤。如你所见，SysID 不仅仅是曲线拟合。总体而言，它包含五项主要任务：数据收集、探索性数据分析、数据预处理、模型辨识和模型验证。尽管我们将在第\
    \ 4 章详细研究每个步骤，但这里先快速概览一下：\n\n- **数据收集与探索性数据分析**：拥有“合适”的数据绝对至关重要，而训练数据的“丰富性”要求也是不可或缺的。在上一节中我们看到，动态建模比静态建模要求更高，因此对动态建模的训练数据有更严格的要求。训练数据可以从历史数据库中获取，也可以进行新的实验。训练输入应使得输出数据包含我们感兴趣的动态变化。\n\
    \n探索性数据分析（EDA）涉及对数据进行初步（通常是手动的）调查，以“感受”系统的特性。活动可能包括生成一些图形图表，以检查数据中是否存在趋势、季节性和非平稳性。在\
    \ EDA 期间做出的推断有助于在 SysID 的后续步骤中做出正确的选择。\n\n- **数据预处理**：此步骤包含多项活动，旨在移除训练数据中对模型辨识不重要（甚至有害）的部分。它可能涉及移除异常值和噪声、去除趋势等。或者，也可以对训练数据进行处理，以根据模型的最终用途调整模型的准确性。例如，如果模型用于控制目的，则可以对训练数据进行预滤波，以增强模型对高频信号的准确性。总体而言，通用准则是：数据集条件越好，成功进行\
    \ SysID 的机会就越大。\n\n- **模型训练**：模型训练是 SysID 中最关键的步骤，包含几个子步骤。首先，必须选择扰动模型和确定性模型的类型。模型的最终用途、可用的*先验*系统知识以及期望的建模复杂度决定了这些选择。例如，如果模型用于仿真目的，则\
    \ OE¹ 结构可能优于 ARX；如果过程扰动与过程输入具有不同的动态特性，则 ARMAX 将更可取；如果追求计算便利性，则 ARX 通常是首选，并且优于其他复杂结构（如循环神经网络）。模型结构选择之后是模型参数估计。由于有许多专门的库可用于执行参数估计，这个子步骤在很大程度上是“免干预”的。\n\
    \n¹ 我们将在后续章节中介绍这些模型结构。\n\n- **模型验证**：一旦模型拟合完成，下一步就是检查模型是否真正代表了底层过程。建模者可以使用多种技术。例如，你可以检查模型在未用于参数估计的数据集上的性能，绘制建模误差以寻找残留模式，或者检查模型是否与系统的*先验*信息一致。通常，你的第一个模型会无法通过验证程序。经验丰富的建模者可以利用验证结果来推断失败的原因。一些可能的原因示例包括：\n\
    \    - 训练数据不够“丰富”\n    - 训练数据预处理不充分\n    - 模型结构选择错误\n    - 估计算法未收敛\n\n一旦诊断出来，就进行适当的修正，然后继续迭代过程。\n\
    \n我们希望你能理解，SysID 不仅仅是黑箱式地应用建模算法来估计模型参数。在 SysID 过程中，建模者需要积极参与多个实际方面。毫不夸张地说，SysID\
    \ 是一门艺术，本书的其余部分将帮助你获得必要的技能，成为一名 SysID 艺术家！\n\n## 1.3 基于 ML 的动态模型分类\n\n由于数十年的研究开发出了多种专门技术，系统辨识领域极其广泛。图\
    \ 1.5 概述了本书将涵盖的一些流行方法和模型。这些模型仅代表所有 SysID 模型的一个子集，此选择基于我们关于这些模型对过程系统建模相关性的经验。我们主要关注时不变²、离散时间模型，这些展示的模型可以帮助你处理在过程工业中遇到的大多数\
    \ DPM 问题。\n\n² 时间变量不作为显式变量出现的模型。\n\n图 1.5：本书涵盖的一些流行 SysID 方法和模型\n\n图 1.5 中有几个值得注意的点。首先，线性模型的明显主导地位：你可能预期非线性模型更适合对复杂工业过程系统建模，但事实证明，线性模型在\
    \ DPM 中通常是合理的。其合理性源于工业过程通常在最优点附近运行，使得线性模型在过程控制和过程监控应用中成为相当好的近似。如果模型的最终用途是过程仿真或设计，其中系统对宽范围输入变量的响应是关注的重点，那么非线性模型可能被证明更合适。在线性类别中，存在不同的建模选项以适应具有不同特性的过程系统，例如，多变量输出、存在相关噪声、扰动与输入共享动态特性、仅存在测量噪声、存在漂移或非平稳性等。\n\
    \n线性模型子树根部的分类基于用于模型拟合的方法论。PEM 方法采用最小化预测误差，而子空间方法基于矩阵代数，不涉及任何参数优化的优化过程。³ 如果这些术语现在对你来说意义不大，请不要担心；它们很快就会变得“显而易见”。如果没有接受过这些不同模型和方法之间细微差别的培训，你可能一开始就不知道哪种模型最适合你的系统。本书将帮助你获得足够的概念理解，从而能够熟练地做出正确的选择，并快速获得你梦寐以求的模型。\n\
    \n³ 另一个区别是 PEM 用于获得输入-输出模型，而 SIM 用于获得状态空间模型。\n\n## 模型类型\n\n在公式 1 中，我们看到了表示动态过程模型的一种方式。图\
    \ 1.5 中的模型可用于生成动态系统的其他表示形式；下图展示了我们将学习在本书中使用机器学习推导的不同形式/类型的模型。我们还将理解这些不同模型形式的优缺点。\n\
    \n图 1.6：动态过程模型的不同形式（我们将在本书中学习生成），它们的定义特征，以及相应的代表性示例\n\n## 为什么仔细选择模型很重要：一个简单的说明\n\
    \n考虑所示过程：\n\n如果不小心，你可能会忽略测量噪声的存在，并尝试拟合以下输入-输出模型来估计模型参数 $a$ 和 $b$。\n\n**拟合模型（ARX\
    \ 形式）：** $y(k+1) + a y(k) = b u(k)$\n\n数据文件 ‘simpleProcess.csv’ 包含从真实过程中获得的 1000\
    \ 个 $u$ 和 $y$ 样本。以下是使用此数据得到的参数估计值，\n\n$\\hat{a} = -0.6628 (\\pm 0.016) , \\hat{b}\
    \ = 0.7174 (\\pm 0.035)$\n\n括号中的值表示标准误差\n\n这里有两点令人震惊：估计值严重不准确，而且参数误差估计似乎表明对这些错误值有很高的置信度！我们的方法哪里出了问题？原因是\
    \ SNR（信噪比）值不是很高（数据是在 SNR ~ 10 下生成的），并且拟合的 ARX 模型是真实过程的错误输入-输出形式。正确的形式应该是以下\n\n\
    **正确的输入-输出模型**\n\n方程误差不是白噪声（如 ARX 模型中假设的），而是有色的！\n\n忽略相关方程误差的存在会导致有偏（不准确）的参数估计。希望这个简单的说明能说服你不要盲目应用“方便”的模型。本书的第二部分将为你的\
    \ ML-DPM 武器库添加多种建模工具，以帮助避免此类建模错误。"

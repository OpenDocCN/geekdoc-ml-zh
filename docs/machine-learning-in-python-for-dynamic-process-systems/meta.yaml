- md: '## Summary


    In this chapter we looked at classical PEM models for modeling linear SISO systems.
    We learnt the pros and cons of ARMAX, OE, BJ, and ARIMAX models. We saw their
    applications for modeling distillation columns and gas furnaces. You now have
    all the tools available to make educated selection of your model structure. To
    further strengthen your modeling capabilities, let’s move on to the study of state-space
    and subspace models for MIMO systems.


    ## Chapter 8


    ## State-Space Models: Efficient Modeling of MIMO Systems


    In the previous chapter we alluded to the problems related to the classical methodology
    of modeling a MIMO system through separate MISO models for each output. In a physical
    system, the different output variables seldom behave independently; they often
    share common parameters and/or correlated noise. Therefore, identifying all the
    output models simultaneously while being cognizant of shared dynamics between
    them leads to better and more robust models. This alternative approach to SysID
    is provided by state-space (SS) models. State-space models add an intermediate
    layer of ‘state variables’ between the input and output variables, wherein, the
    inputs determine the states, and the outputs are derived as linear combination
    of the states. This modeling paradigm leads to parsimonious models capable of
    fitting complex processes with both fast and slow dynamics.


    In this chapter, we will cover in detail the subspace identification techniques
    which are utilized for fitting the SS models. While several popular subspace identification
    methods (SIMs) such as N4SID, CVA, MOESP exist, CVA will be our primary focus.
    Subspace identification offers several additional advantages over I/O models.
    SIMs involve only linear algebra for model ID (no iterative nonlinear optimization
    schemes are needed). SIMs also provide in-situ mechanism for automated optimal
    model order selection. Subspace models are more robust to noise and provide smooth
    (step and impulse) response curves. In fact, it is not uncommon to fit SIM model
    to I/O data and then derive FIR model using the SIM model for usage in MPC applications.
    Due to such superior properties of SIM, they are among the ‘mainstream’ models
    provided by advanced process control (APC) solution vendors.


    CVA models are also inherently suitable for computing fault detection indices,
    performing fault diagnosis, and therefore building process monitoring tools. We
    will build one such application in this chapter. Specifically, the following topics
    will be covered:


    - Introduction to state-space models and CVA modeling

    - Modeling MIMO glass furnace via CVA

    - Process monitoring of Industrial Chemical Plants using CVA


    ### 8.1 State-Space Models: An Introduction


    Consider the distillation column in Figure 8.1 where we have four inputs and four
    outputs. Let''s focus on the relationship between the reboiler duty $Q_B$ and
    distillate composition $x_D$. We can build an I/O model between $Q_B$ and $x_D$,
    but it is clear that $Q_B$ doesn''t affect $x_D$ directly. There are internal
    dynamics or states (e.g., arising from the liquid holdup at each column tray)
    that changes in $Q_B$ have to pass through before impacting $x_D$. Similar argument
    could be made for $Q_B$ vs $D$ relationship. The unobserved intermediate variables
    which characterize the internal dynamics or ''states'' of the column are termed
    state variables and, as argued before, the outputs share these states. The modeling
    framework that reflects such interrelationship between the inputs and outputs
    is the state-space model whose structure$^{59}$ is shown in Figure 8.1. In a generic
    modeling exercise, the estimated state variables may not always have any physical
    meanings and even the choice of the states is not unique.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_155_0.png)


    Our familiar PEM methodology could be used to estimate SS models but that would
    involve solving a nonlinear optimization problem. The better alternative is the
    subspace identification method.$^{61}$ Specifically, in the CVA (canonical variate
    analysis) approach, the states are estimated via linear algebra as a linear combination
    of past outputs and inputs that maximizes the explained variability in the future
    output measurements. Without further ado, let’s now delve deeper into the CVA
    concepts and master the art of CVA-based state-space modeling.


    > ### Forms of state-space models


    The form of state-space model we saw in Figure 8.1 is called process form. Two
    other common forms are shown below


    **Innovation form**


    $$x(k+1) = Ax(k) + Bu(k) + Ke(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    *Kalman gain*


    **Predictor form**


    $$x(k+1) = A_k x(k) + B_k u(k) + Ky(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    where

    $$A_k = A - KC$$

    $$B_k = B - KD$$


    Any of the three forms can be chosen to model any MIMO system.


    ### 8.2 State-Space Modeling via CVA


    CVA is among the most popular technique for state-space modeling of dynamic MIMO
    systems. Figure 8.2 shows the general approach used by CVA (and other SIM techniques)
    for estimating the SS models using historical plant data: the state sequence $\{x(k)\}$
    for the historical observations are first estimated using the $\{y(k), u(k)\}$
    data sequences, then the system matrices $(A, B, C, D)$ are estimated via least-squares
    regression, and thereafter the covariance matrices are found. We will see more
    on this procedure soon. All SIM algorithms follow this procedure and differ primarily
    in the way the state sequence is estimated.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_156_0.png)


    Let''s look at the model fitting procedure in more details.


    ### Mathematical background


    Using the state-space model and some smart re-arrangement<sup>62</sup> of input-output
    data sequence, it can be shown that state vector $x(k)$ can be approximated as
    a linear combination of past inputs and outputs<sup>63</sup>


    $\hat{x}(k) = J p(k)$


    eq. 1


    defined as $[y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-l_y) \ u^T(k-1) \ u^T(k-2) \
    \cdots \ u^T(k-l_u)]^T$


    In Eq. 1, $l_y$ and $l_u$ denote the number of lagged outputs and inputs used
    to build the $p(k)$ vector. Usually, $l_y = l_u = l$ and it is a model hyperparameter.
    The CVA method utilizes CCA (canonical covariate analysis), a multivariate statistical
    technique, to find $J$. A quick primer on the CCA technique is provided below.


    > ### CCA: A quick primer


    CCA is a dimensionality reduction technique which aims to find linear combinations
    of input variables ($u \in \mathbb{R}^m$) that are maximally correlated with linear
    combinations of outputs variables ($y \in \mathbb{R}^p$)*. You may relate this
    to PLS wherein covariance between latent variables is maximized. These linear
    combinations are called canonical variables and are given as


    $c = Ju$ ← $c$ comprises of uncorrelated latent variables

    $d = Ly$ ← $d$ comprises of uncorrelated latent variables


    The covariance matrix between $c$ and $d$ is (rectangular) diagonal


    $\Sigma_{cd} = J\Sigma_{uy}L^T = D = diag(\gamma_1, \gamma_2, \dots, \gamma_o,
    0, \dots, 0)$


    The elements $\gamma_i$ of matrix D are called canonical correlations with ($\gamma_1
    \ge \gamma_2 \ge \dots \ge \gamma_o$) and quantify the degree of correlations
    between the $i^{th}$ canonical variate pair $c_i$ and $d_i$.


    <sup>62</sup> Chen et. al., A canonical variate analysis based process monitoring
    scheme and benchmark study. 2014

    <sup>63</sup> All SIM algorithms follow this procedure and differ primarily in
    the way the matrix $J$ is estimated'
  mdcn: '## 总结


    本章我们探讨了用于建模线性SISO系统的经典PEM模型。我们学习了ARMAX、OE、BJ和ARIMAX模型的优缺点，并了解了它们在精馏塔和燃气炉建模中的应用。现在，你已掌握所有工具，能够明智地选择模型结构。为了进一步增强你的建模能力，让我们继续研究用于MIMO系统的状态空间和子空间模型。


    ## 第8章


    ## 状态空间模型：MIMO系统的高效建模


    在上一章中，我们提及了通过为每个输出建立独立的MISO模型来建模MIMO系统的经典方法所存在的问题。在物理系统中，不同的输出变量很少独立表现；它们通常共享共同参数和/或相关噪声。因此，在识别所有输出模型时，同时考虑它们之间的共享动态特性，能够得到更好、更稳健的模型。状态空间模型为系统辨识提供了这种替代方法。状态空间模型在输入和输出变量之间增加了一个中间层——“状态变量”，其中输入决定状态，而输出则由状态的线性组合导出。这种建模范式能够生成简洁的模型，既能拟合具有快速动态特性的复杂过程，也能拟合具有慢速动态特性的过程。


    本章将详细介绍用于拟合状态空间模型的子空间辨识技术。虽然存在多种流行的子空间辨识方法，如N4SID、CVA、MOESP，但我们将主要关注CVA。与I/O模型相比，子空间辨识提供了几个额外的优势。SIM仅涉及线性代数用于模型辨识（无需迭代非线性优化方案）。SIM还提供了现场自动选择最优模型阶数的机制。子空间模型对噪声更稳健，并提供平滑的（阶跃和脉冲）响应曲线。事实上，将SIM模型拟合到I/O数据，然后使用该SIM模型推导出FIR模型用于MPC应用，这种情况并不少见。由于SIM具有这些优越特性，它们是先进过程控制解决方案供应商提供的“主流”模型之一。


    CVA模型也天然适用于计算故障检测指标、执行故障诊断，从而构建过程监控工具。我们将在本章构建一个这样的应用。具体来说，将涵盖以下主题：


    - 状态空间模型和CVA建模简介

    - 通过CVA对MIMO玻璃熔炉进行建模

    - 使用CVA对工业化工厂进行过程监控


    ### 8.1 状态空间模型简介


    考虑图8.1中的精馏塔，我们有四个输入和四个输出。让我们关注再沸器热负荷 $Q_B$ 与馏出物组成 $x_D$ 之间的关系。我们可以在 $Q_B$ 和 $x_D$
    之间建立一个I/O模型，但很明显 $Q_B$ 并不直接影响 $x_D$。存在内部动态或状态（例如，由每个塔板上的液体滞留量引起），$Q_B$ 的变化必须经过这些状态才能影响
    $x_D$。对于 $Q_B$ 与 $D$ 的关系也可以提出类似的论点。这些表征塔内部动态或“状态”的未观测中间变量被称为状态变量，如前所述，输出共享这些状态。反映输入和输出之间这种相互关系的建模框架就是状态空间模型，其结构$^{59}$如图8.1所示。在一般的建模练习中，估计的状态变量可能并不总是具有任何物理意义，甚至状态的选择也不是唯一的。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_155_0.png)


    我们熟悉的PEM方法可用于估计状态空间模型，但这将涉及求解非线性优化问题。更好的替代方案是子空间辨识方法。$^{61}$ 具体来说，在CVA方法中，状态通过线性代数估计为过去输出和输入的线性组合，该组合最大化了对未来输出测量值的解释变异性。事不宜迟，让我们现在深入探讨CVA概念，并掌握基于CVA的状态空间建模艺术。


    > ### 状态空间模型的形式


    我们在图8.1中看到的状态空间模型形式称为过程形式。另外两种常见形式如下所示


    **新息形式**


    $$x(k+1) = Ax(k) + Bu(k) + Ke(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    *Kalman增益*


    **预测器形式**


    $$x(k+1) = A_k x(k) + B_k u(k) + Ky(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    其中

    $$A_k = A - KC$$

    $$B_k = B - KD$$


    这三种形式中的任何一种都可以用于建模任何MIMO系统。


    ### 8.2 通过CVA进行状态空间建模


    CVA是动态MIMO系统状态空间建模中最流行的技术之一。图8.2展示了CVA（以及其他SIM技术）使用历史工厂数据估计状态空间模型的一般方法：首先使用历史观测的
    $\{y(k), u(k)\}$ 数据序列估计状态序列 $\{x(k)\}$，然后通过最小二乘回归估计系统矩阵 $(A, B, C, D)$，之后求出协方差矩阵。我们很快将更详细地了解这一过程。所有SIM算法都遵循此过程，主要区别在于状态序列的估计方式。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_156_0.png)


    让我们更详细地了解模型拟合过程。


    ### 数学背景


    利用状态空间模型以及对输入输出数据序列的一些巧妙重排<sup>62</sup>，可以证明状态向量 $x(k)$ 可以近似为过去输入和输出的线性组合<sup>63</sup>


    $\hat{x}(k) = J p(k)$


    公式 1


    定义为 $[y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-l_y) \ u^T(k-1) \ u^T(k-2) \ \cdots
    \ u^T(k-l_u)]^T$


    在公式1中，$l_y$ 和 $l_u$ 表示用于构建 $p(k)$ 向量的滞后输出和输入的数量。通常，$l_y = l_u = l$，这是一个模型超参数。CVA方法利用CCA（典型协方差分析）这一多元统计技术来求
    $J$。下面提供CCA技术的简要入门。


    > ### CCA：简要入门


    CCA是一种降维技术，旨在找到输入变量（$u \in \mathbb{R}^m$）的线性组合，使其与输出变量（$y \in \mathbb{R}^p$）的线性组合具有最大相关性*。你可以将其与PLS联系起来，其中最大化了潜变量之间的协方差。这些线性组合称为典型变量，表示为


    $c = Ju$ ← $c$ 包含不相关的潜变量

    $d = Ly$ ← $d$ 包含不相关的潜变量


    $c$ 和 $d$ 之间的协方差矩阵是（矩形）对角矩阵


    $\Sigma_{cd} = J\Sigma_{uy}L^T = D = diag(\gamma_1, \gamma_2, \dots, \gamma_o,
    0, \dots, 0)$


    矩阵D的元素 $\gamma_i$ 称为典型相关系数，满足（$\gamma_1 \ge \gamma_2 \ge \dots \ge \gamma_o$），并量化了第
    $i^{th}$ 对典型变量 $c_i$ 和 $d_i$ 之间的相关程度。


    <sup>62</sup> Chen et. al., A canonical variate analysis based process monitoring
    scheme and benchmark study. 2014

    <sup>63</sup> 所有SIM算法都遵循此过程，主要区别在于矩阵 $J$ 的估计方式'

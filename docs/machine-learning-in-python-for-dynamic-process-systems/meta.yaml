  md: '# # Chapter 1

    Machine Learning and Dynamic Process Modeling: An Introduction


    Process industry operations are dynamic in nature. In complex process plants such
    as oil refineries, 1000s of process measurements may be recorded every second
    to capture crucial process trends. Plant engineers often employ dynamic process
    models to predict future values of process variables in applications such as process
    control, process monitoring, etc. Machine learning (ML) provides a convenient
    mechanism to bring together the dynamic process modeling (DPM) needs and the large
    data resources available in modern process plants.


    This chapter provides an overview of what ML has to offer for DPM. This chapter
    also addresses a dichotomy between ML community and DPM community. While the former
    generally tends to claim that ML has been reduced to mere execution of ‘model-fitting’
    actions, the later vouches for the need of ‘experts’ to build ‘successful’ models.
    We will attempt to reconcile these two differing viewpoints.


    Overall, this chapter provides a whirlwind tour of how the power of machine learning
    is harnessed for dynamic process modeling. Specifically, the following topics
    are covered


    +   - Introduction to dynamic process modeling and the need for machine learning

    - Typical workflow in a ML-based DPM (ML-DPM) project

    - Taxonomy of popular ML-DPM methods and models

    - Applications of DPM in process industry


    Let’s now tighten our seat-belts as we embark upon this exciting journey of de-mystifying
    machine learning for dynamic process modeling.'
  merge: -1
  pgno: 17
- img_proc: true
  md: '# 1.1 Process Systems Engineering, Dynamic Process Modeling, and Machine Learning


    Process industry is a parent term used to refer to industries like petrochemical,
    chemical, power, paper, cement, pharmaceutical, etc. These industries use processing
    plants to manufacture intermediate or final consumer products. As emphasized in
    Figure 1.1, the prime concern of the management of these plants is optimal design
    and operations, and high reliability through proactive process monitoring, quality
    control, data reconciliation, etc. All these tasks fall under the ambit of process
    systems engineering (PSE).


    ![](img/6cffacf6247d6f7caa7eacc348cef427_18_0.png)


    Figure 1.1: Overview of industries that constitute process industry and the tasks
    process systems engineers perform


    The common theme among the PSE tasks is that they all rely on reliable dynamic
    mathematical process models that can accurately predict the future state of the
    process using current and past process measurements. Therefore, DPM is one of
    the defining skills of process systems engineers. Process industry has historically
    utilized both first principles/phenomenological and empirical/data-based models
    for DPM. While the former models provide higher fidelity, the later models are
    easier to build for complex systems. The immense rise in popularity of machine
    learning/data science in recent years and exponential increase in sensor measurements
    collected at plants have led to renewed interest in ML-based DPM. Several classical
    and ‘modern’ ML methods for DPM are at a process data scientist’s disposal. The
    rest of the book will take you on a whirlwind tour of these methods. Let’s now
    jump straight into the nitty-gritty of ML-DPM.'
  merge: -1
  pgno: 18
- img_proc: true
  md: '# Components of a dynamic process model


    In the context of DPM, there are three types of variables/signals in a process
    system as shown in Figure 1.2. The measured signals that we desire to predict
    are termed outputs while the measured signals that can be manipulated to influence
    the outputs are called inputs. In industrial processes, these outputs are seldom
    solely influenced or completely explained by inputs. This unexplained component
    is attributed to the noise signals which can manifest as measurement noise or
    process noise (unmeasured disturbances or unmeasured signals that impact the system
    are often the cause of process noise). In the pH neutralization process example
    shown below, process noise corresponds to unmeasured fluctuations in the wastewater
    acidity and/or flow which causes disturbances in the process output.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_19_0.png)


    The impact of measurement and process noise can be clubbed together and explained
    via a stochastic model as shown in the figure above. The resulting disturbance
    signal summarizes all the uncertain characteristics of the process. The stochastic
    and deterministic models can be estimated simultaneously as well as separately.


    > In the engineering community, the task of building mathematical models of a
    dynamic system using measured data is called system identification (SysID). Additionally,

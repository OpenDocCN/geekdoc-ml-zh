    \ 5 个超参数，即 $n_a$、$n_b$、$n_c$、$n_d$、$d$。此外，模型拟合需要非线性优化。让我们通过一个快速示例，了解如何使用 BJ 模型对工业燃气炉系统进行建模。\n\

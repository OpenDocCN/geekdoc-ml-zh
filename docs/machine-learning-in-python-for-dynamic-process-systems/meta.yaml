  md: '# Stationarity revisited and introduction to invertibility


    In Chapter 4, we had seen how homogeneous non-stationary signals can be made stationary
    by differencing. However, it is not always easy to infer homogeneous non-stationarity
    from simple time-plots. Fortunately, ACF, PACF, and PSD plots can provide crucial
    clues. The characteristic indicators of non-stationary behavior for these graphical
    plots are provided below. You should be easily able to explain the rationale behind
    these characteristics based on the concepts we have covered so far.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_109_0.png)


    # Checking stationarity using noise transfer operator $H(q^{-1})$


    Transfer operator for the ARMA model in Eq. 6 can be written as


    $$H(q^{-1}) = \frac{1 + \sum_{j=1}^{r} c_j q^{-j}}{1 + \sum_{j=1}^{p} a_j q^{-j}}
    = \frac{C(q^{-1})}{A(q^{-1})}$$


    An ARMA model represents a stationary process if the absolute of the roots of
    $A(q^{-1})$ is greater than 1. For example, for the AR(1) process $y(k) = ay(k-1)
    + e(k)$,


    $$A(q^{-1}) = 1 - aq^{-1} \Rightarrow root = \frac{1}{a}$$

    $$\Rightarrow \text{stationarity if } \left|\frac{1}{a}\right| > 1 \Rightarrow
    |a| < 1$$


    In SysID literature, roots of $A(q^{-1})$ are called poles. Note that if degree
    of $A(q^{-1})$ or the order of autoregressive part is > 1, then poles can be complex
    numbers. Therefore, ‘poles outside the unit circle’ is the correct way of stating
    the condition of stationarity.'
  merge: -1
  pgno: 109
- img_proc: true
  md: '> Poles inside the unit circle lead to explosive non-stationarity and poles
    on the unit circle causes homogeneous non-stationarity (such as random walk process).
    MA processes have $A(q^{-1}) = 1$ and are always stationary (for finite $r$ and
    $c_j$).


    # **Invertibility**


    Another condition imposed on disturbance model to represent realistic processes
    is invertibility. The condition requires that the roots of the numerator polynomial
    ($C(q^{-1})$), also called zeros of the transfer operator, lie outside the unit
    circle. AR models have $C(q^{-1}) = 1$ and therefore, are always invertible. Without
    going into mathematical details, it suffices to know that for non-invertible models,
    it is possible to write $e(k)$ as a summation of future values of $y(k)$; such
    models are called non-causal models and do not represent realistic processes.


    # # 5.6 Autoregressive Integrated Moving Average (ARIMA) Models: An Introduction


    In Chapter 4 we saw that non-stationary signals may be modeled via stationary
    ARMA models after suitable differencing. Such difference-stationary processes
    are formalized as ARIMA processes$^{43}$ and are represented as


    ![](img/6cffacf6247d6f7caa7eacc348cef427_110_0.png)


    $^{43}$ Sometimes, modelers include a constant term $\theta_o$ in ARIMA model
    which then takes the following form $(1 - q^{-1})^d y(k) = \theta_o + \frac{C(q^{-1})}{A(q^{-1})}
    e(k)$. In Chapter 4, we had shown that a deterministic trend of degree $d$ can
    be removed with differencing $d$ times. Therefore, the inclusion of $\theta_o$
    in the model is equivalent to explicitly including a deterministic trend in the
    model.'
  merge: -1
  pgno: 110
- img_proc: true
  md: 'For example, consider a signal that becomes ARMA(1,1) stationary after first
    differencing


    ```

    $(1 - q^{-1})y(k) = \frac{1 - cq^{-1}}{1 - aq^{-1}} e(k)$  $\longleftarrow$ transfer
    operator form

    $\Rightarrow (1 - aq^{-1})(y(k) - y(k-1)) = e(k) - ce(k-1)$

    $\Rightarrow y(k) = (1+a)y(k-1) - ay(k-2) - ce(k-1) + e(k)$  $\longleftarrow$
    difference equation form

    ```


    > It should have occurred to you by now that $q$ notation makes it much easier
    to represent and work with complicated models.


    The above model is called ARIMA(p,d,r) due to the $d^{th}$ degree of differencing
    and ARMA(p,r) modeling. You can see that with suitable choice of $p$, $d$, and
    $r$, MA, AR, and ARMA models become special cases of ARIMA model.


    # Random walk model


    ![](img/6cffacf6247d6f7caa7eacc348cef427_111_0.png)


    An ARIMA(p,1,r) disturbance model is equivalent to saying that there are random
    (and temporally correlated) step changes occurring in the disturbance signal.
    A pure integrating model of order 1 (ARIMA(0,1,0), a.k.a. random walk model) takes
    the following form


    ```

    $(1 - q^{-1})y(k) = e(k) \Rightarrow y(k) = y(k-1) + e(k)$

    ```


    The integrating model is called as such because the noise values are continuously
    added to the output signal.


    # Model order selection


    The graphical tools can be used to check if differencing is needed. If the differenced
    series shows signs of AR or MA or ARMA, then no further differencing is required.
    Very rarely, you would need to choose $p$, $d$, or $r$ greater than 2.


    # Unit-root tests


    A rigorous way of checking the presence of unit pole (and therefore the need of
    differencing) is unit-root test. To understand this test, consider a simple AR(1)
    process $y(k) = ay(k-1) + e(k)$. To warrant differencing, ''a'' needs to be equal
    to 1 and therefore, in the regression model $z(k) = (a-1)y(k-1) + e(k)$ where
    $z(k) = y(k) - y(k-1)$, the coefficient a-1 would equal 0. The unit-'
  merge: -1
  pgno: 111
- img_proc: true
  md: 'root test is simply a hypothesis test on this coefficient being equal to zero.
    This is called Dickey-Fuller test.


    If you have some experience with hypothesis testing, then you would know that
    if the *p* value of the test is above a specified threshold/significance level<sup>44</sup>,
    then the (null) hypothesis (on the series under study being non-stationary) is
    not rejected. For more generic series of integrating order > 1, a more generic
    augmented Dickey-Fuller test is used. However, the test process remains the same.


    # Example 5.4:


    Generate data from AR process and perform ADF test to check for unit root.


    ```

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from statsmodels.tsa.arima_process import ArmaProcess


    # generate data

    ar_coeffs = np.array([1, -0.96]) # y(k) = 0.96y(k-1) + e(k)

    ARprocess = ArmaProcess(ar=ar_coeffs)

    y = ARprocess.generate_sample(nsample=1000)


    # perform augmented Dickey-Fuller test

    from statsmodels.tsa.stattools import adfuller

    result = adfuller(y)

    print(''p-value: %f'' % result[1])

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_112_0.png)


    >>> p-value: 0.000187


    Since the p-value is less than 0.05, the null hypothesis is rejected ⇒ the time
    series is stationary


    ![](img/6cffacf6247d6f7caa7eacc348cef427_112_1.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_112_2.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_112_3.png)


    p-value: 0


    p-value: 0.027


    p-value: 0.904'

    # 10.3 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. In the FFNN-based NARX model
    that we studied in the previous section, there is no implicit or explicit specification
    of the fact that the data is temporal/sequential in nature, i.e., $u(k-2)$ comes
    before $u(k-1)$ for example. There is no efficient mechanism to specify this temporal
    order of data in a FFNN. RNNs accomplish this by processing elements of a sequence
    recurrently and storing a hidden state that summarizes the past information during
    the processing. The basic unit in a RNN is called a RNN cell which simply contains
    a layer of neurons. Figure 10.2 shows the architecture of a RNN consisting of
    a single cell and how it processes a data sequence with ten samples.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_197_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, $y_{(i)}$, is generated at the $i^{th}$ step and then
    fed to the next step for processing along with $x_{(i+1)}$. By way of this arrangement,
    $y_{(i+1)}$ is a function of $x_{(i+1)}$ and $y_{(i)}$. Since, $y_{(i)}$ itself
    is a function of $x_{(i)}$ and $y_{(i-1)}$, $y_{(i+1)}$ effectively becomes a
    function of $x_{(i+1)}$, $x_{(i)}$, and $y_{(i-1)}$. Continuing the logic further
    implies that the final sequence output, $y_{(10)}$, is a function of all ten inputs
    of the sequence, that is, $x_{(10)}$, $x_{(9)}$,..., $x_{(1)}$. This ''recurrent''
    mechanism leads to efficient capturing of temporal patterns in data.'
- md: "## RNN outputs\n\nIf the neural layer in the RNN cell in Figure 10.2 contains\
    \ $n$ neurons ($n$ equals 4 in the shown figure), then each $y_{(i)}$ or $h_{(i)}$\
    \ is a n-dimensional vector. For simple RNN cells, $y_{(i)}$ equals $h_{(i)}$.\
    \ Let $x$ be a m-dimensional vector. At any $i^{th}$ step, we can write the following\
    \ relationship\n\n$$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$\n\nwhere $W_x\
    \ \\in R^{n \\times m}$ with each row containing the weight parameters of a neuron\
    \ as applied to $x$ vector, $W_y \\in R^{n \\times n}$ with each row containing\
    \ the weight parameters of a neuron as applied to $y$ vector, $b \\in R^n$ contains\
    \ the bias parameters, and $g$ denotes the activation function. The same neural\
    \ parameters are used at each step.\n\nIf all the outputs of the sequence are\
    \ of interest, then it is called sequence-to-sequence or many-to-many network.\
    \ However, very often only the last step output is needed, leading to sequence-to-vector\
    \ or many-to-one network. Moreover, the last step output may need to be further\
    \ processed and so a FC layer is often added. Figure 10.3 shows one such topology.\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_198_0.png)\n\n## RNN-based NARX topology\n\
    \nFigure 10.4 below shows how a potential RNN-based NARX architecture may look\
    \ like for a SISO process where three lagged measurements are used to make one-step\
    \ ahead predictions. We can observe that all the lagged measurements are not processed\
    \ simultaneously by an RNN cell which often results in less number of model parameters\
    \ when compared to a FFNN-based NARX model.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_199_0.png)\n\
    \nFigure 10.4: RNN-NARX topology for a SISO process. [Note that if the model input\
    \ vectors ($x$) are simply the process inputs ($u$) then the architecture becomes\
    \ NFIR (nonlinear FIR)].\n\n## LSTM networks\n\nRNNs are powerful dynamic models,\
    \ however, the vanilla RNN (with a single neural layer in a cell) introduced before\
    \ faces difficulty learning long-term dependencies, i.e., when number of steps\
    \ in a sequence is large (~ ≥10). This happens due to the vanishing gradient problem\
    \ during gradient backpropagation. To overcome this issue, LSTM (Long Short-Term\
    \ Memory) cells have been devised which are able to learn very long-term dependencies\
    \ (even greater than 1000) with ease. Unlike vanilla RNN cells, LSTM cells have\
    \ 4 separate neural layers as shown in Figure 10.5. Moreover, in a LSTM cell,\
    \ the internal state is stored in two separate vectors, $h_{(t)}$ or hidden state\
    \ and $c_{(t)}$ or cell state. Both these states are passed from one LSTM cell\
    \ to the next during sequence processing. $h_{(t)}$ can be thought of as the short-term\
    \ state/memory and $c_{(t)}$ as the long-term state/memory (we will see later\
    \ why), and hence the name LSTM.\n\nThe vector outputs of the FC layers interact\
    \ with each-other and the long-term state via three ‘gates’ where element-wise\
    \ multiplications occur. These gates control what information go into the long-term\
    \ and short-term states at any sequence processing step. While we will understand\
    \ the mathematical details later, for now, if suffices to know the following about\
    \ these gates:\n\n- **Forget gate** determines what parts of long-term state,\
    \ $c_{(t)}$, are retained and erased\n- **Input gate** determines what parts of\
    \ new information (obtained from processing of $x_{(t)}$ and $h_{(t-1)}$) are\
    \ stored in long-term state\n- **Output gate** determines what parts of long-term\
    \ state are passed on as short-term state\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_200_0.png)\n\
    \nFigure 10.5: Architecture of an LSTM cell. Three FC layers use sigmoid activation\
    \ functions and one FC layer uses tanh activation function. Each of these neural\
    \ layers have its own parameters $W_x$, $W_h$, and $b$\n\nThis flexibility in\
    \ being able to manipulate what information are passed down the chain during sequence\
    \ processing is what makes LSTM networks so successful at capturing long-term\
    \ patterns in sequential datasets. Consequently, LSTM networks are the default\
    \ RNNs now-a-days. In the next section we will see a quick application of RNN\
    \ for system identification using LSTM cells.\n\n## Vanilla RNN cell vs GRU cell\
    \ vs LSTM cell\n\nThere is another popular variant of RNN cell, called GRU cell.\
    \ As shown in the illustration below, GRU cell is simpler than LSTM cell. GRU\
    \ cell has 3 neural layers and its internal state is represented using a single\
    \ vector, $h_{(t)}$. For several common tasks, GRU cell-based RNN seems to provide\
    \ similar performance as LSTM cell-based RNN and therefore, it is slowly gaining\
    \ more popularity.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_201_0.png)\n\n\
    ## 10.4 Modeling Heat Exchangers using LSTM\n\nTo show how to train a LSTM network,\
    \ we will re-use the heat-exchanger dataset. We will also use *early stopping*\
    \ to optimize the number of *epochs* using validation dataset.\n\n```python\n\
    # read data\nu_fit = u[:3000,0:1]; u_val = u[3000:,0:1]\ny_fit = y[:3000,0:1];\
    \ y_val = y[3000:,0:1]\n\n# scale data before model fitting\nu_scaler = StandardScaler()\n\
    u_fit_scaled = u_scaler.fit_transform(u_fit); u_val_scaled = u_scaler.transform(u_val)\n\
    y_scaler = StandardScaler()\ny_fit_scaled = y_scaler.fit_transform(y_fit); y_val_scaled\
    \ = y_scaler.transform(y_val)\n\nX_fit_scaled = np.hstack((u_fit_scaled, y_fit_scaled))\
    \ # @ Figure 10.4\nX_val_scaled = np.hstack((u_val_scaled, y_val_scaled))\n```\n\
    \nAs shown in Figure 10.4, the input that gets supplied to the network for $y(k)$'s\
    \ prediction is a sequence of the lagged measurements. Therefore, we need to now\
    \ create these sequences. Currently, the shape of $X$ array is {# of samples,\
    \ # of features}. For RNN, this input data matrix needs to be converted into the\
    \ shape {# of sequence samples, # of time steps, # of features} such that each\
    \ entry (of shape {# of time steps, # of features}) along the $0^{th}$ dimension\
    \ is a complete sequence of past data which is used to make prediction of temperature\
    \ values. Here, the # of time steps is taken to be 9 and # of features equals\
    \ 2.\n\n```python\n# rearrange X data into (# sequence samples, # time steps,\
    \ # features) form\nnTimeSteps = 9\nX_fit_scaled_sequence = []; X_val_scaled_sequence\
    \ = []\ny_fit_scaled_sequence = []; y_val_scaled_sequence = []\n\nfor sample in\
    \ range(nTimeSteps, X_fit_scaled.shape[0]):\n    X_fit_scaled_sequence.append(X_fit_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_fit_scaled_sequence.append(y_fit_scaled[sample])\n\nfor sample in\
    \ range(nTimeSteps, X_val_scaled.shape[0]):\n    X_val_scaled_sequence.append(X_val_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_val_scaled_sequence.append(y_val_scaled[sample])\n\n# convert list\
    \ of (time steps, features) arrays into (samples, time steps, features) array\n\
    X_fit_scaled_sequence, y_fit_scaled_sequence = np.array(X_fit_scaled_sequence),\n\
    \                                              np.array(y_fit_scaled_sequence)\n\
    X_val_scaled_sequence, y_val_scaled_sequence = np.array(X_val_scaled_sequence),\n\
    \                                              np.array(y_val_scaled_sequence)\n\
    ```\n\nBasically, each block of 9 continuous rows in (scaled) $X$ array becomes\
    \ a sequence. The topology of RNN that we will build is same as that shown in\
    \ Figure 10.4, except for the number of time-steps. Like we did for FFNN modeling,\
    \ we will import relevant Keras libraries. In the code below, a LSTM RNN layer\
    \ is followed by a dense layer.\n\n```python\n# import Keras libraries\nfrom tensorflow.keras\
    \ import Sequential\nfrom tensorflow.keras.layers import LSTM\nfrom tensorflow.keras.layers\
    \ import Dense\nfrom tensorflow.keras import regularizers\n\n# define model\n\
    model = Sequential()\nmodel.add(LSTM(units=6, kernel_regularizer=regularizers.l1(0.001),\
    \ input_shape=(nTimeSteps,2)))\n# LSTM cell with 6 neurons in each of the 4 neural\
    \ layers\nmodel.add(Dense(units=1))\n# 1 neuron in output layer\n```\n\nThe above\
    \ 3-line code completely defines the structure of the required RNN. The single\
    \ neuron in the output layer does the job of transforming the 6th dimensional\
    \ hidden state vector from the last step of RNN layer into a scalar value. The\
    \ model summary below shows the number of model parameters in each layer.\n\n\
    | Layer (type) | Output Shape | Param # |\n| :--- | :--- | :--- |\n| lstm (LSTM)\
    \ | (None, 6) | 216 |\n| dense (Dense) | (None, 1) | 7 |\n| Total params: 223\
    \ | | |\n| Trainable params: 223 | | |\n| Non-trainable params: 0 | | |\n\n> In\
    \ vanilla RNN cell, we saw that $W_x \\in R^{n \\times m}$, $W_h \\in R^{n \\\
    times n}$ and, $b \\in R^n$. This leads to total number of parameters equal to\
    \ $mn + n^2 + n$. In an LSTM cell, each of the 4 neural layers have their own\
    \ set of these parameters. Therefore an LSTM cell has $4(mn + n^2 + n)$ model\
    \ parameters. In this example, we have $m = 2$ and $n = 6$; therefore we ended\
    \ up with $4(12 + 36 + 6) = 216$ model parameters in the LSTM layer.\n\nNext we\
    \ compile and fit the model.\n\n```python\n# compile and fit model with early\
    \ stopping\nfrom tensorflow.keras.callbacks import EarlyStopping\n\nmodel.compile(loss='mse',\
    \ optimizer='Adam')\nes = EarlyStopping(monitor='val_loss', patience=10, restore_best_weights=True)\n\
    history = model.fit(X_fit_scaled_sequence, y_fit_scaled_sequence, epochs=250,\
    \ batch_size=125,\n                    validation_data=(X_val_scaled_sequence,\
    \ y_val_scaled_sequence), callbacks=[es])\n```\n\nLet's now get the model predictions\
    \ and residuals on the fitting dataset and see how our residuals look like.\n\n\
    ```python\n# get model (1-step ahead) predictions and residuals on fitting dataset\n\
    y_fit_scaled_sequence_pred = model.predict(X_fit_scaled_sequence)\ny_fit_sequence_pred\
    \ = y_scaler.inverse_transform(y_fit_scaled_sequence_pred)\ny_fit_sequence = y_scaler.inverse_transform(y_fit_scaled_sequence)\n\
    residuals_fit = y_fit_sequence - y_fit_sequence_pred\n```"
  mdcn: "## RNN 输出\n\n如果图10.2中RNN单元的神经层包含$n$个神经元（图中$n$等于4），那么每个$y_{(i)}$或$h_{(i)}$都是一个n维向量。对于简单的RNN单元，$y_{(i)}$等于$h_{(i)}$。设$x$为一个m维向量。在任意第$i$步，我们可以写出以下关系式\n\
    \n$$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$\n\n其中$W_x \\in R^{n \\times\
    \ m}$，其每一行包含一个神经元应用于$x$向量的权重参数；$W_y \\in R^{n \\times n}$，其每一行包含一个神经元应用于$y$向量的权重参数；$b\
    \ \\in R^n$包含偏置参数；$g$表示激活函数。相同的神经参数在每一步都被使用。\n\n如果序列的所有输出都是我们关注的，那么它被称为序列到序列或到多到多网络。然而，很多时候只需要最后一步的输出，这就形成了序列到向量或多对一网络。此外，最后一步的输出可能需要进一步处理，因此通常会添加一个全连接层。图10.3展示了这样一种拓扑结构。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_198_0.png)\n\n## 基于RNN的NARX拓扑\n\n下面的图10.4展示了一个潜在的基于RNN的NARX架构，用于单输入单输出过程，其中使用三个滞后测量值进行一步超前预测。我们可以观察到，所有滞后测量值并非同时由一个RNN单元处理，这通常导致与基于FFNN的NARX模型相比，模型参数数量更少。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_199_0.png)\n\n图10.4：用于SISO过程的RNN-NARX拓扑。[注意，如果模型输入向量（$x$）仅仅是过程输入（$u$），那么该架构就变成了NFIR（非线性FIR）]。\n\
    \n## LSTM网络\n\nRNN是强大的动态模型，然而，之前介绍的原始RNN（单元中只有一个神经层）在学习长期依赖关系方面面临困难，即当序列中的步数很大时（约≥10）。这是由于梯度反向传播过程中的梯度消失问题造成的。为了克服这个问题，已经设计出了LSTM（长短期记忆）单元，它们能够轻松学习非常长期的依赖关系（甚至超过1000）。与原始RNN单元不同，LSTM单元有4个独立的神经层，如图10.5所示。此外，在LSTM单元中，内部状态存储在两个独立的向量中：$h_{(t)}$（隐藏状态）和$c_{(t)}$（单元状态）。在序列处理过程中，这两个状态都从一个LSTM单元传递到下一个。$h_{(t)}$可以看作是短期状态/记忆，而$c_{(t)}$是长期状态/记忆（我们稍后会看到原因），因此得名LSTM。\n\
    \n全连接层的向量输出通过三个“门”相互作用并与长期状态交互，这些门中发生逐元素乘法。这些门控制在任何序列处理步骤中，哪些信息进入长期和短期状态。虽然我们稍后会理解数学细节，但现在只需了解这些门的以下信息：\n\
    \n- **遗忘门**决定长期状态$c_{(t)}$的哪些部分被保留和擦除\n- **输入门**决定新信息（从处理$x_{(t)}$和$h_{(t-1)}$获得）的哪些部分被存储在长期状态中\n\
    - **输出门**决定长期状态的哪些部分作为短期状态传递\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_200_0.png)\n\
    \n图10.5：LSTM单元的架构。三个全连接层使用sigmoid激活函数，一个全连接层使用tanh激活函数。每个神经层都有自己的参数$W_x$、$W_h$和$b$。\n\
    \n这种在序列处理过程中能够操纵哪些信息被传递下去的灵活性，正是LSTM网络在捕捉序列数据集中的长期模式方面如此成功的原因。因此，LSTM网络是当今默认的RNN。在下一节中，我们将看到使用LSTM单元进行系统辨识的RNN快速应用。\n\
    \n## 原始RNN单元 vs GRU单元 vs LSTM单元\n\n还有另一种流行的RNN单元变体，称为GRU单元。如下图所示，GRU单元比LSTM单元更简单。GRU单元有3个神经层，其内部状态用单个向量$h_{(t)}$表示。对于几个常见任务，基于GRU单元的RNN似乎提供了与基于LSTM单元的RNN相似的性能，因此，它正慢慢获得更多的普及。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_201_0.png)\n\n## 10.4 使用LSTM对换热器建模\n\
    \n为了展示如何训练LSTM网络，我们将重用换热器数据集。我们还将使用*早停法*来优化*训练轮数*，使用验证数据集。\n\n```python\n# read\
    \ data\nu_fit = u[:3000,0:1]; u_val = u[3000:,0:1]\ny_fit = y[:3000,0:1]; y_val\
    \ = y[3000:,0:1]\n\n# scale data before model fitting\nu_scaler = StandardScaler()\n\
    u_fit_scaled = u_scaler.fit_transform(u_fit); u_val_scaled = u_scaler.transform(u_val)\n\
    y_scaler = StandardScaler()\ny_fit_scaled = y_scaler.fit_transform(y_fit); y_val_scaled\
    \ = y_scaler.transform(y_val)\n\nX_fit_scaled = np.hstack((u_fit_scaled, y_fit_scaled))\
    \ # @ Figure 10.4\nX_val_scaled = np.hstack((u_val_scaled, y_val_scaled))\n```\n\
    \n如图10.4所示，为预测$y(k)$而提供给网络的输入是滞后测量值的序列。因此，我们现在需要创建这些序列。目前，$X$数组的形状是{样本数，特征数}。对于RNN，这个输入数据矩阵需要转换为形状{序列样本数，时间步数，特征数}，使得沿$0^{th}$维度的每个条目（形状为{时间步数，特征数}）都是一个完整的过去数据序列，用于预测温度值。这里，时间步数取为9，特征数等于2。\n\
    \n```python\n# rearrange X data into (# sequence samples, # time steps, # features)\
    \ form\nnTimeSteps = 9\nX_fit_scaled_sequence = []; X_val_scaled_sequence = []\n\
    y_fit_scaled_sequence = []; y_val_scaled_sequence = []\n\nfor sample in range(nTimeSteps,\
    \ X_fit_scaled.shape[0]):\n    X_fit_scaled_sequence.append(X_fit_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_fit_scaled_sequence.append(y_fit_scaled[sample])\n\nfor sample in\
    \ range(nTimeSteps, X_val_scaled.shape[0]):\n    X_val_scaled_sequence.append(X_val_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_val_scaled_sequence.append(y_val_scaled[sample])\n\n# convert list\
    \ of (time steps, features) arrays into (samples, time steps, features) array\n\
    X_fit_scaled_sequence, y_fit_scaled_sequence = np.array(X_fit_scaled_sequence),\n\
    \                                              np.array(y_fit_scaled_sequence)\n\
    X_val_scaled_sequence, y_val_scaled_sequence = np.array(X_val_scaled_sequence),\n\
    \                                              np.array(y_val_scaled_sequence)\n\
    ```\n\n基本上，（缩放后的）$X$数组中每9个连续行组成一个序列。我们将构建的RNN拓扑与图10.4所示的相同，只是时间步数不同。就像我们为FFNN建模所做的那样，我们将导入相关的Keras库。在下面的代码中，一个LSTM\
    \ RNN层后面跟着一个密集层。\n\n```python\n# import Keras libraries\nfrom tensorflow.keras\
    \ import Sequential\nfrom tensorflow.keras.layers import LSTM\nfrom tensorflow.keras.layers\
    \ import Dense\nfrom tensorflow.keras import regularizers\n\n# define model\n\
    model = Sequential()\nmodel.add(LSTM(units=6, kernel_regularizer=regularizers.l1(0.001),\
    \ input_shape=(nTimeSteps,2)))\n# LSTM cell with 6 neurons in each of the 4 neural\
    \ layers\nmodel.add(Dense(units=1))\n# 1 neuron in output layer\n```\n\n上面的3行代码完全定义了所需RNN的结构。输出层中的单个神经元负责将RNN层最后一步的6维隐藏状态向量转换为一个标量值。下面的模型摘要显示了每一层的模型参数数量。\n\
    \n| 层（类型） | 输出形状 | 参数数量 |\n| :--- | :--- | :--- |\n| lstm (LSTM) | (None, 6) |\
    \ 216 |\n| dense (Dense) | (None, 1) | 7 |\n| 总参数：223 | | |\n| 可训练参数：223 | | |\n\
    | 不可训练参数：0 | | |\n\n> 在原始RNN单元中，我们看到$W_x \\in R^{n \\times m}$，$W_h \\in R^{n\
    \ \\times n}$，$b \\in R^n$。这导致总参数数量等于$mn + n^2 + n$。在LSTM单元中，4个神经层中的每一层都有自己的一组这些参数。因此，一个LSTM单元有$4(mn\
    \ + n^2 + n)$个模型参数。在这个例子中，我们有$m = 2$和$n = 6$；因此我们最终在LSTM层中有$4(12 + 36 + 6) = 216$个模型参数。\n\
    \n接下来我们编译并拟合模型。\n\n```python\n# compile and fit model with early stopping\nfrom\
    \ tensorflow.keras.callbacks import EarlyStopping\n\nmodel.compile(loss='mse',\
    \ optimizer='Adam')\nes = EarlyStopping(monitor='val_loss', patience=10, restore_best_weights=True)\n\
    history = model.fit(X_fit_scaled_sequence, y_fit_scaled_sequence, epochs=250,\
    \ batch_size=125,\n                    validation_data=(X_val_scaled_sequence,\
    \ y_val_scaled_sequence), callbacks=[es])\n```\n\n现在让我们获取模型在拟合数据集上的预测值和残差，看看我们的残差是什么样子。\n\
    \n```python\n# get model (1-step ahead) predictions and residuals on fitting dataset\n\
    y_fit_scaled_sequence_pred = model.predict(X_fit_scaled_sequence)\ny_fit_sequence_pred\
    \ = y_scaler.inverse_transform(y_fit_scaled_sequence_pred)\ny_fit_sequence = y_scaler.inverse_transform(y_fit_scaled_sequence)\n\
    residuals_fit = y_fit_sequence - y_fit_sequence_pred\n```"

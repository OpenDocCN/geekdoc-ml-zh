  md: 'Pre-requisites


    No prior experience with machine learning or Python is needed. Undergraduate-level
    knowledge of basic linear algebra and calculus is assumed.


    # Book organization


    Under the broad theme of ML for process systems engineering, this book is an extension
    of the first book of the series (which dealt with fundamentals of ML and its varied
    applications in process industry); however, it can also be used as a standalone
    text. To give due treatment to various aspects of SysID, the book has been divided
    into three parts. **Part 1** of the book provides a perspective on the importance
    of ML for dynamic process modeling and lays down the basic foundations of ML-DPM
    (machine learning for dynamic process modeling). **Part 2** provides in-detail
    presentation of classical ML techniques and has been written keeping in mind the
    different modeling requirements and process characteristics that determine a model''s
    suitability for a problem at hand. These include, amongst others, presence of
    multiple correlated outputs, process nonlinearity, need for low model bias, need
    to model disturbance signal accurately, etc. **Part 3** is focused on artificial
    neural networks and deep learning. While deep learning is the current buzzword
    in ML community, we would like to caution the reader against the temptation to
    deploy a deep learning model for every problem at hand. For example, the models
    covered in Part 2 still dominate the portfolio of models used in industrial controllers
    and can often provide comparable (or even superior) performance compared to ANNs
    with relatively less hassle.


    # Symbol notation


    The following notation has been adopted in the book for representing different
    types of variables:


    +   - lower-case letters refer to vectors ($x \in \mathbb{R}^{m \times 1}$) and
    upper-case letters denote matrices ($X \in \mathbb{R}^{n \times m}$)

    - individual element of a vector and a matrix are denoted as $x_j$ and $x_{ij}$,
    respectively.

    - any $i^{\text{th}}$ vector in a dataset gets represented as subscripted lower-case
    letter (e.g., $x_i \in \mathbb{R}^{m \times 1}$). Its distinction from an individual
    element $x_j$ would be clear from the corresponding context.'

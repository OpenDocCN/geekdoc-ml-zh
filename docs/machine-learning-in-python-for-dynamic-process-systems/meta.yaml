  md: '+   > The regulatory control layer primarily comprises of (PID) control valves.
    Potential DPM applications may involve usage of soft-sensor for estimation of
    difficult-to-measure controlled variables.


    > The multivariable control layer usually consists of MPC and RTO modules. Here,
    dynamic models representing multivariable relationships between plant variables
    are used to ensure optimal operations of the plant. Another interesting application
    is development of operator training simulators (OTSs) for training plant operators.


    > The process diagnostics layer ensures timely fault detection and diagnostics.
    Here, process measurements can be compared against predictions from dynamic models
    to check for presence of process abnormalities.


    > The production scheduling layer has dynamic models to determine short-term optimal
    production schedules using forecasts of product demand and/or raw-material cost.


    This concludes our quick attempt to establish the connection between process industry,
    dynamic process modeling, and machine learning. It must now be obvious to you
    that modern process industry relies heavily on dynamic process modeling to achieve
    its objectives of reducing maintenance costs, and increasing productivity, reliability,
    safety, and product quality. ML-based DPM helps build tools quickly to facilitate
    achieving these objectives.


    This introductory chapter has also cautioned against blind application of ‘convenient’
    ML models for dynamic modeling. Your process data will throw several questions
    at you at each stage of system identification. No straightforward answers exist
    to these questions and only some time-tested guiding principles are available.
    While the rest of the book will familiarize you with these principles, the onus
    still lies on you to use your process insights and SysID'

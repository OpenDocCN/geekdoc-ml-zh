    \    y_augment_test_scaled_sim[sample] = sim_response\n\ny_augment_test_sim =\
    \ y_scaler.inverse_transform(y_augment_test_scaled_sim)\n```\n\n下面的图展示了FFNN-NARX模型的1步超前预测和无限步超前预测（仿真响应）。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_195_0.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_195_1.png)\n\
    \n至此，我们已经了解到不应为良好的1步超前预测而过于兴奋。然而，看到良好的仿真响应是令人鼓舞的，尽管它不如1步超前预测<sup>82</sup>那样好，但它能够匹配原始测量值的起伏。\n\
    \n<sup>82</sup> 你可能会注意到你的结果与本章所示结果之间存在一些细微差异，这是由于网络拟合算法的随机性所致。\n\n## 理解FFNN中的数据流\n\
    \n如果你对上一节开发的模型执行命令 *model.summary()*，你将看到以下信息，详细说明了网络每一层需要估计的参数数量。让我们理解这些数字是如何获得的，这将有助于阐明FFNN中的信息流。\n\
    \n| 层 (类型) | 输出形状 | 参数数量 |\n|---|---|---|\n| dense_3 (Dense) | (None, 14) | 182\
    \ |\n| dense_4 (Dense) | (None, 7) | 105 |\n| dense_5 (Dense) | (None, 1) | 8\
    \ |\n| 总参数: 295 | | |\n| 可训练参数: 295 | | |\n| 不可训练参数: 0 | | |\n\n我们知道每个增广输入样本是12维的\
    \ ($u_{aug} \\in R^{12}$)。在前向传播（也称为前向传播）中，增广输入首先由第一隐藏层的神经元处理。在该层的第 $j$ 个神经元中，输入的加权和通过激活函数\
    \ $g$ 进行非线性变换，\n\n$$a_j = g(w_j^T u_{aug} + b_j)$$\n\n$w_j \\in R^{12}$ 是应用于输入的权重，$b_j$\
    \ 是添加到和中的偏置。因此，每个神经元有13个参数（12个权重和一个偏置），导致第 $1$ 层所有14个神经元需要估计182个参数。所有14个神经元的输出形成向量\
    \ $a^{(1)} \\in R^{14}$\n\n$$a^{(1)} = g^{(1)}(W^{(1)}u_{aug} + b^{(1)})$$\n\n\
    其中 $W^{(1)} \\in R^{14 \\times 12}$ 的每一行包含一个神经元的权重。同一层的所有神经元使用相同的激活函数。$a^{(1)}$\
    \ 成为第 $2$ 隐藏层的输入。\n\n$$a^{(2)} \\in R^7 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$$\n\
    \n其中 $W^{(2)} \\in R^{7 \\times 14}$。第 $2$ 层中的每个神经元有14个权重和一个偏置参数，导致该层有105个参数。最终的输出层有一个神经元，有8个参数且没有激活函数，给出网络输出如下\n\
    \n$$a^{(3)} = \\hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$$\n\n其中 $w^{(3)} \\in R^7$。\n\
    \n## 10.3 RNN：简介\n\n循环神经网络（RNN）是用于处理序列数据的人工神经网络，其中数据的出现顺序具有重要意义。在我们上一节研究的基于FFNN的NARX模型中，没有隐式或显式地指定数据本质上是时间性/顺序性的事实，例如\
    \ $u(k-2)$ 出现在 $u(k-1)$ 之前。在FFNN中没有有效的方法来指定这种数据的时间顺序。RNN通过循环处理序列元素并在处理过程中存储一个总结过去信息的隐藏状态来实现这一点。RNN中的基本单元称为RNN单元，它简单地包含一层神经元。图10.2展示了一个由单个单元组成的RNN架构，以及它如何处理一个包含十个样本的数据序列。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_197_0.png)\n\n我们可以看到，这十个样本是按照它们出现的顺序处理的，而不是一次性处理。在第\
    \ $i$ 步生成一个输出 $y_{(i)}$，然后与 $x_{(i+1)}$ 一起馈送到下一步进行处理。通过这种安排，$y_{(i+1)}$ 是 $x_{(i+1)}$\
    \ 和 $y_{(i)}$ 的函数。由于 $y_{(i)}$ 本身是 $x_{(i)}$ 和 $y_{(i-1)}$ 的函数，$y_{(i+1)}$ 实际上成为\
    \ $x_{(i+1)}$、$x_{(i)}$ 和 $y_{(i-1)}$ 的函数。进一步推导意味着最终的序列输出 $y_{(10)}$ 是序列所有十个输入的函数，即\
    \ $x_{(10)}$、$x_{(9)}$,..., $x_{(1)}$。这种“循环”机制能够有效地捕捉数据中的时间模式。"

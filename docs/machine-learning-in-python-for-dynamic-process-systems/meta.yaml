    ```\n\n$$G(q^{-1}) = \\frac{0.6999q^{-1}}{1 - 0.6988q^{-1}} \\quad ; \\quad H(q^{-1})\
    \ = \\frac{1}{1 - 0.6988q^{-1}}$$\n\n$$\\Delta y(k) = \\frac{0.6999q^{-1}}{1 -\
    \ 0.6988q^{-1}} \\Delta u(k) + \\frac{1}{1 - 0.6988q^{-1}} e(k)$$\n\n$$y(k) =\
    \ \\frac{0.6999q^{-1}}{1 - 0.6988q^{-1}} u(k) + \\frac{1}{(1 - q^{-1})(1 - 0.6988q^{-1})}\
    \ e(k)$$\n\n我们已经获得了对真实过程非常接近的估计！差分后的输入和输出序列可能看起来非常不同，但正如本例所示，它们遵循相同的确定性关系。\n\n\
    ## 如何选择模型结构？\n\n面对众多可用的模型，你完全有理由问：“如何为我的系统选择最佳模型？”不幸的是，没有明确的答案。然而，本章和前几章涵盖的概念可以帮助你选择正确的路径来找到答案，最重要的是，理解选择任何模型结构的含义。\n\
    \n一个简单的方法可能是尝试拟合一个通用的 ARIMAX 模型，但这并不是一个明智的做法，因为由于数据噪声，你最终可能会在 G 和 H 算子中得到不存在的动态。获得最简单、最简约的模型应该是你的指导原则！通常，模型结构的选择在很大程度上取决于你对系统的先验信息/见解的程度，特别是关于扰动信号的，例如噪声是在过程早期还是晚期进入，或者扰动是否有漂移趋势。另一个主要的选择标准是最终目标：你可能只对确定性模型感兴趣（例如用于仿真），或者也对噪声模型感兴趣（以获得更好的预测）。当然，信噪比、可用数据量以及估计的难易程度也是关键的决定因素。\n\

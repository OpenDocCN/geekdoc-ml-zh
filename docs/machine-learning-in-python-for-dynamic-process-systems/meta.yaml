    \ optimizer='Adam') # mean-squared error is to be minimized\nmodel.fit(u_augment_fit_scaled,\
    \ y_augment_fit_scaled, epochs=250, batch_size=125)\n```\n\n现在让我们获取模型在训练数据集上的预测值和残差，并看看残差的情况。\n\
    \n```python\n# get model (1-step ahead) predictions and residuals on training\
    \ dataset\ny_augment_fit_scaled_pred = model.predict(u_augment_fit_scaled)\ny_augment_fit_pred\
    \ = y_scaler.inverse_transform(y_augment_fit_scaled_pred)\ny_augment_fit = y_scaler.inverse_transform(y_augment_fit_scaled)\n\
    residuals_fit = y_augment_fit - y_augment_fit_pred\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_193_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_193_1.png)\n\n结果与多项式-NARX模型所见相似。CCF图中置信区间的轻微突破表明需要添加更多滞后变量作为模型输入。然而，作为建模者，你必须在使模型更复杂与评估轻微模型不准确性的可接受性之间做出判断。为了检查模型是否有用，让我们再次检查模型在测试数据集上的仿真响应。我们首先需要将测试数据整理成适当的形式。\n\
    \n```python\n# rearrange u and y data into (# sequence samples, # lagged regressors)\

  md: "# 5.4 Autoregressive Moving Average (ARMA) Models: An Introduction\n\nSometimes\
    \ a more compact and parsimonious model (compared to AR or MA models) can be built\
    \ by combining the autoregressive and moving average terms. Such models are called\
    \ ARMA models and take the following form\n\n$$y(k) = -a_1y(k-1) \\cdots - a_py(k-p)\
    \ + c_1e(k-1) \\cdots + c_re(k-r) + e(k)$$\n\n$$= \\left(-\\sum_{j=1}^{p} a_j\
    \ q^{-j}\\right)y(k) + \\left(\\sum_{j=1}^{r} c_j q^{-j}\\right)e(k) + e(k) \\\
    quad \\text{eq. 6}$$\n\nAR terms \nMA terms\n\nThe above model is called ARMA(p,r)\
    \ due to the $p^{th}$ order autoregressive component and $r^{th}$ order moving\
    \ average component. It is apparent that AR and MA models are special cases of\
    \ ARMA model. Additionally, any stationary and invertible ARMA model can equivalently\
    \ be rewritten an AR($\\infty$) or a MA($\\infty$) model.\n\nARMA models are not\
    \ just for mathematical convenience but are commonly encountered in process industry.\
    \ To see the reason, consider an example scenario below where output from a pure\
    \ AR process is contaminated by a random white noise disturbance\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_102_0.png)\n\
    \n$$y(k) = a(y(k-1) - e(k-1)) + e(k)$$\n$$\\Rightarrow y(k) = ay(k-1) - ae(k-1)\
    \ + e(k)$$\nOverall, an ARMA(1,1) process!"

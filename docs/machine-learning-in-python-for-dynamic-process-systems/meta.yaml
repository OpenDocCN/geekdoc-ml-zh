  - '[PAGE 76]


    # Differencing


    An alternative and more preferable approach to dealing with non-stationary signals
    is differencing wherein consecutive samples of the signal are differenced to obtain
    stationary signals<sup>25</sup>. Post differencing, any suitable stationary model
    can be fitted to the differenced series. For example, consider a random walk process.
    Let $z(k)$ be the differenced signal where


    $$z(k) = y(k) - y(k-1)$$

    $$\Rightarrow z(k) = e(k) \quad \text{Stationary signal!}$$


    ![](img/6cffacf6247d6f7caa7eacc348cef427_76_0.png)


    Sometimes differencing once is not enough and higher-order differencing may be
    needed to produce stationary signals. For example, consider the following


    $$y(k) = 2y(k-1) - y(k-2) + e(k)$$

    $$\Rightarrow z(k) = y(k) - y(k-1) = y(k-1) - y(k-2) + e(k)$$

    $$\Rightarrow z(k) = z(k-1) + e(k)$$

    $$\Rightarrow z(k) - z(k-1) = e(k) \quad \Rightarrow \text{Stationary signal obtained
    after differencing 2 times}$$


    For input-output dataset, you won''t have access to the disturbance signal directly.
    The recourse to get rid of non-stationarities in disturbance signals ($v(k)$)
    is to difference both the input and output signals and build a model between the
    difference signals. An example is shown below


    $$\Delta y(k) = y(k) - y(k-1) \qquad \Delta u(k) = u(k) - u(k-1)$$

    $$\Delta y(k) = 0.3\Delta y(k-1) + 1.2\Delta u(k-1) + e(k) \quad \Leftarrow \text{ARX
    model fitted between the differenced signals}$$'
  - '[PAGE 77]


    The above approach implicitly differences the disturbances and it can be shown
    that the deterministic model between $y$ and $u$ is same as that between $\Delta
    y$ and $\Delta u$. We will see how this happens in Chapter 7.


    # Detrending vs differencing


    ![](img/6cffacf6247d6f7caa7eacc348cef427_77_0.png)


    Differencing can also handle signals with deterministic trends. Two scenarios
    are shown below


    | First order/single degree differencing (handling linear trend) | Second order/second
    degree differencing (handling quadratic trend) |

    | :--- | :--- |

    | $y(k) = a + bk + e(k)$ | $y(k) = a + bk + ck^2 + e(k)$ |

    | $\Rightarrow y(k) - y(k-1) = b + e(k)$ | $\Rightarrow y(k) - y(k-1) = (b-c)
    + 2ck - e(k-1) + e(k)$ |

    | Stationary with mean $b$ | $\underbrace{\quad\quad\quad\quad}_{z(k)}$ |

    | | $\Rightarrow z(k) - z(k-1) = 2c + e(k-2) - 2e(k-1) + e(k)$ |

    | | Stationary with mean $2c$ |


    In general, a polynomial trend of degree $p$ can be handled through $p^{th}$ order
    differencing.


    Because differencing can handle trends and does not involve estimation of trend
    parameters, it is preferred over detrending. However, differencing makes signals
    noisier$^{26}$ and reduces the SNR values, and therefore can result in inaccurate
    models. Therefore, one should not go crazy with differencing! Over-differencing
    can do more harm than good. For process systems, you will rarely need to go beyond
    $2^{nd}$ degree differencing.


    Detrending and differencing are not the only transformations out there. Sometimes
    taking logarithms and then differencing can do the trick of making signals stationary.
    However, simple differencing works well with most of the datasets. With this,
    we complete our quick look at pre-treatment of dynamic signals.$^{27}$ Next, we
    will look at some guidelines around candidate model selection.


    $^{26}$ Differencing is equivalent to high-pass filtering

    $^{27}$ We have not covered outlier removal in this book. For dynamic dataset,
    outliers are handled via univariate outlier removal methods on individual signals
    or on residuals (obtained after model fitting). The first book of the series covers
    these methods in detail.'
  - '[PAGE 78]


    # 4.4 Model Structure Selection


    Model structure selection refers to two subtasks:


    +   a) Selection of the model type – for example, choosing between ARX, ARMAX,
    state-space, RNN models, etc.

    b) Choosing the size of the model – for example, the number of terms/parameters
    in difference equation models, the order of the state-space model, the number
    of neurons in a neural network model.


    While systematic procedures exist for the later subtask, the former is very subjective
    and relies heavily on the prior knowledge about the system. We had previously
    seen in Chapter 1 that a wrong selection of model type can lead to inaccurate
    model parameters. Therefore, it is good to be aware of some considerations that
    experienced process modelers make regarding model type selection.


    > Principle of parsimony

    Principle of parsimony should be your guiding mantra during model structure selection.
    It states that you should not use any more parameters than necessary for adequate
    representation of your process. The simple rationale is that higher parameter
    dimensionality leads to greater chances of over-fitting and bad predictive ability,
    and higher computational complexity. This advice also translates to using the
    simplest model (and not necessarily the most generic model) first that meets the
    modeling purposes.


    Figure below lists some aspects that you may consider during model structure selection.
    To keep our discussion simple, we will adopt a qualitative rather than quantitative
    approach. Hopefully, this discussion will help you appreciate why we have so many
    model types and make you pay more attention during model selection.'
  - '[PAGE 79]


    ![](img/6cffacf6247d6f7caa7eacc348cef427_79_0.png)


    Figure 4.5: Considerations and insights that guide model structure selection²⁸


    # Ease of estimation


    Very often the choice of the model type is based on the ease with which a model
    can be quickly specified and fitted. For example, models like ARX and FIR are
    linear-in-parameters and therefore may be preferred over ARMAX or OE models which
    involve nonlinear optimization for parameter optimization. Difference equations
    like AR and ARMAX need users to specify a number of model hyper-parameters such
    as the deadtime, the number of regressive terms, etc. Alternatively, state-space
    models do not require much *a priori* parameter specification.


    In the upcoming chapters, you will learn the pros and cons of these different
    model types so that you can judiciously decide if the modeling convenience over-weighs
    the model''s shortcomings.'
  - '[PAGE 80]


    # End use of model


    We had previously alluded to data pre-treatment techniques being dictated by the
    end use of the model. However, the model’s end use also dictates the model type
    selection. For example, if you are mainly interested in the deterministic portion
    of the process model (for say simulation purposes), then you are better-off with
    OE models rather than ARX models. If you are building a monitoring tool, then
    CVA models may be your preference. A good knowledge of a model’s properties can
    help you decide if it suits your purpose or not.


    # Model bias considerations


    As a process modeler, you should be aware of how your modeling choices influence
    the consistency/bias/accuracy of your model. An incorrect specification of stochastic
    component of the model can lead to biased parameter estimates of the deterministic
    component even if you have correctly specified the deterministic model (as seen
    before in Chapter 1). You should keep the following rules in mind (for open-loop
    and PEM models) to guide your modeling choice<sup>29 30</sup>.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_80_0.png)


    The takeaway message for now is that paying attention to stochastic component
    of the model is not just some unnecessary exercise that can be ignored for convenience.'
  - '[PAGE 81]


    # Model bias and variance


    Errors during SysID is often characterized via two terms, viz, variance and bias.
    Variance refers to the variability in parameter estimates when model is fitted
    with different records of data. Variance occurs due to noise and limited records
    of data. Infact, theoretically, variance goes to zero for infinite amount data.
    You may have heard the statement “An overfitted model has high variance”: it essentially
    means that an overfitted model’s parameters may end up with significantly different
    values when trained with a different training dataset.


    Bias refers to the systematic errors due to deficiencies in the model structure.
    The model cannot truly characterize the process and therefore, bias errors do
    not vanish even with large training dataset. The statement “An underfitted model
    has high bias” simply means that an underfitted model’s parameters are far away
    from their true values. In summary, while variance quantifies the precision of
    parameter estimates, bias quantants the accuracy.


    Consider the following scenario for illustration:


    ![](img/6cffacf6247d6f7caa7eacc348cef427_81_0.png)


    # Process characteristics


    Very often the process characteristics and your insights about the process will
    help in model type selection. For example, if you have reasons to believe that
    your process can be divided into distinct linear and nonlinear blocks, then block-structured
    nonlinear models may be preferred over NARX or ANNs. Furthermore, insights about
    the origin of nonlinearity can help you further decide between Hammerstein and
    Wiener models. If your process has multiple outputs, then state-space models may
    be preferred over difference-equation models for better parameter efficiency.


    When you will be introduced to the different model structures later, special focus
    would be on highlighting specific properties of the models that make them more
    suitable to certain processes.'
- md: '## Noise characteristics


    Our discussion till now must have impressed upon you the interplay between the
    stochastic and deterministic parts of a process model and the need to model process
    disturbances carefully. Insights on where exactly noise enters the system (at
    the input, middle, or output of the process) or whether the stochastic and deterministic
    parts share dynamics, etc. can help you describe the impact of noise on the plant
    better and therefore obtain more accurate models. If you don''t have much prior
    information on the process noise, then don''t worry; just make your best guess
    on the model type and then iterate using inferences from model quality checks.


    As you work more with different model structures, you will naturally become better
    at model structure selection. You will also begin to appreciate why there is such
    a large collection of model types.


    ## 4.5 Model ID and Performance Assessment


    Model ID entails estimation of parameters (denoted by vector $\theta$) of the
    chosen model. This problem can formally be presented as follows: let the following
    input-output data be given


    $Y^N = \{y(k) = y(0), y(1), ..., y(N-1)\}$

    $U^N = \{u(k) = u(0), u(1), ..., u(N-1)\}$


    and let $\hat{y}(k)$ be the sequence of predicted values and $\varepsilon(k)$
    be the prediction error (also called residuals)


    $\varepsilon(k) = y(k) - \hat{y}(k)$


    Parameters $\theta$ are estimated by imposing certain conditions on the error
    sequence. For example, PEM method tries to minimize the mean-squared values of
    $\varepsilon(k)$, i.e.,


    $\hat{\theta} = \min_{\theta} \frac{1}{N} \sum_{k} \varepsilon(k)^2$


    Mean-squared prediction errors are also used to measure the performance of the
    model on training data and validation/test data. Coefficient of determination
    ($R^2$) is another popular performance measure.


    ## 1-step ahead vs m-step ahead prediction


    The error in Eq. 1 is formally defined as 1-step ahead error or $\varepsilon(k|k-1)$.
    This basically implies that all past measurements up to time $k-1$ are utilized
    to generate predictions $\hat{y}(k|k-1)$ and then errors are computed. To see
    a potential problem with 1-step ahead errors, consider the following trivial model


    $\hat{y}(k) = y(k-1)$  ◀ Prediction = last output measurement


    For a slow changing process (which most of the process systems are), the above
    trivial model can be deceptively impressive as shown below


    ![](img/6cffacf6247d6f7caa7eacc348cef427_83_0.png)


    > **Conclusion:** Good match between plant observations and 1-step ahead predictions
    should not be the sole criteria of model adequacy check. Statistical analysis
    of errors is indispensable.


    An alternative to $\varepsilon(k|k-1)$ during parameter estimation and performance
    assessment is to use m-step ahead prediction errors, $\varepsilon(k|k-m)$, where
    output measurements only up to time $k-m$ (i.e., $y(k-m)$, $y(k-m-1)$, ...) are
    used and inputs up to time $k-1$ are used as needed by the model. The model may
    use the predictions $\hat{y}$ recursively to arrive at the final $\hat{y}(k|k-m)$.


    Analyzing the long-range or $m$-step ahead predictions is one of the components
    of model quality checks. As far as model fitting measure is concerned, 1-step
    ahead error is still the popular choice primarily due to the ease of computation
    and eventual minimization.


    ## Model order selection


    For most models, you need to specify the model size/order before you perform model
    ID. However, most likely, you would not know beforehand the correct size of your
    chosen model. The common recourse is to experiment with different model orders
    and select the one that minimizes the prediction errors. However, be careful that
    the prediction errors on the model fitting dataset will monotonically decrease
    as you increase the model order or the number of model parameters. The best practice,
    instead, is to use a fresh dataset, called validation dataset, to assess the model''s
    performance on unseen data (not used during parameter estimation) as shown in
    Figure 4.6 below. This approach is called cross-validation.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_84_0.png)


    > You may notice that the samples in validation dataset are not obtained by shuffling
    and randomly choosing samples from the training dataset (as is done typically
    for static modeling). As should be obvious, this is done to maintain the chronological
    order of observation samples in fitting and validation datasets.


    Another related approach is to carve out multiple sets of validation datasets
    from your original dataset and compute the performance measure as the average
    performance over these sets as shown in Figure 4.7. This is called k-fold cross-validation.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_85_0.png)


    Figure 4.7: Illustration of 3-fold cross-validation procedure


    ## Model order selection via information criteria


    A popular alternative to cross-validation for model order selection is to use
    performance measure like Akaike information criteria (AIC) or Bayesian information
    criteria (BIC).


    $$AIC(\theta) = N \ln \left[ \frac{1}{N} \sum_{k} \varepsilon(k, \theta)^2 \right]
    + 2n$$


    $$BIC(\theta) = N \ln \left[ \frac{1}{N} \sum_{k} \varepsilon(k, \theta)^2 \right]
    + n \ln (N)$$


    Where, n = number of model parameters

    N = number of observations in training dataset


    As you can see, these criteria try to find a balance between model accuracy and
    model complexity. No separate validation dataset is used here, and the model order
    corresponding to the minimum AIC (or BIC) is selected. Most of the SysID packages
    provide native support for automated model order selection using these information
    criteria. You will see applications of AIC-based SysID in the later chapters.


    ## 4.6 Model Quality Check and Diagnostics


    The discussion in the previous section has taught us that ‘closeness’ between
    predicted and measured outputs should not be construed as the sole definite proof
    of a ‘good’ model. Instead, the model needs to be further scrutinized carefully
    to ascertain that the model has truly picked up all the ‘predictable’ variations
    in the training dataset and adequately represents the process. If otherwise, you
    can look for clues for further improvement. Let’s now look at some of the model
    quality check activities.


    ## Residual analysis


    Residuals are essentially the part of model fitting data that could not be explained
    by the model. Therefore, residual analysis entails checking that there remains
    no systematic variation in the residual sequence; if it does then the leftover
    systematic variations can further be modeled to improve the overall model predictions.
    The following two properties are desired for $\varepsilon(k)$


    - 1) $\varepsilon(k)$ should be white noise, i.e., autocorrelation coefficients
    should be close to zero$^{31}$

    - 2) $\varepsilon(k)$ should be uncorrelated to input $u(k)^{32}$


    For condition (1)$^{33}$, ACF plot is generated (with about 20 lags). The correlation
    coefficients (except for lag zero) are expected to be within some threshold -
    usually corresponding to 95% significance level which is given by $\pm 1.96/\sqrt{N}$.
    If condition (1) is violated, then it is implied that the model could be improved
    further; however, no specific clues are provided about the specific recourse for
    improvement. A generic advice is to try more complex stochastic model for the
    disturbance signal.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_86_0.png)


    > $^{31}$ If the disturbance signals are not modeled (such as for OE models),
    then this condition is not checked.

    > $^{32}$ Either of $\varepsilon(k)$ or $u(k)$ should be white for this condition.

    > $^{33}$ Quantitative statistical tests (such as Ljung-Box test) also exist to
    check if the residuals indicate a lack of fit


    For condition (2), CCF plot is generated along with thresholds (again, ±1.96/√N
    for 95% confidence interval). If greater than 5% correlations (for lags > 0) violate
    the thresholds, then it implies that there still exist some variations in ε(k)
    that stem from u(k) and therefore the deterministic part of the model can further
    be improved. A hypothetical CCF plot below show some examples of inferences drawn
    when condition (2) is not met³⁴.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_87_0.png)


    Significant correlations at negative lags imply process feedback or that residuals
    are correlated to the future inputs. This is an indication that data was collected
    from a closed-loop process where output noise influences future process inputs.
    [More on closed-loop ID in Addendum A1]


    Residual analysis is often performed on the fitting dataset itself. It can be
    done on a fresh validation dataset as well; however it will be more demanding
    for the model.


    ## Transient response checks


    It is a good practice to check the predicted step response or impulse response³⁵
    after model fitting. If you have some prior insights about the process gain and/or
    time constant, then you can compare your prior beliefs against what you observe
    in the transient response plots. Mentioned below are some other scenarios where
    these plots can come in handy:'
  mdcn: '## 噪声特性


    我们目前的讨论想必已经让你认识到过程模型中随机部分与确定性部分之间的相互作用，以及仔细建模过程扰动的必要性。了解噪声确切进入系统的位置（在过程的输入端、中间还是输出端），或者随机部分与确定性部分是否共享动态特性等，可以帮助你更好地描述噪声对装置的影响，从而获得更精确的模型。如果你对过程噪声没有太多先验信息，也不必担心；只需对模型类型做出最佳猜测，然后利用模型质量检查的推断结果进行迭代即可。


    随着你对不同模型结构的实践增多，你自然会更擅长模型结构选择。你也会开始理解为何存在如此大量的模型类型。


    ## 4.5 模型辨识与性能评估


    模型辨识涉及对所选模型参数（用向量 $\theta$ 表示）的估计。该问题可形式化表述如下：给定以下输入输出数据


    $Y^N = \{y(k) = y(0), y(1), ..., y(N-1)\}$

    $U^N = \{u(k) = u(0), u(1), ..., u(N-1)\}$


    并令 $\hat{y}(k)$ 为预测值序列，$\varepsilon(k)$ 为预测误差（也称为残差）


    $\varepsilon(k) = y(k) - \hat{y}(k)$


    参数 $\theta$ 通过对误差序列施加特定条件来估计。例如，预测误差最小化方法试图最小化 $\varepsilon(k)$ 的均方值，即


    $\hat{\theta} = \min_{\theta} \frac{1}{N} \sum_{k} \varepsilon(k)^2$


    均方预测误差也用于衡量模型在训练数据和验证/测试数据上的性能。决定系数（$R^2$）是另一种常用的性能度量指标。


    ## 1步预测与m步预测


    公式1中的误差被正式定义为1步预测误差或 $\varepsilon(k|k-1)$。这基本上意味着利用直到 $k-1$ 时刻的所有历史测量值来生成预测 $\hat{y}(k|k-1)$，然后计算误差。为了理解1步预测误差可能存在的问题，考虑以下简单模型


    $\hat{y}(k) = y(k-1)$  ◀ 预测值 = 上一次输出测量值


    对于变化缓慢的过程（大多数过程系统都是如此），上述简单模型可能具有欺骗性的良好表现，如下所示


    ![](img/6cffacf6247d6f7caa7eacc348cef427_83_0.png)


    > **结论：** 装置观测值与1步预测值之间的良好匹配不应作为模型充分性检验的唯一标准。误差的统计分析是必不可少的。


    在参数估计和性能评估中，$\varepsilon(k|k-1)$ 的替代方案是使用m步预测误差 $\varepsilon(k|k-m)$，其中仅使用直到 $k-m$
    时刻的输出测量值（即 $y(k-m)$, $y(k-m-1)$, ...），并根据模型需要使用直到 $k-1$ 时刻的输入。模型可以递归地使用预测值 $\hat{y}$
    来得到最终的 $\hat{y}(k|k-m)$。


    分析长期或m步预测是模型质量检查的组成部分之一。就模型拟合度量而言，1步预测误差仍然是主流选择，主要是由于其计算简便且易于最小化。


    ## 模型阶次选择


    对于大多数模型，你需要在执行模型辨识之前指定模型大小/阶次。然而，你很可能事先并不知道所选模型的正确大小。常见的做法是尝试不同的模型阶次，并选择使预测误差最小的那个。但是，请注意，随着模型阶次或模型参数数量的增加，模型拟合数据集上的预测误差会单调递减。最佳实践是使用一个全新的数据集，称为验证数据集，来评估模型在未见数据（参数估计期间未使用）上的性能，如下图4.6所示。这种方法称为交叉验证。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_84_0.png)


    > 你可能会注意到，验证数据集中的样本并非通过打乱并从训练数据集中随机选择样本获得（静态建模通常这样做）。显而易见，这样做是为了保持拟合和验证数据集中观测样本的时间顺序。


    另一种相关方法是从原始数据集中划分出多组验证数据集，并计算这些组上的平均性能作为性能度量，如图4.7所示。这称为k折交叉验证。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_85_0.png)


    图4.7：3折交叉验证过程示意图


    ## 基于信息准则的模型阶次选择


    交叉验证的一种流行替代方案是使用性能度量，如赤池信息准则（AIC）或贝叶斯信息准则（BIC）。


    $$AIC(\theta) = N \ln \left[ \frac{1}{N} \sum_{k} \varepsilon(k, \theta)^2 \right]
    + 2n$$


    $$BIC(\theta) = N \ln \left[ \frac{1}{N} \sum_{k} \varepsilon(k, \theta)^2 \right]
    + n \ln (N)$$


    其中，n = 模型参数数量

    N = 训练数据集中的观测数量


    如你所见，这些准则试图在模型精度和模型复杂度之间找到平衡。这里不使用单独的验证数据集，而是选择对应于最小AIC（或BIC）的模型阶次。大多数系统辨识软件包都原生支持使用这些信息准则进行自动模型阶次选择。你将在后续章节中看到基于AIC的系统辨识应用。


    ## 4.6 模型质量检查与诊断


    上一节的讨论告诉我们，预测输出与测量输出之间的“接近度”不应被解释为“好”模型的唯一确凿证据。相反，需要进一步仔细审查模型，以确定模型是否真正捕捉到了训练数据集中所有“可预测”的变化，并充分代表了过程。如果不是这样，你可以寻找进一步改进的线索。现在让我们来看一些模型质量检查活动。


    ## 残差分析


    残差本质上是模型拟合数据中无法被模型解释的部分。因此，残差分析需要检查残差序列中是否仍存在系统性变化；如果存在，则剩余的系统性变化可以进一步建模以改进整体模型预测。$\varepsilon(k)$
    应满足以下两个性质：


    - 1) $\varepsilon(k)$ 应为白噪声，即自相关系数应接近于零$^{31}$

    - 2) $\varepsilon(k)$ 应与输入 $u(k)$ 不相关$^{32}$


    对于条件(1)$^{33}$，生成ACF图（约20个滞后）。相关系数（滞后零除外）应处于某个阈值内——通常对应于95%显著性水平，即 $\pm 1.96/\sqrt{N}$。如果条件(1)被违反，则意味着模型可以进一步改进；然而，这并未提供关于具体改进措施的明确线索。一个通用的建议是尝试为扰动信号使用更复杂的随机模型。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_86_0.png)


    > $^{31}$ 如果扰动信号未被建模（例如OE模型），则不检查此条件。

    > $^{32}$ 此条件要求 $\varepsilon(k)$ 或 $u(k)$ 中至少有一个为白噪声。

    > $^{33}$ 也存在定量统计检验（如Ljung-Box检验）来检查残差是否表明拟合不足。


    对于条件(2)，生成CCF图并附带阈值（同样，95%置信区间为±1.96/√N）。如果超过5%的相关性（滞后>0）违反阈值，则意味着 $\varepsilon(k)$
    中仍存在一些源自 $u(k)$ 的变化，因此模型的确定性部分可以进一步改进。下面的假设CCF图展示了当条件(2)不满足时可得出的一些推断示例³⁴。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_87_0.png)


    负滞后处的显著相关性意味着过程反馈或残差与未来输入相关。这表明数据是从闭环过程中收集的，其中输出噪声影响了未来的过程输入。[关于闭环辨识的更多信息见附录A1]


    残差分析通常在拟合数据集本身上进行。也可以在新的验证数据集上进行；然而这对模型的要求会更高。


    ## 瞬态响应检查


    在模型拟合后检查预测的阶跃响应或脉冲响应³⁵是一个好习惯。如果你对过程增益和/或时间常数有一些先验认识，那么你可以将你的先验信念与瞬态响应图中观察到的结果进行比较。下面提到的是一些其他场景，其中这些图表可能会派上用场：'

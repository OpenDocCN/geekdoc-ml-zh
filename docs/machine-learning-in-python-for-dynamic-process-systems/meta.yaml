- md: '## Trend and drift removal


    Consider the signals from Figure 3.1 in Chapter 3. These could be output signals
    from a purely stochastic process or disturbance signals from an input-output process
    as shown in the figure below. What is noteworthy about these signals is that they
    exhibit meandering behavior and don’t seem to oscillate around some mean values.
    Therefore, these qualify as non-stationary signals. While signal A is said to
    have a trend, signal B shows a drift. In industrial processes, changes in ambient
    temperature, presence of process leaks, etc., could cause such disturbance signals.
    If these non-stationarities are not accounted for during SysID, inaccurate parameter
    estimates may result. However, methods exist to make the non-stationary signals
    stationary or remove the effect of non-stationarities from the input-output data.
    Let’s learn these methods now.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_72_0.png)


    Figure 4.3: Non-stationary signals in a stochastic system and an input-output
    system


    ## A quick primer on stationarity


    Until now we have mentioned the term ‘stationarity’ a couple of times but haven’t
    defined it rigorously. To understand this concept, let’s consider the following
    difference equation model fitted to the given data


    eq. 1 $y(k) = 0.6y(k-1) + e(k)$


    ![](img/6cffacf6247d6f7caa7eacc348cef427_73_0.png)


    A casual process modeler may not realize an implicit assumption being made on
    the validity of the model for any value of $k$, i.e., there is some sort of consistency
    in the behavior of the process irrespective of time. However, for the validity
    of such time-invariant behavior, the random signal $y(k)$ must exhibit identical
    statistical properties; specifically, the mean and autocovariance (and therefore
    the variance as well) are constant*. Such signals are called stationary signals.**
    To see the behavior on the other side of the spectrum, consider the following
    non-stationary signals


    ![](img/6cffacf6247d6f7caa7eacc348cef427_73_1.png)


    Visually, signal (a) has an increasing mean and therefore is non-stationary. Signal
    (b) has a constant mean but an increasing variance that tends to infinity.***
    Its visual characteristic is that it doesn’t revert to its mean as frequently
    as a stationary signal does. Random walk is a simple process often used to demonstrate
    properties of non-stationary signals. Therefore, remember this term and the process.
    You will see later that $y(k) = y(k-1) + e(k)$ can also be written as $y(k) =
    \sum_{j=0}^{k} e(j)$ and therefore such processes are also called integrating
    processes or processes with integrating type non-stationarity. The first five
    signals are further classified as homogeneous non-stationary because they can
    be transformed into stationary signals by suitable differencing or transformations.


    In summary, stationarity imparts some sort of ‘predictability’ and enable development
    of models that could be used for prediction and forecasts. Attempts to fit stationary
    models to nonstationary signals will lead to spurious results and therefore this
    aspect warrants due caution from the process modeler. We will later study several
    qualitative and quantitative tests of stationarity.


    * Eq. 1 can be used to derive the properties of y(k). To see how, let’s derive
    the mean (μ(k)) of the signal.


    ```

    y(k) = 0.6y(k - 1) + e(k) = 0.6(0.6y(k - 2) + e(k - 1)) + e(k) = 0.6^2y(k - 2)
    + 0.6e(k - 1) + e(k)

    = 0.6^j y(k - j) + \sum_{i=0}^{j-1} 0.6^i e(k - i) [after j recursions]

    = 0 + \sum_{i=0}^{j-1} 0.6^i e(k - i) [as j \to \infty]


    \mu(k) = E[y(k)] = \sum_{i=0}^{\infty} 0.6^i E[e(k - i)] [E[.] denotes expectation
    of a signal]

    But E[e(k - i)] = 0 \forall i as e \sim WN \Rightarrow \mu(k) = 0 = constant!

    ```


    ** Theoretically, signals as described are called weakly stationary or covariance
    stationary as only 2nd order moments have been considered. Strict stationarity
    occurs when all the statistical properties are constant. However, for most of
    the practical purposes, weak stationarity suffices and the qualification ‘weakly’
    is omitted.


    *** Repeated substitutions give var(y(k) = var(e(k)) + var(e(k - 1)) + ... = k\sigma^2
    + var(y(0)) \Rightarrow variance of y(k) increases with k.


    ## Detrending


    As the method’s name suggests, this method aims to remove trends from the non-stationary
    signals of the following type


    ```

    y(k) = m(k) + z(k)

    \downarrow \quad \quad \downarrow

    trend \quad stationary

    component \quad component

    ```


    The common practice for detrending is to fit (via least squares) a polynomial
    of an appropriate order (say $m(k) = a + bk + ck^2$ for quadratic order). The
    fitted polynomial is subtracted from the time-series signal and then a stationary
    time-series model is built for the residuals. For the signal in Figure 4.4, the
    approach would look as follows


    ![](img/6cffacf6247d6f7caa7eacc348cef427_75_0.png)


    Non-parametric method of detrending also exists and entail usage of moving average
    or low-pass filter to remove the slow dynamic (trend) components from the non-stationary
    signals.


    ## Classical time-series decomposition


    The method of breaking down a signal into its trend and random component belongs
    to a broader method called classical decomposition. Here, a signal $y(k)$ is assumed
    to take the following form


    $$y(k) = m(k) + s(k) + z(k)$$


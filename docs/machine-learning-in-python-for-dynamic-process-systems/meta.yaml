    The expression above shows that ARIMAX model is equivalent to ARMAX model on differenced
    input and output signals! Moreover, getting ARMAX model on differenced data provides
    an unbiased estimate of the deterministic model or the input transfer operator
    $G$ between $u(k)$ and $y(k)$. Like ARIMA models, ARIMAX should be used with caution

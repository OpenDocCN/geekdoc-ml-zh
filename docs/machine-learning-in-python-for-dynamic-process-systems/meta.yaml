  md: '# Pseudo Random Binary Sequence (PRBS)


    A PRBS signal switches between two levels with varying pulse widths as shown below.
    While the long width pulses help in estimation of steady-state gains, short pulses
    help in capturing transient dynamics.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_68_0.png)


    With order $n$, a unique sequence of length $M = 2^n-1$ can be generated. For
    larger signal length, the unique sequence repeats itself and therefore, has a
    period of length $M$ as shown in the example below. Although a PRBS sequence is
    deterministic, for large $M$ (and signal length $\ge M$), the signal has white-noise
    like properties and hence the term ''pseudo-random'' in its name. Scipy library
    provides a function for PRBS generation. An example is shown below.


    **Example 4.1:**


    Let''s generate a PRBS signal for an input fluctuating between values -1 and 1.


    ```

    # import packages

    from scipy.signal import max_len_seq

    import matplotlib.pyplot as plt


    # generate PRBS input signal of order 6 and plot

    PRBS_signal = max_len_seq(6, length=100)[0]*2-1 # converting sequence of 0''s
    and 1''s to sequence of -1''s and 1''s


    plt.plot(PRBS_signal, ''steelblue'')

    plt.ylabel(''PRBS_signal''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_68_1.png)


    # Generalized Binary Noise (GBN)


    A GBN signal is similar to PRBS but non-periodic. It switches between two values
    $-a$ and $a$, and the sequence is generated as follows


    $P[u(k) = -u(k-1)] = p_{sw}$

    $P[u(k) = u(k-1)] = 1 - p_{sw}$


    $; p_{sw} \in (0,1)$ is the switching probability'
  merge: -1
  pgno: 68
- img_proc: true
  md: 'For $p_{sw} = 0.5$, GBN signal has white-noise like properties. However, a
    lower value of $p_{sw}$ (0.1 or 0.05) is often recommended. SIPPY provides a function
    for GBN signal generation. An example is shown below.


    # Example 4.2:


    Let''s generate a GBN signal for an input fluctuating between values -1 and 1.


    ```

    # import packages

    from sippy import functionset as fset

    import matplotlib.pyplot as plt


    # generate GBN input signal using SIPPY and plot

    [gbn_signal, _, _] = fset.GBN_seq(1000, 0.1)


    plt.plot(gbn_signal, ''steelblue'', linewidth=0.8)

    plt.ylabel(''GBN_signal''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_69_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_69_1.png)


    In the plots, note how lower switching probability leads to higher pulse widths.


    > Persistence excitation is only a theoretical guarantee for model identifiability.
    Other practical requirements also warrant careful attention.


    > The physical levels of the test signals should be chosen large enough so that
    variations in output is greater than the variations due to noise. This property
    is quantified by a measure termed signal-to-noise ratio (SNR). A low SNR leads
    to inaccurate parameter estimates. A few words of caution here: If you are only
    interested in a linear model around some operating point, then you need to be
    wary of unwanted nonlinearities due to high test signal levels.


    > If you are looking to build a nonlinear model, then the binary variations in
    input signal levels will not expose system nonlinearity. The level/amplitude of
    the test signal must also take a range of values.'

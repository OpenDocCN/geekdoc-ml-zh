  md: '# # 7.4 OE Models: An Introduction


    Output error (OE) models lie at the extreme end of PEM modeling spectrum wherein
    no model is postulated for the disturbance signal and only the effects of inputs
    on the output variable are modeled as shown in Figure 7.4. Accordingly, $v(k)$
    is completely ignored for model predictions. Since no past output information
    is used and past predictions are used for future predictions, one-step ahead prediction
    equals $m$-step ahead predictions (for any $m$) and infinite-step prediction as
    well. In other words, simulation and prediction responses coincide for OE model$^{56}$
    Figure 7.4 also tells us that the predictor is nonlinear-in-unknowns during model
    fitting and therefore, like ARMAX$^{57}$, nonlinear optimization is required for
    parameter optimization.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_144_0.png)


    There is no issue of parametrization dependency between $G$ and $H$ operators
    and therefore, OE models generate unbiased deterministic models. Therefore, when
    one is not sure of noise characteristics, OE models are preferred to provide unbiased
    input transfer operator. The corresponding residuals $(y(k) - \hat{y}_{OE}(k))$
    are of course not bound to satisfy whiteness conditions and therefore, ACF test
    is not imposed during model diagnostics; CCF test, however, would still apply.
    Very often, a time-series model is fit to the residual sequence to approximate
    the noise transfer operator as shown in Figure 7.5 below. You can take the approximated
    model as your final model or use this as an initial estimate in a Box-Jenkins
    model estimation procedure to obtain a better model.


    $^{56}$ For any PEM model, $\hat{y}(k) = \frac{B(q^{-1})}{A(q^{-1})} u(k)$ gives
    infinite-step predictions/simulation responses.


    $^{57}$ If $v(k) = e(k)$, then OE becomes special case of ARMAX model with $C(q^{-1})
    = A(q^{-1})$'

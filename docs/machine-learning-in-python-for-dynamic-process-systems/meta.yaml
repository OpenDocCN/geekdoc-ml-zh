    # Simulation response checks


    Previously, we talked about *m*-step ahead predictions being preferable over the
    conventional 1-step ahead predictions for model adequacy analysis. This idea can
    be taken to the extreme, resulting in infinite-step ahead predictions – also called
    as simulation. Simulation is often performed on fresh data set and the output
    at any time *k* is generated using only the past input measurements and initial
    conditions of the output. If model includes past output terms, then simulated
    outputs are used recursively. Illustration below clarifies this concept.


    ```

    Model: $y(k) = 0.8y(k-1) + 0.6u(k-1) + e(k)$

    Initial condition: $y(0) = 0$

    To predicted: $\hat{y}_{SIM}(3)$


    $\hat{y}_{SIM}(1) = 0.8y(0) + 0.6u(0)$

    $\hat{y}_{SIM}(2) = 0.8\hat{y}_{SIM}(1) + 0.6u(1)$

    $\hat{y}_{SIM}(3) = 0.8\hat{y}_{SIM}(2) + 0.6u(2)$

    ```


    Disturbance contributions to output are ignored in generating $\hat{y}_{SIM}$.<sup>36</sup>
    The utility of $\hat{y}_{SIM}$ is that if SNR is high and $\hat{y}_{SIM}(k)$ matches
    closely with $y(k)$, then a good (deterministic) model is implied. Do note that
    poor simulation performance may imply high disturbance levels and not'

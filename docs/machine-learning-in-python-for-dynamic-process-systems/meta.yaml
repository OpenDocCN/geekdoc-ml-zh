  md: 'can be computed similarly and plotted versus lags to give partial autocorrelation
    function (PACF). Let''s revisit our earlier example.


    # Example 3.1 continued:


    The code below generates the PACF plot.


    ```

    # generate PACF plot

    conf_int = 2/np.sqrt(len(y))

    plot_pacf(y, lags= 20, alpha=None)

    plt.gca().axhspan(-conf_int, conf_int, facecolor=''lightblue'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_59_0.png)


    The PACF plot is along the expected lines. Only the coefficient at lag=1 is significant.
    Note that at lag=1, PACF and ACF values are the same as there are no intermediate
    variables. Moreover, PACF value at lag=0 is not defined but is often set to unity
    for visualization purposes.


    The utility of PACF should be clear to you now. Another interpretation of PACF
    is worth mentioning. Suppose you fit the following ($p^{th}$ order) autoregressive
    model.


    $y(k) = a_1y(k-1) + a_2y(k-2) \cdots + a_py(k-p) + e(k)$


    The coefficient or weight ($a_p$) corresponding to the $p^{th}$ lagged regressor
    ($y(k-p)$) equals the PACF value for lag $p$ or $\varphi_{yy}(p)$. Therefore,
    the lag corresponding to the last significant PACF value in a PACF plot can indicate
    the number of terms to be used in an autoregressive model. More on this later
    in the chapter on time series analysis.'

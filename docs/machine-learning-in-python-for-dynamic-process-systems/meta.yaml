    step_response_process, _ = control.matlab.step(sys_G, T=30)


    # overlay the step responses

    plt.plot(step_response_model, ''m--'', linewidth=0.8, label="ARX model")

    plt.plot(step_response_process, ''c'', linewidth=0.8, label="Actual process")

    plt.ylabel(''Step responses''), plt.xlabel(''k''), plt.legend()

    ```


    Plots below shows the step response curves and the estimated parameters. As expected,
    for SNR=10, the estimated step response curve is farther away from the true curve
    compared to those from SNR=100 dataset. However, high noise level is not solely
    responsible for this inaccuracy. Incorrect noise model contributes significantly
    as well. To illustrate this fact, the plots show curves from an OE model (it is
    covered in the next chapter, but it suffices to know that an OE model uses similar
    structure for operator G as an ARX model but ignores H) as well. Theoretically,
    OE model provides unbiased estimated and therefore its curves are much closer
    to the true curves.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_0.png)


    To further clarify the bias aspect, 500 different sets of I/O data was generated
    for SNR=10 and least squares estimation method was used. The histograms below
    show the distribution of the parameters. The systematic bias is evident in the
    plots.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_128_1.png)'
- md: "## Unbiased high-order ARX modeling\n\nIn SysID literature, you may encounter\
    \ statements stating that high-order ARX models are unbiased. To understand this,\
    \ let's consider an example where the true process is given by\n\n$$y(k) = \\\
    frac{B(q^{-1})}{A(q^{-1})}u(k) + \\frac{e(k)}{A(q^{-1})D(q^{-1})}$$\n\nNow instead\
    \ of fitting an ARX model $y = \\frac{B}{A}u + \\frac{e}{A}$, we can fit the model\
    \ $y = \\frac{BD}{AD}u + \\frac{e}{AD}$ [$q^{-1}$ and $k$ not explicitly specified\
    \ for brevity]. Therefore, if the degree of $D(q^{-1})$ is $r$ then we are basically\
    \ fitting an ARX model with orders $n_a+r$ and $n_b+r$ instead of an ARX model\
    \ with orders $n_a$ and $n_b$. The higher order ARX model will be unbiased because\
    \ both $G$ and $H$ operators are correctly specified! Furthermore, your model\
    \ residuals will be white now. One can recover the true transfer operator $\\\
    frac{B}{A}$ from the estimated transfer operator $\\frac{BD}{AD}$.\n\nIt has been\
    \ shown that a sufficiently high-order ARX model can approximate any linear system\
    \ arbitrarily well. Model order reduction techniques exist to subsequently reduce\
    \ the order of the estimated ARX model to make it more tractable.\n\n## Hyperparameter\
    \ selection\n\nComplete specification of an ARX model structure requires values\
    \ of the input-output delay ($d$) and the orders ($n_a$ and $n_b$ which are the\
    \ number of poles and zeros of the input transfer operator $G$). The most common\
    \ way of estimating these values is to select a range of potential values for\
    \ $d$, $n_a$, and $n_b$, and use information criteria such as AIC or cross-validation\
    \ to find the most optimal combination. SIPPY implements the AIC-based methodology.\
    \ As a thumb-rule, for industrial plants, $n_a$ is usually three or less.\n\n\
    Approaches alternative to the above brute-force approach exist as well. For example,\
    \ you can first build an FIR model to get an estimate of the delay, or a CCF plot\
    \ between $u(k)$ and $y(k)$ can be utilized. A process delay of $d$ will imply\
    \ that the CCF possesses its first significant peak at lag $d + 1$, while the\
    \ coefficients will be close to zero for lag $\\leq d$. With the delay estimate\
    \ in hand, you may then proceed for order estimation via brute-force. Here again,\
    \ an approximate order value may be obtained using the Hankel Singular values\
    \ obtained via subspace identification procedure (you will learn about this in\
    \ Chapter 8). This approximate value can help you decide the potential range for\
    \ $n_a$ (and $n_b$) in your brute-force search.\n\nOnce your model has been fitted,\
    \ model diagnostics may provide you clues regarding misspecification of the model\
    \ structure. For example, isolated significant peaks in CCF plot between $u(k)$\
    \ and $\\epsilon(k)$ indicate missing input terms in the model. Too small delay\
    \ specification will lead to insignificant parameter estimates of the first few\
    \ input term coefficients. Too large value of $d$ will show up as several contiguous\
    \ CCF coefficients ($u(k)$ and $\\epsilon(k)$) outside the confidence bounds.\n\
    \nLet's put these guidelines into practice in a realistic case-study presented\
    \ next.\n\n## 6.4 ARX Modeling of Industrial Furnaces\n\nPreviously, we built\
    \ a parametric FIR model using the fired-heater dataset; the model ended up with\
    \ 11 parameters. In this section, we will attempt to build a parametric ARX model\
    \ and see if it ends up providing a more parsimonious description of the system.\
    \ An ARX model can be fitted as easy as it was for fitting an FIR model using\
    \ SIPPY as shown below\n\n```\n# fit ARX model with centered signals\nARXmodel\
    \ = SysID(TO_centered, FG_centered, 'ARX', IC='AIC', na_ord=[1,20], nb_ord=[1,20],\
    \ delays=[0,5])\n\n>>> suggested orders are: Na= 4 ; Nb= 3 Delay: 0\n```\n\nThe\
    \ fitted model ends up with 7 parameters and the following structure\n\n$$G_{ARX}\
    \ = \\frac{0.8405q^3 - 0.1983q^2 + 0.1147q}{q^4 - 1.541q^3 + 0.9914q^2 - 0.4023q\
    \ + 0.0877}$$\n$$= \\frac{0.8405q^{-1} - 0.1983q^{-2} + 0.1147q^{-3}}{1 - 1.541q^{-1}\
    \ + 0.9914q^{-2} - 0.4023q^{-3} + 0.0877q^{-4}}$$\n\nLet's see if this parsimonious\
    \ model provides as good performance as the FIR model and passes the diagnostic\
    \ checks. As before, we start with residual analysis.\n\n```\n# get model predictions\
    \ and residuals on training dataset\nTO_predicted_centered = ARXmodel.Yid\nTO_predicted\
    \ = np.transpose(y_scaler.inverse_transform(TO_predicted_centered))\nresiduals\
    \ = TO - TO_predicted\n```\n\n```\nplt.figure(), plt.plot(TO, 'g', label='Measurements')\n\
    plt.plot(TO_predicted, 'r', label='Predictions')\nplt.title('Training data'),\
    \ plt.ylabel('y(k): Measured vs predicted'), plt.xlabel('k'), plt.legend()\n```\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_131_0.png)\n\nThe model predictions\
    \ on the training dataset seems to be almost perfect. However, we know that 1-step\
    \ ahead predictions on training dataset can be misleading and therefore, we will\
    \ hold onto our judgement for a bit. Let's look at the ACF and CCF plots of the\
    \ residuals.\n\n```\n# ACF of residuals\nfrom statsmodels.graphics.tsaplots import\
    \ plot_acf\nconf_int = 1.96/np.sqrt(len(residuals))\nplt.figure(), plot_acf(residuals,\
    \ lags= 20, alpha=None, title='')\nplt.gca().axhspan(-conf_int, conf_int, facecolor='lightblue')\
    \ # shaded confidence interval\n\n# CCF b/w residual and input sequences\nccf_vals\
    \ = ccf(residuals, FG, adjusted=False) # ccf for lag >= 0\nccf_vals = ccf_vals[:21]\
    \ # ccf for lag 0 to 20\n\nlags = np.arange(0,21)\nplt.figure(), plt.vlines(lags,\
    \ [0], ccf_vals), plt.axhline(0, 0, lags[-1])\nplt.plot(lags, ccf_vals, marker='o',\
    \ linestyle='None')\nplt.gca().axhspan(-conf_int, conf_int, facecolor='lightblue')\
    \ # shaded confidence interval\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_131_1.png)\n\
    \nCoefficients of interest are within the confidence intervals.\n\nNext, let's\
    \ see the model's step response curve (and compare with the true process curve).\n\
    \n```\n# generate step response of ARX model\nstep_response_model, _ = control.matlab.step(ARXmodel.G,\
    \ T=21)\n\n# generate step response of original process\ns = control.matlab.tf('s')\n\
    sys_G = 6/(3*s**2 + 4*s + 1)\nstep_response_process, T = control.matlab.step(sys_G,\
    \ T=20)\n\n# overlay the step responses\nplt.figure(), plt.plot(step_response_model,\
    \ 'm--', label=\"ARX model\")\nplt.plot(T, step_response_process, 'c', label=\"\
    Actual process\")\nplt.ylabel('Step responses'), plt.xlabel('k'), plt.legend()\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_132_0.png)\n\nCurves compare well;\
    \ no unexpected characteristics in the model's curve.\n\nThe model has done reasonably\
    \ well so far. We will do one last check and analyze the model's *m*-step ahead\
    \ responses and simulation responses on a separate validation dataset.\n\n```\n\
    # read fired heater validation data and center\ndata_val = np.loadtxt('IndustrialFiredHeater_SISO_Validation.csv',\
    \ delimiter=',')\nFG_val, TO_val = data_val[:,0, None], data_val[:,1, None]\n\
    FG_val_centered, TO_val_centered = u_scaler.fit_transform(FG_val), y_scaler.fit_transform(TO_val)\n\
    \n# get model's 1-step ahead and 5-step ahead predictions, and simulation responses\n\
    from sippy import functionset as fset\n\nTO_val_predicted_1step_centered = np.transpose(fset.validation(ARXmodel,\
    \ FG_val_centered,\n                                                         \
    \   TO_val_centered, np.linspace(0,299,300), k=1))\nTO_val_predicted_5step_centered\
    \ = np.transpose(fset.validation(ARXmodel, FG_val_centered,\n                \
    \                                            TO_val_centered, np.linspace(0,299,300),\
    \ k=5))\nTO_val_simulated_centered, _, _ = control.matlab.lsim(ARXmodel.G, FG_val_centered[:,0],\n\
    \                                                    np.linspace(0,299,300))\n\
    ```\n\n```\nTO_val_predicted_1step = y_scaler.inverse_transform(TO_val_predicted_1step_centered)\n\
    TO_val_predicted_5step = y_scaler.inverse_transform(TO_val_predicted_5step_centered)\n\
    TO_val_simulated = y_scaler.inverse_transform(TO_val_simulated_centered)\n\nplt.figure()\n\
    plt.plot(TO_val, 'g', label='Measurements')\nplt.plot(TO_val_predicted_1step,\
    \ 'r', label='1-step ahead predictions')\nplt.plot(TO_val_predicted_5step, 'c',\
    \ label='5-step ahead predictions')\nplt.plot(TO_val_simulated, 'm', label='Simulation\
    \ response')\nplt.title('Validation data'), plt.ylabel('y(k): Measured vs predicted/simulated'),\
    \ plt.xlabel('k')\nplt.legend()\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_133_0.png)\n\
    \nThe plot above again corroborates the adequacy of the model. The 5-step ahead\
    \ predictions and the simulated responses seem to have captured the systematic\
    \ variations in the temperature signal which suggests that the deterministic component\
    \ of the model has been accurately modeled."
  mdcn: "## 无偏高阶ARX建模\n\n在系统辨识文献中，你可能会遇到这样的说法：高阶ARX模型是无偏的。为了理解这一点，让我们考虑一个例子，其中真实过程由下式给出\n\
    \n$$y(k) = \\frac{B(q^{-1})}{A(q^{-1})}u(k) + \\frac{e(k)}{A(q^{-1})D(q^{-1})}$$\n\
    \n现在，我们不是拟合一个ARX模型 $y = \\frac{B}{A}u + \\frac{e}{A}$，而是可以拟合模型 $y = \\frac{BD}{AD}u\
    \ + \\frac{e}{AD}$ [为简洁起见，未明确指定 $q^{-1}$ 和 $k$]。因此，如果 $D(q^{-1})$ 的阶数为 $r$，那么我们实际上是在拟合一个阶数为\
    \ $n_a+r$ 和 $n_b+r$ 的ARX模型，而不是阶数为 $n_a$ 和 $n_b$ 的ARX模型。这个更高阶的ARX模型将是无偏的，因为 $G$\
    \ 和 $H$ 算子都被正确指定了！此外，你的模型残差现在将是白噪声。可以从估计的传递算子 $\\frac{BD}{AD}$ 中恢复出真实的传递算子 $\\\
    frac{B}{A}$。\n\n研究表明，一个足够高阶的ARX模型可以任意好地逼近任何线性系统。存在模型降阶技术，可以随后降低估计的ARX模型的阶数，使其更易于处理。\n\
    \n## 超参数选择\n\n完整指定一个ARX模型结构需要输入输出延迟（$d$）和阶数（$n_a$ 和 $n_b$，它们是输入传递算子 $G$ 的极点和零点数量）的值。估计这些值最常见的方式是为\
    \ $d$、$n_a$ 和 $n_b$ 选择一个潜在值范围，并使用信息准则（如AIC或交叉验证）来找到最优组合。SIPPY实现了基于AIC的方法。作为经验法则，对于工业装置，$n_a$\
    \ 通常为三或更小。\n\n也存在替代上述暴力搜索方法的方法。例如，你可以先构建一个FIR模型来估计延迟，或者可以利用 $u(k)$ 和 $y(k)$ 之间的互相关函数图。一个为\
    \ $d$ 的过程延迟将意味着互相关函数在滞后 $d + 1$ 处具有其第一个显著峰值，而滞后 $\\leq d$ 的系数将接近于零。有了延迟估计值，你就可以通过暴力搜索继续进行阶数估计。这里同样，可以使用通过子空间辨识过程获得的Hankel奇异值来获得一个近似的阶数值（你将在第8章中了解这一点）。这个近似值可以帮助你决定暴力搜索中\
    \ $n_a$（和 $n_b$）的潜在范围。\n\n一旦你的模型拟合完成，模型诊断可以为你提供关于模型结构误设的线索。例如，$u(k)$ 和 $\\epsilon(k)$\
    \ 之间互相关图中的孤立显著峰值表明模型中缺少输入项。过小的延迟设定将导致前几个输入项系数的参数估计不显著。过大的 $d$ 值将表现为多个连续的互相关系数（$u(k)$\
    \ 和 $\\epsilon(k)$）超出置信区间。\n\n让我们在接下来的一个实际案例研究中将这些指南付诸实践。\n\n## 6.4 工业炉的ARX建模\n\
    \n之前，我们使用加热炉数据集构建了一个参数化FIR模型；该模型最终有11个参数。在本节中，我们将尝试构建一个参数化ARX模型，看看它是否最终能提供对系统更简洁的描述。使用SIPPY拟合ARX模型与拟合FIR模型一样容易，如下所示\n\
    \n```\n# 使用中心化信号拟合ARX模型\nARXmodel = SysID(TO_centered, FG_centered, 'ARX', IC='AIC',\
    \ na_ord=[1,20], nb_ord=[1,20], delays=[0,5])\n\n>>> 建议的阶数为：Na= 4 ; Nb= 3 延迟：0\n\
    ```\n\n拟合的模型最终有7个参数，结构如下\n\n$$G_{ARX} = \\frac{0.8405q^3 - 0.1983q^2 + 0.1147q}{q^4\
    \ - 1.541q^3 + 0.9914q^2 - 0.4023q + 0.0877}$$\n$$= \\frac{0.8405q^{-1} - 0.1983q^{-2}\
    \ + 0.1147q^{-3}}{1 - 1.541q^{-1} + 0.9914q^{-2} - 0.4023q^{-3} + 0.0877q^{-4}}$$\n\
    \n让我们看看这个简洁的模型是否能提供与FIR模型一样好的性能，并通过诊断检查。像之前一样，我们从残差分析开始。\n\n```\n# 获取训练数据集上的模型预测和残差\n\
    TO_predicted_centered = ARXmodel.Yid\nTO_predicted = np.transpose(y_scaler.inverse_transform(TO_predicted_centered))\n\
    residuals = TO - TO_predicted\n```\n\n```\nplt.figure(), plt.plot(TO, 'g', label='测量值')\n\
    plt.plot(TO_predicted, 'r', label='预测值')\nplt.title('训练数据'), plt.ylabel('y(k)：测量值\
    \ vs 预测值'), plt.xlabel('k'), plt.legend()\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_131_0.png)\n\
    \n模型在训练数据集上的预测看起来几乎是完美的。然而，我们知道训练数据集上的1步超前预测可能会产生误导，因此我们将暂时保留判断。让我们看看残差的自相关函数和互相关函数图。\n\
    \n```\n# 残差的自相关函数\nfrom statsmodels.graphics.tsaplots import plot_acf\nconf_int\
    \ = 1.96/np.sqrt(len(residuals))\nplt.figure(), plot_acf(residuals, lags= 20,\
    \ alpha=None, title='')\nplt.gca().axhspan(-conf_int, conf_int, facecolor='lightblue')\
    \ # 阴影置信区间\n\n# 残差与输入序列之间的互相关函数\nccf_vals = ccf(residuals, FG, adjusted=False)\
    \ # 滞后 >= 0 的互相关函数\nccf_vals = ccf_vals[:21] # 滞后 0 到 20 的互相关函数\n\nlags = np.arange(0,21)\n\
    plt.figure(), plt.vlines(lags, [0], ccf_vals), plt.axhline(0, 0, lags[-1])\nplt.plot(lags,\
    \ ccf_vals, marker='o', linestyle='None')\nplt.gca().axhspan(-conf_int, conf_int,\
    \ facecolor='lightblue') # 阴影置信区间\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_131_1.png)\n\
    \n感兴趣的系数在置信区间内。\n\n接下来，让我们看看模型的阶跃响应曲线（并与真实过程曲线进行比较）。\n\n```\n# 生成ARX模型的阶跃响应\n\
    step_response_model, _ = control.matlab.step(ARXmodel.G, T=21)\n\n# 生成原始过程的阶跃响应\n\
    s = control.matlab.tf('s')\nsys_G = 6/(3*s**2 + 4*s + 1)\nstep_response_process,\
    \ T = control.matlab.step(sys_G, T=20)\n\n# 叠加阶跃响应\nplt.figure(), plt.plot(step_response_model,\
    \ 'm--', label=\"ARX模型\")\nplt.plot(T, step_response_process, 'c', label=\"实际过程\"\
    )\nplt.ylabel('阶跃响应'), plt.xlabel('k'), plt.legend()\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_132_0.png)\n\
    \n曲线比较良好；模型曲线中没有意外的特性。\n\n到目前为止，模型表现得相当不错。我们将进行最后一次检查，并分析模型在单独的验证数据集上的*m*步超前响应和仿真响应。\n\
    \n```\n# 读取加热炉验证数据并中心化\ndata_val = np.loadtxt('IndustrialFiredHeater_SISO_Validation.csv',\
    \ delimiter=',')\nFG_val, TO_val = data_val[:,0, None], data_val[:,1, None]\n\
    FG_val_centered, TO_val_centered = u_scaler.fit_transform(FG_val), y_scaler.fit_transform(TO_val)\n\
    \n# 获取模型的1步超前和5步超前预测，以及仿真响应\nfrom sippy import functionset as fset\n\nTO_val_predicted_1step_centered\
    \ = np.transpose(fset.validation(ARXmodel, FG_val_centered,\n                \
    \                                            TO_val_centered, np.linspace(0,299,300),\
    \ k=1))\nTO_val_predicted_5step_centered = np.transpose(fset.validation(ARXmodel,\
    \ FG_val_centered,\n                                                         \
    \   TO_val_centered, np.linspace(0,299,300), k=5))\nTO_val_simulated_centered,\
    \ _, _ = control.matlab.lsim(ARXmodel.G, FG_val_centered[:,0],\n             \
    \                                       np.linspace(0,299,300))\n```\n\n```\n\
    TO_val_predicted_1step = y_scaler.inverse_transform(TO_val_predicted_1step_centered)\n\
    TO_val_predicted_5step = y_scaler.inverse_transform(TO_val_predicted_5step_centered)\n\
    TO_val_simulated = y_scaler.inverse_transform(TO_val_simulated_centered)\n\nplt.figure()\n\
    plt.plot(TO_val, 'g', label='测量值')\nplt.plot(TO_val_predicted_1step, 'r', label='1步超前预测')\n\
    plt.plot(TO_val_predicted_5step, 'c', label='5步超前预测')\nplt.plot(TO_val_simulated,\
    \ 'm', label='仿真响应')\nplt.title('验证数据'), plt.ylabel('y(k)：测量值 vs 预测值/仿真值'), plt.xlabel('k')\n\
    plt.legend()\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_133_0.png)\n\n上图再次证实了模型的充分性。5步超前预测和仿真响应似乎捕捉到了温度信号中的系统性变化，这表明模型的确定性部分已被准确建模。"

    # # 4.1 System Identification Workflow


    So far in this book we have been consciously emphasizing the difference between
    model identification and system identification. While model ID is all about estimating
    model parameters, SysID is about ensuring that the model truly represents the
    underlying system and stands consistent w.r.t. any prior available knowledge and
    any modeling assumptions. Figure 4.1 reproduces the SysID workflow we had seen
    in Chapter 1 and shows the several steps that serve to achieve the stated goals.
    The rest of the chapter will sensitize you about these varied aspects of SysID
    and help you gain working-level understanding about how to successfully execute

- img_proc: true
  md: "Let's study Hammerstein model in more details to understand the general characteristics\
    \ of block-structured models.\n\n# Hammerstein model\n\nIn Hammerstein model the\
    \ inputs are first transformed by a nonlinear function and then passed through\
    \ a linear dynamic process as shown in Figure 9.5. Polynomials are often used\
    \ for the nonlinear function; piecewise linear functions being another popular\
    \ choice. To understand this framework in more details, let's derive the difference\
    \ equation form for a Hammerstein process with 2nd order polynomial and first\
    \ order ARX dynamics\n\n$$w(k) = \\beta_1 u(k) + \\beta_2 u^2(k)$$\n\n$$y(k) =\
    \ -a_1 y(k-1) + b_1 w(k)$$\n\n$$\\Rightarrow y(k) = -a_1 y(k-1) + b_1 \\beta_1\
    \ u(k-1) + b_1 \\beta_2 u^2(k-1) \\quad \\text{eq. 1}$$\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_183_0.png)\n\
    \nFigure 9.5: SISO Hammerstein model with polynomial nonlinearity. $\\beta_s$\
    \ are parameters of the nonlinear block.\n\nThere are different ways of estimating\
    \ the parameters $a_1, b_1, \\beta_1, \\beta_2$ in Eq. 1 (and, in general, any\
    \ Hammerstein model).\n\n+   - **Approach 1:**\n    Employ a nonlinear optimization\
    \ scheme to find the parameters directly"

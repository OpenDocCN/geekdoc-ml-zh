    $$y(k) = \frac{0.7q^{-1}}{1 - 0.7q^{-1}}u(k) + \frac{1}{(1 - q^{-1})(1 - 0.7q^{-1})}e(k)$$


    We will see how the true deterministic component can be recovered by working with
    differenced input and output signals.



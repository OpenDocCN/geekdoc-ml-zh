  md: '# 4.3 Data Pre-processing


    Raw process data is seldom suitable for immediate use for model ID, even if obtained
    through well-designed identification tests. In this section, we will learn about
    some of the common practices used to handle the impurities that inadvertently
    creep into our dataset. Let’s start with removal of high-frequency measurement
    noise.


    # (Measurement) Noise removal


    Consider the plot below which shows the observations of a temperature variable.
    Here, the high frequency wiggles on top of the apparently systematic variations
    are measurement noise and need to be removed before model ID. In time-domain,
    common methods for noise removal are moving-average smoothing and SG filtering.²²


    ![](img/6cffacf6247d6f7caa7eacc348cef427_70_0.png)


    Another approach for noise removal is to work directly in frequency domain and
    filter out the undesirable high-frequency components of the signal. A common choice
    for such a filter is Butterworth filter²³. The example below shows how to implement
    one such filter.


    **Example 4.3:** Take the signal shown in the above motivating plot and clean
    it by removing its high-frequency components. Note that the noisy signal was generated
    by adding a white noise to the CO₂ concentration signal in the celebrated Box-Jenkins
    gas furnace dataset (https://openmv.net/info/gas-furnace).


    ```

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from scipy import signal


    # read data and generate its periodogram

    y_noisy = np.loadtxt(''noisySignal.csv'', delimiter='','')

    freq, PSD = signal.welch(y_noisy)

    plt.plot(freq, PSD), plt.ylabel(''PSD''), plt.xlabel(''frequency [Hz]'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_70_1.png)'
  merge: -1
  pgno: 70
- img_proc: true
  md: '```

    # apply Butterworth filter of order 5 with critical frequency as 0.2 Hz

    b, a = signal.butter(5, 0.2, ''low'') # create the filter

    y_cleaned = signal.filtfilt(b, a, y_noisy) # apply the filter

    plt.figure(), plt.plot(y_cleaned, ''g''), plt.ylabel(''y_cleaned''), plt.xlabel(''k'')


    # periodogram of cleaned data

    freq, PSD = signal.welch(y_cleaned)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''PSD cleaned''), plt.xlabel(''frequency [Hz]'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_71_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_71_1.png)


    We can see how efficiently the noisy component has been removed. In practice,
    you will have to tune filter parameters cautiously so as to not filter out the
    useful components.


    # Centering and scaling


    Dynamic models are often built to describe the behavior of the process around
    some desired operating point. Therefore, in SysID literature, you will find the
    usage of deviation variables which are defined as follows


    $$y(k) = y_m(k) - \bar{y} \ ; \ u(k) = u_m(k) - \bar{u}$$


    Where $y_m, u_m$ are the actual raw measurements and $\bar{y}, \bar{u}$ are the
    nominal values around which the deviations are calculated. Models between $y(k)$
    and $u(k)$ therefore relate the changes in inputs to the changes in outputs. An
    obvious option is to assign values to $\bar{y}, \bar{u}$ (also called offsets)
    corresponding to the desired steady-state operating point; however, this operating
    point may not be known beforehand. The recommended and common approach is to use
    the sample means as the offsets, i.e.,


    $$\bar{y} = \frac{1}{N} \sum_{k=0}^{N-1} y_m(k) \quad ; \quad \bar{u} = \frac{1}{N}
    \sum_{k=0}^{N-1} u_m(k)$$


    Another pre-treatment best practice is to scale the deviation variables to account
    for the differences in physical units of different variables. Scaling brings all
    the variables on an equal basis and prevents any variable being given undue high
    weightage due to its numerically high spread in values. A common choice is to
    use the standard deviation to scale any variable. Both centering and scaling can
    be accomplished using Sklearn.$^{24}$


    $^{24}$ Remember to transform the validation and test data using the same offset
    and scale determined using the model fitting data'

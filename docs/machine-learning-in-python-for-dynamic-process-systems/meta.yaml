  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_167_0.png)


    # Process monitoring/fault detection indices


    In CVA-based method, 3 indices - $T_s^2$, $T_e^2$, $Q$ - are computed. The computation
    of these metrics and their corresponding threshold are shown below. Note that
    the threshold expressions are based on the assumption that process variables are
    gaussian distributed; if this assumption is invalid then empirical techniques
    such as KDE or percentile may be employed.


    | Metric 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | Threshold @ significance level $\alpha$ | Threshold @ significance level $\alpha$
    | Threshold @ significance level $\alpha$ |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} g \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    +   - $J_e$ contains all except the first $n$ rows of $J$ i.e., the last $l(m+r)
    - n$ rows of $J$

    - $z = l(m+r) - n$

    - $F_{\alpha}(n, N-n)$ is the 1-$\alpha$ percentile of the $F$ distribution with
    $n$ and $N-n$ degrees of freedom

    - $\chi_{\alpha}^2$ is the (1-$\alpha$) percentile of a chi-squared distribution
    with $h$ degrees of freedom; $\mu$ denotes the mean value and $\sigma$ denotes
    the variance of the Q metric

    - Significance level of $\alpha = 0.05$ would mean that there is a 5% chance that
    an alert is false'

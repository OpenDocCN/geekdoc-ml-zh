    # # Chapter 5

    ## Time Series Analysis: Concepts and Applications


    As alluded to before, time series analysis (TSA) refers to study of time series
    signals from processes without exogenous inputs. Before we dive into the relatively
    more complex world of input-output modeling, it would be prudent to first get
    acquainted with how to model stochastic variations in signals and compactly describe
    the dependencies among adjacent observations in a time series. The study of time
    series is not just for pedagogical convenience. SysID derives many concepts from
    time series analysis and therefore, a strong foundation in modeling time series
    is important for mastering the art of SysID.


    Time series analysis can help us to characterize I/O model residuals and get clues
    regarding further model refinement. If your process has measured disturbance signals
    (inputs that can''t be manipulated; for example, ambient temperature), then they
    can be modeled via TSA to provide better forecasts and control. Furthermore, TSA
    can be used to model controlled process variables and build process monitoring
    tools. In this chapter, we will work through case-studies illustrating these applications.


    Apart from setting a strong foundation of digital signal processing, this chapter
    will also introduce the backshift notation and transfer function operator. These
    constructs are quite useful for compact description and algebraic manipulation
    of the difference equations. Specifically, the following topics are covered


    +   - Introduction to AR, MA, and ARMA models for stationary signals

    - Using ACF and PACF for model structure selection

    - Monitoring controlled process variable in a CSTR using ARMA models

    - Introduction to ARIMA models for nonstationary signals

    - Forecasting measured signals using ARIMA models'

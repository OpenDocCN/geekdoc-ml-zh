  md: '# Equivalence of state-space and ARMAX models


    Although state-space and input-output models may seem very different, they are
    related! Given any state-space model, an equivalent ARMAX model can be determined
    and *vice-versa*. Therefore, other linear structures like ARX or OE can be re-written
    as state-space model as well.


    **SISO I/O difference equation form to SS form**


    **SS form to transfer operator form**


    Consider


    $y(k) + a_1 y(k-1) + \cdots + a_{n_a} y(k-n) = b_1 u(k-1) + \cdots + b_{n_b} u(k-n)$


    $\Downarrow$ equivalent


    $x(k+1) = Ax(k) + Bu(k)$


    $y(k) = Cx(k)$


    where, $x(k) \in \mathbb{R}^{n \times 1}, C = [1, 0, \dots, 0]$


    $B = \begin{bmatrix} b_1 \ b_2 \ \vdots \ b_n \end{bmatrix}, \quad A = \begin{bmatrix}
    -a_1 & 1 & 0 & \cdots & 0 \ -a_2 & 0 & 1 & \cdots & 0 \ \vdots & \vdots & \vdots
    & \ddots & 1 \ -a_n & 0 & 0 & \cdots & 0 \end{bmatrix}$


    Consider


    $x(k+1) = Ax(k) + Bu(k)$


    $y(k) = Cx(k) + Du(k)$


    $\Downarrow$ using shift operator


    $qx(k) = Ax(k) + Bu(k)$


    $\Rightarrow (qI - A)x(k) = Bu(k)$


    $\Rightarrow x(k) = (qI - A)^{-1}Bu(k)$


    $\Rightarrow y(k) = [C(qI - A)^{-1}B + D]u(k)$


    $G(q)$


    Nonetheless, we have seen in this chapter that SS model enjoys some significant
    advantages vis-à-vis ARMAX models such as no requirement of *a prior* parametrization
    (i.e., delay and orders for all the inputs need not be pre-specified) and usage
    of robust SVD calculations for model fitting.


    Hopefully, this chapter has sufficiently impressed upon you the powerful capabilities
    of CVA. Due to its favorable properties, it is not surprising that CVA is one
    of the SysID methods provided in Aspen’s DMCplus software$^{73}$. With this we
    complete our brief foray into the world of MIMO dynamic process modeling. Be mindful
    that we have only scratched the surface of the vast literature on SIM and CVA.
    We hope that you have gained sufficient understanding of how CVA works and the
    confidence to use it to build predictive and monitoring tools. You now have all
    the tools to handle SISO and MIMO linear systems. Moving ahead, we will now'

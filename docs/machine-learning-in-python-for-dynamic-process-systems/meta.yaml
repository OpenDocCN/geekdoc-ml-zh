- md: "## 7.5 Box-Jenkins Models: An Introduction\n\nBox-Jenkins (BJ) model relaxes\
    \ the restriction of (common $A(q^{-1})$ polynomial in $G$ and $H$ operators in)\
    \ ARMAX model and uses disturbance signal dynamics completely different from the\
    \ deterministic dynamics. As shown in Figure 7.6, $G$ and $H$ operators are independently\
    \ parameterized which ensures unbiased deterministic model estimation. Expectedly,\
    \ the model expressions are more complex and requires specification of 5 hyperparameters,\
    \ vis-a-vis, $n_a$, $n_b$, $n_c$, $n_d$, $d$. Moreover, nonlinear optimization\
    \ is required for model fitting. Let's see a quick example of modeling an industrial\
    \ gas-furnace system via BJ model.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_147_0.png)\n\
    \n## Example 7.2:\n\nIn this illustration, we will use the popular Box-Jenkins\
    \ gas furnace dataset (https://www.itl.nist.gov/div898/handbook/pmc/section4/pmc451.htm).\
    \ The data comes from a SISO gas furnace wherein methane was combusted. The methane\
    \ feed rate is the input, the CO₂ concentration in the gases exiting the furnace\
    \ is the output, and 296 samples recorded at 9-second intervals are provided.\
    \ We will build a BJ model for this dataset using SIPPY. The code is almost identical\
    \ to that in the previous example.\n\n```python\n# read data\ndata = np.loadtxt('gas-furnace.csv',\
    \ delimiter=',')\nu = data[:,0, None]; y = data[:,1, None]\n\n# center data\n\
    u_scaler = StandardScaler(with_std=False); u_centered = u_scaler.fit_transform(u)\n\
    y_scaler = StandardScaler(with_std=False); y_centered = y_scaler.fit_transform(y)\n\
    \n# fit BJ model\nBJmodel = SysID(y_centered, u_centered, 'BJ', IC='AIC', nb_ord=[3,3],\
    \ nc_ord=[1,1], nd_ord=[2,2],\n                nf_ord=[2,2], delays=[2,2], max_iterations=500)\n\
    \n# see SIPPY user-guide for details on symbols used for transfer operator polynomials\n\
    print(BJmodel.G)\nprint(BJmodel.H)\n```\n\nThe obtained polynomials of the transfer\
    \ operators are very close to those reported in the original source (Box et al.,\
    \ Time Series Analysis: Forecasting and Control, Wiley). The above model also\
    \ (almost) passes the residual diagnostics check as shown below by the ACF and\
    \ CCF plots of the residuals.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_148_0.png)\n\
    \n## 7.6 ARIMAX Models: An Introduction\n\nSo far we have worked under the assumption\
    \ that the process disturbances ($v(k)$) are stationary. However, this may not\
    \ always be true. Nonetheless, if $v(k)$ is difference stationary, then it can\
    \ be modeled as an ARIMA process: $v(k) = \\frac{C(q^{-1})}{(1-q^{-1})^d A(q^{-1})}\
    \ e(k)$ where $d$ is the differencing order$^{58}$, and the final model looks\
    \ as shown in Figure 7.7.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_149_0.png)\n\
    \nFigure 7.7: Model structure of ARIMAX. Note that here $d$ denotes the differencing\
    \ order and not the process delay.\n\nLet's do some quick algebraic manipulation\
    \ to understand the implications of employing this model.\n\nARIMAX model: $y(k)\
    \ = q^{-n_d} \\frac{B(q^{-1})}{A(q^{-1})} u(k) + \\frac{C(q^{-1})}{(1-q^{-1})^d\
    \ A(q^{-1})} e(k)$\n\n$\\Rightarrow (1-q^{-1})^d y(k) = q^{-n_d} \\frac{B(q^{-1})}{A(q^{-1})}\
    \ (1-q^{-1})^d u(k) + \\frac{C(q^{-1})}{A(q^{-1})} e(k)$\n\n$\\Rightarrow \\tilde{y}(k)\
    \ = q^{-n_d} \\frac{B(q^{-1})}{A(q^{-1})} \\tilde{u}(k) + \\frac{C(q^{-1})}{A(q^{-1})}\
    \ e(k)$\n\nwhere $\\tilde{y}(k) = (1-q^{-1})^d y(k)$\n$\\tilde{u}(k) = (1-q^{-1})^d\
    \ u(k)$\n\nARMAX model!\n\nThe expression above shows that ARIMAX model is equivalent\
    \ to ARMAX model on differenced input and output signals! Moreover, getting ARMAX\
    \ model on differenced data provides an unbiased estimate of the deterministic\
    \ model or the input transfer operator $G$ between $u(k)$ and $y(k)$. Like ARIMA\
    \ models, ARIMAX should be used with caution or only when necessary. If $v(k)$\
    \ does not have any integration non-stationarity, then differencing $u(k)$ and\
    \ $y(k)$ will only amplify noise and reduce SNR. One way to ascertain disturbance\
    \ non-stationarity is to fit an OE model on undifferenced data and then assess\
    \ the properties of the residuals (via ACF/PACF or unit root tests). Let's work\
    \ out an example to understand the methodology better.\n\n## Example 7.3:\n\n\
    In this example, we will re-use the true process from Example 7.1 with a modification\
    \ of the AR coefficient in the disturbance model that now has an integrating term\
    \ as well as shown below.\n\n$$y(k) = \\frac{0.7q^{-1}}{1 - 0.7q^{-1}}u(k) + \\\
    frac{1}{(1 - q^{-1})(1 - 0.7q^{-1})}e(k)$$\n\nWe will see how the true deterministic\
    \ component can be recovered by working with differenced input and output signals.\n\
    \n```python\n# import packages\nimport matplotlib.pyplot as plt\n```\n\nThe ACF\
    \ plots below show the autocorrelation of the residual sequence before and after\
    \ differencing. It is clear that the process is impacted by non-stationary disturbance\
    \ and the non-stationarity goes away after the first differencing of the residuals.\
    \ Guided by these observations, we will build an ARMAX model after differencing\
    \ the input and output signals once.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_151_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_151_1.png)\n\n```python\nplot_acf(OEresiduals)\n\
    plot_acf(np.diff(OEresiduals, axis=0))\n```\n\n```python\n# Fit ARMAX model\n\
    # difference I/O data once\nu_centered_delta = np.diff(u_centered, axis=0)\ny_centered_delta\
    \ = np.diff(y_centered, axis=0)\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_151_2.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_151_3.png)\n\n```python\n# fit ARMAX\

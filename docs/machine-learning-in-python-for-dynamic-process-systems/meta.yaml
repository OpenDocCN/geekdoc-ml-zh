    # Running/Executing Python code


    Once Anaconda is installed, you can write your code in any text editor (like Notepad),
    save it in .py format, and then run via Anaconda command terminal. However, a
    convenient alternative is to use IDEs (integrated development environments). IDEs
    not just allow creating .py scripts, but also execute them on the fly, i.e., we
    can make code edits and see the results immediately, all within an integrated
    environment. Among the several available Python IDEs (PyCharm, VS Code, Spyder,
    etc.), we found Spyder to be the most convenient and functionality-rich, and therefore
    is discussed in the next section.


    Jupyter Notebooks are another very popular way of writing and executing Python
    code. These notebooks allow combining code, execution results, explanatory text,
    and multimedia resources in a single document. As you can imagine, this makes
    saving and sharing complete data analysis very easy.



    \ ARMA(p,r) due to the $p^{th}$ order autoregressive component and $r^{th}$ order\
    \ moving average component. It is apparent that AR and MA models are special cases\
    \ of ARMA model. Additionally, any stationary and invertible ARMA model can equivalently\
    \ be rewritten an AR($\\infty$) or a MA($\\infty$) model.\n\nARMA models are not\

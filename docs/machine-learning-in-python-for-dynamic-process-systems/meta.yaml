  md: '# 8.4 Monitoring Industrial Chemical Plants using CVA


    In this section we will see another application of CVA. We will learn the details
    of CVA-based monitoring tool development through step-by-step application for
    a large-scale industrial chemical plant. The process under study is called Tennessee
    Eastman process (TEP) and Figure 8.5 shows the process flowsheet. This process
    consists of several unit operations: a reactor, a condenser, a separator, a stripper,
    and a recycle compressor. There are 22 continuous process measurements, 19 composition
    measurements, and 11 manipulated variables. A dataset for this process has been
    made available at https://github.com/camaramm/tennessee-eastman-profBraatz.71
    The dataset contains training and test data from normal operation period and 21
    faulty periods with distinct fault causes. For each fault class, training dataset
    contains 480 samples collected over 24 operation hours and test dataset contains
    960 samples collected over 48 operation hours. For the faulty data, faulty operation
    starts from sample 160 onwards.



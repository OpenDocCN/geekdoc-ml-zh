    This completes our quick overview of time-series analysis and its applications.
    Hopefully, you have gained an in-depth understanding of the concepts behind time-series
    analysis and can appreciate its usefulness in describing process systems.


    # Summary


    In this chapter we looked at the four common models used to describe time series,
    namely, AR, MA, ARMA, and ARIMA models. We studied their model forms and procedures
    behind the corresponding model order selection. We looked at how ACF and PACF
    tools provide useful clues regarding model structure. We also looked into more
    details the stationarity requirements of TSA models and ways of assessing stationarity
    of signals. We will build upon the concepts covered in this chapter and look at
    models used to describe input-output dynamic signals in the next chapter.'

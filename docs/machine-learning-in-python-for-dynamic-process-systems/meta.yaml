  md: "Let's compute the monitoring indices for the training dataset. To ensure a\
    \ better understanding of the methodology, we will skip the usage of SIPPY package\
    \ for CVA modeling and carry out each step from scratch.\n\n```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## generate past (p) and future (f) vectors for training dataset and center them\n\
    %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\nN = trainingData.shape[0]\n\
    l = 3 # as used by Russell et. al\nm = uData_training.shape[1]\nr = yData_training.shape[1]\n\
    \npMatrix_train = np.zeros((N-2*l, l*(m+r)))\nfMatrix_train = np.zeros((N-2*l,\
    \ (l+1)*r))\nfor i in range(l, N-l):\n    pMatrix_train[i-l,:] = np.hstack((yData_training[i-l:i,:].flatten(),\
    \ uData_training[i-l:i,:].flatten()))\n    fMatrix_train[i-l,:] = yData_training[i:i+l+1,:].flatten()\n\
    \n# center data\np_scaler = StandardScaler(with_std=False); pMatrix_train_centered\
    \ = p_scaler.fit_transform(pMatrix_train)\nf_scaler = StandardScaler(with_std=False);\
    \ fMatrix_train_centered = f_scaler.fit_transform(fMatrix_train)\n\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    ## computes covariances and perform SVD\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    import scipy\n\nsigma_pp = np.cov(pMatrix_train_centered, rowvar=False)\nsigma_ff\
    \ = np.cov(fMatrix_train_centered, rowvar=False)\nsigma_pf = np.cov(pMatrix_train_centered,\
    \ fMatrix_train_centered,\n                   rowvar=False)[:len(sigma_pp),len(sigma_pp):]\n\
    \nmatrixProduct = np.dot(np.dot(np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real),\
    \ sigma_pf),\n                       np.linalg.inv(scipy.linalg.sqrtm(sigma_ff).real))\n\
    \nU, S, V = np.linalg.svd(matrixProduct)\nJ = np.dot(np.transpose(U), np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real))\n\
    \n# get the reduced order matrices\nn = 29 # as used by Russell et. al\nJn = J[:n,:]\n\
    Je = J[n:,:]\n```"

    \ list into array\nu_augment_test_scaled = np.array(u_augment_test_scaled)\ny_augment_test_scaled\
    \ = np.array(y_augment_test_scaled)\n```\n\n虽然在验证数据集上生成1步超前预测很简单，但下面的代码展示了如何生成仿真响应或无限步超前预测。很容易看出，我们只是使用过去的模型预测来生成后续预测。\n\
    \n```python\n# infinite-step ahead predictions on test dataset [first u_lags samples\

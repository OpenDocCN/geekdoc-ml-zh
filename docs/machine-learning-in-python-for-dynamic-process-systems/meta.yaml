  md: "+   - **Model validation**: Once a model has been fitted, the next step is\
    \ to check if the model truly represents the underlying process. Several techniques\
    \ are at a modeler's disposal. For example, you could check the model's performance\
    \ on a dataset that has not been used during parameter estimation, plot the modeling\
    \ errors to look for leftover patterns, or check if the model agrees with the\
    \ *a priori* information about the system. Often, your first model will fail the\
    \ validation procedure. An expert modeler can use the validation results to infer\
    \ the reasons for the failure. Some examples of the cause could be\n    - Training\
    \ data was not ‘rich’ enough\n    - Training data was not pre-treated adequately\n\
    \    - Choice of model structure was wrong\n    - Estimation algorithm did not\
    \ converge\n\nOnce diagnosed, appropriate corrections are made, and the iterative\
    \ procedure continues.\n\nWe hope that you get the understanding that SysID is\
    \ more than just black-box application of modeling algorithm for estimation of\
    \ model parameters. There are several practical aspects that require active participation\
    \ of the modeler during the SysID process. Without exaggeration, we can say that\
    \ SysID is an art, and the rest of the book will help you obtain the necessary\
    \ skills to become the SysID artist!\n\n# 1.3 Taxonomy of ML-based Dynamic Models\n\
    \nThe field of system identification is overwhelmingly extensive owing to the\
    \ decades of research that has led to the development of several specialized techniques.\
    \ Figure 1.5 gives an overview of some of the popular methods and models that\
    \ we will cover in this book. These models represent only a subset of all the\
    \ SysID models out there and this selection is based on our experience regarding\
    \ the relevance of these models for process systems modeling. We largely focus\
    \ on time-invariant², discrete-time models and these shown models can help you\
    \ handle a large majority of DPM problems you will encounter in process industry.\n\
    \n² Models where time variable does not appear as an explicit variable."

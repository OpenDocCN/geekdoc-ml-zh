  md: '# 5.5 Monitoring Controlled Variables in a CSTR using ARMA Models


    To illustrate a practical application of time series analysis, we will consider
    the continuous stirred-tank reactor described in the chapter introduction. Here,
    the product temperature will be monitored to ensure it is not deviating away from
    its optimal setpoint due to any process fault. The datafile *CSTR_controlledTemperature.csv*
    contains 4 hours of temperature measurements<sup>40</sup> sampled at 0.1 seconds
    (totaling 2401 samples). A process fault occurs at 3.5 hours (around sample #
    2100) causing a 20% decrease in the heat transfer coefficient. Let''s see if this
    process fault causes any deviations in the product temperature and if our monitoring
    methodology can detect these deviations.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_105_0.png)


    Let''s start by importing the required packages and exploring the provided I/O
    dataset. The first 3 hours of data will be used to build a model and the last
    1 hour will be used as test data.


    ```

    # import packages

    import matplotlib.pyplot as plt, numpy as np, control

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    from statsmodels.tsa.stattools import arma_order_select_ic

    from statsmodels.tsa.arima.model import ARIMA

    ```'
  merge: -1
  pgno: 105
- img_proc: true
  md: '```

    # read data and split into training and test data

    T = np.loadtxt(''CSTR_controlledTemperature.csv'', delimiter='','')

    T_train = T[:1800]; T_test = T[1800:]

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_106_0.png)


    The plot above shows that the temperature seems to show only a short-lived<sup>42</sup>
    deviation in its absolute value due to the process fault. Therefore, on the basis
    of this time-plot alone, plant operators could very well ignore this as an unimportant
    fluctuation and the process fault could go unattended.


    The trivial univariate monitoring approach of using *mean ± 2 * standard deviation*
    bounds would also be inadequate because this approach assumes that the samples
    are independent of each-other, which as shown by the below ACF plot of *T_train*
    data, is certainly not true for the product outlet temperature (and dynamic processes
    in general). The control chart shown below shows the failure of this approach
    as the controlled variable does not show any sustained unusual violations of the
    control bounds (bounds are computed using the training data only).


    ![](img/6cffacf6247d6f7caa7eacc348cef427_106_1.png)


    Let''s now see if the time-series models can do a better job of fault detection.
    We will attempt to fit an ARMA model.'

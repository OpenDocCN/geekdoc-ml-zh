    # 3.4 Cross-correlation Function (CCF)


    Cross-correlation measures the linear relationship between two sequences, say,
    $u(k)$ and $y(k)$, and is estimated as


    $$\rho_{yu}(\ell) = \frac{\sum_{k=\ell}^{N-1} (y(k)-\bar{y})(u(k-\ell)-\bar{u})}{\sqrt{\sum_{k=0}^{N-1}(y(k)-\bar{y})^2
    (u(k)-\bar{u})^2}}$$ eq. 2


    The plot of cross-correlation coefficients versus lag $\ell$ is called cross-correlation
    function.


    **Example 3.2:** Consider the input-output process below


    $$y(k) = 0.6y(k-1) + 0.7u(k-3) + e(k)$$


    Data-file SimpleInputOutput.txt contains 1000 observations of $y(k)$ and $u(k)$.
    The code below generates the CCF plot.


    ```

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from statsmodels.tsa.stattools import ccf


    # read data

    data = np.loadtxt(''simpleInputOutput.csv'', delimiter='','')

    u = data[:,0]; y = data[:,1]


    # compute CCF values for lags = -20 to 20

    ccf_vals_ = ccf(y, u) # ccf for lag >= 0

    ccf_vals_neg_lags = np.flip(ccf(u, y)) # ccf for lag -1000 to 0

    ccf_vals = np.hstack((ccf_vals_neg_lags[-21:-1], ccf_vals_[:21]))


    # generate CCF plot

    conf_int = 2/np.sqrt(len(y))

    lags = np.arange(-20,21)

    plt.plot(lags, ccf_vals) # no in-built analogue of plot_acf is provided by Stattools

    plt.gca().axhspan(-conf_int, conf_int) # confidence interval

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_60_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_60_1.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_60_2.png)


    This property is used in the code above to compute ccf values for lags <=0


    > CCF Properties

    - $-1 \le \rho_{yu}(\ell) \le 1$

    - $\rho_{yy}(\ell)$ is asymmetric, i.e., $\rho_{yu}(\ell) \neq \rho_{yu}(-\ell)$
    and $\rho_{yu}(\ell) = \rho_{uy}(-\ell)$'

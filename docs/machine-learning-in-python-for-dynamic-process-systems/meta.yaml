- md: "## White Noise\n\nNow that we understand ACFs, let’s formally describe the\
    \ term ‘white noise’ that we have already used a few times. A stochastic sequence\
    \ $e(k)$ is referred to as white noise if its samples have a probabilistic distribution\
    \ with zero mean and finite variance (say $\\sigma^2$), and the following theoretical\
    \ ACF\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_57_0.png)\n\nTherefore, samples\
    \ of $e(k)$ are serially uncorrelated random variables. In practice, the autocorrelation\
    \ coefficients may not be exactly zero but will be close to zero. Nonetheless,\
    \ it can be expected that 95% of the coefficients will lie within the $\\pm 2/\\\
    sqrt{N}$ band as shown in Example 3.1. Also note that although gaussian white\
    \ noise is commonly used, there are no constraints on the probability distribution\
    \ of the samples. Accordingly, you can encounter the following notation in SysID\
    \ literature\n\n$e(k) \\sim WN(0, \\sigma^2)$ (white noise) or $e(k) \\sim GWN(0,\
    \ \\sigma^2)$ (gaussian white noise)\n\nA related term is iid (independent and\
    \ identically distributed) noise. Every iid sequence is WN but not conversely.\
    \ The easiest way to generate a white noise signal is to use Numpy’s random normal\
    \ function as follows\n\n```\n# import packages\nimport numpy as np, matplotlib.pyplot\
    \ as plt\n\n# generate GWN (1000 observations, mean 0, variance 1)\ne = np.random.normal(loc=0,\
    \ scale=1, size=1000)\nplt.plot(e, 'black', linewidth=0.5)\nplt.ylabel('White\
    \ noise'), plt.xlabel('k')\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_57_1.png)\n\
    \nThe use of the term ‘white’ to describe such a noise stems from its spectral\
    \ properties which we will study shortly. Any noise signal that is not white is\
    \ a ‘colored’ noise signal. In essence, a white noise is perfectly unpredictable,\
    \ i.e., no amount of past observations can provide any clues about future observations.\
    \ Nevertheless, such signals are the basic building blocks for building complex\
    \ models of disturbance signals (more on this in Chapter 5).\n\n## 3.3 Partial\
    \ Autocorrelation Function (PACF)\n\nConsider again the process in Example 3.1.\
    \ The ACF plot suggests that $y(k)$ and $y(k-2)$ are correlated (and so are $y(k)$\
    \ and $y(k-3)$ and so on). This seems to indicate some inconsistency with the\
    \ governing difference equation which relates only the successive samples $y(k)$\
    \ and $y(k-1)$. However, it is easy to see that $y(k)$ and $y(k-2)$ end up being\
    \ correlated because $y(k-1)$ and $y(k-2)$ are directly correlated.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_58_0.png)\n\
    \nIn time series analysis, knowing direct correlation helps to decide what terms\
    \ should be part of the governing difference equation during model structure selection.\
    \ To compute the direct correlation between $y(k)$ and $y(k-2)$, the effects of\
    \ $y(k-1)$ are 'discounted' or removed from both $y(k)$ and $y(k-2)$. The correlation\
    \ between the discounted variables gives the direct correlation or, more formally,\
    \ partial correlation. Algorithm below shows the procedure for computation of\
    \ partial (auto)correlation\n\n**Algorithm: Partial autocorrelation between $y(k)$\
    \ and $y(k-2)$**\n\n1. Perform least squares fit between $y(k)$ and $y(k-1)$ as\
    \ well as between $y(k-2)$ and $y(k-1)$ separately\n2. Generate predictions from\
    \ the least squares models and compute the following residuals\n   $$\\epsilon_{y_k}\
    \ = y_k - \\hat{y}_k \\quad \\text{and} \\quad \\epsilon_{y_{k-2}} = y_{k-2} -\
    \ \\hat{y}_{k-2}$$\n   discounted variables\n3. Partial autocorrelation coefficient\
    \ $\\phi_{yy}(2) \\equiv$ correlation between $\\epsilon_{y_k}$ and $\\epsilon_{y_{k-2}}$\n\
    \nThe partial autocorrelation coefficient for lag 3 can be computed following\
    \ the above algorithm wherein the effects of $y(k-1)$ and $y(k-2)$ are discounted\
    \ from $y(k)$ and $y(k-3)$. Other coefficients can be computed similarly and plotted\
    \ versus lags to give partial autocorrelation function (PACF). Let's revisit our\
    \ earlier example.\n\n## Example 3.1 continued:\n\nThe code below generates the\
    \ PACF plot.\n\n```\n# generate PACF plot\nconf_int = 2/np.sqrt(len(y))\nplot_pacf(y,\
    \ lags= 20, alpha=None)\nplt.gca().axhspan(-conf_int, conf_int, facecolor='lightblue')\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_59_0.png)\n\nThe PACF plot is\
    \ along the expected lines. Only the coefficient at lag=1 is significant. Note\
    \ that at lag=1, PACF and ACF values are the same as there are no intermediate\
    \ variables. Moreover, PACF value at lag=0 is not defined but is often set to\
    \ unity for visualization purposes.\n\nThe utility of PACF should be clear to\
    \ you now. Another interpretation of PACF is worth mentioning. Suppose you fit\
    \ the following ($p^{th}$ order) autoregressive model.\n\n$y(k) = a_1y(k-1) +\
    \ a_2y(k-2) \\cdots + a_py(k-p) + e(k)$\n\nThe coefficient or weight ($a_p$) corresponding\
    \ to the $p^{th}$ lagged regressor ($y(k-p)$) equals the PACF value for lag $p$\
    \ or $\\varphi_{yy}(p)$. Therefore, the lag corresponding to the last significant\
    \ PACF value in a PACF plot can indicate the number of terms to be used in an\
    \ autoregressive model. More on this later in the chapter on time series analysis.\n\
    \n## 3.4 Cross-correlation Function (CCF)\n\nCross-correlation measures the linear\
    \ relationship between two sequences, say, $u(k)$ and $y(k)$, and is estimated\
    \ as\n\n$$\\rho_{yu}(\\ell) = \\frac{\\sum_{k=\\ell}^{N-1} (y(k)-\\bar{y})(u(k-\\\
    ell)-\\bar{u})}{\\sqrt{\\sum_{k=0}^{N-1}(y(k)-\\bar{y})^2 (u(k)-\\bar{u})^2}}$$\
    \ eq. 2\n\nThe plot of cross-correlation coefficients versus lag $\\ell$ is called\
    \ cross-correlation function.\n\n**Example 3.2:** Consider the input-output process\
    \ below\n\n$$y(k) = 0.6y(k-1) + 0.7u(k-3) + e(k)$$\n\nData-file SimpleInputOutput.txt\
    \ contains 1000 observations of $y(k)$ and $u(k)$. The code below generates the\
    \ CCF plot.\n\n```\n# import packages\nimport numpy as np, matplotlib.pyplot as\
    \ plt\nfrom statsmodels.tsa.stattools import ccf\n\n# read data\ndata = np.loadtxt('simpleInputOutput.csv',\
    \ delimiter=',')\nu = data[:,0]; y = data[:,1]\n\n# compute CCF values for lags\
    \ = -20 to 20\nccf_vals_ = ccf(y, u) # ccf for lag >= 0\nccf_vals_neg_lags = np.flip(ccf(u,\
    \ y)) # ccf for lag -1000 to 0\nccf_vals = np.hstack((ccf_vals_neg_lags[-21:-1],\
    \ ccf_vals_[:21]))\n\n# generate CCF plot\nconf_int = 2/np.sqrt(len(y))\nlags\
    \ = np.arange(-20,21)\nplt.plot(lags, ccf_vals) # no in-built analogue of plot_acf\
    \ is provided by Stattools\nplt.gca().axhspan(-conf_int, conf_int) # confidence\
    \ interval\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_60_0.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_60_1.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_60_2.png)\n\nThis property is used\
    \ in the code above to compute ccf values for lags <=0\n\n> CCF Properties\n-\
    \ $-1 \\le \\rho_{yu}(\\ell) \\le 1$\n- $\\rho_{yy}(\\ell)$ is asymmetric, i.e.,\
    \ $\\rho_{yu}(\\ell) \\neq \\rho_{yu}(-\\ell)$ and $\\rho_{yu}(\\ell) = \\rho_{uy}(-\\\
    ell)$\n\n## Examples on inferences drawn using CCF<sup>17</sup>\n\nModel structure\
    \ selection:\n\nThe CCF between $u(k)$ and $y(k)$ can give some crucial hints\
    \ about the time delay (dead time ($d$)) of the process<sup>18</sup>. Consider\
    \ the following scenario and the fact that dead time is the smallest value $d$\
    \ with which $u(k-1-d)$ influences $y(k)$ directly.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_61_0.png)\n\
    \nAsymmetricity is due to the fact that past values of $u(k)$ are related to $y(k)$\
    \ differently than the future values\n\nA peak at lag = 3 and insignificant CCF\
    \ values for lag <=2\n$\\Rightarrow$ A good guess for $d$ is 2\n\nResidual diagnostics:\n\
    \nIf a model has adequately captured the relationship between input and output,\
    \ then $\\rho_{\\epsilon u}(\\ell)$ between the residual ($\\epsilon(k)$) and\
    \ the input sequences ($u(k)$) should be nearly zero for positive<sup>19</sup>\
    \ lags because $\\epsilon(k)$ should not have any relationship with past input\
    \ values.<sup>20</sup>\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_61_1.png)\n\
    \nModel residuals are uncorrelated with input $\\Rightarrow$ no effect of input\
    \ remains in the residuals\n\n<sup>17</sup> Like ACF, CCF also has a covariance\
    \ counterpart called cross-covariance function (CCVF) and is given as $\\sigma_{yu}(\\\
    ell) = \\frac{1}{N} \\sum_{k=\\ell}^{N-1} (y(k) - \\bar{y})(u(k - \\ell) - \\\
    bar{u})$. Note that $N-\\ell$ could be set as denominator instead of $N$ to get\
    \ unbiased estimates.\n\n<sup>18</sup> We will formally introduce the term *dead\
    \ time* in Chapter 6. But we figured that if you already knew what dead time is\
    \ then you may appreciate this example.\n\n<sup>19</sup> Significant correlation\
    \ for negative lags implies relation between residuals and future input values\
    \ which is an indication of closed-loop feedback (and not necessarily model inadequacy).\
    \ We will learn more on this later.\n\n<sup>20</sup> A small caveat here is that\
    \ either $\\epsilon(k)$ or $u(k)$ should be white to impose this condition"
  mdcn: "## 白噪声\n\n既然我们已经理解了自相关函数（ACF），现在让我们正式描述一下已经使用过几次的术语“白噪声”。一个随机序列 $e(k)$ 被称为白噪声，如果其样本具有零均值和有限方差（例如\
    \ $\\sigma^2$）的概率分布，并且满足以下理论自相关函数：\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_57_0.png)\n\
    \n因此，$e(k)$ 的样本是序列不相关的随机变量。在实践中，自相关系数可能不完全为零，但会接近零。尽管如此，可以预期95%的系数将落在 $\\pm 2/\\\
    sqrt{N}$ 的区间内，如示例3.1所示。另请注意，虽然高斯白噪声是常用的，但对样本的概率分布没有约束。因此，在系统辨识文献中可能会遇到以下符号表示：\n\
    \n$e(k) \\sim WN(0, \\sigma^2)$（白噪声）或 $e(k) \\sim GWN(0, \\sigma^2)$（高斯白噪声）\n\n\
    一个相关术语是独立同分布（iid）噪声。每个独立同分布序列都是白噪声，但反之则不然。生成白噪声信号最简单的方法是使用Numpy的随机正态函数，如下所示：\n\
    \n```\n# import packages\nimport numpy as np, matplotlib.pyplot as plt\n\n# generate\
    \ GWN (1000 observations, mean 0, variance 1)\ne = np.random.normal(loc=0, scale=1,\
    \ size=1000)\nplt.plot(e, 'black', linewidth=0.5)\nplt.ylabel('White noise'),\
    \ plt.xlabel('k')\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_57_1.png)\n\
    \n使用“白”这个术语来描述这种噪声源于其频谱特性，我们很快就会研究。任何非白的噪声信号都是“有色”噪声信号。本质上，白噪声是完全不可预测的，即，无论过去有多少观测值，都无法为未来的观测提供任何线索。尽管如此，这些信号是构建复杂扰动信号模型的基本构建块（更多内容见第5章）。\n\
    \n## 3.3 偏自相关函数（PACF）\n\n再次考虑示例3.1中的过程。ACF图表明 $y(k)$ 和 $y(k-2)$ 是相关的（$y(k)$ 和\
    \ $y(k-3)$ 等也是如此）。这似乎表明与仅关联连续样本 $y(k)$ 和 $y(k-1)$ 的控制差分方程存在一些不一致。然而，很容易看出 $y(k)$\
    \ 和 $y(k-2)$ 最终相关是因为 $y(k-1)$ 和 $y(k-2)$ 直接相关。\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_58_0.png)\n\
    \n在时间序列分析中，了解直接相关性有助于在模型结构选择期间决定哪些项应成为控制差分方程的一部分。为了计算 $y(k)$ 和 $y(k-2)$ 之间的直接相关性，需要从\
    \ $y(k)$ 和 $y(k-2)$ 中“折扣”或移除 $y(k-1)$ 的影响。折扣后变量之间的相关性给出了直接相关性，或者更正式地说，偏相关性。下面的算法显示了计算偏（自）相关性的过程：\n\
    \n**算法：$y(k)$ 和 $y(k-2)$ 之间的偏自相关**\n\n1. 分别对 $y(k)$ 和 $y(k-1)$ 之间以及 $y(k-2)$ 和\
    \ $y(k-1)$ 之间进行最小二乘拟合\n2. 从最小二乘模型生成预测值并计算以下残差\n   $$\\epsilon_{y_k} = y_k - \\\
    hat{y}_k \\quad \\text{and} \\quad \\epsilon_{y_{k-2}} = y_{k-2} - \\hat{y}_{k-2}$$\n\
    \   折扣变量\n3. 偏自相关系数 $\\phi_{yy}(2) \\equiv$ $\\epsilon_{y_k}$ 和 $\\epsilon_{y_{k-2}}$\
    \ 之间的相关性\n\n滞后3的偏自相关系数可以按照上述算法计算，其中从 $y(k)$ 和 $y(k-3)$ 中折扣了 $y(k-1)$ 和 $y(k-2)$\
    \ 的影响。其他系数可以类似地计算，并绘制相对于滞后的图，得到偏自相关函数（PACF）。让我们重新审视之前的例子。\n\n## 示例3.1续：\n\n下面的代码生成PACF图。\n\
    \n```\n# generate PACF plot\nconf_int = 2/np.sqrt(len(y))\nplot_pacf(y, lags=\
    \ 20, alpha=None)\nplt.gca().axhspan(-conf_int, conf_int, facecolor='lightblue')\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_59_0.png)\n\nPACF图符合预期。只有滞后=1处的系数是显著的。注意在滞后=1处，PACF和ACF值相同，因为没有中间变量。此外，滞后=0处的PACF值未定义，但为了可视化目的通常设置为1。\n\
    \n现在你应该清楚PACF的用途了。PACF的另一个解释值得一提。假设你拟合以下（$p^{th}$阶）自回归模型。\n\n$y(k) = a_1y(k-1)\
    \ + a_2y(k-2) \\cdots + a_py(k-p) + e(k)$\n\n对应于 $p^{th}$ 滞后回归量（$y(k-p)$）的系数或权重（$a_p$）等于滞后\
    \ $p$ 的PACF值或 $\\varphi_{yy}(p)$。因此，PACF图中最后一个显著PACF值对应的滞后可以指示自回归模型中应使用的项数。更多内容将在时间序列分析章节中介绍。\n\
    \n## 3.4 互相关函数（CCF）\n\n互相关衡量两个序列（例如 $u(k)$ 和 $y(k)$）之间的线性关系，估计为：\n\n$$\\rho_{yu}(\\\
    ell) = \\frac{\\sum_{k=\\ell}^{N-1} (y(k)-\\bar{y})(u(k-\\ell)-\\bar{u})}{\\sqrt{\\\
    sum_{k=0}^{N-1}(y(k)-\\bar{y})^2 (u(k)-\\bar{u})^2}}$$ 公式 2\n\n互相关系数相对于滞后 $\\\
    ell$ 的图称为互相关函数。\n\n**示例3.2：** 考虑以下输入输出过程\n\n$$y(k) = 0.6y(k-1) + 0.7u(k-3) + e(k)$$\n\
    \n数据文件SimpleInputOutput.txt包含1000个 $y(k)$ 和 $u(k)$ 的观测值。下面的代码生成CCF图。\n\n```\n\
    # import packages\nimport numpy as np, matplotlib.pyplot as plt\nfrom statsmodels.tsa.stattools\
    \ import ccf\n\n# read data\ndata = np.loadtxt('simpleInputOutput.csv', delimiter=',')\n\
    u = data[:,0]; y = data[:,1]\n\n# compute CCF values for lags = -20 to 20\nccf_vals_\
    \ = ccf(y, u) # ccf for lag >= 0\nccf_vals_neg_lags = np.flip(ccf(u, y)) # ccf\
    \ for lag -1000 to 0\nccf_vals = np.hstack((ccf_vals_neg_lags[-21:-1], ccf_vals_[:21]))\n\
    \n# generate CCF plot\nconf_int = 2/np.sqrt(len(y))\nlags = np.arange(-20,21)\n\
    plt.plot(lags, ccf_vals) # no in-built analogue of plot_acf is provided by Stattools\n\
    plt.gca().axhspan(-conf_int, conf_int) # confidence interval\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_60_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_60_1.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_60_2.png)\n\
    \n上述代码中利用了这一性质来计算滞后 <=0 的ccf值\n\n> CCF性质\n- $-1 \\le \\rho_{yu}(\\ell) \\le 1$\n\
    - $\\rho_{yy}(\\ell)$ 是非对称的，即 $\\rho_{yu}(\\ell) \\neq \\rho_{yu}(-\\ell)$ 且 $\\\
    rho_{yu}(\\ell) = \\rho_{uy}(-\\ell)$\n\n## 使用CCF进行推断的示例<sup>17</sup>\n\n模型结构选择：\n\
    \n$u(k)$ 和 $y(k)$ 之间的CCF可以提供关于过程时间延迟（纯滞后（$d$））<sup>18</sup>的一些关键提示。考虑以下场景以及纯滞后是使\
    \ $u(k-1-d)$ 直接影响 $y(k)$ 的最小值 $d$ 这一事实。\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_61_0.png)\n\
    \n非对称性是由于 $u(k)$ 的过去值与 $y(k)$ 的关系不同于未来值\n\n滞后=3处出现峰值且滞后<=2处的CCF值不显著\n$\\Rightarrow$\
    \ $d$ 的一个合理猜测是2\n\n残差诊断：\n\n如果模型充分捕捉了输入和输出之间的关系，那么残差（$\\epsilon(k)$）和输入序列（$u(k)$）之间的\
    \ $\\rho_{\\epsilon u}(\\ell)$ 对于正滞后<sup>19</sup> 应该接近零，因为 $\\epsilon(k)$ 不应与过去的输入值有任何关系。<sup>20</sup>\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_61_1.png)\n\n模型残差与输入不相关 $\\Rightarrow$\
    \ 输入的影响在残差中没有残留\n\n<sup>17</sup> 与ACF类似，CCF也有一个协方差对应物，称为互协方差函数（CCVF），表示为 $\\sigma_{yu}(\\\
    ell) = \\frac{1}{N} \\sum_{k=\\ell}^{N-1} (y(k) - \\bar{y})(u(k - \\ell) - \\\
    bar{u})$。注意，分母可以设为 $N-\\ell$ 而不是 $N$ 以获得无偏估计。\n\n<sup>18</sup> 我们将在第6章正式介绍*纯滞后*这个术语。但我们认为，如果你已经知道纯滞后是什么，你可能会欣赏这个例子。\n\
    \n<sup>19</sup> 负滞后处的显著相关性意味着残差与未来输入值之间存在关系，这是闭环反馈的迹象（不一定是模型不足）。我们稍后将了解更多。\n\n\
    <sup>20</sup> 这里有一个小注意事项：要么 $\\epsilon(k)$ 要么 $u(k)$ 应该是白噪声才能施加此条件"

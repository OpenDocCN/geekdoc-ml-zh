  md: '# CVA states


    In CVA, the two sets of vectors between which CCA is performed are $p(k)$ (defined
    in Eq. 1) and $f(k)$ where$^{64}$


    $$f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+l)]^T$$


    current and future outputs


    CVA therefore solves the following singular value decomposition problem and finds
    linear combinations of past inputs and outputs that are maximally correlated with
    linear combinations of the current and future outputs.


    $$\Sigma_{pp}^{-1/2} \Sigma_{pf} \Sigma_{ff}^{-1/2} = U \Sigma V^T$$


    eq. 2


    We know that $\Sigma$ is a diagonal matrix. Its elements are also called (Hankel)
    singular values. If $n$ is assumed to be the model order, then the optimal state
    at time $k$ that is most predictive of the future outputs is given by$^{65}$


    $$\hat{x}(k) = J_n p(k)$$


    Contains first $n$ rows of matrix $J = U^T \Sigma_{pp}^{-1/2}$


    # System matrices


    With the states estimated, the system matrices $(A, B, C, D)$ can be estimated
    via multivariable linear least-squares regression$^{66}$. The final expression
    can be derived as


    $$\begin{bmatrix} \hat{A} & \hat{B} \ \hat{C} & \hat{D} \end{bmatrix} = cov \left(
    \begin{bmatrix} \hat{x}(k+1) \ y(k) \end{bmatrix}, \begin{bmatrix} \hat{x}(k)
    \ u(k) \end{bmatrix} \right) cov^{-1} \left( \begin{bmatrix} \hat{x}(k) \ u(k)
    \end{bmatrix}, \begin{bmatrix} \hat{x}(k) \ u(k) \end{bmatrix} \right)$$


    The noise covariance matrices, $Q$ and $R$, can be estimated as the covariance
    matrices of the state and output residuals, respectively.


    $^{64}$ The number of lead values used to define $f(k)$ is taken equal to the
    number of lags used in $p(k)$ which is a common practice.


    $^{65}$ Alternatively, $\hat{x}(k) = U_n^T \Sigma_{pp}^{-1/2} p(k)$ where $U_n$
    contains the first $n$ columns of $U$.


    $^{66}$ The multivariable linear model is $\begin{bmatrix} x(k+1) \ y(k) \end{bmatrix}
    = \begin{bmatrix} A & B \ C & D \end{bmatrix} \begin{bmatrix} x(k) \ u(k) \end{bmatrix}
    + \begin{bmatrix} w(k) \ v(k) \end{bmatrix}$


    143'

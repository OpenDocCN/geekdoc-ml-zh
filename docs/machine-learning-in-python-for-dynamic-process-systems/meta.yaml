    A practitioner’s guide for building process modeling, predictive, and monitoring
    solutions using dynamic data


    First Edition


    Ankur Kumar, Jesus Flores-Cerrillo


    # Machine Learning in Python for Dynamic Process Systems


    A practitioner’s guide for building process modeling, predictive, and monitoring
    solutions using dynamic data


    Ankur Kumar

    Jesus Flores-Cerrillo


    Dedicated to our spouses, family, friends, motherland, and all the data-science

- md: "## 10.2 Modeling Heat Exchangers using FFNN-NARX\n\nTo learn how to setup and\
    \ fit a feed-forward neural network, we will reuse the heat-exchanger dataset\
    \ from Chapter 9 and build a FFNN-NARX model between the incoming liquid flow\
    \ and outgoing liquid temperature. The code for importing basic packages and loading\
    \ data into the workspace remains the same.\n\n```python\n# split dataset into\
    \ fitting and test dataset\nu_fit = u[:3000, 0:1]; u_test = u[3000:, 0:1]\ny_fit\
    \ = y[:3000, 0:1]; y_test = y[3000:, 0:1]\n\n# scale data before model fitting\n\
    u_scaler = StandardScaler()\nu_fit_scaled = u_scaler.fit_transform(u_fit); u_test_scaled\
    \ = u_scaler.transform(u_test)\ny_scaler = StandardScaler()\ny_fit_scaled = y_scaler.fit_transform(y_fit);\
    \ y_test_scaled = y_scaler.transform(y_test)\n```\n\nAs shown in Figure 10.1,\
    \ the input vector that gets supplied to the network for y(k)'s prediction includes\
    \ all the lagged variables. Therefore, we need to now create the augmented input\
    \ variables.\n\n```python\n# rearrange u and y data into (# observation samples,\
    \ # lagged regressors) form\nu_lags = 9; y_lags = 3\nu_augment_fit_scaled = []\n\
    y_augment_fit_scaled = []\n\nfor sample in range(max(u_lags, y_lags), u_fit.shape[0]):\n\
    \    row = np.hstack((u_fit_scaled[sample-u_lags:sample,0], y_fit_scaled[sample-y_lags:sample,0]))\n\
    \    u_augment_fit_scaled.append(row)\n    y_augment_fit_scaled.append(y_fit_scaled[sample])\n\
    \n# conversion: convert list into array\nu_augment_fit_scaled = np.array(u_augment_fit_scaled)\n\
    y_augment_fit_scaled = np.array(y_augment_fit_scaled)\n```\n\nWe are now ready\
    \ to define and fit our neural network.\n\n```python\n# import Keras libraries\n\
    from tensorflow.keras import Sequential\nfrom tensorflow.keras.layers import Dense\n\
    \n# define model\nmodel = Sequential()\nmodel.add(Dense(14, activation='relu',\
    \ kernel_initializer='he_normal', input_shape=(12,)))\n# 14 neurons in 1st hidden\
    \ layer; this hidden layer accepts data from a 12-dimensional input\nmodel.add(Dense(7,\
    \ activation='relu', kernel_initializer='he_normal'))\n# 7 neurons in 2nd layer\n\
    model.add(Dense(1)) # output layer\n\n# compile and fit model\nmodel.compile(loss='mse',\
    \ optimizer='Adam') # mean-squared error is to be minimized\nmodel.fit(u_augment_fit_scaled,\
    \ y_augment_fit_scaled, epochs=250, batch_size=125)\n```\n\nLet’s now get the\
    \ model predictions and residuals on the training dataset and see how our residuals\
    \ look like.\n\n```python\n# get model (1-step ahead) predictions and residuals\
    \ on training dataset\ny_augment_fit_scaled_pred = model.predict(u_augment_fit_scaled)\n\
    y_augment_fit_pred = y_scaler.inverse_transform(y_augment_fit_scaled_pred)\ny_augment_fit\
    \ = y_scaler.inverse_transform(y_augment_fit_scaled)\nresiduals_fit = y_augment_fit\
    \ - y_augment_fit_pred\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_193_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_193_1.png)\n\nResults are similar to\
    \ that seen for polynomial-NARX model. The slight breaches of the confidence interval\
    \ in CCF plot indicates the need to add more lagged variables as model inputs.\
    \ However, as a modeler, you have to make a judgement between making the model\
    \ more complex versus assessing the acceptability of slight model inaccuracies.\
    \ To check if the model can be useful, let's again check the model's simulation\
    \ response on the test dataset. We first need to arrange our test data in appropriate\
    \ form.\n\n```python\n# rearrange u and y data into (# sequence samples, # lagged\
    \ regressors) form\nu_augment_test_scaled = []\ny_augment_test_scaled = []\n\n\
    for sample in range(max(u_lags, y_lags), u_test.shape[0]):\n    row = np.hstack((u_test_scaled[sample-u_lags:sample,0],\
    \ y_test_scaled[sample-y_lags:sample,0]))\n    u_augment_test_scaled.append(row)\n\
    \    y_augment_test_scaled.append(y_test_scaled[sample])\n\n# conversion: convert\
    \ list into array\nu_augment_test_scaled = np.array(u_augment_test_scaled)\ny_augment_test_scaled\
    \ = np.array(y_augment_test_scaled)\n```\n\nWhile generating the 1-step ahead\
    \ predictions on validation dataset is straightforward, the code below shows how\
    \ to generate simulation response or the infinite-step ahead predictions. It is\
    \ easy to see that we are simply using the past model predictions to generate\
    \ subsequent predictions.\n\n```python\n# infinite-step ahead predictions on test\
    \ dataset [first u_lags samples are used as initial conditions]\ny_augment_test_scaled_sim\
    \ = np.copy(y_test_scaled)\n\nfor sample in range(u_lags, len(u_test),1):\n  \
    \  regressorVector = np.hstack((u_test_scaled[sample-u_lags:sample,0],\n     \
    \                           y_augment_test_scaled_sim[sample-y_lags:sample,0]))\n\
    \    regressorVector = regressorVector[None,:]\n    sim_response = model.predict(regressorVector)\n\
    \    y_augment_test_scaled_sim[sample] = sim_response\n\ny_augment_test_sim =\
    \ y_scaler.inverse_transform(y_augment_test_scaled_sim)\n```\n\nPlots below show\
    \ the 1-step ahead and the infinite-step ahead predictions (simulation response)\
    \ for the FFNN-NARX model.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_195_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_195_1.png)\n\nBy now we are informed\
    \ enough to not get very excited with good 1-step ahead predictions. However,\
    \ it is encouraging to see the good simulation response, which although not as\
    \ good as 1-step ahead predictions<sup>82</sup>, is able to match the ups and\
    \ downs in the raw measurements.\n\n<sup>82</sup> You may notice some minor variations\
    \ between your results and those shown in this chapter due to random nature of\
    \ network fitting algorithm.\n\n## Understanding flow of data in a FFNN\n\nIf\
    \ you execute the command *model.summary()* for the model developed in the previous\
    \ section, you will be presented with the following information which details\
    \ the number of parameters to be estimated in each layer of the network. Let's\
    \ understand how these numbers are obtained which will help clarify the flow of\
    \ information in FFNN.\n\n| Layer (type) | Output Shape | Param # |\n|---|---|---|\n\
    | dense_3 (Dense) | (None, 14) | 182 |\n| dense_4 (Dense) | (None, 7) | 105 |\n\
    | dense_5 (Dense) | (None, 1) | 8 |\n| Total params: 295 | | |\n| Trainable params:\
    \ 295 | | |\n| Non-trainable params: 0 | | |\n\nWe know that each augmented input\
    \ sample is 12-dimensional ($u_{aug} \\in R^{12}$). In the forward pass (also\
    \ called forward propagation), the augmented input is first processed by the neurons\
    \ of the first hidden layer. In the $j^{th}$ neuron of this layer, the weighted\
    \ sum of the inputs are non-linearly transformed via an activation function, $g$\n\
    \n$$a_j = g(w_j^T u_{aug} + b_j)$$\n\n$w_j \\in R^{12}$ are the weights applied\
    \ to the inputs and $b_j$ is the bias added to the sum. Thus, each neuron has\
    \ 13 parameters (12 weights and a bias) leading to 182 parameters for all the\
    \ 14 neurons of the $1^{st}$ layer that need to be estimated. Outputs of all the\
    \ 14 neurons form vector $a^{(1)} \\in R^{14}$\n\n$$a^{(1)} = g^{(1)}(W^{(1)}u_{aug}\
    \ + b^{(1)})$$\n\nwhere each row of $W^{(1)} \\in R^{14 \\times 12}$ contains\
    \ the weights of a neuron. The same activation function is used by all the neurons\
    \ of a layer. $a^{(1)}$ becomes the input to the $2^{nd}$ hidden layer.\n\n$$a^{(2)}\
    \ \\in R^7 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$$\n\nwhere $W^{(2)} \\in R^{7 \\\
    times 14}$. Each neuron in the $2^{nd}$ layer has 14 weights and a bias parameter,\
    \ leading to 105 parameters in the layer. The final output layer had a single\
    \ neuron with 8 parameters and no activation function, giving the network output\
    \ as follows\n\n$$a^{(3)} = \\hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$$\n\nwhere\
    \ $w^{(3)} \\in R^7$.\n\n## 10.3 RNN: An Introduction\n\nRecurrent neural networks\
    \ (RNNs) are ANNs for dealing with sequential data, where the order of occurrence\
    \ of data holds significance. In the FFNN-based NARX model that we studied in\
    \ the previous section, there is no implicit or explicit specification of the\
    \ fact that the data is temporal/sequential in nature, i.e., $u(k-2)$ comes before\
    \ $u(k-1)$ for example. There is no efficient mechanism to specify this temporal\
    \ order of data in a FFNN. RNNs accomplish this by processing elements of a sequence\
    \ recurrently and storing a hidden state that summarizes the past information\
    \ during the processing. The basic unit in a RNN is called a RNN cell which simply\
    \ contains a layer of neurons. Figure 10.2 shows the architecture of a RNN consisting\
    \ of a single cell and how it processes a data sequence with ten samples.\n\n\
    ![](img/6cffacf6247d6f7caa7eacc348cef427_197_0.png)\n\nWe can see that the ten\
    \ samples are processed in the same order of their occurrence and not at once.\
    \ An output, $y_{(i)}$, is generated at the $i^{th}$ step and then fed to the\
    \ next step for processing along with $x_{(i+1)}$. By way of this arrangement,\
    \ $y_{(i+1)}$ is a function of $x_{(i+1)}$ and $y_{(i)}$. Since, $y_{(i)}$ itself\
    \ is a function of $x_{(i)}$ and $y_{(i-1)}$, $y_{(i+1)}$ effectively becomes\
    \ a function of $x_{(i+1)}$, $x_{(i)}$, and $y_{(i-1)}$. Continuing the logic\
    \ further implies that the final sequence output, $y_{(10)}$, is a function of\
    \ all ten inputs of the sequence, that is, $x_{(10)}$, $x_{(9)}$,..., $x_{(1)}$.\
    \ This 'recurrent' mechanism leads to efficient capturing of temporal patterns\
    \ in data."
  mdcn: "## 10.2 使用FFNN-NARX对换热器进行建模\n\n为了学习如何设置和拟合前馈神经网络，我们将复用第9章的换热器数据集，并在输入液体流量和输出液体温度之间构建一个FFNN-NARX模型。导入基础包和将数据加载到工作区的代码保持不变。\n\
    \n```python\n# split dataset into fitting and test dataset\nu_fit = u[:3000, 0:1];\

  md: '# Why careful choice of model matters: A simple illustration


    Consider the shown process:


    ![](img/6cffacf6247d6f7caa7eacc348cef427_27_0.png)


    If not careful, you may just ignore the presence of measurement noise and attempt
    to fit the following input-output model to estimate the model parameters $a$ and
    $b$.


    **Fitted Model (ARX form):** $y(k+1) + a y(k) = b u(k)$


    Data file ‘simpleProcess.csv’ contains 1000 samples of $u$ and $y$ obtained from
    the true process. Below are the parameter estimates we get using this data,


    $\hat{a} = -0.6628 (\pm 0.016) , \hat{b} = 0.7174 (\pm 0.035)$


    values in bracket denote standard errors


    Two things are striking here: the estimates are grossly inaccurate, and the parameter
    error estimates seem to suggest high confidence in these wrong values! What went
    wrong in our approach? The reason is that the SNR (signal-to-noise ratio) value
    is not very high (data was generated with SNR ~ 10) and the fitted ARX model is
    wrong input-output form of the true process. The correct form would be the following


    **Correct input-output model**


    ![](img/6cffacf6247d6f7caa7eacc348cef427_27_1.png)


    Equation error is not white (as assumed in ARX model) but colored!


    Ignoring the presence of correlated equation error leads to biased (inaccurate)
    parameter estimates. Hopefully, this simple illustration has convinced you against
    blind application of ‘convenient’ models. Part II of this book will add several
    modeling tools to your ML-DPM arsenal to help avoid such modeling mistakes.'
  merge: -1

    \n## 本书结构\n\n在过程系统工程的机器学习这一广泛主题下，本书是该系列第一本书（涉及机器学习基础及其在过程工业中的各种应用）的延伸；然而，它也可以作为独立文本使用。为了妥善处理系统辨识的各个方面，本书分为三个部分。**第1部分**提供了机器学习对动态过程建模重要性的视角，并奠定了机器学习动态过程建模（ML-DPM）的基础。**第2部分**详细介绍了经典机器学习技术，编写时考虑了不同的建模需求和过程特征，这些决定了模型对当前问题的适用性。这些包括但不限于：存在多个相关输出、过程非线性、需要低模型偏差、需要准确建模扰动信号等。**第3部分**专注于人工神经网络和深度学习。虽然深度学习是当前机器学习社区的流行词，但我们想提醒读者不要被诱惑为每个问题都部署深度学习模型。例如，第2部分涵盖的模型仍然主导着工业控制器中使用的模型组合，并且通常可以提供与人工神经网络相当（甚至更优）的性能，而麻烦相对较少。\n\

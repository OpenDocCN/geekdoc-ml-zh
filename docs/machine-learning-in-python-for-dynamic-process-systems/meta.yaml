    \n```python\nplot_acf(OEresiduals)\nplot_acf(np.diff(OEresiduals, axis=0))\n```\n\
    \n```python\n# Fit ARMAX model\n# difference I/O data once\nu_centered_delta =\
    \ np.diff(u_centered, axis=0)\ny_centered_delta = np.diff(y_centered, axis=0)\n\
    ```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_151_2.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_151_3.png)\n\
    \n```python\n# fit ARMAX model on differenced data\nARMAXmodel = SysID(y_centered_delta,\

    The ideal identification test²¹ input signals should show a lot of fluctuations
    or excitations. Let''s study two such signals, namely, PRBS and GBN.


    # Persistent Excitation


    Consider the following process


    $$y(k) = b_1u(k-1) + b_2u(k-2) + b_3u(k-3) + b_4u(k-4) + e(k)$$


    Suppose that the input signal is hypothetically of the form $u(k) = u(k-1) + 1$.
    Under such an input signal, the process can be re-written as


    $$y(k) = b_1u(k-1) + b_2u(k-1) - b_2 + b_3u(k-1) - 2b_3 + b_4u(k-1) - 3b_4 + e(k)$$

    $$= b''_1u(k-1) + b_0$$


    The above derivation implies that the process behaves virtually like a two-parameter
    system and therefore the four original model parameters can''t be uniquely determined
    with output data collected with the aforementioned input signal. In other words,
    the true process model is not identifiable due to non-informative data. To ensure
    identifiability, the input variables must be sufficiently excited. Mathematically,
    a discrete-time input signal $u(k)$ is said to be persistently exciting of order
    $n$ (required to uniquely identify a PEM model with $\le n$ model parameters)
    if the following conditions are met


    The following limit exists


    The following matrix is invertible


    $$r_u(\tau) = \lim_{N \to \infty} \frac{1}{N} \sum_{t=0}^{N} u_{t+\tau} u_t$$


    $$R_u(n) = \begin{bmatrix} r_u(0) & r_u(1) & \cdots & r_u(n-1) \ r_u(-1) & r_u(0)
    & \cdots & r_u(n-2) \ \vdots & \vdots & \ddots & \vdots \ r_u(1-n) & r_u(2-n)
    & \cdots & r_u(0) \end{bmatrix}$$


    You will mostly not use these theoretical conditions directly, but it''s worthwhile
    to know these: a step input has persistent excitation (p.e.) of order 1; a full
    length PRBS has p.e. of order $M$; a GBN signal and a white noise signal are persistently
    exciting with any finite order. Alternatively, in frequency domain, $u(k)$ is
    persistently exciting of order $n$ if its spectral density is not zero at $n$
    points in the interval $(-\pi, \pi]$.'

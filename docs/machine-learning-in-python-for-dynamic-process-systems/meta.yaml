  md: 'The expression above shows that ARIMAX model is equivalent to ARMAX model on
    differenced input and output signals! Moreover, getting ARMAX model on differenced
    data provides an unbiased estimate of the deterministic model or the input transfer
    operator $G$ between $u(k)$ and $y(k)$. Like ARIMA models, ARIMAX should be used
    with caution or only when necessary. If $v(k)$ does not have any integration non-stationarity,
    then differencing $u(k)$ and $y(k)$ will only amplify noise and reduce SNR. One
    way to ascertain disturbance non-stationarity is to fit an OE model on undifferenced
    data and then assess the properties of the residuals (via ACF/PACF or unit root
    tests). Let''s work out an example to understand the methodology better.



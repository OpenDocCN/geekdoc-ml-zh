  md: '# # Chapter 9

    ## Nonlinear System Identification: Going Beyond Linear Models


    In the previous chapters we restricted our attention to only linear processes.
    However, most industrial processes exhibit linear behavior only in a limited range
    of operating conditions. If a global model of complex processes (such as high-purity
    distillation, pH neutralization, polymerization, etc.) is sought, then the demon
    of nonlinearity would inadvertently surface. It won’t be an exaggeration to state
    that nonlinearity is not an exception, rather the rule in process industry. We
    won’t be surprised if you are tempted to always resort to artificial neural networks-based
    structures which have become synonymous with nonlinear modeling now-a-days. However,
    there exist simple classical nonlinear model structures which are more interpretable
    and equally powerful. We will explore these models in this chapter.


    Nonlinear models can be powerful tools but there are certain costs to their usage.
    These include greater demand for variability in training data (which means more
    laborious experiment design), more complex model selection procedure, and more
    computationally intensive parameter estimation. Therefore, the decision to use
    nonlinear models should be judiciously made. If you do decide to go ahead, then
    the concepts covered in this chapter may help you greatly. Specifically, the following
    topics will be covered


    +   - Introduction to NARX models

    - Modeling heat exchanger process using NARX models

    - Introduction to block-structured models, specifically, Hammerstein models and
    Wiener models'
  merge: -1
  pgno: 174
- img_proc: true
  md: '# 9.1 Nonlinear System Identification: An Introduction


    Nonlinear SysID becomes a necessary evil when accurate predictions are sought
    over wide range of operating conditions. Although nonlinear SysID literature is
    not as mature as linear SysID, SysID community has developed several useful approaches
    for nonlinear modeling. Figure 9.1 shows a few popular approaches. In the 1st
    approach, a nonlinear relationship is directly fitted between y(k) and past data
    The nonlinear form could be polynomial-based or more complex such as neural network-based.
    We will focus on the polynomial form in this chapter. Just like linear SysID,
    different model structures can be postulated, namely, nonlinear ARX (NARX), NOE,
    NARMAX, etc. In the 2nd approach, the linear and nonlinear parts are defined in
    separate blocks, leading to block-structured models. Depending upon whether the
    nonlinear block comes before or after the linear block, one could have the Hammerstein
    model or the Wiener model (the two most popular models from this class). In the
    3rd approach, several linear models are built for different regions of the operating
    space and then they are combined to give one global model. Numerous industrial
    applications of these approaches have been reported for predictive modeling, process
    control, and process monitoring.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_175_0.png)


    # Nonlinear transformation


    Considering high computational burden of nonlinear SysID, if the nature of nonlinearity
    is known beforehand, then a nonlinear transformation of the input or output variables
    may be utilized to avoid explicit nonlinear fitting. Illustrations below provide
    some example scenarios.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_175_1.png)'
  merge: -1
  pgno: 175
- img_proc: true
  md: 'In practice the required nonlinear transformation is more likely to be unknown.
    Therefore, let''s start with arguably the default choice for nonlinear modeling:
    the NARX models.


    # 9.2 NARX Models: An Introduction


    Nonlinear autoregressive with eXogenous inputs (NARX) model is, as the name suggests,
    the nonlinear analogue of ARX model, wherein, the past inputs and outputs of the
    process are used for future predictions. As shown in Figure 9.2, the model takes
    the following form


    $$y(k) = f(u(k-d-1), ..., u(k-d-n_b), y(k-1), ..., y(k-n_a), \theta) + e(k)$$


    While the function $f$ is commonly taken to be polynomial form, any other nonlinear
    structure (including the neural networks) could be used as deemed suitable. A
    feature of polynomial NARX is that the predictor, $\hat{y}$, is linear-in-the-parameters!
    Therefore, polynomial NARX parameter estimation becomes straight-forward if the
    specific terms/regressors (such as $y(k-1)u(k-1)$, $u^2(k-1)$) that are to be
    included in the model is known *a priori*. Of course, like with ARX, hyperparameters
    ($d$, $n_b$, $n_a$, *polynomial degree*) have to be specified.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_176_0.png)


    **Example:** A polynomial NARX model of degree 2, $d=0$, and $n_a=n_b=1$


    $$\hat{y}(k) = a_1 y(k-1) + a_2 y^2(k-1) + a_3 y(k-1)u(k-1) + b_1 u(k-1) + b_2
    u^2(k-1)$$


    Figure 9.2: NARX model structure'
  merge: -1
  pgno: 176
- img_proc: true
  md: 'The primary challenge during polynomial NARX identification is model structure
    selection. The number of potential regressors can become very large for even modest
    value of lags ($n_a$, $n_b$) and polynomial degree$^{74}$, and inclusion of many
    terms increase chances of overfitting. Fortunately, this task is automated$^{75}$
    using AIC-based algorithm in the Python package SysIdentPY. Let’s see how this
    package can be used for nonlinear identification of an industrial heat exchanger.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_177_0.png)


    $^{74}$ Very often, $d$ is kept zero and only the input and output lags ($n$ and
    $m$) are optimized for a given polynomial degree.

    $^{75}$ In a recent work by Sun & Braatz (ALVEN: Algebraic learning via elastic
    net for static and dynamic nonlinear system identification, Computers & Chemical
    Engineering, 2020), a DALVEN methodology has been proposed that uses a combination
    of nonlinear transformations, univariate feature selection, and elastic net regression
    for NARX structure selection.'
  merge: -1

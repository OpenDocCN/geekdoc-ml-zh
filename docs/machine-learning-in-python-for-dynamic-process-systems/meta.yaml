    # Hyperparameter selection


    The mathematical background of the CVA algorithm suggests specification of two
    hyperparameters: the lag order ($l$) and the model order ($n$). While model order
    specification is not required prior to state estimation, the lag order needs to
    be known beforehand. Let''s see the common approaches for estimation of these
    hyperparameters.


    # Lag order ($l$)


    The guidance for assigning a value to the lag $l$ is that it should be large enough
    to capture data autocorrelation. A commonly recommended strategy is to fit several
    multivariate autoregressive models with different values of $l$ and choose the
    $l$ that minimizes the AIC criterion. For example, let $\bar{l}$ be one of the
    trial values. Then the following relationship is set up'

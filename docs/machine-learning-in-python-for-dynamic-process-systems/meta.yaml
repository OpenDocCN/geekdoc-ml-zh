  md: '# 6.2 FIR Modeling of Industrial Furnaces


    To showcase an industrial application of FIR models, we will consider fired heaters
    used in petroleum refineries wherein, as shown in the figure below, fuel is combusted
    to heat feed oil and vaporize it for subsequent fractionation<sup>47</sup>. In
    the SISO version of the system, we will consider the task of keeping the outlet
    temperature of the heated oil (*TO*) in control. Changes in feed oil temperature,
    *TI*, or the feed flow will impact *TO*. The controller adjusts the flow of the
    fuel gas (although indirectly, by manipulating the set-point of the flue-gas PID
    controller. The PID controller, not shown in the schematic, adjusts the fuel-gas
    stream’s valve opening to meet the specified flow)<sup>48</sup>. The process controller,
    however, needs a model to understand the relationship between flue gas flow set-point
    (FGSP) and *TO*.


    To obtain the model, we will use data provided in the file *IndustrialFiredHeater_SISO.csv*
    which contains 1000 samples of TO and FGSP obtained from an open-loop simulation
    of the system wherein FGSP was excited using a GBN signal and the system was subjected
    to disturbances in *TI*.<sup>49</sup> Note that the time interval here is in minutes
    and not seconds.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_121_0.png)


    <sup>47</sup> The reader is referred to https://apmonitor.com/dde/index.php/Main/FiredHeaterSimulation
    for more details on the system. At this link, readers can also find the system
    model that is used to generate the simulation dataset used in this case-study.

    <sup>48</sup> Using PID controller’s setpoints as manipulated variables is a very
    standard approach in modern (MPC) controllers.

    <sup>49</sup> Online code repository shows how the identification test data was
    generated'

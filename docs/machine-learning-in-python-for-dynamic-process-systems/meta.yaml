    # 6.1 FIR Models: An Introduction


    Impulse response of a system is its response to a special impulse input as shown
    in Figure 6.1. The impulse response model approximates the system output as a
    linear combination of several impulse responses due to past inputs. Since the
    impulse responses usually decay to zero, it suffices to include only the past
    few values (say $M$) of $u(k)$ to approximate $y(k)$. The value ''$M$'' is called
    the model order and the resulting model is called the finite impulse response
    (FIR) model. You will notice that there is no attempt to model stochastic disturbances
    and a non-parametric modeling form (there is no compact mathematical structure)
    is adopted. Consequently, FIR model is among the simplest SysID model.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_117_0.png)


    Fitting a FIR model entails estimation of the impulse response coefficients. Although
    a FIR model''s structure is quite simple, it is very flexible and given sufficiently
    large $M$, any type of complex impulse response can be fitted. It is common to
    employ model orders of 90 to 120 to get all the impulse coefficients. However,
    such large parameters dimensionality often leads to overfitting (impulse response
    curves show wiggles or spikes due to output signal corruption by process disturbances).
    Apart from model flexibility, another advantage of FIR model is that an estimate
    of I/O delay is automatically obtained after model fitting. For a system with
    delay $d$, the first $d$ impulse coefficients will be zero or close to zero. This
    is in fact a classical method for delay estimation. FIR models also provide unbiased
    parameter estimates as the deterministic part of the model is independently parametrized
    (recall our discussion from Chapter 4). These favorable properties of FIR models
    make them the dominant SysID model deployed in industrial MPCs$^{45}$.'

    # 9.4 Introduction to Block-Structured Nonlinear Models


    Block-structured models describe nonlinear processes through separate blocks of
    static nonlinearity and linear dynamics as shown in Figure 9.4. Two separate scenarios
    have been depicted in the figure: the nonlinearity is at the input for a Hammerstein
    process while for a Wiener process, the nonlinearity is at the output<sup>78</sup>.
    While this blocks-based construct may seem very simple (and restrictive), it has
    been successfully used to model several complex industrial processes. For example,
    an industrial scale MPC-controlled air separation plant was modeled via Hammerstein-Wiener
    model using real process data by Pattison et. al. and used for optimizing plant
    scheduling under varying product demands<sup>79</sup>.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_182_0.png)


    <sup>78</sup> Other combinations of nonlinear and linear blocks (such as nonlinear-linear-nonlinear)
    have also been employed by SysID community.

    <sup>79</sup> Pattison et. al., Optimal process operations in fast-changing electricity
    markets: framework for scheduling with low-order dynamic models and an air separation
    application, *Industrial & Engineering Chemistry Research*, 2016'
  merge: -1

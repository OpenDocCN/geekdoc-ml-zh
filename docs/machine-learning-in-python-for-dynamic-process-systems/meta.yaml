    # LSTM networks


    RNNs are powerful dynamic models, however, the vanilla RNN (with a single neural
    layer in a cell) introduced before faces difficulty learning long-term dependencies,
    i.e., when number of steps in a sequence is large (~ ≥10). This happens due to
    the vanishing gradient problem during gradient backpropagation. To overcome this
    issue, LSTM (Long Short-Term Memory) cells have been devised which are able to
    learn very long-term dependencies (even greater than 1000) with ease. Unlike vanilla
    RNN cells, LSTM cells have 4 separate neural layers as shown in Figure 10.5. Moreover,
    in a LSTM cell, the internal state is stored in two separate vectors, $h_{(t)}$
    or hidden state and $c_{(t)}$ or cell state. Both these states are passed from
    one LSTM cell to the next during sequence processing. $h_{(t)}$ can be thought
    of as the short-term state/memory and $c_{(t)}$ as the long-term state/memory
    (we will see later why), and hence the name LSTM.


    The vector outputs of the FC layers interact with each-other and the long-term
    state via three ‘gates’ where element-wise multiplications occur. These gates
    control what information go into the long-term and short-term states at any sequence
    processing step. While we will understand the mathematical details later, for
    now, if suffices to know the following about these gates:


    +   - **Forget gate** determines what parts of long-term state, $c_{(t)}$, are
    retained and erased

    - **Input gate** determines what parts of new information (obtained from processing
    of $x_{(t)}$ and $h_{(t-1)}$) are stored in long-term state

    - **Output gate** determines what parts of long-term state are passed on as short-term
    state'
  merge: -1
  pgno: 199
- img_proc: true
  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_200_0.png)


    Figure 10.5: Architecture of an LSTM cell. Three FC layers use sigmoid activation
    functions and one FC layer uses tanh activation function. Each of these neural
    layers have its own parameters $W_x$, $W_h$, and $b$


    This flexibility in being able to manipulate what information are passed down
    the chain during sequence processing is what makes LSTM networks so successful
    at capturing long-term patterns in sequential datasets. Consequently, LSTM networks
    are the default RNNs now-a-days. In the next section we will see a quick application
    of RNN for system identification using LSTM cells.'

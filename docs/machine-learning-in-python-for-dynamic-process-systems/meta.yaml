    # Examples on inferences drawn using CCF<sup>17</sup>


    Model structure selection:


    The CCF between $u(k)$ and $y(k)$ can give some crucial hints about the time delay
    (dead time ($d$)) of the process<sup>18</sup>. Consider the following scenario
    and the fact that dead time is the smallest value $d$ with which $u(k-1-d)$ influences
    $y(k)$ directly.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_61_0.png)


    Asymmetricity is due to the fact that past values of $u(k)$ are related to $y(k)$
    differently than the future values


    A peak at lag = 3 and insignificant CCF values for lag <=2

    $\Rightarrow$ A good guess for $d$ is 2


    Residual diagnostics:


    If a model has adequately captured the relationship between input and output,
    then $\rho_{\epsilon u}(\ell)$ between the residual ($\epsilon(k)$) and the input
    sequences ($u(k)$) should be nearly zero for positive<sup>19</sup> lags because
    $\epsilon(k)$ should not have any relationship with past input values.<sup>20</sup>


    ![](img/6cffacf6247d6f7caa7eacc348cef427_61_1.png)


    Model residuals are uncorrelated with input $\Rightarrow$ no effect of input remains
    in the residuals


    <sup>17</sup> Like ACF, CCF also has a covariance counterpart called cross-covariance
    function (CCVF) and is given as $\sigma_{yu}(\ell) = \frac{1}{N} \sum_{k=\ell}^{N-1}
    (y(k) - \bar{y})(u(k - \ell) - \bar{u})$. Note that $N-\ell$ could be set as denominator
    instead of $N$ to get unbiased estimates.


    <sup>18</sup> We will formally introduce the term *dead time* in Chapter 6. But
    we figured that if you already knew what dead time is then you may appreciate
    this example.


    <sup>19</sup> Significant correlation for negative lags implies relation between
    residuals and future input values which is an indication of closed-loop feedback
    (and not necessarily model inadequacy). We will learn more on this later.


    <sup>20</sup> A small caveat here is that either $\epsilon(k)$ or $u(k)$ should
    be white to impose this condition'
- md: '## 3.5 Power Spectral Density (PSD) and Periodogram


    A dynamic signal''s properties can also be described in terms of its frequency
    contents, i.e., by decomposing the signal into sinusoidal components with different
    frequencies. The analysis in frequency domain is also called spectral analysis
    and for the stochastic discrete-time signals, the tool of choice is (power) spectral
    density plot that can provide a quick glimpse of strength of different frequency
    components. For example, consider the following time series and its spectral density
    plot. The spectral plot makes it easy to infer that the components with frequencies
    0.1Hz and 0.05Hz dominate the signal.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_62_0.png)


    In our motivating illustration in Figure 3.1, we saw that the white noise signal
    has approximately uniform contributions from all frequencies. In fact, this is
    a defining characteristic of any white-noise signal (analogous to white light
    which is a mixture of all visible frequencies of light). The common practice to
    generate PSD plots for sampled time-series data is to use periodograms. Without
    going into the mathematical details, it suffices to state that a periodogram plots
    the square of the magnitude of the Fourier transform as a function of frequency,
    and therefore, shows how the intensity or power of a dynamic signal is distributed
    across frequencies. Let''s see an instance of a PSD-based inference in the following
    example.


    **Example 3.3:**


    We will consider the input and output time-series signals from Example 3.2, study
    their spectral properties, and attempt to make some modeling-related inferences.
    The code below generates the periodograms for the input and output signals


    ```python

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from scipy import signal


    # read data

    data = np.loadtxt(''simpleInputOutput.csv'', delimiter='','')

    u = data[:,0]; y = data[:,1]


    # input PSD

    freq, PSD = signal.welch(u)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''input PSD''), plt.xlabel(''frequency [Hz]'')


    # output PSD

    freq, PSD = signal.welch(y)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''output PSD''), plt.xlabel(''frequency [Hz]'')

    ```


    > Welch method estimates PSD as averaged periodograms of overlapping segments
    of a signal; Averaging reduces noisy fluctuations in PSD values


    ![](img/6cffacf6247d6f7caa7eacc348cef427_63_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_63_1.png)


    It is apparent from the comparison of the spectral densities that the process
    has low-pass filter characteristics and therefore a model (such as ARX) with such
    characteristics can be a good initial choice.


    This concludes our quick look at some of the popular graphical tools for analyzing
    time series data. Hopefully, you now have sufficient knowledge of these tools
    to understand their specific applications in the upcoming chapters.


    ## Summary


    In this chapter we studied the concepts behind autocorrelation function (ACF),
    partial autocorrelation function (PACF), cross-correlation function (CCF), and
    periodograms. We also looked at some of the applications of these graphical tools.
    These tools come in handy for analyzing time series and input-output data, and
    are a crucial part of the fundamentals upon which you will develop your ML-DPM
    expertise. In the next chapter we will continue building the fundamentals and
    look at some established guidelines for SysID.


    ## Chapter 4


    ### Machine Learning-based Dynamic Modeling: Workflow and Best Practices


    In Figure 1.4 in Chapter 1 we looked at a typical workflow for system identification.
    What is noteworthy is that while model ID is only a part of this workflow, very
    often too much focus goes into application of model ID to estimate model parameters
    at the expense of other aspects of SysID. Dumping raw data into model ID module
    will invariably generate unsatisfactory model if data is not pre-treated appropriately.
    Additionally, you will seldom be right in your modeling choices in the very first
    attempt. The take-home message is that knowledge about how to prepare raw data
    to enhance its information content about the system, how to assess validity of
    obtained model, how to analyze modeling results critically, and how to iterate
    judiciously is absolutely critical for successful SysID. Fortunately, several
    guidelines and best practices have been devised to guide a process modeler at
    each step of the SysID workflow. We will learn these guidelines and best practices
    in this chapter.


    We will not cover the best practices associated with generic machine learning
    workflow. Concepts like feature extraction, feature engineering, cross-validation,
    regularization, etc. have already been covered in detail in our first book of
    the series. In this chapter our focus will be on the unique challenges presented
    by dynamic processes and the specific best practices to deal with them. Specifically,
    the following topics are covered:


    - Identification test design using PRBS and GBN signals

    - Pre-treatment of raw data for removal of measurement noise, offsets, trends,
    and drifts

    - Guidelines around selection of model structure

    - Model order selection via AIC and cross-validation

    - Model quality assessment via residual analysis, simulation response analysis,
    etc.


    ### 4.1 System Identification Workflow


    So far in this book we have been consciously emphasizing the difference between
    model identification and system identification. While model ID is all about estimating
    model parameters, SysID is about ensuring that the model truly represents the
    underlying system and stands consistent w.r.t. any prior available knowledge and
    any modeling assumptions. Figure 4.1 reproduces the SysID workflow we had seen
    in Chapter 1 and shows the several steps that serve to achieve the stated goals.
    The rest of the chapter will sensitize you about these varied aspects of SysID
    and help you gain working-level understanding about how to successfully execute
    a SysID project.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_65_0.png)


    Figure 4.1: Typical steps in a SysID workflow that we will cover in this chapter


    The first step of the workflow is data collection. Whether you are using pre-existing
    historical data or conducting fresh identification tests, you must ensure that
    the dataset has enough ‘juice’ in it to enable identification of the desired model.
    We will soon see some guidelines around this task. The next step corresponds to
    sanitizing the data to remove the unwanted components that can negatively impact
    model ID. For example, elimination of any slow drift in the output signals is
    essential to avoid incorrect model parameters. After the first two steps, our
    dataset is ready and we come to model structure selection where the onus is on
    the process modeler to choose the right class of process and noise models. We
    saw in Chapter 1 that an incorrect choice can lead to biased parameters estimates.
    Your expert domain knowledge and any prior information on process disturbances
    can come in quite handy at this step. For example, this is the step where you
    make a decision between ARX versus ARMAX, or ANN versus CVA models. A generic
    thumb rule is to start with a simple model (like AR, ARX) and then use inferences
    from model diagnostics to shortlist the next candidate model(s).


    Once a model''s selection has been made, the model parameters can be estimated
    using off-the-shelf Python packages. These packages also include functionalities
    for automatic selection of optimal model order, e.g., the number of auto-regressive
    terms in an ARX model. The estimated model must always undergo extensive check
    to ensure that the model is right for your process system and is consistent with
    the modeling assumptions and prior process knowledge. We will learn about several
    of these model quality checks later in the chapter. Any model deficiency encountered
    will necessitate appropriate correction and another pass-through the whole workflow.
    Let''s now learn about each of these tasks one-by-one.


    ### 4.2 Identification Test/Input Signal Design


    The first and foremost requirement for a successful model ID is that the model
    training data (whether historical or newly generated) must be informative. The
    traditional practice for fresh data collection as observed in industry (especially
    for model development for control purposes) is to induce step changes in each
    input separately and record the step responses. Figure 4.2 shows an example. While
    these step tests are simple enough to be understood by plant operators and provide
    good information on steady-state behavior of the process, there are several shortcomings.
    When the process has several inputs, the step tests take a lot of time and manpower.
    Moreover, step tests are known to not excite all the plant dynamics significantly
    and therefore the risk of inaccurate model ID is high.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_66_0.png)'
  mdcn: '## 3.5 功率谱密度（PSD）与周期图


    动态信号的特性也可以通过其频率成分来描述，即将信号分解为不同频率的正弦分量。频域分析也称为谱分析，对于随机离散时间信号，首选工具是（功率）谱密度图，它能快速展示不同频率分量的强度。例如，考虑以下时间序列及其谱密度图。谱图可以轻松推断出频率为0.1Hz和0.05Hz的分量主导了该信号。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_62_0.png)


    在图3.1的引导性示例中，我们看到白噪声信号在所有频率上具有近似均匀的贡献。事实上，这是任何白噪声信号的定义性特征（类似于白光，它是所有可见光频率的混合）。为采样时间序列数据生成PSD图的常用做法是使用周期图。无需深入数学细节，只需说明周期图绘制的是傅里叶变换幅度的平方随频率变化的函数，因此它展示了动态信号的强度或功率在频率上的分布情况。让我们在下面的例子中看看基于PSD的推断实例。


    **示例 3.3：**


    我们将考虑示例3.2中的输入和输出时间序列信号，研究它们的谱特性，并尝试进行一些与建模相关的推断。下面的代码为输入和输出信号生成周期图


    ```python

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from scipy import signal


    # read data

    data = np.loadtxt(''simpleInputOutput.csv'', delimiter='','')

    u = data[:,0]; y = data[:,1]


    # input PSD

    freq, PSD = signal.welch(u)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''input PSD''), plt.xlabel(''frequency [Hz]'')


    # output PSD

    freq, PSD = signal.welch(y)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''output PSD''), plt.xlabel(''frequency [Hz]'')

    ```


    > Welch方法通过将信号分段重叠并计算平均周期图来估计PSD；平均处理减少了PSD值中的噪声波动


    ![](img/6cffacf6247d6f7caa7eacc348cef427_63_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_63_1.png)


    从谱密度的比较可以明显看出，该过程具有低通滤波器特性，因此具有此类特性的模型（如ARX）可以是一个良好的初始选择。


    至此，我们快速了解了一些用于分析时间序列数据的流行图形工具。希望你现在对这些工具有了足够的了解，以便在后续章节中理解它们的具体应用。


    ## 总结


    在本章中，我们研究了自相关函数（ACF）、偏自相关函数（PACF）、互相关函数（CCF）和周期图背后的概念。我们还探讨了这些图形工具的一些应用。这些工具对于分析时间序列和输入输出数据非常有用，是你发展ML-DPM专业知识所依赖的基础的关键部分。在下一章中，我们将继续构建基础知识，并探讨一些成熟的系统辨识指南。


    ## 第4章


    ### 基于机器学习的动态建模：工作流程与最佳实践


    在第1章的图1.4中，我们了解了系统辨识的典型工作流程。值得注意的是，虽然模型辨识只是这个工作流程的一部分，但很多时候人们过于关注将模型辨识应用于估计模型参数，而牺牲了系统辨识的其他方面。如果数据没有得到适当预处理，直接将原始数据输入模型辨识模块必然会产生不令人满意的模型。此外，你在建模选择上很少能第一次就正确。关键信息是：了解如何准备原始数据以增强其关于系统的信息内容、如何评估所获模型的有效性、如何批判性地分析建模结果以及如何明智地进行迭代，对于成功的系统辨识至关重要。幸运的是，已经制定了一些指南和最佳实践来指导过程建模者在系统辨识工作流程的每一步。我们将在本章学习这些指南和最佳实践。


    我们不会涵盖与通用机器学习工作流程相关的最佳实践。特征提取、特征工程、交叉验证、正则化等概念已经在我们系列的第一本书中详细阐述。在本章中，我们的重点将放在动态过程带来的独特挑战以及应对这些挑战的具体最佳实践上。具体涵盖以下主题：


    - 使用PRBS和GBN信号进行辨识测试设计

    - 原始数据的预处理，以去除测量噪声、偏移、趋势和漂移

    - 模型结构选择的指南

    - 通过AIC和交叉验证进行模型阶次选择

    - 通过残差分析、仿真响应分析等进行模型质量评估


    ### 4.1 系统辨识工作流程


    到目前为止，在本书中我们一直有意识地强调模型辨识与系统辨识之间的区别。模型辨识完全关于估计模型参数，而系统辨识则关乎确保模型真正代表底层系统，并且与任何先验可用知识和任何建模假设保持一致。图4.1重现了我们在第1章看到的系统辨识工作流程，并展示了为实现所述目标所需的几个步骤。本章的其余部分将让你了解系统辨识的这些不同方面，并帮助你获得关于如何成功执行系统辨识项目的实践级理解。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_65_0.png)


    图4.1：我们将在本章介绍的系统辨识工作流程中的典型步骤


    工作流程的第一步是数据收集。无论你是使用现有的历史数据还是进行新的辨识测试，你都必须确保数据集包含足够的“信息量”，以便能够辨识出所需的模型。我们很快会看到关于这项任务的一些指南。下一步是净化数据，去除可能对模型辨识产生负面影响的不需要的成分。例如，消除输出信号中的任何缓慢漂移对于避免错误的模型参数至关重要。经过前两步后，我们的数据集准备就绪，接下来是模型结构选择，过程建模者有责任选择正确类型的过程模型和噪声模型。我们在第1章看到，不正确的选择可能导致有偏的参数估计。你的专业知识领域知识和关于过程扰动的任何先验信息在这一步会非常有用。例如，这一步是你在ARX与ARMAX，或ANN与CVA模型之间做出决策的地方。一个通用的经验法则是从简单模型（如AR、ARX）开始，然后利用模型诊断的推断来筛选下一个候选模型。


    一旦选择了模型，就可以使用现成的Python包来估计模型参数。这些包还包括自动选择最佳模型阶次的功能，例如ARX模型中自回归项的数量。估计的模型必须始终经过广泛检查，以确保模型适合你的过程系统，并且与建模假设和先验过程知识一致。我们将在本章后面学习几种这样的模型质量检查方法。遇到的任何模型缺陷都需要进行适当的修正，并再次遍历整个工作流程。现在让我们逐一了解这些任务。


    ### 4.2 辨识测试/输入信号设计


    成功模型辨识的首要要求是模型训练数据（无论是历史数据还是新生成的数据）必须具有信息量。在工业界观察到的新数据收集的传统做法（特别是用于控制目的的模型开发）是分别对每个输入施加阶跃变化并记录阶跃响应。图4.2显示了一个例子。虽然这些阶跃测试足够简单，可以被工厂操作员理解，并提供关于过程稳态行为的良好信息，但存在几个缺点。当过程有多个输入时，阶跃测试需要大量的时间和人力。此外，已知阶跃测试不能显著激发所有工厂动态，因此模型辨识不准确的风险很高。



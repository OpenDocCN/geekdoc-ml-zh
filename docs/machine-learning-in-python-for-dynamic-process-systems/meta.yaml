  md: '# What model structure to choose?


    With quite a few models at your disposal, you have all the rights to ask, ‘how
    to choose the best model for my system?’ Unfortunately, there is no definite answer.
    However, the concepts covered in the current and the previous chapters can help
    you choose the right path to your answer and, most importantly, understand the
    implications of choosing any model structure.


    A trivial approach may be to try and fit a generic ARIMAX model, but this won’t
    be a wise approach because you may end up with nonexistent dynamic in your G and
    H operators due to noisy data. Obtaining the most simple and parsimonious model
    should be your guiding mantra! In general, the selection of model structure will
    largely depend on the extent of prior information/insights you have about the
    system, specifically about the disturbance signals such as if the noise enters
    early or late in the process or if the disturbances have drift tendencies. Other
    major selection criterion is the end goal: you may be interested only in the deterministic
    model (to be used for simulation for example) or also in the noise model (for
    better predictions). Of course, SNR, amount of available data, and ease of estimation
    are also crucial determining factors.


    One school of thought recommends employing an OE model to estimate G, studying
    the residual characteristics to approximate H, and then using these estimates
    as initial guess for a BJ model for obtaining improved estimates. In another school
    of thought, ARX is the preferred initial model choice.


    Do note that we remained focused on SISO systems in Chapters 6 and 7. You can
    imagine that it would be quite a tedious task to find the optimal combination
    of model orders for the polynomials for all the G and H operators for all the
    input and outputs in a MIMO model. The state-space models introduced in the next
    chapter will make your life very easy for modeling MIMO systems as you won’t need
    to pre-specify all those model orders. Therefore, hold your horses tight, more
    modeling options are coming your way!'

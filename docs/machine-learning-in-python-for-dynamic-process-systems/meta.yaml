- md: '## 3.1 Visual Plots: Simple Yet Powerful Tools


    In system identification, careful scrutiny of data plots forms a critical component
    right from the initial step of exploratory data analysis (EDA) to the last step
    of model validation. Consider plots *a* and *b* in Figures 3.1 which are time
    plots of output signals in two different scenarios. Just a visual inspection makes
    it apparent that the raw output signals contain trends. One can further infer
    that while plot *a* exhibits a deterministic trend, plot *b* exhibits a stochastic
    trend<sup>14</sup>. Such assessment during EDA can help a process modeler select
    appropriate class of models for their systems.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_52_0.png)


    Consider further the plots 3.1*c* and *d*. Here, the shown noisy signals could
    correspond to the disturbance signals or the model residuals (difference between
    observations and model predictions). Here, unlike the previous example, the time
    plots don''t provide any quick obvious assessment. However, the derived visualizations,
    autocorrelation and spectral density plots make the distinction between the two
    scenarios very evident. These plots confirm that the shown signals have white
    noise and colored noise properties, respectively. If these were model residuals,
    then non-zero autocorrelations in plot 3.1*d* immediately suggest inadequate modeling.
    Moreover, the spectral density plot looks qualitatively similar to that of an
    autoregressive (AR) process and therefore, an AR model could be attempted for
    the colored residuals. Alternatively, if these were process disturbance signals,
    then the white-noise like disturbance in plot 3.1c would encourage a process modeler
    to employ OE models<sup>15</sup>.


    > <sup>14</sup> We will see the details on the distinction between these two types
    of trends in Chapter 4.


    These were just a sample of the kind of inferences one can draw using visual plots.
    Before we begin making use of these plots, it would be wise to understand the
    concepts behind them and this chapter is devoted to this purpose. If you are already
    familiar with these plots, then you can skip the rest of this chapter. Let’s begin
    with the autocorrelation plots.


    > **Time-domain vs frequency-domain analysis**


    Broadly, there are two distinct approaches to modeling dynamic systems and analyzing
    dynamic dataset: time-domain approach and frequency-domain approach. The models
    that we have discussed so far are time-domain models where the focus is on modeling
    future values as a function of the past and present values. Such models are primarily
    employed for predictions/forecasting and are popular among general DPM practitioners.


    In the frequency-domain approach, the time-series signals are decomposed into
    their Fourier representations (summation of sinusoidal components) and the focus
    is on analyzing the output behavior of a system as a function of input signal
    frequency. Frequency-domain approach renders itself quite useful for characterizing
    bias and variance properties of models. Time-domain models are easier to understand
    for new entrants to DPM and will be the subject of focus in this book. Relevant
    frequency-domain concepts will be touched upon wherever needed.


    ## 3.2 Autocorrelation Function (ACF)


    In Figure 3.1, we saw how ACF plots can make the difference between time-series
    signals very apparent. The inferences that can be drawn from these two ACF plots
    is even more interesting: in series (d), the future values can be predicted using
    the past measurements while in series (c), prediction of future values is not
    possible. How does ACF plots allow us to make such inferences? To understand this,
    let’s revisit the classical concept of correlation. You probably already know
    that correlation coefficient quantifies the linear relationship between two variables
    and is given as follows


    $$\rho = \frac{\sum_{k=0}^{N-1} (y(k) - \bar{y}) (u(k) - \bar{u})}{\sqrt{\sum_{k=0}^{N-1}
    (y(k) - \bar{y})^2 (u(k) - \bar{u})^2}}$$


    $N$ is the number of samples; $\bar{u}$ and $\bar{y}$ are sample means of $u(k)$
    and $y(k)$, respectively.


    For a single time series $y(k)$, correlation takes the form of autocorrelation


    $$\rho_{yy}(\ell) = \frac{\sum_{k=\ell}^{N-1} (y(k) - \bar{y})(y(k-\ell) - \bar{y})}{\sum_{k=0}^{N-1}
    (y(k) - \bar{y})^2}$$


    $N$ is the length of time series.


    eq. 1


    Here, $\rho_{yy}(\ell)$ quantifies the linear relationship between lagged values
    of the time series $\ell$ distance apart. For example, $\rho_{yy}(2)$ measures
    the correlation between $y(k)$ and $y(k-2)$. The plot (sample plot below) of different
    correlation coefficients versus lag $\ell$ is called autocorrelation function
    or ACF.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_54_0.png)


    **ACF properties**


    - $\rho_{yy}(0) = 1$

    - $-1 \le \rho_{yy}(\ell) \le 1$

    - $\rho_{yy}(\ell)$ is symmetric ($\rho_{yy}(\ell) = \rho_{yy}(-\ell)$) and therefore,
    ACF is plotted usually only for $\ell \ge 0$.


    > In Eq. 1, there is an implicit assumption that $y(k)$ and $y(k-\ell)$ are related
    in the same way as $y(k+q)$ and $y(k+q-\ell)$ for any $q$. Another assumption
    is that the mean $\bar{y}$ is invariant to the sampling location $k$. These assumptions
    result in ACF being a function of only the distance $\ell$ and Eq. 1 being valid
    for only stationary processes. We will learn more about stationarity in Chapter
    4.


    ### Example 3.1:


    Consider the stochastic process below that generates time series $y(k)$


    $$y(k) = 0.6y(k-1) + e(k)$$


    Data-file SimpleTimeSeries.txt contains 1000 observations of $y(k)$. The code
    below generates the ACF plot.


    ```

    # import packages

    import numpy as np

    from statsmodels.graphics.tsaplots import plot_acf

    import matplotlib.pyplot as plt

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_55_0.png)


    ```

    # read data

    y = np.loadtxt(''simpleTimeSeries.csv'', delimiter='','')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_55_1.png)


    ```

    # generate ACF plot

    conf_int = 2/np.sqrt(len(y))

    plot_acf(y, lags= 20, alpha=None)

    plt.gca().axhspan(-conf_int, conf_int, facecolor=''lightblue'') # confidence interval

    ```


    The shaded region in the above ACF plot represents the (95%) confidence interval
    where the autocorrelation coefficients are expected to fall into for a white noise
    signal (signals whose values are uncorrelated). For the signal $y(k)$, values
    are obviously correlated and therefore, the coefficients are significant (lie
    outside the shaded region).


    Significant autocorrelations indicate linear dependency of future values of a
    time series on its past values. Hopefully, now you can answer the question we
    posed at the beginning of this section about how ACF allows us to make inferences
    about predictability in Figure 3.1.


    ### Examples on inferences drawn using ACF


    - **Model structure selection:**


    Illustrations below show some sample ACF plots and the inferences that can be
    drawn regarding potential model structure


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_1.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_2.png)


    - Exponential decay of ACF values

    - Signal is potentially from an AR process


    - Sudden drop in ACF values

    - Signal is potentially from a MA process


    - ACF values fall very slowly

    - Process is close to non-stationarity


    ### Residual diagnostics:


    Residuals are differences between observed and predicted values of a signal. Consider
    the residual signal time plot and its ACF below


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_3.png)


    Here, we observe that the ACF values are not significant and therefore the model
    (that generated the predictions, $\hat{y}(k)$) has been able to capture all the
    linear relationships in data, leaving no leftover pattern in the residuals.<sup>16</sup>


    <sup>16</sup> An un-normalized version of ACF, called autocovariance function
    (ACVF), also exists and is given as $\sigma_{yy}(\ell) = \frac{1}{N} \sum_{k=\ell}^{N-1}
    (y(k) - \bar{y})(y(k - \ell) - \bar{y})$. However, the covariance coefficients
    are not bounded and therefore, utilized less compared to correlation coefficients.'
  mdcn: '## 3.1 可视化图表：简单而强大的工具


    在系统辨识中，从探索性数据分析（EDA）的初始步骤到模型验证的最后一步，对数据图表的仔细审视都是一个关键环节。考虑图3.1中的图表*a*和*b*，它们是两种不同场景下输出信号的时间序列图。仅通过目视检查就能明显看出，原始输出信号包含趋势。可以进一步推断，图表*a*表现出确定性趋势，而图表*b*表现出随机趋势<sup>14</sup>。EDA过程中的此类评估可以帮助过程建模者为其系统选择合适的模型类别。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_52_0.png)


    进一步考虑图表3.1*c*和*d*。这里，所示的含噪信号可能对应于扰动信号或模型残差（观测值与模型预测值之间的差异）。与之前的例子不同，这里的时间序列图无法提供任何快速明显的评估。然而，派生的可视化图表——自相关图和谱密度图——使得两种场景之间的区别变得非常明显。这些图表证实了所示信号分别具有白噪声和有色噪声的特性。如果这些是模型残差，那么图表3.1*d*中的非零自相关性立即表明建模不充分。此外，谱密度图在定性上类似于自回归（AR）过程的谱密度图，因此，可以尝试对有色残差使用AR模型。或者，如果这些是过程扰动信号，那么图表3.1c中类似白噪声的扰动会鼓励过程建模者采用OE模型<sup>15</sup>。


    > <sup>14</sup> 我们将在第4章中看到关于这两种趋势区别的详细内容。


    这些只是使用可视化图表可以得出的推断类型的一个示例。在我们开始使用这些图表之前，明智的做法是理解其背后的原理，本章正是为此目的而设。如果您已经熟悉这些图表，则可以跳过本章的其余部分。让我们从自相关图开始。


    > **时域分析与频域分析**


    广义上讲，对动态系统建模和分析动态数据集有两种不同的方法：时域方法和频域方法。我们到目前为止讨论的模型都是时域模型，其重点是将未来值建模为过去值和当前值的函数。此类模型主要用于预测/预报，并且在通用DPM从业者中很受欢迎。


    在频域方法中，时间序列信号被分解为其傅里叶表示（正弦分量的总和），重点是分析系统输出行为作为输入信号频率的函数。频域方法在表征模型的偏差和方差特性方面非常有用。对于DPM的新手来说，时域模型更容易理解，并且将是本书的重点。相关的频域概念将在需要时加以介绍。


    ## 3.2 自相关函数（ACF）


    在图3.1中，我们看到了ACF图如何使时间序列信号之间的差异变得非常明显。从这两个ACF图中得出的推断甚至更有趣：在序列(d)中，可以使用过去的测量值来预测未来值，而在序列(c)中，无法预测未来值。ACF图如何让我们做出这样的推断？为了理解这一点，让我们重新审视相关的经典概念。您可能已经知道，相关系数量化了两个变量之间的线性关系，其计算公式如下


    $$\rho = \frac{\sum_{k=0}^{N-1} (y(k) - \bar{y}) (u(k) - \bar{u})}{\sqrt{\sum_{k=0}^{N-1}
    (y(k) - \bar{y})^2 (u(k) - \bar{u})^2}}$$


    $N$是样本数量；$\bar{u}$和$\bar{y}$分别是$u(k)$和$y(k)$的样本均值。


    对于单个时间序列$y(k)$，相关性表现为自相关


    $$\rho_{yy}(\ell) = \frac{\sum_{k=\ell}^{N-1} (y(k) - \bar{y})(y(k-\ell) - \bar{y})}{\sum_{k=0}^{N-1}
    (y(k) - \bar{y})^2}$$


    $N$是时间序列的长度。


    公式 1


    这里，$\rho_{yy}(\ell)$量化了时间序列中相隔$\ell$距离的滞后值之间的线性关系。例如，$\rho_{yy}(2)$衡量的是$y(k)$和$y(k-2)$之间的相关性。不同相关系数与滞后$\ell$的关系图（如下方的示例图）称为自相关函数或ACF。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_54_0.png)


    **ACF性质**


    - $\rho_{yy}(0) = 1$

    - $-1 \le \rho_{yy}(\ell) \le 1$

    - $\rho_{yy}(\ell)$是对称的（$\rho_{yy}(\ell) = \rho_{yy}(-\ell)$），因此，ACF通常只绘制$\ell
    \ge 0$的部分。


    > 在公式1中，有一个隐含的假设，即对于任何$q$，$y(k)$和$y(k-\ell)$之间的关系与$y(k+q)$和$y(k+q-\ell)$之间的关系相同。另一个假设是均值$\bar{y}$与采样位置$k$无关。这些假设导致ACF仅是距离$\ell$的函数，并且公式1仅对平稳过程有效。我们将在第4章中了解更多关于平稳性的内容。


    ### 示例 3.1：


    考虑下面生成时间序列$y(k)$的随机过程


    $$y(k) = 0.6y(k-1) + e(k)$$


    数据文件SimpleTimeSeries.txt包含$y(k)$的1000个观测值。下面的代码生成ACF图。


    ```

    # import packages

    import numpy as np

    from statsmodels.graphics.tsaplots import plot_acf

    import matplotlib.pyplot as plt

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_55_0.png)


    ```

    # read data

    y = np.loadtxt(''simpleTimeSeries.csv'', delimiter='','')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_55_1.png)


    ```

    # generate ACF plot

    conf_int = 2/np.sqrt(len(y))

    plot_acf(y, lags= 20, alpha=None)

    plt.gca().axhspan(-conf_int, conf_int, facecolor=''lightblue'') # confidence interval

    ```


    上述ACF图中的阴影区域代表（95%）置信区间，对于白噪声信号（其值不相关的信号），自相关系数预期会落入该区间。对于信号$y(k)$，其值显然是相关的，因此系数是显著的（位于阴影区域之外）。


    显著的自相关性表明时间序列的未来值与其过去值存在线性依赖关系。希望现在您能回答本节开头提出的问题，即ACF如何让我们对图3.1中的可预测性做出推断。


    ### 使用ACF进行推断的示例


    - **模型结构选择：**


    下面的插图展示了一些示例ACF图以及关于潜在模型结构可以得出的推断


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_1.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_2.png)


    - ACF值呈指数衰减

    - 信号可能来自AR过程


    - ACF值突然下降

    - 信号可能来自MA过程


    - ACF值下降非常缓慢

    - 过程接近非平稳性


    ### 残差诊断：


    残差是信号观测值与预测值之间的差异。考虑下面的残差信号时间序列图及其ACF图


    ![](img/6cffacf6247d6f7caa7eacc348cef427_56_3.png)


    这里，我们观察到ACF值不显著，因此模型（生成预测值$\hat{y}(k)$的模型）已经能够捕捉数据中的所有线性关系，残差中没有留下任何模式。<sup>16</sup>


    <sup>16</sup> ACF的一个未归一化版本，称为自协方差函数（ACVF），也存在，其表达式为$\sigma_{yy}(\ell) = \frac{1}{N}
    \sum_{k=\ell}^{N-1} (y(k) - \bar{y})(y(k - \ell) - \bar{y})$。然而，协方差系数是无界的，因此与相关系数相比使用较少。'

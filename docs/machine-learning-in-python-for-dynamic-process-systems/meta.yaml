  md: '# 5.7 Forecasting Signals using ARIMA


    Previously we saw how time series models can be used to build process monitoring
    solutions. As alluded to before, another common use of such models is in forecasting
    of stochastic signals. Although the *Statsmodels* package provides native support
    for generating forecasts, it would be instructive to see what the forecasting
    work process actually entails. We will use a simple ARIMA(1,1,1) model for this
    illustration. Let the model be the following


    $$(1 - q^{-1})y(k) = \frac{1 - 0.7q^{-1}}{1 - 0.5q^{-1}} e(k)$$


    Let''s expand the above into a difference equation with only $y(k)$ on the L.H.S.


    $$y(k) = 1.5y(k-1) - 0.5y(k-2) - 0.7e(k-1) + e(k) \quad \text{eq. 7}$$


    To derive the expression for the forecasts from Eq. 7, the following notation/rules
    apply:


    +   - $\hat{y}(k+l|k) \equiv \hat{y}(l)$ denotes the $l^{th}$ step-ahead forecast/prediction
    using all information available at time $k$

    - Any $y$ on R.H.S. of Eq. 7 that has not yet occurred is replaced with its forecast
    $y$

    - Any future noise term is replaced with zero and past noise term with the 1-step
    ahead residuals (for example, $e(k-1) = y(k-1) - \hat{y}(k-1|k-2)$)


    Let''s see how the forecast expressions look like for $l = 1, 2, 3, ...$


    $$\hat{y}(1) = 1.5y(k) - 0.5y(k-1) - 0.7e(k)$$

    $$\hat{y}(2) = 1.5\hat{y}(1) - 0.5y(k)$$

    $$\hat{y}(3) = 1.5\hat{y}(2) - 0.5\hat{y}(1)$$

    $$\vdots$$


    to be replaced with $y(k) - \hat{y}(k|k-1)$


    both error terms in Eq. 7 replaced with zero


    A somewhat incomplete aspect in the above forecast expressions is computation
    of $e(k)$. The annotation text suggests making use of $\hat{y}(k|k-1)$, but it
    would involve the term $e(k-1)$. This leads to a recursive approach to find the
    past noise values. The established approach is to start from time $p + d$, set
    estimated noise values for times $\leq p + d$ to zero and then recursively estimate
    the noise values until time $k$ using the forecast expression for the 1-step ahead
    forecast. For our ARIMA(1,1,1) model, the computation would look like the following:'
  merge: -1

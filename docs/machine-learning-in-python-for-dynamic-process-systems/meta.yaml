    \ - np.dot(Jn.T, Xn_test)\nQ_test = [np.dot(r_test[:,i], r_test[:,i]) for i in\
    \ range(pMatrix_test_centered.shape[0])]\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_170_0.png)\n\
    \nThe control charts for the test data shows successful detection of process fault.\
    \ The $T_e^2$ metric is known to be overly sensitive with high incidence of false\
    \ alerts which can explain why it seems to often breach the threshold before the\
    \ onset of the actual fault. The following flowchart summarizes all the steps\
    \ for building a CVA-based monitoring tool.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_171_0.png)\n\
    \nFigure 8.7: Complete workflow for process monitoring via CVA\n\n## Equivalence\
    \ of state-space and ARMAX models\n\nAlthough state-space and input-output models\
    \ may seem very different, they are related! Given any state-space model, an equivalent\
    \ ARMAX model can be determined and *vice-versa*. Therefore, other linear structures\
    \ like ARX or OE can be re-written as state-space model as well.\n\n**SISO I/O\
    \ difference equation form to SS form**\n\n**SS form to transfer operator form**\n\
    \nConsider\n\n$y(k) + a_1 y(k-1) + \\cdots + a_{n_a} y(k-n) = b_1 u(k-1) + \\\
    cdots + b_{n_b} u(k-n)$\n\n$\\Downarrow$ equivalent\n\n$x(k+1) = Ax(k) + Bu(k)$\n\
    \n$y(k) = Cx(k)$\n\nwhere, $x(k) \\in \\mathbb{R}^{n \\times 1}, C = [1, 0, \\\
    dots, 0]$\n\n$B = \\begin{bmatrix} b_1 \\\\ b_2 \\\\ \\vdots \\\\ b_n \\end{bmatrix},\
    \ \\quad A = \\begin{bmatrix} -a_1 & 1 & 0 & \\cdots & 0 \\\\ -a_2 & 0 & 1 & \\\
    cdots & 0 \\\\ \\vdots & \\vdots & \\vdots & \\ddots & 1 \\\\ -a_n & 0 & 0 & \\\
    cdots & 0 \\end{bmatrix}$\n\nConsider\n\n$x(k+1) = Ax(k) + Bu(k)$\n\n$y(k) = Cx(k)\
    \ + Du(k)$\n\n$\\Downarrow$ using shift operator\n\n$qx(k) = Ax(k) + Bu(k)$\n\n\
    $\\Rightarrow (qI - A)x(k) = Bu(k)$\n\n$\\Rightarrow x(k) = (qI - A)^{-1}Bu(k)$\n\
    \n$\\Rightarrow y(k) = [C(qI - A)^{-1}B + D]u(k)$\n\n$G(q)$\n\nNonetheless, we\
    \ have seen in this chapter that SS model enjoys some significant advantages vis-à-vis\
    \ ARMAX models such as no requirement of *a prior* parametrization (i.e., delay\
    \ and orders for all the inputs need not be pre-specified) and usage of robust\
    \ SVD calculations for model fitting.\n\nHopefully, this chapter has sufficiently\
    \ impressed upon you the powerful capabilities of CVA. Due to its favorable properties,\
    \ it is not surprising that CVA is one of the SysID methods provided in Aspen's\
    \ DMCplus software$^{73}$. With this we complete our brief foray into the world\
    \ of MIMO dynamic process modeling. Be mindful that we have only scratched the\
    \ surface of the vast literature on SIM and CVA. We hope that you have gained\
    \ sufficient understanding of how CVA works and the confidence to use it to build\
    \ predictive and monitoring tools. You now have all the tools to handle SISO and\
    \ MIMO linear systems. Moving ahead, we will now relax the restriction of linearity\
    \ and learn how to handle nonlinear processes in the next chapter.\n\n## Summary\n\
    \nIn this chapter, we looked at state-space models and saw how it offers more\
    \ insights into the internal process dynamics compared to input-output models.\
    \ For fitting state-space models we studied subspace identification techniques\
    \ with the focus on CVA models. Through a couple of industrial-scale case-studies,\
    \ we learnt how to build dynamic models for usage in process control and process\
    \ monitoring. In the next chapter we will see some classical techniques for modeling\
    \ nonlinear processes.\n\n# Chapter 9\n## Nonlinear System Identification: Going\
    \ Beyond Linear Models\n\nIn the previous chapters we restricted our attention\
    \ to only linear processes. However, most industrial processes exhibit linear\
    \ behavior only in a limited range of operating conditions. If a global model\
    \ of complex processes (such as high-purity distillation, pH neutralization, polymerization,\
    \ etc.) is sought, then the demon of nonlinearity would inadvertently surface.\
    \ It won't be an exaggeration to state that nonlinearity is not an exception,\
    \ rather the rule in process industry. We won't be surprised if you are tempted\
    \ to always resort to artificial neural networks-based structures which have become\
    \ synonymous with nonlinear modeling now-a-days. However, there exist simple classical\
    \ nonlinear model structures which are more interpretable and equally powerful.\
    \ We will explore these models in this chapter.\n\nNonlinear models can be powerful\
    \ tools but there are certain costs to their usage. These include greater demand\
    \ for variability in training data (which means more laborious experiment design),\
    \ more complex model selection procedure, and more computationally intensive parameter\
    \ estimation. Therefore, the decision to use nonlinear models should be judiciously\
    \ made. If you do decide to go ahead, then the concepts covered in this chapter\
    \ may help you greatly. Specifically, the following topics will be covered\n\n\
    - Introduction to NARX models\n- Modeling heat exchanger process using NARX models\n\
    - Introduction to block-structured models, specifically, Hammerstein models and\
    \ Wiener models\n\n## 9.1 Nonlinear System Identification: An Introduction\n\n\
    Nonlinear SysID becomes a necessary evil when accurate predictions are sought\
    \ over wide range of operating conditions. Although nonlinear SysID literature\
    \ is not as mature as linear SysID, SysID community has developed several useful\
    \ approaches for nonlinear modeling. Figure 9.1 shows a few popular approaches.\
    \ In the 1st approach, a nonlinear relationship is directly fitted between y(k)\
    \ and past data. The nonlinear form could be polynomial-based or more complex\
    \ such as neural network-based. We will focus on the polynomial form in this chapter.\
    \ Just like linear SysID, different model structures can be postulated, namely,\
    \ nonlinear ARX (NARX), NOE, NARMAX, etc. In the 2nd approach, the linear and\
    \ nonlinear parts are defined in separate blocks, leading to block-structured\
    \ models. Depending upon whether the nonlinear block comes before or after the\
    \ linear block, one could have the Hammerstein model or the Wiener model (the\
    \ two most popular models from this class). In the 3rd approach, several linear\
    \ models are built for different regions of the operating space and then they\
    \ are combined to give one global model. Numerous industrial applications of these\
    \ approaches have been reported for predictive modeling, process control, and\
    \ process monitoring.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_175_0.png)\n\
    \n### Nonlinear transformation\n\nConsidering high computational burden of nonlinear\
    \ SysID, if the nature of nonlinearity is known beforehand, then a nonlinear transformation\
    \ of the input or output variables may be utilized to avoid explicit nonlinear\
    \ fitting. Illustrations below provide some example scenarios.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_175_1.png)\n\
    \nIn practice the required nonlinear transformation is more likely to be unknown.\
    \ Therefore, let's start with arguably the default choice for nonlinear modeling:\
    \ the NARX models.\n\n## 9.2 NARX Models: An Introduction\n\nNonlinear autoregressive\
    \ with eXogenous inputs (NARX) model is, as the name suggests, the nonlinear analogue\
    \ of ARX model, wherein, the past inputs and outputs of the process are used for\
    \ future predictions. As shown in Figure 9.2, the model takes the following form\n\
    \n$$y(k) = f(u(k-d-1), ..., u(k-d-n_b), y(k-1), ..., y(k-n_a), \\theta) + e(k)$$\n\
    \nWhile the function $f$ is commonly taken to be polynomial form, any other nonlinear\
    \ structure (including the neural networks) could be used as deemed suitable.\
    \ A feature of polynomial NARX is that the predictor, $\\hat{y}$, is linear-in-the-parameters!\
    \ Therefore, polynomial NARX parameter estimation becomes straight-forward if\
    \ the specific terms/regressors (such as $y(k-1)u(k-1)$, $u^2(k-1)$) that are\
    \ to be included in the model is known *a priori*. Of course, like with ARX, hyperparameters\
    \ ($d$, $n_b$, $n_a$, *polynomial degree*) have to be specified.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_176_0.png)\n\
    \n**Example:** A polynomial NARX model of degree 2, $d=0$, and $n_a=n_b=1$\n\n\
    $$\\hat{y}(k) = a_1 y(k-1) + a_2 y^2(k-1) + a_3 y(k-1)u(k-1) + b_1 u(k-1) + b_2\
    \ u^2(k-1)$$\n\nFigure 9.2: NARX model structure"

- img_proc: true
  md: '# # 5.1 Time Series Analysis: An Introduction


    Time series analysis refers to the study and modeling of dependencies among sequential
    data points in time series signals. Several approaches exist for modeling time
    series. In this chapter, we will look at four of the most common models as shown
    in Figure 5.1. While AR, MA, and ARMA models are used to describe stationary signals,
    ARIMA is used for (homogeneous) nonstationary signals. In this chapter, we will
    understand the differences, similarities, and the inherent connections between
    these models.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_93_0.png)


    To further motivate the study of time series analysis, let’s briefly look at two
    of the use cases that were mentioned previously. The illustration below shows
    a CSTR unit that has measured disturbance signals (feed concentration and temperature).
    An accurate model for these signals can help generate accurate forecasts and control
    the vessel temperature more effectively. Also, it is easy to show that if the
    setpoint of the controllers do not change, then the controlled variables (here,
    output product temperature and concentration) depend on process disturbances alone.
    Therefore, a TSA model for these variables can be built to eventually look for
    significant mismatch between measurements and model predictions as an indicator
    of process faults.'
  merge: -1
  pgno: 93
- img_proc: true
  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_94_0.png)


    # 5.2 Autoregressive (AR) Models: An Introduction


    AR models are among the simplest and easiest to understand time series models,
    wherein the current state is written as a linear combination of past measurements
    as shown below³⁸


    $$y(k) = -a_1y(k-1) - a_2y(k-2) \cdots - a_py(k-p) + e(k) \quad \text{eq. 1}$$

    $$= \sum_{j=1}^{p} -a_jy(k-j) + e(k)$$


    The above model uses $p$ lagged/past values and therefore is referred to as an
    AR(p) model or an autoregressive model of order $p$. In spite of its simplicity,
    an AR model can generate varied patterns of signals as shown below. In process
    industry, processes with inherent autoregressive behavior are fairly common.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_94_1.png)


    ³⁸ You will see soon why we have used ''$-a_j$'' and not ''$a_j$'' in the equation'
  merge: -1

  md: '# Understanding flow of data in a FFNN


    If you execute the command *model.summary()* for the model developed in the previous
    section, you will be presented with the following information which details the
    number of parameters to be estimated in each layer of the network. Let''s understand
    how these numbers are obtained which will help clarify the flow of information
    in FFNN.


    | Layer (type) | Output Shape | Param # |

    |---|---|---|

    | dense_3 (Dense) | (None, 14) | 182 |

    | dense_4 (Dense) | (None, 7) | 105 |

    | dense_5 (Dense) | (None, 1) | 8 |

    | Total params: 295 | | |

    | Trainable params: 295 | | |

    | Non-trainable params: 0 | | |


    We know that each augmented input sample is 12-dimensional ($u_{aug} \in R^{12}$).
    In the forward pass (also called forward propagation), the augmented input is
    first processed by the neurons of the first hidden layer. In the $j^{th}$ neuron
    of this layer, the weighted sum of the inputs are non-linearly transformed via
    an activation function, $g$


    $$a_j = g(w_j^T u_{aug} + b_j)$$


    $w_j \in R^{12}$ are the weights applied to the inputs and $b_j$ is the bias added
    to the sum. Thus, each neuron has 13 parameters (12 weights and a bias) leading
    to 182 parameters for all the 14 neurons of the $1^{st}$ layer that need to be
    estimated. Outputs of all the 14 neurons form vector $a^{(1)} \in R^{14}$


    $$a^{(1)} = g^{(1)}(W^{(1)}u_{aug} + b^{(1)})$$


    where each row of $W^{(1)} \in R^{14 \times 12}$ contains the weights of a neuron.
    The same activation function is used by all the neurons of a layer. $a^{(1)}$
    becomes the input to the $2^{nd}$ hidden layer.


    $$a^{(2)} \in R^7 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$$


    where $W^{(2)} \in R^{7 \times 14}$. Each neuron in the $2^{nd}$ layer has 14
    weights and a bias parameter, leading to 105 parameters in the layer. The final
    output layer had a single neuron with 8 parameters and no activation function,
    giving the network output as follows


    $$a^{(3)} = \hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$$


    where $w^{(3)} \in R^7$.'

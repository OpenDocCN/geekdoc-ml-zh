    # 9.3 Nonlinear Identification of a Heat Exchanger Process Using NARX


    To demonstrate the utility of nonlinear SysID, we will use data from a liquid-saturated
    steam heat exchanger<sup>76</sup> where hot saturated steam is used to heat cold
    liquid. The provided dataset contains 4000 samples (sampling time 1s) of input
    (liquid flow rate) and output (outlet liquid temperature) variables. For this
    benchmark nonlinear process, our objective will be to build a dynamic model to
    predict the outlet liquid temperature as a function of incoming liquid flowrate.
    The dataset can be downloaded from the DalSy datasets repository.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_178_0.png)


    Figure 9.3: Liquid-saturated steam heat exchanger



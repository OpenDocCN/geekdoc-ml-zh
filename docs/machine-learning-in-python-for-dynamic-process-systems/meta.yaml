    can now be generated using off-the-shelf Python libraries. Considering the dominance
    of Python for deep learning, Python becomes an excellent choice for SysID scripting.


    In the above context, we will cover the following topics to familiarize you to
    Python


    +   - Introduction to Python language

    - Introduction to Spyder and Jupyter, two popular code editors

    - Overview of Python data structures and scientific computing libraries

    - Python libraries for system identification

    - Overview of a typical ML-DPM/SysID script'
  - '[PAGE 32]


    # 2.1 Introduction to Python


    Python is a high-level general-purpose computer programming language that can
    be used for application development and scientific computing. If you have used
    other computer languages like Visual Basic, C#, C++, Java, then you would understand
    the fact that Python is an interpreted and dynamic language. If not, then think
    of Python as just another name in the list of computer languages. What is more
    important is that Python offers several features that sets it apart from the rest
    of the pack making it the most preferred language for machine learning. Figure
    2.1 lists some of these features. Python provides all tools to conveniently carry
    out all steps of an ML-DPM project, namely, data collection, data exploration,
    data pre-processing, model ID, visualization, and solution deployment to end-users.
    In addition, freely available tools make writing Python code very easy⁷.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_32_0.png)


    # Installing Python


    One can download official and latest version of Python from the *python.com* website.
    However, the most convenient way to install and use Python is to install Anaconda
    (*www.anaconda.com*) which is an open-source distribution of Python. Along with
    the core Python, Anaconda installs a lot of other useful packages. Anaconda comes
    with a GUI called Anaconda Navigator (Figure 2.2) from where you can launch several
    other tools.


    > ⁷ Most of the content of this chapter is similar to that in Chapter 2 of the
    book ‘Machine Learning in Python for Process Systems Engineering’ and have been
    re-produced with appropriate changes to maintain the standalone nature of this
    book.'
  - '[PAGE 33]


    ![](img/6cffacf6247d6f7caa7eacc348cef427_33_0.png)


    Figure 2.2: Anaconda Navigator GUI


    # Running/Executing Python code


    Once Anaconda is installed, you can write your code in any text editor (like Notepad),
    save it in .py format, and then run via Anaconda command terminal. However, a
    convenient alternative is to use IDEs (integrated development environments). IDEs
    not just allow creating .py scripts, but also execute them on the fly, i.e., we
    can make code edits and see the results immediately, all within an integrated
    environment. Among the several available Python IDEs (PyCharm, VS Code, Spyder,
    etc.), we found Spyder to be the most convenient and functionality-rich, and therefore
    is discussed in the next section.


    Jupyter Notebooks are another very popular way of writing and executing Python
    code. These notebooks allow combining code, execution results, explanatory text,
    and multimedia resources in a single document. As you can imagine, this makes
    saving and sharing complete data analysis very easy.


    In the next section, we will provide you with enough familiarity on Spyder and
    Jupyter so that you can start using them.'
- md: "## 2.2 Introduction to Spyder and Jupyter\n\nFigure 2.3 shows the interface\
    \ (and its different components) that comes up when you launch Spyder. These are\
    \ the 3 main components:\n\n- *Editor:* You can type and save your code here.\
    \ Clicking ▶ button executes the code in the active editor tab.\n- *Console:*\
    \ Script execution results are shown here. It can also be used for executing Python\
    \ commands and interact with variables in the workspace.\n- *Variable explorer:*\
    \ All the variables generated by running editor scripts or console are shown here\
    \ and can be interactively browsed.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_34_0.png)\n\
    \nLike any IDE, Spyder offers several convenience features. You can divide your\
    \ script into cells and execute only selected cell if you choose to (by pressing\
    \ Ctrl + Enter buttons). Intellisense allows you to autocomplete your code by\
    \ pressing Tab key. Extensive debugging functionalities make troubleshooting easier.\
    \ These are only some of the features available in Spyder. You are encouraged\
    \ to explore the different options (such as pausing and canceling script execution,\
    \ clearing out variable workspace, etc.) on the Spyder GUI.\n\nWith Spyder, you\
    \ have to run your script again to see execution results if you close and reopen\
    \ your script. In contrast to this, consider the Jupyter interface in Figure 2.4.\
    \ Note that the Jupyter interface opens in a browser. We can save the shown code,\
    \ the execution outputs, and explanatory text/figures as a (.ipnb) file and have\
    \ them remain intact when we reopen the file in Jupyter notebook.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_35_0.png)\n\
    \nYou can designate any input cell as a code or markdown (formatted explanatory\
    \ text). You can press Ctrl + Enter keys to execute any active cell. All the input\
    \ cells can be executed via the *Cell* menu.\n\nThis completes our quick overview\
    \ of Spyder and Jupyter interfaces. You can choose either of them for working\
    \ through the codes in the rest of the book.\n\n## 2.3 Python Language: Basics\n\
    \nIn the current and next sections, we will see several simple examples of manipulating\
    \ data using Python and scientific packages. While these simple operations may\
    \ seem unremarkable (and boring) in the absence of any larger context, they form\
    \ the building blocks of more complex scripts presented later in the book. Therefore,\
    \ it will be worthwhile to give these at least a quick glance.\n\nNote that you\
    \ will find '#' used a lot in these examples; these hash marks are used to insert\
    \ explanatory comments in code. Python ignores (does not execute) anything written\
    \ after # on a line.\n\n### Basic data types\n\nIn Python, you work with 4 types\
    \ of data types\n\n```\n# 4 data types: int, float, str, bool\ni = 2 # integer;\
    \ type(i) = int\nf = 1.2 # floating-point number; type(f) = float\ns = 'two' #\
    \ string; type(s) = str\nb = True # boolean; type(b) = bool\n```\n\nWith the variables\
    \ defined you can perform basic operations\n\n```\n# print function prints/displays\
    \ the specified message\nprint(i+2) # displays 4\nprint(f*2) # displays 2.4\n\
    ```\n\n### Lists, tuples as ordered sequences\n\nRelated data (not necessarily\
    \ of the same data type) can be arranged together as a sequence in a list as shown\
    \ below\n\n```\n# different ways of creating lists\nlist1 = [2,4,6]\nlist2 = ['air',3,1,5]\n\
    list3 = list(range(4)) # equals [0,1,2,3]; range function returns a sequence of\
    \ numbers starting\n                        # from 0 (default) with increments\
    \ of 1 (default)\nlist3.append(8) # returns [0,1,2,3,8]; append function adds\
    \ new items to existing list\nlist4 = list1 + list2 # equals [2,4,6,'air',3,1,5]\n\
    list5 = [list2, list3] # nested list [['air', 3, 1, 5], [0, 1, 2, 3,8]]\n```\n\
    \nTuples are another sequence construct like lists, with a difference that their\
    \ items and sizes cannot be changed. Since tuples are immutable/unchangeable,\
    \ they are more memory efficient.\n\n```\n# creating tuples\ntuple1 = (0,1,'two')\n\
    tuple2 = (list1, list2) # equals ([2, 4, 6, 8], ['air', 3, 1, 5])\n```\n\nA couple\
    \ of examples below illustrate list comprehension which is a very useful way of\
    \ creating new lists from other sequences\n\n```\n# generate powers of individual\
    \ items in list3\nnewList1 = [item**2 for item in list3] # equals [0,1,4,9,64]\n\
    \n# nested list comprehension\nnewList2 = [item2**2 for item2 in [item**2 for\
    \ item in list3]] # equals [0,1,16,81,4096]\n```\n\n### Indexing and slicing sequences\n\
    \nIndividual elements in a list can be accessed and modified as follows\n\n```\n\
    # working with single item using positive or negative indexes\nprint(list1[0])\
    \ # displays 2, the 1st item in list1\nlist2[1] = 1 # list2 becomes ['air',1,1,5]\n\
    print(list2[-2]) # displays 1, the 2nd last element in list2\n```\n\nNote that\
    \ Python indexing starts from zero. Very often, we need to work with multiple\
    \ items of the list. This can be accomplished easily as shown below.\n\n```\n\
    # accessing multiple items through slicing\n# Syntax: givenList[start,stop,step];\
    \ if unspecified, start=0, stop=list length, step=1\nprint(list4[0:3]) # displays\
    \ [2,4,6], the 1st, 2nd, 3rd items; note that index 3 item is excluded\n```\n\n\
    ![](img/6cffacf6247d6f7caa7eacc348cef427_37_0.png)\n\n```\nprint(list4[:3]) #\
    \ same as above\nprint(list4[4:len(list4)]) # displays [3,1,5]; len() function\
    \ returns the number of items in list\nprint(list4[4:]) # same as above\nprint(list4[::3])\
    \ # displays [2, 'air', 5]\nprint(list4[::-1]) # displays list 4 backwards [5,\
    \ 1, 3, 'air', 6, 4, 2]\nlist4[2:4] = [0,0,0] # list 4 becomes [2, 4, 0, 0, 0,\
    \ 3, 1, 5]\n```\n\n### Execution control statements\n\nThese statements allow\
    \ you to control the execution sequence of code. You can choose to execute any\
    \ specific parts of the script selectively or multiple times. Let's see how you\
    \ can accomplish these\n\n```\n# selectively execute code based on condition\n\
    if list1[0] > 0:\n    list1[0] = 'positive'\nelse:\n    list1[0] = 'negative'\n\
    \n# list1 becomes ['positive', 4, 6]\n```\n\n```\n# compute sum of squares of\
    \ numbers in list3\nsum_of_squares = 0\nfor i in range(len(list3)):\n    sum_of_squares\
    \ += list3[i]**2\n\nprint(sum_of_squares) # displays 78\n```\n\n### Custom functions\n\
    \nPreviously we used Python's built-in functions (len(), append()) to carry out\
    \ operations pre-defined for these functions. Python allows defining our own custom\
    \ functions as well. The advantage of custom functions is that we can define a\
    \ set of instructions once and then re-use them multiple times in our script and\
    \ project.\n\nFor illustration, let's define a function to compute the sum of\
    \ squares of items in a list\n\n```\n# define function instructions\ndef sumSquares(givenList):\n\
    \    sum_of_squares = 0\n    for i in range(len(givenList)):\n        sum_of_squares\
    \ += givenList[i]**2\n\n    return sum_of_squares\n\n# call/re-use the custom\
    \ function multiple times\nprint(sumSquares(list3)) # displays 78\n```\n\n> You\
    \ might have noticed in our custom function code above that we used different\
    \ indentations (number of whitespaces at beginning of code lines) to separate\
    \ the ‘for loop’ code from the rest of the function code. This practice is actually\
    \ enforced by Python and will result in errors or bugs if not followed. While\
    \ other popular languages like C++, C# use braces ({}) to demarcate a code block\
    \ (body of a function, loop, if statement, etc.), Python uses indentation. You\
    \ can choose the amount of indentation but it must be consistent within a code\
    \ block.\n\nThis concludes our extremely selective coverage of Python basics.\
    \ However, this should be sufficient to enable you to understand the codes in\
    \ the subsequent chapters. Let’s continue now to learn about specialized scientific\
    \ packages.\n\n## 2.4 Scientific Computing Packages: Basics\n\nWhile the core\
    \ Python data-structures are quite handy, they are not very convenient for the\
    \ advanced data manipulations we require for machine learning tasks. Fortunately,\
    \ specialized packages like NumPy, SciPy, Pandas exist which provide convenient\
    \ multidimensional tabular data structures suited for scientific computing. Let’s\
    \ quickly make ourselves familiar with these packages.\n\n### NumPy\n\nIn NumPy,\
    \ ndarrays are the basic data structures which put data in a grid of values. Illustrations\
    \ below show how 1D and 2D arrays can be created and their items accessed\n\n\
    ```\n# import numpy package & create a 2D array\nimport numpy as np\narr2D = np.array([[1,4,6],[2,5,7]])\n\
    \n# getting information about arr2D\nprint(arr2D.size) # returns 6, the no. of\
    \ items\nprint(arr2D.ndim) # returns 2, the no. of dimensions\nprint(arr2D.shape)\
    \ # returns tuple(2,3) corresponding to 2 rows & 3 columns\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_39_0.png)"
  mdcn: "## 2.2 Spyder 与 Jupyter 简介\n\n图 2.3 展示了启动 Spyder 时出现的界面（及其不同组件）。主要有以下 3 个组件：\n\
    \n- *编辑器：* 你可以在此输入并保存代码。点击 ▶ 按钮可执行活动编辑器选项卡中的代码。\n- *控制台：* 脚本执行结果显示在此处。它也可用于执行\
    \ Python 命令并与工作区中的变量进行交互。\n- *变量资源管理器：* 运行编辑器脚本或控制台生成的所有变量都显示在此处，并可进行交互式浏览。\n\n\
    ![](img/6cffacf6247d6f7caa7eacc348cef427_34_0.png)\n\n与任何 IDE 一样，Spyder 提供了多种便捷功能。你可以将脚本划分为单元格，并选择仅执行选定的单元格（通过按\
    \ Ctrl + Enter 键）。智能感知功能允许你通过按 Tab 键自动补全代码。丰富的调试功能使故障排除更加容易。这些只是 Spyder 可用功能的一部分。鼓励你探索\
    \ Spyder 图形用户界面上的不同选项（例如暂停和取消脚本执行、清除变量工作区等）。\n\n使用 Spyder 时，如果你关闭并重新打开脚本，则必须再次运行脚本才能查看执行结果。与此相反，请考虑图\
    \ 2.4 中的 Jupyter 界面。请注意，Jupyter 界面在浏览器中打开。我们可以将显示的代码、执行输出和解释性文本/图形保存为 (.ipnb)\
    \ 文件，并在 Jupyter notebook 中重新打开文件时保持其完整无损。\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_35_0.png)\n\
    \n你可以将任何输入单元格指定为代码或 markdown（格式化的解释性文本）。你可以按 Ctrl + Enter 键执行任何活动单元格。所有输入单元格都可以通过\
    \ *单元格* 菜单执行。\n\n至此，我们对 Spyder 和 Jupyter 界面的快速概览就完成了。你可以选择其中任何一个来学习本书其余部分的代码。\n\
    \n## 2.3 Python 语言：基础\n\n在当前和下一节中，我们将看到几个使用 Python 和科学包操作数据的简单示例。虽然这些简单的操作在没有更大背景的情况下可能显得平淡无奇（且枯燥），但它们构成了本书后面介绍的更复杂脚本的构建模块。因此，至少快速浏览一下这些内容是值得的。\n\
    \n请注意，你会在这些示例中经常看到 '#'；这些井号用于在代码中插入解释性注释。Python 会忽略（不执行）一行中 # 之后写的所有内容。\n\n###\
    \ 基本数据类型\n\n在 Python 中，你使用 4 种数据类型\n\n```\n# 4 data types: int, float, str, bool\n\
    i = 2 # integer; type(i) = int\nf = 1.2 # floating-point number; type(f) = float\n\
    s = 'two' # string; type(s) = str\nb = True # boolean; type(b) = bool\n```\n\n\
    定义变量后，你可以执行基本操作\n\n```\n# print function prints/displays the specified message\n\
    print(i+2) # displays 4\nprint(f*2) # displays 2.4\n```\n\n### 列表、元组作为有序序列\n\n\
    相关数据（不一定具有相同的数据类型）可以作为序列排列在列表中，如下所示\n\n```\n# different ways of creating lists\n\
    list1 = [2,4,6]\nlist2 = ['air',3,1,5]\nlist3 = list(range(4)) # equals [0,1,2,3];\
    \ range function returns a sequence of numbers starting\n                    \
    \    # from 0 (default) with increments of 1 (default)\nlist3.append(8) # returns\
    \ [0,1,2,3,8]; append function adds new items to existing list\nlist4 = list1\
    \ + list2 # equals [2,4,6,'air',3,1,5]\nlist5 = [list2, list3] # nested list [['air',\
    \ 3, 1, 5], [0, 1, 2, 3,8]]\n```\n\n元组是另一种像列表一样的序列结构，不同之处在于它们的元素和大小不能更改。由于元组是不可变的/不可更改的，它们更节省内存。\n\
    \n```\n# creating tuples\ntuple1 = (0,1,'two')\ntuple2 = (list1, list2) # equals\
    \ ([2, 4, 6, 8], ['air', 3, 1, 5])\n```\n\n下面的几个示例说明了列表推导式，这是一种从其他序列创建新列表的非常有用的方法\n\
    \n```\n# generate powers of individual items in list3\nnewList1 = [item**2 for\
    \ item in list3] # equals [0,1,4,9,64]\n\n# nested list comprehension\nnewList2\
    \ = [item2**2 for item2 in [item**2 for item in list3]] # equals [0,1,16,81,4096]\n\
    ```\n\n### 序列的索引和切片\n\n列表中的单个元素可以如下访问和修改\n\n```\n# working with single item using\
    \ positive or negative indexes\nprint(list1[0]) # displays 2, the 1st item in\
    \ list1\nlist2[1] = 1 # list2 becomes ['air',1,1,5]\nprint(list2[-2]) # displays\
    \ 1, the 2nd last element in list2\n```\n\n请注意，Python 索引从零开始。很多时候，我们需要处理列表中的多个项目。这可以很容易地完成，如下所示。\n\
    \n```\n# accessing multiple items through slicing\n# Syntax: givenList[start,stop,step];\
    \ if unspecified, start=0, stop=list length, step=1\nprint(list4[0:3]) # displays\
    \ [2,4,6], the 1st, 2nd, 3rd items; note that index 3 item is excluded\n```\n\n\
    ![](img/6cffacf6247d6f7caa7eacc348cef427_37_0.png)\n\n```\nprint(list4[:3]) #\
    \ same as above\nprint(list4[4:len(list4)]) # displays [3,1,5]; len() function\
    \ returns the number of items in list\nprint(list4[4:]) # same as above\nprint(list4[::3])\
    \ # displays [2, 'air', 5]\nprint(list4[::-1]) # displays list 4 backwards [5,\
    \ 1, 3, 'air', 6, 4, 2]\nlist4[2:4] = [0,0,0] # list 4 becomes [2, 4, 0, 0, 0,\
    \ 3, 1, 5]\n```\n\n### 执行控制语句\n\n这些语句允许你控制代码的执行顺序。你可以选择性地或多次执行脚本的任何特定部分。让我们看看如何实现这些\n\
    \n```\n# selectively execute code based on condition\nif list1[0] > 0:\n    list1[0]\
    \ = 'positive'\nelse:\n    list1[0] = 'negative'\n\n# list1 becomes ['positive',\
    \ 4, 6]\n```\n\n```\n# compute sum of squares of numbers in list3\nsum_of_squares\
    \ = 0\nfor i in range(len(list3)):\n    sum_of_squares += list3[i]**2\n\nprint(sum_of_squares)\
    \ # displays 78\n```\n\n### 自定义函数\n\n之前我们使用了 Python 的内置函数（len(), append()）来执行为这些函数预定义的操作。Python\
    \ 也允许定义我们自己的自定义函数。自定义函数的优点在于，我们可以定义一组指令，然后在脚本和项目中多次重用它们。\n\n为了说明，让我们定义一个函数来计算列表中元素的平方和\n\
    \n```\n# define function instructions\ndef sumSquares(givenList):\n    sum_of_squares\
    \ = 0\n    for i in range(len(givenList)):\n        sum_of_squares += givenList[i]**2\n\
    \n    return sum_of_squares\n\n# call/re-use the custom function multiple times\n\
    print(sumSquares(list3)) # displays 78\n```\n\n> 你可能已经注意到，在我们上面的自定义函数代码中，我们使用了不同的缩进（代码行开头的空格数）来将\
    \ 'for 循环' 代码与函数的其余代码分开。这种做法实际上是 Python 强制执行的，如果不遵循，将导致错误或缺陷。虽然其他流行语言如 C++、C#\
    \ 使用花括号 ({}) 来界定代码块（函数体、循环、if 语句等），但 Python 使用缩进。你可以选择缩进量，但必须在代码块内保持一致。\n\n至此，我们对\
    \ Python 基础知识的极其选择性的介绍就结束了。然而，这应该足以让你理解后续章节中的代码。现在让我们继续学习专门的科学计算包。\n\n## 2.4 科学计算包：基础\n\
    \n虽然核心 Python 数据结构非常方便，但它们对于机器学习任务所需的高级数据操作来说并不十分方便。幸运的是，存在像 NumPy、SciPy、Pandas\
    \ 这样的专门包，它们提供了适合科学计算的便捷多维表格数据结构。让我们快速熟悉一下这些包。\n\n### NumPy\n\n在 NumPy 中，ndarray\
    \ 是基本的数据结构，它将数据放在值的网格中。下面的插图展示了如何创建一维和二维数组以及如何访问它们的元素\n\n```\n# import numpy package\
    \ & create a 2D array\nimport numpy as np\narr2D = np.array([[1,4,6],[2,5,7]])\n\
    \n# getting information about arr2D\nprint(arr2D.size) # returns 6, the no. of\
    \ items\nprint(arr2D.ndim) # returns 2, the no. of dimensions\nprint(arr2D.shape)\
    \ # returns tuple(2,3) corresponding to 2 rows & 3 columns\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_39_0.png)"

    # # 5.1 Time Series Analysis: An Introduction


    Time series analysis refers to the study and modeling of dependencies among sequential
    data points in time series signals. Several approaches exist for modeling time
    series. In this chapter, we will look at four of the most common models as shown
    in Figure 5.1. While AR, MA, and ARMA models are used to describe stationary signals,
    ARIMA is used for (homogeneous) nonstationary signals. In this chapter, we will
    understand the differences, similarities, and the inherent connections between
    these models.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_93_0.png)


    To further motivate the study of time series analysis, let’s briefly look at two
    of the use cases that were mentioned previously. The illustration below shows
    a CSTR unit that has measured disturbance signals (feed concentration and temperature).
    An accurate model for these signals can help generate accurate forecasts and control
    the vessel temperature more effectively. Also, it is easy to show that if the
    setpoint of the controllers do not change, then the controlled variables (here,
    output product temperature and concentration) depend on process disturbances alone.
    Therefore, a TSA model for these variables can be built to eventually look for
    significant mismatch between measurements and model predictions as an indicator
    of process faults.'
- md: '## 5.2 Autoregressive (AR) Models: An Introduction


    AR models are among the simplest and easiest to understand time series models,
    wherein the current state is written as a linear combination of past measurements
    as shown below³⁸


    $$y(k) = -a_1y(k-1) - a_2y(k-2) \cdots - a_py(k-p) + e(k) \quad \text{eq. 1}$$

    $$= \sum_{j=1}^{p} -a_jy(k-j) + e(k)$$


    The above model uses $p$ lagged/past values and therefore is referred to as an
    AR(p) model or an autoregressive model of order $p$. In spite of its simplicity,
    an AR model can generate varied patterns of signals as shown below. In process
    industry, processes with inherent autoregressive behavior are fairly common.


    ³⁸ You will see soon why we have used ''$-a_j$'' and not ''$a_j$'' in the equation


    ## Model order selection


    Given any time series data, the suitability of an AR model and its potential order
    can be judged using the ACF$^{39}$ and PACF plots as shown below for the AR(2)
    plot in Figure 5.2.


    Let’s see an example which shows how to generate data from an AR process and how
    to fit an AR model.


    ## Example 5.1:


    We will create an AR(2) signal with 1000 samples. Thereafter, guided by ACF/PACF,
    a model will be fitted to the data followed by residual diagnostics.


    ```python

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from statsmodels.tsa.arima_process import ArmaProcess

    from statsmodels.tsa.arima.model import ARIMA

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf


    # generate data for AR(2) process using statsmodels.tsa package

    ar_coeffs = np.array([1, -0.3, -0.45]) # $a_1 = -0.3, a_2 = -0.45$

    ARprocess = ArmaProcess(ar_coeffs)

    y_AR = ARprocess.generate_sample(nsample=1000)


    # generate ACF and PACF plots for y_AR

    conf_int = 2/np.sqrt(len(y_AR))

    plot_acf(y_AR, lags= 20, alpha=None, title="")

    plt.gca().axhspan(-conf_int, conf_int)

    ```


    ```python

    plot_pacf(y_AR, lags= 20, alpha=None, title="")

    plt.gca().axhspan(-conf_int, conf_int)

    ```


    The PACF plot clearly indicates an AR(2) process. We will again use the *statsmodels.tsa*
    package to fit an AR(2) model.


    ```python

    # Fit an AR(2) model

    y_AR_centered = y_AR - np.mean(y_AR)

    model = ARIMA(y_AR_centered, order=(2, 0, 0)) # order = (p,d,r)

    results = model.fit()

    ```


    > AR model is linear-in-parameters and therefore, OLS method can be used to estimate
    the unknown model parameters.


    ```python

    # Print out the estimate for the parameters $a_1$ and $a_2$

    print(''[a1, a2] = '', -results.arparams)


    >>> [a1, a2] = [-0.27 -0.50]

    ```


    The estimated parameters are close to the true values (the inaccuracy in the estimates
    diminishes for larger sample size). With the obtained model, let''s generate the
    model residuals and confirm whiteness of the residual sequence.


    ```python

    # get model predictions and residuals on training dataset

    y_AR_centered_pred = results.predict()

    residuals = y_AR_centered - y_AR_centered_pred


    plt.figure(), plt.title(''Training data'')

    plt.plot(y_AR_centered, ''g'', label=''Measurements'')

    plt.plot(y_AR_centered_pred, ''r'', label=''Predictions'')

    plt.ylabel(''y(k): Measured vs predicted''), plt.xlabel(''k''), plt.legend()


    plt.figure(), plt.plot(residuals, ''black'', linewidth=0.8)

    plt.title(''Training data''), plt.ylabel(''residuals''), plt.xlabel(''k'')

    ```


    ```python

    # ACF residuals

    plot_acf(residuals, lags= 20, alpha=None, title="")

    plt.gca().axhspan(-conf_int, conf_int, facecolor=''lightblue'', alpha=0.5)

    plt.xlabel(''lag''), plt.title(''Autocorrelations'')

    ```


    ## Shift operator and transfer function operator


    The original form of the difference equations that we have worked with so far
    is not very convenient when combining different models and analyzing model properties.
    For a more compact and useful representation, the concept of backshift operator
    ($q^{-1}$) is introduced. It is defined as


    $$y(k-1) = q^{-1}y(k)$$


    Evidently, the backshift operator moves the signal one step back. Multiple applications
    shift the signal back further


    $$q^{-1}(q^{-1}y(k)) = q^{-2}y(k) = y(k-2)$$


    Let''s rewrite Eq. 1 using the shift operator as follows


    $$y(k) + \sum_{j=1}^{p} a_j y(k-j) = e(k)$$

    $$\Rightarrow y(k) + (\sum_{j=1}^{p} a_j q^{-j})y(k) = e(k)$$

    $$\Rightarrow (1 + \sum_{j=1}^{p} a_j q^{-j})y(k) = e(k)$$

    $$\Rightarrow y(k) = \frac{1}{(1+\sum_{j=1}^{p} a_j q^{-j})} e(k) \equiv H(q^{-1})e(k)$$


    Let''s see how we would represent a simple ARX model $y(k) + a_1 y(k-1) + a_2
    y(k-2) = b_1 u(k-1) + b_2 u(k-2) + e(k)$ using the $q$ notation


    $$(1 + a_1 q^{-1} + a_2 q^{-2})y(k) = q^{-1}(b_1 + b_2 q^{-1})u(k) + e(k)$$

    $$\Rightarrow y(k) = G(q^{-1})u(k) + H(q^{-1})e(k)$$


    $$G(q^{-1}) = \frac{q^{-1}(b_1 + b_2 q^{-1})}{1 + a_1 q^{-1} + a_2 q^{-2}}$$

    $$H(q^{-1}) = \frac{1}{1 + a_1 q^{-1} + a_2 q^{-2}}$$


    Note that $G(q^{-1})$ and $H(q^{-1})$ are (input and noise transfer) operators
    (and not multipliers) that operate on $u(k)$ and $e(k)$, respectively, and determine
    how the incoming signals are ''transferred'' to the output. Therefore, $G(q^{-1})$
    and $H(q^{-1})$ are called transfer operators. Equation 2 can be written further
    as


    $$y(k) = y_u(k) + v(k) \quad \text{eq. 3}$$


    where, $y_u(k) = G(q^{-1})u(k)$ is the deterministic output and $v(k) = H(q^{-1})e(k)$
    is the disturbance signal.


    Note that Eq. 3 clearly shows that in an ARX model, the process disturbance $v(k)$
    is a colored signal and not a white noise ($e(k)$). It is evident, therefore,
    that the transfer operator form makes it easy to dissect the stochastic and deterministic
    parts of the model.


    The $q$ notation may not seem appealing to you immediately, but soon enough you
    will begin to appreciate the convenience it offers! For now, just note that $G(q^{-1})$
    and $H(q^{-1})$ can be manipulated like polynomials of $q^{-1}$ as you will soon
    see.


    ## 5.3 Moving Average (MA) Models: An Introduction


    In MA models the current state is a summation of current and past white noise
    error values as shown below


    $$y(k) = c_1e(k-1) + c_2e(k-2) \cdots + c_re(k-r) + e(k)$$

    $$= \sum_{j=1}^r c_je(k-j) + e(k)$$

    $$= (1 + \sum_{j=1}^r c_jq^{-j})e(k)$$


    The above model is referred to as an MA(r) model. An MA model can be interpreted
    as a counterpart of FIR models for time series signals where the effect of past
    random shocks/noise are propagated directly to future values of the time series.
    Plots below provide a sample of the patterns generated from MA models.


    Figure 5.3: Time-series signals from MA processes


    ## Model order selection


    Just like for AR model, ACF and PACF plots provide direct clues about the order
    of the model as shown below for the MA(2) plot in Figure 5.3.


    Let''s concretize our understanding of the MA process through an example.


    **Example 5.2:** We will create an MA(2) signal with 1000 samples. Thereafter,
    guided by ACF/PACF, a model will be fitted to the data followed by residual diagnostics.
    The imported packages are the same as that in Example 5.1


    ```python


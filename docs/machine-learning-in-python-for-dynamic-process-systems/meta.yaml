  - '[PAGE 154]


    # Chapter 8


    # State-Space Models: Efficient Modeling of MIMO Systems


    In the previous chapter we alluded to the problems related to the classical methodology
    of modeling a MIMO system through separate MISO models for each output. In a physical
    system, the different output variables seldom behave independently; they often
    share common parameters and/or correlated noise. Therefore, identifying all the
    output models simultaneously while being cognizant of shared dynamics between
    them leads to better and more robust models. This alternative approach to SysID
    is provided by state-space (SS) models. State-space models add an intermediate
    layer of ‘state variables’ between the input and output variables, wherein, the
    inputs determine the states, and the outputs are derived as linear combination
    of the states. This modeling paradigm leads to parsimonious models capable of
    fitting complex processes with both fast and slow dynamics.


    In this chapter, we will cover in detail the subspace identification techniques
    which are utilized for fitting the SS models. While several popular subspace identification
    methods (SIMs) such as N4SID, CVA, MOESP exist, CVA will be our primary focus.
    Subspace identification offers several additional advantages over I/O models.
    SIMs involve only linear algebra for model ID (no iterative nonlinear optimization
    schemes are needed). SIMs also provide in-situ mechanism for automated optimal
    model order selection. Subspace models are more robust to noise and provide smooth
    (step and impulse) response curves. Infact, it is not uncommon to fit SIM model
    to I/O data and then derive FIR model using the SIM model for usage in MPC applications.
    Due to such superior properties of SIM, they are among the ‘mainstream’ models
    provided by advanced process control (APC) solution vendors.


    CVA models are also inherently suitable for computing fault detection indices,
    performing fault diagnosis, and therefore building process monitoring tools. We
    will build one such application in this chapter. Specifically, the following topics
    will be covered


    +   - Introduction to state-space models and CVA modeling

    - Modeling MIMO glass furnace via CVA

    - Process monitoring of Industrial Chemical Plants using CVA'

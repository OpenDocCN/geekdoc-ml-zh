    # 9.1 Nonlinear System Identification: An Introduction


    Nonlinear SysID becomes a necessary evil when accurate predictions are sought
    over wide range of operating conditions. Although nonlinear SysID literature is
    not as mature as linear SysID, SysID community has developed several useful approaches
    for nonlinear modeling. Figure 9.1 shows a few popular approaches. In the 1st
    approach, a nonlinear relationship is directly fitted between y(k) and past data
    The nonlinear form could be polynomial-based or more complex such as neural network-based.
    We will focus on the polynomial form in this chapter. Just like linear SysID,
    different model structures can be postulated, namely, nonlinear ARX (NARX), NOE,
    NARMAX, etc. In the 2nd approach, the linear and nonlinear parts are defined in
    separate blocks, leading to block-structured models. Depending upon whether the
    nonlinear block comes before or after the linear block, one could have the Hammerstein
    model or the Wiener model (the two most popular models from this class). In the
    3rd approach, several linear models are built for different regions of the operating
    space and then they are combined to give one global model. Numerous industrial
    applications of these approaches have been reported for predictive modeling, process
    control, and process monitoring.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_175_0.png)


    # Nonlinear transformation


    Considering high computational burden of nonlinear SysID, if the nature of nonlinearity
    is known beforehand, then a nonlinear transformation of the input or output variables
    may be utilized to avoid explicit nonlinear fitting. Illustrations below provide
    some example scenarios.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_175_1.png)'
  - '[PAGE 176]


    In practice the required nonlinear transformation is more likely to be unknown.
    Therefore, let''s start with arguably the default choice for nonlinear modeling:
    the NARX models.


    # 9.2 NARX Models: An Introduction


    Nonlinear autoregressive with eXogenous inputs (NARX) model is, as the name suggests,
    the nonlinear analogue of ARX model, wherein, the past inputs and outputs of the
    process are used for future predictions. As shown in Figure 9.2, the model takes
    the following form


    $$y(k) = f(u(k-d-1), ..., u(k-d-n_b), y(k-1), ..., y(k-n_a), \theta) + e(k)$$


    While the function $f$ is commonly taken to be polynomial form, any other nonlinear
    structure (including the neural networks) could be used as deemed suitable. A
    feature of polynomial NARX is that the predictor, $\hat{y}$, is linear-in-the-parameters!
    Therefore, polynomial NARX parameter estimation becomes straight-forward if the
    specific terms/regressors (such as $y(k-1)u(k-1)$, $u^2(k-1)$) that are to be
    included in the model is known *a priori*. Of course, like with ARX, hyperparameters
    ($d$, $n_b$, $n_a$, *polynomial degree*) have to be specified.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_176_0.png)


    **Example:** A polynomial NARX model of degree 2, $d=0$, and $n_a=n_b=1$


    $$\hat{y}(k) = a_1 y(k-1) + a_2 y^2(k-1) + a_3 y(k-1)u(k-1) + b_1 u(k-1) + b_2
    u^2(k-1)$$


    Figure 9.2: NARX model structure'

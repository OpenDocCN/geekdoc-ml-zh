    # 9.4 Introduction to Block-Structured Nonlinear Models


    Block-structured models describe nonlinear processes through separate blocks of
    static nonlinearity and linear dynamics as shown in Figure 9.4. Two separate scenarios
    have been depicted in the figure: the nonlinearity is at the input for a Hammerstein
    process while for a Wiener process, the nonlinearity is at the output<sup>78</sup>.
    While this blocks-based construct may seem very simple (and restrictive), it has
    been successfully used to model several complex industrial processes. For example,
    an industrial scale MPC-controlled air separation plant was modeled via Hammerstein-Wiener
    model using real process data by Pattison et. al. and used for optimizing plant
    scheduling under varying product demands<sup>79</sup>.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_182_0.png)


    <sup>78</sup> Other combinations of nonlinear and linear blocks (such as nonlinear-linear-nonlinear)
    have also been employed by SysID community.

    <sup>79</sup> Pattison et. al., Optimal process operations in fast-changing electricity
    markets: framework for scheduling with low-order dynamic models and an air separation
    application, *Industrial & Engineering Chemistry Research*, 2016'
- md: "Let's study Hammerstein model in more details to understand the general characteristics\
    \ of block-structured models.\n\n## Hammerstein model\n\nIn Hammerstein model\
    \ the inputs are first transformed by a nonlinear function and then passed through\
    \ a linear dynamic process as shown in Figure 9.5. Polynomials are often used\
    \ for the nonlinear function; piecewise linear functions being another popular\
    \ choice. To understand this framework in more details, let's derive the difference\
    \ equation form for a Hammerstein process with 2nd order polynomial and first\
    \ order ARX dynamics\n\n$$w(k) = \\beta_1 u(k) + \\beta_2 u^2(k)$$\n\n$$y(k) =\
    \ -a_1 y(k-1) + b_1 w(k)$$\n\n$$\\Rightarrow y(k) = -a_1 y(k-1) + b_1 \\beta_1\
    \ u(k-1) + b_1 \\beta_2 u^2(k-1) \\quad \\text{eq. 1}$$\n\n![img/6cffacf6247d6f7caa7eacc348cef427_183_0.png](img/6cffacf6247d6f7caa7eacc348cef427_183_0.png)\n\
    \nFigure 9.5: SISO Hammerstein model with polynomial nonlinearity. $\\beta_s$\
    \ are parameters of the nonlinear block.\n\nThere are different ways of estimating\
    \ the parameters $a_1, b_1, \\beta_1, \\beta_2$ in Eq. 1 (and, in general, any\
    \ Hammerstein model).\n\n- **Approach 1:**\n  Employ a nonlinear optimization\
    \ scheme to find the parameters directly\n\n- **Approach 2:**\n  Redefine the\
    \ parameters to derive a linear-in-the-parameters system. In Eq. 1, we can see\
    \ that the system has one parameter more than necessary. Either $\\beta_1$ or\
    \ $b_1$ can be fixed to 1 without changing the relationship between $u(k)$ and\
    \ $y(k)$. Let's set $\\beta_1 = 1$ and let $b_1\\beta_2 = r_1$. Therefore,\n\n\
    \  $y(k) = -a_1y(k-1) + b_1u(k-1) + r_1u^2(k-1)$"
  mdcn: "让我们更详细地研究Hammerstein模型，以理解块结构模型的一般特性。\n\n## Hammerstein模型\n\n在Hammerstein模型中，输入首先通过一个非线性函数进行变换，然后通过一个线性动态过程，如图9.5所示。多项式常被用作非线性函数；分段线性函数是另一种流行的选择。为了更详细地理解这个框架，让我们推导一个具有二阶多项式和一阶ARX动态的Hammerstein过程的差分方程形式。\n\
    \n$$w(k) = \\beta_1 u(k) + \\beta_2 u^2(k)$$\n\n$$y(k) = -a_1 y(k-1) + b_1 w(k)$$\n\
    \n$$\\Rightarrow y(k) = -a_1 y(k-1) + b_1 \\beta_1 u(k-1) + b_1 \\beta_2 u^2(k-1)\
    \ \\quad \\text{eq. 1}$$\n\n![img/6cffacf6247d6f7caa7eacc348cef427_183_0.png](img/6cffacf6247d6f7caa7eacc348cef427_183_0.png)\n\

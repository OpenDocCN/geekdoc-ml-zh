  - '[PAGE 177]


    The primary challenge during polynomial NARX identification is model structure
    selection. The number of potential regressors can become very large for even modest
    value of lags ($n_a$, $n_b$) and polynomial degree$^{74}$, and inclusion of many
    terms increase chances of overfitting. Fortunately, this task is automated$^{75}$
    using AIC-based algorithm in the Python package SysIdentPY. Let’s see how this
    package can be used for nonlinear identification of an industrial heat exchanger.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_177_0.png)


    $^{74}$ Very often, $d$ is kept zero and only the input and output lags ($n$ and
    $m$) are optimized for a given polynomial degree.

    $^{75}$ In a recent work by Sun & Braatz (ALVEN: Algebraic learning via elastic
    net for static and dynamic nonlinear system identification, Computers & Chemical
    Engineering, 2020), a DALVEN methodology has been proposed that uses a combination
    of nonlinear transformations, univariate feature selection, and elastic net regression
    for NARX structure selection.'

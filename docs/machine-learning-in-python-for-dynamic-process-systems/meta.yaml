  md: 'As alluded to before, the CVA modeling and monitoring procedures provided in
    this book mirror the description in the work<sup>68</sup> of Russell et al., and
    we will therefore attempt to replicate the CVA-based fault detection results from
    their paper titled ‘*Fault detection in industrial processes using canonical variate
    analysis and dynamic principal component analysis*’. Specifically, we will use
    the *Fault 5* dataset (file *d05_te.dat*) as our test data and normal operation
    dataset (file *d00.dat*) as our training data. We will use the manipulated variables
    as our inputs and the process measurements as our outputs. Our objective is to
    build a monitoring tool that can accurately flag the presence of a process fault
    with low frequency of false alerts. Let’s begin with a quick exploration of the
    dataset.


    ```

    # import packages

    import matplotlib.pyplot as plt, numpy as np

    from sklearn.preprocessing import StandardScaler


    # read data and separate input-output variables

    trainingData = np.loadtxt(''d00.dat'').T

    FaultyData = np.loadtxt(''d05_te.dat'')

    uData_training, yData_training = trainingData[:,41:52], trainingData[:,0:22]

    uData_test, yData_test = FaultyData[:,41:52], FaultyData[:,0:22]

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_166_0.png)


    It is obvious that continuously monitoring all the 22 output (and 11 input) variables
    is not practical. The single combined output plots above do seem to clearly indicate
    a process upset around sample number 200 in faulty dataset; however, they also
    seem to give a wrong impression of normal process conditions sample number 500
    onwards. It is known that Fault 5 continues until the end of the dataset. Fortunately,
    CVA makes the monitoring task easy by summarizing the state of any complex multivariate
    process into three simple indicators or monitoring indices as shown in Figure
    8.6. During model training, statistical thresholds are determined for the indices
    and for a new data-point, the new indices’ values are compared against the thresholds.
    If any of the three thresholds are violated, then presence of abnormal process
    conditions is confirmed. Let’s look into how these monitoring indices are computed.'

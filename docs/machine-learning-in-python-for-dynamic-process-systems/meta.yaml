    \ the successive samples $y(k)$ and $y(k-1)$. However, it is easy to see that\
    \ $y(k)$ and $y(k-2)$ end up being correlated because $y(k-1)$ and $y(k-2)$ are\
    \ directly correlated.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_58_0.png)\n\
    \nIn time series analysis, knowing direct correlation helps to decide what terms\
    \ should be part of the governing difference equation during model structure selection.\
    \ To compute the direct correlation between $y(k)$ and $y(k-2)$, the effects of\
    \ $y(k-1)$ are 'discounted' or removed from both $y(k)$ and $y(k-2)$. The correlation\
    \ between the discounted variables gives the direct correlation or, more formally,\
    \ partial correlation. Algorithm below shows the procedure for computation of\
    \ partial (auto)correlation\n\n**Algorithm: Partial autocorrelation between $y(k)$\
    \ and $y(k-2)$**\n\n+   1. Perform least squares fit between $y(k)$ and $y(k-1)$\
    \ as well as between $y(k-2)$ and $y(k-1)$ separately\n2. Generate predictions\
    \ from the least squares models and compute the following residuals\n   $$\\epsilon_{y_k}\
    \ = y_k - \\hat{y}_k \\quad \\text{and} \\quad \\epsilon_{y_{k-2}} = y_{k-2} -\
    \ \\hat{y}_{k-2}$$\n   discounted variables\n3. Partial autocorrelation coefficient\
    \ $\\phi_{yy}(2) \\equiv$ correlation between $\\epsilon_{y_k}$ and $\\epsilon_{y_{k-2}}$\n\
    \nThe partial autocorrelation coefficient for lag 3 can be computed following\
    \ the above algorithm wherein the effects of $y(k-1)$ and $y(k-2)$ are discounted\
    \ from $y(k)$ and $y(k-3)$. Other coefficients"

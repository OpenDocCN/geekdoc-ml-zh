    # Vanilla RNN cell vs GRU cell vs LSTM cell


    There is another popular variant of RNN cell, called GRU cell. As shown in the
    illustration below, GRU cell is simpler than LSTM cell. GRU cell has 3 neural
    layers and its internal state is represented using a single vector, $h_{(t)}$.
    For several common tasks, GRU cell-based RNN seems to provide similar performance
    as LSTM cell-based RNN and therefore, it is slowly gaining more popularity.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_201_0.png)


    # 10.4 Modeling Heat Exchangers using LSTM



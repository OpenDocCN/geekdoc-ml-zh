  md: '# 1.4 Applications of DPM in Process Industry


    In Figure 1.1, we saw some of the applications of dynamic models in process industry.
    To provide further perspectives into how a typical plant operator or management
    may use these varied applications, Figure 1.7 juxtaposes DPM applications alongside
    the typical decision-making hierarchy in a process plant. Every step of plant
    operation is now-a-days heavily reliant on DPM-based tools and machine learning
    has proven to be a useful vehicle for quickly building these tools. You can use
    the models from Figure 1.5 for building these tools or if you use commercial vendor
    solutions, you can find them employing these models in their products. For example,
    in the process control field, FIR models have been the bedrock of industrial MPC
    controllers. In the last few years, commercial vendors have inducted CVA models
    in their offering due to the advantages provided by subspace models. The latest
    offering by Aspen, DMC3⁴, incorporates neural networks for MPC and inferential
    modeling. ARX, BJ models are also used for industrial MPC⁵.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_28_0.png)


    ⁴ https://www.aspentech.com/en/products/msc/aspen-dmc3

    ⁵ Qin and Badgwell, A survey of industrial model predictive control technology.
    *Control Engineering Practice*, 2003'

    A dynamic signal''s properties can also be described in terms of its frequency
    contents, i.e., by decomposing the signal into sinusoidal components with different
    frequencies. The analysis in frequency domain is also called spectral analysis
    and for the stochastic discrete-time signals, the tool of choice is (power) spectral
    density plot that can provide a quick glimpse of strength of different frequency
    components. For example, consider the following time series and its spectral density
    plot. The spectral plot makes it easy to infer that the components with frequencies
    0.1Hz and 0.05Hz dominate the signal.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_62_0.png)



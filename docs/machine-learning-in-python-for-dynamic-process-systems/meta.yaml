    estimation. This sub-step is mostly ‘hands-off’ due to the availability of several
    specialized libraries that perform parameter estimation.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_23_0.png)'
  - "[PAGE 24]\n\n+   - **Model validation**: Once a model has been fitted, the next\
    \ step is to check if the model truly represents the underlying process. Several\
    \ techniques are at a modeler's disposal. For example, you could check the model's\
    \ performance on a dataset that has not been used during parameter estimation,\
    \ plot the modeling errors to look for leftover patterns, or check if the model\
    \ agrees with the *a priori* information about the system. Often, your first model\
    \ will fail the validation procedure. An expert modeler can use the validation\
    \ results to infer the reasons for the failure. Some examples of the cause could\
    \ be\n    - Training data was not ‘rich’ enough\n    - Training data was not pre-treated\
    \ adequately\n    - Choice of model structure was wrong\n    - Estimation algorithm\
    \ did not converge\n\nOnce diagnosed, appropriate corrections are made, and the\
    \ iterative procedure continues.\n\nWe hope that you get the understanding that\
    \ SysID is more than just black-box application of modeling algorithm for estimation\
    \ of model parameters. There are several practical aspects that require active\
    \ participation of the modeler during the SysID process. Without exaggeration,\
    \ we can say that SysID is an art, and the rest of the book will help you obtain\
    \ the necessary skills to become the SysID artist!\n\n# 1.3 Taxonomy of ML-based\
    \ Dynamic Models\n\nThe field of system identification is overwhelmingly extensive\
    \ owing to the decades of research that has led to the development of several\
    \ specialized techniques. Figure 1.5 gives an overview of some of the popular\
    \ methods and models that we will cover in this book. These models represent only\
    \ a subset of all the SysID models out there and this selection is based on our\
    \ experience regarding the relevance of these models for process systems modeling.\
    \ We largely focus on time-invariant², discrete-time models and these shown models\
    \ can help you handle a large majority of DPM problems you will encounter in process\
    \ industry.\n\n² Models where time variable does not appear as an explicit variable."
  - '[PAGE 25]


    ![](img/6cffacf6247d6f7caa7eacc348cef427_25_0.png)


    Figure 1.5: Some popular SysID methods and models covered in this book


    There are several noteworthy points in Figure 1.5. First, the apparent domination
    of linear models: you may have expected nonlinear models to be preferable for
    modeling complex industrial process systems, however, as it turns out, linear
    models are often justified for DPM. The justification stems from the fact that
    industrial processes often operate around an optimal point making the linear models
    pretty good approximation for usage in process control and process monitoring
    applications. If the end use of the model is process simulation or design where
    the system response over wide range of input variables is of interest, then nonlinear
    models can prove to be more suitable. Within linear category, different modeling
    options exist to cater to process systems with different characteristics, viz,
    multivariable outputs, presence of correlated noise, disturbances sharing dynamics
    with inputs, presence of measurement noise only, presence of drifts or non-stationarities,
    etc.


    The classification at the root of linear model sub-tree is based on the methodology
    used for model fitting. While PEM methods employ minimization of prediction errors,
    subspace methods are based on matrix algebra and do not involve any optimization
    for parameter optimization.³ Do not worry if these terms do not make much sense
    right now; they will soon become ‘obvious’ to you. If not trained about the nuanced
    differences between these different models and methods, you may not have much
    idea at the outset about which model would be the best one for your system. This
    book will help you gain adequate conceptual understanding to become adept at making
    the right choice and obtaining your coveted model quickly.


    ³ Another distinction is that PEM is used to obtain input-output models while
    SIM is used to obtain state-space models.'
  - '[PAGE 26]


    # Types of models


    In Eq. 1 we saw one way of representing a dynamic process model. The models from
    Figure 1.5 can be used to generate other representations of your dynamic systems;
    the figure below shows the different forms/types of models that we will learn
    to derive in this book using machine learning. We will also understand the pros
    and cons of these different model forms.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_26_0.png)


    Figure 1.6: Different forms of dynamic process model (that we will learn to generate
    in this book), their defining characteristics, and corresponding representative
    examples'
  - '[PAGE 27]


    # Why careful choice of model matters: A simple illustration


    Consider the shown process:


    ![](img/6cffacf6247d6f7caa7eacc348cef427_27_0.png)


    If not careful, you may just ignore the presence of measurement noise and attempt
    to fit the following input-output model to estimate the model parameters $a$ and
    $b$.


    **Fitted Model (ARX form):** $y(k+1) + a y(k) = b u(k)$


    Data file ‘simpleProcess.csv’ contains 1000 samples of $u$ and $y$ obtained from
    the true process. Below are the parameter estimates we get using this data,


    $\hat{a} = -0.6628 (\pm 0.016) , \hat{b} = 0.7174 (\pm 0.035)$


    values in bracket denote standard errors


    Two things are striking here: the estimates are grossly inaccurate, and the parameter
    error estimates seem to suggest high confidence in these wrong values! What went
    wrong in our approach? The reason is that the SNR (signal-to-noise ratio) value
    is not very high (data was generated with SNR ~ 10) and the fitted ARX model is
    wrong input-output form of the true process. The correct form would be the following


    **Correct input-output model**


    ![](img/6cffacf6247d6f7caa7eacc348cef427_27_1.png)


    Equation error is not white (as assumed in ARX model) but colored!


    Ignoring the presence of correlated equation error leads to biased (inaccurate)
    parameter estimates. Hopefully, this simple illustration has convinced you against
    blind application of ‘convenient’ models. Part II of this book will add several
    modeling tools to your ML-DPM arsenal to help avoid such modeling mistakes.'
- md: '## 1.4 Applications of DPM in Process Industry


    In Figure 1.1, we saw some of the applications of dynamic models in process industry.
    To provide further perspectives into how a typical plant operator or management
    may use these varied applications, Figure 1.7 juxtaposes DPM applications alongside
    the typical decision-making hierarchy in a process plant. Every step of plant
    operation is nowadays heavily reliant on DPM-based tools and machine learning
    has proven to be a useful vehicle for quickly building these tools. You can use
    the models from Figure 1.5 for building these tools or if you use commercial vendor
    solutions, you can find them employing these models in their products. For example,
    in the process control field, FIR models have been the bedrock of industrial MPC
    controllers. In the last few years, commercial vendors have inducted CVA models
    in their offering due to the advantages provided by subspace models. The latest
    offering by Aspen, DMC3⁴, incorporates neural networks for MPC and inferential
    modeling. ARX, BJ models are also used for industrial MPC⁵.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_28_0.png)


    ⁴ https://www.aspentech.com/en/products/msc/aspen-dmc3

    ⁵ Qin and Badgwell, A survey of industrial model predictive control technology.
    *Control Engineering Practice*, 2003


    - The regulatory control layer primarily comprises of (PID) control valves. Potential
    DPM applications may involve usage of soft-sensor for estimation of difficult-to-measure
    controlled variables.


    - The multivariable control layer usually consists of MPC and RTO modules. Here,
    dynamic models representing multivariable relationships between plant variables
    are used to ensure optimal operations of the plant. Another interesting application
    is development of operator training simulators (OTSs) for training plant operators.


    - The process diagnostics layer ensures timely fault detection and diagnostics.
    Here, process measurements can be compared against predictions from dynamic models
    to check for presence of process abnormalities.


    - The production scheduling layer has dynamic models to determine short-term optimal
    production schedules using forecasts of product demand and/or raw-material cost.


    This concludes our quick attempt to establish the connection between process industry,
    dynamic process modeling, and machine learning. It must now be obvious to you
    that modern process industry relies heavily on dynamic process modeling to achieve
    its objectives of reducing maintenance costs, and increasing productivity, reliability,
    safety, and product quality. ML-based DPM helps build tools quickly to facilitate
    achieving these objectives.


    This introductory chapter has also cautioned against blind application of ‘convenient’
    ML models for dynamic modeling. Your process data will throw several questions
    at you at each stage of system identification. No straightforward answers exist
    to these questions and only some time-tested guiding principles are available.
    While the rest of the book will familiarize you with these principles, the onus
    still lies on you to use your process insights and SysID understanding to make
    the right modeling choices. And yes, remember the age-old advice⁶, “All models
    are wrong, but some are useful.”


    ## Summary


    This chapter impressed upon you the importance of DPM in process industry and
    the role machine learning plays in it. We familiarized ourselves with the typical
    SysID workflow, explored its different tasks, and looked at different ML models
    available at our disposal for model identification. We also explored the application
    areas in process industry where ML has proved useful. In the next chapter we will
    take the first step and learn about the environment we will use to execute our
    Python scripts containing SysID code.


    # Chapter 2


    ## The Scripting Environment


    In the previous chapter we studied the various aspects of system identification
    and learned about its different uses in process industry. In this chapter we will
    quickly familiarize ourselves with the Python language and the scripting environment
    that we will use to write ML codes, execute them, and see results. This chapter
    won’t make you an expert in Python but will give you enough understanding of the
    language to get you started and help understand the several in-chapter code implementations
    in the upcoming chapters. If you already know the basics of Python, have a preferred
    code editor, and know the general structure of a typical SysID script, then you
    can skip to Chapter 3.


    If you skim through the system identification literature, you will find almost
    exclusive usage of MATLAB software as the computing environment. This is mostly
    attributed to the System Identification toolbox, a very powerful MATLAB toolbox
    developed by Prof. Lennart Ljung (a legend in system identification). Unfortunately,
    this tool is not freely available, and MATLAB is not yet as popular as Python
    among the ML community. Luckily, several good souls in the Python community have
    developed specialized libraries for all aspects of SysID. Most of the popular
    SysID models can now be generated using off-the-shelf Python libraries. Considering
    the dominance of Python for deep learning, Python becomes an excellent choice
    for SysID scripting.


    In the above context, we will cover the following topics to familiarize you to
    Python:


    - Introduction to Python language

    - Introduction to Spyder and Jupyter, two popular code editors

    - Overview of Python data structures and scientific computing libraries

    - Python libraries for system identification

    - Overview of a typical ML-DPM/SysID script


    ## 2.1 Introduction to Python


    Python is a high-level general-purpose computer programming language that can
    be used for application development and scientific computing. If you have used
    other computer languages like Visual Basic, C#, C++, Java, then you would understand
    the fact that Python is an interpreted and dynamic language. If not, then think
    of Python as just another name in the list of computer languages. What is more
    important is that Python offers several features that sets it apart from the rest
    of the pack making it the most preferred language for machine learning. Figure
    2.1 lists some of these features. Python provides all tools to conveniently carry
    out all steps of an ML-DPM project, namely, data collection, data exploration,
    data pre-processing, model ID, visualization, and solution deployment to end-users.
    In addition, freely available tools make writing Python code very easy⁷.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_32_0.png)


    ## Installing Python


    One can download official and latest version of Python from the *python.com* website.
    However, the most convenient way to install and use Python is to install Anaconda
    (*www.anaconda.com*) which is an open-source distribution of Python. Along with
    the core Python, Anaconda installs a lot of other useful packages. Anaconda comes
    with a GUI called Anaconda Navigator (Figure 2.2) from where you can launch several
    other tools.


    > ⁷ Most of the content of this chapter is similar to that in Chapter 2 of the
    book ‘Machine Learning in Python for Process Systems Engineering’ and have been
    re-produced with appropriate changes to maintain the standalone nature of this
    book.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_33_0.png)


    Figure 2.2: Anaconda Navigator GUI


    ## Running/Executing Python code


    Once Anaconda is installed, you can write your code in any text editor (like Notepad),
    save it in .py format, and then run via Anaconda command terminal. However, a
    convenient alternative is to use IDEs (integrated development environments). IDEs
    not just allow creating .py scripts, but also execute them on the fly, i.e., we
    can make code edits and see the results immediately, all within an integrated
    environment. Among the several available Python IDEs (PyCharm, VS Code, Spyder,
    etc.), we found Spyder to be the most convenient and functionality-rich, and therefore
    is discussed in the next section.


    Jupyter Notebooks are another very popular way of writing and executing Python
    code. These notebooks allow combining code, execution results, explanatory text,
    and multimedia resources in a single document. As you can imagine, this makes
    saving and sharing complete data analysis very easy.


    In the next section, we will provide you with enough familiarity on Spyder and
    Jupyter so that you can start using them.'
  mdcn: '## 1.4 DPM在过程工业中的应用


    在图1.1中，我们看到了动态模型在过程工业中的一些应用。为了进一步说明典型的工厂操作员或管理人员如何使用这些多样化的应用，图1.7将DPM应用与过程工厂中典型的决策层级并列展示。如今，工厂操作的每一步都严重依赖于基于DPM的工具，而机器学习已被证明是快速构建这些工具的有效途径。你可以使用图1.5中的模型来构建这些工具，或者如果你使用商业供应商的解决方案，你会发现他们在产品中采用了这些模型。例如，在过程控制领域，FIR模型一直是工业MPC控制器的基石。在过去几年中，商业供应商因其提供的优势而将CVA模型纳入其产品中。Aspen的最新产品DMC3⁴，将神经网络用于MPC和推断建模。ARX、BJ模型也用于工业MPC⁵。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_28_0.png)


    ⁴ https://www.aspentech.com/en/products/msc/aspen-dmc3

    ⁵ Qin and Badgwell, A survey of industrial model predictive control technology.
    *Control Engineering Practice*, 2003


    -   基础控制层主要由（PID）控制阀组成。潜在的DPM应用可能涉及使用软传感器来估计难以测量的受控变量。


    -   多变量控制层通常由MPC和RTO模块组成。在这里，代表工厂变量之间多变量关系的动态模型被用于确保工厂的最佳运行。另一个有趣的应用是开发操作员培训模拟器（OTSs）来培训工厂操作员。


    -   过程诊断层确保及时的故障检测和诊断。在这里，过程测量值可以与动态模型的预测值进行比较，以检查是否存在过程异常。


    -   生产调度层拥有动态模型，利用产品需求和/或原材料成本的预测来确定短期最优生产计划。


    至此，我们快速尝试建立了过程工业、动态过程建模和机器学习之间的联系。现在你应该清楚，现代过程工业严重依赖动态过程建模来实现其降低维护成本、提高生产率、可靠性、安全性和产品质量的目标。基于ML的DPM有助于快速构建工具，以促进实现这些目标。


    本导论章节也告诫了盲目应用“便捷”的ML模型进行动态建模。你的过程数据将在系统辨识的每个阶段向你提出几个问题。这些问题没有直接的答案，只有一些经过时间考验的指导原则可用。虽然本书的其余部分将使你熟悉这些原则，但责任仍然在于你，需要运用你的过程洞察力和SysID理解来做出正确的建模选择。是的，记住那句古老的建议⁶：“所有模型都是错的，但有些是有用的。”


    ## 本章小结


    本章向你强调了DPM在过程工业中的重要性以及机器学习在其中扮演的角色。我们熟悉了典型的SysID工作流程，探讨了其不同的任务，并审视了可用于模型辨识的不同ML模型。我们还探讨了ML在过程工业中被证明有用的应用领域。在下一章中，我们将迈出第一步，了解我们将用于执行包含SysID代码的Python脚本的环境。


    # 第2章


    ## 脚本环境


    在上一章中，我们研究了系统辨识的各个方面，并了解了其在过程工业中的不同用途。在本章中，我们将快速熟悉Python语言以及我们将用于编写ML代码、执行它们并查看结果的脚本环境。本章不会让你成为Python专家，但会让你对这门语言有足够的理解，以便入门并帮助理解后续章节中的多个章节内代码实现。如果你已经了解Python的基础知识，有首选的代码编辑器，并且知道典型SysID脚本的一般结构，那么你可以直接跳到第3章。


    如果你浏览系统辨识文献，你会发现几乎完全使用MATLAB软件作为计算环境。这主要归功于系统辨识工具箱，这是由Lennart Ljung教授（系统辨识领域的传奇人物）开发的一个非常强大的MATLAB工具箱。不幸的是，这个工具不是免费提供的，而且MATLAB在ML社区中还没有像Python那样普及。幸运的是，Python社区中有许多好心人已经为SysID的各个方面开发了专门的库。大多数流行的SysID模型现在都可以使用现成的Python库生成。考虑到Python在深度学习领域的主导地位，Python成为SysID脚本编写的绝佳选择。


    在上述背景下，我们将涵盖以下主题，以使你熟悉Python：


    -   Python语言简介

    -   Spyder和Jupyter简介，这两款流行的代码编辑器

    -   Python数据结构和科学计算库概述

    -   用于系统辨识的Python库

    -   典型的ML-DPM/SysID脚本概述


    ## 2.1 Python简介


    Python是一种高级通用计算机编程语言，可用于应用开发和科学计算。如果你使用过其他计算机语言，如Visual Basic、C#、C++、Java，那么你会理解Python是一种解释型和动态语言。如果没有，那么可以将Python视为计算机语言列表中的另一个名字。更重要的是，Python提供了几个特性，使其与其他语言区分开来，成为机器学习的首选语言。图2.1列出了其中一些特性。Python提供了所有工具，可以方便地执行ML-DPM项目的所有步骤，即数据收集、数据探索、数据预处理、模型辨识、可视化和向最终用户的解决方案部署。此外，免费可用的工具使编写Python代码变得非常容易⁷。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_32_0.png)


    ## 安装Python


    可以从*python.com*网站下载官方最新版本的Python。然而，安装和使用Python最方便的方法是安装Anaconda（*www.anaconda.com*），这是一个开源的Python发行版。除了核心Python，Anaconda还安装了许多其他有用的包。Anaconda附带一个名为Anaconda
    Navigator的GUI（图2.2），你可以从中启动其他几个工具。


    > ⁷ 本章的大部分内容与《Machine Learning in Python for Process Systems Engineering》一书的第2章内容相似，并已进行适当修改以保持本书的独立性。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_33_0.png)


    图2.2：Anaconda Navigator GUI


    ## 运行/执行Python代码


    安装Anaconda后，你可以在任何文本编辑器（如Notepad）中编写代码，将其保存为.py格式，然后通过Anaconda命令终端运行。然而，一个方便的替代方法是使用IDE（集成开发环境）。IDE不仅允许创建.py脚本，还可以即时执行它们，即我们可以在集成环境中进行代码编辑并立即查看结果。在众多可用的Python
    IDE（PyCharm、VS Code、Spyder等）中，我们发现Spyder是最方便且功能丰富的，因此将在下一节中讨论。


    Jupyter Notebooks是编写和执行Python代码的另一种非常流行的方式。这些笔记本允许将代码、执行结果、解释性文本和多媒体资源组合在一个文档中。正如你可以想象的，这使得保存和共享完整的数据分析变得非常容易。


    在下一节中，我们将为你提供足够的Spyder和Jupyter知识，以便你可以开始使用它们。'

  md: '# Equivalence between AR and MA models


    AR and MA models may appear to be very different, but, under some conditions,
    they are inter-convertible. Any stationary AR model can be rewritten as an MA(∞)
    model and any invertible (definition of invertibility will be provided soon) MA
    model can be equivalently rewritten as an AR(∞) model. For example, consider the
    MA(1) model $y(k) = c_1e(k-1) + e(k)$, which can be rewritten as


    $y(k) = c_1(y(k-1) - c_1e(k-2)) + e(k)$

    $= c_1y(k-1) - c_1^2e(k-2) + e(k)$


    $\vdots$ after repeated substitutions


    AR(∞) model! $y(k) = -\sum_{j=1}^{\infty} (-c_1)^j y(k-j) + e(k)$ eq. 5


    > An alternative and quicker derivation:

    $y(k) = (1 + c_1q^{-1})e(k)$

    $\Rightarrow (1 + c_1q^{-1})^{-1}y(k) = e(k)$ using polynomial long division

    $\Rightarrow (\sum_{j=0}^{\infty} (-c_1)^j q^{-j})y(k) = e(k)$


    Note that Eq. 5 represents a valid/sensible model only if $|c_1| < 1$ (otherwise
    $c_1^j$ grows unbounded). This is also the condition of invertibility for a MA(1)
    model. An AR(1) model can be rewritten as MA(∞) model via recursive substitution
    of $y(k-1)$, $y(k-2)$, and so on.


    ACF/PACF plots may sometime suggest both AR and MA models as adequate representations
    of the underlying process. Given the equivalence between the two class of models,
    you can choose either. Just keep a note that while AR parameters are easy to estimate,
    MA model may be more parsimonious (i.e., require much fewer parameters).'
  merge: -1

    In this example we will utilize a given a time series generated from the following
    process. With guidance from the graphical plots and ADF test, we will infer the
    correct model orders. Thereafter, an ARIMA model will be fitted to find the model
    parameters.


    $$(1 - q^{-1})y(k) = \frac{1 - 0.7q^{-1}}{1 - 0.5q^{-1}} e(k)$$


    Note that packages like *pmdarima* exist which can be used to automatically estimate
    the order of differencing and the AR/MA orders.


    ```

    # import packages and read data

    import numpy as np, matplotlib.pyplot as plt

    from statsmodels.tsa.arima.model import ARIMA

    y = np.loadtxt(''ARIMA_data.txt'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_113_0.png)


    The correlation plots and the ADF test clearly indicate the presence of unit-root.
    Therefore, we know that differencing is required atleast once. Let''s check the
    ACF and PACF plots of the difference signal.



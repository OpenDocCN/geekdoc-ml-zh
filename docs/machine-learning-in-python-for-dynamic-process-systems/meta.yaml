    classical dynamic modeling of input-output systems. Below are a few remarks regarding
    the installation of the package


    +   - The package code can be downloaded from its GitHub repository. You may put
    the ‘sippy’ folder provided in the package’s distribution in your working directory
    to use the provided models

    - To run the code provided in this book, Slycot package is not required

    - Control package’s version should be < 0.9 (https://github.com/CPCLAB-UNIPI/SIPPY/issues/48)'

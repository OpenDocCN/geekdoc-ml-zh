- md: '## 2.5 SysID-relevant Python Libraries


    In the previous chapter we saw several dynamic modeling options for SysID. We
    also saw some of the pre-processing steps involved in data preparation and in
    the subsequent residual assessment step. Technically, one can employ the previously
    described scientific packages to implement the SysID algorithms, but it can be
    cumbersome and inconvenient. Fortunately, the Python user-community has made available
    several libraries that make implementation of the SysID algorithms very convenient.
    Figure 2.5 shows some of these libraries.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_47_0.png)


    You will find us using these packages heavily in the upcoming chapters. We understand
    that many of the terms in the above figure may be alien to you right now, but
    we figured that it would be good to give you a ‘feel’ of what Python has to offer
    for SysID.


    > Note that we did not include the celebrated Sklearn library in Figure 2.5 that
    offers several generic ML-related functionalities such as dataset splitting, standardization,
    scoring, etc. Our SysID scripts will make extensive use of Sklearn library as
    well.


    The concluding message is that Python provides most of the tools for SysID that
    you may find in other languages such as R and MATLAB.


    ## 2.6 Typical SysID Script


    In Figure 1.4 in Chapter 1, we graphically portrayed different stages of a SysID
    exercise. Let’s now see what a typical SysID script looks like. You will also
    understand how Python, NumPy, and advanced packages are utilized for ML-DPM scripting.
    We will study several SysID aspects in much greater detail in the next few chapters,
    but this simple script is a good start. The objective of this simple script is
    to take data for an input and an output variable from a file and build an ARX
    model between them. The first few code lines take care of importing the libraries
    that the script will employ.


    ```python

    # import packages

    from sippy import system_identification

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.preprocessing import StandardScaler

    from sklearn.metrics import r2_score

    from statsmodels.graphics.tsaplots import plot_acf

    ```


    We studied NumPy before. SIPPY, Sklearn, and Statsmodels were introduced in previous
    section. Another library¹¹ that we see here is matplotlib¹² which is used for
    creating visualization plots. The next few lines of code fetch raw data and mean-center
    them.


    ```python

    # fetch data

    data = np.loadtxt(''InputOutputData.txt'')

    u = data[:,2:]; y = data[:,1:2] # first column is timestamp


    # mean-center (pre-process) model variables

    u_scaler = StandardScaler(with_std=False)

    u_centered = u_scaler.fit_transform(u)

    y_scaler = StandardScaler(with_std=False)

    y_centered = y_scaler.fit_transform(y)

    ```


    ¹¹ If any package/library that you need is not installed on your machine, you
    can get it by running the command pip install <package-name> on Spyder console

    ¹² Seaborn is another popular library for creating nice-looking plots


    Here NumPy''s loadtxt function is used to read space-separated data in the file
    InputOutputData.txt. The data get stored in a 2D NumPy array, *data*, where the
    2nd and 3rd columns contain data for the output and input variables, respectively.
    NumPy slicing is used to separate the *u* and *y* data. Thereafter, variables
    are pre-processed to mean-center them. Next, an ARX model[^13] is fitted and used
    to make predictions.


    ```python

    # fit ARX model and compare training predictions vs observations

    ld_ARX = system_identification(y_centered, u_centered, ''ARX'', ARX_orders=[3,3,2])

    y_centered_pred = np.transpose(ld_ARX.Yid) # Yid gives predictions during identification

    ```


    **fitted model** $\rightarrow$ $y(k) - 0.98y(k-1) + 0.02y(k-2) + 0.12y(k-3) =
    0.02u(k-1) + 0.06u(k-2) + 0.07u(k-3)$


    ```python

    plt.figure()

    plt.plot(y_centered, ''o'', label=''raw data'')

    plt.plot(y_centered_pred, ''--'', label=''ARX fit'')

    plt.legend(), plt.xlabel(''k''), plt.ylabel(''y'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_49_0.png)


    In the last step, model quality assessment is done.


    ```python

    # Assess model accuracy

    print(''Fit accuracy = '', r2_score(y_centered, y_centered_pred))

    >>> Fit accuracy = 0.998


    # plot ACF of model residuals

    res = y_centered - y_centered_pred

    plot_acf(res, lags=50)

    plt.xlabel(''lag'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_49_1.png)


    The residual plot suggests that further model refinement is warranted. In the
    later chapters, we will learn how this inference has been made and what recourses
    are at our disposal for model refinement.


    > [^13] SIPPY: Model coefficients can be obtained via the *G* (or NUMERATOR and
    DENOMINATOR) attribute(s) of the model object. See SIPPY''s manual for more details.


    Although there are many more advanced ML and SysID aspects, the above code is
    very representative of what goes in a ML-DPM script. Hopefully, you also got a
    feel of the powerful capabilities of the Sklearn and SIPPY libraries that help
    to encapsulate complex ML algorithms within user-friendly functions.


    ## Summary


    In this chapter we made ourselves familiar with the scripting environment that
    we will use for writing and executing ML scripts. We looked at two popular IDEs
    for Python scripting, the basics of Python language, and learnt how to manipulate
    data using NumPy and Pandas. We also looked at SysID-relevant libraries available
    in Python and saw what a typical SysID Python script may look like. In the next
    chapter you will learn several graphical tools that are utilized for preliminary
    investigation and visualization of dynamic dataset.


    # Chapter 3

    ## Exploratory Analysis and Visualization of Dynamic Dataset: Graphical Tools


    In Chapter 1 we had remarked that system identification is an art. A part of the
    art lies in making right inferences from exploratory analysis of data and model
    residuals via visual plots. Yeah, you read that right: even with all the fancy
    algorithms at our disposal, sometimes visual inspection of data is still the best
    tool for a quick assessment of dataset and model validity. Visual plotting can
    often provide crucial clues about model structure and model troubleshooting, and
    forms an important component of deductive phase of SysID. These plots will be
    used repeatedly in the in-chapter illustrations in this book and therefore we
    thought it would be best to introduce the concepts behind these graphical tools
    right away.


    Visual plots can range from simple time plots to advanced spectral density plots.
    These may help us make some quick educated judgement about data stationarity,
    deterministic vs stochastic trends, presence of colored noise, whiteness of model
    residuals, etc. Don''t worry if you don''t understand these dynamic modeling-specific
    jargons for now. We will focus on generation and conceptual understanding of these
    plots in this chapter and learn inference-making using these plots in the later
    chapters.


    Specifically, we will cover these topics


    - Autocorrelation and autocovariance plots

    - Partial autocorrelation plots

    - Cross-correlation and cross-covariance plots

    - Spectrum, spectral density plots, periodogram'
  mdcn: '## 2.5 与系统辨识相关的 Python 库


    在上一章中，我们了解了几种用于系统辨识的动态建模方法。我们也看到了数据准备和后续残差评估步骤中涉及的一些预处理流程。从技术上讲，可以使用前面描述的科学计算包来实现系统辨识算法，但这可能既繁琐又不便。幸运的是，Python
    用户社区提供了多个库，使得实现系统辨识算法变得非常便捷。图 2.5 展示了其中一些库。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_47_0.png)


    你将发现我们在接下来的章节中会大量使用这些包。我们理解上图中的许多术语现在对你来说可能还很陌生，但我们认为让你对 Python 在系统辨识方面能提供什么有个‘感觉’是件好事。


    > 请注意，我们在图 2.5 中没有包含著名的 Sklearn 库，该库提供了许多通用的机器学习相关功能，如数据集划分、标准化、评分等。我们的系统辨识脚本也将广泛使用
    Sklearn 库。


    最后要传达的信息是，Python 提供了大多数你在其他语言（如 R 和 MATLAB）中能找到的系统辨识工具。


    ## 2.6 典型的系统辨识脚本


    在第 1 章的图 1.4 中，我们以图形方式描绘了系统辨识练习的不同阶段。现在让我们看看一个典型的系统辨识脚本是什么样子。你也将了解如何利用 Python、NumPy
    和高级包进行机器学习动态过程建模脚本编写。我们将在接下来的几章中更详细地研究系统辨识的多个方面，但这个简单的脚本是一个良好的开端。这个简单脚本的目标是从文件中获取一个输入变量和一个输出变量的数据，并在它们之间建立一个
    ARX 模型。前几行代码负责导入脚本将使用的库。


    ```python

    # import packages

    from sippy import system_identification

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.preprocessing import StandardScaler

    from sklearn.metrics import r2_score

    from statsmodels.graphics.tsaplots import plot_acf

    ```


    我们之前研究过 NumPy。SIPPY、Sklearn 和 Statsmodels 在上一节中已经介绍过。我们在这里看到的另一个库¹¹ 是 matplotlib¹²，它用于创建可视化图表。接下来的几行代码获取原始数据并对其进行均值中心化处理。


    ```python

    # fetch data

    data = np.loadtxt(''InputOutputData.txt'')

    u = data[:,2:]; y = data[:,1:2] # first column is timestamp


    # mean-center (pre-process) model variables

    u_scaler = StandardScaler(with_std=False)

    u_centered = u_scaler.fit_transform(u)

    y_scaler = StandardScaler(with_std=False)

    y_centered = y_scaler.fit_transform(y)

    ```


    ¹¹ 如果你的机器上没有安装任何需要的包/库，你可以在 Spyder 控制台运行命令 `pip install <package-name>` 来获取它。

    ¹² Seaborn 是另一个用于创建精美图表的流行库。


    这里使用 NumPy 的 loadtxt 函数读取文件 InputOutputData.txt 中以空格分隔的数据。数据存储在一个二维 NumPy 数组 *data*
    中，其中第 2 列和第 3 列分别包含输出变量和输入变量的数据。使用 NumPy 切片来分离 *u* 和 *y* 数据。之后，对变量进行预处理以进行均值中心化。接下来，拟合一个
    ARX 模型[^13] 并用于进行预测。


    ```python

    # fit ARX model and compare training predictions vs observations

    ld_ARX = system_identification(y_centered, u_centered, ''ARX'', ARX_orders=[3,3,2])

    y_centered_pred = np.transpose(ld_ARX.Yid) # Yid gives predictions during identification

    ```


    **拟合模型** $\rightarrow$ $y(k) - 0.98y(k-1) + 0.02y(k-2) + 0.12y(k-3) = 0.02u(k-1)
    + 0.06u(k-2) + 0.07u(k-3)$


    ```python

    plt.figure()

    plt.plot(y_centered, ''o'', label=''raw data'')


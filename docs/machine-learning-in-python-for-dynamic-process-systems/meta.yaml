  md: '# Vanilla RNN cell vs GRU cell vs LSTM cell


    There is another popular variant of RNN cell, called GRU cell. As shown in the
    illustration below, GRU cell is simpler than LSTM cell. GRU cell has 3 neural
    layers and its internal state is represented using a single vector, $h_{(t)}$.
    For several common tasks, GRU cell-based RNN seems to provide similar performance
    as LSTM cell-based RNN and therefore, it is slowly gaining more popularity.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_201_0.png)


    # 10.4 Modeling Heat Exchangers using LSTM


    To show how to train a LSTM network, we will re-use the heat-exchanger dataset.
    We will also use *early stopping* to optimize the number of *epochs* using validation
    dataset.


    ```

    # read data

    u_fit = u[:3000,0:1]; u_val = u[3000:,0:1]

    y_fit = y[:3000,0:1]; y_val = y[3000:,0:1]


    # scale data before model fitting

    u_scaler = StandardScaler()

    u_fit_scaled = u_scaler.fit_transform(u_fit); u_val_scaled = u_scaler.transform(u_val)

    y_scaler = StandardScaler()

    y_fit_scaled = y_scaler.fit_transform(y_fit); y_val_scaled = y_scaler.transform(y_val)


    X_fit_scaled = np.hstack((u_fit_scaled, y_fit_scaled)) # @ Figure 10.4

    X_val_scaled = np.hstack((u_val_scaled, y_val_scaled))

    ```'

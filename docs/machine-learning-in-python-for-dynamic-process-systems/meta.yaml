  md: '# 7.5 Box-Jenkins Models: An Introduction


    Box-Jenkins (BJ) model relaxes the restriction of (common $A(q^{-1})$ polynomial
    in $G$ and $H$ operators in) ARMAX model and uses disturbance signal dynamics
    completely different from the deterministic dynamics. As shown in Figure 7.6,
    $G$ and $H$ operators are independently parameterized which ensures unbiased deterministic
    model estimation. Expectedly, the model expressions are more complex and requires
    specification of 5 hyperparameters, vis-a-vis, $n_a$, $n_b$, $n_c$, $n_d$, $d$.
    Moreover, nonlinear optimization is required for model fitting. Let''s see a quick
    example of modeling an industrial gas-furnace system via BJ model.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_147_0.png)'
  merge: -1

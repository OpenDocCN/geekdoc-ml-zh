    # # Chapter 4


    # ## Machine Learning-based Dynamic Modeling: Workflow and Best Practices


    In Figure 1.4 in Chapter 1 we looked at a typical workflow for system identification.
    What is noteworthy is that while model ID is only a part of this workflow, very
    often too much focus goes into application of model ID to estimate model parameters
    at the expense of other aspects of SysID. Dumping raw data into model ID module
    will invariably generate unsatisfactory model if data is not pre-treated appropriately.
    Additionally, you will seldom be right in your modeling choices in the very first
    attempt. The take-home message is that knowledge about how to prepare raw data
    to enhance its information content about the system, how to assess validity of
    obtained model, how to analyze modeling results critically, and how to iterate
    judiciously is absolutely critical for successful SysID. Fortunately, several
    guidelines and best practices have been devised to guide a process modeler at
    each step of the SysID workflow. We will learn these guidelines and best practices
    in this chapter.


    We will not cover the best practices associated with generic machine learning
    workflow. Concepts like feature extraction, feature engineering, cross-validation,
    regularization, etc. have already been covered in detail in our first book of
    the series. In this chapter our focus will be on the unique challenges presented
    by dynamic processes and the specific best practices to deal with them. Specifically,
    the following topics are covered


    +   - Identification test design using PRBS and GBN signals

    - Pre-treatment of raw data for removal of measurement noise, offsets, trends,
    and drifts

    - Guidelines around selection of model structure

    - Model order selection via AIC and cross-validation

    - Model quality assessment via residual analysis, simulation response analysis,

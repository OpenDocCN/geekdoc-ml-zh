  md: '# # 4.1 System Identification Workflow


    So far in this book we have been consciously emphasizing the difference between
    model identification and system identification. While model ID is all about estimating
    model parameters, SysID is about ensuring that the model truly represents the
    underlying system and stands consistent w.r.t. any prior available knowledge and
    any modeling assumptions. Figure 4.1 reproduces the SysID workflow we had seen
    in Chapter 1 and shows the several steps that serve to achieve the stated goals.
    The rest of the chapter will sensitize you about these varied aspects of SysID
    and help you gain working-level understanding about how to successfully execute
    a SysID project.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_65_0.png)


    Figure 4.1: Typical steps in a SysID workflow that we will cover in this chapter


    The first step of the workflow is data collection. Whether you are using pre-existing
    historical data or conducting fresh identification tests, you must ensure that
    the dataset has enough ‘juice’ in it to enable identification of the desired model.
    We will soon see some guidelines around this task. The next step corresponds to
    sanitizing the data to remove the unwanted components that can negatively impact
    model ID. For example, elimination of any slow drift in the output signals is
    essential to avoid incorrect model parameters. After the first two steps, our
    dataset is ready and we come to model structure selection where the onus is on
    the process modeler to choose the right class of process and noise models. We
    saw in Chapter 1 that an incorrect choice can lead to biased parameters estimates.
    Your expert domain knowledge and any prior information on process disturbances
    can come in quite handy at this'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'step. For example, this is the step where you make a decision between ARX versus
    ARMAX, or ANN versus CVA models. A generic thumb rule is to start with a simple
    model (like AR, ARX) and then use inferences from model diagnostics to shortlist
    the next candidate model(s).


    Once a model''s selection has been made, the model parameters can be estimated
    using off-the-shelf Python packages. These packages also include functionalities
    for automatic selection of optimal model order, e.g., the number of auto-regressive
    terms in an ARX model. The estimated model must always undergo extensive check
    to ensure that the model is right for your process system and is consistent with
    the modeling assumptions and prior process knowledge. We will learn about several
    of these model quality checks later in the chapter. Any model deficiency encountered
    will necessitate appropriate correction and another pass-through the whole workflow.
    Let''s now learn about each of these tasks one-by-one.


    # 4.2 Identification Test/Input Signal Design


    The first and foremost requirement for a successful model ID is that the model
    training data (whether historical or newly generated) must be informative. The
    traditional practice for fresh data collection as observed in industry (especially
    for model development for control purposes) is to induce step changes in each
    input separately and record the step responses. Figure 4.2 shows an example. While
    these step tests are simple enough to be understood by plant operators and provide
    good information on steady-state behavior of the process, there are several shortcomings.
    When the process has several inputs, the step tests take a lot of time and manpower.
    Moreover, step tests are known to not excite all the plant dynamics significantly
    and therefore the risk of inaccurate model ID is high.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_66_0.png)'
  merge: -1
  pgno: 66
- img_proc: true
  md: 'The ideal identification test²¹ input signals should show a lot of fluctuations
    or excitations. Let''s study two such signals, namely, PRBS and GBN.


    # Persistent Excitation


    Consider the following process


    $$y(k) = b_1u(k-1) + b_2u(k-2) + b_3u(k-3) + b_4u(k-4) + e(k)$$


    Suppose that the input signal is hypothetically of the form $u(k) = u(k-1) + 1$.
    Under such an input signal, the process can be re-written as


    $$y(k) = b_1u(k-1) + b_2u(k-1) - b_2 + b_3u(k-1) - 2b_3 + b_4u(k-1) - 3b_4 + e(k)$$

    $$= b''_1u(k-1) + b_0$$


    The above derivation implies that the process behaves virtually like a two-parameter
    system and therefore the four original model parameters can''t be uniquely determined
    with output data collected with the aforementioned input signal. In other words,
    the true process model is not identifiable due to non-informative data. To ensure
    identifiability, the input variables must be sufficiently excited. Mathematically,
    a discrete-time input signal $u(k)$ is said to be persistently exciting of order
    $n$ (required to uniquely identify a PEM model with $\le n$ model parameters)
    if the following conditions are met


    The following limit exists


    The following matrix is invertible


    $$r_u(\tau) = \lim_{N \to \infty} \frac{1}{N} \sum_{t=0}^{N} u_{t+\tau} u_t$$


    $$R_u(n) = \begin{bmatrix} r_u(0) & r_u(1) & \cdots & r_u(n-1) \ r_u(-1) & r_u(0)
    & \cdots & r_u(n-2) \ \vdots & \vdots & \ddots & \vdots \ r_u(1-n) & r_u(2-n)
    & \cdots & r_u(0) \end{bmatrix}$$


    You will mostly not use these theoretical conditions directly, but it''s worthwhile
    to know these: a step input has persistent excitation (p.e.) of order 1; a full
    length PRBS has p.e. of order $M$; a GBN signal and a white noise signal are persistently
    exciting with any finite order. Alternatively, in frequency domain, $u(k)$ is
    persistently exciting of order $n$ if its spectral density is not zero at $n$
    points in the interval $(-\pi, \pi]$.'
  merge: -1
  pgno: 67

  md: '# Shift operator and transfer function operator


    The original form of the difference equations that we have worked with so far
    is not very convenient when combining different models and analyzing model properties.
    For a more compact and useful representation, the concept of backshift operator
    ($q^{-1}$) is introduced. It is defined as


    $$y(k-1) = q^{-1}y(k)$$


    Evidently, the backshift operator moves the signal one step back. Multiple applications
    shift the signal back further


    $$q^{-1}(q^{-1}y(k)) = q^{-2}y(k) = y(k-2)$$


    Let''s rewrite Eq. 1 using the shift operator as follows


    $$y(k) + \sum_{j=1}^{p} a_j y(k-j) = e(k)$$

    $$\Rightarrow y(k) + (\sum_{j=1}^{p} a_j q^{-j})y(k) = e(k)$$

    $$\Rightarrow (1 + \sum_{j=1}^{p} a_j q^{-j})y(k) = e(k)$$

    $$\Rightarrow y(k) = \frac{1}{(1+\sum_{j=1}^{p} a_j q^{-j})} e(k) \equiv H(q^{-1})e(k)$$


    Let''s see how we would represent a simple ARX model $y(k) + a_1 y(k-1) + a_2
    y(k-2) = b_1 u(k-1) + b_2 u(k-2) + e(k)$ using the $q$ notation


    $$(1 + a_1 q^{-1} + a_2 q^{-2})y(k) = q^{-1}(b_1 + b_2 q^{-1})u(k) + e(k)$$

    $$\Rightarrow y(k) = G(q^{-1})u(k) + H(q^{-1})e(k)$$


    $$\frac{q^{-1}(b_1 + b_2 q^{-1})}{1 + a_1 q^{-1} + a_2 q^{-2}}$$

    $$\frac{1}{1 + a_1 q^{-1} + a_2 q^{-2}}$$


    Note that $G(q^{-1})$ and $H(q^{-1})$ are (input and noise transfer) operators
    (and not multipliers) that operate on $u(k)$ and $e(k)$, respectively, and determine
    how the incoming signals are ''transferred'' to the output. Therefore, $G(q^{-1})$
    and $H(q^{-1})$ are called transfer operators. Equation 2 can be written further
    as


    $$y(k) = y_u(k) + v(k)$$


    deterministic output

    disturbance signal'
  merge: -1
  pgno: 97
- img_proc: true
  md: '> where, $y_u(k) = G(q^{-1})u(k)$

    $v(k) = H(q^{-1})e(k)$


    Note that Eq. 3 clearly shows that in an ARX model, the process disturbance $v(k)$
    is a colored signal and not a white noise ($e(k)$). It is evident, therefore,
    that the transfer operator form makes it easy to dissect the stochastic and deterministic
    parts of the model.


    The $q$ notation may not seem appealing to you immediately, but soon enough you
    will begin to appreciate the convenience it offers! For now, just note that $G(q^{-1})$
    and $H(q^{-1})$ can be manipulated like polynomials of $q^{-1}$ as you will soon
    see.


    # 5.3 Moving Average (MA) Models: An Introduction


    In MA models the current state is a summation of current and past white noise
    error values as shown below


    $y(k) = c_1e(k-1) + c_2e(k-2) \cdots + c_re(k-r) + e(k)$

    $= \sum_{j=1}^r c_je(k-j) + e(k)$

    $= (1 + \sum_{j=1}^r c_jq^{-j})e(k)$


    The above model is referred to as an MA(r) model. An MA model can be interpreted
    as a counterpart of FIR models for time series signals where the effect of past
    random shocks/noise are propagated directly to future values of the time series.
    Plots below provide a sample of the patterns generated from MA models.'
  merge: -1
  pgno: 98

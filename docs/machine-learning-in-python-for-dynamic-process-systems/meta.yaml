    \n![](img/6cffacf6247d6f7caa7eacc348cef427_171_0.png)\n\n图8.7：通过CVA进行过程监控的完整工作流程\n\
    \n## 状态空间模型与ARMAX模型的等价性\n\n尽管状态空间模型和输入输出模型看起来可能非常不同，但它们是相关的！给定任何状态空间模型，都可以确定一个等效的ARMAX模型，*反之亦然*。因此，其他线性结构如ARX或OE也可以重写为状态空间模型。\n\
    \n**单输入单输出（SISO）I/O差分方程形式到状态空间（SS）形式**\n\n**状态空间形式到传递算子形式**\n\n考虑\n\n$y(k) + a_1\
    \ y(k-1) + \\cdots + a_{n_a} y(k-n) = b_1 u(k-1) + \\cdots + b_{n_b} u(k-n)$\n\
    \n$\\Downarrow$ 等价\n\n$x(k+1) = Ax(k) + Bu(k)$\n\n$y(k) = Cx(k)$\n\n其中，$x(k) \\\
    in \\mathbb{R}^{n \\times 1}, C = [1, 0, \\dots, 0]$\n\n$B = \\begin{bmatrix}\
    \ b_1 \\\\ b_2 \\\\ \\vdots \\\\ b_n \\end{bmatrix}, \\quad A = \\begin{bmatrix}\
    \ -a_1 & 1 & 0 & \\cdots & 0 \\\\ -a_2 & 0 & 1 & \\cdots & 0 \\\\ \\vdots & \\\
    vdots & \\vdots & \\ddots & 1 \\\\ -a_n & 0 & 0 & \\cdots & 0 \\end{bmatrix}$\n\
    \n考虑\n\n$x(k+1) = Ax(k) + Bu(k)$\n\n$y(k) = Cx(k) + Du(k)$\n\n$\\Downarrow$ 使用移位算子\n\
    \n$qx(k) = Ax(k) + Bu(k)$\n\n$\\Rightarrow (qI - A)x(k) = Bu(k)$\n\n$\\Rightarrow\
    \ x(k) = (qI - A)^{-1}Bu(k)$\n\n$\\Rightarrow y(k) = [C(qI - A)^{-1}B + D]u(k)$\n\
    \n$G(q)$\n\n尽管如此，我们在本章中已经看到，与ARMAX模型相比，状态空间模型具有一些显著优势，例如不需要*先验*参数化（即，无需预先指定所有输入的延迟和阶数），并且使用稳健的SVD计算进行模型拟合。\n\
    \n希望本章已经充分向您展示了CVA的强大功能。由于其有利的特性，CVA是Aspen的DMCplus软件$^{73}$中提供的SysID方法之一也就不足为奇了。至此，我们完成了对MIMO动态过程建模世界的简要探索。请注意，我们只是触及了SIM和CVA浩瀚文献的皮毛。我们希望您已经充分理解了CVA的工作原理，并有信心使用它来构建预测和监控工具。您现在拥有了处理SISO和MIMO线性系统的所有工具。接下来，我们将放宽线性限制，并在下一章学习如何处理非线性过程。\n\
    \n## 总结\n\n在本章中，我们研究了状态空间模型，并看到了与输入输出模型相比，它如何提供对内部过程动态的更多见解。为了拟合状态空间模型，我们研究了子空间辨识技术，重点是CVA模型。通过几个工业规模的案例研究，我们学习了如何构建用于过程控制和过程监控的动态模型。在下一章中，我们将看到一些用于建模非线性过程的经典技术。\n\
    \n# 第9章\n## 非线性系统辨识：超越线性模型\n\n在前面的章节中，我们将注意力限制在线性过程上。然而，大多数工业过程仅在有限的操作条件下表现出线性行为。如果寻求复杂过程（如高纯度蒸馏、pH中和、聚合等）的全局模型，那么非线性的“恶魔”就会不经意地浮现出来。毫不夸张地说，非线性在过程工业中不是例外，而是常态。如果您总是忍不住求助于人工神经网络结构，我们也不会感到惊讶，因为这些结构如今已成为非线性建模的代名词。然而，存在一些更简单、更经典且同样强大的非线性模型结构，它们更具可解释性。我们将在本章中探讨这些模型。\n\
    \n非线性模型可以是强大的工具，但使用它们需要付出一定的代价。这些代价包括对训练数据变异性要求更高（这意味着更费力的实验设计）、更复杂的模型选择过程以及计算更密集的参数估计。因此，使用非线性模型的决定应审慎做出。如果您确实决定继续，那么本章涵盖的概念可能会对您大有帮助。具体来说，将涵盖以下主题\n\
    \n- NARX模型简介\n- 使用NARX模型对换热器过程进行建模\n- 块结构模型简介，特别是Hammerstein模型和Wiener模型\n\n##\
    \ 9.1 非线性系统辨识：简介\n\n当需要在广泛的操作条件下进行准确预测时，非线性SysID就成了一种必要的“恶”。尽管非线性SysID文献不如线性SysID成熟，但SysID界已经开发了几种有用的非线性建模方法。图9.1展示了一些流行的方法。在第一种方法中，直接拟合y(k)与过去数据之间的非线性关系。非线性形式可以是基于多项式的，也可以是更复杂的，例如基于神经网络的。本章我们将重点关注多项式形式。与线性SysID一样，可以假设不同的模型结构，即非线性ARX（NARX）、NOE、NARMAX等。在第二种方法中，线性和非线性部分被定义在独立的块中，从而形成块结构模型。根据非线性块是在线性块之前还是之后，可以得到Hammerstein模型或Wiener模型（该类别中最流行的两种模型）。在第三种方法中，为操作空间的不同区域构建多个线性模型，然后将它们组合成一个全局模型。这些方法在预测建模、过程控制和过程监控方面已有大量工业应用报道。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_175_0.png)\n\n### 非线性变换\n\n考虑到非线性SysID的高计算负担，如果事先知道非线性的性质，则可以利用输入或输出变量的非线性变换来避免显式的非线性拟合。下面的插图提供了一些示例场景。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_175_1.png)\n\n在实践中，所需的非线性变换更有可能是未知的。因此，让我们从可以说是非线性建模的默认选择开始：NARX模型。\n\
    \n## 9.2 NARX模型：简介\n\n非线性自回归与外生输入（NARX）模型，顾名思义，是ARX模型的非线性类似物，其中使用过程的过去输入和输出进行未来预测。如图9.2所示，模型采用以下形式\n\
    \n$$y(k) = f(u(k-d-1), ..., u(k-d-n_b), y(k-1), ..., y(k-n_a), \\theta) + e(k)$$\n\
    \n虽然函数$f$通常取为多项式形式，但也可以使用任何其他非线性结构（包括神经网络），只要认为合适即可。多项式NARX的一个特点是，预测器$\\hat{y}$关于参数是线性的！因此，如果事先知道模型中应包含哪些特定项/回归量（例如$y(k-1)u(k-1)$，$u^2(k-1)$），那么多项式NARX参数估计就变得直接了当。当然，与ARX一样，必须指定超参数（$d$，$n_b$，$n_a$，*多项式阶数*）。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_176_0.png)\n\n**示例：** 一个2阶多项式NARX模型，$d=0$，且$n_a=n_b=1$\n\
    \n$$\\hat{y}(k) = a_1 y(k-1) + a_2 y^2(k-1) + a_3 y(k-1)u(k-1) + b_1 u(k-1) +\
    \ b_2 u^2(k-1)$$\n\n图9.2：NARX模型结构"

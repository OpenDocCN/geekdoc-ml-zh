    # 6.5 FIR and ARX MIMO Models


    While we have used SISO systems to illustrate the concepts, in industrial practice,
    you are more likely to deal with MISO (multi-input single output) systems where,
    as the name suggests, there are multiple input variables affecting a single output
    variable. Extension of SISO ARX and FIR models to MISO system is straightforward
    as shown below


    $ARX \ MISO \ model: \quad y(k) = \frac{B_1(q^{-1})}{A(q^{-1})} u_1(k) + \frac{B_2(q^{-1})}{A(q^{-1})}
    u_2(k) + \cdots + \frac{e(k)}{A(q^{-1})}$


    $FIR \ MISO \ model: \quad y(k) = \sum_{i=1}^{M_1} g_{1,i} u_1(k-i) + \sum_{i=1}^{M_2}
    g_{2,i} u_2(k-i) + \cdots + v(k)$


    In the expression above for the ARX MISO model, the denominator polynomial is
    assumed to be the same, $A(q^{-1})$, in the transfer operators for all the inputs.
    This is a special case of general MISO ARX model which uses different denominator
    polynomials (which however leads to nonlinear parameter estimator problem). For
    MIMO (multi-input multi-output) systems, the usual approach is to build separate
    MISO models for each output. For example, for a 2-output 2-input system, your
    ARX model could look as follows


    $A_1(q^{-1})y_1(k) = B_{11}(q^{-1})u_1(k) + B_{12}(q^{-1})u_2(k) + e_1(k)$


    $A_2(q^{-1})y_2(k) = B_{21}(q^{-1})u_1(k) + B_{22}(q^{-1})u_2(k) + e_2(k)$


    It is not difficult to see that the above framework of independent parametrization
    of $y_1$''s and $y_2$''s ARX MISO models would be sub-optimal if there are correlated
    parameters among the two MISO models. It would definitely be wiser to identify
    models for all the outputs simultaneously. Moreover, as is apparent, both FIR
    and ARX models employ a large number of parameters for MIMO case which makes model
    fitting prone to overfitting and necessitates large dataset. Fortunately, specialized
    techniques for MIMO SysID do exist. However, we will hold off our discussion of
    MIMO modeling techniques for a bit and instead look at other popular I/O modeling
    techniques in the next chapter that overcome the shortcomings of ARX models.


    This completes our quick look at two of the most popular classical linear dynamic
    models. Negligible computational burden, global optimal solution, and only a little
    demand for prior process knowledge have contributed to these models'' sustained
    popularity. By being exposed to their respective pros and cons, we hope that you
    have a good understanding of what you are signing up for (e.g., the implicit noise
    model in ARX model) when employing these models. If you find yourself in an inadvertent
    situation where ARX and FIR models fail to provide'
  - '[PAGE 135]


    satisfactory performances, then you might need to play with your noise model.
    The next chapter aims to equip you with the requisite tools necessary to accomplish
    this.



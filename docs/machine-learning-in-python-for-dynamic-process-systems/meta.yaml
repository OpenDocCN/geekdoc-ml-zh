    # Summary


    In this chapter we studied the concepts behind autocorrelation function (ACF),
    partial autocorrelation function (PACF), cross-correlation function (CCF), and
    periodograms. We also looked at some of the applications of these graphical tools.
    These tools come in handy for analyzing time series and input-output data, and
    are a crucial part of the fundamentals upon which you will develop your ML-DPM
    expertise. In the next chapter we will continue building the fundamentals and
    look at some established guidelines for SysID.'

  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_161_0.png)


    The above model is fitted (via OLS) for $\hat{l} = 1, 2, ..., l_{max}$ and AICs
    are noted. Here, $l_{max}$ is some sufficiently large value. The lag value corresponding
    to the minimum AIC is then chosen.


    # Model order ($n$)


    Correct selection of the value for $n$ is important: while too large a value leads
    to model overfitting, too small value for $n$ leads to underfitting. One approach
    for model order selection is based on Hankel singular values. If the plot of the
    singular values vs model order has a prominent ''elbow'', then the model order
    corresponding to the elbow can be chosen as shown below


    ![](img/6cffacf6247d6f7caa7eacc348cef427_161_1.png)


    Another practice is to choose $n$ such that the normalized values of the $(n+1)^{th}$
    onwards singular values are below some threshold (SIPPY take a default value of
    0.1 for this threshold). However, very often there is no elbow or the singular
    values decrease slowly. Therefore, the more extensively used criteria for model
    order selection is AIC$^{67}$.'

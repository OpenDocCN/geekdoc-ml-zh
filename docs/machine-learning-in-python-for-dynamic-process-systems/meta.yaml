    # Ease of estimation


    Very often the choice of the model type is based on the ease with which a model
    can be quickly specified and fitted. For example, models like ARX and FIR are
    linear-in-parameters and therefore may be preferred over ARMAX or OE models which
    involve nonlinear optimization for parameter optimization. Difference equations
    like AR and ARMAX need users to specify a number of model hyper-parameters such
    as the deadtime, the number of regressive terms, etc. Alternatively, state-space
    models do not require much *a priori* parameter specification.


    In the upcoming chapters, you will learn the pros and cons of these different
    model types so that you can judiciously decide if the modeling convenience over-weighs
    the model''s shortcomings.'

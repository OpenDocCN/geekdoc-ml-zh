    that lie at a modeler’s discretion regarding the type of nonlinearity functions
    to choose from. Lack of systematic guidelines on nonlinear function selection
    makes things only worse. Therefore, in this chapter we looked at a couple of intuitive
    nonlinear modeling frameworks that have used for a variety of industrial processes.
    If linear models fail to provide satisfactory performance, then it can be worthwhile
    to try these simple nonlinear models to see if any significant improvements can
    be achieved. However, keep your expectations grounded - do not strive to obtain
    a perfect nonlinear model at the cost of project stagnation; the approximations
    can be good enough to be useful!


    ## Summary


    In this chapter we looked in detail two popular classical nonlinear SysID techniques,
    NARX and Hammerstein modeling. We worked through an application of NARX for modeling
    heat exchangers. With this we have completed our study of the classical modeling
    methods for dynamic processes. We are confident that by now you are comfortable
    with system identification jargon and can deftly handle most of the industrial
    dynamic modeling tasks with the knowledge gained so far. We will continue our
    study of nonlinear modeling in the next part of the book on neural networks and
    deep learning.


    ## Addendum A1


    ### Closed-Loop Identification: Modeling Processes Under Feedback


    The modeling techniques discussed in the book till now have an assumption regarding
    independence between process inputs $u(k)$ and disturbances $v(k)$. In other words,
    open-loop conditions were assumed. However, data collection for system identification
    under open-loop condition may not always be possible due to process safety and
    product quality concerns. Therefore, closed-loop identification (CLI) which refers
    to system identification using data collected under feedback control becomes a
    necessity. However, the feedback control leads to correlation between inputs and
    disturbances due to which some open-loop techniques (such as FIR, OE, SIM, etc.)
    that we have discussed so far will fail to provide unbiased models or more stringent
    conditions are imposed on model structure selection for unbiased parameter estimates.


    In this short addendum, we will attempt to apprise ourselves of the challenges
    of CLI and look at ways to overcome these challenges. Specifically, the following
    topics will be covered


    - Challenges with CLI

    - Identifiability conditions for CLI

    - Experiment design for CLI and direct identification approach


    ### CLI Challenges


    To guide our discussion on CLI challenges, consider Figure A1.1 which shows the
    conceptual differences between an open loop and a closed-loop process with a linear
    feedback controller.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_187_0.png)


    Let’s further assume that there is no excitation in the reference setpoints, i.e.,
    $r(k) = 0$. Under such conditions, there are two governing equations of the process
    which are competing for identification as shown below


    The two equations are competing for identification


    $y(k) = G_p u(k) + He(k)$


    process model


    $y(k) = r(k) - G_c^{-1} u(k) = - G_c^{-1} u(k)$


    controller model


    Due to the presence of noise disturbances in the process model, it is the (inverse
    of) controller model that will get ‘picked up’ during SysID$^{81}$. Even if $r(k)$
    is externally excited, depending on the ‘size’ of $r(k)$ and $e(k)$, SysID may
    pick $G_p$, $G_c^{-1}$, or some combination of the two model.


    $^{81}$ Under certain conditions (such as the controller being nonlinear like
    MPC), it may be possible to identify $G_p$ without external excitation in $r(k)$.


    ### Data collection for CLI and Direct Identification Approach


    In closed-loop process, $u(k)$ is decided by the controller and therefore it may
    not be possible to manually induce persistent excitations in $u(k)$. To facilitate
    identifiability of process model, a common alternative is to persistently excite
    the reference signal $r(k)$. If even this is not possible then the only resort
    if to use the historical process data with the hope that reference setpoints have
    sufficient variability.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_188_0.png)


    When the closed-loop process is excited externally through $r(k)$, the common
    CLI approach (called direct identification approach) directly builds a model between
    $y(k)$ and $u(k)$ (just like we did for open-loop systems) without utilizing any
    information about the controller or the reference signals.


    > **Model structure selection for CLI**


    Assuming sufficiently excited $r(k)$, PEM models provide unbiased models with
    closed-loop data if both $G(q^{-1})$ and $H(q^{-1})$ are correctly chosen. Note
    that the correct noise model structure was not a necessity for open-loop case.


    ## Part 3


    ### Artificial Neural Networks & Deep Learning


    ## Chapter 10


    ### Artificial Neural Networks: Handling Complex Nonlinear Systems


    It won’t be an exaggeration to say that artificial neural networks (ANNs) are
    currently the most powerful modeling construct for describing generic nonlinear
    processes. ANNs can capture any kind of complex nonlinearities, don’t impose any
    specific process characteristics, and don’t demand specification of process insights
    prior to model fitting. Furthermore, several recent technical breakthroughs and
    computational advancements have enabled (deep) ANNs to provide remarkable results
    for a wide range of problems. Correspondingly, ANNs have re(caught) the fascination
    of data scientists and the process industry is witnessing a surge in successful
    applications of ML-based process control, predictive maintenance, and inferential
    modeling involving ANN-based system identification.


    For SysID, ANNs are commonly used in NARX framework wherein an ANN model is fitted
    to find the nonlinear relationship between current output and past input/output
    measurements. In such applications, the FFNN (feed-forward neural networks) is
    invariably employed. However, for dynamic modeling, a specialized type of network
    called RNN (recurrent neural network) exist which is designed to be aware of the
    temporal nature of dynamic process data. Consequently, RNNs tend to be more parsimonious
    than FFNN. We will see SysID applications of both these popular architectures
    in this chapter.


    There is no doubt that ANNs have proven to be monstrously powerful. However, it
    is not easy to tame this monster. If the model hyperparameters are not set judiciously,
    it is very easy to end up with disappointing results. The reader is referred to
    Part 3 of Book 1 of this series for a detailed exposition on ANN training strategies
    and different facets of ANN models. In this chapter, SysID relevant concepts are
    sufficiently described to enable an uninitiated reader to learn how to use ANNs.
    Specifically, the following topics are covered


    - Introduction to ANN, FFNN, RNN, LSTM

    - Heat exchanger SysID via FFNN-based NARX

    - Heat exchanger SysID via LSTM


    ### 10.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 10.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_191_0.png)


    The network shown in Figure 10.1 is an example of a fully-connected feed-forward
    neural network (FFNN), the most common type of ANN. In FFNN, signals flow in only
    one direction, from the input layer to the output layer via hidden layers. Neurons
    between consecutive layers are connected fully pairwise and neurons within a layer
    are not connected.


    > **What is deep learning**


    In a nutshell, using an ANN with a large number of hidden layers to find relationship/pattern
    in data is deep learning (technically, ≥ 2 hidden layers implies a deep neural
    network (DNN)). Several recent algorithmic innovations have overcome the model
    training issues for DNNs which have resulted in the DNN-led AI revolution we are
    witnessing today.'
  mdcn: '对于缺乏经验的过程建模者而言，非线性系统辨识无疑是一项艰巨的任务，这源于参数估计的更高复杂性，以及建模者在选择非线性函数类型时面临的大量自由选择。缺乏系统性的非线性函数选择指南更是雪上加霜。因此，本章我们探讨了几种直观的非线性建模框架，这些框架已应用于各种工业过程。如果线性模型无法提供令人满意的性能，那么尝试这些简单的非线性模型以观察是否能取得显著改进是值得的。然而，请保持期望的现实性——不要为了追求完美的非线性模型而导致项目停滞不前；这些近似模型可能已经足够好，足以发挥作用！


    ## 总结


    本章我们详细探讨了两种流行的经典非线性系统辨识技术：NARX和Hammerstein建模。我们通过一个应用NARX对换热器进行建模的实例进行了讲解。至此，我们完成了对动态过程经典建模方法的研究。我们相信，到现在为止，您已经熟悉了系统辨识的术语，并能够运用目前所学的知识熟练处理大多数工业动态建模任务。我们将在本书关于神经网络和深度学习的下一部分中继续研究非线性建模。


    ## 附录 A1


    ### 闭环辨识：反馈控制下的过程建模


    本书迄今为止讨论的建模技术都假设过程输入 $u(k)$ 与扰动 $v(k)$ 之间是独立的。换句话说，假设了开环条件。然而，由于过程安全和产品质量方面的考虑，在开环条件下收集系统辨识所需的数据可能并不总是可行的。因此，闭环辨识（CLI）——即使用在反馈控制下收集的数据进行系统辨识——成为一种必要。然而，反馈控制会导致输入与扰动之间产生相关性，这使得我们迄今为止讨论的一些开环技术（如FIR、OE、SIM等）无法提供无偏模型，或者为了获得无偏参数估计，对模型结构选择施加了更严格的条件。


    在这个简短的附录中，我们将尝试了解CLI面临的挑战，并探讨克服这些挑战的方法。具体来说，将涵盖以下主题：


    - CLI面临的挑战

    - CLI的可辨识性条件

    - CLI的实验设计与直接辨识方法


    ### CLI的挑战


    为了引导我们对CLI挑战的讨论，请参考图A1.1，该图展示了开环过程与带有线性反馈控制器的闭环过程之间的概念差异。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_187_0.png)


    让我们进一步假设参考设定值没有激励，即 $r(k) = 0$。在此条件下，过程有两个相互竞争的控制方程用于辨识，如下所示


    这两个方程在辨识中相互竞争


    $y(k) = G_p u(k) + He(k)$


    过程模型


    $y(k) = r(k) - G_c^{-1} u(k) = - G_c^{-1} u(k)$


    控制器模型


    由于过程模型中存在噪声扰动，在系统辨识过程中“被选中”的将是（逆）控制器模型$^{81}$。即使 $r(k)$ 受到外部激励，根据 $r(k)$ 和 $e(k)$
    的“大小”，系统辨识可能选择 $G_p$、$G_c^{-1}$，或两者的某种组合。


    $^{81}$ 在某些条件下（例如控制器是非线性的，如MPC），可能无需在 $r(k)$ 中施加外部激励即可辨识出 $G_p$。


    ### CLI的数据收集与直接辨识方法


    在闭环过程中，$u(k)$ 由控制器决定，因此可能无法手动在 $u(k)$ 中引入持续激励。为了便于过程模型的可辨识性，一个常见的替代方法是持续激励参考信号
    $r(k)$。如果这也不可能，那么唯一的办法就是使用历史过程数据，并期望参考设定值具有足够的变异性。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_188_0.png)


    当闭环过程通过 $r(k)$ 受到外部激励时，常见的CLI方法（称为直接辨识方法）直接在 $y(k)$ 和 $u(k)$ 之间建立模型（就像我们对开环系统所做的那样），而不利用任何关于控制器或参考信号的信息。


    > **CLI的模型结构选择**


    假设 $r(k)$ 受到充分激励，如果 $G(q^{-1})$ 和 $H(q^{-1})$ 都选择正确，PEM模型可以利用闭环数据提供无偏模型。请注意，对于开环情况，正确的噪声模型结构并非必需。


    ## 第三部分


    ### 人工神经网络与深度学习


    ## 第 10 章


    ### 人工神经网络：处理复杂非线性系统


    毫不夸张地说，人工神经网络（ANN）是目前描述通用非线性过程最强大的建模工具。ANN能够捕捉任何类型的复杂非线性关系，不对过程特性施加任何特定要求，并且在模型拟合之前不需要指定过程洞察。此外，最近的几项技术突破和计算进步使得（深度）ANN能够为广泛的问题提供显著的结果。相应地，ANN重新（引起了）数据科学家的极大兴趣，过程工业界正在见证基于机器学习的过程控制、预测性维护以及涉及基于ANN的系统辨识的推断建模的成功应用激增。


    对于系统辨识，ANN通常在NARX框架中使用，其中拟合一个ANN模型以找到当前输出与过去输入/输出测量值之间的非线性关系。在此类应用中，FFNN（前馈神经网络）被普遍采用。然而，对于动态建模，存在一种称为RNN（循环神经网络）的专用网络，它被设计为能够感知动态过程数据的时间特性。因此，RNN往往比FFNN更简约。我们将在本章中看到这两种流行架构的系统辨识应用。


    毫无疑问，ANN已被证明具有强大的能力。然而，驯服这个“怪物”并不容易。如果模型超参数设置不当，很容易得到令人失望的结果。读者可以参考本系列丛书第1册的第三部分，以获取关于ANN训练策略和ANN模型不同方面的详细阐述。在本章中，将充分描述与系统辨识相关的概念，使未入门的读者能够学习如何使用ANN。具体来说，将涵盖以下主题：


    - ANN、FFNN、RNN、LSTM简介

    - 基于FFNN的NARX进行换热器系统辨识

    - 基于LSTM的换热器系统辨识


    ### 10.1 ANN简介


    人工神经网络（ANN）是非线性经验模型，可以通过监督学习捕捉输入-输出变量之间的复杂关系，或通过无监督学习识别数据模式。在结构上，ANN受到人脑的启发，是相互连接的神经元的复杂网络，如图10.1所示。ANN由一个输入层、一系列隐藏层和一个输出层组成。网络的基本单元——神经元，接受来自源输入层或网络前一层的输入向量，对输入进行加权求和，然后执行非线性变换以产生单个实数值输出。每个隐藏层可以包含任意数量的神经元。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_191_0.png)


    图10.1所示的网络是全连接前馈神经网络（FFNN）的一个例子，这是最常见的ANN类型。在FFNN中，信号仅沿一个方向流动，从输入层通过隐藏层流向输出层。连续层之间的神经元完全成对连接，而同一层内的神经元则不连接。


    > **什么是深度学习**


    简而言之，使用具有大量隐藏层的ANN来寻找数据中的关系/模式就是深度学习（从技术上讲，≥ 2个隐藏层意味着深度神经网络（DNN））。最近的几项算法创新克服了DNN的模型训练问题，从而导致了我们今天所见证的DNN引领的AI革命。'

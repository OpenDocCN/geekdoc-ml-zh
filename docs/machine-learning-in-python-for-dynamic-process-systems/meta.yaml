  md: "As shown in Figure 10.4, the input that gets supplied to the network for $y(k)$'s\
    \ prediction is a sequence of the lagged measurements. Therefore, we need to now\
    \ create these sequences. Currently, the shape of $X$ array is {# of samples,\
    \ # of features}. For RNN, this input data matrix needs to be converted into the\
    \ shape {# of sequence samples, # of time steps, # of features} such that each\
    \ entry (of shape {# of time steps, # of features}) along the $0^{th}$ dimension\
    \ is a complete sequence of past data which is used to make prediction of temperature\
    \ values. Here, the # of time steps is taken to be 9 and # of features equals\
    \ 2.\n\n```\n# rearrange X data into (# sequence samples, # time steps, # features)\
    \ form\nnTimeSteps = 9\nX_fit_scaled_sequence = []; X_val_scaled_sequence = []\n\
    y_fit_scaled_sequence = []; y_val_scaled_sequence = []\n\nfor sample in range(nTimeSteps,\
    \ X_fit_scaled.shape[0]):\n    X_fit_scaled_sequence.append(X_fit_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_fit_scaled_sequence.append(y_fit_scaled[sample])\n\nfor sample in\
    \ range(nTimeSteps, X_val_scaled.shape[0]):\n    X_val_scaled_sequence.append(X_val_scaled[sample-nTimeSteps:sample,\
    \ :])\n    y_val_scaled_sequence.append(y_val_scaled[sample])\n\n# convert list\
    \ of (time steps, features) arrays into (samples, time steps, features) array\n\
    X_fit_scaled_sequence, y_fit_scaled_sequence = np.array(X_fit_scaled_sequence),\n\
    \                                              np.array(y_fit_scaled_sequence)\n\
    X_val_scaled_sequence, y_val_scaled_sequence = np.array(X_val_scaled_sequence),\n\
    \                                              np.array(y_val_scaled_sequence)\n\
    ```\n\nBasically, each block of 9 continuous rows in (scaled) $X$ array becomes\
    \ a sequence. The topology of RNN that we will build is same as that shown in\
    \ Figure 10.4, except for the number of time-steps. Like we did for FFNN modeling,\
    \ we will import relevant Keras libraries. In the code below, a LSTM RNN layer\
    \ is followed by a dense layer.\n\n```\n# import Keras libraries\nfrom tensorflow.keras\
    \ import Sequential\nfrom tensorflow.keras.layers import LSTM\nfrom tensorflow.keras.layers\
    \ import Dense\nfrom tensorflow.keras import regularizers\n\n# define model\n\
    model = Sequential()\nmodel.add(LSTM(units=6, kernel_regularizer=regularizers.l1(0.001),\
    \ input_shape=(nTimeSteps,2)))\n# LSTM cell with 6 neurons in each of the 4 neural\
    \ layers\nmodel.add(Dense(units=1))\n# 1 neuron in output layer\n```"

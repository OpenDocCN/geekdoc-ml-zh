  md: '# # Chapter 6

    ## Input-Output Modeling - Part 1:

    ## Simple Yet Popular Classical Linear Models


    There is beauty is simplicity - this age-old truth perfectly sums up the reason
    behind the popularity of two simple input-output models, FIR and ARX models, that
    we will learn about in this chapter. In the age of artificial neural networks,
    these models still hold on their own and are an essential part of any PDS''s toolkit.
    As alluded to before, I/O processes have inputs signals that can be manipulated
    to control the output signals. The objective, therefore, of I/O modeling is to
    find the deterministic relationship between the input and output signals, and,
    optionally, find a suitable model for the stochastic disturbances affecting the
    outputs.


    FIR model is a non-parametric model and is used in thousands of MPC solutions
    in process industry globally. The remarkable success of the FIR-based MPCs is
    testament to the fact that simple models can be quite useful representation of
    complex industrial processes. FIR models are intuitive and simple enough to be
    understood by plant operators. However, nothing is all rosy with anything. FIR
    models, owing to their flexibility often lead to overfitting. ARX models, on the
    other hand, are parametric models and require much lower number of parameters.
    Consequently, the resulting models are ''smoother''. ARX models are often the
    initial choice in any SysID exercise. Nonetheless, ARX models can easily suffer
    from high bias errors. Since these two models are so critical, this chapter is
    devoted to understanding their various aspects, along with their pros and cons,
    in detail.


    Specifically, the following are covered in the chapter.


    +   - Introduction to FIR and ARX models

    - SysID of industrial furnaces using FIR and ARX models

    - Hyperparameter selection for FIR and ARX models

    - Stochastic component of ARX models

    - Model bias in FIR and ARX models'

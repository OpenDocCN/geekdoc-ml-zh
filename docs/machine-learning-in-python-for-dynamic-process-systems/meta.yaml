  md: '# 10.3 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. In the FFNN-based NARX model
    that we studied in the previous section, there is no implicit or explicit specification
    of the fact that the data is temporal/sequential in nature, i.e., $u(k-2)$ comes
    before $u(k-1)$ for example. There is no efficient mechanism to specify this temporal
    order of data in a FFNN. RNNs accomplish this by processing elements of a sequence
    recurrently and storing a hidden state that summarizes the past information during
    the processing. The basic unit in a RNN is called a RNN cell which simply contains
    a layer of neurons. Figure 10.2 shows the architecture of a RNN consisting of
    a single cell and how it processes a data sequence with ten samples.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_197_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, $y_{(i)}$, is generated at the $i^{th}$ step and then
    fed to the next step for processing along with $x_{(i+1)}$. By way of this arrangement,
    $y_{(i+1)}$ is a function of $x_{(i+1)}$ and $y_{(i)}$. Since, $y_{(i)}$ itself
    is a function of $x_{(i)}$ and $y_{(i-1)}$, $y_{(i+1)}$ effectively becomes a
    function of $x_{(i+1)}$, $x_{(i)}$, and $y_{(i-1)}$. Continuing the logic further
    implies that the final sequence output, $y_{(10)}$, is a function of all ten inputs
    of the sequence, that is, $x_{(10)}$, $x_{(9)}$,..., $x_{(1)}$. This ''recurrent''
    mechanism leads to efficient capturing of temporal patterns in data.'
  merge: -1
  pgno: 197
- img_proc: true
  md: '# RNN outputs


    If the neural layer in the RNN cell in Figure 10.2 contains $n$ neurons ($n$ equals
    4 in the shown figure), then each $y_{(i)}$ or $h_{(i)}$ is a n-dimensional vector.
    For simple RNN cells, $y_{(i)}$ equals $h_{(i)}$. Let $x$ be a m-dimensional vector.
    At any $i^{th}$ step, we can write the following relationship


    $$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$


    where $W_x \in R^{n \times m}$ with each row containing the weight parameters
    of a neuron as applied to $x$ vector, $W_y \in R^{n \times n}$ with each row containing
    the weight parameters of a neuron as applied to $y$ vector, $b \in R^n$ contains
    the bias parameters, and $g$ denotes the activation function. The same neural
    parameters are used at each step.


    If all the outputs of the sequence are of interest, then it is called sequence-to-sequence
    or many-to-many network. However, very often only the last step output is needed,
    leading to sequence-to-vector or many-to-one network. Moreover, the last step
    output may need to be further processed and so a FC layer is often added. Figure
    10.3 shows one such topology.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_198_0.png)


    # RNN-based NARX topology


    Figure 10.4 below shows how a potential RNN-based NARX architecture may look like
    for a SISO process where three lagged measurements are used to make one-step ahead
    predictions. We can observe that all the lagged measurements are not processed
    simultaneously by an RNN cell which often results in less number of model parameters
    when compared to a FFNN-based NARX model.'

  md: '# 8.1 State-Space Models: An Introduction


    Consider the distillation column in Figure 8.1 where we have four inputs and four
    outputs. Let''s focus on the relationship between the reboiler duty $Q_B$ and
    distillate composition $x_D$. We can build an I/O model between $Q_B$ and $x_D$,
    but it is clear that $Q_B$ doesn''t affect $x_D$ directly. There are internal
    dynamics or states (e.g., arising from the liquid holdup at each column tray)
    that changes in $Q_B$ have to pass through before impacting $x_D$. Similar argument
    could be made for $Q_B$ vs $D$ relationship. The unobserved intermediate variables
    which characterize the internal dynamics or ''states'' of the column are termed
    state variables and, as argued before, the outputs share these states. The modeling
    framework that reflects such interrelationship between the inputs and outputs
    is the state-space model whose structure$^{59}$ is shown in Figure 8.1. In a generic
    modeling exercise, the estimated state variables may not always have any physical
    meanings and even the choice of the states is not unique.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_155_0.png)


    Our familiar PEM methodology could be used to estimate SS models but that would
    involve solving a nonlinear optimization problem. The better alternative is the
    subspace identification method.$^{61}$ Specifically, in the CVA (canonical variate
    analysis) approach, the states are


    $^{59}$ The matrix $D$ is often kept equal to zero due to no immediate direct
    impact of $u(k)$ on $y(k)$

    $^{60}$ Column diagram created by Milton Beychok under [Creative Commons Attribution-Share
    Alike 3.0](http://commons.wikimedia.org/wiki/File:Continuous_Binary_Fractional_Distillation.PNG)

    $^{61}$ A drawback of subspace identification is that the model fit may not be
    as accurate as that obtained via PEM because optimality is not guaranteed in SIM.
    However, the difference is accuracy is usually not significant.'
  merge: -1
  pgno: 155
- img_proc: true
  md: 'estimated via linear algebra as a linear combination of past outputs and inputs
    that maximizes the explained variability in the future output measurements. Without
    further ado, let’s now delve deeper into the CVA concepts and master the art of
    CVA-based state-space modeling.


    > ### Forms of state-space models


    The form of state-space model we saw in Figure 8.1 is called process form. Two
    other common forms are shown below


    **Innovation form**


    $$x(k+1) = Ax(k) + Bu(k) + Ke(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    *Kalman gain*


    **Predictor form**


    $$x(k+1) = A_k x(k) + B_k u(k) + Ky(k)$$

    $$y(k) = Cx(k) + Du(k) + e(k)$$


    where

    $$A_k = A - KC$$

    $$B_k = B - KD$$


    Any of the three forms can be chosen to model any MIMO system.


    # 8.2 State-Space Modeling via CVA


    CVA is among the most popular technique for state-space modeling of dynamic MIMO
    systems. Figure 8.2 shows the general approach used by CVA (and other SIM techniques)
    for estimating the SS models using historical plant data: the state sequence $\{x(k)\}$
    for the historical observations are first estimated using the $\{y(k), u(k)\}$
    data sequences, then the system matrices $(A, B, C, D)$ are estimated via least-squares
    regression, and thereafter the covariance matrices are found. We will see more
    on this procedure soon. All SIM algorithms follow this procedure and differ primarily
    in the way the state sequence is estimated.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_156_0.png)'
  merge: -1
  pgno: 156
- img_proc: true
  md: 'Let''s look at the model fitting procedure in more details.


    # Mathematical background


    Using the state-space model and some smart re-arrangement<sup>62</sup> of input-output
    data sequence, it can be shown that state vector $x(k)$ can be approximated as
    a linear combination of past inputs and outputs<sup>63</sup>


    $\hat{x}(k) = J p(k)$


    eq. 1


    defined as $[y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-l_y) \ u^T(k-1) \ u^T(k-2) \
    \cdots \ u^T(k-l_u)]^T$


    In Eq. 1, $l_y$ and $l_u$ denote the number of lagged outputs and inputs used
    to build the $p(k)$ vector. Usually, $l_y = l_u = l$ and it is a model hyperparameter.
    The CVA method utilizes CCA (canonical covariate analysis), a multivariate statistical
    technique, to find $J$. A quick primer on the CCA technique is provided below.


    > ### CCA: A quick primer


    CCA is a dimensionality reduction technique which aims to find linear combinations
    of input variables ($u \in \mathbb{R}^m$) that are maximally correlated with linear
    combinations of outputs variables ($y \in \mathbb{R}^p$)*. You may relate this
    to PLS wherein covariance between latent variables is maximized. These linear
    combinations are called canonical variables and are given as


    $c = Ju$ ← $c$ comprises of uncorrelated latent variables

    $d = Ly$ ← $d$ comprises of uncorrelated latent variables


    The covariance matrix between $c$ and $d$ is (rectangular) diagonal


    $\Sigma_{cd} = J\Sigma_{uy}L^T = D = diag(\gamma_1, \gamma_2, \dots, \gamma_o,
    0, \dots, 0)$


    The elements $\gamma_i$ of matrix D are called canonical correlations with ($\gamma_1
    \ge \gamma_2 \ge \dots \ge \gamma_o$) and quantify the degree of correlations
    between the $i^{th}$ canonical variate pair $c_i$ and $d_i$.


    <sup>62</sup> Chen et. al., A canonical variate analysis based process monitoring
    scheme and benchmark study. 2014

    <sup>63</sup> All SIM algorithms follow this procedure and differ primarily in
    the way the matrix $J$ is estimated'
  merge: -1
  pgno: 157
- img_proc: true
  md: '![](img/6cffacf6247d6f7caa7eacc348cef427_158_0.png)


    The matrices $J \in \mathbb{R}^{m \times m}$ and $L \in \mathbb{R}^{r \times r}$
    are found via singular value decomposition


    $$\Sigma_{uu}^{-1/2} \Sigma_{uy} \Sigma_{yy}^{-1/2} = U \Sigma V^T$$


    where, $J = U^T \Sigma_{uu}^{-1/2}, L = V^T \Sigma_{yy}^{-1/2}, D = \Sigma$


    One may retain only those canonical variate pairs (say, top $n$ pairs) that show
    significant correlations and discard the others, and therefore achieve dimensionality
    reduction. Let $\hat{c}$ and $\hat{d}$ be the n-dimensional ($n < m$ and $r$)
    vectors, then,


    $$\hat{c} = J_n u$$

    $$\hat{d} = L_n y$$

    where, $J_n$ and $L_n$ are first n rows of $J$ and $L$


    * It is assumed that $u$ and $y$ are centered. Scaling, however, is not required
    as CCA is scale-invariant, i.e., the estimated latent variables and the correlations
    remain the same with or without scaling. Also note that we have not used the ''k''
    notation as CCA is designed for static data.'

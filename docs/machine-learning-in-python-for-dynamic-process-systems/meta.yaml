    Plant image on cover page obtained from https://pixabay.com/.


    To request permissions, contact the authors at MLforPSE@gmail.com


    First published: June 2023


    # About the Authors


    **Ankur Kumar** holds a PhD degree (2016) in Process Systems Engineering from
    the University of Texas at Austin and a bachelor’s degree (2012) in Chemical Engineering
    from the Indian Institute of Technology Bombay. He currently works at Linde in
    the Advanced Digital Technologies & Systems Group in Linde’s Center of Excellence,
    where he has developed several in-house machine learning-based monitoring and
    process control solutions for Linde’s hydrogen and air-separation plants. Ankur’s
    tools have won several awards both within and outside Linde. Most recently, one
    of his tools, PlantWatch (a plantwide fault detection and diagnosis tool), received
    the 2021 Industry 4.0 Award by the Confederation of Industry of the Czech Republic.
    Ankur has authored or co-authored more than 10 peer-reviewed journal papers (in
    the areas of data-driven process modeling and optimization), is a frequent reviewer
    for many top-ranked research journals, and has served as Session Chair at several
    international conferences. Ankur also served as an Associate Editor of the Journal
    of Process Control from 2019 to 2021.


    **Jesus Flores-Cerrillo** is currently an Associate Director - R&D at Linde and
    manages the Advanced Digital Technologies & Systems Group in Linde’s Center of
    Excellence. He has over 20 years of experience in the development and implementation
    of monitoring technologies and advanced process control & optimization solutions.
    Jesus holds a PhD degree in Chemical Engineering from McMaster University and
    has authored or co-authored more than 40 peer-reviewed journal papers in the areas
    of multivariate statistics and advanced process control among others. His team
    develops and implements novel plant monitoring, machine learning, IIOT solutions
    to improve the efficiency and reliability of Linde’s processes. Jesus’s team received
    the Artificial Intelligence and Advanced Analytics Leadership 2020 award from
    the National Association of Manufacturers’ Manufacturing Leadership Council.


    # Note to the readers


    Jupyter notebooks and Spyder scripts with complete code implementations are available
    for download at [https://github.com/ML-PSE/Machine_Learning_for_DPS](https://github.com/ML-PSE/Machine_Learning_for_DPS).
    Code updates when necessary, will be made and updated on the GitHub repository.
    Updates to the book''s text material will be available on Leanpub ([www.leanpub.com](http://www.leanpub.com))
    and Google Play ([https://play.google.com/store/books](https://play.google.com/store/books)).
    We would greatly appreciate any information about any corrections and/or typos
    in the book.


    # Series Introduction


    In the 21st century, data science has become an integral part of the work culture
    at every manufacturing industry and process industry is no exception to this modern
    phenomenon. From predictive maintenance to process monitoring, fault diagnosis
    to advanced process control, machine learning-based solutions are being used to
    achieve higher process reliability and efficiency. However, few books are available
    that adequately cater to the needs of budding process data scientists. The scant
    available resources include: 1) generic data science books that fail to account
    for the specific characteristics and needs of process plants 2) process domain-specific
    books with rigorous and verbose treatment of underlying mathematical details that
    become too theoretical for industrial practitioners. Understandably, this leaves
    a lot to be desired. Books are sought that have process systems in the backdrop,
    stress application aspects, and provide a guided tour of ML techniques that have
    proven useful in process industry. This series ‘Machine Learning for Process Industry’
    addresses this gap to reduce the barrier-to-entry for those new to process data
    science.


    The first book of the series ‘*Machine Learning in Python for Process Systems
    Engineering*’ covers the basic foundations of machine learning and provides an
    overview of broad spectrum of ML methods primarily suited for static systems.
    Step-by-step guidance on building ML solutions for process monitoring, soft sensing,
    predictive maintenance, etc. are provided using real process datasets. Aspects
    relevant to process systems such as modeling correlated variables via PCA/PLS,
    handling outliers in noisy multidimensional dataset, controlling processes using
    reinforcement learning, etc. are covered. This second book of the series is focused
    on dynamic systems and provides a guided tour along the wide range of available
    dynamic modeling choices. Emphasis is paid to both the classical methods (ARX,
    CVA, ARMAX, OE, etc.) and modern neural network methods. Applications on time
    series analysis, noise modeling, system identification, and process fault detection
    are illustrated with examples. Future books of the series will continue to focus
    on other aspects and needs of process industry. It is hoped that these books can
    help process data scientists find innovative ML solutions to the real-world problems
    faced by the process industry.


    Books of the series will be useful to practicing process engineers looking to
    ‘pick up’ machine learning as well as data scientists looking to understand the
    needs and characteristics of process systems. With the focus on practical guidelines
    and real industrial case studies, we hope that these books lead to wider spread
    of data science in the process industry.


    Previous book(s) from the series

    (https://MLforPSE.com/books/)


    # ML for Process Industry Series


    # Machine Learning in Python for Process Systems Engineering


    Achieve operational excellence using process data


    2023 Edition


    Ankur Kumar, Jesus Flores-Cerrillo


    # Preface


    Model predictive control (MPC) and real-time optimization (RTO) are among the
    most critical technologies that drive the process industry. Any experienced process
    engineer would vouch that the success of MPCs and RTOs depend heavily on the accuracy
    of the underlying process models. Similarly, the key requirement for other important
    process technologies like dynamic data reconciliation, process monitoring, etc.
    is availability of accurate process models. Modeling efforts during commissioning
    of these tools can easily consume up to 90% of the project cost and time. Modern
    data revolution, whereby abundant amount of process data are easily available,
    and practical difficulties in building high-fidelity first-principles dynamic
    models for complex industrial processes have popularized the usage of empirical
    data-driven/machine learning (ML) models. Building dynamic models using process
    data is called system identification (SysID) and it’s a very mature field with
    extensive literature. However, it is also very easy for a process data scientist
    (PDS) new to this field to get overwhelmed with the SysID mathematics and ‘drowned’
    in the sea of SysID terminology. Several noteworthy ML books have been written
    on time-series analysis; however, in process industry, input-output models are
    of greater import. Unfortunately, there aren’t many books that cater to the needs
    of modern PDSs interested in dynamic process modeling (DPM) without weighing them
    down with too much mathematical details and therein lies our motivation for authoring
    this book: specifically, a reader-friendly and easy to understand book that provides
    a comprehensive coverage of ML techniques that have proven useful for building
    dynamic process models with focus on practical implementations.


    It would be clear to you by now that this book is designed to teach working process
    engineers and budding PDSs about DPM. While doing so, this book attempts to avoid
    a pitfall that several generic ML books fall into: overemphasis on ‘modern’ and
    complex ML techniques such as artificial neural networks (ANNs) and undertreatment
    of classical DPM methods. Classical techniques like FIR and ARX still dominate
    the dynamic modeling solutions offered by commercial vendors of industrial solutions
    and are no less ‘machine-learning’ than the ANNs. These two along with other classical
    techniques (such as OE, ARIMAX, CVA) predate the ANN-craze era and have stood
    the test of time in providing equal (if not superior) performance compared to
    ANNs. Correspondingly, along with modern ML techniques like RNNs, considerable
    portion of the book is devoted to classical dynamic models with the emphasis on
    understanding the implications of modeling decisions such as the impact of implicit
    noise model assumption with ARX model, the implication of differencing data, etc.'

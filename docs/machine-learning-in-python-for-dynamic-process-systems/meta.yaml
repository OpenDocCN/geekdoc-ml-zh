- md: '## Persistent Excitation


    Consider the following process


    $$y(k) = b_1u(k-1) + b_2u(k-2) + b_3u(k-3) + b_4u(k-4) + e(k)$$


    Suppose that the input signal is hypothetically of the form $u(k) = u(k-1) + 1$.
    Under such an input signal, the process can be re-written as


    $$y(k) = b_1u(k-1) + b_2u(k-1) - b_2 + b_3u(k-1) - 2b_3 + b_4u(k-1) - 3b_4 + e(k)$$

    $$= b''_1u(k-1) + b_0$$


    The above derivation implies that the process behaves virtually like a two-parameter
    system and therefore the four original model parameters can''t be uniquely determined
    with output data collected with the aforementioned input signal. In other words,
    the true process model is not identifiable due to non-informative data. To ensure
    identifiability, the input variables must be sufficiently excited. Mathematically,
    a discrete-time input signal $u(k)$ is said to be persistently exciting of order
    $n$ (required to uniquely identify a PEM model with $\le n$ model parameters)
    if the following conditions are met


    The following limit exists


    The following matrix is invertible


    $$r_u(\tau) = \lim_{N \to \infty} \frac{1}{N} \sum_{t=0}^{N} u_{t+\tau} u_t$$


    $$R_u(n) = \begin{bmatrix} r_u(0) & r_u(1) & \cdots & r_u(n-1) \\ r_u(-1) & r_u(0)
    & \cdots & r_u(n-2) \\ \vdots & \vdots & \ddots & \vdots \\ r_u(1-n) & r_u(2-n)
    & \cdots & r_u(0) \end{bmatrix}$$


    You will mostly not use these theoretical conditions directly, but it''s worthwhile
    to know these: a step input has persistent excitation (p.e.) of order 1; a full
    length PRBS has p.e. of order $M$; a GBN signal and a white noise signal are persistently
    exciting with any finite order. Alternatively, in frequency domain, $u(k)$ is
    persistently exciting of order $n$ if its spectral density is not zero at $n$
    points in the interval $(-\pi, \pi]$.


    ## Pseudo Random Binary Sequence (PRBS)


    A PRBS signal switches between two levels with varying pulse widths as shown below.
    While the long width pulses help in estimation of steady-state gains, short pulses
    help in capturing transient dynamics.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_68_0.png)


    With order $n$, a unique sequence of length $M = 2^n-1$ can be generated. For
    larger signal length, the unique sequence repeats itself and therefore, has a
    period of length $M$ as shown in the example below. Although a PRBS sequence is
    deterministic, for large $M$ (and signal length $\ge M$), the signal has white-noise
    like properties and hence the term ''pseudo-random'' in its name. Scipy library
    provides a function for PRBS generation. An example is shown below.


    **Example 4.1:**


    Let''s generate a PRBS signal for an input fluctuating between values -1 and 1.


    ```

    # import packages

    from scipy.signal import max_len_seq

    import matplotlib.pyplot as plt


    # generate PRBS input signal of order 6 and plot

    PRBS_signal = max_len_seq(6, length=100)[0]*2-1 # converting sequence of 0''s
    and 1''s to sequence of -1''s and 1''s


    plt.plot(PRBS_signal, ''steelblue'')

    plt.ylabel(''PRBS_signal''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_68_1.png)


    ## Generalized Binary Noise (GBN)


    A GBN signal is similar to PRBS but non-periodic. It switches between two values
    $-a$ and $a$, and the sequence is generated as follows


    $P[u(k) = -u(k-1)] = p_{sw}$

    $P[u(k) = u(k-1)] = 1 - p_{sw}$


    $; p_{sw} \in (0,1)$ is the switching probability


    For $p_{sw} = 0.5$, GBN signal has white-noise like properties. However, a lower
    value of $p_{sw}$ (0.1 or 0.05) is often recommended. SIPPY provides a function
    for GBN signal generation. An example is shown below.


    ### Example 4.2:


    Let''s generate a GBN signal for an input fluctuating between values -1 and 1.


    ```

    # import packages

    from sippy import functionset as fset

    import matplotlib.pyplot as plt


    # generate GBN input signal using SIPPY and plot

    [gbn_signal, _, _] = fset.GBN_seq(1000, 0.1)


    plt.plot(gbn_signal, ''steelblue'', linewidth=0.8)

    plt.ylabel(''GBN_signal''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_69_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_69_1.png)


    In the plots, note how lower switching probability leads to higher pulse widths.


    > Persistence excitation is only a theoretical guarantee for model identifiability.
    Other practical requirements also warrant careful attention.


    > The physical levels of the test signals should be chosen large enough so that
    variations in output is greater than the variations due to noise. This property
    is quantified by a measure termed signal-to-noise ratio (SNR). A low SNR leads
    to inaccurate parameter estimates. A few words of caution here: If you are only
    interested in a linear model around some operating point, then you need to be
    wary of unwanted nonlinearities due to high test signal levels.


    > If you are looking to build a nonlinear model, then the binary variations in
    input signal levels will not expose system nonlinearity. The level/amplitude of
    the test signal must also take a range of values.


    ## 4.3 Data Pre-processing


    Raw process data is seldom suitable for immediate use for model ID, even if obtained
    through well-designed identification tests. In this section, we will learn about
    some of the common practices used to handle the impurities that inadvertently
    creep into our dataset. Let’s start with removal of high-frequency measurement
    noise.


    ### (Measurement) Noise removal


    Consider the plot below which shows the observations of a temperature variable.
    Here, the high frequency wiggles on top of the apparently systematic variations
    are measurement noise and need to be removed before model ID. In time-domain,
    common methods for noise removal are moving-average smoothing and SG filtering.²²


    ![](img/6cffacf6247d6f7caa7eacc348cef427_70_0.png)


    Another approach for noise removal is to work directly in frequency domain and
    filter out the undesirable high-frequency components of the signal. A common choice
    for such a filter is Butterworth filter²³. The example below shows how to implement
    one such filter.


    **Example 4.3:** Take the signal shown in the above motivating plot and clean
    it by removing its high-frequency components. Note that the noisy signal was generated
    by adding a white noise to the CO₂ concentration signal in the celebrated Box-Jenkins
    gas furnace dataset (https://openmv.net/info/gas-furnace).


    ```

    # import packages

    import numpy as np, matplotlib.pyplot as plt

    from scipy import signal


    # read data and generate its periodogram

    y_noisy = np.loadtxt(''noisySignal.csv'', delimiter='','')

    freq, PSD = signal.welch(y_noisy)

    plt.plot(freq, PSD), plt.ylabel(''PSD''), plt.xlabel(''frequency [Hz]'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_70_1.png)


    ```

    # apply Butterworth filter of order 5 with critical frequency as 0.2 Hz

    b, a = signal.butter(5, 0.2, ''low'') # create the filter

    y_cleaned = signal.filtfilt(b, a, y_noisy) # apply the filter

    plt.figure(), plt.plot(y_cleaned, ''g''), plt.ylabel(''y_cleaned''), plt.xlabel(''k'')


    # periodogram of cleaned data

    freq, PSD = signal.welch(y_cleaned)

    plt.figure(), plt.plot(freq, PSD)

    plt.ylabel(''PSD cleaned''), plt.xlabel(''frequency [Hz]'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_71_0.png)


    ![](img/6cffacf6247d6f7caa7eacc348cef427_71_1.png)


    We can see how efficiently the noisy component has been removed. In practice,
    you will have to tune filter parameters cautiously so as to not filter out the
    useful components.


    ### Centering and scaling


    Dynamic models are often built to describe the behavior of the process around
    some desired operating point. Therefore, in SysID literature, you will find the
    usage of deviation variables which are defined as follows


    $$y(k) = y_m(k) - \bar{y} \ ; \ u(k) = u_m(k) - \bar{u}$$


    Where $y_m, u_m$ are the actual raw measurements and $\bar{y}, \bar{u}$ are the
    nominal values around which the deviations are calculated. Models between $y(k)$
    and $u(k)$ therefore relate the changes in inputs to the changes in outputs. An
    obvious option is to assign values to $\bar{y}, \bar{u}$ (also called offsets)
    corresponding to the desired steady-state operating point; however, this operating
    point may not be known beforehand. The recommended and common approach is to use
    the sample means as the offsets, i.e.,


    $$\bar{y} = \frac{1}{N} \sum_{k=0}^{N-1} y_m(k) \quad ; \quad \bar{u} = \frac{1}{N}
    \sum_{k=0}^{N-1} u_m(k)$$


    Another pre-treatment best practice is to scale the deviation variables to account
    for the differences in physical units of different variables. Scaling brings all
    the variables on an equal basis and prevents any variable being given undue high
    weightage due to its numerically high spread in values. A common choice is to
    use the standard deviation to scale any variable. Both centering and scaling can
    be accomplished using Sklearn.$^{24}$


    $^{24}$ Remember to transform the validation and test data using the same offset
    and scale determined using the model fitting data'

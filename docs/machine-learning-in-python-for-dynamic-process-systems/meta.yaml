- md: '## 6.5 FIR and ARX MIMO Models


    While we have used SISO systems to illustrate the concepts, in industrial practice,
    you are more likely to deal with MISO (multi-input single output) systems where,
    as the name suggests, there are multiple input variables affecting a single output
    variable. Extension of SISO ARX and FIR models to MISO system is straightforward
    as shown below


    $ARX \ MISO \ model: \quad y(k) = \frac{B_1(q^{-1})}{A(q^{-1})} u_1(k) + \frac{B_2(q^{-1})}{A(q^{-1})}
    u_2(k) + \cdots + \frac{e(k)}{A(q^{-1})}$


    $FIR \ MISO \ model: \quad y(k) = \sum_{i=1}^{M_1} g_{1,i} u_1(k-i) + \sum_{i=1}^{M_2}
    g_{2,i} u_2(k-i) + \cdots + v(k)$


    In the expression above for the ARX MISO model, the denominator polynomial is
    assumed to be the same, $A(q^{-1})$, in the transfer operators for all the inputs.
    This is a special case of general MISO ARX model which uses different denominator
    polynomials (which however leads to nonlinear parameter estimator problem). For
    MIMO (multi-input multi-output) systems, the usual approach is to build separate
    MISO models for each output. For example, for a 2-output 2-input system, your
    ARX model could look as follows


    $A_1(q^{-1})y_1(k) = B_{11}(q^{-1})u_1(k) + B_{12}(q^{-1})u_2(k) + e_1(k)$


    $A_2(q^{-1})y_2(k) = B_{21}(q^{-1})u_1(k) + B_{22}(q^{-1})u_2(k) + e_2(k)$


    It is not difficult to see that the above framework of independent parametrization
    of $y_1$''s and $y_2$''s ARX MISO models would be sub-optimal if there are correlated
    parameters among the two MISO models. It would definitely be wiser to identify
    models for all the outputs simultaneously. Moreover, as is apparent, both FIR
    and ARX models employ a large number of parameters for MIMO case which makes model
    fitting prone to overfitting and necessitates large dataset. Fortunately, specialized
    techniques for MIMO SysID do exist. However, we will hold off our discussion of
    MIMO modeling techniques for a bit and instead look at other popular I/O modeling
    techniques in the next chapter that overcome the shortcomings of ARX models.


    This completes our quick look at two of the most popular classical linear dynamic
    models. Negligible computational burden, global optimal solution, and only a little
    demand for prior process knowledge have contributed to these models'' sustained
    popularity. By being exposed to their respective pros and cons, we hope that you
    have a good understanding of what you are signing up for (e.g., the implicit noise
    model in ARX model) when employing these models. If you find yourself in an inadvertent
    situation where ARX and FIR models fail to provide satisfactory performances,
    then you might need to play with your noise model. The next chapter aims to equip
    you with the requisite tools necessary to accomplish this.


    ## Summary


    In this chapter we studied in detail the concepts behind FIR and ARX modeling
    and looked at the pros and cons of these models. Industrially relevant case-study
    was illustrated to showcase the implementation details. Next, we will move on
    to learn about more generic linear modeling framework (of which ARX and FIR models
    can be considered special cases) which will add some powerful techniques to your
    SysID arsenal.


    # Chapter 7

    ## Input-Output Modeling - Part 2: Handling Process Noise the Right Way


    In the previous chapter we saw that the FIR and high-order models can provide
    unbiased and linear-in-parameter models, but, unfortunately, suffer from high
    variance errors due to large number of parameters. Therefore, in this chapter,
    we will look at other popular model structures, namely, ARMAX, OE, and Box-Jenkins,
    that can provide more parsimonious description of the underlying process and generate
    unbiased models. These models allow greater flexibility in noise dynamics and
    capture the fact that noise may enter (or originate in) the system at different
    points which, in turn, determines the structure of the noise transfer operator.
    However, there is no free lunch! These models generate non-linear-in-parameter
    predictors and therefore the parameter estimation procedures are computationally
    more complex. Nonetheless, addition of these models to your ML-DPM toolkit will
    allow you to choose model structure specific to the problem at hand.


    In the later part of this chapter, we will relax the stationarity conditions on
    disturbance signals and look at how to model processes with non-stationary disturbances.
    We will see how differencing input and output signals helps in removing disturbance
    non-stationarities. Using simulated illustrations, we will try to understand the
    implications of choosing these model structures. Specifically, we will study the
    following topics.


    - Introduction to ARMAX and Box-Jenkins models

    - Modeling distillation columns using ARMAX models

    - Introduction to OE model structure and its comparison to ARX model structure

    - Introduction to ARIMAX models

    - Modeling gas furnace systems using Box-Jenkins models


    ## 7.1 PEM Models


    In Chapter 6, we saw how the ARX model provides a very restrictive treatment of
    the process disturbances. We also saw how this shortcoming can lead to significant
    model bias. Accordingly, the focus in this chapter is to overcome this shortcoming
    and look at other popular alternatives to ARX model, namely, the output error
    (OE) model, the autoregressive moving average with eXogenous (ARMAX) inputs model,
    and the Box-Jenkins (BJ) model. As shown in Figure 7.1, these parametric models
    provide a broad spectrum of options regarding the parametrization of the noise
    transfer operator (H). For example, while disturbances are not modeled and only
    input transfer operator is sought in OE framework, completely independent parametrization
    of both G and H operators are allowed in the BJ model. In the next few sections,
    we will explore these models’ properties and learn how to use them judiciously.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_137_0.png)


    All the models in Figure 7.1 belong to the family of prediction error methods
    wherein the model parameters are estimated by minimizing the one-step ahead prediction
    errors (ε(k)) where,


    $\varepsilon(k) = y(k) - \hat{y}(k|k-1)$


    Optimal model prediction based on information up to time $k-1$


    Using the transfer operator model form, an expression for $\hat{y}(k|k-1)$ in
    terms of past (input and output) measurements (and predictions in some cases)
    can be easily derived to give the following expression


    $\hat{y}(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k)$


    eq. 1


    We will use Eq. 1$^{54}$ in the coming sections to derive the difference equation
    expressions for the model predictions.


    ### PEM predictors


    To derive the expression for PEM model predictions, we can follow the below steps.


    $y(k) = G u(k) + H e(k)$

    $\Rightarrow H^{-1} y(k) = H^{-1} G u(k) + e(k)$

    $\Rightarrow y(k) + H^{-1} y(k) = y(k) + H^{-1} G u(k) + e(k)$

    $\Rightarrow y(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k) + e(k)$


    eq. 1


    $\Rightarrow \hat{y}(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k)$


    Since $e(k)$ is white noise, it''s most probable value at time $k$ is zero


    Let''s use the above predictor for ARX model where $G = \frac{q^{-d} B}{A}$ and
    $H = \frac{1}{A}$. Eq. 1 gives


    $\hat{y}(k) = [1 - A] y(k) + q^{-d} B u(k)$

    $\Rightarrow \hat{y}(k) = -a_1 y(k-1) - a_2 y(k-2) \cdots - a_{n_a} y(k-n_a)$

    $\quad + b_1 u(k-d-1) + \cdots + b_{n_b} u(k-d-n_b)$


    The above expression for ARX predictor could also have been obtained by simply
    setting $e(k)$ to zero in the ARX model''s difference equation.


    $^{54}$ To be read as $\hat{y}(k) = [1 - H^{-1}(q^{-1})] y(k) + H^{-1}(q^{-1})
    G(q^{-1}) U(k)$. We will skip the $q$ notation in certain expressions for presentation
    clarity.


    ## 7.2 ARMAX Models: An Introduction


    Autoregressive moving average with eXogenous inputs (ARMAX) model is extension
    of ARMA time series model to I/O systems. As shown in Figure 7.2, the current
    output value is related to the past measurements of inputs and outputs, and the
    past noise values as well! With ARMA disturbances, greater flexibility is provided
    to the noise model (compared to ARX) and therefore, ARMAX is a popular model for
    industrial processes. Note that if $n_c= 0$, then ARMAX model reduces to an ARX
    model, and if additionally, $n_a= 0$, then a FIR model results. Also note that
    the $G$ and $H$ operators are not independently parametrized due to the common
    denominator polynomial, and therefore, the potential for model bias (due to inaccurate
    noise model) remains.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_139_0.png)'
  mdcn: '## 6.5 FIR与ARX MIMO模型


    虽然我们使用SISO系统来阐述概念，但在工业实践中，你更可能处理的是MISO（多输入单输出）系统，顾名思义，该系统有多个输入变量影响单个输出变量。将SISO
    ARX和FIR模型扩展到MISO系统是直接的，如下所示


    $ARX \ MISO \ 模型: \quad y(k) = \frac{B_1(q^{-1})}{A(q^{-1})} u_1(k) + \frac{B_2(q^{-1})}{A(q^{-1})}
    u_2(k) + \cdots + \frac{e(k)}{A(q^{-1})}$


    $FIR \ MISO \ 模型: \quad y(k) = \sum_{i=1}^{M_1} g_{1,i} u_1(k-i) + \sum_{i=1}^{M_2}
    g_{2,i} u_2(k-i) + \cdots + v(k)$


    在上述ARX MISO模型的表达式中，假设所有输入的传递算子中的分母多项式是相同的，即$A(q^{-1})$。这是通用MISO ARX模型的一个特例，后者使用不同的分母多项式（但这会导致非线性参数估计问题）。对于MIMO（多输入多输出）系统，通常的方法是为每个输出构建独立的MISO模型。例如，对于一个2输出2输入系统，你的ARX模型可能如下所示


    $A_1(q^{-1})y_1(k) = B_{11}(q^{-1})u_1(k) + B_{12}(q^{-1})u_2(k) + e_1(k)$


    $A_2(q^{-1})y_2(k) = B_{21}(q^{-1})u_1(k) + B_{22}(q^{-1})u_2(k) + e_2(k)$


    不难看出，如果两个MISO模型之间存在相关参数，上述独立参数化$y_1$和$y_2$的ARX MISO模型框架将是次优的。同时识别所有输出的模型肯定会更明智。此外，显而易见的是，对于MIMO情况，FIR和ARX模型都使用大量参数，这使得模型拟合容易过拟合，并且需要大量数据集。幸运的是，确实存在专门用于MIMO系统辨识的技术。然而，我们将暂时搁置对MIMO建模技术的讨论，转而在下一章探讨其他流行的I/O建模技术，这些技术克服了ARX模型的缺点。


    至此，我们快速了解了两种最流行的经典线性动态模型。可忽略的计算负担、全局最优解以及对先验过程知识的少量需求，是这些模型持续受欢迎的原因。通过了解它们各自的优缺点，我们希望你能很好地理解在使用这些模型时（例如，ARX模型中隐含的噪声模型）你将面临什么。如果你发现自己无意中处于ARX和FIR模型无法提供令人满意性能的情况，那么你可能需要调整你的噪声模型。下一章旨在为你提供实现这一目标所需的必要工具。


    ## 总结


    在本章中，我们详细研究了FIR和ARX建模背后的概念，并探讨了这些模型的优缺点。通过一个工业相关的案例研究，展示了实施细节。接下来，我们将学习更通用的线性建模框架（ARX和FIR模型可视为其特例），这将为你的系统辨识工具箱增添一些强大的技术。


    # 第7章

    ## 输入-输出建模 - 第二部分：正确处理过程噪声


    在上一章中，我们看到FIR和高阶模型可以提供无偏且参数线性的模型，但不幸的是，由于参数数量多，它们存在高方差误差。因此，在本章中，我们将探讨其他流行的模型结构，即ARMAX、OE和Box-Jenkins，它们可以提供对底层过程更简约的描述，并生成无偏模型。这些模型在噪声动态方面提供了更大的灵活性，并捕捉了噪声可能在不同点进入（或起源于）系统这一事实，这反过来决定了噪声传递算子的结构。然而，天下没有免费的午餐！这些模型生成参数非线性的预测器，因此参数估计过程在计算上更为复杂。尽管如此，将这些模型添加到你的ML-DPM工具包中，将使你能够根据手头的问题选择特定的模型结构。


    在本章的后半部分，我们将放宽对扰动信号的平稳性条件，并探讨如何对具有非平稳扰动的过程进行建模。我们将看到对输入和输出信号进行差分如何有助于消除扰动的非平稳性。通过模拟示例，我们将尝试理解选择这些模型结构的含义。具体来说，我们将研究以下主题。


    - ARMAX和Box-Jenkins模型简介

    - 使用ARMAX模型对精馏塔建模

    - OE模型结构简介及其与ARX模型结构的比较

    - ARIMAX模型简介

    - 使用Box-Jenkins模型对燃气炉系统建模


    ## 7.1 PEM模型


    在第6章中，我们看到了ARX模型如何对过程扰动进行非常严格的处理。我们也看到了这个缺点如何导致显著的模型偏差。因此，本章的重点是克服这个缺点，并探讨ARX模型的其他流行替代方案，即输出误差（OE）模型、带外生输入的自回归滑动平均（ARMAX）模型和Box-Jenkins（BJ）模型。如图7.1所示，这些参数模型在噪声传递算子（H）的参数化方面提供了广泛的选择。例如，在OE框架中，不建模扰动，只寻求输入传递算子；而在BJ模型中，允许G和H算子完全独立地参数化。在接下来的几节中，我们将探索这些模型的特性，并学习如何明智地使用它们。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_137_0.png)


    图7.1中的所有模型都属于预测误差方法家族，其中模型参数通过最小化一步超前预测误差（ε(k)）来估计，其中，


    $\varepsilon(k) = y(k) - \hat{y}(k|k-1)$


    基于直到时间$k-1$信息的最优模型预测


    使用传递算子模型形式，可以很容易地推导出$\hat{y}(k|k-1)$关于过去（输入和输出）测量值（在某些情况下包括预测值）的表达式，得到以下表达式


    $\hat{y}(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k)$


    公式 1


    我们将在接下来的几节中使用公式1$^{54}$来推导模型预测的差分方程表达式。


    ### PEM预测器


    为了推导PEM模型预测的表达式，我们可以遵循以下步骤。


    $y(k) = G u(k) + H e(k)$

    $\Rightarrow H^{-1} y(k) = H^{-1} G u(k) + e(k)$

    $\Rightarrow y(k) + H^{-1} y(k) = y(k) + H^{-1} G u(k) + e(k)$

    $\Rightarrow y(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k) + e(k)$


    公式 1


    $\Rightarrow \hat{y}(k) = [1 - H^{-1}] y(k) + H^{-1} G u(k)$


    由于$e(k)$是白噪声，它在时间$k$最可能的值是零


    让我们将上述预测器用于ARX模型，其中$G = \frac{q^{-d} B}{A}$且$H = \frac{1}{A}$。公式1给出


    $\hat{y}(k) = [1 - A] y(k) + q^{-d} B u(k)$

    $\Rightarrow \hat{y}(k) = -a_1 y(k-1) - a_2 y(k-2) \cdots - a_{n_a} y(k-n_a)$

    $\quad + b_1 u(k-d-1) + \cdots + b_{n_b} u(k-d-n_b)$


    上述ARX预测器的表达式也可以通过简单地将ARX模型差分方程中的$e(k)$设为零来获得。


    $^{54}$ 应读作$\hat{y}(k) = [1 - H^{-1}(q^{-1})] y(k) + H^{-1}(q^{-1}) G(q^{-1})
    U(k)$。为了表达清晰，我们将在某些表达式中省略$q$符号。


    ## 7.2 ARMAX模型简介


    带外生输入的自回归滑动平均（ARMAX）模型是ARMA时间序列模型向I/O系统的扩展。如图7.2所示，当前输出值与输入和输出的过去测量值以及过去的噪声值都有关！通过使用ARMA扰动，噪声模型（与ARX相比）提供了更大的灵活性，因此ARMAX是工业过程的流行模型。注意，如果$n_c=
    0$，则ARMAX模型简化为ARX模型；如果进一步$n_a= 0$，则得到FIR模型。还要注意，由于共同的分母多项式，$G$和$H$算子不是独立参数化的，因此，由于不准确的噪声模型导致的模型偏差可能性仍然存在。


    ![](img/6cffacf6247d6f7caa7eacc348cef427_139_0.png)'

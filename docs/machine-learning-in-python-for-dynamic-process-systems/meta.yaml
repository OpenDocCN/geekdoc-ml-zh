  md: '# # Chapter 7

    ## Input-Output Modeling - Part 2:

    ## Handling Process Noise the Right Way


    In the previous chapter we saw that the FIR and high-order models can provide
    unbiased and linear-in-parameter models, but, unfortunately, suffer from high
    variance errors due to large number of parameters. Therefore, in this chapter,
    we will look at other popular model structures, namely, ARMAX, OE, and Box-Jenkins,
    that can provide more parsimonious description of the underlying process and generate
    unbiased models. These models allow greater flexibility in noise dynamics and
    capture the fact that noise may enter (or originate in) the system at different
    points which, in turn, determines the structure of the noise transfer operator.
    However, there is no free lunch! These models generate non-linear-in-parameter
    predictors and therefore the parameter estimation procedures are computationally
    more complex. Nonetheless, addition of these models to your ML-DPM toolkit will
    allow you to choose model structure specific to the problem at hand.


    In the later part of this chapter, we will relax the stationarity conditions on
    disturbance signals and look at how to model processes with non-stationary disturbances.
    We will see how differencing input and output signals helps in removing disturbance
    non-stationarities. Using simulated illustrations, we will try to understand the
    implications of choosing these model structures. Specifically, we will study the
    following topics.


    +   - Introduction to ARMAX and Box-Jenkins models

    - Modeling distillation columns using ARMAX models

    - Introduction to OE model structure and its comparison to ARX model structure

    - Introduction to ARIMAX models

    - Modeling gas furnace systems using Box-Jenkins models'

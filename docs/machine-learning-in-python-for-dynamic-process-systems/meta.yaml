    | Layer (type) | Output Shape | Param # |\n| :--- | :--- | :--- |\n| lstm (LSTM)\
    \ | (None, 6) | 216 |\n| dense (Dense) | (None, 1) | 7 |\n| Total params: 223\
    \ | | |\n| Trainable params: 223 | | |\n| Non-trainable params: 0 | | |\n\n> In\
    \ vanilla RNN cell, we saw that $W_x \\in R^{n \\times m}$, $W_h \\in R^{n \\\
    times n}$ and, $b \\in R^n$. This leads to total number of parameters equal to\
    \ $mn + n^2 + n$. In an LSTM cell, each of the 4 neural layers have their own\

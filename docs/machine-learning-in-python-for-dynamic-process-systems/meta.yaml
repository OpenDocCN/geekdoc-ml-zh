    \n```\n# infinite-step ahead predictions [first nTimeSteps samples are used as\
    \ initial conditions]\ny_val_scaled_sim = np.copy(y_val_scaled)\n\nfor sample\
    \ in range(nTimeSteps, X_val_scaled.shape[0]):\n    X_val_scaled_sim = np.hstack((u_val_scaled,\
    \ y_val_scaled_sim))\n    inputSequence = X_val_scaled_sim[sample-nTimeSteps:sample,\
    \ :]\n    inputSequence = inputSequence[None,:,:]\n    sim_response = model.predict(inputSequence)\n\
    \    y_val_scaled_sim[sample] = sim_response\n\ny_val_pred_sim = y_scaler.inverse_transform(y_val_scaled_sim)\n\
    ```\n\nPlots below show the 1-step ahead and the infinite-step ahead predictions\
    \ (simulation response) for the LSTM-NARX model."
  merge: -1

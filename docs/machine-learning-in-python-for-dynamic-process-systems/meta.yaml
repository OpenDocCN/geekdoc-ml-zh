    \ using AIC-based algorithm in the Python package SysIdentPY. Let’s see how this\
    \ package can be used for nonlinear identification of an industrial heat exchanger.\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_177_0.png)\n\n$^{74}$ Very often, $d$\
    \ is kept zero and only the input and output lags ($n$ and $m$) are optimized\
    \ for a given polynomial degree.\n$^{75}$ In a recent work by Sun & Braatz (ALVEN:\
    \ Algebraic learning via elastic net for static and dynamic nonlinear system identification,\
    \ Computers & Chemical Engineering, 2020), a DALVEN methodology has been proposed\
    \ that uses a combination of nonlinear transformations, univariate feature selection,\
    \ and elastic net regression for NARX structure selection.\n\n## 9.3 Nonlinear\
    \ Identification of a Heat Exchanger Process Using NARX\n\nTo demonstrate the\
    \ utility of nonlinear SysID, we will use data from a liquid-saturated steam heat\
    \ exchanger<sup>76</sup> where hot saturated steam is used to heat cold liquid.\
    \ The provided dataset contains 4000 samples (sampling time 1s) of input (liquid\
    \ flow rate) and output (outlet liquid temperature) variables. For this benchmark\
    \ nonlinear process, our objective will be to build a dynamic model to predict\
    \ the outlet liquid temperature as a function of incoming liquid flowrate. The\
    \ dataset can be downloaded from the DalSy datasets repository.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_178_0.png)\n\
    \nFigure 9.3: Liquid-saturated steam heat exchanger\n\nWe will use the SysIdentPy\
    \ package for this nonlinear SysID exercise. Let’s begin by exploring the dataset.\n\
    \n```\n# import packages\nimport matplotlib.pyplot as plt, numpy as np\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom statsmodels.graphics.tsaplots import plot_acf\n\
    from statsmodels.tsa.stattools import ccf\n```\n\n```\nfrom sysidentpy.model_structure_selection\
    \ import FROLS\nfrom sysidentpy.basis_function._basis_function import Polynomial\n\
    from sysidentpy.utils.display_results import results\n\n# read heat-exchanger\
    \ data\ndata = np.loadtxt('exchanger.dat')\nu = data[:,1, None]; y = data[:,2,\
    \ None]\n\nplt.figure(), plt.plot(u, 'steelblue'), plt.ylabel('u(k)'), plt.xlabel('k')\n\
    plt.figure(), plt.plot(y, 'g'), plt.ylabel('y(k)'), plt.xlabel('k')\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_179_0.png)\n\
    \nNext, we will split the dataset into training (75%) and test (25%) datasets,\
    \ and center them.\n\n```\n# split into training and test dataset\nu_fit = u[:3000,0:1];\
    \ u_test = u[3000:,0:1]\ny_fit = y[:3000,0:1]; y_test = y[3000:,0:1]\n\nu_scaler\
    \ = StandardScaler(with_std=False)\nu_fit_centered = u_scaler.fit_transform(u_fit);\
    \ u_test_centered = u_scaler.transform(u_test)\ny_scaler = StandardScaler(with_std=False)\n\
    y_fit_centered = y_scaler.fit_transform(y_fit); y_test_centered = y_scaler.transform(y_test)\n\
    ```\n\nTo fit the polynomial NARX, we need to specify the polynomial degree and\
    \ the lags. The authors of the dataset recommend<sup>77</sup> “a lag of 3 for\
    \ the ‘AR part’ and 9 for the ‘X part’”. For polynomial degree, a value of 2 is\
    \ chosen to start with. SysIdentPY uses AIC to determine which specific polynomial\
    \ terms become part of the regressor set in the model. The following code achieves\
    \ this.\n\n> <sup>77</sup> Bittanti and L. Piroddi, \"Nonlinear identification\
    \ and control of a heat exchanger: a neural network approach\", Journal of the\
    \ Franklin Institute, 1996.\n\n```\n# fit NARX model\nbasis_function = Polynomial(degree=2)\n\
    model = FROLS(\n    order_selection=True,\n    n_info_values=75,\n    ylag=3,\
    \ xlag=9,\n    info_criteria='aic',\n    estimator='least_squares',\n    basis_function=basis_function\n\
    )\nmodel.fit(X=u_fit_centered, y=y_fit_centered)\n```\n\nA total of 57 polynomial\
    \ terms are selected by SysIdentPy as part of the regressor set. The snippet below\
    \ shows some of the terms ['x1' to be read as 'u'].\n\n| Regressors | Parameters\
    \ | ERR |\n|---|---|---|\n| 0 | y(k-1) | 6.0490E-01 | 9.45813556E-01 |\n| 1 |\
    \ y(k-2) | -5.5109E-01 | 2.63576840E-03 |\n| 2 | x1(k-5)y(k-1) | 5.6995E-01 |\
    \ 1.19429351E-03 |\n| 3 | x1(k-3) | -2.1264E+00 | 7.19976894E-04 |\n| 4 | x1(k-2)\
    \ | -2.4622E+00 | 6.25218348E-04 |\n| 5 | x1(k-4) | -1.9460E+00 | 6.39866753E-04\
    \ |\n| 6 | y(k-3) | 2.3011E-01 | 5.98553280E-04 |\n| 7 | x1(k-5)^2 | -2.2581E+00\
    \ | 4.96492047E-04 |\n| 8 | x1(k-6)y(k-2) | -4.3001E-01 | 2.22025182E-04 |\n|\
    \ 9 | x1(k-2)^2 | -3.0755E+00 | 3.18688092E-04 |\n| 10 | x1(k-1) | -1.3935E+00\
    \ | 3.00926941E-04 |\n| 11 | x1(k-5) | 1.5733E+00 | 4.40167349E-04 |\n\nWith the\
    \ model now available, let's start with residual analysis.\n\n```\n# get model\
    \ (1-step ahead) predictions and residuals on training dataset\ny_fit_predicted_centered\
    \ = model.predict(X=u_fit_centered, y=y_fit_centered, steps_ahead=1)\ny_fit_predicted\
    \ = y_scaler.inverse_transform(y_fit_predicted_centered)\nresiduals_fit = y_fit\
    \ - y_fit_predicted\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_180_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_180_1.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_181_0.png)\n\
    \nThe CCF plot is not terrible but throws some doubt on the acceptability of the\
    \ model. To check if the model can be useful, let's check the model's simulation\
    \ response on the test dataset.\n\n```\n# infinite-step ahead predictions on test\
    \ dataset\ny_test_predicted_centered = model.predict(X=u_test_centered, y=y_test_centered,\
    \ steps_ahead=None)\ny_test_predicted = y_scaler.inverse_transform(y_test_predicted_centered)\n\
    \nplt.figure(), plt.plot(y_test, 'g', label='Measurements'), plt.plot(y_test_predicted,\
    \ 'r', label='Predictions')\nplt.title('Test data'), plt.ylabel('y(k): Measured\
    \ vs predicted'), plt.xlabel('k'), plt.legend()\nplt.figure(), plt.plot(y_test,\
    \ y_test_predicted, '.')\nplt.title('Test data (simulation response)'), plt.ylabel('y(k):\
    \ Measured'), plt.xlabel('y(k): Predicted')\n```\n\nPlots below show the infinite-step\
    \ ahead predictions (simulation response) for the NARX model. For comparison,\
    \ an ARX model was also generated.\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_181_1.png)\n\
    \nIt is apparent that the model provides good simulation performance and therefore\
    \ provides confidence that the model has managed to adequately capture the deterministic\
    \ relationship of the process. Moreover, it is not surprising that the linear\
    \ model struggles to capture the relationship adequately. Polynomial degree of\
    \ 2 provides reasonably good performance and therefore, we will not optimize it\
    \ any further. In a generic exercise, an optimization scheme will need to be adopted\
    \ for a more systematic optimal selection of model hyperparameters.\n\n## 9.4\
    \ Introduction to Block-Structured Nonlinear Models\n\nBlock-structured models\
    \ describe nonlinear processes through separate blocks of static nonlinearity\
    \ and linear dynamics as shown in Figure 9.4. Two separate scenarios have been\
    \ depicted in the figure: the nonlinearity is at the input for a Hammerstein process\
    \ while for a Wiener process, the nonlinearity is at the output<sup>78</sup>.\
    \ While this blocks-based construct may seem very simple (and restrictive), it\
    \ has been successfully used to model several complex industrial processes. For\
    \ example, an industrial scale MPC-controlled air separation plant was modeled\
    \ via Hammerstein-Wiener model using real process data by Pattison et. al. and\
    \ used for optimizing plant scheduling under varying product demands<sup>79</sup>.\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_182_0.png)\n\n<sup>78</sup> Other combinations\
    \ of nonlinear and linear blocks (such as nonlinear-linear-nonlinear) have also\
    \ been employed by SysID community.\n<sup>79</sup> Pattison et. al., Optimal process\
    \ operations in fast-changing electricity markets: framework for scheduling with\
    \ low-order dynamic models and an air separation application, *Industrial & Engineering\
    \ Chemistry Research*, 2016"
  mdcn: "多项式NARX辨识中的主要挑战是模型结构选择。即使对于适中的滞后值（$n_a$，$n_b$）和多项式次数$^{74}$，潜在回归项的数量也可能变得非常大，而包含许多项会增加过拟合的风险。幸运的是，在Python包SysIdentPY中，这项任务可以通过基于AIC的算法自动完成$^{75}$。让我们看看如何使用这个包对工业换热器进行非线性辨识。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_177_0.png)\n\n$^{74}$ 通常，$d$保持为零，仅针对给定的多项式次数优化输入和输出滞后（$n$和$m$）。\n\
    $^{75}$ 在Sun & Braatz最近的工作（ALVEN: Algebraic learning via elastic net for static\
    \ and dynamic nonlinear system identification, Computers & Chemical Engineering,\
    \ 2020）中，提出了一种DALVEN方法，该方法结合了非线性变换、单变量特征选择和弹性网回归，用于NARX结构选择。\n\n## 9.3 使用NARX对换热器过程进行非线性辨识\n\
    \n为了展示非线性系统辨识的实用性，我们将使用来自液体饱和蒸汽换热器<sup>76</sup>的数据，其中热饱和蒸汽用于加热冷液体。提供的数据集包含4000个样本（采样时间1秒），包括输入（液体流量）和输出（出口液体温度）变量。对于这个基准非线性过程，我们的目标是建立一个动态模型，将出口液体温度预测为入口液体流量的函数。该数据集可以从DalSy数据集仓库下载。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_178_0.png)\n\n图9.3：液体饱和蒸汽换热器\n\n我们将使用SysIdentPy包进行这次非线性系统辨识练习。让我们首先探索数据集。\n\
    \n```\n# import packages\nimport matplotlib.pyplot as plt, numpy as np\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom statsmodels.graphics.tsaplots import plot_acf\n\
    from statsmodels.tsa.stattools import ccf\n```\n\n```\nfrom sysidentpy.model_structure_selection\
    \ import FROLS\nfrom sysidentpy.basis_function._basis_function import Polynomial\n\
    from sysidentpy.utils.display_results import results\n\n# read heat-exchanger\
    \ data\ndata = np.loadtxt('exchanger.dat')\nu = data[:,1, None]; y = data[:,2,\
    \ None]\n\nplt.figure(), plt.plot(u, 'steelblue'), plt.ylabel('u(k)'), plt.xlabel('k')\n\
    plt.figure(), plt.plot(y, 'g'), plt.ylabel('y(k)'), plt.xlabel('k')\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_179_0.png)\n\
    \n接下来，我们将数据集分为训练集（75%）和测试集（25%），并进行中心化处理。\n\n```\n# split into training and test\
    \ dataset\nu_fit = u[:3000,0:1]; u_test = u[3000:,0:1]\ny_fit = y[:3000,0:1];\
    \ y_test = y[3000:,0:1]\n\nu_scaler = StandardScaler(with_std=False)\nu_fit_centered\
    \ = u_scaler.fit_transform(u_fit); u_test_centered = u_scaler.transform(u_test)\n\
    y_scaler = StandardScaler(with_std=False)\ny_fit_centered = y_scaler.fit_transform(y_fit);\
    \ y_test_centered = y_scaler.transform(y_test)\n```\n\n为了拟合多项式NARX，我们需要指定多项式次数和滞后值。数据集的作者建议<sup>77</sup>“‘AR部分’的滞后为3，‘X部分’的滞后为9”。对于多项式次数，我们首先选择值为2。SysIdentPY使用AIC来确定哪些特定的多项式项成为模型回归项集的一部分。以下代码实现了这一点。\n\
    \n> <sup>77</sup> Bittanti and L. Piroddi, \"Nonlinear identification and control\
    \ of a heat exchanger: a neural network approach\", Journal of the Franklin Institute,\
    \ 1996.\n\n```\n# fit NARX model\nbasis_function = Polynomial(degree=2)\nmodel\
    \ = FROLS(\n    order_selection=True,\n    n_info_values=75,\n    ylag=3, xlag=9,\n\
    \    info_criteria='aic',\n    estimator='least_squares',\n    basis_function=basis_function\n\
    )\nmodel.fit(X=u_fit_centered, y=y_fit_centered)\n```\n\nSysIdentPy总共选择了57个多项式项作为回归项集的一部分。下面的代码片段显示了其中一些项（'x1'应读作'u'）。\n\
    \n| 回归项 | 参数 | ERR |\n|---|---|---|\n| 0 | y(k-1) | 6.0490E-01 | 9.45813556E-01\
    \ |\n| 1 | y(k-2) | -5.5109E-01 | 2.63576840E-03 |\n| 2 | x1(k-5)y(k-1) | 5.6995E-01\
    \ | 1.19429351E-03 |\n| 3 | x1(k-3) | -2.1264E+00 | 7.19976894E-04 |\n| 4 | x1(k-2)\
    \ | -2.4622E+00 | 6.25218348E-04 |\n| 5 | x1(k-4) | -1.9460E+00 | 6.39866753E-04\
    \ |\n| 6 | y(k-3) | 2.3011E-01 | 5.98553280E-04 |\n| 7 | x1(k-5)^2 | -2.2581E+00\
    \ | 4.96492047E-04 |\n| 8 | x1(k-6)y(k-2) | -4.3001E-01 | 2.22025182E-04 |\n|\
    \ 9 | x1(k-2)^2 | -3.0755E+00 | 3.18688092E-04 |\n| 10 | x1(k-1) | -1.3935E+00\
    \ | 3.00926941E-04 |\n| 11 | x1(k-5) | 1.5733E+00 | 4.40167349E-04 |\n\n模型现已建立，让我们开始进行残差分析。\n\
    \n```\n# get model (1-step ahead) predictions and residuals on training dataset\n\
    y_fit_predicted_centered = model.predict(X=u_fit_centered, y=y_fit_centered, steps_ahead=1)\n\
    y_fit_predicted = y_scaler.inverse_transform(y_fit_predicted_centered)\nresiduals_fit\
    \ = y_fit - y_fit_predicted\n```\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_180_0.png)\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_180_1.png)\n\n![](img/6cffacf6247d6f7caa7eacc348cef427_181_0.png)\n\
    \nCCF图不算太差，但对模型的可接受性提出了一些疑问。为了检查模型是否有用，让我们检查模型在测试数据集上的仿真响应。\n\n```\n# infinite-step\
    \ ahead predictions on test dataset\ny_test_predicted_centered = model.predict(X=u_test_centered,\
    \ y=y_test_centered, steps_ahead=None)\ny_test_predicted = y_scaler.inverse_transform(y_test_predicted_centered)\n\
    \nplt.figure(), plt.plot(y_test, 'g', label='Measurements'), plt.plot(y_test_predicted,\
    \ 'r', label='Predictions')\nplt.title('Test data'), plt.ylabel('y(k): Measured\
    \ vs predicted'), plt.xlabel('k'), plt.legend()\nplt.figure(), plt.plot(y_test,\
    \ y_test_predicted, '.')\nplt.title('Test data (simulation response)'), plt.ylabel('y(k):\
    \ Measured'), plt.xlabel('y(k): Predicted')\n```\n\n下面的图显示了NARX模型的无限步预测（仿真响应）。为了比较，也生成了一个ARX模型。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_181_1.png)\n\n显然，该模型提供了良好的仿真性能，因此我们有信心该模型已成功充分捕捉了过程的确定性关系。此外，线性模型难以充分捕捉这种关系也就不足为奇了。多项式次数为2提供了相当好的性能，因此我们不再对其进行进一步优化。在一般性练习中，需要采用优化方案来更系统地选择模型超参数。\n\
    \n## 9.4 块结构非线性模型简介\n\n块结构模型通过静态非线性和线性动态的独立块来描述非线性过程，如图9.4所示。图中描绘了两种不同的场景：对于Hammerstein过程，非线性位于输入端；而对于Wiener过程，非线性位于输出端<sup>78</sup>。虽然这种基于块的结构看起来可能非常简单（且受限），但它已成功用于建模多个复杂的工业过程。例如，Pattison等人使用真实过程数据，通过Hammerstein-Wiener模型对工业规模的MPC控制空分装置进行了建模，并用于在变化的产品需求下优化工厂调度<sup>79</sup>。\n\
    \n![](img/6cffacf6247d6f7caa7eacc348cef427_182_0.png)\n\n<sup>78</sup> 系统辨识界也采用了非线性和线性块的其他组合（如非线性-线性-非线性）。\n\
    <sup>79</sup> Pattison et. al., Optimal process operations in fast-changing electricity\
    \ markets: framework for scheduling with low-order dynamic models and an air separation\
    \ application, *Industrial & Engineering Chemistry Research*, 2016"

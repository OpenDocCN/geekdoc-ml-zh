  md: '# 1.2 ML-DPM Workflow


    Figure 1.4 shows the typical steps involved in system identification. As you can
    see, SysID is more than just curve fitting. Overall, there are five broad tasks:
    data collection, exploratory data analysis, data pre-treatment, model identification,
    and model validation. Although we will study each step in detail in Chapter 4,
    let’s take a quick overview:


    +   - **Data collection and exploratory data analysis**: Availability of ‘proper’
    data is absolutely critical and the requirement of ‘richness’ of training data
    is indispensable. In the previous section we saw that dynamic modeling is more
    demanding than static modeling and consequently, there are more stringent requirements
    on training data for dynamic modeling. Training data may be taken from historical
    database or fresh experiments may be performed. The training inputs should be
    such that the output data contains the dynamic variations of interest.


    Exploratory data analysis (EDA) involves preliminary (and usually manual) investigation
    of data to get a ‘feel’ of the system’s characteristics. The activities may include
    generating some graphical plots to check the presence of trends, seasonality,
    and non-stationarity in data. Inferences made during EDA help make the right choices
    in the subsequent steps of SysID.


    +   - **Data pre-treatment**: This step consists of several activities that are
    designed to remove the portions of training data that are unimportant (or even
    detrimental) to model identification. It may entail removal of outliers and noise,
    removal of trends, etc. Alternatively, training data can also be massaged to manipulate
    the model’s accuracy as suited for the end purpose of the model. For example,
    if the model is to be used for control purpose, then the training data may be
    pre-filtered to bolster model’s accuracy for high frequency signals. Overall,
    the generic guideline is that you have better chances of a successful SysID with
    a better conditioned dataset.


    +   - **Model training**: Model training is the most critical step in SysID and
    entails a few sub-steps. First, a choice must be made on the type of disturbance
    model and deterministic model. The end use of the model, the available *a priori*
    system knowledge, and the desired degree of modeling complexity dictate these
    selections. For example, if the model is to be used for simulation purposes, then
    OE¹ structure may be preferred over ARX; if process disturbance has different
    dynamics compared to process input, then


    ¹ We will cover these model structures in the upcoming chapters'
  merge: -1

    ### 中心化与缩放


    动态模型通常用于描述过程在某个期望工作点附近的行为。因此，在系统辨识文献中，你会发现偏差变量的使用，其定义如下


    $$y(k) = y_m(k) - \bar{y} \ ; \ u(k) = u_m(k) - \bar{u}$$


    其中 $y_m, u_m$ 是实际的原始测量值，$\bar{y}, \bar{u}$ 是计算偏差所围绕的标称值。因此，$y(k)$ 和 $u(k)$ 之间的模型将输入的变化与输出的变化联系起来。一个显而易见的选择是为

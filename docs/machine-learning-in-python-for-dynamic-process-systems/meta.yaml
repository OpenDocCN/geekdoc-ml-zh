- md: "## CVA states\n\nIn CVA, the two sets of vectors between which CCA is performed\
    \ are $p(k)$ (defined in Eq. 1) and $f(k)$ where$^{64}$\n\n$$f(k) = [y^T(k) \\\
    \ y^T(k+1) \\ \\cdots \\ y^T(k+l)]^T$$\n\ncurrent and future outputs\n\nCVA therefore\
    \ solves the following singular value decomposition problem and finds linear combinations\
    \ of past inputs and outputs that are maximally correlated with linear combinations\
    \ of the current and future outputs.\n\n$$\\Sigma_{pp}^{-1/2} \\Sigma_{pf} \\\
    Sigma_{ff}^{-1/2} = U \\Sigma V^T$$\n\neq. 2\n\nWe know that $\\Sigma$ is a diagonal\
    \ matrix. Its elements are also called (Hankel) singular values. If $n$ is assumed\
    \ to be the model order, then the optimal state at time $k$ that is most predictive\
    \ of the future outputs is given by$^{65}$\n\n$$\\hat{x}(k) = J_n p(k)$$\n\nContains\
    \ first $n$ rows of matrix $J = U^T \\Sigma_{pp}^{-1/2}$\n\n## System matrices\n\
    \nWith the states estimated, the system matrices $(A, B, C, D)$ can be estimated\
    \ via multivariable linear least-squares regression$^{66}$. The final expression\
    \ can be derived as\n\n$$\\begin{bmatrix} \\hat{A} & \\hat{B} \\\\ \\hat{C} &\
    \ \\hat{D} \\end{bmatrix} = cov \\left( \\begin{bmatrix} \\hat{x}(k+1) \\\\ y(k)\
    \ \\end{bmatrix}, \\begin{bmatrix} \\hat{x}(k) \\\\ u(k) \\end{bmatrix} \\right)\
    \ cov^{-1} \\left( \\begin{bmatrix} \\hat{x}(k) \\\\ u(k) \\end{bmatrix}, \\begin{bmatrix}\
    \ \\hat{x}(k) \\\\ u(k) \\end{bmatrix} \\right)$$\n\nThe noise covariance matrices,\
    \ $Q$ and $R$, can be estimated as the covariance matrices of the state and output\
    \ residuals, respectively.\n\n$$\\varepsilon_x(k) = \\hat{x}(k+1) - (\\hat{A}\\\
    hat{x}(k) + \\hat{B}u(k)) \\implies \\hat{Q} = \\Sigma_{\\varepsilon_x\\varepsilon_x}$$\n\
    $$\\varepsilon_y(k) = y(k) - (\\hat{C}\\hat{x}(k) + \\hat{D}u(k)) \\implies \\\
    hat{R} = \\Sigma_{\\varepsilon_y\\varepsilon_y}$$\n\nFigure 8.3: CVA model identification\
    \ workflow\n\n## Hyperparameter selection\n\nThe mathematical background of the\
    \ CVA algorithm suggests specification of two hyperparameters: the lag order ($l$)\
    \ and the model order ($n$). While model order specification is not required prior\
    \ to state estimation, the lag order needs to be known beforehand. Let's see the\
    \ common approaches for estimation of these hyperparameters.\n\n## Lag order ($l$)\n\
    \nThe guidance for assigning a value to the lag $l$ is that it should be large\
    \ enough to capture data autocorrelation. A commonly recommended strategy is to\
    \ fit several multivariate autoregressive models with different values of $l$\
    \ and choose the $l$ that minimizes the AIC criterion. For example, let $\\bar{l}$\
    \ be one of the trial values. Then the following relationship is set up\n\nThe\
    \ above model is fitted (via OLS) for $\\hat{l} = 1, 2, ..., l_{max}$ and AICs\
    \ are noted. Here, $l_{max}$ is some sufficiently large value. The lag value corresponding\
    \ to the minimum AIC is then chosen.\n\n## Model order ($n$)\n\nCorrect selection\
    \ of the value for $n$ is important: while too large a value leads to model overfitting,\

    ![](img/6cffacf6247d6f7caa7eacc348cef427_167_0.png)


    # Process monitoring/fault detection indices


    In CVA-based method, 3 indices - $T_s^2$, $T_e^2$, $Q$ - are computed. The computation
    of these metrics and their corresponding threshold are shown below. Note that
    the threshold expressions are based on the assumption that process variables are
    gaussian distributed; if this assumption is invalid then empirical techniques
    such as KDE or percentile may be employed.


    | Metric 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | Threshold @ significance level $\alpha$ | Threshold @ significance level $\alpha$
    | Threshold @ significance level $\alpha$ |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} g \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    +   - $J_e$ contains all except the first $n$ rows of $J$ i.e., the last $l(m+r)
    - n$ rows of $J$

    - $z = l(m+r) - n$

    - $F_{\alpha}(n, N-n)$ is the 1-$\alpha$ percentile of the $F$ distribution with
    $n$ and $N-n$ degrees of freedom

    - $\chi_{\alpha}^2$ is the (1-$\alpha$) percentile of a chi-squared distribution
    with $h$ degrees of freedom; $\mu$ denotes the mean value and $\sigma$ denotes
    the variance of the Q metric

    - Significance level of $\alpha = 0.05$ would mean that there is a 5% chance that
    an alert is false'
  - "[PAGE 168]\n\nLet's compute the monitoring indices for the training dataset.\
    \ To ensure a better understanding of the methodology, we will skip the usage\
    \ of SIPPY package for CVA modeling and carry out each step from scratch.\n\n\
    ```\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n## generate past\
    \ (p) and future (f) vectors for training dataset and center them\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    N = trainingData.shape[0]\nl = 3 # as used by Russell et. al\nm = uData_training.shape[1]\n\
    r = yData_training.shape[1]\n\npMatrix_train = np.zeros((N-2*l, l*(m+r)))\nfMatrix_train\
    \ = np.zeros((N-2*l, (l+1)*r))\nfor i in range(l, N-l):\n    pMatrix_train[i-l,:]\
    \ = np.hstack((yData_training[i-l:i,:].flatten(), uData_training[i-l:i,:].flatten()))\n\
    \    fMatrix_train[i-l,:] = yData_training[i:i+l+1,:].flatten()\n\n# center data\n\
    p_scaler = StandardScaler(with_std=False); pMatrix_train_centered = p_scaler.fit_transform(pMatrix_train)\n\
    f_scaler = StandardScaler(with_std=False); fMatrix_train_centered = f_scaler.fit_transform(fMatrix_train)\n\
    \n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n## computes covariances\
    \ and perform SVD\n%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    import scipy\n\nsigma_pp = np.cov(pMatrix_train_centered, rowvar=False)\nsigma_ff\
    \ = np.cov(fMatrix_train_centered, rowvar=False)\nsigma_pf = np.cov(pMatrix_train_centered,\
    \ fMatrix_train_centered,\n                   rowvar=False)[:len(sigma_pp),len(sigma_pp):]\n\
    \nmatrixProduct = np.dot(np.dot(np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real),\
    \ sigma_pf),\n                       np.linalg.inv(scipy.linalg.sqrtm(sigma_ff).real))\n\
    \nU, S, V = np.linalg.svd(matrixProduct)\nJ = np.dot(np.transpose(U), np.linalg.inv(scipy.linalg.sqrtm(sigma_pp).real))\n\
    \n# get the reduced order matrices\nn = 29 # as used by Russell et. al\nJn = J[:n,:]\n\
    Je = J[n:,:]\n```"

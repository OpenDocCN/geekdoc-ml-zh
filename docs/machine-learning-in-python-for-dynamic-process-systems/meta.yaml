    # White Noise


    Now that we understand ACFs, let’s formally describe the term ‘white noise’ that
    we have already used a few times. A stochastic sequence $e(k)$ is referred to
    as white noise if its samples have a probabilistic distribution with zero mean
    and finite variance (say $\sigma^2$), and the following theoretical ACF


    ![](img/6cffacf6247d6f7caa7eacc348cef427_57_0.png)


    Therefore, samples of $e(k)$ are serially uncorrelated random variables. In practice,
    the autocorrelation coefficients may not be exactly zero but will be close to
    zero. Nonetheless, it can be expected that 95% of the coefficients will lie within
    the $\pm 2/\sqrt{N}$ band as shown in Example 3.1. Also note that although gaussian
    white noise is commonly used, there are no constraints on the probability distribution
    of the samples. Accordingly, you can encounter the following notation in SysID
    literature


    $e(k) \sim WN(0, \sigma^2)$ (white noise) or $e(k) \sim GWN(0, \sigma^2)$ (gaussian
    white noise)


    A related term is iid (independent and identically distributed) noise. Every iid
    sequence is WN but not conversely. The easiest way to generate a white noise signal
    is to use Numpy’s random normal function as follows


    ```

    # import packages

    import numpy as np, matplotlib.pyplot as plt


    # generate GWN (1000 observations, mean 0, variance 1)

    e = np.random.normal(loc=0, scale=1, size=1000)

    plt.plot(e, ''black'', linewidth=0.5)

    plt.ylabel(''White noise''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_57_1.png)


    The use of the term ‘white’ to describe such a noise stems from its spectral properties
    which we will study shortly. Any noise signal that is not white is a ‘colored’
    noise signal. In essence, a white noise is perfectly unpredictable, i.e., no amount
    of past observations can provide any clues about future observations. Nevertheless,
    such signals are the basic building blocks for building complex models of disturbance
    signals (more on this in Chapter 5).'

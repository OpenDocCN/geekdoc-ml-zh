    $$= b''_1u(k-1) + b_0$$


    上述推导表明，该过程的行为实际上类似于一个双参数系统，因此，使用上述输入信号收集的输出数据无法唯一确定四个原始模型参数。换言之，由于数据信息不足，真实过程模型不可辨识。为确保可辨识性，输入变量必须受到充分激励。从数学上讲，如果满足以下条件，则称离散时间输入信号
    $u(k)$ 是 $n$ 阶持续激励的（用于唯一辨识具有 $\le n$ 个模型参数的 PEM 模型）：


    以下极限存在


    以下矩阵可逆


    $$r_u(\tau) = \lim_{N \to \infty} \frac{1}{N} \sum_{t=0}^{N} u_{t+\tau} u_t$$


    $$R_u(n) = \begin{bmatrix} r_u(0) & r_u(1) & \cdots & r_u(n-1) \\ r_u(-1) & r_u(0)
    & \cdots & r_u(n-2) \\ \vdots & \vdots & \ddots & \vdots \\ r_u(1-n) & r_u(2-n)
    & \cdots & r_u(0) \end{bmatrix}$$


    你通常不会直接使用这些理论条件，但了解它们是有价值的：阶跃输入具有 1 阶持续激励（p.e.）；全长 PRBS 具有 $M$ 阶 p.e.；GBN 信号和白噪声信号对于任何有限阶数都是持续激励的。或者，在频域中，如果

  md: '# 9.3 Nonlinear Identification of a Heat Exchanger Process Using NARX


    To demonstrate the utility of nonlinear SysID, we will use data from a liquid-saturated
    steam heat exchanger<sup>76</sup> where hot saturated steam is used to heat cold
    liquid. The provided dataset contains 4000 samples (sampling time 1s) of input
    (liquid flow rate) and output (outlet liquid temperature) variables. For this
    benchmark nonlinear process, our objective will be to build a dynamic model to
    predict the outlet liquid temperature as a function of incoming liquid flowrate.
    The dataset can be downloaded from the DalSy datasets repository.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_178_0.png)


    Figure 9.3: Liquid-saturated steam heat exchanger


    We will use the SysIdentPy package for this nonlinear SysID exercise. Let’s begin
    by exploring the dataset.


    ```

    # import packages

    import matplotlib.pyplot as plt, numpy as np

    from sklearn.preprocessing import StandardScaler

    from statsmodels.graphics.tsaplots import plot_acf

    from statsmodels.tsa.stattools import ccf

    ```'
  merge: -1
  pgno: 178
- img_proc: true
  md: '```

    from sysidentpy.model_structure_selection import FROLS

    from sysidentpy.basis_function._basis_function import Polynomial

    from sysidentpy.utils.display_results import results


    # read heat-exchanger data

    data = np.loadtxt(''exchanger.dat'')

    u = data[:,1, None]; y = data[:,2, None]


    plt.figure(), plt.plot(u, ''steelblue''), plt.ylabel(''u(k)''), plt.xlabel(''k'')

    plt.figure(), plt.plot(y, ''g''), plt.ylabel(''y(k)''), plt.xlabel(''k'')

    ```


    ![](img/6cffacf6247d6f7caa7eacc348cef427_179_0.png)


    Next, we will split the dataset into training (75%) and test (25%) datasets, and
    center them.


    ```

    # split into training and test dataset

    u_fit = u[:3000,0:1]; u_test = u[3000:,0:1]

    y_fit = y[:3000,0:1]; y_test = y[3000:,0:1]


    u_scaler = StandardScaler(with_std=False)

    u_fit_centered = u_scaler.fit_transform(u_fit); u_test_centered = u_scaler.transform(u_test)

    y_scaler = StandardScaler(with_std=False)

    y_fit_centered = y_scaler.fit_transform(y_fit); y_test_centered = y_scaler.transform(y_test)

    ```


    To fit the polynomial NARX, we need to specify the polynomial degree and the lags.
    The authors of the dataset recommend<sup>77</sup> “a lag of 3 for the ‘AR part’
    and 9 for the ‘X part’”. For polynomial degree, a value of 2 is chosen to start
    with. SysIdentPY uses AIC to determine which specific polynomial terms become
    part of the regressor set in the model. The following code achieves this.


    > <sup>77</sup> Bittanti and L. Piroddi, "Nonlinear identification and control
    of a heat exchanger: a neural network approach", Journal of the Franklin Institute,
    1996.'

  md: '# Examples on inferences drawn using CCF<sup>17</sup>


    Model structure selection:


    The CCF between $u(k)$ and $y(k)$ can give some crucial hints about the time delay
    (dead time ($d$)) of the process<sup>18</sup>. Consider the following scenario
    and the fact that dead time is the smallest value $d$ with which $u(k-1-d)$ influences
    $y(k)$ directly.


    ![](img/6cffacf6247d6f7caa7eacc348cef427_61_0.png)


    Asymmetricity is due to the fact that past values of $u(k)$ are related to $y(k)$
    differently than the future values


    A peak at lag = 3 and insignificant CCF values for lag <=2

    $\Rightarrow$ A good guess for $d$ is 2


    Residual diagnostics:


    If a model has adequately captured the relationship between input and output,
    then $\rho_{\epsilon u}(\ell)$ between the residual ($\epsilon(k)$) and the input
    sequences ($u(k)$) should be nearly zero for positive<sup>19</sup> lags because
    $\epsilon(k)$ should not have any relationship with past input values.<sup>20</sup>


    ![](img/6cffacf6247d6f7caa7eacc348cef427_61_1.png)


    Model residuals are uncorrelated with input $\Rightarrow$ no effect of input remains
    in the residuals


    <sup>17</sup> Like ACF, CCF also has a covariance counterpart called cross-covariance
    function (CCVF) and is given as $\sigma_{yu}(\ell) = \frac{1}{N} \sum_{k=\ell}^{N-1}
    (y(k) - \bar{y})(u(k - \ell) - \bar{u})$. Note that $N-\ell$ could be set as denominator
    instead of $N$ to get unbiased estimates.


    <sup>18</sup> We will formally introduce the term *dead time* in Chapter 6. But
    we figured that if you already knew what dead time is then you may appreciate
    this example.


    <sup>19</sup> Significant correlation for negative lags implies relation between
    residuals and future input values which is an indication of closed-loop feedback
    (and not necessarily model inadequacy). We will learn more on this later.


    <sup>20</sup> A small caveat here is that either $\epsilon(k)$ or $u(k)$ should
    be white to impose this condition'

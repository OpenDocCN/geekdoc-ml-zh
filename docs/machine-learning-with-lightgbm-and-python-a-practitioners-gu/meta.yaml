    # 4

    Comparing LightGBM, XGBoost, and Deep Learning


    The previous chapter introduced LightGBM for building **gradient-boosted decision
    trees (GBDTs)**. In this chapter, we compare LightGBM against two other methods
    for modeling tabular data: XGBoost, another library for building gradient-boosted
    trees, and **deep neural networks (DNNs)**, a state-of-the-art machine learning
    technique.


    We compare LightGBM, XGBoost, and DNNs on two datasets, focusing on complexity,
    dataset preparation, model performance, and training time.


    This chapter is aimed at advanced readers, and some understanding of deep learning
    is required. However, the primary purpose of the chapter is not to understand
    XGBoost or DNNs in detail (neither technique is used in subsequent chapters).
    Instead, by the end of the chapter, you should have some understanding of how
    competitive LightGBM is within the machine-learning landscape.


    The main topics are as follows:


    +   - An overview of XGBoost

    - Deep learning and TabTransformers

    - Comparing LightGBM, XGBoost, and TabTransformers


    # Technical requirements


    The chapter includes examples and code excerpts illustrating how to train LightGBM,
    XGBoost, and TabTransformer models in Python. Complete examples and instructions
    for setting up a suitable environment for this chapter are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-4.'
- md: "## An overview of XGBoost\n\n**XGBoost**, short for **eXtreme Gradient Boosting**,\
    \ is a widely popular open source gradient boosting library with similar goals\
    \ and functionality to LightGBM. XGBoost is older than LightGBM and was developed\
    \ by Tianqi Chen and initially released in 2014 [1].\n\nAt its core, XGBoost implements\
    \ GBDTs and supports building them highly efficiently. Some of the main features\
    \ of XGBoost are as follows:\n\n- **Regularization**: XGBoost incorporates both\
    \ L1 and L2 regularization to avoid overfitting\n- **Sparsity awareness**: XGBoost\
    \ efficiently handles sparse data and missing values, automatically learning the\
    \ best imputation strategy during training\n- **Parallelization**: The library\
    \ employs parallel and distributed computing techniques to train multiple trees\
    \ simultaneously, significantly reducing training time\n- **Early stopping**:\
    \ XGBoost provides an option to halt the training process if there is no significant\
    \ improvement in the model's performance, improving performance and preventing\
    \ overfitting\n- **Cross-platform compatibility**: XGBoost is available for many\
    \ programming languages, including Python, R, Java, and Scala, making it accessible\
    \ to a diverse user base\n\nOver the years, XGBoost has gained popularity in the\
    \ machine learning community due to its support for various applications and the\
    \ library's ease of use and efficiency.\n\n## Comparing XGBoost and LightGBM\n\
    \nThere is considerable overlap in functionality between XGBoost and LightGBM.\
    \ Both libraries implement GBDTs and DART and support building random forests.\
    \ Both have similar techniques to avoid overfitting and handle missing values\
    \ and sparse data automatically.\n\nHowever, some of the differences between XGBoost\
    \ and LightGBM are as follows:\n\n- **Tree-growing strategy**: XGBoost employs\
    \ a level-wise tree growth approach, where trees are built level by level, while\
    \ LightGBM uses a leaf-wise tree growth strategy that focuses on growing the tree\
    \ by choosing the leaf with the highest delta loss. This difference in growth\
    \ strategy generally makes LightGBM faster, especially for large datasets.\n-\
    \ **Speed and scalability**: LightGBM is designed to be more efficient regarding\
    \ memory usage and computation time, making it a better choice for large-scale\
    \ datasets or when training time is critical. However, this speed advantage can\
    \ sometimes come at the cost of higher variance in model predictions.\n- **Handling\
    \ categorical features**: LightGBM has built-in support for categorical features,\
    \ meaning it can handle them directly without needing one-hot encoding or other\
    \ preprocessing techniques. XGBoost, on the other hand, requires the user to preprocess\
    \ categorical features before feeding them into the model.\n- **Early stopping**:\
    \ XGBoost provides an option to halt the training process if there is no significant\
    \ improvement in the model's performance. LightGBM does not have this feature\
    \ built in, although it can be implemented manually using callbacks, as seen in\
    \ earlier chapters.\n\nIn summary, LightGBM and XGBoost provide similar functionality.\
    \ LightGBM performs better on large datasets with many features, whereas XGBoost\
    \ may provide more stable and accurate results on smaller or medium-sized datasets.\n\
    \n## Python XGBoost example\n\nXGBoost provides a scikit-learn-based interface\

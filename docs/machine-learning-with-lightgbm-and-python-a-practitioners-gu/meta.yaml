    - https://cloud.google.com/sdk/docs/install

    - https://cloud.google.com/sdk/docs/initializing


    Once the Google Cloud setup is completed, we can deploy our API using the CLI.
    This can be accomplished using a single command:


    ```

    gcloud run deploy --set-env-vars CHURN_USER=*****,CHURN_PASSWORD=***********

    ```


    Running the command prompts you for a service name and a region to deploy your
    service. We also set the environment variables needed for the security credentials.
    For deployment, Cloud Run creates Cloud Build for you, which automatically builds

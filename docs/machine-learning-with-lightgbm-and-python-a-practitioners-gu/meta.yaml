  mdcn: "流水线由任意数量的中间步骤组成，这些步骤必须是`转换器`。转换器必须同时实现`fit`和`transform`方法，而`Pipeline`类会依次调用每个转换器，首先将数据传递给`fit`，然后传递给`transform`。最后一步通常涉及将模型拟合到数据，只需实现`fit`方法。这些转换通常是预处理步骤，用于转换或增强数据。\n\
    \n使用scikit-learn流水线的主要优势在于确保工作流以清晰且可复现的方式实现。它有助于避免常见错误，例如在预处理步骤中将测试数据的统计信息泄露到训练模型中。通过将预处理步骤包含在流水线中，我们确保在训练和模型用于预测新数据时应用相同的步骤。\n\
    \n此外，scikit-learn流水线可以与模型选择和超参数调优工具（如网格搜索和交叉验证）结合使用。我们可以使用网格搜索，通过为预处理步骤和最终估计器定义参数网格，自动选择整个流水线的最佳参数。这可以显著简化代码并减少复杂机器学习工作流中的错误。诸如FLAML之类的工具也具有与scikit-learn流水线集成的功能。\n\
    \n例如，可以按如下方式创建一个简单的流水线：\n\n```\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.linear_model import LinearRegression\n\n\
    pipeline = Pipeline(\n    [\n        ('scaler', StandardScaler()),\n        ('linear',\
    \ LinearRegression())\n    ]\n)\n```\n\n这里，流水线由两个步骤组成：一个标准化数据的缩放步骤和一个拟合线性回归模型的最终步骤。\n\
    \nscikit-learn的`Pipeline`的强大之处在于，它可以像使用任何其他估计器或模型一样被使用：\n\n```\npipeline.fit(X_train,\
    \ y_train)\npipeline.predict(X_train, y_train)\n```\n\n这为我们提供了封装在流水线中的所有步骤的统一接口，并使可复现性变得轻而易举。此外，我们可以像导出其他scikit-learn模型一样导出流水线，以便部署流水线及其封装的所有步骤：\n\
    \n```\nimport joblib\njoblib.dump(pipeline, \"linear_pipeline.pkl\")\n```\n\n\
    接下来，我们将展示更多使用scikit-learn流水线的示例。\n\n尽管我们花了大量时间处理数据、构建和调优模型的问题，但我们尚未深入探讨模型训练后会发生什么。这正是MLOps（机器学习运维）发挥作用的地方。下一节将提供详细概述。\n\
    \n## 理解MLOps\n\n**机器学习运维（MLOps）** 是一个融合了机器学习和系统运维领域的实践。它旨在标准化和简化机器学习模型的开发生命周期和部署，从而提高机器学习解决方案在商业环境中的效率和效果。在许多方面，MLOps可以被视为对机器学习操作化相关挑战的回应，将DevOps原则引入机器学习领域。\n\
    \nMLOps旨在将通常专注于模型创建、实验和评估的数据科学家，与处理部署、监控和维护的运维专业人员聚集在一起。目标是促进这些团队之间更好的协作，从而实现更快、更稳健的模型部署。\n\
    \nMLOps的重要性因机器学习系统带来的独特挑战而更加突出。机器学习系统比传统软件系统更具动态性和不可预测性，这可能导致可靠性和稳健性方面的潜在挑战，尤其是在快速变化的生产环境中。\n\
    \nMLOps的一个核心目标是加速机器学习生命周期，促进更快的实验和部署。这是通过机器学习流水线的自动化实现的。**自动化**可以涵盖各个阶段，包括数据预处理、特征工程、模型训练、模型验证和部署。MLOps的另一个关键方面是确保可复现性。鉴于机器学习模型的动态特性，精确复制结果可能具有挑战性，尤其是在使用新数据重新训练模型时。MLOps强调对代码、数据和模型配置进行版本控制的重要性，这确保了每个实验都可以精确重现，这对于调试和审计至关重要。\n\
    \n**监控**也是MLOps的重要组成部分。一旦模型部署，*监控其性能并持续验证其预测至关重要*。MLOps强调需要强大的监控工具来跟踪模型性能、输入数据质量和其他关键指标。这些指标中的异常可能表明模型需要重新训练或调试。\n\
    \nMLOps还鼓励对机器学习采用稳健的测试实践。机器学习测试包括传统的软件测试实践，如单元测试和集成测试，但也包括更多特定于机器学习的测试，例如验证模型预测的统计属性。\n\
    \nMLOps还专注于管理和扩展机器学习部署。在现实世界中，机器学习模型可能需要每秒服务数千甚至数百万次预测。容器化和无服务器计算平台等DevOps实践在此发挥作用，以促进部署和扩展自动化。\n\
    \n重要的是要注意MLOps如何融入更广泛的软件生态系统。就像DevOps弥合了软件工程中开发和运维之间的差距一样，MLOps旨在为机器学习实现同样的目标。通过促进共同理解和责任，MLOps可以带来更成功的机器学习项目。\n\
    \nMLOps是一个快速发展的领域，随着越来越多的企业采用机器学习，其重要性日益增加。通过将DevOps原则应用于机器学习的独特挑战，MLOps提供了一个管理端到端机器学习生命周期的框架，从初始实验到稳健、可扩展的部署。MLOps强调标准化、自动化、可复现性、监控、测试和协作，以实现高吞吐量的机器学习系统。\n\
    \n现在，我们将看一个使用scikit-learn创建机器学习流水线并将其部署在REST API后面的实践示例。\n\n## 部署用于客户流失预测的机器学习流水线\n\
    \n在我们的实践示例中，我们将使用我们在*第5章，使用Optuna进行LightGBM参数优化*中处理过的电信（telco）客户流失数据集。该数据集包含每个客户的描述性信息（如性别、计费信息和费用）以及客户是否已离开电信提供商（流失为*是*或*否*）。我们的任务是构建一个分类模型来预测流失。\n\
    \n此外，我们希望将模型部署在REST API后面，以便它可以集成到更广泛的软件系统中。REST API应有一个端点，用于对传递给API的数据进行预测。\n\
    \n我们将使用**FastAPI**，一个现代、高性能的Python Web框架来构建我们的API。最后，我们将使用Docker将我们的模型和API部署到Google\
    \ Cloud Platform。\n\n## 使用scikit-learn构建机器学习流水线\n\n我们将首先使用scikit-learn的`Pipeline`工具集构建一个机器学习流水线。我们的流水线应封装数据清理和特征工程步骤，然后构建和调优一个合适的模型。\n\
    \n我们将评估两种建模算法：LightGBM和随机森林，因此无需对数据进行任何缩放或归一化。但是，数据集有一个每个客户的唯一标识符`customerID`，我们需要将其移除。\n\
    \n此外，数据集包含数值特征和分类特征，我们必须对分类特征实现独热编码。\n\n## 流水线预处理步骤\n\n为了在scikit-learn流水线中执行这些步骤，我们将使用`ColumnTransformer`。`ColumnTransformer`是一个`Pipeline`转换器，仅对列的子集进行操作。"

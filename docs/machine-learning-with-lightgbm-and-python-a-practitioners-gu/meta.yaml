    These "hills" can have different shapes, such as Gaussian (bell-shaped) or uniform
    (box-shaped). The height of the "hill" at any point represents the likelihood
    that a new data point would fall at that location. The Parzen estimator works
    by adding up all these "hills" to create a smooth landscape representing the estimated
    probability distribution of the data.


    In the case of TPE, the data points we care about are the parameter combinations,
    and the probability distribution is the likelihood of a set of parameters being
    good or bad [1], [2].'
  - '[PAGE 109]


    TPE starts by sampling a few random combinations of hyperparameters and evaluating
    the model''s performance for each. Based on these initial results, TPE divides
    the hyperparameter combinations into two groups: `good` (those that lead to better
    performance) and `bad` (those that lead to worse performance):


    +   - $l(x)$: The probability density function of `good` configurations

    - $g(x)$ : The probability density function of `bad` configurations


    TPE then estimates the probability distributions of hyperparameter combinations
    for both `good` and `bad` groups using the Parzen estimator technique.


    With estimations of the probability distributions available, TPE calculates the
    **Expected Improvement (EI)** of hyperparameter configurations. EI can be calculated
    as the ratio between the two densities: $\frac{l(x)}{g(x)}$. With each trail,
    the algorithm samples new hyperparameter configurations that maximize the EI.


    The tree structure in TPE comes from the algorithm''s ability to handle parameter
    interaction within the hyperparameter search space, where specific hyperparameters''
    relevance depends on others'' values. To handle this, TPE builds a hierarchical
    structure that captures the relationships between different hyperparameters and
    adapts the sampling process accordingly.


    In summary, TPE estimates the distributions of `good` and `bad` parameters and
    uses them to find optimal parameters by maximizing new trials'' expected improvement.
    TPE is cost-effective since it approximates the distributions and can search for
    better parameters optimally (in a non-exhaustive way). TPE also handles parameter
    interactions.


    An alternative algorithm provided by Optuna is the CMA-ES algorithm, which we
    discuss next.


    # **CMA-ES**


    CMA-ES is another optimization algorithm that can be used to find optimal hyperparameters
    [3]. Compared to TPE, CMA-ES is well suited to cases that involve continuous variables
    and when the search space is non-linear and non-convex.


    CMA-ES is an example of an **evolutionary algorithm (EA)**. An EA is a type of
    optimization algorithm inspired by the process of natural evolution. It aims to
    find the best solution to a problem by mimicking how nature evolves species through
    selection, reproduction, mutation, and inheritance. Evolutionary algorithms start
    with a population of candidate solutions and modify the candidates with each subsequent
    *generation* to adapt more closely to the best solution. This generational process
    is illustrated in *Figure 5.2*.'
- md: "## CMA-ES\n\nCentral to the evolutionary process of CMA-ES is the covariance\
    \ matrix. A covariance matrix is a square, symmetric matrix representing the covariance\
    \ between pairs of variables (in the case of CMA-ES, the hyperparameters), providing\
    \ insight into their relationships. The diagonal elements of the matrix represent\
    \ the variances of individual variables, while the off-diagonal elements represent\
    \ the covariances between pairs of variables. When there's a positive covariance,\
    \ it signals that the variables usually move in the same direction, either increasing\
    \ or decreasing. Conversely, a negative covariance points to a relationship where,\
    \ as one variable rises, the other tends to fall, and vice versa. A covariance\
    \ of zero suggests no linear relationship between the variables.\n\nCMA-ES applies\
    \ the evolutionary principles as follows when optimizing hyperparameters:\n\n\
    1.  Within the hyperparameter search space, initialize the mean and the covariance\
    \ matrix.\n2.  Repeat the evolutionary process:\n    I.  Generate a population\
    \ of candidates from the search space using the mean and the covariance matrix.\
    \ Each candidate represents a combination of hyperparameter values.\n    II. \
    \ Evaluate the fitness of the candidates. **Fitness** refers to the quality of\
    \ a candidate or how well it solves the optimization problem. With CMA-ES, this\
    \ means training the model on the dataset using the candidate hyperparameters\
    \ and evaluating the performance on the validation set.\n    III.  Select the\
    \ best candidates from the population.\n    IV.  Update the mean and the covariance\
    \ matrix from the best candidates.\n    V.  Repeat for a maximum number of trials\
    \ or until no improvement is seen in the population's fitness.\n\nCMA-ES performs\
    \ well in complex search spaces and intelligently samples the search space, guided\
    \ by the covariance matrix. It is beneficial when the hyperparameter search space\
    \ is complex and non-linear or when the evaluation of the validation data is noisy\
    \ (for instance, when a metric is an inconsistent performance indicator).\n\n\
    Both TPE and CMA-ES address the issues associated with hyperparameter optimization:\
    \ both algorithms effectively search a high-dimensional search space. Both algorithms\
    \ capture parameter interaction. Both algorithms give us control of the cost:\
    \ we can decide our optimization budget and limit our search to that.\n\nThe main\
    \ differences between TPE and CMA-ES lie in their overall approach. TPE is a probabilistic\
    \ model with a sequential search strategy, compared to CMA-ES, which is population-based\
    \ and evaluates solutions in parallel. This often means TPE is more exploitative\
    \ in its search, while CMA-ES balances exploration and exploitation using population\
    \ control mechanisms. However, TPE is typically more efficient than CMA-ES, especially\
    \ for a small number of parameters.\n\nOptuna provides further optimization to\
    \ the search process in pruning ineffective trials. We'll discuss some pruning\
    \ strategies next.\n\n## Pruning strategies\n\nPruning strategies refer to methods\
    \ that avoid spending optimization time on unpromising trials by pruning these\
    \ trials from the study. Pruning occurs synchronously with the model training\
    \ process: the validation error is checked during training, and the training is\
    \ stopped if the algorithm is underperforming. In this way, pruning is similar\
    \ to *early stopping*.\n\n### Median pruning\n\nOptuna provides several pruning\
    \ strategies, one of the simplest being **median pruning**. With median pruning,\
    \ each trial reports an intermediate result after *n* steps. The median of the\
    \ intermediate results is then taken, and any trials below the median of previous\
    \ trials at the same step are stopped.\n\n### Successive halving and Hyperband\n\
    \nA more sophisticated strategy is called **successive halving** [4]. This takes\
    \ a more global approach and assigns a small, equal budget of training steps to\
    \ all trials. Successive halving then proceeds iteratively: at each iteration,\
    \ the performance of each trial is evaluated, and the top half of the candidates\
    \ are selected for the next round, with the bottom half pruned away. The training\
    \ budget is doubled for the next iteration, and the process is repeated. This\
    \ way, the optimization budget is spent on the most promising candidates. As a\
    \ result, a small optimization budget is spent on eliminating the underperforming\
    \ candidates, and more resources are spent on finding the best parameters.\n\n\
    **Hyperband** is another pruning technique that extends successive halving by\
    \ incorporating random search and a multi-bracket resource allocation strategy\
    \ [5]. While successive halving efficiently narrows down a set of candidate configurations\
    \ by iteratively pruning underperforming ones and allocating more resources to\
    \ the remaining promising ones, it relies on a fixed initial set of configurations\
    \ and a single resource allocation scheme.\n\nHyperband instead uses a multi-bracket\
    \ resource allocation strategy, which divides the total computational budget into\
    \ several brackets, each representing a different level of resource allocation.\
    \ Within each bracket, successive halving is applied to iteratively eliminate\
    \ underperforming configurations and allocate more resources to the remaining\
    \ promising ones. At the beginning of each bracket, a new set of hyperparameter\
    \ configurations is sampled using random search, which allows Hyperband to explore\
    \ the hyperparameter space more broadly and reduce the risk of missing good configurations.\
    \ This concurrent process enables Hyperband to adaptively balance exploration\
    \ and exploitation in the search process, ultimately leading to more efficient\
    \ and effective hyperparameter tuning.\n\nOptuna has performed empirical studies\
    \ of optimization algorithms and corresponding pruning strategies (https://github.com/optuna/optuna/wiki/Benchmarks-with-Kurobako).\
    \ *Empirically, they found that Hyperband is the best TPE or CMA-ES optimization\
    \ strategy*.\n\nThis section gave an overview of the theory and algorithms powering\
    \ Optuna, focusing on TPE, CMA-ES, and advanced pruning strategies. In the next\
    \ section, we'll practically apply Optuna to a machine learning problem with LightGBM.\n\
    \n## Optimizing LightGBM with Optuna\n\nWe'll walk through applying Optuna using\
    \ a classification example. The problem we'll be modeling is to predict customer\
    \ churn (Yes/No) for a telecommunications provider. The dataset is available from\
    \ https://github.com/IBM/telco-customer-churn-on-icp4d/tree/master/data.\n\nThe\
    \ data describes each customer using data available to the provider – for example,\
    \ gender, whether the customer is paying for internet service, has paperless billing,\
    \ pays for tech support, and their monthly charges. The data consists of both\
    \ numeric and categorical features. The data has already been cleaned and is balanced,\
    \ allowing us to focus on the parameter optimization study.\n\nWe start by defining\
    \ the objective of our parameter study. The `objective` function is called once\
    \ for each trial. In this case, we want to train a LightGBM model on the data\
    \ and calculate the F1 score. Optuna passes a `trial` object to the `objective`\
    \ function, which we can use to set up the parameters for the specific trial.\
    \ The following is an example code snippet that shows how to define an `objective`\
    \ function with parameters:\n\n```python\ndef objective(trial):\n    boosting_type\
    \ = trial.suggest_categorical(\n        \"boosting_type\", [\"dart\", \"gbdt\"\
    ])\n    lambda_l1= trial.suggest_float(\n        'lambda_l1', 1e-8, 10.0, log=True),\n\
    \    ...\n    min_child_samples= trial.suggest_int(\n        'min_child_samples',\
    \ 5, 100),\n    learning_rate = trial.suggest_float(\n        \"learning_rate\"\
    , 0.0001, 0.5, log=True),\n    max_bin = trial.suggest_int(\n        \"max_bin\"\
    , 128, 512, 32),\n    n_estimators = trial.suggest_int(\n        \"n_estimators\"\
    , 40, 400, 20)\n```\n\nHere, we can see how we use the methods provided by `trial`\
    \ to set up the hyperparameters. For each parameter, a value is suggested by the\
    \ optimization algorithm within the range specified. We can suggest categorical\
    \ variables using `trial.suggest_categorical` (as can be seen for the boosting\
    \ type), and `int` and `float` parameters using `suggest_int` and `suggest_float`,\
    \ respectively. When suggesting floats or integers, a range and, optionally, a\
    \ step size are specified:\n\n```python\nn_estimators = trial.suggest_int(\n \
    \   name=\"n_estimators\", low=40, high=400, step=20)\n```\n\nSetting a step size\
    \ means the optimization algorithm does not suggest any arbitrary value in the\
    \ range but limits suggestions to the steps between the lower and upper bound\
    \ (40, 60, 80, 100, ..., 400).\n\nWe also have the option to log scale the range\
    \ of possible values by passing `log=True` for numeric parameters. Log scaling\
    \ the parameter range has the effect that more values are tested close to the\
    \ range's lower bound and (logarithmically) fewer values towards the upper bound.\
    \ Log scaling is particularly well suited to the learning rate where we want to\
    \ focus on smaller values and exponentially increase tested values until the upper\
    \ bound."
  mdcn: "## CMA-ES\n\nCMA-ES进化过程的核心是协方差矩阵。协方差矩阵是一个方阵，对称矩阵，表示变量对（在CMA-ES中即超参数）之间的协方差，从而揭示它们之间的关系。矩阵的对角线元素代表各个变量的方差，而非对角线元素则代表变量对之间的协方差。当协方差为正时，表明这些变量通常同向变化，即同时增加或减少。相反，负协方差则意味着一个变量增加时，另一个变量倾向于减少，反之亦然。协方差为零则表明变量之间不存在线性关系。\n\
    \nCMA-ES在优化超参数时应用进化原理如下：\n\n1.  在超参数搜索空间内，初始化均值和协方差矩阵。\n2.  重复进化过程：\n    I.  使用均值和协方差矩阵，从搜索空间中生成一组候选解种群。每个候选解代表一组超参数值的组合。\n\
    \    II.  评估候选解的适应度。**适应度**指的是候选解的质量或其解决优化问题的优劣程度。对于CMA-ES，这意味着使用候选超参数在数据集上训练模型，并在验证集上评估其性能。\n\
    \    III.  从种群中选择最佳候选解。\n    IV.  根据最佳候选解更新均值和协方差矩阵。\n    V.  重复上述步骤，直到达到最大试验次数或种群适应度不再提升。\n\
    \nCMA-ES在复杂的搜索空间中表现出色，并在协方差矩阵的指导下智能地对搜索空间进行采样。当超参数搜索空间复杂且非线性，或者验证数据的评估存在噪声（例如，当某个指标是不一致的性能指示器时），这种方法尤为有益。\n\
    \nTPE和CMA-ES都解决了与超参数优化相关的问题：两种算法都能有效地搜索高维搜索空间。两种算法都能捕捉参数间的交互作用。两种算法都让我们能够控制成本：我们可以决定优化预算并将搜索限制在该预算内。\n\
    \nTPE和CMA-ES的主要区别在于它们的整体方法。TPE是一种具有顺序搜索策略的概率模型，而CMA-ES则基于种群并并行评估解决方案。这通常意味着TPE在搜索中更具开发性，而CMA-ES则通过种群控制机制平衡探索与开发。然而，TPE通常比CMA-ES更高效，尤其是在参数数量较少的情况下。\n\
    \nOptuna通过剪枝无效试验进一步优化了搜索过程。接下来我们将讨论一些剪枝策略。\n\n## 剪枝策略\n\n剪枝策略指的是通过从研究中剪枝这些试验，避免将优化时间花费在前景不佳的试验上的方法。剪枝与模型训练过程同步进行：在训练过程中检查验证误差，如果算法表现不佳，则停止训练。因此，剪枝类似于*早停*。\n\
    \n### 中位数剪枝\n\nOptuna提供了几种剪枝策略，其中最简单的一种是**中位数剪枝**。在中位数剪枝中，每个试验在*n*步后报告一个中间结果。然后取这些中间结果的中位数，任何在相同步骤下低于先前试验中位数的试验都会被停止。\n\
    \n### 逐次减半与Hyperband\n\n一种更复杂的策略称为**逐次减半**[4]。这种方法采取更全局的视角，为所有试验分配少量且相等的训练步骤预算。然后逐次减半迭代进行：在每次迭代中，评估每个试验的性能，选择表现最好的一半候选解进入下一轮，而表现较差的一半则被剪枝。下一次迭代的训练预算加倍，过程重复进行。这样，优化预算就花在了最有希望的候选解上。结果是，少量的优化预算用于淘汰表现不佳的候选解，而更多的资源则用于寻找最佳参数。\n\
    \n**Hyperband**是另一种剪枝技术，它通过结合随机搜索和多括号资源分配策略[5]扩展了逐次减半。虽然逐次减半通过迭代剪枝表现不佳的配置并为剩余有希望的配置分配更多资源，从而有效地缩小候选配置集，但它依赖于固定的初始配置集和单一的资源分配方案。\n\
    \nHyperband则采用多括号资源分配策略，将总计算预算分为几个括号，每个括号代表不同级别的资源分配。在每个括号内，应用逐次减半来迭代地淘汰表现不佳的配置，并为剩余有希望的配置分配更多资源。在每个括号开始时，使用随机搜索采样一组新的超参数配置，这使得Hyperband能够更广泛地探索超参数空间，并降低错过良好配置的风险。这种并发过程使Hyperband能够在搜索过程中自适应地平衡探索与开发，最终实现更高效、更有效的超参数调优。\n\
    \nOptuna对优化算法及相应的剪枝策略进行了实证研究（https://github.com/optuna/optuna/wiki/Benchmarks-with-Kurobako）。*根据经验，他们发现Hyperband是最佳的TPE或CMA-ES优化策略*。\n\
    \n本节概述了驱动Optuna的理论和算法，重点关注TPE、CMA-ES和高级剪枝策略。在下一节中，我们将实际应用Optuna来解决一个使用LightGBM的机器学习问题。\n\
    \n## 使用Optuna优化LightGBM\n\n我们将通过一个分类示例来介绍如何应用Optuna。我们要建模的问题是预测电信提供商的客户流失（是/否）。数据集可从https://github.com/IBM/telco-customer-churn-on-icp4d/tree/master/data获取。\n\
    \n数据使用提供商可用的数据描述每个客户——例如，性别、客户是否支付互联网服务、是否使用无纸化账单、是否支付技术支持费用以及他们的月度费用。数据包含数值型和分类型特征。数据已经过清洗且平衡，使我们能够专注于参数优化研究。\n\
    \n我们首先定义参数研究的目标。`objective`函数在每次试验时被调用一次。在这种情况下，我们希望在数据上训练一个LightGBM模型并计算F1分数。Optuna将一个`trial`对象传递给`objective`函数，我们可以用它来设置特定试验的参数。以下是一个示例代码片段，展示了如何定义一个带参数的`objective`函数：\n\
    \n```python\ndef objective(trial):\n    boosting_type = trial.suggest_categorical(\n\
    \        \"boosting_type\", [\"dart\", \"gbdt\"])\n    lambda_l1= trial.suggest_float(\n\
    \        'lambda_l1', 1e-8, 10.0, log=True),\n    ...\n    min_child_samples=\
    \ trial.suggest_int(\n        'min_child_samples', 5, 100),\n    learning_rate\
    \ = trial.suggest_float(\n        \"learning_rate\", 0.0001, 0.5, log=True),\n\
    \    max_bin = trial.suggest_int(\n        \"max_bin\", 128, 512, 32),\n    n_estimators\
    \ = trial.suggest_int(\n        \"n_estimators\", 40, 400, 20)\n```\n\n在这里，我们可以看到如何使用`trial`提供的方法来设置超参数。对于每个参数，优化算法在指定范围内建议一个值。我们可以使用`trial.suggest_categorical`建议分类变量（如提升类型所示），并分别使用`suggest_int`和`suggest_float`建议`int`和`float`参数。在建议浮点数或整数时，需要指定范围，以及可选的步长：\n\
    \n```python\nn_estimators = trial.suggest_int(\n    name=\"n_estimators\", low=40,\
    \ high=400, step=20)\n```\n\n设置步长意味着优化算法不会在范围内建议任意值，而是将建议限制在下限和上限之间的步长上（40, 60,\
    \ 80, 100, ..., 400）。\n\n我们还可以选择通过对数值参数传递`log=True`来对可能值的范围进行对数缩放。对参数范围进行对数缩放的效果是，在范围下限附近测试更多值，而在上限附近（对数地）测试更少值。对数缩放特别适用于学习率，因为我们希望关注较小的值，并指数级地增加测试值直到上限。"

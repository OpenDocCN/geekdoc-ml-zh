    \nX_train, X_test, y_train, y_test = train_test_split(\n    dataset.data, dataset.target,\
    \ random_state=179\n)\n\ny_train = y_train - 1\ny_test = y_test - 1\nxgb = XGBClassifier(\n\
    \    n_estimators=150, max_leaves=120, learning_rate=0.09\n)\nxgb = xgb.fit(X_train,\
    \ y_train)\nf1_score(y_test, xgb.predict(X_test), average=\"macro\")\n```\n\n\
    The scikit-learn interface should be familiar to you at this stage. The preceding\
    \ code shows that XGBoost supports similar hyperparameters as we used to train\

  md: "> **Note**\nThis section provides an overview of the steps and dependencies\
    \ required to start working with PostgresML and the features at the time of writing.\
    \ For up-to-date information, check out the official website: https://postgresml.org/.\
    \ The simplest way to run PostgresML is to use Docker. For more information, check\
    \ out the *Quick Start with Docker* documentation: https://postgresml.org/docs/guides/setup/quick_start_with_docker.\n\
    \nThe extension can be installed with official package tools (such as APT) or\
    \ compiled from sources. Once all the dependencies and the extension have been\
    \ installed, `postgresql.conf` must be updated to load the PostgresML library,\
    \ and the database server must be restarted:\n\n```\nshared_preload_libraries\
    \ = 'pgml,pg_stat_statements'\nsudo service postgresql restart\n```\n\nWith PostgresML\
    \ installed, the extension must be created within the database you plan to use.\
    \ This can be done in the regular PostgreSQL way from a SQL console:\n\n```\n\
    CREATE EXTENSION pgml;\n```\n\nVerify the installation, like so:\n\n```\nSELECT\
    \ pgml.version();\n```\n\n# Training models\n\nNow, let's look at the features\
    \ provided by PostgresML. As stated in the introduction, PostgresML has a SQL\
    \ API. The following code examples should be run in a SQL console.\n\nThe extension\
    \ function for training a model is as follows:\n\n```\npgml.train(\n    project_name\
    \ TEXT,\n    task TEXT DEFAULT NULL,\n    relation_name TEXT DEFAULT NULL,\n \
    \   y_column_name TEXT DEFAULT NULL,\n    algorithm TEXT DEFAULT 'linear',\n \
    \   hyperparams JSONB DEFAULT '{}'::JSONB,\n    search TEXT DEFAULT NULL,\n  \
    \  search_params JSONB DEFAULT '{}'::JSONB,\n    search_args JSONB DEFAULT '{}'::JSONB,\n\
    \    preprocess JSONB DEFAULT '{}'::JSONB,\n    test_size REAL DEFAULT 0.25,\n\
    \    test_sampling TEXT DEFAULT 'random'\n)\n```"
  merge: -1
  pgno: 219
- img_proc: true
  md: "We need to supply `project_name` as the first parameter. PostgresML organizes\
    \ models and deployments into projects, and projects are uniquely identified by\
    \ their names.\n\nNext, we specify the model's task: either classification or\
    \ regression. `relation_name` and `y_column_name` set up the data for the training\
    \ run. The relation is the table or view where the data is defined, and the Y\
    \ column's name specifies the target column within the relation.\n\nThese are\
    \ the only required parameters for training. Training a linear model (the default)\
    \ can be done as follows:\n\n```\nSELECT * FROM pgml.train(\n    project_name\
    \ => 'Regression Project',\n    task => 'regression',\n    relation_name => 'pgml.diabetes',\n\
    \    y_column_name => 'target'\n);\n```\n\nWhen `pgml.train` is called, PostgresML\
    \ copies the data into the `pgml` schema: this ensures all training runs are reproducible\
    \ and enables training to be rerun using different algorithms or parameters but\
    \ the same data. `relation_name` and `task` are also only required the very first\
    \ time training is done for a project. To train a second model for a project,\
    \ we can simplify the training call like so:\n\n```\nSELECT * FROM pgml.train(\n\
    \    'Regression Project',\n    algorithm => 'lightgbm'\n);\n```\n\nWhen calling\
    \ this code, a LightGBM regression model is trained on the same data.\n\nThe algorithm\
    \ parameter sets the learning algorithm to use. PostgresML supports various algorithms,\
    \ including LightGBM, XGBoost, scikit-learn's random forests and extra trees,\
    \ **support vector machines (SVMs)**, linear models, and unsupervised algorithms\
    \ such as K-means clustering.\n\nBy default, 25% of the data is used as a test\
    \ set, and the test data is selected at random. This can be controlled with the\
    \ `test_size` and `test_sampling` parameters. Alternative test sampling methods\
    \ select data from the first or last rows.\n\n# Hyperparameter optimization\n\n\
    PostgresML supports performing **hyperparameter optimization (HPO)** during the\
    \ training run. The search parameters control the HPO process. Two search strategies\
    \ are supported via `search`: grid search and random search. To set the hyperparameter\
    \ ranges for the HPO, a JSON object is used with the `search_params` parameter.\
    \ HPO parameters are specified using `search_args`. Here's an example:\n\n```\n\
    SELECT * FROM pgml.train('Regression Project',\n```"
  merge: -1
  pgno: 220
- img_proc: true
  md: "```\nalgorithm => 'lightgbm',\nsearch => 'random',\nsearch_args => '{\"n_iter\"\
    : 100 }',\nsearch_params => '{\n    \"learning_rate\": [0.001, 0.1, 0.5],\n  \
    \  \"n_estimators\": [20, 100, 200]\n}'\n);\n```\n\n# Preprocessing\n\nPostgresML\
    \ also supports performing certain types of preprocessing when training a model.\
    \ As with the training data and configuration, the preprocessing is also stored\
    \ with the project, so the same preprocessing can be applied when using a model\
    \ for predictions.\n\nRegarding pre-processing, PostgresML supports encoding categorical\
    \ variables, imputing missing values, and scaling numerical values. Preprocessing\
    \ rules are set using a JSON object via the `preprocess` parameter, as follows:\n\
    \n```\nSELECT pgml.train(\n...\npreprocess => '{\n    \"model\": {\"encode\":\
    \ {\"ordinal\": [\"Ford\", \"Kia\",\n        \"Volkswagen\"]}},\n    \"price\"\
    : {\"impute\": \"mean\", scale: \"standard\"}\n    \"fuel_economy\": {\"scale\"\
    : \"standard\"}\n}'\n);\n```\n\nHere, we applied ordinal encoding for the model\
    \ feature. Alternatively, PostgresML also supports one-hot encoding and target\
    \ encoding. We also imported missing values (as indicated by NULL in the column)\
    \ using the mean of the price and applied standard (normal) scaling to the price\
    \ and the fuel economy features.\n\n# Deploying and prediction\n\nPostgresML automatically\
    \ calculates appropriate metrics on the test set after training, including $R^2$,\
    \ the F1 score, precision, recall, ROC_AUC, accuracy and log loss. PostgresML\
    \ will then automatically deploy the model after training if the key metric for\
    \ the model ($R^2$ for regression and F1 for classification) improves over the\
    \ currently deployed model.\n\nHowever, deployments can also be managed manually\
    \ for a project with the `pgml.deploy` function:\n\n```\npgml.deploy(\n    project_name\
    \ TEXT,\n```"
  merge: -1
  pgno: 221
- img_proc: true
  md: "```\nstrategy TEXT DEFAULT 'best_score',\nalgorithm TEXT DEFAULT NULL\n)\n\
    ```\n\nThe deployment strategies supported by PostgresML are `best_score`, which\
    \ immediately deploys the model with the best key metrics; `most_recent`, which\
    \ deploys the most recently trained model; and `rollback`, which rolls back the\
    \ current deployment to the previously deployed model.\n\nWith a model deployed,\
    \ predictions can be made with the `pgml.predict` function:\n\n```\npgml.predict\
    \ (\n    project_name TEXT,\n    features REAL[]\n)\n```\n\nThe `pgml.predict`\
    \ function accepts the project name and the features for prediction. Features\
    \ may be either arrays or composite types.\n\n# PostgresML dashboard\n\nPostgresML\
    \ provides a web-based dashboard for a more accessible interface to PostgresML\
    \ features. The dashboard is deployed separately from PostgreSQL and is not required\
    \ for administration or fully utilizing PostgresML features as all functionality\
    \ is also accessible via SQL queries.\n\nThe dashboard provides access to a list\
    \ of projects, models, deployments, and data snapshots. More details can also\
    \ be found on trained models via the dashboard, including hyperparameter settings\
    \ and training metrics:\n\n![](img/5c9d6611c41357518a5920ff1f360451_222_0.png)\n\
    \nFigure 10.3 – PostgresML dashboard showing a list of trained models\n\nBesides\
    \ offering a view of projects, models, and deployments, the dashboard also allows\
    \ the creation of SQL notebooks, similar to Jupyter Notebooks. These SQL notebooks\
    \ provide a simple interface to interact with PostgresML if another SQL console\
    \ is not readily available."

    \ the inputs (input data or outputs from previous neurons), multiplies each input\
    \ by its corresponding weight, and then adds them together. A bias term is often\
    \ added to the weighted sum for better control over the neuron's output. Mathematically,\
    \ this can be represented as follows:\n\n$$z_j = \\sum_i (w_{ij}x_i) + b_j$$\n\
    \nHere, $x_i$ represents all inputs to the neuron, $w_{ij}$ is the weight associated\

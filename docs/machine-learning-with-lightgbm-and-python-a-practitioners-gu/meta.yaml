  md: "The following code sets up the gradient optimizer and data that we can use\
    \ with the TabTransformer model:\n\n```\noptimizer = tfa.optimizers.AdamW(\n \
    \   learning_rate=learning_rate,\n    weight_decay=weight_decay\n)\nmodel.compile(\n\
    \    optimizer=optimizer,\n    loss=keras.losses.BinaryCrossentropy(),\n    metrics=[keras.metrics.BinaryAccuracy(name=\"\
    accuracy\"),\n             f1_metric,\n             precision_metric,\n      \
    \       recall_metric],\n)\ntrain_dataset = get_dataset_from_csv(\n    train_data_file,\
    \ batch_size, shuffle=True\n)\nvalidation_dataset = get_dataset_from_csv(\n  \
    \  test_data_file, batch_size\n)\n```\n\nWe use an AdamW optimizer with weight\
    \ decay [7] with a binary cross-entropy loss function to fit the binary classification\
    \ problem. We can then train and evaluate our model with the following code:\n\
    \n```\ncallback = keras.callbacks.EarlyStopping(\n    monitor='loss', patience=3\n\
    )\nhistory = model.fit(\n    train_dataset,\n    epochs=num_epochs,\n    validation_data=validation_dataset,\n\
    \    class_weight=class_weight,\n    callbacks=[callback]\n)\n\nmodel.evaluate(validation_dataset,\
    \ verbose=0)\n```\n\nWe also add early stopping via the Keras callback with a\
    \ patience of 3 epochs. During training and for validation, we track the accuracy\
    \ and F1 score.\n\nTraining takes significantly longer than either gradient-boosting\
    \ framework and requires a GPU (training on a CPU is technically possible but\
    \ takes an inordinate amount of time).\n\nWe can now look at the results of the\
    \ three algorithms on the Census Income dataset."

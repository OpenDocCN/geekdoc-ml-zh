    dataset [8]. The dataset is available at `https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud`.
    The task is a binary classification problem, with the training data transactions
    labeled non-fraudulent (0) and fraudulent (1). The dataset consists only of numerical
    features that have been anonymized for confidentiality. Notably, the dataset is
    highly unbalanced, with fraudulent transactions making up only 0.17% of the data.


    # Training LightGBM and XGBoost models


    Since the values are all numeric, very little data preparation is required for
    the gradient-boosting models. To counteract the imbalance in the dataset, we again
    calculate `scale_pos_weight` and pass it to the model as a parameter. We perform
    a grid search with cross-validation to find good'

    现在，让我们总结一下本章的关键要点。


    ## 总结


    在本章中，我们介绍了机器学习作为一种通过从数据语料库中学习来执行任务，而非依赖手动编程指令来创建软件的方法。我们介绍了机器学习的核心概念，重点关注监督学习，并通过

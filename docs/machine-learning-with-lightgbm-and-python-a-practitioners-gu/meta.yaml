- md: "## Preprocessing\n\nPostgresML also supports performing certain types of preprocessing\
    \ when training a model. As with the training data and configuration, the preprocessing\
    \ is also stored with the project, so the same preprocessing can be applied when\
    \ using a model for predictions.\n\nRegarding pre-processing, PostgresML supports\
    \ encoding categorical variables, imputing missing values, and scaling numerical\
    \ values. Preprocessing rules are set using a JSON object via the `preprocess`\
    \ parameter, as follows:\n\n```sql\nSELECT pgml.train(\n...\npreprocess => '{\n\
    \    \"model\": {\"encode\": {\"ordinal\": [\"Ford\", \"Kia\",\n        \"Volkswagen\"\
    ]}},\n    \"price\": {\"impute\": \"mean\", \"scale\": \"standard\"},\n    \"\
    fuel_economy\": {\"scale\": \"standard\"}\n}'\n);\n```\n\nHere, we applied ordinal\
    \ encoding for the model feature. Alternatively, PostgresML also supports one-hot\
    \ encoding and target encoding. We also imputed missing values (as indicated by\
    \ NULL in the column) using the mean of the price and applied standard (normal)\
    \ scaling to the price and the fuel economy features.\n\n## Deploying and prediction\n\
    \nPostgresML automatically calculates appropriate metrics on the test set after\
    \ training, including $R^2$, the F1 score, precision, recall, ROC_AUC, accuracy\
    \ and log loss. PostgresML will then automatically deploy the model after training\
    \ if the key metric for the model ($R^2$ for regression and F1 for classification)\
    \ improves over the currently deployed model.\n\nHowever, deployments can also\
    \ be managed manually for a project with the `pgml.deploy` function:\n\n```sql\n\
    pgml.deploy(\n    project_name TEXT,\n    strategy TEXT DEFAULT 'best_score',\n\
    \    algorithm TEXT DEFAULT NULL\n)\n```\n\nThe deployment strategies supported\
    \ by PostgresML are `best_score`, which immediately deploys the model with the\
    \ best key metrics; `most_recent`, which deploys the most recently trained model;\
    \ and `rollback`, which rolls back the current deployment to the previously deployed\
    \ model.\n\nWith a model deployed, predictions can be made with the `pgml.predict`\
    \ function:\n\n```sql\npgml.predict (\n    project_name TEXT,\n    features REAL[]\n\
    )\n```\n\nThe `pgml.predict` function accepts the project name and the features\
    \ for prediction. Features may be either arrays or composite types.\n\n## PostgresML\
    \ dashboard\n\nPostgresML provides a web-based dashboard for a more accessible\
    \ interface to PostgresML features. The dashboard is deployed separately from\
    \ PostgreSQL and is not required for administration or fully utilizing PostgresML\
    \ features as all functionality is also accessible via SQL queries.\n\nThe dashboard\
    \ provides access to a list of projects, models, deployments, and data snapshots.\
    \ More details can also be found on trained models via the dashboard, including\
    \ hyperparameter settings and training metrics:\n\n![](img/5c9d6611c41357518a5920ff1f360451_222_0.png)\n\
    \nFigure 10.3 – PostgresML dashboard showing a list of trained models\n\nBesides\
    \ offering a view of projects, models, and deployments, the dashboard also allows\
    \ the creation of SQL notebooks, similar to Jupyter Notebooks. These SQL notebooks\
    \ provide a simple interface to interact with PostgresML if another SQL console\
    \ is not readily available.\n\nThis concludes our section on getting started with\
    \ PostgresML. Next, we'll look at an end-to-end case study of training and deploying\
    \ a PostgresML model.\n\n## Case study – customer churn with PostgresML\n\nLet's\
    \ revisit the customer churn problem for a telecommunications provider. As a reminder,\
    \ the dataset consists of customers and their account and cost information associated\
    \ with the telecommunication provider.\n\n### Data loading and preprocessing\n\
    \nOur data will typically already be available within the PostgreSQL database\
    \ in a real-world setting. However, for our example, we will start by loading\
    \ the data. First, we must create the table the data is loaded into:\n\n```sql\n\
    CREATE TABLE pgml.telco_churn\n(\n    customerid       VARCHAR(100),\n    gender\
    \           VARCHAR(100),\n    seniorcitizen    BOOLEAN,\n    partner        \
    \  VARCHAR(10),\n    dependents       VARCHAR(10),\n    tenure           REAL,\n\
    \    ...\n    monthlycharges   VARCHAR(50),\n    totalcharges     VARCHAR(50),\n\
    \    churn            VARCHAR(10)\n);\n```\n\nNote that in our table structure,\
    \ for a few of our columns, the types do not match what we may expect: for example,\
    \ monthly and total charges should be real values. We'll address this during our\
    \ preprocessing.\n\nNext, we can load our CSV data into the table. PostgreSQL\
    \ provides a COPY statement for this purpose:\n\n```sql\nCOPY pgml.telco_churn\
    \ (customerid,\n                      gender,\n                      seniorcitizen,\n\
    \                      partner,\n                      ...\n                 \
    \     streamingtv,\n                      streamingmovies,\n                 \
    \     contract,\n                      paperlessbilling,\n                   \
    \   paymentmethod,\n                      monthlycharges,\n                  \
    \    totalcharges,\n                      churn\n) FROM '/tmp/telco-churn.csv'\n\
    DELIMITER ','\nCSV HEADER;\n```\n\nRunning this statement reads the CSV file and\
    \ adds the data to our table.\n\n> **Note**\n> If you run PostgresML in a Docker\
    \ container (which is recommended to get started), the CSV file must first be\
    \ copied to the container runtime. This can be done with the following command\
    \ (substituting your own container name):\n> `docker cp telco/telco-churn.csv\
    \ postgresml-postgres-1:/tmp/telco-churn.csv`.\n\nWith the data loaded, we can\
    \ perform our preprocessing. We perform this in three steps: cleaning data directly\
    \ in the table, creating a table view that coerces the data to appropriate types,\
    \ and using PostgresML's preprocessing functionality:\n\n```sql\nUPDATE pgml.telco_churn\n\
    SET totalcharges = NULL\nWHERE totalcharges = ' ';\n```\n\nWe must replace the\
    \ empty text values in total charges with NULL, allowing PostgresML to impute\
    \ the values later:\n\n```sql\nCREATE VIEW pgml.telco_churn_data AS\nSELECT gender,\n\
    seniorcitizen,\nCAST(CASE partner\nWHEN 'Yes' THEN true\nWHEN 'No' THEN false\n\
    END AS BOOLEAN) AS partner,\n...\nCAST(monthlycharges AS REAL),\nCAST(totalcharges\
    \ AS REAL),\nCAST(CASE churn\nWHEN 'Yes' THEN true\nWHEN 'No' THEN false\nEND\
    \ AS BOOLEAN) AS churn\nFROM pgml.telco_churn;\n```\n\nWe then create a view to\
    \ prepare the data for training. Notably, two type transformations are performed:\
    \ features with Yes/No values are mapped to booleans, and we cast our monthly\
    \ and total charges to REAL values (after mapping the text values to NULL). We\
    \ also exclude CustomerId from the view as this can't be used for training.\n\n\
    ### Training and hyperparameter optimization\n\nWe can train our LightGBM model\
    \ as follows:\n\n```sql\nSELECT *\nFROM pgml.train('Telco Churn',\n    task =>\
    \ 'classification',\n    relation_name => 'pgml.telco_churn_data',\n    y_column_name\
    \ => 'churn',\n    algorithm => 'lightgbm',\n    preprocess => '{\"totalcharges\"\
    : {\"impute\": \"mean\"} }',\n    search => 'random',\n    search_args => '{\"\
    n_iter\": 500 }',\n    search_params => '{\n        \"num_leaves\": [2, 4, 8,\
    \ 16, 32, 64]\n    }'\n);\n```\n\nWe set the view as our relation, with the churn\
    \ column being our target feature. For preprocessing, we use the mean to ask PostgresML\
    \ to impute missing values for the `totalcharges` feature.\n\nWe also set up hyperparameter\
    \ optimization using 500 iterations of a random search with the specified search\
    \ parameter ranges.\n\nAfter completing training, we will be able to see our trained\
    \ and deployed model in the dashboard:\n\n![](img/5c9d6611c41357518a5920ff1f360451_225_0.png)\n\
    \nFigure 10.4 – Trained LightGBM model, as seen in the PostgresML dashboard\n\n\
    The dashboard shows the metrics for our model and the best-performing hyperparameters.\
    \ Our model achieved an F1 score of 0.6367 and an accuracy of 0.8239.\n\nThe same\
    \ information can also be retrieved with the following SQL query should the dashboard\
    \ be unavailable:\n\n```sql\nSELECT metrics, hyperparams\nFROM pgml.models m\n\
    LEFT OUTER JOIN pgml.projects p on p.id = m.project_id\nWHERE p.name = 'Telco\
    \ Churn';\n```\n\nOur model is automatically deployed when trained and is ready\
    \ to make predictions.\n\n### Predictions\n\nWe can make predictions manually\
    \ using a composite type as the feature data. This can be done as follows:\n\n\
    ```sql\nSELECT pgml.predict(\n    'Telco Churn',\n    ROW (\n        CAST('Male'\
    \ AS VARCHAR(30)),\n        1,\n        ...\n        CAST('Electronic check' AS\
    \ VARCHAR(30)),\n        CAST(20.25 AS REAL),\n        CAST(4107.25 AS REAL)\n\
    \    )\n) AS prediction;\n```\n\nWe use the PostgreSQL ROW expression to set up\
    \ the data, casting literals to the correct types for our model.\n\nHowever, the\
    \ more common way to leverage a PostgresML model is to incorporate predictions\
    \ into regular business queries. For example, here, we've selected all the data\
    \ from the original customer data table and added the prediction for each row\
    \ using the pgml.predict function:\n\n```sql\nSELECT *,\n    pgml.predict(\n \
    \       'Telco Churn',\n        ROW (\n            gender,\n            seniorcitizen,\n\
    \            ...\n            paymentmethod,\n```"
  mdcn: "## 预处理\n\nPostgresML 在训练模型时也支持执行某些类型的预处理。与训练数据和配置一样，预处理也存储在项目中，因此在使用模型进行预测时可以应用相同的预处理。\n\
    \n关于预处理，PostgresML 支持对分类变量进行编码、填充缺失值以及缩放数值。预处理规则通过 `preprocess` 参数使用 JSON 对象设置，如下所示：\n\
    \n```sql\nSELECT pgml.train(\n...\npreprocess => '{\n    \"model\": {\"encode\"\
    : {\"ordinal\": [\"Ford\", \"Kia\",\n        \"Volkswagen\"]}},\n    \"price\"\
    : {\"impute\": \"mean\", \"scale\": \"standard\"},\n    \"fuel_economy\": {\"\
    scale\": \"standard\"}\n}'\n);\n```\n\n这里，我们对模型特征应用了序数编码。或者，PostgresML 也支持独热编码和目标编码。我们还使用价格的平均值填充了缺失值（由列中的\
    \ NULL 表示），并对价格和燃油经济性特征应用了标准（正态）缩放。\n\n## 部署与预测\n\nPostgresML 在训练后会自动在测试集上计算适当的指标，包括\
    \ $R^2$、F1 分数、精确率、召回率、ROC_AUC、准确率和对数损失。如果模型的关键指标（回归为 $R^2$，分类为 F1）优于当前部署的模型，PostgresML\
    \ 将在训练后自动部署该模型。\n\n但是，也可以使用 `pgml.deploy` 函数手动管理项目的部署：\n\n```sql\npgml.deploy(\n\
    \    project_name TEXT,\n    strategy TEXT DEFAULT 'best_score',\n    algorithm\
    \ TEXT DEFAULT NULL\n)\n```\n\nPostgresML 支持的部署策略有 `best_score`（立即部署具有最佳关键指标的模型）、`most_recent`（部署最近训练的模型）和\
    \ `rollback`（将当前部署回滚到先前部署的模型）。\n\n模型部署后，可以使用 `pgml.predict` 函数进行预测：\n\n```sql\n\
    pgml.predict (\n    project_name TEXT,\n    features REAL[]\n)\n```\n\n`pgml.predict`\
    \ 函数接受项目名称和用于预测的特征。特征可以是数组或复合类型。\n\n## PostgresML 仪表板\n\nPostgresML 提供了一个基于 Web\
    \ 的仪表板，以便更便捷地访问 PostgresML 功能。该仪表板与 PostgreSQL 分开部署，对于管理或充分利用 PostgresML 功能并非必需，因为所有功能也可以通过\
    \ SQL 查询访问。\n\n该仪表板提供了对项目列表、模型、部署和数据快照的访问。通过仪表板还可以找到有关训练模型的更多详细信息，包括超参数设置和训练指标：\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_222_0.png)\n\n图 10.3 – 显示训练模型列表的 PostgresML\
    \ 仪表板\n\n除了提供项目、模型和部署的视图外，该仪表板还允许创建 SQL 笔记本，类似于 Jupyter Notebooks。如果无法方便地使用其他\
    \ SQL 控制台，这些 SQL 笔记本提供了一个与 PostgresML 交互的简单界面。\n\n至此，我们关于 PostgresML 入门的部分结束。接下来，我们将通过一个端到端的案例研究来训练和部署\
    \ PostgresML 模型。\n\n## 案例研究 – 使用 PostgresML 进行客户流失分析\n\n让我们重新审视电信提供商的客户流失问题。提醒一下，数据集由客户及其与电信提供商相关的账户和成本信息组成。\n\
    \n### 数据加载与预处理\n\n在实际场景中，我们的数据通常已经存在于 PostgreSQL 数据库中。但是，对于我们的示例，我们将从加载数据开始。首先，我们必须创建数据要加载到的表：\n\
    \n```sql\nCREATE TABLE pgml.telco_churn\n(\n    customerid       VARCHAR(100),\n\
    \    gender           VARCHAR(100),\n    seniorcitizen    BOOLEAN,\n    partner\
    \          VARCHAR(10),\n    dependents       VARCHAR(10),\n    tenure       \
    \    REAL,\n    ...\n    monthlycharges   VARCHAR(50),\n    totalcharges     VARCHAR(50),\n\
    \    churn            VARCHAR(10)\n);\n```\n\n请注意，在我们的表结构中，对于某些列，其类型可能与我们预期的不符：例如，月度费用和总费用应该是实数值。我们将在预处理过程中解决这个问题。\n\
    \n接下来，我们可以将 CSV 数据加载到表中。PostgreSQL 提供了 `COPY` 语句来实现此目的：\n\n```sql\nCOPY pgml.telco_churn\
    \ (customerid,\n                      gender,\n                      seniorcitizen,\n\
    \                      partner,\n                      ...\n                 \
    \     streamingtv,\n                      streamingmovies,\n                 \
    \     contract,\n                      paperlessbilling,\n                   \
    \   paymentmethod,\n                      monthlycharges,\n                  \
    \    totalcharges,\n                      churn\n) FROM '/tmp/telco-churn.csv'\n\
    DELIMITER ','\nCSV HEADER;\n```\n\n运行此语句会读取 CSV 文件并将数据添加到我们的表中。\n\n> **注意**\n\
    > 如果你在 Docker 容器中运行 PostgresML（推荐用于入门），则必须先将 CSV 文件复制到容器运行时。可以使用以下命令完成此操作（替换为你自己的容器名称）：\n\
    > `docker cp telco/telco-churn.csv postgresml-postgres-1:/tmp/telco-churn.csv`。\n\
    \n数据加载后，我们可以执行预处理。我们分三步执行此操作：直接在表中清理数据、创建一个将数据强制转换为适当类型的表视图，以及使用 PostgresML 的预处理功能：\n\
    \n```sql\nUPDATE pgml.telco_churn\nSET totalcharges = NULL\nWHERE totalcharges\
    \ = ' ';\n```\n\n我们必须将总费用中的空文本值替换为 NULL，以便 PostgresML 稍后可以填充这些值：\n\n```sql\nCREATE\
    \ VIEW pgml.telco_churn_data AS\nSELECT gender,\nseniorcitizen,\nCAST(CASE partner\n\
    WHEN 'Yes' THEN true\nWHEN 'No' THEN false\nEND AS BOOLEAN) AS partner,\n...\n\
    CAST(monthlycharges AS REAL),\nCAST(totalcharges AS REAL),\nCAST(CASE churn\n\
    WHEN 'Yes' THEN true\nWHEN 'No' THEN false\nEND AS BOOLEAN) AS churn\nFROM pgml.telco_churn;\n\
    ```\n\n然后我们创建一个视图来为训练准备数据。值得注意的是，执行了两种类型转换：具有 Yes/No 值的特征被映射为布尔值，并且我们将月度费用和总费用转换为\
    \ REAL 值（在将文本值映射为 NULL 之后）。我们还将 CustomerId 排除在视图之外，因为它不能用于训练。\n\n### 训练与超参数优化\n\
    \n我们可以如下训练我们的 LightGBM 模型：\n\n```sql\nSELECT *\nFROM pgml.train('Telco Churn',\n\
    \    task => 'classification',\n    relation_name => 'pgml.telco_churn_data',\n\
    \    y_column_name => 'churn',\n    algorithm => 'lightgbm',\n    preprocess =>\
    \ '{\"totalcharges\": {\"impute\": \"mean\"} }',\n    search => 'random',\n  \
    \  search_args => '{\"n_iter\": 500 }',\n    search_params => '{\n        \"num_leaves\"\
    : [2, 4, 8, 16, 32, 64]\n    }'\n);\n```\n\n我们将视图设置为我们的关系，其中 churn 列是我们的目标特征。对于预处理，我们使用均值来要求\
    \ PostgresML 为 `totalcharges` 特征填充缺失值。\n\n我们还设置了超参数优化，使用 500 次迭代的随机搜索，并指定了搜索参数范围。\n\
    \n训练完成后，我们将在仪表板中看到我们训练和部署的模型：\n\n![](img/5c9d6611c41357518a5920ff1f360451_225_0.png)\n\
    \n图 10.4 – 在 PostgresML 仪表板中看到的训练好的 LightGBM 模型\n\n仪表板显示了我们模型的指标和表现最佳的超参数。我们的模型\
    \ F1 分数为 0.6367，准确率为 0.8239。\n\n如果仪表板不可用，也可以通过以下 SQL 查询检索相同的信息：\n\n```sql\nSELECT\
    \ metrics, hyperparams\nFROM pgml.models m\nLEFT OUTER JOIN pgml.projects p on\
    \ p.id = m.project_id\nWHERE p.name = 'Telco Churn';\n```\n\n我们的模型在训练后会自动部署，并准备好进行预测。\n\
    \n### 预测\n\n我们可以使用复合类型作为特征数据手动进行预测。可以按如下方式操作：\n\n```sql\nSELECT pgml.predict(\n\
    \    'Telco Churn',\n    ROW (\n        CAST('Male' AS VARCHAR(30)),\n       \
    \ 1,\n        ...\n        CAST('Electronic check' AS VARCHAR(30)),\n        CAST(20.25\
    \ AS REAL),\n        CAST(4107.25 AS REAL)\n    )\n) AS prediction;\n```\n\n我们使用\
    \ PostgreSQL ROW 表达式来设置数据，将字面量转换为模型所需的正确类型。\n\n然而，利用 PostgresML 模型更常见的方法是将预测纳入常规业务查询中。例如，这里我们从原始客户数据表中选择了所有数据，并使用\
    \ pgml.predict 函数为每一行添加了预测：\n\n```sql\nSELECT *,\n    pgml.predict(\n        'Telco\
    \ Churn',\n        ROW (\n            gender,\n            seniorcitizen,\n  \
    \          ...\n            paymentmethod,\n```"

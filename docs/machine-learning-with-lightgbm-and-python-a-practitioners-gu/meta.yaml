  md: "Our categorical features are now encoded, and we can proceed with further data\
    \ cleaning.\n\n# Missing values and duplicates\n\nWe need to check for missing\
    \ values, duplicates, and outliers. We can use the following code:\n\n```\ntrain_data.isnull().sum()\n\
    train_data.drop_duplicates(inplace=True)\ntrain_data.describe()\n```\n\nWe drop\
    \ the duplicate data, and reviewing the output of `describe` shows us there are\
    \ no significant outliers. However, there are **missing values** in the dataset.\
    \ LightGBM and XGBoost can deal with missing values automatically, a significant\
    \ advantage of tree-based algorithms. However, for TabTransformers, we need to\
    \ implement particular logic to deal with the missing values, as we'll see next.\n\
    \n# Unbalanced data\n\nThe dataset is also skewed: the number of examples of each\
    \ class is not balanced. We can calculate the skew using the following code:\n\
    \n```\ncounts = np.bincount(train_data[\"income_bracket\"])\nclass_weight = {\n\
    \    0: counts[0] / train_data.shape[0],\n    1: counts[1] / train_data.shape[0]\n\
    }\n```\n\nThe output shows a roughly 75%/25% skew toward the negative (0) class.\
    \ One of the simplest ways of dealing with unbalanced classes (if we have binary\
    \ classes) is to weigh the positive class more strongly than the negative class.\
    \ Therefore, when calculating the loss, a prediction that misses the positive\
    \ class has a more significant impact.\n\nLightGBM and XGBoost both support this\
    \ through the `scale_pos_weight` parameter, which can be calculated as follows:\n\
    \n```\nscale_pos_weight = class_weight[0]/class_weight[1]\n```\n\n# Training LightGBM\
    \ and XGBoost models\n\nWith the data cleaned and prepared, we can now train our\
    \ models. Training the LightGBM and XGBoost models is straightforward. For LightGBM,\
    \ we have the following:\n\n```\nmodel = lgb.LGBMClassifier(force_row_wise=True,\
    \ boosting_type=\"gbdt\",\n    scale_pos_weight=scale_pos_weight)\nmodel = model.fit(X_train,\
    \ y_train)\n```"
  merge: -1
  pgno: 95
- img_proc: true
  md: "And for XGBoost, we can run the following code:\n\n```\nmodel = xgb.XGBClassifier(scale_pos_weight=scale_pos_weight)\n\
    model = model.fit(X_train, y_train)\n```\n\nThe preceding code highlights the\
    \ simplicity of working with both libraries.\n\n# Training a TabTransformer model\n\
    \nWe'll now build a TabTransformer model. We'll use **TensorFlow's Keras** to\
    \ define the model based on the example code: https://keras.io/examples/structured_data/tabtransformer/.\n\
    \nOur dataset preparation remains mostly the same, with two key differences: we\
    \ don't encode the categorical features and must handle the missing values explicitly.\n\
    \nWe don't encode the categorical features because Keras provides a special layer\
    \ to perform string lookup and conversion to a numerical value. However, we must\
    \ still supply the vocabulary. The following code illustrates creating a lookup\
    \ layer:\n\n```\nlookup = layers.StringLookup(\n    vocabulary=vocabulary,\n \
    \   mask_token=None,\n    num_oov_indices=0,\n    output_mode=\"int\",\n)\n```\n\
    \nThe `num_oov_indices` parameter is set to 0, meaning no indices are used if\
    \ an **out-of-vocabulary (OOV)** value is encountered. Since our vocabulary is\
    \ exhaustive, this is not needed. The `mask_token` parameter is also set to `None`,\
    \ as we aren't masking any string inputs.\n\nWe need to supply a default value\
    \ for each column in the dataset to handle missing values. Our strategy is to\
    \ replace string values with a default string value, NA. We use the statistical\
    \ mean for the numeric columns to fill in the missing value. The following code\
    \ creates a list of the default values:\n\n```\ntrain_data_description = train_data.describe()\n\
    COLUMN_DEFAULTS = [\n    train_data_description[feature_name][\"mean\"] if feature_name\
    \ in\n    NUMERIC_FEATURE_NAMES else [\"NA\"]\n    for feature_name in HEADERS\n\
    ]\n```\n\nThe Keras code for implementing a TabTransformer model is roughly 100\
    \ lines long and is available in our GitHub repository: https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/blob/main/chapter-4/tabtransformer-census-income.ipynb."

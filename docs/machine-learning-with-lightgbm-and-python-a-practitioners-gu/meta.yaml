    with all other workers, so all workers have all the best splits.


    The best feature split is chosen, and the data is partitioned accordingly.


    Fortunately, the complexity of the distributed algorithm is hidden from us, and
    the training code is identical to the scikit-learn training code we''re used to:


    ```

    dask_model = lgb.DaskLGBMClassifier(n_estimators=200, client=client)

    dask_model.fit(X_train, y_train)

    ```


    Running the preceding code trains the LightGBM model, and we can see the progress
    by checking the **Status** page of the Dask dashboard, as shown in *Figure 11.2*.


    ![](img/5c9d6611c41357518a5920ff1f360451_232_0.png)'
- md: "## GPU training for LightGBM\n\nThe LightGBM library has native support for\
    \ training the model on a GPU [1]. Two GPU platforms are supported: GPU via OpenCL\
    \ and CUDA. Leveraging the GPU via OpenCL offers support for the broadest range\
    \ of GPUs (including AMD GPUs) and is significantly faster than running the model\
    \ on a CPU. However, the CUDA platform offers the fastest runtime if you have\
    \ an NVIDIA GPU available.\n\n## Setting up LightGBM for the GPU\n\nSetting up\
    \ your environment to use the GPU can be a bit tricky, but we'll review the core\
    \ steps here.\n\n> **Note**\n>\n> The GPU setup steps discussed here are offered\
    \ as a guide and overview of the process of setting up your environment. The exact\
    \ version number of libraries and drivers listed here may be outdated, and it's\
    \ recommended that you review the official documentation for up-to-date versions:\
    \ https://lightgbm.readthedocs.io/en/latest/GPU-Tutorial.html.\n\nIn order to\
    \ use the GPU, we have to *compile and build the LightGBM library from the source\
    \ code*. The following instructions assume an Ubuntu Linux build environment;\
    \ steps for other platforms are similar. Before we can build the library, we must\
    \ install a few dependencies.\n\nImportantly, first, install the GPU drivers for\
    \ your environment. If you have an NVIDIA GPU, also install CUDA. Instructions\
    \ for doing so are available from the respective vendor sites:\n\n- https://docs.nvidia.com/cuda/\n\
    - https://www.amd.com/en/support\n\nNext, we need to install the OpenCL headers:\n\
    \n```\nsudo apt install --no-install-recommends nvidia-opencl-dev opencl-headers\n\
    ```\n\nFinally, install the library build dependencies:\n\n```\nsudo apt install\
    \ --no-install-recommends git cmake build-essential libboost-dev libboost-system-dev\
    \ libboost-filesystem-dev\n```\n\nWe are now ready to compile the LightGBM library\
    \ with GPU support. Clone the repository and build the library, setting the `USE_GPU`\
    \ flag:\n\n```\ngit clone --recursive https://github.com/microsoft/LightGBM\n\
    cd LightGBM\nmkdir build\ncd build\ncmake -DUSE_GPU=1 ..\nmake -j$(nproc)\ncd\
    \ ..\n```\n\nAs mentioned in *Chapter 2, Ensemble Learning – Bagging and Boosting*,\
    \ LightGBM is a C++ library with a Python interface. With the preceding instructions,\
    \ we have built the library with GPU support, but we must build and install the\
    \ Python package to use the library from Python (including the scikit-learn API):\n\
    \n```\ncd python-package/\npython setup.py install --user --precompile\n```\n\n\
    ## Running LightGBM on the GPU\n\nRunning training code on the GPU is straightforward.\
    \ We set the device parameter to either `gpu` or `cuda`:\n\n```\nmodel = lgb.LGBMClassifier(\n\
    \    n_estimators=150,\n    device=\"cuda\",\n    is_enable_sparse=False\n)\n\
    model = model.fit(X_train, y_train)\n```\n\nAs shown in the preceding code, we\
    \ turn off LightGBM's sparse matrix optimization by setting `is_enable_sparse`\
    \ to `False`. LightGBM's sparse features are not supported on GPU devices. Further,\
    \ depending on your dataset, you might get the following warning stating that\
    \ `multi_logloss` is not implemented:\n\n```\nMetric multi_logloss is not implemented\
    \ in cuda version. Fall back to evaluation on CPU.\n```\n\nNotably, the fallback\
    \ performed is only for evaluation and not training; training is still performed\
    \ on the GPU. We can validate that the GPU is used by checking `nvidia-smi` (for\
    \ NVIDIA GPUs):\n\n![](img/5c9d6611c41357518a5920ff1f360451_235_0.png)\n\nThe\
    \ speed-up achieved depends on your GPU. The training time was reduced from 171\
    \ s to 11 s (a 15-times speed-up) for 150 iterations on the Forest Cover dataset.\n\
    \nThe immense performance gain stemming from using a GPU is especially useful\
    \ when performing parameter tuning. We can use GPU-based training with, for instance,\
    \ Optuna to significantly accelerate the search for optimal parameters. All that's\
    \ needed is to move the model training in the `objective` function to the GPU\
    \ device. When defining the objective function, we specify our Optuna parameter\
    \ ranges as per usual:\n\n```\ndef objective(trial):\n    lambda_l1 = trial.suggest_float(\n\
    \        'lambda_l1', 1e-8, 10.0, log=True),\n    lambda_l2 = trial.suggest_float(\n\
    \        'lambda_l2', 1e-8, 10.0, log=True),\n    ...\n```\n\nWe then create the\
    \ model with the Optuna parameters and make sure to specify the device as cuda\
    \ (or gpu):\n\n```\nmodel = lgb.LGBMClassifier(\n    force_row_wise=True,\n  \
    \  boosting_type=boosting_type,\n    n_estimators=n_estimators,\n    lambda_l1=lambda_l1,\n\
    \    lambda_l2=lambda_l2,\n    ...\n    learning_rate=learning_rate,\n    max_bin=max_bin,\n\
    \    device=\"cuda\")\n```\n\nThe last part of the objective function is to return\
    \ the cross-validated scores:\n\n```\nscores = cross_val_score(model, X_train,\
    \ y_train, scoring=\"f1_macro\")\nreturn scores.mean()\n```\n\nWe can then run\
    \ a parameter study as we would normally:\n\n```\nsampler = optuna.samplers.TPESampler()\n\
    pruner = optuna.pruners.HyperbandPruner(\n    min_resource=10, max_resource=400,\
    \ reduction_factor=3)\n\nstudy = optuna.create_study(\n    direction='maximize',\
    \ sampler=sampler,\n    pruner=pruner\n)\nstudy.optimize(objective(), n_trials=10,\
    \ gc_after_trial=True, n_jobs=1)\n```\n\nImportantly, we also set the n_jobs parameter\
    \ to 1 here, as running parallel jobs leveraging the GPU could cause unnecessary\
    \ contention and overhead.\n\nThere are a few noteworthy best practices for getting\
    \ the best performance when training on a GPU:\n\n- Always verify that the GPU\
    \ is being used. LightGBM returns to CPU training if the GPU is unavailable despite\
    \ setting device=gpu. A good way of checking is with a tool such as nvidia-smi,\
    \ as shown previously, or comparing training times to reference benchmarks.\n\
    - Use a much smaller `max_bin` size. Large datasets reduce the impact of a smaller\
    \ `max_bin` size, and the smaller number of bins benefits training on the GPU.\
    \ Similarly, use single-precision floats for increased performance if your GPU\
    \ supports it.\n- GPU training works best for large, dense datasets. Data needs\
    \ to be moved to the GPU's VRAM for training, and if the dataset is too small,\
    \ the overhead involved with moving the data is too significant.\n- Avoid one-hot\
    \ encoding of feature columns, as this leads to sparse feature matrices, which\
    \ do not work well on the GPU.\n\nThis concludes our section on how to use the\
    \ GPU with LightGBM. Although the setup might be more complex, GPUs offer a significant\
    \ boost in training speed due to their ability to handle thousands of threads\
    \ simultaneously, allowing for efficient parallel processing, especially with\
    \ large datasets. The massive parallelism of GPUs is particularly beneficial for\
    \ histogram-based algorithms in LightGBM, making operations such as building histograms\
    \ more efficient and effective.\n\n## Summary\n\nIn this chapter, we discussed\
    \ two ways of accelerating computing with LightGBM. The first is large-scale distributed\
    \ training across many machines using the Python library Dask. We showed how to\
    \ set up a Dask cluster, how data can be distributed to the cluster using the\
    \ Dask DataFrame, and how to run LightGBM on the cluster.\n\nSecond, we also looked\
    \ at how to leverage the GPU with LightGBM. Notably, the GPU setup is complex,\
    \ but significant speed-up can be achieved when it's available. We also discussed\
    \ some best practices for training LightGBM models on the GPU.\n\n## References\n\
    \n[1] H. Zhang, S. Si, and C.-J. Hsieh, *GPU-acceleration for Large-scale Tree\
    \ Boosting*, 2017."
  mdcn: "## LightGBM 的 GPU 训练\n\nLightGBM 库原生支持在 GPU 上训练模型 [1]。支持两种 GPU 平台：通过 OpenCL\
    \ 的 GPU 和 CUDA。通过 OpenCL 使用 GPU 支持最广泛的 GPU 范围（包括 AMD GPU），并且比在 CPU 上运行模型快得多。但是，如果你有\
    \ NVIDIA GPU 可用，CUDA 平台提供最快的运行时速度。\n\n## 为 GPU 设置 LightGBM\n\n设置你的环境以使用 GPU 可能有点棘手，但我们将在此回顾核心步骤。\n\
    \n> **注意**\n>\n> 此处讨论的 GPU 设置步骤是作为设置环境过程的指南和概述。此处列出的库和驱动程序的确切版本号可能已过时，建议你查阅官方文档以获取最新版本：https://lightgbm.readthedocs.io/en/latest/GPU-Tutorial.html。\n\
    \n为了使用 GPU，我们必须*从源代码编译和构建 LightGBM 库*。以下说明假设使用 Ubuntu Linux 构建环境；其他平台的步骤类似。在构建库之前，我们必须安装一些依赖项。\n\
    \n重要的是，首先，为你的环境安装 GPU 驱动程序。如果你有 NVIDIA GPU，还要安装 CUDA。相关说明可从各自的供应商网站获取：\n\n- https://docs.nvidia.com/cuda/\n\
    - https://www.amd.com/en/support\n\n接下来，我们需要安装 OpenCL 头文件：\n\n```\nsudo apt install\
    \ --no-install-recommends nvidia-opencl-dev opencl-headers\n```\n\n最后，安装库构建依赖项：\n\
    \n```\nsudo apt install --no-install-recommends git cmake build-essential libboost-dev\
    \ libboost-system-dev libboost-filesystem-dev\n```\n\n我们现在准备好编译支持 GPU 的 LightGBM\
    \ 库。克隆仓库并构建库，设置 `USE_GPU` 标志：\n\n```\ngit clone --recursive https://github.com/microsoft/LightGBM\n\
    cd LightGBM\nmkdir build\ncd build\ncmake -DUSE_GPU=1 ..\nmake -j$(nproc)\ncd\
    \ ..\n```\n\n如*第 2 章，集成学习 - Bagging 和 Boosting*中所述，LightGBM 是一个带有 Python 接口的 C++\
    \ 库。通过前面的说明，我们已经构建了支持 GPU 的库，但必须构建并安装 Python 包才能从 Python（包括 scikit-learn API）使用该库：\n\
    \n```\ncd python-package/\npython setup.py install --user --precompile\n```\n\n\
    ## 在 GPU 上运行 LightGBM\n\n在 GPU 上运行训练代码很简单。我们将 device 参数设置为 `gpu` 或 `cuda`：\n\n\
    ```\nmodel = lgb.LGBMClassifier(\n    n_estimators=150,\n    device=\"cuda\",\n\
    \    is_enable_sparse=False\n)\nmodel = model.fit(X_train, y_train)\n```\n\n如前面的代码所示，我们通过将\
    \ `is_enable_sparse` 设置为 `False` 来关闭 LightGBM 的稀疏矩阵优化。LightGBM 的稀疏特性在 GPU 设备上不受支持。此外，根据你的数据集，你可能会收到以下警告，指出\
    \ `multi_logloss` 未实现：\n\n```\nMetric multi_logloss is not implemented in cuda\
    \ version. Fall back to evaluation on CPU.\n```\n\n值得注意的是，执行的回退仅用于评估而非训练；训练仍在\
    \ GPU 上进行。我们可以通过检查 `nvidia-smi`（对于 NVIDIA GPU）来验证是否使用了 GPU：\n\n![](img/5c9d6611c41357518a5920ff1f360451_235_0.png)\n\
    \n实现的加速取决于你的 GPU。在 Forest Cover 数据集上，150 次迭代的训练时间从 171 秒减少到 11 秒（加速 15 倍）。\n\n\
    使用 GPU 带来的巨大性能提升在执行参数调优时尤其有用。我们可以将基于 GPU 的训练与例如 Optuna 结合使用，以显著加速寻找最优参数的过程。所需做的只是将\
    \ `objective` 函数中的模型训练移动到 GPU 设备。在定义目标函数时，我们照常指定 Optuna 参数范围：\n\n```\ndef objective(trial):\n\
    \    lambda_l1 = trial.suggest_float(\n        'lambda_l1', 1e-8, 10.0, log=True),\n\
    \    lambda_l2 = trial.suggest_float(\n        'lambda_l2', 1e-8, 10.0, log=True),\n\
    \    ...\n```\n\n然后我们使用 Optuna 参数创建模型，并确保将设备指定为 cuda（或 gpu）：\n\n```\nmodel = lgb.LGBMClassifier(\n\
    \    force_row_wise=True,\n    boosting_type=boosting_type,\n    n_estimators=n_estimators,\n\
    \    lambda_l1=lambda_l1,\n    lambda_l2=lambda_l2,\n    ...\n    learning_rate=learning_rate,\n\
    \    max_bin=max_bin,\n    device=\"cuda\")\n```\n\n目标函数的最后一部分是返回交叉验证分数：\n\n```\n\
    scores = cross_val_score(model, X_train, y_train, scoring=\"f1_macro\")\nreturn\
    \ scores.mean()\n```\n\n然后我们可以像往常一样运行参数研究：\n\n```\nsampler = optuna.samplers.TPESampler()\n\
    pruner = optuna.pruners.HyperbandPruner(\n    min_resource=10, max_resource=400,\
    \ reduction_factor=3)\n\nstudy = optuna.create_study(\n    direction='maximize',\
    \ sampler=sampler,\n    pruner=pruner\n)\nstudy.optimize(objective(), n_trials=10,\
    \ gc_after_trial=True, n_jobs=1)\n```\n\n重要的是，我们还在这里将 n_jobs 参数设置为 1，因为利用 GPU\
    \ 运行并行作业可能会导致不必要的争用和开销。\n\n在 GPU 上训练时，有一些值得注意的最佳实践以获得最佳性能：\n\n- 始终验证是否正在使用 GPU。如果\
    \ GPU 不可用，即使设置了 device=gpu，LightGBM 也会返回 CPU 训练。一个好的检查方法是使用 nvidia-smi 等工具（如前所示），或者将训练时间与参考基准进行比较。\n\
    - 使用小得多的 `max_bin` 大小。大型数据集减少了较小 `max_bin` 大小的影响，而较少的 bin 数量有利于在 GPU 上训练。同样，如果你的\
    \ GPU 支持，使用单精度浮点数以提高性能。\n- GPU 训练最适合大型、密集的数据集。数据需要移动到 GPU 的 VRAM 中进行训练，如果数据集太小，移动数据的开销就太大了。\n\
    - 避免对特征列进行独热编码，因为这会导致稀疏特征矩阵，在 GPU 上效果不佳。\n\n这结束了我们关于如何在 LightGBM 中使用 GPU 的部分。虽然设置可能更复杂，但由于\
    \ GPU 能够同时处理数千个线程，从而实现高效的并行处理（尤其是在大型数据集上），GPU 提供了显著的训练速度提升。GPU 的大规模并行性对于 LightGBM\
    \ 中基于直方图的算法特别有益，使得构建直方图等操作更加高效和有效。\n\n## 总结\n\n在本章中，我们讨论了使用 LightGBM 加速计算的两种方式。第一种是使用\
    \ Python 库 Dask 在多台机器上进行大规模分布式训练。我们展示了如何设置 Dask 集群，如何使用 Dask DataFrame 将数据分发到集群，以及如何在集群上运行\
    \ LightGBM。\n\n其次，我们还研究了如何利用 GPU 与 LightGBM。值得注意的是，GPU 设置很复杂，但当可用时可以实现显著的加速。我们还讨论了在\
    \ GPU 上训练 LightGBM 模型的一些最佳实践。\n\n## 参考文献\n\n[1] H. Zhang, S. Si, and C.-J. Hsieh,\
    \ *GPU-acceleration for Large-scale Tree Boosting*, 2017."

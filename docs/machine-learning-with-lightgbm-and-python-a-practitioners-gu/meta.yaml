    # 7 AutoML with LightGBM and FLAML


    In the previous chapter, we discussed two case studies that showed end-to-end
    examples of how to approach data science problems. Of the steps involved in the
    typical data science life cycle, often, the most time-consuming tasks are preparing
    the data, finding the correct models, and tuning the models.


    This chapter looks at the concept of automated machine learning. Automated machine
    learning systems seek to automate some or all parts of the machine learning life
    cycle. We will look at **FLAML**, a library that automates the process''s model
    selection and tuning steps using efficient hyperparameter optimization algorithms.


    Lastly, we will present a case study using FLAML and another open source tool
    called Featuretools. Practical usage of FLAML will be discussed and shown. We
    will also show FLAML''s zero-shot AutoML functionality, which bypasses tuning
    altogether.


    The main topics of this chapter are as follows:


    - An introduction to automatic machine learning

    - FLAML for AutoML

    - Case study – using FLAML with LightGBM


    ## Technical requirements


    The chapter includes examples and code excerpts showcasing using FLAML with LightGBM
    for AutoML use cases. Complete examples and instructions for setting up a suitable
    environment for this chapter are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-7.


    ## Automated machine learning


    **Automated machine learning (AutoML)** is a burgeoning field that aims to automate
    complex aspects of ML workflows, allowing for more efficient and accessible deployment
    of ML models. The advent of AutoML reflects the increasing sophistication of artificial
    intelligence and ML technologies and their permeation into various industry and
    research sectors. It aims to alleviate some of the complex, time-consuming aspects
    of the data science process, allowing for broader usage and more accessible application
    of ML technologies.


    For software engineers well versed in ML and data science processes, the increasing
    complexity of ML models and the expanding universe of algorithms can pose a significant
    challenge. Building a robust, high-performing model requires substantial expertise,
    time, and computational resources to select suitable algorithms, tune hyperparameters,
    and conduct in-depth comparisons. AutoML has emerged as a solution to these challenges,
    aiming to automate these complex, frequently labor-intensive tasks.


    AutoML also serves to democratize the field of ML. By abstracting away some of
    the complexities of data engineering and model building and tuning, AutoML makes
    it possible for individuals and organizations with less experience in ML to leverage
    these powerful technologies. As a result, ML can be effective in a broader array
    of contexts, with more individuals and organizations capable of deploying ML solutions.


    AutoML systems are available at various levels of complexity. Although all AutoML
    systems aim to simplify the ML workflow, most systems and tools only focus on
    parts of the workflow. Commonly, steps such as data preprocessing, feature engineering,
    model selection, and hyperparameter tuning are automated. Such automation saves
    time and can improve the robustness and performance of ML models by systematically
    exploring a more comprehensive array of options that may be overlooked or unexplored
    due to human biases or time constraints.


    ## Automating feature engineering


    As discussed in *Chapter 6, Solving Real-World Data Science Problems with LightGBM*,
    data cleaning and feature engineering are critical parts of the ML workflow. They
    involve dealing with unusable data, handling missing values, and creating meaningful
    features that can be fed into the model. Manual feature engineering can be particularly
    challenging and time-consuming. AutoML systems aim to handle these tasks effectively,
    enabling automated feature extraction and transformation, leading to more robust
    models.


    Data cleaning automation is typically achieved by following specific well-known
    techniques for dealing with problems such as outliers and missing values. In previous
    chapters, we applied some of these techniques manually: outliers can be tested
    statistically and capped or truncated. Missing values are typically imputed using
    descriptive statistics such as the mean or the mode. AutoML systems either use
    heuristic algorithms and tests to select the best techniques to clean the data
    or take multiple approaches and tests that work best by training models against
    the data.'

  mdcn: "一个关键问题在于，我们如何确定能够减少误差残差的变化。梯度提升通过应用一种广泛使用的优化问题——梯度下降，来解决误差最小化问题。\n\n## 梯度下降\n\
    \n**梯度下降**是一种优化算法，它试图找到使**损失函数**最小化的最优参数。通过沿着损失函数负梯度方向（从而减小函数值）进行小步迭代来更新参数。损失函数在概念上类似于误差函数，但具有两个重要特性，如下所述：\n\
    \n- 损失函数产生一个数值，用于量化模型的性能或精确衡量模型表现有多差。一个好的损失函数对于性能不同的模型会产生显著不同的输出。一些误差函数也可以用作损失函数——例如，**均方误差（MSE）**。\n\
    - 第二个特性是损失函数必须是可微的，特别是在梯度下降的背景下。一个不可微的误差函数例子是F1分数。F1分数可以产生模型性能的数值，但它不可微，不能用作损失函数。\n\
    \n因此，梯度下降的过程可以定义如下。假设我们有一个针对参数 $x$ 定义的损失函数 $L$。对于一组初始参数，损失计算为 $L(x_0)$。梯度下降迭代进行以最小化损失函数：\n\
    \n$L(x_{n+1}) < L(x_n)$\n\n为了更新参数，*我们沿着 $L$ 的负梯度方向迈出一步*。我们可以将梯度下降更新规则指定如下：\n\n\
    $x_{n+1} = x_n - \\gamma_n \\nabla L(x_n)$\n\n这里，$\\gamma_n$ 是**学习率**，它定义了步长，而\
    \ $\\nabla L(x_n)$ 是 $L$ 在 $x_n$ 处的梯度。\n\n*图2.3*中的图表说明了梯度下降过程：\n\n![](img/5c9d6611c41357518a5920ff1f360451_53_0.png)\n\
    \n图2.3 – 展示梯度下降过程以找到函数最小值的图表\n\n选择合适的学习率对于梯度下降的成功至关重要。如果学习率太低，优化将非常缓慢，可能在允许的迭代次数内无法达到最小值。较小的学习率也可能导致过程陷入局部最小值：步长太小而无法逃脱。相反，假设学习率太大。在这种情况下，我们可能会跨过最小值而完全错过它，或者陷入在最小值附近振荡（不断来回跳跃但永远不会下降到最优值）。\n\
    \n## 梯度提升\n\n既然我们理解了梯度下降的工作原理，我们就可以看到它在梯度提升中是如何应用的。我们将通过一个小型示例详细讲解整个梯度提升算法。在我们的示例中，我们将使用回归树，因为它比分类情况更容易理解。\n\
    \n### 梯度提升算法\n\n梯度提升算法定义如下，其中 $M$ 是提升树的数量 [3]：\n\n1. 给定训练数据 $\\{(x_i, y_i)\\}_{i=1}^n$，包含\
    \ $n$ 个训练样本（由特征 $x_i$ 和目标 $y_i$ 定义）和一个可微的损失函数 $L(y_i, F(x))$，其中 $F(x)$ 是模型 $F$\
    \ 的预测值。\n2. 用一个常数预测值初始化模型 $F_0(X) = \\arg\\min_y \\sum_{i=1}^n L(y_i, y)$\n3.\
    \ 对于 $m = 1$ 到 $M$：\n    计算伪残差 $r_{im} = -\\left[\\frac{\\partial L(y_i, F(x_i))}{\\\
    partial F(x_i)}\\right]_{F(x)=F_{m-1}(x_i)}$，其中 $i = 1, ..., n$\n    对 $r_{im}$\
    \ 值拟合一个回归树，并为 $j = 1...J_m$ 创建终端区域 $R_{jm}$\n    对于 $j = 1...J_m$，计算 $\\gamma_{jm}\
    \ = \\arg\\min_\\gamma \\sum_{x \\in R_{jm}} L(y_i, F_{m-1}(x_i) + \\gamma)$\n\
    \    更新 $F_m(x) = F_{m-1}(x) + \\nu \\sum_{j=1}^{J_m} \\gamma_{jm} I(x \\in R_{jm})$\n\
    4. 结果：$F_M(x)$\n\n尽管算法，尤其是数学部分，可能看起来令人生畏，但实际上它比看起来要简单得多。我们将逐步讲解该算法。考虑以下示例数据集：\n\
    \n| 性别 | 空腹血糖 | 腰围 | BMI | LDL 胆固醇 |\n| :--- | :--- | :--- | :--- | :--- |\n|\
    \ 男 | 105 | 110 | 29.3 | 170 |\n| 女 | 85 | 80 | 21 | 90 |\n| 男 | 95 | 93 | 26\
    \ | 113 |\n\n表2.2 – 包含患者身体测量值和测量的低密度脂蛋白（LDL）胆固醇的示例数据集\n\n给定身体测量值，我们的目标是预测患者的LDL胆固醇。\n\
    \n上表定义了我们的训练数据 $\\{(x_i, y_i)\\}_{i=1}^n$，其中 $x$ 是特征（血糖、腰围、BMI），$y$ 是目标：LDL胆固醇。\n\
    \n我们需要一个可微的损失函数，为了简化本例中的一些数学推导，我们选择以下类似于MSE函数的损失函数：\n\n$$L = \\frac{1}{2} \\sum_{i=0}^{n}\
    \ (y_i - \\gamma)^2$$\n\n我们现在详细讲解算法的每一步，看看梯度提升树是如何产生的。\n\n第一步是找到 $F_0(x) = \\\
    text{argmin}_{\\gamma} \\sum_{i=1}^{n} L(y_i, \\gamma)$，其中 $y_i$ 是我们的目标值，$\\gamma$\
    \ 是我们的初始预测值。*我们的初始预测是常数，简单来说就是目标值的平均值。但让我们看看为什么。*\n\n$F_0(x)$ 的方程表明我们需要找到一个 $\\\
    gamma$ 值来最小化我们的损失函数。为了找到最小值，我们对损失函数关于gamma求导：\n\n$$\\frac{\\partial L}{\\partial\
    \ \\gamma} = \\frac{2}{2} \\left( \\sum_{i=0}^{n} (y_i - \\gamma) \\right) \\\
    times -1$$\n\n然后，将其设为0并求解以下方程：\n\n$$-\\left( \\sum_{i=0}^{n} (y_i - \\gamma) \\\
    right) = 0$$\n$$-\\frac{1}{n} \\sum_{i=0}^{n} y_i + \\gamma = 0$$\n$$\\gamma =\
    \ \\frac{1}{n} \\sum_{i=0}^{n} y_i$$\n\n该方程简化为计算目标值的平均值。\n\n用预测值更新我们的表格，我们得到：\n\
    \n| 性别 | 空腹血糖 | 腰围 | BMI | LDL 胆固醇 | 预测值 $F_0(x)$ |\n| :--- | :--- | :--- | :---\
    \ | :--- | :--- |\n| 男 | 105 | 110 | 29.3 | 170 | 125 |\n| 女 | 85 | 80 | 21 |\
    \ 90 | 125 |\n| 男 | 95 | 93 | 26 | 113 | 125 |\n\n表2.3 – 我们对每位患者的LDL胆固醇初始预测值（$F_0(x)$）是常数\n\
    \n我们重复以下步骤 $M$ 次，其中 $M$ 是我们选择构建的树的数量。\n\n我们现在需要计算伪残差 $r_{im} = -\\left[ \\frac{\\\
    partial L(y_i, F(x_i))}{\\partial F(x_i)} \\right]_{F(x)=F_{m-1}(x)}$。这个 $r_{im}$\
    \ 的方程表明，我们使用损失函数关于预测值的偏导数的负值来计算伪残差。*梯度提升算法的这一部分与梯度下降有关：我们取梯度的负值以最小化残差。* 幸运的是，我们已经计算了这个导数：\n\
    \n$$-\\left[ \\frac{\\partial L(y_i, F(x_i))}{\\partial F(x_i)} \\right] = -\\\
    frac{\\partial}{\\partial F(x_i)} \\left( \\frac{1}{2} (y_i - F(x_i))^2 \\right)\
    \ = \\frac{2}{2} (y_i - F(x_i)) = (y_i - F(x_i))$$\n\n这里，$F(x_i)$ 是预测值。换句话说，*该方程简化为目标值与预测值之间的差值。*\
    \ 我们可以将残差添加到表格中，如下所示：\n\n| 性别 | 空腹血糖 | 腰围 | BMI | LDL 胆固醇 | 预测值 $F_0(x)$ | $F_0(x)$\
    \ 的残差 |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| 男 | 105 | 110 |\
    \ 29.3 | 170 | 125 | 45 |\n| 女 | 85 | 80 | 21 | 90 | 125 | -35 |\n| 男 | 95 | 93\
    \ | 26 | 113 | 125 | -12 |\n\n表2.4 – 根据我们的初始预测，我们可以计算每位患者的残差，如 $F_0(x)$ 的残差列所示\n\
    \n下一步很直接：我们构建一个回归树来预测残差。我们不直接使用回归树的预测值。相反，我们使用*终端区域*来计算更新后的预测。终端区域指的是树的叶节点。\n\n\
    对于这个例子，我们假设构建了以下简单的回归树：\n\n![](img/5c9d6611c41357518a5920ff1f360451_56_0.png)\n\
    \n图2.4 – 预测残差的回归树\n\n回归树构建完成并定义了叶节点后，我们可以继续下一步。我们需要计算 $\\gamma_{jm}$，使其最小化我们的损失函数，同时考虑之前的预测，即\
    \ $\\gamma_{jm} = \\text{argmin}_{\\gamma} \\sum_{x_i \\in R_{jm}} L(y_i, F_{m-1}(x_i)\
    \ + \\gamma)$。这几乎与我们在*步骤1*中所做的完全相同，我们当时证明了由于我们选择的损失函数，该方程简化为取预测值的平均值。*在这里，这意味着取每个叶节点中残差的平均值。*\
    \ 因此，我们有 $\\gamma_{1,1} = \\frac{-35-12}{2} = -23.5$ 和 $\\gamma_{2,1} = \\frac{45}{1}\
    \ = 45$。\n\n最后，我们现在可以计算下一个预测值 $F_1(x)$，其定义为：$F_m(x) = F_{m-1}(x) + \\nu \\sum_{j=1}^k\

  mdcn: "## XGBoost 概述\n\n**XGBoost**，全称 **eXtreme Gradient Boosting**，是一个广受欢迎的开源梯度提升库，其目标和功能与\
    \ LightGBM 类似。XGBoost 比 LightGBM 更早出现，由陈天奇开发，并于 2014 年首次发布 [1]。\n\n其核心实现了 GBDTs，并支持高效地构建它们。XGBoost\
    \ 的一些主要特性如下：\n\n- **正则化**：XGBoost 结合了 L1 和 L2 正则化以避免过拟合\n- **稀疏性感知**：XGBoost 能高效处理稀疏数据和缺失值，在训练过程中自动学习最佳的填充策略\n\
    - **并行化**：该库采用并行和分布式计算技术同时训练多棵树，显著减少了训练时间\n- **提前停止**：XGBoost 提供了一个选项，如果模型性能没有显著提升，可以停止训练过程，从而提高性能并防止过拟合\n\
    - **跨平台兼容性**：XGBoost 支持多种编程语言，包括 Python、R、Java 和 Scala，使其能够服务于多样化的用户群体\n\n多年来，XGBoost\
    \ 在机器学习社区中广受欢迎，这得益于其对各种应用的支持以及该库的易用性和高效性。\n\n## XGBoost 与 LightGBM 的比较\n\nXGBoost\
    \ 和 LightGBM 在功能上有相当大的重叠。两个库都实现了 GBDTs 和 DART，并支持构建随机森林。两者都有类似的技术来避免过拟合，并自动处理缺失值和稀疏数据。\n\
    \n然而，XGBoost 和 LightGBM 之间的一些区别如下：\n\n- **树生长策略**：XGBoost 采用逐层生长的方法，即树是逐层构建的，而\
    \ LightGBM 使用逐叶生长的策略，专注于通过选择 delta 损失最大的叶子来生长树。这种生长策略的差异通常使得 LightGBM 更快，尤其是在处理大型数据集时。\n\
    - **速度和可扩展性**：LightGBM 在内存使用和计算时间方面设计得更高效，使其成为大型数据集或训练时间至关重要的情况下的更好选择。然而，这种速度优势有时可能会以模型预测的更高方差为代价。\n\
    - **处理分类特征**：LightGBM 内置了对分类特征的支持，这意味着它可以直接处理它们，而无需进行独热编码或其他预处理技术。另一方面，XGBoost\
    \ 要求用户在将分类特征输入模型之前对其进行预处理。\n- **提前停止**：XGBoost 提供了一个选项，如果模型性能没有显著提升，可以停止训练过程。LightGBM\
    \ 没有内置此功能，但可以使用回调函数手动实现，如前面章节所示。\n\n总之，LightGBM 和 XGBoost 提供了相似的功能。LightGBM 在具有许多特征的大型数据集上表现更好，而\
    \ XGBoost 在中小型数据集上可能提供更稳定和准确的结果。\n\n## Python XGBoost 示例\n\nXGBoost 提供了一个基于 scikit-learn\
    \ 的接口来构建模型。以下示例展示了如何在 Forest Cover 数据集上使用 XGBoost：\n\n```\nfrom xgboost import\
    \ XGBClassifier\n...\ndataset = datasets.fetch_covtype()\n\nX_train, X_test, y_train,\
    \ y_test = train_test_split(\n    dataset.data, dataset.target, random_state=179\n\
    )\n\ny_train = y_train - 1\ny_test = y_test - 1\nxgb = XGBClassifier(\n    n_estimators=150,\
    \ max_leaves=120, learning_rate=0.09\n)\nxgb = xgb.fit(X_train, y_train)\nf1_score(y_test,\
    \ xgb.predict(X_test), average=\"macro\")\n```\n\nscikit-learn 接口在现阶段你应该已经熟悉了。前面的代码表明\
    \ XGBoost 支持与我们用于训练基于 LightGBM 的模型类似的超参数。完整的参数列表可在 https://xgboost.readthedocs.io/en/stable/parameter.html\
    \ 获取。\n\nXGBoost 作为另一个梯度提升库，是 LightGBM 的直接替代品。在下一节中，我们将探讨深度学习，一种完全不同但极其流行的学习技术，以及它与梯度提升在表格学习问题上的比较。\n\
    \n## 深度学习与 TabTransformers\n\n我们现在来看一种使用深度学习解决基于表格数据问题的方法。近年来，深度学习因其模型的性能而获得了巨大的普及。基于深度学习的技术，如\
    \ AlphaZero、Stable Diffusion 和 GPT 系列语言模型，在游戏、艺术生成和基于语言的推理方面达到了人类或超人类的性能。\n\n\
    ## 什么是深度学习？\n\n**深度学习**是更广泛的人工神经网络机器学习领域的一个子领域。人工神经网络是人脑的数学模拟，由相互连接的节点层（或生物学术语中的“神经元”）组成，用于处理和传输信息。\n\
    \n简单的人工神经网络仅由几层组成。深度学习中的“深度”一词指的是使用具有更多层的神经网络，每层可能有数千个神经元。这些层是分层组织的，*输入*层在底部，*输出*层在顶部，*隐藏*层在中间。当数据通过网络时，每一层都会提取和精炼特征，使模型能够学习复杂的模式和表示。\n\
    \n下图描绘了一个简单的神经网络，称为具有单个隐藏层的多层感知器。\n\n![](img/5c9d6611c41357518a5920ff1f360451_88_0.png)\n\
    \n图 4.1 – 一个具有单个隐藏层和一个输出层的多层感知器。各层是全连接的\n\n每个神经元从其他神经元接收输入，执行数学运算，然后将结果传递给下一层神经元。\n\
    \n数学运算涉及两个主要步骤——加权求和与激活函数：\n\n1. **加权求和**：神经元获取输入（输入数据或前一层神经元的输出），将每个输入乘以其对应的权重，然后将它们相加。通常会在加权求和中添加一个偏置项，以便更好地控制神经元的输出。数学上，这可以表示为：\n\
    \n$$z_j = \\sum_i (w_{ij}x_i) + b_j$$\n\n这里，$x_i$ 代表神经元的所有输入，$w_{ij}$ 是与第 $i$\
    \ 个输入相关的权重，$b_j$ 是神经元的偏置。\n\n2. **激活函数**：然后将加权求和通过一个激活函数，该函数决定了神经元的输出。激活函数的目的是在数学运算中引入非线性。非线性使得神经网络能够建模输入和输出之间的非线性且复杂的关系。有各种激活函数，例如\
    \ **sigmoid**（逻辑函数）、**双曲正切 (tanh)** 和 **修正线性单元 (ReLU)**，每种都有其自身的特性和用例。这可以表示为：\n\
    \n$$a_j = \\sigma(z_j)$$\n\n其中 $a_j$ 是神经元输出，$\\sigma$ 是激活函数。\n\n结合这两个步骤，神经网络中的一个神经元处理输入数据，使网络能够学习和建模复杂的模式。\n\
    \n神经网络通过调整与神经元相关的权重进行训练。该算法可以总结如下：\n\n1. 权重被初始化为小的随机值。\n2. 执行**前向传播**：对于批次中的每个样本，输入特征通过整个网络传递（在每个神经元处计算求和与激活），在输出层产生预测。\n\
    3. 然后通过比较输出与批次中每个样本的实际输出来计算损失。与 GBDTs 一样，损失函数必须是可微的，标准损失函数包括均方误差 (MSE) 和交叉熵损失。\n\
    4. 执行**反向传播**：使用微积分链式法则计算损失函数相对于权重的梯度。该过程从输出层开始，通过网络反向进行。\n5. 然后使用梯度下降或其现代变体（如\
    \ Adam）根据反向传播的梯度更新权重。\n6. 该过程重复固定的轮数（每个轮次运行整个数据集）以最小化损失函数。\n\n神经网络的一个独特性质是，神经网络已被证明是**通用函数逼近器**。深度神经网络\
    \ (DNN) 具有理论上逼近任何连续函数的能力。"

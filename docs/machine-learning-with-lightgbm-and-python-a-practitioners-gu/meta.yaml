  md: "We have now built the core of the API endpoint. However, we must also pay attention\
    \ to non-functional concerns such as security. Often, ML engineers neglect aspects\
    \ such as security or performance and focus only on ML concerns. We mustn't make\
    \ this mistake and must ensure we give these concerns the necessary attention.\n\
    \n# Securing the API\n\nTo secure our endpoint, we'll make use of HTTP Basic authentication.\
    \ We use a preset username and password, which we read from the environment. This\
    \ allows us to securely pass these credentials to the application during deployment\
    \ and avoids pitfalls such as hardcoding the credentials. Our endpoint also needs\
    \ to be enhanced to accept credentials from the user. HTTP Basic authentication\
    \ credentials are sent as an HTTP header.\n\nWe can implement this as follows.\
    \ We first set up security for FastAPI and read the credentials from the environment:\n\
    \n```\nsecurity = HTTPBasic()\nUSER = bytes(os.getenv(\"CHURN_USER\"), \"utf-8\"\
    )\nPASSWORD = bytes(os.getenv(\"CHURN_PASSWORD\"), \"utf-8\")\n```\n\nWe then\
    \ add the following to the endpoint function:\n\n```\n@app.post('/predict')\n\
    def predict_instances(\n    credentials: Annotated[HTTPBasicCredentials,\n   \
    \                        Depends(security)],\n    instances: list[dict[str, str]]\n\
    ):\n    authenticate(credentials.username.encode(\"utf-8\"),\n               \
    \  credentials.password.encode(\"utf-8\"))\n```\n\nThe authenticate function validates\
    \ the received credentials against the API credentials we got from the environment.\
    \ We can use Python's secrets library to do the validation:\n\n```\ndef authenticate(username:\
    \ bytes, password: bytes):\n    valid_user = secrets.compare_digest(\n       \
    \ username, USER\n    )\n    valid_password = secrets.compare_digest(\n      \
    \  password, PASSWORD\n    )\n    if not (valid_user and valid_password):\n  \
    \      raise HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n\
    \            detail=\"Incorrect username or password\",\n```"

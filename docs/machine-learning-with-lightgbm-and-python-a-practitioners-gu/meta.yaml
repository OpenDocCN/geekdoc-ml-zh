    # Advanced Optuna features


    When optimizing hyperparameters for large machine learning problems, the optimization
    process may run for days or weeks. In these cases, saving an optimization study
    and resuming it later is helpful to guard against data loss or migrating the study
    between different machines.


    # Saving and resuming an optimization study


    Optuna supports saving and resuming an optimization study in two ways: **in memory**
    and using a **remote database (RDB)**.


    When a study is run in memory, the standard Python methods for serializing an
    object can be applied. For example, either `joblib` or `pickle` may be used. We
    use `joblib` to save a study:


    ```

    joblib.dump(study, "lgbm-optuna-study.pkl")

    ```


    To restore and resume the study, we deserialize the `study` object and continue
    with optimization:


    ```

    study = joblib.load("lgbm-optuna-study.pkl")

    study.optimize(objective(), n_trials=20, gc_after_trial=True, n_jobs=-1)

    ```


    The alternative to running the study in memory is to use an RDB. When using an
    RDB, the study''s intermediate (trial) and final results are persisted in a SQL
    database backend. The RDB can be hosted on a separate machine. Any of the SQL
    databases supported by SQL Alchemy may be used (https://docs.sqlalchemy.org/en/20/core/engines.html#database-urls).'

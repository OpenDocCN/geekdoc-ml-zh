  md: '# Results


    Parameter optimization was performed for all three algorithms using the grid search
    technique discussed in the previous chapter. The learning rate, bin size, and
    number of trees were optimized for the two boosting algorithms. For the TabTransformer,
    both parameters and aspects of the architecture must be optimized. In terms of
    parameters, the learning rate, weight decay, and dropout rate were optimized,
    while for the architecture, the number of transformer blocks and hidden layers
    (in the MLP) had to be chosen. The optimized parameters are available in the source
    code.


    The following table shows the results of the validation set for the algorithms.


    | Model | Training Time | Accuracy | F1 score |

    |---|---|---|---|

    | LightGBM GBDT | 1.05s | 84.46% | 0.71 |

    | XGBoost GBDT | 5.5s | 84.44% | 0.72 |

    | TabTransformer | 113.63s | 77.00% | 0.64 |


    Table 4.3 – Results from training the three models on the Census Income dataset


    XGBoost and LightGBM performed similarly on the dataset, reaching an accuracy
    of 84% and an F1 score of 0.7. The TabTransformer model performed worse, with
    a lower accuracy and F1 score.


    Regarding training time, LightGBM was much faster than the other approaches. The
    LightGBM model was trained 5.23 times faster than XGBoost and 108.22 times faster
    than the TabTransformer. The TabTransformer was trained for 15 epochs on an 8-core
    P4000 GPU.


    For another point of comparison and to illustrate how the TabTransformer architecture
    can be adapted when categorical features aren''t present, we look at solving a
    second problem using the three algorithms.


    # Detecting credit card fraud



  md: "```\njob_arguments=[\n    \"--train-ratio\", \"0.8\",\n    \"--validation-ratio\"\
    , \"0.1\",\n    \"--test-ratio\", \"0.1\"\n],\ncode=f\"s3://{write_bucket}/{write_prefix}/scripts/preprocessing.py\"\
    \n)\n```\n\ninputs and outputs are defined using the ProcessingInput and ProcessingOutput\
    \ wrappers, as shown here:\n\n```\ninputs = [ ProcessingInput(source=bank_marketing_data_uri,\n\
    \    destination=\"/opt/ml/processing/bank-marketing\") ]\noutputs = [ ProcessingOutput(destination=f\"\
    {processing_output_uri}/train_data\", output_name=\"train_data\",\n    source=\"\
    /opt/ml/processing/train\"), ... ]\n```\n\nProcessingStep takes our scikit-learn\
    \ processor and the inputs and outputs for the data. The ProcessingInput instances\
    \ define the S3 source and local directory destination to facilitate copying the\
    \ data (these are the same local directories our preprocessing script uses). Similarly,\
    \ the ProcessingOutput instances take the local directory source and S3 destinations.\
    \ We also set job arguments, which are passed to the preprocessing script as CLI\
    \ arguments.\n\nHaving set up the preprocessing step, we can move on to training.\n\
    \n# Model training and tuning\n\nWe define a training script in the same way as\
    \ a preprocessing script: a Python script with a main function that uses our standard\
    \ Python tools, such as scikit-learn, to train a LightGBM model. However, we also\
    \ need to install the LightGBM library itself.\n\nAn alternative to installing\
    \ the library is building it into a Docker image and using it as our training\
    \ image in SageMaker. This is the canonical way of managing environments in SageMaker.\
    \ However, it entails significant work and includes the long-term need to maintain\
    \ the image over time. Alternatively, if we only need to install a handful of\
    \ dependencies, we can do that directly from our training script, as shown here.\n\
    \nWe must define a helper function to install packages and then use it to install\
    \ LightGBM:\n\n```\ndef install(package):\n    subprocess.check_call([sys.executable,\
    \ \"-q\", \"-m\", \"pip\",\n    \"install\", package])\ninstall(\"lightgbm\")\n\
    import lightgbm as lgb\n```"
  merge: -1

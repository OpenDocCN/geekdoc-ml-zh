    further until we reach a leaf node that contains the predicted class (versicolor,
    virginica, or setosa).


    Compared to other models, decision trees have many advantages:


    +   - **Features may be numeric or categorical**: Samples can be split using either
    numerical features (by splitting a range) or categorical ones without us having
    to encode either.

    - **Reduced need for data preparation**: Decision splits are not sensitive to
    data ranges or size. Many other models (for example, neural networks) require
    data to be normalized to unit ranges.

    - **Interpretability**: As shown previously, it''s straightforward to interpret
    the predictions made by a tree. Interpretability is valuable in contexts where
    a prediction must be explained to decision-makers.


    These are just some of the advantages of using tree-based models. However, we
    also need to be aware of some of the disadvantages associated with decision trees:


    +   - **Overfitting**: Decision trees are very prone to overfitting. Setting the
    correct hyperparameters is essential when fitting decision trees. Overfitting
    in decision trees will be discussed in detail later.

    - **Poor extrapolation**: Decision trees are poor at extrapolation since their
    predictions are not continuous and are effectively bounded by the training data.

    - **Unbalanced data**: When fitting a tree on unbalanced data, the high-frequency
    classes dominate the predictions. Data needs to be prepared to remove imbalances.


    A more detailed discussion of the advantages and disadvantages of decision trees
    is available at https://scikit-learn.org/stable/modules/tree.html.


    # Entropy and information gain


    First, we need a rudimentary understanding of entropy and information gain before
    we look at an algorithm for building (or fitting) a decision tree.


    Entropy can be considered a way to measure the disorder or randomness of a system.
    Entropy measures how surprising the result of a specific input or event might
    be. Consider a well-shuffled deck of cards: drawing from the top of the deck could
    give us any of the cards in the deck (a surprising result each time); therefore,
    we can say that a shuffled deck of cards has **high entropy**. Drawing cards from
    the top of an ordered deck is unsurprising; we know which cards come next. Therefore,
    an ordered deck of cards has **low entropy**. Another way to interpret entropy
    is the impurity of the dataset: a low-entropy dataset (neatly ordered) has less
    impurity than a high-entropy dataset.


    Information gain, in turn, is the amount of information gained when modifying
    or observing the underlying data. Information gain involves reducing entropy from
    before the observation. In our deck of cards example, we might take a shuffled
    deck of cards and split it into four smaller decks by suit (spades, hearts, diamonds,
    and clubs). If we draw from the smaller decks, the outcome is less of a surprise:
    we know that the next card is from the same suit. By splitting the deck by suit,
    we have'
  merge: -1
  pgno: 39
- img_proc: true
  md: 'reduced the entropy of the smaller decks. Splitting the deck of cards on a
    feature (the suit) is very similar to how the splits in a decision tree work;
    each division seeks to maximize the information gain – that is, they minimize
    the entropy after the split.


    In decision trees, there are two common ways of measuring information gain or
    the loss of impurity:


    +   - The Gini index

    - Log loss or entropy


    A detailed explanation of each is available at https://scikit-learn.org/stable/modules/tree.html#classification-criteria.


    # Building a decision tree using C4.5


    C4.5 is an algorithm for building a decision tree from a dataset [1]. The algorithm
    is recursive and starts with the following base cases:


    +   1. If all the samples in a sub-dataset are of the same class, create a leaf
    node in the tree that chooses that class.

    2. If no information can be gained by splitting using any of the features (the
    dataset can''t be divided any further), create a leaf node that predicts the most
    frequent class contained in the sub-dataset.

    3. If a minimum threshold of samples is reached in a sub-dataset, create a leaf
    node that predicts the most frequent class contained in the sub-dataset.


    Then, we can apply the algorithm:


    +   1. Check for any of the three base cases and stop splitting if any applies
    to the dataset.

    2. For each feature or attribute of the dataset, calculate the information gained
    by splitting the dataset on that feature.

    3. Create a decision node by splitting the dataset on the feature with the highest
    information gain.

    4. Split the dataset into two sub-datasets based on the decision node and recursively
    reply to the algorithm on each sub-dataset.


    Once the tree has been built, pruning is applied. During pruning, decision nodes
    with a relatively lower information gain than other tree nodes are removed. Removing
    nodes avoids overfitting the training data and improves the tree''s generalization
    ability.


    # Classification and Regression Tree


    You may have noticed that in the preceding explanations, we only used classes
    to split datasets using decision nodes; this is not by chance, as the canonical
    C4.5 algorithm only supports classification trees. **Classification and Regression
    Tree (CART)** extends C4.5 to support numerical target variables – that'
  merge: -1
  pgno: 40
- img_proc: true
  md: 'is, regression problems [2]. With CART, decision nodes can also split continuous
    numerical input variables to support regression, typically using a threshold (for
    example, x <= 0.3). When reaching a leaf node, the mean or median of the remaining
    numerical range is generally taken as the predicted value.


    When building classification trees, only impurity is used to determine splits.
    However, with regression trees, impurity is combined with other criteria to calculate
    optimal splits:


    +   - The MSE (or MAE)

    - Half Poisson Deviance


    A detailed mathematical explanation of each is available at https://scikit-learn.org/stable/modules/tree.html#regression-criteria.


    scikit-learn uses an optimized version of CART to build decision trees.


    # Overfitting in decision trees


    One of the most significant disadvantages of decision trees is that they are prone
    to overfitting. Without proper hyperparameter choices, C4.5 and other training
    algorithms create overly complex and deep trees that fit the training data almost
    exactly. Managing overfitting is a crucial part of building decision trees. Here
    are some strategies to avoid overfitting:


    +   - **Pruning:** As mentioned previously, we can remove branches that do not
    contribute much information gain; this reduces the tree''s complexity and improves
    generalization.

    - **Maximum depth:** Limiting the depth of the tree also avoids overly complex
    trees and avoids overfitting.

    - **Maximum number of leaf nodes:** Similar to restricting depth, limiting the
    number of leaf nodes avoids overly specific branches and improves generalization.

    - **Minimum samples per leaf:** Setting a minimum limit on the number of samples
    a leaf may contain (stopping splitting when the sub-dataset is of the minimum
    size) also avoids overly specific leaf nodes.

    - **Ensemble methods:** Ensemble learning is a technique that combines multiple
    models to improve the prediction over an individual model. Averaging the prediction
    of multiple models can also reduce overfitting.


    These strategies can be applied by setting the appropriate hyperparameters. Now
    that we understand how to build decision trees and strategies for overfitting,
    let''s look at building decision trees in scikit-learn.


    # Building decision trees with scikit-learn


    It is time to examine how we may use decision trees by training classification
    and regression trees using scikit-learn.'

    : [\"lgbm\", \"rf\"],\n    \"custom_hp\": {\n        \"n_estimators\": {\n   \
    \         \"domain\": flaml.tune.uniform(20, 500)\n        }\n    },\n    \"verbose\"\
    : -1\n}\n```\n\nThe preceding code sets our time budget, optimization metric,\
    \ and classification task for AutoML. We also limit the estimators to LightGBM\

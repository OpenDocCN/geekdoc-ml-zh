    One of the critical questions relates to how we can determine the changes that
    reduce the error residuals. Gradient boosting solves the error minimization problem
    by applying a widely used optimization problem: gradient descent.


    # Gradient descent


    **Gradient descent** is an optimization algorithm that attempts to find the optimal
    parameters to minimize a **loss function**. The parameters are updated iteratively
    by taking small steps in the direction of the negative gradient of the loss function
    (thereby decreasing the function value). A loss function is similar in concept
    to an error function but has two important properties, as outlined here:


    +   - A loss function produces a numeric value that quantifies the model''s performance
    or precisely how poorly a model is doing. A good loss function produces significantly
    different output for'
  - '[PAGE 53]


    models with different performances. Some error functions can also be used as loss
    functions—for example, **mean squared error (MSE)**.


    +   - The second property is that a loss function must be differentiable, specifically
    in the context of gradient descent. An example of an error function that''s not
    differentiable is the F1 score. The F1 score may produce a numeric value of the
    model''s performance, but it is not differentiable and cannot be used as a loss
    function.


    The process for gradient descent can, then, be defined as follows. Suppose we
    have a loss function $L$ defined for parameters $x$. For an initial set of parameters,
    the loss is calculated as $L(x_0)$. Gradient descent proceeds iteratively to minimize
    the loss function:


    $L(x_{n+1}) < L(x_n)$


    To update the parameters, *we take a step in the direction of the negative gradient
    of L*. We can specify the gradient descent update rule as follows:


    $x_{n+1} = x_n - \gamma_n \nabla L(x_n)$


    Here, $\gamma_n$ is the **learning rate**, which defines the step size, and $\nabla
    L(x_n)$ is the gradient of $L$ at $x_n$.


    The graph in *Figure 2.3* illustrates the gradient descent process:


    ![](img/5c9d6611c41357518a5920ff1f360451_53_0.png)


    Figure 2.3 – Graph showing the gradient descent process to find the minimum of
    a function


    Choosing an appropriate learning rate is critical to gradient descent''s success.
    If the learning rate is too low, the optimization will be very slow, potentially
    not reaching a minimum in the allowed number of iterations. A small learning rate
    could also lead to the process getting stuck in a local minimum:'
  - "[PAGE 54]\n\nthe step size being too small to escape. Conversely, suppose the\
    \ learning rate is too large. In that case, we could step over the minimum and\
    \ miss it entirely or get stuck oscillating around a minimum (constantly jumping\
    \ back and forth but never descending to the optimal value).\n\n# Gradient boosting\n\
    \nNow that we understand how gradient descent works, we can see how it is applied\
    \ in gradient boosting. We will work through the entire gradient-boosting algorithm\
    \ in detail at the hand of a small example. In our example, we'll use a regression\
    \ tree, as it is a bit easier to understand than the case for classification.\n\
    \n# Gradient-boosting algorithm\n\nThe gradient-boosting algorithm is defined\
    \ as follows, where $M$ is the number of boosted trees [3]:\n\n+   1. Given training\
    \ data $\\{(x_i, y_i)\\}_{i=1}^n$, containing $n$ training samples (defined by\
    \ features $x_i$ and target $y_i$) and a differentiable loss function $L(y_i,\
    \ F(x))$, where $F(x)$ are the predictions from model $F$.\n2. Initialize the\
    \ model with a constant prediction value $F_0(X) = \\arg\\min_y \\sum_{i=1}^n\
    \ L(y_i, y)$\n3. For $m = 1$ to $M$:\n    Compute pseudo residuals $r_{im} = -\\\
    left[\\frac{\\partial L(y_i, F(x_i))}{\\partial F(x_i)}\\right]_{F(x)=F_{m-1}(x_i)}$\
    \ for $i = 1, ..., n$\n    Fit a regression tree to the $r_{im}$ values and create\
    \ terminal regions $R_{jm}$ for $j = 1...J_m$\n    For $j = 1...J_m$ compute $\\\
    gamma_{jm} = \\arg\\min_\\gamma \\sum_{x \\in R_{jm}} L(y_i, F_{m-1}(x_i) + \\\
    gamma)$\n    Update $F_m(x) = F_{m-1}(x) + \\nu \\sum_{j=1}^{J_m} \\gamma_{jm}\
    \ I(x \\in R_{jm})$\n4. Result: $F_M(x)$\n\nAlthough the algorithm and especially\
    \ the mathematics might look intimidating, it is practically much more straightforward\
    \ than it appears. We'll go through the algorithm step by step. Consider the following\
    \ toy dataset:\n\n| Gender | Fasting Blood Sugar | Waist Circumference | BMI |\
    \ LDL Cholesterol |\n| :--- | :--- | :--- | :--- | :--- |\n| Male | 105 | 110\
    \ | 29.3 | 170 |\n| Female | 85 | 80 | 21 | 90 |\n| Male | 95 | 93 | 26 | 113\
    \ |\n\nTable 2.2 – Example dataset consisting of a patient's physical measurements\
    \ and measured low-density lipoprotein (LDL) cholesterol\n\nGiven the physical\
    \ measurements, we aim to predict a patient's LDL cholesterol.\n\nThe preceding\
    \ table defines our training data $\\{(x_i, y_i)\\}_{i=1}^n$, where $x$ is the\
    \ features (blood sugar, waist circumference, BMI) and $y$ is the target: LDL\
    \ cholesterol."
  - '[PAGE 55]


    We need a differentiable loss function, and to simplify some of the mathematical
    derivations in this example, we choose the following loss function, which is similar
    to the MSE function:


    $$L = \frac{1}{2} \sum_{i=0}^{n} (y_i - \gamma)^2$$


    We now work through each algorithm step in detail to see how the gradient-boosted
    tree is produced.


    The first step is to find $F_0(x) = \text{argmin}_{\gamma} \sum_{i=1}^{n} L(y_i,
    \gamma)$, where $y_i$ is our target value and $\gamma$ is our initial predicted
    value. *Our initial prediction is constant and is simply the average of the target
    values. But let''s see why.*


    The equation for $F_0(x)$ is stating that we need to find a value for $\gamma$
    that minimizes our loss function. To find the minimum, we take the derivative
    of the loss function with respect to gamma:


    $$\frac{\partial L}{\partial \gamma} = \frac{2}{2} \left( \sum_{i=0}^{n} (y_i
    - \gamma) \right) \times -1$$


    Then, set it to 0 and solve the following equation:


    $$-\left( \sum_{i=0}^{n} (y_i - \gamma) \right) = 0$$

    $$-\frac{1}{n} \sum_{i=0}^{n} y_i + \gamma = 0$$

    $$\gamma = \frac{1}{n} \sum_{i=0}^{n} y_i$$


    The equation simplifies to calculating the average of the target values.


    Updating our table with the predictions, we have the following:


    | Gender | F. Blood Sugar | W. Circum. | BMI | LDL Cholesterol | PredictionF 0(x)
    |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | Male | 105 | 110 | 29.3 | 170 | 125 |

    | Female | 85 | 80 | 21 | 90 | 125 |

    | Male | 95 | 93 | 26 | 113 | 125 |


    Table 2.3 – Our initial prediction of LDL cholesterol predictions ($F_0(x)$) for
    each patient is constant


    We repeat the following $M$ times, where $M$ is the number of trees we choose
    to build.


    We now need to calculate the pseudo residuals $r_{im} = -\left[ \frac{\partial
    L(y_i, F(x_i))}{\partial F(x_i)} \right]_{F(x)=F_{m-1}(x)}$. This equation for
    $r_{im}$ is stating that we use the negative of the partial derivative of the
    loss function, with respect to the predictions, to calculate the pseudo residuals.
    *This portion of the gradient-boosting algorithm relates to gradient descent:
    we are taking the negative of the gradient to minimize the residuals.* Fortunately,
    we have already calculated this derivative:


    $$-\left[ \frac{\partial L(y_i, F(x_i))}{\partial F(x_i)} \right] = -\frac{\partial}{\partial
    F(x_i)} \left( \frac{1}{2} (y_i - F(x_i))^2 \right) = \frac{2}{2} (y_i - F(x_i))
    = (y_i - F(x_i))$$


    Here, $F(x_i)$ is the predicted value. In other words, *the equation simplifies
    the difference between the target and predicted values.* We can add the residuals
    to the table, as follows:'

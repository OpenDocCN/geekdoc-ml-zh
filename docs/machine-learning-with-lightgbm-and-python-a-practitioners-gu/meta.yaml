    here, some of the potential approaches we can take are as follows:


    +   - Remove instances with missing values

    - Impute the missing values using descriptive statistics (the mean, median, or
    mode)

    - Use other machine learning algorithms, typically unsupervised techniques such
    as clustering, to calculate more robust statistics'

  mdcn: "在给定足够数量的隐藏神经元和适当的激活函数的情况下，神经网络可以达到所需的精度水平。这一特性基于**万能近似定理**，该定理已针对各种类型的神经网络得到证明。\n\
    \n这意味着神经网络可以学习表示输入和输出数据之间的复杂关系，无论这些关系多么复杂或非线性。这种能力是神经网络，尤其是深度神经网络，能够在不同领域成功解决广泛问题的原因之一。然而，这种保证是理论上的。在实践中，找到正确的网络架构、超参数和训练技术以达到所需的近似水平可能具有挑战性。这个过程通常需要实验、专业知识和巨大的计算资源。\n\
    \n## 深度学习的优势与劣势\n\n考虑到深度神经网络的能力，我们可能会认为它们应该是解决所有机器学习问题的首选。使用深度神经网络的主要优势在于其在非常复杂领域中的高准确性：目前在广泛复杂任务、自然语言处理、生成式人工智能、图像识别和语音识别方面的最先进性能都是由深度神经网络实现的，因为它们能够从大型数据集中学习复杂和隐藏的模式。\n\
    \n另一个优势是自动特征提取。通过正确的架构，深度神经网络可以自动提取复杂或高阶特征，从而减轻数据科学家进行特征工程的需求。\n\n最后，深度神经网络还可以进行迁移学习：预训练的深度学习模型可以在较小的数据集上针对特定任务进行微调，利用在初始训练期间获得的知识。迁移学习可以显著减少新任务的训练时间和数据需求。\n\
    \n然而，深度学习并非解决所有机器学习问题的万能药。使用深度神经网络的一些劣势包括：\n\n- **计算资源**：深度学习模型通常需要大量的计算能力和内存进行训练，尤其是在处理大型数据集和复杂架构时。\n\
    - **大型数据集**：深度神经网络在大型数据集上训练时通常表现良好，但在较小数据集上训练时性能可能会下降。当数据集太小时，深度神经网络会过拟合训练数据，无法泛化到未见过的数据。\n\
    - **可解释性**：由于其复杂的架构和涉及的大量参数，深度神经网络通常被认为是“黑匣子”。这种复杂性可能使理解模型如何做出决策变得困难，这对于需要透明度或监管合规性的应用可能是一个问题。\n\
    - **超参数调优**：深度神经网络涉及众多超参数，如网络架构、学习率和激活函数。加上较长的训练时间和资源需求，找到这些超参数的最佳组合可能既昂贵又耗时。\n\
    \n## 介绍TabTransformer\n\n我们希望将深度学习应用于表格数据，因为大多数实际的机器学习问题都涉及表格数据。为此，我们使用一种名为**TabTransformer**的新深度学习架构：一种专门设计用于处理表格数据的深度神经网络模型。\n\
    \n与深度神经网络的GPT系列一样，TabTransformer基于Vaswani等人最初提出的Transformer架构[2]。TabTransformer将Transformer架构调整为有效地处理表格数据，为处理此类数据提供了决策树和梯度提升机等其他机器学习模型的替代方案[3]。\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_91_0.png)\n\nTabTransformer的模型架构如*图4.2*所示。使用TabTransformer时，表格数据中的每个特征都被视为一个标记，类似于自然语言处理中将单词视为标记的方式。该模型应用自注意力机制来学习输入数据中特征之间的复杂交互和依赖关系。标记嵌入和注意力机制使模型能够捕获特征之间的全局和局部关系。\n\
    \nTabTransformer模型有几个关键组件：标记嵌入、位置编码、Transformer层、池化和输出层。标记嵌入将每个特征值转换为连续的向量表示，并通过位置编码与位置信息相结合。\n\
    \n通过*图4.2*所示的层，我们可以看到分类特征和数值特征是分开处理的。\n\n分类特征首先经过嵌入层（在Keras中由`layers.Embedding`实现），然后传递到Transformer块。可以实现可变数量的Transformer块（通过超参数设置），但每个块由一个`layers.MultiHeadAttention`层和一个带有`Dropout`的`layers.Dense`层组成。输出值在通过注意力层和密集层后被相加并归一化。\n\
    \n由于其性能，Transformer前馈层在我们的实现中使用**高斯误差线性单元（GELU）**激活函数。然而，也可以使用其他激活函数[5]。\n\n数值特征通过归一化层（归一化数值输入范围），然后与Transformer的输出连接。\n\
    \n连接的结果通过一个**多层感知机（MLP）**块，该块由可变数量的密集层组成，每层都有`Dropout`。我们的实现使用**缩放指数线性单元（SELU）**，这使得激活值能够自归一化[6]。\n\
    \n最后，MLP块的输出传递给损失函数，其实现取决于学习问题（分类或回归）。\n\nTabTransformer的实现和训练比梯度提升树复杂得多。与其他深度神经网络一样，TabTransformer比梯度提升树需要更多的数据准备和计算能力。\n\
    \n除了TabTransformer，本节还介绍了深度学习及其优势和劣势。在下一节中，我们将使用一个实际示例来比较不同的方法，包括使用TabTransformer的复杂性。\n\
    \n## 比较LightGBM、XGBoost和TabTransformer\n\n在本节中，我们比较LightGBM、XGBoost和TabTransformer在两个不同数据集上的性能。我们还研究了更多针对不平衡类别、缺失值和分类数据的数据准备技术。\n\
    \n## 预测人口普查收入\n\n我们使用的第一个数据集是人口普查收入数据集，它根据教育、婚姻状况、职业等属性预测个人收入是否超过50,000美元[4]。该数据集有48,842个实例，正如我们将看到的，存在一些缺失值和不平衡类别。\n\
    \n该数据集可从以下URL获取：https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data。数据已分为训练集和测试集。加载后，我们可以对数据进行采样：\n\
    \n```\ntrain_data.sample(5) [[\"age\", \"education\", \"marital_status\", \"hours_per_week\"\
    , \"income_bracket\"]]\n```\n\n选定列的数据样本如*表4.1*所示。\n\n| | age | education | marital_status\
    \ | hours_per_week | income_bracket |\n|---|---|---|---|---|---|\n| 12390 | 34\
    \ | Some-college | Never-married | 40 | <=50K |\n| 20169 | 41 | Assoc-acdm | Married-civ-spouse\
    \ | 45 | >50K |\n| 17134 | 35 | Doctorate | Never-married | 60 | >50K |\n| 23452\
    \ | 49 | HS-grad | Married-civ-spouse | 40 | >50K |\n| 22372 | 31 | HS-grad |\
    \ Separated | 45 | <=50K |\n\n表4.1 – 人口普查收入数据集的样本数据\n\n*表4.1*显示我们有混合的数据类型：一些特征是数值型的，另一些是文本型的。值得注意的是，数据集中的一些列是**分类特征**：具有固定值集的基于字符串的特征。接下来，我们研究如何对这些特征进行编码以用于机器学习。\n\
    \n## 对分类特征进行编码\n\n大多数机器学习算法需要将基于字符串的特征编码为数字；在某些情况下，这可以自动完成。我们在*第6章，使用LightGBM解决现实世界的数据科学问题*中讨论了LightGBM的自动编码。在这个示例中，我们对特征进行编码以了解其含义。\n\
    \n我们需要将每个分类值映射到一个唯一的数字；因此，我们首先为每个特征构建一个包含所有值的词汇表：\n\n```\nCATEGORICAL_FEATURES_WITH_VOCABULARY\
    \ = {\n    \"workclass\": sort_none_last(list(train_data[\"workclass\"].unique())),\n\
    \    \"education\": sort_none_last(list(train_data[\"education\"].unique())),\n\
    \    \"marital_status\": sort_none_last(list(train_data[\"marital_status\"].unique())),\n\
    }\n```"

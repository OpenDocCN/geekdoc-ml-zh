  md: '# # What is deep learning?


    **Deep learning** is a subfield of the broader machine learning field of artificial
    neural networks. Artificial neural networks are mathematical mimics of the human
    brain and consist of interconnected layers of nodes (or “neurons” in biological
    parlance) that process and transmit information.


    Simple artificial neural networks consist of only a few layers. The term “deep”
    in deep learning refers to using neural networks of many more layers, each with
    potentially thousands of neurons. These layers are organized hierarchically, with
    *input* layers at the bottom, *output* at the top, and *hidden* between. Each
    layer extracts and refines features as data passes through the network, allowing
    the model to learn complex patterns and representations.


    The following diagram depicts a simple neural network called a multilayer perceptron
    with a single hidden layer.


    ![](img/5c9d6611c41357518a5920ff1f360451_88_0.png)


    Figure 4.1 – A multilayer perceptron with a single hidden layer and an output
    layer. The layers are fully connected


    Each neuron receives input from other neurons, performs a mathematical operation,
    and then passes the result to the next layer of neurons.'
  merge: -1
  pgno: 88
- img_proc: true
  md: 'The mathematical operation involves two main steps – weighted sum and activation
    function:


    +   1. **Weighted sum**: The neuron takes the inputs (input data or outputs from
    previous neurons), multiplies each input by its corresponding weight, and then
    adds them together. A bias term is often added to the weighted sum for better
    control over the neuron''s output. Mathematically, this can be represented as
    follows:


    $$z_j = \sum_i (w_{ij}x_i) + b_j$$


    Here, $x_i$ represents all inputs to the neuron, $w_{ij}$ is the weight associated
    with the $i^{th}$ input, and $b_j$ is the bias for the neuron.


    2. **Activation function**: The weighted sum is then passed through an activation
    function, determining the neuron''s output. The purpose of the activation function
    is to introduce non-linearity into the mathematical operation. The non-linearity
    allows the neural network to model non-linear and, therefore, complex relationships
    between inputs and outputs. There are various activation functions, such as **sigmoid**
    (logistic function), **hyperbolic tangent (tanh)**, and **Rectified Linear Unit
    (ReLU)**, each with its own properties and use cases. This can be represented
    as:


    $$a_j = \sigma(z_j)$$


    where $a_j$ is the neuron output and $\sigma$ is the activation function.


    Combining these two steps, a neuron in a neural network processes the input data,
    allowing the network to learn and model complex patterns.


    Neural networks are trained by adjusting the weights associated with the neurons.
    The algorithm can be summarized as follows:


    +   1. Weights are initialized to small, random values.

    2. A **forward pass** is performed: for each example in a batch, the input features
    are passed through the entire network (calculating the sum and activation at each
    neuron) to produce a prediction at the output layer.

    3. The loss is then calculated by comparing the output against the actual output
    for each example in a batch. Like GBDTs, the loss function has to be differentiable,
    and standard loss functions include the MSE and cross-entropy loss.

    4. **Backpropagation** is performed: the gradient of the loss function with respect
    to the weights is calculated using the calculus chain rule. The process is started
    at the output layer and works backward through the network.

    5. The weights are then updated using gradient descent or one of the modern variants,
    such as Adam, based on the backpropagated gradients.

    6. The process is repeated for a set number of epochs (each epoch running through
    the entire dataset) to minimize the loss function.


    A unique property of neural networks is that neural networks have been proven
    to be **universal function approximators**. DNNs have the theoretical capability
    to approximate any continuous function to a'

    \ leaves due to taking the square of the output.\n\nFinally, when larger trees\
    \ are built (trees with more leaves, and therefore a large $w$ vector), both sum\
    \ terms for $\\Omega(w)$ increase, increasing the objective function output. Therefore,\
    \ *larger trees are penalized*, and overfitting is reduced.\n\n## Summary of LightGBM\
    \ optimizations\n\nIn summary, LightGBM improves upon the standard ensemble algorithms\
    \ by doing the following:\n\n- Implementing histogram-based sampling of features\

  md: 'trained on either random samples, random features from the training data, or
    both. Random forests support both classification and regression.


    The training methodology for individual trees in random forests is the same as
    for a single decision tree, and as explained previously, each tree is a complete
    tree. The final prediction for the forest is made by taking the arithmetic mean
    of all trees in the case of prediction or the majority vote for a class (in the
    case of classification).


    Regarding performance, random forest learning produces a more robust model with
    higher accuracy, which tends to avoid overfitting (since no single model can overfit
    on all training data).


    # Random forest hyperparameters


    In scikit-learn, as may be expected, the hyperparameters available for random
    forests are the same as those available to train decision trees. We can specify
    `max_depth`, `min_samples_split`, `max_leaf_nodes`, and so on, which are then
    used to train the individual trees. However, there are three notable additional
    parameters, as follows:


    +   - `n_estimators`: Controls the number of trees in the forest. Generally, more
    trees are better. However, a point of diminishing returns is often reached.

    - `max_features`: Determines the maximum number of features to be used as a subset
    when splitting a node. Setting `max_features=1.0` allows all features to be used
    in the random selection.

    - `bootstrap` determines whether bagging is used. All trees use the entire training
    set if `bootstrap` is set to `False`.


    A list of all parameters available in scikit-learn is available here: https://scikit-learn.org/stable/modules/generated/sklearn.ensemble.RandomForestClassifier.html.


    # ExtraTrees


    **Extremely Randomized Trees (ExtraTrees)** is a related method for building randomized
    decision trees. With ExtraTrees, when building a decision node, several candidate
    splits are created randomly instead of using the *Gini index* or *information
    gain* metric to calculate the optimal split [2]. The best split from all random
    splits is then chosen for the node. The methodology for ExtraTrees can be applied
    to a single decision tree or used in conjunction with Random Forests. scikit-learn
    implements ExtraTrees as an extension to random forests (https://scikit-learn.org/stable/modules/ensemble.html#extremely-randomized-trees).


    In scikit-learn, the ExtraTrees implementation has the same hyperparameters as
    random forests.


    # Training random forests using scikit-learn


    We''ll now have a look at using random forests with scikit-learn.'

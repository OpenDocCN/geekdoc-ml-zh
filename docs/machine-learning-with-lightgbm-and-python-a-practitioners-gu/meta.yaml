    # Deploying LightGBM to Google Cloud


    We''ll leverage the **Google Cloud Run** platform to deploy our application to
    Google Cloud Platform.


    Google Cloud Run is a serverless platform that allows you to develop and run applications
    without worrying about infrastructure management. Cloud Run allows developers
    to run their applications in a secure, scalable, and zero-ops environment. Cloud
    Run is fully managed, meaning all infrastructure (such as servers and load balancers)
    is abstracted away, allowing users to focus on running their applications. Cloud
    Run also supports full autoscaling, and the number of running containers automatically
    increases to respond to increasing load. Cloud Run is also very cost-effective,
    as you are only charged when the container runs and serves requests.


    To use Cloud Run, you need a Google Cloud account and need to create a Google
    Cloud project, enable billing, and set up and initialize the **Google Cloud CLI**.
    The following resources guide you through these steps:


    +   - https://console.cloud.google.com/getting-started


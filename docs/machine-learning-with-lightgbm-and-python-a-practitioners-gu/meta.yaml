    # 5 LightGBM Parameter Optimization with Optuna


    Previous chapters have discussed the LightGBM hyperparameters and their effect
    on building models. A fundamental problem when building a new model is finding
    the optimal hyperparameters to achieve the best performance.


    This chapter focuses on the parameter optimization process using a framework called
    Optuna. Different optimization algorithms are discussed alongside the pruning
    of the hyperparameter space. A practical example shows how to apply Optuna to
    find optimal parameters for LightGBM. Advanced use cases for Optuna are also shown.


    The chapter''s main topics are as follows:


    +   - Optuna and optimization algorithms

    - Optimizing LightGBM with Optuna


    # Technical requirements


    The chapter includes examples and code excerpts illustrating how to perform parameter
    optimization studies for LightGBM using Optuna. Complete examples and instructions
    for setting up a suitable environment for this chapter are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-5.


    # Optuna and optimization algorithms


    Examples from previous chapters have shown that choosing the best hyperparameters
    for a problem is critical in solving a machine learning problem. The hyperparameters
    significantly impact the algorithm''s performance and generalization capability.
    The optimal parameters are also specific to the model used and the learning problem
    being solved.'
- md: "Other issues complicating hyperparameter optimization are as follows:\n\n-\
    \ **Cost:** For each unique set of hyperparameters (of which there can be many),\
    \ an entire training run, often with cross-validation, must be performed. This\
    \ is highly time-consuming and computationally expensive.\n- **High-dimensional\
    \ search spaces:** Each parameter can have a vast range of potential values, making\
    \ testing each value impossible.\n- **Parameter interaction:** Optimizing each\
    \ parameter in isolation is often impossible, as some parameters' values interact\
    \ with others' values. A good example is the learning rate and the number of estimators\
    \ in LightGBM: fewer estimators necessitate a larger learning rate, and vice versa.\
    \ This phenomenon is shown in *Figure 5.1*.\n\n![](img/5c9d6611c41357518a5920ff1f360451_106_0.png)\n\
    \n*Figure 5.1* visualizes parameter interactions using a technique called a **parallel\
    \ coordinate plot**. Parallel coordinate plots are a visualization tool designed\
    \ to represent high-dimensional data, making them especially useful for visualizing\
    \ the results of hyperparameter optimization. Each dimension (in this context,\
    \ a hyperparameter) is portrayed as a vertical axis arranged in parallel. The\
    \ range of each axis mirrors the range of values that the hyperparameter can assume.\
    \ Every individual configuration of hyperparameters is depicted as a line crossing\
    \ all these axes, with the intersection point on each axis indicating the value\
    \ of that hyperparameter for the given configuration. Lines can also be color-coded\
    \ based on performance metrics, such as validation accuracy, to discern which\
    \ hyperparameter combinations yield superior outcomes.\n\nThe beauty of parallel\
    \ coordinate plots lies in their ability to illustrate relationships between multiple\
    \ hyperparameters and their cumulative impact on performance, such as the parameter\
    \ interaction shown in *Figure 5.1*. Observing the lines' clustering or similarities\
    \ in their color allows us to glean trends and intricate interdependencies between\
    \ hyperparameters. This ability to visualize multidimensional patterns helps data\
    \ scientists pinpoint which hyperparameter values or combinations are most conducive\
    \ to optimal model performance.\n\nGiven the challenges and complications of hyperparameter\
    \ optimization, a naive approach to finding the optimal parameters is manual optimization.\
    \ With manual optimization, a human practitioner selects parameters based on intuitive\
    \ understanding and experience. A model is trained with these parameters, and\
    \ the process is repeated until satisfactory parameters are found. Manual optimization\
    \ is simple to implement but is very time-consuming due to the human-in-the-loop\
    \ nature of the process. Human intuition is also fallible, and good parameter\
    \ combinations can easily be missed.\n\n> **Note**\n> The process of finding optimal\
    \ parameters is often called a parameter **study**. Each configuration (combination\
    \ of parameters) tested in the study is referred to as a **trial**.\n\nIn the\
    \ previous chapters' examples, the approach we used thus far was **grid search**.\
    \ With grid search, we set up a parameter grid consisting of each parameter and\
    \ a range of potential values and exhaustively tested each possible combination\
    \ to find the optimal values.\n\nGrid search solves the parameter interaction\
    \ problem well: since each possible combination is tested, each interaction is\
    \ accounted for.\n\nHowever, the downside of using grid search is the cost. Since\
    \ we exhaustively test each parameter combination, the number of trials quickly\
    \ becomes prohibitive, especially if more parameters are added. For example, consider\
    \ the following grid:\n\n```\nparams = {\"learning_rate\": [0.001, 0.01, 0.1],\n\
    \          \"num_leaves\": [10, 20, 50, 100],\n          \"num_estimators\": [100,\
    \ 200, 500]}\n```\n\nAn optimization study for this grid would require 36 trials.\
    \ Adding just one additional parameter with two possible values doubles the cost\
    \ of the study.\n\nWhat's needed is an algorithm and framework that can intelligently\
    \ optimize the parameters within a limited number of trials that we control. Several\
    \ frameworks exist for this purpose, including SHERPA, a Python library for tuning\
    \ machine learning models; Hyperopt, another Python library for parameter optimization\
    \ over complex search spaces; and Talos, a tool specifically tailored for Keras.\
    \ However, in the next section, and for the rest of the chapter, we look at **Optuna**,\
    \ a framework designed to automate tuning machine learning models.\n\n## Introducing\
    \ Optuna\n\nOptuna is an open source **hyperparameter optimization (HPO)** framework\
    \ designed to automate finding the best hyperparameters for machine learning models\
    \ (https://optuna.org/). It is written in Python and can be easily integrated\
    \ with various machine learning libraries, including LightGBM.\n\nOptuna provides\
    \ efficient optimization algorithms to search hyperparameter spaces more effectively.\
    \ In addition to the optimization algorithms, Optuna also provides pruning strategies\
    \ to save computational resources and time by pruning poorly performing trials.\n\
    \nBesides optimization and pruning algorithms, Optuna also provides an easy-to-use\
    \ API for defining parameter types (integer, float, or categorical), creating\
    \ and automating resumable optimization studies, and visualizing the results of\
    \ optimization runs. Later in the chapter, we see how to use the API practically.\n\
    \n## Optimization algorithms\n\nOptuna provides several efficient optimization\
    \ algorithms. In this section, we focus on two of the available algorithms: a\
    \ **Tree-Structured Parzen Estimator (TPE)** and a **Covariance Matrix Adaptation\
    \ Evolution Strategy (CMA-ES)** algorithm.\n\n### TPE\n\nTo understand TPE, we\
    \ must first know what a Parzen estimator is.\n\nA Parzen estimator, or **Kernel\
    \ Density Estimator (KDE)**, is a technique used to estimate the probability distribution\
    \ of a set of data points. It's a non-parametric method, meaning it doesn't assume\
    \ any specific underlying distribution for the data. Instead, it tries to \"learn\"\
    \ the distribution based on the observed data points.\n\nImagine you have data\
    \ points and want to know how the data is distributed. One way to do this is by\
    \ placing small \"hills\" (kernel functions) over each data point. These \"hills\"\
    \ can have different shapes, such as Gaussian (bell-shaped) or uniform (box-shaped).\
    \ The height of the \"hill\" at any point represents the likelihood that a new\
    \ data point would fall at that location. The Parzen estimator works by adding\
    \ up all these \"hills\" to create a smooth landscape representing the estimated\
    \ probability distribution of the data.\n\nIn the case of TPE, the data points\
    \ we care about are the parameter combinations, and the probability distribution\
    \ is the likelihood of a set of parameters being good or bad [1], [2].\n\nTPE\
    \ starts by sampling a few random combinations of hyperparameters and evaluating\
    \ the model's performance for each. Based on these initial results, TPE divides\
    \ the hyperparameter combinations into two groups: `good` (those that lead to\
    \ better performance) and `bad` (those that lead to worse performance):\n\n- $l(x)$:\
    \ The probability density function of `good` configurations\n- $g(x)$: The probability\
    \ density function of `bad` configurations\n\nTPE then estimates the probability\
    \ distributions of hyperparameter combinations for both `good` and `bad` groups\
    \ using the Parzen estimator technique.\n\nWith estimations of the probability\
    \ distributions available, TPE calculates the **Expected Improvement (EI)** of\
    \ hyperparameter configurations. EI can be calculated as the ratio between the\
    \ two densities: $\\frac{l(x)}{g(x)}$. With each trial, the algorithm samples\
    \ new hyperparameter configurations that maximize the EI.\n\nThe tree structure\
    \ in TPE comes from the algorithm's ability to handle parameter interaction within\
    \ the hyperparameter search space, where specific hyperparameters' relevance depends\
    \ on others' values. To handle this, TPE builds a hierarchical structure that\
    \ captures the relationships between different hyperparameters and adapts the\
    \ sampling process accordingly.\n\nIn summary, TPE estimates the distributions\
    \ of `good` and `bad` parameters and uses them to find optimal parameters by maximizing\
    \ new trials' expected improvement. TPE is cost-effective since it approximates\
    \ the distributions and can search for better parameters optimally (in a non-exhaustive\
    \ way). TPE also handles parameter interactions.\n\nAn alternative algorithm provided\
    \ by Optuna is the CMA-ES algorithm, which we discuss next.\n\n### CMA-ES\n\n\
    CMA-ES is another optimization algorithm that can be used to find optimal hyperparameters\
    \ [3]. Compared to TPE, CMA-ES is well suited to cases that involve continuous\
    \ variables and when the search space is non-linear and non-convex.\n\nCMA-ES\
    \ is an example of an **evolutionary algorithm (EA)**. An EA is a type of optimization\
    \ algorithm inspired by the process of natural evolution. It aims to find the\
    \ best solution to a problem by mimicking how nature evolves species through selection,\
    \ reproduction, mutation, and inheritance. Evolutionary algorithms start with\
    \ a population of candidate solutions and modify the candidates with each subsequent\
    \ *generation* to adapt more closely to the best solution. This generational process\
    \ is illustrated in *Figure 5.2*."
  mdcn: "其他使超参数优化复杂化的问题如下：\n\n-   **成本：** 对于每一组唯一的超参数（可能有很多组），都必须执行一次完整的训练过程，通常还涉及交叉验证。这非常耗时且计算成本高昂。\n\
    -   **高维搜索空间：** 每个参数都可能有大量潜在值，使得逐一测试每个值变得不可能。\n-   **参数交互：** 通常无法孤立地优化每个参数，因为某些参数的值会与其他参数的值相互作用。一个很好的例子是\
    \ LightGBM 中的学习率和估计器数量：较少的估计器需要较大的学习率，反之亦然。这种现象如*图 5.1*所示。\n\n![](img/5c9d6611c41357518a5920ff1f360451_106_0.png)\n\
    \n*图 5.1* 使用一种称为**平行坐标图**的技术可视化了参数交互。平行坐标图是一种旨在表示高维数据的可视化工具，因此特别适用于可视化超参数优化的结果。每个维度（在此上下文中指一个超参数）被描绘为一个平行排列的垂直轴。每个轴的范围反映了该超参数可能取值的范围。每一组超参数配置都被描绘为一条穿过所有这些轴的线，每条线在每个轴上的交点表示该配置下该超参数的值。这些线也可以根据性能指标（如验证准确率）进行颜色编码，以辨别哪些超参数组合能产生更好的结果。\n\
    \n平行坐标图的妙处在于它们能够说明多个超参数之间的关系及其对性能的累积影响，例如*图 5.1*中所示的参数交互。通过观察线条的聚集情况或颜色的相似性，我们可以洞察超参数之间的趋势和复杂的相互依赖关系。这种可视化多维模式的能力有助于数据科学家确定哪些超参数值或组合最有利于实现最佳模型性能。\n\
    \n鉴于超参数优化的挑战和复杂性，寻找最优参数的一种朴素方法是手动优化。在手动优化中，人类从业者基于直觉理解和经验选择参数。使用这些参数训练一个模型，并重复此过程，直到找到满意的参数为止。手动优化实现简单，但由于过程涉及人工参与，非常耗时。人类的直觉也可能出错，从而容易错过好的参数组合。\n\
    \n> **注意**\n> 寻找最优参数的过程通常被称为参数**研究**。在研究中测试的每种配置（参数组合）被称为一次**试验**。\n\n在前面章节的示例中，我们迄今为止使用的方法是**网格搜索**。在网格搜索中，我们设置一个由每个参数及其一系列潜在值组成的参数网格，并详尽地测试每种可能的组合以找到最优值。\n\
    \n网格搜索很好地解决了参数交互问题：由于测试了每种可能的组合，因此考虑到了每一种交互。\n\n然而，使用网格搜索的缺点是成本。由于我们详尽地测试每种参数组合，试验次数会迅速变得难以承受，尤其是在添加更多参数的情况下。例如，考虑以下网格：\n\
    \n```\nparams = {\"learning_rate\": [0.001, 0.01, 0.1],\n          \"num_leaves\"\
    : [10, 20, 50, 100],\n          \"num_estimators\": [100, 200, 500]}\n```\n\n\
    针对此网格的优化研究将需要 36 次试验。仅仅添加一个具有两个可能值的额外参数，就会使研究成本翻倍。\n\n我们需要的是一种算法和框架，能够在我们控制的有限试验次数内智能地优化参数。有几个框架可用于此目的，包括\
    \ SHERPA（一个用于调整机器学习模型的 Python 库）、Hyperopt（另一个用于在复杂搜索空间上进行参数优化的 Python 库）以及 Talos（一个专门为\
    \ Keras 定制的工具）。然而，在下一节以及本章的其余部分，我们将探讨 **Optuna**，一个旨在自动化调整机器学习模型的框架。\n\n## 介绍\
    \ Optuna\n\nOptuna 是一个开源的**超参数优化 (HPO)** 框架，旨在自动为机器学习模型找到最佳超参数 (https://optuna.org/)。它用\
    \ Python 编写，可以轻松地与各种机器学习库集成，包括 LightGBM。\n\nOptuna 提供高效的优化算法，以更有效地搜索超参数空间。除了优化算法，Optuna\
    \ 还提供剪枝策略，通过剪枝表现不佳的试验来节省计算资源和时间。\n\n除了优化和剪枝算法，Optuna 还提供了一个易于使用的 API，用于定义参数类型（整数、浮点数或类别型）、创建和自动化可恢复的优化研究，以及可视化优化运行的结果。在本章后面，我们将看到如何实际使用该\
    \ API。\n\n## 优化算法\n\nOptuna 提供了几种高效的优化算法。在本节中，我们重点介绍两种可用的算法：**树形结构 Parzen 估计器\
    \ (TPE)** 和**协方差矩阵自适应进化策略 (CMA-ES)** 算法。\n\n### TPE\n\n要理解 TPE，我们首先必须知道什么是 Parzen\
    \ 估计器。\n\nParzen 估计器，或称**核密度估计器 (KDE)**，是一种用于估计一组数据点概率分布的技术。它是一种非参数方法，意味着它不假设数据有任何特定的潜在分布。相反，它试图基于观察到的数据点来“学习”分布。\n\
    \n想象一下你有数据点，并且想知道数据是如何分布的。一种方法是在每个数据点上放置小的“山丘”（核函数）。这些“山丘”可以有不同的形状，例如高斯（钟形）或均匀（盒形）。在任何点处“山丘”的高度代表了一个新数据点落在该位置的可能性。Parzen\
    \ 估计器通过将所有这些“山丘”相加来创建一个平滑的景观，该景观代表了数据的估计概率分布。\n\n在 TPE 的情况下，我们关心的数据点是参数组合，而概率分布是一组参数是好是坏的可能性\
    \ [1], [2]。\n\nTPE 首先采样几个随机的超参数组合，并评估每个组合的模型性能。基于这些初始结果，TPE 将超参数组合分为两组：`好`（那些导致更好性能的组合）和`坏`（那些导致更差性能的组合）：\n\
    \n-   $l(x)$：`好`配置的概率密度函数\n-   $g(x)$：`坏`配置的概率密度函数\n\n然后，TPE 使用 Parzen 估计器技术估计`好`组和`坏`组超参数组合的概率分布。\n\
    \n有了概率分布的估计，TPE 计算超参数配置的**期望改进 (EI)**。EI 可以计算为两个密度的比值：$\\frac{l(x)}{g(x)}$。在每次试验中，算法都会采样新的超参数配置以最大化\
    \ EI。\n\nTPE 中的树结构源于算法处理超参数搜索空间内参数交互的能力，其中特定超参数的相关性取决于其他参数的值。为了处理这个问题，TPE 构建了一个层次结构来捕获不同超参数之间的关系，并相应地调整采样过程。\n\
    \n总之，TPE 估计`好`和`坏`参数的分布，并利用它们通过最大化新试验的期望改进来寻找最优参数。TPE 是经济高效的，因为它近似分布，并且可以最优地（以非穷举的方式）搜索更好的参数。TPE\
    \ 也能处理参数交互。\n\nOptuna 提供的另一种算法是 CMA-ES 算法，我们接下来讨论。\n\n### CMA-ES\n\nCMA-ES 是另一种可用于寻找最优超参数的优化算法\
    \ [3]。与 TPE 相比，CMA-ES 非常适合涉及连续变量以及搜索空间是非线性和非凸的情况。\n\nCMA-ES 是**进化算法 (EA)** 的一个例子。EA\
    \ 是一种受自然进化过程启发的优化算法。它旨在通过模仿自然如何通过选择、繁殖、变异和遗传来进化物种，从而找到问题的最佳解决方案。进化算法从一组候选解开始，并在每个后续*世代*中修改候选解，以更接近最佳解决方案。这个世代过程如*图\
    \ 5.2*所示。"

    - `num_leaves`：控制单棵树中的最大叶节点数。\n- `learning_rate`：控制学习率或收缩率，即每棵树对整体预测的贡献。\n\nLightGBM\
    \ 还提供了许多参数来控制学习过程。我们将讨论这些参数，以及如何使用它们来调整训练的特定方面。\n\n以下控制参数可用于提高**精度**：\n\n- `boosting`：使用\
    \ `dart`，已被证明优于标准 GBDT。\n- `learning_rate`：学习率必须与 `num_iterations` 一起调整以获得更好的精度。较小的学习率配合较大的\

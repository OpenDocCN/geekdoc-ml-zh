    The dataset consists of descriptive information for each customer (such as gender,
    billing information, and charges) and whether the customer has left the telco
    provider (churn is *yes* or *no*). Our task is to build a classification model
    to predict churn.


    Further, we''d like to deploy the model behind a REST API such that it can be
    integrated into a more extensive software system. The REST API should have an
    endpoint that makes predictions for data passed to the API.


    We''ll use **FastAPI**, a modern, high-performance Python web framework, to build
    our API. Finally, we''ll deploy our model and API to Google Cloud Platform using
    Docker.


    # Building an ML pipeline using scikit-learn


    We will start by building an ML pipeline using scikit-learn''s `Pipeline` toolset.
    Our pipeline should encapsulate data cleaning and feature engineering steps, then
    build and tune an appropriate model.


    We''ll evaluate two algorithms for modeling: LightGBM and random forest, and as
    such, it''s unnecessary to perform any scaling or normalization of the data. However,
    the dataset has a unique identifier for each customer, `customerID`, which we
    need to remove.


    Further, the dataset consists of numerical and categorical features, and we must
    implement one-hot encoding for the categorical features.


    # Pipeline preprocessing steps


    To perform these steps within a scikit-learn pipeline, we''ll use `ColumnTransformer`.
    `ColumnTransformer` is a `Pipeline` transformer that operates only on a subset

    GPU. Similarly, use single-precision floats for increased performance if your
    GPU supports it.

    - GPU training works best for large, dense datasets. Data needs to be moved to
    the GPU''s VRAM for training, and if the dataset is too small, the overhead involved
    with moving the data is too significant.

    - Avoid one-hot encoding of feature columns, as this leads to sparse feature matrices,
    which do not work well on the GPU.


    This concludes our section on how to use the GPU with LightGBM. Although the setup
    might be more complex, GPUs offer a significant boost in training speed due to
    their ability to handle thousands of threads simultaneously, allowing for efficient
    parallel processing, especially with large datasets. The massive parallelism of
    GPUs is particularly beneficial for histogram-based algorithms in LightGBM, making
    operations such as building histograms more efficient and effective.


    # Summary


    In this chapter, we discussed two ways of accelerating computing with LightGBM.
    The first is large-scale distributed training across many machines using the Python
    library Dask. We showed how to set up a Dask cluster, how data can be distributed
    to the cluster using the Dask DataFrame, and how to run LightGBM on the cluster.


    Second, we also looked at how to leverage the GPU with LightGBM. Notably, the
    GPU setup is complex, but significant speed-up can be achieved when it''s available.
    We also discussed some best practices for training LightGBM models on the GPU.


    # References


    [1] H. Zhang, S. Si, and C.-J. Hsieh, *GPU-acceleration for Large-scale Tree Boosting*,
    2017.'

    ```\n\nRunning fit executes all the preprocessing steps and then passes the data\
    \ for AutoML modeling and tuning. The single Pipeline object illustrates the power\
    \ of an ML pipeline: the entire end-to-end process, including a trained and tuned\
    \ model, is encapsulated and portable, and we can utilize the pipeline as we could\
    \ a single model. For example, the following code performs F1 scoring for the\

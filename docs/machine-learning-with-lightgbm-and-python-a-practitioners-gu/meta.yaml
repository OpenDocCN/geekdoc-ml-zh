    to explore the hyperparameter space more broadly and reduce the risk of missing
    good configurations. This concurrent process enables Hyperband to adaptively balance
    exploration and exploitation in the search process, ultimately leading to more
    efficient and effective hyperparameter tuning.


    Optuna has performed empirical studies of optimization algorithms and corresponding
    pruning strategies (https://github.com/optuna/optuna/wiki/Benchmarks-with-Kurobako).
    *Empirically, they found that Hyperband is the best TPE or CMA-ES optimization
    strategy*.


    This section gave an overview of the theory and algorithms powering Optuna, focusing
    on TPE, CMA-ES, and advanced pruning strategies. In the next section, we''ll practically
    apply Optuna to a machine learning problem with LightGBM.


    # Optimizing LightGBM with Optuna


    We''ll walk through applying Optuna using a classification example. The problem
    we''ll be modeling is to predict customer churn (Yes/No) for a telecommunications
    provider. The dataset is available from https://github.com/IBM/telco-customer-churn-on-icp4d/tree/master/data.'
  - "[PAGE 113]\n\nThe data describes each customer using data available to the provider\
    \ – for example, gender, whether the customer is paying for internet service,\
    \ has paperless billing, pays for tech support, and their monthly charges. The\
    \ data consists of both numeric and categorical features. The data has already\
    \ been cleaned and is balanced, allowing us to focus on the parameter optimization\
    \ study.\n\nWe start by defining the objective of our parameter study. The `objective`\
    \ function is called once for each trial. In this case, we want to train a LightGBM\
    \ model on the data and calculate the F1 score. Optuna passes a `trial` object\
    \ to the `objective` function, which we can use to set up the parameters for the\
    \ specific trial. The following is an example code snippet that shows how to define\
    \ an `objective` function with parameters:\n\n```\ndef objective(trial):\n   \
    \ boosting_type = trial.suggest_categorical(\n        \"boosting_type\", [\"dart\"\
    , \"gbdt\"])\n    lambda_l1= trial.suggest_float(\n        'lambda_l1', 1e-8,\
    \ 10.0, log=True),\n    ...\n    min_child_samples= trial.suggest_int(\n     \
    \   'min_child_samples', 5, 100),\n    learning_rate = trial.suggest_float(\n\
    \        \"learning_rate\", 0.0001, 0.5, log=True),\n    max_bin = trial.suggest_int(\n\
    \        \"max_bin\", 128, 512, 32),\n    n_estimators = trial.suggest_int(\n\
    \        \"n_estimators\", 40, 400, 20)\n```\n\nHere, we can see how we use the\
    \ methods provided by `trial` to set up the hyperparameters. For each parameter,\
    \ a value is suggested by the optimization algorithm within the range specified.\
    \ We can suggest categorical variables using `trial.suggest_categorical` (as can\
    \ be seen for the boosting type), and `int` and `float` parameters using `suggest_int`\
    \ and `suggest_float`, respectively. When suggesting floats or integers, a range\
    \ and, optionally, a step size are specified:\n\n```\nn_estimators = trial.suggest_int(\n\
    \    name=\"n_estimators\", low=40, high=400, step=20)\n```\n\nSetting a step\
    \ size means the optimization algorithm does not suggest any arbitrary value in\
    \ the range but limits suggestions to the steps between the lower and upper bound\
    \ (40, 60, 80, 100, ..., 400).\n\nWe also have the option to log scale the range\
    \ of possible values by passing `log=True` for numeric parameters. Log scaling\
    \ the parameter range has the effect that more values are tested close to the\
    \ range's lower bound and (logarithmically) fewer values towards the upper bound.\
    \ Log scaling is particularly well suited to the learning rate where we want to\
    \ focus on smaller values and exponentially increase tested values until the upper\
    \ bound."
- md: "To apply pruning when training LightGBM models, Optuna provides a purpose-built\
    \ callback that integrates with the optimization process:\n\n```\npruning_callback\
    \ = optuna.integration.LightGBMPruningCallback(trial, \"binary\")\n```\n\nWe must\
    \ specify an error metric when creating the callback, and, in our case, we specify\
    \ `\"binary\"` for the binary error.\n\nWith the hyperparameters set up, we can\
    \ fit as we usually do, passing the parameters and the callback as we would normally:\n\
    \n```\nmodel = lgb.LGBMClassifier(\n    force_row_wise=True,\n    boosting_type=boosting_type,\n\
    \    n_estimators=n_estimators,\n    lambda_l1=lambda_l1,\n    lambda_l2=lambda_l2,\n\
    \    num_leaves=num_leaves,\n    feature_fraction=feature_fraction,\n    bagging_fraction=bagging_fraction,\n\
    \    bagging_freq=bagging_freq,\n    min_child_samples=min_child_samples,\n  \
    \  learning_rate=learning_rate,\n    max_bin=max_bin,\n    callbacks=[pruning_callback],\n\
    \    verbose=-1)\nscores = cross_val_score(model, X, y, scoring=\"f1_macro\")\n\
    return scores.mean()\n```\n\nWe train the model using five-fold cross-validation\
    \ with the F1 macro score for scoring. Finally, the `objective` function returns\
    \ the mean of the F1 scores as the trial evaluation.\n\nWe are ready to start\
    \ an optimization study with the defined `objective` function. We create a sampler,\
    \ pruner, and the study itself and then call `optimize` with our `objective` function:\n\
    \n```\nsampler = optuna.samplers.TPESampler()\npruner = optuna.pruners.HyperbandPruner(\n\
    \    min_resource=10, max_resource=400, reduction_factor=3)\n\nstudy = optuna.create_study(\n\
    \    direction='maximize', sampler=sampler,\n    pruner=pruner\n)\nstudy.optimize(objective(),\
    \ n_trials=100, gc_after_trial=True, n_jobs=-1)\n```\n\nWe use the TPE optimization\
    \ algorithm as a sampler alongside Hyperband pruning. The minimum and maximum\
    \ resources specified for the Hyperband pruner control the minimum and the maximum\
    \ number of iterations (or estimators) trained per trial. When applying pruning,\
    \ the reduction factor controls how many trials are promoted in each halving round.\n\
    \nThe study is created by specifying the optimization direction (maximize or minimize).\
    \ Here, we are optimizing the F1 score, so we want to maximize the value.\n\n\
    We then call `study.optimize` and set our optimization budget: `n_trials=100`.\
    \ We also perform a memory optimization setting, `gc_after_trial=True`. Performing\
    \ **garbage collection (GC)** helps ensure the memory is cleaned up after each\
    \ trial, avoiding out-of-memory or memory leak errors. Optuna studies can run\
    \ trials in parallel. Setting `n_jobs=-1` runs as many trials as there are CPU\
    \ cores in parallel.\n\nAfter running the optimization, we can get the best trial\
    \ and parameters by calling the following:\n\n```\nprint(study.best_trial)\n```\n\
    \nThe preceding example shows how to apply Optuna to find LightGBM hyperparameters\
    \ effectively. Next, we look at some advanced features of the Optuna framework.\n\
    \n## Advanced Optuna features\n\nWhen optimizing hyperparameters for large machine\
    \ learning problems, the optimization process may run for days or weeks. In these\
    \ cases, saving an optimization study and resuming it later is helpful to guard\
    \ against data loss or migrating the study between different machines.\n\n## Saving\
    \ and resuming an optimization study\n\nOptuna supports saving and resuming an\
    \ optimization study in two ways: **in memory** and using a **remote database\
    \ (RDB)**.\n\nWhen a study is run in memory, the standard Python methods for serializing\
    \ an object can be applied. For example, either `joblib` or `pickle` may be used.\
    \ We use `joblib` to save a study:\n\n```\njoblib.dump(study, \"lgbm-optuna-study.pkl\"\
    )\n```\n\nTo restore and resume the study, we deserialize the `study` object and\
    \ continue with optimization:\n\n```\nstudy = joblib.load(\"lgbm-optuna-study.pkl\"\
    )\nstudy.optimize(objective(), n_trials=20, gc_after_trial=True, n_jobs=-1)\n\
    ```\n\nThe alternative to running the study in memory is to use an RDB. When using\
    \ an RDB, the study's intermediate (trial) and final results are persisted in\
    \ a SQL database backend. The RDB can be hosted on a separate machine. Any of\
    \ the SQL databases supported by SQL Alchemy may be used (https://docs.sqlalchemy.org/en/20/core/engines.html#database-urls).\n\
    \nIn our example, we use a SQLite database as an RDB:\n\n```\nstudy_name = \"\
    lgbm-tpe-rdb-study\"\nstorage_name = f\"sqlite:///{study_name}.db\"\nstudy = optuna.create_study(\n\
    \    study_name=study_name,\n    storage=storage_name,\n    load_if_exists=False,\n\
    \    sampler=sampler,\n    pruner=pruner)\n```\n\nOptuna manages the connection\
    \ to the RDB and the persistence of the results. After setting up the connection,\
    \ optimization can proceed as usual.\n\nRestoring the study from an RDB backend\
    \ is straightforward; we specify the same `storage` and set `load_if_exists` to\
    \ True:\n\n```\nstudy = optuna.create_study(study_name=study_name, storage=storage_name,\
    \ load_if_exists=True)\n```\n\n## Understanding parameter effects\n\nIn many cases,\
    \ it's also valuable to better understand the effects of hyperparameters when\
    \ solving a specific problem. For example, the `n_estimators` parameter directly\
    \ affects the computational complexity of a model. If we know the parameter to\
    \ be less important, we can choose smaller values to improve our model's runtime\
    \ performance. Optuna provides several visualizations to dive deeper into the\
    \ results of a study and gain insight into hyperparameters.\n\nA straightforward\
    \ visualization plots the *importance of each parameter*: how much each affected\
    \ the training outcome. We can create an importance plot as follows:\n\n```\n\
    fig = optuna.visualization.plot_param_importances(study)\nfig.show()\n```\n\n\
    The importance plot for our study is shown here:\n\n### Hyperparameter Importances\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_117_0.png)\n\nFigure 5.3 – A parameter\
    \ importance plot showing the importance of each hyperparameter to the object\
    \ values (F1 score)\n\nIn *Figure 5.3*, we can see that the learning rate is by\
    \ far the most critical parameter affecting the success of a trial. The number\
    \ of leaves and estimators follows this. Using this information, we may decide\
    \ to focus more heavily on finding an optimal learning rate in future studies.\n\
    \nWe create a parallel coordinate plot as follows, specifying the parameters it\
    \ should contain. The plot helps us visualize the interaction between hyperparameters:\n\
    \n```\nfig = optuna.visualization.plot_parallel_coordinate(study,\n    params=[\"\
    boosting_type\", \"feature_fraction\", \"learning_rate\", \"n_estimators\"])\n\
    fig.show()\n```\n\nHere is the resulting plot:\n\n### Parallel Coordinate Plot\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_118_0.png)\n\nFigure 5.4 – A parallel\
    \ coordinate plot for our study. Each horizontal line is the configuration for\
    \ a single trial. Darker lines indicate more successful trials (higher F1 scores)\n\
    \nThe parallel coordinate plot shows that the best trials all used DART as the\
    \ boosting type and have a learning rate of just below 0.1 and more than 200 estimators.\
    \ We can also visually see some parameter interactions: GBDT models correlate\
    \ with slightly higher learning rates. Far fewer leaf nodes are required when\
    \ there is a large number of estimators because having many estimators and large\
    \ numbers of leaf nodes leads to overfitting.\n\n## Multi-objective optimization\n\
    \nIn the optimization studies shown previously, we focused on a single optimization\
    \ objective: maximizing our F1 score. However, in some instances, we would like\
    \ to optimize two potentially competing objectives. For example, say we want to\
    \ create the smallest GBDTs possible (fewest leaves) while obtaining a good F1\
    \ score. Reducing the number of leaves can potentially negatively impact our performance,\
    \ so a trade-off exists.\n\nOptuna supports solving this type of problem by using\
    \ **multi-objective optimization (MOO)**. When optimizing multiple objectives,\
    \ we return two evaluations from our `objective` function and specify the optimization\
    \ directions.\n\nAs an example, consider the trade-off between the learning rate\
    \ and performance. We want to train our model as fast as possible, which requires\
    \ a high learning rate. However, we know the best performance is achieved using\
    \ a small learning rate and many iterations.\n\nWe can use Optuna to optimize\
    \ this trade-off. We define a new `objective` function, fixing all other parameters\
    \ to the optimal values found earlier. We return two evaluations: the learning\
    \ and the cross-validated F1-score. We want to maximize both values:\n\n```\n\
    def moo_objective(trial):\n    learning_rate = trial.suggest_float(\"learning_rate\"\
    , 0.0001, 0.5,\n                                       log=True),\n\n    model\
    \ = lgb.LGBMClassifier(\n        force_row_wise=True,\n        boosting_type='gbdt',\n\
    \        n_estimators=200,\n        num_leaves=6,\n        bagging_freq=7,\n \
    \       learning_rate=learning_rate,\n        max_bin=320,\n    )\n    scores\
    \ = cross_val_score(model, X, y, scoring=\"f1_macro\")\n    return learning_rate[0],\
    \ scores.mean()\n```\n\nWhen calling `optimize`, we then set the direction for\
    \ the optimization of both evaluations:\n\n```\nstudy = optuna.create_study(directions=[\"\
    maximize\", \"maximize\"])\nstudy.optimize(moo_objective, n_trials=100)\n```\n\
    \nWhen performing MOO, there isn't always a single best result: a trade-off often\
    \ exists between the objectives. Therefore, we want to visualize the study results\
    \ to explore the trade-off and select parameter values that perform well with\
    \ both objectives. This type of visualization is called a **Pareto front** and\
    \ can be created as follows:"
  mdcn: "要在训练LightGBM模型时应用剪枝，Optuna提供了一个专门构建的回调函数，该函数与优化过程集成：\n\n```\npruning_callback\
    \ = optuna.integration.LightGBMPruningCallback(trial, \"binary\")\n```\n\n在创建回调函数时，我们必须指定一个误差度量，在我们的例子中，我们指定`\"\
    binary\"`作为二分类误差。\n\n设置好超参数后，我们可以像往常一样进行拟合，传递参数和回调函数：\n\n```\nmodel = lgb.LGBMClassifier(\n\
    \    force_row_wise=True,\n    boosting_type=boosting_type,\n    n_estimators=n_estimators,\n\
    \    lambda_l1=lambda_l1,\n    lambda_l2=lambda_l2,\n    num_leaves=num_leaves,\n\
    \    feature_fraction=feature_fraction,\n    bagging_fraction=bagging_fraction,\n\
    \    bagging_freq=bagging_freq,\n    min_child_samples=min_child_samples,\n  \
    \  learning_rate=learning_rate,\n    max_bin=max_bin,\n    callbacks=[pruning_callback],\n\
    \    verbose=-1)\nscores = cross_val_score(model, X, y, scoring=\"f1_macro\")\n\
    return scores.mean()\n```\n\n我们使用五折交叉验证训练模型，并以F1宏平均分数作为评分标准。最后，`objective`函数返回F1分数的平均值作为试验评估结果。\n\
    \n我们已准备好使用定义的`objective`函数开始优化研究。我们创建一个采样器、剪枝器和研究本身，然后使用我们的`objective`函数调用`optimize`：\n\
    \n```\nsampler = optuna.samplers.TPESampler()\npruner = optuna.pruners.HyperbandPruner(\n\
    \    min_resource=10, max_resource=400, reduction_factor=3)\n\nstudy = optuna.create_study(\n\
    \    direction='maximize', sampler=sampler,\n    pruner=pruner\n)\nstudy.optimize(objective(),\
    \ n_trials=100, gc_after_trial=True, n_jobs=-1)\n```\n\n我们使用TPE优化算法作为采样器，并结合Hyperband剪枝。为Hyperband剪枝器指定的最小和最大资源控制了每个试验训练的最小和最大迭代次数（或估计器数量）。在应用剪枝时，缩减因子控制了在每次减半轮次中提升的试验数量。\n\
    \n通过指定优化方向（最大化或最小化）来创建研究。在这里，我们优化的是F1分数，因此我们希望最大化该值。\n\n然后我们调用`study.optimize`并设置优化预算：`n_trials=100`。我们还执行了内存优化设置，`gc_after_trial=True`。执行**垃圾回收（GC）**有助于确保每次试验后内存被清理，避免内存不足或内存泄漏错误。Optuna研究可以并行运行试验。设置`n_jobs=-1`会根据CPU核心数并行运行尽可能多的试验。\n\
    \n运行优化后，我们可以通过调用以下代码获取最佳试验和参数：\n\n```\nprint(study.best_trial)\n```\n\n前面的示例展示了如何应用Optuna有效地寻找LightGBM超参数。接下来，我们来看一些Optuna框架的高级功能。\n\
    \n## Optuna高级功能\n\n在优化大型机器学习问题的超参数时，优化过程可能需要运行数天或数周。在这种情况下，保存优化研究并在稍后恢复它有助于防止数据丢失或在不同机器之间迁移研究。\n\
    \n## 保存和恢复优化研究\n\nOptuna支持以两种方式保存和恢复优化研究：**内存中**和使用**远程数据库（RDB）**。\n\n当研究在内存中运行时，可以应用标准的Python对象序列化方法。例如，可以使用`joblib`或`pickle`。我们使用`joblib`来保存研究：\n\
    \n```\njoblib.dump(study, \"lgbm-optuna-study.pkl\")\n```\n\n要恢复并继续研究，我们反序列化`study`对象并继续优化：\n\
    \n```\nstudy = joblib.load(\"lgbm-optuna-study.pkl\")\nstudy.optimize(objective(),\
    \ n_trials=20, gc_after_trial=True, n_jobs=-1)\n```\n\n在内存中运行研究的替代方案是使用RDB。使用RDB时，研究的中间（试验）和最终结果会持久化在SQL数据库后端。RDB可以托管在单独的机器上。可以使用SQL\
    \ Alchemy支持的任何SQL数据库（https://docs.sqlalchemy.org/en/20/core/engines.html#database-urls）。\n\
    \n在我们的示例中，我们使用SQLite数据库作为RDB：\n\n```\nstudy_name = \"lgbm-tpe-rdb-study\"\nstorage_name\
    \ = f\"sqlite:///{study_name}.db\"\nstudy = optuna.create_study(\n    study_name=study_name,\n\
    \    storage=storage_name,\n    load_if_exists=False,\n    sampler=sampler,\n\
    \    pruner=pruner)\n```\n\nOptuna管理与RDB的连接和结果的持久化。设置好连接后，优化可以照常进行。\n\n从RDB后端恢复研究很简单；我们指定相同的`storage`并将`load_if_exists`设置为True：\n\
    \n```\nstudy = optuna.create_study(study_name=study_name, storage=storage_name,\
    \ load_if_exists=True)\n```\n\n## 理解参数影响\n\n在许多情况下，更好地理解超参数在解决特定问题时的影响也很有价值。例如，`n_estimators`参数直接影响模型的计算复杂度。如果我们知道该参数不太重要，我们可以选择较小的值来提高模型的运行时性能。Optuna提供了几种可视化工具，可以深入研究研究结果并深入了解超参数。\n\
    \n一个直接的可视化是绘制*每个参数的重要性*：每个参数对训练结果的影响程度。我们可以如下创建重要性图：\n\n```\nfig = optuna.visualization.plot_param_importances(study)\n\
    fig.show()\n```\n\n我们研究的重要性图如下所示：\n\n### 超参数重要性\n\n![](img/5c9d6611c41357518a5920ff1f360451_117_0.png)\n\
    \n图5.3 – 参数重要性图，显示了每个超参数对目标值（F1分数）的重要性\n\n在*图5.3*中，我们可以看到学习率是迄今为止影响试验成功最关键的参数。其次是叶节点数和估计器数量。利用这些信息，我们可能决定在未来的研究中更侧重于寻找最优学习率。\n\
    \n我们如下创建平行坐标图，指定应包含的参数。该图帮助我们可视化超参数之间的交互：\n\n```\nfig = optuna.visualization.plot_parallel_coordinate(study,\n\
    \    params=[\"boosting_type\", \"feature_fraction\", \"learning_rate\", \"n_estimators\"\
    ])\nfig.show()\n```\n\n以下是生成的图：\n\n### 平行坐标图\n\n![](img/5c9d6611c41357518a5920ff1f360451_118_0.png)\n\
    \n图5.4 – 我们研究的平行坐标图。每条水平线代表单个试验的配置。颜色越深的线表示越成功的试验（F1分数越高）\n\n平行坐标图显示，最佳试验都使用了DART作为提升类型，学习率略低于0.1，估计器数量超过200。我们还可以直观地看到一些参数交互：GBDT模型与稍高的学习率相关。当估计器数量很多时，所需的叶节点数要少得多，因为拥有大量估计器和大量叶节点会导致过拟合。\n\
    \n## 多目标优化\n\n在前面展示的优化研究中，我们专注于单一优化目标：最大化我们的F1分数。然而，在某些情况下，我们希望优化两个可能相互竞争的目标。例如，假设我们希望创建尽可能小的GBDT（最少的叶节点），同时获得良好的F1分数。减少叶节点数量可能会对我们的性能产生负面影响，因此存在权衡。\n\
    \nOptuna支持通过使用**多目标优化（MOO）**来解决这类问题。在优化多个目标时，我们从`objective`函数返回两个评估值，并指定优化方向。\n\
    \n作为一个例子，考虑学习率和性能之间的权衡。我们希望尽可能快地训练模型，这需要较高的学习率。然而，我们知道最佳性能是通过使用较小的学习率和多次迭代来实现的。\n\
    \n我们可以使用Optuna来优化这种权衡。我们定义一个新的`objective`函数，将所有其他参数固定为之前找到的最优值。我们返回两个评估值：学习率和交叉验证的F1分数。我们希望最大化这两个值：\n\
    \n```\ndef moo_objective(trial):\n    learning_rate = trial.suggest_float(\"learning_rate\"\
    , 0.0001, 0.5,\n                                       log=True),\n\n    model\
    \ = lgb.LGBMClassifier(\n        force_row_wise=True,\n        boosting_type='gbdt',\n\
    \        n_estimators=200,\n        num_leaves=6,\n        bagging_freq=7,\n \
    \       learning_rate=learning_rate,\n        max_bin=320,\n    )\n    scores\
    \ = cross_val_score(model, X, y, scoring=\"f1_macro\")\n    return learning_rate[0],\
    \ scores.mean()\n```\n\n在调用`optimize`时，我们为两个评估值的优化设置方向：\n\n```\nstudy = optuna.create_study(directions=[\"\
    maximize\", \"maximize\"])\nstudy.optimize(moo_objective, n_trials=100)\n```\n\
    \n在执行MOO时，并不总是存在单一的最佳结果：目标之间通常存在权衡。因此，我们希望可视化研究结果以探索权衡，并选择在两个目标上都表现良好的参数值。这种类型的可视化称为**帕累托前沿**，可以如下创建："

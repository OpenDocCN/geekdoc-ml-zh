    Our API endpoint is now fully implemented, secured, and ready for deployment.
    To deploy our API, we''ll containerize it using Docker.


    # Containerizing our API


    We can build a Docker container for our API with the following Dockerfile:


    ```

    FROM python:3.10-slim


    RUN apt-get update && apt-get install -y --no-install-recommends apt-

    utils

    RUN apt-get -y install curl

    RUN apt-get install libgomp1


    WORKDIR /usr/src/app


    COPY requirements.txt ./

    RUN pip install --no-cache-dir -r requirements.txt

    COPY . .


    CMD [ "uvicorn", "telco_churn_api:app", "--host", "0.0.0.0", "--port",

    "8080" ]

    ```


    The Dockerfile is straightforward: we start with a base Python 3.10 image and
    install some OS dependencies that LightGBM needs (libgomp1). We then set up the
    FastAPI app: we copy the Python requirements file, install all of them, and then
    copy the necessary source files (using COPY . .).


    Finally, we run a Uvicorn server, listening on all addresses on port 8080. Uvicorn
    is an ASGI web server implementation for Python that supports async I/O, significantly
    increasing the web server''s throughput. We bind to port 8080, our deployment
    platform''s default port.


    We can build and run the Docker image using the following commands, passing the
    username and password environment variables:


    ```

    docker build . -t churn_api:latest

    docker run --rm -it -e CHURN_USER=***** -e CHURN_PASSWORD=***********

    -p 8080:8080 churn_api:latest

    ```'

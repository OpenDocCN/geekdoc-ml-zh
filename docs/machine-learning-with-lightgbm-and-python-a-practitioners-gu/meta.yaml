    optimization, SageMaker provides an automatic model-tuning feature. Many tuning
    algorithms are provided, such as Optuna or FLAML, and tuning can be run across
    multiple servers.


    SageMaker also has support for a more fully AutoML experience via **SageMaker
    Autopilot**. Autopilot is a service that enables automatic model creation. A user
    only needs to provide the raw data and set the target; then, Autopilot automatically
    explores different solutions to find the best model. Autopilot provides complete
    visibility into the process so that data scientists can understand how the model
    is created and make any necessary adjustments.


    Once a model has been trained and optimized, it must be deployed. SageMaker simplifies
    this process by providing a one-click deployment process. Users can quickly deploy
    their models to production with auto-scaling capabilities without worrying about
    the underlying infrastructure. This deployment autoscaling capability allows users
    to set metrics-based policies that increase or decrease backing servers. For instance,
    the deployment can be scaled up if the number of invocations within a period exceeds
    a specific threshold. SageMaker ensures the high availability of models and allows
    for A/B testing of models to compare different variants and decide on the best
    one. SageMaker also supports multi-model endpoints, allowing users to deploy multiple
    models on a single endpoint.


    Amazon SageMaker also provides capabilities to monitor the model''s performance
    and conduct analysis once deployed. **SageMaker Model Monitor** monitors the quality
    of deployed models continuously (for real-time endpoints) or in batches (for asynchronous
    jobs). Alerts can be defined to notify the user if metric thresholds are exceeded.
    Model Monitor can monitor data drift and model drift based on metrics such as
    accuracy.


    Finally, SageMaker is both a platform within AWS and a software SDK. The SDK is
    available in both Python and R. The SageMaker SDK provides a range of built-in
    algorithms and frameworks, including support for the most popular algorithms in
    the ML community, such as XGBoost, TensorFlow, PyTorch, and MXNet. It also supports
    a marketplace where users can choose from a vast collection of algorithm and model
    packages shared by AWS and other SageMaker users.


    A noteworthy part of SageMaker that simplifies one of the most important aspects
    of model development (bias and fairness) is **SageMaker Clarify**.


    ## SageMaker Clarify


    Amazon SageMaker Clarify is a tool that provides greater transparency into ML
    models. SageMaker Clarify aims to assist in understanding how ML models make predictions,
    thereby enabling model explainability and fairness.


    One of the primary features of SageMaker Clarify is its capacity to provide model
    interpretability. It helps developers understand the relationships between the
    input data and the model''s predictions. The service generates feature attributions
    that show how each feature in the dataset influences predictions, which can be
    critical in many domains, especially those where it''s vital to understand the
    reasoning behind a model''s prediction. In addition to providing insight into
    individual predictions, SageMaker Clarify offers global explanatory capabilities.
    It measures the importance of input features on a model''s predictions in aggregate
    across the whole dataset. Feature impact analysis allows developers and data scientists
    to understand the overall behavior of a model, helping them interpret how different
    features drive model predictions on a global level.


    Further, Clarify can help identify potential bias in trained models. The service
    includes pre-training and post-training bias metrics that help us understand if
    a model favors certain groups unfairly. It''s best practice to check all new models
    for bias, but it is also imperative in regulated industries such as finance or
    healthcare, where biased predictions can have severe consequences.


    Clarify provides model interpretability by using an advanced technique known as
    **SHapley Additive exPlanations (SHAP)**.


    ## SHAP


    SHAP is a game theoretic approach to interpreting the output of any ML model [1].
    SHAP aims to provide an understanding of the impact of individual features on
    a model''s overall prediction.


    Essentially, SHAP values assess the effect of a particular feature value by contrasting
    it with a baseline value for that feature, highlighting its contribution to the
    prediction. A SHAP value is a fair contribution allocation from each feature to
    the prediction for each instance. SHAP values are rooted in cooperative game theory,
    representing a solution to the following question:


    > “*Given the difference a feature makes in predicting an outcome, what portion
    of that difference is attributable to each feature?*”


    These values are calculated using the concept of Shapley values from game theory.
    A Shapley value determines the significance of a feature by contrasting a model''s
    predictions with the presence and absence of that feature. Yet, as the sequence
    in which a model encounters features can affect its prediction, Shapley values
    consider all possible orderings. Then, it assigns an importance value to a feature
    so that it equals the average marginal contribution of that feature across all
    possible coalitions.


    There are several advantages to using SHAP for model interpretation. First, it
    offers consistency in interpretation. If the contribution of a feature changes,
    the attributed importance of that feature changes proportionally.


    Secondly, SHAP guarantees local accuracy, which means the sum of the SHAP values
    for all features would equal the difference between the prediction and the average
    prediction for the dataset.


    A great way to visualize SHAP values is by using SHAP summary plots. These plots
    provide a bird''s-eye view of feature importance and what is driving it. They
    plot all the SHAP values for a feature on a graph for easy visualization. Each
    point on the graph represents a SHAP value for a feature and an instance. The
    position on the Y-axis is determined by the feature and on the X-axis by the SHAP
    value:


    ![](img/5c9d6611c41357518a5920ff1f360451_190_0.png)


    Figure 9.1 – Local explanation example for the Census Income dataset. Bars indicate
    SHAP values or the relative importance of each feature in predicting this specific
    instance


    In the context of SageMaker Clarify, the service generates a set of SHAP values
    for each instance in your dataset when you run a clarification job. SageMaker
    Clarify can also provide global feature importance measures by aggregating SHAP
    values across the entire dataset.


    SHAP values can help you understand complex model behavior, highlight potential
    issues, and improve your model over time. For example, by examining SHAP values,
    you might discover that a specific feature has a more significant effect on your
    model''s predictions than expected, prompting you to explore why this might happen.


    In this section, we looked at AWS and, more specifically, what the AWS ML family
    of services, SageMaker, offers. The functionality available in SageMaker, such
    as model explainability, bias detection, and monitoring, are components we have
    yet to implement in our ML pipelines. In the next section, we''ll look at building
    a complete end-to-end LightGBM-based ML pipeline, including these crucial steps,
    using SageMaker.


    ## Building a LightGBM ML pipeline with Amazon SageMaker


    The dataset we''ll use for our case study of building a SageMaker pipeline is
    the Census Income dataset from *Chapter 4, Comparing LightGBM, XGBoost, and Deep
    Learning*. This dataset is also available as a SageMaker sample dataset, so it''s
    easy to work with on SageMaker if you are getting started.


    The pipeline we''ll build consists of the following steps:


    - 1. Data preprocessing.

    - 2. Model training and tuning.

    - 3. Model evaluation.

    - 4. Bias and explainability checks using Clarify.

    - 5. Model registration within SageMaker.

    - 6. Model deployment using an AWS Lambda.


    Here''s a graph showing the complete pipeline:'

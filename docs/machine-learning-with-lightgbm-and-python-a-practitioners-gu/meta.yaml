    ```\n\nNo rows are returned, indicating no duplicates in the dataset.\n\n## Data\
    \ cleaning\n\nWe have identified multiple issues in the dataset that we need to\
    \ address as part of the *data cleaning* step:\n\n- **Outliers**: Many features\
    \ have outlier values that skew the distribution of values for the feature.\n\
    - **Measurement errors**: Some features have values that fall out of the bounds\
    \ of physical impossibilities (lengths smaller than 0 or temperatures in impossible\
    \ ranges).\n- **Missing values**: Many of the features have missing values. There\
    \ are also particular values (-99.0 and -999.0) that we consider missing.\n\n\
    We first address the outliers and measurement errors, as this impacts how we handle\
    \ the missing values.\n\n## Dealing with outliers\n\nThere are two parts to dealing\
    \ with outliers in a dataset: accurately identifying outliers and choosing appropriate\
    \ values for replacement. Ways to identify outliers are as follows:\n\n- **Visualization**:\
    \ As shown previously, histograms or other plots that visualize the data distribution\
    \ (such as box plots or scatter plots) can be used.\n- **Domain knowledge**: Like\
    \ how we identify measurement errors, domain knowledge can be leveraged to decide\
    \ whether values are outlying.\n- **Statistical analysis**: Two popular methods\
    \ for determining whether values are outlying using statistics are the **interquartile\
    \ range (IQR)** and the standard deviation.\n\nThe IQR is the difference between\
    \ the 25th and 75th quartiles. Values over 1.5 times the IQR away from the 25th\
    \ or 75th quartiles are considered outlying.\n\nAlternatively, we can leverage\
    \ the standard deviation: we calculate the mean and standard deviation of the\
    \ dataset. Any values over two or three times removed from the mean are outlying.\
    \ Setting bounds to twice or three times the standard deviation depends on the\
    \ underlying data. Using twice the standard deviation could lead to many false\
    \ positives, but it is appropriate if a lot of data is centered around the mean.\
    \ Using three times the standard deviation is more conservative and only marks\
    \ values very far from the mean as outlying.\n\nWhen the outlying values are detected,\
    \ we must do something about them. Generally, our options are as follows:\n\n\
    - **Remove**: If an outlier results from an error in data entry, measurement,\
    \ or collection, it may be reasonable to remove it from the dataset. However,\
    \ this should be done cautiously, as removing too many data points can lead to\
    \ a loss of information and biased results. Removing instances with outliers in\
    \ our dataset would result in close to 70% data loss and isn't an option.\n- **Impute**:\
    \ Similar to missing values, replace the outlier value with a more representative\
    \ value, such as the mean, median, or mode of the variable, or use more sophisticated\
    \ imputation methods such as **k-nearest neighbors** or **regression-based imputation**."

    \ 120,\n    'learning_rate': 0.09,\n    'force_row_wise': True,\n    'verbose':\
    \ 0\n}\n```\n\nWe are using the standard GBDT as a boosting type and setting the\
    \ objective to multiclass classification for seven classes. During training, we\
    \ are going to capture the `auc_mu` metric. $AUC_{\\mu}$ is a multiclass adaptation\
    \ of the **area under the receiver operating characteristic curve (AUC)**, as\
    \ defined by Kleiman and Page [6].\n\nWe set `num_leaves` and `learning_rate`\
    \ to reasonable values for the problem. Finally, we specify `force_row_wise` as\
    \ True, a recommended setting for large datasets.\n\nLightGBM's training function\
    \ also supports **callbacks**. A callback is a hook into the training process\
    \ that is executed each boosting iteration. To illustrate their purpose, we'll\
    \ be using the following callbacks:\n\n```\nmetrics = {}\ncallbacks = [\n    lgb.log_evaluation(period=15),\n\
    \    lgb.record_evaluation(metrics),\n    lgb.early_stopping(15),\n    lgb.reset_parameter(learning_rate=learning_rate_decay(0.09,\n\
    \    0.999))\n]\n```\n\nWe use the `log_evaluation` callback with a period of\
    \ 15, which logs (prints) our metrics to standard output every 15 boosting iterations.\
    \ We also set a `record_evaluation` callback that captures our evaluation metrics\
    \ in the `metrics` dictionary. We also specify an `early_stopping` callback, with\
    \ stopping rounds set to 15. The `early_stopping` callback stops training if no\
    \ validation metrics improve after the specified number of stopping rounds.\n\n\
    Finally, we also use the `reset_parameter` callback to implement **learning rate\
    \ decay**. The decay function is defined as follows:\n\n```\ndef learning_rate_decay(initial_lr,\
    \ decay_rate):\n    def _decay(iteration):\n        return initial_lr * (decay_rate\

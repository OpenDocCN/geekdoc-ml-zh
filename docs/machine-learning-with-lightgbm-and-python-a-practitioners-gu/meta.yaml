  mdcn: "在数据集中。该转换器接受一个元组列表，形式为（名称，转换器，列）。它将子转换器应用于指定的列，并将结果拼接起来，使得所有生成的特征都成为同一结果集的一部分。\n\
    \n例如，考虑以下 DataFrame 和 ColumnTransformer：\n\n```python\ndf = pd.DataFrame({\n \
    \   \"price\": [29.99, 99.99, 19.99],\n    \"description\": [\"Luxury goods\"\
    , \"Outdoor goods\",\n        \"Sports equipment\"],\n})\nct = ColumnTransformer(\n\
    \    [(\"scaling\", MinMaxScaler(), [\"price\"]),\n     (\"vectorize\", TfidfVectorizer(),\
    \ \"description\")])\ntransformed = ct.fit_transform(df)\n```\n\n这里，我们有一个包含两列的\
    \ DataFrame：`price` 和 `description`。创建了一个包含两个子转换器的列转换器：一个缩放转换器和一个向量化器。缩放转换器仅对\
    \ `price` 列应用最小-最大缩放。向量化器仅对 `description` 列应用 TF-IDF 向量化。当调用 `fit_transform` 时，会返回一个*单一*数组，其中包含缩放后的价格列和表示词向量的列。\n\
    \n> **注意**\n> TF-IDF，即**词频-逆文档频率**，只是从文本中提取特征的一种方式。分析和提取文本特征，以及更广泛意义上的自然语言处理，是机器学习中的一个广泛领域，我们在此不会深入探讨。鼓励您在\
    \ https://scikit-learn.org/stable/modules/feature_extraction.html#text-feature-extraction\
    \ 上进一步阅读该主题。\n\n我们可以将客户流失数据集的预处理设置为一个单一的 `ColumnTransformer`。我们首先定义两个独立的转换器，`id_transformer`\
    \ 和 `encode_transformer`，它们分别应用于 ID 列和分类特征：\n\n```python\nid_transformer = (\n\
    \    \"customer_id\",\n    CustomerIdTransformer(id_columns),\n    id_columns\n\
    )\nencode_transformer = (\n    \"encoder\",\n    OneHotEncoder(sparse_output=False),\n\
    \    categorical_features\n)\n```\n\n然后将这些独立的转换器组合成 `ColumnTransformer`：\n\n```python\n\
    preprocessor = ColumnTransformer(\n    transformers=[\n        id_transformer,\n\
    \        encode_transformer,\n    ],\n    remainder='passthrough'\n)\n```\n\n\
    `ColumnTransformer` 定义了 `remainder='passthrough'` 参数。`remainder` 参数指定了 `ColumnTransformer`\
    \ 未转换的列的处理方式。默认情况下这些列会被丢弃，但我们希望将它们原样传递，以将其包含在数据集中。\n\n编码转换器创建并应用 `OneHotEncoder`\
    \ 到分类特征。\n\n为了说明目的，我们创建了一个自定义转换器类，用于维护 ID 列列表并在转换过程中将其从数据中删除。\n\n该类如下所示：\n\n```python\n\
    class CustomerIdTransformer(BaseEstimator, TransformerMixin):\n    def __init__(self,\
    \ id_columns):\n        self.id_columns = id_columns\n\n    def fit(self, X, y=None):\n\
    \        return self\n\n    def transform(self, X, y=None):\n        return X.drop(columns=self.id_columns,\
    \ axis=1)\n```\n\n如我们所见，该类扩展了 scikit-learn 基类中的 `BaseEstimator` 和 `TransformerMixin`，并且必须实现\
    \ `fit` 和 `transform`。实现这些方法也使其适合作为管道中的转换器。如果需要，`fit` 的实现是可选的；在我们的案例中，`fit` 期间不执行任何操作。我们的转换步骤会删除相关列。\n\
    \n> **注意**\n> 将删除不相关列（在本例中是 ID 列）的功能封装在管道本身中非常重要。当部署管道用于生产时，我们期望在进行预测时将这些列传递给管道。将它们作为管道的一部分删除，简化了管道对模型使用者的使用，并减少了用户出错的机会。\n\
    \n这完成了预处理所需的转换，我们准备进入以下步骤：拟合和调优模型。\n\n## 管道建模步骤\n\n对于管道建模部分，我们将使用 FLAML。我们还将借此机会展示如何将参数传递给管道中的步骤。首先，我们定义\
    \ AutoML 模型的设置：\n\n```python\nautoml_settings = {\n    \"time_budget\": 120,\n\
    \    \"metric\": \"accuracy\",\n    \"task\": \"classification\",\n    \"estimator_list\"\
    : [\"lgbm\", \"rf\"],\n    \"custom_hp\": {\n        \"n_estimators\": {\n   \
    \         \"domain\": flaml.tune.uniform(20, 500)\n        }\n    },\n    \"verbose\"\
    : -1\n}\n```\n\n前面的代码设置了我们的 AutoML 的时间预算、优化指标和分类任务。我们还将估计器限制为 LightGBM 和随机森林模型。最后，我们通过指定\
    \ `n_estimators` 应在 20 到 500 之间均匀采样来自定义搜索空间。\n\n管道要求组成步骤的参数以步骤名称和双下划线为前缀。我们可以设置一个字典，将这些参数传递给管道中的\
    \ AutoML 类：\n\n```python\npipeline_settings = {\n    f\"automl__{key}\": value\
    \ for key, value in\n        automl_settings.items()\n}\n```\n\n这里，`automl` 是管道中步骤的名称。因此，例如，时间预算和指标的参数分别设置为\
    \ `automl__time_budget`: 120 和 `automl__metric`: accuracy。\n\n最后，我们可以添加 FLAML\
    \ 的 AutoML 估计器：\n\n```python\nautoml = flaml.AutoML()\npipeline = Pipeline(\n\
    \    steps=[(\"preprocessor\", preprocessor),\n           (\"automl\", automl)]\n\
    )\n```\n\n最终的管道如下图所示：\n\n![](img/5c9d6611c41357518a5920ff1f360451_177_0.png)\n\
    \n图 8.1 显示了一个由两个子转换器组成的 ColumnTransformer，它们馈入 AutoML 估计器。\n\n## 模型训练与验证\n\n我们现在准备将管道拟合到我们的数据，并传递我们之前设置的管道设置。管道支持标准的\
    \ scikit-learn API，因此我们可以直接调用管道：\n\n```python\npipeline.fit(X, y, **pipeline_settings)\n\
    ```\n\n运行 fit 会执行所有预处理步骤，然后将数据传递给 AutoML 进行建模和调优。这个单一的 Pipeline 对象展示了 ML 管道的强大之处：整个端到端过程，包括一个经过训练和调优的模型，被封装且可移植，我们可以像使用单个模型一样使用该管道。例如，以下代码对训练数据执行\
    \ F1 评分：\n\n```python\nprint(f\"F1: {f1_score(pipeline.predict(X), y, pos_label='Yes')}\"\
    )\n```\n\n要导出管道，我们使用 `joblib` 将模型序列化到文件：\n\n```python\njoblib.dump(pipeline, \"\
    churn_pipeline.pkl\")\n```\n\n导出管道允许我们重新实例化并在生产代码中使用它。接下来，我们将研究为模型构建 API。\n\n\
    在这个阶段，我们的管道（封装了预处理、训练、优化和验证）已经定义，我们准备将其部署到系统中。我们将通过使用 FastAPI 将模型包装在 API 中来实现这一点。\n\
    \n## 使用 FastAPI 构建 ML API\n\n我们现在将研究围绕管道构建 REST API，使管道的消费者能够通过 Web 请求获取预测。为模型构建\
    \ Web API 还简化了与其他系统和服务的集成，是微服务架构中集成的标准方法。\n\n要构建 API，我们使用 Python 库 FastAPI。\n\n\
    ### FastAPI\n\nFastAPI 是一个现代、高性能的 Web 框架，用于使用 Python 3.6+ 构建 API。它从设计之初就易于使用，并支持高性能\
    \ API 开发。FastAPI 的关键特性是其速度和易用性，使其成为开发健壮、生产就绪 API 的绝佳选择。FastAPI 广泛采用 Python 的类型检查，这有助于在开发过程中尽早发现错误。它还使用这些类型提示来提供数据验证、序列化和文档，减少了开发人员需要编写的样板代码。\n\
    \nFastAPI 的性能是其定义性特征之一。它与 Node.js 相当，并且比传统的 Python 框架快得多。这种速度是由于其使用 Starlette\
    \ 处理 Web 部分，使用 Pydantic 处理数据部分，并且其非阻塞特性使其适合处理许多并发请求。\n\nFastAPI 提供自动交互式 API 文档，这是在开发复杂\
    \ API 时的一个巨大优势。使用 FastAPI，开发人员可以通过 Swagger UI 获得自动生成的交互式 API 文档。Swagger UI 还提供了在不编写代码或使用外部工具的情况下与\
    \ REST 资源交互的功能。此功能使 FastAPI 对开发人员非常友好，并加速了开发过程。"

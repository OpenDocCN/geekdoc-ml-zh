    \ L1 regularization term, controlled by the parameter $\\alpha, 0 \\le \\alpha\
    \ \\le 1$, and $\\lambda \\sum_{i}^{n} w_i^2$ is the L2 regularization term, controlled\
    \ by the parameter $\\lambda$.\n\nL1 regularization has the effect of driving\

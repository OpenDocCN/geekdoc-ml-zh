    本章为我们奠定了机器学习的基础，使我们能够更深入地了解数据科学流程和 LightGBM 库。


    下一章将重点介绍决策树中的集成学习，这是一种结合多个决策树的预测以提高整体性能的技术。提升方法，特别是梯度提升，将被详细阐述。


    ## 参考文献


    - [1] J. R. Quinlan, *C4.5: Programs for machine learning*, Elsevier, 2014.

    - [2] R. J. Lewis, *An introduction to classification and regression tree (CART)
    analysis*, in *Annual meeting of the Society For Academic Emergency Medicine in
    San Francisco, California*, 2000.


    ## 2 集成学习 – Bagging 与 Boosting


    在上一章中，我们介绍了**机器学习**（ML）的基础知识、数据与模型的处理，以及过拟合和**监督学习**（SL）等概念。我们还介绍了决策树，并了解了如何在
    scikit-learn 中实际应用它们。


    在本章中，我们将学习集成学习以及两种最重要的集成学习类型：bagging 和 boosting。我们将涵盖将集成学习应用于决策树的理论和实践，并在本章最后重点介绍更高级的提升方法。


    学完本章后，您将对集成学习有很好的理解，并知道如何通过 bagging 或 boosting 实际构建决策树集成。我们也将准备好深入探索 LightGBM，包括其更高级的理论方面。


    我们将涵盖的主要主题如下：


    - 集成学习

    - Bagging 与随机森林

    - **梯度提升决策树（GBDTs）**

    - 高级提升算法——**Dropouts meet Multiple Additive Regression Trees (DART)**


    ## 技术要求


    本章包含简单 ML 算法的示例，并介绍了如何使用 scikit-learn。您必须安装一个包含 scikit-learn、NumPy、pandas 和 Jupyter
    的 Python 环境。本章的代码可在 `https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-2`
    获取。


    ## 集成学习


    **集成学习**是将多个预测器或模型组合起来以创建更稳健模型的实践。模型可以是相同类型（同质集成）或不同类型（异质集成）。此外，集成学习并非决策树特有，可以应用于任何
    ML 技术，包括线性模型、**神经网络**（NNs）等。


    集成学习背后的核心思想是，通过聚合多个模型的结果，我们弥补了单个模型的弱点。


    当然，在相同数据上训练相同的模型在集成中并无帮助（因为模型会有相似的预测）。因此，我们追求模型的**多样性**。多样性指的是集成中每个模型之间的差异程度。高多样性集成具有差异很大的模型。


    我们可以通过多种方式确保集成的多样性。一种方法是在训练数据的不同子集上训练模型。每个模型接触到训练数据中不同的模式和噪声，从而增加了训练模型的多样性。


    类似地，我们可以在训练数据的不同特征子集上训练每个模型。一些特征比其他特征更有价值，一些可能无关，这导致了模型预测的多样性。


    我们还可以使用不同的超参数训练每个模型，从而产生具有不同复杂度和能力的不同模型。超参数的影响在决策树的情况下尤为显著，因为超参数会显著影响树的结构，从而导致非常不同的模型。


    最后，我们可以通过使用不同类型的模型来使集成多样化。每个模型都有其独特的优势和劣势，从而导致集成的多样性。


    **集成学习方法**指的是我们如何通过指定如何训练成员模型以及如何组合模型结果来在集成模型中引入多样性。最常见的集成方法如下：


    - **自助聚合（Bagging）**：这些方法在训练数据的子集（样本或特征）上训练模型，然后聚合预测结果。

    - **提升（Boosting）**：这涉及在先前模型的错误上迭代训练模型。最终预测是通过组合链中所有模型的预测得出的。

    - **堆叠（Stacking）**：这涉及训练多个基础模型，然后训练一个高阶模型（称为元模型）从基础模型的预测中学习并做出最终预测。

    - **混合（Blending）**：这与堆叠非常相似。然而，元模型是在基础模型对*留出集*（基础学习器未训练过的那部分训练数据）的预测上训练的，而不是在整个训练集上训练。


    集成学习方法的目的是提高我们的预测性能，集成通过以下几种方式提高了单个模型的性能：


    - **提高准确性**：通过组合预测，我们增加了最终预测准确的可能性，因为总体上模型犯的错误更少。

    - **改善泛化能力和过拟合**：通过聚合预测，我们减少了最终预测的方差，从而改善了泛化能力。此外，在某些集成方法中，模型无法访问所有数据（bagging
    集成），从而减少了噪声和过拟合。

    - **提高预测稳定性**：预测的聚合减少了单个预测的随机波动。集成对异常值不太敏感，成员模型的异常预测对最终预测的影响有限。


    决策树非常适合集成学习，并且存在针对决策树的特定集成学习算法。下一节将讨论决策树中的 bagging 集成，重点介绍**随机森林**。


    ## Bagging 与随机森林


    **Bagging** 是一种集成方法，其中多个模型在训练数据的子集上进行训练。模型的预测被组合以做出最终预测，通常对于数值预测（回归）取平均值，对于类别（分类）取多数票。在训练每个模型时，我们从原始训练数据集中有放回地选择一个数据子集——也就是说，一个特定的训练模式可以属于多个子集。由于每个模型只接触到训练数据的一个样本，因此没有单个模型能够“记住”训练数据，从而减少了过拟合。下图说明了
    bagging 过程：'

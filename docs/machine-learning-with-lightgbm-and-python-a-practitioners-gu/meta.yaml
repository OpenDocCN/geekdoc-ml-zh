    \ manually using a composite type as the feature data. This can be done as follows:\n\
    \n```\nSELECT pgml.predict(\n    'Telco Churn',\n    ROW (\n        CAST('Male'\
    \ AS VARCHAR(30)),\n        1,\n        ...\n        CAST('Electronic check' AS\
    \ VARCHAR(30)),\n        CAST(20.25 AS REAL),\n        CAST(4107.25 AS REAL)\n\
    \    )\n) AS prediction;\n```\n\nWe use the PostgreSQL ROW expression to set up\
    \ the data, casting literals to the correct types for our model.\n\nHowever, the\
    \ more common way to leverage a PostgresML model is to incorporate predictions\
    \ into regular business queries. For example, here, we've selected all the data\
    \ from the original customer data table and added the prediction for each row\
    \ using the pgml.predict function:\n\n```\nSELECT *,\n    pgml.predict(\n    \
    \    'Telco Churn',\n        ROW (\n            gender,\n            seniorcitizen,\n\
    \            ...\n            paymentmethod,\n```"
- md: '## 11 Distributed and GPU-Based Learning with LightGBM


    This chapter looks at training LightGBM models on distributed computing clusters
    and GPUs. Distributed computing can significantly speed up training workloads
    and enable the training of much larger datasets than the memory available on a
    single machine. We''ll look at leveraging Dask for distributed computing and LightGBM''s
    support for GPU-based training.


    The topics covered in the chapter are as follows:


    - Distributed learning with LightGBM and Dask

    - GPU training for LightGBM


    ### Technical requirements


    The chapter includes examples of training and running LightGBM models on distributed
    computing clusters and GPUs. A Dask environment and GPUs are required to run the
    examples. Complete code examples are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-11.


    ### Distributed learning with LightGBM and Dask


    Dask is an open-source Python library for distributed computing. It''s designed
    to integrate seamlessly with existing Python libraries and tools, including scikit-learn
    and LightGBM. This section looks at running distributed training workloads for
    LightGBM using Dask.


    Dask (https://www.dask.org/) allows you to set up clusters on both a single machine
    and across many machines. Running Dask on a single machine is the default and
    requires no setup. However, workloads that run on a single-machine cluster (or
    scheduler) can readily be run with a distributed scheduler.


    Dask offers many ways to run a distributed cluster, including integrating Kubernetes,
    MPI, or automatic provisioning into a hyperscalar such as AWS or Google Cloud
    Platform.


    When running on a single machine, Dask still distributes the workload across multiple
    threads, which can significantly speed up workloads.


    Dask provides cluster management utility classes to set up a cluster easily. A
    local cluster can be run as follows:


    ```

    cluster = LocalCluster(n_workers=4, threads_per_worker=2)

    client = Client(cluster)

    ```


    The preceding code creates a local cluster with four workers, configuring each
    worker to run two threads. The cluster runs on localhost, with the scheduler running
    on port 8786 by default. The host IP and port can be configured using parameters.
    In addition to running the scheduler, Dask also starts a diagnostic dashboard
    that''s implemented using Bokeh (https://docs.bokeh.org/en/latest/). By default,
    the dashboard runs on port 8787. We can check the **Workers** page to see the
    status of our running cluster, as shown in *Figure 11.1*.


    ![](img/5c9d6611c41357518a5920ff1f360451_230_0.png)


    With a cluster up and running, we can prepare our data for use on the distributed
    cluster.


    Dask offers its own implementation of a data frame called the Dask DataFrame.
    A Dask DataFrame comprises many smaller pandas DataFrames, which are split based
    on the index. Each part can be stored on disk or distributed across a network,
    which allows working with much larger datasets than can fit into a single machine''s
    memory. Operations performed on the Dask DataFrame are automatically distributed
    to the pandas DataFrames.


    > **Note**

    > When your dataset fits into RAM, using standard pandas DataFrames instead of
    a Dask DataFrame is recommended.


    We can create a Dask DataFrame by loading a CSV file. Note that the CSV file may
    be located on S3 or HDFS and can be very large. The following code creates a Dask
    DataFrame from a CSV file:


    ```

    import dask.dataframe as dd

    df = dd.read_csv("covtype/covtype.csv", blocksize="64MB")

    ```


    Here, we also specify the block size for loading the CSV file. The block size
    sets the chunks the dataset is divided into and gives us granular control over
    the memory of individual DataFrame parts. When calling `df.shape`, we get an interesting
    result:


    ```

    df.shape

    # (Delayed(''int-a0031d1f-945d-42b4-af29-ea5e40148f3f''), 55)

    ```


    The number of columns is returned as a number. However, looking at the number
    of rows, we got a wrapper class called `Delayed`. This illustrates that even though
    we''ve created the DataFrame, the data is not loaded into memory. Instead, Dask
    loads the data as needed on the workers that use the data. We can force Dask to
    compute the row count as follows:


    ```

    df.shape[0].compute()

    # 581012

    ```


    With the data available in a DataFrame, we can prepare it for training. We split
    our data into a training and test set using the `train_test_split` function from
    `dask_ml`:


    ```

    X = df.iloc[:, :-1]

    y = df.iloc[:, -1]

    X_train, X_test, y_train, y_test = dask_ml.model_selection.train_test_split(X,
    y)

    ```


    Although the function from `dask_ml` mirrors the functionality of scikit-learn''s
    `train_test_split`, the Dask version maintains the distributed nature of the underlying
    Dask DataFrame.


    Our cluster is now set up, and the data is prepared for training. We can now look
    toward training our LightGBM model.


    The LightGBM library team offers and maintains Dask versions of each available
    learning algorithm: `DaskLGBMRegressor`, `DaskLGBMClassifier`, and `DaskLGBMRanker`.
    These are wrappers around the standard LightGBM scikit-learn interface with additional
    functionality to specify the Dask cluster client to use.


    When LightGBM runs on a Dask cluster, training occurs with one LightGBM worker
    per Dask worker. LightGBM concatenates all data partitions on a single worker
    into a single dataset, and each LightGBM worker uses the local dataset independently.


    Each LightGBM worker then works in concert to train a single LightGBM model, using
    the Dask cluster to communicate. When data parallel training is performed (as
    is the case with Dask), LightGBM uses a **Reduce-Scatter** strategy:


    1. During the histogram-building phase, each worker builds histograms for different
    non-overlapping features. Then, a **Reduce-Scatter** operation is performed: each
    worker shares a part of its histogram with each other worker.

    2. After the **Reduce-Scatter**, each worker has a complete histogram for a subset
    of features and then finds the best split for these features.

    3. Finally, a gathering operation is performed: each worker shares its best split
    with all other workers, so all workers have all the best splits.


    The best feature split is chosen, and the data is partitioned accordingly.


    Fortunately, the complexity of the distributed algorithm is hidden from us, and
    the training code is identical to the scikit-learn training code we''re used to:


    ```

    dask_model = lgb.DaskLGBMClassifier(n_estimators=200, client=client)

    dask_model.fit(X_train, y_train)

    ```


    Running the preceding code trains the LightGBM model, and we can see the progress
    by checking the **Status** page of the Dask dashboard, as shown in *Figure 11.2*.


    ![](img/5c9d6611c41357518a5920ff1f360451_232_0.png)


    ---


    Similar to calling the predict function manually, we use the ROW expression to
    pass data to the pgml.predict function but select the data from the table.


    This also clearly illustrates the advantage of using PostgresML: a consumer of
    the ML model could query new customer data alongside the predictions with minimal
    overhead and in the same business transaction with a single network call.


    ## Summary


    This chapter provided an overview of PostgresML, a unique MLOps platform that
    allows training and calling models from SQL queries on top of an existing PostgreSQL
    database.


    We discussed the platform''s advantages in simplifying an ML-enabled landscape
    and reducing overhead and network latency in a service-oriented architecture.
    An overview of the core features and the API was provided.


    This chapter concluded with a practical example of leveraging PostgresML for a
    classification problem, illustrating how to train a LightGBM model, perform hyperparameter
    optimization, deploy it, and leverage it for predictions in a handful of SQL queries.


    In the next chapter, we will look at distributed and GPU-based learning with LightGBM.


    ## References


    [1] PostgresML is 8-40x faster than Python HTTP microservices, [Online]. Available
    at https://postgresml.org/blog/postgresml-is-8x-faster-than-python-http-microservices.'
  mdcn: '## 11 使用 LightGBM 进行分布式与基于 GPU 的学习


    本章探讨如何在分布式计算集群和 GPU 上训练 LightGBM 模型。分布式计算能显著加速训练工作负载，并允许训练远超单机内存容量的更大数据集。我们将研究如何利用
    Dask 进行分布式计算，以及 LightGBM 对基于 GPU 训练的支持。


    本章涵盖的主题如下：


    - 使用 LightGBM 和 Dask 进行分布式学习

    - LightGBM 的 GPU 训练


    ### 技术要求


    本章包含在分布式计算集群和 GPU 上训练和运行 LightGBM 模型的示例。运行这些示例需要 Dask 环境和 GPU。完整的代码示例可在 https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-11
    获取。


    ### 使用 LightGBM 和 Dask 进行分布式学习


    Dask 是一个用于分布式计算的开源 Python 库。它旨在与现有的 Python 库和工具（包括 scikit-learn 和 LightGBM）无缝集成。本节介绍如何使用
    Dask 运行 LightGBM 的分布式训练工作负载。


    Dask (https://www.dask.org/) 允许你在单台机器和多台机器上设置集群。在单台机器上运行 Dask 是默认设置，无需配置。但是，在单机集群（或调度器）上运行的工作负载可以轻松地使用分布式调度器运行。


    Dask 提供了多种运行分布式集群的方式，包括集成 Kubernetes、MPI 或自动配置到 AWS 或 Google Cloud Platform 等超大规模云平台。


    在单台机器上运行时，Dask 仍然会将工作负载分配到多个线程上，这可以显著加速工作负载。


    Dask 提供了集群管理实用程序类，可以轻松设置集群。可以按如下方式运行本地集群：


    ```

    cluster = LocalCluster(n_workers=4, threads_per_worker=2)

    client = Client(cluster)

    ```


    前面的代码创建了一个包含四个工作节点的本地集群，配置每个工作节点运行两个线程。集群在本地主机上运行，调度器默认在端口 8786 上运行。可以使用参数配置主机
    IP 和端口。除了运行调度器，Dask 还会启动一个使用 Bokeh (https://docs.bokeh.org/en/latest/) 实现的诊断仪表板。默认情况下，仪表板在端口
    8787 上运行。我们可以检查 **Workers** 页面来查看运行集群的状态，如 *图 11.1* 所示。


    ![](img/5c9d6611c41357518a5920ff1f360451_230_0.png)


    集群启动并运行后，我们可以为在分布式集群上使用准备数据。


    Dask 提供了自己实现的数据帧，称为 Dask DataFrame。Dask DataFrame 由许多较小的 pandas DataFrame 组成，这些
    DataFrame 根据索引进行分割。每个部分可以存储在磁盘上或分布在网络中，这允许处理比单机内存容量大得多的数据集。对 Dask DataFrame 执行的操作会自动分配到各个
    pandas DataFrame 上。


    > **注意**

    > 当你的数据集适合放入内存时，建议使用标准的 pandas DataFrame 而不是 Dask DataFrame。


    我们可以通过加载 CSV 文件来创建 Dask DataFrame。请注意，CSV 文件可能位于 S3 或 HDFS 上，并且可能非常大。以下代码从 CSV
    文件创建 Dask DataFrame：


    ```

    import dask.dataframe as dd

    df = dd.read_csv("covtype/covtype.csv", blocksize="64MB")

    ```


    这里，我们还指定了加载 CSV 文件的块大小。块大小设置了数据集被分割成的块，使我们能够精细控制各个 DataFrame 部分的内存。当调用 `df.shape`
    时，我们得到一个有趣的结果：


    ```

    df.shape

    # (Delayed(''int-a0031d1f-945d-42b4-af29-ea5e40148f3f''), 55)

    ```


    列数作为数字返回。然而，查看行数时，我们得到了一个名为 `Delayed` 的包装类。这说明即使我们已经创建了 DataFrame，数据也并未加载到内存中。相反，Dask
    会在需要数据的工作节点上按需加载数据。我们可以强制 Dask 计算行数，如下所示：


    ```

    df.shape[0].compute()

    # 581012

    ```


    数据在 DataFrame 中可用后，我们可以为其训练做准备。我们使用 `dask_ml` 中的 `train_test_split` 函数将数据分割为训练集和测试集：


    ```

    X = df.iloc[:, :-1]

    y = df.iloc[:, -1]

    X_train, X_test, y_train, y_test = dask_ml.model_selection.train_test_split(X,
    y)

    ```


    尽管 `dask_ml` 中的函数与 scikit-learn 的 `train_test_split` 功能相似，但 Dask 版本保持了底层 Dask
    DataFrame 的分布式特性。


    我们的集群现已设置完毕，数据也已准备好进行训练。现在我们可以着手训练 LightGBM 模型了。


    LightGBM 库团队提供并维护了每种可用学习算法的 Dask 版本：`DaskLGBMRegressor`、`DaskLGBMClassifier` 和
    `DaskLGBMRanker`。这些是标准 LightGBM scikit-learn 接口的包装器，增加了指定要使用的 Dask 集群客户端的功能。


    当 LightGBM 在 Dask 集群上运行时，每个 Dask 工作节点对应一个 LightGBM 工作节点进行训练。LightGBM 将单个工作节点上的所有数据分区连接成一个数据集，每个
    LightGBM 工作节点独立使用本地数据集。


    然后，每个 LightGBM 工作节点协同工作，使用 Dask 集群进行通信来训练单个 LightGBM 模型。当执行数据并行训练（如 Dask 的情况）时，LightGBM
    使用 **Reduce-Scatter** 策略：


    1. 在构建直方图阶段，每个工作节点为不同的非重叠特征构建直方图。然后，执行 **Reduce-Scatter** 操作：每个工作节点将其直方图的一部分与其他每个工作节点共享。

    2. **Reduce-Scatter** 之后，每个工作节点都拥有特征子集的完整直方图，然后为这些特征找到最佳分割点。

    3. 最后，执行收集操作：每个工作节点将其最佳分割点与其他所有工作节点共享，这样所有工作节点都拥有所有最佳分割点。


    选择最佳特征分割点，并相应地对数据进行分区。


    幸运的是，分布式算法的复杂性对我们是隐藏的，训练代码与我们习惯的 scikit-learn 训练代码完全相同：


    ```

    dask_model = lgb.DaskLGBMClassifier(n_estimators=200, client=client)

    dask_model.fit(X_train, y_train)

    ```


    运行前面的代码将训练 LightGBM 模型，我们可以通过检查 Dask 仪表板的 **Status** 页面来查看进度，如 *图 11.2* 所示。


    ![](img/5c9d6611c41357518a5920ff1f360451_232_0.png)


    ---


    类似于手动调用预测函数，我们使用 ROW 表达式将数据传递给 pgml.predict 函数，但从表中选择数据。


    这也清楚地说明了使用 PostgresML 的优势：ML 模型的消费者可以在同一个业务事务中，通过单次网络调用，以最小的开销同时查询新客户数据和预测结果。


    ## 总结


    本章概述了 PostgresML，这是一个独特的 MLOps 平台，允许在现有 PostgreSQL 数据库之上通过 SQL 查询训练和调用模型。


    我们讨论了该平台在简化 ML 应用场景以及减少面向服务架构中的开销和网络延迟方面的优势。概述了核心功能和 API。


    本章最后通过一个利用 PostgresML 解决分类问题的实际示例进行了总结，说明了如何训练 LightGBM 模型、执行超参数优化、部署模型，并在少量 SQL
    查询中利用其进行预测。


    在下一章中，我们将探讨使用 LightGBM 进行分布式和基于 GPU 的学习。


    ## 参考文献


    [1] PostgresML 比 Python HTTP 微服务快 8-40 倍，[在线]。可访问 https://postgresml.org/blog/postgresml-is-8x-faster-than-python-http-microservices。'

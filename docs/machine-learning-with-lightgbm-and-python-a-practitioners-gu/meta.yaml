  md: 'LightGBM addresses both issues we have with the gradient-boosted tree and builds
    a gradient-boosted tree with significantly better performance in a fraction of
    the time.


    In the following section, we''ll briefly cover an advanced algorithm related to
    gradient boosting: DART.


    # Advanced boosting algorithm – DART


    **DART** is an extension of the standard GBDT algorithm discussed in the previous
    section [4]. DART employs **dropouts**, a technique from **deep learning (DL)**,
    to avoid overfitting by the decision tree ensemble. The extension is straightforward
    and consists of two parts. First, when fitting the next prediction tree, $M_{n+1}(x)$,
    which consists of the scaled sum of all previous trees $M_n...M_1$, a random subset
    of the previous trees is instead used, with other trees dropped from the sum.
    The $p_{drop}$ parameter controls the probability of a previous tree being included.
    The second part of the DART algorithm is to apply additional scaling of the contribution
    of the new tree. Let $k$ be the number of trees dropped when the new tree, $M_{n+1}$,
    was calculated. Since $M_{n+1}$ was calculated without the contribution of those
    $k$ trees when updating our prediction, $F_{n+1}$, which includes all trees, the
    prediction overshoots. Therefore, the new tree is scaled by a factor of $\frac{1}{k}$
    to compensate.


    DART has been shown to outperform standard GBDTs while also significantly improving
    overfitting.


    Scikit-learn does not implement DART for GBDTs, but DART is incorporated in LightGBM.


    # Summary


    In conclusion, this chapter looked at the two most common methods of ensemble
    learning for decision trees: bagging and boosting. We looked at the Random Forests
    and ExtraTrees algorithms, which build decision tree ensembles using bagging.


    This chapter also gave a detailed overview of boosting in decision trees by going
    through the GBDT algorithm step by step, illustrating how gradient boosting is
    applied. We covered practical examples of random forests, ExtraTrees, and GBDTs
    for scikit-learn.


    Finally, we looked at how dropouts can be applied to GBDTs with the DART algorithm.
    We now thoroughly understand decision tree ensemble techniques and are ready to
    dive deep into LightGBM.


    The next chapter introduces the LightGBM library in detail, both the theoretical
    advancements made by the library and the practical application thereof. We will
    also look at using LightGBM with Python to solve ML problems.'

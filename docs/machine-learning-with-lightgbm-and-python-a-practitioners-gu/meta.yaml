  - '[PAGE 66]


    There are multiple definitions for $\Omega$. A typical implementation for the
    terms in decision trees is this:

    $$\Omega(w) = \alpha \sum_{i}^{n} |w_i| + \lambda \sum_{i}^{n} w_i^2$$

    Here, $\alpha \sum_{i}^{n} |w_i|$ is the L1 regularization term, controlled by
    the parameter $\alpha, 0 \le \alpha \le 1$, and $\lambda \sum_{i}^{n} w_i^2$ is
    the L2 regularization term, controlled by the parameter $\lambda$.


    L1 regularization has the effect of driving leaf scores to zero by penalizing
    leaves with large absolute outputs. *Smaller leaf outputs have a smaller effect
    on the tree''s prediction, effectively simplifying the tree.*


    L2 regularization is similar but has an outsized effect on outliers'' leaves due
    to taking the square of the output.


    Finally, when larger trees are built (trees with more leaves, and therefore a
    large $w$ vector), both sum terms for $\Omega(w)$ increase, increasing the objective
    function output. Therefore, *larger trees are penalized*, and overfitting is reduced.


    # **Summary of LightGBM optimizations**


    In summary, LightGBM improves upon the standard ensemble algorithms by doing the
    following:


    +   - Implementing histogram-based sampling of features to reduce the computational
    cost of finding optimal splits

    - Calculating exclusive feature bundles to reduce the number of features in sparse
    datasets

    - Applying GOSS to downsample the training data without losing accuracy

    - Building trees leaf-wise to improve accuracy

    - Overfitting can be controlled through L1 and L2 regularization and other control
    parameters


    In conjunction, the optimizations improve the computational performance of LightGBM
    by **orders of magnitude (OOM)** over the standard GBDT algorithm. Additionally,
    LightGBM is implemented in C++ with a Python interface, which results in much
    faster code than Python-based GBDTs, such as in scikit-learn.


    Finally, LightGBM also has support for improved data-parallel and feature-parallel
    distributed training. Distributed training and GPU support are discussed in a
    later *Chapter 11, Distributed and GPU-Based Learning with LightGBM*.


    # **Hyperparameters**


    LightGBM exposes many parameters that can be used to customize the training process,
    goals, and performance. Next, we discuss the most notable parameters and how they
    may be used to control specific phenomena.'
  - '[PAGE 67]


    > **Note**

    The core LightGBM framework is developed in C++ but includes APIs to work with
    LightGBM in C, Python, and R. The parameters discussed in this section are the
    framework parameters and are exposed differently by each API. The following section
    discusses the parameters available when using Python.


    The following are **core framework parameters** used to control the optimization
    process and goal:


    +   - `objective`: LightGBM supports the following optimization objectives, among
    others—regression (including regression applications with other loss functions
    such as Huber and Fair), `binary` (classification), `multiclass` (classification),
    `cross-entropy`, and `lambdarank` for ranking problems.

    - `boosting`: The boosting parameter controls the boosting type. By default, this
    is set to `gbdt`, the standard GBDT algorithm. The other options are `dart` and
    `rf` for random forests. The random forest mode does not perform boosting but
    instead builds a random forest.

    - `num_iterations` (or `n_estimators`): Controls the number of boosting iterations
    and, therefore, the number of trees built.

    - `num_leaves`: Controls the maximum number of leaves in a single tree.

    - `learning_rate`: Controls the learning, or shrinkage rate, which is the contribution
    of each tree to the overall prediction.


    LightGBM also provides many parameters to control the learning process. We''ll
    discuss these parameters relative to how they may be used to tune specific aspects
    of training.


    The following control parameters can be used to improve **accuracy**:


    +   - `boosting`: Use `dart`, which has been shown to outperform standard GBDTs.

    - `learning_rate`: The learning rate must be tuned alongside `num_iterations`
    for better accuracy. A small learning rate with a large value for `num_iterations`
    leads to better accuracy at the expense of optimization speed.

    - `num_leaves`: A larger number of leaves improves accuracy but may lead to overfitting.

    - `max_bin`: The maximum number of bins in which features are bucketed when constructing
    histograms. A larger `max_bin` size slows the training and uses more memory but
    may improve accuracy.


    The following **learning control parameters** can be used to deal with **overfitting**:


    +   - `bagging_fraction` and `bagging_freq`: Setting both parameters enables feature
    bagging. Bagging may be used in addition to boosting and doesn''t force the use
    of a random forest. Enabling bagging reduces overfitting.'
  - '[PAGE 68]


    48 An Overview of LightGBM in Python


    +   - `early_stopping_round`: Enables early stopping and controls the number of
    iterations used to determine whether training should be stopped. Training is stopped
    if no improvement is made to any metric in the iterations set by `early_stopping_round`.

    - `min_data_in_leaf`: The minimum samples allowed in a leaf. Larger values reduce
    overfitting.

    - `min_gain_to_split`: The minimum amount of information gain required to perform
    a split. Higher values reduce overfitting.

    - `reg_alpha`: Controls L1 regularization. Higher values reduce overfitting.

    - `reg_lambda`: Controls L2 regularization. Higher values reduce overfitting.

    - `max_depth`: Controls the maximum depth of individual trees. Shallower trees
    reduce overfitting.

    - `max_drop`: Controls the maximum number of dropped trees when using the DART
    algorithm (is only used when `boosting` is set to `dart`). A larger value reduces
    overfitting.

    - `extra_trees`: Enables the **Extremely Randomized Trees (ExtraTrees)** algorithm.
    LightGBM then chooses a split threshold at random for each feature. Enabling Extra-Trees
    can reduce overfitting. The parameter can be used in conjunction with any boosting
    mode.


    The parameters discussed here include only some of the parameters available in
    LightGBM and focus on improving accuracy and overfitting. A complete list of parameters
    is available at the following link: https://lightgbm.readthedocs.io/en/latest/Parameters.html.


    # Limitations of LightGBM


    LightGBM is designed to be more efficient and effective than traditional methods.
    It is particularly well known for its ability to handle large datasets. However,
    as with any algorithm or framework, it also has its limitations and potential
    disadvantages, including the following:


    +   - **Sensitive to overfitting**: LightGBM can be sensitive to overfitting,
    especially with small or noisy datasets. Care should be taken to monitor and control
    for overfitting when using LightGBM.

    - **Optimal performance requires tuning**: As discussed previously, LightGBM has
    many hyperparameters that need to be properly tuned to get the best performance
    from the algorithm.

    - **Lack of representation learning**: Unlike **deep learning (DL)** approaches,
    which excel at learning from raw data, LightGBM requires feature engineering to
    be applied to the data before learning. Feature engineering is a time-consuming
    process that requires domain knowledge.

    - **Handling sequential data**: LightGBM is not inherently designed for working
    with sequential data such as time series. For LightGBM to be used with time-series
    data, feature engineering needs to be applied to create lagged features and capture
    temporal dependencies.

    - **Complex interactions and non-linearities**: LightGBM is a decision-tree-driven
    approach that might be incapable of capturing complex feature interactions and
    non-linearities. Proper feature engineering needs to be applied to ensure the
    algorithm models these.'

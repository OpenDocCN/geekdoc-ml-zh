    - `reg_alpha`：控制 L1 正则化。较高的值可以减少过拟合。\n- `reg_lambda`：控制 L2 正则化。较高的值可以减少过拟合。\n\
    - `max_depth`：控制单棵树的最大深度。较浅的树可以减少过拟合。\n- `max_drop`：控制使用 DART 算法时丢弃树的最大数量（仅在 `boosting`\

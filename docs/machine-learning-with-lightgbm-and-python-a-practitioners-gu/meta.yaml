  md: '# # 11 Distributed and GPU-Based Learning with LightGBM


    This chapter looks at training LightGBM models on distributed computing clusters
    and GPUs. Distributed computing can significantly speed up training workloads
    and enable the training of much larger datasets than the memory available on a
    single machine. We''ll look at leveraging Dask for distributed computing and LightGBM''s
    support for GPU-based training.


    The topics covered in the chapter are as follows:


    +   - Distributed learning with LightGBM and Dask

    - GPU training for LightGBM


    # ## Technical requirements


    The chapter includes examples of training and running LightGBM models on distributed
    computing clusters and GPUs. A Dask environment and GPUs are required to run the
    examples. Complete code examples are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-11.


    # ## Distributed learning with LightGBM and Dask


    Dask is an open-source Python library for distributed computing. It''s designed
    to integrate seamlessly with existing Python libraries and tools, including scikit-learn
    and LightGBM. This section looks at running distributed training workloads for
    LightGBM using Dask.


    Dask (https://www.dask.org/) allows you to set up clusters on both a single machine
    and across many machines. Running Dask on a single machine is the default and
    requires no setup. However, workloads that run on a single-machine cluster (or
    scheduler) can readily be run with a distributed scheduler.'
  merge: -1
  pgno: 229
- img_proc: true
  md: 'Dask offers many ways to run a distributed cluster, including integrating Kubernetes,
    MPI, or automatic provisioning into a hyperscalar such as AWS or Google Cloud
    Platform.


    When running on a single machine, Dask still distributes the workload across multiple
    threads, which can significantly speed up workloads.


    Dask provides cluster management utility classes to set up a cluster easily. A
    local cluster can be run as follows:


    ```

    cluster = LocalCluster(n_workers=4, threads_per_worker=2)

    client = Client(cluster)

    ```


    The preceding code creates a local cluster with four workers, configuring each
    worker to run two threads. The cluster runs on localhost, with the scheduler running
    on port 8786 by default. The host IP and port can be configured using parameters.
    In addition to running the scheduler, Dask also starts a diagnostic dashboard
    that''s implemented using Bokeh (https://docs.bokeh.org/en/latest/). By default,
    the dashboard runs on port 8787. We can check the **Workers** page to see the
    status of our running cluster, as shown in *Figure 11.1*.


    ![](img/5c9d6611c41357518a5920ff1f360451_230_0.png)


    With a cluster up and running, we can prepare our data for use on the distributed
    cluster.


    Dask offers its own implementation of a data frame called the Dask DataFrame.
    A Dask DataFrame comprises many smaller pandas DataFrames, which are split based
    on the index. Each part can be stored on disk or distributed across a network,
    which allows working with much larger datasets than can fit into a single machine''s
    memory. Operations performed on the Dask DataFrame are automatically distributed
    to the pandas DataFrames.'
  merge: -1
  pgno: 230
- img_proc: true
  md: "> **Note**\nWhen your dataset fits into RAM, using standard pandas DataFrames\
    \ instead of a Dask DataFrame is recommended.\n\nWe can create a Dask DataFrame\
    \ by loading a CSV file. Note that the CSV file may be located on S3 or HDFS and\
    \ can be very large. The following code creates a Dask DataFrame from a CSV file:\n\
    \n```\nimport dask.dataframe as dd\ndf = dd.read_csv(\"covtype/covtype.csv\",\
    \ blocksize=\"64MB\")\n```\n\nHere, we also specify the block size for loading\
    \ the CSV file. The block size sets the chunks the dataset is divided into and\
    \ gives us granular control over the memory of individual DataFrame parts. When\
    \ calling `df.shape`, we get an interesting result:\n\n```\ndf.shape\n# (Delayed('int-a0031d1f-945d-42b4-af29-ea5e40148f3f'),\
    \ 55)\n```\n\nThe number of columns is returned as a number. However, looking\
    \ at the number of rows, we got a wrapper class called `Delayed`. This illustrates\
    \ that even though we've created the DataFrame, the data is not loaded into memory.\
    \ Instead, Dask loads the data as needed on the workers that use the data. We\
    \ can force Dask to compute the row count as follows:\n\n```\ndf.shape[0].compute()\n\
    # 581012\n```\n\nWith the data available in a DataFrame, we can prepare it for\
    \ training. We split our data into a training and test set using the `train_test_split`\
    \ function from `dask_ml`: \n\n```\nX = df.iloc[:, :-1]\ny = df.iloc[:, -1]\n\
    X_train, X_test, y_train, y_test = dask_ml.model_selection.train_test_split(X,\
    \ y)\n```\n\nAlthough the function from `dask_ml` mirrors the functionality of\
    \ scikit-learn's `train_test_split`, the Dask version maintains the distributed\
    \ nature of the underlying Dask DataFrame.\n\nOur cluster is now set up, and the\
    \ data is prepared for training. We can now look toward training our LightGBM\
    \ model.\n\nThe LightGBM library team offers and maintains Dask versions of each\
    \ available learning algorithm: `DaskLGBMRegressor`, `DaskLGBMClassifier`, and\
    \ `DaskLGBMRanker`. These are wrappers around the standard LightGBM scikit-learn\
    \ interface with additional functionality to specify the Dask cluster client to\
    \ use.\n\nWhen LightGBM runs on a Dask cluster, training occurs with one LightGBM\
    \ worker per Dask worker. LightGBM concatenates all data partitions on a single\
    \ worker into a single dataset, and each LightGBM worker uses the local dataset\
    \ independently."
  merge: -1
  pgno: 231
- img_proc: true
  md: 'Each LightGBM worker then works in concert to train a single LightGBM model,
    using the Dask cluster to communicate. When data parallel training is performed
    (as is the case with Dask), LightGBM uses a **Reduce-Scatter** strategy:


    +   1. During the histogram-building phase, each worker builds histograms for
    different non-overlapping features. Then, a **Reduce-Scatter** operation is performed:
    each worker shares a part of its histogram with each other worker.

    2. After the **Reduce-Scatter**, each worker has a complete histogram for a subset
    of features and then finds the best split for these features.

    3. Finally, a gathering operation is performed: each worker shares its best split
    with all other workers, so all workers have all the best splits.


    The best feature split is chosen, and the data is partitioned accordingly.


    Fortunately, the complexity of the distributed algorithm is hidden from us, and
    the training code is identical to the scikit-learn training code we''re used to:


    ```

    dask_model = lgb.DaskLGBMClassifier(n_estimators=200, client=client)

    dask_model.fit(X_train, y_train)

    ```


    Running the preceding code trains the LightGBM model, and we can see the progress
    by checking the **Status** page of the Dask dashboard, as shown in *Figure 11.2*.


    ![](img/5c9d6611c41357518a5920ff1f360451_232_0.png)'
  merge: -1
  pgno: 232
- img_proc: true
  md: "Dask LightGBM models can be fully serialized using **Pickle** or **joblib**,\
    \ and we can save the model to disk as follows:\n\n```\npython\nwith open(\"dask-model.pkl\"\
    , \"wb\") as f:\n    pickle.dump(dask_model, f)\n```\n\nPredictions can be made\
    \ by calling the `predict` method of the model. Note that the Dask model expects\
    \ a Dask DataFrame or array:\n\n```\npython\npredictions = dask_model.predict(X_test)\n\
    ```\n\nSimilar to getting the shape of a Dask DataFrame, the prediction operation\
    \ is also delayed and only calculated when needed. We can use `compute` to get\
    \ the prediction values:\n\n```\npython\npredictions.compute()\n```\n\nThis concludes\
    \ our look at leveraging Dask for distributed training with LightGBM. With Dask,\
    \ LightGBM can train models on massive datasets well beyond the computing power\
    \ of a single server. Dask scales alongside your needs, so you can start with\
    \ your local laptop and move to a high-performance computing environment or cloud\
    \ infrastructure as your data grows. Further, as shown previously, Dask is designed\
    \ to work harmoniously with established Python libraries such as pandas, NumPy,\
    \ and scikit-learn, providing a familiar environment for data scientists while\
    \ extending the capabilities of these tools.\n\nNext, we'll look at speeding up\
    \ LightGBM training when large models need to be trained using the GPU.\n\n# GPU\
    \ training for LightGBM\n\nThe LightGBM library has native support for training\
    \ the model on a GPU [1]. Two GPU platforms are supported: GPU via OpenCL and\
    \ CUDA. Leveraging the GPU via OpenCL offers support for the broadest range of\
    \ GPUs (including AMD GPUs) and is significantly faster than running the model\
    \ on a CPU. However, the CUDA platform offers the fastest runtime if you have\
    \ an NVIDIA GPU available.\n\n# Setting up LightGBM for the GPU\n\nSetting up\
    \ your environment to use the GPU can be a bit tricky, but we'll review the core\
    \ steps here.\n\n> > **Note**\n>\n> The GPU setup steps discussed here are offered\
    \ as a guide and overview of the process of setting up your environment. The exact\
    \ version number of libraries and drivers listed here may be outdated, and it's\
    \ recommended that you review the official documentation for up-to-date versions:\
    \ https://lightgbm.readthedocs.io/en/latest/GPU-Tutorial.html."

- md: "## Zero-shot AutoML\n\n**Zero-shot AutoML** is a FLAML feature where hyperparameter\
    \ optimization is not performed. Instead, suitable hyperparameter configurations\
    \ are determined offline by analyzing the performance of an algorithm on a wide\
    \ variety of datasets. The process can be described as follows:\n\n1. Before building\
    \ a model:\n   - Train models on many datasets using AutoML\n   - Store all datasets'\
    \ hyperparameter configurations, evaluation results, and metadata as a zero-shot\
    \ solution\n2. When building a model for a new problem:\n   - Use FLAML to analyze\
    \ the new dataset against the zero-shot solution results and determine suitable\
    \ hyperparameters\n   - Train a model on the new dataset using the hyperparameters\n\
    \nThe first step is performed only once for a given model type (such as LightGBM).\
    \ Thereafter, a new model can be built for any new problem without tuning. The\
    \ solution is \"zero-shot\" because suitable parameters are used on the first\
    \ fit for a new dataset.\n\nFLAML's zero-shot AutoML approach has many advantages:\n\
    \n- As mentioned, no tuning is involved, sparing much computational effort and\
    \ time when solving a new problem\n- Since no tuning is required, a validation\
    \ dataset is not required either, and more of the data may be used for training\n\
    - Even less involvement is required by the user\n- Often, no code changes are\
    \ required, as we'll see next\n\nOf course, creating the zero-shot solution for\
    \ a model type is still arduous, requiring varied datasets and much computation\
    \ to train many models. Fortunately, FLAML provides pretrained zero-shot solutions\
    \ for many popular models, including LightGBM, XGBoost, and scikit-learn's random\
    \ forests.\n\nTo use a zero-shot solution, replace the regular LightGBM import\
    \ with the FLAML-wrapped version:\n\n```\nfrom flaml.default import LGBMRegressor\n\
    \nzs_model = LGBMRegressor()\nzs_model.fit(X, y)\n```\n\nCalling `fit` analyzes\
    \ the data in X, selects suitable parameters, and trains the model using those\
    \ parameters. Training is performed only once, and no tuning is done.\n\nThis\
    \ concludes our case study of FLAML. As we have seen, FLAML provides an intuitive\
    \ API for sophisticated model selection and tuning functionality, which could\
    \ spare much effort when working on an ML problem.\n\n## Summary\n\nIn summary,\
    \ this chapter discussed AutoML systems and their uses. Typical approaches to\
    \ automating feature engineering, model selection, and tuning were discussed.\
    \ We also mentioned the risks and caveats associated with using these systems.\n\
    \nThe chapter also introduced FLAML, a library for AutoML that provides tools\
    \ for automating the model selection and tuning process. We also presented CFO\
    \ and BlendSearch, two efficient hyperparameter optimization algorithms provided\
    \ by FLAML.\n\nThe practicalities of applying FLAML were shown in the form of\
    \ a case study. In addition to FLAML, we showcased an open source tool called\
    \ Featuretools, which provides functionality to automate feature engineering.\
    \ We showed how to develop optimized models in fixed-time budgets using FLAML.\
    \ Finally, we provided examples of using FLAML's zero-shot AutoML functionality,\
    \ which analyzes datasets against configurations for known problems to determine\
    \ suitable hyperparameters, eliminating the need for model tuning.\n\nThe next\
    \ chapter discusses building ML pipelines around LightGBM models, focusing on\
    \ exporting, packaging, and deploying LightGBM models for production.\n\n## References\n\
    \n- [1] C. Wang, Q. Wu, M. Weimer, and E. Zhu, \"FLAML: A Fast and Lightweight\
    \ AutoML Library,\" in MLSys, 2021.\n- [2] Q. Wu, C. Wang and S. Huang, Frugal\
    \ Optimization for Cost-related Hyperparameters, 2020.\n- [3] C. Wang, Q. Wu,\
    \ S. Huang, and A. Saied, \"Economical Hyperparameter Optimization With Blended\
    \ Search Strategy,\" in ICLR, 2021.\n\n# Part 3: Production-ready Machine Learning\
    \ with LightGBM\n\nIn Part 3, we will delve into the practical applications of\
    \ ML solutions in production environments. We will uncover the intricacies of\
    \ machine learning pipelines, ensuring systematic data processing and model building\
    \ for consistent results. MLOps, a confluence of DevOps and ML, takes center stage,\
    \ highlighting the importance of deploying and maintaining robust ML systems in\
    \ real-world scenarios. Through hands-on examples, we will explore the deployment\
    \ of ML pipelines on platforms (like Google Cloud, Amazon SageMaker, and the innovative\
    \ PostgresML) emphasizing the unique advantages each offers. Lastly, distributed\
    \ computing and GPU-based training will be explored, showcasing methods to expedite\
    \ training processes and manage larger datasets efficiently. This concluding part\
    \ will emphasize the seamless integration of ML into practical, production-ready\
    \ solutions, equipping readers with the knowledge to bring their models to life\
    \ in dynamic environments.\n\nThis part will include the following chapters:\n\
    \n- Chapter 8, Machine Learning Pipelines and MLOps with LightGBM\n- Chapter 9,\
    \ LightGBM MLOps with AWS SageMaker\n- Chapter 10, LightGBM Models with PostgresML\n\
    - Chapter 11, Distributed and GPU-based Learning with LightGBM\n\n# 8 Machine\
    \ Learning Pipelines and MLOps with LightGBM\n\nThis chapter shifts the focus\
    \ from data science and modeling problems to building production services for\
    \ our ML solutions. We introduce the concept of machine learning pipelines, a\
    \ systematic approach to processing data, and building models that ensure consistency\
    \ and correctness.\n\nWe also introduce the concept of MLOps, a practice that\
    \ blends DevOps and ML and addresses the need to deploy and maintain production-capable\
    \ ML systems.\n\nThe chapter includes an example of building an ML pipeline using\
    \ scikit-learn, encapsulating data processing, model building, and tuning. We\
    \ show how to wrap the pipeline in a web API, exposing a secure endpoint for prediction.\
    \ Finally, we also look at the containerization of the system and deployment to\
    \ Google Cloud.\n\nThe main topics of this chapter are as follows:\n\n- Machine\
    \ learning pipelines\n- An overview of MLOps\n- Deploying an ML pipeline for customer\
    \ churn\n\n## Technical requirements\n\nThe chapter includes examples of creating\
    \ scikit-learn pipelines, training LightGBM models, and building a FastAPI application.\
    \ The requirements for setting up your environment can be found alongside the\
    \ complete code examples at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-8.\n\
    \n## Introducing machine learning pipelines\n\nIn *Chapter 6, Solving Real-World\
    \ Data Science Problems with LightGBM*, we gave a detailed overview of the data\
    \ science life cycle, which includes various steps to train an ML model. If we\
    \ were to focus only on the steps required to train a model, given data that has\
    \ already been collected, those would be as follows:\n\n1. Data cleaning and preparation\n\
    2. Feature engineering\n3. Model training and tuning\n4. Model evaluation\n5.\
    \ Model deployment\n\nIn previous case studies, we applied these steps manually\
    \ while working through a Jupyter notebook. However, what would happen if we shifted\
    \ the context to a long-term ML project? If we had to repeat the process when\
    \ new data becomes available, we'd have to follow the same procedure to build\
    \ a model successfully.\n\nSimilarly, when we want to use the model to score new\
    \ data, we must apply the steps correctly and with the correct parameters and\
    \ configuration every time.\n\nIn a sense, these steps form a pipeline for data:\
    \ data enters the pipeline, and a deployable model results from its completion.\n\
    \nFormally, an ML pipeline is a systematic and automated process that guides the\
    \ workflow of an ML project. It involves several interconnected stages, encapsulating\
    \ the steps listed previously.\n\nAn ML pipeline aims to ensure that these tasks\
    \ are structured, reproducible, and efficient, making it easier to manage complex\
    \ ML tasks. Pipelines are particularly beneficial when working with large datasets\
    \ or when the steps to transform raw data into usable inputs for ML models are\
    \ complex and must be repeated frequently, such as in a production environment.\n\
    \nThere is some fluidity in the steps involved in a pipeline: steps may be added\
    \ or removed depending on how the pipeline is utilized. Some pipelines include\
    \ a data collection step, pulling data from various data sources or databases,\
    \ and staging the data for ML modeling.\n\nMany ML services and frameworks provide\

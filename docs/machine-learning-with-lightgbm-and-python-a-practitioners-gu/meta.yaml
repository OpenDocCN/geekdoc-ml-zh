    \ ct.fit_transform(df)\n```\n\nHere, we have a DataFrame with two columns: `price`\
    \ and `description`. A column transformer is created with two sub-transformers:\
    \ a scaling transformer and a vectorizer. The scaling transformer applies min-max\
    \ scaling only to the `price` column. The vectorizer applies TF-IDF vectorization\
    \ only to the `description` column. When `fit_transform` is called, a *single*\
    \ array is returned with a column for the scaled price and the columns representing\
    \ the word vectors.\n\n> **Note**\n> TF-IDF, or **term frequency-inverse document\
    \ frequency**, is just one way of extracting a feature from text. Analyzing and\
    \ extracting features from text, and natural language processing in general, is\
    \ a broad field within ML that we won't be delving into deeply here. You are encouraged\
    \ to read further on the topic at https://scikit-learn.org/stable/modules/feature_extraction.html#text-feature-extraction.\n\
    \nWe can set up our preprocessing for the Customer Churn dataset as a single `ColumnTransformer`.\
    \ We first define the two individual transformers, `id_transformer` and `encode_transformer`,\
    \ that apply to the ID columns and the categorical features:\n\n```python\nid_transformer\
    \ = (\n    \"customer_id\",\n    CustomerIdTransformer(id_columns),\n    id_columns\n\
    )\nencode_transformer = (\n    \"encoder\",\n    OneHotEncoder(sparse_output=False),\n\
    \    categorical_features\n)\n```\n\nAnd then combine the separate transformers\
    \ into `ColumnTransformer`:\n\n```python\npreprocessor = ColumnTransformer(\n\
    \    transformers=[\n        id_transformer,\n        encode_transformer,\n  \
    \  ],\n    remainder='passthrough'\n)\n```\n\n`ColumnTransformer` is defined with\
    \ the `remainder='passthrough'` parameter. The `remainder` parameter specifies\
    \ what happens to the columns that `ColumnTransformer` does not transform. These\
    \ columns are dropped by default, but we would like to pass them through, untouched,\
    \ to include them in the dataset.\n\nThe encoding transformer creates and applies\
    \ `OneHotEncoder` to the categorical features.\n\nFor illustrative purposes, we\
    \ have created a custom transformer class to maintain the list of ID columns and\
    \ drop them from the data during transformation.\n\nThe class is shown here:\n\
    \n```python\nclass CustomerIdTransformer(BaseEstimator, TransformerMixin):\n \
    \   def __init__(self, id_columns):\n        self.id_columns = id_columns\n\n\
    \    def fit(self, X, y=None):\n        return self\n\n    def transform(self,\

  md: "Removing the missing values would discard a significant portion of our dataset.\
    \ Here, we decide to replace missing values using descriptive statistics to retain\
    \ as much data as possible.\n\nFirst, we mark the -99.0 and -999.0 values as missing:\n\
    \n```\ndf.loc[frame[f] == -99.0, f] = np.nan\ndf.loc[frame[f] == 99.0, f] = np.nan\n\
    df.loc[frame[f] == -999.0, f] = np.nan\ndf.loc[frame[f] == 999.0, f] = np.nan\n\
    ```\n\nWe then replace missing numerical values with the mean and categorical\
    \ values with the mode:\n\n```\nif f in numerical_columns:\n    frame[f].fillna(frame[f].mean(),\
    \ inplace=True)\nelse:\n    frame[f].fillna(frame[f].mode()[0], inplace=True)\n\
    ```\n\nUsually, we would have to be careful when using the mean since the mean\
    \ is affected by outliers. However, since we have already marked the outlier values\
    \ as np.nan, they are excluded when calculating the mean. An additional caveat\
    \ comes into play when replacing missing values in the test set: since the test\
    \ set should be treated as unseen data, we must use the mean from the training\

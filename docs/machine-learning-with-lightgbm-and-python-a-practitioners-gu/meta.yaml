    \n## 训练TabTransformer模型\n\n在没有类别特征的情况下，TabTransformer架构可以显著简化。让我们看看*图4.2*所示的架构。我们可以看到，嵌入层和注意力层不再需要。实际上，*该模型简化为一个常规的MLP*（由于注意力层完全未被使用，仍称该模型为Transformer是不恰当的）。\n\
    \n除了移除不需要的层之外，其余的架构和过程与人口普查收入问题保持一致。我们再次使用AdamW作为优化器，并对模型的超参数和隐藏层数量进行网格搜索优化。与梯度提升模型一样，我们执行五折交叉验证来衡量性能。\n\
    \n## 结果\n\n尽管准确率也将在下文报告，但必须注意，在不平衡数据中，它不是一个好的性能指标。在该数据集中，99.82%的样本属于同一类别，一个只预测该类别的模型将达到99.82%的准确率，但这完全毫无意义。F1分数不受类别不平衡的影响，仍然是衡量不平衡数据集分类性能的良好指标。下表显示了三种算法在五折交叉验证下的结果。\n\
    \n| 模型 | 训练时间 | 准确率 | F1分数 |\n|---|---|---|---|\n| LightGBM GBDT | 113秒 | 99.88%\
    \ | 0.80 |\n| XGBoost GBDT | 351秒 | 98.41% | 0.82 |\n| TabTransformer | 528.59秒\
    \ | 93.37% | 0.05 |\n\n表4.4 – 在信用卡欺诈数据集上训练三个模型的结果。训练时间包括五折交叉验证\n\nXGBoost和LightGBM在该数据集上的表现非常相似，分别获得了0.82和0.80的F1分数。深度神经网络在该问题上表现显著不佳，即使使用类别权重来补偿不平衡数据集，其F1分数也仅为0.05。\n\
    \n调试深度神经网络的性能问题出了名的棘手。由于构建和训练DNN模型的复杂性和不透明性，微小的改变都可能产生重大影响。\n\n性能不佳的可能原因包括：\n\n\

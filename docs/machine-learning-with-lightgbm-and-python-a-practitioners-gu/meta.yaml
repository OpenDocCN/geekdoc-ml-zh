  - "[PAGE 207]\n\nAn endpoint in SageMaker is a scalable and secure RESTful API that\
    \ you can use to send real-time inference requests to your models. Your applications\
    \ can access an endpoint to make predictions directly via the REST API or AWS\
    \ SDKs. It can scale instances up and down as needed, providing flexibility and\
    \ cost-effectiveness.\n\nSageMaker also supports multi-model endpoints, which\
    \ can deploy multiple models on a single endpoint. This feature can significantly\
    \ save on costs if many models are used infrequently or are not resource-intensive.\n\
    \nWith the Lambda script defined, it can be incorporated into the pipeline using\
    \ `LambdaStep`:\n\n```\nlambda_deploy_step = LambdaStep(\n    name=\"LambdaStepRealTimeDeploy\"\
    ,\n    lambda_func=func,\n    inputs={\n        \"model_name\": pipeline_model_name,\n\
    \        \"endpoint_config_name\": endpoint_config_name,\n        \"endpoint_name\"\
    : endpoint_name,\n        \"model_package_arn\": register_step.steps[0].properties.ModelPackageArn,\n\
    \        \"role\": sagemaker_role,\n        \"instance_type\": deploy_instance_type_param,\n\
    \        \"instance_count\": deploy_instance_count_param\n    }\n)\n```\n\n> **Note**\n\
    A model endpoint incurs cost as soon as it's deployed for the duration of its\

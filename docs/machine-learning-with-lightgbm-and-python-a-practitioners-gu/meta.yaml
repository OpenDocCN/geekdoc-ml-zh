    The next step is straightforward: we build a regression tree to predict the residuals.
    We do not use the predictions of the regression tree directly. Instead, we use
    the *terminal regions* to calculate our updated prediction. The terminal regions
    refer to the tree’s leaf nodes.


    For this example, we assume the following simple regression tree is built:


    ![](img/5c9d6611c41357518a5920ff1f360451_56_0.png)


    Figure 2.4 – Regression tree predicting the residuals


    With our regression tree built and our leaf nodes defined, we can proceed with
    the next step. We need to compute $\gamma_{jm}$ that minimizes our loss function,
    taking into account the previous predictions as per $\gamma_{jm} = \text{argmin}_{\gamma}
    \sum_{x_i \in R_{jm}} L(y_i, F_{m-1}(x_i) + \gamma)$. This is almost precisely
    what we did in *step 1*, where we showed that the equation simplifies taking the
    average of the predicted values due to our choice of the loss function. *Here,
    that means taking the average of the residuals in each leaf node.* Therefore,
    we have $\gamma_{1,1} = \frac{-35-12}{2} = -23.5$ and $\gamma_{2,1} = \frac{45}{1}

    As we can see, the class extends `BaseEstimator` and `TransformerMixin` from the\
    \ scikit-learn base classes and must implement `fit` and `transform`. Implementing\
    \ these methods also makes it suitable as a transformer in a pipeline. Implementing\
    \ `fit` is optional if required; in our case, nothing is done during `fit`. Our\
    \ transformation step drops the relevant columns.\n\n> **Note**\n> It's important\
    \ to encapsulate the functionality to drop irrelevant columns (in this case, the\
    \ ID column) within the pipeline itself. When deploying the pipeline for production\
    \ use, we expect these columns to be passed to the pipeline when making a prediction.\
    \ Removing them as part of the pipeline simplifies our pipeline's usage for our\
    \ model's consumers and reduces the chance of user mistakes.\n\nThis completes\
    \ the transformations required for preprocessing, and we are ready to move on\
    \ to the following steps: fitting and tuning the models.\n\n## Pipeline modeling\

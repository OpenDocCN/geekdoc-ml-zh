    Running this statement reads the CSV file and adds the data to our table.


    > **Note**

    If you run PostgresML in a Docker container (which is recommended to get started),
    the CSV file must first be copied to the container runtime. This can be done with
    the following command (substituting your own container name):


    docker cp telco/telco-churn.csv postgresml-postgres-1:/tmp/telco-churn.csv.


    With the data loaded, we can perform our preprocessing. We perform this in three
    steps: cleaning data directly in the table, creating a table view that coerces
    the data to appropriate types, and using PostgresML''s preprocessing functionality:


    ```

    UPDATE pgml.telco_churn

    SET totalcharges = NULL

    WHERE totalcharges = '' '';

    ```


    We must replace the empty text values in total charges with NULL, allowing PostgresML
    to impute the values later:


    ```

    CREATE VIEW pgml.telco_churn_data AS

    SELECT gender,

    seniorcitizen,

    CAST(CASE partner

    WHEN ''Yes'' THEN true

    WHEN ''No'' THEN false

    END AS BOOLEAN) AS partner,

    ...

    CAST(monthlycharges AS REAL),

    CAST(totalcharges AS REAL),

    CAST(CASE churn

    WHEN ''Yes'' THEN true

    WHEN ''No'' THEN false

    END AS BOOLEAN) AS churn

    FROM pgml.telco_churn;

    ```'

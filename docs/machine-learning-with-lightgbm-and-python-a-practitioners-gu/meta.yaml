  - '[PAGE 157]


    The methods for automating feature engineering are often similar: many possible
    transformations are applied to all existing features, and the usefulness of the
    generated features is tested after modeling. Examples of how transformations generate
    features can be found in the following case study.


    Another method for automating feature engineering is extracting features using
    rules based on the data type of the features. For example, the day, week, month,
    and year could be extracted from a date field. Or the number of characters, lemmas,
    stems, or embeddings of word or sentence features could be calculated.


    As you may notice, the application of feature engineering automation techniques
    relies on technical information about the features at hand, typically the data
    type, alongside correlation and relationships with other features. Importantly,
    there is no domain knowledge applied when creating new features. This highlights
    one of the shortcomings of AutoML: it cannot handle specific, domain-driven decisions
    that require human expertise. For example, consider a diabetes dataset with a
    feature for fasting blood sugar. A medical professional (domain expert) knows
    that an individual with a fasting blood sugar of 100 to 125 mg/dL is considered
    prediabetic, and any higher is considered diabetic. This continuous feature can
    be engineered to specific classes: normal, prediabetic, and diabetic, simplifying
    the data for modeling. A transformation like this is not possible to achieve with
    AutoML systems.


    # Automating model selection and tuning


    Areas where AutoML is particularly useful are model selection and hyperparameter
    tuning. Given the plethora of algorithms available, choosing the best one for
    a particular dataset and problem can be daunting. AutoML systems use various techniques,
    including Bayesian optimization and meta-learning, to select the best model. They
    also automate the tuning of hyperparameters to maximize model performance.


    AutoML systems can provide automated cross-validation, reducing the risk of overfitting
    and ensuring the model''s generalizability to unseen data. Once the optimal model
    is selected and trained, many AutoML tools can also help with deployment, making
    the model available for inference on new data.


    Beyond the initial model deployment, some AutoML solutions also provide value
    in ongoing model monitoring and maintenance. As real-world data evolves, models
    may suffer from drift, and their performance can degrade. AutoML can help monitor
    model performance and retrain the model as needed, ensuring that your ML system
    remains effective in the long run.


    # Risks of using AutoML systems


    As mentioned previously, AutoML systems typically use no domain knowledge to aid
    in feature engineering, model selection, or other automation. Instead, a brute-force
    or scattershot approach of try and see is used.


    The “black box” nature of some AutoML systems can also make it challenging to
    interpret decisions made by the system, making it less suitable for applications
    that require high levels of explainability.'
  - '[PAGE 158]


    Therefore, it''s still essential to have a data scientist or domain expert in
    the loop, working alongside the AutoML system, to identify and act on opportunities
    where domain knowledge can lead to better models. However, AutoML systems sometimes
    hinder the data scientist instead of enabling them by creating one extra layer
    between the scientist and the data.


    We''ve already seen one AutoML framework in action. Optuna, which we discussed
    in *Chapter 5, LightGBM Parameter Optimization with Optuna*, is an example of
    an AutoML framework focusing on hyperparameter tuning. In the next section, we
    discuss another AutoML framework: FLAML.


    # Introducing FLAML


    **FLAML (Fast and Lightweight AutoML)** is a Python library developed by Microsoft
    Research [1]. It is designed to produce high-quality ML models with low computational
    cost automatically. The primary aim of FLAML is to minimize the resources required
    to tune hyperparameters and identify optimal ML models, making AutoML more accessible
    and cost-effective, particularly for users with budget constraints.


    FLAML offers several key features that set it apart. One of these is its efficiency.
    It provides a fast and lightweight solution for ML tasks, minimizing the time
    and computational resources needed. It achieves this without compromising the
    quality of the models it produces. FLAML also emphasizes its versatility across
    various ML algorithms and various application domains.


    The core of FLAML''s efficiency lies in its novel, cost-effective search algorithms.
    These algorithms intelligently explore the hyperparameter space, initially focusing
    on “cheap” configurations. It gradually explores more “expensive” configurations
    as it gains more insights into the search space. This ensures a balanced exploration
    and exploitation, delivering optimized models within user-specified time and resource
    budgets.


    FLAML also excels at the model selection process. It supports various ML algorithms,
    including XGBoost, LightGBM, CatBoost, RandomForest, and various linear models.
    The library can automatically choose the best algorithm for a given dataset and
    optimize its hyperparameters, providing users with an optimal model without extensive
    manual intervention.


    FLAML provides a straightforward, intuitive API that integrates seamlessly with
    existing Python-based data science and ML workflows. Users specify the dataset,
    a time budget (in seconds), and the optimization task, and FLAML handles the rest.
    This user-friendliness and efficiency make it a practical choice for ML beginners
    and seasoned practitioners looking to expedite their workflows.


    The novelty behind FLAML''s efficiency comes from its **hyperparameter optimization
    (HPO)** algorithms. FLAML provides two HPO algorithms: **Cost Frugal Optimization**
    and **BlendSearch**.


    # Cost Frugal Optimization


    **Cost Frugal Optimization (CFO)** is a local search method that leverages random
    direct search to explore the hyperparameter space [2]. The CFO algorithm starts
    with a low-cost hyperparameter'
  - '[PAGE 159]


    configuration (for LightGBM, a low-cost configuration would, for instance, have
    few boosted trees). It takes randomized steps for a fixed number of iterations
    in the hyperparameter space toward higher cost parameter regions.


    The CFO step size is adaptive, meaning the algorithm lowers the step size if there
    is no improvement for several iterations. Doing so means large step sizes aren''t
    taken in unpromising directions with high cost.


    CFO also utilizes random restarts. As a local search algorithm, CFO can get stuck
    in local optima. If no progress is made and the step size is already small, the
    algorithm restarts at a random point.


    In summary, CFO quickly (with large step sizes) attempts to reach more promising
    regions in the search space, using as little of the optimization budget as possible
    (by starting in low-cost regions). CFO continues the search while the optimization
    budget allows, restarting in random areas if stagnation occurs. FLAML allows the
    user to set the optimization budget in seconds.


    # BlendSearch


    FLAML provides an alternative to the CFO algorithm in BlendSearch. BlendSearch
    differs from CFO by running both a global and local search process using a multithreaded
    approach [3].


    Similar to CFO, BlendSearch starts with a low-cost configuration and proceeds
    with a local search. However, unlike CFO, BlendSearch does not wait for the local
    search to stagnate before exploring new regions. Instead, a global search algorithm
    (such as Bayesian optimization) continually suggests new starting points. Starting
    points are filtered based on their distance to existing points and prioritized
    in terms of cost.


    Each iteration of BlendSearch then chooses whether to continue a local search
    or start at a new global search point based on the performance in the previous
    iteration. Like CFO, configurations proposed by the global search method are validated
    for viability.


    As BlendSearch uses global optimization, BlendSearch is less prone to getting
    stuck in local minima. BlendSearch is recommended over CFO if the hyperparameter
    search space is highly complex. It''s often a good idea to try CFO first and only
    switch to BlendSearch if CFO is struggling.


    # FLAML limitations


    Despite its advantages, FLAML also has its limitations. The library''s automated
    processes may not consistently outperform manual tuning by experts, particularly
    for complex, domain-specific tasks. Also, as with other AutoML solutions, the
    interpretability of the produced models can be challenging, especially when dealing
    with models such as boosted trees or neural networks.


    FLAML only performs the model selection and tuning part of the ML process. These
    are some of the most time-consuming parts of model development, but FLAML does
    not provide the functionality to perform feature engineering or data preparation.'
- md: "## Case study – using FLAML with LightGBM\n\nWe will use the Wind Turbine dataset\
    \ from the previous chapter for the case study. The dataset is cleaned as before,\
    \ imputing missing values and capping outliers to appropriate ranges. However,\
    \ we take a different approach to feature engineering. To further explore AutoML,\
    \ we use an open source framework called Featuretools.\n\n## Feature engineering\n\
    \n**Featuretools** (https://featuretools.alteryx.com/en/stable/#) is an open source\
    \ framework for automated feature engineering. Specifically, Featuretools is well\
    \ suited to transforming relational datasets and temporal data.\n\nAs discussed\
    \ in the previous section, automated feature engineering tools typically use combinatorial\
    \ transformations of features to generate new features for the dataset. Featuretools\
    \ supports feature transformations through their **Deep Feature Synthesis (DFS)**\
    \ process.\n\nAs an example, consider a dataset of online customer web sessions.\
    \ Typical features that could be useful in such a dataset are the total sessions\
    \ a customer visited the site for, or the month a customer signed up. Using Featuretools\
    \ and DFS, this can be achieved using the following code (courtesy of https://featuretools.alteryx.com/):\n\
    \n```\nfeature_matrix, feature_defs = ft.dfs(\n    entityset=es,\n    target_dataframe_name=\"\
    customers\",\n    agg_primitives=[\"count\"],\n    trans_primitives=[\"month\"\
    ],\n    max_depth=1,\n)\nfeature_matrix\n```\n\nTwo transformations are being\
    \ applied here: a transformation for “month” and an aggregation for “count”. With\
    \ these transformations, the month would be automatically extracted from any dates\
    \ present for a customer (such as the join date), and the count aggregations would\
    \ be calculated for each customer (such as the number of sessions or transactions).\
    \ Featuretools has a rich set of transformations and aggregations available. A\
    \ complete list is available at https://featuretools.alteryx.com/en/stable/api_reference.html.\n\
    \nLet's see how we can use Featuretools to engineer the features for the Wind\
    \ Turbine dataset.\n\n## Using Featuretools with the Wind Turbine dataset\n\n\
    We must perform two feature engineering tasks for our dataset: engineer features\
    \ for the datetime field and encode categorical features. To get started, we create\
    \ an EntitySet for our data:\n\n```\nes = ft.EntitySet(id=\"wind-turbine\")\n\
    es = es.add_dataframe(\n    dataframe_name=\"wind-turbine\",\n    dataframe=df,\n\
    \    index=\"tracking_id\"\n)\n```\n\nEntitySet tells the Featuretools framework\
    \ the entities and relationships we work with within the data. Customer is an\
    \ example of an entity in the earlier example; for this case, it's Wind Turbines.\
    \ We then pass the data frame and the column to be used as an index.\n\nWe then\
    \ apply dfs and encode_features to engineer the features for our dataset:\n\n\
    ```\nfeature_matrix, feature_defs = ft.dfs(\n    entityset=es, target_dataframe_name=\"\
    wind-turbine\",\n    trans_primitives=[\"day\", \"year\", \"month\", \"weekday\"\
    ],\n    max_depth=1)\nfeature_matrix_enc, features_enc = ft.encode_features(\n\
    \    feature_matrix, feature_defs)\n```\n\nThe preceding code extracts the day,\
    \ year, month, and weekday for each of our wind turbine measurements. The feature\
    \ encoding then automatically one-hot encodes the categorical features for our\
    \ dataset, including the new datefields.\n\nThe following is an excerpt from the\
    \ dataset column list showing some of the columns created by Featuretools:\n\n\
    ```\n...\n'cloud_level = Low',\n'cloud_level = Medium',\n'cloud_level = Extremely\
    \ Low',\n'cloud_level is unknown',\n'MONTH(datetime) = 1',\n'MONTH(datetime) =\
    \ 2',\n...\n'MONTH(datetime) = 8',\n'MONTH(datetime) = 9',\n'MONTH(datetime) =\
    \ 11',\n'MONTH(datetime) is unknown',\n...\n'YEAR(datetime) = 2019',\n'YEAR(datetime)\
    \ = 2018',\n'YEAR(datetime) is unknown'\n```\n\nNote the one-hot encoding of categorical\
    \ features: each value is now split into a separate column. This includes columns\
    \ for unknown values (for example, YEAR(datetime) is unknown), which illustrates\
    \ another way of dealing with missing values in categorical features. Instead\
    \ of imputing a value by using something such as the mode, we have a column that\
    \ signals to the model (true or false) that the value is missing.\n\nThe automated\
    \ feature engineering has increased our column count from 22 columns to 66 columns.\
    \ This illustrates another general caveat with automated feature engineering and\
    \ AutoML: automation may lead to overcomplicated datasets. In *Chapter 6, Solving\
    \ Real-World Data Science Problems with LightGBM*, we could encode features selectively\
    \ based on our understanding of the learning algorithm. LightGBM can automatically\
    \ handle categorical features; therefore, one-hot encoding is superfluous if LightGBM\
    \ is the only learning algorithm used.\n\nAdditionally, the datefields could be\
    \ handled numerically. By applying our knowledge of the problem and algorithm,\
    \ we can reduce the dimensionality of the learning problem, thereby simplifying\
    \ it. The ease of use of automated systems has to be balanced with the manual\
    \ effort of expert feature engineering, which could save time later on.\n\nThe\
    \ dataset is now ready for model development; we've completed the feature engineering\
    \ for our dataset using only two lines of code.\n\n## FLAML AutoML\n\nWe will\
    \ now look at model selection and tuning. We will use FLAML to compare five different\
    \ models: LightGBM, RandomForest, XGBoost, ExtraTrees, and a limited-depth version\
    \ of XGBoost. We would also like to find optimal parameters for the best model.\
    \ This entire process is possible in two lines of code with FLAML:\n\n```\nautoml\
    \ = flaml.AutoML()\nautoml.fit(X, y, task=\"regression\", time_budget=60)\n```\n\
    \nThe preceding code fits an optimal regression model within a time budget of\
    \ 60 seconds. FLAML automatically uses a holdout set to calculate validation results\
    \ and then proceeds with optimization, using CFO as the tuner by default.\n\n\
    The AutoML class provides “task-oriented AutoML.” The user sets the learning task,\
    \ and FLAML does the rest. Among others, the following tasks are supported: classification,\
    \ regression, time-series forecasting and time-series classification, ranking,\
    \ and NLP-related tasks such as summarization and word token classification.\n\
    \nThe call to `fit` is customizable. For example, we could customize it as follows:\n\
    \n```\nautoml = flaml.AutoML()\ncustom_hp = {\n    \"learning_rate\": {\n    \
    \    \"domain\": flaml.tune.loguniform(0.0001, 0.05)\n    }\n}\nautoml.fit(X,\
    \ y, task=\"regression\", time_budget=120,\n          metric=\"mse\",\n      \
    \    estimator_list=['lgbm', 'xgboost', 'rf'],\n          custom_hp={\n      \
    \        \"lgbm\": custom_hp\n          },\n          hpo_method=\"bs\")\n```\n\
    \nHere, we customize the hyperparameter search space by explicitly declaring the\
    \ learning rate as a log-scaled uniform variable within a range. Other options\
    \ for setting the search space for parameters are uniform sampling, random integer\
    \ sampling, and choice-based sampling for categorical parameters.\n\nFurthermore,\
    \ we set the estimator list to focus on only three modeling algorithms: LightGBM,\
    \ Random Forest, and XGBoost. Lastly, we can customize the HPO algorithm, and\
    \ here, we set it to BlendSearch, which uses the multithreaded optimization approach\
    \ discussed earlier.\n\nA complete list of customizations is available at https://microsoft.github.io/FLAML/docs/reference/automl/automl/#automl-objects.\n\
    \nOnce `fit` has been called, we can use the AutoML-trained model as we would\
    \ any other. FLAML provides a scikit-learn-style API for prediction and probability-based\
    \ prediction (for classification problems).\n\nThe following code creates predictions\
    \ from the given data and calculates metrics and feature importance:\n\n```\n\
    y_pred = automl.predict(X)\nprint(f\"r2: {1 - sklearn_metric_loss_score('r2',\n\
    \    y_pred, y)}\")\nprint(f\"MSE: {sklearn_metric_loss_score('mse',\n    y_pred,\
    \ y)}\")\n\nr2: 0.9878605489721696\nMSE: 0.08090827806554425\n```\n\nWe can also\
    \ get the best hyperparameter configuration for the winning model and for each\
    \ of the models trialed by calling the following:\n\n```\nprint(automl.best_config)\n\
    print(automl.best_config_per_estimator)\nprint(automl.time_to_find_best_model)\n\
    ```"
  mdcn: "## 案例研究——使用 FLAML 与 LightGBM\n\n我们将使用上一章的风力涡轮机数据集进行案例研究。数据集的处理方式与之前相同，包括填补缺失值和将异常值限制在适当范围内。然而，我们在特征工程方面采取了不同的方法。为了进一步探索\
    \ AutoML，我们使用了一个名为 Featuretools 的开源框架。\n\n## 特征工程\n\n**Featuretools** (https://featuretools.alteryx.com/en/stable/#)\
    \ 是一个用于自动化特征工程的开源框架。具体来说，Featuretools 非常适合处理关系型数据集和时序数据。\n\n如前一节所述，自动化特征工程工具通常使用特征的组合变换来为数据集生成新特征。Featuretools\
    \ 通过其 **深度特征合成 (DFS)** 过程支持特征变换。\n\n例如，考虑一个在线客户网络会话的数据集。在此类数据集中可能有用的典型特征包括客户访问网站的总会话数，或客户注册的月份。使用\
    \ Featuretools 和 DFS，可以通过以下代码实现（由 https://featuretools.alteryx.com/ 提供）：\n\n```\n\
    feature_matrix, feature_defs = ft.dfs(\n    entityset=es,\n    target_dataframe_name=\"\
    customers\",\n    agg_primitives=[\"count\"],\n    trans_primitives=[\"month\"\
    ],\n    max_depth=1,\n)\nfeature_matrix\n```\n\n这里应用了两种变换：一种是“月份”变换，另一种是“计数”聚合。通过这些变换，将自动从客户存在的任何日期（例如加入日期）中提取月份，并为每个客户计算计数聚合（例如会话数或交易数）。Featuretools\
    \ 提供了丰富的变换和聚合功能。完整列表可在 https://featuretools.alteryx.com/en/stable/api_reference.html\
    \ 查看。\n\n让我们看看如何使用 Featuretools 为风力涡轮机数据集进行特征工程。\n\n## 将 Featuretools 与风力涡轮机数据集结合使用\n\
    \n我们必须为数据集执行两项特征工程任务：为日期时间字段设计特征并对分类特征进行编码。首先，我们为数据创建一个 EntitySet：\n\n```\nes\
    \ = ft.EntitySet(id=\"wind-turbine\")\nes = es.add_dataframe(\n    dataframe_name=\"\
    wind-turbine\",\n    dataframe=df,\n    index=\"tracking_id\"\n)\n```\n\nEntitySet\
    \ 告诉 Featuretools 框架我们在数据中处理的实体和关系。在前面的例子中，Customer 是一个实体的例子；对于本例，它是 Wind Turbines。然后我们传递数据框和要用作索引的列。\n\
    \n然后我们应用 dfs 和 encode_features 来为数据集设计特征：\n\n```\nfeature_matrix, feature_defs\
    \ = ft.dfs(\n    entityset=es, target_dataframe_name=\"wind-turbine\",\n    trans_primitives=[\"\
    day\", \"year\", \"month\", \"weekday\"],\n    max_depth=1)\nfeature_matrix_enc,\
    \ features_enc = ft.encode_features(\n    feature_matrix, feature_defs)\n```\n\
    \n前面的代码提取了每个风力涡轮机测量值的日期、年份、月份和星期几。然后，特征编码自动对数据集中的分类特征进行独热编码，包括新的日期字段。\n\n以下是数据集列列表的摘录，显示了由\
    \ Featuretools 创建的一些列：\n\n```\n...\n'cloud_level = Low',\n'cloud_level = Medium',\n\
    'cloud_level = Extremely Low',\n'cloud_level is unknown',\n'MONTH(datetime) =\
    \ 1',\n'MONTH(datetime) = 2',\n...\n'MONTH(datetime) = 8',\n'MONTH(datetime) =\
    \ 9',\n'MONTH(datetime) = 11',\n'MONTH(datetime) is unknown',\n...\n'YEAR(datetime)\
    \ = 2019',\n'YEAR(datetime) = 2018',\n'YEAR(datetime) is unknown'\n```\n\n注意分类特征的独热编码：每个值现在被拆分为单独的列。这包括未知值的列（例如，YEAR(datetime)\
    \ is unknown），这说明了处理分类特征中缺失值的另一种方式。我们不是使用众数等方法来填补一个值，而是有一个列向模型（真或假）发出信号，表明该值缺失。\n\
    \n自动化特征工程将我们的列数从 22 列增加到 66 列。这说明了自动化特征工程和 AutoML 的另一个普遍注意事项：自动化可能导致数据集过于复杂。在\
    \ *第 6 章，使用 LightGBM 解决现实世界的数据科学问题* 中，我们可以根据对学习算法的理解来选择性地编码特征。LightGBM 可以自动处理分类特征；因此，如果\
    \ LightGBM 是唯一使用的学习算法，独热编码就是多余的。\n\n此外，日期字段可以以数值方式处理。通过运用我们对问题和算法的知识，我们可以降低学习问题的维度，从而简化它。自动化系统的易用性必须与专家特征工程的手动工作相平衡，后者可以节省后续时间。\n\
    \n数据集现在已准备好进行模型开发；我们仅用两行代码就完成了数据集的特征工程。\n\n## FLAML AutoML\n\n我们现在将研究模型选择和调优。我们将使用\
    \ FLAML 来比较五种不同的模型：LightGBM、RandomForest、XGBoost、ExtraTrees 和一个有限深度版本的 XGBoost。我们还想为最佳模型找到最优参数。使用\
    \ FLAML，整个过程只需两行代码即可完成：\n\n```\nautoml = flaml.AutoML()\nautoml.fit(X, y, task=\"\
    regression\", time_budget=60)\n```\n\n前面的代码在 60 秒的时间预算内拟合了一个最优的回归模型。FLAML 自动使用一个保留集来计算验证结果，然后使用\
    \ CFO 作为默认调优器进行优化。\n\nAutoML 类提供“面向任务的 AutoML”。用户设置学习任务，FLAML 负责其余部分。支持的任务包括：分类、回归、时间序列预测和时间序列分类、排序以及与\
    \ NLP 相关的任务，如摘要和词元分类。\n\n`fit` 调用是可定制的。例如，我们可以如下自定义：\n\n```\nautoml = flaml.AutoML()\n\
    custom_hp = {\n    \"learning_rate\": {\n        \"domain\": flaml.tune.loguniform(0.0001,\
    \ 0.05)\n    }\n}\nautoml.fit(X, y, task=\"regression\", time_budget=120,\n  \
    \        metric=\"mse\",\n          estimator_list=['lgbm', 'xgboost', 'rf'],\n\
    \          custom_hp={\n              \"lgbm\": custom_hp\n          },\n    \
    \      hpo_method=\"bs\")\n```\n\n在这里，我们通过显式声明学习率作为对数尺度的均匀变量来定制超参数搜索空间。设置参数搜索空间的其他选项包括均匀采样、随机整数采样和基于选择的分类参数采样。\n\
    \n此外，我们将估计器列表设置为仅关注三种建模算法：LightGBM、随机森林和 XGBoost。最后，我们可以自定义 HPO 算法，这里我们将其设置为 BlendSearch，它使用前面讨论的多线程优化方法。\n\
    \n完整的自定义列表可在 https://microsoft.github.io/FLAML/docs/reference/automl/automl/#automl-objects\
    \ 查看。\n\n一旦调用了 `fit`，我们就可以像使用任何其他模型一样使用 AutoML 训练的模型。FLAML 提供了 scikit-learn 风格的\
    \ API 用于预测和基于概率的预测（用于分类问题）。\n\n以下代码从给定数据创建预测并计算指标和特征重要性：\n\n```\ny_pred = automl.predict(X)\n\
    print(f\"r2: {1 - sklearn_metric_loss_score('r2',\n    y_pred, y)}\")\nprint(f\"\
    MSE: {sklearn_metric_loss_score('mse',\n    y_pred, y)}\")\n\nr2: 0.9878605489721696\n\
    MSE: 0.08090827806554425\n```\n\n我们还可以通过调用以下命令获取获胜模型以及每个试验模型的最佳超参数配置：\n\n```\n\
    print(automl.best_config)\nprint(automl.best_config_per_estimator)\nprint(automl.time_to_find_best_model)\n\
    ```"

    \n最后，我们可以使用以下代码检查重复数据：\n\n```\ntrain_df[train_df.duplicated()]\n```\n\n没有返回任何行，表明数据集中没有重复项。\n\
    \n## 数据清洗\n\n我们已识别出数据集中需要在*数据清洗*步骤中解决的多个问题：\n\n- **异常值**：许多特征存在异常值，这些值扭曲了特征的值分布。\n\
    - **测量错误**：某些特征的值超出了物理上不可能的范围（长度小于0或温度在不可能的范围内）。\n- **缺失值**：许多特征存在缺失值。还有一些特定值（-99.0和-999.0）我们也视为缺失。\n\
    \n我们首先处理异常值和测量错误，因为这会影响我们处理缺失值的方式。\n\n## 处理异常值\n\n处理数据集中的异常值包括两个部分：准确识别异常值和选择合适的替换值。识别异常值的方法如下：\n\
    \n- **可视化**：如前所述，可以使用直方图或其他可视化数据分布的图表（如箱线图或散点图）。\n- **领域知识**：就像我们识别测量错误一样，可以利用领域知识来判断值是否异常。\n\
    - **统计分析**：两种常用的使用统计方法确定值是否异常的方法是**四分位距（IQR）**和标准差。\n\nIQR是第25百分位数和第75百分位数之间的差值。超过IQR的1.5倍且远离第25或第75百分位数的值被视为异常值。\n\
    \n或者，我们可以利用标准差：我们计算数据集的均值和标准差。任何超过均值两倍或三倍标准差的值都是异常值。将边界设置为两倍或三倍标准差取决于底层数据。使用两倍标准差可能导致许多误报，但如果大量数据集中在均值周围，这是合适的。使用三倍标准差更为保守，只将非常远离均值的值标记为异常值。\n\
    \n当检测到异常值时，我们必须采取措施处理它们。通常，我们的选择如下：\n\n- **移除**：如果异常值是由于数据录入、测量或收集错误造成的，将其从数据集中移除可能是合理的。但是，这应该谨慎进行，因为移除太多数据点可能导致信息丢失和结果偏差。移除我们数据集中带有异常值的实例将导致接近70%的数据损失，这不是一个可行的选项。\n\
    - **插补**：类似于缺失值，用更具代表性的值替换异常值，例如变量的均值、中位数或众数，或使用更复杂的插补方法，如**k近邻**或**基于回归的插补**。"

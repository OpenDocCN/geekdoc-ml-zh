    \n图 6.6 – 发电量（y轴）按月份（x轴）的散点图\n\n图 6.6显示，四月至九月与发电量显著下降相关。我们可以得出结论，风力涡轮机所在位置在这几个月份风力不足，需要其他来源来补充发电量的不足。通过分解我们的日期特征，我们使学习算法能够利用这种相关性。\n\
    \n探索性数据分析（EDA）没有明确的最终目标。对于大型、复杂的数据集，分析可以越来越深入地挖掘数据，几乎可以无限期地迭代探索更多的方面和细微差别。然而，有两个用于判断数据是否已被充分探索的合理性检查如下：\n\

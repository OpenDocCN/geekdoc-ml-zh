  md: "The dashboard shows the metrics for our model and the best-performing hyperparameters.\
    \ Our model achieved an F1 score of 0.6367 and an accuracy of 0.8239.\n\nThe same\
    \ information can also be retrieved with the following SQL query should the dashboard\
    \ be unavailable:\n\n```\nSELECT metrics, hyperparams\nFROM pgml.models m\nLEFT\
    \ OUTER JOIN pgml.projects p on p.id = m.project_id\nWHERE p.name = 'Telco Churn';\n\
    ```\n\nOur model is automatically deployed when trained and is ready to make predictions.\n\
    \n# Predictions\n\nWe can make predictions manually using a composite type as\
    \ the feature data. This can be done as follows:\n\n```\nSELECT pgml.predict(\n\
    \    'Telco Churn',\n    ROW (\n        CAST('Male' AS VARCHAR(30)),\n       \
    \ 1,\n        ...\n        CAST('Electronic check' AS VARCHAR(30)),\n        CAST(20.25\
    \ AS REAL),\n        CAST(4107.25 AS REAL)\n    )\n) AS prediction;\n```\n\nWe\
    \ use the PostgreSQL ROW expression to set up the data, casting literals to the\

    Figure 9.2 – SageMaker ML pipeline for Census Income classification


    Our approach is to create the entire pipeline using a Jupyter Notebook running
    in SageMaker Studio. The sections that follow explain and go through the code
    for each pipeline step, starting with setting up the SageMaker session.


    # Setting up a SageMaker session


    The following steps assume you have already created an AWS account and set up
    a SageMaker domain to get started. If not, the following documentation can be
    referenced to do so:


    +   - Prerequisites: https://docs.aws.amazon.com/sagemaker/latest/dg/gs-set-up.html

    - Onboarding to a SageMaker domain: https://docs.aws.amazon.com/sagemaker/latest/dg/gs-studio-onboard.html'

    # # What is deep learning?


    **Deep learning** is a subfield of the broader machine learning field of artificial
    neural networks. Artificial neural networks are mathematical mimics of the human
    brain and consist of interconnected layers of nodes (or “neurons” in biological
    parlance) that process and transmit information.


    Simple artificial neural networks consist of only a few layers. The term “deep”
    in deep learning refers to using neural networks of many more layers, each with
    potentially thousands of neurons. These layers are organized hierarchically, with
    *input* layers at the bottom, *output* at the top, and *hidden* between. Each
    layer extracts and refines features as data passes through the network, allowing
    the model to learn complex patterns and representations.


    The following diagram depicts a simple neural network called a multilayer perceptron
    with a single hidden layer.


    ![](img/5c9d6611c41357518a5920ff1f360451_88_0.png)


    Figure 4.1 – A multilayer perceptron with a single hidden layer and an output
    layer. The layers are fully connected


    Each neuron receives input from other neurons, performs a mathematical operation,
    and then passes the result to the next layer of neurons.'
  - '[PAGE 89]


    The mathematical operation involves two main steps – weighted sum and activation
    function:


    +   1. **Weighted sum**: The neuron takes the inputs (input data or outputs from
    previous neurons), multiplies each input by its corresponding weight, and then
    adds them together. A bias term is often added to the weighted sum for better
    control over the neuron''s output. Mathematically, this can be represented as
    follows:


    $$z_j = \sum_i (w_{ij}x_i) + b_j$$


    Here, $x_i$ represents all inputs to the neuron, $w_{ij}$ is the weight associated
    with the $i^{th}$ input, and $b_j$ is the bias for the neuron.


    2. **Activation function**: The weighted sum is then passed through an activation
    function, determining the neuron''s output. The purpose of the activation function
    is to introduce non-linearity into the mathematical operation. The non-linearity
    allows the neural network to model non-linear and, therefore, complex relationships
    between inputs and outputs. There are various activation functions, such as **sigmoid**
    (logistic function), **hyperbolic tangent (tanh)**, and **Rectified Linear Unit
    (ReLU)**, each with its own properties and use cases. This can be represented
    as:


    $$a_j = \sigma(z_j)$$


    where $a_j$ is the neuron output and $\sigma$ is the activation function.


    Combining these two steps, a neuron in a neural network processes the input data,
    allowing the network to learn and model complex patterns.


    Neural networks are trained by adjusting the weights associated with the neurons.
    The algorithm can be summarized as follows:


    +   1. Weights are initialized to small, random values.

    2. A **forward pass** is performed: for each example in a batch, the input features
    are passed through the entire network (calculating the sum and activation at each
    neuron) to produce a prediction at the output layer.

    3. The loss is then calculated by comparing the output against the actual output
    for each example in a batch. Like GBDTs, the loss function has to be differentiable,
    and standard loss functions include the MSE and cross-entropy loss.

    4. **Backpropagation** is performed: the gradient of the loss function with respect
    to the weights is calculated using the calculus chain rule. The process is started
    at the output layer and works backward through the network.

    5. The weights are then updated using gradient descent or one of the modern variants,
    such as Adam, based on the backpropagated gradients.

    6. The process is repeated for a set number of epochs (each epoch running through
    the entire dataset) to minimize the loss function.


    A unique property of neural networks is that neural networks have been proven
    to be **universal function approximators**. DNNs have the theoretical capability
    to approximate any continuous function to a'
- md: "desired level of accuracy, given a sufficient number of hidden neurons and\
    \ an appropriate activation function. This property is based on the **Universal\
    \ Approximation Theorem**, which has been proven for various types of neural networks.\n\
    \nThis means that a neural network can learn to represent complex relationships\
    \ between input and output data, no matter how intricate or non-linear these relationships\
    \ might be. This capability is one of the reasons why neural networks, especially\
    \ DNNs, have successfully solved a wide range of problems across different domains.\
    \ However, this guarantee is theoretical. In practice, finding the correct network\
    \ architecture, hyperparameters, and training techniques to achieve the desired\
    \ level of approximation can be challenging. The process often requires experimentation,\
    \ expertise, and prohibitive computational resources.\n\n## Advantages and disadvantages\
    \ of deep learning\n\nGiven the capabilities of DNNs, we might believe that they\
    \ should be our first port of call for all machine learning problems. The primary\
    \ advantage of using DNNs is their high accuracy in very complex domains: the\
    \ current state-of-the-art performance on a wide range of complex tasks, natural\
    \ language processing, generative AI, image recognition, and speech recognition\
    \ are all achieved by DNNs due to their ability to learn complex and hidden patterns\
    \ in large datasets.\n\nAnother advantage is automatic feature extraction. With\
    \ the correct architecture, a DNN can extract complex or higher-order features\
    \ automatically, alleviating the need for a data scientist to perform feature\
    \ engineering.\n\nFinally, DNNs can also transfer learning: pre-trained deep learning\
    \ models can be fine-tuned on a smaller dataset for a specific task, leveraging\
    \ the knowledge acquired during the initial training. Transfer learning can significantly\
    \ reduce training time and data requirements for new tasks.\n\nHowever, deep learning\
    \ is not a panacea to all machine learning problems. Some of the disadvantages\
    \ of using DNNs include the following:\n\n- **Computational resources**: Deep\
    \ learning models often require significant computing power and memory for training,\
    \ especially when dealing with large datasets and complex architectures.\n- **Large\
    \ datasets**: DNNs usually perform well when trained on large datasets, but their\
    \ performance can degrade when trained on smaller datasets. When a dataset is\
    \ too small, the DNN overfits the training data and cannot generalize to unseen\
    \ data.\n- **Interpretability**: DNNs are often considered “black boxes” due to\
    \ their complex architectures and the large number of parameters involved. The\
    \ complexity can make understanding how the model makes decisions difficult, which\
    \ may be a concern for applications requiring transparency or regulatory compliance.\n\
    - **Hyperparameter tuning**: DNNs involve numerous hyperparameters, such as network\
    \ architecture, learning rate, and activation functions. Coupled with longer training\
    \ times and resource needs, finding the optimal combination of these hyperparameters\
    \ can be expensive and time-consuming.\n\n## Introducing TabTransformers\n\nWe\
    \ want to apply deep learning to tabular data, as most practical machine learning\
    \ problems have tabular data. To this end, we use a new deep learning architecture\
    \ called **TabTransformer**: a deep neural network model designed to handle tabular\
    \ data specifically.\n\nLike the GPT family of DNNs, TabTransformer is based on\
    \ the transformer architecture originally introduced by Vaswani et al. [2]. TabTransformer\
    \ adapts the transformer architecture to work effectively with tabular data, providing\
    \ an alternative to other machine learning models such as decision trees and gradient\
    \ boosting machines for such data [3].\n\n![](img/5c9d6611c41357518a5920ff1f360451_91_0.png)\n\
    \nThe model architecture for TabTransformer is shown in *Figure 4.2*. With TabTransformer,\
    \ each feature in the tabular data is treated as a token, similar to how words\
    \ are treated as tokens in natural language processing. The model applies self-attention\
    \ mechanisms to learn complex interactions and dependencies between features in\
    \ the input data. The token embedding and attention mechanism allows the model\
    \ to capture global and local relationships between features.\n\nThe TabTransformer\
    \ model has several key components: token embedding, positional encoding, transformer\
    \ layers, pooling, and output layers. The token embedding converts each feature\
    \ value into a continuous vector representation, combined with positional information\
    \ through positional encoding.\n\nMoving through the layers, shown in *Figure\
    \ 4.2*, we can see that the categorical and numerical features are split.\n\n\
    The categorical features first go through an embedding layer, as implemented by\
    \ `layers.Embedding` in Keras, and are then passed along to the transformer blocks.\
    \ A variable number of transformer blocks can be implemented (as set using a hyperparameter),\
    \ but each consists of a `layers.MultiHeadAttention` layer and a `layers.Dense`\
    \ layer with `Dropout`. The output values are added and normalized after passing\
    \ through the attention and dense layers.\n\nDue to their performance, the transformer\
    \ feedforward layer uses the **Gaussian error linear unit (GELU)** activation\
    \ function in our implementation. However, other activation functions may be used\
    \ [5].\n\nThe numerical features are passed through a normalization layer (normalizing\
    \ the numerical input ranges) and then concatenated with output from the transformers.\n\
    \nThe concatenated results are passed through a **multilayer perceptron (MLP)**\
    \ block consisting of a variable number of dense layers, each with `Dropout`.\
    \ Our implementation uses **scaled exponential linear unit (SELU)**, which causes\
    \ the activations to self-normalize [6].\n\nFinally, the output from the MLP block\
    \ is passed to the loss function, the implementation of which depends on the learning\
    \ problem (classification or regression).\n\nTabTransformers are much more complex\
    \ to implement and train than gradient-boosted trees. Like other DNNs, TabTransformers\
    \ require more data preparation and computational power than gradient-boosted\
    \ trees.\n\nIn addition to TabTransformers, this section introduced deep learning\
    \ alongside its advantages and disadvantages. In the next section, we use a practical\
    \ example to compare the different approaches, including the complexity of working\
    \ with TabTransformers.\n\n## Comparing LightGBM, XGBoost, and TabTransformers\n\
    \nIn this section, we compare the performance of LightGBM, XGBoost, and TabTransformers\
    \ on two different datasets. We also look at more data preparation techniques\
    \ for unbalanced classes, missing values, and categorical data.\n\n## Predicting\
    \ census income\n\nThe first dataset we use is the Census Income dataset, which\
    \ predicts whether personal income will exceed $50,000 based on attributes such\
    \ as education, marital status, occupation, and others [4]. The dataset has 48,842\
    \ instances, and as we'll see, some missing values and unbalanced classes.\n\n\
    The dataset is available from the following URL: https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data.\
    \ The data has already been split into a training set and a test set. Once loaded,\
    \ we can sample the data:\n\n```\ntrain_data.sample(5) [[\"age\", \"education\"\
    , \"marital_status\", \"hours_per_week\", \"income_bracket\"]]\n```\n\nThe data\
    \ sample for the selected columns is shown in *Table 4.1*.\n\n| | age | education\
    \ | marital_status | hours_per_week | income_bracket |\n|---|---|---|---|---|---|\n\
    | 12390 | 34 | Some-college | Never-married | 40 | <=50K |\n| 20169 | 41 | Assoc-acdm\
    \ | Married-civ-spouse | 45 | >50K |\n| 17134 | 35 | Doctorate | Never-married\
    \ | 60 | >50K |\n| 23452 | 49 | HS-grad | Married-civ-spouse | 40 | >50K |\n|\
    \ 22372 | 31 | HS-grad | Separated | 45 | <=50K |\n\nTable 4.1 – Sample data from\
    \ the Census Income dataset\n\n*Table 4.1* shows that we have mixed data types:\
    \ some features are numeric, and others are text. Notably, some columns in the\

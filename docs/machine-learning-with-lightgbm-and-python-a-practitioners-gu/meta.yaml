    \ we can write the results to a local directory, from which SageMaker retrieves\
    \ it and uploads it to S3:\n\n```\ntrain_output_path = os.path.join(f\"{local_dir}/train\"\
    , \"train.csv\")\nX_train.to_csv(train_output_path, index=False)\n```\n\nWith\
    \ a preprocessing script defined, we need to upload it to S3 for the pipeline\
    \ to be able to use it:\n\n```\ns3_client.upload_file(\n    Filename=\"src/preprocessing.py\"\
    , Bucket=write_bucket,\n    Key=f\"{write_prefix}/scripts/preprocessing.py\"\n\
    )\n```\n\nWe can define the preprocessing step as follows. First, we must create\
    \ an `SKLearnProcessor` instance:\n\n```\nsklearn_processor = SKLearnProcessor(\n\
    \    framework_version=\"0.23-1\",\n    role=sagemaker_role,\n    instance_count=1,\n\
    \    instance_type=process_instance_type,\n    base_job_name=f\"{base_job_name_prefix}-processing\"\
    ,\n)\n```\n\n`SKLearnProcessor` handles the processing task for jobs that require\
    \ scikit-learn. We specify the scikit-learn framework version and the instance\
    \ type and count we defined earlier.\n\nThe processor is then added to `ProcessingStep`\
    \ for use in the pipeline:\n\n```\nprocess_step = ProcessingStep(\n    name=\"\
    DataProcessing\",\n    processor=sklearn_processor,\n    inputs=[...],\n    outputs=[...],\n\
    ```"

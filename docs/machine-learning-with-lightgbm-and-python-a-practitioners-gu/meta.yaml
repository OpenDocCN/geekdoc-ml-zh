    # 第一部分：梯度提升和LightGBM基础


    在本部分中，我们将通过向您介绍机器学习的基本概念，从基本术语到随机森林等复杂算法，来开启我们的机器学习探索之旅。我们将深入探讨集成学习，强调决策树结合时的力量，然后将重点转向梯度提升框架LightGBM。通过Python中的实践示例以及与XGBoost和深度神经网络等技术的比较分析，您将获得机器学习领域的基础理解和实践能力，特别是使用LightGBM。


    本部分将包括以下章节：


    - 第1章，机器学习简介

    - 第2章，集成学习——Bagging和Boosting

    - 第3章，Python中的LightGBM概述

    - 第4章，比较LightGBM、XGBoost和深度学习


    # 机器学习简介


    我们的旅程从介绍机器学习和本书中将使用的基本概念开始。


    我们将首先从软件工程的角度概述机器学习。然后，我们将介绍机器学习和数据科学领域使用的核心概念：模型、数据集、学习范式和其他细节。本介绍将包括一个实际示例，清晰地说明所讨论的机器学习术语。


    我们还将介绍决策树，这是一种极其重要的机器学习算法，是我们理解LightGBM的第一步。


    完成本章后，您将为机器学习和机器学习技术的实际应用奠定坚实的基础。


    本章将涵盖以下主要主题：


    - 什么是机器学习？

    - 介绍模型、数据集和监督学习

    - 决策树学习


    ## 技术要求


    本章包含简单机器学习算法的示例，并介绍了如何使用scikit-learn。您必须安装包含scikit-learn、NumPy、pandas和Jupyter
    Notebook的Python环境。本章的代码可在 https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-1
    获取。'

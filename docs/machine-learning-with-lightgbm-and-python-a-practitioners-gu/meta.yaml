  md: 'the next section, and for the rest of the chapter, we look at **Optuna**, a
    framework designed to automate tuning machine learning models.


    # Introducing Optuna


    Optuna is an open source **hyperparameter optimization (HPO)** framework designed
    to automate finding the best hyperparameters for machine learning models (https://optuna.org/).
    It is written in Python and can be easily integrated with various machine learning
    libraries, including LightGBM.


    Optuna provides efficient optimization algorithms to search hyperparameter spaces
    more effectively. In addition to the optimization algorithms, Optuna also provides
    pruning strategies to save computational resources and time by pruning poorly
    performing trials.


    Besides optimization and pruning algorithms, Optuna also provides an easy-to-use
    API for defining parameter types (integer, float, or categorical), creating and
    automating resumable optimization studies, and visualizing the results of optimization
    runs. Later in the chapter, we see how to use the API practically.


    # Optimization algorithms


    Optuna provides several efficient optimization algorithms. In this section, we
    focus on two of the available algorithms: a **Tree-Structured Parzen Estimator
    (TPE)** and a **Covariance Matrix Adaptation Evolution Strategy (CMA-ES)** algorithm.


    # *TPE*


    To understand TPE, we must first know what a Parzen estimator is.


    A Parzen estimator, or **Kernel Density Estimator (KDE)**, is a technique used
    to estimate the probability distribution of a set of data points. It''s a non-parametric
    method, meaning it doesn''t assume any specific underlying distribution for the
    data. Instead, it tries to "learn" the distribution based on the observed data
    points.


    Imagine you have data points and want to know how the data is distributed. One
    way to do this is by placing small "hills" (kernel functions) over each data point.
    These "hills" can have different shapes, such as Gaussian (bell-shaped) or uniform
    (box-shaped). The height of the "hill" at any point represents the likelihood
    that a new data point would fall at that location. The Parzen estimator works
    by adding up all these "hills" to create a smooth landscape representing the estimated
    probability distribution of the data.


    In the case of TPE, the data points we care about are the parameter combinations,
    and the probability distribution is the likelihood of a set of parameters being
    good or bad [1], [2].'
  merge: -1
  pgno: 108
- img_proc: true
  md: 'TPE starts by sampling a few random combinations of hyperparameters and evaluating
    the model''s performance for each. Based on these initial results, TPE divides
    the hyperparameter combinations into two groups: `good` (those that lead to better
    performance) and `bad` (those that lead to worse performance):


    +   - $l(x)$: The probability density function of `good` configurations

    - $g(x)$ : The probability density function of `bad` configurations


    TPE then estimates the probability distributions of hyperparameter combinations
    for both `good` and `bad` groups using the Parzen estimator technique.


    With estimations of the probability distributions available, TPE calculates the
    **Expected Improvement (EI)** of hyperparameter configurations. EI can be calculated
    as the ratio between the two densities: $\frac{l(x)}{g(x)}$. With each trail,
    the algorithm samples new hyperparameter configurations that maximize the EI.


    The tree structure in TPE comes from the algorithm''s ability to handle parameter
    interaction within the hyperparameter search space, where specific hyperparameters''
    relevance depends on others'' values. To handle this, TPE builds a hierarchical
    structure that captures the relationships between different hyperparameters and
    adapts the sampling process accordingly.


    In summary, TPE estimates the distributions of `good` and `bad` parameters and
    uses them to find optimal parameters by maximizing new trials'' expected improvement.
    TPE is cost-effective since it approximates the distributions and can search for
    better parameters optimally (in a non-exhaustive way). TPE also handles parameter
    interactions.


    An alternative algorithm provided by Optuna is the CMA-ES algorithm, which we
    discuss next.


    # **CMA-ES**


    CMA-ES is another optimization algorithm that can be used to find optimal hyperparameters
    [3]. Compared to TPE, CMA-ES is well suited to cases that involve continuous variables
    and when the search space is non-linear and non-convex.


    CMA-ES is an example of an **evolutionary algorithm (EA)**. An EA is a type of
    optimization algorithm inspired by the process of natural evolution. It aims to
    find the best solution to a problem by mimicking how nature evolves species through
    selection, reproduction, mutation, and inheritance. Evolutionary algorithms start
    with a population of candidate solutions and modify the candidates with each subsequent
    *generation* to adapt more closely to the best solution. This generational process
    is illustrated in *Figure 5.2*.'
  merge: -1
  pgno: 109
- img_proc: true
  md: '![](img/5c9d6611c41357518a5920ff1f360451_110_0.png)


    Figure 5.2 – A two-dimensional illustration of candidate solutions (red x marks)
    evolving with each subsequent generation to approximate the global optimum (located
    at the top and center of each landscape). In the context of CMA-ES, each candidate
    solution represents a combination of hyperparameter values, and the algorithm''s
    performance determines the optimum


    Central to the evolutionary process of CMA-ES is the covariance matrix. A covariance
    matrix is a square, symmetric matrix representing the covariance between pairs
    of variables (in the case of CMA-ES, the hyperparameters), providing insight into
    their relationships. The diagonal elements of the matrix represent the variances
    of individual variables, while the off-diagonal elements represent the covariances
    between pairs of variables. When there''s a positive covariance, it signals that
    the variables usually move in the same direction, either increasing or decreasing.
    Conversely, a negative covariance points to a relationship where, as one variable
    rises, the other tends to fall, and vice versa. A covariance of zero suggests
    no linear relationship between the variables.'

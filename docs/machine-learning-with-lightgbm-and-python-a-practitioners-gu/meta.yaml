    \ 0.1, 0.5],\n    \"n_estimators\": [20, 100, 200]\n}'\n);\n```\n\n# Preprocessing\n\
    \nPostgresML also supports performing certain types of preprocessing when training\
    \ a model. As with the training data and configuration, the preprocessing is also\
    \ stored with the project, so the same preprocessing can be applied when using\
    \ a model for predictions.\n\nRegarding pre-processing, PostgresML supports encoding\
    \ categorical variables, imputing missing values, and scaling numerical values.\
    \ Preprocessing rules are set using a JSON object via the `preprocess` parameter,\
    \ as follows:\n\n```\nSELECT pgml.train(\n...\npreprocess => '{\n    \"model\"\
    : {\"encode\": {\"ordinal\": [\"Ford\", \"Kia\",\n        \"Volkswagen\"]}},\n\
    \    \"price\": {\"impute\": \"mean\", scale: \"standard\"}\n    \"fuel_economy\"\
    : {\"scale\": \"standard\"}\n}'\n);\n```\n\nHere, we applied ordinal encoding\
    \ for the model feature. Alternatively, PostgresML also supports one-hot encoding\
    \ and target encoding. We also imported missing values (as indicated by NULL in\
    \ the column) using the mean of the price and applied standard (normal) scaling\
    \ to the price and the fuel economy features.\n\n# Deploying and prediction\n\n\
    PostgresML automatically calculates appropriate metrics on the test set after\
    \ training, including $R^2$, the F1 score, precision, recall, ROC_AUC, accuracy\
    \ and log loss. PostgresML will then automatically deploy the model after training\
    \ if the key metric for the model ($R^2$ for regression and F1 for classification)\
    \ improves over the currently deployed model.\n\nHowever, deployments can also\
    \ be managed manually for a project with the `pgml.deploy` function:\n\n```\n\
    pgml.deploy(\n    project_name TEXT,\n```"

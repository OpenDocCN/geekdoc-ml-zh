    Birmingham\nB3 1RB, UK.\n\nISBN: 978-1-80056-474-9\n\nwww.packtpub.com\n\n> 无数个夜晚和周末都致力于完成这本书，我要感谢我的妻子Irene的永恒支持，没有她，就不会有人读到这些内容。此外，我还要感谢我的女儿Emily，她激励我走得更远一些。\n\
    \n– Andrich van Wyk\n\n## 贡献者\n\n### 关于作者\n\n**Andrich van Wyk** 拥有15年的机器学习研发、构建AI驱动解决方案以及在AI领域提供咨询的经验。他还拥有广泛的软件工程师和架构师经验，在企业系统领域拥有超过十年的行业经验。\n\
    \n他以优异成绩毕业于比勒陀利亚大学，获得计算机科学硕士学位，专注于神经网络和进化算法。\n\nAndrich喜欢撰写关于机器学习工程和整个软件行业的文章。他目前与妻子和女儿居住在南非。\n\
    \n### 关于审阅者\n\n**Valentine Shkulov** 是一所顶尖科技大学的著名客座讲师，他将学术与现实世界的专业知识无缝融合，是金融科技和电子商务领域的杰出数据科学家。他在构建ML驱动解决方案方面的独创性改变了从科技巨头到新兴初创公司的业务。Valentine擅长引入AI创新并改进现有系统，确保它们对关键业务指标产生深远影响。他对应对产品挑战的热情使他成为利用ML提升业务的先驱。\n\
    \n最重要的是，衷心感谢我的配偶，她是我非凡旅程中坚定不移的支持支柱。\n\n**Kayewan M Karanjia** 拥有超过7年的机器学习、人工智能（AI）和数据技术经验，为他在DrDoctor的当前角色带来了丰富的专业知识。在这里，作为一名机器学习工程师，他致力于实施先进的机器学习模型，这些模型对改善医疗服务和优化NHS流程有直接影响。过去，他还曾与多家跨国公司（如Reliance\
    \ Industries Limited）合作，并为印度政府实施解决方案。\n\n## 目录\n\n前言\n\nxiii\n\n### 第一部分：梯度提升和LightGBM基础\n\

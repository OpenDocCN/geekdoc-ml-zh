    \ created an AWS account and set up a SageMaker domain to get started. If not,\
    \ the following documentation can be referenced to do so:\n\n- Prerequisites:\
    \ https://docs.aws.amazon.com/sagemaker/latest/dg/gs-set-up.html\n- Onboarding\
    \ to a SageMaker domain: https://docs.aws.amazon.com/sagemaker/latest/dg/gs-studio-onboard.html\n\
    \nWe must initialize the SageMaker session and create S3, SageMaker, and SageMaker\
    \ Runtime clients via boto3 to get started:\n\n```\nsess = sagemaker.Session()\n\
    region = sess.boto_region_name\ns3_client = boto3.client(\"s3\", region_name=region)\n\
    sm_client = boto3.client(\"sagemaker\", region_name=region)\nsm_runtime_client\
    \ = boto3.client(\"sagemaker-runtime\")\n```\n\nWe will use Amazon S3 to store\
    \ our training data, source code, and all data and artifacts created by the pipeline,\
    \ such as the serialized model. Our data and artifacts are split into a read bucket\
    \ and a separate write bucket. This is a standard best practice as it separates\
    \ the concerns for data storage.\n\nSageMaker sessions have the concept of a default\
    \ S3 bucket for the session. If no default bucket name is supplied, one is generated,\
    \ and the bucket is created for you. Here, we're grabbing a reference to the bucket.\
    \ This is our output or write bucket. The read bucket is a bucket we've created\

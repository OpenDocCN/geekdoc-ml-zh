    \ We first check the data structure and types:\n\n```python\ntrain_df.info()\n\
    #    Column              Non-Null Count  Dtype  \n---  ------              --------------\
    \  -----  \n 0   ID                  100000 non-null  object \n 1   Customer_ID\
    \         100000 non-null  object \n 2   Month               100000 non-null \
    \ object \n 3   Name                90015 non-null   object \n 4   Age       \
    \          100000 non-null  object \n 5   SSN                 100000 non-null\
    \  object \n ... \n25   Payment_Behaviour   100000 non-null  object \n26   Monthly_Balance\
    \     98800 non-null   object \n27   Credit_Score        100000 non-null  object\n\
    ```\n\nWe notice that there are missing values for some features. Also, many of\
    \ the features we expect to be numeric (annual income, number of loans, and others)\
    \ are interpreted as objects instead of integers or floats. These features have\
    \ to be coerced into numeric features.\n\nWe also check the descriptive statistics\
    \ of the features and for duplicated rows. Two features are found to have outlier\
    \ values, age and the number of bank accounts, and need to be cleaned.\n\nNotably,\
    \ the `Type_of_Loan` field has a comma-separated list, including conjunctions,\
    \ of the types of loans for each individual. For example “student_loan, mortgage_loan,\
    \ and personal_loan”. The modeling algorithm could not extract the loan types\
    \ as part of a string. We have to engineer new fields to enable effective modeling.\n\
    \n### Data cleaning\n\nWe can now proceed with cleaning the data. In summary,\
    \ the following issues have to be addressed:\n\n- Coercing object columns to numeric\
    \ columns where appropriate\n- Handling outliers in the age, number of bank accounts,\
    \ and monthly balance columns\n- Engineering new features for the types of loans\n\
    - Handling missing values and duplicate rows\n\n### Coercing to numeric columns\n\
    \nOne of the main issues with the dataset is the mixed types found in columns\
    \ that are supposed to be numeric, but due to error values, pandas interprets\
    \ them as objects. For example, the `Annual_Income` column contains values such\
    \ as `100000.0_`, which is then interpreted as a string.\n\nTo clean and convert\
    \ the features to numbers, we first remove character symbols using a regular expression:\n\
    \n```python\nframe[col] = frame[col].astype(str).str.replace(r'[^\\d\\.]', '',\
    \ regex=True)\n```\n\nThis allows us to use pandas to coerce the column to a numeric\
    \ feature, turning any errors (empty values) into np.nan values:\n\n```python\n\
    frame[col] = pd.to_numeric(frame[col], errors=\"coerce\")\n```\n\nThe `Credit_History_Age`\
    \ feature requires more work from our side. The age is specified using natural\
    \ language such as “12 years and 3 months.” Here, we use Python string processing\
    \ to convert the years and months to a floating-point number:\n\n```python\ndef\
    \ clean_credit_age(age):\n    if age == 'nan':\n        return np.nan\n    if\
    \ not \"Years\" in age:\n        return age\n    years, months = age.split(\"\
    \ Years and \")\n    months = months.replace(\" Months\", \"\")\n    return int(years)\
    \ + int(months) / 12\n```"

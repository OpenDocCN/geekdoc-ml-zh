- md: "One of the critical questions relates to how we can determine the changes that\
    \ reduce the error residuals. Gradient boosting solves the error minimization\
    \ problem by applying a widely used optimization problem: gradient descent.\n\n\
    ## Gradient descent\n\n**Gradient descent** is an optimization algorithm that\
    \ attempts to find the optimal parameters to minimize a **loss function**. The\
    \ parameters are updated iteratively by taking small steps in the direction of\
    \ the negative gradient of the loss function (thereby decreasing the function\
    \ value). A loss function is similar in concept to an error function but has two\
    \ important properties, as outlined here:\n\n- A loss function produces a numeric\
    \ value that quantifies the model's performance or precisely how poorly a model\
    \ is doing. A good loss function produces significantly different output for models\
    \ with different performances. Some error functions can also be used as loss functions—for\
    \ example, **mean squared error (MSE)**.\n- The second property is that a loss\
    \ function must be differentiable, specifically in the context of gradient descent.\
    \ An example of an error function that's not differentiable is the F1 score. The\
    \ F1 score may produce a numeric value of the model's performance, but it is not\
    \ differentiable and cannot be used as a loss function.\n\nThe process for gradient\
    \ descent can, then, be defined as follows. Suppose we have a loss function $L$\
    \ defined for parameters $x$. For an initial set of parameters, the loss is calculated\
    \ as $L(x_0)$. Gradient descent proceeds iteratively to minimize the loss function:\n\
    \n$L(x_{n+1}) < L(x_n)$\n\nTo update the parameters, *we take a step in the direction\
    \ of the negative gradient of L*. We can specify the gradient descent update rule\
    \ as follows:\n\n$x_{n+1} = x_n - \\gamma_n \\nabla L(x_n)$\n\nHere, $\\gamma_n$\
    \ is the **learning rate**, which defines the step size, and $\\nabla L(x_n)$\
    \ is the gradient of $L$ at $x_n$.\n\nThe graph in *Figure 2.3* illustrates the\
    \ gradient descent process:\n\n![](img/5c9d6611c41357518a5920ff1f360451_53_0.png)\n\
    \nFigure 2.3 – Graph showing the gradient descent process to find the minimum\
    \ of a function\n\nChoosing an appropriate learning rate is critical to gradient\
    \ descent's success. If the learning rate is too low, the optimization will be\
    \ very slow, potentially not reaching a minimum in the allowed number of iterations.\
    \ A small learning rate could also lead to the process getting stuck in a local\
    \ minimum: the step size being too small to escape. Conversely, suppose the learning\
    \ rate is too large. In that case, we could step over the minimum and miss it\
    \ entirely or get stuck oscillating around a minimum (constantly jumping back\
    \ and forth but never descending to the optimal value).\n\n## Gradient boosting\n\
    \nNow that we understand how gradient descent works, we can see how it is applied\
    \ in gradient boosting. We will work through the entire gradient-boosting algorithm\
    \ in detail at the hand of a small example. In our example, we'll use a regression\
    \ tree, as it is a bit easier to understand than the case for classification.\n\
    \n### Gradient-boosting algorithm\n\nThe gradient-boosting algorithm is defined\
    \ as follows, where $M$ is the number of boosted trees [3]:\n\n1. Given training\
    \ data $\\{(x_i, y_i)\\}_{i=1}^n$, containing $n$ training samples (defined by\
    \ features $x_i$ and target $y_i$) and a differentiable loss function $L(y_i,\
    \ F(x))$, where $F(x)$ are the predictions from model $F$.\n2. Initialize the\
    \ model with a constant prediction value $F_0(X) = \\arg\\min_y \\sum_{i=1}^n\
    \ L(y_i, y)$\n3. For $m = 1$ to $M$:\n    Compute pseudo residuals $r_{im} = -\\\
    left[\\frac{\\partial L(y_i, F(x_i))}{\\partial F(x_i)}\\right]_{F(x)=F_{m-1}(x_i)}$\
    \ for $i = 1, ..., n$\n    Fit a regression tree to the $r_{im}$ values and create\
    \ terminal regions $R_{jm}$ for $j = 1...J_m$\n    For $j = 1...J_m$ compute $\\\
    gamma_{jm} = \\arg\\min_\\gamma \\sum_{x \\in R_{jm}} L(y_i, F_{m-1}(x_i) + \\\
    gamma)$\n    Update $F_m(x) = F_{m-1}(x) + \\nu \\sum_{j=1}^{J_m} \\gamma_{jm}\
    \ I(x \\in R_{jm})$\n4. Result: $F_M(x)$\n\nAlthough the algorithm and especially\
    \ the mathematics might look intimidating, it is practically much more straightforward\
    \ than it appears. We'll go through the algorithm step by step. Consider the following\
    \ toy dataset:\n\n| Gender | Fasting Blood Sugar | Waist Circumference | BMI |\
    \ LDL Cholesterol |\n| :--- | :--- | :--- | :--- | :--- |\n| Male | 105 | 110\
    \ | 29.3 | 170 |\n| Female | 85 | 80 | 21 | 90 |\n| Male | 95 | 93 | 26 | 113\
    \ |\n\nTable 2.2 – Example dataset consisting of a patient's physical measurements\
    \ and measured low-density lipoprotein (LDL) cholesterol\n\nGiven the physical\
    \ measurements, we aim to predict a patient's LDL cholesterol.\n\nThe preceding\
    \ table defines our training data $\\{(x_i, y_i)\\}_{i=1}^n$, where $x$ is the\
    \ features (blood sugar, waist circumference, BMI) and $y$ is the target: LDL\
    \ cholesterol.\n\nWe need a differentiable loss function, and to simplify some\
    \ of the mathematical derivations in this example, we choose the following loss\
    \ function, which is similar to the MSE function:\n\n$$L = \\frac{1}{2} \\sum_{i=0}^{n}\
    \ (y_i - \\gamma)^2$$\n\nWe now work through each algorithm step in detail to\
    \ see how the gradient-boosted tree is produced.\n\nThe first step is to find\
    \ $F_0(x) = \\text{argmin}_{\\gamma} \\sum_{i=1}^{n} L(y_i, \\gamma)$, where $y_i$\
    \ is our target value and $\\gamma$ is our initial predicted value. *Our initial\
    \ prediction is constant and is simply the average of the target values. But let's\
    \ see why.*\n\nThe equation for $F_0(x)$ is stating that we need to find a value\
    \ for $\\gamma$ that minimizes our loss function. To find the minimum, we take\
    \ the derivative of the loss function with respect to gamma:\n\n$$\\frac{\\partial\
    \ L}{\\partial \\gamma} = \\frac{2}{2} \\left( \\sum_{i=0}^{n} (y_i - \\gamma)\
    \ \\right) \\times -1$$\n\nThen, set it to 0 and solve the following equation:\n\
    \n$$-\\left( \\sum_{i=0}^{n} (y_i - \\gamma) \\right) = 0$$\n$$-\\frac{1}{n} \\\
    sum_{i=0}^{n} y_i + \\gamma = 0$$\n$$\\gamma = \\frac{1}{n} \\sum_{i=0}^{n} y_i$$\n\
    \nThe equation simplifies to calculating the average of the target values.\n\n\
    Updating our table with the predictions, we have the following:\n\n| Gender |\
    \ F. Blood Sugar | W. Circum. | BMI | LDL Cholesterol | Prediction $F_0(x)$ |\n\
    | :--- | :--- | :--- | :--- | :--- | :--- |\n| Male | 105 | 110 | 29.3 | 170 |\
    \ 125 |\n| Female | 85 | 80 | 21 | 90 | 125 |\n| Male | 95 | 93 | 26 | 113 | 125\
    \ |\n\nTable 2.3 – Our initial prediction of LDL cholesterol predictions ($F_0(x)$)\
    \ for each patient is constant\n\nWe repeat the following $M$ times, where $M$\
    \ is the number of trees we choose to build.\n\nWe now need to calculate the pseudo\
    \ residuals $r_{im} = -\\left[ \\frac{\\partial L(y_i, F(x_i))}{\\partial F(x_i)}\
    \ \\right]_{F(x)=F_{m-1}(x)}$. This equation for $r_{im}$ is stating that we use\
    \ the negative of the partial derivative of the loss function, with respect to\
    \ the predictions, to calculate the pseudo residuals. *This portion of the gradient-boosting\
    \ algorithm relates to gradient descent: we are taking the negative of the gradient\
    \ to minimize the residuals.* Fortunately, we have already calculated this derivative:\n\
    \n$$-\\left[ \\frac{\\partial L(y_i, F(x_i))}{\\partial F(x_i)} \\right] = -\\\
    frac{\\partial}{\\partial F(x_i)} \\left( \\frac{1}{2} (y_i - F(x_i))^2 \\right)\
    \ = \\frac{2}{2} (y_i - F(x_i)) = (y_i - F(x_i))$$\n\nHere, $F(x_i)$ is the predicted\
    \ value. In other words, *the equation simplifies the difference between the target\
    \ and predicted values.* We can add the residuals to the table, as follows:\n\n\
    | Gender | F. Blood Sugar | W. Circum. | BMI | LDL Cholesterol | Prediction $F_0(x)$\
    \ | Residuals for $F_0(x)$ |\n| :--- | :--- | :--- | :--- | :--- | :--- | :---\
    \ |\n| Male | 105 | 110 | 29.3 | 170 | 125 | 45 |\n| Female | 85 | 80 | 21 | 90\
    \ | 125 | -35 |\n| Male | 95 | 93 | 26 | 113 | 125 | -12 |\n\nTable 2.4 – Based\
    \ on our initial prediction, we can calculate the residuals for each patient,\
    \ as shown in the Residuals for $F_0(x)$ column\n\nThe next step is straightforward:\
    \ we build a regression tree to predict the residuals. We do not use the predictions\
    \ of the regression tree directly. Instead, we use the *terminal regions* to calculate\
    \ our updated prediction. The terminal regions refer to the tree’s leaf nodes.\n\
    \nFor this example, we assume the following simple regression tree is built:\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_56_0.png)\n\nFigure 2.4 – Regression\
    \ tree predicting the residuals\n\nWith our regression tree built and our leaf\
    \ nodes defined, we can proceed with the next step. We need to compute $\\gamma_{jm}$\
    \ that minimizes our loss function, taking into account the previous predictions\
    \ as per $\\gamma_{jm} = \\text{argmin}_{\\gamma} \\sum_{x_i \\in R_{jm}} L(y_i,\
    \ F_{m-1}(x_i) + \\gamma)$. This is almost precisely what we did in *step 1*,\
    \ where we showed that the equation simplifies taking the average of the predicted\
    \ values due to our choice of the loss function. *Here, that means taking the\
    \ average of the residuals in each leaf node.* Therefore, we have $\\gamma_{1,1}\
    \ = \\frac{-35-12}{2} = -23.5$ and $\\gamma_{2,1} = \\frac{45}{1} = 45$.\n\nFinally,\
    \ we can now calculate our next prediction, $F_1(x)$, defined by: $F_m(x) = F_{m-1}(x)\
    \ + \\nu \\sum_{j=1}^k \\gamma_{jm} I(x \\in R_{jm})$, meaning our next prediction\
    \ consists of the previous prediction plus the $\\gamma$ values calculated in\
    \ *step 2.3*, weighed by a learning rate $\\nu$. The summation here means that\
    \ should a sample be part of multiple leaf nodes, we take the sum of the gamma\
    \ values. Let’s calculate $F_1(x)$ for the first sample in our dataset, using\
    \ a learning rate of 0.1. According to the regression tree from *step 2.2*, our\
    \ sample (which has a BMI > 26) maps to $\\gamma_{2,1}$. Since it’s only mapping\
    \ to a single leaf, we don’t need the summation part of the equation. Therefore,\

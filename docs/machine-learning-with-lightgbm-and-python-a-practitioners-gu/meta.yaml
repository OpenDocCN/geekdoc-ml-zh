- md: '## Preface


    Welcome to *Machine Learning with LightGBM and Python: A Practitioner''s Guide
    to Developing Production-Ready Machine Learning Systems*. In this book, you''ll
    embark on a rich journey, taking you from the foundational principles of machine
    learning to the advanced realms of MLOps. The cornerstone of our exploration is
    LightGBM, a powerful and flexible gradient-boosting framework that can be harnessed
    for a wide range of machine-learning challenges.


    This book is tailor-made for anyone passionate about transforming raw data into
    actionable insights using the power of **Machine Learning (ML)**. Whether you''re
    an ML novice eager to get your hands dirty or an experienced data scientist seeking
    to master the intricacies of LightGBM, there''s something in here for you.


    The digital era has equipped us with a treasure trove of data. However, the challenges
    often lie in extracting meaningful insights from this data and deploying scalable,
    efficient, and reliable models in production environments. This book will guide
    you in overcoming these challenges. By diving into gradient boosting, the data
    science life cycle, and the nuances of production deployment, you will gain a
    comprehensive skill set to navigate the ever-evolving landscape of ML.


    Each chapter is designed with practicality in mind. Real-world case studies interspersed
    with theoretical insights ensure your learning is grounded in tangible applications.
    Our focus on LightGBM, which sometimes gets overshadowed by more mainstream algorithms,
    provides a unique lens to appreciate and apply gradient boosting in various scenarios.


    For those curious about what sets this book apart, it''s our pragmatic approach.
    We take pride in transcending beyond merely explaining algorithms or tools. Instead,
    we will prioritize hands-on applications, case studies, and real-world challenges,
    ensuring you''re not just reading but also “doing” ML.


    As we traverse through the chapters, remember that the world of ML is vast and
    constantly evolving. This book, while comprehensive, is a stepping stone in your
    lifelong journey of learning and exploration in the domain. As you navigate the
    world of LightGBM, data science, MLOps, and more, keep your mind open, your curiosity
    alive, and your hands ready to code.


    ## Who this book is for


    *Machine Learning with LightGBM and Python: A Practitioner''s Guide to Developing
    Production-Ready Machine Learning Systems* is tailored for a broad spectrum of
    readers passionate about harnessing data''s power through ML. The target audience
    for this book includes the following:


    - **Beginners in ML**: Individuals just stepping into the world of ML will find
    this book immensely beneficial. It starts with foundational ML principles and
    introduces them to gradient boosting using LightGBM, making it an excellent entry
    point for newcomers.

    - **Experienced data scientists and ML practitioners**: For those who are already
    familiar with the landscape of ML but want to deepen their knowledge of LightGBM
    and/or MLOps, this book offers advanced insights, techniques, and practical applications.

    - **Software engineers and architects looking to learn more about data science**:
    Software professionals keen on transitioning to data science or integrating ML
    into their applications will find this book valuable. The book approaches ML theoretically
    and practically, emphasizing hands-on coding and real-world applications.

    - **MLOps engineers and DevOps professionals**: Individuals working in the field
    of MLOps or those who wish to understand the deployment, scaling, and monitoring
    of ML models in production environments will benefit from the chapters dedicated
    to MLOps, pipelines, and deployment strategies.

    - **Academicians and students**: Faculty members teaching ML, data science, or
    related courses, as well as students pursuing these fields, will find this book
    to be both an informative textbook and a practical guide.


    Knowledge of how to program Python is necessary. Familiarity with Jupyter notebooks
    and Python environments is a bonus. No prior knowledge of ML is required.


    In essence, anyone with a penchant for data, a background in Python programming,
    and an eagerness to explore the multifaceted world of ML using LightGBM will find
    this book a valuable addition to their repertoire.


    ## What this book covers


    Chapter 1, Introducing Machine Learning, starts our journey into ML, viewing it
    through the lens of software engineering. We will elucidate vital concepts central
    to the field, such as models, datasets, and the various learning paradigms, ensuring
    clarity with a hands-on example using decision trees.


    Chapter 2, Ensemble Learning – Bagging and Boosting, delves into ensemble learning,
    focusing on bagging and boosting techniques applied to decision trees. We will
    explore algorithms such as random forests, gradient-boosted decision trees, and
    more advanced concepts such as Dropout meets Additive Regression Trees (DART).


    Chapter 3, An Overview of LightGBM in Python, examines LightGBM, an advanced gradient-boosting
    framework with tree-based learners. Highlighting its unique innovations and enhancements
    to ensemble learning, we will guide you through its Python APIs. A comprehensive
    modeling example using LightGBM, enriched with advanced validation and optimization
    techniques, sets the stage for a deeper dive into data science and production
    systems ML.


    Chapter 4, Comparing LightGBM, XGBoost, and Deep Learning, pits LightGBM against
    two prominent tabular data modeling methods – XGBoost and deep neural networks
    (DNNs), specifically TabTransformer. We will assess each method''s complexity,
    performance, and computational cost through evaluations of two datasets. The essence
    of this chapter is ascertaining LightGBM’s competitiveness in the broader ML landscape,
    rather than an in-depth study of XGBoost or DNNs.


    Chapter 5, LightGBM Parameter Optimization with Optuna, focuses on the pivotal
    task of hyperparameter optimization, introducing the Optuna framework as a potent
    solution. Covering various optimization algorithms and strategies to prune the
    hyperparameter space, this chapter guides you through a hands-on example of refining
    LightGBM parameters using Optuna.


    Chapter 6, Solving Real-World Data Science Problems with LightGBM, methodically
    breaks down the data science process, applying it to two distinct case studies
    – a regression and a classification problem. The chapter illuminates each step
    of the data science life cycle. You will experience hands-on modeling with LightGBM,
    paired with comprehensive theory. This chapter also serves as a blueprint for
    data science projects using LightGBM.


    Chapter 7, AutoML with LightGBM and FLAML, delves into **automated machine learning
    (AutoML)**, emphasizing its significance in simplifying and expediting data engineering
    and model development. We will introduce FLAML, a notable library that automates
    model selection and fine-tuning with efficient hyperparameter algorithms. Through
    a practical case study, you will witness FLAML’s synergy with LightGBM and the
    transformative Zero-Shot AutoML functionality, which renders the tuning process
    obsolete.


    Chapter 8, Machine Learning Pipelines and MLOps with LightGBM, moves on from modeling
    intricacies to the world of production ML. It introduces you to ML pipelines,
    ensuring consistent data processing and model building, and ventures into MLOps,
    a fusion of DevOps and ML, which is vital to deploying resilient ML systems.


    Chapter 9, LightGBM MLOps with AWS SageMaker, steers our journey toward Amazon
    SageMaker, Amazon Web Services’ comprehensive suite to craft and maintain ML solutions.
    We will deepen our understanding of ML pipelines by delving into advanced areas
    such as bias detection, explainability in models, and the nuances of automated,
    scalable deployments.


    Chapter 10, LightGBM Models with PostgresML, introduces PostgresML, a distinct
    MLOps platform and a PostgreSQL database extension that facilitates ML model development
    and deployment directly via SQL. This approach, while contrasting the scikit-learn
    programming style that we’ve embraced, showcases the benefits of database-level
    ML, particularly regarding data movement efficiencies and faster inferencing.


    Chapter 11, Distributed and GPU-Based Learning with LightGBM, delves into the
    expansive realm of training LightGBM models, leveraging distributed computing
    clusters and GPUs. By harnessing distributed computing, you will understand how
    to substantially accelerate training workloads and manage datasets that exceed
    a single machine’s memory capacity.


    GPU training for LightGBM


    Summary


    Setting up LightGBM for the GPU


    References


    Running LightGBM on the GPU


    ## Index


    ## Other Books You May Enjoy'
  mdcn: '## 前言


    欢迎阅读*《基于LightGBM和Python的机器学习：开发生产就绪机器学习系统的实践者指南》*。在本书中，你将开启一段丰富的旅程，从机器学习的基础原理到MLOps的高级领域。我们探索的基石是LightGBM，一个强大且灵活的梯度提升框架，可用于应对广泛的机器学习挑战。


    本书专为任何热衷于利用**机器学习（ML）**的力量将原始数据转化为可操作洞察的人量身打造。无论你是渴望动手实践的ML新手，还是希望精通LightGBM复杂细节的经验丰富的数据科学家，本书都能为你提供所需内容。


    数字时代为我们提供了海量的数据宝库。然而，挑战往往在于从这些数据中提取有意义的洞察，并在生产环境中部署可扩展、高效且可靠的模型。本书将指导你克服这些挑战。通过深入探讨梯度提升、数据科学生命周期以及生产部署的细微差别，你将获得一套全面的技能组合，以驾驭不断演变的ML领域。


    每一章的设计都以实用性为核心。穿插其中的真实案例研究与理论洞见相结合，确保你的学习建立在切实的应用之上。我们对LightGBM的关注——它有时会被更主流的算法所掩盖——提供了一个独特的视角，让你在各种场景中欣赏和应用梯度提升。


    对于那些好奇本书与众不同之处的人，答案在于我们的务实方法。我们自豪于超越仅仅解释算法或工具。相反，我们将优先考虑动手应用、案例研究和真实世界的挑战，确保你不仅是在阅读，更是在“实践”ML。


    在我们穿越各章的过程中，请记住ML的世界广阔且不断演变。本书虽然全面，但只是你在该领域终身学习和探索之旅的一块垫脚石。当你探索LightGBM、数据科学、MLOps等世界时，请保持开放的心态、活跃的好奇心以及随时编码的双手。


    ## 本书适合谁


    *《基于LightGBM和Python的机器学习：开发生产就绪机器学习系统的实践者指南》*专为广泛热衷于通过ML驾驭数据力量的读者量身打造。本书的目标读者包括以下人群：


    - **ML初学者**：刚踏入ML世界的人会发现本书极其有益。它从ML基础原理开始，向他们介绍使用LightGBM进行梯度提升，是新人的绝佳入门点。

    - **经验丰富的数据科学家和ML从业者**：对于那些已经熟悉ML领域但希望加深对LightGBM和/或MLOps了解的人，本书提供了高级洞见、技术和实际应用。

    - **希望了解更多数据科学的软件工程师和架构师**：热衷于转型到数据科学或将ML集成到其应用中的软件专业人士会发现本书很有价值。本书从理论和实践两方面探讨ML，强调动手编码和真实世界应用。

    - **MLOps工程师和DevOps专业人士**：在MLOps领域工作或希望了解生产环境中ML模型部署、扩展和监控的人，将从专门讨论MLOps、流水线和部署策略的章节中受益。

    - **学者和学生**：教授ML、数据科学或相关课程的教职人员，以及攻读这些领域的学生，会发现本书既是一本内容丰富的教科书，也是一本实用的指南。


    需要具备Python编程知识。熟悉Jupyter notebooks和Python环境是加分项。不需要ML的先验知识。


    本质上，任何对数据有浓厚兴趣、具备Python编程背景，并渴望使用LightGBM探索ML多面世界的人，都会发现本书是其知识库的宝贵补充。


    ## 本书涵盖内容


    第1章，介绍机器学习，开启了我们进入ML的旅程，从软件工程的视角审视它。我们将阐明该领域的核心概念，如模型、数据集和各种学习范式，并通过使用决策树的动手示例确保清晰度。


    第2章，集成学习——Bagging与Boosting，深入探讨集成学习，重点关注应用于决策树的Bagging和Boosting技术。我们将探索随机森林、梯度提升决策树等算法，以及更高级的概念，如Dropout
    meets Additive Regression Trees（DART）。


    第3章，Python中的LightGBM概述，研究LightGBM，一个基于树学习器的先进梯度提升框架。通过强调其独特的创新和对集成学习的增强，我们将引导你了解其Python
    API。一个使用LightGBM的综合建模示例，辅以高级验证和优化技术，为更深入地探索数据科学和生产系统ML奠定了基础。


    第4章，比较LightGBM、XGBoost和深度学习，将LightGBM与两种突出的表格数据建模方法——XGBoost和深度神经网络（DNNs），特别是TabTransformer——进行对比。我们将通过评估两个数据集来评估每种方法的复杂性、性能和计算成本。本章的核心是确定LightGBM在更广泛ML领域的竞争力，而非深入研究XGBoost或DNNs。


    第5章，使用Optuna进行LightGBM参数优化，聚焦于超参数优化这一关键任务，介绍Optuna框架作为强大的解决方案。涵盖各种优化算法和策略以修剪超参数空间，本章将指导你通过一个动手示例，使用Optuna优化LightGBM参数。


    第6章，使用LightGBM解决真实世界的数据科学问题，系统地分解数据科学流程，并将其应用于两个不同的案例研究——一个回归问题和一个分类问题。本章阐明了数据科学生命周期的每一步。你将体验使用LightGBM进行动手建模，并结合全面的理论。本章也作为使用LightGBM进行数据科学项目的蓝图。


    第7章，使用LightGBM和FLAML进行AutoML，深入探讨**自动化机器学习（AutoML）**，强调其在简化和加速数据工程和模型开发方面的重要性。我们将介绍FLAML，一个通过高效超参数算法自动化模型选择和微调的著名库。通过一个实际案例研究，你将见证FLAML与LightGBM的协同作用，以及变革性的Zero-Shot
    AutoML功能，它使调优过程变得过时。


    第8章，使用LightGBM的机器学习流水线和MLOps，从建模的复杂性转向生产ML的世界。它向你介绍ML流水线，确保一致的数据处理和模型构建，并深入MLOps，这是DevOps和ML的融合，对于部署弹性ML系统至关重要。


    第9章，使用AWS SageMaker的LightGBM MLOps，将我们的旅程引向Amazon SageMaker，亚马逊网络服务用于构建和维护ML解决方案的综合套件。我们将通过深入探讨高级领域，如偏差检测、模型可解释性以及自动化、可扩展部署的细微差别，来加深对ML流水线的理解。


    第10章，使用PostgresML的LightGBM模型，介绍PostgresML，一个独特的MLOps平台和PostgreSQL数据库扩展，它通过SQL直接促进ML模型的开发和部署。这种方法虽然与我们采用的scikit-learn编程风格形成对比，但展示了数据库级ML的好处，特别是在数据移动效率和更快推理方面。


    第11章，使用LightGBM的分布式和基于GPU的学习，深入探讨利用分布式计算集群和GPU训练LightGBM模型的广阔领域。通过利用分布式计算，你将了解如何显著加速训练工作负载并管理超出单机内存容量的数据集。


    LightGBM的GPU训练


    总结


    为GPU设置LightGBM



    # Summary


    In summary, this chapter discussed AutoML systems and their uses. Typical approaches
    to automating feature engineering, model selection, and tuning were discussed.
    We also mentioned the risks and caveats associated with using these systems.


    The chapter also introduced FLAML, a library for AutoML that provides tools for
    automating the model selection and tuning process. We also presented CFO and BlendSearch,
    two efficient hyperparameter optimization algorithms provided by FLAML.


    The practicalities of applying FLAML were shown in the form of a case study. In
    addition to FLAML, we showcased an open source tool called Featuretools, which
    provides functionality to automate feature engineering. We showed how to develop

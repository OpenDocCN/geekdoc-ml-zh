  - "[PAGE 160]\n\nThe following section presents a case study of using FLAML with\
    \ LightGBM, showcasing everyday use cases, different optimization algorithms,\
    \ and FLAML's zero-shot AutoML.\n\n# Case study – using FLAML with LightGBM\n\n\
    We will use the Wind Turbine dataset from the previous chapter for the case study.\
    \ The dataset is cleaned as before, imputing missing values and capping outliers\
    \ to appropriate ranges. However, we take a different approach to feature engineering.\
    \ To further explore AutoML, we use an open source framework called Featuretools.\n\
    \n# Feature engineering\n\n**Featuretools** (https://featuretools.alteryx.com/en/stable/#)\
    \ is an open source framework for automated feature engineering. Specifically,\
    \ Featuretools is well suited to transforming relational datasets and temporal\
    \ data.\n\nAs discussed in the previous section, automated feature engineering\
    \ tools typically use combinatorial transformations of features to generate new\
    \ features for the dataset. Featuretools supports feature transformations through\
    \ their **Deep Feature Synthesis (DFS)** process.\n\nAs an example, consider a\
    \ dataset of online customer web sessions. Typical features that could be useful\
    \ in such a dataset are the total sessions a customer visited the site for, or\
    \ the month a customer signed up. Using Featuretools and DFS, this can be achieved\
    \ using the following code (courtesy of https://featuretools.alteryx.com/):\n\n\
    ```\nfeature_matrix, feature_defs = ft.dfs(\n    entityset=es,\n    target_dataframe_name=\"\
    customers\",\n    agg_primitives=[\"count\"],\n    trans_primitives=[\"month\"\
    ],\n    max_depth=1,\n)\nfeature_matrix\n```\n\nTwo transformations are being\
    \ applied here: a transformation for “month” and an aggregation for “count”. With\
    \ these transformations, the month would be automatically extracted from any dates\
    \ present for a customer (such as the join date), and the count aggregations would\
    \ be calculated for each customer (such as the number of sessions or transactions).\
    \ Featuretools has a rich set of transformations and aggregations available. A\
    \ complete list is available at https://featuretools.alteryx.com/en/stable/api_reference.html.\n\
    \nLet's see how we can use Featuretools to engineer the features for the Wind\
    \ Turbine dataset."
  - "[PAGE 161]\n\n# Using Featuretools with the Wind Turbine dataset\n\nWe must perform\
    \ two feature engineering tasks for our dataset: engineer features for the datetime\
    \ field and encode categorical features. To get started, we create an EntitySet\
    \ for our data:\n\n```\nes = ft.EntitySet(id=\"wind-turbine\")\nes = es.add_dataframe(\n\
    \    dataframe_name=\"wind-turbine\",\n    dataframe=df,\n    index=\"tracking_id\"\
    \n)\n```\n\nEntitySet tells the Featuretools framework the entities and relationships\
    \ we work with within the data. Customer is an example of an entity in the earlier\
    \ example; for this case, it's Wind Turbines. We then pass the data frame and\
    \ the column to be used as an index.\n\nWe then apply dfs and encode_features\
    \ to engineer the features for our dataset:\n\n```\nfeature_matrix, feature_defs\
    \ = ft.dfs(\n    entityset=es, target_dataframe_name=\"wind-turbine\",\n    trans_primitives=[\"\
    day\", \"year\", \"month\", \"weekday\"],\n    max_depth=1)\nfeature_matrix_enc,\
    \ features_enc = ft.encode_features(\n    feature_matrix, feature_defs)\n```\n\
    \nThe preceding code extracts the day, year, month, and weekday for each of our\
    \ wind turbine measurements. The feature encoding then automatically one-hot encodes\
    \ the categorical features for our dataset, including the new datefields.\n\n\
    The following is an excerpt from the dataset column list showing some of the columns\
    \ created by Featuretools:\n\n```\n...\n'cloud_level = Low',\n'cloud_level = Medium',\n\
    'cloud_level = Extremely Low',\n'cloud_level is unknown',\n'MONTH(datetime) =\
    \ 1',\n'MONTH(datetime) = 2',\n...\n'MONTH(datetime) = 8',\n'MONTH(datetime) =\
    \ 9',\n'MONTH(datetime) = 11',\n'MONTH(datetime) is unknown',\n...\n```"
  - '[PAGE 162]


    ```

    ''YEAR(datetime) = 2019'',

    ''YEAR(datetime) = 2018'',

    ''YEAR(datetime) is unknown''

    ```


    Note the one-hot encoding of categorical features: each value is now split into
    a separate column. This includes columns for unknown values (for example, YEAR(datetime)
    is unknown), which illustrates another way of dealing with missing values in categorical
    features. Instead of imputing a value by using something such as the mode, we
    have a column that signals to the model (true or false) that the value is missing.


    The automated feature engineering has increased our column count from 22 columns
    to 66 columns. This illustrates another general caveat with automated feature
    engineering and AutoML: automation may lead to overcomplicated datasets. In *Chapter
    6, Solving Real-World Data Science Problems with LightGBM*, we could encode features
    selectively based on our understanding of the learning algorithm. LightGBM can
    automatically handle categorical features; therefore, one-hot encoding is superfluous
    if LightGBM is the only learning algorithm used.


    Additionally, the datefields could be handled numerically. By applying our knowledge
    of the problem and algorithm, we can reduce the dimensionality of the learning
    problem, thereby simplifying it. The ease of use of automated systems has to be
    balanced with the manual effort of expert feature engineering, which could save
    time later on.


    The dataset is now ready for model development; we''ve completed the feature engineering
    for our dataset using only two lines of code.


    # FLAML AutoML


    We will now look at model selection and tuning. We will use FLAML to compare five
    different models: LightGBM, RandomForest, XGBoost, ExtraTrees, and a limited-depth
    version of XGBoost. We would also like to find optimal parameters for the best
    model. This entire process is possible in two lines of code with FLAML:


    ```

    automl = flaml.AutoML()

    automl.fit(X, y, task="regression", time_budget=60)

    ```


    The preceding code fits an optimal regression model within a time budget of 60
    seconds. FLAML automatically uses a holdout set to calculate validation results
    and then proceeds with optimization, using CFO as the tuner by default.


    The AutoML class provides “task-oriented AutoML.” The user sets the learning task,
    and FLAML does the rest. Among others, the following tasks are supported: classification,
    regression, time-series forecasting and time-series classification, ranking, and
    NLP-related tasks such as summarization and word token classification.'

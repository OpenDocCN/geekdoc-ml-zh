    # # An Overview of LightGBM in Python


    In the previous chapter, we looked at ensemble learning methods for decision trees.
    Both **bootstrap aggregation (bagging)** and gradient boosting were discussed
    in detail, with practical examples of how to apply the techniques in scikit-learn.
    We also showed how **gradient-boosted decision trees (GBDTs)** are slow to train
    and may underperform on some problems.


    This chapter introduces LightGBM, a gradient-boosting framework that uses tree-based
    learners. We look at the innovations and optimizations LightGBM makes to the ensemble
    learning methods. Further details and examples are given for using LightGBM practically
    via Python. Finally, the chapter includes a modeling example using LightGBM, incorporating
    more advanced techniques for model validation and parameter optimization.


    By the end of the chapter, you will have a thorough understanding of the theoretical
    and practical properties of LightGBM, allowing us to dive deeper into using LightGBM
    for data science and production systems.


    The main topics of this chapter are set out here:


    +   - Introducing LightGBM

    - Getting started with LightGBM in Python

    - Building LightGBM models


    # ## Technical requirements


    The chapter includes examples and code excerpts illustrating how to use LightGBM
    in Python. Complete examples and instructions for setting up a suitable environment
    for this chapter are available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-3.'
- md: '## Introducing LightGBM


    LightGBM is an open source, gradient-boosting framework for tree-based ensembles
    (https://github.com/microsoft/LightGBM). LightGBM focuses on efficiency in speed,
    memory usage, and improved accuracy, especially for problems with high dimensionality
    and large data sizes.


    LightGBM was first introduced in the paper *LightGBM: A Highly Efficient Gradient
    Boosting Decision Tree* [1].


    The efficiency and accuracy of LightGBM are achieved via several technical and
    theoretical optimizations to the standard ensemble learning methods, particularly
    GBDTs. Additionally, LightGBM supports distributed training of ensembles with
    optimizations in network communication and support for GPU-based training of tree
    ensembles.


    LightGBM supports many **machine learning** (ML) applications: regression, binary
    and multiclass classification, cross-entropy loss functions, and ranking via LambdaRank.


    The LightGBM algorithm is also very customizable via its hyperparameters. It supports
    many metrics and features, including **Dropouts meet Multiple Additive Regression
    Trees (DART)**, bagging (random forests), continuous training, multiple metrics,
    and early stopping.


    This section reviews the theoretical and practical optimizations LightGBM utilizes,
    including a detailed overview of the hyperparameters to control LightGBM features.


    ## LightGBM optimizations


    At its core, LightGBM implements the same ensemble algorithms we discussed in
    the previous chapter. However, LightGBM applies theoretical and technical optimizations
    to improve performance and accuracy while significantly reducing memory usage.
    Next, we discuss the most significant optimizations implemented in LightGBM.


    ## Computational complexity in GBDTs


    First, we must understand where the inefficiency in building GBDTs stems from
    to understand how LightGBM improves the efficiency of GBDTs. The most computationally
    complex part of the GBDT algorithm is training the regression tree for each iteration.
    More specifically, finding the optimal split is very expensive. Pre-sort-based
    algorithms are among the most popular methods for finding the best splits [2],
    [3]. A naive approach requires the data to be sorted by feature for every decision
    node with algorithmic complexity *O(#data × #feature)*. Pre-sort-based algorithms
    sort the data once before training, which reduces the complexity when building
    a decision node to *O(#data)* [2]. Even with pre-sorting, the complexity is too
    high for large datasets when finding splits for decision nodes.


    ## Histogram-based sampling


    An alternative approach to pre-sorting involves building histograms for continuous
    features [4]. The continuous values are added into discrete bins when building
    these **feature histograms**. Instead of using the data directly when calculating
    the splits for decision nodes, we can now use the histogram bins. Constructing
    the histograms has a complexity of *O(#data)*. However, the complexity for building
    a decision node now reduces to *O(#bins)*, and since the number of bins is much
    smaller than the amount of data, this significantly speeds up the process of building
    regression trees, as illustrated in the following diagram:


    ![](img/5c9d6611c41357518a5920ff1f360451_63_0.png)


    Figure 3.1 – Creating feature histograms from continuous features allows calculating
    splits for decision nodes using bin boundary values instead of having to sample
    each data point, significantly reducing the algorithm''s complexity since #bins
    << #data


    A secondary optimization that stems from using histograms is “histogram subtraction”
    for building the histograms for the leaves. Instead of calculating the histogram
    for each leaf, we can subtract the leaf’s neighbor’s histogram from the parent’s
    histogram. Choosing the leaf with the smaller amount of data leads to a smaller
    *O(#data)* complexity for the first leaf and *O(#bin)* complexity for the second
    leaf due to histogram subtraction.


    A third optimization that LightGBM applies using histograms is to reduce the memory
    cost. Feature pre-sorting requires a supporting data structure (a dictionary)
    for each feature. No such data structures are required when building histograms,
    reducing memory costs. Further, since *#bins* is small, a smaller data type, such
    as `uint8_t`, can store the training data, reducing memory usage.


    Detailed information regarding the algorithms for building feature histograms
    is available in the paper *CLOUDS: A decision tree classifier for large datasets*
    [4].


    ## Exclusive Feature Bundling


    **Exclusive Feature Bundling (EFB)** is another data-based optimization that LightGBM
    applies when working with sparse data (sparse data is pervasive in high-dimensional
    datasets). When the feature data is sparse, it''s common to find that many features
    are *mutually exclusive*, signifying they never present non-zero values simultaneously.
    Combining these features into a single one is generally safe, given this exclusivity.
    EFB is illustrated in the following diagram:


    ![](img/5c9d6611c41357518a5920ff1f360451_64_0.png)


    Bundling mutually exclusive features allows building the same feature histograms
    as from the individual features [1]. The optimization reduces the complexity of
    building feature histograms from $O(\#data \times \#feature)$ to $O(\#data \times
    \#bundle)$. For datasets where there are many mutually exclusive features, this
    dramatically improves performance since $\#bundle \ll \#feature$. Detailed algorithms
    for, and proof of the correctness of, EFB are available in [1].


    ## Gradient-based One-Side Sampling


    A final data-based optimization available in the LightGBM framework is **Gradient-based
    One-Side Sampling (GOSS)** [1]. GOSS is a method of discarding training data samples
    that no longer contribute significantly to the training process, effectively reducing
    the training data size and speeding up the process.


    We can use the gradient calculation of each sample to determine its importance.
    If the gradient change is small, it implies that the training error was also small,
    and we can infer that the tree is well fitted to the specific data instance [1].
    One option would be to discard all instances with small gradients. However, this
    changes the distribution of the training data, reducing the tree''s ability to
    generalize. GOSS is a method for choosing which instances to keep in the training
    data.


    To maintain the data distribution, GOSS is applied as follows:


    1.  The data samples are sorted by the absolute value of their gradients.

    2.  The top $a \times 100\%$ instances are then selected (instances with large
    gradients).

    3.  A random sample of $b \times 100\%$ instances is then taken from the rest
    of the data.

    4.  A factor is added to the loss function (for these instances) to amplify their
    influence: $\frac{1-a}{b}$, thereby compensating for the underrepresentation of
    data with small gradients.


    Therefore, GOSS samples a large portion of instances with large gradients and
    a random portion of instances with small gradients and amplifies the influence
    of the small gradients when calculating information gain.


    The downsampling enabled by GOSS can significantly reduce the amount of data processed
    during training (and the training time for the GBDTs), especially in the case
    of large datasets.


    ## Best-first tree growth


    The most common method for building decision trees is to grow the tree by level
    (that is, one level at a time). LightGBM uses an alternative approach and grows
    the tree leaf-wise or best-first. The leaf-wise approach selects an existing leaf
    with the most significant change in the loss of the tree and builds the tree from
    there. The downside of this approach is that if the dataset is small, the tree
    is likely to overfit the data. A maximum depth has to be set to counteract this.
    However, if the number of leaves to construct is fixed, leaf-wise tree building
    is shown to outperform level-wise algorithms [5].


    ## L1 and L2 regularization


    LightGBM supports both L1 and L2 regularization of the objective function when
    training the regression trees in the ensemble. From *Chapter 1, Introducing Machine
    Learning*, we recall that regularization is a way to control overfitting. In the
    case of decision trees, simpler, shallow trees overfit less.


    To support L1 and L2 regularization, we extend the objective function with a regularization
    term, as follows:


    $$obj = L(y, F(x)) + \Omega(w)$$


    Here, $L(y, F(x))$ is the loss function discussed in *Chapter 2, Ensemble Learning
    – Bagging and Boosting*, and $\Omega(w)$ is the regularization function defined
    over $w$, the leaf scores (the leaf score is the output calculated from the leaf
    as per step 2.3 in the GBDT algorithm defined in *Chapter 2, Ensemble Learning
    – Bagging and Boosting*).


    The regularization term effectively adds a penalty to the objective function,
    where we aim to penalize more complex trees prone to overfitting.'
  mdcn: '## LightGBM 简介


    LightGBM 是一个开源的梯度提升框架，用于基于树的集成模型（https://github.com/microsoft/LightGBM）。LightGBM
    专注于提升速度、内存使用效率和准确性，尤其适用于高维度和大规模数据的问题。


    LightGBM 最初在论文 *LightGBM: A Highly Efficient Gradient Boosting Decision Tree*
    [1] 中提出。


    LightGBM 的效率和准确性是通过对标准集成学习方法（特别是 GBDT）进行多项技术和理论优化实现的。此外，LightGBM 支持集成模型的分布式训练，并在网络通信方面进行了优化，同时支持基于
    GPU 的树集成训练。


    LightGBM 支持多种**机器学习**（ML）应用：回归、二分类和多分类、交叉熵损失函数，以及通过 LambdaRank 进行排序。


    LightGBM 算法也具有高度的可定制性，可通过其超参数进行调整。它支持多种指标和特性，包括 **Dropouts meet Multiple Additive
    Regression Trees (DART)**、装袋法（随机森林）、持续训练、多指标和早停法。


    本节将回顾 LightGBM 所采用的理论和实践优化，包括控制 LightGBM 特性的超参数的详细概述。


    ## LightGBM 优化


    从核心上看，LightGBM 实现了我们在前一章讨论的相同集成算法。然而，LightGBM 应用了理论和技术优化，以提高性能和准确性，同时显著减少内存使用。接下来，我们将讨论
    LightGBM 中实现的最重要的优化。


    ## GBDT 中的计算复杂度


    首先，我们必须理解构建 GBDT 时效率低下的根源，才能理解 LightGBM 如何提高 GBDT 的效率。GBDT 算法中计算最复杂的部分是每次迭代训练回归树。更具体地说，寻找最优分裂点非常昂贵。基于预排序的算法是寻找最佳分裂点的最流行方法之一
    [2]，[3]。一种朴素的方法要求数据在每个决策节点处按特征排序，算法复杂度为 *O(#data × #feature)*。基于预排序的算法在训练前对数据进行一次排序，这将构建决策节点时的复杂度降低到
    *O(#data)* [2]。即使进行了预排序，对于大型数据集，在寻找决策节点的分裂点时，复杂度仍然过高。


    ## 基于直方图的采样


    一种替代预排序的方法涉及为连续特征构建直方图 [4]。在构建这些**特征直方图**时，连续值被添加到离散的箱中。现在，我们不再直接使用数据来计算决策节点的分裂点，而是可以使用直方图箱。构建直方图的复杂度为
    *O(#data)*。然而，构建决策节点的复杂度现在降低到 *O(#bins)*，并且由于箱的数量远小于数据量，这显著加快了构建回归树的过程，如下图所示：


    ![](img/5c9d6611c41357518a5920ff1f360451_63_0.png)


    图 3.1 – 从连续特征创建特征直方图，允许使用箱边界值计算决策节点的分裂点，而不必对每个数据点进行采样，由于 #bins << #data，显著降低了算法的复杂度


    使用直方图带来的第二个优化是用于构建叶子节点直方图的“直方图减法”。我们不必为每个叶子计算直方图，而是可以从父节点的直方图中减去其相邻叶子的直方图。选择数据量较小的叶子，第一个叶子的复杂度为较小的
    *O(#data)*，而由于直方图减法，第二个叶子的复杂度为 *O(#bin)*。


    LightGBM 使用直方图应用的第三个优化是降低内存成本。特征预排序需要为每个特征维护一个支持数据结构（字典）。构建直方图时不需要这样的数据结构，从而降低了内存成本。此外，由于
    *#bins* 很小，可以使用更小的数据类型（如 `uint8_t`）来存储训练数据，从而减少内存使用。


    关于构建特征直方图算法的详细信息，请参阅论文 *CLOUDS: A decision tree classifier for large datasets*
    [4]。


    ## 互斥特征捆绑


    **互斥特征捆绑 (EFB)** 是 LightGBM 在处理稀疏数据时应用的另一种基于数据的优化（稀疏数据在高维数据集中很常见）。当特征数据稀疏时，通常会发现许多特征是*互斥的*，这意味着它们永远不会同时呈现非零值。鉴于这种互斥性，将这些特征组合成一个特征通常是安全的。EFB
    如下图所示：


    ![](img/5c9d6611c41357518a5920ff1f360451_64_0.png)


    捆绑互斥特征允许构建与从单个特征构建的相同的特征直方图 [1]。该优化将构建特征直方图的复杂度从 $O(\#data \times \#feature)$
    降低到 $O(\#data \times \#bundle)$。对于具有许多互斥特征的数据集，这显著提高了性能，因为 $\#bundle \ll \#feature$。关于
    EFB 的详细算法和正确性证明，请参阅 [1]。


    ## 基于梯度的单边采样


    LightGBM 框架中可用的最后一个基于数据的优化是**基于梯度的单边采样 (GOSS)** [1]。GOSS 是一种丢弃对训练过程不再有显著贡献的训练数据样本的方法，从而有效减少训练数据量并加速训练过程。


    我们可以使用每个样本的梯度计算来确定其重要性。如果梯度变化很小，则意味着训练误差也很小，我们可以推断该树对特定数据实例拟合良好 [1]。一个选择是丢弃所有梯度小的实例。然而，这会改变训练数据的分布，降低树的泛化能力。GOSS
    是一种选择保留哪些实例在训练数据中的方法。


    为了保持数据分布，GOSS 的应用方式如下：


    1.  按梯度的绝对值对数据样本进行排序。

    2.  然后选择前 $a \times 100\%$ 的实例（梯度大的实例）。

    3.  然后从剩余数据中随机抽取 $b \times 100\%$ 的实例。

    4.  在损失函数中添加一个因子（针对这些实例）以放大其影响：$\frac{1-a}{b}$，从而补偿梯度小的数据代表性不足的问题。


    因此，GOSS 采样了大部分梯度大的实例和一小部分梯度小的实例，并在计算信息增益时放大了梯度小的实例的影响。


    GOSS 实现的降采样可以显著减少训练过程中处理的数据量（以及 GBDT 的训练时间），尤其是在大型数据集的情况下。


    ## 最优优先树生长


    构建决策树最常见的方法是按层生长树（即一次生长一层）。LightGBM 使用一种替代方法，按叶子生长或最优优先生长。叶子优先方法选择现有叶子中损失变化最大的叶子，并从那里开始构建树。这种方法的缺点是，如果数据集较小，树很可能对数据过拟合。必须设置最大深度来抵消这一点。然而，如果要构建的叶子数量是固定的，叶子优先的树构建方法被证明优于按层生长的算法
    [5]。


    ## L1 和 L2 正则化


    LightGBM 在训练集成中的回归树时，支持对目标函数进行 L1 和 L2 正则化。从*第 1 章，机器学习简介*中，我们回顾正则化是控制过拟合的一种方式。对于决策树，更简单、更浅的树过拟合程度较低。


    为了支持 L1 和 L2 正则化，我们通过添加正则化项来扩展目标函数，如下所示：


    $$obj = L(y, F(x)) + \Omega(w)$$


    这里，$L(y, F(x))$ 是*第 2 章，集成学习 – Bagging 和 Boosting*中讨论的损失函数，$\Omega(w)$ 是定义在 $w$（叶子分数）上的正则化函数（叶子分数是根据*第
    2 章，集成学习 – Bagging 和 Boosting*中定义的 GBDT 算法的步骤 2.3 从叶子计算出的输出）。



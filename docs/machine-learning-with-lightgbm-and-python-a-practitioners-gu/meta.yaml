    # **Data cleaning**


    We have identified multiple issues in the dataset that we need to address as part
    of the *data cleaning* step:'
  - '[PAGE 130]


    +   - **Outliers**: Many features have outlier values that skew the distribution
    of values for the feature.

    - **Measurement errors**: Some features have values that fall out of the bounds
    of physical impossibilities (lengths smaller than 0 or temperatures in impossible
    ranges).

    - **Missing values**: Many of the features have missing values. There are also
    particular values (-99.0 and -999.0) that we consider missing.


    We first address the outliers and measurement errors, as this impacts how we handle
    the missing values.


    # Dealing with outliers


    There are two parts to dealing with outliers in a dataset: accurately identifying
    outliers and choosing appropriate values for replacement. Ways to identify outliers
    are as follows:


    +   - **Visualization**: As shown previously, histograms or other plots that visualize
    the data distribution (such as box plots or scatter plots) can be used

    - **Domain knowledge**: Like how we identify measurement errors, domain knowledge
    can be leveraged to decide whether values are outlying

    - **Statistical analysis**: Two popular methods for determining whether values
    are outlying using statistics are the **interquartile range (IQR)** and the standard
    deviation.


    The IQR is the difference between the 25th and 75th quartiles. Values over 1.5
    times the IQR away from the 25th or 75th quartiles are considered outlying.


    Alternatively, we can leverage the standard deviation: we calculate the mean and
    standard deviation of the dataset. Any values over two or three times removed
    from the mean are outlying. Setting bounds to twice or three times the standard
    deviation depends on the underlying data. Using twice the standard deviation could
    lead to many false positives, but it is appropriate if a lot of data is centered
    around the mean. Using three times the standard deviation is more conservative
    and only marks values very far from the mean as outlying.


    When the outlying values are detected, we must do something about them. Generally,
    our options are as follows:


    +   - **Remove**: If an outlier results from an error in data entry, measurement,
    or collection, it may be reasonable to remove it from the dataset. However, this
    should be done cautiously, as removing too many data points can lead to a loss
    of information and biased results. Removing instances with outliers in our dataset
    would result in close to 70% data loss and isn''t an option.

    - **Impute**: Similar to missing values, replace the outlier value with a more
    representative value, such as the mean, median, or mode of the variable, or use
    more sophisticated imputation methods such as **k-nearest neighbors** or **regression-based
    imputation**.'
- md: "## Handling measurement errors\n\nThe values detected as types of measurement\
    \ errors could also be considered outliers, although not in the statistical sense\
    \ of the word. However, we can handle these values slightly differently than with\
    \ the statistical outliers.\n\nWe apply our domain knowledge and some research\
    \ surrounding the weather to identify appropriate ranges for these features. We\
    \ then cap the erroneous values to these ranges:\n\n```\nframe.loc[frame[\"wind_speed(m/s)\"\
    ] < 0, \"wind_speed(m/s)\"] = 0\nframe.loc[frame[\"wind_speed(m/s)\"] > 113, \"\
    wind_speed(m/s)\"] = 113\nframe.loc[frame[\"blade_length(m)\"] < 0, \"blade_length(m)\"\
    ] = 0\nframe.loc[frame[\"windmill_height(m)\"] < 0, \"windmill_height(m)\"] =\
    \ 0\nframe.loc[frame[\"resistance(ohm)\"] < 0, \"resistance(ohm)\"] = 0\n```\n\
    \nHere, we set any negative lengths, heights, and electrical resistance to 0.\
    \ We also cap the windspeed to 113 m/s, the maximum gust speed on record.\n\n\
    Finally, we can deal with the missing values in the dataset.\n\n## Handling missing\
    \ values\n\nWe have discussed working with missing values in earlier chapters.\
    \ To summarize here, some of the potential approaches we can take are as follows:\n\
    \n- Remove instances with missing values\n- Impute the missing values using descriptive\
    \ statistics (the mean, median, or mode)\n- Use other machine learning algorithms,\
    \ typically unsupervised techniques such as clustering, to calculate more robust\
    \ statistics\n\nRemoving the missing values would discard a significant portion\
    \ of our dataset. Here, we decide to replace missing values using descriptive\
    \ statistics to retain as much data as possible.\n\nFirst, we mark the -99.0 and\
    \ -999.0 values as missing:\n\n```\ndf.loc[frame[f] == -99.0, f] = np.nan\ndf.loc[frame[f]\
    \ == 99.0, f] = np.nan\ndf.loc[frame[f] == -999.0, f] = np.nan\ndf.loc[frame[f]\
    \ == 999.0, f] = np.nan\n```\n\nWe then replace missing numerical values with\
    \ the mean and categorical values with the mode:\n\n```\nif f in numerical_columns:\n\
    \    frame[f].fillna(frame[f].mean(), inplace=True)\nelse:\n    frame[f].fillna(frame[f].mode()[0],\
    \ inplace=True)\n```\n\nUsually, we would have to be careful when using the mean\
    \ since the mean is affected by outliers. However, since we have already marked\
    \ the outlier values as np.nan, they are excluded when calculating the mean. An\
    \ additional caveat comes into play when replacing missing values in the test\
    \ set: since the test set should be treated as unseen data, we must use the mean\
    \ from the training dataset to replace missing values in the test set.\n\nThis\
    \ concludes the necessary data cleaning for our dataset. We should validate our\
    \ work by rechecking for missing values and recalculating the descriptive statistics\
    \ and data histograms.\n\nWith the dataset clean, we can move to the next data\
    \ preparation step: feature engineering.\n\n## Feature engineering\n\n**Feature\
    \ engineering** refers to the process of creating new features or modifying existing\
    \ ones to improve the performance of a machine learning model. In essence, feature\
    \ engineering is using domain knowledge and data understanding to create features\
    \ that make machine learning algorithms work more effectively. It's an art as\
    \ much as a science, requiring creativity, intuition, and a deep understanding\
    \ of the problem.\n\nThe feature engineering process often starts with exploring\
    \ the data to understand its characteristics, distributions, and relationships\
    \ between variables. This exploration phase can reveal potential opportunities\
    \ for feature creation, such as interaction terms, aggregate features, or temporal\
    \ features; for example, if you're working with a dataset containing customer\
    \ transaction data, you might engineer features that capture the frequency of\
    \ transactions, the average transaction value, or the time since the last transaction.\n\
    \nThere are also several standard techniques used in feature engineering. These\
    \ include encoding categorical variables, normalizing numerical variables, creating\
    \ polynomial features, and binning continuous variables. For instance, categorical\
    \ variables are often encoded into numerical formats (such as one-hot or ordinal\
    \ encoding) to be used in mathematical models. Similarly, numerical variables\
    \ are often normalized (such as min-max scaling or standardization) to ensure\
    \ they're on a comparable scale and to prevent certain variables from dominating\
    \ others simply because of their scale.\n\nHowever, feature engineering is not\
    \ a one-size-fits-all process. The appropriate features for a model can depend\
    \ heavily on the specific problem, the algorithm used, and the nature of the data.\
    \ Therefore, feature engineering often requires iterative experimentation and\
    \ evaluation. Despite its challenges, effective feature engineering can significantly\
    \ enhance model performance.\n\n> **Note**\nAs you may have noticed, feature engineering\
    \ requires understanding and exploration of the data, which depends on the engineered\
    \ features' availability. This highlights the cyclical process within the data\
    \ science life cycle: we iterate between data preparation and exploration.\n\n\
    For example, a feature suitable for further engineering in our data is the `datetime`\
    \ field. The specific date and time a measurement was taken are not informative\
    \ to the model for future predictions.\n\nHowever, suppose we extract the year,\
    \ month, day of the month, and hour of the day into new features. In that case,\
    \ the model can capture potential relationships between the power generated and\
    \ different time cycles. The `date` decomposition allows questions such as: Does\
    \ the time of year, seasons, specific months, and so on influence the power generated?\
    \ Or does the time of day, morning, noon, or night have any impact?\n\nWe can\
    \ decompose the date into new features as follows:\n\n```\nframe[\"date_year\"\
    ] = train_df[\"datetime\"].dt.year\nframe[\"date_month\"] = train_df[\"datetime\"\
    ].dt.month\nframe[\"date_day\"] = train_df[\"datetime\"].dt.day\nframe[\"date_hour\"\
    ] = train_df[\"datetime\"].dt.hour\nframe = frame.drop(columns=[\"tracking_id\"\
    , \"datetime\"], axis=1)\n```\n\nIf, after modeling, we find these features to\
    \ be uninformative, we can do further work with the `time` fields to assist in\
    \ modeling. Future directions to explore are aggregations based on specific periods\
    \ or creating a time series by ordering measurements to study trends in power\
    \ generation over time.\n\nWe now proceed to our case study's EDA portion to visualize\
    \ and better understand our data.\n\n## EDA\n\nWe have already done some EDA to\
    \ find missing values and outliers in our dataset. There is no fixed methodology\
    \ for performing EDA on a dataset; some experience and creativity are required\
    \ to guide the process.\n\nBesides gaining insight and understanding of the data,\
    \ the main goal is to attempt to identify patterns and relationships within the\
    \ data. Here, we start with a correlation heatmap to explore any direct correlations\
    \ between features:\n\n![](img/5c9d6611c41357518a5920ff1f360451_134_0.png)\n\n\
    Figure 6.3 – Correlation heatmap for the Wind Turbine dataset\n\nThe correlation\
    \ heatmap in *Figure 6.3* shows a few notable correlations between wind speed\
    \ and atmospheric temperature, engine metrics such as engine temperature, generator\
    \ temperature, and motor torque, and weaker correlations between our date features\
    \ and atmospheric conditions.\n\nNotably, a very strong correlation exists between\
    \ motor torque and generator temperature. Intuitively, this makes sense: if the\
    \ motor produces more torque, it will produce more heat. Since torque is the causative\
    \ feature, we can consider dropping the generator temperature for modeling.\n\n\
    We can also see correlations between power generation and engine metrics, including\
    \ electrical resistance and wind direction. We can anticipate that these features\
    \ will have a significant impact on the model's performance."

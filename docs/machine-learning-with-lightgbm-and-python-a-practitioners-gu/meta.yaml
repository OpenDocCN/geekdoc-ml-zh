    \ Decay Regularization, 2019.\n- [8] A. Dal Pozzolo, O. Caelen, R. Johnson and\
    \ G. Bontempi, “Calibrating Probability with Undersampling for Unbalanced Classification,”\
    \ 2015.\n- [9] T.-Y. Lin, P. Goyal, R. Girshick, K. He and P. Dollár, Focal Loss\
    \ for Dense Object Detection, 2018.\n\n# 第二部分：使用LightGBM的实践机器学习\n\n第二部分深入探讨了支撑实践机器学习工程的复杂过程，首先通过一个名为**Optuna**的框架来了解高效的超参数优化。然后，我们将全面探索数据科学生命周期，展示从问题定义和数据处理到实际数据科学建模应用的严谨步骤。在本部分结束时，重点将转向自动化机器学习，聚焦于旨在简化和精简模型选择与调优的FLAML库。在本部分中，案例研究和实践示例的结合将提供一个清晰的路线图，以充分利用这些先进工具的潜力，强调效率和优化的主题。\n\

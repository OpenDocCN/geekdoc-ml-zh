    Exporting the pipeline allows us to re-instantiate and use it within our production
    code. Next, we''ll look at building an API for our model.


    At this stage, our pipeline (which encapsulates preprocessing, training, optimization,
    and validation) is defined, and we are ready to deploy it to a system. We''ll
    accomplish this by wrapping our model in an API with FastAPI.


    # Building an ML API using FastAPI


    We will now look at building a REST API around our pipeline, enabling consumers
    of our pipeline to get predictions via web requests. Building a web API for a
    model also simplifies integration with other systems and services and is the standard
    method for integration in a microservices architecture.


    To build the API, we use the Python library FastAPI.


    # FastAPI


    FastAPI is a modern, high-performance web framework for building APIs with Python
    3.6+. It was designed from the ground up to be easy to use and enable high-performance
    API development. The key features of FastAPI are its speed and ease of use, making
    it an excellent choice for developing robust, production-ready APIs. FastAPI widely
    adopts Python''s type checking, which aids in catching errors early in the development
    process. It also uses these type hints to provide data validation, serialization,
    and documentation, reducing the boilerplate code developers need to write.


    The performance of FastAPI is one of its defining features. It is on par with
    Node.js and significantly faster than traditional Python frameworks. This speed
    is achieved due to its use of Starlette for the web parts and Pydantic for the
    data parts, and its non-blocking nature makes it suitable for handling many concurrent
    requests.


    FastAPI provides automatic interactive API documentation, a considerable advantage
    while developing complex APIs. Using FastAPI, developers gain access to automatically
    generated interactive API docs via Swagger UI. Swagger UI also provides functionality
    to interact with the REST resources without writing code or using external tooling.
    This feature makes FastAPI very developer-friendly and accelerates the development
    process.'
- md: "FastAPI also supports industry-standard security protocols, such as OAuth2,\
    \ and provides tooling to ease implementation. Much of FastAPI's tooling relies\
    \ on its dependency injection system, allowing developers to manage dependencies\
    \ and handle shared resources efficiently.\n\nFastAPI is well suited to building\
    \ web APIs and microservices for ML models due to its ease of use and high performance,\
    \ allowing ML engineers to focus on the myriad of other concerns surrounding production\
    \ ML deployments.\n\n## Building with FastAPI\n\nTo create a REST API with FastAPI,\
    \ we can create a new Python script and instantiate the FastAPI instance. After\
    \ the instance starts, we can load our model from the file:\n\n```\napp = FastAPI()\n\
    model = joblib.load(\"churn_pipeline.pkl\")\n```\n\nLoading the model at the start\
    \ of the application increases the startup time but ensures that the API is ready\
    \ to serve requests when the application startup completes.\n\nNext, we need to\
    \ implement a REST endpoint to make predictions. Our endpoint accepts input data\
    \ and returns the predictions as JSON. The input JSON is an array of JSON objects,\
    \ as follows:\n\n```\n[\n  {\n    \"customerID\": \"1580-BMCMR\",\n    ...\n \
    \   \"MonthlyCharges\": 87.3,\n    \"TotalCharges\": \"1637.3\"\n  },\n  {\n \
    \   \"customerID\": \"4304-XUMGI\",\n    ...\n    \"MonthlyCharges\": 75.15,\n\
    \    \"TotalCharges\": \"3822.45\"\n  }\n]\n```\n\nWith FastAPI, we implement\
    \ a REST endpoint by creating a function that takes the input data as parameters.\
    \ FastAPI serializes the preceding JSON structure to a Python list of dictionaries.\
    \ Therefore, our function signature is implemented as follows:\n\n```\n@app.post('/predict')\n\
    def predict_instances(\n        instances: list[dict[str, str]]\n) :\n```\n\n\
    We decorate the function using a FastAPI post decorator, specifying the endpoint\
    \ path ('/predict').\n\nTo make the actual predictions for the model, we convert\
    \ the dictionaries to a DataFrame and perform the predictions:\n\n```\ninstance_frame\
    \ = pd.DataFrame(instances)\npredictions = model.predict_proba(instance_frame)\n\
    ```\n\nWe use predict_proba to get the probabilities for each class (Yes or No)\
    \ since we want to send this additional information to the consumers of our API.\
    \ Returning probabilities alongside predictions is a recommended practice, as\
    \ this affords the API consumer more control over the use of the predictions.\
    \ API consumers can decide what probability threshold is good enough for their\
    \ application based on how the predictions are used.\n\nTo return the results\
    \ as JSON, we construct a dictionary that FastAPI then serializes to JSON. We\
    \ use NumPy's argmax to get the index of the highest probability to determine\
    \ the predicted class and amax to get the highest probability itself:\n\n```\n\
    results = {}\nfor i, row in enumerate(predictions):\n    prediction = model.classes_[np.argmax(row)]\n\
    \    probability = np.amax(row)\n    results[i] = {\"prediction\": prediction,\n\
    \                  \"probability\": probability}\n\nreturn results\n```\n\nThe\
    \ preceding code produces a prediction object for each data instance in the input\
    \ list, using the position in the list as an index. When the endpoint is called,\
    \ the following JSON is returned:\n\n```\n{\n    \"0\": {\n        \"prediction\"\
    : \"Yes\",\n        \"probability\": 0.9758797243307111\n    },\n    \"1\": {\n\
    \        \"prediction\": \"No\",\n        \"probability\": 0.8896770039274629\n\
    \    },\n    \"2\": {\n        \"prediction\": \"No\",\n        \"probability\"\
    : 0.9149225087944103\n    }\n}\n```\n\nWe have now built the core of the API endpoint.\
    \ However, we must also pay attention to non-functional concerns such as security.\
    \ Often, ML engineers neglect aspects such as security or performance and focus\
    \ only on ML concerns. We mustn't make this mistake and must ensure we give these\
    \ concerns the necessary attention.\n\n## Securing the API\n\nTo secure our endpoint,\
    \ we'll make use of HTTP Basic authentication. We use a preset username and password,\
    \ which we read from the environment. This allows us to securely pass these credentials\
    \ to the application during deployment and avoids pitfalls such as hardcoding\
    \ the credentials. Our endpoint also needs to be enhanced to accept credentials\
    \ from the user. HTTP Basic authentication credentials are sent as an HTTP header.\n\
    \nWe can implement this as follows. We first set up security for FastAPI and read\
    \ the credentials from the environment:\n\n```\nsecurity = HTTPBasic()\nUSER =\
    \ bytes(os.getenv(\"CHURN_USER\"), \"utf-8\")\nPASSWORD = bytes(os.getenv(\"CHURN_PASSWORD\"\
    ), \"utf-8\")\n```\n\nWe then add the following to the endpoint function:\n\n\
    ```\n@app.post('/predict')\ndef predict_instances(\n    credentials: Annotated[HTTPBasicCredentials,\n\
    \                           Depends(security)],\n    instances: list[dict[str,\
    \ str]]\n):\n    authenticate(credentials.username.encode(\"utf-8\"),\n      \
    \           credentials.password.encode(\"utf-8\"))\n```\n\nThe authenticate function\
    \ validates the received credentials against the API credentials we got from the\
    \ environment. We can use Python's secrets library to do the validation:\n\n```\n\
    def authenticate(username: bytes, password: bytes):\n    valid_user = secrets.compare_digest(\n\
    \        username, USER\n    )\n    valid_password = secrets.compare_digest(\n\
    \        password, PASSWORD\n    )\n    if not (valid_user and valid_password):\n\
    \        raise HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n\
    \            detail=\"Incorrect username or password\",\n            headers={\"\
    WWW-Authenticate\": \"Basic\"},\n        )\n    return username\n```\n\nIf the\
    \ credentials are invalid, we throw an exception with HTTP status code 401, signaling\
    \ that the consumer is not authorized.\n\nOur API endpoint is now fully implemented,\
    \ secured, and ready for deployment. To deploy our API, we'll containerize it\
    \ using Docker.\n\n## Containerizing our API\n\nWe can build a Docker container\
    \ for our API with the following Dockerfile:\n\n```\nFROM python:3.10-slim\n\n\
    RUN apt-get update && apt-get install -y --no-install-recommends apt-utils\nRUN\
    \ apt-get -y install curl\nRUN apt-get install libgomp1\n\nWORKDIR /usr/src/app\n\
    \nCOPY requirements.txt ./\nRUN pip install --no-cache-dir -r requirements.txt\n\
    COPY . .\n\nCMD [ \"uvicorn\", \"telco_churn_api:app\", \"--host\", \"0.0.0.0\"\
    , \"--port\", \"8080\" ]\n```\n\nThe Dockerfile is straightforward: we start with\
    \ a base Python 3.10 image and install some OS dependencies that LightGBM needs\
    \ (libgomp1). We then set up the FastAPI app: we copy the Python requirements\
    \ file, install all of them, and then copy the necessary source files (using COPY\
    \ . .).\n\nFinally, we run a Uvicorn server, listening on all addresses on port\
    \ 8080. Uvicorn is an ASGI web server implementation for Python that supports\
    \ async I/O, significantly increasing the web server's throughput. We bind to\
    \ port 8080, our deployment platform's default port.\n\nWe can build and run the\
    \ Docker image using the following commands, passing the username and password\
    \ environment variables:\n\n```\ndocker build . -t churn_api:latest\ndocker run\
    \ --rm -it -e CHURN_USER=***** -e CHURN_PASSWORD=*********** -p 8080:8080 churn_api:latest\n\
    ```\n\nThe API should now be available on your localhost, on port 8080, secured\
    \ behind the credentials you provide in the environment variables.\n\nWith our\
    \ application containerized, we are ready to deploy our application to any platform\
    \ that supports containers. For the churn application, we'll deploy it to Google\
    \ Cloud Platform.\n\n## Deploying LightGBM to Google Cloud\n\nWe'll leverage the\
    \ **Google Cloud Run** platform to deploy our application to Google Cloud Platform.\n\
    \nGoogle Cloud Run is a serverless platform that allows you to develop and run\
    \ applications without worrying about infrastructure management. Cloud Run allows\
    \ developers to run their applications in a secure, scalable, and zero-ops environment.\
    \ Cloud Run is fully managed, meaning all infrastructure (such as servers and\
    \ load balancers) is abstracted away, allowing users to focus on running their\
    \ applications. Cloud Run also supports full autoscaling, and the number of running\
    \ containers automatically increases to respond to increasing load. Cloud Run\
    \ is also very cost-effective, as you are only charged when the container runs\
    \ and serves requests.\n\nTo use Cloud Run, you need a Google Cloud account and\
    \ need to create a Google Cloud project, enable billing, and set up and initialize\
    \ the **Google Cloud CLI**. The following resources guide you through these steps:\n\
    \n- https://console.cloud.google.com/getting-started\n- https://cloud.google.com/resource-manager/docs/creating-managing-projects\n\
    - https://cloud.google.com/sdk/docs/install\n- https://cloud.google.com/sdk/docs/initializing\n\
    \nOnce the Google Cloud setup is completed, we can deploy our API using the CLI.\
    \ This can be accomplished using a single command:\n\n```\ngcloud run deploy --set-env-vars\
    \ CHURN_USER=*****,CHURN_PASSWORD=***********\n```\n\nRunning the command prompts\
    \ you for a service name and a region to deploy your service. We also set the\
    \ environment variables needed for the security credentials. For deployment, Cloud\
    \ Run creates Cloud Build for you, which automatically builds and stores the Docker\
    \ container and then deploys it to Cloud Run.\n\nOnce the Cloud Run command completes,\
    \ we have deployed a secure, scalable, RESTful web API serving our customer churn\
    \ ML pipeline."
  mdcn: "FastAPI 还支持行业标准的安全协议，例如 OAuth2，并提供工具以简化实现。FastAPI 的许多工具依赖于其依赖注入系统，允许开发者高效地管理依赖并处理共享资源。\n\
    \nFastAPI 非常适合构建用于机器学习模型的 Web API 和微服务，因为它易于使用且性能高，使机器学习工程师能够专注于围绕生产环境机器学习部署的众多其他问题。\n\
    \n## 使用 FastAPI 构建\n\n要使用 FastAPI 创建 REST API，我们可以创建一个新的 Python 脚本并实例化 FastAPI\
    \ 实例。实例启动后，我们可以从文件中加载模型：\n\n```\napp = FastAPI()\nmodel = joblib.load(\"churn_pipeline.pkl\"\
    )\n```\n\n在应用程序启动时加载模型会增加启动时间，但确保 API 在应用程序启动完成后即可提供服务。\n\n接下来，我们需要实现一个 REST 端点来进行预测。我们的端点接受输入数据并以\
    \ JSON 形式返回预测结果。输入 JSON 是一个 JSON 对象数组，如下所示：\n\n```\n[\n  {\n    \"customerID\"\
    : \"1580-BMCMR\",\n    ...\n    \"MonthlyCharges\": 87.3,\n    \"TotalCharges\"\
    : \"1637.3\"\n  },\n  {\n    \"customerID\": \"4304-XUMGI\",\n    ...\n    \"\
    MonthlyCharges\": 75.15,\n    \"TotalCharges\": \"3822.45\"\n  }\n]\n```\n\n使用\
    \ FastAPI，我们通过创建一个将输入数据作为参数的函数来实现 REST 端点。FastAPI 将前面的 JSON 结构序列化为 Python 字典列表。因此，我们的函数签名实现如下：\n\
    \n```\n@app.post('/predict')\ndef predict_instances(\n        instances: list[dict[str,\
    \ str]]\n) :\n```\n\n我们使用 FastAPI 的 post 装饰器装饰该函数，指定端点路径（'/predict'）。\n\n为了进行实际的模型预测，我们将字典转换为\
    \ DataFrame 并执行预测：\n\n```\ninstance_frame = pd.DataFrame(instances)\npredictions\
    \ = model.predict_proba(instance_frame)\n```\n\n我们使用 `predict_proba` 来获取每个类别（Yes\
    \ 或 No）的概率，因为我们希望将这些额外信息发送给 API 的消费者。在返回预测结果的同时返回概率是一种推荐的做法，因为这赋予了 API 消费者对预测结果使用的更多控制权。API\
    \ 消费者可以根据预测结果的使用方式，决定什么概率阈值对其应用程序来说足够好。\n\n为了将结果作为 JSON 返回，我们构建一个字典，然后由 FastAPI\
    \ 将其序列化为 JSON。我们使用 NumPy 的 `argmax` 来获取最高概率的索引以确定预测类别，并使用 `amax` 来获取最高概率本身：\n\n\
    ```\nresults = {}\nfor i, row in enumerate(predictions):\n    prediction = model.classes_[np.argmax(row)]\n\
    \    probability = np.amax(row)\n    results[i] = {\"prediction\": prediction,\n\
    \                  \"probability\": probability}\n\nreturn results\n```\n\n前面的代码为输入列表中的每个数据实例生成一个预测对象，使用列表中的位置作为索引。当调用该端点时，将返回以下\
    \ JSON：\n\n```\n{\n    \"0\": {\n        \"prediction\": \"Yes\",\n        \"\
    probability\": 0.9758797243307111\n    },\n    \"1\": {\n        \"prediction\"\
    : \"No\",\n        \"probability\": 0.8896770039274629\n    },\n    \"2\": {\n\
    \        \"prediction\": \"No\",\n        \"probability\": 0.9149225087944103\n\
    \    }\n}\n```\n\n我们现在已经构建了 API 端点的核心。然而，我们也必须关注非功能性问题，例如安全性。通常，机器学习工程师会忽视安全或性能等方面，只关注机器学习问题。我们绝不能犯这个错误，必须确保给予这些问题必要的关注。\n\
    \n## 保护 API 安全\n\n为了保护我们的端点，我们将使用 HTTP 基本身份验证。我们使用预设的用户名和密码，这些凭据从环境变量中读取。这允许我们在部署期间安全地将这些凭据传递给应用程序，并避免诸如硬编码凭据之类的陷阱。我们的端点还需要增强以接受用户的凭据。HTTP\
    \ 基本身份验证凭据作为 HTTP 头发送。\n\n我们可以如下实现。首先为 FastAPI 设置安全并从环境变量中读取凭据：\n\n```\nsecurity\
    \ = HTTPBasic()\nUSER = bytes(os.getenv(\"CHURN_USER\"), \"utf-8\")\nPASSWORD\
    \ = bytes(os.getenv(\"CHURN_PASSWORD\"), \"utf-8\")\n```\n\n然后我们将以下内容添加到端点函数中：\n\
    \n```\n@app.post('/predict')\ndef predict_instances(\n    credentials: Annotated[HTTPBasicCredentials,\n\
    \                           Depends(security)],\n    instances: list[dict[str,\
    \ str]]\n):\n    authenticate(credentials.username.encode(\"utf-8\"),\n      \
    \           credentials.password.encode(\"utf-8\"))\n```\n\n`authenticate` 函数根据我们从环境变量获取的\
    \ API 凭据验证接收到的凭据。我们可以使用 Python 的 `secrets` 库进行验证：\n\n```\ndef authenticate(username:\
    \ bytes, password: bytes):\n    valid_user = secrets.compare_digest(\n       \
    \ username, USER\n    )\n    valid_password = secrets.compare_digest(\n      \
    \  password, PASSWORD\n    )\n    if not (valid_user and valid_password):\n  \
    \      raise HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n\
    \            detail=\"Incorrect username or password\",\n            headers={\"\
    WWW-Authenticate\": \"Basic\"},\n        )\n    return username\n```\n\n如果凭据无效，我们将抛出一个\
    \ HTTP 状态码为 401 的异常，表示消费者未被授权。\n\n我们的 API 端点现已完全实现、受到保护并准备好部署。为了部署我们的 API，我们将使用\
    \ Docker 将其容器化。\n\n## 将 API 容器化\n\n我们可以使用以下 Dockerfile 为我们的 API 构建一个 Docker 容器：\n\
    \n```\nFROM python:3.10-slim\n\nRUN apt-get update && apt-get install -y --no-install-recommends\
    \ apt-utils\nRUN apt-get -y install curl\nRUN apt-get install libgomp1\n\nWORKDIR\
    \ /usr/src/app\n\nCOPY requirements.txt ./\nRUN pip install --no-cache-dir -r\
    \ requirements.txt\nCOPY . .\n\nCMD [ \"uvicorn\", \"telco_churn_api:app\", \"\
    --host\", \"0.0.0.0\", \"--port\", \"8080\" ]\n```\n\nDockerfile 很直接：我们从一个基础的\
    \ Python 3.10 镜像开始，并安装 LightGBM 所需的一些操作系统依赖（libgomp1）。然后我们设置 FastAPI 应用：复制 Python\
    \ 依赖文件，安装所有依赖，然后复制必要的源文件（使用 `COPY . .`）。\n\n最后，我们运行一个 Uvicorn 服务器，监听所有地址的 8080\
    \ 端口。Uvicorn 是一个 Python 的 ASGI Web 服务器实现，支持异步 I/O，显著提高了 Web 服务器的吞吐量。我们绑定到 8080\
    \ 端口，这是我们部署平台的默认端口。\n\n我们可以使用以下命令构建和运行 Docker 镜像，传递用户名和密码环境变量：\n\n```\ndocker\
    \ build . -t churn_api:latest\ndocker run --rm -it -e CHURN_USER=***** -e CHURN_PASSWORD=***********\
    \ -p 8080:8080 churn_api:latest\n```\n\n现在，API 应该可以在你的 localhost 上通过 8080 端口访问，并受到你在环境变量中提供的凭据的保护。\n\
    \n我们的应用程序容器化后，我们就可以将其部署到任何支持容器的平台。对于客户流失应用程序，我们将把它部署到 Google Cloud Platform。\n\
    \n## 将 LightGBM 部署到 Google Cloud\n\n我们将利用 **Google Cloud Run** 平台将我们的应用程序部署到 Google\
    \ Cloud Platform。\n\nGoogle Cloud Run 是一个无服务器平台，允许你开发和运行应用程序，而无需担心基础设施管理。Cloud\
    \ Run 允许开发者在安全、可扩展且零运维的环境中运行他们的应用程序。Cloud Run 是完全托管的，这意味着所有基础设施（如服务器和负载均衡器）都被抽象化，使用户能够专注于运行他们的应用程序。Cloud\
    \ Run 还支持完全自动扩缩容，运行容器的数量会自动增加以响应不断增加的负载。Cloud Run 也非常经济高效，因为你只在容器运行并提供服务时才被收费。\n\
    \n要使用 Cloud Run，你需要一个 Google Cloud 账户，并需要创建一个 Google Cloud 项目、启用计费并设置和初始化 **Google\
    \ Cloud CLI**。以下资源将指导你完成这些步骤：\n\n- https://console.cloud.google.com/getting-started\n\
    - https://cloud.google.com/resource-manager/docs/creating-managing-projects\n\
    - https://cloud.google.com/sdk/docs/install\n- https://cloud.google.com/sdk/docs/initializing\n\
    \n一旦 Google Cloud 设置完成，我们就可以使用 CLI 部署我们的 API。这可以通过一个命令完成：\n\n```\ngcloud run deploy\
    \ --set-env-vars CHURN_USER=*****,CHURN_PASSWORD=***********\n```\n\n运行该命令会提示你输入服务名称和部署服务的区域。我们还设置了安全凭据所需的环境变量。对于部署，Cloud\
    \ Run 会为你创建 Cloud Build，它会自动构建并存储 Docker 容器，然后将其部署到 Cloud Run。\n\nCloud Run 命令完成后，我们就部署了一个安全、可扩展的\
    \ RESTful Web API，用于提供我们的客户流失机器学习管道服务。"

    - 第7章，使用LightGBM和FLAML进行AutoML\n\n# 5 使用Optuna进行LightGBM参数优化\n\n前面的章节讨论了LightGBM超参数及其对构建模型的影响。构建新模型时的一个基本问题是找到能实现最佳性能的最优超参数。\n\

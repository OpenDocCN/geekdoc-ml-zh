    Figure 3.4 – k-fold cross-validation with k = 3; the original dataset is shuffled
    and split into 3 equal parts (or folds); training and validation are repeated
    for each combination of subsampled data, and the average performance is reported


    Using a high value for *k* reduces the chance that the model coincidentally shows
    good performance and indicates how the model might perform in the real world.
    However, the entire training process is repeated for each fold, which could be
    computationally expensive and time-consuming. Therefore, we need to balance the
    resources available with the need to validate the model. A typical value for *k*
    is 5 (the default for scikit-learn), also called 5-fold cross-validation.


    # Stratified *k*-fold validation


    A problem that might arise with k-fold cross-validation is that, due to chance,
    a fold may contain samples from only a single class. **Stratified sampling** solves
    this issue by preserving the percentage of samples for each class when creating
    folds. In this way, each fold has the same distribution of classes as the original
    dataset. When applied to cross-validation, this technique is called stratified
    k-fold cross-validation.


    # Parameter optimization


    **Parameter optimization**, also called parameter tuning, is the process of finding
    good hyperparameters for the model and training process specific to the problem
    being solved. In the previous examples of training models, we have been setting
    the model and training algorithm''s parameters based on intuition and minimal
    experimentation. There is no guarantee that the parameter choices were optimal
    for the optimization problem.


    But how might we go about finding the best parameter choices? A naïve strategy
    is to try an extensive range of values for a parameter, find the best value, and
    then repeat the process for the following parameter. However, it is frequently
    the case that parameters are **co-dependent**. When we change'
  - "[PAGE 75]\n\none parameter, the optimal value for another might differ. An excellent\
    \ example of co-dependence in GBDTs is the number of boosting rounds and the learning\
    \ rate. Having a small learning rate necessitates more boosting rounds. Therefore,\
    \ optimizing the learning rate and then, independently, the number of boosting\
    \ rounds is unlikely to produce optimal results. *Both parameters must be optimized\
    \ in unison.*\n\n# Grid search\n\nAn approach that accounts for parameter co-dependence\
    \ is grid search. With grid search, a parameter grid is set up. The grid consists\
    \ of a range of values to try for each parameter we are optimizing. An exhaustive\
    \ search is then performed, training and validating the model on each possible\
    \ combination of parameters.\n\nHere is an example of a parameter grid for three\
    \ parameters:\n\n```\ngrid = {\n    'learning_rate': [0.001, 0.01, 0.1, 0.2, 0,5],\n\
    \    'num_rounds': [20, 40, 60, 80, 100],\n    'num_leaves': [2, 16, 32, 64, 128,\
    \ 256],\n}\n```\n\nEach parameter is specified with a range of possible values.\
    \ The previous grid would require 150 trails to search.\n\nSince grid search is\
    \ exhaustive, it has the advantage that it is guaranteed to find the best combination\
    \ of parameters within the ranges specified. However, the downside to grid search\
    \ is the cost. Trying each possible combination of parameters is very expensive\
    \ and quickly becomes intractable for many parameters and large parameter ranges.\n\
    \nScikit-learn provides a utility class to implement grid search and perform cross-validation\
    \ at the same time. `GridSearchCV` takes a model, a parameter grid, and the number\
    \ of cross-validation folds as parameters. `GridSearchCV` then proceeds to search\
    \ the grid for the best parameters, using cross-validation to validate the performance\
    \ for each combination of parameters. We'll illustrate the use of `GridSearchCV`\
    \ in the next section.\n\nParameter optimization is a crucial part of the modeling\
    \ process. Finding suitable parameters for a model could be the difference between\
    \ a successful or failed process. However, as discussed previously, parameter\
    \ optimization is also often enormously expensive regarding time and computational\
    \ complexity, necessitating a trade-off between cost and performance.\n\n# Predicting\
    \ student academic success\n\nWe now move on to our example. We build a model\
    \ to predict students' dropout rate based on a range of social and economic factors\
    \ using LightGBM [7] (https://archive-beta.ics.uci.edu/dataset/697/predict+students+dropout+and+academic+success).\
    \ The data is available in CSV format. We start by exploring the data."

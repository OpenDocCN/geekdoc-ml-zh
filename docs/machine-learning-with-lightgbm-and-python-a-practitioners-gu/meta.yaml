    \n### 模型训练和评估\n\n我们几乎准备好训练模型了，但还有一个问题需要解决：我们必须处理类别不平衡。\n\n### 处理类别不平衡\n\n类别不平衡可能会使任何训练好的模型偏向于多数类或多个多数类。尽管基于树的算法比大多数其他学习算法更善于处理不平衡类别，但在建模之前处理类别不平衡仍然是最佳实践。\n\
    \n通常，可以采用以下策略来处理不平衡类别：\n\n- **重采样技术：**\n  - **过采样：** 这涉及增加少数类中的样本数量以匹配多数类。一种常见的技术是\
    \ **合成少数类过采样技术 (SMOTE)**，它基于现有样本创建新样本。\n  - **欠采样：** 这涉及减少多数类中的样本数量以匹配少数类。这种方法的一个风险是可能丢失有价值的数据。\n\
    - **代价敏感学习：** 这种方法在训练过程中为少数类的错误分类分配更高的代价。其思想是让模型更加关注少数类。LightGBM 通过 `class_weight`（用于多类）和\

  md: 'It''s important to note how MLOps fits into the broader software ecosystem.
    Just like DevOps has bridged the gap between development and operations in software
    engineering, MLOps aims to do the same for ML. By promoting shared understanding
    and responsibilities, MLOps can lead to more successful ML projects.


    MLOps is a rapidly evolving field becoming increasingly important as more businesses
    adopt ML. By applying principles from DevOps to the unique challenges of ML, MLOps
    provides a framework for managing the end-to-end ML life cycle, from initial experimentation
    to robust, scalable deployment. MLOps emphasizes standardization, automation,
    reproducibility, monitoring, testing, and collaboration to enable high-throughput
    ML systems.


    We''ll now look at a practical example of creating an ML pipeline using scikit-learn
    and deploying the pipeline behind a REST API.


    # Deploying an ML pipeline for customer churn


    For our practical example, we''ll use the telecommunication (telco) Customer Churn
    dataset we worked with in *Chapter 5, LightGBM Parameter Optimization with Optuna*.
    The dataset consists of descriptive information for each customer (such as gender,
    billing information, and charges) and whether the customer has left the telco
    provider (churn is *yes* or *no*). Our task is to build a classification model
    to predict churn.


    Further, we''d like to deploy the model behind a REST API such that it can be
    integrated into a more extensive software system. The REST API should have an
    endpoint that makes predictions for data passed to the API.


    We''ll use **FastAPI**, a modern, high-performance Python web framework, to build
    our API. Finally, we''ll deploy our model and API to Google Cloud Platform using
    Docker.


    # Building an ML pipeline using scikit-learn


    We will start by building an ML pipeline using scikit-learn''s `Pipeline` toolset.
    Our pipeline should encapsulate data cleaning and feature engineering steps, then
    build and tune an appropriate model.


    We''ll evaluate two algorithms for modeling: LightGBM and random forest, and as
    such, it''s unnecessary to perform any scaling or normalization of the data. However,
    the dataset has a unique identifier for each customer, `customerID`, which we
    need to remove.


    Further, the dataset consists of numerical and categorical features, and we must
    implement one-hot encoding for the categorical features.


    # Pipeline preprocessing steps


    To perform these steps within a scikit-learn pipeline, we''ll use `ColumnTransformer`.
    `ColumnTransformer` is a `Pipeline` transformer that operates only on a subset
    of the columns'
  merge: -1
  pgno: 173
- img_proc: true
  md: "in the dataset. The transformer accepts a list of tuples in the form (name,\
    \ transformer, columns). It applies the sub-transformers to the specified columns\
    \ and concatenates the results such that all resultant features form part of the\
    \ same result set.\n\nFor example, consider the following DataFrame and ColumnTransformer:\n\
    \n```\ndf = pd.DataFrame({\n    \"price\": [29.99, 99.99, 19.99],\n    \"description\"\
    : [\"Luxury goods\", \"Outdoor goods\",\n        \"Sports equipment\"],\n})\n\
    ct = ColumnTransformer(\n    [(\"scaling\", MinMaxScaler(), [\"price\"]),\n  \
    \   (\"vectorize\", TfidfVectorizer(), \"description\")])\ntransformed = ct.fit_transform(df)\n\
    ```\n\nHere, we have a DataFrame with two columns: `price` and `description`.\
    \ A column transformer is created with two sub-transformers: a scaling transformer\
    \ and a vectorizer. The scaling transformer applies min-max scaling only to the\
    \ `price` column. The vectorizer applies TF-IDF vectorization only to the `description`\
    \ column. When `fit_transform` is called, a *single* array is returned with a\
    \ column for the scaled price and the columns representing the word vectors.\n\
    \n> **Note**\nTF-IDF, or **term frequency-inverse document frequency**, is just\
    \ one way of extracting a feature from text. Analyzing and extracting features\
    \ from text, and natural language processing in general, is a broad field within\
    \ ML that we won't be delving into deeply here. You are encouraged to read further\
    \ on the topic at https://scikit-learn.org/stable/modules/feature_extraction.html#text-feature-extraction.\n\
    \nWe can set up our preprocessing for the Customer Churn dataset as a single `ColumnTransformer`.\
    \ We first define the two individual transformers, `id_transformer` and `encode_transformer`,\
    \ that apply to the ID columns and the categorical features:\n\n```\nid_transformer\
    \ = (\n    \"customer_id\",\n    CustomerIdTransformer(id_columns),\n    id_columns\n\
    )\nencode_transformer = (\n    \"encoder\",\n    OneHotEncoder(sparse_output=False),\n\
    \    categorical_features\n)\n```"
  merge: -1
  pgno: 174
- img_proc: true
  md: "And then combine the separate transformers into `ColumnTransformer`:\n\n```\n\
    preprocessor = ColumnTransformer(\n    transformers=[\n        id_transformer,\n\
    \        encode_transformer,\n    ],\n    remainder='passthrough'\n)\n```\n\n\
    `ColumnTransformer` is defined with the `remainder='passthrough'` parameter. The\
    \ `remainder` parameter specifies what happens to the columns that `ColumnTransformer`\
    \ does not transform. These columns are dropped by default, but we would like\
    \ to pass them through, untouched, to include them in the dataset.\n\nThe encoding\
    \ transformer creates and applies `OneHotEncoder` to the categorical features.\n\
    \nFor illustrative purposes, we have created a custom transformer class to maintain\
    \ the list of ID columns and drop them from the data during transformation.\n\n\
    The class is shown here:\n\n```\nclass CustomerIdTransformer(BaseEstimator, TransformerMixin):\n\
    \    def __init__(self, id_columns):\n        self.id_columns = id_columns\n\n\
    \    def fit(self, X, y=None):\n        return self\n\n    def transform(self,\
    \ X, y=None):\n        return X.drop(columns=self.id_columns, axis=1)\n```\n\n\
    As we can see, the class extends `BaseEstimator` and `TranformerMixin` from the\
    \ scikit-learn base classes and must implement `fit` and `transform`. Implementing\
    \ these methods also makes it suitable as a transformer in a pipeline. Implementing\
    \ `fit` is optional if required; in our case, nothing is done during `fit`. Our\
    \ transformation step drops the relevant columns."
  merge: -1
  pgno: 175
- img_proc: true
  md: "> **Note**\nIt's important to encapsulate the functionality to drop irrelevant\
    \ columns (in this case, the ID column) within the pipeline itself. When deploying\
    \ the pipeline for production use, we expect these columns to be passed to the\
    \ pipeline when making a prediction. Removing them as part of the pipeline simplifies\
    \ our pipeline's usage for our model's consumers and reduces the chance of user\
    \ mistakes.\n\nThis completes the transformations required for preprocessing,\
    \ and we are ready to move on to the following steps: fitting and tuning the models.\n\
    \n# Pipeline modeling steps\n\nFor the pipeline modeling part, we'll use FLAML.\
    \ We'll also use the opportunity to show how parameters may be passed to steps\
    \ within a pipeline. First, we define the settings for our AutoML model:\n\n```\n\
    automl_settings = {\n    \"time_budget\": 120,\n    \"metric\": \"accuracy\",\n\
    \    \"task\": \"classification\",\n    \"estimator_list\": [\"lgbm\", \"rf\"\
    ],\n    \"custom_hp\": {\n        \"n_estimators\": {\n            \"domain\"\
    : flaml.tune.uniform(20, 500)\n        }\n    },\n    \"verbose\": -1\n}\n```\n\
    \nThe preceding code sets our time budget, optimization metric, and classification\
    \ task for AutoML. We also limit the estimators to LightGBM and a random forest\
    \ model. Finally, we customize the search space by specifying that `n_estimators`\
    \ should be uniformly sampled between 20 and 500.\n\nThe pipeline requires the\
    \ parameter for constituent steps to be prefixed with the step's name and a double\
    \ underscore. We can set up a dictionary to pass these parameters to the AutoML\
    \ class within our pipeline:\n\n```\npipeline_settings = {\n    f\"automl__{key}\"\
    : value for key, value in\n        automl_settings.items()\n}\n```\n\nHere, `automl`\
    \ is the name of the step in the pipeline. As such, for example, the parameters\
    \ for time budget and metric are set as `automl__time_budget`: 120 and `automl__metric`:\
    \ accuracy, respectively."

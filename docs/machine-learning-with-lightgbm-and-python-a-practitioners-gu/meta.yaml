- md: '## Automating feature engineering


    The methods for automating feature engineering are often similar: many possible
    transformations are applied to all existing features, and the usefulness of the
    generated features is tested after modeling. Examples of how transformations generate
    features can be found in the following case study.


    Another method for automating feature engineering is extracting features using
    rules based on the data type of the features. For example, the day, week, month,
    and year could be extracted from a date field. Or the number of characters, lemmas,
    stems, or embeddings of word or sentence features could be calculated.


    As you may notice, the application of feature engineering automation techniques
    relies on technical information about the features at hand, typically the data
    type, alongside correlation and relationships with other features. Importantly,
    there is no domain knowledge applied when creating new features. This highlights
    one of the shortcomings of AutoML: it cannot handle specific, domain-driven decisions
    that require human expertise. For example, consider a diabetes dataset with a
    feature for fasting blood sugar. A medical professional (domain expert) knows
    that an individual with a fasting blood sugar of 100 to 125 mg/dL is considered
    prediabetic, and any higher is considered diabetic. This continuous feature can
    be engineered to specific classes: normal, prediabetic, and diabetic, simplifying
    the data for modeling. A transformation like this is not possible to achieve with
    AutoML systems.


    ## Automating model selection and tuning


    Areas where AutoML is particularly useful are model selection and hyperparameter
    tuning. Given the plethora of algorithms available, choosing the best one for
    a particular dataset and problem can be daunting. AutoML systems use various techniques,
    including Bayesian optimization and meta-learning, to select the best model. They
    also automate the tuning of hyperparameters to maximize model performance.


    AutoML systems can provide automated cross-validation, reducing the risk of overfitting
    and ensuring the model''s generalizability to unseen data. Once the optimal model
    is selected and trained, many AutoML tools can also help with deployment, making
    the model available for inference on new data.


    Beyond the initial model deployment, some AutoML solutions also provide value
    in ongoing model monitoring and maintenance. As real-world data evolves, models
    may suffer from drift, and their performance can degrade. AutoML can help monitor
    model performance and retrain the model as needed, ensuring that your ML system
    remains effective in the long run.


    ## Risks of using AutoML systems


    As mentioned previously, AutoML systems typically use no domain knowledge to aid
    in feature engineering, model selection, or other automation. Instead, a brute-force
    or scattershot approach of try and see is used.


    The “black box” nature of some AutoML systems can also make it challenging to
    interpret decisions made by the system, making it less suitable for applications
    that require high levels of explainability.


    Therefore, it''s still essential to have a data scientist or domain expert in
    the loop, working alongside the AutoML system, to identify and act on opportunities
    where domain knowledge can lead to better models. However, AutoML systems sometimes
    hinder the data scientist instead of enabling them by creating one extra layer
    between the scientist and the data.


    We''ve already seen one AutoML framework in action. Optuna, which we discussed
    in *Chapter 5, LightGBM Parameter Optimization with Optuna*, is an example of
    an AutoML framework focusing on hyperparameter tuning. In the next section, we
    discuss another AutoML framework: FLAML.


    ## Introducing FLAML


    **FLAML (Fast and Lightweight AutoML)** is a Python library developed by Microsoft
    Research [1]. It is designed to produce high-quality ML models with low computational
    cost automatically. The primary aim of FLAML is to minimize the resources required
    to tune hyperparameters and identify optimal ML models, making AutoML more accessible
    and cost-effective, particularly for users with budget constraints.


    FLAML offers several key features that set it apart. One of these is its efficiency.
    It provides a fast and lightweight solution for ML tasks, minimizing the time
    and computational resources needed. It achieves this without compromising the
    quality of the models it produces. FLAML also emphasizes its versatility across
    various ML algorithms and various application domains.


    The core of FLAML''s efficiency lies in its novel, cost-effective search algorithms.
    These algorithms intelligently explore the hyperparameter space, initially focusing
    on “cheap” configurations. It gradually explores more “expensive” configurations
    as it gains more insights into the search space. This ensures a balanced exploration
    and exploitation, delivering optimized models within user-specified time and resource
    budgets.


    FLAML also excels at the model selection process. It supports various ML algorithms,
    including XGBoost, LightGBM, CatBoost, RandomForest, and various linear models.
    The library can automatically choose the best algorithm for a given dataset and
    optimize its hyperparameters, providing users with an optimal model without extensive
    manual intervention.


    FLAML provides a straightforward, intuitive API that integrates seamlessly with
    existing Python-based data science and ML workflows. Users specify the dataset,
    a time budget (in seconds), and the optimization task, and FLAML handles the rest.
    This user-friendliness and efficiency make it a practical choice for ML beginners
    and seasoned practitioners looking to expedite their workflows.


    The novelty behind FLAML''s efficiency comes from its **hyperparameter optimization
    (HPO)** algorithms. FLAML provides two HPO algorithms: **Cost Frugal Optimization**
    and **BlendSearch**.


    ## Cost Frugal Optimization


    **Cost Frugal Optimization (CFO)** is a local search method that leverages random
    direct search to explore the hyperparameter space [2]. The CFO algorithm starts
    with a low-cost hyperparameter configuration (for LightGBM, a low-cost configuration
    would, for instance, have few boosted trees). It takes randomized steps for a
    fixed number of iterations in the hyperparameter space toward higher cost parameter
    regions.


    The CFO step size is adaptive, meaning the algorithm lowers the step size if there
    is no improvement for several iterations. Doing so means large step sizes aren''t
    taken in unpromising directions with high cost.


    CFO also utilizes random restarts. As a local search algorithm, CFO can get stuck
    in local optima. If no progress is made and the step size is already small, the
    algorithm restarts at a random point.


    In summary, CFO quickly (with large step sizes) attempts to reach more promising
    regions in the search space, using as little of the optimization budget as possible
    (by starting in low-cost regions). CFO continues the search while the optimization
    budget allows, restarting in random areas if stagnation occurs. FLAML allows the
    user to set the optimization budget in seconds.


    ## BlendSearch


    FLAML provides an alternative to the CFO algorithm in BlendSearch. BlendSearch
    differs from CFO by running both a global and local search process using a multithreaded
    approach [3].


    Similar to CFO, BlendSearch starts with a low-cost configuration and proceeds
    with a local search. However, unlike CFO, BlendSearch does not wait for the local
    search to stagnate before exploring new regions. Instead, a global search algorithm
    (such as Bayesian optimization) continually suggests new starting points. Starting
    points are filtered based on their distance to existing points and prioritized
    in terms of cost.


    Each iteration of BlendSearch then chooses whether to continue a local search
    or start at a new global search point based on the performance in the previous
    iteration. Like CFO, configurations proposed by the global search method are validated
    for viability.


    As BlendSearch uses global optimization, BlendSearch is less prone to getting
    stuck in local minima. BlendSearch is recommended over CFO if the hyperparameter
    search space is highly complex. It''s often a good idea to try CFO first and only
    switch to BlendSearch if CFO is struggling.


    ## FLAML limitations


    Despite its advantages, FLAML also has its limitations. The library''s automated
    processes may not consistently outperform manual tuning by experts, particularly
    for complex, domain-specific tasks. Also, as with other AutoML solutions, the
    interpretability of the produced models can be challenging, especially when dealing
    with models such as boosted trees or neural networks.


    FLAML only performs the model selection and tuning part of the ML process. These
    are some of the most time-consuming parts of model development, but FLAML does
    not provide the functionality to perform feature engineering or data preparation.'
  mdcn: '## 自动化特征工程


    自动化特征工程的方法通常相似：对所有现有特征应用多种可能的转换，然后在建模后测试生成特征的有用性。关于转换如何生成特征的示例，可在以下案例研究中找到。


    自动化特征工程的另一种方法是基于特征的数据类型，使用规则提取特征。例如，可以从日期字段中提取日、周、月和年。或者可以计算单词或句子特征的字符数、词元、词干或嵌入向量。


    正如您可能注意到的，特征工程技术的应用依赖于关于手头特征的技术信息，通常是数据类型，以及与其他特征的相关性和关系。重要的是，在创建新特征时并未应用领域知识。这凸显了AutoML的缺点之一：它无法处理需要人类专业知识的特定领域驱动决策。例如，考虑一个包含空腹血糖特征的糖尿病数据集。医疗专业人员（领域专家）知道，空腹血糖在100至125
    mg/dL之间的个体被视为糖尿病前期，更高则被视为糖尿病。这个连续特征可以被工程化为特定类别：正常、糖尿病前期和糖尿病，从而简化建模数据。这样的转换无法通过AutoML系统实现。


    ## 自动化模型选择和调优


    AutoML特别有用的领域是模型选择和超参数调优。鉴于可用的算法众多，为特定数据集和问题选择最佳算法可能令人望而生畏。AutoML系统使用各种技术，包括贝叶斯优化和元学习，来选择最佳模型。它们还自动化超参数的调优，以最大化模型性能。


    AutoML系统可以提供自动交叉验证，降低过拟合风险，并确保模型对未见数据的泛化能力。一旦选择了最优模型并完成训练，许多AutoML工具还可以帮助部署，使模型可用于新数据的推理。


    除了初始模型部署外，一些AutoML解决方案还在持续的模型监控和维护方面提供价值。随着现实世界数据的演变，模型可能会发生漂移，其性能可能会下降。AutoML可以帮助监控模型性能，并根据需要重新训练模型，确保您的机器学习系统长期保持有效。


    ## 使用AutoML系统的风险


    如前所述，AutoML系统通常不使用领域知识来辅助特征工程、模型选择或其他自动化。相反，它们采用一种蛮力或散射式的尝试方法。


    一些AutoML系统的“黑盒”性质也可能使其难以解释系统做出的决策，使其不太适合需要高度可解释性的应用。


    因此，让数据科学家或领域专家参与其中，与AutoML系统协同工作，以识别并利用领域知识可以带来更好模型的机会，仍然至关重要。然而，AutoML系统有时会阻碍数据科学家，而不是赋能他们，因为它在科学家和数据之间增加了一层额外的障碍。


    我们已经看到一个AutoML框架的实际应用。我们在*第5章，使用Optuna进行LightGBM参数优化*中讨论的Optuna，就是一个专注于超参数调优的AutoML框架示例。在下一节中，我们将讨论另一个AutoML框架：FLAML。


    ## 介绍FLAML


    **FLAML（快速轻量级AutoML）** 是由微软研究院开发的一个Python库[1]。它旨在以低计算成本自动生成高质量的机器学习模型。FLAML的主要目标是最大限度地减少调优超参数和识别最佳机器学习模型所需的资源，使AutoML更易于访问且更具成本效益，特别是对于预算有限的用户。


    FLAML提供了几个关键特性，使其与众不同。其中之一是其效率。它为机器学习任务提供了一个快速轻量级的解决方案，最大限度地减少了所需的时间和计算资源。它在实现这一点的同时，并未牺牲其生成模型的质量。FLAML还强调其在各种机器学习算法和应用领域的通用性。


    FLAML效率的核心在于其新颖的、具有成本效益的搜索算法。这些算法智能地探索超参数空间，最初专注于“低成本”配置。随着对搜索空间了解的加深，它会逐渐探索更“昂贵”的配置。这确保了探索和利用之间的平衡，在用户指定的时间和资源预算内交付优化的模型。


    FLAML在模型选择过程中也表现出色。它支持各种机器学习算法，包括XGBoost、LightGBM、CatBoost、RandomForest以及各种线性模型。该库可以自动为给定数据集选择最佳算法并优化其超参数，为用户提供无需大量手动干预的最优模型。


    FLAML提供了一个简单直观的API，可以与现有的基于Python的数据科学和机器学习工作流无缝集成。用户指定数据集、时间预算（以秒为单位）和优化任务，FLAML会处理其余部分。这种用户友好性和效率使其成为机器学习初学者和希望加快工作流程的经验丰富的从业者的实用选择。


    FLAML效率背后的新颖之处在于其**超参数优化（HPO）**算法。FLAML提供两种HPO算法：**成本节约优化**和**BlendSearch**。


    ## 成本节约优化


    **成本节约优化（CFO）** 是一种利用随机直接搜索来探索超参数空间的局部搜索方法[2]。CFO算法从一个低成本的超参数配置开始（例如，对于LightGBM，低成本配置可能具有较少的提升树）。它在超参数空间中朝向更高成本参数区域进行固定次数的随机步进。


    CFO的步长是自适应的，这意味着如果几次迭代都没有改进，算法会减小步长。这样做意味着不会在成本高且前景不佳的方向上采取大步长。


    CFO还利用随机重启。作为一种局部搜索算法，CFO可能会陷入局部最优。如果没有进展且步长已经很小，算法会在一个随机点重新启动。


    总之，CFO快速（使用大步长）尝试到达搜索空间中更有希望的区域，同时尽可能少地使用优化预算（从低成本区域开始）。只要优化预算允许，CFO就会继续搜索，如果出现停滞，则在随机区域重新启动。FLAML允许用户以秒为单位设置优化预算。


    ## BlendSearch


    FLAML在BlendSearch中提供了CFO算法的替代方案。BlendSearch与CFO的不同之处在于，它使用多线程方法同时运行全局和局部搜索过程[3]。


    与CFO类似，BlendSearch从一个低成本配置开始并进行局部搜索。然而，与CFO不同，BlendSearch不会等到局部搜索停滞才探索新区域。相反，一个全局搜索算法（如贝叶斯优化）会持续建议新的起始点。起始点根据其与现有点的距离进行过滤，并按成本优先排序。


    BlendSearch的每次迭代然后根据上一次迭代的性能，选择是继续局部搜索还是从新的全局搜索点开始。与CFO一样，全局搜索方法提出的配置会经过可行性验证。


    由于BlendSearch使用全局优化，它不太容易陷入局部最小值。如果超参数搜索空间高度复杂，建议使用BlendSearch而不是CFO。通常，先尝试CFO，只有在CFO遇到困难时才切换到BlendSearch，这是一个好主意。


    ## FLAML的局限性


    尽管有其优势，FLAML也有其局限性。该库的自动化流程可能并不总是优于专家的手动调优，特别是对于复杂的、特定领域的任务。此外，与其他AutoML解决方案一样，生成模型的可解释性可能具有挑战性，尤其是在处理提升树或神经网络等模型时。


    FLAML仅执行机器学习过程中的模型选择和调优部分。这些是模型开发中最耗时的部分，但FLAML不提供执行特征工程或数据准备的功能。'

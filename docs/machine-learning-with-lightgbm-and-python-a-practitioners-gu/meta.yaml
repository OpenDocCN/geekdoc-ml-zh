    # # 10 LightGBM Models with PostgresML


    In this chapter, we''ll look at a unique MLOps platform called **PostgresML**.
    PostgresML is a Postgres database extension that allows you to train and deploy
    ML models using SQL.


    PostgresML and SQL are a significant departure from the scikit-learn style of
    programming we''ve used throughout this book. However, as we''ll see in this chapter,
    performing ML model development and deployment at the database level has significant
    advantages regarding data movement requirements and inferencing latency.


    The main topics in this chapter are as follows:


    +   - An overview of PostgresML

    - Getting started with PostgresML

    - A customer churn case study with PostgresML and LightGBM


    # ## Technical requirements


    This chapter includes practical examples of working with PostgresML. Docker will
    be used to set up a PostgresML environment and is recommended to run the examples.
    The code for this chapter is available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-10.


    # ## Introducing PostgresML


    PostgresML (https://postgresml.org/) is an extension for Postgres that allows
    practitioners to implement the entire ML life cycle on top of a Postgres database
    for text and tabular data.'
- md: "PostgresML utilizes SQL as the interface to train models, create deployments,\
    \ and make predictions. The use of SQL means model and data operations can be\
    \ combined seamlessly and fit naturally into Postgres DB data engineering environments.\n\
    \nThere are many advantages to having a shared data and ML platform. As we saw\
    \ in the previous chapter, with SageMaker, significant effort is spent on moving\
    \ data around. This is a common problem in ML environments where data, especially\
    \ transactional data, lives in production databases, and complex data engineering\
    \ workflows need to be created to extract data from production sources, transform\
    \ the data for ML use, and load the data into a store that's accessible to the\
    \ ML platform (such as S3 for SageMaker).\n\nBy combining the data store with\
    \ the ML platform, PostgresML does away with moving data from one platform to\
    \ another, saving significant time, effort, storage, and potentially egress costs.\n\
    \nFurther, modeling from live transactional data means that training data is always\
    \ up to date (read directly from the system of record) instead of gated behind\
    \ a refresh. This eliminates errors that stem from working with outdated data\
    \ or data being transformed or loaded incorrectly by ETL jobs.\n\n## Latency and\
    \ round trips\n\nA typical pattern for model deployment, which we've illustrated\
    \ in earlier chapters, is deploying models behind a web API. In microservice terms,\
    \ the model deployment is just another service that can be composed of other services\
    \ to realize the overall system goal.\n\nDeployment as a web service has several\
    \ advantages. First, interoperability with other systems is straightforward via\
    \ network calls when using web standards such as REST. Second, it allows you to\
    \ independently deploy the model code, isolated from the rest of the system, affording\
    \ resilience and independent scaling.\n\nHowever, deploying models as separate\
    \ services also has a significant downside: latency and network round trips.\n\
    \nLet's consider an e-commerce example. A common ML problem in e-commerce settings\
    \ is fraud detection. Here is a system architecture diagram of a simple e-commerce\
    \ system:\n\n![](img/5c9d6611c41357518a5920ff1f360451_217_0.png)\n\nFigure 10.1\
    \ – Simplified e-commerce system architecture illustrating the interaction between\
    \ functional services (transaction) and an ML-driven service (fraud detection)\n\
    \nConsidering the architecture in *Figure 10.1*, the flow for a new transaction\
    \ proceeds as follows:\n\n1.  The transaction is sent to the transaction service.\n\
    2.  The transaction service calls the fraud detection service with the details\
    \ of the new transaction.\n3.  The fraud detection service receives the new transaction,\
    \ loads the relevant model from model storage (if needed), loads historical data\
    \ from the transaction storage, and responds to the transaction service with the\
    \ prediction.\n4.  The transaction service receives the fraud prediction and stores\
    \ the transaction with the relevant classification.\n\nA few variations on this\
    \ workflow might exist. However, due to the separation of the transaction and\
    \ fraud detection services, many network round trips have to be made to process\
    \ a new transaction. Making the fraud prediction also requires fetching historical\
    \ data from the transaction storage to feed to the model.\n\nThe networking call\
    \ latency and round trips add significant overhead to the transaction. If the\
    \ goal is to achieve a low-latency or real-time system, significantly more complex\
    \ architectural components are required – for example, caching for the model and\
    \ transactional data and higher throughput web services.\n\nWith PostgresML, the\
    \ architecture may be simplified as follows:\n\n![](img/5c9d6611c41357518a5920ff1f360451_218_0.png)\n\
    \nFigure 10.2 – Combining the ML services with data storage using PostgresML allows\
    \ for a more straightforward system design\n\nAlthough this example is an oversimplification,\
    \ the point is that significant overhead is added to the overall process of leveraging\
    \ ML models in a service-oriented architecture with separate model services.\n\
    \nThrough PostgresML, we can eliminate the need for separate model storage and\
    \ overheads of loading models and, importantly, combine data storage calls and\
    \ predictions into a single call on the data storage layer with no network overhead\
    \ in between. PostgresML's benchmarks found that the simplified architecture improved\
    \ performance by a factor of 40 within a cloud environment [1].\n\nHowever, there\
    \ are also downsides to this architecture. First, the database is now a single\
    \ point of failure. If the database is unavailable, all models and predictive\
    \ capabilities are also unavailable. Second, the architecture mixes the concerns\
    \ of data storage and ML modeling and inference. Depending on the use case, training\
    \ and deploying ML models has different server infrastructure needs compared to\
    \ serving SQL queries and storing data. The mixture of concerns might force you\
    \ to compromise on one or the other responsibilities or significantly increase\
    \ database infrastructure costs to support all use cases.\n\nIn this section,\
    \ we introduced PostgresML and explained, at a conceptual level, the advantages\
    \ of combining our data store and ML service. Now, we'll look at practically setting\
    \ up and getting started with PostgresML, alongside some basic functionality.\n\
    \n## Getting started with PostgresML\n\nPostgresML, of course, relies on PostgreSQL\
    \ being installed. PostgresML requires PostgreSQL 11, with newer versions also\
    \ supported. PostgresML also requires Python 3.7+ to be installed on your system.\
    \ Both ARM and Intel/AMD architectures are supported.\n\n> **Note**\n> This section\
    \ provides an overview of the steps and dependencies required to start working\
    \ with PostgresML and the features at the time of writing. For up-to-date information,\
    \ check out the official website: https://postgresml.org/. The simplest way to\
    \ run PostgresML is to use Docker. For more information, check out the *Quick\
    \ Start with Docker* documentation: https://postgresml.org/docs/guides/setup/quick_start_with_docker.\n\
    \nThe extension can be installed with official package tools (such as APT) or\
    \ compiled from sources. Once all the dependencies and the extension have been\
    \ installed, `postgresql.conf` must be updated to load the PostgresML library,\
    \ and the database server must be restarted:\n\n```\nshared_preload_libraries\
    \ = 'pgml,pg_stat_statements'\nsudo service postgresql restart\n```\n\nWith PostgresML\
    \ installed, the extension must be created within the database you plan to use.\
    \ This can be done in the regular PostgreSQL way from a SQL console:\n\n```\n\
    CREATE EXTENSION pgml;\n```\n\nVerify the installation, like so:\n\n```\nSELECT\
    \ pgml.version();\n```\n\n## Training models\n\nNow, let's look at the features\
    \ provided by PostgresML. As stated in the introduction, PostgresML has a SQL\
    \ API. The following code examples should be run in a SQL console.\n\nThe extension\
    \ function for training a model is as follows:\n\n```\npgml.train(\n    project_name\
    \ TEXT,\n    task TEXT DEFAULT NULL,\n    relation_name TEXT DEFAULT NULL,\n \
    \   y_column_name TEXT DEFAULT NULL,\n    algorithm TEXT DEFAULT 'linear',\n \
    \   hyperparams JSONB DEFAULT '{}'::JSONB,\n    search TEXT DEFAULT NULL,\n  \
    \  search_params JSONB DEFAULT '{}'::JSONB,\n    search_args JSONB DEFAULT '{}'::JSONB,\n\
    \    preprocess JSONB DEFAULT '{}'::JSONB,\n    test_size REAL DEFAULT 0.25,\n\
    \    test_sampling TEXT DEFAULT 'random'\n)\n```\n\nWe need to supply `project_name`\
    \ as the first parameter. PostgresML organizes models and deployments into projects,\
    \ and projects are uniquely identified by their names.\n\nNext, we specify the\
    \ model's task: either classification or regression. `relation_name` and `y_column_name`\
    \ set up the data for the training run. The relation is the table or view where\
    \ the data is defined, and the Y column's name specifies the target column within\
    \ the relation.\n\nThese are the only required parameters for training. Training\
    \ a linear model (the default) can be done as follows:\n\n```\nSELECT * FROM pgml.train(\n\
    \    project_name => 'Regression Project',\n    task => 'regression',\n    relation_name\
    \ => 'pgml.diabetes',\n    y_column_name => 'target'\n);\n```\n\nWhen `pgml.train`\
    \ is called, PostgresML copies the data into the `pgml` schema: this ensures all\
    \ training runs are reproducible and enables training to be rerun using different\
    \ algorithms or parameters but the same data. `relation_name` and `task` are also\
    \ only required the very first time training is done for a project. To train a\
    \ second model for a project, we can simplify the training call like so:\n\n```\n\
    SELECT * FROM pgml.train(\n    'Regression Project',\n    algorithm => 'lightgbm'\n\
    );\n```\n\nWhen calling this code, a LightGBM regression model is trained on the\
    \ same data.\n\nThe algorithm parameter sets the learning algorithm to use. PostgresML\
    \ supports various algorithms, including LightGBM, XGBoost, scikit-learn's random\
    \ forests and extra trees, **support vector machines (SVMs)**, linear models,\
    \ and unsupervised algorithms such as K-means clustering.\n\nBy default, 25% of\
    \ the data is used as a test set, and the test data is selected at random. This\
    \ can be controlled with the `test_size` and `test_sampling` parameters. Alternative\
    \ test sampling methods select data from the first or last rows.\n\n## Hyperparameter\
    \ optimization\n\nPostgresML supports performing **hyperparameter optimization\
    \ (HPO)** during the training run. The search parameters control the HPO process.\
    \ Two search strategies are supported via `search`: grid search and random search.\
    \ To set the hyperparameter ranges for the HPO, a JSON object is used with the\
    \ `search_params` parameter. HPO parameters are specified using `search_args`.\
    \ Here's an example:\n\n```\nSELECT * FROM pgml.train('Regression Project',\n\
    ```"
  mdcn: "PostgresML 利用 SQL 作为接口来训练模型、创建部署和进行预测。使用 SQL 意味着模型和数据操作可以无缝结合，并自然地融入 Postgres\
    \ DB 数据工程环境。\n\n拥有一个共享的数据和机器学习平台有许多优势。正如我们在上一章中看到的，使用 SageMaker 时，需要花费大量精力来移动数据。这是机器学习环境中的一个常见问题，数据（尤其是事务性数据）存储在生产数据库中，需要创建复杂的数据工程工作流来从生产源提取数据、为机器学习用途转换数据，并将数据加载到机器学习平台可访问的存储中（例如\
    \ SageMaker 的 S3）。\n\n通过将数据存储与机器学习平台相结合，PostgresML 消除了将数据从一个平台移动到另一个平台的需要，从而节省了大量时间、精力、存储空间，并可能节省数据传输成本。\n\
    \n此外，从实时事务性数据建模意味着训练数据始终是最新的（直接从记录系统读取），而不是受限于刷新周期。这消除了因使用过时数据或 ETL 作业错误转换或加载数据而导致的错误。\n\
    \n## 延迟和网络往返\n\n模型部署的一种典型模式（我们在前面的章节中已经说明过）是将模型部署在 Web API 后面。用微服务术语来说，模型部署只是另一个服务，可以与其他服务组合以实现整体系统目标。\n\
    \n作为 Web 服务部署有几个优点。首先，当使用 REST 等 Web 标准时，通过网络调用与其他系统进行互操作非常简单。其次，它允许你独立部署模型代码，与系统其余部分隔离，从而提供弹性和独立扩展能力。\n\
    \n然而，将模型作为单独的服务部署也有一个显著的缺点：延迟和网络往返。\n\n让我们考虑一个电子商务示例。电子商务环境中的一个常见机器学习问题是欺诈检测。这是一个简单电子商务系统的系统架构图：\n\
    \n![](img/5c9d6611c41357518a5920ff1f360451_217_0.png)\n\n图 10.1 – 简化的电子商务系统架构，展示了功能服务（交易）和机器学习驱动服务（欺诈检测）之间的交互\n\
    \n考虑 *图 10.1* 中的架构，新交易的流程如下：\n\n1.  交易被发送到交易服务。\n2.  交易服务使用新交易的详细信息调用欺诈检测服务。\n\
    3.  欺诈检测服务接收新交易，从模型存储中加载相关模型（如果需要），从交易存储中加载历史数据，并向交易服务返回预测结果。\n4.  交易服务接收欺诈预测结果，并将交易与相关分类一起存储。\n\
    \n这个工作流程可能存在一些变体。然而，由于交易服务和欺诈检测服务是分离的，处理一笔新交易需要进行多次网络往返。进行欺诈预测还需要从交易存储中获取历史数据以输入模型。\n\
    \n网络调用延迟和网络往返给交易带来了显著的开销。如果目标是实现低延迟或实时系统，则需要更复杂的架构组件——例如，为模型和事务性数据提供缓存，以及更高吞吐量的\
    \ Web 服务。\n\n使用 PostgresML，架构可以简化如下：\n\n![](img/5c9d6611c41357518a5920ff1f360451_218_0.png)\n\
    \n图 10.2 – 使用 PostgresML 将机器学习服务与数据存储相结合，可以实现更直接的系统设计\n\n尽管这个例子过于简化，但关键点在于，在具有独立模型服务的面向服务的架构中利用机器学习模型，会给整个流程增加显著的开销。\n\
    \n通过 PostgresML，我们可以消除对独立模型存储的需求以及加载模型的开销，更重要的是，可以将数据存储调用和预测合并为对数据存储层的单次调用，中间没有网络开销。PostgresML\
    \ 的基准测试发现，简化的架构在云环境中将性能提高了 40 倍 [1]。\n\n然而，这种架构也有缺点。首先，数据库现在成为单点故障。如果数据库不可用，所有模型和预测能力也将不可用。其次，该架构混合了数据存储和机器学习建模与推理的关注点。根据用例，训练和部署机器学习模型与提供\
    \ SQL 查询和存储数据相比，对服务器基础设施有不同的需求。关注点的混合可能迫使你在其中一个或另一个职责上做出妥协，或者显著增加数据库基础设施成本以支持所有用例。\n\
    \n在本节中，我们介绍了 PostgresML，并从概念层面解释了将数据存储和机器学习服务相结合的优势。现在，我们将实际设置并开始使用 PostgresML，以及一些基本功能。\n\
    \n## PostgresML 入门\n\n当然，PostgresML 依赖于已安装的 PostgreSQL。PostgresML 需要 PostgreSQL\
    \ 11，也支持更新的版本。PostgresML 还需要在你的系统上安装 Python 3.7+。支持 ARM 和 Intel/AMD 架构。\n\n> **注意**\n\
    > 本节概述了开始使用 PostgresML 所需的步骤和依赖项，以及撰写本文时的功能。有关最新信息，请查看官方网站：https://postgresml.org/。运行\
    \ PostgresML 最简单的方法是使用 Docker。更多信息，请查看 *Docker 快速入门* 文档：https://postgresml.org/docs/guides/setup/quick_start_with_docker。\n\
    \n该扩展可以使用官方包工具（如 APT）安装，也可以从源代码编译。安装所有依赖项和扩展后，必须更新 `postgresql.conf` 以加载 PostgresML\
    \ 库，并且必须重启数据库服务器：\n\n```\nshared_preload_libraries = 'pgml,pg_stat_statements'\n\
    sudo service postgresql restart\n```\n\n安装 PostgresML 后，必须在你计划使用的数据库中创建扩展。这可以通过\
    \ SQL 控制台以常规 PostgreSQL 方式完成：\n\n```\nCREATE EXTENSION pgml;\n```\n\n验证安装，如下所示：\n\
    \n```\nSELECT pgml.version();\n```\n\n## 训练模型\n\n现在，让我们看看 PostgresML 提供的功能。如引言所述，PostgresML\
    \ 有一个 SQL API。以下代码示例应在 SQL 控制台中运行。\n\n用于训练模型的扩展函数如下：\n\n```\npgml.train(\n   \
    \ project_name TEXT,\n    task TEXT DEFAULT NULL,\n    relation_name TEXT DEFAULT\
    \ NULL,\n    y_column_name TEXT DEFAULT NULL,\n    algorithm TEXT DEFAULT 'linear',\n\
    \    hyperparams JSONB DEFAULT '{}'::JSONB,\n    search TEXT DEFAULT NULL,\n \
    \   search_params JSONB DEFAULT '{}'::JSONB,\n    search_args JSONB DEFAULT '{}'::JSONB,\n\
    \    preprocess JSONB DEFAULT '{}'::JSONB,\n    test_size REAL DEFAULT 0.25,\n\
    \    test_sampling TEXT DEFAULT 'random'\n)\n```\n\n我们需要提供 `project_name` 作为第一个参数。PostgresML\
    \ 将模型和部署组织到项目中，项目通过其名称唯一标识。\n\n接下来，我们指定模型的任务：分类或回归。`relation_name` 和 `y_column_name`\
    \ 设置训练运行的数据。关系是定义数据的表或视图，Y 列的名称指定关系中的目标列。\n\n这些是训练所需的唯一参数。训练线性模型（默认）可以如下进行：\n\n\
    ```\nSELECT * FROM pgml.train(\n    project_name => 'Regression Project',\n  \
    \  task => 'regression',\n    relation_name => 'pgml.diabetes',\n    y_column_name\
    \ => 'target'\n);\n```\n\n当调用 `pgml.train` 时，PostgresML 会将数据复制到 `pgml` 模式中：这确保了所有训练运行都是可重现的，并允许使用不同的算法或参数但相同的数据重新运行训练。`relation_name`\
    \ 和 `task` 也仅在项目首次训练时需要。要为项目训练第二个模型，我们可以简化训练调用，如下所示：\n\n```\nSELECT * FROM pgml.train(\n\
    \    'Regression Project',\n    algorithm => 'lightgbm'\n);\n```\n\n调用此代码时，将在相同数据上训练一个\
    \ LightGBM 回归模型。\n\nalgorithm 参数设置要使用的学习算法。PostgresML 支持多种算法，包括 LightGBM、XGBoost、scikit-learn\
    \ 的随机森林和极端随机树、**支持向量机 (SVMs)**、线性模型以及无监督算法（如 K-means 聚类）。\n\n默认情况下，25% 的数据用作测试集，并且测试数据是随机选择的。这可以通过\
    \ `test_size` 和 `test_sampling` 参数进行控制。替代的测试采样方法从第一行或最后一行选择数据。\n\n## 超参数优化\n\n\
    PostgresML 支持在训练运行期间执行**超参数优化 (HPO)**。搜索参数控制 HPO 过程。通过 `search` 支持两种搜索策略：网格搜索和随机搜索。要设置\
    \ HPO 的超参数范围，使用 `search_params` 参数的 JSON 对象。HPO 参数使用 `search_args` 指定。以下是一个示例：\n\
    \n```\nSELECT * FROM pgml.train('Regression Project',\n```"

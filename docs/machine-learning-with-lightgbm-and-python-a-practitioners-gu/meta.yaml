    \    return _decay\n```\n\n`reset_parameter` 回调函数接受一个函数作为输入。该函数接收当前迭代次数并返回参数值。学习率衰减是一种随时间降低学习率值的技术。学习率衰减提高了整体准确率。理想情况下，我们希望初始树对纠正预测误差有更大的影响。相反，后来我们希望减少额外树的影响，让它们对误差进行微小的调整。我们实现了一个轻微的指数衰减，在整个训练过程中将学习率从0.09降低到0.078。\n\
    \n现在，我们准备好进行训练了。我们使用 `lgb.train` 来训练模型：\n\n```\ngbm = lgb.train(params, training_set,\
    \ num_boost_round=150, valid_sets=test_set, callbacks=callbacks)\n```\n\n我们使用150轮提升（或提升树）。结合较低的学习率，拥有较多的提升轮次应该能提高准确性。\n\
    \n训练后，我们可以使用 `lgb.predict` 获取测试集的预测结果并计算F1分数：\n\n```\ny_pred = np.argmax(gbm.predict(X_test,\
    \ num_iteration=gbm.best_iteration), axis=1)\nf1_score(y_test - 1, y_pred, average=\"\
    macro\")\n```\n\nLightGBM预测函数输出一个激活值数组，每个类别一个。因此，我们使用 `np.argmax` 选择激活值最高的类别作为预测类别。LightGBM还支持一些绘图函数。例如，我们可以使用\
    \ `plot_metric` 将捕获在 `metrics` 中的 $AUC_{\\mu}$ 结果绘制成图：\n\n```\nlgb.plot_metric(metrics,\
    \ 'auc_mu')\n```\n\n其结果如 *图3.3* 所示。\n\n![](img/5c9d6611c41357518a5920ff1f360451_71_0.png)\n\
    \n图3.3 – 使用 `lgb.plot_metric` 创建的每次训练迭代的 $AUC_{\\mu}$ 指标图\n\n运行前面的代码应该会产生一个F1分数约为0.917的LightGBM\
    \ GBDT树，这与 *第2章，集成学习 – Bagging和Boosting* 中随机森林和极端随机树算法达到的分数一致。然而，LightGBM在达到这些准确度方面明显更快。在我们的硬件上，LightGBM仅用37秒就完成了训练：这比在同一问题和硬件上运行极端随机树快4.5倍，比scikit-learn的\
    \ `GradientBoostingClassifier` 在我们的测试中快60-70倍。\n\n## LightGBM scikit-learn API\n\
    \n我们现在来看看LightGBM的scikit-learn Python API。scikit-learn API提供了四个类：`LGBMModel`、`LGBMClassifier`、`LGBMRegressor`\
    \ 和 `LGBMRanker`。每个类都提供与LightGBM Python API相同的功能，但具有我们之前使用过的便捷scikit-learn接口。此外，scikit-learn类与scikit-learn生态系统的其余部分兼容且可互操作。\n\
    \n让我们使用scikit-learn API复制前面的示例。\n\n数据集的加载方式与之前完全相同。scikit-learn API不需要将数据包装在 `Dataset`\
    \ 对象中。我们也不必将目标类别设为从零开始的索引，因为scikit-learn支持任何类别的标签：\n\n```\ndataset = datasets.fetch_covtype()\n\
    X_train, X_test, y_train, y_test = train_test_split(dataset.data,\n    dataset.target,\
    \ random_state=179)\n```\n\nscikit-learn API也支持LightGBM回调函数；因此，我们使用与之前相同的回调函数：\n\
    \n```\nmetrics = {}\ncallbacks = [\n    lgb.log_evaluation(period=15),\n    lgb.record_evaluation(metrics),\n\
    \    lgb.early_stopping(15),\n    lgb.reset_parameter(learning_rate=learning_rate_decay(0.09,\n\
    \        0.999))\n]\n```\n\n然后，我们像创建任何其他scikit-learn模型一样创建 `LGBMClassifier`。创建分类器时，我们也设置参数：\n\
    \n```\nmodel = lgb.LGBMClassifier(\n    boosting_type='gbdt',\n    n_estimators=150,\n\
    \    num_leaves=120,\n    learning_rate=0.09,\n    force_row_wise=True\n)\n```\n\
    \n注意，我们不必指定类别数量；scikit-learn会自动推断。然后我们调用模型的 `fit` 方法，传入训练和测试数据以及我们的回调函数：\n\n```\n\
    model = model.fit(X_train, y_train, eval_set=(X_test, y_test), eval_metric='auc_mu',\
    \ callbacks=callbacks)\n```\n\n最后，我们用F1分数评估我们的模型。我们不必对预测结果使用 `np.argmax`，因为scikit-learn\
    \ API会自动完成：\n\n```\nf1_score(y_test, model.predict(X_test), average=\"macro\"\
    )\n```\n\n总的来说，我们可以看到通过scikit-learn API使用LightGBM比标准Python API更直接。在我们的硬件上，scikit-learn\
    \ API也比LightGBM API快约40%。本节探讨了使用LightGBM可用的各种Python API的细节。下一节将介绍使用scikit-learn\
    \ API训练LightGBM模型。\n\n## 构建LightGBM模型\n\n本节提供了一个使用LightGBM解决实际问题的端到端示例。我们更详细地探讨了问题的数据准备，并解释了如何为我们的算法找到合适的参数。我们使用LightGBM的多个变体来探索相对性能，并将它们与随机森林进行比较。\n\
    \n## 交叉验证\n\n在深入解决问题之前，我们需要讨论一种更好的验证算法性能的方法。在训练模型时，将数据分成两个或三个子集是标准做法。训练数据用于训练模型，验证数据是训练期间用于验证数据的保留集，测试数据用于训练后验证性能。\n\
    \n在前面的示例中，我们只进行了一次这样的划分，构建了一个单一的训练集和测试集来训练和验证模型。这种方法的问题在于我们的模型可能“运气好”。如果碰巧我们的测试集与训练数据非常匹配，但不代表真实世界的数据，我们可能会报告一个很好的测试误差，尽管我们无法对模型的性能充满信心。\n\
    \n另一种方法是多次进行数据集划分并多次训练模型，每次划分训练一次。这种方法称为 **交叉验证**。\n\n交叉验证最常见的应用是 *k折交叉验证*。在k折交叉验证中，我们选择一个值\

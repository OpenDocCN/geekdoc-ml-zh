  mdcn: "## 零样本自动机器学习\n\n**零样本自动机器学习**是FLAML的一项功能，它不执行超参数优化。相反，它通过分析算法在各种数据集上的性能，离线确定合适的超参数配置。该过程可描述如下：\n\
    \n1.  构建模型之前：\n    -   使用AutoML在多个数据集上训练模型\n    -   将所有数据集的超参数配置、评估结果和元数据存储为零样本解决方案\n\
    2.  为新问题构建模型时：\n    -   使用FLAML分析新数据集与零样本解决方案结果，确定合适的超参数\n    -   使用这些超参数在新数据集上训练模型\n\
    \n第一步仅对给定的模型类型（如LightGBM）执行一次。此后，无需调优即可为任何新问题构建新模型。该解决方案是“零样本”的，因为它在新数据集的首次拟合中就使用了合适的参数。\n\
    \nFLAML的零样本自动机器学习方法具有许多优势：\n\n-   如前所述，无需调优，这在解决新问题时节省了大量计算资源和时间\n-   由于无需调优，因此也不需要验证数据集，可以将更多数据用于训练\n\
    -   用户需要的参与更少\n-   通常，无需更改代码，我们将在下文看到\n\n当然，为模型类型创建零样本解决方案仍然是一项艰巨的任务，需要多样化的数据集和大量计算来训练许多模型。幸运的是，FLAML为许多流行模型提供了预训练的零样本解决方案，包括LightGBM、XGBoost和scikit-learn的随机森林。\n\
    \n要使用零样本解决方案，请将常规的LightGBM导入替换为FLAML封装的版本：\n\n```\nfrom flaml.default import LGBMRegressor\n\
    \nzs_model = LGBMRegressor()\nzs_model.fit(X, y)\n```\n\n调用`fit`会分析X中的数据，选择合适的参数，并使用这些参数训练模型。训练仅执行一次，不进行调优。\n\
    \n至此，我们对FLAML的案例研究结束。正如我们所看到的，FLAML为复杂的模型选择和调优功能提供了直观的API，这在处理机器学习问题时可以节省大量精力。\n\
    \n## 总结\n\n总之，本章讨论了自动机器学习系统及其用途。讨论了自动化特征工程、模型选择和调优的典型方法。我们还提到了使用这些系统相关的风险和注意事项。\n\
    \n本章还介绍了FLAML，一个用于自动机器学习的库，它提供了自动化模型选择和调优过程的工具。我们还介绍了CFO和BlendSearch，这是FLAML提供的两种高效的超参数优化算法。\n\
    \n通过案例研究的形式展示了应用FLAML的实践。除了FLAML，我们还展示了一个名为Featuretools的开源工具，它提供了自动化特征工程的功能。我们展示了如何使用FLAML在固定时间预算内开发优化模型。最后，我们提供了使用FLAML零样本自动机器学习功能的示例，该功能通过分析数据集与已知问题的配置来确定合适的超参数，从而消除了模型调优的需要。\n\
    \n下一章将讨论围绕LightGBM模型构建机器学习流水线，重点是导出、打包和部署LightGBM模型以用于生产。\n\n## 参考文献\n\n- [1]\
    \ C. Wang, Q. Wu, M. Weimer, and E. Zhu, \"FLAML: A Fast and Lightweight AutoML\
    \ Library,\" in MLSys, 2021.\n- [2] Q. Wu, C. Wang and S. Huang, Frugal Optimization\
    \ for Cost-related Hyperparameters, 2020.\n- [3] C. Wang, Q. Wu, S. Huang, and\
    \ A. Saied, \"Economical Hyperparameter Optimization With Blended Search Strategy,\"\
    \ in ICLR, 2021.\n\n# 第三部分：使用LightGBM构建生产就绪的机器学习\n\n在第三部分，我们将深入探讨机器学习解决方案在生产环境中的实际应用。我们将揭示机器学习流水线的复杂性，确保系统化的数据处理和模型构建以获得一致的结果。MLOps，作为DevOps和机器学习的融合，将成为焦点，强调在现实场景中部署和维护健壮的机器学习系统的重要性。通过实践示例，我们将探索在平台（如Google\
    \ Cloud、Amazon SageMaker和创新的PostgresML）上部署机器学习流水线，强调每个平台提供的独特优势。最后，我们将探讨分布式计算和基于GPU的训练，展示加速训练过程和高效管理更大数据集的方法。这一总结性部分将强调将机器学习无缝集成到实用的、生产就绪的解决方案中，为读者提供在动态环境中将模型付诸实践的知识。\n\
    \n本部分将包括以下章节：\n\n-   第8章，使用LightGBM构建机器学习流水线和MLOps\n-   第9章，使用AWS SageMaker进行LightGBM\
    \ MLOps\n-   第10章，使用PostgresML部署LightGBM模型\n-   第11章，使用LightGBM进行分布式和基于GPU的学习\n\
    \n# 8 使用LightGBM构建机器学习流水线和MLOps\n\n本章将重点从数据科学和建模问题转向为我们的机器学习解决方案构建生产服务。我们引入了机器学习流水线的概念，这是一种系统化处理数据和构建模型的方法，以确保一致性和正确性。\n\
    \n我们还介绍了MLOps的概念，这是一种融合了DevOps和机器学习的实践，解决了部署和维护具备生产能力的机器学习系统的需求。\n\n本章包含一个使用scikit-learn构建机器学习流水线的示例，该流水线封装了数据处理、模型构建和调优。我们展示了如何将流水线包装在Web\
    \ API中，暴露一个安全的预测端点。最后，我们还探讨了系统的容器化以及部署到Google Cloud。\n\n本章的主要主题如下：\n\n-   机器学习流水线\n\
    -   MLOps概述\n-   部署用于客户流失预测的机器学习流水线\n\n## 技术要求\n\n本章包含创建scikit-learn流水线、训练LightGBM模型和构建FastAPI应用程序的示例。设置环境的要求可以在完整的代码示例中找到，地址为：https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-8。\n\
    \n## 介绍机器学习流水线\n\n在*第6章，使用LightGBM解决现实世界的数据科学问题*中，我们详细概述了数据科学生命周期，其中包括训练机器学习模型的各个步骤。如果我们只关注训练模型所需的步骤，假设数据已经收集完毕，那么这些步骤如下：\n\
    \n1.  数据清洗和准备\n2.  特征工程\n3.  模型训练和调优\n4.  模型评估\n5.  模型部署\n\n在之前的案例研究中，我们在Jupyter笔记本中手动应用了这些步骤。然而，如果我们将背景转移到一个长期的机器学习项目中会发生什么？如果当新数据可用时我们必须重复这个过程，我们将必须遵循相同的程序才能成功构建模型。\n\
    \n同样，当我们想使用模型对新数据进行评分时，我们必须每次都正确地应用这些步骤，并使用正确的参数和配置。\n\n从某种意义上说，这些步骤构成了数据的流水线：数据进入流水线，完成时产生一个可部署的模型。\n\
    \n正式地说，机器学习流水线是一个系统化和自动化的过程，它指导机器学习项目的工作流程。它涉及几个相互关联的阶段，封装了前面列出的步骤。\n\n机器学习流水线旨在确保这些任务是结构化的、可重复的和高效的，从而更容易管理复杂的机器学习任务。当处理大型数据集，或者将原始数据转换为机器学习模型可用输入的步骤复杂且必须频繁重复时（例如在生产环境中），流水线尤其有益。\n\
    \n流水线中涉及的步骤有一定的灵活性：步骤可以根据流水线的使用方式添加或删除。一些流水线包括数据收集步骤，从各种数据源或数据库中拉取数据，并为机器学习建模准备数据。\n\
    \n许多机器学习服务和框架提供了实现机器学习流水线的功能和实用程序。Scikit-learn通过其`Pipeline`类提供了此功能，我们接下来将进行介绍。\n\
    \n## Scikit-learn流水线\n\nScikit-learn提供了`Pipeline`类作为实现机器学习流水线的工具。`Pipeline`类提供了一个统一的接口来执行一系列与数据和模型相关的任务。流水线依赖于scikit-learn的标准`fit`和`transform`接口来实现操作的链接。每个"

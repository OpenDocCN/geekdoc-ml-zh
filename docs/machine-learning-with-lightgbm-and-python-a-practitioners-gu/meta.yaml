- img_proc: true
  md: 'In order to use the GPU, we have to *compile and build the LightGBM library
    from the source code*. The following instructions assume an Ubuntu Linux build
    environment; steps for other platforms are similar. Before we can build the library,
    we must install a few dependencies.


    Importantly, first, install the GPU drivers for your environment. If you have
    an NVIDIA GPU, also install CUDA. Instructions for doing so are available from
    the respective vendor sites:


    +   - https://docs.nvidia.com/cuda/

    - https://www.amd.com/en/support


    Next, we need to install the OpenCL headers:


    ```

    sudo apt install --no-install-recommends

    sudo apt install --no-install-recommends nvidia-opencl-dev opencl-headers

    ```


    Finally, install the library build dependencies:


    ```

    sudo apt install --no-install-recommends git cmake build-essential libboost-dev
    libboost-system-dev libboost-filesystem-dev

    ```


    We are now ready to compile the LightGBM library with GPU support. Clone the repository
    and build the library, setting the `USE_GPU` flag:


    ```

    git clone --recursive https://github.com/microsoft/LightGBM

    cd LightGBM

    mkdir build

    cd build

    cmake -DUSE_GPU=1 ..

    make -j$(nproc)

    cd ..

    ```


    As mentioned in *Chapter 2, Ensemble Learning – Bagging and Boosting*, LightGBM
    is a C++ library with a Python interface. With the preceding instructions, we
    have built the library with GPU support, but we must build and install the Python
    package to use the library from Python (including the scikit-learn API):


    ```

    cd python-package/

    python setup.py install --user --precompile

    ```


    # Running LightGBM on the GPU


    Running training code on the GPU is straightforward. We set the device parameter
    to either `gpu` or `cuda`:'
  merge: -1
  pgno: 234
- img_proc: true
  md: "```\nmodel = lgb.LGBMClassifier(\n    n_estimators=150,\n    device=\"cuda\"\
    ,\n    is_enable_sparse=False\n)\nmodel = model.fit(X_train, y_train)\n```\n\n\
    As shown in the preceding code, we turn off LightGBM's sparse matrix optimization\
    \ by setting `is_enable_sparse` to `False`. LightGBM's sparse features are not\
    \ supported on GPU devices. Further, depending on your dataset, you might get\
    \ the following warning stating that `multi_logloss` is not implemented:\n\n```\n\
    Metric multi_logloss is not implemented in cuda version. Fall back to evaluation\
    \ on CPU.\n```\n\nNotably, the fallback performed is only for evaluation and not\
    \ training; training is still performed on the GPU. We can validate that the GPU\
    \ is used by checking `nvidia-smi` (for NVIDIA GPUs):\n\n![](img/5c9d6611c41357518a5920ff1f360451_235_0.png)\n\
    \nThe speed-up achieved depends on your GPU. The training time was reduced from\
    \ 171 s to 11 s (a 15-times speed-up) for 150 iterations on the Forest Cover dataset.\n\
    \nThe immense performance gain stemming from using a GPU is especially useful\
    \ when performing parameter tuning. We can use GPU-based training with, for instance,\
    \ Optuna to significantly accelerate the search for optimal parameters. All that's\
    \ needed is to move the model training in the `objective` function to the GPU\
    \ device. When defining the objective function, we specify our Optuna parameter\
    \ ranges as per usual:\n\n```\ndef objective(trial):\n    lambda_l1 = trial.suggest_float(\n\
    \        'lambda_l1', 1e-8, 10.0, log=True),\n```"
  merge: -1

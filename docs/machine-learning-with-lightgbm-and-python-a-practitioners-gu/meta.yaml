    \ of each of the steps in the pipeline are captured in folders within our S3 write\
    \ bucket. It's useful to create variables for each S3 URI to avoid errors when\
    \ repeatedly referring to data, like so:\n\n```\ninput_data_key = f\"s3://{read_bucket}/{read_prefix}\"\

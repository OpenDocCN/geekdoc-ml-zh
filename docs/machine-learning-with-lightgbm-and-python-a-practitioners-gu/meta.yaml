- img_proc: true
  md: "```\nlambda_l2 = trial.suggest_float(\n    'lambda_l2', 1e-8, 10.0, log=True),\n\
    ...\n```\n\nWe then create the model with the Optuna parameters and make sure\
    \ to specify the device as cuda (or gpu):\n\n```\nmodel = lgb.LGBMClassifier(\n\
    \    force_row_wise=True,\n    boosting_type=boosting_type,\n    n_estimators=n_estimators,\n\
    \    lambda_l1=lambda_l1,\n    lambda_l2=lambda_l2,\n    ...\n    learning_rate=learning_rate,\n\
    \    max_bin=max_bin,\n    device=\"cuda\")\n```\n\nThe last part of the objective\
    \ function is to return the cross-validated scores:\n\n```\nscores = cross_val_score(model,\
    \ X_train, y_train, scoring=\"f1_macro\")\nreturn scores.mean()\n```\n\nWe can\
    \ then run a parameter study as we would normally:\n\n```\nsampler = optuna.samplers.TPESampler()\n\
    pruner = optuna.pruners.HyperbandPruner(\n    min_resource=10, max_resource=400,\
    \ reduction_factor=3)\n\nstudy = optuna.create_study(\n    direction='maximize',\
    \ sampler=sampler,\n    pruner=pruner\n)\nstudy.optimize(objective(), n_trials=10,\
    \ gc_after_trial=True, n_jobs=1)\n```\n\nImportantly, we also set the n_jobs parameter\
    \ to 1 here, as running parallel jobs leveraging the GPU could cause unnecessary\
    \ contention and overhead.\n\nThere are a few noteworthy best practices for getting\
    \ the best performance when training on a GPU:\n\n+   - Always verify that the\
    \ GPU is being used. LightGBM returns to CPU training if the GPU is unavailable\
    \ despite setting device=gpu. A good way of checking is with a tool such as nvidia-smi,\
    \ as shown previously, or comparing training times to reference benchmarks."
  merge: -1
  pgno: 236
- img_proc: true
  md: '+   - Use a much smaller `max_bin` size. Large datasets reduce the impact of
    a smaller `max_bin` size, and the smaller number of bins benefits training on
    the GPU. Similarly, use single-precision floats for increased performance if your
    GPU supports it.

    - GPU training works best for large, dense datasets. Data needs to be moved to
    the GPU''s VRAM for training, and if the dataset is too small, the overhead involved
    with moving the data is too significant.

    - Avoid one-hot encoding of feature columns, as this leads to sparse feature matrices,
    which do not work well on the GPU.


    This concludes our section on how to use the GPU with LightGBM. Although the setup
    might be more complex, GPUs offer a significant boost in training speed due to
    their ability to handle thousands of threads simultaneously, allowing for efficient
    parallel processing, especially with large datasets. The massive parallelism of
    GPUs is particularly beneficial for histogram-based algorithms in LightGBM, making
    operations such as building histograms more efficient and effective.


    # Summary


    In this chapter, we discussed two ways of accelerating computing with LightGBM.
    The first is large-scale distributed training across many machines using the Python
    library Dask. We showed how to set up a Dask cluster, how data can be distributed
    to the cluster using the Dask DataFrame, and how to run LightGBM on the cluster.


    Second, we also looked at how to leverage the GPU with LightGBM. Notably, the
    GPU setup is complex, but significant speed-up can be achieved when it''s available.
    We also discussed some best practices for training LightGBM models on the GPU.


    # References


    [1] H. Zhang, S. Si, and C.-J. Hsieh, *GPU-acceleration for Large-scale Tree Boosting*,
    2017.'

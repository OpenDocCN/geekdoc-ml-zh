  md: 'Other issues complicating hyperparameter optimization are as follows:


    +   - **Cost:** For each unique set of hyperparameters (of which there can be
    many), an entire training run, often with cross-validation, must be performed.
    This is highly time-consuming and computationally expensive.

    - **High-dimensional search spaces:** Each parameter can have a vast range of
    potential values, making testing each value impossible.

    - **Parameter interaction:** Optimizing each parameter in isolation is often impossible,
    as some parameters'' values interact with others'' values. A good example is the
    learning rate and the number of estimators in LightGBM: fewer estimators necessitate
    a larger learning rate, and vice versa. This phenomenon is shown in *Figure 5.1*.



    # Decision tree learning


    This section introduces decision tree learning, a machine learning algorithm essential
    to understanding LightGBM. We''ll work through an example of how to build decision
    trees using scikit-learn. This section will also provide some mathematical definitions
    for building decision trees; understanding these definitions is not critical,
    but it will help us understand our discussion of the decision tree hyperparameters.


    Decision trees are tree-based learners that function by asking successive questions
    about the data to determine the result. A path is followed down the tree, making
    decisions about the input using one or more features. The path terminates at a
    leaf node, which represents the predicted class or value. Decision trees can be
    used for classification or regression.


    The following is an illustration of a decision tree fit on the Iris dataset:


    ![](img/5c9d6611c41357518a5920ff1f360451_38_0.png)


    The Iris dataset is a classification dataset where Iris flower sepal and petal
    dimensions are used to predict the type of Iris flower. Each non-leaf node uses
    one or more features to narrow down the samples in the dataset: the root node
    starts with all 150 samples and then splits them based on petal'

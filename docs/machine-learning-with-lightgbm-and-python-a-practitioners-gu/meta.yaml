    overfitting by controlling the complexity of the tree. These parameters provide
    multiple ways of doing so, and finding the best combination of parameters and
    their values is non-trivial. Finding the best hyperparameters is called **hyperparameter
    tuning** and will be covered extensively later in this book.


    A complete list of the hyperparameters can be found at the following places:


    - https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html#sklearn-tree-decisiontreeclassifier

    - https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeRegressor.html#sklearn.tree.DecisionTreeRegressor


    Now, let''s summarize the key takeaways from this chapter.


    ## Summary


    In this chapter, we introduced machine learning as a method of creating software
    by learning to perform a task from a corpus of data instead of relying on programming
    the instructions by hand. We introduced the core concepts of machine learning
    with a focus on supervised learning and illustrated their applications through
    examples with scikit-learn.


    We also introduced decision trees as a machine learning algorithm and discussed
    their strengths and weaknesses, as well as how to control overfitting using hyperparameters.
    We concluded this chapter with examples of how to solve classification and regression
    problems using decision trees in scikit-learn.


    This chapter has given us a foundational understanding of machine learning, enabling
    us to dive deeper into the data science process and the LightGBM library.


    The next chapter will focus on ensemble learning in decision trees, a technique
    where the predictions of multiple decision trees are combined to improve the overall
    performance. Boosting, particularly gradient boosting, will be covered in detail.


    ## References


    - [1] J. R. Quinlan, *C4.5: Programs for machine learning*, Elsevier, 2014.

    - [2] R. J. Lewis, *An introduction to classification and regression tree (CART)
    analysis*, in *Annual meeting of the Society For Academic Emergency Medicine in
    San Francisco, California*, 2000.


    ## 2 Ensemble Learning – Bagging and Boosting


    In the previous chapter, we covered the fundamentals of **machine learning** (ML),
    working with data and models, and concepts such as overfitting and **supervised
    learning** (SL). We also introduced decision trees and saw how to apply them practically
    in scikit-learn.


    In this chapter, we will learn about ensemble learning and the two most significant
    types of ensemble learning: bagging and boosting. We will cover the theory and
    practice of applying ensemble learning to decision trees and conclude the chapter
    by focusing on more advanced boosting methods.


    By the end of this chapter, you will have a good understanding of ensemble learning
    and how to practically build decision tree ensembles through bagging or boosting.
    We will also be ready to dive deep into LightGBM, including its more advanced
    theoretical aspects.


    The main topics we will cover are set out here:


    - Ensemble learning

    - Bagging and random forests

    - **Gradient-boosted decision trees (GBDTs)**

    - Advanced boosting algorithm—**Dropouts meet Multiple Additive Regression Trees
    (DART)**


    ## Technical requirements


    The chapter includes examples of simple ML algorithms and introduces working with
    scikit-learn. You must install a Python environment with scikit-learn, NumPy,
    pandas, and Jupyter. The code for this chapter is available at `https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-2`.


    ## Ensemble learning


    **Ensemble learning** is the practice of combining multiple predictors, or models,
    to create a more robust model. Models can either be of the same type (homogenous
    ensembles) or different types (heterogenous ensembles). Further, ensemble learning
    is not specific to decision trees and can be applied to any ML technique, including
    linear models, **neural networks** (NNs), and more.


    The central idea behind ensemble learning is that by aggregating the results of
    many models, we compensate for the weaknesses of a single model.


    Of course, training the same models on the same data is not helpful in an ensemble
    (as the models will have similar predictions). Therefore, we aim for **diversity**
    in the models. Diversity refers to the degree to which each model in the ensemble
    differs. A high-diversity ensemble has widely different models.


    There are several ways we can ensure diversity in our ensemble. One method is
    to train models on different subsets of the training data. Each model is exposed
    to different patterns and noise in the training data, increasing the diversity
    of the trained models.


    Similarly, we can train each model on a different subset of features in the training
    data. Some features are more valuable than others, and some might be irrelevant,
    leading to diversity in the model predictions.


    We can also train each model with different hyperparameters, leading to different
    models of varying complexity and ability. The impact of hyperparameters is especially
    pronounced in the case of decision trees, where the hyperparameters significantly
    impact the structure of the trees, leading to very different models.


    Finally, we could diversify the ensemble by using different types of models. Each
    model has unique strengths and weaknesses, leading to diversity in the ensemble.


    The **ensemble learning method** refers to how we introduce diversity in ensemble
    models by specifying how we train the member models and how we combine the results
    of the models. The most common ensemble methods are set out here:


    - **Bootstrap aggregation (bagging)**: These are methods where models are trained
    on subsets of the training data (either samples or features), and the predictions
    are aggregated.

    - **Boosting**: This involves iteratively training models on the errors of previous
    models. The final prediction is made by combining the prediction of all models
    in the chain.

    - **Stacking**: This involves methods where multiple base models are trained,
    then a higher-order model (known as a meta-model) is trained to learn from the
    base model predictions and make the final prediction.

    - **Blending**: This is very similar to stacking. However, the meta-model is trained
    on predictions made by the base models on a *hold-out set* (a part of the training
    data the base learners were not trained on) instead of the whole training set.


    The purpose of ensemble learning methods is to improve our prediction performance,
    and there are several ways ensembles improve the performance over individual models,
    as outlined here:


    - **Improved accuracy**: By combining predictions, we increase the likelihood
    that the final prediction is accurate as, in aggregate, models make fewer mistakes.

    - **Improved generalization and overfitting**: By aggregating predictions, we
    reduce the variance in the final prediction, improving generalization. Further,
    in some ensemble methods, the models cannot access all data (bagging ensembles),
    reducing noise and overfitting.

    - **Improved prediction stability**: The aggregation of predictions reduces the
    random fluctuations of individual predictions. Ensembles are less sensitive to
    outliers, and outlying predictions of member models have a limited impact on the
    final prediction.


    Decision trees are well suited for ensemble learning, and decision tree-specific
    algorithms exist for ensemble learning. The following section discusses bagging
    ensembles in decision trees focusing on **random forests**.


    ## Bagging and random forests


    **Bagging** is an ensemble method where multiple models are trained on subsets
    of the training data. The models’ predictions are combined to make a final prediction,
    usually by taking the average for numerical prediction (for regression) or the
    majority vote for a class (for classification). When training each model, we select
    a subset of data from the original training dataset with replacement—that is,
    a specific training pattern can be a member of multiple subsets. Since each model
    is only presented with a sample of the training data, no single model can “memorize”
    the training data, which reduces overfitting. The following diagram illustrates
    the bagging process:'

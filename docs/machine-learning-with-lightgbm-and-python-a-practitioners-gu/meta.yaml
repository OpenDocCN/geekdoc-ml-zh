    df.columns = df.columns.str.strip().str.replace(' ', '_')\ndf = df.drop(columns=[\"\
    Nacionality\", \"International\"], axis=1)\ndf[\"Target\"]=df[\"Target\"].map({\n\
    \    \"Dropout\":0,\n    \"Enrolled\":1,\n    \"Graduate\":2\n})\nX = df.drop(columns=[\"\
    Target\"], axis=1)\ny = df[\"Target\"]\n```\n\nWe train and compare four models:\
    \ a LightGBM GBDT, a LightGBM DART tree, a LightGBM DART tree with GOSS, and a\
    \ scikit-learn random forest.\n\nWe'll perform parameter optimization with 5-fold\
    \ cross-validation using GridSearchCV to ensure good performance for the models.\n\
    \nThe following code sets up the parameter optimization for the GBDT. A similar\
    \ pattern is followed for the other models, which can be seen in the source code:\n\
    \n```python\ndef gbdt_parameter_optimization():\n    params = {\n        \"max_depth\"\
    : [-1, 32, 128],\n        \"n_estimators\": [50, 100, 150],\n        \"min_child_samples\"\
    : [10, 20, 30],\n        \"learning_rate\": [0.001, 0.01, 0.1],\n        \"num_leaves\"\
    : [32, 64, 128]\n    }\n    model = lgb.LGBMClassifier(force_row_wise=True, boosting_type=\"\
    gbdt\", verbose=-1)\n    grid_search = GridSearchCV(estimator=model, param_grid=params,\
    \ cv=5, verbose=10)\n    grid_search.fit(X, y)\n    return grid_search\nresults\
    \ = gbdt_parameter_optimization()\nprint(results.best_params_)\nprint(results.best_score_)\n\
    ```\n\nRunning the preceding code takes some time, but once completed, it prints\
    \ the best parameters found along with the score of the best model.\n\nAfter all\
    \ the models are trained, we can evaluate each using F1-scoring, taking the mean\
    \ of 5-fold cross-validation, using the best parameters found. The following code\
    \ illustrates how to do this for the GBDT model:\n\n```python\nmodel = lgb.LGBMClassifier(force_row_wise=True,\
    \ boosting_type=\"gbdt\", learning_rate=0.1, max_depth=-1, min_child_samples=10,\
    \ n_estimators=100, num_leaves=32, verbose=-1)\nscores = cross_val_score(model,\
    \ X, y, scoring=\"f1_macro\")\nscores.mean()\n```\n\nJupyter notebooks for the\
    \ parameter optimization for each model are available in the GitHub repository:\
    \ https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-3.\n\
    \nThe following table summarizes the best parameter values found and the cross-validated\
    \ F1 scores for each model:\n\n| Model | Learning Rate | Max Depth | Min Child\
    \ Samples | N Estimators | Num Leaves | Min Samples Leaf | Min Samples Split |\
    \ F1 score |\n|---|---|---|---|---|---|---|---|---|\n| GBDT | 0.1 | - | 10 | 100\
    \ | 32 | N/A | N/A | 0.716 |\n| DART | 0.1 | 128 | 30 | 150 | 128 | N/A | N/A\
    \ | 0.703 |\n| DART (GOSS) | 0.1 | 128 | 30 | 150 | 128 | N/A | N/A | 0.703 |\n\
    | Random Forest | N/A | N/A | N/A | 150 | N/A | 10 | 20 | 0.665 |\n\nTable 3.1\
    \ – Summary of best parameters found for each model with the corresponding F1\
    \ scores\n\nAs we can see from the table, the LightGBM models performed much better\
    \ than the scikit-learn random forest. Both DART models achieved nearly the same\
    \ F1 score, with GOSS having a slightly lower F1 score (the table values are rounded\

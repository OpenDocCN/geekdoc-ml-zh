    \n我们发现LightGBM和XGBoost产生了准确率相似的模型，但LightGBM训练模型的速度更快、效率更高。我们还看到了训练DNN的复杂性以及它们在这些问题上表现平平。深度学习是一种极其强大的技术，但在处理表格数据集时，基于树的方法通常更适用。\n\

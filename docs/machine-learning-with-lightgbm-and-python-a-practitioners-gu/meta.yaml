    \ for use in the pipeline:\n\n```\nprocess_step = ProcessingStep(\n    name=\"\
    DataProcessing\",\n    processor=sklearn_processor,\n    inputs=[...],\n    outputs=[...],\n\
    ```"
  - "[PAGE 196]\n\n```\njob_arguments=[\n    \"--train-ratio\", \"0.8\",\n    \"--validation-ratio\"\
    , \"0.1\",\n    \"--test-ratio\", \"0.1\"\n],\ncode=f\"s3://{write_bucket}/{write_prefix}/scripts/preprocessing.py\"\
    \n)\n```\n\ninputs and outputs are defined using the ProcessingInput and ProcessingOutput\
    \ wrappers, as shown here:\n\n```\ninputs = [ ProcessingInput(source=bank_marketing_data_uri,\n\
    \    destination=\"/opt/ml/processing/bank-marketing\") ]\noutputs = [ ProcessingOutput(destination=f\"\
    {processing_output_uri}/train_data\", output_name=\"train_data\",\n    source=\"\
    /opt/ml/processing/train\"), ... ]\n```\n\nProcessingStep takes our scikit-learn\
    \ processor and the inputs and outputs for the data. The ProcessingInput instances\
    \ define the S3 source and local directory destination to facilitate copying the\
    \ data (these are the same local directories our preprocessing script uses). Similarly,\
    \ the ProcessingOutput instances take the local directory source and S3 destinations.\
    \ We also set job arguments, which are passed to the preprocessing script as CLI\
    \ arguments.\n\nHaving set up the preprocessing step, we can move on to training.\n\
    \n# Model training and tuning\n\nWe define a training script in the same way as\
    \ a preprocessing script: a Python script with a main function that uses our standard\
    \ Python tools, such as scikit-learn, to train a LightGBM model. However, we also\
    \ need to install the LightGBM library itself.\n\nAn alternative to installing\
    \ the library is building it into a Docker image and using it as our training\
    \ image in SageMaker. This is the canonical way of managing environments in SageMaker.\
    \ However, it entails significant work and includes the long-term need to maintain\
    \ the image over time. Alternatively, if we only need to install a handful of\
    \ dependencies, we can do that directly from our training script, as shown here.\n\
    \nWe must define a helper function to install packages and then use it to install\
    \ LightGBM:\n\n```\ndef install(package):\n    subprocess.check_call([sys.executable,\
    \ \"-q\", \"-m\", \"pip\",\n    \"install\", package])\ninstall(\"lightgbm\")\n\
    import lightgbm as lgb\n```"
- md: "This also has the advantage that we install the latest version (or a specific\
    \ version) every time we run training.\n\nWith the package installed, the rest\
    \ of the training script trains a standard LGBMClassifier on the data prepared\
    \ by the preprocessing step. We can set up or train data and parameters from the\
    \ arguments to the script:\n\n```\ntrain_df = pd.read_csv(f\"{args.train_data_dir}/train.csv\"\
    )\nval_df = pd.read_csv(f\"{args.validation_data_dir}/validation.csv\")\nparams\
    \ = {\n    \"n_estimators\": args.n_estimators,\n    \"learning_rate\": args.learning_rate,\n\
    \    \"num_leaves\": args.num_leaves,\n    \"max_bin\": args.max_bin,\n}\n```\n\
    \nThen, we must do standard scikit-learn cross-validation scoring, fit the model\
    \ to the data, and output the training and validation scores:\n\n```\nX, y = prepare_data(train_df)\n\
    model = lgb.LGBMClassifier(**params)\n\nscores = cross_val_score(model, X, y,\
    \ scoring=\"f1_macro\")\ntrain_f1 = scores.mean()\nmodel = model.fit(X, y)\n\n\
    X_test, y_test = prepare_data(val_df)\ntest_f1 = f1_score(y_test, model.predict(X_test))\n\
    \nprint(f\"[0]#011train-f1:{train_f1:.2f}\")\nprint(f\"[0]#011validation-f1:{test_f1:.2f}\"\
    )\n```\n\nAs shown here, the script accepts CLI arguments to set hyperparameters.\
    \ This is used by the hyperparameter tuning step to set parameters during the\
    \ optimization phase. We can use Python's ArgumentParser for this purpose:\n\n\
    ```\nparser = argparse.ArgumentParser()\nparser.add_argument(\"--boosting_type\"\
    , type=str, default=\"gbdt\")\nparser.add_argument(\"--objective\", type=str,\
    \ default=\"binary\")\nparser.add_argument(\"--n_estimators\", type=int, default=200)\n\
    parser.add_argument(\"--learning_rate\", type=float, default=0.001)\nparser.add_argument(\"\
    --num_leaves\", type=int, default=30)\nparser.add_argument(\"--max_bin\", type=int,\
    \ default=300)\n```\n\nWe can also see that we log training and validation F1\
    \ scores, allowing SageMaker and CloudWatch to pull the data from logs for reporting\
    \ and evaluation purposes.\n\nFinally, we need to write out the results of the\
    \ training in a JSON document. The results can then be used in subsequent pipeline\
    \ processes and are shown as output from the job in the SageMaker interface. The\
    \ JSON document is stored on disk, along with the serialized model file:\n\n```\n\
    metrics_data = {\"hyperparameters\": params,\n                \"binary_classification_metrics\"\
    :\n{\"validation:f1\": {\"value\": test_f1},\"train:f1\": {\"value\":\ntrain_f1}}\n\
    }\nmetrics_location = args.output_data_dir + \"/metrics.json\"\nmodel_location\
    \ = args.model_dir + \"/lightgbm-model\"\nwith open(metrics_location, \"w\") as\
    \ f:\n    json.dump(metrics_data, f)\nwith open(model_location, \"wb\") as f:\n\
    \    joblib.dump(model, f)\n```\n\nAs with the preprocessing step, the results\
    \ are written to a local directory, where SageMaker picks them up and copies them\
    \ to S3.\n\nWith the script defined, we can create the tuning step in the pipeline,\
    \ which trains the model and tunes hyperparameters.\n\nWe must define a SageMaker\
    \ Estimator that, similar to SKLearnProcessor, encapsulates the configuration\
    \ for training, including a reference to the script (on S3):\n\n```\nstatic_hyperparams\
    \ = {\n    \"boosting_type\": \"gbdt\",\n    \"objective\": \"binary\",\n}\nlgb_estimator\
    \ = Estimator(\n    source_dir=\"src\",\n    entry_point=\"lightgbm_train.py\"\
    ,\n    output_path=estimator_output_uri,\n    code_location=estimator_output_uri,\n\
    \    hyperparameters=static_hyperparams,\n    role=sagemaker_role,\n    image_uri=train_image_uri,\n\
    \    instance_count=train_instance_count,\n    instance_type=train_instance_type,\n\
    \    framework_version=\"1.3-1\",\n)\n```\n\nWe can then define our SageMaker\
    \ HyperparameterTuner, which performs the actual hyperparameter tuning. Similar\
    \ to Optuna or FLAML, we must specify valid ranges for the hyperparameters using\
    \ SageMaker wrappers:\n\n```\nhyperparameter_ranges = {\n    \"n_estimators\"\
    : IntegerParameter(10, 400),\n    \"learning_rate\": ContinuousParameter(0.0001,\
    \ 0.5, scaling_type=\"Logarithmic\"),\n    \"num_leaves\": IntegerParameter(2,\
    \ 200),\n    \"max_bin\": IntegerParameter(50, 500)\n}\n```\n\nHyperparameterTuner\
    \ can be set up as follows:\n\n```\ntuner_config_dict = {\n    \"estimator\":\
    \ lgb_estimator,\n    \"max_jobs\": 20,\n    \"max_parallel_jobs\": 2,\n    \"\
    objective_metric_name\": \"validation-f1\",\n    \"metric_definitions\": [{\"\
    Name\": \"validation-f1\", \"Regex\": \"validation-f1:([0-9\\.]+)\"}],\n    \"\
    hyperparameter_ranges\": hyperparameter_ranges,\n    \"base_tuning_job_name\"\
    : tuning_job_name_prefix,\n    \"strategy\": \"Random\"\n}\ntuner = HyperparameterTuner(**tuner_config_dict)\n\
    ```\n\nSageMaker supports many strategies for hyperparameter tuning, including\
    \ Hyperband tuning. More information can be found in the documentation for hyperparameter\
    \ tuning: https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning-how-it-works.html.\
    \ Here, we used random search, with a maximum job size of 20. It's here that AWS'\
    \ elastic infrastructure can be used to significant benefit. If we increase the\
    \ training instance count, SageMaker automatically distributes the training job\
    \ across all machines. Provisioning additional machines has some overhead and\
    \ increases cost, but it can also majorly reduce tuning time if we run thousands\
    \ of trials.\n\nThe tuner's metric definitions define regular expressions that\
    \ are used to pull the results metrics from the logs, as we showed in the training\
    \ script earlier. The parameter optimization framework optimizes relative to the\
    \ metrics defined here, minimizing or maximizing the metric.\n\nWith the hyperparameter\
    \ tuner defined, we can create a TuningStep for inclusion into the pipeline:\n\
    \n```\ntuning_step = TuningStep(\n    name=\"LGBModelTuning\",\n    tuner=tuner,\n\
    \    inputs={\n        \"train\": TrainingInput(...),\n        \"validation\"\
    : TrainingInput(...),\n    }\n)\n```\n\nThe pipeline steps we've defined thus\
    \ far prepare data and produce a trained model that's serialized to S3. The pipeline's\
    \ next step is to create a SageMaker Model that wraps the model and is used for\
    \ the evaluation, bias, and inference steps. This can be done as follows:\n\n\
    ```\nmodel = sagemaker.model.Model(\n    image_uri=train_image_uri,\n    model_data=tuning_step.get_top_model_s3_uri(\n\
    \        top_k=0, s3_bucket=write_bucket, prefix=model_prefix\n    ),\n    sagemaker_session=sess,\n\
    \    role=sagemaker_role\n)\ninputs = sagemaker.inputs.CreateModelInput(instance_type=deploy_instance_type_param)\n\
    create_model_step = CreateModelStep(name=\"CensusIncomeModel\",\n    model=model,\
    \ inputs=inputs)\n```\n\nThe Model instance encapsulates all the necessary configurations\
    \ to deploy and run the model. We can see that model_data is taken from the top-performing\
    \ model resulting from the tuning step.\n\nThe pipeline steps we've defined so\
    \ far will produce processed data and train a tuned model. The layout for the\
    \ processed data in S3 is shown in Figure 9.3:\n\n![](img/5c9d6611c41357518a5920ff1f360451_200_0.png)\n\
    \nWe could proceed to the deployment step if we needed to. However, we will follow\
    \ best practice and add quality gates to our pipeline that check the model's performance\
    \ and bias and produce insights into its function.\n\n## Evaluation, bias, and\
    \ explainability\n\nSo far, we've seen the general pattern of adding steps to\
    \ a SageMaker pipeline: set up the configuration using SageMaker's configuration\
    \ classes and then create the relevant pipeline step.\n\n## Bias configuration\n\
    \nTo add bias checks to our pipeline, we must create the following configuration:\n\
    \n```\nbias_config = clarify.BiasConfig(\n    label_values_or_threshold=[1], facet_name=\"\
    Sex\", facet_values_or_threshold=[0], group_name=\"Age\"\n)\n\nmodel_predictions_config\
    \ = sagemaker.clarify.ModelPredictedLabelConfig(probability_threshold=0.5)\nmodel_bias_check_config\
    \ = ModelBiasCheckConfig(\n    data_config=model_bias_data_config,\n    data_bias_config=bias_config,\n\
    \    model_config=model_config,\n    model_predicted_label_config=model_predictions_config,\n\
    \    methods=[\"DPPL\"]\n)\n```\n\nBiasConfig describes which facets (features)\
    \ we want to check for bias. We've selected Sex and Age, which are always essential\
    \ facets to check when working with demographic data.\n\nModelBiasCheckConfig\
    \ wraps the data configuration, model configuration, and bias confirmation for\
    \ the bias check step. It also sets the method to use for the bias check. Here,\
    \ we use the **difference in positive proportions in predicted labels (DPPL)**.\n\
    \nThe DPPL is a metric that's used to gauge if a model predicts outcomes differently\
    \ for varying facets of data. The DPPL is calculated as the difference between\
    \ the proportion of positive predictions for facet \"a\" and facet \"d.\" It helps\
    \ assess whether there's bias in the model predictions after training by comparing\
    \ them with the initial bias present in the dataset. For instance, if a model\
    \ predicting eligibility for a home loan predicts positive outcomes for 70% of\
    \ male applicants (facet \"a\") and 60% for female applicants (facet \"d\"), the\
    \ 10% difference could indicate bias against facet \"d.\"\n\nThe DPPL formula\
    \ is represented as follows:\n\n$DPPL = q'_a - q'_d$"
  mdcn: "这还有一个优点，即每次运行训练时，我们都会安装最新版本（或特定版本）的包。\n\n安装好包后，训练脚本的其余部分就在预处理步骤准备好的数据上训练一个标准的LGBMClassifier。我们可以从脚本的参数中设置或训练数据和参数：\n\
    \n```\ntrain_df = pd.read_csv(f\"{args.train_data_dir}/train.csv\")\nval_df =\
    \ pd.read_csv(f\"{args.validation_data_dir}/validation.csv\")\nparams = {\n  \
    \  \"n_estimators\": args.n_estimators,\n    \"learning_rate\": args.learning_rate,\n\
    \    \"num_leaves\": args.num_leaves,\n    \"max_bin\": args.max_bin,\n}\n```\n\
    \n然后，我们必须进行标准的scikit-learn交叉验证评分，将模型拟合到数据上，并输出训练和验证分数：\n\n```\nX, y = prepare_data(train_df)\n\
    model = lgb.LGBMClassifier(**params)\n\nscores = cross_val_score(model, X, y,\
    \ scoring=\"f1_macro\")\ntrain_f1 = scores.mean()\nmodel = model.fit(X, y)\n\n\
    X_test, y_test = prepare_data(val_df)\ntest_f1 = f1_score(y_test, model.predict(X_test))\n\
    \nprint(f\"[0]#011train-f1:{train_f1:.2f}\")\nprint(f\"[0]#011validation-f1:{test_f1:.2f}\"\
    )\n```\n\n如上所示，该脚本接受CLI参数来设置超参数。这被超参数调优步骤用于在优化阶段设置参数。我们可以为此目的使用Python的ArgumentParser：\n\
    \n```\nparser = argparse.ArgumentParser()\nparser.add_argument(\"--boosting_type\"\
    , type=str, default=\"gbdt\")\nparser.add_argument(\"--objective\", type=str,\
    \ default=\"binary\")\nparser.add_argument(\"--n_estimators\", type=int, default=200)\n\
    parser.add_argument(\"--learning_rate\", type=float, default=0.001)\nparser.add_argument(\"\
    --num_leaves\", type=int, default=30)\nparser.add_argument(\"--max_bin\", type=int,\
    \ default=300)\n```\n\n我们还可以看到，我们记录了训练和验证的F1分数，允许SageMaker和CloudWatch从日志中提取数据用于报告和评估。\n\
    \n最后，我们需要将训练结果写入一个JSON文档。然后，该结果可以在后续的管道流程中使用，并在SageMaker界面中显示为作业的输出。JSON文档与序列化的模型文件一起存储在磁盘上：\n\
    \n```\nmetrics_data = {\"hyperparameters\": params,\n                \"binary_classification_metrics\"\
    :\n{\"validation:f1\": {\"value\": test_f1},\"train:f1\": {\"value\":\ntrain_f1}}\n\
    }\nmetrics_location = args.output_data_dir + \"/metrics.json\"\nmodel_location\
    \ = args.model_dir + \"/lightgbm-model\"\nwith open(metrics_location, \"w\") as\
    \ f:\n    json.dump(metrics_data, f)\nwith open(model_location, \"wb\") as f:\n\
    \    joblib.dump(model, f)\n```\n\n与预处理步骤一样，结果被写入本地目录，SageMaker会将其拾取并复制到S3。\n\n\
    定义好脚本后，我们可以在管道中创建调优步骤，该步骤训练模型并调整超参数。\n\n我们必须定义一个SageMaker Estimator，它类似于SKLearnProcessor，封装了训练的配置，包括对脚本（在S3上）的引用：\n\
    \n```\nstatic_hyperparams = {\n    \"boosting_type\": \"gbdt\",\n    \"objective\"\
    : \"binary\",\n}\nlgb_estimator = Estimator(\n    source_dir=\"src\",\n    entry_point=\"\
    lightgbm_train.py\",\n    output_path=estimator_output_uri,\n    code_location=estimator_output_uri,\n\
    \    hyperparameters=static_hyperparams,\n    role=sagemaker_role,\n    image_uri=train_image_uri,\n\
    \    instance_count=train_instance_count,\n    instance_type=train_instance_type,\n\
    \    framework_version=\"1.3-1\",\n)\n```\n\n然后，我们可以定义我们的SageMaker HyperparameterTuner，它执行实际的超参数调优。类似于Optuna或FLAML，我们必须使用SageMaker包装器指定超参数的有效范围：\n\
    \n```\nhyperparameter_ranges = {\n    \"n_estimators\": IntegerParameter(10, 400),\n\
    \    \"learning_rate\": ContinuousParameter(0.0001, 0.5, scaling_type=\"Logarithmic\"\
    ),\n    \"num_leaves\": IntegerParameter(2, 200),\n    \"max_bin\": IntegerParameter(50,\
    \ 500)\n}\n```\n\nHyperparameterTuner可以如下设置：\n\n```\ntuner_config_dict = {\n \
    \   \"estimator\": lgb_estimator,\n    \"max_jobs\": 20,\n    \"max_parallel_jobs\"\
    : 2,\n    \"objective_metric_name\": \"validation-f1\",\n    \"metric_definitions\"\
    : [{\"Name\": \"validation-f1\", \"Regex\": \"validation-f1:([0-9\\.]+)\"}],\n\
    \    \"hyperparameter_ranges\": hyperparameter_ranges,\n    \"base_tuning_job_name\"\
    : tuning_job_name_prefix,\n    \"strategy\": \"Random\"\n}\ntuner = HyperparameterTuner(**tuner_config_dict)\n\
    ```\n\nSageMaker支持多种超参数调优策略，包括Hyperband调优。更多信息可以在超参数调优的文档中找到：https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning-how-it-works.html。这里，我们使用了随机搜索，最大作业数为20。正是在这里，AWS的弹性基础设施可以发挥巨大优势。如果我们增加训练实例数量，SageMaker会自动将训练作业分配到所有机器上。配置额外的机器有一些开销并增加了成本，但如果我们运行数千次试验，它也可以大大减少调优时间。\n\
    \n调优器的度量定义定义了正则表达式，用于从日志中提取结果指标，正如我们之前在训练脚本中所示。参数优化框架根据此处定义的指标进行优化，最小化或最大化该指标。\n\
    \n定义好超参数调优器后，我们可以创建一个TuningStep以包含到管道中：\n\n```\ntuning_step = TuningStep(\n  \
    \  name=\"LGBModelTuning\",\n    tuner=tuner,\n    inputs={\n        \"train\"\
    : TrainingInput(...),\n        \"validation\": TrainingInput(...),\n    }\n)\n\
    ```\n\n到目前为止，我们定义的管道步骤准备数据并生成一个序列化到S3的训练模型。管道的下一步是创建一个SageMaker Model，它包装模型并用于评估、偏差和推理步骤。这可以如下完成：\n\
    \n```\nmodel = sagemaker.model.Model(\n    image_uri=train_image_uri,\n    model_data=tuning_step.get_top_model_s3_uri(\n\
    \        top_k=0, s3_bucket=write_bucket, prefix=model_prefix\n    ),\n    sagemaker_session=sess,\n\
    \    role=sagemaker_role\n)\ninputs = sagemaker.inputs.CreateModelInput(instance_type=deploy_instance_type_param)\n\
    create_model_step = CreateModelStep(name=\"CensusIncomeModel\",\n    model=model,\
    \ inputs=inputs)\n```\n\nModel实例封装了部署和运行模型所需的所有配置。我们可以看到，model_data取自调优步骤产生的表现最佳的模型。\n\
    \n到目前为止，我们定义的管道步骤将生成已处理的数据并训练一个调优后的模型。S3中已处理数据的布局如图9.3所示：\n\n![](img/5c9d6611c41357518a5920ff1f360451_200_0.png)\n\
    \n如果需要，我们可以继续进行部署步骤。然而，我们将遵循最佳实践，在我们的管道中添加质量门，以检查模型的性能和偏差，并对其功能产生洞察。\n\n## 评估、偏差和可解释性\n\
    \n到目前为止，我们已经看到了向SageMaker管道添加步骤的一般模式：使用SageMaker的配置类设置配置，然后创建相关的管道步骤。\n\n## 偏差配置\n\
    \n要向我们的管道添加偏差检查，我们必须创建以下配置：\n\n```\nbias_config = clarify.BiasConfig(\n    label_values_or_threshold=[1],\
    \ facet_name=\"Sex\", facet_values_or_threshold=[0], group_name=\"Age\"\n)\n\n\
    model_predictions_config = sagemaker.clarify.ModelPredictedLabelConfig(probability_threshold=0.5)\n\
    model_bias_check_config = ModelBiasCheckConfig(\n    data_config=model_bias_data_config,\n\
    \    data_bias_config=bias_config,\n    model_config=model_config,\n    model_predicted_label_config=model_predictions_config,\n\
    \    methods=[\"DPPL\"]\n)\n```\n\nBiasConfig描述了我们想要检查偏差的哪些方面（特征）。我们选择了性别和年龄，这是处理人口统计数据时始终需要检查的重要方面。\n\
    \nModelBiasCheckConfig包装了数据配置、模型配置和偏差确认，用于偏差检查步骤。它还设置了用于偏差检查的方法。这里，我们使用**预测标签中正例比例的差异（DPPL）**。\n\
    \nDPPL是一个用于衡量模型是否对数据的不同方面预测结果不同的指标。DPPL计算为方面\"a\"的正预测比例与方面\"d\"的正预测比例之间的差异。它通过将训练后的模型预测与数据集中存在的初始偏差进行比较，来评估模型预测中是否存在偏差。例如，如果一个预测住房贷款资格的模型对70%的男性申请人（方面\"\
    a\"）预测为正结果，对60%的女性申请人（方面\"d\"）预测为正结果，那么10%的差异可能表明对方面\"d\"存在偏差。\n\nDPPL公式表示如下：\n\
    \n$DPPL = q'_a - q'_d$"

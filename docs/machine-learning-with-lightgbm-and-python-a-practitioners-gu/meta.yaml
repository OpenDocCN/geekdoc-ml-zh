  md: '# Introducing TabTransformers


    We want to apply deep learning to tabular data, as most practical machine learning
    problems have tabular data. To this end, we use a new deep learning architecture
    called **TabTransformer**: a deep neural network model designed to handle tabular
    data specifically.


    Like the GPT family of DNNs, TabTransformer is based on the transformer architecture
    originally introduced by Vaswani et al. [2]. TabTransformer adapts the transformer
    architecture to work effectively with tabular data, providing an alternative to
    other machine learning models such as decision trees and gradient boosting machines
    for such data [3].


    ![](img/5c9d6611c41357518a5920ff1f360451_91_0.png)'
  merge: -1
  pgno: 91
- img_proc: true
  md: 'The model architecture for TabTransformer is shown in *Figure 4.2*. With TabTransformer,
    each feature in the tabular data is treated as a token, similar to how words are
    treated as tokens in natural language processing. The model applies self-attention
    mechanisms to learn complex interactions and dependencies between features in
    the input data. The token embedding and attention mechanism allows the model to
    capture global and local relationships between features.


    The TabTransformer model has several key components: token embedding, positional
    encoding, transformer layers, pooling, and output layers. The token embedding
    converts each feature value into a continuous vector representation, combined
    with positional information through positional encoding.


    Moving through the layers, shown in *Figure 4.2*, we can see that the categorical
    and numerical features are split.


    The categorical features first go through an embedding layer, as implemented by
    `layers.Embedding` in Keras, and are then passed along to the transformer blocks.
    A variable number of transformer blocks can be implemented (as set using a hyperparameter),
    but each consists of a `layers.MultiHeadAttention` layer and a `layers.Dense`
    layer with `Dropout`. The output values are added and normalized after passing
    through the attention and dense layers.


    Due to their performance, the transformer feedforward layer uses the **Gaussian
    error linear unit (GELU)** activation function in our implementation. However,
    other activation functions may be used [5].


    The numerical features are passed through a normalization layer (normalizing the
    numerical input ranges) and then concatenated with output from the transformers.


    The concatenated results are passed through a **multilayer perceptron (MLP)**
    block consisting of a variable number of dense layers, each with `Dropout`. Our
    implementation uses **scaled exponential linear unit (SELU)**, which causes the
    activations to self-normalize [6].


    Finally, the output from the MLP block is passed to the loss function, the implementation
    of which depends on the learning problem (classification or regression).


    TabTransformers are much more complex to implement and train than gradient-boosted
    trees. Like other DNNs, TabTransformers require more data preparation and computational
    power than gradient-boosted trees.


    In addition to TabTransformers, this section introduced deep learning alongside
    its advantages and disadvantages. In the next section, we use a practical example
    to compare the different approaches, including the complexity of working with
    TabTransformers.


    # Comparing LightGBM, XGBoost, and TabTransformers


    In this section, we compare the performance of LightGBM, XGBoost, and TabTransformers
    on two different datasets. We also look at more data preparation techniques for
    unbalanced classes, missing values, and categorical data.'
  merge: -1
  pgno: 92
- img_proc: true
  md: "# Predicting census income\n\nThe first dataset we use is the Census Income\
    \ dataset, which predicts whether personal income will exceed $50,000 based on\
    \ attributes such as education, marital status, occupation, and others [4]. The\
    \ dataset has 48,842 instances, and as we'll see, some missing values and unbalanced\
    \ classes.\n\nThe dataset is available from the following URL: https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data.\
    \ The data has already been split into a training set and a test set. Once loaded,\
    \ we can sample the data:\n\n```\ntrain_data.sample(5) [[\"age\", \"education\"\
    , \"marital_status\", \"hours_per_week\", \"income_bracket\"]]\n```\n\nThe data\
    \ sample for the selected columns is shown in *Table 4.1*.\n\n| | age | education\
    \ | marital_status | hours_per_week | income_bracket |\n|---|---|---|---|---|---|\n\
    | 12390 | 34 | Some-college | Never-married | 40 | <=50K |\n| 20169 | 41 | Assoc-acdm\
    \ | Married-civ-spouse | 45 | >50K |\n| 17134 | 35 | Doctorate | Never-married\
    \ | 60 | >50K |\n| 23452 | 49 | HS-grad | Married-civ-spouse | 40 | >50K |\n|\
    \ 22372 | 31 | HS-grad | Separated | 45 | <=50K |\n\nTable 4.1 – Sample data from\
    \ the Census Income dataset\n\n*Table 4.1* shows that we have mixed data types:\
    \ some features are numeric, and others are text. Notably, some columns in the\
    \ dataset are **categorical features**: string-based features with a fixed set\
    \ of values. Next, we look at encoding these features for use in machine learning.\n\
    \n# Encoding categorical features\n\nMost machine learning algorithms need string-based\
    \ features to be encoded to numbers; in some cases, this can be done automatically.\
    \ We discuss automatic encoding for LightGBM in *Chapter 6, Solving Real-World\
    \ Data Science Problems with LightGBM*. In this example, we encode the features\
    \ to understand what this entails.\n\nWe need to map each categorical value to\
    \ a unique number; therefore, we first build a vocabulary of all values for each\
    \ feature:\n\n```\nCATEGORICAL_FEATURES_WITH_VOCABULARY = {\n    \"workclass\"\
    : sort_none_last(list(train_data[\"workclass\"].unique())),\n    \"education\"\
    : sort_none_last(list(train_data[\"education\"].unique())),\n    \"marital_status\"\
    : sort_none_last(list(train_data[\"marital_status\"].unique())),\n}\n```"
  merge: -1
  pgno: 93
- img_proc: true
  md: "```\n\"occupation\": sort_none_last(list(train_data[\"occupation\"].unique())),\n\
    \"relationship\": sort_none_last(list(train_data[\"relationship\"].unique())),\n\
    \"race\": sort_none_last(list(train_data[\"race\"].unique())),\n\"gender\": sort_none_last(list(train_data[\"\
    gender\"].unique())),\n\"native_country\": sort_none_last(list(train_data[\"native_country\"\
    ].unique())),\n\"income_bracket\": sort_none_last(list(train_data[\"income_bracket\"\
    ].unique())),\n}\n```\n\nThe preceding code extracts unique values for each column\
    \ into a list and sorts the list, putting null values last. When working with\
    \ pandas DataFrames, it's also useful to explicitly set the data type for categorical\
    \ columns to category:\n\n```\nfor c in CATEGORICAL_FEATURES_WITH_VOCABULARY.keys():\n\
    \    for dataset in [train_data, test_data]:\n        dataset[c] = dataset[c].astype('category')\n\
    \        dataset[c] = dataset[c].astype('category')\n```\n\nUsing our vocabulary,\
    \ we can now update the values in each column to numbers representing their category\
    \ (using the index in the vocabulary list as the numeric value):\n\n```\ndef map_to_index(val,\
    \ vocab):\n    if val is None:\n        return None\n    return vocab.index(val)\n\
    \nfor dataset in (train_data, test_data):\n    for feature, vocab in CATEGORICAL_FEATURES_WITH_VOCABULARY.items():\n\
    \        dataset[feature] = dataset[feature].map(lambda val: map_to_index(val,\
    \ vocab))\n```\n\nThe result is a DataFrame where all features are now numeric:\n\
    \n| | age | education | marital_status | hours_per_week | income_bracket |\n|---|---|---|---|---|---|\n\
    | 18545 | 37 | 11 | 2 | 40 | 0 |\n| 26110 | 51 | 14 | 0 | 60 | 1 |\n| 21905 |\
    \ 36 | 11 | 5 | 32 | 0 |\n| 1496 | 32 | 1 | 0 | 43 | 1 |\n| 3148 | 47 | 15 | 2\
    \ | 40 | 0 |\n\nTable 4.2 – Encoded categorical data from the Census Income dataset"

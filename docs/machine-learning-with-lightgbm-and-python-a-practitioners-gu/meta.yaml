    \ power, or do they result from an increase in the power generated? These features\
    \ are examples of **target leakage**, as explained next.\n\n# Target leakage\n\
    \nTarget leakage, often called “leakage,” is a common pitfall in designing and\
    \ training machine learning models. It occurs when the model is inadvertently\
    \ given access to the target variable (or some proxy of the target variable) during\
    \ the training process. As a result, the model's performance during training may\
    \ seem impressive, but it performs poorly on new, unseen data because it has effectively\
    \ “cheated” during training.\n\nSome common examples of how leakage can occur\
    \ are as follows:\n\n+   - **Time-based leakage**: Suppose you're trying to predict\
    \ stock prices for tomorrow. If you include data from tomorrow in your training\
    \ set (maybe accidentally), that would cause leakage. Similarly, data only available\
    \ after the fact (such as aggregate data over all stocks) is another example of\
    \ time-based leakage.\n- **Preprocessing mistakes**: These happen when you perform\
    \ a specific operation, such as scaling or normalizing, using statistics that\
    \ include both the training and test set.\n- **Incorrect data splits**: For time-series\
    \ data, using a simple random split might result in future data being present\
    \ in the training set.\n- **Contaminated validation sets**: Sometimes, when creating\
    \ validation or test sets, some data might overlap or be very closely related\
    \ to the training data, causing optimistic and unrepresentative validation scores.\n\
    \nIn our example, `motor_torque` and `resistance` are examples of time-based leakage:\
    \ both metrics can only be measured after power is generated, which is what we\

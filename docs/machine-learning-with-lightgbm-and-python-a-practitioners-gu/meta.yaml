    \n我们的模型表现非常好，绝对误差约为471 W/h。然而，如果我们绘制训练模型的特征重要性，有一个问题很容易发现。\n\n图6.7显示了每个特征对我们的LightGBM模型的相对重要性。\n\
    \n![每个特征对我们的LightGBM模型的相对重要性](img/5c9d6611c41357518a5920ff1f360451_139_0.png)\n\
    \n图 6.7 – 每个特征对我们的LightGBM模型的相对重要性\n\n从特征重要性中我们可以看到，有三个特征很突出：`blades_angle`、`motor_torque`和`resistance`。然而，对于其中两个特征`motor_torque`和`resistance`，我们可以问：这些特征是导致发电量增加，还是发电量增加的结果？这些特征是**目标泄漏**的例子，如下所述。\n\
    \n## 目标泄漏\n\n目标泄漏，通常称为“泄漏”，是设计和训练机器学习模型中的一个常见陷阱。当模型在训练过程中无意中获得了访问目标变量（或目标变量的某些代理）的权限时，就会发生这种情况。因此，模型在训练期间的表现可能看起来令人印象深刻，但在新的、未见过的数据上表现不佳，因为它在训练期间实际上“作弊”了。\n\
    \n泄漏可能发生的一些常见例子如下：\n\n- **基于时间的泄漏**：假设你试图预测明天的股票价格。如果你在训练集中包含了明天的数据（可能是意外的），那就会导致泄漏。类似地，仅在事后才可用的数据（例如所有股票的汇总数据）是基于时间泄漏的另一个例子。\n\
    - **预处理错误**：当你执行特定操作（如缩放或归一化）时，使用了包含训练集和测试集的统计数据，就会发生这种情况。\n- **不正确的数据划分**：对于时间序列数据，使用简单的随机划分可能会导致未来数据出现在训练集中。\n\
    - **受污染的验证集**：有时，在创建验证集或测试集时，某些数据可能与训练数据重叠或密切相关，导致乐观且不具代表性的验证分数。\n\n在我们的例子中，`motor_torque`和`resistance`是基于时间泄漏的例子：这两个指标只能在发电后测量，而这正是我们试图预测的。这也说明了进行基准训练测试的重要性，因为此类问题可能不容易事先发现。\n\
    \n我们通过从数据集中移除这些特征来修正这个错误。然后我们可以继续进行模型调优，以进一步提高模型的性能。\n\n## 模型调优\n\n我们利用Optuna进行参数优化研究。我们将利用Optuna的**树结构Parzen估计器（TPE）**采样算法和Hyperband剪枝以提高效率。我们定义目标函数，包含所需参数、剪枝回调，并测量MSE：\n\

  md: '# Ensemble Learning – Bagging and Boosting


    In this example, we''ll use the *Forest CoverType* dataset (https://archive.ics.uci.edu/ml/datasets/Covertype),
    which is available within scikit-learn (https://scikit-learn.org/stable/modules/generated/sklearn.datasets.fetch_covtype.html#sklearn.datasets.fetch_covtype).
    The dataset is a significant step up from the toy datasets we were using previously.
    The dataset consists of 581,012 samples and has a dimensionality (number of features)
    of 54. The features describe a 30x30m patch of forest in the US (for example,
    elevation, aspect, slope, and distances to hydrology). We must build a classifier
    to classify each patch into one of seven classes describing the forest cover type.


    In addition to training a `RandomForestClassifier`, we''ll train a standalone
    `DecisionTreeClassifier` and an `ExtraTreesClassifier` and compare the performance
    of the algorithms.


    `RandomForestClassifier` and `ExtraTreesClassifier` live in the `sklearn.ensemble`
    package. In addition to our regular imports, we import the classifiers from there,
    like so:


    ```

    from sklearn import datasets

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.ensemble import RandomForestClassifier, ExtraTreesClassifier

    from sklearn.model_selection import train_test_split

    from sklearn.metrics import f1_score

    ```


    The scikit-learn datasets package provides the Forest Cover dataset. We can use
    scikit-learn to fetch the dataset and split it into our training and test sets,
    as follows:


    ```

    dataset = datasets.fetch_covtype()

    X_train, X_test, y_train, y_test = train_test_split(dataset.data, dataset.target,
    random_state=179)

    ```


    Finally, we can train our classifiers and evaluate each of them against the test
    set:


    ```

    tree = DecisionTreeClassifier(random_state=179, min_samples_leaf=3, min_samples_split=6)

    tree = tree.fit(X_train, y_train)

    print(f1_score(y_test, tree.predict(X_test), average="macro"))

    forest = RandomForestClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=140)

    forest = forest.fit(X_train, y_train)

    print(f1_score(y_test, forest.predict(X_test), average="macro"))

    extra_tree = ExtraTreesClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=180)

    extra_tree = extra_tree.fit(X_train, y_train)

    print(f1_score(y_test, extra_tree.predict(X_test), average="macro"))

    ```'

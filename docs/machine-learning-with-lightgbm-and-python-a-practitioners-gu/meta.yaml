  md: '# # Introducing Machine Learning


    Our journey starts with an introduction to machine learning and the fundamental
    concepts we''ll use throughout this book.


    We''ll start by providing an overview of machine learning from a software engineering
    perspective. Then, we''ll introduce the core concepts that are used in the field
    of machine learning and data science: models, datasets, learning paradigms, and
    other details. This introduction will include a practical example that clearly
    illustrates the machine learning terms discussed.


    We will also introduce decision trees, a crucially important machine learning
    algorithm that is our first step to understanding LightGBM.


    After completing this chapter, you will have established a solid foundation in
    machine learning and the practical application of machine learning techniques.


    The following main topics will be covered in this chapter:


    +   - What is machine learning?

    - Introducing models, datasets, and supervised learning

    - Decision tree learning


    # ## Technical requirements


    This chapter includes examples of simple machine learning algorithms and introduces
    working with scikit-learn. You must install a Python environment with scikit-learn,
    NumPy, pandas, and Jupyter Notebook. The code for this chapter is available at
    https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-1.'
  merge: -1
  pgno: 23
- img_proc: true
  md: '# What is machine learning?


    Machine learning is a part of the broader artificial intelligence field that involves
    methods and techniques that allow computers to “learn” specific tasks without
    explicit programming.


    Machine learning is just another way to write programs, albeit automatically,
    from data. Abstractly, a program is a set of *instructions* that transforms *inputs*
    into specific *outputs*. A programmer’s job is to understand all the relevant
    inputs to a computer program and develop a set of instructions to produce the
    correct outputs.


    However, what if the inputs are beyond the programmer’s understanding?


    For example, let’s consider creating a program to forecast the total sales of
    a large retail store. The inputs to the program would be various factors that
    could affect sales. We could imagine factors such as historical sales figures,
    upcoming public holidays, stock availability, any special deals the store might
    be running, and even factors such as the weather forecast or proximity to other
    stores.


    In our store example, the traditional approach would be to break down the inputs
    into manageable, understandable (by a programmer) pieces, perhaps consult an expert
    in store sales forecasting, and then devise handcrafted rules and instructions
    to attempt to forecast future sales.


    While this approach is certainly possible, it is also brittle (in the sense that
    the program might have to undergo extensive changes regarding the input factors)
    and wholly based on the programmer’s (or domain expert’s) understanding of the
    problem. With potentially thousands of factors and billions of examples, this
    problem becomes untenable.


    Machine learning offers us an alternative to this approach. Instead of creating
    rules and instructions, we repeatedly show the computer examples of the tasks
    we need to accomplish and then get it to figure out how to solve them automatically.


    However, where we previously had a set of instructions, we now have a **trained
    model** instead of a programmed one.


    The key realization here, especially if you are coming from a software background,
    is that our machine learning program still functions like a regular program: it
    accepts input, has a way to process it, and produces output. Like all other software
    programs, machine learning software must be tested for correctness, integrated
    into other systems, deployed, monitored, and optimized. Collectively, this forms
    the field of *machine learning engineering*. We’ll cover all these aspects and
    more in later chapters.


    # Machine learning paradigms


    Broadly speaking, machine learning has three main paradigms: supervised, unsupervised,
    and reinforcement learning.'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'With **supervised learning**, the model is trained on labeled data: each instance
    in the dataset has its associated correct output, or label, for the input example.
    The model is expected to learn to predict the label for unseen input examples.


    With **unsupervised learning**, the examples in the dataset are unlabeled; in
    this case, the model is expected to discover patterns and relationships in the
    data. Examples of unsupervised approaches are clustering algorithms, anomaly detection,
    and dimensionality reduction algorithms.


    Finally, **reinforcement learning** entails a model, usually called an agent,
    interacting with a particular environment and learning by receiving penalties
    or rewards for specific actions. The goal is for the agent to perform actions
    that maximize its reward. Reinforcement learning is widely used in robotics, control
    systems, or training computers to play games.


    LightGBM and most other algorithms discussed later in this book are examples of
    supervised learning techniques and are the focus of this book.


    The following section dives deeper into the machine learning terminology we''ll
    use throughout this book and the details of the machine learning process.


    # Introducing models, datasets, and supervised learning


    In the previous section, we introduced a model as a construct to replace a set
    of instructions that typically comprise a program to perform a specific task.
    This section covers models and other core machine learning concepts in more detail.


    # Models


    More formally, a model is a mathematical or algorithmic representation of a specific
    process that performs a particular task. A machine learning model learns a particular
    task by being trained on a **dataset** using a **training algorithm**.


    > **Note**

    An alternative term for training is **fit**. Historically, fit stems from the
    statistical field. A model is said to “fit the data” when trained. We''ll use
    both terms interchangeably throughout this book.


    Many distinct types of models exist, all of which use different mathematical,
    statistical, or algorithmic techniques to model the training data. Examples of
    machine learning algorithms include linear regression, logistic regression, decision
    trees, support vector machines, and neural networks.


    A distinction is made between the model type and a trained instance of that model:
    the majority of machine learning models can be trained to perform various tasks.
    For example, decision trees (a model type) can be trained to forecast sales, recognize
    heart disease, and predict football match results.'
  merge: -1
  pgno: 25
- img_proc: true
  md: 'However, each of these tasks requires a different *instance* of a decision
    tree that has been trained on a distinct dataset.


    What a specific model does depends on the model''s **parameters**. Parameters
    are also sometimes called **weights**, which are technically particular types
    of model parameters.


    A **training algorithm** is an algorithm for finding the most appropriate model
    parameters for a specific task.


    We determine the quality of fit, or how well the model performs, using an **objective
    function**. This is a mathematical function that measures the difference between
    the predicted output and the actual output for a given input. The objective function
    quantifies the performance of a model. We may seek to minimize or maximize the
    objective function depending on the problem we are solving. The objective is often
    measured as an error we aim to minimize during training.


    We can summarize the model training process as follows: a training algorithm uses
    data from a dataset to optimize a model''s parameters for a particular task, as
    measured through an objective function.


    # Hyperparameters


    While a model is composed of parameters, the training algorithm has parameters
    of its own called **hyperparameters**. A hyperparameter is a controllable value
    that influences the training process or algorithm. For example, consider finding
    the minimum of a parabola function: we could start by guessing a value and then
    take small steps in the direction that minimizes the function output. The step
    size would have to be chosen well: if our steps are too small, it will take a
    prohibitively long time to find the minimum. If the step size is too large, we
    may overshoot and miss the minimum and then continue oscillating (jumping back
    and forth) around the minimum:


    ![](img/5c9d6611c41357518a5920ff1f360451_26_0.png)'
  merge: -1
  pgno: 26
- img_proc: true
  md: 'In this example, the step size would be a hyperparameter of our minimization
    algorithm. The effect of the step size is illustrated in *Figure 1.1*.


    # Datasets


    As explained previously, the machine learning model is trained using a dataset.
    Data is at the heart of the machine learning process, and data preparation is
    often the part of the process that takes up the most time.


    Throughout this book, we''ll work with *tabular* datasets. Tabular datasets are
    very common in the real world and consist of rows and columns. Rows are often
    called samples, examples, or observations, and columns are usually called features,
    variables, or attributes.


    Importantly, there is no restriction on the data type in a column. Features may
    be strings, numbers, Booleans, geospatial coordinates, or encoded formats such
    as audio, images, or video.


    Datasets are also rarely perfectly defined. Data may be incomplete, noisy, incorrect,
    inconsistent, and contain various formats.


    Therefore, *data preparation and cleaning* are essential parts of the machine
    learning process.


    Data preparation concerns processing the data to make it suitable for machine
    learning and typically consists of the following steps:


    +   1. **Gathering and validation**: Some datasets are initially too small or
    represent the problem poorly (the data is not representative of the actual data
    population it''s been sampled from). In these cases, the practitioner must collect
    more data, and validation must be done to ensure the data represents the problem.

    2. **Checking for systemic errors and bias**: It is vital to check for and correct
    any systemic errors in the collection and validation process that may lead to
    bias in the dataset. In our sales example, a systemic collection error may be
    that data was only gathered from urban stores and excluded rural ones. A model
    trained on only urban store data will be biased in forecasting store sales, and
    we may expect poor performance when the model is used to predict sales for rural
    stores.

    3. **Cleaning the data**: Any format or value range inconsistencies must be addressed.
    Any missing values also need to be handled in a way that does not introduce bias.

    4. **Feature engineering**: Certain features may need to be transformed to ensure
    the machine learning model can learn from them, such as numerically encoding a
    sentence of words. Additionally, new features may need to be prepared from existing
    features to help the model detect patterns.

    5. **Normalizing and standardizing**: The relative ranges of features must be
    normalized and standardized. Normalizing and standardizing ensure that no one
    feature has an outsized effect on the overall prediction.'
  merge: -1
  pgno: 27
- img_proc: true
  md: '6. **Balancing the dataset**: In cases where the dataset is imbalanced – that
    is, it contains many more examples of one class or prediction than another – the
    dataset needs to be balanced. Balancing is typically done by oversampling the
    minority examples to balance the dataset.


    In *Chapter 6, Solving Real-World Data Science Problems with LightGBM*, we''ll
    go through the entire data preparation process to show how the preceding steps
    are applied practically.


    > **Note**

    A good adage to remember is “garbage in, garbage out”. A model learns from any
    data given to it, including any flaws or biases contained in the data. When we
    train the model on garbage data, it results in a garbage model.


    One final concept to understand regarding datasets is the training, validation,
    and test datasets. We split our datasets into these three subsets after the data
    preparation step is done:


    +   - The **training set** is the most significant subset and typically consists
    of 60% to 80% of the data. This data is used to train the model.

    - The **validation set** is separate from the training data and is used throughout
    the training process to evaluate the model. Having independent validation data
    ensures that the model is evaluated on data it has not seen before, also known
    as its generalization ability. Hyperparameter tuning, a process covered in detail
    in *Chapter 5, LightGBM Parameter Optimization with Optuna*, also uses the validation
    set.

    - Finally, the **test set** is an optional hold-out set, similar to the validation
    set. It is used at the end of the process to evaluate the model''s performance
    on data that was not part of the training or tuning process.


    Another use of the validation set is to monitor whether the model is overfitting
    the data. Let''s discuss overfitting in more detail.


    # Overfitting and generalization


    To understand overfitting, we must first define what we mean by model **generalization**.
    As stated previously, generalization is the model''s ability to accurately predict
    data it has not seen before. Compared to training accuracy, generalization accuracy
    is more significant as an estimate of model performance as this indicates how
    our model will perform in production. Generalization comes in two forms, **interpolation
    and extrapolation**:


    +   - Interpolation refers to the model''s ability to predict a value between
    two known data points – stated another way, to generalize within the training
    data range. For example, let''s say we train our model with monthly data from
    January to July. When interpolating, we would ask the model to make a prediction
    on a particular day in April, a date within our training range.'
  merge: -1
  pgno: 28
- img_proc: true
  md: '+   - Extrapolation, as you might infer, is the model''s ability to predict
    values outside of the range defined by our training data. A typical example of
    extrapolation is forecasting – that is, predicting the future. In our previous
    example, if we ask the model to make a prediction in December, we expect it to
    extrapolate from the training data.


    Of the two types of generalization, extrapolation is much more challenging and
    may require a specific type of model to achieve. However, in both cases, a model
    can overfit the data, losing its ability to interpolate or extrapolate accurately.


    **Overfitting** is a phenomenon where the model fits the training data too closely
    and loses its ability to generalize to unseen data. Instead of learning the underlying
    pattern in the data, the model has memorized the training data. More technically,
    the model fits the *noise* contained in the training data. The term noise stems
    from the concept of data containing *signal* and *noise*. Signal refers to the
    underlying pattern or information captured in the data we are trying to predict.
    In contrast, noise refers to random or irrelevant variations of data points that
    mask the signal.


    For example, consider a dataset where we try to predict the rainfall for specific
    locations. The signal in the data would be the general trend of rainfall: rainfall
    increases in the winter or summer, or vice versa for other locations. The noise
    would be the slight variations in rainfall measurement for each month and location
    in our dataset.


    The following graph illustrates the phenomenon of overfitting:


    ![](img/5c9d6611c41357518a5920ff1f360451_29_0.png)


    Figure 1.2 – Graph showing overfitting. The model has overfitted and predicted
    the training data perfectly but has lost the ability to generalize to the actual
    signal'
  merge: -1
  pgno: 29
- img_proc: true
  md: 'The preceding figure shows the difference between signal and noise: each data
    point was sampled from the actual signal. The data follows the general pattern
    of the signal, with slight, random variations. We can see how the model has overfitted
    the data: the model has fit the training data perfectly but at the cost of generalization.
    We can also see that if we use the model to *interpolate* by predicting a value
    for 4, we get a result much higher than the actual signal (6.72 versus 6.2). Also
    shown is the model''s failure to *extrapolate*: the prediction for 12 is much
    lower than a forecast of the signal (7.98 versus 8.6).


    In reality, all real-world datasets contain noise. As data scientists, we aim
    to prepare the data to remove as much noise as possible, making the signal easier
    to detect. Data cleaning, normalization, feature selection, feature engineering,
    and regularization are techniques for removing noise from the data.


    Since all real-world data contains noise, overfitting is impossible to eliminate.
    The following conditions may lead to overfitting:


    +   - **An overly complex model**: A model that is too complex for the amount
    of data we have utilizes additional complexity to memorize the noise in the data,
    leading to overfitting

    - **Insufficient data**: If we don''t have enough training data for the model
    we use, it''s similar to an overly complex model, which overfits the data

    - **Too many features**: A dataset with too many features likely contains irrelevant
    (noisy) features that reduce the model''s generalization

    - **Overtraining**: Training the model for too long allows it to memorize the
    noise in the dataset


    As the validation set is a part of the training data that remains unseen by the
    model, we use the validation set to monitor for overfitting. We can recognize
    the point of overfitting by looking at the training and generalization errors
    over time. At the point of overfitting, the validation error increases. In contrast,
    the training error continues to improve: the model is fitting noise in the training
    data and losing its ability to generalize.


    Techniques that prevent overfitting usually aim to address the conditions that
    lead to overfitting we discussed previously. Here are some strategies to avoid
    overfitting:


    +   - **Early stopping**: We can stop training when we see the validation error
    beginning to increase.

    - **Simplifying the model**: A less complex model with fewer parameters would
    be incapable of learning the noise in the training data, thereby generalizing
    better.

    - **Get more data**: Either collecting more data or augmenting data is an effective
    method for preventing overfitting by giving the model a better chance to learn
    the signal in the data instead of the noise in a smaller dataset.

    - **Feature selection and dimensionality reduction**: As some features might be
    irrelevant to the problem being solved, we can discard features we think are redundant
    or use techniques such as Principal Component Analysis to reduce the dimensionality
    (features).'
  merge: -1
  pgno: 30
- img_proc: true
  md: '+   - **Adding regularization**: Smaller parameter values typically lead to
    better generalization, depending on the model (a neural network is an example
    of such a model). Regularization adds a penalty term to the objective function
    to discourage large parameter values. By driving the parameters to smaller (or
    zero) values, they contribute less to the prediction, effectively simplifying
    the model.

    - **Ensemble methods**: Combining the prediction from multiple, *weaker* models
    can lead to better generalization while also improving performance.


    It''s important to note that *overfitting and the techniques to prevent overfitting
    are specific to our model*. Our goal should always be to minimize overfitting
    to ensure generalization to unseen data. Some strategies, such as regularization,
    might not work for specific models, while others might be more effective. There
    are also more bespoke strategies for models, an example of which we''ll see when
    we discuss overfitting in decision trees.


    # Supervised learning


    The store sales example is an instance of **supervised learning** – we have a
    dataset consisting of features and are training the model to predict a target.


    Supervised learning problems can be divided into two main types of problem categories:
    **classification problems** and **regression problems**.


    # Classification and regression


    With a *classification problem*, the label that needs to be predicted by the model
    is categorical or defines a class. Some examples of classes are `spam` or `not
    spam`, `cat` or `dog`, and `diabetic` or `not diabetic`. These are examples of
    binary classifications: there are only two classes.


    Multi-class classification is also possible; for example, email may be classified
    as `Important`, `Promotional`, `Clutter`, or `Spam`; images of clouds could be
    classified as `Cirro`, `Cumulo`, `Strato`, or `Nimbo`.


    With *regression problems*, the goal is to predict a continuous, numerical value.
    Examples include predicting revenue, sales, temperature, house prices, and crowd
    size.


    A big part of the *art* of machine learning is correctly defining or transcribing
    a problem as a classification or regression problem (or perhaps unsupervised or
    reinforcement). Later chapters will cover multiple end-to-end case studies of
    both types of problems.


    # Model performance metrics


    Let''s briefly discuss how we measure our model''s performance. Model performance
    refers to the ability of a machine learning model to make accurate predictions
    or generate meaningful outputs based on the given inputs. An evaluation metric
    quantifies how well a model generalizes to new, unseen data.'
  merge: -1
  pgno: 31
- img_proc: true
  md: 'High model performance indicates that the model has learned the underlying
    patterns in the data effectively and can make accurate predictions on data it
    has not seen before. We can measure the model''s performance relative to the known
    targets when working with supervised learning problems (either classification
    or regression problems).


    Importantly, how we measure the model''s performance on classification tasks and
    regression tasks differs. scikit-learn has many built-in metrics functions ready
    for use with either a classification or regression problem (https://scikit-learn.org/stable/modules/model_evaluation.html).
    Let''s review the most common of these.


    Classification metrics can be defined in terms of positive and negative predictions
    made by the model. The following definitions can be used to calculate classification
    metrics:


    +   - **True positive (TP):** A positive instance is correctly classified as positive

    - **True negative (TN):** A negative instance is correctly classified as negative

    - **False positive (FP):** A negative instance is incorrectly classified as positive

    - **False negative (FN):** A positive instance is incorrectly classified as negative


    Given these definitions, the most common *classification* metrics are as follows:


    +   - **Accuracy:** Accuracy is the most straightforward classification metric.
    Accuracy is the number of correct predictions divided by the total number of predictions.
    However, accuracy is susceptible to an imbalance in the data. For example, suppose
    we have an email dataset with 8 examples of spam and 2 examples of non-spam, and
    our model predicts only spam. In that case, the model has an accuracy of 80%,
    even though it never correctly classified non-spam emails. Mathematically, we
    can define accuracy as follows:

    $$Accuracy = \frac{TP + TN}{TP + FP + TN + FN}$$

    - **Precision:** The precision score is one way of getting a more nuanced understanding
    of the classification performance. Precision is the ratio between the true positive
    prediction (correctly predicted) and all positive predictions (true positive and
    false positive). In other words, the precision score indicates how precise the
    model is in predicting positives. In our spam emails example, a model predicting
    only spam is not very precise (as it classifies all non-spam emails as spam) and
    has a lower precision score. The following formula can be used to calculate precision:

    $$Precision = \frac{TP}{TP + FP}$$

    - **Recall:** The recall score is the counterpoint to the precision score. The
    recall score measures how effectively the model finds (or recalls) all true positive
    cases. The recall is calculated as the ratio between true positive predictions
    and all positive instances (true positive and false negative). In our spam example,
    a model predicting only spam has perfect recall (it can find all the spam). We
    can calculate recall like so:

    $$Recall = \frac{TP}{TP + FN}$$'
  merge: -1
  pgno: 32
- img_proc: true
  md: '+   - **F1 score**: Finally, we have the F1 score. The F1 score is calculated
    as the harmonic mean between precision and recall. The F1 score balances precision
    and recall, giving us a singular value that summarizes the classifier''s performance.
    The following formula can be used to calculate the F1 score:


    $$F_1 = \frac{2 \times Precision \times Recall}{Precision + Recall} = \frac{2
    \times TP}{2 \times TP + FP + FN}$$


    The preceding classification metrics are the most common, but there are many more.
    Even though the F1 score is commonly used in classification problems (as it summarizes
    precision and recall), choosing the best metric is specific to the problem you
    are solving. Often, it might be the case that a specific metric is required, but
    other times, you must choose based on experience and your understanding of the
    data. We will look at examples of different metrics later in this book.


    The following are common *regression* metrics:


    +   - **Mean squared error (MSE)**: The MSE is calculated as the average of the
    squared differences between predicted and actual values. The MSE is commonly used
    because of one crucial mathematical property: the MSE is *differentiable* and
    is therefore appropriate for use with gradient-based learning methods. However,
    since the difference is squared, the MSE penalizes large errors more heavily than
    small errors, which may or may not be appropriate to the problem being solved.


    - **Mean absolute error (MAE)**: Instead of squaring the differences, the MAE
    is calculated as the average of the absolute differences between predicted and
    actual values. By avoiding the square of errors, the MAE is more robust against
    the magnitude of errors and less sensitive to outliers than the MSE. However,
    the MAE is not differentiable and, therefore, can''t be used with gradient-based
    learning methods.


    As with the classification metrics, choosing the most appropriate regression metric
    is specific to the problem you are trying to solve.


    > **Metrics versus objectives**


    We defined training a model as finding the most appropriate parameters to minimize
    an *objective function*. It''s important to note that the objective function and
    metrics used for a specific problem may differ. A good example is decision trees,
    where a measure of impurity (entropy) is used as the objective function when building
    a tree. However, we still calculate the metrics explained previously to determine
    the tree''s performance on the data.


    With our understanding of basic metrics in place, we can conclude our introduction
    to machine learning concepts. Now, let''s review the terms and concepts we''ve
    discussed using an example.'
  merge: -1
  pgno: 33
- img_proc: true
  md: '# A modeling example


    Consider the following data of sales by month, in thousands:


    | Jan | Feb | Mar | Apr | May | Jun |

    |---|---|---|---|---|---|

    | 4,140 | 4,850 | 7,340 | 6,890 | 8,270 | 10,060 |

    | Jul | Aug | Sept | Oct | Nov | Dec |

    | 8,110 | 11,670 | 10,450 | 11,540 | 13,400 | 14,420 |


    Table 1.1 – Sample sales data, by month, in thousands


    This problem is straightforward: there is only one feature, the month, and the
    target is the number of sales. Therefore, this is an example of a supervised regression
    problem.


    > **Note**

    You might have noticed that this is an example of a time series problem: time
    is the primary variable. Time series can also be predicted using more advanced
    time series-specific algorithms such as ANOVA, but we''ll use a simple algorithm
    for illustration purposes in this section.


    We can plot our data as a graph of sales per month to understand it better:


    ![](img/5c9d6611c41357518a5920ff1f360451_34_0.png)


    Figure 1.3 – Graph showing store sales by month


    Here, we''re using a straight-line model, also known as simple linear regression,
    to model our sales data. The definition of a straight line is given by the following
    formula:'
  merge: -1
  pgno: 34
- img_proc: true
  md: '$$y = mx + c$$


    Here, $m$ is the line''s slope and $c$ is the Y-intercept. In machine learning,
    the straight line is the model, and $m$ and $c$ are the model parameters.


    To find the best parameters, we must measure how well our model fits the data
    for a particular set of parameters – that is, the error in our outputs. We will
    use the MAE as our metric:


    $$MAE = \frac{\sum_{i=1}^{n} |\hat{y} - y|}{n}$$


    Here, $\hat{y}$ is the predicted output, $y$ is the actual output, and $n$ is
    the number of predictions. We calculate the MAE by making a prediction for each
    of our inputs and then calculating the MAE based on the formula.


    # Fitting the model


    Now, let''s fit our linear model to our data. Our process for fitting the line
    is iterative, and we start this process by guessing values for $m$ and $c$ and
    then iterating from there. For example, let''s consider $m = 0.1$, $c = 4$:


    ![](img/5c9d6611c41357518a5920ff1f360451_35_0.png)



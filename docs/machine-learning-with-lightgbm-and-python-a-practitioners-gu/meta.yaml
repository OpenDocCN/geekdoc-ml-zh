    \ 54.36 | -999.00 | 323.00 |\n| wind_direction(°) | 23097 | 306.89 | 134.06 |\
    \ 0.00 | 569.97 |\n| resistance(ohm) | 28199 | 1575.6 | 483.33 | -1005.22 | 4693.48\

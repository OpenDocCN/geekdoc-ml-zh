  md: 'We must initialize the SageMaker session and create S3, SageMaker, and SageMaker
    Runtime clients via boto3 to get started:


    ```

    sess = sagemaker.Session()

    region = sess.boto_region_name

    s3_client = boto3.client("s3", region_name=region)

    sm_client = boto3.client("sagemaker", region_name=region)

    sm_runtime_client = boto3.client("sagemaker-runtime")

    ```


    We will use Amazon S3 to store our training data, source code, and all data and
    artifacts created by the pipeline, such as the serialized model. Our data and
    artifacts are split into a read bucket and a separate write bucket. This is a
    standard best practice as it separates the concerns for data storage.


    SageMaker sessions have the concept of a default S3 bucket for the session. If
    no default bucket name is supplied, one is generated, and the bucket is created
    for you. Here, we''re grabbing a reference to the bucket. This is our output or
    write bucket. The read bucket is a bucket we''ve created previously that stores
    our training data:


    ```

    write_bucket = sess.default_bucket()

    write_prefix = "census-income-pipeline"

    read_bucket = "sagemaker-data"

    read_prefix = "census-income"

    ```


    The source code, configuration, and output of each of the steps in the pipeline
    are captured in folders within our S3 write bucket. It''s useful to create variables
    for each S3 URI to avoid errors when repeatedly referring to data, like so:


    ```

    input_data_key = f"s3://{read_bucket}/{read_prefix}"

    census_income_data_uri = f"{input_data_key}/census-income.csv"

    output_data_uri = f"s3://{write_bucket}/{write_prefix}/"

    scripts_uri = f"s3://{write_bucket}/{write_prefix}/scripts"

    ```


    SageMaker needs us to specify the compute instance types we want to use when running
    the jobs for training, processing, Clarify, and prediction. In our example, we''re
    using m5.large instances. Most EC2 instance types can be used with SageMaker.
    However, a few special instance types that support GPUs and deep learning frameworks
    are also available:


    ```

    train_model_id, train_model_version, train_scope = "lightgbm-classification-model",
    "*", "training"

    process_instance_type = "ml.m5.large"

    train_instance_count = 1

    train_instance_type = "ml.m5.large"

    predictor_instance_count = 1

    predictor_instance_type = "ml.m5.large"

    clarify_instance_count = 1

    clarify_instance_type = "ml.m5.large"

    ```'

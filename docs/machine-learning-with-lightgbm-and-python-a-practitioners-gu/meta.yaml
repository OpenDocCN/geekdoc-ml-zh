    of ML models in production environments will benefit from the chapters dedicated
    to MLOps, pipelines, and deployment strategies.


    Academicians and students: Faculty members teaching ML, data science, or related
    courses, as well as students pursuing these fields, will find this book to be
    both an informative textbook and a practical guide.


    Knowledge of how to program Python is necessary. Familiarity with Jupyter notebooks
    and Python environments is a bonus. No prior knowledge of ML is required.


    In essence, anyone with a penchant for data, a background in Python programming,
    and an eagerness to explore the multifaceted world of ML using LightGBM will find
    this book a valuable addition to their repertoire.


    # What this book covers


    Chapter 1, Introducing Machine Learning, starts our journey into ML, viewing it
    through the lens of software engineering. We will elucidate vital concepts central
    to the field, such as models, datasets, and the various learning paradigms, ensuring
    clarity with a hands-on example using decision trees.


    Chapter 2, Ensemble Learning – Bagging and Boosting, delves into ensemble learning,
    focusing on bagging and boosting techniques applied to decision trees. We will
    explore algorithms such as random forests, gradient-boosted decision trees, and
    more advanced concepts such as Dropout meets Additive Regression Trees (DART).


    Chapter 3, An Overview of LightGBM in Python, examines LightGBM, an advanced gradient-boosting
    framework with tree-based learners. Highlighting its unique innovations and enhancements
    to ensemble learning, we will guide you through its Python APIs. A comprehensive
    modeling example using LightGBM, enriched with advanced validation and optimization
    techniques, sets the stage for a deeper dive into data science and production
    systems ML.


    Chapter 4, Comparing LightGBM, XGBoost, and Deep Learning, pits LightGBM against
    two prominent tabular data modeling methods – XGBoost and deep neural networks
    (DNNs), specifically TabTransformer. We will assess each method''s complexity,
    performance, and computational cost through'
  - '[PAGE 15]


    evaluations of two datasets. The essence of this chapter is ascertaining LightGBM’s
    competitiveness in the broader ML landscape, rather than an in-depth study of
    XGBoost or DNNs.


    *Chapter 5, LightGBM Parameter Optimization with Optuna*, focuses on the pivotal
    task of hyperparameter optimization, introducing the Optuna framework as a potent
    solution. Covering various optimization algorithms and strategies to prune the
    hyperparameter space, this chapter guides you through a hands-on example of refining
    LightGBM parameters using Optuna.


    *Chapter 6, Solving Real-World Data Science Problems with LightGBM*, methodically
    breaks down the data science process, applying it to two distinct case studies
    – a regression and a classification problem. The chapter illuminates each step
    of the data science life cycle. You will experience hands-on modeling with LightGBM,
    paired with comprehensive theory. This chapter also serves as a blueprint for
    data science projects using LightGBM.


    *Chapter 7, AutoML with LightGBM and FLAML*, delves into **automated machine learning
    (AutoML)**, emphasizing its significance in simplifying and expediting data engineering
    and model development. We will introduce FLAML, a notable library that automates
    model selection and fine-tuning with efficient hyperparameter algorithms. Through
    a practical case study, you will witness FLAML’s synergy with LightGBM and the
    transformative Zero-Shot AutoML functionality, which renders the tuning process
    obsolete.


    *Chapter 8, Machine Learning Pipelines and MLOps with LightGBM*, moves on from
    modeling intricacies to the world of production ML. It introduces you to ML pipelines,
    ensuring consistent data processing and model building, and ventures into MLOps,
    a fusion of DevOps and ML, which is vital to deploying resilient ML systems.


    *Chapter 9, LightGBM MLOps with AWS SageMaker*, steers our journey toward Amazon
    SageMaker, Amazon Web Services’ comprehensive suite to craft and maintain ML solutions.
    We will deepen our understanding of ML pipelines by delving into advanced areas
    such as bias detection, explainability in models, and the nuances of automated,
    scalable deployments.


    *Chapter 10, LightGBM Models with PostgresML*, introduces PostgresML, a distinct
    MLOps platform and a PostgreSQL database extension that facilitates ML model development
    and deployment directly via SQL. This approach, while contrasting the scikit-learn
    programming style that we’ve embraced, showcases the benefits of database-level
    ML, particularly regarding data movement efficiencies and faster inferencing.


    *Chapter 11, Distributed and GPU-Based Learning with LightGBM*, delves into the
    expansive realm of training LightGBM models, leveraging distributed computing
    clusters and GPUs. By harnessing distributed computing, you will understand how
    to substantially accelerate training workloads and manage datasets that exceed
    a single machine’s memory capacity.'

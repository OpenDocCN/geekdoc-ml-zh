    \n## Problem definition\n\nThe dataset consists of power generation (in kW/h)\
    \ measurements of wind turbines taken at a specific date and time. Alongside each\
    \ measurement are the parameters of the wind turbine, which include physical measurements\
    \ of the windmill (including windmill height, blade breadth, and length), operating\

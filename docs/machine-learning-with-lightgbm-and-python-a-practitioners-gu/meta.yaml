    coordinate plot**. Parallel coordinate plots are a visualization tool designed
    to represent high-dimensional data, making them especially useful for visualizing
    the results of hyperparameter optimization. Each dimension (in this context, a
    hyperparameter) is portrayed as a vertical axis arranged in parallel. The range
    of each axis mirrors the range of values that the hyperparameter can assume. Every
    individual configuration of hyperparameters is depicted as a line crossing all
    these axes, with the intersection point on each'

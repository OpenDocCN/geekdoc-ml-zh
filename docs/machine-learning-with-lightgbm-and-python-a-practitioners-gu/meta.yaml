    SMOTE over-sampling is implemented in the `imblearn` Python library. We can fit
    and resample our data as follows:


    ```

    X = train_df.drop(columns=["Credit_Score"], axis=1)

    X_dummies = pd.get_dummies(X)

    y = train_df["Credit_Score"]

    smote = SMOTE(sampling_strategy=''auto'')

    return smote.fit_resample(X_dummies, y)

    ```


    *Figure 6.12* shows the class distribution for the dataset after resampling with
    SMOTE. As shown in the figure, the classes are now perfectly balanced.


    ![](img/5c9d6611c41357518a5920ff1f360451_151_0.png)


    ## Training and evaluation


    We can now proceed with the modeling. The following table shows the results of
    our run from the decision tree classifier, random forest, and LightGBM models
    using default parameters.


    | Algorithm | Accuracy | F1 score |

    | --- | --- | --- |

    | Decision tree | 59.87% | 0.57 |

    | Random forest | 69.35% | 0.67 |

    | LightGBM | 70.00% | 0.68 |


    Table 6.4 – Five-fold cross-validated performance metrics on the Credit Score
    dataset


    As shown in *Table 6.4*, the LightGBM model performs the best, slightly outperforming
    the random forest model accuracy. Both algorithms perform better than the decision
    tree baseline. The LightGBM model also trained the fastest, more than seven times
    faster than the random forest model.


    We now proceed with parameter optimization of the LightGBM model.


    ## Model tuning


    Similar to the previous case study, we use Optuna for parameter optimization.
    We again use the TPE sampler with an optimization budget of 50 trials.


    ## Model deployment and results


    Our model is now prepared and ready to be deployed to a platform of our choice.

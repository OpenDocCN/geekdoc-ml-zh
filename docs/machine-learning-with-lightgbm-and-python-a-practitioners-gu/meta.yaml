  md: "This concludes our section on getting started with PostgresML. Next, we'll\
    \ look at an end-to-end case study of training and deploying a PostgresML model.\n\
    \n# Case study – customer churn with PostgresML\n\nLet's revisit the customer\
    \ churn problem for a telecommunications provider. As a reminder, the dataset\
    \ consists of customers and their account and cost information associated with\
    \ the telecommunication provider.\n\n# Data loading and preprocessing\n\nOur data\
    \ will typically already be available within the PostgreSQL database in a real-world\
    \ setting. However, for our example, we will start by loading the data. First,\
    \ we must create the table the data is loaded into:\n\n```\nCREATE TABLE pgml.telco_churn\n\
    (\n    customerid       VARCHAR(100),\n    gender           VARCHAR(100),\n  \
    \  seniorcitizen    BOOLEAN,\n    partner          VARCHAR(10),\n    dependents\
    \       VARCHAR(10),\n    tenure           REAL,\n    ...\n    monthlycharges\
    \   VARCHAR(50),\n    totalcharges     VARCHAR(50),\n    churn            VARCHAR(10)\n\
    );\n```\n\nNote that in our table structure, for a few of our columns, the types\
    \ do not match what we may expect: for example, monthly and total charges should\
    \ be real values. We'll address this during our preprocessing.\n\nNext, we can\
    \ load our CSV data into the table. PostgreSQL provides a COPY statement for this\
    \ purpose:\n\n```\nCOPY pgml.telco_churn (customerid,\n                      gender,\n\
    \                      seniorcitizen,\n                      partner,\n      \
    \                ...\n                      streamingtv,\n                   \
    \   streamingmovies,\n                      contract,\n                      paperlessbilling,\n\
    \                      paymentmethod,\n```"

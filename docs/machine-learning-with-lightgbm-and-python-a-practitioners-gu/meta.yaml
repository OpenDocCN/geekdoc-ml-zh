    \ = f\"s3://{write_bucket}/{write_prefix}/\"\nscripts_uri = f\"s3://{write_bucket}/{write_prefix}/scripts\"\
    \n```\n\nSageMaker needs us to specify the compute instance types we want to use\
    \ when running the jobs for training, processing, Clarify, and prediction. In\

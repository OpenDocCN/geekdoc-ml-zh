- img_proc: true
  md: "This also has the advantage that we install the latest version (or a specific\
    \ version) every time we run training.\n\nWith the package installed, the rest\
    \ of the training script trains a standard LGBMClassifier on the data prepared\
    \ by the preprocessing step. We can set up or train data and parameters from the\
    \ arguments to the script:\n\n```\ntrain_df = pd.read_csv(f\"{args.train_data_dir}/train.csv\"\
    )\nval_df = pd.read_csv(f\"{args.validation_data_dir}/validation.csv\")\nparams\
    \ = {\n    \"n_estimators\": args.n_estimators,\n    \"learning_rate\": args.learning_rate,\n\
    \    \"num_leaves\": args.num_leaves,\n    \"max_bin\": args.max_bin,\n}\n```\n\
    \nThen, we must do standard scikit-learn cross-validation scoring, fit the model\
    \ to the data, and output the training and validation scores:\n\n```\nX, y = prepare_data(train_df)\n\
    model = lgb.LGBMClassifier(**params)\n\nscores = cross_val_score(model, X, y,\
    \ scoring=\"f1_macro\")\ntrain_f1 = scores.mean()\nmodel = model.fit(X, y)\n\n\
    X_test, y_test = prepare_data(val_df)\ntest_f1 = f1_score(y_test, model.predict(X_test))\n\
    \nprint(f\"[0]#011train-f1:{train_f1:.2f}\")\nprint(f\"[0]#011validation-f1:{test_f1:.2f}\"\
    )\n```\n\nAs shown here, the script accepts CLI arguments to set hyperparameters.\
    \ This is used by the hyperparameter tuning step to set parameters during the\
    \ optimization phase. We can use Python's ArgumentParser for this purpose:\n\n\
    ```\nparser = argparse.ArgumentParser()\nparser.add_argument(\"--boosting_type\"\
    , type=str, default=\"gbdt\")\nparser.add_argument(\"--objective\", type=str,\
    \ default=\"binary\")\nparser.add_argument(\"--n_estimators\", type=int, default=200)\n\
    parser.add_argument(\"--learning_rate\", type=float, default=0.001)\nparser.add_argument(\"\
    --num_leaves\", type=int, default=30)\nparser.add_argument(\"--max_bin\", type=int,\
    \ default=300)\n```"
  merge: -1
  pgno: 197
- img_proc: true
  md: "We can also see that we log training and validation F1 scores, allowing SageMaker\
    \ and CloudWatch to pull the data from logs for reporting and evaluation purposes.\n\
    \nFinally, we need to write out the results of the training in a JSON document.\
    \ The results can then be used in subsequent pipeline processes and are shown\
    \ as output from the job in the SageMaker interface. The JSON document is stored\
    \ on disk, along with the serialized model file:\n\n```\nmetrics_data = {\"hyperparameters\"\
    : params,\n                \"binary_classification_metrics\":\n{\"validation:f1\"\
    : {\"value\": test_f1},\"train:f1\": {\"value\":\ntrain_f1}}\n}\nmetrics_location\
    \ = args.output_data_dir + \"/metrics.json\"\nmodel_location = args.model_dir\
    \ + \"/lightgbm-model\"\nwith open(metrics_location, \"w\") as f:\n    json.dump(metrics_data,\
    \ f)\nwith open(model_location, \"wb\") as f:\n    joblib.dump(model, f)\n```\n\
    \nAs with the preprocessing step, the results are written to a local directory,\
    \ where SageMaker picks them up and copies them to S3.\n\nWith the script defined,\
    \ we can create the tuning step in the pipeline, which trains the model and tunes\
    \ hyperparameters.\n\nWe must define a SageMaker Estimator that, similar to SKLearnProcessor,\
    \ encapsulates the configuration for training, including a reference to the script\
    \ (on S3):\n\n```\nstatic_hyperparams = {\n    \"boosting_type\": \"gbdt\",\n\
    \    \"objective\": \"binary\",\n}\nlgb_estimator = Estimator(\n    source_dir=\"\
    src\",\n    entry_point=\"lightgbm_train.py\",\n    output_path=estimator_output_uri,\n\
    \    code_location=estimator_output_uri,\n    hyperparameters=static_hyperparams,\n\
    \    role=sagemaker_role,\n    image_uri=train_image_uri,\n    instance_count=train_instance_count,\n\
    \    instance_type=train_instance_type,\n    framework_version=\"1.3-1\",\n)\n\
    ```"
  merge: -1
  pgno: 198
- img_proc: true
  md: "We can then define our SageMaker HyperparameterTuner, which performs the actual\
    \ hyperparameter tuning. Similar to Optuna or FLAML, we must specify valid ranges\
    \ for the hyperparameters using SageMaker wrappers:\n\n```\nhyperparameter_ranges\
    \ = {\n    \"n_estimators\": IntegerParameter(10, 400),\n    \"learning_rate\"\
    : ContinuousParameter(0.0001, 0.5, scaling_type=\"Logarithmic\"),\n    \"num_leaves\"\
    : IntegerParameter(2, 200),\n    \"max_bin\": IntegerParameter(50, 500)\n}\n```\n\
    \nHyperparameterTuner can be set up as follows:\n\n```\ntuner_config_dict = {\n\
    \    \"estimator\": lgb_estimator,\n    \"max_jobs\": 20,\n    \"max_parallel_jobs\"\
    : 2,\n    \"objective_metric_name\": \"validation-f1\",\n    \"metric_definitions\"\
    : [{\"Name\": \"validation-f1\", \"Regex\": \"validation-f1:([0-9\\.]+)\"}],\n\
    \    \"hyperparameter_ranges\": hyperparameter_ranges,\n    \"base_tuning_job_name\"\
    : tuning_job_name_prefix,\n    \"strategy\": \"Random\"\n}\ntuner = HyperparameterTuner(**tuner_config_dict)\n\
    ```\n\nSageMaker supports many strategies for hyperparameter tuning, including\
    \ Hyperband tuning. More information can be found in the documentation for hyperparameter\
    \ tuning: https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning-how-it-works.html.\
    \ Here, we used random search, with a maximum job size of 20. It's here that AWS'\
    \ elastic infrastructure can be used to significant benefit. If we increase the\
    \ training instance count, SageMaker automatically distributes the training job\
    \ across all machines. Provisioning additional machines has some overhead and\
    \ increases cost, but it can also majorly reduce tuning time if we run thousands\
    \ of trials.\n\nThe tuner's metric definitions define regular expressions that\
    \ are used to pull the results metrics from the logs, as we showed in the training\
    \ script earlier. The parameter optimization framework optimizes relative to the\
    \ metrics defined here, minimizing or maximizing the metric.\n\nWith the hyperparameter\
    \ tuner defined, we can create a TuningStep for inclusion into the pipeline:\n\
    \n```\ntuning_step = TuningStep(\n    name=\"LGBModelTuning\",\n    tuner=tuner,\n\
    \    inputs={\n```"
  merge: -1
  pgno: 199
- img_proc: true
  md: "```\n\"train\": TrainingInput(...),\n\"validation\": TrainingInput(...),\n\
    }\n)\n```\n\nThe pipeline steps we've defined thus far prepare data and produce\
    \ a trained model that's serialized to S3. The pipeline's next step is to create\
    \ a SageMaker Model that wraps the model and is used for the evaluation, bias,\
    \ and inference steps. This can be done as follows:\n\n```\nmodel = sagemaker.model.Model(\n\
    \    image_uri=train_image_uri,\n    model_data=tuning_step.get_top_model_s3_uri(\n\
    \        top_k=0, s3_bucket=write_bucket, prefix=model_prefix\n    ),\n    sagemaker_session=sess,\n\
    \    role=sagemaker_role\n)\ninputs = sagemaker.inputs.CreateModelInput(instance_type=deploy_instance_type_param)\n\
    create_model_step = CreateModelStep(name=\"CensusIncomeModel\",\n    model=model,\
    \ inputs=inputs)\n```\n\nThe Model instance encapsulates all the necessary configurations\
    \ to deploy and run the model. We can see that model_data is taken from the top-performing\
    \ model resulting from the tuning step.\n\nThe pipeline steps we've defined so\
    \ far will produce processed data and train a tuned model. The layout for the\
    \ processed data in S3 is shown in Figure 9.3:\n\n![](img/5c9d6611c41357518a5920ff1f360451_200_0.png)"

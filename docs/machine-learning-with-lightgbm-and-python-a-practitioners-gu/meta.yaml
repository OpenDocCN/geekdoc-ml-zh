    \ non-null  float64\n21  windmill_generated_power (kW/h)  27993 non-null  float64\n\
    ```\n\n我们立即可以看到数据集存在缺失值，某些特征的值少于28,200个。我们可以通过计算统计描述来更好地了解数据分布：\n\n```\ntrain_df.describe().T.style.bar(subset=['mean'])\n\
    ```\n\n这将打印出以下内容：\n\n| 特征 | 计数 | 均值 | 标准差 | 最小值 | 最大值 |\n| :--- | :--- | :---\
    \ | :--- | :--- | :--- |\n| wind_speed(m/s) | 27927 | 69.04 | 76.28 | -496.21\

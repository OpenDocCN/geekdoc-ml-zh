    \ form (name, transformer, columns). It applies the sub-transformers to the specified\
    \ columns and concatenates the results such that all resultant features form part\
    \ of the same result set.\n\nFor example, consider the following DataFrame and\
    \ ColumnTransformer:\n\n```\ndf = pd.DataFrame({\n    \"price\": [29.99, 99.99,\
    \ 19.99],\n    \"description\": [\"Luxury goods\", \"Outdoor goods\",\n      \
    \  \"Sports equipment\"],\n})\nct = ColumnTransformer(\n    [(\"scaling\", MinMaxScaler(),\
    \ [\"price\"]),\n     (\"vectorize\", TfidfVectorizer(), \"description\")])\n\
    transformed = ct.fit_transform(df)\n```\n\nHere, we have a DataFrame with two\
    \ columns: `price` and `description`. A column transformer is created with two\
    \ sub-transformers: a scaling transformer and a vectorizer. The scaling transformer\
    \ applies min-max scaling only to the `price` column. The vectorizer applies TF-IDF\
    \ vectorization only to the `description` column. When `fit_transform` is called,\
    \ a *single* array is returned with a column for the scaled price and the columns\
    \ representing the word vectors.\n\n> **Note**\nTF-IDF, or **term frequency-inverse\
    \ document frequency**, is just one way of extracting a feature from text. Analyzing\
    \ and extracting features from text, and natural language processing in general,\
    \ is a broad field within ML that we won't be delving into deeply here. You are\
    \ encouraged to read further on the topic at https://scikit-learn.org/stable/modules/feature_extraction.html#text-feature-extraction.\n\
    \nWe can set up our preprocessing for the Customer Churn dataset as a single `ColumnTransformer`.\
    \ We first define the two individual transformers, `id_transformer` and `encode_transformer`,\
    \ that apply to the ID columns and the categorical features:\n\n```\nid_transformer\
    \ = (\n    \"customer_id\",\n    CustomerIdTransformer(id_columns),\n    id_columns\n\
    )\nencode_transformer = (\n    \"encoder\",\n    OneHotEncoder(sparse_output=False),\n\
    \    categorical_features\n)\n```"
  - "[PAGE 175]\n\nAnd then combine the separate transformers into `ColumnTransformer`:\n\
    \n```\npreprocessor = ColumnTransformer(\n    transformers=[\n        id_transformer,\n\
    \        encode_transformer,\n    ],\n    remainder='passthrough'\n)\n```\n\n\
    `ColumnTransformer` is defined with the `remainder='passthrough'` parameter. The\
    \ `remainder` parameter specifies what happens to the columns that `ColumnTransformer`\
    \ does not transform. These columns are dropped by default, but we would like\
    \ to pass them through, untouched, to include them in the dataset.\n\nThe encoding\
    \ transformer creates and applies `OneHotEncoder` to the categorical features.\n\
    \nFor illustrative purposes, we have created a custom transformer class to maintain\
    \ the list of ID columns and drop them from the data during transformation.\n\n\
    The class is shown here:\n\n```\nclass CustomerIdTransformer(BaseEstimator, TransformerMixin):\n\
    \    def __init__(self, id_columns):\n        self.id_columns = id_columns\n\n\
    \    def fit(self, X, y=None):\n        return self\n\n    def transform(self,\
    \ X, y=None):\n        return X.drop(columns=self.id_columns, axis=1)\n```\n\n\
    As we can see, the class extends `BaseEstimator` and `TranformerMixin` from the\
    \ scikit-learn base classes and must implement `fit` and `transform`. Implementing\
    \ these methods also makes it suitable as a transformer in a pipeline. Implementing\
    \ `fit` is optional if required; in our case, nothing is done during `fit`. Our\
    \ transformation step drops the relevant columns."
  - "[PAGE 176]\n\n> **Note**\nIt's important to encapsulate the functionality to\
    \ drop irrelevant columns (in this case, the ID column) within the pipeline itself.\
    \ When deploying the pipeline for production use, we expect these columns to be\

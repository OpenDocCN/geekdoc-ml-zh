    \npredictor_instance_count = 1\npredictor_instance_type = \"ml.m5.large\"\nclarify_instance_count\
    \ = 1\nclarify_instance_type = \"ml.m5.large\"\n```\n\nSageMaker uses standard\
    \ EC2 instances for training but runs specific Docker images on the instances\
    \ to provide ML functionality. Amazon SageMaker provides many prebuilt Docker\
    \ images for various ML frameworks and stacks.\n\nThe SageMaker SDK also provides\

  md: 'We need a differentiable loss function, and to simplify some of the mathematical
    derivations in this example, we choose the following loss function, which is similar
    to the MSE function:


    $$L = \frac{1}{2} \sum_{i=0}^{n} (y_i - \gamma)^2$$


    We now work through each algorithm step in detail to see how the gradient-boosted
    tree is produced.


    The first step is to find $F_0(x) = \text{argmin}_{\gamma} \sum_{i=1}^{n} L(y_i,
    \gamma)$, where $y_i$ is our target value and $\gamma$ is our initial predicted
    value. *Our initial prediction is constant and is simply the average of the target
    values. But let''s see why.*


    The equation for $F_0(x)$ is stating that we need to find a value for $\gamma$
    that minimizes our loss function. To find the minimum, we take the derivative
    of the loss function with respect to gamma:


    $$\frac{\partial L}{\partial \gamma} = \frac{2}{2} \left( \sum_{i=0}^{n} (y_i
    - \gamma) \right) \times -1$$


    Then, set it to 0 and solve the following equation:


    $$-\left( \sum_{i=0}^{n} (y_i - \gamma) \right) = 0$$

    $$-\frac{1}{n} \sum_{i=0}^{n} y_i + \gamma = 0$$

    $$\gamma = \frac{1}{n} \sum_{i=0}^{n} y_i$$


    The equation simplifies to calculating the average of the target values.


    Updating our table with the predictions, we have the following:


    | Gender | F. Blood Sugar | W. Circum. | BMI | LDL Cholesterol | PredictionF 0(x)
    |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | Male | 105 | 110 | 29.3 | 170 | 125 |

    | Female | 85 | 80 | 21 | 90 | 125 |

    | Male | 95 | 93 | 26 | 113 | 125 |


    Table 2.3 – Our initial prediction of LDL cholesterol predictions ($F_0(x)$) for
    each patient is constant


    We repeat the following $M$ times, where $M$ is the number of trees we choose
    to build.


    We now need to calculate the pseudo residuals $r_{im} = -\left[ \frac{\partial
    L(y_i, F(x_i))}{\partial F(x_i)} \right]_{F(x)=F_{m-1}(x)}$. This equation for
    $r_{im}$ is stating that we use the negative of the partial derivative of the
    loss function, with respect to the predictions, to calculate the pseudo residuals.
    *This portion of the gradient-boosting algorithm relates to gradient descent:
    we are taking the negative of the gradient to minimize the residuals.* Fortunately,
    we have already calculated this derivative:


    $$-\left[ \frac{\partial L(y_i, F(x_i))}{\partial F(x_i)} \right] = -\frac{\partial}{\partial
    F(x_i)} \left( \frac{1}{2} (y_i - F(x_i))^2 \right) = \frac{2}{2} (y_i - F(x_i))
    = (y_i - F(x_i))$$


    Here, $F(x_i)$ is the predicted value. In other words, *the equation simplifies
    the difference between the target and predicted values.* We can add the residuals
    to the table, as follows:'
  merge: -1

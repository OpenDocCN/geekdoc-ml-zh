    \n## 使用C4.5构建决策树\n\nC4.5是一种从数据集构建决策树的算法[1]。该算法是递归的，从以下基本情况开始：\n\n1. 如果子数据集中的所有样本都属于同一类别，则在树中创建一个选择该类别的叶节点。\n\
    2. 如果使用任何特征进行分裂都无法获得信息增益（数据集无法进一步划分），则创建一个预测子数据集中最频繁类别的叶节点。\n3. 如果子数据集中的样本数量达到最小阈值，则创建一个预测子数据集中最频繁类别的叶节点。\n\
    \n然后，我们可以应用该算法：\n\n1. 检查三种基本情况中的任何一种，如果数据集满足其中任何一种，则停止分裂。\n2. 对于数据集的每个特征或属性，计算按该特征分裂数据集所获得的信息增益。\n\
    3. 通过按信息增益最高的特征分裂数据集来创建决策节点。\n4. 根据决策节点将数据集拆分为两个子数据集，并对每个子数据集递归地应用该算法。\n\n树构建完成后，会进行剪枝。在剪枝过程中，信息增益相对低于其他树节点的决策节点会被移除。移除节点可以避免对训练数据的过拟合，并提高树的泛化能力。\n\
    \n## 分类与回归树\n\n您可能已经注意到，在前面的解释中，我们只使用类别通过决策节点来拆分数据集；这并非偶然，因为标准的C4.5算法仅支持分类树。**分类与回归树（CART）**扩展了C4.5以支持数值目标变量——即回归问题[2]。使用CART时，决策节点也可以拆分连续数值输入变量以支持回归，通常使用阈值（例如，x\
    \ <= 0.3）。当到达叶节点时，通常取剩余数值范围的均值或中位数作为预测值。\n\n在构建分类树时，仅使用不纯度来确定分裂。然而，对于回归树，不纯度与其他标准结合以计算最优分裂：\n\
    \n- 均方误差（或平均绝对误差）\n- 半泊松偏差\n\n详细数学解释请参见 https://scikit-learn.org/stable/modules/tree.html#regression-criteria。\n\
    \nscikit-learn使用CART的优化版本来构建决策树。\n\n## 决策树中的过拟合\n\n决策树最显著的缺点之一是容易过拟合。如果没有合适的超参数选择，C4.5和其他训练算法会创建过于复杂和深层的树，几乎完全拟合训练数据。管理过拟合是构建决策树的关键部分。以下是一些避免过拟合的策略：\n\
    \n- **剪枝：** 如前所述，我们可以移除那些信息增益不大的分支；这降低了树的复杂性并提高了泛化能力。\n- **最大深度：** 限制树的深度也可以避免过于复杂的树并避免过拟合。\n\
    - **最大叶节点数：** 与限制深度类似，限制叶节点数量可以避免过于具体的分支并提高泛化能力。\n- **每个叶节点的最小样本数：** 设置叶节点可能包含的最小样本数限制（当子数据集达到最小大小时停止分裂）也可以避免过于具体的叶节点。\n\
    - **集成方法：** 集成学习是一种结合多个模型以提高预测性能的技术。对多个模型的预测进行平均也可以减少过拟合。\n\n这些策略可以通过设置相应的超参数来应用。现在我们了解了如何构建决策树以及过拟合的策略，让我们看看如何在scikit-learn中构建决策树。\n\
    \n## 使用scikit-learn构建决策树\n\n现在是时候通过使用scikit-learn训练分类和回归树来研究如何使用决策树了。\n\n对于这些示例，我们将使用scikit-learn中包含的玩具数据集。这些数据集与真实世界数据相比很小，但易于使用，使我们能够专注于决策树。\n\
    \n## 乳腺癌分类\n\n我们将使用乳腺癌数据集（https://scikit-learn.org/stable/datasets/toy_dataset.html#breast-cancer-dataset）作为分类示例。该数据集包含从乳腺肿块细针抽吸图像计算出的特征，任务是预测肿块是恶性还是良性。\n\
    \n使用scikit-learn，我们可以用五行代码解决这个分类问题：\n\n```python\ndataset = datasets.load_breast_cancer()\n\
    \nX_train, X_test, y_train, y_test = train_test_split(dataset.data,\n    dataset.target,\
    \ random_state=157)\n\nmodel = DecisionTreeClassifier(random_state=157, max_depth=3,\
    \ min_\n    samples_split=2)\nmodel = model.fit(X_train, y_train)\n\nf1_score(y_test,\
    \ model.predict(X_test))\n```\n\n首先，我们使用`load_breast_cancer`加载数据集。然后，我们使用`train_test_split`将数据集拆分为训练集和测试集；默认情况下，25%的数据用于测试集。像之前一样，我们实例化`DecisionTreeClassifier`模型，并使用`model.fit`在训练集上训练它。实例化模型时传递的两个超参数值得注意：`max_depth`和`min_samples_split`。这两个参数都控制过拟合，将在下一节中更详细地讨论。我们还为训练测试拆分和模型指定了`random_state`。通过固定随机状态，我们确保结果可重复（否则，scikit-learn会为每次执行创建新的随机状态）。\n\
    \n最后，我们使用`f1_score`来衡量性能。我们的模型F1分数为0.94，准确率为93.7%。F1分数的满分是1.0，因此我们可以得出结论，模型表现非常好。如果我们分解预测结果，模型在测试集的143个样本中仅对9个样本预测错误：7个假阳性和2个假阴性。\n\
    \n## 预测糖尿病进展\n\n为了说明使用决策树解决回归问题，我们将使用糖尿病数据集（https://scikit-learn.org/stable/datasets/toy_dataset.html#diabetes-dataset）。该数据集有10个特征（年龄、性别、体重指数等），模型的任务是预测1年后疾病进展的定量度量。\n\
    \n我们可以使用以下代码来构建和评估回归模型：\n\n```python\ndataset = datasets.load_diabetes()\n\nX_train,\
    \ X_test, y_train, y_test = train_test_split(dataset.data,\n    dataset.target,\
    \ random_state=157)\n\nmodel = DecisionTreeRegressor(random_state=157, max_depth=3,\
    \ min_\n    samples_split=2)\nmodel = model.fit(X_train, y_train)\n\nmean_absolute_error(y_test,\
    \ model.predict(X_test))\n```\n\n我们的模型MAE为45.28。代码与我们的分类示例几乎相同：我们使用`DecisionTreeRegressor`作为模型，而不是分类器，并计算`mean_absolute_error`而不是F1分数。scikit-learn中使用不同类型模型解决各种问题的API一致性是经过设计的，并说明了机器学习工作中的一个基本事实：尽管数据、模型和指标会变化，*构建机器学习模型的整体过程保持不变*。在接下来的章节中，我们将扩展这一通用方法，并在构建机器学习管道时利用该过程的一致性。\n\
    \n## 决策树超参数\n\n我们在前面的分类和回归示例中使用了一些决策树超参数来控制过拟合。本节将介绍scikit-learn提供的最关键的决策树超参数：\n\
    \n- `max_depth`：树允许达到的最大深度。更深的树允许更多的分裂，导致更复杂的树和过拟合。\n- `min_samples_split`：分裂节点所需的最小样本数。仅包含少量样本的节点会过拟合数据，而较大的最小值可以提高泛化能力。\n\
    - `min_samples_leaf`：叶节点中允许的最小样本数。与分裂中的最小样本数类似，增加该值会导致树的复杂度降低，从而减少过拟合。\n- `max_leaf_nodes`：允许的最大叶节点数。较少的叶节点会减小树的大小，从而降低复杂度，这可能会提高泛化能力。\n\
    - `max_features`：确定分裂时要考虑的最大特征数。丢弃一些特征可以减少数据中的噪声，从而改善过拟合。特征是随机选择的。\n- `criterion`：确定分裂时使用的不纯度度量，可以是`gini`或`entropy`/`log_loss`。"

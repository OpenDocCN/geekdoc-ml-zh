    # FLAML AutoML


    We will now look at model selection and tuning. We will use FLAML to compare five
    different models: LightGBM, RandomForest, XGBoost, ExtraTrees, and a limited-depth
    version of XGBoost. We would also like to find optimal parameters for the best
    model. This entire process is possible in two lines of code with FLAML:


    ```

    automl = flaml.AutoML()

    automl.fit(X, y, task="regression", time_budget=60)

    ```


    The preceding code fits an optimal regression model within a time budget of 60
    seconds. FLAML automatically uses a holdout set to calculate validation results
    and then proceeds with optimization, using CFO as the tuner by default.


    The AutoML class provides “task-oriented AutoML.” The user sets the learning task,
    and FLAML does the rest. Among others, the following tasks are supported: classification,
    regression, time-series forecasting and time-series classification, ranking, and
    NLP-related tasks such as summarization and word token classification.'

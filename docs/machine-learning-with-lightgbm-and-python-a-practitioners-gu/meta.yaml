    \ our time budget, optimization metric, and classification task for AutoML. We\
    \ also limit the estimators to LightGBM and a random forest model. Finally, we\
    \ customize the search space by specifying that `n_estimators` should be uniformly\
    \ sampled between 20 and 500.\n\nThe pipeline requires the parameter for constituent\
    \ steps to be prefixed with the step's name and a double underscore. We can set\
    \ up a dictionary to pass these parameters to the AutoML class within our pipeline:\n\
    \n```python\npipeline_settings = {\n    f\"automl__{key}\": value for key, value\
    \ in\n        automl_settings.items()\n}\n```\n\nHere, `automl` is the name of\
    \ the step in the pipeline. As such, for example, the parameters for time budget\

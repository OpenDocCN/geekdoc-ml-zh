- md: '## Summary


    This chapter introduced ML pipelines, illustrating their advantages in enabling
    consistency, correctness, and portability when implementing ML solutions.


    An overview was given on the nascent MLOps field, a practice combining DevOps
    and ML to realize tested, scalable, secure, and observable production ML systems.


    Further, we discussed the scikit-learn `Pipeline` class, a toolset to implement
    ML pipelines using the familiar scikit-learn API.


    A practical, end-to-end example of implementing an ML pipeline for customer churn
    was also given. We showed how to create a scikit-learn pipeline that performs
    preprocessing, modeling, and tuning and is exportable for a software system. We

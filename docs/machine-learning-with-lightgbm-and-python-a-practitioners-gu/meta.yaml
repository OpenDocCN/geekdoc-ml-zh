    # Building LightGBM models


    This section provides an end-to-end example of solving a real-world problem using
    LightGBM. We provide a more detailed look at data preparation for a problem and
    explain how to find suitable parameters for our algorithms. We use multiple variants
    of LightGBM to explore relative performance and compare them against random forests.


    # Cross-validation


    Before we delve into solving a problem, we need to discuss a better way of validating
    algorithm performance. Splitting the data into two or three subsets is standard
    practice when training a model. The training data is used to train the model,
    the validation data is a hold-out set used to validate the data during training,
    and the test data is used to validate the performance after training.


    In previous examples, we have done this split only once, building a single training
    and test to train and validate the model. The issue with this approach is that
    our model could get “lucky.” If, by chance, our test set closely matches the training
    data but is not representative of real-world data, we would report a good test
    error, even though we can''t be confident of our model''s performance.


    An alternative is to do the dataset splitting multiple times and train the model
    multiple times, once for each split. This approach is called **cross-validation**.


    The most common application of cross-validation is *k-fold cross-validation*.
    With k-fold cross-validation, we choose a value, *k*, and partition the (shuffled)
    dataset into *k* subsamples (or folds). We then repeat the training process *k*
    times, using a different subset as the validation data and all other subsets as
    training data. The model''s performance is calculated as the mean (or median)
    score across all folds. The following diagram illustrates this process:'
- md: "## Stratified *k*-fold validation\n\nA problem that might arise with k-fold\
    \ cross-validation is that, due to chance, a fold may contain samples from only\
    \ a single class. **Stratified sampling** solves this issue by preserving the\
    \ percentage of samples for each class when creating folds. In this way, each\
    \ fold has the same distribution of classes as the original dataset. When applied\
    \ to cross-validation, this technique is called stratified k-fold cross-validation.\n\
    \n## Parameter optimization\n\n**Parameter optimization**, also called parameter\
    \ tuning, is the process of finding good hyperparameters for the model and training\
    \ process specific to the problem being solved. In the previous examples of training\
    \ models, we have been setting the model and training algorithm's parameters based\
    \ on intuition and minimal experimentation. There is no guarantee that the parameter\
    \ choices were optimal for the optimization problem.\n\nBut how might we go about\
    \ finding the best parameter choices? A naïve strategy is to try an extensive\
    \ range of values for a parameter, find the best value, and then repeat the process\
    \ for the following parameter. However, it is frequently the case that parameters\
    \ are **co-dependent**. When we change one parameter, the optimal value for another\
    \ might differ. An excellent example of co-dependence in GBDTs is the number of\
    \ boosting rounds and the learning rate. Having a small learning rate necessitates\
    \ more boosting rounds. Therefore, optimizing the learning rate and then, independently,\
    \ the number of boosting rounds is unlikely to produce optimal results. *Both\
    \ parameters must be optimized in unison.*\n\n## Grid search\n\nAn approach that\
    \ accounts for parameter co-dependence is grid search. With grid search, a parameter\
    \ grid is set up. The grid consists of a range of values to try for each parameter\
    \ we are optimizing. An exhaustive search is then performed, training and validating\
    \ the model on each possible combination of parameters.\n\nHere is an example\
    \ of a parameter grid for three parameters:\n\n```\ngrid = {\n    'learning_rate':\
    \ [0.001, 0.01, 0.1, 0.2, 0.5],\n    'num_rounds': [20, 40, 60, 80, 100],\n  \
    \  'num_leaves': [2, 16, 32, 64, 128, 256],\n}\n```\n\nEach parameter is specified\
    \ with a range of possible values. The previous grid would require 150 trials\
    \ to search.\n\nSince grid search is exhaustive, it has the advantage that it\
    \ is guaranteed to find the best combination of parameters within the ranges specified.\
    \ However, the downside to grid search is the cost. Trying each possible combination\
    \ of parameters is very expensive and quickly becomes intractable for many parameters\
    \ and large parameter ranges.\n\nScikit-learn provides a utility class to implement\
    \ grid search and perform cross-validation at the same time. `GridSearchCV` takes\
    \ a model, a parameter grid, and the number of cross-validation folds as parameters.\
    \ `GridSearchCV` then proceeds to search the grid for the best parameters, using\
    \ cross-validation to validate the performance for each combination of parameters.\
    \ We'll illustrate the use of `GridSearchCV` in the next section.\n\nParameter\
    \ optimization is a crucial part of the modeling process. Finding suitable parameters\
    \ for a model could be the difference between a successful or failed process.\
    \ However, as discussed previously, parameter optimization is also often enormously\
    \ expensive regarding time and computational complexity, necessitating a trade-off\
    \ between cost and performance.\n\n## Predicting student academic success\n\n\
    We now move on to our example. We build a model to predict students' dropout rate\
    \ based on a range of social and economic factors using LightGBM [7] (https://archive-beta.ics.uci.edu/dataset/697/predict+students+dropout+and+academic+success).\
    \ The data is available in CSV format. We start by exploring the data.\n\n## Exploratory\
    \ data analysis\n\nOne of the most fundamental properties of any dataset is the\
    \ shape: the rows and columns our data consists of. It's also an excellent way\
    \ to validate that the data read succeeded. Here, our data consists of 4,424 rows\
    \ and 35 columns. Taking a random sample of the data gives us a sense of the columns\
    \ and their values:\n\n```\ndf = pd.read_csv(\"students/data.csv\", sep=\";\"\
    )\nprint(f\"Shape: {df.shape}\")\ndf.sample(10)\n```\n\nNext, we can run `df.info()`\
    \ to see all the columns, their non-null counts, and their data types:\n\n```\n\
    df.info()\n<class 'pandas.core.frame.DataFrame'>\nRangeIndex: 4424 entries, 0\
    \ to 4423\nData columns (total 35 columns):\n #   Column            Non-Null Count\
    \  Dtype \n---  ------            --------------  ----- \n 0   Marital status\
    \    4424 non-null   int64 \n 1   Application mode  4424 non-null   int64 \n 2\
    \   Application order 4424 non-null   int64 \n ...\n```\n\nRunning the preceding\
    \ code shows us that most columns are integer types, except for the `Target` column,\
    \ with a few floats in between. The `Target` column is listed as type `object`;\
    \ if we look at the values in the sample, we can see the `Target` column consists\
    \ of `Graduate`, `Dropout`, and `Enrolled` strings. LightGBM can't work with strings\
    \ as targets, so we'll map these to integer values before training our models.\n\
    \nWe can also run `df.describe()` to get a statistical description (mean, standard\
    \ deviation, min, max, and percentiles) of the values in each column. Calculating\
    \ descriptive statistics helps check the bounds of the data (not a big problem\
    \ with working with decision tree models) and check for outliers. For this dataset,\
    \ there aren't any data bounds or outlier concerns.\n\nNext, we need to check\
    \ for duplicated and missing values. We need to drop the rows containing missing\
    \ values or impute appropriate substitutes if there are any missing values. We\
    \ can check for missing values using the following code:\n\n```\ndf.isnull().sum()\n\
    ```\n\nRunning the preceding code shows us there are no missing values for this\
    \ dataset.\n\nTo locate duplicates, we can run the following code:\n\n```\ndf.loc[df.duplicated()]\n\
    ```\n\nThere are also no duplicates in the dataset. If there were any duplicated\
    \ data, we would drop the extra rows.\n\nWe also need to check the distribution\
    \ of the target class to ensure it is balanced. Here, we show a histogram that\
    \ indicates the target class distribution. We create the histogram using Seaborn's\
    \ `countplot()` method, like so:\n\n```\nsns.countplot(data=df, x='Target')\n\
    ```\n\nAlthough not perfectly balanced, the target distribution is not overly\
    \ skewed to any one class, and we don't have to perform any compensating action.\n\
    \nSo far, we have found that our dataset is suitable for modeling (we still need\
    \ to remap `Target`) and clean (it does not contain missing or duplicated values\
    \ and is well balanced). We can now take a deeper look at some features, starting\
    \ with feature correlation. The following code plots a correlation heatmap. Pairwise\
    \ Pearson correlations are calculated using `df.corr()`. The screenshot that follows\
    \ the snippet shows a correlation heatmap built using pairwise Pearson correlations:\n\
    \n```\nsns.heatmap(df.corr(), cmap='coolwarm')\n```\n\nFigure 3.6 – Pairwise Pearson\
    \ feature correlation of the academic success dataset\n\nWe can see three patterns\
    \ of correlations: first-semester credits, enrollments, evaluations, and approvals\
    \ are all correlated. First-semester and second-semester values for these are\
    \ also correlated. These correlations imply that students tend to see through\
    \ the year once enrolled instead of dropping out mid-semester. Although correlated,\
    \ the correlations aren't strong enough to consider dropping out any features.\n\
    \nThe third correlation pattern is between `Nacionalidade` and `International`,\
    \ which are strongly correlated.\n\n> **Note**\n> The word *Nacionalidade* refers\
    \ to *nationality*. We have retained the spelling from the original dataset here\
    \ too for the purpose of consistency.\n\nA closer look at `Nacionalidade` shows\
    \ that almost all rows have a single value: the country where the dataset was\
    \ collected. The strong correlation implies the same for `International`."
  mdcn: "## 分层 *k* 折验证\n\nk折交叉验证可能出现的一个问题是，由于随机性，某一折可能只包含来自单一类别的样本。**分层抽样**通过在创建折时保留每个类别的样本比例来解决这个问题。这样，每一折的类别分布都与原始数据集相同。当应用于交叉验证时，这种技术被称为分层k折交叉验证。\n\
    \n## 参数优化\n\n**参数优化**，也称为参数调优，是为特定问题的模型和训练过程寻找良好超参数的过程。在前面的模型训练示例中，我们一直基于直觉和最少的实验来设置模型和训练算法的参数。无法保证这些参数选择对于优化问题是最优的。\n\
    \n但是，我们如何才能找到最佳的参数选择呢？一个简单的策略是尝试一个参数的广泛值范围，找到最佳值，然后对下一个参数重复此过程。然而，参数之间常常是**相互依赖**的。当我们改变一个参数时，另一个参数的最优值可能会不同。GBDT中相互依赖的一个绝佳例子是提升轮数和学习率。较小的学习率需要更多的提升轮数。因此，先优化学习率，然后独立地优化提升轮数，不太可能产生最优结果。*这两个参数必须同时进行优化。*\n\
    \n## 网格搜索\n\n一种考虑参数相互依赖性的方法是网格搜索。通过网格搜索，设置一个参数网格。该网格由我们正在优化的每个参数的一系列待尝试值组成。然后执行穷举搜索，在每个可能的参数组合上训练和验证模型。\n\
    \n以下是一个包含三个参数的参数网格示例：\n\n```\ngrid = {\n    'learning_rate': [0.001, 0.01, 0.1,\
    \ 0.2, 0.5],\n    'num_rounds': [20, 40, 60, 80, 100],\n    'num_leaves': [2,\
    \ 16, 32, 64, 128, 256],\n}\n```\n\n每个参数都指定了一个可能的值范围。上述网格需要进行150次试验来搜索。\n\n由于网格搜索是穷举的，其优点在于保证在指定的范围内找到最佳的参数组合。然而，网格搜索的缺点在于成本。尝试每个可能的参数组合非常昂贵，当参数很多且参数范围很大时，很快就会变得难以处理。\n\
    \nScikit-learn提供了一个实用类来实现网格搜索并同时执行交叉验证。`GridSearchCV`接受一个模型、一个参数网格和交叉验证折数作为参数。然后，`GridSearchCV`开始搜索网格以寻找最佳参数，使用交叉验证来验证每个参数组合的性能。我们将在下一节中说明`GridSearchCV`的使用。\n\
    \n参数优化是建模过程的关键部分。为模型找到合适的参数可能是成功或失败过程的区别。然而，如前所述，参数优化在时间和计算复杂度方面也常常代价巨大，需要在成本和性能之间进行权衡。\n\
    \n## 预测学生学业成功\n\n我们现在转向我们的示例。我们使用LightGBM [7] (https://archive-beta.ics.uci.edu/dataset/697/predict+students+dropout+and+academic+success)\
    \ 构建一个模型，基于一系列社会和经济因素预测学生的辍学率。数据以CSV格式提供。我们首先探索数据。\n\n## 探索性数据分析\n\n任何数据集最基本的属性之一是形状：我们的数据由多少行和多少列组成。这也是验证数据读取是否成功的好方法。这里，我们的数据由4,424行和35列组成。随机抽取数据样本可以让我们了解各列及其值：\n\
    \n```\ndf = pd.read_csv(\"students/data.csv\", sep=\";\")\nprint(f\"Shape: {df.shape}\"\
    )\ndf.sample(10)\n```\n\n接下来，我们可以运行`df.info()`来查看所有列、它们的非空计数以及数据类型：\n\n```\ndf.info()\n\
    <class 'pandas.core.frame.DataFrame'>\nRangeIndex: 4424 entries, 0 to 4423\nData\
    \ columns (total 35 columns):\n #   Column            Non-Null Count  Dtype \n\
    ---  ------            --------------  ----- \n 0   Marital status    4424 non-null\
    \   int64 \n 1   Application mode  4424 non-null   int64 \n 2   Application order\
    \ 4424 non-null   int64 \n ...\n```\n\n运行上述代码显示，大多数列是整数类型，除了`Target`列，中间还有一些浮点数。`Target`列被列为`object`类型；如果我们查看样本中的值，可以看到`Target`列由`Graduate`、`Dropout`和`Enrolled`字符串组成。LightGBM无法处理字符串作为目标，因此我们将在训练模型之前将它们映射为整数值。\n\
    \n我们还可以运行`df.describe()`来获取每列值的统计描述（均值、标准差、最小值、最大值和百分位数）。计算描述性统计数据有助于检查数据的范围（对于使用决策树模型来说不是大问题）并检查异常值。对于此数据集，没有数据范围或异常值问题。\n\
    \n接下来，我们需要检查重复值和缺失值。如果有任何缺失值，我们需要删除包含缺失值的行或进行适当的插补。我们可以使用以下代码检查缺失值：\n\n```\ndf.isnull().sum()\n\
    ```\n\n运行上述代码显示此数据集没有缺失值。\n\n要查找重复项，我们可以运行以下代码：\n\n```\ndf.loc[df.duplicated()]\n\
    ```\n\n数据集中也没有重复项。如果有任何重复数据，我们会删除多余的行。\n\n我们还需要检查目标类别的分布，以确保其平衡。这里，我们展示一个直方图，显示目标类别的分布。我们使用Seaborn的`countplot()`方法创建直方图，如下所示：\n\
    \n```\nsns.countplot(data=df, x='Target')\n```\n\n虽然不是完全平衡，但目标分布没有过度偏向任何一个类别，我们不必执行任何补偿操作。\n\
    \n到目前为止，我们发现我们的数据集适合建模（我们仍然需要重新映射`Target`）并且是干净的（它不包含缺失值或重复值，并且平衡良好）。我们现在可以更深入地查看一些特征，从特征相关性开始。以下代码绘制了一个相关性热力图。使用`df.corr()`计算成对的皮尔逊相关系数。代码片段后面的截图显示了使用成对皮尔逊相关系数构建的相关性热力图：\n\
    \n```\nsns.heatmap(df.corr(), cmap='coolwarm')\n```\n\n图3.6 – 学业成功数据集的成对皮尔逊特征相关性\n\
    \n我们可以看到三种相关性模式：第一学期的学分、注册、评估和批准都是相关的。这些指标的第一学期和第二学期值也是相关的。这些相关性意味着学生一旦注册，往往会完成整个学年，而不是在学期中辍学。虽然相关，但相关性不够强，不足以考虑删除任何特征。\n\
    \n第三种相关性模式存在于`Nacionalidade`和`International`之间，它们高度相关。\n\n> **注意**\n> 单词 *Nacionalidade*\
    \ 指的是 *国籍*。为了保持一致性，我们在此也保留了原始数据集中的拼写。\n\n仔细观察`Nacionalidade`，发现几乎所有行都有一个单一的值：收集数据集的国家。强相关性意味着`International`列也是如此。"

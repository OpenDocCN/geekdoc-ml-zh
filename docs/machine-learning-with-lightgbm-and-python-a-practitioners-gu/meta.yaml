    Monitor 可以根据准确度等指标监控数据漂移和模型漂移。


    最后，SageMaker 既是 AWS 中的一个平台，也是一个软件 SDK。该 SDK 提供 Python 和 R 两种版本。SageMaker SDK 提供一系列内置算法和框架，包括对机器学习社区中最流行算法的支持，例如
    XGBoost、TensorFlow、PyTorch 和 MXNet。它还支持一个市场，用户可以从 AWS 和其他 SageMaker 用户共享的大量算法和模型包中进行选择。


    SageMaker 中一个值得注意的部分是 **SageMaker Clarify**，它简化了模型开发中最重要的方面之一（偏差和公平性）。


    ## SageMaker Clarify


    Amazon SageMaker Clarify 是一个为机器学习模型提供更高透明度的工具。SageMaker Clarify 旨在帮助理解机器学习模型如何做出预测，从而实现模型的可解释性和公平性。


    SageMaker Clarify 的主要功能之一是其提供模型可解释性的能力。它帮助开发者理解输入数据与模型预测之间的关系。该服务生成特征归因，显示数据集中每个特征如何影响预测，这在许多领域至关重要，尤其是在需要理解模型预测背后推理的领域。除了提供对单个预测的洞察外，SageMaker
    Clarify 还提供全局解释能力。它衡量输入特征在整个数据集上对模型预测的综合重要性。特征影响分析允许开发者和数据科学家理解模型的整体行为，帮助他们解释不同特征如何在全局层面驱动模型预测。


    此外，Clarify 可以帮助识别训练模型中的潜在偏差。该服务包括训练前和训练后的偏差指标，帮助我们了解模型是否不公平地偏袒某些群体。检查所有新模型是否存在偏差是最佳实践，但在金融或医疗保健等受监管行业中也至关重要，因为有偏差的预测可能会产生严重后果。


    Clarify 通过使用一种称为 **SHapley Additive exPlanations (SHAP)** 的先进技术来提供模型可解释性。


    ## SHAP


    SHAP 是一种博弈论方法，用于解释任何机器学习模型的输出 [1]。SHAP 旨在提供对单个特征对模型整体预测影响的理解。


    本质上，SHAP 值通过将特定特征值与该特征的基线值进行对比来评估其效果，突出其对预测的贡献。SHAP 值是每个特征对每个实例预测的公平贡献分配。SHAP
    值植根于合作博弈论，代表了以下问题的解决方案：


    > “*给定一个特征在预测结果中产生的差异，该差异中有多少部分可归因于每个特征？*”


    这些值使用博弈论中的 Shapley 值概念计算。Shapley 值通过对比模型在存在和不存在该特征时的预测来确定特征的重要性。然而，由于模型遇到特征的顺序可能影响其预测，Shapley
    值考虑了所有可能的排序。然后，它为特征分配一个重要性值，使其等于该特征在所有可能联盟中的平均边际贡献。


    使用 SHAP 进行模型解释有几个优点。首先，它提供了解释的一致性。如果某个特征的贡献发生变化，则该特征归因的重要性会按比例变化。


    其次，SHAP 保证了局部准确性，这意味着所有特征的 SHAP 值之和等于预测值与数据集平均预测值之间的差异。


    可视化 SHAP 值的一个好方法是使用 SHAP 摘要图。这些图提供了特征重要性及其驱动因素的鸟瞰视图。它们将某个特征的所有 SHAP 值绘制在图表上，便于可视化。图表上的每个点代表某个特征和某个实例的
    SHAP 值。Y 轴上的位置由特征决定，X 轴上的位置由 SHAP 值决定：


    ![](img/5c9d6611c41357518a5920ff1f360451_190_0.png)


    图 9.1 – Census Income 数据集的局部解释示例。条形表示 SHAP 值或每个特征在预测此特定实例时的相对重要性


    在 SageMaker Clarify 的上下文中，当您运行澄清作业时，该服务会为数据集中的每个实例生成一组 SHAP 值。SageMaker Clarify
    还可以通过聚合整个数据集的 SHAP 值来提供全局特征重要性度量。


    SHAP 值可以帮助您理解复杂的模型行为，突出潜在问题，并随着时间的推移改进您的模型。例如，通过检查 SHAP 值，您可能会发现某个特定特征对模型预测的影响比预期更大，从而促使您探究其原因。


    在本节中，我们了解了 AWS，更具体地说，是 AWS 机器学习服务系列 SageMaker 提供的内容。SageMaker 中可用的功能，例如模型可解释性、偏差检测和监控，是我们尚未在机器学习管道中实现的组件。在下一节中，我们将探讨使用
    SageMaker 构建一个完整的端到端基于 LightGBM 的机器学习管道，包括这些关键步骤。


    ## 使用 Amazon SageMaker 构建 LightGBM 机器学习管道


    我们将用于构建 SageMaker 管道案例研究的数据集是来自*第 4 章，比较 LightGBM、XGBoost 和深度学习*的 Census Income
    数据集。该数据集也可作为 SageMaker 示例数据集使用，因此如果您是初学者，在 SageMaker 上使用它很容易。


    我们将构建的管道包括以下步骤：


    - 1. 数据预处理。

    - 2. 模型训练和调优。

    - 3. 模型评估。

    - 4. 使用 Clarify 进行偏差和可解释性检查。

    - 5. 在 SageMaker 中注册模型。

    - 6. 使用 AWS Lambda 部署模型。



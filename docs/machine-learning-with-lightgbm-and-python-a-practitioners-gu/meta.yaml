  - "[PAGE 164]\n\nA final notable feature of FLAML is zero-shot AutoML, which bypasses\
    \ the need for model tuning entirely.\n\n# Zero-shot AutoML\n\n**Zero-shot AutoML**\
    \ is a FLAML feature where hyperparameter optimization is not performed. Instead,\
    \ suitable hyperparameter configurations are determined offline by analyzing the\
    \ performance of an algorithm on a wide variety of datasets. The process can be\
    \ described as follows:\n\n+   1. Before building a model:\n   - Train models\
    \ on many datasets using AutoML\n   - Store all datasets' hyperparameter configurations,\
    \ evaluation results, and metadata as a zero-shot solution\n2. When building a\
    \ model for a new problem:\n   - Use FLAML to analyze the new dataset against\
    \ the zero-shot solution results and determine suitable hyperparameters\n   -\
    \ Train a model on the new dataset using the hyperparameters\n\nThe first step\
    \ is performed only once for a given model type (such as LightGBM). Thereafter,\
    \ a new model can be built for any new problem without tuning. The solution is\
    \ “zero-shot” because suitable parameters are used on the first fit for a new\
    \ dataset.\n\nFLAML's zero-shot AutoML approach has many advantages:\n\n+   -\
    \ As mentioned, no tuning is involved, sparing much computational effort and time\
    \ when solving a new problem\n- Since no tuning is required, a validation dataset\
    \ is not required either, and more of the data may be used for training\n- Even\
    \ less involvement is required by the user\n- Often, no code changes are required,\
    \ as we'll see next\n\nOf course, creating the zero-shot solution for a model\
    \ type is still arduous, requiring varied datasets and much computation to train\
    \ many models. Fortunately, FLAML provides pretrained zero-shot solutions for\
    \ many popular models, including LightGBM, XGBoost, and scikit-learn's random\
    \ forests.\n\nTo use a zero-shot solution, replace the regular LightGBM import\
    \ with the FLAML-wrapped version:\n\n```\nfrom flaml.default import LGBMRegressor\n\
    \nzs_model = LGBMRegressor()\nzs_model.fit(X, y)\n```"

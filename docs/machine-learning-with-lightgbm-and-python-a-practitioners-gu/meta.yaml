    \ 支持以下优化目标，包括但不限于——回归（包括使用其他损失函数（如 Huber 和 Fair）的回归应用）、`binary`（二分类）、`multiclass`（多分类）、`cross-entropy`（交叉熵）以及用于排序问题的\

    +   - **Boosting**: This involves iteratively training models on the errors of
    previous models. The final prediction is made by combining the prediction of all
    models in the chain.

    - **Stacking**: This involves methods where multiple base models are trained,
    then a higher-order model (known as a meta-model) is trained to learn from the
    base model predictions and make the final prediction.

    - **Blending**: This is very similar to stacking. However, the meta-model is trained
    on predictions made by the base models on a *hold-out set* (a part of the training
    data the base learners were not trained on) instead of the whole training set.


    The purpose of ensemble learning methods is to improve our prediction performance,
    and there are several ways ensembles improve the performance over individual models,
    as outlined here:


    +   - **Improved accuracy**: By combining predictions, we increase the likelihood
    that the final prediction is accurate as, in aggregate, models make fewer mistakes.

    - **Improved generalization and overfitting**: By aggregating predictions, we
    reduce the variance in the final prediction, improving generalization. Further,
    in some ensemble methods, the models cannot access all data (bagging ensembles),
    reducing noise and overfitting.

    - **Improved prediction stability**: The aggregation of predictions reduces the
    random fluctuations of individual predictions. Ensembles are less sensitive to
    outliers, and outlying predictions of member models have a limited impact on the
    final prediction.


    Decision trees are well suited for ensemble learning, and decision tree-specific
    algorithms exist for ensemble learning. The following section discusses bagging
    ensembles in decision trees focusing on **random forests**.


    # Bagging and random forests


    **Bagging** is an ensemble method where multiple models are trained on subsets
    of the training data. The models’ predictions are combined to make a final prediction,
    usually by taking the average for numerical prediction (for regression) or the
    majority vote for a class (for classification). When training each model, we select
    a subset of data from the original training dataset with replacement—that is,
    a specific training pattern can be a member of multiple subsets. Since each model
    is only presented with a sample of the training data, no single model can “memorize”
    the training data, which reduces overfitting. The following diagram illustrates
    the bagging process:'
- md: '## Random forest


    **Random forest** is a decision tree-specific bagging ensemble learning method
    [1]. Instead of building a single decision tree, as the name implies, many decision
    trees are trained using bagging: each tree is trained on either random samples,
    random features from the training data, or both. Random forests support both classification
    and regression.


    The training methodology for individual trees in random forests is the same as
    for a single decision tree, and as explained previously, each tree is a complete
    tree. The final prediction for the forest is made by taking the arithmetic mean
    of all trees in the case of prediction or the majority vote for a class (in the
    case of classification).


    Regarding performance, random forest learning produces a more robust model with
    higher accuracy, which tends to avoid overfitting (since no single model can overfit
    on all training data).


    ## Random forest hyperparameters


    In scikit-learn, as may be expected, the hyperparameters available for random
    forests are the same as those available to train decision trees. We can specify
    `max_depth`, `min_samples_split`, `max_leaf_nodes`, and so on, which are then
    used to train the individual trees. However, there are three notable additional
    parameters, as follows:


    - `n_estimators`: Controls the number of trees in the forest. Generally, more
    trees are better. However, a point of diminishing returns is often reached.

    - `max_features`: Determines the maximum number of features to be used as a subset
    when splitting a node. Setting `max_features=1.0` allows all features to be used
    in the random selection.

    - `bootstrap` determines whether bagging is used. All trees use the entire training
    set if `bootstrap` is set to `False`.


    A list of all parameters available in scikit-learn is available here: https://scikit-learn.org/stable/modules/generated/sklearn.ensemble.RandomForestClassifier.html.


    ## ExtraTrees


    **Extremely Randomized Trees (ExtraTrees)** is a related method for building randomized
    decision trees. With ExtraTrees, when building a decision node, several candidate
    splits are created randomly instead of using the *Gini index* or *information
    gain* metric to calculate the optimal split [2]. The best split from all random
    splits is then chosen for the node. The methodology for ExtraTrees can be applied
    to a single decision tree or used in conjunction with Random Forests. scikit-learn
    implements ExtraTrees as an extension to random forests (https://scikit-learn.org/stable/modules/ensemble.html#extremely-randomized-trees).


    In scikit-learn, the ExtraTrees implementation has the same hyperparameters as
    random forests.


    ## Training random forests using scikit-learn


    We''ll now have a look at using random forests with scikit-learn.


    ## Ensemble Learning – Bagging and Boosting


    In this example, we''ll use the *Forest CoverType* dataset (https://archive.ics.uci.edu/ml/datasets/Covertype),
    which is available within scikit-learn (https://scikit-learn.org/stable/modules/generated/sklearn.datasets.fetch_covtype.html#sklearn.datasets.fetch_covtype).
    The dataset is a significant step up from the toy datasets we were using previously.
    The dataset consists of 581,012 samples and has a dimensionality (number of features)
    of 54. The features describe a 30x30m patch of forest in the US (for example,
    elevation, aspect, slope, and distances to hydrology). We must build a classifier
    to classify each patch into one of seven classes describing the forest cover type.


    In addition to training a `RandomForestClassifier`, we''ll train a standalone
    `DecisionTreeClassifier` and an `ExtraTreesClassifier` and compare the performance
    of the algorithms.


    `RandomForestClassifier` and `ExtraTreesClassifier` live in the `sklearn.ensemble`
    package. In addition to our regular imports, we import the classifiers from there,
    like so:


    ```

    from sklearn import datasets

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.ensemble import RandomForestClassifier, ExtraTreesClassifier

    from sklearn.model_selection import train_test_split

    from sklearn.metrics import f1_score

    ```


    The scikit-learn datasets package provides the Forest Cover dataset. We can use
    scikit-learn to fetch the dataset and split it into our training and test sets,
    as follows:


    ```

    dataset = datasets.fetch_covtype()

    X_train, X_test, y_train, y_test = train_test_split(dataset.data, dataset.target,
    random_state=179)

    ```


    Finally, we can train our classifiers and evaluate each of them against the test
    set:


    ```

    tree = DecisionTreeClassifier(random_state=179, min_samples_leaf=3, min_samples_split=6)

    tree = tree.fit(X_train, y_train)

    print(f1_score(y_test, tree.predict(X_test), average="macro"))

    forest = RandomForestClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=140)

    forest = forest.fit(X_train, y_train)

    print(f1_score(y_test, forest.predict(X_test), average="macro"))

    extra_tree = ExtraTreesClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=180)

    extra_tree = extra_tree.fit(X_train, y_train)

    print(f1_score(y_test, extra_tree.predict(X_test), average="macro"))

    ```


    We have set hyperparameters for the models that are appropriate to the problem.
    An additional step would be to optimize the algorithm hyperparameters to discover
    the best parameter values. Parameter optimization is discussed in detail in a
    later chapter.


    Running the preceding code, we get the following F1 scores for each of the algorithms:


    | Model | F1 score |

    |---|---|

    | Decision Tree | 0.8917 |

    | Random Forest | 0.9209 |

    | ExtraTrees | 0.9231 |


    Table 2.1 – F1 scores for each of the algorithms on the Forest CoverType dataset


    The ExtraTrees model slightly outperforms the random forest model, and both perform
    better than the decision tree classifier.


    In this section, we gave an overview of bagging and random forests, a bagging-based
    decision tree ensemble learning method that provides some benefits over standard
    decision trees. The following section examines an alternative ensemble learning
    method: gradient boosting.


    ## Gradient-boosted decision trees


    **Gradient boosting** is an ensemble learning methodology that combines multiple
    models *sequentially* to produce a more robust ensemble model. Unlike bagging,
    where multiple *strong* models are used (in parallel), with boosting, multiple
    weak learners are trained, each learning from the mistakes of those before it
    to build a more accurate and robust ensemble model. Another distinct difference
    from bagging is that each model uses the entire dataset for training.


    > **Note**

    As discussed next, gradient boosting always builds a series of regression trees
    to form part of the ensemble, regardless of whether a regression or classification
    problem is solved. Gradient boosting is also called **Multiple Additive Regression
    Trees (MART)**.


    Abstractly, the boosting process starts with a weak base learner. In the case
    of decision trees, the base learner might have only a single split (also known
    as a decision stump). The error residuals (the difference between the predicted
    and actual targets) are then calculated. A new learner is then trained on the
    error residuals of the previous learner, looking to minimize the errors. The final
    prediction is a *summation* of the predictions from all the learners. The following
    diagram illustrates the iterative gradient-boosting process:'
  mdcn: '## 随机森林


    **随机森林**是一种针对决策树的Bagging集成学习方法[1]。顾名思义，它不是构建单个决策树，而是使用Bagging训练多棵决策树：每棵树在训练数据的随机样本、随机特征或两者兼有的基础上进行训练。随机森林同时支持分类和回归任务。


    随机森林中单棵树的训练方法与单棵决策树相同，如前所述，每棵树都是一棵完整的树。森林的最终预测结果是通过取所有树的算术平均值（用于回归预测）或多数投票（用于分类）得出的。


    在性能方面，随机森林学习产生的模型更稳健、准确率更高，并且倾向于避免过拟合（因为没有单个模型能在所有训练数据上过拟合）。


    ## 随机森林超参数


    在scikit-learn中，可以预期，随机森林可用的超参数与训练决策树可用的超参数相同。我们可以指定`max_depth`、`min_samples_split`、`max_leaf_nodes`等参数，然后用它们来训练单棵树。然而，有三个值得注意的额外参数，如下所示：


    - `n_estimators`：控制森林中树的数量。通常，树越多越好。然而，往往会达到一个收益递减点。

    - `max_features`：确定在分裂节点时用作子集的最大特征数。设置`max_features=1.0`允许在随机选择中使用所有特征。

    - `bootstrap`：决定是否使用Bagging。如果`bootstrap`设置为`False`，则所有树都使用整个训练集。


    scikit-learn中所有可用参数的列表可在此处查看：https://scikit-learn.org/stable/modules/generated/sklearn.ensemble.RandomForestClassifier.html。


    ## 极端随机树


    **极端随机树（ExtraTrees）**是一种构建随机决策树的相关方法。使用ExtraTrees时，在构建决策节点时，会随机创建几个候选分裂点，而不是使用*基尼指数*或*信息增益*度量来计算最优分裂[2]。然后从所有随机分裂中选择最佳分裂用于该节点。ExtraTrees的方法可以应用于单棵决策树，也可以与随机森林结合使用。scikit-learn将ExtraTrees实现为随机森林的扩展（https://scikit-learn.org/stable/modules/ensemble.html#extremely-randomized-trees）。


    在scikit-learn中，ExtraTrees的实现具有与随机森林相同的超参数。


    ## 使用scikit-learn训练随机森林


    我们现在将看看如何在scikit-learn中使用随机森林。


    ## 集成学习 – Bagging与Boosting


    在这个例子中，我们将使用*森林覆盖类型*数据集（https://archive.ics.uci.edu/ml/datasets/Covertype），该数据集可在scikit-learn中获取（https://scikit-learn.org/stable/modules/generated/sklearn.datasets.fetch_covtype.html#sklearn.datasets.fetch_covtype）。该数据集比我们之前使用的玩具数据集有了显著提升。数据集包含581,012个样本，维度（特征数）为54。这些特征描述了美国一块30x30米的森林区域（例如，海拔、坡向、坡度以及到水文特征的距离）。我们必须构建一个分类器，将每个区域分类到描述森林覆盖类型的七个类别之一。


    除了训练一个`RandomForestClassifier`，我们还将训练一个独立的`DecisionTreeClassifier`和一个`ExtraTreesClassifier`，并比较这些算法的性能。


    `RandomForestClassifier`和`ExtraTreesClassifier`位于`sklearn.ensemble`包中。除了常规导入，我们从那里导入分类器，如下所示：


    ```

    from sklearn import datasets

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.ensemble import RandomForestClassifier, ExtraTreesClassifier

    from sklearn.model_selection import train_test_split

    from sklearn.metrics import f1_score

    ```


    scikit-learn的datasets包提供了森林覆盖数据集。我们可以使用scikit-learn获取数据集并将其拆分为训练集和测试集，如下所示：


    ```

    dataset = datasets.fetch_covtype()

    X_train, X_test, y_train, y_test = train_test_split(dataset.data, dataset.target,
    random_state=179)

    ```


    最后，我们可以训练我们的分类器，并在测试集上评估每一个：


    ```

    tree = DecisionTreeClassifier(random_state=179, min_samples_leaf=3, min_samples_split=6)

    tree = tree.fit(X_train, y_train)

    print(f1_score(y_test, tree.predict(X_test), average="macro"))

    forest = RandomForestClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=140)

    forest = forest.fit(X_train, y_train)

    print(f1_score(y_test, forest.predict(X_test), average="macro"))

    extra_tree = ExtraTreesClassifier(random_state=179, min_samples_leaf=1, min_samples_split=2,
    n_estimators=180)

    extra_tree = extra_tree.fit(X_train, y_train)

    print(f1_score(y_test, extra_tree.predict(X_test), average="macro"))

    ```


    我们为模型设置了适合该问题的超参数。另一个步骤是优化算法超参数以找到最佳参数值。参数优化将在后面的章节中详细讨论。


    运行前面的代码，我们得到每个算法的以下F1分数：


    | 模型 | F1分数 |

    |---|---|

    | 决策树 | 0.8917 |

    | 随机森林 | 0.9209 |

    | 极端随机树 | 0.9231 |


    表2.1 – 森林覆盖类型数据集上各算法的F1分数


    极端随机树模型略优于随机森林模型，两者都优于决策树分类器。


    在本节中，我们概述了Bagging和随机森林，这是一种基于Bagging的决策树集成学习方法，它比标准决策树提供了一些优势。下一节将探讨另一种集成学习方法：梯度提升。


    ## 梯度提升决策树


    **梯度提升**是一种集成学习方法，它*顺序地*组合多个模型以产生更稳健的集成模型。与Bagging使用多个*强*模型（并行）不同，Boosting训练多个弱学习器，每个学习器都从前面学习器的错误中学习，以构建更准确、更稳健的集成模型。与Bagging的另一个显著区别是，每个模型都使用整个数据集进行训练。


    > **注意**

    如下文所述，无论解决的是回归还是分类问题，梯度提升总是构建一系列回归树作为集成的一部分。梯度提升也称为**多重加性回归树（MART）**。


    抽象地说，Boosting过程从一个弱基础学习器开始。在决策树的情况下，基础学习器可能只有一个分裂点（也称为决策树桩）。然后计算误差残差（预测目标与实际目标之间的差异）。然后在前一个学习器的误差残差上训练一个新的学习器，旨在最小化误差。最终预测是所有学习器预测的*总和*。下图说明了迭代的梯度提升过程：'

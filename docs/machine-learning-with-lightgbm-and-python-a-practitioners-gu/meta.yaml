    Finally, we can now calculate our next prediction, $F_1(x)$, defined by: $F_m(x)
    = F_{m-1}(x) + v \sum_{j=1}^k \gamma_{jm} I(x \in R_{jm})$, meaning our next prediction
    consists of the previous prediction plus the $\gamma$ values calculated in *step
    2.3*, weighed by a learning rate $v$. The summation here means that should a sample
    be part of multiple leaf nodes, we take the sum of the gamma values. Let’s calculate
    $F_1(x)$ for the first sample in our dataset, using a learning rate of 0.1. According
    to the regression tree from *step 2.2*, our sample (which has a BMI > 26) maps
    to $\gamma_{2,1}$. Since it’s only mapping to a single leaf, we don’t need the
    summation part of the equation. Therefore, the equation looks like this:'

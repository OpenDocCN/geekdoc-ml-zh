    \ billing, pays for tech support, and their monthly charges. The data consists\
    \ of both numeric and categorical features. The data has already been cleaned\
    \ and is balanced, allowing us to focus on the parameter optimization study.\n\
    \nWe start by defining the objective of our parameter study. The `objective` function\
    \ is called once for each trial. In this case, we want to train a LightGBM model\
    \ on the data and calculate the F1 score. Optuna passes a `trial` object to the\
    \ `objective` function, which we can use to set up the parameters for the specific\
    \ trial. The following is an example code snippet that shows how to define an\
    \ `objective` function with parameters:\n\n```\ndef objective(trial):\n    boosting_type\
    \ = trial.suggest_categorical(\n        \"boosting_type\", [\"dart\", \"gbdt\"\
    ])\n    lambda_l1= trial.suggest_float(\n        'lambda_l1', 1e-8, 10.0, log=True),\n\
    \    ...\n    min_child_samples= trial.suggest_int(\n        'min_child_samples',\
    \ 5, 100),\n    learning_rate = trial.suggest_float(\n        \"learning_rate\"\
    , 0.0001, 0.5, log=True),\n    max_bin = trial.suggest_int(\n        \"max_bin\"\
    , 128, 512, 32),\n    n_estimators = trial.suggest_int(\n        \"n_estimators\"\
    , 40, 400, 20)\n```\n\nHere, we can see how we use the methods provided by `trial`\
    \ to set up the hyperparameters. For each parameter, a value is suggested by the\
    \ optimization algorithm within the range specified. We can suggest categorical\
    \ variables using `trial.suggest_categorical` (as can be seen for the boosting\
    \ type), and `int` and `float` parameters using `suggest_int` and `suggest_float`,\
    \ respectively. When suggesting floats or integers, a range and, optionally, a\
    \ step size are specified:\n\n```\nn_estimators = trial.suggest_int(\n    name=\"\
    n_estimators\", low=40, high=400, step=20)\n```\n\nSetting a step size means the\
    \ optimization algorithm does not suggest any arbitrary value in the range but\
    \ limits suggestions to the steps between the lower and upper bound (40, 60, 80,\
    \ 100, ..., 400).\n\nWe also have the option to log scale the range of possible\
    \ values by passing `log=True` for numeric parameters. Log scaling the parameter\
    \ range has the effect that more values are tested close to the range's lower\
    \ bound and (logarithmically) fewer values towards the upper bound. Log scaling\
    \ is particularly well suited to the learning rate where we want to focus on smaller\
    \ values and exponentially increase tested values until the upper bound."

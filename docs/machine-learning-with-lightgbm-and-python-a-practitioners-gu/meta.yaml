    \ 20.18 |\n\nTable 6.1 – Statistical description of numerical features in the\
    \ Wind Turbine dataset\n\nLooking at the statistical description of the features\
    \ in *Table 6.1*, we can see the following irregularities:\n\n- **Many features\
    \ have outliers**: Generally, a standard deviation larger than the mean may indicate\
    \ outlying values. Examples include wind speed, atmospheric temperature, and atmospheric\
    \ pressure. Similarly, a minimum or maximum far away from the mean may indicate\

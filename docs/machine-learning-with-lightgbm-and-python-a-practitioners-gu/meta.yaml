    \ 中给出。\n- **数据增强：** 这涉及通过对现有实例添加小的扰动来在数据集中创建新实例。这种方法在图像分类任务中很普遍。\n- **使用适当的评估指标：**\
    \ 准确率在类别不平衡的情况下通常具有误导性。相反，精确率、召回率、F1 分数、**ROC 曲线下面积 (AUC-ROC)** 和混淆矩阵等指标可以提供更全面的模型性能视图。\n\
    \n在我们的案例研究中，我们已经在使用针对不平衡类别的稳健评估指标。对于这个问题，我们使用 SMOTE（一种过采样技术）来平衡我们的类别，同时保留我们的数据。\n\
    \n### SMOTE\n\nSMOTE 的开发是为了克服简单过采样少数类的一些缺点，后者可能由于实例的精确复制而导致过拟合 [1]。SMOTE 不是简单地复制少数样本，而是创建合成的或“假的”样本，这些样本与少数类中的现有样本相似但不完全相同。\n\

  md: "We then create a view to prepare the data for training. Notably, two type transformations\
    \ are performed: features with Yes/No values are mapped to booleans, and we cast\
    \ our monthly and total charges to REAL values (after mapping the text values\
    \ to NULL). We also exclude CustomerId from the view as this can't be used for\
    \ training.\n\n# Training and hyperparameter optimization\n\nWe can train our\
    \ LightGBM model as follows:\n\n```\nSELECT *\nFROM pgml.train('Telco Churn',\n\
    \    task => 'classification',\n    relation_name => 'pgml.telco_churn_data',\n\
    \    y_column_name => 'churn',\n    algorithm => 'lightgbm',\n    preprocess =>\
    \ '{\"totalcharges\": {\"impute\": \"mean\"} }',\n    search => 'random',\n  \
    \  search_args => '{\"n_iter\": 500 }',\n    search_params => '{\n        \"num_leaves\"\
    : [2, 4, 8, 16, 32, 64]\n    }'\n);\n```\n\nWe set the view as our relation, with\
    \ the churn column being our target feature. For preprocessing, we use the mean\
    \ to ask PostgresML to impute missing values for the `totalcharges` feature.\n\
    \nWe also set up hyperparameter optimization using 500 iterations of a random\
    \ search with the specified search parameter ranges.\n\nAfter completing training,\
    \ we will be able to see our trained and deployed model in the dashboard:\n\n\
    ![](img/5c9d6611c41357518a5920ff1f360451_225_0.png)\n\nFigure 10.4 – Trained LightGBM\
    \ model, as seen in the PostgresML dashboard"

  md: '# # 10 LightGBM Models with PostgresML


    In this chapter, we''ll look at a unique MLOps platform called **PostgresML**.
    PostgresML is a Postgres database extension that allows you to train and deploy
    ML models using SQL.


    PostgresML and SQL are a significant departure from the scikit-learn style of
    programming we''ve used throughout this book. However, as we''ll see in this chapter,
    performing ML model development and deployment at the database level has significant
    advantages regarding data movement requirements and inferencing latency.


    The main topics in this chapter are as follows:


    +   - An overview of PostgresML

    - Getting started with PostgresML

    - A customer churn case study with PostgresML and LightGBM


    # ## Technical requirements


    This chapter includes practical examples of working with PostgresML. Docker will
    be used to set up a PostgresML environment and is recommended to run the examples.
    The code for this chapter is available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-10.


    # ## Introducing PostgresML


    PostgresML (https://postgresml.org/) is an extension for Postgres that allows
    practitioners to implement the entire ML life cycle on top of a Postgres database
    for text and tabular data.'
  merge: -1
  pgno: 215
- img_proc: true
  md: 'PostgresML utilizes SQL as the interface to train models, create deployments,
    and make predictions. The use of SQL means model and data operations can be combined
    seamlessly and fit naturally into Postgres DB data engineering environments.


    There are many advantages to having a shared data and ML platform. As we saw in
    the previous chapter, with SageMaker, significant effort is spent on moving data
    around. This is a common problem in ML environments where data, especially transactional
    data, lives in production databases, and complex data engineering workflows need
    to be created to extract data from production sources, transform the data for
    ML use, and load the data into a store that''s accessible to the ML platform (such
    as S3 for SageMaker).


    By combining the data store with the ML platform, PostgresML does away with moving
    data from one platform to another, saving significant time, effort, storage, and
    potentially egress costs.


    Further, modeling from live transactional data means that training data is always
    up to date (read directly from the system of record) instead of gated behind a
    refresh. This eliminates errors that stem from working with outdated data or data
    being transformed or loaded incorrectly by ETL jobs.


    # Latency and round trips


    A typical pattern for model deployment, which we''ve illustrated in earlier chapters,
    is deploying models behind a web API. In microservice terms, the model deployment
    is just another service that can be composed of other services to realize the
    overall system goal.


    Deployment as a web service has several advantages. First, interoperability with
    other systems is straightforward via network calls when using web standards such
    as REST. Second, it allows you to independently deploy the model code, isolated
    from the rest of the system, affording resilience and independent scaling.


    However, deploying models as separate services also has a significant downside:
    latency and network round trips.


    Let''s consider an e-commerce example. A common ML problem in e-commerce settings
    is fraud detection. Here is a system architecture diagram of a simple e-commerce
    system:'
  merge: -1
  pgno: 216
- img_proc: true
  md: '![](img/5c9d6611c41357518a5920ff1f360451_217_0.png)


    Figure 10.1 – Simplified e-commerce system architecture illustrating the interaction
    between functional services (transaction) and an ML-driven service (fraud detection)


    Considering the architecture in *Figure 10.1*, the flow for a new transaction
    proceeds as follows:


    +   1. The transaction is sent to the transaction service.

    2. The transaction service calls the fraud detection service with the details
    of the new transaction.

    3. The fraud detection service receives the new transaction, loads the relevant
    model from model storage (if needed), loads historical data from the transaction
    storage, and responds to the transaction service with the prediction.

    4. The transaction service receives the fraud prediction and stores the transaction
    with the relevant classification.


    A few variations on this workflow might exist. However, due to the separation
    of the transaction and fraud detection services, many network round trips have
    to be made to process a new transaction. Making the fraud prediction also requires
    fetching historical data from the transaction storage to feed to the model.


    The networking call latency and round trips add significant overhead to the transaction.
    If the goal is to achieve a low-latency or real-time system, significantly more
    complex architectural components are required – for example, caching for the model
    and transactional data and higher throughput web services.'
  merge: -1
  pgno: 217
- img_proc: true
  md: 'With PostgresML, the architecture may be simplified as follows:


    ![](img/5c9d6611c41357518a5920ff1f360451_218_0.png)


    Figure 10.2 – Combining the ML services with data storage using PostgresML allows
    for a more straightforward system design


    Although this example is an oversimplification, the point is that significant
    overhead is added to the overall process of leveraging ML models in a service-oriented
    architecture with separate model services.


    Through PostgresML, we can eliminate the need for separate model storage and overheads
    of loading models and, importantly, combine data storage calls and predictions
    into a single call on the data storage layer with no network overhead in between.
    PostgresMLs benchmarks found that the simplified architecture improved performance
    by a factor of 40 within a cloud environment [1].


    However, there are also downsides to this architecture. First, the database is
    now a single point of failure. If the database is unavailable, all models and
    predictive capabilities are also unavailable. Second, the architecture mixes the
    concerns of data storage and ML modeling and inference. Depending on the use case,
    training and deploying ML models has different server infrastructure needs compared
    to serving SQL queries and storing data. The mixture of concerns might force you
    to compromise on one or the other responsibilities or significantly increase database
    infrastructure costs to support all use cases.


    In this section, we introduced PostgresML and explained, at a conceptual level,
    the advantages of combining our data store and ML service. Now, we''ll look at
    practically setting up and getting started with PostgresML, alongside some basic
    functionality.


    # Getting started with PostgresML


    PostgresML, of course, relies on PostgreSQL being installed. PostgresML requires
    PostgreSQL 11, with newer versions also supported. PostgresML also requires Python
    3.7+ to be installed on your system. Both ARM and Intel/AMD architectures are
    supported.'

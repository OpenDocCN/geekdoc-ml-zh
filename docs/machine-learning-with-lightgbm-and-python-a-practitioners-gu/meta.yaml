  - "[PAGE 127]\n\n# Predicting wind turbine power generation with LightGBM\n\nOur\
    \ first case study is a problem where we aim to predict the power generation of\
    \ wind turbines. The dataset for the problem is available from https://www.kaggle.com/datasets/mukund23/hackerearth-machine-learning-challenge.\n\
    \nWe work through the problem using the steps defined in the previous section,\
    \ articulating the details involved in each step alongside code snippets. The\
    \ complete end-to-end solution is available at https://github.com/PacktPublishing/Practical-Machine-Learning-with-LightGBM-and-Python/tree/main/chapter-6/wind-turbine-power-output.ipynb.\n\
    \n# Problem definition\n\nThe dataset consists of power generation (in kW/h) measurements\
    \ of wind turbines taken at a specific date and time. Alongside each measurement\
    \ are the parameters of the wind turbine, which include physical measurements\
    \ of the windmill (including windmill height, blade breadth, and length), operating\
    \ measurements for the turbine (including resistance in ohms, motor torque, generator\
    \ temperature, and rotor torque) and atmospheric conditions (including wind speed,\
    \ temperature, and pressure).\n\nGiven the set of parameters, we must build a\
    \ regression model to predict the generated power in kW/h. Therefore, we employ\
    \ regression modeling. The quality of the model is measured using the **mean squared\
    \ error (MSE)** and the coefficient of determination ($R^2$). We must also determine\
    \ which factors have the most significant impact on power generation.\n\n# Data\
    \ collection\n\nThe dataset comprises 22,800 samples collected within 11 months,\
    \ from October 2018 to September 2019. The data is available as CSV files and\
    \ is released as public domain data. No additional data is collected.\n\n# Data\

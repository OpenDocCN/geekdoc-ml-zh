    \n## 决策树学习\n\n本节介绍决策树学习，这是理解LightGBM所必需的一种机器学习算法。我们将通过一个使用scikit-learn构建决策树的例子来讲解。本节还将提供一些构建决策树的数学定义；理解这些定义并非关键，但它将帮助我们理解关于决策树超参数的讨论。\n\
    \n决策树是基于树的学习器，其功能是通过对数据提出一系列问题来确定结果。沿着树向下走一条路径，使用一个或多个特征对输入做出决策。路径终止于一个叶节点，该节点代表预测的类别或值。决策树可用于分类或回归。\n\
    \n以下是在鸢尾花数据集上拟合的决策树的示意图：\n\n![](img/5c9d6611c41357518a5920ff1f360451_38_0.png)\n\
    \n鸢尾花数据集是一个分类数据集，其中使用鸢尾花的萼片和花瓣尺寸来预测鸢尾花的类型。每个非叶节点使用一个或多个特征来缩小数据集中的样本范围：根节点从所有150个样本开始，然后根据花瓣宽度（<=\
    \ 0.8）进行分割。我们继续沿着树向下走，每个节点进一步分割样本，直到我们到达一个包含预测类别（变色鸢尾、维吉尼亚鸢尾或山鸢尾）的叶节点。\n\n与其他模型相比，决策树有许多优点：\n\
    \n- **特征可以是数值型或分类型**：可以使用数值特征（通过分割范围）或分类特征来分割样本，而我们无需对两者进行编码。\n- **减少数据准备的需求**：决策分割对数据范围或大小不敏感。许多其他模型（例如神经网络）要求数据归一化到单位范围。\n\
    - **可解释性**：如前所述，解释树所做的预测是直接的。在必须向决策者解释预测的场景中，可解释性非常有价值。\n\n这些只是使用基于树的模型的一些优点。然而，我们也需要意识到与决策树相关的一些缺点：\n\
    \n- **过拟合**：决策树非常容易过拟合。在拟合决策树时，设置正确的超参数至关重要。决策树中的过拟合将在后面详细讨论。\n- **外推能力差**：决策树的外推能力较差，因为其预测不是连续的，并且实际上受限于训练数据。\n\
    - **不平衡数据**：在不平衡数据上拟合树时，高频类别会主导预测。需要准备数据以消除不平衡。\n\n关于决策树优缺点的更详细讨论，请参阅 https://scikit-learn.org/stable/modules/tree.html。\n\
    \n## 熵与信息增益\n\n首先，在我们研究构建（或拟合）决策树的算法之前，我们需要对熵和信息增益有一个基本的理解。\n\n熵可以被视为衡量系统无序或随机性的一种方式。熵衡量特定输入或事件的结果可能有多令人惊讶。考虑一副洗得很匀的扑克牌：从牌堆顶部抽牌可能给我们牌堆中的任何一张牌（每次都是一个令人惊讶的结果）；因此，我们可以说一副洗匀的扑克牌具有**高熵**。从一副有序的牌堆顶部抽牌则不会令人惊讶；我们知道下一张是什么牌。因此，一副有序的扑克牌具有**低熵**。解释熵的另一种方式是数据集的不纯度：低熵数据集（整齐有序）比高熵数据集的不纯度更低。\n\
    \n信息增益，反过来，是指在修改或观察底层数据时获得的信息量。信息增益涉及减少观察前的熵。在我们的扑克牌例子中，我们可能会拿一副洗匀的扑克牌，按花色（黑桃、红桃、方块和梅花）将其分成四副较小的牌堆。如果我们从较小的牌堆中抽牌，结果就不会那么令人惊讶：我们知道下一张牌是同一花色的。通过按花色分割牌堆，我们"

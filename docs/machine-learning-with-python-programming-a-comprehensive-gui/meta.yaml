- md: "Mass function of a binomial distribution:\nHere, $n, k$ is the binomial coefficient\
    \ $n$ choose $k$. As you can see, you can calculate the probability that the prediction\
    \ of the ensemble is wrong. Now, let's take a look at a more concrete example\
    \ of 11 base classifiers ($n = 11$) with an error rate of 0.25 ($\\varepsilon\
    \ = 0.25$):\n\nYou can notice that the error rate of the ensemble (0.034) is smaller\
    \ than the error rate of each individual classifier (0.25) if all the assumptions\
    \ are met. Note that in this simplified image, a 50-50 split by an even number\
    \ of classifiers $n$ is treated as an error, whereas this is only true half of\
    \ the time. To compare such an idealistic ensemble classifier to a base classifier\
    \ over a range of different base error rates, let's implement the probability\
    \ mass function in Python:\n\n```python\n>>> import math\n>>> def ensemble_error(n_classifier,\
    \ error):\n...     q_start = math.ceil(n_classifier / 2.0)\n...     probability\
    \ = [comb(n_classifier, q) *\n...     error**q *\n...     (1-error)**(n_classifier\
    \ - q)\n...     for q in range(q_start, n_classifier + 2)]\n...     return sum(probability)\n\
    >>> ensemble_error(n_classifier=11, error=0.25)\n0.034327507019042969\n```\n\n\
    Let's write some code to compute the rates for the different errors and visualize\
    \ the relationship between ensemble and base errors in a line graph:\n\n```python\n\
    >>> import numpy as np\n>>> error_range = np.arange(0.0, 1.01, 0.01)\n>>> en_error\
    \ = [ensemble_error(n_classifier=11, error=er)\n... for er in error_range]\n>>>\
    \ import matplotlib.pyplot as plt\n>>> plt.plot(error_range, en_error,\n... label='Ensemble\
    \ error',\n... linewidth=2)\n>>> plt.plot(error_range, error_range,\n... ls='--',\
    \ label='Base error',\n... linewidth=2)\n>>> plt.xlabel('Base error')\n>>> plt.ylabel('Ensemble\
    \ error')\n>>> plt.legend(loc='upper left')\n>>> plt.grid()\n>>> plt.show()\n\
    ```\n\nAs we can see in the resulting plot, the error probability of an ensemble\
    \ is always better than the error of an individual base classifier as long as\
    \ the base classifiers perform better than random guessing ($\\varepsilon < 0.5$).\
    \ You should notice that the y-axis depicts the base error as well as the ensemble\
    \ error (continuous line):\n\n![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_108_0.png)\n\
    \n## Implementing a simple majority classifier\n\nAs we saw in the introduction\
    \ to machine learning in the last section, we will work with a warm-up training\
    \ and then develop a simple classifier for majority voting in Python programming.\
    \ As you can see, the next algorithm will work on multi-class settings via plurality\
    \ voting; you will use the term majority voting for simplicity as is also often\
    \ done in literature.\n\nIn the following program, we will develop and also combine\
    \ different classification programs associated with individual weights for confidence.\
    \ Our goal is to build a stronger meta-classifier that balances out the individual\
    \ classifiers' weaknesses on a particular dataset. In more precise mathematical\
    \ terms, we can write the weighted majority vote.\n\nTo translate the concept\
    \ of the weighted majority vote into Python code, we can use NumPy's convenient\
    \ argmax and bincount functions:\n\n```python\n>>> import numpy as np\n>>> np.argmax(np.bincount([0,\
    \ 0, 1],\n... weights=[0.2, 0.2, 0.6]))\n1\n```\n\nHere, $p_{ij}$ is the predicted\
    \ probability of the $j$th classifier for class label $i$. To continue with our\
    \ previous example, let's assume that we have a binary classification problem\
    \ with class labels $i \\in \\{0, 1\\}$ and an ensemble of three classifiers $C_j$\
    \ ($j \\in \\{1, 2, 3\\}$). Let's assume that the classifier $C_j$ returns the\
    \ following class membership probabilities for a particular sample $x$:\n\n$C_1(x)\
    \ \\rightarrow [0.9, 0.1], C_2(x) \\rightarrow [0.8, 0.2], C_3(x) \\rightarrow\
    \ [0.4, 0.6]$\n\nTo implement the weighted majority vote based on class probabilities,\
    \ we can again make use of NumPy using numpy.average and np.argmax:\n\n```python\n\
    >>> ex = np.array([[0.9, 0.1],\n... [0.8, 0.2],\n... [0.4, 0.6]])\n>>> p = np.average(ex,\
    \ axis=0, weights=[0.2, 0.2, 0.6])\n>>> p\narray([ 0.58, 0.42])\n>>> np.argmax(p)\n\
    0\n```\n\nPutting everything together, let's now implement a MajorityVoteClassifier\
    \ in Python:\n\n```python\nfrom sklearn.base import BaseEstimator, ClassifierMixin\n\
    from sklearn.preprocessing import LabelEncoder\nfrom sklearn.externals import\
    \ six\nfrom sklearn.base import clone\nfrom sklearn.pipeline import _name_estimators\n\
    import numpy as np\nimport operator\n\nclass MVClassifier(BaseEstimator, ClassifierMixin):\n\
    \    \"\"\" A majority vote ensemble classifier\n\n    Parameters\n    ----------\n\
    \    cl : array-like, shape = [n_classifiers]\n        Different classifiers for\
    \ the ensemble.\n    vote : str, {'cl_label', 'prob'}\n        Default: 'cl_label'\n\
    \        If 'cl_label' the prediction is based on the argmax of class labels.\n\
    \        If 'prob', the argmax of the sum of probabilities is used to predict\
    \ the class label (recommended for calibrated classifiers).\n    w : array-like,\
    \ shape = [n_classifiers]\n        Optional, default: None\n        If a list\
    \ of `int` or `float` values are provided, the classifiers are weighted by these\
    \ values.\n    \"\"\"\n    def __init__(self, cl, vote='cl_label', w=None):\n\
    \        self.cl = cl\n        self.named_cl = {key: value for\n             \
    \            key, value in\n                         _name_estimators(cl)}\n \
    \       self.vote = vote\n        self.w = w\n\n    def fit(self, X, y):\n   \
    \     \"\"\" Fit classifiers.\n\n        Parameters\n        ----------\n    \
    \    X : {array-like, sparse matrix}, shape = [n_samples, n_features]\n      \
    \      Matrix of training samples.\n        y : array-like, shape = [n_samples]\n\
    \            Vector of target class labels.\n\n        Returns\n        -------\n\
    \        self : object\n        \"\"\"\n        # Use LabelEncoder to ensure class\
    \ labels start\n        # with 0, which is important for np.argmax\n        #\
    \ call in self.predict\n        self.lablenc_ = LabelEncoder()\n        self.lablenc_.fit(y)\n\
    \        self.classes_ = self.lablenc_.classes_\n        self.cl_ = []\n\n   \
    \     for cl in self.cl:\n            fit_cl = clone(cl).fit(X, self.lablenc_.transform(y))\n\
    \            self.cl_.append(fit_cl)\n        return self\n```\n\nI added a lot\
    \ of comments to the code to better understand the individual parts. However,\
    \ before we implement the remaining methods, let's take a quick break and discuss\
    \ some of the code that may look confusing at first. We used the parent classes\
    \ BaseEstimator and ClassifierMixin to get some base functionality for free, including\
    \ the methods get_params and set_params to set and return the classifier's parameters\
    \ as well as the score method to calculate the prediction accuracy, respectively.\
    \ Also, note that we imported six to make the MajorityVoteClassifier compatible\
    \ with Python 2.7.\n\nNext, we will add the predict method to predict the class\
    \ label via majority vote based on the class labels if we initialize a new MajorityVoteClassifier\
    \ object with vote='classlabel'. Alternatively, we will be able to initialize\
    \ the ensemble classifier with vote='probability' to predict the class label based\
    \ on the class membership probabilities. Furthermore, we will also add a predict_proba\
    \ method to return the average probabilities, which is useful to compute the Receiver\
    \ Operator Characteristic area under the curve (ROC AUC).\n\n```python\n    def\
    \ predict(self, X):\n        \"\"\" Predict class labels for X.\n\n        Parameters\n\
    \        ----------\n        X : {array-like, sparse matrix},\n            shape\
    \ = [n_samples, n_features]\n            Matrix of training samples.\n\n     \
    \   Returns\n        -------\n        maj_v : array-like, shape = [n_samples]\n\
    \            Predicted class labels.\n        \"\"\"\n        if self.vote ==\
    \ 'probability':\n            maj_v = np.argmax(self.predict_proba(X), axis=1)\n\
    \        else:  # 'cl_label' vote\n            predictions = np.asarray([cl.predict(X)\
    \ for cl in\n                                      self.cl_]).T\n            maj_v\
    \ = np.apply_along_axis(\n                lambda x:\n                np.argmax(np.bincount(x,\
    \ weights=self.w)), axis=1,\n                arr=predictions)\n            maj_v\
    \ = self.lablenc_.inverse_transform(maj_v)\n        return maj_v\n\n    def predict_proba(self,\
    \ X):\n        \"\"\" Predict class probabilities for X.\n\n        Parameters\n\
    \        ----------\n        X : {array-like, sparse matrix},\n            shape\
    \ = [n_samples, n_features]\n            Training vectors, where n_samples is\
    \ the number of samples\n            and n_features is the number of features.\n\
    \n        Returns\n        -------\n        av_prob : array-like, shape = [n_samples,\
    \ n_classes]\n            Weighted average probability for each class per sample.\n\
    \        \"\"\"\n        probs = np.asarray([cl.predict_proba(X) for cl in self.cl_])\n\
    \        av_prob = np.average(probs, axis=0, weights=self.w)\n        return av_prob\n\
    \n    def get_params(self, deep=True):\n        \"\"\" Get classifier parameter\
    \ names for GridSearch\"\"\"\n        if not deep:\n            return super(MVClassifier,\
    \ self).get_params(deep=False)\n        else:\n            out = self.named_cl.copy()\n\
    \            for name, step in \\\n                    six.iteritems(self.named_cl):\n\
    \                for k, value in six.iteritems(step.get_params(deep=True)):\n\
    \                    out['%s__%s'\n                        % (name, k)] = value\n\
    \            return out\n```\n\n## Combining different algorithms for classification\
    \ with majority vote\n\nNow, it is about time to put the MVC that we implemented\
    \ in the previous section into action. You should first prepare a dataset that\
    \ you can test it on. Since we are already familiar with techniques to load datasets\
    \ from CSV files, we will take a shortcut and load the Iris dataset from scikit-learn's\
    \ dataset module.\n\nFurthermore, we will only select two features, sepal width\
    \ and petal length, to make the classification task more challenging. Although\
    \ our MajorityVoteClassifier, or MVC, generalizes to multiclass problems, we will\
    \ only classify flower samples from the two classes, Iris-Versicolor and Iris-Virginica,\
    \ to compute the ROC AUC. The code is as follows:\n\n```python\n>>> import sklearn\
    \ as sk\n>>> import sklearn.cross_validation as cv\n>>> from sklearn import datasets\n\
    >>> from sklearn.preprocessing import LabelEncoder\n>>> ir = datasets.load_iris()\n\
    >>> X, y = ir.data[50:, [1, 2]], ir.target[50:]\n>>> le = LabelEncoder()\n>>>\
    \ y = le.fit_transform(y)\n```\n\nNext we split the Iris samples into 50 percent\
    \ training and 50 percent test data:\n\n```python\n>>> from sklearn.cross_validation\
    \ import train_test_split\n>>> X_train, X_test, y_train, y_test = \\\n...    \
    \ train_test_split(X, y,\n...                      test_size=0.5,\n...       \
    \               random_state=1)\n```\n\nUsing the training dataset, we now will\
    \ train three different classifiers — a logistic regression classifier, a decision\
    \ tree classifier, and a k-nearest neighbors classifier — and look at their individual\
    \ performances via a 10-fold cross-validation."

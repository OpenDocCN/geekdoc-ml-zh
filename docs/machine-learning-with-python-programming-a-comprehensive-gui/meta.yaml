    \ = 1  # Lr 代表学习率\nNum_it = 1000  # 迭代次数\nL = 100\nmyTheta = np.random.randn(2,1)\n\
    \nfor it in range(Num_it):\n    gr = 2/L * Value1.T.dot(Value1.dot(myTheta) -\

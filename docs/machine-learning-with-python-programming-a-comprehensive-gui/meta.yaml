    # Stochastic Gradient Descent


    You''ll find a problem when you''re using the batch gradient descent: it needs
    to use the whole training set in order to calculate the value at each step, and
    that will affect performance “speed”.


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_84_0.png)


    But when using the stochastic gradient descent, the algorithm will randomly choose
    an instance from your training set at each step, and then it will calculate the
    value. In this way, the algorithm will be faster than the batch gradient descent,
    since it doesn''t need to use the whole set to calculate the value. On the other
    hand, because of the randomness of this method, it will be irregular when compared
    to the batch algorithm.


    Let''s implement the algorithm. Nums = 50

    L1, L2 = 5, 50

    Def lr_sc(s):


    return L1 / (s + L2)'

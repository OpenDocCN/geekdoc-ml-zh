    \n但是当学习率很高时，它将在短时间内覆盖所需内容，并提供最优解。\n\n最后，你不会总是发现所有成本函数都很容易，正如你所看到的，你还会发现不规则的函数，这使得获得最优解变得非常困难。当局部最小值和全局最小值看起来像下图所示时，就会出现这个问题。\n\

    \ received the most votes:\n\n$$\\hat{y} = \\text{mode}\\{C_1(\\mathbf{x}), C_2(\\\
    mathbf{x}), ..., C_m(\\mathbf{x})\\}$$\n\nFor example, in a binary classification\

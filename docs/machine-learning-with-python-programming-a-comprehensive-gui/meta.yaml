  md: '# Testing


    If you''d like to make sure that your model is working well and that model can
    generalize with new cases, you can try out new cases with it by putting the model
    in the environment and then monitoring how it will perform. This is a good method,
    but if your model is inadequate, the user will complain.


    You should divide your data into two sets, one set for training and the second
    one for testing, so that you can train your model using the first one and test
    it using the second. The generalization error is the rate of error by evaluation
    of your model on the test set. The value you get will tell you if your model is
    good enough, and if it will work properly.


    If the error rate is low, the model is good and will perform properly. In contrast,
    if your rate is high, this means your model will perform badly and not work properly.
    My advice to you is to use 80% of the data for training and 20% for testing purposes,
    so that it''s very simple to test or evaluate a model.'
  merge: -1

  md: '# Gradient Descent


    This algorithm is a general algorithm that is used for optimization and for providing
    the optimal solution for various problems. The idea of this algorithm is to work
    with the parameters in an iterative way, to make the cost function as simple as
    possible.


    The gradient descent algorithm calculates the gradient of the error using the
    parameter theta, and it works with the method of descending gradient. If the gradient
    is equal to zero, you''ll reach the minimum.'

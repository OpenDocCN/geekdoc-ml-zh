  md: '# ROC


    ROC stands for receiver operating characteristic and it''s a tool that used with
    binary classifiers.


    This tool is similar to the recall curve, but it doesn''t plot the precision and
    recall: it plots the positive rate


    and false rate. You''ll work also with FPR, which is the ratio of negative samples.
    You can imagine if it''s like (1 - negative rate. Another concept is the TNR and
    it''s the specificity. Recall = 1 - specificity.


    Let''s play with the ROC Curve. First, we''ll need to calculate the TPR and the
    FPR, just by calling the roc-curve () function,


    ```

    from sklearn.metrics import roc_curve fp,tp, thers = roc_curve (y_tr_6, y_sco)

    ```


    After that, you''ll plot the FPR and TPR with Matplotlib according to the following
    instructions.


    ```

    def_roc_plot (fp, tp, label=none): plt.plot(fp, tp, linewidth=2, label = label)

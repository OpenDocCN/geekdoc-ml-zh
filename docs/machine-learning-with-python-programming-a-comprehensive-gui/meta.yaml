  md: '# Online Learning


    This kind of learning is the opposite of batch learning. I mean that, here, **the
    system can learn incrementally by providing the system with** all the available
    data as instances (groups or individually), and then the system can learn on the
    fly.


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_23_0.png)


    You can use this type of system for problems that require the continuous flow
    of data, which also needs to adapt quickly to any changes. Also, you can use this
    type of system to work with very large data sets,


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_23_1.png)


    You should know how fast your system can adapt to any changes in the data’s “learning
    rate.” If the speed is high, means that the system will learn quite, quickly,
    but it also will forget old data quickly.'

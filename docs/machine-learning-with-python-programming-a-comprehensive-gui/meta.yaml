  md: '# CHAPTER 1 INTRODUCTION TO MACHINE LEARNING


    # Theory


    If I ask you about “Machine learning,” you''ll probably imagine a robot or something
    like the Terminator. In reality t, machine learning is involved not only in robotics,
    but also in many other applications. You can also imagine something like a spam
    filter as being one of the first applications in machine learning, which helps
    improve the lives of millions of people. In this chapter, I''ll introduce you
    what machine learning is, and how it works.'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# **What is machine learning?**


    Machine learning is the practice of programming computers to learn from data.
    In the above example, the program will easily be able to determine if given are
    important or are “spam”. In machine learning, data referred to as called training
    sets or examples.'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# Why machine learning?


    Let''s assume that you''d like to write the filter program without using machine
    learning methods. In this case, you would have to carry out the following steps:


    +   - In the beginning, you''d take a look at what spam e-mails looks like. You
    might select them for the words or phrases they use, like “debit card,” “free,”
    and so on, and also from patterns that are used in the sender''s name or in the
    body of the email

    - Second, you''d write an algorithm to detect the patterns that you''ve seen,
    and then the software would flag emails as spam if a certain number of those patterns
    are detected.


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_9_0.png)


    Finally, you''d test the program, and then redo the first two steps again until
    the results are good enough.

    Because the program is not software, it contains a very long list of rules that
    are difficult to maintain. But if you developed the same software using ML, you''ll
    be able to maintain it properly.'
  merge: -1
  pgno: 9
- img_proc: true
  md: '![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_10_0.png)


    In addition, the email senders can change their e-mail templates so that a word
    like “4U” is now “for you,” since their emails have been determined to be spam.
    The program using traditional techniques would need to be updated, which means
    that, if there were any other changes, you would I need to update your code again
    and again and again.


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_10_1.png)


    On the other hand, a program that uses ML techniques will automatically detect
    this change by users, and it starts to flag them without you manually telling
    it to.'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'Also, we can use ,machine learning to solve problems that are very complex
    for non-machine learning software. For example, speech recognition: when you say
    “one” or “two”, the program should be able to distinguish the difference. So,
    for this task, you''ll need to develop an algorithm that measures sound.


    In the end, machine learning will help us to learn, and machine-learning algorithms
    can help us see what we have learned.'

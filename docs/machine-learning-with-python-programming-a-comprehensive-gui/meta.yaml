    ```\n\n如果你尝试更改学习率值，你会得到不同的形状，如下图所示。\n\n## 随机梯度下降\n\n使用批量梯度下降时，你会发现一个问题：它需要使用整个训练集来计算每一步的值，这会影响性能“速度”。\n\
    \n但是当使用随机梯度下降时，算法将在每一步从你的训练集中随机选择一个实例，然后计算值。通过这种方式，算法将比批量梯度下降更快，因为它不需要使用整个集合来计算值。另一方面，由于这种方法的随机性，与批量算法相比，它将是不规则的。\n\
    \n让我们实现这个算法。\n\n```python\nNums = 50\nL1, L2 = 5, 50\n\ndef lr_sc(s):\n    return\
    \ L1 / (s + L2)\n```"

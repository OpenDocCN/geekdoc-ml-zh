  md: '# Overfitting the Data


    If you''re in a foreign country and someone steals something of yours, you might
    say that everyone is a thief. This is an overgeneralization, and, in machine learning,
    is called “overfitting”. This means that machines do the same thing: they can
    perform well when they''re working with the training data, but they can''t generalize
    them properly. For example, in the following figure you''ll find a high degree
    of life satisfaction model that overfits the data, but it works well with the
    training data.


    ![](img/d0dbcd2d1b1acf462813e51bf75e7bf0_31_0.png)


    When does this

    Overfitting occurs when the model is very complex for the amount of training data
    given.'

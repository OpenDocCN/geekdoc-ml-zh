- md: "# MACHINE LEARNING WITH PYTHON PROGRAMMING\n\nA COMPREHENSIVE GUIDE TO BECOME\
    \ EXPERT IN PYTHON PROGRAMMING WITH MACHINE LEARNING ALGORITHM\n\nJOHN C. HOPKINS\n\
    \n# MACHINE LEARNING\n\nSTEP-BY-STEP GUIDE TO IMPLEMENT MACHINE LEARNING ALGORITHMS\
    \ WITH PYTHON\n\n# Table of Contents\n\n## CHAPTER 1: INTRODUCTION TO MACHINE\
    \ LEARNING\n\n- Theory\n- What is machine learning? Why machine learning?\n- When\
    \ should you use machine learning? Types of Systems of Machine Learning\n- Supervised\
    \ and unsupervised learning\n- Supervised Learning\n- The most important supervised\
    \ algorithms\n- Unsupervised Learning\n- The most important unsupervised algorithms\n\
    - Reinforcement Learning\n- Batch Learning\n- Online Learning\n- Instance based\
    \ learning\n- Model-based learning\n- Bad and Insufficient Quantity of Training\
    \ Data\n- Poor-Quality Data\n- Irrelevant Features\n- Feature Engineering\n- Testing\n\
    - Overfitting the Data Solutions\n- Underfitting the Data Solutions\n- EXERCISES\n\
    - SUMMARY\n- REFERENCES\n\n## CHAPTER 2: CLASSIFICATION\n\n- Installation\n- The\
    \ MNIST\n- Measures of Performance\n- Confusion Matrix\n- Recall\n- Recall Tradeoff\n\
    - ROC\n- Multi-class Classification\n- Training a Random Forest Classifier\n-\
    \ Error Analysis\n- Multi-label Classifications\n- Multi-output Classification\n\
    - EXERCISES\n- REFERENCES\n\n## CHAPTER 3: HOW TO TRAIN A MODEL\n\n- Linear Regression\n\
    - Computational Complexity\n- Gradient Descent\n- Batch Gradient Descent\n- Stochastic\
    \ Gradient Descent\n- Mini-Batch Gradient Descent\n- Polynomial Regression\n-\
    \ Learning Curves\n- Regularized Linear Models\n- Ridge Regression\n- Lasso Regression\n\
    - EXERCISES\n- SUMMARY\n- REFERENCES\n\n## CHAPTER 4\n\n- Different models combinations\n\
    - Implementing a simple majority classifier\n- Combining different algorithms\
    \ for classification with majority vote\n\n# CHAPTER 1: INTRODUCTION TO MACHINE\
    \ LEARNING\n\n## Theory\n\nIf I ask you about \"Machine learning,\" you'll probably\
    \ imagine a robot or something like the Terminator. In reality, machine learning\
    \ is involved not only in robotics, but also in many other applications. You can\
    \ also imagine something like a spam filter as being one of the first applications\
    \ in machine learning, which helps improve the lives of millions of people. In\
    \ this chapter, I'll introduce you what machine learning is, and how it works.\n\
    \n## What is machine learning?\n\nMachine learning is the practice of programming\
    \ computers to learn from data. In the above example, the program will easily\
    \ be able to determine if given emails are important or are \"spam\". In machine\
    \ learning, data is referred to as called training sets or examples.\n\n## Why\
    \ machine learning?\n\nLet's assume that you'd like to write the filter program\
    \ without using machine learning methods. In this case, you would have to carry\
    \ out the following steps:\n\n- In the beginning, you'd take a look at what spam\
    \ e-mails look like. You might select them for the words or phrases they use,\
    \ like \"debit card,\" \"free,\" and so on, and also from patterns that are used\
    \ in the sender's name or in the body of the email.\n- Second, you'd write an\
    \ algorithm to detect the patterns that you've seen, and then the software would\
    \ flag emails as spam if a certain number of those patterns are detected.\n\n\
    Finally, you'd test the program, and then redo the first two steps again until\
    \ the results are good enough. Because the program is not software, it contains\
    \ a very long list of rules that are difficult to maintain. But if you developed\
    \ the same software using ML, you'll be able to maintain it properly.\n\nIn addition,\
    \ the email senders can change their e-mail templates so that a word like \"4U\"\
    \ is now \"for you,\" since their emails have been determined to be spam. The\
    \ program using traditional techniques would need to be updated, which means that,\
    \ if there were any other changes, you would need to update your code again and\
    \ again and again.\n\nOn the other hand, a program that uses ML techniques will\
    \ automatically detect this change by users, and it starts to flag them without\
    \ you manually telling it to.\n\nAlso, we can use machine learning to solve problems\
    \ that are very complex for non-machine learning software. For example, speech\
    \ recognition: when you say \"one\" or \"two\", the program should be able to\
    \ distinguish the difference. So, for this task, you'll need to develop an algorithm\
    \ that measures sound.\n\nIn the end, machine learning will help us to learn,\
    \ and machine-learning algorithms can help us see what we have learned.\n\n##\
    \ When should you use machine learning?\n\n- When you have a problem that requires\
    \ many long lists of rules to find the solution. In this case, machine-learning\
    \ techniques can simplify your code and improve performance.\n- Very complex problems\
    \ for which there is no solution with a traditional approach.\n- Non-stable environments:\
    \ machine-learning software can adapt to new data.\n\n## Types of Systems of Machine\
    \ Learning\n\nThere are different types of machine-learning systems. We can divide\
    \ them into categories, depending on whether:\n\n- They have been trained with\
    \ humans or not\n  - Supervised\n  - Unsupervised\n  - Semi-supervised\n  - Reinforcement\
    \ Learning\n- If they can learn incrementally\n  - If they work simply by comparing\
    \ new data points to find data points, or can detect new patterns in the data,\
    \ and then will build a model.\n\n## Supervised and unsupervised learning\n\n\
    We can classify machine learning systems according to the type and amount of human\
    \ supervision during the training. You can find four major categories, as we explained\
    \ before.\n\n- Supervised learning\n- Unsupervised learning\n- Semi-supervised\
    \ learning\n- Reinforcement learning\n\n## Supervised Learning\n\nIn this type\
    \ of system, the data that you feed into the algorithm, with the desired solution,\
    \ are referred to as \"labels.\"\n\n- Supervised learning groups together tasks\
    \ of classification. The above program is a good example of this because it's\
    \ been trained with many emails at the same time as their class.\n\nAnother example\
    \ is to predict a numeric value like the price of a flat, given a set of features\
    \ (location, number of rooms, facilities) called predictors; this type of task\
    \ is called regression.\n\nYou should keep in mind that some regression algorithms\
    \ can be used for classifications as well, and vice versa.\n\n## The most important\
    \ supervised algorithms\n\n- K-nearest neighbors\n- Linear regression\n- Neural\
    \ networks\n- Support vector machines\n- Logistic regression\n- Decision trees\
    \ and random forests\n\n## Unsupervised Learning\n\nIn this type of system, you\
    \ can guess that the data is unlabeled.\n\n## The most important unsupervised\
    \ algorithms\n\n- k-means, hierarchical cluster analysis\n- Association rule:\
    \ Eclat, apriori\n- Visualization and dimensionality: kernel PCA, t-distributed,\
    \ PCA\n\nAs an example, suppose you've got many data on visitor usage of one of\
    \ our algorithms for detecting groups with similar visitors. It may find that\
    \ 65% of your visitors are males who love watching movies in the evening, while\
    \ 30% watch plays in the evening; in this case, by using a clustering algorithm,\
    \ it will divide every group into smaller sub-groups.\n\nThere are some very important\
    \ algorithms, like visualization algorithms; these are unsupervised learning algorithms.\
    \ You'll need to give them many data and unlabeled data as an input, and then\
    \ you'll get 2D or 3D visualization as an output.\n\nThe goal here is to make\
    \ the output as simple as possible without losing any of the information. To handle\
    \ this problem, it will combine several related features into one feature: for\
    \ example, it will combine a car's make with its model. This is called feature\
    \ extraction."
  mdcn: "# 使用Python编程进行机器学习\n\n成为Python编程与机器学习算法专家的全面指南\n\n约翰·C·霍普金斯\n\n# 机器学习\n\n\
    使用Python实现机器学习算法的分步指南\n\n# 目录\n\n## 第一章：机器学习简介\n\n- 理论\n- 什么是机器学习？为什么需要机器学习？\n\
    - 何时应使用机器学习？机器学习系统的类型\n- 监督学习与无监督学习\n- 监督学习\n- 最重要的监督算法\n- 无监督学习\n- 最重要的无监督算法\n\
    - 强化学习\n- 批量学习\n- 在线学习\n- 基于实例的学习\n- 基于模型的学习\n- 训练数据数量不足或质量差\n- 数据质量差\n- 不相关特征\n\
    - 特征工程\n- 测试\n- 过拟合数据的解决方案\n- 欠拟合数据的解决方案\n- 练习题\n- 总结\n- 参考文献\n\n## 第二章：分类\n\n\
    - 安装\n- MNIST数据集\n- 性能度量\n- 混淆矩阵\n- 召回率\n- 召回率权衡\n- ROC曲线\n- 多类别分类\n- 训练随机森林分类器\n\
    - 错误分析\n- 多标签分类\n- 多输出分类\n- 练习题\n- 参考文献\n\n## 第三章：如何训练模型\n\n- 线性回归\n- 计算复杂度\n\
    - 梯度下降\n- 批量梯度下降\n- 随机梯度下降\n- 小批量梯度下降\n- 多项式回归\n- 学习曲线\n- 正则化线性模型\n- 岭回归\n- Lasso回归\n\
    - 练习题\n- 总结\n- 参考文献\n\n## 第四章\n\n- 不同模型的组合\n- 实现简单的多数投票分类器\n- 结合不同算法进行多数投票分类\n\
    \n# 第一章：机器学习简介\n\n## 理论\n\n如果我问你关于“机器学习”的问题，你可能会想象一个机器人或类似《终结者》的东西。实际上，机器学习不仅应用于机器人技术，还涉及许多其他应用领域。你也可以将垃圾邮件过滤器想象为机器学习的早期应用之一，它帮助改善了数百万人的生活。在本章中，我将向你介绍什么是机器学习，以及它是如何工作的。\n\
    \n## 什么是机器学习？\n\n机器学习是通过编程让计算机从数据中学习的实践。在上面的例子中，程序将能够轻松判断给定的电子邮件是重要的还是“垃圾邮件”。在机器学习中，数据被称为训练集或样本。\n\
    \n## 为什么需要机器学习？\n\n假设你想在不使用机器学习方法的情况下编写过滤程序。在这种情况下，你将需要执行以下步骤：\n\n- 首先，你需要查看垃圾邮件的样子。你可以根据它们使用的单词或短语（如“借记卡”、“免费”等）以及发件人姓名或邮件正文中使用的模式来选择它们。\n\
    - 其次，你需要编写一个算法来检测你看到的模式，然后如果检测到一定数量的这些模式，软件就会将邮件标记为垃圾邮件。\n\n最后，你需要测试程序，然后重新执行前两个步骤，直到结果足够好。因为程序不是软件，它包含一个非常长的规则列表，难以维护。但如果你使用机器学习开发相同的软件，你将能够妥善维护它。\n\
    \n此外，电子邮件发送者可以更改他们的电子邮件模板，因此像“4U”这样的词现在变成了“for you”，因为他们的邮件已被确定为垃圾邮件。使用传统技术的程序需要更新，这意味着如果有任何其他更改，你需要一次又一次地更新代码。\n\
    \n另一方面，使用机器学习技术的程序将自动检测用户的这种变化，并开始标记它们，而无需你手动告诉它。\n\n此外，我们可以使用机器学习来解决对非机器学习软件来说非常复杂的问题。例如，语音识别：当你说“一”或“二”时，程序应该能够区分差异。因此，对于这个任务，你需要开发一个测量声音的算法。\n\
    \n最终，机器学习将帮助我们学习，机器学习算法可以帮助我们看到我们学到了什么。\n\n## 何时应使用机器学习？\n\n- 当你遇到需要许多长规则列表才能找到解决方案的问题时。在这种情况下，机器学习技术可以简化你的代码并提高性能。\n\
    - 对于传统方法无法解决的非常复杂的问题。\n- 非稳定环境：机器学习软件可以适应新数据。\n\n## 机器学习系统的类型\n\n有不同类型的机器学习系统。我们可以根据以下情况将它们分类：\n\
    \n- 它们是否经过人类训练\n  - 监督学习\n  - 无监督学习\n  - 半监督学习\n  - 强化学习\n- 它们是否能够增量学习\n  - 如果它们仅通过比较新数据点来查找数据点，或者能够检测数据中的新模式，然后构建模型。\n\
    \n## 监督学习与无监督学习\n\n我们可以根据训练过程中人类监督的类型和数量对机器学习系统进行分类。如前所述，你可以找到四个主要类别。\n\n- 监督学习\n\
    - 无监督学习\n- 半监督学习\n- 强化学习\n\n## 监督学习\n\n在这种类型的系统中，你输入算法的数据以及期望的解决方案被称为“标签”。\n\n\
    - 监督学习将分类任务归为一类。上面的程序就是一个很好的例子，因为它同时使用许多电子邮件及其类别进行训练。\n\n另一个例子是预测数值，例如给定一组特征（位置、房间数量、设施）称为预测变量，预测公寓价格；这种类型的任务称为回归。\n\
    \n你应该记住，一些回归算法也可以用于分类，反之亦然。\n\n## 最重要的监督算法\n\n- K近邻算法\n- 线性回归\n- 神经网络\n- 支持向量机\n\
    - 逻辑回归\n- 决策树和随机森林\n\n## 无监督学习\n\n在这种类型的系统中，你可以猜测数据是无标签的。\n\n## 最重要的无监督算法\n\n\
    - k均值、层次聚类分析\n- 关联规则：Eclat、apriori\n- 可视化和降维：核PCA、t分布、PCA\n\n例如，假设你拥有大量关于访客使用我们其中一个算法的数据，该算法用于检测具有相似访客的群体。它可能发现65%的访客是喜欢在晚上看电影的男性，而30%的人在晚上看戏剧；在这种情况下，通过使用聚类算法，它将每个群体划分为更小的子群体。\n\
    \n有一些非常重要的算法，如可视化算法；这些是无监督学习算法。你需要给它们提供大量数据和无标签数据作为输入，然后你将获得2D或3D可视化作为输出。\n\n\
    这里的目标是在不丢失任何信息的情况下，使输出尽可能简单。为了处理这个问题，它将几个相关的特征组合成一个特征：例如，它将汽车的品牌与其型号组合在一起。这称为特征提取。"

  md: '# Linear Regression


    As an example, we''ll take I_S = θo + θ1 × GDP_per_cap. This is a simple model
    for a linear function of the input feature ,“GPD_per_cap”. (θo and θ1) are the
    parameters of the model,


    $$\hat{y} = \theta_0 + \theta_1x_1 + \theta_2x_2 + \cdots + \theta_nx_n$$


    In general, you''ll use a linear model to make a prediction by calculating a weighted
    sum of the input features, and also a constant “bias,” as you can see in the following
    equation.


    +   - Y is the value of the predictor.

    - N represents the features

    - X1 is the value of the feature.

    - Θj is the model parameter of j theta.


    Also, we can write the equation in vectorized form, as in the following example:


    $$\hat{y} = h_{\theta}(\mathbf{x}) = \theta^T \cdot \mathbf{x}$$


    +   - Θ is the value that minimizes the cost.

    - Y contains the values y (1) to y (m).


    Let’s write some code to practice. Import numpy as np


    ```

    V1_x = 2 * np.random.rand (100, 1)

    V2_y = 4 + 3 * V1_x + np.random.randn (100, 1)

    ```'

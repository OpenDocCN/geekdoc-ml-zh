    >>> print(''Best parameters: %s'' % gd.best_ps_) Best parameters: {''p1 cl C'':
    100.0, ''dtreeclassifier ma_depth'': 1}

    >>> print(''Accuracy: %.2f'' % gd.best_sc_)


  md: '# Implementing a simple majority classifer


    As we saw in the introduction to merge learning in the last section, we will work
    with a warm-up training and then develop a simple classifer for majority voting
    in Python programming. As you can see, the next algorithm will work on multi-
    class settings via plurality voting; you will use the term majority voting for
    simplicity as is also often done in literature.


    In the following program, we will develop and also combine different classification
    programs associated with individual weights for confidence. Our goal is to build
    a stronger meta-classifer that balances out the individual classifiers'' weaknesses
    on a particular dataset. In more precise mathematical terms, we can write the
    weighted majority vote.


    To translate the concept of the weighted majority vote into Python code, we can
    use NumPy''s convenient argmax and bincount functions:


    ```

    >>> import numpy as np

    >>> np.argmax(np.bincount([0, 0, 1],

    ... weights=[0.2, 0.2, 0.6]))

    1

    ```


    Here, pij is the predicted probability of the jth classifer for class label i.
    To continue with our previous example, let''s assume that we have a binary classification
    problem with class labels i ∈ { } 0,1 and an ensemble of three classifiers C j
    ( j ∈ { } 1,2,3 ). Let''s assume that the classifer C j returns the following
    class membership probabilities for a particular sample x:'
  merge: -1
  pgno: 109
- img_proc: true
  md: 'C1 ( ) x → [ ] 0.9,0.1 , C2 ( ) x → [ ] 0.8,0.2 , C3 ( ) x → [ ] 0.4,0.6


    To implement the weighted majority vote based on class probabilities, we can again
    make use of NumPy using numpy.average and np.argmax:'
  merge: -1
  pgno: 110
- img_proc: true
  md: '```

    >>> ex = np.array([[0.9, 0.1],

    ... [0.8, 0.2],

    ... [0.4, 0.6]])

    >>> p = np.average(ex, axis=0, weights=[0.2, 0.2, 0.6])

    >>> p

    array([ 0.58, 0.42])

    >>> np.argmax(p) 0

    ```



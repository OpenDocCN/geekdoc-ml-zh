  md: '# Confusion Matrix


    There is a better method to evaluate the performance of your classifier: the confusion
    matrix.


    It''s easy to measure performance with the confusion matrix, just by counting
    the number of times instances of class X are classified as class Y, for example.
    To get the number of times of image classifiers of 6s with 2s, you should look
    in the row and column of the confusion matrix.


    Let''s calculate the confusion matrix using the cross_val_predict () function.
    from sklearn.model_selection import cross_Val_predict

    y_tr_pre = cross_val_predict (sgd_cl, x_tr, y_tr_6, cv = 3)

    This function, like the cross_val_score() function, performs the k fold cross-
    validation, and it also returns predictions on each fold. It also returns a clean
    prediction for every instance in your training set.


    Now we''re ready to get the matrix using the following code.

    from sklearn.metrics import confusion_matrix confusion_matrix (y_tr_6, y_tr_pred)

    You''ll get an array of 4 values ,“numbers”.

    Every row represents a class in the matrix, and every column represents a predicted
    class.

    The first row is the negative one: that “contain non-6 images”.

    You can learn a lot from the matrix.


    But there is also a good one that''s , interesting to work with if you''d like
    to get the accuracy of the positive predictions, which is the precision of the
    classifier using this equation.

    Precision = (TP)/ (TP+FP) number of true positives number of false positives'

    There are a few things to note about SVCs. First, for the sake of visualization,
    we limited our example to a binary example (i.e., only two classes); however,
    SVCs can work well with multiple classes. Second, as our visualization shows,
    the hyperplane is by definition linear (i.e., not curved). This was okay in this
    example because the data was linearly separable, meaning there was a hyperplane
    that could perfectly separate the two classes. Unfortunately, in the real world
    this is rarely the case.


    More typically, we will not be able to perfectly separate classes. In these situations
    there is a balance between SVC maximizing the margin of the hyperplane and minimizing
    the misclassification. In SVC, the latter is controlled with the hyperparameter
    C. C is a parameter of the SVC learner and is the penalty for misclassifying a
    data point. When C is small, the classifier is okay with misclassified data points
    (high bias but low variance). When C is large, the classifier is heavily penalized
    for misclassified data and therefore bends over backward to avoid any misclassified
    data points (low bias but high variance).'

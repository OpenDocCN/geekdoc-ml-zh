    | female | 462 | 462 | 288 | 462 | 462 | 462 |\n| male | 851 | 851 | 468 | 851\
    \ | 851 | 851 |\n\n### Discussion\n\nIn Recipe 3.18 I mentioned apply. apply is\
    \ particularly useful when you want to apply a function to groups. By combining\
    \ groupby and apply we can calculate custom statistics or apply any function to\
    \ each group separately.\n\n## 3.20 Concatenating DataFrames\n\n### Problem\n\n\
    You want to concatenate two DataFrames.\n\n### Solution\n\nUse concat with axis=0\
    \ to concatenate along the row axis:\n\n```python\n# Load library\nimport pandas\

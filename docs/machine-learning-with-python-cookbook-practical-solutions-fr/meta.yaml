  - "[PAGE 204]\n\nusing our training set, using the features and target vector to\
    \ teach the model how to make the best prediction. Finally, we simulate having\
    \ never-before-seen external data by evaluating how our model performs on our\
    \ test set. However, the validation approach has two major weaknesses. First,\
    \ the performance of the model can be highly dependent on which few observations\
    \ were selected for the test set. Second, the model is not being trained using\
    \ all the available data, and it's not being evaluated on all the available data.\n\
    \nA better strategy, which overcomes these weaknesses, is called *k-fold cross-validation*\
    \ (KFCV). In KFCV, we split the data into *k* parts called *folds*. The model\
    \ is then trained using *k* – 1 folds—combined into one training set—and then\
    \ the last fold is used as a test set. We repeat this *k* times, each time using\
    \ a different fold as the test set. The performance on the model for each of the\
    \ *k* iterations is then averaged to produce an overall measurement.\n\nIn our\
    \ solution, we conducted k-fold cross-validation using five folds and outputted\
    \ the evaluation scores to `cv_results`:\n\n```\n# View score for all 5 folds\n\
    cv_results\n\narray([0.96111111, 0.96388889, 0.98050139, 0.97214485, 0.97214485])\n\
    ```\n\nThere are three important points to consider when we are using KFCV. First,\
    \ KFCV assumes that each observation was created independently from the other\
    \ (i.e., the data is independent and identically distributed [IID]). If the data\
    \ is IID, it is a good idea to shuffle observations when assigning to folds. In\
    \ scikit-learn we can set `shuffle=True` to perform shuffling.\n\nSecond, when\
    \ we are using KFCV to evaluate a classifier, it is often beneficial to have folds\
    \ containing roughly the same percentage of observations from each of the different\
    \ target classes (called *stratified k-fold*). For example, if our target vector\
    \ contained gender and 80% of the observations were male, then each fold would\
    \ contain 80% male and 20% female observations. In scikit-learn, we can conduct\
    \ stratified k-fold cross-validation by replacing the `KFold` class with `StratifiedKFold`.\n\

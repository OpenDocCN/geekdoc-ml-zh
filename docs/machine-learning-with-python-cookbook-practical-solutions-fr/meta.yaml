    \ and a target vector of integers representing membership in a class.\n\nscikit-learn's\
    \ simulated datasets offer extensive options to control the type of data generated.\
    \ scikit-learn's documentation contains a full description of all the parameters,\
    \ but a few are worth noting.\n\nIn `make_regression` and `make_classification`,\
    \ `n_informative` determines the number of features that are used to generate\

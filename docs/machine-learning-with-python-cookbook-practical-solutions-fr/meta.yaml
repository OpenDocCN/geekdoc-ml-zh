    \ object\nrandomforest = RandomForestClassifier(random_state=0, n_jobs=-1)\n\n\
    # Train model\nmodel = randomforest.fit(features, target)\n```\n\n# Discussion\n\
    \nA common problem with decision trees is that they tend to fit the training data\
    \ too closely (i.e., overfitting). This has motivated the widespread use of an\
    \ ensemble learning method called *random forest*. In a random forest, many decision\
    \ trees are trained, but each tree receives only a bootstrapped sample of observations\
    \ (i.e., a random sample of observations with replacement that matches the original\
    \ number of observations), and each node considers only a subset of features when\
    \ determining the best split. This forest of randomized decision trees (hence\
    \ the name) votes to determine the predicted class.\n\nAs we can see by comparing\
    \ this solution to Recipe 14.1, scikit-learn's RandomForestClassifier works similarly\
    \ to DecisionTreeClassifier:\n\n```\n# Make new observation\nobservation = [[\

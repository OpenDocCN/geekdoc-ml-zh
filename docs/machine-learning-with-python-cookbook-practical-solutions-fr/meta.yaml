    \ is a fairly common method for regularizing smaller neural networks. In dropout,\
    \ every time a batch of observations is created for training, a proportion of\
    \ the units in one or more layers is multiplied by zero (i.e., dropped). In this\
    \ setting, every batch is trained on the same network (e.g., the same parameters),\
    \ but each batch is confronted by a slightly different version of that network's\
    \ *architecture*.\n\nDropout is thought to be effective because by constantly\
    \ and randomly dropping units in each batch, it forces units to learn parameter\
    \ values able to perform under a wide variety of network architectures. That is,\
    \ they learn to be robust to disruptions (i.e., noise) in the other hidden units,\
    \ and this prevents the network from simply memorizing the training data.\n\n\
    It is possible to add dropout to both the hidden and input layers. When an input\
    \ layer is dropped, its feature value is not introduced into the network for that\
    \ batch.\n\nIn PyTorch, we can implement dropout by adding an `nn.Dropout` layer\
    \ into our network architecture. Each `nn.Dropout` layer will drop a user-defined\
    \ hyperparameter of units in the previous layer every batch.\n\n# 21.12 Saving\

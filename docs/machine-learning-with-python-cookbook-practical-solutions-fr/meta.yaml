    \ `n_components` 应使用何值（例如，保留多少个参数），我们可以利用 `explained_variance_ratio_` 这一属性，它告诉我们每个输出特征所解释的方差比例，并且是一个已排序的数组。例如：\n\
    \n```python\nlda.explained_variance_ratio_\narray([0.9912126])\n```\n\n具体来说，我们可以将\

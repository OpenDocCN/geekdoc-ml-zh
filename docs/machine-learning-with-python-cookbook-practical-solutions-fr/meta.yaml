  md: "There are three important things to notice in this dataframe.\n\nFirst, in\
    \ a dataframe each row corresponds to one observation (e.g., a passenger) and\
    \ each column corresponds to one feature (gender, age, etc.). For example, by\
    \ looking at the first observation we can see that Miss Elisabeth Walton Allen\
    \ stayed in first class, was 29 years old, was female, and survived the disaster.\n\
    \nSecond, each column contains a name (e.g., Name, PClass, Age) and each row contains\
    \ an index number (e.g., 0 for the lucky Miss Elisabeth Walton Allen). We will\
    \ use these to select and manipulate observations and features.\n\nThird, two\
    \ columns, Sex and SexCode, contain the same information in different formats.\
    \ In Sex, a woman is indicated by the string female, while in SexCode, a woman\
    \ is indicated by using the integer 1. We will want all our features to be unique,\
    \ and therefore we will need to remove one of these columns.\n\nIn this chapter,\
    \ we will cover a wide variety of techniques to manipulate dataframes using the\
    \ pandas library with the goal of creating a clean, well-structured set of observations\
    \ for further preprocessing.\n\n# 3.1 Creating a Dataframe\n\n# Problem\n\nYou\
    \ want to create a new dataframe.\n\n# Solution\n\npandas has many methods for\
    \ creating a new DataFrame object. One easy method is to instantiate a DataFrame\
    \ using a Python dictionary. In the dictionary, each key is a column name and\
    \ the value is a list, where each item corresponds to a row:\n\n```\n# Load library\n\
    import pandas as pd\n\n# Create a dictionary\ndictionary = {\n    \"Name\": ['Jacky\
    \ Jackson', 'Steven Stevenson'],\n    \"Age\": [38, 25],\n    \"Driver\": [True,\
    \ False]\n}\n\n# Create DataFrame\ndataframe = pd.DataFrame(dictionary)\n\n# Show\
    \ DataFrame\ndataframe\n```"

    model = cluster.fit(features_std)

    ```


    # Discussion


    DBSCAN is motivated by the idea that clusters will be areas where many observations
    are densely packed together and makes no assumptions of cluster shape. Specifically,
    in DBSCAN:


    +   1. A random observation, $x_i$, is chosen.

    2. If $x_i$ has a minimum number of close neighbors, we consider it to be part
    of a cluster.

    3. Step 2 is repeated recursively for all of $x_i$''s neighbors, then neighbor''s
    neighbor, and so on. These are the cluster''s core observations.

    4. Once step 3 runs out of nearby observations, a new random point is chosen (i.e.,
    restart at step 1).


    Once this is complete, we have a set of core observations for a number of clusters.
    Finally, any observation close to a cluster but not a core sample is considered
    part of a cluster, while any observation not close to the cluster is labeled an
    outlier.


    DBSCAN has three main parameters to set:


    **eps**

    The maximum distance from an observation for another observation to be considered
    its neighbor.


    **min_samples**

    The minimum number of observations less than eps distance from an observation
    for it to be considered a core observation.


    **metric**

    The distance metric used by eps—for example, minkowski or euclidean (note that
    if Minkowski distance is used, the parameter p can be used to set the power of
    the Minkowski metric).


    If we look at the clusters in our training data we can see two clusters have been
    identified, 0 and 1, while outlier observations are labeled -1:'

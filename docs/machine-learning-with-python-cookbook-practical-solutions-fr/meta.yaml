  md: '# Discussion


    Multinomial naive Bayes works similarly to Gaussian naive Bayes, but the features
    are assumed to be multinomially distributed. In practice, this means that this
    classifier is commonly used when we have discrete data (e.g., movie ratings ranging
    from 1 to 5). One of the most common uses of multinomial naive Bayes is text classification
    using bags of words or *tf-idf* approaches (see Recipes 6.9 and 6.10).


    In our solution, we created a toy text dataset of three observations and converted
    the text strings into a bag-of-words feature matrix and an accompanying target
    vector. We then used MultinomialNB to train a model while defining the prior probabilities
    for the two classes (pro-brazil and pro-germany).


    MultinomialNB works similarly to GaussianNB; models are trained using fit, and
    observations can be predicted using predict:


    ```

    # Create new observation

    new_observation = [[0, 0, 0, 1, 0, 1, 0]]


    # Predict new observation''s class

    model.predict(new_observation)


    array([0])

    ```


    If class_prior is not specified, prior probabilities are learned using the data.
    However, if we want a uniform distribution to be used as the prior, we can set
    fit_prior=False.


    Finally, MultinomialNB contains an additive smoothing hyperparameter, alpha, that
    should be tuned. The default value is 1.0, with 0.0 meaning no smoothing takes
    place.



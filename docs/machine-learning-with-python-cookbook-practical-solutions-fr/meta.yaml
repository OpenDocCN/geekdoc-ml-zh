    \ *n* × *r* 矩阵，**H** 是一个 *r* × *d* 矩阵。通过调整 *r* 的值，我们可以设定所需的降维程度。\n\nNMF 的一个主要要求是，顾名思义，特征矩阵不能包含负值。此外，与我们研究过的\

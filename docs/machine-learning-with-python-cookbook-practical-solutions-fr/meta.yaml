- md: "## 11.8 Evaluating Regression Models\n\n### Problem\n\nYou want to evaluate\
    \ the performance of a regression model.\n\n### Solution\n\nUse *mean squared\
    \ error* (MSE):\n\n```python\n# Load libraries\nfrom sklearn.datasets import make_regression\n\
    from sklearn.model_selection import cross_val_score\nfrom sklearn.linear_model\
    \ import LinearRegression\n\n# Generate features matrix, target vector\nfeatures,\
    \ target = make_regression(n_samples=100,\n                                  \
    \ n_features=3,\n                                   n_informative=3,\n       \
    \                            n_targets=1,\n                                  \
    \ noise=50,\n                                   coef=False,\n                \
    \                   random_state=1)\n\n# Create a linear regression object\nols\
    \ = LinearRegression()\n\n# Cross-validate the linear regression using (negative)\
    \ MSE\ncross_val_score(ols, features, target, scoring='neg_mean_squared_error')\n\
    # array([-1974.65337976, -2004.54137625, -3935.19355723, -1060.04361386,\n#  \
    \      -1598.74104702])\n```\n\nAnother common regression metric is the coefficient\
    \ of determination, $R^2$:\n\n```python\n# Cross-validate the linear regression\
    \ using R-squared\ncross_val_score(ols, features, target, scoring='r2')\n# array([0.8622399\
    \ , 0.85838075, 0.74723548, 0.91354743, 0.84469331])\n```\n\n### Discussion\n\n\
    MSE is one of the most common evaluation metrics for regression models. Formally,\
    \ MSE is:\n\n$$\\text{MSE} = \\frac{1}{n} \\sum_{i=1}^{n} (\\widehat{y}_i - y_i)^2$$\n\
    \nwhere $n$ is the number of observations, $y_i$ is the true value of the target\
    \ we are trying to predict for observation $i$, and $\\widehat{y}_i$ is the model's\
    \ predicted value for $y_i$. MSE is a measurement of the squared sum of all distances\
    \ between predicted and true values. The higher the value of MSE, the greater\
    \ the total squared error and thus the worse the model. There are a number of\
    \ mathematical benefits to squaring the error term, including that it forces all\
    \ error values to be positive, but one often unrealized implication is that squaring\
    \ penalizes a few large errors more than many small errors, even if the absolute\
    \ value of the errors is the same. For example, imagine two models, A and B, each\
    \ with two observations:\n\n- Model A has errors of 0 and 10, and thus its MSE\
    \ is $0^2 + 10^2 = 100$.\n- Model B has two errors of 5 each, and thus its MSE\
    \ is $5^2 + 5^2 = 50$.\n\nBoth models have the same total errors, 10; however,\
    \ MSE would consider model A (MSE = 100) worse than model B (MSE = 50). In practice\
    \ this implication is rarely an issue (and indeed can be theoretically beneficial),\
    \ and MSE works perfectly fine as an evaluation metric.\n\nOne important note:\
    \ by default, in scikit-learn, arguments of the scoring parameter assume that\
    \ higher values are better than lower values. However, this is not the case for\
    \ MSE, where higher values mean a worse model. For this reason, scikit-learn looks\
    \ at the negative MSE using the `neg_mean_squared_error` argument.\n\nA common\
    \ alternative regression evaluation metric is the default metric we used in Recipe\
    \ 11.2, $R^2$, which measures the amount of variance in the target vector that\
    \ is explained by the model.\n\n$$R^2 = 1 - \\frac{\\sum_{i=1}^n (y_i - \\widehat{y}_i)^2}{\\\
    sum_{i=1}^n (y_i - \\overline{y})^2}$$\n\nwhere $y_i$ is the true target value\
    \ of the $i$th observation, $\\widehat{y}_i$ is the predicted value for the $i$th\
    \ observation, and $\\overline{y}$ is the mean value of the target vector. The\
    \ closer that $R^2$ is to 1.0, the better the model.\n\n### See Also\n\n- Mean\
    \ squared error, Wikipedia\n- Coefficient of determination, Wikipedia\n\n## 11.9\
    \ Evaluating Clustering Models\n\n### Problem\n\nYou have used an unsupervised\
    \ learning algorithm to cluster your data. Now you want to know how well it did.\n\
    \n### Solution\n\nUse silhouette coefficients to measure the quality of the clusters\
    \ (note that this does not measure predictive performance):\n\n```python\n# Load\
    \ libraries\nimport numpy as np\nfrom sklearn.metrics import silhouette_score\n\
    from sklearn import datasets\nfrom sklearn.cluster import KMeans\nfrom sklearn.datasets\
    \ import make_blobs\n\n# Generate features matrix\nfeatures, _ = make_blobs(n_samples=1000,\n\
    \                         n_features=10,\n                         centers=2,\n\
    \                         cluster_std=0.5,\n                         shuffle=True,\n\
    \                         random_state=1)\n\n# Cluster data using k-means to predict\
    \ classes\nmodel = KMeans(n_clusters=2, random_state=1).fit(features)\n\n# Get\
    \ predicted classes\ntarget_predicted = model.labels_\n\n# Evaluate model\nsilhouette_score(features,\
    \ target_predicted)\n# 0.8916265564072141\n```\n\n### Discussion\n\nSupervised\
    \ model evaluation compares predictions (e.g., classes or quantitative values)\
    \ with the corresponding true values in the target vector. However, the most common\
    \ motivation for using clustering methods is that your data doesn't have a target\
    \ vector. A number of clustering evaluation metrics require a target vector, but\
    \ again, using unsupervised learning approaches like clustering when you have\
    \ a target vector available to you is probably handicapping yourself unnecessarily.\n\
    \nWhile we cannot evaluate predictions versus true values if we don't have a target\
    \ vector, we can evaluate the nature of the clusters themselves. Intuitively,\
    \ we can imagine “good” clusters having very small distances between observations\
    \ in the same cluster (i.e., dense clusters) and large distances between the different\
    \ clusters (i.e., well-separated clusters). Silhouette coefficients provide a\
    \ single value measuring both traits. Formally, the $i$th observation's silhouette\
    \ coefficient is:\n\n$$s_i = \\frac{b_i - a_i}{\\max(a_i, b_i)}$$\n\nwhere $s_i$\
    \ is the silhouette coefficient for observation $i$, $a_i$ is the mean distance\
    \ between $i$ and all observations of the same class, and $b_i$ is the mean distance\
    \ between $i$ and all observations from the closest cluster of a different class.\
    \ The value returned by `silhouette_score` is the mean silhouette coefficient\
    \ for all observations. Silhouette coefficients range between -1 and 1, with 1\
    \ indicating dense, well-separated clusters."

  md: "# # 10.1 Thresholding Numerical Feature Variance\n\n# ## Problem\n\nYou have\
    \ a set of numerical features and want to filter out those with low variance (i.e.,\
    \ likely containing little information).\n\n# ## Solution\n\nSelect a subset of\
    \ features with variances above a given threshold:\n\n```\n# Load libraries\n\
    from sklearn import datasets\nfrom sklearn.feature_selection import VarianceThreshold\n\
    \n# Import some data to play with\niris = datasets.load_iris()\n\n# Create features\
    \ and target\nfeatures = iris.data\ntarget = iris.target\n\n# Create thresholder\n\
    thresholder = VarianceThreshold(threshold=.5)\n\n# Create high variance feature\
    \ matrix\nfeatures_high_variance = thresholder.fit_transform(features)\n\n# View\
    \ high variance feature matrix\nfeatures_high_variance[0:3]\narray([[ 5.1,  1.4,\
    \  0.2],\n       [ 4.9,  1.4,  0.2],\n       [ 4.7,  1.3,  0.2]])\n```\n\n# ##\
    \ Discussion\n\n*Variance thresholding* (VT) is an example of feature selection\
    \ by filtering, and one of the most basic approaches to feature selection. It\
    \ is motivated by the idea that features with low variance are likely less interesting\
    \ (and less useful) than features with high variance. VT first calculates the\
    \ variance of each feature:\n\n$$Var(x) = \\frac{1}{n} \\sum_{i=1}^{n} (x_i -\
    \ \\mu)^2$$\n\nwhere $x$ is the feature vector, $x_i$ is an individual feature\
    \ value, and $\\mu$ is that feature's mean value. Next, it drops all features\
    \ whose variance does not meet that threshold."

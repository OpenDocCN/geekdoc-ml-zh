    # 7.8 Using Rolling Time Windows


    # Problem


    Given time series data, you want to calculate a statistic for a rolling time.


    # Solution


    Use the pandas DataFrame `rolling` method:


    ```

    # Load library

    import pandas as pd


    # Create datetimes

    time_index = pd.date_range("01/01/2010", periods=5, freq="M")


    # Create data frame, set index

    dataframe = pd.DataFrame(index=time_index)


    # Create feature

    dataframe["Stock_Price"] = [1,2,3,4,5]


    # Calculate rolling mean

    dataframe.rolling(window=2).mean()

    ```


    | | Stock_Price |

    |---|---|

    | 2010-01-31 | NaN |

    | 2010-02-28 | 1.5 |

    | 2010-03-31 | 2.5 |

    | 2010-04-30 | 3.5 |

    | 2010-05-31 | 4.5 |


    # Discussion


    *Rolling* (also called *moving*) *time windows* are conceptually simple but can
    be difficult to understand at first. Imagine we have monthly observations for
    a stock''s price. It is often useful to have a time window of a certain number
    of months and then move over the observations calculating a statistic for all
    observations in the time window.'
  - '[PAGE 145]


    For example, if we have a time window of three months and we want a rolling mean,
    we would calculate:


    +   1. mean(January, February, March)

    2. mean(February, March, April)

    3. mean(March, April, May)

    4. etc.


    Another way to put it: our three-month time window “walks” over the observations,
    calculating the window’s mean at each step.


    The pandas rolling method allows us to specify the size of the window by using
    window and then quickly calculate some common statistics, including the max value
    (max()), mean value (mean()), count of values (count()), and rolling correlation
    (corr()).


    Rolling means are often used to smooth time series data because using the mean
    of the entire time window dampens the effect of short-term fluctuations.


    # See Also


    +   - pandas documentation: Rolling Windows

    - What Are Moving Average or Smoothing Techniques?



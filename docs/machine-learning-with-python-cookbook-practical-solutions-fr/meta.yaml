  md: '# Discussion


    While scikit-learn has a number of built-in metrics for evaluating model performance,
    it is often useful to define our own metrics. scikit-learn makes this easy using
    `make_scorer`. First, we define a function that takes in two arguments—the ground
    truth target vector and our predicted values—and outputs some score. Second, we
    use `make_scorer` to create a scorer object, making sure to specify whether higher
    or lower scores are desirable (using the `greater_is_better` parameter).


    The custom metric in the solution (`custom_metric`) is a toy example since it
    simply wraps a built-in metric for calculating the $R^2$ score. In a real-world
    situation, we would replace the `custom_metric` function with whatever custom

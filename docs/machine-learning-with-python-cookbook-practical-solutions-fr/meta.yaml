    \ = scaler.fit_transform(features)\n\n# 创建逻辑回归对象\nlogistic_regression = LogisticRegression(random_state=0,\
    \ class_weight=\"balanced\")\n\n# 训练模型\nmodel = logistic_regression.fit(features_standardized,\
    \ target)\n```\n\n### 讨论\n\n与 scikit-learn 中的许多其他学习算法一样，LogisticRegression 内置了处理不平衡类别的方法。如果我们有高度不平衡的类别，并且在预处理阶段没有处理它，我们可以选择使用\
    \ class_weight 参数来对类别进行加权，以确保我们拥有每个类别的平衡混合。具体来说，balanced 参数将自动根据类别的频率进行反比加权：\n\
    \n$$w_j = \\frac{n}{kn_j}$$\n\n其中 $w_j$ 是类别 $j$ 的权重，$n$ 是观测值数量，$n_j$ 是类别 $j$ 中的观测值数量，$k$\
    \ 是类别总数。\n\n# 第17章\n支持向量机\n\n## 17.0 引言\n\n要理解支持向量机，我们必须理解超平面。形式上，*超平面*是 *n* 维空间中的一个\

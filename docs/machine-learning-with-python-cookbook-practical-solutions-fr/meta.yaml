    \ propagation, and adaptive moment estimation (for more information on these optimizers,\
    \ see “See Also” on page 333).\n\nSixth, we can select one or more metrics to\
    \ use to evaluate the performance, such as accuracy.\n\nIn our example, we use\
    \ the torch.nn.Module namespace to compose a simple, sequential neural network\
    \ that can make binary classifications. The standard PyTorch approach for this\
    \ is to create a child class that inherits from the torch.nn.Module class, instantiating\
    \ a network architecture in the __init__ method, and defining the mathematical\
    \ operations we want to perform upon each forward pass in the forward method of\

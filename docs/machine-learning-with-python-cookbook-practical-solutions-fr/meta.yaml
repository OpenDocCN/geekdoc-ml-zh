    \ 2, 1, 2, 2,\n       2, 1, 1, 2, 2, 2, 1, 2, 2, 2, 1, 2, 2, 2, 1, 2, 2, 2, 1],\
    \ dtype=int32)\n```\n\nIf we compare this to the observation's true class, we\

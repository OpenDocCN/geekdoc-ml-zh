  md: '# Solution


    When using scikit-learn''s SVC, set probability=True, train the model, then use
    predict_proba to see the calibrated probabilities:


    ```

    # Load libraries

    from sklearn.svm import SVC

    from sklearn import datasets

    from sklearn.preprocessing import StandardScaler

    import numpy as np


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Standardize features

    scaler = StandardScaler()

    features_standardized = scaler.fit_transform(features)


    # Create support vector classifier object

    svc = SVC(kernel="linear", probability=True, random_state=0)


    # Train classifier

    model = svc.fit(features_standardized, target)


    # Create new observation

    new_observation = [[.4, .4, .4, .4]]


    # View predicted probabilities

    model.predict_proba(new_observation)

    array([[0.00541761, 0.97348825, 0.02109414]])

    ```


    # Discussion


    Many of the supervised learning algorithms we have covered use probability estimates
    to predict classes. For example, in k-nearest neighbors, an observation''s k neighbor''s
    classes were treated as votes to create a probability that an observation was
    of that class. Then the class with the highest probability was predicted. SVC''s
    use of a hyperplane to create decision regions does not naturally output a probability
    estimate that an observation is a member of a certain class. However, we can in
    fact output calibrated class probabilities with a few caveats. In an SVC with
    two classes, Platt scaling can be used, wherein first the SVC is trained, and
    then a separate cross-validated logistic regression is trained to map the SVC
    outputs into probabilities:


    $$P(y = 1 \mid x) = \frac{1}{1 + e^{(A \times f(x) + B)}}$$'
  merge: -1
  pgno: 305
- img_proc: true
  md: 'where $A$ and $B$ are parameter vectors, and $f(x)$ is the $i$th observation''s
    signed distance from the hyperplane. When we have more than two classes, an extension
    of Platt scaling is used.


    In more practical terms, creating predicted probabilities has two major issues.
    First, because we are training a second model with cross-validation, generating
    predicted probabilities can significantly increase the time it takes to train
    our model. Second, because the predicted probabilities are created using cross-validation,
    they might not always match the predicted classes. That is, an observation might
    be predicted to be class 1 but have a predicted probability of being class 1 of
    less than 0.5.


    In scikit-learn, the predicted probabilities must be generated when the model
    is being trained. We can do this by setting SVC''s probability to True. After
    the model is trained, we can output the estimated probabilities for each class
    using predict_proba.



    \ |\n|---|---|---|\n| 0 | 3 | Alice Bees | 23456 |\n| 1 | 4 | Tim Horton | 2512\
    \ |\n\nmerge defaults to inner joins. If we want to do an outer join, we can specify\
    \ that with the how parameter:\n\n```python\n# Merge DataFrames\npd.merge(dataframe_employees,\
    \ dataframe_sales, on='employee_id', how='outer')\n```\n\n| employee_id | name\
    \ | total_sales |\n|---|---|---|\n| 0 | 1 | Amy Jones | NaN |\n| 1 | 2 | Allen\

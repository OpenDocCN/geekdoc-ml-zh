- md: "## Discussion\n\nIn a random forest, an ensemble (group) of randomized decision\
    \ trees predicts the target vector. An alternative, and often more powerful, approach\
    \ is called *boosting*. In one form of boosting called AdaBoost, we iteratively\
    \ train a series of weak models (most often a shallow decision tree, sometimes\
    \ called a stump), each iteration giving higher priority to observations the previous\
    \ model predicted incorrectly. More specifically, in AdaBoost:\n\n1. Assign every\
    \ observation, $x_i$, an initial weight value, $w_i = \\frac{1}{n}$, where $n$\
    \ is the total number of observations in the data.\n2. Train a “weak” model on\
    \ the data.\n3. For each observation:\n   a. If weak model predicts $x_i$ correctly,\
    \ $w_i$ is decreased.\n   b. If weak model predicts $x_i$ incorrectly, $w_i$ is\
    \ increased.\n4. Train a new weak model where observations with greater $w_i$\
    \ are given greater priority.\n5. Repeat steps 4 and 5 until the data is perfectly\
    \ predicted or a preset number of weak models has been trained.\n\nThe result\
    \ is an aggregated model where individual weak models focus on more difficult\
    \ (from a prediction perspective) observations. In scikit-learn, we can implement\
    \ AdaBoost using AdaBoostClassifier or AdaBoostRegressor. The most important parameters\
    \ are base_estimator, n_estimators, learning_rate, and loss:\n\n**base_estimator**\n\
    base_estimator is the learning algorithm to use to train the weak models. The\
    \ most common learner to use with AdaBoost is a decision tree, the parameter’s\
    \ default argument.\n\n**n_estimators**\nn_estimators is the number of models\
    \ to iteratively train.\n\n**learning_rate**\nlearning_rate is the contribution\
    \ of each model to the weights, and it defaults to 1. Reducing the learning rate\
    \ will mean the weights will be increased or decreased to a small degree, forcing\
    \ the model to train slower (but sometimes resulting in better performance scores).\n\
    \n**loss**\nloss is exclusive to AdaBoostRegressor and sets the loss function\
    \ to use when updating weights. This defaults to a linear loss function but can\
    \ be changed to square or exponential.\n\n## See Also\n\n- Explaining AdaBoost,\
    \ Robert E. Schapire\n\n## 14.12 Training an XGBoost Model\n\n### Problem\n\n\
    You need to train a tree-based model with high predictive power.\n\n### Solution\n\
    \nUse the xgboost Python library:\n\n```python\n# Load libraries\nimport xgboost\
    \ as xgb\nfrom sklearn import datasets, preprocessing\nfrom sklearn.metrics import\
    \ classification_report\nfrom numpy import argmax\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\ntarget = iris.target\n\n# Create dataset\nxgb_train = xgb.DMatrix(features,\
    \ label=target)\n\n# Define parameters\nparam = {\n    'objective': 'multi:softprob',\n\
    \    'num_class': 3\n}\n\n# Train model\ngbm = xgb.train(param, xgb_train)\n\n\
    # Get predictions\npredictions = argmax(gbm.predict(xgb_train), axis=1)\n\n# Get\
    \ a classification report\nprint(classification_report(target, predictions))\n\
    ```\n\n| | precision | recall | f1-score | support |\n|---|---|---|---|---|\n\
    | 0 | 1.00 | 1.00 | 1.00 | 50 |\n| 1 | 1.00 | 0.96 | 0.98 | 50 |\n| 2 | 0.96 |\
    \ 1.00 | 0.98 | 50 |\n| accuracy | | | 0.99 | 150 |\n| macro avg | 0.99 | 0.99\
    \ | 0.99 | 150 |\n| weighted avg | 0.99 | 0.99 | 0.99 | 150 |\n\n### Discussion\n\
    \nXGBoost (which stands for Extreme Gradient Boosting) is a very popular gradient\
    \ boosting algorithm in the machine learning space. Though it is not always a\
    \ tree-based model, it is frequently applied to ensembles of decision trees. It\
    \ gained much of its popularity due to widespread success on the machine learning\
    \ competition website Kaggle and has since been a reliable algorithm for improving\
    \ performance beyond that of typical random forests or gradient boosted machines.\n\
    \nAlthough XGBoost is known for being computationally intensive, computational\
    \ performance optimizations (such as GPU support) over the last few years have\
    \ made iterating quickly with XGBoost significantly easier, and it remains a common\
    \ choice of algorithm when statistical performance is a requirement.\n\n### See\
    \ Also\n\n- [XGBoost documentation](https://xgboost.readthedocs.io/)\n\n## 14.13\
    \ Improving Real-Time Performance with LightGBM\n\n### Problem\n\nYou need to\
    \ train a gradient boosted tree-based model that is computationally optimized.\n\
    \n### Solution\n\nUse the gradient boosted machine library `lightgbm`:\n\n```python\n\
    # Load libraries\nimport lightgbm as lgb\nfrom sklearn import datasets, preprocessing\n\
    from sklearn.metrics import classification_report\nfrom numpy import argmax\n\n\
    # Load data\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# Create dataset\nlgb_train = lgb.Dataset(features, target)\n\n# Define parameters\n\
    params = {\n    'objective': 'multiclass',\n    'num_class': 3,\n    'verbose':\
    \ -1,\n}\n\n# Train model\ngbm = lgb.train(params, lgb_train)\n\n# Get predictions\n\
    predictions = argmax(gbm.predict(features), axis=1)\n\n# Get a classification\
    \ report\nprint(classification_report(target, predictions))\n```\n\n```\n    \
    \          precision    recall  f1-score   support\n\n           0       1.00\
    \      1.00      1.00        50\n           1       1.00      1.00      1.00 \
    \       50\n           2       1.00      1.00      1.00        50\n\n    accuracy\
    \                           1.00       150\n   macro avg       1.00      1.00\
    \      1.00       150\nweighted avg       1.00      1.00      1.00       150\n\
    ```\n\n### Discussion\n\nThe lightgbm library is used for gradient boosted machines\
    \ and is highly optimized for training time, inference, and GPU support. As a\
    \ result of its computational efficiency, it's often used in production and in\
    \ large scale settings. Although scikit-learn models are typically easier to use,\
    \ some libraries, such as lightgbm, can be handy when you're limited by large\
    \ data or strict model training/serving times.\n\n### See Also\n\n- LightGBM documentation\n\
    - CatBoost documentation (another optimized library for GBMs)\n\n# CHAPTER 15\n\
    ## K-Nearest Neighbors\n\n### 15.0 Introduction\n\nThe k-nearest neighbors (KNN)\
    \ classifier is one of the simplest yet most commonly used classifiers in supervised\
    \ machine learning. KNN is often considered a lazy learner; it doesn't technically\
    \ train a model to make predictions. Instead an observation is predicted to be\
    \ the same class as that of the largest proportion of the $k$ nearest observations.\n\
    \nFor example, if an observation with an unknown class is surrounded by an observation\
    \ of class 1, then the observation is classified as class 1. In this chapter we\
    \ will explore how to use scikit-learn to create and use a KNN classifier.\n\n\
    ### 15.1 Finding an Observation’s Nearest Neighbors\n\n#### Problem\n\nYou need\
    \ to find an observation’s $k$ nearest observations (neighbors).\n\n#### Solution\n\
    \nUse scikit-learn’s `NearestNeighbors`:\n\n```python\n# Load libraries\nfrom\
    \ sklearn import datasets\nfrom sklearn.neighbors import NearestNeighbors\nfrom\
    \ sklearn.preprocessing import StandardScaler\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\n\n# Create standardizer\nstandardizer = StandardScaler()\n\
    \n# Standardize features\nfeatures_standardized = standardizer.fit_transform(features)\n\
    \n# Two nearest neighbors\nnearest_neighbors = NearestNeighbors(n_neighbors=2).fit(features_standardized)\n\
    \n# Create an observation\nnew_observation = [ 1, 1, 1, 1]\n\n# Find distances\
    \ and indices of the observation's nearest neighbors\ndistances, indices = nearest_neighbors.kneighbors([new_observation])\n\
    \n# View the nearest neighbors\nfeatures_standardized[indices]\narray([[[1.03800476,\
    \ 0.55861082, 1.10378283, 1.18556721],\n        [0.79566902, 0.32841405, 0.76275827,\
    \ 1.05393502]]])\n```\n\n#### Discussion\n\nIn our solution we used the dataset\
    \ of iris flowers. We created an observation, new_observation, with some values\
    \ and then found the two observations that are closest to our observation. indices\
    \ contains the locations of the observations in our dataset that are closest,\
    \ so X[indices] displays the values of those observations. Intuitively, distance\
    \ can be thought of as a measure of similarity, so the two closest observations\
    \ are the two flowers most similar to the flower we created.\n\nHow do we measure\
    \ distance? scikit-learn offers a wide variety of distance metrics, $d$, including\
    \ Euclidean:\n\n$$d_{euclidean} = \\sqrt{\\sum_{i=1}^{n} (x_i - y_i)^2}$$\n\n\
    and Manhattan distance:\n\n$$d_{manhattan} = \\sum_{i=1}^{n} |x_i - y_i|$$\n\n\
    By default, NearestNeighbors uses Minkowski distance:\n\n$$d_{minkowski} = \\\
    left( \\sum_{i=1}^{n} |x_i - y_i|^p \\right)^{1/p}$$"
  mdcn: "## 讨论\n\n在随机森林中，一个由随机决策树组成的集成（组）预测目标向量。另一种通常更强大的方法称为*提升*。在一种称为AdaBoost的提升方法中，我们迭代地训练一系列弱模型（最常见的是浅层决策树，有时称为桩），每次迭代都给予前一个模型预测错误的观测值更高的优先级。更具体地说，在AdaBoost中：\n\
    \n1.  为每个观测值 $x_i$ 分配一个初始权重值 $w_i = \\frac{1}{n}$，其中 $n$ 是数据中观测值的总数。\n2.  在数据上训练一个“弱”模型。\n\
    3.  对于每个观测值：\n    a. 如果弱模型正确预测了 $x_i$，则 $w_i$ 减小。\n    b. 如果弱模型错误预测了 $x_i$，则 $w_i$\
    \ 增大。\n4.  训练一个新的弱模型，其中权重 $w_i$ 较大的观测值被赋予更高的优先级。\n5.  重复步骤4和5，直到数据被完美预测或达到预设的弱模型训练数量。\n\
    \n结果是一个聚合模型，其中各个弱模型专注于更困难（从预测角度来看）的观测值。在scikit-learn中，我们可以使用AdaBoostClassifier或AdaBoostRegressor来实现AdaBoost。最重要的参数是base_estimator、n_estimators、learning_rate和loss：\n\
    \n**base_estimator**\nbase_estimator是用于训练弱模型的学习算法。与AdaBoost一起使用最常见的学习器是决策树，这是该参数的默认参数。\n\
    \n**n_estimators**\nn_estimators是要迭代训练的模型数量。\n\n**learning_rate**\nlearning_rate是每个模型对权重的贡献，默认为1。降低学习率意味着权重将以较小的幅度增加或减少，迫使模型训练得更慢（但有时会导致更好的性能分数）。\n\
    \n**loss**\nloss是AdaBoostRegressor独有的，用于设置更新权重时使用的损失函数。默认为线性损失函数，但可以更改为平方或指数损失函数。\n\
    \n## 另请参阅\n\n- 解释AdaBoost，Robert E. Schapire\n\n## 14.12 训练XGBoost模型\n\n### 问题\n\
    \n你需要训练一个具有高预测能力的基于树的模型。\n\n### 解决方案\n\n使用xgboost Python库：\n\n```python\n# Load\
    \ libraries\nimport xgboost as xgb\nfrom sklearn import datasets, preprocessing\n\

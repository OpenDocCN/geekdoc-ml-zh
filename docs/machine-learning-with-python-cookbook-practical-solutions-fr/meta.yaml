    | 2010-04-30 | 4.0 |

    | 2010-05-31 | 5.0 |


    Alternatively, we can replace missing values with the last known value (i.e.,
    forward filling):


    ```

    # Forward fill

    dataframe.ffill()

    ```


    | | Sales |

    |---|---|

    | 2010-01-31 | 1.0 |

    | 2010-02-28 | 2.0 |

    | 2010-03-31 | 2.0 |

    | 2010-04-30 | 2.0 |

    | 2010-05-31 | 5.0 |


    We can also replace missing values with the latest known value (i.e., backfilling):


    ```

    # Backfill

    dataframe.bfill()

    ```


    | | Sales |

    |---|---|

    | 2010-01-31 | 1.0 |

    | 2010-02-28 | 2.0 |

    | 2010-03-31 | 5.0 |

    | 2010-04-30 | 5.0 |

    | 2010-05-31 | 5.0 |


    # Discussion


    Interpolation is a technique for filling gaps caused by missing values by, in
    effect, drawing a line or curve between the known values bordering the gap and
    using that line or curve to predict reasonable values. Interpolation can be particularly
    useful when the time intervals are constant, the data is not prone to noisy fluctuations,
    and the gaps caused by missing values are small. For example, in our solution,
    a gap of'
  - '[PAGE 147]


    two missing values was bordered by 2.0 and 5.0. By fitting a line starting at
    2.0 and ending at 5.0, we can make reasonable guesses for the two missing values
    between 3.0 and 4.0.


    If we believe the line between the two known points is nonlinear, we can use interpolate''s
    method parameter to specify the interpolation method:


    ```

    # Interpolate missing values

    dataframe.interpolate(method="quadratic")

    ```


    | | Sales |

    |---|---|

    | 2010-01-31 | 1.000000 |

    | 2010-02-28 | 2.000000 |

    | 2010-03-31 | 3.059808 |

    | 2010-04-30 | 4.038069 |

    | 2010-05-31 | 5.000000 |


    Finally, we may have large gaps of missing values but do not want to interpolate
    values across the entire gap. In these cases we can use limit to restrict the
    number of interpolated values and limit_direction to set whether to interpolate
    values forward from the last known value before the gap or vice versa:


    ```

    # Interpolate missing values

    dataframe.interpolate(limit=1, limit_direction="forward")

    ```


    | | Sales |

    |---|---|

    | 2010-01-31 | 1.0 |

    | 2010-02-28 | 2.0 |

    | 2010-03-31 | 3.0 |

    | 2010-04-30 | NaN |

    | 2010-05-31 | 5.0 |


    Backfilling and forward filling are forms of naive interpolation, where we draw
    a flat line from a known value and use it to fill in missing values. One (minor)
    advantage back filling and forward filling have over interpolation is that they
    don''t require known values on *both* sides of missing values.'

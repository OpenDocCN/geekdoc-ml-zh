    ```\n\n### 讨论\n\nscikit-learn 的 LogisticRegression 提供了多种训练逻辑回归的技术，称为求解器。大多数时候，scikit-learn\
    \ 会自动为我们选择最佳求解器，或者警告我们无法使用该求解器执行某些操作。然而，有一个特殊情况我们应该了解。\n\n虽然精确的解释超出了本书的范围（更多信息请参阅本配方“另请参阅”部分中\

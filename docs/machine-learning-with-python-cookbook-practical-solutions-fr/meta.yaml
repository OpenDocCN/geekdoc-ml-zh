    # Discussion


    So far we have discussed modeling only linear relationships. An example of a linear
    relationship would be the number of stories a building has and the building''s
    height. In linear regression, we assume the effect of number of stories and building
    height is approximately constant, meaning a 20-story building will be roughly
    twice as high as a 10-story building, which will be roughly twice as high as a
    5-story building. Many relationships of interest, however, are not strictly linear.


    Often we want to model a nonlinear relationship—for example, the relationship
    between the number of hours a student studies and the score she gets on a test.
    Intuitively, we can imagine there is a big difference in test scores between students
    who study for one hour compared to students who did not study at all. However,
    there is a much smaller difference in test scores between a student who studied
    for 99 hours and a student who studied for 100 hours. The effect that one hour
    of studying has on a student''s test score decreases as the number of hours increases.


    Polynomial regression is an extension of linear regression that allows us to model
    nonlinear relationships. To create a polynomial regression, convert the linear
    function we used in Recipe 13.1:


    $\widehat{y} = \widehat{\beta}_0 + \widehat{\beta}_1x_1 + \epsilon$


    into a polynomial function by adding polynomial features:


    $\widehat{y} = \widehat{\beta}_0 + \widehat{\beta}_1x_1 + \widehat{\beta}_2x_1^2
    + \dots + \widehat{\beta}_dx_1^d + \epsilon$


    where $d$ is the degree of the polynomial. How are we able to use a linear regression
    for a nonlinear function? The answer is that we do not change how the linear regression
    fits the model but rather only add polynomial features. That is, the linear regression
    does not “know” that the $x^2$ is a quadratic transformation of $x$. It just considers
    it one more variable.'

    \ },\n    \"model.pt\"\n)\n\n# Reinitialize neural network\nnetwork = SimpleNeuralNet()\n\
    state_dict = torch.load(\n    \"model.pt\",\n    map_location=torch.device('cpu')\n\
    )[\"model_state_dict\"]\nnetwork.load_state_dict(state_dict, strict=False)\nnetwork.eval()\n\
    \nSimpleNeuralNet(\n  (sequential): Sequential(\n    (0): Linear(in_features=10,\
    \ out_features=16, bias=True)\n    (1): ReLU()\n    (2): Linear(in_features=16,\
    \ out_features=16, bias=True)\n    (3): ReLU()\n    (4): Linear(in_features=16,\
    \ out_features=1, bias=True)\n    (5): Dropout(p=0.1, inplace=False)\n    (6):\
    \ Sigmoid()\n  )\n)\n```\n\n# Discussion\n\nThough we used a similar formula in\
    \ Chapter 21 to checkpoint our training progress, here we see how the same approach\
    \ can be used to load a model back into memory to make predictions. The model.pt\
    \ that we save the model in is actually just a dictionary that contains the model\
    \ parameters. We saved the model state in the dictionary key model_state_dict;\
    \ to load the model back in, we re-initialize our network and load the state of\
    \ the model using network.load_state_dict.\n\n# See Also\n\n+   - PyTorch tutorial:\
    \ Saving and Loading Models"

    The higher the number, the more important the feature (all importance scores sum
    to 1). By plotting these values, we can add interpretability to our random forest
    models.


    # 14.8 Selecting Important Features in Random Forests


    # Problem


    You need to conduct feature selection on a random forest.


    # Solution


    Identify the importance features and retrain the model using only the most important
    features:


    ```

    # Load libraries

    from sklearn.ensemble import RandomForestClassifier

    from sklearn import datasets

    from sklearn.feature_selection import SelectFromModel


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create random forest classifier

    randomforest = RandomForestClassifier(random_state=0, n_jobs=-1)

    ```'

  - "[PAGE 111]\n\n# Discussion\n\nA dictionary is a popular data structure used by\
    \ many programming languages; however, machine learning algorithms expect the\
    \ data to be in the form of a matrix. We can accomplish this using scikit-learn's\
    \ `DictVectorizer`.\n\nThis is a common situation when working with natural language\
    \ processing. For example, we might have a collection of documents and for each\
    \ document we have a dictionary containing the number of times every word appears\
    \ in the document. Using `DictVectorizer`, we can easily create a feature matrix\
    \ where every feature is the number of times a word appears in each document:\n\
    \n```\n# Create word count dictionaries for four documents\ndoc_1_word_count =\
    \ {\"Red\": 2, \"Blue\": 4}\ndoc_2_word_count = {\"Red\": 4, \"Blue\": 3}\ndoc_3_word_count\
    \ = {\"Red\": 1, \"Yellow\": 2}\ndoc_4_word_count = {\"Red\": 2, \"Yellow\": 2}\n\
    \n# Create list\ndoc_word_counts = [doc_1_word_count,\n                   doc_2_word_count,\n\
    \                   doc_3_word_count,\n                   doc_4_word_count]\n\n\
    # Convert list of word count dictionaries into feature matrix\ndictvectorizer.fit_transform(doc_word_counts)\n\
    \narray([[ 4.,  2.,  0.],\n       [ 3.,  4.,  0.],\n       [ 0.,  1.,  2.],\n\

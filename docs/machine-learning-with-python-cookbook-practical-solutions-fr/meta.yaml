  md: '# Discussion


    There is no single best technique for detecting outliers. Instead, we have a collection
    of techniques all with their own advantages and disadvantages. Our best strategy
    is often trying multiple techniques (e.g., both EllipticEnvelope and IQR-based
    detection) and looking at the results as a whole.


    If at all possible, we should look at observations we detect as outliers and try
    to understand them. For example, if we have a dataset of houses and one feature
    is number of rooms, is an outlier with 100 rooms really a house or is it actually
    a hotel that has been misclassified?


    # See Also


    +   - Three Ways to Detect Outliers (and the source of the IQR function used in
    this recipe)


    # 4.7 Handling Outliers


    # Problem


    You have outliers in your data that you want to identify and then reduce their
    impact on the data distribution.


    # Solution


    Typically we can use three strategies to handle outliers. First, we can drop them:


    ```

    # Load library

    import pandas as pd


    # Create DataFrame

    houses = pd.DataFrame()

    houses[''Price''] = [534433, 392333, 293222, 4322032]

    houses[''Bathrooms''] = [2, 3.5, 2, 116]

    houses[''Square_Feet''] = [1500, 2500, 1500, 48000]


    # Filter observations

    houses[houses[''Bathrooms''] < 20]

    ```


    | | Price | Bathrooms | Square_Feet |

    |---|---|---|---|

    | 0 | 534433 | 2.0 | 1500 |

    | 1 | 392333 | 3.5 | 2500 |

    | 2 | 293222 | 2.0 | 1500 |'

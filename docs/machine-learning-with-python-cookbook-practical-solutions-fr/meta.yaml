  md: 'simple example. In Figure 9-1, our data contains two features, $x_1$ and $x_2$.
    Looking at the visualization, it should be clear that observations are spread
    out like a cigar, with a lot of length and very little height. More specifically,
    we can say that the variance of the “length” is significantly greater than the
    “height.” Instead of length and height, we refer to the “direction” with the most
    variance as the first principal component and the “direction” with the second-most
    variance as the second principal component (and so on).


    If we wanted to reduce our features, one strategy would be to project all observations
    in our two-dimensional space onto the one-dimensional principal component. We
    would lose the information captured in the second principal component, but in
    some situations that would be an acceptable trade-off. This is PCA.


    ![](img/553f6c9c8b23451624604a848ee8a83c_182_0.png)


    Figure 9-1. The first and second principal components of PCA


    PCA is implemented in scikit-learn using the PCA class. n_components has two operations,
    depending on the argument provided. If the argument is greater than 1, pca will
    return that many features. This leads to the question of how to select the optimal
    number of features. Fortunately, if the argument to n_components is between 0
    and 1, pca returns the minimum number of features that retain that much variance.
    It’s common to use values of 0.95 and 0.99, meaning 95% and 99% of the variance
    of the original features has been retained, respectively. whiten=True transforms
    the values of each principal component so that they have zero mean and unit variance.
    Another parameter and argument is svd_solver="randomized", which implements a
    stochastic algorithm to find the first principal components in often significantly
    less time.


    The output of our solution shows that PCA enables us to reduce our dimensionality
    by 10 features while still retaining 99% of the information (variance) in the
    feature matrix.'

  md: "# Discussion\n\nOne strategy to combat overfitting neural networks is by penalizing\
    \ the parameters (i.e., weights) of the neural network such that they are driven\
    \ to be small values, creating a simpler model less prone to overfit. This method\
    \ is called weight regularization or weight decay. More specifically, in weight\
    \ regularization a penalty is added to the loss function, such as the L2 norm.\n\
    \nIn PyTorch, we can add weight regularization by including weight_decay=1e-5\
    \ in the optimizer where regularization happens. In this example, 1e-5 determines\
    \ how much we penalize higher parameter values. Values greater than 0 indicate\
    \ L2 regularization in PyTorch.\n\n# 21.10 Reducing Overfitting with Early Stopping\n\

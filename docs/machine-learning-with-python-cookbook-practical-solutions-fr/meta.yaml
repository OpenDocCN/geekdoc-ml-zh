  md: "# See Also\n\n+   - Identifying the 3 Types of Missing Data\n- Missing-Data\
    \ Imputation\n\n# 4.11 Imputing Missing Values\n\n# Problem\n\nYou have missing\
    \ values in your data and want to impute them via a generic method or prediction.\n\
    \n# Solution\n\nYou can impute missing values using k-nearest neighbors (KNN)\
    \ or the scikit-learn SimpleImputer class. If you have a small amount of data,\
    \ predict and impute the missing values using k-nearest neighbors:\n\n```\n# Load\
    \ libraries\nimport numpy as np\nfrom sklearn.impute import KNNImputer\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.datasets import make_blobs\n\n# Make a simulated\
    \ feature matrix\nfeatures, _ = make_blobs(n_samples = 1000,\n               \
    \          n_features = 2,\n                         random_state = 1)\n\n# Standardize\
    \ the features\nscaler = StandardScaler()\nstandardized_features = scaler.fit_transform(features)\n\
    \n# Replace the first feature's first value with a missing value\ntrue_value =\
    \ standardized_features[0,0]\nstandardized_features[0,0] = np.nan\n\n# Predict\
    \ the missing values in the feature matrix\nknn_imputer = KNNImputer(n_neighbors=5)\n\
    features_knn_imputed = knn_imputer.fit_transform(standardized_features)\n\n# Compare\
    \ true and imputed values\nprint(\"True Value:\", true_value)\nprint(\"Imputed\
    \ Value:\", features_knn_imputed[0,0])\n```\n\nTrue Value: 0.8730186114\nImputed\
    \ Value: 1.09553327131"

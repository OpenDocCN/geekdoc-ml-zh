    \  features,\n    # 目标向量\n    target,\n    # 折数\n    cv=10,\n    # 性能指标\n    scoring='accuracy',\n\
    \    # 使用所有计算机核心\n    n_jobs=-1,\n    # 大小为 50\n    # 训练集\n    train_sizes=np.linspace(\n\
    \        0.01,\n        1.0,\n        50))\n\n# 创建训练集分数的均值和标准差\ntrain_mean = np.mean(train_scores,\

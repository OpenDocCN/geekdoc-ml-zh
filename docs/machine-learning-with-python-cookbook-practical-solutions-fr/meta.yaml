- md: "## 13.2 Creating Interaction Features\n\n### Problem\n\nYou want to create\
    \ interaction features.\n\n### Solution\n\nUse scikit-learn's `PolynomialFeatures`\
    \ to create interaction terms for all combinations of features:\n\n```python\n\
    # Load library\nfrom sklearn.preprocessing import PolynomialFeatures\nfrom sklearn.linear_model\
    \ import LinearRegression\nfrom sklearn.datasets import make_regression\n\n# Generate\
    \ features matrix, target vector\nfeatures, target = make_regression(n_samples=100,\n\
    \                                   n_features=3,\n                          \
    \         n_informative=2,\n                                   n_targets=1,\n\
    \                                   noise=0.2,\n                             \
    \      coef=False,\n                                   random_state=1)\n\n# Create\
    \ interaction terms\npolynomial = PolynomialFeatures(degree=2,\n             \
    \                   interaction_only=True,\n                                include_bias=False)\n\
    features_interaction = polynomial.fit_transform(features)\n```\n\n### Discussion\n\
    \nInteraction terms are features that represent the combination of two or more\
    \ other features. For example, if we have features $x_1$ and $x_2$, their interaction\
    \ term is $x_1x_2$. Interaction terms allow us to model the effect of one feature\
    \ depending on the value of another feature.\n\nTo create interaction terms using\
    \ `PolynomialFeatures`, there are three important parameters we must set. Most\
    \ important, `interaction_only=True` tells `PolynomialFeatures` to return only\
    \ interaction terms (and not polynomial features, which we will discuss in Recipe\
    \ 13.3). By default, `PolynomialFeatures` will add a feature containing 1s called\
    \ a *bias*. We can prevent that with `include_bias=False`. Finally, the `degree`\
    \ parameter determines the maximum number of features to create interaction terms\
    \ from (in case we wanted to create an interaction term that is the combination\
    \ of three features).\n\nWe can see the output of `PolynomialFeatures` from our\
    \ solution by checking to see if the first observation's feature values and interaction\
    \ term value match our manually calculated version:\n\n```python\n# View the values\
    \ of the first observation\nfeatures_interaction[0]\n\narray([0.0465673 , 0.80186103,\
    \ 0.0373405 ])\n```\n\nHowever, while often we will have a substantive reason\
    \ for believing there is an interaction between two features, sometimes we will\
    \ not. In those cases it can be useful to use scikit-learn's `PolynomialFeatures`\
    \ to create interaction terms for all combinations of features. We can then use\
    \ model selection strategies to identify the combination of features and interaction\
    \ terms that produces the best model.\n\n## 13.3 Fitting a Nonlinear Relationship\n\
    \n### Problem\n\nYou want to model a nonlinear relationship.\n\n### Solution\n\
    \nCreate a polynomial regression by including polynomial features in a linear\
    \ regression model:\n\n```python\n# Load library\nfrom sklearn.linear_model import\
    \ LinearRegression\nfrom sklearn.preprocessing import PolynomialFeatures\nfrom\
    \ sklearn.datasets import make_regression\n\n# Generate features matrix, target\
    \ vector\nfeatures, target = make_regression(n_samples=100,\n                \
    \                   n_features=3,\n                                   n_informative=2,\n\
    \                                   n_targets=1,\n                           \
    \        noise=0.2,\n                                   coef=False,\n        \
    \                           random_state=1)\n\n# Create polynomial features x^2\
    \ and x^3\npolynomial = PolynomialFeatures(degree=3, include_bias=False)\nfeatures_polynomial\
    \ = polynomial.fit_transform(features)\n\n# Create linear regression\nregression\
    \ = LinearRegression()\n\n# Fit the linear regression\nmodel = regression.fit(features_polynomial,\
    \ target)\n```\n\n### Discussion\n\nSo far we have discussed modeling only linear\
    \ relationships. An example of a linear relationship would be the number of stories\
    \ a building has and the building's height. In linear regression, we assume the\
    \ effect of number of stories and building height is approximately constant, meaning\
    \ a 20-story building will be roughly twice as high as a 10-story building, which\
    \ will be roughly twice as high as a 5-story building. Many relationships of interest,\
    \ however, are not strictly linear.\n\nOften we want to model a nonlinear relationship—for\
    \ example, the relationship between the number of hours a student studies and\
    \ the score she gets on a test. Intuitively, we can imagine there is a big difference\
    \ in test scores between students who study for one hour compared to students\
    \ who did not study at all. However, there is a much smaller difference in test\
    \ scores between a student who studied for 99 hours and a student who studied\
    \ for 100 hours. The effect that one hour of studying has on a student's test\
    \ score decreases as the number of hours increases.\n\nPolynomial regression is\
    \ an extension of linear regression that allows us to model nonlinear relationships.\
    \ To create a polynomial regression, convert the linear function we used in Recipe\
    \ 13.1:\n\n$\\widehat{y} = \\widehat{\\beta}_0 + \\widehat{\\beta}_1x_1 + \\epsilon$\n\
    \ninto a polynomial function by adding polynomial features:\n\n$\\widehat{y} =\
    \ \\widehat{\\beta}_0 + \\widehat{\\beta}_1x_1 + \\widehat{\\beta}_2x_1^2 + \\\
    dots + \\widehat{\\beta}_dx_1^d + \\epsilon$\n\nwhere $d$ is the degree of the\
    \ polynomial. How are we able to use a linear regression for a nonlinear function?\
    \ The answer is that we do not change how the linear regression fits the model\
    \ but rather only add polynomial features. That is, the linear regression does\
    \ not “know” that the $x^2$ is a quadratic transformation of $x$. It just considers\
    \ it one more variable.\n\nA more practical description might be in order. To\
    \ model nonlinear relationships, we can create new features that raise an existing\
    \ feature, $x$, up to some power: $x^2$, $x^3$, and so on. The more of these new\
    \ features we add, the more flexible the “line” created by our model. To make\
    \ this more explicit, imagine we want to create a polynomial to the third degree.\
    \ For the sake of simplicity, we will focus on only one observation (the first\
    \ observation in the dataset), $x[0]$:\n\n```python\n# View first observation\n\
    features[0]\n\narray([-0.61175641])\n```\n\nTo create a polynomial feature, we\
    \ would raise the first observation’s value to the second degree, $x_1^2$:\n\n\
    ```python\n# View first observation raised to the second power, x^2\nfeatures[0]**2\n\
    \narray([0.37424591])\n```\n\nThis would be our new feature. We would then also\
    \ raise the first observation’s value to the third degree, $x_1^3$:\n\n```python\n\
    # View first observation raised to the third power, x^3\nfeatures[0]**3\n\narray([-0.22894734])\n\
    ```\n\nBy including all three features ($x$, $x^2$, and $x^3$) in our feature\
    \ matrix and then running a linear regression, we have conducted a polynomial\
    \ regression:\n\n```python\n# View the first observation's values for x, x^2,\
    \ and x^3\nfeatures_polynomial[0]\n\narray([-0.61175641,  0.37424591, -0.22894734])\n\
    ```\n\n`PolynomialFeatures` has two important parameters. First, `degree` determines\
    \ the maximum number of degrees for the polynomial features. For example, `degree=3`\
    \ will generate $x^2$ and $x^3$. Second, by default `PolynomialFeatures` includes\
    \ a feature containing only 1s (called a bias). We can remove that by setting\
    \ `include_bias=False`.\n\n## 13.4 Reducing Variance with Regularization\n\n###\
    \ Problem\n\nYou want to reduce the variance of your linear regression model.\n\
    \n### Solution\n\nUse a learning algorithm that includes a *shrinkage penalty*\
    \ (also called *regularization*) like ridge regression and lasso regression:\n\
    \n```python\n# Load libraries\nfrom sklearn.linear_model import Ridge\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.datasets import make_regression\n\n# Generate\
    \ features matrix, target vector\nfeatures, target = make_regression(n_samples=100,\n\
    \                                   n_features=3,\n                          \
    \         n_informative=2,\n                                   n_targets=1,\n\
    \                                   noise=0.2,\n                             \
    \      coef=False,\n                                   random_state=1)\n\n# Standardize\
    \ features\nscaler = StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\
    \n# Create ridge regression with an alpha value\nregression = Ridge(alpha=0.5)\n\
    \n# Fit the linear regression\nmodel = regression.fit(features_standardized, target)\n\
    ```\n\n### Discussion\n\nIn standard linear regression the model trains to minimize\
    \ the sum of squared error between the true ($y_i$) and prediction ($\\widehat{y}_i$)\
    \ target values, or residual sum of squares (RSS):\n\n$$RSS = \\sum_{i=1}^{n}\
    \ (y_i - \\widehat{y}_i)^2$$\n\nRegularized regression learners are similar, except\
    \ they attempt to minimize RSS *and* some penalty for the total size of the coefficient\
    \ values, called a *shrinkage penalty* because it attempts to “shrink” the model.\
    \ There are two common types of regularized learners for linear regression: ridge\
    \ regression and the lasso. The only formal difference is the type of shrinkage\
    \ penalty used. In *ridge regression*, the shrinkage penalty is a tuning hyperparameter\
    \ multiplied by the squared sum of all coefficients:\n\n$$RSS + \\alpha \\sum_{j=1}^{p}\
    \ \\widehat{\\beta}_j^2$$\n\nwhere $\\widehat{\\beta}_j$ is the coefficient of\
    \ the $j$th of $p$ features and $\\alpha$ is a hyperparameter (discussed next).\
    \ The *lasso* is similar, except the shrinkage penalty is a tuning hyperparameter\
    \ multiplied by the sum of the absolute value of all coefficients:\n\n$$\\frac{1}{2n}\\\
    text{RSS} + \\alpha \\sum_{j=1}^{p} |\\widehat{\\beta}_j|$$\n\nwhere $n$ is the\
    \ number of observations. So which one should we use? As a very general rule of\
    \ thumb, ridge regression often produces slightly better predictions than lasso,\
    \ but lasso (for reasons we will discuss in Recipe 13.5) produces more interpretable\
    \ models. If we want a balance between ridge and lasso's penalty functions we\
    \ can use *elastic net*, which is simply a regression model with both penalties\
    \ included. Regardless of which one we use, both ridge and lasso regressions can\
    \ penalize large or complex models by including coefficient values in the loss\
    \ function we are trying to minimize.\n\nThe hyperparameter, $\\alpha$, lets us\
    \ control how much we penalize the coefficients, with higher values of $\\alpha$\
    \ creating simpler models. The ideal value of $\\alpha$ should be tuned like any\
    \ other hyperparameter. In scikit-learn, $\\alpha$ is set using the `alpha` parameter.\n\
    \nscikit-learn includes a `RidgeCV` method that allows us to select the ideal\
    \ value for $\\alpha$:\n\n```python\n# Load library\nfrom sklearn.linear_model\
    \ import RidgeCV\n\n# Create ridge regression with three alpha values\nregr_cv\
    \ = RidgeCV(alphas=[0.1, 1.0, 10.0])\n\n# Fit the linear regression\nmodel_cv\
    \ = regr_cv.fit(features_standardized, target)\n\n# View coefficients\nmodel_cv.coef_\n\
    array([1.29223201e-02, 4.40972291e+01, 5.38979372e+01])\n```\n\nWe can then easily\
    \ view the best model's $\\alpha$ value:\n\n```python\n# View alpha\nmodel_cv.alpha_\n\
    0.1\n```\n\nOne final note: because in linear regression the value of the coefficients\
    \ is partially determined by the scale of the feature, and in regularized models\
    \ all coefficients are summed together, we must make sure to standardize the feature\
    \ prior to training."
  mdcn: "## 13.2 创建交互特征\n\n### 问题\n\n你想创建交互特征。\n\n### 解决方案\n\n使用 scikit-learn 的 `PolynomialFeatures`\
    \ 为所有特征组合创建交互项：\n\n```python\n# 加载库\nfrom sklearn.preprocessing import PolynomialFeatures\n\
    from sklearn.linear_model import LinearRegression\nfrom sklearn.datasets import\
    \ make_regression\n\n# 生成特征矩阵和目标向量\nfeatures, target = make_regression(n_samples=100,\n\
    \                                   n_features=3,\n                          \
    \         n_informative=2,\n                                   n_targets=1,\n\
    \                                   noise=0.2,\n                             \
    \      coef=False,\n                                   random_state=1)\n\n# 创建交互项\n\
    polynomial = PolynomialFeatures(degree=2,\n                                interaction_only=True,\n\
    \                                include_bias=False)\nfeatures_interaction = polynomial.fit_transform(features)\n\
    ```\n\n### 讨论\n\n交互项是表示两个或多个其他特征组合的特征。例如，如果我们有特征 $x_1$ 和 $x_2$，它们的交互项是 $x_1x_2$。交互项允许我们对一个特征的效果依赖于另一个特征的值进行建模。\n\
    \n要使用 `PolynomialFeatures` 创建交互项，我们必须设置三个重要参数。最重要的是，`interaction_only=True` 告诉\
    \ `PolynomialFeatures` 只返回交互项（而不是多项式特征，我们将在配方 13.3 中讨论）。默认情况下，`PolynomialFeatures`\
    \ 会添加一个包含 1 的特征，称为 *偏差*。我们可以通过 `include_bias=False` 来防止这种情况。最后，`degree` 参数决定了创建交互项所使用的最大特征数量（以防我们想要创建一个由三个特征组合而成的交互项）。\n\
    \n我们可以通过检查第一个观测值的特征值和交互项值是否与我们手动计算的版本匹配，来查看 `PolynomialFeatures` 的输出：\n\n```python\n\
    # 查看第一个观测值的值\nfeatures_interaction[0]\n\narray([0.0465673 , 0.80186103, 0.0373405\
    \ ])\n```\n\n然而，虽然我们通常有实质性的理由相信两个特征之间存在交互作用，但有时我们并没有。在这些情况下，使用 scikit-learn 的\
    \ `PolynomialFeatures` 为所有特征组合创建交互项会很有用。然后我们可以使用模型选择策略来识别产生最佳模型的特征和交互项组合。\n\n\
    ## 13.3 拟合非线性关系\n\n### 问题\n\n你想对非线性关系进行建模。\n\n### 解决方案\n\n通过在线性回归模型中包含多项式特征来创建多项式回归：\n\
    \n```python\n# 加载库\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.preprocessing\
    \ import PolynomialFeatures\nfrom sklearn.datasets import make_regression\n\n\
    # 生成特征矩阵和目标向量\nfeatures, target = make_regression(n_samples=100,\n           \
    \                        n_features=3,\n                                   n_informative=2,\n\
    \                                   n_targets=1,\n                           \
    \        noise=0.2,\n                                   coef=False,\n        \
    \                           random_state=1)\n\n# 创建多项式特征 x^2 和 x^3\npolynomial\
    \ = PolynomialFeatures(degree=3, include_bias=False)\nfeatures_polynomial = polynomial.fit_transform(features)\n\
    \n# 创建线性回归\nregression = LinearRegression()\n\n# 拟合线性回归\nmodel = regression.fit(features_polynomial,\
    \ target)\n```\n\n### 讨论\n\n到目前为止，我们只讨论了对线性关系进行建模。线性关系的一个例子是建筑物的楼层数和建筑物的高度。在线性回归中，我们假设楼层数和建筑物高度的影响大致是恒定的，这意味着一栋\
    \ 20 层的建筑大约是一栋 10 层建筑高度的两倍，而一栋 10 层的建筑大约是一栋 5 层建筑高度的两倍。然而，许多我们感兴趣的关系并非严格线性的。\n\
    \n我们通常希望对非线性关系进行建模——例如，学生学习的小时数与她在考试中得分之间的关系。直观地，我们可以想象学习一小时的学生与完全不学习的学生在考试分数上存在很大差异。然而，学习\
    \ 99 小时的学生与学习 100 小时的学生在考试分数上的差异要小得多。学习一小时对学生考试分数的影响随着学习小时数的增加而减小。\n\n多项式回归是线性回归的扩展，它允许我们对非线性关系进行建模。要创建多项式回归，将我们在配方\
    \ 13.1 中使用的线性函数：\n\n$\\widehat{y} = \\widehat{\\beta}_0 + \\widehat{\\beta}_1x_1\
    \ + \\epsilon$\n\n通过添加多项式特征转换为多项式函数：\n\n$\\widehat{y} = \\widehat{\\beta}_0 +\
    \ \\widehat{\\beta}_1x_1 + \\widehat{\\beta}_2x_1^2 + \\dots + \\widehat{\\beta}_dx_1^d\
    \ + \\epsilon$\n\n其中 $d$ 是多项式的次数。我们如何能够使用线性回归来拟合非线性函数？答案是我们不改变线性回归拟合模型的方式，而只是添加多项式特征。也就是说，线性回归并不“知道”\
    \ $x^2$ 是 $x$ 的二次变换。它只是将其视为另一个变量。\n\n一个更实际的描述可能是必要的。为了对非线性关系建模，我们可以创建新特征，将现有特征\
    \ $x$ 提升到某个幂次：$x^2$、$x^3$ 等等。我们添加的这些新特征越多，模型创建的“线”就越灵活。为了更明确地说明这一点，假设我们想创建一个三次多项式。为了简单起见，我们将只关注一个观测值（数据集中的第一个观测值），$x[0]$：\n\
    \n```python\n# 查看第一个观测值\nfeatures[0]\n\narray([-0.61175641])\n```\n\n要创建多项式特征，我们将第一个观测值的值提升到二次方，$x_1^2$：\n\
    \n```python\n# 查看第一个观测值的二次方，x^2\nfeatures[0]**2\n\narray([0.37424591])\n```\n\n\
    这将是我们的新特征。然后我们还将第一个观测值的值提升到三次方，$x_1^3$：\n\n```python\n# 查看第一个观测值的三次方，x^3\nfeatures[0]**3\n\
    \narray([-0.22894734])\n```\n\n通过在我们的特征矩阵中包含所有三个特征（$x$、$x^2$ 和 $x^3$），然后运行线性回归，我们已经进行了多项式回归：\n\
    \n```python\n# 查看第一个观测值的 x、x^2 和 x^3 的值\nfeatures_polynomial[0]\n\narray([-0.61175641,\
    \  0.37424591, -0.22894734])\n```\n\n`PolynomialFeatures` 有两个重要参数。首先，`degree`\
    \ 决定了多项式特征的最大次数。例如，`degree=3` 将生成 $x^2$ 和 $x^3$。其次，默认情况下 `PolynomialFeatures`\
    \ 包含一个只包含 1 的特征（称为偏差）。我们可以通过设置 `include_bias=False` 来移除它。\n\n## 13.4 通过正则化减少方差\n\
    \n### 问题\n\n你想减少线性回归模型的方差。\n\n### 解决方案\n\n使用包含 *收缩惩罚*（也称为 *正则化*）的学习算法，如岭回归和 Lasso\
    \ 回归：\n\n```python\n# 加载库\nfrom sklearn.linear_model import Ridge\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.datasets import make_regression\n\n# 生成特征矩阵和目标向量\n\
    features, target = make_regression(n_samples=100,\n                          \
    \         n_features=3,\n                                   n_informative=2,\n\
    \                                   n_targets=1,\n                           \
    \        noise=0.2,\n                                   coef=False,\n        \
    \                           random_state=1)\n\n# 标准化特征\nscaler = StandardScaler()\n\
    features_standardized = scaler.fit_transform(features)\n\n# 创建具有 alpha 值的岭回归\n\
    regression = Ridge(alpha=0.5)\n\n# 拟合线性回归\nmodel = regression.fit(features_standardized,\
    \ target)\n```\n\n### 讨论\n\n在标准线性回归中，模型训练以最小化真实目标值 ($y_i$) 和预测目标值 ($\\widehat{y}_i$)\
    \ 之间的平方误差之和，或残差平方和 (RSS)：\n\n$$RSS = \\sum_{i=1}^{n} (y_i - \\widehat{y}_i)^2$$\n\
    \n正则化回归学习器类似，不同之处在于它们试图最小化 RSS *以及* 对系数值总大小的某种惩罚，称为 *收缩惩罚*，因为它试图“收缩”模型。线性回归有两种常见的正则化学习器：岭回归和\
    \ Lasso。唯一的正式区别是使用的收缩惩罚类型。在 *岭回归* 中，收缩惩罚是一个调节超参数乘以所有系数的平方和：\n\n$$RSS + \\alpha\
    \ \\sum_{j=1}^{p} \\widehat{\\beta}_j^2$$\n\n其中 $\\widehat{\\beta}_j$ 是 $p$ 个特征中第\
    \ $j$ 个特征的系数，$\\alpha$ 是一个超参数（接下来讨论）。*Lasso* 类似，不同之处在于收缩惩罚是一个调节超参数乘以所有系数的绝对值之和：\n\
    \n$$\\frac{1}{2n}\\text{RSS} + \\alpha \\sum_{j=1}^{p} |\\widehat{\\beta}_j|$$\n\
    \n其中 $n$ 是观测值的数量。那么我们应该使用哪一个呢？作为一个非常通用的经验法则，岭回归通常比 Lasso 产生稍好的预测，但 Lasso（出于我们将在配方\
    \ 13.5 中讨论的原因）产生更可解释的模型。如果我们想要在岭和 Lasso 的惩罚函数之间取得平衡，我们可以使用 *弹性网络*，它只是一个包含两种惩罚的回归模型。无论我们使用哪一个，岭回归和\
    \ Lasso 回归都可以通过在我们要最小化的损失函数中包含系数值来惩罚大型或复杂的模型。\n\n超参数 $\\alpha$ 让我们控制对系数的惩罚程度，较高的\
    \ $\\alpha$ 值会产生更简单的模型。理想的 $\\alpha$ 值应该像任何其他超参数一样进行调整。在 scikit-learn 中，$\\alpha$\
    \ 使用 `alpha` 参数设置。\n\nscikit-learn 包含一个 `RidgeCV` 方法，允许我们为 $\\alpha$ 选择理想的值：\n\
    \n```python\n# 加载库\nfrom sklearn.linear_model import RidgeCV\n\n# 创建具有三个 alpha\
    \ 值的岭回归\nregr_cv = RidgeCV(alphas=[0.1, 1.0, 10.0])\n\n# 拟合线性回归\nmodel_cv = regr_cv.fit(features_standardized,\
    \ target)\n\n# 查看系数\nmodel_cv.coef_\narray([1.29223201e-02, 4.40972291e+01, 5.38979372e+01])\n\
    ```\n\n然后我们可以轻松查看最佳模型的 $\\alpha$ 值：\n\n```python\n# 查看 alpha\nmodel_cv.alpha_\n\
    0.1\n```\n\n最后一点：因为在线性回归中，系数的值部分由特征的尺度决定，而在正则化模型中，所有系数都被加在一起，所以我们必须确保在训练之前对特征进行标准化。"

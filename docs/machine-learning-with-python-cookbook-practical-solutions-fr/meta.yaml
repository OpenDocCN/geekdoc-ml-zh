    # Discussion


    Class probabilities are a common and useful part of machine learning models. In
    scikit-learn, most learning algorithms allow us to see the predicted probabilities
    of class membership using `predict_proba`. This can be extremely useful if, for
    instance, we want to predict a certain class only if the model predicts the probability
    that the class is over 90%. However, some models, including naive Bayes classifiers,
    output probabilities that are not based on the real world. That is, `predict_proba`
    might predict an observation has a 0.70 chance of being a certain class, when
    the reality is that it is 0.10 or 0.99. Specifically in naive Bayes, while the
    ranking of predicted probabilities for the different target classes is valid,
    the raw predicted probabilities tend to take on extreme values close to 0 and
    1.


    To obtain meaningful predicted probabilities we need conduct what is called *calibration*.
    In scikit-learn we can use the `CalibratedClassifierCV` class to create well-calibrated
    predicted probabilities using k-fold cross-validation. In `CalibratedClassifierCV`,
    the training sets are used to train the model, and the test set is used to calibrate
    the predicted probabilities. The returned predicted probabilities are the average
    of the k-folds.


    Using our solution we can see the difference between raw and well-calibrated predicted
    probabilities. In our solution, we created a Gaussian naive Bayes classifier.
    If we train that classifier and then predict the class probabilities for a new
    observation, we can see very extreme probability estimates:


    ```

    # Train a Gaussian naive Bayes then predict class probabilities

    classifer.fit(features, target).predict_proba(new_observation)

    array([[2.31548432e-04, 9.99768128e-01, 3.23532277e-07]])

    ```


    However if, after we calibrate the predicted probabilities (which we did in our
    solution), we get very different results:


    ```

    # View calibrated probabilities

    array([[0.31859969, 0.63663466, 0.04476565]])


    array([[ 0.31859969, 0.63663466, 0.04476565]])

    ```'

    sparse_tensor = tensor.to_sparse()\n```\n\n### 讨论\n\n稀疏张量是表示主要由0组成的数据的内存高效方式。在第1章中，我们使用scipy创建了一个压缩稀疏行（CSR）矩阵，它不再是NumPy数组。\n\
    \n`torch.Tensor`类允许我们使用相同的对象创建常规矩阵和稀疏矩阵。如果我们检查刚刚创建的两个张量的类型，我们可以看到它们实际上属于同一个类：\n\

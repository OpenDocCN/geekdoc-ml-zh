- md: "## 21.11 Reducing Overfitting with Dropout\n\n### Problem\n\nYou want to reduce\
    \ overfitting.\n\n### Solution\n\nIntroduce noise into your network's architecture\
    \ using dropout:\n\n```python\n# Load libraries\nimport torch\nimport torch.nn\
    \ as nn\nimport numpy as np\nfrom torch.utils.data import DataLoader, TensorDataset\n\
    from torch.optim import RMSprop\nfrom sklearn.datasets import make_classification\n\
    from sklearn.model_selection import train_test_split\n\n# Create training and\
    \ test sets\nfeatures, target = make_classification(n_classes=2, n_features=10,\
    \ n_samples=1000)\nfeatures_train, features_test, target_train, target_test =\
    \ train_test_split(features, target, test_size=0.1, random_state=1)\n\n# Set random\
    \ seed\ntorch.manual_seed(0)\nnp.random.seed(0)\n\n# Convert data to PyTorch tensors\n\
    x_train = torch.from_numpy(features_train).float()\ny_train = torch.from_numpy(target_train).float().view(-1,\
    \ 1)\nx_test = torch.from_numpy(features_test).float()\ny_test = torch.from_numpy(target_test).float().view(-1,\
    \ 1)\n\n# Define a neural network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n\
    \    def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n  \
    \      self.sequential = torch.nn.Sequential(\n            torch.nn.Linear(10,\
    \ 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,16),\n  \
    \          torch.nn.ReLU(),\n            torch.nn.Linear(16, 1),\n           \
    \ torch.nn.Dropout(0.1), # Drop 10% of neurons\n            torch.nn.Sigmoid(),\n\
    \        )\n\n    def forward(self, x):\n        x = self.sequential(x)\n    \
    \    return x\n\n# Initialize neural network\nnetwork = SimpleNeuralNet()\n\n\
    # Define loss function, optimizer\ncriterion = nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\
    \n# Define data loader\ntrain_data = TensorDataset(x_train, y_train)\ntrain_loader\
    \ = DataLoader(train_data, batch_size=100, shuffle=True)\n\n# Compile the model\
    \ using torch 2.0's optimizer\nnetwork = torch.compile(network)\n\n# Train neural\
    \ network\nepochs = 3\nfor epoch in range(epochs):\n    for batch_idx, (data,\
    \ target) in enumerate(train_loader):\n        optimizer.zero_grad()\n       \
    \ output = network(data)\n        loss = criterion(output, target)\n        loss.backward()\n\
    \        optimizer.step()\n    print(\"Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n\
    \n# Evaluate neural network\nwith torch.no_grad():\n    output = network(x_test)\n\
    \    test_loss = criterion(output, y_test)\n    test_accuracy = (output.round()\
    \ == y_test).float().mean()\n    print(\"Test Loss:\", test_loss.item(), \"\\\
    tTest Accuracy:\", test_accuracy.item())\n```\n\nEpoch: 1 Loss: 0.18791493773460388\n\
    Epoch: 2 Loss: 0.17331615090370178\nEpoch: 3 Loss: 0.1384529024362564\nTest Loss:\
    \ 0.12702330946922302 Test Accuracy: 0.9100000262260437\n\n### Discussion\n\n\
    *Dropout* is a fairly common method for regularizing smaller neural networks.\
    \ In dropout, every time a batch of observations is created for training, a proportion\
    \ of the units in one or more layers is multiplied by zero (i.e., dropped). In\
    \ this setting, every batch is trained on the same network (e.g., the same parameters),\
    \ but each batch is confronted by a slightly different version of that network's\
    \ *architecture*.\n\nDropout is thought to be effective because by constantly\
    \ and randomly dropping units in each batch, it forces units to learn parameter\
    \ values able to perform under a wide variety of network architectures. That is,\
    \ they learn to be robust to disruptions (i.e., noise) in the other hidden units,\
    \ and this prevents the network from simply memorizing the training data.\n\n\
    It is possible to add dropout to both the hidden and input layers. When an input\
    \ layer is dropped, its feature value is not introduced into the network for that\
    \ batch.\n\nIn PyTorch, we can implement dropout by adding an `nn.Dropout` layer\
    \ into our network architecture. Each `nn.Dropout` layer will drop a user-defined\
    \ hyperparameter of units in the previous layer every batch.\n\n## 21.12 Saving\
    \ Model Training Progress\n\n### Problem\n\nGiven a neural network that will take\
    \ a long time to train, you want to save your progress in case the training process\
    \ is interrupted.\n\n### Solution\n\nUse the `torch.save` function to save the\
    \ model after every epoch:\n\n```python\n# Load libraries\nimport torch\nimport\
    \ torch.nn as nn\nimport numpy as np\nfrom torch.utils.data import DataLoader,\
    \ TensorDataset\nfrom torch.optim import RMSprop\nfrom sklearn.datasets import\
    \ make_classification\nfrom sklearn.model_selection import train_test_split\n\n\
    # Create training and test sets\nfeatures, target = make_classification(n_classes=2,\
    \ n_features=10,\n    n_samples=1000)\nfeatures_train, features_test, target_train,\
    \ target_test = train_test_split(\n    features, target, test_size=0.1, random_state=1)\n\
    \n# Set random seed\ntorch.manual_seed(0)\nnp.random.seed(0)\n\n# Convert data\
    \ to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\ny_train\
    \ = torch.from_numpy(target_train).float().view(-1, 1)\nx_test = torch.from_numpy(features_test).float()\n\
    y_test = torch.from_numpy(target_test).float().view(-1, 1)\n\n# Define a neural\
    \ network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n\
    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16,16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Dropout(0.1), # Drop 10% of neurons\n            torch.nn.Sigmoid(),\n\
    \        )\n\n    def forward(self, x):\n        x = self.sequential(x)\n    \
    \    return x\n\n# Initialize neural network\nnetwork = SimpleNeuralNet()\n\n\
    # Define loss function, optimizer\ncriterion = nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\
    \n# Define data loader\ntrain_data = TensorDataset(x_train, y_train)\ntrain_loader\
    \ = DataLoader(train_data, batch_size=100, shuffle=True)\n\n# Compile the model\
    \ using torch 2.0's optimizer\nnetwork = torch.compile(network)\n\n# Train neural\
    \ network\nepochs = 5\nfor epoch in range(epochs):\n    for batch_idx, (data,\
    \ target) in enumerate(train_loader):\n        optimizer.zero_grad()\n       \
    \ output = network(data)\n        loss = criterion(output, target)\n        loss.backward()\n\
    \        optimizer.step()\n    # Save the model at the end of every epoch\n  \
    \  torch.save(\n        {\n            'epoch': epoch,\n            'model_state_dict':\
    \ network.state_dict(),\n            'optimizer_state_dict': optimizer.state_dict(),\n\
    \            'loss': loss,\n        },\n        \"model.pt\"\n    )\n    print(\"\
    Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n```\n\nEpoch: 1        Loss: 0.18791493773460388\n\
    Epoch: 2        Loss: 0.17331615090370178\nEpoch: 3        Loss: 0.1384529024362564\n\
    Epoch: 4        Loss: 0.1435958743095398\nEpoch: 5        Loss: 0.17967987060546875\n\
    \n### Discussion\n\nIn the real world, it is common for neural networks to train\
    \ for hours or even days. During that time a lot can go wrong: computers can lose\
    \ power, servers can crash, or inconsiderate graduate students can close your\
    \ laptop.\n\nWe can use `torch.save` to alleviate this problem by saving the model\
    \ after every epoch. Specifically, after every epoch, we save a model to the location\
    \ `model.pt`, the second argument to the `torch.save` function. If we include\
    \ only a filename (e.g., *model.pt*) that file will be overridden with the latest\
    \ model every epoch.\n\nAs you can imagine, we can introduce additional logic\
    \ to save the model every few epochs, only save a model if the loss goes down,\
    \ etc. We could even combine this approach with the early stopping approach in\
    \ PyTorch Lightning to ensure we save a model no matter at what epoch the training\
    \ ends."

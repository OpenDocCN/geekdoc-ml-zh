- md: "## CHAPTER 7\nHandling Dates and Times\n\n### 7.0 Introduction\n\nDates and\
    \ times (datetimes), such as the time of a particular sale or the date of a public\
    \ health statistic, are frequently encountered during preprocessing for machine\
    \ learning. *Longitudinal data* (or *time series data*) is data that's collected\
    \ repeatedly for the same variables over points in time. In this chapter, we will\
    \ build a toolbox of strategies for handling time series data, including tackling\
    \ time zones and creating lagged time features. Specifically, we will focus on\
    \ the time series tools in the pandas library, which centralizes the functionality\
    \ of many other general libraries such as datetime.\n\n### 7.1 Converting Strings\
    \ to Dates\n\n**Problem**\n\nGiven a vector of strings representing dates and\
    \ times, you want to transform them into time series data.\n\n**Solution**\n\n\
    Use pandas' `to_datetime` with the format of the date and/or time specified in\
    \ the `format` parameter:\n\n```python\n# Load libraries\nimport numpy as np\n\
    import pandas as pd\n\n# Create strings\ndate_strings = np.array(['03-04-2005\
    \ 11:35 PM',\n                         '23-05-2010 12:01 AM',\n              \
    \           '04-09-2009 09:09 PM'])\n\n# Convert to datetimes\n[pd.to_datetime(date,\
    \ format='%d-%m-%Y %I:%M %p') for date in date_strings]\n```\n\n```\n[Timestamp('2005-04-03\
    \ 23:35:00'),\n Timestamp('2010-05-23 00:01:00'),\n Timestamp('2009-09-04 21:09:00')]\n\
    ```\n\nWe might also want to add an argument to the `errors` parameter to handle\
    \ problems:\n\n```python\n# Convert to datetimes\n[pd.to_datetime(date, format='%d-%m-%Y\
    \ %I:%M %p', errors='coerce')\n for date in date_strings]\n```\n\n```\n[Timestamp('2005-04-03\
    \ 23:35:00'),\n Timestamp('2010-05-23 00:01:00'),\n Timestamp('2009-09-04 21:09:00')]\n\
    ```\n\nIf `errors=\"coerce\"`, then any problem that occurs will not raise an\
    \ error (the default behavior) but instead will set the value causing the error\
    \ to NaT (a missing value). This allows you to deal with outliers by filling them\
    \ with null values, as opposed to troubleshooting errors for individual records\
    \ in the data.\n\n**Discussion**\n\nWhen dates and times come as strings, we need\
    \ to convert them into a data type Python can understand. While there are a number\
    \ of Python tools for converting strings to datetimes, following our use of pandas\
    \ in other recipes we can use `to_datetime` to conduct the transformation. One\
    \ obstacle to using strings to represent dates and times is that the format of\
    \ the strings can vary significantly between data sources. For example, one vector\
    \ of dates might represent March 23, 2015 as “03-23-15” while another might use\
    \ “3|23|2015”. We can use the `format` parameter to specify the exact format of\
    \ the string. Here are some common date and time formatting codes:\n\n| Code |\
    \ Description | Example |\n| :--- | :--- | :--- |\n| %Y | Full year | 2001 |\n\
    | %m | Month w/ zero padding | 04 |\n| %d | Day of the month w/ zero padding |\
    \ 09 |\n| %I | Hour (12hr clock) w/ zero padding | 02 |\n| %p | AM or PM | AM\
    \ |\n| %M | Minute w/ zero padding | 05 |\n| %S | Second w/ zero padding | 09\
    \ |\n\n**See Also**\n\n- Python strftime Cheatsheet (complete list of Python string\
    \ time codes)\n\n### 7.2 Handling Time Zones\n\n**Problem**\n\nYou have time series\
    \ data and want to add or change time zone information.\n\n**Solution**\n\nUnless\
    \ specified, pandas objects have no time zone. We can add a time zone using tz\
    \ during creation:\n\n```python\n# Load library\nimport pandas as pd\n\n# Create\
    \ datetime\npd.Timestamp('2017-05-01 06:00:00', tz='Europe/London')\n```\n\n```\n\
    Timestamp('2017-05-01 06:00:00+0100', tz='Europe/London')\n```\n\nWe can add a\
    \ time zone to a previously created datetime using tz_localize:\n\n```python\n\
    # Create datetime\ndate = pd.Timestamp('2017-05-01 06:00:00')\n\n# Set time zone\n\
    date_in_london = date.tz_localize('Europe/London')\n\n# Show datetime\ndate_in_london\n\
    ```\n\n```\nTimestamp('2017-05-01 06:00:00+0100', tz='Europe/London')\n```\n\n\
    We also can convert to a different time zone:\n\n```python\n# Change time zone\n\
    date_in_london.tz_convert('Africa/Abidjan')\n```\n\n```\nTimestamp('2017-05-01\
    \ 05:00:00+0000', tz='Africa/Abidjan')\n```\n\nFinally, the pandas Series objects\
    \ can apply tz_localize and tz_convert to every element:\n\n```python\n# Create\
    \ three dates\ndates = pd.Series(pd.date_range('2/2/2002', periods=3, freq='M'))\n\
    \n# Set time zone\ndates.dt.tz_localize('Africa/Abidjan')\n```\n\n```\n0    2002-02-28\
    \ 00:00:00+00:00\n1    2002-03-31 00:00:00+00:00\n2    2002-04-30 00:00:00+00:00\n\
    dtype: datetime64[ns, Africa/Abidjan]\n```\n\n**Discussion**\n\npandas supports\
    \ two sets of strings representing timezones; however, I suggest using the pytz\
    \ library strings. We can see all the strings used to represent time zones by\
    \ importing all_timezones:\n\n```python\n# Load library\nfrom pytz import all_timezones\n\
    \n# Show two time zones\nall_timezones[0:2]\n```\n\n```\n['Africa/Abidjan', 'Africa/Accra']\n\
    ```\n\n### 7.3 Selecting Dates and Times\n\n**Problem**\n\nYou have a vector of\
    \ dates and you want to select one or more.\n\n**Solution**\n\nUse two boolean\
    \ conditions as the start and end dates:\n\n```python\n# Load library\nimport\
    \ pandas as pd\n\n# Create data frame\ndataframe = pd.DataFrame()\n\n# Create\
    \ datetimes\ndataframe['date'] = pd.date_range('1/1/2001', periods=100000, freq='H')\n\
    \n# Select observations between two datetimes\ndataframe[(dataframe['date'] >\
    \ '2002-1-1 01:00:00') &\n          (dataframe['date'] <= '2002-1-1 04:00:00')]\n\
    ```\n\n| date |\n|---|\n| 8762 2002-01-01 02:00:00 |\n| 8763 2002-01-01 03:00:00\
    \ |\n| 8764 2002-01-01 04:00:00 |\n\nAlternatively, we can set the date column\
    \ as the DataFrame's index and then slice using loc:\n\n```python\n# Set index\n\
    dataframe = dataframe.set_index(dataframe['date'])\n\n# Select observations between\
    \ two datetimes\ndataframe.loc['2002-1-1 01:00:00':'2002-1-1 04:00:00']\n```\n\
    \n| date | date |\n|---|---|\n| 2002-01-01 01:00:00 | 2002-01-01 01:00:00 |\n\
    | 2002-01-01 02:00:00 | 2002-01-01 02:00:00 |\n| 2002-01-01 03:00:00 | 2002-01-01\
    \ 03:00:00 |\n| 2002-01-01 04:00:00 | 2002-01-01 04:00:00 |\n\n**Discussion**\n\
    \nWhether we use boolean conditions or index slicing is situation dependent. If\
    \ we wanted to do some complex time series manipulation, it might be worth the\
    \ overhead of setting the date column as the index of the DataFrame, but if we\
    \ wanted to do some simple data wrangling, the boolean conditions might be easier.\n\
    \n### 7.4 Breaking Up Date Data into Multiple Features\n\n**Problem**\n\nYou have\
    \ a column of dates and times and you want to create features for year, month,\
    \ day, hour, and minute.\n\n**Solution**\n\nUse the time properties in pandas\
    \ Series.dt:\n\n```python\n# Load library\nimport pandas as pd\n\n# Create data\
    \ frame\ndataframe = pd.DataFrame()\n\n# Create five dates\ndataframe['date']\
    \ = pd.date_range('1/1/2001', periods=150, freq='W')\n\n# Create features for\
    \ year, month, day, hour, and minute\ndataframe['year'] = dataframe['date'].dt.year\n\
    dataframe['month'] = dataframe['date'].dt.month\ndataframe['day'] = dataframe['date'].dt.day\n\
    dataframe['hour'] = dataframe['date'].dt.hour\ndataframe['minute'] = dataframe['date'].dt.minute\n\
    \n# Show three rows\ndataframe.head(3)\n```\n\n| date | year | month | day | hour\
    \ | minute |\n|---|---|---|---|---|---|\n| 0 | 2001-01-07 | 2001 | 1 | 7 | 0 |\
    \ 0 |\n| 1 | 2001-01-14 | 2001 | 1 | 14 | 0 | 0 |\n| 2 | 2001-01-21 | 2001 | 1\
    \ | 21 | 0 | 0 |\n\n**Discussion**\n\nSometimes it can be useful to break up a\
    \ column of dates into components. For example, we might want a feature that includes\
    \ just the year of the observation or we might want to consider only the month\
    \ of some observations so we can compare them regardless of year.\n\n### 7.5 Calculating\
    \ the Difference Between Dates\n\n**Problem**\n\nYou have two datetime features\
    \ and want to calculate the time between them for each observation.\n\n**Solution**\n\
    \nSubtract the two date features using pandas:\n\n```python\n# Load library\n\
    import pandas as pd\n\n# Create data frame\ndataframe = pd.DataFrame()\n\n# Create\
    \ two datetime features\ndataframe['Arrived'] = [pd.Timestamp('01-01-2017'), pd.Timestamp('01-04-2017')]\n\
    dataframe['Left'] = [pd.Timestamp('01-01-2017'), pd.Timestamp('01-06-2017')]\n\
    \n# Calculate duration between features\ndataframe['Left'] - dataframe['Arrived']\n\
    ```\n\n```\n0    0 days\n1    2 days\ndtype: timedelta64[ns]\n```\n\nOften we\
    \ will want to remove the days output and keep only the numerical value:\n\n```python\n\
    # Calculate duration between features\npd.Series(delta.days for delta in (dataframe['Left']\
    \ - dataframe['Arrived']))\n```\n\n```\n0    0\n1    2\ndtype: int64\n```"
  mdcn: "## 第7章\n处理日期和时间\n\n### 7.0 引言\n\n日期和时间（日期时间），例如特定销售时间或公共卫生统计数据的日期，在机器学习预处理过程中经常遇到。*纵向数据*（或*时间序列数据*）是指在不同时间点对相同变量进行重复收集的数据。在本章中，我们将构建一个处理时间序列数据的策略工具箱，包括处理时区和创建滞后时间特征。具体来说，我们将重点介绍pandas库中的时间序列工具，该库集中了datetime等许多其他通用库的功能。\n\
    \n### 7.1 将字符串转换为日期\n\n**问题**\n\n给定一个表示日期和时间的字符串向量，你希望将其转换为时间序列数据。\n\n**解决方案**\n\
    \n使用pandas的`to_datetime`，并在`format`参数中指定日期和/或时间的格式：\n\n```python\n# 加载库\nimport\
    \ numpy as np\nimport pandas as pd\n\n# 创建字符串\ndate_strings = np.array(['03-04-2005\
    \ 11:35 PM',\n                         '23-05-2010 12:01 AM',\n              \
    \           '04-09-2009 09:09 PM'])\n\n# 转换为日期时间\n[pd.to_datetime(date, format='%d-%m-%Y\
    \ %I:%M %p') for date in date_strings]\n```\n\n```\n[Timestamp('2005-04-03 23:35:00'),\n\
    \ Timestamp('2010-05-23 00:01:00'),\n Timestamp('2009-09-04 21:09:00')]\n```\n\
    \n我们可能还想在`errors`参数中添加一个参数来处理问题：\n\n```python\n# 转换为日期时间\n[pd.to_datetime(date,\
    \ format='%d-%m-%Y %I:%M %p', errors='coerce')\n for date in date_strings]\n```\n\
    \n```\n[Timestamp('2005-04-03 23:35:00'),\n Timestamp('2010-05-23 00:01:00'),\n\
    \ Timestamp('2009-09-04 21:09:00')]\n```\n\n如果`errors=\"coerce\"`，那么发生的任何问题都不会引发错误（默认行为），而是将导致错误的值设置为NaT（一个缺失值）。这允许你通过用空值填充异常值来处理它们，而不是为数据中的单个记录排除错误。\n\
    \n**讨论**\n\n当日期和时间以字符串形式出现时，我们需要将它们转换为Python可以理解的数据类型。虽然有许多Python工具可以将字符串转换为日期时间，但遵循我们在其他配方中使用pandas的做法，我们可以使用`to_datetime`进行转换。使用字符串表示日期和时间的一个障碍是，字符串的格式在不同数据源之间可能差异很大。例如，一个日期向量可能将2015年3月23日表示为“03-23-15”，而另一个可能使用“3|23|2015”。我们可以使用`format`参数来指定字符串的确切格式。以下是一些常见的日期和时间格式代码：\n\
    \n| 代码 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| %Y | 完整年份 | 2001 |\n| %m | 带零填充的月份\
    \ | 04 |\n| %d | 带零填充的月份中的天 | 09 |\n| %I | 小时（12小时制）带零填充 | 02 |\n| %p | AM或PM\
    \ | AM |\n| %M | 带零填充的分钟 | 05 |\n| %S | 带零填充的秒 | 09 |\n\n**另请参阅**\n\n- Python\
    \ strftime速查表（Python字符串时间代码的完整列表）\n\n### 7.2 处理时区\n\n**问题**\n\n你有时间序列数据，并希望添加或更改时区信息。\n\
    \n**解决方案**\n\n除非指定，否则pandas对象没有时区。我们可以在创建时使用tz添加时区：\n\n```python\n# 加载库\nimport\
    \ pandas as pd\n\n# 创建日期时间\npd.Timestamp('2017-05-01 06:00:00', tz='Europe/London')\n\
    ```\n\n```\nTimestamp('2017-05-01 06:00:00+0100', tz='Europe/London')\n```\n\n\
    我们可以使用tz_localize为先前创建的日期时间添加时区：\n\n```python\n# 创建日期时间\ndate = pd.Timestamp('2017-05-01\
    \ 06:00:00')\n\n# 设置时区\ndate_in_london = date.tz_localize('Europe/London')\n\n\
    # 显示日期时间\ndate_in_london\n```\n\n```\nTimestamp('2017-05-01 06:00:00+0100', tz='Europe/London')\n\
    ```\n\n我们还可以转换为不同的时区：\n\n```python\n# 更改时区\ndate_in_london.tz_convert('Africa/Abidjan')\n\
    ```\n\n```\nTimestamp('2017-05-01 05:00:00+0000', tz='Africa/Abidjan')\n```\n\n\
    最后，pandas Series对象可以对每个元素应用tz_localize和tz_convert：\n\n```python\n# 创建三个日期\ndates\
    \ = pd.Series(pd.date_range('2/2/2002', periods=3, freq='M'))\n\n# 设置时区\ndates.dt.tz_localize('Africa/Abidjan')\n\
    ```\n\n```\n0    2002-02-28 00:00:00+00:00\n1    2002-03-31 00:00:00+00:00\n2\
    \    2002-04-30 00:00:00+00:00\ndtype: datetime64[ns, Africa/Abidjan]\n```\n\n\

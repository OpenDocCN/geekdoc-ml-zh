    import cv2\nimport numpy as np\nfrom matplotlib import pyplot as plt\n\n# 以灰度模式加载图像\n\
    image = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\n# 将图像调整为\
    \ 50 像素 × 50 像素\nimage_50x50 = cv2.resize(image, (50, 50))\n\n# 查看图像\nplt.imshow(image_50x50,\
    \ cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_152_0.png)\n\
    \n### 讨论\n\n调整图像大小是图像预处理中的常见任务，原因有二。首先，图像有各种形状和大小，而要作为特征使用，图像必须具有相同的维度。标准化（调整大小）图像确实会以丢失较大图像中存在的一些信息为代价，正如飞机图片中所见。图像是信息矩阵，当我们减小图像大小时，我们也在减小该矩阵及其包含的信息的大小。其次，机器学习可能需要成千上万甚至数十万张图像。当这些图像非常大时，它们会占用大量内存，通过调整它们的大小，我们可以显著减少内存使用量。机器学习中一些常见的图像尺寸是\
    \ 32 × 32、64 × 64、96 × 96 和 256 × 256。本质上，我们选择的图像调整大小方法通常是在模型的统计性能和训练它的计算成本之间进行权衡。[Pillow\
    \ 库提供了许多调整图像大小的选项](https://pillow.readthedocs.io/)，原因就在于此。\n\n## 8.4 裁剪图像\n\n\

- md: "## 14.8 Selecting Important Features in Random Forests\n\n### Problem\n\nYou\
    \ need to conduct feature selection on a random forest.\n\n### Solution\n\nIdentify\
    \ the importance features and retrain the model using only the most important\
    \ features:\n\n```python\n# Load libraries\nfrom sklearn.ensemble import RandomForestClassifier\n\
    from sklearn import datasets\nfrom sklearn.feature_selection import SelectFromModel\n\
    \n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# Create random forest classifier\nrandomforest = RandomForestClassifier(random_state=0,\
    \ n_jobs=-1)\n\n# Create object that selects features with importance greater\n\
    # than or equal to a threshold\nselector = SelectFromModel(randomforest, threshold=0.3)\n\
    \n# Create new feature matrix using selector\nfeatures_important = selector.fit_transform(features,\
    \ target)\n\n# Train random forest using most important features\nmodel = randomforest.fit(features_important,\
    \ target)\n```\n\n### Discussion\n\nThere are situations where we might want to\
    \ reduce the number of features in our model. For example, we might want to reduce\
    \ the model's variance, or we might want to improve interpretability by including\
    \ only the most important features.\n\nIn scikit-learn we can use a simple two-stage\
    \ workflow to create a model with reduced features. First, we train a random forest\
    \ model using all features. Then, we use this model to identify the most important\
    \ features. Next, we create a new feature matrix that includes only these features.\
    \ In our solution, we used the `SelectFromModel` method to create a feature matrix\
    \ containing only features with an importance greater than or equal to some threshold\
    \ value. Finally, we created a new model using only those features.\n\nWe must\
    \ note two caveats to this approach. First, nominal categorical features that\
    \ have been one-hot encoded will see the feature importance diluted across the\
    \ binary features. Second, the feature importance of highly correlated features\
    \ will be effectively assigned to one feature and not evenly distributed across\
    \ both features.\n\n### See Also\n\n- Variable Selection Using Random Forests,\
    \ Robin Genuer, Jean-Michel Poggi, and Christine Tuleau-Malot\n\n## 14.9 Handling\
    \ Imbalanced Classes\n\n### Problem\n\nYou have a target vector with highly imbalanced\
    \ classes and want to train a random forest model.\n\n### Solution\n\nTrain a\
    \ decision tree or random forest model with `class_weight=\"balanced\"`:\n\n```python\n\
    # Load libraries\nimport numpy as np\nfrom sklearn.ensemble import RandomForestClassifier\n\
    from sklearn import datasets\n\n# Load data\niris = datasets.load_iris()\nfeatures\
    \ = iris.data\ntarget = iris.target\n\n# Make class highly imbalanced by removing\
    \ first 40 observations\nfeatures = features[40:,:]\ntarget = target[40:]\n\n\
    # Create target vector indicating if class 0, otherwise 1\ntarget = np.where((target\
    \ == 0), 0, 1)\n\n# Create random forest classifier object\nrandomforest = RandomForestClassifier(\n\
    \    random_state=0, n_jobs=-1, class_weight=\"balanced\")\n\n# Train model\n\
    model = randomforest.fit(features, target)\n```\n\n### Discussion\n\nImbalanced\
    \ classes are a common problem when we are doing machine learning in the real\
    \ world. Left unaddressed, the presence of imbalanced classes can reduce the performance\
    \ of our model. We will discuss handling imbalanced classes during preprocessing\
    \ in Recipe 17.5. However, many learning algorithms in scikit-learn come with\
    \ built-in methods for correcting for imbalanced classes. We can set `RandomForestClassifier`\
    \ to correct for imbalanced classes using the `class_weight` parameter. If supplied\
    \ with a dictionary in the form of class names and their desired weights (e.g.,\
    \ `{\"male\": 0.2, \"female\": 0.8}`), `RandomForestClassifier` will weight the\
    \ classes accordingly. However, often a more useful argument is `balanced`, wherein\
    \ classes are automatically weighted inversely proportional to how frequently\
    \ they appear in the data:\n\n$$w_j = \\frac{n}{kn_j}$$\n\nwhere $w_j$ is the\
    \ weight of class $j$, $n$ is the number of observations, $n_j$ is the number\
    \ of observations in class $j$, and $k$ is the total number of classes. For example,\
    \ in our solution we have 2 classes ($k$), 110 observations ($n$), and 10 and\
    \ 100 observations in each class, respectively ($n_j$). If we weight the classes\
    \ using `class_weight=\"balanced\"`, then the smaller class is weighted more:\n\
    \n```python\n# Calculate weight for small class\n110/(2*10)\n5.5\n```\n\nwhile\
    \ the larger class is weighted less:\n\n```python\n# Calculate weight for large\
    \ class\n110/(2*100)\n0.55\n```\n\n## 14.10 Controlling Tree Size\n\n### Problem\n\
    \nYou want to manually determine the structure and size of a decision tree.\n\n\
    ### Solution\n\nUse the tree structure parameters in scikit-learn tree-based learning\
    \ algorithms:\n\n```python\n# Load libraries\nfrom sklearn.tree import DecisionTreeClassifier\n\
    from sklearn import datasets\n\n# Load data\niris = datasets.load_iris()\nfeatures\
    \ = iris.data\ntarget = iris.target\n\n# Create decision tree classifier object\n\
    decisiontree = DecisionTreeClassifier(random_state=0,\n                      \
    \                max_depth=None,\n                                      min_samples_split=2,\n\
    \                                      min_samples_leaf=1,\n                 \
    \                     min_weight_fraction_leaf=0,\n                          \
    \            max_leaf_nodes=None,\n                                      min_impurity_decrease=0)\n\
    \n# Train model\nmodel = decisiontree.fit(features, target)\n```\n\n### Discussion\n\
    \nscikit-learn's tree-based learning algorithms have a variety of techniques for\
    \ controlling the size of decision trees. These are accessed through parameters:\n\
    \n- `max_depth`: Maximum depth of the tree. If `None`, the tree is grown until\
    \ all leaves are pure. If an integer, the tree is effectively \"pruned\" to that\
    \ depth.\n- `min_samples_split`: Minimum number of observations at a node before\
    \ that node is split. If an integer is supplied as an argument, it determines\
    \ the raw minimum, while if a float is supplied, the minimum is the percent of\

  md: "One GridSearchCV parameter is worth noting: verbose. While mostly unnecessary,\
    \ it can be reassuring during long searching processes to receive an indication\
    \ that the search is progressing. The verbose parameter determines the number\
    \ of messages outputted during the search, with 0 showing no output, and 1 to\
    \ 3 outputting additional messages.\n\n# See Also\n\n+   - scikit-learn documentation:\
    \ GridSearchCV\n\n# 12.2 Selecting the Best Models Using Randomized Search\n\n\
    # Problem\n\nYou want a computationally cheaper method than exhaustive search\
    \ to select the best model.\n\n# Solution\n\nUse scikit-learn's RandomizedSearchCV:\n\
    \n```\n# Load libraries\nfrom scipy.stats import uniform\nfrom sklearn import\
    \ linear_model, datasets\nfrom sklearn.model_selection import RandomizedSearchCV\n\
    \n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# Create logistic regression\nlogistic = linear_model.LogisticRegression(max_iter=500,\
    \ solver='liblinear')\n\n# Create range of candidate regularization penalty hyperparameter\
    \ values\npenalty = ['l1', 'l2']\n\n# Create distribution of candidate regularization\
    \ hyperparameter values\nC = uniform(loc=0, scale=4)\n\n# Create hyperparameter\
    \ options\nhyperparameters = dict(C=C, penalty=penalty)\n\n# Create randomized\
    \ search\nrandomizedsearch = RandomizedSearchCV(\n    logistic, hyperparameters,\
    \ random_state=1, n_iter=100, cv=5, verbose=0,\n    n_jobs=-1)\n```"

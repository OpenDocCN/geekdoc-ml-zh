    matrix[1,1]\n\ntensor(5)\n```\n\n### 讨论\n\n与NumPy数组和Python中的大多数事物一样，PyTorch张量是零索引的。索引和切片都受支持。一个关键区别是，索引PyTorch张量以返回单个元素仍然返回一个张量，而不是对象本身的值（该值将是整数或浮点数的形式）。切片语法也与NumPy一致，并在PyTorch中返回tensor类型的对象：\n\
    \n```python\n# 选择向量的所有元素\nvector[:]\n\narray([1, 2, 3, 4, 5, 6])\n\n# 选择直到并包括第三个元素的所有内容\n\
    vector[:3]\n\ntensor([1, 2, 3])\n\n# 选择第三个元素之后的所有内容\nvector[3:]\n\ntensor([4,\

    \ vectors using scikit-learn:\n\n```\n# Load libraries\nimport numpy as np\nfrom\
    \ sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.metrics.pairwise\
    \ import linear_kernel\n\n# Create searchable text data\ntext_data = np.array(['I\
    \ love Brazil. Brazil!',\n                      'Sweden is best',\n          \
    \            'Germany beats both'])\n\n# Create the tf-idf feature matrix\ntfidf\
    \ = TfidfVectorizer()\nfeature_matrix = tfidf.fit_transform(text_data)\n\n# Create\
    \ a search query and transform it into a tf-idf vector\ntext = \"Brazil is the\
    \ best\"\nvector = tfidf.transform([text])\n\n# Calculate the cosine similarities\
    \ between the input vector and all other vectors\ncosine_similarities = linear_kernel(vector,\
    \ feature_matrix).flatten()\n\n# Get the index of the most relevent items in order\n\
    related_doc_indicies = cosine_similarities.argsort()[:-10:-1]\n\n# Print the most\
    \ similar texts to the search query along with the cosine similarity\nprint([(text_data[i],\

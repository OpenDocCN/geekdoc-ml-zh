    # CHAPTER 17

    Support Vector Machines


    # 17.0 Introduction


    To understand support vector machines, we must understand hyperplanes. Formally,
    a *hyperplane* is an *n* – 1 subspace in an *n*-dimensional space. While that
    sounds complex, it actually is pretty simple. For example, if we wanted to divide
    a two-dimensional space, we’d use a one-dimensional hyperplane (i.e., a line).
    If we wanted to divide a three-dimensional space, we’d use a two-dimensional hyperplane
    (i.e., a flat piece of paper or a bed sheet). A hyperplane is simply a generalization
    of that concept into *n* dimensions.


    *Support vector machines* classify data by finding the hyperplane that maximizes
    the margin between the classes in the training data. In a two-dimensional example
    with two classes, we can think of a hyperplane as the widest straight “band” (i.e.,
    line with margins) that separates the two classes.


    In this chapter, we cover training support vector machines in a variety of situations
    and dive under the hood to look at how we can extend the approach to tackle common
    problems.


    # 17.1 Training a Linear Classifier


    # Problem


    You need to train a model to classify observations.


    # Solution


    Use a *support vector classifier* (SVC) to find the hyperplane that maximizes
    the margins between the classes:'
- md: "## Discussion\n\nscikit-learn's LinearSVC implements a simple SVC. To get an\
    \ intuition behind what an SVC is doing, let's plot out the data and hyperplane.\
    \ While SVCs work well in high dimensions, in our solution we loaded only two\
    \ features and took a subset of observations so that the data contains only two\
    \ classes. This will let us visualize the model. Recall that SVC attempts to find\
    \ the hyperplane—a line when we have only two dimensions—with the maximum margin\
    \ between the classes. In the following code we plot the two classes on a two-dimensional\
    \ space, then draw the hyperplane:\n\n```python\n# Load library\nfrom matplotlib\
    \ import pyplot as plt\n\n# Plot data points and color using their class\ncolor\
    \ = [\"black\" if c == 0 else \"lightgrey\" for c in target]\nplt.scatter(features_standardized[:,0],\
    \ features_standardized[:,1], c=color)\n\n# Create the hyperplane\nw = svc.coef_[0]\n\
    a = -w[0] / w[1]\nxx = np.linspace(-2.5, 2.5)\nyy = a * xx - (svc.intercept_[0])\
    \ / w[1]\n\n# Plot the hyperplane\nplt.plot(xx, yy)\nplt.axis(\"off\"), plt.show();\n\
    ```\n\nIn this visualization, all observations of class 0 are black and observations\
    \ of class 1 are light gray. The hyperplane is the decision boundary deciding\
    \ how new observations are classified. Specifically, any observation above the\
    \ line will be classified as class 0, while any observation below the line will\
    \ be classified as class 1. We can prove this by creating a new observation in\
    \ the top-left corner of our visualization, meaning it should be predicted to\
    \ be class 0:\n\n```python\n# Create new observation\nnew_observation = [[ -2,\
    \ 3]]\n\n# Predict class of new observation\nsvc.predict(new_observation)\n\n\
    array([0])\n```\n\nThere are a few things to note about SVCs. First, for the sake\
    \ of visualization, we limited our example to a binary example (i.e., only two\
    \ classes); however, SVCs can work well with multiple classes. Second, as our\
    \ visualization shows, the hyperplane is by definition linear (i.e., not curved).\
    \ This was okay in this example because the data was linearly separable, meaning\
    \ there was a hyperplane that could perfectly separate the two classes. Unfortunately,\
    \ in the real world this is rarely the case.\n\nMore typically, we will not be\
    \ able to perfectly separate classes. In these situations there is a balance between\
    \ SVC maximizing the margin of the hyperplane and minimizing the misclassification.\
    \ In SVC, the latter is controlled with the hyperparameter C. C is a parameter\
    \ of the SVC learner and is the penalty for misclassifying a data point. When\
    \ C is small, the classifier is okay with misclassified data points (high bias\
    \ but low variance). When C is large, the classifier is heavily penalized for\
    \ misclassified data and therefore bends over backward to avoid any misclassified\
    \ data points (low bias but high variance).\n\nIn scikit-learn, C is determined\
    \ by the parameter C and defaults to C=1.0. We should treat C as a hyperparameter\
    \ of our learning algorithm, which we tune using model selection techniques in\
    \ Chapter 12.\n\n## 17.2 Handling Linearly Inseparable Classes Using Kernels\n\
    \n### Problem\n\nYou need to train a support vector classifier, but your classes\
    \ are linearly inseparable.\n\n### Solution\n\nTrain an extension of a support\
    \ vector machine using kernel functions to create nonlinear decision boundaries:\n\
    \n```python\n# Load libraries\nfrom sklearn.svm import SVC\nfrom sklearn import\
    \ datasets\nfrom sklearn.preprocessing import StandardScaler\nimport numpy as\
    \ np\n\n# Set randomization seed\nnp.random.seed(0)\n\n# Generate two features\n\
    features = np.random.randn(200, 2)\n\n# Use an XOR gate (you don't need to know\
    \ what this is) to generate\n# linearly inseparable classes\ntarget_xor = np.logical_xor(features[:,\
    \ 0] > 0, features[:, 1] > 0)\ntarget = np.where(target_xor, 0, 1)\n\n# Create\
    \ a support vector machine with a radial basis function kernel\nsvc = SVC(kernel=\"\
    rbf\", random_state=0, gamma=1, C=1)\n\n# Train the classifier\nmodel = svc.fit(features,\
    \ target)\n```\n\n### Discussion\n\nA full explanation of support vector machines\
    \ is outside the scope of this book. However, a short explanation is likely beneficial\
    \ for understanding support vector machines and kernels. For reasons best learned\
    \ elsewhere, a support vector classifier can be represented as:\n\n$$f(x) = \\\
    beta_0 + \\sum_{i \\in S} \\alpha_i K(x_i, x_{i'})$$\n\nwhere $\\beta_0$ is the\
    \ bias, $S$ is the set of all support vector observations, $\\alpha$ is the model\
    \ parameters to be learned, and $(x_i, x_{i'})$ are pairs of two support vector\
    \ observations, $x_i$ and $x_{i'}$. Most importantly, $K$ is a kernel function\
    \ that compares the similarity between $x_i$ and $x_{i'}$. Don't worry if you\
    \ don't understand kernel functions. For our purposes, just realize that (1) $K$\
    \ determines the type of hyperplane used to separate our classes, and (2) we create\
    \ different hyperplanes by using different kernels. For example, if we want a\
    \ basic linear hyperplane like the one we created in Recipe 17.1, we can use the\
    \ linear kernel:\n\n$$K(x_i, x_{i'}) = \\sum_{j=1}^{p} x_{ij}x_{i'j}$$\n\nwhere\
    \ $p$ is the number of features. However, if we want a nonlinear decision boundary,\
    \ we swap the linear kernel with a polynomial kernel:\n\n$$K(x_i, x_{i'}) = \\\
    left(r + \\gamma \\sum_{j=1}^{p} x_{ij}x_{i'j}\\right)^d$$\n\nwhere $d$ is the\
    \ degree of the polynomial kernel function. Alternatively, we can use one of the\
    \ most common kernels in support vectors machines, the *radial basis function\
    \ kernel*:\n\n$$K(x_i, x_{i'}) = e^{-\\gamma \\sum_{j=1}^{p} (x_{ij}x_{i'j})^2}$$\n\
    \nwhere $\\gamma$ is a hyperparameter and must be greater than zero. The main\
    \ point of the preceding explanation is that if we have linearly inseparable data,\
    \ we can swap out a linear kernel with an alternative kernel to create a nonlinear\
    \ hyperplane decision boundary.\n\nWe can understand the intuition behind kernels\
    \ by visualizing a simple example. This function, based on one by Sebastian Raschka,\
    \ plots the observations and decision boundary hyperplane of a two-dimensional\
    \ space. You do not need to understand how this function works; I have included\
    \ it here so you can experiment on your own:\n\n```python\n# Plot observations\
    \ and decision boundary hyperplane\nfrom matplotlib.colors import ListedColormap\n\
    import matplotlib.pyplot as plt\n\ndef plot_decision_regions(X, y, classifier):\n\
    \    cmap = ListedColormap((\"red\", \"blue\"))\n    xx1, xx2 = np.meshgrid(np.arange(-3,\
    \ 3, 0.02), np.arange(-3, 3, 0.02))\n    Z = classifier.predict(np.array([xx1.ravel(),\
    \ xx2.ravel()]).T)\n    Z = Z.reshape(xx1.shape)\n    plt.contourf(xx1, xx2, Z,\
    \ alpha=0.1, cmap=cmap)\n    for idx, cl in enumerate(np.unique(y)):\n       \
    \ plt.scatter(x=X[y == cl, 0], y=X[y == cl, 1],\n                    alpha=0.8,\
    \ c=cmap(idx),\n                    marker=\"+\", label=cl)\n```\n\nIn our solution,\
    \ we have data containing two features (i.e., two dimensions) and a target vector\
    \ with the class of each observation. Importantly, the classes are assigned such\
    \ that they are *linearly inseparable*. That is, there is no straight line we\
    \ can draw that will divide the two classes. First, let's create a support vector\
    \ machine classifier with a linear kernel:\n\n```python\n# Create support vector\
    \ classifier with a linear kernel\nsvc_linear = SVC(kernel=\"linear\", random_state=0,\
    \ C=1)\n\n# Train model\nsvc_linear.fit(features, target)\n\nSVC(C=1, kernel='linear',\
    \ random_state=0)\n```\n\nNext, since we have only two features, we are working\
    \ in a two-dimensional space and can visualize the observations, their classes,\
    \ and our model's linear hyperplane:\n\n```python\n# Plot observations and hyperplane\n\
    plot_decision_regions(features, target, classifier=svc_linear)\nplt.axis(\"off\"\
    ), plt.show();\n```\n\nAs we can see, our linear hyperplane did very poorly at\
    \ dividing the two classes! Now, let's swap out the linear kernel with a radial\
    \ basis function kernel and use it to train a new model:\n\n```python\n# Create\
    \ a support vector machine with a radial basis function kernel\nsvc = SVC(kernel=\"\
    rbf\", random_state=0, gamma=1, C=1)\n```"

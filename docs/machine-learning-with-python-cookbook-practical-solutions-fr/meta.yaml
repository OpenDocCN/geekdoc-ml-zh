    # Discussion


    TSVD is similar to PCA and, in fact, PCA often uses nontruncated *Singular Value
    Decomposition* (SVD) in one of its steps. Given $d$ features, SVD will create
    factor matrices that are $d \times d$, whereas TSVD will return factors that are
    $n \times n$, where $n$ is previously specified by a parameter. The practical
    advantage of TSVD is that, unlike PCA, it works on sparse feature matrices.


    One issue with TSVD: because of how it uses a random number generator, the signs
    of the output can flip between fittings. An easy workaround is to use `fit` only
    once per preprocessing pipeline, then use `transform` multiple times.



    # Discussion


    PyTorch tensors provide a number of helpful attributes for gathering information
    about a given tensor, including:


    +   - **Shape**: Returns the dimensions of the tensor

    - **Dtype**: Returns the data type of objects within the tensor

    - **Layout**: Returns the memory layout (most common is strided used for dense
    tensors)

    - **Device**: Returns the hardware the tensor is being stored on (CPU/GPU)


    Again, the key differentiator between tensors and arrays is an attribute like
    *device*, because tensors provide us with hardware-accelerated options like GPUs.


    # 20.6 Applying Operations to Elements


    # Problem


    You want to apply an operation to all elements in a tensor.'
  - '[PAGE 334]


    # Solution


    Take advantage of *broadcasting* with PyTorch:


    ```

    # Load library

    import torch


    # Create a tensor

    tensor = torch.tensor([1, 2, 3])


    # Broadcast an arithmetic operation to all elements in a tensor

    tensor * 100


    tensor([100, 200, 300])

    ```


    # Discussion


    Basic operations in PyTorch will take advantage of broadcasting to parallelize
    them using accelerated hardware such as GPUs. This is true for supported mathematical
    operators in Python (+, -, ×, /) and other functions inherent to PyTorch. Unlike
    NumPy, PyTorch doesn''t include a `vectorize` method for applying a function over
    all elements in a tensor. However, PyTorch comes equipped with all of the mathematical
    tools necessary to distribute and accelerate the usual operations required for
    deep learning workflows.


    # See Also


    +   - PyTorch documentation: Broadcasting Semantics

    - Vectorization and Broadcasting with PyTorch



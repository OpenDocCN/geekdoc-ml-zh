    # CHAPTER 18

    Naive Bayes


    # 18.0 Introduction


    Bayes'' theorem is the premier method for understanding the probability of some
    event, $P(A \mid B)$, given some new information, $P(B \mid A)$, and a prior belief
    in the probability of the event, $P(A)$:


    $$P(A \mid B) = \frac{P(B \mid A) P(A)}{P(B)}$$


    The Bayesian method''s popularity has skyrocketed in the last decade, increasingly
    rivaling traditional frequentist applications in academia, government, and business.
    In machine learning, one application of Bayes'' theorem to classification comes
    in the form of the naive Bayes classifier. Naive Bayes classifiers combine a number
    of desirable qualities in practical machine learning into a single classifier.
    These include:


    +   - An intuitive approach

    - The ability to work with small data

    - Low computation costs for training and prediction

    - Often solid results in a variety of settings


    Specifically, a naive Bayes classifier is based on:


    $$P(y \mid x_1, \ldots, x_j) = \frac{P(x_1, \ldots, x_j \mid y) P(y)}{P(x_1, \ldots,
    x_j)}$$'
- md: "where:\n\n- $P(y \\mid x_1, \\dots, x_j)$ is called the *posterior* and is\
    \ the probability that an observation is class $y$ given the observation's values\
    \ for the $j$ features, $x_1, \\dots, x_j$.\n- $P(x_1, \\dots, x_j \\mid y)$ is\
    \ called *likelihood* and is the likelihood of an observation's values for features\
    \ $x_1, \\dots, x_j$ given their class, $y$.\n- $P(y)$ is called the *prior* and\
    \ is our belief for the probability of class $y$ before looking at the data.\n\
    - $P(x_1, \\dots, x_j)$ is called the *marginal probability*.\n\nIn naive Bayes,\
    \ we compare an observation's posterior values for each possible class. Specifically,\
    \ because the marginal probability is constant across these comparisons, we compare\
    \ the numerators of the posterior for each class. For each observation, the class\
    \ with the greatest posterior numerator becomes the predicted class, $\\hat{y}$.\n\
    \nThere are two important things to note about naive Bayes classifiers. First,\
    \ for each feature in the data, we have to assume the statistical distribution\
    \ of the likelihood, $P(x_j \\mid y)$. The common distributions are the normal\
    \ (Gaussian), multinomial, and Bernoulli distributions. The distribution chosen\
    \ is often determined by the nature of features (continuous, binary, etc.). Second,\
    \ naive Bayes gets its name because we assume that each feature, and its resulting\
    \ likelihood, is independent. This “naive” assumption is frequently wrong yet\
    \ in practice does little to prevent building high-quality classifiers.\n\nIn\
    \ this chapter we will cover using scikit-learn to train three types of naive\
    \ Bayes classifiers using three different likelihood distributions. Afterwards,\
    \ we will learn to calibrate the predictions from naive Bayes models to make them\
    \ interpretable.\n\n## 18.1 Training a Classifier for Continuous Features\n\n\
    ### Problem\n\nYou have only continuous features and you want to train a naive\
    \ Bayes classifier.\n\n### Solution\n\nUse a Gaussian naive Bayes classifier in\
    \ scikit-learn:\n\n```python\n# Load libraries\nfrom sklearn import datasets\n\
    from sklearn.naive_bayes import GaussianNB\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\ntarget = iris.target\n\n# Create Gaussian naive Bayes object\n\
    classifer = GaussianNB()\n\n# Train model\nmodel = classifer.fit(features, target)\n\
    ```\n\n### Discussion\n\nThe most common type of naive Bayes classifier is the\
    \ *Gaussian naive Bayes*. In Gaussian naive Bayes, we assume that the likelihood\
    \ of the feature values $x$, given an observation is of class $y$, follows a normal\
    \ distribution:\n\n$$p(x_j \\mid y) = \\frac{1}{\\sqrt{2\\pi\\sigma_{y}^2}} e^{-\\\
    frac{(x_j - \\mu_y)^2}{2\\sigma_{y}^2}}$$\n\nwhere $\\sigma_{y}^2$ and $\\mu_y$\
    \ are the variance and mean values of feature $x_j$ for class $y$. Because of\
    \ the assumption of the normal distribution, Gaussian naive Bayes is best used\
    \ in cases where all our features are continuous.\n\nIn scikit-learn, we train\
    \ a Gaussian naive Bayes like any other model using `fit`, and in turn can then\
    \ make predictions about the class of an observation:\n\n```python\n# Create new\
    \ observation\nnew_observation = [[ 4,  4,  4,  0.4]]\n\n# Predict class\nmodel.predict(new_observation)\n\
    \narray([1])\n```\n\nOne of the interesting aspects of naive Bayes classifiers\
    \ is that they allow us to assign a prior belief over the respected target classes.\
    \ We can do this using the `GaussianNB` `priors` parameter, which takes in a list\
    \ of the probabilities assigned to each class of the target vector:\n\n```python\n\
    # Create Gaussian naive Bayes object with prior probabilities of each class\n\
    clf = GaussianNB(priors=[0.25, 0.25, 0.5])\n\n# Train model\nmodel = classifer.fit(features,\
    \ target)\n```\n\nIf we do not add any argument to the `priors` parameter, the\
    \ prior is adjusted based on the data.\n\nFinally, note that the raw predicted\
    \ probabilities from Gaussian naive Bayes (outputted using predict_proba) are\
    \ not calibrated. That is, they should not be believed. If we want to create useful\
    \ predicted probabilities, we will need to calibrate them using an isotonic regression\
    \ or a related method.\n\n### See Also\n\n- How the Naive Bayes Classifier Works\
    \ in Machine Learning\n\n## 18.2 Training a Classifier for Discrete and Count\
    \ Features\n\n### Problem\n\nGiven discrete or count data, you need to train a\
    \ naive Bayes classifier.\n\n### Solution\n\nUse a multinomial naive Bayes classifier:\n\
    \n```python\n# Load libraries\nimport numpy as np\nfrom sklearn.naive_bayes import\
    \ MultinomialNB\nfrom sklearn.feature_extraction.text import CountVectorizer\n\
    \n# Create text\ntext_data = np.array(['I love Brazil. Brazil!',\n           \
    \           'Brazil is best',\n                      'Germany beats both'])\n\n\
    # Create bag of words\ncount = CountVectorizer()\nbag_of_words = count.fit_transform(text_data)\n\
    \n# Create feature matrix\nfeatures = bag_of_words.toarray()\n\n# Create target\
    \ vector\ntarget = np.array([0,0,1])\n\n# Create multinomial naive Bayes object\
    \ with prior probabilities of each class\nclassifer = MultinomialNB(class_prior=[0.25,\
    \ 0.5])\n\n# Train model\nmodel = classifer.fit(features, target)\n```\n\n###\
    \ Discussion\n\nMultinomial naive Bayes works similarly to Gaussian naive Bayes,\
    \ but the features are assumed to be multinomially distributed. In practice, this\
    \ means that this classifier is commonly used when we have discrete data (e.g.,\
    \ movie ratings ranging from 1 to 5). One of the most common uses of multinomial\
    \ naive Bayes is text classification using bags of words or *tf-idf* approaches\
    \ (see Recipes 6.9 and 6.10).\n\nIn our solution, we created a toy text dataset\
    \ of three observations and converted the text strings into a bag-of-words feature\
    \ matrix and an accompanying target vector. We then used MultinomialNB to train\
    \ a model while defining the prior probabilities for the two classes (pro-brazil\
    \ and pro-germany).\n\nMultinomialNB works similarly to GaussianNB; models are\
    \ trained using fit, and observations can be predicted using predict:\n\n```python\n\
    # Create new observation\nnew_observation = [[0, 0, 0, 1, 0, 1, 0]]\n\n# Predict\
    \ new observation's class\nmodel.predict(new_observation)\n\narray([0])\n```\n\
    \nIf class_prior is not specified, prior probabilities are learned using the data.\
    \ However, if we want a uniform distribution to be used as the prior, we can set\
    \ fit_prior=False.\n\nFinally, MultinomialNB contains an additive smoothing hyperparameter,\
    \ alpha, that should be tuned. The default value is 1.0, with 0.0 meaning no smoothing\
    \ takes place.\n\n## 18.3 Training a Naive Bayes Classifier for Binary Features\n\
    \n### Problem\n\nYou have binary feature data and need to train a naive Bayes\
    \ classifier.\n\n### Solution\n\nUse a Bernoulli naive Bayes classifier:\n\n```python\n\
    # Load libraries\nimport numpy as np\nfrom sklearn.naive_bayes import BernoulliNB\n\
    \n# Create three binary features\nfeatures = np.random.randint(2, size=(100, 3))\n\
    \n# Create a binary target vector\ntarget = np.random.randint(2, size=(100, 1)).ravel()\n\
    \n# Create Bernoulli naive Bayes object with prior probabilities of each class\n\
    classifer = BernoulliNB(class_prior=[0.25, 0.5])\n\n# Train model\nmodel = classifer.fit(features,\
    \ target)\n```\n\n### Discussion\n\nThe *Bernoulli naive Bayes* classifier assumes\
    \ that all our features are binary, such that they take only two values (e.g.,\
    \ a nominal categorical feature that has been one-hot encoded). Like its multinomial\
    \ cousin, Bernoulli naive Bayes is often used in text classification, when our\
    \ feature matrix is simply the presence or absence of a word in a document. Furthermore,\
    \ like MultinomialNB, BernoulliNB has an additive smoothing hyperparameter, alpha,\
    \ we will want to tune using model selection techniques. Finally, if we want to\

    \ 4.8,  3. ,  1.4,  0.3]])\n```\n\n# Discussion\n\nIn the real world, imbalanced\
    \ classes are everywhere—most visitors don't click the buy button, and many types\
    \ of cancer are thankfully rare. For this reason, handling imbalanced classes\
    \ is a common activity in machine learning.\n\nOur best strategy is simply to\
    \ collect more observations—especially observations from the minority class. However,\
    \ often this is just not possible, so we have to resort to other options.\n\n\
    A second strategy is to use a model evaluation metric better suited to imbalanced\
    \ classes. Accuracy is often used as a metric for evaluating the performance of\
    \ a model, but when imbalanced classes are present, accuracy can be ill suited.\
    \ For example, if only 0.5% of observations have some rare cancer, then even a\
    \ naive model that predicts nobody has cancer will be 99.5% accurate. Clearly\
    \ this is not ideal. Some better metrics we discuss in later chapters are confusion\
    \ matrices, precision, recall, $F_1$ scores, and ROC curves.\n\nA third strategy\
    \ is to use the class weighing parameters included in implementations of some\
    \ models. This allows the algorithm to adjust for imbalanced classes. Fortunately,\
    \ many scikit-learn classifiers have a `class_weight` parameter, making it a good\
    \ option.\n\nThe fourth and fifth strategies are related: downsampling and upsampling.\
    \ In downsampling we create a random subset of the majority class of equal size\
    \ to the minority class. In upsampling we repeatedly sample with replacement from\
    \ the minority class to make it of equal size as the majority class. The decision\
    \ between using downsampling and upsampling is context-specific, and in general\
    \ we should try both to see which produces better results."
- md: "## CHAPTER 6\nHandling Text\n\n## 6.0 Introduction\n\nUnstructured text data,\
    \ like the contents of a book or a tweet, is both one of the most interesting\
    \ sources of features and one of the most complex to handle. In this chapter,\
    \ we will cover strategies for transforming text into information-rich features\
    \ and use some out-of-the-box features (termed *embeddings*) that have become\
    \ increasingly ubiquitous in tasks that involve natural language processing (NLP).\n\
    \nThis is not to say that the recipes covered here are comprehensive. Entire academic\
    \ disciplines focus on handling unstructured data such as text. In this chapter,\
    \ we will cover some commonly used techniques; knowledge of these will add valuable\
    \ tools to our preprocessing toolbox. In addition to many generic text processing\
    \ recipes, we'll also demonstrate how you can import and leverage some pretrained\
    \ machine learning models to generate richer text features.\n\n## 6.1 Cleaning\
    \ Text\n\n### Problem\n\nYou have some unstructured text data and want to complete\
    \ some basic cleaning.\n\n### Solution\n\nIn the following example, we look at\
    \ the text for three books and clean it by using Python's core string operations,\
    \ in particular `strip`, `replace`, and `split`:\n\n```\n# Create text\ntext_data\
    \ = [\"   Interrobang. By Aishwarya Henriette     \",\n             \"Parking\
    \ And Going. By Karl Gautier\",\n             \" Today Is The night. By Jarek\
    \ Prakash \" ]\n\n# Strip whitespaces\nstrip_whitespace = [string.strip() for\
    \ string in text_data]\n\n# Show text\nstrip_whitespace\n['Interrobang. By Aishwarya\
    \ Henriette',\n 'Parking And Going. By Karl Gautier',\n 'Today Is The night. By\
    \ Jarek Prakash']\n\n# Remove periods\nremove_periods = [string.replace(\".\"\
    , \"\") for string in strip_whitespace]\n\n# Show text\nremove_periods\n['Interrobang\
    \ By Aishwarya Henriette',\n 'Parking And Going By Karl Gautier',\n 'Today Is\
    \ The night By Jarek Prakash']\n```\n\nWe also create and apply a custom transformation\
    \ function:\n\n```\n# Create function\ndef capitalizer(string: str) -> str:\n\
    \    return string.upper()\n\n# Apply function\n[capitalizer(string) for string\
    \ in remove_periods]\n['INTERROBANG BY AISHWARYA HENRIETTE',\n 'PARKING AND GOING\
    \ BY KARL GAUTIER',\n 'TODAY IS THE NIGHT BY JAREK PRAKASH']\n```\n\nFinally,\
    \ we can use regular expressions to make powerful string operations:\n\n```\n\
    # Import library\nimport re\n\n# Create function\ndef replace_letters_with_X(string:\
    \ str) -> str:\n    return re.sub(r\"[a-zA-Z]\", \"X\", string)\n\n# Apply function\n\
    [replace_letters_with_X(string) for string in remove_periods]\n['XXXXXXXXXX XX\
    \ XXXXXXXX XXXXXXXX',\n 'XXXXXXX XXX XXXXX XX XXXX XXXXXXX',\n 'XXXXX XX XXX XXXXX\
    \ XX XXXXX XXXXXXX']\n```\n\n### Discussion\n\nSome text data will need to be\
    \ cleaned before we can use it to build features, or be preprocessed in some way\
    \ prior to being fed into an algorithm. Most basic text cleaning can be completed\
    \ using Python's standard string operations. In the real world, we will most likely\
    \ define a custom cleaning function (e.g., capitalizer) combining some cleaning\
    \ tasks and apply that to the text data. Although cleaning strings can remove\
    \ some information, it makes the data much easier to work with. Strings have many\
    \ inherent methods that are useful for cleaning and processing; some additional\
    \ examples can be found here:\n\n```\n# Define a string\ns = \"machine learning\
    \ in python cookbook\"\n\n# Find the first index of the letter \"n\"\nfind_n =\
    \ s.find(\"n\")\n\n# Whether or not the string starts with \"m\"\nstarts_with_m\
    \ = s.startswith(\"m\")\n\n# Whether or not the string ends with \"python\"\n\
    ends_with_python = s.endswith(\"python\")\n\n# Is the string alphanumeric\nis_alnum\
    \ = s.isalnum()\n\n# Is it composed of only alphabetical characters (not including\
    \ spaces)\nis_alpha = s.isalpha()\n\n# Encode as utf-8\nencode_as_utf8 = s.encode(\"\
    utf-8\")\n\n# Decode the same utf-8\ndecode = encode_as_utf8.decode(\"utf-8\"\
    )\n\nprint(\n    find_n,\n    starts_with_m,\n    ends_with_python,\n    is_alnum,\n\
    \    is_alpha,\n    encode_as_utf8,\n    decode,\n    sep = \"|\"\n)\n```\n\n\
    5|True|False|False|False|b'machine learning in python cookbook'|machine learning\
    \ in python cookbook\n\n### See Also\n\n- Beginners Tutorial for Regular Expressions\
    \ in Python\n\n## 6.2 Parsing and Cleaning HTML\n\n### Problem\n\nYou have text\
    \ data with HTML elements and want to extract just the text.\n\n### Solution\n\
    \nUse Beautiful Soup’s extensive set of options to parse and extract from HTML:\n\
    \n```\n# Load library\nfrom bs4 import BeautifulSoup\n\n# Create some HTML code\n\
    html = \"<div class='full_name'>\"\\n       \"<span style='font-weight:bold'>Masego\"\
    \\n       \"</span> Azra</div>\"\n\n# Parse html\nsoup = BeautifulSoup(html, \"\
    lxml\")\n\n# Find the div with the class \"full_name\", show text\nsoup.find(\"\
    div\", { \"class\" : \"full_name\" }).text\n'Masego Azra'\n```\n\n### Discussion\n\
    \nDespite the strange name, Beautiful Soup is a powerful Python library designed\
    \ for scraping HTML. Typically Beautiful Soup is used to process HTML during live\
    \ web scraping, but we can just as easily use it to extract text data embedded\
    \ in static HTML. The full range of Beautiful Soup operations is beyond the scope\
    \ of this book, but even the method we use in our solution shows how easy it can\
    \ be to parse HTML and extract information from specific tags using find().\n\n\
    ### See Also\n\n- [Beautiful Soup](https://www.crummy.com/software/BeautifulSoup/bs4/doc/)\n\
    \n## 6.3 Removing Punctuation\n\n### Problem\n\nYou have a feature of text data\
    \ and want to remove punctuation.\n\n### Solution\n\nDefine a function that uses\
    \ `translate` with a dictionary of punctuation characters:\n\n```\n# Load libraries\n\
    import unicodedata\nimport sys\n\n# Create text\ntext_data = ['Hi!!!! I. Love.\
    \ This. Song....',\n             '10000% Agree!!!!! #LoveIT',\n             'Right?!?!']\n\
    \n# Create a dictionary of punctuation characters\npunctuation = dict.fromkeys(\n\
    \    (i for i in range(sys.maxunicode)\n     if unicodedata.category(chr(i)).startswith('P')),\n\
    \    None\n)\n\n# For each string, remove any punctuation characters\n[string.translate(punctuation)\
    \ for string in text_data]\n['Hi I Love This Song', '10000 Agree LoveIT', 'Right']\n\
    ```\n\n### Discussion\n\nThe Python `translate` method is popular due to its speed.\
    \ In our solution, first we created a dictionary, `punctuation`, with all punctuation\
    \ characters according to Unicode as its keys and `None` as its values. Next we\
    \ translated all characters in the string that are in punctuation into `None`,\
    \ effectively removing them. There are more readable ways to remove punctuation,\
    \ but this somewhat hacky solution has the advantage of being far faster than\
    \ alternatives.\n\nIt is important to be conscious of the fact that punctuation\
    \ contains information (e.g., “Right?” versus “Right!”). Removing punctuation\
    \ can be a necessary evil when we need to manually create features; however, if\
    \ the punctuation is important we should make sure to take that into account.\
    \ Depending on the downstream task we’re trying to accomplish, punctuation might\
    \ contain important information we want to keep (e.g., using a “?” to classify\
    \ if some text contains a question).\n\n## 6.4 Tokenizing Text\n\n### Problem\n\
    \nYou have text and want to break it up into individual words.\n\n### Solution\n\
    \nNatural Language Toolkit for Python (NLTK) has a powerful set of text manipulation\
    \ operations, including word tokenizing:\n\n```\n# Load library\nfrom nltk.tokenize\
    \ import word_tokenize\n\n# Create text\nstring = \"The science of today is the\
    \ technology of tomorrow\"\n\n# Tokenize words\nword_tokenize(string)\n\n['The',\
    \ 'science', 'of', 'today', 'is', 'the', 'technology', 'of', 'tomorrow']\n```\n\
    \nWe can also tokenize into sentences:\n\n```\n# Load library\nfrom nltk.tokenize\
    \ import sent_tokenize\n\n# Create text\nstring = \"The science of today is the\
    \ technology of tomorrow. Tomorrow is today.\"\n\n# Tokenize sentences\nsent_tokenize(string)\n\
    \n['The science of today is the technology of tomorrow.', 'Tomorrow is today.']\n\
    ```\n\n### Discussion\n\n*Tokenization*, especially word tokenization, is a common\
    \ task after cleaning text data because it is the first step in the process of\
    \ turning the text into data we will use to construct useful features. Some pretrained\
    \ NLP models (such as Google's BERT) utilize model-specific tokenization techniques;\
    \ however, word-level tokenization is still a fairly common tokenization approach\
    \ before getting features from individual words.\n\n## 6.5 Removing Stop Words\n\
    \n### Problem\n\nGiven tokenized text data, you want to remove extremely common\
    \ words (e.g., *a*, *is*, *of*, *on*) that contain little informational value.\n\
    \n### Solution\n\nUse NLTK's `stopwords`:"

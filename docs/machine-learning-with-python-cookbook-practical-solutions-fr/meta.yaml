- md: "## Solution\n\nUse Normalizer with a norm argument:\n\n```python\n# Load libraries\n\
    import numpy as np\nfrom sklearn.preprocessing import Normalizer\n\n# Create feature\
    \ matrix\nfeatures = np.array([[0.5, 0.5],\n                     [1.1, 3.4],\n\
    \                     [1.5, 20.2],\n                     [1.63, 34.4],\n     \
    \                [10.9, 3.3]])\n\n# Create normalizer\nnormalizer = Normalizer(norm=\"\
    l2\")\n\n# Transform feature matrix\nnormalizer.transform(features)\n\narray([[\
    \ 0.70710678,  0.70710678],\n       [ 0.30782029,  0.95144452],\n       [ 0.07405353,\
    \  0.99725427],\n       [ 0.04733062,  0.99887928],\n       [ 0.95709822,  0.28976368]])\n\
    ```\n\n## Discussion\n\nMany rescaling methods (e.g., min-max scaling and standardization)\
    \ operate on features; however, we can also rescale across individual observations.\
    \ Normalizer rescales the values on individual observations to have unit norm\
    \ (the sum of their lengths is 1). This type of rescaling is often used when we\
    \ have many equivalent features (e.g., text classification when every word or\
    \ n-word group is a feature).\n\nNormalizer provides three norm options with Euclidean\
    \ norm (often called L2) being the default argument:\n\n$||x||_2 = \\sqrt{x_1^2\
    \ + x_2^2 + \\cdots + x_n^2}$\n\nwhere $x$ is an individual observation and $x_n$\
    \ is that observation's value for the $n$th feature.\n\n```python\n# Transform\
    \ feature matrix\nfeatures_l2_norm = Normalizer(norm=\"l2\").transform(features)\n\
    \n# Show feature matrix\nfeatures_l2_norm\n\narray([[ 0.70710678,  0.70710678],\n\
    \       [ 0.30782029,  0.95144452],\n       [ 0.07405353,  0.99725427],\n    \
    \   [ 0.04733062,  0.99887928],\n       [ 0.95709822,  0.28976368]])\n```\n\n\
    Alternatively, we can specify Manhattan norm (L1):\n\n$\\| x \\|_1 = \\sum_{i=1}^{n}\
    \ |x_i|$.\n\n```python\n# Transform feature matrix\nfeatures_l1_norm = Normalizer(norm=\"\
    l1\").transform(features)\n\n# Show feature matrix\nfeatures_l1_norm\n\narray([[\
    \ 0.5       ,  0.5       ],\n       [ 0.24444444,  0.75555556],\n       [ 0.06912442,\
    \  0.93087558],\n       [ 0.04524008,  0.95475992],\n       [ 0.76760563,  0.23239437]])\n\
    ```\n\nIntuitively, L2 norm can be thought of as the distance between two points\
    \ in New York for a bird (i.e., a straight line), while L1 can be thought of as\
    \ the distance for a human walking on the street (walk north one block, east one\
    \ block, north one block, east one block, etc.), which is why it is called “Manhattan\
    \ norm” or “Taxicab norm.”\n\nPractically, notice that norm=\"l1\" rescales an\
    \ observation’s values so they sum to 1, which can sometimes be a desirable quality:\n\
    \n```python\n# Print sum\nprint(\"Sum of the first observation's values:\",\n\
    \      features_l1_norm[0, 0] + features_l1_norm[0, 1])\n\nSum of the first observation's\
    \ values: 1.0\n```\n\n## 4.4 Generating Polynomial and Interaction Features\n\n\
    ### Problem\n\nYou want to create polynomial and interaction features.\n\n###\
    \ Solution\n\nEven though some choose to create polynomial and interaction features\
    \ manually, scikit-learn offers a built-in method:\n\n```python\n# Load libraries\n\
    import numpy as np\nfrom sklearn.preprocessing import PolynomialFeatures\n\n#\
    \ Create feature matrix\nfeatures = np.array([[2, 3],\n                     [2,\
    \ 3],\n                     [2, 3]])\n\n# Create PolynomialFeatures object\npolynomial_interaction\
    \ = PolynomialFeatures(degree=2, include_bias=False)\n\n# Create polynomial features\n\
    polynomial_interaction.fit_transform(features)\narray([[ 2.,  3.,  4.,  6.,  9.],\n\
    \       [ 2.,  3.,  4.,  6.,  9.],\n       [ 2.,  3.,  4.,  6.,  9.]])\n```\n\n\
    The degree parameter determines the maximum degree of the polynomial. For example,\
    \ degree=2 will create new features raised to the second power:\n\n$x_1, x_2,\
    \ x_1^2, x_2^2$\n\nwhile degree=3 will create new features raised to the second\
    \ and third power:\n\n$x_1, x_2, x_1^2, x_2^2, x_1^3, x_2^3, x_1^2x_2, x_1x_2^2$\n\
    \nFurthermore, by default PolynomialFeatures includes interaction features:\n\n\
    $x_1x_2$\n\nWe can restrict the features created to only interaction features\
    \ by setting interaction_only to True:\n\n```python\ninteraction = PolynomialFeatures(degree=2,\n\
    \                                interaction_only=True, include_bias=False)\n\n\
    interaction.fit_transform(features)\narray([[ 2.,  3.,  6.],\n       [ 2.,  3.,\
    \  6.],\n       [ 2.,  3.,  6.]])\n```\n\n### Discussion\n\nPolynomial features\
    \ are often created when we want to include the notion that there exists a nonlinear\
    \ relationship between the features and the target. For example, we might suspect\
    \ that the effect of age on the probability of having a major medical condition\
    \ is not constant over time but increases as age increases. We can encode that\
    \ nonconstant effect in a feature, $x$, by generating that feature's higher-order\
    \ forms ($x^2$, $x^3$, etc.).\n\nAdditionally, often we run into situations where\
    \ the effect of one feature is dependent on another feature. A simple example\
    \ would be if we were trying to predict whether or not our coffee was sweet, and\
    \ we had two features: (1) whether or not the coffee was stirred, and (2) whether\
    \ or not we added sugar. Individually, each feature does not predict coffee sweetness,\
    \ but the combination of their effects does. That is, a coffee would only be sweet\
    \ if the coffee had sugar and was stirred. The effects of each feature on the\
    \ target (sweetness) are dependent on each other. We can encode that relationship\
    \ by including an interaction feature that is the product of the individual features.\n\
    \n## 4.5 Transforming Features\n\n### Problem\n\nYou want to make a custom transformation\
    \ to one or more features.\n\n### Solution\n\nIn scikit-learn, use `FunctionTransformer`\
    \ to apply a function to a set of features:\n\n```python\n# Load libraries\nimport\
    \ numpy as np\nfrom sklearn.preprocessing import FunctionTransformer\n\n# Create\
    \ feature matrix\nfeatures = np.array([[2, 3],\n                     [2, 3],\n\
    \                     [2, 3]])\n\n# Define a simple function\ndef add_ten(x: int)\
    \ -> int:\n    return x + 10\n\n# Create transformer\nten_transformer = FunctionTransformer(add_ten)\n\
    \n# Transform feature matrix\nten_transformer.transform(features)\narray([[12,\
    \ 13],\n       [12, 13],\n       [12, 13]])\n```\n\nWe can create the same transformation\
    \ in pandas using `apply`:\n\n```python\n# Load library\nimport pandas as pd\n\
    \n# Create DataFrame\ndf = pd.DataFrame(features, columns=[\"feature_1\", \"feature_2\"\
    ])\n\n# Apply function\ndf.apply(add_ten)\n```\n\n| | feature_1 | feature_2 |\n\
    |---|---|---|\n| 0 | 12 | 13 |\n| 1 | 12 | 13 |\n| 2 | 12 | 13 |\n\n### Discussion\n\
    \nIt is common to want to make some custom transformations to one or more features.\
    \ For example, we might want to create a feature that is the natural log of the\
    \ values of a different feature. We can do this by creating a function and then\
    \ mapping it to features using either scikit-learn's FunctionTransformer or pandas'\
    \ apply. In the solution we created a very simple function, add_ten, which added\
    \ 10 to each input, but there is no reason we could not define a much more complex\
    \ function.\n\n## 4.6 Detecting Outliers\n\n### Problem\n\nYou want to identify\
    \ extreme observations.\n\n### Solution\n\nDetecting outliers is unfortunately\
    \ more of an art than a science. However, a common method is to assume the data\
    \ is normally distributed and, based on that assumption, “draw” an ellipse around\
    \ the data, classifying any observation inside the ellipse as an inlier (labeled\
    \ as 1) and any observation outside the ellipse as an outlier (labeled as -1):\n\
    \n```python\n# Load libraries\nimport numpy as np\nfrom sklearn.covariance import\
    \ EllipticEnvelope\nfrom sklearn.datasets import make_blobs\n\n# Create simulated\
    \ data\nfeatures, _ = make_blobs(n_samples=10,\n                         n_features=2,\n\
    \                         centers=1,\n                         random_state=1)\n\
    \n# Replace the first observation's values with extreme values\nfeatures[0, 0]\
    \ = 10000\nfeatures[0, 1] = 10000\n\n# Create detector\noutlier_detector = EllipticEnvelope(contamination=.1)\n\
    \n# Fit detector\noutlier_detector.fit(features)\n\n# Predict outliers\noutlier_detector.predict(features)\n\
    \narray([-1,  1,  1,  1,  1,  1,  1,  1,  1])\n```\n\nIn these arrays, values\
    \ of -1 refer to outliers whereas values of 1 refer to inliers. A major limitation\
    \ of this approach is the need to specify a contamination parameter, which is\
    \ the proportion of observations that are outliers—a value that we don't know.\
    \ Think of contamination as our estimate of the cleanliness of our data. If we\
    \ expect our data to have few outliers, we can set contamination to something\
    \ small. However, if we believe that the data is likely to have outliers, we can\
    \ set it to a higher value.\n\nInstead of looking at observations as a whole,\
    \ we can instead look at individual features and identify extreme values in those\
    \ features using interquartile range (IQR):\n\n```python\n# Create one feature\n\
    feature = features[:, 0]\n\n# Create a function to return index of outliers\n\
    def indices_of_outliers(x: int) -> np.array(int):\n    q1, q3 = np.percentile(x,\
    \ [25, 75])\n    iqr = q3 - q1\n    lower_bound = q1 - (iqr * 1.5)\n    upper_bound\
    \ = q3 + (iqr * 1.5)\n    return np.where((x > upper_bound) | (x < lower_bound))\n\
    \n# Run function\nindices_of_outliers(feature)\n\n(array([0]),)\n```\n\nIQR is\
    \ the difference between the first and third quartile of a set of data. You can\
    \ think of IQR as the spread of the bulk of the data, with outliers being observations\
    \ far from the main concentration of data. Outliers are commonly defined as any\
    \ value 1.5 IQRs less than the first quartile, or 1.5 IQRs greater than the third\
    \ quartile."
  mdcn: "## 解决方案\n\n使用带有 `norm` 参数的 `Normalizer`：\n\n```python\n# 加载库\nimport numpy\
    \ as np\nfrom sklearn.preprocessing import Normalizer\n\n# 创建特征矩阵\nfeatures =\
    \ np.array([[0.5, 0.5],\n                     [1.1, 3.4],\n                  \
    \   [1.5, 20.2],\n                     [1.63, 34.4],\n                     [10.9,\
    \ 3.3]])\n\n# 创建归一化器\nnormalizer = Normalizer(norm=\"l2\")\n\n# 转换特征矩阵\nnormalizer.transform(features)\n\
    \narray([[ 0.70710678,  0.70710678],\n       [ 0.30782029,  0.95144452],\n   \
    \    [ 0.07405353,  0.99725427],\n       [ 0.04733062,  0.99887928],\n       [\
    \ 0.95709822,  0.28976368]])\n```\n\n## 讨论\n\n许多缩放方法（例如，最小-最大缩放和标准化）是针对特征进行操作的；然而，我们也可以跨单个观测值进行缩放。`Normalizer`\
    \ 将单个观测值的值重新缩放为具有单位范数（其长度之和为 1）。当我们有许多等效特征时（例如，在文本分类中，每个单词或 n-gram 组都是一个特征），通常会使用这种类型的缩放。\n\
    \n`Normalizer` 提供了三种范数选项，其中欧几里得范数（通常称为 L2）是默认参数：\n\n$||x||_2 = \\sqrt{x_1^2 +\
    \ x_2^2 + \\cdots + x_n^2}$\n\n其中 $x$ 是一个单独的观测值，$x_n$ 是该观测值在第 $n$ 个特征上的值。\n\n\
    ```python\n# 转换特征矩阵\nfeatures_l2_norm = Normalizer(norm=\"l2\").transform(features)\n\
    \n# 显示特征矩阵\nfeatures_l2_norm\n\narray([[ 0.70710678,  0.70710678],\n       [ 0.30782029,\
    \  0.95144452],\n       [ 0.07405353,  0.99725427],\n       [ 0.04733062,  0.99887928],\n\
    \       [ 0.95709822,  0.28976368]])\n```\n\n或者，我们可以指定曼哈顿范数（L1）：\n\n$\\| x \\\
    |_1 = \\sum_{i=1}^{n} |x_i|$。\n\n```python\n# 转换特征矩阵\nfeatures_l1_norm = Normalizer(norm=\"\
    l1\").transform(features)\n\n# 显示特征矩阵\nfeatures_l1_norm\n\narray([[ 0.5      \
    \ ,  0.5       ],\n       [ 0.24444444,  0.75555556],\n       [ 0.06912442,  0.93087558],\n\
    \       [ 0.04524008,  0.95475992],\n       [ 0.76760563,  0.23239437]])\n```\n\
    \n直观地说，L2 范数可以看作是鸟在纽约两点之间的距离（即直线距离），而 L1 范数可以看作是人在街上行走的距离（向北走一个街区，向东走一个街区，向北走一个街区，向东走一个街区，等等），这就是为什么它被称为“曼哈顿范数”或“出租车范数”。\n\
    \n实际上，请注意 `norm=\"l1\"` 会重新缩放一个观测值的值，使其总和为 1，这有时是一个理想的特性：\n\n```python\n# 打印总和\n\
    print(\"第一个观测值的值之和：\",\n      features_l1_norm[0, 0] + features_l1_norm[0, 1])\n\
    \n第一个观测值的值之和： 1.0\n```\n\n## 4.4 生成多项式和交互特征\n\n### 问题\n\n你想创建多项式和交互特征。\n\n###\
    \ 解决方案\n\n尽管有些人选择手动创建多项式和交互特征，但 scikit-learn 提供了一个内置方法：\n\n```python\n# 加载库\n\
    import numpy as np\nfrom sklearn.preprocessing import PolynomialFeatures\n\n#\
    \ 创建特征矩阵\nfeatures = np.array([[2, 3],\n                     [2, 3],\n       \
    \              [2, 3]])\n\n# 创建 PolynomialFeatures 对象\npolynomial_interaction\
    \ = PolynomialFeatures(degree=2, include_bias=False)\n\n# 创建多项式特征\npolynomial_interaction.fit_transform(features)\n\
    array([[ 2.,  3.,  4.,  6.,  9.],\n       [ 2.,  3.,  4.,  6.,  9.],\n       [\
    \ 2.,  3.,  4.,  6.,  9.]])\n```\n\n`degree` 参数决定了多项式的最高次数。例如，`degree=2` 将创建提升到二次幂的新特征：\n\
    \n$x_1, x_2, x_1^2, x_2^2$\n\n而 `degree=3` 将创建提升到二次和三次幂的新特征：\n\n$x_1, x_2, x_1^2,\
    \ x_2^2, x_1^3, x_2^3, x_1^2x_2, x_1x_2^2$\n\n此外，默认情况下，`PolynomialFeatures` 包含交互特征：\n\
    \n$x_1x_2$\n\n我们可以通过将 `interaction_only` 设置为 `True` 来限制创建的特征仅为交互特征：\n\n```python\n\
    interaction = PolynomialFeatures(degree=2,\n                                interaction_only=True,\
    \ include_bias=False)\n\ninteraction.fit_transform(features)\narray([[ 2.,  3.,\
    \  6.],\n       [ 2.,  3.,  6.],\n       [ 2.,  3.,  6.]])\n```\n\n### 讨论\n\n\
    当我们想包含特征和目标之间存在非线性关系的概念时，通常会创建多项式特征。例如，我们可能怀疑年龄对患有重大疾病概率的影响不是恒定的，而是随着年龄的增长而增加。我们可以通过生成该特征的高阶形式（$x^2$、$x^3$\
    \ 等）来将这种非恒定效应编码到特征 $x$ 中。\n\n此外，我们经常遇到一种情况，即一个特征的效果依赖于另一个特征。一个简单的例子是，如果我们试图预测我们的咖啡是否甜，我们有两个特征：(1)\
    \ 咖啡是否被搅拌，以及 (2) 我们是否加了糖。单独来看，每个特征都不能预测咖啡的甜度，但它们效果的组合可以。也就是说，只有当咖啡加了糖并且被搅拌过时，咖啡才会是甜的。每个特征对目标（甜度）的影响是相互依赖的。我们可以通过包含一个交互特征（即各个特征的乘积）来编码这种关系。\n\
    \n## 4.5 转换特征\n\n### 问题\n\n你想对一个或多个特征进行自定义转换。\n\n### 解决方案\n\n在 scikit-learn 中，使用\
    \ `FunctionTransformer` 将函数应用于一组特征：\n\n```python\n# 加载库\nimport numpy as np\n\
    from sklearn.preprocessing import FunctionTransformer\n\n# 创建特征矩阵\nfeatures =\
    \ np.array([[2, 3],\n                     [2, 3],\n                     [2, 3]])\n\
    \n# 定义一个简单函数\ndef add_ten(x: int) -> int:\n    return x + 10\n\n# 创建转换器\nten_transformer\
    \ = FunctionTransformer(add_ten)\n\n# 转换特征矩阵\nten_transformer.transform(features)\n\
    array([[12, 13],\n       [12, 13],\n       [12, 13]])\n```\n\n我们可以在 pandas 中使用\
    \ `apply` 创建相同的转换：\n\n```python\n# 加载库\nimport pandas as pd\n\n# 创建 DataFrame\n\
    df = pd.DataFrame(features, columns=[\"feature_1\", \"feature_2\"])\n\n# 应用函数\n\
    df.apply(add_ten)\n```\n\n| | feature_1 | feature_2 |\n|---|---|---|\n| 0 | 12\
    \ | 13 |\n| 1 | 12 | 13 |\n| 2 | 12 | 13 |\n\n### 讨论\n\n想要对一个或多个特征进行一些自定义转换是很常见的。例如，我们可能想创建一个特征，它是另一个特征值的自然对数。我们可以通过创建一个函数，然后使用\
    \ scikit-learn 的 `FunctionTransformer` 或 pandas 的 `apply` 将其映射到特征来实现这一点。在解决方案中，我们创建了一个非常简单的函数\
    \ `add_ten`，它将每个输入加 10，但没有理由我们不能定义一个更复杂的函数。\n\n## 4.6 检测异常值\n\n### 问题\n\n你想识别极端观测值。\n\
    \n### 解决方案\n\n不幸的是，检测异常值与其说是一门科学，不如说是一门艺术。然而，一种常见的方法是假设数据是正态分布的，并基于该假设，在数据周围“画”一个椭圆，将椭圆内的任何观测值分类为内点（标记为\
    \ 1），将椭圆外的任何观测值分类为异常值（标记为 -1）：\n\n```python\n# 加载库\nimport numpy as np\nfrom sklearn.covariance\
    \ import EllipticEnvelope\nfrom sklearn.datasets import make_blobs\n\n# 创建模拟数据\n\
    features, _ = make_blobs(n_samples=10,\n                         n_features=2,\n\
    \                         centers=1,\n                         random_state=1)\n\
    \n# 用极端值替换第一个观测值的值\nfeatures[0, 0] = 10000\nfeatures[0, 1] = 10000\n\n# 创建检测器\n\
    outlier_detector = EllipticEnvelope(contamination=.1)\n\n# 拟合检测器\noutlier_detector.fit(features)\n\
    \n# 预测异常值\noutlier_detector.predict(features)\n\narray([-1,  1,  1,  1,  1,  1,\
    \  1,  1,  1])\n```\n\n在这些数组中，值为 -1 表示异常值，而值为 1 表示内点。这种方法的一个主要限制是需要指定 `contamination`\
    \ 参数，即异常值观测值的比例——这是一个我们不知道的值。可以将 `contamination` 视为我们对数据清洁度的估计。如果我们预计我们的数据有很少的异常值，我们可以将\
    \ `contamination` 设置为一个较小的值。然而，如果我们认为数据可能有异常值，我们可以将其设置为一个较高的值。\n\n我们不是整体查看观测值，而是可以查看单个特征，并使用四分位距（IQR）识别这些特征中的极端值：\n\
    \n```python\n# 创建一个特征\nfeature = features[:, 0]\n\n# 创建一个返回异常值索引的函数\ndef indices_of_outliers(x:\
    \ int) -> np.array(int):\n    q1, q3 = np.percentile(x, [25, 75])\n    iqr = q3\
    \ - q1\n    lower_bound = q1 - (iqr * 1.5)\n    upper_bound = q3 + (iqr * 1.5)\n\
    \    return np.where((x > upper_bound) | (x < lower_bound))\n\n# 运行函数\nindices_of_outliers(feature)\n\
    \n(array([0]),)\n```\n\nIQR 是一组数据的第一和第三四分位数之差。你可以将 IQR 视为大部分数据的分布范围，而异常值是远离数据主要集中区域的观测值。异常值通常定义为小于第一四分位数\
    \ 1.5 倍 IQR 或大于第三四分位数 1.5 倍 IQR 的任何值。"

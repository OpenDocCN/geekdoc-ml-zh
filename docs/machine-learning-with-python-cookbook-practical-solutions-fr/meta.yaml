    \ models, including naive Bayes classifiers, output probabilities that are not\
    \ based on the real world. That is, `predict_proba` might predict an observation\
    \ has a 0.70 chance of being a certain class, when the reality is that it is 0.10\
    \ or 0.99. Specifically in naive Bayes, while the ranking of predicted probabilities\
    \ for the different target classes is valid, the raw predicted probabilities tend\
    \ to take on extreme values close to 0 and 1.\n\nTo obtain meaningful predicted\
    \ probabilities we need conduct what is called *calibration*. In scikit-learn\
    \ we can use the `CalibratedClassifierCV` class to create well-calibrated predicted\
    \ probabilities using k-fold cross-validation. In `CalibratedClassifierCV`, the\
    \ training sets are used to train the model, and the test set is used to calibrate\
    \ the predicted probabilities. The returned predicted probabilities are the average\
    \ of the k-folds.\n\nUsing our solution we can see the difference between raw\
    \ and well-calibrated predicted probabilities. In our solution, we created a Gaussian\
    \ naive Bayes classifier. If we train that classifier and then predict the class\
    \ probabilities for a new observation, we can see very extreme probability estimates:\n\
    \n```python\n# Train a Gaussian naive Bayes then predict class probabilities\n\
    classifer.fit(features, target).predict_proba(new_observation)\narray([[2.31548432e-04,\
    \ 9.99768128e-01, 3.23532277e-07]])\n```\n\nHowever if, after we calibrate the\
    \ predicted probabilities (which we did in our solution), we get very different\
    \ results:\n\n```python\n# View calibrated probabilities\narray([[0.31859969,\
    \ 0.63663466, 0.04476565]])\n```\n\nCalibratedClassifierCV offers two calibration\
    \ methods—Platt’s sigmoid model and isotonic regression—defined by the method\
    \ parameter. While we don’t have the space to go into the specifics, because isotonic\
    \ regression is nonparametric it tends to overfit when sample sizes are very small\
    \ (e.g., 100 observations). In our solution we used the Iris dataset with 150\
    \ observations and therefore used the Platt’s sigmoid model.\n\n## CHAPTER 19\n\
    ## Clustering\n\n### 19.0 Introduction\n\nIn much of this book we have looked\
    \ at supervised machine learning—where we have access to both the features and\
    \ the target. This is, unfortunately, not always the case. Frequently, we run\
    \ into situations where we only know the features. For example, imagine we have\
    \ records of sales from a grocery store and we want to break up sales by whether\
    \ the shopper is a member of a discount club. This would be impossible using supervised\
    \ learning because we don't have a target to train and evaluate our models. However,\
    \ there is another option: unsupervised learning. If the behavior of discount\
    \ club members and nonmembers in the grocery store is actually disparate, then\
    \ the average difference in behavior between two members will be smaller than\
    \ the average difference in behavior between a member and nonmember shopper. Put\
    \ another way, there will be two clusters of observations.\n\nThe goal of clustering\
    \ algorithms is to identify those latent groupings of observations, which, if\
    \ done well, allows us to predict the class of observations even without a target\
    \ vector. There are many clustering algorithms, and they have a wide variety of\
    \ approaches to identifying the clusters in data. In this chapter, we will cover\
    \ a selection of clustering algorithms using scikit-learn and how to use them\
    \ in practice.\n\n### 19.1 Clustering Using K-Means\n\n#### Problem\n\nYou want\
    \ to group observations into *k* groups.\n\n#### Solution\n\nUse *k*-means clustering:\n\
    \n```python\n# Load libraries\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.cluster import KMeans\n\n# Load data\niris\
    \ = datasets.load_iris()\nfeatures = iris.data\n\n# Standardize features\nscaler\
    \ = StandardScaler()\nfeatures_std = scaler.fit_transform(features)\n\n# Create\
    \ k-means object\ncluster = KMeans(n_clusters=3, random_state=0, n_init=\"auto\"\
    )\n\n# Train model\nmodel = cluster.fit(features_std)\n```\n\n#### Discussion\n\
    \nK-means clustering is one of the most common clustering techniques. In k-means\
    \ clustering, the algorithm attempts to group observations into *k* groups, with\
    \ each group having roughly equal variance. The number of groups, *k*, is specified\
    \ by the user as a hyperparameter. Specifically, in k-means:\n\n1. *k* cluster\
    \ “center” points are created at random locations.\n2. For each observation:\n\
    \   a. The distance between each observation and the *k* center points is calculated.\n\
    \   b. The observation is assigned to the cluster of the nearest center point.\n\
    3. The center points are moved to the means (i.e., centers) of their respective\
    \ clusters.\n4. Steps 2 and 3 are repeated until no observation changes in cluster\
    \ membership.\n\nAt this point the algorithm is considered converged and stops.\n\
    \nIt is important to note three things about k-means. First, k-means clustering\
    \ assumes the clusters are convex shaped (e.g., a circle, a sphere). Second, all\
    \ features are equally scaled. In our solution, we standardized the features to\
    \ meet this assumption. Third, the groups are balanced (i.e., have roughly the\
    \ same number of observations). If we suspect that we cannot meet these assumptions,\
    \ we might try other clustering approaches.\n\nIn scikit-learn, k-means clustering\
    \ is implemented in the KMeans class. The most important parameter is n_clusters,\
    \ which sets the number of clusters k. In some situations, the nature of the data\
    \ will determine the value for k (e.g., data on a school's students will have\
    \ one cluster per grade), but often we don't know the number of clusters. In these\
    \ cases, we will want to select k based on using some criteria. For example, silhouette\
    \ coefficients (see Recipe 11.9) measure the similarity within clusters compared\
    \ with the similarity between clusters. Furthermore, because k-means clustering\
    \ is computationally expensive, we might want to take advantage of all the cores\
    \ on our computer. We can do this by setting n_jobs=-1.\n\nIn our solution, we\
    \ cheated a little and used the iris flower data, which we know contains three\
    \ classes. Therefore, we set k = 3. We can use labels_ to see the predicted classes\
    \ of each observation:\n\n```python\n# View predicted class\nmodel.labels_\n\n\

    \ x_1^2, x_1^2, x_2^2$\n\nwhile degree=3 will create new features raised to the\
    \ second and third power:\n\n$x_1, x_2, x_1^2, x_2^2, x_1^3, x_2^3, x_1^2, x_1^3,\
    \ x_2^3$\n\nFurthermore, by default PolynomialFeatures includes interaction features:\n\
    \n$x_1x_2$\n\nWe can restrict the features created to only interaction features\
    \ by setting interaction_only to True:\n\n```\ninteraction = PolynomialFeatures(degree=2,\n\
    \                                interaction_only=True, include_bias=False)\n\n\
    interaction.fit_transform(features)\narray([[ 2.,  3.,  6.],\n       [ 2.,  3.,\
    \  6.],\n       [ 2.,  3.,  6.]])\n```\n\n# Discussion\n\nPolynomial features\
    \ are often created when we want to include the notion that there exists a nonlinear\
    \ relationship between the features and the target. For example, we might suspect\
    \ that the effect of age on the probability of having a major medical"
  - "[PAGE 91]\n\ncondition is not constant over time but increases as age increases.\
    \ We can encode that nonconstant effect in a feature, $x$, by generating that\
    \ feature's higher-order forms ($x^2$, $x^3$, etc.).\n\nAdditionally, often we\
    \ run into situations where the effect of one feature is dependent on another\
    \ feature. A simple example would be if we were trying to predict whether or not\
    \ our coffee was sweet, and we had two features: (1) whether or not the coffee\
    \ was stirred, and (2) whether or not we added sugar. Individually, each feature\
    \ does not predict coffee sweetness, but the combination of their effects does.\
    \ That is, a coffee would only be sweet if the coffee had sugar and was stirred.\
    \ The effects of each feature on the target (sweetness) are dependent on each\
    \ other. We can encode that relationship by including an interaction feature that\
    \ is the product of the individual features.\n\n# 4.5 Transforming Features\n\n\
    # Problem\n\nYou want to make a custom transformation to one or more features.\n\
    \n# Solution\n\nIn scikit-learn, use `FunctionTransformer` to apply a function\
    \ to a set of features:\n\n```\n# Load libraries\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import FunctionTransformer\n\n# Create feature matrix\nfeatures = np.array([[2,\
    \ 3],\n                     [2, 3],\n                     [2, 3]])\n\n# Define\
    \ a simple function\ndef add_ten(x: int) -> int:\n    return x + 10\n\n# Create\
    \ transformer\nten_transformer = FunctionTransformer(add_ten)\n\n# Transform feature\
    \ matrix\nten_transformer.transform(features)\narray([[12, 13],\n       [12, 13],\n\
    \       [12, 13]])\n```\n\nWe can create the same transformation in pandas using\
    \ `apply`:"
  - "[PAGE 92]\n\n```\n# Load library\nimport pandas as pd\n\n# Create DataFrame\n\
    df = pd.DataFrame(features, columns=[\"feature_1\", \"feature_2\"])\n\n# Apply\
    \ function\ndf.apply(add_ten)\n```\n\n| | feature_1 | feature_2 |\n|---|---|---|\n\
    | 0 | 12 | 13 |\n| 1 | 12 | 13 |\n| 2 | 12 | 13 |\n\n# Discussion\n\nIt is common\
    \ to want to make some custom transformations to one or more features. For example,\
    \ we might want to create a feature that is the natural log of the values of a\
    \ different feature. We can do this by creating a function and then mapping it\
    \ to features using either scikit-learn's FunctionTransformer or pandas' apply.\
    \ In the solution we created a very simple function, add_ten, which added 10 to\
    \ each input, but there is no reason we could not define a much more complex function.\n\
    \n# 4.6 Detecting Outliers\n\n# Problem\n\nYou want to identify extreme observations.\n\
    \n# Solution\n\nDetecting outliers is unfortunately more of an art than a science.\
    \ However, a common method is to assume the data is normally distributed and,\
    \ based on that assumption, “draw” an ellipse around the data, classifying any\
    \ observation inside the ellipse as an inlier (labeled as 1) and any observation\
    \ outside the ellipse as an outlier (labeled as -1):\n\n```\n# Load libraries\n\
    import numpy as np\nfrom sklearn.covariance import EllipticEnvelope\nfrom sklearn.datasets\
    \ import make_blobs\n\n# Create simulated data\nfeatures, _ = make_blobs(n_samples\
    \ = 10,\n                         n_features = 2,\n                         centers\
    \ = 1,\n                         random_state = 1)\n```"
  - "[PAGE 93]\n\n```\n# Replace the first observation's values with extreme values\n\
    features[0,0] = 10000\nfeatures[0,1] = 10000\n\n# Create detector\noutlier_detector\
    \ = EllipticEnvelope(contamination=.1)\n\n# Fit detector\noutlier_detector.fit(features)\n\
    \n# Predict outliers\noutlier_detector.predict(features)\n\narray([-1,  1,  1,\
    \  1,  1,  1,  1,  1,  1])\n```\n\nIn these arrays, values of -1 refer to outliers\
    \ whereas values of 1 refer to inliers. A major limitation of this approach is\
    \ the need to specify a contamination parameter, which is the proportion of observations\
    \ that are outliers—a value that we don't know. Think of contamination as our\
    \ estimate of the cleanliness of our data. If we expect our data to have few outliers,\
    \ we can set contamination to something small. However, if we believe that the\
    \ data is likely to have outliers, we can set it to a higher value.\n\nInstead\
    \ of looking at observations as a whole, we can instead look at individual features\
    \ and identify extreme values in those features using interquartile range (IQR):\n\
    \n```\n# Create one feature\nfeature = features[:,0]\n\n# Create a function to\
    \ return index of outliers\ndef indicies_of_outliers(x: int) -> np.array(int):\n\
    \    q1, q3 = np.percentile(x, [25, 75])\n    iqr = q3 - q1\n    lower_bound =\
    \ q1 - (iqr * 1.5)\n    upper_bound = q3 + (iqr * 1.5)\n    return np.where((x\
    \ > upper_bound) | (x < lower_bound))\n\n# Run function\nindicies_of_outliers(feature)\n\
    \n(array([0]),)\n```\n\nIQR is the difference between the first and third quartile\
    \ of a set of data. You can think of IQR as the spread of the bulk of the data,\
    \ with outliers being observations far from the main concentration of data. Outliers\
    \ are commonly defined as any value 1.5 IQRs less than the first quartile, or\
    \ 1.5 IQRs greater than the third quartile."
- md: "## Discussion\n\nThere is no single best technique for detecting outliers.\
    \ Instead, we have a collection of techniques all with their own advantages and\
    \ disadvantages. Our best strategy is often trying multiple techniques (e.g.,\
    \ both EllipticEnvelope and IQR-based detection) and looking at the results as\
    \ a whole.\n\nIf at all possible, we should look at observations we detect as\
    \ outliers and try to understand them. For example, if we have a dataset of houses\
    \ and one feature is number of rooms, is an outlier with 100 rooms really a house\
    \ or is it actually a hotel that has been misclassified?\n\n## See Also\n\n- Three\
    \ Ways to Detect Outliers (and the source of the IQR function used in this recipe)\n\
    \n## 4.7 Handling Outliers\n\n### Problem\n\nYou have outliers in your data that\
    \ you want to identify and then reduce their impact on the data distribution.\n\
    \n### Solution\n\nTypically we can use three strategies to handle outliers. First,\
    \ we can drop them:\n\n```python\n# Load library\nimport pandas as pd\n\n# Create\
    \ DataFrame\nhouses = pd.DataFrame()\nhouses['Price'] = [534433, 392333, 293222,\
    \ 4322032]\nhouses['Bathrooms'] = [2, 3.5, 2, 116]\nhouses['Square_Feet'] = [1500,\
    \ 2500, 1500, 48000]\n\n# Filter observations\nhouses[houses['Bathrooms'] < 20]\n\
    ```\n\n| | Price | Bathrooms | Square_Feet |\n|---|---|---|---|\n| 0 | 534433\
    \ | 2.0 | 1500 |\n| 1 | 392333 | 3.5 | 2500 |\n| 2 | 293222 | 2.0 | 1500 |\n\n\
    Second, we can mark them as outliers and include “Outlier” as a feature:\n\n```python\n\
    # Load library\nimport numpy as np\n\n# Create feature based on boolean condition\n\
    houses[\"Outlier\"] = np.where(houses[\"Bathrooms\"] < 20, 0, 1)\n\n# Show data\n\
    houses\n```\n\n| Price | Bathrooms | Square_Feet | Outlier |\n|---|---|---|---|\n\
    | 534433 | 2.0 | 1500 | 0 |\n| 392333 | 3.5 | 2500 | 0 |\n| 293222 | 2.0 | 1500\
    \ | 0 |\n| 4322032 | 116.0 | 48000 | 1 |\n\nFinally, we can transform the feature\
    \ to dampen the effect of the outlier:\n\n```python\n# Log feature\nhouses[\"\
    Log_Of_Square_Feet\"] = [np.log(x) for x in houses[\"Square_Feet\"]]\n\n# Show\
    \ data\nhouses\n```\n\n| Price | Bathrooms | Square_Feet | Outlier | Log_Of_Square_Feet\
    \ |\n|---|---|---|---|---|\n| 534433 | 2.0 | 1500 | 0 | 7.313220 |\n| 392333 |\
    \ 3.5 | 2500 | 0 | 7.824046 |\n| 293222 | 2.0 | 1500 | 0 | 7.313220 |\n| 4322032\
    \ | 116.0 | 48000 | 1 | 10.778956 |\n\n### Discussion\n\nSimilar to detecting\
    \ outliers, there is no hard-and-fast rule for handling them. How we handle them\
    \ should be based on two aspects. First, we should consider what makes them outliers.\
    \ If we believe they are errors in the data, such as from a broken sensor or a\
    \ miscoded value, then we might drop the observation or replace outlier values\
    \ with NaN since we can’t trust those values. However, if we believe the outliers\
    \ are genuine extreme values (e.g., a house [mansion] with 200 bathrooms), then\
    \ marking them as outliers or transforming their values is more appropriate.\n\
    \nSecond, how we handle outliers should be based on our goal for machine learning.\
    \ For example, if we want to predict house prices based on features of the house,\
    \ we might reasonably assume the price for mansions with over 100 bathrooms is\
    \ driven by a different dynamic than regular family homes. Furthermore, if we\
    \ are training a model to use as part of an online home loan web application,\
    \ we might assume that our potential users will not include billionaires looking\
    \ to buy a mansion.\n\nSo what should we do if we have outliers? Think about why\
    \ they are outliers, have an end goal in mind for the data, and, most importantly,\
    \ remember that not making a decision to address outliers is itself a decision\
    \ with implications.\n\nOne additional point: if you do have outliers, standardization\
    \ might not be appropriate because the mean and variance might be highly influenced\
    \ by the outliers. In this case, use a rescaling method more robust against outliers,\
    \ like RobustScaler.\n\n## See Also\n\n- RobustScaler documentation\n\n## 4.8\
    \ Discretizing Features\n\n### Problem\n\nYou have a numerical feature and want\
    \ to break it up into discrete bins.\n\n### Solution\n\nDepending on how we want\
    \ to break up the data, there are two techniques we can use. First, we can binarize\
    \ the feature according to some threshold:\n\n```python\n# Load libraries\nimport\
    \ numpy as np\nfrom sklearn.preprocessing import Binarizer\n\n# Create feature\n\
    age = np.array([[6],\n                [12],\n                [20],\n         \
    \       [36],\n                [65]])\n\n# Create binarizer\nbinarizer = Binarizer(threshold=18)\n\
    \n# Transform feature\nbinarizer.fit_transform(age)\n\narray([[0],\n       [0],\n\
    \       [1],\n       [1],\n       [1]])\n```\n\nSecond, we can break up numerical\
    \ features according to multiple thresholds:\n\n```python\n# Bin feature\nnp.digitize(age,\
    \ bins=[20,30,64])\n\narray([[0],\n       [0],\n       [1],\n       [2],\n   \
    \    [3]])\n```\n\nNote that the arguments for the `bins` parameter denote the\
    \ left edge of each bin. For example, the 20 argument does not include the element\
    \ with the value of 20, only the two values smaller than 20. We can switch this\
    \ behavior by setting the parameter `right` to `True`:\n\n```python\n# Bin feature\n\
    np.digitize(age, bins=[20,30,64], right=True)\n\narray([[0],\n       [0],\n  \
    \     [0],\n       [2],\n       [3]])\n```\n\n### Discussion\n\nDiscretization\
    \ can be a fruitful strategy when we have reason to believe that a numerical feature\
    \ should behave more like a categorical feature. For example, we might believe\
    \ there is very little difference in the spending habits of 19- and 20-year-olds,\
    \ but a significant difference between 20- and 21-year-olds (the age in the United\
    \ States when young adults can consume alcohol). In that example, it could be\
    \ useful to break up individuals in our data into those who can drink alcohol\
    \ and those who cannot. Similarly, in other cases it might be useful to discretize\
    \ our data into three or more bins.\n\nIn the solution, we saw two methods of\
    \ discretization—scikit-learn's `Binarizer` for two bins and NumPy's `digitize`\
    \ for three or more bins—however, we can also use `digitize` to binarize features\
    \ like `Binarizer` by specifying only a single threshold:\n\n```python\n# Bin\
    \ feature\nnp.digitize(age, bins=[18])\n\narray([[0],\n       [0],\n       [1],\n\
    \       [1],\n       [1]])\n```\n\n## See Also\n\n- digitize documentation\n\n\
    ## 4.9 Grouping Observations Using Clustering\n\n### Problem\n\nYou want to cluster\
    \ observations so that similar observations are grouped together.\n\n### Solution\n\
    \nIf you know that you have $k$ groups, you can use k-means clustering to group\
    \ similar observations and output a new feature containing each observation's\
    \ group membership:\n\n```python\n# Load libraries\nimport pandas as pd\nfrom\
    \ sklearn.datasets import make_blobs\nfrom sklearn.cluster import KMeans\n\n#\
    \ Make simulated feature matrix\nfeatures, _ = make_blobs(n_samples = 50,\n  \
    \                       n_features = 2,\n                         centers = 3,\n\
    \                         random_state = 1)\n\n# Create DataFrame\ndataframe =\
    \ pd.DataFrame(features, columns=[\"feature_1\", \"feature_2\"])\n\n# Make k-means\
    \ clusterer\nclusterer = KMeans(3, random_state=0)\n\n# Fit clusterer\nclusterer.fit(features)\n\
    \n# Predict values\ndataframe[\"group\"] = clusterer.predict(features)\n\n# View\
    \ first few observations\ndataframe.head(5)\n```\n\n| | feature_1 | feature_2\
    \ | group |\n|---|---|---|---|\n| 0 | -9.877554 | -3.336145 | 0 |\n| 1 | -7.287210\
    \ | -8.353986 | 2 |\n| 2 | -6.943061 | -7.023744 | 2 |\n| 3 | -7.440167 | -8.791959\
    \ | 2 |\n| 4 | -6.641388 | -8.075888 | 2 |\n\n### Discussion\n\nWe are jumping\
    \ ahead of ourselves a bit and will go into much more depth about clustering algorithms\
    \ later in the book. However, I wanted to point out that we can use clustering\
    \ as a preprocessing step. Specifically, we use unsupervised learning algorithms\
    \ like k-means to cluster observations into groups. The result is a categorical\
    \ feature with similar observations being members of the same group.\n\nDon't\
    \ worry if you did not understand all of that: just file away the idea that clustering\
    \ can be used in preprocessing. And if you really can't wait, feel free to flip\
    \ to Chapter 19 now.\n\n## 4.10 Deleting Observations with Missing Values\n\n\
    ### Problem\n\nYou need to delete observations containing missing values.\n\n\
    ### Solution\n\nDeleting observations with missing values is easy with a clever\
    \ line of NumPy:\n\n```python\n# Load library\nimport numpy as np\n\n# Create\
    \ feature matrix\nfeatures = np.array([[1.1, 11.1],\n                     [2.2,\
    \ 22.2],\n                     [3.3, 33.3],\n                     [4.4, 44.4],\n\
    \                     [np.nan, 55]])\n\n# Keep only observations that are not\
    \ (denoted by ~) missing\nfeatures[~np.isnan(features).any(axis=1)]\n```\n\n```\n\
    array([[ 1.1, 11.1],\n       [ 2.2, 22.2],\n       [ 3.3, 33.3],\n       [ 4.4,\
    \ 44.4]])\n```\n\nAlternatively, we can drop missing observations using pandas:\n\
    \n```python\n# Load library\nimport pandas as pd\n\n# Load data\ndataframe = pd.DataFrame(features,\
    \ columns=[\"feature_1\", \"feature_2\"])\n\n# Remove observations with missing\
    \ values\ndataframe.dropna()\n```"
  mdcn: "## 讨论\n\n检测异常值没有单一的最佳技术。相反，我们有一系列技术，每种都有其自身的优缺点。我们最好的策略通常是尝试多种技术（例如，同时使用椭圆包络和基于IQR的检测），并整体查看结果。\n\
    \n如果可能，我们应该查看被检测为异常值的观测值，并尝试理解它们。例如，如果我们有一个房屋数据集，其中一个特征是房间数，那么一个有100个房间的异常值真的是房子吗，还是实际上是一个被错误分类的酒店？\n\
    \n## 另请参阅\n\n- 检测异常值的三种方法（以及本配方中使用的IQR函数的来源）\n\n## 4.7 处理异常值\n\n### 问题\n\n你的数据中存在异常值，你希望识别它们，然后减少它们对数据分布的影响。\n\
    \n### 解决方案\n\n通常，我们可以使用三种策略来处理异常值。首先，我们可以删除它们：\n\n```python\n# Load library\n\
    import pandas as pd\n\n# Create DataFrame\nhouses = pd.DataFrame()\nhouses['Price']\
    \ = [534433, 392333, 293222, 4322032]\nhouses['Bathrooms'] = [2, 3.5, 2, 116]\n\
    houses['Square_Feet'] = [1500, 2500, 1500, 48000]\n\n# Filter observations\nhouses[houses['Bathrooms']\
    \ < 20]\n```\n\n| | Price | Bathrooms | Square_Feet |\n|---|---|---|---|\n| 0\
    \ | 534433 | 2.0 | 1500 |\n| 1 | 392333 | 3.5 | 2500 |\n| 2 | 293222 | 2.0 | 1500\
    \ |\n\n其次，我们可以将它们标记为异常值，并将“异常值”作为一个特征包含进来：\n\n```python\n# Load library\nimport\
    \ numpy as np\n\n# Create feature based on boolean condition\nhouses[\"Outlier\"\
    ] = np.where(houses[\"Bathrooms\"] < 20, 0, 1)\n\n# Show data\nhouses\n```\n\n\
    | Price | Bathrooms | Square_Feet | Outlier |\n|---|---|---|---|\n| 534433 | 2.0\
    \ | 1500 | 0 |\n| 392333 | 3.5 | 2500 | 0 |\n| 293222 | 2.0 | 1500 | 0 |\n| 4322032\
    \ | 116.0 | 48000 | 1 |\n\n最后，我们可以转换特征以减弱异常值的影响：\n\n```python\n# Log feature\n\
    houses[\"Log_Of_Square_Feet\"] = [np.log(x) for x in houses[\"Square_Feet\"]]\n\
    \n# Show data\nhouses\n```\n\n| Price | Bathrooms | Square_Feet | Outlier | Log_Of_Square_Feet\
    \ |\n|---|---|---|---|---|\n| 534433 | 2.0 | 1500 | 0 | 7.313220 |\n| 392333 |\
    \ 3.5 | 2500 | 0 | 7.824046 |\n| 293222 | 2.0 | 1500 | 0 | 7.313220 |\n| 4322032\
    \ | 116.0 | 48000 | 1 | 10.778956 |\n\n### 讨论\n\n与检测异常值类似，处理异常值没有一成不变的规则。我们如何处理它们应基于两个方面。首先，我们应该考虑是什么使它们成为异常值。如果我们认为它们是数据中的错误，例如来自损坏的传感器或编码错误的值，那么我们可能会删除该观测值或将异常值替换为NaN，因为我们无法信任这些值。然而，如果我们认为异常值是真实的极端值（例如，一个有200个浴室的房子[豪宅]），那么将它们标记为异常值或转换它们的值更为合适。\n\
    \n其次，我们如何处理异常值应基于我们机器学习的目标。例如，如果我们想根据房屋的特征预测房价，我们可能会合理地假设，拥有超过100个浴室的豪宅的价格是由与普通家庭住宅不同的动态驱动的。此外，如果我们正在训练一个模型，将其用作在线房屋贷款网络应用程序的一部分，我们可能会假设我们的潜在用户不包括想要购买豪宅的亿万富翁。\n\
    \n那么，如果我们有异常值该怎么办？思考它们为什么是异常值，心中对数据有一个最终目标，最重要的是，记住不采取行动处理异常值本身就是一个具有影响的决定。\n\n\
    另外一点：如果你确实有异常值，标准化可能不合适，因为均值和方差可能受异常值影响很大。在这种情况下，使用对异常值更稳健的重新缩放方法，例如RobustScaler。\n\
    \n## 另请参阅\n\n- RobustScaler 文档\n\n## 4.8 离散化特征\n\n### 问题\n\n你有一个数值特征，希望将其分解为离散的区间。\n\
    \n### 解决方案\n\n根据我们希望如何分解数据，有两种技术可以使用。首先，我们可以根据某个阈值对特征进行二值化：\n\n```python\n# Load\
    \ libraries\nimport numpy as np\nfrom sklearn.preprocessing import Binarizer\n\
    \n# Create feature\nage = np.array([[6],\n                [12],\n            \
    \    [20],\n                [36],\n                [65]])\n\n# Create binarizer\n\
    binarizer = Binarizer(threshold=18)\n\n# Transform feature\nbinarizer.fit_transform(age)\n\
    \narray([[0],\n       [0],\n       [1],\n       [1],\n       [1]])\n```\n\n其次，我们可以根据多个阈值分解数值特征：\n\
    \n```python\n# Bin feature\nnp.digitize(age, bins=[20,30,64])\n\narray([[0],\n\
    \       [0],\n       [1],\n       [2],\n       [3]])\n```\n\n请注意，`bins` 参数的参数表示每个区间的左边界。例如，20\
    \ 参数不包括值为20的元素，只包括两个小于20的值。我们可以通过将参数 `right` 设置为 `True` 来切换此行为：\n\n```python\n\
    # Bin feature\nnp.digitize(age, bins=[20,30,64], right=True)\n\narray([[0],\n\
    \       [0],\n       [0],\n       [2],\n       [3]])\n```\n\n### 讨论\n\n当我们有理由相信一个数值特征的行为应该更像一个分类特征时，离散化可能是一个富有成效的策略。例如，我们可能认为19岁和20岁的人在消费习惯上差异很小，但20岁和21岁之间存在显著差异（在美国，21岁是年轻人可以合法饮酒的年龄）。在那个例子中，将我们数据中的个体分为可以饮酒和不能饮酒的人可能是有用的。同样，在其他情况下，将我们的数据离散化为三个或更多区间可能是有用的。\n\
    \n在解决方案中，我们看到了两种离散化方法——scikit-learn的 `Binarizer` 用于两个区间，NumPy的 `digitize` 用于三个或更多区间——然而，我们也可以通过仅指定一个阈值，使用\
    \ `digitize` 来像 `Binarizer` 一样对特征进行二值化：\n\n```python\n# Bin feature\nnp.digitize(age,\
    \ bins=[18])\n\narray([[0],\n       [0],\n       [1],\n       [1],\n       [1]])\n\
    ```\n\n## 另请参阅\n\n- digitize 文档\n\n## 4.9 使用聚类对观测值进行分组\n\n### 问题\n\n你希望对观测值进行聚类，以便相似的观测值被分组在一起。\n\
    \n### 解决方案\n\n如果你知道你有 $k$ 组，你可以使用k-means聚类来对相似的观测值进行分组，并输出一个包含每个观测值组成员身份的新特征：\n\

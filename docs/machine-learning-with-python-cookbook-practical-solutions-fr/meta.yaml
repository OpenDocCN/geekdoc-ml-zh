    # Discussion


    scikit-learn''s LogisticRegression offers a number of techniques for training
    a logistic regression, called solvers. Most of the time scikit-learn will select
    the best solver automatically for us or warn us that we cannot do something with
    that solver. However, there is one particular case we should be aware of.


    While an exact explanation is beyond the bounds of this book (for more information
    see Mark Schmidt''s slides in the "See Also" section of this recipe), stochastic
    average gradient descent allows us to train a model much faster than other solvers
    when our data is very large. However, it is also very sensitive to feature scaling,
    so standardizing our features is particularly important. We can set our learning
    algorithm to use this solver by setting solver="sag".


    # See Also


    +   - Minimizing Finite Sums with the Stochastic Average Gradient Algorithm, Mark
    Schmidt



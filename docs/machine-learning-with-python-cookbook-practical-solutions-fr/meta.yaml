    \ max_iter=500,\n    penalty='l1', solver='liblinear'))])\n```\n\n### 讨论\n\n在前两个配方中，我们通过搜索学习算法可能的超参数值来找到最佳模型。但是，如果我们不确定使用哪种学习算法怎么办？scikit-learn\
    \ 允许我们将学习算法作为搜索空间的一部分。在我们的解决方案中，我们定义了一个包含两种学习算法的搜索空间：逻辑回归和随机森林分类器。每个学习算法都有自己的超参数，我们使用\
    \ `classifier__[超参数名]` 的格式定义它们的候选值。例如，对于我们的逻辑回归，为了定义正则化超参数空间 `C` 的可能值集合以及潜在的正则化惩罚类型\
    \ `penalty`，我们创建一个字典：\n\n```python\n{'classifier': [LogisticRegression(max_iter=500,\

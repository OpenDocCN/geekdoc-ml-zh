    ```


    # Discussion


    The most common type of naive Bayes classifier is the *Gaussian naive Bayes*.
    In Gaussian naive Bayes, we assume that the likelihood of the feature values $x$,
    given an observation is of class $y$, follows a normal distribution:


    $$p(x_j \mid y) = \frac{1}{\sqrt{2\pi\sigma_{y}^2}} e^{-\frac{(x_j - \mu_y)^2}{2\sigma_{y}^2}}$$


    where $\sigma_{y}^2$ and $\mu_y$ are the variance and mean values of feature $x_j$
    for class $y$. Because of the assumption of the normal distribution, Gaussian
    naive Bayes is best used in cases where all our features are continuous.


    In scikit-learn, we train a Gaussian naive Bayes like any other model using `fit`,
    and in turn can then make predictions about the class of an observation:


    ```

    # Create new observation

    new_observation = [[ 4,  4,  4,  0.4]]


    # Predict class

    model.predict(new_observation)


    array([1])

    ```


    One of the interesting aspects of naive Bayes classifiers is that they allow us
    to assign a prior belief over the respected target classes. We can do this using
    the `GaussianNB` `priors` parameter, which takes in a list of the probabilities
    assigned to each class of the target vector:


    ```

    # Create Gaussian naive Bayes object with prior probabilities of each class

    clf = GaussianNB(priors=[0.25, 0.25, 0.5])


    # Train model

    model = classifer.fit(features, target)

    ```


    If we do not add any argument to the `priors` parameter, the prior is adjusted
    based on the data.'

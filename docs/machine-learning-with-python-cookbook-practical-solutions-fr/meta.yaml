    \ Though this server is not production-ready (see the Flask warning about using\
    \ a development server), we can easily extend and serve this code with a more\
    \ production-ready web framework to move it to production.\n\n# 23.5 Serving TensorFlow\
    \ Models\n\n# Problem\n\nYou want to serve your trained TensorFlow model using\
    \ a web server.\n\n# Solution\n\nUse the open source TensorFlow Serving framework\
    \ and Docker:\n\n```\ndocker run -p 8501:8501 -p 8500:8500 \\n    --mount type=bind,source=$(pwd)/saved_model,target=/models/saved_model/1\
    \ \\n    -e MODEL_NAME=saved_model -t tensorflow/serving\n```\n\n# Discussion\n\
    \nTensorFlow Serving is an open source serving solution optimized for TensorFlow\
    \ models. By simply providing the model path, we get an HTTP and gRPC server out\
    \ of the box with additional useful features for developers.\n\nThe docker run\
    \ command runs a container using the public tensorflow/serving image and mounts\
    \ the saved_model path of our current working directory ($(pwd)/saved_model) to\
    \ /models/saved_model/1 inside our container. This automatically loads the model\
    \ we saved earlier in this chapter into a running Docker container we can send\
    \ prediction queries to.\n\nIf you go to http://localhost:8501/v1/models/saved_model\
    \ in your web browser, you should see the JSON result shown here:\n\n```\n{\n\
    \    \"model_version_status\": [\n        {\n            \"version\": \"1\",\n\
    \            \"state\": \"AVAILABLE\",\n        }\n    ]\n}\n```"

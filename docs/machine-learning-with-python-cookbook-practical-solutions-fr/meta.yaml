    \nThis is likely the most advanced recipe in this book up to this point, combining\
    \ a number of topics we have yet to address in detail. However, the intuition\
    \ is straightforward enough that we can address it here rather than holding off\
    \ until a later chapter. The idea behind RFE is to train a model repeatedly, updating\
    \ the *weights* or *coefficients* of that model each time. The first time we train\
    \ the model, we include all the features. Then, we find the feature with the smallest\
    \ parameter (notice that this assumes the features are either rescaled or standardized),\
    \ meaning it is less important, and remove that feature from the feature set.\n\
    \nThe obvious question then is: how many features should we keep? We can (hypothetically)\
    \ repeat this loop until we only have one feature left. A better approach requires\
    \ that we include a new concept called *cross-validation*. We will discuss CV\
    \ in detail in the next chapter, but here is the general idea.\n\nGiven data containing\
    \ (1) a target we want to predict, and (2) a feature matrix, first we split the\
    \ data into two groups: a training set and a test set. Second, we train our model\
    \ using the training set. Third, we pretend that we do not know the target of\
    \ the test set and apply our model to its features to predict the values of the\
    \ test set. Finally, we compare our predicted target values with the true target\
    \ values to evaluate our model.\n\nWe can use CV to find the optimum number of\
    \ features to keep during RFE. Specifically, in RFE with CV, after every iteration\
    \ we use cross-validation to evaluate our model. If CV shows that our model improved\
    \ after we eliminated a feature, then we continue on to the next loop. However,\
    \ if CV shows that our model got worse after we eliminated a feature, we put that\
    \ feature back into the feature set and select those features as the best.\n\n\
    In scikit-learn, RFE with CV is implemented using RFECV, which contains a number\
    \ of important parameters. The *estimator* parameter determines the type of model\
    \ we want to train (e.g., linear regression), the *step* parameter sets the number\
    \ or proportion of features to drop during each loop, and the *scoring* parameter\
    \ sets the metric of quality we use to evaluate our model during cross-validation.\n\
    \n### See Also\n\n- scikit-learn documentation: Recursive feature elimination\
    \ with cross-validation\n\n## CHAPTER 11\nModel Evaluation\n\n### 11.0 Introduction\n\
    \nIn this chapter we will examine strategies for evaluating the quality of models\
    \ created through our learning algorithms. It might appear strange to discuss\
    \ model evaluation before discussing how to create them, but there is a method\
    \ to our madness. Models are only as useful as the quality of their predictions,\
    \ and thus, fundamentally, our goal is not to create models (which is easy) but\
    \ to create high-quality models (which is hard). Therefore, before we explore\
    \ the myriad learning algorithms, let's first learn how we can evaluate the models\
    \ they produce.\n\n### 11.1 Cross-Validating Models\n\n#### Problem\n\nYou want\
    \ to evaluate how well your classification model generalizes to unforeseen data.\n\
    \n#### Solution\n\nCreate a pipeline that preprocesses the data, trains the model,\
    \ and then evaluates it using cross-validation:\n\n```python\n# Load libraries\n\
    from sklearn import datasets\nfrom sklearn import metrics\nfrom sklearn.model_selection\
    \ import KFold, cross_val_score\nfrom sklearn.pipeline import make_pipeline\n\
    from sklearn.linear_model import LogisticRegression\nfrom sklearn.preprocessing\
    \ import StandardScaler\n```\n\n```python\n# Load digits dataset\ndigits = datasets.load_digits()\n\
    \n# Create features matrix\nfeatures = digits.data\n\n# Create target vector\n\
    target = digits.target\n\n# Create standardizer\nstandardizer = StandardScaler()\n\
    \n# Create logistic regression object\nlogit = LogisticRegression()\n\n# Create\
    \ a pipeline that standardizes, then runs logistic regression\npipeline = make_pipeline(standardizer,\
    \ logit)\n\n# Create k-fold cross-validation\nkf = KFold(n_splits=5, shuffle=True,\
    \ random_state=0)\n\n# Conduct k-fold cross-validation\ncv_results = cross_val_score(pipeline,\
    \ # Pipeline\n                             features, # Feature matrix\n      \
    \                       target, # Target vector\n                            \
    \ cv=kf, # Performance metric\n                             scoring=\"accuracy\"\
    , # Loss function\n                             n_jobs=-1) # Use all CPU cores\n\
    \n# Calculate mean\ncv_results.mean()\n\n0.969958217270195\n```\n\n#### Discussion\n\
    \nAt first consideration, evaluating supervised-learning models might appear straightforward:\
    \ train a model and then calculate how well it did using some performance metric\
    \ (accuracy, squared errors, etc.). However, this approach is fundamentally flawed.\

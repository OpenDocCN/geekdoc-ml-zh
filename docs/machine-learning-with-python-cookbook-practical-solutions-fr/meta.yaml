    \n# 加载数据\ndataframe = pd.read_csv(url)\n\n# 打印前两个名字的大写形式\nfor name in dataframe['Name'][0:2]:\n\
    \    print(name.upper())\n\nALLEN, MISS ELISABETH WALTON\nALLISON, MISS HELEN\
    \ LORAINE\n```\n\n### 讨论\n\n除了循环（通常称为 for 循环），我们还可以使用列表推导式：\n\n```python\n# 显示前两个名字的大写形式\n\
    [name.upper() for name in dataframe['Name'][0:2]]\n['ALLEN, MISS ELISABETH WALTON',\
    \ 'ALLISON, MISS HELEN LORAINE']\n```\n\n尽管使用 for 循环很诱人，但更 Pythonic 的解决方案是使用 pandas\
    \ 的 apply 方法，这将在配方 3.18 中描述。\n\n## 3.18 对列中所有元素应用函数\n\n### 问题\n\n你想要对列中的所有元素应用某个函数。\n\
    \n### 解决方案\n\n使用 apply 对列中的每个元素应用内置或自定义函数：\n\n```python\n# 加载库\nimport pandas\
    \ as pd\n\n# 创建 URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# 加载数据\ndataframe = pd.read_csv(url)\n\n# 创建函数\ndef uppercase(x):\n    return\
    \ x.upper()\n\n# 应用函数，显示两行\ndataframe['Name'].apply(uppercase)[0:2]\n0    ALLEN,\
    \ MISS ELISABETH WALTON\n1    ALLISON, MISS HELEN LORAINE\nName: Name, dtype:\
    \ object\n```\n\n### 讨论\n\napply 是进行数据清洗和整理的好方法。通常会编写一个函数来执行某些有用的操作（如分离姓和名、将字符串转换为浮点数等），然后将该函数映射到列中的每个元素。\n\
    \n## 3.19 对分组应用函数\n\n### 问题\n\n你已经使用 groupby 对行进行了分组，并想要对每个分组应用一个函数。\n\n### 解决方案\n\
    \n结合使用 groupby 和 apply：\n\n```python\n# 加载库\nimport pandas as pd\n\n# 创建 URL\n\
    url = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# 加载数据\ndataframe = pd.read_csv(url)\n\n# 对行进行分组，对分组应用函数\ndataframe.groupby('Sex').apply(lambda\
    \ x: x.count())\n```\n\n| Sex | Name | PClass | Age | Sex | Survived | SexCode\
    \ |\n|---|---|---|---|---|---|---|\n| female | 462 | 462 | 288 | 462 | 462 | 462\
    \ |\n| male | 851 | 851 | 468 | 851 | 851 | 851 |\n\n### 讨论\n\n在配方 3.18 中我提到了\
    \ apply。当你想要对分组应用函数时，apply 特别有用。通过结合使用 groupby 和 apply，我们可以计算自定义统计量或对每个分组分别应用任何函数。\n\
    \n## 3.20 连接 DataFrame\n\n### 问题\n\n你想要连接两个 DataFrame。\n\n### 解决方案\n\n使用 `concat`\
    \ 并设置 `axis=0` 沿行轴进行连接：\n\n```python\n# 加载库\nimport pandas as pd\n\n# 创建 DataFrame\n\
    data_a = {'id': ['1', '2', '3'],\n          'first': ['Alex', 'Amy', 'Allen'],\n\
    \          'last': ['Anderson', 'Ackerman', 'Ali']}\ndataframe_a = pd.DataFrame(data_a,\
    \ columns = ['id', 'first', 'last'])\n\n# 创建 DataFrame\ndata_b = {'id': ['4',\
    \ '5', '6'],\n          'first': ['Billy', 'Brian', 'Bran'],\n          'last':\
    \ ['Bonder', 'Black', 'Balwner']}\ndataframe_b = pd.DataFrame(data_b, columns\
    \ = ['id', 'first', 'last'])\n\n# 按行连接 DataFrame\npd.concat([dataframe_a, dataframe_b],\
    \ axis=0)\n```\n\n| id | first | last |\n|---|---|---|\n| 0 | 1 | Alex | Anderson\
    \ |\n| 1 | 2 | Amy | Ackerman |\n| 2 | 3 | Allen | Ali |\n| 0 | 4 | Billy | Bonder\
    \ |\n| 1 | 5 | Brian | Black |\n| 2 | 6 | Bran | Balwner |\n\n你可以使用 `axis=1` 沿列轴进行连接：\n\
    \n```python\n# 按列连接 DataFrame\npd.concat([dataframe_a, dataframe_b], axis=1)\n\
    ```\n\n| id | first | last | id | first | last |\n|---|---|---|---|---|---|\n\
    | 0 | 1 | Alex | Anderson | 4 | Billy | Bonder |\n| 1 | 2 | Amy | Ackerman | 5\
    \ | Brian | Black |\n| 2 | 3 | Allen | Ali | 6 | Bran | Balwner |\n\n### 讨论\n\n\
    “连接”这个词在计算机科学和编程之外并不常见，所以如果你以前没听过，不用担心。*连接*的非正式定义是将两个对象粘合在一起。在解决方案中，我们使用 `axis`\
    \ 参数将两个小 DataFrame 粘合在一起，该参数指示我们是想将两个 DataFrame 堆叠在一起还是并排放置。\n\n## 3.21 合并 DataFrame\n\
    \n### 问题\n\n你想要合并两个 DataFrame。\n\n### 解决方案\n\n要进行内连接，使用 `merge` 并通过 `on` 参数指定要合并的列：\n\
    \n```python\n# 加载库\nimport pandas as pd\n\n# 创建 DataFrame\nemployee_data = {'employee_id':\
    \ ['1', '2', '3', '4'],\n                 'name': ['Amy Jones', 'Allen Keys',\
    \ 'Alice Bees',\n                          'Tim Horton']}\ndataframe_employees\
    \ = pd.DataFrame(employee_data, columns = ['employee_id',\n                  \
    \                                            'name'])\n\n# 创建 DataFrame\nsales_data\
    \ = {'employee_id': ['3', '4', '5', '6'],\n              'total_sales': [23456,\
    \ 2512, 2345, 1455]}\ndataframe_sales = pd.DataFrame(sales_data, columns = ['employee_id',\n\
    \                                                      'total_sales'])\n\n# 合并\
    \ DataFrame\npd.merge(dataframe_employees, dataframe_sales, on='employee_id')\n\
    ```\n\n| employee_id | name | total_sales |\n|---|---|---|\n| 0 | 3 | Alice Bees\
    \ | 23456 |\n| 1 | 4 | Tim Horton | 2512 |\n\n`merge` 默认进行内连接。如果我们想进行外连接，可以通过\
    \ `how` 参数指定：\n\n```python\n# 合并 DataFrame\npd.merge(dataframe_employees, dataframe_sales,\
    \ on='employee_id', how='outer')\n```\n\n| employee_id | name | total_sales |\n\
    |---|---|---|\n| 0 | 1 | Amy Jones | NaN |\n| 1 | 2 | Allen Keys | NaN |\n| 2\
    \ | 3 | Alice Bees | 23456.0 |\n| 3 | 4 | Tim Horton | 2512.0 |\n| 4 | 5 | NaN\
    \ | 2345.0 |\n| 5 | 6 | NaN | 1455.0 |\n\n同样的参数也可以用于指定左连接和右连接：\n\n```python\n\
    # 合并 DataFrame\npd.merge(dataframe_employees, dataframe_sales, on='employee_id',\
    \ how='left')\n```\n\n| employee_id | name | total_sales |\n|---|---|---|\n| 0\
    \ | 1 | Amy Jones | NaN |\n| 1 | 2 | Allen Keys | NaN |\n| 2 | 3 | Alice Bees\
    \ | 23456.0 |\n| 3 | 4 | Tim Horton | 2512.0 |\n\n我们也可以指定每个 DataFrame 中要合并的列名：\n\
    \n```python\n# 合并 DataFrame\npd.merge(dataframe_employees,\n         dataframe_sales,\n\
    \         left_on='employee_id',\n         right_on='employee_id')\n```\n\n| employee_id\
    \ | name | total_sales |\n|---|---|---|\n| 0 | 3 | Alice Bees | 23456 |\n| 1 |\
    \ 4 | Tim Horton | 2512 |\n\n如果我们不想合并两个列，而是想基于每个 DataFrame 的索引进行合并，可以将 `left_on`\
    \ 和 `right_on` 参数替换为 `left_index=True` 和 `right_index=True`。"

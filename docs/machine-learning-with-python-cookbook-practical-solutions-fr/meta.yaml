    # Discussion\n\nIn Recipe 12.1, we used GridSearchCV on a user-defined set of\
    \ hyperparameter values to search for the best model according to a score function.\
    \ A more efficient method than GridSearchCV's brute-force search is to search\
    \ over a specific number of random combinations of hyperparameter values from\
    \ user-supplied distributions (e.g., normal, uniform). scikit-learn implements\
    \ this randomized search technique with RandomizedSearchCV.\n\nWith RandomizedSearchCV,\
    \ if we specify a distribution, scikit-learn will randomly sample without replacement\
    \ hyperparameter values from that distribution. As an example of the general concept,\
    \ here we randomly sample 10 values from a uniform distribution ranging from 0\
    \ to 4:\n\n```\n# Define a uniform distribution between 0 and 4, sample 10 values\n\
    uniform(loc=0, scale=4).rvs(10)\n\narray([3.95211699, 0.30693116, 2.88237794,\
    \ 3.00392864, 0.43964702,\n       1.46670526, 0.27841863, 2.56541664, 2.66475584,\
    \ 0.79611958])\n```\n\nAlternatively, if we specify a list of values, such as\
    \ two regularization penalty hyperparameter values ['l1', 'l2'], RandomizedSearchCV\
    \ will randomly sample with replacement from the list.\n\nJust like with GridSearchCV,\
    \ we can see the hyperparameter values of the best model:\n\n```\n# View best\
    \ hyperparameters\nprint('Best Penalty:', best_model.best_estimator_.get_params()['penalty'])\n\
    print('Best C:', best_model.best_estimator_.get_params()['C'])\n\nBest Penalty:\
    \ l1\nBest C: 1.668088018810296\n```\n\nAnd just like with GridSearchCV, after\
    \ the search is complete RandomizedSearchCV fits a new model using the best hyperparameters\

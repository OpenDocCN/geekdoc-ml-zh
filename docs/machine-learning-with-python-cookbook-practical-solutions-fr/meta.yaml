  md: "training. In general, finding the model and associated hyperparameters that\
    \ yield the best performance is the result of experimentation—trying a bunch of\
    \ things out and seeing what works best.\n\n# 12.1 Selecting the Best Models Using\
    \ Exhaustive Search\n\n# Problem\n\nYou want to select the best model by searching\
    \ over a range of hyperparameters.\n\n# Solution\n\nUse scikit-learn's GridSearchCV:\n\
    \n```\n# Load libraries\nimport numpy as np\nfrom sklearn import linear_model,\
    \ datasets\nfrom sklearn.model_selection import GridSearchCV\n\n# Load data\n\
    iris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\n# Create\
    \ logistic regression\nlogistic = linear_model.LogisticRegression(max_iter=500,\
    \ solver='liblinear')\n\n# Create range of candidate penalty hyperparameter values\n\
    penalty = ['l1','l2']\n\n# Create range of candidate regularization hyperparameter\
    \ values\nC = np.logspace(0, 4, 10)\n\n# Create dictionary of hyperparameter candidates\n\
    hyperparameters = dict(C=C, penalty=penalty)\n\n# Create grid search\ngridsearch\
    \ = GridSearchCV(logistic, hyperparameters, cv=5, verbose=0)\n\n# Fit grid search\n\
    best_model = gridsearch.fit(features, target)\n\n# Show the best model\nprint(best_model.best_estimator_)\n\
    \nLogisticRegression(C=7.742636826811269, max_iter=500, penalty='l1',\n      \
    \             solver='liblinear')\n```"

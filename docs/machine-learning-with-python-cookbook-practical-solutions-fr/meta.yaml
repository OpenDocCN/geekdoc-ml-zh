    \n### 讨论\n\n由于 OpenCV 将图像表示为元素矩阵，通过选择我们想要保留的行和列，我们可以轻松地裁剪图像。如果我们知道只想保留每张图像的某个部分，裁剪会特别有用。例如，如果我们的图像来自固定的安防摄像头，我们可以裁剪所有图像，使它们只包含感兴趣的区域。\n\
    \n### 另请参阅\n\n- [切片 NumPy 数组](Slicing NumPy Arrays)\n\n## 8.5 模糊图像\n\n### 问题\n\
    \n你想平滑一张图像。\n\n### 解决方案\n\n要模糊图像，每个像素都被转换为其邻域像素的平均值。这个邻域和执行的操作在数学上表示为一个核（如果你不知道核是什么，请不要担心）。这个核的大小决定了模糊的程度，较大的核会产生更平滑的图像。这里我们通过平均每个像素周围\
    \ 5 × 5 核的值来模糊图像：\n\n```python\n# 加载库\nimport cv2\nimport numpy as np\nfrom matplotlib\
    \ import pyplot as plt\n\n# 以灰度模式加载图像\nimage = cv2.imread(\"images/plane_256x256.jpg\"\
    , cv2.IMREAD_GRAYSCALE)\n\n# 模糊图像\nimage_blurry = cv2.blur(image, (5,5))\n\n#\
    \ 显示图像\nplt.imshow(image_blurry, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_154_0.png)\n\n为了突出核大小的影响，这里使用\
    \ 100 × 100 的核进行相同的模糊处理：\n\n```python\n# 模糊图像\nimage_very_blurry = cv2.blur(image,\
    \ (100,100))\n\n# 显示图像\nplt.imshow(image_very_blurry, cmap=\"gray\"), plt.xticks([]),\
    \ plt.yticks([])\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_0.png)\n\
    \n### 讨论\n\n核在图像处理中被广泛使用，用于从锐化到边缘检测等各种操作，并且在本章中会反复出现。我们使用的模糊核看起来像这样：\n\n```python\n\
    # 创建核\nkernel = np.ones((5,5)) / 25.0\n\n# 显示核\nkernel\n\narray([[ 0.04,  0.04,\
    \  0.04,  0.04,  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n       [\
    \ 0.04,  0.04,  0.04,  0.04,  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n\
    \       [ 0.04,  0.04,  0.04,  0.04,  0.04]])\n```\n\n核中的中心元素是正在被检查的像素，而其余元素是其邻域像素。由于所有元素具有相同的值（归一化后总和为\
    \ 1），每个元素对目标像素的最终值都有同等的贡献。我们可以使用 `filter2D` 手动将核应用于图像，以产生类似的模糊效果：\n\n```python\n\
    # 应用核\nimage_kernel = cv2.filter2D(image, -1, kernel)\n\n# 显示图像\nplt.imshow(image_kernel,\
    \ cmap=\"gray\"), plt.xticks([]), plt.yticks([])\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_1.png)"

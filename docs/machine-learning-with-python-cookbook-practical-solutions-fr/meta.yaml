    \       [0.79566902, 0.32841405, 0.76275827, 1.05393502]])\n```\n\n# Discussion\n\
    \nKNN is a great approach to finding the most similar observations in a set of\
    \ small data. However, as the size of our data increases, so does the time it\
    \ takes to compute the distance between any one observation and all other points\
    \ in our dataset. Large scale ML systems such as search or recommendation engines\
    \ often use some form of vector similarity measure to retrieve similar observations.\
    \ But at scale in real time, where we need results in less than 100 ms, KNN becomes\
    \ infeasible to run.\n\nANN helps us overcome this problem by sacrificing some\
    \ of the quality of the exact nearest neighbors search in favor of speed. This\
    \ is to say that although the order and items in the first 10 nearest neighbors\
    \ of an ANN search may not match the first 10 results from an exact KNN search,\
    \ we get those first 10 nearest neighbors much faster.\n\nIn this example, we\
    \ use an ANN approach called inverted file index (IVF). This approach works by\
    \ using clustering to limit the scope of the search space for our nearest neighbors\
    \ search. IVF uses Voronoi tessellations to partition our search space into a\
    \ number of distinct areas (or clusters). And when we go to find nearest neighbors,\
    \ we visit a limited number of clusters to find similar observations, as opposed\
    \ to conducting a comparison across every point in our dataset.\n\nHow Voronoi\
    \ tessellations are created from data is best visualized using simple data. Take\
    \ a scatter plot of random data visualized in two dimensions, as shown in Figure\
    \ 15-1."

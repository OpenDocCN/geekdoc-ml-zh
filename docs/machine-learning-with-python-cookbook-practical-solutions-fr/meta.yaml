- md: "## 17.3 Creating Predicted Probabilities\n\n### Problem\n\nYou need to know\
    \ the predicted class probabilities for an observation.\n\n### Solution\n\nWhen\
    \ using scikit-learn's SVC, set `probability=True`, train the model, then use\
    \ `predict_proba` to see the calibrated probabilities:\n\n```python\n# Load libraries\n\
    from sklearn.svm import SVC\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\nimport numpy as np\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\ntarget = iris.target\n\n# Standardize features\nscaler =\
    \ StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\n\
    # Create support vector classifier object\nsvc = SVC(kernel=\"linear\", probability=True,\
    \ random_state=0)\n\n# Train classifier\nmodel = svc.fit(features_standardized,\
    \ target)\n\n# Create new observation\nnew_observation = [[.4, .4, .4, .4]]\n\n\
    # View predicted probabilities\nmodel.predict_proba(new_observation)\narray([[0.00541761,\
    \ 0.97348825, 0.02109414]])\n```\n\n### Discussion\n\nMany of the supervised learning\
    \ algorithms we have covered use probability estimates to predict classes. For\
    \ example, in k-nearest neighbors, an observation's k neighbor's classes were\
    \ treated as votes to create a probability that an observation was of that class.\
    \ Then the class with the highest probability was predicted. SVC's use of a hyperplane\
    \ to create decision regions does not naturally output a probability estimate\
    \ that an observation is a member of a certain class. However, we can in fact\
    \ output calibrated class probabilities with a few caveats. In an SVC with two\
    \ classes, Platt scaling can be used, wherein first the SVC is trained, and then\
    \ a separate cross-validated logistic regression is trained to map the SVC outputs\
    \ into probabilities:\n\n$$P(y = 1 \\mid x) = \\frac{1}{1 + e^{(A \\times f(x)\
    \ + B)}}$$\n\nwhere $A$ and $B$ are parameter vectors, and $f(x)$ is the $i$th\
    \ observation's signed distance from the hyperplane. When we have more than two\
    \ classes, an extension of Platt scaling is used.\n\nIn more practical terms,\
    \ creating predicted probabilities has two major issues. First, because we are\
    \ training a second model with cross-validation, generating predicted probabilities\
    \ can significantly increase the time it takes to train our model. Second, because\
    \ the predicted probabilities are created using cross-validation, they might not\
    \ always match the predicted classes. That is, an observation might be predicted\
    \ to be class 1 but have a predicted probability of being class 1 of less than\
    \ 0.5.\n\nIn scikit-learn, the predicted probabilities must be generated when\
    \ the model is being trained. We can do this by setting SVC's `probability` to\
    \ `True`. After the model is trained, we can output the estimated probabilities\
    \ for each class using `predict_proba`.\n\n## 17.4 Identifying Support Vectors\n\
    \n### Problem\n\nYou need to identify which observations are the support vectors\
    \ of the decision hyperplane.\n\n### Solution\n\nTrain the model, then use `support_vectors_`:\n\
    \n```python\n# Load libraries\nfrom sklearn.svm import SVC\nfrom sklearn import\
    \ datasets\nfrom sklearn.preprocessing import StandardScaler\nimport numpy as\
    \ np\n\n# Load data with only two classes\niris = datasets.load_iris()\nfeatures\
    \ = iris.data[:100,:]\ntarget = iris.target[:100]\n\n# Standardize features\n\
    scaler = StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\
    \n# Create support vector classifier object\nsvc = SVC(kernel=\"linear\", random_state=0)\n\
    \n# Train classifier\nmodel = svc.fit(features_standardized, target)\n\n# View\
    \ support vectors\nmodel.support_vectors_\n\narray([[-0.5810659 ,  0.42196824,\
    \ -0.80497402, -0.50860702],\n       [-1.52079513, -1.67737625, -1.08231219, -0.86427627],\n\
    \       [-0.89430898, -1.4674418 ,  0.30437864,  0.38056609],\n       [-0.5810659\
    \ , -1.25750735,  0.09637501,  0.55840072]])\n```\n\n### Discussion\n\nSupport\
    \ vector machines get their name from the fact that the hyperplane is being determined\
    \ by a relatively small number of observations, called the *support vectors*.\
    \ Intuitively, think of the hyperplane as being \"carried\" by these support vectors.\
    \ These support vectors are therefore very important to our model. For example,\
    \ if we remove an observation that is not a support vector from the data, the\
    \ model does not change; however, if we remove a support vector, the hyperplane\
    \ will not have the maximum margin.\n\nAfter we have trained an SVC, scikit-learn\
    \ offers a number of options for identifying the support vector. In our solution,\
    \ we used `support_vectors_` to output the actual observations' features of the\
    \ four support vectors in our model. Alternatively, we can view the indices of\
    \ the support vectors using `support_`:\n\n```python\nmodel.support_\n\narray([23,\
    \ 41, 57, 98], dtype=int32)\n```\n\nFinally, we can use `n_support_` to find the\
    \ number of support vectors belonging to each class:\n\n```python\nmodel.n_support_\n\
    \narray([2, 2], dtype=int32)\n```\n\n## 17.5 Handling Imbalanced Classes\n\n###\
    \ Problem\n\nYou need to train a support vector machine classifier in the presence\
    \ of imbalanced classes.\n\n### Solution\n\nIncrease the penalty for misclassifying\
    \ the smaller class using `class_weight`:\n\n```python\n# Load libraries\nfrom\
    \ sklearn.svm import SVC\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\nimport numpy as np\n\n# Load data with only two classes\n\
    iris = datasets.load_iris()\nfeatures = iris.data[:100,:]\ntarget = iris.target[:100]\n\
    \n# Make class highly imbalanced by removing first 40 observations\nfeatures =\
    \ features[40:,:]\ntarget = target[40:]\n\n# Create target vector indicating if\
    \ class 0, otherwise 1\ntarget = np.where((target == 0), 0, 1)\n\n# Standardize\
    \ features\nscaler = StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\
    \n# Create support vector classifier\nsvc = SVC(kernel=\"linear\", class_weight=\"\
    balanced\", C=1.0, random_state=0)\n\n# Train classifier\nmodel = svc.fit(features_standardized,\
    \ target)\n```\n\n### Discussion\n\nIn support vector machines, $C$ is a hyperparameter\
    \ that determines the penalty for misclassifying an observation. One method for\
    \ handling imbalanced classes in support vector machines is to weight $C$ by classes,\
    \ so that:\n\n$$C_k = C \\times w_j$$\n\nwhere $C$ is the penalty for misclassification,\
    \ $w_j$ is a weight inversely proportional to class $j$'s frequency, and $C_k$\
    \ is the $C$ value for class $k$. The general idea is to increase the penalty\
    \ for misclassifying minority classes to prevent them from being \"overwhelmed\"\
    \ by the majority class.\n\nIn scikit-learn, when using SVC we can set the values\
    \ for $C_k$ automatically by setting `class_weight=\"balanced\"`. The `balanced`\
    \ argument automatically weighs classes such that:\n\n$$w_j = \\frac{n}{k n_j}$$\n\
    \nwhere $w_j$ is the weight to class $j$, $n$ is the number of observations, $n_j$\
    \ is the number of observations in class $j$, and $k$ is the total number of classes.\n\

    \ 包含一个 `weights` 参数，允许我们模拟类别不平衡的数据集。例如，`weights = [.25, .75]` 将返回一个数据集，其中 25%\
    \ 的观测值属于一个类别，75% 的观测值属于第二个类别。\n\n对于 `make_blobs`，`centers` 参数决定了生成的聚类数量。使用 `matplotlib`\
    \ 可视化库，我们可以可视化 `make_blobs` 生成的聚类：\n\n```\n# 加载库\nimport matplotlib.pyplot as\
    \ plt\n\n# 查看散点图\nplt.scatter(features[:,0], features[:,1], c=target)\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_40_0.png)\n\n## 另请参阅\n\n- make_regression\
    \ 文档\n- make_classification 文档\n- make_blobs 文档\n\n## 2.3 加载 CSV 文件\n\n### 问题\n\
    \n你需要导入一个逗号分隔值（CSV）文件。\n\n### 解决方案\n\n使用 pandas 库的 `read_csv` 将本地或托管的 CSV 文件加载到\
    \ pandas DataFrame 中：\n\n```\n# 加载库\nimport pandas as pd\n\n# 创建 URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.csv'\n\
    \n# 加载数据集\ndataframe = pd.read_csv(url)\n\n# 查看前两行\ndataframe.head(2)\n```\n\n\
    | | integer | datetime | category |\n|---|---|---|---|\n| 0 | 5 | 2015-01-01 00:00:00\
    \ | 0 |\n| 1 | 5 | 2015-01-01 00:00:01 | 0 |\n\n### 讨论\n\n关于加载 CSV 文件，有两点需要注意。首先，在加载之前快速查看文件内容通常很有用。事先了解数据集的结构以及我们需要设置哪些参数来加载文件会非常有帮助。其次，`read_csv`\
    \ 有超过 30 个参数，因此文档可能令人望而生畏。幸运的是，这些参数大多是为了让它能够处理各种 CSV 格式。\n\nCSV 文件的名称源于其值实际上是由逗号分隔的（例如，一行可能是\
    \ `2,\"2015-01-01 00:00:00\",0`）；然而，CSV 文件通常使用其他分隔符，例如制表符（称为 TSV 文件）。\n\npandas\
    \ 的 `sep` 参数允许我们定义文件中使用的分隔符。虽然并非总是如此，但 CSV 文件的一个常见格式问题是文件的第一行用于定义列标题（例如，我们解决方案中的\
    \ integer、datetime、category）。`header` 参数允许我们指定是否存在标题行以及其位置。如果不存在标题行，我们设置 `header=None`。\n\
    \n`read_csv` 函数返回一个 pandas DataFrame：一个用于处理表格数据的常用且有用的对象，我们将在本书中更深入地介绍。\n\n##\
    \ 2.4 加载 Excel 文件\n\n### 问题\n\n你需要导入一个 Excel 电子表格。\n\n### 解决方案\n\n使用 pandas 库的\
    \ `read_excel` 加载 Excel 电子表格：\n\n```\n# 加载库\nimport pandas as pd\n\n# 创建 URL\n\
    url = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.xlsx'\n\
    \n# 加载数据\ndataframe = pd.read_excel(url, sheet_name=0, header=0)\n\n# 查看前两行\n\
    dataframe.head(2)\n```\n\n| integer | datetime | category |\n|---|---|---|\n|\
    \ 5 | 2015-01-01 00:00:00 | 0 |\n| 5 | 2015-01-01 00:00:01 | 0 |\n| 9 | 2015-01-01\
    \ 00:00:02 | 0 |\n\n### 讨论\n\n这个解决方案与我们读取 CSV 文件的解决方案类似。主要区别在于额外的参数 `sheet_name`，它指定了我们希望加载\
    \ Excel 文件中的哪个工作表。`sheet_name` 可以接受字符串（包含工作表的名称）和整数（指向工作表位置，从零开始索引）。如果我们需要加载多个工作表，可以将它们作为列表包含在内。例如，`sheet_name=[0,1,2,\
    \ \"Monthly Sales\"]` 将返回一个包含第一个、第二个和第三个工作表以及名为 Monthly Sales 的工作表的 pandas DataFrame\
    \ 字典。"

    \ of the nice features of `CountVectorizer` is that the output is a sparse matrix\
    \ by default.\n\n`CountVectorizer` comes with a number of useful parameters to\
    \ make it easy to create bag-of-words feature matrices. First, while by default\
    \ every feature is a word, that does not have to be the case. Instead we can set\
    \ every feature to be the combination of two words (called a 2-gram) or even three\
    \ words (3-gram). `ngram_range` sets the minimum and maximum size of our *n*-grams.\
    \ For example, `(2,3)` will return all 2-grams and 3-grams. Second, we can easily\
    \ remove low-information filler words by using `stop_words`, either with a built-in\
    \ list or a custom list. Finally, we can restrict the words or phrases we want\
    \ to consider to a certain list of words using `vocabulary`. For example, we could\
    \ create a bag-of-words feature matrix only for occurrences of country names:\n\
    \n```\n# Create feature matrix with arguments\ncount_2gram = CountVectorizer(ngram_range=(1,2),\n\
    \                               stop_words=\"english\",\n                    \
    \           vocabulary=['brazil'])\nbag = count_2gram.fit_transform(text_data)\n\
    \n# View feature matrix\nbag.toarray()\n\narray([[2],\n       [0],\n       [0]])\n\
    \n# View the 1-grams and 2-grams\ncount_2gram.vocabulary_\n\n{'brazil': 0}\n```\n\
    \n# See Also\n\n+   - *n*-gram, Wikipedia\n- Bag of Words Meets Bags of Popcorn"
  - "[PAGE 131]\n\n# 6.10 Weighting Word Importance\n\n# Problem\n\nYou want a bag\

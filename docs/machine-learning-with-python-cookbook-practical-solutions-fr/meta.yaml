    logistic_regression = LogisticRegression(random_state=0)


    # Train model

    model = logistic_regression.fit(features_standardized, target)

    ```


    # Discussion


    Despite having “regression” in its name, a logistic regression is actually a widely
    used binary classifier (i.e., the target vector can take only two values). In
    a logistic regression, a linear model (e.g., $\beta_0 + \beta_1x$) is included
    in a logistic (also called sigmoid) function, $\frac{1}{1 + e^{-z}}$, such that:


    $$P(y_i = 1 \mid X) = \frac{1}{1 + e^{-(\beta_0 + \beta_1x)}}$$


    where $P(y_i = 1 \mid X)$ is the probability of the $i$th observation’s target
    value, $y_i$, being class 1; $X$ is the training data; $\beta_0$ and $\beta_1$
    are the parameters to be learned; and $e$ is Euler’s number. The effect of the
    logistic function is to constrain the value of the function’s output to between
    0 and 1, so that it can be interpreted as a probability. If $P(y_i = 1 \mid X)$
    is greater than 0.5, class 1 is predicted; otherwise, class 0 is predicted.


    In scikit-learn, we can train a logistic regression model using `LogisticRegression`.
    Once it is trained, we can use the model to predict the class of new observations:


    ```

    # Create new observation

    new_observation = [[.5, .5, .5, .5]]


    # Predict class

    model.predict(new_observation)

    array([1])

    ```


    In this example, our observation was predicted to be class 1. Additionally, we
    can see the probability that an observation is a member of each class:


    ```

    # View predicted probabilities

    model.predict_proba(new_observation)

    array([[0.17738424, 0.82261576]])

    ```


    Our observation had a 17.7% chance of being class 0 and an 82.2% chance of being
    class 1.'
- md: "## 16.2 Training a Multiclass Classifier\n\n### Problem\n\nGiven more than\
    \ two classes, you need to train a classifier model.\n\n### Solution\n\nTrain\
    \ a logistic regression in scikit-learn with LogisticRegression using one-vs-rest\
    \ or multinomial methods:\n\n```python\n# Load libraries\nfrom sklearn.linear_model\
    \ import LogisticRegression\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\n# Load data\niris = datasets.load_iris()\nfeatures\
    \ = iris.data\ntarget = iris.target\n\n# Standardize features\nscaler = StandardScaler()\n\
    features_standardized = scaler.fit_transform(features)\n\n# Create one-vs-rest\
    \ logistic regression object\nlogistic_regression = LogisticRegression(random_state=0,\
    \ multi_class=\"ovr\")\n\n# Train model\nmodel = logistic_regression.fit(features_standardized,\
    \ target)\n```\n\n### Discussion\n\nOn their own, logistic regressions are only\
    \ binary classifiers, meaning they cannot handle target vectors with more than\
    \ two classes. However, two clever extensions to logistic regression do just that.\
    \ First, in *one-vs-rest* logistic regression (OvR) a separate model is trained\
    \ for each class predicted, whether an observation is that class or not (thus\
    \ making it a binary classification problem). It assumes that each classification\
    \ problem (e.g., class 0 or not) is independent.\n\nAlternatively, in *multinomial\
    \ logistic regression* (MLR), the logistic function we saw in Recipe 16.1 is replaced\
    \ with a softmax function:\n\n$$P(y_i = k \\mid X) = \\frac{e^{\\beta_k x_i}}{\\\
    sum_{j=1}^K e^{\\beta_j x_i}}$$\n\nwhere $P(y_i = k \\mid X)$ is the probability\
    \ of the $i$th observation's target value, $y_i$, being in class $k$, and $K$\
    \ is the total number of classes. One practical advantage of MLR is that its predicted\
    \ probabilities using the `predict_proba` method are more reliable (i.e., better\
    \ calibrated).\n\nWhen using `LogisticRegression` we can select which of the two\
    \ techniques we want, with OvR (`ovr`) being the default argument. We can switch\
    \ to MLR by setting the argument to `multinomial`.\n\n## 16.3 Reducing Variance\
    \ Through Regularization\n\n### Problem\n\nYou need to reduce the variance of\
    \ your logistic regression model.\n\n### Solution\n\nTune the regularization strength\
    \ hyperparameter, C:\n\n```python\n# Load libraries\nfrom sklearn.linear_model\
    \ import LogisticRegressionCV\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\n# Load data\niris = datasets.load_iris()\nfeatures\
    \ = iris.data\ntarget = iris.target\n\n# Standardize features\nscaler = StandardScaler()\n\
    features_standardized = scaler.fit_transform(features)\n\n# Create logistic regression\
    \ object\nlogistic_regression = LogisticRegressionCV(\n    penalty='l2', Cs=10,\
    \ random_state=0, n_jobs=-1)\n\n# Train model\nmodel = logistic_regression.fit(features_standardized,\
    \ target)\n```\n\n### Discussion\n\n*Regularization* is a method of penalizing\
    \ complex models to reduce their variance. Specifically, a penalty term is added\
    \ to the loss function we are trying to minimize, typically the L1 and L2 penalties.\
    \ In the L1 penalty:\n\n$$\\alpha \\sum_{j=1}^{p} |\\widehat{\\beta}_j|$$\n\n\
    where $\\widehat{\\beta}_j$ is the parameters of the $j$th of $p$ features being\
    \ learned, and $\\alpha$ is a hyper-parameter denoting the regularization strength.\
    \ With the L2 penalty:\n\n$$\\alpha \\sum_{j=1}^{p} \\widehat{\\beta}_j^2$$\n\n\
    Higher values of $\\alpha$ increase the penalty for larger parameter values (i.e.,\
    \ more complex models). scikit-learn follows the common method of using $C$ instead\
    \ of $\\alpha$ where $C$ is the inverse of the regularization strength: $C = \\\
    frac{1}{\\alpha}$. To reduce variance while using logistic regression, we can\
    \ treat $C$ as a hyperparameter to be tuned to find the value of $C$ that creates\
    \ the best model. In scikit-learn we can use the LogisticRegressionCV class to\
    \ efficiently tune $C$. LogisticRegressionCV's parameter Cs can either accept\
    \ a range of values for $C$ to search over (if a list of floats is supplied as\
    \ an argument) or, if supplied an integer, will generate a list of that many candidate\
    \ values drawn from a logarithmic scale between -10,000 and 10,000.\n\nUnfortunately,\
    \ LogisticRegressionCV does not allow us to search over different penalty terms.\
    \ To do this we have to use the less efficient model selection techniques discussed\
    \ in Chapter 12.\n\n## 16.4 Training a Classifier on Very Large Data\n\n### Problem\n\
    \nYou need to train a simple classifier model on a very large set of data.\n\n\
    ### Solution\n\nTrain a logistic regression in scikit-learn with LogisticRegression\
    \ using the *stochastic average gradient* (SAG) solver:\n\n```python\n# Load libraries\n\
    from sklearn.linear_model import LogisticRegression\nfrom sklearn import datasets\n\
    from sklearn.preprocessing import StandardScaler\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\ntarget = iris.target\n\n# Standardize features\nscaler =\
    \ StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\n\
    # Create logistic regression object\nlogistic_regression = LogisticRegression(random_state=0,\
    \ solver=\"sag\")\n\n# Train model\nmodel = logistic_regression.fit(features_standardized,\
    \ target)\n```\n\n### Discussion\n\nscikit-learn's LogisticRegression offers a\
    \ number of techniques for training a logistic regression, called solvers. Most\
    \ of the time scikit-learn will select the best solver automatically for us or\
    \ warn us that we cannot do something with that solver. However, there is one\
    \ particular case we should be aware of.\n\nWhile an exact explanation is beyond\
    \ the bounds of this book (for more information see Mark Schmidt's slides in the\
    \ \"See Also\" section of this recipe), stochastic average gradient descent allows\
    \ us to train a model much faster than other solvers when our data is very large.\
    \ However, it is also very sensitive to feature scaling, so standardizing our\
    \ features is particularly important. We can set our learning algorithm to use\
    \ this solver by setting solver=\"sag\".\n\n### See Also\n\n- Minimizing Finite\
    \ Sums with the Stochastic Average Gradient Algorithm, Mark Schmidt\n\n## 16.5\
    \ Handling Imbalanced Classes\n\n### Problem\n\nYou need to train a simple classifier\
    \ model.\n\n### Solution\n\nTrain a logistic regression in scikit-learn using\
    \ LogisticRegression:\n\n```python\n# Load libraries\nimport numpy as np\nfrom\
    \ sklearn.linear_model import LogisticRegression\nfrom sklearn import datasets\n\
    from sklearn.preprocessing import StandardScaler\n\n# Load data\niris = datasets.load_iris()\n\
    features = iris.data\ntarget = iris.target\n\n# Make class highly imbalanced by\
    \ removing first 40 observations\nfeatures = features[40:,:]\ntarget = target[40:]\n\
    \n# Create target vector indicating if class 0, otherwise 1\ntarget = np.where((target\
    \ == 0), 0, 1)\n\n# Standardize features\nscaler = StandardScaler()\nfeatures_standardized\
    \ = scaler.fit_transform(features)\n\n# Create logistic regression object\nlogistic_regression\
    \ = LogisticRegression(random_state=0, class_weight=\"balanced\")\n\n# Train model\n\
    model = logistic_regression.fit(features_standardized, target)\n```\n\n### Discussion\n\
    \nLike many other learning algorithms in scikit-learn, LogisticRegression comes\
    \ with a built-in method of handling imbalanced classes. If we have highly imbalanced\
    \ classes and have not addressed it during preprocessing, we have the option of\
    \ using the class_weight parameter to weight the classes to make certain we have\
    \ a balanced mix of each class. Specifically, the balanced argument will automatically\
    \ weigh classes inversely proportional to their frequency:\n\n$$w_j = \\frac{n}{kn_j}$$\n\
    \nwhere $w_j$ is the weight to class $j$, $n$ is the number of observations, $n_j$\
    \ is the number of observations in class $j$, and $k$ is the total number of classes.\n\
    \n# CHAPTER 17\nSupport Vector Machines\n\n## 17.0 Introduction\n\nTo understand\
    \ support vector machines, we must understand hyperplanes. Formally, a *hyperplane*\
    \ is an *n* – 1 subspace in an *n*-dimensional space. While that sounds complex,\
    \ it actually is pretty simple. For example, if we wanted to divide a two-dimensional\
    \ space, we’d use a one-dimensional hyperplane (i.e., a line). If we wanted to\
    \ divide a three-dimensional space, we’d use a two-dimensional hyperplane (i.e.,\
    \ a flat piece of paper or a bed sheet). A hyperplane is simply a generalization\
    \ of that concept into *n* dimensions.\n\n*Support vector machines* classify data\
    \ by finding the hyperplane that maximizes the margin between the classes in the\
    \ training data. In a two-dimensional example with two classes, we can think of\
    \ a hyperplane as the widest straight “band” (i.e., line with margins) that separates\
    \ the two classes.\n\nIn this chapter, we cover training support vector machines\
    \ in a variety of situations and dive under the hood to look at how we can extend\
    \ the approach to tackle common problems.\n\n## 17.1 Training a Linear Classifier\n\
    \n### Problem\n\nYou need to train a model to classify observations.\n\n### Solution\n\
    \nUse a *support vector classifier* (SVC) to find the hyperplane that maximizes\
    \ the margins between the classes:"
  mdcn: "## 16.2 训练多类别分类器\n\n### 问题\n\n给定超过两个类别，你需要训练一个分类器模型。\n\n### 解决方案\n\n在 scikit-learn\
    \ 中使用 LogisticRegression 训练一个逻辑回归模型，采用一对多（one-vs-rest）或多分类（multinomial）方法：\n\n\
    ```python\n# 加载库\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn\
    \ import datasets\nfrom sklearn.preprocessing import StandardScaler\n\n# 加载数据\n\
    iris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\n# 标准化特征\n\
    scaler = StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\
    \n# 创建一对多逻辑回归对象\nlogistic_regression = LogisticRegression(random_state=0, multi_class=\"\
    ovr\")\n\n# 训练模型\nmodel = logistic_regression.fit(features_standardized, target)\n\
    ```\n\n### 讨论\n\n逻辑回归本身是二元分类器，这意味着它无法处理具有两个以上类别的目标向量。然而，逻辑回归的两个巧妙扩展恰好解决了这个问题。首先，在*一对多*逻辑回归（OvR）中，为每个待预测的类别训练一个单独的模型，判断一个观测值是否属于该类别（从而将其转化为一个二元分类问题）。它假设每个分类问题（例如，类别0或非类别0）是独立的。\n\
    \n或者，在*多分类逻辑回归*（MLR）中，我们在配方16.1中看到的逻辑函数被替换为softmax函数：\n\n$$P(y_i = k \\mid X)\
    \ = \\frac{e^{\\beta_k x_i}}{\\sum_{j=1}^K e^{\\beta_j x_i}}$$\n\n其中 $P(y_i =\
    \ k \\mid X)$ 是第 $i$ 个观测值的目标值 $y_i$ 属于类别 $k$ 的概率，$K$ 是类别总数。MLR的一个实际优势是，使用 `predict_proba`\
    \ 方法得到的预测概率更可靠（即校准得更好）。\n\n使用 `LogisticRegression` 时，我们可以选择这两种技术中的哪一种，OvR（`ovr`）是默认参数。我们可以通过将参数设置为\
    \ `multinomial` 来切换到MLR。\n\n## 16.3 通过正则化减少方差\n\n### 问题\n\n你需要减少逻辑回归模型的方差。\n\n\
    ### 解决方案\n\n调整正则化强度超参数 C：\n\n```python\n# 加载库\nfrom sklearn.linear_model import\
    \ LogisticRegressionCV\nfrom sklearn import datasets\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\n# 加载数据\niris = datasets.load_iris()\nfeatures = iris.data\n\
    target = iris.target\n\n# 标准化特征\nscaler = StandardScaler()\nfeatures_standardized\
    \ = scaler.fit_transform(features)\n\n# 创建逻辑回归对象\nlogistic_regression = LogisticRegressionCV(\n\
    \    penalty='l2', Cs=10, random_state=0, n_jobs=-1)\n\n# 训练模型\nmodel = logistic_regression.fit(features_standardized,\
    \ target)\n```\n\n### 讨论\n\n*正则化*是一种惩罚复杂模型以减少其方差的方法。具体来说，是在我们试图最小化的损失函数中添加一个惩罚项，通常是L1和L2惩罚。在L1惩罚中：\n\
    \n$$\\alpha \\sum_{j=1}^{p} |\\widehat{\\beta}_j|$$\n\n其中 $\\widehat{\\beta}_j$\
    \ 是正在学习的 $p$ 个特征中第 $j$ 个特征的参数，$\\alpha$ 是表示正则化强度的超参数。在L2惩罚中：\n\n$$\\alpha \\sum_{j=1}^{p}\
    \ \\widehat{\\beta}_j^2$$\n\n$\\alpha$ 的值越高，对较大参数值（即更复杂的模型）的惩罚就越大。scikit-learn\
    \ 遵循常用方法，使用 $C$ 而不是 $\\alpha$，其中 $C$ 是正则化强度的倒数：$C = \\frac{1}{\\alpha}$。为了在使用逻辑回归时减少方差，我们可以将\
    \ $C$ 视为一个需要调整的超参数，以找到能创建最佳模型的 $C$ 值。在 scikit-learn 中，我们可以使用 LogisticRegressionCV\
    \ 类来高效地调整 $C$。LogisticRegressionCV 的参数 Cs 可以接受一个 $C$ 值的范围进行搜索（如果提供了一个浮点数列表作为参数），或者，如果提供一个整数，则会生成一个包含该数量候选值的列表，这些候选值从\
    \ -10,000 到 10,000 的对数尺度中抽取。\n\n不幸的是，LogisticRegressionCV 不允许我们搜索不同的惩罚项。要做到这一点，我们必须使用第12章中讨论的效率较低的模型选择技术。\n\
    \n## 16.4 在超大数据集上训练分类器\n\n### 问题\n\n你需要在一个非常大的数据集上训练一个简单的分类器模型。\n\n### 解决方案\n\n\

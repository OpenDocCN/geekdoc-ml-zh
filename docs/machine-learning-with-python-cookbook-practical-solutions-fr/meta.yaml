  md: "```\ntext_data = \"Chris loved outdoor running\"\n\n# Use pretrained part of\
    \ speech tagger\ntext_tagged = pos_tag(word_tokenize(text_data))\n\n# Show parts\
    \ of speech\ntext_tagged\n[('Chris', 'NNP'), ('loved', 'VBD'), ('outdoor', 'RP'),\
    \ ('running', 'VBG')]\n```\n\nThe output is a list of tuples with the word and\
    \ the tag of the part of speech. NLTK uses the Penn Treebank parts for speech\
    \ tags. Some examples of the Penn Treebank tags are:\n\n| Tag | Part of speech\
    \ |\n|---|---|\n| NNP | Proper noun, singular |\n| NN | Noun, singular or mass\
    \ |\n| RB | Adverb |\n| VBD | Verb, past tense |\n| VBG | Verb, gerund or present\
    \ participle |\n| JJ | Adjective |\n| PRP | Personal pronoun |\n\nOnce the text\
    \ has been tagged, we can use the tags to find certain parts of speech. For example,\
    \ here are all nouns:\n\n```\n# Filter words\n[word for word, tag in text_tagged\
    \ if tag in ['NN','NNS','NNP','NNPS'] ]\n['Chris']\n```\n\nA more realistic situation\
    \ would be to have data where every observation contains a tweet, and we want\
    \ to convert those sentences into features for individual parts of speech (e.g.,\
    \ a feature with 1 if a proper noun is present, and 0 otherwise):\n\n```\n# Import\
    \ libraries\nfrom sklearn.preprocessing import MultiLabelBinarizer\n\n# Create\
    \ text\ntweets = [\"I am eating a burrito for breakfast\",\n          \"Political\
    \ science is an amazing field\",\n          \"San Francisco is an awesome city\"\
    ]\n\n# Create list\ntagged_tweets = []\n\n# Tag each word and each tweet\nfor\
    \ tweet in tweets:\n    tweet_tag = nltk.pos_tag(word_tokenize(tweet))\n    tagged_tweets.append([tag\
    \ for word, tag in tweet_tag])\n```"

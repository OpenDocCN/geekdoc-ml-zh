  md: "# Discussion\n\nWe are jumping ahead of ourselves a bit and will go into much\
    \ more depth about clustering algorithms later in the book. However, I wanted\
    \ to point out that we can use clustering as a preprocessing step. Specifically,\
    \ we use unsupervised learning algorithms like k-means to cluster observations\
    \ into groups. The result is a categorical feature with similar observations being\
    \ members of the same group.\n\nDon't worry if you did not understand all of that:\
    \ just file away the idea that clustering can be used in preprocessing. And if\
    \ you really can't wait, feel free to flip to Chapter 19 now.\n\n# 4.10 Deleting\
    \ Observations with Missing Values\n\n# Problem\n\nYou need to delete observations\
    \ containing missing values.\n\n# Solution\n\nDeleting observations with missing\
    \ values is easy with a clever line of NumPy:\n\n```\n# Load library\nimport numpy\
    \ as np\n\n# Create feature matrix\nfeatures = np.array([[1.1, 11.1],\n      \
    \               [2.2, 22.2],\n                     [3.3, 33.3],\n            \
    \         [4.4, 44.4],\n                     [np.nan, 55]])\n\n# Keep only observations\
    \ that are not (denoted by ~) missing\nfeatures[~np.isnan(features).any(axis=1)]\n\
    ```\n\n```\narray([[ 1.1, 11.1],\n       [ 2.2, 22.2],\n       [ 3.3, 33.3],\n\
    \       [ 4.4, 44.4]])\n```\n\nAlternatively, we can drop missing observations\
    \ using pandas:\n\n```\n# Load library\nimport pandas as pd\n\n# Load data\ndataframe\
    \ = pd.DataFrame(features, columns=[\"feature_1\", \"feature_2\"])\n\n# Remove\
    \ observations with missing values\ndataframe.dropna()\n```"
  merge: -1
  pgno: 99
- img_proc: true
  md: "| | feature_1 | feature_2 |\n|---|---|---|\n| 0 | 1.1 | 11.1 |\n| 1 | 2.2 |\
    \ 22.2 |\n| 2 | 3.3 | 33.3 |\n| 3 | 4.4 | 44.4 |\n\n# Discussion\n\nMost machine\
    \ learning algorithms cannot handle any missing values in the target and feature\
    \ arrays. For this reason, we cannot ignore missing values in our data and must\
    \ address the issue during preprocessing.\n\nThe simplest solution is to delete\
    \ every observation that contains one or more missing values, a task quickly and\
    \ easily accomplished using NumPy or pandas.\n\nThat said, we should be very reluctant\
    \ to delete observations with missing values. Deleting them is the nuclear option,\
    \ since our algorithm loses access to the information contained in the observation’s\
    \ nonmissing values.\n\nJust as important, depending on the cause of the missing\
    \ values, deleting observations can introduce bias into our data. There are three\
    \ types of missing data:\n\n*Missing completely at random (MCAR)*\n    The probability\
    \ that a value is missing is independent of everything. For example, a survey\
    \ respondent rolls a die before answering a question: if she rolls a six, she\
    \ skips that question.\n\n*Missing at random (MAR)*\n    The probability that\
    \ a value is missing is not completely random but depends on the information captured\
    \ in other features. For example, a survey asks about gender identity and annual\
    \ salary, and women are more likely to skip the salary question; however, their\
    \ nonresponse depends only on information we have captured in our gender identity\
    \ feature.\n\n*Missing not at random (MNAR)*\n    The probability that a value\
    \ is missing is not random and depends on information not captured in our features.\
    \ For example, a survey asks about annual salary, and women are more likely to\
    \ skip the salary question, and we do not have a gender identity feature in our\
    \ data.\n\nIt is sometimes acceptable to delete observations if they are MCAR\
    \ or MAR. However, if the value is MNAR, the fact that a value is missing is itself\
    \ information. Deleting MNAR observations can inject bias into our data because\
    \ we are removing observations produced by some unobserved systematic effect."

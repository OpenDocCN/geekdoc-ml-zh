  md: '# About the Authors


    **Kyle Gallatin** is a software engineer for machine learning infrastructure with
    years of experience as a data analyst, data scientist, and machine learning engineer.
    He is also a professional data science mentor and volunteer computer science teacher
    and frequently publishes articles at the intersection of software engineering
    and machine learning. Currently, Kyle is a software engineer on the machine learning
    platform team at Etsy.


    **Chris Albon** is the Director of Machine Learning at the Wikimedia Foundation,
    the nonprofit that hosts Wikipedia.


    # Colophon


    The animal on the cover of *Machine Learning with Python Cookbook* is the Narina
    trogon (*Apaloderma narina*). It is named for the mistress of French ornithologist
    François Levaillant, who derived the name from a Khoikhoi word for “flower,” as
    his mistress’s name was difficult to pronounce. The Narina trogon is largely found
    in Africa, inhabiting both lowlands and highlands, and tropical and temperate
    climates, usually nesting in the hollows of trees. Its diverse range of habitats
    makes it a species of least conservation concern.


    The Narina trogon eats mostly insects and small invertebrates as well as small
    rodents and reptiles. Males, which are more brightly colored, give off a grating,
    low, repeated hoot to defend territory and attract mates. Both sexes have green
    upper plumage and metallic blue-green tail feathers. Female faces and chest plumages
    are brown, while males have bright red undersides. Immature birds have similar
    coloring to females with distinct white tips on their inner wings.


    The current conservation status (IUCN) of the Narina trogon is Least Concern.
    Many of the animals on O’Reilly covers are endangered; all of them are important
    to the world.


    The cover illustration is by Karen Montgomery, based on an image from *Wood’s
    Animate Creation*. The cover fonts are Gilroy Semibold and Guardian Sans. The
    text fonts are Adobe Minion Pro and Symbola; the heading font is Adobe Myriad
    Condensed; and the code font is Dalton Maag’s Ubuntu Mono.'
  merge: -1

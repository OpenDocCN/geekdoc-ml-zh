  md: '# Discussion


    The receiver operating characteristic curve is a common method for evaluating
    the quality of a binary classifier. ROC compares the presence of true positives
    and false positives at every probability threshold (i.e., the probability at which
    an observation is predicted to be a class). By plotting the ROC curve, we can
    see how the model performs. A classifier that predicts every observation correctly
    would look like the solid light gray line in the ROC output in the previous figure,
    going straight up to the top immediately. A classifier that predicts at random
    will appear as the diagonal line. The better the model, the closer it is to the
    solid line.


    Until now we have only examined models based on the values they predict. However,
    in many learning algorithms, those predicted values are based on probability estimates.
    That is, each observation is given an explicit probability of belonging in each
    class. In our solution, we can use `predict_proba` to see the predicted probabilities
    for the first observation:


    ```

    # Get predicted probabilities

    logit.predict_proba(features_test)[0:1]


    array([[0.86891533, 0.13108467]])

    ```


    We can see the classes using `classes_`:


    ```

    logit.classes_


    array([0, 1])

    ```


    In this example, the first observation has an ~87% chance of being in the negative
    class (0) and a 13% chance of being in the positive class (1). By default, scikit-learn
    predicts an observation is part of the positive class if the probability is greater
    than 0.5 (called the `threshold`). However, instead of a middle ground, we will
    often want to explicitly bias our model to use a different threshold for substantive
    reasons. For example, if a false positive is very costly to our company, we might
    prefer a model that has a high probability threshold. We fail to predict some
    positives, but when an observation is predicted to be positive, we can be very
    confident that the prediction is correct. This trade-off is represented in the
    *true positive rate* (TPR) and the *false positive rate* (FPR). The TPR is the
    number of observations correctly predicted true divided by all true positive observations:


    $$TPR = \frac{TP}{TP+FN}$$


    The FPR is the number of incorrectly predicted positives divided by all true negative
    observations:'

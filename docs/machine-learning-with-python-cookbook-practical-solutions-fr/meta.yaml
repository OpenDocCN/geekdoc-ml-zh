  md: '# Solution


    Save the model as a pickle file:


    ```

    # Load libraries

    import joblib

    from sklearn.ensemble import RandomForestClassifier

    from sklearn import datasets


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create decision tree classifer object

    classifer = RandomForestClassifier()


    # Train model

    model = classifer.fit(features, target)


    # Save model as pickle file

    joblib.dump(model, "model.pkl")

    [''model.pkl'']

    ```


    Once the model is saved, we can use scikit-learn in our destination application
    (e.g., web application) to load the model:


    ```

    # Load model from file

    classifer = joblib.load("model.pkl")

    ```


    And use it to make predictions:


    ```

    # Create new observation

    new_observation = [[ 5.2, 3.2, 1.1, 0.1]]


    # Predict observation''s class

    classifer.predict(new_observation)


    array([0])

    ```


    # Discussion


    The first step in using a model in production is to save that model as a file
    that can be loaded by another application or workflow. We can accomplish this
    by saving the model as a pickle file, a Python-specific data format that enables
    us to serialize Python objects and write them out to files. Specifically, to save
    the model we use joblib, which is a library extending pickle for cases when we
    have large NumPy arrays—a common occurrence for trained models in scikit-learn.'

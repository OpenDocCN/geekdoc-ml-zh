    # Discussion


    One of the major benefits of decision trees is interpretability. Specifically,
    we can visualize the entire model (see Recipe 14.3). However, a random forest
    model is composed of tens, hundreds, or even thousands of decision trees. This
    makes a simple, intuitive visualization of a random forest model impractical.
    That said, there is another option: we can compare (and visualize) the relative
    importance of each feature.


    In Recipe 14.3, we visualized a decision tree classifier model and saw that decision
    rules based only on petal width were able to classify many observations correctly.
    Intuitively, we can say this means that petal width is an important feature in
    our'
  merge: -1

    \n## 21.2 为神经网络预处理数据\n\n### 问题\n\n你想为神经网络的使用预处理数据。\n\n### 解决方案\n\n使用 scikit-learn\
    \ 的 StandardScaler 对每个特征进行标准化：\n\n```python\n# 加载库\nfrom sklearn import preprocessing\n\
    import numpy as np\n\n# 创建特征\nfeatures = np.array([[-100.1, 3240.1],\n       \
    \              [-200.2, -234.1],\n                     [5000.5, 150.1],\n    \
    \                 [6000.6, -125.1],\n                     [9000.9, -673.1]])\n\
    \n# 创建缩放器\nscaler = preprocessing.StandardScaler()\n\n# 转换为张量\nfeatures_standardized_tensor\
    \ = torch.from_numpy(features)\n\n# 显示特征\nfeatures_standardized_tensor\n```\n\n\
    ### 讨论\n\n虽然这个方法与方法 4.2 非常相似，但由于其对神经网络的重要性，值得重复说明。通常，神经网络的参数被初始化（即创建）为小的随机数。当特征值远大于参数值时，神经网络通常表现不佳。此外，由于一个观测值的特征值在通过各个单元时会被组合，因此所有特征具有相同的尺度非常重要。\n\
    \n基于这些原因，最佳实践（尽管并非总是必要；例如，当我们所有特征都是二元时）是标准化每个特征，使得特征值的均值为 0，标准差为 1。这可以使用 scikit-learn\
    \ 的 StandardScaler 轻松完成。\n\n然而，如果你需要在创建了 `requires_grad=True` 的张量后执行此操作，你需要在 PyTorch\
    \ 中原生地完成，以免破坏计算图。虽然你通常会在开始训练网络之前标准化特征，但了解如何在 PyTorch 中完成同样的事情是值得的：\n\n```python\n\
    # 加载库\nimport torch\n\n# 创建特征\ntorch_features = torch.tensor([[-100.1, 3240.1],\n\
    \                               [-200.2, -234.1],\n                          \
    \     [5000.5, 150.1],\n                               [6000.6, -125.1],\n   \
    \                            [9000.9, -673.1]], requires_grad=True)\n\n# 计算均值和标准差\n\
    mean = torch_features.mean(0, keepdim=True)\nstandard_deviation = torch_features.std(0,\
    \ unbiased=False, keepdim=True)\n\n# 使用均值和标准差标准化特征\ntorch_features_standardized\
    \ = torch_features - mean\ntorch_features_standardized /= standard_deviation\n\
    \n# 显示标准化后的特征\ntorch_features_standardized\n```\n\n```\ntensor([[-1.1254,  1.9643],\n\
    \        [-1.1533, -0.5007],\n        [ 0.2953, -0.2281],\n        [ 0.5739, -0.4234],\n\
    \        [ 1.4096, -0.8122]], grad_fn=<DivBackward0>)\n```\n\n## 21.3 设计神经网络\n\
    \n### 问题\n\n你想设计一个神经网络。\n\n### 解决方案\n\n使用 PyTorch 的 `nn.Module` 类来定义一个简单的神经网络架构：\n\
    \n```python\n# 导入库\nimport torch\nimport torch.nn as nn\n\n# 定义一个神经网络\nclass SimpleNeuralNet(nn.Module):\n\
    \    def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n  \
    \      self.fc1 = nn.Linear(10, 16)\n        self.fc2 = nn.Linear(16, 16)\n  \
    \      self.fc3 = nn.Linear(16, 1)\n\n    def forward(self, x):\n        x = nn.functional.relu(self.fc1(x))\n\
    \        x = nn.functional.relu(self.fc2(x))\n        x = nn.functional.sigmoid(self.fc3(x))\n\
    \        return x\n\n# 初始化神经网络\nnetwork = SimpleNeuralNet()\n\n# 定义损失函数、优化器\n\
    loss_criterion = nn.BCELoss()\noptimizer = torch.optim.RMSprop(network.parameters())\n\
    \n# 显示网络\nnetwork\n```\n\n```\nSimpleNeuralNet(\n  (fc1): Linear(in_features=10,\
    \ out_features=16, bias=True)\n  (fc2): Linear(in_features=16, out_features=16,\
    \ bias=True)\n  (fc3): Linear(in_features=16, out_features=1, bias=True)\n)\n\
    ```\n\n### 讨论\n\n神经网络由单元层组成。然而，层的类型以及它们如何组合形成网络架构的方式有着惊人的多样性。虽然存在常用的架构模式（我们将在本章中介绍），但事实是选择正确的架构主要是一门艺术，也是许多研究的主题。\n\
    \n要在 PyTorch 中构建一个前馈神经网络，我们需要对网络架构和训练过程做出许多选择。请记住，隐藏层中的每个单元：\n\n1.  接收一定数量的输入。\n\
    2.  通过一个参数值对每个输入进行加权。\n3.  将所有加权输入与一些偏置（通常为 0）求和。\n4.  最常应用某个函数（称为*激活函数*）。\n5.\
    \  将输出发送到下一层的单元。\n\n首先，对于隐藏层和输出层中的每一层，我们必须定义该层中包含的单元数量和激活函数。总体而言，一层中的单元越多，我们的网络能够学习的模式就越复杂。然而，更多的单元可能会使我们的网络对训练数据过拟合，从而损害测试数据上的性能。\n\
    \n对于隐藏层，一个流行的激活函数是*修正线性单元*（ReLU）：\n\n$$f(z) = \\max(0, z)$$\n\n其中 $z$ 是加权输入和偏置的总和。我们可以看到，如果\
    \ $z$ 大于 0，激活函数返回 $z$；否则，函数返回 0。这个简单的激活函数具有许多理想的特性（其讨论超出了本书的范围），这使其成为神经网络中的流行选择。然而，我们应该意识到存在数十种激活函数。\n\
    \n其次，我们需要定义网络中使用的隐藏层数量。更多的层允许网络学习更复杂的关系，但计算成本更高。\n\n第三，我们必须定义输出层的激活函数（如果有）的结构。输出函数的性质通常由网络的目标决定。以下是一些常见的输出层模式：\n\
    \n- *二元分类*：一个具有 sigmoid 激活函数的单元\n- *多类分类*：$k$ 个单元（其中 $k$ 是目标类的数量）和一个 softmax 激活函数\n\
    - *回归*：一个没有激活函数的单元\n\n第四，我们需要定义一个损失函数（衡量预测值与真实值匹配程度的函数）；同样，这通常由问题类型决定：\n\n- *二元分类*：二元交叉熵\n\
    - *多类分类*：分类交叉熵\n- *回归*：均方误差\n\n第五，我们必须定义一个优化器，直观上可以将其视为我们“四处走动”以找到产生最低误差的参数值的策略。优化器的常见选择是随机梯度下降、带动量的随机梯度下降、均方根传播和自适应矩估计（有关这些优化器的更多信息，请参见第\
    \ 333 页的“另请参阅”）。\n\n第六，我们可以选择一个或多个指标来评估性能，例如准确率。\n\n在我们的示例中，我们使用 `torch.nn.Module`\
    \ 命名空间来组合一个简单的、顺序的神经网络，该网络可以进行二元分类。PyTorch 的标准方法是创建一个继承自 `torch.nn.Module` 类的子类，在\
    \ `__init__` 方法中实例化网络架构，并在类的 `forward` 方法中定义我们希望在每次前向传播时执行的数学运算。在 PyTorch 中定义网络的方法有很多，虽然在本例中我们对激活函数使用了函数式方法（如\
    \ `nn.functional.relu`），但也可以将这些激活函数定义为层。如果我们想将网络中的所有内容都组合为一个层，我们可以使用 `Sequential`\
    \ 类：\n\n```python\n# 导入库\nimport torch\n\n# 使用 `Sequential` 定义一个神经网络\nclass SimpleNeuralNet(nn.Module):\n\
    \    def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n  \
    \      self.sequential = torch.nn.Sequential(\n            torch.nn.Linear(10,\
    \ 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,16),\n  \
    \          torch.nn.ReLU(),\n            torch.nn.Linear(16, 1),\n           \

    \ observations in each class.\n\n### See Also\n\n- Precision and recall, Wikipedia\n\
    \n## 11.13 Visualizing the Effect of Hyperparameter Values\n\n### Problem\n\n\
    You want to understand how the performance of a model changes as the value of\
    \ some hyperparameter changes.\n\n### Solution\n\nPlot the hyperparameter against\
    \ the model accuracy (validation curve):\n\n```python\n# Load libraries\nimport\
    \ matplotlib.pyplot as plt\nimport numpy as np\nfrom sklearn.datasets import load_digits\n\
    from sklearn.ensemble import RandomForestClassifier\nfrom sklearn.model_selection\
    \ import validation_curve\n\n# Load data\ndigits = load_digits()\n\n# Create feature\
    \ matrix and target vector\nfeatures, target = digits.data, digits.target\n\n\
    # Create range of values for parameter\nparam_range = np.arange(1, 250, 2)\n\n\
    # Calculate accuracy on training and test set using range of parameter values\n\
    train_scores, test_scores = validation_curve(\n    # Classifier\n    RandomForestClassifier(),\n\
    \    # Feature matrix\n    features,\n    # Target vector\n    target,\n    #\
    \ Hyperparameter to examine\n    param_name=\"n_estimators\",\n    # Range of\
    \ hyperparameter's values\n    param_range=param_range,\n    # Number of folds\n\
    \    cv=3,\n    # Performance metric\n    scoring=\"accuracy\",\n    # Use all\
    \ computer cores\n    n_jobs=-1)\n```"
  mdcn: "## 另请参阅\n\n- scikit-learn 文档：silhouette_score\n\n## 11.10 创建自定义评估指标\n\n###\
    \ 问题\n\n你想使用自己创建的指标来评估模型。\n\n### 解决方案\n\n将指标创建为一个函数，并使用 scikit-learn 的 `make_scorer`\
    \ 将其转换为评分器函数：\n\n```python\n# 加载库\nfrom sklearn.metrics import make_scorer, r2_score\n\
    from sklearn.model_selection import train_test_split\nfrom sklearn.linear_model\
    \ import Ridge\nfrom sklearn.datasets import make_regression\n\n# 生成特征矩阵和目标向量\n\
    features, target = make_regression(n_samples=100,\n                          \
    \         n_features=3,\n                                   random_state=1)\n\n\
    # 创建训练集和测试集\nfeatures_train, features_test, target_train, target_test = train_test_split(\n\
    \    features, target, test_size=0.10, random_state=1)\n\n# 创建自定义指标\ndef custom_metric(target_test,\
    \ target_predicted):\n    # 计算 R 平方分数\n    r2 = r2_score(target_test, target_predicted)\n\
    \    # 返回 R 平方分数\n    return r2\n\n# 创建评分器并定义分数越高越好\nscore = make_scorer(custom_metric,\
    \ greater_is_better=True)\n\n# 创建岭回归对象\nclassifier = Ridge()\n\n# 训练岭回归模型\nmodel\
    \ = classifier.fit(features_train, target_train)\n\n# 应用自定义评分器\nscore(model, features_test,\

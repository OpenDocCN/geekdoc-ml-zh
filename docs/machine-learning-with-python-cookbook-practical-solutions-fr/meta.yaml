    \     |           |        | 0.97     | 38      |\n| macro avg    | 0.97     \
    \ | 0.97   | 0.97     | 38      |\n| weighted avg | 0.98      | 0.97   | 0.97\
    \     | 38      |\n\n### Discussion\n\n`classification_report` provides a quick\
    \ means for us to see some common evaluation metrics, including precision, recall,\

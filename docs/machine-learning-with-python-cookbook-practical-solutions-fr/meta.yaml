    \ scores examine if, when we group the numerical feature by the target vector,\
    \ the means for each group are significantly different. For example, if we had\
    \ a binary target vector, gender, and a quantitative feature, test scores, the\
    \ F-value score would tell us if the mean test score for men is different than\
    \ the mean test score for women. If it is not, then test score doesn't help us\
    \ predict gender and therefore the feature is irrelevant.\n\n## 10.5 Recursively\
    \ Eliminating Features\n\n### Problem\n\nYou want to automatically select the\

    # Discussion


    The data we need to use is often complex; it doesn''t always come in one piece.
    Instead, in the real world, we''re usually faced with disparate datasets from
    multiple database queries or files. To get all that data into one place, we can
    load each data query or data file into pandas as individual DataFrames and then
    merge them into a single DataFrame.


    This process might be familiar to anyone who has used SQL, a popular language
    for doing merging operations (called *joins*). While the exact parameters used
    by pandas will be different, they follow the same general patterns used by other
    software languages and tools.


    There are three aspects to specify with any `merge` operation. First, we have
    to specify the two DataFrames we want to merge. In the solution, we named them
    `dataframe_employees` and `dataframe_sales`. Second, we have to specify the name(s)
    of the columns to merge on—that is, the columns whose values are shared between
    the two DataFrames. For example, in our solution both DataFrames have a column
    named `employee_id`. To merge the two DataFrames we will match the values in each
    DataFrame''s `employee_id` column. If these two columns use the same name, we
    can use the `on` parameter. However, if they have different names, we can use
    `left_on` and `right_on`.


    What is the left and right DataFrame? The left DataFrame is the first one we specified
    in `merge`, and the right DataFrame is the second one. This language comes up
    again in the next sets of parameters we will need.


    The last aspect, and most difficult for some people to grasp, is the type of merge
    operation we want to conduct. This is specified by the `how` parameter. `merge`
    supports the four main types of joins:


    *Inner*

    Return only the rows that match in both DataFrames (e.g., return any row with
    an `employee_id` value appearing in both `dataframe_employees` and `dataframe_sales`).


    *Outer*

    Return all rows in both DataFrames. If a row exists in one DataFrame but not in
    the other DataFrame, fill NaN values for the missing values (e.g., return all
    rows in both `dataframe_employee` and `dataframe_sales`).'

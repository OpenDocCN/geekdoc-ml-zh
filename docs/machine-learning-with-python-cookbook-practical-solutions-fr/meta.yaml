    \ 0 |\n| 2 | 3 | 1 |\n\n# Discussion\n\nOne problem we often run into in machine\
    \ learning is highly correlated features. If two features are highly correlated,\
    \ then the information they contain is very similar, and it is likely redundant\
    \ to include both features. In the case of simple models like linear regression,\
    \ failing to remove such features violates the assumptions of linear regression\

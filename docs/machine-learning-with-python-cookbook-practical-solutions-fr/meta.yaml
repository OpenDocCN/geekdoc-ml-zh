    # Discussion


    In support vector machines, $C$ is a hyperparameter that determines the penalty
    for misclassifying an observation. One method for handling imbalanced classes
    in support vector machines is to weight $C$ by classes, so that:


    $C_k = C \times w_j$


    where $C$ is the penalty for misclassification, $w_j$ is a weight inversely proportional
    to class $j$''s frequency, and $C_k$ is the $C$ value for class $k$. The general
    idea is to increase the penalty for misclassifying minority classes to prevent
    them from being “overwhelmed” by the majority class.


    In scikit-learn, when using SVC we can set the values for $C_k$ automatically
    by setting class_weight="balanced". The balanced argument automatically weighs
    classes such that:


    $w_j = \frac{n}{k n_j}$


    where $w_j$ is the weight to class $j$, $n$ is the number of observations, $n_j$
    is the number of observations in class $j$, and $k$ is the total number of classes.'

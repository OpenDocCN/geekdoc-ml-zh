    \    [\n        [1],\n        [2],\n        [3]\n    ]\n)\n```\n\n# Discussion\n\
    \nThe main data structure within PyTorch is a tensor, and in many ways tensors\
    \ are exactly like the multidimensional NumPy arrays used in Chapter 1. Just like\
    \ vectors and arrays, these tensors can be represented horizontally (i.e., rows)\
    \ or vertically (i.e., columns).\n\n# See Also\n\n+   - PyTorch documentation:\
    \ Tensors\n\n# 20.2 Creating a Tensor from NumPy\n\n# Problem\n\nYou need to create\
    \ PyTorch tensors from NumPy arrays.\n\n# Solution\n\nUse the PyTorch `from_numpy`\
    \ function:\n\n```\n# Import libraries\nimport numpy as np\nimport torch\n\n#\
    \ Create a NumPy array\nvector_row = np.array([1, 2, 3])\n\n# Create a tensor\
    \ from a NumPy array\ntensor_row = torch.from_numpy(vector_row)\n```\n\n# Discussion\n\
    \nAs we can see, PyTorch is very similar to NumPy syntactically. In addition,\
    \ it easily allows us to convert NumPy arrays to PyTorch tensors that we can use\
    \ on GPUs and other accelerated hardware. At the time of writing, NumPy is mentioned\
    \ frequently in the PyTorch documentation, and PyTorch itself even offers a way\
    \ that PyTorch tensors and NumPy arrays can share the same memory to reduce overhead."

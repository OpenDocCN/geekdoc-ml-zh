- md: "The text data in our solution was purposely small. In the real world, a single\
    \ observation of text data could be the contents of an entire book! Since our\
    \ bag-of-words model creates a feature for every unique word in the data, the\
    \ resulting matrix can contain thousands of features. This means the size of the\
    \ matrix can sometimes become very large in memory. Luckily, we can exploit a\
    \ common characteristic of bag-of-words feature matrices to reduce the amount\
    \ of data we need to store.\n\nMost words likely do not occur in most observations,\
    \ and therefore bag-of-words feature matrices will contain mostly 0s as values.\
    \ We call these types of matrices *sparse*. Instead of storing all values of the\
    \ matrix, we can store only nonzero values and then assume all other values are\
    \ 0. This will save memory when we have large feature matrices. One of the nice\
    \ features of `CountVectorizer` is that the output is a sparse matrix by default.\n\
    \n`CountVectorizer` comes with a number of useful parameters to make it easy to\
    \ create bag-of-words feature matrices. First, while by default every feature\
    \ is a word, that does not have to be the case. Instead we can set every feature\
    \ to be the combination of two words (called a 2-gram) or even three words (3-gram).\
    \ `ngram_range` sets the minimum and maximum size of our *n*-grams. For example,\
    \ `(2,3)` will return all 2-grams and 3-grams. Second, we can easily remove low-information\
    \ filler words by using `stop_words`, either with a built-in list or a custom\
    \ list. Finally, we can restrict the words or phrases we want to consider to a\
    \ certain list of words using `vocabulary`. For example, we could create a bag-of-words\
    \ feature matrix only for occurrences of country names:\n\n```python\n# Create\
    \ feature matrix with arguments\ncount_2gram = CountVectorizer(ngram_range=(1,2),\n\
    \                               stop_words=\"english\",\n                    \
    \           vocabulary=['brazil'])\nbag = count_2gram.fit_transform(text_data)\n\
    \n# View feature matrix\nbag.toarray()\n\narray([[2],\n       [0],\n       [0]])\n\
    \n# View the 1-grams and 2-grams\ncount_2gram.vocabulary_\n\n{'brazil': 0}\n```\n\
    \n# See Also\n\n- *n*-gram, Wikipedia\n- Bag of Words Meets Bags of Popcorn\n\n\
    ## 6.10 Weighting Word Importance\n\n### Problem\n\nYou want a bag of words with\
    \ words weighted by their importance to an observation.\n\n### Solution\n\nCompare\
    \ the frequency of the word in a document (a tweet, movie review, speech transcript,\
    \ etc.) with the frequency of the word in all other documents using term frequency-inverse\
    \ document frequency (tf-idf). scikit-learn makes this easy with TfidfVectorizer:\n\
    \n```python\n# Load libraries\nimport numpy as np\nfrom sklearn.feature_extraction.text\
    \ import TfidfVectorizer\n\n# Create text\ntext_data = np.array(['I love Brazil.\
    \ Brazil!',\n                      'Sweden is best',\n                      'Germany\
    \ beats both'])\n\n# Create the tf-idf feature matrix\ntfidf = TfidfVectorizer()\n\
    feature_matrix = tfidf.fit_transform(text_data)\n\n# Show tf-idf feature matrix\n\
    feature_matrix\n<3x8 sparse matrix of type '<class 'numpy.float64'>'\n    with\
    \ 8 stored elements in Compressed Sparse Row format>\n```\n\nJust as in Recipe\
    \ 6.9, the output is a sparse matrix. However, if we want to view the output as\
    \ a dense matrix, we can use toarray:\n\n```python\n# Show tf-idf feature matrix\
    \ as dense matrix\nfeature_matrix.toarray()\narray([[ 0.        ,  0.        ,\
    \  0.        ,  0.89442719,  0.        ,\n        0.        ,  0.4472136 ,  0.\
    \        ],\n       [ 0.        ,  0.57735027,  0.        ,  0.        ,  0. \
    \       ,\n        0.57735027,  0.        ,  0.57735027],\n       [ 0.57735027,\
    \  0.        ,  0.57735027,  0.        ,  0.57735027,\n        0.        ,  0.\
    \        ,  0.        ]])\n```\n\nvocabulary_ shows us the word of each feature:\n\
    \n```python\n# Show feature names\ntfidf.vocabulary_\n{'love': 6,\n 'brazil':\
    \ 3,\n 'sweden': 7,\n 'is': 5,\n 'best': 1,\n 'germany': 4,\n 'beats': 0,\n 'both':\
    \ 2}\n```\n\n### Discussion\n\nThe more a word appears in a document, the more\
    \ likely it is that the word is important to that document. For example, if the\
    \ word *economy* appears frequently, it is evidence that the document might be\
    \ about economics. We call this *term frequency* (*tf*).\n\nIn contrast, if a\
    \ word appears in many documents, it is likely less important to any individual\
    \ document. For example, if every document in some text data contains the word\
    \ *after* then it is probably an unimportant word. We call this *document frequency*\
    \ (*df*).\n\nBy combining these two statistics, we can assign a score to every\
    \ word representing how important that word is in a document. Specifically, we\
    \ multiply *tf* to the inverse of document frequency (*idf*):\n\n$tf\\text{-}idf(t,\
    \ d) = tf(t, d) \\times idf(t)$\n\nwhere $t$ is a word (term) and $d$ is a document.\
    \ There are a number of variations in how $tf$ and $idf$ are calculated. In scikit-learn,\
    \ $tf$ is simply the number of times a word appears in the document, and $idf$\
    \ is calculated as:\n\n$idf(t) = \\log \\frac{1 + n_d}{1 + df(d, t)} + 1$\n\n\
    where $n_d$ is the number of documents, and $df(d, t)$ is term $t$'s document\
    \ frequency (i.e., the number of documents where the term appears).\n\nBy default,\
    \ scikit-learn then normalizes the $tf\\text{-}idf$ vectors using the Euclidean\
    \ norm (L2 norm). The higher the resulting value, the more important the word\
    \ is to a document.\n\n### See Also\n\n- scikit-learn documentation: *tf-idf*\
    \ term weighting\n\n## 6.11 Using Text Vectors to Calculate Text Similarity in\
    \ a Search Query\n\n### Problem\n\nYou want to use *tf-idf* vectors to implement\
    \ a text search function in Python.\n\n### Solution\n\nCalculate the cosine similarity\
    \ between *tf-idf* vectors using scikit-learn:\n\n```python\n# Load libraries\n\
    import numpy as np\nfrom sklearn.feature_extraction.text import TfidfVectorizer\n\
    from sklearn.metrics.pairwise import linear_kernel\n\n# Create searchable text\
    \ data\ntext_data = np.array(['I love Brazil. Brazil!',\n                    \
    \  'Sweden is best',\n                      'Germany beats both'])\n\n# Create\
    \ the tf-idf feature matrix\ntfidf = TfidfVectorizer()\nfeature_matrix = tfidf.fit_transform(text_data)\n\
    \n# Create a search query and transform it into a tf-idf vector\ntext = \"Brazil\
    \ is the best\"\nvector = tfidf.transform([text])\n\n# Calculate the cosine similarities\
    \ between the input vector and all other vectors\ncosine_similarities = linear_kernel(vector,\
    \ feature_matrix).flatten()\n\n# Get the index of the most relevent items in order\n\
    related_doc_indicies = cosine_similarities.argsort()[:-10:-1]\n\n# Print the most\
    \ similar texts to the search query along with the cosine similarity\nprint([(text_data[i],\
    \ cosine_similarities[i]) for i in related_doc_indicies])\n```\n\n```\n[\n  (\n\
    \    'Sweden is best', 0.6666666666666666),\n    ('I love Brazil. Brazil!', 0.5163977794943222),\n\
    \    ('Germany beats both', 0.0\n    )\n]\n```\n\n### Discussion\n\nText vectors\
    \ are incredibly useful for NLP use cases such as search engines. After calculating\
    \ the tf-idf vectors of a set of sentences or documents, we can use the same tfidf\
    \ object to vectorize future sets of text. Then, we can compute cosine similarity\
    \ between our input vector and the matrix of other vectors and sort by the most\
    \ relevant documents.\n\nCosine similarities take on the range of [0, 1.0], with\
    \ 0 being least similar and 1 being most similar. Since we’re using tf-idf vectors\
    \ to compute the similarity between vectors, the frequency of a word’s occurrence\
    \ is also taken into account. However, with a small corpus (set of documents)\
    \ even “frequent” words may not appear frequently. In this example, “Sweden is\
    \ best” is the most relevant text to our search query “Brazil is the best”. Since\
    \ the query mentions Brazil, we might expect “I love Brazil. Brazil!” to be the\
    \ most relevant; however, “Sweden is best” is the most similar due to the words\
    \ “is” and “best”. As the number of documents we add to our corpus increases,\
    \ less important words will be weighted less and have less effect on our cosine\
    \ similarity calculation.\n\n### See Also\n\n- Cosine Similarity, Geeks for Geeks\n\
    - Nvidia Gave Me a $15K Data Science Workstation—Here’s What I Did with It (building\
    \ a Pubmed search engine in Python)\n\n## 6.12 Using a Sentiment Analysis Classifier\n\
    \n### Problem\n\nYou want to classify the sentiment of some text to use as a feature\
    \ or in downstream data analysis.\n\n### Solution\n\nUse the transformers library’s\
    \ sentiment classifier.\n\n```python\n# Import libraries\nfrom transformers import\
    \ pipeline\n\n# Create an NLP pipeline that runs sentiment analysis\nclassifier\
    \ = pipeline(\"sentiment-analysis\")\n\n# Classify some text\n# (this may download\
    \ some data and models the first time you run it)\nsentiment_1 = classifier(\"\
    I hate machine learning! It's the absolute worst.\")\nsentiment_2 = classifier(\n\
    \    \"Machine learning is the absolute\n```"
  mdcn: "我们解决方案中的文本数据特意设置得较小。在现实世界中，单条文本数据的观察值可能是一整本书的内容！由于我们的词袋模型为数据中的每个独特单词创建一个特征，因此生成的矩阵可能包含数千个特征。这意味着矩阵的大小有时在内存中会变得非常大。幸运的是，我们可以利用词袋特征矩阵的一个常见特性来减少需要存储的数据量。\n\
    \n大多数单词可能不会出现在大多数观察值中，因此词袋特征矩阵将主要包含0值。我们称这类矩阵为*稀疏*矩阵。我们不必存储矩阵的所有值，而可以只存储非零值，并假设所有其他值为0。这将在我们拥有大型特征矩阵时节省内存。`CountVectorizer`的一个优点是其输出默认就是稀疏矩阵。\n\
    \n`CountVectorizer`提供了许多有用的参数，使得创建词袋特征矩阵变得容易。首先，虽然默认情况下每个特征是一个单词，但这并非必须。相反，我们可以将每个特征设置为两个单词的组合（称为2-gram）甚至三个单词（3-gram）。`ngram_range`设置了我们*n*-gram的最小和最大大小。例如，`(2,3)`将返回所有2-gram和3-gram。其次，我们可以使用`stop_words`轻松移除低信息量的填充词，可以使用内置列表或自定义列表。最后，我们可以使用`vocabulary`将要考虑的单词或短语限制在特定的单词列表中。例如，我们可以仅为国家名称的出现创建一个词袋特征矩阵：\n\
    \n```python\n# Create feature matrix with arguments\ncount_2gram = CountVectorizer(ngram_range=(1,2),\n\
    \                               stop_words=\"english\",\n                    \
    \           vocabulary=['brazil'])\nbag = count_2gram.fit_transform(text_data)\n\
    \n# View feature matrix\nbag.toarray()\n\narray([[2],\n       [0],\n       [0]])\n\
    \n# View the 1-grams and 2-grams\ncount_2gram.vocabulary_\n\n{'brazil': 0}\n```\n\
    \n# 另请参阅\n\n- *n*-gram，维基百科\n- Bag of Words Meets Bags of Popcorn\n\n## 6.10 为单词重要性加权\n\
    \n### 问题\n\n你想要一个根据单词对观察值的重要性进行加权的词袋。\n\n### 解决方案\n\n使用词频-逆文档频率（tf-idf）来比较单词在文档（一条推文、电影评论、演讲稿等）中的频率与该单词在所有其他文档中的频率。scikit-learn通过TfidfVectorizer使这变得简单：\n\
    \n```python\n# Load libraries\nimport numpy as np\nfrom sklearn.feature_extraction.text\
    \ import TfidfVectorizer\n\n# Create text\ntext_data = np.array(['I love Brazil.\
    \ Brazil!',\n                      'Sweden is best',\n                      'Germany\
    \ beats both'])\n\n# Create the tf-idf feature matrix\ntfidf = TfidfVectorizer()\n\
    feature_matrix = tfidf.fit_transform(text_data)\n\n# Show tf-idf feature matrix\n\
    feature_matrix\n<3x8 sparse matrix of type '<class 'numpy.float64'>'\n    with\
    \ 8 stored elements in Compressed Sparse Row format>\n```\n\n正如在配方6.9中一样，输出是一个稀疏矩阵。但是，如果我们想以稠密矩阵的形式查看输出，可以使用toarray：\n\
    \n```python\n# Show tf-idf feature matrix as dense matrix\nfeature_matrix.toarray()\n\
    array([[ 0.        ,  0.        ,  0.        ,  0.89442719,  0.        ,\n   \
    \     0.        ,  0.4472136 ,  0.        ],\n       [ 0.        ,  0.57735027,\
    \  0.        ,  0.        ,  0.        ,\n        0.57735027,  0.        ,  0.57735027],\n\
    \       [ 0.57735027,  0.        ,  0.57735027,  0.        ,  0.57735027,\n  \
    \      0.        ,  0.        ,  0.        ]])\n```\n\nvocabulary_向我们展示了每个特征对应的单词：\n\
    \n```python\n# Show feature names\ntfidf.vocabulary_\n{'love': 6,\n 'brazil':\
    \ 3,\n 'sweden': 7,\n 'is': 5,\n 'best': 1,\n 'germany': 4,\n 'beats': 0,\n 'both':\
    \ 2}\n```\n\n### 讨论\n\n一个单词在文档中出现的次数越多，该单词对该文档就越重要。例如，如果单词*economy*频繁出现，这表明该文档可能是关于经济学的。我们称之为*词频*（*tf*）。\n\
    \n相反，如果一个单词出现在许多文档中，它对任何单个文档的重要性可能就越低。例如，如果某些文本数据中的每个文档都包含单词*after*，那么它可能是一个不重要的词。我们称之为*文档频率*（*df*）。\n\
    \n通过结合这两个统计量，我们可以为每个单词分配一个分数，表示该单词在文档中的重要性。具体来说，我们将*tf*乘以文档频率的倒数（*idf*）：\n\n$tf\\\
    text{-}idf(t, d) = tf(t, d) \\times idf(t)$\n\n其中$t$是一个单词（术语），$d$是一个文档。计算$tf$和$idf$有多种变体。在scikit-learn中，$tf$就是单词在文档中出现的次数，而$idf$计算如下：\n\
    \n$idf(t) = \\log \\frac{1 + n_d}{1 + df(d, t)} + 1$\n\n其中$n_d$是文档数量，$df(d, t)$是术语$t$的文档频率（即该术语出现的文档数量）。\n\
    \n默认情况下，scikit-learn随后使用欧几里得范数（L2范数）对$tf\\text{-}idf$向量进行归一化。结果值越高，该单词对文档就越重要。\n\
    \n### 另请参阅\n\n- scikit-learn文档：*tf-idf*术语加权\n\n## 6.11 使用文本向量计算搜索查询中的文本相似度\n\n\
    ### 问题\n\n你想使用*tf-idf*向量在Python中实现文本搜索功能。\n\n### 解决方案\n\n使用scikit-learn计算*tf-idf*向量之间的余弦相似度：\n\
    \n```python\n# Load libraries\nimport numpy as np\nfrom sklearn.feature_extraction.text\
    \ import TfidfVectorizer\nfrom sklearn.metrics.pairwise import linear_kernel\n\
    \n# Create searchable text data\ntext_data = np.array(['I love Brazil. Brazil!',\n\
    \                      'Sweden is best',\n                      'Germany beats\
    \ both'])\n\n# Create the tf-idf feature matrix\ntfidf = TfidfVectorizer()\nfeature_matrix\
    \ = tfidf.fit_transform(text_data)\n\n# Create a search query and transform it\
    \ into a tf-idf vector\ntext = \"Brazil is the best\"\nvector = tfidf.transform([text])\n\
    \n# Calculate the cosine similarities between the input vector and all other vectors\n\
    cosine_similarities = linear_kernel(vector, feature_matrix).flatten()\n\n# Get\
    \ the index of the most relevent items in order\nrelated_doc_indicies = cosine_similarities.argsort()[:-10:-1]\n\
    \n# Print the most similar texts to the search query along with the cosine similarity\n\
    print([(text_data[i], cosine_similarities[i]) for i in related_doc_indicies])\n\
    ```\n\n```\n[\n  (\n    'Sweden is best', 0.6666666666666666),\n    ('I love Brazil.\
    \ Brazil!', 0.5163977794943222),\n    ('Germany beats both', 0.0\n    )\n]\n```\n\
    \n### 讨论\n\n文本向量对于搜索引擎等自然语言处理用例非常有用。在计算了一组句子或文档的tf-idf向量后，我们可以使用相同的tfidf对象来向量化未来的文本集。然后，我们可以计算输入向量与其他向量矩阵之间的余弦相似度，并按最相关的文档排序。\n\
    \n余弦相似度的范围是[0, 1.0]，其中0表示最不相似，1表示最相似。由于我们使用tf-idf向量来计算向量之间的相似度，因此也考虑了单词出现的频率。然而，对于小型语料库（文档集），即使是“频繁”出现的单词也可能不经常出现。在这个例子中，“Sweden\
    \ is best”是与我们的搜索查询“Brazil is the best”最相关的文本。由于查询提到了巴西，我们可能期望“I love Brazil.\
    \ Brazil!”是最相关的；然而，“Sweden is best”由于单词“is”和“best”而成为最相似的。随着我们向语料库添加的文档数量增加，不太重要的单词的权重会降低，对我们余弦相似度计算的影响也会减小。\n\

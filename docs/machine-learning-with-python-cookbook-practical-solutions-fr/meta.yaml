  md: '# # 16.2 Training a Multiclass Classifier


    # ## Problem


    Given more than two classes, you need to train a classifier model.


    # ## Solution


    Train a logistic regression in scikit-learn with LogisticRegression using one-vs-rest
    or multinomial methods:


    ```

    # Load libraries

    from sklearn.linear_model import LogisticRegression

    from sklearn import datasets

    from sklearn.preprocessing import StandardScaler


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Standardize features

    scaler = StandardScaler()

    features_standardized = scaler.fit_transform(features)


    # Create one-vs-rest logistic regression object

    logistic_regression = LogisticRegression(random_state=0, multi_class="ovr")


    # Train model

    model = logistic_regression.fit(features_standardized, target)

    ```


    # ## Discussion


    On their own, logistic regressions are only binary classifiers, meaning they cannot
    handle target vectors with more than two classes. However, two clever extensions
    to logistic regression do just that. First, in *one-vs-rest* logistic regression
    (OvR) a separate model is trained for each class predicted, whether an observation
    is that class or not (thus making it a binary classification problem). It assumes
    that each classification problem (e.g., class 0 or not) is independent.


    Alternatively, in *multinomial logistic regression* (MLR), the logistic function
    we saw in Recipe 16.1 is replaced with a softmax function:


    $$P(y_i = k \mid X) = \frac{e^{\beta_k x_i}}{\sum_{j=1}^K e^{\beta_j x_i}}$$'

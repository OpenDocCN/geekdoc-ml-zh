    plt.scatter(features_standardized[:,0], features_standardized[:,1], c=color)


    # Create the hyperplane

    w = svc.coef_[0]

    a = -w[0] / w[1]

    xx = np.linspace(-2.5, 2.5)

    yy = a * xx - (svc.intercept_[0]) / w[1]


    # Plot the hyperplane

    plt.plot(xx, yy)

    plt.axis("off"), plt.show();

    ```'

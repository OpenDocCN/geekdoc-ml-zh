    # 11.9 Evaluating Clustering Models


    # Problem


    You have used an unsupervised learning algorithm to cluster your data. Now you
    want to know how well it did.


    # Solution


    Use silhouette coefficients to measure the quality of the clusters (note that
    this does not measure predictive performance):


    ```

    # Load libraries

    import numpy as np

    from sklearn.metrics import silhouette_score

    from sklearn import datasets

    from sklearn.cluster import KMeans

    from sklearn.datasets import make_blobs


    \ 有许多内置指标用于评估模型性能，但定义我们自己的指标通常很有用。scikit-learn 使用 `make_scorer` 使这变得简单。首先，我们定义一个函数，它接受两个参数——真实目标向量和我们的预测值——并输出某个分数。其次，我们使用\
    \ `make_scorer` 创建一个评分器对象，确保指定分数是越高越好还是越低越好（使用 `greater_is_better` 参数）。\n\n解决方案中的自定义指标（`custom_metric`）是一个简单的示例，因为它只是包装了一个用于计算\
    \ $R^2$ 分数的内置指标。在实际情况下，我们会用任何我们想要的自定义指标替换 `custom_metric` 函数。然而，通过将结果与 scikit-learn\
    \ 的 `r2_score` 内置方法进行比较，我们可以看到计算 $R^2$ 的自定义指标确实有效：\n\n```python\n# 预测值\ntarget_predicted\
    \ = model.predict(features_test)\n\n# 计算 R 平方分数\nr2_score(target_test, target_predicted)\n\
    ```\n\n```\n0.9997906102882058\n```\n\n### 另请参阅\n\n- scikit-learn 文档：`make_scorer`\n\
    \n## 11.11 可视化训练集大小的影响\n\n### 问题\n\n你想评估训练集中观测值数量对某个指标（准确率、$F_1$ 等）的影响。\n\n###\
    \ 解决方案\n\n绘制准确率与训练集大小的关系图：\n\n```python\n# 加载库\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.datasets\
    \ import load_digits\nfrom sklearn.model_selection import learning_curve\n\n#\

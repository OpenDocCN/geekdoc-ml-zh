    \ prior probabilities for each class. If we want to specify a uniform prior, we\
    \ can set `fit_prior=False`:\n\n```python\nmodel_uniform_prior = BernoulliNB(class_prior=None,\
    \ fit_prior=False)\n```\n\n## 18.4 Calibrating Predicted Probabilities\n\n###\
    \ Problem\n\nYou want to calibrate the predicted probabilities from naive Bayes\

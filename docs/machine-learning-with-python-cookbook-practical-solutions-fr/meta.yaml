    # Discussion


    DummyRegressor allows us to create a very simple model that we can use as a baseline
    to compare against any other models that we train. This can often be useful to
    simulate a “naïve” existing prediction process in a product or system. For example,
    a product might have been originally hardcoded to assume that all new users will
    spend $100 in the first month, regardless of their features. If we encode that
    assumption into a baseline model, we are able to concretely state the benefits
    of using a machine learning approach by comparing the dummy model’s score with
    that of a trained model.


    DummyRegressor uses the strategy parameter to set the method of making predictions,
    including the mean or median value in the training set. Furthermore, if we set
    strategy to constant and use the constant parameter, we can set the dummy regressor
    to predict some constant value for every observation:


    ```

    # Create dummy regressor that predicts 1s for everything

    clf = DummyRegressor(strategy=''constant'', constant=1)

    clf.fit(features_train, target_train)


    # Evaluate score

    clf.score(features_test, target_test)


    -0.06299212598425186

    ```


    One small note regarding score. By default, score returns the coefficient of determination
    (R-squared, $R^2$) score:


    $$R^2 = 1 - \frac{\sum_i (y_i - \hat{y}_i)^2}{\sum_i (y_i - \bar{y})^2}$$


    where $y_i$ is the true value of the target observation, $\hat{y}_i$ is the predicted
    value, and $\bar{y}$ is the mean value for the target vector.


    The closer $R^2$ is to 1, the more of the variance in the target vector that is
    explained by the features.'

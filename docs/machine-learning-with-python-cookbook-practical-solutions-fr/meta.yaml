    | 1307 Zabour, Miss Tamini | 3rd | NaN | female | 0 | 1 |\n| 1312 Zimmerman, Leo\
    \ | 3rd | 29.0 | male | 0 | 0 |\n\n一个相关的方法是 `duplicated`，它返回一个布尔序列，表示某行是否为重复行。如果你不想简单地删除重复行，这是一个不错的选择：\n\
    \n```python\ndataframe.duplicated()\n```\n\n```\n0        False\n1        False\n\
    2        False\n3        False\n4        False\n...\n1308     False\n1309    \
    \ False\n1310     False\n1311     False\n1312     False\nLength: 1313, dtype:\
    \ bool\n```\n\n## 3.14 按值分组行\n\n### 问题\n\n你想根据某些共享值对单个行进行分组。\n\n### 解决方案\n\n`groupby`\

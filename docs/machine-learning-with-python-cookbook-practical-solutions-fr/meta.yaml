    \ 2,\n       2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2,\n   \
    \    2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2,\n       2, 2,\
    \ 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 2])\n```\n\nHowever, as you\
    \ might imagine, the performance of k-means drops considerably, even critically,\
    \ if we select the wrong number of clusters.\n\nFinally, as with other scikit-learn\
    \ models, we can use the trained cluster to predict the value of new observations:\n\
    \n```python\n# Create new observation\nnew_observation = [[0.8, 0.8, 0.8, 0.8]]\n\
    \n# Predict observation's cluster\nmodel.predict(new_observation)\n\narray([2],\

  - "[PAGE 326]\n\n# Discussion\n\nAgglomerative clustering is a powerful, flexible\
    \ hierarchical clustering algorithm. In agglomerative clustering, all observations\
    \ start as their own clusters. Next, clusters meeting some criteria are merged.\
    \ This process is repeated, growing clusters until some end point is reached.\
    \ In scikit-learn, `AgglomerativeClustering` uses the `linkage` parameter to determine\
    \ the merging strategy to minimize:\n\n+   - Variance of merged clusters (`ward`)\n\
    - Average distance between observations from pairs of clusters (`average`)\n-\
    \ Maximum distance between observations from pairs of clusters (`complete`)\n\n\
    Two other parameters are useful to know. First, the `affinity` parameter determines\
    \ the distance metric used for `linkage` (`minkowski`, `euclidean`, etc.). Second,\
    \ `n_clusters` sets the number of clusters the clustering algorithm will attempt\
    \ to find. That is, clusters are successively merged until only `n_clusters` remain.\n\
    \nAs with other clustering algorithms we have covered, we can use `labels_` to\
    \ see the cluster in which every observation is assigned:\n\n```\n# Show cluster\

    # Discussion


    PyTorch tensors provide a number of helpful attributes for gathering information
    about a given tensor, including:


    +   - **Shape**: Returns the dimensions of the tensor

    - **Dtype**: Returns the data type of objects within the tensor

    - **Layout**: Returns the memory layout (most common is strided used for dense
    tensors)

    - **Device**: Returns the hardware the tensor is being stored on (CPU/GPU)


    Again, the key differentiator between tensors and arrays is an attribute like
    *device*, because tensors provide us with hardware-accelerated options like GPUs.



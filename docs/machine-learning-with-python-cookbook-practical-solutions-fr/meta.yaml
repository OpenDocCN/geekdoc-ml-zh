    \nSupervised model evaluation compares predictions (e.g., classes or quantitative\
    \ values) with the corresponding true values in the target vector. However, the\
    \ most common motivation for using clustering methods is that your data doesn't\
    \ have a target vector. A number of clustering evaluation metrics require a target\
    \ vector, but again, using unsupervised learning approaches like clustering when\
    \ you have a target vector available to you is probably handicapping yourself\
    \ unnecessarily.\n\nWhile we cannot evaluate predictions versus true values if\
    \ we don't have a target vector, we can evaluate the nature of the clusters themselves.\
    \ Intuitively, we can imagine “good” clusters having very small distances between\
    \ observations in the same cluster (i.e., dense clusters) and large distances\
    \ between the different clusters (i.e., well-separated clusters). Silhouette coefficients\
    \ provide a single value measuring both traits. Formally, the ith observation's\
    \ silhouette coefficient is:\n\n$$s_i = \\frac{b_i - a_i}{\\max(a_i, b_i)}$$\n\
    \nwhere $s_i$ is the silhouette coefficient for observation $i$, $a_i$ is the\
    \ mean distance between $i$ and all observations of the same class, and $b_i$\
    \ is the mean distance between $i$ and all observations from the closest cluster\
    \ of a different class. The value returned by silhouette_score is the mean silhouette\
    \ coefficient for all observations. Silhouette coefficients range between -1 and\
    \ 1, with 1 indicating dense, well-separated clusters."

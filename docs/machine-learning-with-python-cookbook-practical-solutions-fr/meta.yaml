- md: "## Discussion\n\nNested cross-validation during model selection is a difficult\
    \ concept for many people to grasp the first time. Remember that in k-fold cross-validation,\
    \ we train our model on $k-1$ folds of the data, use this model to make predictions\
    \ on the remaining fold, and then evaluate our model on how well its predictions\
    \ compare to the true values. We then repeat this process $k$ times.\n\nIn the\
    \ model selection searches described in this chapter (i.e., `GridSearchCV` and\
    \ `RandomizedSearchCV`), we used cross-validation to evaluate which hyperparameter\
    \ values produced the best models. However, a nuanced and generally underappreciated\
    \ problem arises: since we used the data to select the best hyperparameter values,\
    \ we cannot use that same data to evaluate the model's performance. The solution?\
    \ Wrap the cross-validation used for model search in another cross-validation!\
    \ In nested cross-validation, the “inner” cross-validation selects the best model,\
    \ while the “outer” cross-validation provides an unbiased evaluation of the model's\
    \ performance. In our solution, the inner cross-validation is our `GridSearchCV`\
    \ object, which we then wrap in an outer cross-validation using `cross_val_score`.\n\
    \nIf you are confused, try a simple experiment. First, set `verbose=1` so we can\
    \ see what is happening:\n\n```\ngridsearch = GridSearchCV(logistic, hyperparameters,\
    \ cv=5, verbose=1)\n```\n\nNext, run `gridsearch.fit(features, target)`, which\
    \ is our inner cross-validation used to find the best model:\n\n```\nbest_model\
    \ = gridsearch.fit(features, target)\nFitting 5 folds for each of 20 candidates,\
    \ totalling 100 fits\n```\n\nFrom the output you can see the inner cross-validation\
    \ trained 20 candidate models five times, totaling 100 models. Next, nest `clf`\
    \ inside a new cross-validation, which defaults to five folds:\n\n```\nscores\
    \ = cross_val_score(gridsearch, features, target)\nFitting 5 folds for each of\
    \ 20 candidates, totalling 100 fits\nFitting 5 folds for each of 20 candidates,\
    \ totalling 100 fits\nFitting 5 folds for each of 20 candidates, totalling 100\
    \ fits\nFitting 5 folds for each of 20 candidates, totalling 100 fits\nFitting\
    \ 5 folds for each of 20 candidates, totalling 100 fits\n```\n\nThe output shows\
    \ that the inner cross-validation trained 20 models five times to find the best\
    \ model, and this model was evaluated using an outer five-fold cross-validation,\
    \ creating a total of 500 models trained.\n\n# CHAPTER 13\n## Linear Regression\n\
    \n### 13.0 Introduction\n\n*Linear regression* is one of the simplest supervised\
    \ learning algorithms in our toolkit. If you have ever taken an introductory statistics\
    \ course in college, likely the final topic you covered was linear regression.\
    \ Linear regression and its extensions continue to be a common and useful method\
    \ of making predictions when the target vector is a quantitative value (e.g.,\
    \ home price, age). In this chapter we will cover a variety of linear regression\
    \ methods (and some extensions) for creating well-performing prediction models.\n\
    \n### 13.1 Fitting a Line\n\n#### Problem\n\nYou want to train a model that represents\
    \ a linear relationship between the feature and target vector.\n\n#### Solution\n\
    \nUse a linear regression (in scikit-learn, LinearRegression):\n\n```\n# Load\
    \ libraries\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.datasets\
    \ import make_regression\n\n# Generate features matrix, target vector\nfeatures,\
    \ target = make_regression(n_samples = 100,\n                                \
    \  n_features = 3,\n                                  n_informative = 2,\n   \
    \                               n_targets = 1,\n                             \
    \     noise = 0.2,\n                                  coef = False,\n        \
    \                          random_state = 1)\n```\n\n```\n# Create linear regression\n\
    regression = LinearRegression()\n\n# Fit the linear regression\nmodel = regression.fit(features,\
    \ target)\n```\n\n#### Discussion\n\nLinear regression assumes that the relationship\
    \ between the features and the target vector is approximately linear. That is,\
    \ the *effect* (also called *coefficient*, *weight*, or *parameter*) of the features\
    \ on the target vector is constant. In our solution, for the sake of explanation,\
    \ we have trained our model using only three features. This means our linear model\
    \ will be:\n\n$\\widehat{y} = \\widehat{\\beta}_0 + \\widehat{\\beta}_1 x_1 +\
    \ \\widehat{\\beta}_2 x_2 + \\widehat{\\beta}_3 x_3 + \\epsilon$\n\nwhere $\\\
    widehat{y}$ is our target, $x_i$ is the data for a single feature, $\\widehat{\\\
    beta}_1$, $\\widehat{\\beta}_2$, and $\\widehat{\\beta}_3$ are the coefficients\
    \ identified by fitting the model, and $\\epsilon$ is the error. After we have\
    \ fit our model, we can view the value of each parameter. For example, $\\widehat{\\\
    beta}_0$, also called the *bias* or *intercept*, can be viewed using `intercept_`:\n\
    \n```\n# View the intercept\nmodel.intercept_\n\n-0.009650118178816669\n```\n\n\
    And $\\widehat{\\beta}_1$ and $\\widehat{\\beta}_2$ are shown using `coef_`:\n\
    \n```\n# View the feature coefficients\nmodel.coef_\n\narray([1.95531234e-02,\
    \ 4.42087450e+01, 5.81494563e+01])\n```\n\nIn our dataset, the target value is\
    \ a randomly generated continuous variable:\n\n```\n# First value in the target\
    \ vector\ntarget[0]\n\n-20.870747595269407\n```\n\nUsing the `predict` method,\
    \ we can predict the output based on the input features:\n\n```\n# Predict the\
    \ target value of the first observation\nmodel.predict(features)[0]\n\n-20.861927709296808\n\
    ```\n\nNot bad! Our model was off only by about 0.01!\n\nThe major advantage of\
    \ linear regression is its interpretability, in large part because the coefficients\
    \ of the model are the effect of a one-unit change on the target vector. Our model's\
    \ coefficient of the first feature was ~-0.02, meaning that we have the change\
    \ in target for each additional unit change in the first feature.\n\nUsing the\
    \ score function, we can also see how well our model performed on the data:\n\n\
    ```\n# Print the score of the model on the training data\nprint(model.score(features,\
    \ target))\n\n0.9999901732607787\n```\n\nThe default score for linear regression\
    \ in scikit learn is R², which ranges from 0.0 (worst) to 1.0 (best). As we can\
    \ see in this example, we are very close to the perfect value of 1.0. However\
    \ it's worth noting that we are evaluating this model on data it has already seen\
    \ (the training data), where typically we'd evaluate on a held-out test set of\
    \ data instead. Nonetheless, such a high score would bode well for our model in\
    \ a real setting.\n\n### 13.2 Handling Interactive Effects\n\n#### Problem\n\n\
    You have a feature whose effect on the target variable depends on another feature.\n\
    \n#### Solution\n\nCreate an interaction term to capture that dependence using\
    \ scikit-learn's PolynomialFeatures:\n\n```\n# Load libraries\nfrom sklearn.linear_model\
    \ import LinearRegression\nfrom sklearn.preprocessing import PolynomialFeatures\n\
    from sklearn.datasets import make_regression\n\n# Generate features matrix, target\
    \ vector\nfeatures, target = make_regression(n_samples = 100,\n              \
    \                    n_features = 2,\n                                  n_informative\
    \ = 2,\n                                  n_targets = 1,\n                   \
    \               noise = 0.2,\n                                  coef = False,\n\
    \                                  random_state = 1)\n\n# Create interaction term\n\
    interaction = PolynomialFeatures(\n    degree=3, include_bias=False, interaction_only=True)\n\
    features_interaction = interaction.fit_transform(features)\n\n# Create linear\
    \ regression\nregression = LinearRegression()\n\n# Fit the linear regression\n\
    model = regression.fit(features_interaction, target)\n```\n\n#### Discussion\n\
    \nSometimes a feature's effect on our target variable is at least partially dependent\
    \ on another feature. For example, imagine a simple coffee-based example where\
    \ we have two binary features—the presence of sugar (sugar) and whether or not\
    \ we have stirred (stirred)—and we want to predict if the coffee tastes sweet.\
    \ Just putting sugar in the coffee (sugar=1, stirred=0) won't make the coffee\
    \ taste sweet (all the sugar is at the bottom!) and just stirring the coffee without\
    \ adding sugar (sugar=0, stirred=1) won't make it sweet either. Instead it is\
    \ the interaction of putting sugar in the coffee and stirring the coffee (sugar=1,\
    \ stirred=1) that will make a coffee taste sweet. The effects of sugar and stirred\
    \ on sweetness are dependent on each other. In this case we say there is an interaction\
    \ effect between the features sugar and stirred.\n\nWe can account for interaction\
    \ effects by including a new feature comprising the product of corresponding values\
    \ from the interacting features:\n\n$\\hat{y} = \\hat{\\beta}_0 + \\hat{\\beta}_1x_1\
    \ + \\hat{\\beta}_2x_2 + \\hat{\\beta}_3x_1x_2 + \\epsilon$\n\nwhere $x_1$ and\
    \ $x_2$ are the values of the sugar and stirred, respectively, and $x_1x_2$ represents\
    \ the interaction between the two.\n\nIn our solution, we used a dataset containing\
    \ only two features. Here is the first observation's values for each of those\
    \ features:\n\n```\n# View the feature values for first observation\nfeatures[0]\n\
    \narray([0.0465673 , 0.80186103])\n```\n\nTo create an interaction term, we simply\
    \ multiply those two values together for every observation:\n\n```\n# Import library\n\
    import numpy as np\n\n# For each observation, multiply the values of the first\
    \ and second feature\ninteraction_term = np.multiply(features[:, 0], features[:,\
    \ 1])\n```\n\nWe can then view the interaction term for the first observation:"
  mdcn: "## 讨论\n\n嵌套交叉验证在模型选择中是一个许多人初次接触时难以理解的概念。请记住，在k折交叉验证中，我们在数据的$k-1$折上训练模型，使用该模型对剩余的一折进行预测，然后根据预测值与真实值的比较情况来评估模型。接着，我们重复此过程$k$次。\n\
    \n在本章描述的模型选择搜索中（即`GridSearchCV`和`RandomizedSearchCV`），我们使用交叉验证来评估哪些超参数值能产生最佳模型。然而，一个微妙且通常被忽视的问题出现了：由于我们使用了数据来选择最佳超参数值，因此不能再使用相同的数据来评估模型的性能。解决方案是什么？将用于模型搜索的交叉验证包装在另一个交叉验证中！在嵌套交叉验证中，“内部”交叉验证选择最佳模型，而“外部”交叉验证则提供对模型性能的无偏评估。在我们的解决方案中，内部交叉验证是我们的`GridSearchCV`对象，然后我们使用`cross_val_score`将其包装在外部交叉验证中。\n\
    \n如果你感到困惑，可以尝试一个简单的实验。首先，设置`verbose=1`以便我们观察发生了什么：\n\n```\ngridsearch = GridSearchCV(logistic,\
    \ hyperparameters, cv=5, verbose=1)\n```\n\n接下来，运行`gridsearch.fit(features, target)`，这是我们用于寻找最佳模型的内部交叉验证：\n\
    \n```\nbest_model = gridsearch.fit(features, target)\nFitting 5 folds for each\
    \ of 20 candidates, totalling 100 fits\n```\n\n从输出中你可以看到，内部交叉验证对20个候选模型各训练了5次，总共训练了100个模型。接下来，将`clf`嵌套在一个新的交叉验证中，默认为五折：\n\
    \n```\nscores = cross_val_score(gridsearch, features, target)\nFitting 5 folds\
    \ for each of 20 candidates, totalling 100 fits\nFitting 5 folds for each of 20\
    \ candidates, totalling 100 fits\nFitting 5 folds for each of 20 candidates, totalling\
    \ 100 fits\nFitting 5 folds for each of 20 candidates, totalling 100 fits\nFitting\
    \ 5 folds for each of 20 candidates, totalling 100 fits\n```\n\n输出显示，内部交叉验证训练了20个模型各5次以找到最佳模型，然后该模型使用外部五折交叉验证进行评估，总共训练了500个模型。\n\
    \n# 第13章\n## 线性回归\n\n### 13.0 引言\n\n*线性回归*是我们工具箱中最简单的监督学习算法之一。如果你在大学里上过统计学入门课程，你最后学习的主题很可能就是线性回归。当目标向量是定量值（例如，房屋价格、年龄）时，线性回归及其扩展仍然是进行预测的常用且有用的方法。在本章中，我们将介绍多种线性回归方法（以及一些扩展）来创建性能良好的预测模型。\n\
    \n### 13.1 拟合一条直线\n\n#### 问题\n\n你想训练一个模型，该模型表示特征和目标向量之间的线性关系。\n\n#### 解决方案\n\n\
    使用线性回归（在scikit-learn中为LinearRegression）：\n\n```\n# 加载库\nfrom sklearn.linear_model\
    \ import LinearRegression\nfrom sklearn.datasets import make_regression\n\n# 生成特征矩阵、目标向量\n\
    features, target = make_regression(n_samples = 100,\n                        \
    \          n_features = 3,\n                                  n_informative =\
    \ 2,\n                                  n_targets = 1,\n                     \
    \             noise = 0.2,\n                                  coef = False,\n\
    \                                  random_state = 1)\n```\n\n```\n# 创建线性回归\nregression\
    \ = LinearRegression()\n\n# 拟合线性回归\nmodel = regression.fit(features, target)\n\
    ```\n\n#### 讨论\n\n线性回归假设特征和目标向量之间的关系近似线性。也就是说，特征对目标向量的*影响*（也称为*系数*、*权重*或*参数*）是恒定的。在我们的解决方案中，为了便于解释，我们仅使用三个特征训练了模型。这意味着我们的线性模型将是：\n\
    \n$\\widehat{y} = \\widehat{\\beta}_0 + \\widehat{\\beta}_1 x_1 + \\widehat{\\\
    beta}_2 x_2 + \\widehat{\\beta}_3 x_3 + \\epsilon$\n\n其中$\\widehat{y}$是我们的目标，$x_i$是单个特征的数据，$\\\
    widehat{\\beta}_1$、$\\widehat{\\beta}_2$和$\\widehat{\\beta}_3$是通过拟合模型确定的系数，$\\\
    epsilon$是误差。在我们拟合模型之后，我们可以查看每个参数的值。例如，$\\widehat{\\beta}_0$，也称为*偏置*或*截距*，可以使用`intercept_`查看：\n\
    \n```\n# 查看截距\nmodel.intercept_\n\n-0.009650118178816669\n```\n\n而$\\widehat{\\\
    beta}_1$和$\\widehat{\\beta}_2$使用`coef_`显示：\n\n```\n# 查看特征系数\nmodel.coef_\n\narray([1.95531234e-02,\
    \ 4.42087450e+01, 5.81494563e+01])\n```\n\n在我们的数据集中，目标值是一个随机生成的连续变量：\n\n```\n\
    # 目标向量中的第一个值\ntarget[0]\n\n-20.870747595269407\n```\n\n使用`predict`方法，我们可以根据输入特征预测输出：\n\
    \n```\n# 预测第一个观测值的目标值\nmodel.predict(features)[0]\n\n-20.861927709296808\n```\n\
    \n还不错！我们的模型仅偏差了大约0.01！\n\n线性回归的主要优势在于其可解释性，这在很大程度上是因为模型的系数是目标向量每单位变化的影响。我们的模型第一个特征的系数约为-0.02，这意味着第一个特征每增加一个单位，目标值的变化量。\n\
    \n使用score函数，我们还可以查看模型在数据上的表现如何：\n\n```\n# 打印模型在训练数据上的得分\nprint(model.score(features,\
    \ target))\n\n0.9999901732607787\n```\n\nscikit-learn中线性回归的默认得分是R²，范围从0.0（最差）到1.0（最佳）。正如我们在本例中看到的，我们非常接近完美的1.0值。然而，值得注意的是，我们是在模型已经见过的数据（训练数据）上评估该模型，通常我们会在一个独立的测试集上进行评估。尽管如此，如此高的得分预示着我们的模型在实际应用中表现良好。\n\
    \n### 13.2 处理交互效应\n\n#### 问题\n\n你有一个特征，其对目标变量的影响取决于另一个特征。\n\n#### 解决方案\n\n使用scikit-learn的PolynomialFeatures创建一个交互项来捕捉这种依赖关系：\n\
    \n```\n# 加载库\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.preprocessing\
    \ import PolynomialFeatures\nfrom sklearn.datasets import make_regression\n\n\
    # 生成特征矩阵、目标向量\nfeatures, target = make_regression(n_samples = 100,\n         \
    \                         n_features = 2,\n                                  n_informative\
    \ = 2,\n                                  n_targets = 1,\n                   \
    \               noise = 0.2,\n                                  coef = False,\n\
    \                                  random_state = 1)\n\n# 创建交互项\ninteraction =\
    \ PolynomialFeatures(\n    degree=3, include_bias=False, interaction_only=True)\n\
    features_interaction = interaction.fit_transform(features)\n\n# 创建线性回归\nregression\
    \ = LinearRegression()\n\n# 拟合线性回归\nmodel = regression.fit(features_interaction,\
    \ target)\n```\n\n#### 讨论\n\n有时，一个特征对我们目标变量的影响至少部分取决于另一个特征。例如，想象一个简单的基于咖啡的例子，我们有两个二元特征——糖的存在（sugar）和是否搅拌（stirred）——我们想预测咖啡是否尝起来甜。仅仅在咖啡中加糖（sugar=1,\
    \ stirred=0）不会让咖啡尝起来甜（所有的糖都在底部！），仅仅搅拌咖啡而不加糖（sugar=0, stirred=1）也不会让它变甜。相反，正是在咖啡中加糖并搅拌咖啡（sugar=1,\
    \ stirred=1）的交互作用才会让咖啡尝起来甜。糖和搅拌对甜度的影响是相互依赖的。在这种情况下，我们说特征sugar和stirred之间存在交互效应。\n\
    \n我们可以通过包含一个新特征来考虑交互效应，该特征由交互特征的相应值的乘积组成：\n\n$\\hat{y} = \\hat{\\beta}_0 + \\\
    hat{\\beta}_1x_1 + \\hat{\\beta}_2x_2 + \\hat{\\beta}_3x_1x_2 + \\epsilon$\n\n\
    其中$x_1$和$x_2$分别是sugar和stirred的值，$x_1x_2$表示两者之间的交互作用。\n\n在我们的解决方案中，我们使用了一个仅包含两个特征的数据集。以下是第一个观测值中每个特征的值：\n\
    \n```\n# 查看第一个观测值的特征值\nfeatures[0]\n\narray([0.0465673 , 0.80186103])\n```\n\n\
    要创建交互项，我们只需将每个观测值的这两个值相乘：\n\n```\n# 导入库\nimport numpy as np\n\n# 对于每个观测值，将第一个和第二个特征的值相乘\n\
    interaction_term = np.multiply(features[:, 0], features[:, 1])\n```\n\n然后我们可以查看第一个观测值的交互项："

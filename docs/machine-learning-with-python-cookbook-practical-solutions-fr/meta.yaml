- md: "## 11.3 Creating a Baseline Classification Model\n\n### Problem\n\nYou want\
    \ a simple baseline classifier to compare against your model.\n\n### Solution\n\
    \nUse scikit-learn's DummyClassifier:\n\n```python\n# Load libraries\nfrom sklearn.datasets\
    \ import load_iris\nfrom sklearn.dummy import DummyClassifier\nfrom sklearn.model_selection\
    \ import train_test_split\n\n# Load data\niris = load_iris()\n\n# Create target\
    \ vector and feature matrix\nfeatures, target = iris.data, iris.target\n\n# Split\
    \ into training and test set\nfeatures_train, features_test, target_train, target_test\
    \ = train_test_split(\n    features, target, random_state=0)\n\n# Create dummy\
    \ classifier\ndummy = DummyClassifier(strategy='uniform', random_state=1)\n\n\
    # \"Train\" model\ndummy.fit(features_train, target_train)\n\n# Get accuracy score\n\
    dummy.score(features_test, target_test)\n\n0.42105263157894735\n```\n\nBy comparing\
    \ the baseline classifier to our trained classifier, we can see the improvement:\n\
    \n```python\n# Load library\nfrom sklearn.ensemble import RandomForestClassifier\n\
    \n# Create classifier\nclassifier = RandomForestClassifier()\n\n# Train model\n\
    classifier.fit(features_train, target_train)\n\n# Get accuracy score\nclassifier.score(features_test,\
    \ target_test)\n\n0.9736842105263158\n```\n\n### Discussion\n\nA common measure\
    \ of a classifier's performance is how much better it is than random guessing.\
    \ scikit-learn's `DummyClassifier` makes this comparison easy. The `strategy`\
    \ parameter gives us a number of options for generating values. There are two\
    \ particularly useful strategies. First, `stratified` makes predictions proportional\
    \ to the class proportions of the training set's target vector (e.g., if 20% of\
    \ the observations in the training data are women, then `DummyClassifier` will\
    \ predict women 20% of the time). Second, `uniform` will generate predictions\
    \ uniformly at random between the different classes. For example, if 20% of observations\
    \ are women and 80% are men, `uniform` will produce predictions that are 50% women\
    \ and 50% men.\n\n### See Also\n\n- [scikit-learn documentation: DummyClassifier](https://scikit-learn.org/stable/modules/generated/sklearn.dummy.DummyClassifier.html)\n\
    \n## 11.4 Evaluating Binary Classifier Predictions\n\n### Problem\n\nGiven a trained\
    \ classification model, you want to evaluate its quality.\n\n### Solution\n\n\
    Use scikit-learn's `cross_val_score` to conduct cross-validation while using the\
    \ `scoring` parameter to define one of a number of performance metrics, including\
    \ accuracy, precision, recall, and $F_1$. *Accuracy* is a common performance metric.\
    \ It is simply the proportion of observations predicted correctly:\n\n$$Accuracy\
    \ = \\frac{TP + TN}{TP + TN + FP + FN}$$\n\nwhere:\n\n$TP$\n\nThe number of true\
    \ positives. These are observations that are part of the *positive* class (has\
    \ the disease, purchased the product, etc.) and that we predicted correctly.\n\
    \n$TN$\n\nThe number of true negatives. These are observations that are part of\
    \ the *negative* class (does not have the disease, did not purchase the product,\
    \ etc.) and that we predicted correctly.\n\n$FP$\n\nThe number of false positives,\
    \ also called a *Type I error*. These are observations that are predicted to be\
    \ part of the *positive* class but are actually part of the *negative* class.\n\
    \n$FN$\n\nThe number of false negatives, also called a *Type II error*. These\
    \ are observations that are predicted to be part of the *negative* class but are\
    \ actually part of the *positive* class.\n\nWe can measure accuracy in three-fold\
    \ (the default number of folds) cross-validation by setting scoring=\"accuracy\"\
    :\n\n```python\n# Load libraries\nfrom sklearn.model_selection import cross_val_score\n\
    from sklearn.linear_model import LogisticRegression\nfrom sklearn.datasets import\
    \ make_classification\n\n# Generate features matrix and target vector\nX, y =\
    \ make_classification(n_samples=10000,\n                          n_features=3,\n\
    \                          n_informative=3,\n                          n_redundant=0,\n\
    \                          n_classes=2,\n                          random_state=1)\n\
    \n# Create logistic regression\nlogit = LogisticRegression()\n\n# Cross-validate\
    \ model using accuracy\ncross_val_score(logit, X, y, scoring=\"accuracy\")\narray([0.9555,\
    \ 0.95 , 0.9585, 0.9555, 0.956 ])\n```\n\nThe appeal of accuracy is that it has\
    \ an intuitive and plain English explanation: the proportion of observations predicted\
    \ correctly. However, in the real world, often our data has imbalanced classes\
    \ (e.g., the 99.9% of observations are of class 1 and only 0.1% are class 2).\
    \ When in the presence of imbalanced classes, accuracy suffers from a paradox\
    \ where a model is highly accurate but lacks predictive power. For example, imagine\
    \ we are trying to predict the presence of a very rare cancer that occurs in 0.1%\
    \ of the population. After training our model, we find the accuracy is at 95%.\
    \ However, 99.9% of people do not have the cancer: if we simply created a model\
    \ that “predicted” that nobody had that form of cancer, our naive model would\
    \ be 4.9% more accurate, but it clearly is not able to *predict* anything. For\
    \ this reason, we are often motivated to use other metrics such as precision,\
    \ recall, and the $F_1$ score.\n\n*Precision* is the proportion of every observation\
    \ predicted to be positive that is actually positive. We can think about it as\
    \ a measurement noise in our predictions—that is, how likely we are to be right\
    \ when we predict something is positive. Models with high precision are pessimistic\
    \ in that they predict an observation is of the positive class only when they\
    \ are very certain about it. Formally, precision is:\n\n$$Precision = \\frac{TP}{TP\
    \ + FP}$$\n\n```python\n# Cross-validate model using precision\ncross_val_score(logit,\
    \ X, y, scoring=\"precision\")\narray([0.95963673, 0.94820717, 0.9635996 , 0.96149949,\
    \ 0.96060606])\n```\n\nRecall is the proportion of every positive observation\
    \ that is truly positive. Recall measures the model's ability to identify an observation\
    \ of the positive class. Models with high recall are optimistic in that they have\
    \ a low bar for predicting that an observation is in the positive class:\n\n$$Recall\
    \ = \\frac{TP}{TP + FN}$$\n\n```python\n# Cross-validate model using recall\n\
    cross_val_score(logit, X, y, scoring=\"recall\")\narray([0.951, 0.952, 0.953,\
    \ 0.949, 0.951])\n```\n\nIf this is the first time you have encountered precision\
    \ and recall, it is understandable if it takes a little while to fully understand\
    \ them. This is one of the downsides to accuracy; precision and recall are less\
    \ intuitive. Almost always we want some kind of balance between precision and\
    \ recall, and this role is filled by the $F_1$ score. The $F_1$ score is the *harmonic\
    \ mean* (a kind of average used for ratios):\n\n$$F_1 = 2 \\times \\frac{Precision\
    \ \\times Recall}{Precision + Recall}$$\n\nThis score is a measure of correctness\
    \ achieved in positive prediction—that is, of observations labeled as positive,\
    \ how many are actually positive:\n\n```python\n# Cross-validate model using F1\n\
    cross_val_score(logit, X, y, scoring=\"f1\")\narray([0.95529884, 0.9500998 , 0.95827049,\
    \ 0.95520886, 0.95577889])\n```\n\n### Discussion\n\nAs an evaluation metric,\
    \ accuracy has some valuable properties, especially its intuitiveness. However,\
    \ better metrics often involve using some balance of precision and recall—that\
    \ is, a trade-off between the optimism and pessimism of our model. $F_1$ represents\
    \ a balance between the recall and precision, where the relative contributions\
    \ of both are equal.\n\nAs an alternative to using `cross_val_score`, if we already\
    \ have the true y values and the predicted y values, we can calculate the metrics\
    \ accuracy and recall directly:\n\n```python\n# Load libraries\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.metrics import accuracy_score\n\n# Create\
    \ training and test split\nX_train, X_test, y_train, y_test = train_test_split(X,\n\
    \                                                    y,\n                    \
    \                                test_size=0.1,\n                            \
    \                        random_state=1)\n\n# Predict values for training target\
    \ vector\ny_hat = logit.fit(X_train, y_train).predict(X_test)\n\n# Calculate accuracy\n\
    accuracy_score(y_test, y_hat)\n0.947\n```\n\n### See Also\n\n- [Accuracy paradox,\
    \ Wikipedia](https://en.wikipedia.org/wiki/Accuracy_paradox)\n\n## 11.5 Evaluating\
    \ Binary Classifier Thresholds\n\n### Problem\n\nYou want to evaluate a binary\
    \ classifier and various probability thresholds.\n\n### Solution\n\nUse the *receiver\
    \ operating characteristic* (ROC) curve to evaluate the quality of the binary\
    \ classifier. In scikit-learn, we can use `roc_curve` to calculate the true and\
    \ false positives at each threshold, and then plot them:\n\n```python\n# Load\
    \ libraries\nimport matplotlib.pyplot as plt\nfrom sklearn.datasets import make_classification\n\
    from sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import\
    \ roc_curve, roc_auc_score\nfrom sklearn.model_selection import train_test_split\n\
    \n# Create feature matrix and target vector\nfeatures, target = make_classification(n_samples=10000,\n\
    \                                       n_features=10,\n```"

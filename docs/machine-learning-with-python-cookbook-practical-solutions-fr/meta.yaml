    # 17.2 Handling Linearly Inseparable Classes Using Kernels


    # Problem


    You need to train a support vector classifier, but your classes are linearly inseparable.


    # Solution


    Train an extension of a support vector machine using kernel functions to create
    nonlinear decision boundaries:


    ```

    # Load libraries

    from sklearn.svm import SVC

    from sklearn import datasets

    from sklearn.preprocessing import StandardScaler

    import numpy as np


    # Set randomization seed

    np.random.seed(0)


    # Generate two features

    features = np.random.randn(200, 2)


    # Use an XOR gate (you don''t need to know what this is) to generate

    # linearly inseparable classes

    target_xor = np.logical_xor(features[:, 0] > 0, features[:, 1] > 0)

    target = np.where(target_xor, 0, 1)


    # Create a support vector machine with a radial basis function kernel

    svc = SVC(kernel="rbf", random_state=0, gamma=1, C=1)


    # Train the classifier

    model = svc.fit(features, target)

    ```


    # Discussion


    A full explanation of support vector machines is outside the scope of this book.
    However, a short explanation is likely beneficial for understanding support vector
    machines and kernels. For reasons best learned elsewhere, a support vector classifier
    can be represented as:


    $$f(x) = \beta_0 + \sum_{i \in S} \alpha_i K(x_i, x_{i''})$$'
  - "[PAGE 302]\n\nwhere $\\beta_0$ is the bias, $S$ is the set of all support vector\
    \ observations, $\\alpha$ is the model parameters to be learned, and $(x_i, x_{i'})$\
    \ are pairs of two support vector observations, $x_i$ and $x_{i'}$. Most importantly,\
    \ $K$ is a kernel function that compares the similarity between $x_i$ and $x_{i'}$.\
    \ Don't worry if you don't understand kernel functions. For our purposes, just\
    \ realize that (1) $K$ determines the type of hyperplane used to separate our\
    \ classes, and (2) we create different hyperplanes by using different kernels.\
    \ For example, if we want a basic linear hyperplane like the one we created in\
    \ Recipe 17.1, we can use the linear kernel:\n\n$$K(x_i, x_{i'}) = \\sum_{j=1}^{p}\
    \ x_{ij}x_{i'j}$$\n\nwhere $p$ is the number of features. However, if we want\
    \ a nonlinear decision boundary, we swap the linear kernel with a polynomial kernel:\n\
    \n$$K(x_i, x_{i'}) = \\left(r + \\gamma \\sum_{j=1}^{p} x_{ij}x_{i'j}\\right)^d$$\n\
    \nwhere $d$ is the degree of the polynomial kernel function. Alternatively, we\
    \ can use one of the most common kernels in support vectors machines, the *radial\
    \ basis function kernel*:\n\n$$K(x_i, x_{i'}) = e^{-\\gamma \\sum_{j=1}^{p} (x_{ij}x_{i'j})^2}$$\n\
    \nwhere $\\gamma$ is a hyperparameter and must be greater than zero. The main\
    \ point of the preceding explanation is that if we have linearly inseparable data,\

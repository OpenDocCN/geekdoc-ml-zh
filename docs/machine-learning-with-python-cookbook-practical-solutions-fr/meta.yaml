    \ (StandardScaler) and principal component analysis (PCA). This object is called\
    \ preprocess and contains both of our preprocessing steps. We then include preprocess\
    \ in a pipeline with our learning algorithm. The result is that this allows us\
    \ to outsource the proper (and confusing) handling of fitting, transforming, and\
    \ training the models with combinations of hyperparameters to scikit-learn.\n\n\
    Second, some preprocessing methods have their own parameters, which often have\
    \ to be supplied by the user. For example, dimensionality reduction using PCA\
    \ requires the user to define the number of principal components to use to produce\
    \ the transformed feature set. Ideally, we would choose the number of components\
    \ that produces a model with the greatest performance for some evaluation test\
    \ metric."

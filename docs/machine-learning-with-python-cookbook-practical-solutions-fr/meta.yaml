    \ = np.linspace(-2.5, 2.5)\nyy = a * xx - (svc.intercept_[0]) / w[1]\n\n# Plot\
    \ the hyperplane\nplt.plot(xx, yy)\nplt.axis(\"off\"), plt.show();\n```\n\n在这个可视化中，所有类别为\
    \ 0 的观测值显示为黑色，类别为 1 的观测值显示为浅灰色。超平面是决定新观测值如何分类的决策边界。具体来说，线上方的任何观测值将被分类为类别 0，而线下方的任何观测值将被分类为类别\
    \ 1。我们可以通过在可视化左上角创建一个新的观测值来证明这一点，这意味着它应该被预测为类别 0：\n\n```python\n# Create new observation\n\
    new_observation = [[ -2, 3]]\n\n# Predict class of new observation\nsvc.predict(new_observation)\n\
    \narray([0])\n```\n\n关于 SVC 有几点需要注意。首先，为了可视化，我们将示例限制为二元示例（即只有两个类别）；然而，SVC 可以很好地处理多个类别。其次，正如我们的可视化所示，超平面根据定义是线性的（即不是弯曲的）。这在本例中是可以的，因为数据是线性可分的，这意味着存在一个超平面可以完美地分离两个类别。不幸的是，在现实世界中，这种情况很少见。\n\
    \n更典型的情况是，我们无法完美地分离类别。在这些情况下，SVC 需要在最大化超平面间隔和最小化误分类之间取得平衡。在 SVC 中，后者由超参数 C 控制。C\
    \ 是 SVC 学习器的一个参数，是对误分类数据点的惩罚。当 C 较小时，分类器可以容忍误分类的数据点（高偏差但低方差）。当 C 较大时，分类器会因误分类数据而受到严重惩罚，因此会竭尽全力避免任何误分类的数据点（低偏差但高方差）。\n\
    \n在 scikit-learn 中，C 由参数 C 确定，默认为 C=1.0。我们应该将 C 视为学习算法的超参数，我们将在第 12 章使用模型选择技术对其进行调优。\n\
    \n## 17.2 使用核函数处理线性不可分的类别\n\n### 问题\n\n你需要训练一个支持向量分类器，但你的类别是线性不可分的。\n\n### 解决方案\n\
    \n使用核函数训练支持向量机的扩展，以创建非线性决策边界：\n\n```python\n# Load libraries\nfrom sklearn.svm\
    \ import SVC\nfrom sklearn import datasets\nfrom sklearn.preprocessing import\
    \ StandardScaler\nimport numpy as np\n\n# Set randomization seed\nnp.random.seed(0)\n\
    \n# Generate two features\nfeatures = np.random.randn(200, 2)\n\n# Use an XOR\
    \ gate (you don't need to know what this is) to generate\n# linearly inseparable\
    \ classes\ntarget_xor = np.logical_xor(features[:, 0] > 0, features[:, 1] > 0)\n\
    target = np.where(target_xor, 0, 1)\n\n# Create a support vector machine with\
    \ a radial basis function kernel\nsvc = SVC(kernel=\"rbf\", random_state=0, gamma=1,\
    \ C=1)\n\n# Train the classifier\nmodel = svc.fit(features, target)\n```\n\n###\
    \ 讨论\n\n对支持向量机的全面解释超出了本书的范围。然而，一个简短的解释可能有助于理解支持向量机和核函数。出于最好在其他地方学习的原因，支持向量分类器可以表示为：\n\
    \n$$f(x) = \\beta_0 + \\sum_{i \\in S} \\alpha_i K(x_i, x_{i'})$$\n\n其中 $\\beta_0$\
    \ 是偏置，$S$ 是所有支持向量观测值的集合，$\\alpha$ 是待学习的模型参数，$(x_i, x_{i'})$ 是两个支持向量观测值 $x_i$ 和\
    \ $x_{i'}$ 的配对。最重要的是，$K$ 是一个核函数，用于比较 $x_i$ 和 $x_{i'}$ 之间的相似性。如果你不理解核函数，不用担心。就我们的目的而言，只需意识到\
    \ (1) $K$ 决定了用于分离我们类别的超平面类型，以及 (2) 我们通过使用不同的核函数来创建不同的超平面。例如，如果我们想要一个像我们在配方 17.1\
    \ 中创建的基本线性超平面，我们可以使用线性核：\n\n$$K(x_i, x_{i'}) = \\sum_{j=1}^{p} x_{ij}x_{i'j}$$\n\
    \n其中 $p$ 是特征的数量。然而，如果我们想要一个非线性决策边界，我们可以将线性核替换为多项式核：\n\n$$K(x_i, x_{i'}) = \\left(r\
    \ + \\gamma \\sum_{j=1}^{p} x_{ij}x_{i'j}\\right)^d$$\n\n其中 $d$ 是多项式核函数的次数。或者，我们可以使用支持向量机中最常见的核函数之一，即*径向基函数核*：\n\
    \n$$K(x_i, x_{i'}) = e^{-\\gamma \\sum_{j=1}^{p} (x_{ij}x_{i'j})^2}$$\n\n其中 $\\\
    gamma$ 是一个超参数，必须大于零。上述解释的要点是，如果我们有线性不可分的数据，我们可以将线性核替换为其他核函数，以创建非线性的超平面决策边界。\n\n\
    我们可以通过一个简单的例子来直观理解核函数。这个函数基于 Sebastian Raschka 的一个函数，绘制了二维空间中的观测值和决策边界超平面。你不需要理解这个函数是如何工作的；我把它放在这里是为了让你可以自己尝试：\n\
    \n```python\n# Plot observations and decision boundary hyperplane\nfrom matplotlib.colors\
    \ import ListedColormap\nimport matplotlib.pyplot as plt\n\ndef plot_decision_regions(X,\
    \ y, classifier):\n    cmap = ListedColormap((\"red\", \"blue\"))\n    xx1, xx2\
    \ = np.meshgrid(np.arange(-3, 3, 0.02), np.arange(-3, 3, 0.02))\n    Z = classifier.predict(np.array([xx1.ravel(),\
    \ xx2.ravel()]).T)\n    Z = Z.reshape(xx1.shape)\n    plt.contourf(xx1, xx2, Z,\
    \ alpha=0.1, cmap=cmap)\n    for idx, cl in enumerate(np.unique(y)):\n       \
    \ plt.scatter(x=X[y == cl, 0], y=X[y == cl, 1],\n                    alpha=0.8,\
    \ c=cmap(idx),\n                    marker=\"+\", label=cl)\n```\n\n在我们的解决方案中，我们有包含两个特征（即两个维度）的数据和一个包含每个观测值类别的目标向量。重要的是，类别的分配使得它们是*线性不可分的*。也就是说，我们无法画出一条直线来分隔这两个类别。首先，让我们创建一个带有线性核的支持向量机分类器：\n\
    \n```python\n# Create support vector classifier with a linear kernel\nsvc_linear\
    \ = SVC(kernel=\"linear\", random_state=0, C=1)\n\n# Train model\nsvc_linear.fit(features,\
    \ target)\n\nSVC(C=1, kernel='linear', random_state=0)\n```\n\n接下来，由于我们只有两个特征，我们在二维空间中工作，可以可视化观测值、它们的类别以及我们模型的线性超平面：\n\
    \n```python\n# Plot observations and hyperplane\nplot_decision_regions(features,\
    \ target, classifier=svc_linear)\nplt.axis(\"off\"), plt.show();\n```\n\n正如我们所看到的，我们的线性超平面在分隔两个类别方面表现非常差！现在，让我们将线性核替换为径向基函数核，并用它来训练一个新模型：\n\
    \n```python\n# Create a support vector machine with a radial basis function kernel\n\
    svc = SVC(kernel=\"rbf\", random_state=0, gamma=1, C=1)\n```"

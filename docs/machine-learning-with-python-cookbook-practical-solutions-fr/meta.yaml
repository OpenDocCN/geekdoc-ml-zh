    \ the red and the blue values are swapped. To properly display OpenCV color images\
    \ in Matplotlib, we first need to convert the color to RGB (apologies to hardcopy\
    \ readers for whom there are no color images):\n\n```python\n# Convert to RGB\n\
    image_rgb = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2RGB)\n\n# Show image\nplt.imshow(image_rgb),\
    \ plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_150_0.png)\n\
    \n## See Also\n\n- Difference Between RGB and BGR\n- RGB color model, Wikipedia\n\
    \n## 8.2 Saving Images\n\n### Problem\n\nYou want to save an image for preprocessing.\n\
    \n### Solution\n\nUse OpenCV's `imwrite`:\n\n```python\n# Load libraries\nimport\
    \ cv2\nimport numpy as np\nfrom matplotlib import pyplot as plt\n\n# Load image\
    \ as grayscale\nimage = cv2.imread(\"images/plane.jpg\", cv2.IMREAD_GRAYSCALE)\n\
    \n# Save image\ncv2.imwrite(\"images/plane_new.jpg\", image)\nTrue\n```\n\n###\
    \ Discussion\n\nOpenCV's `imwrite` saves images to the filepath specified. The\
    \ format of the image is defined by the filename's extension (.jpg, .png, etc.).\
    \ One behavior to be careful about: `imwrite` will overwrite existing files without\
    \ outputting an error or asking for confirmation.\n\n## 8.3 Resizing Images\n\n\
    ### Problem\n\nYou want to resize an image for further preprocessing.\n\n### Solution\n\
    \nUse `resize` to change the size of an image:\n\n```python\n# Load libraries\n\
    import cv2\nimport numpy as np\nfrom matplotlib import pyplot as plt\n\n# Load\
    \ image as grayscale\nimage = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\
    \n# Resize image to 50 pixels by 50 pixels\nimage_50x50 = cv2.resize(image, (50,\
    \ 50))\n\n# View image\nplt.imshow(image_50x50, cmap=\"gray\"), plt.axis(\"off\"\
    )\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_152_0.png)\n\n\
    ### Discussion\n\nResizing images is a common task in image preprocessing for\
    \ two reasons. First, images come in all shapes and sizes, and to be usable as\
    \ features, images must have the same dimensions. Standardizing (resizing) images\
    \ does come at the cost of losing some information present in the larger image,\
    \ as can be seen in the picture of the airplane. Images are matrices of information,\
    \ and when we reduce the size of the image, we are reducing the size of that matrix\
    \ and the information it contains. Second, machine learning can require thousands\
    \ or hundreds of thousands of images. When those images are very large they can\
    \ take up a lot of memory, and by resizing them we can dramatically reduce memory\
    \ usage. Some common image sizes for machine learning are 32 × 32, 64 × 64, 96\
    \ × 96, and 256 × 256. In essence, the method we choose for image resizing will\
    \ often be a tradeoff between the statistical performance of our model and computational\
    \ cost to train it. The [Pillow library offers many options for resizing images](https://pillow.readthedocs.io/)\
    \ for this reason.\n\n## 8.4 Cropping Images\n\n### Problem\n\nYou want to remove\
    \ the outer portion of the image to change its dimensions.\n\n### Solution\n\n\
    The image is encoded as a two-dimensional NumPy array, so we can crop the image\
    \ easily by slicing the array:\n\n```python\n# Load libraries\nimport cv2\nimport\
    \ numpy as np\nfrom matplotlib import pyplot as plt\n\n# Load image in grayscale\n\
    image = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\n# Select\
    \ first half of the columns and all rows\nimage_cropped = image[:,:128]\n\n# Show\
    \ image\nplt.imshow(image_cropped, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_153_0.png)\n\n### Discussion\n\
    \nSince OpenCV represents images as a matrix of elements, by selecting the rows\
    \ and columns we want to keep we can easily crop the image. Cropping can be particularly\
    \ useful if we know that we want to keep only a certain part of every image. For\
    \ example, if our images come from a stationary security camera we can crop all\
    \ the images so they contain only the area of interest.\n\n### See Also\n\n- [Slicing\
    \ NumPy Arrays](Slicing NumPy Arrays)\n\n## 8.5 Blurring Images\n\n### Problem\n\
    \nYou want to smooth out an image.\n\n### Solution\n\nTo blur an image, each pixel\
    \ is transformed to be the average value of its neighbors. This neighbor and the\
    \ operation performed are mathematically represented as a kernel (don't worry\
    \ if you don't know what a kernel is). The size of this kernel determines the\
    \ amount of blurring, with larger kernels producing smoother images. Here we blur\
    \ an image by averaging the values of a 5 × 5 kernel around each pixel:\n\n```python\n\
    # Load libraries\nimport cv2\nimport numpy as np\nfrom matplotlib import pyplot\
    \ as plt\n\n# Load image as grayscale\nimage = cv2.imread(\"images/plane_256x256.jpg\"\
    , cv2.IMREAD_GRAYSCALE)\n\n# Blur image\nimage_blurry = cv2.blur(image, (5,5))\n\
    \n# Show image\nplt.imshow(image_blurry, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_154_0.png)\n\nTo highlight the\
    \ effect of kernel size, here is the same blurring with a 100 × 100 kernel:\n\n\
    ```python\n# Blur image\nimage_very_blurry = cv2.blur(image, (100,100))\n\n# Show\
    \ image\nplt.imshow(image_very_blurry, cmap=\"gray\"), plt.xticks([]), plt.yticks([])\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_0.png)\n\n###\
    \ Discussion\n\nKernels are widely used in image processing to do everything from\
    \ sharpening to edge detection and will come up repeatedly in this chapter. The\
    \ blurring kernel we used looks like this:\n\n```python\n# Create kernel\nkernel\
    \ = np.ones((5,5)) / 25.0\n\n# Show kernel\nkernel\n\narray([[ 0.04,  0.04,  0.04,\
    \  0.04,  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n       [ 0.04,\
    \  0.04,  0.04,  0.04,  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n\
    \       [ 0.04,  0.04,  0.04,  0.04,  0.04]])\n```\n\nThe center element in the\
    \ kernel is the pixel being examined, while the remaining elements are its neighbors.\
    \ Since all elements have the same value (normalized to add up to 1), each has\
    \ an equal say in the resulting value of the pixel of interest. We can manually\
    \ apply a kernel to an image using filter2D to produce a similar blurring effect:\n\
    \n```python\n# Apply kernel\nimage_kernel = cv2.filter2D(image, -1, kernel)\n\n\
    # Show image\nplt.imshow(image_kernel, cmap=\"gray\"), plt.xticks([]), plt.yticks([])\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_1.png)"

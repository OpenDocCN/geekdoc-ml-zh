    # # 16.2 Training a Multiclass Classifier


    # ## Problem


    Given more than two classes, you need to train a classifier model.


    # ## Solution


    Train a logistic regression in scikit-learn with LogisticRegression using one-vs-rest
    or multinomial methods:


    ```

    # Load libraries

    from sklearn.linear_model import LogisticRegression

    from sklearn import datasets

    from sklearn.preprocessing import StandardScaler


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Standardize features

    scaler = StandardScaler()

    features_standardized = scaler.fit_transform(features)


    # Create one-vs-rest logistic regression object

    logistic_regression = LogisticRegression(random_state=0, multi_class="ovr")


    # Train model

    model = logistic_regression.fit(features_standardized, target)

    ```


    # ## Discussion


    On their own, logistic regressions are only binary classifiers, meaning they cannot
    handle target vectors with more than two classes. However, two clever extensions
    to logistic regression do just that. First, in *one-vs-rest* logistic regression
    (OvR) a separate model is trained for each class predicted, whether an observation
    is that class or not (thus making it a binary classification problem). It assumes
    that each classification problem (e.g., class 0 or not) is independent.


    Alternatively, in *multinomial logistic regression* (MLR), the logistic function
    we saw in Recipe 16.1 is replaced with a softmax function:


    $$P(y_i = k \mid X) = \frac{e^{\beta_k x_i}}{\sum_{j=1}^K e^{\beta_j x_i}}$$'
  - "[PAGE 293]\n\nwhere $P(y_i = k \\mid X)$ is the probability of the $i$th observation's\
    \ target value, $y_i$, being in class $k$, and $K$ is the total number of classes.\
    \ One practical advantage of MLR is that its predicted probabilities using the\
    \ `predict_proba` method are more reliable (i.e., better calibrated).\n\nWhen\
    \ using `LogisticRegression` we can select which of the two techniques we want,\
    \ with OvR (`ovr`) being the default argument. We can switch to MLR by setting\
    \ the argument to `multinomial`.\n\n# 16.3 Reducing Variance Through Regularization\n\
    \n# Problem\n\nYou need to reduce the variance of your logistic regression model.\n\
    \n# Solution\n\nTune the regularization strength hyperparameter, C:\n\n```\n#\
    \ Load libraries\nfrom sklearn.linear_model import LogisticRegressionCV\nfrom\
    \ sklearn import datasets\nfrom sklearn.preprocessing import StandardScaler\n\n\
    # Load data\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# Standardize features\nscaler = StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\
    \n# Create decision tree regression object\nlogistic_regression = LogisticRegressionCV(\n\
    \    penalty='l2', Cs=10, random_state=0, n_jobs=-1)\n\n# Train model\nmodel =\
    \ logistic_regression.fit(features_standardized, target)\n```\n\n# Discussion\n\
    \n*Regularization* is a method of penalizing complex models to reduce their variance.\
    \ Specifically, a penalty term is added to the loss function we are trying to\
    \ minimize, typically the L1 and L2 penalties. In the L1 penalty:"
  - '[PAGE 294]


    $$\alpha \sum_{j=1}^{p} |\widehat{\beta}_j|$$


    where $\widehat{\beta}_j$ is the parameters of the $j$th of $p$ features being
    learned, and $\alpha$ is a hyper-parameter denoting the regularization strength.
    With the L2 penalty:


    $$\alpha \sum_{j=1}^{p} \widehat{\beta}_j^2$$


    Higher values of $\alpha$ increase the penalty for larger parameter values (i.e.,
    more complex models). scikit-learn follows the common method of using $C$ instead
    of $\alpha$ where $C$ is the inverse of the regularization strength: $C = \frac{1}{\alpha}$.
    To reduce variance while using logistic regression, we can treat $C$ as a hyperparameter
    to be tuned to find the value of $C$ that creates the best model. In scikit-learn
    we can use the LogisticRegressionCV class to efficiently tune $C$. LogisticRegressionCV''s
    parameter Cs can either accept a range of values for $C$ to search over (if a
    list of floats is supplied as an argument) or, if supplied an integer, will generate
    a list of that many candidate values drawn from a logarithmic scale between -10,000
    and 10,000.


    Unfortunately, LogisticRegressionCV does not allow us to search over different
    penalty terms. To do this we have to use the less efficient model selection techniques
    discussed in Chapter 12.



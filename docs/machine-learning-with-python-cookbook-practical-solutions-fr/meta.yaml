- md: "## 14.4 Training a Random Forest Classifier\n\n### Problem\n\nYou want to train\
    \ a classification model using a “forest” of randomized decision trees.\n\n###\
    \ Solution\n\nUse scikit-learn's `RandomForestClassifier` to train a random forest\
    \ classification model.\n\n```python\n# Load libraries\nfrom sklearn.ensemble\
    \ import RandomForestClassifier\nfrom sklearn import datasets\n\n# Load data\n\
    iris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\n# Create\
    \ random forest classifier object\nrandomforest = RandomForestClassifier(random_state=0,\
    \ n_jobs=-1)\n\n# Train model\nmodel = randomforest.fit(features, target)\n```\n\
    \n### Discussion\n\nA common problem with decision trees is that they tend to\
    \ fit the training data too closely (i.e., overfitting). This has motivated the\
    \ widespread use of an ensemble learning method called *random forest*. In a random\
    \ forest, many decision trees are trained, but each tree receives only a bootstrapped\
    \ sample of observations (i.e., a random sample of observations with replacement\
    \ that matches the original number of observations), and each node considers only\
    \ a subset of features when determining the best split. This forest of randomized\
    \ decision trees (hence the name) votes to determine the predicted class.\n\n\
    As we can see by comparing this solution to Recipe 14.1, scikit-learn's RandomForestClassifier\
    \ works similarly to DecisionTreeClassifier:\n\n```python\n# Make new observation\n\
    observation = [[ 5, 4, 3, 2]]\n\n# Predict observation's class\nmodel.predict(observation)\n\
    \narray([1])\n```\n\nRandomForestClassifier also uses many of the same parameters\
    \ as DecisionTreeClassifier. For example, we can change the measure of split quality\
    \ used:\n\n```python\n# Create random forest classifier object using entropy\n\
    randomforest_entropy = RandomForestClassifier(\n    criterion=\"entropy\", random_state=0)\n\
    \n# Train model\nmodel_entropy = randomforest_entropy.fit(features, target)\n\
    ```\n\nHowever, being a forest rather than an individual decision tree, RandomForestClassifier\
    \ has certain parameters that are either unique to random forests or particularly\
    \ important. First, the `max_features` parameter determines the maximum number\
    \ of features to be considered at each node and takes a number of arguments including\
    \ integers (number of features), floats (percentage of features), and `sqrt` (square\
    \ root of the number of features). By default, `max_features` is set to `auto`,\
    \ which acts the same as `sqrt`. Second, the `bootstrap` parameter allows us to\
    \ set whether the subset of observations considered for a tree is created using\
    \ sampling with replacement (the default setting) or without replacement. Third,\
    \ `n_estimators` sets the number of decision trees to include in the forest. Finally,\
    \ while not specific to random forest classifiers, because we are effectively\
    \ training many decision tree models, it is often useful to use all available\
    \ cores by setting `n_jobs=-1`.\n\n### See Also\n\n- Random Forests, Berkeley\
    \ Statistics\n\n## 14.5 Training a Random Forest Regressor\n\n### Problem\n\n\
    You want to train a regression model using a “forest” of randomized decision trees.\n\
    \n### Solution\n\nTrain a random forest regression model using scikit-learn’s\
    \ `RandomForestRegressor`:\n\n```python\n# Load libraries\nfrom sklearn.ensemble\
    \ import RandomForestRegressor\nfrom sklearn import datasets\n\n# Load data with\
    \ only two features\ndiabetes = datasets.load_diabetes()\nfeatures = diabetes.data\n\
    target = diabetes.target\n\n# Create random forest regressor object\nrandomforest\
    \ = RandomForestRegressor(random_state=0, n_jobs=-1)\n\n# Train model\nmodel =\
    \ randomforest.fit(features, target)\n```\n\n### Discussion\n\nJust as we can\
    \ make a forest of decision tree classifiers, we can make a forest of decision\
    \ tree regressors, where each tree uses a bootstrapped subset of observations\
    \ and at each node the decision rule considers only a subset of features. As with\
    \ RandomForestClassifier we have certain important parameters:\n\n- `max_features`:\
    \ Sets the maximum number of features to consider at each node. Defaults to *p*\
    \ features, where *p* is the total number of features.\n- `bootstrap`: Sets whether\
    \ or not to sample with replacement. Defaults to True.\n- `n_estimators`: Sets\
    \ the number of decision trees to construct. Defaults to 10.\n\n### See Also\n\
    \n- scikit-learn documentation: RandomForestRegressor\n\n## 14.6 Evaluating Random\
    \ Forests with Out-of-Bag Errors\n\n### Problem\n\nYou need to evaluate a random\
    \ forest model without using cross-validation.\n\n### Solution\n\nCalculate the\
    \ model's out-of-bag score:\n\n```python\n# Load libraries\nfrom sklearn.ensemble\
    \ import RandomForestClassifier\nfrom sklearn import datasets\n\n# Load data\n\
    iris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\n# Create\
    \ random forest classifier object\nrandomforest = RandomForestClassifier(\n  \
    \  random_state=0, n_estimators=1000, oob_score=True, n_jobs=-1)\n\n# Train model\n\
    model = randomforest.fit(features, target)\n\n# View out-of-bag-error\nrandomforest.oob_score_\n\
    0.9533333333333334\n```\n\n### Discussion\n\nIn random forests, each decision\
    \ tree is trained using a bootstrapped subset of observations. This means that\
    \ for every tree there is a separate subset of observations not being used to\
    \ train that tree. These are called out-of-bag (OOB) observations. We can use\
    \ OOB observations as a test set to evaluate the performance of our random forest.\n\
    \nFor every observation, the learning algorithm compares the observation's true\
    \ value with the prediction from a subset of trees not trained using that observation.\
    \ The overall score is calculated and provides a single measure of a random forest's\
    \ performance. OOB score estimation is an alternative to cross-validation.\n\n\
    In scikit-learn, we can compute OOB scores of a random forest by setting `oob_score=True`\
    \ in the random forest object (i.e., `RandomForestClassifier`). The score can\
    \ be retrieved using `oob_score_`.\n\n## 14.7 Identifying Important Features in\
    \ Random Forests\n\n### Problem\n\nYou need to know which features are most important\
    \ in a random forest model.\n\n### Solution\n\nCalculate and visualize the importance\
    \ of each feature by inspecting the model's `feature_importances_` attribute:\n\
    \n```python\n# Load libraries\nimport numpy as np\nimport matplotlib.pyplot as\
    \ plt\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn import\
    \ datasets\n\n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\n\
    target = iris.target\n\n# Create random forest classifier object\nrandomforest\
    \ = RandomForestClassifier(random_state=0, n_jobs=-1)\n\n# Train model\nmodel\
    \ = randomforest.fit(features, target)\n\n# Calculate feature importances\nimportances\
    \ = model.feature_importances_\n\n# Sort feature importances in descending order\n\
    indices = np.argsort(importances)[::-1]\n\n# Rearrange feature names so they match\
    \ the sorted feature importances\nnames = [iris.feature_names[i] for i in indices]\n\
    \n# Create plot\nplt.figure()\nplt.title(\"Feature Importance\")\nplt.bar(range(features.shape[1]),\
    \ importances[indices])\nplt.xticks(range(features.shape[1]), names, rotation=90)\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_268_0.png)\n\n###\
    \ Discussion\n\nOne of the major benefits of decision trees is interpretability.\
    \ Specifically, we can visualize the entire model (see Recipe 14.3). However,\
    \ a random forest model is composed of tens, hundreds, or even thousands of decision\
    \ trees. This makes a simple, intuitive visualization of a random forest model\
    \ impractical. That said, there is another option: we can compare (and visualize)\
    \ the relative importance of each feature.\n\nIn Recipe 14.3, we visualized a\
    \ decision tree classifier model and saw that decision rules based only on petal\
    \ width were able to classify many observations correctly. Intuitively, we can\
    \ say this means that petal width is an important feature in our model."
  mdcn: "## 14.4 训练随机森林分类器\n\n### 问题\n\n你想使用由随机化决策树组成的“森林”来训练一个分类模型。\n\n### 解决方案\n\
    \n使用 scikit-learn 的 `RandomForestClassifier` 来训练一个随机森林分类模型。\n\n```python\n# 加载库\n\
    from sklearn.ensemble import RandomForestClassifier\nfrom sklearn import datasets\n\
    \n# 加载数据\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# 创建随机森林分类器对象\nrandomforest = RandomForestClassifier(random_state=0, n_jobs=-1)\n\
    \n# 训练模型\nmodel = randomforest.fit(features, target)\n```\n\n### 讨论\n\n决策树的一个常见问题是它们倾向于过度拟合训练数据（即过拟合）。这促使了一种名为*随机森林*的集成学习方法被广泛使用。在随机森林中，会训练许多决策树，但每棵树只接收一个自助采样（bootstrap）的观测样本（即一个与原始观测数量匹配的、有放回的随机观测样本），并且每个节点在确定最佳分割点时只考虑特征的一个子集。这片随机化的决策树森林（因此得名）通过投票来确定预测类别。\n\
    \n通过将此解决方案与配方 14.1 进行比较，我们可以看到 scikit-learn 的 RandomForestClassifier 与 DecisionTreeClassifier\
    \ 的工作方式类似：\n\n```python\n# 创建新观测\nobservation = [[ 5, 4, 3, 2]]\n\n# 预测观测的类别\n\
    model.predict(observation)\n\narray([1])\n```\n\nRandomForestClassifier 也使用了许多与\
    \ DecisionTreeClassifier 相同的参数。例如，我们可以更改用于衡量分割质量的指标：\n\n```python\n# 使用熵创建随机森林分类器对象\n\
    randomforest_entropy = RandomForestClassifier(\n    criterion=\"entropy\", random_state=0)\n\
    \n# 训练模型\nmodel_entropy = randomforest_entropy.fit(features, target)\n```\n\n\
    然而，由于它是一个森林而不是单个决策树，RandomForestClassifier 拥有一些要么是随机森林特有的，要么是特别重要的参数。首先，`max_features`\
    \ 参数决定了在每个节点考虑的最大特征数量，它接受多种参数，包括整数（特征数量）、浮点数（特征百分比）和 `sqrt`（特征数量的平方根）。默认情况下，`max_features`\
    \ 设置为 `auto`，其作用与 `sqrt` 相同。其次，`bootstrap` 参数允许我们设置用于树的观测子集是通过有放回抽样（默认设置）还是无放回抽样创建的。第三，`n_estimators`\
    \ 设置森林中包含的决策树数量。最后，虽然这不是随机森林分类器特有的，但由于我们实际上是在训练许多决策树模型，通过设置 `n_jobs=-1` 来使用所有可用的\
    \ CPU 核心通常很有用。\n\n### 另请参阅\n\n- 随机森林，伯克利统计学\n\n## 14.5 训练随机森林回归器\n\n### 问题\n\n\
    你想使用由随机化决策树组成的“森林”来训练一个回归模型。\n\n### 解决方案\n\n使用 scikit-learn 的 `RandomForestRegressor`\
    \ 训练一个随机森林回归模型：\n\n```python\n# 加载库\nfrom sklearn.ensemble import RandomForestRegressor\n\
    from sklearn import datasets\n\n# 加载仅包含两个特征的数据\ndiabetes = datasets.load_diabetes()\n\
    features = diabetes.data\ntarget = diabetes.target\n\n# 创建随机森林回归器对象\nrandomforest\
    \ = RandomForestRegressor(random_state=0, n_jobs=-1)\n\n# 训练模型\nmodel = randomforest.fit(features,\
    \ target)\n```\n\n### 讨论\n\n正如我们可以创建决策树分类器的森林一样，我们也可以创建决策树回归器的森林，其中每棵树使用一个自助采样的观测子集，并且在每个节点，决策规则只考虑特征的一个子集。与\
    \ RandomForestClassifier 一样，我们有一些重要的参数：\n\n- `max_features`：设置在每个节点考虑的最大特征数量。默认为\
    \ *p* 个特征，其中 *p* 是特征总数。\n- `bootstrap`：设置是否进行有放回抽样。默认为 True。\n- `n_estimators`：设置要构建的决策树数量。默认为\
    \ 10。\n\n### 另请参阅\n\n- scikit-learn 文档：RandomForestRegressor\n\n## 14.6 使用袋外误差评估随机森林\n\
    \n### 问题\n\n你需要在不使用交叉验证的情况下评估一个随机森林模型。\n\n### 解决方案\n\n计算模型的袋外分数：\n\n```python\n\
    # 加载库\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn import\
    \ datasets\n\n# 加载数据\niris = datasets.load_iris()\nfeatures = iris.data\ntarget\
    \ = iris.target\n\n# 创建随机森林分类器对象\nrandomforest = RandomForestClassifier(\n   \
    \ random_state=0, n_estimators=1000, oob_score=True, n_jobs=-1)\n\n# 训练模型\nmodel\
    \ = randomforest.fit(features, target)\n\n# 查看袋外误差\nrandomforest.oob_score_\n\
    0.9533333333333334\n```\n\n### 讨论\n\n在随机森林中，每棵决策树都是使用一个自助采样的观测子集进行训练的。这意味着对于每棵树，都有一部分观测数据没有被用于训练该树。这些被称为袋外（OOB）观测。我们可以使用袋外观测作为测试集来评估随机森林的性能。\n\
    \n对于每个观测，学习算法会将该观测的真实值与一个未使用该观测训练的树子集的预测值进行比较。计算出总体分数，从而提供一个衡量随机森林性能的单一指标。袋外分数估计是交叉验证的一种替代方法。\n\
    \n在 scikit-learn 中，我们可以通过在随机森林对象（即 `RandomForestClassifier`）中设置 `oob_score=True`\
    \ 来计算随机森林的袋外分数。该分数可以通过 `oob_score_` 获取。\n\n## 14.7 识别随机森林中的重要特征\n\n### 问题\n\n\
    你需要知道在随机森林模型中哪些特征是最重要的。\n\n### 解决方案\n\n通过检查模型的 `feature_importances_` 属性来计算和可视化每个特征的重要性：\n\
    \n```python\n# 加载库\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom\
    \ sklearn.ensemble import RandomForestClassifier\nfrom sklearn import datasets\n\
    \n# 加载数据\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# 创建随机森林分类器对象\nrandomforest = RandomForestClassifier(random_state=0, n_jobs=-1)\n\
    \n# 训练模型\nmodel = randomforest.fit(features, target)\n\n# 计算特征重要性\nimportances\
    \ = model.feature_importances_\n\n# 按降序对特征重要性进行排序\nindices = np.argsort(importances)[::-1]\n\
    \n# 重新排列特征名称，使其与排序后的特征重要性匹配\nnames = [iris.feature_names[i] for i in indices]\n\
    \n# 创建绘图\nplt.figure()\nplt.title(\"Feature Importance\")\nplt.bar(range(features.shape[1]),\
    \ importances[indices])\nplt.xticks(range(features.shape[1]), names, rotation=90)\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_268_0.png)\n\n###\
    \ 讨论\n\n决策树的主要优势之一是可解释性。具体来说，我们可以可视化整个模型（参见配方 14.3）。然而，一个随机森林模型由数十、数百甚至数千棵决策树组成。这使得对随机森林模型进行简单、直观的可视化变得不切实际。尽管如此，还有另一个选择：我们可以比较（并可视化）每个特征的相对重要性。\n\
    \n在配方 14.3 中，我们可视化了一个决策树分类器模型，并看到仅基于花瓣宽度的决策规则就能正确分类许多观测。直观地说，我们可以认为这意味着花瓣宽度在我们的模型中是一个重要的特征。"

  md: "```\n# Replace the first observation's values with extreme values\nfeatures[0,0]\
    \ = 10000\nfeatures[0,1] = 10000\n\n# Create detector\noutlier_detector = EllipticEnvelope(contamination=.1)\n\
    \n# Fit detector\noutlier_detector.fit(features)\n\n# Predict outliers\noutlier_detector.predict(features)\n\
    \narray([-1,  1,  1,  1,  1,  1,  1,  1,  1])\n```\n\nIn these arrays, values\
    \ of -1 refer to outliers whereas values of 1 refer to inliers. A major limitation\
    \ of this approach is the need to specify a contamination parameter, which is\
    \ the proportion of observations that are outliers—a value that we don't know.\
    \ Think of contamination as our estimate of the cleanliness of our data. If we\
    \ expect our data to have few outliers, we can set contamination to something\
    \ small. However, if we believe that the data is likely to have outliers, we can\
    \ set it to a higher value.\n\nInstead of looking at observations as a whole,\
    \ we can instead look at individual features and identify extreme values in those\
    \ features using interquartile range (IQR):\n\n```\n# Create one feature\nfeature\
    \ = features[:,0]\n\n# Create a function to return index of outliers\ndef indicies_of_outliers(x:\
    \ int) -> np.array(int):\n    q1, q3 = np.percentile(x, [25, 75])\n    iqr = q3\
    \ - q1\n    lower_bound = q1 - (iqr * 1.5)\n    upper_bound = q3 + (iqr * 1.5)\n\
    \    return np.where((x > upper_bound) | (x < lower_bound))\n\n# Run function\n\
    indicies_of_outliers(feature)\n\n(array([0]),)\n```\n\nIQR is the difference between\
    \ the first and third quartile of a set of data. You can think of IQR as the spread\
    \ of the bulk of the data, with outliers being observations far from the main\
    \ concentration of data. Outliers are commonly defined as any value 1.5 IQRs less\
    \ than the first quartile, or 1.5 IQRs greater than the third quartile."

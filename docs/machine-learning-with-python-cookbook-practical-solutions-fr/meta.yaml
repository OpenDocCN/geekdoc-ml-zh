  md: '# CHAPTER 5

    Handling Categorical Data


    # 5.0 Introduction


    It is often useful to measure objects not in terms of their quantity but in terms
    of some quality. We frequently represent qualitative information in categories
    such as gender, colors, or brand of car. However, not all categorical data is
    the same. Sets of categories with no intrinsic ordering are called *nominal*.
    Examples of nominal categories include:


    +   - Blue, Red, Green

    - Man, Woman

    - Banana, Strawberry, Apple


    In contrast, when a set of categories has some natural ordering we refer to it
    as *ordinal*. For example:


    +   - Low, Medium, High

    - Young, Old

    - Agree, Neutral, Disagree


    Furthermore, categorical information is often represented in data as a vector
    or column of strings (e.g., "Maine", "Texas", "Delaware"). The problem is that
    most machine learning algorithms require inputs to be numerical values.


    The k-nearest neighbors algorithm is an example of an algorithm that requires
    numerical data. One step in the algorithm is calculating the distances between
    observations—often using Euclidean distance:'

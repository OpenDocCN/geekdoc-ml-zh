- md: "## 21.13 Tuning Neural Networks\n\n### Problem\n\nYou want to automatically\
    \ select the best hyperparameters for your neural network.\n\n### Solution\n\n\
    Use the ray tuning library with PyTorch:\n\n```python\n# Load libraries\nfrom\
    \ functools import partial\nimport numpy as np\nimport os\nimport torch\nimport\
    \ torch.nn as nn\nimport torch.nn.functional as F\nimport torch.optim as optim\n\
    from torch.optim import RMSprop\nfrom torch.utils.data import random_split, DataLoader,\
    \ TensorDataset\nfrom ray import tune\nfrom ray.tune import CLIReporter\nfrom\
    \ ray.tune.schedulers import ASHAScheduler\nfrom sklearn.datasets import make_classification\n\
    from sklearn.model_selection import train_test_split\n\n# Create training and\
    \ test sets\nfeatures, target = make_classification(n_classes=2, n_features=10,\n\
    \                                      n_samples=1000)\nfeatures_train, features_test,\
    \ target_train, target_test = train_test_split(\n    features, target, test_size=0.1,\
    \ random_state=1)\n\n# Set random seed\ntorch.manual_seed(0)\nnp.random.seed(0)\n\
    \n# Convert data to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\n\
    y_train = torch.from_numpy(target_train).float().view(-1, 1)\nx_test = torch.from_numpy(features_test).float()\n\
    y_test = torch.from_numpy(target_test).float().view(-1, 1)\n\n# Define a neural\
    \ network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self,\
    \ layer_size_1=10, layer_size_2=10):\n        super(SimpleNeuralNet, self).__init__()\n\
    \        self.sequential = torch.nn.Sequential(\n            torch.nn.Linear(10,\
    \ layer_size_1),\n            torch.nn.ReLU(),\n            torch.nn.Linear(layer_size_1,\
    \ layer_size_2),\n            torch.nn.ReLU(),\n            torch.nn.Linear(layer_size_2,\
    \ 1),\n            torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n\
    \        x = self.sequential(x)\n        return x\n\nconfig = {\n    \"layer_size_1\"\
    : tune.sample_from(lambda _: 2 ** np.random.randint(2, 9)),\n    \"layer_size_2\"\
    : tune.sample_from(lambda _: 2 ** np.random.randint(2, 9)),\n    \"lr\": tune.loguniform(1e-4,\
    \ 1e-1),\n}\n\nscheduler = ASHAScheduler(\n    metric=\"loss\",\n    mode=\"min\"\
    ,\n    max_t=1000,\n    grace_period=1,\n    reduction_factor=2\n)\n\nreporter\
    \ = CLIReporter(\n    parameter_columns=[\"layer_size_1\", \"layer_size_2\", \"\
    lr\"],\n    metric_columns=[\"loss\"]\n)\n\n# Train neural network\ndef train_model(config,\
    \ epochs=3):\n    network = SimpleNeuralNet(config[\"layer_size_1\"], config[\"\
    layer_size_2\"])\n\n    criterion = nn.BCELoss()\n    optimizer = optim.SGD(network.parameters(),\
    \ lr=config[\"lr\"], momentum=0.9)\n\n    train_data = TensorDataset(x_train,\
    \ y_train)\n    train_loader = DataLoader(train_data, batch_size=100, shuffle=True)\n\
    \n    # Compile the model using torch 2.0's optimizer\n    network = torch.compile(network)\n\
    \n    for epoch in range(epochs):\n        for batch_idx, (data, target) in enumerate(train_loader):\n\
    \            optimizer.zero_grad()\n            output = network(data)\n     \
    \       loss = criterion(output, target)\n            loss.backward()\n      \
    \      optimizer.step()\n            tune.report(loss=(loss.item()))\n\nresult\
    \ = tune.run(\n    train_model,\n    resources_per_trial={\"cpu\": 2},\n    config=config,\n\
    \    num_samples=1,\n    scheduler=scheduler,\n    progress_reporter=reporter\n\
    )\n\nbest_trial = result.get_best_trial(\"loss\", \"min\", \"last\")\nprint(\"\
    Best trial config: {}\".format(best_trial.config))\nprint(\"Best trial final validation\
    \ loss: {}\".format(\n    best_trial.last_result[\"loss\"]))\n\nbest_trained_model\
    \ = SimpleNeuralNet(best_trial.config[\"layer_size_1\"],\n    best_trial.config[\"\
    layer_size_2\"])\n\n== Status ==\nCurrent time: 2023-03-05 23:31:33 (running for\
    \ 00:00:00.07)\nMemory usage on this node: 1.7/15.6 GiB\nUsing AsyncHyperBand:\

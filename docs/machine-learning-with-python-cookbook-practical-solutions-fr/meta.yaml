    This is because drop_duplicates defaults to dropping only rows that match perfectly
    across all columns. Because every row in our DataFrame is unique, none will be
    dropped. However, often we want to consider only a subset of columns to check
    for duplicate rows. We can accomplish this using the subset parameter:


    ```

    # Drop duplicates

    dataframe.drop_duplicates(subset=[''Sex''])

    ```


    | Name | PClass | Age | Sex | Survived | SexCode |

    |---|---|---|---|---|---|

    | 0 Allen, Miss Elisabeth Walton | 1st | 29.0 | female | 1 | 1 |

    | 2 Allison, Mr Hudson Joshua Creighton | 1st | 30.0 | male | 0 | 0 |


    Take a close look at the preceding output: we told drop_duplicates to only consider
    any two rows with the same value for Sex to be duplicates and to drop them. Now
    we are left with a DataFrame of only two rows: one woman and one man. You might
    be asking why drop_duplicates decided to keep these two rows instead of two different
    rows. The answer is that drop_duplicates defaults to keeping the first occurrence
    of a duplicated row and dropping the rest. We can control this behavior using
    the keep parameter:


    ```

    # Drop duplicates

    dataframe.drop_duplicates(subset=[''Sex''], keep=''last'')


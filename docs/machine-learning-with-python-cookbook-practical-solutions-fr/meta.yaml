    \n# Train model\nlogit.fit(features, target)\n\n# Print model\nprint(logit)\n\n\
    LogisticRegressionCV(Cs=100, max_iter=500, solver='liblinear')\n```\n\n# Discussion\n\
    \nSometimes the characteristics of a learning algorithm allow us to search for\
    \ the best hyperparameters significantly faster than either brute-force or randomized\
    \ model search methods. In scikit-learn, many learning algorithms (e.g., ridge,\
    \ lasso, and elastic net regression) have an algorithm-specific cross-validation\
    \ method to take advantage of this. For example, LogisticRegression is used to\
    \ conduct a standard logistic regression classifier, while LogisticRegressionCV\
    \ implements an efficient cross-validated logistic regression classifier that\
    \ can identify the optimum value of the hyperparameter C.\n\nscikit-learn's LogisticRegressionCV\
    \ method includes a parameter Cs. If supplied a list, Cs contains the candidate\
    \ hyperparameter values to select from. If supplied an integer, the parameter\
    \ Cs generates a list of that number of candidate values. The candidate values\
    \ are drawn logarithmically from a range between 0.0001 and 10,0000 (a range of\
    \ reasonable values for C)."

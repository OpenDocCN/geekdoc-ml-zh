  md: "# Discussion\n\nThe inverse of a square matrix, **A**, is a second matrix,\
    \ **A⁻¹**, such that:\n\n$$\\mathbf{AA}^{-1} = \\mathbf{I}$$\n\nwhere **I** is\
    \ the identity matrix. In NumPy we can use `linalg.inv` to calculate **A⁻¹** if\
    \ it exists. To see this in action, we can multiply a matrix by its inverse, and\
    \ the result is the identity matrix:\n\n```\n# Multiply matrix and its inverse\n\
    matrix @ np.linalg.inv(matrix)\n\narray([[ 1.,  0.],\n       [ 0.,  1.]])\n```\n\
    \n# See Also\n\n+   - [Inverse of a Matrix](Inverse of a Matrix)\n\n# 1.20 Generating\

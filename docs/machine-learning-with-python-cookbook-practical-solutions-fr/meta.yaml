    \ x_1^2, x_1^2, x_2^2$\n\nwhile degree=3 will create new features raised to the\
    \ second and third power:\n\n$x_1, x_2, x_1^2, x_2^2, x_1^3, x_2^3, x_1^2, x_1^3,\
    \ x_2^3$\n\nFurthermore, by default PolynomialFeatures includes interaction features:\n\
    \n$x_1x_2$\n\nWe can restrict the features created to only interaction features\
    \ by setting interaction_only to True:\n\n```\ninteraction = PolynomialFeatures(degree=2,\n\
    \                                interaction_only=True, include_bias=False)\n\n\
    interaction.fit_transform(features)\narray([[ 2.,  3.,  6.],\n       [ 2.,  3.,\
    \  6.],\n       [ 2.,  3.,  6.]])\n```\n\n# Discussion\n\nPolynomial features\

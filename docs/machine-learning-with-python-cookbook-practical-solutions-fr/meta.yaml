    ## Discussion\n\nOne strategy to combat overfitting neural networks is by penalizing\
    \ the parameters (i.e., weights) of the neural network such that they are driven\
    \ to be small values, creating a simpler model less prone to overfit. This method\
    \ is called weight regularization or weight decay. More specifically, in weight\
    \ regularization a penalty is added to the loss function, such as the L2 norm.\n\
    \nIn PyTorch, we can add weight regularization by including weight_decay=1e-5\
    \ in the optimizer where regularization happens. In this example, 1e-5 determines\
    \ how much we penalize higher parameter values. Values greater than 0 indicate\
    \ L2 regularization in PyTorch.\n\n## 21.10 Reducing Overfitting with Early Stopping\n\
    \n### Problem\n\nYou want to reduce overfitting by stopping training when your\
    \ train and test scores diverge.\n\n### Solution\n\nUse PyTorch Lightning to implement\
    \ a strategy called *early stopping*:\n\n```python\n# Import libraries\nimport\
    \ torch\nimport torch.nn as nn\nimport numpy as np\nfrom torch.utils.data import\
    \ DataLoader, TensorDataset\nfrom torch.optim import RMSprop\nimport lightning\
    \ as pl\nfrom lightning.pytorch.callbacks.early_stopping import EarlyStopping\n\
    from sklearn.datasets import make_classification\nfrom sklearn.model_selection\
    \ import train_test_split\n\n# Create training and test sets\nfeatures, target\

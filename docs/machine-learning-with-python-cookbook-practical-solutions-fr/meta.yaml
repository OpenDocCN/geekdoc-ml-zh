  md: "# Discussion\n\nMost training algorithms (including many covered in this book)\
    \ contain hyperparameters that must be chosen before the training process begins.\
    \ For example, a *random forest classifier* creates a “forest” of decision trees,\
    \ each of which votes on the predicted class of an observation. One hyperparameter\
    \ in random forest classifiers is the number of trees in the forest. Most often\
    \ hyperparameter values are selected during model selection (see Chapter 12).\
    \ However, it is occasionally useful to visualize how model performance changes\
    \ as the hyperparameter value changes. In our solution, we plot the changes in\
    \ accuracy for a random forest classifier for the training set and during cross-validation\
    \ as the number of trees increases. When we have a small number of trees, both\
    \ the training and cross-validation score are low, suggesting the model is underfitted.\
    \ As the number of trees increases to 250, the accuracy of both levels off, suggesting\
    \ there is probably not much value in the computational cost of training a massive\
    \ forest.\n\nIn scikit-learn, we can calculate the validation curve using `validation_curve`,\
    \ which contains three important parameters:\n\n`param_name`\n    Name of the\
    \ hyperparameter to vary\n\n`param_range`\n    Value of the hyperparameter to\
    \ use\n\n`scoring`\n    Evaluation metric used to judge to model\n\n# See Also\n\
    \n+   - scikit-learn documentation: Validation Curve"

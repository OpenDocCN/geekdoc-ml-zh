    \ 4.9%，但它显然无法*预测*任何东西。因此，我们通常倾向于使用其他指标，如精确率、召回率和 $F_1$ 分数。\n\n*精确率*是所有被预测为正类的观测值中，实际为正类的比例。我们可以将其视为预测中的噪声度量——即当我们预测某物为正类时，我们正确的可能性有多大。高精确率的模型是悲观的，因为它们只有在非常确定时才会预测观测值为正类。形式上，精确率为：\n\
    \n$$精确率 = \\frac{TP}{TP + FP}$$\n\n```python\n# 使用精确率进行交叉验证\ncross_val_score(logit,\
    \ X, y, scoring=\"precision\")\narray([0.95963673, 0.94820717, 0.9635996 , 0.96149949,\
    \ 0.96060606])\n```\n\n召回率是所有实际为正类的观测值中，被正确识别为正类的比例。召回率衡量模型识别正类观测值的能力。高召回率的模型是乐观的，因为它们预测观测值为正类的门槛较低：\n\
    \n$$召回率 = \\frac{TP}{TP + FN}$$\n\n```python\n# 使用召回率进行交叉验证\ncross_val_score(logit,\

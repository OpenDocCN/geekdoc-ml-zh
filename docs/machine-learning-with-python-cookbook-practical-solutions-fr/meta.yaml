- md: "In scikit-learn, LDA is implemented using `LinearDiscriminantAnalysis`, which\
    \ includes a parameter, `n_components`, indicating the number of features we want\
    \ returned. To figure out what argument value to use with `n_components` (e.g.,\
    \ how many parameters to keep), we can take advantage of the fact that `explained_variance_ratio_`\
    \ tells us the variance explained by each outputted feature and is a sorted array.\
    \ For example:\n\n```python\nlda.explained_variance_ratio_\narray([0.9912126])\n\
    ```\n\nSpecifically, we can run `LinearDiscriminantAnalysis` with `n_components`\
    \ set to `None` to return the ratio of variance explained by every component feature,\
    \ then calculate how many components are required to get above some threshold\
    \ of variance explained (often 0.95 or 0.99):\n\n```python\n# Create and run LDA\n\
    lda = LinearDiscriminantAnalysis(n_components=None)\nfeatures_lda = lda.fit(features,\
    \ target)\n\n# Create array of explained variance ratios\nlda_var_ratios = lda.explained_variance_ratio_\n\
    \n# Create function\ndef select_n_components(var_ratio, goal_var: float) -> int:\n\
    \    # Set initial variance explained so far\n    total_variance = 0.0\n\n   \
    \ # Set initial number of features\n    n_components = 0\n\n    # For the explained\
    \ variance of each feature:\n    for explained_variance in var_ratio:\n\n    \
    \    # Add the explained variance to the total\n        total_variance += explained_variance\n\
    \n        # Add one to the number of components\n        n_components += 1\n\n\
    \        # If we reach our goal level of explained variance\n        if total_variance\
    \ >= goal_var:\n            # End the loop\n            break\n\n    # Return\
    \ the number of components\n    return n_components\n\n# Run function\nselect_n_components(lda_var_ratios,\
    \ 0.95)\n1\n```\n\n## See Also\n\n- Comparison of LDA and PCA 2D Projection of\
    \ Iris Dataset\n- Linear Discriminant Analysis\n\n## 9.4 Reducing Features Using\
    \ Matrix Factorization\n\n### Problem\n\nYou have a feature matrix of nonnegative\
    \ values and want to reduce the dimensionality.\n\n### Solution\n\nUse *nonnegative\
    \ matrix factorization* (NMF) to reduce the dimensionality of the feature matrix:\n\
    \n```python\n# Load libraries\nfrom sklearn.decomposition import NMF\nfrom sklearn\
    \ import datasets\n\n# Load the data\ndigits = datasets.load_digits()\n\n# Load\
    \ feature matrix\nfeatures = digits.data\n\n# Create, fit, and apply NMF\nnmf\
    \ = NMF(n_components=10, random_state=4)\nfeatures_nmf = nmf.fit_transform(features)\n\
    \n# Show results\nprint(\"Original number of features:\", features.shape[1])\n\
    print(\"Reduced number of features:\", features_nmf.shape[1])\nOriginal number\
    \ of features: 64\nReduced number of features: 10\n```\n\n### Discussion\n\nNMF\
    \ is an unsupervised technique for linear dimensionality reduction that *factorizes*\
    \ (i.e., breaks up into multiple matrices whose product approximates the original\
    \ matrix) the feature matrix into matrices representing the latent relationship\
    \ between observations and their features. Intuitively, NMF can reduce dimensionality\
    \ because in matrix multiplication, the two factors (matrices being multiplied)\
    \ can have significantly fewer dimensions than the product matrix. Formally, given\
    \ a desired number of returned features, *r*, NMF factorizes our feature matrix\
    \ such that:\n\n**V** ≈ **WH**\n\nwhere **V** is our *n* × *d* feature matrix\
    \ (i.e., *d* features, *n* observations), **W** is an *n* × *r* matrix, and **H**\
    \ is an *r* × *d* matrix. By adjusting the value of *r* we can set the amount\
    \ of dimensionality reduction desired.\n\nOne major requirement of NMF is that,\
    \ as the name implies, the feature matrix cannot contain negative values. Additionally,\
    \ unlike PCA and other techniques we have examined, NMF does not provide the explained\
    \ variance of the outputted features. Thus, the best way for us to find the optimum\
    \ value of `n_components` is by trying a range of values to find the one that\
    \ produces the best result in our end model (see Chapter 12).\n\n### See Also\n\
    \n- Non-negative matrix factorization, Wikipedia\n\n## 9.5 Reducing Features on\
    \ Sparse Data\n\n### Problem\n\nYou have a sparse feature matrix and want to reduce\
    \ the dimensionality.\n\n### Solution\n\nUse *Truncated Singular Value Decomposition*\
    \ (TSVD):\n\n```python\n# Load libraries\nfrom sklearn.preprocessing import StandardScaler\n\
    from sklearn.decomposition import TruncatedSVD\nfrom scipy.sparse import csr_matrix\n\
    from sklearn import datasets\nimport numpy as np\n\n# Load the data\ndigits =\
    \ datasets.load_digits()\n\n# Standardize feature matrix\nfeatures = StandardScaler().fit_transform(digits.data)\n\
    \n# Make sparse matrix\nfeatures_sparse = csr_matrix(features)\n\n# Create a TSVD\n\
    tsvd = TruncatedSVD(n_components=10)\n\n# Conduct TSVD on sparse matrix\nfeatures_sparse_tsvd\
    \ = tsvd.fit(features_sparse).transform(features_sparse)\n\n# Show results\nprint(\"\
    Original number of features:\", features_sparse.shape[1])\nprint(\"Reduced number\
    \ of features:\", features_sparse_tsvd.shape[1])\n\nOriginal number of features:\
    \ 64\nReduced number of features: 10\n```\n\n### Discussion\n\nTSVD is similar\
    \ to PCA and, in fact, PCA often uses nontruncated *Singular Value Decomposition*\
    \ (SVD) in one of its steps. Given $d$ features, SVD will create factor matrices\
    \ that are $d \\times d$, whereas TSVD will return factors that are $n \\times\
    \ n$, where $n$ is previously specified by a parameter. The practical advantage\
    \ of TSVD is that, unlike PCA, it works on sparse feature matrices.\n\nOne issue\
    \ with TSVD: because of how it uses a random number generator, the signs of the\
    \ output can flip between fittings. An easy workaround is to use `fit` only once\
    \ per preprocessing pipeline, then use `transform` multiple times.\n\nAs with\
    \ linear discriminant analysis, we have to specify the number of features (components)\
    \ we want to output. This is done with the `n_components` parameter. A natural\
    \ question is: what is the optimum number of components? One strategy is to include\
    \ `n_components` as a hyperparameter to optimize during model selection (i.e.,\
    \ choose the value for `n_components` that produces the best-trained model). Alternatively,\
    \ because TSVD provides the ratio of the original feature matrix's variance explained\
    \ by each component, we can select the number of components that explain a desired\
    \ amount of variance (95% and 99% are common values). For example, in our solution,\
    \ the first three outputted components explain approximately 30% of the original\
    \ data's variance:\n\n```python\n# Sum of first three components' explained variance\
    \ ratios\ntsvd.explained_variance_ratio_[0:3].sum()\n\n0.3003938537287226\n```\n\
    \nWe can automate the process by creating a function that runs TSVD with `n_components`\
    \ set to one less than the number of original features and then calculate the\
    \ number of components that explain a desired amount of the original data's variance:\n\
    \n```python\n# Create and run a TSVD with one less than number of features\ntsvd\
    \ = TruncatedSVD(n_components=features_sparse.shape[1]-1)\nfeatures_tsvd = tsvd.fit(features)\n\
    \n# List of explained variances\ntsvd_var_ratios = tsvd.explained_variance_ratio_\n\
    \n# Create a function\ndef select_n_components(var_ratio, goal_var):\n    # Set\
    \ initial variance explained so far\n    total_variance = 0.0\n\n    # Set initial\
    \ number of features\n    n_components = 0\n\n    # For the explained variance\
    \ of each feature:\n    for explained_variance in var_ratio:\n\n        # Add\
    \ the explained variance to the total\n        total_variance += explained_variance\n\
    \n        # Add one to the number of components\n        n_components += 1\n\n\
    \        # If we reach our goal level of explained variance\n        if total_variance\
    \ >= goal_var:\n            # End the loop\n            break\n\n    # Return\
    \ the number of components\n    return n_components\n\n# Run function\nselect_n_components(tsvd_var_ratios,\
    \ 0.95)\n```\n\n40\n\n### See Also\n\n- scikit-learn documentation: TruncatedSVD\n\
    \n# CHAPTER 10\n\n## Dimensionality Reduction Using Feature Selection\n\n### 10.0\
    \ Introduction\n\nIn Chapter 9, we discussed how to reduce the dimensionality\
    \ of our feature matrix by creating new features with (ideally) similar abilities\
    \ to train quality models but with significantly fewer dimensions. This is called\
    \ *feature extraction*. In this chapter we will cover an alternative approach:\
    \ selecting high-quality, informative features and dropping less useful features.\
    \ This is called *feature selection*.\n\nThere are three types of feature selection\
    \ methods: filter, wrapper, and embedded. *Filter methods* select the best features\
    \ by examining their statistical properties. Methods where we explicitly set a\
    \ threshold for a statistic or manually select the number of features we want\
    \ to keep are examples of feature selection by filtering. Wrapper methods use\
    \ trial and error to find the subset of features that produces models with the\
    \ highest quality predictions. *Wrapper methods* are often the most effective,\
    \ as they find the best result through actual experimentation as opposed to naive\
    \ assumptions. Finally, *embedded methods* select the best feature subset as part\
    \ of, as an extension of, a learning algorithm’s training process.\n\nIdeally,\
    \ we’d describe all three methods in this chapter. However, since embedded methods\
    \ are closely intertwined with specific learning algorithms, they are difficult\
    \ to explain prior to a deeper dive into the algorithms themselves. Therefore,\
    \ in this chapter we cover only filter and wrapper feature selection methods,\
    \ leaving the discussion of particular embedded methods until the chapters where\
    \ those learning algorithms are discussed in depth."

  md: "# Solution\n\nServe the model using the Seldon Core Python wrapper:\n\n```\n\
    # Import libraries\nimport torch\nimport torch.nn as nn\nimport logging\n\n# Create\
    \ a PyTorch model class\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n\
    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16,16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Dropout(0.1), # Drop 10% of neurons\n            torch.nn.Sigmoid(),\n\
    \        )\n\n# Create a Seldon model object with the name `MyModel`\nclass MyModel(object):\n\
    \    # Loads the model\n    def __init__(self):\n        self.network = SimpleNeuralNet()\n\
    \        self.network.load_state_dict(\n            torch.load(\"model.pt\")[\"\
    model_state_dict\"],\n            strict=False\n        )\n        logging.info(self.network.eval())\n\
    \n    # Makes a prediction\n    def predict(self, X, features_names=None):\n \
    \       return self.network.forward(X)\n```\n\nAnd run it with Docker:\n\n```\n\

    \ how to make the best prediction. Finally, we simulate having never-before-seen\
    \ external data by evaluating how our model performs on our test set. However,\
    \ the validation approach has two major weaknesses. First, the performance of\
    \ the model can be highly dependent on which few observations were selected for\
    \ the test set. Second, the model is not being trained using all the available\
    \ data, and it's not being evaluated on all the available data.\n\nA better strategy,\
    \ which overcomes these weaknesses, is called *k-fold cross-validation* (KFCV).\
    \ In KFCV, we split the data into *k* parts called *folds*. The model is then\
    \ trained using *k* – 1 folds—combined into one training set—and then the last\
    \ fold is used as a test set. We repeat this *k* times, each time using a different\
    \ fold as the test set. The performance on the model for each of the *k* iterations\
    \ is then averaged to produce an overall measurement.\n\nIn our solution, we conducted\
    \ k-fold cross-validation using five folds and outputted the evaluation scores\
    \ to `cv_results`:\n\n```\n# View score for all 5 folds\ncv_results\n\narray([0.96111111,\
    \ 0.96388889, 0.98050139, 0.97214485, 0.97214485])\n```\n\nThere are three important\
    \ points to consider when we are using KFCV. First, KFCV assumes that each observation\
    \ was created independently from the other (i.e., the data is independent and\
    \ identically distributed [IID]). If the data is IID, it is a good idea to shuffle\
    \ observations when assigning to folds. In scikit-learn we can set `shuffle=True`\
    \ to perform shuffling.\n\nSecond, when we are using KFCV to evaluate a classifier,\
    \ it is often beneficial to have folds containing roughly the same percentage\
    \ of observations from each of the different target classes (called *stratified\
    \ k-fold*). For example, if our target vector contained gender and 80% of the\
    \ observations were male, then each fold would contain 80% male and 20% female\
    \ observations. In scikit-learn, we can conduct stratified k-fold cross-validation\
    \ by replacing the `KFold` class with `StratifiedKFold`.\n\nFinally, when we are\
    \ using validation sets or cross-validation, it is important to preprocess data\
    \ based on the training set and then apply those transformations to both the training\
    \ and test set. For example, when we `fit` our standardization object, `standardizer`,\
    \ we calculate the mean and variance of only the training set. Then we apply that\
    \ transformation (using `transform`) to both the training and test sets:\n\n```\n\
    # Import library\nfrom sklearn.model_selection import train_test_split\n\n# Create\
    \ training and test sets\nfeatures_train, features_test, target_train, target_test\
    \ = train_test_split(\n    features, target, test_size=0.1, random_state=1)\n\
    ```\n\n```\n# Fit standardizer to training set\nstandardizer.fit(features_train)\n\
    \n# Apply to both training and test sets which can then be used to train models\n\
    features_train_std = standardizer.transform(features_train)\nfeatures_test_std\
    \ = standardizer.transform(features_test)\n```\n\nThe reason for this is because\
    \ we are pretending that the test set is unknown data. If we fit both our preprocessors\
    \ using observations from both training and test sets, some of the information\
    \ from the test set leaks into our training set. This rule applies for any preprocessing\
    \ step such as feature selection.\n\nscikit-learn's pipeline package makes this\
    \ easy to do while using cross-validation techniques. We first create a pipeline\
    \ that preprocesses the data (e.g., standardizer) and then trains a model (logistic\
    \ regression, logit):\n\n```\n# Create a pipeline\npipeline = make_pipeline(standardizer,\
    \ logit)\n```\n\nThen we run KFCV using that pipeline and scikit does all the\
    \ work for us:\n\n```\n# Do k-fold cross-validation\ncv_results = cross_val_score(pipeline,\
    \ # Pipeline\n                             features, # Feature matrix\n      \
    \                       target, # Target vector\n                            \
    \ cv=kf, # Performance metric\n                             scoring=\"accuracy\"\
    , # Loss function\n                             n_jobs=-1) # Use all CPU cores\n\
    ```\n\ncross_val_score comes with three parameters we have not discussed, but\
    \ that are worth noting:\n\ncv\n    cv determines our cross-validation technique.\
    \ K-fold is the most common by far, but there are others, such as leave-one-out\
    \ cross-validation where the number of folds k equals the number of data points\
    \ in the set.\n\nscoring\n    scoring defines the metric for success, a number\
    \ of which are discussed in other recipes in this chapter.\n\nn_jobs=-1\n    n_jobs=-1\
    \ tells scikit-learn to use every core available. For example, if your computer\
    \ has four cores (a common number for laptops), then scikit-learn will use all\
    \ four cores at once to speed up the operation.\n\nOne small note: when running\
    \ some of these examples, you may see a warning that says “ConvergenceWarning:\
    \ lbfgs failed to converge.” The configuration used in these examples is designed\
    \ to prevent this, but should it still occur, you can ignore it for now. We will\
    \ troubleshoot issues like this later in the book as we dive into specific types\
    \ of models.\n\n## See Also\n\n- Why Every Statistician Should Know About Cross-Validation\n\
    - Cross-Validation Gone Wrong\n\n## 11.2 Creating a Baseline Regression Model\n\
    \n### Problem\n\nYou want a simple baseline regression model to use as a comparison\
    \ against other models that you train.\n\n### Solution\n\nUse scikit-learn's DummyRegressor\
    \ to create a simple model to use as a baseline:\n\n```\n# Load libraries\nfrom\
    \ sklearn.datasets import load_wine\nfrom sklearn.dummy import DummyRegressor\n\
    from sklearn.model_selection import train_test_split\n\n# Load data\nwine = load_wine()\n\
    \n# Create features\nfeatures, target = wine.data, wine.target\n\n# Make test\
    \ and training split\nfeatures_train, features_test, target_train, target_test\
    \ = train_test_split(\n    features, target, random_state=0)\n\n# Create a dummy\
    \ regressor\ndummy = DummyRegressor(strategy='mean')\n\n# \"Train\" dummy regressor\n\
    dummy.fit(features_train, target_train)\n\n# Get R-squared score\ndummy.score(features_test,\
    \ target_test)\n-0.0480213580840978\n```\n\nTo compare, we train our model and\
    \ evaluate the performance score:\n\n```\n# Load library\nfrom sklearn.linear_model\
    \ import LinearRegression\n\n# Train simple linear regression model\nols = LinearRegression()\n\
    ols.fit(features_train, target_train)\n\n# Get R-squared score\nols.score(features_test,\
    \ target_test)\n\n0.804353263176954\n```\n\n### Discussion\n\nDummyRegressor allows\
    \ us to create a very simple model that we can use as a baseline to compare against\
    \ any other models that we train. This can often be useful to simulate a “naïve”\
    \ existing prediction process in a product or system. For example, a product might\
    \ have been originally hardcoded to assume that all new users will spend $100\
    \ in the first month, regardless of their features. If we encode that assumption\
    \ into a baseline model, we are able to concretely state the benefits of using\
    \ a machine learning approach by comparing the dummy model’s score with that of\
    \ a trained model.\n\nDummyRegressor uses the strategy parameter to set the method\
    \ of making predictions, including the mean or median value in the training set.\
    \ Furthermore, if we set strategy to constant and use the constant parameter,\
    \ we can set the dummy regressor to predict some constant value for every observation:\n\
    \n```\n# Create dummy regressor that predicts 1s for everything\nclf = DummyRegressor(strategy='constant',\
    \ constant=1)\nclf.fit(features_train, target_train)\n\n# Evaluate score\nclf.score(features_test,\
    \ target_test)\n\n-0.06299212598425186\n```\n\nOne small note regarding score.\
    \ By default, score returns the coefficient of determination (R-squared, $R^2$)\
    \ score:\n\n$$R^2 = 1 - \\frac{\\sum_i (y_i - \\hat{y}_i)^2}{\\sum_i (y_i - \\\
    bar{y})^2}$$\n\nwhere $y_i$ is the true value of the target observation, $\\hat{y}_i$\
    \ is the predicted value, and $\\bar{y}$ is the mean value for the target vector.\n\
    \nThe closer $R^2$ is to 1, the more of the variance in the target vector that\
    \ is explained by the features."
  mdcn: "使用我们的训练集，利用特征和目标向量来教导模型如何做出最佳预测。最后，我们通过评估模型在测试集上的表现来模拟处理从未见过的外部数据。然而，这种验证方法有两个主要缺点。首先，模型的性能可能高度依赖于被选入测试集的少数观测值。其次，模型并非使用所有可用数据进行训练，也并非在所有可用数据上进行评估。\n\
    \n一种更好的策略，可以克服这些缺点，被称为*k折交叉验证*（KFCV）。在KFCV中，我们将数据分成*k*个部分，称为*折*。然后，模型使用*k* – 1折（合并为一个训练集）进行训练，而最后一折则用作测试集。我们重复此过程*k*次，每次使用不同的折作为测试集。然后，对*k*次迭代中模型的性能进行平均，以产生一个总体度量。\n\
    \n在我们的解决方案中，我们使用五折进行了k折交叉验证，并将评估分数输出到`cv_results`：\n\n```\n# 查看所有5折的分数\ncv_results\n\
    \narray([0.96111111, 0.96388889, 0.98050139, 0.97214485, 0.97214485])\n```\n\n\
    在使用KFCV时，有三个要点需要考虑。首先，KFCV假设每个观测值都是独立于其他观测值创建的（即数据是独立同分布的[IID]）。如果数据是IID，那么在分配折时打乱观测值是一个好主意。在scikit-learn中，我们可以设置`shuffle=True`来执行打乱。\n\
    \n其次，当我们使用KFCV评估分类器时，让每个折包含大致相同比例的不同目标类别的观测值（称为*分层k折*）通常是有益的。例如，如果我们的目标向量包含性别，且80%的观测值为男性，那么每个折将包含80%的男性和20%的女性观测值。在scikit-learn中，我们可以通过将`KFold`类替换为`StratifiedKFold`来进行分层k折交叉验证。\n\
    \n最后，当我们使用验证集或交叉验证时，重要的是基于训练集预处理数据，然后将这些转换应用于训练集和测试集。例如，当我们`fit`标准化对象`standardizer`时，我们只计算训练集的均值和方差。然后，我们使用`transform`将该转换应用于训练集和测试集：\n\
    \n```\n# 导入库\nfrom sklearn.model_selection import train_test_split\n\n# 创建训练集和测试集\n\
    features_train, features_test, target_train, target_test = train_test_split(\n\
    \    features, target, test_size=0.1, random_state=1)\n```\n\n```\n# 将标准化器拟合到训练集\n\
    standardizer.fit(features_train)\n\n# 应用于训练集和测试集，然后可用于训练模型\nfeatures_train_std\
    \ = standardizer.transform(features_train)\nfeatures_test_std = standardizer.transform(features_test)\n\
    ```\n\n这样做的原因是因为我们假装测试集是未知数据。如果我们使用来自训练集和测试集的观测值来拟合我们的预处理器，那么测试集中的一些信息就会泄露到我们的训练集中。这个规则适用于任何预处理步骤，例如特征选择。\n\
    \nscikit-learn的pipeline包使得在使用交叉验证技术时轻松完成此操作。我们首先创建一个管道，该管道预处理数据（例如，标准化器），然后训练模型（逻辑回归，logit）：\n\
    \n```\n# 创建管道\npipeline = make_pipeline(standardizer, logit)\n```\n\n然后我们使用该管道运行KFCV，scikit会为我们完成所有工作：\n\
    \n```\n# 进行k折交叉验证\ncv_results = cross_val_score(pipeline, # 管道\n             \
    \                features, # 特征矩阵\n                             target, # 目标向量\n\
    \                             cv=kf, # 性能度量\n                             scoring=\"\
    accuracy\", # 损失函数\n                             n_jobs=-1) # 使用所有CPU核心\n```\n\
    \ncross_val_score带有三个我们尚未讨论但值得注意的参数：\n\ncv\n    cv确定我们的交叉验证技术。K折是迄今为止最常见的，但还有其他方法，例如留一法交叉验证，其中折数k等于数据集中的数据点数。\n\
    \nscoring\n    scoring定义成功的度量标准，本章的其他配方中讨论了其中一些。\n\nn_jobs=-1\n    n_jobs=-1告诉scikit-learn使用所有可用的核心。例如，如果你的计算机有四个核心（笔记本电脑的常见数量），那么scikit-learn将同时使用所有四个核心来加速操作。\n\
    \n一个小提示：在运行其中一些示例时，你可能会看到一条警告，说“ConvergenceWarning: lbfgs failed to converge.”。这些示例中使用的配置旨在防止这种情况发生，但如果它仍然发生，你现在可以忽略它。我们将在本书后面深入探讨特定类型的模型时，对这类问题进行故障排除。\n\
    \n## 另请参阅\n\n- 为什么每个统计学家都应该了解交叉验证\n- 交叉验证出错\n\n## 11.2 创建基线回归模型\n\n### 问题\n\n\
    你想要一个简单的基线回归模型，以便与你训练的其他模型进行比较。\n\n### 解决方案\n\n使用scikit-learn的DummyRegressor创建一个简单的模型作为基线：\n\
    \n```\n# 加载库\nfrom sklearn.datasets import load_wine\nfrom sklearn.dummy import\
    \ DummyRegressor\nfrom sklearn.model_selection import train_test_split\n\n# 加载数据\n\
    wine = load_wine()\n\n# 创建特征\nfeatures, target = wine.data, wine.target\n\n# 创建测试集和训练集\n\
    features_train, features_test, target_train, target_test = train_test_split(\n\
    \    features, target, random_state=0)\n\n# 创建虚拟回归器\ndummy = DummyRegressor(strategy='mean')\n\
    \n# “训练”虚拟回归器\ndummy.fit(features_train, target_train)\n\n# 获取R平方分数\ndummy.score(features_test,\
    \ target_test)\n-0.0480213580840978\n```\n\n作为比较，我们训练我们的模型并评估性能分数：\n\n```\n# 加载库\n\
    from sklearn.linear_model import LinearRegression\n\n# 训练简单的线性回归模型\nols = LinearRegression()\n\
    ols.fit(features_train, target_train)\n\n# 获取R平方分数\nols.score(features_test, target_test)\n\
    \n0.804353263176954\n```\n\n### 讨论\n\nDummyRegressor允许我们创建一个非常简单的模型，我们可以将其用作基线，与我们训练的任何其他模型进行比较。这通常可用于模拟产品或系统中“朴素的”现有预测过程。例如，一个产品最初可能被硬编码为假设所有新用户在第一个月将花费100美元，无论他们的特征如何。如果我们把这个假设编码到一个基线模型中，我们就能通过比较虚拟模型的分数和训练模型的分数，具体地说明使用机器学习方法的好处。\n\
    \nDummyRegressor使用strategy参数来设置进行预测的方法，包括训练集中的均值或中位数值。此外，如果我们设置strategy为constant并使用constant参数，我们可以将虚拟回归器设置为对每个观测值预测某个常数值：\n\
    \n```\n# 创建对所有内容都预测1的虚拟回归器\nclf = DummyRegressor(strategy='constant', constant=1)\n\
    clf.fit(features_train, target_train)\n\n# 评估分数\nclf.score(features_test, target_test)\n\
    \n-0.06299212598425186\n```\n\n关于分数的一个小提示。默认情况下，score返回决定系数（R平方，$R^2$）分数：\n\n\
    $$R^2 = 1 - \\frac{\\sum_i (y_i - \\hat{y}_i)^2}{\\sum_i (y_i - \\bar{y})^2}$$\n\
    \n其中$y_i$是目标观测值的真实值，$\\hat{y}_i$是预测值，$\\bar{y}$是目标向量的均值。\n\n$R^2$越接近1，说明特征解释了目标向量中越多的方差。"

    \n我们可以将同样的技术应用于每个颜色通道，但不是五个可能的值，而是 256 个（通道值的可能值数量）。x 轴代表 256 个可能的通道值，y 轴代表特定通道值在图像所有像素中出现的次数（对于没有彩色图像的纸质书读者表示歉意）：\n\

    # Discussion


    Convolutional neural networks are typically used for tasks in image recognition
    and computer vision. They typically consist of convolutional layers, pooling layers,
    and a fully connected layer.


    The purpose of the *convolutional layers* is to learn important image features
    that can be used for the task at hand. Convolutional layers work by applying a
    filter to a particular area of an image (the size of the convolution). The weights
    of this layer then learn to recognize specific image features critical in the
    classification task. For instance, if we''re training a model that recognizes
    a person''s hand, the filter may learn to recognize fingers.


    The purpose of the *pooling layer* is typically to reduce the dimensionality of
    the inputs from the previous layer. This layer also uses a filter applied to a
    portion of the input, but it has no activation. Instead, it reduces dimensionality
    of the input by performing *max pooling* (where it selects the pixel in the filter
    with the highest value) or *average pooling* (where it takes an average of the
    input pixels to use instead).


    Finally, the *fully connected layer* can be used with something like a softmax
    activation function to create a binary classification task.


    # See Also


    +   - [Convolutional Neural Networks](Convolutional Neural Networks)


    # 22.2 Training a Neural Network for Text Classification


    # Problem


    You need to train a neural network to classify text data.



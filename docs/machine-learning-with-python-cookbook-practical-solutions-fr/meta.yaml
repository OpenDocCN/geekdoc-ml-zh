    # 2.3 Loading a CSV File


    # Problem


    You need to import a comma-separated value (CSV) file.


    # Solution


    Use the pandas library''s `read_csv` to load a local or hosted CSV file into a
    pandas DataFrame:


    ```

    # Load library

    import pandas as pd


    # Create URL

    url = ''https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.csv''


    # Load dataset

    dataframe = pd.read_csv(url)


    # View first two rows

    dataframe.head(2)

    ```


    | | integer | datetime | category |

    |---|---|---|---|

    | 0 | 5 | 2015-01-01 00:00:00 | 0 |

    | 1 | 5 | 2015-01-01 00:00:01 | 0 |


    # Discussion


    There are two things to note about loading CSV files. First, it is often useful
    to take a quick look at the contents of the file before loading. It can be very
    helpful to see how a dataset is structured beforehand and what parameters we need
    to set to load in the file. Second, `read_csv` has over 30 parameters and therefore
    the documentation can be daunting. Fortunately, those parameters are mostly there
    to allow it to handle a wide variety of CSV formats.


    CSV files get their names from the fact that the values are literally separated
    by commas (e.g., one row might be `2,"2015-01-01 00:00:00",0`); however, it is
    common for CSV files to use other separators, such as tabs (which are referred
    to as TSV files).'
  - '[PAGE 42]


    The pandas sep parameter allows us to define the delimiter used in the file. Although
    it is not always the case, a common formatting issue with CSV files is that the
    first line of the file is used to define column headers (e.g., integer, datetime,
    category in our solution). The header parameter allows us to specify if or where
    a header row exists. If a header row does not exist, we set header=None.


    The read_csv function returns a pandas DataFrame: a common and useful object for
    working with tabular data that we''ll cover in more depth throughout this book.


    # 2.4 Loading an Excel File


    # Problem


    You need to import an Excel spreadsheet.


    # Solution


    Use the pandas library''s read_excel to load an Excel spreadsheet:


    ```

    # Load library

    import pandas as pd


    # Create URL

    url = ''https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.xlsx''


    # Load data

    dataframe = pd.read_excel(url, sheet_name=0, header=0)


    # View the first two rows

    dataframe.head(2)

    ```


    | integer | datetime | category |

    |---|---|---|

    | 5 | 2015-01-01 00:00:00 | 0 |

    | 5 | 2015-01-01 00:00:01 | 0 |

    | 9 | 2015-01-01 00:00:02 | 0 |


    # Discussion


    This solution is similar to our solution for reading CSV files. The main difference
    is the additional parameter, sheet_name, that specifies which sheet in the Excel
    file we wish to load. sheet_name can accept both strings, containing the name
    of the sheet, and integers, pointing to sheet positions (zero-indexed). If we
    need to load multiple sheets, we include them as a list. For example, sheet_name=[0,1,2,
    "Monthly Sales"] will return a dictionary of pandas DataFrames containing the
    first, second, and third sheets, and the sheet named Monthly Sales.'
- md: "## 2.5 Loading a JSON File\n\n### Problem\n\nYou need to load a JSON file for\
    \ data preprocessing.\n\n### Solution\n\nThe pandas library provides `read_json`\
    \ to convert a JSON file into a pandas object:\n\n```python\n# Load library\n\
    import pandas as pd\n\n# Create URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.json'\n\
    \n# Load data\ndataframe = pd.read_json(url, orient='columns')\n\n# View the first\
    \ two rows\ndataframe.head(2)\n```\n\n| | category | datetime | integer |\n|---|---|---|---|\n\
    | 0 | 0 | 2015-01-01 00:00:00 | 5 |\n| 1 | 0 | 2015-01-01 00:00:01 | 5 |\n\n###\
    \ Discussion\n\nImporting JSON files into pandas is similar to the last few recipes\
    \ we have seen. The key difference is the `orient` parameter, which indicates\
    \ to pandas how the JSON file is structured. However, it might take some experimenting\
    \ to figure out which argument (split, records, index, columns, or values) is\
    \ the right one. Another helpful tool pandas offers is `json_normalize`, which\
    \ can help convert semistructured JSON data into a pandas DataFrame.\n\n### See\
    \ Also\n\n- `json_normalize` documentation\n\n## 2.6 Loading a Parquet File\n\n\
    ### Problem\n\nYou need to load a Parquet file.\n\n### Solution\n\nThe pandas\
    \ `read_parquet` function allows us to read in Parquet files:\n\n```python\n#\
    \ Load library\nimport pandas as pd\n\n# Create URL\nurl = 'https://machine-learning-python-cookbook.s3.amazonaws.com/data.parquet'\n\
    \n# Load data\ndataframe = pd.read_parquet(url)\n\n# View the first two rows\n\
    dataframe.head(2)\n```\n\n| | category | datetime | integer |\n|---|---|---|---|\n\
    | 0 | 0 | 2015-01-01 00:00:00 | 5 |\n| 1 | 0 | 2015-01-01 00:00:01 | 5 |\n\n###\
    \ Discussion\n\nParquet is a popular data storage format in the large data space.\
    \ It is often used with big data tools such as Hadoop and Spark. While PySpark\
    \ is outside the focus of this book, it's highly likely companies operating on\
    \ a large scale will use an efficient data storage format such as Parquet, and\
    \ it's valuable to know how to read it into a dataframe and manipulate it.\n\n\
    ### See Also\n\n- [Apache Parquet documentation](https://parquet.apache.org/documentation/latest/)\n\
    \n## 2.7 Loading an Avro File\n\n### Problem\n\nYou need to load an Avro file\
    \ into a pandas DataFrame.\n\n### Solution\n\nThe use the `pandavro` library's\
    \ `read_avro` method:\n\n```python\n# Load library\nimport requests\nimport pandavro\
    \ as pdx\n\n# Create URL\nurl = 'https://machine-learning-python-cookbook.s3.amazonaws.com/data.avro'\n\
    \n# Download file\nr = requests.get(url)\nopen('data.avro', 'wb').write(r.content)\n\
    \n# Load data\ndataframe = pdx.read_avro('data.avro')\n\n# View the first two\
    \ rows\ndataframe.head(2)\n```\n\n| | category | datetime | integer |\n|---|---|---|---|\n\
    | 0 | 0 | 2015-01-01 00:00:00 | 5 |\n| 1 | 0 | 2015-01-01 00:00:01 | 5 |\n\n###\
    \ Discussion\n\nApache Avro is an open source, binary data format that relies\
    \ on schemas for the data structure. At the time of writing, it is not as common\
    \ as Parquet. However, large binary data formats such as Avro, thrift, and Protocol\
    \ Buffers are growing in popularity due to their efficient nature. If you work\
    \ with large data systems, you’re likely to run into one of these formats in the\
    \ near future.\n\n### See Also\n\n- Apache Avro documentation\n\n## 2.8 Querying\
    \ a SQLite Database\n\n### Problem\n\nYou need to load data from a database using\
    \ structured query language (SQL).\n\n### Solution\n\npandas’ `read_sql_query`\
    \ allows us to make an SQL query to a database and load it:\n\n```python\n# Load\
    \ libraries\nimport pandas as pd\nfrom sqlalchemy import create_engine\n\n# Create\
    \ a connection to the database\ndatabase_connection = create_engine('sqlite:///sample.db')\n\
    \n# Load data\ndataframe = pd.read_sql_query('SELECT * FROM data', database_connection)\n\
    \n# View first two rows\ndataframe.head(2)\n```\n\n| | first_name | last_name\
    \ | age | preTestScore | postTestScore |\n|---|---|---|---|---|---|\n| 0 | Jason\
    \ | Miller | 42 | 4 | 25 |\n| 1 | Molly | Jacobson | 52 | 24 | 94 |\n\n### Discussion\n\
    \nSQL is the lingua franca for pulling data from databases. In this recipe we\
    \ first use `create_engine` to define a connection to an SQL database engine called\
    \ SQLite. Next we use pandas’ `read_sql_query` to query that database using SQL\
    \ and put the results in a DataFrame.\n\nSQL is a language in its own right and,\
    \ while beyond the scope of this book, it is certainly worth knowing for anyone\
    \ wanting to learn about machine learning. Our SQL query, `SELECT * FROM data`,\
    \ asks the database to give us all columns (*) from the table called `data`.\n\
    \nNote that this is one of a few recipes in this book that will not run without\
    \ extra code. Specifically, `create_engine('sqlite:///sample.db')` assumes that\
    \ an SQLite database already exists.\n\n### See Also\n\n- [SQLite](https://www.sqlite.org/)\n\
    - [W3Schools SQL Tutorial](https://www.w3schools.com/sql/)\n\n## 2.9 Querying\
    \ a Remote SQL Database\n\n### Problem\n\nYou need to connect to, and read from,\
    \ a remote SQL database.\n\n### Solution\n\nCreate a connection with `pymysql`\
    \ and read it into a dataframe with pandas:\n\n```python\n# Import libraries\n\
    import pymysql\nimport pandas as pd\n\n# Create a DB connection\n# Use the following\
    \ example to start a DB instance\n# https://github.com/kylegallatin/mysql-db-example\n\
    conn = pymysql.connect(\n    host='localhost',\n    user='root',\n    password=\"\
    \",\n    db='db',\n)\n\n# Read the SQL query into a dataframe\ndataframe = pd.read_sql(\"\
    select * from data\", conn)\n\n# View the first two rows\ndataframe.head(2)\n\
    ```\n\n| integer | datetime | category |\n|---|---|---|\n| 0 | 5 | 2015-01-01\
    \ 00:00:00 | 0 |\n| 1 | 5 | 2015-01-01 00:00:01 | 0 |\n\n### Discussion\n\nOf\
    \ all of the recipes presented in this chapter, this is probably the one we will\
    \ use most in the real world. While connecting and reading from an example sqlite\
    \ database is useful, it's likely not representative of tables you'll need to\
    \ connect to in an enterprise environment. Most SQL instances that you'll connect\
    \ to will require you to connect to the host and port of a remote machine, specifying\
    \ a username and password for authentication. This example requires you to start\
    \ a running SQL instance locally that mimics a remote server on localhost so that\
    \ you can get a sense of the workflow.\n\n### See Also\n\n- PyMySQL documentation\n\
    - pandas Read SQL documentation\n\n## 2.10 Loading Data from a Google Sheet\n\n\
    ### Problem\n\nYou need to read in data directly from a Google Sheet.\n\n### Solution\n\
    \nUse pandas `read_csv` and pass a URL that exports the Google Sheet as a CSV:\n\
    \n```python\n# Import libraries\nimport pandas as pd\n\n# Google Sheet URL that\
    \ downloads the sheet as a CSV\nurl = \"https://docs.google.com/spreadsheets/d/\"\
    \n    \"1ehC-9otcAuitqnmWksqt1m0rTRCL38dv0K9UjhwzTOA/export?format=csv\"\n\n#\
    \ Read the CSV into a dataframe\ndataframe = pd.read_csv(url)\n\n# View the first\
    \ two rows\ndataframe.head(2)\n```\n\n| integer | datetime | category |\n|---|---|---|\n\
    | 0 | 5 | 2015-01-01 00:00:00 | 0 |\n| 1 | 5 | 2015-01-01 00:00:01 | 0 |\n\n###\
    \ Discussion\n\nWhile Google Sheets can easily be downloaded, it's sometimes helpful\
    \ to be able to read them directly into Python without any intermediate steps.\
    \ The `/export?format=csv` query parameter at the end of the URL above creates\
    \ an endpoint from which we can either download the file or read it into pandas.\n\
    \n### See Also\n\n- Google Sheets API\n\n## 2.11 Loading Data from an S3 Bucket\n\
    \n### Problem\n\nYou need to read a CSV file from an S3 bucket you have access\
    \ to.\n\n### Solution\n\nAdd storage options to pandas giving it access to the\
    \ S3 object:\n\n```python\n# Import libraries\nimport pandas as pd\n\n# S3 path\
    \ to CSV\ns3_uri = \"s3://machine-learning-python-cookbook/data.csv\"\n\n# Set\
    \ AWS credentials (replace with your own)\nACCESS_KEY_ID = \"xxxxxxxxxxxx\"\n\
    SECRET_ACCESS_KEY = \"xxxxxxxxxxxxxxxx\"\n\n# Read the CSV into a dataframe\n\
    dataframe = pd.read_csv(s3_uri, storage_options={\n    \"key\": ACCESS_KEY_ID,\n\
    \    \"secret\": SECRET_ACCESS_KEY,\n})\n\n# View first two rows\ndataframe.head(2)\n\
    ```\n\n| integer | datetime | category |\n|---|---|---|\n| 0 | 5 | 2015-01-01\
    \ 00:00:00 | 0 |\n| 1 | 5 | 2015-01-01 00:00:01 | 0 |\n\n### Discussion\n\nMany\
    \ enterprises now keep data in cloud provider blob stores such as Amazon S3 or\
    \ Google Cloud Storage (GCS). It's common for machine learning practitioners to\
    \ connect to these sources to retrieve data. Although the S3 URI (`s3://machine-learning-python-cookbook/data.csv`)\
    \ is public, it still requires you to provide your own AWS access credentials\
    \ to access it. It's worth noting that public objects also have HTTP URLs from\
    \ which they can download files, [such as this one for the CSV file](https://machine-learning-python-cookbook.s3.amazonaws.com/data.csv).\n\
    \n### See Also\n\n- [Amazon S3](https://aws.amazon.com/s3/)\n- [AWS Security Credentials](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html)\n\

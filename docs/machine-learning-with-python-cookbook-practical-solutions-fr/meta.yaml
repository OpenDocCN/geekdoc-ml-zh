    # CHAPTER 21


    # Neural Networks


    # 21.0 Introduction


    At the heart of basic neural networks is the *unit* (also called a *node* or *neuron*).
    A unit takes in one or more inputs, multiplies each input by a parameter (also
    called a *weight*), sums the weighted input’s values along with some bias value
    (typically 0), and then feeds the value into an activation function. This output
    is then sent forward to the other neurons deeper in the neural network (if they
    exist).


    Neural networks can be visualized as a series of connected layers that form a
    network connecting an observation’s feature values at one end and the target value
    (e.g., observation’s class) at the other end. *Feedforward* neural networks—also
    called *multilayer perceptron*—are the simplest artificial neural networks used
    in any real-world setting. The name “feedforward” comes from the fact that an
    observation’s feature values are fed “forward” through the network, with each
    layer successively transforming the feature values with the goal that the output
    is the same as (or close to) the target’s value.


    Specifically, feedforward neural networks contain three types of layers. At the
    start of the neural network is an input layer, where each unit contains an observation’s
    value for a single feature. For example, if an observation has 100 features, the
    input layer has 100 units. At the end of the neural network is the output layer,
    which transforms the output of intermediate layers (called *hidden layers*) into
    values useful for the task at hand. For example, if our goal is binary classification,
    we can use an output layer with a single unit that uses a sigmoid function to
    scale its own output to between 0 and 1, representing a predicted class probability.


    Between the input and output layers are the so-called hidden layers. These hidden
    layers successively transform the feature values from the input layer to something
    that, once processed by the output layer, resembles the target class. Neural networks'
  - '[PAGE 341]


    with many hidden layers (e.g., 10, 100, 1,000) are considered “deep” networks.
    Training deep neural networks is a process known as *deep learning*.


    Neural networks are typically created with all parameters initialized as small
    random values from a Gaussian or normal uniform distribution. Once an observation
    (or more often a set number of observations called a *batch*) is fed through the
    network, the outputted value is compared with the observation’s true value using
    a loss function. This is called *forward propagation*. Next an algorithm goes
    “backward” through the network identifying how much each parameter contributed
    to the error between the predicted and true values, a process called *back propagation*.
    At each parameter, the optimization algorithm determines how much each weight
    should be adjusted to improve the output.


    Neural networks learn by repeating this process of forward propagation and back
    propagation for every observation in the training data multiple times (each time
    all observations have been sent through the network is called an *epoch* and training
    typically consists of multiple epochs), iteratively updating the values of the
    parameters utilizing a process called *gradient descent* to slowly optimize the
    values of the parameters for the given output.


    In this chapter, we will use the same Python library used in the last chapter,
    PyTorch, to build, train, and evaluate a variety of neural networks. PyTorch is
    a popular tool within the deep learning space due to its well-written APIs and
    intuitive representation of the low-level tensor operations that power neural
    networks. One key feature of PyTorch is called *autograd*, which automatically
    computes and stores the gradients used to optimize the parameters of the network
    after undergoing forward propagation and back propagation.


    Neural networks created using PyTorch code can be trained using both CPUs (i.e.,
    on your laptop) and GPUs (i.e., on a specialized deep learning computer). In the
    real world with real data, it is often necessary to train neural networks using
    GPUs, as the training process on large data for complex networks runs orders of
    magnitude faster on GPUs than CPUs. However, all the neural networks in this book
    are small and simple enough to be trained on a CPU-only laptop in only a few minutes.
    Just be aware that when we have larger networks and more training data, training
    using CPUs is *significantly* slower than training using GPUs.


    # 21.1 Using Autograd with PyTorch


    # Problem


    You want to use PyTorch’s autograd features to compute and store the gradients
    after undergoing forward propagation and back propagation.'
  - "[PAGE 342]\n\n# Solution\n\nCreate tensors with the requires_grad option set\
    \ to True:\n\n```\n# Import libraries\nimport torch\n\n# Create a torch tensor\
    \ that requires gradients\nt = torch.tensor([1.0, 2.0, 3.0], requires_grad=True)\n\
    \n# Perform a tensor operation simulating \"forward propagation\"\ntensor_sum\
    \ = t.sum()\n\n# Perform back propagation\ntensor_sum.backward()\n\n# View the\
    \ gradients\nt.grad\ntensor([1., 1., 1.])\n```\n\n# Discussion\n\nAutograd is\
    \ one of the core features of PyTorch and a big factor in its popularity as a\
    \ deep learning library. The ability to easily compute, store, and visualize gradients\
    \ makes PyTorch very intuitive for researchers and enthusiasts building neural\
    \ networks from scratch.\n\nPyTorch uses a directed acyclic graph (DAG) to keep\
    \ a record of all data and computational operations being performed on that data.\
    \ This is incredibly useful, but it also means we need to be careful with what\
    \ operations we try to apply on our PyTorch data that requires gradients. When\
    \ working with autograd, we can't easily convert our tensors to NumPy arrays and\
    \ back without \"breaking the graph,\" a phrase used to describe operations that\
    \ don't support autograd:\n\n```\nimport torch\n\ntensor = torch.tensor([1.0,\
    \ 2.0, 3.0], requires_grad=True)\ntensor.numpy()\n\nRuntimeError: Can't call numpy()\
    \ on Tensor that requires grad. Use\n    tensor.detach().numpy() instead.\n```\n\
    \nTo convert this tensor into a NumPy array, we need to call the detach() method\
    \ on it, which will break the graph and thus our ability to automatically compute\
    \ gradients. While this can definitely be useful, it's worth knowing that detaching\
    \ the tensor will prevent PyTorch from automatically computing the gradient."
- md: "## See Also\n\n- [PyTorch Autograd Tutorial](https://pytorch.org/tutorials/beginner/basics/autogradqs_tutorial.html)\n\
    \n## 21.2 Preprocessing Data for Neural Networks\n\n### Problem\n\nYou want to\
    \ preprocess data for use in a neural network.\n\n### Solution\n\nStandardize\
    \ each feature using scikit-learn's StandardScaler:\n\n```python\n# Load libraries\n\
    from sklearn import preprocessing\nimport numpy as np\n\n# Create feature\nfeatures\
    \ = np.array([[-100.1, 3240.1],\n                     [-200.2, -234.1],\n    \
    \                 [5000.5, 150.1],\n                     [6000.6, -125.1],\n \
    \                    [9000.9, -673.1]])\n\n# Create scaler\nscaler = preprocessing.StandardScaler()\n\
    \n# Convert to a tensor\nfeatures_standardized_tensor = torch.from_numpy(features)\n\
    \n# Show features\nfeatures_standardized_tensor\n```\n\n### Discussion\n\nWhile\
    \ this recipe is very similar to Recipe 4.2, it is worth repeating because of\
    \ how important it is for neural networks. Typically, a neural network's parameters\
    \ are initialized (i.e., created) as small random numbers. Neural networks often\
    \ behave poorly when the feature values are much larger than the parameter values.\
    \ Furthermore, since an observation's feature values are combined as they pass\
    \ through individual units, it is important that all features have the same scale.\n\
    \nFor these reasons, it is best practice (although not always necessary; for example,\
    \ when we have all binary features) to standardize each feature such that the\
    \ feature's values have the mean of 0 and the standard deviation of 1. This can\
    \ be accomplished easily with scikit-learn's StandardScaler.\n\nHowever, if you\
    \ need to perform this operation after having created tensors with requires_grad=True,\
    \ you'll need to do this natively in PyTorch, so as not to break the graph. While\
    \ you'll typically standardize features prior to starting to train the network,\
    \ it's worth knowing how to accomplish the same thing in PyTorch:\n\n```python\n\
    # Load library\nimport torch\n\n# Create features\ntorch_features = torch.tensor([[-100.1,\
    \ 3240.1],\n                               [-200.2, -234.1],\n               \
    \                [5000.5, 150.1],\n                               [6000.6, -125.1],\n\
    \                               [9000.9, -673.1]], requires_grad=True)\n\n# Compute\
    \ the mean and standard deviation\nmean = torch_features.mean(0, keepdim=True)\n\
    standard_deviation = torch_features.std(0, unbiased=False, keepdim=True)\n\n#\
    \ Standardize the features using the mean and standard deviation\ntorch_features_standardized\
    \ = torch_features - mean\ntorch_features_standardized /= standard_deviation\n\
    \n# Show standardized features\ntorch_features_standardized\n```\n\n```\ntensor([[-1.1254,\
    \  1.9643],\n        [-1.1533, -0.5007],\n        [ 0.2953, -0.2281],\n      \
    \  [ 0.5739, -0.4234],\n        [ 1.4096, -0.8122]], grad_fn=<DivBackward0>)\n\
    ```\n\n## 21.3 Designing a Neural Network\n\n### Problem\n\nYou want to design\
    \ a neural network.\n\n### Solution\n\nUse the PyTorch nn.Module class to define\
    \ a simple neural network architecture:\n\n```python\n# Import libraries\nimport\
    \ torch\nimport torch.nn as nn\n\n# Define a neural network\nclass SimpleNeuralNet(nn.Module):\n\
    \    def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n  \
    \      self.fc1 = nn.Linear(10, 16)\n        self.fc2 = nn.Linear(16, 16)\n  \
    \      self.fc3 = nn.Linear(16, 1)\n\n    def forward(self, x):\n        x = nn.functional.relu(self.fc1(x))\n\
    \        x = nn.functional.relu(self.fc2(x))\n        x = nn.functional.sigmoid(self.fc3(x))\n\
    \        return x\n\n# Initialize the neural network\nnetwork = SimpleNeuralNet()\n\
    \n# Define loss function, optimizer\nloss_criterion = nn.BCELoss()\noptimizer\
    \ = torch.optim.RMSprop(network.parameters())\n\n# Show the network\nnetwork\n\
    ```\n\n```\nSimpleNeuralNet(\n  (fc1): Linear(in_features=10, out_features=16,\
    \ bias=True)\n  (fc2): Linear(in_features=16, out_features=16, bias=True)\n  (fc3):\
    \ Linear(in_features=16, out_features=1, bias=True)\n)\n```\n\n### Discussion\n\
    \nNeural networks consist of layers of units. However, there’s incredible variety\
    \ in the types of layers and how they are combined to form the network’s architecture.\
    \ While there are commonly used architecture patterns (which we’ll cover in this\
    \ chapter), the truth is that selecting the right architecture is mostly an art\
    \ and the topic of much research.\n\nTo construct a feedforward neural network\
    \ in PyTorch, we need to make a number of choices about both the network architecture\
    \ and training process. Remember that each unit in the hidden layers:\n\n1. Receives\
    \ a number of inputs.\n2. Weights each input by a parameter value.\n3. Sums together\
    \ all weighted inputs along with some bias (typically 0).\n4. Most often then\
    \ applies some function (called an *activation function*).\n5. Sends the output\
    \ on to units in the next layer.\n\nFirst, for each layer in the hidden and output\
    \ layers we must define the number of units to include in the layer and the activation\
    \ function. Overall, the more units we have in a layer, the more complex patterns\
    \ our network is able to learn. However, more units might make our network overfit\
    \ the training data in a way detrimental to the performance on the test data.\n\
    \nFor hidden layers, a popular activation function is the *rectified linear unit*\
    \ (ReLU):\n\n$$f(z) = \\max(0, z)$$\n\nwhere $z$ is the sum of the weighted inputs\
    \ and bias. As we can see, if $z$ is greater than 0, the activation function returns\
    \ $z$; otherwise, the function returns 0. This simple activation function has\
    \ a number of desirable properties (a discussion of which is beyond the scope\
    \ of this book), and this has made it a popular choice in neural networks. We\
    \ should be aware, however, that many dozens of activation functions exist.\n\n\
    Second, we need to define the number of hidden layers to use in the network. More\
    \ layers allow the network to learn more complex relationships, but with a computational\
    \ cost.\n\nThird, we have to define the structure of the activation function (if\
    \ any) of the output layer. The nature of the output function is often determined\
    \ by the goal of the network. Here are some common output layer patterns:\n\n\
    - *Binary classification*: One unit with a sigmoid activation function\n- *Multiclass\
    \ classification*: $k$ units (where $k$ is the number of target classes) and a\
    \ softmax activation function\n- *Regression*: One unit with no activation function\n\
    \nFourth, we need to define a loss function (the function that measures how well\
    \ a predicted value matches the true value); again, this is often determined by\
    \ the problem type:\n\n- *Binary classification*: Binary cross-entropy\n- *Multiclass\
    \ classification*: Categorical cross-entropy\n- *Regression*: Mean square error\n\
    \nFifth, we have to define an optimizer, which intuitively can be thought of as\
    \ our strategy “walking around” the loss function to find the parameter values\
    \ that produce the lowest error. Common choices for optimizers are stochastic\
    \ gradient descent, stochastic gradient descent with momentum, root mean square\
    \ propagation, and adaptive moment estimation (for more information on these optimizers,\
    \ see “See Also” on page 333).\n\nSixth, we can select one or more metrics to\
    \ use to evaluate the performance, such as accuracy.\n\nIn our example, we use\
    \ the torch.nn.Module namespace to compose a simple, sequential neural network\
    \ that can make binary classifications. The standard PyTorch approach for this\
    \ is to create a child class that inherits from the torch.nn.Module class, instantiating\
    \ a network architecture in the __init__ method, and defining the mathematical\
    \ operations we want to perform upon each forward pass in the forward method of\
    \ the class. There are many ways to define networks in PyTorch, and although in\
    \ this case we use functional methods for our activation functions (such as nn.functional.relu)\
    \ we can also define these activation functions as layers. If we wanted to compose\
    \ everything in the network as a layer, we could use the Sequential class:\n\n\
    ```python\n# Import libraries\nimport torch\n\n# Define a neural network using\
    \ `Sequential`\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n \
    \       super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16,16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n\
    \        x = self.sequential(x)\n        return x\n\n# Instantiate and view the\
    \ network\nSimpleNeuralNet()\n```\n\n```\nSimpleNeuralNet(\n  (sequential): Sequential(\n\
    \    (0): Linear(in_features=10, out_features=16, bias=True)\n    (1): ReLU()\n\
    \    (2): Linear(in_features=16, out_features=16, bias=True)\n    (3): ReLU()\n\
    \    (4): Linear(in_features=16, out_features=1, bias=True)\n    (5): Sigmoid()\n\
    \  )\n)\n```"

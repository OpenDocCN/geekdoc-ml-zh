    ### 讨论\n\n一些文本数据在用于构建特征之前需要进行清洗，或者在输入算法之前需要以某种方式进行预处理。大多数基本的文本清洗可以使用Python的标准字符串操作完成。在现实世界中，我们很可能会定义一个自定义清洗函数（例如，`capitalizer`），结合一些清洗任务，并将其应用于文本数据。虽然清洗字符串可能会移除一些信息，但它使数据更易于处理。字符串有许多固有的方法，对于清洗和处理非常有用；更多示例可以在这里找到：\n\

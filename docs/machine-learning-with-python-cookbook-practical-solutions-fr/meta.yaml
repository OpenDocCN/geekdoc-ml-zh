  md: "where $\\beta_0$ is the bias, $S$ is the set of all support vector observations,\
    \ $\\alpha$ is the model parameters to be learned, and $(x_i, x_{i'})$ are pairs\
    \ of two support vector observations, $x_i$ and $x_{i'}$. Most importantly, $K$\
    \ is a kernel function that compares the similarity between $x_i$ and $x_{i'}$.\
    \ Don't worry if you don't understand kernel functions. For our purposes, just\
    \ realize that (1) $K$ determines the type of hyperplane used to separate our\
    \ classes, and (2) we create different hyperplanes by using different kernels.\
    \ For example, if we want a basic linear hyperplane like the one we created in\
    \ Recipe 17.1, we can use the linear kernel:\n\n$$K(x_i, x_{i'}) = \\sum_{j=1}^{p}\
    \ x_{ij}x_{i'j}$$\n\nwhere $p$ is the number of features. However, if we want\
    \ a nonlinear decision boundary, we swap the linear kernel with a polynomial kernel:\n\
    \n$$K(x_i, x_{i'}) = \\left(r + \\gamma \\sum_{j=1}^{p} x_{ij}x_{i'j}\\right)^d$$\n\
    \nwhere $d$ is the degree of the polynomial kernel function. Alternatively, we\
    \ can use one of the most common kernels in support vectors machines, the *radial\
    \ basis function kernel*:\n\n$$K(x_i, x_{i'}) = e^{-\\gamma \\sum_{j=1}^{p} (x_{ij}x_{i'j})^2}$$\n\

    \ out_features=1, bias=True)\n)\n```\n\n# Discussion\n\nNeural networks consist\
    \ of layers of units. However, there’s incredible variety in the types of layers\
    \ and how they are combined to form the network’s architecture. While there are\
    \ commonly used architecture patterns (which we’ll cover in this chapter), the\
    \ truth is that selecting the right architecture is mostly an art and the topic\
    \ of much research.\n\nTo construct a feedforward neural network in PyTorch, we\
    \ need to make a number of choices about both the network architecture and training\
    \ process. Remember that each unit in the hidden layers:\n\n+   1. Receives a\
    \ number of inputs.\n2. Weights each input by a parameter value.\n3. Sums together\

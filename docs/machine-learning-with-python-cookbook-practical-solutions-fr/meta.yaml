  md: "# Solution\n\nUse a learning algorithm that includes a *shrinkage penalty*\
    \ (also called *regularization*) like ridge regression and lasso regression:\n\
    \n```\n# Load libraries\nfrom sklearn.linear_model import Ridge\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.datasets import make_regression\n\n# Generate\
    \ features matrix, target vector\nfeatures, target = make_regression(n_samples\
    \ = 100,\n                                   n_features = 3,\n               \
    \                    n_informative = 2,\n                                   n_targets\
    \ = 1,\n                                   noise = 0.2,\n                    \
    \               coef = False,\n                                   random_state\
    \ = 1)\n\n# Standardize features\nscaler = StandardScaler()\nfeatures_standardized\
    \ = scaler.fit_transform(features)\n\n# Create ridge regression with an alpha\
    \ value\nregression = Ridge(alpha=0.5)\n\n# Fit the linear regression\nmodel =\
    \ regression.fit(features_standardized, target)\n```\n\n# Discussion\n\nIn standard\
    \ linear regression the model trains to minimize the sum of squared error between\
    \ the true ($y_i$) and prediction ($\\widehat{y}_i$) target values, or residual\
    \ sum of squares (RSS):\n\n$$RSS = \\sum_{i=1}^{n} (y_i - \\widehat{y}_i)^2$$\n\
    \nRegularized regression learners are similar, except they attempt to minimize\
    \ RSS *and* some penalty for the total size of the coefficient values, called\
    \ a *shrinkage penalty* because it attempts to “shrink” the model. There are two\
    \ common types of regularized learners for linear regression: ridge regression\
    \ and the lasso. The only formal difference is the type of shrinkage penalty used.\
    \ In *ridge regression*, the shrinkage penalty is a tuning hyperparameter multiplied\
    \ by the squared sum of all coefficients:\n\n$$RSS + \\alpha \\sum_{j=1}^{p} \\\
    widehat{\\beta}_j^2$$"
  merge: -1
  pgno: 253
- img_proc: true
  md: 'where $\widehat{\beta}_j$ is the coefficient of the $j$th of $p$ features and
    $\alpha$ is a hyperparameter (discussed next). The *lasso* is similar, except
    the shrinkage penalty is a tuning hyperparameter multiplied by the sum of the
    absolute value of all coefficients:


    $$\frac{1}{2n}\text{RSS} + \alpha \sum_{j=1}^{p} |\widehat{\beta}_j|$$


    where $n$ is the number of observations. So which one should we use? As a very
    general rule of thumb, ridge regression often produces slightly better predictions
    than lasso, but lasso (for reasons we will discuss in Recipe 13.5) produces more
    interpretable models. If we want a balance between ridge and lasso''s penalty
    functions we can use *elastic net*, which is simply a regression model with both
    penalties included. Regardless of which one we use, both ridge and lasso regressions
    can penalize large or complex models by including coefficient values in the loss
    function we are trying to minimize.


    The hyperparameter, $\alpha$, lets us control how much we penalize the coefficients,
    with higher values of $\alpha$ creating simpler models. The ideal value of $\alpha$
    should be tuned like any other hyperparameter. In scikit-learn, $\alpha$ is set
    using the `alpha` parameter.


    scikit-learn includes a `RidgeCV` method that allows us to select the ideal value
    for $\alpha$:


    ```

    # Load library

    from sklearn.linear_model import RidgeCV


    # Create ridge regression with three alpha values

    regr_cv = RidgeCV(alphas=[0.1, 1.0, 10.0])


    # Fit the linear regression

    model_cv = regr_cv.fit(features_standardized, target)


    # View coefficients

    model_cv.coef_

    array([1.29223201e-02, 4.40972291e+01, 5.38979372e+01])

    ```


    We can then easily view the best model''s $\alpha$ value:


    ```

    # View alpha

    model_cv.alpha_

    0.1

    ```


    One final note: because in linear regression the value of the coefficients is
    partially determined by the scale of the feature, and in regularized models all
    coefficients are summed together, we must make sure to standardize the feature
    prior to training.'

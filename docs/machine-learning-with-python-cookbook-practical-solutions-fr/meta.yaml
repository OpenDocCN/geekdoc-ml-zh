  md: "In scikit-learn, LDA is implemented using LinearDiscriminantAnalysis, which\
    \ includes a parameter, n_components, indicating the number of features we want\
    \ returned. To figure out what argument value to use with n_components (e.g.,\
    \ how many parameters to keep), we can take advantage of the fact that explained_variance_ratio_\
    \ tells us the variance explained by each outputted feature and is a sorted array.\
    \ For example:\n\n```\nlda.explained_variance_ratio_\narray([0.9912126])\n```\n\
    \nSpecifically, we can run LinearDiscriminantAnalysis with n_components set to\
    \ None to return the ratio of variance explained by every component feature, then\
    \ calculate how many components are required to get above some threshold of variance\
    \ explained (often 0.95 or 0.99):\n\n```\n# Create and run LDA\nlda = LinearDiscriminantAnalysis(n_components=None)\n\
    features_lda = lda.fit(features, target)\n\n# Create array of explained variance\
    \ ratios\nlda_var_ratios = lda.explained_variance_ratio_\n\n# Create function\n\
    def select_n_components(var_ratio, goal_var: float) -> int:\n    # Set initial\
    \ variance explained so far\n    total_variance = 0.0\n\n    # Set initial number\
    \ of features\n    n_components = 0\n\n    # For the explained variance of each\
    \ feature:\n    for explained_variance in var_ratio:\n\n        # Add the explained\
    \ variance to the total\n        total_variance += explained_variance\n\n    \
    \    # Add one to the number of components\n        n_components += 1\n\n    \
    \    # If we reach our goal level of explained variance\n        if total_variance\
    \ >= goal_var:\n            # End the loop\n            break\n\n    # Return\
    \ the number of components\n    return n_components\n\n# Run function\nselect_n_components(lda_var_ratios,\
    \ 0.95)\n1\n```"

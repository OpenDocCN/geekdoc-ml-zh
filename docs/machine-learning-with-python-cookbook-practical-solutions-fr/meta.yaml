    # 12.3 Selecting the Best Models from Multiple Learning Algorithms


    # Problem


    You want to select the best model by searching over a range of learning algorithms
    and their respective hyperparameters.


    # Solution


    Create a dictionary of candidate learning algorithms and their hyperparameters
    to use as the search space for GridSearchCV:


    ```

    # Load libraries

    import numpy as np

    from sklearn import datasets

    from sklearn.linear_model import LogisticRegression

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.model_selection import GridSearchCV

    from sklearn.pipeline import Pipeline


    # Set random seed

    np.random.seed(0)


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create a pipeline

    pipe = Pipeline([("classifier", RandomForestClassifier())])

    ```'

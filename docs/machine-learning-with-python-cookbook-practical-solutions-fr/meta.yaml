    # 14.7 Identifying Important Features in Random Forests


    # Problem


    You need to know which features are most important in a random forest model.


    # Solution


    Calculate and visualize the importance of each feature by inspecting the model''s
    feature_importances_ attribute:


    ```

    # Load libraries

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.ensemble import RandomForestClassifier

    from sklearn import datasets


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create random forest classifier object

    randomforest = RandomForestClassifier(random_state=0, n_jobs=-1)


    # Train model

    model = randomforest.fit(features, target)


    # Calculate feature importances

    importances = model.feature_importances_


    # Sort feature importances in descending order

    indices = np.argsort(importances)[::-1]


    # Rearrange feature names so they match the sorted feature importances

    names = [iris.feature_names[i] for i in indices]


    # Create plot

    plt.figure()

    ```'

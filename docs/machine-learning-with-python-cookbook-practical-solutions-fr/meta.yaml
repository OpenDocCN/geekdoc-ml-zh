  - "[PAGE 222]\n\n```\n# Generate features matrix\nfeatures, _ = make_blobs(n_samples\
    \ = 1000,\n                        n_features = 10,\n                        centers\
    \ = 2,\n                        cluster_std = 0.5,\n                        shuffle\
    \ = True,\n                        random_state = 1)\n\n# Cluster data using k-means\
    \ to predict classes\nmodel = KMeans(n_clusters=2, random_state=1).fit(features)\n\
    \n# Get predicted classes\ntarget_predicted = model.labels_\n\n# Evaluate model\n\
    silhouette_score(features, target_predicted)\n0.8916265564072141\n```\n\n# Discussion\n\
    \nSupervised model evaluation compares predictions (e.g., classes or quantitative\
    \ values) with the corresponding true values in the target vector. However, the\
    \ most common motivation for using clustering methods is that your data doesn't\
    \ have a target vector. A number of clustering evaluation metrics require a target\
    \ vector, but again, using unsupervised learning approaches like clustering when\
    \ you have a target vector available to you is probably handicapping yourself\
    \ unnecessarily.\n\nWhile we cannot evaluate predictions versus true values if\
    \ we don't have a target vector, we can evaluate the nature of the clusters themselves.\
    \ Intuitively, we can imagine “good” clusters having very small distances between\
    \ observations in the same cluster (i.e., dense clusters) and large distances\
    \ between the different clusters (i.e., well-separated clusters). Silhouette coefficients\
    \ provide a single value measuring both traits. Formally, the ith observation's\
    \ silhouette coefficient is:\n\n$$s_i = \\frac{b_i - a_i}{\\max(a_i, b_i)}$$\n\
    \nwhere $s_i$ is the silhouette coefficient for observation $i$, $a_i$ is the\
    \ mean distance between $i$ and all observations of the same class, and $b_i$\
    \ is the mean distance between $i$ and all observations from the closest cluster\
    \ of a different class. The value returned by silhouette_score is the mean silhouette\
    \ coefficient for all observations. Silhouette coefficients range between -1 and\
    \ 1, with 1 indicating dense, well-separated clusters."
- md: "## See Also\n\n- scikit-learn documentation: silhouette_score\n\n## 11.10 Creating\
    \ a Custom Evaluation Metric\n\n### Problem\n\nYou want to evaluate a model using\
    \ a metric you created.\n\n### Solution\n\nCreate the metric as a function and\
    \ convert it into a scorer function using scikit-learn's `make_scorer`:\n\n```python\n\
    # Load libraries\nfrom sklearn.metrics import make_scorer, r2_score\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.linear_model import Ridge\nfrom sklearn.datasets\
    \ import make_regression\n\n# Generate features matrix and target vector\nfeatures,\
    \ target = make_regression(n_samples=100,\n                                  \
    \ n_features=3,\n                                   random_state=1)\n\n# Create\
    \ training set and test set\nfeatures_train, features_test, target_train, target_test\
    \ = train_test_split(\n    features, target, test_size=0.10, random_state=1)\n\
    \n# Create custom metric\ndef custom_metric(target_test, target_predicted):\n\
    \    # Calculate R-squared score\n    r2 = r2_score(target_test, target_predicted)\n\
    \    # Return R-squared score\n    return r2\n\n# Make scorer and define that\
    \ higher scores are better\nscore = make_scorer(custom_metric, greater_is_better=True)\n\
    \n# Create ridge regression object\nclassifier = Ridge()\n\n# Train ridge regression\
    \ model\nmodel = classifier.fit(features_train, target_train)\n\n# Apply custom\
    \ scorer\nscore(model, features_test, target_test)\n```\n\n```\n0.9997906102882058\n\
    ```\n\n### Discussion\n\nWhile scikit-learn has a number of built-in metrics for\
    \ evaluating model performance, it is often useful to define our own metrics.\
    \ scikit-learn makes this easy using `make_scorer`. First, we define a function\
    \ that takes in two arguments—the ground truth target vector and our predicted\
    \ values—and outputs some score. Second, we use `make_scorer` to create a scorer\
    \ object, making sure to specify whether higher or lower scores are desirable\
    \ (using the `greater_is_better` parameter).\n\nThe custom metric in the solution\
    \ (`custom_metric`) is a toy example since it simply wraps a built-in metric for\
    \ calculating the $R^2$ score. In a real-world situation, we would replace the\
    \ `custom_metric` function with whatever custom metric we wanted. However, we\
    \ can see that the custom metric that calculates $R^2$ does work by comparing\
    \ the results to scikit-learn's `r2_score` built-in method:\n\n```python\n# Predict\
    \ values\ntarget_predicted = model.predict(features_test)\n\n# Calculate R-squared\
    \ score\nr2_score(target_test, target_predicted)\n```\n\n```\n0.9997906102882058\n\
    ```\n\n### See Also\n\n- scikit-learn documentation: `make_scorer`\n\n## 11.11\
    \ Visualizing the Effect of Training Set Size\n\n### Problem\n\nYou want to evaluate\
    \ the effect of the number of observations in your training set on some metric\
    \ (accuracy, $F_1$, etc.).\n\n### Solution\n\nPlot the accuracy against the training\
    \ set size:\n\n```python\n# Load libraries\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn.datasets\
    \ import load_digits\nfrom sklearn.model_selection import learning_curve\n\n#\
    \ Load data\ndigits = load_digits()\n\n# Create feature matrix and target vector\n\
    features, target = digits.data, digits.target\n\n# Create CV training and test\
    \ scores for various training set sizes\ntrain_sizes, train_scores, test_scores\
    \ = learning_curve(\n    # Classifier\n    RandomForestClassifier(),\n    # Feature\
    \ matrix\n    features,\n    # Target vector\n    target,\n    # Number of folds\n\
    \    cv=10,\n    # Performance metric\n    scoring='accuracy',\n    # Use all\
    \ computer cores\n    n_jobs=-1,\n    # Sizes of 50\n    # Training set\n    train_sizes=np.linspace(\n\
    \        0.01,\n        1.0,\n        50))\n\n# Create means and standard deviations\
    \ of training set scores\ntrain_mean = np.mean(train_scores, axis=1)\ntrain_std\
    \ = np.std(train_scores, axis=1)\n\n# Create means and standard deviations of\
    \ test set scores\ntest_mean = np.mean(test_scores, axis=1)\ntest_std = np.std(test_scores,\
    \ axis=1)\n\n# Draw lines\nplt.plot(train_sizes, train_mean, '--', color=\"#111111\"\
    , label=\"Training score\")\nplt.plot(train_sizes, test_mean, color=\"#111111\"\
    , label=\"Cross-validation score\")\n\n# Draw bands\nplt.fill_between(train_sizes,\

  md: '# 6.2 Parsing and Cleaning HTML


    # Problem


    You have text data with HTML elements and want to extract just the text.


    # Solution


    Use Beautiful Soup’s extensive set of options to parse and extract from HTML:


    ```

    # Load library

    from bs4 import BeautifulSoup


    # Create some HTML code

    html = "<div class=''full_name''>"\n       "<span style=''font-weight:bold''>Masego"\n       "</span>
    Azra</div>"


    # Parse html

    soup = BeautifulSoup(html, "lxml")


    # Find the div with the class "full_name", show text

    soup.find("div", { "class" : "full_name" }).text

    ''Masego Azra''

    ```


    # Discussion


    Despite the strange name, Beautiful Soup is a powerful Python library designed
    for scraping HTML. Typically Beautiful Soup is used to process HTML during live
    web scraping, but we can just as easily use it to extract text data embedded in
    static HTML. The full range of Beautiful Soup operations is beyond the scope of
    this book, but even the method we use in our solution shows how easy it can be
    to parse HTML and extract information from specific tags using find().


    # See Also


    +   - [Beautiful Soup](https://www.crummy.com/software/BeautifulSoup/bs4/doc/)



  md: "Second, we can break up numerical features according to multiple thresholds:\n\
    \n```\n# Bin feature\nnp.digitize(age, bins=[20,30,64])\n\narray([[0],\n     \
    \  [0],\n       [1],\n       [2],\n       [3]])\n```\n\nNote that the arguments\
    \ for the `bins` parameter denote the left edge of each bin. For example, the\
    \ 20 argument does not include the element with the value of 20, only the two\
    \ values smaller than 20. We can switch this behavior by setting the parameter\
    \ `right` to `True`:\n\n```\n# Bin feature\nnp.digitize(age, bins=[20,30,64],\
    \ right=True)\n\narray([[0],\n       [0],\n       [0],\n       [2],\n       [3]])\n\
    ```\n\n# Discussion\n\nDiscretization can be a fruitful strategy when we have\
    \ reason to believe that a numerical feature should behave more like a categorical\
    \ feature. For example, we might believe there is very little difference in the\
    \ spending habits of 19- and 20-year-olds, but a significant difference between\
    \ 20- and 21-year-olds (the age in the United States when young adults can consume\
    \ alcohol). In that example, it could be useful to break up individuals in our\
    \ data into those who can drink alcohol and those who cannot. Similarly, in other\
    \ cases it might be useful to discretize our data into three or more bins.\n\n\
    In the solution, we saw two methods of discretization—scikit-learn's `Binarizer`\
    \ for two bins and NumPy's `digitize` for three or more bins—however, we can also\
    \ use `digitize` to binarize features like `Binarizer` by specifying only a single\
    \ threshold:\n\n```\n# Bin feature\nnp.digitize(age, bins=[18])\n\narray([[0],\n\
    \       [0],\n       [1],\n       [1],\n       [1]])\n```"

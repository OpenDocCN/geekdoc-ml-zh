    # 7.2 Handling Time Zones


    # Problem


    You have time series data and want to add or change time zone information.


    # Solution


    Unless specified, pandas objects have no time zone. We can add a time zone using
    tz during creation:


    ```

    # Load library

    import pandas as pd


    # Create datetime

    pd.Timestamp(''2017-05-01 06:00:00'', tz=''Europe/London'')

    Timestamp(''2017-05-01 06:00:00+0100'', tz=''Europe/London'')

    ```


    We can add a time zone to a previously created datetime using tz_localize:


    ```

    # Create datetime

    date = pd.Timestamp(''2017-05-01 06:00:00'')


    # Set time zone

    date_in_london = date.tz_localize(''Europe/London'')


    # Show datetime

    date_in_london

    Timestamp(''2017-05-01 06:00:00+0100'', tz=''Europe/London'')

    ```


    We also can convert to a different time zone:


    ```

    # Change time zone

    date_in_london.tz_convert(''Africa/Abidjan'')

    Timestamp(''2017-05-01 05:00:00+0000'', tz=''Africa/Abidjan'')

    ```


    Finally, the pandas Series objects can apply tz_localize and tz_convert to every
    element:


    ```

    # Create three dates

    dates = pd.Series(pd.date_range(''2/2/2002'', periods=3, freq=''M''))


    # Set time zone

    dates.dt.tz_localize(''Africa/Abidjan'')

    ```'

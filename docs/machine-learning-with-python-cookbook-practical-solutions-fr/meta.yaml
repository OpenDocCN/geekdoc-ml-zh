    \ WALTON\nALLISON, MISS HELEN LORAINE\n```\n\n### Discussion\n\nIn addition to\
    \ loops (often called for loops), we can also use list comprehensions:\n\n```python\n\
    # Show first two names uppercased\n[name.upper() for name in dataframe['Name'][0:2]]\n\
    ['ALLEN, MISS ELISABETH WALTON', 'ALLISON, MISS HELEN LORAINE']\n```\n\nDespite\
    \ the temptation to fall back on for loops, a more Pythonic solution would use\
    \ the pandas apply method, described in Recipe 3.18.\n\n## 3.18 Applying a Function\
    \ over All Elements in a Column\n\n### Problem\n\nYou want to apply some function\
    \ over all elements in a column.\n\n### Solution\n\nUse apply to apply a built-in\
    \ or custom function on every element in a column:\n\n```python\n# Load library\n\
    import pandas as pd\n\n# Create URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# Load data\ndataframe = pd.read_csv(url)\n\n# Create function\ndef uppercase(x):\n\
    \    return x.upper()\n\n# Apply function, show two rows\ndataframe['Name'].apply(uppercase)[0:2]\n\
    0    ALLEN, MISS ELISABETH WALTON\n1    ALLISON, MISS HELEN LORAINE\nName: Name,\
    \ dtype: object\n```\n\n### Discussion\n\napply is a great way to do data cleaning\
    \ and wrangling. It is common to write a function to perform some useful operation\
    \ (separate first and last names, convert strings to floats, etc.) and then map\
    \ that function to every element in a column.\n\n## 3.19 Applying a Function to\
    \ Groups\n\n### Problem\n\nYou have grouped rows using groupby and want to apply\
    \ a function to each group.\n\n### Solution\n\nCombine groupby and apply:\n\n\
    ```python\n# Load library\nimport pandas as pd\n\n# Create URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# Load data\ndataframe = pd.read_csv(url)\n\n# Group rows, apply function to\
    \ groups\ndataframe.groupby('Sex').apply(lambda x: x.count())\n```\n\n| Sex |\

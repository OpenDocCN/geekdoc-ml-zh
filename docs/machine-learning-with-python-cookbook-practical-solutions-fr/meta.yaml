  - "[PAGE 343]\n\n# See Also\n\n+   - [PyTorch Autograd Tutorial](https://pytorch.org/tutorials/beginner/basics/autogradqs_tutorial.html)\n\
    \n# 21.2 Preprocessing Data for Neural Networks\n\n# Problem\n\nYou want to preprocess\
    \ data for use in a neural network.\n\n# Solution\n\nStandardize each feature\
    \ using scikit-learn's StandardScaler:\n\n```\n# Load libraries\nfrom sklearn\
    \ import preprocessing\nimport numpy as np\n\n# Create feature\nfeatures = np.array([[-100.1,\
    \ 3240.1],\n                     [-200.2, -234.1],\n                     [5000.5,\
    \ 150.1],\n                     [6000.6, -125.1],\n                     [9000.9,\
    \ -673.1]])\n\n# Create scaler\nscaler = preprocessing.StandardScaler()\n\n# Convert\
    \ to a tensor\nfeatures_standardized_tensor = torch.from_numpy(features)\n\n#\
    \ Show features\nfeatures_standardized_tensor\n```\n\n# Discussion\n\nWhile this\
    \ recipe is very similar to Recipe 4.2, it is worth repeating because of how important\
    \ it is for neural networks. Typically, a neural network's parameters are initialized\
    \ (i.e., created) as small random numbers. Neural networks often behave poorly\
    \ when the feature values are much larger than the parameter values. Furthermore,\
    \ since an observation's feature values are combined as they pass through individual\
    \ units, it is important that all features have the same scale."
  - "[PAGE 344]\n\nFor these reasons, it is best practice (although not always necessary;\
    \ for example, when we have all binary features) to standardize each feature such\
    \ that the feature's values have the mean of 0 and the standard deviation of 1.\
    \ This can be accomplished easily with scikit-learn's StandardScaler.\n\nHowever,\
    \ if you need to perform this operation after having created tensors with requires_grad=True,\
    \ you'll need to do this natively in PyTorch, so as not to break the graph. While\
    \ you'll typically standardize features prior to starting to train the network,\
    \ it's worth knowing how to accomplish the same thing in PyTorch:\n\n```\n# Load\
    \ library\nimport torch\n\n# Create features\ntorch_features = torch.tensor([[-100.1,\
    \ 3240.1],\n                               [-200.2, -234.1],\n               \
    \                [5000.5, 150.1],\n                               [6000.6, -125.1],\n\
    \                               [9000.9, -673.1]], requires_grad=True)\n\n# Compute\
    \ the mean and standard deviation\nmean = torch_features.mean(0, keepdim=True)\n\
    standard_deviation = torch_features.std(0, unbiased=False, keepdim=True)\n\n#\
    \ Standardize the features using the mean and standard deviation\ntorch_features_standardized\
    \ = torch_features - mean\ntorch_features_standardized /= standard_deviation\n\
    \n# Show standardized features\ntorch_features_standardized\n```\n\n```\ntensor([[-1.1254,\
    \  1.9643],\n        [-1.1533, -0.5007],\n        [ 0.2953, -0.2281],\n      \
    \  [ 0.5739, -0.4234],\n        [ 1.4096, -0.8122]], grad_fn=<DivBackward0>)\n\
    ```\n\n# 21.3 Designing a Neural Network\n\n# Problem\n\nYou want to design a\
    \ neural network.\n\n# Solution\n\nUse the PyTorch nn.Module class to define a\
    \ simple neural network architecture:\n\n```\n# Import libraries\nimport torch\n\
    import torch.nn as nn\n```"
  - "[PAGE 345]\n\n```\n# Define a neural network\nclass SimpleNeuralNet(nn.Module):\n\
    \    def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n  \
    \      self.fc1 = nn.Linear(10, 16)\n        self.fc2 = nn.Linear(16, 16)\n  \
    \      self.fc3 = nn.Linear(16, 1)\n\n    def forward(self, x):\n        x = nn.functional.relu(self.fc1(x))\n\
    \        x = nn.functional.relu(self.fc2(x))\n        x = nn.functional.sigmoid(self.fc3(x))\n\
    \        return x\n\n# Initialize the neural network\nnetwork = SimpleNeuralNet()\n\
    \n# Define loss function, optimizer\nloss_criterion = nn.BCELoss()\noptimizer\
    \ = torch.optim.RMSprop(network.parameters())\n\n# Show the network\nnetwork\n\
    SimpleNeuralNet(\n  (fc1): Linear(in_features=10, out_features=16, bias=True)\n\
    \  (fc2): Linear(in_features=16, out_features=16, bias=True)\n  (fc3): Linear(in_features=16,\
    \ out_features=1, bias=True)\n)\n```\n\n# Discussion\n\nNeural networks consist\
    \ of layers of units. However, there’s incredible variety in the types of layers\
    \ and how they are combined to form the network’s architecture. While there are\
    \ commonly used architecture patterns (which we’ll cover in this chapter), the\
    \ truth is that selecting the right architecture is mostly an art and the topic\
    \ of much research.\n\nTo construct a feedforward neural network in PyTorch, we\
    \ need to make a number of choices about both the network architecture and training\
    \ process. Remember that each unit in the hidden layers:\n\n+   1. Receives a\
    \ number of inputs.\n2. Weights each input by a parameter value.\n3. Sums together\
    \ all weighted inputs along with some bias (typically 0).\n4. Most often then\
    \ applies some function (called an *activation function*).\n5. Sends the output\
    \ on to units in the next layer."
  - "[PAGE 346]\n\nFirst, for each layer in the hidden and output layers we must define\
    \ the number of units to include in the layer and the activation function. Overall,\
    \ the more units we have in a layer, the more complex patterns our network is\
    \ able to learn. However, more units might make our network overfit the training\
    \ data in a way detrimental to the performance on the test data.\n\nFor hidden\
    \ layers, a popular activation function is the *rectified linear unit* (ReLU):\n\
    \n```\n$f(z) = \\max(0, z)$\n```\n\nwhere $z$ is the sum of the weighted inputs\
    \ and bias. As we can see, if $z$ is greater than 0, the activation function returns\
    \ $z$; otherwise, the function returns 0. This simple activation function has\
    \ a number of desirable properties (a discussion of which is beyond the scope\
    \ of this book), and this has made it a popular choice in neural networks. We\
    \ should be aware, however, that many dozens of activation functions exist.\n\n\
    Second, we need to define the number of hidden layers to use in the network. More\
    \ layers allow the network to learn more complex relationships, but with a computational\
    \ cost.\n\nThird, we have to define the structure of the activation function (if\
    \ any) of the output layer. The nature of the output function is often determined\
    \ by the goal of the network. Here are some common output layer patterns:\n\n\
    +   *Binary classification*\n    One unit with a sigmoid activation function\n\
    \n*Multiclass classification*\n    $k$ units (where $k$ is the number of target\
    \ classes) and a softmax activation function\n\n*Regression*\n    One unit with\
    \ no activation function\n\nFourth, we need to define a loss function (the function\
    \ that measures how well a predicted value matches the true value); again, this\
    \ is often determined by the problem type:\n\n+   *Binary classification*\n  \
    \  Binary cross-entropy\n\n*Multiclass classification*\n    Categorical cross-entropy\n\
    \n*Regression*\n    Mean square error"
  - "[PAGE 347]\n\nFifth, we have to define an optimizer, which intuitively can be\
    \ thought of as our strategy “walking around” the loss function to find the parameter\
    \ values that produce the lowest error. Common choices for optimizers are stochastic\
    \ gradient descent, stochastic gradient descent with momentum, root mean square\
    \ propagation, and adaptive moment estimation (for more information on these optimizers,\
    \ see “See Also” on page 333).\n\nSixth, we can select one or more metrics to\
    \ use to evaluate the performance, such as accuracy.\n\nIn our example, we use\
    \ the torch.nn.Module namespace to compose a simple, sequential neural network\
    \ that can make binary classifications. The standard PyTorch approach for this\
    \ is to create a child class that inherits from the torch.nn.Module class, instantiating\
    \ a network architecture in the __init__ method, and defining the mathematical\
    \ operations we want to perform upon each forward pass in the forward method of\
    \ the class. There are many ways to define networks in PyTorch, and although in\
    \ this case we use functional methods for our activation functions (such as nn.functional.relu)\
    \ we can also define these activation functions as layers. If we wanted to compose\
    \ everything in the network as a layer, we could use the Sequential class:\n\n\
    ```\n# Import libraries\nimport torch\n\n# Define a neural network using `Sequential`\n\
    class SimpleNeuralNet(nn.Module):\n    def __init__(self):\n        super(SimpleNeuralNet,\
    \ self).__init__()\n        self.sequential = torch.nn.Sequential(\n         \
    \   torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,16),\n\
    \            torch.nn.ReLU(),\n            torch.nn.Linear(16, 1),\n         \
    \   torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n        x = self.sequential(x)\n\
    \        return x\n\n# Instantiate and view the network\nSimpleNeuralNet()\n\n\
    SimpleNeuralNet(\n  (sequential): Sequential(\n    (0): Linear(in_features=10,\
    \ out_features=16, bias=True)\n    (1): ReLU()\n    (2): Linear(in_features=16,\
    \ out_features=16, bias=True)\n```"
- md: "## 21.4 Training a Binary Classifier\n\n### Problem\n\nYou want to train a\
    \ binary classifier neural network.\n\n### Solution\n\nUse PyTorch to construct\
    \ a feedforward neural network and train it:\n\n```python\n# Import libraries\n\
    import torch\nimport torch.nn as nn\nimport numpy as np\nfrom torch.utils.data\
    \ import DataLoader, TensorDataset\nfrom torch.optim import RMSprop\nfrom sklearn.datasets\
    \ import make_classification\nfrom sklearn.model_selection import train_test_split\n\
    \n# Create training and test sets\nfeatures, target = make_classification(n_classes=2,\
    \ n_features=10,\n                                       n_samples=1000)\nfeatures_train,\
    \ features_test, target_train, target_test = train_test_split(\n    features,\
    \ target, test_size=0.1, random_state=1)\n\n# Set random seed\ntorch.manual_seed(0)\n\
    np.random.seed(0)\n\n# Convert data to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\n\
    y_train = torch.from_numpy(target_train).float().view(-1, 1)\nx_test = torch.from_numpy(features_test).float()\n\
    y_test = torch.from_numpy(target_test).float().view(-1, 1)\n\n# Define a neural\
    \ network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n\
    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16, 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n\
    \        x = self.sequential(x)\n        return x\n\n# Initialize neural network\n\
    network = SimpleNeuralNet()\n\n# Define loss function, optimizer\ncriterion =\
    \ nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\n# Define data loader\n\
    train_data = TensorDataset(x_train, y_train)\ntrain_loader = DataLoader(train_data,\
    \ batch_size=100, shuffle=True)\n\n# Compile the model using torch 2.0's optimizer\n\
    network = torch.compile(network)\n\n# Train neural network\nepochs = 3\nfor epoch\
    \ in range(epochs):\n    for batch_idx, (data, target) in enumerate(train_loader):\n\
    \        optimizer.zero_grad()\n        output = network(data)\n        loss =\
    \ criterion(output, target)\n        loss.backward()\n        optimizer.step()\n\
    \        print(\"Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n\n# Evaluate neural\
    \ network\nwith torch.no_grad():\n    output = network(x_test)\n    test_loss\
    \ = criterion(output, y_test)\n    test_accuracy = (output.round() == y_test).float().mean()\n\
    \    print(\"Test Loss:\", test_loss.item(), \"\\tTest Accuracy:\",\n        \
    \  test_accuracy.item())\n```\n\n```\nEpoch: 1        Loss: 0.19006995856761932\n\
    Epoch: 2        Loss: 0.14092367887496948\nEpoch: 3        Loss: 0.03935524448752403\n\
    Test Loss: 0.06877756118774414  Test Accuracy: 0.9700000286102295\n```\n\n###\
    \ Discussion\n\nIn Recipe 21.3, we discussed how to construct a neural network\
    \ using PyTorch's sequential model. In this recipe we train that neural network\
    \ using 10 features and 1,000 observations of fake classification generated from\
    \ scikit-learn's make_classification function.\n\nThe neural network we are using\
    \ is the same as the one in Recipe 21.3 (see that recipe for a detailed explanation).\
    \ The difference there is that we only created the neural network; we didn't train\
    \ it.\n\nAt the end, we use `with torch.no_grad()` to evaluate the network. This\
    \ says that we should not compute gradients for any tensor operations conducted\
    \ in this section of code. Since we use gradients only during the model training\
    \ process, we don't want to store new gradients for operations that occur outside\
    \ of it (such as prediction or evaluation).\n\nThe `epochs` variable defines how\
    \ many epochs to use when training the data. `batch_size` sets the number of observations\
    \ to propagate through the network before updating the parameters.\n\nWe then\
    \ iterate over the number of epochs, making forward passes through the network\
    \ using the forward method, and then backward passes to update the gradients.\
    \ The result is a trained model.\n\n## 21.5 Training a Multiclass Classifier\n\
    \n### Problem\n\nYou want to train a multiclass classifier neural network.\n\n\
    ### Solution\n\nUse PyTorch to construct a feedforward neural network with an\
    \ output layer with softmax activation functions:\n\n```python\n# Import libraries\n\
    import torch\nimport torch.nn as nn\nimport numpy as np\nfrom torch.utils.data\
    \ import DataLoader, TensorDataset\nfrom torch.optim import RMSprop\nfrom sklearn.datasets\
    \ import make_classification\nfrom sklearn.model_selection import train_test_split\n\
    \nN_CLASSES=3\nEPOCHS=3\n\n# Create training and test sets\nfeatures, target =\
    \ make_classification(n_classes=N_CLASSES, n_informative=9,\n                \
    \                       n_redundant=0, n_features=10, n_samples=1000)\nfeatures_train,\
    \ features_test, target_train, target_test = train_test_split(\n    features,\
    \ target, test_size=0.1, random_state=1)\n\n# Set random seed\ntorch.manual_seed(0)\n\
    np.random.seed(0)\n\n# Convert data to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\n\
    y_train = torch.nn.functional.one_hot(torch.from_numpy(target_train).long(),\n\
    \                                       num_classes=N_CLASSES).float()\nx_test\
    \ = torch.from_numpy(features_test).float()\ny_test = torch.nn.functional.one_hot(torch.from_numpy(target_test).long(),\n\
    \                                      num_classes=N_CLASSES).float()\n\n# Define\
    \ a neural network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n   \
    \ def __init__(self):\n        super(SimpleNeuralNet, self).__init__()\n     \
    \   self.sequential = torch.nn.Sequential(\n            torch.nn.Linear(10, 16),\n\
    \            torch.nn.ReLU(),\n            torch.nn.Linear(16,16),\n         \
    \   torch.nn.ReLU(),\n            torch.nn.Linear(16,3),\n            torch.nn.Softmax()\n\
    \        )\n\n    def forward(self, x):\n        x = self.sequential(x)\n    \
    \    return x\n\n# Initialize neural network\nnetwork = SimpleNeuralNet()\n\n\
    # Define loss function, optimizer\ncriterion = nn.CrossEntropyLoss()\noptimizer\
    \ = RMSprop(network.parameters())\n\n# Define data loader\ntrain_data = TensorDataset(x_train,\
    \ y_train)\ntrain_loader = DataLoader(train_data, batch_size=100, shuffle=True)\n\
    \n# Compile the model using torch 2.0's optimizer\nnetwork = torch.compile(network)\n\
    \n# Train neural network\nfor epoch in range(EPOCHS):\n    for batch_idx, (data,\
    \ target) in enumerate(train_loader):\n        optimizer.zero_grad()\n       \
    \ output = network(data)\n        loss = criterion(output, target)\n        loss.backward()\n\
    \        optimizer.step()\n    print(\"Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n\
    \n# Evaluate neural network\nwith torch.no_grad():\n    output = network(x_test)\n\
    \    test_loss = criterion(output, y_test)\n    test_accuracy = (output.round()\
    \ == y_test).float().mean()\n    print(\"Test Loss:\", test_loss.item(), \"\\\
    tTest Accuracy:\",\n          test_accuracy.item())\n```\n\n```\nEpoch: 1    \
    \    Loss: 0.8022041916847229\nEpoch: 2        Loss: 0.775616466999054\nEpoch:\
    \ 3        Loss: 0.7751263380050659\nTest Loss: 0.8105319142341614   Test Accuracy:\
    \ 0.8199999928474426\n```\n\n### Discussion\n\nIn this solution we created a similar\
    \ neural network to the binary classifier from the last recipe, but with some\
    \ notable changes. In the classification data we generated, we set `N_CLASSES=3`.\
    \ To handle multiclass classification, we also use `nn.CrossEntropyLoss()`, which\
    \ expects the target to be one-hot encoded. To accomplish this, we use the `torch.nn.functional.one_hot`\
    \ function and end up with"
  mdcn: "## 21.4 训练二元分类器\n\n### 问题\n\n你想训练一个二元分类器神经网络。\n\n### 解决方案\n\n使用 PyTorch 构建一个前馈神经网络并进行训练：\n\
    \n```python\n# Import libraries\nimport torch\nimport torch.nn as nn\nimport numpy\
    \ as np\nfrom torch.utils.data import DataLoader, TensorDataset\nfrom torch.optim\
    \ import RMSprop\nfrom sklearn.datasets import make_classification\nfrom sklearn.model_selection\
    \ import train_test_split\n\n# Create training and test sets\nfeatures, target\
    \ = make_classification(n_classes=2, n_features=10,\n                        \
    \               n_samples=1000)\nfeatures_train, features_test, target_train,\
    \ target_test = train_test_split(\n    features, target, test_size=0.1, random_state=1)\n\
    \n# Set random seed\ntorch.manual_seed(0)\nnp.random.seed(0)\n\n# Convert data\
    \ to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\ny_train\
    \ = torch.from_numpy(target_train).float().view(-1, 1)\nx_test = torch.from_numpy(features_test).float()\n\
    y_test = torch.from_numpy(target_test).float().view(-1, 1)\n\n# Define a neural\
    \ network using `Sequential`\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n\
    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16, 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n\
    \        x = self.sequential(x)\n        return x\n\n# Initialize neural network\n\
    network = SimpleNeuralNet()\n\n# Define loss function, optimizer\ncriterion =\
    \ nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\n# Define data loader\n\
    train_data = TensorDataset(x_train, y_train)\ntrain_loader = DataLoader(train_data,\
    \ batch_size=100, shuffle=True)\n\n# Compile the model using torch 2.0's optimizer\n\
    network = torch.compile(network)\n\n# Train neural network\nepochs = 3\nfor epoch\
    \ in range(epochs):\n    for batch_idx, (data, target) in enumerate(train_loader):\n\
    \        optimizer.zero_grad()\n        output = network(data)\n        loss =\
    \ criterion(output, target)\n        loss.backward()\n        optimizer.step()\n\
    \        print(\"Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n\n# Evaluate neural\
    \ network\nwith torch.no_grad():\n    output = network(x_test)\n    test_loss\
    \ = criterion(output, y_test)\n    test_accuracy = (output.round() == y_test).float().mean()\n\
    \    print(\"Test Loss:\", test_loss.item(), \"\\tTest Accuracy:\",\n        \
    \  test_accuracy.item())\n```\n\n```\nEpoch: 1        Loss: 0.19006995856761932\n\
    Epoch: 2        Loss: 0.14092367887496948\nEpoch: 3        Loss: 0.03935524448752403\n\
    Test Loss: 0.06877756118774414  Test Accuracy: 0.9700000286102295\n```\n\n###\
    \ 讨论\n\n在配方 21.3 中，我们讨论了如何使用 PyTorch 的顺序模型构建神经网络。在本配方中，我们使用 10 个特征和 1,000 个由 scikit-learn\
    \ 的 `make_classification` 函数生成的假分类观测值来训练该神经网络。\n\n我们使用的神经网络与配方 21.3 中的相同（详细解释请参见该配方）。区别在于，我们之前只是创建了神经网络，而没有训练它。\n\
    \n最后，我们使用 `with torch.no_grad()` 来评估网络。这表示我们不应为在此代码段中执行的任何张量操作计算梯度。由于我们只在模型训练过程中使用梯度，因此我们不希望为训练之外的操作（如预测或评估）存储新的梯度。\n\
    \n`epochs` 变量定义了训练数据时使用的轮数。`batch_size` 设置了在更新参数之前通过网络传播的观测值数量。\n\n然后我们遍历轮数，使用\
    \ `forward` 方法在网络中进行前向传播，然后进行反向传播以更新梯度。结果就是一个训练好的模型。\n\n## 21.5 训练多类分类器\n\n###\
    \ 问题\n\n你想训练一个多类分类器神经网络。\n\n### 解决方案\n\n使用 PyTorch 构建一个前馈神经网络，其输出层使用 softmax 激活函数：\n\
    \n```python\n# Import libraries\nimport torch\nimport torch.nn as nn\nimport numpy\
    \ as np\nfrom torch.utils.data import DataLoader, TensorDataset\nfrom torch.optim\
    \ import RMSprop\nfrom sklearn.datasets import make_classification\nfrom sklearn.model_selection\
    \ import train_test_split\n\nN_CLASSES=3\nEPOCHS=3\n\n# Create training and test\
    \ sets\nfeatures, target = make_classification(n_classes=N_CLASSES, n_informative=9,\n\
    \                                       n_redundant=0, n_features=10, n_samples=1000)\n\
    features_train, features_test, target_train, target_test = train_test_split(\n\
    \    features, target, test_size=0.1, random_state=1)\n\n# Set random seed\ntorch.manual_seed(0)\n\
    np.random.seed(0)\n\n# Convert data to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\n\
    y_train = torch.nn.functional.one_hot(torch.from_numpy(target_train).long(),\n\
    \                                       num_classes=N_CLASSES).float()\nx_test\
    \ = torch.from_numpy(features_test).float()\ny_test = torch.nn.functional.one_hot(torch.from_numpy(target_test).long(),\n\

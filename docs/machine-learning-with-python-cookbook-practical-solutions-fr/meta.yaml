    vector[3:]\n\ntensor([4, 5, 6])\n\n# Select the last element\nvector[-1]\n\ntensor(6)\n\
    \n# Select the first two rows and all columns of a matrix\nmatrix[:2,:]\n\ntensor([[1,\
    \ 2, 3],\n        [4, 5, 6]])\n\n# Select all rows and the second column\nmatrix[:,1:2]\n\
    \ntensor([[2],\n        [5],\n        [8]])\n```\n\nOne key difference is that\
    \ PyTorch tensors do not yet support negative steps when slicing. Therefore, attempting\
    \ to reverse a tensor using slicing yields an error:\n\n```\n# Reverse the vector\n\
    vector[::-1]\n\nValueError: step must be greater than zero\n```\n\nInstead, if\
    \ we wish to reverse a tensor we can use the `flip` method:\n\n```\nvector.flip(dims=(-1,))\n\
    \ntensor([6, 5, 4, 3, 2, 1])\n```\n\n# See Also\n\n+   - PyTorch documentation:\
    \ Operations on Tensors\n\n# 20.5 Describing a Tensor\n\n# Problem\n\nYou want\

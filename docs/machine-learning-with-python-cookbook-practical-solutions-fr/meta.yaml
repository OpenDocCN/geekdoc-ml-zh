  md: '# Solution


    To blur an image, each pixel is transformed to be the average value of its neighbors.
    This neighbor and the operation performed are mathematically represented as a
    kernel (don''t worry if you don''t know what a kernel is). The size of this kernel
    determines the amount of blurring, with larger kernels producing smoother images.
    Here we blur an image by averaging the values of a 5 × 5 kernel around each pixel:


    ```

    # Load libraries

    import cv2

    import numpy as np

    from matplotlib import pyplot as plt


    # Load image as grayscale

    image = cv2.imread("images/plane_256x256.jpg", cv2.IMREAD_GRAYSCALE)


    # Blur image

    image_blurry = cv2.blur(image, (5,5))


    # Show image

    plt.imshow(image_blurry, cmap="gray"), plt.axis("off")

    plt.show()

    ```


    ![](img/553f6c9c8b23451624604a848ee8a83c_154_0.png)


    To highlight the effect of kernel size, here is the same blurring with a 100 ×
    100 kernel:


    ```

    # Blur image

    image_very_blurry = cv2.blur(image, (100,100))


    # Show image

    plt.imshow(image_very_blurry, cmap="gray"), plt.xticks([]), plt.yticks([])

    plt.show()

    ```'

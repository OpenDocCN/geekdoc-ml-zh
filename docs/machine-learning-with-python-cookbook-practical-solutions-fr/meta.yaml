- md: "## 22.1 Training a Neural Network for Image Classification\n\n### Problem\n\
    \nYou need to train an image classification neural network.\n\n### Solution\n\n\
    Use a convolutional neural network in PyTorch:\n\n```python\n# Import libraries\n\
    import torch\nimport torch.nn as nn\nimport torch.optim as optim\nfrom torchvision\
    \ import datasets, transforms\n\n# Define the convolutional neural network architecture\n\
    class Net(nn.Module):\n    def __init__(self):\n        super(Net, self).__init__()\n\
    \        self.conv1 = nn.Conv2d(1, 32, kernel_size=3, padding=1)\n        self.conv2\
    \ = nn.Conv2d(32, 64, kernel_size=3, padding=1)\n        self.dropout1 = nn.Dropout2d(0.25)\n\
    \        self.dropout2 = nn.Dropout2d(0.5)\n        self.fc1 = nn.Linear(64 *\
    \ 14 * 14, 128)\n        self.fc2 = nn.Linear(128, 10)\n\n    def forward(self,\
    \ x):\n        x = nn.functional.relu(self.conv1(x))\n        x = nn.functional.relu(self.conv2(x))\n\
    \        x = nn.functional.max_pool2d(self.dropout1(x), 2)\n        x = torch.flatten(x,\
    \ 1)\n        x = nn.functional.relu(self.fc1(self.dropout2(x)))\n        x =\
    \ self.fc2(x)\n        return nn.functional.log_softmax(x, dim=1)\n\n# Set the\
    \ device to run on\ndevice = torch.device(\"cuda\" if torch.cuda.is_available()\
    \ else \"cpu\")\n\n# Define the data preprocessing steps\ntransform = transforms.Compose([\n\
    \    transforms.ToTensor(),\n    transforms.Normalize((0.1307,), (0.3081,))\n\
    ])\n\n# Load the MNIST dataset\ntrain_dataset = datasets.MNIST('./data', train=True,\
    \ download=True,\n    transform=transform)\ntest_dataset = datasets.MNIST('./data',\
    \ train=False, transform=transform)\n\n# Create data loaders\nbatch_size = 64\n\
    train_loader = torch.utils.data.DataLoader(train_dataset, batch_size=batch_size,\n\
    \    shuffle=True)\ntest_loader = torch.utils.data.DataLoader(test_dataset, batch_size=batch_size,\n\
    \    shuffle=True)\n\n# Initialize the model and optimizer\nmodel = Net().to(device)\n\
    optimizer = optim.Adam(model.parameters())\n\n# Compile the model using torch\
    \ 2.0's optimizer\nmodel = torch.compile(model)\n\n# Define the training loop\n\
    model.train()\nfor batch_idx, (data, target) in enumerate(train_loader):\n   \
    \ data, target = data.to(device), target.to(device)\n    optimizer.zero_grad()\n\
    \    output = model(data)\n    loss = nn.functional.nll_loss(output, target)\n\
    \    loss.backward()\n    optimizer.step()\n\n# Define the testing loop\nmodel.eval()\n\
    test_loss = 0\ncorrect = 0\nwith torch.no_grad():\n    for data, target in test_loader:\n\
    \        data, target = data.to(device), target.to(device)\n        output = model(data)\n\
    \n        # get the index of the max log-probability\n        test_loss += nn.functional.nll_loss(\n\
    \            output, target, reduction='sum'\n        ).item()  # sum up batch\
    \ loss\n        pred = output.argmax(dim=1, keepdim=True)\n        correct +=\
    \ pred.eq(target.view_as(pred)).sum().item()\n\ntest_loss /= len(test_loader.dataset)\n\
    ```\n\n### Discussion\n\nConvolutional neural networks are typically used for\
    \ tasks in image recognition and computer vision. They typically consist of convolutional\
    \ layers, pooling layers, and a fully connected layer.\n\nThe purpose of the *convolutional\
    \ layers* is to learn important image features that can be used for the task at\
    \ hand. Convolutional layers work by applying a filter to a particular area of\
    \ an image (the size of the convolution). The weights of this layer then learn\
    \ to recognize specific image features critical in the classification task. For\
    \ instance, if we're training a model that recognizes a person's hand, the filter\
    \ may learn to recognize fingers.\n\nThe purpose of the *pooling layer* is typically\
    \ to reduce the dimensionality of the inputs from the previous layer. This layer\
    \ also uses a filter applied to a portion of the input, but it has no activation.\
    \ Instead, it reduces dimensionality of the input by performing *max pooling*\
    \ (where it selects the pixel in the filter with the highest value) or *average\
    \ pooling* (where it takes an average of the input pixels to use instead).\n\n\
    Finally, the *fully connected layer* can be used with something like a softmax\
    \ activation function to create a binary classification task.\n\n### See Also\n\
    \n- [Convolutional Neural Networks](Convolutional Neural Networks)\n\n## 22.2\
    \ Training a Neural Network for Text Classification\n\n### Problem\n\nYou need\
    \ to train a neural network to classify text data.\n\n### Solution\n\nUse a PyTorch\
    \ neural network whose first layer is the size of your vocabulary:\n\n```python\n\
    # Import libraries\nimport torch\nimport torch.nn as nn\nimport torch.optim as\
    \ optim\nimport numpy as np\nfrom sklearn.datasets import fetch_20newsgroups\n\
    from sklearn.feature_extraction.text import CountVectorizer\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.metrics import accuracy_score\n\n# Load\
    \ the 20 newsgroups dataset\ncats = ['alt.atheism', 'sci.space']\nnewsgroups_data\
    \ = fetch_20newsgroups(subset='all', shuffle=True,\n    random_state=42, categories=cats)\n\
    \n# Split the dataset into training and test sets\nX_train, X_test, y_train, y_test\
    \ = train_test_split(newsgroups_data.data,\n    newsgroups_data.target, test_size=0.2,\
    \ random_state=42)\n\n# Vectorize the text data using a bag-of-words approach\n\
    vectorizer = CountVectorizer(stop_words='english')\nX_train = vectorizer.fit_transform(X_train).toarray()\n\
    X_test = vectorizer.transform(X_test).toarray()\n\n# Convert the data to PyTorch\
    \ tensors\nX_train = torch.tensor(X_train, dtype=torch.float32)\ny_train = torch.tensor(y_train,\
    \ dtype=torch.long)\nX_test = torch.tensor(X_test, dtype=torch.float32)\ny_test\
    \ = torch.tensor(y_test, dtype=torch.long)\n\n# Define the model\nclass TextClassifier(nn.Module):\n\
    \    def __init__(self, num_classes):\n        super(TextClassifier, self).__init__()\n\
    \        self.fc1 = nn.Linear(X_train.shape[1], 128)\n        self.fc2 = nn.Linear(128,\
    \ num_classes)\n\n    def forward(self, x):\n        x = nn.functional.relu(self.fc1(x))\n\
    \        x = self.fc2(x)\n        return nn.functional.log_softmax(x, dim=1)\n\
    \n# Instantiate the model and define the loss function and optimizer\nmodel =\
    \ TextClassifier(num_classes=len(cats))\nloss_function = nn.CrossEntropyLoss()\n\
    optimizer = optim.Adam(model.parameters(), lr=0.01)\n\n# Compile the model using\
    \ torch 2.0's optimizer\nmodel = torch.compile(model)\n\n# Train the model\nnum_epochs\
    \ = 1\nbatch_size = 10\nnum_batches = len(X_train) // batch_size\nfor epoch in\
    \ range(num_epochs):\n    total_loss = 0.0\n    for i in range(num_batches):\n\
    \        # Prepare the input and target data for the current batch\n        start_idx\
    \ = i * batch_size\n        end_idx = (i + 1) * batch_size\n        inputs = X_train[start_idx:end_idx]\n\
    \        targets = y_train[start_idx:end_idx]\n\n        # Zero the gradients\
    \ for the optimizer\n        optimizer.zero_grad()\n\n        # Forward pass through\
    \ the model and compute the loss\n        outputs = model(inputs)\n        loss\
    \ = loss_function(outputs, targets)\n\n        # Backward pass through the model\
    \ and update the parameters\n        loss.backward()\n        optimizer.step()\n\
    \n        # Update the total loss for the epoch\n        total_loss += loss.item()\n\
    \n    # Compute the accuracy on the test set for the epoch\n    test_outputs =\
    \ model(X_test)\n    test_predictions = torch.argmax(test_outputs, dim=1)\n  \
    \  test_accuracy = accuracy_score(y_test, test_predictions)\n\n    # Print the\
    \ epoch number, average loss, and test accuracy\n    print(f\"Epoch: {epoch+1},\
    \ Loss: {total_loss/num_batches}, Test Accuracy: \"\n          f\"{test_accuracy}\"\
    )\n```\n\n### Discussion\n\nUnlike images, text data is inherently nonnumeric.\
    \ Before training a model, we need to convert the text into a numeric representation\
    \ that the model can use to learn which words and word combinations are important\
    \ for the classification task at hand. In this example, we use scikit-learn's\
    \ CountVectorizer to encode the vocabulary as a vector the size of the entire\
    \ vocabulary, where each word is assigned to a specific index in the vector, and\
    \ the value at that location is the number of times that word appears in a given\
    \ paragraph. In this case, we can see the vocabulary size by looking at our training\
    \ set:\n\n```python\nX_train.shape[1]\n# 25150\n```\n\nWe use this same value\
    \ in the first layer of our neural network to determine the size of the input\
    \ layer: `self.fc1 = nn.Linear(X_train.shape[1], 128)`. This allows our network\
    \ to learn what are called *word embeddings*, vector representations of individual\
    \ words learned from a supervised learning task like the one in this recipe. This\
    \ task will allow us to learn word embeddings of size 128, though these embeddings\
    \ will primarily be useful for this specific task and vocabulary."

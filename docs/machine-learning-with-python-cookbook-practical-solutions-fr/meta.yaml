    \ 方法。该方法通过使用聚类来限制最近邻搜索的搜索空间范围。IVF 使用泰森多边形（Voronoi tessellations）将我们的搜索空间划分为若干个不同的区域（或簇）。当我们去寻找最近邻时，我们只访问有限数量的簇来寻找相似的观测值，而不是对数据集中的每个点进行比较。\n\
    \n如何从数据创建泰森多边形，最好通过简单的数据来可视化。以二维随机数据散点图为例，如图15-1所示。\n\n![](img/553f6c9c8b23451624604a848ee8a83c_287_0.png)\n\

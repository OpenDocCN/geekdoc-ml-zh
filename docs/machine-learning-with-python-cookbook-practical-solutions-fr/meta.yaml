- img_proc: true
  md: "First, for each layer in the hidden and output layers we must define the number\
    \ of units to include in the layer and the activation function. Overall, the more\
    \ units we have in a layer, the more complex patterns our network is able to learn.\
    \ However, more units might make our network overfit the training data in a way\
    \ detrimental to the performance on the test data.\n\nFor hidden layers, a popular\
    \ activation function is the *rectified linear unit* (ReLU):\n\n```\n$f(z) = \\\
    max(0, z)$\n```\n\nwhere $z$ is the sum of the weighted inputs and bias. As we\
    \ can see, if $z$ is greater than 0, the activation function returns $z$; otherwise,\
    \ the function returns 0. This simple activation function has a number of desirable\
    \ properties (a discussion of which is beyond the scope of this book), and this\
    \ has made it a popular choice in neural networks. We should be aware, however,\
    \ that many dozens of activation functions exist.\n\nSecond, we need to define\
    \ the number of hidden layers to use in the network. More layers allow the network\
    \ to learn more complex relationships, but with a computational cost.\n\nThird,\
    \ we have to define the structure of the activation function (if any) of the output\
    \ layer. The nature of the output function is often determined by the goal of\
    \ the network. Here are some common output layer patterns:\n\n+   *Binary classification*\n\
    \    One unit with a sigmoid activation function\n\n*Multiclass classification*\n\
    \    $k$ units (where $k$ is the number of target classes) and a softmax activation\
    \ function\n\n*Regression*\n    One unit with no activation function\n\nFourth,\
    \ we need to define a loss function (the function that measures how well a predicted\
    \ value matches the true value); again, this is often determined by the problem\
    \ type:\n\n+   *Binary classification*\n    Binary cross-entropy\n\n*Multiclass\
    \ classification*\n    Categorical cross-entropy\n\n*Regression*\n    Mean square\
    \ error"

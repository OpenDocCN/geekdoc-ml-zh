    \n# Create standardizer\nstandardizer = StandardScaler()\n\n# Create logistic\
    \ regression object\nlogit = LogisticRegression()\n\n# Create a pipeline that\
    \ standardizes, then runs logistic regression\npipeline = make_pipeline(standardizer,\
    \ logit)\n\n# Create k-fold cross-validation\nkf = KFold(n_splits=5, shuffle=True,\
    \ random_state=0)\n\n# Conduct k-fold cross-validation\ncv_results = cross_val_score(pipeline,\
    \ # Pipeline\n                             features, # Feature matrix\n      \
    \                       target, # Target vector\n                            \
    \ cv=kf, # Performance metric\n                             scoring=\"accuracy\"\
    , # Loss function\n                             n_jobs=-1) # Use all CPU cores\n\
    \n# Calculate mean\ncv_results.mean()\n\n0.969958217270195\n```\n\n# Discussion\n\
    \nAt first consideration, evaluating supervised-learning models might appear straightforward:\
    \ train a model and then calculate how well it did using some performance metric\
    \ (accuracy, squared errors, etc.). However, this approach is fundamentally flawed.\
    \ If we train a model using our data, and then evaluate how well it did on that\
    \ data, we are not achieving our desired goal. Our goal is not to evaluate how\
    \ well the model does on our training data, but how well it does on data it has\
    \ never seen before (e.g., a new customer, a new crime, a new image). For this\
    \ reason, our method of evaluation should help us understand how well models are\
    \ able to make predictions from data they have never seen before.\n\nOne strategy\
    \ might be to hold off a slice of data for testing. This is called *validation*\
    \ (or *hold-out*). In validation, our observations (features and targets) are\
    \ split into two sets, traditionally called the *training set* and the *test set*.\
    \ We take the test set and put it off to the side, pretending that we have never\
    \ seen it before. Next we train our model"
  merge: -1
  pgno: 203
- img_proc: true
  md: "using our training set, using the features and target vector to teach the model\
    \ how to make the best prediction. Finally, we simulate having never-before-seen\
    \ external data by evaluating how our model performs on our test set. However,\
    \ the validation approach has two major weaknesses. First, the performance of\
    \ the model can be highly dependent on which few observations were selected for\
    \ the test set. Second, the model is not being trained using all the available\
    \ data, and it's not being evaluated on all the available data.\n\nA better strategy,\
    \ which overcomes these weaknesses, is called *k-fold cross-validation* (KFCV).\
    \ In KFCV, we split the data into *k* parts called *folds*. The model is then\
    \ trained using *k* – 1 folds—combined into one training set—and then the last\
    \ fold is used as a test set. We repeat this *k* times, each time using a different\
    \ fold as the test set. The performance on the model for each of the *k* iterations\
    \ is then averaged to produce an overall measurement.\n\nIn our solution, we conducted\
    \ k-fold cross-validation using five folds and outputted the evaluation scores\
    \ to `cv_results`:\n\n```\n# View score for all 5 folds\ncv_results\n\narray([0.96111111,\
    \ 0.96388889, 0.98050139, 0.97214485, 0.97214485])\n```\n\nThere are three important\
    \ points to consider when we are using KFCV. First, KFCV assumes that each observation\
    \ was created independently from the other (i.e., the data is independent and\
    \ identically distributed [IID]). If the data is IID, it is a good idea to shuffle\
    \ observations when assigning to folds. In scikit-learn we can set `shuffle=True`\
    \ to perform shuffling.\n\nSecond, when we are using KFCV to evaluate a classifier,\
    \ it is often beneficial to have folds containing roughly the same percentage\
    \ of observations from each of the different target classes (called *stratified\
    \ k-fold*). For example, if our target vector contained gender and 80% of the\
    \ observations were male, then each fold would contain 80% male and 20% female\
    \ observations. In scikit-learn, we can conduct stratified k-fold cross-validation\
    \ by replacing the `KFold` class with `StratifiedKFold`.\n\nFinally, when we are\
    \ using validation sets or cross-validation, it is important to preprocess data\
    \ based on the training set and then apply those transformations to both the training\
    \ and test set. For example, when we `fit` our standardization object, `standardizer`,\
    \ we calculate the mean and variance of only the training set. Then we apply that\
    \ transformation (using `transform`) to both the training and test sets:\n\n```\n\
    # Import library\nfrom sklearn.model_selection import train_test_split\n\n# Create\
    \ training and test sets\nfeatures_train, features_test, target_train, target_test\
    \ = train_test_split(\n    features, target, test_size=0.1, random_state=1)\n\
    ```"

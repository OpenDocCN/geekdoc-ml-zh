    # 9.4 Reducing Features Using Matrix Factorization


    # Problem


    You have a feature matrix of nonnegative values and want to reduce the dimensionality.


    # Solution


    Use *nonnegative matrix factorization* (NMF) to reduce the dimensionality of the
    feature matrix:


    ```

    # Load libraries

    from sklearn.decomposition import NMF

    from sklearn import datasets


    # Load the data

    digits = datasets.load_digits()


    # Load feature matrix

    features = digits.data


    # Create, fit, and apply NMF

    nmf = NMF(n_components=10, random_state=4)

    features_nmf = nmf.fit_transform(features)


    # Show results

    print("Original number of features:", features.shape[1])

    print("Reduced number of features:", features_nmf.shape[1])

    Original number of features: 64

    Reduced number of features: 10

    ```


    # Discussion


    NMF is an unsupervised technique for linear dimensionality reduction that *factorizes*
    (i.e., breaks up into multiple matrices whose product approximates the original
    matrix) the feature matrix into matrices representing the latent relationship
    between observations and their features. Intuitively, NMF can reduce dimensionality
    because in matrix multiplication, the two factors (matrices being multiplied)
    can have significantly fewer dimensions than the product matrix. Formally, given
    a desired number of returned features, *r*, NMF factorizes our feature matrix
    such that:'
  merge: -1
  pgno: 188
- img_proc: true
  md: '**V** ≈ **WH**


    where **V** is our *n* × *d* feature matrix (i.e., *d* features, *n* observations),
    **W** is an *n* × *r* matrix, and **H** is an *r* × *d* matrix. By adjusting the
    value of *r* we can set the amount of dimensionality reduction desired.


    One major requirement of NMF is that, as the name implies, the feature matrix
    cannot contain negative values. Additionally, unlike PCA and other techniques
    we have examined, NMF does not provide the explained variance of the outputted
    features. Thus, the best way for us to find the optimum value of n_components
    is by trying a range of values to find the one that produces the best result in
    our end model (see Chapter 12).


    # See Also


    +   - Non-negative matrix factorization, Wikipedia


    # 9.5 Reducing Features on Sparse Data


    # Problem


    You have a sparse feature matrix and want to reduce the dimensionality.


    # Solution


    Use *Truncated Singular Value Decomposition* (TSVD):


    ```

    # Load libraries

    from sklearn.preprocessing import StandardScaler

    from sklearn.decomposition import TruncatedSVD

    from scipy.sparse import csr_matrix

    from sklearn import datasets

    import numpy as np


    # Load the data

    digits = datasets.load_digits()


    # Standardize feature matrix

    features = StandardScaler().fit_transform(digits.data)


    # Make sparse matrix

    features_sparse = csr_matrix(features)


    # Create a TSVD

    tsvd = TruncatedSVD(n_components=10)


    # Conduct TSVD on sparse matrix

    features_sparse_tsvd = tsvd.fit(features_sparse).transform(features_sparse)

    ```'

    # Discussion


    The more a word appears in a document, the more likely it is that the word is
    important to that document. For example, if the word *economy* appears frequently,
    it is evidence that the document might be about economics. We call this *term
    frequency* (*tf*).


    In contrast, if a word appears in many documents, it is likely less important
    to any individual document. For example, if every document in some text data contains
    the word *after* then it is probably an unimportant word. We call this *document
    frequency* (*df*).


    By combining these two statistics, we can assign a score to every word representing
    how important that word is in a document. Specifically, we multiply *tf* to the
    inverse of document frequency (*idf*):


    $tf\text{-}idf(t, d) = tf(t, d) \times idf(t)$


    where $t$ is a word (term) and $d$ is a document. There are a number of variations
    in how $tf$ and $idf$ are calculated. In scikit-learn, $tf$ is simply the number
    of times a word appears in the document, and $idf$ is calculated as:


    $idf(t) = \log \frac{1 + n_d}{1 + df(d, t)} + 1$


    where $n_d$ is the number of documents, and $df(d, t)$ is term $t$''s document
    frequency (i.e., the number of documents where the term appears).


    By default, scikit-learn then normalizes the $tf\text{-}idf$ vectors using the
    Euclidean norm (L2 norm). The higher the resulting value, the more important the
    word is to a document.


    # See Also


    +   - scikit-learn documentation: *tf-idf* term weighting'
  - "[PAGE 133]\n\n# 6.11 Using Text Vectors to Calculate Text Similarity in a Search\
    \ Query\n\n# Problem\n\nYou want to use *tf-idf* vectors to implement a text search\
    \ function in Python.\n\n# Solution\n\nCalculate the cosine similarity between\
    \ *tf-idf* vectors using scikit-learn:\n\n```\n# Load libraries\nimport numpy\
    \ as np\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.metrics.pairwise\
    \ import linear_kernel\n\n# Create searchable text data\ntext_data = np.array(['I\
    \ love Brazil. Brazil!',\n                      'Sweden is best',\n          \
    \            'Germany beats both'])\n\n# Create the tf-idf feature matrix\ntfidf\
    \ = TfidfVectorizer()\nfeature_matrix = tfidf.fit_transform(text_data)\n\n# Create\
    \ a search query and transform it into a tf-idf vector\ntext = \"Brazil is the\
    \ best\"\nvector = tfidf.transform([text])\n\n# Calculate the cosine similarities\
    \ between the input vector and all other vectors\ncosine_similarities = linear_kernel(vector,\
    \ feature_matrix).flatten()\n\n# Get the index of the most relevent items in order\n\
    related_doc_indicies = cosine_similarities.argsort()[:-10:-1]\n\n# Print the most\
    \ similar texts to the search query along with the cosine similarity\nprint([(text_data[i],\
    \ cosine_similarities[i]) for i in related_doc_indicies])\n```\n\n```\n[\n  (\n\
    \    'Sweden is best', 0.6666666666666666),\n    ('I love Brazil. Brazil!', 0.5163977794943222),\n\
    \    ('Germany beats both', 0.0\n    )\n]\n```"

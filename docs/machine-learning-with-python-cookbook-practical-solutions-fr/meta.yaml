    ```\n\n# Discussion\n\nVery often we will need to preprocess our data before using\
    \ it to train a model. We have to be careful to properly handle preprocessing\
    \ when conducting model selection. First, GridSearchCV uses cross-validation to\
    \ determine which model has the highest performance. However, in cross-validation,\
    \ we are in effect pretending that the fold held out as the test set is not seen,\
    \ and thus not part of fitting any preprocessing steps (e.g., scaling or standardization).\
    \ For this reason, we cannot preprocess the data and then run GridSearchCV. Rather,\
    \ the preprocessing steps must be a part of the set of actions taken by GridSearchCV.\n\
    \nThis might appear complex, but scikit-learn makes it simple. FeatureUnion allows\
    \ us to combine multiple preprocessing actions properly. In our solution, we use\
    \ FeatureUnion to combine two preprocessing steps: standardize the feature values\
    \ (StandardScaler) and principal component analysis (PCA). This object is called\
    \ preprocess and contains both of our preprocessing steps. We then include preprocess\
    \ in a pipeline with our learning algorithm. The result is that this allows us\
    \ to outsource the proper (and confusing) handling of fitting, transforming, and\
    \ training the models with combinations of hyperparameters to scikit-learn.\n\n\
    Second, some preprocessing methods have their own parameters, which often have\
    \ to be supplied by the user. For example, dimensionality reduction using PCA\
    \ requires the user to define the number of principal components to use to produce\
    \ the transformed feature set. Ideally, we would choose the number of components\
    \ that produces a model with the greatest performance for some evaluation test\
    \ metric."

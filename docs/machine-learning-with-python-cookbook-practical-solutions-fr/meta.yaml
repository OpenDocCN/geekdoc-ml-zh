  - "[PAGE 253]\n\n# Solution\n\nUse a learning algorithm that includes a *shrinkage\
    \ penalty* (also called *regularization*) like ridge regression and lasso regression:\n\
    \n```\n# Load libraries\nfrom sklearn.linear_model import Ridge\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.datasets import make_regression\n\n# Generate\
    \ features matrix, target vector\nfeatures, target = make_regression(n_samples\
    \ = 100,\n                                   n_features = 3,\n               \
    \                    n_informative = 2,\n                                   n_targets\
    \ = 1,\n                                   noise = 0.2,\n                    \
    \               coef = False,\n                                   random_state\
    \ = 1)\n\n# Standardize features\nscaler = StandardScaler()\nfeatures_standardized\
    \ = scaler.fit_transform(features)\n\n# Create ridge regression with an alpha\
    \ value\nregression = Ridge(alpha=0.5)\n\n# Fit the linear regression\nmodel =\
    \ regression.fit(features_standardized, target)\n```\n\n# Discussion\n\nIn standard\
    \ linear regression the model trains to minimize the sum of squared error between\
    \ the true ($y_i$) and prediction ($\\widehat{y}_i$) target values, or residual\
    \ sum of squares (RSS):\n\n$$RSS = \\sum_{i=1}^{n} (y_i - \\widehat{y}_i)^2$$\n\
    \nRegularized regression learners are similar, except they attempt to minimize\
    \ RSS *and* some penalty for the total size of the coefficient values, called\
    \ a *shrinkage penalty* because it attempts to “shrink” the model. There are two\
    \ common types of regularized learners for linear regression: ridge regression\
    \ and the lasso. The only formal difference is the type of shrinkage penalty used.\
    \ In *ridge regression*, the shrinkage penalty is a tuning hyperparameter multiplied\
    \ by the squared sum of all coefficients:\n\n$$RSS + \\alpha \\sum_{j=1}^{p} \\\
    widehat{\\beta}_j^2$$"
  - '[PAGE 254]


    where $\widehat{\beta}_j$ is the coefficient of the $j$th of $p$ features and
    $\alpha$ is a hyperparameter (discussed next). The *lasso* is similar, except
    the shrinkage penalty is a tuning hyperparameter multiplied by the sum of the
    absolute value of all coefficients:


    $$\frac{1}{2n}\text{RSS} + \alpha \sum_{j=1}^{p} |\widehat{\beta}_j|$$


    where $n$ is the number of observations. So which one should we use? As a very
    general rule of thumb, ridge regression often produces slightly better predictions
    than lasso, but lasso (for reasons we will discuss in Recipe 13.5) produces more
    interpretable models. If we want a balance between ridge and lasso''s penalty
    functions we can use *elastic net*, which is simply a regression model with both
    penalties included. Regardless of which one we use, both ridge and lasso regressions
    can penalize large or complex models by including coefficient values in the loss
    function we are trying to minimize.


    The hyperparameter, $\alpha$, lets us control how much we penalize the coefficients,
    with higher values of $\alpha$ creating simpler models. The ideal value of $\alpha$
    should be tuned like any other hyperparameter. In scikit-learn, $\alpha$ is set
    using the `alpha` parameter.


    scikit-learn includes a `RidgeCV` method that allows us to select the ideal value
    for $\alpha$:


    ```

    # Load library

    from sklearn.linear_model import RidgeCV


    # Create ridge regression with three alpha values

    regr_cv = RidgeCV(alphas=[0.1, 1.0, 10.0])


    # Fit the linear regression

    model_cv = regr_cv.fit(features_standardized, target)


    # View coefficients

    model_cv.coef_

    array([1.29223201e-02, 4.40972291e+01, 5.38979372e+01])

    ```


    We can then easily view the best model''s $\alpha$ value:


    ```

    # View alpha

    model_cv.alpha_

    0.1

    ```


    One final note: because in linear regression the value of the coefficients is
    partially determined by the scale of the feature, and in regularized models all
    coefficients are summed together, we must make sure to standardize the feature
    prior to training.'
- md: "## 13.5 Reducing Features with Lasso Regression\n\n## Problem\n\nYou want to\
    \ simplify your linear regression model by reducing the number of features.\n\n\
    ## Solution\n\nUse a lasso regression:\n\n```python\n# Load library\nfrom sklearn.linear_model\
    \ import Lasso\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.datasets\
    \ import make_regression\n\n# Generate features matrix, target vector\nfeatures,\
    \ target = make_regression(n_samples=100,\n                                  \
    \ n_features=3,\n                                   n_informative=2,\n       \
    \                            n_targets=1,\n                                  \
    \ noise=0.2,\n                                   coef=False,\n               \
    \                    random_state=1)\n\n# Standardize features\nscaler = StandardScaler()\n\
    features_standardized = scaler.fit_transform(features)\n\n# Create lasso regression\
    \ with alpha value\nregression = Lasso(alpha=0.5)\n\n# Fit the linear regression\n\
    model = regression.fit(features_standardized, target)\n```\n\n## Discussion\n\n\
    One interesting characteristic of lasso regression's penalty is that it can shrink\
    \ the coefficients of a model to zero, effectively reducing the number of features\
    \ in the model. For example, in our solution we set alpha to 0.5, and we can see\
    \ that many of the coefficients are 0, meaning their corresponding features are\
    \ not used in the model:\n\n```python\n# View coefficients\nmodel.coef_\n\narray([-0.\
    \        , 43.58618393, 53.39523724])\n```\n\nHowever, if we increase α to a much\
    \ higher value, we see that literally none of the features are being used:\n\n\
    ```python\n# Create lasso regression with a high alpha\nregression_a10 = Lasso(alpha=10)\n\
    model_a10 = regression_a10.fit(features_standardized, target)\nmodel_a10.coef_\n\
    \narray([-0.        , 32.92181899, 42.73086731])\n```\n\nThe practical benefit\
    \ of this effect is that it means we could include 100 features in our feature\
    \ matrix and then, through adjusting lasso’s α hyperparameter, produce a model\
    \ that uses only 10 (for instance) of the most important features. This lets us\
    \ reduce variance while improving the interpretability of our model (since fewer\
    \ features are easier to explain).\n\n## CHAPTER 14\n\n## Trees and Forests\n\n\
    ## 14.0 Introduction\n\nTree-based learning algorithms are a broad and popular\
    \ family of related non-parametric, supervised methods for both classification\
    \ and regression. The basis of tree-based learners is the *decision tree*, wherein\
    \ a series of decision rules (e.g., “If a person’s credit score is greater than\
    \ 720…”) are chained. The result looks vaguely like an upside-down tree, with\
    \ the first decision rule at the top and subsequent decision rules spreading out\
    \ below. In a decision tree, every decision rule occurs at a decision node, with\
    \ the rule creating branches leading to new nodes. A branch without a decision\
    \ rule at the end is called a *leaf*.\n\nOne reason for the popularity of tree-based\
    \ models is their interpretability. In fact, decision trees can literally be drawn\
    \ out in their complete form (see Recipe 14.3) to create a highly intuitive model.\
    \ From this basic tree system comes a wide variety of extensions from random forests\
    \ to stacking. In this chapter we will cover how to train, handle, adjust, visualize,\
    \ and evaluate a number of tree-based models.\n\n## 14.1 Training a Decision Tree\
    \ Classifier\n\n## Problem\n\nYou need to train a classifier using a decision\
    \ tree.\n\n## Solution\n\nUse scikit-learn’s `DecisionTreeClassifier`:\n\n```python\n\
    # Load libraries\nfrom sklearn.tree import DecisionTreeClassifier\nfrom sklearn\
    \ import datasets\n\n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\n\
    target = iris.target\n\n# Create decision tree classifier object\ndecisiontree\
    \ = DecisionTreeClassifier(random_state=0)\n\n# Train model\nmodel = decisiontree.fit(features,\
    \ target)\n```\n\n## Discussion\n\nDecision tree learners attempt to find a decision\
    \ rule that produces the greatest decrease in impurity at a node. While there\
    \ are a number of measurements of impurity, by default DecisionTreeClassifier\
    \ uses Gini impurity:\n\n$$G(t) = 1 - \\sum_{i=1}^{c} p_i^2$$\n\nwhere $G(t)$\
    \ is the Gini impurity at node $t$, and $p_i$ is the proportion of observations\
    \ of class $c$ at node $t$. This process of finding the decision rules that create\
    \ splits to decrease impurity is repeated recursively until all leaf nodes are\
    \ pure (i.e., contain only one class) or some arbitrary cutoff is reached.\n\n\
    In scikit-learn, DecisionTreeClassifier operates like other learning methods;\
    \ after the model is trained using fit, we can use the model to predict the class\
    \ of an observation:\n\n```python\n# Make new observation\nobservation = [[ 5,\
    \ 4, 3, 2]]\n\n# Predict observation's class\nmodel.predict(observation)\n\narray([1])\n\
    ```\n\nWe can also see the predicted class probabilities of the observation:\n\
    \n```python\n# View predicted class probabilities for the three classes\nmodel.predict_proba(observation)\n\
    \narray([[0., 1., 0.]])\n```\n\nFinally, if we want to use a different impurity\
    \ measurement we can use the criterion parameter:\n\n```python\n# Create decision\
    \ tree classifier object using entropy\ndecisiontree_entropy = DecisionTreeClassifier(\n\
    \    criterion='entropy', random_state=0)\n\n# Train model\nmodel_entropy = decisiontree_entropy.fit(features,\
    \ target)\n```\n\n## See Also\n\n- Decision Tree Learning, Princeton\n\n## 14.2\
    \ Training a Decision Tree Regressor\n\n## Problem\n\nYou need to train a regression\
    \ model using a decision tree.\n\n## Solution\n\nUse scikit-learn's DecisionTreeRegressor:\n\
    \n```python\n# Load libraries\nfrom sklearn.tree import DecisionTreeRegressor\n\
    from sklearn import datasets\n\n# Load data with only two features\ndiabetes =\
    \ datasets.load_diabetes()\nfeatures = diabetes.data\ntarget = diabetes.target\n\
    \n# Create decision tree regressor object\ndecisiontree = DecisionTreeRegressor(random_state=0)\n\
    \n# Train model\nmodel = decisiontree.fit(features, target)\n```\n\n## Discussion\n\
    \nDecision tree regression works similarly to decision tree classification; however,\
    \ instead of reducing Gini impurity or entropy, potential splits are by default\
    \ measured on how much they reduce mean squared error (MSE):\n\n$$MSE = \\frac{1}{n}\
    \ \\sum_{i=1}^{n} (y_i - \\bar{y}_i)^2$$\n\nwhere $y_i$ is the true value of the\
    \ target and $\\overline{y}_i$ is the mean value. In scikit-learn, decision tree\
    \ regression can be conducted using DecisionTreeRegressor. Once we have trained\
    \ a decision tree, we can use it to predict the target value for an observation:\n\
    \n```python\n# Make new observation\nobservation = [features[0]]\n\n# Predict\
    \ observation's value\nmodel.predict(observation)\n\narray([151.])\n```\n\nJust\
    \ like with DecisionTreeClassifier we can use the criterion parameter to select\
    \ the desired measurement of split quality. For example, we can construct a tree\
    \ whose splits reduce mean absolute error (MAE):\n\n```python\n# Create decision\
    \ tree classifier object using MAE\ndecisiontree_mae = DecisionTreeRegressor(criterion=\"\
    absolute_error\",\n    random_state=0)\n\n# Train model\nmodel_mae = decisiontree_mae.fit(features,\
    \ target)\n```\n\n## See Also\n\n- scikit-learn documentation: Decision Tree Regression\n\
    \n## 14.3 Visualizing a Decision Tree Model\n\n## Problem\n\nYou need to visualize\
    \ a model created by a decision tree learning algorithm.\n\n## Solution\n\nExport\
    \ the decision tree model into DOT format, then visualize:\n\n```python\n# Load\
    \ libraries\nimport pydotplus\nfrom sklearn.tree import DecisionTreeClassifier\n\
    from sklearn import datasets\nfrom IPython.display import Image\nfrom sklearn\
    \ import tree\n\n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\n\
    target = iris.target\n\n# Create decision tree classifier object\ndecisiontree\
    \ = DecisionTreeClassifier(random_state=0)\n\n# Train model\nmodel = decisiontree.fit(features,\
    \ target)\n\n# Create DOT data\ndot_data = tree.export_graphviz(decisiontree,\n\
    \                                out_file=None,\n                            \
    \    feature_names=iris.feature_names,\n                                class_names=iris.target_names)\n\
    \n# Draw graph\ngraph = pydotplus.graph_from_dot_data(dot_data)\n\n# Show graph\n\
    Image(graph.create_png())\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_262_0.png)\n\
    \n## Discussion\n\nOne of the advantages of decision tree classifiers is that\
    \ we can visualize the entire trained model, making decision trees one of the\
    \ most interpretable models in machine learning. In our solution, we exported\
    \ our trained model in DOT format (a graph description language) and then used\
    \ that to draw the graph.\n\nIf we look at the root node, we can see the decision\
    \ rule is that if petal widths are less than or equal to 0.8 cm, then go to the\
    \ left branch; if not, go to the right branch. We can also see the Gini impurity\
    \ index (0.667), the number of observations (150),"
  mdcn: "## 13.5 使用 Lasso 回归减少特征\n\n## 问题\n\n你想通过减少特征数量来简化线性回归模型。\n\n## 解决方案\n\n使用\
    \ Lasso 回归：\n\n```python\n# Load library\nfrom sklearn.linear_model import Lasso\n\
    from sklearn.preprocessing import StandardScaler\nfrom sklearn.datasets import\
    \ make_regression\n\n# Generate features matrix, target vector\nfeatures, target\
    \ = make_regression(n_samples=100,\n                                   n_features=3,\n\
    \                                   n_informative=2,\n                       \
    \            n_targets=1,\n                                   noise=0.2,\n   \
    \                                coef=False,\n                               \
    \    random_state=1)\n\n# Standardize features\nscaler = StandardScaler()\nfeatures_standardized\
    \ = scaler.fit_transform(features)\n\n# Create lasso regression with alpha value\n\
    regression = Lasso(alpha=0.5)\n\n# Fit the linear regression\nmodel = regression.fit(features_standardized,\
    \ target)\n```\n\n## 讨论\n\nLasso 回归惩罚项的一个有趣特性是，它可以将模型的系数收缩为零，从而有效地减少模型中的特征数量。例如，在我们的解决方案中，我们将\
    \ alpha 设置为 0.5，我们可以看到许多系数为 0，这意味着它们对应的特征未在模型中使用：\n\n```python\n# View coefficients\n\
    model.coef_\n\narray([-0.        , 43.58618393, 53.39523724])\n```\n\n然而，如果我们把\
    \ α 增加到一个高得多的值，我们会看到实际上没有特征被使用：\n\n```python\n# Create lasso regression with a\
    \ high alpha\nregression_a10 = Lasso(alpha=10)\nmodel_a10 = regression_a10.fit(features_standardized,\
    \ target)\nmodel_a10.coef_\n\narray([-0.        , 32.92181899, 42.73086731])\n\
    ```\n\n这种效应的实际好处在于，它意味着我们可以在特征矩阵中包含 100 个特征，然后通过调整 Lasso 的 α 超参数，生成一个仅使用（例如）10\
    \ 个最重要特征的模型。这让我们能够减少方差，同时提高模型的可解释性（因为更少的特征更容易解释）。\n\n## 第 14 章\n\n## 树与森林\n\n\
    ## 14.0 引言\n\n基于树的学习算法是一类广泛且流行的、相关的非参数、监督方法，可用于分类和回归。基于树的学习器的基础是*决策树*，其中一系列决策规则（例如，“如果一个人的信用评分大于\
    \ 720……”）被链接在一起。结果看起来有点像一棵倒置的树，第一个决策规则在顶部，后续的决策规则在下面展开。在决策树中，每个决策规则都出现在一个决策节点上，该规则创建通向新节点的分支。末端没有决策规则的分支称为*叶节点*。\n\
    \n基于树的模型流行的一个原因是其可解释性。事实上，决策树可以完全按其完整形式绘制出来（参见配方 14.3），从而创建一个高度直观的模型。从这个基本的树系统出发，衍生出了从随机森林到堆叠的各种扩展。在本章中，我们将介绍如何训练、处理、调整、可视化和评估多种基于树的模型。\n\
    \n## 14.1 训练决策树分类器\n\n## 问题\n\n你需要使用决策树训练一个分类器。\n\n## 解决方案\n\n使用 scikit-learn\
    \ 的 `DecisionTreeClassifier`：\n\n```python\n# Load libraries\nfrom sklearn.tree\
    \ import DecisionTreeClassifier\nfrom sklearn import datasets\n\n# Load data\n\
    iris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\n# Create\
    \ decision tree classifier object\ndecisiontree = DecisionTreeClassifier(random_state=0)\n\
    \n# Train model\nmodel = decisiontree.fit(features, target)\n```\n\n## 讨论\n\n\
    决策树学习器试图找到一个能在节点上产生最大不纯度降低的决策规则。虽然有多种不纯度的度量方法，但默认情况下 `DecisionTreeClassifier`\
    \ 使用基尼不纯度：\n\n$$G(t) = 1 - \\sum_{i=1}^{c} p_i^2$$\n\n其中 $G(t)$ 是节点 $t$ 的基尼不纯度，$p_i$\
    \ 是节点 $t$ 中类别 $c$ 的观测比例。这个寻找能创建分裂以降低不纯度的决策规则的过程会递归地重复，直到所有叶节点都是纯净的（即只包含一个类别）或达到某个任意的截止点。\n\
    \n在 scikit-learn 中，`DecisionTreeClassifier` 的操作方式与其他学习方法类似；在使用 `fit` 训练模型后，我们可以使用该模型来预测观测的类别：\n\
    \n```python\n# Make new observation\nobservation = [[ 5, 4, 3, 2]]\n\n# Predict\
    \ observation's class\nmodel.predict(observation)\n\narray([1])\n```\n\n我们还可以查看观测的预测类别概率：\n\
    \n```python\n# View predicted class probabilities for the three classes\nmodel.predict_proba(observation)\n\
    \narray([[0., 1., 0.]])\n```\n\n最后，如果我们想使用不同的不纯度度量，可以使用 `criterion` 参数：\n\n```python\n\
    # Create decision tree classifier object using entropy\ndecisiontree_entropy =\
    \ DecisionTreeClassifier(\n    criterion='entropy', random_state=0)\n\n# Train\
    \ model\nmodel_entropy = decisiontree_entropy.fit(features, target)\n```\n\n##\
    \ 另请参阅\n\n- 决策树学习，普林斯顿大学\n\n## 14.2 训练决策树回归器\n\n## 问题\n\n你需要使用决策树训练一个回归模型。\n\n\
    ## 解决方案\n\n使用 scikit-learn 的 `DecisionTreeRegressor`：\n\n```python\n# Load libraries\n\
    from sklearn.tree import DecisionTreeRegressor\nfrom sklearn import datasets\n\
    \n# Load data with only two features\ndiabetes = datasets.load_diabetes()\nfeatures\
    \ = diabetes.data\ntarget = diabetes.target\n\n# Create decision tree regressor\
    \ object\ndecisiontree = DecisionTreeRegressor(random_state=0)\n\n# Train model\n\
    model = decisiontree.fit(features, target)\n```\n\n## 讨论\n\n决策树回归的工作方式与决策树分类类似；然而，它不是降低基尼不纯度或熵，而是默认根据潜在分裂能降低多少均方误差（MSE）来衡量：\n\
    \n$$MSE = \\frac{1}{n} \\sum_{i=1}^{n} (y_i - \\bar{y}_i)^2$$\n\n其中 $y_i$ 是目标的真实值，$\\\
    overline{y}_i$ 是均值。在 scikit-learn 中，可以使用 `DecisionTreeRegressor` 进行决策树回归。一旦我们训练了一个决策树，就可以用它来预测观测的目标值：\n\
    \n```python\n# Make new observation\nobservation = [features[0]]\n\n# Predict\
    \ observation's value\nmodel.predict(observation)\n\narray([151.])\n```\n\n就像\
    \ `DecisionTreeClassifier` 一样，我们可以使用 `criterion` 参数来选择所需的分裂质量度量。例如，我们可以构建一棵以降低平均绝对误差（MAE）为分裂标准的树：\n\
    \n```python\n# Create decision tree classifier object using MAE\ndecisiontree_mae\
    \ = DecisionTreeRegressor(criterion=\"absolute_error\",\n    random_state=0)\n\
    \n# Train model\nmodel_mae = decisiontree_mae.fit(features, target)\n```\n\n##\
    \ 另请参阅\n\n- scikit-learn 文档：决策树回归\n\n## 14.3 可视化决策树模型\n\n## 问题\n\n你需要可视化由决策树学习算法创建的模型。\n\
    \n## 解决方案\n\n将决策树模型导出为 DOT 格式，然后进行可视化：\n\n```python\n# Load libraries\nimport\
    \ pydotplus\nfrom sklearn.tree import DecisionTreeClassifier\nfrom sklearn import\
    \ datasets\nfrom IPython.display import Image\nfrom sklearn import tree\n\n# Load\
    \ data\niris = datasets.load_iris()\nfeatures = iris.data\ntarget = iris.target\n\
    \n# Create decision tree classifier object\ndecisiontree = DecisionTreeClassifier(random_state=0)\n\
    \n# Train model\nmodel = decisiontree.fit(features, target)\n\n# Create DOT data\n\
    dot_data = tree.export_graphviz(decisiontree,\n                              \
    \  out_file=None,\n                                feature_names=iris.feature_names,\n\
    \                                class_names=iris.target_names)\n\n# Draw graph\n\
    graph = pydotplus.graph_from_dot_data(dot_data)\n\n# Show graph\nImage(graph.create_png())\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_262_0.png)\n\n## 讨论\n\n决策树分类器的优点之一是我们可以可视化整个训练好的模型，这使得决策树成为机器学习中最具可解释性的模型之一。在我们的解决方案中，我们将训练好的模型导出为\
    \ DOT 格式（一种图形描述语言），然后用它来绘制图形。\n\n如果我们看根节点，可以看到决策规则是：如果花瓣宽度小于或等于 0.8 厘米，则进入左分支；否则，进入右分支。我们还可以看到基尼不纯度指数（0.667）、观测数量（150），"

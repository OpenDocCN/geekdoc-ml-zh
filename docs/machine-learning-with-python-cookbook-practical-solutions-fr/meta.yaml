    # 9.1 Reducing Features Using Principal Components


    # Problem


    Given a set of features, you want to reduce the number of features while retaining
    the variance (important information) in the data.


    # Solution


    Use principal component analysis with scikit''s PCA:


    ```

    # Load libraries

    from sklearn.preprocessing import StandardScaler

    from sklearn.decomposition import PCA

    from sklearn import datasets


    # Load the data

    digits = datasets.load_digits()


    # Standardize the feature matrix

    features = StandardScaler().fit_transform(digits.data)


    # Create a PCA that will retain 99% of variance

    pca = PCA(n_components=0.99, whiten=True)


    # Conduct PCA

    features_pca = pca.fit_transform(features)


    # Show results

    print("Original number of features:", features.shape[1])

    print("Reduced number of features:", features_pca.shape[1])


    Original number of features: 64

    Reduced number of features: 54

    ```


    # Discussion


    Principal component analysis (PCA) is a popular linear dimensionality reduction
    technique. PCA projects observations onto the (hopefully fewer) principal components
    of the feature matrix that retain the most variance in the data, which, practically,
    means we retain information. PCA is an unsupervised technique, meaning that it
    does not use the information from the target vector and instead only considers
    the feature matrix.


    For a mathematical description of how PCA works, see the external resources listed
    at the end of this recipe. However, we can understand the intuition behind PCA
    using a'

    \ - INFO:\n    Tracing not active\n```\n\n# Discussion\n\nWhile there are many\
    \ different ways we can serve a PyTorch model, here we choose the Seldon Core\
    \ Python wrapper. Seldon Core is a popular framework for serving models in production\
    \ and has a number of useful features that make it easier to use and more scalable\
    \ than a Flask application. It allows us to write a simple class (above we use\
    \ MyModel), while the Python library takes care of all the server components and\
    \ endpoints. We can then run the service using the seldon-core-microservice command,\
    \ which starts a REST server, gRPC server, and even exposes a metrics endpoint.\
    \ To make a prediction to the service, we can call the service with the following\
    \ endpoint on port 9000:\n\n```\ncurl -X POST http://127.0.0.1:9000/predict  -H\
    \ 'Content-Type: application/json'\n    -d '{\"data\": {\"ndarray\":[[0, 0, 0,\

    However, there are two things to keep in mind regarding feature importance. First,
    scikit-learn requires that we break up nominal categorical features into multiple
    binary features. This has the effect of spreading the importance of that feature
    across all of the binary features and can make each feature appear to be unimportant
    even when the original nominal categorical feature is highly important. Second,
    if two features are highly correlated, one feature will claim much of the importance,
    making the other feature appear to be far less important, which has implications
    for interpretation if not considered.


    In scikit-learn, classification and regression decision trees and random forests
    can report the relative importance of each feature using the `feature_importances_`
    method:


    ```

    # View feature importances


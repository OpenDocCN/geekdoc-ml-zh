    \ As the neural network learns on the training data, the model's error on both\
    \ the training and test set will tend to decrease. However, at a certain point,\
    \ a neural network can start “memorizing” the training data and overfit. When\
    \ this starts happening, the training error may decrease while the test error\
    \ starts increasing. Therefore, in many cases, there is a “sweet spot” where the\
    \ test error (which is the error we mainly care about) is at its lowest point.\
    \ This effect can be seen in the solution, where we visualize the training and\
    \ test loss at each epoch. Note that the test error is lowest around epoch 6,\

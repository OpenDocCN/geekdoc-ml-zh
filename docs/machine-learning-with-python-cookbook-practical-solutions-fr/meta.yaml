    have a value for employee_id that appears in dataframe_employees).


    Right

    Return all rows from the right DataFrame but only rows from the left DataFrame
    that match with the right DataFrame. Fill NaN values for the missing values (e.g.,
    return all rows from dataframe_sales but only rows from dataframe_employees that
    have a value for employee_id that appears in dataframe_sales).



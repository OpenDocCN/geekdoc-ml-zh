    Epoch: 2 Loss: 0.17331615090370178\nEpoch: 3 Loss: 0.1384529024362564\nTest Loss:\
    \ 0.12702330946922302 Test Accuracy: 0.9100000262260437\n\n### 讨论\n\n*Dropout*\
    \ 是一种用于正则化较小神经网络的相当常见的方法。在 Dropout 中，每次为训练创建一批观测值时，一个或多个层中的一部分单元会被乘以零（即被丢弃）。在这种设置下，每个批次都在相同的网络（例如，相同的参数）上进行训练，但每个批次面对的是该网络*架构*的一个略有不同的版本。\n\
    \nDropout 被认为是有效的，因为在每个批次中持续随机丢弃单元，迫使单元学习能够在各种网络架构下执行的参数值。也就是说，它们学会了对其他隐藏单元的干扰（即噪声）具有鲁棒性，这防止了网络仅仅记忆训练数据。\n\
    \n可以向隐藏层和输入层都添加 Dropout。当输入层被丢弃时，其特征值不会在该批次中引入网络。\n\n在 PyTorch 中，我们可以通过在网络架构中添加一个\
    \ `nn.Dropout` 层来实现 Dropout。每个 `nn.Dropout` 层将在每个批次中丢弃前一层中用户定义的超参数比例的单元。\n\n##\
    \ 21.12 保存模型训练进度\n\n### 问题\n\n给定一个需要长时间训练的神经网络，你希望保存进度，以防训练过程被中断。\n\n### 解决方案\n\
    \n使用 `torch.save` 函数在每个 epoch 后保存模型：\n\n```python\n# Load libraries\nimport torch\n\
    import torch.nn as nn\nimport numpy as np\nfrom torch.utils.data import DataLoader,\
    \ TensorDataset\nfrom torch.optim import RMSprop\nfrom sklearn.datasets import\

  md: 'The pandas sep parameter allows us to define the delimiter used in the file.
    Although it is not always the case, a common formatting issue with CSV files is
    that the first line of the file is used to define column headers (e.g., integer,
    datetime, category in our solution). The header parameter allows us to specify
    if or where a header row exists. If a header row does not exist, we set header=None.


    The read_csv function returns a pandas DataFrame: a common and useful object for
    working with tabular data that we''ll cover in more depth throughout this book.


    # 2.4 Loading an Excel File


    # Problem


    You need to import an Excel spreadsheet.


    # Solution


    Use the pandas library''s read_excel to load an Excel spreadsheet:


    ```

    # Load library

    import pandas as pd


    # Create URL

    url = ''https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.xlsx''


    # Load data

    dataframe = pd.read_excel(url, sheet_name=0, header=0)


    # View the first two rows


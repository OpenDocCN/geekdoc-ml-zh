    # Discussion


    Resizing images is a common task in image preprocessing for two reasons. First,
    images come in all shapes and sizes, and to be usable as features, images must
    have the same dimensions. Standardizing (resizing) images does come at the cost
    of losing some information present in the larger image, as can be seen in the
    picture of the airplane. Images are matrices of information, and when we reduce
    the size of the image, we are reducing the size of that matrix and the information
    it contains. Second, machine learning can require thousands or hundreds of thousands
    of images. When those images are very large they can take up a lot of memory,
    and by resizing them we can dramatically reduce memory usage. Some common image
    sizes for machine learning are 32 × 32, 64 × 64, 96 × 96, and 256 × 256. In essence,
    the method we choose for image resizing will often be a tradeoff between the statistical
    performance of our model and computational cost to train it. The [Pillow library
    offers many options for resizing images](https://pillow.readthedocs.io/) for this
    reason.


    # 8.4 Cropping Images


    # Problem


    You want to remove the outer portion of the image to change its dimensions.'
  - '[PAGE 153]


    # Solution


    The image is encoded as a two-dimensional NumPy array, so we can crop the image
    easily by slicing the array:


    ```

    # Load libraries

    import cv2

    import numpy as np

    from matplotlib import pyplot as plt


    # Load image in grayscale

    image = cv2.imread("images/plane_256x256.jpg", cv2.IMREAD_GRAYSCALE)


    # Select first half of the columns and all rows

    image_cropped = image[:,:128]


    # Show image

    plt.imshow(image_cropped, cmap="gray"), plt.axis("off")

    plt.show()

    ```


    ![](img/553f6c9c8b23451624604a848ee8a83c_153_0.png)


    # Discussion


    Since OpenCV represents images as a matrix of elements, by selecting the rows
    and columns we want to keep we can easily crop the image. Cropping can be particularly
    useful if we know that we want to keep only a certain part of every image. For
    example, if our images come from a stationary security camera we can crop all
    the images so they contain only the area of interest.


    # See Also


    +   - [Slicing NumPy Arrays](Slicing NumPy Arrays)


    # 8.5 Blurring Images


    # Problem


    You want to smooth out an image.'
  - '[PAGE 154]


    # Solution


    To blur an image, each pixel is transformed to be the average value of its neighbors.
    This neighbor and the operation performed are mathematically represented as a
    kernel (don''t worry if you don''t know what a kernel is). The size of this kernel
    determines the amount of blurring, with larger kernels producing smoother images.
    Here we blur an image by averaging the values of a 5 × 5 kernel around each pixel:


    ```

    # Load libraries

    import cv2

    import numpy as np

    from matplotlib import pyplot as plt


    # Load image as grayscale

    image = cv2.imread("images/plane_256x256.jpg", cv2.IMREAD_GRAYSCALE)


    # Blur image

    image_blurry = cv2.blur(image, (5,5))


    # Show image

    plt.imshow(image_blurry, cmap="gray"), plt.axis("off")

    plt.show()

    ```


    ![](img/553f6c9c8b23451624604a848ee8a83c_154_0.png)


    To highlight the effect of kernel size, here is the same blurring with a 100 ×
    100 kernel:


    ```

    # Blur image

    image_very_blurry = cv2.blur(image, (100,100))


    # Show image

    plt.imshow(image_very_blurry, cmap="gray"), plt.xticks([]), plt.yticks([])

    plt.show()

    ```'
  - "[PAGE 155]\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_0.png)\n\n# Discussion\n\
    \nKernels are widely used in image processing to do everything from sharpening\
    \ to edge detection and will come up repeatedly in this chapter. The blurring\
    \ kernel we used looks like this:\n\n```\n# Create kernel\nkernel = np.ones((5,5))\
    \ / 25.0\n\n# Show kernel\nkernel\n\narray([[ 0.04,  0.04,  0.04,  0.04,  0.04],\n\
    \       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,\
    \  0.04],\n       [ 0.04,  0.04,  0.04,  0.04,  0.04],\n       [ 0.04,  0.04,\
    \  0.04,  0.04,  0.04]])\n```\n\nThe center element in the kernel is the pixel\
    \ being examined, while the remaining elements are its neighbors. Since all elements\
    \ have the same value (normalized to add up to 1), each has an equal say in the\
    \ resulting value of the pixel of interest. We can manually apply a kernel to\
    \ an image using filter2D to produce a similar blurring effect:\n\n```\n# Apply\
    \ kernel\nimage_kernel = cv2.filter2D(image, -1, kernel)\n\n# Show image\nplt.imshow(image_kernel,\
    \ cmap=\"gray\"), plt.xticks([]), plt.yticks([])\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_155_1.png)"
- md: "## See Also\n\n- Image Kernels Explained Visually\n- Kernel (image processing),\
    \ Wikipedia\n\n## 8.6 Sharpening Images\n\n### Problem\n\nYou want to sharpen\
    \ an image.\n\n### Solution\n\nCreate a kernel that highlights the target pixel.\
    \ Then apply it to the image using filter2D:\n\n```python\n# Load libraries\n\
    import cv2\nimport numpy as np\nfrom matplotlib import pyplot as plt\n\n# Load\
    \ image as grayscale\nimage = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\
    \n# Create kernel\nkernel = np.array([[0, -1, 0],\n                   [-1, 5,-1],\n\
    \                   [0, -1, 0]])\n\n# Sharpen image\nimage_sharp = cv2.filter2D(image,\
    \ -1, kernel)\n\n# Show image\nplt.imshow(image_sharp, cmap=\"gray\"), plt.axis(\"\
    off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_156_0.png)\n\
    \n### Discussion\n\nSharpening works similarly to blurring, except instead of\
    \ using a kernel to average the neighboring values, we constructed a kernel to\
    \ highlight the pixel itself. The resulting effect makes contrasts in edges stand\
    \ out more.\n\n## 8.7 Enhancing Contrast\n\n### Problem\n\nWe want to increase\
    \ the contrast between pixels in an image.\n\n### Solution\n\nHistogram equalization\
    \ is a tool for image processing that can make objects and shapes stand out. When\
    \ we have a grayscale image, we can apply OpenCV's equalizeHist directly on the\
    \ image:\n\n```python\n# Load libraries\nimport cv2\nimport numpy as np\nfrom\
    \ matplotlib import pyplot as plt\n\n# Load image\nimage = cv2.imread(\"images/plane_256x256.jpg\"\
    , cv2.IMREAD_GRAYSCALE)\n\n# Enhance image\nimage_enhanced = cv2.equalizeHist(image)\n\
    \n# Show image\nplt.imshow(image_enhanced, cmap=\"gray\"), plt.axis(\"off\")\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_157_0.png)\n\nHowever,\
    \ when we have a color image, we first need to convert the image to the YUV color\
    \ format. The Y is the luma, or brightness, and U and V denote the color. After\
    \ the conversion, we can apply equalizeHist to the image and then convert it back\
    \ to BGR or RGB (apologies to hardcopy readers for whom there are no color images):\n\
    \n```python\n# Load image\nimage_bgr = cv2.imread(\"images/plane.jpg\")\n\n# Convert\
    \ to YUV\nimage_yuv = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2YUV)\n\n# Apply histogram\
    \ equalization\nimage_yuv[:, :, 0] = cv2.equalizeHist(image_yuv[:, :, 0])\n\n\
    # Convert to RGB\nimage_rgb = cv2.cvtColor(image_yuv, cv2.COLOR_YUV2RGB)\n\n#\
    \ Show image\nplt.imshow(image_rgb), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_158_0.png)\n\
    \n### Discussion\n\nWhile a detailed explanation of how histogram equalization\
    \ works is beyond the scope of this book, the short explanation is that it transforms\
    \ the image so that it uses a wider range of pixel intensities.\n\nWhile the resulting\
    \ image often does not look “realistic,” we need to remember that the image is\
    \ just a visual representation of the underlying data. If histogram equalization\
    \ is able to make objects of interest more distinguishable from other objects\
    \ or backgrounds (which is not always the case), then it can be a valuable addition\
    \ to our image preprocessing pipeline.\n\n## 8.8 Isolating Colors\n\n### Problem\n\
    \nYou want to isolate a color in an image.\n\n### Solution\n\nDefine a range of\
    \ colors and then apply a mask to the image (apologies to hardcopy readers for\
    \ whom there are no color images):\n\n```python\n# Load libraries\nimport cv2\n\
    import numpy as np\nfrom matplotlib import pyplot as plt\n\n# Load image\nimage_bgr\
    \ = cv2.imread('images/plane_256x256.jpg')\n\n# Convert BGR to HSV\nimage_hsv\
    \ = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2HSV)\n\n# Define range of blue values\
    \ in HSV\nlower_blue = np.array([50,100,50])\nupper_blue = np.array([130,255,255])\n\
    \n# Create mask\nmask = cv2.inRange(image_hsv, lower_blue, upper_blue)\n\n# Mask\
    \ image\nimage_bgr_masked = cv2.bitwise_and(image_bgr, image_bgr, mask=mask)\n\
    \n# Convert BGR to RGB\nimage_rgb = cv2.cvtColor(image_bgr_masked, cv2.COLOR_BGR2RGB)\n\
    \n# Show image\nplt.imshow(image_rgb), plt.axis(\"off\")\nplt.show()\n```\n\n\
    ![](img/553f6c9c8b23451624604a848ee8a83c_159_0.png)\n\n### Discussion\n\nIsolating\
    \ colors in OpenCV is straightforward. First we convert an image into HSV (hue,\
    \ saturation, and value). Second, we define a range of values we want to isolate,\
    \ which is probably the most difficult and time-consuming part. Third, we create\
    \ a mask for the image. Image masking is a common technique meant to extract regions\
    \ of interest. In this case, our mask keeps only the white areas:\n\n```python\n\
    # Show image\nplt.imshow(mask, cmap='gray'), plt.axis(\"off\")\nplt.show()\n```\n\
    \n![](img/553f6c9c8b23451624604a848ee8a83c_160_0.png)\n\nFinally, we apply the\
    \ mask to the image using `bitwise_and` and convert to our desired output format.\n\
    \n## 8.9 Binarizing Images\n\n### Problem\n\nGiven an image, you want to output\
    \ a simplified version.\n\n### Solution\n\n*Thresholding* is the process of setting\
    \ pixels with intensity greater than some value to be white and less than the\
    \ value to be black. A more advanced technique is *adaptive thresholding*, where\
    \ the threshold value for a pixel is determined by the pixel intensities of its\
    \ neighbors. This can be helpful when lighting conditions change over different\
    \ regions in an image:\n\n```python\n# Load libraries\nimport cv2\nimport numpy\
    \ as np\nfrom matplotlib import pyplot as plt\n\n# Load image as grayscale\nimage_grey\
    \ = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\n# Apply\
    \ adaptive thresholding\nmax_output_value = 255\nneighborhood_size = 99\nsubtract_from_mean\
    \ = 10\nimage_binarized = cv2.adaptiveThreshold(image_grey,\n                \
    \                        max_output_value,\n                                 \
    \       cv2.ADAPTIVE_THRESH_GAUSSIAN_C,\n                                    \
    \    cv2.THRESH_BINARY,\n                                        neighborhood_size,\n\
    \                                        subtract_from_mean)\n```\n\n```python\n\
    # Show image\nplt.imshow(image_binarized, cmap=\"gray\"), plt.axis(\"off\")\n\
    plt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_161_0.png)\n\n###\
    \ Discussion\n\nThe process of binarizing an image involves converting a greyscale\
    \ image to its black and white form. Our solution has four important arguments\
    \ in adaptiveThreshold. max_output_value simply determines the maximum intensity\
    \ of the output pixel intensities. cv2.ADAPTIVE_THRESH_GAUSSIAN_C sets a pixel's\
    \ threshold to be a weighted sum of the neighboring pixel intensities. The weights\
    \ are determined by a Gaussian window. Alternatively, we could set the threshold\
    \ to simply the mean of the neighboring pixels with cv2.ADAPTIVE_THRESH_MEAN_C:\n\
    \n```python\n# Apply cv2.ADAPTIVE_THRESH_MEAN_C\nimage_mean_threshold = cv2.adaptiveThreshold(image_grey,\n\
    \                                            max_output_value,\n             \
    \                               cv2.ADAPTIVE_THRESH_MEAN_C,\n                \
    \                            cv2.THRESH_BINARY,\n                            \
    \                neighborhood_size,\n                                        \
    \    subtract_from_mean)\n```\n\n```python\n# Show image\nplt.imshow(image_mean_threshold,\
    \ cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_161_1.png)\n\
    \nThe last two parameters are the block size (the size of the neighborhood used\
    \ to determine a pixel's threshold) and a constant subtracted from the calculated\
    \ threshold (used to manually fine-tune the threshold).\n\nA major benefit of\
    \ thresholding is *denoising* an image—keeping only the most important elements.\
    \ For example, thresholding is often applied to photos of printed text to isolate\
    \ the letters from the page.\n\n## 8.10 Removing Backgrounds\n\n### Problem\n\n\
    You want to isolate the foreground of an image.\n\n### Solution\n\nMark a rectangle\
    \ around the desired foreground, then run the GrabCut algorithm:\n\n```python\n\
    # Load library\nimport cv2\nimport numpy as np\nfrom matplotlib import pyplot\
    \ as plt\n\n# Load image and convert to RGB\nimage_bgr = cv2.imread('images/plane_256x256.jpg')\n\
    image_rgb = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2RGB)\n\n# Rectangle values:\
    \ start x, start y, width, height\nrectangle = (0, 56, 256, 150)\n\n# Create initial\
    \ mask\nmask = np.zeros(image_rgb.shape[:2], np.uint8)\n\n# Create temporary arrays\
    \ used by grabCut\nbgdModel = np.zeros((1, 65), np.float64)\nfgdModel = np.zeros((1,\
    \ 65), np.float64)\n\n# Run grabCut\ncv2.grabCut(image_rgb, # Our image\n    \
    \        mask, # The Mask\n            rectangle, # Our rectangle\n          \
    \  bgdModel, # Temporary array for background\n            fgdModel, # Temporary\
    \ array for background\n            5, # Number of iterations\n            cv2.GC_INIT_WITH_RECT)\
    \ # Initiative using our rectangle\n\n# Create mask where sure and likely backgrounds\
    \ set to 0, otherwise 1\nmask_2 = np.where((mask==2) | (mask==0), 0, 1).astype('uint8')\n\
    \n# Multiply image with new mask to subtract background\n```"
  mdcn: "## 另请参阅\n\n- 图像卷积核的可视化解释\n- 卷积核（图像处理），维基百科\n\n## 8.6 图像锐化\n\n### 问题\n\n你想锐化一张图像。\n\
    \n### 解决方案\n\n创建一个突出目标像素的卷积核。然后使用 `filter2D` 将其应用于图像：\n\n```python\n# 加载库\nimport\
    \ cv2\nimport numpy as np\nfrom matplotlib import pyplot as plt\n\n# 以灰度模式加载图像\n\
    image = cv2.imread(\"images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\n# 创建卷积核\n\
    kernel = np.array([[0, -1, 0],\n                   [-1, 5,-1],\n             \
    \      [0, -1, 0]])\n\n# 锐化图像\nimage_sharp = cv2.filter2D(image, -1, kernel)\n\
    \n# 显示图像\nplt.imshow(image_sharp, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_156_0.png)\n\n### 讨论\n\n锐化的工作原理与模糊类似，不同之处在于，我们不是使用卷积核来平均邻近像素的值，而是构建一个卷积核来突出像素本身。产生的效果使得边缘的对比度更加明显。\n\
    \n## 8.7 增强对比度\n\n### 问题\n\n我们想增加图像中像素之间的对比度。\n\n### 解决方案\n\n直方图均衡化是一种图像处理工具，可以使物体和形状更加突出。当我们有一张灰度图像时，我们可以直接对图像应用\
    \ OpenCV 的 `equalizeHist`：\n\n```python\n# 加载库\nimport cv2\nimport numpy as np\n\
    from matplotlib import pyplot as plt\n\n# 加载图像\nimage = cv2.imread(\"images/plane_256x256.jpg\"\
    , cv2.IMREAD_GRAYSCALE)\n\n# 增强图像\nimage_enhanced = cv2.equalizeHist(image)\n\n\
    # 显示图像\nplt.imshow(image_enhanced, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_157_0.png)\n\n然而，当我们有一张彩色图像时，我们首先需要将图像转换为\
    \ YUV 颜色格式。Y 是亮度（luma），U 和 V 表示颜色。转换后，我们可以对图像应用 `equalizeHist`，然后将其转换回 BGR 或 RGB（对于纸质版读者，此处没有彩色图像，深表歉意）：\n\
    \n```python\n# 加载图像\nimage_bgr = cv2.imread(\"images/plane.jpg\")\n\n# 转换为 YUV\n\
    image_yuv = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2YUV)\n\n# 应用直方图均衡化\nimage_yuv[:,\
    \ :, 0] = cv2.equalizeHist(image_yuv[:, :, 0])\n\n# 转换为 RGB\nimage_rgb = cv2.cvtColor(image_yuv,\
    \ cv2.COLOR_YUV2RGB)\n\n# 显示图像\nplt.imshow(image_rgb), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_158_0.png)\n\n### 讨论\n\n虽然直方图均衡化工作原理的详细解释超出了本书的范围，但简要的解释是，它通过变换图像，使其使用更宽的像素强度范围。\n\
    \n虽然处理后的图像通常看起来并不“真实”，但我们需要记住，图像只是底层数据的视觉表示。如果直方图均衡化能够使感兴趣的物体与其他物体或背景更容易区分（这并非总是如此），那么它可以成为我们图像预处理流程中一个有价值的补充。\n\
    \n## 8.8 颜色隔离\n\n### 问题\n\n你想隔离图像中的某种颜色。\n\n### 解决方案\n\n定义一个颜色范围，然后对图像应用掩码（对于纸质版读者，此处没有彩色图像，深表歉意）：\n\
    \n```python\n# 加载库\nimport cv2\nimport numpy as np\nfrom matplotlib import pyplot\
    \ as plt\n\n# 加载图像\nimage_bgr = cv2.imread('images/plane_256x256.jpg')\n\n# 将\
    \ BGR 转换为 HSV\nimage_hsv = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2HSV)\n\n# 定义\
    \ HSV 中蓝色值的范围\nlower_blue = np.array([50,100,50])\nupper_blue = np.array([130,255,255])\n\
    \n# 创建掩码\nmask = cv2.inRange(image_hsv, lower_blue, upper_blue)\n\n# 应用掩码\nimage_bgr_masked\
    \ = cv2.bitwise_and(image_bgr, image_bgr, mask=mask)\n\n# 将 BGR 转换为 RGB\nimage_rgb\
    \ = cv2.cvtColor(image_bgr_masked, cv2.COLOR_BGR2RGB)\n\n# 显示图像\nplt.imshow(image_rgb),\
    \ plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_159_0.png)\n\
    \n### 讨论\n\n在 OpenCV 中隔离颜色很简单。首先，我们将图像转换为 HSV（色调、饱和度和明度）。其次，我们定义要隔离的值范围，这可能是最困难和最耗时的部分。第三，我们为图像创建一个掩码。图像掩码是一种常用的技术，旨在提取感兴趣的区域。在本例中，我们的掩码只保留白色区域：\n\
    \n```python\n# 显示图像\nplt.imshow(mask, cmap='gray'), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_160_0.png)\n\n最后，我们使用 `bitwise_and`\
    \ 将掩码应用于图像，并转换为我们想要的输出格式。\n\n## 8.9 图像二值化\n\n### 问题\n\n给定一张图像，你想输出一个简化版本。\n\n\
    ### 解决方案\n\n*阈值处理*是将强度大于某个值的像素设置为白色，小于该值的像素设置为黑色的过程。一种更高级的技术是*自适应阈值处理*，其中像素的阈值由其邻近像素的强度决定。当图像不同区域的光照条件发生变化时，这会很有帮助：\n\
    \n```python\n# 加载库\nimport cv2\nimport numpy as np\nfrom matplotlib import pyplot\
    \ as plt\n\n# 以灰度模式加载图像\nimage_grey = cv2.imread(\"images/plane_256x256.jpg\"\
    , cv2.IMREAD_GRAYSCALE)\n\n# 应用自适应阈值处理\nmax_output_value = 255\nneighborhood_size\
    \ = 99\nsubtract_from_mean = 10\nimage_binarized = cv2.adaptiveThreshold(image_grey,\n\
    \                                        max_output_value,\n                 \
    \                       cv2.ADAPTIVE_THRESH_GAUSSIAN_C,\n                    \
    \                    cv2.THRESH_BINARY,\n                                    \
    \    neighborhood_size,\n                                        subtract_from_mean)\n\
    ```\n\n```python\n# 显示图像\nplt.imshow(image_binarized, cmap=\"gray\"), plt.axis(\"\
    off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_161_0.png)\n\
    \n### 讨论\n\n图像二值化的过程涉及将灰度图像转换为其黑白形式。我们的解决方案在 `adaptiveThreshold` 中有四个重要参数。`max_output_value`\
    \ 简单地确定了输出像素强度的最大值。`cv2.ADAPTIVE_THRESH_GAUSSIAN_C` 将像素的阈值设置为邻近像素强度的加权和。权重由高斯窗口确定。或者，我们可以使用\
    \ `cv2.ADAPTIVE_THRESH_MEAN_C` 将阈值简单地设置为邻近像素的平均值：\n\n```python\n# 应用 cv2.ADAPTIVE_THRESH_MEAN_C\n\
    image_mean_threshold = cv2.adaptiveThreshold(image_grey,\n                   \
    \                         max_output_value,\n                                \
    \            cv2.ADAPTIVE_THRESH_MEAN_C,\n                                   \
    \         cv2.THRESH_BINARY,\n                                            neighborhood_size,\n\
    \                                            subtract_from_mean)\n```\n\n```python\n\
    # 显示图像\nplt.imshow(image_mean_threshold, cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_161_1.png)\n\n最后两个参数是块大小（用于确定像素阈值的邻域大小）和从计算出的阈值中减去的常数（用于手动微调阈值）。\n\
    \n阈值处理的一个主要好处是*图像去噪*——只保留最重要的元素。例如，阈值处理通常应用于打印文本的照片，以将字母与页面分离。\n\n## 8.10 移除背景\n\

    # Discussion


    Recall @k is most simply defined as the number of items returned by the ANN at
    some k nearest neighbors that also appear in the exact nearest neighbors at the
    same k, divided by k. In this example, at 10 nearest neighbors we have 100% recall,
    which means that our ANN is returning the same indices as our KNN at k=10 (though
    not necessarily in the same order).


    Recall is a common metric to use when evaluating ANNs against exact nearest neighbors.



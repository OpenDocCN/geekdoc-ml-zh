    \n- Nearest Neighbor Indexes for Similarity Search (different ANN index types)\n\
    \n## 15.6 Evaluating Approximate Nearest Neighbors\n\n### Problem\n\nYou want\
    \ to see how your ANN compares to exact nearest neighbors (KNN):\n\n### Solution\n\
    \nCompute the recall @k nearest neighbors of the ANN as compared to the KNN:\n\
    \n```python\n# Load libraries\nimport faiss\nimport numpy as np\nfrom sklearn\
    \ import datasets\nfrom sklearn.neighbors import NearestNeighbors\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\n# Number of nearest neighbors\nk = 10\n\n# Load data\n\
    iris = datasets.load_iris()\nfeatures = iris.data\n\n# Create standardizer\nstandardizer\
    \ = StandardScaler()\n\n# Standardize features\nfeatures_standardized = standardizer.fit_transform(features)\n\
    \n# Create KNN with 10 NN\nnearest_neighbors = NearestNeighbors(n_neighbors=k).fit(features_standardized)\n\
    \n# Set faiss parameters\nn_features = features_standardized.shape[1]\nnlist =\
    \ 3\n\n# Create an IVF index\nquantizer = faiss.IndexFlatIP(n_features)\nindex\
    \ = faiss.IndexIVFFlat(quantizer, n_features, nlist)\n\n# Train the index and\
    \ add feature vectors\nindex.train(features_standardized)\nindex.add(features_standardized)\n\
    index.nprobe = 1\n\n# Create an observation\nnew_observation = np.array([[ 1,\
    \  1,  1,  1]])\n\n# Find distances and indices of the observation's exact nearest\
    \ neighbors\nknn_distances, knn_indices = nearest_neighbors.kneighbors(new_observation)\n\
    \n# Search the index for the two nearest neighbors\nivf_distances, ivf_indices\
    \ = index.search(new_observation, k)\n\n# Get the set overlap\nrecalled_items\
    \ = set(list(knn_indices[0])) & set(list(ivf_indices[0]))\n\n# Print the recall\n\
    print(f\"Recall @k={k}: {len(recalled_items)/k * 100}%\")\n```\n\nRecall @k=10:\
    \ 100.0%\n\n### Discussion\n\nRecall @k is most simply defined as the number of\
    \ items returned by the ANN at some k nearest neighbors that also appear in the\
    \ exact nearest neighbors at the same k, divided by k. In this example, at 10\
    \ nearest neighbors we have 100% recall, which means that our ANN is returning\
    \ the same indices as our KNN at k=10 (though not necessarily in the same order).\n\
    \nRecall is a common metric to use when evaluating ANNs against exact nearest\
    \ neighbors.\n\n## See Also\n\n- Google's note on ANN for its Vertex Matching\

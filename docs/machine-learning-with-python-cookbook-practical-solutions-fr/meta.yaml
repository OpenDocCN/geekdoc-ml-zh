    \ rows from your DataFrame.\n\n### Solution\n\nUse `drop_duplicates`, but be mindful\
    \ of the parameters:\n\n```python\n# Load library\nimport pandas as pd\n\n# Create\
    \ URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# Load data\ndataframe = pd.read_csv(url)\n\n# Drop duplicates, show first two\
    \ rows of output\ndataframe.drop_duplicates().head(2)\n```\n\n| Name | PClass\
    \ | Age | Sex | Survived | SexCode |\n|---|---|---|---|---|---|\n| 0 Allen, Miss\
    \ Elisabeth Walton | 1st | 29.0 | female | 1 | 1 |\n| 1 Allison, Miss Helen Loraine\
    \ | 1st | 2.0 | female | 0 | 1 |\n\n### Discussion\n\nA keen reader will notice\
    \ that the solution didn't actually drop any rows:\n\n```python\n# Show number\
    \ of rows\nprint(\"Number Of Rows In The Original DataFrame:\", len(dataframe))\n\
    print(\"Number Of Rows After Deduping:\", len(dataframe.drop_duplicates()))\n\
    ```\n\n```\nNumber Of Rows In The Original DataFrame: 1313\nNumber Of Rows After\
    \ Deduping: 1313\n```\n\nThis is because `drop_duplicates` defaults to dropping\
    \ only rows that match perfectly across all columns. Because every row in our\
    \ DataFrame is unique, none will be dropped. However, often we want to consider\
    \ only a subset of columns to check for duplicate rows. We can accomplish this\
    \ using the `subset` parameter:\n\n```python\n# Drop duplicates\ndataframe.drop_duplicates(subset=['Sex'])\n\
    ```\n\n| Name | PClass | Age | Sex | Survived | SexCode |\n|---|---|---|---|---|---|\n\
    | 0 Allen, Miss Elisabeth Walton | 1st | 29.0 | female | 1 | 1 |\n| 2 Allison,\
    \ Mr Hudson Joshua Creighton | 1st | 30.0 | male | 0 | 0 |\n\nTake a close look\
    \ at the preceding output: we told `drop_duplicates` to only consider any two\
    \ rows with the same value for `Sex` to be duplicates and to drop them. Now we\
    \ are left with a DataFrame of only two rows: one woman and one man. You might\
    \ be asking why `drop_duplicates` decided to keep these two rows instead of two\
    \ different rows. The answer is that `drop_duplicates` defaults to keeping the\
    \ first occurrence of a duplicated row and dropping the rest. We can control this\
    \ behavior using the `keep` parameter:\n\n```python\n# Drop duplicates\ndataframe.drop_duplicates(subset=['Sex'],\
    \ keep='last')\n```\n\n| Name | PClass | Age | Sex | Survived | SexCode |\n|---|---|---|---|---|---|\n\
    | 1307 Zabour, Miss Tamini | 3rd | NaN | female | 0 | 1 |\n| 1312 Zimmerman, Leo\
    \ | 3rd | 29.0 | male | 0 | 0 |\n\nA related method is `duplicated`, which returns\
    \ a boolean series denoting whether a row is a duplicate or not. This is a good\
    \ option if you don't want to simply drop duplicates:\n\n```python\ndataframe.duplicated()\n\
    ```\n\n```\n0        False\n1        False\n2        False\n3        False\n4\
    \        False\n...\n1308     False\n1309     False\n1310     False\n1311    \
    \ False\n1312     False\nLength: 1313, dtype: bool\n```\n\n## 3.14 Grouping Rows\
    \ by Values\n\n### Problem\n\nYou want to group individual rows according to some\
    \ shared value.\n\n### Solution\n\n`groupby` is one of the most powerful features\
    \ in pandas:\n\n```python\n# Load library\nimport pandas as pd\n\n# Create URL\n\
    url = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# Load data\ndataframe = pd.read_csv(url)\n\n# Group rows by the values of the\
    \ column 'Sex', calculate mean of each group\ndataframe.groupby('Sex').mean(numeric_only=True)\n\
    ```\n\n| Sex | Age | Survived | SexCode |\n|---|---|---|---|\n| female | 29.396424\
    \ | 0.666667 | 1.0 |\n| male | 31.014338 | 0.166863 | 0.0 |\n\n### Discussion\n\
    \n`groupby` is where data wrangling really starts to take shape. It is very common\
    \ to have a DataFrame where each row is a person or an event and we want to group\
    \ them according to some criterion and then calculate a statistic. For example,\
    \ you can imagine a DataFrame where each row is an individual sale at a national\
    \ restaurant chain and we want the total sales per restaurant. We can accomplish\
    \ this by grouping rows by individual restaurants and then calculating the sum\
    \ of each group.\n\nUsers new to `groupby` often write a line like this and are\
    \ confused by what is returned:\n\n```python\n# Group rows\ndataframe.groupby('Sex')\n\
    ```\n\n```\n<pandas.core.groupby.DataFrameGroupBy object at 0x10efacf28>\n```\n\
    \nWhy didn't it return something more useful? The reason is that `groupby` needs\
    \ to be paired with some operation that we want to apply to each group, such as\
    \ calculating an aggregate statistic (e.g., mean, median, sum). When talking about\
    \ grouping we often use shorthand and say “group by gender,” but that is incomplete.\
    \ For grouping to be useful, we need to group by something and then apply a function\
    \ to each of those groups:\n\n```python\n# Group rows, count rows\ndataframe.groupby('Survived')['Name'].count()\n\
    ```\n\n```\nSurvived\n0    863\n1    450\nName: Name, dtype: int64\n```\n\nNotice\
    \ `Name` added after the `groupby`? That is because particular summary statistics\
    \ are meaningful only to certain types of data. For example, while calculating\
    \ the average age by gender makes sense, calculating the total age by gender does\
    \ not. In this case, we group the data into survived or not, and then count the\
    \ number of names (i.e., passengers) in each group.\n\nWe can also group by a\
    \ first column, then group that grouping by a second column:\n\n```python\n# Group\
    \ rows, calculate mean\ndataframe.groupby(['Sex','Survived'])['Age'].mean()\n\
    ```\n\n```\nSex     Survived\nfemale  0          24.901408\n        1        \
    \  30.867143\nmale    0          32.320780\n        1          25.951875\nName:\
    \ Age, dtype: float64\n```\n\n## 3.15 Grouping Rows by Time\n\n### Problem\n\n\
    You need to group individual rows by time periods.\n\n### Solution\n\nUse `resample`\
    \ to group rows by chunks of time:\n\n```python\n# Load libraries\nimport pandas\
    \ as pd\nimport numpy as np\n\n# Create date range\ntime_index = pd.date_range('06/06/2017',\
    \ periods=100000, freq='30S')\n\n# Create DataFrame\ndataframe = pd.DataFrame(index=time_index)\n\
    \n# Create column of random values\ndataframe['Sale_Amount'] = np.random.randint(1,\
    \ 10, 100000)\n\n# Group rows by week, calculate sum per week\ndataframe.resample('W').sum()\n\
    ```\n\n| Sale_Amount |\n|---|\n| 2017-06-11 86423 |\n| 2017-06-18 101045 |\n|\
    \ 2017-06-25 100867 |\n| 2017-07-02 100894 |\n| 2017-07-09 100438 |\n| 2017-07-16\
    \ 10297 |\n\n### Discussion\n\nOur standard *Titanic* dataset does not contain\
    \ a datetime column, so for this recipe we have generated a simple DataFrame where\
    \ each row is an individual sale. For each sale we know its date and time and\
    \ its dollar amount (this data isn't realistic because the sales take place precisely\
    \ 30 seconds apart and are exact dollar amounts, but for the sake of simplicity\
    \ let's pretend).\n\nThe raw data looks like this:\n\n```python\n# Show three\
    \ rows\ndataframe.head(3)\n```\n\n| Sale_Amount |\n|---|\n| 2017-06-06 00:00:00\
    \ 7 |\n| 2017-06-06 00:00:30 2 |\n| 2017-06-06 00:01:00 7 |\n\nNotice that the\
    \ date and time of each sale is the index of the DataFrame; this is because `resample`\
    \ requires the index to be a datetime-like value.\n\nUsing `resample` we can group\
    \ the rows by a wide array of time periods (offsets) and then we can calculate\
    \ statistics on each time group:\n\n```python\n# Group by two weeks, calculate\
    \ mean\ndataframe.resample('2W').mean()\n```\n\n| Sale_Amount |\n|---|\n| 2017-06-11\
    \ 5.001331 |\n| 2017-06-25 5.007738 |\n| 2017-07-09 4.993353 |\n| 2017-07-23 4.950481\
    \ |\n\n```python\n# Group by month, count rows\ndataframe.resample('M').count()\n\
    ```\n\n| Sale_Amount |\n|---|\n| 2017-06-30 72000 |\n| 2017-07-31 28000 |\n\n\
    You might notice that in the two outputs the datetime index is a date even though\
    \ we are grouping by weeks and months, respectively. The reason is that by default\
    \ `resample` returns the label of the right “edge” (the last label) of the time\
    \ group. We can control this behavior using the `label` parameter:\n\n```python\n\
    # Group by month, count rows\ndataframe.resample('M', label='left').count()\n\
    ```\n\n| Sale_Amount |\n|---|\n| 2017-05-31 72000 |\n| 2017-06-30 28000 |\n\n\
    ### See Also\n\n- List of pandas time offset aliases\n\n## 3.16 Aggregating Operations\
    \ and Statistics\n\n### Problem\n\nYou need to aggregate an operation over each\
    \ column (or a set of columns) in a dataframe.\n\n### Solution\n\nUse the pandas\
    \ `agg` method. Here, we can easily get the minimum value of every column:\n\n\
    ```python\n# Load library\nimport pandas as pd\n\n# Create URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv'\n\
    \n# Load data\ndataframe = pd.read_csv(url)\n\n# Get the minimum of every column\n\
    dataframe.agg(\"min\")\n```"

  md: "# 23.4 Serving scikit-learn Models\n\n# Problem\n\nYou want to serve your trained\
    \ scikit-learn model using a web server.\n\n# Solution\n\nBuild a Python Flask\
    \ application that loads the model trained earlier in this chapter:\n\n```\n#\
    \ Import libraries\nimport joblib\nfrom flask import Flask, request\n\n# Instantiate\
    \ a flask app\napp = Flask(__name__)\n\n# Load the model from disk\nmodel = joblib.load(\"\
    model.pkl\")\n\n# Create a predict route that takes JSON data, makes predictions,\
    \ and\n# returns them\n@app.route(\"/predict\", methods = [\"POST\"])\ndef predict():\n\
    \    print(request.json)\n    inputs = request.json[\"inputs\"]\n    prediction\
    \ = model.predict(inputs)\n    return {\n        \"prediction\" : prediction.tolist()\n\
    \    }\n\n# Run the app\nif __name__ == \"__main__\":\n    app.run()\n```\n\n\
    Make sure you have Flask installed:\n\n```\npython3 -m pip install flask==2.2.3\
    \ joblib==1.2.0 scikit-learn==1.2.0\n```\n\nAnd then run the application:\n\n\
    ```\npython3 app.py\n\n* Serving Flask app 'app'\n* Debug mode: off\nWARNING:\

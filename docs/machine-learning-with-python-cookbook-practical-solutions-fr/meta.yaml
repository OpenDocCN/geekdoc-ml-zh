    \ k)\n\n# 获取集合交集\nrecalled_items = set(list(knn_indices[0])) & set(list(ivf_indices[0]))\n\
    \n# 打印召回率\nprint(f\"Recall @k={k}: {len(recalled_items)/k * 100}%\")\n```\n\n\
    Recall @k=10: 100.0%\n\n### 讨论\n\n召回率 @k 最简单的定义是：ANN 在某个 k 个最近邻中返回的项目，同时也出现在精确最近邻的相同\
    \ k 个结果中的数量，除以 k。在这个例子中，在10个最近邻时，我们有100%的召回率，这意味着我们的 ANN 在 k=10 时返回的索引与 KNN 相同（尽管顺序不一定相同）。\n\
    \n召回率是评估 ANN 与精确最近邻相比时常用的指标。\n\n## 另请参阅\n\n- Google 关于其 Vertex Matching Engine\
    \ 服务中 ANN 的说明\n\n# 第16章\n逻辑回归\n\n## 16.0 引言\n\n尽管名为回归，*逻辑回归*实际上是一种广泛使用的监督分类技术。逻辑回归（及其扩展，如多项逻辑回归）是一种直接、易于理解的方法，用于预测观测值属于某个类别的概率。在本章中，我们将介绍如何在\
    \ scikit-learn 中使用逻辑回归训练各种分类器。\n\n## 16.1 训练二元分类器\n\n### 问题\n\n你需要训练一个简单的分类器模型。\n\
    \n### 解决方案\n\n在 scikit-learn 中使用 LogisticRegression 训练逻辑回归：\n\n```python\n# 加载库\n\
    from sklearn.linear_model import LogisticRegression\nfrom sklearn import datasets\n\
    from sklearn.preprocessing import StandardScaler\n\n# 加载只有两个类别的数据\niris = datasets.load_iris()\n\
    features = iris.data[:100,:]\ntarget = iris.target[:100]\n\n# 标准化特征\nscaler =\
    \ StandardScaler()\nfeatures_standardized = scaler.fit_transform(features)\n\n\
    # 创建逻辑回归对象\nlogistic_regression = LogisticRegression(random_state=0)\n\n# 训练模型\n\
    model = logistic_regression.fit(features_standardized, target)\n```\n\n### 讨论\n\
    \n尽管名称中带有“回归”，逻辑回归实际上是一种广泛使用的二元分类器（即目标向量只能取两个值）。在逻辑回归中，一个线性模型（例如，$\\beta_0 + \\\

    \n## 8.11 Detecting Edges\n\n### Problem\n\nYou want to find the edges in an image.\n\
    \n### Solution\n\nUse an edge detection technique like the Canny edge detector:\n\
    \n```python\n# Load libraries\nimport cv2\nimport numpy as np\nfrom matplotlib\
    \ import pyplot as plt\n\n# Load image as grayscale\nimage_gray = cv2.imread(\"\
    images/plane_256x256.jpg\", cv2.IMREAD_GRAYSCALE)\n\n# Calculate median intensity\n\
    median_intensity = np.median(image_gray)\n\n# Set thresholds to be one standard\
    \ deviation above and below median intensity\nlower_threshold = int(max(0, (1.0\
    \ - 0.33) * median_intensity))\nupper_threshold = int(min(255, (1.0 + 0.33) *\
    \ median_intensity))\n\n# Apply Canny edge detector\nimage_canny = cv2.Canny(image_gray,\
    \ lower_threshold, upper_threshold)\n\n# Show image\nplt.imshow(image_canny, cmap=\"\
    gray\"), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_165_0.png)\n\
    \n### Discussion\n\nEdge detection is a major topic of interest in computer vision.\
    \ Edges are important because they are areas of high information. For example,\
    \ in our image one patch of sky looks very much like another and is unlikely to\
    \ contain unique or interesting information. However, patches where the background\
    \ sky meets the airplane contain a lot of information (e.g., an object's shape).\
    \ Edge detection allows us to remove low-information areas and isolate the areas\
    \ of images containing the most information.\n\nThere are many edge detection\
    \ techniques (Sobel filters, Laplacian edge detector, etc.). However, our solution\
    \ uses the commonly used Canny edge detector. How the Canny detector works is\
    \ too detailed for this book, but there is one point that we need to address.\
    \ The Canny detector requires two parameters denoting low and high gradient threshold\
    \ values. Potential edge pixels between the low and high thresholds are considered\
    \ weak edge pixels, while those above the high threshold are considered strong\
    \ edge pixels. OpenCV's Canny method includes the low and high thresholds as required\
    \ parameters. In our solution, we set the lower and upper thresholds to be one\
    \ standard deviation below and above the image's median pixel intensity. However,\
    \ we often get better results if we determine a good pair of low and high threshold\
    \ values through manual trial and error on a few images before running Canny on\
    \ our entire collection of images.\n\n### See Also\n\n- Canny Edge Detector, Wikipedia\n\
    - Canny Edge Detection Auto Thresholding\n\n## 8.12 Detecting Corners\n\n### Problem\n\
    \nYou want to detect the corners in an image.\n\n### Solution\n\nUse OpenCV's\
    \ implementation of the Harris corner detector, cornerHarris:\n\n```python\n#\
    \ Load libraries\nimport cv2\nimport numpy as np\nfrom matplotlib import pyplot\
    \ as plt\n\n# Load image\nimage_bgr = cv2.imread(\"images/plane_256x256.jpg\"\
    )\nimage_gray = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2GRAY)\nimage_gray = np.float32(image_gray)\n\
    \n# Set corner detector parameters\nblock_size = 2\naperture = 29\nfree_parameter\
    \ = 0.04\n\n# Detect corners\ndetector_responses = cv2.cornerHarris(image_gray,\n\
    \                                      block_size,\n                         \
    \             aperture,\n                                      free_parameter)\n\
    \n# Large corner markers\ndetector_responses = cv2.dilate(detector_responses,\
    \ None)\n\n# Only keep detector responses greater than threshold, mark as white\n\
    threshold = 0.02\nimage_bgr[detector_responses >\n          threshold *\n    \
    \      detector_responses.max()] = [255,255,255]\n\n# Convert to grayscale\nimage_gray\
    \ = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2GRAY)\n\n# Show image\nplt.imshow(image_gray,\
    \ cmap=\"gray\"), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_167_0.png)\n\
    \n### Discussion\n\nThe *Harris corner detector* is a commonly used method of\
    \ detecting the intersection of two edges. Our interest in detecting corners is\
    \ motivated by the same reason as for detecting edges: corners are points of high\
    \ information. A complete explanation of the Harris corner detector is available\
    \ in the external resources at the end of this recipe, but a simplified explanation\
    \ is that it looks for windows (also called *neighborhoods* or *patches*) where\
    \ small movements of the window (imagine shaking the window) create big changes\
    \ in the contents of the pixels inside the window. `cornerHarris` contains three\
    \ important parameters that we can use to control the edges detected. First, `block_size`\
    \ is the size of the neighbor around each pixel used for corner detection. Second,\
    \ `aperture` is the size of the Sobel kernel used (don't worry if you don't know\
    \ what that is), and finally there is a free parameter where larger values correspond\
    \ to identifying softer corners.\n\nThe output is a grayscale image depicting\
    \ potential corners:\n\n```python\n# Show potential corners\nplt.imshow(detector_responses,\
    \ cmap='gray'), plt.axis(\"off\")\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_167_1.png)\n\
    \nWe then apply thresholding to keep only the most likely corners. Alternatively,\
    \ we can use a similar detector, the Shi-Tomasi corner detector, which works in\
    \ a similar way to the Harris detector (`goodFeaturesToTrack`) to identify a fixed\
    \ number of strong corners. `goodFeaturesToTrack` takes three major parameters—the\
    \ number of corners to detect, the minimum quality of the corner (0 to 1), and\
    \ the minimum Euclidean distance between corners:\n\n```python\n# Load images\n\
    image_bgr = cv2.imread('images/plane_256x256.jpg')\nimage_gray = cv2.cvtColor(image_bgr,\
    \ cv2.COLOR_BGR2GRAY)\n\n# Number of corners to detect\ncorners_to_detect = 10\n\
    minimum_quality_score = 0.05\nminimum_distance = 25\n\n# Detect corners\ncorners\
    \ = cv2.goodFeaturesToTrack(image_gray,\n                                  corners_to_detect,\n\
    \                                  minimum_quality_score,\n                  \
    \                minimum_distance)\n\ncorners = np.int16(corners)\n\n# Draw white\

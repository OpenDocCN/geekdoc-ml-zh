    # 20.3 Creating a Sparse Tensor


    # Problem


    Given data with very few nonzero values, you want to efficiently represent it
    with a tensor.


    # Solution


    Use the PyTorch to_sparse function:


    ```

    # Import libraries

    import torch


    # Create a tensor

    tensor = torch.tensor(

    [

    [0, 0],

    [0, 1],

    [3, 0]

    ]

    )


    # Create a sparse tensor from a regular tensor

    sparse_tensor = tensor.to_sparse()

    ```


    # Discussion


    Sparse tensors are memory-efficient ways to represent data composed of mostly
    0s. In Chapter 1 we used scipy to create a compressed sparse row (CSR) matrix
    that was no longer a NumPy array.


    The torch.Tensor class allows us to create both regular and sparse matrices using
    the same object. If we inspect the types of the two tensors we just created, we
    can see they''re actually both of the same class:


    ```

    print(type(tensor))

    print(type(sparse_tensor))


    <class ''torch.Tensor''>

    <class ''torch.Tensor''>

    ```


    # See Also


    +   - PyTorch documentation: Sparse Tensor'

    # Discussion


    It''s completely possible to create a neural network to predict continuous values
    instead of class probabilities. In the case of our binary classifier (Recipe 21.4)
    we used an output layer with a single unit and a sigmoid activation function to
    produce a probability that an observation was class 1. Importantly, the sigmoid
    activation function constrained the outputted value to between 0 and 1. If we
    remove that constraint by having no activation function, we allow the output to
    be a continuous value.


    Furthermore, because we are training a regression, we should use an appropriate
    loss function and evaluation metric, in our case the mean square error:


    $$MSE = \frac{1}{n} \sum_{i=1}^{n} (\widehat{y}_i - y_i)^2$$


    where $n$ is the number of observations; $y_i$ is the true value of the target
    we are trying to predict, $y$, for observation $i$; and $\widehat{y}_i$ is the
    model''s predicted value for $y_i$.


    Finally, because we are using simulated data using scikit-learn make_regression,
    we didn''t have to standardize the features. It should be noted, however, that
    in almost all real-world cases, standardization would be necessary.



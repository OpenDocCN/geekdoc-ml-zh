    The resulting effect makes contrasts in edges stand out more.


    # 8.7 Enhancing Contrast


    # Problem


    We want to increase the contrast between pixels in an image.


    # Solution


    Histogram equalization is a tool for image processing that can make objects and
    shapes stand out. When we have a grayscale image, we can apply OpenCV''s equalizeHist
    directly on the image:


    ```

    # Load libraries

    import cv2

    import numpy as np

    from matplotlib import pyplot as plt


    # Load image

    image = cv2.imread("images/plane_256x256.jpg", cv2.IMREAD_GRAYSCALE)


    # Enhance image

    image_enhanced = cv2.equalizeHist(image)


    # Show image

    plt.imshow(image_enhanced, cmap="gray"), plt.axis("off")

    plt.show()

    ```


    ![](img/553f6c9c8b23451624604a848ee8a83c_157_0.png)


    However, when we have a color image, we first need to convert the image to the
    YUV color format. The Y is the luma, or brightness, and U and V denote the color.
    After the conversion, we can apply equalizeHist to the image and then convert
    it back to BGR or RGB (apologies to hardcopy readers for whom there are no color
    images):'
  merge: -1
  pgno: 157
- img_proc: true
  md: '```

    # Load image

    image_bgr = cv2.imread("images/plane.jpg")


    # Convert to YUV

    image_yuv = cv2.cvtColor(image_bgr, cv2.COLOR_BGR2YUV)


    # Apply histogram equalization

    image_yuv[:, :, 0] = cv2.equalizeHist(image_yuv[:, :, 0])


    # Convert to RGB

    image_rgb = cv2.cvtColor(image_yuv, cv2.COLOR_YUV2RGB)


    # Show image

    plt.imshow(image_rgb), plt.axis("off")

    plt.show()

    ```


    ![](img/553f6c9c8b23451624604a848ee8a83c_158_0.png)


    # Discussion


    While a detailed explanation of how histogram equalization works is beyond the
    scope of this book, the short explanation is that it transforms the image so that
    it uses a wider range of pixel intensities.


    While the resulting image often does not look “realistic,” we need to remember
    that the image is just a visual representation of the underlying data. If histogram
    equalization is able to make objects of interest more distinguishable from other
    objects or backgrounds (which is not always the case), then it can be a valuable
    addition to our image preprocessing pipeline.



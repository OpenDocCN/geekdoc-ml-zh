    # 9.1 Reducing Features Using Principal Components


    # Problem


    Given a set of features, you want to reduce the number of features while retaining
    the variance (important information) in the data.


    # Solution


    Use principal component analysis with scikit''s PCA:


    ```

    # Load libraries

    from sklearn.preprocessing import StandardScaler

    from sklearn.decomposition import PCA

    from sklearn import datasets


    # Load the data

    digits = datasets.load_digits()


    # Standardize the feature matrix

    features = StandardScaler().fit_transform(digits.data)


    # Create a PCA that will retain 99% of variance

    pca = PCA(n_components=0.99, whiten=True)


    # Conduct PCA

    features_pca = pca.fit_transform(features)


    # Show results

    print("Original number of features:", features.shape[1])

    print("Reduced number of features:", features_pca.shape[1])


    Original number of features: 64

    Reduced number of features: 54

    ```


    # Discussion


    Principal component analysis (PCA) is a popular linear dimensionality reduction
    technique. PCA projects observations onto the (hopefully fewer) principal components
    of the feature matrix that retain the most variance in the data, which, practically,
    means we retain information. PCA is an unsupervised technique, meaning that it
    does not use the information from the target vector and instead only considers
    the feature matrix.


    For a mathematical description of how PCA works, see the external resources listed
    at the end of this recipe. However, we can understand the intuition behind PCA
    using a'
- md: 'simple example. In Figure 9-1, our data contains two features, $x_1$ and $x_2$.
    Looking at the visualization, it should be clear that observations are spread
    out like a cigar, with a lot of length and very little height. More specifically,
    we can say that the variance of the “length” is significantly greater than the
    “height.” Instead of length and height, we refer to the “direction” with the most
    variance as the first principal component and the “direction” with the second-most
    variance as the second principal component (and so on).


    If we wanted to reduce our features, one strategy would be to project all observations
    in our two-dimensional space onto the one-dimensional principal component. We
    would lose the information captured in the second principal component, but in
    some situations that would be an acceptable trade-off. This is PCA.


    ![](img/553f6c9c8b23451624604a848ee8a83c_182_0.png)


    Figure 9-1. The first and second principal components of PCA


    PCA is implemented in scikit-learn using the PCA class. n_components has two operations,
    depending on the argument provided. If the argument is greater than 1, pca will
    return that many features. This leads to the question of how to select the optimal
    number of features. Fortunately, if the argument to n_components is between 0
    and 1, pca returns the minimum number of features that retain that much variance.
    It’s common to use values of 0.95 and 0.99, meaning 95% and 99% of the variance
    of the original features has been retained, respectively. whiten=True transforms
    the values of each principal component so that they have zero mean and unit variance.
    Another parameter and argument is svd_solver="randomized", which implements a
    stochastic algorithm to find the first principal components in often significantly
    less time.


    The output of our solution shows that PCA enables us to reduce our dimensionality
    by 10 features while still retaining 99% of the information (variance) in the
    feature matrix.


    ## See Also


    - scikit-learn documentation: PCA

    - Principal Component Analysis with Linear Algebra, Jeff Jauregui


    ## 9.2 Reducing Features When Data Is Linearly Inseparable


    ### Problem


    You suspect you have linearly inseparable data and want to reduce the dimensions.


    ### Solution


    Use an extension of principal component analysis that uses kernels to allow for
    nonlinear dimensionality reduction:


    ```python

    # Load libraries

    from sklearn.decomposition import PCA, KernelPCA

    from sklearn.datasets import make_circles


    # Create linearly inseparable data

    features, _ = make_circles(n_samples=1000, random_state=1, noise=0.1, factor=0.1)


    # Apply kernel PCA with radius basis function (RBF) kernel

    kpca = KernelPCA(kernel="rbf", gamma=15, n_components=1)

    features_kpca = kpca.fit_transform(features)


    print("Original number of features:", features.shape[1])

    print("Reduced number of features:", features_kpca.shape[1])

    ```


    Original number of features: 2

    Reduced number of features: 1


    ### Discussion


    PCA is able to reduce the dimensionality of our feature matrix (i.e., the number
    of features). Standard PCA uses linear projection to reduce the features. If the
    data is *linearly separable* (i.e., you can draw a straight line or hyperplane
    between different classes) then PCA works well. However, if your data is not linearly
    separable (i.e., you can only separate classes using a curved decision boundary),
    the linear transformation will not work as well. In our solution we used scikit-learn''s
    `make_circles` to generate a simulated dataset with a target vector of two classes
    and two features. `make_circles` makes linearly inseparable data; specifically,
    one class is surrounded on all sides by the other class, as shown in Figure 9-2.


    ![](img/553f6c9c8b23451624604a848ee8a83c_184_0.png)


    Figure 9-2. The first principal component projected on linearly inseparable data


    If we used linear PCA to reduce the dimensions of our data, the two classes would
    be linearly projected onto the first principal component such that they would
    become intertwined, as shown in Figure 9-3.


    ![](img/553f6c9c8b23451624604a848ee8a83c_184_1.png)


    Figure 9-3. The first principal component of linearly inseparable data without
    kernel PCA


    Ideally, we would want a transformation that would reduce the dimensions and make
    the data linearly separable. Kernel PCA can do both, as shown in Figure 9-4.


    ![](img/553f6c9c8b23451624604a848ee8a83c_184_2.png)


    Figure 9-4. The first principal component of linearly inseparable data with kernel
    PCA


    Kernels allow us to project the linearly inseparable data into a higher dimension
    where it is linearly separable; this is called the “kernel trick.” Don’t worry
    if you don’t understand the details of the kernel trick; just think of kernels
    as different ways of projecting the data. There are a number of kernels we can
    use in scikit-learn’s kernelPCA class, specified using the kernel parameter. A
    common kernel to use is the Gaussian radial basis function kernel rbf, but other
    options are the polynomial kernel (poly) and sigmoid kernel (sigmoid). We can
    even specify a linear projection (linear), which will produce the same results
    as standard PCA.


    One downside of kernel PCA is that we need to specify a number of parameters.
    For example, in Recipe 9.1 we set n_components to 0.99 to make PCA select the
    number of components to retain 99% of the variance. We don''t have this option
    in kernel PCA. Instead we have to define the number of components (e.g., n_components=1).
    Furthermore, kernels come with their own hyperparameters that we will have to
    set; for example, the radial basis function requires a gamma value.


    So how do we know which values to use? Through trial and error. Specifically,
    we can train our machine learning model multiple times, each time with a different
    kernel or different value of the parameter. Once we find the combination of values
    that produces the highest quality predicted values, we are done. This is a common
    theme in machine learning, and we will learn about this strategy in depth in Chapter
    12.


    ## See Also


    - scikit-learn documentation on Kernel PCA

    - Kernel Tricks and Nonlinear Dimensionality Reduction via RBF Kernel PCA


    ## 9.3 Reducing Features by Maximizing Class Separability


    ### Problem


    You want to reduce the number of features to be used by a classifier by maximizing
    the separation between the classes.


    ### Solution


    Try linear discriminant analysis (LDA) to project the features onto component
    axes that maximize the separation of classes:


    ```python

    # Load libraries

    from sklearn import datasets

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis


    # Load Iris flower dataset:

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create and run an LDA, then use it to transform the features

    lda = LinearDiscriminantAnalysis(n_components=1)

    features_lda = lda.fit(features, target).transform(features)


    # Print the number of features

    print("Original number of features:", features.shape[1])

    print("Reduced number of features:", features_lda.shape[1])

    ```


    Original number of features: 4

    Reduced number of features: 1


    We can use explained_variance_ratio_ to view the amount of variance explained
    by each component. In our solution the single component explained over 99% of
    the variance:


    ```python

    lda.explained_variance_ratio_

    ```


    array([0.9912126])


    ### Discussion


    LDA is a classification that is also a popular technique for dimensionality reduction.
    LDA works similarly to PCA in that it projects our feature space onto a lower-dimensional
    space. However, in PCA we were interested only in the component axes that maximize
    the variance in the data, while in LDA we have the additional goal of maximizing
    the differences between classes. In Figure 9-5, we have data comprising two target
    classes and two features. If we project the data onto the y-axis, the two classes
    are not easily separable (i.e., they overlap), while if we project the data onto
    the x-axis, we are left with a feature vector (i.e., we reduced our dimensionality
    by one) that still preserves class separability. In the real world, of course,
    the relationship between the classes will be more complex and the dimensionality
    will be higher, but the concept remains the same.


    ![](img/553f6c9c8b23451624604a848ee8a83c_186_0.png)


    Figure 9-5. LDA attempts to maximize the difference between our classes'

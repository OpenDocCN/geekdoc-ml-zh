    \ objects\nResult logdir: /root/ray_results/train_model_2023-03-05_23-31-33\n\
    Number of trials: 1/1 (1 RUNNING)\n...\n```\n\n### Discussion\n\nIn Recipes 12.1\
    \ and 12.2, we covered using scikit-learn's model selection techniques to identify\
    \ the best hyperparameters of a scikit-learn model. While in general the scikit-learn\
    \ approach can also be applied to neural networks, the ray tuning library provides\
    \ a sophisticated API that allows you to schedule experiments on both CPUs and\
    \ GPUs.\n\nThe hyperparameters of a model *are* important and should be selected\
    \ with care. However, running experiments to select hyperparameters can be both\
    \ cost and time prohibitive. Therefore, automatic hyperparameter tuning of neural\
    \ networks is not the silver bullet, but it is a useful tool to have in certain\
    \ circumstances.\n\nIn our solution we conducted a search of different parameters\
    \ for layer sizes and the learning rate of our optimizer. The `best_trial.config`\
    \ shows the parameters in our ray tuning configuration that led to the lowest\
    \ loss and best experiment outcome.\n\n## 21.14 Visualizing Neural Networks\n\n\
    ### Problem\n\nYou want to quickly visualize a neural network's architecture.\n\
    \n### Solution\n\nUse the `make_dot` function from `torch_viz`:\n\n```python\n\
    # Load libraries\nimport torch\nimport torch.nn as nn\nimport numpy as np\nfrom\
    \ torch.utils.data import DataLoader, TensorDataset\nfrom torch.optim import RMSprop\n\
    from torchviz import make_dot\nfrom sklearn.datasets import make_classification\n\
    from sklearn.model_selection import train_test_split\n\n# Create training and\
    \ test sets\nfeatures, target = make_classification(n_classes=2, n_features=10,\n\
    \                                       n_samples=1000)\nfeatures_train, features_test,\
    \ target_train, target_test = train_test_split(\n    features, target, test_size=0.1,\
    \ random_state=1)\n\n# Set random seed\ntorch.manual_seed(0)\nnp.random.seed(0)\n\
    \n# Convert data to PyTorch tensors\nx_train = torch.from_numpy(features_train).float()\n\
    y_train = torch.from_numpy(target_train).float().view(-1, 1)\nx_test = torch.from_numpy(features_test).float()\n\
    y_test = torch.from_numpy(target_test).float().view(-1, 1)\n\n# Define a neural\
    \ network using Sequential\nclass SimpleNeuralNet(nn.Module):\n    def __init__(self):\n\
    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16, 16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Sigmoid()\n        )\n\n    def forward(self, x):\n\
    \        x = self.sequential(x)\n        return x\n\n# Initialize neural network\n\
    network = SimpleNeuralNet()\n\n# Define loss function, optimizer\ncriterion =\
    \ nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\n# Define data loader\n\
    train_data = TensorDataset(x_train, y_train)\ntrain_loader = DataLoader(train_data,\
    \ batch_size=100, shuffle=True)\n\n# Compile the model using torch 2.0's optimizer\n\
    network = torch.compile(network)\n\n# Train neural network\nepochs = 3\nfor epoch\
    \ in range(epochs):\n    for batch_idx, (data, target) in enumerate(train_loader):\n\
    \        optimizer.zero_grad()\n        output = network(data)\n        loss =\
    \ criterion(output, target)\n        loss.backward()\n        optimizer.step()\n\
    \nmake_dot(output.detach(), params=dict(\n    list(\n        network.named_parameters()\n\
    \    )\n).render(\n    \"simple_neural_network\",\n    format=\"png\"\n)\n'simple_neural_network.png'\n\
    ```\n\nIf we open the image that was saved to our machine, we can see the following:\n\
    \n![](img/553f6c9c8b23451624604a848ee8a83c_375_0.png)\n\n### Discussion\n\nThe\
    \ torchviz library provides easy utility functions to quickly visualize our neural\
    \ networks and write them out as images.\n\n# CHAPTER 22\n\n## Neural Networks\
    \ for Unstructured Data\n\n### 22.0 Introduction\n\nIn the previous chapter, we\
    \ focused on neural network recipes for *structured* data, i.e., tabular data.\
    \ Most of the largest advances in the past few years have actually involved using\
    \ neural networks and deep learning for *unstructured* data, such as text or images.\
    \ Working with these unstructured datasets is a bit different than working with\
    \ structured sources of data.\n\nDeep learning is particularly powerful in the\
    \ unstructured data space, where “classic” machine learning techniques (such as\
    \ boosted trees) typically fail to capture all the complexity and nuance present\
    \ in text data, audio, images, videos, etc. In this chapter, we will explore using\
    \ deep learning specifically for text and image data.\n\nIn a supervised learning\
    \ space for text and images, there are many subtasks or “types” of learning. The\
    \ following are a few examples (though this is not a comprehensive list):\n\n\
    - Text or image classification (example: classifying whether or not an image is\
    \ a picture of a hotdog)\n- Transfer learning (example: using a pretrained contextual\
    \ model like BERT and fine-tuning it on a task to predict whether or not an email\
    \ is spam)\n- Object detection (example: identifying and classifying specific\
    \ objects within an image)\n- Generative models (example: models that generate\
    \ text based on a given input such as the GPT models)\n\nAs deep learning has\
    \ grown in popularity and become increasingly commoditized, both the open source\
    \ and enterprise solutions for dealing with these use cases have"

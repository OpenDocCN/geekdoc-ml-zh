    \ 'l2']`，`RandomizedSearchCV` 将从该列表中有放回地随机抽样。\n\n就像使用 `GridSearchCV` 一样，我们可以查看最佳模型的超参数值：\n\
    \n```python\n# 查看最佳超参数\nprint('Best Penalty:', best_model.best_estimator_.get_params()['penalty'])\n\

  md: "# Solution\n\nCreate tensors with the requires_grad option set to True:\n\n\
    ```\n# Import libraries\nimport torch\n\n# Create a torch tensor that requires\
    \ gradients\nt = torch.tensor([1.0, 2.0, 3.0], requires_grad=True)\n\n# Perform\
    \ a tensor operation simulating \"forward propagation\"\ntensor_sum = t.sum()\n\
    \n# Perform back propagation\ntensor_sum.backward()\n\n# View the gradients\n\
    t.grad\ntensor([1., 1., 1.])\n```\n\n# Discussion\n\nAutograd is one of the core\
    \ features of PyTorch and a big factor in its popularity as a deep learning library.\
    \ The ability to easily compute, store, and visualize gradients makes PyTorch\
    \ very intuitive for researchers and enthusiasts building neural networks from\
    \ scratch.\n\nPyTorch uses a directed acyclic graph (DAG) to keep a record of\
    \ all data and computational operations being performed on that data. This is\
    \ incredibly useful, but it also means we need to be careful with what operations\
    \ we try to apply on our PyTorch data that requires gradients. When working with\
    \ autograd, we can't easily convert our tensors to NumPy arrays and back without\
    \ \"breaking the graph,\" a phrase used to describe operations that don't support\
    \ autograd:\n\n```\nimport torch\n\ntensor = torch.tensor([1.0, 2.0, 3.0], requires_grad=True)\n\
    tensor.numpy()\n\nRuntimeError: Can't call numpy() on Tensor that requires grad.\
    \ Use\n    tensor.detach().numpy() instead.\n```\n\nTo convert this tensor into\
    \ a NumPy array, we need to call the detach() method on it, which will break the\
    \ graph and thus our ability to automatically compute gradients. While this can\
    \ definitely be useful, it's worth knowing that detaching the tensor will prevent\
    \ PyTorch from automatically computing the gradient."

    \n## 6.12 使用情感分析分类器\n\n### 问题\n\n你想对一些文本的情感进行分类，以用作特征或用于下游数据分析。\n\n### 解决方案\n\n\
    使用transformers库的情感分类器。\n\n```python\n# Import libraries\nfrom transformers import\
    \ pipeline\n\n# Create an NLP pipeline that runs sentiment analysis\nclassifier\
    \ = pipeline(\"sentiment-analysis\")\n\n# Classify some text\n# (this may download\
    \ some data and models the first time you run it)\nsentiment_1 = classifier(\"\
    I hate machine learning! It's the absolute worst.\")\nsentiment_2 = classifier(\n\
    \    \"Machine learning is the absolute\n```"

    \nConcatenating is not a word you hear much outside of computer science and programming,\
    \ so if you have not heard it before, do not worry. The informal definition of\
    \ *concatenate* is to glue two objects together. In the solution we glued together\
    \ two small DataFrames using the axis parameter to indicate whether we wanted\

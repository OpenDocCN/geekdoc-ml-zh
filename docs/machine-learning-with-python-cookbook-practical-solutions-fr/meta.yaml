    # Discussion


    Linear regression assumes that the relationship between the features and the target
    vector is approximately linear. That is, the *effect* (also called *coefficient*,
    *weight*, or *parameter*) of the features on the target vector is constant. In
    our solution, for the sake of explanation, we have trained our model using only
    three features. This means our linear model will be:


    $\widehat{y} = \widehat{\beta}_0 + \widehat{\beta}_1 x_1 + \widehat{\beta}_2 x_2
    + \widehat{\beta}_3 x_3 + \epsilon$


    where $\widehat{y}$ is our target, $x_i$ is the data for a single feature, $\widehat{\beta}_1$,
    $\widehat{\beta}_2$, and $\widehat{\beta}_3$ are the coefficients identified by
    fitting the model, and $\epsilon$ is the error. After we have fit our model, we
    can view the value of each parameter. For example, $\widehat{\beta}_0$, also called
    the *bias* or *intercept*, can be viewed using `intercept_`:



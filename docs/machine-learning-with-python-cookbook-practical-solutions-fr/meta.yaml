    You have a trained scikit-learn model and want to save it and load it elsewhere.'
- md: "## Solution\n\nSave the model as a pickle file:\n\n```python\n# Load libraries\n\
    import joblib\nfrom sklearn.ensemble import RandomForestClassifier\nfrom sklearn\
    \ import datasets\n\n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\n\
    target = iris.target\n\n# Create decision tree classifier object\nclassifier =\
    \ RandomForestClassifier()\n\n# Train model\nmodel = classifier.fit(features,\
    \ target)\n\n# Save model as pickle file\njoblib.dump(model, \"model.pkl\")\n\
    ['model.pkl']\n```\n\nOnce the model is saved, we can use scikit-learn in our\
    \ destination application (e.g., web application) to load the model:\n\n```python\n\
    # Load model from file\nclassifier = joblib.load(\"model.pkl\")\n```\n\nAnd use\
    \ it to make predictions:\n\n```python\n# Create new observation\nnew_observation\
    \ = [[ 5.2, 3.2, 1.1, 0.1]]\n\n# Predict observation's class\nclassifier.predict(new_observation)\n\
    \narray([0])\n```\n\n## Discussion\n\nThe first step in using a model in production\
    \ is to save that model as a file that can be loaded by another application or\
    \ workflow. We can accomplish this by saving the model as a pickle file, a Python-specific\
    \ data format that enables us to serialize Python objects and write them out to\
    \ files. Specifically, to save the model we use joblib, which is a library extending\
    \ pickle for cases when we have large NumPy arrays—a common occurrence for trained\
    \ models in scikit-learn.\n\nWhen saving scikit-learn models, be aware that saved\
    \ models might not be compatible between versions of scikit-learn; therefore,\
    \ it can be helpful to include the version of scikit-learn used in the model in\
    \ the filename:\n\n```python\n# Import library\nimport sklearn\n\n# Get scikit-learn\
    \ version\nscikit_version = sklearn.__version__\n\n# Save model as pickle file\n\
    joblib.dump(model, \"model_{version}.pkl\".format(version=scikit_version))\n['model_1.2.0.pkl']\n\
    ```\n\n## 23.2 Saving and Loading a TensorFlow Model\n\n### Problem\n\nYou have\
    \ a trained TensorFlow model and want to save it and load it elsewhere.\n\n###\
    \ Solution\n\nSave the model using the TensorFlow saved_model format:\n\n```python\n\

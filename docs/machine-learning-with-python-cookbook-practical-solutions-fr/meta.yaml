    \        super(SimpleNeuralNet, self).__init__()\n        self.sequential = torch.nn.Sequential(\n\
    \            torch.nn.Linear(10, 16),\n            torch.nn.ReLU(),\n        \
    \    torch.nn.Linear(16,16),\n            torch.nn.ReLU(),\n            torch.nn.Linear(16,\
    \ 1),\n            torch.nn.Dropout(0.1), # Drop 10% of neurons\n            torch.nn.Sigmoid(),\n\
    \        )\n\n    def forward(self, x):\n        x = self.sequential(x)\n    \
    \    return x\n\n# Initialize neural network\nnetwork = SimpleNeuralNet()\n\n\
    # Define loss function, optimizer\ncriterion = nn.BCELoss()\noptimizer = RMSprop(network.parameters())\n\
    \n# Define data loader\ntrain_data = TensorDataset(x_train, y_train)\ntrain_loader\
    \ = DataLoader(train_data, batch_size=100, shuffle=True)\n\n# Compile the model\
    \ using torch 2.0's optimizer\nnetwork = torch.compile(network)\n\n# Train neural\
    \ network\nepochs = 5\nfor epoch in range(epochs):\n    for batch_idx, (data,\
    \ target) in enumerate(train_loader):\n        optimizer.zero_grad()\n       \
    \ output = network(data)\n        loss = criterion(output, target)\n        loss.backward()\n\
    \        optimizer.step()\n    # Save the model at the end of every epoch\n  \
    \  torch.save(\n        {\n            'epoch': epoch,\n            'model_state_dict':\
    \ network.state_dict(),\n            'optimizer_state_dict': optimizer.state_dict(),\n\
    \            'loss': loss,\n        },\n        \"model.pt\"\n    )\n    print(\"\
    Epoch:\", epoch+1, \"\\tLoss:\", loss.item())\n```\n\nEpoch: 1        Loss: 0.18791493773460388\n\
    Epoch: 2        Loss: 0.17331615090370178\nEpoch: 3        Loss: 0.1384529024362564\n\
    Epoch: 4        Loss: 0.1435958743095398\nEpoch: 5        Loss: 0.17967987060546875\n\
    \n### 讨论\n\n在现实世界中，神经网络训练数小时甚至数天是很常见的。在此期间，很多事情可能出错：计算机可能断电，服务器可能崩溃，或者不体贴的研究生可能合上你的笔记本电脑。\n\
    \n我们可以使用 `torch.save` 通过在每个 epoch 后保存模型来缓解这个问题。具体来说，在每个 epoch 后，我们将模型保存到 `torch.save`\
    \ 函数的第二个参数指定的位置 `model.pt`。如果我们只包含一个文件名（例如，*model.pt*），该文件将在每个 epoch 被最新的模型覆盖。\n\
    \n可以想象，我们可以引入额外的逻辑来每隔几个 epoch 保存一次模型，仅在损失下降时保存模型，等等。我们甚至可以将这种方法与 PyTorch Lightning\
    \ 中的早停方法结合起来，以确保无论训练在哪个 epoch 结束，我们都能保存一个模型。"

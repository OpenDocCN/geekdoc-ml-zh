    \n原始特征数量: 64\n降维后特征数量: 10\n```\n\n### 讨论\n\nTSVD 与 PCA 类似，事实上，PCA 在其某个步骤中经常使用非截断的*奇异值分解*（SVD）。给定\
    \ $d$ 个特征，SVD 将创建 $d \\times d$ 的因子矩阵，而 TSVD 将返回 $n \\times n$ 的因子，其中 $n$ 由参数预先指定。TSVD\
    \ 的实际优势在于，与 PCA 不同，它适用于稀疏特征矩阵。\n\nTSVD 的一个问题是：由于其使用随机数生成器的方式，输出的符号可能在不同拟合之间翻转。一个简单的解决方法是每个预处理管道只使用一次\
    \ `fit`，然后多次使用 `transform`。\n\n与线性判别分析一样，我们必须指定要输出的特征（成分）数量。这通过 `n_components`\
    \ 参数完成。一个自然的问题是：最佳的成分数是多少？一种策略是将 `n_components` 作为模型选择过程中要优化的超参数（即选择产生最佳训练模型的\
    \ `n_components` 值）。或者，因为 TSVD 提供了原始特征矩阵每个成分所解释的方差比例，我们可以选择解释所需方差量的成分数（95% 和 99%\
    \ 是常见值）。例如，在我们的解决方案中，前三个输出成分解释了原始数据方差的大约 30%：\n\n```python\n# 前三个成分的解释方差比例之和\n\
    tsvd.explained_variance_ratio_[0:3].sum()\n\n0.3003938537287226\n```\n\n我们可以通过创建一个函数来自动化这个过程，该函数运行\
    \ `n_components` 设置为比原始特征数少一的 TSVD，然后计算解释原始数据所需方差量的成分数：\n\n```python\n# 创建并运行一个成分数比特征数少一的\
    \ TSVD\ntsvd = TruncatedSVD(n_components=features_sparse.shape[1]-1)\nfeatures_tsvd\
    \ = tsvd.fit(features)\n\n# 解释方差比例列表\ntsvd_var_ratios = tsvd.explained_variance_ratio_\n\

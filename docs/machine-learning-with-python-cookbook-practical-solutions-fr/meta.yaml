    \n## 5.0 Introduction\n\nIt is often useful to measure objects not in terms of\
    \ their quantity but in terms of some quality. We frequently represent qualitative\
    \ information in categories such as gender, colors, or brand of car. However,\
    \ not all categorical data is the same. Sets of categories with no intrinsic ordering\
    \ are called *nominal*. Examples of nominal categories include:\n\n- Blue, Red,\
    \ Green\n- Man, Woman\n- Banana, Strawberry, Apple\n\nIn contrast, when a set\
    \ of categories has some natural ordering we refer to it as *ordinal*. For example:\n\
    \n- Low, Medium, High\n- Young, Old\n- Agree, Neutral, Disagree\n\nFurthermore,\
    \ categorical information is often represented in data as a vector or column of\
    \ strings (e.g., \"Maine\", \"Texas\", \"Delaware\"). The problem is that most\
    \ machine learning algorithms require inputs to be numerical values.\n\nThe k-nearest\
    \ neighbors algorithm is an example of an algorithm that requires numerical data.\
    \ One step in the algorithm is calculating the distances between observations—often\
    \ using Euclidean distance:\n\n$\\sqrt{\\sum_{i=1}^{n}(x_i - y_i)^2}$\n\nwhere\
    \ $x$ and $y$ are two observations and subscript $i$ denotes the value for the\
    \ observations' $i$th feature. However, the distance calculation obviously is\
    \ impossible if the value of $x_i$ is a string (e.g., \"Texas\"). Instead, we\
    \ need to convert the string into some numerical format so that it can be input\
    \ into the Euclidean distance equation. Our goal is to transform the data in a\
    \ way that properly captures the information in the categories (ordinality, relative\
    \ intervals between categories, etc.). In this chapter we will cover techniques\
    \ for making this transformation as well as overcoming other challenges often\
    \ encountered when handling categorical data.\n\n## 5.1 Encoding Nominal Categorical\

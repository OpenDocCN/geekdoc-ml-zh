    \ ['Alex', 'Amy', 'Allen'],\n          'last': ['Anderson', 'Ackerman', 'Ali']}\n\
    dataframe_a = pd.DataFrame(data_a, columns = ['id', 'first', 'last'])\n\n# Create\

  md: "# Solution\n\nUse *k*-means clustering:\n\n```\n# Load libraries\nfrom sklearn\
    \ import datasets\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.cluster\
    \ import KMeans\n\n# Load data\niris = datasets.load_iris()\nfeatures = iris.data\n\
    \n# Standardize features\nscaler = StandardScaler()\nfeatures_std = scaler.fit_transform(features)\n\
    \n# Create k-means object\ncluster = KMeans(n_clusters=3, random_state=0, n_init=\"\
    auto\")\n\n# Train model\nmodel = cluster.fit(features_std)\n```\n\n# Discussion\n\
    \nK-means clustering is one of the most common clustering techniques. In k-means\
    \ clustering, the algorithm attempts to group observations into *k* groups, with\
    \ each group having roughly equal variance. The number of groups, *k*, is specified\
    \ by the user as a hyperparameter. Specifically, in k-means:\n\n+   1. *k* cluster\
    \ “center” points are created at random locations.\n2. For each observation:\n\
    \   a. The distance between each observation and the *k* center points is calculated.\n\
    \   b. The observation is assigned to the cluster of the nearest center point.\n\
    3. The center points are moved to the means (i.e., centers) of their respective\
    \ clusters.\n4. Steps 2 and 3 are repeated until no observation changes in cluster\
    \ membership.\n\nAt this point the algorithm is considered converged and stops.\n\
    \nIt is important to note three things about k-means. First, k-means clustering\
    \ assumes the clusters are convex shaped (e.g., a circle, a sphere). Second, all\
    \ features are equally scaled. In our solution, we standardized the features to\
    \ meet this assumption. Third, the groups are balanced (i.e., have roughly the\
    \ same number of observations). If we suspect that we cannot meet these assumptions,\
    \ we might try other clustering approaches."

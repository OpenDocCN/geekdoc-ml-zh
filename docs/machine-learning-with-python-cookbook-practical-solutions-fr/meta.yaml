    # Discussion


    Sometimes a feature''s effect on our target variable is at least partially dependent
    on another feature. For example, imagine a simple coffee-based example where we
    have two binary features—the presence of sugar (sugar) and whether or not we have
    stirred (stirred)—and we want to predict if the coffee tastes sweet. Just putting
    sugar in the coffee (sugar=1, stirred=0) won''t make the coffee taste sweet (all
    the sugar is at the bottom!) and just stirring the coffee without adding sugar
    (sugar=0, stirred=1) won''t make it sweet either. Instead it is the interaction
    of putting sugar in the coffee and stirring the coffee (sugar=1, stirred=1) that
    will make a coffee taste sweet. The effects of sugar and stirred on sweetness
    are dependent on each other. In this case we say there is an interaction effect
    between the features sugar and stirred.


    We can account for interaction effects by including a new feature comprising the
    product of corresponding values from the interacting features:


    $\hat{y} = \hat{\beta}_0 + \hat{\beta}_1x_1 + \hat{\beta}_2x_2 + \hat{\beta}_3x_1x_2
    + \epsilon$


    where $x_1$ and $x_2$ are the values of the sugar and stirred, respectively, and
    $x_1x_2$ represents the interaction between the two.


    In our solution, we used a dataset containing only two features. Here is the first
    observation''s values for each of those features:



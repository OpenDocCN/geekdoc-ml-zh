    \nDetecting outliers is unfortunately more of an art than a science. However,\
    \ a common method is to assume the data is normally distributed and, based on\
    \ that assumption, “draw” an ellipse around the data, classifying any observation\
    \ inside the ellipse as an inlier (labeled as 1) and any observation outside the\
    \ ellipse as an outlier (labeled as -1):\n\n```\n# Load libraries\nimport numpy\
    \ as np\nfrom sklearn.covariance import EllipticEnvelope\nfrom sklearn.datasets\
    \ import make_blobs\n\n# Create simulated data\nfeatures, _ = make_blobs(n_samples\
    \ = 10,\n                         n_features = 2,\n                         centers\
    \ = 1,\n                         random_state = 1)\n```"

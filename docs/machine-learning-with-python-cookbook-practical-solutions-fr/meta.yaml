  - "[PAGE 84]\n\n# CHAPTER 4\nHandling Numerical Data\n\n# 4.0 Introduction\n\nQuantitative\
    \ data is the measurement of something—whether class size, monthly sales, or student\
    \ scores. The natural way to represent these quantities is numerically (e.g.,\
    \ 29 students, $529,392 in sales). In this chapter, we will cover numerous strategies\
    \ for transforming raw numerical data into features purpose-built for machine\
    \ learning algorithms.\n\n# 4.1 Rescaling a Feature\n\n# Problem\n\nYou need to\
    \ rescale the values of a numerical feature to be between two values.\n\n# Solution\n\
    \nUse scikit-learn's `MinMaxScaler` to rescale a feature array:\n\n```\n# Load\
    \ libraries\nimport numpy as np\nfrom sklearn import preprocessing\n\n# Create\
    \ feature\nfeature = np.array([[-500.5],\n                    [-100.1],\n    \
    \                [0],\n                    [100.1],\n                    [900.9]])\n\
    \n# Create scaler\nminmax_scale = preprocessing.MinMaxScaler(feature_range=(0,\

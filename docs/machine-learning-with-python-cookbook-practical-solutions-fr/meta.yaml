    \n## See Also\n\n- make_regression documentation\n- make_classification documentation\n\
    - make_blobs documentation\n\n## 2.3 Loading a CSV File\n\n### Problem\n\nYou\
    \ need to import a comma-separated value (CSV) file.\n\n### Solution\n\nUse the\
    \ pandas library's `read_csv` to load a local or hosted CSV file into a pandas\
    \ DataFrame:\n\n```\n# Load library\nimport pandas as pd\n\n# Create URL\nurl\
    \ = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.csv'\n\n\
    # Load dataset\ndataframe = pd.read_csv(url)\n\n# View first two rows\ndataframe.head(2)\n\
    ```\n\n| | integer | datetime | category |\n|---|---|---|---|\n| 0 | 5 | 2015-01-01\
    \ 00:00:00 | 0 |\n| 1 | 5 | 2015-01-01 00:00:01 | 0 |\n\n### Discussion\n\nThere\
    \ are two things to note about loading CSV files. First, it is often useful to\
    \ take a quick look at the contents of the file before loading. It can be very\
    \ helpful to see how a dataset is structured beforehand and what parameters we\
    \ need to set to load in the file. Second, `read_csv` has over 30 parameters and\
    \ therefore the documentation can be daunting. Fortunately, those parameters are\
    \ mostly there to allow it to handle a wide variety of CSV formats.\n\nCSV files\
    \ get their names from the fact that the values are literally separated by commas\
    \ (e.g., one row might be `2,\"2015-01-01 00:00:00\",0`); however, it is common\
    \ for CSV files to use other separators, such as tabs (which are referred to as\
    \ TSV files).\n\nThe pandas sep parameter allows us to define the delimiter used\
    \ in the file. Although it is not always the case, a common formatting issue with\
    \ CSV files is that the first line of the file is used to define column headers\
    \ (e.g., integer, datetime, category in our solution). The header parameter allows\
    \ us to specify if or where a header row exists. If a header row does not exist,\
    \ we set header=None.\n\nThe read_csv function returns a pandas DataFrame: a common\
    \ and useful object for working with tabular data that we'll cover in more depth\
    \ throughout this book.\n\n## 2.4 Loading an Excel File\n\n### Problem\n\nYou\
    \ need to import an Excel spreadsheet.\n\n### Solution\n\nUse the pandas library's\
    \ read_excel to load an Excel spreadsheet:\n\n```\n# Load library\nimport pandas\
    \ as pd\n\n# Create URL\nurl = 'https://raw.githubusercontent.com/chrisalbon/sim_data/master/data.xlsx'\n\
    \n# Load data\ndataframe = pd.read_excel(url, sheet_name=0, header=0)\n\n# View\
    \ the first two rows\ndataframe.head(2)\n```\n\n| integer | datetime | category\
    \ |\n|---|---|---|\n| 5 | 2015-01-01 00:00:00 | 0 |\n| 5 | 2015-01-01 00:00:01\
    \ | 0 |\n| 9 | 2015-01-01 00:00:02 | 0 |\n\n### Discussion\n\nThis solution is\
    \ similar to our solution for reading CSV files. The main difference is the additional\
    \ parameter, sheet_name, that specifies which sheet in the Excel file we wish\
    \ to load. sheet_name can accept both strings, containing the name of the sheet,\
    \ and integers, pointing to sheet positions (zero-indexed). If we need to load\
    \ multiple sheets, we include them as a list. For example, sheet_name=[0,1,2,\
    \ \"Monthly Sales\"] will return a dictionary of pandas DataFrames containing\
    \ the first, second, and third sheets, and the sheet named Monthly Sales."

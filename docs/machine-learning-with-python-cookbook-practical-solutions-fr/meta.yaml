    where:


    +   - $P(y \mid x_1, \dots, x_j)$ is called the *posterior* and is the probability
    that an observation is class $y$ given the observation''s values for the $j$ features,
    $x_1, \dots, x_j$.

    - $P(x_1, \dots, x_j \mid y)$ is called *likelihood* and is the likelihood of
    an observation''s values for features $x_1, \dots, x_j$ given their class, $y$.

    - $P(y)$ is called the *prior* and is our belief for the probability of class
    $y$ before looking at the data.

    - $P(x_1, \dots, x_j)$ is called the *marginal probability*.


    In naive Bayes, we compare an observation''s posterior values for each possible
    class. Specifically, because the marginal probability is constant across these
    comparisons, we compare the numerators of the posterior for each class. For each
    observation, the class with the greatest posterior numerator becomes the predicted
    class, $\hat{y}$.


    There are two important things to note about naive Bayes classifiers. First, for
    each feature in the data, we have to assume the statistical distribution of the
    likelihood, $P(x_j \mid y)$. The common distributions are the normal (Gaussian),
    multinomial, and Bernoulli distributions. The distribution chosen is often determined
    by the nature of features (continuous, binary, etc.). Second, naive Bayes gets
    its name because we assume that each feature, and its resulting likelihood, is
    independent. This “naive” assumption is frequently wrong yet in practice does
    little to prevent building high-quality classifiers.


    In this chapter we will cover using scikit-learn to train three types of naive
    Bayes classifiers using three different likelihood distributions. Afterwards,
    we will learn to calibrate the predictions from naive Bayes models to make them
    interpretable.


    # 18.1 Training a Classifier for Continuous Features


    # Problem


    You have only continuous features and you want to train a naive Bayes classifier.


    # Solution


    Use a Gaussian naive Bayes classifier in scikit-learn:


    ```

    # Load libraries

    from sklearn import datasets

    from sklearn.naive_bayes import GaussianNB


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    ```'

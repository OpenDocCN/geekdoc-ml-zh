    them into time series data.


    # Solution


    Use pandas'' `to_datetime` with the format of the date and/or time specified in
    the `format` parameter:


    ```

    # Load libraries

    import numpy as np

    import pandas as pd


    # Create strings

    date_strings = np.array([''03-04-2005 11:35 PM'',

    ```'

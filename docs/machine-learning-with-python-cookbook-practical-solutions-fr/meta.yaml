  md: '# CHAPTER 14


    # Trees and Forests


    # 14.0 Introduction


    Tree-based learning algorithms are a broad and popular family of related non-parametric,
    supervised methods for both classification and regression. The basis of tree-based
    learners is the *decision tree*, wherein a series of decision rules (e.g., “If
    a person’s credit score is greater than 720…”) are chained. The result looks vaguely
    like an upside-down tree, with the first decision rule at the top and subsequent
    decision rules spreading out below. In a decision tree, every decision rule occurs
    at a decision node, with the rule creating branches leading to new nodes. A branch
    without a decision rule at the end is called a *leaf*.


    One reason for the popularity of tree-based models is their interpretability.
    In fact, decision trees can literally be drawn out in their complete form (see
    Recipe 14.3) to create a highly intuitive model. From this basic tree system comes
    a wide variety of extensions from random forests to stacking. In this chapter
    we will cover how to train, handle, adjust, visualize, and evaluate a number of
    tree-based models.


    # 14.1 Training a Decision Tree Classifier


    # Problem


    You need to train a classifier using a decision tree.


    # Solution


    Use scikit-learn’s `DecisionTreeClassifier`:'
  merge: -1
  pgno: 258
- img_proc: true
  md: '```

    # Load libraries

    from sklearn.tree import DecisionTreeClassifier

    from sklearn import datasets


    # Load data

    iris = datasets.load_iris()

    features = iris.data

    target = iris.target


    # Create decision tree classifier object

    decisiontree = DecisionTreeClassifier(random_state=0)


    # Train model

    model = decisiontree.fit(features, target)

    ```


    # Discussion


    Decision tree learners attempt to find a decision rule that produces the greatest
    decrease in impurity at a node. While there are a number of measurements of impurity,
    by default DecisionTreeClassifier uses Gini impurity:


    $$G(t) = 1 - \sum_{i=1}^{c} p_i^2$$


    where $G(t)$ is the Gini impurity at node $t$, and $p_i$ is the proportion of
    observations of class $c$ at node $t$. This process of finding the decision rules
    that create splits to decrease impurity is repeated recursively until all leaf
    nodes are pure (i.e., contain only one class) or some arbitrary cutoff is reached.


    In scikit-learn, DecisionTreeClassifier operates like other learning methods;
    after the model is trained using fit, we can use the model to predict the class
    of an observation:


    ```

    # Make new observation

    observation = [[ 5, 4, 3, 2]]


    # Predict observation''s class

    model.predict(observation)


    array([1])

    ```


    We can also see the predicted class probabilities of the observation:


    ```

    # View predicted class probabilities for the three classes

    model.predict_proba(observation)


    array([[0., 1., 0.]])

    ```'

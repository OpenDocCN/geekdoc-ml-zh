    \ Clustering\n\n# Problem\n\nYou want to cluster observations so that similar\
    \ observations are grouped together.\n\n# Solution\n\nIf you know that you have\
    \ $k$ groups, you can use k-means clustering to group similar observations and\
    \ output a new feature containing each observation's group membership:\n\n```\n\
    # Load libraries\nimport pandas as pd\nfrom sklearn.datasets import make_blobs\n\
    from sklearn.cluster import KMeans\n\n# Make simulated feature matrix\nfeatures,\
    \ _ = make_blobs(n_samples = 50,\n                         n_features = 2,\n \
    \                        centers = 3,\n                         random_state =\
    \ 1)\n\n# Create DataFrame\ndataframe = pd.DataFrame(features, columns=[\"feature_1\"\
    , \"feature_2\"])\n\n# Make k-means clusterer\nclusterer = KMeans(3, random_state=0)\n\
    \n# Fit clusterer\nclusterer.fit(features)\n\n# Predict values\ndataframe[\"group\"\
    ] = clusterer.predict(features)\n\n# View first few observations\ndataframe.head(5)\n\
    ```\n\n| | feature_1 | feature_2 | group |\n|---|---|---|---|\n| 0 | -9.877554\

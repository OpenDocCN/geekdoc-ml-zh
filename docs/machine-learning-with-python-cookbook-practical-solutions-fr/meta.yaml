  md: "distance calculated will be biased toward the former. In our solution we addressed\
    \ this potential issue by standardizing the features using StandardScaler.\n\n\
    # 15.2 Creating a K-Nearest Neighbors Classifier\n\n# Problem\n\nGiven an observation\
    \ of unknown class, you need to predict its class based on the class of its neighbors.\n\
    \n# Solution\n\nIf the dataset is not very large, use KNeighborsClassifier:\n\n\
    ```\n# Load libraries\nfrom sklearn.neighbors import KNeighborsClassifier\nfrom\
    \ sklearn.preprocessing import StandardScaler\nfrom sklearn import datasets\n\n\
    # Load data\niris = datasets.load_iris()\nX = iris.data\ny = iris.target\n\n#\
    \ Create standardizer\nstandardizer = StandardScaler()\n\n# Standardize features\n\
    X_std = standardizer.fit_transform(X)\n\n# Train a KNN classifier with 5 neighbors\n\
    knn = KNeighborsClassifier(n_neighbors=5, n_jobs=-1).fit(X_std, y)\n\n# Create\
    \ two observations\nnew_observations = [[ 0.75,  0.75,  0.75,  0.75],\n      \
    \              [ 1,  1,  1,  1]]\n\n# Predict the class of two observations\n\
    knn.predict(new_observations)\n\narray([1, 2])\n```\n\n# Discussion\n\nIn KNN,\
    \ given an observation, $x_u$, with an unknown target class, the algorithm first\
    \ identifies the $k$ closest observations (sometimes called $x_u$'s *neighborhood*)\
    \ based on some distance metric (e.g., Euclidean distance), then these $k$ observations\
    \ “vote” based on their class, and the class that wins the vote is $x_u$'s predicted\
    \ class. More formally, the probability $x_u$ of some class $j$ is:"
  merge: -1
  pgno: 281
- img_proc: true
  md: "$$\\frac{1}{k} \\sum_{i \\in v} I(y_i = j)$$\n\nwhere v is the $k$ observation\
    \ in $x_u$'s neighborhood, $y_i$ is the class of the $i$th observation, and $I$\
    \ is an indicator function (i.e., 1 is true, 0 otherwise). In scikit-learn we\
    \ can see these probabilities using `predict_proba`: \n\n```\n# View probability\
    \ that each observation is one of three classes\nknn.predict_proba(new_observations)\n\
    \narray([[0. , 0.6, 0.4],\n       [0. , 0. , 1. ]])\n```\n\nThe class with the\
    \ highest probability becomes the predicted class. For example, in the preceding\
    \ output, the first observation should be class 1 ($Pr = 0.6$) while the second\
    \ observation should be class 2 ($Pr = 1$), and this is just what we see: \n\n\
    ```\nknn.predict(new_observations)\n\narray([1, 2])\n```\n\n`KNeighborsClassifier`\
    \ contains a number of important parameters to consider. First, `metric` sets\
    \ the distance metric used. Second, `n_jobs` determines how many of the computer's\
    \ cores to use. Because making a prediction requires calculating the distance\
    \ from a point to every single point in the data, using multiple cores is highly\
    \ recommended. Third, `algorithm` sets the method used to calculate the nearest\
    \ neighbors. While there are real differences in the algorithms, by default `KNeighborsClassifier`\
    \ attempts to auto-select the best algorithm so you often don't need to worry\
    \ about this parameter. Fourth, by default `KNeighborsClassifier` works how we\
    \ described previously, with each observation in the neighborhood getting one\
    \ vote; however, if we set the `weights` parameter to `distance`, the closer observations'\
    \ votes are weighted more than observations farther away. Intuitively this make\
    \ sense, since more similar neighbors might tell us more about an observation's\
    \ class than others.\n\nFinally, because distance calculations treat all features\
    \ as if they are on the same scale, it is important to standardize the features\
    \ prior to using a KNN classifier.\n\n# 15.3 Identifying the Best Neighborhood\
    \ Size\n\n# Problem\n\nYou want to select the best value for $k$ in a k-nearest\
    \ neighbors classifier."

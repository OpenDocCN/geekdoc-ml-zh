  md: "Alternatively, we can use scikit-learn's `SimpleImputer` class from the `imputer`\
    \ module to fill in missing values with the feature's mean, median, or most frequent\
    \ value. However, we will typically get worse results than with KNN:\n\n```\n\
    # Load libraries\nimport numpy as np\nfrom sklearn.impute import SimpleImputer\n\
    from sklearn.preprocessing import StandardScaler\nfrom sklearn.datasets import\
    \ make_blobs\n\n# Make a simulated feature matrix\nfeatures, _ = make_blobs(n_samples\
    \ = 1000,\n                         n_features = 2,\n                        \
    \ random_state = 1)\n\n# Standardize the features\nscaler = StandardScaler()\n\
    standardized_features = scaler.fit_transform(features)\n\n# Replace the first\

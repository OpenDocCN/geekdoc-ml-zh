- md: "## Discussion\n\nThe data we need to use is often complex; it doesn't always\
    \ come in one piece. Instead, in the real world, we're usually faced with disparate\
    \ datasets from multiple database queries or files. To get all that data into\
    \ one place, we can load each data query or data file into pandas as individual\
    \ DataFrames and then merge them into a single DataFrame.\n\nThis process might\
    \ be familiar to anyone who has used SQL, a popular language for doing merging\
    \ operations (called *joins*). While the exact parameters used by pandas will\
    \ be different, they follow the same general patterns used by other software languages\
    \ and tools.\n\nThere are three aspects to specify with any `merge` operation.\
    \ First, we have to specify the two DataFrames we want to merge. In the solution,\
    \ we named them `dataframe_employees` and `dataframe_sales`. Second, we have to\
    \ specify the name(s) of the columns to merge on—that is, the columns whose values\
    \ are shared between the two DataFrames. For example, in our solution both DataFrames\
    \ have a column named `employee_id`. To merge the two DataFrames we will match\
    \ the values in each DataFrame's `employee_id` column. If these two columns use\
    \ the same name, we can use the `on` parameter. However, if they have different\
    \ names, we can use `left_on` and `right_on`.\n\nWhat is the left and right DataFrame?\
    \ The left DataFrame is the first one we specified in `merge`, and the right DataFrame\
    \ is the second one. This language comes up again in the next sets of parameters\
    \ we will need.\n\nThe last aspect, and most difficult for some people to grasp,\
    \ is the type of merge operation we want to conduct. This is specified by the\
    \ `how` parameter. `merge` supports the four main types of joins:\n\n*Inner*\n\
    Return only the rows that match in both DataFrames (e.g., return any row with\
    \ an `employee_id` value appearing in both `dataframe_employees` and `dataframe_sales`).\n\
    \n*Outer*\nReturn all rows in both DataFrames. If a row exists in one DataFrame\
    \ but not in the other DataFrame, fill NaN values for the missing values (e.g.,\
    \ return all rows in both `dataframe_employees` and `dataframe_sales`).\n\n*Left*\n\
    Return all rows from the left DataFrame but only rows from the right DataFrame\
    \ that match with the left DataFrame. Fill NaN values for the missing values (e.g.,\
    \ return all rows from `dataframe_employees` but only rows from `dataframe_sales`\
    \ that have a value for `employee_id` that appears in `dataframe_employees`).\n\
    \n*Right*\nReturn all rows from the right DataFrame but only rows from the left\
    \ DataFrame that match with the right DataFrame. Fill NaN values for the missing\
    \ values (e.g., return all rows from `dataframe_sales` but only rows from `dataframe_employees`\
    \ that have a value for `employee_id` that appears in `dataframe_sales`).\n\n\
    If you did not understand all of that, I encourage you to play around with the\
    \ `how` parameter in your code and see how it affects what `merge` returns.\n\n\
    ## See Also\n\n- A Visual Explanation of SQL Joins\n- pandas documentation: Merge,\
    \ join, concatenate and compare\n\n# CHAPTER 4\n## Handling Numerical Data\n\n\
    ## 4.0 Introduction\n\nQuantitative data is the measurement of something—whether\
    \ class size, monthly sales, or student scores. The natural way to represent these\
    \ quantities is numerically (e.g., 29 students, $529,392 in sales). In this chapter,\
    \ we will cover numerous strategies for transforming raw numerical data into features\
    \ purpose-built for machine learning algorithms.\n\n## 4.1 Rescaling a Feature\n\
    \n### Problem\n\nYou need to rescale the values of a numerical feature to be between\
    \ two values.\n\n### Solution\n\nUse scikit-learn's `MinMaxScaler` to rescale\
    \ a feature array:\n\n```\n# Load libraries\nimport numpy as np\nfrom sklearn\
    \ import preprocessing\n\n# Create feature\nfeature = np.array([[-500.5],\n  \
    \                  [-100.1],\n                    [0],\n                    [100.1],\n\
    \                    [900.9]])\n\n# Create scaler\nminmax_scale = preprocessing.MinMaxScaler(feature_range=(0,\
    \ 1))\n```\n\n```\n# Scale feature\nscaled_feature = minmax_scale.fit_transform(feature)\n\
    \n# Show feature\nscaled_feature\n\narray([[ 0.        ],\n       [ 0.28571429],\n\
    \       [ 0.35714286],\n       [ 0.42857143],\n       [ 1.        ]])\n```\n\n\
    ### Discussion\n\n*Rescaling* is a common preprocessing task in machine learning.\
    \ Many of the algorithms described later in this book will assume all features\
    \ are on the same scale, typically 0 to 1 or -1 to 1. There are a number of rescaling\
    \ techniques, but one of the simplest is called *min-max scaling*. Min-max scaling\
    \ uses the minimum and maximum values of a feature to rescale values to within\
    \ a range. Specifically, min-max calculates:\n\n$$x'_i = \\frac{x_i - \\min(x)}{\\\
    max(x) - \\min(x)}$$\n\nwhere $x$ is the feature vector, $x_i$ is an individual\
    \ element of feature $x$, and $x'_i$ is the rescaled element. In our example,\
    \ we can see from the outputted array that the feature has been successfully rescaled\
    \ to between 0 and 1:\n\n```\narray([[ 0.        ],\n       [ 0.28571429],\n \
    \      [ 0.35714286],\n       [ 0.42857143],\n       [ 1.        ]])\n```\n\n\
    scikit-learn's `MinMaxScaler` offers two options to rescale a feature. One option\
    \ is to use `fit` to calculate the minimum and maximum values of the feature,\
    \ and then use `transform` to rescale the feature. The second option is to use\
    \ `fit_transform` to do both operations at once. There is no mathematical difference\
    \ between the two options, but there is sometimes a practical benefit to keeping\
    \ the operations separate because it allows us to apply the same transformation\
    \ to different *sets* of the data.\n\n### See Also\n\n- Feature scaling, Wikipedia\n\
    - About Feature Scaling and Normalization, Sebastian Raschka\n\n## 4.2 Standardizing\
    \ a Feature\n\n### Problem\n\nYou want to transform a feature to have a mean of\
    \ 0 and a standard deviation of 1.\n\n### Solution\n\nscikit-learn's StandardScaler\
    \ performs both transformations:\n\n```\n# Load libraries\nimport numpy as np\n\
    from sklearn import preprocessing\n\n# Create feature\nx = np.array([[-1000.1],\n\
    \               [-200.2],\n               [500.5],\n               [600.6],\n\
    \               [9000.9]])\n\n# Create scaler\nscaler = preprocessing.StandardScaler()\n\
    \n# Transform the feature\nstandardized = scaler.fit_transform(x)\n\n# Show feature\n\
    standardized\narray([[-0.76058269],\n       [-0.54177196],\n       [-0.35009716],\n\
    \       [-0.32271504],\n       [ 1.97516685]])\n```\n\n### Discussion\n\nA common\
    \ alternative to the min-max scaling discussed in Recipe 4.1 is rescaling of features\
    \ to be approximately standard normally distributed. To achieve this, we use standardization\
    \ to transform the data such that it has a mean, $\\bar{x}$, of 0 and a standard\
    \ deviation, $\\sigma$, of 1. Specifically, each element in the feature is transformed\
    \ so that:\n\n$x'_i = \\frac{x_i - \\bar{x}}{\\sigma}$\n\nwhere $x'_i$ is our\
    \ standardized form of $x_i$. The transformed feature represents the number of\
    \ standard deviations of the original value from the feature's mean value (also\
    \ called a *z-score* in statistics).\n\nStandardization is a common go-to scaling\
    \ method for machine learning preprocessing and, in my experience, is used more\
    \ often than min-max scaling. However, it depends on the learning algorithm. For\
    \ example, principal component analysis often works better using standardization,\
    \ while min-max scaling is often recommended for neural networks (both algorithms\
    \ are discussed later in this book). As a general rule, I'd recommend defaulting\
    \ to standardization unless you have a specific reason to use an alternative.\n\
    \nWe can see the effect of standardization by looking at the mean and standard\
    \ deviation of our solution's output:\n\n```\n# Print mean and standard deviation\n\
    print(\"Mean:\", round(standardized.mean()))\nprint(\"Standard deviation:\", standardized.std())\n\
    \nMean: 0.0\nStandard deviation: 1.0\n```\n\nIf our data has significant outliers,\
    \ it can negatively impact our standardization by affecting the feature's mean\
    \ and variance. In this scenario, it is often helpful to instead rescale the feature\
    \ using the median and quartile range. In scikit-learn, we do this using the `RobustScaler`\
    \ method:\n\n```\n# Create scaler\nrobust_scaler = preprocessing.RobustScaler()\n\
    \n# Transform feature\nrobust_scaler.fit_transform(x)\n\narray([[ -1.87387612],\n\
    \       [ -0.875      ],\n       [  0.         ],\n       [  0.125      ],\n \
    \      [ 10.61488511]])\n```\n\n## 4.3 Normalizing Observations\n\n### Problem\n\
    \nYou want to rescale the feature values of observations to have unit norm (a\
    \ total length of 1)."
  mdcn: "## 讨论\n\n我们所需使用的数据往往很复杂；它并不总是以单一形式出现。相反，在现实世界中，我们通常面对的是来自多个数据库查询或文件的、各不相同的数据集。为了将所有这些数据汇集到一处，我们可以将每个数据查询或数据文件作为独立的DataFrame加载到pandas中，然后将它们合并成一个单一的DataFrame。\n\
    \n对于任何使用过SQL（一种流行的用于执行合并操作（称为*连接*）的语言）的人来说，这个过程可能很熟悉。虽然pandas使用的具体参数会有所不同，但它们遵循与其他软件语言和工具相同的一般模式。\n\
    \n任何`merge`操作都需要指定三个方面。首先，我们必须指定要合并的两个DataFrame。在解决方案中，我们将它们命名为`dataframe_employees`和`dataframe_sales`。其次，我们必须指定要合并的列的名称——即两个DataFrame之间共享值的列。例如，在我们的解决方案中，两个DataFrame都有一个名为`employee_id`的列。为了合并这两个DataFrame，我们将匹配每个DataFrame的`employee_id`列中的值。如果这两列使用相同的名称，我们可以使用`on`参数。但是，如果它们有不同的名称，我们可以使用`left_on`和`right_on`。\n\
    \n什么是左DataFrame和右DataFrame？左DataFrame是我们在`merge`中指定的第一个，右DataFrame是第二个。这个术语在我们接下来需要的参数集中会再次出现。\n\
    \n最后一个方面，也是对某些人来说最难理解的，是我们想要执行的合并操作类型。这由`how`参数指定。`merge`支持四种主要的连接类型：\n\n*内连接*\n\
    仅返回两个DataFrame中匹配的行（例如，返回`employee_id`值同时出现在`dataframe_employees`和`dataframe_sales`中的任何行）。\n\
    \n*外连接*\n返回两个DataFrame中的所有行。如果某行存在于一个DataFrame中但不存在于另一个DataFrame中，则为缺失值填充NaN值（例如，返回`dataframe_employees`和`dataframe_sales`中的所有行）。\n\
    \n*左连接*\n返回左DataFrame的所有行，但仅返回与左DataFrame匹配的右DataFrame的行。为缺失值填充NaN值（例如，返回`dataframe_employees`的所有行，但仅返回`dataframe_sales`中`employee_id`值出现在`dataframe_employees`中的行）。\n\
    \n*右连接*\n返回右DataFrame的所有行，但仅返回与右DataFrame匹配的左DataFrame的行。为缺失值填充NaN值（例如，返回`dataframe_sales`的所有行，但仅返回`dataframe_employees`中`employee_id`值出现在`dataframe_sales`中的行）。\n\
    \n如果你没有完全理解所有这些，我鼓励你在代码中尝试使用`how`参数，看看它如何影响`merge`的返回结果。\n\n## 另请参阅\n\n- SQL连接的可视化解释\n\
    - pandas文档：合并、连接、拼接和比较\n\n# 第4章\n## 处理数值数据\n\n## 4.0 引言\n\n定量数据是对某事物的测量——无论是班级规模、月销售额还是学生成绩。表示这些数量的自然方式是数值形式（例如，29名学生，$529,392的销售额）。在本章中，我们将介绍多种将原始数值数据转换为专为机器学习算法设计的特征的策略。\n\
    \n## 4.1 重新缩放特征\n\n### 问题\n\n你需要将数值特征的值重新缩放到两个值之间。\n\n### 解决方案\n\n使用scikit-learn的`MinMaxScaler`重新缩放特征数组：\n\
    \n```\n# 加载库\nimport numpy as np\nfrom sklearn import preprocessing\n\n# 创建特征\n\
    feature = np.array([[-500.5],\n                    [-100.1],\n               \
    \     [0],\n                    [100.1],\n                    [900.9]])\n\n# 创建缩放器\n\
    minmax_scale = preprocessing.MinMaxScaler(feature_range=(0, 1))\n```\n\n```\n\
    # 缩放特征\nscaled_feature = minmax_scale.fit_transform(feature)\n\n# 显示特征\nscaled_feature\n\
    \narray([[ 0.        ],\n       [ 0.28571429],\n       [ 0.35714286],\n      \
    \ [ 0.42857143],\n       [ 1.        ]])\n```\n\n### 讨论\n\n*重新缩放*是机器学习中常见的预处理任务。本书后面描述的许多算法都将假设所有特征处于相同的尺度上，通常是0到1或-1到1。有多种重新缩放技术，但最简单的一种称为*最小-最大缩放*。最小-最大缩放使用特征的最小值和最大值将值重新缩放到某个范围内。具体来说，最小-最大缩放计算：\n\
    \n$$x'_i = \\frac{x_i - \\min(x)}{\\max(x) - \\min(x)}$$\n\n其中$x$是特征向量，$x_i$是特征$x$的单个元素，$x'_i$是重新缩放后的元素。在我们的例子中，从输出的数组可以看出，特征已成功重新缩放到0到1之间：\n\
    \n```\narray([[ 0.        ],\n       [ 0.28571429],\n       [ 0.35714286],\n \
    \      [ 0.42857143],\n       [ 1.        ]])\n```\n\nscikit-learn的`MinMaxScaler`提供了两种重新缩放特征的选项。一种选项是使用`fit`计算特征的最小值和最大值，然后使用`transform`重新缩放特征。第二种选项是使用`fit_transform`同时执行这两个操作。这两种选项在数学上没有区别，但有时将操作分开有实际好处，因为它允许我们将相同的转换应用于不同的数据*集*。\n\
    \n### 另请参阅\n\n- 特征缩放，维基百科\n- 关于特征缩放和归一化，Sebastian Raschka\n\n## 4.2 标准化特征\n\n\
    ### 问题\n\n你希望将特征转换为均值为0、标准差为1。\n\n### 解决方案\n\nscikit-learn的StandardScaler执行这两种转换：\n\
    \n```\n# 加载库\nimport numpy as np\nfrom sklearn import preprocessing\n\n# 创建特征\n\
    x = np.array([[-1000.1],\n               [-200.2],\n               [500.5],\n\
    \               [600.6],\n               [9000.9]])\n\n# 创建缩放器\nscaler = preprocessing.StandardScaler()\n\
    \n# 转换特征\nstandardized = scaler.fit_transform(x)\n\n# 显示特征\nstandardized\narray([[-0.76058269],\n\
    \       [-0.54177196],\n       [-0.35009716],\n       [-0.32271504],\n       [\
    \ 1.97516685]])\n```\n\n### 讨论\n\n除了4.1节讨论的最小-最大缩放，一个常见的替代方法是将特征重新缩放为近似标准正态分布。为了实现这一点，我们使用标准化来转换数据，使其具有均值$\\\
    bar{x}$为0和标准差$\\sigma$为1。具体来说，特征中的每个元素被转换为：\n\n$x'_i = \\frac{x_i - \\bar{x}}{\\\
    sigma}$\n\n其中$x'_i$是$x_i$的标准化形式。转换后的特征表示原始值与特征均值之间的标准差数（在统计学中也称为*z分数*）。\n\n标准化是机器学习预处理中常用的首选缩放方法，根据我的经验，它比最小-最大缩放使用得更频繁。然而，这取决于学习算法。例如，主成分分析通常使用标准化效果更好，而最小-最大缩放通常推荐用于神经网络（这两种算法在本书后面都会讨论）。作为一个通用规则，我建议默认使用标准化，除非你有特定的理由使用其他方法。\n\
    \n我们可以通过查看解决方案输出的均值和标准差来观察标准化的效果：\n\n```\n# 打印均值和标准差\nprint(\"Mean:\", round(standardized.mean()))\n\
    print(\"Standard deviation:\", standardized.std())\n\nMean: 0.0\nStandard deviation:\
    \ 1.0\n```\n\n如果我们的数据有显著的异常值，它可能会通过影响特征的均值和方差而对我们的标准化产生负面影响。在这种情况下，通常使用中位数和四分位数范围来重新缩放特征会更有帮助。在scikit-learn中，我们使用`RobustScaler`方法来实现这一点：\n\
    \n```\n# 创建缩放器\nrobust_scaler = preprocessing.RobustScaler()\n\n# 转换特征\nrobust_scaler.fit_transform(x)\n\
    \narray([[ -1.87387612],\n       [ -0.875      ],\n       [  0.         ],\n \
    \      [  0.125      ],\n       [ 10.61488511]])\n```\n\n## 4.3 归一化观测值\n\n###\
    \ 问题\n\n你希望将观测值的特征值重新缩放为具有单位范数（总长度为1）。"

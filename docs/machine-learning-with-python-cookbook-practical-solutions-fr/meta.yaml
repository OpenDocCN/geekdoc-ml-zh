    \ -4.20558148]]\nTarget Vector\n [0 1 1]\n```\n\n### 讨论\n\n从解决方案中可能显而易见，`make_regression`\
    \ 返回一个浮点值的特征矩阵和一个浮点值的目标向量，而 `make_classification` 和 `make_blobs` 返回一个浮点值的特征矩阵和一个整数目标向量，整数代表类别成员关系。\n\

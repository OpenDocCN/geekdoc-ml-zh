    # 3.12 Deleting a Row


    # Problem


    You want to delete one or more rows from a DataFrame.


    # Solution


    Use a boolean condition to create a new DataFrame excluding the rows you want
    to delete:


    ```

    # Load library

    import pandas as pd


    # Create URL

    url = ''https://raw.githubusercontent.com/chrisalbon/sim_data/master/titanic.csv''


    # Load data

    dataframe = pd.read_csv(url)


    # Delete rows, show first three rows of output

    dataframe[dataframe[''Sex''] != ''male''].head(3)

    ```


    | Name | PClass | Age | Sex | Survived | SexCode |

    |---|---|---|---|---|---|

    | 0 Allen, Miss Elisabeth Walton | 1st | 29.0 | female | 1 | 1 |

    | 1 Allison, Miss Helen Loraine | 1st | 2.0 | female | 0 | 1 |

    | 3 Allison, Mrs Hudson JC (Bessie Waldo Daniels) | 1st | 25.00 | female | 0 |
    1 |


    # Discussion


    While technically you can use the drop method (for example, dataframe.drop([0,
    1], axis=0) to drop the first two rows), a more practical method is simply to
    wrap a boolean condition inside dataframe[]. This enables us to use the power
    of conditionals to delete either a single row or (far more likely) many rows at
    once.


    We can use boolean conditions to easily delete single rows by matching a unique
    value:


    ```

    # Delete row, show first two rows of output

    dataframe[dataframe[''Name''] != ''Allison, Miss Helen Loraine''].head(2)

    ```'

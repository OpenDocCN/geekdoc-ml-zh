    \nFigure 15-2. Randomly generated two-dimensional data separated into a number\
    \ of different subspaces\n\nThe nlist parameter in the Faiss library lets us define\
    \ the number of clusters we want to create. An additional parameter, nprobe, can\
    \ be used at query time to define the number of clusters we want to search to\
    \ retrieve nearest neighbors for a given observation. Increasing both nlist and\
    \ nprobe can result in higher quality neighbors at the cost of larger computational\
    \ effort and thus a longer runtime for IVF indices. Decreasing each of these parameters\
    \ will have the inverse effect, and your code will run faster but at the risk\
    \ of returning lower quality results.\n\nNotice this example returns the exact\
    \ same output as the first recipe in this chapter. This is because we are working\

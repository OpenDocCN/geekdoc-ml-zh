  md: "# Discussion\n\nAs might be apparent from the solutions, `make_regression`\
    \ returns a feature matrix of float values and a target vector of float values,\
    \ while `make_classification` and `make_blobs` return a feature matrix of float\
    \ values and a target vector of integers representing membership in a class.\n\
    \nscikit-learn's simulated datasets offer extensive options to control the type\
    \ of data generated. scikit-learn's documentation contains a full description\
    \ of all the parameters, but a few are worth noting.\n\nIn `make_regression` and\
    \ `make_classification`, `n_informative` determines the number of features that\
    \ are used to generate the target vector. If `n_informative` is less than the\
    \ total number of features (`n_features`), the resulting dataset will have redundant\
    \ features that can be identified through feature selection techniques.\n\nIn\
    \ addition, `make_classification` contains a `weights` parameter that allows us\
    \ to simulate datasets with imbalanced classes. For example, `weights = [.25,\
    \ .75]` would return a dataset with 25% of observations belonging to one class\
    \ and 75% of observations belonging to a second class.\n\nFor `make_blobs`, the\
    \ `centers` parameter determines the number of clusters generated. Using the `matplotlib`\
    \ visualization library, we can visualize the clusters generated by `make_blobs`:\
    \ \n\n```\n# Load library\nimport matplotlib.pyplot as plt\n\n# View scatterplot\n\
    plt.scatter(features[:,0], features[:,1], c=target)\nplt.show()\n```\n\n![](img/553f6c9c8b23451624604a848ee8a83c_40_0.png)"

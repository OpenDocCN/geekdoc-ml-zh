    # Discussion


    When we have missing values in a categorical feature, our best solution is to
    open our toolbox of machine learning algorithms to predict the values of the missing
    observations. We can accomplish this by treating the feature with the missing
    values as the target vector and the other features as the feature matrix. A commonly
    used algorithm is KNN (discussed in Chapter 15), which assigns to the missing
    value the most frequent class of the $k$ nearest observations.


    Alternatively, we can fill in missing values with the most frequent class of the
    feature or even discard the observations with missing values. While less sophisticated
    than KNN, these options are much more scalable to larger data. In any case, it
    is advisable to include a binary feature indicating which observations contain
    imputed values.


    # See Also


    +   - scikit-learn documentation: Imputation of Missing Values

    - Overcoming Missing Values in a Random Forest Classifier

    - A Study of K-Nearest Neighbour as an Imputation Method



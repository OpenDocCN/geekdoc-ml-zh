    \    shuffle=True)\n\n# Initialize the model and optimizer\nmodel = Net().to(device)\n\
    optimizer = optim.Adam(model.parameters())\n\n# Compile the model using torch\
    \ 2.0's optimizer\nmodel = torch.compile(model)\n\n# Define the training loop\n\
    model.train()\nfor batch_idx, (data, target) in enumerate(train_loader):\n   \
    \ data, target = data.to(device), target.to(device)\n    optimizer.zero_grad()\n\
    \    output = model(data)\n    loss = nn.functional.nll_loss(output, target)\n\
    \    loss.backward()\n    optimizer.step()\n\n# Define the testing loop\nmodel.eval()\n\
    test_loss = 0\ncorrect = 0\nwith torch.no_grad():\n    for data, target in test_loader:\n\
    \        data, target = data.to(device), target.to(device)\n        output = model(data)\n\
    \n        # get the index of the max log-probability\n        test_loss += nn.functional.nll_loss(\n\
    \            output, target, reduction='sum'\n        ).item()  # sum up batch\
    \ loss\n        pred = output.argmax(dim=1, keepdim=True)\n        correct +=\
    \ pred.eq(target.view_as(pred)).sum().item()\n\ntest_loss /= len(test_loader.dataset)\n\
    ```\n\n### 讨论\n\n卷积神经网络通常用于图像识别和计算机视觉任务。它们通常由卷积层、池化层和一个全连接层组成。\n\n*卷积层*的目的是学习可用于当前任务的重要图像特征。卷积层通过将滤波器应用于图像的特定区域（卷积的大小）来工作。然后，该层的权重学习识别对分类任务至关重要的特定图像特征。例如，如果我们正在训练一个识别人手的模型，滤波器可能会学习识别手指。\n\
    \n*池化层*的目的通常是降低来自前一层的输入的维度。该层也使用应用于输入一部分的滤波器，但它没有激活函数。相反，它通过执行*最大池化*（选择滤波器中具有最高值的像素）或*平均池化*（取输入像素的平均值来代替）来降低输入的维度。\n\
    \n最后，*全连接层*可以与类似 softmax 激活函数的东西一起使用来创建二元分类任务。\n\n### 另请参阅\n\n- [卷积神经网络](Convolutional\
    \ Neural Networks)\n\n## 22.2 训练用于文本分类的神经网络\n\n### 问题\n\n你需要训练一个神经网络来对文本数据进行分类。\n\
    \n### 解决方案\n\n使用一个 PyTorch 神经网络，其第一层的大小等于你的词汇表大小：\n\n```python\n# Import libraries\n\
    import torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport numpy\
    \ as np\nfrom sklearn.datasets import fetch_20newsgroups\nfrom sklearn.feature_extraction.text\
    \ import CountVectorizer\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.metrics import accuracy_score\n\n# Load the 20 newsgroups dataset\n\
    cats = ['alt.atheism', 'sci.space']\nnewsgroups_data = fetch_20newsgroups(subset='all',\
    \ shuffle=True,\n    random_state=42, categories=cats)\n\n# Split the dataset\
    \ into training and test sets\nX_train, X_test, y_train, y_test = train_test_split(newsgroups_data.data,\n\
    \    newsgroups_data.target, test_size=0.2, random_state=42)\n\n# Vectorize the\
    \ text data using a bag-of-words approach\nvectorizer = CountVectorizer(stop_words='english')\n\
    X_train = vectorizer.fit_transform(X_train).toarray()\nX_test = vectorizer.transform(X_test).toarray()\n\
    \n# Convert the data to PyTorch tensors\nX_train = torch.tensor(X_train, dtype=torch.float32)\n\
    y_train = torch.tensor(y_train, dtype=torch.long)\nX_test = torch.tensor(X_test,\
    \ dtype=torch.float32)\ny_test = torch.tensor(y_test, dtype=torch.long)\n\n# Define\
    \ the model\nclass TextClassifier(nn.Module):\n    def __init__(self, num_classes):\n\
    \        super(TextClassifier, self).__init__()\n        self.fc1 = nn.Linear(X_train.shape[1],\
    \ 128)\n        self.fc2 = nn.Linear(128, num_classes)\n\n    def forward(self,\
    \ x):\n        x = nn.functional.relu(self.fc1(x))\n        x = self.fc2(x)\n\
    \        return nn.functional.log_softmax(x, dim=1)\n\n# Instantiate the model\
    \ and define the loss function and optimizer\nmodel = TextClassifier(num_classes=len(cats))\n\
    loss_function = nn.CrossEntropyLoss()\noptimizer = optim.Adam(model.parameters(),\
    \ lr=0.01)\n\n# Compile the model using torch 2.0's optimizer\nmodel = torch.compile(model)\n\
    \n# Train the model\nnum_epochs = 1\nbatch_size = 10\nnum_batches = len(X_train)\
    \ // batch_size\nfor epoch in range(num_epochs):\n    total_loss = 0.0\n    for\
    \ i in range(num_batches):\n        # Prepare the input and target data for the\
    \ current batch\n        start_idx = i * batch_size\n        end_idx = (i + 1)\
    \ * batch_size\n        inputs = X_train[start_idx:end_idx]\n        targets =\
    \ y_train[start_idx:end_idx]\n\n        # Zero the gradients for the optimizer\n\
    \        optimizer.zero_grad()\n\n        # Forward pass through the model and\
    \ compute the loss\n        outputs = model(inputs)\n        loss = loss_function(outputs,\
    \ targets)\n\n        # Backward pass through the model and update the parameters\n\
    \        loss.backward()\n        optimizer.step()\n\n        # Update the total\
    \ loss for the epoch\n        total_loss += loss.item()\n\n    # Compute the accuracy\
    \ on the test set for the epoch\n    test_outputs = model(X_test)\n    test_predictions\
    \ = torch.argmax(test_outputs, dim=1)\n    test_accuracy = accuracy_score(y_test,\
    \ test_predictions)\n\n    # Print the epoch number, average loss, and test accuracy\n\
    \    print(f\"Epoch: {epoch+1}, Loss: {total_loss/num_batches}, Test Accuracy:\
    \ \"\n          f\"{test_accuracy}\")\n```\n\n### 讨论\n\n与图像不同，文本数据本质上是非数字的。在训练模型之前，我们需要将文本转换为模型可以使用的数字表示，以便学习哪些单词和单词组合对于当前的分类任务很重要。在这个例子中，我们使用\
    \ scikit-learn 的 CountVectorizer 将词汇表编码为一个大小等于整个词汇表的向量，其中每个单词被分配到向量中的一个特定索引，该位置的值是该单词在给定段落中出现的次数。在这种情况下，我们可以通过查看训练集来了解词汇表的大小：\n\
    \n```python\nX_train.shape[1]\n# 25150\n```\n\n我们在神经网络的第一层使用相同的值来确定输入层的大小：`self.fc1\
    \ = nn.Linear(X_train.shape[1], 128)`。这使我们的网络能够学习所谓的*词嵌入*，即从监督学习任务（如本例中的任务）中学习到的单个单词的向量表示。这个任务将允许我们学习大小为\
    \ 128 的词嵌入，尽管这些嵌入主要对这个特定任务和词汇表有用。"

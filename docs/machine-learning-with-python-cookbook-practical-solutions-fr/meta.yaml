    \ 12 章）。\n\n### 另请参阅\n\n- 非负矩阵分解，维基百科\n\n## 9.5 在稀疏数据上减少特征\n\n### 问题\n\n你有一个稀疏特征矩阵，并希望降低其维度。\n\
    \n### 解决方案\n\n使用*截断奇异值分解*（TSVD）：\n\n```python\n# 加载库\nfrom sklearn.preprocessing\

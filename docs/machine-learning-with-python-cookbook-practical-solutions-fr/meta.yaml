    \ False,\n                                random_state = 1)\n\n# Create a linear\
    \ regression object\nols = LinearRegression()\n\n# Cross-validate the linear regression\
    \ using (negative) MSE\ncross_val_score(ols, features, target, scoring='neg_mean_squared_error')\n\
    array([-1974.65337976, -2004.54137625, -3935.19355723, -1060.04361386,\n     \
    \  -1598.74104702])\n```\n\nAnother common regression metric is the coefficient\
    \ of determination, $R^2$:\n\n```\n# Cross-validate the linear regression using\
    \ R-squared\ncross_val_score(ols, features, target, scoring='r2')\narray([0.8622399\
    \ , 0.85838075, 0.74723548, 0.91354743, 0.84469331])\n```\n\n# Discussion\n\n\
    MSE is one of the most common evaluation metrics for regression models. Formally,\
    \ MSE is:\n\n$$\\text{MSE} = \\frac{1}{n} \\sum_{i=1}^{n} (\\widehat{y}_i - y_i)^2$$\n\
    \nwhere $n$ is the number of observations, $y_i$ is the true value of the target\
    \ we are trying to predict for observation $i$, and $\\widehat{y}_i$ is the model's\
    \ predicted value for $y_i$. MSE is a measurement of the squared sum of all distances\
    \ between predicted and true values. The higher the value of MSE, the greater\
    \ the total squared error and thus the worse the model. There are a number of\
    \ mathematical benefits to squaring the error term, including that it forces all\
    \ error values to be positive, but one often unrealized implication is that squaring\
    \ penalizes a few large errors more than many small errors, even if the absolute\
    \ value of the errors is the same. For example, imagine two models, A and B, each\
    \ with two observations:\n\n+   - Model A has errors of 0 and 10, and thus its\
    \ MSE is $0^2 + 10^2 = 100$.\n- Model B has two errors of 5 each, and thus its\
    \ MSE is $5^2 + 5^2 = 50$."
  - '[PAGE 221]


    Both models have the same total errors, 10; however, MSE would consider model
    A (MSE = 100) worse than model B (MSE = 50). In practice this implication is rarely
    an issue (and indeed can be theoretically beneficial), and MSE works perfectly
    fine as an evaluation metric.


    One important note: by default, in scikit-learn, arguments of the scoring parameter
    assume that higher values are better than lower values. However, this is not the
    case for MSE, where higher values mean a worse model. For this reason, scikit-learn
    looks at the negative MSE using the neg_mean_squared_error argument.


    A common alternative regression evaluation metric is the default metric we used
    in Recipe 11.2, $R^2$, which measures the amount of variance in the target vector
    that is explained by the model.


    $$R^2 = 1 - \frac{\sum_{i=1}^n (y_i - \widehat{y}_i)^2}{\sum_{i=1}^n (y_i - \overline{y})^2}$$


    where $y_i$ is the true target value of the $i$th observation, $\widehat{y}_i$
    is the predicted value for the $i$th observation, and $\overline{y}$ is the mean
    value of the target vector. The closer that $R^2$ is to 1.0, the better the model.



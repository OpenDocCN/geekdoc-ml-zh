    \ | 0.666667 | 1.0 |\n| male | 31.014338 | 0.166863 | 0.0 |\n\n### 讨论\n\n`groupby`\
    \ 是数据整理真正开始成形的地方。拥有一个 DataFrame，其中每一行是一个人或一个事件，我们想根据某些标准对它们进行分组，然后计算统计数据，这是非常常见的。例如，你可以想象一个\

    However, a major downside to LogisticRegressionCV is that it can only search a
    range of values for C. In Recipe 12.1 our possible hyperparameter space included
    both C and another hyperparameter (the regularization penalty norm). This limitation
    is common to many of scikit-learn''s model-specific cross-validated approaches.


    # See Also



    polynomial_interaction.fit_transform(features)\narray([[ 2.,  3.,  4.,  6.,  9.],\n\
    \       [ 2.,  3.,  4.,  6.,  9.],\n       [ 2.,  3.,  4.,  6.,  9.]])\n```\n\n\
    The degree parameter determines the maximum degree of the polynomial. For example,\

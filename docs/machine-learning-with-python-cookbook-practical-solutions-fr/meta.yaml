    \    [i], # Index of channel\n                             None, # No mask\n \
    \                            [256], # Histogram size\n                       \
    \      [0,256]) # Range\n    features.extend(histogram)\n\n# Create a vector for\
    \ an observation's feature values\nobservation = np.array(features).flatten()\n\
    \n# Show the observation's value for the first five features\nobservation[0:5]\n\
    \narray([ 1008.,   217.,   184.,   165.,   116.], dtype=float32)\n```\n\n### Discussion\n\
    \nIn the RGB color model, each color is the combination of three color channels\
    \ (i.e., red, green, blue). In turn, each channel can take on one of 256 values\
    \ (represented by an integer between 0 and 255). For example, the top leftmost\
    \ pixel in our image has the following channel values:\n\n```\n# Show RGB channel\
    \ values\nimage_rgb[0,0]\n\narray([107, 163, 212], dtype=uint8)\n```\n\nA histogram\
    \ is a representation of the distribution of values in data. Here's a simple example:\n\
    \n```\n# Import pandas\nimport pandas as pd\n\n# Create some data\ndata = pd.Series([1,\
    \ 1, 2, 2, 3, 3, 3, 4, 5])\n\n# Show the histogram\ndata.hist(grid=False)\nplt.show()\n\
    ```\n\nIn this example, we have some data with two 1s, two 2s, three 3s, one 4,\
    \ and one 5. In the histogram, each bar represents the number of times each value\
    \ (1, 2, etc.) appears in our data.\n\nWe can apply this same technique to each\
    \ of the color channels, but instead of five possible values, we have 256 (the\
    \ number of possible values for a channel value). The x-axis represents the 256\
    \ possible channel values, and the y-axis represents the number of times a particular\
    \ channel value appears across all pixels in an image (apologies to hardcopy readers\
    \ for whom there are no color images):\n\n```\n# Calculate the histogram for each\
    \ color channel\ncolors = (\"r\", \"g\", \"b\")\n\n# For each channel: calculate\
    \ histogram, make plot\nfor i, channel in enumerate(colors):\n    histogram =\
    \ cv2.calcHist([image_rgb], # Image\n                             [i], # Index\
    \ of channel\n                             None, # No mask\n                 \
    \            [256], # Histogram size\n                             [0,256]) #\
    \ Range\n    plt.plot(histogram, color = channel)\n    plt.xlim([0,256])\n\n#\
    \ Show plot\nplt.show()\n```\n\nAs we can see in the histogram, barely any pixels\
    \ contain the blue channel values between 0 and ~180, while many pixels contain\
    \ blue channel values between ~190 and ~210. This distribution of channel values\
    \ is shown for all three channels. The histogram, however, is not simply a visualization;\
    \ it has 256 features for each color channel, making for 768 total features representing\
    \ the distribution of colors in an image.\n\n### See Also\n\n- [Histogram, Wikipedia](https://en.wikipedia.org/wiki/Histogram)\n\
    - [pandas documentation: Histogram](https://pandas.pydata.org/docs/reference/api/pandas.DataFrame.hist.html)\n\
    - [OpenCV tutorial: Histogram](https://docs.opencv.org/4.x/d6/dc7/tutorial_py_histogram_beginner.html)\n\
    \n## 8.15 Using Pretrained Embeddings as Features\n\n### Problem\n\nYou want to\
    \ load pretrained embeddings from an existing model in PyTorch and use them as\
    \ input to one of your own models.\n\n### Solution\n\nUse torchvision.models to\
    \ select a model and then retrieve an embedding from it for a given image:\n\n\
    ```\n# Load libraries\nimport cv2\nimport numpy as np\nimport torch\nfrom torchvision\
    \ import transforms\nimport torchvision.models as models\n\n# Load image\nimage_bgr\
    \ = cv2.imread(\"images/plane.jpg\", cv2.IMREAD_COLOR)\n\n# Convert to pytorch\
    \ data type\nconvert_tensor = transforms.ToTensor()\npytorch_image = convert_tensor(np.array(image_rgb))\n\
    \n# Load the pretrained model\nmodel = models.resnet18(pretrained=True)\n\n# Select\
    \ the specific layer of the model we want output from\nlayer = model._modules.get('avgpool')\n\
    \n# Set model to evaluation mode\nmodel.eval()\n\n# Infer the embedding with the\
    \ no_grad option\nwith torch.no_grad():\n    embedding = model(pytorch_image.unsqueeze(0))\n\
    \nprint(embedding.shape)\ntorch.Size([1, 1000])\n```\n\n### Discussion\n\nIn the\
    \ ML space, *transfer learning* is often defined as taking information learned\
    \ from one task and using it as input to another task. Instead of starting from\
    \ zero, we can use representations already learned from large pretrained image\
    \ models (such as ResNet) to get a head start on our own machine learning models.\
    \ More intuitively, you can understand how we could use the weights of a model\
    \ trained to recognize cats as a good start for a model we want to train to recognize\
    \ dogs. By sharing information from one model to another, we can leverage the\
    \ information learned from other datasets and model architectures without the\
    \ overhead of training a model from scratch.\n\nThe entire application of transfer\
    \ learning in computer vision is outside the scope of this book; however, there\
    \ are many different ways we can extract embeddings-based representations of images\
    \ outside of PyTorch. In TensorFlow, another common library for deep learning,\
    \ we can use tensorflow_hub:\n\n```\n# Load libraries\nimport cv2\n```"

    # 17.2 Handling Linearly Inseparable Classes Using Kernels


    # Problem


    You need to train a support vector classifier, but your classes are linearly inseparable.


    # Solution


    Train an extension of a support vector machine using kernel functions to create
    nonlinear decision boundaries:


    ```

    # Load libraries

    from sklearn.svm import SVC

    from sklearn import datasets

    from sklearn.preprocessing import StandardScaler

    import numpy as np


    # Set randomization seed

    np.random.seed(0)


    # Generate two features

    features = np.random.randn(200, 2)


    # Use an XOR gate (you don''t need to know what this is) to generate

    # linearly inseparable classes

    target_xor = np.logical_xor(features[:, 0] > 0, features[:, 1] > 0)

    target = np.where(target_xor, 0, 1)


    # Create a support vector machine with a radial basis function kernel

    svc = SVC(kernel="rbf", random_state=0, gamma=1, C=1)


    # Train the classifier

    model = svc.fit(features, target)

    ```


    # Discussion


    A full explanation of support vector machines is outside the scope of this book.
    However, a short explanation is likely beneficial for understanding support vector
    machines and kernels. For reasons best learned elsewhere, a support vector classifier
    can be represented as:


    $$f(x) = \beta_0 + \sum_{i \in S} \alpha_i K(x_i, x_{i''})$$'

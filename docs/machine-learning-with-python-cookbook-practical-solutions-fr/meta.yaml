    # Discussion


    Despite having “regression” in its name, a logistic regression is actually a widely
    used binary classifier (i.e., the target vector can take only two values). In
    a logistic regression, a linear model (e.g., $\beta_0 + \beta_1x$) is included
    in a logistic (also called sigmoid) function, $\frac{1}{1 + e^{-z}}$, such that:


    $$P(y_i = 1 \mid X) = \frac{1}{1 + e^{-(\beta_0 + \beta_1x)}}$$


    where $P(y_i = 1 \mid X)$ is the probability of the $i$th observation’s target
    value, $y_i$, being class 1; $X$ is the training data; $\beta_0$ and $\beta_1$
    are the parameters to be learned; and $e$ is Euler’s number. The effect of the
    logistic function is to constrain the value of the function’s output to between
    0 and 1, so that it can be interpreted as a probability. If $P(y_i = 1 \mid X)$
    is greater than 0.5, class 1 is predicted; otherwise, class 0 is predicted.


    In scikit-learn, we can train a logistic regression model using `LogisticRegression`.
    Once it is trained, we can use the model to predict the class of new observations:


    ```

    # Create new observation

    new_observation = [[.5, .5, .5, .5]]


    # Predict class

    model.predict(new_observation)

    array([1])

    ```


    In this example, our observation was predicted to be class 1. Additionally, we
    can see the probability that an observation is a member of each class:


    ```

    # View predicted probabilities

    model.predict_proba(new_observation)

    array([[0.17738424, 0.82261576]])

    ```


    Our observation had a 17.7% chance of being class 0 and an 82.2% chance of being
    class 1.'

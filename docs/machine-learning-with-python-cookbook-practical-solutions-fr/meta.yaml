- md: "## 22.3 Fine-Tuning a Pretrained Model for Image Classification\n\n### Problem\n\
    \nYou want to train an image classification model using learnings from a pretrained\
    \ model.\n\n### Solution\n\nUse the transformers library with torchvision to fine-tune\
    \ a pretrained model on your data:\n\n```python\n# Import libraries\nimport torch\n\
    from torchvision.transforms import(\n    RandomResizedCrop, Compose, Normalize,\
    \ ToTensor\n)\nfrom transformers import Trainer, TrainingArguments, DefaultDataCollator\n\
    from transformers import ViTFeatureExtractor, ViTForImageClassification\nfrom\
    \ datasets import load_dataset, load_metric, Image\n\n# Define a helper function\
    \ to convert the images into RGB\ndef transforms(examples):\n    examples[\"pixel_values\"\
    ] = [_transforms(img.convert(\"RGB\")) for img in\n        examples[\"image\"\
    ]]\n    del examples[\"image\"]\n    return examples\n\n# Define a helper function\
    \ to compute metrics\ndef compute_metrics(p):\n    return metric.compute(predictions=np.argmax(p.predictions,\
    \ axis=1),\n        references=p.label_ids)\n\n# Load the fashion mnist dataset\n\
    dataset = load_dataset(\"fashion_mnist\")\n\n# Load the processor from the VIT\
    \ model\nimage_processor = ViTFeatureExtractor.from_pretrained(\n    \"google/vit-base-patch16-224-in21k\"\
    \n)\n\n# Set the labels from the dataset\nlabels = dataset['train'].features['label'].names\n\
    \n# Load the pretrained model\nmodel = ViTForImageClassification.from_pretrained(\n\
    \    \"google/vit-base-patch16-224-in21k\",\n    num_labels=len(labels),\n   \
    \ id2label={str(i): c for i, c in enumerate(labels)},\n    label2id={c: str(i)\
    \ for i, c in enumerate(labels)}\n)\n\n# Define the collator, normalizer, and\
    \ transforms\ncollate_fn = DefaultDataCollator()\nnormalize = Normalize(mean=image_processor.image_mean,\n\
    \    std=image_processor.image_std)\nsize = (\n    image_processor.size[\"shortest_edge\"\
    ]\n    if \"shortest_edge\" in image_processor.size\n    else (image_processor.size[\"\
    height\"], image_processor.size[\"width\"])\n)\n_transforms = Compose([RandomResizedCrop(size),\
    \ ToTensor(), normalize])\n\n# Load the dataset we'll use with transformations\n\
    dataset = dataset.with_transform(transforms)\n\n# Use accuracy as our metric\n\
    metric = load_metric(\"accuracy\")\n\n# Set the training args\ntraining_args =\
    \ TrainingArguments(\n    output_dir=\"fashion_mnist_model\",\n    remove_unused_columns=False,\n\
    \    evaluation_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    learning_rate=0.01,\n\
    \    per_device_train_batch_size=16,\n    gradient_accumulation_steps=4,\n   \
    \ per_device_eval_batch_size=16,\n    num_train_epochs=1,\n    warmup_ratio=0.1,\n\
    \    logging_steps=10,\n    load_best_model_at_end=True,\n    metric_for_best_model=\"\
    accuracy\",\n    push_to_hub=False,\n)\n\n# Instantiate a trainer\ntrainer = Trainer(\n\
    \    model=model,\n    args=training_args,\n    data_collator=collate_fn,\n  \
    \  compute_metrics=compute_metrics,\n    train_dataset=dataset[\"train\"],\n \
    \   eval_dataset=dataset[\"test\"],\n    tokenizer=image_processor,\n)\n\n# Train\
    \ the model, log and save metrics\ntrain_results = trainer.train()\ntrainer.save_model()\n\
    trainer.log_metrics(\"train\", train_results.metrics)\ntrainer.save_metrics(\"\
    train\", train_results.metrics)\ntrainer.save_state()\n```\n\n### Discussion\n\
    \nIn the realm of unstructured data like text and images, it is extremely common\
    \ to start from pretrained models trained on large datasets, instead of starting\
    \ from scratch, especially in cases where we don't have access to as much labeled\
    \ data. Using embeddings and other information from the larger model, we can then\
    \ fine-tune our own model for a new task without the need for as much labeled\
    \ information. In addition, the pretrained model may have information not captured\
    \ at all in our training dataset, resulting in an overall performance improvement.\
    \ This process is known as *transfer learning*.\n\nIn this example, we load the\
    \ weights from Google's ViT (Vision Transformer) model. Then, we use the transformers\
    \ library to fine-tune it for a classification task on the fashion MNIST dataset,\
    \ a simple dataset of clothing items. This approach can be applied to increase\
    \ performance on any computer vision dataset, and the transformers library provides\
    \ a high-level interface we can use to fine-tune our own model from larger, pretrained\
    \ ones without writing an egregious amount of code.\n\n### See Also\n\n- [Hugging\
    \ Face website and documentation](https://huggingface.co/docs/transformers/index)\n\
    \n## 22.4 Fine-Tuning a Pretrained Model for Text Classification\n\n### Problem\n\
    \nYou want to train a text classification model using learnings from a pretrained\
    \ model.\n\n### Solution\n\nUse the `transformers` library:\n\n```python\n# Import\
    \ libraries\nfrom datasets import load_dataset\nfrom transformers import AutoTokenizer,\
    \ DataCollatorWithPadding\nfrom transformers import (\n    AutoModelForSequenceClassification,\
    \ TrainingArguments, Trainer\n)\nimport evaluate\nimport numpy as np\n\n# Load\
    \ the imdb dataset\nimdb = load_dataset(\"imdb\")\n\n# Create a tokenizer and\
    \ collator\ntokenizer = AutoTokenizer.from_pretrained(\"distilbert-base-uncased\"\
    )\ndata_collator = DataCollatorWithPadding(tokenizer=tokenizer)\n\n# Tokenize\
    \ the imdb dataset\ntokenized_imdb = imdb.map(\n    lambda example: tokenizer(\n\
    \        example[\"text\"], padding=\"max_length\", truncation=True\n    ),\n\
    \    batched=True,\n)\n\n# Use the accuracy metric\naccuracy = evaluate.load(\"\
    accuracy\")\n\n# Define a helper function to produce metrics\ndef compute_metrics(eval_pred):\n\
    \    predictions, labels = eval_pred\n    predictions = np.argmax(predictions,\
    \ axis=1)\n    return accuracy.compute(predictions=predictions, references=labels)\n\
    \n# Create dictionaries to map indices to labels and vice versa\nid2label = {0:\
    \ \"NEGATIVE\", 1: \"POSITIVE\"}\nlabel2id = {\"NEGATIVE\": 0, \"POSITIVE\": 1}\n\
    \n# Load a pretrained model\nmodel = AutoModelForSequenceClassification.from_pretrained(\n\
    \    \"distilbert-base-uncased\", num_labels=2, id2label=id2label,\n    label2id=label2id\n\
    )\n\n# Specify the training arguments\ntraining_args = TrainingArguments(\n  \
    \  output_dir=\"my_awesome_model\",\n    learning_rate=2e-5,\n    per_device_train_batch_size=16,\n\
    \    per_device_eval_batch_size=16,\n    num_train_epochs=2,\n    weight_decay=0.01,\n\
    \    evaluation_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    load_best_model_at_end=True,\n\
    )\n\n# Instantiate a trainer\ntrainer = Trainer(\n    model=model,\n    args=training_args,\n\
    \    train_dataset=tokenized_imdb[\"train\"],\n    eval_dataset=tokenized_imdb[\"\
    test\"],\n    tokenizer=tokenizer,\n    data_collator=data_collator,\n    compute_metrics=compute_metrics,\n\
    )\n\n# Train the model\ntrainer.train()\n```\n\n### Discussion\n\nJust like using\
    \ pretrained image models, pretrained language models hold a massive amount of\
    \ context about language, as they’re typically trained on a wide variety of open\
    \ internet sources. When we start from a pretrained model base, what we’re typically\
    \ doing is swapping out the classification layer of the existing network for one\
    \ of our own. This allows us to alter the network weights already learned to fit\
    \ our specific task.\n\nIn this example, we’re fine-tuning a DistilBERT model\
    \ to recognize whether IMDB movie reviews were positive (1) or negative (0). The\
    \ pretrained DistilBERT model provides a large corpus of words and context on\
    \ each one, in addition to neural network weights learned from a previous training\
    \ task. Transfer learning allows us to take advantage of all the initial work\
    \ done training the DistilBERT model and repurpose it for our use case, which\
    \ in this instance is classifying movie reviews.\n\n### See Also\n\n- Text classification\
    \ in transformers\n\n# CHAPTER 23\n\n## Saving, Loading, and Serving Trained Models\n\
    \n### 23.0 Introduction\n\nIn the last 22 chapters and around 200 recipes, we\
    \ have covered how to take raw data and use machine learning to create well-performing\
    \ predictive models. However, for all our work to be worthwhile, we eventually\
    \ need to *do something* with our model, such as integrate it with an existing\
    \ software application. To accomplish this goal, we need to be able to save our\
    \ models after training, load them when they are needed by an application, and\
    \ then make requests to that application to get predictions.\n\nML models are\
    \ typically deployed in simple web servers and designed to take input data and\
    \ return predictions. This makes the model available to any client on the same\
    \ network, so other services (such as UIs, users, etc.) can use the ML model to\
    \ make predictions wherever they are in real time. An example use case would be\
    \ using ML for item search on an ecommerce website, where an ML model would be\
    \ served that takes in data about users and listings, and returns a likelihood\
    \ of the user purchasing that listing. The search results need to be available\
    \ in real time and available to the ecommerce application that is responsible\
    \ for taking user searches and coordinating results for the user.\n\n## 23.1 Saving\
    \ and Loading a scikit-learn Model\n\n### Problem\n\nYou have a trained scikit-learn\
    \ model and want to save it and load it elsewhere."
  mdcn: "## 22.3 为图像分类微调预训练模型\n\n### 问题\n\n你想利用预训练模型的知识来训练一个图像分类模型。\n\n### 解决方案\n\n\
    使用 `transformers` 库和 `torchvision` 在你的数据上微调一个预训练模型：\n\n```python\n# Import libraries\n\
    import torch\nfrom torchvision.transforms import(\n    RandomResizedCrop, Compose,\
    \ Normalize, ToTensor\n)\nfrom transformers import Trainer, TrainingArguments,\
    \ DefaultDataCollator\nfrom transformers import ViTFeatureExtractor, ViTForImageClassification\n\
    from datasets import load_dataset, load_metric, Image\n\n# Define a helper function\
    \ to convert the images into RGB\ndef transforms(examples):\n    examples[\"pixel_values\"\
    ] = [_transforms(img.convert(\"RGB\")) for img in\n        examples[\"image\"\
    ]]\n    del examples[\"image\"]\n    return examples\n\n# Define a helper function\
    \ to compute metrics\ndef compute_metrics(p):\n    return metric.compute(predictions=np.argmax(p.predictions,\
    \ axis=1),\n        references=p.label_ids)\n\n# Load the fashion mnist dataset\n\
    dataset = load_dataset(\"fashion_mnist\")\n\n# Load the processor from the VIT\
    \ model\nimage_processor = ViTFeatureExtractor.from_pretrained(\n    \"google/vit-base-patch16-224-in21k\"\
    \n)\n\n# Set the labels from the dataset\nlabels = dataset['train'].features['label'].names\n\
    \n# Load the pretrained model\nmodel = ViTForImageClassification.from_pretrained(\n\
    \    \"google/vit-base-patch16-224-in21k\",\n    num_labels=len(labels),\n   \
    \ id2label={str(i): c for i, c in enumerate(labels)},\n    label2id={c: str(i)\
    \ for i, c in enumerate(labels)}\n)\n\n# Define the collator, normalizer, and\
    \ transforms\ncollate_fn = DefaultDataCollator()\nnormalize = Normalize(mean=image_processor.image_mean,\n\
    \    std=image_processor.image_std)\nsize = (\n    image_processor.size[\"shortest_edge\"\
    ]\n    if \"shortest_edge\" in image_processor.size\n    else (image_processor.size[\"\
    height\"], image_processor.size[\"width\"])\n)\n_transforms = Compose([RandomResizedCrop(size),\
    \ ToTensor(), normalize])\n\n# Load the dataset we'll use with transformations\n\
    dataset = dataset.with_transform(transforms)\n\n# Use accuracy as our metric\n\
    metric = load_metric(\"accuracy\")\n\n# Set the training args\ntraining_args =\
    \ TrainingArguments(\n    output_dir=\"fashion_mnist_model\",\n    remove_unused_columns=False,\n\
    \    evaluation_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    learning_rate=0.01,\n\
    \    per_device_train_batch_size=16,\n    gradient_accumulation_steps=4,\n   \
    \ per_device_eval_batch_size=16,\n    num_train_epochs=1,\n    warmup_ratio=0.1,\n\
    \    logging_steps=10,\n    load_best_model_at_end=True,\n    metric_for_best_model=\"\
    accuracy\",\n    push_to_hub=False,\n)\n\n# Instantiate a trainer\ntrainer = Trainer(\n\
    \    model=model,\n    args=training_args,\n    data_collator=collate_fn,\n  \
    \  compute_metrics=compute_metrics,\n    train_dataset=dataset[\"train\"],\n \
    \   eval_dataset=dataset[\"test\"],\n    tokenizer=image_processor,\n)\n\n# Train\
    \ the model, log and save metrics\ntrain_results = trainer.train()\ntrainer.save_model()\n\
    trainer.log_metrics(\"train\", train_results.metrics)\ntrainer.save_metrics(\"\
    train\", train_results.metrics)\ntrainer.save_state()\n```\n\n### 讨论\n\n在文本和图像等非结构化数据领域，从在大型数据集上训练的预训练模型开始，而不是从头开始，是极其常见的做法，尤其是在我们无法获得大量标注数据的情况下。通过使用来自更大模型的嵌入和其他信息，我们可以为新任务微调自己的模型，而无需大量标注信息。此外，预训练模型可能包含我们的训练数据集中完全没有捕获的信息，从而带来整体性能的提升。这个过程被称为*迁移学习*。\n\
    \n在这个例子中，我们加载了来自谷歌 ViT（视觉 Transformer）模型的权重。然后，我们使用 `transformers` 库在 fashion\
    \ MNIST 数据集（一个简单的服装项目数据集）上对其进行分类任务的微调。这种方法可以应用于提升任何计算机视觉数据集的性能，而 `transformers`\
    \ 库提供了一个高级接口，我们可以用它来从更大的预训练模型微调我们自己的模型，而无需编写大量的代码。\n\n### 另请参阅\n\n- [Hugging Face\
    \ 网站和文档](https://huggingface.co/docs/transformers/index)\n\n## 22.4 为文本分类微调预训练模型\n\
    \n### 问题\n\n你想利用预训练模型的知识来训练一个文本分类模型。\n\n### 解决方案\n\n使用 `transformers` 库：\n\n```python\n\
    # Import libraries\nfrom datasets import load_dataset\nfrom transformers import\
    \ AutoTokenizer, DataCollatorWithPadding\nfrom transformers import (\n    AutoModelForSequenceClassification,\
    \ TrainingArguments, Trainer\n)\nimport evaluate\nimport numpy as np\n\n# Load\
    \ the imdb dataset\nimdb = load_dataset(\"imdb\")\n\n# Create a tokenizer and\
    \ collator\ntokenizer = AutoTokenizer.from_pretrained(\"distilbert-base-uncased\"\
    )\ndata_collator = DataCollatorWithPadding(tokenizer=tokenizer)\n\n# Tokenize\
    \ the imdb dataset\ntokenized_imdb = imdb.map(\n    lambda example: tokenizer(\n\
    \        example[\"text\"], padding=\"max_length\", truncation=True\n    ),\n\
    \    batched=True,\n)\n\n# Use the accuracy metric\naccuracy = evaluate.load(\"\
    accuracy\")\n\n# Define a helper function to produce metrics\ndef compute_metrics(eval_pred):\n\
    \    predictions, labels = eval_pred\n    predictions = np.argmax(predictions,\
    \ axis=1)\n    return accuracy.compute(predictions=predictions, references=labels)\n\
    \n# Create dictionaries to map indices to labels and vice versa\nid2label = {0:\
    \ \"NEGATIVE\", 1: \"POSITIVE\"}\nlabel2id = {\"NEGATIVE\": 0, \"POSITIVE\": 1}\n\
    \n# Load a pretrained model\nmodel = AutoModelForSequenceClassification.from_pretrained(\n\
    \    \"distilbert-base-uncased\", num_labels=2, id2label=id2label,\n    label2id=label2id\n\
    )\n\n# Specify the training arguments\ntraining_args = TrainingArguments(\n  \
    \  output_dir=\"my_awesome_model\",\n    learning_rate=2e-5,\n    per_device_train_batch_size=16,\n\
    \    per_device_eval_batch_size=16,\n    num_train_epochs=2,\n    weight_decay=0.01,\n\
    \    evaluation_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    load_best_model_at_end=True,\n\
    )\n\n# Instantiate a trainer\ntrainer = Trainer(\n    model=model,\n    args=training_args,\n\
    \    train_dataset=tokenized_imdb[\"train\"],\n    eval_dataset=tokenized_imdb[\"\
    test\"],\n    tokenizer=tokenizer,\n    data_collator=data_collator,\n    compute_metrics=compute_metrics,\n\
    )\n\n# Train the model\ntrainer.train()\n```\n\n### 讨论\n\n就像使用预训练图像模型一样，预训练语言模型包含了大量关于语言的上下文信息，因为它们通常是在各种开放的互联网资源上训练的。当我们从一个预训练模型基础开始时，我们通常做的是将现有网络的分类层替换为我们自己的分类层。这使我们能够调整已经学习到的网络权重，以适应我们的特定任务。\n\
    \n在这个例子中，我们正在微调一个 DistilBERT 模型，以识别 IMDB 电影评论是正面的（1）还是负面的（0）。预训练的 DistilBERT 模型提供了大量的词汇以及每个词的上下文，此外还有从先前训练任务中学到的神经网络权重。迁移学习使我们能够利用训练\
    \ DistilBERT 模型所做的所有初始工作，并将其重新用于我们的用例，在这个例子中就是对电影评论进行分类。\n\n### 另请参阅\n\n- transformers\
    \ 中的文本分类\n\n# 第 23 章\n\n## 保存、加载和提供训练好的模型\n\n### 23.0 简介\n\n在过去的 22 章和大约 200 个食谱中，我们介绍了如何获取原始数据并使用机器学习来创建性能良好的预测模型。然而，为了让我们的所有工作都有价值，我们最终需要对模型*做点什么*，例如将其与现有的软件应用程序集成。为了实现这个目标，我们需要能够在训练后保存模型，在应用程序需要时加载它们，然后向该应用程序发出请求以获取预测。\n\
    \nML 模型通常部署在简单的 Web 服务器中，旨在接收输入数据并返回预测。这使得模型可供同一网络上的任何客户端使用，因此其他服务（如 UI、用户等）可以在任何地方实时使用\
    \ ML 模型进行预测。一个示例用例是在电子商务网站上使用 ML 进行商品搜索，其中将提供一个 ML 模型，该模型接收有关用户和商品列表的数据，并返回用户购买该商品的可能性。搜索结果需要实时可用，并可供负责处理用户搜索并为用户协调结果的电子商务应用程序使用。\n\
    \n## 23.1 保存和加载 scikit-learn 模型\n\n### 问题\n\n你有一个训练好的 scikit-learn 模型，并希望将其保存并在其他地方加载。"

- img_proc: true
  md: "```\nb = [[1.17082039 0.         0.         0.7236068 ]\n [0.7236068  0.  \
    \       0.         0.4472136 ]\n [0.         1.17082039 0.7236068  0.        ]\n\
    \ [0.         0.7236068  0.4472136  0.        ]]\n```\n\nNotice that the user\
    \ in row 1 now has a score for an item in column 3, and the user in row 3 now\
    \ has a positive score for the item in column 2. This phenomenon is generally\
    \ known as *matrix completion* and is a good property for recommender systems\
    \ to have because now we get to recommend new items to users. The general method\
    \ of forcing the ML to go through a bottleneck that is smaller than the size of\
    \ the matrix that it is trying to reconstruct is known as a *low-rank approximation*\
    \ because the rank of the approximation is 2 but the rank of the original user-item\
    \ matrix is 4.\n\n![](img/da17d05291861831978609329c481581_188_0.png)\n\n# What\
    \ Is the Rank of a Matrix?\n\nAn $N \\times M$ matrix may be considered as $N$\
    \ row vectors (corresponding to users) and $M$ column vectors (corresponding to\
    \ items). When you consider the $N$ vectors of dimension $M$, the *rank of the\
    \ matrix* is the volume of the polyhedron defined by the $N$ vectors in $M$ dimensions.\
    \ This is often different from the way we talk about the rank of matrices, however.\
    \ While it's the most natural and precise definition, we instead say it's the\
    \ \"minimum number of dimensions necessary to represent the vectors of the matrix.\"\
    \n\nWe will cover SVD in more detail later in the chapter. This was just to whet\
    \ your appetite to understand how latent spaces are related to recommender systems.\n\
    \n# Dot Product Similarity\n\nIn Chapter 3 we introduced similarity measures,\
    \ but now we return to the dot product in the context of similarity because of\
    \ their increased importance in latent spaces. After all, latent spaces are built\
    \ on the assumption that distance is similarity.\n\nThe dot-product similarity\
    \ is meaningful in recommendation systems because it provides a geometric interpretation\
    \ of the relationship between users and items in the latent space (or potentially\
    \ items and items, users and users, etc.). In the context of recommendation systems,\
    \ the dot product can be seen as a projection of one vector onto another, indicating\
    \ the degree of similarity or alignment between the user's preferences and the\
    \ item's characteristics.\n\nTo understand the geometric significance of the dot\
    \ product, consider two vectors, $u$ and $p$, representing the user and the product\
    \ in the latent space, respectively. The dot product of these two vectors can\
    \ be defined as follows:"

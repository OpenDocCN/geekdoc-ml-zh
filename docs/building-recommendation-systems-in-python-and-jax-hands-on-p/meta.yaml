  - '[PAGE 216]


    Finally, we see that as we do a Bayesian hyperparameter search, we really do improve
    our performance over time. Figure 10-7 is a Pareto plot in which each dot in the
    scatterplot represents one run, and left to right is a time axis. The vertical
    axis is overall total loss, so lower is better, and it means that generally we''re
    converging toward better performance. The line inscribed along the bottom of the
    convex hull of the scatter points is the *Pareto frontier*, or the best performance
    at that x value. Since this is a time-series Pareto plot, it merely tracks the
    best performance in time.


    You may be wondering how and why we''re able to converge to better loss values
    in time. This is because we''ve conducted a Bayesian hyperparameter search, which
    means we selected our hyperparameters from independent Gaussians, and we updated
    our priors for each parameter based on performance of previous runs. For an introduction
    to this method, see "Bayesian Hyperparameter Optimization—A Primer" by Robert
    Mitson. In a real setting, we''d see less monotonic behavior in this plot, but
    we''d always be hoping to improve.


    ![](img/da17d05291861831978609329c481581_216_0.png)


    *Figure 10-7. The Pareto frontier of the loss values*


    # Prequential validation


    If we were to put the preceding approach into practice, we would need to capture
    our trained models in a model registry for use in production. Best practice is
    to establish a set of explicit evaluations against which to test a selection of
    models. In your basic ML training, you''ve likely been encouraged to think about
    validation datasets; these may take many forms, testing particular subsets of
    instances or features or even distributed across covariates in a known way.


    One useful framing for recommendation systems is to remember that they''re a fundamentally
    sequential dataset. With this in mind, let''s take another look at our ratings
    data. Later we will talk more about sequential recommenders, but while we''re
    talking about validation, it''s useful to mention how to take proper care.'
  - "[PAGE 217]\n\nNotice that all our ratings have an associated timestamp. To build\
    \ a proper validation set, it's a good idea to take that timestamp from the end\
    \ of our data.\n\nHowever, you might be wondering, “When are different users active?”\
    \ and “Is it possible that the later timestamps are a biased selection of the\
    \ ratings?” These are important questions. To account for these questions, we\
    \ should do a holdout by user.\n\nTo create this *prequential dataset*, where\
    \ the test set follows directly after the training set in a chronological sequence,\
    \ start by deciding on a desired size for validation, like 10%. Next, group the\
    \ data by user. Finally, employ rejection sampling, ensuring you don't use the\
    \ most recent timestamp as the rejection criterion.\n\nHere's a simple implementation\
    \ for pandas using rejection sampling. This is not the most computationally efficient\
    \ implementation, but it will get the job done:\n\n```\ndef prequential_validation_set(df,\
    \ holdout_perc=0.1):\n    '''\n    We utilize rejection sampling.\n\n    Assign\
    \ a probability to all observations, if they lie below the\n    sample percentage\
    \ AND they're the most recent still in the set, include.\n\n    Otherwise return\
    \ them and repeat.\n    Each time, take no more than the remaining necessary to\
    \ fill the count.\n    '''\n    count = int(len(df)*holdout_perc)\n    sample\
    \ = []\n    while count >0:\n        df['p'] = np.random.rand(len(df),1) #generate\
    \ probabilities\n        x = list(\n            df.loc[~df.index.isin(sample)]\
    \ # exclude already selected\n            .sort_values(['unix_timestamp'], ascending=False)\n\
    \            .groupby('user_id').head(1) # only allow the first in each group\n\
    \            .query(\"p < @holdout_perc\").index # grab the indices\n        )\n\
    \        rnd.shuffle(x) # ensure our previous sorting doesn't bias the users subset\n\
    \        sample += x[:count] # add observations up to the remaining needed\n \
    \       count -= len(x[:count]) # decrement the remaining needed\n\n    df.drop(columns=['p'],\
    \ inplace=True)\n\n    test = df.iloc[sample]\n    train = df[~df.index.isin(test.index)]\n\
    \    return train, test\n```\n\nThis is an effective and important validation\
    \ scheme for inherently sequential datasets."

- img_proc: true
  md: 'From this brief overview, you can see that these LLMs are trained to respond
    to requests—something well suited for a recommender. Let’s see how to augment
    this training.


    # Instruct Tuning for Recommendations


    In the previous discussion of instruct pairs, we saw that ultimately the aim of
    the training was to learn a rank comparison between two responses. This kind of
    training should feel quite familiar. In “TALLRec: An Effective and Efficient Tuning
    Framework to Align Large Language Model with Recommendation” by Keqin Bao et al.,
    the authors use a similar setup to teach user preferences to the model.


    As the paper mentions, historical interaction items are collected into two groups
    based on their ratings: user likes and user dislikes. They collect this information
    into natural language prompts to format a final “Rec Input”:


    +   1. User preference: $[item_1, \dots, item_n]$

    2. User preference: $[item_1, \dots, item_n]$

    3. Will the user enjoy the User preference, $[item_{n+1}]$?


    These follow the same training pattern as InstructGPT noted previously. The authors
    achieve dramatically improved performance on recommender problems as compared
    to an untrained LLM for recommendations; however, those should be considered baselines
    as it’s not their target task.


    # LLM Rankers


    So far in this chapter, we’ve thought of the LLM as a recommender in totality,
    but instead, the LLM can be used as simply the ranker. The most trivial approach
    to this is to simply prompt the LLM with the relevant features of a user and a
    list of items and ask it to suggest the best options.


    While naive, variants on this approach have seen somewhat surprising results in
    very generic settings: “The user wants to watch a scary movie tonight and isn’t
    sure which will be the best if he doesn’t like gore: movie-1, movie-2, etc.” But
    we can do better.


    Ultimately, as with LTR approaches, we can think of pointwise, pairwise, and list-wise.
    If we wish to use an LLM for a pointwise ranking, we should constrain our prompting
    and responses to a setting in which these models may be useful. Take, for example,
    a recommender for scientific papers; a user may wish to write what they’re working
    on and have the LLM helpfully suggest papers of relevance. While a traditional
    search problem, this is a setting in which our modern tools can bring a lot of
    utility: LLMs are effective at summarizing and semantic matching, which means
    that semantically similar results may be found from a large corpus, and then the'
  merge: -1
  pgno: 336
- img_proc: true
  md: 'agent can synthesize the output of those results into a cogent response. The
    biggest challenge here is hallucination, or suggesting papers that may not exist.


    You can think of pairwise and listwise similarly: distilling the reference data
    into a shape that the unique capabilities of these LLMs can use to make significant
    assists.


    While we''re near the topic of search and retrieval, it''s important to mention
    one of the ways in which recommendation can help LLM applications: retrieval augmentation.


    # Recommendations for AI


    We''ve seen how LLMs can be used to generate recommendations, but how do recommenders
    improve LLM applications? LLM agents are extremely general in their capabilities
    but lack specificity on many tasks. If you ask an agent, “Which of the books I
    read this year were written by nonwestern authors?” the agent has no chance of
    success. Fundamentally, this is because the general pretrained models have no
    idea what books you''ve read this year.


    To solve for this, you''ll want to leverage *retrieval augmentation*, i.e., providing
    relevant information to the model from an existing data store. The data store
    may be an SQL database, a lookup table, or a vector database, but ultimately the
    important component here is that somehow from your request, you''re able to find
    relevant information and then provide it to an agent.


    One assumption we''ve made here is that your request is interpretable by your
    retrieval system. In the preceding example, you''d like the system to automatically
    understand the “which of the books I read this year” phrase as an information-retrieval
    task equivalent to something like this:


    ```

    SELECT * FROM read_books

    WHERE CAST(finished_date, YEAR) = CAST(today(), YEAR)

    ```


    Here we''ve just made up an SQL database, but you can imagine schema to satisfy
    this request. Converting from the request to this SQL is now yet another task
    you need to model—maybe it''s the job of another agent request.


    In other contexts, you want a full-scale recommender to help with the retrieval:
    if you want users to ask an agent for a movie tonight, but also to continue to
    use your deep understanding of each user''s tastes, you could first filter the
    potential movies by the user''s preference and then send only movies your recommender
    model thinks are great for them. The agent can then service the text request from
    a subset of movies that are already determined to be great.


    The intersection of LLMs and recommendation systems is going to dominate much
    of the conversation in recommendation systems for a while. There''s a lot of low-hanging
    fruit in bringing the knowledge of recommender systems to this new industry. As
    Eugene Yan recently said:'
  merge: -1
  pgno: 337
- img_proc: true
  md: 'I think the key challenge, and solution, is getting them [LLMs] the right information
    at the right time. Having a well-organized document store can help. And by using
    a hybrid of keyword and semantic search, we can accurately retrieve the context
    that LLMs need.


    # Summary


    The future of recommendation systems is bright, but the technology will continue
    to get more complicated. One of the major changes over the last five years has
    been an incredible shift to GPU-based training and the architectures that can
    use these GPUs. This is the primary motivation for why this book favors JAX over
    TensorFlow or Torch.


    The methods in this chapter embrace bigger models, more interconnections, and
    potentially inference on a scale that’s hard to house in most organizations. Ultimately,
    recommendation problems will always be solved via the following:


    +   - Careful problem framing

    - Deeply relevant representations of users and items

    - Thoughtful loss functions that encode the nuances of the task

    - Great data collection'

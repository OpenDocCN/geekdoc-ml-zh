- md: "# Building Recommendation Systems in Python and JAX\n\nHands-On Production\
    \ Systems at Scale\n\nBryan Bischof & Hector Yee\n\n# Building Recommendation\
    \ Systems in Python and JAX\n\nImplementing and designing systems that make suggestions\
    \ to users are among the most popular and essential machine learning applications\
    \ available. Whether you want customers to find the most appealing items at your\
    \ online store, videos to enrich and entertain them, or news they need to know,\
    \ recommendation systems (RecSys) provide the way.\n\nIn this practical book,\
    \ authors Bryan Bischof and Hector Yee illustrate core concepts and provide examples\
    \ to help you create a RecSys for any industry or scale. You’ll learn the math,\
    \ ideas, and implementation details you need to succeed. This book includes the\
    \ RecSys platform components, relevant MLOps tools in your stack, plus code examples\
    \ and helpful suggestions in PySpark, SparkSQL, FastAPI, and Weights & Biases.\n\
    \nYou’ll learn:\n\n- The data essential for building a RecSys\n- How to frame\
    \ your data and business as a RecSys problem\n- Ways to evaluate models appropriate\
    \ for your system\n- Methods to implement, train, test, and deploy the model you\
    \ choose\n- Metrics you need to track to ensure your system is working as planned\n\
    - How to improve your system as you learn more about your users, products, and\
    \ business case\n\n> “A must read for practitioners aspiring to build real-world\
    \ systems, not just train models.”\n—Jacopo Tagliabue\nCo-founder of Bauplan,\
    \ co-creator of RecList and evalRS\n\n> “This book will sit on my bookshelf as\
    \ the standard reference on this topic from now on.”\n—Will Kurt\nAI engineer\
    \ and author of Bayesian Statistics the Fun Way and Get Programming with Haskell\n\
    \nBryan Bischof leads AI at Hex, and is an adjunct professor in the Rutgers Masters\
    \ of Business and Analytics program where he teaches Data Science. Previously,\
    \ he was the Head of Data Science at Weights and Biases, where he built the DS,\
    \ ML, and Data Engineering teams.\n\nHector Yee is a staff software engineer at\
    \ Google who’s worked on projects that include the first content-based ranker\
    \ on image search and self-driving car perception.\n\nMACHINE LEARNING\n\nUS $79.99\
    \ CAN $99.99\nISBN:978-1-492-09799-0\n\nTwitter: @oreillymedia\nlinkedin.com/company/oreilly-media\n\
    youtube.com/oreillymedia\n\n# Praise for *Building Recommendation Systems in Python\
    \ and JAX*\n\n> Bryan and Hector have created something special here, introducing\
    \ concepts that take most people years to learn within the RecSys domain and then\
    \ providing clear code examples that put them into practice. I wish I had this\
    \ book when I started out on my RecSys journey.\n\n—Even Oldridge, Director of\
    \ Engineering, Recommender Systems, NVIDIA\n\n> This is a book I've been waiting\
    \ for, making recommendation systems accessible using JAX. The only other thing\
    \ you need is your laptop.\n\n—Shaked Zychlinski, former Head of Recommendations\
    \ at Lightricks\n\n> Bryan and Hector have distilled decades of recommendation\
    \ system advancements into a concise, yet practical guide. Bridging the gap between\
    \ theory and application, this book is packed with easy-to-understand Python and\
    \ JAX examples. This is an indispensable guide for RecSys practitioners at all\
    \ levels, from novices to experts.\n\n—Eugene Yan, Applied Scientist, Amazon\n\
    \n> This book takes a holistic approach to building recommender systems, synthesizing\
    \ math, code, systems design, and business application. It covers all the nuances\
    \ that practitioners need to consider to implement real-world solutions. The intuitive\
    \ examples using publicly available datasets enables the reader to turn abstract\
    \ concepts into concrete learnings.\n\n—Eric Colson, AI Advisor, Former Chief\
    \ Algorithms Officer at Stitch Fix, Former VP of Data Science and Engineering\
    \ at Netflix\n\n> Recommender systems are among the most impactful ML systems\
    \ ever deployed. This book brilliantly navigates the balance between principled\
    \ modeling, clear code examples, and architectural best practices. A must read\
    \ for practitioners aspiring to build real-world systems, not just train models.\n\
    \n—Jacopo Tagliabue, Co-founder of Bauplan, Adjunct Professor of ML Systems at\
    \ NYU, Co-creator of RecList and evalRS\n\n> For years I’ve found there is a tremendous\
    \ gap between recommendation systems as described in texts and as practiced in\
    \ the field. Yee and Bischof’s excellent *Building Recommendation Systems in Python\
    \ and JAX* closes this gap and will make readers finally feel initiated into this\
    \ vital area of data science.\n\n—Will Kurt, AI Engineer and author of *Bayesian\
    \ Statistics the Fun Way* and *Get Programming with Haskell*\n\n> This book is\
    \ an essential resource for anyone interested in the information retrieval (IR)\
    \ space. The authors take special care to do the incredibly important and nuanced\
    \ work of preparing the reader to solve problems in this space. With this book\
    \ as a reference, you will be able to think through how to set up the IR problem,\
    \ think through the practical steps to take, and then get building.\n\n—Eric Schles,\
    \ Research Scientist, Johns Hopkins University\n\n# Building Recommendation Systems\
    \ in Python and JAX\n\nHands-on Production Systems at Scale\n\nBryan Bischof and\
    \ Hector Yee\n\n# Building Recommendation Systems in Python and JAX\n\nby Bryan\
    \ Bischof and Hector Yee\n\nCopyright © 2024 Bryan Bischof and Resonant Intelligence\
    \ LLC. All rights reserved.\n\nPrinted in the United States of America.\n\nPublished\
    \ by O'Reilly Media, Inc., 1005 Gravenstein Highway North, Sebastopol, CA 95472.\n\
    \nO'Reilly books may be purchased for educational, business, or sales promotional\
    \ use. Online editions are also available for most titles (http://oreilly.com).\
    \ For more information, contact our corporate/institutional sales department:\
    \ 800-998-9938 or corporate@oreilly.com.\n\n**Acquisitions Editor:** Nicole Butterfield\n\
    **Development Editor:** Jill Leonard\n**Production Editor:** Aleeya Rahman\n**Copyeditor:**\
    \ Sharon Wilkey\n**Proofreader:** Piper Editorial Consulting, LLC\n\n**Indexer:**\
    \ Judith McConville\n**Interior Designer:** David Futato\n**Cover Designer:**\
    \ Karen Montgomery\n**Illustrator:** Kate Dullea\n\nDecember 2023: First Edition\n\
    \n# Revision History for the First Edition\n\n2023-12-04: First Release\n\nSee\
    \ http://oreilly.com/catalog/errata.csp?isbn=9781492097990 for release details.\n\
    \nThe O'Reilly logo is a registered trademark of O'Reilly Media, Inc. *Building\
    \ Recommendation Systems in Python and JAX*, the cover image, and related trade\
    \ dress are trademarks of O'Reilly Media, Inc.\n\nThe views expressed in this\
    \ work are those of the authors and do not represent the publisher's views. While\
    \ the publisher and the authors have used good faith efforts to ensure that the\
    \ information and instructions contained in this work are accurate, the publisher\
    \ and the authors disclaim all responsibility for errors or omissions, including\
    \ without limitation responsibility for damages resulting from the use of or reliance\
    \ on this work. Use of the information and instructions contained in this work\
    \ is at your own risk. If any code samples or other technology this work contains\
    \ or describes is subject to open source licenses or the intellectual property\
    \ rights of others, it is your responsibility to ensure that your use thereof\
    \ complies with such licenses and/or rights.\n\n978-1-492-09799-0\n[LSI]\n\n#\
    \ Table of Contents\n\nPreface ........................................................................\
    \ xiii\n\n# Part I. Warming Up\n\n1. Introduction ........................................................................\
    \ 3\n    Key Components of a Recommendation System 4\n        Collector 4\n  \
    \      Ranker 4\n        Server 4\n    Simplest Possible Recommenders 5\n    \
    \    The Trivial Recommender 5\n        Most-Popular-Item Recommender 6\n    A\
    \ Gentle Introduction to JAX 7\n        Basic Types, Initialization, and Immutability\
    \ 7\n        Indexing and Slicing 9\n        Broadcasting 9\n        Random Numbers\
    \ 10\n        Just-in-Time Compilation 11\n    Summary 12\n\n2. User-Item Ratings\
    \ and Framing the Problem ........................................ 13\n    The\
    \ User-Item Matrix 13\n    User-User Versus Item-Item Collaborative Filtering\
    \ 16\n    The Netflix Challenge 17\n    Soft Ratings 19\n    Data Collection and\
    \ User Logging 19\n        What to Log 20"
  mdcn: "# 使用 Python 和 JAX 构建推荐系统\n\n大规模生产系统实战\n\nBryan Bischof & Hector Yee\n\n#\
    \ 使用 Python 和 JAX 构建推荐系统\n\n实现和设计向用户提供建议的系统，是当前最流行且必不可少的机器学习应用之一。无论您是希望客户在您的在线商店中找到最具吸引力的商品，还是希望为他们提供丰富和娱乐性的视频，抑或是他们需要了解的新闻，推荐系统（RecSys）都能提供相应的解决方案。\n\
    \n在这本实用书籍中，作者 Bryan Bischof 和 Hector Yee 阐述了核心概念并提供了示例，以帮助您为任何行业或规模创建推荐系统。您将学习成功所需的数学、理念和实现细节。本书涵盖了推荐系统平台组件、技术栈中相关的\
    \ MLOps 工具，以及 PySpark、SparkSQL、FastAPI 和 Weights & Biases 的代码示例和实用建议。\n\n您将学到：\n\
    \n- 构建推荐系统所需的关键数据\n- 如何将您的数据和业务构建为推荐系统问题\n- 适合您系统的模型评估方法\n- 实现、训练、测试和部署所选模型的方法\n\
    - 需要跟踪的指标，以确保系统按计划运行\n- 如何随着对用户、产品和业务案例的深入了解来改进系统\n\n> “对于渴望构建真实世界系统（而不仅仅是训练模型）的从业者来说，这是一本必读之作。”\n\
    —Jacopo Tagliabue\nBauplan 联合创始人，RecList 和 evalRS 联合创建者\n\n> “从现在起，这本书将作为该主题的标准参考书摆在我的书架上。”\n\
    —Will Kurt\nAI 工程师，《贝叶斯统计：有趣的方式》和《Haskell 编程入门》的作者\n\nBryan Bischof 在 Hex 领导 AI\
    \ 团队，并在罗格斯大学商业与分析硕士项目中担任兼职教授，教授数据科学课程。此前，他曾担任 Weights and Biases 的数据科学主管，负责组建数据科学、机器学习和数据工程团队。\n\
    \nHector Yee 是 Google 的一名资深软件工程师，曾参与过包括图像搜索中首个基于内容的排序器和自动驾驶汽车感知在内的项目。\n\n机器学习\n\
    \n美国售价 79.99 美元 加拿大售价 99.99 美元\nISBN:978-1-492-09799-0\n\nTwitter: @oreillymedia\n\
    linkedin.com/company/oreilly-media\nyoutube.com/oreillymedia\n\n# 对《使用 Python\
    \ 和 JAX 构建推荐系统》的赞誉\n\n> Bryan 和 Hector 在这里创造了特别的东西，他们介绍了在推荐系统领域大多数人需要多年才能掌握的概念，然后提供了清晰的代码示例来将这些概念付诸实践。我希望在我开始推荐系统之旅时就能拥有这本书。\n\
    \n—Even Oldridge，NVIDIA 推荐系统工程总监\n\n> 这是我一直在等待的一本书，它使用 JAX 让推荐系统变得触手可及。你唯一需要的就是你的笔记本电脑。\n\
    \n—Shaked Zychlinski，Lightricks 前推荐负责人\n\n> Bryan 和 Hector 将数十年的推荐系统进展提炼成了一本简洁而实用的指南。这本书弥合了理论与应用之间的鸿沟，充满了易于理解的\
    \ Python 和 JAX 示例。对于从新手到专家的各级推荐系统从业者来说，这都是一本不可或缺的指南。\n\n—Eugene Yan，亚马逊应用科学家\n\
    \n> 这本书采用了一种整体方法来构建推荐系统，综合了数学、代码、系统设计和商业应用。它涵盖了从业者在实施现实世界解决方案时需要考虑的所有细微差别。使用公开数据集的直观示例使读者能够将抽象概念转化为具体的学习成果。\n\
    \n—Eric Colson，AI 顾问，Stitch Fix 前首席算法官，Netflix 前数据科学与工程副总裁\n\n> 推荐系统是有史以来部署的最具影响力的机器学习系统之一。这本书出色地平衡了原则性建模、清晰的代码示例和架构最佳实践。对于渴望构建真实世界系统（而不仅仅是训练模型）的从业者来说，这是一本必读之作。\n\
    \n—Jacopo Tagliabue，Bauplan 联合创始人，纽约大学机器学习系统兼职教授，RecList 和 evalRS 联合创建者\n\n> 多年来，我发现教科书中描述的推荐系统与实践中应用的推荐系统之间存在巨大差距。Yee\
    \ 和 Bischof 的优秀著作《使用 Python 和 JAX 构建推荐系统》弥合了这一差距，并将使读者最终感觉被引入了数据科学的这一重要领域。\n\n\
    —Will Kurt，AI 工程师，《贝叶斯统计：有趣的方式》和《Haskell 编程入门》的作者\n\n> 这本书是任何对信息检索（IR）领域感兴趣的人的必备资源。作者特别注意做好极其重要且细致的工作，为读者解决该领域的问题做好准备。以这本书为参考，您将能够思考如何设置\
    \ IR 问题，思考要采取的实际步骤，然后开始构建。\n\n—Eric Schles，约翰斯·霍普金斯大学研究科学家\n\n# 使用 Python 和 JAX\
    \ 构建推荐系统\n\n大规模生产系统实战\n\nBryan Bischof 和 Hector Yee\n\n# 使用 Python 和 JAX 构建推荐系统\n\
    \n作者：Bryan Bischof 和 Hector Yee\n\n版权所有 © 2024 Bryan Bischof 和 Resonant Intelligence\
    \ LLC。保留所有权利。\n\n印刷于美国。\n\n由 O'Reilly Media, Inc. 出版，地址：1005 Gravenstein Highway\
    \ North, Sebastopol, CA 95472。\n\nO'Reilly 图书可用于教育、商业或销售推广用途。大多数图书也提供在线版本（http://oreilly.com）。欲了解更多信息，请联系我们的企业/机构销售部门：800-998-9938\
    \ 或 corporate@oreilly.com。\n\n**策划编辑：** Nicole Butterfield\n**开发编辑：** Jill Leonard\n\
    **制作编辑：** Aleeya Rahman\n**文字编辑：** Sharon Wilkey\n**校对：** Piper Editorial Consulting,\
    \ LLC\n\n**索引编制：** Judith McConville\n**内页设计：** David Futato\n**封面设计：** Karen\
    \ Montgomery\n**插图：** Kate Dullea\n\n2023年12月：第一版\n\n# 第一版修订历史\n\n2023-12-04：首次发布\n\
    \n有关发布详情，请参见 http://oreilly.com/catalog/errata.csp?isbn=9781492097990。\n\nO'Reilly\
    \ 标志是 O'Reilly Media, Inc. 的注册商标。《使用 Python 和 JAX 构建推荐系统》、封面图片及相关商业外观是 O'Reilly\
    \ Media, Inc. 的商标。\n\n本书所表达的观点为作者个人观点，不代表出版商观点。虽然出版商和作者已尽最大努力确保本书所含信息和说明的准确性，但出版商和作者对任何错误或遗漏不承担任何责任，包括但不限于因使用或依赖本书而造成的损害责任。使用本书所含信息和说明的风险由您自行承担。如果本书包含或描述的任何代码示例或其他技术受开源许可或他人知识产权约束，您有责任确保您的使用符合此类许可和/或权利。\n\
    \n978-1-492-09799-0\n[LSI]\n\n# 目录\n\n前言 ........................................................................\

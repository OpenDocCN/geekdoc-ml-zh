    \ a survey, see “Metric Distances Derived from Cosine Similarity and Pearson and\
    \ Spearman Correlations” by Stijn van Dongen and Anton J. Enright.\n\n## Explore-Exploit\
    \ as a Recommendation System\n\nSo far we’ve presented two ideas, slightly in\
    \ tension with each other:\n\n- The MPIR, a simple, easy-to-understand recommender\n\
    - The Matthew effect in recommendation systems and its runaway behavior in distributions\
    \ of ratings\n\nBy now, you likely realize that the MPIR will amplify the Matthew\
    \ effect and that the Matthew effect will drive the MPIR to the trivial recommender\
    \ in the limit. This is the classic difficulty of maximizing a loss function with\
    \ no randomization: it quickly settles into a modal state.\n\nThis problem—and\
    \ many others like it—encourages some modification to the algorithm to prevent\
    \ this failure mode and continues to expose the algorithm and users to other options.\
    \ The basic strategy for *explore-exploit schemes*, or *multiarmed bandits* as\
    \ they’re called, is to take not only the outcome-maximizing recommendation but\
    \ also a collection of alternative *variants*, and randomly determine which to\
    \ use as a response.\n\nTaking a step back: given a collection of variant recommendations,\
    \ or *arms*, $A$, for which the outcome of each recommendation is $y_l$, we have\
    \ a prior reward function $R(y_l)$. The bandit (called an *agent* in this literature)\
    \ would like to maximize $R(y_l)$ but doesn’t know the distribution of the outcomes\
    \ $Y_{a \\in A}$. The agent thus assumes some prior distributions for $Y_{a \\\

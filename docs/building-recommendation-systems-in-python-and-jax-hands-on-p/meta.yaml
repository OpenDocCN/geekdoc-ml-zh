    # Alerting and Monitoring


    Alerting and monitoring take a lot of their inspiration from the DevOps world
    for software engineering. Here are some high-level principles that will guide
    our thinking:


    +   - Clearly defined schemas and priors

    - Observability


    # Schemas and Priors


    When designing software systems, you almost always have expectations about how
    the components fit together. Just as you anticipate the input and output to functions
    when writing code, in software systems you anticipate these at each interface.
    This is relevant not only for microservice architectures; even in a monolith architecture,
    components of the system need to work together and often have boundaries between
    their defining responsibilities.


    Let’s make this more concrete via an example. You’ve built a user-item latent
    space, a feature store for user features, a bloom filter for client avoids (things
    the client specifically tells you they don’t want), and an experiment index that
    defines which of two models should be used for scoring. First let’s examine the
    latent space; when provided a user_id, we need to look up its representation,
    and we already have some assumptions:


    +   - The user_id provided will be of the correct type.

    - The user_id will have a representation in our space.

    - The representation returned will be of the correct type and shape.

    - The component values of the representation vector will be in the appropriate
    domain. (The support of representations in your latent space may vary day to day.)


    From here, we need look up the k ANN, which incurs more assumptions:


    +   - There are ≥ k vectors in our latent space.

    - Those vectors adhere to the expected distributional behavior of the latent space.


    While these seem like relatively straightforward applications of unit tests, canonizing
    these assumptions is important. Take the last assumption in both of the two services:
    how can you know the appropriate domain for the representation vectors? As part
    of your training procedure, you’ll need to calculate this and then store it for
    access during the inference pipeline.'
  - '[PAGE 128]


    In the second case, when finding nearest neighbors in high-dimensional spaces,
    well-discussed difficulties arise in distributional uniformity, but this can mean
    particularly poor performance for recommendations. In practice, we have observed
    a spiky nature to the behavior of *k*-nearest neighbors in latent spaces, leading
    to difficult challenges downstream in ensuring diversity of recommendations. These
    distributions can be estimated as priors, and simple checks like KL divergence
    can be used online; we can estimate the average behavior of the embeddings and
    the difference between local geometries.


    In both cases, collecting and logging the output of this information can provide
    a rich history of what is going on with your system. This can shorten debugging
    loops later if model performance is low in production.


    Returning to the possibility of user_id lacking a representation in our space:
    this is precisely the cold-start problem! In that case, we need to transition
    over to a different prediction pipeline: perhaps user-feature-based, explore-exploit,
    or even hardcoded recommendations. In this setting, we need to understand next
    steps when a schema condition is not met and then gracefully move forward.


    # Integration Tests


    Let''s consider one higher-level challenge that might emerge in a system like
    this at the level of integration. Some refer to these issues as *entanglement*.


    You''ve learned through experimentation that you should find *k* = 20 ANNs in
    the item space for a user to get good recommendations. You make a call to your
    representation space, get your 20 items, and pass them onto the filtering step.
    However, this user is quite picky; they have previously made many restrictions
    on their account about the kind of recommendations they allow: no shoes, no dresses,
    no jeans, no hats, no handbags—what''s a struggling recommendation system to do?


    Naively, if you take the 20 neighbors and pass them into the bloom, you''re likely
    to be left with nothing! You can approach this challenge in two ways:


    +   - Allow for a callback from the filter step to the retrieval (see "Predicate
    Pushdown" on page 278)

    - Build a user distribution and store that for access during retrieval


    In the first approach, you give access to your filter step to call the retrieval
    step with a larger *k* until the requirements are satisfied after the bloom. Of
    course, this incurs significant slowdown as it requires multiple passes and ever-growing
    queries with redundancy! While this approach is simple, it requires building defensively
    and knowing ahead of time what may go wrong.'
- md: 'In the second approach, during training, you can sample from the user space
    to build estimates of the appropriate *k* for varying numbers of avoids by user.
    Then, giving access to a lookup of total avoids by user to the collector can help
    defend against this behavior.


    ![](img/da17d05291861831978609329c481581_129_0.png)


    ## Over-Retrieval


    Sometimes people in information retrieval perform *over-retrieval* to mitigate
    issues of conflicting requirements from the search request, which can arise if
    the user makes a search and applies many filters simultaneously. This is applicable
    in recommendation systems as well.


    If you retrieve only exactly the number of potential recommendations you need
    to serve to the user, downstream rules or poor personalization scores can sometimes
    cause a serious issue for serving up recommendations. This is why it is common
    to retrieve more items than you anticipate showing to the user.


    ## Observability


    Many tools in software engineering can assist with observability—understanding
    the *whys* of what''s going on in the software stack. Because the systems we are
    building become quite distributed, the interfaces become critical monitoring points,
    but the paths also become complex.


    ## Spans and traces


    Common terms in this area are *spans* and *traces*, which refer to two dimensions
    of a call stack, illustrated in Figure 7-3. Given a collection of connected services,
    as in our preceding examples, an individual inference request will pass through
    some or all of those services in a sequence. The sequence of service requests
    is the *trace*. The potentially parallel time delays of each of these services
    is the *span*.


    ![](img/da17d05291861831978609329c481581_129_1.png)


    Figure 7-3. The spans of a trace


    The graphical representation of spans usually demonstrates how the time for one
    service to respond comprises several other delays from other calls.


    *Observability* enables you to see traces, spans, and logs in conjunction to appropriately
    diagnose the behavior of your system. In our example of utilizing a callback from
    the filter step to get more neighbors from the collector, we might see a slow
    response and wonder, “What has happened?” By viewing the spans and traces, we’d
    be able to see that the first call to the collector was as expected, then the
    filter step made a call to the collector, then another call to the collector,
    and so on, which built up a huge span for the filter step. Combining that view
    with logging would help us rapidly diagnose what might be happening.


    ## Timeouts


    In the preceding example, we had a long process that could lead to a very bad
    user experience. In most cases, we impose hard restrictions on how bad we let
    things get; these are called *timeouts*.


    Usually, we have an upper bound on how long we’re willing to wait for our inference
    response, so implementing timeouts aligns our system with these restrictions.
    It’s important in these cases to have a *fallback*. In the setting of recommendation
    systems, a fallback usually comprises things like the MPIR prepared such that
    it incurs minimal additional delay.


    ## Evaluation in Production


    If the previous section was about understanding what’s coming into your model
    in production, this one might be summarized as what’s coming out of your model
    in production. At a high level, evaluation in production can be thought of as
    extending all your model-validation techniques to the inference time. In particular,
    you are looking at *what the model actually is doing*!


    On one hand, we already have tools to do this evaluation. You can use the same
    methods to evaluate performance as you do for training, but now on real observations
    streaming in. However, this process is not as obvious as we might first guess.
    Let’s discuss some of the challenges.


    ## Slow Feedback


    Recommendation systems fundamentally are trying to lead to item selection, and
    in many cases, purchases. But if we step back and think more holistically about
    the purpose of integrating recommendation systems into businesses, it’s to drive
    revenue. If you’re an ecommerce shop, item selection and revenue may seem easily
    associated: a purchase leads to revenue, so good item recommendation leads to
    revenue. However, what about returns? Or even a harder question: is this revenue
    incremental? One challenge with recommendation systems is that it can be difficult
    to draw a causal arrow between any metric used to measure the performance of your
    models to the business-oriented KPIs.


    We call this *slow feedback* because sometimes the loop from a recommendation
    to a meaningful metric and back to the recommender can take weeks or even longer.
    This is especially challenging when you want to run experiments to understand
    whether a new model should be rolled out. The length of the test may need to stretch
    quite a bit more to get meaningful results.


    Usually, the team aligns on a proxy metric that the data scientists believe is
    a good estimator for the KPI, and that proxy metric is measured live. This approach
    has a huge variety of challenges, but it often suffices and provides motivation
    for more testing. Well-correlated proxies are often a great start to get directional
    information indicating where to take further iterations.


    ## Model Metrics


    So, what are the key metrics to track for your model in production? Given that
    we’re looking at recommendation systems at inference time, we should seek to understand
    the following:


    - Distribution of recommendation across categorical features

    - Distribution of affinity scores

    - Number of candidates

    - Distribution of other ranking scores


    As we discussed before, during the training process, we should be calculating
    broadly the ranges of our similarity scores in our latent space. Whether we are
    looking at high-level estimations or finer ones, we can use these distributions
    to get warning signals that something might be strange. Simply comparing the output
    of our model during inference, or over a set of inference requests, to these precomputed
    distributions can be extremely helpful.


    Comparing distributions can be a long topic, but one standard approach is computing
    *KL-divergence* between the observed distribution and the expected distribution
    from training. By computing KL divergence between these, we can understand how
    *surprising* the model’s predictions are on a given day.


    What we’d really like is to understand the receiver operating characteristic curve
    (ROC) of our model predictions with respect to one of our conversion types. However,
    this involves yet another integration to tie back to logging. Since our model
    API produces only the recommendation, we’ll still need to tie into logging from
    the web application to understand outcomes! To tie back in outcomes, we must join
    the model predictions with the logging output to get the evaluation labels, which
    can be done via log-parsing technologies (like Grafana, ELK, or Prometheus). We''ll
    see more of this in Chapter 8.


    ![](img/da17d05291861831978609329c481581_132_0.png)


    **Receiver Operating Characteristic Curve**


    If we assume that the relevance scores are estimating whether the item will be
    relevant to the user, this forms a binary classification problem. Utilizing these
    (normalized) scores, we can build an ROC to estimate over the distributions of
    queries when the relevance score begins to accurately predict a relevant item
    via retrieval history. This curve can thus be used to estimate parameters like
    necessary retrieval depth or even problematic queries.


    ## Continuous Training and Deployment


    It may feel like we''re done with this story since we have models tracked and
    production monitoring in place, but rarely are we satisfied with set-it-and-forget-it
    model development. One important characteristic of ML products is that models
    frequently need to be updated to even be useful. Previously, we discussed model
    metrics and that sometimes performance in production might look different from
    our expectations based on the trained models'' performance. This can be further
    exacerbated by model drift.


    ## Model Drift


    *Model drift* is the notion that the same model may exhibit different prediction
    behavior over time, merely due to changes in the data-generating process. A simple
    example is a time-series forecasting model. When you build a time-series forecasting
    model, the especially unique property that is essential for good performance is
    *autoregression*: the value of the function covaries with previous values of the
    function. We won''t go into detail on time-series forecasting, but suffice it
    to say: your best hope of making a good forecast is to use up-to-date data! If
    you want to forecast stock prices, you should always use the most recent prices
    as part of your predictions.


    This simple example demonstrates how models may drift, and forecasting models
    are not so different from recommendation models—especially when considering the
    seasonal realities of many recommendation problems. A model that did well two
    weeks ago needs to be retrained with recent data to be expected to continue to
    perform well.'
  mdcn: '在第二种方法中，训练期间，你可以从用户空间中采样，以估算不同用户规避次数下合适的*k*值。然后，向收集器提供用户总规避次数的查询访问权限，有助于防范此类行为。


    ![](img/da17d05291861831978609329c481581_129_0.png)


    ## 过度检索


    有时，信息检索领域的从业者会进行*过度检索*，以缓解搜索请求中相互冲突的需求问题——当用户进行搜索并同时应用多个过滤器时，就可能出现这种情况。这同样适用于推荐系统。


    如果你只检索恰好需要提供给用户的潜在推荐数量，下游规则或较差的个性化评分有时会导致推荐服务出现严重问题。这就是为什么通常会检索比预期展示给用户更多的项目。


    ## 可观测性


    软件工程中的许多工具有助于实现可观测性——理解软件栈中正在发生的事情的*原因*。由于我们构建的系统变得相当分布式，接口成为关键的监控点，但路径也变得复杂。


    ## 跨度与追踪


    该领域的常用术语是*跨度*和*追踪*，它们指代调用栈的两个维度，如图7-3所示。给定一组相互连接的服务，如我们前面的示例所示，单个推理请求将按顺序通过其中部分或全部服务。服务请求的序列就是*追踪*。这些服务可能并行的时间延迟就是*跨度*。


    ![](img/da17d05291861831978609329c481581_129_1.png)


    图7-3. 追踪的跨度


    跨度的图形表示通常展示了一个服务的响应时间如何包含来自其他调用的多个延迟。


    *可观测性*使你能够结合查看追踪、跨度和日志，以恰当地诊断系统的行为。在我们利用过滤步骤的回调从收集器获取更多邻居的示例中，我们可能会看到响应缓慢，并疑惑：“发生了什么？”通过查看跨度和追踪，我们能够看到对收集器的首次调用符合预期，然后过滤步骤对收集器进行了一次调用，接着又是一次调用，依此类推，这为过滤步骤累积了一个巨大的跨度。将此视图与日志记录相结合，将有助于我们快速诊断可能正在发生的情况。


    ## 超时


    在前面的示例中，我们有一个可能导致非常糟糕用户体验的长流程。在大多数情况下，我们会对情况恶化的程度施加严格限制；这些被称为*超时*。


    通常，我们对愿意等待推理响应的时间有一个上限，因此实现超时使我们的系统符合这些限制。在这些情况下，拥有一个*备用方案*非常重要。在推荐系统的设置中，备用方案通常包括诸如MPIR之类的准备，以使其产生最小的额外延迟。


    ## 生产环境中的评估


    如果上一节是关于理解生产环境中进入模型的内容，那么这一节可以概括为理解生产环境中从模型输出的内容。从高层次来看，生产环境中的评估可以被视为将你所有的模型验证技术扩展到推理时间。具体来说，你是在观察*模型实际在做什么*！


    一方面，我们已经有工具来进行这种评估。你可以使用与训练相同的方法来评估性能，但现在是在实时流式传入的真实观测数据上进行。然而，这个过程并不像我们最初猜测的那样简单。让我们讨论一些挑战。


    ## 慢反馈


    推荐系统从根本上试图引导项目选择，在许多情况下，是引导购买。但如果我们退一步，更全面地思考将推荐系统集成到业务中的目的，那就是推动收入。如果你是一家电子商务商店，项目选择和收入似乎很容易关联：购买带来收入，因此好的项目推荐带来收入。然而，退货怎么办？或者一个更难的问题：这是增量收入吗？推荐系统的一个挑战是，很难在用于衡量模型性能的任何指标与面向业务的关键绩效指标之间建立因果箭头。


    我们称之为*慢反馈*，因为有时从推荐到有意义的指标再返回到推荐器的循环可能需要数周甚至更长时间。当你想运行实验以了解是否应该推出新模型时，这尤其具有挑战性。测试的长度可能需要大幅延长才能获得有意义的结果。


    通常，团队会就一个代理指标达成一致，数据科学家认为这是关键绩效指标的良好估计量，并且该代理指标是实时测量的。这种方法存在各种各样的挑战，但它通常足够用，并为更多测试提供了动力。相关性良好的代理通常是获取方向性信息的良好开端，这些信息指示了进一步迭代的方向。


    ## 模型指标


    那么，在生产环境中，你的模型需要跟踪哪些关键指标？鉴于我们关注的是推理时间的推荐系统，我们应该寻求理解以下内容：


    - 推荐在分类特征上的分布

    - 亲和度分数的分布

    - 候选数量

    - 其他排名分数的分布


    正如我们之前讨论的，在训练过程中，我们应该大致计算潜在空间中相似度分数的范围。无论我们是查看高级估计还是更精细的估计，我们都可以使用这些分布来获取可能存在问题的警告信号。简单地将我们模型在推理期间的输出，或在一组推理请求上的输出，与这些预先计算的分布进行比较，会非常有帮助。


    比较分布可能是一个长篇话题，但一个标准方法是计算观测分布与训练中预期分布之间的*KL散度*。通过计算它们之间的KL散度，我们可以理解模型在给定日期的预测有多*令人惊讶*。


    我们真正想了解的是模型预测相对于我们某种转化类型的接收者操作特征曲线。然而，这涉及到另一个集成以回溯到日志记录。由于我们的模型API只产生推荐，我们仍然需要连接到Web应用程序的日志记录以理解结果！为了回溯结果，我们必须将模型预测与日志输出连接起来以获得评估标签，这可以通过日志解析技术（如Grafana、ELK或Prometheus）完成。我们将在第8章中看到更多相关内容。


    ![](img/da17d05291861831978609329c481581_132_0.png)


    **接收者操作特征曲线**


    如果我们假设相关性分数是在估计项目是否与用户相关，这就形成了一个二元分类问题。利用这些（归一化的）分数，我们可以构建一个ROC，以估计在查询分布中，相关性分数何时开始通过检索历史准确预测相关项目。因此，该曲线可用于估计诸如必要检索深度甚至有问题的查询等参数。


    ## 持续训练与部署


    由于我们已经设置了模型跟踪和生产监控，可能会觉得这个故事已经结束了，但我们很少满足于“一劳永逸”的模型开发。机器学习产品的一个重要特征是，模型经常需要更新才能保持有用。之前，我们讨论了模型指标，有时生产环境中的性能可能与我们基于训练模型性能的预期不同。模型漂移可能会进一步加剧这种情况。


    ## 模型漂移


    *模型漂移*是指同一个模型可能仅仅由于数据生成过程的变化而随时间表现出不同的预测行为。一个简单的例子是时间序列预测模型。当你构建时间序列预测模型时，对良好性能至关重要的一个特别独特的属性是*自回归*：函数的值与函数的先前值协变。我们不会深入探讨时间序列预测，但可以说：做出良好预测的最大希望是使用最新的数据！如果你想预测股票价格，你应该始终使用最近的价格作为预测的一部分。


    这个简单的例子展示了模型如何漂移，预测模型与推荐模型并无太大不同——尤其是在考虑许多推荐问题的季节性现实时。两周前表现良好的模型需要用最近的数据重新训练，才能期望其继续表现良好。'

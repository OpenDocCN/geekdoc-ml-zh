    \ when you start thinking of situations similar to our grapefruit scenario. *Hard\
    \ ranking* usually refers to one of two kinds of special ranking rules:\n\n- Explicitly\
    \ removing some items from the list before ranking.\n- Using a categorical feature\
    \ to rank the results by category. (Note that this can even be done for multiple\
    \ features to achieve a hierarchical hard ranking.)\n\nHave you ever observed\
    \ any of the following?\n\n- A user bought a sofa. The system continues to recommend\
    \ sofas to this user even though they won't need a sofa for the next five years.\n\
    - A user buys a birthday gift for a friend interested in gardening. Then the ecommerce\
    \ site keeps recommending gardening tools despite the user having no interest\

- md: "## CHAPTER 5\nPutting It All Together:\nContent-Based Recommender\n\nThroughout\
    \ this part of the book, we’ve introduced some of the most basic components in\
    \ a recommendation system. In this chapter, we’ll get hands-on. We’re going to\
    \ design and implement a recommendation system for images from Pinterest. This\
    \ chapter, along with the book’s other “Putting It All Together” chapters, will\
    \ show you how to work with datasets by using open source tools. The material\
    \ for this kind of chapter refers to code hosted on GitHub that you will need\
    \ to download and play with in order to properly experience the content.\n\nSince\
    \ this is the first practical hands-on chapter, here are some extra setup instructions\
    \ for the development environment. We developed this code on Windows running in\
    \ a Windows Subsystem for Linux (WSL) Ubuntu virtual machine. The code should\
    \ run fine on Linux machines, with more technical adaptation for macOS and a lot\
    \ more for Windows, in which case it would be better to run it on a WSL2 Ubuntu\
    \ virtual machine. You can look at the setup for WSL in the [Microsoft documentation\
    \ for Windows](https://docs.microsoft.com/en-us/windows/wsl/install). We picked\
    \ Ubuntu for the image. You will also need NVIDIA CUDA and cuDNN if you have an\
    \ NVIDIA GPU and want to use it.\n\nWe will be using the [Shop the Look (STL)\
    \ dataset](https://github.com/pinterest/complete_the_look) from “Complete the\
    \ Look: Scene-Based Complementary Product Recommendation” by Wang-Cheng Kang et\
    \ al.\n\nIn this chapter, we will show you how to build a content-based recommender.\
    \ Recall that a content-based recommender uses indirect, generalizable representations\
    \ of the items you wish to represent. Imagine, for instance, that you want to\
    \ recommend a cake but cannot use the name of a cake. Instead, you might use descriptions\
    \ of the cake or its ingredients as the content features.\n\nWith the STL dataset,\
    \ we will try to match scenes, which are pictures of a person in a particular\
    \ setting, with products that might go well with the scene. The training set contains\
    \ pairs of scenes with single products, and we want to use the content recommender\
    \ to extend recommendations to the entire catalog of products and sort them in\
    \ some kind of ranking order. The content recommender, because it uses indirect\
    \ content features to make recommendations, can be used to recommend new products\
    \ that haven't been in the recommendation system or to warm-start a recommendation\
    \ system with manually curated data before users start using it and a feedback\
    \ loop is established. In the case of the STL dataset, we'll focus on the visual\
    \ appearance of the scene and the products.\n\nWe will generate content embeddings\
    \ via a convolutional neural network (CNN) architecture, and then train the embedding\
    \ via a triplet loss and show how to create a content recommendation system.\n\
    \nThis chapter covers the following topics:\n\n- Revision control software\n-\
    \ Python build systems\n- Random-item recommender\n- Obtaining the STL dataset\
    \ images\n- Definition of CNN\n- Model training in JAX, Flax, and Optax\n- Input\
    \ pipeline\n\n## Revision Control Software\n\n*Revision control software* is a\
    \ software system that keeps track of code changes. Think of it as a database\
    \ that tracks versions of code you have written, while providing added functionality\
    \ like showing the differences between each version of code and allowing you to\
    \ revert to a previous version.\n\nThere are many kinds of revision control systems.\
    \ We host the code for this book on [GitHub](https://github.com).\n\nThe revision\
    \ control software we use is called **Git**. Code changes are done in batches\
    \ called a *patch*, and each patch is uploaded to a source control repository\
    \ like GitHub so that it can be cloned and worked on by many people at the same\
    \ time.\n\nYou can use this command to clone the book code sample repository:\n\
    \n```\ngit clone git@github.com:BBischof/ESRecsys.git\n```\n\nFor this chapter,\
    \ look in the directory *ESRecsys/pinterest* for instructions on how to run the\
    \ code in detail. This chapter will mostly focus on descriptions and pointers\
    \ to the repository so that you'll be able to get a feel for these systems in\
    \ practice.\n\n## Python Build Systems\n\nPython *packages* are libraries that\
    \ provide functionality beyond the standard Python libraries. These include ML\
    \ packages such as TensorFlow and JAX but also more utilitarian packages like\
    \ the absl flags library or machine learning operations (MLOps) libraries like\
    \ Weights & Biases.\n\nThese packages are usually hosted on the Python Package\
    \ Index.\n\nTake a look at the file *requirements.txt*:\n\n```\nabsl-py==1.1.0\n\
    tensorflow==2.9.1\ntyped-ast==1.5.4\ntyping_extensions==4.2.0\njax==0.3.25\nflax==0.5.2\n\
    optax==0.1.2\nwandb==0.13.4\n```\n\nYou can see that we have picked a small set\
    \ of Python packages to install for our dependencies. The format is package name,\
    \ two equal signs, and then the version of the package.\n\nOther build systems\
    \ that work with Python include the following:\n\n- pip\n- Bazel\n- Anaconda\n\
    \nFor this chapter, we will use pip.\n\nBefore installing the packages, however,\
    \ you might want to read up on Python virtual environments. Python virtual environments\
    \ are a way to keep track of Python package dependencies per project so that if\
    \ different projects use different versions of the same package, they won't interfere\
    \ with one another because each project has its own Python virtual environment\
    \ to run in.\n\nYou can create and activate a Python virtual environment by typing\
    \ the following into a Unix shell:\n\n```\npython -m venv pinterest_venv\nsource\
    \ pinterest_venv/bin/activate\n```\n\nThe first command creates a Python virtual\
    \ environment, and the second one activates it. You will have to activate a virtual\
    \ environment every time you open a new shell so that Python knows what environment\
    \ to work in.\n\nAfter the virtual environment is created, you can then use pip\
    \ to install packages into the virtual environment, and those newly installed\
    \ packages will not affect the system-level packages.\n\nYou can do this by running\
    \ this command in the *ESRecsys/pinterest* directory:\n\n```\npip install -r requirements.txt\n\
    ```\n\nThis will install the specified packages and any subpackages that they\
    \ might depend on into the virtual environment.\n\n## Random-Item Recommender\n\
    \nThe first program we will look at is a random-item recommender (Example 5-1).\n\
    \n*Example 5-1. Setting up flags*\n\n```\nFLAGS = flags.FLAGS\n_INPUT_FILE = flags.DEFINE_string(\n\
    \    \"input_file\", None, \"Input cat json file.\")\n_OUTPUT_HTML = flags.DEFINE_string(\n\
    \    \"output_html\", None, \"The output html file.\")\n_NUM_ITEMS = flags.DEFINE_integer(\n\
    \    \"num_items\", 10, \"Number of items to recommend.\")\n\n# Required flag.\n\
    flags.mark_flag_as_required(\"input_file\")\nflags.mark_flag_as_required(\"output_html\"\
    )\n\ndef read_catalog(catalog: str) -> Dict[str, str]:\n    \"\"\"\n    Reads\
    \ in the product to category catalog.\n    \"\"\"\n    with open(catalog, \"r\"\
    ) as f:\n        data = f.read()\n    result = json.loads(data)\n    return result\n\
    \ndef dump_html(subset, output_html:str) -> None:\n    \"\"\"\n    Dumps a subset\
    \ of items.\n    \"\"\"\n    with open(output_html, \"w\") as f:\n        f.write(\"\
    <HTML>\\n\")\n        f.write(\"\"\"\n        <TABLE><tr>\n        <th>Key</th>\n\
    \        <th>Category</th>\n        <th>Image</th>\n        </tr>\"\"\")\n   \
    \     for item in subset:\n            key, category = item\n            url =\
    \ pin_util.key_to_url(key)\n            img_url = \"<img src=\"%s\">\" % url\n\
    \            out = \"<tr><td>%s</td><td>%s</td><td>%s</td></tr>\\n\" % (\n   \
    \             (key, category, img_url))\n            f.write(out)\n        f.write(\"\
    </TABLE></HTML>\")\n\ndef main(argv):\n    \"\"\"\n    Main function.\n    \"\"\
    \"\n    del argv  # Unused.\n\n    catalog = read_catalog(_INPUT_FILE.value)\n\
    \    catalog = list(catalog.items())\n    random.shuffle(catalog)\n    dump_html(catalog[:_NUM_ITEMS.value],\
    \ _OUTPUT_HTML.value)\n```\n\nHere we use the absl flags library to pass in arguments\
    \ to the program such as the path to the JSON catalog file that contains the STL\
    \ scene, and product pairs.\n\nFlags can have different types like string and\
    \ integer, and you can mark them as required. If a required flag is not passed\
    \ to the program, it will complain and stop running. Flags can be accessed via\
    \ their value method.\n\nWe load and parse the STL dataset by using the JSON Python\
    \ library, and then we randomly shuffle the catalog and dump the top few results\
    \ in HTML.\n\nYou can run the random-item recommender via the following command:\n\
    \n```\npython3 random_item_recommender.py \\\n--input_file=STL-Dataset/fashion-cat.json\
    \ --output_html=output.html\n```\n\nAfter completion, you can open the output.html\
    \ file with your web browser and see some random items from the catalog. Figure\
    \ 5-1 shows a sample."

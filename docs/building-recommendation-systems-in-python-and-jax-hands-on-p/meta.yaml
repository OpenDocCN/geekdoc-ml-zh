- img_proc: true
  md: 'Like many integers, many matrices can be *factored* into smaller matrices;
    for integers, *smaller* means of smaller value, and for matrices, *smaller* means
    of smaller dimensions. When we factor an $N \times M$ matrix, we will be looking
    for two matrices $U_{N \times d}$ and $V_{d \times M}$; note that when you multiply
    matrices together, they must share a dimension, and that dimension is eliminated,
    leaving the other two. Here, we''ll consider MFs when $d \le N$ and $d \le M$.
    By factorizing a matrix, we ask for two matrices that together equal, or approximate,
    the original matrix:


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    We seek a small value for $d$ to reduce the number of latent dimensions. As you
    may have already noticed, each of the matrices $U_{N \times d}$ and $V_{d \times
    M}$ will correspond to rows or columns of the original ratings matrix. However,
    they''re expressed in fewer dimensions. This utilizes the idea of a *low-dimensional
    latent space*. Intuitively, a latent space seeks to represent the same relationships
    as the full $N \times M$ dimensional relationships in two sets of relationships:
    items versus latent features, and users versus latent features.


    These methods are also popular in other kinds of ML, but for our case, we''ll
    primarily be looking at factorizing ratings or interaction matrices.


    # MF via SVD


    SVD and MF are closely related, but SVD is an important special case. The key
    difference is in how the factorization is done and the types of matrices that
    each can be applied to.


    Figure 10-2 shows how SVD works. The eigenvectors $e1$ and $e2$ correspond to
    the largest two eigenvalues. $e1$ explains more of the data than $e2$ and lies
    along the direction of the largest spread of points. Eigenvectors are always perpendicular
    to each other, so their dot product is always 0.


    ![](img/da17d05291861831978609329c481581_192_0.png)


    Figure 10-2. Singular value decomposition'
  merge: -1
  pgno: 192
- img_proc: true
  md: '> SVD is a specific type of MF that decomposes a matrix into three separate
    matrices: a left singular matrix, a diagonal matrix, and a right singular matrix.
    SVD can be applied to any real-valued matrix, but it is particularly well suited
    to dense matrices with many nonzero entries; additionally, SVD matrices have properties
    useful for extracting particular kinds of relationships between latent features.
    The columns and rows of the singular matrices are the eigenvectors, and the values
    in the diagonal matrix are the eigenvalues. This decomposition is handy in seeing
    how much information in the original space is explained by the eigenvectors and
    corresponds to the magnitude of the eigenvalue, so an eigenvector with a larger
    eigenvalue explains more of the original data than an eigenvector with a correspondingly
    smaller eigenvalue.


    MF decomposes a user-item matrix into two matrices that represent the preferences
    of users and the characteristics of items. This allows the recommendation system
    to generate personalized recommendations by matching the preferences of users
    with the characteristics of items.


    Frequently, you must overcome a few challenges when considering MF:


    +   - The matrix you wish to factor is sparse and often non-negative and/or binary.

    - The number of nonzero elements in each item vector can vary wildly, as we saw
    in the Matthew effect.

    - Factorizing matrices is cubic in complexity.

    - SVD and other full-rank methods don''t work without imputation, which itself
    is complicated.


    We''ll address these with some alternative optimization methods.


    # Optimizing for MF with ALS


    The basic optimization we wish to execute is to approximate as follows:


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    Notably, if you wish to optimize matrix entries directly, you''ll need to optimize
    $d^2 * N * M$ elements simultaneously corresponding to the numbers of parameters
    in these factorizations. We can easily achieve a significant speedup, however,
    by alternating between tuning one matrix or the other. This is called *alternating
    least squares*, commonly *ALS*, and it is a common approach to this problem. Instead
    of back-propagating updates to all terms in both matrices on each pass, you may
    update only one of the two matrices, which dramatically reduces the number of
    computations that need to take place.'
  merge: -1
  pgno: 193
- img_proc: true
  md: 'ALS seeks to switch back and forth between $U$ and $V$, evaluating on the same
    loss function but updating the weights in only one matrix at a time:


    ```

    $U \leftarrow U - \eta * U * \nabla U * \mathscr{D}(A, UV)$

    $V \leftarrow V - \eta * V * \nabla V * \mathscr{D}(A, UV)$

    ```


    Here, $\eta$ is the learning rate and $\mathscr{D}$ is our chosen distance function.
    We''ll present more details of this distance function momentarily. Before we move
    on, let''s consider a few of the intricacies here:


    +   - Each of these update rules requires the gradient with respect to the relevant
    factor matrix.

    - We update an entire factor matrix at a time, but we evaluate loss on the product
    of the factor matrices versus the original matrix.

    - We have a mysterious distance function.

    - By the way that we''ve constructed this optimization, we''re implicitly assuming
    that we''ll use this process to converge two well-approximating matrices (we often
    also impose a limit on the number of iterations).


    In JAX, these optimizations will be straightforward to implement, and we''ll see
    how similar the equational forms and the JAX code look.


    ![](img/da17d05291861831978609329c481581_194_0.png)


    # Distance Between Matrices


    We can determine the distance between two matrices in a variety of ways. As we''ve
    seen before, different distance measurements for vectors yield different interpretations
    from the underlying space. We won''t have as many complications for these computations,
    but it''s worth a short observation. The most obvious approach is one you''ve
    already seen, *observed mean squared error*:


    ```

    $\frac{\sum_{\Omega}(A_{i,j} - \langle U_i, V_j \rangle)^2}{|\Omega|}$

    ```


    One useful alternative to the observed mean squared error can be used when you
    have a single nonzero entry for a user vector (alternatively, a max rating). In
    that case, you could instead use a cross-entropy loss, which provides a *logistic
    MF*, and thus a probability estimate. For more details on how to implement this,
    see the "Matrix Factorization for Recommender Systems" tutorial by Kyle Chung.'

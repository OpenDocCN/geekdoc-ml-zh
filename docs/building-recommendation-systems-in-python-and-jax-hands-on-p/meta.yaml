    # A Gentle Introduction to JAX


    Since this book has JAX in the title, we will provide a gentle introduction to
    JAX here. Its official documentation can be found on the JAX website.


    JAX is a framework for writing mathematical code in Python that is just-in-time
    (JIT) compiled. JIT compilation allows the same code to run on CPUs, GPUs, and
    TPUs. This makes it easy to write performant code that takes advantage of the
    parallel-processing power of vector processors.


    Additionally, one of the design philosophies of JAX is to support tensors and
    gradients as core concepts, making it an ideal tool for ML systems that utilize
    gradient-based learning on tensor-shaped data. The easiest way to play with JAX
    is probably via Google Colab, which is a hosted Python notebook on the web.


    # Basic Types, Initialization, and Immutability


    Let''s start by learning about JAX types. We''ll construct a small, three-dimensional
    vector in JAX and point out some differences between JAX and NumPy:


    ```

    import jax.numpy as jnp

    import numpy as np

    ```'

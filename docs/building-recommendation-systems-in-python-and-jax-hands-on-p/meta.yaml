  md: '# Keep Track of Changes


    In research code, too many variables are probably at play for you to change them
    one at a time to see their effects. This problem is particularly noticeable with
    larger datasets that require a lot of runs to determine which change causes which
    effects. So, in general, fixing a number of parameters and changing the code bit
    by bit is still a good idea so that you can keep track of the change that causes
    the most improvement. Parameters have to be tracked, but so do the code changes.


    One way to keep track of changes is through services such as Weights & Biases
    that we discussed in Chapter 5. Keeping track of the exact code that led to a
    change and the parameters is a good idea so that experiments can be reproduced
    and analyzed. Especially with research code that changes so frequently and is
    sometimes not checked in, you have to be diligent in keeping a copy of the code
    that produced a run somewhere, and MLOps tools allow you to track code and hyperparameters.


    # Use Feature Engineering


    Unlike in academic papers, most applied research is interested in a good outcome
    rather than a theoretically beautiful result. We''re not shackled by purist views
    that the model has to learn everything about the data by itself. Instead, we''re
    pragmatic and concerned about good outcomes.


    We should not discard practices like feature engineering, especially when we have
    little data or are crunched for time and need decent results fast. Using feature
    engineering means that if you know whether a handcrafted feature is correlated
    positively or negatively with an outcome like the ranking of an item, then by
    all means add these engineered features to the data. An example in recommender
    systems is having an attribute of the item being scored that matches something
    in the user''s profile. So, if an item has the same artist or album in the user''s
    playlist, we can return a Boolean True; otherwise, we return False. This extra
    feature simply helps the model converge faster, and the model can still use other
    latent features such as embeddings to compensate if the hand-engineered features
    don''t do so well.


    It is generally a good practice to ablate the hand-engineered features once in
    a while. To do this, hold back an experiment without some features to see if those
    features have become obsolete over time or if they still benefit the business
    metrics.'

- img_proc: true
  md: 'that we frequently arrive at user space and item space separately, and often
    compute distance between user and item vectors.


    Is this OK? In many cases, it lacks firm theoretical footing but works well. One
    particular case where this *does* have a firm theoretical footing is MF. Rather
    than a long digression on geometric algebra, we will give the following guidance:
    if you’re interested in comparing two vectors that aren’t in the same space, ask
    yourself if they’re of the same dimension, if distance is defined the same in
    both spaces, and if the density priors are similar. In fact, at times, none of
    these is true and you can *still* get away with a comparison. But for each of
    these potential risks, it’s worth a stop-and-think.


    One explicit example of a troubling difference in two latent spaces is found in
    “Poincaré Embeddings for Learning Hierarchical Representations” by Maximilian
    Nickel and Douwe Kiela; this paper provides an interesting way to encode relationships
    between items in your latent space via the implicit geometry. However, your users
    may not be encoded in a hyperbolic space. Tread carefully if you compute inner
    products between these and Euclidean embedded vectors!


    # Feature-Based Warm Starting


    As you saw in Chapter 7, there are a variety of ways to use features alongside
    some of the collaborative filtering (CF) and MF approaches we’ve presented. In
    particular, you saw how encoders built via a two-towers architecture can be used
    for fast feature-based recommendations in the cold-start scenario. Let’s look
    into this deeper and think carefully about features for new users or items.


    In Chapter 9, we built our bilinear factor model as a simple regression and, in
    fact, saw that all the standard ML modeling approaches would apply. However, we
    took the user embedding to be features learned from item interactions: that is,
    the content-based feature vector. If our goal is to build a recommendation algorithm
    that does not need a history of user ratings, obviously this construction will
    not suffice.


    We might begin by asking if the preceding factor regression approach could work
    in the pure user-feature setting—leave aside worries about the inner product that
    depended on a mutual embedding and just take everything to be pure matrices. While
    this is a reasonable idea that can yield some results, we may quickly identify
    the coarseness of this model: each user would then need to provide answers to
    queries $q_k$ such that $\mathbf{i} \in \mathbb{R}^{k}$. Because the dimensionality
    of these user vectors scales linearly with the number of questions we’re willing
    and able to ask the user, we are passing along the difficulty of the problem to
    our user experience.'

- img_proc: true
  md: '# mAP Versus NDCG?


    Both mAP and NDCG are holistic metrics that offer a comprehensive perspective
    of ranking quality by incorporating all relevant items and their respective ranks.
    However, the interpretability and use cases of these metrics can vary based on
    the specifics of the recommendation context and the nature of relevance.


    While MRR does not consider all relevant items, it does provide an interpretable
    insight into an algorithm''s performance, highlighting the average rank of the
    first relevant item. This can be particularly useful when the topmost recommendations
    hold significant value.


    mAP, on the other hand, is a rich evaluation measure that effectively represents
    the area under the precision-recall curve. Its average aspect confers an intuitive
    interpretation related to the trade-off between precision and recall across different
    rank cutoffs.


    NDCG introduces a robust consideration of the relevance of each item and is sensitive
    to the rank order, employing a logarithmic discount factor to quantify the diminishing
    significance of items as we move down the list. This allows it to handle scenarios
    in which items can have varying degrees of relevance, extending beyond binary
    relevance often used in mAP and MRR. However, this versatility of NDCG can also
    limit its interpretability because of the complexity of the logarithmic discount.


    Further, although NDCG is well equipped for use cases where items carry distinct
    relevance weights, procuring accurate ground-truth relevance scores can pose a
    significant challenge in practical applications. This imposes a limitation on
    the real-world usefulness of NDCG.


    Cumulatively, these metrics form the backbone of offline evaluation methodologies
    for recommendation algorithms. As we advance in our exploration, we''ll cover
    online evaluations, discuss strategies to assess and mitigate algorithmic bias,
    understand the importance of ensuring diversity in recommendations, and optimize
    recommendation systems to cater to various stakeholders in the ecosystem.


    # Correlation Coefficients


    While correlation coefficients like Pearson''s or Spearman''s can be employed
    to evaluate the similarity between two rankings (for instance, between the predicted
    and the ground-truth rankings), they do not provide the exact same information
    as mAP, MRR, or NDCG.


    Correlation coefficients are typically used to measure the degree of linear association
    between two continuous variables, and in the context of ranking, they can indicate
    the overall similarity between two ordered lists. However, they do not directly'
  merge: -1
  pgno: 242
- img_proc: true
  md: 'account for aspects such as the relevance of individual items, the position
    of relevant items, or varying degrees of relevance among items, which are integral
    to mAP, MRR, and NDCG.


    For example, say a user has interacted with five items in the past. A recommender
    system might predict that the user will interact with these items again but rank
    them in the opposite order of importance. Even though the system has correctly
    identified the items of interest, the reversed ranking would lead to poor performance
    as measured by mAP, MRR, or NDCG, but a high negative correlation coefficient
    would be obtained because of the linear relationship.


    As a result, while correlation coefficients can provide a high-level understanding
    of ranking performance, they are not sufficient substitutes for the more detailed
    information provided by metrics like mAP, MRR, and NDCG.


    To utilize correlation coefficients in the context of ranking, it would be essential
    to pair them with other metrics that account for the specific nuances of the recommendation
    problem, such as the relevance of individual items and their positions in the
    ranking.


    # RMSE from Affinity


    Root mean square error (RMSE) and ranking metrics like mAP, MRR, and NDCG offer
    fundamentally different perspectives when evaluating a recommendation system that
    outputs affinity scores.


    RMSE is a popular metric for quantifying prediction error. It computes the square
    root of the average of squared differences between the predicted affinity scores
    and the true values. Lower RMSE signifies better predictive accuracy. However,
    RMSE treats the problem as a standard regression task and disregards the inherent
    ranking structure in recommendation systems.


    Conversely, mAP, MRR, and NDCG are explicitly designed to evaluate the quality
    of rankings, which is essential in a recommendation system. In essence, while
    RMSE measures the closeness of predicted affinity scores to actual values, mAP,
    MRR, and NDCG assess the ranking quality by considering the positions of relevant
    items. Therefore, if your main concern is ranking items rather than predicting
    precise affinity scores, these ranking metrics are generally more appropriate.


    # Integral Forms: AUC and cAUC


    When it comes to recommendation systems, we are producing a ranked list of items
    for each user. As you''ve seen, these rankings are based on affinity, the probability
    or level of preference that the user has for each item. Given this framework,
    several metrics have been developed to evaluate the quality of these ranked lists.
    One such'
  merge: -1
  pgno: 243
- img_proc: true
  md: "metric is the AUC-ROC, which is complemented by mAP, MRR, and NDCG. Let's take\
    \ a closer look at understanding these.\n\n# Recommendation Probabilities to AUC-ROC\n\
    \nIn a binary classification setup, the area *under the receiver operating characteristic\
    \ curve* (AUC-ROC) measures the ability of the recommendation model to distinguish\
    \ between positive (relevant) and negative (irrelevant) instances. It is calculated\
    \ by plotting the true positive rate (TPR) against the false positive rate (FPR)\
    \ at various threshold settings and then computing the area under this curve.\n\
    \nIn the context of recommendations, you can think of these “thresholds” as varying\
    \ the number of top items recommended to a user. The AUC-ROC metric becomes an\
    \ evaluation of how well your model ranks relevant items over irrelevant ones,\
    \ irrespective of the actual rank position. In other words, AUC-ROC effectively\
    \ quantifies the likelihood that a randomly chosen relevant item is ranked higher\
    \ than a randomly chosen irrelevant one by the model. This, however, doesn't account\
    \ for the actual position or order of items in the list, only the relative ranking\
    \ of positive versus negative instances. The affinity of a calibrated item may\
    \ be interpreted as a confidence measure by the model that an item is relevant,\
    \ and when considering historical data, even uncalibrated affinity scores may\
    \ make a great suggestion for the number of recommendations necessary to find\
    \ something useful.\n\nOne serious implementation of these affinity scores might\
    \ be to show users only items over a particular score and otherwise tell them\
    \ to come back later or use exploration methods to improve the data. For example,\
    \ if you sold hygiene products and were considering asking customers to add some\
    \ Aesop soap during checkout, you may wish to evaluate the Aesop ROC and make\
    \ this suggestion only when the observed affinity passed the learned threshold.\
    \ You'll also see these concepts used later in “Inventory Health” on page 268.\n\
    \n# Comparison to Other Metrics\n\nLet's put these in context with the other metrics:\n\
    \n*mAP*\n    This metric expands on the idea of precision at a specific cutoff\
    \ in the ranked list to provide an overall measure of model performance. It does\
    \ this by averaging the precision values computed at the ranks where each relevant\
    \ item is found. Unlike AUC-ROC, mAP puts emphasis on the higher-ranked items\
    \ and is more sensitive to changes at the top of the ranking.\n\n*MRR*\n    Unlike\
    \ AUC-ROC and mAP, which consider all relevant items in the list, MRR focuses\
    \ only on the rank of the first relevant item in the list. It is a measure of"
  merge: -1
  pgno: 244
- img_proc: true
  md: 'how quickly the model can find a relevant item. If the model consistently places
    a relevant item at the top of the list, it will have a higher MRR.


    NDCG

    This metric evaluates the quality of the ranking by not only considering the order
    of recommendations but also taking into account the graded relevance of items
    (which the previous metrics don''t). NDCG discounts items further down the list,
    rewarding relevant items that appear near the top of the list.


    AUC-ROC provides a valuable aggregate measure of a model''s ability to differentiate
    between relevant and irrelevant items; mAP, MRR, and NDCG offer a more nuanced
    evaluation of the model''s ranking quality, considering factors like position
    bias and varying degrees of relevance.


    Note that we sometimes compute the AUC per customer and then average. That''s
    customer AUC (cAUC), which can often provide a good expectation for a user''s
    experience.


    # BPR


    Bayesian personalized ranking (BPR) presents a Bayesian approach to the task of
    item ranking in recommendation systems, effectively providing a probability framework
    to model the personalized ranking process. Instead of transforming the item recommendation
    problem into a binary classification problem (relevant or not), BPR focuses on
    pairwise preferences: given two items, which does the user prefer? This approach
    aligns better with the nature of implicit feedback that is common in recommendation
    systems.


    The BPR model uses a pairwise loss function that takes into account the relative
    order of a positive item and a negative item for a specific user. It seeks to
    maximize the posterior probability of the observed rankings being correct. The
    model is typically optimized using stochastic gradient descent or a variant thereof.
    It''s important to note that BPR (unlike other metrics we''ve discussed, including
    AUC-ROC, mAP, MRR, and NDCG) is a model training objective rather than an evaluation
    metric. Therefore, while the aforementioned metrics evaluate a model''s performance
    post-training, BPR provides a mechanism to guide the model learning process in
    a way that directly optimizes for the ranking task. A much deeper discussion of
    these topics is in "BPR: Bayesian Personalized Ranking from Implicit Feedback"
    by Steffen Rendle et al.'

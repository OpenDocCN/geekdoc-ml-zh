  md: "Then we can consider max—or even softmax—of the preceding dot products:\n\n\
    $C_{\\mathcal{I}} = \\mathcal{I}^T \\cdot \\mathcal{I} * q_{x_i}$\n\nThis yields\
    \ the vector of co-occurrence counts between $x_i$ and each other item. Here we\
    \ frequently will call $q_{x_i}$ a *query* to indicate that it's the input to\
    \ our co-occurrence recommendation model.\n\n![](img/da17d05291861831978609329c481581_181_0.png)\n\
    \n# How Do You Store This Data?\n\nWe can think about co-occurrence data in a\
    \ *lot* of ways. The main reason is because we expect that co-occurrences for\
    \ recommendation systems are incredibly sparse. This means that the preceding\
    \ method of matrix multiplication—which is approximately $O(n^3)$—is going to\
    \ be relatively slow to compute fewer nonzero entries. Because of this and concerns\
    \ about storing huge matrices full of zeros, computer scientists have taken seriously\
    \ the problem of representing sparse matrices.\n\n**Max Grossman** claims there\
    \ are 101 ways, but in practice there are only a few. JAX supports **BCOO**, or\
    \ *batched coordinate format*, which is essentially a list of coordinates for\
    \ nonzero elements, and then what those elements are.\n\nIn our binary case of\
    \ interactions, those are 1s, and for the co-occurrence matrix, those are the\
    \ counts. The structure of these matrices can be written as follows:\n\n```\n\n\
    {\n    'indices': indices,\n    'values': values,\n    'shape': [user_dim, items_dim]\n\
    }\n```\n\n# Pointwise Mutual Information via Co-occurrences\n\nAn early recommendation\
    \ system for articles used *pointwise mutual information*, or PMI, which is closely\
    \ related to co-occurrences. In the context of NLP, PMI attempts to express how\
    \ much more frequent co-occurrence is than random chance. Given what we've seen\
    \ before, you can think of this as a normalized co-occurrences model. Computational\
    \ linguists frequently use PMI as an estimator for word similarity or word meaning\
    \ following from the distributional hypothesis:\n\n> > You shall know a word by\
    \ the company it keeps.\n> —John R. Firth, British linguist"

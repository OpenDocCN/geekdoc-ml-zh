  md: '# Counting Recommenders


    Here we will use the simplest feature type, simple counting. Counting the frequency
    and pairwise frequencies will provide a simple but useful set of initial models.


    # Return to the Most-Popular-Item Recommender


    Our super simple scheme from before, implementing the MPIR, provided us with a
    convenient toy model, but what are the practical considerations of deploying an
    MPIR? It turns out that the MPIR provides an excellent framework for getting started
    on a Bayesian approximation approach to recommendations. Note that in this section,
    we’re not even considering a personalized recommender; everything here is reward
    maximization across the entire user population. We follow the treatment in *Statistical
    Methods for Recommender Systems* by Deepak K. Agarwal and Bee-Chung Chen (Cambridge
    University Press).


    For the sake of simplicity, let’s consider *click-through rate (CTR)* as our simple
    metric to optimize. Our formulation is as follows: we have $\mathscr{I} = \{i\}$
    items available to recommend and initially *only one time period* in which to
    do it, and we’re interested in an *allocation plan*, or a set of proportions $x_i,
    \sum_{i \in \mathscr{I}} x_i = 1$, for how to recommend items. This can be seen
    as a very simple multiarmed bandit problem with the reward given by the following:


    $R(\mathbf{x}, \mathbf{c}) = \sum_{i \in \mathscr{I}} c_i^* (N * x_i)$


    Here, $c_i$ represents prior distributions of CTR for each item. It’s plain to
    see that maximizing this reward is achieved by allocating all recommendations
    to the item with greatest $p_i$, i.e., picking the most popular item in terms
    of CTR.


    This setup makes it obvious that if we have strong confidence in our priors, this
    problem seems trivial. So let’s move to a case where we have a mismatch in confidence.


    Let’s consider *two time periods*, $N_0$ and $N_1$, as indicating the number of
    user visits. Note that we think of 0 as the past and 1 as the future in this model.
    Let’s assume that we offer *only two items* and that, somewhat mysteriously, for
    one item we have 100% confidence in its CTR in each time period: $q_0$ and $q_1$
    will denote these rates, respectively. In contrast, we have only priors for our
    second item: $p_0 \sim \mathscr{P}(\theta_0)$ and $p_1 \sim \mathscr{P}(\theta_1)$
    will denote these rates, respectively, and we regard $\theta_i$ as a state vector.
    We again notate the allocations with $x_{i, t}$, where now the second index refers
    to time period. Then we can simply compute the expected number of clicks as follows:


    $\mathbb{E}[N_0 * x_0(p_0 - q_0) + N_1 * x_1(p_1 - q_1)] + q_0 N_0 + q_1 N_1$'
  merge: -1

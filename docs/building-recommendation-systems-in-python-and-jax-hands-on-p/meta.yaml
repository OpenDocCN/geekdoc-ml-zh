  - '[PAGE 151]


    # Cluster Frameworks


    The nice thing about writing a Spark program is that it can scale from a single
    machine with multiple cores to a cluster of many machines with thousands of cores.
    The full list of cluster types can be found in the [Spark “Submitting Applications”
    documentation](https://spark.apache.org/docs/latest/cluster-overview.html).


    Spark can run on the following cluster types:


    +   - Spark Standalone cluster

    - Mesos cluster

    - YARN cluster

    - Kubernetes cluster


    Depending on the kind of cluster your company or institution has set up, most
    of the time submitting the job is just a matter of pointing to the correct URL.
    Many companies such as Databricks and Google also have fully managed Spark solutions
    that allow you to set up a Spark cluster with little effort.


    # PySpark Example


    Counting words turns out to be a powerful tool in information retrieval, as we
    can use handy tricks like term frequency, inverse document frequency (TF-IDF),
    which is simply the count of words in the documents divided by the number of documents
    the word has occurred in. This is represented as follows:


    $$tfidf_{word(i)} = \frac{\log_{10} (\text{number of times } word_i \text{ has
    occurred in corpus})}{\text{number of documents in corpus containing } word_i}$$


    For example, because the word *the* appears frequently, we might think it is an
    important word. But by dividing by the document frequency, *the* becomes less
    special and drops in importance. This trick is quite handy in simple NLP to get
    a better-than-random weighting of word importance.


    Therefore, our next step is to run `make_dictionary.py`. As the name indicates,
    this program simply counts the words and documents and makes a dictionary with
    the number of times a word has occurred.


    We have some concepts to cover in order for you to properly grok how Spark helps
    process data in a distributed manner. The entry point of most Spark programs is
    SparkContext. This Python object is created on the controller. The *controller*
    is the central program that launches workers that actually process the data. The
    workers can be run locally on a single machine as a process or on many machines
    on the cloud as separate workers.'
  - "[PAGE 152]\n\nSparkContext can be used to create resilient distributed datasets,\
    \ or RDDs. These are references to data streams that can be manipulated on the\
    \ controller, and processing on the RDD can be farmed out to all the workers.\
    \ SparkContext allows you to load up data files stored on a distributed filesystem\
    \ like Hadoop Distributed File System (HDFS) or cloud buckets. By calling the\
    \ SparkContext's textFile method, we are returned a handle to an RDD. A stateless\
    \ function can then be applied or mapped on the RDD to transform it from one RDD\
    \ to another by repeatedly applying the function to the contents of the RDD.\n\
    \nFor example, this program fragment loads a text file and converts all lines\
    \ to lowercase by running an anonymous lambda function that converts single lines\
    \ to lowercase:\n\n```\ndef lower_rdd(input_file: str,\n              output_file:\
    \ str):\n    \"\"\"Takes a text file and converts it to lowercase..\"\"\"\n  \
    \  sc = SparkContext()\n    input_rdd = sc.textFile(input_file)\n    input_rdd.map(lambda\
    \ line: line.lower()).saveAsTextFile(output_file)\n```\n\nIn a single-machine\
    \ implementation, we would simply load up each Wikipedia article, keep a running\
    \ dictionary in RAM, and count each token and then add 1 to the token count in\
    \ the dictionary. A *token* is an atomic element of a document that is divided\
    \ into pieces. In regular English, it would be a word, but Wikipedia documents\
    \ have other entities such as the document references themselves that need to\
    \ be kept track of separately, so we call the division into pieces *tokenization*\
    \ and the atomic elements *tokens*. The single-machine implementation would take\
    \ a while to go through the thousands of documents on Wikipedia, which is why\
    \ we use a distributed processing framework like Spark. In the Spark paradigm,\
    \ computation is broken into maps, where a function is applied statelessly on\
    \ each document in parallel. Spark also has a reduce function, where the outputs\
    \ of separate maps are joined together.\n\nFor example, suppose we have a list\
    \ of word counts and want to sum up the values of words that occur in different\
    \ documents. The input to the reducer will be something like this:\n\n+   - (apple,\
    \ 10)\n- (orange, 20)\n- (apple, 7)"
  - '[PAGE 153]


    Then we call the Spark function `reduceByKey(lambda a, b: a+ b)`, which adds all
    the values with the same key together and returns the following:


    +   - (orange, 20)

    - (apple, 17)


    If you look at the code in `make_dictionary.py`, the *map phase* is where we take
    a document as input and then break it into tuples of (token, 1). In the *reduce
    phase*, the map outputs are joined by the key, which in this case is the token
    itself, and the reduce function is simply to sum up all the counts of tokens.


    Note that the reduce function assumes that the reduction is associative—that is,
    $(a + b + c) = (a + b) + c = a + (b + c)$. This allows the Spark framework to
    sum up some parts of the token dictionary in memory on the map phase (in some
    frameworks, this is called the *combine step*, where you run part of the reduction
    on the output of the map phase on the mapper machine) and then sum them up over
    several passes on the reduce phase.


    As an optimization, we use the Spark function `mapPartitions`. Map runs the provided
    function once per line (for which we have encoded an entire Wikipedia document
    as a protocol buffer, uuencoded as a single text line), whereas `mapPartitions`
    runs it over an entire partition, which is many documents, usually 64 MB of them.
    This optimization lets us construct a small Python dictionary over the entire
    partition so that we have many fewer token-count pairs to reduce. This saves on
    network bandwidth so the mapper has less data to send to the reducer, and is a
    good tip in general for these data processing pipelines to reduce network bandwidth
    (which is generally the most time-consuming part of data processing compared to
    computation).


    > ## Group Theory


    Because we are math nerds, and also because group theory shows up a lot in reduction
    operations, we will briefly introduce an algebraic structure known as *groups*
    so that you clearly understand all the terms used in the reduction phase.


    The concept of sets was mentioned in the introductory chapters; a *set* is a collection
    of items. The other concept you need to know is an operator. A binary *operator*
    takes two items and returns another item that is in the set.


    Examples of sets that are commonly used are integers, real numbers, and matrices.
    Examples of binary operators are addition, multiplication, and composition.


    An operator and a set denoted by the tuple (binary operator, a set of integers)
    form a group only if the group axioms are satisfied, namely:'

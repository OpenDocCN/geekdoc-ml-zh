- img_proc: true
  md: '# NDCG


    To further refine our understanding of ranking metrics, let''s step into the world
    of NDCG. Like mAP and MRR, NDCG also acknowledges the rank order of relevant items
    but introduces a twist. It discounts the relevance of items as we move down the
    list, signifying that items appearing earlier in the list are more valuable than
    those ranked lower.


    NDCG begins with the concept of cumulative gain (CG), which is simply the sum
    of the relevance scores of the top $k$ items in the list. Discounted cumulative
    gain (DCG) goes a step further, discounting the relevance of each item based on
    its position. NDCG, then, is the DCG value normalized by the ideal DCG (IDCG),
    the DCG that we would obtain if all relevant items appeared at the very top of
    the list.


    Assuming we have five items in our list and a specific user for whom the relevant
    items are found at positions 2 and 3, the IDCG@$k$ would be $(1/\log(1 + 1) +
    1/\log(2 + 1)) = 1.5 + 0.63 = 2.13$.


    Let''s put this into the context of our example algorithms A and B.


    *For algorithm A*


    +   - DCG@5 = 1/log(2 + 1) + 1/log(3 + 1) + 1/log(5 + 1) = 0.63 + 0.5 + 0.39 =
    1.52

    - NDCG@5 = DCG@5 / IDCG@5 = 1.52 / 2.13 = 0.71


    *For algorithm B*


    +   - DCG@5 = 1/log(1 + 1) + 1/log(2 + 1) + 1/log(3 + 1) = 1 + 0.63 + 0.5 = 2.13

    - NDCG@5 = DCG@5 / IDCG@5 = 2.13 / 2.13 = 1


    The general formula for NDCG can be represented as


    $$NDCG@k = \frac{DCG@k}{IDCG@k}$$


    where


    +   - $DCG@k = \sum_{i=1}^{k} \frac{rel_i}{log_2(i+1)}$

    - $IDCG@k = \sum_{i=1}^{|\mathcal{R}|} \frac{1}{log_2(i+1)}$


    and $\mathcal{R}$ is the set of relevant documents.


    This metric gives us a normalized score for how well our recommendation algorithm
    ranks relevant items, discounting as we move further down the list.'

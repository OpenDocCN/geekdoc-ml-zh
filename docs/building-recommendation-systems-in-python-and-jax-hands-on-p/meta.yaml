    \ a recommendation from *B*'s list of liked content that *A* hasn't seen yet.\n\
    \nIf you prioritize *item similarity*, then to provide a recommendation for a\
    \ user *A*, you find an item that *A* liked, *chèvre*, and then you find an item\
    \ similar to *chèvre* that *A* hasn't seen, *emmentaler*, and recommend it for\
    \ *A*.\n\nLater we will dive deeper into similarity, but let's quickly link these\
    \ ideas to our preceding discussion. *Similar users* are rows of the user-item\
    \ matrix that are similar as vectors; *similar items* are columns of the user-item\
    \ matrix that are similar as vectors.\n\n![](img/da17d05291861831978609329c481581_36_0.png)\n\
    \n**Vector Similarity**\n\n*Dot product similarity* is more precisely defined\
    \ in Chapter 10. For now, consider similarity to be computed by normalizing the\
    \ vectors and then taking their cosine similarity. Given entities of any kind\
    \ that you've associated to vectors (lists of numbers), *vector similarity* compares\
    \ which entities are most alike with respect to the characteristics captured by\
    \ those lists of numbers (called the *latent space*).\n\n## The Netflix Challenge\n\
    \nIn 2006, Netflix kicked off an online competition called the Netflix Prize.\
    \ This competition challenged teams to improve on the performance of Netflix CF\
    \ algorithms on a dataset released as open source by the company. While such a\
    \ competition is common today via websites like Kaggle or conference, at that\
    \ time, it was very exciting and novel for those interested in RecSys.\n\nThe\
    \ competition consisted of several intermediate rounds awarding a Progress Prize\
    \ and the final Netflix Prize awarded in 2009. The data provided was a collection\
    \ of 2,817,131 triples consisting of (user, movie, date\\_rated). And half of\
    \ these additionally included the rating itself. Notice that as in our preceding\
    \ example, the user-item information is nearly enough to specify the problem.\
    \ In this particular dataset, the date was provided. Later, we will dig into how\
    \ time might be a factor, and in particular, for sequential recommendation systems.\n\
    \nThe stakes were quite high in this competition. Requirements for beating the\
    \ internal performance were a 10% increase in root mean square error (RMSE); we\
    \ will discuss this loss function later. And the spoils added up to over $1.1\
    \ million. The final winners were BellKor's Pragmatic Chaos (which incidentally\
    \ won the two previous Progress Prizes) with a test RMSE of 0.8567. In the end,\
    \ only a 20-minute earlier submission time kept BellKor ahead of the competitors\
    \ The Ensemble.\n\nTo read in detail about the winning submissions, check out\
    \ “The BigChaos Solution to the Netflix Grand Prize” by Andreas Töscher and Michael\
    \ Jahrer and “The Big-Chaos Solution to the Netflix Prize 2008” by the same authors.\
    \ Meanwhile, let's review a few important lessons from this competition:\n\nFirst,\
    \ we see that the user-item matrix we've discussed appears in these solutions\
    \ as the critical mathematical data structure. The model selection and training\
    \ is important, but parameter tuning provided a huge improvement in several algorithms.\
    \ We will return to parameter tuning in later chapters. The authors state that\
    \ several model innovations came from reflecting on the business use case and\
    \ human behavior and trying to capture those patterns in the model architectures.\
    \ Next, linear-algebraic approaches resulted in the first reasonably performant\
    \ solutions, and building on top of them led to the winning model. Finally, eking\
    \ out the performance that Netflix originally demanded to win the competition\
    \ took so long that business circumstances changed and the solution was no longer\
    \ useful.\n\nThat last point might be the *most* important thing an ML developer\
    \ needs to learn about recommendation systems; see the following tip.\n\n![](img/da17d05291861831978609329c481581_37_0.png)\n\
    \n**Start with Simplicity**\n\nBuild a working usable model quickly and iterate\
    \ while the model is still relevant to the needs of the business.\n\n## Soft Ratings\n\
    \nIn our cheese-tasting example, each cheese either received a numerical rating\
    \ or was not tried by a guest. These are *hard ratings*: regardless of whether\
    \ the cheese is a brie or a chèvre, the ratings are explicit, and their absence\
    \ indicates a lack of interaction between the user and item. In some contexts,\
    \ we’ll want to accommodate data indicating a user does interact with an item\
    \ and yet provides no rating.\n\nA common example is a movies app; a user may\
    \ have watched a movie with the app but not provided a star rating. This indicates\
    \ that the item (in this case, a movie) has been observed, but we don’t have the\
    \ rating for our algorithms to learn from. However, we can still use this implicit\
    \ data to do the following:\n\n-   Exclude this item from future recommendations\n\
    -   Use this data as a separate term in our learner\n-   Assign a default rating\
    \ value to indicate “interesting enough to watch, not significant enough to rate”\n\
    \nIt turns out that implicit ratings are critical for training effective recommendation\
    \ systems, not only because users often don’t give hard ratings, but also because\
    \ implicit ratings provide a different level of signal. Later, when we wish to\
    \ train multilevel models to predict both click likelihood and buy likelihood,\

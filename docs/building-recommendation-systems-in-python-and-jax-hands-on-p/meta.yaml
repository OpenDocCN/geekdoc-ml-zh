- img_proc: true
  md: '# Training an LTR Model


    The training data for an LTR model typically consists of a list of items, and
    each item has a set of features and a label (or ground truth). The features might
    include information about the item itself, and the label typically represents
    its relevance or importance. For instance, in our recommender systems, we have
    item features, and in the training dataset, the labels will show if the item is
    relevant to the user. Additionally, LTR models sometimes make use of the query
    or user features.


    The training process is about learning a ranking function by using these features
    and labels. These ranking functions are then applied to the retrieved items before
    serving.


    Let''s see some examples of how these models are trained.


    # Classification for Ranking


    One way to pose the ranking problem is as a multilabel task. Every item appearing
    in the training set that is associated to the user is a positive example, while
    those outside would be negative. This is, in effect, a multilabel approach at
    the scale of the set of items. The network could have an architecture with each
    item''s features as input nodes, and then some user features as well. The output
    nodes would be in correspondence with the items you wish to label.


    With a linear model, if $X$ is the item vector and $Y$ is the output, we learn
    $W$, where $sigmoid(WX) = 1$ if $X$ is an item in the positive set; otherwise,
    $sigmoid(WX) = 0$. This corresponds to the binary cross-entropy loss in Optax.


    Unfortunately, the relative ordering of items isn''t taken into account in this
    setup, so this loss function consisting of sigmoid activation functions for each
    item won''t optimize ranking metrics very well. Effectively, this ranking is merely
    a downstream relevance model that only helps to filter those options retrieved
    in a previous step.


    Another problem with this approach is that we have labeled everything outside
    of the training set to be negative, but the user might never have seen a new item
    that could be relevant to a query—so it would be incorrect to label this new item
    as a negative when it is simply unobserved.


    You may have realized that the ranking needs to consider the relative positions
    in the list. Let''s consider this next.


    # Regression for Ranking


    The most naive way to rank a set of items is simply to regress to the rank of
    a similar number like NDCG or our other personalization metrics that are rank
    respective.


    In practice, this is achieved by conditioning the set of items against a query.
    For example, we could pose the problem as regression to the NDCG, given the query
    as'
  merge: -1
  pgno: 250
- img_proc: true
  md: 'the context of the ranking. Furthermore, we can supply the query as an embedding
    context vector to a feed-forward network that is concatenated with the features
    of the items in the set and regress toward the NDCG value.


    The query is needed as a context because a set of item''s ordering might be dependent
    upon the query. Consider, for example, typing into a search bar the query **flowers**.
    We would then expect a set of items most representative of flowers to be in the
    top results. This demonstrates that the query is an important consideration of
    the scoring function.


    With a linear model, if $X$ is the item vector and $Y$ is the output, then we
    learn $W$, where $WX(i) = NDCG(i)$ and $NDCG(i)$ is the NDCG for item $i$. Regression
    can be learned using the L2 loss in Optax.


    Ultimately, this approach is about attempting to learn the underlying features
    of items that lead to higher-rank scores in your personalization metric. Unfortunately,
    this also fails to explicitly consider the relative ordering of items. This is
    a pretty serious limitation, which we''ll consider shortly.


    Another consideration: what do we do for items that aren''t ranked outside of
    the top-$k$ training items? The rank we would assign them would be essentially
    random, as we do not know what number to assign them. Therefore, this method needs
    improvement, which we''ll explore in the next section.


    # Classification and Regression for Ranking


    Suppose we have a web page such as an online bookstore, and users have to browse
    through and click items in order to purchase them. For such a funnel, we could
    break the ranking into two parts. The first model could predict the probability
    of a click on an item, given a set of items on display. The second model could
    be conditioned on a click-through and could be a regression model estimating the
    purchase price of the item.


    Then, a full ranking model could be the product of two models. The first one computes
    the probability of clicking through an item, given a set of competing items. And
    the second one computes the expected value of a purchase, given that it had been
    clicked. Notice that the first and second model could have different features,
    depending on the stage of the funnel a user is in. The first model has access
    to features of competing items, while the second model might take into account
    shipping costs and discounts applied that might change the value of an item. Thus,
    in this setting, it would be advantageous to model both stages of the funnel with
    different models so as to make use of the most amount of information present at
    each stage of the funnel.'
  merge: -1
  pgno: 251
- img_proc: true
  md: '# WARP


    One possible way to generate a ranking loss stochastically is introduced in “WSABIE:
    Scaling Up to Large Vocabulary Image Annotation” by Jason Weston et al. The loss
    is called *weighted approximate rank pairwise* (WARP). In this scheme, the loss
    function is broken into what looks like a pairwise loss. More precisely, if a
    higher-ranked item doesn''t have a score that is greater than the margin (which
    is arbitrarily picked to be 1) for a lower-rank item, we apply the *hinge loss*
    to the pair of items. This looks like the following:


    $max(0, 1 - score(pos) + score(neg))$


    With a linear model, if $X_{pos}$ is the positive item vector, and $X_{neg}$ is
    the negative item vector, then we learn $W$, where $WX_{pos} - WX_{neg} > 1$.
    The loss for this is *hinge loss*, where the predictor output is $WX_{pos} - WX_{neg}$
    and the target is 1.


    However, to compensate for the fact that an unobserved item might not be a true
    negative, just something unobserved, we count the number of times we had to sample
    from the negative set to find something that violates the ordering of the chosen
    pair. That is, we count the number of times we had to look for something where:


    $score(neg) > score(pos) - 1$


    We then construct a monotonically decreasing function of the number of times we
    sample the universe of items (less the positives) for a violating negative and
    look up the weight for this number and multiply the loss with it. If it''s very
    hard to find a violating negative, the gradient should therefore be lower because
    either we are close to a good solution already or the item was never seen before,
    so we should not be so confident as to assign it a low score just because it was
    never shown to the user as a result for a query.


    Note that WARP loss was developed when CPUs were the dominant form of computation
    to train ML models. As such, an approximation to ranking was used to obtain the
    rank of a negative item. The *approximate rank* is defined as the number of samples
    with replacement in the universe of items (less the positive example) before we
    find a negative item whose score is larger than the positive by an arbitrary constant,
    called a *margin*, of 1.0.


    To construct the WARP weight for the pairwise loss, we need a function to go from
    the approximate rank of the negative item to the WARP weight. A relatively simple
    bit of code to compute this is as follows:


    ```

    import numpy as np


    def get_warp_weights(n: int) -> np.ndarray:

    ```'

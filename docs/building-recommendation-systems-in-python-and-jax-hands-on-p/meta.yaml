  - '[PAGE 279]


    ![](img/da17d05291861831978609329c481581_279_0.png)


    Figure 13-2. Track recall experiments


    We started with the `mean_triplet_loss` and `reg_loss`, which is the regularization
    loss as a good baseline. These two losses simply make sure that the mean positive
    affinity of the context to the next track is one more than the negative affinity
    of the context to the negative tracks, and that the L2 norm of the embeddings
    does not exceed the regularization thresholds. These correspond to the metrics
    that did the worst. Notice that we do not run the experiment for the entire dataset.
    This is because for rapid iteration, it might be faster to just run on a smaller
    number of steps first and compare before interleaving occasionally with longer
    runs that use the entire dataset.


    The next loss we added was the `max_neg_affinity` and the `min_pos_affinity`.
    This loss was inspired in part by “Efficient Coordinate Descent or Ranking with
    Domina- tion Loss” by Mark A. Stevens and “Learning to Rank Recommendations with
    the k-Order Statistic Loss” by Jason Weston et al. However, we do not use the
    entire negative set but merely a subsample. Why? Because the negative set is noisy.
    Just because a user hasn''t added a particular track to a playlist doesn''t mean
    that the track is not relevant to the playlist. Maybe the user hasn''t heard the
    track yet, so the noise is due to lack of exposure. We also do not do the sampling
    step as discussed in the k-order statistic loss paper because sampling is CPU
    friendly but not GPU friendly. So we combine ideas from both papers and take the
    largest negative affinity and make it one less than the smallest positive affinity.
    The addition of this loss on the extremal tracks from both the next and negative
    sets gave us the next boost in performance in our experiments.'
  - '[PAGE 280]


    Finally, we added the self-affinity losses. These ensure that tracks from the
    context and next track sets have affinities of at least 0.5 and that the negative
    track affinities are at most 0. These are dot-product affinities and are more
    absolute as opposed to the relative positive and negative affinities that make
    the positive affinity one more than the negative affinities. In the long run,
    they didn''t help much, but they did help the model converge faster in the beginning.
    We left them in because they still offer some improvement on the evaluation metrics
    on the last training step. This wraps up the explanatory part of this “Putting
    It All Together” chapter. Now comes the fun part, the exercises!


    # Exercises


    We offer a lot of exercises because playing with the data and code is helpful
    in building out your intuition about different loss functions and ways of modeling
    the user. Also, thinking about how to write the code allows you to improve your
    proficiency with using JAX. So we have a list of helpful exercises to try out
    that are fun and will help you understand the material provided in this book.


    To wrap up this chapter, here are some interesting exercises to experiment with.
    Doing them should give you lots of intuition about loss functions and the way
    JAX works, as well as a feel for the experimental process.


    Here are some easy exercises to start with:


    +   - Try out different optimizers (e.g., ADAM, RMSPROP).

    - Try changing the feature sizes.

    - Add in duration as a feature (take care on normalization!).

    - What if you use cosine distance for inference and dot product for training?

    - Add in a new metric, like NDCG.

    - Play with distribution of positive versus negative affinities in the loss.

    - Hinge loss with the lowest next track and the highest negative track.


    Continue exploring with these more difficult exercises:


    +   - Try using the track names as features and see if they help generalize.

    - What happens if you use a two-layer network for affinity?

    - What happens if you use an LSTM to compute affinity?

    - Replace track embeddings with correlation.

    - Compute all the self-affinities in a set.'
  - '[PAGE 281]


    # Summary


    What does it mean to replace an embedding with a feature? In our example of positive
    and negative affinity, we used the dot product to compute the affinity between
    two entities, such as two tracks, $x$ and $y$. Rather than having the features
    as latent, represented by embeddings, an alternative is to manually construct
    features that represent the affinity between the two entities, $x$ and $y$. As
    covered in Chapter 9, this can be log counts or Dice correlation coefficient or
    mutual information.


    Some kind of counting feature can be made and then stored in a database. Upon
    training and inference, the database is looked up for each entity $x$ and $y$,
    and the affinity scores are then used instead of or in conjunction with the dot
    product that is being learned. These features tend to be more precise but have
    less recall than an embedding representation. The embedding representation, being
    of low rank, has the ability to generalize better and improve recall. Having counting
    features is synergistic with embedding features because we can simultaneously
    improve precision with the use of precise counting features and, at the same time,
    improve recall with the help of low-rank features like embeddings.


    For computing all $n^2$ affinities of tracks to other tracks in a set, consider
    using JAX''s `vmap` function. `vmap` can be used to convert code that, for example,
    computes one track''s affinity with all the other tracks and makes it run for
    all tracks versus all other tracks.


    We hope that you have enjoyed playing with the data and code and that your skill
    in writing recommender systems in JAX has improved considerably after trying these
    exercises!'
  - '[PAGE 282]


    # PART IV

    Serving


    Well, you can’t recommend that! Why sometimes the best recommendations aren’t
    right.


    One of the authors, Bryan, has a big question for the Amazon recommendation team:
    “Exactly how many vacuum cleaners do you think I need?” Just because Bryan bought
    the fancy Dyson to clean up after his dog doesn’t mean he’s soon going to buy
    a second one, and yet his Amazon home page seems hell-bent on recommending it.
    The reality is you’ll always need to include business logic—or basic human logic—that
    you want to include in the flow of your recommendation system to prevent silliness.
    Whether you’re facing contextually inappropriate recommendations, business infeasible
    recommendations, or simply the necessity to keep the set of recommendations a
    bit less monomaniacal, the last-step ordering can crucially improve recommendations.


    But hold your horses! Don’t think the ordering step is all switch cases and manually
    overriding your recommendation system. A synergy needs to exist between your ranking
    and your serving. Bryan also has a story about a certain query-based recommender
    he built for clothes: he wanted to implement a super-simple diversity filter on
    his recommendations—checking that the clothes recommended were of different merchandise
    classes. He made the output of his scoring model stack-rank the recommendations
    by merchandise class, so he could pick a few from each to serve. Lo and behold,
    the first week in production he was recommended 3, 4, even 5 backpacks out of
    10 recommendations. Studious as users may be, this seemed erroneous and required
    a bit of QA. His error? Backpacks can be a member of up to three merch classes,
    so they were sneaking into several diversity classes!'
  - '[PAGE 283]


    Tricky problems where the theory meets production recommendations are the subject
    of this part of the book. We''ll talk about diverse recommendations as in this
    example, but we''ll also discuss other important business priorities that factor
    into the serving part of a recommendation pipeline.'
  - '[PAGE 284]


    # CHAPTER 14

    Business Logic


    By now, you may be thinking, “Yes, our algorithmic ranking and recommendation
    has arrived! Personalization for every user with latent understanding is how we
    run our business.” Unfortunately, the business is rarely this simple.


    Let’s take a really straightforward example, a recipe recommendation system. Consider
    a user who simply hates grapefruit (one of the authors of this book *really* does)
    but may love a set of other ingredients that go well with grapefruit: asparagus,
    avocado, banana, butter, cashews, champagne, chicken, coconut, crab, fish, ginger,
    hazelnut, honey, lemon, lime, melon, mint, olive oil, onion, orange, pecan, pineapple,
    raspberry, rum, salmon, seaweed, shrimp, star anise, strawberry, tarragon, tomato,
    vanilla, wine, and yogurt. These ingredients are the *most* popular to pair with
    grapefruit, and the user loves almost all of these.


    What’s the right way for the recommender to handle this case? It may seem like
    this is something that collaborative filtering (CF), latent features, or hybrid
    recommendations would catch. However, if the user likes all these shared flavors,
    the item-based CF model would not catch this well. Similarly, if the user truly
    *hates* grapefruit, latent features may not be sufficient to truly avoid it.


    In this case, the simple approach is a great one: *hard avoids*. In this chapter,
    we’ll talk about some of the intricacies of business logic intersecting the output
    of your recommendation system.


    Instead of attempting to learn exceptions as part of the latent features that
    the model utilizes when making recommendations, it’s more consistent and simple
    to integrate these business rules as an external step via deterministic logic.
    As an example: the model could remove all grapefruit cocktails that are retrieved
    instead of attempting to learn to rank them lower.'

    对于计算集合中所有轨道到其他所有轨道的 $n^2$ 个亲和力，可以考虑使用JAX的 `vmap` 函数。`vmap` 可以用来转换代码，例如，计算一个轨道与所有其他轨道的亲和力，并使其对所有轨道与所有其他轨道运行。



  - '[PAGE 1]


    # Building Recommendation Systems in Python and JAX


    Implementing and designing systems that make suggestions to users are among the
    most popular and essential machine learning applications available. Whether you
    want customers to find the most appealing items at your online store, videos to
    enrich and entertain them, or news they need to know, recommendation systems (RecSys)
    provide the way.


    In this practical book, authors Bryan Bischof and Hector Yee illustrate core concepts
    and provide examples to help you create a RecSys for any industry or scale. You’ll
    learn the math, ideas, and implementation details you need to succeed. This book
    includes the RecSys platform components, relevant MLOps tools in your stack, plus
    code examples and helpful suggestions in PySpark, SparkSQL, FastAPI, and Weights
    & Biases.


    You’ll learn:


    +   - The data essential for building a RecSys

    - How to frame your data and business as a RecSys problem

    - Ways to evaluate models appropriate for your system

    - Methods to implement, train, test, and deploy the model you choose

    - Metrics you need to track to ensure your system is working as planned

    - How to improve your system as you learn more about your users, products, and
    business case


    > “A must read for practitioners aspiring to build real-world systems, not just
    train models.”

    —Jacopo Tagliabue

    Co-founder of Bauplan, co-creator of RecList and evalRS


    > “This book will sit on my bookshelf as the standard reference on this topic
    from now on.”

    —Will Kurt

    AI engineer and author of Bayesian Statistics the Fun Way and Get Programming
    with Haskell


    Bryan Bischof leads AI at Hex, and is an adjunct professor in the Rutgers Masters
    of Business and Analytics program where he teaches Data Science. Previously, he
    was the Head of Data Science at Weights and Biases, where he built the DS, ML,
    and Data Engineering teams.


    Hector Yee is a staff software engineer at Google who’s worked on projects that
    include the first content-based ranker on image search and self-driving car perception.


    MACHINE LEARNING


    US $79.99 CAN $99.99

    ISBN:978-1-492-09799-0


    ![](img/da17d05291861831978609329c481581_1_0.png)


    Twitter: @oreillymedia

    linkedin.com/company/oreilly-media

    youtube.com/oreillymedia'
  - '[PAGE 2]


    # Praise for *Building Recommendation Systems in Python and JAX*


    > Bryan and Hector have created something special here, introducing concepts that
    take most people years to learn within the RecSys domain and then providing clear
    code examples that put them into practice. I wish I had this book when I started
    out on my RecSys journey.


    —Even Oldridge, Director of Engineering, Recommender Systems, NVIDIA


    > This is a book I''ve been waiting for, making recommendation systems accessible
    using JAX. The only other thing you need is your laptop.


    —Shaked Zychlinski, former Head of Recommendations at Lightricks


    > Bryan and Hector have distilled decades of recommendation system advancements
    into a concise, yet practical guide. Bridging the gap between theory and application,
    this book is packed with easy-to-understand Python and JAX examples. This is an
    indispensable guide for RecSys practitioners at all levels, from novices to experts.


    —Eugene Yan, Applied Scientist, Amazon


    > This book takes a holistic approach to building recommender systems, synthesizing
    math, code, systems design, and business application. It covers all the nuances
    that practitioners need to consider to implement real-world solutions. The intuitive
    examples using publicly available datasets enables the reader to turn abstract
    concepts into concrete learnings.


    —Eric Colson, AI Advisor, Former Chief Algorithms Officer at Stitch Fix, Former
    VP of Data Science and Engineering at Netflix'
  - '[PAGE 3]


    > Recommender systems are among the most impactful ML systems ever deployed. This
    book brilliantly navigates the balance between principled modeling, clear code
    examples, and architectural best practices. A must read for practitioners aspiring
    to build real-world systems, not just train models.


    —Jacopo Tagliabue, Co-founder of Bauplan, Adjunct Professor of ML Systems at NYU,
    Co-creator of RecList and evalRS


    > For years I’ve found there is a tremendous gap between recommendation systems
    as described in texts and as practiced in the field. Yee and Bischof’s excellent

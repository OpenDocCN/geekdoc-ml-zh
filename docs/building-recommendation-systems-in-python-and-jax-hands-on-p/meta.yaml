    \ == 0 and i > 0:\n    logging.info(\"Saving checkpoint\")\n    checkpoints.save_checkpoint(\n\
    \        _WORKDIR.value, state, state.step, keep=3)\nmetrics = {\n    \"step\"\
    \ : state.step\n}\nif i % _EVAL_EVERY_STEPS.value == 0 and i > 0:\n    eval_loss\
    \ = []\n    for j in range(eval_steps):\n        ebatch = next(test_it)\n    \
    \    escene = ebatch[0]\n        epos_product = ebatch[1]\n        eneg_product\
    \ = ebatch[2]\n        loss = eval_step_fn(\n            state, escene, epos_product,\
    \ eneg_product)\n        eval_loss.append(loss)\n    eval_loss = jnp.mean(jnp.array(eval_loss))\
    \ / batch_size\n    metrics.update({\"eval_loss\" : eval_loss})\nif i % _LOG_EVERY_STEPS.value\
    \ == 0 and i > 0:\n    mean_loss = jnp.mean(jnp.array(losses))\n    losses = []\n\
    \    metrics.update({\"train_loss\" : mean_loss})\n    wandb.log(metrics)\n  \
    \  logging.info(metrics)\n\nlogging.info(\"Saving as %s\", _MODEL_NAME.value)\n\
    data = flax.serialization.to_bytes(state)\nmetadata = { \"output_size\" : wandb.config.output_size\
    \ }\nartifact = wandb.Artifact(\n    name=_MODEL_NAME.value,\n    metadata=metadata,\n\
    \    type=\"model\")\nwith artifact.new_file(\"pinterest_stl.model\", \"wb\")\
    \ as f:\n    f.write(data)\nrun.log_artifact(artifact)\n\nif __name__ == \"__main__\"\
    :\n    app.run(main)\n```\n\nA *hyperparameter sweep* is a tuning service that\
    \ helps you find optimal values for hyperparameters such as learning rate by running\
    \ many trials of different values and searches for the best one. Having the configuration\
    \ as a dictionary allows us to reproduce the best parameters by running a hyperparameter\
    \ sweep and then saving the best one for the final model."
- md: "In Figure 5-2, you can see what a Weights & Biases hyperparameter sweep looks\
    \ like. On the left, we have all the runs in the sweep; each run is trying a different\
    \ set of values that we have specified in the config dictionary. In the middle,\
    \ we see how the final evaluation loss changes over time with the number of trials\
    \ on the sweep. On the right, we have a plot indicating the importance of the\
    \ hyperparameter in affecting the evaluation loss. Here we can see that the learning\
    \ rate has the most effect on the eval loss, followed by the regularization amount.\n\
    \n![](img/da17d05291861831978609329c481581_85_0.png)\n\nOn the bottom right of\
    \ the figure, a parallel coordinates plot shows how each parameter affects the\
    \ evaluation loss. To read the plot, follow each line and see where it ends up\
    \ on the final evaluation loss. The optimal hyperparameters can be found by tracing\
    \ the line from the bottom-right target value of evaluation loss back to the left,\
    \ through the values chosen for the hyperparameters. In this case, the optimal\
    \ value selected is a learning_rate of 0.0001618, a regularization of 0.2076,\
    \ and an output_size of 64.\n\nThe rest of the code is mostly setting up the model\
    \ and hooking up the input pipeline to the model. Deciding when to log metrics\
    \ and model serialization is mostly self-explanatory. The details can be read\
    \ in the Flax documentation.\n\nIn saving the model, notice that two methods are\
    \ used. One is a checkpoint, and the other is Flax serialization. We have both\
    \ because the checkpoint is used when training jobs are canceled and we need to\
    \ recover the step at which the job was canceled so we can resume training. The\
    \ final serialization is used when the training is done.\n\nWe also save a copy\
    \ of the model as a Weights & Biases artifact. This way, the Weights & Biases\
    \ platform can keep track of the hyperparameters that created the model, the exact\
    \ code and the exact Git hash that generated the model, and the lineage of the\
    \ model. This lineage consists of upstream artifacts used to generate the model\
    \ (such as the training data), the state of the job used to create the model,\
    \ and an added back link to all future jobs that might use the artifact. This\
    \ makes it easier to reproduce models at a point in time or trace back which model\
    \ was used and at what time in production. This comes in super handy when you\
    \ have a larger organization and folks are hunting around for information on how\
    \ a model was created. By using artifacts, they can simply look in one place for\
    \ the code and training data artifacts to reproduce a model.\n\nNow that we have\
    \ trained the models, we want to generate embeddings for the scene and the product\
    \ database. The nice thing about using the dot product as a scoring function as\
    \ opposed to using a model is that you can generate scene and product embeddings\
    \ independently and then scale out these computations at inference time. This\
    \ kind of scaling will be introduced in Chapter 8, but for now the relevant part\
    \ of make_embeddings.py is shown in Example 5-7.\n\nExample 5-7. Finding the top-k\
    \ recommendations\n\n```\nmodel = models.STLModel(output_size=_OUTPUT_SIZE.value)\n\
    state = None\nlogging.info(\"Attempting to read model %s\", _MODEL_NAME.value)\n\
    with open(_MODEL_NAME.value, \"rb\") as f:\n    data = f.read()\n    state = flax.serialization.from_bytes(model,\
    \ data)\nassert(state != None)\n\n@jax.jit\ndef get_scene_embed(x):\n    return\
    \ model.apply(state[\"params\"], x, method=models.STLModel.get_scene_embed)\n\
    @jax.jit\ndef get_product_embed(x):\n    return model.apply(\n        state[\"\
    params\"],\n        x,\n        method=models.STLModel.get_product_embed\n   \
    \ )\n\nds = tf.data.Dataset\n    .from_tensor_slices(unique_scenes)\n    .map(input_pipeline.process_image_with_id)\n\
    ds = ds.batch(_BATCH_SIZE.value, drop_remainder=True)\nit = ds.as_numpy_iterator()\n\
    scene_dict = {}\ncount = 0\nfor id, image in it:\n    count = count + 1\n    if\
    \ count % 100 == 0:\n        logging.info(\"Created %d scene embeddings\", count\
    \ * _BATCH_SIZE.value)\n    result = get_scene_embed(image)\n    for i in range(_BATCH_SIZE.value):\n\
    \        current_id = id[i].decode(\"utf-8\")\n        tmp = np.array(result[i])\n\
    \        current_result = [float(tmp[j]) for j in range(tmp.shape[0])]\n     \
    \   scene_dict.update({current_id : current_result})\nscene_filename = os.path.join(_OUTDIR.value,\
    \ \"scene_embed.json\")\nwith open(scene_filename, \"w\") as scene_file:\n   \
    \ json.dump(scene_dict, scene_file)\n```\n\nAs you can see, we simply use the\
    \ same Flax serialization library to load the model, and then call the appropriate\
    \ method of the model by using the apply function. We then save the vectors in\
    \ a JSON file, since we have already been using JSON for the scene and product\
    \ databases.\n\nFinally, we'll use the scoring code in *make_recommendations.py*\
    \ to generate product recommendations for sample scenes (Example 5-8).\n\n## Example\
    \ 5-8. Core retrieval definition\n\n```\ndef find_top_k(\n    scene_embedding,\n\
    \    product_embeddings,\n    k):\n    \"\"\"\n    Finds the top K nearest product\
    \ embeddings to the scene embedding.\n    Args:\n        scene_embedding: embedding\
    \ vector for the scene\n        product_embedding: embedding vectors for the products.\n\
    \        k: number of top results to return.\n    \"\"\"\n\n    scores = scene_embedding\
    \ * product_embeddings\n    scores = jnp.sum(scores, axis=-1)\n    scores_and_indices\
    \ = jax.lax.top_k(scores, k)\n    return scores_and_indices\n\ntop_k_finder =\
    \ jax.jit(find_top_k, static_argnames=[\"k\"])\n```\n\nThe most relevant code\
    \ fragment is the scoring code, where we have a scene embedding and want to use\
    \ JAX to score all the product embeddings instead of a single scene embedding.\
    \ Here we use Lax, a sublibrary of JAX that supplies direct API calls to XLA,\
    \ the underlying ML compiler for JAX, in order to access accelerated functions\
    \ like top_k. In addition, we compile the function find_top_k by using JAX's JIT.\
    \ You can pass pure Python functions that contain JAX commands to jax.jit in order\
    \ to compile them to a specific target architecture such as a GPU using XLA. Notice\
    \ we have a special argument called `static_argnames`; this allows us to inform\
    \ JAX that k is fixed and doesn't change much so that JAX is able to compile a\
    \ purpose-built `top_k_finder` for a fixed value of k.\n\nFigure 5-3 shows sample\
    \ product recommendations for a scene in which a woman is wearing a red shirt.\
    \ The products recommended include red velvet and dark pants.\n\n![](img/da17d05291861831978609329c481581_88_0.png)\n\
    \nFigure 5-4 shows another scene: a woman is wearing a red coat outdoors, and\
    \ the matching accessories are a yellow handbag and yellow pants.\n\nWe have pregenerated\
    \ some results that are stored as an artifact that you can view by typing in the\
    \ following command:\n\n```\nwandb artifact get building-recsys/recsys-pinterest/scene_product_results:v0\n\
    ```\n\nOne thing you may notice is that the yellow bag and pants get recommended\
    \ a lot. It may be possible that the embedding vector for the yellow bag is large,\
    \ so it gets matched to a lot of scenes. This is called the *popular item problem*\
    \ and is a common issue with recommendation systems. We cover some business logic\
    \ to handle diversity and popularity in later chapters, but this is a problem\
    \ that can happen with recommendation systems that you might want to keep an eye\
    \ out for.\n\n![](img/da17d05291861831978609329c481581_89_0.png)\n\nFigure 5-4.\
    \ Recommended items for an outdoor scene\n\n## Summary\n\nAnd with that, we conclude\
    \ the first “Putting It All Together” chapter. We covered how to use JAX and Flax\
    \ to read real-world data, train a model, and find the top recommended items for\
    \ a look. If you haven’t played with the code yet, hop on over to the GitHub repo\
    \ to give it a whirl! We hope that providing a real-world working example of an\
    \ end-to-end content-based recommender will give you a better feel for how the\
    \ theory translates into practice. Enjoy playing with the code!\n\n# PART II\n\
    \n# Retrieval\n\nHow do we get all the data in the right place to train a recommendation\
    \ system? How do we build and deploy systems for real-time inference?\n\nReading\
    \ research papers about recommendation systems will often give the impression\
    \ that they’re built via a bunch of math equations, and all the really hard work\
    \ of using recommendation systems is in connecting these equations to the features\
    \ of your problem. More realistically, the first several steps of building a production\
    \ recommendation system fall under systems engineering. Understanding how your\
    \ data will make it into your system, be manipulated into the correct structure,\
    \ and then be available in each of the relevant steps of the training flow often\
    \ constitutes the bulk of the initial recommendation system’s work. But even beyond\
    \ this initial phase, ensuring that all the necessary components are fast enough\
    \ and robust enough for production environments requires yet another significant\
    \ investment in platform infrastructure.\n\nOften you’ll build a component responsible\
    \ for processing the various types of data and storing them in a convenient format.\
    \ Next, you’ll construct a model that takes that data and encodes it in a latent\
    \ space or other representation model. Finally, you’ll need to transform an input\
    \ request into the representation as a query in this space. These steps usually\
    \ take the form of jobs in a workflow management platform or services deployed\
    \ as endpoints. The next few chapters will walk you through the relevant technologies\
    \ and concepts necessary to build and deploy these systems—and the awareness of\
    \ important aspects of reliability, scalability, and efficiency.\n\nYou might\
    \ be thinking, “I’m a data scientist! I don’t need to know all this!” But you\
    \ should know that RecSys has an inconvenient duality: model architecture changes"
  mdcn: "在图5-2中，你可以看到Weights & Biases超参数扫描的示例。左侧展示了扫描中的所有运行；每次运行都尝试我们在配置字典中指定的不同参数值。中间部分显示了最终评估损失如何随着扫描试验次数的增加而变化。右侧的图表则表明了各超参数对评估损失的影响程度。从这里可以看出，学习率对评估损失的影响最大，其次是正则化强度。\n\
    \n![](img/da17d05291861831978609329c481581_85_0.png)\n\n在图的右下角，平行坐标图展示了每个参数如何影响评估损失。要解读此图，请追踪每条线，观察其最终落在评估损失的哪个位置。通过从右下角的评估损失目标值向左追溯，穿过所选的超参数值，可以找到最优超参数。在本例中，选定的最优值为：学习率`learning_rate`为0.0001618，正则化强度`regularization`为0.2076，输出维度`output_size`为64。\n\
    \n其余代码主要是设置模型并将输入管道连接到模型。决定何时记录指标和模型序列化，这些大多不言自明。详细信息可查阅Flax文档。\n\n在保存模型时，注意使用了两种方法。一种是检查点，另一种是Flax序列化。我们同时使用两者，是因为检查点用于训练任务被取消时，我们需要恢复任务被取消时的步骤以便继续训练。最终的序列化则在训练完成时使用。\n\
    \n我们还将模型的副本保存为Weights & Biases制品。这样，Weights & Biases平台可以跟踪创建模型的超参数、生成模型的确切代码和确切的Git哈希值，以及模型的谱系。该谱系包括用于生成模型的上游制品（如训练数据）、用于创建模型的任务状态，以及指向所有可能使用该制品的未来任务的回溯链接。这使得在特定时间点重现模型，或追溯在生产环境中使用了哪个模型以及何时使用变得更加容易。当你的组织规模较大，人们四处寻找关于模型如何创建的信息时，这非常方便。通过使用制品，他们只需在一个地方查找代码和训练数据制品即可重现模型。\n\
    \n既然我们已经训练好了模型，现在我们想为场景和产品数据库生成嵌入向量。使用点积作为评分函数（而不是使用模型）的好处在于，你可以独立地生成场景和产品嵌入向量，然后在推理时扩展这些计算。这种扩展将在第8章介绍，但现在`make_embeddings.py`的相关部分如示例5-7所示。\n\
    \n示例5-7. 寻找top-k推荐\n\n```\nmodel = models.STLModel(output_size=_OUTPUT_SIZE.value)\n\
    state = None\nlogging.info(\"Attempting to read model %s\", _MODEL_NAME.value)\n\
    with open(_MODEL_NAME.value, \"rb\") as f:\n    data = f.read()\n    state = flax.serialization.from_bytes(model,\
    \ data)\nassert(state != None)\n\n@jax.jit\ndef get_scene_embed(x):\n    return\
    \ model.apply(state[\"params\"], x, method=models.STLModel.get_scene_embed)\n\
    @jax.jit\ndef get_product_embed(x):\n    return model.apply(\n        state[\"\
    params\"],\n        x,\n        method=models.STLModel.get_product_embed\n   \
    \ )\n\nds = tf.data.Dataset\n    .from_tensor_slices(unique_scenes)\n    .map(input_pipeline.process_image_with_id)\n\
    ds = ds.batch(_BATCH_SIZE.value, drop_remainder=True)\nit = ds.as_numpy_iterator()\n\
    scene_dict = {}\ncount = 0\nfor id, image in it:\n    count = count + 1\n    if\
    \ count % 100 == 0:\n        logging.info(\"Created %d scene embeddings\", count\
    \ * _BATCH_SIZE.value)\n    result = get_scene_embed(image)\n    for i in range(_BATCH_SIZE.value):\n\
    \        current_id = id[i].decode(\"utf-8\")\n        tmp = np.array(result[i])\n\
    \        current_result = [float(tmp[j]) for j in range(tmp.shape[0])]\n     \
    \   scene_dict.update({current_id : current_result})\nscene_filename = os.path.join(_OUTDIR.value,\
    \ \"scene_embed.json\")\nwith open(scene_filename, \"w\") as scene_file:\n   \
    \ json.dump(scene_dict, scene_file)\n```\n\n如你所见，我们只需使用相同的Flax序列化库加载模型，然后通过`apply`函数调用模型的相应方法。接着，我们将向量保存在JSON文件中，因为我们已经在场景和产品数据库中使用了JSON格式。\n\
    \n最后，我们将使用*make_recommendations.py*中的评分为示例场景生成产品推荐（示例5-8）。\n\n## 示例5-8. 核心检索定义\n\
    \n```\ndef find_top_k(\n    scene_embedding,\n    product_embeddings,\n    k):\n\
    \    \"\"\"\n    查找与场景嵌入向量最接近的K个产品嵌入向量。\n    参数:\n        scene_embedding: 场景的嵌入向量\n\
    \        product_embedding: 产品的嵌入向量。\n        k: 要返回的top结果数量。\n    \"\"\"\n\n\
    \    scores = scene_embedding * product_embeddings\n    scores = jnp.sum(scores,\
    \ axis=-1)\n    scores_and_indices = jax.lax.top_k(scores, k)\n    return scores_and_indices\n\
    \ntop_k_finder = jax.jit(find_top_k, static_argnames=[\"k\"])\n```\n\n最相关的代码片段是评分部分，这里我们有一个场景嵌入向量，并希望使用JAX对所有产品嵌入向量进行评分，而不是单个场景嵌入向量。这里我们使用Lax，它是JAX的一个子库，提供对XLA（JAX底层的机器学习编译器）的直接API调用，以便访问像`top_k`这样的加速函数。此外，我们使用JAX的JIT编译`find_top_k`函数。你可以将包含JAX命令的纯Python函数传递给`jax.jit`，以便使用XLA将其编译到特定的目标架构（如GPU）。注意我们有一个特殊参数`static_argnames`；这允许我们告知JAX，`k`是固定的且变化不大，以便JAX能够为固定的`k`值编译一个专门的`top_k_finder`。\n\
    \n图5-3展示了一个场景的示例产品推荐，该场景中一位女士穿着红色衬衫。推荐的产品包括红色天鹅绒和深色裤子。\n\n![](img/da17d05291861831978609329c481581_88_0.png)\n\
    \n图5-4展示了另一个场景：一位女士在户外穿着红色外套，搭配的配饰是黄色手提包和黄色裤子。\n\n我们预先生成了一些结果，这些结果存储为一个制品，你可以通过输入以下命令查看：\n\
    \n```\nwandb artifact get building-recsys/recsys-pinterest/scene_product_results:v0\n\
    ```\n\n你可能注意到的一点是，黄色包和裤子被推荐的次数很多。可能是黄色包的嵌入向量很大，因此它与许多场景匹配。这被称为*热门物品问题*，是推荐系统中的一个常见问题。我们将在后面的章节中介绍一些处理多样性和流行度的业务逻辑，但这是推荐系统中可能出现的问题，你可能需要留意。\n\
    \n![](img/da17d05291861831978609329c481581_89_0.png)\n\n图5-4. 户外场景的推荐物品\n\n##\
    \ 总结\n\n至此，我们结束了第一个“综合应用”章节。我们介绍了如何使用JAX和Flax读取真实世界数据、训练模型，并为一种造型找到最推荐的物品。如果你还没有尝试过代码，请前往GitHub仓库试用吧！我们希望提供一个端到端的基于内容的推荐系统的真实工作示例，能让你更好地理解理论如何转化为实践。享受玩转代码的乐趣吧！\n\
    \n# 第二部分\n\n# 检索\n\n我们如何将所有数据放在正确的位置来训练推荐系统？我们如何构建和部署用于实时推理的系统？\n\n阅读关于推荐系统的研究论文，常常会给人一种印象：它们是通过一堆数学方程构建的，而使用推荐系统的所有真正困难工作在于将这些方程与你的问题特征连接起来。更现实地说，构建生产级推荐系统的最初几个步骤属于系统工程范畴。理解你的数据如何进入系统、如何被处理成正确的结构，然后如何在训练流程的每个相关步骤中可用，通常构成了初始推荐系统的大部分工作。但即使在这个初始阶段之后，确保所有必要的组件足够快且足够健壮以适应生产环境，也需要在平台基础设施上进行又一次重大投入。\n\
    \n通常，你会构建一个负责处理各种类型数据并将其存储为方便格式的组件。接下来，你会构建一个模型，该模型接收这些数据并将其编码到潜在空间或其他表示模型中。最后，你需要将输入请求转换为该空间中的查询表示。这些步骤通常以工作流管理平台中的作业形式，或作为端点部署的服务形式出现。接下来的几章将引导你了解构建和部署这些系统所需的相关技术和概念——以及关于可靠性、可扩展性和效率的重要方面的认识。\n\
    \n你可能会想，“我是数据科学家！我不需要知道所有这些！”但你应该知道，推荐系统有一个不便的二元性：模型架构的改变"

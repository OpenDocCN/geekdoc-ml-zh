    ## Co-occurrence Models


    In our Wikipedia co-occurrences examples, we determined that the co-occurrence
    structure between two items could be used to generate measures of similarity.
    We covered how PMI can take the counts of co-occurrence and make recommendations
    based on very high mutual information between an item in the cart and others.


    As we''ve discussed, PMI is not a distance metric but still has important similarity
    measures based on co-occurrence. Let''s return to this topic.


    Recall from earlier that PMI is defined as follows:


    $$\frac{p(x_i, x_j)}{p(x_i) * p(x_j)} = \frac{(C_{ij})_{x_i, x_j} * \#(\text{total
    interactions})}{\#(x_i) * \#(x_j)}$$


    Now let''s consider the *discrete co-occurrence distribution*, $CD_{x_i}$, defined
    as the collection of co-occurrences over all other $x_j$:


    $$CD_{x_i} = (C_{ij})_{x_i, x_1}, ..., (C_{ij})_{x_i, x_j}, ..., (C_{ij})_{x_i,
    x_N}$$


    Here, $j \in 1...N$, and $N$ is the total number of items. This represents the
    co-occurrence histogram between $x_i$ and all other items. By introducing this
    discrete distribution, we can utilize another tool: the Hellinger distance.


    We can measure distributional distance in a few ways, each with different advantages.
    For our discussion, we will not go deeply into the differences and will stick
    to the simplest but most appropriate. Hellinger distance is defined as follows:


    $$H(P, Q) = \sqrt{1 - \sum_{i}^{n} \sqrt{p_i q_i}} = \frac{1}{\sqrt{2}} \| \sqrt{P}
    - \sqrt{Q} \|_2$$


    $P = \langle p_i \rangle$ and $Q = \langle q_i \rangle$ are two probability density
    vectors. In our setting, $P$ and $Q$ can be $CD_{x_i}$ and $CD_{x_j}$.


    The motivation behind this process is that we now have a proper distance between
    items purely based on co-occurrences. We can use any dimension transformation
    or reduction on this geometry. Later we will show dimension-reduction techniques
    that can use an arbitrary distance matrix and reduce the space to a lower-dimensional
    embedding that approximates it.


    ![](img/da17d05291861831978609329c481581_191_0.png)


    ## What About Measure Spaces and Information Theory?


    While we''re discussing distributions, you may find yourself wondering, “Is there
    a distance between distributions such that distributions are points in a latent
    space?” Oh, you weren''t wondering that? Well, OK. We''ll address it anyway.


    The short answer is that we can measure the differences between distributions.
    The most popular is Kullback–Leibler (KL) divergence, which is usually described
    in a Bayesian sense as the amount of surprise in seeing the distribution P, when
    expecting the distribution Q. However, KL is not a proper distance metric because
    it is asymmetric.


    Another symmetric distance metric that has some nice properties is the Hellinger
    distance. Hellinger distance is effectively the 2-norm measure theoretic distance.
    Additionally, Hellinger distance naturally generalizes to discrete distributions.


    If this still hasn''t scratched your itch for abstraction, we can also consider
    the total variation distance, which is the limit in the space of Fisher''s exact
    distance measures, which really means that it has all the nice properties of a
    distance of two distributions and no measure would ever consider them more dissimilar.
    Well, all the nice properties except for one: it''s not smooth. If you also want
    smoothness for differentiability, you''ll need to approximate it via an offset.


    If you ever need a distance between distributions, just use Hellinger.


    ## Reducing the Rank of a Recommender Problem


    We''ve shown that as the number of items and users grows, we rapidly increase
    the dimensionality of our recommender problem. Because we''re representing each
    item and user as a column or vector, this scales like $n^2$. One way to push back
    against this difficulty is by rank reduction; recall our previous discussions
    about rank reduction via factorization.


    Like many integers, many matrices can be *factored* into smaller matrices; for
    integers, *smaller* means of smaller value, and for matrices, *smaller* means
    of smaller dimensions. When we factor an $N \times M$ matrix, we will be looking
    for two matrices $U_{N \times d}$ and $V_{d \times M}$; note that when you multiply
    matrices together, they must share a dimension, and that dimension is eliminated,
    leaving the other two. Here, we''ll consider MFs when $d \le N$ and $d \le M$.
    By factorizing a matrix, we ask for two matrices that together equal, or approximate,
    the original matrix:


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    We seek a small value for $d$ to reduce the number of latent dimensions. As you
    may have already noticed, each of the matrices $U_{N \times d}$ and $V_{d \times
    M}$ will correspond to rows or columns of the original ratings matrix. However,
    they''re expressed in fewer dimensions. This utilizes the idea of a *low-dimensional
    latent space*. Intuitively, a latent space seeks to represent the same relationships
    as the full $N \times M$ dimensional relationships in two sets of relationships:
    items versus latent features, and users versus latent features.


    These methods are also popular in other kinds of ML, but for our case, we''ll
    primarily be looking at factorizing ratings or interaction matrices.


    ## MF via SVD


    SVD and MF are closely related, but SVD is an important special case. The key
    difference is in how the factorization is done and the types of matrices that
    each can be applied to.


    Figure 10-2 shows how SVD works. The eigenvectors $e1$ and $e2$ correspond to
    the largest two eigenvalues. $e1$ explains more of the data than $e2$ and lies
    along the direction of the largest spread of points. Eigenvectors are always perpendicular
    to each other, so their dot product is always 0.


    ![](img/da17d05291861831978609329c481581_192_0.png)


    Figure 10-2. Singular value decomposition'

  - '[PAGE 228]


    We''ll round out this chapter by introducing one aspect of causal inference important
    to recommender systems, based on the concept of propensity score. We''ll introduce
    propensity to quantify the adjusted likelihood of some items being shown to the
    user. We''ll then see how this interacts with the famous Simpson''s paradox.


    # Propensity


    In many data science problems, we are forced to contend with confounders and,
    notably, the correlation between those confounders and a target outcome. Depending
    on the setting, the confounder may be of a variety of forms. Interestingly, in
    recommendation systems, that confounder can be the system itself! Offline evaluation
    of recommendation systems is subject to confounders derived from the item selection
    behavior of users and the deployed recommendation system.


    If this issue seems a bit circular, it kind of is. This is sometimes called *closed-loop
    feedback*. One approach to mitigation is propensity weighting, which aims to address
    this problem by considering each feedback in the corresponding stratum based on
    the estimated propensities. You may recall that *propensity* refers to the likelihood
    of a user seeing an item; by inversely weighting by this, we can offset the selection
    bias. Compared to the standard offline holdout evaluation, this method attempts
    to represent the actual utility of the examined recommendation models.


    ![](img/da17d05291861831978609329c481581_228_0.png)


    # Utilizing Counterfactuals


    One other approach to mitigating selection bias that we won''t dive into is *counterfactual
    evaluation*, which estimates the actual utility of a recommendation model with
    propensity-weighting techniques more similar to off-policy evaluation approaches
    in reinforcement learning (RL). However, counterfactual evaluation often relies
    on accurate logging propensities in an open-loop setting where some random items
    are exposed to the user, which is not practical for most recommendation problems.
    If you have the option to include randomized recommendations to users for rating,
    this can help de-bias as well. One such setting where these methods may be combined
    is in RL-based recommenders that use explore-exploit methods like a multiarmed
    bandit or other structured randomization.


    *Inverse propensity scoring (IPS)* is a propensity-based evaluation method that
    leverages importance sampling to account for the fact that the feedback collected
    from the deployed recommendation system is not uniformly random. The propensity
    score is a balancing factor that adjusts the observed feedback distribution conditioned
    on the propensity score. The IPS evaluation method is theoretically unbiased if
    open-loop feedback can be sampled from all possible items uniformly at random.
    In Chapter 3, we discussed the Matthew effect, or “the rich get richer” for recommendation
    sys-'
  - '[PAGE 229]


    tems; IPS is one way to combat this effect. Note the relationship here between
    the two ideas of the Matthew effect and Simpson''s paradox, when within different
    strata, selection effects create significant biasing.


    Propensity weighting is based on the idea that the probability of an item being
    exposed to a user by the deployed recommendation system (the propensity score)
    affects the feedback that is collected from that user. By reweighting the feedback
    based on the propensity scores, we can adjust for the bias introduced by the deployed
    system and obtain a more accurate evaluation of the new recommendation model.


    To apply IPS, we need to estimate the propensity scores for each item-user interaction
    in the collected feedback dataset. This can be done by modeling the probability
    that the deployed system would have exposed the item to the user at the time of
    the interaction. One simple approach is to use the popularity of the item as a
    proxy for its propensity score. However, more sophisticated methods can be used
    to model the propensity scores based on user and item features, as well as the
    context of the interaction.


    Once the propensity scores are estimated, we can reweight the feedback by using
    importance sampling. Specifically, each feedback is weighted by the inverse of
    its propensity score so that items that are more likely to be exposed by the deployed
    system are downweighted, while items that are less likely to be exposed are upweighted.
    This reweighting process approximates a counterfactual distribution of feedback
    expected from surfacing recommendations from a uniform distribution of popularity.


    Finally, we can use the reweighted feedback to evaluate the new recommendation
    model via standard metrics for evaluation, as we''ve seen in this chapter. The
    effectiveness of the new model is then compared to that of the deployed system
    by using the reweighted feedback, providing a fairer and more accurate evaluation
    of the new model''s performance.


    # Simpson''s and Mitigating Confounding


    *Simpson''s paradox* is predicated on the idea of a confounding variable that
    establishes strata within which we see (potentially misleading) covariation. This
    paradox arises when the association between two variables is investigated but
    these variables are strongly influenced by a confounding variable.


    In the case of recommendation systems, this confounding variable is the deployed
    model''s characteristics and tendencies of selection. The propensity score is
    introduced as a measure of a system''s deviation from an unbiased open-loop exposure
    scenario. This score allows for the design and analysis of offline evaluation
    of recommendation models based on the observed closed-loop feedback, mimicking
    some of the particular characteristics of the open-loop scenario.'
  - '[PAGE 230]


    Traditional descriptions of Simpson''s paradox often suggest stratification, a
    well-known approach to identify and estimate causal effects by first identifying
    the underlying strata before investigating causal effects in each stratum. This
    approach enables the measurement of the potential outcome irrespective of the
    confounding variable. For recommendation systems, this involves stratifying the
    observed outcome based on the possible values of the confounding variable, which
    is the deployed model''s characteristics.


    The user-independent propensity score is estimated via a two-step generative process
    using the prior probability that an item is recommended by the deployed model
    and the conditional probability that the user interacts with the item, given that
    it is recommended. Based on a set of mild assumptions (but too mathematically
    technical to cover here), the user-independent propensity score can be estimated
    using maximum likelihood for each dataset.


    We need to define the user-propensity score $p_{u, i}$ which indicates the tendency—or
    frequency—of the deployed model to expose item $i \in I$ to user $u \in U$. In
    practice, we marginalize over users to get the user-independent propensity score
    $p_{\cdot, i}$. As described in "Unbiased Offline Recommender Evaluation for Missing-Not-at-Random
    Implicit Feedback" by Longqi Yang et al., the equation is as follows:


    $$p_{\cdot, i} \propto (n_i^*)^{\frac{\gamma + 1}{2}}$$


    Here, $n_i^*$ is the total number of times item $i$ interacted with, and $\gamma$
    is a parameter that affects the propensity distributions over items with different
    observed popularity. The power-law parameter $\gamma$ affects the propensity distributions
    over items and depends on the examined dataset; we estimate the $\gamma$ parameter
    by using maximum likelihood for each dataset.


    With these estimates for propensity, we can then apply a simple inverse weighting
    $w_i = \frac{1}{p_i}$ when calculating the effect of feedback. Finally, we can
    combine these weightings with propensity matching, to generate counterfactual
    recommendations; by collecting approximately equal propensity items into strata,
    we can then use these strata as our confounding variable.'
  - '[PAGE 231]


    ![](img/da17d05291861831978609329c481581_231_0.png)


    # Doubly Robust Estimation


    Doubly robust estimation (DRE) is a method that combines two models: one that
    models the probability of receiving the treatment (being recommended an item by
    the deployed model) and one that models the outcome of interest (the user''s feedback
    on the item). The weights used in DRE depend on the predicted probabilities from
    both models. This method has the advantage that it can still provide unbiased
    estimates even if one of the models is misspecified.


    The structural equations for a doubly robust estimator with propensity score weighting
    and outcome model is as follows:


    ```

    $$\Theta = \frac{\sum w_i(Y_i - f(X_i))}{\sum w_i(T_i - p_i) + \sum w_i(p_i(1
    - p_i)^2(f(X_i) - f^*(X_i)))}$$

    ```


    Here, $Y_i$ is the outcome, $X_i$ are covariates, $T_i$ is the treatment, $p_i$
    is the propensity score, $w_i$ is the weight, $f(X_i)$ is the outcome model, and
    $f^*(X_i)$ is the estimated outcome model.


    For a great introduction to these considerations, check out "Give Me a Robust
    Estimator—and Make It a Double!".


    # Summary


    What a whirlwind! Latent spaces are one of the *most* important aspects of recommendation
    systems. They are the representations that we use to encode our users and items.
    Ultimately, latent spaces are about more than dimension reduction; they are about
    understanding a geometry in which measures of distance encode the meaning relevant
    to your ML task.


    The world of embeddings and encoders runs deep. We haven''t had time to discuss
    CLIP embeddings (image + text) or the Poincaré disk (naturally hierarchical distance
    measures). We didn''t dive deep into UMAP (a nonlinear density-aware dimension-reduction
    technique) or HNSW (a method for retrieval in latent spaces that respects local
    geometry well). Instead, we point you to the (contemporaneously published) article
    by Vicki Boykis on embeddings, the essay and guide to constructing embeddings
    by Karel Minařík, or the beautiful visual guide to text embeddings by Meor Amer
    from Cohere.


    We''re now equipped with representations, but next we need to optimize. We''re
    building *personalized* recommendation systems, so let''s define the metrics that
    measure our performance on our task.'
- md: '## CHAPTER 11

    Personalized Recommendation Metrics


    Having explored the powerful methodologies of MF and neural networks in the context
    of personalization, we are now equipped with potent tools to craft sophisticated
    recommendation systems. However, the order of recommendations in a list may have
    a profound impact on user engagement and satisfaction.


    Our journey so far has primarily been focused on predicting what a user may like,
    using latent factors or deep learning architectures. However, the manner in which
    we present these predictions, or more formally, how we rank these recommendations,
    holds paramount significance. Therefore, this chapter will shift our gaze from
    the prediction problem and will unravel the complex landscape of ranking in recommendation
    systems.


    This chapter is dedicated to understanding key ranking metrics including mean
    average precision (mAP), mean reciprocal rank (MRR), and normalized discounted
    cumulative gain (NDCG). Each of these metrics takes a unique approach toward quantifying
    the quality of our rankings, catering to different aspects of the user interaction.


    We''ll dive into the intricacies of these metrics, unveiling their computational
    details and discussing their interpretation, covering their strengths and weaknesses,
    and pointing out their specific relevance to various personalization scenarios.


    This exploration forms an integral part of the evaluation process in recommendation
    systems. It not only gives us a robust framework to measure the performance of
    our system but also provides essential insights into understanding how different
    algorithms might perform in online settings. This will lay the foundation for
    future discussions on algorithmic bias, diversity in recommendations, and a multistakeholder
    approach to recommendation systems.


    In essence, the knowledge garnered in this chapter will be instrumental in fine-tuning
    our recommendation system, ensuring that we don''t just predict well but also
    recommend in a way that truly resonates with individual user preferences and behaviors.


    ## Environments


    Before we dig into defining the key metrics, we''re going to spend a few moments
    discussing the kinds of evaluation we can do. Evaluation for recommendation systems,
    as you''ll soon see, is frequently characterized by how *relevant* the recommendations
    are for a user. This is similar to search metrics, but we add in additional factors
    to account for *where* in the list the most relevant items are.


    For an extremely comprehensive view on evaluation of recommender systems, the
    recent project RecList builds a useful checklist-based framework for organizing
    metrics and evaluations.


    Often you''ll hear about evaluating recommenders in a few setups:


    - Online/offline

    - User/item

    - A/B


    Each setup provides slightly different kinds of evaluations and tells you different
    things. Let''s quickly break down the differences to set some assumptions about
    terminology.


    ## Online and Offline


    When we refer to online versus offline recommenders, we are referring to *when*
    you''re running evals. In *offline evaluation*, you start with a test/evaluation
    dataset, outside your production system, and compute a set of metrics. This is
    often the simplest recommender to set up but has the highest expectation of existing
    data. Using historical data, you construct a set of relevant responses, which
    you can then use during simulated inference. This approach is the most similar
    to other kinds of traditional ML, although with slightly different computations
    for the error.


    When we''re training large models, these datasets are similar to an offline dataset.
    We previously saw prequential data, which is much more relevant in recommendation
    systems than in lots of other ML applications. Sometimes you''ll hear people say
    that “all recommenders are sequential recommenders” because of the importance
    of historical exposure to the recommender problem.


    *Online evaluation* takes place during inference, usually in production. The tricky
    part is that you essentially never know the counterfactual outcomes. You can compute
    specific metrics on the online rankings: frequency and distributions of covariates,
    CTR/success rate, or time on platform, but ultimately these are different from
    the offline metrics.


    ![](img/da17d05291861831978609329c481581_234_0.png)


    ## Bootstrapping from Historical Evaluation Data


    One of the most common questions from people building a recommender from scratch
    is “Where do you get the initial training data?” This is a hard problem. Ultimately,
    you have to be clever to come up with a useful dataset. Consider our co-occurrence
    data in the Wikipedia recommender; we didn’t require any user interactions to
    get to a set of data to build a recommender. Bootstrapping from item to item is
    the most popular strategy, but you can use other tricks as well. The simplest
    way to start moving into user-item recommenders is to simply ask the user questions.
    If you ask for preference information across a set of item features, you can build
    simple models that start to incorporate this.


    ## User Versus Item Metrics


    Because recommender systems are personalization machines, it can be easy to think
    that we always want to be making recommendations for the user and measuring the
    performance as such. Subtleties exist, though. We want to be sure individual items
    are getting a fair chance, and sometimes looking at the other side of the equation
    can help assess this. In other words, are the items getting recommended frequently
    enough to have a chance to find their niche? We should explicitly compute our
    metrics over user *and* item axes.


    Another aspect of item-side metrics is for set-based recommenders. The other items
    that are recommended in context can have a significant effect on the performance
    of a recommendation. As a result, we should be careful to measure the pairwise
    item metrics in our large-scale evaluations.


    ## A/B Testing


    It’s good to use randomized, controlled trials to evaluate how your new recommendation
    model is performing. For recommendations, this is quite tricky. At the end of
    this chapter, you’ll see some of the nuance, but for now, let’s consider a quick
    reminder of how to think about A/B testing in a closed-loop paradigm.


    A/B tests ultimately attempt to estimate the effect size of swapping one model
    in for another; effect size estimation is the process of measuring the causal
    impact of an intervention on a target metric. First, we would need to deploy two
    recommender models. We''d also hope that there''s a reasonable randomization of
    users into each of the recommenders. However, what''s the randomization unit?
    It''s easy to quickly assume it''s the user, but what has changed about the recommender?
    Has the recommender changed in a way that covaries with some properties of the
    distribution—e.g., have you built a new recommender that is less friendly toward
    seasonal TV specials just as we enter into the second week of November?


    Another consideration with this sort of testing for recommendation systems is
    the long-term compounding effects. A frequent rejoinder about a series of positive
    A/B test outcomes over several years is “Have you tested the first recommender
    against the last?” This is because populations change, both the users and the
    items. As you also vary the recommender system, you frequently find yourself in
    a double-blind situation where you''ve never seen this user or item population
    with any other recommender. If all the effect sizes of every A/B test were additive
    across the industry, the world GDP would likely be two to three times as large.


    The way to guard against protests like this is via a *long-term holdout*, a random
    subset of users (continually being added to) who will not be upgraded to new models
    through time. By measuring the target metrics on this set versus the most cutting-edge
    model in production, you''re always able to understand the long-term effects of
    your work. The downside of a long-term holdout? It''s hard to maintain, and it''s
    hard to sacrifice some of the effects of your work on a subset of the population.


    Now let''s finally get to the metrics already!


    ## Recall and Precision


    Let''s begin by considering four recommender problems and how each may have different
    implications for the kind of results you want.


    First, let''s consider entering a bookstore and looking for a book by a popular
    author. We would say this is the recommender problem:


    - Provides a lot of recommendations

    - Offers few possible relevant results


    Additionally, if the bookstore has a good selection, we''d expect that *all* the
    relevant results are contained in the recommendations because bookstores often
    carry most or all of an author''s oeuvre once they''ve become popular. However,
    many of the recommendations—the books in the bookstore–are simply not relevant
    for this search.'
  mdcn: '## 第11章

    个性化推荐指标


    在深入探讨了矩阵分解和神经网络在个性化场景中的强大方法后，我们现在已掌握了构建复杂推荐系统的有力工具。然而，推荐列表中项目的排序可能对用户参与度和满意度产生深远影响。


    我们迄今的旅程主要聚焦于使用潜在因子或深度学习架构来预测用户可能喜欢的内容。然而，我们呈现这些预测的方式，或者更正式地说，我们如何对这些推荐进行排序，具有至关重要的意义。因此，本章将把我们的视线从预测问题上移开，揭示推荐系统中排序的复杂图景。


    本章致力于理解关键的排序指标，包括平均精度均值（mAP）、平均倒数排名（MRR）和归一化折损累积增益（NDCG）。这些指标各自采用独特的方法来量化我们排序的质量，以适应用户交互的不同方面。


    我们将深入探讨这些指标的复杂性，揭示其计算细节，讨论其解释方法，涵盖其优缺点，并指出它们与各种个性化场景的具体关联。


    这种探索构成了推荐系统评估过程中不可或缺的一部分。它不仅为我们提供了一个衡量系统性能的稳健框架，还为理解不同算法在线上环境中的表现提供了重要见解。这将为后续关于算法偏差、推荐多样性以及推荐系统多利益相关者方法的讨论奠定基础。


    本质上，本章所获得的知识将有助于我们微调推荐系统，确保我们不仅预测得好，而且能以真正契合个体用户偏好和行为的方式进行推荐。


    ## 评估环境


    在深入定义关键指标之前，我们将花一些时间讨论我们可以进行的评估类型。正如你很快会看到的，推荐系统的评估通常以推荐对用户的*相关性*为特征。这与搜索指标类似，但我们增加了额外的因素来考虑最相关项目在列表中的*位置*。


    关于推荐系统评估的一个非常全面的视角，最近的项目RecList构建了一个有用的基于清单的框架来组织指标和评估。


    通常你会听到在几种设置下评估推荐系统：


    -   在线/离线

    -   用户/物品

    -   A/B测试


    每种设置提供略有不同的评估类型，并告诉你不同的信息。让我们快速分解这些差异，以设定一些关于术语的假设。


    ## 在线与离线


    当我们提到在线与离线推荐器时，我们指的是你*何时*运行评估。在*离线评估*中，你从生产系统之外的测试/评估数据集开始，并计算一组指标。这通常是最简单的推荐器设置方式，但对现有数据的要求最高。使用历史数据，你可以构建一组相关响应，然后在模拟推理中使用。这种方法与其他传统机器学习最为相似，尽管误差计算略有不同。


    当我们训练大型模型时，这些数据集类似于离线数据集。我们之前看到的序列前推数据在推荐系统中比在许多其他机器学习应用中更为相关。有时你会听到人们说“所有推荐器都是序列推荐器”，因为历史曝光对推荐问题的重要性。


    *在线评估*发生在推理期间，通常在生产环境中。棘手的部分是你基本上永远不知道反事实结果。你可以计算在线排序上的特定指标：协变量的频率和分布、点击率/成功率或平台停留时间，但最终这些与离线指标是不同的。


    ![](img/da17d05291861831978609329c481581_234_0.png)


    ## 从历史评估数据中引导


    从头开始构建推荐系统的人最常问的问题之一是“你从哪里获得初始训练数据？”这是一个难题。最终，你必须巧妙地想出一个有用的数据集。考虑我们在维基百科推荐器中的共现数据；我们不需要任何用户交互就能获得一组数据来构建推荐器。从物品到物品的引导是最流行的策略，但你也可以使用其他技巧。开始转向用户-物品推荐器的最简单方法是直接询问用户问题。如果你询问用户对一组物品特征的偏好信息，你可以构建简单的模型来开始整合这些信息。


    ## 用户指标与物品指标


    因为推荐系统是个性化机器，很容易认为我们总是想为用户进行推荐并据此衡量性能。然而，存在一些微妙之处。我们需要确保单个物品获得公平的机会，有时从等式的另一侧看可以帮助评估这一点。换句话说，物品是否被推荐得足够频繁，以至于有机会找到它们的利基市场？我们应该明确地在用户*和*物品轴上计算我们的指标。


    物品侧指标的另一个方面是针对基于集合的推荐器。在上下文中推荐的其他物品可能对推荐性能产生显著影响。因此，我们应该在大规模评估中仔细衡量成对的物品指标。


    ## A/B测试


    使用随机对照试验来评估你的新推荐模型表现如何是很好的。对于推荐来说，这相当棘手。在本章末尾，你会看到一些细微差别，但现在，让我们快速回顾一下如何在闭环范式中思考A/B测试。


    A/B测试最终试图估计用一个模型替换另一个模型的效果大小；效果大小估计是衡量干预对目标指标因果影响的过程。首先，我们需要部署两个推荐模型。我们还希望用户被合理地随机分配到每个推荐器中。然而，随机化单位是什么？很容易快速假设它是用户，但推荐器发生了什么变化？推荐器是否以与分布的某些属性协变的方式发生了变化——例如，你是否构建了一个对季节性电视特别节目不太友好的新推荐器，而此时正值十一月的第二周？


    这种推荐系统测试的另一个考虑因素是长期复合效应。关于几年来一系列积极的A/B测试结果的一个常见反驳是“你是否将第一个推荐器与最后一个进行了测试？”这是因为人群在变化，包括用户和物品。当你同时改变推荐系统时，你经常会发现自己处于一种双重盲测的情况，即你从未在任何其他推荐器下见过这个用户或物品群体。如果每个A/B测试的所有效果大小在整个行业中都是可加的，那么世界GDP可能会是现在的两到三倍。


    防范此类抗议的方法是通过*长期保留*，即一个随机的用户子集（持续添加），他们不会随着时间的推移升级到新模型。通过衡量这个集合与生产中最前沿模型的目标指标，你总是能够理解你工作的长期影响。长期保留的缺点是什么？它很难维护，而且很难牺牲你在部分人群上的工作效果。


    现在，让我们终于进入指标部分吧！


    ## 召回率与精确率


    让我们首先考虑四个推荐问题，以及每个问题可能对你想要的结果类型产生不同的影响。


    首先，让我们考虑进入一家书店并寻找一位流行作家的书。我们会说这是推荐问题：


    -   提供大量推荐

    -   提供少量可能相关的结果


    此外，如果书店有良好的选书，我们期望*所有*相关结果都包含在推荐中，因为一旦作家流行起来，书店通常会携带其大部分或全部作品。然而，许多推荐——书店里的书——对于这次搜索根本不相关。'

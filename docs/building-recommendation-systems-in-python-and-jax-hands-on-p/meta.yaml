  - '[PAGE 129]


    In the second approach, during training, you can sample from the user space to
    build estimates of the appropriate *k* for varying numbers of avoids by user.
    Then, giving access to a lookup of total avoids by user to the collector can help
    defend against this behavior.


    ![](img/da17d05291861831978609329c481581_129_0.png)


    # Over-Retrieval


    Sometimes people in information retrieval perform *over-retrieval* to mitigate
    issues of conflicting requirements from the search request, which can arise if
    the user makes a search and applies many filters simultaneously. This is applicable
    in recommendation systems as well.


    If you retrieve only exactly the number of potential recommendations you need
    to serve to the user, downstream rules or poor personalization scores can sometimes
    cause a serious issue for serving up recommendations. This is why it is common
    to retrieve more items than you anticipate showing to the user.


    # Observability


    Many tools in software engineering can assist with observability—understanding
    the *whys* of what''s going on in the software stack. Because the systems we are
    building become quite distributed, the interfaces become critical monitoring points,
    but the paths also become complex.


    # Spans and traces


    Common terms in this area are *spans* and *traces*, which refer to two dimensions
    of a call stack, illustrated in Figure 7-3. Given a collection of connected services,
    as in our preceding examples, an individual inference request will pass through
    some or all of those services in a sequence. The sequence of service requests
    is the *trace*. The potentially parallel time delays of each of these services
    is the *span*.


    ![](img/da17d05291861831978609329c481581_129_1.png)


    Figure 7-3. The spans of a trace'
  - '[PAGE 130]


    The graphical representation of spans usually demonstrates how the time for one
    service to respond comprises several other delays from other calls.


    *Observability* enables you to see traces, spans, and logs in conjunction to appropriately
    diagnose the behavior of your system. In our example of utilizing a callback from
    the filter step to get more neighbors from the collector, we might see a slow
    response and wonder, “What has happened?” By viewing the spans and traces, we’d
    be able to see that the first call to the collector was as expected, then the
    filter step made a call to the collector, then another call to the collector,
    and so on, which built up a huge span for the filter step. Combining that view
    with logging would help us rapidly diagnose what might be happening.


    # Timeouts


    In the preceding example, we had a long process that could lead to a very bad
    user experience. In most cases, we impose hard restrictions on how bad we let
    things get; these are called *timeouts*.


    Usually, we have an upper bound on how long we’re willing to wait for our inference
    response, so implementing timeouts aligns our system with these restrictions.
    It’s important in these cases to have a *fallback*. In the setting of recommendation
    systems, a fallback usually comprises things like the MPIR prepared such that
    it incurs minimal additional delay.


    # Evaluation in Production


    If the previous section was about understanding what’s coming into your model
    in production, this one might be summarized as what’s coming out of your model
    in production. At a high level, evaluation in production can be thought of as
    extending all your model-validation techniques to the inference time. In particular,
    you are looking at *what the model actually is doing*!


    On one hand, we already have tools to do this evaluation. You can use the same
    methods to evaluate performance as you do for training, but now on real observations
    streaming in. However, this process is not as obvious as we might first guess.
    Let’s discuss some of the challenges.


    # Slow Feedback


    Recommendation systems fundamentally are trying to lead to item selection, and
    in many cases, purchases. But if we step back and think more holistically about
    the purpose of integrating recommendation systems into businesses, it’s to drive
    revenue. If you’re an ecommerce shop, item selection and revenue may seem easily
    associated: a purchase leads to revenue, so good item recommendation leads to
    revenue. However, what about returns? Or even a harder question: is this revenue
    incremental? One'
  - '[PAGE 131]


    challenge with recommendation systems is that it can be difficult to draw a causal
    arrow between any metric used to measure the performance of your models to the
    business-oriented KPIs.


    We call this *slow feedback* because sometimes the loop from a recommendation
    to a meaningful metric and back to the recommender can take weeks or even longer.
    This is especially challenging when you want to run experiments to understand
    whether a new model should be rolled out. The length of the test may need to stretch
    quite a bit more to get meaningful results.


    Usually, the team aligns on a proxy metric that the data scientists believe is
    a good estimator for the KPI, and that proxy metric is measured live. This approach
    has a huge variety of challenges, but it often suffices and provides motivation
    for more testing. Well-correlated proxies are often a great start to get directional
    information indicating where to take further iterations.


    # Model Metrics


    So, what are the key metrics to track for your model in production? Given that
    we’re looking at recommendation systems at inference time, we should seek to understand
    the following:


    +   - Distribution of recommendation across categorical features

    - Distribution of affinity scores

    - Number of candidates

    - Distribution of other ranking scores


    As we discussed before, during the training process, we should be calculating
    broadly the ranges of our similarity scores in our latent space. Whether we are
    looking at high-level estimations or finer ones, we can use these distributions
    to get warning signals that something might be strange. Simply comparing the output
    of our model during inference, or over a set of inference requests, to these precompute
    distributions can be extremely helpful.


    Comparing distributions can be a long topic, but one standard approach is computing
    *KL-divergence* between the observed distribution and the expected distribution
    from training. By computing KL divergence between these, we can understand how
    *surprising* the model’s predictions are on a given day.


    What we’d really like is to understand the receiver operating characteristic curve
    (ROC) of our model predictions with respect to one of our conversion types. However,
    this involves yet another integration to tie back to logging. Since our model
    API produces only the recommendation, we’ll still need to tie into logging from
    the web application to understand outcomes! To tie back in outcomes, we must join
    the'
  - '[PAGE 132]


    model predictions with the logging output to get the evaluation labels, which
    can be done via log-parsing technologies (like Grafana, ELK, or Prometheus). We''ll
    see more of this in Chapter 8.


    ![](img/da17d05291861831978609329c481581_132_0.png)


    **Receiver Operating Characteristic Curve**


    If we assume that the relevance scores are estimating whether the item will be
    relevant to the user, this forms a binary classification problem. Utilizing these
    (normalized) scores, we can build an ROC to estimate over the distributions of
    queries when the relevance score begins to accurately predict a relevant item
    via retrieval history. This curve can thus be used to estimate parameters like
    necessary retrieval depth or even problematic queries.


    # Continuous Training and Deployment


    It may feel like we''re done with this story since we have models tracked and
    production monitoring in place, but rarely are we satisfied with set-it-and-forget-it
    model development. One important characteristic of ML products is that models
    frequently need to be updated to even be useful. Previously, we discussed model
    metrics and that sometimes performance in production might look different from
    our expectations based on the trained models'' performance. This can be further
    exacerbated by model drift.


    # Model Drift


    *Model drift* is the notion that the same model may exhibit different prediction
    behavior over time, merely due to changes in the data-generating process. A simple
    example is a time-series forecasting model. When you build a time-series forecasting
    model, the especially unique property that is essential for good performance is
    *autoregression*: the value of the function covaries with previous values of the
    function. We won''t go into detail on time-series forecasting, but suffice it
    to say: your best hope of making a good forecast is to use up-to-date data! If
    you want to forecast stock prices, you should always use the most recent prices
    as part of your predictions.


    This simple example demonstrates how models may drift, and forecasting models
    are not so different from recommendation models—especially when considering the
    seasonal realities of many recommendation problems. A model that did well two
    weeks ago needs to be retrained with recent data to be expected to continue to
    perform well.'
- md: 'One criticism of a model that drifts is “that’s the smoking gun of an overfit
    model,” but in reality these models require a certain amount of over-parameterization
    to be useful. In the context of recommendation systems, we’ve already seen that
    quirks like the Matthew effect have disastrous effects on the expected performance
    of a recommender model. If we don’t consider things like new items in our recommender,
    we are doomed to fail. Models can drift for a variety of reasons, often coming
    down to exogenous factors in the generating process that may not be captured by
    the model.


    One approach to dealing with and predicting stale models is to simulate these
    scenarios during training. If you suspect that the model goes stale mostly because
    of the distribution changing over time, you can employ sequential cross-validation—training
    on a contiguous period and testing on a subsequent period—but with a specified
    block of time delay. For example, if you think your model performance is going
    to decrease after two weeks because it’s being trained on out-of-date observations,
    then during training you can purposely build your evaluation to incorporate a
    two-week delay before measuring performance. This is called *two-phase prediction
    comparison*, and by comparing the performances, you can estimate drift magnitudes
    to keep an eye out in production.


    A wealth of statistical approaches can be used to rein in these differences. In
    lieu of a deep dive into variational modeling for variability and reliability
    for your predictions, we’ll discuss continuous training and deployment and open
    this peanut with a sledge hammer.


    ## Deployment Topologies


    Let’s consider a few structures for deploying models that will not only keep your
    models well in tune but also accommodate iteration, experimentation, and optimization.


    ## Ensembles


    *Ensembles* are a type of model structure in which multiple models are built,
    and the predictions from those models are pooled together in one of a variety
    of ways. While this notion of an ensemble is usually packaged into the model called
    for inference, you can generalize the idea to your deployment topology.


    Let’s take an example that builds on our previous discussion of prediction priors.
    If we have a collection of models with comparable performance on a task, we can
    deploy them in an ensemble, weighted by their deviation from the prior distributions
    of prediction that we’ve set before. This way, instead of having a simple yes/no
    filter on the output of your model’s range, you can more smoothly transition potentially
    problematic predictions into more expected ones.


    Another benefit of treating the ensemble as a deployment topology instead of only
    a model architecture is that you can *hot-swap* components of an ensemble as you
    make improvements in specific subdomains of your observation feature space. Take,
    for example, a life-time-value (LTV) model comprising three components: one that
    predicts well for new clients, another for activated clients, and a third for
    super-users. You may find that pooling via a voting mechanism performs the best
    on average, so you decide to implement a bagging approach. This works well, but
    later you find a better model for the new clients. By using the deployment topology
    for your ensemble, you can swap in the new model for the new clients and start
    comparing performance in your ensemble in production. This brings us to the next
    strategy, model comparison.


    ![](img/da17d05291861831978609329c481581_134_0.png)


    ## Ensemble Modeling


    *Ensemble modeling* is popular in all kinds of ML, built upon the simple notion
    that the mixture of expert opinions is strictly more effective than a single estimator.
    In fact, assume for a moment that you have $M$ classifiers with error rate $\epsilon$;
    then for an $N$ class classification problem, your error would be $P(y \ge k)
    = \sum_{k}^{n} \binom{n}{k} \epsilon^k * (1 - \epsilon)^{n-k}$, and the exciting
    part is that this is smaller than $\epsilon$ for all values less than 0.5!


    ## Shadowing


    Deploying two models, even for the same task, can be enormously informative. We
    call this *shadowing* when one model is “live” and the other is secretly also
    receiving all the requests and doing inference, and logging the results, of course.
    By shadowing traffic to the other model, you get the best expectations possible
    about how the model behaves before making your model live. This is especially
    useful when wanting to ensure that the prediction ranges align with expectation.


    In software engineering and DevOps, there’s a notion of *staging* for software.
    It’s a hotly contested question of “how much of the real infrastructure should
    staging see,” but shadowing is the staging of ML models. You can basically build
    a parallel pipeline for your entire infrastructure to connect for shadow models,
    or you can just put them both in the line of fire and have the request sent to
    both but use only one response. Shadowing is also crucial for implementing experimentation.


    ## Experimentation


    As good data scientists, we know that without a proper experimental framework,
    it''s risky to advertise much about the performance of a feature or, in this case,
    model. Experimentation can be handled with shadowing by having a controller layer
    that is taking the incoming requests and orchestrating which of the deployed models
    to curry the response along. A simple A/B experimentation framework might ask
    for a randomization at every request, whereas something like a multiarmed bandit
    will require the controller layer to have notions of the reward function.


    Experimentation is a deep topic that we don''t have the knowledge or space to
    do adequate justice, but it''s useful to know that this is where experimentation
    can fit into the larger deployment pipeline.


    ## Model Cascades


    A really nice extension of the concepts of ensembling and shadowing is model cascading,
    illustrated in Figure 7-4. The simplified idea of a model cascade is that we use
    model confidence to create a conditional ensemble. In particular, given an inference
    request, the model provides a prediction with a confidence estimate; when the
    model confidence is high, that prediction is returned, but if the confidence is
    below a certain threshold, a downstream model is called and the ensemble is started.
    There''s no reason to stop at two models; this method can be used to iteratively
    expand the number of ensemble layers for any number of models that in training
    show improved performance in an ensemble.


    ![](img/da17d05291861831978609329c481581_135_0.png)


    Here are a few advantages of this approach:


    - Better expected performance overall, as ensembles usually increase performance

    - Ensemble performance with lower average computation time

    - Especially better performance in out-of-sample scenarios


    This method scales to larger pools of models and, while it may incur significant
    training efforts, finding the right ordering of the models can have significant
    effects on model accuracy and latency.


    ## The Evaluation Flywheel


    By now, it’s likely obvious that a production ML model is far from a static object.
    Production ML systems of any kind are subject to as many deployment concerns as
    a traditional software stack, in addition to the added challenge of dataset shift
    and new users/items. In this section, we’ll look closely at the feedback loops
    introduced and understand how the components fit together to continuously improve
    our system—even with little input from a data scientist or ML engineer.


    ## Daily Warm Starts


    As we’ve now discussed several times, we need a connection between the continuous
    output of our model and retraining. The first simplest example of this is daily
    warm starts, which essentially ask us to utilize the new data seen each day in
    our system.


    As might already be obvious, some of the recommendation models that show great
    success are quite large. Retraining some of them can be a massive undertaking,
    and simply *rerunning everything* each day is often infeasible. So, what can be
    done?


    Let’s ground this conversation in the user-user CF example that we’ve been sketching
    out; the first step was to build an embedding via our similarity definition. Let’s
    recall:


    $$USim_{A,B} = \frac{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)(r_{B,x}
    - \bar{r}_B)}{\sqrt{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)^2} \sqrt{\sum_{x
    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$


    Here we remember that the similarity between two users is dependent on the shared
    ratings and on each user’s average rating.


    On a given day, let’s say $\widetilde{X} = \{\widetilde{x} \mid x \text{ was rated
    since yesterday by a user }\}$. Then we’d need to update our user similarities,
    but ideally we’d leave everything else the same. To update the user’s data, we
    see that all $\widetilde{x}$ rated by two users, $A$ and $B$, $\bar{r}_A$ and
    $\bar{r}_B$, would need to change, but we could probably skip these updates in
    many cases where'
  mdcn: '对模型漂移的一种批评是“这是过拟合模型的铁证”，但实际上，这些模型需要一定程度的过参数化才能发挥作用。在推荐系统的背景下，我们已经看到，像马太效应这样的怪癖会对推荐模型的预期性能产生灾难性影响。如果我们不在推荐器中考虑新物品等因素，就注定会失败。模型漂移可能由多种原因引起，通常归结为生成过程中可能未被模型捕获的外生因素。


    处理和预测模型过时的一种方法是在训练期间模拟这些场景。如果你怀疑模型过时主要是由于分布随时间变化，你可以采用序列交叉验证——在连续时间段上训练，在后续时间段上测试——但指定一个时间延迟块。例如，如果你认为你的模型性能会在两周后下降，因为它是在过时的观测数据上训练的，那么在训练期间，你可以特意构建评估，在测量性能之前加入两周的延迟。这被称为*两阶段预测比较*，通过比较性能，你可以估计漂移幅度，以便在生产中加以关注。


    大量的统计方法可用于控制这些差异。在不深入探讨用于预测可变性和可靠性的变分建模的情况下，我们将讨论持续训练和部署，并用大锤砸开这颗花生。


    ## 部署拓扑


    让我们考虑几种部署模型的结构，这些结构不仅能让你的模型保持良好调优，还能适应迭代、实验和优化。


    ## 集成


    *集成*是一种模型结构，其中构建多个模型，并将这些模型的预测以多种方式之一汇集在一起。虽然集成的概念通常被封装在用于推理的模型中，但你可以将这个想法推广到你的部署拓扑中。


    让我们以一个基于我们之前关于预测先验讨论的例子为例。如果我们有一组在任务上性能相当的模型，我们可以将它们部署为一个集成，根据它们偏离我们之前设定的预测先验分布的程度进行加权。这样，你就不必对模型输出范围进行简单的是/否过滤，而是可以更平滑地将潜在有问题的预测过渡到更符合预期的预测。


    将集成视为部署拓扑而不仅仅是模型架构的另一个好处是，当你在观测特征空间的特定子领域进行改进时，你可以*热交换*集成的组件。以一个由三个组件组成的生命周期价值模型为例：一个对新客户预测良好，另一个对已激活客户预测良好，第三个对超级用户预测良好。你可能会发现通过投票机制进行汇集平均表现最好，因此你决定实施装袋方法。这效果很好，但后来你发现了一个对新客户更好的模型。通过使用集成的部署拓扑，你可以将新模型换入新客户部分，并开始在生产中比较集成中的性能。这引出了下一个策略，模型比较。


    ![](img/da17d05291861831978609329c481581_134_0.png)


    ## 集成建模


    *集成建模*在各种机器学习中都很流行，它基于一个简单的概念：专家意见的混合严格比单个估计器更有效。事实上，假设你有 $M$ 个错误率为 $\epsilon$
    的分类器；那么对于一个 $N$ 类分类问题，你的错误率将是 $P(y \ge k) = \sum_{k}^{n} \binom{n}{k} \epsilon^k
    * (1 - \epsilon)^{n-k}$，而令人兴奋的是，对于所有小于 0.5 的值，这个错误率都小于 $\epsilon$！


    ## 影子部署


    部署两个模型，即使是针对同一任务，也能提供大量信息。当一个模型是“在线”的，而另一个模型也秘密地接收所有请求并进行推理（当然，还会记录结果）时，我们称之为*影子部署*。通过将流量影子到另一个模型，你可以在让你的模型上线之前，获得关于模型行为的最佳预期。当希望确保预测范围与预期一致时，这尤其有用。


    在软件工程和 DevOps 中，有一个软件*预发布*的概念。关于“预发布环境应该看到多少真实基础设施”是一个激烈争论的问题，但影子部署就是机器学习模型的预发布。你基本上可以为整个基础设施构建一个并行管道来连接影子模型，或者你也可以将它们都放在火力线上，将请求发送给两者，但只使用一个响应。影子部署对于实施实验也至关重要。


    ## 实验


    作为优秀的数据科学家，我们知道，如果没有适当的实验框架，就大肆宣传某个特性或模型的性能是有风险的。实验可以通过影子部署来处理，使用一个控制层来接收传入的请求，并协调哪个已部署的模型来处理响应。一个简单的
    A/B 实验框架可能要求在每个请求时进行随机化，而像多臂老虎机这样的方法则需要控制层具有奖励函数的概念。


    实验是一个深奥的话题，我们没有足够的知识或篇幅来充分阐述，但了解实验如何融入更大的部署管道是有用的。


    ## 模型级联


    集成和影子部署概念的一个非常好的扩展是模型级联，如图 7-4 所示。模型级联的简化思想是，我们使用模型置信度来创建一个条件集成。具体来说，给定一个推理请求，模型提供一个带有置信度估计的预测；当模型置信度高时，返回该预测，但如果置信度低于某个阈值，则调用下游模型并启动集成。没有理由止步于两个模型；这种方法可用于迭代扩展集成层的数量，适用于任何在训练中显示集成性能有所提高的模型。


    ![](img/da17d05291861831978609329c481581_135_0.png)


    以下是这种方法的几个优点：


    - 整体预期性能更好，因为集成通常能提高性能

    - 集成性能具有更低的平均计算时间

    - 在样本外场景中性能尤其更好


    这种方法可以扩展到更大的模型池，虽然可能需要大量的训练工作，但找到正确的模型排序顺序可以对模型准确性和延迟产生显著影响。


    ## 评估飞轮


    到现在，很可能已经很明显，生产环境中的机器学习模型远非静态对象。任何类型的生产机器学习系统都面临着与传统软件栈一样多的部署问题，此外还有数据集偏移和新用户/物品带来的额外挑战。在本节中，我们将仔细研究引入的反馈循环，并理解这些组件如何协同工作以持续改进我们的系统——即使数据科学家或机器学习工程师的输入很少。


    ## 每日热启动


    正如我们已经多次讨论的，我们需要在模型的持续输出和重新训练之间建立联系。第一个最简单的例子是每日热启动，它本质上要求我们利用系统中每天看到的新数据。


    可能已经很明显，一些表现出巨大成功的推荐模型相当庞大。重新训练其中一些可能是一项巨大的工程，而简单地*每天重新运行所有内容*通常是不可行的。那么，能做些什么呢？



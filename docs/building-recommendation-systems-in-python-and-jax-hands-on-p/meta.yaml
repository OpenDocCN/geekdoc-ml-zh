    # WSABIE


    Let''s focus again on optimizations and modifications. Another optimization is
    to treat the MF problem as a single optimization.


    The paper “WSABIE: Scaling Up to Large Vocabulary Image Annotation” by Jason Weston
    et al. also contains a factorization for just the item matrix. In this scheme,
    we replace the user matrix with a weighted sum of the items a user has affinity
    to. We cover web scale annotation by image embedding (WSABIE) and Warp loss in
    “WARP” on page 233. Representing a user as the average of items they like is a
    way of saving space and not needing a separate user matrix if there are large
    numbers of users.


    ![](img/da17d05291861831978609329c481581_218_0.png)


    # Latent Space HPO


    A completely alternative way to do HPO for RecSys is via the latent spaces themselves!
    “Hyper-Parameter Optimization for Latent Spaces in Dynamic Recommender Systems”
    by Bruno Veloso et al. attempts to modify the relative embeddings during each
    step to optimize the embedding model.


    # Dimension Reduction


    Dimension-reduction techniques are frequently employed in recommendation systems
    to decrease computational complexity and enhance the accuracy of recommendation
    algorithms. In this context, the primary concepts of dimension reduction for recommendation
    systems include MF and SVD.


    The *matrix factorization method* decomposes the user-item interaction matrix
    $(A \in \mathbb{R}^{(m \times n)})$ into two lower-dimensional matrices, representing
    the user $(U \in \mathbb{R}^{(m \times r)})$ and item $(V \in \mathbb{R}^{(n \times
    r)})$ latent factors, respectively. This technique can reveal the underlying data
    structure and offer recommendations based on a user''s previous interactions.
    Mathematically, MF can be represented as follows:


    ```

    $A \sim U \times V^{(T)}$

    ```


    *SVD* is a linear-algebra technique that decomposes a matrix $(A)$ into three
    matrices—the left singular vectors $(U)$, the singular values $(\Sigma)$, and
    the right singular vectors $(V)$. SVD can be utilized for MF in recommendation
    systems, where the user-item interaction matrix is decomposed into a smaller number
    of latent factors. The mathematical representation of SVD is as follows:


    ```

    $A = U \times \Sigma \times V^{(T)}$

    ```'
  - "[PAGE 219]\n\nIn practice, though, rather than using a mathematical library to\
    \ find the eigenvectors, folks might use the power iteration method to discover\
    \ the eigenvectors approximately. This method is far more scalable than a full\
    \ dense SVD solution that is optimized for correctness and dense vectors:\n\n\
    ```\nimport jax\nimport jax.numpy as jnp\n\ndef power_iteration(a: jnp.ndarray)\
    \ -> jnp.ndarray:\n    \"\"\"Returns an eigenvector of the matrix a.\n    Args:\n\
    \        a: a n x m matrix\n    \"\"\"\n    key = jax.random.PRNGKey(0)\n    x\
    \ = jax.random.normal(key, shape=(a.shape[1], 1))\n    for i in range(100):\n\
    \        x = a @ x\n        x = x / jnp.linalg.norm(x)\n    return x.T\n\nkey\
    \ = jax.random.PRNGKey(123)\nA = jax.random.normal(key, shape=[4, 4])\nprint(A)\n\
    [[ 0.52830553  0.3722206  -1.2219944  -0.10314374]\n [ 1.4722222   0.47889313\
    \ -1.2940298   1.0449569 ]\n [ 0.23724185  0.3545859  -0.172465   -1.8011322 ]\n\
    \ [ 0.4864215   0.08039388 -1.2540827   0.72071517]]\nS, _, _ = jnp.linalg.svd(A)\n\
    print(S)\n[[-0.375782    0.40269807  0.44086716 -0.70870167]\n [-0.753597    0.0482972\
    \  -0.65527284  0.01940039]\n [ 0.2040088   0.91405433 -0.15798494  0.31293103]\n\
    \ [-0.49925917 -0.00250015  0.5927009   0.6320123 ]]\nx1 = power_iteration(A)\n\
    print(x1.T)\n[[-0.35423845]\n [-0.8332922 ]\n [ 0.16189891]\n [-0.39233655]]\n\
    ```\n\nNotice that the eigenvector returned by the power iteration is close to\
    \ the first column of $S$, but not quite. This is because the method is approximate.\
    \ It relies on the fact that an eigenvector doesn't change in direction when multiplied\
    \ by the matrix. So by repeatedly multiplying by the matrix, we eventually iterate\
    \ onto an eigenvector. Also notice that we solved for column eigenvectors instead\
    \ of the row eigenvectors. In this example, the columns are users, and the rows\
    \ are items. It is important to play with transposed matrices because a lot of\
    \ ML involves reshaping and transposing matrices, so getting used to them early\
    \ is an important skill."
- md: "## Eigenvector Examples\n\nHere's a nice exercise for you: the second eigenvector\
    \ is computed by subtracting out the first eigenvector after the matrix multiplication.\
    \ This is telling the algorithm to ignore any component along the first eigenvector\
    \ in order to compute the second eigenvector. As a fun exercise, hop over to Colab\
    \ and try computing the second eigenvector. Extending this to sparse vector representations\
    \ is another interesting exercise, as it allows you to start computing the eigenvectors\
    \ of sparse matrices, which is usually the form of matrix that recommender systems\
    \ use.\n\nNext, we construct a recommendation for a user by creating a column\
    \ and then taking the dot product with all the eigenvectors and finding the closest.\
    \ We then find all the highest-scoring entries in the eigenvector that the user\
    \ hasn't seen and return them as recommendations. So in the preceding example,\
    \ if the eigenvector $x_1$ was the closest to the user column, then the best item\
    \ to recommend would be item 3 because it is the largest component in the eigenvector\
    \ and thus rated most highly if the user is closest to the eigenvector $x_1$.\
    \ Here's what this looks like in code:\n\n```python\nimport jax\nimport jax.numpy\
    \ as jnp\n\ndef recommend_items(eigenvectors: jnp.ndarray, user: jnp.ndarray)\
    \ -> jnp.ndarray:\n    \"\"\"Returns an ordered list of recommend items for the\
    \ user.\n    Args:\n        eigenvectors: a nxm eigenvector matrix\n        user:\
    \ a user vector of size m.\n    \"\"\"\n    score_eigenvectors = jnp.matmul(eigenvectors.T,\
    \ user)\n    which_eigenvector = jnp.argmax(score_eigenvectors)\n    closest_eigenvector\
    \ = eigenvectors.T[which_eigenvector]\n    scores, items = jax.lax.top_k(closest_eigenvector,\
    \ 3)\n    return scores, items\n\nS = jnp.array(\n[[-0.375782,    0.40269807],\n\
    \ [-0.753597,    0.0482972],\n [ 0.2040088,   0.91405433],\n [-0.49925917, -0.00250015]])\n\
    u = jnp.array([-1, -1, 0, 0]).reshape(4, 1)\nscores, items = recommend_items(S,\
    \ u)\nprint(scores)\n[ 0.2040088  -0.375782   -0.49925917]\nprint(items)\n[2 0\
    \ 3]\n```\n\nIn this example, a user has downvoted item 0 and item 1. The closest\
    \ column eigenvector is therefore column 0. We then select the closest eigenvector\
    \ to the user, order the entries, and recommend item 2 to the user, which is the\
    \ highest-scoring entry that the user has not seen.\n\nTwo techniques aim to extract\
    \ the most relevant features from the user-item interaction matrix and reduce\
    \ its dimensionality, which can improve performance:\n\n## Principal component\
    \ analysis (PCA)\n\nThis statistical technique transforms the original high-dimensional\
    \ data into a lower-dimensional representation while retaining the most important\
    \ information. PCA can be applied to the user-item interaction matrix to reduce\
    \ the number of dimensions and improve the computational efficiency of the recommendation\
    \ algorithm.\n\n## Nonnegative matrix factorization (NMF)\n\nThis technique decomposes\
    \ the nonnegative user-item interaction matrix ($A \\in \\mathbb{R}^{(m \\times\
    \ n)*+}$) into two nonnegative matrices ($W \\in \\mathbb{R}^{(m \\times r)*+}$\
    \ and $H \\in \\mathbb{R}^{(r \\times n)*+}$). NMF can be utilized for dimension\
    \ reduction in recommendation systems, where the latent factors are nonnegative\
    \ and interpretable. The mathematical representation of NMF is $A \\simeq W \\\
    times H$.\n\nMF techniques can be further extended to incorporate additional information,\
    \ such as item content or user demographic data, through the use of side information.\
    \ Side information can be employed to augment the user-item interaction matrix,\
    \ allowing for more accurate and personalized recommendations.\n\nFurthermore,\
    \ MF models can be extended to handle implicit feedback data, where the absence\
    \ of interaction data is not equivalent to the lack of interest. By incorporating\
    \ additional regularization terms into the objective function, MF models can learn\
    \ a more robust representation of the user-item interaction matrix, leading to\
    \ better recommendations for implicit feedback scenarios.\n\nConsider a recommendation\
    \ system that employs MF to model the user-item interaction matrix. If the system\
    \ comprises many users and items, the resulting factor matrices can be high-dimensional\
    \ and computationally expensive to process. However, by using dimension-reduction\
    \ techniques like SVD or PCA, the algorithm can reduce the dimensionality of the\
    \ factor matrices while preserving the most important information about the user-item\
    \ interactions. This enables the algorithm to generate more efficient and accurate\
    \ recommendations, even for new users or items with limited interaction data.\n\
    \n## Isometric Embeddings\n\n*Isometric embeddings* are a specific type of embedding\
    \ that maintains distances between points in high-dimensional space when mapping\
    \ them onto a lower-dimensional space. The term *isometric* signifies that the\
    \ distances between points in the high-dimensional space are preserved precisely\
    \ in the lower-dimensional space, up to a scaling factor.\n\nIn contrast to other\
    \ types of embeddings, such as linear or nonlinear embeddings, which may distort\
    \ the distances between points, isometric embeddings are preferable in numerous\
    \ applications where distance preservation is essential. For example, in ML, isometric\
    \ embeddings can be employed to visualize high-dimensional data in two or three\
    \ dimensions while preserving the relative distances between the data points.\
    \ In NLP, isometric embeddings can be utilized to represent the semantic similarities\
    \ between words or documents while maintaining their relative distances in the\
    \ embedding space.\n\nOne popular technique for generating isometric embeddings\
    \ is *multidimensional scaling (MDS)*. MDS operates by computing pairwise distances\
    \ between the data points in the high-dimensional space and then determining a\
    \ lower-dimensional embedding that preserves these distances. The optimization\
    \ problem is generally formulated as a constrained optimization problem, where\
    \ the objective is to minimize the difference between the pairwise distances in\
    \ the high-dimensional space and the corresponding distances in the lower-dimensional\
    \ embedding. Mathematically, we write: $min_{(X)}\\Sigma_{(i,j)}(d_{ij} - ||x_i\
    \ - x_j||)^2$.\n\nHere, $d_{ij}$ denotes the pairwise distances in the high-dimensional\
    \ space, and $x_i$ and $x_j$ represent points in the lower-dimensional embedding.\n\
    \nAnother approach for generating isometric embeddings is through the use of kernel\
    \ methods, such as kernel PCA or kernel MDS. Kernel methods work by implicitly\
    \ mapping the data points into a higher-dimensional feature space, where the distances\
    \ between the points are easier to compute. The isometric embedding is then calculated\
    \ in the feature space, and the resulting embedding is mapped back to the original\
    \ space.\n\nIsometric embeddings have been employed in recommendation systems\
    \ to represent the user-item interaction matrix in a lower-dimensional space where\
    \ the distances between the items are preserved. By preserving the distances between\
    \ items in the embedding space, the recommendation algorithm can better capture\
    \ the underlying structure of the data and provide more accurate and diverse recommendations.\n\
    \nIsometric embeddings can also be employed to incorporate additional information\
    \ into the recommendation algorithm, such as item content or user demographic\
    \ data. By using isometric embeddings to represent the items and the additional\
    \ information, the algorithm can capture the similarities between items based\
    \ on both the user-item interaction data and the item content or user demographics,\
    \ leading to more accurate and diverse recommendations.\n\nMoreover, isometric\
    \ embeddings can also be used to address the cold-start problem in recommendation\
    \ systems. By using the isometric embeddings to represent the items, the algorithm\
    \ can make recommendations for new items based on their similarities to the existing\
    \ items in the embedding space, even in the absence of user interactions.\n\n\
    In summary, isometric embeddings are a valuable technique in recommendation systems\
    \ for representing the user-item interaction matrix in a lower-dimensional space\
    \ where the distances between the items are preserved. Isometric embeddings can\
    \ be generated using MF techniques and can be employed to incorporate additional\
    \ information, address the cold-start problem, and improve the accuracy and diversity\
    \ of recommendations.\n\n## Nonlinear Locally Metrizable Embeddings\n\n*Nonlinear\
    \ locally metrizable embeddings* are yet another method to represent the user-item\
    \ interaction matrix in a lower-dimensional space where the local distances between\
    \ nearby items are preserved. By preserving the local distances between items\
    \ in the embedding space, the recommendation algorithm can better capture the\
    \ local structure of the data and provide more accurate and diverse recommendations.\n\
    \nMathematically, let $X = x_1, x_2, \\dots, x_n$ be the set of items in the high-dimensional\
    \ space, and $Y = y_1, y_2, \\dots, y_n$ be the set of items in the lower-dimensional\
    \ space. The goal of nonlinear locally metrizable embeddings is to find a mapping\
    \ $f: X \\rightarrow Y$ that preserves the local distances, i.e., for any $x_i,\
    \ x_j \\in X$, we have this:\n\n$d_Y(f(x_i), f(x_j)) \\simeq d_X(x_i, x_j)$\n\n\
    One popular approach to generating nonlinear locally metrizable embeddings in\
    \ recommendation systems is via autoencoder neural networks. Autoencoders work\
    \ by mapping the high-dimensional user-item interaction matrix onto a lower-dimensional\
    \ space through an encoder network, and then reconstructing the matrix back in\
    \ the high-dimensional space through a decoder network. The encoder and decoder\
    \ networks are trained jointly to minimize the difference between the input data\
    \ and the reconstructed data, with the objective of capturing the underlying structure\
    \ of the data in the embedding space:\n\n$min_{(\\theta, \\phi)} \\sum_{(i=1)}^{n}\
    \ ||x_i - g_{\\phi}(f_{\\theta}(x_i))||^2$"
  mdcn: "## 特征向量示例\n\n这里有一个不错的练习：第二个特征向量是通过在矩阵乘法后减去第一个特征向量来计算的。这告诉算法在计算第二个特征向量时，要忽略沿第一个特征向量的任何分量。作为一项有趣的练习，可以跳转到\
    \ Colab 并尝试计算第二个特征向量。将其扩展到稀疏向量表示是另一个有趣的练习，因为它允许你开始计算稀疏矩阵的特征向量，而这通常是推荐系统所使用的矩阵形式。\n\
    \n接下来，我们通过创建一个列向量，然后与所有特征向量进行点积并找到最接近的，来为用户构建推荐。然后，我们在用户未见过的特征向量中找到所有得分最高的条目，并将它们作为推荐返回。因此，在前面的例子中，如果特征向量\

  - '[PAGE 172]


    that we frequently arrive at user space and item space separately, and often compute
    distance between user and item vectors.


    Is this OK? In many cases, it lacks firm theoretical footing but works well. One
    particular case where this *does* have a firm theoretical footing is MF. Rather
    than a long digression on geometric algebra, we will give the following guidance:
    if you’re interested in comparing two vectors that aren’t in the same space, ask
    yourself if they’re of the same dimension, if distance is defined the same in
    both spaces, and if the density priors are similar. In fact, at times, none of
    these is true and you can *still* get away with a comparison. But for each of
    these potential risks, it’s worth a stop-and-think.


    One explicit example of a troubling difference in two latent spaces is found in
    “Poincaré Embeddings for Learning Hierarchical Representations” by Maximilian
    Nickel and Douwe Kiela; this paper provides an interesting way to encode relationships
    between items in your latent space via the implicit geometry. However, your users
    may not be encoded in a hyperbolic space. Tread carefully if you compute inner
    products between these and Euclidean embedded vectors!


    # Feature-Based Warm Starting


    As you saw in Chapter 7, there are a variety of ways to use features alongside
    some of the collaborative filtering (CF) and MF approaches we’ve presented. In
    particular, you saw how encoders built via a two-towers architecture can be used
    for fast feature-based recommendations in the cold-start scenario. Let’s look
    into this deeper and think carefully about features for new users or items.


    In Chapter 9, we built our bilinear factor model as a simple regression and, in
    fact, saw that all the standard ML modeling approaches would apply. However, we
    took the user embedding to be features learned from item interactions: that is,
    the content-based feature vector. If our goal is to build a recommendation algorithm
    that does not need a history of user ratings, obviously this construction will
    not suffice.


    We might begin by asking if the preceding factor regression approach could work
    in the pure user-feature setting—leave aside worries about the inner product that
    depended on a mutual embedding and just take everything to be pure matrices. While
    this is a reasonable idea that can yield some results, we may quickly identify
    the coarseness of this model: each user would then need to provide answers to
    queries $q_k$ such that $\mathbf{i} \in \mathbb{R}^{k}$. Because the dimensionality
    of these user vectors scales linearly with the number of questions we’re willing
    and able to ask the user, we are passing along the difficulty of the problem to
    our user experience.'
  - '[PAGE 173]


    Because we intend on using CF via MF as our core model, we''d really like to find
    a way to smoothly transition from the feature-based model into this MF, ensuring
    we take advantage of user/item ratings as they emerge. In “The Evaluation Flywheel”
    on page 117, we discussed using inference results and their subsequent outcomes
    in real time to update the model, but how do we account for that in the modeling
    paradigm?


    In a latent-factor model obtained via MF, we have the following:


    $\mathbf{u}_i \mathbf{v}_x$


    Here, $\mathbf{u}_i$ has a Gaussian prior with zero mean; this is why new users
    won''t yield useful ratings before they have interaction data. We thus say that
    the *user-matrix* has *zero-concentrated priors*. Our first strategy to including
    features in our MF is to simply build a better priors distribution.


    More mathematically: we learn a regression model $G(\mathbf{i}) \sim \mathbf{u}_i$
    for initialization of our learned factor matrix, and this means we''re learning
    the following:


    $s(i, x) \sim \mathbf{w}_{ix}\gamma + \alpha_i + \beta_x + \mathbf{u}_i \mathbf{v}_x$


    Here, our $\mathbf{w}_{ix}\gamma$ is now a standard bilinear feature regression
    from user and item features, the bias terms are learned to estimate popularity
    or *rank inflation*, and our familiar MF terms are $\mathbf{u}_i \mathbf{v}_x$.


    Note that this approach provides a general strategy for including features into
    an MF model. How we fit the factors-features model is totally up to us, as are
    the optimization methods we wish to employ.


    Also note that instead of regression-based approaches, priors can be established
    via *k*-nearest neighbors in a purely feature-based embedding space. This modeling
    strategy is explored in great detail in “Eliciting Auxiliary Information for Cold
    Start User Recommendation: A Survey” by Nor Aniza Abdullah et al. Compare this
    with the item-item content-based recommender from Chapter 5, where the query is
    an item and similarity in item space is the link between the last item and the
    next.


    We have established a strategy and a collection of approaches to building our
    models via features. We''ve even seen how our MF will fall over for new users,
    only to be saved by a feature-based model. So why not stick to features? Why introduce
    factors at all?'
  - '[PAGE 174]


    # Segmentation Models and Hybrids


    Similar to our preceding discussion of warm-starting via features is the closely
    related concept of *demographic-based systems*. Note that *demographic* in this
    context need not refer explicitly to personally identifiable information and can
    refer to the user data collected during the sign-up process. Simple examples from
    book recommendations might include a user''s favorite genres, self-identified
    price preference, book-length preferences, and favorite author. Standard methods
    of clustering-based regression can be helpful in converting a small set of user
    features into recommendations for new users. For these coarse user features, building
    simple feature-based models like naive Bayes, can be especially effective.


    More generally, given user feature vectors, we can formulate a similarity measure
    and then user segments to make new-user recommendations. This should feel similar
    to feature-based recommenders, but instead of requiring usage of user features,
    we model the user''s containment in a segment and then build our factor model
    from the segment to different items.


    One way to imagine this approach is to consider the modeling problem as estimating
    the following for C, a user cluster:


    $r_{C,x} := \text{Avg}(r_{\mathbf{i},x} \mid \mathbf{i} \in C)$


    Then we estimate $P(\mathbf{j} \in C)$, the probability a user $\mathbf{j}$ is
    a member of $C$. We can easily imagine that we instead wish to use the probability
    associated with each cluster to build a bagging model, and have each cluster contributed
    to a weighted average rating.


    While these ideas may not seem like interesting extensions to what we''ve built
    previously, in practice they can be enormously useful for fast, explainable recommendations
    for new users.


    Also note that nothing in this construction is particular to the users; we can
    consider the *dual model* that takes the clustering to be at the level of the
    items and performs a similar process. Combining these models can provide the coarsest
    model of simply user segments to item groups, and utilizing several of these modeling
    approaches simultaneously can provide important and flexible models.


    # Tag-Based Recommenders


    One special case of the segmentation model for item-based recommenders is a *tag-based
    recommender*. This is a quite common first recommender to try when you have some
    human labels and need to quickly turn it into a working recommender.'
  - '[PAGE 175]


    Let''s talk through a toy example: you have a personal digital wardrobe, where
    you''ve logged many features about each article of clothing in your personal closet.
    You want your fashion recommender to give you suggestions for what else to wear,
    given that you''ve selected one piece for the day. You wake up and see that it''s
    rainy outside, so you start by choosing a cozy cardigan. The model you''ve trained
    has found that cardigan has tags *outerwear* and *cozy*, which it knows correlate
    well with *bottoms* and *warm*—so it''s likely to recommend heavier jeans today.


    The upside of a tag recommender is how explainable and understandable the recommendations
    are. The downside is that performance is directly tied to the amount of effort
    that''s put into tagging items.


    Let''s discuss a slightly more involved example of a tag-based recommender that
    one of the authors built in collaboration with Ashraf Shaik and Eric Bunch for
    recommending blog posts.


    The goal was to warm-start the blog-post recommender by utilizing high-quality
    tags that classified the blogs into themes. One special aspect of this system
    was its rich hierarchical tagging maintained by the marketing team. In particular,
    each *tag type* had several values, and there were 11 tag types with up to 10
    values each. Blogs had values for each tag type and sometimes had multiple tags
    in a single tag type for the blog. This may sound a bit complicated, but suffice
    it to say that each blog post could have some of the 47 tags, and the tags were
    further grouped into types.


    One of the first potential tasks is to use those tags to build a simple recommender,
    and we did, but doing so would mean missing a significant additional opportunity
    when afforded such high-quality tag data: evaluating our embeddings.


    First, we needed to understand how we could build user embeddings. Our plan was
    to average the blog embeddings a user had seen, a simple CF approach when you
    have a clear item embedding. Thus we wanted to train the best embedding model
    possible for these blogs. We started by considering models like BERT but were
    unsure whether the highly technical content would be meaningfully captured by
    our embedding model. This led us to realize that we could use the tags as a classifier
    dataset for our embedding. If we could test several embedding models by training
    a simple multilayer perceptron (MLP) to perform multilabel multiclassification
    for each tag type, where the input features were the embedding dimensions, then
    our embedding space would capture the content well.


    Some of the embedding models were of varying dimensions, and some were quite large,
    so we also first used a dimension reduction (UMAP) to a standard size before we
    trained the MLP. We used F1 scores to determine which of the embedding models
    led to the best classification model for tags, and we used visual inspection to
    ensure the groups were as we''d hoped. This worked quite well and showed that
    some embeddings were much better than others.'
- md: "## Hybridization\n\nYou saw in the previous section how to blend our MF with\
    \ simpler models by taking priors from the simpler models and learning how to\
    \ transition away. Coarser approaches to this process of *hybridization* exist:\n\
    \n- *Weighted combinations of models*\n  This approach is incredibly powerful,\
    \ and the weights can be learned in a standard Bayesian framework.\n\n- *Multilevel\
    \ modeling*\n  This approach can include learning a model to select which recommendation\
    \ model should be used, and then learning models in each regime. For example,\
    \ we could use a tree-based model on user features when the user has fewer than\
    \ 10 historical ratings and then use MF after that. A variety of multilevel approaches\
    \ exist, including *switching* and *cascading*, which correspond roughly to voting\
    \ and boosting, respectively.\n\n- *Feature augmentation*\n  This allows multiple\
    \ vectors of features to be concatenated and a larger model to be learned. By\
    \ definition, if we wish to combine feature vectors with factor vectors, like\
    \ those coming from a CF, we will expect substantial nullity. Learning despite\
    \ that nullity allows a somewhat naive combination of the different kinds of features\
    \ to be fed into the model and operated on in all regimes of user activity.\n\n\
    We can combine these models in a variety of useful ways. However, we take the\
    \ position that instead of more complicated combinations of several models that\
    \ work well in different paradigms, we will attempt to stick to a relatively straightforward\
    \ model-service architecture by doing the following:\n\n- Training the best model\
    \ we can by using MF-based CF\n- Using user and item feature-based models for\
    \ cold start\n\nLet’s see why we think feature-based modeling might not be the\
    \ best strategy, even if we do it via neural networks and latent factor models.\n\
    \n## Limitations of Bilinear Models\n\nWe started this chapter by describing *bilinear\
    \ modeling* approaches, and immediately you should take warning—they’re linear\
    \ relationships. You can immediately wonder, “Are there really linear relationships\
    \ between the features of my users and items and the pairwise affinity?”\n\nThe\
    \ answer to this question might depend on the number of features, or it might\
    \ not. Either way, skepticism is appropriate, and in practice the answer is overwhelmingly\
    \ no. You might think, “Well then, as it is a linear approximation, MF also cannot\
    \ succeed,” but that’s not so clear-cut. In fact, MF suggests that the linear\
    \ relationship is *between the latent factors*, not the actual features. This\
    \ subtle difference makes a world of difference.\n\nOne important callout before\
    \ we move on to simpler ideas is that neural networks with nonlinear activation\
    \ functions can be used to build feature-based methods. This domain has had some\
    \ successes, but ultimately a surprising and important result is that **neural\
    \ CF does not outperform matrix factorization**. This doesn’t suggest that there\
    \ are no useful approaches for feature-based models utilizing MLPs, but it does\
    \ defray some of our worries about MF being *too linear*. So why not use more\
    \ feature-based approaches?\n\nThe first most obvious challenge for content-based,\
    \ demographic-based, and any other feature-based method is *getting the features*.\
    \ Let’s consider the dual problems:\n\n- *Features for users*\n  If we want to\
    \ collect features for users, we need to either ask them a series of queries or\
    \ infer those features implicitly. Inferring these via exogenous signals is noisy\
    \ and limited, but each query that we ask the user increases the likelihood of\
    \ onboarding drop-off. When we think of user-onboarding funnels, we know that\
    \ each additional prompt or question incurs another chance that the user will\
    \ not complete the onboarding. This effect accumulates quickly, and without users\
    \ making it through the funnel, the recommendation system won’t be very useful.\n\
    \n- *Features for items*\n  On the flip side, creating features for items is a\
    \ heavily manual task. While many businesses need to do this task to serve other\
    \ purposes as well, it still incurs a significant cost in many cases. If the features\
    \ are to be useful, they need to be of high quality, which incurs more debt. But\
    \ most importantly, if the number of items is extremely large, the cost may quickly\
    \ get out of reach. For large-scale recommendation problems, manually adding features\
    \ is simply infeasible. This is where automatic feature-engineering models can\
    \ help.\n\nAnother significant issue in these feature-based models is *separability*\
    \ or *distinguishability*. These models are not useful if the features cannot\
    \ separate the items or users well. This leads to compounding problems as the\
    \ cardinality increases.\n\nFinally, in many recommendation problems, we start\
    \ with the assumption that taste or preference is extremely personal. We fundamentally\
    \ believe that our interest in a book will have less to do with the number of\
    \ pages and publication date than how it connects with us and our personal experience\
    \ (*our deepest apologies to anyone who bought this book based on page number\
    \ and publication date*). CF—while simple in concept—speaks better to these connections\
    \ via a *shared experience network*.\n\n## Counting Recommenders\n\nHere we will\
    \ use the simplest feature type, simple counting. Counting the frequency and pairwise\
    \ frequencies will provide a simple but useful set of initial models.\n\n## Return\
    \ to the Most-Popular-Item Recommender\n\nOur super simple scheme from before,\
    \ implementing the MPIR, provided us with a convenient toy model, but what are\
    \ the practical considerations of deploying an MPIR? It turns out that the MPIR\
    \ provides an excellent framework for getting started on a Bayesian approximation\
    \ approach to recommendations. Note that in this section, we’re not even considering\
    \ a personalized recommender; everything here is reward maximization across the\
    \ entire user population. We follow the treatment in *Statistical Methods for\
    \ Recommender Systems* by Deepak K. Agarwal and Bee-Chung Chen (Cambridge University\
    \ Press).\n\nFor the sake of simplicity, let’s consider *click-through rate (CTR)*\
    \ as our simple metric to optimize. Our formulation is as follows: we have $\\\
    mathscr{I} = \\{i\\}$ items available to recommend and initially *only one time\
    \ period* in which to do it, and we’re interested in an *allocation plan*, or\
    \ a set of proportions $x_i, \\sum_{i \\in \\mathscr{I}} x_i = 1$, for how to\
    \ recommend items. This can be seen as a very simple multiarmed bandit problem\
    \ with the reward given by the following:\n\n$R(\\mathbf{x}, \\mathbf{c}) = \\\
    sum_{i \\in \\mathscr{I}} c_i^* (N * x_i)$\n\nHere, $c_i$ represents prior distributions\
    \ of CTR for each item. It’s plain to see that maximizing this reward is achieved\
    \ by allocating all recommendations to the item with greatest $p_i$, i.e., picking\
    \ the most popular item in terms of CTR.\n\nThis setup makes it obvious that if\
    \ we have strong confidence in our priors, this problem seems trivial. So let’s\
    \ move to a case where we have a mismatch in confidence.\n\nLet’s consider *two\
    \ time periods*, $N_0$ and $N_1$, as indicating the number of user visits. Note\
    \ that we think of 0 as the past and 1 as the future in this model. Let’s assume\
    \ that we offer *only two items* and that, somewhat mysteriously, for one item\
    \ we have 100% confidence in its CTR in each time period: $q_0$ and $q_1$ will\
    \ denote these rates, respectively. In contrast, we have only priors for our second\
    \ item: $p_0 \\sim \\mathscr{P}(\\theta_0)$ and $p_1 \\sim \\mathscr{P}(\\theta_1)$\
    \ will denote these rates, respectively, and we regard $\\theta_i$ as a state\
    \ vector. We again notate the allocations with $x_{i, t}$, where now the second\
    \ index refers to time period. Then we can simply compute the expected number\
    \ of clicks as follows:\n\n$\\mathbb{E}[N_0 * x_0(p_0 - q_0) + N_1 * x_1(p_1 -\
    \ q_1)] + q_0 N_0 + q_1 N_1$\n\nThis is maximized by assuming a distribution for\
    \ $p_1$ as a function of $x_0$ and $p_0$. With distributional assumptions that\
    \ $p_0$ is gamma distributed and $p_1$ is normally distributed, we can treat this\
    \ as a convex optimization problem to maximize the clicks. See *Statistical Methods\
    \ for Recommender Systems* for a full treatment of the statistics.\n\nThis toy\
    \ example extends in both dimensions to model larger item sets and more time windows\
    \ and provides us with relatively straightforward intuition about the relationship\
    \ between our priors for each item and time step during this step-forward optimization.\n\
    \nLet's put this recommender in context: we've started with item popularity and\
    \ generalized to a Bayesian recommender that learns with respect to user feedback.\
    \ You might consider a recommender like this for a very trend-based recommendations\
    \ context like news; popular stories are often important, but that can change\
    \ rapidly, and we want to be learning from user behavior.\n\n## Correlation Mining\n\
    \nWe've seen ways to use correlations between features of items and recommendations,\
    \ but we should not forget to use correlations between items themselves. Think\
    \ back to our early discussions of cheese in Chapter 2 (Figure 2-1); we said that\
    \ our CF gave us a way to find mutual cheese tastes to recommend new cheeses.\
    \ This was built on the notion of ratings, but we can abstract away from the ratings\
    \ and simply look at the correlations of items a user chooses. You can imagine\
    \ for an ecommerce bookseller that a user's choice of one book to read may be\
    \ useful in recommending others—even if that user chooses not to rate the first\
    \ book. We also saw this phenomena in Chapter 8 as we used the co-occurrence of\
    \ tokens in Wikipedia entries.\n\nWe introduced the co-occurrence matrix as the\
    \ multidimensional array of counts where two items, $i$ and $j$, co-occur. Let's\
    \ take a moment to discuss co-occurrence a bit more deeply.\n\nCo-occurrence is\
    \ context dependent; for our Wikipedia articles, we considered co-occurrence of\
    \ tokens in an article. In the case of ecommerce, co-occurrence can be two items\
    \ purchased by the same user. For ads, co-occurrence can be two things that the\
    \ user clicked, and so on. Mathematically, given users and items, we construct\
    \ an *incidence vector* for each user, the binary vector of one-hot encoded features\
    \ for each item that they interacted with. Those vectors are stacked into a vector\
    \ to yield a $\\#(users) \\times \\#(items)$ matrix in which each row is a user,\
    \ each column is an item, and the elements equal 1 when a user-item pair has interacted.\n\
    \nTo be mathematically precise, a *user-item incidence structure* is a collection\
    \ of sets of user interactions, $\\{y_u\\}_{u \\in U}$, with items $\\{x_i\\}_{i\
    \ \\in I}$, where $U$ indexes users and $I$ indexes items."
  mdcn: "## 混合方法\n\n在上一节中，我们看到了如何通过从更简单的模型中获取先验知识并学习如何过渡，从而将我们的矩阵分解模型与更简单的模型进行融合。对于这种*混合*过程，存在一些更粗略的方法：\n\
    \n- *模型的加权组合*\n  这种方法非常强大，其权重可以在标准的贝叶斯框架中学习得到。\n\n- *多层建模*\n  这种方法可以包括学习一个模型来选择应该使用哪个推荐模型，然后在每个机制中学习模型。例如，当用户的历史评分少于10条时，我们可以使用基于用户特征的树模型，之后再使用矩阵分解。存在多种多层方法，包括*切换*和*级联*，它们大致分别对应于投票和提升。\n\
    \n- *特征增强*\n  这允许多个特征向量被拼接起来，并学习一个更大的模型。根据定义，如果我们希望将特征向量与来自协同过滤的因子向量结合起来，我们预计会有大量的空值。尽管存在这些空值，但通过学习，我们可以将不同类型的特征以一种相当朴素的方式组合起来，输入到模型中，并在用户活动的所有机制中进行操作。\n\
    \n我们可以用多种有用的方式组合这些模型。然而，我们的立场是，与其采用在不同范式下表现良好的多个模型的更复杂组合，不如尝试坚持一个相对简单的模型服务架构，具体做法如下：\n\
    \n- 使用基于矩阵分解的协同过滤训练我们能得到的最佳模型\n- 使用基于用户和物品特征的模型来处理冷启动问题\n\n让我们看看为什么我们认为基于特征的建模可能不是最佳策略，即使我们是通过神经网络和潜在因子模型来实现的。\n\
    \n## 双线性模型的局限性\n\n本章开头我们描述了*双线性建模*方法，你立刻应该警惕——它们是线性关系。你可能会立刻想，“我的用户和物品特征与成对亲和力之间真的存在线性关系吗？”\n\
    \n这个问题的答案可能取决于特征的数量，也可能不取决于。无论哪种情况，持怀疑态度是合适的，而在实践中，答案绝大多数是否定的。你可能会想，“那么，既然它是线性近似，矩阵分解也不可能成功，”但这并非那么明确。事实上，矩阵分解表明线性关系存在于*潜在因子之间*，而不是实际特征之间。这种微妙的差异带来了天壤之别。\n\
    \n在我们转向更简单的想法之前，一个重要的提示是，具有非线性激活函数的神经网络可以用来构建基于特征的方法。这个领域取得了一些成功，但最终一个令人惊讶且重要的结果是，**神经协同过滤并未超越矩阵分解**。这并不意味着利用多层感知机的基于特征的模型没有有用的方法，但它确实减轻了我们对矩阵分解*过于线性*的一些担忧。那么，为什么不使用更多基于特征的方法呢？\n\
    \n对于基于内容、基于人口统计学以及任何其他基于特征的方法，第一个最明显的挑战是*获取特征*。让我们考虑一下这两个问题：\n\n- *用户特征*\n  如果我们想收集用户特征，我们需要要么询问他们一系列问题，要么隐式地推断这些特征。通过外部信号推断这些特征是嘈杂且有限的，但我们向用户提出的每一个问题都会增加用户流失的可能性。当我们考虑用户引导漏斗时，我们知道每一个额外的提示或问题都会增加用户无法完成引导的机会。这种效应会迅速累积，如果没有用户通过漏斗，推荐系统就不会非常有用。\n\
    \n- *物品特征*\n  另一方面，为物品创建特征是一项繁重的手工任务。虽然许多企业也需要执行此任务以服务于其他目的，但在许多情况下，它仍然会产生巨大的成本。如果特征要有用，它们需要是高质量的，这会带来更多的负担。但最重要的是，如果物品数量极其庞大，成本可能会迅速变得难以承受。对于大规模推荐问题，手动添加特征根本不可行。这就是自动特征工程模型可以提供帮助的地方。\n\
    \n这些基于特征模型的另一个重要问题是*可分性*或*可区分性*。如果特征无法很好地分离物品或用户，这些模型就没有什么用处。随着基数的增加，这会导致问题复合化。\n\
    \n最后，在许多推荐问题中，我们从品味或偏好是极其个人化的这一假设出发。我们从根本上相信，我们对一本书的兴趣与其页数和出版日期的关系，远不如它与我们个人经历的联系（*对于那些仅根据页数和出版日期购买本书的读者，我们深表歉意*）。协同过滤——虽然在概念上很简单——通过*共享体验网络*更好地阐述了这些联系。\n\
    \n## 计数推荐器\n\n在这里，我们将使用最简单的特征类型：简单计数。计算频率和成对频率将提供一组简单但有用的初始模型。\n\n## 回到最热门物品推荐器\n\
    \n我们之前实现的超级简单方案，即MPIR，为我们提供了一个方便的玩具模型，但部署MPIR有哪些实际考虑因素呢？事实证明，MPIR为开始使用贝叶斯近似方法进行推荐提供了一个极好的框架。请注意，在本节中，我们甚至不考虑个性化推荐器；这里的一切都是针对整个用户群体的奖励最大化。我们遵循Deepak\
    \ K. Agarwal和Bee-Chung Chen所著的《推荐系统统计方法》（剑桥大学出版社）中的处理方法。\n\n为了简单起见，让我们考虑*点击率（CTR）*作为我们要优化的简单指标。我们的公式如下：我们有$\\\
    mathscr{I} = \\{i\\}$个可供推荐的物品，并且最初*只有一个时间段*来进行推荐，我们感兴趣的是一个*分配计划*，或者一组比例$x_i, \\\
    sum_{i \\in \\mathscr{I}} x_i = 1$，用于如何推荐物品。这可以看作是一个非常简单的多臂老虎机问题，其奖励由以下公式给出：\n\
    \n$R(\\mathbf{x}, \\mathbf{c}) = \\sum_{i \\in \\mathscr{I}} c_i^* (N * x_i)$\n\
    \n这里，$c_i$代表每个物品的CTR的先验分布。很明显，通过将所有推荐分配给具有最大$p_i$的物品，即选择CTR最高的最热门物品，可以实现该奖励的最大化。\n\
    \n这个设置清楚地表明，如果我们对先验有很强的信心，这个问题似乎微不足道。那么，让我们转向一个信心不匹配的情况。\n\n让我们考虑*两个时间段*，$N_0$和$N_1$，表示用户访问次数。请注意，在这个模型中，我们认为0代表过去，1代表未来。假设我们*只提供两个物品*，并且有点神秘的是，对于其中一个物品，我们在每个时间段对其CTR有100%的信心：$q_0$和$q_1$将分别表示这些比率。相比之下，我们对第二个物品只有先验知识：$p_0\
    \ \\sim \\mathscr{P}(\\theta_0)$和$p_1 \\sim \\mathscr{P}(\\theta_1)$将分别表示这些比率，我们将$\\\
    theta_i$视为状态向量。我们再次用$x_{i, t}$表示分配，其中第二个索引现在指时间段。那么我们可以简单地计算预期点击次数如下：\n\n$\\mathbb{E}[N_0\
    \ * x_0(p_0 - q_0) + N_1 * x_1(p_1 - q_1)] + q_0 N_0 + q_1 N_1$\n\n通过假设$p_1$是$x_0$和$p_0$的函数的分布，可以实现该式的最大化。在$p_0$服从伽马分布且$p_1$服从正态分布的分布假设下，我们可以将其视为一个凸优化问题来最大化点击次数。完整的统计处理请参见《推荐系统统计方法》。\n\
    \n这个玩具示例在两个维度上扩展，以建模更大的物品集和更多的时间窗口，并为我们提供了关于每个物品的先验知识与时间步长之间关系的相对直观的理解，用于这种前向优化。\n\
    \n让我们将这个推荐器置于背景中：我们从物品流行度开始，并将其推广为一个根据用户反馈进行学习的贝叶斯推荐器。你可能会考虑在非常基于趋势的推荐环境中使用这样的推荐器，比如新闻；热门故事通常很重要，但这种情况可能迅速变化，我们希望从用户行为中学习。\n\
    \n## 相关性挖掘\n\n我们已经看到了使用物品特征和推荐之间相关性的方法，但我们不应忘记使用物品本身之间的相关性。回想一下我们在第2章（图2-1）中关于奶酪的早期讨论；我们说过我们的协同过滤为我们提供了一种找到共同奶酪品味来推荐新奶酪的方法。这是建立在评分概念之上的，但我们可以抽象掉评分，只看用户选择的物品之间的相关性。你可以想象，对于一个电子商务书商来说，用户选择阅读一本书可能有助于推荐其他书——即使该用户选择不对第一本书评分。我们在第8章中也看到了这种现象，当时我们使用了维基百科条目中令牌的共现。\n\
    \n我们引入了共现矩阵，作为两个物品$i$和$j$共现的计数的多维数组。让我们花点时间更深入地讨论一下共现。\n\n共现是依赖于上下文的；对于我们的维基百科文章，我们考虑的是文章中令牌的共现。在电子商务的情况下，共现可以是同一用户购买的两个物品。对于广告，共现可以是用户点击的两个东西，等等。从数学上讲，给定用户和物品，我们为每个用户构建一个*关联向量*，即他们交互过的每个物品的独热编码特征的二进制向量。这些向量被堆叠成一个向量，得到一个$\\\
    #(users) \\times \\#(items)$矩阵，其中每一行是一个用户，每一列是一个物品，当用户-物品对发生交互时，元素等于1。\n\n从数学上精确地说，一个*用户-物品关联结构*是一组用户与物品交互的集合$\\\
    {y_u\\}_{u \\in U}$，其中$U$索引用户，$I$索引物品。"

    \            params,\n            x[\"track_context\"], x[\"album_context\"],\
    \ x[\"artist_context\"],\n            x[\"next_track\"], x[\"next_album\"], x[\"\
    next_artist\"],\n            x[\"neg_track\"], x[\"neg_album\"], x[\"neg_artist\"\
    ])\n        pos_affinity = result[0]\n        neg_affinity = result[1]\n     \
    \   context_self_affinity = result[2]\n        next_self_affinity = result[3]\n\

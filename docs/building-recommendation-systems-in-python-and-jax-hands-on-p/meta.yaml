- img_proc: true
  md: '# Experimentation


    As good data scientists, we know that without a proper experimental framework,
    it''s risky to advertise much about the performance of a feature or, in this case,
    model. Experimentation can be handled with shadowing by having a controller layer
    that is taking the incoming requests and orchestrating which of the deployed models
    to curry the response along. A simple A/B experimentation framework might ask
    for a randomization at every request, whereas something like a multiarmed bandit
    will require the controller layer to have notions of the reward function.


    Experimentation is a deep topic that we don''t have the knowledge or space to
    do adequate justice, but it''s useful to know that this is where experimentation
    can fit into the larger deployment pipeline.


    # Model Cascades


    A really nice extension of the concepts of ensembling and shadowing is model cascading,
    illustrated in Figure 7-4. The simplified idea of a model cascade is that we use
    model confidence to create a conditional ensemble. In particular, given an inference
    request, the model provides a prediction with a confidence estimate; when the
    model confidence is high, that prediction is returned, but if the confidence is
    below a certain threshold, a downstream model is called and the ensemble is started.
    There''s no reason to stop at two models; this method can be used to iteratively
    expand the number of ensemble layers for any number of models that in training
    show improved performance in an ensemble.


    ![](img/da17d05291861831978609329c481581_135_0.png)'
  merge: -1
  pgno: 135
- img_proc: true
  md: 'Here are a few advantages of this approach:


    +   - Better expected performance overall, as ensembles usually increase performance

    - Ensemble performance with lower average computation time

    - Especially better performance in out-of-sample scenarios


    This method scales to larger pools of models and, while it may incur significant
    training efforts, finding the right ordering of the models can have significant
    effects on model accuracy and latency.


    # The Evaluation Flywheel


    By now, it’s likely obvious that a production ML model is far from a static object.
    Production ML systems of any kind are subject to as many deployment concerns as
    a traditional software stack, in addition to the added challenge of dataset shift
    and new users/items. In this section, we’ll look closely at the feedback loops
    introduced and understand how the components fit together to continuously improve
    our system—even with little input from a data scientist or ML engineer.


    # Daily Warm Starts


    As we’ve now discussed several times, we need a connection between the continuous
    output of our model and retraining. The first simplest example of this is daily
    warm starts, which essentially ask us to utilize the new data seen each day in
    our system.


    As might already be obvious, some of the recommendation models that show great
    success are quite large. Retraining some of them can be a massive undertaking,
    and simply *rerunning everything* each day is often infeasible. So, what can be
    done?



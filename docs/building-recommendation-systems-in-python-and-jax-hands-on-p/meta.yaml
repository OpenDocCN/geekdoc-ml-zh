    # Convolutional Neural Network Definition


    Now that we have the images, the next step is figuring out how to represent the
    data. Images come in different sizes and are a complex type of content to analyze.
    We can use the raw pixels as the representation of our content, but the drawback
    is that tiny changes in pixel values can cause large differences in the distance
    between images. We do not want that. Rather, we want to somehow learn what is
    important in the images and ignore parts of the image, such as the background
    color, that might not be as important.


    For this task, we will use a convolutional neural network (CNN) to compute an
    embedding vector for the image. An *embedding vector* is a kind of feature vector
    for the image that is learned from data and is of fixed size. We use embedding
    vectors for our representation because we want our database to be small and compact,
    easy to score over large numbers of images in the corpus, and relevant to the
    task at hand, which is to match products to a given scene image.


    The neural network architecture we use is a variant of residual networks, or Resnet.
    Refer to “Deep Residual Learning for Image Recognition” by Kaiming He et al. for
    details about the architecture and for references on CNNs. Briefly, a convolution
    layer repeatedly applies a small filter of typically 3 × 3 size over an image.
    This results in a feature map of the same resolution as the input if the stride
    is (1, 1) (which means apply the filter with a 1-pixel step in the x direction
    and a 1-pixel step in the y direction), or quarter size if the stride is (2, 2).
    The residual skip connection is just a shortcut from the previous input layer
    to the next, so in effect, the nonlinear part of the networks learns the residual
    from the linear skip part, hence the name residual network.


    Additionally, we use the BatchNorm layer, details of which can be found at “Batch
    Normalization: Accelerating Deep Network Training by Reducing Internal Covariate
    Shift” by Sergey Ioffe and Christian Szegedy, and the “Searching for Activation
    Functions” by Prajit Ramachandran, Barret Zoph, and Quoc V. Le.


    Once we specify the model, we also need to optimize it for the task.'

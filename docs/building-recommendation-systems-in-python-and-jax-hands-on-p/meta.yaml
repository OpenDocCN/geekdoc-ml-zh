- md: '## Containerization


    We''ve discussed how to put together a simple service that can return the results,
    and we suggested using FastAPI; however, the question of environments is now relevant.
    When executing Python code, it is important to keep the environment consistent
    if not identical. FastAPI is a library for designing the interfaces; Docker is
    the software that manages the environment that code runs in. It''s common to hear
    Docker described as a container or containerization tool: this is because you
    load a bunch of apps—or executable components of code—into one shared environment.


    We have a few subtle things to note at this point. The meaning of *environment*
    encapsulates both the Python environment of package dependencies and the larger
    environment, including the operating system or GPU drivers. The environment is
    usually initialized from a predetermined *image* that installs the most basic
    aspects of what you''ll need access to and in many cases is less variable across
    services to promote consistency and standardization. Finally, the container is
    usually equipped with a list of infrastructure code necessary to work wherever
    it is to be deployed.


    In practice, you specify details of the Python environment via your *requirements*
    file, which consists of a list of Python packages. Note that some library dependencies
    are outside Python and will require additional configuration mechanisms. The operating
    system and drivers are usually built as part of a base image; you can find these
    on DockerHub or similar. Finally, *infrastructure as code* is a paradigm wherein
    you write code to orchestrate the necessary steps in getting your container configured
    to run in the infrastructure it will be deployed into. Dockerfile and Docker Compose
    are specific to the Docker container interfacing with infrastructure, but you
    can further generalize these concepts to include other details of the infrastructure.
    This infrastructure as code begins to encapsulate provisioning of resources in
    your cloud, setting up open ports for network communication, access control via
    security roles, and more. A common way to write this code is in Terraform. This
    book doesn''t dive into infrastructure specification, but infrastructure as code
    is becoming a more important tool to the ML practitioner. Many companies are beginning
    to attempt to simplify these aspects of training and deploying systems including
    Weights & Biases or Modal.


    ## Scheduling


    Two paradigms exist for scheduling jobs: cron and triggers. Later we''ll talk
    more about the continuous training loop and active learning processes, but upstream
    of those is your ML workflow. ML workflows are a set of ordered steps necessary
    to prepare your model for inference. We''ve introduced our notion of collector,
    ranker, and server, which are organized into a sequence of stages for recommendation
    systems—but these are the three coarsest elements of the system topology.


    In ML systems, we frequently assume that there''s an upstream stage of the workflow
    that corresponds to data transformations, as discussed in Chapter 6. Wherever
    that stage takes place, the output of those transformations results in our vector
    store—and potentially the additional feature stores. The handoff between those
    steps and the next steps in your workflow are the result of a job scheduler. As
    mentioned previously, tools like Dagster and Airflow can run sequences of jobs
    with dependent assets. These kinds of tools are needed to orchestrate the transitions
    and to ensure that they''re timely.


    *Cron* refers to a time schedule where a workflow should begin—for example, hourly
    at the top of the hour or four times a day. *Triggers* refers to the instigation
    of a job run when another event has taken place—for example, if an endpoint receives
    a request, or a set of data gets a new version, or a limit of responses is exceeded.
    These are meant to capture more ad hoc relationships between the next job stage
    and the trigger. Both paradigms are very important.


    ## CI/CD


    Your workflow execution system is the backbone of your ML systems, often the bridge
    between the data collection process, the training process, and the deployment
    process. Modern workflow execution systems also include automatic validation and
    tracking so that you can audit the steps on the way to production.


    *Continuous integration* (CI) is a term taken from software engineering to enforce
    a set of checks on new code in order to accelerate the development process. In
    traditional software engineering, this comprises automating unit and integration
    testing, usually run after checking the code into version control. For ML systems,
    CI may mean running test scripts against the model, checking the typed output
    of data transformations, or running validation sets through the model and benchmarking
    the performance against previous models.


    *Continuous deployment* (CD) is also a term popularized in software engineering
    to refer to automating the process of pushing new packaged code into an existing
    system. In software engineering, deploying code when it has passed the relevant
    checks speeds development and reduces the risk of stale systems. In ML, CD can
    involve strategies like automatically deploying your new model behind a service
    endpoint in shadow (which we''ll discuss in "Shadowing" on page 115) to test that
    it works as expected under live traffic. It could also mean deploying a model
    behind a very small allocation of an A/B test or multiarm bandit treatment to
    begin to measure effects on target outcomes. CD usually requires effective triggering
    by the requirements it has to satisfy before being pushed. It''s common to hear
    CD utilizing a model registry, where you house and index variations on your model.


    ## Alerting and Monitoring


    Alerting and monitoring take a lot of their inspiration from the DevOps world
    for software engineering. Here are some high-level principles that will guide
    our thinking:


    - Clearly defined schemas and priors

    - Observability


    ## Schemas and Priors


    When designing software systems, you almost always have expectations about how
    the components fit together. Just as you anticipate the input and output to functions
    when writing code, in software systems you anticipate these at each interface.
    This is relevant not only for microservice architectures; even in a monolith architecture,
    components of the system need to work together and often have boundaries between
    their defining responsibilities.


    Let’s make this more concrete via an example. You’ve built a user-item latent
    space, a feature store for user features, a bloom filter for client avoids (things
    the client specifically tells you they don’t want), and an experiment index that
    defines which of two models should be used for scoring. First let’s examine the
    latent space; when provided a user_id, we need to look up its representation,
    and we already have some assumptions:


    - The user_id provided will be of the correct type.

    - The user_id will have a representation in our space.

    - The representation returned will be of the correct type and shape.

    - The component values of the representation vector will be in the appropriate
    domain. (The support of representations in your latent space may vary day to day.)


    From here, we need look up the k ANN, which incurs more assumptions:


    - There are ≥ k vectors in our latent space.

    - Those vectors adhere to the expected distributional behavior of the latent space.


    While these seem like relatively straightforward applications of unit tests, canonizing
    these assumptions is important. Take the last assumption in both of the two services:
    how can you know the appropriate domain for the representation vectors? As part
    of your training procedure, you’ll need to calculate this and then store it for
    access during the inference pipeline.


    In the second case, when finding nearest neighbors in high-dimensional spaces,
    well-discussed difficulties arise in distributional uniformity, but this can mean
    particularly poor performance for recommendations. In practice, we have observed
    a spiky nature to the behavior of *k*-nearest neighbors in latent spaces, leading
    to difficult challenges downstream in ensuring diversity of recommendations. These
    distributions can be estimated as priors, and simple checks like KL divergence
    can be used online; we can estimate the average behavior of the embeddings and
    the difference between local geometries.


    In both cases, collecting and logging the output of this information can provide
    a rich history of what is going on with your system. This can shorten debugging
    loops later if model performance is low in production.


    Returning to the possibility of user_id lacking a representation in our space:
    this is precisely the cold-start problem! In that case, we need to transition
    over to a different prediction pipeline: perhaps user-feature-based, explore-exploit,
    or even hardcoded recommendations. In this setting, we need to understand next
    steps when a schema condition is not met and then gracefully move forward.


    ## Integration Tests


    Let''s consider one higher-level challenge that might emerge in a system like
    this at the level of integration. Some refer to these issues as *entanglement*.


    You''ve learned through experimentation that you should find *k* = 20 ANNs in
    the item space for a user to get good recommendations. You make a call to your
    representation space, get your 20 items, and pass them onto the filtering step.
    However, this user is quite picky; they have previously made many restrictions
    on their account about the kind of recommendations they allow: no shoes, no dresses,
    no jeans, no hats, no handbags—what''s a struggling recommendation system to do?


    Naively, if you take the 20 neighbors and pass them into the bloom, you''re likely
    to be left with nothing! You can approach this challenge in two ways:


    - Allow for a callback from the filter step to the retrieval (see "Predicate Pushdown"
    on page 278)

    - Build a user distribution and store that for access during retrieval


    In the first approach, you give access to your filter step to call the retrieval
    step with a larger *k* until the requirements are satisfied after the bloom. Of
    course, this incurs significant slowdown as it requires multiple passes and ever-growing
    queries with redundancy! While this approach is simple, it requires building defensively
    and knowing ahead of time what may go wrong.'
  mdcn: '## 容器化


    我们已经讨论了如何构建一个能够返回结果的简单服务，并建议使用 FastAPI；然而，环境问题现在变得相关。在执行 Python 代码时，保持环境一致（即使不完全相同）非常重要。FastAPI
    是一个用于设计接口的库；而 Docker 是管理代码运行环境的软件。Docker 常被描述为容器或容器化工具：这是因为你可以将一堆应用程序——或代码的可执行组件——加载到一个共享环境中。


    此时我们需要注意几个微妙之处。*环境*的含义既包括 Python 包依赖的环境，也包括更大的环境，包括操作系统或 GPU 驱动程序。环境通常从一个预定义的*镜像*初始化，该镜像安装了你将需要访问的最基本方面，并且在许多情况下，为了促进一致性和标准化，跨服务的变异性较小。最后，容器通常配备了一组必要的基础设施代码，以便在其部署的任何地方工作。


    在实践中，你通过 *requirements* 文件指定 Python 环境的详细信息，该文件由 Python 包列表组成。请注意，一些库依赖项在 Python
    之外，需要额外的配置机制。操作系统和驱动程序通常作为基础镜像的一部分构建；你可以在 DockerHub 或类似平台上找到这些。最后，*基础设施即代码*是一种范式，你编写代码来编排必要的步骤，使你的容器配置为在将要部署的基础设施中运行。Dockerfile
    和 Docker Compose 专门用于 Docker 容器与基础设施的接口，但你可以进一步将这些概念推广到包括基础设施的其他细节。这种基础设施即代码开始封装云中资源的配置、为网络通信设置开放端口、通过安全角色进行访问控制等。编写此代码的一种常见方式是使用
    Terraform。本书不深入探讨基础设施规范，但基础设施即代码正成为机器学习从业者越来越重要的工具。许多公司正开始尝试简化训练和部署系统的这些方面，包括
    Weights & Biases 或 Modal。


    ## 调度


    调度作业存在两种范式：cron 和触发器。稍后我们将更详细地讨论持续训练循环和主动学习过程，但在这些之前是你的机器学习工作流。机器学习工作流是一组有序的步骤，用于为模型推理做准备。我们已经介绍了收集器、排序器和服务器的概念，它们被组织成推荐系统的序列阶段——但这些是系统拓扑中最粗略的三个元素。


    在机器学习系统中，我们经常假设工作流中有一个上游阶段对应于数据转换，如第 6 章所述。无论该阶段在何处发生，这些转换的输出都会产生我们的向量存储——以及可能的额外特征存储。这些步骤与工作流中下一步骤之间的交接是作业调度器的结果。如前所述，像
    Dagster 和 Airflow 这样的工具可以运行具有依赖资产的作业序列。需要这类工具来编排转换并确保它们及时完成。


    *Cron* 指的是工作流应开始的时间表——例如，每小时整点或每天四次。*触发器*指的是当另一个事件发生时启动作业运行——例如，如果端点收到请求，或一组数据获得新版本，或响应数量超过限制。这些旨在捕获下一个作业阶段和触发器之间更临时的关系。这两种范式都非常重要。


    ## CI/CD


    你的工作流执行系统是机器学习系统的支柱，通常是数据收集过程、训练过程和部署过程之间的桥梁。现代工作流执行系统还包括自动验证和跟踪，以便你可以审计通往生产环境的步骤。


    *持续集成*（CI）是软件工程中的一个术语，用于对新代码强制执行一组检查，以加速开发过程。在传统软件工程中，这包括自动化单元和集成测试，通常在将代码检入版本控制后运行。对于机器学习系统，CI
    可能意味着针对模型运行测试脚本、检查数据转换的类型化输出，或通过模型运行验证集并将性能与之前的模型进行基准测试。


    *持续部署*（CD）也是软件工程中流行的一个术语，指的是将新的打包代码推送到现有系统的过程自动化。在软件工程中，当代码通过相关检查后部署代码可以加速开发并降低系统过时的风险。在机器学习中，CD
    可能涉及诸如自动将你的新模型部署到服务端点后面进行影子测试（我们将在第 115 页的“影子测试”中讨论）的策略，以测试其在实际流量下是否按预期工作。它也可能意味着将模型部署到
    A/B 测试或多臂老虎机处理的非常小的分配后面，以开始衡量对目标结果的影响。CD 通常需要在满足其要求后才能被推送的有效触发。通常听到 CD 使用模型注册表，你可以在其中存储和索引模型的变体。


    ## 告警和监控


    告警和监控从软件工程的 DevOps 世界中汲取了很多灵感。以下是一些将指导我们思考的高级原则：


    - 明确定义的模式和先验

    - 可观察性


    ## 模式和先验


    在设计软件系统时，你几乎总是对组件如何组合在一起有期望。就像你在编写代码时预期函数的输入和输出一样，在软件系统中，你在每个接口处都预期这些。这不仅与微服务架构相关；即使在单体架构中，系统的组件也需要协同工作，并且通常在其定义的职责之间存在边界。


    让我们通过一个例子来具体说明。你已经构建了一个用户-物品潜在空间、一个用户特征的特征存储、一个用于客户端避免（客户端明确告诉你的他们不想要的东西）的布隆过滤器，以及一个定义应使用两个模型中的哪一个进行评分的实验索引。首先让我们检查潜在空间；当提供
    user_id 时，我们需要查找其表示，并且我们已经有一些假设：


    - 提供的 user_id 将是正确的类型。

    - user_id 将在我们的空间中有一个表示。

    - 返回的表示将是正确的类型和形状。

    - 表示向量的分量值将在适当的域中。（你的潜在空间中表示的支撑集可能每天都在变化。）


    从这里，我们需要查找 k 个近似最近邻，这会产生更多假设：


    - 我们的潜在空间中有 ≥ k 个向量。

    - 这些向量遵循潜在空间的预期分布行为。


    虽然这些看起来像是单元测试的相对直接的应用，但将这些假设规范化很重要。以两个服务中的最后一个假设为例：你如何知道表示向量的适当域？作为训练过程的一部分，你需要计算这个，然后存储它以便在推理管道中访问。


    在第二种情况下，在高维空间中寻找最近邻时，分布均匀性方面存在众所周知的困难，但这可能意味着推荐性能特别差。在实践中，我们观察到潜在空间中 *k*-最近邻行为的尖峰性质，导致在确保推荐多样性方面面临下游的困难挑战。这些分布可以估计为先验，并且可以在线使用简单的检查，如
    KL 散度；我们可以估计嵌入的平均行为和局部几何之间的差异。


    在这两种情况下，收集和记录此信息的输出可以提供系统正在发生什么的丰富历史。如果模型在生产中性能较低，这可以缩短以后的调试循环。


    回到 user_id 在我们的空间中缺乏表示的可能性：这正是冷启动问题！在这种情况下，我们需要过渡到不同的预测管道：也许是基于用户特征的、探索-利用的，甚至是硬编码的推荐。在这种情况下，我们需要理解当模式条件不满足时的下一步，然后优雅地向前推进。


    ## 集成测试


    让我们考虑一个更高层次的挑战，这种挑战可能在像这样的系统中在集成层面出现。有些人将这些问题称为*纠缠*。


    通过实验，你了解到你应该在物品空间中为用户找到 *k* = 20 个近似最近邻以获得良好的推荐。你调用你的表示空间，获取你的 20 个项目，并将它们传递给过滤步骤。然而，这个用户非常挑剔；他们之前在他们的账户上对允许的推荐类型做了许多限制：不要鞋子、不要连衣裙、不要牛仔裤、不要帽子、不要手提包——一个挣扎的推荐系统该怎么办？


    天真地，如果你取这 20 个邻居并将它们传递给布隆过滤器，你很可能会一无所获！你可以通过两种方式来应对这个挑战：


    - 允许从过滤步骤回调到检索步骤（参见第 278 页的“谓词下推”）

    - 构建用户分布并存储它以便在检索期间访问


    在第一种方法中，你允许你的过滤步骤以更大的 *k* 调用检索步骤，直到布隆过滤器后满足要求。当然，这会导致显著的减速，因为它需要多次传递和不断增长的查询，并且有冗余！虽然这种方法很简单，但它需要防御性地构建，并提前知道可能出现的问题。'

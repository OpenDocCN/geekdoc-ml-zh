- md: '## Obtaining the STL Dataset Images


    The first step in the process of creating a content-based recommender is fetching
    the content. In this case, the STL dataset''s content is mostly images, with some
    metadata about the image (like the type of product). We will be using just the
    image content for this chapter.


    You can look at the code in *fetch_images.py* to see how this is done, by using
    the Python standard library urllib to fetch the images. Be aware that doing too
    much fetching on someone else''s website might trigger their bot defenses and
    cause them to blacklist your IP address, so it might be a wise idea to rate-limit
    fetches or find some other way to get the data.


    We have downloaded thousands of image files and put them together into an archive
    as a Weights & Biases artifact. Since the archive is already in this artifact,
    you don''t need to scrape the images yourself, but the code we''ve supplied will
    allow you to do so.


    You can read up on artifacts in the [Weights & Biases documentation](https://docs.wandb.ai/).
    Artifacts are an MLOps concept that version and package together archives of data
    and track producers and consumers of the data.


    You can download the image artifact by running the following:


    ```

    wandb artifact get building-recsys/recsys-pinterest/shop_the_look:latest

    ```


    The images will then be in the local directory *artifacts/shop_the_look:v1*.


    ## Convolutional Neural Network Definition


    Now that we have the images, the next step is figuring out how to represent the
    data. Images come in different sizes and are a complex type of content to analyze.
    We can use the raw pixels as the representation of our content, but the drawback
    is that tiny changes in pixel values can cause large differences in the distance
    between images. We do not want that. Rather, we want to somehow learn what is
    important in the images and ignore parts of the image, such as the background
    color, that might not be as important.


    For this task, we will use a convolutional neural network (CNN) to compute an
    embedding vector for the image. An *embedding vector* is a kind of feature vector
    for the image that is learned from data and is of fixed size. We use embedding
    vectors for our representation because we want our database to be small and compact,
    easy to score over large numbers of images in the corpus, and relevant to the
    task at hand, which is to match products to a given scene image.


    The neural network architecture we use is a variant of residual networks, or Resnet.
    Refer to “Deep Residual Learning for Image Recognition” by Kaiming He et al. for
    details about the architecture and for references on CNNs. Briefly, a convolution
    layer repeatedly applies a small filter of typically 3 × 3 size over an image.
    This results in a feature map of the same resolution as the input if the stride
    is (1, 1) (which means apply the filter with a 1-pixel step in the x direction
    and a 1-pixel step in the y direction), or quarter size if the stride is (2, 2).
    The residual skip connection is just a shortcut from the previous input layer
    to the next, so in effect, the nonlinear part of the networks learns the residual
    from the linear skip part, hence the name residual network.


    Additionally, we use the BatchNorm layer, details of which can be found at “Batch
    Normalization: Accelerating Deep Network Training by Reducing Internal Covariate
    Shift” by Sergey Ioffe and Christian Szegedy, and the “Searching for Activation
    Functions” by Prajit Ramachandran, Barret Zoph, and Quoc V. Le.


    Once we specify the model, we also need to optimize it for the task.


    ## Model Training in JAX, Flax, and Optax


    Optimizing our model should be pretty straightforward in any ML framework. Here
    we show how to do it easily with JAX, Flax, and Optax. JAX is a lower-level NumPy-like
    ML library, and Flax is a higher-level neural network library that provides functionality
    such as neural network modules and embedding layers. Optax is a library that does
    optimization that we will use to minimize our loss function.


    If you are familiar with NumPy, JAX is quite easy to pick up. JAX shares the same
    API as NumPy but has the capability of running the resulting code on vector processors
    such as GPUs or TPUs by doing JIT compilation. JAX device arrays and NumPy arrays
    can be easily converted back and forth, which makes it easy to develop for the
    GPU and yet easy to debug on the CPU.


    In addition to learning how to represent the images, we also need to specify how
    they are related to one another.


    Since the embedding vectors are of fixed dimensions, the easiest similarity score
    is simply the dot product of the two vectors. See “Similarity from Co-occurrence”
    on page 163 for other kinds of similarity measures. So, given an image for a scene,
    we compute the scene embedding and do the same for the product to obtain a product
    embedding, and take the dot product of the two to obtain a score for the closeness
    of fit of a scene $\vec{s}$ to a product $\vec{p}$ :


    $score(\vec{s}, \vec{p}) = \vec{s} * \vec{p}$


    We use CNNs to obtain the embedding of an image.


    We use separate CNNs for the scene and product, however, because they come from
    different kinds of images. Scenes tend to show the context we’re matching products
    to and contain people and the setting, whereas products tend to be catalog images
    of shoes and bags with a blank background, so we need different neural networks
    to determine what is important in the image.


    Once we have the score, that alone is not sufficient, though. We need to make
    sure that a good match of a scene and product, which we call the positive product,
    is higher scoring than a negative product. The positive product is a good match
    for the scene, and the negative product is a not-so-good match for the scene.
    The positive product comes from the training data, and the negative product comes
    from randomly sampling the catalog. A loss that can capture the relationship between
    a positive scene-product pair (A, B) and negative scene-product pair (A, C) is
    called triplet loss. Let’s go into some detail for defining the triplet loss.


    Suppose we want the score for the positive scene-product pair to be one more than
    a negative scene-product pair. We then have the following inequality:


    $$score(scene, pos_{product}) > score(scene, neg_{product}) + 1$$


    The 1 is just an arbitrary constant we use, called a *margin*, to make sure that
    the positive scene-product score is larger than the negative scene-product score.


    Since the process of gradient descent minimizes a function, we then convert the
    preceding inequality into a loss function by moving all terms to one side:


    $$0 > 1 + score(scene, neg_{product}) - score(scene, pos_{product})$$


    As long as the quantity on the right side is larger than 0, we want to minimize
    it; but if it is already less than 0, we do not. Therefore, we encode the quantity
    in a rectified linear unit, which is represented by the function $\max(0, x)$.
    We can thus write out our loss function as follows:


    $$loss(scene, pos_{product}, neg_{product}) = \max(0, 1 + score(scene, neg_{product})
    - score(scene, pos_{product}))$$


    Since we usually minimize loss functions, this ensures that as long as the score(scene,
    neg_product) is 1 more than score(scene, pos_product), the optimization procedure
    will try to minimize the score of the negative pair while increasing the score
    of the positive pair.


    The next example covers the following modules in order so that they make sense
    as they follow the flow of data from reading to training to making recommendations:


    - *input_pipeline.py*: How the data is read

    - *models.py*: How the neural networks are specified

    - *train_shop_the_look.py*: How the neural network is fit using Optax

    - *make_embeddings.py*: How to make a compact database of scene and products'
  mdcn: '## 获取 STL 数据集图像


    创建基于内容的推荐系统的第一步是获取内容。在本例中，STL 数据集的内容主要是图像，以及一些关于图像的元数据（例如产品类型）。本章我们将仅使用图像内容。


    你可以查看 *fetch_images.py* 中的代码，了解如何使用 Python 标准库 urllib 来获取图像。请注意，在他人网站上进行过多抓取可能会触发其机器人防御机制，导致你的
    IP 地址被列入黑名单，因此明智的做法是限制抓取频率或寻找其他方式获取数据。


    我们已经下载了数千个图像文件，并将它们打包成一个归档文件，作为 Weights & Biases 的一个制品。由于归档文件已包含在此制品中，你无需自行抓取图像，但我们提供的代码允许你这样做。


    你可以在 [Weights & Biases 文档](https://docs.wandb.ai/) 中了解有关制品的详细信息。制品是 MLOps 中的一个概念，用于对数据归档进行版本控制和打包，并跟踪数据的生产者和消费者。


    你可以通过运行以下命令下载图像制品：


    ```

    wandb artifact get building-recsys/recsys-pinterest/shop_the_look:latest

    ```


    图像随后将位于本地目录 *artifacts/shop_the_look:v1* 中。


    ## 卷积神经网络定义


    现在我们有了图像，下一步是确定如何表示数据。图像尺寸各异，且是一种复杂的内容类型，难以分析。我们可以使用原始像素作为内容的表示，但缺点是像素值的微小变化可能导致图像间距离的巨大差异。我们不希望这样。相反，我们希望以某种方式学习图像中重要的部分，并忽略图像中可能不太重要的部分，例如背景颜色。


    为此任务，我们将使用卷积神经网络（CNN）来计算图像的嵌入向量。*嵌入向量*是一种从数据中学习到的、固定大小的图像特征向量。我们使用嵌入向量作为表示，因为我们希望数据库小巧紧凑，易于对大量图像进行评分，并且与当前任务（即将产品与给定场景图像匹配）相关。


    我们使用的神经网络架构是残差网络（Resnet）的一种变体。有关架构的详细信息以及 CNN 的参考资料，请参阅何恺明等人的论文《Deep Residual
    Learning for Image Recognition》。简而言之，卷积层在图像上重复应用一个通常为 3 × 3 大小的小型滤波器。如果步幅为 (1,
    1)（即在 x 方向和 y 方向均以 1 像素的步长应用滤波器），则生成与输入分辨率相同的特征图；如果步幅为 (2, 2)，则生成四分之一大小的特征图。残差跳跃连接只是从上一个输入层到下一个层的快捷方式，因此实际上，网络的非线性部分学习的是线性跳跃部分的残差，因此得名残差网络。


    此外，我们使用了 BatchNorm 层，其详细信息可在 Sergey Ioffe 和 Christian Szegedy 的论文《Batch Normalization:
    Accelerating Deep Network Training by Reducing Internal Covariate Shift》以及 Prajit
    Ramachandran、Barret Zoph 和 Quoc V. Le 的论文《Searching for Activation Functions》中找到。


    一旦我们指定了模型，还需要针对任务对其进行优化。


    ## 在 JAX、Flax 和 Optax 中进行模型训练


    在任何机器学习框架中优化模型都应该相当简单。这里我们展示如何使用 JAX、Flax 和 Optax 轻松完成。JAX 是一个更底层的、类似 NumPy 的机器学习库，而
    Flax 是一个更高级的神经网络库，提供神经网络模块和嵌入层等功能。Optax 是一个用于优化的库，我们将用它来最小化损失函数。


    如果你熟悉 NumPy，JAX 会很容易上手。JAX 与 NumPy 共享相同的 API，但能够通过 JIT 编译在向量处理器（如 GPU 或 TPU）上运行生成的代码。JAX
    设备数组和 NumPy 数组可以轻松相互转换，这使得在 GPU 上开发变得容易，同时在 CPU 上调试也很方便。


    除了学习如何表示图像外，我们还需要指定它们彼此之间的关系。


    由于嵌入向量具有固定维度，最简单的相似度分数就是两个向量的点积。关于其他类型的相似度度量，请参见第 163 页的“基于共现的相似度”。因此，给定一个场景图像，我们计算场景嵌入，并对产品进行相同操作以获得产品嵌入，然后取两者的点积，得到场景
    $\vec{s}$ 与产品 $\vec{p}$ 匹配紧密度的分数：


    $score(\vec{s}, \vec{p}) = \vec{s} * \vec{p}$


    我们使用 CNN 来获取图像的嵌入。


    然而，我们为场景和产品使用不同的 CNN，因为它们来自不同类型的图像。场景通常显示我们匹配产品的上下文，包含人物和环境，而产品通常是带有空白背景的鞋子和手袋的目录图像，因此我们需要不同的神经网络来确定图像中重要的部分。


    然而，仅有分数是不够的。我们需要确保场景与产品的良好匹配（我们称为正样本产品）的得分高于负样本产品。正样本产品是场景的良好匹配，负样本产品是场景的不太好的匹配。正样本产品来自训练数据，负样本产品来自目录的随机采样。能够捕捉正场景-产品对
    (A, B) 和负场景-产品对 (A, C) 之间关系的损失函数称为三元组损失。让我们详细定义三元组损失。


    假设我们希望正场景-产品对的得分比负场景-产品对高出 1。那么我们有以下不等式：


    $$score(scene, pos_{product}) > score(scene, neg_{product}) + 1$$


    这里的 1 只是我们使用的一个任意常数，称为 *间隔*，以确保正场景-产品得分大于负场景-产品得分。


    由于梯度下降过程是最小化一个函数，我们将上述不等式转换为损失函数，方法是将所有项移到一侧：


    $$0 > 1 + score(scene, neg_{product}) - score(scene, pos_{product})$$


    只要右侧的量大于 0，我们就希望最小化它；但如果它已经小于 0，我们就不需要了。因此，我们将该量编码在修正线性单元中，该单元由函数 $\max(0, x)$
    表示。因此，我们可以将损失函数写为：


    $$loss(scene, pos_{product}, neg_{product}) = \max(0, 1 + score(scene, neg_{product})
    - score(scene, pos_{product}))$$


    由于我们通常最小化损失函数，这确保了只要 score(scene, neg_product) 比 score(scene, pos_product) 高出
    1，优化过程就会尝试最小化负样本对的得分，同时增加正样本对的得分。


    下一个示例按顺序涵盖以下模块，以便它们按照从读取数据到训练再到进行推荐的数据流顺序合理呈现：


    - *input_pipeline.py*：数据如何被读取

    - *models.py*：神经网络如何被指定

    - *train_shop_the_look.py*：如何使用 Optax 拟合神经网络

    - *make_embeddings.py*：如何创建场景和产品的紧凑数据库'

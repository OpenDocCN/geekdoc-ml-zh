  md: 'The only modification to our MPIR is that now we have two cases for each potential
    recommendation from our max_num_recs. If a random probability is less than our
    ϵ, we proceed as before and select the most popular; otherwise, we select a random
    recommendation.


    ![](img/da17d05291861831978609329c481581_58_0.png)


    # Maximizing Reward


    We''re interpreting maximization of reward as selecting the most-popular items.
    This is an important assumption, and as we move into more complicated recommenders,
    this will be the crucial assumption that we modify to get different algorithms
    and schemes.


    Now let''s summarize our recommender components again:


    *Collector*

    The collector here need not change; we still want to get the item popularities
    first.


    *Ranker*

    The ranker also does not change! We begin by ranking the possible recommendations
    by popularity.


    *Server*

    If the collector and ranker remain the same, clearly the server is what must be
    adapted for this new recommender. This is the case; instead of taking the top
    items to fill max_num_recs, we now utilize our ϵ to determine at each step if
    the next recommendation added to our list should be next in line from the ranker
    or a random selection. Otherwise, we adhere to the same API schema and return
    the same shape of data.


    # What Should ϵ Be?


    In the preceding discussion, ϵ is a fixed number for the entire call, but what
    should the value be? This is actually an area of great study, and the general
    wisdom is to start with large ϵ (to encourage more exploration) and then reduce
    over time. Determining the rate at which you decrease it, the starting value,
    and so on, requires serious thought and research. Additionally, this value can
    be tied into your prediction loop and be part of the training process. See “The
    Exploration-Exploitation Trade-Off: Intuitions and Strategies” by Joseph Rocca
    for a deeper dive.


    Other—often better—sampling techniques exist for optimization. *Importance sampling*
    can utilize the ranking functions we build later to integrate the explore-exploit
    with what our data has to teach.'

    \n为了构建成对损失的WARP权重，我们需要一个函数将负项目的近似排名转换为WARP权重。计算此函数的相对简单的代码如下：\n\n```python\nimport\
    \ numpy as np\n\ndef get_warp_weights(n: int) -> np.ndarray:\n    \"\"\"Returns\

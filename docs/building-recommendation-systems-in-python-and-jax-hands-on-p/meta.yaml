    We’ll start doing things that look like ML soon enough.


    So far, we have defined what a recommendation problem is, set up the core architecture
    of our recommendation system—the collector, the ranker, and the server—and shown
    a couple of trivial recommenders to illustrate how the pieces come together.


    Next we’ll explain the core relationship that recommendation systems seek to exploit:
    the user-item matrix. This matrix lets us build a model of personalization that
    will lead to ranking.'

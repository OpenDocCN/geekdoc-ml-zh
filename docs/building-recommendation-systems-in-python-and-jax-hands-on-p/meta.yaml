  - '[PAGE 314]


    crucial to select the appropriate order, as too high an order may lead to overfitting
    and sparsity of the transition matrix.


    # Order-Two Markov Chain


    Let''s consider an example of an *order-two Markov chain* model using the weather.
    Assume we have three states: sunny ($S$), cloudy ($C$), and rainy ($R$).


    In an order-two Markov chain, the weather of today ($t$) would depend on the weather
    of yesterday ($t-1$) and the day before yesterday ($t-2$). The transition probability
    can be denoted as $P(S_t | S_{t-1}, S_{t-2})$.


    The Markov chain can be defined by a transition matrix that provides the probabilities
    of transitioning from one state to another. However, because we''re dealing with
    an order-two Markov chain, we would have a transition tensor instead. For simplicity,
    let''s say we have the following transition probabilities:


    $P(S|S, S) = 0.7, P(C|S, S) = 0.2, P(R|S, S) = 0.1,$

    $P(S|S, C) = 0.3, P(C|S, C) = 0.4, P(R|S, C) = 0.3,$

    ...


    You can visualize these probabilities in a three-dimensional cube. The first two
    dimensions represent the state of today and yesterday, and the third dimension
    represents the possible states of tomorrow.


    If the weather was sunny for the last two days and we want to predict the weather
    for tomorrow, we would look at the transition probabilities starting with ($S,
    S$), which are $P(S|S, S) = 0.7$, $P(C|S, S) = 0.2$, and $P(R|S, S) = 0.1$. Therefore,
    according to our model, there''s a 70% chance that it will be sunny, a 20% chance
    that it will be cloudy, and a 10% chance that it will be rainy.


    The probabilities in the transition matrix (or tensor) are typically estimated
    from data. If you have a historical record of the weather for several years, you
    can count the number of times each transition occurs and divide by the total number
    of transitions to estimate the probability.


    This is only a basic demonstration of an order-two Markov chain. In real applications,
    the states might be much more numerous and the transition matrix much larger,
    but the principles remain the same.


    # Other Markov Models


    A more advanced Markovian approach is the *Markov decision process (MDP)*, which
    extends the Markov chain by introducing actions and rewards. In the context of
    recommender systems, each action could represent a recommendation, and the reward'
  - '[PAGE 315]


    could be the user''s response to the recommendation. By incorporating user feedback,
    the MDP can learn more personalized recommendation strategies.


    MDPs are defined by a tuple $(S, A, P, R)$, where $S$ is the set of states, $A$
    is the set of actions, $P$ is the state transition probability matrix, and $R$
    is the reward function.


    Let''s use a simplified MDP for a movie recommender system as an example:


    *States (S)*

    These could represent the genres of movies a user has watched in the past. For
    simplicity, let''s say we have three states: Comedy ($C$), Drama ($D$), and Action
    ($A$).


    *Actions (A)*

    These could represent the movies that can be recommended. For this example, let''s
    say we have five actions (movies): Movies 1, 2, 3, 4, and 5.


    *Transition probabilities (P)*

    This represents the likelihood of transitioning from one state to another, given
    a specific action. For instance, if the user just watched a Drama ($D$) and we
    recommend Movie 3 (which is an Action movie), the transition probability $P(A|D,
    Movie3)$ might be 0.6, indicating a 60% chance the user will watch another Action
    movie.


    *Rewards (R)*

    This is the feedback from the user after taking an action (recommendation). Let''s
    assume for simplicity that a user''s click on a recommended movie gives a reward
    of +1 and no click is a reward of 0.


    The aim of the recommender system in this context is to learn a policy $\pi: S
    \rightarrow A$ that maximizes the expected cumulative reward. A policy dictates
    which action the agent (the recommender system) should take in each state.


    This policy can be learned via reinforcement learning algorithms, such as Q-learning
    or policy iteration, which essentially learn the value of taking an action in
    a state (i.e., recommending a movie after the user has watched a certain genre),
    considering the immediate reward and the potential future rewards.


    The main challenge in a real-world recommender system scenario is that both the
    state and action spaces are extremely large, and the transition dynamics and reward
    function can be complex and difficult to estimate accurately. But, the principles
    demonstrated in this simple example remain the same.


    Despite the promising performance of Markov chain-based recommender systems, several
    challenges remain. The *memorylessness* assumption of the Markov chain may not
    hold in certain scenarios where long-term dependencies exist. Furthermore, most
    Markov chain models treat user-item interactions as binary events (either interaction'
  - '[PAGE 316]


    or no interaction), which oversimplifies the variety of interactions users may
    have with items, such as browsing, clicking, and purchasing.


    Next, we''ll cover neural networks. We''ll see how some architectures you''re
    likely familiar with can be relevant to learning a sequential recommender task.


    # RNN and CNN Architectures


    *Recurrent neural networks* (RNNs) are a type of neural network architecture designed
    to recognize patterns in sequences of data, such as text, speech, or time series
    data. These networks are *recurrent* in that the outputs from one step in the
    sequence are fed back into the network as inputs while processing the next step.
    This gives RNNs a form of memory, which is helpful for tasks like language modeling,
    where each word depends on the previous words.


    At each time step, an RNN takes in an input (like a word in a sentence) and produces
    an output (like a prediction of the next word). It also updates its internal state,
    which is a representation of what it has “seen” last in the sequence. This internal
    state is passed back into the network when processing the next input. As a result,
    the network can use information from previous steps to influence its predictions
    for the current step. This is what allows RNNs to effectively process sequential
    data.


    **GRU4Rec** used recurrent neural networks to model session-based recommendations
    in one of the first applications of neural network architectures to the recommendation
    problem. A *session* refers to a single contiguous period of user interaction,
    like time spent on a page without the user navigating away or turning off their
    computer.


    Here we will see a dramatic advantage of sequential recommendation systems: most
    traditional recommendation methods rely on an explicit user ID to build a user-interest
    profile. However, session-based recommendations operate over anonymous user sessions
    that are often quite short to allow for a profile modeling. Moreover, a lot of
    variance can occur in user motivations in different sessions. A solution via user-agnostic
    recommendation that works for such recommendation situations is an item-based
    model in which an item-item similarity matrix is calculated based on items co-occurring
    within a single session. This precomputed similarity matrix is employed at runtime
    to recommend the most similar item to the one last clicked. This approach has
    obvious limitations such as relying only on the last clicked item. To this end,
    GRU4Rec uses all the items in the session and models the session as a sequence
    of items. The task of recommending items to be added translates to the prediction
    of the next item in the sequence.'
  - '[PAGE 317]


    Unlike the small fixed-size vocabulary of languages, recommendation systems are
    required to reason over a large number of items that grows over time as more items
    are added. To handle this concern, pairwise ranking losses (e.g., BPR) are considered.
    GRU4Rec is further extended in GRU4Rec+, which utilizes a new loss function specifically
    designed for gains in top-k recommendation. These loss functions blend deep learning
    and LTR to address neural recommendation settings.


    A different approach to neural networks for recommendations adopted CNNs for sequential
    recommendation. We won''t cover the basics of CNNs here, but you can consult "How
    Do Convolutional Neural Networks Work?" by Brandon Rohrer for the essentials.


    Let''s discuss one method that has shown a lot of success, CosRec, as visualized
    in Figure 17-1. This method (and others) starts with a structure similar to that
    of our MF used throughout most of the book: a user-item matrix. We assume that
    there are two latent factor matrices, $E_U$ and $E_I$, but let''s first focus
    on the item matrix.


    Each vector in the item matrix is an embedding vector for a single item, but we
    wish to encode sequences: take sequences of length $L$ and collect those embedding
    vectors. We now have an $L \times D$ matrix with a row per each item in the sequence.
    Take adjacent rows as pairs and concatenate them for each vector in a three-tensor;
    this effectively captures the sequence as a series of pairwise transitions. This
    three-tensor can be passed through a vectorized 2D CNN to yield a vector (of length
    $L$) that is concatenated with the original user vector and fed through a fully
    connected layer. Finally, binary cross-entropy is our loss function to attempt
    to predict the best recommendation.


    ![](img/da17d05291861831978609329c481581_317_0.png)'
- md: '## Attention Architectures


    A term that is commonly associated with neural networks and that may ring a bell
    for you by now is *attention*. This is because transformers, in particular the
    kind that appear in large language models (LLMs) like the generalized pretrained
    transformer, have become a central focus among AI users.


    We will give an extremely brief, and less technical, introduction to self-attention
    and the transformer here. For a more complete guide on transformers, consult the
    excellent overview in "Transformers from Scratch" by Brandon Rohrer.


    First, let''s state the key differentiating assumption about a transformer model:
    the embeddings are positional. We''re hoping to learn not only one embedding for
    every item but also an embedding for every item-position pair. Therefore, when
    an article is the first in a session and the last in a session, those two instances
    are treated as *two separate items*.


    Another important notion is stacking. When building transformers, we often think
    of the architecture as a layer cake, with sections stacked on top of one another.
    The key components are the embeddings, the self-attention layer, the skip-addition,
    and the feed-forward layer. The most complicated operations happen in self-attention,
    so let''s focus on that first. We just discussed the positional embeddings, which
    are sent as a sequence of these embedding vectors; recall that a transformer is
    a sequence-to-sequence model! The skip-addition means that we push the embedding
    forward *around* the self-attention layer (and the feed-forward layer above) and
    add it to the positional output of the attention layer. The feed-forward layer
    is an unexciting multilayer perceptron that stays in the positional columns and
    uses a ReLU or GeLU activation.


    ![](img/da17d05291861831978609329c481581_318_0.png)


    ## ReLU Versus GeLU


    ReLU (Rectified Linear Unit) is an activation function defined as $f(x) = \max(0,
    x)$. GeLU (Gaussian Error Linear Unit) is another activation function approximated
    as $f(x) = 0.5x\left(1 + \tanh\left(\sqrt{\frac{2}{\pi}}(x + 0.044715x^3)\right)\right)$,
    inspired by the Gaussian cumulative distribution function. The intuition behind
    GeLU is that it tends to allow small values of $x$ to pass through while smoothly
    saturating extreme values, potentially enabling better gradient flow for deep
    models. Both functions introduce nonlinearity in neural networks, with GeLU often
    demonstrating improved learning dynamics over ReLU in certain contexts.


    Here are some quick tips on self-attention:


    - The idea behind self-attention is that everything in the sequence affects everything
    else, in some manner.

    - The self-attention layer is learning four weight matrices per head.

    - The heads are in 1-1 correspondence with the sequence length.

    - We often call the weight matrices $Q, K, O, V$. Both $Q$ and $K$ get crossed
    with the positional embedding, but $O$ and $V$ are first crossed into an embedding-dimension-sized
    square matrix before dotting with the embedding. $Q\dot{E}$ and $K\dot{E}$ multiply
    to create the eponymous *attention* matrix, over which we take a row-wise softmax
    to get the attention vector.

    - Some normalizations exist, but we''ll disregard them as inessential for understanding.


    When we want to speak accurately but briefly about attention, we usually say,
    “It takes a sequence of positional embeddings and mushes them all together to
    learn how they’re related.”


    ## Self-Attentive Sequential Recommendation


    **SASRec** is the first transformer model we’ll consider. This autoregressive
    sequential model (similar to a causal language model) predicts the next user interaction
    from past user interactions. Inspired by the success of the transformer models
    in sequential mining tasks, the self-attention-based architecture is used for
    sequential recommendation.


    When we say that the SASRec model is trained in an autoregressive manner, we mean
    that the self-attention is allowed to attend to only the earlier positions in
    the sequence; looking into the future is not permitted. In terms of the mushing
    we referenced earlier, think of this as only mushing forward the influence. Some
    people call this “causal” because it respects the causal arrow of time. The model
    also allows for a learnable positional encoding, which means that the updates
    carry down to the embedding layer. This model uses two transformer blocks.


    ## BERT4Rec


    Inspired by the BERT model in NLP, **BERT4Rec** improves upon SASRec by training
    a bidirectional masked sequential (language) model.


    While BERT uses a masked language model for pretraining word embeddings, BERT4Rec
    uses this architecture to train end-to-end recommendation systems. It tries to
    predict the masked items in the user-interaction sequence. Similar to the original
    BERT model, the self-attention is bidirectional: it can look at both past and
    future interactions in the action sequence. To prevent leakage of future information
    and to emulate the realistic settings, only the last item in the sequence is masked
    during inference. Using item masking, BERT4Rec outperforms SASRec. However, a
    drawback of the BERT4Rec model is that it is quite compute intensive and requires
    much more training time.


    ## Recency Sampling


    Sequential recommendation and the adoption of transformer architecture in these
    tasks has seen a lot of interest recently. These deep neural network models like
    BERT4Rec and SASRec have shown improved performance over traditional approaches.
    However, these models suffer from slow training problems. A recently published
    paper—ha ha, get it—addresses the question of improving training efficiency while
    achieving state-of-the-art performance. See “Effective and Efficient Training
    for Sequential Recommendation Using Recency Sampling” by Aleksandr Petrov and
    Craig Macdonald for details.


    The two training paradigms we’ve just described for sequential models are autoregressive,
    which tries to predict the next item in the user-interaction sequence, and masked,
    which tries to predict masked items in the interaction sequence. The autoregressive
    approach doesn’t use the beginning of the sequence as labels in the training process,
    and thus valuable information is lost. The masked approach, on the other hand,
    is only weakly related to the end goal of the sequential recommendation.


    The paper by Petrov and Macdonald proposes a recency-based sampling of positive
    examples from the sequences to build the training data. The sampling is designed
    to give more recent interactions higher chances of being sampled. However, because
    of the probabilistic nature of the sampling mechanism, even the oldest of the
    interactions have nonzero chances of being chosen. An exponential function is
    employed as a sampling routine that interpolates between the masking-based sampling,
    where each interaction has equal probability of being sampled, and autoregressive
    sampling, where items from the end of the sequence are sampled. This showed superior
    performance in sequential recommendation tasks while requiring much less training
    time. Compare this approach to some of the other examples where we saw sampling
    provide significant improvements in training recommender systems!


    ## Merging Static and Sequential


    Pinterest recently released “Rethinking Personalized Ranking at Pinterest: An
    End-to-End Approach” by Jiajing Xu et al. describing its personalized recommendation
    system, which is built to leverage raw user actions. The recommendation task is
    decomposed into modeling users’ long-term and short-term intentions.


    The process of comprehending long-term user interests is accomplished by training
    an end-to-end embedding model, referred to as PinnerFormer, to learn from a user''s
    historical actions on the platform. These actions are subsequently transformed
    into user embeddings, which are designed for optimization based on anticipated
    long-term future user activities.


    This procedure employs an adapted transformer model to operate on users'' sequential
    actions with the intent to forecast their long-term future activities. Each user''s
    activity is compiled into a sequence, encompassing their actions over a specific
    time window, such as one year. The graph neural network-based (GNN-based) PinnerSage
    embeddings, in conjunction with relevant metadata (for example, the type of action,
    the timestamp, and so forth), are used to add features to each action in the sequence.


    Distinct from traditional sequential modeling tasks and sequential recommendation
    systems, PinnerFormer is designed to predict extended future user activities rather
    than the immediately subsequent action. This objective is achieved by training
    the model to foresee a user''s positive future interactions over a window of 14
    days following the embedding''s generation. In comparison, traditional sequential
    models would anticipate only the subsequent action.


    This alternate approach allows for the embedding generation to occur offline in
    a batch-processing mode, resulting in significant reductions in infrastructure
    needs. In contrast to most traditional sequential modeling systems, which operate
    in real time and incur substantial computational and infrastructure costs, these
    embeddings can be produced in batches (for instance, on a daily basis) rather
    than every time a user performs an action.


    A dense all-action loss is introduced in this methodology to facilitate batch
    training of the model. The objective here is not to predict the immediate next
    action but rather all the actions the user will undertake over the subsequent
    $k$ days. The aim is to predict all occurrences of a user''s positive interactions
    at intervals such as $T + 3$, $T + 8$, and $T + 12$, thereby compelling the system
    to learn long-term intentions. While traditionally the last action''s embedding
    is used to make the prediction, the dense all-action loss employs randomly selected
    positions in the action sequence, and the corresponding embedding is used to predict
    all actions for each of those positions.


    Based on offline and online experimental results, the use of dense all-action
    loss to train for long-term user actions has significantly bridged the gap between
    batch generation and real-time generation of user embeddings. Moreover, to accommodate
    users'' short-term interests, the transformer model retrieves the most recent
    actions for each user in real time, processing them along with the long-term user
    embeddings.'
  mdcn: '## 注意力架构


    一个与神经网络紧密相关、现在你可能已经耳熟能详的术语是*注意力*。这是因为Transformer，特别是像通用预训练Transformer这类出现在大型语言模型（LLM）中的模型，已经成为AI用户关注的焦点。


    我们将在此对自注意力和Transformer进行极其简短且技术性较低的介绍。如需更完整的Transformer指南，请参阅Brandon Rohrer所著的《从零开始的Transformer》中的精彩概述。


    首先，我们来阐述Transformer模型的关键区别性假设：嵌入是位置性的。我们不仅希望为每个项目学习一个嵌入，还希望为每个项目-位置对学习一个嵌入。因此，当一篇文章是会话中的第一篇和最后一篇时，这两个实例被视为*两个独立的项目*。


    另一个重要概念是堆叠。构建Transformer时，我们通常将架构想象成一个层蛋糕，各部分层层堆叠。关键组件包括嵌入、自注意力层、跳跃加法和前馈层。最复杂的操作发生在自注意力层，所以我们先聚焦于此。我们刚才讨论了位置嵌入，它们作为这些嵌入向量的序列被发送；回想一下，Transformer是一个序列到序列模型！跳跃加法意味着我们将嵌入*绕过*自注意力层（以及其上方的前馈层）向前传递，并将其加到注意力层的位置输出上。前馈层是一个平淡无奇的多层感知器，它保持在位置列中，并使用ReLU或GeLU激活函数。


    ![](img/da17d05291861831978609329c481581_318_0.png)


    ## ReLU 与 GeLU


    ReLU（修正线性单元）是一个定义为 $f(x) = \max(0, x)$ 的激活函数。GeLU（高斯误差线性单元）是另一个激活函数，近似为 $f(x)
    = 0.5x\left(1 + \tanh\left(\sqrt{\frac{2}{\pi}}(x + 0.044715x^3)\right)\right)$，其灵感来源于高斯累积分布函数。GeLU背后的直觉是，它倾向于让较小的
    $x$ 值通过，同时平滑地饱和极端值，这可能为深度模型提供更好的梯度流。这两种函数都在神经网络中引入了非线性，而GeLU在某些场景下通常表现出比ReLU更好的学习动态。


    以下是关于自注意力的一些快速提示：


    - 自注意力背后的思想是，序列中的所有事物都以某种方式影响着其他所有事物。

    - 自注意力层为每个头学习四个权重矩阵。

    - 头与序列长度是一一对应的。

    - 我们通常将权重矩阵称为 $Q, K, O, V$。$Q$ 和 $K$ 都与位置嵌入进行交叉运算，而 $O$ 和 $V$ 首先被交叉成一个嵌入维度大小的方阵，然后再与嵌入进行点积。$Q\dot{E}$
    和 $K\dot{E}$ 相乘生成同名的*注意力*矩阵，我们对其执行逐行softmax以获得注意力向量。

    - 存在一些归一化操作，但为了理解方便，我们将忽略它们，认为它们不重要。


    当我们想准确而简洁地谈论注意力时，我们通常会说：“它接收一个位置嵌入序列，并将它们全部混合在一起，以学习它们之间的关系。”


    ## 自注意力序列推荐


    **SASRec** 是我们将考虑的第一个Transformer模型。这个自回归序列模型（类似于因果语言模型）根据过去的用户交互预测下一个用户交互。受Transformer模型在序列挖掘任务中成功的启发，基于自注意力的架构被用于序列推荐。


    当我们说SASRec模型是以自回归方式训练时，我们的意思是自注意力只被允许关注序列中较早的位置；不允许展望未来。就我们之前提到的“混合”而言，可以将其视为只向前混合影响。有些人称之为“因果”，因为它尊重时间的因果箭头。该模型还允许可学习的位置编码，这意味着更新会传递到嵌入层。该模型使用了两个Transformer块。


    ## BERT4Rec


    受NLP中BERT模型的启发，**BERT4Rec** 通过训练一个双向掩码序列（语言）模型来改进SASRec。


    虽然BERT使用掩码语言模型来预训练词嵌入，但BERT4Rec使用这种架构来端到端地训练推荐系统。它试图预测用户交互序列中被掩码的项目。与原始BERT模型类似，自注意力是双向的：它可以查看动作序列中过去和未来的交互。为了防止未来信息泄露并模拟真实设置，在推理过程中只掩码序列中的最后一个项目。通过使用项目掩码，BERT4Rec的性能优于SASRec。然而，BERT4Rec模型的一个缺点是它计算密集，需要更多的训练时间。


    ## 近期性采样


    序列推荐以及Transformer架构在这些任务中的应用最近引起了广泛关注。像BERT4Rec和SASRec这样的深度神经网络模型已经显示出比传统方法更好的性能。然而，这些模型存在训练缓慢的问题。最近发表的一篇论文——哈哈，你懂的——解决了在实现最先进性能的同时提高训练效率的问题。详情请参阅Aleksandr
    Petrov和Craig Macdonald的《使用近期性采样进行序列推荐的有效高效训练》。


    我们刚才描述的两种序列模型训练范式是自回归式（试图预测用户交互序列中的下一个项目）和掩码式（试图预测交互序列中被掩码的项目）。自回归方法在训练过程中不使用序列的开头作为标签，因此丢失了有价值的信息。另一方面，掩码方法与序列推荐的最终目标仅存在弱相关性。


    Petrov和Macdonald的论文提出了一种基于近期性的正样本采样方法，从序列中构建训练数据。该采样旨在给予较新的交互更高的被采样概率。然而，由于采样机制的概率性质，即使是最古老的交互也有非零的被选中机会。采用指数函数作为采样程序，它在基于掩码的采样（每个交互被采样的概率相等）和自回归采样（从序列末尾采样项目）之间进行插值。这在序列推荐任务中表现出优越的性能，同时所需的训练时间大大减少。将这种方法与我们之前看到的其他一些采样显著改进推荐系统训练的例子进行比较！


    ## 融合静态与序列


    Pinterest最近发布了Jiajing Xu等人的《重新思考Pinterest的个性化排序：一种端到端方法》，描述了其个性化推荐系统，该系统旨在利用原始用户行为。推荐任务被分解为建模用户的长期和短期意图。


    理解用户长期兴趣的过程是通过训练一个端到端的嵌入模型（称为PinnerFormer）来完成的，该模型从用户在平台上的历史行为中学习。这些行为随后被转换为用户嵌入，旨在根据预期的长期未来用户活动进行优化。


    此过程采用一个改进的Transformer模型来处理用户的序列行为，意图是预测他们的长期未来活动。每个用户的活动被编译成一个序列，包含他们在特定时间窗口（例如一年）内的操作。基于图神经网络（GNN）的PinnerSage嵌入，结合相关元数据（例如，操作类型、时间戳等），用于为序列中的每个操作添加特征。


    与传统的序列建模任务和序列推荐系统不同，PinnerFormer旨在预测长期的未来用户活动，而不是紧随其后的动作。这一目标是通过训练模型来预测用户在嵌入生成后14天窗口内的积极未来交互来实现的。相比之下，传统的序列模型只会预测下一个动作。


    这种替代方法允许嵌入生成以批处理模式离线进行，从而显著降低了基础设施需求。与大多数实时运行并产生大量计算和基础设施成本的传统序列建模系统相比，这些嵌入可以批量生成（例如，每天一次），而不是在用户每次执行操作时都生成。


    该方法中引入了密集全动作损失，以促进模型的批量训练。这里的目标不是预测紧随其后的下一个动作，而是预测用户在接下来的 $k$ 天内将要执行的所有动作。目的是预测用户在
    $T + 3$、$T + 8$ 和 $T + 12$ 等时间间隔的所有积极交互事件，从而迫使系统学习长期意图。虽然传统上使用最后一个动作的嵌入来进行预测，但密集全动作损失使用动作序列中随机选择的位置，并使用相应的嵌入来预测每个位置的所有动作。


    基于离线和在线实验结果，使用密集全动作损失来训练长期用户行为，显著缩小了批量生成和实时生成用户嵌入之间的差距。此外，为了适应用户的短期兴趣，Transformer模型实时检索每个用户的最新操作，并将其与长期用户嵌入一起处理。'

    Figure 10-4. Regularization parameters


    We''d like to see our cross-validation laid out by fold and corresponding loss
    (Figure 10-5). This is a *parallel coordinates chart*; its lines correspond to
    different runs that are in correspondence with different choices of parameters,
    and its vertical axes are different metrics. The far-right heatmap axis corresponds
    to the overall total loss that we''re trying to minimize. In this case, we alternate
    test loss on a fold and total loss on that fold. Lower numbers are better, and
    we hope to see individual lines consistent across their loss per fold (otherwise,
    we may have a skewed dataset). We see that choices of hyperparameters can interact
    with fold behavior, but in all the low-loss scenarios (at the bottom), we see
    a high correlation between performance on different folds (the vertical axes in
    the plot).'

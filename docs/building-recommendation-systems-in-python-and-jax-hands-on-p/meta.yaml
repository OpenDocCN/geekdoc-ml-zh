    # Preface


    How did you come to find this book? Did you see an ad for it on a website? Maybe
    a friend or mentor suggested it; or perhaps you saw a post on social media that
    referenced it. Could it be that you found it sitting on a shelf in a bookstore—a
    bookstore that your trusty maps app led you to? However you came to find it, you’ve
    almost certainly come to this book via a recommendation system.


    Implementing and designing systems that provide suggestions to users is among
    the most popular and most essential applications of machine learning (ML) to any
    business. Whether you want to help your users find the best clothing to match
    their tastes, the most appealing items to buy from an online store, videos to
    enrich and entertain them, maximally engaging content to surface from their networks,
    or the news highlights they need to know on that day, recommendation systems provide
    the way.


    Modern recommendation system designs are as diverse as the domains they serve.
    These systems consist of the computer software architectures to implement and
    execute product goals, in addition to the algorithmic components of ranking. Methods
    for ranking recommendations can come from traditional statistical learning algorithms,
    linear-algebraic inspirations, geometric considerations, and, of course, gradient-based
    methods. Just as the algorithmic methods are diverse, so too are the modeling
    and evaluation considerations for recommending: personalized ranking, search recommendations,
    sequence modeling, and the scoring for all of these are now need-to-know for the
    ML engineer working with recommendation systems.


    ![](img/da17d05291861831978609329c481581_14_0.png)


    The abbreviation RecSys is often used by practitioners to describe the field of
    recommendation systems. Therefore, in this book, we use RecSys when referring
    to the field, and recommendation system when referring to what we build.'
- md: 'If you''re an ML practitioner, you are probably aware of recommendation systems,
    and you may know one or two of the simplest modeling approaches and be able to
    speak intelligently about the relevant data structures and model architectures;
    however, RecSys frequently falls outside the core curriculum of data science and
    ML. Many senior data scientists with years of experience in the industry know
    little about actually building a recommendation system and may feel intimidated
    when the topic comes up. Despite drawing on similar foundations and skills as
    other ML problems, RecSys has a vibrant community with a fast-moving focus that
    can make it easy to relegate building recommendation systems to *other* data scientists
    who have already invested the time, or are willing to stay on top of the latest
    information.


    The reason this book exists, is to break through those perceived barriers. Understanding
    recommendation systems at a practical level is not only useful for business cases
    requiring content to be served to users, but the underlying ideas of RecSys often
    bridge gaps between an incredibly diverse set of other types of ML. Take, for
    example, an article recommendation system that may utilize natural language processing
    (NLP) to find representations of the articles, sequential modeling to promote
    longer engagement, and contextual components to allow user queries to guide results.
    If you''re approaching the field from a purely academic interest, no matter what
    aspects of mathematics you''re interested in, sooner or later, there appears a
    link or application in RecSys!


    Finally, if connections to other fields, applications of nearly all of mathematics,
    or the obvious business utility *aren''t* enough to get you interested in RecSys,
    the stunning cutting-edge technology might: RecSys is at and beyond the forefront
    of ML at all times. One benefit of having obvious revenue impact is that companies
    and practitioners need to always be pushing the boundaries of what is possible
    and how they go about it. The most advanced deep learning architectures and best
    code infrastructures are brought to bear on this field. That''s hardly a surprise
    when you consider that at the heart of four of the five letters in FAANG—which
    stands for Meta (formerly Facebook), Apple, Amazon, Netflix, and Google—lies one
    or many recommendation systems.¹


    As a practitioner, you''ll need to understand how to do the following:


    - Take your data and business problem and frame it as a RecSys problem

    - Identify the essential data to get started building a RecSys

    - Determine the appropriate models for your RecSys problem and how should you
    evaluate them.

    - Implement, train, test, and deploy the aforementioned models

    - Track metrics to ensure that your system is working as planned

    - Incrementally improve your system as you learn more about your users, products,
    and business case


    This book illustrates the core concepts and examples necessary to complete these
    steps, whatever the industry or scale. We''ll guide you through the math, ideas,
    and implementation details for building recommendation systems—whether it''s your
    first or your fiftieth. We''ll show you how to build these systems with Python
    and JAX.


    If you''re not yet familiar, JAX is a Python framework from Google that seeks
    to make autodifferentiation and functional programming paradigms first-class objects.
    Additionally, it uses a NumPy API style especially convenient for ML practitioners
    from a variety of backgrounds.


    We will show code examples and architecture models that capture the essential
    concepts necessary and provide the way to scale these systems to production applications.


    ¹ Some may quibble that Apple also has core recommendation systems at the heart
    of its company. While it''s certainly true that the App Store forms a crucial
    strategic product for the company, we remain conservative in our four-out-of-five
    assessment and say that recommendation systems are not Apple''s primary revenue-generating
    capability.


    ## Conventions Used in This Book


    The following typographical conventions are used in this book:


    *Italic*

    Indicates new terms, URLs, email addresses, filenames, and file extensions.


    Constant width

    Used for program listings, as well as within paragraphs to refer to program elements
    such as variable or function names, databases, data types, environment variables,
    statements, and keywords.


    **Constant width bold**

    Shows commands or other text that should be typed literally by the user.


    *Constant width italic*

    Shows text that should be replaced with user-supplied values or by values determined
    by context.


    ![](img/da17d05291861831978609329c481581_16_0.png)


    This element signifies a tip or suggestion.


    ![](img/da17d05291861831978609329c481581_17_0.png)


    This element signifies a general note.


    ![](img/da17d05291861831978609329c481581_17_1.png)


    This element indicates a warning or caution.


    ## Using Code Examples


    The included code snippets reference notebooks that will run on moderate-size
    and, in most cases, free resources. To facilitate easy experimentation and exploration
    we provide the code via Google Colab notebooks.


    Supplemental material (code examples, exercises, etc.) is available for download
    at [ESRecsys on GitHub](https://github.com/ESRecsys).


    If you have a technical question or a problem using the code examples, please
    send email to [bookquestions@oreilly.com](mailto:bookquestions@oreilly.com).


    This book is here to help you get your job done. In general, if example code is
    offered with this book, you may use it in your programs and documentation. You
    do not need to contact us for permission unless you''re reproducing a significant
    portion of the code. For example, writing a program that uses several chunks of
    code from this book does not require permission. Selling or distributing examples
    from O''Reilly books does require permission. Answering a question by citing this
    book and quoting example code does not require permission. Incorporating a significant
    amount of example code from this book into your product''s documentation does
    require permission.


    We appreciate, but generally do not require, attribution. An attribution usually
    includes the title, author, publisher, and ISBN. For example: “*Building Recommendation
    Systems in Python and JAX* by Bryan Bischof and Hector Yee. Copyright 2024 Bryan
    Bischof and Resonant Intelligence LLC, 978-1-492-09799-0.”


    If you feel your use of code examples falls outside fair use or the permission
    given above, feel free to contact us at [permissions@oreilly.com](mailto:permissions@oreilly.com).


    ## O''Reilly Online Learning


    ![](img/da17d05291861831978609329c481581_18_0.png)


    For more than 40 years, *O''Reilly Media* has provided technology and business
    training, knowledge, and insight to help companies succeed.


    Our unique network of experts and innovators share their knowledge and expertise
    through books, articles, and our online learning platform. O''Reilly''s online
    learning platform gives you on-demand access to live training courses, in-depth
    learning paths, interactive coding environments, and a vast collection of text
    and video from O''Reilly and 200+ other publishers. For more information, visit
    http://oreilly.com.


    ## How to Contact Us


    Please address comments and questions concerning this book to the publisher:


    O''Reilly Media, Inc.

    1005 Gravenstein Highway North

    Sebastopol, CA 95472

    800-889-8969 (in the United States or Canada)

    707-829-7019 (international or local)

    707-829-0104 (fax)

    support@oreilly.com

    https://www.oreilly.com/about/contact.html


    We have a web page for this book, where we list errata, examples, and any additional
    information. You can access this page at https://oreil.ly/build_rec_sys_python_jax.


    For news and information about our books and courses, visit https://oreilly.com.


    Find us on LinkedIn: https://linkedin.com/company/oreilly-media


    Follow us on Twitter: https://twitter.com/oreillymedia


    Watch us on YouTube: https://youtube.com/oreillymedia


    ## Acknowledgments


    Hector would like to thank his husband, Donald, for his loving support during
    the writing of this book and for the snacks his sister Serena sends all the time.
    He would also like to dedicate this book to his relatives who have passed. A big
    thank you goes to the Google reviewers Ed Chi, Courtney Hohne, Sally Goldman,
    Richa Nigam, Mingliang Jiang, and Anselm Levskaya. Thanks to Bryan Hughes for
    reviewing the Wikipedia code.'
  mdcn: '如果你是一名机器学习从业者，你可能对推荐系统有所了解，或许知道一两种最简单的建模方法，并能就相关的数据结构和模型架构进行有见地的讨论；然而，推荐系统（RecSys）常常不在数据科学和机器学习的核心课程范围内。许多拥有多年行业经验的资深数据科学家对实际构建推荐系统知之甚少，当这个话题出现时可能会感到畏惧。尽管借鉴了与其他机器学习问题相似的基础和技能，但推荐系统拥有一个充满活力的社区，其关注点变化迅速，这很容易让人将构建推荐系统的工作推给*其他*已经投入时间或愿意掌握最新信息的数据科学家。


    本书存在的意义，就是要打破这些认知壁垒。从实践层面理解推荐系统，不仅对于需要向用户提供内容的业务场景非常有用，而且推荐系统的底层思想常常能弥合其他各类机器学习之间巨大的鸿沟。以文章推荐系统为例，它可能利用自然语言处理（NLP）来寻找文章的表示，利用序列建模来促进更长的用户参与度，并利用上下文组件来让用户查询引导结果。如果你是从纯粹的学术兴趣出发来接触这个领域，无论你对数学的哪个方面感兴趣，迟早都会在推荐系统中发现其联系或应用！


    最后，如果与其他领域的联系、几乎所有数学的应用，或者明显的商业效用*还不足以*让你对推荐系统产生兴趣，那么令人惊叹的尖端技术可能会：推荐系统始终处于机器学习的前沿甚至超越前沿。拥有明显收入影响的一个好处是，公司和从业者需要不断突破可能性的边界以及实现方式。最先进的深度学习架构和最佳的代码基础设施都被应用到这个领域。考虑到FAANG（代表Meta（前身为Facebook）、苹果、亚马逊、Netflix和谷歌）这五个字母中的四个核心都依赖于一个或多个推荐系统，这也就不足为奇了。¹


    作为一名从业者，你需要理解如何完成以下工作：


    -   将你的数据和业务问题构建为一个推荐系统问题

    -   确定构建推荐系统所需的基本数据

    -   为你的推荐系统问题确定合适的模型，以及如何评估它们

    -   实现、训练、测试和部署上述模型

    -   跟踪指标以确保你的系统按计划运行

    -   随着你对用户、产品和业务案例的了解加深，逐步改进你的系统


    本书将阐述完成这些步骤所需的核心概念和示例，无论行业或规模如何。我们将引导你了解构建推荐系统的数学、思想和实现细节——无论这是你的第一次还是第五十次。我们将向你展示如何使用Python和JAX来构建这些系统。


    如果你还不熟悉，JAX是Google的一个Python框架，旨在使自动微分和函数式编程范式成为一等对象。此外，它使用了一种对来自不同背景的机器学习从业者特别方便的NumPy
    API风格。


    我们将展示代码示例和架构模型，这些模型涵盖了必要的核心概念，并提供了将这些系统扩展到生产应用的方法。


    ¹ 有些人可能会挑剔说，苹果公司的核心也拥有推荐系统。虽然App Store对公司来说确实是一个至关重要的战略产品，但我们在“五分之四”的评估中仍然保持保守，认为推荐系统并非苹果公司的主要创收能力。


    ## 本书使用的约定


    本书使用以下排版约定：


    *斜体*

    表示新术语、URL、电子邮件地址、文件名和文件扩展名。


    等宽字体

    用于程序清单，以及在段落中引用程序元素，如变量或函数名、数据库、数据类型、环境变量、语句和关键字。


    **等宽粗体**

    显示用户应按原样输入的命令或其他文本。


    *等宽斜体*

    显示应替换为用户提供的值或由上下文确定的值的文本。


    ![](img/da17d05291861831978609329c481581_16_0.png)


    此元素表示提示或建议。


    ![](img/da1da17d05291861831978609329c481581_17_0.png)


    此元素表示一般性说明。


    ![](img/da17d05291861831978609329c481581_17_1.png)


    此元素表示警告或注意事项。


    ## 使用代码示例


    包含的代码片段引用了可在中等规模且大多数情况下免费的资源上运行的笔记本。为了便于轻松实验和探索，我们通过Google Colab笔记本提供代码。


    补充材料（代码示例、练习等）可在[GitHub上的ESRecsys](https://github.com/ESRecsys)下载。


    如果你对代码示例有技术问题或遇到问题，请发送电子邮件至[bookquestions@oreilly.com](mailto:bookquestions@oreilly.com)。


    本书旨在帮助你完成工作。通常，如果本书提供了示例代码，你可以在你的程序和文档中使用它。除非你复制了代码的大部分，否则你不需要联系我们获取许可。例如，编写一个使用本书中几个代码块的程序不需要许可。销售或分发O''Reilly书籍中的示例则需要许可。通过引用本书和引用示例代码来回答问题不需要许可。将本书中大量的示例代码纳入你的产品文档则需要许可。


    我们感谢但通常不要求署名。署名通常包括书名、作者、出版商和ISBN。例如：“*Building Recommendation Systems in Python
    and JAX* by Bryan Bischof and Hector Yee. Copyright 2024 Bryan Bischof and Resonant
    Intelligence LLC, 978-1-492-09799-0.”


    如果你觉得你对代码示例的使用超出了合理使用或上述许可的范围，请随时通过[permissions@oreilly.com](mailto:permissions@oreilly.com)联系我们。


    ## O''Reilly在线学习


    ![](img/da17d05291861831978609329c481581_18_0.png)


    40多年来，*O''Reilly Media*一直提供技术和业务培训、知识和见解，以帮助公司取得成功。


    我们独特的专家和创新者网络通过书籍、文章和我们的在线学习平台分享他们的知识和专业知识。O''Reilly的在线学习平台为你提供按需访问的直播培训课程、深入的学习路径、交互式编码环境，以及来自O''Reilly和200多家其他出版商的大量文本和视频。欲了解更多信息，请访问http://oreilly.com。



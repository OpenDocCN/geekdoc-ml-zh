    # CHAPTER 3

    Mathematical Considerations


    Most of this book is focused on implementation and on practical considerations
    necessary to get recommendation systems working. In this chapter, you''ll find
    the most abstract and theoretical concepts of the book. The purpose of this chapter
    is to cover a few of the essential ideas that undergird the field. It''s important
    to understand these ideas as they lead to pathological behavior in recommendation
    systems and motivate many architectural decisions.


    We''ll start by discussing the shape of data you often see in recommendation systems,
    and why that shape can require careful thought. Next we''ll talk about the underlying
    mathematical idea, similarity, that drives most modern recommendation systems.
    We''ll briefly cover a different way of thinking about what a recommender does,
    for those with a more statistical inclination. Finally, we''ll use analogies to
    NLP to formulate the popular approach.


    # Zipf''s Laws in RecSys and the Matthew Effect


    In a great many applications of ML, a caveat is given early: the distribution
    of observations of unique items from a large corpus is modeled by Zipf''s law—the
    frequency of occurrence drops exponentially. In recommendation systems, the Matthew
    effect appears in the popular item''s click rates or the popular user''s feedback
    rates. For example, popular items have dramatically larger click counts than average,
    and more-engaged users give far more ratings than average.


    ![](img/da17d05291861831978609329c481581_48_0.png)


    **The Matthew Effect**


    The Matthew effect—or *popularity bias*—states that the most popular items continue
    to attract the most attention and widen the gap with other items.'
- md: 'Take, for example, the MovieLens dataset, an extremely popular dataset for
    benchmarking recommendation systems. Jenny Sheng observes the behavior shown in
    Figure 3-1 for a number of movie ratings:


    ![](img/da17d05291861831978609329c481581_49_0.png)


    Figure 3-1. Zipfian distribution of movie-rank ratings


    At first glance, the rapid decline in ratings is obvious and stark, but is it
    a problem? Let’s assume our recommender will be built as a user-based collaborative
    filtering (CF) model—as alluded to in Chapter 2. Then how might these distributions
    affect the recommender?


    We will consider the distributional ramifications of this phenomenon. Let the
    probability mass function be described by the simple Zipf’s law:


    $$f(k, M) = \frac{1/k}{\sum_{n=1}^{M} (1/n)}$$


    For $M$ number of tokens in the corpus (in our example, the number of movies),
    $k$ is the rank of a token when sorted by number of occurrences.


    Let’s consider users $A$ and $B$, with $N_A = |\mathcal{I}_A|$ and $N_B = |\mathcal{I}_B|$
    ratings, respectively. Observe that the probability of $V_i$, the $i$th most popular
    video, appearing in $\mathcal{I}_X$ for a user $X$ is given by the following:


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^{M} f(j, M)} = \frac{1/i}{\sum_{j=1}^{M} 1/j}$$


    Thus the joint probability of an item appearing in two user''s ratings is shown
    here:


    $$P(i^2) = \left( \frac{1/i}{\sum_{j=1}^M 1/j} \right)^2$$


    In words, the probability of two users sharing an item in their rating sets drops
    off with the square of its popularity rank.


    This becomes important when we also consider that our, yet unstated, definition
    of user-based CF is based on similarity in users'' ratings sets. This similarity
    is *the number of jointly rated items by two users, divided by the total number
    of items rated by either*.


    Taking this definition, we can, for example, compute the similarity score for
    one shared item among $A$ and $B$:


    $$\sum_{i=1}^M \frac{P(i^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|}$$


    The average similarity score of two users is then generalized as follows via repeated
    application of the preceding equation:


    $$\min(N_A, N_B) \sum_{t=1} \left( \prod_{i_k = i_{k-1}+1}^{t-1} \sum_{i=1}^M
    \left( \frac{P(i_k^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|} \right) \right)$$


    via repeated application of the preceding observation.


    These combinatorial formulas not only indicate the relevance of the Zipfian in
    our algorithms, but we also see an almost direct effect on the output of scores.
    Consider the experiment in “Quantitative Analysis of Matthew Effect and Sparsity
    Problem of Recommender Systems” by Hao Wang et al. on the Last.fm dataset. Last.fm
    is a music-listening tracker enabling users to keep track of all the songs they
    listen to; for Last.fm users, the authors demonstrate average similarity scores
    for pairs of users, and they find that this Matthew effect persists into the similarity
    matrix (Figure 3-2).


    ![](img/da17d05291861831978609329c481581_51_0.png)


    Figure 3-2. Matthew effect as seen on the Last.fm dataset


    Observe the radical difference between “hot” cells and all the others. The bright
    cells are few among the mostly dark, suggesting a difficult combination of some
    extremely popular items among the far more common frequency close to zero. While
    these results might seem scary, later we’ll consider diversity-aware loss functions
    that can mitigate the Matthew effect. A simpler way is to use downstream sampling
    methods, which we will discuss as part of our explore-exploit algorithms. Finally,
    the Matthew effect is only the first of two major impacts of this Zipfian; let’s
    turn our attention to the second.


    ## Sparsity


    We must now reckon with sparsity. As the ratings skew more and more toward the
    most popular items, the least popular items are starved for data and recommendations,
    which is called *data sparsity*. This connects to the linear-algebraic definition:
    mostly zeros or not populated elements in a vector. When you consider again our
    user-item matrix, less popular items constitute columns with few entries; these
    are sparse vectors. Similarly, at scale we see that the Matthew effect pushes
    more and more of the total ratings into certain columns, and the matrix becomes
    sparse in the traditional mathematical sense. For this reason, sparsity is an
    extremely well-known challenge for recommendation systems.


    As before, let''s consider the implication on our CF algorithms from these sparse
    ratings. Again observe that the probability of $V_i$, the $i$th most popular item,
    appearing in $\mathcal{I}_X$ for a user $X$ is given by the following:


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^M f(j, M)} = \frac{1/i}{\sum_{j=1}^M 1/j}$$


    Then


    $$(M - 1) * P(i)$$


    is the expected number of other users who click the $i$th most popular item, so
    summing over all, $i$ yields the total number of other users who will share a
    rating with $X$:


    $$\sum_{i=1}^M (M - 1) * P(i)$$


    Again, as we pull back to the overall trends, we observe this sparsity sneaking
    into the actual computations for our CF algorithms, consider the trend of users
    of different ranks, and see how much their rankings are used to *collaborate*
    in other users'' rankings (Figure 3-3).


    ![](img/da17d05291861831978609329c481581_52_0.png)


    We see that this is an important result to always be aware of: sparsity pushes
    emphasis onto the most popular users and has the risk of making your recommender
    myopic.


    ![](img/da17d05291861831978609329c481581_53_0.png)


    ## Item-Based Collaborative Filtering


    While the equations are different, in this section, they apply similarly to item-based
    CF. Similarity in items exhibits the same inheritance of the Zipfian in their
    scores, and items consulted in the CF process drop off by rank.


    ## User Similarity for Collaborative Filtering


    In mathematics, it’s common to hear discussion of *distances*. Even back to the
    Pythagorean theorem, we are taught to think of relationships between points as
    distances or dissimilarity. Indeed, this fundamental idea is canonized in mathematics
    as part of the definition of a metric:


    $$d(a, c) \leq d(a, b) + d(b, c)$$


    In ML, we often instead concern ourselves with the notion of similarity—an extremely
    related topic. In many cases, we can compute similarity or dissimilarity, as they
    are complements of each other; when $d: X \times X \rightarrow [0, 1] \subset
    \mathbb{R}$ is a *dissimilarity function*, then we often define the following:


    $$Sim(a, b) := 1 - d(a, b)$$


    This may seem like a needlessly precise statement, but in fact you’ll see that
    a variety of options are available for framing similarity. Furthermore, sometimes
    we even formulate similarity measures where the associated distance measure does
    not establish a metric on the set of objects. These so-called pseudospaces can
    still be incredibly important, and we’ll show where they come up in Chapter 10.


    In the literature, you’ll find that papers commonly start by introducing a new
    similarity measure and then training a model you’ve seen before on that new measure.
    As you’ll see, the way you choose to relate objects (users, items, features, etc.)
    can have a large effect on what your algorithms learn.


    For now, let’s laser in on some specific similarity measures. Consider a classic
    ML problem of clustering: we have a space (usually $\mathbb{R}^n$) in which our
    data is represented and are asked to partition our data into subcollections of
    the population and assign these collections names. Frequently, these collections
    are intended to capture a certain meaning, or at the very least be useful for
    summarizing the collection elements’ features.


    When you do that clustering, you frequently are considering points near to one
    another in that space. Further, if you''re given a new observation and asked to
    assign it to a collection as an inference task, you normally compute the new observation''s
    *nearest neighbors*. This could be the *k*-nearest neighbors or simply the nearest
    neighbor among cluster centers; either way, your task is to use the notion of
    similarity to associate—and thus classify. In CF, this same notion is used to
    relate a user for whom you wish to make recommendations to those you already have
    data from.


    ![](img/da17d05291861831978609329c481581_54_0.png)


    ### Nearest Neighbors


    *Nearest neighbors* is a catchall term that arises from the simple geometric idea
    that, given some space (points defined by feature vectors) and a point in that
    space, you can find the other points closest to it. This has applications in all
    of ML, including classification, ranking/recommendation, and clustering. "Approximate
    Nearest Neighbors" on page 87 provides more details.


    So how can we define similarity for our users in CF? They''re not obviously in
    the same space, so our usual tools seem to be lacking.


    ### Pearson Correlation


    Our original CF formulation indicated that users with similar tastes collaborate
    to recommend items for one another. Let two users *A* and *B* have a set of co-rated
    items—simply the set of items with ratings from each—written as $\mathcal{R}_{A,B}$,
    and a rating of item *x* by user *A* written as $r_{A,x}$. Then the following
    is the sum of deviation from *A*''s average rating over all of its co-rated items
    with *B*:


    $$\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)$$


    If we think of these ratings as a random variable and consider the analog for
    *B*, the correlation between the jointly distributed variables (the population
    covariance) is our *Pearson correlation*:


    $$\text{USim}_{A,B} = \frac{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)(r_{B,x}
    - \bar{r}_B)}{\sqrt{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)^2} \sqrt{\sum_{x
    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$'
  mdcn: '以MovieLens数据集为例，这是一个用于基准测试推荐系统的极受欢迎的数据集。Jenny Sheng观察了图3-1所示的若干电影评分行为：


    ![](img/da17d05291861831978609329c481581_49_0.png)


    图3-1. 电影评分排名的Zipf分布


    乍一看，评分的快速下降是明显而显著的，但这是否是个问题？假设我们的推荐器将基于用户协同过滤（CF）模型构建——正如第2章所提及的。那么这些分布会如何影响推荐器呢？


    我们将考虑这种现象的分布影响。令概率质量函数由简单的Zipf定律描述：


    $$f(k, M) = \frac{1/k}{\sum_{n=1}^{M} (1/n)}$$


    对于语料库中的$M$个标记（在我们的例子中，是电影的数量），$k$是按出现次数排序时某个标记的排名。


    考虑用户$A$和$B$，分别有$N_A = |\mathcal{I}_A|$和$N_B = |\mathcal{I}_B|$个评分。观察第$i$个最受欢迎的视频$V_i$出现在用户$X$的评分集$\mathcal{I}_X$中的概率由以下公式给出：


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^{M} f(j, M)} = \frac{1/i}{\sum_{j=1}^{M} 1/j}$$


    因此，一个物品同时出现在两个用户评分中的联合概率如下所示：


    $$P(i^2) = \left( \frac{1/i}{\sum_{j=1}^M 1/j} \right)^2$$


    换句话说，两个用户共享一个物品在其评分集中的概率随着其流行度排名的平方而下降。


    当我们考虑到我们尚未明确的基于用户的CF定义是基于用户评分集的相似性时，这一点变得尤为重要。这种相似性是*两个用户共同评分的物品数量，除以任一用户评分的物品总数*。


    根据这个定义，例如，我们可以计算$A$和$B$之间共享一个物品的相似度分数：


    $$\sum_{i=1}^M \frac{P(i^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|}$$


    两个用户的平均相似度分数随后通过重复应用前述公式推广如下：


    $$\min(N_A, N_B) \sum_{t=1} \left( \prod_{i_k = i_{k-1}+1}^{t-1} \sum_{i=1}^M
    \left( \frac{P(i_k^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|} \right) \right)$$


    通过重复应用前述观察。


    这些组合公式不仅表明了Zipf分布在我们算法中的相关性，而且我们还看到它对分数输出的几乎直接影响。考虑Hao Wang等人在Last.fm数据集上进行的“推荐系统马太效应与稀疏性问题的定量分析”实验。Last.fm是一个音乐收听追踪器，允许用户跟踪他们收听的所有歌曲；对于Last.fm用户，作者展示了用户对的平均相似度分数，并发现这种马太效应持续存在于相似度矩阵中（图3-2）。


    ![](img/da17d05291861831978609329c481581_51_0.png)


    图3-2. 在Last.fm数据集上观察到的马太效应


    观察“热门”单元格与其他所有单元格之间的巨大差异。明亮的单元格在大多数黑暗中是少数，表明一些极其流行的物品与更常见的接近零的频率之间存在困难的组合。虽然这些结果可能看起来很可怕，但稍后我们将考虑能够缓解马太效应的多样性感知损失函数。一种更简单的方法是使用下游采样方法，我们将在探索-利用算法部分进行讨论。最后，马太效应只是这种Zipf分布的两个主要影响中的第一个；让我们将注意力转向第二个。


    ## 稀疏性


    我们现在必须面对稀疏性。随着评分越来越偏向最受欢迎的物品，最不受欢迎的物品因数据和推荐而匮乏，这被称为*数据稀疏性*。这与线性代数定义相关：向量中大部分为零或未填充的元素。当你再次考虑我们的用户-物品矩阵时，较不受欢迎的物品构成了条目很少的列；这些是稀疏向量。同样，在大规模情况下，我们看到马太效应将越来越多的总评分推入某些列，矩阵在传统数学意义上变得稀疏。因此，稀疏性是推荐系统一个极其知名的挑战。


    像以前一样，让我们考虑这些稀疏评分对我们CF算法的影响。再次观察第$i$个最受欢迎的物品$V_i$出现在用户$X$的评分集$\mathcal{I}_X$中的概率由以下公式给出：


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^M f(j, M)} = \frac{1/i}{\sum_{j=1}^M 1/j}$$


    那么


    $$(M - 1) * P(i)$$


    是点击第$i$个最受欢迎物品的其他用户的预期数量，因此对所有$i$求和，得到将与$X$共享评分的其他用户总数：


    $$\sum_{i=1}^M (M - 1) * P(i)$$


    同样，当我们退后一步观察整体趋势时，我们观察到这种稀疏性悄悄渗入我们CF算法的实际计算中，考虑不同排名用户的趋势，并查看他们的排名在多大程度上被用于与其他用户的排名进行*协作*（图3-3）。


    ![](img/da17d05291861831978609329c481581_52_0.png)


    我们看到这是一个需要始终意识到的重要结果：稀疏性将重点推到最受欢迎的用户身上，并有使你的推荐器变得短视的风险。


    ![](img/da17d05291861831978609329c481581_53_0.png)


    ## 基于物品的协同过滤


    虽然公式不同，但在本节中，它们同样适用于基于物品的CF。物品之间的相似性表现出相同的Zipf分布在分数中的继承性，并且在CF过程中被考虑的物品按排名递减。


    ## 协同过滤的用户相似性


    在数学中，经常听到关于*距离*的讨论。甚至可以追溯到勾股定理，我们被教导将点之间的关系视为距离或不相似性。确实，这个基本思想在数学中被规范化为度量定义的一部分：


    $$d(a, c) \leq d(a, b) + d(b, c)$$


    在机器学习中，我们通常更关注相似性的概念——这是一个极其相关的话题。在许多情况下，我们可以计算相似性或不相似性，因为它们是彼此的补数；当$d: X \times
    X \rightarrow [0, 1] \subset \mathbb{R}$是一个*不相似性函数*时，我们通常定义如下：


    $$Sim(a, b) := 1 - d(a, b)$$


    这看起来可能是一个不必要的精确陈述，但事实上你会看到有多种选择可用于构建相似性。此外，有时我们甚至制定相似性度量，其中相关的距离度量并未在对象集合上建立度量。这些所谓的伪空间仍然可能极其重要，我们将在第10章展示它们出现的地方。


    在文献中，你会发现论文通常首先介绍一个新的相似性度量，然后在该新度量上训练你以前见过的模型。正如你将看到的，你选择关联对象（用户、物品、特征等）的方式会对你的算法学习到的内容产生很大影响。


    现在，让我们专注于一些特定的相似性度量。考虑一个经典的机器学习聚类问题：我们有一个空间（通常是$\mathbb{R}^n$），我们的数据在其中被表示，并被要求将数据划分为总体的子集合并为这些集合命名。通常，这些集合旨在捕捉某种意义，或者至少对总结集合元素的特征有用。


    当你进行聚类时，你经常考虑该空间中彼此接近的点。此外，如果你被给予一个新的观察结果并被要求将其分配给一个集合作为推理任务，你通常会计算新观察结果的*最近邻*。这可能是*k*最近邻，或者仅仅是聚类中心之间的最近邻；无论哪种方式，你的任务都是使用相似性的概念来关联——从而进行分类。在CF中，同样的概念用于将你希望为其提供建议的用户与你已有数据的用户关联起来。


    ![](img/da17d05291861831978609329c481581_54_0.png)


    ### 最近邻


    *最近邻*是一个通用术语，源于一个简单的几何思想：给定某个空间（由特征向量定义的点）和该空间中的一个点，你可以找到离它最近的其他点。这在机器学习的所有领域都有应用，包括分类、排序/推荐和聚类。第87页的“近似最近邻”提供了更多细节。


    那么，我们如何在CF中为用户定义相似性呢？他们显然不在同一个空间中，因此我们通常的工具似乎有所欠缺。


    ### 皮尔逊相关系数


    我们最初的CF公式表明，具有相似品味的用户相互协作，为彼此推荐物品。让两个用户*A*和*B*有一组共同评分的物品——简单来说就是每个用户都有评分的物品集合——记为$\mathcal{R}_{A,B}$，用户*A*对物品*x*的评分记为$r_{A,x}$。那么以下是用户*A*在其与*B*的所有共同评分物品上相对于其平均评分的偏差之和：


    $$\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)$$


    如果我们把这些评分看作一个随机变量，并考虑*B*的类似情况，那么联合分布变量之间的相关性（总体协方差）就是我们的*皮尔逊相关系数*：


    $$\text{USim}_{A,B} = \frac{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)(r_{B,x}
    - \bar{r}_B)}{\sqrt{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)^2} \sqrt{\sum_{x
    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$'

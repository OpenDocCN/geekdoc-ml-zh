  - '[PAGE 180]


    The associated *user-item incidence matrix*, $\mathscr{U}$, is the binary matrix
    with rows indexed by sets, and columns indexed by nodes, such that elements are
    as follows:


    $$e_{y_u, x_i} = \begin{cases} 1 & x_i \in y_u \ 0 & \text{otherwise} \end{cases}$$


    The *co-occurrence* of $x_a$ and $x_b$ is the order of the set $\{y_u \mid x_a
    \in y_u \text{ and } x_b \in y_u\}$. We can also write that as a matrix that can
    be computed via a simple formula; let $C_{\mathscr{I}}$ be the co-occurrences
    matrix—i.e., the matrix with rows and columns indexed by $\{x_i\}_{i \in I}$ and
    with elements that are the co-occurrences of the indices. Then we use the following:


    $$C_{\mathscr{I}} = \mathscr{I}^T * \mathscr{I}$$


    > ## Higher-Order Co-occurrences


    You could imagine further generalizing this recommender to aggregate across several
    items the user has seen. In practice, you could consider the last five items the
    user has interacted with and then compute the conditional-MPIR recommendations
    for each and union them together.


    Alternatively, you could generalize to *higher-order* co-occurrences. In other
    words, instead of pairs of items that co-occur, look at triples, quadruples, or
    more. To read one approach to this generalization, check out “Higher Order Co-occurrence
    Tensors for Hypergraphs via Face-Splitting” by one of the authors.


    As mentioned in “Customers Also Bought” on page 141, we can build a new variant
    of our MPIR by considering the rows or columns of the co-occurence matrix. The
    *conditional MPIR* is the recommender that returns the max of the elements in
    the row corresponding to $x_j$, given the user’s last interaction was the item
    $x_i$.


    In practice, we often think of the row corresponding to $x_i$ as a *basis vector*,
    i.e., a vector $q_{x_i}$ with one nonzero element in the $x_i$th position:


    $$q_{x_i, j} = \begin{cases} 1 & j = x_i \ 0 & \text{otherwise} \end{cases} =
    \begin{bmatrix} 0 \ \vdots \ 1 \ \vdots \ 0 \end{bmatrix}$$'
  - "[PAGE 181]\n\nThen we can consider max—or even softmax—of the preceding dot products:\n\
    \n$C_{\\mathcal{I}} = \\mathcal{I}^T \\cdot \\mathcal{I} * q_{x_i}$\n\nThis yields\
    \ the vector of co-occurrence counts between $x_i$ and each other item. Here we\
    \ frequently will call $q_{x_i}$ a *query* to indicate that it's the input to\
    \ our co-occurrence recommendation model.\n\n![](img/da17d05291861831978609329c481581_181_0.png)\n\
    \n# How Do You Store This Data?\n\nWe can think about co-occurrence data in a\
    \ *lot* of ways. The main reason is because we expect that co-occurrences for\
    \ recommendation systems are incredibly sparse. This means that the preceding\
    \ method of matrix multiplication—which is approximately $O(n^3)$—is going to\
    \ be relatively slow to compute fewer nonzero entries. Because of this and concerns\
    \ about storing huge matrices full of zeros, computer scientists have taken seriously\
    \ the problem of representing sparse matrices.\n\n**Max Grossman** claims there\
    \ are 101 ways, but in practice there are only a few. JAX supports **BCOO**, or\
    \ *batched coordinate format*, which is essentially a list of coordinates for\
    \ nonzero elements, and then what those elements are.\n\nIn our binary case of\
    \ interactions, those are 1s, and for the co-occurrence matrix, those are the\
    \ counts. The structure of these matrices can be written as follows:\n\n```\n\n\
    {\n    'indices': indices,\n    'values': values,\n    'shape': [user_dim, items_dim]\n\
    }\n```\n\n# Pointwise Mutual Information via Co-occurrences\n\nAn early recommendation\
    \ system for articles used *pointwise mutual information*, or PMI, which is closely\
    \ related to co-occurrences. In the context of NLP, PMI attempts to express how\
    \ much more frequent co-occurrence is than random chance. Given what we've seen\
    \ before, you can think of this as a normalized co-occurrences model. Computational\
    \ linguists frequently use PMI as an estimator for word similarity or word meaning\
    \ following from the distributional hypothesis:\n\n> > You shall know a word by\
    \ the company it keeps.\n> —John R. Firth, British linguist"
  - '[PAGE 182]


    In the context of recommendation ranking, items with very high PMI are said to
    have a highly meaningful co-occurrence. This can thus be used as an estimator
    for *complementary* items: given you''ve interacted with one of them, you should
    interact with the other.


    PMI is computed for two items, $x_i, x_j$, via the following:


    $$\frac{p(x_i, x_j)}{p(x_i) * p(x_j)} = \frac{(C_{ij})_{x_i, x_j} * \#(\text{total
    interactions})}{\#(x_i) * \#(x_j)}$$


    The PMI calculation allows us to modify all our work on co-occurrence to a more
    normalized computation, and thus is a bit more meaningful. This process is related
    to the GloVE model we learned in "GloVE Model Definition" on page 142. The negative
    PMI values allow us to understand when two things are not often witnessed together.


    These PMI calculations can be used to recommend *another item in a cart* when
    an item has been added and you find those with very high PMI. It can be used as
    a retrieval method by looking at the set of items a user has already interacted
    with and finding items that have high PMI with several of them.


    Let''s look at how to turn co-occurrences into other similarity measures.


    ![](img/da17d05291861831978609329c481581_182_0.png)


    # Is PMI a Distance Measurement?


    A good question to consider at this point is "Is PMI between two objects a measurement
    of distance? Can I define similarity directly as the PMI between two items, and
    thus yield a convenient geometry in which to consider distances?" The answer is
    no. Recall that one of the axioms of a distance function is the triangle inequality;
    a useful exercise is to consider why the triangle inequality would not be true
    for PMI.


    But all is not lost. In the next section, we''ll show you how to formulate some
    important similarity measurements from co-occurrence structures. Further, in the
    next chapter, we''ll discuss Wasserstein distance, which allows you to turn the
    co-occurrence counts into a distance metric directly. The key difference will
    be considering the co-occurrence counts of all other items simultaneously as a
    distribution.


    # Similarity from Co-occurrence


    Earlier, we discussed similarity measures and how they come from the Pearson correlation.
    The Pearson correlation is a special case of similarity when we have explicit
    ratings, so let''s instead look at when we don''t.'

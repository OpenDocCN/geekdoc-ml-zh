    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$


    Here we remember that the similarity between two users is dependent on the shared
    ratings and on each user’s average rating.


    On a given day, let’s say $\widetilde{X} = \{\widetilde{x} \mid x \text{ was rated
    since yesterday by a user }\}$. Then we’d need to update our user similarities,
    but ideally we’d leave everything else the same. To update the user’s data, we
    see that all $\widetilde{x}$ rated by two users, $A$ and $B$, $\bar{r}_A$ and
    $\bar{r}_B$, would need to change, but we could probably skip these updates in
    many cases where'
- md: 'the number of ratings by those users was large. All in all, this means for
    each $\tilde{x}$, we should look up which users previously rated $x$ and update
    the user similarity between them and the new rater.


    This is a bit ad hoc, but for many methods you can utilize these tricks to reduce
    a full retraining. This would avoid a full batch retraining, via a fast layer.
    Other approaches exist, like building a separate model that can approximate recommendations
    for low-signal items. This can be done via feature models and can significantly
    reduce the complexity of these quick retrainings.


    ## Lambda Architecture and Orchestration


    On the more extreme end of the spectrum of these strategies is the lambda architecture;
    as discussed in Chapter 6, the lambda architecture seeks to have a much more frequent
    pipeline for adding new data into the system. The *speed* layer is responsible
    for working on small batches to perform the data transformations, and on model
    fitting to combine with the core model. As a reminder, many other aspects of the
    pipeline should also be updated during these fast layers, like the nearest neighbors
    graph, the feature store, and the filters.


    Different components of the pipeline can require different investments to keep
    updated, so their schedules are an important consideration. You might be starting
    to notice that keeping all of these aspects in sync can be a bit challenging.
    If you have model training, model updating, feature store updates, redeployment,
    and new items/users all coming in on potentially different schedules, a *lot*
    of coordination may be necessary. This is where an *orchestration tool* can become
    relevant. A variety of approaches exist, but a few useful technologies here are
    GoCD, MetaFlow, and KubeFlow; the latter is more oriented at Kubernetes infrastructures.
    Another pipeline orchestration tool that can handle both batch and streaming pipelines
    is Apache Beam.


    Generally, for ML deployment pipelines, we need to have a reliable core pipeline
    and the ability to keep the systems up to date as more data pours in. Orchestration
    systems usually define the topology of the systems, the relevant infrastructure
    configurations, and the mapping of the code artifacts needing to be run—not to
    mention the CRON schedules of when all these jobs need to run. Code as infrastructure
    is a popular paradigm that captures these goals as a mantra, so that even all
    this configuration itself is reproducible and automatable.


    In all these orchestration considerations, there''s a heavy overlap with containerization
    and *how* these steps may be deployed. Unfortunately, most of this discussion
    is beyond the scope of this book, but a simple overview is that containerized
    deployment with something like Docker is extremely helpful for ML services, and
    managing those deployments with various container management systems, like Kubernetes,
    is also popular.


    ## Logging


    Logging has come up several times already. Previously in this chapter, you saw
    that logging was important for ensuring that our system was behaving as expected.
    Let’s discuss some best practices for logging and how they fit into our plans.


    When we discussed traces and spans earlier, we were able to get a snapshot of
    the entire call stack of the services involved in responding to a request. Linking
    the services together to see the larger picture is incredibly useful, and when
    it comes to logging, gives us a hint as to how we should be orienting our thinking.
    Returning to our favorite RecSys architecture, we have the following:


    - Collector receiving the request and looking up the embedding relevant to the
    user

    - Computing ANN on items for that vector

    - Applying filters via blooms to eliminate potential bad recommendations

    - Augmenting features of the candidate items and user via the feature stores

    - Scoring of candidates via the ranking model and estimating potential confidence

    - Ordering and application of business logic or experimentation


    Each of these elements has potential applications of logging, but let’s now think
    about how to link them together. The relevant concept from microservices is correlation
    IDs; a *correlation ID* is simply an identifier that’s passed along the call stack
    to ensure the ability to link everything later. As is likely obvious at this point,
    each of these services will be responsible for its own logging, but the services
    are almost always more useful in aggregate.


    These days, Kafka is often used as the log-stream processor to listen for logs
    from all the services in your pipeline and to manage their processing and storing.
    Kafka relies on a message-based architecture; each service is a producer, and
    Kafka helps manage those messages to consumer channels. In terms of log management,
    the Kafka cluster receives all the logs in the relevant formats, hopefully augmented
    with correlation IDs, and sends them off to an ELK stack. The *ELK stack*—Elasticsearch,
    Logstash, Kibana—consists of a Logstash component to handle incoming log streams
    and apply structured processing, Elasticsearch to build search indices to the
    log store, and Kibana to add a UI and high-level dashboarding to the logging.


    This stack of technologies is focused on ensuring that you have access and observability
    from your logs. Other technologies focus on other aspects, but what should you
    be logging?


    ### Collector logs


    Again, we wish to log during the following:


    - Collector receiving the request and looking up the embedding relevant to the
    user

    - Computing ANN on items for that vector


    The collector receives a request, consisting in our simplest example of user_id,
    requesting_timestamp, and any augmenting keyword elements (kwargs) that might
    be required. A correlation_id should be passed along from the requester or generated
    at this step. A log with these basic keys should be fired, along with the timestamp
    of request received. A call is made to the embedding store, and the collector
    should log this request. Then the embedding store should log this request when
    received, along with the embedding store’s response. Finally, the collector should
    log the response as it returns. This may feel like a lot of redundant information,
    but the explicit parameters included in the API calls become extremely useful
    when troubleshooting.


    The collector now has the vector it will need to perform a vector search, so it
    will make a call to the ANN service. Logging this call, and any relevant logic
    in choosing the k for number of neighbors will be important, along with the ANN’s
    received API request, the relevant state for computing ANN, and ANN’s response.
    Back in the collector, logging that response and any potential data augmentation
    for downstream service requirements are the next steps.


    At this point, at least six logs have been emitted—only reinforcing the need for
    a way to link these all together. In practice, you often have other relevant steps
    in your service that should be logged (e.g., checking that the distribution of
    distances in returned neighbors is appropriate for downstream ranking).


    Note that if the embedding lookup was a miss, logging that miss is obviously important,
    as well as logging the subsequent request to the cold-start recommendation pipeline.
    The cold-start pipeline will incur additional logs.


    ### Filtering and scoring


    Now we need to monitor the following steps:


    1. Applying filters via blooms to eliminate potential bad recommendations

    2. Augmenting features to the candidate items and user via the feature stores

    3. Scoring candidates via the ranking model, and potential confidence estimation


    We should log the incoming request to the filtering service as well as the collection
    of filters we wish to apply. Additionally, as we search the blooms for each item
    and rule them in or out of the bloom, we should build up some structured logging
    of which items are caught in which filters and then log all this as a blob for
    later inspection. Responses and requests should be logged as part of feature augmentation—where
    we should log requests and responses to the feature store.


    Also log the augmented features that end up attached to the item entities. This
    may seem redundant with the feature store itself, but understanding which features
    were added during a recommendation pipeline is *crucial* when looking back later
    to figure out why the pipeline might have behaved differently than anticipated.


    At the time of scoring, the entire set of candidates should be logged with the
    features necessary for scoring and the output scores. It’s extremely powerful
    to log this entire dataset, because training later can use these to get a better
    sense for real ranking sets. Finally, the response is passed to the next step
    with the ranked candidates and all their features.


    ### Ordering


    We have one more step to go, but it’s an essential one: *ordering and application
    of business logic or experimentation*. This step is probably the most important
    logging step, because of how complicated and ad hoc the logic in this step can
    get.


    If you have multiple intersecting business requirements implemented via filters
    at this step, while also integrating with experimentation, you can find yourself
    seriously struggling to unpack how reasonable expectations coming out of the ranker
    have turned into a mess by response time. Techniques like logging the incoming
    candidates, keyed to why they’re eliminated, and the order of business rules applied
    will make reconstructing the behavior much more tractable.


    Additionally, experimentation routing will likely be handled by another service,
    but the experiment ID seen in this step and the way that experiment assignment
    was utilized are the responsibility of the server. As we ship off the final recommendations,
    or decide to go another round, one last log of the state of the recommendation
    will ensure that app logs can be validated with responses.


    > **Notes on Formatting**


    Structured logs are your friend. Implementing a data structure to hold the relevant
    data for your logs and then utilizing a `log-formatter object` will significantly
    reduce the difficulty in parsing and writing these logs. One often underappreciated
    feature of building message objects in code, and utilizing them as a running data
    structure throughout your call stack, is tight coupling between logs and app logic.'
  mdcn: '那些用户的评分数量很大。总而言之，这意味着对于每个 $\tilde{x}$，我们应该查找哪些用户之前对 $x$ 进行过评分，并更新他们与新评分者之间的用户相似度。


    这有点临时性，但对于许多方法，你可以利用这些技巧来减少完全重新训练。这将通过一个快速层来避免完全的批量重新训练。还存在其他方法，例如构建一个单独的模型来近似推荐低信号项。这可以通过特征模型来完成，并能显著降低这些快速重新训练的复杂性。


    ## Lambda 架构与编排


    在这些策略的更极端端是 Lambda 架构；正如第 6 章所讨论的，Lambda 架构旨在拥有一个更频繁的管道，用于将新数据添加到系统中。*速度*层负责处理小批量数据以执行数据转换，并进行模型拟合以与核心模型结合。提醒一下，在这些快速层期间，管道的许多其他方面也应更新，例如最近邻图、特征存储和过滤器。


    管道的不同组件可能需要不同的投入来保持更新，因此它们的调度是一个重要的考虑因素。你可能开始注意到，保持所有这些方面同步可能有点挑战性。如果你有模型训练、模型更新、特征存储更新、重新部署以及新项目/用户都可能在不同的时间表上到来，那么可能需要大量的协调。这就是*编排工具*可能变得相关的地方。存在多种方法，但这里一些有用的技术是
    GoCD、MetaFlow 和 KubeFlow；后者更面向 Kubernetes 基础设施。另一个可以处理批量和流式管道的管道编排工具是 Apache Beam。


    通常，对于 ML 部署管道，我们需要一个可靠的核心管道，以及在更多数据涌入时保持系统更新的能力。编排系统通常定义系统的拓扑结构、相关的基础设施配置以及需要运行的代码工件的映射——更不用说所有这些作业需要运行的
    CRON 调度了。基础设施即代码是一个流行的范式，它将这些目标作为口号，使得即使所有这些配置本身也是可重现和可自动化的。


    在所有这些编排考虑中，与容器化以及这些步骤*如何*部署有大量重叠。不幸的是，大部分讨论超出了本书的范围，但一个简单的概述是，使用 Docker 等工具进行容器化部署对
    ML 服务非常有帮助，并且使用各种容器管理系统（如 Kubernetes）来管理这些部署也很流行。


    ## 日志记录


    日志记录已经多次出现。在本章前面，你看到日志记录对于确保我们的系统按预期运行非常重要。让我们讨论一些日志记录的最佳实践以及它们如何融入我们的计划。


    当我们之前讨论跟踪和跨度时，我们能够获得响应请求的服务的整个调用堆栈的快照。将服务链接在一起以查看更大的图景非常有用，当涉及到日志记录时，它给了我们关于如何定位思维的提示。回到我们最喜欢的
    RecSys 架构，我们有以下内容：


    - 收集器接收请求并查找与用户相关的嵌入

    - 对该向量的项目计算 ANN

    - 通过布隆过滤器应用过滤器以消除潜在的不良推荐

    - 通过特征存储增强候选项目和用户的特征

    - 通过排名模型对候选项目进行评分并估计潜在置信度

    - 排序和应用业务逻辑或实验


    这些元素中的每一个都有日志记录的潜在应用，但我们现在来思考如何将它们链接在一起。微服务中的相关概念是关联 ID；*关联 ID* 只是一个在调用堆栈中传递的标识符，以确保以后能够链接所有内容。正如此时可能显而易见的那样，这些服务中的每一个都将负责自己的日志记录，但服务几乎总是聚合起来更有用。


    如今，Kafka 经常被用作日志流处理器，以监听管道中所有服务的日志并管理它们的处理和存储。Kafka 依赖于基于消息的架构；每个服务都是一个生产者，Kafka
    帮助管理这些消息到消费者通道。在日志管理方面，Kafka 集群以相关格式接收所有日志，希望用关联 ID 增强，并将它们发送到 ELK 堆栈。*ELK 堆栈*——Elasticsearch、Logstash、Kibana——由一个
    Logstash 组件处理传入的日志流并应用结构化处理，Elasticsearch 为日志存储构建搜索索引，Kibana 为日志记录添加 UI 和高级仪表板。


    这堆技术专注于确保你可以访问和观察你的日志。其他技术专注于其他方面，但你应该记录什么？


    ### 收集器日志


    同样，我们希望在以下情况下记录日志：


    - 收集器接收请求并查找与用户相关的嵌入

    - 对该向量的项目计算 ANN


    收集器接收一个请求，在我们最简单的例子中，由 user_id、requesting_timestamp 和任何可能需要的增强关键字元素（kwargs）组成。关联
    ID 应该从请求者传递过来或在此步骤生成。应该触发一个包含这些基本键的日志，以及请求接收的时间戳。调用嵌入存储，收集器应该记录这个请求。然后嵌入存储在接收时应该记录这个请求，以及嵌入存储的响应。最后，收集器在返回时应该记录响应。这可能感觉像是很多冗余信息，但
    API 调用中包含的显式参数在故障排除时变得极其有用。


    收集器现在有了执行向量搜索所需的向量，因此它将调用 ANN 服务。记录这个调用以及选择 k 作为邻居数量的任何相关逻辑将很重要，以及 ANN 接收的 API
    请求、计算 ANN 的相关状态和 ANN 的响应。回到收集器，记录响应以及为下游服务需求进行的任何潜在数据增强是下一步。


    此时，至少已经发出了六个日志——这仅仅强化了需要一种方法将它们全部链接起来。实际上，你的服务中通常还有其他相关步骤应该被记录（例如，检查返回邻居的距离分布是否适合下游排名）。


    请注意，如果嵌入查找未命中，记录该未命中显然很重要，以及记录后续对冷启动推荐管道的请求。冷启动管道将产生额外的日志。


    ### 过滤和评分


    现在我们需要监控以下步骤：


    1. 通过布隆过滤器应用过滤器以消除潜在的不良推荐

    2. 通过特征存储增强候选项目和用户的特征

    3. 通过排名模型对候选项目进行评分，以及潜在的置信度估计


    我们应该记录传入过滤服务的请求以及我们希望应用的过滤器集合。此外，当我们为每个项目搜索布隆过滤器并将其纳入或排除在布隆过滤器之外时，我们应该构建一些结构化日志，记录哪些项目被哪些过滤器捕获，然后将所有这些作为一个整体记录下来以供以后检查。响应和请求应作为特征增强的一部分被记录——我们应该记录对特征存储的请求和响应。


    还要记录最终附加到项目实体的增强特征。这可能看起来与特征存储本身冗余，但当回顾时，了解在推荐管道中添加了哪些特征对于弄清楚为什么管道的行为可能与预期不同是*至关重要的*。


    在评分时，整个候选集应与评分所需的特征和输出分数一起被记录。记录整个数据集极其强大，因为以后的训练可以使用这些数据来更好地了解真实的排名集。最后，响应与排名后的候选项目及其所有特征一起传递到下一步。


    ### 排序


    我们还有一步要走，但它是必不可少的：*排序和应用业务逻辑或实验*。这一步可能是最重要的日志记录步骤，因为这一步中的逻辑可能变得非常复杂和临时。


    如果你有多个通过过滤器实现的相交业务需求，同时与实验集成，你可能会发现自己严重挣扎于如何将来自排名器的合理期望在响应时间之前变成一团糟。像记录传入候选项目、按其被消除的原因进行键控以及应用的业务规则顺序这样的技术将使重建行为变得更容易处理。


    此外，实验路由可能由另一个服务处理，但在此步骤中看到的实验 ID 以及实验分配的使用方式是服务器的责任。当我们发送最终推荐，或决定再进行一轮时，对推荐状态的最后一次日志记录将确保应用日志可以与响应进行验证。


    > **关于格式的说明**


    结构化日志是你的朋友。实现一个数据结构来保存日志的相关数据，然后使用 `log-formatter object` 将显著降低解析和编写这些日志的难度。在代码中构建消息对象并在整个调用堆栈中将其用作运行数据结构的一个经常被低估的特性是日志与应用逻辑之间的紧密耦合。'

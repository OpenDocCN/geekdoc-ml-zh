- md: "Finally, we see that as we do a Bayesian hyperparameter search, we really do\
    \ improve our performance over time. Figure 10-7 is a Pareto plot in which each\
    \ dot in the scatterplot represents one run, and left to right is a time axis.\
    \ The vertical axis is overall total loss, so lower is better, and it means that\
    \ generally we're converging toward better performance. The line inscribed along\
    \ the bottom of the convex hull of the scatter points is the *Pareto frontier*,\
    \ or the best performance at that x value. Since this is a time-series Pareto\
    \ plot, it merely tracks the best performance in time.\n\nYou may be wondering\
    \ how and why we're able to converge to better loss values in time. This is because\
    \ we've conducted a Bayesian hyperparameter search, which means we selected our\
    \ hyperparameters from independent Gaussians, and we updated our priors for each\
    \ parameter based on performance of previous runs. For an introduction to this\
    \ method, see \"Bayesian Hyperparameter Optimization—A Primer\" by Robert Mitson.\
    \ In a real setting, we'd see less monotonic behavior in this plot, but we'd always\
    \ be hoping to improve.\n\n![](img/da17d05291861831978609329c481581_216_0.png)\n\
    \n*Figure 10-7. The Pareto frontier of the loss values*\n\n## Prequential validation\n\
    \nIf we were to put the preceding approach into practice, we would need to capture\
    \ our trained models in a model registry for use in production. Best practice\
    \ is to establish a set of explicit evaluations against which to test a selection\
    \ of models. In your basic ML training, you've likely been encouraged to think\
    \ about validation datasets; these may take many forms, testing particular subsets\
    \ of instances or features or even distributed across covariates in a known way.\n\
    \nOne useful framing for recommendation systems is to remember that they're a\
    \ fundamentally sequential dataset. With this in mind, let's take another look\
    \ at our ratings data. Later we will talk more about sequential recommenders,\
    \ but while we're talking about validation, it's useful to mention how to take\
    \ proper care.\n\nNotice that all our ratings have an associated timestamp. To\
    \ build a proper validation set, it's a good idea to take that timestamp from\
    \ the end of our data.\n\nHowever, you might be wondering, \"When are different\
    \ users active?\" and \"Is it possible that the later timestamps are a biased\
    \ selection of the ratings?\" These are important questions. To account for these\
    \ questions, we should do a holdout by user.\n\nTo create this *prequential dataset*,\
    \ where the test set follows directly after the training set in a chronological\
    \ sequence, start by deciding on a desired size for validation, like 10%. Next,\
    \ group the data by user. Finally, employ rejection sampling, ensuring you don't\
    \ use the most recent timestamp as the rejection criterion.\n\nHere's a simple\
    \ implementation for pandas using rejection sampling. This is not the most computationally\
    \ efficient implementation, but it will get the job done:\n\n```\ndef prequential_validation_set(df,\
    \ holdout_perc=0.1):\n    '''\n    We utilize rejection sampling.\n\n    Assign\
    \ a probability to all observations, if they lie below the\n    sample percentage\
    \ AND they're the most recent still in the set, include.\n\n    Otherwise return\
    \ them and repeat.\n    Each time, take no more than the remaining necessary to\
    \ fill the count.\n    '''\n    count = int(len(df)*holdout_perc)\n    sample\
    \ = []\n    while count >0:\n        df['p'] = np.random.rand(len(df),1) #generate\
    \ probabilities\n        x = list(\n            df.loc[~df.index.isin(sample)]\
    \ # exclude already selected\n            .sort_values(['unix_timestamp'], ascending=False)\n\
    \            .groupby('user_id').head(1) # only allow the first in each group\n\
    \            .query(\"p < @holdout_perc\").index # grab the indices\n        )\n\
    \        rnd.shuffle(x) # ensure our previous sorting doesn't bias the users subset\n\
    \        sample += x[:count] # add observations up to the remaining needed\n \
    \       count -= len(x[:count]) # decrement the remaining needed\n\n    df.drop(columns=['p'],\
    \ inplace=True)\n\n    test = df.iloc[sample]\n    train = df[~df.index.isin(test.index)]\n\
    \    return train, test\n```\n\nThis is an effective and important validation\
    \ scheme for inherently sequential datasets.\n\n## WSABIE\n\nLet's focus again\
    \ on optimizations and modifications. Another optimization is to treat the MF\
    \ problem as a single optimization.\n\nThe paper \"WSABIE: Scaling Up to Large\
    \ Vocabulary Image Annotation\" by Jason Weston et al. also contains a factorization\
    \ for just the item matrix. In this scheme, we replace the user matrix with a\
    \ weighted sum of the items a user has affinity to. We cover web scale annotation\
    \ by image embedding (WSABIE) and Warp loss in \"WARP\" on page 233. Representing\
    \ a user as the average of items they like is a way of saving space and not needing\
    \ a separate user matrix if there are large numbers of users.\n\n![](img/da17d05291861831978609329c481581_218_0.png)\n\
    \n## Latent Space HPO\n\nA completely alternative way to do HPO for RecSys is\
    \ via the latent spaces themselves! \"Hyper-Parameter Optimization for Latent\
    \ Spaces in Dynamic Recommender Systems\" by Bruno Veloso et al. attempts to modify\
    \ the relative embeddings during each step to optimize the embedding model.\n\n\
    ## Dimension Reduction\n\nDimension-reduction techniques are frequently employed\
    \ in recommendation systems to decrease computational complexity and enhance the\
    \ accuracy of recommendation algorithms. In this context, the primary concepts\
    \ of dimension reduction for recommendation systems include MF and SVD.\n\nThe\
    \ *matrix factorization method* decomposes the user-item interaction matrix $(A\
    \ \\in \\mathbb{R}^{(m \\times n)})$ into two lower-dimensional matrices, representing\
    \ the user $(U \\in \\mathbb{R}^{(m \\times r)})$ and item $(V \\in \\mathbb{R}^{(n\
    \ \\times r)})$ latent factors, respectively. This technique can reveal the underlying\
    \ data structure and offer recommendations based on a user's previous interactions.\
    \ Mathematically, MF can be represented as follows:\n\n```\n$A \\sim U \\times\
    \ V^{(T)}$\n```\n\n*SVD* is a linear-algebra technique that decomposes a matrix\
    \ $(A)$ into three matrices—the left singular vectors $(U)$, the singular values\
    \ $(\\Sigma)$, and the right singular vectors $(V)$. SVD can be utilized for MF\
    \ in recommendation systems, where the user-item interaction matrix is decomposed\
    \ into a smaller number of latent factors. The mathematical representation of\
    \ SVD is as follows:\n\n```\n$A = U \\times \\Sigma \\times V^{(T)}$\n```\n\n\
    In practice, though, rather than using a mathematical library to find the eigenvectors,\
    \ folks might use the power iteration method to discover the eigenvectors approximately.\
    \ This method is far more scalable than a full dense SVD solution that is optimized\
    \ for correctness and dense vectors:\n\n```\nimport jax\nimport jax.numpy as jnp\n\
    \ndef power_iteration(a: jnp.ndarray) -> jnp.ndarray:\n    \"\"\"Returns an eigenvector\
    \ of the matrix a.\n    Args:\n        a: a n x m matrix\n    \"\"\"\n    key\
    \ = jax.random.PRNGKey(0)\n    x = jax.random.normal(key, shape=(a.shape[1], 1))\n\
    \    for i in range(100):\n        x = a @ x\n        x = x / jnp.linalg.norm(x)\n\
    \    return x.T\n\nkey = jax.random.PRNGKey(123)\nA = jax.random.normal(key, shape=[4,\
    \ 4])\nprint(A)\n[[ 0.52830553  0.3722206  -1.2219944  -0.10314374]\n [ 1.4722222\
    \   0.47889313 -1.2940298   1.0449569 ]\n [ 0.23724185  0.3545859  -0.172465 \
    \  -1.8011322 ]\n [ 0.4864215   0.08039388 -1.2540827   0.72071517]]\nS, _, _\
    \ = jnp.linalg.svd(A)\nprint(S)\n[[-0.375782    0.40269807  0.44086716 -0.70870167]\n\
    \ [-0.753597    0.0482972  -0.65527284  0.01940039]\n [ 0.2040088   0.91405433\
    \ -0.15798494  0.31293103]\n [-0.49925917 -0.00250015  0.5927009   0.6320123 ]]\n\
    x1 = power_iteration(A)\nprint(x1.T)\n[[-0.35423845]\n [-0.8332922 ]\n [ 0.16189891]\n\
    \ [-0.39233655]]\n```\n\nNotice that the eigenvector returned by the power iteration\
    \ is close to the first column of $S$, but not quite. This is because the method\
    \ is approximate. It relies on the fact that an eigenvector doesn't change in\
    \ direction when multiplied by the matrix. So by repeatedly multiplying by the\
    \ matrix, we eventually iterate onto an eigenvector. Also notice that we solved\
    \ for column eigenvectors instead of the row eigenvectors. In this example, the\
    \ columns are users, and the rows are items. It is important to play with transposed\
    \ matrices because a lot of ML involves reshaping and transposing matrices, so\
    \ getting used to them early is an important skill."
  mdcn: "最后，我们看到，随着进行贝叶斯超参数搜索，我们的性能确实随时间得到提升。图10-7是一个帕累托图，其中散点图中的每个点代表一次运行，从左到右是时间轴。纵轴是总体总损失，因此越低越好，这意味着我们通常正朝着更好的性能收敛。沿着散点凸包底部绘制的线是*帕累托前沿*，即该x值下的最佳性能。由于这是一个时间序列帕累托图，它仅跟踪随时间变化的最佳性能。\n\
    \n你可能想知道我们如何以及为何能够随时间收敛到更好的损失值。这是因为我们进行了贝叶斯超参数搜索，这意味着我们从独立高斯分布中选择超参数，并根据之前运行的性能更新每个参数的先验。关于此方法的介绍，请参阅Robert\
    \ Mitson的《贝叶斯超参数优化——入门指南》。在实际场景中，我们在这张图中看到的单调性会少一些，但我们总是希望有所改进。\n\n![](img/da17d05291861831978609329c481581_216_0.png)\n\
    \n*图10-7. 损失值的帕累托前沿*\n\n## 序贯验证\n\n如果我们要将上述方法付诸实践，就需要将训练好的模型捕获到模型注册表中以供生产使用。最佳实践是建立一套明确的评估标准，用于测试一系列模型。在你的基础机器学习训练中，你可能被鼓励考虑验证数据集；这些数据集可以有多种形式，测试特定的实例子集、特征子集，甚至以已知方式分布在协变量中。\n\
    \n对于推荐系统，一个有用的框架是记住它们本质上是序列数据集。考虑到这一点，让我们再看一下我们的评分数据。稍后我们将更多地讨论序列推荐器，但在讨论验证时，提及如何妥善处理是很有用的。\n\
    \n注意我们所有的评分都有一个关联的时间戳。要构建一个合适的验证集，一个好主意是从数据末尾取那个时间戳。\n\n然而，你可能想知道，“不同用户何时活跃？”以及“较后的时间戳是否可能是评分的有偏选择？”这些是重要的问题。为了解决这些问题，我们应该按用户进行留出。\n\
    \n为了创建这个*序贯数据集*，其中测试集在时间顺序上紧随训练集之后，首先决定所需的验证集大小，比如10%。接下来，按用户对数据分组。最后，采用拒绝采样，确保你不使用最近的时间戳作为拒绝标准。\n\
    \n这是一个使用拒绝采样的pandas简单实现。这不是计算效率最高的实现，但它能完成任务：\n\n```\ndef prequential_validation_set(df,\
    \ holdout_perc=0.1):\n    '''\n    We utilize rejection sampling.\n\n    Assign\
    \ a probability to all observations, if they lie below the\n    sample percentage\
    \ AND they're the most recent still in the set, include.\n\n    Otherwise return\
    \ them and repeat.\n    Each time, take no more than the remaining necessary to\
    \ fill the count.\n    '''\n    count = int(len(df)*holdout_perc)\n    sample\
    \ = []\n    while count >0:\n        df['p'] = np.random.rand(len(df),1) #generate\
    \ probabilities\n        x = list(\n            df.loc[~df.index.isin(sample)]\
    \ # exclude already selected\n            .sort_values(['unix_timestamp'], ascending=False)\n\
    \            .groupby('user_id').head(1) # only allow the first in each group\n\
    \            .query(\"p < @holdout_perc\").index # grab the indices\n        )\n\
    \        rnd.shuffle(x) # ensure our previous sorting doesn't bias the users subset\n\
    \        sample += x[:count] # add observations up to the remaining needed\n \
    \       count -= len(x[:count]) # decrement the remaining needed\n\n    df.drop(columns=['p'],\
    \ inplace=True)\n\n    test = df.iloc[sample]\n    train = df[~df.index.isin(test.index)]\n\
    \    return train, test\n```\n\n对于本质上是序列的数据集，这是一个有效且重要的验证方案。\n\n## WSABIE\n\n\
    让我们再次关注优化和修改。另一个优化是将矩阵分解问题视为单一优化。\n\nJason Weston等人的论文《WSABIE：扩展到大规模词汇图像标注》也包含一个仅针对物品矩阵的分解方案。在这个方案中，我们用用户有亲和力的物品的加权和来替换用户矩阵。我们在第233页的“WARP”中介绍了基于图像嵌入的网络规模标注（WSABIE）和Warp损失。将用户表示为他们喜欢的物品的平均值，是一种节省空间的方法，如果用户数量庞大，就不需要单独的用户矩阵。\n\
    \n![](img/da17d05291861831978609329c481581_218_0.png)\n\n## 潜在空间超参数优化\n\n为推荐系统进行超参数优化的另一种完全不同的方式是通过潜在空间本身！Bruno\
    \ Veloso等人的论文《动态推荐系统中潜在空间的超参数优化》试图在每一步修改相对嵌入，以优化嵌入模型。\n\n## 降维\n\n降维技术经常用于推荐系统，以降低计算复杂度并提高推荐算法的准确性。在此背景下，推荐系统降维的主要概念包括矩阵分解和奇异值分解。\n\
    \n*矩阵分解方法*将用户-物品交互矩阵 $(A \\in \\mathbb{R}^{(m \\times n)})$ 分解为两个低维矩阵，分别表示用户 $(U\
    \ \\in \\mathbb{R}^{(m \\times r)})$ 和物品 $(V \\in \\mathbb{R}^{(n \\times r)})$\
    \ 的潜在因子。这种技术可以揭示底层数据结构，并基于用户之前的交互提供推荐。数学上，MF可以表示如下：\n\n```\n$A \\sim U \\times\
    \ V^{(T)}$\n```\n\n*奇异值分解*是一种线性代数技术，它将一个矩阵 $(A)$ 分解为三个矩阵——左奇异向量 $(U)$、奇异值 $(\\\
    Sigma)$ 和右奇异向量 $(V)$。SVD可用于推荐系统中的矩阵分解，其中用户-物品交互矩阵被分解为更少数量的潜在因子。SVD的数学表示如下：\n\n\
    ```\n$A = U \\times \\Sigma \\times V^{(T)}$\n```\n\n然而在实践中，人们可能使用幂迭代法来近似地发现特征向量，而不是使用数学库来寻找特征向量。这种方法比为正确性和稠密向量优化的完整稠密SVD解决方案更具可扩展性：\n\
    \n```\nimport jax\nimport jax.numpy as jnp\n\ndef power_iteration(a: jnp.ndarray)\
    \ -> jnp.ndarray:\n    \"\"\"Returns an eigenvector of the matrix a.\n    Args:\n\
    \        a: a n x m matrix\n    \"\"\"\n    key = jax.random.PRNGKey(0)\n    x\
    \ = jax.random.normal(key, shape=(a.shape[1], 1))\n    for i in range(100):\n\
    \        x = a @ x\n        x = x / jnp.linalg.norm(x)\n    return x.T\n\nkey\
    \ = jax.random.PRNGKey(123)\nA = jax.random.normal(key, shape=[4, 4])\nprint(A)\n\
    [[ 0.52830553  0.3722206  -1.2219944  -0.10314374]\n [ 1.4722222   0.47889313\
    \ -1.2940298   1.0449569 ]\n [ 0.23724185  0.3545859  -0.172465   -1.8011322 ]\n\
    \ [ 0.4864215   0.08039388 -1.2540827   0.72071517]]\nS, _, _ = jnp.linalg.svd(A)\n\
    print(S)\n[[-0.375782    0.40269807  0.44086716 -0.70870167]\n [-0.753597    0.0482972\
    \  -0.65527284  0.01940039]\n [ 0.2040088   0.91405433 -0.15798494  0.31293103]\n\
    \ [-0.49925917 -0.00250015  0.5927009   0.6320123 ]]\nx1 = power_iteration(A)\n\
    print(x1.T)\n[[-0.35423845]\n [-0.8332922 ]\n [ 0.16189891]\n [-0.39233655]]\n\
    ```\n\n注意，幂迭代返回的特征向量接近 $S$ 的第一列，但不完全相同。这是因为该方法是近似的。它依赖于这样一个事实：特征向量在乘以矩阵时方向不变。因此，通过反复乘以矩阵，我们最终会迭代到一个特征向量上。还要注意，我们求解的是列特征向量而不是行特征向量。在这个例子中，列是用户，行是物品。玩转转置矩阵很重要，因为很多机器学习涉及重塑和转置矩阵，所以尽早习惯它们是一项重要技能。"

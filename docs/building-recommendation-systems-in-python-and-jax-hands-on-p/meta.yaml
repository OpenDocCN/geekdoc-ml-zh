    \n表示标识符的另一种方式是嵌入它们——即创建一个查找表，映射到一个固定大小的嵌入，其维度低于标识符的基数。这个嵌入可以被视为标识符全秩矩阵的低秩近似。我们在前面的章节中介绍了低秩嵌入，并在这里使用该概念作为表示专辑和艺术家的特征。\n\

  - '[PAGE 22]


    # CHAPTER 1

    Introduction


    Recommendation systems are integral to the development of the internet that we
    know today and are a central function of emerging technology companies. Beyond
    the search ranking that opened the web’s breadth to everyone, the new and exciting
    movies all your friends are watching, or the most relevant ads that companies
    pay top dollar to show you lie more applications of recommendation systems every
    year. The addictive For You page from TikTok, the Discover Weekly playlist by
    Spotify, board suggestions on Pinterest, and Apple’s App Store are all hot technologies
    enabled by the recommendation systems. These days, sequential transformer models,
    multimodal representations, and graph neural nets are among the brightest areas
    of R&D in machine learning (ML)—all being put to use in recommendation systems.


    Ubiquity of any technology often prompts questions of how the technology works,
    why it has become so common, and if we can get in on the action. For recommendation
    systems, the *how* is quite complicated. We’ll need to understand the geometry
    of taste, and how only a little bit of interaction from a user can provide us
    a *GPS signal* in that abstract space. You’ll see how to quickly gather a great
    set of candidates and how to refine them to a cohesive set of recommendations.
    Finally, you’ll learn how to evaluate your recommender, build the endpoint that
    serves inference, and log about its behavior.


    We will formulate variants of the core problem to be solved by recommendation
    systems but, ultimately, the motivating problem framing is as follows:


    > Given a collection of things that may be recommended, choose an ordered few
    for the current context and user that best match according to a certain objective.'
  - '[PAGE 23]


    # Key Components of a Recommendation System


    As we increase complexity and sophistication, let''s keep in mind the components
    of our system. We will use *string diagrams* to keep track of our components,
    but in the literature these diagrams are presented in a variety of ways.


    We will identify and build on three core components of recommendation systems:
    the collector, ranker, and server.


    # Collector


    The collector''s role is to know what is in the collection of things that may
    be recommended, and the necessary features or attributes of those things. Note
    that this collection is often a subset based on context or state.


    # Ranker


    The ranker''s role is to take the collection provided by the collector and order
    some or all of its elements, according to a model for the context and user.


    # Server


    The server''s role is to take the ordered subset provided by the ranker, ensure
    that the necessary data schema is satisfied—including essential business logic—and
    return the requested number of recommendations.


    Take, for example, a hospitality scenario with a waiter:


    > When you sit down at your table, you look at the menu, unsure of what you should
    order. You ask the waiter, “What do you think I should order for dessert?”


    The waiter checks their notes and says, “We’re out of the key lime pie, but people
    really like our banana cream pie. If you like pomegranate, we make pom ice cream
    from scratch; and it’s hard to go wrong with the donut a la mode—it’s our most
    popular dessert.”


    In this short exchange, the waiter first serves as a collector: identifying the
    desserts on the menu, accommodating current inventory conditions, and preparing
    to talk about the characteristics of the desserts by checking their notes.


    Next, the waiter serves as a ranker; they mention items high scoring in popularity
    (banana cream pie and donut a la mode) as well as a contextually high match item
    based on the patron''s features (if they like pomegranate).


    Finally, the waiter serves the recommendations verbally, including both explanatory
    features of their algorithm and multiple choices.'
  - "[PAGE 24]\n\nWhile this seems a bit cartoonish, remember to ground discussions\
    \ of recommendation systems in real-world applications. One of the advantages\
    \ of working in RecSys is that inspiration is always nearby.\n\n# Simplest Possible\
    \ Recommenders\n\nWe've established the components of a recommender, but to really\
    \ make this practical, we need to see this in action. While much of the book is\
    \ dedicated to practical recommendation systems, first we'll start with a toy\
    \ and scaffold from there.\n\n# The Trivial Recommender\n\nThe absolute simplest\
    \ recommender is not very interesting but can still be demonstrated in the framework.\
    \ It's called *the trivial recommender* (TR) because it contains virtually no\
    \ logic:\n\n```\ndef get_trivial_recs() -> Optional[List[str]]:\n    item_id =\
    \ random.randint(0, MAX_ITEM_INDEX)\n\n    if get_availability(item_id):\n   \
    \     return [item_id]\n    return None\n```\n\nNotice that this recommender may\
    \ return either a specific `item_id` or `None`. Also observe that this recommender\
    \ takes no arguments, and `MAX_ITEM_INDEX` is referencing a variable out of scope.\
    \ Software principles ignored, let's think about the three components:\n\n*Collector*\n\
    A random `item_id` is generated. The TR collects by checking the availability\
    \ of `item_id`. We could argue that having access to `item_id` is also part of\
    \ the collector's responsibility. Conditional upon the availability, the collection\
    \ of recommendable things is either `[item_id]` or `None` (*recall that `None`\
    \ is a collection in the set-theoretic sense*).\n\n*Ranker*\nThe TR ranks with\
    \ a no-op; i.e., the ranking of 1 or 0 objects in a collection is the identity\
    \ function on that collection, so we merely do nothing and move on to the next\
    \ step.\n\n*Server*\nThe TR serves recommendations by its `return` statements.\
    \ The only schema that's been specified in this example is that the return type\
    \ is `Optional[List[str]]`."

    \ number 0. Whenever we wish to use the key, though, we have to split it into\
    \ two by using `jax.random.split`, then use one to generate the next random number\
    \ and a subkey to perform the random action. In this case, we use the subkey to\
    \ select a random negative from the entire corpus of products for our negative.\
    \ We cover more complex ways to sample the negative in Chapter 12, but randomly\
    \ selecting a negative is the simplest way to construct the triplet for triplet\
    \ loss.\n\nSimilar to the way the negatives are selected, we again use JAX's random\
    \ functionality to generate a list of indices to swap, in order to shuffle the\
    \ array for the training step. Random shuffling is important in stochastic gradient\
    \ descent to break up any kind of structure in the training data to ensure that\
    \ the gradients are stochastic. We use JAX's random shuffling mechanism for better\
    \ reproducibility so that experiments are more likely to be the same, given the\
    \ same initial data and settings.\n\nThe next pair of functions we will look at\
    \ are listed in Example 5-5 and show how the train and eval steps are written.\
    \ The train step takes the state of the model, which contains the model parameters\
    \ as well as the gradient information, which varies depending on the optimizer\
    \ being used. This step also takes in batches of scenes, positive products, and\
    \ negative products in order to construct the triplet loss. In addition to optimizing\
    \ for the triplet loss, we want to minimize the size of the embeddings whenever\
    \ they go outside the unit sphere. The process of minimizing the size of the embeddings\
    \ is called *regularization*, so we add it to the triplet loss to obtain the final\
    \ loss.\n\n# Example 5-5. Training and evaluation steps\n\n```\npython\ndef train_step(state,\

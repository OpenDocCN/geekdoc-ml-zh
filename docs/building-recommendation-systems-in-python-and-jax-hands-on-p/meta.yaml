    An operator can also be commutative. This isn''t a requirement to be a group,
    but groups that have this property are called *commutative groups*. With commutativity,
    for elements $x, y$ in the group, $x + y = y + x$. This property is helpful in
    the reduction step because it allows the reducer to perform the operations in
    parallel and then reduce them together without worrying which operations occur
    in what order.


    It is important to note that while addition over real numbers is associative and
    commutative, addition of floating-point numbers isn''t. The reason is that floating-point
    approximately represents real numbers. So when you add a large number with a small
    number in floating-point, the small number isn''t represented accurately and might
    simply be discarded. A more accurate and consistent way to add floating-point
    numbers is to sort the list of numbers to be added first and add all the small
    numbers up before adding them to the large numbers. Adding two small numbers together
    first to make a larger number ensures that they do not get lost when being absorbed
    into the accumulator (the sum). Thus, while addition of numbers is in theory associative
    and commutative with real numbers, you might get different results in practice
    with floating-point numbers, depending on the order of operations.



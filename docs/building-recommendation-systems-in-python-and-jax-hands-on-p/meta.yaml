    \ rating occurs when the user directly responds to a prompt for feedback on an\
    \ item.\n-   A soft rating occurs when the user’s behavior implicitly communicates\
    \ feedback on an item without responding to a direct prompt.\n\n## Data Collection\
    \ and User Logging\n\nWe’ve established that we learn from both explicit ratings\

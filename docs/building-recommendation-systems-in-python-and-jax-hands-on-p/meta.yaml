  md: "```\npython\nclass jax_df_Kfold(object):\n    \"\"\"Simple class that handles\
    \ Kfold\n    splitting of a matrix as a dataframe and stores as sparse jarrays\"\
    \"\"\n    def __init__(\n        self,\n        df: pd.DataFrame,\n        user_dim:\
    \ int,\n        item_dim: int,\n        k: int = 5,\n        prng_key=random.PRNGKey(0)\n\
    \    ):\n        self._df = df\n        self._num_folds = k\n        self._split_idxes\
    \ = jnp.array_split(\n            random.permutation(\n                prng_key,\n\
    \                df.index.to_numpy(),\n                axis=0,\n             \
    \   independent=True\n            ),\n            self._num_folds\n        )\n\
    \n        self._fold_arrays = dict()\n\n        for fold_index in range(self._num_folds):\n\
    \            # let's create sparse jax arrays for each fold piece\n          \
    \  self._fold_arrays[fold_index] = (\n                self._df[\n            \
    \        self._df.index.isin(self._split_idxes[fold_index])\n                ].pipe(start_pipeline)\n\
    \                .pipe(\n                    ratings_to_sparse_array,\n      \
    \              user_dim=user_dim,\n                    item_dim=item_dim\n   \
    \             )\n            )\n\n    def get_fold(self, fold_index: int):\n \
    \       assert(self._num_folds > fold_index)\n        test = self._fold_arrays[fold_index]\n\
    \        train = sparse_array_concatenate(\n            [v for k,v in self._fold_arrays.items()\
    \ if k != fold_index]\n        )\n        return train, test\n```\n\nEach hyperparameter\
    \ setup should yield loss for each fold, so within wandb.init, we build a model\
    \ with each fold:\n\n```\npython\nfor j in num_folds:\n    train, test = folder.get_fold(j)\n\
    \    model_object_dict[j] = model_constructor(\n```"

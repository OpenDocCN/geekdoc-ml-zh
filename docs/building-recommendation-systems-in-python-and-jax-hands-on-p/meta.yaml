  md: "SparkContext can be used to create resilient distributed datasets, or RDDs.\
    \ These are references to data streams that can be manipulated on the controller,\
    \ and processing on the RDD can be farmed out to all the workers. SparkContext\
    \ allows you to load up data files stored on a distributed filesystem like Hadoop\
    \ Distributed File System (HDFS) or cloud buckets. By calling the SparkContext's\
    \ textFile method, we are returned a handle to an RDD. A stateless function can\
    \ then be applied or mapped on the RDD to transform it from one RDD to another\
    \ by repeatedly applying the function to the contents of the RDD.\n\nFor example,\
    \ this program fragment loads a text file and converts all lines to lowercase\
    \ by running an anonymous lambda function that converts single lines to lowercase:\n\
    \n```\ndef lower_rdd(input_file: str,\n              output_file: str):\n    \"\
    \"\"Takes a text file and converts it to lowercase..\"\"\"\n    sc = SparkContext()\n\
    \    input_rdd = sc.textFile(input_file)\n    input_rdd.map(lambda line: line.lower()).saveAsTextFile(output_file)\n\
    ```\n\nIn a single-machine implementation, we would simply load up each Wikipedia\
    \ article, keep a running dictionary in RAM, and count each token and then add\
    \ 1 to the token count in the dictionary. A *token* is an atomic element of a\
    \ document that is divided into pieces. In regular English, it would be a word,\
    \ but Wikipedia documents have other entities such as the document references\
    \ themselves that need to be kept track of separately, so we call the division\
    \ into pieces *tokenization* and the atomic elements *tokens*. The single-machine\
    \ implementation would take a while to go through the thousands of documents on\
    \ Wikipedia, which is why we use a distributed processing framework like Spark.\
    \ In the Spark paradigm, computation is broken into maps, where a function is\
    \ applied statelessly on each document in parallel. Spark also has a reduce function,\
    \ where the outputs of separate maps are joined together.\n\nFor example, suppose\
    \ we have a list of word counts and want to sum up the values of words that occur\
    \ in different documents. The input to the reducer will be something like this:\n\
    \n+   - (apple, 10)\n- (orange, 20)\n- (apple, 7)"

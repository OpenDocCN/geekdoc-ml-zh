    for log count and the exact equation are derived in the “GloVe: Global Vectors
    for Word Representation” by Jeffrey Pennington et al. We will show just the derived
    result:


    *y_predicted = x(i)x(j) + bias(i) + bias(j)*


    Here, *x* is the embedding lookup. In the code, we use 64-dimensional vectors,
    which are not too small as to have insufficient capacity to represent the embedding
    space but are not too large that it would take up too much memory when we have
    an embedding for the entire dictionary. The bias terms are there to soak up the
    large counts from very popular items such as *the*, *a*, and *and* that co-occur
    with many other terms.'
- md: "The loss we want to minimize is the squared difference between the prediction\
    \ and the actual value:\n\n```\ny_target = 1 + log_{10}(N)\nweight = min(1, N/100)^{0.75}\n\
    loss = weight * (y_{predicted} - y_{target})^2\n```\n\nThe weighting term in the\
    \ loss function is to prevent domination by very popular co-occurrences as well\
    \ as to downweight rarer co-occurrences.\n\n## GloVE Model Specification in JAX\
    \ and Flax\n\nLet's look at the implementation of the GloVE model based on JAX\
    \ and Flax. This is in the file *wikipedia/models.py* on the GitHub repository:\n\
    \n```python\nimport flax\nfrom flax import linen as nn\nfrom flax.training import\
    \ train_state\nimport jax\nimport jax.numpy as jnp\n\nclass Glove(nn.Module):\n\
    \    \"\"\"A simple embedding model based on glove.\n    https://nlp.stanford.edu/projects/glove/\n\
    \    \"\"\"\n    num_embeddings: int = 1024\n    features: int = 64\n\n    def\
    \ setup(self):\n        self._token_embedding = nn.Embed(self.num_embeddings,\n\
    \                                         self.features)\n        self._bias =\
    \ nn.Embed(\n            self.num_embeddings, 1, embedding_init=flax.linen.initializers.zeros)\n\
    \n    def __call__(self, inputs):\n        \"\"\"Calculates the approximate log\
    \ count between tokens 1 and 2.\n        Args:\n            A batch of (token1,\
    \ token2) integers representing co-occurence.\n        Returns:\n            Approximate\
    \ log count between x and y.\n        \"\"\"\n        token1, token2 = inputs\n\
    \        embed1 = self._token_embedding(token1)\n        bias1 = self._bias(token1)\n\
    \        embed2 = self._token_embedding(token2)\n        bias2 = self._bias(token2)\n\
    \        dot_vmap = jax.vmap(jnp.dot, in_axes=[0, 0], out_axes=0)\n        dot\
    \ = dot_vmap(embed1, embed2)\n        output = dot + bias1 + bias2\n        return\
    \ output\n\n    def score_all(self, token):\n        \"\"\"Finds the score of\
    \ token vs all tokens.\n        Args:\n            max_count: The maximum count\
    \ of tokens to return.\n            token: Integer index of token to find neighbors\
    \ of.\n        Returns:\n            Scores of nearest tokens.\n        \"\"\"\
    \n        embed1 = self._token_embedding(token)\n        all_tokens = jnp.arange(0,\
    \ self.num_embeddings, 1, dtype=jnp.int32)\n        all_embeds = self._token_embedding(all_tokens)\n\
    \        dot_vmap = jax.vmap(jnp.dot, in_axes=[None, 0], out_axes=0)\n       \
    \ scores = dot_vmap(embed1, all_embeds)\n        return scores\n```\n\nFlax is\
    \ rather simple to use; all networks inherit from Flax’s linen neural network\
    \ library and are modules. Flax modules are also Python dataclasses, so any hyperparameters\
    \ for the module are defined at the start of the module as variables. We have\
    \ only two for this simple model: the number of embeddings we want, which corresponds\
    \ to the number of tokens in the dictionary, and the dimension of the embedding\
    \ vectors. Next, in the setup of the module, we actually create the layers we\
    \ want, which is just the bias term and embedding for each token.\n\nThe next\
    \ part of the definition is the default method that is called when we use this\
    \ module. In this case, we want to pass in a pair of tokens, $i, j$; convert them\
    \ to embeddings, $x(i), x(j)$; and then compute the predicted $\\log(count(y_{predicted}))$.\n\
    \nIn this section of code, we encounter the first difference between JAX and NumPy—namely,\
    \ a vectorized map, or `vmap`. A `vmap` takes in a function and applies it in\
    \ the same way across axes of tensors; this makes coding easier because you just\
    \ have to think about how the original function operates on lower-rank tensors\
    \ such as vectors. In this example, since we are passing in batches of pairs of\
    \ tokens and then embedding them, we actually have a batch of vectors, and so\
    \ we want to run the dot product over the batch dimension. We pass in JAX’s dot\
    \ function, which takes vectors, run it over the batch dimension (which is axis\
    \ 0), and tell `vmap` to return the outputs as another batch dimension as axis\
    \ 0. This allows us to efficiently and simply write code for lower-dimensional\
    \ tensors and obtain a function that can operate on higher-dimensional tensors\
    \ by vmapping over the extra axes. Conceptually, it would be as if we looped over\
    \ the first dimension and returned an array of the dot products. However, by converting\
    \ this process to a function, we allow JAX to push this loop into JITable code\
    \ that can be compiled to run fast on a GPU.\n\nFinally, we also declare the helper\
    \ function `score_all`, which takes one token and scores it against all the other\
    \ tokens. Again, we use `vmap` to take the dot product with the particular token\
    \ $x(i)$ but run it against all the other token embeddings. The difference here\
    \ is that since $x(i)$ is already a vector, we don't need to vmap over it. Therefore,\
    \ in `in_axes`, we supply `[None, 0]`, which means don't vmap over the axes of\
    \ the first argument but instead vmap over axis 0 of the second argument, which\
    \ is the batch of all the embeddings of all the tokens. Then we return the result,\
    \ which is an array that is the dot product of $x(i)$ against all other embeddings\
    \ but without the bias terms. We don't use the bias term in scoring because it\
    \ was used in part to soak up the popularity of very common tokens, and our scoring\
    \ function would be more interesting if we just used the dot product part of it\
    \ for scoring.\n\n## GloVE Model Training with Optax\n\nNext, let's take a look\
    \ at `wikipedia/train_cooccurrence.py`. Let's look specifically at the part where\
    \ the model is called to dig into some JAX specifics:\n\n```python\n@jax.jit\n\
    def apply_model(state, inputs, target):\n    \"\"\"Computes the gradients and\
    \ loss for a single batch.\"\"\"\n\n    # Define glove loss.\n    def glove_loss(params):\n\
    \        \"\"\"The GloVe weighted loss.\"\"\"\n        predicted = state.apply_fn({'params':\
    \ params}, inputs)\n        ones = jnp.ones_like(target)\n        weight = jnp.minimum(ones,\
    \ target / 100.0)\n        weight = jnp.power(weight, 0.75)\n        log_target\
    \ = jnp.log10(1.0 + target)\n        loss = jnp.mean(jnp.square(log_target - predicted)\
    \ * weight)\n        return loss\n\n    grad_fn = jax.value_and_grad(glove_loss)\n\
    \    loss, grads = grad_fn(state.params)\n\n    return grads, loss\n```\n\nThe\
    \ first point you will notice is the function decorator, `@jax.jit`. This tells\
    \ JAX that everything in the function is JITable. There are some requirements\
    \ for a function to be JITable—mostly that it is pure, which is a computer science\
    \ term indicating that if you call a function with the same arguments, you would\
    \ expect the same result. That function should not have any side effects and shouldn't\
    \ rely on a cached state such as a private counter or random-number generator\
    \ with implicit state. The tensors that are passed in as arguments should probably\
    \ also have fixed shape, because every new shape would trigger a new JIT compilation.\
    \ You can give hints to the compiler that certain parameters are constants with\
    \ `static_argnums`, but these arguments shouldn't change too frequently, or else\
    \ a lot of time will be spent compiling a program for each of these constants.\n\
    \nOne consequence of this pure function philosophy is that the model structure\
    \ and model parameters are separated. This way, the model functions are pure and\
    \ the parameters are passed in to the model functions, allowing the model functions\
    \ to be jitted. This is why we apply the model's `apply_fn` to the parameters\
    \ rather than simply having the parameters as part of the model.\n\nThis `apply_model`\
    \ function can then be compiled to implement the GloVE loss that we described\
    \ earlier. The other new functionality that JAX provides above NumPy is automatically\
    \ computing gradients of functions. The JAX function `value_and_grad` computes\
    \ the gradient of the loss with respect to the parameters. Since the gradient\
    \ always points in the direction in which the loss increases, we can use gradient\
    \ descent to go the other way and minimize the loss. The Optax library has a few\
    \ optimizers to pick from, including SGD (stochastic gradient descent with momentum)\
    \ and ADAM.\n\nWhen you run the training program, it will loop over the co-occurence\
    \ matrix and try to generate a succinct form of it by using the GloVE loss function.\
    \ After about an hour, you should be able to see the highest-scoring term.\n\n\
    The nearest neighbors for “democracy,” for example, are as follows: democracy:1.064498,\
    \ liberal:1.024733, reform:1.000746, affairs:0.961664, socialist:0.952792, organizations:0.935910,\
    \ political:0.919937, policy:0.917884, policies:0.907138, and --date:0.889342.\n\
    \nAs you can see, the query token itself is usually the highest-scoring neighbor,\
    \ but this is not necessarily true, as a very popular token might actually be\
    \ higher scoring to the token than the query token itself.\n\n## Summary\n\nAfter\
    \ reading this chapter, you should have a good overview of the basic ingredients\
    \ for assembling a recommender system. You have seen how to set up a basic Python\
    \ development environment; manage packages; specify inputs and outputs with flags;\
    \ encode data in various ways, including using protocol buffers; and process the\
    \ data with a distributed framework with PySpark. You also learned how to compress\
    \ gigabytes of data into a few megabytes of a model that is able to generalize\
    \ and quickly score items, given a query item.\n\nTake some time to play with\
    \ the code and read the documentation of the various packages referenced to get\
    \ a good sense of the basics. These foundational examples have widespread applications,\
    \ and having a firm grasp on them will make your production environments more\
    \ accurate."
  mdcn: "我们希望最小化的损失是预测值与实际值之间的平方差：\n\n```\ny_target = 1 + log_{10}(N)\nweight = min(1,\
    \ N/100)^{0.75}\nloss = weight * (y_{predicted} - y_{target})^2\n```\n\n损失函数中的加权项是为了防止非常常见的共现关系占据主导地位，同时降低罕见共现关系的权重。\n\
    \n## JAX 和 Flax 中的 GloVE 模型规范\n\n让我们看看基于 JAX 和 Flax 的 GloVE 模型的实现。这位于 GitHub 仓库的\
    \ *wikipedia/models.py* 文件中：\n\n```python\nimport flax\nfrom flax import linen\
    \ as nn\nfrom flax.training import train_state\nimport jax\nimport jax.numpy as\
    \ jnp\n\nclass Glove(nn.Module):\n    \"\"\"A simple embedding model based on\
    \ glove.\n    https://nlp.stanford.edu/projects/glove/\n    \"\"\"\n    num_embeddings:\
    \ int = 1024\n    features: int = 64\n\n    def setup(self):\n        self._token_embedding\
    \ = nn.Embed(self.num_embeddings,\n                                         self.features)\n\
    \        self._bias = nn.Embed(\n            self.num_embeddings, 1, embedding_init=flax.linen.initializers.zeros)\n\
    \n    def __call__(self, inputs):\n        \"\"\"Calculates the approximate log\
    \ count between tokens 1 and 2.\n        Args:\n            A batch of (token1,\
    \ token2) integers representing co-occurence.\n        Returns:\n            Approximate\
    \ log count between x and y.\n        \"\"\"\n        token1, token2 = inputs\n\
    \        embed1 = self._token_embedding(token1)\n        bias1 = self._bias(token1)\n\
    \        embed2 = self._token_embedding(token2)\n        bias2 = self._bias(token2)\n\
    \        dot_vmap = jax.vmap(jnp.dot, in_axes=[0, 0], out_axes=0)\n        dot\
    \ = dot_vmap(embed1, embed2)\n        output = dot + bias1 + bias2\n        return\
    \ output\n\n    def score_all(self, token):\n        \"\"\"Finds the score of\
    \ token vs all tokens.\n        Args:\n            max_count: The maximum count\
    \ of tokens to return.\n            token: Integer index of token to find neighbors\
    \ of.\n        Returns:\n            Scores of nearest tokens.\n        \"\"\"\
    \n        embed1 = self._token_embedding(token)\n        all_tokens = jnp.arange(0,\
    \ self.num_embeddings, 1, dtype=jnp.int32)\n        all_embeds = self._token_embedding(all_tokens)\n\
    \        dot_vmap = jax.vmap(jnp.dot, in_axes=[None, 0], out_axes=0)\n       \
    \ scores = dot_vmap(embed1, all_embeds)\n        return scores\n```\n\nFlax 使用起来相当简单；所有网络都继承自\
    \ Flax 的 linen 神经网络库，并且都是模块。Flax 模块也是 Python 数据类，因此模块的任何超参数都在模块开始时定义为变量。对于这个简单模型，我们只有两个：我们想要的嵌入数量（对应于词典中的标记数量）和嵌入向量的维度。接下来，在模块的设置中，我们实际创建了想要的层，即每个标记的偏置项和嵌入。\n\
    \n定义的下一部分是当我们使用此模块时调用的默认方法。在这种情况下，我们希望传入一对标记 $i, j$；将它们转换为嵌入 $x(i), x(j)$；然后计算预测的\
    \ $\\log(count(y_{predicted}))$。\n\n在这段代码中，我们遇到了 JAX 和 NumPy 之间的第一个区别——即向量化映射或\
    \ `vmap`。`vmap` 接收一个函数并以相同的方式应用于张量的轴；这使得编码更容易，因为你只需要考虑原始函数如何在较低秩的张量（如向量）上操作。在这个例子中，由于我们传入的是成对标记的批次，然后对它们进行嵌入，我们实际上有一个向量批次，因此我们希望在批次维度上运行点积。我们传入\
    \ JAX 的点积函数，该函数接受向量，在批次维度（即轴 0）上运行它，并告诉 `vmap` 将输出作为另一个批次维度（轴 0）返回。这使我们能够高效且简单地为低维张量编写代码，并通过在额外轴上进行\
    \ vmap 获得一个可以操作高维张量的函数。从概念上讲，这就像我们循环遍历第一个维度并返回一个点积数组。然而，通过将此过程转换为函数，我们允许 JAX 将此循环推送到可\
    \ JIT 编译的代码中，以便在 GPU 上快速运行。\n\n最后，我们还声明了辅助函数 `score_all`，它接受一个标记并将其与所有其他标记进行评分。同样，我们使用\
    \ `vmap` 将特定标记 $x(i)$ 与所有其他标记嵌入进行点积。这里的区别在于，由于 $x(i)$ 已经是一个向量，我们不需要对它进行 vmap。因此，在\
    \ `in_axes` 中，我们提供 `[None, 0]`，这意味着不对第一个参数的轴进行 vmap，而是对第二个参数（即所有标记的所有嵌入的批次）的轴\
    \ 0 进行 vmap。然后我们返回结果，这是一个数组，是 $x(i)$ 与所有其他嵌入的点积，但不包括偏置项。我们在评分时不使用偏置项，因为它部分用于吸收非常常见标记的流行度，如果我们只使用点积部分进行评分，我们的评分函数会更有趣。\n\
    \n## 使用 Optax 进行 GloVE 模型训练\n\n接下来，让我们看看 `wikipedia/train_cooccurrence.py`。让我们特别看看调用模型以深入了解一些\
    \ JAX 细节的部分：\n\n```python\n@jax.jit\ndef apply_model(state, inputs, target):\n\
    \    \"\"\"Computes the gradients and loss for a single batch.\"\"\"\n\n    #\
    \ Define glove loss.\n    def glove_loss(params):\n        \"\"\"The GloVe weighted\
    \ loss.\"\"\"\n        predicted = state.apply_fn({'params': params}, inputs)\n\
    \        ones = jnp.ones_like(target)\n        weight = jnp.minimum(ones, target\
    \ / 100.0)\n        weight = jnp.power(weight, 0.75)\n        log_target = jnp.log10(1.0\
    \ + target)\n        loss = jnp.mean(jnp.square(log_target - predicted) * weight)\n\
    \        return loss\n\n    grad_fn = jax.value_and_grad(glove_loss)\n    loss,\
    \ grads = grad_fn(state.params)\n\n    return grads, loss\n```\n\n你首先会注意到的是函数装饰器\
    \ `@jax.jit`。这告诉 JAX 函数中的所有内容都是可 JIT 编译的。函数要可 JIT 编译有一些要求——主要是它是纯函数，这是一个计算机科学术语，表示如果你用相同的参数调用一个函数，你会期望得到相同的结果。该函数不应有任何副作用，也不应依赖于缓存状态，例如私有计数器或具有隐式状态的随机数生成器。作为参数传入的张量可能还应该具有固定的形状，因为每个新形状都会触发新的\
    \ JIT 编译。你可以使用 `static_argnums` 向编译器提示某些参数是常量，但这些参数不应变化太频繁，否则将花费大量时间为每个这些常量编译程序。\n\
    \n这种纯函数哲学的一个结果是模型结构和模型参数是分离的。这样，模型函数是纯的，参数被传递给模型函数，允许模型函数被 JIT 编译。这就是为什么我们将模型的\
    \ `apply_fn` 应用于参数，而不是简单地将参数作为模型的一部分。\n\n然后可以编译这个 `apply_model` 函数以实现我们之前描述的 GloVE\
    \ 损失。JAX 在 NumPy 之上提供的另一个新功能是自动计算函数的梯度。JAX 函数 `value_and_grad` 计算损失相对于参数的梯度。由于梯度总是指向损失增加的方向，我们可以使用梯度下降朝相反方向走以最小化损失。Optax\
    \ 库有几个优化器可供选择，包括 SGD（带动量的随机梯度下降）和 ADAM。\n\n当你运行训练程序时，它将循环遍历共现矩阵，并尝试使用 GloVE 损失函数生成其简洁形式。大约一小时后，你应该能够看到得分最高的术语。\n\
    \n例如，“democracy”的最近邻如下：democracy:1.064498, liberal:1.024733, reform:1.000746,\
    \ affairs:0.961664, socialist:0.952792, organizations:0.935910, political:0.919937,\
    \ policy:0.917884, policies:0.907138, and --date:0.889342。\n\n如你所见，查询标记本身通常是得分最高的邻居，但这并不一定总是如此，因为一个非常流行的标记实际上可能比查询标记本身得分更高。\n\
    \n## 总结\n\n阅读本章后，你应该对构建推荐系统的基本要素有了很好的概述。你已经了解了如何设置基本的 Python 开发环境；管理包；使用标志指定输入和输出；以各种方式编码数据，包括使用协议缓冲区；以及使用\
    \ PySpark 的分布式框架处理数据。你还学习了如何将千兆字节的数据压缩成几兆字节的模型，该模型能够泛化并根据查询项快速评分项目。\n\n花些时间玩转代码并阅读引用的各种包的文档，以很好地掌握基础知识。这些基础示例具有广泛的应用，牢固掌握它们将使你的生产环境更加准确。"

  md: '> In particular, for $P(A, B)$, the previously defined correlation, $1 - P(A,
    B)$ yields a distance that satisfies all metric properties *except* the triangle
    inequality. There are several known ways to adjust this, though: $\sqrt{1 - P(A,
    B)^2}$ is the most common. For a survey, see “Metric Distances Derived from Cosine
    Similarity and Pearson and Spearman Correlations” by Stijn van Dongen and Anton
    J. Enright.


    # Explore-Exploit as a Recommendation System


    So far we’ve presented two ideas, slightly in tension with each other:


    +   - The MPIR, a simple, easy-to-understand recommender

    - The Matthew effect in recommendation systems and its runaway behavior in distributions
    of ratings


    By now, you likely realize that the MPIR will amplify the Matthew effect and that
    the Matthew effect will drive the MPIR to the trivial recommender in the limit.
    This is the classic difficulty of maximizing a loss function with no randomization:
    it quickly settles into a modal state.


    This problem—and many others like it—encourages some modification to the algorithm
    to prevent this failure mode and continues to expose the algorithm and users to
    other options. The basic strategy for *explore-exploit schemes*, or *multiarmed
    bandits* as they’re called, is to take not only the outcome-maximizing recommendation
    but also a collection of alternative *variants*, and randomly determine which
    to use as a response.


    Taking a step back: given a collection of variant recommendations, or *arms*,
    $A$, for which the outcome of each recommendation is $y_l$, we have a prior reward
    function $R(y_l)$. The bandit (called an *agent* in this literature) would like
    to maximize $R(y_l)$ but doesn’t know the distribution of the outcomes $Y_{a \in
    A}$. The agent thus assumes some prior distributions for $Y_{a \in A}$ and then
    collects data to update those distributions; after sufficient observations, the
    agent can estimate the expected values of each distribution, $\mu_{a \in A} =
    \mathbb{E}(\mathscr{R}(Y_a))$.


    If the agent was able to confidently estimate these reward values, the recommendation
    problem would be solved: at inference, the agent would simply estimate the reward
    values for all variants for the user and select the reward-optimizing *arm*. This
    is, of course, ridiculous in totality, but the basic idea is useful nonetheless:
    hold prior assumptions about what will be the greatest expected reward, and explore
    alternatives with some frequency to continue to update the distributions and refine
    your estimators.'

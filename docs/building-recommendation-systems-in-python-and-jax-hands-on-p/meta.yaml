    \ into a search bar the query **flowers**. We would then expect a set of items\
    \ most representative of flowers to be in the top results. This demonstrates that\
    \ the query is an important consideration of the scoring function.\n\nWith a linear\
    \ model, if $X$ is the item vector and $Y$ is the output, then we learn $W$, where\
    \ $WX(i) = NDCG(i)$ and $NDCG(i)$ is the NDCG for item $i$. Regression can be\
    \ learned using the L2 loss in Optax.\n\nUltimately, this approach is about attempting\
    \ to learn the underlying features of items that lead to higher-rank scores in\
    \ your personalization metric. Unfortunately, this also fails to explicitly consider\
    \ the relative ordering of items. This is a pretty serious limitation, which we'll\
    \ consider shortly.\n\nAnother consideration: what do we do for items that aren't\
    \ ranked outside of the top-$k$ training items? The rank we would assign them\
    \ would be essentially random, as we do not know what number to assign them. Therefore,\
    \ this method needs improvement, which we'll explore in the next section.\n\n\
    Suppose we have a web page such as an online bookstore, and users have to browse\
    \ through and click items in order to purchase them. For such a funnel, we could\
    \ break the ranking into two parts. The first model could predict the probability\
    \ of a click on an item, given a set of items on display. The second model could\
    \ be conditioned on a click-through and could be a regression model estimating\
    \ the purchase price of the item.\n\nThen, a full ranking model could be the product\
    \ of two models. The first one computes the probability of clicking through an\
    \ item, given a set of competing items. And the second one computes the expected\
    \ value of a purchase, given that it had been clicked. Notice that the first and\
    \ second model could have different features, depending on the stage of the funnel\
    \ a user is in. The first model has access to features of competing items, while\
    \ the second model might take into account shipping costs and discounts applied\
    \ that might change the value of an item. Thus, in this setting, it would be advantageous\
    \ to model both stages of the funnel with different models so as to make use of\
    \ the most amount of information present at each stage of the funnel.\n\n## WARP\n\
    \nOne possible way to generate a ranking loss stochastically is introduced in\
    \ “WSABIE: Scaling Up to Large Vocabulary Image Annotation” by Jason Weston et\
    \ al. The loss is called *weighted approximate rank pairwise* (WARP). In this\
    \ scheme, the loss function is broken into what looks like a pairwise loss. More\
    \ precisely, if a higher-ranked item doesn't have a score that is greater than\
    \ the margin (which is arbitrarily picked to be 1) for a lower-rank item, we apply\
    \ the *hinge loss* to the pair of items. This looks like the following:\n\n$max(0,\
    \ 1 - score(pos) + score(neg))$\n\nWith a linear model, if $X_{pos}$ is the positive\
    \ item vector, and $X_{neg}$ is the negative item vector, then we learn $W$, where\
    \ $WX_{pos} - WX_{neg} > 1$. The loss for this is *hinge loss*, where the predictor\
    \ output is $WX_{pos} - WX_{neg}$ and the target is 1.\n\nHowever, to compensate\
    \ for the fact that an unobserved item might not be a true negative, just something\
    \ unobserved, we count the number of times we had to sample from the negative\
    \ set to find something that violates the ordering of the chosen pair. That is,\
    \ we count the number of times we had to look for something where:\n\n$score(neg)\
    \ > score(pos) - 1$\n\nWe then construct a monotonically decreasing function of\
    \ the number of times we sample the universe of items (less the positives) for\
    \ a violating negative and look up the weight for this number and multiply the\
    \ loss with it. If it's very hard to find a violating negative, the gradient should\
    \ therefore be lower because either we are close to a good solution already or\
    \ the item was never seen before, so we should not be so confident as to assign\
    \ it a low score just because it was never shown to the user as a result for a\
    \ query.\n\nNote that WARP loss was developed when CPUs were the dominant form\
    \ of computation to train ML models. As such, an approximation to ranking was\
    \ used to obtain the rank of a negative item. The *approximate rank* is defined\
    \ as the number of samples with replacement in the universe of items (less the\
    \ positive example) before we find a negative item whose score is larger than\
    \ the positive by an arbitrary constant, called a *margin*, of 1.0.\n\nTo construct\
    \ the WARP weight for the pairwise loss, we need a function to go from the approximate\
    \ rank of the negative item to the WARP weight. A relatively simple bit of code\
    \ to compute this is as follows:\n\n```python\nimport numpy as np\n\ndef get_warp_weights(n:\
    \ int) -> np.ndarray:\n    \"\"\"Returns N weights to convert a rank to a loss\
    \ weight.\"\"\"\n\n    # The alphas are defined as values that are monotonically\
    \ decreasing.\n    # We take the reciprocal of the natural numbers for the alphas.\n\
    \    rank = np.arange(1.0, n + 1, 1)\n    alpha = 1.0 / rank\n    weights = alpha\n\
    \n    # This is the L in the paper, defined as the sum of all previous alphas.\n\
    \    for i in range(1, n):\n        weights[i] = weights[i] + weights[i - 1]\n\
    \n    # Divide by the rank.\n    weights = weights / rank\n    return weights\n\
    \nprint(get_warp_weights(5))\n# [1.          0.75        0.61111111 0.52083333\
    \ 0.45666667]\n```\n\nAs you can see, if we find a negative immediately, the WARP\
    \ weight is 1.0, but if it is very difficult to find a negative that violates\
    \ the margin, the WARP weight will be small.\n\nThis loss function is approximately\
    \ optimizing precision@k, and thus a good step toward improving rank estimates\
    \ in the retrieved set. Even better, WARP is computationally efficient via sampling\
    \ and thus more memory efficient.\n\n## k-order Statistic\n\nIs there a way to\
    \ improve upon the WARP loss and straight-up pairwise hinge loss? Turns out there\
    \ are a whole spectrum of ways. In “Learning to Rank Recommendations with the\
    \ k-order Statistic Loss”, Jason Weston et al. (including one of this book’s coauthors)\
    \ show how this can be done by exploring the variants of losses between hinge\
    \ loss and WARP loss. The authors of the paper conducted experiments on various\
    \ corpora and show how the trade-off between optimizing for a single pairwise\
    \ versus selecting a harder negative like WARP affects metrics including mean\
    \ rank and precision and recall at k.\n\nThe key generalization is that instead\
    \ of a single positive item considered during the gradient step, the model uses\
    \ all of them.\n\nRecall again that picking a random positive and a random negative\
    \ pair optimizes for the ROC, or AUC. This isn’t great for ranking because it\
    \ doesn’t optimize for the top of the list. WARP loss, on the other hand, optimizes\
    \ for the top of the ranking list for a single positive item but does not specify\
    \ how to pick the positive item.\n\nSeveral alternate strategies can be used for\
    \ ordering the top of the list, including optimizing for mean maximum rank, which\
    \ tries to group the positive items such that the lowest-scoring positive item\
    \ is as near the top of the list as possible. To allow this ordering, we provide\
    \ a probability distribution function over how we pick the positive sample. If\
    \ the probability is skewed toward the top of the positive item list, we get a\
    \ loss more like WARP loss. If the probability is uniform, we get AUC loss. If\
    \ the probability is skewed toward the end of the positive item list, we then\
    \ optimize for the worst case, like mean maximum rank. The NumPy function np.random.choice\
    \ provides a mechanism from sampling from a distribution $P$.\n\nWe have one more\
    \ optimization to consider: $K$, the number of positive samples to use to construct\
    \ the positive set. If $K = 1$, we pick only a positive random item from the positive\
    \ set; otherwise, we construct the positive set, order the samples by score, and\
    \ sample from the positive list of size $K$ by using the probability distribution\
    \ $P$. This optimization made sense in the era of CPUs when compute was expensive\
    \ but might not make that much sense these days in the era of GPUs and TPUs, which\
    \ we will talk about in the following warning.\n\n![](img/da17d05291861831978609329c481581_254_0.png)\n\
    \n## Stochastic Losses and GPUs\n\nA word of caution about the preceding stochastic\
    \ losses. They were developed for an earlier era of CPUs when it was cheap and\
    \ easy to sample and exit if a negative sample was found. These days, with modern\
    \ GPUs, making branching decisions like this is harder because all the threads\
    \ on the GPU core have to run the same code over different data in parallel. That\
    \ usually means both sides of a branch are taken in a batch, so less computational\
    \ savings occur from these early exits. Consequently, branching code that approximates\
    \ stochastic losses like WARP and $k$-order statistic loss appear less efficient.\n\
    \nWhat are we to do? We will show in Chapter 13 how to approximate these losses\
    \ in code. Long story short, because of the way vector processors like GPUs tend\
    \ to work by processing lots of data in parallel uniformly, we have to find a\
    \ GPU-friendly way to compute these losses. In the next chapter, we approximate\
    \ the negative sampling by generating a large batch of negatives and either scoring\
    \ them all lower than the negative or looking for the most egregious violating\
    \ negative or both together as a blend of loss functions."

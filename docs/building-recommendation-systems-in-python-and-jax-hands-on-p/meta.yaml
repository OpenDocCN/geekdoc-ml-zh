    # Propensity Weighting for Recommendation System Evaluation


    As you''ve seen, recommendation systems are evaluated based on user feedback,
    which is collected from the deployed recommendation system. However, this data
    is causally influenced by the deployed system, creating a feedback loop that may
    bias the evaluation of new models. This feedback loop can lead to confounding
    variables, making it difficult to distinguish between user preferences and the
    influence of the deployed system.


    If this surprises you, let''s consider for a moment what would have to be true
    for a recommendation system to *not* causally influence the actions users take
    and/or the outcomes that result from those actions. That would require assumptions
    like “the recommendations are completely ignored by the user” and “the system
    makes recommendations at random.” Propensity weighting can mitigate some of the
    worst effects of this problem.


    The performance of a recommender system depends on many factors, including user-item
    characteristics, contextual information, and trends, which can affect the quality
    of the recommendations and the user engagement. However, the influence can be
    mutual: the user interactions influence the recommender, and vice versa. Evaluating
    the causal effect of a recommender system on user behavior and satisfaction is
    therefore a challenging task, as it requires controlling for potential confounding
    factors—those that may affect both the treatment assignment (the recommendation
    strategy) and the outcome of interest (the user''s response to the recommendations).


    Causal inference provides a framework for addressing these challenges. In the
    context of recommender systems, causal inference can help answer questions such
    as these:


    +   - How does the choice of recommendation strategy affect user engagement, such
    as CTRs, purchase rates, and satisfaction ratings?

    - What is the optimal recommendation strategy for a given user segment, item category,
    or context?

    - What are the long-term effects of a recommendation strategy on user retention,
    loyalty, and lifetime value?'
- md: 'We''ll round out this chapter by introducing one aspect of causal inference
    important to recommender systems, based on the concept of propensity score. We''ll
    introduce propensity to quantify the adjusted likelihood of some items being shown
    to the user. We''ll then see how this interacts with the famous Simpson''s paradox.


    ## Propensity


    In many data science problems, we are forced to contend with confounders and,
    notably, the correlation between those confounders and a target outcome. Depending
    on the setting, the confounder may be of a variety of forms. Interestingly, in
    recommendation systems, that confounder can be the system itself! Offline evaluation
    of recommendation systems is subject to confounders derived from the item selection
    behavior of users and the deployed recommendation system.


    If this issue seems a bit circular, it kind of is. This is sometimes called *closed-loop
    feedback*. One approach to mitigation is propensity weighting, which aims to address
    this problem by considering each feedback in the corresponding stratum based on
    the estimated propensities. You may recall that *propensity* refers to the likelihood
    of a user seeing an item; by inversely weighting by this, we can offset the selection
    bias. Compared to the standard offline holdout evaluation, this method attempts
    to represent the actual utility of the examined recommendation models.


    ![](img/da17d05291861831978609329c481581_228_0.png)


    ## Utilizing Counterfactuals


    One other approach to mitigating selection bias that we won''t dive into is *counterfactual
    evaluation*, which estimates the actual utility of a recommendation model with
    propensity-weighting techniques more similar to off-policy evaluation approaches
    in reinforcement learning (RL). However, counterfactual evaluation often relies
    on accurate logging propensities in an open-loop setting where some random items
    are exposed to the user, which is not practical for most recommendation problems.
    If you have the option to include randomized recommendations to users for rating,
    this can help de-bias as well. One such setting where these methods may be combined
    is in RL-based recommenders that use explore-exploit methods like a multiarmed
    bandit or other structured randomization.


    *Inverse propensity scoring (IPS)* is a propensity-based evaluation method that
    leverages importance sampling to account for the fact that the feedback collected
    from the deployed recommendation system is not uniformly random. The propensity
    score is a balancing factor that adjusts the observed feedback distribution conditioned
    on the propensity score. The IPS evaluation method is theoretically unbiased if
    open-loop feedback can be sampled from all possible items uniformly at random.
    In Chapter 3, we discussed the Matthew effect, or “the rich get richer” for recommendation
    systems; IPS is one way to combat this effect. Note the relationship here between
    the two ideas of the Matthew effect and Simpson''s paradox, when within different
    strata, selection effects create significant biasing.


    Propensity weighting is based on the idea that the probability of an item being
    exposed to a user by the deployed recommendation system (the propensity score)
    affects the feedback that is collected from that user. By reweighting the feedback
    based on the propensity scores, we can adjust for the bias introduced by the deployed
    system and obtain a more accurate evaluation of the new recommendation model.


    To apply IPS, we need to estimate the propensity scores for each item-user interaction
    in the collected feedback dataset. This can be done by modeling the probability
    that the deployed system would have exposed the item to the user at the time of
    the interaction. One simple approach is to use the popularity of the item as a
    proxy for its propensity score. However, more sophisticated methods can be used
    to model the propensity scores based on user and item features, as well as the
    context of the interaction.


    Once the propensity scores are estimated, we can reweight the feedback by using
    importance sampling. Specifically, each feedback is weighted by the inverse of
    its propensity score so that items that are more likely to be exposed by the deployed
    system are downweighted, while items that are less likely to be exposed are upweighted.
    This reweighting process approximates a counterfactual distribution of feedback
    expected from surfacing recommendations from a uniform distribution of popularity.


    Finally, we can use the reweighted feedback to evaluate the new recommendation
    model via standard metrics for evaluation, as we''ve seen in this chapter. The
    effectiveness of the new model is then compared to that of the deployed system
    by using the reweighted feedback, providing a fairer and more accurate evaluation
    of the new model''s performance.


    ## Simpson''s and Mitigating Confounding


    *Simpson''s paradox* is predicated on the idea of a confounding variable that
    establishes strata within which we see (potentially misleading) covariation. This
    paradox arises when the association between two variables is investigated but
    these variables are strongly influenced by a confounding variable.


    In the case of recommendation systems, this confounding variable is the deployed
    model''s characteristics and tendencies of selection. The propensity score is
    introduced as a measure of a system''s deviation from an unbiased open-loop exposure
    scenario. This score allows for the design and analysis of offline evaluation
    of recommendation models based on the observed closed-loop feedback, mimicking
    some of the particular characteristics of the open-loop scenario.


    Traditional descriptions of Simpson''s paradox often suggest stratification, a
    well-known approach to identify and estimate causal effects by first identifying
    the underlying strata before investigating causal effects in each stratum. This
    approach enables the measurement of the potential outcome irrespective of the
    confounding variable. For recommendation systems, this involves stratifying the
    observed outcome based on the possible values of the confounding variable, which
    is the deployed model''s characteristics.


    The user-independent propensity score is estimated via a two-step generative process
    using the prior probability that an item is recommended by the deployed model
    and the conditional probability that the user interacts with the item, given that
    it is recommended. Based on a set of mild assumptions (but too mathematically
    technical to cover here), the user-independent propensity score can be estimated
    using maximum likelihood for each dataset.


    We need to define the user-propensity score $p_{u, i}$ which indicates the tendency—or
    frequency—of the deployed model to expose item $i \in I$ to user $u \in U$. In
    practice, we marginalize over users to get the user-independent propensity score
    $p_{\cdot, i}$. As described in "Unbiased Offline Recommender Evaluation for Missing-Not-at-Random
    Implicit Feedback" by Longqi Yang et al., the equation is as follows:


    $$p_{\cdot, i} \propto (n_i^*)^{\frac{\gamma + 1}{2}}$$


    Here, $n_i^*$ is the total number of times item $i$ interacted with, and $\gamma$
    is a parameter that affects the propensity distributions over items with different
    observed popularity. The power-law parameter $\gamma$ affects the propensity distributions
    over items and depends on the examined dataset; we estimate the $\gamma$ parameter
    by using maximum likelihood for each dataset.


    With these estimates for propensity, we can then apply a simple inverse weighting
    $w_i = \frac{1}{p_i}$ when calculating the effect of feedback. Finally, we can
    combine these weightings with propensity matching, to generate counterfactual
    recommendations; by collecting approximately equal propensity items into strata,
    we can then use these strata as our confounding variable.


    ![](img/da17d05291861831978609329c481581_231_0.png)


    ## Doubly Robust Estimation


    Doubly robust estimation (DRE) is a method that combines two models: one that
    models the probability of receiving the treatment (being recommended an item by
    the deployed model) and one that models the outcome of interest (the user''s feedback
    on the item). The weights used in DRE depend on the predicted probabilities from
    both models. This method has the advantage that it can still provide unbiased
    estimates even if one of the models is misspecified.


    The structural equations for a doubly robust estimator with propensity score weighting
    and outcome model is as follows:


    $$\Theta = \frac{\sum w_i(Y_i - f(X_i))}{\sum w_i(T_i - p_i) + \sum w_i(p_i(1
    - p_i)^2(f(X_i) - f^*(X_i)))}$$


    Here, $Y_i$ is the outcome, $X_i$ are covariates, $T_i$ is the treatment, $p_i$
    is the propensity score, $w_i$ is the weight, $f(X_i)$ is the outcome model, and
    $f^*(X_i)$ is the estimated outcome model.


    For a great introduction to these considerations, check out "Give Me a Robust
    Estimator—and Make It a Double!".


    ## Summary


    What a whirlwind! Latent spaces are one of the *most* important aspects of recommendation
    systems. They are the representations that we use to encode our users and items.
    Ultimately, latent spaces are about more than dimension reduction; they are about
    understanding a geometry in which measures of distance encode the meaning relevant
    to your ML task.


    The world of embeddings and encoders runs deep. We haven''t had time to discuss
    CLIP embeddings (image + text) or the Poincaré disk (naturally hierarchical distance
    measures). We didn''t dive deep into UMAP (a nonlinear density-aware dimension-reduction
    technique) or HNSW (a method for retrieval in latent spaces that respects local
    geometry well). Instead, we point you to the (contemporaneously published) article
    by Vicki Boykis on embeddings, the essay and guide to constructing embeddings
    by Karel Minařík, or the beautiful visual guide to text embeddings by Meor Amer
    from Cohere.


    We''re now equipped with representations, but next we need to optimize. We''re
    building *personalized* recommendation systems, so let''s define the metrics that
    measure our performance on our task.'
  mdcn: '我们将通过介绍因果推断中一个对推荐系统至关重要的方面来结束本章，这个方面基于倾向得分的概念。我们将引入倾向性来量化某些物品被展示给用户的调整后可能性。然后，我们将看到这与著名的辛普森悖论如何相互作用。


    ## 倾向性


    在许多数据科学问题中，我们不得不应对混杂因素，尤其是这些混杂因素与目标结果之间的相关性。根据具体情况，混杂因素可能有多种形式。有趣的是，在推荐系统中，混杂因素可能就是系统本身！推荐系统的离线评估受到用户物品选择行为和已部署推荐系统所带来的混杂因素的影响。


    如果这个问题看起来有点循环，那确实如此。这有时被称为*闭环反馈*。一种缓解方法是倾向性加权，它旨在通过基于估计的倾向性在相应的层中考虑每个反馈来解决这个问题。你可能还记得，*倾向性*指的是用户看到某个物品的可能性；通过对其进行反向加权，我们可以抵消选择偏差。与标准的离线留出评估相比，这种方法试图代表所考察推荐模型的实际效用。


    ![](img/da17d05291861831978609329c481581_228_0.png)


    ## 利用反事实


    另一种缓解选择偏差的方法是我们不会深入探讨的*反事实评估*，它使用更类似于强化学习（RL）中离线策略评估方法的倾向性加权技术来估计推荐模型的实际效用。然而，反事实评估通常依赖于在开环设置中准确记录倾向性，其中一些随机物品暴露给用户，这对于大多数推荐问题来说并不实用。如果你可以选择向用户展示随机推荐以供评分，这也有助于去偏。这些方法可以结合使用的一种场景是基于强化学习的推荐器，它们使用探索-利用方法，如多臂老虎机或其他结构化随机化。


    *逆倾向性评分（IPS）*是一种基于倾向性的评估方法，它利用重要性采样来解释从已部署推荐系统收集的反馈并非均匀随机的事实。倾向性得分是一个平衡因子，它根据倾向性得分调整观察到的反馈分布。如果可以从所有可能的物品中均匀随机地采样开环反馈，IPS评估方法在理论上是无偏的。在第3章中，我们讨论了马太效应，或推荐系统中的“富者愈富”；IPS是应对此效应的一种方法。注意马太效应和辛普森悖论这两个概念之间的关系，当在不同层内时，选择效应会产生显著的偏差。


    倾向性加权基于这样一个观点：物品通过已部署推荐系统暴露给用户的概率（倾向性得分）会影响从该用户收集到的反馈。通过对反馈基于倾向性得分进行重新加权，我们可以调整已部署系统引入的偏差，并获得对新推荐模型更准确的评估。


    要应用IPS，我们需要估计收集到的反馈数据集中每个物品-用户交互的倾向性得分。这可以通过建模已部署系统在交互时将物品暴露给用户的概率来实现。一种简单的方法是使用物品的流行度作为其倾向性得分的代理。然而，可以使用更复杂的方法基于用户和物品特征以及交互上下文来建模倾向性得分。


    一旦估计出倾向性得分，我们就可以通过使用重要性采样对反馈进行重新加权。具体来说，每个反馈以其倾向性得分的倒数进行加权，这样更可能被已部署系统暴露的物品被降权，而不太可能被暴露的物品被升权。这个重新加权过程近似于从均匀分布的流行度中呈现推荐所期望的反馈的反事实分布。


    最后，我们可以使用重新加权的反馈，通过本章中看到的标准评估指标来评估新的推荐模型。然后，通过使用重新加权的反馈，将新模型的有效性与已部署系统的有效性进行比较，从而对新模型的性能提供更公平、更准确的评估。


    ## 辛普森悖论与缓解混杂


    *辛普森悖论*基于一个混杂变量的概念，该变量建立了层，我们在其中看到（可能具有误导性的）协变。当研究两个变量之间的关联但这些变量受到混杂变量的强烈影响时，就会出现这种悖论。


    在推荐系统的情况下，这个混杂变量是已部署模型的特征和选择倾向。倾向性得分被引入作为系统偏离无偏开环暴露场景的度量。该得分允许基于观察到的闭环反馈设计和分析推荐模型的离线评估，模拟开环场景的一些特定特征。


    辛普森悖论的传统描述通常建议分层，这是一种众所周知的方法，通过首先识别底层层，然后在每层中研究因果效应来识别和估计因果效应。这种方法能够测量与混杂变量无关的潜在结果。对于推荐系统，这涉及根据混杂变量的可能值（即已部署模型的特征）对观察到的结果进行分层。


    用户无关的倾向性得分通过两步生成过程估计，使用物品被已部署模型推荐的先验概率，以及给定物品被推荐时用户与物品交互的条件概率。基于一组温和的假设（但数学上过于技术性，此处不涵盖），可以使用最大似然法为每个数据集估计用户无关的倾向性得分。


    我们需要定义用户倾向性得分 $p_{u, i}$，它表示已部署模型将物品 $i \in I$ 暴露给用户 $u \in U$ 的倾向或频率。在实践中，我们对用户进行边缘化以获得用户无关的倾向性得分
    $p_{\cdot, i}$。正如Longqi Yang等人在《Unbiased Offline Recommender Evaluation for Missing-Not-at-Random
    Implicit Feedback》中所描述的，公式如下：


    $$p_{\cdot, i} \propto (n_i^*)^{\frac{\gamma + 1}{2}}$$


    这里，$n_i^*$ 是物品 $i$ 被交互的总次数，$\gamma$ 是一个影响不同观察流行度物品倾向性分布的参数。幂律参数 $\gamma$ 影响物品的倾向性分布，并取决于所考察的数据集；我们通过使用每个数据集的最大似然法来估计
    $\gamma$ 参数。


    有了这些倾向性估计，我们就可以在计算反馈效应时应用简单的逆加权 $w_i = \frac{1}{p_i}$。最后，我们可以将这些加权与倾向性匹配结合起来，生成反事实推荐；通过将倾向性大致相等的物品收集到层中，我们可以将这些层用作我们的混杂变量。


    ![](img/da17d05291861831978609329c481581_231_0.png)


    ## 双重稳健估计


    双重稳健估计（DRE）是一种结合两个模型的方法：一个建模接受处理（被已部署模型推荐一个物品）的概率，另一个建模感兴趣的结果（用户对物品的反馈）。DRE中使用的权重取决于两个模型的预测概率。这种方法的优点在于，即使其中一个模型设定错误，它仍然可以提供无偏估计。


    具有倾向性得分加权和结果模型的双重稳健估计器的结构方程如下：


    $$\Theta = \frac{\sum w_i(Y_i - f(X_i))}{\sum w_i(T_i - p_i) + \sum w_i(p_i(1
    - p_i)^2(f(X_i) - f^*(X_i)))}$$


    这里，$Y_i$ 是结果，$X_i$ 是协变量，$T_i$ 是处理，$p_i$ 是倾向性得分，$w_i$ 是权重，$f(X_i)$ 是结果模型，$f^*(X_i)$
    是估计的结果模型。


    关于这些考虑的一个很好的介绍，请查看《Give Me a Robust Estimator—and Make It a Double!》。


    ## 总结


    真是旋风般的一章！潜在空间是推荐系统*最*重要的方面之一。它们是我们用来编码用户和物品的表示。最终，潜在空间不仅仅是关于降维；它们是关于理解一种几何结构，其中距离度量编码了与你的机器学习任务相关的意义。


    嵌入和编码器的世界博大精深。我们没有时间讨论CLIP嵌入（图像+文本）或庞加莱圆盘（自然层次化的距离度量）。我们没有深入探讨UMAP（一种非线性密度感知降维技术）或HNSW（一种在潜在空间中检索的方法，能很好地尊重局部几何结构）。相反，我们向你推荐Vicki
    Boykis关于嵌入的文章（同期发表），Karel Minařík关于构建嵌入的文章和指南，或者Cohere的Meor Amer关于文本嵌入的精美可视化指南。


    我们现在有了表示，但接下来我们需要优化。我们正在构建*个性化*推荐系统，因此让我们定义衡量我们在任务上表现的指标。'

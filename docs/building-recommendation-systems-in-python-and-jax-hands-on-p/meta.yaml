  md: "The first piece of code is the evaluation step. To compute the affinities of\
    \ the entire corpus, we pass in the album and artist indices for every possible\
    \ track in the corpus to the model and then sort them using jax.lax.top_k. The\
    \ first two lines are the scoring code for recommending the next tracks from the\
    \ context during recommendations. LAX is a utility library that comes with JAX\
    \ that contains functions outside of the NumPy API that are handy to work with\
    \ vector processors like GPUs and TPUs. In the Spotify Million Playlist Dataset\
    \ Challenge, one of the metrics is the recall@k at the artist and track level.\
    \ For the tracks, the isin function returns the correct metric of the intersection\
    \ of the next tracks and the top 500 scoring tracks of the corpus divided by the\
    \ size of the set of next tracks. This is because the tracks are unique in the\
    \ corpus. However, JAX's isin doesn't support making the elements unique, so for\
    \ the artist recall metric, we might count artists in the recall set more than\
    \ once. For the sake of computational efficiency, we use the multiple counts instead\
    \ so that the evaluation might be computed quickly on the GPU so as not to stall\
    \ the training pipeline. On a final evaluation, we might want to move the dataset\
    \ to a CPU for a more accurate metric.\n\nWe use Weights & Biases again to track\
    \ all the metrics, as depicted in Figure 13-1. You can see how they fare with\

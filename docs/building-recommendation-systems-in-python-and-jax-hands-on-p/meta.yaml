    \ are similar to those fans.\n\nThese may sound identical, but they appear differently\
    \ in the mathematical interpretations. At a high level, the difference is in deciding\
    \ which kind of similarity your recommender should prioritize: user similarity\
    \ or item similarity.\n\nIf you prioritize *user similarity*, then to provide\

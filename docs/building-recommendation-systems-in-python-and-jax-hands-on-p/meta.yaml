    ## 共现模型


    在我们的维基百科共现示例中，我们确定了两个物品之间的共现结构可用于生成相似度度量。我们介绍了 PMI 如何利用共现计数，并基于购物车中物品与其他物品之间极高的互信息进行推荐。


    正如我们所讨论的，PMI 不是一个距离度量，但它仍然基于共现提供了重要的相似度度量。让我们回到这个话题。


    回顾一下，PMI 的定义如下：


    $$\frac{p(x_i, x_j)}{p(x_i) * p(x_j)} = \frac{(C_{ij})_{x_i, x_j} * \#(\text{total
    interactions})}{\#(x_i) * \#(x_j)}$$


    现在让我们考虑*离散共现分布* $CD_{x_i}$，它定义为所有其他 $x_j$ 上的共现集合：


    $$CD_{x_i} = (C_{ij})_{x_i, x_1}, ..., (C_{ij})_{x_i, x_j}, ..., (C_{ij})_{x_i,
    x_N}$$


    这里，$j \in 1...N$，$N$ 是物品总数。这表示 $x_i$ 与所有其他物品之间的共现直方图。通过引入这个离散分布，我们可以利用另一个工具：Hellinger
    距离。


    我们可以通过几种方式衡量分布距离，每种方式都有不同的优势。在我们的讨论中，我们将不深入探讨差异，而是坚持使用最简单但最合适的。Hellinger 距离定义如下：


    $$H(P, Q) = \sqrt{1 - \sum_{i}^{n} \sqrt{p_i q_i}} = \frac{1}{\sqrt{2}} \| \sqrt{P}
    - \sqrt{Q} \|_2$$


    $P = \langle p_i \rangle$ 和 $Q = \langle q_i \rangle$ 是两个概率密度向量。在我们的设定中，$P$ 和
    $Q$ 可以是 $CD_{x_i}$ 和 $CD_{x_j}$。


    这个过程背后的动机是，我们现在有了一个纯粹基于共现的、物品之间的合适距离。我们可以对这个几何结构应用任何维度变换或降维。稍后我们将展示降维技术，这些技术可以使用任意距离矩阵，并将其降维到一个近似的低维嵌入空间。


    ![](img/da17d05291861831978609329c481581_191_0.png)


    ## 那么测度空间和信息论呢？


    在我们讨论分布时，你可能会想：“是否存在一种分布之间的距离，使得分布成为潜在空间中的点？”哦，你没这么想？好吧，无论如何我们还是要讨论一下。


    简短的回答是，我们可以衡量分布之间的差异。最流行的是 Kullback–Leibler (KL) 散度，它通常在贝叶斯意义上被描述为：当期望分布为 Q 时，看到分布
    P 所带来的惊讶程度。然而，KL 不是一个合适的距离度量，因为它是非对称的。


    另一个具有某些良好性质的对称距离度量是 Hellinger 距离。Hellinger 距离实际上是 2-范数测度论距离。此外，Hellinger 距离自然地推广到离散分布。


    如果这仍然没有满足你对抽象的渴望，我们还可以考虑全变差距离，它是 Fisher 精确距离度量空间中的极限，这确实意味着它具有两个分布之间距离的所有良好性质，并且没有任何度量会认为它们更不相似。嗯，除了一个：它不是平滑的。如果你还需要可微性所需的平滑性，你需要通过偏移来近似它。


    如果你需要分布之间的距离，就使用 Hellinger 距离。


    ## 降低推荐问题的秩


    我们已经看到，随着物品和用户数量的增长，我们推荐问题的维度会迅速增加。因为我们用列或向量表示每个物品和用户，这以 $n^2$ 的规模增长。应对这一困难的一种方法是通过秩约简；回想一下我们之前关于通过分解进行秩约简的讨论。


    像许多整数一样，许多矩阵可以被*分解*成更小的矩阵；对于整数，*更小*意味着数值更小，对于矩阵，*更小*意味着维度更小。当我们分解一个 $N \times
    M$ 矩阵时，我们将寻找两个矩阵 $U_{N \times d}$ 和 $V_{d \times M}$；请注意，当矩阵相乘时，它们必须共享一个维度，该维度被消除，留下另外两个维度。这里，我们将考虑
    $d \le N$ 且 $d \le M$ 的矩阵分解。通过分解矩阵，我们要求两个矩阵共同等于或近似于原始矩阵：


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    我们寻求一个较小的 $d$ 值以减少潜在维度的数量。你可能已经注意到，矩阵 $U_{N \times d}$ 和 $V_{d \times M}$ 中的每一个都将对应于原始评分矩阵的行或列。然而，它们以更少的维度表示。这利用了*低维潜在空间*的概念。直观地说，潜在空间试图用两组关系来表示与完整
    $N \times M$ 维关系相同的关系：物品与潜在特征，以及用户与潜在特征。


    这些方法在其他类型的机器学习中也很流行，但在我们的案例中，我们主要关注分解评分或交互矩阵。


    ## 通过 SVD 进行矩阵分解


    SVD 和 MF 密切相关，但 SVD 是一个重要的特例。关键区别在于分解的执行方式以及每种方法可以应用的矩阵类型。


    图 10-2 展示了 SVD 的工作原理。特征向量 $e1$ 和 $e2$ 对应于最大的两个特征值。$e1$ 比 $e2$ 解释了更多的数据，并沿着点分布最广的方向。特征向量总是彼此垂直的，因此它们的点积总是
    0。


    ![](img/da17d05291861831978609329c481581_192_0.png)


    图 10-2. 奇异值分解'

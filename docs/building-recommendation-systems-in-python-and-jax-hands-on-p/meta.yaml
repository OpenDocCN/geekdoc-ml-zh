    ![](img/da17d05291861831978609329c481581_53_0.png)


    # Item-Based Collaborative Filtering


    While the equations are different, in this section, they apply similarly to item-based
    CF. Similarity in items exhibits the same inheritance of the Zipfian in their
    scores, and items consulted in the CF process drop off by rank.


    # User Similarity for Collaborative Filtering


    In mathematics, it’s common to hear discussion of *distances*. Even back to the
    Pythagorean theorem, we are taught to think of relationships between points as
    distances or dissimilarity. Indeed, this fundamental idea is canonized in mathematics
    as part of the definition of a metric:


    $$d(a, c) \leq d(a, b) + d(b, c)$$


    In ML, we often instead concern ourselves with the notion of similarity—an extremely
    related topic. In many cases, we can compute similarity or dissimilarity, as they
    are complements of each other; when $d: X \times X \rightarrow [0, 1] \subset
    \mathbb{R}$ is a *dissimilarity function*, then we often define the following:


    $$Sim(a, b) := 1 - d(a, b)$$


    This may seem like a needlessly precise statement, but in fact you’ll see that
    a variety of options are available for framing similarity. Furthermore, sometimes
    we even formulate similarity measures where the associated distance measure does
    not establish a metric on the set of objects. These so-called pseudospaces can
    still be incredibly important, and we’ll show where they come up in Chapter 10.


    In the literature, you’ll find that papers commonly start by introducing a new
    similarity measure and then training a model you’ve seen before on that new measure.
    As you’ll see, the way you choose to relate objects (users, items, features, etc.)
    can have a large effect on what your algorithms learn.


    For now, let’s laser in on some specific similarity measures. Consider a classic
    ML problem of clustering: we have a space (usually $\mathbb{R}^n$) in which our
    data is represented and are asked to partition our data into subcollections of
    the population and assign these collections names. Frequently, these collections
    are intended to capture a certain meaning, or at the very least be useful for
    summarizing the collection elements’ features.'
  merge: -1
  pgno: 53
- img_proc: true
  md: 'When you do that clustering, you frequently are considering points near to
    one another in that space. Further, if you''re given a new observation and asked
    to assign it to a collection as an inference task, you normally compute the new
    observation''s *nearest neighbors*. This could be the *k*-nearest neighbors or
    simply the nearest neighbor among cluster centers; either way, your task is to
    use the notion of similarity to associate—and thus classify. In CF, this same
    notion is used to relate a user for whom you wish to make recommendations to those
    you already have data from.


    ![](img/da17d05291861831978609329c481581_54_0.png)


    # Nearest Neighbors


    *Nearest neighbors* is a catchall term that arises from the simple geometric idea
    that, given some space (points defined by feature vectors) and a point in that
    space, you can find the other points closest to it. This has applications in all
    of ML, including classification, ranking/recommendation, and clustering. "Approximate
    Nearest Neighbors" on page 87 provides more details.


    So how can we define similarity for our users in CF? They''re not obviously in
    the same space, so our usual tools seem to be lacking.


    # Pearson Correlation


    Our original CF formulation indicated that users with similar tastes collaborate
    to recommend items for one another. Let two users *A* and *B* have a set of co-rated
    items—simply the set of items with ratings from each—written as $\mathcal{R}_{A,B}$,
    and a rating of item *x* by user *A* written as $r_{A,x}$. Then the following
    is the sum of deviation from *A*''s average rating over all of its co-rated items
    with *B*:


    ```

    $$\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)$$

    ```


    If we think of these ratings as a random variable and consider the analog for
    *B*, the correlation between the jointly distributed variables (the population
    covariance) is our *Pearson correlation*:


    ```

    $$\text{USim}_{A,B} = \frac{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)(r_{B,x}
    - \bar{r}_B)}{\sqrt{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)^2} \sqrt{\sum_{x
    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$

    ```'

  - '[PAGE 232]


    # CHAPTER 11

    Personalized Recommendation Metrics


    Having explored the powerful methodologies of MF and neural networks in the context
    of personalization, we are now equipped with potent tools to craft sophisticated
    recommendation systems. However, the order of recommendations in a list may have
    a profound impact on user engagement and satisfaction.


    Our journey so far has primarily been focused on predicting what a user may like,
    using latent factors or deep learning architectures. However, the manner in which
    we present these predictions, or more formally, how we rank these recommendations,
    holds paramount significance. Therefore, this chapter will shift our gaze from
    the prediction problem and will unravel the complex landscape of ranking in recommendation
    systems.


    This chapter is dedicated to understanding key ranking metrics including mean
    average precision (mAP), mean reciprocal rank (MRR), and normalized discounted
    cumulative gain (NDCG). Each of these metrics takes a unique approach toward quantifying
    the quality of our rankings, catering to different aspects of the user interaction.


    We''ll dive into the intricacies of these metrics, unveiling their computational
    details and discussing their interpretation, covering their strengths and weaknesses,
    and pointing out their specific relevance to various personalization scenarios.


    This exploration forms an integral part of the evaluation process in recommendation
    systems. It not only gives us a robust framework to measure the performance of
    our system but also provides essential insights into understanding how different
    algorithms might perform in online settings. This will lay the foundation for
    future discussions on algorithmic bias, diversity in recommendations, and a multistakeholder
    approach to recommendation systems.'
  - '[PAGE 233]


    In essence, the knowledge garnered in this chapter will be instrumental in fine-tuning
    our recommendation system, ensuring that we don''t just predict well but also
    recommend in a way that truly resonates with individual user preferences and behaviors.


    # Environments


    Before we dig into defining the key metrics, we''re going to spend a few moments
    discussing the kinds of evaluation we can do. Evaluation for recommendation systems,
    as you''ll soon see, is frequently characterized by how *relevant* the recommendations
    are for a user. This is similar to search metrics, but we add in additional factors
    to account for *where* in the list the most relevant items are.


    For an extremely comprehensive view on evaluation of recommender systems, the
    recent project RecList builds a useful checklist-based framework for organizing
    metrics and evaluations.


    Often you''ll hear about evaluating recommenders in a few setups:


    +   - Online/offline

    - User/item

    - A/B


    Each setup provides slightly different kinds of evaluations and tells you different
    things. Let''s quickly break down the differences to set some assumptions about
    terminology.


    # Online and Offline


    When we refer to online versus offline recommenders, we are referring to *when*
    you''re running evals. In *offline evaluation*, you start with a test/evaluation
    dataset, outside your production system, and compute a set of metrics. This is
    often the simplest recommender to set up but has the highest expectation of existing
    data. Using historical data, you construct a set of relevant responses, which
    you can then use during simulated inference. This approach is the most similar
    to other kinds of traditional ML, although with slightly different computations
    for the error.


    When we''re training large models, these datasets are similar to an offline dataset.
    We previously saw prequential data, which is much more relevant in recommendation
    systems than in lots of other ML applications. Sometimes you''ll hear people say
    that “all recommenders are sequential recommenders” because of the importance
    of historical exposure to the recommender problem.'
  - '[PAGE 234]


    *Online evaluation* takes place during inference, usually in production. The tricky
    part is that you essentially never know the counterfactual outcomes. You can compute
    specific metrics on the online rankings: frequency and distributions of covariates,
    CTR/success rate, or time on platform, but ultimately these are different from
    the offline metrics.


    ![](img/da17d05291861831978609329c481581_234_0.png)


    # Bootstrapping from Historical Evaluation Data


    One of the most common questions from people building a recommender from scratch
    is “Where do you get the initial training data?” This is a hard problem. Ultimately,
    you have to be clever to come up with a useful dataset. Consider our co-occurrence
    data in the Wikipedia recommender; we didn’t require any user interactions to
    get to a set of data to build a recommender. Bootstrapping from item to item is
    the most popular strategy, but you can use other tricks as well. The simplest
    way to start moving into user-item recommenders is to simply ask the user questions.
    If you ask for preference information across a set of item features, you can build
    simple models that start to incorporate this.


    # User Versus Item Metrics


    Because recommender systems are personalization machines, it can be easy to think
    that we always want to be making recommendations for the user and measuring the
    performance as such. Subtleties exist, though. We want to be sure individual items
    are getting a fair chance, and sometimes looking at the other side of the equation
    can help assess this. In other words, are the items getting recommended frequently
    enough to have a chance to find their niche? We should explicitly compute our
    metrics over user *and* item axes.


    Another aspect of item-side metrics is for set-based recommenders. The other items
    that are recommended in context can have a significant effect on the performance
    of a recommendation. As a result, we should be careful to measure the pairwise
    item metrics in our large-scale evaluations.


    # A/B Testing


    It’s good to use randomized, controlled trials to evaluate how your new recommendation
    model is performing. For recommendations, this is quite tricky. At the end of
    this chapter, you’ll see some of the nuance, but for now, let’s consider a quick
    reminder of how to think about A/B testing in a closed-loop paradigm.'
  - '[PAGE 235]


    A/B tests ultimately attempt to estimate the effect size of swapping one model
    in for another; effect size estimation is the process of measuring the causal
    impact of an intervention on a target metric. First, we would need to deploy two
    recommender models. We''d also hope that there''s a reasonable randomization of
    users into each of the recommenders. However, what''s the randomization unit?
    It''s easy to quickly assume it''s the user, but what has changed about the recommender?
    Has the recommender changed in a way that covaries with some properties of the
    distribution—e.g., have you built a new recommender that is less friendly toward
    seasonal TV specials just as we enter into the second week of November?


    Another consideration with this sort of testing for recommendation systems is
    the long-term compounding effects. A frequent rejoinder about a series of positive
    A/B test outcomes over several years is “Have you tested the first recommender
    against the last?” This is because populations change, both the users and the
    items. As you also vary the recommender system, you frequently find yourself in
    a double-blind situation where you''ve never seen this user or item population
    with any other recommender. If all the effect sizes of every A/B test were additive
    across the industry, the world GDP would likely be two to three times as large.


    The way to guard against protests like this is via a *long-term holdout*, a random
    subset of users (continually being added to) who will not be upgraded to new models
    through time. By measuring the target metrics on this set versus the most cutting-edge
    model in production, you''re always able to understand the long-term effects of
    your work. The downside of a long-term holdout? It''s hard to maintain, and it''s
    hard to sacrifice some of the effects of your work on a subset of the population.


    Now let''s finally get to the metrics already!


    # Recall and Precision


    Let''s begin by considering four recommender problems and how each may have different
    implications for the kind of results you want.


    First, let''s consider entering a bookstore and looking for a book by a popular
    author. We would say this is the recommender problem:


    +   - Provides a lot of recommendations

    - Offers few possible relevant results


    Additionally, if the bookstore has a good selection, we''d expect that *all* the
    relevant results are contained in the recommendations because bookstores often
    carry most or all of an author''s oeuvre once they''ve become popular. However,
    many of the recommendations—the books in the bookstore–are simply not relevant
    for this search.'
- md: "Second, let’s consider looking for a gas station nearby on a mapping app while\
    \ in a large metro. We expect that a lot of gas stations are relatively close\
    \ by, but you would probably consider only the first couple—or maybe even only\
    \ one, the first one that you see. Thus a recommender for this problem has the\
    \ following:\n\n- Many relevant results\n- Few useful recommendations\n\nIn the\
    \ first scenario, the relevant results may be fully contained in the recommendations,\
    \ and in the second scenario, the recommendations may be fully contained in the\
    \ relevant results.\n\nLet’s now look at more common scenarios.\n\nFor our third\
    \ example, consider that you’re searching on a streaming video platform for something\
    \ to watch tonight when you’re feeling romantic. Streaming platforms tend to show\
    \ a lot of recommendations—pages and pages from this one theme or another. But\
    \ on this night, and on just this platform, only a couple of movies or TV shows\
    \ might really fit what you’re looking for. Our recommender, then, does the following:\n\
    \n- Provides many recommendations\n- Offers only a few that are actually relevant\n\
    \nHowever, importantly, not all relevant results will be in the recommendations!\
    \ As we know, different platforms have different media, so some of the relevant\
    \ results won’t appear in the recommendations no matter how many we look at.\n\
    \nFourth, and finally, you’re a high-end coffee lover with distinguished tastes\
    \ headed into the local roaster for a third-wave, single-origin coffee. As an\
    \ experienced coffee connoisseur, you love high-quality coffees from all over\
    \ the world and enjoy most but not all origins. On any given day, your local cafe\
    \ has only a few single-origin hand-brewed options. Despite your worldly palette,\
    \ there are some popular terroirs that you just don’t love. This little recommendation\
    \ brew bar can be described as follows:\n\n- Provides a few recommendations\n\
    - Offers many possible recommendations that are relevant\n\nOn any given day,\
    \ only some of the few recommendations may be relevant to you.\n\nSo those are\
    \ our matching four scenarios. For the latter two, the intersection between recommendation\
    \ and relevance may be proportionally small or large—or even empty! The main idea\
    \ is that the full size of the smaller sample is not always in use.\n\nNow that\
    \ we’ve worked through a few examples, let’s see how they relate to the core metrics\
    \ for a recommender: precision and recall @ *k* (Figure 11-1). Focusing on examples\
    \ 3 and 4, we can see that only some of the recommendations intersect with the\
    \ options that are relevant. And only some of the relevant options intersect with\
    \ the recommendations. It’s often overlooked, but in fact *these two ratios define\
    \ our metrics*—let’s go!\n\n![Recall and precision sets](img/da17d05291861831978609329c481581_237_0.png)\n\
    \n*Figure 11-1. Recall and precision sets*\n\n## @ *k*\n\nIn much of this chapter\
    \ and RecSys metrics discussion, we say things like @ *k*. This means “at *k*,”\
    \ which should really be “in *k*” or “out of *k*.” These are simply the size of\
    \ the set of recommendations. We often anchor the customer experience on how many\
    \ recommendations we can show the user without the experience suffering. We also\
    \ need to know the cardinality of the set of relevant items, which we call @ *r*.\
    \ Note that while it may not feel like it’s possible to ever know this number,\
    \ we assume this refers to “known relevant” options via our training or test data.\n\
    \n## Precision at k\n\n*Precision* is the ratio of the size of the set of relevant\
    \ recommendations to *k*, the size of the set of recommendations.\n\n$$Precision@k\
    \ = \\frac{num_{relevant}}{(k)}$$\n\nNotice that the size of the relevant items\
    \ doesn't appear in the formula. That's OK; the size of the intersection is still\
    \ dependent on the size of the set of relevant items.\n\nLooking at our examples,\
    \ 2 technically has the highest precision, but it's a bit of a red herring because\
    \ of the number of relevant results. This is one reason precision is not the most\
    \ common metric for evaluating recommendation systems.\n\n## Recall at k\n\n*Recall*\
    \ is the ratio of the size of the set of relevant recommendations to *r*, the\
    \ size of the set of relevant items.\n\nBut wait! If the ratio is the relevant\
    \ recommendations over the relevant items, where is *k*? *k* is still important\
    \ here because the size of the set of recommendations constrains the possible\
    \ size of the intersection. Recall that these ratios are operating on that intersection\
    \ that is always dependent on *k*. This means you often consider the max of *r*\
    \ and *k*.\n\nIn scenario 3, we hope that some of the movies that fit our heart's\
    \ desire will be on the right streaming platform. The number of these divided\
    \ by the count of all the media anywhere is the *recall*. If all your relevant\
    \ movies are on this platform, you might call that *total recall*.\n\nScenario\
    \ 4's café experience shows that recall is sometimes the inverse probability of\
    \ an avoid; because you like so many coffees, we might instead find it easier\
    \ to talk about what you don't like. In this case, the number of avoids in the\
    \ offering will have a large effect on the recall:\n\n$$Recall@k = \\frac{(k -\
    \ Avoid@k)}{num_{relevant}}$$\n\nThis is the core mathematical definition for\
    \ recall and is often one of the first measurements we'll consider because it's\
    \ a pure estimate of how your retrieval is performing.\n\n## R-precision\n\nIf\
    \ we also have a ranking on our recommendations, we can take the ratio of relevant\
    \ recommendations to $r$ in the $top-r$ recommendations. This improves this metric\
    \ in cases where $r$ is very small, as in examples 1 and 3.\n\n## mAP, MRR, NDCG\n\
    \nHaving delved into the reliable domains of precision@$k$ and recall@$k$, we've\
    \ gained valuable insights into the quality of our recommendation systems. However,\
    \ these metrics, as crucial as they are, can sometimes fall short in capturing\
    \ an important aspect of these systems: *the order of recommendations*.\n\nIn\
    \ recommendation systems, the ordering in which we present suggestions carries\
    \ significant weight and needs to be evaluated to ensure that it's effective.\n\
    \nThat's why we'll now journey beyond precision@$k$ and recall@$k$ to explore\
    \ some key ranking-sensitive metrics—namely, mean average precision (mAP), mean\
    \ reciprocal rank (MRR), and normalized discounted cumulative gain (NDCG). These\
    \ metrics consider not only whether our recommendations are relevant but also\
    \ whether they are well-ordered.\n\nThe mAP metric lends importance to each relevant\
    \ document and its position, and MRR concentrates on the rank of the first relevant\
    \ item. NDCG gives more importance to relevant documents at higher ranks. By understanding\
    \ these metrics, you'll have an even more robust set of tools to evaluate and\
    \ refine your recommendation systems.\n\nSo, let's carry on with our exploration,\
    \ striking a balance between precision and comprehensibility. By the end of this\
    \ section, you will be well equipped to handle these essential evaluation methods\
    \ in a confident and knowledgeable manner.\n\n## mAP\n\nThis vital metric in recommendation\
    \ systems is particularly adept at accounting for the rank of relevant items.\
    \ If, in a list of five items, the relevant ones are found at positions 2, 3,\
    \ and 5, mAP would be calculated by computing precision@2, precision@3, and precision@5\
    \ and then taking an average of these values. The strength of mAP lies in its\
    \ sensitivity to the ordering of relevant items, providing a higher score when\
    \ these items are ranked higher.\n\nConsider an example with two recommendation\
    \ algorithms A and B:\n\n- For algorithm A, we compute the mAP as follows:\n \
    \ (precision@2 + precision@3 + precision@5) / 3 = (1/2 + 2/3 + 3/5) / 3 = 0.6\n\
    - For algorithm B, which perfectly ranks the items, we calculate mAP as follows:\n\
    \  mAP = (precision@1 + precision@2 + precision@3) / 3 = (1/1 + 2/2 + 3/3) / 3\
    \ = 1\n\nThe generalized formula for mAP across a set of queries Q is shown here:\n\
    \n$$mAP = \\frac{1}{|Q|} \\sum_{q=1}^{|Q|} \\frac{1}{m_q} \\sum_{k=1}^{n} P(k)\
    \ * rel(k)$$\n\nHere, $|Q|$ is the total number of queries, $m_q$ is the number\
    \ of relevant documents for a specific query $q$, $P(k)$ stands for the precision\
    \ at the _k_th cutoff, and $rel(k)$ is an indicator function equating to 1 if\
    \ the item at rank $k$ is relevant, and 0 otherwise.\n\n## MRR\n\nAnother effective\
    \ metric used in recommendation systems is MRR. Unlike MAP, which considers all\
    \ relevant items, MRR primarily focuses on the position of the first relevant\
    \ item in the recommendation list. It's computed as the reciprocal of the rank\
    \ where the first relevant item appears.\n\nConsequently, MRR can reach its maximum\
    \ value of 1 if the first item in the list is relevant. If the first relevant\
    \ item is found farther down the list, MRR takes a value less than 1. For instance,\
    \ if the first relevant item is positioned at rank 2, the MRR would be 1/2.\n\n\
    Let's look at this in the context of the recommendation algorithms A and B that\
    \ we used earlier:\n\n- For algorithm A, the first relevant item is at rank 2,\
    \ so the MRR equals 1/2 = 0.5.\n- For algorithm B, which perfectly ranked the\
    \ items, the first relevant item is at rank 1, so the MRR equals 1/1 = 1.\n\n\
    Extending this to multiple queries, the general formula for MRR is as follows:\n\
    \n$$MRR = \\frac{1}{|Q|} \\sum_{i=1}^{|Q|} \\frac{1}{rank_i}$$\n\nHere, $|Q|$\
    \ represents the total number of queries, and $rank_i$ is the position of the\
    \ first relevant item in the list for the _i_th query. This metric provides valuable\
    \ insight into how well a recommendation algorithm delivers a relevant recommendation\
    \ right at the top of the list."
  mdcn: "其次，让我们考虑在大都市中使用地图应用寻找附近加油站的情况。我们预期附近会有许多加油站，但你可能只会考虑前几个——甚至可能只考虑第一个看到的加油站。因此，针对这个问题的推荐系统具有以下特点：\n\
    \n-   许多相关结果\n-   少数有用的推荐\n\n在第一种场景中，相关结果可能完全包含在推荐中；而在第二种场景中，推荐可能完全包含在相关结果中。\n\
    \n现在让我们来看一些更常见的场景。\n\n对于我们的第三个例子，假设你正在流媒体视频平台上搜索今晚想看的浪漫内容。流媒体平台往往会展示大量推荐——一页又一页来自这个或那个主题的内容。但在这个晚上，在这个平台上，可能只有几部电影或电视剧真正符合你的需求。因此，我们的推荐系统执行以下操作：\n\
    \n-   提供大量推荐\n-   只有少数真正相关\n\n然而，重要的是，并非所有相关结果都会出现在推荐中！我们知道，不同平台拥有不同的媒体资源，因此无论我们查看多少推荐，一些相关结果都不会出现。\n\
    \n第四，也是最后一个例子，你是一位品味独特的高端咖啡爱好者，正前往当地的烘焙店品尝第三波精品单品咖啡。作为一名经验丰富的咖啡鉴赏家，你喜欢来自世界各地的高品质咖啡，享受大多数但并非所有产地的咖啡。在任何一天，你当地的咖啡馆只有几种单品手冲咖啡选项。尽管你拥有世界性的味蕾，但仍有一些流行的产区你并不喜欢。这个小小的推荐咖啡吧可以描述如下：\n\
    \n-   提供少量推荐\n-   提供许多可能相关的推荐\n\n在任何一天，只有少数推荐中的一部分可能与你相关。\n\n这就是我们对应的四种场景。对于后两种场景，推荐与相关性之间的交集可能按比例较小或较大——甚至可能为空！主要思想是，较小样本的完整规模并不总是被使用。\n\
    \n既然我们已经通过几个例子进行了说明，让我们看看它们如何与推荐系统的核心指标相关联：精确率和召回率 @ *k*（图11-1）。重点关注例子3和4，我们可以看到只有一部分推荐与相关选项相交。也只有一部分相关选项与推荐相交。这一点常被忽视，但事实上*这两个比率定义了我们的指标*——让我们开始吧！\n\
    \n![召回率和精确率集合](img/da17d05291861831978609329c481581_237_0.png)\n\n*图11-1. 召回率和精确率集合*\n\
    \n## @ *k*\n\n在本章和推荐系统指标讨论的大部分内容中，我们使用类似 @ *k* 的表述。这表示“在 *k* 个中”，实际上应该是“在 *k*\
    \ 个中”或“从 *k* 个中”。这些仅仅是推荐集合的大小。我们通常将客户体验锚定在我们能向用户展示多少推荐而不会损害体验上。我们还需要知道相关项目集合的基数，我们称之为\
    \ @ *r*。请注意，虽然可能感觉永远无法知道这个数字，但我们假设这指的是通过我们的训练或测试数据“已知相关”的选项。\n\n## 精确率 at k\n\n\
    *精确率*是相关推荐集合大小与 *k*（推荐集合大小）的比率。\n\n$$Precision@k = \\frac{num_{relevant}}{(k)}$$\n\
    \n注意，相关项目的大小并未出现在公式中。这没关系；交集的大小仍然依赖于相关项目集合的大小。\n\n查看我们的例子，从技术上讲，例子2具有最高的精确率，但由于相关结果的数量，这有点误导性。这是精确率不是评估推荐系统最常用指标的原因之一。\n\
    \n## 召回率 at k\n\n*召回率*是相关推荐集合大小与 *r*（相关项目集合大小）的比率。\n\n但是等等！如果比率是相关推荐除以相关项目，那么\
    \ *k* 在哪里？*k* 在这里仍然很重要，因为推荐集合的大小限制了交集的可能大小。回想一下，这些比率作用于始终依赖于 *k* 的交集。这意味着你通常需要考虑\
    \ *r* 和 *k* 中的最大值。\n\n在场景3中，我们希望一些符合我们心意的电影会在正确的流媒体平台上。这些电影的数量除以任何地方所有媒体的总数就是*召回率*。如果你所有的相关电影都在这个平台上，你可能会称之为*完全召回*。\n\
    \n场景4的咖啡馆体验表明，召回率有时是避免概率的倒数；因为你喜欢这么多咖啡，我们可能更容易谈论你不喜欢什么。在这种情况下，供应中的避免数量将对召回率产生很大影响：\n\
    \n$$Recall@k = \\frac{(k - Avoid@k)}{num_{relevant}}$$\n\n这是召回率的核心数学定义，通常是我们首先考虑的测量指标之一，因为它是对你检索性能的纯粹估计。\n\
    \n## R-精确率\n\n如果我们对推荐也有一个排序，我们可以取前 *r* 个推荐中相关推荐与 $r$ 的比率。这在 $r$ 非常小的情况下（如例子1和3）改进了该指标。\n\
    \n## mAP, MRR, NDCG\n\n在深入探讨了精确率@$k$和召回率@$k$的可靠领域后，我们对推荐系统的质量有了宝贵的见解。然而，这些指标虽然至关重要，但有时在捕捉这些系统的一个重要方面时显得不足：*推荐的顺序*。\n\
    \n在推荐系统中，我们呈现建议的顺序具有重要意义，需要进行评估以确保其有效性。\n\n这就是为什么我们现在将超越精确率@$k$和召回率@$k$，探索一些关键的排序敏感指标——即平均精度均值（mAP）、平均倒数排名（MRR）和归一化折损累积增益（NDCG）。这些指标不仅考虑我们的推荐是否相关，还考虑它们是否排序良好。\n\
    \nmAP指标赋予每个相关文档及其位置重要性，而MRR则专注于第一个相关项目的排名。NDCG则更重视排名较高的相关文档。通过理解这些指标，你将拥有更强大的工具集来评估和改进你的推荐系统。\n\
    \n那么，让我们继续探索，在精确率和可理解性之间取得平衡。在本节结束时，你将能够自信且知识渊博地处理这些基本的评估方法。\n\n## mAP\n\n这个推荐系统中的关键指标特别擅长考虑相关项目的排名。如果在一个包含五个项目的列表中，相关项目出现在位置2、3和5，mAP将通过计算precision@2、precision@3和precision@5，然后取这些值的平均值来计算。mAP的优势在于它对相关项目排序的敏感性，当这些项目排名更高时，会提供更高的分数。\n\
    \n考虑一个包含两个推荐算法A和B的例子：\n\n-   对于算法A，我们计算mAP如下：\n    (precision@2 + precision@3\
    \ + precision@5) / 3 = (1/2 + 2/3 + 3/5) / 3 = 0.6\n-   对于完美排序项目的算法B，我们计算mAP如下：\n\
    \    mAP = (precision@1 + precision@2 + precision@3) / 3 = (1/1 + 2/2 + 3/3) /\
    \ 3 = 1\n\nmAP在查询集Q上的通用公式如下所示：\n\n$$mAP = \\frac{1}{|Q|} \\sum_{q=1}^{|Q|} \\\
    frac{1}{m_q} \\sum_{k=1}^{n} P(k) * rel(k)$$\n\n这里，$|Q|$是查询总数，$m_q$是特定查询 $q$ 的相关文档数量，$P(k)$\
    \ 表示在第 _k_ 个截止点的精确率，$rel(k)$ 是一个指示函数，如果排名 $k$ 的项目相关则等于1，否则为0。\n\n## MRR\n\n推荐系统中使用的另一个有效指标是MRR。与考虑所有相关项目的MAP不同，MRR主要关注推荐列表中第一个相关项目的位置。它被计算为第一个相关项目出现的排名的倒数。\n\
    \n因此，如果列表中的第一个项目相关，MRR可以达到其最大值1。如果第一个相关项目在列表中更靠后的位置找到，MRR的值将小于1。例如，如果第一个相关项目位于排名2，则MRR为1/2。\n\
    \n让我们在之前使用的推荐算法A和B的背景下来看这一点：\n\n-   对于算法A，第一个相关项目在排名2，所以MRR等于1/2 = 0.5。\n-   对于完美排序项目的算法B，第一个相关项目在排名1，所以MRR等于1/1\
    \ = 1。\n\n将其扩展到多个查询，MRR的通用公式如下：\n\n$$MRR = \\frac{1}{|Q|} \\sum_{i=1}^{|Q|} \\\
    frac{1}{rank_i}$$\n\n这里，$|Q|$ 代表查询总数，$rank_i$ 是第 _i_ 个查询列表中第一个相关项目的位置。该指标提供了关于推荐算法如何在列表顶部提供相关推荐的宝贵见解。"

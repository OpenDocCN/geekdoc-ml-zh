    # CHAPTER 8

    Putting It All Together: Data Processing and Counting Recommender


    Now that we have discussed the broad outline of recommender systems, this chapter
    will put it into a concrete implementation so that we can talk about the choices
    of technologies and specifics of how the implementation works in real life.

    This chapter covers the following topics:


    +   - Data representation with protocol buffers

    - Data processing frameworks

    - A PySpark sample program

    - GloVE embedding model

    - Additional foundational techniques in JAX, Flax, and Optax


    We will show step-by-step how to go from a downloaded Wikipedia dataset to a recommender
    system that can recommend words from Wikipedia based on the co-occurrence with
    words in a Wikipedia article. We use a natural language example because words
    are easily understood, and their relationships are readily grasped because we
    can see that related words occur near one another in a sentence. Furthermore,
    the Wikipedia corpus is easily downloadable and browsable by anyone with an internet
    connection. This idea of co-occurrence can be generalized to any co-occurring
    collection of items, such as watching a video in the same session or purchasing
    cheeses in the same shopping bag.

    This chapter will demonstrate concrete implementations of an item-item and a feature-item
    recommender. Items in this case are the words in an article, and the features
    are word-count similarity—a MinHash or a kind of locality sensitive hash for words.
    Chapter 16 covers locality sensitive hash in more detail, but for now, we’ll'
  - '[PAGE 147]


    consider these simple hashing functions to be encoding functions over content,
    such that content with similar properties maps to similar co-domains. This general
    idea can be used as a warm-start mechanism on a new corpus in the absence of logging
    data, and if we have user-item features such as likes, these can be used as features
    for a feature-item recommender. The principles of co-occurrence are the same,
    but by using Wikipedia as an example, you can download the data and play with
    it by using the tools provided.


    > ## Warm and Cold Starts


    A *cold start* occurs when we do not have any information about a corpus or people''s
    preferences and resort to a best-guess approach such as recommending popular items.
    On the other hand, if items naturally occur in typical groupings, like the selection
    and arrangement in the cheese aisle of a grocery store, then we call this a warm
    start: using information like co-occurrence of cheeses with each other or with
    other items like salami as a means of starting out the recommender engine more
    intelligently.


    In the Wikipedia example, even before we have users click articles, we''ll be
    able to warm-start the word-to-word recommender simply based on how close words
    are to each other in a sentence. Similarly, if you had a bunch of items that naturally
    fall into some kind of hierarchical taxonomy, you might be able to warm-start
    your recommender by having items that are in the same branch of the taxonomy count
    as co-occurring with one another.


    # Tech Stack


    A set of technologies used together is commonly called a *technology stack*, or
    *tech stack*. Each component of a tech stack can usually be replaced by other
    similar technologies. We will list a few alternatives for each component but not
    go into detail about their pros and cons, as there can be many, and the situation
    of the deployment will affect the choice of components. For example, your company
    might already use a particular component, so for familiarity and support, you
    might wish to use that one.


    This chapter covers some of the technology choices for processing the data that
    goes into building a concrete implementation of a collector.


    The sample code is available on [GitHub](https://github.com). You might want to
    clone the code into a local directory.'
  - '[PAGE 148]


    # Data Representation


    The first choice of technology we need to make will determine how we represent
    the data. Some of the choices are as follows:


    +   - Protocol buffers

    - Apache Thrift

    - JSON

    - XML

    - CSV


    In this implementation, we''re mostly using protocol buffers because of the ease
    of specifying a schema and then subsequently serializing and deserializing it.


    > ## Protocol Buffers


    Before protocol buffers were invented, people used to store their binary data
    in all sorts of custom formats that involved various syntax and specifications
    (like starting a file with a magic number, followed by rules on how to parse and
    store various data types like integers, strings, bytes, and floating-point numbers).
    Protocol buffers unified the storage of custom binary data by allowing users to
    specify a schema, or a named representation of each field and the type of each
    field (like `first_name` being a string and age being an integer). This enables
    us to easily read and write structured data in a binary format, and the parsing
    of the data is handled automatically by the protocol buffer library.


    For the file format, we''re using serialized protocol buffers that are uuencoded
    and written as a single line per record and then bziped up for compression. This
    is just for convenience so that we can parse the files easily without having dependencies
    on too many libraries. Your company might instead store data in a data warehouse
    that is accessible by SQL, for example.


    Protocol buffers are generally easier to parse and handle than raw data. In our
    implementation, we will parse the Wikipedia XML into protocol buffers for easier
    handling using `xml2proto.py`. You can see from the code that XML parsing is a
    complicated affair, whereas protocol buffer parsing is as simple as calling the
    `ParseFromString` method, and all the data is then subsequently available as a
    convenient Python object.


    As of June 2022, the Wikipedia dump is about 20 GB in size, and converting to
    protocol buffer format takes about 10 minutes. Please follow the steps described
    in the README in the GitHub repo for the most up-to-date steps to run the programs.'

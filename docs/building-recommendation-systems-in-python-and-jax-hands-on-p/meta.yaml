  - "[PAGE 100]\n\n```\npython\nsum(F.pow(F.col(\"dev_2\"),2)).alias(\"sum_of_sqrd_devs_2\"\
    )\n).withColumn(\n    \"user_similarity\",\n    (\n        F.col(\"dev_product_sum\"\
    ) / (\n            F.sqrt(F.col(\"sum_of_sqrd_devs_2\")) *\n            F.sqrt(F.col(\"\
    sum_of_sqrd_devs_2\"))\n        )\n    )\n)\n```\n\nIn constructing this dataset,\
    \ we begin by taking a self-join, which avoids matching the same users with themselves\
    \ but rather joins on books that match. As we do this join, we take the rating\
    \ deviation from the user's mean ratings that we computed previously. We also\
    \ use this opportunity to multiply them together for the numerator in our user\
    \ similarity function. In the last step, we'll groupBy again so that we can sum\
    \ over all matching book IDs (by groupBy on user_id_1 and user_id_2); we sum the\
    \ product and the powers of each set of deviations so that we can finally divide\
    \ and generate a new column for our user similarity.\n\nWhile this computation\
    \ isn't particularly complex, let's take note of a few things that we might appreciate.\
    \ First, we built our user similarity matrix in full from our records. This matrix\
    \ may now be stored in a faster-access format so that if we wish to do operations\
    \ in real time, it's ready to go. Second, we did all these data transformations\
    \ in Spark, so we can run these operations on massive datasets and let Spark handle\
    \ the parallelization onto the cluster. We even were able to do this while writing\
    \ code that looks a lot like pandas and SQL. Finally, all our operations were\
    \ columnar and required no iteration-based calculation. This means this code will\
    \ scale much better than some approaches. This also ensures that Spark can parallelize\
    \ our code well, and we can expect good performance.\n\nWe've seen how PySpark\
    \ can be used to prepare our user similarity matrix. We have this definition of\
    \ affinity estimating the appropriateness of an item for a user; we can collect\
    \ each of those scores into a tabular form—user rows and item columns—to yield\
    \ a matrix. As an exercise, can you take this matrix and generate the affinity\
    \ matrix?\n\n$$\\text{Aff}_{A, i} = \\bar{r}_A + \\frac{\\sum_{U \\in \\mathcal{N}(A)}\
    \ \\text{USim}_{A, U} * (r_{U, i} - \\bar{r}_A)}{\\sum_{U \\in \\mathcal{N}(A)}\
    \ \\text{USim}_{A, U}}$$\n\nFeel free to assume that $\\mathcal{N}(A)$ is just\
    \ the five nearest neighbors to $A$ with respect to user similarity."
  - '[PAGE 101]


    # DataLoaders


    DataLoaders is a programming paradigm originating from PyTorch, but it has been
    embraced in other gradient-optimized ML workflows. As we begin to integrate gradient-based
    learning into our recommendation system architectures, we will face challenges
    in our MLOps tooling. The first is related to training data size and available
    memory. DataLoaders are a way to prescribe how data is batched and sent to the
    training loop efficiently; as datasets get large, careful scheduling of these
    training sets can have major effects on learning. But why must we think about
    *batches* of data? That’s because we’ll use a variant of gradient descent appropriate
    for large amounts of data.


    First, let’s review the basics of *mini-batched gradient descent*. During training
    via gradient descent, we make a forward pass of our training sample through our
    model to yield a prediction, and we then compute the error and the appropriate
    gradient backward through our model to update parameters. Batched gradient descent
    takes all our data in a single pass to compute the gradient for the training set
    and push it back through; this implies you have the entire training dataset in
    memory. As the dataset scales, this ranges from expensive to impossible; to avoid
    this, we can instead compute gradients of the loss function for only a subset
    of the dataset at a time. The simplest paradigm for this, called *stochastic gradient
    descent* (SGD), computes these gradients and parameter updates one sample at a
    time. The mini-batched version performs our batched gradient descent, but over
    a series of subsets to form a partition of our dataset. In mathematical notation,
    we write the update rule in terms of Jacobians on the smaller batches:


    $$\theta = \theta - \eta * \nabla_{\theta} J(\theta; x^{(i:i+n)}; y^{(i:i+n)})$$


    This optimization serves a few purposes. First, it requires only potentially small
    subsets of our data held in memory during the steps. Second, it requires far fewer
    passes than the purely iterative version in SGD. Third, the gradient operating
    on these mini-batches can be organized as a Jacobian, and thus we have linear-algebraic
    operations that may be highly optimized.'
  - "[PAGE 102]\n\n![](img/da17d05291861831978609329c481581_102_0.png)\n\n# Jacobians\n\
    \nThe mathematical notion of a Jacobian in the simplest sense is an organizational\
    \ tool for a set of vector derivatives with relevant indexes. You may recall that\
    \ for functions of several variables, you can take the derivative *with respect\
    \ to* each of those variables. For a single multivariable scalar function, the\
    \ Jacobian is simply the row vector of first derivatives of the function—which\
    \ happens to be the transpose of the gradient.\n\nThis is the simplest case; the\
    \ gradient of a multivariable scalar function may be written as a Jacobian. However,\
    \ once we have a vector of (vector) derivatives, we can write that as a matrix;\
    \ the utility here is really only in the notation, though. When you collect a\
    \ series of multivariable scalar functions into a vector of functions, the associated\
    \ vector of gradients is a vector of vectors of derivatives. This is called a\
    \ *Jacobian matrix*, and it generalizes the gradient to vector-valued functions.\
    \ As you've likely realized, layers of neural networks are a great source of vector-valued\
    \ functions for which you'd like to derivate.\n\nIf you're convinced mini-batches\
    \ are useful, it's time to discuss *DataLoaders*—a simple PyTorch API for facilitating\
    \ mini-batch access from a large dataset. The key parameters for a DataLoader\
    \ are `batch_size`, `shuffle`, and `num_workers`. The batch size is easy to understand:\
    \ it's the number of samples included in each batch (often an integer factor of\
    \ the total size of the dataset). Often a shuffle operation is applied in serving\
    \ up these batches; the shuffle allows batches in each epoch to be shown to the\
    \ network in a randomized order; this is intended to improve robustness. Finally,\
    \ `num_workers` is a parallelization parameter for the CPU's batch generation.\n\
    \nThe utility of a DataLoader is really best understood via demonstration:\n\n\
    ```\nparams = {\n    'batch_size': _,\n    'shuffle': _,\n    'num_workers': _\n\
    }\n\ntraining_generator = torch.utils.data.DataLoader(training_set, params)\n\n\
    validation_generator = torch.utils.data.DataLoader(validation_set, params)\n\n\
    // Loop over epochs\nfor epoch in range(max_epochs):\n    // Training\n    for\
    \ local_batch, local_labels in training_generator:\n\n        // Model computations\n\
    \        [...]\n```"
  - "[PAGE 103]\n\n```\n// Validation\nwith torch.set_grad_enabled(False):\n    for\
    \ local_batch, local_labels in validation_generator:\n\n        // Model computations\n\
    \        [...]\n```\n\nThe first important detail in this code is that any of\
    \ its generators will be reading in mini-batches from your total dataset and can\
    \ be instructed to load those batches in parallel. Note also that any differential\
    \ steps in the model computations will now be operating on these mini-batches.\n\
    \nIt’s easy to think of DataLoaders as merely a tool for code cleanliness (which,\
    \ admittedly, it does improve), but it’s important to not underestimate how the\
    \ control of batch order, parallelization, and shape are significant features\
    \ for training your model. Lastly, the structure of your code now looks like batch\
    \ gradient descent, but it is taking advantage of mini-batching, further exposing\
    \ what your code actually does instead of the steps necessary to do it.\n\n# Database\
    \ Snapshots\n\nLet’s round out this section by stepping back from these fancy\
    \ technologies to discuss something important and classic: snapshotting a production\
    \ database.\n\nAn extremely likely scenario is that the engineers (potentially\
    \ also you) who have built the recommendations server are writing their logs and\
    \ other application data to an SQL database. More likely than not, this database\
    \ architecture and deployment are optimized for fast querying by the application\
    \ across its most common use cases. As we’ve discussed, those logs may be in an\
    \ event-style schema, and there are other tables that may require aggregation\
    \ and roll-up to make any sense. For example, a *current inventory* table may\
    \ require knowledge of start-of-day inventory and then aggregate a list of purchase\
    \ events.\n\nAll told, the production SQL database is usually a crucial component\
    \ in the stack that’s geared to specific use. As the downstream consumer of this\
    \ data, you may find yourself wanting different schemas, wanting lots of access\
    \ to this database, and performing serious operations on this data. The most common\
    \ paradigm is *database snapshotting*. Snapshotting is a functionality provided\
    \ by various flavors of SQL to performantly make a clone of a database. While\
    \ this snapshotting may take form in a variety of ways, let’s focus on a few that\
    \ serve to simplify our systems and ensure they have the necessary data on hand:\n\
    \n+   - A daily table snapshot may be tied to an *as_of* field, or *the state\
    \ of this table on this day*."
- md: '## Data Structures for Learning and Inference


    This section introduces three important data structures that will enable our recommendation
    system to perform complex operations quickly. The goal of each structure is to
    sacrifice precision as little as possible, while speeding up access to the data
    in real time. As you’ll see, these data structures form the backbone of the real-time
    inference pipeline and approximate what takes place in the batch pipeline as accurately
    as possible.


    The three data structures are as follows:


    - Vector search/ANN index

    - Bloom filters for candidate filtering

    - Feature stores


    So far, we’ve discussed the necessary components for getting data flowing in your
    system. These help organize data to make it more accessible during the learning
    and inference processes. Also, we’ll find some shortcuts to speed up inference
    during retrieval. Vector search will allow us to identify similar items at scale.
    Bloom filters will allow us to rapidly evaluate many criteria for excluding results.
    Feature stores will provide us with necessary data about users for recommendation
    inference.


    A daily table snapshot may be limited by time to see *what records have been added
    today*.

    An event table snapshot may be used to feed a set of events into an event stream
    processor like Segment (note that you may also set up live event streams like
    Kafka).

    An hourly aggregated table can be used for status logging or monitoring.


    In general, the paradigm is usually to operate on snapshots for downstream data
    processing. Many of the kinds of data processing we mentioned earlier—like computing
    user similarity—are operations that may require significant data reads. *It’s
    important to not build ML applications that require extensive querying on the
    production database*, because doing so would likely decrease performance of the
    app and result in a slower user experience. This decrease will undermine the improvement
    made possible by your recommendations.


    Once you’ve snapshotted the tables you’re interested in, you can often find a
    collection of data pipelines useful to transform that data into even more specific
    tables in your *data warehouse* (where you should be doing most of your work anyway).
    Tools like Dagster, dbt, Apache Airflow, Argo, and Luigi are popular data-pipeline
    and workflow orchestration tools for extract, transform, load (ETL) operations.


    ## Vector Search


    We have discussed user similarity and item similarity in terms of understanding
    the relationships between those entities, but we haven''t talked about any *acceleration
    structures* for these processes.


    First let''s discuss a bit of terminology: If we think of a collection of vectors
    that represent entities with a similarity metric provided by a distance function,
    we refer to this as a *latent space*. The simple goal is to utilize our latent
    space and its associated similarity metric (or complementary distance metric)
    to be able to retrieve *similar* items quickly. In our previous examples with
    similarity, we talked about neighborhoods of users and how they can be utilized
    to build an affinity score between users and unseen items. But how do you find
    the neighborhood?


    To understand this, recall that we defined neighborhoods of an element $x$, written
    $\mathcal{N}(x)$, as the set of $k$ elements in the latent space with the maximum
    similarity; or said differently, the set of $j$th order statistics for $j \le
    k$ from the sample of item similarities to $x$. These *k-nearest neighbors*, as
    they''re often called, will be used as the set of elements considered similar
    to $x$.


    These vectors from CF yield a few other useful side effects:


    - A simple recommender that randomly samples unseen items from a user neighborhood''s
    liked items

    - Predictions about features of a user, from known features of users in the neighborhood

    - User segmentation via taste similarity


    So how can we speed up these processes? One of the first significant improvements
    in this area came from inverted indices. Utilizing inverted indices is at its
    core carefully constructing a large hash between tokens of the query (for text-based
    search) and the candidates.


    This approach is great for tokenizable entities like sentences or small-lexicon
    collections. Given the ability to look up items that share one or many tokens
    with the query, you can even use a general latent embedding to rank the candidate
    responses by similarity. This approach deserves extra consideration as you scale:
    it incurs a speed cost because it entails two steps, and because the similarity
    distribution may not be well correlated with the token similarity required to
    return many more candidates than we need.


    Classic approaches to building a search system are based on large lookup tables
    and feel deterministic. As we move toward ANN lookup, we want to relax some of
    that strong deterministic behavior and introduce data structures that make assumptions
    to *prune* these large indices. Instead of building indices for only tokenizable
    components of your elements, you could precompute the $k$-d tree and use the indices
    as the index. The $k$-d tree would precompute the nearest neighbors in a batch
    process (which may be slow), to populate a top-$k$ response for fast lookup. $k$-d
    trees are an efficient data structure for encoding the preceding neighborhoods
    but are notoriously slow to read from in higher dimensions. Using them instead
    to build inverted indices, though, can be a great improvement.


    More recently, explicitly using vector databases with vector search is becoming
    much more possible and feasible. Elasticsearch has added this capability; Faiss
    is a Python library that helps you implement this functionality in your systems;
    Pinecone is a vector-database system explicitly targeting this goal; and Weaviate
    is a native vector-database architecture that allows you to layer the previous
    token-based inverted indices and vector similarity search.


    ## Approximate Nearest Neighbors


    What are this element''s $k$-nearest neighbors? Incredibly, approximate nearest
    neighbors (ANN) can get very high accuracy compared to the actual nearest neighbors,
    and you get there faster with head-spinning speedups. You often are satisfied
    with approximate solutions to these problems.


    One open source library that specializes in these approximations is PyNNDescent,
    which uses clever speedups via both optimized implementation and careful mathematical
    tricks. With ANN, you are opened up to two strategies as discussed:


    - The pre-index can be dramatically improved.

    - On queries without a pre-indexing option, you can still expect good performance.


    In practice, these similarity lookups are incredibly important for making your
    applications actually work. While we''ve mostly talked about recommendations for
    full known catalogs of items, we cannot assume this in other recommendation contexts.
    These include the following:


    - Query-based recommendations (like search)

    - Contextual recommendations

    - Cold-starting new items


    As we go, you will see more and more references to similarity in spaces and nearest
    neighbors; at each of those moments, think: "I know how to make this fast!"


    ## Bloom Filters


    *Bloom filters* are probabilistic data structures that allow us to test for set
    inclusion very efficiently but with a downside: set exclusion is deterministic,
    but set inclusion is probabilistic. *In practice, this means that asking the question
    “Is x in this set” never results in a false negative but may result in a false
    positive!* Note that this type-I error increases as the size of the bloom increases.


    Via vector search, we have identified a large pool of potential recommendations
    for the user. From this pool, we need to do some immediate elimination. The most
    obvious type of high-level filtering that’s essential is to remove those items
    that the *user has previously not shown interest in or has already purchased*.
    You’ve probably had the experience of being recommended the same item, over and
    over, and thinking, “I don’t want this; stop showing me this.” From the simple
    CF models we’ve introduced, you may now see why this could happen.


    The system has identified a set of items via CF that you’re more likely to pick.
    Without any outside influence, those computations will continue to return the
    same results, and you’ll never escape those recommendations. As the system designer,
    you may start with a heuristic:


    > If the user has seen this item recommended three times and never clicked, let’s
    not show it to them anymore.


    This is a totally reasonable strategy to improve *freshness* (the idea of ensuring
    users see new item recommendations) in your recommendation system. While this
    is a simple strategy to improve your recommendations, how might you implement
    this at scale?


    A bloom filter may be used by defining the sets in question with the following:
    “Has this user seen this item recommended three times and never clicked?” Bloom
    filters have a caveat that they’re additive only: once something is in the bloom,
    you can’t remove it. This is not a problem when observing a binary state like
    this heuristic.


    Let’s construct a user-item ID to use as our hash in the bloom. Remember that
    the key feature of the bloom filter is to quickly determine whether the hashed
    item is in the bloom. When we observe a user-item pair that satisfies the preceding
    criteria, take that pair as an ID and hash it. Now, because that hashed pair can
    be easily reconstructed from a list of items for a user, we have a very fast way
    to filter.


    Let’s discuss a few technical details on this topic. First, you might want to
    do a variety of kinds of filtering—maybe freshness is one, and another may be
    items the user has already bought, and a third could exclude items that have sold
    out.


    Here it would be good to implement each of these filters independently; the first
    two can follow our user-item ID hashing as before, and the third one can be a
    hash only on item IDs.'
  mdcn: '## 用于学习和推理的数据结构


    本节将介绍三种重要的数据结构，它们将使我们的推荐系统能够快速执行复杂操作。每种结构的目标都是在尽可能少地牺牲精度的前提下，加速对数据的实时访问。正如你将看到的，这些数据结构构成了实时推理管道的骨干，并尽可能精确地近似批处理管道中发生的过程。


    这三种数据结构如下：


    - 向量搜索/近似最近邻索引

    - 用于候选过滤的布隆过滤器

    - 特征存储


    到目前为止，我们已经讨论了让数据在系统中流动所需的必要组件。这些组件有助于组织数据，使其在学习和推理过程中更易于访问。此外，我们将在检索过程中找到一些加速推理的捷径。向量搜索将使我们能够大规模地识别相似物品。布隆过滤器将使我们能够快速评估许多排除结果的标准。特征存储将为我们提供推荐推理所需的用户数据。


    每日表快照可能受限于时间，无法查看*今天添加了哪些记录*。

    事件表快照可用于将一组事件馈送到像 Segment 这样的事件流处理器（请注意，你也可以设置像 Kafka 这样的实时事件流）。

    每小时聚合表可用于状态记录或监控。


    通常，范式是操作快照以进行下游数据处理。我们之前提到的许多数据处理类型——比如计算用户相似度——都是可能需要大量数据读取的操作。*重要的是不要构建需要在生产数据库上进行大量查询的机器学习应用程序*，因为这样做可能会降低应用程序的性能并导致更慢的用户体验。这种性能下降会削弱你的推荐所带来的改进。


    一旦你对感兴趣的表进行了快照，你通常会发现一系列数据管道很有用，可以将这些数据转换为*数据仓库*中更具体的表（无论如何，你应该在那里完成大部分工作）。像 Dagster、dbt、Apache
    Airflow、Argo 和 Luigi 这样的工具是用于提取、转换、加载（ETL）操作的流行数据管道和工作流编排工具。


    ## 向量搜索


    我们已经从理解这些实体之间关系的角度讨论了用户相似度和物品相似度，但我们还没有讨论这些过程的任何*加速结构*。


    首先让我们讨论一些术语：如果我们考虑一组向量，这些向量代表具有由距离函数提供的相似度度量的实体，我们将其称为*潜在空间*。简单的目标是利用我们的潜在空间及其相关的相似度度量（或互补的距离度量），以便能够快速检索*相似*物品。在我们之前关于相似度的例子中，我们讨论了用户的邻域以及如何利用它们来构建用户与未见物品之间的亲和度分数。但如何找到邻域呢？


    要理解这一点，请回想一下我们将元素 $x$ 的邻域定义为 $\mathcal{N}(x)$，即潜在空间中具有最大相似度的 $k$ 个元素的集合；或者换句话说，从与
    $x$ 的物品相似度样本中，$j \le k$ 的 $j$ 阶统计量的集合。这些通常被称为 *k-近邻*，将被视为与 $x$ 相似的元素集合。


    来自协同过滤的这些向量还产生了一些其他有用的副作用：


    - 一个简单的推荐器，从用户邻域喜欢的物品中随机采样未见物品

    - 根据邻域中已知用户的特征，预测用户的特征

    - 通过品味相似性进行用户细分


    那么我们如何加速这些过程呢？这个领域最早的重大改进之一来自倒排索引。利用倒排索引的核心是仔细构建一个大型哈希表，将查询的标记（对于基于文本的搜索）与候选项连接起来。


    这种方法非常适合可标记化的实体，如句子或小型词表集合。鉴于能够查找与查询共享一个或多个标记的物品，你甚至可以使用通用的潜在嵌入来按相似度对候选响应进行排序。这种方法在扩展时值得特别考虑：它会产生速度成本，因为它涉及两个步骤，并且因为相似度分布可能与标记相似度相关性不高，从而需要返回比我们需要的更多的候选项。


    构建搜索系统的经典方法基于大型查找表，并且感觉是确定性的。当我们转向近似最近邻查找时，我们希望放松一些这种强确定性行为，并引入一些数据结构，这些结构通过假设来*修剪*这些大型索引。你不必仅为元素的可标记化部分构建索引，而是可以预计算
    $k$-d 树，并将这些索引用作索引。$k$-d 树将在批处理过程中预计算最近邻（这可能很慢），以填充用于快速查找的 top-$k$ 响应。$k$-d 树是编码前述邻域的高效数据结构，但在高维空间中读取速度非常慢。然而，使用它们来构建倒排索引可能是一个很大的改进。


    最近，显式地使用带有向量搜索的向量数据库变得越来越可行。Elasticsearch 已经添加了此功能；Faiss 是一个 Python 库，可帮助你在系统中实现此功能；Pinecone
    是一个明确针对此目标的向量数据库系统；Weaviate 是一个原生向量数据库架构，允许你叠加先前的基于标记的倒排索引和向量相似度搜索。


    ## 近似最近邻


    这个元素的 $k$-近邻是什么？令人难以置信的是，近似最近邻（ANN）与实际最近邻相比可以获得非常高的准确性，并且你可以以令人眼花缭乱的速度提升更快地达到目标。你通常对这些问题的近似解感到满意。


    一个专门从事这些近似的开源库是 PyNNDescent，它通过优化的实现和巧妙的数学技巧使用了聪明的加速方法。通过 ANN，你可以采用前面讨论的两种策略：


    - 预索引可以得到显著改进。

    - 对于没有预索引选项的查询，你仍然可以期望获得良好的性能。


    在实践中，这些相似度查找对于使你的应用程序真正工作至关重要。虽然我们主要讨论了针对完整已知物品目录的推荐，但我们不能在其他推荐场景中假设这一点。这些场景包括：


    - 基于查询的推荐（如搜索）

    - 上下文推荐

    - 新物品的冷启动


    随着我们的进行，你将看到越来越多关于空间中相似度和最近邻的引用；在每一个这样的时刻，想想：“我知道如何让它变快！”


    ## 布隆过滤器


    *布隆过滤器*是一种概率数据结构，允许我们非常高效地测试集合成员资格，但有一个缺点：集合排除是确定性的，但集合成员资格是概率性的。*在实践中，这意味着询问“x
    是否在这个集合中”永远不会导致假阴性，但可能导致假阳性！*请注意，随着布隆过滤器大小的增加，这种第一类错误会增加。


    通过向量搜索，我们已经为用户识别了一大池潜在的推荐。从这个池中，我们需要进行一些立即的消除。最基本且必要的高级过滤类型是移除那些*用户之前未表现出兴趣或已经购买过的*物品。你可能有过这样的经历：被反复推荐同一个物品，然后想：“我不想要这个；别再给我看这个了。”从我们介绍的简单协同过滤模型中，你现在可能明白为什么会发生这种情况。


    系统通过协同过滤识别了一组你更有可能选择的物品。没有任何外部影响，这些计算将继续返回相同的结果，你将永远无法摆脱这些推荐。作为系统设计者，你可能会从一个启发式方法开始：


    > 如果用户已经看到这个物品被推荐了三次并且从未点击过，我们就不再向他们展示它了。


    这是一个完全合理的策略，可以提高推荐系统的*新鲜度*（确保用户看到新物品推荐的理念）。虽然这是一个改进推荐的简单策略，但你如何在大规模上实现它呢？


    可以通过定义以下集合来使用布隆过滤器：“这个用户是否已经看到这个物品被推荐了三次并且从未点击过？”布隆过滤器有一个注意事项：它们只能是累加的；一旦某物进入布隆过滤器，你就无法移除它。当观察像这个启发式方法这样的二元状态时，这不是问题。


    让我们构建一个用户-物品 ID 作为我们在布隆过滤器中使用的哈希值。请记住，布隆过滤器的关键特征是快速确定哈希项是否在布隆过滤器中。当我们观察到满足前述条件的用户-物品对时，将该对作为
    ID 并对其进行哈希。现在，因为该哈希对可以很容易地从用户的物品列表中重建，所以我们有一种非常快速的过滤方法。


    让我们讨论一下这个主题的一些技术细节。首先，你可能想要进行各种类型的过滤——也许新鲜度是一个，另一个可能是用户已经购买的物品，第三个可以排除已售罄的物品。


    在这里，最好独立实现每个过滤器；前两个可以像以前一样遵循我们的用户-物品 ID 哈希，第三个可以仅对物品 ID 进行哈希。'

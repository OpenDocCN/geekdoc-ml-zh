- img_proc: true
  md: 'Suppose we want the score for the positive scene-product pair to be one more
    than a negative scene-product pair. We then have the following inequality:


    $$score(scene, pos_{product}) > score(scene, neg_{product}) + 1$$


    The 1 is just an arbitrary constant we use, called a *margin*, to make sure that
    the positive scene-product score is larger than the negative scene-product score.


    Since the process of gradient descent minimizes a function, we then convert the
    preceding inequality into a loss function by moving all terms to one side:


    $$0 > 1 + score(scene, neg_{product}) - score(scene, pos_{product})$$


    As long as the quantity on the right side is larger than 0, we want to minimize
    it; but if it is already less than 0, we do not. Therefore, we encode the quantity
    in a rectified linear unit, which is represented by the function $\max(0, x)$.
    We can thus write out our loss function as follows:


    $$loss(scene, pos_{product}, neg_{product}) = \max(0, 1 + score(scene, neg_{product})
    - score(scene, pos_{product}))$$


    Since we usually minimize loss functions, this ensures that as long as the score(scene,
    neg_product) is 1 more than score(scene, pos_product), the optimization procedure
    will try to minimize the score of the negative pair while increasing the score
    of the positive pair.



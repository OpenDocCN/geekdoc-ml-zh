    # LLM Recommenders


    Natural language is a wonderful interface to ask for recommendations. If you want
    a coworker’s recommendation for lunch, maybe you’ll show up at their desk and
    say nothing—hoping they’ll remember their latent knowledge of your preferences,
    identify the time-of-day context, recall the availability of restaurants based
    on day-of-week, and keep in mind that yesterday you had a pastrami sandwich.


    More effectively, you could simply ask, “Any suggestions for lunch?”


    Like your astute coworker, models may be more effective at providing recommendations
    if you simply ask them to. This approach also adds the capability of defining
    more precisely the kind of recommendation you want. A popular application of LLMs
    is to ask them for recipes that use a set of ingredients. Thinking through this
    in the context of the kind of recommenders we’ve built, building a recommender
    of this kind has some hurdles. It probably needs some user modeling, but it’s
    very dependent on the items specified. This means that there’s a very low signal
    for each combination of specified items.


    An LLM, on the other hand, is quite effective at the autoregressive nature of
    this task: given a few ingredients, what’s most likely to be included next in
    the context of a recipe. By generating several items like this, a ranking model
    can augment this to provide a realistic recommender.


    # LLM Training


    Large generative language models of the type that have exploded in popularity
    are trained in three stages:


    +   1. Pretraining for completion

    2. Supervised fine-tuning for dialogue

    3. Reinforcement learning from human feedback


    Sometimes the latter two steps are combined into what is called *Instruct*. For
    an exceptionally deep dive into this topic, see the original InstructGPT paper
    “Training Language Models to Follow Instructions with Human Feedback” by Long
    Ouyang et al.'

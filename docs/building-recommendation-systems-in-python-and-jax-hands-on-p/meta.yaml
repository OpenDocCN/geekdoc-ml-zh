  md: "It's important to note that all this does not come for free; both lazy evaluation\
    \ and distributed DataFrames come at the cost of needing additional thought when\
    \ writing programs. Even though Spark makes a lot of this work far easier, understanding\
    \ how to write efficient code in this paradigm that works with the architecture\
    \ but still achieves complicated goals can require a year's worth of experience.\n\
    \nReturning to recommendation systems—and in particular, the offline collector—we\
    \ want to use PySpark to build the types of datasets needed to train our models.\
    \ One simple thing to do with PySpark is to transform our logs data into the appropriate\
    \ form for training a model. In our simple query, we applied a few filters to\
    \ our data and grouped by user and item to get the number of views. A variety\
    \ of other tasks may fit naturally into this paradigm—perhaps adding user or item\
    \ features stored in other databases, or high-level aggregations.\n\nIn our MPIR,\
    \ we asked for `get_item_popularities`; and we sort of assumed a few things:\n\
    \n+   - This would return the number of times each item was chosen.\n- This method\
    \ would be fast.\n\nThe second point is important if the endpoint is going to\
    \ be called in real time. So how might Spark come into play?\n\nFirst, let's assume\
    \ we have a lot of data, enough that we can't get it all to fit into our little\
    \ MacBook Pro's memory. Additionally, let's continue to use the preceding schema.\
    \ We can write an even simpler query:\n\n```\nitem_popularity_qry = \"\"\"\nSELECT\n\
    \    page_views.page_url_path\n    , COUNT(DISTINCT page_views.authenticated_user_id)\
    \ AS count_viewers\n\nFROM prod.page_views\nJOIN prod.dim_users\n    ON page_views.authenticated_user_id\
    \ = dim_users.authenticated_user_id\n\nWHERE DATE page_views.view_tstamp >= '2017-01-01'\n\
    \    AND dim_users.country_code = 'US'\n\nGROUP BY\n    page_views.page_url_path\n\
    \nORDER BY 2\n\"\"\"\n\nitem_view_counts_sdf = spark.sql(item_popularity_qry)\n\
    ```"

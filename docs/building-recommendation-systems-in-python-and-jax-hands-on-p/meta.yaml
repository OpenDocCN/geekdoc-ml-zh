    \ 'list',\n```\n\nThis is a made-up log file that may look similar to the backend\
    \ data for Bookshop.org's best sellers of the week. These are the kinds of events\
    \ that you consume from engineering and are likely stored in your columnar database.\
    \ For data like this, utilizing SQL syntax will be our entry point.\n\nPySpark\
    \ provides a convenient SQL API. Based on your infrastructure, this API will allow\
    \ you to write what looks like SQL queries against a potentially massive dataset.\n\
    \n![](img/da17d05291861831978609329c481581_93_0.png)\n\n## Example Schemas\n\n\
    These example database schemas are only guesses at what Bookshop.org may use,\
    \ but they are modeled on the authors' experience of looking at hundreds of database\
    \ schemas at multiple companies over many years. Additionally, we attempt to distill\
    \ these schemas to the components relevant to our topic. In real systems, you'd\
    \ expect much more complexity but the same essential parts. Each data warehouse\
    \ and event stream will have its own quirks. Please consult a data engineer near\
    \ you.\n\nLet's use Spark to query the preceding logs:\n\n```\nuser_item_view_counts_qry\
    \ = \"\"\"\nSELECT\n  page_views.authenticated_user_id\n  , page_views.page_url_path\n\
    \  , COUNT(DISTINCT page_views.page_view_id) AS count_views\n\nFROM prod.page_views\n\
    JOIN prod.dim_users\n      ON page_views.authenticated_user_id = dim_users.authenticated_user_id\n\
    \nWHERE DATE page_views.view_tstamp >= '2017-01-01'\n      AND dim_users.country_code\
    \ = 'US'\n\nGROUP BY\n  page_views.authenticated_user_id\n  , page_views.page_url_path\n\
    \nORDER BY 3, page_views.authenticated_user_id\n\"\"\"\n\nuser_item_view_counts_sdf\
    \ = spark.sql(user_item_view_counts_qry)\n```\n\nThis is a simple SQL query, assuming\
    \ the preceding log schema, that would allow us to see, for each user-item pair,\
    \ how many times that user has viewed that pair. The convenience of writing pure\
    \ SQL here means that we can use our experience in columnar databases to quickly\
    \ ramp up on Spark.\n\nThe major advantage of Spark, however, is not yet on display.\
    \ When executing the preceding code in a Spark session, this query will not be\
    \ immediately run. It will be staged for execution, but Spark waits until you\
    \ use this data downstream in a way that *requires immediate execution* before\
    \ it begins doing so. This is called *lazy evaluation*, and it allows you to work\
    \ on your data object without every change and interaction immediately being applied.\
    \ For more details, it's worth consulting a more in-depth guide like *Learning\
    \ Spark* by Jules Damji et al. (O'Reilly), but there's one more important characteristic\
    \ of the Spark paradigm that is essential to discuss.\n\nSpark is natively a distributed\
    \ computing language. In particular, this means that the preceding query—even\
    \ after we force it to execute—will store its data on multiple computers. Spark\
    \ works via a *driver program* in your program or notebook, which drives a *cluster\
    \ manager*, which in turn coordinates *executors* on *worker nodes*. When we query\
    \ data with Spark, instead of all that data being returned into a DataFrame in\
    \ memory on the computer we're using, parts of that data are sent to memory on\
    \ the executors. And when we do a transformation on the DataFrame, it is applied\
    \ appropriately on the pieces of the DataFrame that are stored on each of the\
    \ executors.\n\nIf this sounds a bit like magic, that's because it's obscuring\
    \ a lot of technical details behind several convenience layers. Spark is a layer\
    \ of technology that allows the ML engineer to program as if they're working on\
    \ one machine, and have those changes take effect on an entire cluster of machines.\
    \ It's not important to understand the network structure when querying, but it\
    \ is important to be aware of some of these details in case things go wrong; the\
    \ ability to understand what the error output is referring to is crucial in troubleshooting.\
    \ This is all summarized in Figure 6-1, which is a diagram from the Spark documentation.\n\
    \n![](img/da17d05291861831978609329c481581_94_0.png)\n\nFigure 6-1. Component\
    \ architecture of Spark 3.0\n\nIt's important to note that all this does not come\
    \ for free; both lazy evaluation and distributed DataFrames come at the cost of\
    \ needing additional thought when writing programs. Even though Spark makes a\
    \ lot of this work far easier, understanding how to write efficient code in this\
    \ paradigm that works with the architecture but still achieves complicated goals\
    \ can require a year's worth of experience.\n\nReturning to recommendation systems—and\
    \ in particular, the offline collector—we want to use PySpark to build the types\
    \ of datasets needed to train our models. One simple thing to do with PySpark\

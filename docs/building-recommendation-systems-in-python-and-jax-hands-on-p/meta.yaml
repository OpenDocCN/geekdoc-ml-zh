  - '[PAGE 332]


    # Metapath and Heterogeneity


    Metapath was introduced to improve explainable recommendations and integrate the
    ideas of knowledge graphs with GNNs.


    A *metapath* is a path in a heterogeneous network (or graph) that connects different
    types of nodes via different types of relationships. Heterogeneous networks contain
    various types of nodes and edges, representing multiple types of objects and interactions.
    Beyond simply users and items, the node types can be “carts of items” or “viewing
    sessions” or “channel used for purchase.”


    Metapaths can be used in GNNs for handling heterogeneous information networks
    (HINs). These networks provide a more comprehensive representation of the real
    world. When used in a GNN, a metapath provides a scheme for the way information
    should be aggregated and propagated through the network. It defines the type of
    paths to be considered when pooling information from a node’s neighborhood.


    For example, in a recommender system, you might have a heterogeneous network with
    users, movies, and genres as node types, and “watches” and “belongs to” as edge
    types. A metapath could be defined as “User - watches → Movie - belongs to → Genre
    - belongs to → Movie - watches → User.” This metapath represents a way of connecting
    two users through the movies they watch and the genres of those movies.


    A popular method that utilizes metapaths is the heterogeneous GNN (Hetero-GNN)
    and its variants. These models leverage the metapath concept to capture the rich
    semantics in HINs, enhancing the learning of node representations.


    Metapath-based models have shown promising results in various applications, as
    they allow you to explicitly encode much more abstract relationships into the
    message-passing mechanisms we’ve mentioned.


    If higher-order modeling is your thing, buckle up for the last concept we’ll cover
    in this book. This topic is state of the art and full of high-level abstractions.
    Language-model-backed agents are at the absolute cutting edge of ML modeling.


    # LLM Applications


    All of the superlatives for LLMs have been used up. For that reason, we’ll just
    say this: LLMs are powerful and have a surprisingly large number of applications.


    LLMs are general models that allow users to interact with them via natural language.
    Fundamentally, these models are generative (they write text) and auto-regressive
    (what they write is determined by what came before). Because LLMs can speak conversationally,
    they’ve been branded as general artificial *agents*. It’s natural to then ask,
    “Can an agent recommend things for me?” Let’s start by examining how to use an
    LLM to make recommendations.'

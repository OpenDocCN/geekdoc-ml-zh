- img_proc: true
  md: '# Key Components of a Recommendation System


    As we increase complexity and sophistication, let''s keep in mind the components
    of our system. We will use *string diagrams* to keep track of our components,
    but in the literature these diagrams are presented in a variety of ways.


    We will identify and build on three core components of recommendation systems:
    the collector, ranker, and server.


    # Collector


    The collector''s role is to know what is in the collection of things that may
    be recommended, and the necessary features or attributes of those things. Note
    that this collection is often a subset based on context or state.


    # Ranker


    The ranker''s role is to take the collection provided by the collector and order
    some or all of its elements, according to a model for the context and user.


    # Server


    The server''s role is to take the ordered subset provided by the ranker, ensure
    that the necessary data schema is satisfied—including essential business logic—and
    return the requested number of recommendations.


    Take, for example, a hospitality scenario with a waiter:


    > When you sit down at your table, you look at the menu, unsure of what you should
    order. You ask the waiter, “What do you think I should order for dessert?”


    The waiter checks their notes and says, “We’re out of the key lime pie, but people
    really like our banana cream pie. If you like pomegranate, we make pom ice cream
    from scratch; and it’s hard to go wrong with the donut a la mode—it’s our most
    popular dessert.”


    In this short exchange, the waiter first serves as a collector: identifying the
    desserts on the menu, accommodating current inventory conditions, and preparing
    to talk about the characteristics of the desserts by checking their notes.


    Next, the waiter serves as a ranker; they mention items high scoring in popularity
    (banana cream pie and donut a la mode) as well as a contextually high match item
    based on the patron''s features (if they like pomegranate).


    Finally, the waiter serves the recommendations verbally, including both explanatory
    features of their algorithm and multiple choices.'
  merge: -1
  pgno: 23
- img_proc: true
  md: "While this seems a bit cartoonish, remember to ground discussions of recommendation\
    \ systems in real-world applications. One of the advantages of working in RecSys\
    \ is that inspiration is always nearby.\n\n# Simplest Possible Recommenders\n\n\
    We've established the components of a recommender, but to really make this practical,\
    \ we need to see this in action. While much of the book is dedicated to practical\
    \ recommendation systems, first we'll start with a toy and scaffold from there.\n\
    \n# The Trivial Recommender\n\nThe absolute simplest recommender is not very interesting\
    \ but can still be demonstrated in the framework. It's called *the trivial recommender*\
    \ (TR) because it contains virtually no logic:\n\n```\ndef get_trivial_recs()\
    \ -> Optional[List[str]]:\n    item_id = random.randint(0, MAX_ITEM_INDEX)\n\n\
    \    if get_availability(item_id):\n        return [item_id]\n    return None\n\
    ```\n\nNotice that this recommender may return either a specific `item_id` or\
    \ `None`. Also observe that this recommender takes no arguments, and `MAX_ITEM_INDEX`\
    \ is referencing a variable out of scope. Software principles ignored, let's think\
    \ about the three components:\n\n*Collector*\nA random `item_id` is generated.\
    \ The TR collects by checking the availability of `item_id`. We could argue that\
    \ having access to `item_id` is also part of the collector's responsibility. Conditional\
    \ upon the availability, the collection of recommendable things is either `[item_id]`\
    \ or `None` (*recall that `None` is a collection in the set-theoretic sense*).\n\
    \n*Ranker*\nThe TR ranks with a no-op; i.e., the ranking of 1 or 0 objects in\
    \ a collection is the identity function on that collection, so we merely do nothing\
    \ and move on to the next step.\n\n*Server*\nThe TR serves recommendations by\
    \ its `return` statements. The only schema that's been specified in this example\
    \ is that the return type is `Optional[List[str]]`."
  merge: -1
  pgno: 24
- img_proc: true
  md: "This recommender, which is not interesting or useful, provides a skeleton that\
    \ we will add to as we develop further.\n\n# Most-Popular-Item Recommender\n\n\
    The *most-popular-item recommender* (MPIR) is the simplest recommender that contains\
    \ any utility. You probably won't want to build applications around it, but it's\
    \ useful in tandem with other components in addition to providing a basis for\
    \ further development.\n\nAn MPIR works just as it says; it returns the most popular\
    \ items:\n\n```\ndef get_item_popularities() -> Optional[Dict[str, int]]:\n  \
    \  ...\n    # Dict of pairs: (item-identifier, count times item chosen)\n    return\
    \ item_choice_counts\n    return None\n\ndef get_most_popular_recs(max_num_recs:\
    \ int) -> Optional[List[str]]:\n    items_popularity_dict = get_item_popularities()\n\

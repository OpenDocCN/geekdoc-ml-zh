- md: '## Output from HPO MF


    Let''s have a quick look at what the prior work has produced. First, Figure 10-3
    shows that our primary loss function, observed mean square error (OMSE), is rapidly
    decreasing. This is great, but we should take a deeper look.


    ![](img/da17d05291861831978609329c481581_213_0.png)


    *Figure 10-3. The loss during training*


    Let''s also have a quick look to ensure that our regularization parameters (Figure
    10-4) are converging. We can see that our L2 regularization could probably still
    decrease if we were to continue for more epochs.


    ![](img/da17d05291861831978609329c481581_214_0.png)


    *Figure 10-4. Regularization parameters*


    We''d like to see our cross-validation laid out by fold and corresponding loss
    (Figure 10-5). This is a *parallel coordinates chart*; its lines correspond to
    different runs that are in correspondence with different choices of parameters,
    and its vertical axes are different metrics. The far-right heatmap axis corresponds
    to the overall total loss that we''re trying to minimize. In this case, we alternate
    test loss on a fold and total loss on that fold. Lower numbers are better, and
    we hope to see individual lines consistent across their loss per fold (otherwise,
    we may have a skewed dataset). We see that choices of hyperparameters can interact
    with fold behavior, but in all the low-loss scenarios (at the bottom), we see
    a high correlation between performance on different folds (the vertical axes in
    the plot).


    ![](img/da17d05291861831978609329c481581_215_0.png)


    *Figure 10-5. The loss during training*


    Next up, which choices of hyperparameters have a strong effect on performance?
    Figure 10-6 is another parallel coordinates plot with the vertical axes corresponding
    to different hyperparameters. Generally, we''re looking for which domains on the
    vertical axes correspond to low loss on the far-right heatmap. We see that some
    of our hyperparameters like priors distribution and, somewhat surprisingly, ell_2
    have virtually no effect. However, small embedding dimension and small Gramian
    weight definitely do. A larger alpha also seems to correlate well with good performance.


    ![](img/da17d05291861831978609329c481581_215_1.png)


    *Figure 10-6. The loss by hyperparameter*'
  mdcn: '## HPO MF 的输出


    让我们快速查看一下先前工作产生的结果。首先，图 10-3 显示我们的主要损失函数——观测均方误差（OMSE）正在快速下降。这很好，但我们应该更深入地观察。


    ![](img/da17d05291861831978609329c481581_213_0.png)


    *图 10-3. 训练过程中的损失*


    我们也快速查看一下，以确保我们的正则化参数（图 10-4）正在收敛。我们可以看到，如果继续更多的训练轮次，我们的 L2 正则化可能仍然会下降。


    ![](img/da17d05291861831978609329c481581_214_0.png)


    *图 10-4. 正则化参数*


    我们希望看到交叉验证按折（fold）和相应的损失（图 10-5）进行展示。这是一个*平行坐标图*；其线条对应于不同的运行，这些运行与不同的参数选择相关联，其垂直轴是不同的指标。最右侧的热图轴对应于我们试图最小化的总体损失。在这种情况下，我们交替显示某一折的测试损失和该折的总损失。数值越低越好，我们希望看到单条线在各折的损失上保持一致（否则，我们可能有一个偏斜的数据集）。我们看到超参数的选择可能与折的行为相互作用，但在所有低损失场景（位于底部）中，我们看到不同折上的性能（图中的垂直轴）之间存在高度相关性。


    ![](img/da17d05291861831978609329c481581_215_0.png)


    *图 10-5. 训练过程中的损失*


    接下来，哪些超参数的选择对性能有显著影响？图 10-6 是另一个平行坐标图，其垂直轴对应于不同的超参数。通常，我们寻找垂直轴上的哪些区域对应于最右侧热图上的低损失。我们看到，我们的一些超参数，如先验分布，以及有些出乎意料的
    ell_2，几乎没有影响。然而，较小的嵌入维度和较小的格拉姆矩阵权重确实有影响。较大的 alpha 似乎也与良好的性能有很好的相关性。


    ![](img/da17d05291861831978609329c481581_215_1.png)


    *图 10-6. 按超参数划分的损失*'

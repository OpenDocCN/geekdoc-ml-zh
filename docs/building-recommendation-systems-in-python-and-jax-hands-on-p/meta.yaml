  md: "average as the representation for the context. Another way is to find the track\
    \ with the maximal affinity as the closest track in the context to that of the\
    \ next track.\n\nDetails on various options can be found in “Affinity Weighted\
    \ Embedding” by Jason Weston et al. We have found that if a user has diverse interests,\
    \ finding the max affinity doesn't update the context embeddings in the same direction\
    \ as the next track, as using the mean embedding does. In the case of playlists,\
    \ the mean context embedding vector should function just as well because playlists\
    \ tend to be on a single theme.\n\nNotice that we compute the affinity for the\
    \ negative tracks as well. This is because we want the next tracks to have more\
    \ affinity to the context than the negative tracks. In addition to the affinity\
    \ of the context and next tracks to the context, we also compute the L2 norm of\
    \ the vectors as a way to regularize the model so it does not overfit on the training\
    \ data. We also reverse the embedding vectors and compute what we call self-affinity,\
    \ or the affinity of the context, next, and negative embeddings to themselves,\
    \ simply by reversing the list of vectors and taking the dot product. This does\
    \ not exhaustively compute all the affinities of the set with itself; this again\
    \ is left as an exercise for you as it builds intuition and skill in using JAX.\n\
    \nThe results are then returned as a tuple to the caller.\n\n# Framing the Loss\

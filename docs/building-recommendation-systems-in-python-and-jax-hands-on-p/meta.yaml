- img_proc: true
  md: '# CHAPTER 12

    Training for Ranking


    Typical ML tasks usually predict a single outcome, such as the probability of
    being in a positive class for classification tasks, or an expected value for regression
    tasks. Ranking, on the other hand, provides a relative ordering of sets of items.
    This kind of task is typical of search results or recommendations, where the order
    of items presented is important. In these kinds of problems, the score of an item
    usually isn''t shown to the user directly but rather is presented—maybe implicitly—with
    the ordinal rank of the item: the item at the top of the list is numbered lower
    than the next item.


    This chapter presents various kinds of loss functions that ML algorithms can use
    during training. These scores should estimate list orderings such that when compared
    to one another, they result in sets that are ordered more closely to the relevance
    ordering observed in a training dataset. Here we will focus on introducing the
    concepts and computations, which you''ll put to work in the next chapter.


    # Where Does Ranking Fit in Recommender Systems?


    Before we dive into the details of loss functions for ranking, we should talk
    about where ranking fits into the larger scheme of recommender systems as a whole.
    Typical large-scale recommenders have a retrieval phase, in which a cheap function
    is used to gather a decent number of candidate items into a candidate set. Usually,
    this retrieval phase is only item based. For example, the candidate set might
    include items related to recently consumed or liked items by a user. Or if freshness
    is important, such as for news data, the set might include the newest popular
    and relevant items for the user. After items are gathered into a candidate set,
    we apply ranking to its items.


    Also, since the candidate set is usually much smaller than the entire corpus of
    items, we can use more expensive models and auxiliary features to help the ranking.'
  merge: -1
  pgno: 248
- img_proc: true
  md: "These features could be user features or context features. User features could\
    \ help in determining the items’ usefulness to the user, such as the average embedding\
    \ of recently consumed items. Context features could indicate details about the\
    \ current session, such as time of day or recent queries that a user has typed—a\
    \ feature that differentiates the current session from others and helps in determining\
    \ relevant items. Finally, we have the representation of the items themselves,\
    \ which can be anything from content features to learned embeddings that represent\
    \ the item.\n\nThe user, context, and item features are then concatenated into\
    \ one feature vector that we will use to represent the item; we then score all\
    \ the candidates at once and order them. The rank ordered set might then have\
    \ extra filtering applied to it for business logic, such as removing near duplicates\
    \ or making the ranked set more diverse in the kinds of items displayed.\n\nIn\
    \ the following examples, we will assume that the items can all be represented\
    \ by a concatenated feature vector of user, context, and item features and that\
    \ the model could be as simple as a linear model with a weight vector W that is\
    \ dotted with the item vector to obtain a score for sorting the items. These models\
    \ can be generalized to deep neural networks, but the final layer output is still\
    \ going to be a scalar used to sort the items.\n\nNow that we have set the context\
    \ for ranking, let’s consider ways we might rank a set of items represented by\
    \ vectors.\n\n# Learning to Rank\n\n*Learning to rank* (LTR) is the name for the\
    \ kind of models that score an ordered list of items according to their relevancy\
    \ or importance. This technique is how we go from the potentially raw output of\
    \ retrieval to a sorted list of items based on their relevance.\n\nLTR problems\
    \ have three main types:\n\n+   *Pointwise*\n    The model treats individual documents\
    \ in isolation and assigns them a score or rank. The task becomes a regression\
    \ or classification problem.\n\n*Pairwise*\n    The model considers pairs of documents\
    \ simultaneously in the loss function. The goal is to minimize the number of incorrectly\
    \ ordered pairs.\n\n*Listwise*\n    The model considers the entire list of documents\
    \ in the loss function. The goal is to find the optimal ordering of the entire\
    \ list."

    余弦相似度的取值范围是 -1 到 1，其中 -1 表示偏好和特征完全不相似，0 表示没有相似性，1 表示用户偏好与产品特征完全一致。在推荐系统的背景下，余弦相似度提供了一种归一化的相似度度量，它对用户和产品向量的模长具有不变性。请注意，选择使用余弦相似度还是

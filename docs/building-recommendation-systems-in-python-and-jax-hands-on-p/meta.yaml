  md: '# CHAPTER 13

    Putting It All Together:

    Experimenting and Ranking


    In the last few chapters, we have covered many aspects of ranking, including various
    kinds of loss functions as well as metrics for measuring the performance of ranking
    systems. In this chapter, we will show an example of a ranking loss and ranking
    metric on the Spotify Million Playlist dataset.


    This chapter encourages a lot more experimentation and is more open-ended than
    the previous ones, whose goal was to introduce concepts and infrastructure. This
    chapter, on the other hand, is written to encourage you to roll up your sleeves
    and engage directly with loss functions and writing metrics.


    # Experimentation Tips


    Before we begin digging into the data and modeling, let''s cover some practices
    that will make your life easier when doing a lot of experimentation and rapid
    iteration. These are general guidelines that have made our experimentation faster.
    As a result, we''re able to rapidly iterate toward solutions that help us reach
    our objectives.


    Experimental code is different from engineering code in that the code is written
    to explore ideas, not for robustness. The goal is to achieve maximum velocity
    while not sacrificing too much in terms of code quality. So you should think about
    whether a piece of code should be thoroughly tested or whether this isn''t necessary
    because the code is present only to test a hypothesis and then it will be thrown
    away. With that in mind, here are some tips. Keep in mind that these tips are
    the opinion of the authors, developed over time, and are not hard-and-fast rules,
    just some flavored opinions that some may disagree with.'
  merge: -1
  pgno: 260
- img_proc: true
  md: '# Keep It Simple


    In terms of the overall structure of research code, it''s best to keep it as simple
    as possible. Try not to overthink too much in terms of inheritance and reusability
    during the early stages of the lifecycle of exploration. At the start of a project,
    we usually don''t know what it needs yet, so the preference should be keeping
    the code easily readable and simple for debugging. That means you don''t have
    to focus too much on code reuse because at the early stage of a project, many
    code changes will occur while the structure of the model, data ingestion, and
    interaction of various parts of a system are being worked out. When the uncertainties
    have been worked out, then you can rewrite the code into a more robust form, but
    refactoring too early actually slows velocity.


    A general rule of thumb is that it is OK to copy code three times and then refactor
    out into a library the fourth time, because you''ll have seen enough use cases
    to justify the reuse of code. If refactoring is done too early, you might not
    have seen enough use cases of a piece of code to cover the possible use cases
    that it might need to handle.


    # Debug Print Statements


    If you''ve read a number of ML research papers, you may expect your data to be
    fairly clean and orderly at the start of a project. However, real-world data can
    be messy, with missing fields and unexpected values. Having lots of print functions
    allows you to print and visually inspect a sample of the data and also helps in
    crafting the input data pipelines and transformations to feed the model. Also,
    printing sample outputs of the model is useful in making sure the output is as
    expected.


    The most important places to include logging are the input and output schema between
    components of your system; these help you understand where reality may be deviating
    from expectations. Later, you can make unit tests to ensure that refactoring of
    the model doesn''t break anything, but the unit tests can wait for when the model
    architecture is stable. A good rule of thumb is to add unit tests when you want
    to refactor code or reuse or optimize the code to preserve functionality or when
    the code is stable and you want to ensure that it doesn''t break a build. Another
    good use case of adding print statements is when you inevitably run into not-a-number
    (NaN) errors when running training code.'

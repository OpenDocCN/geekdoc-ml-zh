    \ 500)\n    top_tracks = all_tracks[top_k_indices]\n    top_artists = all_artists[top_k_indices]\n\
    \    top_tracks_count = jnp.sum(jnp.isin(\n        top_tracks, y[\"next_track\"\
    ])).astype(jnp.float32)\n    top_artists_count = jnp.sum(jnp.isin(\n        top_artists,\
    \ y[\"next_artist\"])).astype(jnp.float32)\n\n    top_tracks_recall = top_tracks_count\
    \ / y[\"next_track\"].shape[0]\n    top_artists_recall = top_artists_count / y[\"\
    next_artist\"].shape[0]\n\n    metrics = jnp.stack([top_tracks_recall, top_artists_recall])\n\
    \n    return metrics\n```\n\nThe first piece of code is the evaluation step. To\
    \ compute the affinities of the entire corpus, we pass in the album and artist\
    \ indices for every possible track in the corpus to the model and then sort them\
    \ using `jax.lax.top_k`. The first two lines are the scoring code for recommending\
    \ the next tracks from the context during recommendations. LAX is a utility library\
    \ that comes with JAX that contains functions outside of the NumPy API that are\
    \ handy to work with vector processors like GPUs and TPUs. In the Spotify Million\
    \ Playlist Dataset Challenge, one of the metrics is the recall@k at the artist\
    \ and track level. For the tracks, the `isin` function returns the correct metric\
    \ of the intersection of the next tracks and the top 500 scoring tracks of the\
    \ corpus divided by the size of the set of next tracks. This is because the tracks\
    \ are unique in the corpus. However, JAX's `isin` doesn't support making the elements\
    \ unique, so for the artist recall metric, we might count artists in the recall\
    \ set more than once. For the sake of computational efficiency, we use the multiple\
    \ counts instead so that the evaluation might be computed quickly on the GPU so\
    \ as not to stall the training pipeline. On a final evaluation, we might want\
    \ to move the dataset to a CPU for a more accurate metric.\n\nWe use Weights &\
    \ Biases again to track all the metrics, as depicted in Figure 13-1. You can see\
    \ how they fare with each other over several experiments:\n\n![](img/da17d05291861831978609329c481581_277_0.png)\n\
    \nNext, we will look at the loss functions, another juicy part that you can experiment\

  - '[PAGE 236]


    Second, let’s consider looking for a gas station nearby on a mapping app while
    in a large metro. We expect that a lot of gas stations are relatively close by,
    but you would probably consider only the first couple—or maybe even only one,
    the first one that you see. Thus a recommender for this problem has the following:


    +   - Many relevant results

    - Few useful recommendations


    In the first scenario, the relevant results may be fully contained in the recommendations,
    and in the second scenario, the recommendations may be fully contained in the
    relevant results.


    Let’s now look at more common scenarios.


    For our third example, consider that you’re searching on a streaming video platform
    for something to watch tonight when you’re feeling romantic. Streaming platforms
    tend to show a lot of recommendations—pages and pages from this one theme or another.
    But on this night, and on just this platform, only a couple of movies or TV shows
    might really fit what you’re looking for. Our recommender, then, does the following:


    +   - Provides many recommendations

    - Offers only a few that are actually relevant


    However, importantly, not all relevant results will be in the recommendations!
    As we know, different platforms have different media, so some of the relevant
    results won’t appear in the recommendations no matter how many we look at.


    Fourth, and finally, you’re a high-end coffee lover with distinguished tastes
    headed into the local roaster for a third-wave, single-origin coffee. As an experienced
    coffee connoisseur, you love high-quality coffees from all over the world and
    enjoy most but not all origins. On any given day, your local cafe has only a few
    single-origin hand-brewed options. Despite your worldly palette, there are some
    popular terroirs that you just don’t love. This little recommendation brew bar
    can be described as follows:


    +   - Provides a few recommendations

    - Offers many possible recommendations that are relevant


    On any given day, only some of the few recommendations may be relevant to you.'
  - '[PAGE 237]


    So those are our matching four scenarios. For the latter two, the intersection
    between recommendation and relevance may be proportionally small or large—or even
    empty! The main idea is that the full size of the smaller sample is not always
    in use.


    Now that we’ve worked through a few examples, let’s see how they relate to the
    core metrics for a recommender: precision and recall @ *k* (Figure 11-1). Focusing
    on examples 3 and 4, we can see that only some of the recommendations intersect
    with the options that are relevant. And only some of the relevant options intersect
    with the recommendations. It’s often overlooked, but in fact *these two ratios
    define our metrics*—let’s go!


    ![](img/da17d05291861831978609329c481581_237_0.png)


    *Figure 11-1. Recall and precision sets*


    # # @ *k*


    In much of this chapter and RecSys metrics discussion, we say things like @ *k*.
    This means “at *k*,” which should really be “in *k*” or “out of *k*.” These are
    simply the size of the set of recommendations. We often anchor the customer experience
    on how many recommendations we can show the user without the experience suffering.
    We also need to know the cardinality of the set of relevant items, which we call
    @ *r*. Note that while it may not feel like it’s possible to ever know this number,
    we assume this refers to “known relevant” options via our training or test data.'
  - '[PAGE 238]


    # Precision at k


    *Precision* is the ratio of the size of the set of relevant recommendations to
    *k*, the size of the set of recommendations.


    $$Precision@k = \frac{num_{relevant}}{(k)}$$


    Notice that the size of the relevant items doesn''t appear in the formula. That''s
    OK; the size of the intersection is still dependent on the size of the set of
    relevant items.


    Looking at our examples, 2 technically has the highest precision, but it''s a
    bit of a red herring because of the number of relevant results. This is one reason
    precision is not the most common metric for evaluating recommendation systems.


    # Recall at k


    *Recall* is the ratio of the size of the set of relevant recommendations to *r*,
    the size of the set of relevant items.


    But wait! If the ratio is the relevant recommendations over the relevant items,
    where is *k*? *k* is still important here because the size of the set of recommendations
    constrains the possible size of the intersection. Recall that these ratios are
    operating on that intersection that is always dependent on *k*. This means you
    often consider the max of *r* and *k*.


    In scenario 3, we hope that some of the movies that fit our heart''s desire will
    be on the right streaming platform. The number of these divided by the count of
    all the media anywhere is the *recall*. If all your relevant movies are on this
    platform, you might call that *total recall*.


    Scenario 4''s café experience shows that recall is sometimes the inverse probability
    of an avoid; because you like so many coffees, we might instead find it easier
    to talk about what you don''t like. In this case, the number of avoids in the
    offering will have a large effect on the recall:


    $$Recall@k = \frac{(k - Avoid@k)}{num_{relevant}}$$


    This is the core mathematical definition for recall and is often one of the first
    measurements we''ll consider because it''s a pure estimate of how your retrieval
    is performing.'
  - "[PAGE 239]\n\n# R-precision\n\nIf we also have a ranking on our recommendations,\
    \ we can take the ratio of relevant recommendations to $r$ in the $top-r$ recommendations.\
    \ This improves this metric in cases where $r$ is very small, as in examples 1\
    \ and 3.\n\n# mAP, MMR, NDCG\n\nHaving delved into the reliable domains of precision@$k$\
    \ and recall@$k$, we've gained valuable insights into the quality of our recommendation\
    \ systems. However, these metrics, as crucial as they are, can sometimes fall\
    \ short in capturing an important aspect of these systems: *the order of recommendations*.\n\
    \nIn recommendation systems, the ordering in which we present suggestions carries\
    \ significant weight and needs to be evaluated to ensure that it's effective.\n\
    \nThat's why we'll now journey beyond precision@$k$ and recall@$k$ to explore\
    \ some key ranking-sensitive metrics—namely, mean average precision (mAP), mean\
    \ reciprocal rank (MRR), and normalized discounted cumulative gain (NDCG). These\
    \ metrics consider not only whether our recommendations are relevant but also\
    \ whether they are well-ordered.\n\nThe mAP metric lends importance to each relevant\
    \ document and its position, and MRR concentrates on the rank of the first relevant\
    \ item. NDCG gives more importance to relevant documents at higher ranks. By understanding\
    \ these metrics, you'll have an even more robust set of tools to evaluate and\
    \ refine your recommendation systems.\n\nSo, let's carry on with our exploration,\
    \ striking a balance between precision and comprehensibility. By the end of this\
    \ section, you will be well equipped to handle these essential evaluation methods\
    \ in a confident and knowledgeable manner.\n\n# mAP\n\nThis vital metric in recommendation\
    \ systems is particularly adept at accounting for the rank of relevant items.\
    \ If, in a list of five items, the relevant ones are found at positions 2, 3,\
    \ and 5, mAP would be calculated by computing precision@2, precision@3, and precision@5\
    \ and then taking an average of these values. The strength of mAP lies in its\
    \ sensitivity to the ordering of relevant items, providing a higher score when\
    \ these items are ranked higher.\n\nConsider an example with two recommendation\
    \ algorithms A and B:\n\n+   - For algorithm A, we compute the mAP as follows:\n\
    \  (precision@2 + precision@3 + precision@5) / 3 = (1/2 + 2/3 + 3/5) / 3 = 0.6"

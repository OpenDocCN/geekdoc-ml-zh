    大量的元组——类似于我们见过的示范数据——提供了陈述和回应，尽管不是只有一个回应，而是有多个回应。它们被排序（通过人工标注者），然后对于每一对优劣回应（$x,
    sup, inf$），我们评估损失：


    -   $r_{sup} = \Theta(x, sup)$ 是奖励模型对优等回应的评分。

    -   $r_{inf} = \Theta(x, inf)$ 是奖励模型对劣等回应的评分。


    最终损失计算为：$-log(\sigma(sup - inf))$。


    然后使用这个奖励函数来微调模型。


    OpenAI通过图18-1中的图表总结了这种方法。


    ![图18-1. 用于模型微调的指令方法](img/da17d05291861831978609329c481581_335_0.png)


    ## 用于推荐的指令微调


    在之前关于指令对的讨论中，我们看到训练的最终目标是学习两个回应之间的排序比较。这种训练应该感觉相当熟悉。在Keqin Bao等人的论文《TALLRec: An
    Effective and Efficient Tuning Framework to Align Large Language Model with Recommendation》中，作者使用了类似的设置来教模型用户偏好。


    正如论文所提到的，历史交互物品根据其评分被分为两组：用户喜欢的和用户不喜欢的。他们将这些信息收集到自然语言提示中，以格式化最终的“推荐输入”：


    1.  用户偏好：$[item_1, \dots, item_n]$

    2.  用户偏好：$[item_1, \dots, item_n]$

    3.  用户会喜欢用户偏好，$[item_{n+1}]$吗？


    这些遵循与之前提到的InstructGPT相同的训练模式。与未经训练的用于推荐的大语言模型相比，作者在推荐问题上实现了显著的性能提升；然而，这些应被视为基线，因为这不是它们的目标任务。



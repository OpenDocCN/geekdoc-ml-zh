    \ for the top of the ranking list for a single positive item but does not specify\
    \ how to pick the positive item.\n\nSeveral alternate strategies can be used for\
    \ ordering the top of the list, including optimizing for mean maximum rank, which\
    \ tries to group the positive items such"
  - '[PAGE 254]


    that the lowest-scoring positive item is as near the top of the list as possible.
    To allow this ordering, we provide a probability distribution function over how
    we pick the positive sample. If the probability is skewed toward the top of the
    positive item list, we get a loss more like WARP loss. If the probability is uniform,
    we get AUC loss. If the probability is skewed toward the end of the positive item
    list, we then optimize for the worst case, like mean maximum rank. The NumPy function
    np.random.choice provides a mechanism from sampling from a distribution $P$.


    We have one more optimization to consider: $K$, the number of positive samples
    to use to construct the positive set. If $K = 1$, we pick only a positive random
    item from the positive set; otherwise, we construct the positive set, order the
    samples by score, and sample from the positive list of size $K$ by using the probability
    distribution $P$. This optimization made sense in the era of CPUs when compute
    was expensive but might not make that much sense these days in the era of GPUs
    and TPUs, which we will talk about in the following warning.


    ![](img/da17d05291861831978609329c481581_254_0.png)


    # Stochastic Losses and GPUs


    A word of caution about the preceding stochastic losses. They were developed for
    an earlier era of CPUs when it was cheap and easy to sample and exit if a negative
    sample was found. These days, with modern GPUs, making branching decisions like
    this is harder because all the threads on the GPU core have to run the same code
    over different data in parallel. That usually means both sides of a branch are
    taken in a batch, so less computational savings occur from these early exits.
    Consequently, branching code that approximates stochastic losses like WARP and
    $k$-order statistic loss appear less efficient.


    What are we to do? We will show in Chapter 13 how to approximate these losses
    in code. Long story short, because of the way vector processors like GPUs tend
    to work by processing lots of data in parallel uniformly, we have to find a GPU-friendly
    way to compute these losses. In the next chapter, we approximate the negative
    sampling by generating a large batch of negatives and either scoring them all
    lower than the negative or looking for the most egregious violating negative or
    both together as a blend of loss functions.'
- md: '## BM25


    While much of this book is targeted at recommending items to users, search ranking
    is a close sister study. In the space of information retrieval, or search ranking
    for documents, *best matching 25* (BM25) is an essential tool.


    BM25 is an algorithm used in information-retrieval systems to rank documents based
    on their relevance to a given query. This relevance is determined by considering
    factors like TF-IDF. It''s a bag-of-words retrieval function that ranks a set
    of documents based on the query terms appearing in each document. It''s also a
    part of the probabilistic relevance framework and is derived from the probabilistic
    retrieval model.


    The BM25 ranking function calculates a score for each document based on the query.
    The document with the highest score is considered the most relevant to the query.


    Here is a simplified version of the BM25 formula:


    ```

    $$\text{score}(D, Q) = \sum_{i=1}^{n} \text{IDF}(q_i) * \frac{f(q_i, D) * (k1
    + 1)}{f(q_i, D) + k1 * \left(1 - b + b * \frac{|D|}{\text{avgdl}}\right)}$$

    ```


    The elements of this formula are as follows:


    - $D$ represents a document.

    - $Q$ is the query that consists of words $\{q_1, q_2, \dots, q_n\}$.

    - $f(q_i, D)$ is the frequency of query term $q_i$ in document $D$.

    - $|D|$ is the length of (the number of words in) the document $D$.

    - $\text{avgdl}$ is the average document length in the collection.

    - $k_1$ and $b$ are hyperparameters. $k_1$ is a positive tuning parameter that
    calibrates the document term frequency scaling. $b$ is a parameter that determines
    the scaling by document length: $b = 1$ corresponds to fully scaling the term
    weight by the document length, while $b = 0$ corresponds to no length normalization.

    - $\text{IDF}(q_i)$ is the inverse document frequency of query term $q_i$, which
    measures the amount of information the word provides (whether it''s common or
    rare across all documents). BM25 applies a variant of IDF that can be computed
    as follows:


    ```

    $$\text{IDF}(q_i) = \log \left( \frac{N - n(q_i) + 0.5}{n(q_i) + 0.5} \right)$$

    ```


    Here, $N$ is the total number of documents in the collection, and $n(q_i)$ is
    the number of documents containing $q_i$.


    Simply, BM25 combines both term frequency (how often a term appears in a document)
    and inverse document frequency (how much unique information a term provides) to
    calculate the relevance score. It also introduces the concept of document length
    normalization, penalizing too-long documents and preventing them from dominating
    shorter ones, which is a common issue in simple TF-IDF models. The free parameters
    $k_1$ and $b$ allow the model to be tuned based on the specific characteristics
    of the document set.


    In practice, BM25 provides a robust baseline for most information-retrieval tasks,
    including ad hoc keyword search and document similarity. BM25 is used in many
    open source search engines, such as Lucene and Elasticsearch, and is the de facto
    standard for what is often called *full-text search*.


    So how might we integrate BM25 into the problems we discuss in this book? The
    output from BM25 is a list of documents ranked by relevance to the given query,
    and then LTR comes into play. You can use the BM25 score as one of the features
    in an LTR model, along with other features that you believe might influence the
    relevance of a document to a query.


    The general steps to combine BM25 with LTR for ranking are as follows:


    1. *Retrieve a list of candidate documents.* Given a query, use BM25 to retrieve
    a list of candidate documents.

    2. *Compute features for each document.* Compute the BM25 score as one of the
    features, along with other potential features. This could include various document-specific
    features, query-document match features, user interaction features, etc.

    3. *Train/evaluate the LTR model.* Use these feature vectors and their corresponding
    labels (relevance judgments) to train your LTR model. Or, if you already have
    a trained model, use it to evaluate and rank the retrieved documents.

    4. *Rank.* The LTR model generates a score for each document. Rank the documents
    based on these scores.


    This combination of retrieval (with BM25) and ranking (with LTR) allows you to
    first narrow the potential candidate documents from a possibly very large collection
    (where BM25 shines) and then fine-tune the ranking of these candidates with a
    model that can consider more complex features and interactions (where LTR shines).


    It is worth mentioning that the BM25 score can provide a strong baseline in text
    document retrieval, and depending on the complexity of the problem and the amount
    of training data you have, LTR may or may not provide significant improvements.


    ## Multimodal Retrieval


    Let''s take another look at this retrieval method, as we can find some powerful
    leverage. Think back to Chapter 8: we built a co-occurrence model, which illustrated
    how articles referenced jointly in other articles share meaning and mutual relevance.
    But how would you integrate search into this?


    You may think, “Oh, I can search the names of the articles.” But that doesn''t
    quite utilize our co-occurrence model; it underleverages that joint meaning we
    discovered. A classic approach may be to use something like BM25 on article titles
    or articles. More modern approaches may do a vector embedding of the query and
    article titles (using something like BERT or other transformer models). However,
    neither of these really capture both sides of what we''re looking for.


    Consider instead the following approach:


    1. Search with the initial query via BM25 to get an initial set of “anchors.”

    2. Search with each anchor as a query via your latent model(s).

    3. Train an LTR model to aggregate and rank the union of the searches.


    Now we''re using a true multimodal retrieval, leveraging multiple latent spaces!
    One additional highlight in this approach is that queries are often out of distribution
    from documents with respect to encoder-based latent spaces. This means that when
    you type **Who''s the leader of Mozambique?**, this question looks fairly dissimilar
    to the article title (Mozambique) or the relevant sentence as of summer 2023 (“The
    new government under President Samora Machel established a one-party state based
    on Marxist principles.”)


    When the embeddings are not text at all, this method becomes even more powerful:
    consider typing text to search for an item of clothing and hoping to see an entire
    outfit that goes with it.


    ## Summary


    Getting things in the right order is an important aspect of recommendation systems.
    By now, you know that ordering is not the whole story, but it''s an essential
    step in the pipeline. We''ve collected our items and put them in the right order,
    and all that''s left to do is send them off to the user.


    We started with the most fundamental concept, learning to rank, and compared it
    with some traditional methods. We then got a big upgrade with WARP and WSABIE.
    That led us to the $k$-order statistic, which involves utilizing more careful
    probabilistic sampling. We finally wrapped up with BM25 as a powerful baseline
    in text settings.


    Before we conquer serving, let''s put these pieces together. In the next chapter,
    we''re going to turn up the volume and build some playlists. This will be the
    most intensive chapter yet, so go grab a beverage and a stretch. We''ve got some
    work to do.


    # CHAPTER 13

    Putting It All Together:

    Experimenting and Ranking


    In the last few chapters, we have covered many aspects of ranking, including various
    kinds of loss functions as well as metrics for measuring the performance of ranking
    systems. In this chapter, we will show an example of a ranking loss and ranking
    metric on the Spotify Million Playlist dataset.


    This chapter encourages a lot more experimentation and is more open-ended than
    the previous ones, whose goal was to introduce concepts and infrastructure. This
    chapter, on the other hand, is written to encourage you to roll up your sleeves
    and engage directly with loss functions and writing metrics.


    ## Experimentation Tips


    Before we begin digging into the data and modeling, let''s cover some practices
    that will make your life easier when doing a lot of experimentation and rapid
    iteration. These are general guidelines that have made our experimentation faster.
    As a result, we''re able to rapidly iterate toward solutions that help us reach
    our objectives.


    Experimental code is different from engineering code in that the code is written
    to explore ideas, not for robustness. The goal is to achieve maximum velocity
    while not sacrificing too much in terms of code quality. So you should think about
    whether a piece of code should be thoroughly tested or whether this isn''t necessary
    because the code is present only to test a hypothesis and then it will be thrown
    away. With that in mind, here are some tips. Keep in mind that these tips are
    the opinion of the authors, developed over time, and are not hard-and-fast rules,
    just some flavored opinions that some may disagree with.'
  mdcn: '## BM25


    虽然本书的大部分内容都侧重于向用户推荐物品，但搜索排序是一个密切相关的姊妹学科。在信息检索或文档搜索排序领域，*最佳匹配25*（BM25）是一个必不可少的工具。


    BM25是一种用于信息检索系统的算法，它根据文档与给定查询的相关性对文档进行排序。这种相关性是通过考虑诸如TF-IDF等因素来确定的。它是一种词袋检索函数，根据查询词在每个文档中的出现情况对一组文档进行排序。它也是概率相关性框架的一部分，源自概率检索模型。


    BM25排序函数根据查询为每个文档计算一个分数。得分最高的文档被认为与查询最相关。


    以下是BM25公式的简化版本：


    ```

    $$\text{score}(D, Q) = \sum_{i=1}^{n} \text{IDF}(q_i) * \frac{f(q_i, D) * (k1
    + 1)}{f(q_i, D) + k1 * \left(1 - b + b * \frac{|D|}{\text{avgdl}}\right)}$$

    ```


    该公式的元素如下：


    - $D$ 代表一个文档。

    - $Q$ 是由单词 $\{q_1, q_2, \dots, q_n\}$ 组成的查询。

    - $f(q_i, D)$ 是查询词 $q_i$ 在文档 $D$ 中的频率。

    - $|D|$ 是文档 $D$ 的长度（单词数量）。

    - $\text{avgdl}$ 是集合中的平均文档长度。

    - $k_1$ 和 $b$ 是超参数。$k_1$ 是一个正的调优参数，用于校准文档词频的缩放。$b$ 是一个参数，用于确定按文档长度进行缩放的程度：$b =
    1$ 对应于完全按文档长度缩放词权重，而 $b = 0$ 对应于不进行长度归一化。

    - $\text{IDF}(q_i)$ 是查询词 $q_i$ 的逆文档频率，它衡量该词提供的信息量（它在所有文档中是常见还是罕见）。BM25应用了IDF的一个变体，可以按如下方式计算：


    ```

    $$\text{IDF}(q_i) = \log \left( \frac{N - n(q_i) + 0.5}{n(q_i) + 0.5} \right)$$

    ```


    这里，$N$ 是集合中的文档总数，$n(q_i)$ 是包含 $q_i$ 的文档数量。


    简单来说，BM25结合了词频（一个词在文档中出现的频率）和逆文档频率（一个词提供的独特信息量）来计算相关性分数。它还引入了文档长度归一化的概念，惩罚过长的文档，防止它们主导较短的文档，这是简单TF-IDF模型中的一个常见问题。自由参数
    $k_1$ 和 $b$ 允许根据文档集的具体特征对模型进行调优。


    在实践中，BM25为大多数信息检索任务提供了稳健的基线，包括临时关键词搜索和文档相似性。BM25被用于许多开源搜索引擎，如Lucene和Elasticsearch，并且是通常所说的*全文搜索*的事实标准。


    那么，我们如何将BM25整合到本书讨论的问题中呢？BM25的输出是一个按与给定查询相关性排序的文档列表，然后学习排序（LTR）就派上用场了。你可以将BM25分数作为LTR模型中的一个特征，连同其他你认为可能影响文档与查询相关性的特征一起使用。


    将BM25与LTR结合用于排序的一般步骤如下：


    1.  *检索候选文档列表。* 给定一个查询，使用BM25检索一个候选文档列表。

    2.  *为每个文档计算特征。* 计算BM25分数作为一个特征，以及其他潜在特征。这可能包括各种文档特定特征、查询-文档匹配特征、用户交互特征等。

    3.  *训练/评估LTR模型。* 使用这些特征向量及其对应的标签（相关性判断）来训练你的LTR模型。或者，如果你已经有一个训练好的模型，用它来评估和排序检索到的文档。

    4.  *排序。* LTR模型为每个文档生成一个分数。根据这些分数对文档进行排序。


    这种检索（使用BM25）和排序（使用LTR）的结合，使你能够首先从可能非常大的集合中缩小潜在候选文档的范围（这是BM25的优势所在），然后使用一个可以考虑更复杂特征和交互的模型来微调这些候选文档的排序（这是LTR的优势所在）。


    值得一提的是，BM25分数在文本文档检索中可以提供一个强有力的基线，并且根据问题的复杂性和你拥有的训练数据量，LTR可能会也可能不会带来显著的改进。


    ## 多模态检索


    让我们再看看这种检索方法，因为我们可以找到一些强大的杠杆。回想第8章：我们构建了一个共现模型，它说明了在其他文章中共同引用的文章如何共享意义和相互关联性。但你如何将搜索整合到其中呢？


    你可能会想，“哦，我可以搜索文章的名称。”但这并没有充分利用我们的共现模型；它低估了我们发现的这种联合意义。一种经典的方法可能是对文章标题或文章使用类似BM25的东西。更现代的方法可能是对查询和文章标题进行向量嵌入（使用类似BERT或其他Transformer模型）。然而，这两种方法都没有真正捕捉到我们所寻找的两个方面。


    考虑以下方法：


    1.  通过BM25使用初始查询进行搜索，得到一组初始的“锚点”。

    2.  使用你的潜在模型，以每个锚点作为查询进行搜索。

    3.  训练一个LTR模型来聚合和排序这些搜索的并集。


    现在我们正在使用真正的多模态检索，利用多个潜在空间！这种方法的另一个亮点是，查询在基于编码器的潜在空间中通常与文档分布不同。这意味着当你输入**莫桑比克的领导人是谁？**时，这个问题看起来与文章标题（莫桑比克）或截至2023年夏天的相关句子（“由萨莫拉·马谢尔总统领导的新政府建立了一个基于马克思主义原则的一党制国家。”）相当不同。


    当嵌入完全不是文本时，这种方法变得更加强大：考虑输入文本来搜索一件衣服，并希望看到与之搭配的整套服装。


    ## 总结


    将事物按正确的顺序排列是推荐系统的一个重要方面。到现在为止，你知道排序并不是全部，但它是流程中必不可少的一步。我们已经收集了我们的物品并将它们按正确的顺序排列，剩下的就是将它们发送给用户。


    我们从最基本的概念——学习排序开始，并将其与一些传统方法进行了比较。然后我们通过WARP和WSABIE得到了一个大的升级。这引导我们走向了 $k$ 阶统计量，它涉及利用更仔细的概率采样。最后，我们以BM25作为文本环境中的强大基线结束了讨论。


    在我们征服服务之前，让我们把这些部分组合起来。在下一章中，我们将加大音量，构建一些播放列表。这将是迄今为止最密集的一章，所以去拿杯饮料，伸个懒腰吧。我们有一些工作要做。


    # 第13章

    融会贯通：

    实验与排序


    在过去的几章中，我们涵盖了排序的许多方面，包括各种损失函数以及衡量排序系统性能的指标。在本章中，我们将在Spotify百万播放列表数据集上展示一个排序损失和排序指标的例子。


    本章鼓励更多的实验，并且比之前的章节更具开放性，之前章节的目标是介绍概念和基础设施。而本章的写作目的是鼓励你卷起袖子，直接参与损失函数和编写指标。


    ## 实验技巧


    在我们开始深入研究数据和建模之前，让我们介绍一些实践，这些实践将使你在进行大量实验和快速迭代时更加轻松。这些是通用的指导原则，使我们的实验更快。因此，我们能够快速迭代，找到帮助我们实现目标的解决方案。


    实验代码与工程代码不同，因为代码是为了探索想法而编写的，而不是为了健壮性。目标是在不牺牲太多代码质量的前提下实现最大速度。所以你应该考虑一段代码是否应该经过彻底测试，或者是否没有必要，因为代码只是为了测试一个假设而存在，然后就会被丢弃。考虑到这一点，这里有一些建议。请记住，这些建议是作者的观点，是随着时间的推移发展而来的，并不是硬性规定，只是一些可能有人不同意的个人见解。'

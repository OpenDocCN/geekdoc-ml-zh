    \n让我们再次审视我们系统的三个组件：\n\n- **收集器**：MPIR 首先调用 `get_item_popularities`，该函数通过数据库或内存访问，知道哪些物品可用以及它们被选择了多少次。为方便起见，我们假设物品以字典形式返回，键是标识物品的字符串，值表示该物品被选择的次数。我们隐含地假设，未出现在此列表中的物品是不可用的。\n\

    Figure 2-4. An onboarding funnel


    Three important funnel analyses can be considered in Figure 2-4:


    +   1. Page view to add-to-bag user flow

    2. Page view to add-to-bag per recommendation

    3. Add-to-bag to complete purchase


    The first funnel is merely identifying, at a high level, the percentage of users
    who take each step in the flow. This is a high-level measure of your website optimization,
    the general interestingness of your product offering, and the quality of your
    user leads.


    The second funnel, which is more fine-grained, takes into consideration the recommendations
    themselves. As mentioned previously in terms of propensity scoring, users can
    proceed through the funnel for a particular item only if they''re shown the item.
    This concept intersects with the use of funnels because you want to understand
    at a high level how certain recommendations correlate with funnel drop-off, but
    also, when using a recommendation system, the confidence in your recommendations
    should correlate well with the funnel metrics. We will return to this in more
    detail in Part III, but for now you should remember to think about different categories
    of recommendation-user pairs and how their funnels may look compared to the average.


    Finally, we can consider add-to-bag to completion. This actually isn''t part of
    the RecSys problem but should be on your mind as a data scientist or ML engineer
    trying to improve the product. *No matter how good your recommendations are, this
    funnel may destroy any of your hard work.* Before working on a recommender problem,
    you should almost always investigate the funnel performance in getting a user
    from add-to-bag to check-out-completed. If there''s something cumbersome or difficult'

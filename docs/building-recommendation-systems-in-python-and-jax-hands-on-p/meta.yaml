    # Centered Kernel Alignment


    When training neural networks, the latent space representations at each layer
    are expected to express correlation structures between the incoming signals. Frequently,
    these interstitial representations comprise a sequence of states transitioning
    from the initial layer to the final layer. You may naturally wonder, “How do these
    representations change throughout the layers of the network” and “How similar
    are these layers?” Interestingly, for some architectures, this question may yield
    deep insight into the network’s behavior.


    This process of comparing layer representations is called *correlation analysis*.
    For an MLP with layers 1, ..., $N$, the correlations may be represented by an
    $N \times N$ matrix of pairwise relationships. The idea is that each layer comprises
    a series of latent factors, and similar to correlation analysis for other features
    of a dataset, these latent features’ relationships may be simply summarized by
    their covariance.


    # Affinity and p-sale


    As you’ve seen, MF is a powerful dimension-reduction technique that can yield
    an estimator for the probability of a sale (often shorted to *p-sale*). In MF,
    the goal has been to decompose this historical data on user behavior and the product
    sales matrix into two lower-dimensional matrices: one that represents user preferences
    and another that represents product characteristics. Now, let’s convert this MF
    model into a sale estimator.


    Let $R \in \mathbb{R}^{(M \times N)}$ be the historical data matrix, where $M$
    is the number of users and $N$ is the number of products. The MF aims to find
    two matrices $U \in \mathbb{R}^{(M \times d)}$ and $V \in \mathbb{R}^{(N \times
    d)}$, where $d$ is the dimensionality of the latent space, such that:


    $R \simeq U * V^T$


    The *probability of a sale*, or equivalently a read, watch, eat, or click, can
    be predicted using MF by first decomposing the historical data matrix into user
    and product matrices, and then calculating a score that represents the likelihood
    of a user purchasing a given product. This score can be calculated using the dot
    product of the corresponding row in the user matrix and the column in the product
    matrix, followed by a logistic function to transform the dot product into a probability
    score.


    Mathematically, the probability of a sale for a user $u$ and a product $p$ can
    be represented as follows:


    $P(u, p) = \text{sigmoid}(u * p^T)$'
  - '[PAGE 226]


    Here, sigmoid is the logistic function that maps the dot product of the user and
    product vectors to a probability score between 0 and 1:


    $sigmoid(x) = 1/(1 + exp(-x))$


    The $p^T$ represents the transpose of the product vector. The dot product of the
    user and product vectors is a measure of the similarity between the user''s preferences
    and the product''s characteristics, and the logistic function maps this similarity
    score to a probability score.


    The user and product matrices can be trained on the historical data by using various
    MF algorithms, such as SVD, NMF, or ALS. Once the matrices are trained, the dot
    product and logistic function can be applied to new user-product pairs to predict
    the probability of a sale. The predicted probabilities can then be used to rank
    and recommend products to the user.


    It''s worth highlighting that, since the loss function for ALS is convex (meaning
    there is a single global minimum), the convergence can be fast when we fix either
    the user or item matrix. In this method, the user matrix is fixed and the item
    matrix is solved for. Then the item matrix is fixed and the user matrix is solved
    for. The method alternates between the two solutions, and because the loss is
    convex in this regime, the method converges quickly.


    The dot product of the corresponding row in the user matrix and column in the
    product matrix represents the affinity score between the user and the product,
    or how well the user''s preferences match the product''s characteristics. However,
    this score alone may not be a sufficient predictor of whether the user will actually
    purchase the product.


    The logistic function applied to the dot product in the MF model transforms the
    affinity score into a probability score, which represents the likelihood of a
    sale. This transformation takes into account additional factors beyond just the
    user''s preferences and the product''s characteristics, such as the overall popularity
    of the product, the user''s purchasing behavior, and any other relevant external
    factors. By incorporating these additional factors, MF is able to better predict
    the probability of a sale, rather than just an affinity score.


    A comparison library (however, not in JAX) for computing latent embeddings linearly
    is libFM. The formulation for a factorization machine is similar to a GloVe embedding
    in that it also models the interaction between two vectors, but the dot product
    can be used for regression or binary classification tasks. The method can also
    be extended to recommend more than two kinds of items beyond user and item.


    In summary, MF produces probabilities of sale instead of just affinity scores
    by incorporating additional factors beyond the user''s preferences and the product''s'

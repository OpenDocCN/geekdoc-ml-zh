- md: "## Input Pipeline\n\nExample 5-2 shows the code for *input_pipeline.py*. We\
    \ use the ML library TensorFlow for its data pipeline.\n\nExample 5-2. TensorFlow\
    \ data pipeline\n\n```python\nimport tensorflow as tf\n\ndef normalize_image(img):\n\
    \    img = tf.cast(img, dtype=tf.float32)\n    img = (img / 255.0) - 0.5\n   \
    \ return img\n\ndef process_image(x):\n    x = tf.io.read_file(x)\n    x = tf.io.decode_jpeg(x,\
    \ channels=3)\n    x = tf.image.resize_with_crop_or_pad(x, 512, 512)\n    x =\
    \ normalize_image(x)\n    return x\n\ndef process_image_with_id(id):\n    image\

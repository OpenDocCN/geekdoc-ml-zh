  md: 'That may seem like a lot of setup, but we''ve really achieved a lot here. We''ve
    initialized the model to optimize the two matrix factors while simultaneously
    keeping the matrix elements and the Gramians small.


    This brings us to our lovely images.


    # Output from HPO MF


    Let''s have a quick look at what the prior work has produced. First, Figure 10-3
    shows that our primary loss function, observed mean square error (OMSE), is rapidly
    decreasing. This is great, but we should take a deeper look.


    ![](img/da17d05291861831978609329c481581_213_0.png)


    *Figure 10-3. The loss during training*


    Let''s also have a quick look to ensure that our regularization parameters (Figure
    10-4) are converging. We can see that our L2 regularization could probably still
    decrease if we were to continue for more epochs.'

  - '[PAGE 96]


    We can now write this aggregated list of (item, count) pairs to an app database
    to serve `get_item_popularities` (something that doesn''t require us to do any
    parsing when this is called), or potentially we can take a subset of the top-N
    of this list and store it in memory to get the best items with respect to a particular
    ranking. Either way, we''ve separated concerns of parsing all our log data, and
    doing aggregation, from the `get_item_popularities` function call in real time.


    This example used an overly simple data aggregation, one just as easy to do in
    something like PostgreSQL, so why bother? The first reason is scalability. Spark
    is really built to scale horizontally, which means that as the data we need to
    access grows, we merely add more worker nodes.


    The second reason is that PySpark is more than just SparkSQL; anyone who''s done
    complicated SQL queries can probably agree that the power and flexibility of SQL
    is enormous, but frequently certain tasks that you want to achieve require a lot
    of creativity to carry out in the fully SQL environment. PySpark gives you all
    the expressiveness of pandas DataFrames, Python functions and classes, and a simple
    interface to apply Python code to the PySpark data structure''s user-defined functions
    (UDFs). UDFs are similar to lambda functions that you''d use in pandas, but they''re
    built and optimized for PySpark DataFrames. As you''ve probably experienced when
    writing ML programs in smaller data regimes, at some point you switch away from
    using only SQL to using pandas API functions to perform data transformations—so
    too will you appreciate this power at the Spark data scale.


    PySpark allows you to write what looks very much like Python and pandas code and
    have that code executed in a distributed fashion! You don''t need to write code
    to specify which worker nodes operations should happen; that''s handled for you
    by PySpark. This framework isn''t perfect; some things you expect to work may
    require a bit of care, and optimization of your code can require an additional
    level of abstraction, but generally, PySpark gives you a rapid way to move your
    code from one node to a cluster and utilize that power.


    To illustrate something a bit more useful in PySpark, let''s return to collaborative
    filtering (CF) and compute some features more relevant for ranking.


    # Example: User Similarity in PySpark


    A user similarity table allows you to map a user to other users who are relevant
    to the recommender. This recalls the assumption that two similar users like similar
    things, and thus you can recommend to both users the items that one hasn''t seen.
    Constructing this user similarity table is an example of a PySpark job that you
    might see as part of the offline collector''s responsibility. Even though in many
    cases ratings would continue to stream in all the time, for the purposes of large
    offline jobs, we often think of a daily batch to update the essential tables for
    our model. In practice, in many cases this daily batch job suffices to provide
    features that are good enough'
  - "[PAGE 97]\n\nfor most of the ML work downstream. Other important paradigms exist,\
    \ but those frequently *marry* the more frequent updates with these daily batch\
    \ jobs, instead of totally eliminating them.\n\nThis architecture of daily batch\
    \ jobs with smaller, more frequent batch jobs is called the *lambda architecture*,\
    \ and we'll get more into the details of how and why later. In brief, the two\
    \ layers—batch and speed—which are distinguished (inversely) by the frequency\
    \ of processing and the volume per run of data they process. Note that the speed\
    \ layer may have varying frequencies associated with it, and it's possible to\

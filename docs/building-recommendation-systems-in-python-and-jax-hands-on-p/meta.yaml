    Another consideration is populating the bloom filters. It''s best practice to
    build these blooms from a database during the offline batch jobs. On whatever
    schedule your batch training is run, rebuild your blooms from the records storage
    to ensure you''re keeping your blooms accurate. Remember that blooms don''t allow
    deletion, so in the previous example, if an item goes from sold out to restocked,
    your batch refresh of your blooms can pick up the availability again. In between
    batch retraining, adding to a bloom is also very performant, so you can continue
    to add to the bloom as you observe more data that needs to be considered for the
    filtering in real time. Be sure these transactions are logged to a table, though!
    That logging will be important when you want to refresh.


    # Fun Aside: Bloom Filters as the Recommendation System


    Bloom filters not only provide an effective way to eliminate some recommendations
    based on conditions for inclusion, but can also be used to do the recommending
    itself! In particular, “An Item/User Representation for Recommender Systems Based
    on Bloom Filters” by Manuel Pozo et al. shows that for high-dimensional feature
    sets with a lot of sparsity (as we discussed in Chapter 3), the type of hashing
    bloom filters do can help overcome some of the key challenges in defining good
    similarity functions!


    Let''s observe that we can do two natural operations on sets via the bloom filter
    data structures. First, consider two sets $A$ and $B$, and associate to them bloom
    filters $\mathcal{BF}_A$ and $\mathcal{BF}_B$. Then what''s the definition of
    $A \cap B$? Can we come up with a bloom filter for this intersection? Yep! Recall
    that our bloom filters are guaranteed to tell us when an element is not contained
    in the set, but if an element is in the set, the bloom filter can respond with
    only a certain probability. In this case, we''d simply look for elements that
    are *in* according to $\mathcal{BF}_A$ *AND* *in* according to $\mathcal{BF}_B$.
    Of course, the set of items returned as *in* each set is larger than the actual
    set (i.e., $A \subset \mathcal{BF}_A$), so the intersection will also be larger:


    $$A \cap B \subset \mathcal{BF}_A \cap \mathcal{BF}_B$$


    Note that you can compute the exact difference in cardinality via information
    about your choice of hashing functions. Also note that the equation is an abuse
    of notation by calling $\mathcal{BF}_A$ the set of things returned by the bloom
    filter corresponding to $A$.


    Second, we also need to construct the union. This is similarly easy by considering
    elements that are *in* according to $\mathcal{BF}_A$ *OR* *in* according to $\mathcal{BF}_B$.
    And so, similarly:


    $$A \cup B \subset \mathcal{BF}_A \cup \mathcal{BF}_B$$'
  - '[PAGE 109]


    Now, if we consider items $X$ and $Y$ as concatenated vectors of potentially many
    features, and hash those concatenated features, we are representing each of them
    as the bitwise vectors of our bloom. From before, we saw that the intersection
    of two blooms makes sense, and in fact is equivalent to the bitwise $AND$ of their
    bloom representations. This means two items'' feature similarities can be expressed
    by the bitwise $and$ similarity of their bloom hashes:


    $$\text{sim}(X, Y) = |\mathcal{B}\mathcal{F}(X) \cap \mathcal{B}\mathcal{F}(Y)|
    = \mathcal{B}\mathcal{F}(X) \text{ bitwise } \mathcal{B}\mathcal{F}(X)$$


    For static datasets, this method has real advantages, including speed, scalability,
    and performance. Limitations are based on a variety of features and on the ability
    to change the set of possible items. Later we will discuss $locally\ sensitive\
    hashing$, which further iterates on lookup speed with lower risks of collision
    in high-dimensional spaces, and some similar ideas will reemerge.


    # Feature Stores


    So far, we have focused on recommendation systems that we might call $pure\ collaborative\
    filtering$. We''ve made use of the user- or item-similarity data only when attempting
    to make good recommendations. If you''ve been wondering, “Hey, what about information
    about the actual users and items?” your curiosity will now be sated.


    There are a huge variety of reasons you could be interested in features in addition
    to your previous CF methods. Let''s list a few high-level concerns:


    +   - You may wish to show new users a specific set of items first.

    - You may wish to consider geographic boundaries in your recommendations.

    - Distinguishing between children and adults may be important for the types of
    recommendations they''re given.

    - Item features may be used to ensure high-level diversity in the recommendations
    (more to come in Chapter 15).

    - User features can enable various kinds of experimental testing.

    - Item features could be used to group items into sets for contextual recommendations
    (more to come in Chapter 15).


    In addition to these issues, another kind of feature is often essential: real-time
    features. While the point of feature stores is to provide real-time access to
    all the necessary features, it''s worthwhile to distinguish stable features that
    change infrequently from real-time features that we anticipate will change often.'
  - '[PAGE 110]


    Some important examples of a real-time feature store are dynamic prices, current
    item availability, *trending* status, wish-list status, and so on. These features
    may change throughout the day, and we want their values in the feature store to
    be mutable in real-time via other services and systems. Therefore, the real-time
    feature store will need to provide API access for feature mutation. This is something
    you may not want to provide for *stable* features.


    When we design our feature store, we''re likely to want the stable features to
    be built from data warehouse tables via ETLs and transformations, and we likely
    want the real-time features to be built this way as well, but on a faster schedule
    or allowing API access for mutation. In either case, the key quality of a feature
    store is *very fast read access*. It''s often a good idea to separately build
    feature stores for offline training of models that can be built in test to ensure
    support for new models.


    So how might the architecture and implementation look? See Figure 6-3.


    ![](img/da17d05291861831978609329c481581_110_0.png)


    Designing a feature store involves designing pipelines that define and *transform
    the features into that store* (coordinated via things like Airflow, Luigi, Argo,
    etc.) and often look similar to the type of data pipelines used in building our
    collector. One additional complication that the feature store needs to concern
    itself with is a speed layer. During our discussion of the lambda architecture
    earlier in this chapter, we mentioned that we can think of batch data processing
    for the collector and a more rapid speed layer for intermediary updates, but this
    is even more important for the feature store. The feature store may also need
    a *streaming layer*. This layer operates on continuous streams of data and can
    perform data transformations on those; it then writes the appropriate output to
    the online feature store in real time. This adds complexity because data transformations
    on streaming data present a very different set of challenges and often require
    different algorithmic strategies. Some technologies that help here are Spark Streaming
    and Kinesis. You''ll also need to configure the system to properly handle the
    data stream, the most common of which is Kafka. Data streaming layers involve
    many components and architectural considerations that fall'
  - '[PAGE 111]


    outside our scope; if you’re considering getting started with Kafka, check out
    *Kafka: The Definitive Guide* by Gwen Shapira et al. (O’Reilly).


    A feature store also needs a *storage layer*; many approaches exist here, but
    using a NoSQL database is common, especially in the online feature store. The
    reason is faster retrieval and the nature of the data storage. Feature stores
    for recommendation systems tend to be very key based (i.e., *get the features
    for this user*, or *get the features for this item*), which lend themselves well
    to key-value stores. Some example technologies here are DynamoDB, Redis, and Cassandra.
    The storage layer for an offline feature store may simply be an SQL-style database
    to reduce complexity, but instead you’ll pay a tax of a delta between offline
    and online. This delta and others like it are called *training-serving skew*.


    A unique but essential aspect of feature stores is the *registry*. A registry
    is incredibly useful for a feature store because it coordinates existing features
    and information on how they’re defined. A more sophisticated instance of a registry
    also includes input and output schemas with typing, and distributional expectations.
    These are contracts that the data pipelines must adhere to and satisfy to avoid
    populating your feature store with garbage data. Additionally, the registry’s
    definitions allow parallel data scientists and ML engineers to develop new features,
    use one another’s features, and generally understand the assumptions of features
    their models may utilize.


    One important advantage of these registries is that they incentivize alignment
    between teams and developers. In particular, if you decide you care about *country*
    for your user, and you see a feature *country* in the registry, you’re more likely
    to use that (or ask the developer who’s assigned to this feature in the registry)
    than to make a new one from scratch. Practically, data scientists make hundreds
    of small decisions and assumptions when defining their models, and this removes
    some of that load that’s relying on the existing resources.


    ![](img/da17d05291861831978609329c481581_111_0.png)


    # Model Registries


    A closely related concept to feature registries is model registries. The concepts
    have a lot in common, but we caution you to think of them differently. A great
    model registry can have type contracts for the input and output of your models,
    and can serve many of the same benefits around alignment and clarity. A feature
    registry should really be focused on definitions of the business logic and features.
    Because feature engineering can also be model driven, speaking clearly about the
    differences between these two things can be challenging, so to sum it up, we’ll
    focus on what they serve: a model registry concerns itself with ML models and
    the relevant metadata, whereas a feature registry concerns itself with features
    that models will use.'
- md: 'Finally, we need to talk about *serving* these features. Backed by the appropriately
    performant storage layer, we need to serve via API request the necessary feature
    vectors. Those feature vectors are details about the user that the model will
    need when serving recommendations—for example, the user’s location or content
    age restrictions. The API can serve back the entire set of features for the key
    or allow for more specification. Often the responses are JSON serialized for fast
    data transfer. It’s important that the features being served are the *most up-to-date
    set of features*, and latency here is expected to be < 100 ms for more serious
    industrial applications.


    One important caveat here is that for offline training, these feature stores need
    to accommodate *time travel*. Because our goal during training is to give the
    model the appropriate data to learn in the *most generalizable way*, when training
    our model, it’s crucial to not give it access to features out of time. This is
    called *data leakage* and can cause massive divergence in performance between
    training and production. The feature store for offline training thus must have
    knowledge of the features through time, so that during training, a time index
    may be provided to get the features as they were then. These *as_of* keys can
    be tied to the historical training data as we *replay* the history of what the
    user-item interactions looked like.


    With these pieces in place—and the important monitoring this system needs—you’ll
    be able to serve offline and online features to your models. In **Part III**,
    you will see model architectures that make use of them.


    ## Data Leakage


    You’re likely familiar with the concept of leakage based on what you know about
    ML: corrupted performance metrics result because the training of the model had
    access to data that was supposed to be reserved for model performance evaluation.


    Data leakage in ML is divided into *feature leakage* and *training example leakage*.
    For recommendation systems, data leakage has the additional challenge of temporal
    leakage, or nonstationarity leakage. The real danger is that in recommendation
    systems, we see the same observational unit, a user, over and over, and observe
    a datum each time we see them. When we see them, other aspects of the system may
    have changed, and in reality we want to use features in our model that are the
    most up to date as of that observation. Both in features and training examples,
    to avoid leakage we need to always be thinking of our system’s timeline. This
    is why data preparation for recommendation systems is inherently time dependent.
    You will see in **Chapter 11** that our accuracy metrics will need to explicitly
    consider train-test splitting with respect to this time axis, and then be further
    grouped by the user. This also means that training recommendation systems often
    requires more resources than many other task types.


    ## Summary


    We''ve discussed not only the crucial components necessary to hydrate your system
    and serve recommendations, but also some of the engineering building blocks needed
    to make those components a reality. Equipped with data loaders, embeddings, feature
    stores, and retrieval mechanisms, we are ready to start constructing our pipeline
    and system topology.


    In the next chapter, we''ll focus our sights on MLOps and the rest of the engineering
    work required to build and iterate on these systems. It''s going to be important
    for us to think carefully about deployment and monitoring so our recommendation
    systems are constrained to life in IPython Notebooks.


    Continue onward to see the architectural considerations to move to production.


    # CHAPTER 7


    ## Serving Models and Architectures


    As we think about how recommendation systems utilize the available data to learn
    and eventually serve recommendations, it''s crucial to describe how the pieces
    fit together. The combination of the data flow and the jointly available data
    for learning is called the *architecture*. More formally, the architecture is
    the connections and interactions of the system or network of services; for data
    applications, the architecture also includes the available features and objective
    functions for each subsystem. Defining the architecture typically involves identifying
    components or individual services, defining the relationships and dependencies
    among those components, and specifying the protocols or interfaces through which
    they will communicate.


    In this chapter, we''ll spell out some of the most popular and important architectures
    for recommendation systems.


    ## Architectures by Recommendation Structure


    We have returned several times to the concept of collector, ranker, and server,
    and we''ve seen that they may be regarded via two paradigms: the online and the
    offline modes. Further, we''ve seen how many of the components in Chapter 6 satisfy
    some of the core requirements of these functions.


    Designing large systems like these requires several architectural considerations.
    In this section, we will demonstrate how these concepts are adapted based on the
    type of recommendation system you are building. We''ll compare a mostly standard
    item-to-user recommendation system, a query-based recommendation system, context-based
    recommendations, and sequence-based recommendations.


    ## Item-to-User Recommendations


    We''ll start by describing the architecture of the system we''ve been building
    in the book thus far. As proposed in Chapter 4, we built the collector offline
    to ingest and process our recommendations. We utilize representations to encode
    relationships between items, users, or user-item pairs.


    The online collector takes the request, usually in the form of a user ID, and
    finds a neighborhood of items in this representation space to pass along to the
    ranker. Those items are filtered when appropriate and sent for scoring.


    The offline ranker learns the relevant features for scoring and ranking, training
    on the historical data. It then uses this model and, in some cases, item features
    as well for inference.


    In the case of recommendation systems, this inference computes the scores associated
    to each item in the set of potential recommendations. We usually sort by this
    score, which you''ll learn more about in Part III. Finally, we integrate a final
    round of ordering based on some business logic (described in Chapter 14). This
    last step is part of the serving, where we impose requirements like test criteria
    or recommendation diversity requirements.


    Figure 7-1 is an excellent overview of the retrieval, ranking, and serving structure,
    although it depicts four stages and uses slightly different terminology. In this
    book, we combine the filtering stage shown here into retrieval.


    ## Query-Based Recommendations


    To start off our process, we want to make a query. The most obvious example of
    a query is a text query as in text-based search engines; however, queries may
    be more general! For example, you may wish to allow search-by-image or search-by-tag
    options. Note that an important type of query-based recommender uses an *implicit*
    query: the user is providing a search query via UI choices or by behaviors. While
    these systems are quite similar in overall structure to the item-to-user systems,
    let''s discover how to modify them to fit our use case.


    ![](img/da17d05291861831978609329c481581_116_0.png)


    We want to integrate more context about the query into the first step of the request.
    Note that we don''t want to throw out the user-item matching components of this
    system. Even though the user is performing a search, personalizing the recommendations
    based on their taste is useful. Instead, we need to utilize the query as well;
    later we will discuss various technical strategies, but a simple summary for now
    is to also generate an embedding for the query. Note that the query is like an
    item or a user but is sufficiently different.


    Some strategies might include similarity between the query and items, or co-occurrence
    of the query and items. Either way, we now have a query representation and user
    representation, and we want to utilize both for our recommendation. One simple
    approach is to use the query representation for retrieval, but during the scoring,
    score via both query-item and user-item, combining them via a multiobjective loss.
    Another approach is to use the user for retrieval and then the query for filtering.'
  mdcn: '最后，我们需要讨论如何*服务*这些特征。在具备相应性能的存储层支持下，我们需要通过API请求来提供必要的特征向量。这些特征向量是模型在提供推荐时所需的用户详细信息——例如，用户的位置或内容年龄限制。API可以返回该键对应的全部特征集，或允许更精确的指定。通常，响应会以JSON序列化格式传输以实现快速数据传输。重要的是，所提供的特征必须是*最新的特征集*，对于更严肃的工业应用，此处的延迟预计应低于100毫秒。


    这里有一个重要的注意事项：对于离线训练，这些特征存储需要支持*时间回溯*。因为我们在训练期间的目标是以*最具泛化性的方式*为模型提供适当的数据，所以在训练模型时，至关重要的是不能让其访问超出时间范围的特征。这被称为*数据泄露*，可能导致训练和生产环境之间的性能出现巨大差异。因此，用于离线训练的特征存储必须具备随时间变化的特征知识，以便在训练期间，可以通过提供时间索引来获取当时的特征。这些*as_of*键可以与历史训练数据绑定，因为我们*重放*用户-物品交互历史记录。


    有了这些组件——以及该系统所需的重要监控——你就能够为模型提供离线和在线特征。在**第三部分**，你将看到利用这些特征的模型架构。


    ## 数据泄露


    基于你对机器学习的了解，你可能熟悉泄露的概念：由于模型训练时访问了本应保留用于模型性能评估的数据，导致性能指标失真。


    机器学习中的数据泄露分为*特征泄露*和*训练样本泄露*。对于推荐系统，数据泄露还面临额外的挑战，即时间泄露或非平稳性泄露。真正的危险在于，在推荐系统中，我们反复观察同一个观测单元——用户，并在每次观察时获取一个数据点。当我们观察他们时，系统的其他方面可能已经发生了变化，而实际上我们希望在模型中使用的是截至该观测时间点的最新特征。无论是在特征还是训练样本中，为了避免泄露，我们需要始终考虑系统的时间线。这就是为什么推荐系统的数据准备本质上是时间相关的。你将在**第11章**中看到，我们的准确度指标需要明确考虑基于该时间轴的训练-测试划分，然后进一步按用户分组。这也意味着训练推荐系统通常比许多其他任务类型需要更多的资源。


    ## 总结


    我们不仅讨论了充实系统和提供推荐所需的关键组件，还讨论了使这些组件成为现实所需的一些工程构建模块。有了数据加载器、嵌入、特征存储和检索机制，我们已准备好开始构建我们的流水线和系统拓扑。


    在下一章中，我们将把目光聚焦于MLOps以及构建和迭代这些系统所需的其余工程工作。仔细思考部署和监控对我们来说将非常重要，这样我们的推荐系统才能避免局限于在IPython
    Notebooks中运行。


    继续前进，了解转向生产环境的架构考量。


    # 第7章


    ## 服务模型与架构


    当我们思考推荐系统如何利用可用数据进行学习并最终提供推荐时，描述这些组件如何协同工作至关重要。数据流与可用于学习的联合数据的组合被称为*架构*。更正式地说，架构是系统或服务网络的连接和交互；对于数据应用，架构还包括每个子系统的可用特征和目标函数。定义架构通常涉及识别组件或单个服务、定义这些组件之间的关系和依赖关系，以及指定它们将进行通信的协议或接口。


    在本章中，我们将详细阐述一些最受欢迎且最重要的推荐系统架构。


    ## 按推荐结构划分的架构


    我们已多次回到收集器、排序器和服务器的概念，并且看到它们可以通过两种范式来理解：在线模式和离线模式。此外，我们已经看到第6章中的许多组件如何满足这些功能的一些核心要求。


    设计这样的大型系统需要考虑多种架构因素。在本节中，我们将展示这些概念如何根据你正在构建的推荐系统类型进行调整。我们将比较一个基本标准的物品到用户推荐系统、一个基于查询的推荐系统、基于上下文的推荐系统和基于序列的推荐系统。


    ## 物品到用户推荐


    我们将从描述本书迄今为止一直在构建的系统架构开始。如第4章所提议的，我们离线构建收集器来摄取和处理我们的推荐。我们利用表示来编码物品、用户或用户-物品对之间的关系。


    在线收集器接收请求（通常以用户ID的形式），并在该表示空间中找到一个物品邻域，传递给排序器。这些物品在适当时被过滤，然后发送进行评分。


    离线排序器学习用于评分和排序的相关特征，在历史数据上进行训练。然后，它使用该模型，在某些情况下还使用物品特征进行推理。


    在推荐系统的情况下，此推理计算与潜在推荐集中每个物品相关的分数。我们通常按此分数排序，你将在第三部分了解更多。最后，我们整合基于某些业务逻辑（在第14章描述）的最后一轮排序。这最后一步是服务的一部分，我们在其中施加诸如测试标准或推荐多样性要求等约束。


    图7-1是检索、排序和服务结构的一个极好概述，尽管它描绘了四个阶段并使用了略有不同的术语。在本书中，我们将此处显示的过滤阶段合并到检索中。


    ## 基于查询的推荐


    为了启动我们的流程，我们想要进行查询。查询最明显的例子是基于文本搜索引擎的文本查询；然而，查询可能更通用！例如，你可能希望允许按图像搜索或按标签搜索的选项。请注意，一种重要的基于查询的推荐器使用*隐式*查询：用户通过UI选择或行为提供搜索查询。虽然这些系统在整体结构上与物品到用户系统非常相似，但让我们探索如何修改它们以适应我们的用例。


    ![](img/da17d05291861831978609329c481581_116_0.png)


    我们希望将更多关于查询的上下文集成到请求的第一步中。请注意，我们不想丢弃该系统的用户-物品匹配组件。即使用户正在执行搜索，根据他们的品味个性化推荐也是有用的。相反，我们需要同时利用查询；稍后我们将讨论各种技术策略，但目前的一个简单总结是也为查询生成一个嵌入。请注意，查询类似于物品或用户，但又有足够的不同。


    一些策略可能包括查询与物品之间的相似性，或查询与物品的共现。无论哪种方式，我们现在都有了查询表示和用户表示，我们希望同时利用两者进行推荐。一种简单的方法是使用查询表示进行检索，但在评分时，通过查询-物品和用户-物品进行评分，并通过多目标损失将它们组合起来。另一种方法是使用用户进行检索，然后使用查询进行过滤。'

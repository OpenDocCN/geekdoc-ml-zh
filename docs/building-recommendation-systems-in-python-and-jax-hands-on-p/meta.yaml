    \ 称为*查询*，以表明它是共现推荐模型的输入。\n\n![](img/da17d05291861831978609329c481581_181_0.png)\n\
    \n# 如何存储这些数据？\n\n我们可以从*很多*角度思考共现数据。主要原因是，我们预计推荐系统的共现数据极其稀疏。这意味着前述的矩阵乘法方法——大约是\
    \ $O(n^3)$——在计算较少非零元素时会相对较慢。由于这一点以及对存储充满零的巨大矩阵的担忧，计算机科学家认真对待了稀疏矩阵的表示问题。\n\n**Max\
    \ Grossman** 声称有 101 种方法，但实际上只有几种。JAX 支持 **BCOO**，即*批量坐标格式*，它本质上是非零元素的坐标列表，然后是这些元素的值。\n\

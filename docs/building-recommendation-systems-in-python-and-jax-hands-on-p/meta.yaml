- md: 'SVD is a specific type of MF that decomposes a matrix into three separate matrices:
    a left singular matrix, a diagonal matrix, and a right singular matrix. SVD can
    be applied to any real-valued matrix, but it is particularly well suited to dense
    matrices with many nonzero entries; additionally, SVD matrices have properties
    useful for extracting particular kinds of relationships between latent features.
    The columns and rows of the singular matrices are the eigenvectors, and the values
    in the diagonal matrix are the eigenvalues. This decomposition is handy in seeing
    how much information in the original space is explained by the eigenvectors and
    corresponds to the magnitude of the eigenvalue, so an eigenvector with a larger
    eigenvalue explains more of the original data than an eigenvector with a correspondingly
    smaller eigenvalue.


    MF decomposes a user-item matrix into two matrices that represent the preferences
    of users and the characteristics of items. This allows the recommendation system
    to generate personalized recommendations by matching the preferences of users
    with the characteristics of items.


    Frequently, you must overcome a few challenges when considering MF:


    - The matrix you wish to factor is sparse and often non-negative and/or binary.

    - The number of nonzero elements in each item vector can vary wildly, as we saw
    in the Matthew effect.

    - Factorizing matrices is cubic in complexity.

    - SVD and other full-rank methods don''t work without imputation, which itself
    is complicated.


    We''ll address these with some alternative optimization methods.


    ## Optimizing for MF with ALS


    The basic optimization we wish to execute is to approximate as follows:


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    Notably, if you wish to optimize matrix entries directly, you''ll need to optimize
    $d^2 * N * M$ elements simultaneously corresponding to the numbers of parameters
    in these factorizations. We can easily achieve a significant speedup, however,
    by alternating between tuning one matrix or the other. This is called *alternating
    least squares*, commonly *ALS*, and it is a common approach to this problem. Instead
    of back-propagating updates to all terms in both matrices on each pass, you may
    update only one of the two matrices, which dramatically reduces the number of
    computations that need to take place.


    ALS seeks to switch back and forth between $U$ and $V$, evaluating on the same
    loss function but updating the weights in only one matrix at a time:


    ```

    $U \leftarrow U - \eta * U * \nabla U * \mathscr{D}(A, UV)$

    $V \leftarrow V - \eta * V * \nabla V * \mathscr{D}(A, UV)$

    ```


    Here, $\eta$ is the learning rate and $\mathscr{D}$ is our chosen distance function.
    We''ll present more details of this distance function momentarily. Before we move
    on, let''s consider a few of the intricacies here:


    - Each of these update rules requires the gradient with respect to the relevant
    factor matrix.

    - We update an entire factor matrix at a time, but we evaluate loss on the product
    of the factor matrices versus the original matrix.

    - We have a mysterious distance function.

    - By the way that we''ve constructed this optimization, we''re implicitly assuming
    that we''ll use this process to converge two well-approximating matrices (we often
    also impose a limit on the number of iterations).


    In JAX, these optimizations will be straightforward to implement, and we''ll see
    how similar the equational forms and the JAX code look.


    ![](img/da17d05291861831978609329c481581_194_0.png)


    ## Distance Between Matrices


    We can determine the distance between two matrices in a variety of ways. As we''ve
    seen before, different distance measurements for vectors yield different interpretations
    from the underlying space. We won''t have as many complications for these computations,
    but it''s worth a short observation. The most obvious approach is one you''ve
    already seen, *observed mean squared error*:


    ```

    $\frac{\sum_{\Omega}(A_{i,j} - \langle U_i, V_j \rangle)^2}{|\Omega|}$

    ```


    One useful alternative to the observed mean squared error can be used when you
    have a single nonzero entry for a user vector (alternatively, a max rating). In
    that case, you could instead use a cross-entropy loss, which provides a *logistic
    MF*, and thus a probability estimate. For more details on how to implement this,
    see the "Matrix Factorization for Recommender Systems" tutorial by Kyle Chung.


    In our observed ratings, we expect (and see!) a large number of missing values
    and some item vectors with an overrepresented number of ratings. This suggests
    that we should consider nonuniformly weighted matrices. Next we''ll discuss how
    to account for this and other variants with regularization.


    ## Regularization for MF


    *Weighted alternating least squares* (WALS) is similar to ALS but attempts to
    resolve these two data issues more gracefully. In WALS, the weight assigned to
    each observed rating is inversely proportional to the number of observed ratings
    for the user or item. Therefore, observed ratings for users or items with few
    ratings are given more weight in the optimization process.


    We can apply these weights as a regularization parameter in our eventual loss
    function:


    ```

    $$\frac{\sum_{\Omega}(A_{i,j} - < U_i, V_j >)^2}{|\Omega|} + \frac{1}{N} \sum
    |U|$$

    ```


    Other regularization methods are important, and also popular, for MF. We''ll discuss
    these two powerful regularization techniques:


    - Weight decay

    - Gramian regularization


    As is often the case, *weight decay* is our $l^2$ regularization, which in this
    case is at the level of the Frobenius norm, i.e., the magnitude of the weight
    matrix. An elegant way to view this weight decay is that it''s minimizing the
    magnitude of the *singular values*.


    Similarly, MF has another regularization technique that looks very standard but
    is quite different in calculation. This is via the *Gramians*—essentially regularizing
    the size of the individual matrix entries, but there''s an elegant trick for the
    optimization. In particular, a Gramian of a matrix $U$ is the product $U^T U$.
    The eagle-eyed among you may recognize this term as the same term we previously
    used to calculate co-occurrences for binary matrices. The connection is that both
    are simply trying to find efficient representations of dot products between a
    matrix''s rows and columns.


    These regularizations are the Frobenius terms:


    ```

    $$R(U, V) = \frac{1}{N} \sum_{i}^{N} \left| U_i \right|_2^2 + \frac{1}{M} \sum_{j}^{M}
    \left| V_j \right|_2^2$$

    ```


    Or expanded, the equation looks like this:


    $$R(U, V) = \frac{1}{N} \sum_{i}^{N} \sum_{k}^{d} U_{i,k}^2 + \frac{1}{M} \sum_{j}^{M}
    \sum_{l}^{d} V_{j,l}^2$$


    And here are the Gramian terms:


    $$G(U, V) := \frac{1}{N \cdot M} \sum_{i}^{N} \sum_{j}^{M} \langle U_i, V_j \rangle^2$$

    $$= \frac{1}{N \cdot M} * \sum_{k,l}^{d} (U^T U * V^T V)_{k,l}$$


    Finally, we have our loss function:


    $$\frac{1}{|\Omega|} \sum_{(i,j) \in \Omega} (A_{ij} - \langle U_i, V_j \rangle)^2
    + \lambda_R \left( \frac{1}{N} \sum_{i}^{N} \sum_{k}^{d} U_{i,k}^2 + \frac{1}{M}
    \sum_{j}^{M} \sum_{l}^{d} V_{j,l}^2 \right) + \lambda_G \left( \frac{1}{N \cdot
    M} * \sum_{k,l}^{d} (U^T U * V^T V)_{k,l} \right)$$


    ## Regularized MF Implementation


    So far, we''ve written a *lot* of math symbols, but all of those symbols have
    allowed us to arrive at a model that is extremely powerful. *Regularized matrix
    factorization* is an effective model for medium-sized recommender problems. This
    model type is still in production for many serious businesses. One classic issue
    with MF implementations is performance, but because we''re working in JAX, which
    has extremely native GPU support, our implementation can actually be much more
    compact than what you may find in something like a [PyTorch example](https://example.com).


    Let''s work through how this model would look to predict ratings for a user-item
    matrix via this doubly regularized model with Gramians.


    First we''ll do the simple setup. This will assume your ratings matrix is already
    on wandb:


    ```

    import jax

    import jax.numpy as jnp

    import numpy as np

    import pandas as pd

    import os, json, wandb, math


    from jax import grad, jit

    from jax import random

    ```'
  mdcn: 'SVD 是 MF 的一种特定类型，它将一个矩阵分解为三个独立的矩阵：一个左奇异矩阵、一个对角矩阵和一个右奇异矩阵。SVD 可以应用于任何实值矩阵，但它特别适合具有许多非零元素的稠密矩阵；此外，SVD
    矩阵具有有助于提取潜在特征之间特定关系的属性。奇异矩阵的列和行是特征向量，对角矩阵中的值是特征值。这种分解便于查看原始空间中有多少信息由特征向量解释，并且对应于特征值的大小，因此具有较大特征值的特征向量比具有相应较小特征值的特征向量解释更多的原始数据。


    MF 将用户-物品矩阵分解为两个矩阵，分别代表用户的偏好和物品的特征。这使得推荐系统能够通过匹配用户的偏好和物品的特征来生成个性化推荐。


    在考虑 MF 时，通常必须克服几个挑战：


    - 你希望分解的矩阵是稀疏的，并且通常是非负的和/或是二元的。

    - 正如我们在马太效应中看到的，每个物品向量中非零元素的数量可能差异很大。

    - 矩阵分解的复杂度是立方级的。

    - SVD 和其他全秩方法在没有插值的情况下无法工作，而插值本身就很复杂。


    我们将通过一些替代优化方法来解决这些问题。


    ## 使用 ALS 优化 MF


    我们希望执行的基本优化是近似如下：


    $A_{i,j} \simeq \langle U_i, V_j \rangle$


    值得注意的是，如果你希望直接优化矩阵条目，你需要同时优化 $d^2 * N * M$ 个元素，这些元素对应于这些分解中的参数数量。然而，通过交替调整一个矩阵或另一个矩阵，我们可以轻松实现显著的加速。这被称为*交替最小二乘法*，通常简称为
    *ALS*，它是解决此问题的常用方法。你不必在每次迭代中反向传播更新到两个矩阵中的所有项，而是可以只更新两个矩阵中的一个，这大大减少了需要进行的计算量。


    ALS 试图在 $U$ 和 $V$ 之间来回切换，在相同的损失函数上进行评估，但一次只更新一个矩阵中的权重：


    ```

    $U \leftarrow U - \eta * U * \nabla U * \mathscr{D}(A, UV)$

    $V \leftarrow V - \eta * V * \nabla V * \mathscr{D}(A, UV)$

    ```


    这里，$\eta$ 是学习率，$\mathscr{D}$ 是我们选择的距离函数。我们稍后将介绍这个距离函数的更多细节。在继续之前，让我们考虑一下这里的一些复杂之处：


    - 这些更新规则中的每一个都需要相对于相关因子矩阵的梯度。

    - 我们一次更新整个因子矩阵，但我们评估的是因子矩阵的乘积与原始矩阵之间的损失。

    - 我们有一个神秘的距离函数。

    - 通过我们构建此优化的方式，我们隐含地假设我们将使用此过程来收敛到两个近似良好的矩阵（我们通常还会对迭代次数施加限制）。


    在 JAX 中，这些优化将很容易实现，我们将看到等式形式和 JAX 代码看起来有多么相似。


    ![](img/da17d05291861831978609329c481581_194_0.png)


    ## 矩阵之间的距离


    我们可以通过多种方式确定两个矩阵之间的距离。正如我们之前看到的，对向量的不同距离度量会产生对底层空间的不同解释。对于这些计算，我们不会有那么多复杂情况，但这值得简要观察一下。最明显的方法是你已经见过的，*观测均方误差*：


    ```

    $\frac{\sum_{\Omega}(A_{i,j} - \langle U_i, V_j \rangle)^2}{|\Omega|}$

    ```


    观测均方误差的一个有用替代方法可以在你有一个用户向量的单个非零条目（或者，一个最大评分）时使用。在这种情况下，你可以改用交叉熵损失，这提供了*逻辑 MF*，从而提供概率估计。有关如何实现的更多细节，请参阅
    Kyle Chung 的“矩阵分解用于推荐系统”教程。


    在我们的观测评分中，我们期望（并且看到！）大量的缺失值和一些具有过多评分的物品向量。这表明我们应该考虑非均匀加权矩阵。接下来，我们将讨论如何通过正则化来解决这个问题和其他变体。


    ## MF 的正则化


    *加权交替最小二乘法*（WALS）类似于 ALS，但试图更优雅地解决这两个数据问题。在 WALS 中，分配给每个观测评分的权重与用户或物品的观测评分数成反比。因此，在优化过程中，对于评分数较少的用户或物品的观测评分会给予更大的权重。


    我们可以将这些权重作为正则化参数应用于最终的损失函数：


    ```

    $$\frac{\sum_{\Omega}(A_{i,j} - < U_i, V_j >)^2}{|\Omega|} + \frac{1}{N} \sum
    |U|$$

    ```


    其他正则化方法对于 MF 也很重要，并且也很流行。我们将讨论这两种强大的正则化技术：


    - 权重衰减

    - 格拉姆矩阵正则化


    通常情况下，*权重衰减*是我们的 $l^2$ 正则化，在这种情况下，它是在 Frobenius 范数的层面上，即权重矩阵的大小。看待这种权重衰减的一种优雅方式是它最小化了*奇异值*的大小。


    类似地，MF 有另一种看起来非常标准但在计算上相当不同的正则化技术。这是通过*格拉姆矩阵*——本质上是正则化单个矩阵条目的大小，但优化有一个巧妙的技巧。特别是，矩阵
    $U$ 的格拉姆矩阵是乘积 $U^T U$。你们中眼尖的人可能认出这个术语，它与我们之前用于计算二元矩阵共现的术语相同。两者的联系在于，它们都只是试图找到矩阵行和列之间点积的有效表示。


    这些正则化是 Frobenius 项：


    ```

    $$R(U, V) = \frac{1}{N} \sum_{i}^{N} \left| U_i \right|_2^2 + \frac{1}{M} \sum_{j}^{M}
    \left| V_j \right|_2^2$$

    ```


    或者展开后，方程如下所示：


    $$R(U, V) = \frac{1}{N} \sum_{i}^{N} \sum_{k}^{d} U_{i,k}^2 + \frac{1}{M} \sum_{j}^{M}
    \sum_{l}^{d} V_{j,l}^2$$


    以下是格拉姆矩阵项：


    $$G(U, V) := \frac{1}{N \cdot M} \sum_{i}^{N} \sum_{j}^{M} \langle U_i, V_j \rangle^2$$

    $$= \frac{1}{N \cdot M} * \sum_{k,l}^{d} (U^T U * V^T V)_{k,l}$$


    最后，我们的损失函数是：


    $$\frac{1}{|\Omega|} \sum_{(i,j) \in \Omega} (A_{ij} - \langle U_i, V_j \rangle)^2
    + \lambda_R \left( \frac{1}{N} \sum_{i}^{N} \sum_{k}^{d} U_{i,k}^2 + \frac{1}{M}
    \sum_{j}^{M} \sum_{l}^{d} V_{j,l}^2 \right) + \lambda_G \left( \frac{1}{N \cdot
    M} * \sum_{k,l}^{d} (U^T U * V^T V)_{k,l} \right)$$


    ## 正则化 MF 的实现


    到目前为止，我们已经写了很多数学符号，但所有这些符号都使我们能够得出一个极其强大的模型。*正则化矩阵分解*是解决中型推荐问题的有效模型。这种模型类型仍然在许多严肃的企业中投入生产。MF
    实现的一个经典问题是性能，但因为我们使用的是 JAX，它具有极其原生的 GPU 支持，所以我们的实现实际上可以比你在 [PyTorch 示例](https://example.com)
    中找到的更加紧凑。


    让我们来研究一下这个模型如何通过这种带有格拉姆矩阵的双重正则化模型来预测用户-物品矩阵的评分。


    首先，我们将进行简单的设置。这将假设你的评分矩阵已经在 wandb 上：


    ```

    import jax

    import jax.numpy as jnp

    import numpy as np

    import pandas as pd

    import os, json, wandb, math


    from jax import grad, jit

    from jax import random

    ```'

    # Logging


    Logging has come up several times already. Previously in this chapter, you saw
    that logging was important for ensuring that our system was behaving as expected.
    Let’s discuss some best practices for logging and how they fit into our plans.


    When we discussed traces and spans earlier, we were able to get a snapshot of
    the entire call stack of the services involved in responding to a request. Linking
    the services together to see the larger picture is incredibly useful, and when
    it comes to logging, gives us a hint as to how we should be orienting our thinking.
    Returning to our favorite RecSys architecture, we have the following:


    +   - Collector receiving the request and looking up the embedding relevant to
    the user

    - Computing ANN on items for that vector

    - Applying filters via blooms to eliminate potential bad recommendations

    - Augmenting features of the candidate items and user via the feature stores

    - Scoring of candidates via the ranking model and estimating potential confidence

    - Ordering and application of business logic or experimentation


    Each of these elements has potential applications of logging, but let’s now think
    about how to link them together. The relevant concept from microservices is correlation
    IDs; a *correlation ID* is simply an identifier that’s passed along the call stack
    to ensure the ability to link everything later. As is likely obvious at this point,
    each of these services will be responsible for its own logging, but the services
    are almost always more useful in aggregate.


    These days, Kafka is often used as the log-stream processor to listen for logs
    from all the services in your pipeline and to manage their processing and storing.
    Kafka relies on a message-based architecture; each service is a producer, and
    Kafka helps manage those messages to consumer channels. In terms of log management,
    the Kafka cluster receives all the logs in the relevant formats, hopefully augmented
    with correlation IDs, and sends them off to an ELK stack. The *ELK stack*—Elasticsearch,
    Logstash, Kibana—consists of a Logstash component to handle incoming log streams
    and apply structured processing, Elasticsearch to build search indices to the
    log store, and Kibana to add a UI and high-level dashboarding to the logging.


    This stack of technologies is focused on ensuring that you have access and observability
    from your logs. Other technologies focus on other aspects, but what should you
    be logging?'
  - '[PAGE 139]


    # Collector logs


    Again, we wish to log during the following:


    +   - Collector receiving the request and looking up the embedding relevant to
    the user

    - Computing ANN on items for that vector


    The collector receives a request, consisting in our simplest example of user_id,
    requesting_timestamp, and any augmenting keyword elements (kwargs) that might
    be required. A correlation_id should be passed along from the requester or generated
    at this step. A log with these basic keys should be fired, along with the timestamp
    of request received. A call is made to the embedding store, and the collector
    should log this request. Then the embedding store should log this request when
    received, along with the embedding store’s response. Finally, the collector should
    log the response as it returns. This may feel like a lot of redundant information,
    but the explicit parameters included in the API calls become extremely useful
    when troubleshooting.


    The collector now has the vector it will need to perform a vector search, so it
    will make a call to the ANN service. Logging this call, and any relevant logic
    in choosing the k for number of neighbors will be important, along with the ANN’s
    received API request, the relevant state for computing ANN, and ANN’s response.
    Back in the collector, logging that response and any potential data augmentation
    for downstream service requirements are the next steps.


    At this point, at least six logs have been emitted—only reinforcing the need for
    a way to link these all together. In practice, you often have other relevant steps
    in your service that should be logged (e.g., checking that the distribution of
    distances in returned neighbors is appropriate for downstream ranking).


    Note that if the embedding lookup was a miss, logging that miss is obviously important,
    as well as logging the subsequent request to the cold-start recommendation pipeline.
    The cold-start pipeline will incur additional logs.


    # Filtering and scoring


    Now we need to monitor the following steps:


    +   1. Applying filters via blooms to eliminate potential bad recommendations

    2. Augmenting features to the candidate items and user via the feature stores

    3. Scoring candidates via the ranking model, and potential confidence estimation'
  - '[PAGE 140]


    We should log the incoming request to the filtering service as well as the collection
    of filters we wish to apply. Additionally, as we search the blooms for each item
    and rule them in or out of the bloom, we should build up some structured logging
    of which items are caught in which filters and then log all this as a blob for
    later inspection. Responses and requests should be logged as part of feature augmentation—where
    we should log requests and responses to the feature store.


    Also log the augmented features that end up attached to the item entities. This
    may seem redundant with the feature store itself, but understanding which features
    were added during a recommendation pipeline is *crucial* when looking back later
    to figure out why the pipeline might have behaved differently than anticipated.


    At the time of scoring, the entire set of candidates should be logged with the
    features necessary for scoring and the output scores. It’s extremely powerful
    to log this entire dataset, because training later can use these to get a better
    sense for real ranking sets. Finally, the response is passed to the next step
    with the ranked candidates and all their features.


    # Ordering


    We have one more step to go, but it’s an essential one: *ordering and application
    of business logic or experimentation*. This step is probably the most important
    logging step, because of how complicated and ad hoc the logic in this step can
    get.


    If you have multiple intersecting business requirements implemented via filters
    at this step, while also integrating with experimentation, you can find yourself
    seriously struggling to unpack how reasonable expectations coming out of the ranker
    have turned into a mess by response time. Techniques like logging the incoming
    candidates, keyed to why they’re eliminated, and the order of business rules applied
    will make reconstructing the behavior much more tractable.


    Additionally, experimentation routing will likely be handled by another service,
    but the experiment ID seen in this step and the way that experiment assignment
    was utilized are the responsibility of the server. As we ship off the final recommendations,
    or decide to go another round, one last log of the state of the recommendation
    will ensure that app logs can be validated with responses.


    > **Notes on Formatting**


    Structured logs are your friend. Implementing a data structure to hold the relevant
    data for your logs and then utilizing a `log-formatter object` will significantly
    reduce the difficulty in parsing and writing these logs. One often underappreciated
    feature of building message objects in code, and utilizing them as a running data
    structure throughout your call stack, is tight coupling between logs and app logic.'
- md: 'Tight coupling is often bemoaned in service-architecture discussions, but when
    that coupling is between your logs and your actual objects of execution, this
    saves you a lot of headaches. When changing the objects used for your service,
    instead of having an additional step to ensure the logs reflect that, you can
    propagate those changes through automatically by using the same objects in tandem
    with a log formatter.


    These processes can also make good use of testing, to ensure that the objects
    your code cares about are visible in the logs, and these log-formatter objects
    can have enforced matching via unit tests. Finally, because we want to connect
    to downstream log parsing and log searching, it will be invaluable to have a clear
    relationship between the log stack and the application stack via object parameters
    and keys in the log data structure.


    ## Active Learning


    So far, we have discussed using updating data to train on a much more frequent
    schedule, and we''ve discussed how to provide good recommendations, even when
    the model hasn''t seen enough data for those entities. An additional opportunity
    for the feedback loop of recommendation and rating is active learning.


    We won''t be able to go deep into the topic, which is a large and active field
    of research, but we will discuss the core ideas in relation to recommendation
    systems. *Active learning* changes the learning paradigm a bit by suggesting that
    the learner should not only be passively collecting labeled (maybe implicit) observations
    but also attempting to mine relations and preferences from them. Active learning
    determines which data and observations would be most useful in improving model
    performance and then seeks out those labels. In the context of RecSys, we know
    that the Matthew effect is one of our biggest challenges, in that many potentially
    good matches for a user may be lacking enough or appropriate ratings to bubble
    to the top during the recommendations.


    What if we employed a simple policy: every new item to the store gets recommended
    as a second option to the first 100 customers. Two outcomes would result:


    - We would quickly establish data for our new item to help cold-start it.

    - We would likely decrease the performance of our recommender.


    In many cases, the second outcome is worth enduring to achieve the first, but
    when? And is this the right way to approach this problem? Active learning provides
    a methodical approach to these problems.


    Another more specific advantage of active learning schemes is that you can broaden
    the distribution of observed data. In addition, to just cold-start items, we can
    use active learning to target broadening users'' interests. This is usually framed
    as an uncertainty-reduction technique, as it can be used to improve the confidence
    in recommendations in a broader range of item categories. Here’s a simple example:
    a user shops for only sci-fi books, so one day you show them a few extremely well-liked
    Westerns to see whether that user might be open to occasionally getting recommendations
    for Westerns. See “Propensity Weighting for Recommendation System Evaluation”
    on page 208 for more details.


    An active learning system is instrumented as a loss function inherited from the
    model it’s trying to enhance—usually tied to uncertainty in some capacity—and
    it’s attempting to minimize that loss. Given a model $\mathcal{M}$ trained on
    a set of observations and labels $\{x_i, y_i\}$, with loss $\mathcal{L}$, an active
    learner seeks to find a new observation, $\bar{x}$, such that if a label was obtained,
    $\bar{y}$, the loss would decrease via the model’s training including this new
    pair. In particular, the goal is to approximate the marginal reduction in loss
    due to each possible new observation and find the observation that maximizes that
    reduction in the loss function:


    $$\text{Argmax}_{\bar{x}}\left(\mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\}}\right)
    - \mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\} \cup \{\bar{x}\}}\right)\right)$$


    The structure of an active learning system roughly follows these steps:


    1. Estimate marginal decrease in loss due to obtaining one of a set of observations.

    2. Select the observation with the largest effect.

    3. Query the user; i.e., provide the recommendation to obtain a label.

    4. Update the model.


    It’s probably clear that this paradigm requires a much faster training loop than
    our previous fast retraining schemes. Active learning can be instrumented in the
    same infrastructure as our other setups, or it can have its own mechanisms for
    integration into the pipeline.


    ## Types of optimization


    The optimization procedure carried out by an active learner in a recommendation
    system has two approaches: personalized and nonpersonalized. Because RecSys is
    all about personalization, it’s no surprise that we would, in time, want to push
    the utility of our active learning further by integrating the great details we
    already know about users.


    We can think of these two approaches as global loss minimization and local loss
    minimization. Active learning that isn’t personalized tends to be about minimizing
    the loss over the entire system, not for only one user. (This split doesn’t perfectly
    capture the ontology, but it’s a useful mnemonic). In practice, optimization methods
    are nuanced and sometimes utilize complicated algorithms and training procedures.


    Let''s talk through some factors to optimize for nonpersonalized active learning:


    *User rating variance*

    Consider which items have the largest variance in user ratings to try to get more
    data on those we find the most complicated in our observations.


    *Entropy*

    Consider the dispersion of ratings of a particular item across an ordinal feature.
    This is useful for understanding whether our set of ratings for an item is distributed
    uniformly at random.


    *Greedy extend*

    Measure which items seem to yield the worst performance in our current model;
    this attempts to improve our performance overall by collecting more data on the
    hardest items to recommend well.


    *Representatives or exemplars*

    Pick out items that are extremely representative of large groups of items; we
    can think of this as “If we have good labels for this, we have good labels for
    everything like this.”


    *Popularity*

    Select items that the user is most likely to have experience with to maximize
    the likelihood that they''ll give an opinion or rating.


    *Co-coverage*

    Attempt to amplify the ratings for frequently occurring pairs in the dataset;
    this strikes directly at the CF structure to maximize the utility of observations.


    On the personalized side:


    *Binary prediction*

    To maximize the chances that the user can provide the requested rating, choose
    the items that the user is more likely to have experienced. This can be achieved
    via an MF on the binary ratings matrix.


    *Influence based*

    Estimate the influence of item ratings on the rating prediction of other items,
    and select the items with the largest influence. This attempts to directly measure
    the impact of a new item rating on the system.


    *Rating optimized*

    Obviously, there''s an opportunity to simply use the best rating or best rating
    within a class to perform active learning queries, but this is precisely the standard
    strategy in recommendation systems to serve good recommendations.


    *User segmented*

    When available, use user segmentation and feature clusters within users to anticipate
    when users have opinions and preferences on an item by virtue of the user-similarity
    structure.


    In general, a soft trade-off exists between active learning that''s useful for
    maximally improving your model globally and active learning that''s useful for
    maximizing the likelihood that a user can and will rate a particular item. Let''s
    look at one particular example that uses both.


    ## Application: User sign-up


    One common hurdle to overcome in building recommendation systems is on-boarding
    new users. By definition, new users will be cold-starting with no ratings of any
    kind and will likely not expect great recommendations from the start.


    We may begin with the MPIR for all new users—simply show them *something* to get
    them started and then learn as you go. But is there something better?


    One approach you''ve probably experienced is the user onboarding flow: a simple
    set of questions employed by many websites to quickly ascertain basic information
    about the user, to help guide early recommendation. If discussing our book recommender,
    this might be asking what genres the user likes, or in the case of a coffee recommender,
    how the user brews coffee in the morning. It''s probably clear that these questions
    are building up knowledge-based recommender systems and don''t directly feed into
    our previous pipelines but can still provide some help in early recommendations.


    If instead we looked at all our previous data and asked, “Which books in particular
    are most useful for determining a user''s taste?,” this would be an active learning
    approach. We could even have a decision tree of possibilities as the user answered
    each question, wherein the answer determines which next question is most useful
    to ask.


    ## Summary


    Now we have the confidence that we can serve up our recommendations, and even
    better, we have instrumented our system to gather feedback. We''ve shown how you
    can gain confidence before you deploy and how you can experiment with new models
    or solutions. Ensembles and cascades allow you to combine testing with iteration,
    and the data flywheel provides a powerful mechanism for improving your product.


    You may be wondering how to put all this new knowledge into practice, to which
    the next chapter will speak. Let''s understand how data processing and simple
    counting can lead to an effective—and useful!—recommendation system.'
  mdcn: '在服务架构讨论中，紧密耦合常被诟病，但当这种耦合存在于日志与实际执行对象之间时，却能为你省去诸多烦恼。当更换服务所使用的对象时，无需额外步骤确保日志同步更新，只需将对象与日志格式化器配合使用，变更便能自动传播。


    这些流程也能充分利用测试，确保代码关注的对象在日志中可见，并且日志格式化器对象可通过单元测试强制匹配。最后，由于我们需要连接下游的日志解析与搜索，通过对象参数和日志数据结构中的键来建立日志栈与应用栈之间的清晰关联，将具有不可估量的价值。


    ## 主动学习


    至此，我们已讨论了使用更新数据进行更频繁训练的方法，以及如何在模型尚未充分学习特定实体数据时仍能提供良好推荐。推荐与评分反馈循环的另一个重要机遇是主动学习。


    我们无法深入探讨这个庞大且活跃的研究领域，但将围绕推荐系统讨论其核心思想。*主动学习*略微改变了学习范式，它主张学习者不应仅被动收集带标签（可能是隐式的）的观测数据，还应尝试从中挖掘关系与偏好。主动学习会确定哪些数据和观测对提升模型性能最有用，然后主动获取这些标签。在推荐系统（RecSys）的背景下，我们知道马太效应是最大挑战之一——许多潜在优质匹配可能因缺乏足够或合适的评分，无法在推荐中脱颖而出。


    假设我们采用简单策略：每个新商品都作为前100位客户的第二推荐选项。这将导致两种结果：


    - 我们能快速积累新商品数据，帮助其冷启动。

    - 推荐系统性能可能下降。


    在许多情况下，为实现前者而承受后者是值得的，但何时值得？这是否是解决问题的正确方式？主动学习为这些问题提供了系统化方法。


    主动学习方案的另一个更具体优势是能拓宽观测数据的分布。除了冷启动商品，我们还能利用主动学习来拓展用户兴趣范围。这通常被描述为不确定性降低技术，因为它可用于提升更广泛商品类别推荐的置信度。举个简单例子：某用户只购买科幻书籍，某天你向其展示几本极受欢迎的西部小说，观察该用户是否愿意偶尔接收西部小说推荐。更多详情请参见第208页的“推荐系统评估中的倾向加权”。


    主动学习系统通过继承自其试图增强模型的损失函数来实现——通常与某种不确定性相关——并试图最小化该损失。给定在观测集$\{x_i, y_i\}$上训练的模型$\mathcal{M}$，损失函数为$\mathcal{L}$，主动学习器会寻找新的观测$\bar{x}$，使得若获得标签$\bar{y}$，通过将该新数据对纳入模型训练，损失将降低。具体目标是近似每个可能新观测带来的边际损失减少，并找到使损失函数减少最大化的观测：


    $$\text{Argmax}_{\bar{x}}\left(\mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\}}\right)
    - \mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\} \cup \{\bar{x}\}}\right)\right)$$


    主动学习系统的结构大致遵循以下步骤：


    1. 估算获取一组观测中某一个所带来的边际损失减少。

    2. 选择影响最大的观测。

    3. 查询用户；即提供推荐以获取标签。

    4. 更新模型。


    显然，这种范式需要比我们之前快速重训练方案更快的训练循环。主动学习可在与其他设置相同的基础设施中实现，也可拥有自己的机制集成到流程中。


    ## 优化类型


    推荐系统中主动学习器执行的优化过程有两种方法：个性化与非个性化。由于推荐系统核心在于个性化，我们最终会希望将已掌握的用户详细信息整合进来，以进一步发挥主动学习效用，这不足为奇。


    我们可以将这两种方法视为全局损失最小化与局部损失最小化。非个性化主动学习通常旨在最小化整个系统的损失，而非仅针对单个用户。（这种划分虽不能完美体现本体结构，但作为记忆辅助很有用）。实践中，优化方法十分精细，有时会使用复杂算法和训练流程。


    让我们探讨非个性化主动学习的一些优化因素：


    *用户评分方差*

    考虑哪些商品的用户评分方差最大，以尝试获取更多关于这些在我们观测中最复杂商品的数据。


    *熵*

    考虑特定商品在有序特征上的评分分布离散度。这有助于理解我们对该商品的评分集是否均匀随机分布。


    *贪婪扩展*

    衡量哪些商品在当前模型中表现最差；这试图通过收集最难推荐好的商品数据来整体提升性能。


    *代表性或范例*

    挑选对大量商品群具有极高代表性的商品；我们可以这样理解：“如果我们对此商品有良好标签，那么对所有类似商品都有良好标签。”


    *流行度*

    选择用户最可能体验过的商品，以最大化其提供意见或评分的可能性。


    *共覆盖*

    尝试放大数据集中频繁出现的商品对的评分；这直接针对协同过滤结构，以最大化观测效用。


    在个性化方面：


    *二元预测*

    为最大化用户提供所需评分的可能性，选择用户更可能体验过的商品。这可通过二元评分矩阵的矩阵分解（MF）实现。


    *基于影响力*

    估算商品评分对其他商品评分预测的影响，并选择影响力最大的商品。这试图直接衡量新商品评分对系统的影响。


    *评分优化*

    显然，可以简单使用最佳评分或某类别内最佳评分来执行主动学习查询，但这正是推荐系统中提供良好推荐的标准策略。


    *用户细分*

    在可用时，利用用户细分和用户内特征集群，通过用户相似性结构来预测用户何时对商品有意见和偏好。


    通常，最大化全局模型提升的主动学习与最大化用户能够且愿意对特定商品评分可能性的主动学习之间存在软性权衡。让我们看一个结合两者的具体例子。


    ## 应用：用户注册


    构建推荐系统时，一个常见障碍是新用户引导。根据定义，新用户将冷启动，没有任何评分，且可能从一开始就不期待优质推荐。


    我们可能从所有新用户的MPIR（最流行物品推荐）开始——简单展示*某些内容*让用户入门，然后边用边学。但是否有更好的方法？


    你可能体验过的一种方法是用户引导流程：许多网站采用的一组简单问题，用于快速获取用户基本信息，以指导早期推荐。如果讨论我们的书籍推荐系统，这可能是询问用户喜欢哪些类型；若是咖啡推荐系统，则是询问用户早晨如何冲泡咖啡。显然，这些问题构建的是基于知识的推荐系统，并不直接输入我们之前的流程，但仍能在早期推荐中提供帮助。


    如果我们转而查看所有历史数据并问：“哪些特定书籍对确定用户品味最有用？”这就是主动学习方法。我们甚至可以为用户回答每个问题设计决策树，其中答案决定下一个最有用的问题。


    ## 总结


    现在我们有信心能够提供推荐，更棒的是，我们已建立系统收集反馈。我们展示了如何在部署前建立信心，以及如何试验新模型或解决方案。集成与级联允许你将测试与迭代结合，数据飞轮为改进产品提供了强大机制。


    你可能想知道如何将所有这些新知识付诸实践，下一章将对此进行阐述。让我们了解数据处理和简单计数如何构建一个高效且实用的推荐系统。'

    \ 相似性是一个真正的距离度量，具有一些很好的几何性质；其他两个则不是。\n- 所有三个都在区间 $(0, 1)$ 上，但你经常会看到余弦通过包含负评分扩展到\
    \ $(-1, 1)$。\n- 余弦可以通过将所有交互扩展为具有 $\\pm 1$ 的极性来适应“点赞/点踩”。\n- 余弦可以通过允许向量为非二元并计算用户与物品交互的次数来适应“多次交互”。\n\

- img_proc: true
  md: "How does this help us in our case? The simple idea is if your vector store\
    \ also has features for the vectors, you can include the feature comparisons as\
    \ part of retrieval. Let’s take an overly simple example: assume your items have\
    \ a categorical feature called color, and for good diverse recommendations you\
    \ want a nice set of at least three colors in your five recommendations. To achieve\
    \ this, you can do a top-$k$ search across each of the colors in your store (the\
    \ downside is that your retrieval is $C$ times as large, where $C$ is the number\
    \ of colors that exist) and then do ranking and diversity on the union of these\
    \ sets. This has a much higher likelihood of surviving your diversity rule in\
    \ the eventual recommendations. This is great! We expect that latency is relatively\
    \ low in retrieval, so this tax of extra retrievals isn’t bad if we know where\
    \ to look.\n\nThis optimization technique can be applied on quite complicated\
    \ predicates if your vector store is set up well for the kinds of filters you\
    \ wish to impose.\n\n# Fairness\n\nFairness in ML in general is a particularly\
    \ nuanced subject that is ill-served by short summaries. The following topics\
    \ are important, and we invite you to consider the robust references included\
    \ here:\n\n*Nudging*\n    Fairness does not need to be only “equal probabilities\
    \ for all outcomes”; it can be fair with respect to a specific covariate. Nudging\
    \ via a recommender—i.e., recommending items to emphasize certain behavior or\
    \ buying patterns—can increase fairness. Consider the work by Karlijn Dinnissen\
    \ and Christine Bauer from Spotify about [using nudging to improve gender representation\
    \ in music recommendations](https://dl.acm.org/doi/10.1145/3460231.3474244).\n\
    \n*Filter bubbles*\n    Filter bubbles are a downside of extreme collaborative\
    \ filtering: a group of users begin liking similar recommendations, the system\
    \ learns that they should receive similar recommendations, and the feedback loop\
    \ perpetuates this. For a deep look into not only the concept but also mitigation\
    \ strategies, consider [“Mitigating the Filter Bubble While Maintaining Relevance”](https://dl.acm.org/doi/10.1145/3460231.3474244)\
    \ by Zhaolin Gao et al.\n\n*High risk*\n    Not all applications of AI are equal\
    \ in risk. Some domains are particularly harmful when AI systems are poorly guardrailed.\
    \ For a general overview of the most high-risk circumstances and mitigation, consult\
    \ *Machine Learning for High-Risk Applications* by Patrick Hall et al. (O’Reilly).\n\
    \n*Trustworthiness*\n    Explainable models is a popular mitigation strategy for\
    \ risky applications of AI. While explainability does not *solve* the problem,\
    \ it frequently provides a"
  merge: -1

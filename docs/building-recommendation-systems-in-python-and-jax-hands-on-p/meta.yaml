    \ ingestion, and interaction of various parts of a system are being worked out.\
    \ When the uncertainties have been worked out, then you can rewrite the code into\
    \ a more robust form, but refactoring too early actually slows velocity.\n\nA\
    \ general rule of thumb is that it is OK to copy code three times and then refactor\
    \ out into a library the fourth time, because you'll have seen enough use cases\
    \ to justify the reuse of code. If refactoring is done too early, you might not\
    \ have seen enough use cases of a piece of code to cover the possible use cases\
    \ that it might need to handle.\n\n## Debug Print Statements\n\nIf you've read\
    \ a number of ML research papers, you may expect your data to be fairly clean\
    \ and orderly at the start of a project. However, real-world data can be messy,\
    \ with missing fields and unexpected values. Having lots of print functions allows\
    \ you to print and visually inspect a sample of the data and also helps in crafting\
    \ the input data pipelines and transformations to feed the model. Also, printing\
    \ sample outputs of the model is useful in making sure the output is as expected.\n\
    \nThe most important places to include logging are the input and output schema\
    \ between components of your system; these help you understand where reality may\
    \ be deviating from expectations. Later, you can make unit tests to ensure that\
    \ refactoring of the model doesn't break anything, but the unit tests can wait\
    \ for when the model architecture is stable. A good rule of thumb is to add unit\
    \ tests when you want to refactor code or reuse or optimize the code to preserve\
    \ functionality or when the code is stable and you want to ensure that it doesn't\
    \ break a build. Another good use case of adding print statements is when you\
    \ inevitably run into not-a-number (NaN) errors when running training code.\n\n\
    In JAX, you can enable NaN debugging by using the following lines:\n\n```python\n\
    from jax import config\nconfig.update(\"jax_debug_nans\", True)\n\n@jax.jit\n\
    def f(x):\n    jax.debug.print(\"Debugging {x}\", x=x)\n```\n\nThe debug NaNs\
    \ configuration setting will rerun a jitted function if it finds any NaNs, and\
    \ the debug print function will print the value of the tensors even inside a JIT.\
    \ A regular print won't work inside a JIT because it is not a compilable command\
    \ and is skipped over during the tracing, so you have to use the debug print function\
    \ instead, which does work inside a JIT.\n\n## Defer Optimization\n\nIn research\
    \ code, there is a lot of temptation to optimize early—in particular, focusing\
    \ on the implementation of your models or system to ensure they're efficient computationally\
    \ or the code is elegant. However, research code is written for higher velocity\
    \ in experimentation, not execution speed.\n\nOur suggestion is do not optimize\
    \ too early unless it hinders research velocity. One reason for this is the system\
    \ might not be complete, so optimizing one part might not make sense if another\
    \ part of the system is even slower and is the actual bottleneck. Another reason\
    \ is the part that you are optimizing might not make it to the final model, so\
    \ all the optimization work might go to waste if the code is refactored away anyway.\n\
    \nFinally, optimization might actually hinder the ability to modify or inject\
    \ newer design choices in terms of architecture or functionality. Optimized code\
    \ tends to have certain choices that were made that fit the current structure\
    \ of the data flow but might not be amenable to further changes. For example,\
    \ in the code for this chapter, one possible optimization choice would have been\
    \ to batch together playlists of the same size so that the code might be able\
    \ to run in larger batches. However, at this point of the experimentation, that\
    \ optimization would have been premature and distracting because it might make\
    \ the metrics code more complicated. Our gentle advice is to defer optimization\
    \ until after the bulk of experimentation has been done and the architecture,\
    \ loss functions, and metrics have been chosen and settled upon.\n\n## Keep Track\
    \ of Changes\n\nIn research code, too many variables are probably at play for\
    \ you to change them one at a time to see their effects. This problem is particularly\
    \ noticeable with larger datasets that require a lot of runs to determine which\
    \ change causes which effects. So, in general, fixing a number of parameters and\
    \ changing the code bit by bit is still a good idea so that you can keep track\
    \ of the change that causes the most improvement. Parameters have to be tracked,\
    \ but so do the code changes.\n\nOne way to keep track of changes is through services\
    \ such as Weights & Biases that we discussed in Chapter 5. Keeping track of the\
    \ exact code that led to a change and the parameters is a good idea so that experiments\
    \ can be reproduced and analyzed. Especially with research code that changes so\
    \ frequently and is sometimes not checked in, you have to be diligent in keeping\
    \ a copy of the code that produced a run somewhere, and MLOps tools allow you\
    \ to track code and hyperparameters.\n\n## Use Feature Engineering\n\nUnlike in\
    \ academic papers, most applied research is interested in a good outcome rather\
    \ than a theoretically beautiful result. We're not shackled by purist views that\
    \ the model has to learn everything about the data by itself. Instead, we're pragmatic\
    \ and concerned about good outcomes.\n\nWe should not discard practices like feature\
    \ engineering, especially when we have little data or are crunched for time and\
    \ need decent results fast. Using feature engineering means that if you know whether\
    \ a handcrafted feature is correlated positively or negatively with an outcome\
    \ like the ranking of an item, then by all means add these engineered features\
    \ to the data. An example in recommender systems is having an attribute of the\
    \ item being scored that matches something in the user's profile. So, if an item\
    \ has the same artist or album in the user's playlist, we can return a Boolean\
    \ True; otherwise, we return False. This extra feature simply helps the model\
    \ converge faster, and the model can still use other latent features such as embeddings\
    \ to compensate if the hand-engineered features don't do so well.\n\nIt is generally\
    \ a good practice to ablate the hand-engineered features once in a while. To do\
    \ this, hold back an experiment without some features to see if those features\
    \ have become obsolete over time or if they still benefit the business metrics.\n\
    \n## Ablation\n\nAblation in ML applications is the practice of measuring the\
    \ change in performance of a model when a particular feature is removed. In computer\
    \ vision applications, ablation often refers to blocking part of the image or\
    \ view field to see how it impacts the model's ability to identify or segment\
    \ data. In other kinds of ML, it can mean strategically removing certain features.\n\
    \nOne gotcha with ablation is what to replace the feature with. Simply zeroing\
    \ out the feature can significantly skew the output of the model. This is called\
    \ zero-ablation, and can force the model to treat that feature out of distribution,\
    \ which yields less believable outcomes. Instead, some advocate for mean-ablation,\
    \ or taking the average or most common value of that feature. This allows the\
    \ model to see much more expected values, and reduce these risks.\n\nHowever,\
    \ this fails to consider the most important aspects of the kinds of models we've\
    \ been working on—latent high-order interactions. One of the authors has investigated\
    \ a deeper approach to ablation called causal scrubbing, in which you fix the\
    \ ablation value to be sampled from the posterior distribution produced by other\
    \ feature values, i.e., a value that “makes sense” with the rest of the values\
    \ the model will see at that time.\n\n## Understand Metrics Versus Business Metrics\n\
    \nSometimes, as ML practitioners, we obsess over the best possible metrics our\
    \ models can achieve. However, we should temper that enthusiasm as the best ML\
    \ metric might not totally represent the business interests at hand. Furthermore,\
    \ other systems that contain business logic might sit on top of our models and\
    \ modify the output. As a result, it is best not to obsess too heavily over ML\
    \ metrics and to do proper A/B tests that contain business metrics instead since\
    \ that's the main measure of a good outcome with ML.\n\nThe best possible circumstance\
    \ is to find a loss function that aligns well or predicts the relevant business\
    \ metric. This, unfortunately, is often not easy to find, especially when the\
    \ business metrics are nuanced or have competing priorities.\n\n## Perform Rapid\
    \ Iteration\n\nDon't be afraid to look at results of runs that are rather short.\
    \ There's no need to do a full pass over the data at the beginning, when you are\
    \ figuring out the interaction between a model architecture and the data. It's\
    \ OK to do some rapid runs with minor tweaks to see how they change the metrics\
    \ over a short number of time steps. In the Spotify Million Playlist dataset,\
    \ we tweaked the model architecture by using 100,000"
  mdcn: "## 保持简单\n\n就研究代码的整体结构而言，最好尽可能保持简单。在探索生命周期的早期阶段，不要过多考虑继承和可重用性。在项目开始时，我们通常还不清楚需要什么，因此应该优先考虑让代码易于阅读和调试。这意味着你不必过于关注代码重用，因为在项目的早期阶段，随着模型结构、数据输入和系统各部分交互的调整，许多代码会发生变化。当不确定性解决后，你可以将代码重写成更健壮的形式，但过早重构实际上会减慢速度。\n\
    \n一个经验法则是，复制代码三次，然后在第四次时将其重构为库是可以的，因为你已经看到了足够多的用例来证明代码重用的合理性。如果过早进行重构，你可能没有看到足够多的代码用例来覆盖它可能需要处理的可能用例。\n\
    \n## 调试打印语句\n\n如果你读过许多机器学习研究论文，你可能期望项目开始时数据相当干净有序。然而，现实世界的数据可能很混乱，存在缺失字段和意外值。拥有大量打印函数可以让你打印并直观检查数据样本，也有助于构建输入数据管道和转换以馈送模型。此外，打印模型的样本输出对于确保输出符合预期非常有用。\n\
    \n最重要的日志记录位置是系统组件之间的输入和输出模式；这些可以帮助你了解实际情况何时偏离预期。之后，你可以进行单元测试以确保模型重构不会破坏任何东西，但单元测试可以等到模型架构稳定时再进行。一个很好的经验法则是，当你想要重构代码或重用或优化代码以保留功能，或者当代码稳定且你想要确保它不会破坏构建时，添加单元测试。另一个添加打印语句的好用例是，当你在运行训练代码时不可避免地遇到非数字（NaN）错误时。\n\
    \n在 JAX 中，你可以使用以下代码启用 NaN 调试：\n\n```python\nfrom jax import config\nconfig.update(\"\
    jax_debug_nans\", True)\n\n@jax.jit\ndef f(x):\n    jax.debug.print(\"Debugging\
    \ {x}\", x=x)\n```\n\n调试 NaN 配置设置会在发现任何 NaN 时重新运行 JIT 编译的函数，调试打印函数甚至会在 JIT 内部打印张量的值。常规打印在\
    \ JIT 内部不起作用，因为它不是可编译的命令，在跟踪期间会被跳过，因此你必须使用调试打印函数，它在 JIT 内部确实有效。\n\n## 推迟优化\n\n\
    在研究代码中，过早优化的诱惑很大——特别是关注模型或系统的实现以确保它们计算高效或代码优雅。然而，研究代码是为了更高的实验速度而编写的，而不是执行速度。\n\
    \n我们的建议是不要过早优化，除非它阻碍了研究速度。一个原因是系统可能不完整，因此优化一部分可能没有意义，如果系统的另一部分更慢并且是实际瓶颈。另一个原因是你正在优化的部分可能不会进入最终模型，因此如果代码最终被重构掉，所有优化工作可能会浪费。\n\
    \n最后，优化实际上可能会阻碍修改或注入更新架构或功能设计选择的能力。优化的代码往往做出某些选择以适应当前的数据流结构，但可能不便于进一步更改。例如，在本章的代码中，一个可能的优化选择是将相同大小的播放列表批处理在一起，以便代码可以以更大的批次运行。然而，在实验的这个阶段，这种优化将是过早和分心的，因为它可能会使指标代码更复杂。我们温和的建议是推迟优化，直到大部分实验完成，并且架构、损失函数和指标已经选择并确定。\n\
    \n## 跟踪更改\n\n在研究代码中，可能有太多变量在起作用，你无法一次改变一个来观察它们的效果。这个问题在需要大量运行来确定哪个更改导致哪个效果的大型数据集中尤为明显。因此，一般来说，固定一些参数并逐步更改代码仍然是一个好主意，这样你就可以跟踪导致最大改进的更改。参数必须跟踪，但代码更改也必须跟踪。\n\
    \n跟踪更改的一种方法是通过我们在第 5 章讨论的 Weights & Biases 等服务。跟踪导致更改的确切代码和参数是一个好主意，这样实验可以重现和分析。特别是对于频繁更改且有时未签入的研究代码，你必须勤奋地保存产生运行的代码副本，MLOps\
    \ 工具允许你跟踪代码和超参数。\n\n## 使用特征工程\n\n与学术论文不同，大多数应用研究关注的是好的结果，而不是理论上漂亮的结果。我们不受纯粹主义者观点的束缚，即模型必须自己学习数据的所有内容。相反，我们是务实的，关注好的结果。\n\
    \n我们不应该放弃特征工程等实践，特别是当我们数据很少或时间紧迫并需要快速获得不错结果时。使用特征工程意味着，如果你知道手工制作的特征与结果（如项目排名）正相关或负相关，那么务必添加这些工程特征到数据中。推荐系统中的一个例子是，被评分项目的属性与用户配置文件中的某些内容匹配。因此，如果项目与用户播放列表中的艺术家或专辑相同，我们可以返回布尔值\
    \ True；否则，返回 False。这个额外的特征只是帮助模型更快收敛，如果手工工程特征效果不佳，模型仍然可以使用其他潜在特征（如嵌入）来补偿。\n\n\
    通常，偶尔消融手工工程特征是一个好习惯。为此，保留一个没有某些特征的实验，看看这些特征是否随着时间的推移已经过时，或者它们是否仍然有利于业务指标。\n\n\
    ## 消融\n\n机器学习应用中的消融是测量当特定特征被移除时模型性能变化的做法。在计算机视觉应用中，消融通常指阻止图像或视野的一部分，以查看它如何影响模型识别或分割数据的能力。在其他类型的机器学习中，它可能意味着战略性地移除某些特征。\n\
    \n消融的一个陷阱是用什么来替代该特征。简单地将特征归零会显著扭曲模型的输出。这称为零消融，它可能迫使模型将该特征视为分布外，从而产生不太可信的结果。相反，一些人主张平均消融，或取该特征的平均值或最常见值。这允许模型看到更预期的值，并减少这些风险。\n\
    \n然而，这未能考虑我们一直在处理的模型类型的最重要方面——潜在的高阶交互。其中一位作者研究了一种更深入的消融方法，称为因果擦洗，其中你将消融值固定为从其他特征值产生的后验分布中采样，即一个与模型当时将看到的其余值“有意义”的值。\n\
    \n## 理解指标与业务指标\n\n有时，作为机器学习从业者，我们痴迷于模型可以达到的最佳指标。然而，我们应该克制这种热情，因为最佳的机器学习指标可能不能完全代表当前的业务利益。此外，包含业务逻辑的其他系统可能位于我们的模型之上并修改输出。因此，最好不要过度痴迷于机器学习指标，而是进行包含业务指标的适当\
    \ A/B 测试，因为这是衡量机器学习良好结果的主要标准。\n\n最好的情况是找到一个与相关业务指标良好对齐或预测的损失函数。不幸的是，这通常不容易找到，特别是当业务指标微妙或具有竞争性优先级时。\n\
    \n## 执行快速迭代\n\n不要害怕查看相当短的运行结果。在开始时，当你正在弄清楚模型架构和数据之间的交互时，没有必要对数据进行完整的遍历。进行一些快速运行并进行微小调整，看看它们如何在短时间内改变指标是可以的。在\
    \ Spotify 百万播放列表数据集中，我们通过使用 100,000"

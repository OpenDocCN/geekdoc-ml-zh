  md: 'As before, let''s consider the implication on our CF algorithms from these
    sparse ratings. Again observe that the probability of $V_i$, the $i$th most popular
    item, appearing in $\mathcal{I}_X$ for a user $X$ is given by the following:


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^M f(j, M)} = \frac{1/i}{\sum_{j=1}^M 1/j}$$


    Then


    $$(M - 1) * P(i)$$


    is the expected number of other users who click the $i$th most popular item, so

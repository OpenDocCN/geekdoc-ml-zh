- md: "In this implementation, we're using Apache Spark in Python, or PySpark. The\
    \ README in the repository shows how to install a copy of PySpark locally using\
    \ `pip install`.\n\nThe first step implemented in PySpark is tokenization and\
    \ URL normalization. The code is in `tokenize_wiki_pyspark.py`, but we won't go\
    \ over it here because a lot of the processing is simply distributed natural language\
    \ parsing and writing out the data into protocol buffer format. We will instead\
    \ talk in detail about the second step, which is to make a dictionary of tokens\
    \ (the *words* in the article) and some statistics about the word counts. However,\
    \ we will run the code just to see what the Spark usage experience looks like.\
    \ Spark programs are run using the program `spark-submit` as follows:\n\n```\n\
    bin/spark-submit\n--master=local[4]\n--conf=\"spark.files.ignoreCorruptFiles=true\"\
    \ntokenize_wiki_pyspark.py\n--input_file=data/enwiki-latest-parsed --output_file=data/enwiki-latest-tokenized\n\
    ```\n\nRunning the Spark submit script allows you to execute the controller program,\
    \ in this case, `tokenize_wiki_pyspark.py`, on a local machine as we have in the\
    \ command line—note that the line `local[4]` means use up to four cores. The same\
    \ command can be used to submit the job to a YARN cluster for running on hundreds\
    \ of machines, but for the purposes of trying out PySpark, a decent enough workstation\
    \ should be able to process all the data in minutes.\n\nThis tokenization program\
    \ converts from a source-specific format (in this case, a Wikipedia protocol buffer)\
    \ into a more generic text document used for NLP. In general, it's a good idea\
    \ to use a generic format that all your sources of data can be converted into\
    \ because that simplifies the data processing downstream. The data conversion\
    \ can be done from each corpus into a standard format that is handled uniformly\
    \ by all the later programs in the pipeline.\n\nAfter submitting the job, you\
    \ can navigate to the Spark UI (shown in Figure 8-1) on your local machine at\
    \ `localhost:4040/stages/`. You should see the job executing in parallel, using\
    \ up all the cores in your machine. You might want to play with the `local[4]`\
    \ parameter; using `local[*]` will use up all the free cores on your machine.\
    \ If you have access to a cluster, you can also point to the appropriate cluster\
    \ URL.\n\n![](img/da17d05291861831978609329c481581_150_0.png)\n\nFigure 8-1. Spark\
    \ UI\n\n## Cluster Frameworks\n\nThe nice thing about writing a Spark program\
    \ is that it can scale from a single machine with multiple cores to a cluster\
    \ of many machines with thousands of cores. The full list of cluster types can\
    \ be found in the [Spark \"Submitting Applications\" documentation](https://spark.apache.org/docs/latest/cluster-overview.html).\n\
    \nSpark can run on the following cluster types:\n\n- Spark Standalone cluster\n\
    - Mesos cluster\n- YARN cluster\n- Kubernetes cluster\n\nDepending on the kind\
    \ of cluster your company or institution has set up, most of the time submitting\
    \ the job is just a matter of pointing to the correct URL. Many companies such\
    \ as Databricks and Google also have fully managed Spark solutions that allow\
    \ you to set up a Spark cluster with little effort.\n\n## PySpark Example\n\n\
    Counting words turns out to be a powerful tool in information retrieval, as we\
    \ can use handy tricks like term frequency, inverse document frequency (TF-IDF),\
    \ which is simply the count of words in the documents divided by the number of\
    \ documents the word has occurred in. This is represented as follows:\n\n$$tfidf_{word(i)}\
    \ = \\frac{\\log_{10} (\\text{number of times } word_i \\text{ has occurred in\
    \ corpus})}{\\text{number of documents in corpus containing } word_i}$$\n\nFor\
    \ example, because the word *the* appears frequently, we might think it is an\
    \ important word. But by dividing by the document frequency, *the* becomes less\
    \ special and drops in importance. This trick is quite handy in simple NLP to\
    \ get a better-than-random weighting of word importance.\n\nTherefore, our next\
    \ step is to run `make_dictionary.py`. As the name indicates, this program simply\
    \ counts the words and documents and makes a dictionary with the number of times\
    \ a word has occurred.\n\nWe have some concepts to cover in order for you to properly\
    \ grok how Spark helps process data in a distributed manner. The entry point of\
    \ most Spark programs is `SparkContext`. This Python object is created on the\
    \ controller. The *controller* is the central program that launches workers that\
    \ actually process the data. The workers can be run locally on a single machine\
    \ as a process or on many machines on the cloud as separate workers.\n\n`SparkContext`\
    \ can be used to create resilient distributed datasets, or RDDs. These are references\
    \ to data streams that can be manipulated on the controller, and processing on\
    \ the RDD can be farmed out to all the workers. `SparkContext` allows you to load\
    \ up data files stored on a distributed filesystem like Hadoop Distributed File\
    \ System (HDFS) or cloud buckets. By calling the `SparkContext`'s `textFile` method,\
    \ we are returned a handle to an RDD. A stateless function can then be applied\
    \ or mapped on the RDD to transform it from one RDD to another by repeatedly applying\
    \ the function to the contents of the RDD.\n\nFor example, this program fragment\
    \ loads a text file and converts all lines to lowercase by running an anonymous\
    \ lambda function that converts single lines to lowercase:\n\n```python\ndef lower_rdd(input_file:\
    \ str,\n              output_file: str):\n    \"\"\"Takes a text file and converts\
    \ it to lowercase..\"\"\"\n    sc = SparkContext()\n    input_rdd = sc.textFile(input_file)\n\
    \    input_rdd.map(lambda line: line.lower()).saveAsTextFile(output_file)\n```\n\
    \nIn a single-machine implementation, we would simply load up each Wikipedia article,\
    \ keep a running dictionary in RAM, and count each token and then add 1 to the\
    \ token count in the dictionary. A *token* is an atomic element of a document\
    \ that is divided into pieces. In regular English, it would be a word, but Wikipedia\
    \ documents have other entities such as the document references themselves that\
    \ need to be kept track of separately, so we call the division into pieces *tokenization*\
    \ and the atomic elements *tokens*. The single-machine implementation would take\
    \ a while to go through the thousands of documents on Wikipedia, which is why\
    \ we use a distributed processing framework like Spark. In the Spark paradigm,\
    \ computation is broken into maps, where a function is applied statelessly on\
    \ each document in parallel. Spark also has a reduce function, where the outputs\
    \ of separate maps are joined together.\n\nFor example, suppose we have a list\
    \ of word counts and want to sum up the values of words that occur in different\
    \ documents. The input to the reducer will be something like this:\n\n- (apple,\
    \ 10)\n- (orange, 20)\n- (apple, 7)\n\nThen we call the Spark function `reduceByKey(lambda\
    \ a, b: a+ b)`, which adds all the values with the same key together and returns\
    \ the following:\n\n- (orange, 20)\n- (apple, 17)\n\nIf you look at the code in\
    \ `make_dictionary.py`, the *map phase* is where we take a document as input and\
    \ then break it into tuples of (token, 1). In the *reduce phase*, the map outputs\
    \ are joined by the key, which in this case is the token itself, and the reduce\
    \ function is simply to sum up all the counts of tokens.\n\nNote that the reduce\
    \ function assumes that the reduction is associative—that is, $(a + b + c) = (a\
    \ + b) + c = a + (b + c)$. This allows the Spark framework to sum up some parts\
    \ of the token dictionary in memory on the map phase (in some frameworks, this\
    \ is called the *combine step*, where you run part of the reduction on the output\
    \ of the map phase on the mapper machine) and then sum them up over several passes\

  md: "In this case, the hyperparameter optimization (HPO) is over our hyperparameters\
    \ like embedding dimension and the priors (randomized matrices). Up until now,\
    \ we have trained some MF models on our ratings matrix. Let's now add regularization\
    \ and cross-validation.\n\nLet's translate the preceding math equations directly\
    \ into code:\n\n```\ndef ell_two_regularization_term(params, dimensions):\n  \
    \  U, V = params['users'], params['items']\n    N, M = dimensions['users'], dimensions['items']\n\
    \    user_sq = jnp.multiply(U, U)\n    item_sq = jnp.multiply(V, V)\n    return\
    \ (jnp.sum(user_sq)/N + jnp.sum(item_sq)/M)\n\nl2_loss = jit(ell_two_regularization_term)\n\
    \ndef gramian_regularization_term(params, dimensions):\n    U, V = params['users'],\
    \ params['items']\n    N, M = dimensions['users'], dimensions['items']\n    gr_user\
    \ = U.T @ U\n    gr_item = V.T @ V\n    gr_square = jnp.multiply(gr_user, gr_item)\n\
    \    return (jnp.sum(gr_square)/(N*M))\n\ngr_loss = jit(gramian_regularization_term)\n\
    \ndef regularized_omse(A, params, dimensions, hyperparams):\n    lr, lg = hyperparams['ell_2'],\
    \ hyperparams['gram']\n    losses = {\n        'omse': sp_mse_loss(A, params),\n\
    \        'l2_loss': l2_loss(params, dimensions),\n        'gr_loss': gr_loss(params,\
    \ dimensions),\n    }\n    losses.update({\n        'total_loss': losses['omse']\
    \ + lr*losses['l2_loss'] + lg*losses['gr_loss']\n    })\n    return losses['total_loss'],\
    \ losses\n\nreg_loss_observed = jit(regularized_omse)\n```\n\nWe won't dive super\
    \ deep into learning rate schedulers, but we will do a simple decay:\n\n```\n\
    def lr_decay(\n    step_num,\n    base_learning_rate,\n    decay_pct = 0.5,\n\
    \    period_length = 100.0\n):\n    return base_learning_rate * math.pow(\n  \
    \      decay_pct,\n        math.floor((1+step_num)/period_length)\n    )\n```"

- img_proc: true
  md: '# CHAPTER 10

    Low-Rank Methods


    In the preceding chapter, we lamented at the challenge of working with so many
    features. By letting each item be its own feature, we were able to express a lot
    of information about user preference and item-affinity correlations, but we were
    in big trouble in terms of the curse of dimensionality. Combine this with the
    reality of very sparse features, and you''re in danger. In this chapter, we''ll
    turn to smaller feature spaces. By representing users and items as low-dimensional
    vectors, we can capture the complex relationships between them in a more efficient
    and effective way. This allows us to generate more personalized and relevant recommendations
    for users while also reducing the computational complexity of the recommendation
    process.


    We will explore the use of low-dimensional embeddings and discuss the benefits
    and some of the implementation details of this approach. We will also look at
    code in JAX that uses modern gradient-based optimization to reduce the dimension
    of your item or user representations.


    # Latent Spaces


    You are already familiar with feature spaces, which are usually categorical or
    vector-valued direct representations of the data. This can be the raw red, green,
    and blue values of an image, counts of items in a histogram, or attributes of
    an object like length, width, and height. Latent features, on the other hand,
    do not represent any specific real value feature of the items but are initialized
    randomly and then learned to suit a task. The GloVe embeddings we discussed in
    Chapter 8 are one such example of a latent vector that was learned to represent
    the log count of words. Here we will cover more ways to generate these latent
    features or embeddings.'
  merge: -1
  pgno: 186
- img_proc: true
  md: "![](img/da17d05291861831978609329c481581_187_0.png)\n\n# Focus on Your “Strangths”\n\
    \nThis chapter relies heavily on linear algebra, so it’s good to read up on vectors,\
    \ dot products, and norms of vectors before proceeding. Having an understanding\
    \ of matrices and the rank of matrices will also be useful. Consider *Linear Algebra\
    \ and Its Applications* by Gilbert Strang.\n\nOne of the reasons latent spaces\
    \ are so popular is that they are usually lower in dimension than the features\
    \ they represent. For example, if the user-item rating matrix or interaction matrix\
    \ (where the matrix entries are 1 if a user has interacted with an item) is $N\
    \ \\times M$ dimensional, then factorizing the matrix into latent factors of $N\
    \ \\times K$ and $K \\times M$, where $K$ is much smaller than $N$ or $M$ is an\
    \ approximation of the missing entries because we’re relaxing the factorization.\
    \ $K$ being smaller than $N$ or $M$ is usually called an *information bottleneck*—that\
    \ is, we are forcing the matrix to be made up of a much smaller matrix. This means\
    \ the ML model has to make up missing entries, which might be good for recommender\
    \ systems. As long as users have interacted with enough similar items, by forcing\
    \ the system to have a lot less capacity in terms of degrees of freedom, then\
    \ factorization can completely reconstruct the matrix, and the missing entries\
    \ tend to get filled by similar items.\n\nLet’s see what happens, for example,\
    \ when we factor a user-item matrix of $4 \\times 4$ into a $4 \\times 2$ and\
    \ a $2 \\times 4$ vector using SVD.\n\nWe are supplying a matrix whose rows are\
    \ users and whose columns are items. For example, row 0 is [1, 0, 0, 1], which\
    \ means user 0 has selected item 0 and item 3. These can be ratings or purchases.\
    \ Now let’s look at some code:\n\n```\nimport numpy as np\n\na = np.array([\n\
    \    [1, 0, 0 ,1],\n    [1, 0, 0 ,0],\n    [0, 1, 1, 0],\n    [0, 1, 0, 0]]\n\
    )\n\nu, s, v = np.linalg.svd(a, full_matrices=False)\n\n# Set the last two eigenvalues\
    \ to 0.\ns[2:4] = 0\nprint(s)\nb = np.dot(u * s, v)\nprint(b)\n\n# These are the\
    \ eigenvalues with the smallest two set to 0.\ns = [1.61803399 1.61803399 0. \
    \        0.        ]\n\n# This is the newly reconstructed matrix.\n```"
  merge: -1

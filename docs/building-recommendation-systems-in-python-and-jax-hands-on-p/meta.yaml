- md: "## CHAPTER 8\nPutting It All Together: Data Processing and Counting Recommender\n\
    \nNow that we have discussed the broad outline of recommender systems, this chapter\
    \ will put it into a concrete implementation so that we can talk about the choices\
    \ of technologies and specifics of how the implementation works in real life.\n\
    \nThis chapter covers the following topics:\n\n- Data representation with protocol\
    \ buffers\n- Data processing frameworks\n- A PySpark sample program\n- GloVE embedding\
    \ model\n- Additional foundational techniques in JAX, Flax, and Optax\n\nWe will\
    \ show step-by-step how to go from a downloaded Wikipedia dataset to a recommender\
    \ system that can recommend words from Wikipedia based on the co-occurrence with\
    \ words in a Wikipedia article. We use a natural language example because words\
    \ are easily understood, and their relationships are readily grasped because we\
    \ can see that related words occur near one another in a sentence. Furthermore,\
    \ the Wikipedia corpus is easily downloadable and browsable by anyone with an\
    \ internet connection. This idea of co-occurrence can be generalized to any co-occurring\
    \ collection of items, such as watching a video in the same session or purchasing\
    \ cheeses in the same shopping bag.\n\nThis chapter will demonstrate concrete\
    \ implementations of an item-item and a feature-item recommender. Items in this\
    \ case are the words in an article, and the features are word-count similarity—a\
    \ MinHash or a kind of locality sensitive hash for words. Chapter 16 covers locality\
    \ sensitive hash in more detail, but for now, we’ll consider these simple hashing\
    \ functions to be encoding functions over content, such that content with similar\
    \ properties maps to similar co-domains. This general idea can be used as a warm-start\
    \ mechanism on a new corpus in the absence of logging data, and if we have user-item\
    \ features such as likes, these can be used as features for a feature-item recommender.\
    \ The principles of co-occurrence are the same, but by using Wikipedia as an example,\
    \ you can download the data and play with it by using the tools provided.\n\n\
    ### Warm and Cold Starts\n\nA *cold start* occurs when we do not have any information\
    \ about a corpus or people's preferences and resort to a best-guess approach such\
    \ as recommending popular items. On the other hand, if items naturally occur in\
    \ typical groupings, like the selection and arrangement in the cheese aisle of\
    \ a grocery store, then we call this a warm start: using information like co-occurrence\
    \ of cheeses with each other or with other items like salami as a means of starting\
    \ out the recommender engine more intelligently.\n\nIn the Wikipedia example,\
    \ even before we have users click articles, we'll be able to warm-start the word-to-word\
    \ recommender simply based on how close words are to each other in a sentence.\
    \ Similarly, if you had a bunch of items that naturally fall into some kind of\
    \ hierarchical taxonomy, you might be able to warm-start your recommender by having\
    \ items that are in the same branch of the taxonomy count as co-occurring with\
    \ one another.\n\n## Tech Stack\n\nA set of technologies used together is commonly\
    \ called a *technology stack*, or *tech stack*. Each component of a tech stack\
    \ can usually be replaced by other similar technologies. We will list a few alternatives\
    \ for each component but not go into detail about their pros and cons, as there\
    \ can be many, and the situation of the deployment will affect the choice of components.\
    \ For example, your company might already use a particular component, so for familiarity\
    \ and support, you might wish to use that one.\n\nThis chapter covers some of\
    \ the technology choices for processing the data that goes into building a concrete\
    \ implementation of a collector.\n\nThe sample code is available on [GitHub](https://github.com).\
    \ You might want to clone the code into a local directory.\n\n## Data Representation\n\
    \nThe first choice of technology we need to make will determine how we represent\
    \ the data. Some of the choices are as follows:\n\n- Protocol buffers\n- Apache\
    \ Thrift\n- JSON\n- XML\n- CSV\n\nIn this implementation, we're mostly using protocol\
    \ buffers because of the ease of specifying a schema and then subsequently serializing\
    \ and deserializing it.\n\n### Protocol Buffers\n\nBefore protocol buffers were\
    \ invented, people used to store their binary data in all sorts of custom formats\
    \ that involved various syntax and specifications (like starting a file with a\
    \ magic number, followed by rules on how to parse and store various data types\
    \ like integers, strings, bytes, and floating-point numbers). Protocol buffers\
    \ unified the storage of custom binary data by allowing users to specify a schema,\
    \ or a named representation of each field and the type of each field (like `first_name`\
    \ being a string and age being an integer). This enables us to easily read and\
    \ write structured data in a binary format, and the parsing of the data is handled\
    \ automatically by the protocol buffer library.\n\nFor the file format, we're\
    \ using serialized protocol buffers that are uuencoded and written as a single\
    \ line per record and then bziped up for compression. This is just for convenience\
    \ so that we can parse the files easily without having dependencies on too many\
    \ libraries. Your company might instead store data in a data warehouse that is\
    \ accessible by SQL, for example.\n\nProtocol buffers are generally easier to\
    \ parse and handle than raw data. In our implementation, we will parse the Wikipedia\
    \ XML into protocol buffers for easier handling using `xml2proto.py`. You can\
    \ see from the code that XML parsing is a complicated affair, whereas protocol\
    \ buffer parsing is as simple as calling the `ParseFromString` method, and all\
    \ the data is then subsequently available as a convenient Python object.\n\nAs\
    \ of June 2022, the Wikipedia dump is about 20 GB in size, and converting to protocol\
    \ buffer format takes about 10 minutes. Please follow the steps described in the\
    \ README in the GitHub repo for the most up-to-date steps to run the programs.\n\
    \nIn the *proto* directory, take a look at some of the protocol messages defined.\
    \ This, for example, is how we might store the text from a Wikipedia page:\n\n\
    ```\n// Generic text document.\nmessage TextDocument {\n  // Primary entity, in\
    \ wikipedia it is the title.\n  string primary = 1;\n  // Secondary entity, in\
    \ wikipedia it is other titles.\n  repeated string secondary = 2;\n  // Raw body\
    \ tokens.\n  repeated string tokens = 3;\n  // URL. Only visible documents have\
    \ urls, some e.g. redirect shouldn't.\n  string url = 4;\n}\n```\n\nThe types\
    \ supported and the schema definitions can be found on the protocol buffer documentation\
    \ page. This schema is converted into code by using the protocol buffer compiler.\
    \ This compiler's job is to convert the schema into code that you can call in\
    \ different languages, which in our case is Python. The installation of the protocol\
    \ buffer compiler depends on the platform, and installation instructions can be\
    \ found in the [protocol buffer documentation](https://developers.google.com/protocol-buffers/docs/downloads).\n\
    \nEach time you change the schema, you will have to use the protocol buffer compiler\
    \ to get a new version of the protocol buffer code. This step can easily be automated\
    \ by using a build system like Bazel, but this is out of scope for this book.\
    \ For the purposes of this book, we will simply generate the protocol buffer code\
    \ once and check it into the repository for simplicity.\n\nFollowing the directions\
    \ on the GitHub README, download a copy of the Wikipedia dataset and then run\
    \ `xml2proto.py` to convert the data to a protocol buffer format. Optionally,\
    \ use `codex.py` to see what the protocol buffer format looks like. These steps\
    \ took 10 minutes on a Windows workstation using Windows Subsystem for Linux.\
    \ The XML parser used doesn't parallelize very well, so this step is fundamentally\
    \ serial. We'll next discuss how we would distribute the work in parallel either\
    \ among multiple cores locally or on a cluster.\n\n## Big Data Frameworks\n\n\
    The next technology we choose will process data at scale on multiple machines.\
    \ Some options are listed here:\n\n- Apache Spark\n- Apache Beam\n- Apache Flink"
  mdcn: "## 第八章\n融会贯通：数据处理与计数推荐器\n\n在讨论了推荐系统的整体框架后，本章将通过具体实现来探讨技术选择以及实际运作中的细节。\n\n\
    本章涵盖以下主题：\n\n- 使用协议缓冲区进行数据表示\n- 数据处理框架\n- PySpark 示例程序\n- GloVE 嵌入模型\n- JAX、Flax\
    \ 和 Optax 中的其他基础技术\n\n我们将逐步展示如何从下载的维基百科数据集构建一个推荐系统，该系统能够根据维基百科文章中词语的共现关系推荐相关词语。我们选择自然语言示例是因为词语易于理解，其关系也容易把握——我们可以看到相关词语在句子中往往相邻出现。此外，维基百科语料库易于下载，任何联网用户都可浏览。这种共现概念可推广至任何共现物品集合，例如在同一会话中观看视频，或在同一购物袋中购买奶酪。\n\
    \n本章将演示物品-物品和特征-物品推荐器的具体实现。此处的物品指文章中的词语，特征则是词语计数相似度——一种针对词语的 MinHash 或局部敏感哈希。第\
    \ 16 章将更详细地介绍局部敏感哈希，但目前我们将这些简单的哈希函数视为内容编码函数，使得具有相似属性的内容映射到相似的共域。这一通用概念可在缺乏日志数据时作为新语料库的热启动机制；若我们拥有用户-物品特征（如点赞），这些特征也可用于特征-物品推荐器。共现原理是相同的，但通过维基百科示例，你可以下载数据并使用提供的工具进行实践。\n\
    \n### 热启动与冷启动\n\n*冷启动*发生在我们对语料库或用户偏好一无所知时，只能采用最佳猜测方法（如推荐热门物品）。另一方面，如果物品自然形成典型分组（如杂货店奶酪货架的选择与排列），则称为热启动：利用奶酪之间或奶酪与其他物品（如萨拉米香肠）的共现信息，更智能地启动推荐引擎。\n\
    \n在维基百科示例中，即使在用户点击文章之前，我们也能仅根据词语在句子中的接近程度来热启动词-词推荐器。类似地，如果你有一批自然属于某种层级分类的物品，可以通过将同一分类分支下的物品视为相互共现来热启动推荐器。\n\
    \n## 技术栈\n\n一组共同使用的技术通常称为*技术栈*。技术栈的每个组件通常可被其他类似技术替代。我们将列出每个组件的几种替代方案，但不深入探讨其优缺点，因为可能的选择很多，且部署环境会影响组件选择。例如，你的公司可能已使用特定组件，出于熟悉度和支持考虑，你可能希望继续使用它。\n\
    \n本章涵盖处理数据以构建收集器具体实现的部分技术选择。\n\n示例代码可在 [GitHub](https://github.com) 上获取。你可能需要将代码克隆到本地目录。\n\
    \n## 数据表示\n\n我们需要做出的第一个技术选择将决定数据的表示方式。一些选择如下：\n\n- 协议缓冲区\n- Apache Thrift\n- JSON\n\
    - XML\n- CSV\n\n在本实现中，我们主要使用协议缓冲区，因为它便于定义模式，随后进行序列化和反序列化。\n\n### 协议缓冲区\n\n在协议缓冲区发明之前，人们使用各种自定义格式存储二进制数据，这些格式涉及不同的语法和规范（如以魔数开头，随后是解析和存储整数、字符串、字节、浮点数等数据类型的规则）。协议缓冲区通过允许用户定义模式（即每个字段的命名表示及其类型，如\
    \ `first_name` 为字符串，年龄为整数）统一了自定义二进制数据的存储。这使我们能够轻松地以二进制格式读写结构化数据，数据解析由协议缓冲区库自动处理。\n\
    \n对于文件格式，我们使用序列化的协议缓冲区，经 uuencode 编码后每条记录写成一行，然后用 bzip 压缩。这只是为了方便，使我们无需依赖太多库即可轻松解析文件。你的公司可能选择将数据存储在可通过\
    \ SQL 访问的数据仓库中。\n\n协议缓冲区通常比原始数据更易于解析和处理。在我们的实现中，我们将使用 `xml2proto.py` 将维基百科 XML\
    \ 解析为协议缓冲区以便处理。从代码中可以看出，XML 解析很复杂，而协议缓冲区解析只需调用 `ParseFromString` 方法，所有数据随后即可作为便捷的\
    \ Python 对象使用。\n\n截至 2022 年 6 月，维基百科转储文件大小约为 20 GB，转换为协议缓冲区格式大约需要 10 分钟。请按照 GitHub\
    \ 仓库 README 中描述的步骤操作，以获取运行程序的最新说明。\n\n在 *proto* 目录中，查看一些定义的协议消息。例如，以下是我们存储维基百科页面文本的方式：\n\
    \n```\n// 通用文本文档。\nmessage TextDocument {\n  // 主实体，在维基百科中是标题。\n  string primary\
    \ = 1;\n  // 次实体，在维基百科中是其他标题。\n  repeated string secondary = 2;\n  // 原始正文词元。\n\
    \  repeated string tokens = 3;\n  // URL。只有可见文档有 URL，例如某些重定向文档不应有。\n  string url\
    \ = 4;\n}\n```\n\n支持的类型和模式定义可在协议缓冲区文档页面找到。此模式通过协议缓冲区编译器转换为代码。该编译器的任务是将模式转换为可在不同语言中调用的代码，在我们的案例中是\
    \ Python。协议缓冲区编译器的安装取决于平台，安装说明可在[协议缓冲区文档](https://developers.google.com/protocol-buffers/docs/downloads)中找到。\n\
    \n每次更改模式后，你都必须使用协议缓冲区编译器获取新版本的协议缓冲区代码。此步骤可通过 Bazel 等构建系统轻松自动化，但这超出了本书范围。为简化起见，本书中我们只需生成一次协议缓冲区代码并将其检入仓库。\n\
    \n按照 GitHub README 中的说明，下载维基百科数据集副本，然后运行 `xml2proto.py` 将数据转换为协议缓冲区格式。可选地，使用 `codex.py`\
    \ 查看协议缓冲区格式的样子。这些步骤在使用 Windows Subsystem for Linux 的 Windows 工作站上耗时 10 分钟。所使用的\
    \ XML 解析器并行化效果不佳，因此此步骤本质上是串行的。接下来我们将讨论如何在多核本地环境或集群中并行分配工作。\n\n## 大数据框架\n\n我们选择的下一个技术将在多台机器上大规模处理数据。以下是一些选项：\n\
    \n- Apache Spark\n- Apache Beam\n- Apache Flink"

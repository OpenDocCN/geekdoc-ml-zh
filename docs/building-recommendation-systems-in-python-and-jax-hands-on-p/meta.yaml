  - '[PAGE 294]


    One simple approach to improve diversity metrics is *reranking*: a post-processing
    step in which the initially retrieved recommendation list is reordered to enhance
    diversity. Various algorithms for re-ranking consider not just the relevance scores
    but also the dissimilarity among the items in the recommendation list. Re-ranking
    is a strategy that can operationalize any external loss function, so using it
    for diversity is a straightforward approach.


    Another strategy is to break out of the closed loop of recommendation feedback
    that we discussed in the section “Propensity Weighting for Recommendation System
    Evaluation” on page 208. As in multiarmed bandit problems, *explore-exploit trade-offs*
    can choose between exploiting what the model knows the user will like and exploring
    less certain options that may yield higher rewards. This trade-off can be used
    in recommendation systems to ensure diversity by occasionally choosing to *explore*
    and recommend less obvious choices. To implement a system like this, we can use
    affinity as a reward estimate and propensity as an exploitation measure.


    Instead of using these posterior strategies, an alternative is to *incorporate
    diversity as an objective in the learning process* or include a diversity regularization
    term in the loss function. Multiobjective loss including pairwise similarity as
    a regularizer can help train the model to learn diverse sets of recommendations.
    You previously saw that kinds of regularization can coach the training process
    to minimize certain behaviors. One regularization term that can be used explicitly
    is *similarity among recommendations*; the dot product of each embedding vector
    in the recommendations to each other can approximate this self-similarity. Let
    $\mathscr{R} = (R_1, R_2, ..., R_k)$ be the list of embeddings for the recommendations,
    and then consider $\mathscr{R}$ as a column matrix—with each row a recommendation.
    Calculating $\mathscr{R}$''s Gramian would yield all our dot-product similarity
    calculations, and thus we can regularize by this term with appropriate hyperparameter
    weighting. Note that this differs from our previous Gramian regularization because
    we''re considering the recommendations for only an individual query in this case.


    Finally, we can use rankings from multiple domains to boost recommendation diversity.
    By integrating various ranking measures, the recommendation system can suggest
    items from outside the user''s “mode,” thus broadening the range of recommendations.
    A vibrant discipline exists around multimodal recommendations, with the PinnerSage
    paper from Pinterest a particularly impressive implementation. In many of the
    works about multimodal recommendations, the retrieval step returns too many recommendations
    near to the user''s query vector. This forces self-similarity among the retrieved
    list. Multimodality forces multiple query vectors to be used for each request,
    allowing a built-in diversity.


    Let''s look at another perspective on item self-similarity and think about how
    the pairwise relationships between items can be used to this end.'
  - '[PAGE 295]


    # Applying Portfolio Optimization


    *Portfolio optimization*, a concept borrowed from finance, can be an effective
    approach to enhance diversity in recommendation systems. The goal here is to create
    a “portfolio” of recommended items that balances the two key parameters: relevance
    and diversity.


    At its heart, portfolio optimization is about risk (in our case, relevance) and
    return (diversity). Here’s a basic approach for applying this optimization to
    recommendation systems:


    +   1. Formulate an item representation such that the distance in the space is
    a good measure of similarity. This is in line with our previous discussions about
    what makes a good latent space.

    2. Calculate pairwise distance between items. You can do this by using whatever
    distance metric that enriches your latent space. It is important to calculate
    these pairwise distances across all items retrieved and be ready for consideration
    to return. Note that how you aggregate these distributions of distances can be
    nuanced.

    3. Evaluate affinity for the retrieved set. Note that calibrated affinity scores
    will perform better as they provide a more realistic estimate of return.

    4. Solve the optimization problem. Solving the problem will yield a weight for
    each item that balances the trade-off between relevance and diversity. Items with
    higher weights are more valuable in terms of both diversity and relevance, and
    they should be prioritized in the recommendation list. Mathematically, the problem
    looks like this:


    > $Maximize(w^T * r - \lambda * w^T * C * w)$


    Here, $w$ is a vector representing the weights (i.e., the proportion of each item
    in the recommendation list), $r$ is the relevance score vector, $C$ is the covariance
    matrix (which captures the diversity), and $\lambda$ is a parameter to balance
    relevance and diversity. The constraint here is that the sum of the weights equals
    1.


    Remember, the hyperparameter $\lambda$ trades off between relevance and diversity.
    This makes it a critical part of this process and may require experimentation
    or tuning based on the specific needs of your system and its users. This would
    be straightforward via hyperparameter optimization in one of many packages such
    as Weights & Biases.'
  - '[PAGE 296]


    # Multiobjective Functions


    Another related approach to diversity is to rank based on a multiobjective loss.
    Instead of the ranking stage being purely personalization affinity, introducing
    a second (or more!) ranking term can dramatically improve diversity.


    The simplest approach here is something similar to what you learned in Chapter
    14: hard ranking. A business rule that may apply to diversity is limiting each
    item category to only one item. This is the simplest case of multiobjective ranking
    because sorting by a categorical column and selecting the max in each group will
    achieve explicit diversity with respect to that covariate. Let’s move on to something
    more subtle.


    In “Stitching Together Spaces for Query-Based Recommendations”, one of this book’s
    authors worked with coauthor Ian Horn to implement a multiobjective recommendation
    system that balanced both personalization and relevance to an image-retrieval
    problem.


    The goal was to provide personalized recommendations for clothing that were similar
    to clothes in an image the user uploaded. This means there are two latent spaces:


    +   - The latent space of personalized clothes to a user

    - The latent space of images of clothing


    To solve this problem, we first had to make a decision: what was more important
    for relevance? Personalization or image similarity? Because the product was centered
    around a photo-upload experience, we chose image similarity. However, we had another
    fact to consider: each uploaded image contained several pieces of clothing. As
    is popular in computer vision, we first segmented the model into several items
    and then treated each item as its own query (which we called anchor-items). This
    meant our image-similarity retrieval was multimodal, as we searched with several
    different query vectors. After we gathered them all, we had to make one final
    ranking—a multiobjective ranking for image similarity and personalization. The
    loss function we optimized is shown here:


    ```

    $s_i = \alpha \times (1 - d_i) + (1 - \alpha) \times a_i$

    ```


    The $\alpha$ is a hyperparameter that represents the weighting, $d_i$ is the image
    distance, and $a_i$ is the personalization. We learn $\alpha$ experimentally.
    The last step was to impose some hard ranking to ensure that one recommendation
    came from each anchor.'
  - '[PAGE 297]


    So let’s sum this up:


    +   1. We used two latent spaces with distances to provide rankings.

    2. We did multimodal retrieval via image segmentation.

    3. We retrieved using only one of the rankings.

    4. Our final ranking was multiobjective, with hard ranking utilizing all our latent
    spaces and business logic.


    This allowed our recommendations to be *diverse* in the sense that they achieved
    relevance in several areas of the query that corresponded to different items.


    # Predicate Pushdown


    You may be happy and comfortable applying these metrics during serving—after all,
    that’s the title for this part of the book—but before we move on from this topic,
    we should talk about an edge case that can have quite disastrous consequences.
    When you impose the hard rules from Chapter 14 and the diversity expectations
    discussed earlier in this chapter, and do a little multiobjective ranking, sometimes
    you arrive at…no recommendations.


    Say you start by retrieving *k* items, but after the sufficiently diverse combinations
    that also satisfy business rules, there’s simply nothing left. You might say,
    “I’ll just retrieve more items; let’s crank up *k*!” But this has some serious
    issues: it can really increase latency, depress match quality, and throw off your
    ranking model that is more tuned to lower-cardinality sets.


    A common experience, especially with diversity, is that different modes for the
    retrieval have vastly different match scores. To take an example from our fashion
    recommender world: all jeans might be a better match than any shirt we have, but
    if you’re looking for diverse categories of clothes to recommend, no matter how
    big the *k*, you’ll potentially be missing out on shirts.


    One solution to this problem is *predicate pushdown*. This optimization technique
    is used in databases, specifically in the context of data retrieval. The main
    idea of predicate pushdown is to filter data as early as possible in the data-retrieval
    process, to reduce the amount of data that needs to be processed later in the
    query execution plan.


    For traditional databases, you see predicate pushdown applied, for example, as
    “apply my query’s `where` clause in the database to cut down on I/O.” It may achieve
    this by explicitly pulling the relevant columns to check the `where` clause first,
    and then getting the row IDs from those that pass before executing the rest of
    the query.'
- md: 'How does this help us in our case? The simple idea is if your vector store
    also has features for the vectors, you can include the feature comparisons as
    part of retrieval. Let’s take an overly simple example: assume your items have
    a categorical feature called color, and for good diverse recommendations you want
    a nice set of at least three colors in your five recommendations. To achieve this,
    you can do a top-$k$ search across each of the colors in your store (the downside
    is that your retrieval is $C$ times as large, where $C$ is the number of colors
    that exist) and then do ranking and diversity on the union of these sets. This
    has a much higher likelihood of surviving your diversity rule in the eventual
    recommendations. This is great! We expect that latency is relatively low in retrieval,
    so this tax of extra retrievals isn’t bad if we know where to look.


    This optimization technique can be applied on quite complicated predicates if
    your vector store is set up well for the kinds of filters you wish to impose.


    ## Fairness


    Fairness in ML in general is a particularly nuanced subject that is ill-served
    by short summaries. The following topics are important, and we invite you to consider
    the robust references included here:


    *Nudging*

    Fairness does not need to be only “equal probabilities for all outcomes”; it can
    be fair with respect to a specific covariate. Nudging via a recommender—i.e.,
    recommending items to emphasize certain behavior or buying patterns—can increase
    fairness. Consider the work by Karlijn Dinnissen and Christine Bauer from Spotify
    about [using nudging to improve gender representation in music recommendations](https://dl.acm.org/doi/10.1145/3460231.3474244).


    *Filter bubbles*

    Filter bubbles are a downside of extreme collaborative filtering: a group of users
    begin liking similar recommendations, the system learns that they should receive
    similar recommendations, and the feedback loop perpetuates this. For a deep look
    into not only the concept but also mitigation strategies, consider [“Mitigating
    the Filter Bubble While Maintaining Relevance”](https://dl.acm.org/doi/10.1145/3460231.3474244)
    by Zhaolin Gao et al.


    *High risk*

    Not all applications of AI are equal in risk. Some domains are particularly harmful
    when AI systems are poorly guardrailed. For a general overview of the most high-risk
    circumstances and mitigation, consult *Machine Learning for High-Risk Applications*
    by Patrick Hall et al. (O’Reilly).


    *Trustworthiness*

    Explainable models is a popular mitigation strategy for risky applications of
    AI. While explainability does not *solve* the problem, it frequently provides
    a path toward identification and resolution. For a deep dive on this, *Practicing
    Trustworthy Machine Learning* by Yada Pruksachatkun et al. (O’Reilly) provides
    tools and techniques.


    *Fairness in recommendations*

    Because recommendation systems are so obviously susceptible to issues of AI fairness,
    much has been written on the topic. Each of the major social media giants has
    employed teams working in AI safety. One particular highlight is the Twitter Responsible
    AI team led by Rumman Chowdhury. You can read about the team’s work in “Can Auditing
    Eliminate Bias from Algorithms?” by Alfred Ng.


    ## Summary


    While these techniques provide pathways to enhance diversity, it’s important to
    remember to strike a balance between diversity and relevance. The exact method
    or combination of methods used may vary depending on the specific use case, the
    available data, the intricacies of the user base, and the kind of feedback you’re
    collecting. As you implement recommendation systems, think about which aspects
    are the most key in your diversity problem.


    # CHAPTER 16


    ## Acceleration Structures


    So what are acceleration structures? In computer science terminology, when you
    try to rank every item in a corpus one by one, the typical amount of time it would
    take if there are $N$ items is proportional to $N$. This is called big $O$ notation.
    So if you have a user vector and you have a corpus of $N$ items, it would take
    typically $O(N)$ time to score all the items in the corpus for one user. This
    is usually tractable if $N$ is small and can fit into GPU RAM, typically $N <
    1$ million items or so. However, if we have a very large corpus of, say, a billion
    items, it might take a very long time if we also have to make recommendations
    for a billion users. Then in big $O$ notation it would be $O(10^{18})$ dot products
    to score a billion items for each and every one of a billion users.


    In this chapter, we will try to reduce the $O(N * M)$ time to something sublinear
    in the number of items $N$ and the number of users $M$. We will discuss strategies
    including the following:


    - Sharding

    - Locality sensitive hashing

    - $k$-d Trees

    - Hierarchical k-means

    - Cheaper retrieval methods


    We''ll also cover the trade-offs related to each strategy and what they could
    be used for. For all the following examples, we assume that the user and items
    are represented by embedding vectors of the same size and that the affinity between
    the user and items is a simple dot product, cosine distance, or Euclidean distance.
    If we were to use a neural network like a two-tower model to score the user and
    item, then possibly the only method that could be used to speed things up would
    be sharding or some kind of cheaper pre-filtering method.


    ## Sharding


    *Sharding* is probably the simplest strategy to **divide and conquer**. Suppose
    you have *k* machines, *N* items, and *M* users. Using a sharding strategy, you
    can reduce the runtime to *O(N * M / k)*. You can do this by assigning each item
    a unique identifier, so you have tuples of (*unique_id*, *item_vector*). Then,
    by simply taking *machine_id* = *unique_id* % *K*, we can assign a subset of the
    corpus to a different machine.


    When a user needs a recommendation, we can then compute the top-scoring recommendations
    either ahead of time or on demand by distributing the workload onto *k* machines,
    thus making the computation *k* times faster, except for the overhead in gathering
    the top results on the server and ordering them jointly. Note that if you want,
    say, 100 top-scoring items, you would still have to obtain the top 100 results
    from each shard, collate them together, and then sort all the results jointly
    if you want to have the same results as in a brute-force method of scoring the
    entire corpus.


    Sharding is useful in the sense that it can be combined with any of the other
    acceleration methods and is not dependent on the representation having any specific
    form, such as being a single vector.


    ## Locality Sensitive Hashing


    *Locality sensitive hashing* (LSH) is an interesting technique that converts a
    vector into a token-based representation. This is powerful because if CPUs are
    readily available, we can use them to compute the similarity between vectors by
    using cheaper integer arithmetic operations such as XOR and bit counting with
    specialized assembly instructions rather than floating-point operations. Integer
    operations tend to be much faster on CPUs than floating-point operations, so we
    can compute similarity between items much faster than using vector operations.


    The other benefit is that once items are represented as a series of tokens, a
    regular search engine database would be able to store and retrieve these items
    by using token matching. Regular hashing, on the other hand, tends to result in
    vastly different hash codes if a slight change occurs in the input. This is not
    a criticism of the hash functions; they just have different uses for different
    kinds of data.


    Let''s walk through a couple of ways to convert a vector into a hash. LSH is different
    from regular hashing in that small perturbations to a vector should result in
    the same hash bits as the hash of the original vector. This is an important property
    as it allows us to look up the neighborhood of a vector by using fast methods
    such as hash maps. One simple hashing method is called **the Power of Comparative
    Reasoning**.'
  mdcn: '这对我们的情况有何帮助？简单的思路是，如果你的向量存储也为向量提供了特征，那么你可以将特征比较作为检索的一部分。让我们举一个过于简单的例子：假设你的项目有一个名为“颜色”的分类特征，并且为了获得良好的多样化推荐，你希望在五个推荐中至少包含三种不同的颜色。为了实现这一点，你可以对存储中的每种颜色进行一次
    top-$k$ 搜索（缺点是你的检索量会增加 $C$ 倍，其中 $C$ 是存在的颜色数量），然后对这些集合的并集进行排序和多样性处理。这样，最终推荐结果更有可能满足你的多样性规则。这很棒！我们预计检索的延迟相对较低，因此如果我们知道去哪里查找，这种额外检索的开销并不大。


    如果你的向量存储针对你希望施加的过滤器类型设置得当，这种优化技术可以应用于相当复杂的谓词。


    ## 公平性


    机器学习中的公平性通常是一个特别微妙的主题，简短的摘要难以充分阐述。以下主题很重要，我们邀请您参考此处包含的可靠文献：


    *助推*

    公平性不必仅仅是“所有结果的等概率”；它可以针对特定的协变量是公平的。通过推荐器进行助推——即推荐物品以强调某些行为或购买模式——可以提高公平性。请参考 Karlijn
    Dinnissen 和 Christine Bauer 在 Spotify 的工作：[使用助推改善音乐推荐中的性别代表性](https://dl.acm.org/doi/10.1145/3460231.3474244)。


    *过滤气泡*

    过滤气泡是极端协同过滤的一个缺点：一群用户开始喜欢相似的推荐，系统学习到他们应该收到相似的推荐，反馈循环使这种情况持续下去。要深入了解这个概念以及缓解策略，请参考
    Zhaolin Gao 等人的[“在保持相关性的同时缓解过滤气泡”](https://dl.acm.org/doi/10.1145/3460231.3474244)。


    *高风险*

    并非所有人工智能应用的风险都相同。当人工智能系统缺乏适当的防护时，某些领域尤其有害。要了解最高风险情况和缓解措施的概述，请参阅 Patrick Hall 等人的
    *Machine Learning for High-Risk Applications*（O’Reilly）。


    *可信度*

    可解释模型是应对高风险人工智能应用的流行缓解策略。虽然可解释性并不能*解决*问题，但它通常为识别和解决问题提供了一条途径。要深入了解这一点，Yada Pruksachatkun
    等人的 *Practicing Trustworthy Machine Learning*（O’Reilly）提供了工具和技术。


    *推荐中的公平性*

    由于推荐系统显然容易受到人工智能公平性问题的影响，因此关于这个主题已有大量著述。每家主要的社交媒体巨头都雇佣了从事人工智能安全工作的团队。一个特别突出的例子是由
    Rumman Chowdhury 领导的 Twitter 负责任人工智能团队。你可以在 Alfred Ng 的“审计能否消除算法中的偏见？”一文中阅读关于该团队工作的内容。


    ## 总结


    虽然这些技术提供了增强多样性的途径，但重要的是要记住在多样性和相关性之间取得平衡。使用的确切方法或方法组合可能因具体用例、可用数据、用户群的复杂性以及你正在收集的反馈类型而异。在实施推荐系统时，请思考在你的多样性问题中哪些方面最为关键。


    # 第 16 章


    ## 加速结构


    那么什么是加速结构？用计算机科学术语来说，当你试图逐一评估语料库中的每个项目时，如果有 $N$ 个项目，典型所需时间与 $N$ 成正比。这被称为大 $O$
    表示法。因此，如果你有一个用户向量和一个包含 $N$ 个项目的语料库，为一个用户对语料库中的所有项目进行评分通常需要 $O(N)$ 时间。如果 $N$ 较小且可以放入
    GPU 内存（通常 $N < 100$ 万个项目左右），这通常是可处理的。然而，如果我们有一个非常大的语料库，比如十亿个项目，并且我们还需要为十亿用户进行推荐，那么可能需要非常长的时间。那么用大
    $O$ 表示法，为十亿用户中的每一个对十亿个项目进行评分将需要 $O(10^{18})$ 次点积运算。


    在本章中，我们将尝试将 $O(N * M)$ 时间减少到与项目数量 $N$ 和用户数量 $M$ 呈次线性关系。我们将讨论包括以下内容的策略：


    - 分片

    - 局部敏感哈希

    - $k$-d 树

    - 层次 k-means

    - 更廉价的检索方法


    我们还将介绍每种策略的权衡及其可能的用途。对于以下所有示例，我们假设用户和项目由相同大小的嵌入向量表示，并且用户与项目之间的亲和度是简单的点积、余弦距离或欧几里得距离。如果我们使用像双塔模型这样的神经网络来为用户和项目评分，那么可能唯一能用来加速的方法是分片或某种更廉价的预过滤方法。


    ## 分片


    *分片*可能是最简单的**分而治之**策略。假设你有 *k* 台机器、*N* 个项目和 *M* 个用户。使用分片策略，你可以将运行时间减少到 *O(N *
    M / k)*。你可以通过为每个项目分配一个唯一标识符来实现这一点，这样你就有了 (*unique_id*, *item_vector*) 元组。然后，只需取
    *machine_id* = *unique_id* % *K*，我们就可以将语料库的一个子集分配给不同的机器。


    当用户需要推荐时，我们可以通过将工作负载分配到 *k* 台机器上，提前计算或按需计算得分最高的推荐，从而使计算速度提高 *k* 倍，除了在服务器上收集顶部结果并共同排序的开销。请注意，如果你想要，比如
    100 个得分最高的项目，你仍然需要从每个分片中获取前 100 个结果，将它们整理在一起，然后如果你想获得与对整个语料库进行暴力评分相同的结果，就需要对所有结果进行联合排序。


    分片的有用之处在于它可以与任何其他加速方法结合使用，并且不依赖于表示形式具有任何特定形式，例如是单个向量。


    ## 局部敏感哈希


    *局部敏感哈希*（LSH）是一种有趣的技术，它将向量转换为基于令牌的表示。这很强大，因为如果 CPU 容易获得，我们可以使用它们通过更廉价的整数算术运算（如
    XOR 和使用专用汇编指令的位计数）而不是浮点运算来计算向量之间的相似性。整数运算在 CPU 上通常比浮点运算快得多，因此我们可以比使用向量运算更快地计算项目之间的相似性。


    另一个好处是，一旦项目被表示为一系列令牌，常规搜索引擎数据库就能够通过使用令牌匹配来存储和检索这些项目。另一方面，常规哈希如果输入发生微小变化，往往会导致完全不同的哈希码。这不是对哈希函数的批评；它们只是对不同类型的数据有不同的用途。


    让我们来看几种将向量转换为哈希的方法。LSH 与常规哈希的不同之处在于，向量的微小扰动应该产生与原始向量哈希相同的哈希位。这是一个重要的属性，因为它允许我们使用快速方法（如哈希映射）来查找向量的邻域。一种简单的哈希方法称为**比较推理的力量**。'

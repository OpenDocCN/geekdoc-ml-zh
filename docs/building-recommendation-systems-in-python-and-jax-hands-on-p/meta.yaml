- md: '## Hierarchical k-means


    Another divide-and-conquer strategy that does scale to higher feature dimensions
    is *k-means clustering*. In this scheme, the corpus is clustered into $k$ clusters
    and then recursively clustered into $k$ more clusters until each cluster is smaller
    than a defined limit.


    An implementation of $k$-means can be found at [scikit-learn''s web page](https://scikit-learn.org/).

    To build the clustering, first create cluster centroids at random from existing
    points (Figure 16-4).


    ![](img/da17d05291861831978609329c481581_307_0.png)


    Next, we assign all points to the cluster they are closest to. Then for each cluster,
    we take the average of all the assigned points as the new cluster center. We repeat
    until done, which can be a fixed number of steps. Figure 16-5 illustrates this
    process. The output is then $k$ cluster centers of points. The process can be
    repeated again for each cluster center, splitting again into $k$ more clusters.


    ![](img/da17d05291861831978609329c481581_308_0.png)


    Figure 16-5. *k*-means clustering


    Again, the speedup is *O*(log(*n*)) in the number of items, but *k*-means is better
    adapted to clustering higher-dimensional data points than *k*-d trees.


    The querying for a *k*-means cluster is rather straightforward. You can find the
    closest cluster to the query point and then repeat the process for all subclusters
    until a leaf node is found; then all the items in the leaf node are scored against
    the query point.


    An alternative to *k*-means is to perform SVD and use the first *k* eigenvectors
    as the clustering criteria. The use of SVD is interesting in that there exists
    closed form and approximate methods like [power iteration](https://example.com)
    for computing the eigenvectors. Using the dot product to compute affinity might
    be better suited to vectors trained using the dot product as the affinity metric.


    To learn more on this topic, you can consult "[Label Partitioning for Sublinear
    Ranking](https://example.com)" by Jason Weston et al. (including one of this book’s
    authors). The paper compares LSH, SVD, and hierarchical *k*-means. You’ll find
    a comparison of the speedup and the loss in retrieval, with the brute-force as
    a baseline.


    ![](img/da17d05291861831978609329c481581_308_1.png)


    ## Graph-Based ANN


    An emerging trend in ANNs is using graph-based methods. Lately, *hierarchical
    navigable small worlds* is a particularly popular approach. This [graph algorithm](https://example.com)
    encodes proximity in multilayer structures and then relies on the common maxim
    that “the number of connectivity steps from one node to another is often surprisingly
    small.” In graph-based ANN methods, you often find one neighbor, and then traverse
    the edges connected to that neighbor to rapidly find others.


    ## Cheaper Retrieval Methods


    If your corpus has the ability to do an item-wise cheap retrieval method, one
    way to speed up searches is to use the cheap retrieval method to obtain a small
    subset of items and then use the more expensive vector-based methods to rank the
    subset. One such cheap retrieval method is to make a posting list of the top co-occurrences
    of one item with another. Then when it comes to generating the candidates for
    ranking, gather all the top co-occurring items together (from a user’s preferred
    items, for example) and then score them together with the ML model. In this way,
    we do not have to score the entire corpus with the ML model but just a small subset.


    ## Summary


    In this chapter, we showed a few ways to speed up the retrieval and scoring of
    items in a corpus, given a query vector, without losing too much in terms of recall
    and while still maintaining precision. No ANN method is perfect, as the acceleration
    structures depend on the distribution of the data, and this varies from dataset
    to dataset. We hope that this chapter provides a launching pad for you to explore
    various ways to make retrieval faster and sublinear in the number of items in
    the corpus.


    # PART V


    ## The Future of Recs


    *I''m hungry for more. What are companies doing in Prod?*


    We''ve come so far, but there''s so much more! RecSys moves fast, and it''s worth
    knowing the concepts you''ll see at next year''s conferences. These ideas are
    already proven to some extent—none of them are pure science fiction—but they haven''t
    settled into their final forms yet.


    Before we get into these few very modern ideas, it''s also worth noting all the
    topics we haven''t covered in this book. Our most heinous omissions are probably
    reinforcement learning techniques and ideas related to conformal methods. Both
    are deeply important aspects of recommendation systems, but both also require
    a significantly different background and treatment, and thus are ill-suited to
    fit into the structure here. Additionally, neither is well introduced to the JAX
    ecosystem, and thus they are a much harder lift to scaffold.


    When your scale is big enough, and the previous chapters are no longer buttering
    your toast, the following chapters will show you how to level up. At the time
    of writing, all these methods are in production at Fortune 500 companies valued
    at more than $10 billion. Learn these concepts and then go build the next TikTok.


    # CHAPTER 17


    ## Sequential Recommenders


    In our journey so far, you’ve learned about a variety of features that appear
    as explicit or as latent components in the recommendation problem. One kind of
    feature, which has appeared implicitly, is the history of previous recommendations
    and interactions. You may wish to protest here: “All of the work we’ve done so
    far considers the previous recommendations and interactions! We’ve even learned
    about prequential training data.”


    That is true, but it fails to account for more explicit relationships between
    the *sequence of recommendations leading up to the inference request*. Let’s look
    at an example to distinguish the two. Your video-streaming website knows that
    you’ve previously seen all of Darren Aronofsky’s films, so when *The Whale* is
    released, the website is very likely to recommend it. But this type of recommendation
    is different from one you might receive after finishing episode 10 of *Succession*.
    You may have been watching Aronofsky films over a long time period—*Pi* many years
    ago and *Black Swan* earlier this year. But you have been watching an episode
    of *Succession* each night this week, and your entire recent history is made up
    of Logan Roy. This latter example is a sequential recommendation problem: using
    the most recent ordered list of interactions to predict what you’ll enjoy next.


    In terms of the modeling objective, the recommenders we’ve seen use pairwise relationships
    between potential recommendations and historical interactions. Sequential recommendation
    aims to predict users’ next actions based on the sequential interactions in the
    past that may be of much higher *order*—i.e., combinations of interactions among
    three or more items. Most sequential recommendation models involve sequential
    data-mining techniques such as Markov chains, recurrent neural networks (RNNs),
    and self-attention. These models usually take into consideration short-term user
    behavior and are less sensitive, even oblivious, to the global user preferences
    that have stabilized over time.


    Initial work in sequential recommendations focused on modeling the transitions
    between successive items. These used Markov chains and translation-based methods.
    As deep learning methods showed more and more promise in modeling sequential data—such
    as their biggest success in NLP—there have been many attempts to use neural network
    architectures to model sequential dynamics of a user’s interaction history. Early
    successes in this direction include GRU4Rec using an RNN to model users’ sequential
    interactions. Recently, transformer architectures have demonstrated superior performance
    for sequential data modeling. The transformer architecture lends itself to efficient
    parallelization and is effective at modeling long-range sequences.


    ## Markov Chains


    Despite mining for relationships to historical recommendations, the models we’ve
    been considering often fail to capture sequential patterns in user behavior, thereby
    disregarding the chronological order of user interactions. To address this shortcoming,
    sequential recommender systems were developed, incorporating techniques like Markov
    chains to model the temporal dependencies between items.


    A *Markov chain* is a stochastic model that operates on the principle of *memorylessness*.
    It models the probability of transitioning from one state to another—given the
    current state—without considering the sequence of preceding events. Markov chains
    model the sequential behavior of users by considering each state as an item, and
    the transition probabilities as the likelihood of a user interacting with a certain
    item after the current one.


    The first-order Markov chain, in which the future state depends solely on the
    current state, was a common strategy in early sequential recommenders. Despite
    its simplicity, the first-order Markov chain is effective in capturing short-term,
    item-to-item transition patterns, improving the quality of recommendations over
    nonsequential methods.


    Take, for example, our preceding *Succession* example. If you’re using only a
    first-order Markov chain, a really great heuristic would be “What is the next
    episode in the series, if it’s a series; otherwise, fall back on a collaborative
    filtering (CF) model.” You can see that for a huge percentage of watch hours,
    this naive first-order chain would simply tell the user to watch the next episode
    of a show. Not particularly enlightening, but a good sign. When you abstract this
    out further, you start to get more powerful methods.


    The first-order assumption does not always hold in real-world applications, as
    user behavior is often influenced by a longer history of interactions. To overcome
    this limitation, higher-order Markov chains look further back: the next state
    is determined by a set of previous states, providing a richer model of user behavior.
    Nevertheless, it’s'
  mdcn: '## 层次化k-means


    另一种可扩展到更高特征维度的分治策略是*k-means聚类*。在此方案中，语料库被聚类为$k$个簇，然后递归地聚类为$k$个更多的簇，直到每个簇小于定义的限制。


    $k$-means的一个实现可以在[scikit-learn的网页](https://scikit-learn.org/)上找到。

    要构建聚类，首先从现有点中随机创建簇质心（图16-4）。


    ![](img/da17d05291861831978609329c481581_307_0.png)


    接下来，我们将所有点分配给它们最近的簇。然后对于每个簇，我们将所有分配点的平均值作为新的簇中心。我们重复此过程直到完成，这可以是固定的步数。图16-5说明了这个过程。输出是$k$个点的簇中心。该过程可以对每个簇中心再次重复，再次分裂为$k$个更多的簇。


    ![](img/da17d05291861831978609329c481581_308_0.png)


    图16-5. *k*-means聚类


    同样，加速比是*O*(log(*n*))，其中*n*是项目数量，但*k*-means比*k*-d树更适合聚类高维数据点。


    *k*-means簇的查询相当直接。你可以找到离查询点最近的簇，然后对所有子簇重复此过程，直到找到叶节点；然后叶节点中的所有项目都会根据查询点进行评分。


    *k*-means的一个替代方案是执行SVD并使用前*k*个特征向量作为聚类标准。SVD的使用很有趣，因为存在闭式和近似方法，如[幂迭代](https://example.com)来计算特征向量。使用点积计算亲和力可能更适合使用点积作为亲和力度量训练的向量。


    要了解更多关于此主题的信息，你可以参考Jason Weston等人（包括本书的一位作者）的"[Label Partitioning for Sublinear
    Ranking](https://example.com)"。该论文比较了LSH、SVD和层次化*k*-means。你会发现加速比和检索损失的比较，以暴力搜索为基线。


    ![](img/da17d05291861831978609329c481581_308_1.png)


    ## 基于图的ANN


    ANN中的一个新兴趋势是使用基于图的方法。最近，*层次化可导航小世界*是一种特别流行的方法。这种[图算法](https://example.com)在多层结构中编码邻近性，然后依赖于一个常见的格言：“从一个节点到另一个节点的连接步骤数量通常出奇地小。”在基于图的ANN方法中，你通常找到一个邻居，然后遍历连接到该邻居的边以快速找到其他邻居。


    ## 更便宜的检索方法


    如果你的语料库能够执行逐项的廉价检索方法，一种加速搜索的方法是使用廉价检索方法获取一小部分项目，然后使用更昂贵的基于向量的方法对子集进行排序。一种这样的廉价检索方法是制作一个项目与另一个项目共同出现的顶级倒排列表。然后，在生成排序候选时，收集所有顶级共同出现的项目（例如，从用户的偏好项目中），然后与ML模型一起对它们进行评分。这样，我们不必用ML模型对整个语料库进行评分，而只需对一小部分进行评分。


    ## 总结


    在本章中，我们展示了几种在给定查询向量的情况下加速语料库中项目检索和评分的方法，同时不会在召回率方面损失太多，并且仍然保持精度。没有完美的ANN方法，因为加速结构依赖于数据的分布，而数据分布因数据集而异。我们希望本章为你提供一个跳板，让你探索各种方法，使检索更快，并且在语料库中的项目数量上实现亚线性。


    # 第五部分


    ## 推荐的未来


    *我渴望了解更多。公司在生产环境中做了什么？*


    我们已经走了这么远，但还有更多！推荐系统发展迅速，了解明年会议上你将看到的概念是值得的。这些想法在某种程度上已经被证明——它们都不是纯粹的科幻小说——但它们还没有定型。


    在我们深入探讨这几个非常现代的想法之前，也值得指出我们在本书中没有涵盖的所有主题。我们最严重的遗漏可能是强化学习技术和与保形方法相关的想法。两者都是推荐系统的重要方面，但两者也需要显著不同的背景和处理方式，因此不适合融入这里的结构。此外，两者都没有很好地引入JAX生态系统，因此它们更难搭建。


    当你的规模足够大，前面的章节不再能满足你的需求时，后面的章节将向你展示如何提升。在撰写本文时，所有这些方法都在财富500强公司中投入生产，这些公司的估值超过100亿美元。学习这些概念，然后去构建下一个TikTok。


    # 第17章


    ## 序列推荐器


    到目前为止，在我们的旅程中，你已经了解了作为推荐问题中显式或潜在组件出现的各种特征。一种隐式出现的特征是先前推荐和交互的历史。你可能想在这里抗议：“我们到目前为止所做的所有工作都考虑了先前的推荐和交互！我们甚至学习了预序列训练数据。”


    这是事实，但它没有考虑到*导致推理请求的推荐序列*之间更明确的关系。让我们看一个例子来区分两者。你的视频流媒体网站知道你之前看过达伦·阿罗诺夫斯基的所有电影，所以当*鲸鱼*上映时，网站很可能会推荐它。但这种类型的推荐不同于你在看完*继承*第10集后可能收到的推荐。你可能在很长一段时间内一直在看阿罗诺夫斯基的电影——多年前的*π*和今年早些时候的*黑天鹅*。但你本周每晚都在看一集*继承*，你最近的整个历史都是由Logan
    Roy组成的。后一个例子是一个序列推荐问题：使用最近的有序交互列表来预测你接下来会喜欢什么。


    就建模目标而言，我们见过的推荐器使用潜在推荐和历史交互之间的成对关系。序列推荐旨在根据过去可能具有更高*阶*的序列交互来预测用户的下一个动作——即三个或更多项目之间的交互组合。大多数序列推荐模型涉及序列数据挖掘技术，如马尔可夫链、循环神经网络（RNN）和自注意力。这些模型通常考虑短期用户行为，对随时间稳定下来的全局用户偏好不太敏感，甚至完全忽略。


    序列推荐的早期工作集中在建模连续项目之间的转换。这些使用了马尔可夫链和基于翻译的方法。随着深度学习方法在建模序列数据方面显示出越来越多的前景——例如它们在NLP中的最大成功——已经有许多尝试使用神经网络架构来建模用户交互历史的序列动态。这方面的早期成功包括使用RNN建模用户序列交互的GRU4Rec。最近，transformer架构在序列数据建模方面表现出卓越的性能。transformer架构有利于高效的并行化，并且在建模长程序列方面非常有效。


    ## 马尔可夫链


    尽管挖掘与历史推荐的关系，我们一直在考虑的模型通常无法捕捉用户行为中的序列模式，从而忽略了用户交互的时间顺序。为了解决这个缺点，开发了序列推荐系统，结合了马尔可夫链等技术来建模项目之间的时间依赖性。


    *马尔可夫链*是一种基于*无记忆性*原理运行的随机模型。它建模从一个状态转换到另一个状态的概率——给定当前状态——而不考虑前面事件的序列。马尔可夫链通过将每个状态视为一个项目，将转换概率视为用户在当前项目之后与某个项目交互的可能性，来建模用户的序列行为。


    一阶马尔可夫链，其中未来状态仅取决于当前状态，是早期序列推荐器中的常见策略。尽管简单，但一阶马尔可夫链在捕捉短期、项目到项目的转换模式方面非常有效，提高了推荐质量，优于非序列方法。


    以我们之前的*继承*为例。如果你只使用一阶马尔可夫链，一个真正好的启发式方法是“如果这是一个系列，那么下一集是什么；否则，回退到协同过滤（CF）模型。”你可以看到，对于很大比例的观看时间，这个简单的一阶链只会告诉用户观看节目的下一集。不是特别有启发性，但这是一个好迹象。当你进一步抽象时，你会开始得到更强大的方法。


    一阶假设在现实世界的应用中并不总是成立，因为用户行为通常受到更长交互历史的影响。为了克服这个限制，高阶马尔可夫链会更早地回顾：下一个状态由一组先前的状态决定，提供了更丰富的用户行为模型。然而，'

    \ compute the predicted $\\log(count(y_{predicted}))$.\n\nIn this section of code,\
    \ we encounter the first difference between JAX and NumPy—namely, a vectorized\
    \ map, or `vmap`. A `vmap` takes in a function and applies it in the same way\
    \ across axes of tensors; this makes coding easier because you just have to think\
    \ about how the original function operates on lower-rank tensors such as vectors.\

- md: "## DataLoaders\n\nDataLoaders is a programming paradigm originating from PyTorch,\
    \ but it has been embraced in other gradient-optimized ML workflows. As we begin\
    \ to integrate gradient-based learning into our recommendation system architectures,\
    \ we will face challenges in our MLOps tooling. The first is related to training\
    \ data size and available memory. DataLoaders are a way to prescribe how data\
    \ is batched and sent to the training loop efficiently; as datasets get large,\
    \ careful scheduling of these training sets can have major effects on learning.\
    \ But why must we think about *batches* of data? That’s because we’ll use a variant\
    \ of gradient descent appropriate for large amounts of data.\n\nFirst, let’s review\
    \ the basics of *mini-batched gradient descent*. During training via gradient\
    \ descent, we make a forward pass of our training sample through our model to\
    \ yield a prediction, and we then compute the error and the appropriate gradient\
    \ backward through our model to update parameters. Batched gradient descent takes\
    \ all our data in a single pass to compute the gradient for the training set and\
    \ push it back through; this implies you have the entire training dataset in memory.\
    \ As the dataset scales, this ranges from expensive to impossible; to avoid this,\
    \ we can instead compute gradients of the loss function for only a subset of the\
    \ dataset at a time. The simplest paradigm for this, called *stochastic gradient\
    \ descent* (SGD), computes these gradients and parameter updates one sample at\
    \ a time. The mini-batched version performs our batched gradient descent, but\
    \ over a series of subsets to form a partition of our dataset. In mathematical\
    \ notation, we write the update rule in terms of Jacobians on the smaller batches:\n\
    \n$$\\theta = \\theta - \\eta * \\nabla_{\\theta} J(\\theta; x^{(i:i+n)}; y^{(i:i+n)})$$\n\
    \nThis optimization serves a few purposes. First, it requires only potentially\
    \ small subsets of our data held in memory during the steps. Second, it requires\
    \ far fewer passes than the purely iterative version in SGD. Third, the gradient\
    \ operating on these mini-batches can be organized as a Jacobian, and thus we\
    \ have linear-algebraic operations that may be highly optimized.\n\n## Jacobians\n\
    \nThe mathematical notion of a Jacobian in the simplest sense is an organizational\
    \ tool for a set of vector derivatives with relevant indexes. You may recall that\
    \ for functions of several variables, you can take the derivative *with respect\
    \ to* each of those variables. For a single multivariable scalar function, the\
    \ Jacobian is simply the row vector of first derivatives of the function—which\
    \ happens to be the transpose of the gradient.\n\nThis is the simplest case; the\
    \ gradient of a multivariable scalar function may be written as a Jacobian. However,\
    \ once we have a vector of (vector) derivatives, we can write that as a matrix;\
    \ the utility here is really only in the notation, though. When you collect a\
    \ series of multivariable scalar functions into a vector of functions, the associated\
    \ vector of gradients is a vector of vectors of derivatives. This is called a\
    \ *Jacobian matrix*, and it generalizes the gradient to vector-valued functions.\
    \ As you've likely realized, layers of neural networks are a great source of vector-valued\
    \ functions for which you'd like to derivate.\n\nIf you're convinced mini-batches\
    \ are useful, it's time to discuss *DataLoaders*—a simple PyTorch API for facilitating\
    \ mini-batch access from a large dataset. The key parameters for a DataLoader\
    \ are `batch_size`, `shuffle`, and `num_workers`. The batch size is easy to understand:\
    \ it's the number of samples included in each batch (often an integer factor of\
    \ the total size of the dataset). Often a shuffle operation is applied in serving\
    \ up these batches; the shuffle allows batches in each epoch to be shown to the\
    \ network in a randomized order; this is intended to improve robustness. Finally,\
    \ `num_workers` is a parallelization parameter for the CPU's batch generation.\n\
    \nThe utility of a DataLoader is really best understood via demonstration:\n\n\
    ```python\nparams = {\n    'batch_size': _,\n    'shuffle': _,\n    'num_workers':\
    \ _\n}\n\ntraining_generator = torch.utils.data.DataLoader(training_set, params)\n\
    \nvalidation_generator = torch.utils.data.DataLoader(validation_set, params)\n\
    \n# Loop over epochs\nfor epoch in range(max_epochs):\n    # Training\n    for\
    \ local_batch, local_labels in training_generator:\n\n        # Model computations\n\
    \        [...]\n\n    # Validation\n    with torch.set_grad_enabled(False):\n\
    \        for local_batch, local_labels in validation_generator:\n\n          \
    \  # Model computations\n            [...]\n```\n\nThe first important detail\
    \ in this code is that any of its generators will be reading in mini-batches from\
    \ your total dataset and can be instructed to load those batches in parallel.\
    \ Note also that any differential steps in the model computations will now be\
    \ operating on these mini-batches.\n\nIt’s easy to think of DataLoaders as merely\
    \ a tool for code cleanliness (which, admittedly, it does improve), but it’s important\
    \ to not underestimate how the control of batch order, parallelization, and shape\
    \ are significant features for training your model. Lastly, the structure of your\
    \ code now looks like batch gradient descent, but it is taking advantage of mini-batching,\
    \ further exposing what your code actually does instead of the steps necessary\
    \ to do it.\n\n## Database Snapshots\n\nLet’s round out this section by stepping\
    \ back from these fancy technologies to discuss something important and classic:\
    \ snapshotting a production database.\n\nAn extremely likely scenario is that\
    \ the engineers (potentially also you) who have built the recommendations server\
    \ are writing their logs and other application data to an SQL database. More likely\
    \ than not, this database architecture and deployment are optimized for fast querying\
    \ by the application across its most common use cases. As we’ve discussed, those\
    \ logs may be in an event-style schema, and there are other tables that may require\
    \ aggregation and roll-up to make any sense. For example, a *current inventory*\
    \ table may require knowledge of start-of-day inventory and then aggregate a list\
    \ of purchase events.\n\nAll told, the production SQL database is usually a crucial\
    \ component in the stack that’s geared to specific use. As the downstream consumer\
    \ of this data, you may find yourself wanting different schemas, wanting lots\
    \ of access to this database, and performing serious operations on this data.\
    \ The most common paradigm is *database snapshotting*. Snapshotting is a functionality\
    \ provided by various flavors of SQL to performantly make a clone of a database.\
    \ While this snapshotting may take form in a variety of ways, let’s focus on a\
    \ few that serve to simplify our systems and ensure they have the necessary data\
    \ on hand:\n\n- A daily table snapshot may be tied to an *as_of* field, or *the\
    \ state of this table on this day*."
  mdcn: "## 数据加载器\n\n数据加载器是一种源自 PyTorch 的编程范式，但也被其他梯度优化的机器学习工作流所采用。随着我们开始将基于梯度的学习集成到推荐系统架构中，我们的\
    \ MLOps 工具将面临挑战。第一个挑战与训练数据大小和可用内存有关。数据加载器是一种规定如何高效地将数据分批并发送到训练循环的方法；随着数据集变大，对这些训练集的仔细调度会对学习产生重大影响。但我们为什么必须考虑*批次*数据？那是因为我们将使用适合大量数据的梯度下降变体。\n\
    \n首先，让我们回顾一下*小批量梯度下降*的基础知识。在通过梯度下降进行训练期间，我们将训练样本通过模型进行前向传播以产生预测，然后计算误差并通过模型反向传播适当的梯度以更新参数。批量梯度下降在单次传递中获取所有数据以计算训练集的梯度并将其推回；这意味着你需要将整个训练数据集保存在内存中。随着数据集规模扩大，这从昂贵变得不可能；为避免这种情况，我们可以改为一次仅计算数据集子集的损失函数梯度。最简单的范式称为*随机梯度下降*，它一次计算一个样本的这些梯度和参数更新。小批量版本执行我们的批量梯度下降，但通过一系列子集形成数据集的划分。用数学符号表示，我们用较小批次上的雅可比矩阵来写更新规则：\n\
    \n$$\\theta = \\theta - \\eta * \\nabla_{\\theta} J(\\theta; x^{(i:i+n)}; y^{(i:i+n)})$$\n\
    \n这种优化有几个目的。首先，它只需要在步骤中将可能较小的数据子集保存在内存中。其次，它比 SGD 中的纯迭代版本需要更少的传递次数。第三，作用于这些小批量的梯度可以组织为雅可比矩阵，因此我们拥有可以高度优化的线性代数运算。\n\
    \n## 雅可比矩阵\n\n雅可比矩阵的数学概念最简单的理解是，它是一组具有相关索引的向量导数的组织工具。你可能记得，对于多变量函数，你可以对每个变量*求导*。对于单个多变量标量函数，雅可比矩阵就是函数的一阶导数行向量——这恰好是梯度的转置。\n\
    \n这是最简单的情况；多变量标量函数的梯度可以写成雅可比矩阵。然而，一旦我们有了一个（向量）导数向量，我们就可以将其写成矩阵；这里的实用性实际上只体现在符号表示上。当你将一系列多变量标量函数收集到一个函数向量中时，相关的梯度向量是导数向量的向量。这称为*雅可比矩阵*，它将梯度推广到向量值函数。正如你可能已经意识到的，神经网络的层是向量值函数的绝佳来源，而你希望对其进行求导。\n\
    \n如果你确信小批量是有用的，那么是时候讨论*数据加载器*了——一个简单的 PyTorch API，用于方便地从大型数据集访问小批量。数据加载器的关键参数是\
    \ `batch_size`、`shuffle` 和 `num_workers`。批量大小很容易理解：它是每个批次中包含的样本数量（通常是数据集总大小的整数因子）。通常在提供这些批次时会应用洗牌操作；洗牌允许每个批次的网络以随机顺序显示；这旨在提高鲁棒性。最后，`num_workers`\
    \ 是 CPU 批次生成的并行化参数。\n\n数据加载器的实用性最好通过演示来理解：\n\n```python\nparams = {\n    'batch_size':\
    \ _,\n    'shuffle': _,\n    'num_workers': _\n}\n\ntraining_generator = torch.utils.data.DataLoader(training_set,\
    \ params)\n\nvalidation_generator = torch.utils.data.DataLoader(validation_set,\
    \ params)\n\n# Loop over epochs\nfor epoch in range(max_epochs):\n    # Training\n\
    \    for local_batch, local_labels in training_generator:\n\n        # Model computations\n\
    \        [...]\n\n    # Validation\n    with torch.set_grad_enabled(False):\n\
    \        for local_batch, local_labels in validation_generator:\n\n          \
    \  # Model computations\n            [...]\n```\n\n这段代码的第一个重要细节是，它的任何生成器都将从你的总数据集中读取小批量，并且可以指示它们并行加载这些批次。还要注意，模型计算中的任何微分步骤现在都将作用于这些小批量。\n\
    \n很容易将数据加载器仅仅视为代码整洁的工具（诚然，它确实改善了这一点），但重要的是不要低估批次顺序、并行化和形状的控制对于训练模型的重要性。最后，你的代码结构现在看起来像批量梯度下降，但它利用了小批量，进一步暴露了你的代码实际做了什么，而不是执行它所需的步骤。\n\
    \n## 数据库快照\n\n让我们通过从这些花哨的技术中退一步来讨论一些重要且经典的内容，从而结束本节：生产数据库的快照。\n\n一个极有可能的情况是，构建推荐服务器的工程师（可能也包括你）正在将日志和其他应用程序数据写入\
    \ SQL 数据库。很可能，该数据库架构和部署是针对应用程序在其最常见用例中的快速查询而优化的。正如我们所讨论的，这些日志可能采用事件模式，其他表可能需要聚合和汇总才能有意义。例如，*当前库存*表可能需要了解当天开始时的库存，然后汇总购买事件列表。\n\
    \n总而言之，生产 SQL 数据库通常是针对特定用途优化的技术栈中的关键组件。作为该数据的下游消费者，你可能会发现自己需要不同的模式，需要大量访问此数据库，并对此数据执行重要操作。最常见的范式是*数据库快照*。快照是各种\
    \ SQL 提供的功能，用于高性能地克隆数据库。虽然这种快照可能以多种方式呈现，但让我们专注于几种有助于简化系统并确保其拥有必要数据的方法：\n\n- 每日表快照可能与\
    \ *as_of* 字段相关联，即*此表在当天的状态*。"

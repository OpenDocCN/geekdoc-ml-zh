- img_proc: true
  md: "+   - For algorithm B, which perfectly ranks the items, we calculate mAP as\
    \ follows:\n  mAP = (precision@1 + precision@2 + precision@3) / 3 = (1/1 + 2/2\
    \ + 3/3) / 3 = 1\n\nThe generalized formula for mAP across a set of queries Q\
    \ is shown here:\n\n$$mAP = \\frac{1}{|Q|} \\sum_{q=1}^{|Q|} \\frac{1}{m_q} \\\
    sum_{k=1}^{n} P(k) * rel(k)$$\n\nHere, $|Q|$ is the total number of queries, $m_q$\
    \ is the number of relevant documents for a specific query $q$, $P(k)$ stands\
    \ for the precision at the _k_th cutoff, and $rel(k)$ is an indicator function\
    \ equating to 1 if the item at rank $k$ is relevant, and 0 otherwise.\n\n# MRR\n\
    \nAnother effective metric used in recommendation systems is MRR. Unlike MAP,\
    \ which considers all relevant items, MRR primarily focuses on the position of\
    \ the first relevant item in the recommendation list. It's computed as the reciprocal\
    \ of the rank where the first relevant item appears.\n\nConsequently, MRR can\
    \ reach its maximum value of 1 if the first item in the list is relevant. If the\
    \ first relevant item is found farther down the list, MRR takes a value less than\
    \ 1. For instance, if the first relevant item is positioned at rank 2, the MRR\
    \ would be 1/2.\n\nLet's look at this in the context of the recommendation algorithms\
    \ A and B that we used earlier:\n\n+   - For algorithm A, the first relevant item\
    \ is at rank 2, so the MRR equals 1/2 = 0.5.\n- For algorithm B, which perfectly\
    \ ranked the items, the first relevant item is at rank 1, so the MRR equals 1/1\
    \ = 1.\n\nExtending this to multiple queries, the general formula for MRR is as\
    \ follows:\n\n$$MRR = \\frac{1}{|Q|} \\sum_{i=1}^{|Q|} \\frac{1}{rank_i}$$\n\n\
    Here, $|Q|$ represents the total number of queries, and $rank_i$ is the position\
    \ of the first relevant item in the list for the _i_th query. This metric provides\
    \ valuable insight into how well a recommendation algorithm delivers a relevant\
    \ recommendation right at the top of the list."

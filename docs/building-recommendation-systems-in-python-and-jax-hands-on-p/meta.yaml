    The objective function of GloVE embedding is to learn two vectors such that their
    dot product is proportional to the log count of co-occurrence between the two
    vectors. The reason this loss function works is that the dot product will then
    be proportional to the log count of co-occurrence; thus, words that frequently
    occur together will have a larger dot product than words that do not. To compute
    the embeddings, we need to have the co-occurrence matrix handy, and luckily the
    previous step in the pipeline has generated such a matrix for us to process.



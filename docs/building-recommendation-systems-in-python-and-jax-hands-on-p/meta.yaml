  md: 'In this implementation, we''re using Apache Spark in Python, or PySpark. The
    README in the repository shows how to install a copy of PySpark locally using
    pip install.


    The first step implemented in PySpark is tokenization and URL normalization. The
    code is in `tokenize_wiki_pyspark.py`, but we won''t go over it here because a
    lot of the processing is simply distributed natural language parsing and writing
    out the data into protocol buffer format. We will instead talk in detail about
    the second step, which is to make a dictionary of tokens (the *words* in the article)
    and some statistics about the word counts. However, we will run the code just
    to see what the Spark usage experience looks like. Spark programs are run using
    the program spark-submit as follows:


    ```

    bin/spark-submit

    --master=local[4]

    --conf="spark.files.ignoreCorruptFiles=true"

    tokenize_wiki_pyspark.py

    --input_file=data/enwiki-latest-parsed --output_file=data/enwiki-latest-tokenized

    ```


    Running the Spark submit script allows you to execute the controller program,
    in this case, `tokenize_wiki_pyspark.py`, on a local machine as we have in the

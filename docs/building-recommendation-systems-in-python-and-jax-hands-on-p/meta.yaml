    \ the same way across axes of tensors; this makes coding easier because you just\
    \ have to think about how the original function operates on lower-rank tensors\
    \ such as vectors. In this example, since we are passing in batches of pairs of\
    \ tokens and then embedding them, we actually have a batch of vectors, and so\
    \ we want to run the dot product over the batch dimension. We pass in JAX’s dot\
    \ function, which takes vectors, run it over the batch dimension (which is axis\
    \ 0), and tell `vmap` to return the outputs as another batch dimension as axis\
    \ 0. This allows us to efficiently and simply write code for lower-dimensional\
    \ tensors and obtain a function that can operate on higher-dimensional tensors\
    \ by vmapping over the extra axes. Conceptually, it would be as if we looped over\
    \ the first dimension and returned an array of the dot products. However, by converting\
    \ this process to a function, we allow JAX to push this loop into JITable code\
    \ that can be compiled to run fast on a GPU.\n\nFinally, we also declare the helper\
    \ function `score_all`, which takes one token and scores it against all the other\
    \ tokens. Again, we use `vmap` to take the dot product"
  - "[PAGE 164]\n\nwith the particular token $x(i)$ but run it against all the other\
    \ token embeddings. The difference here is that since $x(i)$ is already a vector,\
    \ we don't need to vmap over it. Therefore, in `in_axes`, we supply `[None, 0]`,\
    \ which means don't vmap over the axes of the first argument but instead vmap\
    \ over axis 0 of the second argument, which is the batch of all the embeddings\
    \ of all the tokens. Then we return the result, which is an array that is the\
    \ dot product of $x(i)$ against all other embeddings but without the bias terms.\
    \ We don't use the bias term in scoring because it was used in part to soak up\
    \ the popularity of very common tokens, and our scoring function would be more\
    \ interesting if we just used the dot product part of it for scoring.\n\n# GloVE\
    \ Model Training with Optax\n\nNext, let's take a look at `wikipedia/train_cooccurrence.py`.\
    \ Let's look specifically at the part where the model is called to dig into some\
    \ JAX specifics:\n\n```\n@jax.jit\ndef apply_model(state, inputs, target):\n \
    \   \"\"\"Computes the gradients and loss for a single batch.\"\"\"\n\n    # Define\
    \ glove loss.\n    def glove_loss(params):\n        \"\"\"The GloVe weighted loss.\"\
    \"\"\n        predicted = state.apply_fn({'params': params}, inputs)\n       \
    \ ones = jnp.ones_like(target)\n        weight = jnp.minimum(ones, target / 100.0)\n\
    \        weight = jnp.power(weight, 0.75)\n        log_target = jnp.log10(1.0\
    \ + target)\n        loss = jnp.mean(jnp.square(log_target - predicted) * weight)\n\
    \        return loss\n\n    grad_fn = jax.value_and_grad(glove_loss)\n    loss,\
    \ grads = grad_fn(state.params)\n\n    return grads, loss\n```\n\nThe first point\
    \ you will notice is the function decorator, `@jax.jit`. This tells JAX that everything\
    \ in the function is JITable. There are some requirements for a function to be\
    \ JITable—mostly that it is pure, which is a computer science term indicating\
    \ that if you call a function with the same arguments, you would expect the same\
    \ result. That function should not have any side effects and shouldn't rely on\
    \ a cached state such as a private counter or random-number generator with implicit\
    \ state. The tensors that are passed in as arguments should probably also have\
    \ fixed shape, because every new shape would trigger a new JIT compilation. You\
    \ can give hints to the compiler that certain parameters are constants with `static_argnums`,\
    \ but these arguments shouldn't change too frequently, or else a lot of time will\
    \ be spent compiling a program for each of these constants."
  - '[PAGE 165]


    One consequence of this pure function philosophy is that the model structure and
    model parameters are separated. This way, the model functions are pure and the
    parameters are passed in to the model functions, allowing the model functions
    to be jitted. This is why we apply the model''s `apply_fn` to the parameters rather
    than simply having the parameters as part of the model.


    This `apply_model` function can then be compiled to implement the GloVE loss that
    we described earlier. The other new functionality that JAX provides above NumPy
    is automatically computing gradients of functions. The JAX function `value_and_grad`
    computes the gradient of the loss with respect to the parameters. Since the gradient
    always points in the direction in which the loss increases, we can use gradient
    descent to go the other way and minimize the loss. The Optax library has a few
    optimizers to pick from, including SGD (stochastic gradient descent with momentum)
    and ADAM.


    When you run the training program, it will loop over the co-occurence matrix and
    try to generate a succinct form of it by using the GloVE loss function. After
    about an hour, you should be able to see the highest-scoring term.


    The nearest neighbors for “democracy,” for example, are as follows: democracy:1.064498,
    liberal:1.024733, reform:1.000746, affairs:0.961664, socialist:0.952792, organizations:0.935910,
    political:0.919937, policy:0.917884, policies:0.907138, and --date:0.889342.


    As you can see, the query token itself is usually the highest-scoring neighbor,
    but this is not necessarily true, as a very popular token might actually be higher
    scoring to the token than the query token itself.


    # Summary


    After reading this chapter, you should have a good overview of the basic ingredients
    for assembling a recommender system. You have seen how to set up a basic Python
    development environment; manage packages; specify inputs and outputs with flags;
    encode data in various ways, including using protocol buffers; and process the
    data with a distributed framework with PySpark. You also learned how to compress
    gigabytes of data into a few megabytes of a model that is able to generalize and
    quickly score items, given a query item.


    Take some time to play with the code and read the documentation of the various
    packages referenced to get a good sense of the basics. These foundational examples
    have widespread applications, and having a firm grasp on them will make your production
    environments more accurate.'
- md: '## PART III

    Ranking


    What are the appropriate candidates for a given recommendation? Which of these
    candidates is the best? What about the 10 best?


    Sometimes the best recommender system is simply item availability, but in the
    majority of cases, you’re hoping to capture subtle signals about user preference
    to deliver excellent recommendations among potentially millions of options. Personalization
    is the name of the game; while we previously focused on item-item similarity with
    respect to external meaning, we need to start attempting to infer user taste and
    desire.


    We’d also better start making this an ML task eventually. Beyond discussions of
    features and architectures, we’ll need to define the objective functions. At first
    blush, the objective for recommendations is the simple binary “Did they like it?”—so
    maybe we’re simply predicting the outcome of a Bernoulli trial. However, as we
    discussed in the introduction, there are a variety of ways to get the signal about
    how much they liked it. Moreover, recommendation systems in most cases grant one
    kindness: you get multiple shots on goal. Usually you get to recommend a few options,
    so we are very interested in predictions of which things they’ll like the most.
    In this part of the book, we’ll take all that you’ve learned and start getting
    numbers out. We’ll also talk about explicit loss functions used to train and evaluate
    your models.


    ## CHAPTER 9

    Feature-Based and Counting-Based Recommendations


    Consider this oversimplified problem: given a bunch of new users, predict which
    will like our new mega-ultra-fancy-fun-item-of-novelty, or MUFFIN for short. You
    may start by asking which old users like MUFFIN; do those users have any aspects
    in common? If so, you could build a model that predicts MUFFIN affinity from those
    correlated user features.


    Alternatively, you could ask, “What are other items people buy with MUFFIN?” If
    you find that others frequently also ask for JAM (just-awesome-merch), then MUFFIN
    may be a good suggestion for those who already have JAM. This would be using the
    co-occurrence of MUFFIN and JAM as a predictor. Similarly, if your friend comes
    along with tastes similar to yours—you both like SCONE, JAM, BISCUIT, and TEA—but
    your friend hasn’t yet had the MUFFIN, if you like MUFFIN, it’s probably a good
    choice for your friend too. This is using the co-occurrence of items between you
    and your friend.


    These item relationship features will form our first ranking methods in this chapter;
    so grab a tasty snack and let’s dig in.


    ### Bilinear Factor Models (Metric Learning)


    As per the usual idioms about running in front of horses and walking after the
    cart, let’s start our journey into ranking systems with what can be considered
    the *naive* ML approaches. Via these approaches, we will start to get a sense
    of where the rub lies in building recommendation systems and why some of the forthcoming
    efforts are necessary at all.


    Let''s begin again with our basic premise of recommendation problems: to estimate
    ratings of item $x$ by user $i$ written as $r_{i,x}$. *Note the slight change
    in notation from earlier for reasons that will become clear momentarily.* In a
    usual ML paradigm, we might claim that estimating this score is done via properties
    of the item and the user, and frequently those properties would be described as
    features, and thus $\mathbf{i}$ and $\mathbf{x}$ can be the user and item vectors,
    respectively, composed of these features.


    Now, we consider user $i$ with their collection of previously interacted-with
    items $\mathcal{R}_i$, and consider $\mathcal{I} = \{\mathbf{x} | \mathbf{x} \in
    \mathcal{R}_i\}$ the set of vectors associated to those items in this feature
    space. We can then map this collection of vectors to a representation to yield
    a *content-based feature vector for $i$*. Figure 9-1 illustrates an example mapping.


    ![](img/da17d05291861831978609329c481581_169_0.png)


    This extremely simple approach can turn a collection of item features and user-item
    interactions into features of the user. Much of the following will be increasingly
    rich ways of doing this. Thinking very hard about the map, the features, and the
    requirements for *interaction* yields many of the key insights in the rest of
    the book.


    Let''s take the preceding mapping, $\mathbf{i} := F(\mathcal{I})$, to be a simple
    aggregation like dimension-wise average. Then recognize that the mapping will
    provide a vector of the same dimension as the items. Now we have a user vector
    in the same “space” as the items, and we can ask a similarity question as we did
    in our discussion of latent space in Chapter 3.


    We need to move back to the mathematical framings to set up how to use these vectors.
    Ultimately, we''re now in a latent space with users and items, but how can we
    do anything with that? Well you may already remember how to compare vector similarity.
    Let''s define the similarity to be *cosine-similarity*:


    $$sim(\mathbf{i}, \mathbf{x}) = \frac{\mathbf{i} \cdot \mathbf{x}}{|\mathbf{i}|
    * |\mathbf{x}|}$$


    If we precompose our similarity with vector normalization, this is simply the
    inner product—and this is an essential first step toward recommendation systems.
    For convenience, let''s always assume this space we''re working in is after normalization,
    so all similarity measures are done on the unit sphere:


    $$r_{i,x} \sim sim(\mathbf{i}, \mathbf{x}) = \sum_k \mathbf{i}_k * \mathbf{x}_k$$


    This now approximates our ratings. But wait, dear reader, where are the learnable
    parameters? Let''s go ahead and make this a weighted summation, via a diagonal
    matrix $A$:


    $$r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \sum_k a_k * \mathbf{i}_k * \mathbf{x}_k$$


    This slight generalization already puts us in the world of statistical learning.
    You can probably already see how $A$ can be used to learn which of the dimensions
    in this space are most important for approximating the ratings, but before we
    make that precise, let''s generalize yet once more:


    $$r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \sum_{k,l} a_{kl} * \mathbf{i}_k
    * \mathbf{x}_l$$


    This nets us even more parameters! We see that now $sim^A(\mathbf{i}, \mathbf{x})
    = \mathbf{i}A\mathbf{x}$, and we are only one step away from the familiar ground
    of linear regression. Currently, our model is in the form of a bilinear regression,
    so let''s utilize a little linear algebra. For the sake of exposition, let $\mathbf{i}
    \in \mathbb{R}^n$, $\mathbf{x} \in \mathbb{R}^m$, and $A \in \mathbb{R}^{n \times
    m}$, and then we have this:


    $$\mathbf{vect}(\mathbf{i} * \mathbf{x}^T) \in \mathbb{R}^{n * m}$$


    We can simplify to the following:


    $$sim^A(\mathbf{i}, \mathbf{x}) = \mathbf{i}A\mathbf{x} = \mathbf{vect}(\mathbf{i}
    * \mathbf{x}^T) * \mathbf{vect}(A)$$


    If we make up notation for the right-hand side, you''ll find your friend linear
    regression waiting for you:


    $$\mathbf{v}_{ix} := \mathbf{vect}(\mathbf{i} * \mathbf{x}^T), \beta := \mathbf{vect}(A)$$


    Thus:


    $r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \mathbf{v}_{ix}\beta$


    With this computation behind us, we see that whether we wish to compute binary
    ratings, ordinal ratings, or likelihood estimation, the tools in our linear models
    toolbox can enter the party. We have available to us regularization and optimizers
    and any other fun we''re interested in from the linear models world.


    If these equations feel frustrating or painful, let me try to offer you a geometric
    mental model. Each item and user is in a high-dimensional space, and ultimately
    we''re trying to figure out which ones are closest to one another. People frequently
    misunderstand these geometries by imagining the tips of the vectors being near
    one another; this is not the case. These spaces are extremely high-dimensional,
    which results in the analogy being far from the truth. Instead, ask if *the values
    are similarly large in some of the vector indices*. This is a much simpler, but
    also more accurate, geometric view: there are some subspaces in the extremely
    high-dimensional space where the vectors point in the same direction.


    This forms the foundation for where we are going but has serious limitations for
    large-scale recommender problems. You will see, however, that the feature-based
    learning still has its place in the cold-start regime.


    Note that in addition to the preceding approach of building content-based features
    for a user, we may also have obvious user features that are obtained via queries
    to the user, or implicitly via other data collection; examples of these features
    include location, age range, and height.


    ### Is User Space the Same as Item Space?


    In this section, we''ve discussed ways to put users and items in the same latent
    spaces. We claim that we can make comparisons between users and items by vector
    operations. In mathematics, vectors are elements of vector spaces, and (finite
    dimensional) vector spaces are defined by their number of dimensions and the values
    that the vectors have as elements. For example, if we say it''s a three-dimensional
    vector space with 8-bit integers, that''s sufficient to specify a vector space.


    However, devilish details are lurking around. First, what does *distance* mean
    in a specified vector space? We have many conventional measures, but it''s important
    to ensure that comparisons between two spaces are utilizing the same definitions
    of distance. Another consideration is the process by which you define the vectors
    of the space; if you arrive at your vectors via a dimension reduction from a larger
    space, there are likely density properties that you can expect not to be present
    naively. Where this is most relevant for ranking models and recommendation systems
    is'
  mdcn: '## 第三部分

    排名


    对于给定的推荐，哪些是合适的候选对象？这些候选对象中哪个是最好的？那前10名呢？


    有时最好的推荐系统仅仅是基于物品的可用性，但在大多数情况下，你希望捕捉用户偏好的微妙信号，以便在可能数百万的选项中提供出色的推荐。个性化是这场游戏的核心；虽然我们之前关注的是基于外部含义的物品-物品相似性，但现在我们需要开始尝试推断用户的品味和欲望。


    我们也最好最终将此转化为一个机器学习任务。除了讨论特征和架构，我们还需要定义目标函数。乍一看，推荐的目标是简单的二元问题：“他们喜欢吗？”——所以也许我们只是在预测伯努利试验的结果。然而，正如我们在引言中讨论的，有多种方式可以获取他们喜欢程度的信号。此外，大多数推荐系统有一个共同的优势：你有多次尝试的机会。通常你可以推荐几个选项，因此我们非常关注预测哪些物品是他们最喜欢的。在本书的这一部分，我们将运用你所学的一切，开始得出具体的数值。我们还将讨论用于训练和评估模型的显式损失函数。


    ## 第九章

    基于特征和基于计数的推荐


    考虑这个过度简化的问题：给定一批新用户，预测谁会喜欢我们的新超级超级花哨新奇物品，简称MUFFIN。你可能会先问哪些老用户喜欢MUFFIN；这些用户是否有任何共同点？如果有，你可以构建一个模型，从这些相关的用户特征来预测对MUFFIN的喜好度。


    或者，你可以问：“人们和MUFFIN一起购买的其他物品是什么？”如果你发现其他人也经常购买JAM（超棒商品），那么对于已经有JAM的人来说，MUFFIN可能是一个好的推荐。这将使用MUFFIN和JAM的共现作为预测因子。同样，如果你有一个品味与你相似的朋友——你们都喜欢SCONE、JAM、BISCUIT和TEA——但你的朋友还没有尝试过MUFFIN，如果你喜欢MUFFIN，那么它可能也是你朋友的一个好选择。这使用了你和你朋友之间物品的共现。


    这些物品关系特征将构成本章我们的第一个排名方法；所以拿上美味的零食，让我们开始深入探讨吧。


    ### 双线性因子模型（度量学习）


    按照关于“马前奔跑，车后步行”的惯常说法，让我们从可以被视为*朴素*机器学习方法开始我们的排名系统之旅。通过这些方法，我们将开始了解构建推荐系统时的难点所在，以及为什么后续的一些努力是必要的。


    让我们再次从推荐问题的基本前提开始：估计用户$i$对物品$x$的评分，记为$r_{i,x}$。*注意这里的符号与之前略有变化，原因稍后会变得清晰。* 在通常的机器学习范式中，我们可能会声称这个分数的估计是通过物品和用户的属性来完成的，而这些属性通常被描述为特征，因此$\mathbf{i}$和$\mathbf{x}$可以分别是用户和物品的向量，由这些特征组成。


    现在，考虑用户$i$及其之前交互过的物品集合$\mathcal{R}_i$，并考虑$\mathcal{I} = \{\mathbf{x} | \mathbf{x}
    \in \mathcal{R}_i\}$是这些物品在该特征空间中的向量集合。然后我们可以将这个向量集合映射到一个表示，从而得到一个*基于$i$的内容特征向量*。图9-1展示了一个映射示例。


    ![](img/da17d05291861831978609329c481581_169_0.png)


    这种极其简单的方法可以将物品特征和用户-物品交互的集合转化为用户的特征。接下来的大部分内容将是越来越丰富的实现方式。深入思考映射、特征以及*交互*的要求，将引出本书其余部分的许多关键见解。


    让我们将前面的映射$\mathbf{i} := F(\mathcal{I})$视为一个简单的聚合，比如按维度取平均值。然后认识到该映射将提供一个与物品维度相同的向量。现在我们有了一个与物品处于同一“空间”的用户向量，我们可以像在第3章讨论潜在空间时那样提出相似性问题。


    我们需要回到数学框架来设置如何使用这些向量。最终，我们现在处于一个包含用户和物品的潜在空间中，但我们能用它做什么呢？你可能已经记得如何比较向量相似性。让我们定义相似性为*余弦相似度*：


    $$sim(\mathbf{i}, \mathbf{x}) = \frac{\mathbf{i} \cdot \mathbf{x}}{|\mathbf{i}|
    * |\mathbf{x}|}$$


    如果我们将相似性与向量归一化预先组合，这实际上就是内积——这是迈向推荐系统的关键第一步。为方便起见，让我们始终假设我们工作的空间是归一化后的空间，因此所有相似性度量都在单位球面上进行：


    $$r_{i,x} \sim sim(\mathbf{i}, \mathbf{x}) = \sum_k \mathbf{i}_k * \mathbf{x}_k$$


    这现在近似于我们的评分。但是等等，亲爱的读者，可学习的参数在哪里？让我们通过一个对角矩阵$A$将其变为加权求和：


    $$r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \sum_k a_k * \mathbf{i}_k * \mathbf{x}_k$$


    这个轻微的泛化已经将我们带入了统计学习的世界。你可能已经看到$A$如何用于学习这个空间中哪些维度对于近似评分最重要，但在我们精确化之前，让我们再泛化一次：


    $$r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \sum_{k,l} a_{kl} * \mathbf{i}_k
    * \mathbf{x}_l$$


    这给了我们更多的参数！我们看到现在$sim^A(\mathbf{i}, \mathbf{x}) = \mathbf{i}A\mathbf{x}$，我们距离熟悉的线性回归领域只有一步之遥。目前，我们的模型是双线性回归的形式，所以让我们利用一点线性代数。为了说明，设$\mathbf{i}
    \in \mathbb{R}^n$，$\mathbf{x} \in \mathbb{R}^m$，$A \in \mathbb{R}^{n \times m}$，那么我们有：


    $$\mathbf{vect}(\mathbf{i} * \mathbf{x}^T) \in \mathbb{R}^{n * m}$$


    我们可以简化为：


    $$sim^A(\mathbf{i}, \mathbf{x}) = \mathbf{i}A\mathbf{x} = \mathbf{vect}(\mathbf{i}
    * \mathbf{x}^T) * \mathbf{vect}(A)$$


    如果我们为右边部分引入符号，你会发现你的老朋友线性回归正在等着你：


    $$\mathbf{v}_{ix} := \mathbf{vect}(\mathbf{i} * \mathbf{x}^T), \beta := \mathbf{vect}(A)$$


    因此：


    $r_{i,x} \sim sim^A(\mathbf{i}, \mathbf{x}) = \mathbf{v}_{ix}\beta$


    有了这个计算，我们看到无论我们希望计算二元评分、序数评分还是似然估计，我们线性模型工具箱中的工具都可以参与进来。我们可以使用正则化、优化器以及线性模型世界中任何我们感兴趣的其他有趣方法。


    如果这些方程让你感到沮丧或痛苦，让我尝试为你提供一个几何思维模型。每个物品和用户都处于一个高维空间中，最终我们试图找出哪些彼此最接近。人们经常误解这些几何结构，想象向量的尖端彼此靠近；事实并非如此。这些空间是极高维的，这使得这种类比远非事实。相反，要问的是*在某些向量索引上，值是否同样大*。这是一个更简单但也更准确的几何视角：在极高维空间中，存在一些子空间，其中的向量指向相同的方向。


    这构成了我们前进的基础，但对于大规模推荐问题存在严重局限性。然而，你将看到，基于特征的学习在冷启动场景中仍然有其一席之地。


    请注意，除了前面为用户构建基于内容特征的方法外，我们还可能有通过查询用户或其他数据收集隐式获得的明显用户特征；这些特征的例子包括位置、年龄范围和身高。


    ### 用户空间与物品空间相同吗？


    在本节中，我们讨论了将用户和物品置于同一潜在空间的方法。我们声称可以通过向量运算在用户和物品之间进行比较。在数学中，向量是向量空间的元素，而（有限维）向量空间由其维度数和向量作为元素的值来定义。例如，如果我们说这是一个具有8位整数的三维向量空间，这就足以指定一个向量空间。


    然而，魔鬼般的细节潜伏在周围。首先，在指定的向量空间中，*距离*意味着什么？我们有许多常规度量，但重要的是要确保两个空间之间的比较使用相同的距离定义。另一个考虑因素是你定义空间向量的过程；如果你的向量是通过从一个更大的空间进行降维得到的，那么你可能期望存在一些朴素情况下不存在的密度属性。这对于排名模型和推荐系统最相关的地方是'

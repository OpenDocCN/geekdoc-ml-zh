  md: "# Summary\n\nTransformers and sequential recommendation systems are really\
    \ at the cutting edge of modern recommenders. These days, most research in recommendation\
    \ systems is in the area of sequential datasets, and the hottest recommenders\
    \ are using longer and longer sequences for prediction. Two important projects\
    \ are worthy of attention:\n\n*Transformers4Rec*\n    This open source project\
    \ is geared toward scalable transformer models by the NVIDIA Merlin team. For\
    \ more details, see “Transformers4Rec: Bridging the Gap Between NLP and Sequential/Session-Based\
    \ Recommendation” by Gabriel de Souza Pereira Moreira et al.\n\n*Monolith*\n \
    \   Also known as the TikTok For You page recommender, this is one of the most\
    \ popular and exciting recommendation systems at this time. It is a fundamentally\
    \ sequential recommender, with some elegant hybrid approaches. “Monolith: Real-Time\
    \ Recommendation System with Collisionless Embedding Table” by Zhuoran Liu et\
    \ al. covers the architectural considerations.\n\nOur final step before this book\

    \ to the website where they usually buy toys, the site recommends several toys\
    \ for a child a few years younger—the parent hasn't purchased from the site since\
    \ the child was that age.\n- A runner experiences serious knee pain and determines\
    \ they can no longer go on long runs. They switch to cycling, which is lower impact.\
    \ However, their local meetup recommendations are still all running oriented.\n\
    \nAll of these cases can be relatively easy to deal with via deterministic logic.\
    \ For these situations, we would prefer *not* to try to learn these rules via\
    \ ML. We should assume that for these types of scenarios, we will get low signal\
    \ about these preferences: negative implicit feedback is often lower in relevance,\
    \ and many of the situations listed are represented by details that you want the\
    \ system to learn once and for all. Additionally, in some of the previous examples,\
    \ it can be upsetting or harmful to a relationship with a user to have the preferences\
    \ not respected.\n\nThe name for these preferences is *avoids*—or sometimes constraints,\
    \ overrides, or hard rules. You should think of them as explicit expectations\
    \ of the system: “Don't show me recipes with grapefruit,” “No more sofas,” “I\
    \ don't like gardening,” “My child is older than 10 now,” and “Don't show me trail\
    \ runs.”\n\n## Learned Avoids\n\nNot all business rules are such obvious avoids\
    \ that derive from explicit user feedback, and some derive from explicit feedback\
    \ not directly related to specific items. It's important to include a wide variety\
    \ of avoids when considering serving recommendations.\n\nFor the sake of simplicity,\
    \ let's assume you're building a fashion recommender system. Examples of more\
    \ subtle avoids include the following:\n\n*Already owned items*\nThese are items\
    \ that users really need to purchase only once—for example, clothing users have\
    \ bought through your platform or told you they already own. Creating a *virtual\
    \ closet* might be a way to ask users to tell you what they have, to assist in\
    \ these avoids.\n\n*Disliked features*\nThese are features of items that the user\
    \ can indicate disinterest in. During an onboarding questionnaire, you may ask\
    \ users if they like polka dots or if they have a favorite color palette. These\
    \ are explicitly indicated pieces of feedback that can be used for avoids.\n\n\
    *Ignored categories*\nThis is a category or group of items that doesn't resonate\
    \ with the user. This can be implicit but learned outside the primary recommender\
    \ model. Maybe the user has never clicked the Dresses category on your ecommerce\
    \ website because they don't enjoy wearing them.\n\n*Low-quality items*\nOver\
    \ time, you'll learn that some items are simply low quality for most users. You\
    \ can detect this via a high number of returns or low ratings from buyers. These\
    \ items ultimately should be removed from inventory, but in the meantime, it's\
    \ important to include them as avoids for all but the strongest signal of match.\n\
    \nThese additional avoids can be implemented easily during the serving stage and\
    \ can even include simple models. Training linear models to capture some of these\
    \ rules and then applying them during serving can be a useful and reliable mechanism\
    \ for improving ranking. Note that the small models perform very fast inference,\
    \ so little negative impact usually results from including them in the pipeline.\
    \ For larger-scale behavior trends or higher-order factors, we expect our core\
    \ recommendation models to learn these ideas.\n\n## Hand-Tuned Weights\n\nOn the\
    \ other side of the spectrum of avoids is *hand-tuned ranking*. This technique\
    \ was popular in earlier days of search ranking, when humans would use analytics\
    \ and observation to determine what they thought were the most important features\
    \ in a ranking and then craft a multiobjective ranker. For example, flower stores\
    \ may rank higher in early May as many users search for Mother's Day gifts. Since\
    \ there could be many variable elements to track, these kinds of approaches don't\
    \ scale well and have been largely deemphasized in modern recommendation ranking.\n\
    \nHowever, hand-tuned ranking can be incredibly useful as an *avoid*. While technically\
    \ it's not an avoid, we sometimes still call it that. An example of this in practice\
    \ is to know that new users like to start with a lower-priced item while they're\
    \ learning whether your shipping is trustworthy. A useful technique is to then\
    \ uprank lower-priced items before the first order.\n\nWhile it may feel bad to\
    \ consider building a hand-tuned ranking, it's important to not count this technique\
    \ out. It has a place and is often a great place to start. One interesting human-in-the-loop\
    \ application of this kind of technique is for hand-tuned ranking by experts.\
    \ Back to our fashion recommender, a style expert may know that this summer's\
    \ trending color is mauve, especially among the younger generation. Then can positively\
    \ influence user satisfaction if the expert ranks these mauve items up for users\
    \ in the right age persona.\n\n## Inventory Health\n\nA unique and somewhat contentious\
    \ side of hard ranking is inventory health. Notoriously hard to define, *inventory\
    \ health* estimates how good the existing inventory is for satisfying user demand.\n\
    \nLet's take a quick look at one way to define inventory health, via affinity\
    \ scores and forecasting. We can do this by leveraging a demand forecast, which\
    \ is an incredibly powerful and popular way to optimize the business: what are\
    \ the expected sales in each category over the next *N* time periods? Building\
    \ these forecasting models is outside the scope of this book, but the core ideas\
    \ are well captured in the famous book \"Forecasting: Principles and Practice\"\
    \ by Rob Hyndman and George Athanasopoulos (Otexts). For the sake of our discussion,\
    \ assume that you're able to roughly approximate the number of socks you'll sell\
    \ over the next month, broken down by size and usage type. This can be a really\
    \ instructive estimate for the number of socks of various types you should have\
    \ on hand.\n\nHowever, it doesn't stop there; inventory may be finite, and in\
    \ practice inventory is often a major constraint on businesses that sell physical\
    \ goods. With that caveat, we have to turn to the other side of the market demand.\
    \ If our demand outstrips our availability, we are ultimately disappointing users\
    \ who don't have access to the item they desired.\n\nLet's take an example of\
    \ selling bagels; you've calculated average demand for poppy seed, onion, asiago\
    \ cheese, and egg. On any given day, many customers will come to buy a bagel with\
    \ a clear preference in mind, but will you have enough of that bagel? Every bagel\
    \ you don't sell is wasted; people like fresh bagels. This means that the bagels\
    \ you recommend to each person are dependent on good inventory. Some users are\
    \ less picky; they can get one of two or three of the options and be just as happy.\
    \ In that case, it's better to give them another bagel option and save the lowest\
    \ inventory for the picky ones. This is a kind of model refinement called *optimization*,\
    \ which has a huge number of techniques. We won't get into optimization techniques,\
    \ but books on mathematical optimization or operations research will provide direction.\
    \ *Algorithms for Optimization* by Mykel J. Kochenderfer and Tim A. Wheeler (MIT\
    \ Press) is a good place to start.\n\nInventory health ties back to hard ranking,\
    \ because actively managing inventory as part of your recommendations is an incredibly\
    \ important and powerful tool. Ultimately, inventory optimization will degrade\
    \ the perceived performance of your recommendations, but by including it as part\
    \ of your business rules, the overall health of your business and recommender\
    \ system improves. This is why it is sometimes called *global optimization*.\n\
    \nThe reason that these methods stir up heated discussions is that not everyone\
    \ agrees that the quality of recommendations for some users should be depressed\
    \ to improve those for the “greater good.” Health of the marketplace and average\
    \ satisfaction are useful metrics to consider, but ensure that these are aligned\
    \ with the north-star metrics for the recommendation system at large.\n\n## Implementing\
    \ Avoids\n\nThe simplest approach to handling avoids is via downstream filtering.\
    \ To do this, you'll want to apply the avoid rules for the user before the recommendations\
    \ are passed along from the ranker to the user. Implementing this approach looks\
    \ something like this:\n\n```python\nimport pandas as pd\n\ndef filter_dataframe(df:\
    \ pd.DataFrame, filter_dict: dict):\n    \"\"\"\n    Filter a dataframe to exclude\
    \ rows where columns have certain values.\n\n    Args:\n        df (pd.DataFrame):\
    \ Input dataframe.\n        filter_dict (dict): Dictionary where keys are column\
    \ names\n        and values are the values to exclude.\n\n    Returns:\n     \
    \   pd.DataFrame: Filtered dataframe.\n    \"\"\"\n    for col, val in filter_dict.items():\n\
    \        df = df.loc[df[col] != val]\n    return df\n\nfilter_dict = {'column1':\
    \ 'value1', 'column2': 'value2', 'column3': 'value3'}\n```"
  mdcn: "## 硬性排序\n\n当你开始思考类似我们葡萄柚场景的情况时，可以想出很多这类现象的例子。*硬性排序*通常指两种特殊的排序规则之一：\n\n- 在排序前明确地从列表中移除某些项目。\n\
    - 使用分类特征按类别对结果进行排序。（注意，这甚至可以应用于多个特征，以实现分层硬性排序。）\n\n你是否观察到以下任何情况？\n\n- 用户购买了一张沙发。系统继续向该用户推荐沙发，尽管他们未来五年都不需要沙发。\n\
    - 用户为一位对园艺感兴趣的朋友购买了生日礼物。然后电子商务网站持续推荐园艺工具，尽管用户对此毫无兴趣。\n- 一位家长想为孩子购买玩具。但当家长访问他们通常购买玩具的网站时，网站却推荐了几款适合更小年龄儿童的玩具——自孩子达到那个年龄后，家长就再未从该网站购买过。\n\
    - 一位跑步者经历了严重的膝盖疼痛，并确定他们不能再进行长跑。他们转而进行冲击较小的骑行。然而，他们当地的聚会推荐仍然全部以跑步为主。\n\n所有这些情况都可以通过确定性逻辑相对容易地处理。对于这些情况，我们更倾向于*不*尝试通过机器学习来学习这些规则。我们应该假设，对于这类场景，我们关于这些偏好的信号会很弱：负面隐式反馈的相关性通常较低，而且列出的许多情况都涉及你希望系统一劳永逸地学习的细节。此外，在前面的一些例子中，如果不尊重这些偏好，可能会让用户感到不快或损害与用户的关系。\n\
    \n这些偏好的名称是*避免项*——有时也称为约束、覆盖或硬性规则。你应该将它们视为对系统的明确期望：“不要给我显示含有葡萄柚的食谱”，“不要再推荐沙发”，“我不喜欢园艺”，“我的孩子已经10岁以上了”，以及“不要给我显示越野跑路线”。\n\
    \n## 学习到的避免项\n\n并非所有业务规则都是源自用户明确反馈的明显避免项，有些则源自与特定项目无直接关系的明确反馈。在考虑提供推荐时，包含各种各样的避免项非常重要。\n\
    \n为了简单起见，假设你正在构建一个时尚推荐系统。更微妙的避免项示例如下：\n\n*已拥有的物品*\n这些是用户实际上只需要购买一次的物品——例如，用户通过你的平台购买过的服装，或告知你他们已经拥有的服装。创建一个*虚拟衣橱*可能是询问用户他们拥有什么物品的一种方式，以协助这些避免项。\n\
    \n*不喜欢的特征*\n这些是用户可以表示不感兴趣的物品特征。在入门问卷调查中，你可能会询问用户是否喜欢波点，或者他们是否有喜欢的配色方案。这些是明确表示的反馈，可用于避免项。\n\
    \n*被忽略的类别*\n这是一个与用户不产生共鸣的物品类别或分组。这可能是隐式的，但在主要推荐模型之外学习到的。也许用户从未点击过你电子商务网站上的连衣裙类别，因为他们不喜欢穿连衣裙。\n\
    \n*低质量物品*\n随着时间的推移，你会了解到某些物品对大多数用户来说就是低质量的。你可以通过高退货率或买家低评分来检测到这一点。这些物品最终应该从库存中移除，但与此同时，将它们作为所有匹配信号较弱的用户的避免项非常重要。\n\
    \n这些额外的避免项可以在服务阶段轻松实现，甚至可以包括简单的模型。训练线性模型来捕获其中一些规则，然后在服务期间应用它们，可以成为提高排名的有用且可靠的机制。请注意，小型模型推理速度非常快，因此将它们包含在管道中通常不会产生太大的负面影响。对于更大规模的行为趋势或高阶因素，我们期望我们的核心推荐模型能够学习这些概念。\n\
    \n## 手动调整权重\n\n在避免项谱系的另一端是*手动调整排序*。这种技术在搜索排名的早期很流行，当时人们会使用分析和观察来确定他们认为排名中最重要的特征，然后设计一个多目标排序器。例如，花店在五月初可能会排名更高，因为许多用户在搜索母亲节礼物。由于可能有许多可变元素需要跟踪，这类方法扩展性不佳，在现代推荐排名中已基本不再被重视。\n\
    \n然而，手动调整排序作为*避免项*可能非常有用。虽然从技术上讲它不是避免项，但我们有时仍然这样称呼它。实践中的一个例子是，知道新用户在学习你的运输是否可靠时，喜欢从价格较低的物品开始。一个有用的技术是在第一次订单之前提升低价物品的排名。\n\
    \n虽然考虑构建手动调整排序可能感觉不太好，但重要的是不要排除这种技术。它有一席之地，通常是一个很好的起点。这种技术的一个有趣的人机协作应用是专家手动调整排序。回到我们的时尚推荐系统，一位风格专家可能知道今年夏天的流行色是淡紫色，尤其是在年轻一代中。如果专家为合适年龄画像的用户提升这些淡紫色物品的排名，这可以积极地影响用户满意度。\n\
    \n## 库存健康度\n\n硬性排序的一个独特且有些争议的方面是库存健康度。*库存健康度*难以定义，它估计现有库存满足用户需求的程度。\n\n让我们快速看一下定义库存健康度的一种方法，通过亲和度分数和预测。我们可以通过利用需求预测来做到这一点，这是一种极其强大且流行的优化业务的方式：在接下来的*N*个时间段内，每个类别的预期销售额是多少？构建这些预测模型超出了本书的范围，但核心思想在Rob\
    \ Hyndman和George Athanasopoulos的著名著作《预测：原理与实践》（Otexts）中得到了很好的阐述。为了我们的讨论，假设你能够大致估算出下个月将售出的袜子数量，按尺寸和用途类型细分。这可以为你应该备货的各种类型袜子的数量提供一个非常有用的估算。\n\
    \n然而，事情不止于此；库存可能是有限的，在实践中，库存通常是销售实物商品企业的主要约束。考虑到这一点，我们必须转向市场需求的另一面。如果我们的需求超过了我们的可用性，我们最终会让无法获得所需物品的用户失望。\n\
    \n让我们以销售百吉饼为例；你已经计算了罂粟籽、洋葱、阿西亚戈奶酪和鸡蛋的平均需求。在任何一天，许多顾客会来购买百吉饼，心中有明确的偏好，但你是否有足够的那种百吉饼？你没有卖出的每一个百吉饼都是浪费；人们喜欢新鲜的百吉饼。这意味着你推荐给每个人的百吉饼取决于良好的库存。有些用户不那么挑剔；他们可以接受两三种选择中的任何一种，并且同样满意。在这种情况下，最好给他们另一个百吉饼选项，并将最低库存留给挑剔的人。这是一种称为*优化*的模型改进，它有大量的技术。我们不会深入探讨优化技术，但关于数学优化或运筹学的书籍将提供方向。Mykel\
    \ J. Kochenderfer和Tim A. Wheeler的《优化算法》（MIT Press）是一个很好的起点。\n\n库存健康度与硬性排序紧密相关，因为将库存管理作为推荐的一部分是一个极其重要且强大的工具。最终，库存优化会降低推荐的感知性能，但通过将其作为业务规则的一部分，你的业务和推荐系统的整体健康度会得到改善。这就是为什么它有时被称为*全局优化*。\n\
    \n这些方法引发激烈讨论的原因是，并非所有人都同意为了“更大的利益”而降低某些用户的推荐质量。市场健康度和平均满意度是有用的考虑指标，但要确保它们与整个推荐系统的北极星指标保持一致。\n\
    \n## 实现避免项\n\n处理避免项的最简单方法是通过下游过滤。为此，你需要在推荐从排序器传递给用户之前，为用户应用避免项规则。实现这种方法看起来像这样：\n\
    \n```python\nimport pandas as pd\n\ndef filter_dataframe(df: pd.DataFrame, filter_dict:\
    \ dict):\n    \"\"\"\n    Filter a dataframe to exclude rows where columns have\
    \ certain values.\n\n    Args:\n        df (pd.DataFrame): Input dataframe.\n\
    \        filter_dict (dict): Dictionary where keys are column names\n        and\
    \ values are the values to exclude.\n\n    Returns:\n        pd.DataFrame: Filtered\
    \ dataframe.\n    \"\"\"\n    for col, val in filter_dict.items():\n        df\
    \ = df.loc[df[col] != val]\n    return df\n\nfilter_dict = {'column1': 'value1',\
    \ 'column2': 'value2', 'column3': 'value3'}\n```"

  md: 'long-tailed words, we want them to map to the same value of *embedding_id*
    if we can help it.


    One cheap way of computing a feature from a word is called *min-hashing*: we find
    4 consecutive bytes of a word, compute the hash of these bytes, and find the minimum
    hash of the overlapping 4 bytes. This process makes it more likely to relate *z*e*b*r*a*
    *h*a*s*h*e*s* to zebras. This feature is then used to represent these sets of
    words as an equivalence class. All words that hash to the same MinHash value are
    in the same equivalence class. This allows us to handle any new long-tailed word
    naturally for the time being until a new dictionary is built. It might result
    in undesirable mistakes in certain applications, but for other applications where
    it might be safe to do so, a feature-based representation of an item might be
    mixed into an embedding system as we have done.


    Another alternate way to get feature embeddings is to train an autoencoder or
    some kind of embedding representation that is learned off the features of the
    item so that the recommender might generalize to new, unseen items. However, for
    the sake of simplicity and in this word embedding case, we simply use the MinHash
    for ease of understanding. The MinHash implementation can be seen at *wikipedia/token_dictionary.py*.


    # GloVE Model Definition


    For this section, please refer to the code at *train_coccurence.py*.


    Suppose we have tokens *i* and *j* from the token dictionary. We know that they
    have co-occurred with each other *N* times. We want to somehow generate an embedding
    space such that the vectors *x(i)* * x(j)* are proportional to *log(N)*. The arguments
    for log count and the exact equation are derived in the “GloVe: Global Vectors
    for Word Representation” by Jeffrey Pennington et al. We will show just the derived
    result:


    *y_predicted = x(i)x(j) + bias(i) + bias(j)*


    Here, *x* is the embedding lookup. In the code, we use 64-dimensional vectors,
    which are not too small as to have insufficient capacity to represent the embedding
    space but are not too large that it would take up too much memory when we have
    an embedding for the entire dictionary. The bias terms are there to soak up the
    large counts from very popular items such as *the*, *a*, and *and* that co-occur
    with many other terms.'

    # Hybridization


    You saw in the previous section how to blend our MF with simpler models by taking
    priors from the simpler models and learning how to transition away. Coarser approaches
    to this process of *hybridization* exist:


    *Weighted combinations of models*

    This approach is incredibly powerful, and the weights can be learned in a standard
    Bayesian framework.


    *Multilevel modeling*

    This approach can include learning a model to select which recommendation model
    should be used, and then learning models in each regime. For example, we could
    use a tree-based model on user features when the user has fewer than 10 historical
    ratings and then use MF after that. A variety of multilevel approaches exist,
    including *switching* and *cascading*, which correspond roughly to voting and
    boosting, respectively.


    *Feature augmentation*

    This allows multiple vectors of features to be concatenated and a larger model
    to be learned. By definition, if we wish to combine feature vectors with factor
    vectors, like those coming from a CF, we will expect substantial nullity. Learning
    despite that nullity allows a somewhat naive combination of the different kinds
    of features to be fed into the model and operated on in all regimes of user activity.


    We can combine these models in a variety of useful ways. However, we take the
    position that instead of more complicated combinations of several models that
    work well in different paradigms, we will attempt to stick to a relatively straightforward
    model-service architecture by doing the following:


    +   - Training the best model we can by using MF-based CF

    - Using user and item feature-based models for cold start


    Let’s see why we think feature-based modeling might not be the best strategy,
    even if we do it via neural networks and latent factor models.


    # Limitations of Bilinear Models


    We started this chapter by describing *bilinear modeling* approaches, and immediately
    you should take warning—they’re linear relationships. You can immediately wonder,
    “Are there really linear relationships between the features of my users and items
    and the pairwise affinity?”


    The answer to this question might depend on the number of features, or it might
    not. Either way, skepticism is appropriate, and in practice the answer is overwhelmingly'
  - '[PAGE 177]


    no. You might think, “Well then, as it is a linear approximation, MF also cannot
    succeed,” but that’s not so clear-cut. In fact, MF suggests that the linear relationship
    is *between the latent factors*, not the actual features. This subtle difference
    makes a world of difference.


    One important callout before we move on to simpler ideas is that neural networks
    with nonlinear activation functions can be used to build feature-based methods.
    This domain has had some successes, but ultimately a surprising and important
    result is that **neural CF does not outperform matrix factorization**. This doesn’t
    suggest that there are no useful approaches for feature-based models utilizing
    MLPs, but it does defray some of our worries about MF being *too linear*. So why
    not use more feature-based approaches?


    The first most obvious challenge for content-based, demographic-based, and any
    other feature-based method is *getting the features*. Let’s consider the dual
    problems:


    *Features for users*

    If we want to collect features for users, we need to either ask them a series
    of queries or infer those features implicitly. Inferring these via exogenous signals
    is noisy and limited, but each query that we ask the user increases the likelihood
    of onboarding drop-off. When we think of user-onboarding funnels, we know that
    each additional prompt or question incurs another chance that the user will not
    complete the onboarding. This effect accumulates quickly, and without users making
    it through the funnel, the recommendation system won’t be very useful.


    *Features for items*

    On the flip side, creating features for items is a heavily manual task. While
    many businesses need to do this task to serve other purposes as well, it still
    incurs a significant cost in many cases. If the features are to be useful, they
    need to be of high quality, which incurs more debt. But most importantly, if the
    number of items is extremely large, the cost may quickly get out of reach. For
    large-scale recommendation problems, manually adding features is simply infeasible.
    This is where automatic feature-engineering models can help.


    Another significant issue in these feature-based models is *separability* or *distinguishability*.
    These models are not useful if the features cannot separate the items or users
    well. This leads to compounding problems as the cardinality increases.


    Finally, in many recommendation problems, we start with the assumption that taste
    or preference is extremely personal. We fundamentally believe that our interest
    in a book will have less to do with the number of pages and publication date than
    how it connects with us and our personal experience (*our deepest apologies to
    anyone who bought this book based on page number and publication date*). CF—while
    simple in concept—speaks better to these connections via a *shared experience
    network*.'
  - '[PAGE 178]


    # Counting Recommenders


    Here we will use the simplest feature type, simple counting. Counting the frequency
    and pairwise frequencies will provide a simple but useful set of initial models.


    # Return to the Most-Popular-Item Recommender


    Our super simple scheme from before, implementing the MPIR, provided us with a
    convenient toy model, but what are the practical considerations of deploying an
    MPIR? It turns out that the MPIR provides an excellent framework for getting started
    on a Bayesian approximation approach to recommendations. Note that in this section,
    we’re not even considering a personalized recommender; everything here is reward
    maximization across the entire user population. We follow the treatment in *Statistical
    Methods for Recommender Systems* by Deepak K. Agarwal and Bee-Chung Chen (Cambridge
    University Press).


    For the sake of simplicity, let’s consider *click-through rate (CTR)* as our simple
    metric to optimize. Our formulation is as follows: we have $\mathscr{I} = \{i\}$
    items available to recommend and initially *only one time period* in which to
    do it, and we’re interested in an *allocation plan*, or a set of proportions $x_i,
    \sum_{i \in \mathscr{I}} x_i = 1$, for how to recommend items. This can be seen
    as a very simple multiarmed bandit problem with the reward given by the following:


    $R(\mathbf{x}, \mathbf{c}) = \sum_{i \in \mathscr{I}} c_i^* (N * x_i)$


    Here, $c_i$ represents prior distributions of CTR for each item. It’s plain to
    see that maximizing this reward is achieved by allocating all recommendations
    to the item with greatest $p_i$, i.e., picking the most popular item in terms
    of CTR.


    This setup makes it obvious that if we have strong confidence in our priors, this
    problem seems trivial. So let’s move to a case where we have a mismatch in confidence.


    Let’s consider *two time periods*, $N_0$ and $N_1$, as indicating the number of
    user visits. Note that we think of 0 as the past and 1 as the future in this model.
    Let’s assume that we offer *only two items* and that, somewhat mysteriously, for
    one item we have 100% confidence in its CTR in each time period: $q_0$ and $q_1$
    will denote these rates, respectively. In contrast, we have only priors for our
    second item: $p_0 \sim \mathscr{P}(\theta_0)$ and $p_1 \sim \mathscr{P}(\theta_1)$
    will denote these rates, respectively, and we regard $\theta_i$ as a state vector.
    We again notate the allocations with $x_{i, t}$, where now the second index refers
    to time period. Then we can simply compute the expected number of clicks as follows:


    $\mathbb{E}[N_0 * x_0(p_0 - q_0) + N_1 * x_1(p_1 - q_1)] + q_0 N_0 + q_1 N_1$'
  - '[PAGE 179]


    This is maximized by assuming a distribution for $p_1$ as a function of $x_0$
    and $p_0$. With distributional assumptions that $p_0$ is gamma distributed and
    $p_1$ is normally distributed, we can treat this as a convex optimization problem
    to maximize the clicks. See *Statistical Methods for Recommender Systems* for
    a full treatment of the statistics.


    This toy example extends in both dimensions to model larger item sets and more
    time windows and provides us with relatively straightforward intuition about the
    relationship between our priors for each item and time step during this step-forward
    optimization.


    Let''s put this recommender in context: we''ve started with item popularity and
    generalized to a Bayesian recommender that learns with respect to user feedback.
    You might consider a recommender like this for a very trend-based recommendations
    context like news; popular stories are often important, but that can change rapidly,
    and we want to be learning from user behavior.


    # Correlation Mining


    We''ve seen ways to use correlations between features of items and recommendations,
    but we should not forget to use correlations between items themselves. Think back
    to our early discussions of cheese in Chapter 2 (Figure 2-1); we said that our
    CF gave us a way to find mutual cheese tastes to recommend new cheeses. This was
    built on the notion of ratings, but we can abstract away from the ratings and
    simply look at the correlations of items a user chooses. You can imagine for an
    ecommerce bookseller that a user''s choice of one book to read may be useful in
    recommending others—even if that user chooses not to rate the first book. We also
    saw this phenomena in Chapter 8 as we used the co-occurrence of tokens in Wikipedia
    entries.


    We introduced the co-occurrence matrix as the multidimensional array of counts
    where two items, $i$ and $j$, co-occur. Let''s take a moment to discuss co-occurrence
    a bit more deeply.


    Co-occurrence is context dependent; for our Wikipedia articles, we considered
    co-occurrence of tokens in an article. In the case of ecommerce, co-occurrence
    can be two items purchased by the same user. For ads, co-occurrence can be two
    things that the user clicked, and so on. Mathematically, given users and items,
    we construct an *incidence vector* for each user, the binary vector of one-hot
    encoded features for each item that they interacted with. Those vectors are stacked
    into a vector to yield a # $(users) \times \# (items)$ matrix in which each row
    is a user, each column is an item, and the elements equal 1 when a user-item pair
    has interacted.


    To be mathematically precise, a *user-item incidence structure* is a collection
    of sets of user interactions, $\{y_u\}_{u \in U}$, with items $\{x_i\}_{i \in
    I}$, where $U$ indexes users and $I$ indexes items.'

  md: '# Data Representation


    The first choice of technology we need to make will determine how we represent
    the data. Some of the choices are as follows:


    +   - Protocol buffers

    - Apache Thrift

    - JSON

    - XML

    - CSV


    In this implementation, we''re mostly using protocol buffers because of the ease
    of specifying a schema and then subsequently serializing and deserializing it.


    > ## Protocol Buffers


    Before protocol buffers were invented, people used to store their binary data
    in all sorts of custom formats that involved various syntax and specifications
    (like starting a file with a magic number, followed by rules on how to parse and
    store various data types like integers, strings, bytes, and floating-point numbers).
    Protocol buffers unified the storage of custom binary data by allowing users to
    specify a schema, or a named representation of each field and the type of each
    field (like `first_name` being a string and age being an integer). This enables
    us to easily read and write structured data in a binary format, and the parsing
    of the data is handled automatically by the protocol buffer library.


    For the file format, we''re using serialized protocol buffers that are uuencoded
    and written as a single line per record and then bziped up for compression. This
    is just for convenience so that we can parse the files easily without having dependencies
    on too many libraries. Your company might instead store data in a data warehouse
    that is accessible by SQL, for example.


    Protocol buffers are generally easier to parse and handle than raw data. In our
    implementation, we will parse the Wikipedia XML into protocol buffers for easier
    handling using `xml2proto.py`. You can see from the code that XML parsing is a
    complicated affair, whereas protocol buffer parsing is as simple as calling the
    `ParseFromString` method, and all the data is then subsequently available as a
    convenient Python object.


    As of June 2022, the Wikipedia dump is about 20 GB in size, and converting to
    protocol buffer format takes about 10 minutes. Please follow the steps described
    in the README in the GitHub repo for the most up-to-date steps to run the programs.'
  merge: -1

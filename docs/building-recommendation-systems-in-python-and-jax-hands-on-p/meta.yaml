  md: '# About the Authors


    **Bryan Bischof** leads AI at Hex and is an adjunct professor in the Rutgers University
    Business Analytics master’s program, where he teaches data science. Previously,
    he was the head of data science at Weights & Biases and built the DS, ML, and
    data engineering teams. He has built recommendation systems for clothing (at Stitch
    Fix), recommendation systems for technical blog posts (at Weights & Biases), and
    the world’s first recommendation system for coffee (at Blue Bottle Coffee); currently,
    he is building recommendation systems for AI agents. His research interests are
    in geometric methods for ML, including higher-order graph methods and topological
    methods. His data visualization work appears in the popular book *The Day It Finally
    Happens* by Mike Pearl. His Ph.D. is in pure mathematics. You can find Bryan on
    LinkedIn at [bryan-bischof](https://www.linkedin.com/in/bryan-bischof) and on
    Twitter at [@bebischhof](https://twitter.com/bebischhof).


    **Hector Yee** is a staff software engineer at Google, where he has worked on
    multiple projects including creating the first content-based ranker on Image Search
    and self driving car perception. He also worked on the YouTube recommender system
    and was part of the team that won a technical Emmy Award for their work on personalized
    video ranking technology. He has an M.S. in computer graphics. You can find Hector
    on LinkedIn at [yecheetor](https://www.linkedin.com/in/yecheetor) and on Twitter
    at [@eigenhector](https://twitter.com/eigenhector).


    # Colophon


    The animal on the cover of *Building Recommendation Systems in Python and JAX*
    is a European goldfinch (*Carduelis carduelis*). Known for its colorful feathers,
    this passerine bird (or perching bird) can be found in the open, wooded lowlands
    of Europe, North Africa, and western and central Asia. It has been introduced
    to many other countries over the years, including the United States, Canada, Mexico,
    Peru, Argentina, Australia, and New Zealand. In particular, within the United
    States, they have established their homes in the western Great Lakes region.


    The average European goldfinch is about 4.7–5.1 inches (12–13 centimeters) long,
    with a wingspan of 8.3–9.8 inches (21–25 centimeters); it weighs roughly 0.5–0.67
    ounces. Male and female European goldfinches are similar in appearance, with a
    red face, black and white head, black and yellow wings, white underparts, and
    medium-brown upper parts. However, on closer inspection, male European goldfinches
    can be distinguished by a larger, darker patch of red on their face, and black
    feathers on their shoulders (whereas the feathers on a female are brown). After
    breeding season, European goldfinches shed their old feathers to make way for
    new growth; molt birds appear less colorful at first, but they regain their colors
    once their feathers regrow.


    In terms of diet, European goldfinches prefer small seeds from thistles, cornflowers,
    and teasels; insects are mostly given to their young. These birds are also known
    to regularly visit residential gardens in Europe and North America, attracted
    by the'
  merge: -1
  pgno: 352
- img_proc: true
  md: 'bird feeders that contain seeds. Because of their pleasant songs, European
    goldfinches are commonly trapped and bred in captivity; there have been wildlife
    conversation attempts to limit bird trapping and the destruction of open space
    habitats to protect European goldfinches.


    Many of the animals on O’Reilly covers are endangered; all of them are important
    to the world.


    The cover illustration is by Karen Montgomery, based on an antique line engraving
    from *British Birds*. The cover fonts are Gilroy Semibold and Guardian Sans. The
    text font is Adobe Minion Pro; the heading font is Adobe Myriad Condensed; and
    the code font is Dalton Maag’s Ubuntu Mono.'

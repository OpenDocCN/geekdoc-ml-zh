  md: '# CHAPTER 4


    # System Design for Recommending


    Now that you have a foundational understanding of how recommendation systems work,
    let’s take a closer look at the elements needed and at designing a system that
    is capable of serving recommendations at industrial scale. *Industrial scale*
    in our context will primarily refer to *reasonable scale* (a term introduced by
    Ciro Greco, Andrea Polonioli, and Jacopo Tagliabue in “ML and MLOps at a Reasonable
    Scale”)—production applications for companies with tens to hundreds of engineers
    working on the product, not thousands.


    In theory, a recommendation system is a collection of math formulas that can take
    historical data about user-item interactions and return probability estimates
    for a user-item-pair’s affinity. In practice, a recommendation system is 5, 10,
    or maybe 20 software systems, communicating in real time and working with limited
    information, restricted item availability, and perpetually out-of-sample behavior,
    all to ensure that the user sees *something*.


    This chapter is heavily influenced by “System Design for Recommendations and Search”
    by Eugene Yan and “Recommender Systems, Not Just Recommender Models” by Even Oldridge
    and Karl Byleen-Higley.


    # Online Versus Offline


    ML systems consist of the stuff that you do in advance and the stuff that you
    do on the fly. This division, between online and offline, is a practical consideration
    about the information necessary to perform tasks of various types. To observe
    and learn large-scale patterns, a system needs access to lots of data; this is
    the offline component. Performing inference, however, requires only the trained
    model and relevant input data. This is why many ML system architectures are structured
    in this'
  merge: -1
  pgno: 62
- img_proc: true
  md: 'way. You’ll frequently encounter the terms *batch* and *real-time* to describe
    the two sides of the online-offline paradigm (Figure 4-1).


    ![](img/da17d05291861831978609329c481581_63_0.png)


    *Figure 4-1. Real-time versus batch*


    A *batch process* does not require user input, often has longer expected time
    periods for completion, and is able to have all the necessary data available simultaneously.
    Batch processes often include tasks like training a model on historical data,
    augmenting one dataset with an additional collection of features, or transforming
    computationally expensive data. Another characteristic you see more frequently
    in batch processes is that they work with the full relevant dataset involved,
    not only an instance of the data sliced by time or otherwise.


    A *real-time process* is carried out at the time of the request; said differently,
    it is evaluated during the inference process. Examples include providing a recommendation
    upon page load, updating the next episode after the user finishes the last, and
    re-ranking recommendations after one has been marked *not interesting*. Real-time
    processes are often resource constrained because of the need for rapidity, but
    like many things in this domain, as the world’s computational resources expand,
    we change the definition of resource constrained.


    Let’s return to the components introduced in Chapter 1—the collector, ranker,
    and server—and consider their roles in offline and online systems.


    # # Collector


    The collector’s role is to know what is in the collection of items that may be
    recommended and the necessary features or attributes of those items.


    # ## Offline Collector


    The *offline collector* has access to and is responsible for the largest datasets.
    Understanding all user-item interactions, user similarities, item similarities,
    feature stores for users and items, and indices for nearest-neighbor lookup are
    all under the purview of the offline collector. The offline collector needs to
    be able to access the'
  merge: -1
  pgno: 63
- img_proc: true
  md: 'relevant data extremely fast, and sometimes in large batches. For this purpose,
    offline collectors often implement sublinear search functions or specifically
    tuned indexing structures. They may also leverage distributed compute for these
    transformations.


    It’s important to remember that the offline collector not only needs access and
    knowledge of these datasets but will also be responsible for writing the necessary
    downstream datasets to be used in real time.


    # Online Collector


    The *online collector* uses the information indexed and prepared by the offline
    collector to provide real-time access to the parts of this data necessary for
    inference. This includes techniques like searching for nearest neighbors, augmenting
    an observation with features from a feature store, and knowing the full inventory
    catalog. The online collector will also need to handle recent user behavior; this
    will become especially important when we see sequential recommenders in [Chapter
    17](#).


    One additional role the online collector may take on is encoding a request. In
    the context of a search recommender, we want to take the query and encode it into
    the *search space* via an embedding model. For contextual recommenders, we need
    to encode the context into the *latent space* via an embedding model also.


    ![](img/da17d05291861831978609329c481581_64_0.png)


    **Embedding Models**


    One popular subcomponent in the collector’s work will involve an embedding step;
    see *Machine Learning Design Patterns* by Valliappa Lakshmanan et al. (O’Reilly).
    The embedding step on the offline side involves both training the embedding model
    and constructing the latent space for later use. On the online side, the embedding
    transformation will need to embed a query into the right space. In this way, the
    embedding model serves as a transformation that you include as part of your model
    architecture.


    # Ranker


    The ranker’s role is to take the collection provided by the collector, and order
    some or all of its elements according to a model for the context and user. The
    ranker actually gets two components itself, the filtering and the scoring.


    *Filtering* can be thought of as the coarse inclusion and exclusion of items appropriate
    for recommendation. This process is usually characterized by rapidly cutting away
    a lot of potential recommendations that we definitely don’t wish to show. A trivial
    example is not recommending items we know the user has already chosen in the past.


    *Scoring* is the more traditional understanding of ranking: creating an ordering
    of potential recommendations with respect to the chosen objective function.'

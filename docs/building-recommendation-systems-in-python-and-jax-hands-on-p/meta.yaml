  md: '# Page loads


    When you first load up Bookshop.org, it starts with items on the page. The Best
    Sellers of the Week are all clickable images to those book listings. Despite the
    user having no choice in loading this initial page, it’s actually quite important
    to log the contents of this initial page load.


    These options represent the population of books that the user has seen. If a user
    has seen an option, they have the opportunity to click it, which will ultimately
    be an important implicit signal.


    ![](img/da17d05291861831978609329c481581_40_0.png)


    # Propensity Scores


    The consideration of the population of all items a user has seen is deeply tied
    to propensity score matching. In mathematics, *propensity scores* are the probability
    that an observational unit will be assigned to the treatment group versus the
    control group.


    Compare this setup to the simple 50-50 A/B test: every unit has a 50% chance of
    being exposed to your treatment. In a feature-stratified A/B test, you purposely
    change the probability of exposure dependent on a certain feature or collection
    of features (often called *covariates* in this context). Those probabilities of
    exposure are the propensity scores.


    Why bring up A/B testing here? Later, we’ll be interested in mining our soft ratings
    for signal on user preference, but we must consider the possibility that the lack
    of a soft rating is not an implicit bad rating. Thinking back to the cheeses:
    taster *D* never had a chance to rate *brie*, so there’s no reason to think *D*
    has a preference for aversion on *brie*. This is because *D* was not exposed to
    *brie*.


    Now thinking back to Bookshop.org: the landing page does not show *The Hitchhiker’s
    Guide to the Galaxy*, so the user has no way to click it and implicitly communicate
    interest in that book. The user could use the search option, but that’s a different
    kind of signal—which we’ll talk about later and is, in fact, a much stronger signal.


    When understanding implicit ratings like “did the user look at something,” we
    need to properly account for the entire population of choices they were exposed
    to, and use the inverse of that population size to weigh the importance of clicking.
    For this reason, understanding *all* page loads is important.


    # Page views and hover


    Websites have gotten much more complicated, and now users must contend with a
    variety of interactions. Figure 2-3 demonstrates what happens if the user clicks
    the right arrow in the Best Sellers of the Week carousel and then moves their
    mouse over the Cooking at Home option.'

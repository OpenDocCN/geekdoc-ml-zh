    \ to return the outputs as another batch dimension as axis 0. This allows us to\
    \ efficiently and simply write code for lower-dimensional tensors and obtain a\
    \ function that can operate on higher-dimensional tensors by vmapping over the\
    \ extra axes. Conceptually, it would be as if we looped over the first dimension\

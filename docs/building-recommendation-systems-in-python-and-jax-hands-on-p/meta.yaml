    \ *矩阵补全*。\n\n在创造满足用户需求的用户体验与建模这些数据和需求的数学公式之间来回切换，正是推荐系统的核心所在。\n\n## 用户-用户与物品-物品协同过滤\n\
    \n在深入探讨线性代数之前，让我们先考虑一种纯粹的数据科学视角，称为 *协同过滤*（CF），这个术语最初由 David Goldberg 等人在其1992年的论文《使用协同过滤编织信息挂毯》中使用。\n\
    \n协同过滤的基本思想是，品味相似的人可以帮助其他人了解他们喜欢什么，而无需亲自尝试。*协同* 这个术语最初意指在品味相似的用户之间进行，而 *过滤* 最初意指过滤掉人们不会喜欢的选择。\n\
    \n你可以从两个方面来理解这种协同过滤策略：\n\n-   两个品味相似的用户将继续保持相似的品味。\n-   两个拥有相似用户粉丝的物品将继续受到与这些粉丝相似的其他用户的欢迎。\n\
    \n这些听起来可能相同，但在数学解释中它们表现不同。从高层次来看，区别在于决定你的推荐系统应该优先考虑哪种相似性：用户相似性还是物品相似性。\n\n如果你优先考虑\
    \ *用户相似性*，那么要为用户 *A* 提供推荐，你需要找到一个相似的用户 *B*，然后从 *B* 喜欢的内容列表中选择一个 *A* 尚未见过的推荐项。\n\
    \n如果你优先考虑 *物品相似性*，那么要为用户 *A* 提供推荐，你需要找到一个 *A* 喜欢的物品，*山羊奶酪*，然后找到一个与 *山羊奶酪* 相似且\
    \ *A* 尚未见过的物品，*埃门塔尔奶酪*，并将其推荐给 *A*。\n\n稍后我们将更深入地探讨相似性，但让我们先快速将这些概念与我们之前的讨论联系起来。*相似用户*\
    \ 是用户-物品矩阵中作为向量相似的行；*相似物品* 是用户-物品矩阵中作为向量相似的列。\n\n![](img/da17d05291861831978609329c481581_36_0.png)\n\
    \n**向量相似性**\n\n*点积相似性* 在第10章中有更精确的定义。目前，可以认为相似性是通过归一化向量然后计算它们的余弦相似性来得出的。对于任何你已将其关联到向量（数字列表）的实体，*向量相似性*\
    \ 比较哪些实体在由这些数字列表（称为 *潜在空间*）捕获的特征方面最为相似。\n\n## Netflix 挑战赛\n\n2006年，Netflix 发起了一项名为\
    \ Netflix Prize 的在线竞赛。这项竞赛挑战参赛团队在 Netflix 作为开源发布的一个数据集上，改进其协同过滤算法的性能。虽然如今通过 Kaggle\
    \ 网站或会议举办此类竞赛已很常见，但在当时，对于那些对推荐系统感兴趣的人来说，这非常令人兴奋且新颖。\n\n该竞赛包含几个中间轮次，颁发了进展奖，最终的\
    \ Netflix Prize 于2009年颁发。提供的数据是2,817,131个三元组的集合，包含（用户，电影，评分日期）。其中一半还额外包含了评分本身。请注意，正如我们之前的例子所示，用户-物品信息几乎足以定义问题。在这个特定数据集中，提供了日期。稍后，我们将深入探讨时间如何成为一个因素，特别是对于序列推荐系统。\n\
    \n这场比赛的赌注相当高。击败内部性能的要求是将均方根误差（RMSE）提高10%；我们稍后将讨论这个损失函数。而奖金总额超过110万美元。最终的获胜者是 BellKor's\
    \ Pragmatic Chaos（顺便提一下，他们也赢得了之前的两个进展奖），测试 RMSE 为0.8567。最终，仅因为提前20分钟提交，BellKor\
    \ 才领先于竞争对手 The Ensemble。\n\n要详细了解获胜提交方案，请查阅 Andreas Töscher 和 Michael Jahrer 的《The\
    \ BigChaos Solution to the Netflix Grand Prize》以及同一作者的《The Big-Chaos Solution\
    \ to the Netflix Prize 2008》。同时，让我们回顾一下这次竞赛的几个重要教训：\n\n首先，我们看到我们讨论过的用户-物品矩阵在这些解决方案中作为关键的数学数据结构出现。模型选择和训练很重要，但参数调优在几种算法中带来了巨大的改进。我们将在后面的章节中回到参数调优。作者指出，一些模型创新来自于反思业务用例和人类行为，并试图在模型架构中捕捉这些模式。接下来，线性代数方法产生了第一个性能尚可的解决方案，而在此基础上构建则产生了获胜模型。最后，为了达到\
    \ Netflix 最初要求的赢得比赛所需的性能提升花了太长时间，以至于业务环境发生了变化，该解决方案不再有用。\n\n最后一点可能是机器学习开发者需要了解的关于推荐系统的\
    \ *最重要* 的事情；请参阅以下提示。\n\n![](img/da17d05291861831978609329c481581_37_0.png)\n\n\
    **从简单开始**\n\n快速构建一个可用的工作模型，并在模型仍然与业务需求相关时进行迭代。\n\n## 软评分\n\n在我们的奶酪品尝例子中，每种奶酪要么获得了数字评分，要么没有被客人尝试。这些是\
    \ *硬评分*：无论奶酪是布里奶酪还是山羊奶酪，评分都是明确的，而评分的缺失表示用户与物品之间缺乏互动。在某些情况下，我们需要处理用户确实与物品互动但未提供评分的数据。\n\
    \n一个常见的例子是电影应用；用户可能通过该应用观看了一部电影，但没有提供星级评分。这表明该物品（在这种情况下是电影）已被观察到，但我们没有评分供算法学习。然而，我们仍然可以使用这些隐式数据来执行以下操作：\n\
    \n-   在未来的推荐中排除此物品\n-   在我们的学习器中将此数据作为一个单独的项使用\n-   分配一个默认评分值，表示“有趣到足以观看，但不重要到需要评分”\n\
    \n事实证明，隐式评分对于训练有效的推荐系统至关重要，不仅因为用户通常不给出硬评分，还因为隐式评分提供了不同层次的信号。稍后，当我们希望训练多层模型来预测点击可能性和购买可能性时，这两个层次将被证明极其重要。\n\
    \n总结如下：\n\n-   当用户直接响应关于物品的反馈提示时，就会产生 *硬评分*。\n-   当用户的行为在没有响应直接提示的情况下隐式传达了对物品的反馈时，就会产生\
    \ *软评分*。\n\n## 数据收集与用户日志\n\n我们已经确定我们可以从显式评分和隐式评分中学习，那么我们如何以及从哪里获得这些数据呢？要深入探讨这一点，我们需要开始关注应用程序代码。在许多企业中，数据科学家和机器学习工程师与软件工程师是分开的，但使用推荐系统需要这两个职能之间的协调。"

  - '[PAGE 318]


    # Attention Architectures


    A term that is commonly associated with neural networks and that may ring a bell
    for you by now is *attention*. This is because transformers, in particular the
    kind that appear in large language models (LLMs) like the generalized pretrained
    transformer, have become a central focus among AI users.


    We will give an extremely brief, and less technical, introduction to self-attention
    and the transformer here. For a more complete guide on transformers, consult the
    excellent overview in "Transformers from Scratch" by Brandon Rohrer.


    First, let''s state the key differentiating assumption about a transformer model:
    the embeddings are positional. We''re hoping to learn not only one embedding for
    every item but also an embedding for every item-position pair. Therefore, when
    an article is the first in a session and the last in a session, those two instances
    are treated as *two separate items*.


    Another important notion is stacking. When building transformers, we often think
    of the architecture as a layer cake, with sections stacked on top of one another.
    The key components are the embeddings, the self-attention layer, the skip-addition,
    and the feed-forward layer. The most complicated operations happen in self-attention,
    so let''s focus on that first. We just discussed the positional embeddings, which
    are sent as a sequence of these embedding vectors; recall that a transformer is
    a sequence-to-sequence model! The skip-addition means that we push the embedding
    forward *around* the self-attention layer (and the feed-forward layer above) and
    add it to the positional output of the attention layer. The feed-forward layer
    is an unexciting multilayer perceptron that stays in the positional columns and
    uses a ReLU or GeLU activation.


    ![](img/da17d05291861831978609329c481581_318_0.png)


    # ReLU Versus GeLU


    ReLU (Rectified Linear Unit) is an activation function defined as $f(x) = \max(0,
    x)$. GeLU (Gaussian Error Linear Unit) is another activation function approximated
    as $f(x) = 0.5x\left(1 + \tanh\left(\sqrt{\frac{2}{\pi}}(x + 0.044715x^3)\right)\right)$,
    inspired by the Gaussian cumulative distribution function. The intuition behind
    GeLU is that it tends to allow small values of $x$ to pass through while smoothly
    saturating extreme values, potentially enabling better gradient flow for deep
    models. Both functions introduce nonlinearity in neural networks, with GeLU often
    demonstrating improved learning dynamics over ReLU in certain contexts.'
  - '[PAGE 319]


    Here are some quick tips on self-attention:


    +   - The idea behind self-attention is that everything in the sequence affects
    everything else, in some manner.

    - The self-attention layer is learning four weight matrices per head.

    - The heads are in 1-1 correspondence with the sequence length.

    - We often call the weight matrices $Q, K, O, V$. Both $Q$ and $K$ get crossed
    with the positional embedding, but $O$ and $V$ are first crossed into an embedding-dimension-sized
    square matrix before dotting with the embedding. $Q\dot{E}$ and $K\dot{E}$ multiply
    to create the eponymous *attention* matrix, over which we take a row-wise softmax
    to get the attention vector.

    - Some normalizations exist, but we''ll disregard them as inessential for understanding.


    When we want to speak accurately but briefly about attention, we usually say,
    “It takes a sequence of positional embeddings and mushes them all together to
    learn how they’re related.”


    # Self-Attentive Sequential Recommendation


    **SASRec** is the first transformer model we’ll consider. This autoregressive
    sequential model (similar to a causal language model) predicts the next user interaction
    from past user interactions. Inspired by the success of the transformer models
    in sequential mining tasks, the self-attention-based architecture is used for
    sequential recommendation.


    When we say that the SASRec model is trained in an autoregressive manner, we mean
    that the self-attention is allowed to attend to only the earlier positions in
    the sequence; looking into the future is not permitted. In terms of the mushing
    we referenced earlier, think of this as only mushing forward the influence. Some
    people call this “causal” because it respects the causal arrow of time. The model
    also allows for a learnable positional encoding, which means that the updates
    carry down to the embedding layer. This model uses two transformer blocks.


    # BERT4Rec


    Inspired by the BERT model in NLP, **BERT4Rec** improves upon SASRec by training
    a bidirectional masked sequential (language) model.


    While BERT uses a masked language model for pretraining word embeddings, BERT4Rec
    uses this architecture to train end-to-end recommendation systems. It tries to
    predict the masked items in the user-interaction sequence. Similar to the original
    BERT model, the self-attention is bidirectional: it can look at both past and'
  - '[PAGE 320]


    future interactions in the action sequence. To prevent leakage of future information
    and to emulate the realistic settings, only the last item in the sequence is masked
    during inference. Using item masking, BERT4Rec outperforms SASRec. However, a
    drawback of the BERT4Rec model is that it is quite compute intensive and requires
    much more training time.


    # Recency Sampling


    Sequential recommendation and the adoption of transformer architecture in these
    tasks has seen a lot of interest recently. These deep neural network models like
    BERT4Rec and SASRec have shown improved performance over traditional approaches.
    However, these models suffer from slow training problems. A recently published
    paper—ha ha, get it—addresses the question of improving training efficiency while
    achieving state-of-the-art performance. See “Effective and Efficient Training
    for Sequential Recommendation Using Recency Sampling” by Aleksandr Petrov and
    Craig Macdonald for details.


    The two training paradigms we’ve just described for sequential models are autoregressive,
    which tries to predict the next item in the user-interaction sequence, and masked,
    which tries to predict masked items in the interaction sequence. The autoregressive
    approach doesn’t use the beginning of the sequence as labels in the training process,
    and thus valuable information is lost. The masked approach, on the other hand,
    is only weakly related to the end goal of the sequential recommendation.


    The paper by Petrov and Macdonald proposes a recency-based sampling of positive
    examples from the sequences to build the training data. The sampling is designed
    to give more recent interactions higher chances of being sampled. However, because
    of the probabilistic nature of the sampling mechanism, even the oldest of the
    interactions have nonzero chances of being chosen. An exponential function is
    employed as a sampling routine that interpolates between the masking-based sampling,
    where each interaction has equal probability of being sampled, and autoregressive
    sampling, where items from the end of the sequence are sampled. This showed superior
    performance in sequential recommendation tasks while requiring much less training
    time. Compare this approach to some of the other examples where we saw sampling
    provide significant improvements in training recommender systems!


    # Merging Static and Sequential


    Pinterest recently released “Rethinking Personalized Ranking at Pinterest: An
    End-to-End Approach” by Jiajing Xu et al. describing its personalized recommendation
    system, which is built to leverage raw user actions. The recommendation task is
    decomposed into modeling users’ long-term and short-term intentions.'
  - '[PAGE 321]


    The process of comprehending long-term user interests is accomplished by training
    an end-to-end embedding model, referred to as PinnerFormer, to learn from a user''s
    historical actions on the platform. These actions are subsequently transformed
    into user embeddings, which are designed for optimization based on anticipated
    long-term future user activities.


    This procedure employs an adapted transformer model to operate on users'' sequential
    actions with the intent to forecast their long-term future activities. Each user''s
    activity is compiled into a sequence, encompassing their actions over a specific
    time window, such as one year. The graph neural network-based (GNN-based) PinnerSage
    embeddings, in conjunction with relevant metadata (for example, the type of action,
    the timestamp, and so forth), are used to add features to each action in the sequence.


    Distinct from traditional sequential modeling tasks and sequential recommendation
    systems, PinnerFormer is designed to predict extended future user activities rather
    than the immediately subsequent action. This objective is achieved by training
    the model to foresee a user''s positive future interactions over a window of 14
    days following the embedding''s generation. In comparison, traditional sequential
    models would anticipate only the subsequent action.


    This alternate approach allows for the embedding generation to occur offline in
    a batch-processing mode, resulting in significant reductions in infrastructure
    needs. In contrast to most traditional sequential modeling systems, which operate
    in real time and incur substantial computational and infrastructure costs, these
    embeddings can be produced in batches (for instance, on a daily basis) rather
    than every time a user performs an action.


    A dense all-action loss is introduced in this methodology to facilitate batch
    training of the model. The objective here is not to predict the immediate next
    action but rather all the actions the user will undertake over the subsequent
    $k$ days. The aim is to predict all occurrences of a user''s positive interactions
    at intervals such as $T + 3$, $T + 8$, and $T + 12$, thereby compelling the system
    to learn long-term intentions. While traditionally the last action''s embedding
    is used to make the prediction, the dense all-action loss employs randomly selected
    positions in the action sequence, and the corresponding embedding is used to predict
    all actions for each of those positions.


    Based on offline and online experimental results, the use of dense all-action
    loss to train for long-term user actions has significantly bridged the gap between
    batch generation and real-time generation of user embeddings. Moreover, to accommodate
    users'' short-term interests, the transformer model retrieves the most recent
    actions for each user in real time, processing them along with the long-term user
    embeddings.'
- md: '## Summary


    Transformers and sequential recommendation systems are really at the cutting edge
    of modern recommenders. These days, most research in recommendation systems is
    in the area of sequential datasets, and the hottest recommenders are using longer
    and longer sequences for prediction. Two important projects are worthy of attention:


    *Transformers4Rec*

    This open source project is geared toward scalable transformer models by the NVIDIA
    Merlin team. For more details, see “Transformers4Rec: Bridging the Gap Between
    NLP and Sequential/Session-Based Recommendation” by Gabriel de Souza Pereira Moreira
    et al.


    *Monolith*

    Also known as the TikTok For You page recommender, this is one of the most popular
    and exciting recommendation systems at this time. It is a fundamentally sequential
    recommender, with some elegant hybrid approaches. “Monolith: Real-Time Recommendation
    System with Collisionless Embedding Table” by Zhuoran Liu et al. covers the architectural
    considerations.


    Our final step before this book concludes is to consider a few approaches to recommendations.
    These don’t build exactly on top of what we’ve done but will use some of what
    we’ve done and introduce a few new ideas. Let’s sprint to the finish!


    ## CHAPTER 18


    ## What’s Next for Recs?


    We find ourselves in a transitional time for recommendation systems. However,
    this is quite normal for this field, as it is in many segments of the tech industry.
    One of the realities of a field that is so closely aligned with business objectives
    and with such strong capabilities for business value is that the field tends to
    be constantly searching for any and all opportunities to advance.


    In this chapter, we’ll briefly introduce some of the modern views of where recommendation
    systems are going. An important point to consider is that recommendation systems
    as a science spread both depth first and breadth first simultaneously. Looking
    at the most cutting-edge research in the field means that you’re seeing deep optimization
    in areas that have been under study for decades or areas that seem like pure fantasy
    for now.


    We’ve chosen three areas to focus on in this final chapter. The first you’ve seen
    a bit of throughout this text: multimodal recommendations. This area is increasingly
    important as users turn to platforms to do more things. Recall that multimodal
    recommendations occur when a user is represented by several latent vectors simultaneously.


    Next up is graph-based recommenders. We’ve discussed co-occurrence models, which
    are the simplest such models for graph-based recommendation systems. They go much
    deeper! GNNs are becoming an incredibly powerful mechanism for encoding relations
    between entities and utilizing these representations, making them useful for recommendations.


    Finally, we’ll turn our attention to large language models and generative AI.
    During the writing of this book, LLMs have gone from something that a small subset
    of ML experts understood to something mentioned on HBO comedy broadcasts. While
    a rush is occurring to find relevant applications of LLMs to recommendation systems,
    the industry already has confidence in applying these tools in certain ways. Also
    exciting, however, is the application of recommendation systems to LLM apps.


    Let''s see what''s coming next!


    ## Multimodal Recommendations


    *Multimodal recommenders* allow for the concession that *users contain multitudes*:
    a single representation for a user''s preferences may not capture the entire story.
    Someone shopping on a large everything-ecommerce website, for example, may be
    all of the following:


    - A dog owner who frequently needs items for their dog

    - A parent who is always updating the closet for the growing baby

    - A hobbyist race-car driver who buys the pieces necessary to drive their car
    on a track

    - A LEGO investor who keeps hundreds of sealed boxes of Star Wars sets hidden
    away in the closet


    The methods you''ve learned throughout this book should do well at providing recommendations
    for all of these users. However, you may notice in this list a few areas that
    are conflicting:


    - If your child is very young, why do you buy LEGO sets already? Also, doesn''t
    your dog chew on them?

    - If your garage is full of LEGO sets, where do you keep all these car parts?

    - Where do you put your dog in that two-seater Mazdaspeed MX-5 Miata?


    You can probably think of other cases where some aspects of what you buy just
    don''t match up well with others. This leads to a problem of multimodality: several
    places in the latent space of your interests coalesce into modes or medoids, but
    not only one.


    Let''s return to some of our geometric discussions from before: if you are using
    nearest neighbors to a user vector, then which of the medoids will take on the
    most importance?


    The way we approach this problem is by multimodality, or providing several vectors
    associated to a single user. While a naive approach to scaling to consider all
    the modes for a user would be to simply increase the dimensionality of the model
    on the item side (to create more areas in which different types of items can be
    embedded disjointly), this presents serious challenges at scale in terms of training
    and memory concerns.


    One of the first significant works in this area is coauthored by one of this book’s
    authors and introduces an extension to MF to deal with this; see “Nonlinear Latent
    Factorization by Embedding Multiple User Interests” by Jason Weston et al. The
    goal is to build multiple latent factors simultaneously as we did in our other
    matrix factorization methods, each factor hopefully taking on representation for
    one of the user’s interests.


    This is achieved by constructing a tensor that has its third tensor dimension
    represent each of the latent factors for distinct interests rather than encoding
    a user item factorization matrix. The factorization is generalized to the tensor
    case, and the WSABIE loss you saw earlier is used to train.


    Building on this work, several years later Pinterest released PinnerSage, as we
    mentioned in Chapter 15. This modifies some of the assumptions of the Weston et
    al. paper, by not assuming a known number of representations for each user. Additionally,
    this approach uses graph-based feature representations, which we’ll talk more
    about in the next section. Finally, the last important modification that this
    method uses is clustering: it attempts to build the modes via clustering in item
    space.


    The basic PinnerSage approach is to do the following:


    1. Fix item embeddings (they call these *pins*).

    2. Cluster user interactions (unsupervised and unspecified in cardinality).

    3. Build cluster representations as the medoid of the cluster embeddings.

    4. Retrieve using medoid-anchored ANN search.


    PinnerSage is still considered to be near state of the art for large-scale multimodal
    recommenders. Some systems take another approach to allow users to more directly
    modify their “mode” by selecting the theme of what they’re looking for, while
    others hope to learn it from a sequence of interactions.


    Next up, we’ll look at how higher-order relationships between items or users can
    be explicitly specified.


    ## Graph-Based Recommenders


    *Graph neural networks* (GNNs) are a class of neural networks that use the structural
    information of data to build deeper representations of your data. They’ve proven
    especially useful when dealing with relational or networked data, both of which
    have utility.


    One moment of disambiguation before we continue: *graphs* in the sense that we
    will use them here refer to collections of *nodes* and *edges*. These are purely
    mathematical concepts, but generally we can think of nodes as the objects of interest
    and edges as the relationships between them. These mathematical objects are useful
    for distilling down the core of what is necessary for the kind of representation
    you wish to build. While the objects may seem very simple, we can add just the
    right amount of complexity in a variety of ways to capture more nuance.


    In the simplest setups, each node on the graph represents an item or user, and
    each edge represents a relationship such as a user''s interaction with an item.
    However, user-to-user and item-to-item networks are extremely powerful extensions
    as well. Our co-occurrence models are simple graph networks; however, we did not
    learn a representation from these and instead directly took these as our models.


    Let''s consider a few examples of adding more structure to a graph to encode ideas:


    *Directionality*

    This ordering on an edge''s vertices can be added to indicate a strict relationship
    of one node acting on the other; e.g., a user *reads* a book but not the other
    way around.


    *Edge decorations*

    Descriptors such as edge labels can be added to communicate features about the
    relationships; e.g., two users share account credentials, *and one of the users
    is identified as a child*.


    *Multiedges*

    These can allow for relationships to have higher multiplicity, or allow for the
    same two entities to have multiple relationships. In a graph of outfits with clothing
    items as nodes, each edge can be another clothing item that makes the other two
    go well together.


    *Hyper-edges*

    A step further up the level of abstraction may add these edges, which connect
    multiple nodes simultaneously. For video scenes, you may detect objects of various
    classes, and your graph may have nodes for those classes, but understanding not
    only which pairs of object classes appear but which higher-order combinations
    appear can be identified with hyper-edges.


    Let''s explore the basics of GNNs and how their representations are a bit different.


    ## Neural Message Passing


    In GNNs our object of interest is assigned as the nodes in our graph. Usually,
    the main objective in GNNs is to build powerful representations of the nodes and
    edges, or both, via their relationships.'
  mdcn: '## 总结


    Transformer 和序列推荐系统确实是现代推荐器的前沿。如今，推荐系统领域的大多数研究都集中在序列数据集上，而最热门的推荐器正使用越来越长的序列进行预测。有两个重要项目值得关注：


    *Transformers4Rec*

    这个由 NVIDIA Merlin 团队开发的开源项目，专注于可扩展的 Transformer 模型。更多详情，请参阅 Gabriel de Souza Pereira
    Moreira 等人撰写的论文《Transformers4Rec: Bridging the Gap Between NLP and Sequential/Session-Based
    Recommendation》。


    *Monolith*

    也被称为 TikTok For You 页面推荐器，是目前最受欢迎和最令人兴奋的推荐系统之一。它本质上是一个序列推荐器，并采用了一些优雅的混合方法。Zhuoran
    Liu 等人的论文《Monolith: Real-Time Recommendation System with Collisionless Embedding
    Table》涵盖了其架构设计考量。


    在本书结束前，我们的最后一步是探讨几种推荐方法。这些方法并非完全建立在我们已有内容的基础上，但会运用我们所学的部分知识，并引入一些新思路。让我们冲刺到终点吧！


    ## 第 18 章


    ## 推荐系统的未来


    我们正处在推荐系统的转型期。然而，这对于这个领域来说相当正常，科技行业的许多领域也是如此。这个与商业目标紧密相连、并具有强大商业价值创造能力的领域，其现实之一就是它总是在不断寻找一切可能的机会向前发展。


    在本章中，我们将简要介绍关于推荐系统未来走向的一些现代观点。一个需要考虑的重要点是，推荐系统作为一门科学，其发展是深度和广度并进的。关注该领域最前沿的研究，意味着你将看到在那些已被研究数十年或目前看似纯属幻想的领域中进行的深度优化。


    我们选择在最后一章聚焦三个领域。第一个你在本书中已有所接触：多模态推荐。随着用户转向平台完成更多事情，这个领域正变得越来越重要。回想一下，当一个用户同时由多个潜在向量表示时，就出现了多模态推荐。


    接下来是基于图的推荐器。我们已经讨论过共现模型，它们是基于图的推荐系统中最简单的模型。但它们可以深入得多！图神经网络（GNN）正成为一种极其强大的机制，用于编码实体之间的关系并利用这些表示，使其在推荐中非常有用。


    最后，我们将关注大型语言模型和生成式 AI。在撰写本书期间，LLM 已从只有少数 ML 专家理解的东西，变成了 HBO 喜剧节目中都会提及的事物。虽然业界正急于寻找
    LLM 在推荐系统中的相关应用，但已经对以特定方式应用这些工具充满信心。同样令人兴奋的是，推荐系统在 LLM 应用中的应用。


    让我们看看接下来会发生什么！


    ## 多模态推荐


    *多模态推荐器*承认*用户包含多重身份*：单一的用户偏好表示可能无法捕捉全貌。例如，在一个大型综合电商网站上购物的人，可能同时是以下所有角色：


    - 一位经常需要为狗狗购买物品的狗主人

    - 一位总是为成长中的宝宝更新衣橱的家长

    - 一位购买零件以在赛道上驾驶赛车的业余赛车手

    - 一位在衣橱里藏着数百盒未拆封星球大战乐高套装的乐高投资者


    你在本书中学到的方法应该能很好地为所有这些用户提供推荐。然而，你可能会注意到这个列表中存在一些相互冲突的方面：


    - 如果你的孩子还很小，为什么你已经购买乐高套装了？而且，你的狗不会啃咬它们吗？

    - 如果你的车库堆满了乐高套装，你把这些汽车零件放在哪里？

    - 你把你的狗放在那辆双座马自达 MX-5 Miata 的哪里？


    你可能还能想到其他情况，其中你购买的某些方面与其他方面不太匹配。这就引出了多模态问题：你兴趣的潜在空间中有多个区域融合成了模式或中心点，但不止一个。


    让我们回到之前的一些几何讨论：如果你使用用户向量的最近邻，那么哪个中心点将变得最重要？


    我们处理这个问题的方法是通过多模态，即为单个用户提供多个向量。虽然考虑用户所有模式的朴素扩展方法是简单地增加物品侧模型的维度（以创建更多区域，使不同类型的物品可以不相交地嵌入），但这在训练和内存方面带来了严重的规模化挑战。


    该领域最早的重要工作之一由本书的一位合著者共同撰写，并引入了矩阵分解的扩展来处理这个问题；参见 Jason Weston 等人的论文《Nonlinear Latent
    Factorization by Embedding Multiple User Interests》。目标是像我们在其他矩阵分解方法中所做的那样，同时构建多个潜在因子，每个因子有望代表用户的一个兴趣。


    这是通过构建一个张量来实现的，该张量的第三维代表不同兴趣的各个潜在因子，而不是编码一个用户-物品分解矩阵。分解被推广到张量情况，并使用你之前看到的 WSABIE
    损失进行训练。


    在此工作基础上，几年后 Pinterest 发布了 PinnerSage，正如我们在第 15 章中提到的。它修改了 Weston 等人论文中的一些假设，不假设每个用户有已知数量的表示。此外，这种方法使用了基于图的特征表示，我们将在下一节中详细讨论。最后，该方法使用的最后一个重要的修改是聚类：它试图通过在物品空间中进行聚类来构建模式。


    基本的 PinnerSage 方法如下：


    1. 固定物品嵌入（他们称之为 *pins*）。

    2. 聚类用户交互（无监督且基数未指定）。

    3. 将聚类表示构建为聚类嵌入的中心点。

    4. 使用以中心点为锚点的近似最近邻搜索进行检索。


    PinnerSage 仍被认为是大规模多模态推荐器的近最先进水平。一些系统采用另一种方法，允许用户通过选择他们正在寻找的主题来更直接地修改他们的“模式”，而另一些系统则希望从交互序列中学习它。


    接下来，我们将看看如何显式指定物品或用户之间的高阶关系。


    ## 基于图的推荐器


    *图神经网络*（GNN）是一类利用数据的结构信息来构建更深层数据表示的神经网络。它们在处理关系型或网络型数据时已被证明特别有用，这两者都具有实用价值。


    在继续之前，先澄清一点：我们在此使用的*图*概念指的是*节点*和*边*的集合。这些是纯粹的数学概念，但通常我们可以将节点视为感兴趣的对象，将它们之间的关系视为边。这些数学对象对于提炼你希望构建的表示类型的核心要素非常有用。虽然对象可能看起来很简单，但我们可以通过各种方式添加恰到好处的复杂性来捕捉更多细微差别。


    在最简单的设置中，图中的每个节点代表一个物品或用户，每条边代表一种关系，例如用户与物品的交互。然而，用户到用户和物品到物品的网络也是非常强大的扩展。我们的共现模型是简单的图网络；然而，我们没有从中学习表示，而是直接将其作为我们的模型。


    让我们考虑几个向图中添加更多结构以编码想法的例子：


    *方向性*

    可以在边的顶点上添加这种排序，以指示一个节点作用于另一个节点的严格关系；例如，用户*阅读*一本书，但反过来则不然。


    *边装饰*

    可以添加边标签等描述符来传达关系的特征；例如，两个用户共享账户凭据，*并且其中一个用户被标识为儿童*。


    *多重边*

    这些可以允许关系具有更高的重数，或者允许相同的两个实体具有多个关系。在一个以服装物品为节点的服装搭配图中，每条边可以是另一件使另外两件搭配得当的服装物品。


    *超边*

    更进一步的抽象层次可能会添加这些边，它们同时连接多个节点。对于视频场景，你可能会检测到各种类别的对象，你的图可能有这些类别的节点，但理解不仅哪些对象类别对出现，而且哪些高阶组合出现，可以通过超边来识别。


    让我们探索 GNN 的基础及其表示方式有何不同。


    ## 神经消息传递


    在 GNN 中，我们感兴趣的对象被指定为图中的节点。通常，GNN 的主要目标是通过节点和边之间的关系，构建强大的节点和边表示，或两者兼而有之。'

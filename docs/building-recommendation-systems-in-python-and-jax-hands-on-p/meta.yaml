    用特征替换嵌入意味着什么？在我们正负亲和力的例子中，我们使用点积来计算两个实体（如两个轨道）$x$ 和 $y$ 之间的亲和力。与其让特征作为潜在表示（由嵌入表示），另一种方法是手动构建代表两个实体

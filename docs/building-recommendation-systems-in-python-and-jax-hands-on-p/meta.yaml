- img_proc: true
  md: 'With the STL dataset, we will try to match scenes, which are pictures of a
    person in a particular setting, with products that might go well with the scene.
    The training set contains pairs of scenes with single products, and we want to
    use the content recommender to extend recommendations to the entire catalog of
    products and sort them in some kind of ranking order. The content recommender,
    because it uses indirect content features to make recommendations, can be used
    to recommend new products that haven''t been in the recommendation system or to
    warm-start a recommendation system with manually curated data before users start
    using it and a feedback loop is established. In the case of the STL dataset, we''ll
    focus on the visual appearance of the scene and the products.


    We will generate content embeddings via a convolutional neural network (CNN) architecture,
    and then train the embedding via a triplet loss and show how to create a content
    recommendation system.


    This chapter covers the following topics:


    +   - Revision control software

    - Python build systems

    - Random-item recommender

    - Obtaining the STL dataset images

    - Definition of CNN

    - Model training in JAX, Flax, and Optax

    - Input pipeline


    # Revision Control Software


    *Revision control software* is a software system that keeps track of code changes.
    Think of it as a database that tracks versions of code you have written, while
    providing added functionality like showing the differences between each version
    of code and allowing you to revert to a previous version.


    There are many kinds of revision control systems. We host the code for this book
    on [GitHub](https://github.com).


    The revision control software we use is called **Git**. Code changes are done
    in batches called a *patch*, and each patch is uploaded to a source control repository
    like GitHub so that it can be cloned and worked on by many people at the same
    time.'

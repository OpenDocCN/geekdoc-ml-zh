  md: "As you can see, Spark makes it easy to scale a program from a single machine\
    \ to run on a cluster of many machines! Starting from the main function, we create\
    \ SparkContext, read in the input file as a text file, parse it, and then make\
    \ the token and title dictionaries. The RDD is passed around as arguments of the\
    \ processing function and can be used multiple times and fed to various map functions\
    \ (such as the token and title dictionary methods).\n\nThe heavy lifting in the\
    \ make-dictionary methods is done by the process-partitions functions, which are\
    \ map functions that are applied to entire partitions at once. *Partitions* are\
    \ large chunks of the input, typically about 64 MB in size and processed as one\
    \ chunk so that we save on network bandwidth by doing map-side combines. This\
    \ is a technique to apply the reducer repeatedly on mapped partitions as well\
    \ as after joining by the key (which in this case is the token) and summing up\
    \ the counts. The reason we do this is to save on network bandwidth, which is\
    \ typically the slowest part of data processing pipelines after disk access.\n\
    \nYou can view the output of the *make_dictionary* phase by using the utility\
    \ *codex.py*, which dumps protocol buffers of different kinds registered in the\
    \ program. Since all our data is serialized as bzipped and uuencoded text files,\
    \ the only difference is which protocol buffer schema is used to decode the serialized\
    \ data, so we can use just one program to print out the first few elements of\
    \ the data for debugging. Although it might be much simpler to store data as JSON,\
    \ XML, or CSV files, having a schema will save you from future grief because protocol\
    \ buffers are extensible and support optional fields. They are also typed, which\
    \ can save you from accidental mistakes in JSON, such as not knowing whether a\
    \ value is a string or float or int, or having a field as a string in some files\
    \ and as an int in others. Having an explicit typed schema saves us from a lot\
    \ of these mistakes.\n\nThe next step in the pipeline is *make_cooccurrence.py*.\
    \ As the name implies, this program simply counts the number of times each token\
    \ occurs with another token. This is essentially a sparse way of representing\
    \ a graph. In *nlp.proto*, each row of the sparse co-occurrence matrix is as follows:\n\
    \n```\n// Co-occurrence matrix row.\nmessage CooccurrenceRow {\n    uint64 index\
    \ = 1;\n    repeated uint64 other_index = 2;\n    repeated float count = 3;\n\
    }\n```\n\nIn a *co-occurrence matrix*, each row *i* has an entry at column *j*\
    \ that represents the number of times token *j* has co-occurred with token *i*.\
    \ This is a handy way of associating the similarity between tokens *i* and *j*\
    \ because if they co-occur a lot, they must be more related to each other than\
    \ tokens that do not co-occur. In the protocol buffer format, these are stored\

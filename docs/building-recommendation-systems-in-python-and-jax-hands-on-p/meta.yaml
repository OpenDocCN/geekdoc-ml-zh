  - "[PAGE 35]\n\nLet's see what this data looks like as a dictionary:\n\n```\n'indices':\
    \ [\n    (0,0),(0,1),(0,2),(0,3),\n    (1,0),(1,1),(1,2),(1,3),\n    (2,0),(2,1),(2,2),(2,3),\n\
    \    (3,0),(3,1),(3,2),\n    (4,0)\n]\n'values': [\n    5,4,4,1,\n    2,3,3,4.5,\n\
    \    3,2,3,4,\n    4,4,5,\n    3\n]\n```\n\nA few natural questions emerge:\n\n\
    +   1. What's the most popular cheese? From the observations so far, it's looking\
    \ like *emmentaler* is potentially the favorite, but *E* didn't try *emmentaler*.\n\
    2. Would *D* like *brie*? It seems to be a contentious cheese.\n3. If you were\
    \ asked to buy only two cheeses, which should you buy to best satisfy everyone?\n\
    \nThis example and associated questions are intentionally simple, but the point\
    \ is clear that this matrix representation is at least convenient for capturing\
    \ these ratings.\n\nWhat may not be obvious is that beyond the convenience of\
    \ this data visualization is the mathematical utility of this representation.\
    \ Question 2 suggests an inherent RecSys problem: “predict how much a user will\
    \ like an item they haven’t seen.” This question may also be recognizable as a\
    \ problem from a linear algebra class: “How can we fill in unknown elements of\
    \ a matrix from the ones we know?” This is called *matrix completion*.\n\nThe\
    \ back-and-forth between creating user experiences that capture their needs and\
    \ the mathematical formulations to model this data and needs is at the heart of\
    \ recommendation systems.\n\n# User-User Versus Item-Item Collaborative Filtering\n\
    \nBefore we dive into the linear algebra, let’s consider the purely data science\
    \ perspective called *collaborative filtering* (CF), a term originally used by\
    \ David Goldberg et al. in their 1992 paper “Using Collaborative Filtering to\
    \ Weave an Information Tapestry”."
  - '[PAGE 36]


    The underlying idea of CF is that those with similar tastes help others to know
    what they like without having to try it themselves. The *collaboration* terminology
    was originally intended to mean among similar-taste users, and *filtering* was
    originally intended to mean filtering out choices people will not like.


    You can think of this CF strategy in two ways:


    +   - Two users with similar tastes will continue to have similar tastes.

    - Two items with similar user fans will continue to be popular with other users
    who are similar to those fans.


    These may sound identical, but they appear differently in the mathematical interpretations.
    At a high level, the difference is in deciding which kind of similarity your recommender
    should prioritize: user similarity or item similarity.


    If you prioritize *user similarity*, then to provide a recommendation for a user
    *A*, you find a similar user *B* and then choose a recommendation from *B*''s
    list of liked content that *A* hasn''t seen yet.


    If you prioritize *item similarity*, then to provide a recommendation for a user
    *A*, you find an item that *A* liked, *chèvre*, and then you find an item similar
    to *chèvre* that *A* hasn''t seen, *emmentaler*, and recommend it for *A*.


    Later we will dive deeper into similarity, but let''s quickly link these ideas
    to our preceding discussion. *Similar users* are rows of the user-item matrix
    that are similar as vectors; *similar items* are columns of the user-item matrix
    that are similar as vectors.


    ![](img/da17d05291861831978609329c481581_36_0.png)


    **Vector Similarity**


    *Dot product similarity* is more precisely defined in Chapter 10. For now, consider
    similarity to be computed by normalizing the vectors and then taking their cosine
    similarity. Given entities of any kind that you''ve associated to vectors (lists
    of numbers), *vector similarity* compares which entities are most alike with respect
    to the characteristics captured by those lists of numbers (called the *latent
    space*).


    # The Netflix Challenge


    In 2006, Netflix kicked off an online competition called the Netflix Prize. This
    competition challenged teams to improve on the performance of Netflix CF algorithms
    on a dataset released as open source by the company. While such a competition
    is common today via websites like Kaggle or conference, at that time, it was very
    exciting and novel for those interested in RecSys.'
  - '[PAGE 37]


    The competition consisted of several intermediate rounds awarding a Progress Prize
    and the final Netflix Prize awarded in 2009. The data provided was a collection
    of 2,817,131 triples consisting of (user, movie, date\_rated). And half of these
    additionally included the rating itself. Notice that as in our preceding example,
    the user-item information is nearly enough to specify the problem. In this particular
    dataset, the date was provided. Later, we will dig into how time might be a factor,
    and in particular, for sequential recommendation systems.


    The stakes were quite high in this competition. Requirements for beating the internal
    performance were a 10% increase in root mean square error (RMSE); we will discuss
    this loss function later. And the spoils added up to over $1.1 million. The final
    winners were BellKor''s Pragmatic Chaos (which incidentally won the two previous
    Progress Prizes) with a test RMSE of 0.8567. In the end, only a 20-minute earlier
    submission time kept BellKor ahead of the competitors The Ensemble.


    To read in detail about the winning submissions, check out “The BigChaos Solution
    to the Netflix Grand Prize” by Andreas Töscher and Michael Jahrer and “The Big-Chaos
    Solution to the Netflix Prize 2008” by the same authors. Meanwhile, let''s review
    a few important lessons from this competition:


    First, we see that the user-item matrix we''ve discussed appears in these solutions
    as the critical mathematical data structure. The model selection and training
    is important, but parameter tuning provided a huge improvement in several algorithms.
    We will return to parameter tuning in later chapters. The authors state that several
    model innovations came from reflecting on the business use case and human behavior
    and trying to capture those patterns in the model architectures. Next, linear-algebraic
    approaches resulted in the first reasonably performant solutions, and building
    on top of them led to the winning model. Finally, eking out the performance that
    Netflix originally demanded to win the competition took so long that business
    circumstances changed and the solution was no longer useful.


    That last point might be the *most* important thing an ML developer needs to learn
    about recommendation systems; see the following tip.


    ![](img/da17d05291861831978609329c481581_37_0.png)


    **Start with Simplicity**


    Build a working usable model quickly and iterate while the model is still relevant
    to the needs of the business.'
  - '[PAGE 38]


    # Soft Ratings


    In our cheese-tasting example, each cheese either received a numerical rating
    or was not tried by a guest. These are *hard ratings*: regardless of whether the
    cheese is a brie or a chèvre, the ratings are explicit, and their absence indicates
    a lack of interaction between the user and item. In some contexts, we’ll want
    to accommodate data indicating a user does interact with an item and yet provides
    no rating.


    A common example is a movies app; a user may have watched a movie with the app
    but not provided a star rating. This indicates that the item (in this case, a
    movie) has been observed, but we don’t have the rating for our algorithms to learn
    from. However, we can still use this implicit data to do the following:


    +   - Exclude this item from future recommendations

    - Use this data as a separate term in our learner

    - Assign a default rating value to indicate “interesting enough to watch, not
    significant enough to rate”


    It turns out that implicit ratings are critical for training effective recommendation
    systems, not only because users often don’t give hard ratings, but also because
    implicit ratings provide a different level of signal. Later, when we wish to train
    multilevel models to predict both click likelihood and buy likelihood, these two
    levels will prove extremely important.


    To sum up:


    +   - A hard rating occurs when the user directly responds to a prompt for feedback
    on an item.

    - A soft rating occurs when the user’s behavior implicitly communicates feedback
    on an item without responding to a direct prompt.


    # Data Collection and User Logging


    We’ve established that we learn from both explicit ratings and implicit ratings,
    so how and where do we get this data? To dive into this, we’ll need to start worrying
    about application code. In many businesses, the data scientists and ML engineers
    are separate from the software engineers, but working with recommendation systems
    requires alignment between the two functions.'
- md: '## What to Log


    The simplest and most obvious data collection is user ratings. If users are given
    the option to provide ratings, or even a thumbs-up or thumbs-down, that component
    will need to be built and that data will need to be stored. These ratings must
    be stored not only for the opportunity to build recommendations, but also to prevent
    the bad user experience of rating something and then shortly thereafter not having
    the rating appear when revisiting the page.


    Similarly, it''s useful to understand a few other key interactions that can improve
    and expand your recommendation system: page loads, page views, clicks, and add-to-bag.


    For these types of data, let''s use a slightly more complicated example: the ecommerce
    website [Bookshop.org](https://bookshop.org). This one site has multiple applications
    of recommendation systems, almost all of which we will return to in time. For
    now, let''s focus on some interactions (Figure 2-2).


    ![](img/da17d05291861831978609329c481581_39_0.png)


    ## Page loads


    When you first load up Bookshop.org, it starts with items on the page. The Best
    Sellers of the Week are all clickable images to those book listings. Despite the
    user having no choice in loading this initial page, it’s actually quite important
    to log the contents of this initial page load.


    These options represent the population of books that the user has seen. If a user
    has seen an option, they have the opportunity to click it, which will ultimately
    be an important implicit signal.


    ![](img/da17d05291861831978609329c481581_40_0.png)


    ## Propensity Scores


    The consideration of the population of all items a user has seen is deeply tied
    to propensity score matching. In mathematics, *propensity scores* are the probability
    that an observational unit will be assigned to the treatment group versus the
    control group.


    Compare this setup to the simple 50-50 A/B test: every unit has a 50% chance of
    being exposed to your treatment. In a feature-stratified A/B test, you purposely
    change the probability of exposure dependent on a certain feature or collection
    of features (often called *covariates* in this context). Those probabilities of
    exposure are the propensity scores.


    Why bring up A/B testing here? Later, we’ll be interested in mining our soft ratings
    for signal on user preference, but we must consider the possibility that the lack
    of a soft rating is not an implicit bad rating. Thinking back to the cheeses:
    taster *D* never had a chance to rate *brie*, so there’s no reason to think *D*
    has a preference for aversion on *brie*. This is because *D* was not exposed to
    *brie*.


    Now thinking back to Bookshop.org: the landing page does not show *The Hitchhiker’s
    Guide to the Galaxy*, so the user has no way to click it and implicitly communicate
    interest in that book. The user could use the search option, but that’s a different
    kind of signal—which we’ll talk about later and is, in fact, a much stronger signal.


    When understanding implicit ratings like “did the user look at something,” we
    need to properly account for the entire population of choices they were exposed
    to, and use the inverse of that population size to weigh the importance of clicking.
    For this reason, understanding *all* page loads is important.


    ## Page views and hover


    Websites have gotten much more complicated, and now users must contend with a
    variety of interactions. Figure 2-3 demonstrates what happens if the user clicks
    the right arrow in the Best Sellers of the Week carousel and then moves their
    mouse over the Cooking at Home option.


    ![](img/da17d05291861831978609329c481581_41_0.png)


    Figure 2-3. Bookshop.org top sellers


    The user has unveiled a new option, and by mousing over it, has made it larger
    and given it a visual effect. These are ways to communicate more information to
    the user, and remind the user that these options are clickable. To the recommender,
    these clicks can be used as more implicit feedback.


    First, the user clicked the carousel scroll—so some of what they saw in the carousel
    was interesting enough to dig further. Second, they moused over *Cooking at Home*,
    which they might click or might just want to see if additional information becomes
    available when hovering. Many websites use a hover interaction to provide a pop-up
    detail. While Bookshop.org doesn''t implement something like this, internet users
    have been trained to expect this behavior by all the websites that do, and so
    the signal is still meaningful. Third, the user has now uncovered a new potential
    item in their carousel scroll—which we should add to our page loads but with a
    higher rating because it required interaction to uncover.


    All this and more can be encoded into the website''s logging. Rich and verbose
    logging is one of the most important ways to improve a recommendation system.
    Having more logging data than you need is almost always better than having the
    opposite.


    ## Clicks


    If you thought hovering meant interest, wait until you consider clicking! Not
    in all cases, but in the large majority, clicking is a strong indicator of product
    interest. For ecommerce, clicking often is computed as part of the recommendation
    team''s core key performance indicators (KPIs).


    This is for two reasons:


    - Clicking is almost always required to purchase, so it’s an upstream filter for
    most business transactions.

    - Clicking requires explicit user action, so it’s a good measure of intent.


    Noise will always exist of course, but clicks are the go-to indicator of a client’s
    interest. Many production recommendation systems are trained on click data—not
    ratings data—because of the much higher data volume and the strong correlation
    between click behavior and purchase behavior.


    ![](img/da17d05291861831978609329c481581_42_0.png)


    ## Click-Stream Data


    Sometimes in recommendation systems you hear people talk about *click-stream*
    data. This important view into click data also considers the order of a user’s
    clicks in a single *session*. Modern recommendation systems put a lot of effort
    into utilizing the order of items a user clicks, calling this *sequential recommendations*,
    and have shown dramatic improvements via this additional dimension. We will discuss
    sequence-based recommendations in [Chapter 7](#).


    ## Add-to-bag


    We’ve finally arrived; the user has added an item to their bag or cart or queue.
    This is an extremely strong indicator of interest and is often quite correlated
    with purchasing. There are even reasons to argue that add-to-bag is a better signal
    than purchase/order/watch. Add-to-bag is essentially the end of the line for soft
    ratings, and usually beyond this you’d want to start collecting ratings and reviews.


    ## Impressions


    We might also wish to log *impressions* of an item that wasn’t clicked. This supplies
    the recommendation system with negative feedback on items that the user isn’t
    interested in. For example, if the cheeses *gouda*, *chèvre* and *emmentaler*
    are offered to the user but the user tastes only *chèvre*, perhaps the user doesn’t
    like *gouda*. They might not have gotten around to tasting *emmentaler*, on the
    other hand, so these impressions may carry only noisy signal.


    ## Collection and Instrumentation


    Web applications frequently instrument all the interactions we’ve discussed via
    events. If you don’t yet know what events are, maybe ask a buddy in your engineering
    org—but we’ll also give you the skinny. Like logging, *events* are specially formatted
    messages that the application sends out when a certain block of code is executed.


    As in the example of a click, the application needs to make a call to get the
    next content to show the user, it''s common to also “fire an event” at this moment,
    indicating information about the user, what they clicked, the session-ID for later
    reference, the time, and various other useful details. This event can be handled
    downstream in any number of ways, but there''s an increasingly prevalent pattern
    of path bifurcation to the following:


    - A log database, like a mySQL application database tied to the service

    - An event stream for real-time handling


    The latter will be interesting: event streams are often connected to listeners
    via technologies like Apache Kafka. This kind of infrastructure can get complicated
    fast (consult your local data engineer or MLOps person), but a simple model for
    what happens is that all of a particular kind of log are sent to several destinations
    that you think can make use of these events.


    In the recommender case, an event stream can be connected up to a sequence of
    transformations to process the data for downstream learning tasks. This will be
    enormously useful if you want to build a recommendation system that uses those
    logs. Other important uses are real-time metrics logging for what is going on
    at any given time on the website.


    ## Funnels


    We''ve just worked through our first example of a funnel, which no good data scientist
    can avoid thinking about. Like them or hate them, funnel analyses are crucial
    for critical evaluation of your website, and by extension your recommendation
    system.


    ![](img/da17d05291861831978609329c481581_43_0.png)


    **Click-Streams**


    A *funnel* is a collection of steps a user must take to get from one state to
    another; it''s called a funnel because at each of the discrete steps, a user may
    stop proceeding through, or *drop off*, thus reducing the population size at each
    step.


    In our discussion of events and user logging, each step is relevant for a subset
    of the previous. This means that the process is a funnel, as shown in Figure 2-4.
    Understanding the drop-off rate at each step reveals important characteristics
    of your website and your recommendations.'
  mdcn: '## 记录什么


    最简单、最明显的数据收集是用户评分。如果为用户提供评分选项，甚至是点赞或点踩，那么就需要构建该组件并存储这些数据。这些评分不仅需要存储，以便有机会构建推荐系统，还要防止出现这样的糟糕用户体验：用户刚评完分，不久后重访页面时却发现评分消失了。


    同样，了解其他一些关键交互也很有用，这些交互可以改进和扩展你的推荐系统：页面加载、页面浏览、点击和加入购物车。


    对于这类数据，我们来看一个稍复杂的例子：电子商务网站 [Bookshop.org](https://bookshop.org)。这个网站应用了多种推荐系统，几乎所有的我们稍后都会涉及。现在，我们先关注一些交互（图
    2-2）。


    ![](img/da17d05291861831978609329c481581_39_0.png)


    ## 页面加载


    当你首次加载 Bookshop.org 时，页面会显示一些商品。本周畅销书都是可点击的图片，链接到相应的图书列表。尽管用户无法选择加载这个初始页面，但记录这个初始页面加载的内容实际上非常重要。


    这些选项代表了用户看到的书籍总体。如果用户看到了某个选项，他们就有机会点击它，这最终将成为一个重要的隐式信号。


    ![](img/da17d05291861831978609329c481581_40_0.png)


    ## 倾向得分


    考虑用户看到的所有物品总体，与倾向得分匹配密切相关。在数学中，*倾向得分*是指一个观测单元被分配到处理组而非对照组的概率。


    将这种设置与简单的 50-50 A/B 测试进行比较：每个单元有 50% 的概率接触到你的处理。在特征分层 A/B 测试中，你根据某个特征或特征集合（在此上下文中通常称为*协变量*）有意改变接触概率。这些接触概率就是倾向得分。


    为什么在这里提到 A/B 测试？稍后，我们将有兴趣从我们的软评分中挖掘用户偏好的信号，但我们必须考虑缺乏软评分并非隐式差评的可能性。回想一下奶酪的例子：品尝者
    *D* 从未有机会品尝 *布里奶酪*，因此没有理由认为 *D* 对 *布里奶酪* 有厌恶偏好。这是因为 *D* 没有接触到 *布里奶酪*。


    现在回想一下 Bookshop.org：着陆页没有显示《银河系漫游指南》，因此用户无法点击它并隐式传达对该书的兴趣。用户可以使用搜索选项，但那是另一种信号——我们稍后会讨论，实际上是一种强得多的信号。


    在理解像“用户是否查看了某物”这样的隐式评分时，我们需要正确考虑他们接触到的所有选择总体，并使用该总体大小的倒数来衡量点击的重要性。因此，理解*所有*页面加载都很重要。


    ## 页面浏览和悬停


    网站变得越来越复杂，现在用户必须应对各种交互。图 2-3 演示了如果用户点击本周畅销书轮播图中的右箭头，然后将鼠标悬停在“家庭烹饪”选项上会发生什么。


    ![](img/da17d05291861831978609329c481581_41_0.png)


    图 2-3. Bookshop.org 畅销书


    用户揭示了一个新选项，并通过悬停使其变大并赋予其视觉效果。这些是向用户传达更多信息的方式，并提醒用户这些选项是可点击的。对于推荐系统来说，这些点击可以用作更多的隐式反馈。


    首先，用户点击了轮播图滚动——所以他们在轮播图中看到的一些内容足够有趣，值得进一步探索。其次，他们悬停在 *家庭烹饪* 上，他们可能会点击，也可能只是想看看悬停时是否会显示更多信息。许多网站使用悬停交互来提供弹出详情。虽然
    Bookshop.org 没有实现类似功能，但互联网用户已被所有实现此功能的网站训练得期望这种行为，因此该信号仍然有意义。第三，用户现在在轮播图滚动中发现了一个新的潜在物品——我们应该将其添加到页面加载中，但给予更高的评分，因为它需要交互才能发现。


    所有这些以及更多内容都可以编码到网站的日志记录中。丰富而详尽的日志记录是改进推荐系统的最重要方式之一。拥有比你需要的更多的日志数据几乎总是比相反的情况要好。


    ## 点击


    如果你认为悬停意味着兴趣，那么请考虑点击！并非所有情况，但在绝大多数情况下，点击是产品兴趣的强烈指标。对于电子商务，点击通常被计算为推荐团队核心关键绩效指标（KPI）的一部分。


    这有两个原因：


    - 点击几乎总是购买所必需的，因此它是大多数业务交易的上游过滤器。

    - 点击需要用户明确的操作，因此它是衡量意图的好方法。


    当然，噪声总会存在，但点击是客户兴趣的首选指标。许多生产环境中的推荐系统是基于点击数据训练的——而不是评分数据——因为数据量大得多，而且点击行为与购买行为之间存在强相关性。


    ![](img/da17d05291861831978609329c481581_42_0.png)


    ## 点击流数据


    有时在推荐系统中，你会听到人们谈论 *点击流* 数据。这种对点击数据的重要视角还考虑了用户在单个 *会话* 中点击的顺序。现代推荐系统投入大量精力利用用户点击物品的顺序，称之为
    *序列推荐*，并通过这一额外维度显示出显著的改进。我们将在 [第 7 章](#) 中讨论基于序列的推荐。


    ## 加入购物车


    我们终于到了这一步；用户已将物品加入他们的购物袋、购物车或队列。这是兴趣的极强指标，并且通常与购买高度相关。甚至有理由认为加入购物车是比购买/下单/观看更好的信号。加入购物车本质上是软评分的终点，通常在此之后，你会希望开始收集评分和评论。


    ## 展示


    我们可能还希望记录未被点击的物品的 *展示*。这为推荐系统提供了用户不感兴趣的物品的负反馈。例如，如果向用户提供了 *高达奶酪*、*山羊奶酪* 和 *埃门塔尔奶酪*，但用户只品尝了
    *山羊奶酪*，也许用户不喜欢 *高达奶酪*。另一方面，他们可能还没来得及品尝 *埃门塔尔奶酪*，因此这些展示可能只带有噪声信号。


    ## 收集与检测


    Web 应用程序通常通过事件来检测我们讨论过的所有交互。如果你还不知道事件是什么，也许可以问问你工程部门的同事——但我们也会给你简要说明。与日志记录类似，*事件*
    是应用程序在执行特定代码块时发出的特殊格式消息。


    以点击为例，应用程序需要调用以获取下一个要显示给用户的内容，此时通常也会“触发一个事件”，指示有关用户的信息、他们点击了什么、用于后续参考的会话 ID、时间以及其他各种有用细节。这个事件可以在下游以多种方式处理，但一种日益普遍的模式是路径分叉到以下目标：


    - 一个日志数据库，比如与服务绑定的 mySQL 应用程序数据库

    - 一个用于实时处理的事件流


    后者会很有趣：事件流通常通过 Apache Kafka 等技术连接到监听器。这种基础设施可能很快变得复杂（请咨询你本地的数据工程师或 MLOps 人员），但一个简单的模型是，所有特定类型的日志都被发送到几个你认为可以利用这些事件的目的地。


    在推荐系统的情况下，事件流可以连接到一系列转换，以处理数据用于下游学习任务。如果你想构建一个使用这些日志的推荐系统，这将非常有用。其他重要用途是实时指标日志记录，用于记录网站上任何给定时间发生的情况。


    ## 漏斗


    我们刚刚完成了第一个漏斗示例，这是任何优秀的数据科学家都无法回避思考的。无论喜欢与否，漏斗分析对于评估你的网站以及进而评估你的推荐系统都至关重要。


    ![](img/da17d05291861831978609329c481581_43_0.png)


    **点击流**


    *漏斗* 是用户从一个状态到另一个状态必须采取的一系列步骤的集合；之所以称为漏斗，是因为在每个离散步骤中，用户可能停止前进，即 *流失*，从而减少每一步的总体规模。


    在我们对事件和用户日志记录的讨论中，每一步都与前一步的子集相关。这意味着该过程是一个漏斗，如图 2-4 所示。理解每一步的流失率可以揭示你的网站和推荐系统的重要特征。'

    out; the first step was to build an embedding via our similarity definition. Let’s
    recall:


    $$USim_{A,B} = \frac{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)(r_{B,x}
    - \bar{r}_B)}{\sqrt{\sum_{x \in \mathcal{R}_{A,B}} (r_{A,x} - \bar{r}_A)^2} \sqrt{\sum_{x
    \in \mathcal{R}_{A,B}} (r_{B,x} - \bar{r}_B)^2}}$$


    Here we remember that the similarity between two users is dependent on the shared
    ratings and on each user’s average rating.


    On a given day, let’s say $\widetilde{X} = \{\widetilde{x} \mid x \text{ was rated
    since yesterday by a user }\}$. Then we’d need to update our user similarities,
    but ideally we’d leave everything else the same. To update the user’s data, we
    see that all $\widetilde{x}$ rated by two users, $A$ and $B$, $\bar{r}_A$ and
    $\bar{r}_B$, would need to change, but we could probably skip these updates in

  md: "```\ndf = df.pipe(filter_dataframe, filter_dict)\n```\n\nAdmittedly, this is\
    \ a trivial but also relatively naive attempt at avoids. First, working purely\
    \ in pandas will limit some of the scalability of your recommender, so let's convert\
    \ this to JAX:\n\n```\nimport jax\nimport jax.numpy as jnp\n\ndef filter_jax_array(arr:\
    \ jnp.array, col_indices: list, values: list):\n    \"\"\"\n    Filter a jax array\
    \ to exclude rows where certain columns have certain values.\n\n    Args:\n  \
    \      arr (jnp.array): Input array.\n        col_indices (List): List of column\
    \ indices to filter on.\n        values (list): List of corresponding values to\
    \ exclude.\n\n    Returns:\n        jnp.array: Filtered array.\n    \"\"\"\n \
    \   assert len(col_indices) == len(values),\n\n    masks = [arr[:, col] != val\
    \ for col, val in zip(col_indices, values)]\n    total_mask = jnp.logical_and(*masks)\n\
    \n    return arr[total_mask]\n```\n\nBut there are deeper issues. The next issue\
    \ you may face is where that collection of avoids is stored. An obvious place\
    \ is somewhere like a NoSQL database keyed on users, and then you can get all\
    \ of the avoids as a simple lookup. This is a natural use of feature stores, as\
    \ you saw in “Feature Stores” on page 90. Some avoids may be applied in real time,\
    \ while others are learned upon user onboarding. Feature stores are a great place\
    \ to house avoids.\n\nThe next potential gotcha with our naive filter is that\
    \ it doesn't naturally extend to covariate avoids, or more complicated avoid scenarios.\
    \ Some avoids are actually dependent on context—a user who doesn't wear white\
    \ after Labor Day, users who don't eat meat on Fridays, or coffee-processing methods\
    \ that don't mesh well with certain brewers. All of these require conditional\
    \ logic. You might think that your powerful and effective recommendation system\
    \ model can certainly learn these details, but this is true only sometimes. The\
    \ reality is that many of these kinds of considerations are lower signal than\
    \ the large-scale concepts your recommendation system should be learning, and\
    \ thus are hard to learn consistently. Additionally, these kinds of rules are\
    \ often ones you should require, as opposed to remain optimistic about. For that\
    \ reason, you often should explicitly specify such restrictions."
  merge: -1
  pgno: 289
- img_proc: true
  md: 'This specification can often be achieved by explicit deterministic algorithms
    that impose these requirements. For the coffee problem, one of the authors hand-built
    a decision stump to handle a few bad combinations of coffee roast features and
    brewers—*anaerobic espresso?! Yuck!*


    Our other two examples (not wearing white after Labor Day and not eating meat
    on Fridays), however, are a bit more nuanced. An explicit algorithmic approach
    may be tricky to handle. How do we know that a user doesn''t eat meat on Fridays
    during one period of the year?


    For these use cases, model-based avoids can impose these requirements.


    # Model-Based Avoids


    In our quest to include more complicated rules and potentially learn them, we
    may sound like we''re back in the realm of retrieval. Unfortunately, even with
    models like wide-and-deep with lots of parameters doing both user modeling and
    item modeling, learning such high-level relationships can be tricky.


    While most of this book has focused on working fairly large and deep, this part
    of recommendation systems is well suited for simple models. For feature-based
    binary predictions (should this be recommended), we certainly have a zoo of good
    options. The best approach would obviously depend heavily on the number of features
    involved in implementing the avoid you wish to capture. It''s useful to remember
    that many avoids that we''re considering in this section start out as assumptions
    or hypotheses: we think some users may not wear white after Labor Day, and then
    attempt to find features that model this outcome well. In this way, it can be
    more tractable using extremely simple regression models to find covarying features
    with the outcome in question.


    Another related piece of this puzzle is latent representations. For our Friday
    vegetarians, we may be trying to infer a particular persona that we know has this
    rule. That persona is a latent feature that we hope to map from other attributes.
    It''s important to be careful with this kind of modeling (in general, personas
    can be a bit nuanced and worthy of thoughtful decision making), but it can be
    quite helpful. It may seem like the user-modeling parts of your large recommender
    model should learn these—and they can! A useful trick is to pull forward personas
    learned from that model and regress them against hypothesized avoids to allow
    for more signal. However, the other model doesn''t always learn these personas
    because our loss functions for retrieval relevance (and downstream for ranking)
    are attempting to parse out relevance for individual users from the latent persona
    features—which may predict these avoids only amid context features.'
  merge: -1
  pgno: 290
- img_proc: true
  md: 'All in all, implementing the avoids is both very easy and very hard. When building
    production recommendation systems, the journey is not over when you get to serving;
    many models factor into the final step of the process.


    # Summary


    Sometimes you need to rely on more classic approaches to ensuring that the recommendations
    you''re sending downstream are satisfying essential rules of your business. Learning
    explicit or subtle lessons from your users can be turned into simple strategies
    to continue to delight them.


    However, this is not the end of our serving challenge. Another kind of downstream
    consideration is related to the kind of filtering we''ve done here but derives
    from user preference and human behavior. Ensuring that recommendations are not
    repeated, rote, and redundant is the subject of the next chapter on diversity
    in recommendations. We will also discuss how to balance multiple priorities simultaneously
    when determining exactly what to serve.'
  merge: -1
  pgno: 291
- img_proc: true
  md: '# CHAPTER 15

    Bias in Recommendation Systems


    We''ve spent much time in this book dissecting how to improve our recommendations,
    making them more personalized and relevant to an individual user. Along the way,
    you''ve learned that latent relationships between users and user personas encode
    important information about shared preferences. Unfortunately, all of this has
    a serious downside: bias.


    For the purposes of our discussion, we''ll talk about the two most important kinds
    of bias for recommendation systems:


    +   - Overly redundant or self-similar sets of recommendations

    - Stereotypes learned by AI systems


    First, we''ll delve into the crucial element of diversity in recommendation outputs.
    As critical as it is for a recommendation system to offer relevant choices to
    users, ensuring a variety of recommendations is also essential. Diversity not
    only safeguards against overspecialization but also promotes novel and serendipitous
    discoveries, enriching the overall user experience.


    The balance between relevance and diversity is delicate and can be tricky. This
    balance challenges the algorithm to go beyond merely echoing users'' past behavior
    and encourages an exploration of new territories, hopefully providing a more holistically
    positive experience with the content.


    This kind of bias is primarily a technical challenge; how do we satisfy the multiobjectives
    of diverse recommendations and highly relevant ones?


    We''ll consider the intrinsic and extrinsic biases in recommendation systems as
    an often unintended yet significant consequence of both the underlying algorithms
    and the data they learn from. Systemic biases in data collection or algorithmic
    design can'
  merge: -1
  pgno: 292
- img_proc: true
  md: 'result in prejudiced outputs, leading to ethical and fairness issues. Moreover,
    they may create echo chambers or filter bubbles, curtailing users’ exposure to
    a broader range of content and inadvertently reinforcing preexisting beliefs.


    At the end of this chapter, we will discuss the risks and provide resources to
    learn more about them. We are not experts in AI fairness and bias, but all ML
    practitioners should understand and seriously consider these topics. We aim to
    provide an introduction and signposts.


    # Diversification of Recommendations


    Our first investment into fighting bias is to explicitly target more diversity
    in our recommendation outputs. We’ll briefly cover two of the many goals you may
    pursue: intra-list diversity and serendipitous recommendations.


    *Intra-list diversity* attempts to ensure that there are a variety of types of
    items within a single recommendation list. The idea is to minimize similarity
    between the recommended items to reduce overspecialization and encourage exploration.
    High intra-list diversity within a set of recommendations increases the user’s
    exposure to many items they may like; however, the recommendations for any particular
    interest will be shallower, reducing the recall.


    *Serendipitous recommendations* are both surprising and interesting to the user.
    These are often items that the user might not have discovered independently or
    that are generally far less popular in the system. Serendipity can be introduced
    into the recommendation process by injecting nonobvious or unexpected choices—even
    if those have a relatively lower affinity score with the user—to improve overall
    serendipity. In an ideal world, these serendipitous choices are high affinity
    relative to other items of their popularity, so they’re the “best of the outside
    choices.”


    # Improving Diversity


    Now that we have our measures of diversity, we can explicitly attempt to improve
    them. Importantly, by adding diversity metrics as one of our objectives, we will
    potentially sacrifice performance on things like recall or NDCG. It can be useful
    to think of this as a Pareto problem, or to impose a lower bound on ranking metric
    performance that you’ll accept in pursuit of diversity.


    > In a *Pareto problem*, you have two priorities that often trade off with each
    other. In many areas of ML, and more generally applied mathematics, certain outcomes
    have a natural tension. Diversity in recommendations is an important example of
    a Pareto problem in recommendation systems, but it’s not the only one. In Chapter
    14, you briefly saw global optimization, which is an extreme case of trade-offs.'
  merge: -1
  pgno: 293
- img_proc: true
  md: 'One simple approach to improve diversity metrics is *reranking*: a post-processing
    step in which the initially retrieved recommendation list is reordered to enhance
    diversity. Various algorithms for re-ranking consider not just the relevance scores
    but also the dissimilarity among the items in the recommendation list. Re-ranking
    is a strategy that can operationalize any external loss function, so using it
    for diversity is a straightforward approach.


    Another strategy is to break out of the closed loop of recommendation feedback
    that we discussed in the section “Propensity Weighting for Recommendation System
    Evaluation” on page 208. As in multiarmed bandit problems, *explore-exploit trade-offs*
    can choose between exploiting what the model knows the user will like and exploring
    less certain options that may yield higher rewards. This trade-off can be used
    in recommendation systems to ensure diversity by occasionally choosing to *explore*
    and recommend less obvious choices. To implement a system like this, we can use
    affinity as a reward estimate and propensity as an exploitation measure.


    Instead of using these posterior strategies, an alternative is to *incorporate
    diversity as an objective in the learning process* or include a diversity regularization
    term in the loss function. Multiobjective loss including pairwise similarity as
    a regularizer can help train the model to learn diverse sets of recommendations.
    You previously saw that kinds of regularization can coach the training process
    to minimize certain behaviors. One regularization term that can be used explicitly
    is *similarity among recommendations*; the dot product of each embedding vector
    in the recommendations to each other can approximate this self-similarity. Let
    $\mathscr{R} = (R_1, R_2, ..., R_k)$ be the list of embeddings for the recommendations,
    and then consider $\mathscr{R}$ as a column matrix—with each row a recommendation.
    Calculating $\mathscr{R}$''s Gramian would yield all our dot-product similarity
    calculations, and thus we can regularize by this term with appropriate hyperparameter
    weighting. Note that this differs from our previous Gramian regularization because
    we''re considering the recommendations for only an individual query in this case.


    Finally, we can use rankings from multiple domains to boost recommendation diversity.
    By integrating various ranking measures, the recommendation system can suggest
    items from outside the user''s “mode,” thus broadening the range of recommendations.
    A vibrant discipline exists around multimodal recommendations, with the PinnerSage
    paper from Pinterest a particularly impressive implementation. In many of the
    works about multimodal recommendations, the retrieval step returns too many recommendations
    near to the user''s query vector. This forces self-similarity among the retrieved
    list. Multimodality forces multiple query vectors to be used for each request,
    allowing a built-in diversity.


    Let''s look at another perspective on item self-similarity and think about how
    the pairwise relationships between items can be used to this end.'
  merge: -1
  pgno: 294
- img_proc: true
  md: '# Applying Portfolio Optimization


    *Portfolio optimization*, a concept borrowed from finance, can be an effective
    approach to enhance diversity in recommendation systems. The goal here is to create
    a “portfolio” of recommended items that balances the two key parameters: relevance
    and diversity.


    At its heart, portfolio optimization is about risk (in our case, relevance) and
    return (diversity). Here’s a basic approach for applying this optimization to
    recommendation systems:


    +   1. Formulate an item representation such that the distance in the space is
    a good measure of similarity. This is in line with our previous discussions about
    what makes a good latent space.

    2. Calculate pairwise distance between items. You can do this by using whatever
    distance metric that enriches your latent space. It is important to calculate
    these pairwise distances across all items retrieved and be ready for consideration
    to return. Note that how you aggregate these distributions of distances can be
    nuanced.

    3. Evaluate affinity for the retrieved set. Note that calibrated affinity scores
    will perform better as they provide a more realistic estimate of return.

    4. Solve the optimization problem. Solving the problem will yield a weight for
    each item that balances the trade-off between relevance and diversity. Items with
    higher weights are more valuable in terms of both diversity and relevance, and
    they should be prioritized in the recommendation list. Mathematically, the problem
    looks like this:


    > $Maximize(w^T * r - \lambda * w^T * C * w)$


    Here, $w$ is a vector representing the weights (i.e., the proportion of each item
    in the recommendation list), $r$ is the relevance score vector, $C$ is the covariance
    matrix (which captures the diversity), and $\lambda$ is a parameter to balance
    relevance and diversity. The constraint here is that the sum of the weights equals
    1.


    Remember, the hyperparameter $\lambda$ trades off between relevance and diversity.
    This makes it a critical part of this process and may require experimentation
    or tuning based on the specific needs of your system and its users. This would
    be straightforward via hyperparameter optimization in one of many packages such
    as Weights & Biases.'
  merge: -1
  pgno: 295
- img_proc: true
  md: '# Multiobjective Functions


    Another related approach to diversity is to rank based on a multiobjective loss.
    Instead of the ranking stage being purely personalization affinity, introducing
    a second (or more!) ranking term can dramatically improve diversity.


    The simplest approach here is something similar to what you learned in Chapter
    14: hard ranking. A business rule that may apply to diversity is limiting each
    item category to only one item. This is the simplest case of multiobjective ranking
    because sorting by a categorical column and selecting the max in each group will
    achieve explicit diversity with respect to that covariate. Let’s move on to something
    more subtle.


    In “Stitching Together Spaces for Query-Based Recommendations”, one of this book’s
    authors worked with coauthor Ian Horn to implement a multiobjective recommendation
    system that balanced both personalization and relevance to an image-retrieval
    problem.


    The goal was to provide personalized recommendations for clothing that were similar
    to clothes in an image the user uploaded. This means there are two latent spaces:


    +   - The latent space of personalized clothes to a user

    - The latent space of images of clothing


    To solve this problem, we first had to make a decision: what was more important
    for relevance? Personalization or image similarity? Because the product was centered
    around a photo-upload experience, we chose image similarity. However, we had another
    fact to consider: each uploaded image contained several pieces of clothing. As
    is popular in computer vision, we first segmented the model into several items
    and then treated each item as its own query (which we called anchor-items). This
    meant our image-similarity retrieval was multimodal, as we searched with several
    different query vectors. After we gathered them all, we had to make one final
    ranking—a multiobjective ranking for image similarity and personalization. The
    loss function we optimized is shown here:


    ```

    $s_i = \alpha \times (1 - d_i) + (1 - \alpha) \times a_i$

    ```


    The $\alpha$ is a hyperparameter that represents the weighting, $d_i$ is the image
    distance, and $a_i$ is the personalization. We learn $\alpha$ experimentally.
    The last step was to impose some hard ranking to ensure that one recommendation
    came from each anchor.'

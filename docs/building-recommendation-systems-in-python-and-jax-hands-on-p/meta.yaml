  - '[PAGE 112]


    Finally, we need to talk about *serving* these features. Backed by the appropriately
    performant storage layer, we need to serve via API request the necessary feature
    vectors. Those feature vectors are details about the user that the model will
    need when serving recommendations—for example, the user’s location or content
    age restrictions. The API can serve back the entire set of features for the key
    or allow for more specification. Often the responses are JSON serialized for fast
    data transfer. It’s important that the features being served are the *most up-to-date
    set of features*, and latency here is expected to be < 100 ms for more serious
    industrial applications.


    One important caveat here is that for offline training, these feature stores need
    to accommodate *time travel*. Because our goal during training is to give the
    model the appropriate data to learn in the *most generalizable way*, when training
    our model, it’s crucial to not give it access to features out of time. This is
    called *data leakage* and can cause massive divergence in performance between
    training and production. The feature store for offline training thus must have
    knowledge of the features through time, so that during training, a time index
    may be provided to get the features as they were then. These *as_of* keys can
    be tied to the historical training data as we *replay* the history of what the
    user-item interactions looked like.


    With these pieces in place—and the important monitoring this system needs—you’ll
    be able to serve offline and online features to your models. In **Part III**,
    you will see model architectures that make use of them.


    > ## Data Leakage


    You’re likely familiar with the concept of leakage based on what you know about
    ML: corrupted performance metrics result because the training of the model had
    access to data that was supposed to be reserved for model performance evaluation.


    Data leakage in ML is divided into *feature leakage* and *training example leakage*.
    For recommendation systems, data leakage has the additional challenge of temporal
    leakage, or nonstationarity leakage. The real danger is that in recommendation
    systems, we see the same observational unit, a user, over and over, and observe
    a datum each time we see them. When we see them, other aspects of the system may
    have changed, and in reality we want to use features in our model that are the
    most up to date as of that observation. Both in features and training examples,
    to avoid leakage we need to always be thinking of our system’s timeline. This
    is why data preparation for recommendation systems is inherently time dependent.
    You will see in **Chapter 11** that our accuracy metrics will need to explicitly
    consider train-test splitting with respect to this time axis, and then be further
    grouped by the user. This also means that training recommendation systems often
    requires more resources than many other task types.'

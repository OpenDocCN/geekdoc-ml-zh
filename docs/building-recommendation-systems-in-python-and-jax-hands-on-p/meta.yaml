    dot in the scatterplot represents one run, and left to right is a time axis. The
    vertical axis is overall total loss, so lower is better, and it means that generally
    we''re converging toward better performance. The line inscribed along the bottom
    of the convex hull of the scatter points is the *Pareto frontier*, or the best
    performance at that x value. Since this is a time-series Pareto plot, it merely
    tracks the best performance in time.


    You may be wondering how and why we''re able to converge to better loss values
    in time. This is because we''ve conducted a Bayesian hyperparameter search, which
    means we selected our hyperparameters from independent Gaussians, and we updated
    our priors for each parameter based on performance of previous runs. For an introduction
    to this method, see "Bayesian Hyperparameter Optimization—A Primer" by Robert
    Mitson. In a real setting, we''d see less monotonic behavior in this plot, but
    we''d always be hoping to improve.


    ![](img/da17d05291861831978609329c481581_216_0.png)


    *Figure 10-7. The Pareto frontier of the loss values*


    # Prequential validation


    If we were to put the preceding approach into practice, we would need to capture
    our trained models in a model registry for use in production. Best practice is
    to establish a set of explicit evaluations against which to test a selection of
    models. In your basic ML training, you''ve likely been encouraged to think about
    validation datasets; these may take many forms, testing particular subsets of
    instances or features or even distributed across covariates in a known way.


    One useful framing for recommendation systems is to remember that they''re a fundamentally
    sequential dataset. With this in mind, let''s take another look at our ratings
    data. Later we will talk more about sequential recommenders, but while we''re
    talking about validation, it''s useful to mention how to take proper care.'

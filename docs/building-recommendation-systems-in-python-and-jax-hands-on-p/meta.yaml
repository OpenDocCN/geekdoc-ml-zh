  md: 'Then we call the Spark function `reduceByKey(lambda a, b: a+ b)`, which adds
    all the values with the same key together and returns the following:


    +   - (orange, 20)

    - (apple, 17)


    If you look at the code in `make_dictionary.py`, the *map phase* is where we take
    a document as input and then break it into tuples of (token, 1). In the *reduce
    phase*, the map outputs are joined by the key, which in this case is the token
    itself, and the reduce function is simply to sum up all the counts of tokens.


    Note that the reduce function assumes that the reduction is associative—that is,
    $(a + b + c) = (a + b) + c = a + (b + c)$. This allows the Spark framework to
    sum up some parts of the token dictionary in memory on the map phase (in some
    frameworks, this is called the *combine step*, where you run part of the reduction
    on the output of the map phase on the mapper machine) and then sum them up over
    several passes on the reduce phase.


    As an optimization, we use the Spark function `mapPartitions`. Map runs the provided
    function once per line (for which we have encoded an entire Wikipedia document
    as a protocol buffer, uuencoded as a single text line), whereas `mapPartitions`
    runs it over an entire partition, which is many documents, usually 64 MB of them.
    This optimization lets us construct a small Python dictionary over the entire
    partition so that we have many fewer token-count pairs to reduce. This saves on
    network bandwidth so the mapper has less data to send to the reducer, and is a
    good tip in general for these data processing pipelines to reduce network bandwidth
    (which is generally the most time-consuming part of data processing compared to
    computation).


    > ## Group Theory


    Because we are math nerds, and also because group theory shows up a lot in reduction
    operations, we will briefly introduce an algebraic structure known as *groups*
    so that you clearly understand all the terms used in the reduction phase.


    The concept of sets was mentioned in the introductory chapters; a *set* is a collection
    of items. The other concept you need to know is an operator. A binary *operator*
    takes two items and returns another item that is in the set.


    Examples of sets that are commonly used are integers, real numbers, and matrices.
    Examples of binary operators are addition, multiplication, and composition.


    An operator and a set denoted by the tuple (binary operator, a set of integers)
    form a group only if the group axioms are satisfied, namely:'
  merge: -1

  - '[PAGE 141]


    > Tight coupling is often bemoaned in service-architecture discussions, but when
    that coupling is between your logs and your actual objects of execution, this
    saves you a lot of headaches. When changing the objects used for your service,
    instead of having an additional step to ensure the logs reflect that, you can
    propagate those changes through automatically by using the same objects in tandem
    with a log formatter.


    These processes can also make good use of testing, to ensure that the objects
    your code cares about are visible in the logs, and these log-formatter objects
    can have enforced matching via unit tests. Finally, because we want to connect
    to downstream log parsing and log searching, it will be invaluable to have a clear
    relationship between the log stack and the application stack via object parameters
    and keys in the log data structure.


    # Active Learning


    So far, we have discussed using updating data to train on a much more frequent
    schedule, and we''ve discussed how to provide good recommendations, even when
    the model hasn''t seen enough data for those entities. An additional opportunity
    for the feedback loop of recommendation and rating is active learning.


    We won''t be able to go deep into the topic, which is a large and active field
    of research, but we will discuss the core ideas in relation to recommendation
    systems. *Active learning* changes the learning paradigm a bit by suggesting that
    the learner should not only be passively collecting labeled (maybe implicit) observations
    but also attempting to mine relations and preferences from them. Active learning
    determines which data and observations would be most useful in improving model
    performance and then seeks out those labels. In the context of RecSys, we know
    that the Matthew effect is one of our biggest challenges, in that many potentially
    good matches for a user may be lacking enough or appropriate ratings to bubble
    to the top during the recommendations.


    What if we employed a simple policy: every new item to the store gets recommended
    as a second option to the first 100 customers. Two outcomes would result:


    +   - We would quickly establish data for our new item to help cold-start it.

    - We would likely decrease the performance of our recommender.


    In many cases, the second outcome is worth enduring to achieve the first, but
    when? And is this the right way to approach this problem? Active learning provides
    a methodical approach to these problems.


    Another more specific advantage of active learning schemes is that you can broaden
    the distribution of observed data. In addition, to just cold-start items, we can
    use active learning to target broadening users'' interests. This is usually framed
    as an'
  - '[PAGE 142]


    uncertainty-reduction technique, as it can be used to improve the confidence in
    recommendations in a broader range of item categories. Here’s a simple example:
    a user shops for only sci-fi books, so one day you show them a few extremely well-liked
    Westerns to see whether that user might be open to occasionally getting recommendations
    for Westerns. See “Propensity Weighting for Recommendation System Evaluation”
    on page 208 for more details.


    An active learning system is instrumented as a loss function inherited from the
    model it’s trying to enhance—usually tied to uncertainty in some capacity—and
    it’s attempting to minimize that loss. Given a model $\mathcal{M}$ trained on
    a set of observations and labels $\{x_i, y_i\}$, with loss $\mathcal{L}$, an active
    learner seeks to find a new observation, $\bar{x}$, such that if a label was obtained,
    $\bar{y}$, the loss would decrease via the model’s training including this new
    pair. In particular, the goal is to approximate the marginal reduction in loss
    due to each possible new observation and find the observation that maximizes that
    reduction in the loss function:


    $$\text{Argmax}_{\bar{x}}\left(\mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\}}\right)
    - \mathcal{L}\left(\mathcal{M}_{\{x_i, y_i\} \cup \{\bar{x}\}}\right)\right)$$


    The structure of an active learning system roughly follows these steps:


    +   1. Estimate marginal decrease in loss due to obtaining one of a set of observations.

    2. Select the observation with the largest effect.

    3. Query the user; i.e., provide the recommendation to obtain a label.

    4. Update the model.


    It’s probably clear that this paradigm requires a much faster training loop than
    our previous fast retraining schemes. Active learning can be instrumented in the
    same infrastructure as our other setups, or it can have its own mechanisms for
    integration into the pipeline.


    # Types of optimization


    The optimization procedure carried out by an active learner in a recommendation
    system has two approaches: personalized and nonpersonalized. Because RecSys is
    all about personalization, it’s no surprise that we would, in time, want to push
    the utility of our active learning further by integrating the great details we
    already know about users.


    We can think of these two approaches as global loss minimization and local loss
    minimization. Active learning that isn’t personalized tends to be about minimizing
    the loss over the entire system, not for only one user. (This split doesn’t perfectly
    capture the ontology, but it’s a useful mnemonic). In practice, optimization methods
    are nuanced and sometimes utilize complicated algorithms and training procedures.'
  - '[PAGE 143]


    Let''s talk through some factors to optimize for nonpersonalized active learning:


    *User rating variance*

    Consider which items have the largest variance in user ratings to try to get more
    data on those we find the most complicated in our observations.


    *Entropy*

    Consider the dispersion of ratings of a particular item across an ordinal feature.
    This is useful for understanding whether our set of ratings for an item is distributed
    uniformly at random.


    *Greedy extend*

    Measure which items seem to yield the worst performance in our current model;
    this attempts to improve our performance overall by collecting more data on the
    hardest items to recommend well.


    *Representatives or exemplars*

    Pick out items that are extremely representative of large groups of items; we
    can think of this as “If we have good labels for this, we have good labels for
    everything like this.”


    *Popularity*

    Select items that the user is most likely to have experience with to maximize
    the likelihood that they''ll give an opinion or rating.


    *Co-coverage*

    Attempt to amplify the ratings for frequently occurring pairs in the dataset;
    this strikes directly at the CF structure to maximize the utility of observations.


    On the personalized side:


    *Binary prediction*

    To maximize the chances that the user can provide the requested rating, choose
    the items that the user is more likely to have experienced. This can be achieved
    via an MF on the binary ratings matrix.


    *Influence based*

    Estimate the influence of item ratings on the rating prediction of other items,
    and select the items with the largest influence. This attempts to directly measure
    the impact of a new item rating on the system.


    *Rating optimized*

    Obviously, there''s an opportunity to simply use the best rating or best rating
    within a class to perform active learning queries, but this is precisely the standard
    strategy in recommendation systems to serve good recommendations.'
  - '[PAGE 144]


    *User segmented*

    When available, use user segmentation and feature clusters within users to anticipate
    when users have opinions and preferences on an item by virtue of the user-similarity
    structure.



  md: '+   - A daily table snapshot may be limited by time to see *what records have
    been added today*.

    - An event table snapshot may be used to feed a set of events into an event stream
    processor like Segment (note that you may also set up live event streams like
    Kafka).

    - An hourly aggregated table can be used for status logging or monitoring.


    In general, the paradigm is usually to operate on snapshots for downstream data
    processing. Many of the kinds of data processing we mentioned earlier—like computing
    user similarity—are operations that may require significant data reads. *It’s
    important to not build ML applications that require extensive querying on the
    production database*, because doing so would likely decrease performance of the
    app and result in a slower user experience. This decrease will undermine the improvement
    made possible by your recommendations.


    Once you’ve snapshotted the tables you’re interested in, you can often find a
    collection of data pipelines useful to transform that data into even more specific
    tables in your *data warehouse* (where you should be doing most of your work anyway).
    Tools like Dagster, dbt, Apache Airflow, Argo, and Luigi are popular data-pipeline
    and workflow orchestration tools for extract, transform, load (ETL) operations.


    # Data Structures for Learning and Inference


    This section introduces three important data structures that will enable our recommendation
    system to perform complex operations quickly. The goal of each structure is to
    sacrifice precision as little as possible, while speeding up access to the data
    in real time. As you’ll see, these data structures form the backbone of the real-time
    inference pipeline and approximate what takes place in the batch pipeline as accurately
    as possible.


    The three data structures are as follows:


    +   - Vector search/ANN index

    - Bloom filters for candidate filtering

    - Feature stores


    So far, we’ve discussed the necessary components for getting data flowing in your
    system. These help organize data to make it more accessible during the learning
    and inference processes. Also, we’ll find some shortcuts to speed up inference
    during retrieval. Vector search will allow us to identify similar items at scale.
    Bloom filters will allow us to rapidly evaluate many criteria for excluding results.
    Feature stores will provide us with necessary data about users for recommendation
    inference.'

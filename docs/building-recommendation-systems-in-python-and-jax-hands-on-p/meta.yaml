  - '[PAGE 117]


    ![](img/da17d05291861831978609329c481581_117_0.png)


    # Different Embeddings


    Unfortunately, while we''d love the same embedding space (for nearest-neighbors
    lookup) to work well for our queries and our documents (items, etc.), this is
    often not the case. The simplest example is something like asking questions and
    hoping to find relevant Wikipedia articles. This problem is often referred to
    as the queries being "out of distribution" from the documents.


    Wikipedia articles are written in a declarative informative article style, whereas
    questions are often brief and casual. If you were to use an embedding model focused
    on capturing semantic meaning, you''d naively expect the queries to be located
    in significantly different subspaces than the articles. This means that your distance
    computations will be affected. This is often *not* a huge problem because you
    retrieve via relative distances, and you can hope that the shared subspaces are
    enough to provide a good retrieval. However, it can be hard to predict when these
    perform poorly.


    The best practice is to carefully examine the embeddings on common queries and
    on target results. These problems can be *especially* bad on implicit queries
    like a series of actions taken at a particular time of day to look up food recommendations.
    In this case, we expect the queries to be wildly different from the documents.


    # Context-Based Recommendations


    A context is quite similar to a query but tends to be more obviously feature based
    and frequently less similar to the items/users distributions. *Context* is usually
    the term used to represent exogenous features to the system that may have an effect
    on the system—i.e., auxiliary information such as time, weather, or location.
    Context-based recommendation is similar to query based in that context is an additional
    signal that the system needs to consider during recommendation, but more often
    than not, the query should dominate the signal for recommendation, whereas the
    context should not.


    Let''s take a simple example of ordering food. A query for a food-delivery recommendation
    system would look like *Mexican food*; this is an extremely important signal from
    the user looking for burritos or quesadillas of how the recommendations should
    look. A context for a food-delivery recommendation system would look like *it''s
    almost lunchtime*. This signal is useful but may not outweigh user personalization.
    Putting hard-and-fast rules on this weighting can be difficult, so usually we
    don''t, and instead we learn parameters via experimentation.'
  - '[PAGE 118]


    Context features fit into the architecture similar to the way queries do, via
    learned weightings as part of the objective function. Your model will learn a
    representation between context features and items, and then add that affinity
    into the rest of the pipeline. Again, you can make use of this early in the retrieval,
    later in the ranking, or even during the serving step.


    # Sequence-Based Recommendations


    *Sequence-based recommendations* build on context-based recommendations but with
    a specific type of context. Sequential recommendations are based on the idea that
    the recent items the user has been exposed to should have a significant influence
    on the recommendations. A common example here is a music-streaming service, as
    the last few songs that have been played can significantly inform what the user
    might want to hear next. To ensure that this *autoregressive*, or sequentially
    predictive, set of features has an influence on recommendations, we can treat
    each item in the sequence as a weighted context for the recommendation.


    Usually, the item-item representation similarities are weighted to provide a collection
    of recommendations, and various strategies are used for combining these. In this
    case, we normally expect the user to be of high importance in the recommendations,
    but the sequence is also of high importance. One simple model is to think of the
    sequence of items as a sequence of tokens, and form a single embedding for that
    sequence—as in NLP applications. This embedding can be used as the context in
    a context-based recommendation architecture.


    ![](img/da17d05291861831978609329c481581_118_0.png)


    **Naive Sequence Embeddings**

    The combinatorics of one-embedding-per-sequence explode in cardinality; the number
    of potential items in each sequential slot is very large, and each item in the
    sequence multiplies those possibilities together. Imagine, for example, five-word
    sequences, where the number of possibilities for each item is close to the size
    of the English lexicon, and thus it would be that size to the fifth power. We
    provide simple strategies for dealing with this in Chapter 17.


    # Why Bother with Extra Features?


    Sometimes it is useful to step back and ask if a new technology is actually worth
    caring about. So far in this section, we’ve introduced four new paradigms for
    thinking about a recommender problem. That level of detail may seem surprising
    and potentially even unnecessary.


    One of the core reasons that things like context- and query-based recommendations
    become relevant is to deal with some of the issues mentioned before around sparsity
    and cold starting. Sparsity makes things that aren’t cold seem cold via the learner’s'
  - '[PAGE 119]


    underexposure to them, but true cold starting also exists because of new items
    being added to catalogs with high frequency in most applications. We will address
    cold starting in detail, but for now, suffice it to say that one strategy for
    warm starting is to use other features that *are* available even in this regime.


    In applications of ML that are explicitly feature based, we rarely battle the
    cold-start problem to such a degree, because at inference time we''re confident
    that the model parameters useful for prediction are well aligned with those features
    that are available. In this way, feature-included recommendation systems are bootstrapping
    from a potentially weaker learner that has more guaranteed performance via always-available
    features.


    The second analogy that the previous architectures are reflecting is that of boosting.
    Boosted models operate via the observation that ensembles of weaker learners can
    reach better performance. Here we are asking for some additional features to help
    these networks ensemble with weak learners, to boost their performance.


    # Encoder Architectures and Cold Starting


    The previous problem framings of various types of recommendation problems point
    out four model architectures, each fitting into our general framework of collector,
    ranker, and server. With this understanding, let''s discuss in a bit more detail
    how model architecture can become intertwined with serving architecture. In particular,
    we also need to discuss feature encoders.


    The key opportunity from encoder-augmented systems is that for users, items, or
    contexts without much data, we can still form embeddings on the fly. Recall from
    before that our embeddings make the rest of our system possible, but cold-starting
    recommendations is a huge challenge.


    The *two-towers architecture*—or dual-encoder networks—introduced in “Sampling-Bias-Corrected
    Neural Modeling for Large Corpus Item Recommendations” by Xinyang Yi et al. is
    shown in Figure 7-2 explicit model architecture is aimed at prioritizing features
    of both the user and items when building a scoring model for a recommendation
    system. We''ll see a lot more discussion of matrix factorization (MF), which is
    a kind of latent collaborative filtering (CF) derived from the user-item matrix
    and some linear algebraic algorithms. In the preceding section, we explained why
    additional features matter. Adding these *side-car* features into an MF paradigm
    is possible and has shown to be successful—for example, applications CF for implicit
    feedback, factorization machines, and SVDFeature. However, in this model we will
    take a more direct approach.'
  - '[PAGE 120]


    ![](img/da17d05291861831978609329c481581_120_0.png)


    Figure 7-2. The two towers responsible for the two embeddings


    In this architecture, we take the left tower to be responsible for items and the
    right tower to be responsible for the user and, when appropriate, context. These
    two tower architectures are inspired by the NLP literature and, in particular,
    “Learning Text Similarity with Siamese Recurrent Networks” by Paul Neculoiu et
    al.


    Let’s detail how this model architecture is applied to recommending videos on
    YouTube. For a full overview of where this architecture was first introduced,
    see “Deep Neural Networks for YouTube Recommendations” by Paul Covington et al.
    Training labels will be given by clicks, but with an additional regression feature
    $r_i \in \{0, 1\}$, where the minimum value corresponds to a click but trivial
    watch time, and the maximum of the range corresponds to a full watch.


    As we’ve mentioned, this model architecture will explicitly include features from
    both user and items. The video features will consist of categorical and continuous
    features, like VideoId, ChannelId, VideoTopic, and so on. An embedding layer is
    used for many of the categorical features to move to dense representations. The
    user features include watch histories via bag of words and standard user features.


    This model structure combines many of the ideas you’ve seen before but has relevant
    takeaways for our system architecture. First is the idea of sequential training.
    Each *temporal batch* of samples should be trained in sequence to ensure that
    model drift is shown to the model; we will discuss prequential datasets in “Prequential
    validation on page 197”. Next, we present an important idea for the productionizing
    of these kinds of models: encoders.'

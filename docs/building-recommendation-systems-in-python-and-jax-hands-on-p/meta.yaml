- md: "In the preceding section, we looked at three similarity scores, but we need\
    \ to expand our notion of the relevant sets for these measures. Let’s consider\
    \ Jaccard similarity as a prototype.\n\nGiven a user $y_u$ and an unseen item\
    \ $x_i$, let’s ask, “What is the Jaccard similarity between this user and item?”\
    \ Let’s remember that Jaccard similarity is the similarity between two sets, and\
    \ in the definition those sets were both *incidence sets of users’ interactions*.\
    \ Here are three ways to use this approach for recommendations:\n\n*User-user*\n\
    Using our preceding definition, find the $k$ users with maximum Jaccard similarity.\
    \ Compute the percentage of these users who have interacted with $x_i$. You may\
    \ also wish to normalize this by popularity of the item $x_i$.\n\n*Item-item*\n\
    Compute the set of users that each item has interacted with, and compute the $k$\
    \ items most similar to $x_i$ with respect to Jaccard similarity of these item-user\
    \ incidence sets. Compute the percentage of these items that are in $y_u$’s set\
    \ of interactions. You may also wish to normalize this by total interactions of\
    \ $y_u$ or the popularity of the similar items.\n\n*User-item*\nCompute the user\
    \ $y_u$’s set of items they’ve interacted with, and the set of items co-occurring\
    \ with $x_i$ in any user’s incidence set of interaction. Compute the Jaccard similarity\
    \ between these two sets.\n\nFrequently in designing ranking systems, we specify\
    \ the *query*, which refers to which nearest neighbors you’re looking for. We\
    \ then specify how you use those neighbors to yield a recommendation. The items\
    \ that may become the recommendation are the candidates, but as you saw in the\
    \ preceding example, the neighbors may not be the candidates themselves. An additional\
    \ complication is that you usually need to compute many candidate scores simultaneously,\
    \ which requires optimized computations that we’ll see in Chapter 16.\n\n## Summary\n\
    \nIn this chapter, we’ve begun to dig deeper into notions of similarity—building\
    \ on our intuition from retrieval that users’ preferences might be captured by\
    \ the interactions they’ve already demonstrated.\n\nWe started out with simple\
    \ models based on features about users and built linear models relating them to\
    \ our target outcomes. We then combined those simple models with other aspects\
    \ of feature modeling and hybrid systems.\n\nNext, we moved into discussing counting—in\
    \ particular, counting the co-occurrence of items, users, or baskets. By looking\
    \ at frequent co-occurrence, we can build models that capture “If you liked *a*,\
    \ you may like *b*.” These models are simple to understand, but we can use these\
    \ basic correlation structures to build similarity measures, and thus latent spaces\
    \ where ANN-based retrieval can yield good candidates for recommendations.\n\n\
    One point that you may have noticed about the featurization of all the items and\
    \ the building of our co-occurrence matrices is that the number of features is\
    \ astronomically large—one dimension for each item! This is the area of investigation\
    \ we’ll tackle in the next chapter: how to reduce the dimensionality of your *latent\
    \ space*.\n\n## CHAPTER 10\nLow-Rank Methods\n\nIn the preceding chapter, we lamented\
    \ at the challenge of working with so many features. By letting each item be its\
    \ own feature, we were able to express a lot of information about user preference\
    \ and item-affinity correlations, but we were in big trouble in terms of the curse\
    \ of dimensionality. Combine this with the reality of very sparse features, and\
    \ you're in danger. In this chapter, we'll turn to smaller feature spaces. By\
    \ representing users and items as low-dimensional vectors, we can capture the\
    \ complex relationships between them in a more efficient and effective way. This\
    \ allows us to generate more personalized and relevant recommendations for users\
    \ while also reducing the computational complexity of the recommendation process.\n\
    \nWe will explore the use of low-dimensional embeddings and discuss the benefits\
    \ and some of the implementation details of this approach. We will also look at\
    \ code in JAX that uses modern gradient-based optimization to reduce the dimension\
    \ of your item or user representations.\n\n## Latent Spaces\n\nYou are already\
    \ familiar with feature spaces, which are usually categorical or vector-valued\
    \ direct representations of the data. This can be the raw red, green, and blue\
    \ values of an image, counts of items in a histogram, or attributes of an object\
    \ like length, width, and height. Latent features, on the other hand, do not represent\
    \ any specific real value feature of the items but are initialized randomly and\
    \ then learned to suit a task. The GloVe embeddings we discussed in Chapter 8\
    \ are one such example of a latent vector that was learned to represent the log\
    \ count of words. Here we will cover more ways to generate these latent features\
    \ or embeddings.\n\n![](img/da17d05291861831978609329c481581_187_0.png)\n\n##\
    \ Focus on Your “Strengths”\n\nThis chapter relies heavily on linear algebra,\
    \ so it’s good to read up on vectors, dot products, and norms of vectors before\
    \ proceeding. Having an understanding of matrices and the rank of matrices will\
    \ also be useful. Consider *Linear Algebra and Its Applications* by Gilbert Strang.\n\
    \nOne of the reasons latent spaces are so popular is that they are usually lower\
    \ in dimension than the features they represent. For example, if the user-item\
    \ rating matrix or interaction matrix (where the matrix entries are 1 if a user\
    \ has interacted with an item) is $N \\times M$ dimensional, then factorizing\
    \ the matrix into latent factors of $N \\times K$ and $K \\times M$, where $K$\
    \ is much smaller than $N$ or $M$ is an approximation of the missing entries because\
    \ we’re relaxing the factorization. $K$ being smaller than $N$ or $M$ is usually\
    \ called an *information bottleneck*—that is, we are forcing the matrix to be\
    \ made up of a much smaller matrix. This means the ML model has to make up missing\
    \ entries, which might be good for recommender systems. As long as users have\
    \ interacted with enough similar items, by forcing the system to have a lot less\
    \ capacity in terms of degrees of freedom, then factorization can completely reconstruct\
    \ the matrix, and the missing entries tend to get filled by similar items.\n\n\
    Let’s see what happens, for example, when we factor a user-item matrix of $4 \\\
    times 4$ into a $4 \\times 2$ and a $2 \\times 4$ vector using SVD.\n\nWe are\
    \ supplying a matrix whose rows are users and whose columns are items. For example,\

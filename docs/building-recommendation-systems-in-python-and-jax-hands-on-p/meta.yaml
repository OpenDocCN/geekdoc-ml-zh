    \ We then return the positive score, negative score, and all three embedding vectors.\
    \ We return the embedding vectors as well as the scores because we want to ensure\
    \ that the model generalizes to new, unseen data as in a held-out validation set,\
    \ so we want to make sure the embedding vectors are not too large. The concept\
    \ of capping their size is called *regularization*.\n\nNow let's take a look at\
    \ `train_shop_the_look.py` (Example 5-4). We'll break it into separate function\
    \ calls and discuss them one by one.\n\n# Example 5-4. Generating triplets for\
    \ training\n\n```\ndef generate_triplets(\n    scene_product: Sequence[Tuple[str,\
    \ str]],\n    num_neg: int) -> Sequence[Tuple[str, str, str]]:\n    \"\"\"Generate\
    \ positive and negative triplets.\"\"\"\n    count = len(scene_product)\n    train\
    \ = []\n    test = []\n    key = jax.random.PRNGKey(0)\n    for i in range(count):\n\
    \        scene, pos = scene_product[i]\n        is_test = i % 10 == 0\n      \
    \  key, subkey = jax.random.split(key)\n        neg_indices = jax.random.randint(subkey,\
    \ [num_neg], 0, count - 1)\n        for neg_idx in neg_indices:\n            _,\
    \ neg = scene_product[neg_idx]\n            if is_test:\n                test.append((scene,\
    \ pos, neg))\n            else:\n                train.append((scene, pos, neg))\n\
    \    return train, test\n\ndef shuffle_array(key, x):\n    \"\"\"Deterministic\
    \ string shuffle.\"\"\"\n    num = len(x)\n    to_swap = jax.random.randint(key,\
    \ [num], 0, num - 1)\n    return [x[t] for t in to_swap]\n```\n\nThe code fragment\

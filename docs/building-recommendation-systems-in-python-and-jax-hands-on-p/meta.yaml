    or a random selection. Otherwise, we adhere to the same API schema and return
    the same shape of data.


    # What Should ϵ Be?


    In the preceding discussion, ϵ is a fixed number for the entire call, but what
    should the value be? This is actually an area of great study, and the general
    wisdom is to start with large ϵ (to encourage more exploration) and then reduce
    over time. Determining the rate at which you decrease it, the starting value,
    and so on, requires serious thought and research. Additionally, this value can
    be tied into your prediction loop and be part of the training process. See “The
    Exploration-Exploitation Trade-Off: Intuitions and Strategies” by Joseph Rocca
    for a deeper dive.


    Other—often better—sampling techniques exist for optimization. *Importance sampling*
    can utilize the ranking functions we build later to integrate the explore-exploit
    with what our data has to teach.'
- md: '## The NLP-RecSys Relationship


    Let’s utilize some intuition from a different area of ML, natural language processing.
    One of the fundamental models in NLP is *word2vec*: a sequence-based model for
    language understanding that uses the words that occur in sentences together.


    For *skipgram-word2vec*, the model takes sentences and attempts to learn the implicit
    meaning of their words via their co-occurrence relationships with other words
    in those sentences. Each pair of co-occurring words constitutes a sample that
    is one-hot encoded and sent into a vocabulary-sized layer of neurons, with a bottleneck
    layer and a vocabulary-sized output layer for probabilities that words will occur.


    Via this network, we reduce the size of our representation to the bottleneck dimension
    and thus find a smaller dimensional representation of all our words than the original
    corpus-sized one-hot embedding. The thinking is that similarity of words can now
    be computed via vector similarity in this new representation space.


    Why is this related to recommendation systems? Well, because if we take the ordered
    sequence of user-item interactions (e.g., the sequence of movies a user has rated),
    we can utilize the same idea from word2vec to find item similarity instead of
    word similarity. In this analogy, the user history is the *sentence*.


    Previously, using our CF similarity, we decided that similar users can help inform
    what a good recommendation for a user should be. In this model, we are finding
    item-item similarity, so instead we assume that a user will like the items similar
    to those previously liked.


    ![](img/da17d05291861831978609329c481581_59_0.png)


    **Items as Words**


    You may have noticed that natural language models treat words as sequences, and
    in fact, our user history is a sequence too! For now, hold onto this knowledge.
    Later, this will guide us to sequence-based methods for RecSys.


    ## Vector Search


    We have built a collection of vector representations of our items, and we claim
    that similarity in this space (often called a *latent space*, *representation
    space*, or *ambient space*) means similarity in *likability* to users.


    To convert this similarity to a recommendation, consider a user $A$ with a collection
    of previously liked items $\mathscr{R}_A$, and consider $\mathscr{A} = \{v_x |
    x \in \mathscr{R}_A\}$ the set of vectors associated to those items in this latent
    space. We are looking for a new item $y$ that we think is good for $A$.


    ![](img/da17d05291861831978609329c481581_60_0.png)


    ## The Old Curse


    These latent spaces tend to be of high dimension, which Euclidean distance famously
    performs poorly in. As regions become sparse, the distance function performance
    decreases; local distances are meaningful, but global distances are not to be
    trusted. Instead, cosine distance shows better performance, but this is a topic
    of deep exploration. Additionally, instead of minimizing the distance, in practice
    it''s better to maximize the similarity.


    One simple way to use similarity to produce a recommendation is to take the closest
    item to the average of those that $A$ likes:


    $$\arg\max_{y} \{ \text{USim}(v_y, avg(\cdot A)) \mid y \in \text{Items} \}$$


    Here, $d(-, -)$ is a distance function in the latent space (usually cosine distance).

    The argmax essentially treats all of $A$''s ratings equally and suggests something
    near those. In practice, this process is often fraught. First, you could weight
    the terms by rating:


    $$\arg\max_{y} \left\{ \text{USim}\left(v_y, \frac{\sum_{v_x \in \cdot A} r_x}{|\mathcal{R}_{\cdot
    A}|}\right) \mid y \in \text{Items} \right\}$$


    This can potentially improve the representativeness of the user feedback in the
    recommendations. Alternatively, you might find that a user rates movies across
    a variety of genres and themes. Averaging here will definitely lead to worse results,
    so maybe you want to simply find recommendations similar to one movie the user
    liked, weighted by that rating:


    $$\arg\max_{y} \left\{ \frac{\text{USim}(v_y, v_x)}{r_x} \mid y \in \text{Items},
    v_x \in \cdot A \right\}$$


    Finally, you may even want to do this process several times for different items
    a user liked to get $k$ recommendations:


    $$\min -k \left\{ \arg\max_{y} \left\{ \frac{\text{USim}(v_y, v_x)}{r_x} \mid
    y \in \text{Items} \right\} \mid v_x \in \cdot A \right\}$$


    Now we have $k$ recommendations; each is similar to something that the user has
    liked and is weighted by how much they liked it. This approach utilized only an
    implicit geometry of the items formed by their co-occurrences.


    Latent spaces and the geometric power that comes with them for recommendations
    will be a through line for the rest of the book. We will often formulate our loss
    functions via these geometries, and we''ll exploit the geometric intuition to
    brainstorm where to expand our technique next.


    ## Nearest-Neighbors Search


    A reasonable question to ask is “How do I get these vectors that minimize this
    distance?” In all the preceding schemes, we are computing many distances and then
    finding minimums. In general, the problem of nearest neighbors is an extremely
    important and well-studied question.


    While finding the exact nearest neighbors can sometimes be slow, a lot of great
    progress has been made on approximate nearest neighbors (ANN) searches. These
    algorithms not only return very close to the actual nearest neighbors, but they
    also perform orders of complexity faster. In general, when you see us (or other
    publications) computing an argmin (the argument that minimized the function) over
    some distances, there''s a good chance ANN is what''s used in practice.


    ## Summary


    Recommendation systems in the preceding chapter discussed data distribution principles
    such as Zipf''s law and the Matthew Effect. These principles lead to challenges,
    such as skewed user similarity scores and data sparsity. In the world of ML, while
    the traditional math focuses on distance, the emphasis is on the concept of similarity.
    Different measures of similarity can drastically alter algorithm learning outcomes,
    with clustering being a primary application.


    In the realm of recommendations, items are often represented in high-dimensional
    latent spaces. Similarity in these spaces hints at user preferences. Methods include
    recommending items close to a user''s average liked items, and this may be improved
    by adding a weighting by user-rating. However, individual preferences necessitate
    diverse recommendations. Latent spaces continue to be influential, driving recommendation
    techniques.


    Locating these vectors effectively requires the nearest-neighbors search. Though
    exact methods are resource-intensive, approximate nearest-neighbors offer a fast,
    precise solution, providing the foundation for the recommendation systems discussed
    in the current chapter.


    # CHAPTER 4


    ## System Design for Recommending


    Now that you have a foundational understanding of how recommendation systems work,
    let’s take a closer look at the elements needed and at designing a system that
    is capable of serving recommendations at industrial scale. *Industrial scale*
    in our context will primarily refer to *reasonable scale* (a term introduced by
    Ciro Greco, Andrea Polonioli, and Jacopo Tagliabue in “ML and MLOps at a Reasonable
    Scale”)—production applications for companies with tens to hundreds of engineers
    working on the product, not thousands.


    In theory, a recommendation system is a collection of math formulas that can take
    historical data about user-item interactions and return probability estimates
    for a user-item-pair’s affinity. In practice, a recommendation system is 5, 10,
    or maybe 20 software systems, communicating in real time and working with limited
    information, restricted item availability, and perpetually out-of-sample behavior,
    all to ensure that the user sees *something*.


    This chapter is heavily influenced by “System Design for Recommendations and Search”
    by Eugene Yan and “Recommender Systems, Not Just Recommender Models” by Even Oldridge
    and Karl Byleen-Higley.


    ## Online Versus Offline


    ML systems consist of the stuff that you do in advance and the stuff that you
    do on the fly. This division, between online and offline, is a practical consideration
    about the information necessary to perform tasks of various types. To observe
    and learn large-scale patterns, a system needs access to lots of data; this is
    the offline component. Performing inference, however, requires only the trained
    model and relevant input data. This is why many ML system architectures are structured
    in this'
  mdcn: '## NLP与推荐系统的关系


    让我们借鉴机器学习另一领域——自然语言处理的一些直觉。NLP的基础模型之一是*word2vec*：一种基于序列的语言理解模型，它利用句子中共同出现的词语。


    对于*skipgram-word2vec*模型，它接收句子，并试图通过句子中词语与其他词语的共现关系来学习词语的隐含意义。每一对共现词语构成一个样本，该样本经过独热编码后被送入一个词汇表大小的神经元层，通过一个瓶颈层和一个词汇表大小的输出层来预测词语出现的概率。


    通过这个网络，我们将表示的维度降低到瓶颈层的维度，从而得到一个比原始语料库大小的独热嵌入维度更小的词语表示。其思路是，词语的相似性现在可以通过这个新表示空间中的向量相似性来计算。


    这与推荐系统有何关系？嗯，因为如果我们把用户-物品交互的有序序列（例如，用户评分过的电影序列）看作输入，我们就可以利用word2vec的相同思想来寻找物品相似性，而不是词语相似性。在这个类比中，用户历史就是*句子*。


    之前，使用我们的协同过滤相似性，我们认为相似的用户可以帮助确定什么是好的推荐。在这个模型中，我们寻找的是物品与物品的相似性，因此我们假设用户会喜欢与他们之前喜欢的物品相似的物品。


    ![](img/da17d05291861831978609329c481581_59_0.png)


    **物品即词语**


    你可能已经注意到，自然语言模型将词语视为序列，事实上，我们的用户历史也是一个序列！现在，请记住这个知识点。稍后，这将引导我们走向基于序列的推荐系统方法。


    ## 向量搜索


    我们已经构建了一个物品向量表示的集合，并且我们声称在这个空间（通常称为*潜在空间*、*表示空间*或*环境空间*）中的相似性意味着对用户*喜爱程度*的相似性。


    要将这种相似性转化为推荐，考虑一个用户 $A$，他有一组之前喜欢的物品 $\mathscr{R}_A$，并考虑 $\mathscr{A} = \{v_x |
    x \in \mathscr{R}_A\}$ 是这些物品在该潜在空间中关联的向量集合。我们正在寻找一个新的物品 $y$，我们认为它对 $A$ 是好的。


    ![](img/da17d05291861831978609329c481581_60_0.png)


    ## 旧的诅咒


    这些潜在空间往往是高维的，而欧几里得距离在高维空间中表现不佳是出了名的。随着区域变得稀疏，距离函数的性能会下降；局部距离是有意义的，但全局距离不可信。相反，余弦距离表现出更好的性能，但这是一个需要深入探讨的话题。此外，在实践中，与其最小化距离，不如最大化相似性。


    使用相似性产生推荐的一个简单方法是，取与 $A$ 喜欢的物品的平均值最接近的物品：


    $$\arg\max_{y} \{ \text{USim}(v_y, avg(\cdot A)) \mid y \in \text{Items} \}$$


    这里，$d(-, -)$ 是潜在空间中的距离函数（通常是余弦距离）。

    argmax 本质上将 $A$ 的所有评分视为同等重要，并推荐接近这些物品的东西。在实践中，这个过程往往充满问题。首先，你可以根据评分对项进行加权：


    $$\arg\max_{y} \left\{ \text{USim}\left(v_y, \frac{\sum_{v_x \in \cdot A} r_x}{|\mathcal{R}_{\cdot
    A}|}\right) \mid y \in \text{Items} \right\}$$


    这有可能提高用户反馈在推荐中的代表性。或者，你可能会发现用户对各种类型和主题的电影都进行了评分。在这里取平均值肯定会导致更差的结果，所以也许你想简单地找到与用户喜欢的某部电影相似的推荐，并根据该评分进行加权：


    $$\arg\max_{y} \left\{ \frac{\text{USim}(v_y, v_x)}{r_x} \mid y \in \text{Items},
    v_x \in \cdot A \right\}$$


    最后，你甚至可能想对用户喜欢的不同物品多次执行此过程，以获得 $k$ 个推荐：


    $$\min -k \left\{ \arg\max_{y} \left\{ \frac{\text{USim}(v_y, v_x)}{r_x} \mid
    y \in \text{Items} \right\} \mid v_x \in \cdot A \right\}$$


    现在我们有了 $k$ 个推荐；每一个都与用户喜欢的某个物品相似，并根据他们喜欢的程度进行加权。这种方法仅利用了由物品共现形成的隐式几何结构。


    潜在空间及其带来的几何能力用于推荐，将是本书后续内容的一条主线。我们通常会通过这些几何结构来构建损失函数，并利用几何直觉来头脑风暴下一步技术扩展的方向。


    ## 最近邻搜索


    一个合理的问题是“我如何获得这些最小化距离的向量？”在所有前面的方案中，我们计算许多距离，然后找到最小值。一般来说，最近邻问题是一个极其重要且被广泛研究的问题。


    虽然找到精确的最近邻有时可能很慢，但在近似最近邻搜索方面已经取得了很大进展。这些算法不仅返回非常接近实际最近邻的结果，而且其复杂度性能也快了几个数量级。通常，当你看到我们（或其他出版物）在某些距离上计算argmin（使函数最小化的参数）时，很有可能在实践中使用的是ANN。


    ## 总结


    上一章讨论的推荐系统涉及数据分布原则，如齐普夫定律和马太效应。这些原则带来了挑战，例如用户相似性分数偏斜和数据稀疏。在机器学习领域，虽然传统数学关注距离，但重点在于相似性的概念。不同的相似性度量会极大地改变算法学习结果，聚类是其主要应用。


    在推荐领域，物品通常在高维潜在空间中表示。这些空间中的相似性暗示了用户偏好。方法包括推荐接近用户平均喜欢物品的物品，并且可以通过按用户评分加权来改进。然而，个体偏好需要多样化的推荐。潜在空间继续发挥着影响力，推动着推荐技术的发展。


    有效地定位这些向量需要最近邻搜索。虽然精确方法资源消耗大，但近似最近邻提供了一种快速、精确的解决方案，为本章讨论的推荐系统奠定了基础。


    # 第四章


    ## 推荐系统设计


    既然你已经对推荐系统的工作原理有了基本的了解，让我们更仔细地看看所需的元素，以及设计一个能够在工业规模上提供推荐的系统。我们语境中的*工业规模*主要指*合理规模*（由Ciro
    Greco、Andrea Polonioli和Jacopo Tagliabue在“ML and MLOps at a Reasonable Scale”中引入的术语）——指拥有数十到数百名工程师参与产品开发的公司的生产应用，而非数千名。


    理论上，推荐系统是一组数学公式，可以接收关于用户-物品交互的历史数据，并返回用户-物品对亲和力的概率估计。实际上，推荐系统是5个、10个，或者可能是20个软件系统，它们实时通信，在有限的信息、受限的物品可用性和永远超出样本范围的行为下工作，所有这一切都是为了确保用户看到*某些东西*。


    本章深受Eugene Yan的“System Design for Recommendations and Search”以及Even Oldridge和Karl
    Byleen-Higley的“Recommender Systems, Not Just Recommender Models”的影响。


    ## 在线与离线


    机器学习系统由你提前完成的部分和你即时完成的部分组成。这种在线与离线的划分，是关于执行不同类型任务所需信息的实际考虑。为了观察和学习大规模模式，系统需要访问大量数据；这是离线组件。然而，执行推理只需要训练好的模型和相关的输入数据。这就是为什么许多机器学习系统架构是这样构建的'

    \ = jnp.dot(jnp.flip(\n    next_embed, axis=-2), next_embed.T)\nneg_self_affinity\
    \ = jnp.dot(jnp.flip(neg_embed, axis=-2), neg_embed.T)\n\nreturn (pos_affinity,\

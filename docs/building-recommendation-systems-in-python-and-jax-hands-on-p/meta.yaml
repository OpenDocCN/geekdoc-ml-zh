    \            train_set=mf_model.ground_truth['A_train'],\n            test_set=mf_model.ground_truth['A_test']\n\
    \        )\n        model_object.reset_embeddings() # 确保我们从先验开始\n\n        alpha,\
    \ steps = run_config['alpha'], run_config['steps']\n        print(run_config)\n\
    \n        grad_fn = jax.value_and_grad(\n            reg_loss_observed,\n    \
    \        1,\n            has_aux=True\n        ) # 告诉 JAX 期望一个辅助字典作为输出\n\n   \

- md: "We can now write this aggregated list of (item, count) pairs to an app database\
    \ to serve `get_item_popularities` (something that doesn't require us to do any\
    \ parsing when this is called), or potentially we can take a subset of the top-N\
    \ of this list and store it in memory to get the best items with respect to a\
    \ particular ranking. Either way, we've separated concerns of parsing all our\
    \ log data, and doing aggregation, from the `get_item_popularities` function call\
    \ in real time.\n\nThis example used an overly simple data aggregation, one just\
    \ as easy to do in something like PostgreSQL, so why bother? The first reason\
    \ is scalability. Spark is really built to scale horizontally, which means that\
    \ as the data we need to access grows, we merely add more worker nodes.\n\nThe\
    \ second reason is that PySpark is more than just SparkSQL; anyone who's done\
    \ complicated SQL queries can probably agree that the power and flexibility of\
    \ SQL is enormous, but frequently certain tasks that you want to achieve require\
    \ a lot of creativity to carry out in the fully SQL environment. PySpark gives\
    \ you all the expressiveness of pandas DataFrames, Python functions and classes,\
    \ and a simple interface to apply Python code to the PySpark data structure's\
    \ user-defined functions (UDFs). UDFs are similar to lambda functions that you'd\
    \ use in pandas, but they're built and optimized for PySpark DataFrames. As you've\
    \ probably experienced when writing ML programs in smaller data regimes, at some\
    \ point you switch away from using only SQL to using pandas API functions to perform\
    \ data transformations—so too will you appreciate this power at the Spark data\
    \ scale.\n\nPySpark allows you to write what looks very much like Python and pandas\
    \ code and have that code executed in a distributed fashion! You don't need to\
    \ write code to specify which worker nodes operations should happen; that's handled\
    \ for you by PySpark. This framework isn't perfect; some things you expect to\
    \ work may require a bit of care, and optimization of your code can require an\
    \ additional level of abstraction, but generally, PySpark gives you a rapid way\
    \ to move your code from one node to a cluster and utilize that power.\n\nTo illustrate\
    \ something a bit more useful in PySpark, let's return to collaborative filtering\
    \ (CF) and compute some features more relevant for ranking.\n\n## Example: User\
    \ Similarity in PySpark\n\nA user similarity table allows you to map a user to\
    \ other users who are relevant to the recommender. This recalls the assumption\
    \ that two similar users like similar things, and thus you can recommend to both\
    \ users the items that one hasn't seen. Constructing this user similarity table\
    \ is an example of a PySpark job that you might see as part of the offline collector's\
    \ responsibility. Even though in many cases ratings would continue to stream in\
    \ all the time, for the purposes of large offline jobs, we often think of a daily\
    \ batch to update the essential tables for our model. In practice, in many cases\
    \ this daily batch job suffices to provide features that are good enough for most\
    \ of the ML work downstream. Other important paradigms exist, but those frequently\
    \ *marry* the more frequent updates with these daily batch jobs, instead of totally\
    \ eliminating them.\n\nThis architecture of daily batch jobs with smaller, more\
    \ frequent batch jobs is called the *lambda architecture*, and we'll get more\
    \ into the details of how and why later. In brief, the two layers—batch and speed—which\
    \ are distinguished (inversely) by the frequency of processing and the volume\
    \ per run of data they process. Note that the speed layer may have varying frequencies\
    \ associated with it, and it's possible to have different speed layers for hourly,\
    \ and another speed layer for minute-frequency jobs that do different things.\
    \ Figure 6-2 provides an overview of the architecture.\n\n![Figure 6-2. Overview\
    \ of a lambda architecture](img/da17d05291861831978609329c481581_97_0.png)\n\n\
    *Figure 6-2. Overview of a lambda architecture*\n\nIn the case of user similarity,\
    \ let's work on a batch job implementation of computing a daily table. First we'll\
    \ need to get ratings from our schema before today. We'll also include a few other\
    \ filters that simulate how this query might look in real life:\n\n```sql\nuser_item_ratings_qry\
    \ = \"\"\"\nSELECT\n    book_ratings.book_id\n    book_ratings.user_id\n    ,\
    \ book_ratings.rating_value\n    , book_ratings.rating_tstamp\n\nFROM prod.book_ratings\n\
    JOIN prod.dim_users\n    ON book_ratings.user_id = dim_users.user_id\nJOIN prod.dim_books\n\
    \    ON book_ratings.book_id = dim_books.dim_books\n\nWHERE\n    DATE book_ratings.rating_tstamp\n\
    \    BETWEEN (DATE '2017-01-01')\n    AND (CAST(current_timestamp() as DATE)\n\
    \    AND book_ratings.rating_value IS NOT NULL\n    AND dim_users.country_code\
    \ = 'US'\n    AND dim_books.book_active\n\"\"\"\n```\n\n```python\nuser_item_ratings_sdf\
    \ = spark.sql(user_item_ratings_qry)\n```\n\nAs before, utilizing the SQL syntax\
    \ to get the dataset into a Spark DataFrame is the first step, but now we have\
    \ additional work on the PySpark side. A common pattern is to get the dataset\
    \ you want to work with via simple SQL syntax and logic, and then use the PySpark\
    \ API to do more detailed data processing.\n\nLet's first observe that we have\
    \ no assumptions about uniqueness of a user-item rating. For the sake of this\
    \ table, let's decide that we'll use the most recent rating for a pair:\n\n```python\n\
    from pyspark.sql.window import Window\n\nwindows = Window().partitionBy(\n   \
    \ ['book_id', 'user_id']\n).orderBy(\n    col(\"rating_tstamp\").desc()\n)\n\n\
    user_item_ratings_sdf.withColumn(\n    \"current_rating\",\n    first(\n     \
    \   user_item_ratings_sdf(\"rating_tstamp\")\n    ).over(windows).as(\"max_rating_tstamp\"\
    )\n).filter(\"rating_tstamp = max_rating_tstamp\")\n```\n\nWe'll now use `current_rating`\
    \ as our ratings column for the purpose of downstream calculation. Recall from\
    \ before our ratings-based definition of user similarity:\n\n![User Similarity\
    \ Formula](img/da17d05291861831978609329c481581_98_0.png)\n\nThe important values\
    \ we'll need are as follows:\n\n- $r_{(-, -)}$ The rating corresponding to a user-item\
    \ pair\n- $\\bar{r}_{(-)}$ The average rating across all items for a user\n\n\
    The rows are already the $r_{(-, -)}$ values, so let's compute user average ratings,\
    \ $\\bar{r}_{(-)}$, and the rating deviations:\n\n```python\nfrom pyspark.sql.window\
    \ import Window\nfrom pyspark.sql import functions as F\n\nuser_partition = Window.partitionBy('user_id')\n\
    \nuser_item_ratings_sdf = user_item_ratings_sdf.withColumn(\n    \"user_average_rating\"\
    ,\n    F.avg(\"current_rating\").over(user_partition)\n)\n\nuser_item_ratings_sdf\
    \ = user_item_ratings_sdf.withColumn(\n    \"rating_deviation_from_user_mean\"\
    ,\n    F.col(\"current_rating\") - F.col(\"user_average_rating\")\n)\n```\n\n\
    Now our schema should look like this (we've formatted it slightly nicer than the\
    \ default Spark output):\n\n```\n+---------+---------+--------------+--------------+\n\
    | book_id | user_id | rating_value | rating_tstamp |\n+---------+---------+--------------+--------------+\n\
    +---------+---------+--------------+--------------+\n| current_rating | user_average_rating\
    \ | rating_deviation_from_user_mean |\n+---------+---------+--------------+--------------+\n\
    ```\n\nLet's finish creating a dataset that contains our User Similarity calculations:\n\
    \n```python\nuser_pair_item_rating_deviations = user_item_ratings_sdf.alias(\"\
    left_ratings\")\n.join(user_item_ratings_sdf.alias(\"right_ratings\"),\n    (\n\
    \        F.col(\"left_ratings.book_id\") == F.col(\"right_ratings.book_id\") &\n\
    \        F.col(\"left_ratings.user_id\") != F.col(\"right_ratings.user_id\")\n\
    \    ),\n    \"inner\"\n).select(\n    F.col(\"left_ratings.book_id\"),\n    F.col(\"\
    left_ratings.user_id\").alias(\"user_id_1\"),\n    F.col(\"right_ratings.user_id\"\
    ).alias(\"user_id_2\"),\n    F.col(\"left_ratings.rating_deviation_from_user_mean\"\
    ).alias(\"dev_1\"),\n    F.col(\"right_ratings.rating_deviation_from_user_mean\"\
    ).alias(\"dev_2\")\n).withColumn(\n    'dev_product',\n    F.col(\"dev_1\")*F.col(\"\
    dev_2\")\n)\n\nuser_similarities_sdf = user_pair_item_rating_deviations.groupBy(\n\
    \    \"user_id_1\", \"user_id_2\"\n).agg(\n    sum('dev_product').alias(\"dev_product_sum\"\
    ),\n    sum(F.pow(F.col(\"dev_1\"),2)).alias(\"sum_of_sqrd_devs_1\"),\n```"
  mdcn: "我们现在可以将这个聚合后的（项目，计数）对列表写入应用数据库，以服务于`get_item_popularities`（这个函数在被调用时不需要我们做任何解析），或者我们可以取这个列表的前N个子集，将其存储在内存中，以获取针对特定排名的最佳项目。无论哪种方式，我们都将解析所有日志数据和执行聚合的工作，与实时调用`get_item_popularities`函数分离开来。\n\
    \n这个例子使用了过于简单的数据聚合，这种聚合在PostgreSQL之类的东西中同样容易完成，那么为什么还要费心呢？第一个原因是可扩展性。Spark确实是为水平扩展而构建的，这意味着随着我们需要访问的数据增长，我们只需添加更多的工作节点。\n\
    \n第二个原因是PySpark不仅仅是SparkSQL；任何做过复杂SQL查询的人可能都会同意，SQL的强大和灵活性是巨大的，但通常你想实现的某些任务在完全SQL环境中需要很多创造力才能完成。PySpark为你提供了pandas\
    \ DataFrames、Python函数和类的所有表现力，以及一个简单的接口，可以将Python代码应用于PySpark数据结构的用户定义函数（UDFs）。UDFs类似于你在pandas中使用的lambda函数，但它们是为PySpark\
    \ DataFrames构建和优化的。正如你在较小数据集上编写ML程序时可能体验过的那样，在某个时候你会从只使用SQL切换到使用pandas API函数来执行数据转换——你也会在Spark数据规模上欣赏到这种能力。\n\
    \nPySpark允许你编写看起来非常像Python和pandas的代码，并让这些代码以分布式方式执行！你不需要编写代码来指定操作应该在哪些工作节点上发生；PySpark会为你处理。这个框架并不完美；你期望能工作的一些事情可能需要一点注意，代码的优化可能需要额外的抽象层次，但总的来说，PySpark为你提供了一种快速的方法，将你的代码从一个节点移动到一个集群并利用其能力。\n\
    \n为了说明PySpark中一些更有用的东西，让我们回到协同过滤（CF），并计算一些与排名更相关的特征。\n\n## 示例：PySpark中的用户相似度\n\
    \n用户相似度表允许你将用户映射到与推荐相关的其他用户。这回想起一个假设：两个相似的用户喜欢相似的东西，因此你可以向两个用户推荐其中一个尚未看到的项目。构建这个用户相似度表是PySpark作业的一个例子，你可能会看到它是离线收集器职责的一部分。尽管在许多情况下，评分会持续不断地流入，但为了大规模离线作业的目的，我们通常考虑每日批处理来更新我们模型的基本表。在实践中，在许多情况下，这种每日批处理作业足以提供足够好的特征，用于下游的大多数ML工作。其他重要的范式也存在，但它们通常将更频繁的更新与这些每日批处理作业*结合*起来，而不是完全消除它们。\n\
    \n这种每日批处理作业与更小、更频繁的批处理作业相结合的架构称为*lambda架构*，我们稍后将更详细地介绍其方式和原因。简而言之，这两层——批处理层和速度层——通过处理频率和每次运行处理的数据量（反向）来区分。请注意，速度层可能具有不同的频率，并且可以为每小时作业设置不同的速度层，为分钟频率作业设置另一个速度层，这些作业执行不同的任务。图6-2提供了该架构的概述。\n\
    \n![图6-2. Lambda架构概述](img/da17d05291861831978609329c481581_97_0.png)\n\n*图6-2.\
    \ Lambda架构概述*\n\n在用户相似度的情况下，让我们来实现一个计算每日表的批处理作业。首先，我们需要从今天的模式中获取评分。我们还将包括一些其他过滤器，以模拟此查询在现实生活中的样子：\n\
    \n```sql\nuser_item_ratings_qry = \"\"\"\nSELECT\n    book_ratings.book_id\n \
    \   book_ratings.user_id\n    , book_ratings.rating_value\n    , book_ratings.rating_tstamp\n\
    \nFROM prod.book_ratings\nJOIN prod.dim_users\n    ON book_ratings.user_id = dim_users.user_id\n\
    JOIN prod.dim_books\n    ON book_ratings.book_id = dim_books.dim_books\n\nWHERE\n\
    \    DATE book_ratings.rating_tstamp\n    BETWEEN (DATE '2017-01-01')\n    AND\
    \ (CAST(current_timestamp() as DATE)\n    AND book_ratings.rating_value IS NOT\
    \ NULL\n    AND dim_users.country_code = 'US'\n    AND dim_books.book_active\n\
    \"\"\"\n```\n\n```python\nuser_item_ratings_sdf = spark.sql(user_item_ratings_qry)\n\
    ```\n\n和之前一样，利用SQL语法将数据集获取到Spark DataFrame是第一步，但现在我们在PySpark端有额外的工作。一个常见的模式是通过简单的SQL语法和逻辑获取你想要处理的数据集，然后使用PySpark\
    \ API进行更详细的数据处理。\n\n让我们首先观察，我们对用户-项目评分的唯一性没有假设。为了这个表，我们决定使用一对的最新评分：\n\n```python\n\
    from pyspark.sql.window import Window\n\nwindows = Window().partitionBy(\n   \
    \ ['book_id', 'user_id']\n).orderBy(\n    col(\"rating_tstamp\").desc()\n)\n\n\
    user_item_ratings_sdf.withColumn(\n    \"current_rating\",\n    first(\n     \
    \   user_item_ratings_sdf(\"rating_tstamp\")\n    ).over(windows).as(\"max_rating_tstamp\"\
    )\n).filter(\"rating_tstamp = max_rating_tstamp\")\n```\n\n现在，我们将使用`current_rating`作为我们的评分列，用于下游计算。回顾我们之前基于评分的用户相似度定义：\n\
    \n![用户相似度公式](img/da17d05291861831978609329c481581_98_0.png)\n\n我们需要的重要值如下：\n\n\
    - $r_{(-, -)}$ 对应于用户-项目对的评分\n- $\\bar{r}_{(-)}$ 用户所有项目的平均评分\n\n行已经是$r_{(-, -)}$值，所以让我们计算用户平均评分$\\\
    bar{r}_{(-)}$和评分偏差：\n\n```python\nfrom pyspark.sql.window import Window\nfrom\
    \ pyspark.sql import functions as F\n\nuser_partition = Window.partitionBy('user_id')\n\
    \nuser_item_ratings_sdf = user_item_ratings_sdf.withColumn(\n    \"user_average_rating\"\
    ,\n    F.avg(\"current_rating\").over(user_partition)\n)\n\nuser_item_ratings_sdf\
    \ = user_item_ratings_sdf.withColumn(\n    \"rating_deviation_from_user_mean\"\
    ,\n    F.col(\"current_rating\") - F.col(\"user_average_rating\")\n)\n```\n\n\
    现在我们的模式应该如下所示（我们将其格式化得比默认Spark输出稍好一些）：\n\n```\n+---------+---------+--------------+--------------+\n\
    | book_id | user_id | rating_value | rating_tstamp |\n+---------+---------+--------------+--------------+\n\
    +---------+---------+--------------+--------------+\n| current_rating | user_average_rating\
    \ | rating_deviation_from_user_mean |\n+---------+---------+--------------+--------------+\n\
    ```\n\n让我们完成创建一个包含用户相似度计算的数据集：\n\n```python\nuser_pair_item_rating_deviations\
    \ = user_item_ratings_sdf.alias(\"left_ratings\")\n.join(user_item_ratings_sdf.alias(\"\
    right_ratings\"),\n    (\n        F.col(\"left_ratings.book_id\") == F.col(\"\
    right_ratings.book_id\") &\n        F.col(\"left_ratings.user_id\") != F.col(\"\
    right_ratings.user_id\")\n    ),\n    \"inner\"\n).select(\n    F.col(\"left_ratings.book_id\"\
    ),\n    F.col(\"left_ratings.user_id\").alias(\"user_id_1\"),\n    F.col(\"right_ratings.user_id\"\
    ).alias(\"user_id_2\"),\n    F.col(\"left_ratings.rating_deviation_from_user_mean\"\
    ).alias(\"dev_1\"),\n    F.col(\"right_ratings.rating_deviation_from_user_mean\"\
    ).alias(\"dev_2\")\n).withColumn(\n    'dev_product',\n    F.col(\"dev_1\")*F.col(\"\
    dev_2\")\n)\n\nuser_similarities_sdf = user_pair_item_rating_deviations.groupBy(\n\
    \    \"user_id_1\", \"user_id_2\"\n).agg(\n    sum('dev_product').alias(\"dev_product_sum\"\
    ),\n    sum(F.pow(F.col(\"dev_1\"),2)).alias(\"sum_of_sqrd_devs_1\"),\n```"

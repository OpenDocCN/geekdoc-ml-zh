    \n# 基于相似性的推荐\n\n在前面的每个距离度量中，我们都定义了一个相似性度量，但我们还没有讨论相似性度量如何转化为推荐。正如我们在第 35 页“最近邻”中所讨论的，我们在检索步骤中使用相似性度量；我们希望找到一个空间，其中彼此*接近*的物品是好的推荐。在排序的背景下，我们的相似性度量可以直接用于根据推荐相关的可能性对推荐进行排序。在下一章中，我们将更多地讨论相关性度量。"

  md: 'In our observed ratings, we expect (and see!) a large number of missing values
    and some item vectors with an overrepresented number of ratings. This suggests
    that we should consider nonuniformly weighted matrices. Next we''ll discuss how
    to account for this and other variants with regularization.


    # Regularization for MF


    *Weighted alternating least squares* (WALS) is similar to ALS but attempts to
    resolve these two data issues more gracefully. In WALS, the weight assigned to
    each observed rating is inversely proportional to the number of observed ratings
    for the user or item. Therefore, observed ratings for users or items with few
    ratings are given more weight in the optimization process.


    We can apply these weights as a regularization parameter in our eventual loss
    function:


    ```

    $$\frac{\sum_{\Omega}(A_{i,j} - < U_i, V_j >)^2}{|\Omega|} + \frac{1}{N} \sum
    |U|$$

    ```


    Other regularization methods are important, and also popular, for MF. We''ll discuss
    these two powerful regularization techniques:


    +   - Weight decay

    - Gramian regularization


    As is often the case, *weight decay* is our $l^2$ regularization, which in this
    case is at the level of the Frobenius norm, i.e., the magnitude of the weight
    matrix. An elegant way to view this weight decay is that it''s minimizing the
    magnitude of the *singular values*.


    Similarly, MF has another regularization technique that looks very standard but
    is quite different in calculation. This is via the *Gramians*—essentially regularizing
    the size of the individual matrix entries, but there''s an elegant trick for the
    optimization. In particular, a Gramian of a matrix $U$ is the product $U^T U$.
    The eagle-eyed among you may recognize this term as the same term we previously
    used to calculate co-occurrences for binary matrices. The connection is that both
    are simply trying to find efficient representations of dot products between a
    matrix''s rows and columns.


    These regularizations are the Frobenius terms:


    ```

    $$R(U, V) = \frac{1}{N} \sum_{i}^{N} \left| U_i \right|_2^2 + \frac{1}{M} \sum_{j}^{M}
    \left| V_j \right|_2^2$$

    ```'
  merge: -1

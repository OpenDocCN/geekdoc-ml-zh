    ```


    JAX''s interface is mostly similar to that of NumPy. We import JAX''s version
    of NumPy as jnp to distinguish it from NumPy (np) by convention so that we know
    which version of a mathematical function we want to use. This is because sometimes
    we might want to run code on a vector processor like a GPU or TPU that we can
    use JAX for, or we might prefer to run some code on a CPU in NumPy.


    The first point to notice is that JAX arrays have types. The typical float type
    is float32, which uses 32 bits to represent a floating-point number. Other types
    exist, such as float64, which has greater precision, and float16, which is a half-precision
    type that usually only runs on some GPUs.


    The other point to note is that JAX tensors have shape. This is usually a tuple,
    so (3,) means a three-dimensional vector along the first axis. A matrix has two
    axes, and a tensor has three or more axes.


    Now we come to places where JAX differs from NumPy. It is really important to
    pay attention to “JAX—The Sharp Bits” to understand these differences. JAX''s
    philosophy is about speed and purity. By making functions pure (without side effects)
    and by making data immutable, JAX is able to make some guarantees to the underlying
    accelerated linear algebra (XLA) library that it uses to talk to GPUs. JAX guarantees
    that these functions applied to data can be run in parallel and have deterministic
    results without side effects, and thus XLA is able to compile these functions
    and make them run much faster than if they were run just on NumPy.


    You can see that modifying one element in x results in an error. JAX would prefer
    that the array x is replaced rather than modified. One way to modify elements
    in an array is to do it in NumPy rather than JAX and convert NumPy arrays to JAX—for
    example, using jnp.array(np_array)—when the subsequent code needs to run fast
    on immutable data.'

- md: "## BPR\n\nBayesian personalized ranking (BPR) presents a Bayesian approach\
    \ to the task of item ranking in recommendation systems, effectively providing\
    \ a probability framework to model the personalized ranking process. Instead of\
    \ transforming the item recommendation problem into a binary classification problem\
    \ (relevant or not), BPR focuses on pairwise preferences: given two items, which\
    \ does the user prefer? This approach aligns better with the nature of implicit\
    \ feedback that is common in recommendation systems.\n\nThe BPR model uses a pairwise\
    \ loss function that takes into account the relative order of a positive item\
    \ and a negative item for a specific user. It seeks to maximize the posterior\
    \ probability of the observed rankings being correct. The model is typically optimized\
    \ using stochastic gradient descent or a variant thereof. It's important to note\
    \ that BPR (unlike other metrics we've discussed, including AUC-ROC, mAP, MRR,\
    \ and NDCG) is a model training objective rather than an evaluation metric. Therefore,\
    \ while the aforementioned metrics evaluate a model's performance post-training,\
    \ BPR provides a mechanism to guide the model learning process in a way that directly\
    \ optimizes for the ranking task. A much deeper discussion of these topics is\
    \ in \"BPR: Bayesian Personalized Ranking from Implicit Feedback\" by Steffen\
    \ Rendle et al.\n\n## Summary\n\nNow that you know how to evaluate the performance\
    \ of the recommendation systems that you train, you may be wondering how to actually\
    \ train them. You may have noticed that many of the metrics we introduced would\
    \ not make very good loss functions; they involve a lot of simultaneous observations\
    \ about sets and lists of items. This would unfortunately make the signal that\
    \ the recommender would be learning from highly combinatorial. Additionally, the\
    \ metrics we've presented really have two aspects to consider: the binary metric\
    \ associated to recall, and the rank weighting.\n\nIn the next chapter, you're\
    \ going to learn some loss functions that make excellent training objectives.\
    \ The importance of these, we're sure, won't be lost on you.\n\n# CHAPTER 12\n\
    ## Training for Ranking\n\nTypical ML tasks usually predict a single outcome,\
    \ such as the probability of being in a positive class for classification tasks,\
    \ or an expected value for regression tasks. Ranking, on the other hand, provides\
    \ a relative ordering of sets of items. This kind of task is typical of search\
    \ results or recommendations, where the order of items presented is important.\
    \ In these kinds of problems, the score of an item usually isn't shown to the\
    \ user directly but rather is presented—maybe implicitly—with the ordinal rank\
    \ of the item: the item at the top of the list is numbered lower than the next\
    \ item.\n\nThis chapter presents various kinds of loss functions that ML algorithms\
    \ can use during training. These scores should estimate list orderings such that\
    \ when compared to one another, they result in sets that are ordered more closely\
    \ to the relevance ordering observed in a training dataset. Here we will focus\
    \ on introducing the concepts and computations, which you'll put to work in the\
    \ next chapter.\n\n## Where Does Ranking Fit in Recommender Systems?\n\nBefore\
    \ we dive into the details of loss functions for ranking, we should talk about\
    \ where ranking fits into the larger scheme of recommender systems as a whole.\
    \ Typical large-scale recommenders have a retrieval phase, in which a cheap function\
    \ is used to gather a decent number of candidate items into a candidate set. Usually,\
    \ this retrieval phase is only item based. For example, the candidate set might\
    \ include items related to recently consumed or liked items by a user. Or if freshness\
    \ is important, such as for news data, the set might include the newest popular\
    \ and relevant items for the user. After items are gathered into a candidate set,\
    \ we apply ranking to its items.\n\nAlso, since the candidate set is usually much\
    \ smaller than the entire corpus of items, we can use more expensive models and\
    \ auxiliary features to help the ranking.\n\nThese features could be user features\
    \ or context features. User features could help in determining the items’ usefulness\
    \ to the user, such as the average embedding of recently consumed items. Context\
    \ features could indicate details about the current session, such as time of day\
    \ or recent queries that a user has typed—a feature that differentiates the current\
    \ session from others and helps in determining relevant items. Finally, we have\
    \ the representation of the items themselves, which can be anything from content\
    \ features to learned embeddings that represent the item.\n\nThe user, context,\
    \ and item features are then concatenated into one feature vector that we will\
    \ use to represent the item; we then score all the candidates at once and order\
    \ them. The rank ordered set might then have extra filtering applied to it for\
    \ business logic, such as removing near duplicates or making the ranked set more\
    \ diverse in the kinds of items displayed.\n\nIn the following examples, we will\
    \ assume that the items can all be represented by a concatenated feature vector\
    \ of user, context, and item features and that the model could be as simple as\
    \ a linear model with a weight vector W that is dotted with the item vector to\
    \ obtain a score for sorting the items. These models can be generalized to deep\
    \ neural networks, but the final layer output is still going to be a scalar used\
    \ to sort the items.\n\nNow that we have set the context for ranking, let’s consider\
    \ ways we might rank a set of items represented by vectors.\n\n## Learning to\
    \ Rank\n\n*Learning to rank* (LTR) is the name for the kind of models that score\

    # Hydrating Your System


    Getting data into the pipeline is punnily referred to as *hydration*. The ML and
    data fields have a lot of water-themed naming conventions; “(Data ∩ Water) Terms”
    by Pardis Noorzad covers this topic.


    # PySpark


    Spark is an extremely general computing library, with APIs for Java, Python, SQL,
    and Scala. PySpark’s role in many ML pipelines is for data processing and transforming
    the large-scale datasets.


    Let’s return to the data structure we introduced for our recommendation problem;
    recall that the user-item matrix is the linear-algebraic representation of all
    the triples of users, items, and the user’s rating of the item. These triples
    are not naturally occurring in the wild. Most commonly, you begin with log files
    from your system; for example, Bookshop.org may have something that looks like
    this:



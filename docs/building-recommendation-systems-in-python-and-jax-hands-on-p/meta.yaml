  md: "In practice, though, rather than using a mathematical library to find the eigenvectors,\
    \ folks might use the power iteration method to discover the eigenvectors approximately.\
    \ This method is far more scalable than a full dense SVD solution that is optimized\
    \ for correctness and dense vectors:\n\n```\nimport jax\nimport jax.numpy as jnp\n\
    \ndef power_iteration(a: jnp.ndarray) -> jnp.ndarray:\n    \"\"\"Returns an eigenvector\
    \ of the matrix a.\n    Args:\n        a: a n x m matrix\n    \"\"\"\n    key\
    \ = jax.random.PRNGKey(0)\n    x = jax.random.normal(key, shape=(a.shape[1], 1))\n\
    \    for i in range(100):\n        x = a @ x\n        x = x / jnp.linalg.norm(x)\n\
    \    return x.T\n\nkey = jax.random.PRNGKey(123)\nA = jax.random.normal(key, shape=[4,\
    \ 4])\nprint(A)\n[[ 0.52830553  0.3722206  -1.2219944  -0.10314374]\n [ 1.4722222\
    \   0.47889313 -1.2940298   1.0449569 ]\n [ 0.23724185  0.3545859  -0.172465 \
    \  -1.8011322 ]\n [ 0.4864215   0.08039388 -1.2540827   0.72071517]]\nS, _, _\
    \ = jnp.linalg.svd(A)\nprint(S)\n[[-0.375782    0.40269807  0.44086716 -0.70870167]\n\
    \ [-0.753597    0.0482972  -0.65527284  0.01940039]\n [ 0.2040088   0.91405433\
    \ -0.15798494  0.31293103]\n [-0.49925917 -0.00250015  0.5927009   0.6320123 ]]\n\
    x1 = power_iteration(A)\nprint(x1.T)\n[[-0.35423845]\n [-0.8332922 ]\n [ 0.16189891]\n\
    \ [-0.39233655]]\n```\n\nNotice that the eigenvector returned by the power iteration\
    \ is close to the first column of $S$, but not quite. This is because the method\
    \ is approximate. It relies on the fact that an eigenvector doesn't change in\
    \ direction when multiplied by the matrix. So by repeatedly multiplying by the\
    \ matrix, we eventually iterate onto an eigenvector. Also notice that we solved\
    \ for column eigenvectors instead of the row eigenvectors. In this example, the\
    \ columns are users, and the rows are items. It is important to play with transposed\
    \ matrices because a lot of ML involves reshaping and transposing matrices, so\
    \ getting used to them early is an important skill."

    # Ablation


    Ablation in ML applications is the practice of measuring the change in performance
    of a model when a particular feature is removed. In computer vision applications,
    ablation often refers to blocking part of the image or view field to see how it
    impacts the model''s ability to identify or segment data. In other kinds of ML,
    it can mean strategically removing certain features.


    One gotcha with ablation is what to replace the feature with. Simply zeroing out
    the feature can significantly skew the output of the model. This is called zero-ablation,
    and can force the model to treat that feature out of distribution, which yields
    less believable outcomes. Instead, some advocate for mean-ablation, or taking
    the average or most common value of that feature. This allows the model to see
    much more expected values, and reduce these risks.


    However, this fails to consider the most important aspects of the kinds of models
    we''ve been working on—latent high-order interactions. One of the authors has
    investigated a deeper approach to ablation called causal scrubbing, in which you
    fix the ablation value to be sampled from the posterior distribution produced
    by other feature values, i.e., a value that “makes sense” with the rest of the
    values the model will see at that time.


    # Understand Metrics Versus Business Metrics


    Sometimes, as ML practitioners, we obsess over the best possible metrics our models
    can achieve. However, we should temper that enthusiasm as the best ML metric might
    not totally represent the business interests at hand. Furthermore, other systems
    that contain business logic might sit on top of our models and modify the output.
    As a result, it is best not to obsess too heavily over ML metrics and to do proper
    A/B tests that contain business metrics instead since that''s the main measure
    of a good outcome with ML.


    The best possible circumstance is to find a loss function that aligns well or
    predicts the relevant business metric. This, unfortunately, is often not easy
    to find, especially when the business metrics are nuanced or have competing priorities.


    # Perform Rapid Iteration


    Don''t be afraid to look at results of runs that are rather short. There''s no
    need to do a full pass over the data at the beginning, when you are figuring out
    the interaction between a model architecture and the data. It''s OK to do some
    rapid runs with minor tweaks to see how they change the metrics over a short number
    of time steps. In the Spotify Million Playlist dataset, we tweaked the model architecture
    by using 100,000'

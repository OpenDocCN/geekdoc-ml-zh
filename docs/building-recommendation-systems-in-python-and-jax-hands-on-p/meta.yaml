    Large generative language models of the type that have exploded in popularity
    are trained in three stages:


    1.  Pretraining for completion

    2.  Supervised fine-tuning for dialogue

    3.  Reinforcement learning from human feedback


    Sometimes the latter two steps are combined into what is called *Instruct*. For
    an exceptionally deep dive into this topic, see the original InstructGPT paper
    “Training Language Models to Follow Instructions with Human Feedback” by Long
    Ouyang et al.



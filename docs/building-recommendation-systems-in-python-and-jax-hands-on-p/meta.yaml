  pgno: 54
- img_proc: true
  md: 'Keeping in mind a few details here is extremely important:


    +   - This is the similarity of the jointly distributed variables describing the
    users’ ratings.

    - We compute this via all co-rated items, so user similarity is defined via item-ratings.

    - This is a pairwise similarity measure taking values in $[-1,1] \in \mathbb{R}$.


    ![](img/da17d05291861831978609329c481581_55_0.png)


    **Correlation and Similarity**


    In Part III, you will learn about additional definitions of *correlation* and
    *similarity* that are more well suited for handling ranking data and that accommodate
    implicit rankings in particular.


    # Ratings via Similarity


    Now that we’ve introduced user similarity, let’s use it! For a user $A$ and item
    $x$, we can estimate the rating via similar users’ ratings:


    ```

    $$Aff_{A,i} = \bar{r}_A + \frac{\sum_{U \in \mathcal{N}(A)} USim_{A,U} * (r_{U,i}
    - \bar{r}_A)}{\sum_{U \in \mathcal{N}(A)} USim_{A,U}}$$

    ```


    This is the prediction for user $A$’s rating of item $x$, which takes $A$’s average
    adjusted rating of the similarity-weighted average ratings of all of $A$’s neighbors.
    In other words: $A$’s rating will probably be the average of people who have ratings
    like $A$’s rating, adjusted to how generous $A$ is with ratings in general. We
    call this estimate the *user-item affinity score*.


    But wait! What’s $\mathcal{N}(A)$? It’s the neighborhood of $A$, via our USim
    definition from the preceding section. The idea here is that we are aggregating
    ratings over the local region of users identified as similar to our target user
    by the previous USim metric. How many neighbors? How do you pick those neighbors?
    These will be the subject of later chapters; for now, assume they’re $k$-nearest
    neighbors and assume that some hyperparameter tuning is used to determine a good
    value for $k$.


    > **Correlation Metric Spaces**


    You might wonder, “Does this Pearson correlation yield a metric space under a
    transformation?” The answer is yes, but clearly defining the metric space is a
    bit more complicated than our simple definition. While the preceding equation
    can get us a distance, it’s not good enough to get us a metric space without a
    more novel transformation.'

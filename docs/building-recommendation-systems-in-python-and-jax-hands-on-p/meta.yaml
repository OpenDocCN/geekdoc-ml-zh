    \ 'Test omse',\n        'goal': 'minimize'\n    }\n}\n\nsweep_id = wandb.sweep(\n\
    \    sweep_config,\n    project=\"jax-mf\",\n    entity=\"wandb-un\"\n)\n\nrun_config\
    \ = { # 这些将是我们通过 wandb 调优的超参数\n    'emb_dim': 10, # 潜在维度\n    'prior_std': 0.1,\n\
    \    'alpha': 1.0, # 学习率\n    'steps': 1000, # 训练步数\n    'ell_2': 1, #l2 正则化惩罚权重\n\

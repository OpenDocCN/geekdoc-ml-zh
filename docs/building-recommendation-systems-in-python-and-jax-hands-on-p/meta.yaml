- md: 'way. You’ll frequently encounter the terms *batch* and *real-time* to describe
    the two sides of the online-offline paradigm (Figure 4-1).


    *Figure 4-1. Real-time versus batch*


    A *batch process* does not require user input, often has longer expected time
    periods for completion, and is able to have all the necessary data available simultaneously.
    Batch processes often include tasks like training a model on historical data,
    augmenting one dataset with an additional collection of features, or transforming
    computationally expensive data. Another characteristic you see more frequently
    in batch processes is that they work with the full relevant dataset involved,
    not only an instance of the data sliced by time or otherwise.


    A *real-time process* is carried out at the time of the request; said differently,
    it is evaluated during the inference process. Examples include providing a recommendation
    upon page load, updating the next episode after the user finishes the last, and
    re-ranking recommendations after one has been marked *not interesting*. Real-time
    processes are often resource constrained because of the need for rapidity, but
    like many things in this domain, as the world’s computational resources expand,
    we change the definition of resource constrained.


    Let’s return to the components introduced in Chapter 1—the collector, ranker,
    and server—and consider their roles in offline and online systems.


    ## Collector


    The collector’s role is to know what is in the collection of items that may be
    recommended and the necessary features or attributes of those items.


    ### Offline Collector


    The *offline collector* has access to and is responsible for the largest datasets.
    Understanding all user-item interactions, user similarities, item similarities,
    feature stores for users and items, and indices for nearest-neighbor lookup are
    all under the purview of the offline collector. The offline collector needs to
    be able to access the relevant data extremely fast, and sometimes in large batches.
    For this purpose, offline collectors often implement sublinear search functions
    or specifically tuned indexing structures. They may also leverage distributed
    compute for these transformations.


    It’s important to remember that the offline collector not only needs access and
    knowledge of these datasets but will also be responsible for writing the necessary
    downstream datasets to be used in real time.


    ### Online Collector


    The *online collector* uses the information indexed and prepared by the offline
    collector to provide real-time access to the parts of this data necessary for
    inference. This includes techniques like searching for nearest neighbors, augmenting
    an observation with features from a feature store, and knowing the full inventory
    catalog. The online collector will also need to handle recent user behavior; this
    will become especially important when we see sequential recommenders in [Chapter
    17](#).


    One additional role the online collector may take on is encoding a request. In
    the context of a search recommender, we want to take the query and encode it into
    the *search space* via an embedding model. For contextual recommenders, we need
    to encode the context into the *latent space* via an embedding model also.


    **Embedding Models**


    One popular subcomponent in the collector’s work will involve an embedding step;
    see *Machine Learning Design Patterns* by Valliappa Lakshmanan et al. (O’Reilly).
    The embedding step on the offline side involves both training the embedding model
    and constructing the latent space for later use. On the online side, the embedding
    transformation will need to embed a query into the right space. In this way, the
    embedding model serves as a transformation that you include as part of your model
    architecture.


    ## Ranker


    The ranker’s role is to take the collection provided by the collector, and order
    some or all of its elements according to a model for the context and user. The
    ranker actually gets two components itself, the filtering and the scoring.


    *Filtering* can be thought of as the coarse inclusion and exclusion of items appropriate
    for recommendation. This process is usually characterized by rapidly cutting away
    a lot of potential recommendations that we definitely don’t wish to show. A trivial
    example is not recommending items we know the user has already chosen in the past.


    *Scoring* is the more traditional understanding of ranking: creating an ordering
    of potential recommendations with respect to the chosen objective function.


    ### Offline Ranker


    The goal of the *offline ranker* is to facilitate filtering and scoring. What
    differentiates it from the online ranker is how it runs validation and how the
    output can be used to build fast data structures that the online ranker can utilize.
    Additionally, the offline ranker can integrate with a human review process for
    *human-in-the-loop ML*.


    An important technology that will be discussed later is the *bloom filter*. A
    bloom filter allows the offline ranker to do work in batches, so that filtering
    in real time can happen much faster. An oversimplification of this process would
    be to use a few features of the request to quickly select subsets of all possible
    candidates. If this step can be completed quickly—in terms of computational complexity,
    striving for something less than quadratic in the number of candidates—then downstream
    complex algorithms can be made much more performant.


    Second to the filtering step is the ranking step. In the offline component, ranking
    is training the model that learns how to rank items. As you will see later, learning
    to rank items to perform best with respect to the objective function is at the
    heart of the recommendation models. Training these models, and preparing the aspects
    of their output, is part of the batch responsibility of the ranker.


    ### Online Ranker


    The *online ranker* gets a lot of praise but really utilizes the hard work of
    other components. The online ranker first does filtering, utilizing the filtering
    infrastructure built offline—for example, an index lookup or a bloom filter application.
    After filtering, the number of candidate recommendations has been tamed, and thus
    we can actually come to the most infamous of the tasks: rank recommendations.


    In the online ranking phase, usually a feature store is accessed to take the candidates
    and embellish them with the necessary details, and then a scoring and ranking
    model is applied. Scoring or ranking may happen in several independent dimensions
    and then be collated into one final ranking. In the multiobjective paradigm, you
    may have several of these ranks associated with the list of candidates returned
    by a ranker.


    ## Server


    The server''s role is to take the ordered subset provided by the ranker, ensure
    that the necessary data schema is satisfied (including essential business logic),
    and return the requested number of recommendations.


    ### Offline Server


    The *offline server* is responsible for high-level alignment of the hard requirements
    of recommendations returned from the system. In addition to establishing and enforcing
    schema, these rules can be more nuanced things like “never return this pair of
    pants when also recommending this top.” Often waved off as “business logic,” the
    offline server is responsible for creating efficient ways to impose top-level
    priorities on the returned recommendations.


    An additional responsibility for the offline server is handling tasks like experimentation.
    At some point, you’ll likely want to run online experiments to test out all the
    amazing recommendation systems you build with this book. The offline server is
    the place where you’ll implement the logic necessary to make experimentation decisions
    and provide the implications in a way the online server can use them in real time.


    ### Online Server


    The *online server* takes the rules, requirements, and configurations established
    and makes their final application to the ranked recommendations. A simple example
    is diversification rules; as you will see later, diversification of recommendations
    can have a significant impact on the quality of a user’s experience. The online
    server can read the diversification requirements from the offline server and apply
    them to the ranked list to return the expected number of diverse recommendations.


    ## Summary


    It’s important to remember that the online server is the endpoint from which other
    systems will be getting a response. While it’s usually where the message is coming
    from, many of the most complicated components in the system are upstream. Be careful
    to instrument this system in a way that when responses are slow, each system is
    observable enough that you can identify where those performance degradations are
    coming from.


    Now that we’ve established the framework and you understand the functions of the
    core components, we will discuss the aspects of ML systems next and the kinds
    of technologies associated with them.


    In this next chapter, we’ll get our hands dirty with the aforementioned components
    and see how we might implement the key aspects. We’ll wrap it up by putting it
    all together into a production-scale recommender using only the content of each
    item. Let’s go!'
  mdcn: '你会经常遇到*批处理*和*实时*这两个术语，它们用来描述在线-离线范式的两个方面（图4-1）。


    *图4-1. 实时与批处理*


    *批处理*不需要用户输入，通常预期完成时间较长，并且能够同时获取所有必要的数据。批处理通常包括诸如在历史数据上训练模型、用额外的特征集合增强一个数据集，或转换计算成本高昂的数据等任务。你在批处理中更常见的一个特点是，它们处理的是完整的相关数据集，而不仅仅是按时间或其他方式切片的数据实例。


    *实时处理*在请求时进行；换句话说，它在推理过程中被评估。示例包括在页面加载时提供推荐、在用户看完上一集后更新下一集，以及在某个推荐被标记为*不感兴趣*后重新排序推荐。实时处理通常受到资源限制，因为需要快速响应，但就像这个领域的许多事情一样，随着全球计算资源的扩展，我们对资源受限的定义也在改变。


    让我们回到第1章介绍的组件——收集器、排序器和服务器——并思考它们在离线和在线系统中的角色。


    ## 收集器


    收集器的角色是了解可能被推荐的物品集合中包含什么，以及这些物品的必要特征或属性。


    ### 离线收集器


    *离线收集器*可以访问并负责最大的数据集。理解所有用户-物品交互、用户相似性、物品相似性、用户和物品的特征存储，以及用于最近邻查找的索引，都属于离线收集器的职责范围。离线收集器需要能够极其快速地访问相关数据，有时是大批量地访问。为此，离线收集器通常实现亚线性搜索函数或专门调优的索引结构。它们也可能利用分布式计算来进行这些转换。


    重要的是要记住，离线收集器不仅需要访问和了解这些数据集，还将负责编写必要的下游数据集，以供实时使用。


    ### 在线收集器


    *在线收集器*使用离线收集器索引和准备的信息，提供对推理所需数据部分的实时访问。这包括诸如搜索最近邻、用特征存储中的特征增强观察值，以及了解完整库存目录等技术。在线收集器还需要处理最近的用户行为；当我们看到[第17章](#)中的序列推荐器时，这一点将变得尤为重要。


    在线收集器可能承担的另一个角色是编码请求。在搜索推荐器的上下文中，我们希望获取查询并通过嵌入模型将其编码到*搜索空间*中。对于上下文推荐器，我们也需要通过嵌入模型将上下文编码到*潜在空间*中。


    **嵌入模型**


    收集器工作中一个流行的子组件将涉及嵌入步骤；参见Valliappa Lakshmanan等人的《机器学习设计模式》（O''Reilly）。离线端的嵌入步骤包括训练嵌入模型和构建潜在空间以供后续使用。在线端，嵌入转换需要将查询嵌入到正确的空间中。这样，嵌入模型就作为你包含在模型架构中的一部分转换。


    ## 排序器


    排序器的角色是获取收集器提供的集合，并根据上下文和用户的模型对其部分或所有元素进行排序。排序器本身实际上包含两个组件：过滤和评分。


    *过滤*可以看作是对适合推荐的物品进行粗略的包含和排除。这个过程的特点通常是快速削减大量我们绝对不希望展示的潜在推荐。一个简单的例子是不推荐我们知道用户过去已经选择过的物品。


    *评分*是更传统的排序理解：根据所选的目标函数创建潜在推荐的排序。


    ### 离线排序器


    *离线排序器*的目标是促进过滤和评分。它与在线排序器的区别在于它如何运行验证，以及其输出如何被用来构建在线排序器可以利用的快速数据结构。此外，离线排序器可以与人工审查过程集成，用于*人在回路中的机器学习*。


    稍后将讨论的一项重要技术是*布隆过滤器*。布隆过滤器允许离线排序器批量处理工作，从而使实时过滤能够更快地进行。这个过程的一个过度简化是使用请求的几个特征来快速选择所有可能候选者的子集。如果这一步能够快速完成——在计算复杂度方面，力求低于候选者数量的二次方——那么下游的复杂算法就可以变得更加高效。


    仅次于过滤步骤的是排序步骤。在离线组件中，排序是训练学习如何对物品进行排序的模型。正如你稍后将看到的，学习对物品进行排序以在目标函数方面表现最佳，是推荐模型的核心。训练这些模型并准备其输出的各个方面，是排序器批处理职责的一部分。


    ### 在线排序器


    *在线排序器*获得了许多赞誉，但实际上利用了其他组件的辛勤工作。在线排序器首先进行过滤，利用离线构建的过滤基础设施——例如，索引查找或布隆过滤器应用。过滤之后，候选推荐的数量得到了控制，因此我们实际上可以进入最臭名昭著的任务：对推荐进行排序。


    在在线排序阶段，通常会访问特征存储，用必要的细节来修饰候选者，然后应用评分和排序模型。评分或排序可能在几个独立的维度上进行，然后合并成一个最终的排序。在多目标范式中，你可能有多个这样的排序与排序器返回的候选列表相关联。


    ## 服务器


    服务器的角色是获取排序器提供的有序子集，确保满足必要的数据模式（包括基本业务逻辑），并返回请求数量的推荐。


    ### 离线服务器


    *离线服务器*负责系统返回推荐的硬性要求的高层对齐。除了建立和执行模式外，这些规则可以是更细微的事情，比如“当推荐这件上衣时，永远不要返回这条裤子。”通常被轻描淡写为“业务逻辑”，离线服务器负责创建有效的方法来对返回的推荐施加顶层优先级。


    离线服务器的另一个职责是处理诸如实验之类的任务。在某个时候，你可能想要运行在线实验来测试你用本书构建的所有出色的推荐系统。离线服务器是你将实现实验决策所需逻辑的地方，并以在线服务器可以实时使用的方式提供其含义。


    ### 在线服务器


    *在线服务器*获取已建立的规则、要求和配置，并将其最终应用于排序后的推荐。一个简单的例子是多样化规则；正如你稍后将看到的，推荐的多样化可以对用户体验的质量产生重大影响。在线服务器可以从离线服务器读取多样化要求，并将其应用于排序列表，以返回预期数量的多样化推荐。


    ## 总结


    重要的是要记住，在线服务器是其他系统将从中获取响应的端点。虽然它通常是消息的来源，但系统中许多最复杂的组件都在上游。请小心地对这个系统进行检测，以便当响应缓慢时，每个系统都足够可观测，你可以识别出性能下降来自何处。


    现在我们已经建立了框架，并且你理解了核心组件的功能，接下来我们将讨论机器学习系统的各个方面以及与之相关的技术类型。


    在下一章中，我们将亲手实践上述组件，并看看我们如何实现关键方面。我们将通过将所有内容整合到一个仅使用每个物品内容的生产级推荐器中来结束。开始吧！'

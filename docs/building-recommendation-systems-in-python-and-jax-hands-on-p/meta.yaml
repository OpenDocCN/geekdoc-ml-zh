    \ and when we move to inference, we will still need these encoders. When performing\
    \ the online recommendations, we will be given UserId and VideoId and will first\
    \ need to collect their features. As discussed in \"Feature Stores\" on page 90,\
    \ the feature store will be useful in getting these raw features, but we need\
    \ to also encode the features into the dense representations necessary for inference.\
    \ This is something that can be stored in the feature store for known entities,\
    \ but for unknown entities we will need to do the feature embedding at inference\
    \ time.\n\nEncoding layers serve as a simple model for mapping a collection of\
    \ features to a dense representation. When fitting encoding layers as the first\
    \ step in a neural network, the common strategy is to take the first $k$ layers\
    \ and reuse them as an encoder model. More specifically, if $\\mathscr{L}^i, 0\
    \ \\le i \\le k$ are the layers responsible for feature encoding, call $Emb(\\\
    hat{V}) = \\mathscr{L}^k(\\mathscr{L}^{k-1}(...\\mathscr{L}^0(\\hat{V})))$ the\
    \ function that maps a feature vector $\\hat{V}$ to its dense representation.\n\
    \nIn our previous system architecture, we would include this encoder as part of\
    \ the fast layer, after receiving features from the feature store. It’s also important\
    \ to note that we would still want to utilize vector search; these feature embedding\
    \ layers are used upstream of the vector search and nearest neighbor searches.\n\
    \n![](img/da17d05291861831978609329c481581_121_0.png)\n\n## Encoder as a Service\n\
    \nEncoders and retrieval are a key part of the multistage recommendation pipeline.\
    \ We’ve spoken briefly about the latent spaces in question (for more details,\
    \ see \"Latent Spaces\" on page 167), and we’ve alluded to an *encoder*. Briefly,\
    \ an encoder is the model that converts users, items, queries, etc., into the\
    \ latent space in which you’ll perform nearest-neighbors search. These models\
    \ can be trained via a variety of processes, many of which will be discussed later,\
    \ but it’s important to discuss where they live once trained.\n\nEncoders are\
    \ often simple API endpoints that take the content to be embedded and return a\
    \ vector (a list of floats). Encoders often work at the batch layer to encode\
    \ all the documents/items that will be retrieved, but they must *also* be connected\
    \ to the real-time layer to encode the queries as they come in. A common pattern\
    \ is to set up a batch endpoint and a single query endpoint to facilitate optimization\
    \ for both modalities. These endpoints should be fast and highly available.\n\n\
    If you’re working with text data, a good starting place is to use BERT or GPT-based\
    \ embeddings. The easiest at this time are provided as a hosted service from OpenAI.\n\
    \n## Deployment\n\nLike many ML applications, the final output of a recommendation\
    \ system is itself a small program that runs continuously and exposes an API to\
    \ interact with it; batch recommendations are often a powerful place to start,\
    \ performing all the necessary recommendations ahead of time. Throughout this\
    \ chapter, we've seen the pieces embedded in our backend system, but now we will\
    \ discuss the components closer to the user.\n\nIn our relatively general architecture,\
    \ the server is responsible for handing over the recommendations, after all the\
    \ work that comes before, and should adhere to a preset schema. But what does\
    \ this deployment look like?\n\n## Models as APIs\n\nLet's discuss two systems\
    \ architectures that might be appropriate for serving your models in production:\
    \ microservice and monolith.\n\nIn web applications, this dichotomy is well covered\
    \ from many perspectives and special use cases. As ML engineers, data scientists,\
    \ and potentially data platform engineers, it's not necessary to dig deep into\
    \ this area, but it's essential to know the basics:\n\n*Microservice architectures*\n\
    Each component of the pipeline should be its own small program with a clear API\
    \ and output schema. Composing these API calls allows for flexible and predictable\
    \ pipelines.\n\n*Monolithic architectures*\nOne application should contain all\
    \ the necessary logic and components for model predictions. Keeping the application\
    \ self-contained means fewer interfaces that need to be kept aligned and fewer\
    \ rabbit holes to hunt around in when a location in your pipeline is being starved.\n\
    \nWhatever you choose as your strategy, you'll need to make a few decisions:\n\
    \n*How large is the necessary application?*\nIf your application will need fast\
    \ access to large datasets at inference time, you'll need to think carefully about\
    \ memory requirements.\n\n*What access does your application need?*\nWe've previously\
    \ discussed using technologies like bloom filters and feature stores. These resources\
    \ may be tightly coupled to your application (by building them in memory in the\
    \ application) or may be an API call away. Make sure your deployment accounts\
    \ for these relationships.\n\n*Should your model be deployed to a single node\
    \ or a cluster?*\nFor some model types, even at the inference step we wish to\
    \ utilize distributed computing. This will require additional configuration to\
    \ allow for fast parallelization.\n\n*How much replication do you need?*\nHorizontal\
    \ scaling allows you to have multiple copies of the same service running simultaneously\
    \ to reduce the demand on any particular instance. This is important for ensuring\
    \ availability and performance. As we horizontally scale, each service can operate\
    \ independently, and various strategies exist for coordinating these services\
    \ and an API request. Each replica is usually its own containerized application,\
    \ and these APIs like CoreOS and Kubernetes are used to manage these. The requests\
    \ themselves must also be balanced to the different replicas via something like\
    \ nginx.\n\n*What are the relevant APIs that are exposed?*\nEach application in\
    \ the stack should have a clear set of exposed schemas and an explicit communication\
    \ about the types of other applications that may call to the APIs.\n\n## Spinning\
    \ Up a Model Service\n\nSo what can you use to get your model into an application?\
    \ A variety of frameworks for application development are useful; some of the\
    \ most popular in Python are Flask, FastAPI, and Django. Each has different advantages,\
    \ but we'll discuss FastAPI here.\n\nFastAPI is a targeted framework for API applications,\
    \ making it especially well fit for serving ML models. It calls itself an asynchronous\
    \ server gateway interface (ASGI) framework, and its specificity grants a ton\
    \ of simplicity.\n\nLet's take a simple example of turning a fit torch model into\
    \ a service with the FastAPI framework. First, let's utilize an artifact store\
    \ to pull down our fit model. Here we are using the Weights & Biases artifact\
    \ store:\n\n```python\nimport wandb, torch\nrun = wandb.init(project=Prod_model,\
    \ job_type=\"inference\")\n\nmodel_dir = run.use_artifact(\n    'bryan-wandb/recsys-torch/model:latest',\n\
    \    type='model'\n).download()\n\nmodel = torch.load(model_dir)\nmodel.eval(user_id)\n\
    ```\n\nThis looks just like your notebook workflow, so let's see how easy it is\
    \ to integrate this with FastAPI:\n\n```python\nfrom fastapi import FastAPI #\
    \ FastAPI code\n\nimport wandb, torch\n\napp = FastAPI() # FastAPI code\n\nrun\
    \ = wandb.init(project=Prod_model, job_type=\"inference\")\n\nmodel_dir = run.use_artifact(\n\
    \    'bryan-wandb/recsys-torch/model:latest',\n    type='model'\n).download()\n\
    \nmodel = torch.load(model_dir)\n\n@app.get(\"/recommendations/{user_id}\") #\
    \ FastAPI code\ndef make_recs_for_user(user_id: int): # FastAPI code\n    endpoint_name\
    \ = 'make_recs_for_user_v0'\n    logger.info(\n        \"{'type': 'recommendation_request',\"\
    \n        f\"'arguments': {'user_id': {user_id}},\"\n        f\"'response': {None}},\"\
    \n        f\"'endpoint_name': {endpoint_name}\"\n    )\n    recommendation = model.eval(user_id)\n\
    \    logger.log(\n        \"{'type': 'model_inference',\"\n        f\"'arguments':\
    \ {'user_id': {user_id}},\"\n        f\"'response': {recommendation}},\"\n   \
    \     f\"'endpoint_name': {endpoint_name}\"\n    )\n    return { # FastAPI code\n\
    \        \"user_id\": user_id,\n        \"endpoint_name\": endpoint_name,\n  \
    \      \"recommendation\": recommendation\n    }\n```\n\nI hope you share my enthusiasm\
    \ that we now have a model as a service in five additional lines of code. While\
    \ this scenario includes simple examples of logging, we'll discuss logging in\
    \ greater detail later in this chapter to help you improve observability in your\
    \ applications.\n\n## Workflow Orchestration\n\nThe other component necessary\
    \ for your deployed system is workflow orchestration. The model service is responsible\
    \ for receiving requests and serving results, but many system components need\
    \ to be in place for this service to do anything of use. These workflows have\
    \ several components, so we will discuss them in sequence: containerization, scheduling,\
    \ and CI/CD."
  mdcn: "在这些模型中，我们在两个塔中都使用了特征编码器作为早期层，当进行推理时，我们仍然需要这些编码器。在执行在线推荐时，我们会获得UserId和VideoId，首先需要收集它们的特征。正如第90页“特征存储”中所讨论的，特征存储对于获取这些原始特征很有用，但我们也需要将特征编码为推理所需的密集表示。对于已知实体，这可以存储在特征存储中，但对于未知实体，我们需要在推理时进行特征嵌入。\n\
    \n编码层充当将一组特征映射到密集表示的简单模型。当将编码层作为神经网络的第一步进行拟合时，常见的策略是取前$k$层并将其重用为编码器模型。更具体地说，如果$\\\
    mathscr{L}^i, 0 \\le i \\le k$是负责特征编码的层，则称$Emb(\\hat{V}) = \\mathscr{L}^k(\\mathscr{L}^{k-1}(...\\\
    mathscr{L}^0(\\hat{V})))$为将特征向量$\\hat{V}$映射到其密集表示的函数。\n\n在我们之前的系统架构中，我们会在从特征存储获取特征后，将此编码器作为快速层的一部分。同样重要的是要注意，我们仍然希望利用向量搜索；这些特征嵌入层用于向量搜索和最近邻搜索的上游。\n\
    \n![](img/da17d05291861831978609329c481581_121_0.png)\n\n## 编码器即服务\n\n编码器和检索是多阶段推荐管道的关键部分。我们已经简要讨论了相关的潜在空间（更多细节请参见第167页“潜在空间”），并且我们提到了*编码器*。简而言之，编码器是将用户、物品、查询等转换为将执行最近邻搜索的潜在空间的模型。这些模型可以通过多种过程进行训练，其中许多将在后面讨论，但讨论它们训练完成后的位置很重要。\n\
    \n编码器通常是简单的API端点，接受要嵌入的内容并返回一个向量（一个浮点数列表）。编码器通常在批处理层工作，以编码所有将被检索的文档/物品，但它们也*必须*连接到实时层，以在查询到达时进行编码。一个常见的模式是设置一个批处理端点和一个单个查询端点，以促进两种模式的优化。这些端点应该快速且高度可用。\n\
    \n如果你正在处理文本数据，一个很好的起点是使用基于BERT或GPT的嵌入。目前最简单的是由OpenAI作为托管服务提供的。\n\n## 部署\n\n与许多机器学习应用程序一样，推荐系统的最终输出本身就是一个持续运行的小程序，并暴露一个API与之交互；批量推荐通常是一个强大的起点，可以提前执行所有必要的推荐。在本章中，我们已经看到了嵌入我们后端系统的各个部分，但现在我们将讨论更接近用户的组件。\n\
    \n在我们相对通用的架构中，服务器负责在之前的所有工作完成后交付推荐，并且应该遵循预设的模式。但这种部署是什么样子的？\n\n## 模型即API\n\n让我们讨论两种可能适合在生产环境中提供模型的系统架构：微服务和单体架构。\n\
    \n在Web应用程序中，这种二分法从许多角度和特殊用例中得到了很好的涵盖。作为机器学习工程师、数据科学家，以及可能的数据平台工程师，没有必要深入研究这个领域，但了解基础知识至关重要：\n\
    \n*微服务架构*\n管道的每个组件都应该是自己的小程序，具有清晰的API和输出模式。组合这些API调用可以实现灵活且可预测的管道。\n\n*单体架构*\n\
    一个应用程序应包含模型预测所需的所有必要逻辑和组件。保持应用程序自包含意味着需要保持一致的接口更少，并且在管道中的某个位置资源不足时，需要深入挖掘的“兔子洞”更少。\n\
    \n无论你选择什么策略，你都需要做出一些决定：\n\n*必要的应用程序有多大？*\n如果你的应用程序在推理时需要快速访问大型数据集，你需要仔细考虑内存需求。\n\
    \n*你的应用程序需要什么访问权限？*\n我们之前讨论过使用布隆过滤器和特征存储等技术。这些资源可能与你的应用程序紧密耦合（通过在应用程序中构建内存），或者可能只需一次API调用。确保你的部署考虑了这些关系。\n\
    \n*你的模型应该部署到单个节点还是集群？*\n对于某些模型类型，即使在推理步骤，我们也希望利用分布式计算。这将需要额外的配置以实现快速并行化。\n\n*你需要多少副本？*\n\
    水平扩展允许你同时运行同一服务的多个副本，以减少对任何特定实例的需求。这对于确保可用性和性能非常重要。随着我们水平扩展，每个服务可以独立运行，并且存在各种策略来协调这些服务和API请求。每个副本通常是自己的容器化应用程序，像CoreOS和Kubernetes这样的API用于管理这些。请求本身也必须通过像nginx这样的东西平衡到不同的副本。\n\
    \n*暴露了哪些相关API？*\n堆栈中的每个应用程序都应该有一组清晰的暴露模式，并明确说明可能调用API的其他应用程序的类型。\n\n## 启动模型服务\n\
    \n那么，你可以用什么来将你的模型放入应用程序中？各种应用程序开发框架都很有用；Python中一些最受欢迎的是Flask、FastAPI和Django。每个都有不同的优势，但我们将在这里讨论FastAPI。\n\
    \nFastAPI是一个针对API应用程序的框架，使其特别适合提供机器学习模型。它自称是一个异步服务器网关接口（ASGI）框架，其专用性带来了极大的简洁性。\n\
    \n让我们以一个简单的例子，使用FastAPI框架将一个训练好的PyTorch模型转换为服务。首先，让我们利用一个制品存储来拉取我们训练好的模型。这里我们使用Weights\
    \ & Biases制品存储：\n\n```python\nimport wandb, torch\nrun = wandb.init(project=Prod_model,\
    \ job_type=\"inference\")\n\nmodel_dir = run.use_artifact(\n    'bryan-wandb/recsys-torch/model:latest',\n\
    \    type='model'\n).download()\n\nmodel = torch.load(model_dir)\nmodel.eval(user_id)\n\
    ```\n\n这看起来就像你的笔记本工作流程，所以让我们看看将其与FastAPI集成有多容易：\n\n```python\nfrom fastapi import\
    \ FastAPI # FastAPI code\n\nimport wandb, torch\n\napp = FastAPI() # FastAPI code\n\
    \nrun = wandb.init(project=Prod_model, job_type=\"inference\")\n\nmodel_dir =\
    \ run.use_artifact(\n    'bryan-wandb/recsys-torch/model:latest',\n    type='model'\n\
    ).download()\n\nmodel = torch.load(model_dir)\n\n@app.get(\"/recommendations/{user_id}\"\
    ) # FastAPI code\ndef make_recs_for_user(user_id: int): # FastAPI code\n    endpoint_name\
    \ = 'make_recs_for_user_v0'\n    logger.info(\n        \"{'type': 'recommendation_request',\"\
    \n        f\"'arguments': {'user_id': {user_id}},\"\n        f\"'response': {None}},\"\
    \n        f\"'endpoint_name': {endpoint_name}\"\n    )\n    recommendation = model.eval(user_id)\n\
    \    logger.log(\n        \"{'type': 'model_inference',\"\n        f\"'arguments':\
    \ {'user_id': {user_id}},\"\n        f\"'response': {recommendation}},\"\n   \
    \     f\"'endpoint_name': {endpoint_name}\"\n    )\n    return { # FastAPI code\n\
    \        \"user_id\": user_id,\n        \"endpoint_name\": endpoint_name,\n  \
    \      \"recommendation\": recommendation\n    }\n```\n\n我希望你和我一样热情，我们现在只需五行额外的代码就拥有了一个模型即服务。虽然这个场景包含了简单的日志记录示例，但我们将在本章后面更详细地讨论日志记录，以帮助你提高应用程序的可观察性。\n\
    \n## 工作流编排\n\n你的部署系统所需的另一个组件是工作流编排。模型服务负责接收请求和提供结果，但许多系统组件需要到位才能使此服务发挥作用。这些工作流有几个组件，因此我们将按顺序讨论它们：容器化、调度和CI/CD。"

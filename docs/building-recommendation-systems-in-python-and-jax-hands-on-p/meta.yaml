  md: '# Cluster Frameworks


    The nice thing about writing a Spark program is that it can scale from a single
    machine with multiple cores to a cluster of many machines with thousands of cores.
    The full list of cluster types can be found in the [Spark “Submitting Applications”
    documentation](https://spark.apache.org/docs/latest/cluster-overview.html).


    Spark can run on the following cluster types:


    +   - Spark Standalone cluster

    - Mesos cluster

    - YARN cluster

    - Kubernetes cluster


    Depending on the kind of cluster your company or institution has set up, most
    of the time submitting the job is just a matter of pointing to the correct URL.
    Many companies such as Databricks and Google also have fully managed Spark solutions
    that allow you to set up a Spark cluster with little effort.


    # PySpark Example


    Counting words turns out to be a powerful tool in information retrieval, as we
    can use handy tricks like term frequency, inverse document frequency (TF-IDF),
    which is simply the count of words in the documents divided by the number of documents
    the word has occurred in. This is represented as follows:


    $$tfidf_{word(i)} = \frac{\log_{10} (\text{number of times } word_i \text{ has
    occurred in corpus})}{\text{number of documents in corpus containing } word_i}$$


    For example, because the word *the* appears frequently, we might think it is an
    important word. But by dividing by the document frequency, *the* becomes less
    special and drops in importance. This trick is quite handy in simple NLP to get
    a better-than-random weighting of word importance.


    Therefore, our next step is to run `make_dictionary.py`. As the name indicates,
    this program simply counts the words and documents and makes a dictionary with
    the number of times a word has occurred.


    We have some concepts to cover in order for you to properly grok how Spark helps
    process data in a distributed manner. The entry point of most Spark programs is
    SparkContext. This Python object is created on the controller. The *controller*
    is the central program that launches workers that actually process the data. The
    workers can be run locally on a single machine as a process or on many machines
    on the cloud as separate workers.'

    \ artist_context)\nnext_embed = self.get_embeddings(next_album, next_artist)\n\
    neg_embed = self.get_embeddings(neg_album, neg_artist)\n\n# The affinity of the\
    \ context to the other track is simply the dot\n# product of each context embedding\
    \ with the other track's embedding.\n# We also add a small boost if the album\
    \ or artist match.\npos_affinity = jnp.max(jnp.dot(next_embed, context_embed.T),\
    \ axis=-1)\npos_affinity = pos_affinity + 0.1 * jnp.isin(next_album, album_context)\n\
    pos_affinity = pos_affinity + 0.1 * jnp.isin(next_artist, artist_context)\n\n\
    neg_affinity = jnp.max(jnp.dot(neg_embed, context_embed.T), axis=-1)\nneg_affinity\
    \ = neg_affinity + 0.1 * jnp.isin(neg_album, album_context)\nneg_affinity = neg_affinity\

- md: 'The fundamental difference between GNNs and traditional neural networks is
    that during the training, we''re explicitly using operators that transfer data
    between node representations "along the edges." This is called *message passing*.
    Let''s start with an example to prime the basic idea.


    Let nodes represent users, and their features are persona details such as demographic,
    onboarding survey question, etc. Let edges be the social network graph: are they
    friends? And let''s add decoration to the edges, such as the number of DMs exchanged
    between them on the platform. If we are the social media company that wants to
    introduce ad shopping to our platform, we may start with those persona features,
    but we''d ideally like to use something about this network of communication. In
    theory, people who communicate and share content with each other a lot may have
    similar tastes. Somewhat tellingly, we introduce a concept called a *message function*,
    which allows features to be sent from node to node. The message function uses
    features from each node and the edge between them, written mathematically as follows,
    for $h_i^{(k)}$ the features at node $i$ and $h_j^{(k)}$ at node $j$, respectively:


    $$m_{ij}^{(k)} = \mathcal{M}\left(h_i^{(k)}, h_j^{(k)}, e_{ij}\right)$$


    The features of the edge are $e_{ij}$ and $\mathcal{M}$ is some differentiable
    function. Note that the superscript $(k)$ refers to the layer as is standard in
    back-prop notation. Here are two simple examples:


    - $m_{ij}^{(k)} = h_i^{(k)}$ means "take the features from a neighbor node"

    - $m_{ij}^{(k)} = \frac{h_i^{(k)}}{c_{ij}}$ means "average by the number of edges
    between $i$ and $j$"


    Many powerful message-passing schemes that use learning use approaches from other
    areas of ML—like adding an attention mechanism on node features—but this book
    doesn''t dive deep into this theory.


    The next function we''ll introduce is the *aggregation function*, which takes
    as input the collection of messages and aggregates them. The most common types
    of aggregation functions do the following:


    - Concatenate all the messages

    - Sum all the messages

    - Average all the messages

    - Take the max of the messages


    Finally, we will use the output of the aggregation as part of our update function,
    which takes node features and aggregated message functions and then applies additional
    transformations. If you''ve been wondering, "Where does this model learn anything?"
    the answer is in the update function. The update function usually has a weight
    matrix associated to it, so as you train this neural network, you are learning
    the weights in the update function. The simplest update functions multiply a weight
    matrix by the vectorized output of your aggregation and then apply an activation
    function per vector.


    This chain of message passing, aggregating, and updating is the core of GNNs and
    encompasses a broad capability. They''ve been useful for ML tasks of every kind,
    including recommendations. Let''s see some direct applications to recommendation
    systems.


    ## Applications


    Let''s revisit some of the high-level ideas that GNNs may touch in the RecSys
    space.


    ## Modeling user-item interactions


    In other methods we''ve presented, such as matrix factorization, the interactions
    between users and items are considered, but the complex network among users or
    items is not exploited. In contrast, GNNs can capture the complex connections
    in the user-item interaction graph and then use the structure of this graph to
    make more accurate recommendations.


    Thinking back to our message passing, it allowed us to "spread" the information
    of some nodes (in this case, user and items) to their neighbors. An analogy for
    this would be that as a user interacts more and more with items with specific
    features, some of those features are imbued onto the user. This may sound similar
    to latent features, because it is! These are ultimately helping the network build
    a latent representation from the messages that pass features from items to user.
    This can be even more powerful than other latent embedding methods, because you
    explicitly define the structural relationships and how they communicate these
    features.


    ## Feature learning


    GNNs can learn more expressive feature representations of nodes (users or items)
    in a graph by aggregating feature information from their neighbors, leveraging
    the connections between nodes. These learned features can provide rich information
    about users'' preferences or items'' characteristics, which can greatly enhance
    the performance of recommendation systems.


    Previously, we talked about how a user''s representations can learn from the items
    they interact with, but items can also learn from one another. Similar to the
    way item-item collaborative filtering (CF) allows items to pick up latent features
    from shared users, GNNs allow us to add potentially many other direct relationships
    between items.


    ## Cold-start problem


    Recall our cold-start problem: providing recommendations for new users or items
    is difficult because of the lack of historical interactions. By using the features
    of nodes and the structure of the graph, GNNs can learn the embeddings for new
    users or items, potentially alleviating the cold-start problem.


    In some of our graphical representations of our user graph, the edges need not
    only exist between users with lots of prior recommendations. It''s possible to
    use other user actions to *bootstrap* some early edges. Structural edges like
    "share a physical location" or "invited by the same user" or "answers onboarding
    questions similarly" can be enough to quickly bootstrap several user-user edges,
    which allow us to warm-start recommendations for them.


    ## Context-aware recommendations


    GNNs can incorporate contextual information into the recommendation process. For
    example, in a session-based recommendation, a GNN can model the sequence of items
    a user has interacted with in a session as a graph, where each item is a node
    and the sequential order forms edges. The GNN can then learn the dynamic and complex
    transitions among items to make context-aware recommendations.


    These high-level ideas should point to the opportunity in graph encoding for recommender
    problems, but let''s look at two specific applications next: random walks and
    metapaths.


    ## Random Walks


    Random walks in GNNs enable methods to use the user-item interaction graph to
    learn effective node (i.e., user or item) embeddings. The embeddings are then
    used to make recommendations. In the context of graphs, a random walk is an iterative
    process of starting on a particular node and then stochastically moving to another
    connected node via a randomized choice.


    One popular random-walk-based algorithm for network embedding is DeepWalk, which
    has been adapted and extended in many ways for various tasks, including recommendation
    systems.


    Here''s how a random-walk GNN approach might work in a recommendation context:


    1. Random walks generation: start by performing random walks on the interaction
    graph. Starting from each node, make a series of random steps to other connected
    nodes. This results in a set of paths, or "walks," that represent the relationships
    between different nodes.

    2. Node embeddings: the sequences of nodes generated by the random walks are treated
    similar to sentences in a corpus of text, and each node is treated like a word.
    Word2vec or similar language-modeling techniques are then used to learn embeddings
    for the nodes (vector representations), such that nodes appearing in similar contexts
    (in the same walks) have similar embeddings.

    3. Recommendations: once you have learned node embeddings, you can use them to
    make recommendations. For a given user, you might recommend items that are "close"
    to that user in the embedding space, according to a distance metric. This can
    use all the techniques we''ve previously developed for recommendations from latent
    space representations.


    This approach has some nice properties:


    - It can capture the high-order connections in the graph. Each random walk can
    explore a part of the graph that''s not directly connected to the starting node.

    - It can help with the sparsity problem in recommender systems because it uses
    the graph''s structure to learn representations, which requires less interaction
    data.

    - It naturally attempts to handle cold-start issues. For new users or items with
    few interactions, their embeddings can be learned from connected nodes.


    Nevertheless, this approach has some challenges. Random walks can be computationally
    expensive on large graphs, and it might be difficult to choose appropriate hyperparameters,
    such as the length of the random walks. Also, this approach may not work as well
    for dynamic graphs, where interactions change over time, since it doesn''t inherently
    consider temporal information.


    This method implicitly assumes that the nodes are heterogeneous, and so co-embedding
    them via connections is natural. While it was not an explicit requirement, the
    type of sequence embeddings DeepWalk builds tends to structurally assume this.
    Let''s break this rule to accommodate learning between heterogeneous types in
    our next architecture example, metapaths.'
  mdcn: '图神经网络（GNN）与传统神经网络的根本区别在于，训练过程中我们显式地使用了沿“边”在节点表示之间传输数据的算子。这被称为*消息传递*。让我们从一个例子开始，来理解这个基本概念。


    假设节点代表用户，其特征是人口统计信息、入职调查问题等个人资料详情。边代表社交网络图：他们是否是朋友？我们还可以为边添加装饰，例如他们在平台上交换的私信数量。如果我们是希望在平台上引入广告购物的社交媒体公司，我们可能会从这些个人资料特征入手，但理想情况下，我们希望利用这种通信网络中的某些信息。理论上，频繁交流和分享内容的人可能有相似的品味。有点意味深长的是，我们引入了一个叫做*消息函数*的概念，它允许特征从一个节点发送到另一个节点。消息函数使用每个节点及其之间边的特征，数学上表示如下，其中
    $h_i^{(k)}$ 和 $h_j^{(k)}$ 分别是节点 $i$ 和节点 $j$ 的特征：


    $$m_{ij}^{(k)} = \mathcal{M}\left(h_i^{(k)}, h_j^{(k)}, e_{ij}\right)$$


    边的特征是 $e_{ij}$，$\mathcal{M}$ 是某个可微函数。注意，上标 $(k)$ 指的是层，这是反向传播表示法中的标准做法。以下是两个简单的例子：


    - $m_{ij}^{(k)} = h_i^{(k)}$ 意味着“从邻居节点获取特征”

    - $m_{ij}^{(k)} = \frac{h_i^{(k)}}{c_{ij}}$ 意味着“按 $i$ 和 $j$ 之间的边数取平均”


    许多强大的消息传递方案使用了机器学习其他领域的方法——例如在节点特征上添加注意力机制——但本书不会深入探讨这个理论。


    接下来我们要介绍的是*聚合函数*，它以消息集合为输入并将其聚合。最常见的聚合函数类型执行以下操作：


    - 连接所有消息

    - 求和所有消息

    - 平均所有消息

    - 取消息的最大值


    最后，我们将聚合函数的输出作为更新函数的一部分，该函数接收节点特征和聚合后的消息函数，然后应用额外的变换。如果你一直在想，“这个模型在哪里学习任何东西？”答案就在更新函数中。更新函数通常有一个关联的权重矩阵，因此当你训练这个神经网络时，你就是在学习更新函数中的权重。最简单的更新函数将权重矩阵乘以聚合的向量化输出，然后对每个向量应用一个激活函数。


    这种消息传递、聚合和更新的链条是图神经网络的核心，并涵盖了广泛的能力。它们在各种机器学习任务中都很有用，包括推荐。让我们看看一些在推荐系统中的直接应用。


    ## 应用


    让我们重新审视图神经网络在推荐系统领域可能涉及的一些高层概念。


    ## 建模用户-物品交互


    在我们之前介绍的其他方法中，例如矩阵分解，考虑了用户和物品之间的交互，但没有利用用户或物品之间的复杂网络。相比之下，图神经网络可以捕捉用户-物品交互图中的复杂连接，然后利用该图的结构做出更准确的推荐。


    回想一下我们的消息传递，它允许我们将某些节点（在这种情况下是用户和物品）的信息“传播”给它们的邻居。一个类比是，当用户越来越多地与具有特定特征的物品交互时，这些特征中的一些会被赋予到用户身上。这听起来可能类似于潜在特征，因为它确实是！这些最终帮助网络从将特征从物品传递给用户的消息中构建潜在表示。这可能比其他潜在嵌入方法更强大，因为你明确定义了结构关系以及它们如何传递这些特征。


    ## 特征学习


    图神经网络可以通过聚合邻居的特征信息，利用节点之间的连接，学习图中节点（用户或物品）更具表达力的特征表示。这些学习到的特征可以提供关于用户偏好或物品特征的丰富信息，从而极大地提升推荐系统的性能。


    之前我们谈到过用户的表示如何从他们交互的物品中学习，但物品也可以相互学习。类似于物品-物品协同过滤（CF）允许物品从共享用户那里获取潜在特征，图神经网络允许我们添加物品之间可能存在的许多其他直接关系。


    ## 冷启动问题


    回想一下我们的冷启动问题：由于缺乏历史交互，为新用户或物品提供推荐很困难。通过使用节点的特征和图的结构，图神经网络可以学习新用户或物品的嵌入，从而可能缓解冷启动问题。


    在我们用户图的一些图形表示中，边不仅存在于拥有大量先前推荐的用户之间。可以使用其他用户操作来*引导*一些早期的边。诸如“共享物理位置”、“被同一用户邀请”或“入职问题回答相似”之类的结构性边，足以快速引导出多个用户-用户边，从而允许我们为他们进行热启动推荐。


    ## 上下文感知推荐


    图神经网络可以将上下文信息融入推荐过程。例如，在基于会话的推荐中，图神经网络可以将用户在会话中交互的物品序列建模为一个图，其中每个物品是一个节点，顺序形成边。然后，图神经网络可以学习物品之间动态而复杂的转换，以进行上下文感知推荐。


    这些高层概念应该指出了图编码在推荐问题中的机会，但接下来让我们看两个具体应用：随机游走和元路径。


    ## 随机游走


    图神经网络中的随机游走使得方法能够利用用户-物品交互图来学习有效的节点（即用户或物品）嵌入。然后使用这些嵌入进行推荐。在图的上下文中，随机游走是一个迭代过程，从一个特定节点开始，然后通过随机选择随机移动到另一个连接的节点。


    一种流行的基于随机游走的网络嵌入算法是 DeepWalk，它已被针对各种任务（包括推荐系统）进行了许多方式的调整和扩展。


    以下是随机游走图神经网络方法在推荐上下文中可能的工作方式：


    1.  随机游走生成：首先在交互图上执行随机游走。从每个节点开始，进行一系列随机步骤到其他连接的节点。这会产生一组路径或“游走”，代表不同节点之间的关系。

    2.  节点嵌入：随机游走生成的节点序列类似于文本语料库中的句子，每个节点被视为一个词。然后使用 Word2vec 或类似的语言建模技术来学习节点的嵌入（向量表示），使得在相似上下文中（在相同的游走中）出现的节点具有相似的嵌入。

    3.  推荐：一旦你学习了节点嵌入，你就可以用它们来推荐。对于给定的用户，你可以根据距离度量，推荐在嵌入空间中与该用户“接近”的物品。这可以使用我们之前为潜在空间表示推荐开发的所有技术。


    这种方法有一些很好的特性：


    - 它可以捕捉图中的高阶连接。每次随机游走都可以探索与起始节点不直接连接的图的一部分。

    - 它有助于解决推荐系统中的稀疏性问题，因为它利用图的结构来学习表示，这需要更少的交互数据。

    - 它自然地尝试处理冷启动问题。对于交互较少的新用户或物品，可以从连接的节点学习它们的嵌入。


    然而，这种方法也有一些挑战。随机游走在大型图上可能计算成本很高，并且可能难以选择合适的超参数，例如随机游走的长度。此外，这种方法对于动态图（交互随时间变化）可能效果不佳，因为它本质上不考虑时间信息。


    这种方法隐式地假设节点是异构的，因此通过连接将它们共同嵌入是自然的。虽然这不是一个明确的要求，但 DeepWalk 构建的序列嵌入类型在结构上倾向于假设这一点。让我们打破这个规则，以适应我们下一个架构示例——元路径——中异构类型之间的学习。'

    readers finally feel initiated into this vital area of data science.


    —Will Kurt, AI Engineer and author of *Bayesian Statistics the Fun Way* and *Get
    Programming with Haskell*


    > This book is an essential resource for anyone interested in the information
    retrieval (IR) space. The authors take special care to do the incredibly important
    and nuanced work of preparing the reader to solve problems in this space. With
    this book as a reference, you will be able to think through how to set up the
    IR problem, think through the practical steps to take, and then get building.


    —Eric Schles, Research Scientist, Johns Hopkins University'

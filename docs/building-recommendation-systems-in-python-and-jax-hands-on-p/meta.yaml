    \ is demonstrated here as a way of getting some benefit of having an embedding\
    \ for a feature with very large cardinality.\n\nThe artist is probably the most\
    \ informative feature, and the data includes far fewer unique artists, so we have\
    \ a one-to-one mapping between the artist_id and the embeddings. When we convert\
    \ the tuple of (album_id, artist_id) to an embedding, we do separate lookups for\
    \ each ID and then concatenate the embeddings and return one complete embedding\
    \ to represent a track. If more playlist data becomes available, you might also\
    \ want to embed the track_id. However, given that we have more unique tracks than\
    \ playlists, the track_id feature will not generalize well until we have more\
    \ playlist data and the track_id could occur more often as observations. A general\
    \ rule of thumb is that a feature should occur at least 100 times to be useful;\
    \ otherwise, the gradients for that feature will not be updated very often, and\
    \ it might as well be a random number because it is initialized as such.\n\nIn\

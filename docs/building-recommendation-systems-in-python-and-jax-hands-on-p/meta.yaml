  - '[PAGE 104]


    +   - A daily table snapshot may be limited by time to see *what records have
    been added today*.

    - An event table snapshot may be used to feed a set of events into an event stream
    processor like Segment (note that you may also set up live event streams like
    Kafka).

    - An hourly aggregated table can be used for status logging or monitoring.


    In general, the paradigm is usually to operate on snapshots for downstream data
    processing. Many of the kinds of data processing we mentioned earlier—like computing
    user similarity—are operations that may require significant data reads. *It’s
    important to not build ML applications that require extensive querying on the
    production database*, because doing so would likely decrease performance of the
    app and result in a slower user experience. This decrease will undermine the improvement
    made possible by your recommendations.


    Once you’ve snapshotted the tables you’re interested in, you can often find a
    collection of data pipelines useful to transform that data into even more specific
    tables in your *data warehouse* (where you should be doing most of your work anyway).
    Tools like Dagster, dbt, Apache Airflow, Argo, and Luigi are popular data-pipeline
    and workflow orchestration tools for extract, transform, load (ETL) operations.


    # Data Structures for Learning and Inference


    This section introduces three important data structures that will enable our recommendation
    system to perform complex operations quickly. The goal of each structure is to
    sacrifice precision as little as possible, while speeding up access to the data
    in real time. As you’ll see, these data structures form the backbone of the real-time
    inference pipeline and approximate what takes place in the batch pipeline as accurately
    as possible.


    The three data structures are as follows:


    +   - Vector search/ANN index

    - Bloom filters for candidate filtering

    - Feature stores


    So far, we’ve discussed the necessary components for getting data flowing in your
    system. These help organize data to make it more accessible during the learning
    and inference processes. Also, we’ll find some shortcuts to speed up inference
    during retrieval. Vector search will allow us to identify similar items at scale.
    Bloom filters will allow us to rapidly evaluate many criteria for excluding results.
    Feature stores will provide us with necessary data about users for recommendation
    inference.'
  - '[PAGE 105]


    # Vector Search


    We have discussed user similarity and item similarity in terms of understanding
    the relationships between those entities, but we haven''t talked about any *acceleration
    structures* for these processes.


    First let''s discuss a bit of terminology: If we think of a collection of vectors
    that represent entities with a similarity metric provided by a distance function,
    we refer to this as a *latent space*. The simple goal is to utilize our latent
    space and its associated similarity metric (or complementary distance metric)
    to be able to retrieve *similar* items quickly. In our previous examples with
    similarity, we talked about neighborhoods of users and how they can be utilized
    to build an affinity score between users and unseen items. But how do you find
    the neighborhood?


    To understand this, recall that we defined neighborhoods of an element $x$, written
    $\mathcal{N}(x)$, as the set of $k$ elements in the latent space with the maximum
    similarity; or said differently, the set of $j$th order statistics for $j \le
    k$ from the sample of item similarities to $x$. These *k-nearest neighbors*, as
    they''re often called, will be used as the set of elements considered similar
    to $x$.


    These vectors from CF yield a few other useful side effects:


    +   - A simple recommender that randomly samples unseen items from a user neighborhood''s
    liked items

    - Predictions about features of a user, from known features of users in the neighborhood

    - User segmentation via taste similarity


    So how can we speed up these processes? One of the first significant improvements
    in this area came from inverted indices. Utilizing inverted indices is at its
    core carefully constructing a large hash between tokens of the query (for text-based
    search) and the candidates.


    This approach is great for tokenizable entities like sentences or small-lexicon
    collections. Given the ability to look up items that share one or many tokens
    with the query, you can even use a general latent embedding to rank the candidate
    responses by similarity. This approach deserves extra consideration as you scale:
    it incurs a speed cost because it entails two steps, and because the similarity
    distribution may not be well correlated with the token similarity required to
    return many more candidates than we need.


    Classic approaches to building a search system are based on large lookup tables
    and feel deterministic. As we move toward ANN lookup, we want to relax some of
    that strong deterministic behavior and introduce data structures that make assumptions
    to *prune* these large indices. Instead of building indices for only tokenizable'
  - '[PAGE 106]


    components of your elements, you could precompute the $k$-d tree and use the indices
    as the index. The $k$-d tree would precompute the nearest neighbors in a batch
    process (which may be slow), to populate a top-$k$ response for fast lookup. $k$-d
    trees are an efficient data structure for encoding the preceding neighborhoods
    but are notoriously slow to read from in higher dimensions. Using them instead
    to build inverted indices, though, can be a great improvement.


    More recently, explicitly using vector databases with vector search is becoming
    much more possible and feasible. Elasticsearch has added this capability; Faiss
    is a Python library that helps you implement this functionality in your systems;
    Pinecone is a vector-database system explicitly targeting this goal; and Weaviate
    is a native vector-database architecture that allows you to layer the previous
    token-based inverted indices and vector similarity search.


    # Approximate Nearest Neighbors


    What are this element''s $k$-nearest neighbors? Incredibly, approximate nearest
    neighbors (ANN) can get very high accuracy compared to the actual nearest neighbors,
    and you get there faster with head-spinning speedups. You often are satisfied
    with approximate solutions to these problems.


    One open source library that specializes in these approximations is PyNNDescent,
    which uses clever speedups via both optimized implementation and careful mathematical
    tricks. With ANN, you are opened up to two strategies as discussed:


    +   - The pre-index can be dramatically improved.

    - On queries without a pre-indexing option, you can still expect good performance.


    In practice, these similarity lookups are incredibly important for making your
    applications actually work. While we''ve mostly talked about recommendations for
    full known catalogs of items, we cannot assume this in other recommendation contexts.
    These include the following:


    +   - Query-based recommendations (like search)

    - Contextual recommendations

    - Cold-starting new items


    As we go, you will see more and more references to similarity in spaces and nearest
    neighbors; at each of those moments, think: "I know how to make this fast!"'
  - '[PAGE 107]


    # Bloom Filters


    *Bloom filters* are probabilistic data structures that allow us to test for set
    inclusion very efficiently but with a downside: set exclusion is deterministic,
    but set inclusion is probabilistic. *In practice, this means that asking the question
    “Is x in this set” never results in a false negative but may result in a false
    positive!* Note that this type-I error increases as the size of the bloom increases.


    Via vector search, we have identified a large pool of potential recommendations
    for the user. From this pool, we need to do some immediate elimination. The most
    obvious type of high-level filtering that’s essential is to remove those items
    that the *user has previously not shown interest in or has already purchased*.
    You’ve probably had the experience of being recommended the same item, over and
    over, and thinking, “I don’t want this; stop showing me this.” From the simple
    CF models we’ve introduced, you may now see why this could happen.


    The system has identified a set of items via CF that you’re more likely to pick.
    Without any outside influence, those computations will continue to return the
    same results, and you’ll never escape those recommendations. As the system designer,
    you may start with a heuristic:


    > If the user has seen this item recommended three times and never clicked, let’s
    not show it to them anymore.


    This is a totally reasonable strategy to improve *freshness* (the idea of ensuring
    users see new item recommendations) in your recommendation system. While this
    is a simple strategy to improve your recommendations, how might you implement
    this at scale?


    A bloom filter may be used by defining the sets in question with the following:
    “Has this user seen this item recommended three times and never clicked?” Bloom
    filters have a caveat that they’re additive only: once something is in the bloom,
    you can’t remove it. This is not a problem when observing a binary state like
    this heuristic.


    Let’s construct a user-item ID to use as our hash in the bloom. Remember that
    the key feature of the bloom filter is to quickly determine whether the hashed
    item is in the bloom. When we observe a user-item pair that satisfies the preceding
    criteria, take that pair as an ID and hash it. Now, because that hashed pair can
    be easily reconstructed from a list of items for a user, we have a very fast way
    to filter.


    Let’s discuss a few technical details on this topic. First, you might want to
    do a variety of kinds of filtering—maybe freshness is one, and another may be
    items the user has already bought, and a third could exclude items that have sold
    out.


    Here it would be good to implement each of these filters independently; the first
    two can follow our user-item ID hashing as before, and the third one can be a
    hash only on item IDs.'
- md: 'Another consideration is populating the bloom filters. It''s best practice
    to build these blooms from a database during the offline batch jobs. On whatever
    schedule your batch training is run, rebuild your blooms from the records storage
    to ensure you''re keeping your blooms accurate. Remember that blooms don''t allow
    deletion, so in the previous example, if an item goes from sold out to restocked,
    your batch refresh of your blooms can pick up the availability again. In between
    batch retraining, adding to a bloom is also very performant, so you can continue
    to add to the bloom as you observe more data that needs to be considered for the
    filtering in real time. Be sure these transactions are logged to a table, though!
    That logging will be important when you want to refresh.


    ## Fun Aside: Bloom Filters as the Recommendation System


    Bloom filters not only provide an effective way to eliminate some recommendations
    based on conditions for inclusion, but can also be used to do the recommending
    itself! In particular, “An Item/User Representation for Recommender Systems Based
    on Bloom Filters” by Manuel Pozo et al. shows that for high-dimensional feature
    sets with a lot of sparsity (as we discussed in Chapter 3), the type of hashing
    bloom filters do can help overcome some of the key challenges in defining good
    similarity functions!


    Let''s observe that we can do two natural operations on sets via the bloom filter
    data structures. First, consider two sets $A$ and $B$, and associate to them bloom
    filters $\mathcal{BF}_A$ and $\mathcal{BF}_B$. Then what''s the definition of
    $A \cap B$? Can we come up with a bloom filter for this intersection? Yep! Recall
    that our bloom filters are guaranteed to tell us when an element is not contained
    in the set, but if an element is in the set, the bloom filter can respond with
    only a certain probability. In this case, we''d simply look for elements that
    are *in* according to $\mathcal{BF}_A$ *AND* *in* according to $\mathcal{BF}_B$.
    Of course, the set of items returned as *in* each set is larger than the actual
    set (i.e., $A \subset \mathcal{BF}_A$), so the intersection will also be larger:


    $$A \cap B \subset \mathcal{BF}_A \cap \mathcal{BF}_B$$


    Note that you can compute the exact difference in cardinality via information
    about your choice of hashing functions. Also note that the equation is an abuse
    of notation by calling $\mathcal{BF}_A$ the set of things returned by the bloom
    filter corresponding to $A$.


    Second, we also need to construct the union. This is similarly easy by considering
    elements that are *in* according to $\mathcal{BF}_A$ *OR* *in* according to $\mathcal{BF}_B$.
    And so, similarly:


    $$A \cup B \subset \mathcal{BF}_A \cup \mathcal{BF}_B$$


    Now, if we consider items $X$ and $Y$ as concatenated vectors of potentially many
    features, and hash those concatenated features, we are representing each of them
    as the bitwise vectors of our bloom. From before, we saw that the intersection
    of two blooms makes sense, and in fact is equivalent to the bitwise $AND$ of their
    bloom representations. This means two items'' feature similarities can be expressed
    by the bitwise $and$ similarity of their bloom hashes:


    $$\text{sim}(X, Y) = |\mathcal{B}\mathcal{F}(X) \cap \mathcal{B}\mathcal{F}(Y)|
    = \mathcal{B}\mathcal{F}(X) \text{ bitwise } \mathcal{B}\mathcal{F}(X)$$


    For static datasets, this method has real advantages, including speed, scalability,
    and performance. Limitations are based on a variety of features and on the ability
    to change the set of possible items. Later we will discuss $locally\ sensitive\
    hashing$, which further iterates on lookup speed with lower risks of collision
    in high-dimensional spaces, and some similar ideas will reemerge.


    ## Feature Stores


    So far, we have focused on recommendation systems that we might call $pure\ collaborative\
    filtering$. We''ve made use of the user- or item-similarity data only when attempting
    to make good recommendations. If you''ve been wondering, “Hey, what about information
    about the actual users and items?” your curiosity will now be sated.


    There are a huge variety of reasons you could be interested in features in addition
    to your previous CF methods. Let''s list a few high-level concerns:


    - You may wish to show new users a specific set of items first.

    - You may wish to consider geographic boundaries in your recommendations.

    - Distinguishing between children and adults may be important for the types of
    recommendations they''re given.

    - Item features may be used to ensure high-level diversity in the recommendations
    (more to come in Chapter 15).

    - User features can enable various kinds of experimental testing.

    - Item features could be used to group items into sets for contextual recommendations
    (more to come in Chapter 15).


    In addition to these issues, another kind of feature is often essential: real-time
    features. While the point of feature stores is to provide real-time access to
    all the necessary features, it''s worthwhile to distinguish stable features that
    change infrequently from real-time features that we anticipate will change often.


    Some important examples of a real-time feature store are dynamic prices, current
    item availability, *trending* status, wish-list status, and so on. These features
    may change throughout the day, and we want their values in the feature store to
    be mutable in real-time via other services and systems. Therefore, the real-time
    feature store will need to provide API access for feature mutation. This is something
    you may not want to provide for *stable* features.


    When we design our feature store, we''re likely to want the stable features to
    be built from data warehouse tables via ETLs and transformations, and we likely
    want the real-time features to be built this way as well, but on a faster schedule
    or allowing API access for mutation. In either case, the key quality of a feature
    store is *very fast read access*. It''s often a good idea to separately build
    feature stores for offline training of models that can be built in test to ensure
    support for new models.


    So how might the architecture and implementation look? See Figure 6-3.


    ![](img/da17d05291861831978609329c481581_110_0.png)


    Designing a feature store involves designing pipelines that define and *transform
    the features into that store* (coordinated via things like Airflow, Luigi, Argo,
    etc.) and often look similar to the type of data pipelines used in building our
    collector. One additional complication that the feature store needs to concern
    itself with is a speed layer. During our discussion of the lambda architecture
    earlier in this chapter, we mentioned that we can think of batch data processing
    for the collector and a more rapid speed layer for intermediary updates, but this
    is even more important for the feature store. The feature store may also need
    a *streaming layer*. This layer operates on continuous streams of data and can
    perform data transformations on those; it then writes the appropriate output to
    the online feature store in real time. This adds complexity because data transformations
    on streaming data present a very different set of challenges and often require
    different algorithmic strategies. Some technologies that help here are Spark Streaming
    and Kinesis. You''ll also need to configure the system to properly handle the
    data stream, the most common of which is Kafka. Data streaming layers involve
    many components and architectural considerations that fall outside our scope;
    if you’re considering getting started with Kafka, check out *Kafka: The Definitive
    Guide* by Gwen Shapira et al. (O’Reilly).


    A feature store also needs a *storage layer*; many approaches exist here, but
    using a NoSQL database is common, especially in the online feature store. The
    reason is faster retrieval and the nature of the data storage. Feature stores
    for recommendation systems tend to be very key based (i.e., *get the features
    for this user*, or *get the features for this item*), which lend themselves well
    to key-value stores. Some example technologies here are DynamoDB, Redis, and Cassandra.
    The storage layer for an offline feature store may simply be an SQL-style database
    to reduce complexity, but instead you’ll pay a tax of a delta between offline
    and online. This delta and others like it are called *training-serving skew*.


    A unique but essential aspect of feature stores is the *registry*. A registry
    is incredibly useful for a feature store because it coordinates existing features
    and information on how they’re defined. A more sophisticated instance of a registry
    also includes input and output schemas with typing, and distributional expectations.
    These are contracts that the data pipelines must adhere to and satisfy to avoid
    populating your feature store with garbage data. Additionally, the registry’s
    definitions allow parallel data scientists and ML engineers to develop new features,
    use one another’s features, and generally understand the assumptions of features
    their models may utilize.


    One important advantage of these registries is that they incentivize alignment
    between teams and developers. In particular, if you decide you care about *country*
    for your user, and you see a feature *country* in the registry, you’re more likely
    to use that (or ask the developer who’s assigned to this feature in the registry)
    than to make a new one from scratch. Practically, data scientists make hundreds
    of small decisions and assumptions when defining their models, and this removes
    some of that load that’s relying on the existing resources.


    ![](img/da17d05291861831978609329c481581_111_0.png)


    ## Model Registries


    A closely related concept to feature registries is model registries. The concepts
    have a lot in common, but we caution you to think of them differently. A great
    model registry can have type contracts for the input and output of your models,
    and can serve many of the same benefits around alignment and clarity. A feature
    registry should really be focused on definitions of the business logic and features.
    Because feature engineering can also be model driven, speaking clearly about the
    differences between these two things can be challenging, so to sum it up, we’ll
    focus on what they serve: a model registry concerns itself with ML models and
    the relevant metadata, whereas a feature registry concerns itself with features
    that models will use.'
  mdcn: '另一个考虑因素是填充布隆过滤器。最佳实践是在离线批处理作业期间从数据库构建这些布隆过滤器。无论你的批处理训练按何种计划运行，都应从记录存储中重建布隆过滤器，以确保其保持准确。请记住，布隆过滤器不允许删除操作，因此在前面的例子中，如果一个商品从售罄变为重新上架，你的布隆过滤器批处理刷新可以再次捕获其可用性。在批处理重训练之间，向布隆过滤器添加数据也非常高效，因此你可以随着观察到更多需要实时考虑过滤的数据而继续向其中添加。不过，请确保这些事务被记录到表中！当你想要刷新时，这些日志将非常重要。


    ## 趣闻：布隆过滤器作为推荐系统


    布隆过滤器不仅提供了一种基于包含条件来排除某些推荐的有效方式，还可以用于执行推荐本身！特别是，Manuel Pozo 等人的论文《基于布隆过滤器的推荐系统项/用户表示》表明，对于具有大量稀疏性的高维特征集（正如我们在第3章讨论的），布隆过滤器使用的哈希类型有助于克服定义良好相似性函数时的一些关键挑战！


    让我们观察一下，我们可以通过布隆过滤器数据结构对集合执行两个自然操作。首先，考虑两个集合 $A$ 和 $B$，并将它们与布隆过滤器 $\mathcal{BF}_A$
    和 $\mathcal{BF}_B$ 关联起来。那么 $A \cap B$ 的定义是什么？我们能为这个交集设计一个布隆过滤器吗？可以！回想一下，我们的布隆过滤器保证能告诉我们一个元素是否不在集合中，但如果一个元素在集合中，布隆过滤器只能以一定的概率响应。在这种情况下，我们只需查找根据
    $\mathcal{BF}_A$ *在* 且根据 $\mathcal{BF}_B$ *在* 的元素。当然，作为*在*每个集合中返回的元素集合大于实际集合（即
    $A \subset \mathcal{BF}_A$），因此交集也会更大：


    $$A \cap B \subset \mathcal{BF}_A \cap \mathcal{BF}_B$$


    请注意，你可以通过关于哈希函数选择的信息来计算基数的精确差异。还要注意，该方程是一种符号滥用，将 $\mathcal{BF}_A$ 称为与 $A$ 对应的布隆过滤器返回的事物集合。


    其次，我们还需要构造并集。这同样简单，只需考虑根据 $\mathcal{BF}_A$ *在* 或根据 $\mathcal{BF}_B$ *在* 的元素。因此，类似地：


    $$A \cup B \subset \mathcal{BF}_A \cup \mathcal{BF}_B$$


    现在，如果我们考虑项目 $X$ 和 $Y$ 作为可能包含许多特征的连接向量，并对这些连接特征进行哈希处理，我们就是将它们各自表示为布隆过滤器的位向量。从前面我们知道，两个布隆过滤器的交集是有意义的，实际上等同于它们布隆表示的按位
    $AND$。这意味着两个项目的特征相似性可以通过它们布隆哈希的按位 $and$ 相似性来表示：


    $$\text{sim}(X, Y) = |\mathcal{B}\mathcal{F}(X) \cap \mathcal{B}\mathcal{F}(Y)|
    = \mathcal{B}\mathcal{F}(X) \text{ bitwise } \mathcal{B}\mathcal{F}(X)$$


    对于静态数据集，这种方法具有真正的优势，包括速度、可扩展性和性能。其局限性基于各种特征以及更改可能项目集的能力。稍后我们将讨论 $局部敏感哈希$，它进一步迭代了查找速度，并降低了高维空间中的冲突风险，一些类似的想法将重新出现。


    ## 特征存储


    到目前为止，我们一直专注于可能被称为 $纯协同过滤$ 的推荐系统。我们仅在尝试做出良好推荐时才利用用户或项目相似性数据。如果你一直在想，“嘿，关于实际用户和项目的信息呢？”你的好奇心现在将得到满足。


    除了之前的协同过滤方法之外，你可能对特征感兴趣的原因有很多。让我们列出一些高层次的关注点：


    - 你可能希望首先向新用户展示一组特定的项目。

    - 你可能希望在推荐中考虑地理边界。

    - 区分儿童和成人可能对他们获得的推荐类型很重要。

    - 项目特征可用于确保推荐的高层次多样性（更多内容见第15章）。

    - 用户特征可以支持各种实验测试。

    - 项目特征可用于将项目分组为集合，以进行上下文推荐（更多内容见第15章）。


    除了这些问题，另一种特征通常至关重要：实时特征。虽然特征存储的要点是提供对所有必要特征的实时访问，但值得区分那些变化不频繁的稳定特征和我们预期会经常变化的实时特征。


    实时特征存储的一些重要示例包括动态价格、当前项目可用性、*趋势*状态、愿望清单状态等。这些特征可能在一天中发生变化，我们希望它们在特征存储中的值能够通过其他服务和系统实时更改。因此，实时特征存储需要提供用于特征变更的
    API 访问。这可能是你不想为*稳定*特征提供的。


    当我们设计特征存储时，我们可能希望稳定特征通过 ETL 和转换从数据仓库表构建，我们也可能希望实时特征以这种方式构建，但速度更快或允许 API 访问进行变更。无论哪种情况，特征存储的关键质量是*非常快的读取访问*。通常，为模型的离线训练单独构建特征存储是一个好主意，可以在测试中构建以确保对新模型的支持。


    那么架构和实现可能是什么样子？参见图 6-3。


    ![](img/da17d05291861831978609329c481581_110_0.png)


    设计特征存储涉及设计管道，这些管道定义并*将特征转换到该存储中*（通过 Airflow、Luigi、Argo 等工具协调），并且通常看起来类似于构建我们的收集器时使用的数据管道类型。特征存储需要关注的一个额外复杂性是速度层。在本章前面关于
    lambda 架构的讨论中，我们提到我们可以考虑收集器的批处理数据处理和用于中间更新的更快速度层，但这对于特征存储更为重要。特征存储可能还需要一个*流处理层*。这一层处理连续的数据流，并可以对这些数据执行转换；然后它将适当的输出实时写入在线特征存储。这增加了复杂性，因为对流数据的数据转换带来了一系列非常不同的挑战，通常需要不同的算法策略。这里的一些有用技术是
    Spark Streaming 和 Kinesis。你还需要配置系统以正确处理数据流，其中最常见的是 Kafka。数据流层涉及许多组件和架构考虑，超出了我们的范围；如果你考虑开始使用
    Kafka，请查看 Gwen Shapira 等人的《Kafka权威指南》（O''Reilly）。


    特征存储还需要一个*存储层*；这里存在许多方法，但使用 NoSQL 数据库很常见，尤其是在在线特征存储中。原因是更快的检索和数据存储的性质。推荐系统的特征存储往往非常基于键（即，*获取此用户的特征*，或*获取此项目的特征*），这非常适合键值存储。这里的一些示例技术是
    DynamoDB、Redis 和 Cassandra。离线特征存储的存储层可能只是 SQL 风格的数据库以降低复杂性，但你将为离线和在线之间的差异付出代价。这种差异和其他类似的差异被称为*训练服务偏差*。


    特征存储的一个独特但必要的方面是*注册表*。注册表对于特征存储非常有用，因为它协调现有特征以及它们如何定义的信息。更复杂的注册表实例还包括带有类型、分布期望的输入和输出模式。这些是数据管道必须遵守和满足的契约，以避免用垃圾数据填充你的特征存储。此外，注册表的定义允许并行的数据科学家和
    ML 工程师开发新特征、使用彼此的特征，并通常理解他们的模型可能使用的特征的假设。


    这些注册表的一个重要优势是它们激励团队和开发者之间的一致性。特别是，如果你决定关心用户的*国家*，并且你在注册表中看到一个*国家*特征，你更有可能使用它（或询问注册表中负责此特征的开发者），而不是从头开始创建一个新的。实际上，数据科学家在定义模型时会做出数百个小决策和假设，这减轻了依赖现有资源的部分负担。


    ![](img/da17d05291861831978609329c481581_111_0.png)


    ## 模型注册表


    与特征注册表密切相关的一个概念是模型注册表。这两个概念有很多共同之处，但我们建议你以不同的方式思考它们。一个优秀的模型注册表可以为模型的输入和输出提供类型契约，并可以在一致性和清晰度方面提供许多相同的好处。特征注册表应真正专注于业务逻辑和特征的定义。因为特征工程也可以是模型驱动的，所以清楚地说明这两者之间的差异可能具有挑战性，所以总结一下，我们将专注于它们服务的对象：模型注册表关注
    ML 模型和相关的元数据，而特征注册表关注模型将使用的特征。'

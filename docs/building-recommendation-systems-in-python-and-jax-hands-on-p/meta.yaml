  md: '# CHAPTER 3

    Mathematical Considerations


    Most of this book is focused on implementation and on practical considerations
    necessary to get recommendation systems working. In this chapter, you''ll find
    the most abstract and theoretical concepts of the book. The purpose of this chapter
    is to cover a few of the essential ideas that undergird the field. It''s important
    to understand these ideas as they lead to pathological behavior in recommendation
    systems and motivate many architectural decisions.


    We''ll start by discussing the shape of data you often see in recommendation systems,
    and why that shape can require careful thought. Next we''ll talk about the underlying
    mathematical idea, similarity, that drives most modern recommendation systems.
    We''ll briefly cover a different way of thinking about what a recommender does,
    for those with a more statistical inclination. Finally, we''ll use analogies to
    NLP to formulate the popular approach.


    # Zipf''s Laws in RecSys and the Matthew Effect


    In a great many applications of ML, a caveat is given early: the distribution
    of observations of unique items from a large corpus is modeled by Zipf''s law—the
    frequency of occurrence drops exponentially. In recommendation systems, the Matthew
    effect appears in the popular item''s click rates or the popular user''s feedback
    rates. For example, popular items have dramatically larger click counts than average,
    and more-engaged users give far more ratings than average.


    ![](img/da17d05291861831978609329c481581_48_0.png)


    **The Matthew Effect**


    The Matthew effect—or *popularity bias*—states that the most popular items continue
    to attract the most attention and widen the gap with other items.'
  merge: -1
  pgno: 48
- img_proc: true
  md: 'Take, for example, the MovieLens dataset, an extremely popular dataset for
    benchmarking recommendation systems. Jenny Sheng observes the behavior shown in
    Figure 3-1 for a number of movie ratings:


    ![](img/da17d05291861831978609329c481581_49_0.png)


    Figure 3-1. Zipfian distribution of movie-rank ratings


    At first glance, the rapid decline in ratings is obvious and stark, but is it
    a problem? Let’s assume our recommender will be built as a user-based collaborative
    filtering (CF) model—as alluded to in Chapter 2. Then how might these distributions
    affect the recommender?


    We will consider the distributional ramifications of this phenomenon. Let the
    probability mass function be described by the simple Zipf’s law:


    $$f(k, M) = \frac{1/k}{\sum_{n=1}^{M} (1/n)}$$


    For $M$ number of tokens in the corpus (in our example, the number of movies),
    $k$ is the rank of a token when sorted by number of occurrences.


    Let’s consider users $A$ and $B$, with $N_A = |\mathcal{I}_A|$ and $N_B = |\mathcal{I}_B|$
    ratings, respectively. Observe that the probability of $V_i$, the $i$th most popular
    video, appearing in $\mathcal{I}_X$ for a user $X$ is given by the following:


    $$P(i) = \frac{f(i, M)}{\sum_{j=1}^{M} f(j, M)} = \frac{1/i}{\sum_{j=1}^{M} 1/j}$$'
  merge: -1
  pgno: 49
- img_proc: true
  md: 'Thus the joint probability of an item appearing in two user''s ratings is shown
    here:


    $$P(i^2) = \left( \frac{1/i}{\sum_{j=1}^M 1/j} \right)^2$$


    In words, the probability of two users sharing an item in their rating sets drops
    off with the square of its popularity rank.


    This becomes important when we also consider that our, yet unstated, definition
    of user-based CF is based on similarity in users'' ratings sets. This similarity
    is *the number of jointly rated items by two users, divided by the total number
    of items rated by either*.


    Taking this definition, we can, for example, compute the similarity score for
    one shared item among $A$ and $B$:


    $$\sum_{i=1}^M \frac{P(i^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|}$$


    The average similarity score of two users is then generalized as follows via repeated
    application of the preceding equation:


    $$\min(N_A, N_B) \sum_{t=1} \left( \prod_{i_k = i_{k-1}+1}^{t-1} \sum_{i=1}^M
    \left( \frac{P(i_k^2)}{\| \mathcal{I}_A \cup \mathcal{I}_B \|} \right) \right)$$


    via repeated application of the preceding observation.


    These combinatorial formulas not only indicate the relevance of the Zipfian in
    our algorithms, but we also see an almost direct effect on the output of scores.
    Consider the experiment in “Quantitative Analysis of Matthew Effect and Sparsity
    Problem of Recommender Systems” by Hao Wang et al. on the Last.fm dataset. Last.fm
    is a music-listening tracker enabling users to keep track of all the songs they
    listen to; for Last.fm users, the authors demonstrate average similarity scores
    for pairs of users, and they find that this Matthew effect persists into the similarity
    matrix (Figure 3-2).'
  merge: -1
  pgno: 50
- img_proc: true
  md: '![](img/da17d05291861831978609329c481581_51_0.png)


    Figure 3-2. Matthew effect as seen on the Last.fm dataset


    Observe the radical difference between “hot” cells and all the others. The bright
    cells are few among the mostly dark, suggesting a difficult combination of some
    extremely popular items among the far more common frequency close to zero. While
    these results might seem scary, later we’ll consider diversity-aware loss functions
    that can mitigate the Matthew effect. A simpler way is to use downstream sampling
    methods, which we will discuss as part of our explore-exploit algorithms. Finally,
    the Matthew effect is only the first of two major impacts of this Zipfian; let’s
    turn our attention to the second.


    # Sparsity


    We must now reckon with sparsity. As the ratings skew more and more toward the
    most popular items, the least popular items are starved for data and recommendations,
    which is called *data sparsity*. This connects to the linear-algebraic definition:
    mostly zeros or not populated elements in a vector. When you consider again our
    user-item matrix, less popular items constitute columns with few entries; these
    are sparse vectors. Similarly, at scale we see that the Matthew effect pushes
    more and more of the total ratings into certain columns, and the matrix becomes
    sparse in the traditional mathematical sense. For this reason, sparsity is an
    extremely well-known challenge for recommendation systems.'

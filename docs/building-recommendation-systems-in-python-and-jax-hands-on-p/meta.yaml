  md: '# DataLoaders


    DataLoaders is a programming paradigm originating from PyTorch, but it has been
    embraced in other gradient-optimized ML workflows. As we begin to integrate gradient-based
    learning into our recommendation system architectures, we will face challenges
    in our MLOps tooling. The first is related to training data size and available
    memory. DataLoaders are a way to prescribe how data is batched and sent to the
    training loop efficiently; as datasets get large, careful scheduling of these
    training sets can have major effects on learning. But why must we think about
    *batches* of data? That’s because we’ll use a variant of gradient descent appropriate
    for large amounts of data.


    First, let’s review the basics of *mini-batched gradient descent*. During training
    via gradient descent, we make a forward pass of our training sample through our
    model to yield a prediction, and we then compute the error and the appropriate
    gradient backward through our model to update parameters. Batched gradient descent
    takes all our data in a single pass to compute the gradient for the training set
    and push it back through; this implies you have the entire training dataset in
    memory. As the dataset scales, this ranges from expensive to impossible; to avoid
    this, we can instead compute gradients of the loss function for only a subset
    of the dataset at a time. The simplest paradigm for this, called *stochastic gradient
    descent* (SGD), computes these gradients and parameter updates one sample at a
    time. The mini-batched version performs our batched gradient descent, but over
    a series of subsets to form a partition of our dataset. In mathematical notation,
    we write the update rule in terms of Jacobians on the smaller batches:


    $$\theta = \theta - \eta * \nabla_{\theta} J(\theta; x^{(i:i+n)}; y^{(i:i+n)})$$


    This optimization serves a few purposes. First, it requires only potentially small
    subsets of our data held in memory during the steps. Second, it requires far fewer
    passes than the purely iterative version in SGD. Third, the gradient operating
    on these mini-batches can be organized as a Jacobian, and thus we have linear-algebraic
    operations that may be highly optimized.'
  merge: -1
  pgno: 101
- img_proc: true
  md: "![](img/da17d05291861831978609329c481581_102_0.png)\n\n# Jacobians\n\nThe mathematical\
    \ notion of a Jacobian in the simplest sense is an organizational tool for a set\
    \ of vector derivatives with relevant indexes. You may recall that for functions\
    \ of several variables, you can take the derivative *with respect to* each of\
    \ those variables. For a single multivariable scalar function, the Jacobian is\
    \ simply the row vector of first derivatives of the function—which happens to\
    \ be the transpose of the gradient.\n\nThis is the simplest case; the gradient\
    \ of a multivariable scalar function may be written as a Jacobian. However, once\
    \ we have a vector of (vector) derivatives, we can write that as a matrix; the\
    \ utility here is really only in the notation, though. When you collect a series\
    \ of multivariable scalar functions into a vector of functions, the associated\
    \ vector of gradients is a vector of vectors of derivatives. This is called a\
    \ *Jacobian matrix*, and it generalizes the gradient to vector-valued functions.\
    \ As you've likely realized, layers of neural networks are a great source of vector-valued\
    \ functions for which you'd like to derivate.\n\nIf you're convinced mini-batches\
    \ are useful, it's time to discuss *DataLoaders*—a simple PyTorch API for facilitating\
    \ mini-batch access from a large dataset. The key parameters for a DataLoader\
    \ are `batch_size`, `shuffle`, and `num_workers`. The batch size is easy to understand:\
    \ it's the number of samples included in each batch (often an integer factor of\
    \ the total size of the dataset). Often a shuffle operation is applied in serving\
    \ up these batches; the shuffle allows batches in each epoch to be shown to the\
    \ network in a randomized order; this is intended to improve robustness. Finally,\
    \ `num_workers` is a parallelization parameter for the CPU's batch generation.\n\
    \nThe utility of a DataLoader is really best understood via demonstration:\n\n\
    ```\nparams = {\n    'batch_size': _,\n    'shuffle': _,\n    'num_workers': _\n\
    }\n\ntraining_generator = torch.utils.data.DataLoader(training_set, params)\n\n\
    validation_generator = torch.utils.data.DataLoader(validation_set, params)\n\n\
    // Loop over epochs\nfor epoch in range(max_epochs):\n    // Training\n    for\
    \ local_batch, local_labels in training_generator:\n\n        // Model computations\n\
    \        [...]\n```"
  merge: -1
  pgno: 102
- img_proc: true
  md: "```\n// Validation\nwith torch.set_grad_enabled(False):\n    for local_batch,\
    \ local_labels in validation_generator:\n\n        // Model computations\n   \
    \     [...]\n```\n\nThe first important detail in this code is that any of its\
    \ generators will be reading in mini-batches from your total dataset and can be\
    \ instructed to load those batches in parallel. Note also that any differential\
    \ steps in the model computations will now be operating on these mini-batches.\n\
    \nIt’s easy to think of DataLoaders as merely a tool for code cleanliness (which,\
    \ admittedly, it does improve), but it’s important to not underestimate how the\
    \ control of batch order, parallelization, and shape are significant features\
    \ for training your model. Lastly, the structure of your code now looks like batch\
    \ gradient descent, but it is taking advantage of mini-batching, further exposing\
    \ what your code actually does instead of the steps necessary to do it.\n\n# Database\
    \ Snapshots\n\nLet’s round out this section by stepping back from these fancy\
    \ technologies to discuss something important and classic: snapshotting a production\
    \ database.\n\nAn extremely likely scenario is that the engineers (potentially\
    \ also you) who have built the recommendations server are writing their logs and\
    \ other application data to an SQL database. More likely than not, this database\
    \ architecture and deployment are optimized for fast querying by the application\
    \ across its most common use cases. As we’ve discussed, those logs may be in an\
    \ event-style schema, and there are other tables that may require aggregation\
    \ and roll-up to make any sense. For example, a *current inventory* table may\
    \ require knowledge of start-of-day inventory and then aggregate a list of purchase\
    \ events.\n\nAll told, the production SQL database is usually a crucial component\
    \ in the stack that’s geared to specific use. As the downstream consumer of this\
    \ data, you may find yourself wanting different schemas, wanting lots of access\
    \ to this database, and performing serious operations on this data. The most common\
    \ paradigm is *database snapshotting*. Snapshotting is a functionality provided\
    \ by various flavors of SQL to performantly make a clone of a database. While\
    \ this snapshotting may take form in a variety of ways, let’s focus on a few that\
    \ serve to simplify our systems and ensure they have the necessary data on hand:\n\
    \n+   - A daily table snapshot may be tied to an *as_of* field, or *the state\
    \ of this table on this day*."

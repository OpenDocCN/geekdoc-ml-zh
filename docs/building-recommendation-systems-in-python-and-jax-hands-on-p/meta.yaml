    Here are a few advantages of this approach:


    +   - Better expected performance overall, as ensembles usually increase performance

    - Ensemble performance with lower average computation time

    - Especially better performance in out-of-sample scenarios


    This method scales to larger pools of models and, while it may incur significant
    training efforts, finding the right ordering of the models can have significant
    effects on model accuracy and latency.


    # The Evaluation Flywheel


    By now, it’s likely obvious that a production ML model is far from a static object.
    Production ML systems of any kind are subject to as many deployment concerns as
    a traditional software stack, in addition to the added challenge of dataset shift
    and new users/items. In this section, we’ll look closely at the feedback loops
    introduced and understand how the components fit together to continuously improve
    our system—even with little input from a data scientist or ML engineer.


    # Daily Warm Starts


    As we’ve now discussed several times, we need a connection between the continuous
    output of our model and retraining. The first simplest example of this is daily
    warm starts, which essentially ask us to utilize the new data seen each day in
    our system.


    As might already be obvious, some of the recommendation models that show great
    success are quite large. Retraining some of them can be a massive undertaking,
    and simply *rerunning everything* each day is often infeasible. So, what can be
    done?



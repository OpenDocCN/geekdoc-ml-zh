- md: "Bryan would like to thank his colleagues from Stitch Fix, where he learned\
    \ many of the key ideas in this book—in particular, Ian Horn’s patient guidance\
    \ on transfer learning, Dr. Molly Davies’s mentorship on experimentation and effect\
    \ estimates, Mark Weiss’s deep partnership on understanding the relationship between\
    \ availability and recommendations, Dr. Reza Sohrabi’s introduction to transformers,\
    \ Dr. Xi Chen’s encouragement on GNNs for recs, and Dr. Leland McInnes for his\
    \ careful advice on dimension reduction and approximate nearest neighbors. Bryan\
    \ benefitted a lot from conversations with Dr. Natalia Gardiol, Dr. Daniel Fleischman,\
    \ Dr. Andrew Ho, Jason Liu, Dr. Dan Marthaler, Dr. Chris Moody, Oz Raza, Dr. Anna\
    \ Schneider, Ujjwal Sarin, Agnieszka Szefar, Dr. Daniel Tasse, Diyang Tang, Zach\
    \ Winston, and others he has almost certainly forgotten. Outside of his incredible\
    \ Stitch Fix colleagues, he especially wants to thank Dr. Eric Bunch, Dr. Lee\
    \ Goerl, Dr. Will Chernoff, Leo Rosenberg, and Janu Verma for collaboration over\
    \ the years. Dr. Brian Amadio as an excellent colleague and originally suggested\
    \ that he write this book. Dr. Even Oldridge for encouraging him to actually try\
    \ it. Eugene Yan and Karl Higley—neither of whom he’s met but has been significantly\
    \ inspired by. He’d like to thank Dr. Zhongzhu Lin and Dr. Alexander Rosenberg,\
    \ who both had formative impacts on his career. Cianna Salvatora, who assisted\
    \ in early literature review, and Valentina Besprozvannykh, who greatly assisted\
    \ in reading early draft notes and providing guidance.\n\nBoth authors thank Tobias\
    \ Zwingmann, Ted Dunning, Vicki Boykis, Eric Schles, Shaked Zychlinski, and Will\
    \ Kurt, who spend much time giving careful technical feedback on book manuscripts—without\
    \ which this book would have been incomprehensible. Rebecca Novack, who harangued\
    \ us into signing up for this project. And Jill Leonard, who removed nearly 100\
    \ erroneous instances of the word *utilize* from the manuscript, and who offered\
    \ an incredible amount of patient partnership on the book text.\n\n## PART I\n\
    \n## Warming Up\n\n> How do we get all the data in the right place to train a\
    \ recommendation system, and for real-time inference?\n\nSo, you’ve decided to\
    \ dive into the world of recommendation systems! Are you hoping to suggest just\
    \ the right thing based on users’ quirky preferences across a vast sea of choices?\
    \ If so, you’ve set quite the challenge for yourself! On the surface, these systems\
    \ might seem straightforward: if User A and User B have similar tastes, then maybe\
    \ what A likes, B will too. But, as with all things that seem simple, there’s\
    \ a depth that’s waiting to be explored.\n\nHow do we capture the essence of a\
    \ user’s history and feed it into a model? Where do we stash this model so it’s\
    \ ready to serve up suggestions on the fly? And how do we make sure it doesn’t\
    \ suggest something that steps out of bounds or goes against the business rulebook?\
    \ Collaborative filtering is our starting point, a guiding light. But there’s\
    \ an entire universe beyond it that makes these systems tick, and together, we’re\
    \ going to navigate it.\n\n## CHAPTER 1\nIntroduction\n\nRecommendation systems\
    \ are integral to the development of the internet that we know today and are a\
    \ central function of emerging technology companies. Beyond the search ranking\
    \ that opened the web’s breadth to everyone, the new and exciting movies all your\
    \ friends are watching, or the most relevant ads that companies pay top dollar\
    \ to show you lie more applications of recommendation systems every year. The\
    \ addictive For You page from TikTok, the Discover Weekly playlist by Spotify,\
    \ board suggestions on Pinterest, and Apple’s App Store are all hot technologies\
    \ enabled by the recommendation systems. These days, sequential transformer models,\
    \ multimodal representations, and graph neural nets are among the brightest areas\
    \ of R&D in machine learning (ML)—all being put to use in recommendation systems.\n\
    \nUbiquity of any technology often prompts questions of how the technology works,\
    \ why it has become so common, and if we can get in on the action. For recommendation\
    \ systems, the *how* is quite complicated. We’ll need to understand the geometry\
    \ of taste, and how only a little bit of interaction from a user can provide us\
    \ a *GPS signal* in that abstract space. You’ll see how to quickly gather a great\
    \ set of candidates and how to refine them to a cohesive set of recommendations.\
    \ Finally, you’ll learn how to evaluate your recommender, build the endpoint that\
    \ serves inference, and log about its behavior.\n\nWe will formulate variants\
    \ of the core problem to be solved by recommendation systems but, ultimately,\
    \ the motivating problem framing is as follows:\n\n> Given a collection of things\
    \ that may be recommended, choose an ordered few for the current context and user\
    \ that best match according to a certain objective.\n\n## Key Components of a\
    \ Recommendation System\n\nAs we increase complexity and sophistication, let's\
    \ keep in mind the components of our system. We will use *string diagrams* to\
    \ keep track of our components, but in the literature these diagrams are presented\
    \ in a variety of ways.\n\nWe will identify and build on three core components\
    \ of recommendation systems: the collector, ranker, and server.\n\n### Collector\n\
    \nThe collector's role is to know what is in the collection of things that may\
    \ be recommended, and the necessary features or attributes of those things. Note\
    \ that this collection is often a subset based on context or state.\n\n### Ranker\n\
    \nThe ranker's role is to take the collection provided by the collector and order\
    \ some or all of its elements, according to a model for the context and user.\n\
    \n### Server\n\nThe server's role is to take the ordered subset provided by the\
    \ ranker, ensure that the necessary data schema is satisfied—including essential\
    \ business logic—and return the requested number of recommendations.\n\nTake,\
    \ for example, a hospitality scenario with a waiter:\n\n> When you sit down at\
    \ your table, you look at the menu, unsure of what you should order. You ask the\
    \ waiter, “What do you think I should order for dessert?”\n\nThe waiter checks\
    \ their notes and says, “We’re out of the key lime pie, but people really like\
    \ our banana cream pie. If you like pomegranate, we make pom ice cream from scratch;\
    \ and it’s hard to go wrong with the donut a la mode—it’s our most popular dessert.”\n\
    \nIn this short exchange, the waiter first serves as a collector: identifying\
    \ the desserts on the menu, accommodating current inventory conditions, and preparing\
    \ to talk about the characteristics of the desserts by checking their notes.\n\
    \nNext, the waiter serves as a ranker; they mention items high scoring in popularity\
    \ (banana cream pie and donut a la mode) as well as a contextually high match\
    \ item based on the patron's features (if they like pomegranate).\n\nFinally,\
    \ the waiter serves the recommendations verbally, including both explanatory features\
    \ of their algorithm and multiple choices.\n\nWhile this seems a bit cartoonish,\
    \ remember to ground discussions of recommendation systems in real-world applications.\
    \ One of the advantages of working in RecSys is that inspiration is always nearby.\n\
    \n## Simplest Possible Recommenders\n\nWe've established the components of a recommender,\
    \ but to really make this practical, we need to see this in action. While much\
    \ of the book is dedicated to practical recommendation systems, first we'll start\
    \ with a toy and scaffold from there.\n\n### The Trivial Recommender\n\nThe absolute\
    \ simplest recommender is not very interesting but can still be demonstrated in\
    \ the framework. It's called *the trivial recommender* (TR) because it contains\
    \ virtually no logic:\n\n```\ndef get_trivial_recs() -> Optional[List[str]]:\n\
    \    item_id = random.randint(0, MAX_ITEM_INDEX)\n\n    if get_availability(item_id):\n\
    \        return [item_id]\n    return None\n```\n\nNotice that this recommender\
    \ may return either a specific `item_id` or `None`. Also observe that this recommender\
    \ takes no arguments, and `MAX_ITEM_INDEX` is referencing a variable out of scope.\
    \ Software principles ignored, let's think about the three components:\n\n*Collector*\n\
    A random `item_id` is generated. The TR collects by checking the availability\
    \ of `item_id`. We could argue that having access to `item_id` is also part of\
    \ the collector's responsibility. Conditional upon the availability, the collection\
    \ of recommendable things is either `[item_id]` or `None` (*recall that `None`\
    \ is a collection in the set-theoretic sense*).\n\n*Ranker*\nThe TR ranks with\
    \ a no-op; i.e., the ranking of 1 or 0 objects in a collection is the identity\
    \ function on that collection, so we merely do nothing and move on to the next\
    \ step.\n\n*Server*\nThe TR serves recommendations by its `return` statements.\
    \ The only schema that's been specified in this example is that the return type\
    \ is `Optional[List[str]]`."
  mdcn: "布莱恩希望感谢他在Stitch Fix的同事们，他在那里学到了本书的许多关键思想——特别是，伊恩·霍恩在迁移学习方面的耐心指导，莫莉·戴维斯博士在实验和效果估计方面的指导，马克·韦斯在理解可用性与推荐之间关系方面的深度合作，礼萨·索拉比博士对Transformer模型的介绍，陈曦博士对图神经网络用于推荐的鼓励，以及利兰·麦金尼斯博士在降维和近似最近邻方面的细致建议。布莱恩从与娜塔莉亚·加迪奥尔博士、丹尼尔·弗莱施曼博士、安德鲁·霍博士、刘杰森、丹·马萨勒博士、克里斯·穆迪博士、奥兹·拉扎、安娜·施奈德博士、乌杰瓦尔·萨林、阿格涅什卡·谢法尔、丹尼尔·塔塞博士、唐迪阳、扎克·温斯顿以及其他他几乎肯定已经忘记的人的交谈中获益良多。除了他了不起的Stitch\
    \ Fix同事，他特别要感谢埃里克·邦奇博士、李格尔博士、威尔·切尔诺夫博士、利奥·罗森伯格和贾努·维尔马多年来的合作。布莱恩·阿马迪奥博士作为一位优秀的同事，最初建议他写这本书。埃文·奥尔德里奇博士鼓励他真正尝试。尤金·严和卡尔·希格利——他从未见过他们，但深受其启发。他要感谢林忠柱博士和亚历山大·罗森伯格博士，他们对他的职业生涯都产生了深远的影响。奇安娜·萨尔瓦托拉协助了早期的文献综述，瓦伦蒂娜·贝斯普罗兹万尼赫在阅读早期草稿笔记和提供指导方面给予了极大帮助。\n\
    \n两位作者感谢托比亚斯·茨温曼、泰德·邓宁、维基·博伊斯、埃里克·施莱斯、沙凯德·齐克林斯基和威尔·库尔特，他们花费大量时间对书稿给予细致的技术反馈——没有这些反馈，这本书将难以理解。丽贝卡·诺瓦克，她敦促我们签约参与这个项目。还有吉尔·伦纳德，她从手稿中删除了近100处错误的“utilize”一词，并在书稿文本方面提供了大量耐心的合作。\n\
    \n## 第一部分\n\n## 热身\n\n> 我们如何将所有数据放在正确的位置来训练推荐系统，并实现实时推理？\n\n那么，你已经决定投身于推荐系统的世界了！你是否希望在浩瀚的选择海洋中，根据用户独特的偏好推荐恰到好处的东西？如果是这样，你给自己设定了一个相当大的挑战！表面上看，这些系统似乎很简单：如果用户A和用户B有相似的品味，那么A喜欢的东西，B可能也会喜欢。但是，就像所有看似简单的事情一样，其背后有待探索的深度。\n\
    \n我们如何捕捉用户历史的本质并将其输入模型？我们将这个模型存放在哪里，以便它能随时提供推荐？我们如何确保它不会推荐出格或违反业务规则的东西？协同过滤是我们的起点，一盏指路明灯。但其背后还有一个完整的宇宙让这些系统运转起来，我们将一起探索它。\n\
    \n## 第1章\n引言\n\n推荐系统是我们今天所知的互联网发展的核心，也是新兴科技公司的核心功能。除了让网络广度向所有人开放的搜索排名、你所有朋友都在看的新颖有趣的电影，或者公司花大价钱向你展示的最相关广告之外，推荐系统的应用每年都在增加。TikTok令人上瘾的“为你推荐”页面、Spotify的“每周发现”播放列表、Pinterest的图板建议以及苹果的应用商店，都是由推荐系统驱动的热门技术。如今，序列Transformer模型、多模态表示和图神经网络是机器学习（ML）研发中最活跃的领域——所有这些都被应用于推荐系统。\n\
    \n任何技术的普及通常都会引发关于该技术如何工作、为何如此普遍以及我们能否参与其中的问题。对于推荐系统，*如何*工作相当复杂。我们需要理解品味的几何结构，以及用户仅需少量交互如何能在那个抽象空间中为我们提供*GPS信号*。你将看到如何快速收集一组优秀的候选推荐，以及如何将其精炼为一组连贯的推荐。最后，你将学习如何评估你的推荐器、构建提供推理服务的端点，并记录其行为。\n\
    \n我们将制定推荐系统需要解决的核心问题的变体，但最终，驱动性的问题框架如下：\n\n> 给定一组可能被推荐的物品，为当前上下文和用户选择一个有序的、根据某个目标最匹配的子集。\n\
    \n## 推荐系统的关键组件\n\n随着我们增加复杂性和精细度，让我们记住系统的组件。我们将使用*字符串图*来跟踪我们的组件，但在文献中，这些图以多种方式呈现。\n\
    \n我们将识别并基于推荐系统的三个核心组件进行构建：收集器、排序器和服务器。\n\n### 收集器\n\n收集器的角色是了解可能被推荐的物品集合中有什么，以及这些物品的必要特征或属性。请注意，这个集合通常是基于上下文或状态的子集。\n\
    \n### 排序器\n\n排序器的角色是获取收集器提供的集合，并根据上下文和用户的模型，对其部分或全部元素进行排序。\n\n### 服务器\n\n服务器的角色是获取排序器提供的有序子集，确保满足必要的数据模式——包括基本的业务逻辑——并返回请求数量的推荐。\n\
    \n以一个有服务员的酒店场景为例：\n\n> 当你坐在餐桌旁，看着菜单，不确定该点什么。你问服务员：“你觉得我应该点什么甜点？”\n\n服务员查看他们的记录说：“我们的青柠派卖完了，但人们真的很喜欢我们的香蕉奶油派。如果你喜欢石榴，我们会用新鲜石榴制作石榴冰淇淋；而且点甜甜圈配冰淇淋通常不会错——这是我们最受欢迎的甜点。”\n\
    \n在这段简短的交流中，服务员首先充当收集器：识别菜单上的甜点，考虑当前的库存状况，并通过查看记录准备谈论甜点的特点。\n\n接下来，服务员充当排序器；他们提到了受欢迎度高的物品（香蕉奶油派和甜甜圈配冰淇淋），以及基于顾客特征的高匹配度物品（如果他们喜欢石榴）。\n\
    \n最后，服务员口头提供推荐，包括他们算法的解释性特征和多种选择。\n\n虽然这看起来有点卡通化，但请记住将推荐系统的讨论基于现实世界的应用。在推荐系统领域工作的一个优势是，灵感总是近在咫尺。\n\
    \n## 最简单的推荐器\n\n我们已经建立了推荐器的组件，但要使其真正实用，我们需要看到它的实际运作。虽然本书的大部分内容致力于实用的推荐系统，但首先我们将从一个玩具模型开始，并以此为基础构建。\n\
    \n### 平凡推荐器\n\n最简单的推荐器并不十分有趣，但仍然可以在框架中演示。它被称为*平凡推荐器*（TR），因为它几乎不包含任何逻辑：\n\n```\n\
    def get_trivial_recs() -> Optional[List[str]]:\n    item_id = random.randint(0,\
    \ MAX_ITEM_INDEX)\n\n    if get_availability(item_id):\n        return [item_id]\n\
    \    return None\n```\n\n请注意，这个推荐器可能返回一个特定的`item_id`或`None`。还要观察这个推荐器不接受任何参数，并且`MAX_ITEM_INDEX`引用了一个作用域外的变量。忽略软件原则，让我们思考一下三个组件：\n\
    \n*收集器*\n生成一个随机的`item_id`。TR通过检查`item_id`的可用性来进行收集。我们可以说，访问`item_id`也是收集器职责的一部分。根据可用性，可推荐的物品集合要么是`[item_id]`，要么是`None`（*回想一下，`None`在集合论意义上也是一个集合*）。\n\
    \n*排序器*\nTR使用空操作进行排序；也就是说，对集合中1个或0个对象的排序是该集合上的恒等函数，所以我们只需不做任何操作，然后进入下一步。\n\n*服务器*\n\
    TR通过其`return`语句提供推荐。本示例中唯一指定的模式是返回类型为`Optional[List[str]]`。"

    a variety of options are available for framing similarity. Furthermore, sometimes
    we even formulate similarity measures where the associated distance measure does
    not establish a metric on the set of objects. These so-called pseudospaces can
    still be incredibly important, and we’ll show where they come up in Chapter 10.


    In the literature, you’ll find that papers commonly start by introducing a new
    similarity measure and then training a model you’ve seen before on that new measure.
    As you’ll see, the way you choose to relate objects (users, items, features, etc.)
    can have a large effect on what your algorithms learn.



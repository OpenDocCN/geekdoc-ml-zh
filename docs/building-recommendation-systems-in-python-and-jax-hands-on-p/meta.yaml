    \ indices,\n    'values': values,\n    'shape': [user_dim, items_dim]\n}\n```\n\
    \n# 通过共现计算点互信息\n\n早期的文章推荐系统使用了*点互信息*，即 PMI，它与共现密切相关。在自然语言处理的背景下，PMI 试图表达共现比随机偶然出现的频率高出多少。根据我们之前所学，你可以将其视为一个归一化的共现模型。计算语言学家经常使用\
    \ PMI 作为词相似性或词义的估计器，这源于分布假设：\n\n> > 你可以通过一个词的伴生词来了解它。\n> ——约翰·R·弗斯，英国语言学家\n\n\
    在推荐排序的背景下，具有非常高 PMI 的物品被认为具有高度有意义的共现。因此，这可以用来估计*互补*物品：如果你与其中一个物品交互过，你应该与另一个物品交互。\n\
    \nPMI 通过以下公式为两个物品 $x_i, x_j$ 计算：\n\n$$\\frac{p(x_i, x_j)}{p(x_i) * p(x_j)} = \\\
    frac{(C_{ij})_{x_i, x_j} * \\#(\\text{total interactions})}{\\#(x_i) * \\#(x_j)}$$\n\
    \nPMI 计算允许我们将所有关于共现的工作修改为更归一化的计算，因此更有意义。这个过程与我们在第 142 页“GloVE 模型定义”中学到的 GloVE\
    \ 模型相关。负 PMI 值让我们了解两个事物不经常同时出现的情况。\n\n这些 PMI 计算可用于在添加一个物品后推荐*购物车中的另一个物品*，当你发现那些具有非常高\
    \ PMI 的物品时。它可以用作检索方法，通过查看用户已经交互过的物品集，并找到与其中多个物品具有高 PMI 的物品。\n\n让我们看看如何将共现转化为其他相似性度量。\n\
    \n![](img/da17d05291861831978609329c481581_182_0.png)\n\n# PMI 是距离度量吗？\n\n此时一个值得考虑的好问题是“两个对象之间的\
    \ PMI 是距离的度量吗？我可以直接将相似性定义为两个物品之间的 PMI，从而产生一个考虑距离的便捷几何结构吗？”答案是否定的。回想一下，距离函数的公理之一是三角不等式；一个有用的练习是思考为什么三角不等式对\
    \ PMI 不成立。\n\n但并非全无希望。在下一节中，我们将向你展示如何从共现结构中制定一些重要的相似性度量。此外，在下一章中，我们将讨论 Wasserstein\
    \ 距离，它允许你直接将共现计数转化为距离度量。关键区别在于同时考虑所有其他物品的共现计数作为一个分布。\n\n# 基于共现的相似性\n\n早些时候，我们讨论了相似性度量以及它们如何来自皮尔逊相关系数。皮尔逊相关系数是当我们有明确评分时相似性的一个特例，所以让我们看看没有评分的情况。\n\
    \n考虑与用户关联的关联集 $\\{y_u\\}_{u \\in U}$，我们定义三个距离度量：\n\n*Jaccard 相似性，$Jac(-)$*\n两个用户共享物品与这些用户交互过的总物品的比率\n\

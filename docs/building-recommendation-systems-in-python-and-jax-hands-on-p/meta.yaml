    \    }))\nrecord_bytes = record.SerializeToString()\nfile_writer.write(record_bytes)\n\
    \nfilename = os.path.join(_OUTPUT_PATH.value, \"all_tracks.json\")\nwith open(filename,\
    \ \"w\") as f:\n    json.dump(raw_tracks, f)\n\nif __name__ == \"__main__\":\n\
    \    app.run(main)\n```\n\n这段代码读取原始播放列表 JSON 文件，将 URI 从文本标识符转换为字典中的索引，并过滤掉低于最小大小的播放列表。此外，我们将播放列表进行划分，使得前五个元素被分组为*上下文*，即我们为其推荐项目的用户，而后续项目则是我们希望为给定用户预测的项目。我们称前五个元素为*上下文*，因为它们代表一个播放列表，并且如果一个用户有多个播放列表，播放列表和用户之间不会存在一对一的映射关系。然后，我们将每个播放列表作为\
    \ TensorFlow 示例写入 TensorFlow 记录文件，以供 TensorFlow 数据输入管道使用。记录将始终包含五个用于上下文的曲目、专辑和艺术家，以及至少五个用于学习预测下一个曲目推理任务的后续曲目。\n\
    \n> 我们在这里使用 TensorFlow 对象是因为它们与 JAX 兼容，并且可以引入一些非常方便的数据格式。\n\n我们还存储了具有所有特征的唯一曲目行，这主要是为了调试和显示，以便在需要将\
    \ `track_uri` 转换为人类可读形式时使用。此曲目数据存储在 `all_tracks.json` 中。\n\n## 读取输入\n\n然后通过 `input_pipeline.py`\
    \ 读取输入：\n\n```\nimport glob\nimport json\nimport os\nfrom typing import Sequence,\
    \ Tuple, Set\n\nimport tensorflow as tf\nimport jax.numpy as jnp\n\n_schema =\
    \ {\n    \"track_context\": tf.io.FixedLenFeature([5], dtype=tf.int64),\n    \"\
    album_context\": tf.io.FixedLenFeature([5], dtype=tf.int64),\n    \"artist_context\"\
    : tf.io.FixedLenFeature([5], dtype=tf.int64),\n    \"next_track\": tf.io.VarLenFeature(dtype=tf.int64),\n\
    \    \"next_album\": tf.io.VarLenFeature(dtype=tf.int64),\n    \"next_artist\"\
    : tf.io.VarLenFeature(dtype=tf.int64),\n}\n\ndef _decode_fn(record_bytes):\n \
    \   result = tf.io.parse_single_example(record_bytes, _schema)\n    for key in\
    \ _schema.keys():\n        if key.startswith(\"next\"):\n            result[key]\
    \ = tf.sparse.to_dense(result[key])\n    return result\n\ndef create_dataset(\n\
    \    pattern: str):\n    \"\"\"Creates a spotify dataset.\n    Args:\n       \
    \ pattern: glob pattern of tfrecords.\n    \"\"\"\n    filenames = glob.glob(pattern)\n\
    \    ds = tf.data.TFRecordDataset(filenames)\n    ds = ds.map(_decode_fn)\n  \
    \  return ds\n```\n\n我们使用 TensorFlow 数据的功能来读取和解码 TensorFlow 记录和示例。为此，我们需要提供一个模式（或字典），告诉解码器预期的特征名称和类型。由于我们为上下文选择了五个曲目，我们应该预期\
    \ `track_context`、`album_context` 和 `artist_context` 各有五个。然而，由于播放列表本身的长度是可变的，我们告诉解码器预期\
    \ `next_track`、`next_album` 和 `next_artist` 特征是可变长度的整数。\n\n`input_pipeline.py`\
    \ 的第二部分是用于可重用的输入代码，以加载字典和曲目元数据：\n\n```\ndef load_dict(dictionary_path: str, name:\
    \ str):\n    \"\"\"Loads a dictionary.\"\"\"\n    filename = os.path.join(dictionary_path,\
    \ name)\n    with open(filename, \"r\") as f:\n        return json.load(f)\n\n\
    def load_all_tracks(all_tracks_file: str,\n                    track_uri_dict,\
    \ album_uri_dict, artist_uri_dict):\n    \"\"\"Loads all tracks.\"\"\"\n    with\
    \ open(all_tracks_file, \"r\") as f:\n        all_tracks_json = json.load(f)\n\
    \    all_tracks_dict = {\n        int(k): v for k, v in all_tracks_json.items()\n\
    \    }\n    all_tracks_features = {\n        k: (track_uri_dict[v[\"track_uri\"\
    ]],\n            album_uri_dict[v[\"album_uri\"]],\n            artist_uri_dict[v[\"\
    artist_uri\"]])\n        for k,v in all_tracks_dict.items()\n    }\n    return\
    \ all_tracks_dict, all_tracks_features\n\ndef make_all_tracks_numpy(all_tracks_features):\n\
    \    \"\"\"Makes the entire corpus available for scoring.\"\"\"\n    all_tracks\
    \ = []\n    all_albums = []\n    all_artists = []\n    items = sorted(all_tracks_features.items())\n\
    \    for row in items:\n        k, v = row\n        all_tracks.append(v[0])\n\
    \        all_albums.append(v[1])\n        all_artists.append(v[2])\n    all_tracks\
    \ = jnp.array(all_tracks, dtype=jnp.int32)\n    all_albums = jnp.array(all_albums,\

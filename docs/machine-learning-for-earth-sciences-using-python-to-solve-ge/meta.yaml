    ## 12.5 如何训练前馈网络


    表 12.2 PyTorch 中的优化算法：https://bit.ly/pytorch-optim


    | 优化算法 | 描述 |

    | --- | --- |

    | Adadelta | 实现 Adadelta 算法 |

    | Adagrad | 实现 Adagrad 算法 |

    | Adam | 实现 Adam 算法 |

    | AdamW | 实现 AdamW 算法 |

    | SparseAdam | 实现适用于稀疏张量的 Adam 算法的惰性版本 |

    | Adamax | 实现 Adamax 算法（基于无穷范数的 Adam 变体） |

    | ASGD | 实现平均随机梯度下降 |

    | LBFGS | 实现 L-BFGS 算法，深受 minFunc 启发 |

    | NAdam | 实现 NAdam 算法 |

    | RAdam | 实现 RAdam 算法 |

    | RMSprop | 实现 RMSprop 算法 |

    | Rprop | 实现弹性反向传播算法 |

    | SGD | 实现随机梯度下降（可选带动量） |


    引擎 *torch.autograd* 是 PyTorch 的自动微分引擎。它定义了一个有向无环图，其叶子节点是输入张量，根节点是输出张量。通过这种方式，它利用链式法则计算梯度。


    ### 12.5.4 优化


    一旦定义，torch 的 optim 子模块（即 *torch.optim*）存储了优化算法（表 12.2）。


    ### 12.5.5 网络架构


    本节简要概述一些流行的神经网络架构。


    ### 多层感知机


    多层感知机是图 12.2 所示的神经网络结构。它由感知机（即人工神经元）的全连接层组成。选择最优的隐藏层数量并不总是直接明了的，通常由背景知识和实验驱动（Hastie
    等人，2017）。隐藏单元太少，模型可能没有足够的灵活性来捕捉数据中的非线性；隐藏单元太多，如果使用适当的正则化，额外的权重可以被收缩至零。”常见应用通常使用
    5-100 个隐藏层（Hastie 等人，2017）。第 7 章描述的大多数机器学习模型（例如支持向量机或逻辑回归）都可以通过仅包含一两层的多层感知机来模拟（Aggarwal，2018）。


    ### 径向基函数网络


    径向基函数网络由浅层（即仅两层）神经网络组成，其中第一层和第二层分别是无监督和监督的（Aggarwal，2018）。径向基函数网络基于 Cover 关于模式可分性的定理（Cover，1965），该定理指出，当模式分类问题通过非线性变换映射到高维空间时，更有可能线性可分。径向基函数网络背后的思想接近于最近邻分类器，但在第二层增加了监督步骤（Aggarwal，2018）。此外，它们类似于使用径向基函数作为核训练的支持向量机。然而，径向基函数网络比核支持向量机更通用（Aggarwal，2018）。


    ### 受限玻尔兹曼机


    受限玻尔兹曼机（RBM）是一种依赖于能量最小化的无监督神经网络架构（Fischer & Igel，2012）。尽管 RBM 在 20 世纪 80 年代就被提出（Aggarwal，2018），但计算能力的提升和新的学习策略的发展使得
    RBM 近年来更具吸引力（Fischer & Igel，2012）。RBM 对于创建生成模型很有用（Fischer & Igel，2012），并且与概率图模型密切相关（Koller
    & Friedman，2009）。此外，RBM 已被提议作为所谓“深度信念网络”的构建模块（Hinton 等人，2006）。训练 RBM 与训练前馈网络有很大不同，因为它不能使用反向传播（Fischer
    & Igel，2012）。相反，RBM 依赖于蒙特卡洛采样进行训练（Fischer & Igel，2012）。


    ### 循环神经网络


    循环神经网络（RNN）旨在研究序列数据，如文本句子、时间序列和其他离散序列（Abraham 和 Tyagi，2022）。关于 RNN 的一个重要点是，它们考虑了后续输入对先前输入的潜在依赖性，这使得它们非常适合时间序列预测或语音识别等任务（Kumar
    & Abraham，2022；Aggarwal，2018）。RNN 使用一种称为“时间反向传播”的特定反向传播算法（Aggarwal，2018），该算法在学习过程中考虑了输入的序列性质。RNN
    的一个缺点是其复杂的优化和训练过程，使得它们难以掌握，尤其是对新手而言（Kumar & Abraham，2022；Aggarwal，2018）。循环神经网络架构的专门变体也被提出以解决特定问题，例如使用长短期记忆网络处理长期依赖性（Hochreiter
    & Schmidhuber，1997）。


    ### 卷积神经网络


    卷积神经网络（CNN）是受生物学启发的网络，应用于视频和语音识别、推荐系统、图像分类和分割、自然语言处理以及时间序列预测（参见，例如，Yamashita 等人，2018）。CNN
    模仿动物的视觉皮层功能（Fukushima，1980），旨在“通过使用多个构建模块（如卷积层、池化层和全连接层），利用反向传播自动且自适应地学习特征的空间层次结构”（Fukushima，1980）。


    CNN 非常适合处理网格状数据，如 RGB 图像或频谱图，它使用三种主要类型的层：卷积层、池化层和全连接层（Fukushima，1980）。前两种层类型提取特征，第三层将提取的特征映射到最终输出。


    卷积层在 CNN 中起着基础性作用（Yamashita 等人，2018）。它们通常由三个组件组成：输入数据、滤波器（或核）和特征图（Yamashita 等人，2018）。为了更好地理解，请考虑图
    12.7 所示的示例，其中输入和核分别是 6 × 6 和 3 × 3 的数组。输出是一个 4 × 4 的数组，称为“特征图”、“激活图”或“卷积特征”，它源于将滤波器（即点积）系统地应用于输入的不同部分。每次卷积后，CNN
    对输出应用一个激活函数，如修正线性单元（ReLU），然后进入下一层（Yamashita 等人，2018）。


    池化层降低维度（或下采样），从而减少输入中的参数数量。它们通常由一个应用聚合函数（如最大池化或平均池化）的滤波器组成（Fukushima，1980）。最大池化选择滤波器输出最大的像素并将其发送到输出数组。类似地，平均池化计算滤波器内的平均值并将其发送到输出数组。如果你抱怨池化层丢失了大量信息，你是对的。然而，池化层降低了模型的复杂性，提高了其效率，并限制了过拟合的风险（Fukushima，1980）。最后，全连接层模仿多层感知机。例如，CNN
    广泛应用于语义图像分割（参见，例如，Badrinarayanan 等人，2017；Long 等人，2015；Milletari 等人，2016）。语义图像分割包括识别图像中被特定主体（如人）占据的区域（即像素），如图
    12.8 所示。'

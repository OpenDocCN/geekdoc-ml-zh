- md: '## 2.4 Working with Your Remote Instance


    Table 2.1 Basic Linux commands


    | Command | Description |

    | :--- | :--- |

    | ls | View the contents of a directory |

    | cd.. | Move one directory up |

    | cd folder_name | Go to the folder named folder_name |

    | cp myfile.jpg /new_folder | Copy myfile.jpg to the new_folder path |

    | mv | Use mv to move files, the syntax is similar to cp |

    | mkdir my_folder | Create a new folder named my_folder |

    | rm | Delete directories and the contents within them (take care with rm!) |

    | tar | Archive multiple files into a compressed file |

    | chmod | Change the read, write, and execute permissions of files and directories
    |

    | top | Display a list of running processes, CPU usage, and memory usage |

    | pwd | Print the current working directory (i.e., the directory in which you
    are working) |

    | sudo | It is the abbreviation of “SuperUser Do.” It enables you to run tasks
    requiring administrative permissions. Take great care with sudo! |


    This command copies the file named “filename” from the local machine to the folder
    /home/user/ of the remote instance host. As explained in Sect. 2.3, the aws.pem
    private key stores the credentials to securely login to the host instance. To
    copy a file from your remote instance to the local machine use


    ```

    $ scp -i local_path/aws.pem user@host:/home/user/filename /localfolder/filename

    ```


    Finally, to launch a Python script we use the python command:


    ```

    $ python myfile.py

    ```


    To run multiple Python files you could use a bash script, which is a text file
    named my_bash_script.sh, and then run it as follows:


    ```

    $ bash my_bash_script.sh

    ```


    Here are two examples:


    ```

    #!/bin/bash

    /home/path_to_script/script1.py

    /home/path_to_script/script2.py

    /home/path_to_script/script3.py

    /home/path_to_script/script4.py

    ```


    and


    ```

    #!/bin/bash

    /home/path_to_script/script1.py &

    /home/path_to_script/script2.py &

    /home/path_to_script/script3.py &

    /home/path_to_script/script4.py &

    ```


    to run them sequentially and in parallel, respectively.


    Note that the Anaconda Individual Edition comes with scikit-learn as a default
    package. DL packages such as Tensorflow and PyTorch must be installed separately.
    To avoid conflicts, I suggest creating isolated Python environments to work separately
    with PyTorch and TensorFlow.


    ## 2.5 Preparing Isolated Deep Learning Environments


    Conda is an open-source package-management system and environment-management system
    developed by Anaconda[^14] and that serves to install and update Python packages
    and dependencies. It also serves to manage isolated Python environments to avoid
    conflicts. As an example, consider the following statement:


    ```

    conda create --name env_ml python=3.9 spyder scikit-learn

    ```


    This statement creates a new Python 3.9 environment named env_ml with spyder,
    scikit-learn, and related dependencies installed. To activate the env_ml environment:


    ```

    conda activate env_ml

    ```


    to deactivate the current environment, use


    ```

    conda deactivate

    ```


    To list the available environments, use


    ```

    conda info --envs

    ```


    In the resulting list, the active environment is highlighted by *. Also, the active
    environment is usually given at the beginning of the command prompt [e.g., (base)]:


    ```

    (base) admin@ip-172-31-59-186:~$

    ```


    To remove an environment, use


    ```

    conda remove --name env_ml --all

    ```


    The following statement


    ```

    conda env export > env_ml.yml

    ```


    [^14] https://www.anaconda.com/.


    exports all information about the active environment to a file named env_ml.yml,
    which can then be used to share the environment to allow others to install it
    by using the following command:


    ```

    conda env create -f env_ml.yml

    ```


    More details on environment management are available in the conda official documentation.15
    The following listing resumes all the steps involved in creating a ML environment
    with DL functionalities based on PyTorch:


    ```

    $ conda create --name env_pt python=3.9 spyder scikit-learn

    $ conda activate env_pt

    (env_pt)$ conda install pytorch torchvision torchaudio -c pytorch

    ```


    The last command installs PyTorch, working on the CPU only, on my Mac. To find
    the right command for your hardware and operating system, please refer to the
    PyTorch website.16


    Similarly, to create a ML environment based on scikit-learn with Tensorflow DL
    functionalities, use the following command:


    ```

    $ conda create --name env_tf --channel=conda-forge tensorflow

    ```


    As you can see, I used a specific channel (i.e., conda-forge17) to download tensorflow
    and spyder. Listing my conda environment now gives


    ```

    $ conda info --envs

    Output:

    # conda environments:

    #

    base                     * /opt/anaconda3

    env_ml                     /opt/anaconda3/envs/env_ml

    env_pt                     /opt/anaconda3/envs/env_pt

    env_tf                     /opt/anaconda3/envs/env_tf

    ```


    ## 2.6 Cloud-Based Machine Learning Environments


    With cloud-based ML environments, I refer to Jupyter Notebook-based services,
    which are hosted in the cloud. Examples are Google™ Colaboratory, Kaggle, and
    Saturn Cloud. The first two services, Google™ Colaboratory and Kaggle, are both
    managed by Google™ and offer a free plan with limited computational resources.
    Finally, Saturn Cloud offers a free plan with 30 hours of computation. All services
    allow the online use of Jupyter Notebooks.


    15 https://docs.conda.io/.

    16 https://pytorch.org/get-started/locally/.

    17 https://conda-forge.org.


    ![](img/90d3084aebf7ededff86e49f84c52faa_36_0.png)


    Fig. 2.9 Google™ Colaboratory (April, 2023)


    Figures 2.9 and 2.10 provide a quick look at the entry-level notebooks for Google™
    Colaboratory and Kaggle, respectively. Also, Figs. 2.9 and 2.10 show that both
    Google™ Colaboratory and Kaggle all come with scikit-learn, Tensorflow, and PyTorch
    installed and ready to use. Using Saturn Cloud™, a new Python Server can be launched
    by clicking the “New Python Server” server button (see Fig. 2.11), which opens
    a new window where you can personalize the instance. Note that the default configuration
    does not include either PyTorch or Tensorflow, although they can be added quickly
    in the “Extra Packages” section (Fig. 2.12). As an example, Fig. 2.12 shows how
    to add PyTorch. Finally, Fig. 2.13 demonstrates that the resulting environment
    comes with both scikit-learn and PyTorch.


    Although all the reported cloud-based ML Jupyter environments are robust and flexible
    solutions, I suggest using Google™ Colaboratory or Saturn Cloud™ for novices.


    ![](img/90d3084aebf7ededff86e49f84c52faa_37_0.png)


    Fig. 2.10 Kaggle (April, 2023)


    ![](img/90d3084aebf7ededff86e49f84c52faa_37_1.png)


    Fig. 2.11 Saturn Cloud™ (April, 2023)


    ## 2 Setting Up Your Python Environments for Machine Learning


    ![](img/90d3084aebf7ededff86e49f84c52faa_38_0.png)


    ![](img/90d3084aebf7ededff86e49f84c52faa_38_1.png)


    ## 2.7 Speed Up Your ML Python Environment


    A common argument by Python detractors is that Python is slow when compared with
    other established programming languages such as C or FORTRAN. We all agree with
    this argument but, in my opinion, this is not the point. In scientific computations,
    Python relies on libraries developed in higher-performing languages, mainly C
    and C++, and on parallel computing platforms such as CUDA.¹⁸ For example, NumPy,
    the core Python library for scientific computing, is based on an optimized C code.¹⁹
    For ML purposes, all scikit-learn, PyTorch, and Tensorflow provide a base version
    of the library that can be safely installed in any local machine for rapid prototyping
    and small- to mid-scale problems. In addition, optimized versions for intensive
    computing applications are also available. For example, the Intel™ extension for
    scikit-learn accelerates ML applications in Python for Intel-based hardware by
    a factor 10–100×.²⁰ The Intel™ extension for scikit-learn is easily installed
    by using *conda*. To prevent conflicts, I strongly recommend creating a new conda
    environment such as *env_ml_intel*:


    ```

    $ conda create -n env_ml_intel -c conda-forge python=3.9 scikit-learn-intelex
    scikit-learn rasterio matplotlib pandas spyder scikit-image seaborn

    ```


    Listing my local environments now gives


    ```

    $ conda info --envs

    Output:

    # conda environments:

    #

    base                     *  /opt/anaconda3

    env_ml                      /opt/anaconda3/envs/env_ml

    env_pt                      /opt/anaconda3/envs/env_pt

    env_tf                      /opt/anaconda3/envs/env_tf

    env_ml_intel                /opt/anaconda3/envs/env_ml_intel

    ```


    I left the *base* environment untouched. Then I created two general-purpose ML
    environments, *env_ml* and *env_ml_intel*, with the latter optimized by Intel.
    Finally, I created two DL environments *env_pt* and *env_tf*, which are based
    on PyTorch and Tensorflow, respectively.


    Note that DL libraries such as PyTorch and Tensorflow are highly optimized to
    support GPU computing (e.g., CUDA²¹ and ROCm²²). For example, a Pytorch CUDA-optimized
    version for the Linux OS can be easily installed by conda as follows (April, 2023):


    ¹⁸ https://developer.nvidia.com/cuda-zone.

    ¹⁹ https://numpy.org.

    ²⁰ https://github.com/intel/scikit-learn-intelex.

    ²¹ https://developer.nvidia.com/cuda-zone.

    ²² https://rocmdocs.amd.com/en/latest/.'

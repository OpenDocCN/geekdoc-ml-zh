    ## 第2章

    为机器学习设置你的Python环境


    ### 2.1 用于机器学习的Python模块


    在Python中开发机器学习模型既使用通用科学库（例如，NumPy、SciPy和pandas），也使用专用模块（例如，scikit-learn、¹ PyTorch、²
    和 TensorFlow³）。


    **Scikit-Learn** Scikit-learn是一个解决中小规模机器学习问题的Python模块（Pedregosa et al., 2011）。它实现了广泛的最先进机器学习算法，使其成为开始学习机器学习的最佳选择之一（Pedregosa
    et al., 2011）。


    **PyTorch** PyTorch是一个Python包，它结合了用于张量管理、神经网络开发、自动微分计算和反向传播的高级功能（Paszke et al.,
    2019）。PyTorch库在Meta的AI⁴（前身为Facebook AI）研究团队内发展。此外，它受益于一个强大的生态系统和一个支持其发展的庞大用户社区（Papa,
    2021）。


    **TensorFlow** TensorFlow始于Google，并于2015年开源。它结合了工具、库和社区资源，用于在Python中开发和部署深度学习模型（Bharath
    & Reza Bosagh, 2018）。


    ¹ https://scikit-learn.org.

    ² https://pytorch.org.

    ³ https://www.tensorflow.org.

    ⁴ https://ai.facebook.com.


    © 作者，根据Springer Nature Switzerland AG 2023的独家许可

    M. Petrelli, *地球科学机器学习*, Springer地球科学、地理与环境教科书,

    https://doi.org/10.1007/978-3-031-35114-3_2


    ### 2.2 用于机器学习的本地Python环境


    Anaconda Python发行版的个人版<sup>5</sup>提供了一个“开箱即用”的科学Python环境示例，用于使用scikit-learn模块执行基本的机器学习任务。它还允许执行高级任务，例如安装专门为深度学习开发的库（例如，PyTorch和TensorFlow）。要安装Anaconda
    Python发行版的个人版，我建议遵循官方文档中给出的指导<sup>6</sup>。


    首先，下载并运行适用于你的操作系统（即，Windows、Mac或Linux）的最新稳定安装程序。对于Windows或Mac用户，也提供图形安装程序。使用图形安装程序的安装过程与任何其他软件应用程序相同。Anaconda安装程序会自动安装Python核心和Anaconda
    Navigator，以及大约250个定义了用于科学可视化、分析和建模的完整环境的包。超过7500个额外的包，包括PyTorch和TensorFlow，可以根据需要从Anaconda仓库使用“conda”<sup>7</sup>包管理系统单独安装。开始学习和开发中小规模机器学习项目的基本工具与用于任何Python科学项目的工具相同。因此，我建议使用Spyder和JupyterLab。


    Spyder<sup>8</sup>是一个集成开发环境，它结合了用于编写代码的文本编辑器、用于调试的检查工具以及用于执行代码的交互式Python控制台（图2.1）。


    JupyterLab<sup>9</sup>是一个基于Web的开发环境，用于管理Jupyter Notebooks（即，用于创建和共享计算文档的Web应用程序，见图2.2）。


    ### 2.3 远程Linux机器上的机器学习Python环境


    访问和使用远程计算基础设施对于大规模和数据密集型的机器学习工作流是强制性的。然而，本书的范围不包括详细描述如何开发高性能计算基础设施。只需说明，此类基础设施通常构成一个Linux实例集群（即，基于Linux操作系统的虚拟计算环境），因此我们仅限于描述如何连接和使用远程Linux实例。本节展示了如何'

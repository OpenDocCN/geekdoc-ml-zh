    # 5.4.2 Compositional Data Analysis (CoDA)


    The study of a geochemical data set falls in the field of Compositional Data Analysis
    (CoDA). In this context, oxides are expressed as a percentage, so their nominal
    sum is 100%, which defines a “closed” or “compositional” data set (Aitchison,
    1982, 1984; Aitchison & Egozcue, 2005). Conducting statistical analysis directly
    on closed data sets can lead to problems (Aitchison, 1982, 1984; Aitchison & Egozcue,
    2005) because some statistical approaches require that the data be normally distributed
    and not constrained to a constant total value (Boschetti et al., 2022).


    ```


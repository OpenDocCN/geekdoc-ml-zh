    \n如果数据集开始完全填满你的RAM，Dask⁵可能是管理数据并将Python代码扩展到并行环境的首选库。Dask是一个旨在通过Python中的并行计算处理“大数据”的库。Dask将*DataFrames*的概念扩展到Dask\
    \ DataFrames，这是由许多较小的pandas *DataFrames*组成的大型并行*DataFrames*。我们将在本书第四部分介绍Dask和并行计算。在此之前，我们必须使用pandas导入地球科学机器学习应用的数据集（见代码清单3.1）。所研究的数据集可从华盛顿大学圣路易斯分校物理系空间科学实验室的网站⁶下载。它涉及从陨石中提取的太阳前SiC颗粒（Stephan\

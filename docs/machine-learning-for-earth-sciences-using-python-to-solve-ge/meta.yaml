    \nax.set_xlabel(r'$log_{10}[^{12}C/^{13}C]$')\nax.set_ylabel(r'$log_{10}[^{14}N/^{15}N]$')\n\
    fig.tight_layout()\n```\n\nListing 3.11 Application of the GaussianMixture() algorithm\
    \ to SiC data\n\n## 3.4 Training a Model\n\nFigure 3.5 shows a cheat sheet that\
    \ guides us in selecting a model for the scikit-learn library.⁹\n\nScikit-learn\
    \ works in the fields of both unsupervised learning (i.e., clustering and dimensionality\
    \ reduction) and supervised learning (i.e., regression and classification). In\
    \ supervised learning, examples of classification algorithms are the support vector\
    \ classifier (see Sect. 7.9) and the K-nearest neighbors (see Sect. 7.10). In\

  md: '# Preface


    *Machine Learning for the Earth Sciences* provides Earth Scientists with a progressive
    partway from zero to machine learning, with examples in Python aimed at the solution
    of geological problems. This book is devoted to Earth Scientists, at any level,
    from students to academics and professionals who would like to be introduced to
    machine learning. Basic knowledge of Python programming is necessary to fully
    benefit from this book. If you are a complete novice to Python, I suggest you
    start with Python introductory books such as *Introduction to Python in Earth
    Science Data Analysis*.[^1] *Machine Learning for the Earth Sciences* is divided
    into five parts and attempts to be geologist-friendly. Machine learning mathematics
    is gently provided and technical parts are limited to the essentials. Part I introduces
    the basics of machine learning with a geologist-friendly language. It starts by
    introducing definitions, terminology, and fundamental concepts (e.g., the types
    of learning paradigms). It then shows how to set up a Python environment for machine
    learning applications and finally describes the typical machine learning workflow.
    Parts II and III are about unsupervised and supervised learning, respectively.
    They start by describing some widely used algorithms and then provide examples
    of applications to Earth Sciences such as the clustering and dimensionality reduction
    in petro-volcanological applications, the clustering of multi-spectral data, classification
    of well-log data facies, and machine learning regression in petrology. Part IV
    deals with the scaling of machine learning models. When your PC starts suffering
    from the dimension of the data set or the complexity of the model, you need scaling!
    Finally, Part V introduces deep learning. It starts by describing the PyTorch
    library and provides an example application for Earth Sciences. If you are working
    in Earth Science and would like to start exploiting the power of machine learning
    in your projects, this is the right place for you.


    Assisi, Italy

    28 July, 2023


    Maurizio Petrelli


    [^1]: https://bit.ly/python-mp.'

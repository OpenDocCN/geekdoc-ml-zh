    分别用于顺序运行和并行运行它们。


    请注意，Anaconda 个人版默认包含 scikit-learn。Tensorflow 和 PyTorch 等深度学习包必须单独安装。为避免冲突，我建议创建隔离的
    Python 环境，以便分别使用 PyTorch 和 TensorFlow。


    ## 2.5 准备隔离的深度学习环境


    Conda 是由 Anaconda[^14] 开发的开源包管理系统和环境管理系统，用于安装和更新 Python 包及依赖项。它还用于管理隔离的 Python
    环境以避免冲突。例如，考虑以下语句：


    ```


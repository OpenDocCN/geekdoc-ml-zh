    # 6.4 Pre-processing and Clustering


    This section presents a simplified workflow to cluster our Sentinel2 data. As
    input features, I used *my_array_1d*, which contains reflectance data from B2,
    B3, B4, and B8. Note that many different strategies are reported in the literature
    for selecting input features, such as using band ratios, specific indexes, or
    combinations of bands, band ratios, and indexes (e.g., Ge et al., 2020). Due to
    the presence of large outliers, I opted for the *RobustScaler()* algorithm (line
    6 of code listings 6.6 and 6.7) in scikit-learn.


    ```

    1 from sklearn.preprocessing import RobustScaler

    2 from sklearn import cluster

    3 import matplotlib.colors as mc

    4 import matplotlib.pyplot as plt

    5

    6 X = RobustScaler().fit_transform(my_array_1d)

    7 my_ml_model = cluster.KMeans(n_clusters=5)

    8 learning = my_ml_model.fit(X)

    9 labels_1d = learning.labels_

    10

    11 labels_1d = my_ml_model.predict(X)

    12 labels_2d = labels_1d.reshape(my_array_2d[:,:,0].shape)

    13

    14 cmap = mc.LinearSegmentedColormap.from_list("", ["black","red","yellow", "green",
    "blue"])

    15 fig, ax = plt.subplots(figsize=[18,18])

    16 ax.imshow(labels_2d, cmap=cmap)

    17 ax.axis(''off'')

    ```


    **Listing 6.6** Implementing *K*-means clustering


    ```

    1 from sklearn.preprocessing import RobustScaler

    2 from sklearn import mixture

    3 import matplotlib.colors as mc

    4 import matplotlib.pyplot as plt

    5

    6 X = RobustScaler().fit_transform(my_array_1d)

    7 my_ml_model = mixture.GaussianMixture(n_components=5,

    8     covariance_type="full")

    9 labels_1d = my_ml_model.predict(X)

    10

    11 labels_2d = labels_1d.reshape(my_array_2d[:,:,0].shape)

    12

    13 cmap = mc.LinearSegmentedColormap.from_list("", ["black","red","yellow", "green","blue"])

    14 fig, ax = plt.subplots(figsize=[18,18])

    15 ax.imshow(labels_2d, cmap=cmap)

    16 ax.axis(''off'')

    ```


    **Listing 6.7** Implementing Gaussian mixture clustering'

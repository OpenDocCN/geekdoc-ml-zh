    \n图6.3显示了从Theia下载的Sentinel2数据仓库的数据结构。该仓库遵循MUSCATE⁹命名法，包含一个元数据文件、一个快速查看文件、多个Geo-Tiff图像文件以及两个子仓库MASKS和DATA，其中包含补充数据。命名使我们能够唯一标识每个产品，它由许多标签组成，以平台标识（即Sentinel2B）开始，后跟格式为YYYYMMDD-HHmmSS-sss的获取日期（例如，20210621-001635-722），其中YYYY是年份，MM是月份，DD是日期，HH是24小时制的小时，mm是分钟，SS是秒，sss是毫秒。后续标签涉及产品级别（例如，L2A）、地理区域（例如，T55HDB_C）和产品版本（例如，V2-2）。字母L、一个数字和另一个字母表征不同的产品级别，但L0级除外，它是压缩的原始数据，后面不跟任何字母。L1A、L1B和L2A级别分别对应未压缩的原始数据、经过辐射校正的辐射数据和经过正射校正的底部大气反射率。¹⁰\
    \ 光谱Geo-Tiff文件还使用了额外的标签，即SRE和FRE，它们分别对应于未校正坡度效应的地表反射率图像和校正了坡度效应的地表反射率图像。我们将处理FRE数据。\n\

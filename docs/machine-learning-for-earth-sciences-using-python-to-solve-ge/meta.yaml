    ## Chapter 5

    Clustering and Dimensionality Reduction

    in Petrology


    ### 5.1 Unveil the Chemical Record of a Volcanic Eruption


    Unsupervised machine learning methods can help us decode the chemical record stored
    in the crystal cargo of a single eruption or multiple volcanic events (Caricchi
    et al., 2020b; Boschetty et al., 2022; Musu et al., 2023). This record often includes
    the major element’s chemical composition (i.e., multivariate compositional data)
    of different crystal phases such as olivine, clinopyroxene, orthopyroxene, amphibole,
    plagioclase, garnet, and quartz (Boschetty et al., 2022; Aitchison & Egozcue,
    2005; Aitchison, 1982, 1984). Each of these phases provides clues to unravel the
    complex dynamics of a volcanic plumbing system (Ubide et al., 2021) and its evolution
    (Costa et al., 2020; Petrelli & Zellmer, 2020).


    During the crystallization process (Fig. 5.1), minerals grow and adapt their textural
    aspect and chemistry to the melt compositions and the thermodynamic conditions
    of the magmatic system (Ubide et al., 2021). For example, concentric chemical
    zones from the core to the rim of a crystal reflect the sequential changes over
    time imposed by the magmatic system (Fig. 5.1). Moderate-to-rapid growths at intermediate-to-high
    degrees of undercooling ($\Delta T = T_{\text{liquidus}} - T_{\text{crystallisation}}$)
    may result in sector zoning in euhedral crystals or skeletal to dendritic textures
    (Fig. 5.1). In addition, diffusive re-equilibration of compositional gradients
    can further modify chemical patterns in crystals (Costa et al., 2020; Petrelli
    & Zellmer, 2020).


    At shallow crustal levels (Fig. 5.1), pre- and syn-eruptive dynamics include a
    complex range of processes, including magma fractionation, recharge, mixing, assimilation,
    and degassing (Ubide et al., 2021). Interrogating the crystal cargo of an eruption
    provides us with the requisite information to unravel the complex dynamics of
    a volcanic plumbing system before and during eruption (Ubide et al., 2021).


    In this chapter, I focus on the data set reported by Musu et al. (2023), which
    consists of clinopyroxene analyses (cpx) erupted by the South-East Crater of Mt.
    Etna during the sequence of lava fountains that occurred between February and
    April of 2021 (Musu et al., 2023).


    Musu et al. (2023) focused on cpx analyses because (1) cpx is typically found
    in mafic to intermediate magmas, (2) cpx crystallizes over a wide range of temperatures
    $T$ and pressures $P$, and (3) cpx chemistry depends on magma composition, water
    content, pressure, and temperature (Musu et al., 2023), which make cpx a robust
    thermobarometer (Putirka, 2008; Petrelli et al., 2020; Jorgenson et al., 2022;
    Higgins et al., 2021) and a fine recorder of the chemical evolution of magmatic
    systems (Ubide & Kamber, 2018; Caricchi et al., 2020b; Boschetty et al., 2022).


    ### 5.2 Geological Setting


    Mt. Etna is in eastern Sicily on the southern tip of the Italian peninsula (Fig.
    5.2) and is the largest active volcano in Europe (Branca & Del Carlo, 2004) and
    one of the most active volcanoes in the world (Cappello et al., 2013; Corsaro
    & Miraglia, 2022).


    The Mt. Etna volcano exhibits different eruptive behaviors, from effusive to explosive,
    including strombolian and violent lava-fountaining occurrences (Branca & Del Carlo,
    2004; Ferlito et al., 2014; Corsaro & Miraglia, 2022). Eruptions come from summit
    craters and fissure vents along its flanks (Musu et al., 2023; Branca & Del Carlo,
    2004; Di Renzo et al., 2019). The summit area consists of four active vents: Voragine
    (VOR), Bocca Nuova (BN), North-East Crater (NEC), and South-East Crater (SEC).
    Of these, the SEC is the youngest and most active vent (Andronico & Corsaro, 2011;
    Di Renzo et al., 2019; Corsaro & Miraglia, 2022).


    A cyclical eruptive sequence started at the SEC on December 13, 2020 and generated
    over 60 paroxysms; in other words, “particularly violent eruptions of the volcano,
    which is the most dangerous and tense stage of this eruptive cycle, at which the
    whole cavity of the crater is opened” (Paffengoltz, 1978).


    ### 5.3 The Investigated Data Set


    The data set contains major-element chemical analyses collected along rim-to-core
    transects on clinopyroxenes with a point spacing of 2 μm (Musu et al., 2023).
    A total of 1250 analyses were acquired (Musu et al., 2023) by using a JEOL 8200
    Superprobe at the University of Geneva and a JEOL JXA-8530F at the University
    of Lausanne (Musu et al., 2023). Clinopyroxene samples belong to lapilli collected
    from the lava-fountain deposits of February 16, 19, and 28 and March 2 and 10,
    2021.



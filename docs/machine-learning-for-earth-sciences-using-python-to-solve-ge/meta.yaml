    # 2.5 Preparing Isolated Deep Learning Environments


    Conda is an open-source package-management system and environment-management system
    developed by Anaconda[^14] and that serves to install and update Python packages
    and dependencies. It also serves to manage isolated Python environments to avoid
    conflicts. As an example, consider the following statement:


    ```

    conda create --name env_ml python=3.9 spyder scikit-learn

    ```


    This statement creates a new Python 3.9 environment named env_ml with spyder,
    scikit-learn, and related dependencies installed. To activate the env_ml environment:


    ```

    conda activate env_ml

    ```


    to deactivate the current environment, use


    ```

    conda deactivate

    ```


    To list the available environments, use


    ```

    conda info --envs

    ```


    In the resulting list, the active environment is highlighted by *. Also, the active
    environment is usually given at the beginning of the command prompt [e.g., (base)]:


    ```

    (base) admin@ip-172-31-59-186:~$

    ```


    To remove an environment, use


    ```

    conda remove --name env_ml --all

    ```


    The following statement


    ```

    conda env export > env_ml.yml

    ```


    [^14] https://www.anaconda.com/.'

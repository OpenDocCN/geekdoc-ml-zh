- img_proc: true
  md: 'Since $P(\text{dark}, \text{ol}) = P(\text{ol}, \text{dark})$, the right-hand
    terms of Eqs. (7.1) and (7.2) must be equal:


    $$P(\text{dark}|\text{ol})P(\text{ol}) = P(\text{ol}|\text{dark})P(\text{dark}).
    \tag{7.3}$$


    Dividing both sides of Eq. (7.3) by $P(\text{ol})$, we get Bayes formula for our
    specific case:


    $$P(\text{dark}|\text{ol}) = \frac{P(\text{ol}|\text{dark})P(\text{dark})}{P(\text{ol})}.
    \tag{7.4}$$


    Generalizing Eq. (7.4), we get the well-known Bayes equation:


    $$P(A|B) = \frac{P(B|A)P(A)}{P(B)}. \tag{7.5}$$


    **Naive Bayes for Classification** To understand the naive Bayes ML algorithm,
    I propose the same workflow as described by Zhang (2004). Assume that you want
    to classify a set $X = (x_1, x_2, x_3, \dots, x_n)$ and that $c$ is the label
    of your class. For simplicity, assume that $c$ is strictly positive (+) or negative
    (-); in other words, we have only two classes. In this case, the Bayes formula
    takes the form


    $$P(c|X) = \frac{P(X|c)P(c)}{P(X)}. \tag{7.6}$$


    $X$ is classified as being in class $c = +$ if and only if


    $$f_b(X) = \frac{P(c = +|X)}{P(c = -|X)} \geq 1, \tag{7.7}$$


    where $f_b(X)$ is the Bayesian classifier.


    Now assume that all the features are independent (i.e., the naive assumption).
    We can write


    $$P(X|c) = P(x_1, x_2, x_3, \dots, x_n|c) = \prod_{i=1}^{n} P(x_i|c). \tag{7.8}$$


    The resulting naive Bayesian classifier $f_{nb}(X)$, or simply “naive Bayes” classifier,
    can be written as


    $$f_{nb}(X) = \frac{P(c = +)}{P(c = -)} \prod_{i=1}^{n} \frac{P(x_i|c = +)}{P(x_i|c
    = -)}. \tag{7.9}$$


    Note that the naive assumption is a strong constraint that, in Earth Sciences,
    is often violated. If feature independence is violated, we have two options: The
    first is to estimate $P(X|c)$ without using the naive assumption (Kubat, 2017).
    However,'
  merge: -1
  pgno: 109
- img_proc: true
  md: 'using this option inevitably increases the complexity of the problem (Kubat,
    2017). The second option is more pragmatic: we reduce the feature dependence by
    appropriate data pre-processing. As suggested by Kubat (2017), a starting point
    is to avoid using redundant features.

    In scikit-learn the *GaussianNB()* method implements the Gaussian naive Bayes
    algorithm for classification with $P(X|c)$ assumed to be multivariate normal distributed.


    # 7.3 Quadratic and Linear Discriminant Analysis


    Like naive Bayes, quadratic and linear discriminant analyses (QDA and LDA, respectively)
    rely on the Bayes theorem. Assume that $f_c(x)$ is the class-conditional density
    of $X$ in class $c$, and let $\pi_c$ be the prior probability of class $c$, with
    $\sum_{c=1}^K \pi_c = 1$, where $K$ is the number of classes. The Bayes theorem
    states (Kubat, 2017)


    $$P(c|X) = \frac{f_c(x)\pi_c}{\sum_{l=1}^K f_l(x)\pi_l}.$$


    Now, modeling each class density as multivariate Gaussian,


    $$f_c(x) = \frac{1}{(2\pi)^{p/2} |\Sigma_c|^{1/2} e^{-\frac{1}{2}(x-\mu_c)^T \Sigma_c^{-1}(x-\mu_c)}}.$$


    we define the QDA. The LDA constitutes a special case of the QDA if the classes
    have a common covariance matrix (i.e., $\Sigma_c = \Sigma \ \forall \ c$). The
    main difference between LDA and QDA depends on the resulting decision boundaries
    being linear or quadratic functions, respectively.

    The algorithms for LDA and QDA are similar, except that separate covariance matrices
    must be estimated for each class in QDA. Given a large number of features, this
    implies a dramatic increase in the computed parameters. For $K$ classes and $p$
    features, LDA and QDA compute $(K-1)x(p+1)$ and $(K-1)x[p(p+3)/2+1]$ parameters,
    respectively. In scikit-learn, the methods *LinearDiscriminantAnalysis()* and
    *QuadraticDiscriminantAnalysis()* perform LDA and QDA, respectively.



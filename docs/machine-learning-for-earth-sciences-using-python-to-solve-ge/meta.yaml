    Figure 8.1 shows that the wells are distributed in three main clusters. As geologists,
    we would expect wells that are close together to have similar distributions of
    lithofacies. Therefore, well position could significantly impact the training
    of our ML model. Many strategies are available to include the spatial distribution
    of wells in a ML model; including X_LOC and Y_LOC as model features is the easiest
    strategy. More refined strategies may include a preliminary clustering of the
    spatial distribution of wells and a learning approach based on the result of the
    clustering. To develop a smart and simple workflow, we select the first option
    (i.e., simply including X_LOC and Y_LOC as model features).


    Figure 8.2 shows the results of code listing 8.2, which reveal two main characteristics
    of the investigated data sets. The first characteristic relates to feature persistence.
    Many features such as Spectral Gamma Ray (SGR), Shear wave sonic log (DTS), Micro
    Resistivity measurement (RMIC), and Average Rate of Penetration (ROPA) contain
    more than 60% missing values (see the upper panel of Fig. 8.2). Consequently,
    a strategy to deal with missing values is mandatory. Given our desire to maintain
    the simplicity of the ML workflow presented in the present chapter, only features
    containing less than 40% missing values are used. In addition, all missing values
    are replaced with the average of each feature. In statistics, the procedure of
    substituting missing values with other values is called “feature imputation” (Zou
    et al., 2015). In scikit-learn, *SimpleImputer()* and *IterativeImputer()* are
    useful for feature imputation (cf. Sect. 3.3.2).'

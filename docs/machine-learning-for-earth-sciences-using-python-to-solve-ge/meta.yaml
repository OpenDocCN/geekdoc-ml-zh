    \nTolosana-Delgado, R., Talebi, H., Khodadadzadeh, M., & Boogaart, K. G. (2019).\
    \ 关于机器学习算法与组成数据。载于*第八届组成数据分析国际研讨会论文集 (CoDaWork2019)* (pp. 172–175).\n\nUbide,\
    \ T., & Kamber, B. (2018). 作为喷发历史时间胶囊的火山晶体。*自然通讯*, *9*(1), 326. https://doi.org/10.1038/s41467-017-02274-w\n\
    \nUbide, T., Neave, D., Petrelli, M., & Longpré, M.-A. (2021). 社论：岩浆过程的晶体档案。*地球科学前沿*,\
    \ *9*. https://doi.org/10.3389/feart.2021.749100\n\n# 第四部分\n扩展机器学习模型\n\n# 第10章\n\
    使用 Dask 进行并行计算与扩展\n\n## 10.1 热身：基本定义\n\n**处理器、CPU、核心** “处理器”和“中央处理单元”（CPU）的传统定义是“一种微处理器芯片，它基于输入顺序（即逐个）执行一系列基本处理任务”（Caesar\
    \ Wu, 2015）。然而，现代 CPU 通过集成许多组件和托管缓存存储器，在很大程度上超越了这一传统定义。现代 CPU 通过应用符合处理器传统定义的自包含执行块来复制和执行最基本的处理任务（Caesar\
    \ Wu, 2015）。这些自包含执行块通常被称为“核心”（Caesar Wu, 2015）。\n\n**多核处理器与并行硬件** 多核处理器、芯片多处理器（CMP）和并行硬件常被用作同义词（Peter\
    \ Pacheco, 2020）。CMP 在一个芯片上集成了许多处理器和缓存存储器。并行硬件现在无处不在——几乎不可能找到一台不使用多核处理器的现代笔记本电脑、台式机或服务器（Peter\
    \ Pacheco, 2020）。\n\n**图形处理单元（GPU）** “GPU 是由大规模并行、比高性能 CPU 中通常更小、更专用的内核组成的多核处理单元。GPU\
    \ 架构能高效处理向量数据（数字数组），通常被称为向量架构。”¹\n\n**现场可编程门阵列（FPGA）** “FPGA 是具有可编程硬件结构的集成电路。与\
    \ CPU 和 GPU 这些软件可编程的固定架构不同，FPGA 是可重构的。为 FPGA 编写软件时，编译后的指令会变成在 FPGA 结构上空间布局的硬件组件，这些组件可以全部并行执行。”（见脚注\
    \ 1）。\n\n**分布式计算** 分布式计算是“由多个处理器组成的计算机系统，每个处理器都有自己的本地存储器，通过网络连接。处理器发出的加载或存储指令只能寻址本地存储器，并提供不同的机制进行全局通信”（David,\
    \ 2011）。\n\n**串行代码** 串行代码是为单个处理器构思和编写的代码（Peter Pacheco, 2020）。如果你在多个处理器或分布式架构上运行串行代码，性能不会神奇地提高，因为指令是由一个可用核心顺序执行的。\n\
    \n**并行计算** 并行计算是一种计算策略，其中许多计算或进程同时执行（Peter Pacheco, 2020）。并行计算利用多个处理器（即 CMP、GPU\
    \ 和 FPGA）或分布式架构（Peter Pacheco, 2020）。\n\n## 10.2 Dask 基础\n\nDask² 的目标是通过为 pandas、NumPy\
    \ 和 scikit-learn 等 Python 科学库添加对象可扩展性来克服单机限制（Daniel, 2019）。Dask 由三个主要层次组成：（1）调度器，（2）低级应用程序编程接口（API），和（3）高级\
    \ API（图 10.1）。本章主要讨论管理 Dask 数组、Dask DataFrames 和 Dask ML 的高级 API，它们分别允许我们扩展 NumPy、pandas\
    \ 和 scikit-learn 对象。使用 Dask 时，我们的主要目标是扩展单机的能力，使其能够处理超出其原生 RAM 能力的数据集，并部署集群以利用大数据集或极其复杂的模型。\n\
    \n**Dask 数组** Dask 数组将许多 NumPy 数组组合成块（即单个 NumPy 数组）排列在网格中（图 10.2）。它们是 NumPy 数组的并行友好版本。定义\
    \ Dask 数组就像定义 NumPy 数组一样简单；唯一的区别是你需要导入 dask.array 而不是 NumPy（图 10.3）。例如，图 10.3\
    \ 展示了如何创建一个包含随机数的 10⁵ × 10⁵ Dask 数组。在 Jupyter Notebooks 中，你可以轻松获取关于所创建 Dask 数组的大量信息（图\
    \ 10.3）。\n\n¹ https://intel.ly/39XimzH.\n² https://www.dask.org."

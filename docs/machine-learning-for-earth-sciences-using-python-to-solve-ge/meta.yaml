    # Dask Data Frame


    A Dask DataFrame is the parallel counterpart of a pandas Dataframe (Fig. 10.4).
    They are composed of many smaller pandas DataFrames split along an index (Table
    10.1).


    To see how to use Dask DataFrames, let us import the data set that we developed
    in Chap. 8 and that we saved as HDF5. Figure 10.5 shows a portion of a Jupyter
    Notebook and highlights how to import a Dask DataFrame from the file *ml_data.h5*.
    Note that the procedure is similar to that in pandas. The only difference consists
    of importing a *dask.DataFrame* instead of a *pandas.DataFrame*. Note also that
    Dask splits the DataFrame into two parts and that, instead of the real values,
    all rows are filled with ellipses (...). This is because the data set is subject
    to “lazy” evaluation (see Sect. 10.3 for further details). To physically import
    *train_dataset*, Dask requires the additional step of using the *compute()* method
    (Fig. 10.6).



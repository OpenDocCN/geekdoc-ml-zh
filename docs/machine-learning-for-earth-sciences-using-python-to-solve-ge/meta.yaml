  - '[PAGE 87]


    As we know from Sect. 3.3.6, performing multivariate statistical analysis directly
    on compositional data sets is not formally correct and can bias the results or
    cause other problems (Aitchison, 1982; Aitchison & Egozcue, 2005; Aitchison, 1984).
    Different data transformations have been proposed to apply standard and advanced
    statistical methods to compositional data sets. Examples are the additive log-ratio
    (*alr*), the centered log-ratio (*clr*), and the isometric log-ratio (*ilr*) transformations
    (Aitchison, 1982; Aitchison & Egozcue, 2005; Aitchison, 1984). I briefly introduced
    CoDA analysis in Sect. 3.3.6, where I also presented the equations to perform
    the *alr*, *clr*, and *ilr* transformations.


    At line 15 of code listing 5.2, we apply the *ilr* transformation to our data,
    then scale in agreement with the median and the inter-quartile range (lines 17–20);
    that is, we apply *RobustScaler()*. We then visualize the resulting features (Fig.
    5.3).



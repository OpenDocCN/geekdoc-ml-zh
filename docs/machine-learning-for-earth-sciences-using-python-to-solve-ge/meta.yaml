    consist of tabular data stored in text (e.g., .csv) or Excel™ files. Sometimes,
    a Structured Query Language (SQL) database hosts your data. Larger data sets may
    be stored in the Hierarchical Data Format (HDF5),¹ Optimized Row Columnar'

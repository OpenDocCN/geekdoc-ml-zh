    # 9.4 Model Training and Error Assessment


    In agreement with Petrelli et al. (2020), we train the extremely randomized trees
    algorithm on the pre-processed data set. Also, we use a Monte Carlo simulation
    to propagate the errors and assess the goodness of the model. The Monte Carlo
    approach consists of repeating many times (i) the random splitting of the data
    set, and (ii) the training of the algorithm starting from a different random seeding
    (code listing 9.4). To achieve our goal, we define a function named monte_carlo_simulation()
    (line 9). Within this function, we repeat the train-validation splitting n times
    (lines 16–18), normalization to zero mean and unit variance (lines 20–22), training
    (lines 24–26), prediction (line 27), error assessment (lines 29–35), and the storing
    of the results (lines 36–42).


    ```


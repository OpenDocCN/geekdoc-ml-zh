    \ to stabilize variance and minimize skewness.\n\nThe presence of outliers may\
    \ affect the outputs of the model. If the data set has outliers, robust scalers\
    \ or transformers are more appropriate. By default, *RobustScaler()* removes the\
    \ median and scales the data according to the interquartile range. Note that *RobustScaler()*\
    \ does not remove any of the outliers. Table 3.2 summarizes the main scalers and\
    \ the transformers available in scikit-learn.\n\nWhen the estimation uncertainties\
    \ are quantified (e.g., by one sigma or one standard error), the data set could\
    \ be cleaned to remove all data where the error exceeds a threshold of your choosing.\n\

- md: "## Chapter 9\nMachine Learning Regression in Petrology\n\n![](img/90d3084aebf7ededff86e49f84c52faa_149_0.png)\n\
    \n## 9.1 Motivation\n\nDeciphering magma storage depths and temperatures in the\
    \ feeding systems of active volcanoes is a central issue in volcanology and petrology\
    \ (see, e.g., Putirka, 2008). For example, magma storage depths help to characterize\
    \ volcanic plumbing systems (see, e.g., Petrelli et al., 2018; Ubide and Kamber,\
    \ 2018; Ubide et al., 2021). Also, the magma temperature must be estimated in\
    \ order to use diffusion-based geo-chronometers (see, e.g., Costa et al., 2020).\
    \ To date, a robust and widely applied strategy to design geo-barometers or geo-thermometers\
    \ is mainly based on changes in entropy and volume during equilibrium reactions\
    \ between melts and crystals (see Putirka, 2008 and Putirka, 2008, and references\
    \ therein). For example, the calibration of a mineral-melt or mineral-only thermometer\
    \ or of a barometer consists of five main steps: (1) determine the chemical equilibria\
    \ associated with significant changes in entropy and volume (Putirka, 2008); (2)\
    \ procure a suitable experimental data set for which temperature and pressure\
    \ are known (e.g., the data set of the Library of Experimental Phase Relations;\
    \ Hirschmann et al., 2008); (3) compute the components of the crystal phase from\
    \ chemical analyses; (4) choose the regression strategy; and (5) validate the\
    \ model (Putirka, 2008). Recently, numerous authors have demonstrated the potential\
    \ of thermo-barometry based on ML (see, e.g., Petrelli et al., 2020; Jorgenson\
    \ et al., 2022). This chapter discusses how to calibrate ML thermo-barometers\
    \ based on orthopyroxenes in equilibrium with the melt phase and with orthopyroxenes\
    \ alone.\n\n## 9.2 LEPR Data Set and Data Pre-processing\n\nThe Library of Experimental\
    \ Phase Relations (LEPR) (Hirschmann et al., 2008) includes >5000 petrological\
    \ experiments simulating igneous systems at temperatures between 500 and 2500\
    \ °C and pressures up to 25 GPa or more. The LEPR data set can be downloaded from\
    \ a dedicated portal.¹ In the LEPR data set, the entries corresponding to each\
    \ experiment include both experimental data (i.e., the composition of starting\
    \ materials, the experimental temperature and pressure, the phases at the end\
    \ of the experiments and related compositions) and metadata (e.g., author, laboratory,\
    \ device, oxygen fugacity). For this chapter, I downloaded an Excel™ file and\
    \ I named it LEPR_download.xls. In the Excel™ file, the sheet named “Experiments”\
    \ contains all the meta data and relevant information such as the composition\
    \ of starting materials, the experimental temperature and pressure, and the phases\
    \ present at the end of the experiment. The sheets named with a phase name (e.g.,\
    \ Liquid, Clinopyroxene, Olivine) contain the chemical compositions for that specific\
    \ phase in each experiment. An index characterizes each experiment, linking the\
    \ information in the different sheets.\n\nAs a pre-processing strategy (see code\
    \ listing 9.1), we define the function *data_pre_processing()*, which (1) imports\
    \ the LEPR data set from Excel™ (lines 103 and 104), (2) creates a pandas *pipe()*\
    \ for basic operations such as adjusting column names, converting all Fe data\
    \ such as FeO<sub>tot</sub>, filtering the features, and imputing NaN to zero\
    \ (lines from 115 to 120); (3) start storing phase information in a .hd5 file\
    \ (lines 123, 153, and 154); (4) combine all relevant data in a single pandas\
    \ DataFrame (lines 128–130); (5) filter based on SiO<sub>2</sub>, pressure *P*\
    \ (GPa), and temperature *T* (°C) (lines 132–141); (6) remove the entries characterized\
    \ by chemical analysis that do not fit the chemical formula of the orthopyroxene\
    \ (lines 143–145); (7) shuffle the data set (lines 147 and 148); (8) separate\
    \ the labels from the input features (lines 150 and 151); and (9) store everything\
    \ in a .hd5 file (lines 153 and 154).\n\nThe statement at line 157 triggers the\
    \ data pre-processing. The result is a hdf5 file named ml_data.h5 that contains\
    \ a DataFrame named “Liquid_Orthopyroxene” hosting the pre-processed experimental\
    \ data from the LEPR data set. In addition, it stores the labels *T* and *P* in\
    \ a DataFrame named “labels.” Finally, it contains all the original data of interest\
    \ in three DataFrames named “Liquid,” “Orthopyroxene,” and “starting_material.”\n\
    \nFigures 9.1 and 9.2 show the probability densities for the different chemical\
    \ elements in the melt and orthopyroxene phases, respectively (code listing 9.2).\
    \ Code listing 9.2 imports the Liquid_Orthopyroxene DataFrame from the hdf5 file\
    \ ml_data.h5 (line 5).\n\n¹ https://lepr.earthchem.org/.\n\n```python\nimport\
    \ os\nimport pandas as pd\nimport numpy as np\n\nElements = {\n    'Liquid': ['SiO2',\
    \ 'TiO2', 'Al2O3', 'FeOtot', 'MgO',\n               'MnO', 'CaO', 'Na2O', 'K2O'],\n\
    \    'Orthopyroxene': ['SiO2', 'TiO2', 'Al2O3', 'FeOtot',\n                  \
    \    'MgO', 'MnO', 'CaO', 'Na2O', 'Cr2O3']}\n\ndef calculate_cations_on_oxygen_basis(\n\
    \        myData0, myphase, myElements, n_oxygens):\n\n    Weights = {'SiO2': [60.0843,\
    \ 1.0, 2.0],\n               'TiO2': [79.8788, 1.0, 2.0],\n               'Al2O3':\
    \ [101.961, 2.0, 3.0],\n               'FeOtot': [71.8464, 1.0, 1.0],\n      \
    \         'MgO': [40.3044, 1.0, 1.0],\n               'MnO': [70.9375, 1.0, 1.0],\n\
    \               'CaO': [56.0774, 1.0, 1.0],\n               'Na2O': [61.9789,\
    \ 2.0, 1.0],\n               'K2O': [94.196, 2.0, 1.0],\n               'Cr2O3':\
    \ [151.9982, 2.0, 3.0],\n               'P2O5': [141.937, 2.0, 5.0],\n       \
    \        'H2O': [18.01388, 2.0, 1.0]}\n\n    myData = myData0.copy()\n    # Cation\
    \ mole proportions\n    for el in myElements:\n        myData[el + '_cat_mol_prop']\
    \ = myData[myphase +\n                '_' + el] * Weights[el][1] / Weights[el][0]\n\
    \    # Oxygen mole proportions\n    for el in myElements:\n        myData[el +\
    \ '_oxy_mol_prop'] = myData[myphase +\n                '_' + el] * Weights[el][2]\
    \ / Weights[el][0]\n    # Oxygen mole proportions totals\n    totals = np.zeros(len(myData.index))\n\
    \    for el in myElements:\n        totals += myData[el + '_oxy_mol_prop']\n \
    \   myData['tot_oxy_prop'] = totals\n    # totcations\n    totals = np.zeros(len(myData.index))\n\
    \    for el in myElements:\n        myData[el + '_num_cat'] = n_oxygens * myData[el\
    \ +\n                '_cat_mol_prop'] / myData['tot_oxy_prop']\n        totals\
    \ += myData[el + '_num_cat']\n    return totals\n\ndef filter_by_cryst_formula(dataFrame,\
    \ myphase, myElements):\n\n    c_o_Tolerance = {'Orthopyroxene': [4, 6, 0.025]}\n\
    \n    dataFrame['Tot_cations'] = calculate_cations_on_oxygen_basis(\n        myData0=dataFrame,\
    \ myphase=myphase,\n        myElements=myElements,\n        n_oxygens=c_o_Tolerance[myphase][1])\n\
    \n    dataFrame = dataFrame[\n        (dataFrame['Tot_cations'] < c_o_Tolerance[myphase][0]\n\
    \                        + c_o_Tolerance[myphase][2]) &\n        (dataFrame['Tot_cations']\
    \ > c_o_Tolerance[myphase][0]\n                        - c_o_Tolerance[myphase][2])]\n\
    \n    dataFrame = dataFrame.drop(columns=['Tot_cations'])\n    return dataFrame\n\
    \ndef adjustFeOtot(dataFrame):\n    for i in range(len(dataFrame.index)):\n  \
    \      try:\n            if pd.to_numeric(dataFrame.Fe2O3[i]) > 0:\n         \
    \       dataFrame.loc[i, 'FeOtot'] = (\n                    pd.to_numeric(dataFrame.FeO[i])\
    \ + 0.8998 *\n                    pd.to_numeric(dataFrame.Fe2O3[i]))\n       \
    \     else:\n                dataFrame.loc[i,\n                    'FeOtot'] =\
    \ pd.to_numeric(dataFrame.FeO[i])\n        except:\n            dataFrame.loc[i,\
    \ 'FeOtot'] = 0\n    return dataFrame\n\ndef adjust_column_names(dataFrame):\n\
    \    dataFrame.columns = [c.replace('Wt: ', '')\n                        for c\
    \ in dataFrame.columns]\n    dataFrame.columns = [c.replace(' ', '')\n       \
    \                 for c in dataFrame.columns]\n    return dataFrame\n\ndef select_base_features(dataFrame,\
    \ my_elements):\n    dataFrame = dataFrame[my_elements]\n    return dataFrame\n\
    \ndef data_imputation(dataFrame):\n    dataFrame = dataFrame.fillna(0)\n    return\
    \ dataFrame\n\ndef data_pre_processing(phase_1, phase_2, out_file):\n\n    try:\n\
    \        os.remove(out_file)\n    except OSError:\n        pass\n\n    starting\
    \ = pd.read_excel('LEPR_download.xls',\n                            sheet_name='Experiment')\n\
    \    starting = adjust_column_names(starting)\n    starting.name = ''\n    starting\
    \ = starting[['Index', 'T(C)', 'P(GPa)']]\n    starting.to_hdf(out_file, key='starting_material')\n\
    ```"
  mdcn: "## 第9章\n岩石学中的机器学习回归\n\n![](img/90d3084aebf7ededff86e49f84c52faa_149_0.png)\n\
    \n## 9.1 研究动机\n\n解读活火山供给系统中的岩浆储存深度和温度是火山学和岩石学的一个核心问题（参见，例如，Putirka, 2008）。例如，岩浆储存深度有助于表征火山管道系统（参见，例如，Petrelli\
    \ et al., 2018; Ubide and Kamber, 2018; Ubide et al., 2021）。此外，为了使用基于扩散的地质年代计，必须估算岩浆温度（参见，例如，Costa\
    \ et al., 2020）。迄今为止，设计地质压力计或地质温度计的一种稳健且广泛应用的策略主要基于熔体与晶体之间平衡反应过程中熵和体积的变化（参见Putirka,\
    \ 2008 和 Putirka, 2008，以及其中的参考文献）。例如，矿物-熔体或仅矿物温度计或压力计的校准包括五个主要步骤：(1) 确定与熵和体积显著变化相关的化学平衡（Putirka,\
    \ 2008）；(2) 获取温度和压力已知的合适实验数据集（例如，实验相关系库的数据集；Hirschmann et al., 2008）；(3) 根据化学分析计算晶体相的组分；(4)\
    \ 选择回归策略；以及 (5) 验证模型（Putirka, 2008）。最近，许多作者已经证明了基于机器学习的温压计的潜力（参见，例如，Petrelli et\
    \ al., 2020; Jorgenson et al., 2022）。本章讨论了如何校准基于与熔体相平衡的斜方辉石以及仅基于斜方辉石的机器学习温压计。\n\
    \n## 9.2 LEPR 数据集与数据预处理\n\n实验相关系库（LEPR）（Hirschmann et al., 2008）包含超过5000个岩石学实验，模拟了温度在500至2500\
    \ °C之间、压力高达25 GPa或更高的火成系统。LEPR数据集可以从专用门户下载。¹ 在LEPR数据集中，每个实验对应的条目包括实验数据（即，起始材料的组成、实验温度和压力、实验结束时的相及其相关组成）和元数据（例如，作者、实验室、设备、氧逸度）。对于本章，我下载了一个Excel™文件并将其命名为LEPR_download.xls。在Excel™文件中，名为“Experiments”的工作表包含所有元数据和相关信息，如起始材料的组成、实验温度和压力以及实验结束时存在的相。以相名称命名的工作表（例如，Liquid,\
    \ Clinopyroxene, Olivine）包含每个实验中该特定相的化学组成。一个索引表征每个实验，链接不同工作表中的信息。\n\n作为预处理策略（参见代码清单9.1），我们定义了函数\
    \ *data_pre_processing()*，它 (1) 从Excel™导入LEPR数据集（第103和104行），(2) 创建一个pandas *pipe()*\
    \ 用于基本操作，如调整列名、转换所有Fe数据（如FeO<sub>tot</sub>）、筛选特征以及将NaN填充为零（第115至120行）；(3) 开始将相信息存储在.hd5文件中（第123、153和154行）；(4)\
    \ 将所有相关数据组合到一个pandas DataFrame中（第128–130行）；(5) 基于SiO<sub>2</sub>、压力 *P* (GPa)\
    \ 和温度 *T* (°C) 进行筛选（第132–141行）；(6) 移除化学分析不符合斜方辉石化学式的条目（第143–145行）；(7) 打乱数据集（第147和148行）；(8)\
    \ 将标签与输入特征分离（第150和151行）；以及 (9) 将所有内容存储在.hd5文件中（第153和154行）。\n\n第157行的语句触发了数据预处理。结果是一个名为ml_data.h5的hdf5文件，其中包含一个名为“Liquid_Orthopyroxene”的DataFrame，该DataFrame托管了来自LEPR数据集的预处理实验数据。此外，它将标签\
    \ *T* 和 *P* 存储在名为“labels”的DataFrame中。最后，它包含所有感兴趣的原始数据，分别存储在名为“Liquid”、“Orthopyroxene”和“starting_material”的三个DataFrame中。\n\
    \n图9.1和图9.2分别显示了熔体相和斜方辉石相中不同化学元素的概率密度（代码清单9.2）。代码清单9.2从hdf5文件ml_data.h5中导入Liquid_Orthopyroxene\
    \ DataFrame（第5行）。\n\n¹ https://lepr.earthchem.org/.\n\n```python\nimport os\n\
    import pandas as pd\nimport numpy as np\n\nElements = {\n    'Liquid': ['SiO2',\
    \ 'TiO2', 'Al2O3', 'FeOtot', 'MgO',\n               'MnO', 'CaO', 'Na2O', 'K2O'],\n\
    \    'Orthopyroxene': ['SiO2', 'TiO2', 'Al2O3', 'FeOtot',\n                  \
    \    'MgO', 'MnO', 'CaO', 'Na2O', 'Cr2O3']}\n\ndef calculate_cations_on_oxygen_basis(\n\
    \        myData0, myphase, myElements, n_oxygens):\n\n    Weights = {'SiO2': [60.0843,\
    \ 1.0, 2.0],\n               'TiO2': [79.8788, 1.0, 2.0],\n               'Al2O3':\
    \ [101.961, 2.0, 3.0],\n               'FeOtot': [71.8464, 1.0, 1.0],\n      \
    \         'MgO': [40.3044, 1.0, 1.0],\n               'MnO': [70.9375, 1.0, 1.0],\n\
    \               'CaO': [56.0774, 1.0, 1.0],\n               'Na2O': [61.9789,\
    \ 2.0, 1.0],\n               'K2O': [94.196, 2.0, 1.0],\n               'Cr2O3':\
    \ [151.9982, 2.0, 3.0],\n               'P2O5': [141.937, 2.0, 5.0],\n       \
    \        'H2O': [18.01388, 2.0, 1.0]}\n\n    myData = myData0.copy()\n    # Cation\
    \ mole proportions\n    for el in myElements:\n        myData[el + '_cat_mol_prop']\
    \ = myData[myphase +\n                '_' + el] * Weights[el][1] / Weights[el][0]\n\
    \    # Oxygen mole proportions\n    for el in myElements:\n        myData[el +\
    \ '_oxy_mol_prop'] = myData[myphase +\n                '_' + el] * Weights[el][2]\

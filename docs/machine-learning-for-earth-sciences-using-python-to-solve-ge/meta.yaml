    ## 7.11 Trees-Based Methods


    **Decision Trees** Before describing how decision trees work, let me introduce
    a few definitions highlighted in Fig. 7.5. A *root node* is the starting node
    of a decision tree and contains the entire data set involved in the process. A
    *parent node* is a node that is split into sub-nodes. A *child node* is a sub-node
    of a parent node. Finally, a *leaf* or *terminal node* are nodes that terminate
    the tree and that are not split to generate additional child nodes.


    The decision tree algorithm (Breiman et al., 1984) and its modifications such
    as random forests and extra trees split the input space into sub-regions, which
    allow for regression and classification tasks (see Fig. 7.5) (Kubat, 2017). In
    detail, each node maps a region in the input space, which is further divided within
    the node into sub-regions by using splitting criteria. Therefore, the workflow
    of a decision



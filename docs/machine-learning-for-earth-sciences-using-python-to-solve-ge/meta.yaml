    \n当垂直定向时，垂直刻度表示聚类之间的距离或相似度。如果我们画一条水平线，所截取的叶节点数量（例如，参见图 5.5）定义了该特定高度下的聚类数量。增加高度会减少聚类数量。在我们的具体案例中，将阈值固定在\
    \ 16.5 定义了六个聚类（参见代码清单 5.4 和图 5.5）。\n\n```python\nfrom sklearn.cluster import AgglomerativeClustering\n\
    from sklearn.decomposition import PCA\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\nmy_colors = {0:'#0A3A54',\n             1:'#E08B48',\n           \
    \  2:'#BFBFBF',\n             3:'#BD22C6',\n             4:'#FD787B',\n      \
    \       5:'#67CF62' }\n#PCA\nmodel_PCA = PCA()\nmodel_PCA.fit(my_dataset_ilr_scaled)\n\
    my_PCA = model_PCA.transform(my_dataset_ilr_scaled)\n\nfig, ax = plt.subplots()\n\
    ax.scatter(my_PCA[:,0], my_PCA[:,1],\n            alpha=0.6,\n            edgecolors='k')\n\
    \nax.set_title('Principal Component Analysis')\nax.set_xlabel('PC_1')\nax.set_ylabel('PC_2')\n\
    ```\n\n**清单 5.5** 绘制前两个主成分\n\n## 5.6 降维\n\n*ilr* 转换后的数据集包含六个特征（图 5.3）。为了可视化我们数据的结构，我执行了主成分分析（PCA；参见第\
    \ 4.2 节），它包含一种线性降维，使用数据集的奇异值分解将其投影到低维空间。\n代码清单 5.5 展示了如何对我们的数据集应用 PCA。此外，它还为我们提供了一个二元图（图\
    \ 5.6），显示了前两个主成分。\n\n![](img/90d3084aebf7ededff86e49f84c52faa_91_0.png)\n\n**图\
    \ 5.6** 前两个主成分的散点图\n\n![](img/90d3084aebf7ededff86e49f84c52faa_92_0.png)\n\n**图\
    \ 5.7** 结合主成分分析与层次聚类\n\n可视化图 5.5 中突出显示的六个聚类可能有益；代码清单 5.6 展示了如何做到这一点（图 5.7）。此外，代码清单\
    \ 5.6 展示了如何应用并可视化（图 5.8）$K$-均值聚类（第 4.7 节）。\n\n```python\n#AgglomerativeClustering\n\
    model_AC = AgglomerativeClustering(linkage='ward',\n                         \
    \          affinity='euclidean',\n                                   n_clusters=6)\n\
    my_AC = model_AC.fit(my_dataset_ilr_scaled)\n\nfig, ax = plt.subplots()\nlabel_to_color\
    \ = [my_colors[i] for i in my_AC.labels_]\nax.scatter(my_PCA[:,0], my_PCA[:,1],\n\
    \           c=label_to_color, alpha=0.6,\n           edgecolors='k')\nax.set_title('Hierarchical\
    \ Clustering')\nax.set_xlabel('PC_1')\nax.set_ylabel('PC_2')\nmy_dataset['cluster_HC']\
    \ = my_AC.labels_\n\n#KMeans\nfrom sklearn.cluster import KMeans\nmyKM = KMeans(n_clusters=6).fit(my_dataset_ilr_scaled)\n\
    \nfig, ax = plt.subplots()\nlabel_to_color = [my_colors[i] for i in myKM.labels_]\n\
    ax.scatter(my_PCA[:,0], my_PCA[:,1],\n            c=label_to_color, alpha=0.6,\n\
    \            edgecolors='k')\nax.set_title('KMeans')\nax.set_xlabel('PC_1')\n\
    ax.set_ylabel('PC_2')\nmy_dataset['cluster_KM'] = myKM.labels_\n```\n\n**清单 5.6**\
    \ 结合主成分分析与层次聚类和 *K*-均值聚类方法\n\n![](img/90d3084aebf7ededff86e49f84c52faa_93_0.png)\n\

- md: '## Chapter 11

    Scale Your Models in the Cloud


    ## 11.1 Scaling Your Environment in the Cloud


    The term “scalability” refers to the ability of a system to manage a growing amount
    of work. As stated in the previous chapter, compute or memory bounds must be scaled
    to handle ML models. In the context of a cloud computing facility, the term scaling
    refers to the ability to quickly and efficiently increase (or decrease) the capability
    of a computational resource to handle a model that no longer fits the current
    resources (i.e., RAM, CPUs, and storage capabilities). Two main strategies exist
    for scaling computational infrastructure: scale up or scale out (Bekkerman et
    al., 2012).


    **Scale Up**

    Scaling up, or vertical scaling, consists of replacing the current computational
    instance with something more powerful (Fig. 11.1). For example, we could increase
    the number of cores, the amount of memory, and/or the capability of the storage
    (Fig. 11.2).


    **Scale Out**

    Scaling out, or horizontal scaling, consists of increasing the computational capability
    by replicating the instances and running them in parallel (Fig. 11.3).


    ![](img/90d3084aebf7ededff86e49f84c52faa_184_0.png)


    Fig. 11.1 Scaling up and scaling down


    Compute Optimized Instances by Amazon Web Services


    | Instance Size | vCPU | Memory (GiB) |

    |---|---|---|

    | r6a.large | 2 | 16 |

    | r6a.xlarge | 4 | 32 |

    | r6a.2xlarge | 8 | 64 |

    | r6a.4xlarge | 16 | 128 |

    | r6a.8xlarge | 32 | 256 |

    | r6a.12xlarge | 48 | 384 |

    | r6a.16xlarge | 64 | 512 |

    | r6a.24xlarge | 96 | 768 |

    | r6a.32xlarge | 128 | 1024 |

    | r6a.48xlarge | 192 | 1536 |

    | r6a.metal | 192 | 1536 |


    Fig. 11.2 Scaling up and down


    ## 11.2 Scaling in the Cloud: The Hard Way


    The “hard way” of scaling consists of managing all configurations and taking all
    the technical steps in either Amazon Web Services (AWS), the Google Compute Engine,
    Microsoft Azure, or other providers.


    Scaling up is quite easy with cloud providers. It consists simply of selecting
    larger or smaller instances to scale up and down, respectively (Fig. 11.2). Also,
    some providers offer specific services for auto-scaling; for example, Amazon claims
    that “AWS Auto Scaling monitors your applications and automatically adjusts capacity
    to maintain steady, predictable performance at the lowest possible cost. Using
    AWS Auto Scaling, it’s easy to set up application scaling for multiple resources
    across multiple services in minutes. The service provides a simple, powerful user
    interface that lets you build scaling plans for resources including Amazon EC2
    instances. . . .¹


    In contrast, scaling out is not as straightforward as scaling up. The Dask documentation
    suggests the use of Kubernetes and Helm solutions. Kubernetes is “a portable,
    extensible, open source platform for managing containerized workloads and services
    that facilitates both declarative configuration and automation.”² Helm is “an
    open source package manager for Kubernetes. It provides the ability to provide,
    share, and use software built for Kubernetes.”³ The Dask documentation claims
    that “it is easy to launch a Dask cluster and a Jupyter notebook server on cloud
    resources using Kubernetes and Helm.”⁴ However, the instructions given in the
    Dask documentation assume that a Kubernetes cluster and Helm are already installed
    and ready for use. Unfortunately, setting up a Kubernetes cluster and Helm is
    not straightforward for a novice. Detailed instructions for many cloud providers
    are available in the guide “Zero to JupyterHub.”⁵


    ¹ https://aws.amazon.com/autoscaling/.

    ² https://kubernetes.io/docs/concepts/overview/what-is-kubernetes/.

    ³ https://helm.sh/docs/.

    ⁴ https://docs.dask.org/en/stable/deploying-kubernetes-helm.html.

    ⁵ https://zero-to-jupyterhub.readthedocs.io/en/latest/kubernetes/.


    ## 11.3 Scaling in the Cloud: The Easy Way


    ### Saturn Cloud


    Saturn Cloud⁶ is a cloud-based platform designed to support data scientists working
    with Python,⁷ R,⁸ Julia,⁹ and other programming languages. Resources, such as
    those shown in Fig. 11.4, are the building blocks of the Saturn Cloud platform.
    The term “resource” refers to a complete computational and coding environment.
    Each resource is independent, so you can split out your different activities.
    Saturn Cloud-hosted solutions¹⁰ are a “pay as you go” service, which means that
    you pay per hour for computational resources. For example, during the writing
    of the present book, the Medium (2 vCPU and 4 GB of RAM) and V100-16×Large (64
    vCPU, 8 vGPU, and 488 GB of RAM) resources cost $0.06 and $34.24 per hour, respectively.
    A free hosted plan also exists with limited resources. The next sections exploit
    the free hosted plan for the first step of scaling up, following which results
    obtained on a Hosted Pro Plan are shown. Details about the costs are also provided,
    in case you intend to reproduce these results.


    ⁶ https://saturncloud.io.

    ⁷ https://www.python.org.

    ⁸ https://www.r-project.org.

    ⁹ https://julialang.org.

    ¹⁰ https://saturncloud.io/plans/hosted/.


    ### Speed Up GridSearchCV on Saturn Cloud


    In Sect. 8.3, we performed a GridSearchCV, which is an extensive search within
    the hyper-parameters governing the extremely randomized trees algorithm (see code
    listing 8.9 and Table 8.1). The aim was to find the combination of hyper-parameters
    that provide the highest degree of accuracy. This combination of hyper-parameters
    resulted in a grid of 48 models, each repeated three times through cross validation,
    for a total of 144 attempts. As reported in Chap. 8, running the code listing
    8.9 required about 8 hours on my MacBook pro equipped with a 2.3 GHz Quad-Core
    Intel™ i7 CPU and 32 GB of RAM.


    ![](img/90d3084aebf7ededff86e49f84c52faa_187_0.png)


    In Saturn Cloud, the free hosted plan allows a slight scaling up of the hardware
    that supports my MacBook Pro using the 2× Large instance (i.e., eight cores and
    64 GB of RAM), so we scale up to a 2× Large instance and run the code listing
    8.9. To start, we register with Saturn Cloud and click on the “New Python Server”
    button (Fig. 11.5), which starts a guided procedure that allows the configuration
    of a new instance, ready for basic Python data analysis, machine learning, and,
    possibly, parallel processing with Dask.


    Figures 11.6 and 11.7 show all the steps to configure the new instance. It is
    recommended to use a self-explanatory name, such as *scale_GridSearchCV_Joblib*,
    100 Gi of disk space, and the 2×large instance. Also, remember to add *ytables*
    as an extra package; this is installed using *Conda Install*. The PyTables library
    allows HDF5 files to be read and saved. Leave all the other options untouched,
    and click *Create*.


    The instance is now ready (Fig. 11.8). The next steps consist of starting the
    instance, creating a new Jupyter Notebook, and uploading the HDF5 file *ml_data.h5*
    (Fig. 11.9). Finally, we are ready to replicate code listing 8.9 in a 2×large
    instance (Fig. 11.10). Note that the second block of code in (Fig. 11.10) simply
    reports the outputs in a log file named *data.log*. The fitting (i.e., block number
    five) lasted 5 hours and 15 minutes, which is significantly faster than the 8
    hours of my MacBook Pro.


    ![](img/90d3084aebf7ededff86e49f84c52faa_188_0.png)


    Fig. 11.5 Starting a new python server


    Next, we activate a Hosted Pro Plan<sup>11</sup> and progressively scale up the
    code in Fig. 11.10 to 8×Large instances (i.e., 32 Cores and 256 GB of RAM at the
    cost of $3.30/hour) and 16×Large instances (i.e., 64 Cores and 512 GB of RAM at
    the cost of $6.59/hour), improving the computation time to about 2 hours and 1
    hour, respectively.


    As a final step, I scaled out the code reported in Fig. 11.10. To do this, I created
    a Dask cluster by clicking *New Dask Cluster* (Fig. 11.8), which opens the Cluster
    configuration window (Fig. 11.11). Also, I opted for a 16×Large scheduler (i.e.,
    64 Cores and 512 GB of RAM) and four 8×Large workers (i.e., 32 Cores and 256 GB
    of RAM). To run *GridSearchCV* in the newly created Dask Cluster, the code reported
    in Fig. 11.10 requires only minimal changes, which are all reported in Fig. 11.12.
    I imported *SaturnCluster* from *dask_saturn* (block 1), used *n_jobs = -1* (i.e.,
    nested parallelism) for both *ExtraTreesClassifier* and *GridSearchCV* (Block
    4), defined the *SaturnCluster* client (Block 5), and ran *Joblib* with *dask*
    as the fitting engine (Block 6). In this final case, fitting *GridSearchCV* required
    less than 25 minutes!


    <sup>11</sup> https://saturncloud.io/plans/hosted/.'
  mdcn: '## 第11章

    在云端扩展你的模型


    ## 11.1 在云端扩展你的环境


    术语“可扩展性”指的是系统管理不断增长的工作量的能力。如前一章所述，必须扩展计算或内存限制以处理机器学习模型。在云计算设施的背景下，术语“扩展”指的是快速高效地增加（或减少）计算资源能力以处理不再适合当前资源（即RAM、CPU和存储能力）的模型的能力。扩展计算基础设施存在两种主要策略：纵向扩展或横向扩展（Bekkerman等人，2012）。


    **纵向扩展**

    纵向扩展，或称垂直扩展，包括用更强大的实例替换当前的计算实例（图11.1）。例如，我们可以增加核心数量、内存容量和/或存储能力（图11.2）。


    **横向扩展**

    横向扩展，或称水平扩展，包括通过复制实例并并行运行来增加计算能力（图11.3）。


    ![](img/90d3084aebf7ededff86e49f84c52faa_184_0.png)


    图11.1 纵向扩展与缩减


    亚马逊网络服务的计算优化实例


    | 实例大小 | vCPU | 内存 (GiB) |

    |---|---|---|

    | r6a.large | 2 | 16 |

    | r6a.xlarge | 4 | 32 |

    | r6a.2xlarge | 8 | 64 |

    | r6a.4xlarge | 16 | 128 |

    | r6a.8xlarge | 32 | 256 |

    | r6a.12xlarge | 48 | 384 |

    | r6a.16xlarge | 64 | 512 |

    | r6a.24xlarge | 96 | 768 |

    | r6a.32xlarge | 128 | 1024 |

    | r6a.48xlarge | 192 | 1536 |

    | r6a.metal | 192 | 1536 |


    图11.2 纵向扩展与缩减


    ## 11.2 云端扩展：困难的方式


    “困难”的扩展方式包括在亚马逊网络服务（AWS）、谷歌计算引擎、微软Azure或其他提供商中管理所有配置并执行所有技术步骤。


    使用云提供商进行纵向扩展相当简单。只需选择更大或更小的实例分别进行扩展和缩减即可（图11.2）。此外，一些提供商提供特定的自动扩展服务；例如，亚马逊声称“AWS
    Auto Scaling监控您的应用程序并自动调整容量，以在尽可能低的成本下保持稳定、可预测的性能。使用AWS Auto Scaling，可以轻松地在几分钟内为多个服务中的多个资源设置应用程序扩展。该服务提供了一个简单而强大的用户界面，让您可以为包括Amazon
    EC2实例在内的资源构建扩展计划。……¹”


    相比之下，横向扩展不像纵向扩展那样直接。Dask文档建议使用Kubernetes和Helm解决方案。Kubernetes是“一个可移植、可扩展的开源平台，用于管理容器化工作负载和服务，它促进了声明式配置和自动化。”²
    Helm是“一个用于Kubernetes的开源软件包管理器。它提供了提供、共享和使用为Kubernetes构建的软件的能力。”³ Dask文档声称“使用Kubernetes和Helm，可以轻松地在云资源上启动Dask集群和Jupyter笔记本服务器。”⁴
    然而，Dask文档中给出的说明假设Kubernetes集群和Helm已经安装并准备就绪。不幸的是，对于新手来说，设置Kubernetes集群和Helm并不简单。许多云提供商的详细说明可在指南“Zero
    to JupyterHub”中找到。⁵


    ¹ https://aws.amazon.com/autoscaling/.

    ² https://kubernetes.io/docs/concepts/overview/what-is-kubernetes/.

    ³ https://helm.sh/docs/.

    ⁴ https://docs.dask.org/en/stable/deploying-kubernetes-helm.html.

    ⁵ https://zero-to-jupyterhub.readthedocs.io/en/latest/kubernetes/.


    ## 11.3 云端扩展：简单的方式


    ### Saturn Cloud


    Saturn Cloud⁶ 是一个基于云的平台，旨在支持使用Python、⁷ R、⁸ Julia、⁹ 和其他编程语言工作的数据科学家。如图11.4所示的资源是Saturn
    Cloud平台的构建块。术语“资源”指的是一个完整的计算和编码环境。每个资源都是独立的，因此您可以将不同的活动分开。Saturn Cloud托管解决方案¹⁰
    是一种“按需付费”服务，这意味着您按小时支付计算资源费用。例如，在撰写本书期间，Medium（2个vCPU和4 GB RAM）和V100-16×Large（64个vCPU、8个vGPU和488
    GB RAM）资源的成本分别为每小时0.06美元和34.24美元。还存在一个资源有限的免费托管计划。接下来的章节将利用免费托管计划进行第一步扩展，之后将展示在Hosted
    Pro计划上获得的结果。如果您打算重现这些结果，还提供了有关成本的详细信息。


    ⁶ https://saturncloud.io.

    ⁷ https://www.python.org.

    ⁸ https://www.r-project.org.

    ⁹ https://julialang.org.

    ¹⁰ https://saturncloud.io/plans/hosted/.


    ### 在Saturn Cloud上加速GridSearchCV


    在第8.3节中，我们执行了GridSearchCV，这是对控制极端随机树算法的超参数进行的广泛搜索（见代码清单8.9和表8.1）。目的是找到提供最高准确度的超参数组合。这种超参数组合产生了48个模型的网格，每个模型通过交叉验证重复三次，总共144次尝试。如第8章所述，在我的配备2.3
    GHz四核Intel™ i7 CPU和32 GB RAM的MacBook pro上运行代码清单8.9大约需要8小时。


    ![](img/90d3084aebf7ededff86e49f84c52faa_187_0.png)


    在Saturn Cloud中，免费托管计划允许使用2× Large实例（即八个核心和64 GB RAM）对支持我的MacBook Pro的硬件进行轻微扩展，因此我们扩展到2×
    Large实例并运行代码清单8.9。首先，我们注册Saturn Cloud并点击“New Python Server”按钮（图11.5），这将启动一个引导程序，允许配置一个新的实例，为基本的Python数据分析、机器学习以及可能的Dask并行处理做好准备。


    图11.6和图11.7显示了配置新实例的所有步骤。建议使用一个不言自明的名称，例如*scale_GridSearchCV_Joblib*，100 Gi磁盘空间，以及2×large实例。另外，请记住添加*ytables*作为额外包；这是使用*Conda
    Install*安装的。PyTables库允许读取和保存HDF5文件。保持所有其他选项不变，然后点击*Create*。


    实例现在已准备就绪（图11.8）。接下来的步骤包括启动实例、创建新的Jupyter Notebook以及上传HDF5文件*ml_data.h5*（图11.9）。最后，我们准备在2×large实例中复制代码清单8.9（图11.10）。请注意，（图11.10）中的第二个代码块只是将输出报告到名为*data.log*的日志文件中。拟合（即第五个代码块）持续了5小时15分钟，这比我的MacBook
    Pro的8小时快得多。


    ![](img/90d3084aebf7ededff86e49f84c52faa_188_0.png)


    图11.5 启动新的python服务器


    接下来，我们激活Hosted Pro计划<sup>11</sup>，并将图11.10中的代码逐步扩展到8×Large实例（即32个核心和256 GB RAM，成本为3.30美元/小时）和16×Large实例（即64个核心和512
    GB RAM，成本为6.59美元/小时），将计算时间分别提高到大约2小时和1小时。


    最后一步，我扩展了图11.10中报告的代码。为此，我通过点击*New Dask Cluster*（图11.8）创建了一个Dask集群，这将打开集群配置窗口（图11.11）。此外，我选择了一个16×Large调度器（即64个核心和512
    GB RAM）和四个8×Large工作节点（即32个核心和256 GB RAM）。要在新创建的Dask集群中运行*GridSearchCV*，图11.10中报告的代码只需要最少的更改，这些更改都在图11.12中报告。我从*dask_saturn*导入了*SaturnCluster*（代码块1），为*ExtraTreesClassifier*和*GridSearchCV*都使用了*n_jobs
    = -1*（即嵌套并行）（代码块4），定义了*SaturnCluster*客户端（代码块5），并使用*dask*作为拟合引擎运行了*Joblib*（代码块6）。在最后一种情况下，拟合*GridSearchCV*耗时不到25分钟！


    <sup>11</sup> https://saturncloud.io/plans/hosted/.'

    # 6.2 Import Multi-Spectral Data to Python


    Multi-spectral data can be downloaded from numerous access points, such as the
    USGS Earth Explorer,^5 the Copernicus Open Access Hub,^6 and Theia.^7


    As an example, consider Fig. 6.2, which represents the recombination of the B4,
    B3, and B2 bands to form a RGB (i.e., red, green, blue) image from a Sentinel2
    acquisition downloaded from the Theia portal. The image location is southern New
    South Wales (Australia).^8 Each side of the square image measures about 110 km.


    Figure 6.3 shows the data structure of a Sentinel2 repository downloaded from
    Theia. The repository follows the MUSCATE^9 nomenclature and contains a metadata
    file, a quick-look file, numerous Geo-Tiff image files, and two sub-repositories
    MASKS and DATA, which contain supplementary data. The naming enables us to uniquely
    identify each product and consists of many tags, starting with a platform identification
    (i.e., Sentinel2B) followed by the date of acquisition in the format YYYYMMDD-HHmmSS-sss
    (e.g., 20210621-001635-722), with YYYY being the year, MM the month, DD the day,
    HH the hour in 24 hour format, mm the minutes, SS the seconds, and sss the milliseconds.
    The subsequent tags refer to product level (e.g., L2A), geographical zone (e.g.,
    T55HDB_C), and product version (e.g., V2-2). The letter L, a number, and another
    letter characterize different product levels with the exception of level L0, which
    is compressed raw data and is not followed by any letter. Levels L1A, L1B, and
    L2A correspond to uncompressed


    ^5 https://earthexplorer.usgs.gov.

    ^6 https://scihub.copernicus.eu.

    ^7 https://catalogue.theia-land.fr.

    ^8 https://bit.ly/ml_geart.

    ^9 https://www.theia-land.fr/en/product/sentinel-2-surface-reflectance/.'

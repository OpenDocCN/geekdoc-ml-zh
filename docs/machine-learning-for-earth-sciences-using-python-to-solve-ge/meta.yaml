    \ cannot be efficiently stored in text files such as .csv files or in Excel files.\
    \ Standard relational databases such as PostgreSQL, MySQL, and MS-SQL can store\
    \ large quantities of information but are inefficient (i.e., too slow) compared\
    \ with *state-of-the-art* high-performance data software libraries and file formats\
    \ for managing, processing, and storing huge amounts of data. The formal definition\
    \ of Big Data proposed by De Mauro et al. (2016) covers the three concepts of\
    \ volume, velocity, and variety: “Big Data is the Information asset characterized\
    \ by such a High Volume, Velocity and Variety to require specific Technology and\

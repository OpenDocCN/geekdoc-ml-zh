    ## 7.8 弹性网络


    弹性网络（Zou & Hastie, 2005）是一种同时执行L1和L2范数正则化的线性回归模型（Friedman et al., 2010）：


    $$C(\theta_0, \boldsymbol{\theta}) = \frac{1}{2n} \sum_{i=1}^{n} \left( y_i -
    \theta_0 - \sum_{j=1}^{p} x_{ij} \theta_j \right)^2 + \lambda \sum_{j=1}^{p} \left[
    \frac{1-\alpha}{2} \theta_j^2 + \alpha |\theta_j| \right]. \quad (7.37)$$


    当$\alpha = 1$时，弹性网络与LASSO相同；而当$\alpha = 0$时，弹性网络趋近于岭回归。对于$0 < \alpha < 1$，惩罚项（即公式(7.37)的第二项）介于L1和L2范数正则化之间。


    ## 7.9 支持向量机


    支持向量机（SVMs）是一组监督式机器学习算法，在分类任务中表现卓越（Cortes & Vapnik, 1995）。SVMs的优势依赖于三个特点：（1）SVMs在高维空间中效率很高，（2）SVMs能有效建模现实世界问题，（3）SVMs在具有许多属性的数据集上表现良好，即使可用于训练模型的样本很少（Cortes
    & Vapnik, 1995）。SVMs在数值上实现了以下思想：输入被非线性映射到高维特征空间$F$（Cortes & Vapnik, 1995），并在该空间$F$中构建一个线性决策面（Cortes
    & Vapnik, 1995）。


    首先，考虑一个带标签的训练数据集$(y_i, \boldsymbol{x}_i)$，其中$\boldsymbol{x}_i$是$p$维的[即$\boldsymbol{x}_i
    = (x_{1i}, x_{2i}, \ldots, x_{pi})$]，$i = 1, 2, \ldots, n$，$n$是样本数量。同时，假设第一类的标签$y_i
    = 1$，第二类的标签$y_i = -1$，定义了一个二分类问题（即$y_i \in \{-1, 1\}$）。


    现在，基于以下线性输入判别函数定义一个线性分类器：


    $$f(\boldsymbol{x}) = \boldsymbol{w}^T \cdot \boldsymbol{x} + b. \quad (7.38)$$


    由公式(7.38)定义的两类之间的决策边界（即被分类为正或负的区域）是一个超平面。


    如果存在一个向量$\boldsymbol{w}$和一个标量$b$使得


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1, \quad \forall i = 1, 2, \ldots,
    n. \quad (7.39)$$


    则这两类是线性可分的。这意味着我们可以正确分类所有样本。最优超平面的定义如下：它以最大间隔分离训练数据集


    $$m(\boldsymbol{w}) = \frac{1}{\|\boldsymbol{w}\|}. \quad (7.40)$$


    最后，最大间隔分类器（即硬间隔SVM）是使$m(\boldsymbol{w})$最大化的判别函数，这等价于最小化$\|\boldsymbol{w}\|^2$：


    $$\min_{\boldsymbol{w}, b} \frac{1}{2} \|\boldsymbol{w}\|^2 \quad (7.41)$$


    约束条件为


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1, \quad \forall i = 1, 2, \ldots,
    n. \quad (7.42)$$


    硬间隔SVM要求类别线性可分的强假设，这可以被视为例外，而非普遍规则。为了允许误差[即$\boldsymbol{\xi} = (\xi_1, \xi_2,
    \ldots, \xi_n)$]，我们可以引入软间隔SVM的概念：


    $$\min_{\boldsymbol{w}, b, \boldsymbol{\xi}} \left[ \frac{1}{2} \|\boldsymbol{w}\|^2
    + C \sum_{i=1}^n \xi_i \right] \quad (7.43)$$


    约束条件为


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1 - \xi_i, \quad \xi_i \geq
    0, \quad \forall i = 1, 2, \ldots, n, \quad (7.44)$$


    其中$C > 0$是一个可调参数，用于控制间隔误差。由公式(7.38)定义的线性分类器可以通过定义判别函数（Cortes & Vapnik, 1995）推广到非线性输入


    $$f(\mathbf{x}) = \mathbf{w}^T \cdot \phi(\mathbf{x}) + b, \quad (7.45)$$


    其中$\phi(\mathbf{x})$是一个函数，它将非线性可分的输入$\mathbf{x}$映射到更高维度的特征空间$F$。如果我们将权重向量$\mathbf{w}$表示为训练样本的线性组合（即$\mathbf{w}
    = \sum_{i=1}^n \alpha_i \mathbf{x}_i$），那么在特征空间$F$中，我们有


    $$f(\mathbf{x}) = \sum_{i=1}^n \alpha_i \phi(\mathbf{x}_i)^T \phi(\mathbf{x})
    + b. \quad (7.46)$$


    公式(7.45)和(7.46)背后的思想是将非线性分类函数映射到更高维度的特征空间$F$，在该空间中分类函数是线性的（图7.4）。定义一个核函数$K(\mathbf{x}_i,
    \mathbf{x})$为


    $$K(\mathbf{x}_i, \mathbf{x}) = \phi(\mathbf{x}_i)^T \phi(\mathbf{x}), \quad (7.47)$$


    我们有


    $$f(\mathbf{x}) = \sum_{i=1}^n \alpha_i K(\mathbf{x}_i, \mathbf{x}) + b. \quad
    (7.48)$$


    使用核函数时，我们不需要知道或计算$\phi()$，这使我们能够将线性变换应用于更高维度的问题。scikit-learn中的SVM实现[例如$SVC()$和$SVR()$]允许使用线性、多项式、Sigmoid和径向基核函数[$K(\mathbf{x}_i,
    \mathbf{x})$，表7.1]。


    ## 7.10 监督式最近邻


    监督式$k$近邻是一种机器学习算法，它使用相似性（如距离函数（Bentley, 1975））进行回归和分类。具体来说，$k$近邻方法通过使用一个度量（通常是$k$个最近邻的逆距离加权平均）来预测数值目标（Bentley,
    1975）。权重可以是均匀的，也可以通过核函数计算。欧几里得距离度量通常用于测量两个实例之间的距离，尽管也有其他度量可用（见表7.2）。请注意，闵可夫斯基距离在$p
    = 1$和$2$时分别简化为曼哈顿距离和欧几里得距离。Bentley (1975) 对$k$近邻算法进行了广泛而详细的描述。


    在scikit-learn中，$KNeighborsClassifier()$和$KNeighborsRegressor()$方法分别基于$k$近邻执行分类和回归。



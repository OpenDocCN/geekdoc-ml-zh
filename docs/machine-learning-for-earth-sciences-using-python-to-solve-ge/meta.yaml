    **Listing 3.15** How to get the results of *GridSearchCV()*


    Using the *k*-fold cross-validation, *n* different candidate models can be evaluated
    by repeating *n* times the *k*-fold CV. As an example, the *GridSearchCV()* method
    in scikit-learn performs an exhaustive search (i.e., it evaluates all possible
    combinations of the proposed parameters) over a range of parameter values for
    a specific estimator (i.e., a ML algorithm). As an example, the method *GridSearchCV()*
    can be used to determine the best choice for the hyperparameters of a ML algorithm,
    such as the *C* parameter and the “kernel function” of a support vector machine
    (see Sect. 7.9). The code listing 3.14 shows in detail how to define the grid
    for the selected hyperparameters (line 9). On line 10, we define the model (i.e.,
    a support vector classifier). On line 12, we define the grid search for our support
    vector classifier model, using the parameters defined on line 9, a fourfold cross-validation,
    and accuracy as a metric. Finally, on line 15 we physically perform the grid search
    for all combinations among the defined parameters. In detail, line 9 defines two
    kernel functions and three values for *C*. Therefore, the grid search performs
    six cross-validations and splits the *scaled_X* data set into four folds.


    Code listing 3.15 shows how to get the results of a *GridSearchCV()*. More specifically,
    the *best_estimator_*, *best_score_*, and *cv_results_* attributes provide us
    with the optimal combination of hyperparameters, the best score, and a dictionary
    containing all the results, respectively.


    # 3.5.3 Leave-One-Out Cross-Validation


    The Leave-one-out (or LOO) cross-validation is a limiting case of the *k*-fold
    CV. When using the LOO approach, each training set is created by taking all the
    samples except one. The test set is then created by using the sample left out.'

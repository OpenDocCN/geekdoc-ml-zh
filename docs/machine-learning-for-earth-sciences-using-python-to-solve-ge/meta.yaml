    \ 百分位数数据的行（第 11–13 行）。\n\n## 5.4.2 成分数据分析 (CoDA)\n\n地球化学数据集的研究属于成分数据分析 (CoDA)\
    \ 领域。在此背景下，氧化物以百分比表示，因此其名义总和为 100%，这定义了一个“封闭”或“成分”数据集（Aitchison, 1982, 1984; Aitchison\

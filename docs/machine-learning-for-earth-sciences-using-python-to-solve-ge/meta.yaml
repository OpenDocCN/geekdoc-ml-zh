    # Chapter 2

    Setting Up Your Python Environments

    for Machine Learning


    # 2.1 Python Modules for Machine Learning


    The development of A ML model in Python uses both general-purpose scientific libraries
    (e.g., NumPy, ScyPy, and pandas) and specialized modules (e.g., scikit-learn,¹
    PyTorch,² and TensorFlow³).


    **Scikit-Learn** Scikit-learn is a Python module that solves small- to medium-scale
    ML problems (Pedregosa et al., 2011). It implements a wide range of state-of-the-art
    ML algorithms, making it one of the best options to start learning ML (Pedregosa
    et al., 2011).


    **PyTorch** PyTorch is a Python package that combines high-level features for
    tensor management, neural network development, autograd computation, and back-propagation
    (Paszke et al., 2019). The PyTorch library grows within Meta’s AI⁴ (formerly Facebook
    AI) research team. In addition, it benefits from a strong ecosystem and a large
    user community that supports its development (Papa, 2021).


    **TensorFlow** TensorFlow began at Google, and it was open-sourced in 2015. It
    combines tools, libraries, and community resources to develop and deploy DL models
    in Python (Bharath & Reza Bosagh, 2018).


    ¹ https://scikit-learn.org.

    ² https://pytorch.org.

    ³ https://www.tensorflow.org.

    ⁴ https://ai.facebook.com.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2023

    M. Petrelli, *Machine Learning for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment,

    https://doi.org/10.1007/978-3-031-35114-3_2'

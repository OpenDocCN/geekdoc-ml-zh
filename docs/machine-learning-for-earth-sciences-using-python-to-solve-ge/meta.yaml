    \ 2021）的策略来移除异常值，或应用稳健缩放器（参见第3.3.5段）。\n\n## 6.4 预处理与聚类\n\n本节介绍了一个简化的流程来对我们的Sentinel2数据进行聚类。作为输入特征，我使用了*my_array_1d*，它包含来自B2、B3、B4和B8的反射率数据。请注意，文献中报道了许多不同的策略来选择输入特征，例如使用波段比值、特定指数或波段、波段比值和指数的组合（例如，Ge\

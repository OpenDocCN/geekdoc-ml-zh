    \ 和 4），前提是 GPU 可用。\n\n## 12.5 如何训练前馈网络\n\n### 12.5.1 万能近似定理\n\n万能近似定理（Hornik 等人，1989；Cybenko，1989）指出，具有线性输出层和至少一个隐藏层的前馈网络可以近似\
    \ $\\mathbb{R}^n$ 的任何闭有界子集上的任何连续函数（Goodfellow 等人，2016），这意味着具有隐藏层的前馈网络是万能近似器（Goodfellow\
    \ 等人，2016）。换句话说，“万能近似定理意味着无论我们试图学习什么函数，我们都知道一个大型的[多层感知机]将能够表示这个函数”（Goodfellow\
    \ 等人，2016）。然而，尽管万能近似定理如此断言，但并不能保证训练过程会正确地学习目标函数（Goodfellow 等人，2016）。例如，用于训练的优化算法可能无法找到描述所需函数的\
    \ theta 参数的正确值。此外，训练过程可能会因为过拟合而选择错误的函数（Goodfellow 等人，2016）。为了避免这些问题，我们希望找到 (1)\
    \ 一个稳健的损失函数 $L(\\theta)$，(2) 一种计算模型参数梯度的策略 [即 $L(\\theta)$ 的 $\\Delta_{\\theta}L(\\\
    theta)$]，以及 (3) 一种高效的优化算法来下降 $\\Delta_{\\theta}L(\\theta)$ 并找到 $L(\\theta)$ 的最小值。\n\
    \n### 12.5.2 PyTorch 中的损失函数\n\n损失函数（或代价函数）计算一个数值，学习过程将尝试最小化该数值（参见第 7.5 节）。通常，损失函数通过（例如，减法）比较期望输出（即标签）和模型的当前输出（Stevens\
    \ 等人，2020）。表 12.1 列出了 PyTorch 中可用的损失函数。\n\n### 12.5.3 反向传播及其在 PyTorch 中的实现\n\n\
    在前馈神经网络中，信息从输入 $\\mathbf{x}$ 开始，流经隐藏层，最终产生输出 $\\mathbf{y}$（Goodfellow 等人，2016）。这个过程的名称是前向传播。在训练开始时，前向传播产生一个输出\

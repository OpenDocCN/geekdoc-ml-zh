    # 5.1 Unveil the Chemical Record of a Volcanic Eruption


    Unsupervised machine learning methods can help us decode the chemical record stored
    in the crystal cargo of a single eruption or multiple volcanic events (Caricchi
    et al., 2020b; Boschetty et al., 2022; Musu et al., 2023). This record often includes
    the major element’s chemical composition (i.e., multivariate compositional data)
    of different crystal phases such as olivine, clinopyroxene, orthopyroxene, amphibole,
    plagioclase, garnet, and quartz (Boschetty et al., 2022; Aitchison & Egozcue,
    2005; Aitchison, 1982, 1984). Each of these phases provides clues to unravel the
    complex dynamics of a volcanic plumbing system (Ubide et al., 2021) and its evolution
    (Costa et al., 2020; Petrelli & Zellmer, 2020).


    During the crystallization process (Fig. 5.1), minerals grow and adapt their textural
    aspect and chemistry to the melt compositions and the thermodynamic conditions
    of the magmatic system (Ubide et al., 2021). For example, concentric chemical
    zones from the core to the rim of a crystal reflect the sequential changes over
    time imposed by the magmatic system (Fig. 5.1). Moderate-to-rapid growths at intermediate-to-high
    degrees of undercooling ($\Delta T = T_{\text{liquidus}} - T_{\text{crystallisation}}$)
    may result in sector zoning in euhedral crystals or skeletal to dendritic textures
    (Fig. 5.1). In addition, diffusive re-equilibration of compositional gradients
    can further modify chemical patterns in crystals (Costa et al., 2020; Petrelli
    & Zellmer, 2020).


    At shallow crustal levels (Fig. 5.1), pre- and syn-eruptive dynamics include a
    complex range of processes, including magma fractionation, recharge, mixing, assimilation,
    and degassing (Ubide et al., 2021). Interrogating the crystal cargo of an eruption
    provides us with the requisite information to unravel the complex'

    Tensors (i.e., multidimensional arrays) are at the base of PyTorch. Also, PyTorch
    hosts the *autograd* engine (see *torch.autograd*), which can compute derivatives,
    even providing complex data structures. The other PyTorch modules are mainly based
    on tensors and on the *autograd* engine. For example, the *torch.nn* module provides
    common neural network layers and other architectural components. The *torch.optim*
    implements *state-of-the-art* optimization strategies for the learning process
    (Imambi et al., 2021).


    # 12.3 PyTorch Tensors


    PyTorch tensors are multidimensional arrays (Fig. 12.3), similar to those in NumPy.
    However, in contrast with NumPy arrays, PyTorch tensors can (1) perform accelerated
    operations on graphical processing units (GPUs), (2) natively work on distributed
    environments, and (3) keep track of a graph of operations when necessary (Imambi
    et al., 2021). The initialization of PyTorch tensors mimics what is done with
    NumPy arrays. Finally, Numpy arrays can be easily imported as PyTorch tensors
    (Fig. 12.4).



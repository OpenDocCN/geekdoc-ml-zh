- md: "## Part III\nSupervised Learning\n\n## Chapter 7\nSupervised Machine Learning\
    \ Methods\n\n### 7.1 Supervised Algorithms\n\nTo learn, supervised algorithms\
    \ use the labels (i.e., the solutions) that appear in the training data set. This\
    \ chapter introduces the supervised ML algorithms for regression and classification\
    \ that are shown in Fig. 3.5. In addition, specific references are given for those\
    \ who wish to go deeper into the mathematics behind these ML methods.\n\n### 7.2\
    \ Naive Bayes\n\nSince Bayesian statistics is rarely introduced to geology students,\
    \ I introduce Bayes theorem here before describing how it is applied in ML (e.g.,\
    \ naive Bayes).\n\n**Probabilities** Figure 7.1 describes a simplified set of\
    \ rock textures containing $n_{\\text{tot}} = 10$ elements. The set comes from\
    \ six porphyritic, one holocrystalline, and three aphyric igneous rocks. The probability\
    \ $P(\\text{ol})$ of randomly picking a rock containing olivines is thus 3/10.\
    \ In Bayesian statistical inference, the probability $P(\\text{ol})$ is called\
    \ the “prior probability,” which is the probability of an event before new data\
    \ are collected.\n\n**Conditional Probabilities** Assume now that we want to know\
    \ the probability of picking a rock containing olivines if we pick a rock characterized\
    \ by a dark matrix. In this case, the conditional probability $P(\\text{ol}|\\\
    text{dark}) = 1/3$.\n\n**Joint Probabilities** Please keep in mind that the term\
    \ “conditional probability” is not a synonym of “joint probability” and these\
    \ two concepts should not be confused. Also, be sure to use the correct notation:\
    \ for joint probability, the terms are separated by commas [e.g., *P* (ol, dark)],\
    \ whereas for conditional probability, the terms are separated by a vertical bar\
    \ [e.g., *P* (ol|dark)]. Note that *P* (ol, dark) is the probability of randomly\
    \ picking a rock that contains olivines and is characterized by a dark matrix\
    \ [i.e., *P* (ol, dark) = 1/10]. In contrast, *P* (ol|dark) is the probability\
    \ of a rock containing olivines from among those that have a dark matrix, *P*\
    \ (ol|dark) = 1/3. Joint probabilities and conditional probabilities are related\
    \ as follows:\n\n$$P(\\text{ol, dark}) = P(\\text{ol|dark})P(\\text{dark}).$$\n\
    \n**Deriving the Bayes Formulation** As in Eq. (7.1), we could write\n\n$$P(\\\
    text{dark, ol}) = P(\\text{dark|ol})P(\\text{ol}).$$\n\nSince $P(\\text{dark},\
    \ \\text{ol}) = P(\\text{ol}, \\text{dark})$, the right-hand terms of Eqs. (7.1)\
    \ and (7.2) must be equal:\n\n$$P(\\text{dark}|\\text{ol})P(\\text{ol}) = P(\\\
    text{ol}|\\text{dark})P(\\text{dark}). \\tag{7.3}$$\n\nDividing both sides of\
    \ Eq. (7.3) by $P(\\text{ol})$, we get Bayes formula for our specific case:\n\n\
    $$P(\\text{dark}|\\text{ol}) = \\frac{P(\\text{ol}|\\text{dark})P(\\text{dark})}{P(\\\
    text{ol})}. \\tag{7.4}$$\n\nGeneralizing Eq. (7.4), we get the well-known Bayes\
    \ equation:\n\n$$P(A|B) = \\frac{P(B|A)P(A)}{P(B)}. \\tag{7.5}$$\n\n**Naive Bayes\
    \ for Classification** To understand the naive Bayes ML algorithm, I propose the\
    \ same workflow as described by Zhang (2004). Assume that you want to classify\
    \ a set $X = (x_1, x_2, x_3, \\dots, x_n)$ and that $c$ is the label of your class.\
    \ For simplicity, assume that $c$ is strictly positive (+) or negative (-); in\
    \ other words, we have only two classes. In this case, the Bayes formula takes\
    \ the form\n\n$$P(c|X) = \\frac{P(X|c)P(c)}{P(X)}. \\tag{7.6}$$\n\n$X$ is classified\
    \ as being in class $c = +$ if and only if\n\n$$f_b(X) = \\frac{P(c = +|X)}{P(c\
    \ = -|X)} \\geq 1, \\tag{7.7}$$\n\nwhere $f_b(X)$ is the Bayesian classifier.\n\
    \nNow assume that all the features are independent (i.e., the naive assumption).\
    \ We can write\n\n$$P(X|c) = P(x_1, x_2, x_3, \\dots, x_n|c) = \\prod_{i=1}^{n}\
    \ P(x_i|c). \\tag{7.8}$$\n\nThe resulting naive Bayesian classifier $f_{nb}(X)$,\
    \ or simply “naive Bayes” classifier, can be written as\n\n$$f_{nb}(X) = \\frac{P(c\
    \ = +)}{P(c = -)} \\prod_{i=1}^{n} \\frac{P(x_i|c = +)}{P(x_i|c = -)}. \\tag{7.9}$$\n\
    \nNote that the naive assumption is a strong constraint that, in Earth Sciences,\
    \ is often violated. If feature independence is violated, we have two options:\
    \ The first is to estimate $P(X|c)$ without using the naive assumption (Kubat,\
    \ 2017). However, using this option inevitably increases the complexity of the\
    \ problem (Kubat, 2017). The second option is more pragmatic: we reduce the feature\
    \ dependence by appropriate data pre-processing. As suggested by Kubat (2017),\
    \ a starting point is to avoid using redundant features.\n\nIn scikit-learn the\
    \ *GaussianNB()* method implements the Gaussian naive Bayes algorithm for classification\
    \ with $P(X|c)$ assumed to be multivariate normal distributed.\n\n### 7.3 Quadratic\
    \ and Linear Discriminant Analysis\n\nLike naive Bayes, quadratic and linear discriminant\
    \ analyses (QDA and LDA, respectively) rely on the Bayes theorem. Assume that\
    \ $f_c(x)$ is the class-conditional density of $X$ in class $c$, and let $\\pi_c$\
    \ be the prior probability of class $c$, with $\\sum_{c=1}^K \\pi_c = 1$, where\
    \ $K$ is the number of classes. The Bayes theorem states (Kubat, 2017)\n\n$$P(c|X)\
    \ = \\frac{f_c(x)\\pi_c}{\\sum_{l=1}^K f_l(x)\\pi_l}.$$\n\nNow, modeling each\
    \ class density as multivariate Gaussian,\n\n$$f_c(x) = \\frac{1}{(2\\pi)^{p/2}\
    \ |\\Sigma_c|^{1/2}} e^{-\\frac{1}{2}(x-\\mu_c)^T \\Sigma_c^{-1}(x-\\mu_c)}.$$\n\
    \nwe define the QDA. The LDA constitutes a special case of the QDA if the classes\
    \ have a common covariance matrix (i.e., $\\Sigma_c = \\Sigma \\ \\forall \\ c$).\
    \ The main difference between LDA and QDA depends on the resulting decision boundaries\
    \ being linear or quadratic functions, respectively.\n\nThe algorithms for LDA\
    \ and QDA are similar, except that separate covariance matrices must be estimated\
    \ for each class in QDA. Given a large number of features, this implies a dramatic\
    \ increase in the computed parameters. For $K$ classes and $p$ features, LDA and\
    \ QDA compute $(K-1)x(p+1)$ and $(K-1)x[p(p+3)/2+1]$ parameters, respectively.\
    \ In scikit-learn, the methods *LinearDiscriminantAnalysis()* and *QuadraticDiscriminantAnalysis()*\
    \ perform LDA and QDA, respectively.\n\n### 7.4 Linear and Nonlinear Models\n\n\
    Sugiyama (2015) defines $d$-dimensional linear-in-parameter models as\n\n$$f_{\\\
    theta}(\\boldsymbol{x}) = \\sum_{j=i}^b \\theta_j \\phi_j(\\boldsymbol{x}) = \\\
    boldsymbol{\\theta}^T \\boldsymbol{\\phi}(\\boldsymbol{x}),$$\n\nwhere $\\boldsymbol{x}$,\
    \ $\\boldsymbol{\\phi}$, and $\\boldsymbol{\\theta}$ are a $d$-dimensional input\
    \ vector, a basis function, and the parameters of the basis function, respectively,\
    \ and $b$ is the number of basis functions. As an example, given a one-dimensional\
    \ input, Eq.(7.12) reduces to (Sugiyama, 2015)\n\n$$f_{\\boldsymbol{\\theta}}(\\\
    boldsymbol{x}) = \\sum_{j=i}^{b} \\theta_j \\phi_j(\\boldsymbol{x}) = \\boldsymbol{\\\
    theta}^T \\boldsymbol{\\phi}(\\boldsymbol{x}), \\quad (7.13)$$\n\nwhere\n\n$$\\\
    boldsymbol{\\phi}(\\boldsymbol{x}) = (\\phi_1(\\boldsymbol{x}), \\dots, \\phi_b(\\\
    boldsymbol{x}))^T, \\quad (7.14)$$\n\nand\n\n$$\\boldsymbol{\\theta} = (\\theta_1,\
    \ \\dots, \\theta_b)^T. \\quad (7.15)$$\n\nNote that linear-in-parameter models\
    \ are linear in $\\boldsymbol{\\theta}$ and can handle straight lines (i.e., linear-in-input\
    \ models such as code listing 7.1 and Fig. 7.2):\n\n$$\\boldsymbol{\\phi}(\\boldsymbol{x})\
    \ = (1, x)^T, \\quad (7.16)$$\n\n$$\\boldsymbol{\\theta} = (\\theta_1, \\theta_2)^T.\
    \ \\quad (7.17)$$\n\nLinear-in-parameter models can also manage nonlinear functions\
    \ such as polynomials (e.g., code listing 7.1 and Fig. 7.2):\n\n$$\\boldsymbol{\\\
    phi}(\\boldsymbol{x}) = (1, x, x^2, \\dots, x^{b-1})^T, \\quad (7.18)$$\n\n$$\\\
    boldsymbol{\\theta} = (\\theta_1, \\theta_2, \\dots, \\theta_b)^T. \\quad (7.19)$$\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nx = np.arange(1,6)\n\
    y = np.array([0,1,2,9,9])\n\nfig, ax = plt.subplots()\nax.scatter(x, y, marker\
    \ = 'o', s = 100, color = '#c7ddf4',\n    edgecolor = 'k')\n\norders = np.array([1,2,4])\n\
    colors = ['#ff464a','#342a77','#4881e9']\nlinestiles = ['-','--','-.']\n\nfor\
    \ order, color, linestile in zip(orders, colors, linestiles):\n    betas = np.polyfit(x,\
    \ y, order)\n    func = np.poly1d(betas)\n    x1 = np.linspace(0.5,5.5, 1000)\n\
    \    y1 = func(x1)\n    ax.plot(x1, y1, color=color, linestyle=linestyle, label=\"\
    Linear-in-parameters model of order \" + str(order))\n\nax.legend()\nax.set_xlabel('A\
    \ quantity relevant in geology\\n(e.g., time)')\nax.set_ylabel('A quantity relevant\
    \ in geology\\n(e.g., spring flow rate)')\nfig.tight_layout()\n```\n\n**Listing\
    \ 7.1** Polynomial regression as example of linear-in-parameter modeling\n\n**Fig.\
    \ 7.2** Result of code listing 7.1\n\nGiven an input vector $x$ of $p$ values,\
    \ linear-in-parameter models can still manage linear-in-input problems, such as\
    \ managing hyper-planes:\n\n$$\\phi(x) = (1, x_1, x_2, \\dots, x_p)^T, \\quad\
    \ (7.20)$$\n$$\\theta = (\\theta_1, \\theta_2, \\dots, \\theta_b)^T. \\quad (7.21)$$\n\
    \nIn this case, the number of basis functions corresponds to the dimension of\
    \ the input vector plus one (i.e., $b = p + 1$). Some authors prefer to report\
    \ the first term of"
  mdcn: "## 第三部分\n监督学习\n\n## 第七章\n监督机器学习方法\n\n### 7.1 监督算法\n\n监督算法通过使用训练数据集中出现的标签（即解决方案）来进行学习。本章将介绍图3.5中所示的用于回归和分类的监督机器学习算法。此外，对于希望深入了解这些机器学习方法背后数学原理的读者，我们提供了具体的参考文献。\n\
    \n### 7.2 朴素贝叶斯\n\n由于地质学学生很少接触贝叶斯统计，因此在描述其在机器学习（例如，朴素贝叶斯）中的应用之前，我先在此介绍贝叶斯定理。\n\
    \n**概率** 图7.1描述了一个简化的岩石结构集合，包含 $n_{\\text{tot}} = 10$ 个元素。该集合来自六块斑状、一块全晶质和三块无斑晶的火成岩。因此，随机挑选一块含有橄榄石的岩石的概率\
    \ $P(\\text{ol})$ 为 3/10。在贝叶斯统计推断中，概率 $P(\\text{ol})$ 被称为“先验概率”，即在收集新数据之前事件发生的概率。\n\
    \n**条件概率** 假设我们现在想知道，如果挑选一块具有暗色基质的岩石，那么这块岩石含有橄榄石的概率是多少。在这种情况下，条件概率 $P(\\text{ol}|\\\
    text{dark}) = 1/3$。\n\n**联合概率** 请记住，“条件概率”一词并非“联合概率”的同义词，这两个概念不应混淆。同时，请务必使用正确的符号：对于联合概率，各项之间用逗号分隔\
    \ [例如，*P* (ol, dark)]，而对于条件概率，各项之间用竖线分隔 [例如，*P* (ol|dark)]。请注意，*P* (ol, dark)\
    \ 是随机挑选一块既含有橄榄石又具有暗色基质的岩石的概率 [即，*P* (ol, dark) = 1/10]。相比之下，*P* (ol|dark) 是在具有暗色基质的岩石中，含有橄榄石的岩石的概率，*P*\
    \ (ol|dark) = 1/3。联合概率和条件概率的关系如下：\n\n$$P(\\text{ol, dark}) = P(\\text{ol|dark})P(\\\
    text{dark}).$$\n\n**推导贝叶斯公式** 如公式 (7.1) 所示，我们可以写成\n\n$$P(\\text{dark, ol}) = P(\\\
    text{dark|ol})P(\\text{ol}).$$\n\n由于 $P(\\text{dark}, \\text{ol}) = P(\\text{ol},\
    \ \\text{dark})$，公式 (7.1) 和 (7.2) 的右边项必须相等：\n\n$$P(\\text{dark}|\\text{ol})P(\\\
    text{ol}) = P(\\text{ol}|\\text{dark})P(\\text{dark}). \\tag{7.3}$$\n\n将公式 (7.3)\
    \ 两边同时除以 $P(\\text{ol})$，我们得到针对此特定情况的贝叶斯公式：\n\n$$P(\\text{dark}|\\text{ol}) =\
    \ \\frac{P(\\text{ol}|\\text{dark})P(\\text{dark})}{P(\\text{ol})}. \\tag{7.4}$$\n\
    \n将公式 (7.4) 推广，我们得到著名的贝叶斯方程：\n\n$$P(A|B) = \\frac{P(B|A)P(A)}{P(B)}. \\tag{7.5}$$\n\
    \n**用于分类的朴素贝叶斯** 为了理解朴素贝叶斯机器学习算法，我提出与 Zhang (2004) 描述的相同的工作流程。假设你想对一个集合 $X = (x_1,\

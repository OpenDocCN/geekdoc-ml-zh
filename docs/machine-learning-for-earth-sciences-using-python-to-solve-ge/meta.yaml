    $$f_{\theta}(\boldsymbol{x}) = \sum_{j=i}^b \theta_j \phi_j(\boldsymbol{x}) =
    \boldsymbol{\theta}^T \boldsymbol{\phi}(\boldsymbol{x}),$$'

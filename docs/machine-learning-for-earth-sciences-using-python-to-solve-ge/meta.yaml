    \ R., Bilenko, M., & Langford, J. (2012). *Scaling up machine learning: Parallel\
    \ and distributed approaches*. Cambridge: Cambridge University Press.\n\n## Part\
    \ V\n\n## Next Step: Deep Learning\n\n## Chapter 12\nIntroduction to Deep Learning\n\
    \n### 12.1 What Does Deep Learning Mean?\n\nAs introduced in Chap. 1, ML algorithms\
    \ gather knowledge by extracting patterns from data.\n\nIn other words, they try\
    \ to map the representation provided by the investigated features to produce an\
    \ output (Goodfellow et al., 2016). Therefore, features are central in ML because\
    \ they provide the information to build a representation. However, simply mapping\
    \ a representation to deliver an output is often insufficient. Therefore, we must\
    \ train ML systems to discover not only the mapping from representation to output\
    \ but also the representation itself (Goodfellow et al., 2016). This approach\
    \ is known as representation learning. In complex problems (e.g., problems characterized\
    \ by many features or extremely large data sets), learning the representation\
    \ is not straightforward.\n\n> “Deep learning solves this central problem in representation\
    \ learning by introducing representations that are expressed in terms of other,\
    \ simpler representations. Deep learning enables the computer to build complex\
    \ concepts out of simpler concepts” (Goodfellow et al., 2016).\n\nA typical example\
    \ of deep learning is the multilayer perceptron, which is a mathematical function\
    \ that maps a set of inputs to output values (Goodfellow et al., 2016). The function\
    \ is formed by combining many simpler functions (Fig. 12.1). To better understand,\
    \ Fig. 12.1 shows how a deep learning method can represent the\n\n![](img/90d3084aebf7ededff86e49f84c52faa_198_0.png)\n\
    \nconcept of an image by combining simpler notions, such as corners and contours,\
    \ which are in turn defined in terms of edges (Goodfellow et al., 2016). In Fig.\
    \ 12.1, the input feeds the visible layer and then a series of hidden layers progressively\
    \ extracts and elaborates abstract features from the initial inputs. The final\
    \ layer provides the output (e.g., the result of mapping the representation developed\
    \ during the learning process) (Goodfellow et al., 2016).\n\nFrom the mathematical\
    \ point of view, a deep feedforward network (or multilayer perceptron) aims to\
    \ approximate some function $f^*$ (Goodfellow et al., 2016). In detail, it defines\
    \ a mapping $\\mathbf{y} = f(\\mathbf{x}; \\boldsymbol{\\theta})$ and learns the\
    \ value of the parameters $\\boldsymbol{\\theta}$ that result in the most accurate\
    \ approximation of the function (Goodfellow et al., 2016) (Fig. 12.2). Why feedforward?\
    \ Because data flow through the function from the input $\\mathbf{x}$, through\
    \ the intermediate computations used to define $f$, and finally to the output\
    \ $\\mathbf{y}$. Why networks? Because networks are typically expressed by combining\
    \ many different functions. For example, we might combine three functions $f^{(1)}$,\
    \ $f^{(2)}$, and $f^{(3)}$ in a chain to define $f(x) = f^{(3)}(f^{(2)}(f^{(1)}(x)))$\
    \ (Goodfellow et al., 2016). In detail, $f^{(1)}$ is the first layer of the network,\
    \ $f^{(2)}$ is the second layer, and so on (Goodfellow et al., 2016). The overall\
    \ length of the chain defines the depth of the model. That's why they are deep.\
    \ The final layer of a feedforward network provides the output. During the training\
    \ process, we adjust $\\boldsymbol{\\theta}$ parameters in $f(\\mathbf{x}; \\\
    boldsymbol{\\theta})$ to match $f^*(\\mathbf{x})$ (Goodfellow et al., 2016)."

    \ nonlinear modeling (Sugiyama, 2015).\n\n## 7.5 Loss Functions, Cost Functions,\
    \ and Gradient Descent\n\nMost ML algorithms involve model optimization [e.g.,\
    \ $f_{\\theta}(\\boldsymbol{x})$ in Eq. (7.13)]. For the purposes of this book,\
    \ the term “optimization” shall refer to adjusting the model parameters $\\boldsymbol{\\\
    theta}$ to minimize or maximize a function that measures the consistency between\
    \ model predictions and training data.\n\nIn general, the function we want to\
    \ minimize or maximize is called the **objective function** (Goodfellow et al.,\
    \ 2016). In the case of minimization, the objective function takes names such\
    \ as cost function, loss function, and error function. These terms are often interchangeable\
    \ Goodfellow et al. (2016), but sometimes a specific term is used such as loss\
    \ or cost function to describe a specific task.\n\nAs an example, some authors\
    \ use the term **loss function** to measure how well a model agrees with a single\
    \ label in the training data set (Goodfellow et al., 2016). The square loss is\
    \ an example of a loss function:\n\n$$L(\\boldsymbol{\\theta}) = [y_i - f_{\\\
    theta}(\\boldsymbol{x}_i)]^2, \\quad (7.25)$$\n\nwhere $y_i$ and $f_{\\theta}(\\\
    boldsymbol{x}_i)$ are the labeled (i.e., true or measured) values and those predicted\
    \ by our model, respectively. Also, $\\boldsymbol{x}$ and $\\boldsymbol{\\theta}$\
    \ are the inputs and the parameters governing the model, respectively.\n\nSimilarly,\
    \ the **cost function** evaluates the loss function over the entire data set and\
    \ helps to evaluate the overall performance of the model (Goodfellow et al., 2016).\
    \ The mean squared error is an example of a cost function:\n\n$$C(\\boldsymbol{\\\
    theta}) = \\frac{1}{n} \\sum_{i=1}^{n} [y_i - f_{\\theta}(\\boldsymbol{x}_i)]^2,\
    \ \\quad (7.26)$$\n\nwhere $n$ is the number of elements in the training data\
    \ set.\n\nTypically, our aim is to minimize the cost function $C(\\boldsymbol{\\\
    theta})$, and the gradient descent (GD) is an appropriate method to do this. GD\
    \ works by updating the parameters (in our case $\\boldsymbol{\\theta}$) governing\
    \ our model [i.e., $f_{\\boldsymbol{\\theta}}(\\mathbf{x})$], in the direction\
    \ opposite that of the cost-function gradient $\\nabla C(\\boldsymbol{\\theta})$\
    \ (Sugiyama, 2015):\n\n$$\\boldsymbol{\\theta}^{t+1} = \\boldsymbol{\\theta}^{t}\
    \ - \\gamma \\nabla C(\\boldsymbol{\\theta}^{t}).$$\n\nIn the simplest example\
    \ of linear regression with $\\mathbf{x} \\in \\mathbb{R}$,\n\n$$f_{\\boldsymbol{\\\

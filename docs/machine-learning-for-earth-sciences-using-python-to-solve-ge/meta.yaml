    \ + str(i+1))\nfig.align_ylabels()\nfig.tight_layout()\n```\n\n代码清单 5.2 成分数据分析\
    \ (CoDA)\n\n正如我们在第 3.3.6 节所知，直接对成分数据集进行多元统计分析在形式上是不正确的，并且可能使结果产生偏差或导致其他问题（Aitchison,\

  md: '# Clustering


    ![](img/90d3084aebf7ededff86e49f84c52faa_19_0.png)


    # Dimensionality Reduction


    ![](img/90d3084aebf7ededff86e49f84c52faa_19_1.png)


    Fig. 1.3 Unsupervised learning: (a, b) clustering and (c, d) dimensionality reduction


    include clustering, dimensionality reduction, and the detection of outliers or
    novelty observations.


    Clustering consists of grouping “similar” observations into “homogeneous” groups
    (see Fig. 1.3a and b), which helps in discovering unknown patterns in unlabeled
    data sets. In the Earth Sciences, clustering has widespread applications in seismology
    (e.g., Trugman and Shearer, 2017), remote sensing (e.g., Wang et al., 2018), volcanology
    (e.g., Caricchi et al., 2020), and geochemistry (e.g., Boujibar et al., 2021)
    to cite a few.


    The reduction of the dimensionality (Fig. 1.3c and d) of a problem reduces the
    number of features to treat, allowing the visualization of high-dimensional data
    sets (e.g., Morrison et al., 2017) or increasing the efficiency of a ML workflow.'
  merge: -1
  pgno: 19
- img_proc: true
  md: '# Outlier Detection


    ![](img/90d3084aebf7ededff86e49f84c52faa_20_0.png)


    # Novelty Detection


    ![](img/90d3084aebf7ededff86e49f84c52faa_20_1.png)


    Fig. 1.4 Unsupervised learning: (a, b) outlier and (c, d) novelty detection


    Tenenbaum et al. (2000) provide a concise but effective definition of dimensionality
    reduction: “finding meaningful low-dimensional structures hidden in their high-dimensional
    observations.”


    Finally, the detection of outlier or novelty observations (Fig. 1.4) deals with
    deciding whether a new observation belongs to a single set (i.e., an inlier) or
    should be considered different (i.e., an outlier or a novelty). The main difference
    between outlier and novelty detection lies in the learning process. In outlier
    detection (Fig. 1.4a and b), training data contain both inliers and potential
    outliers. Therefore, the algorithm tries to define which observation deviates
    from the others. In novelty detection (Fig. 1.4c and d), the training data set
    contains inliers only, and the algorithm tries to determine if a new observation
    is an outlier (i.e., a novelty).'

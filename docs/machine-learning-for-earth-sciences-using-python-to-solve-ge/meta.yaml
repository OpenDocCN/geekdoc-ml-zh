    \nFig. 3.3 Data sets scaled and transformed by code listing 3.8\n\n## 3.3.6 Compositional\
    \ Data Analysis (CoDA)\n\nBefore applying any statistical method, including ML\
    \ algorithms, the underlying assumptions must be verified. An example is the assumption\
    \ of normality, which is behind many methods. Other assumptions may regard the\
    \ topology of the sample space. Geochemical determinations are an example of so-called\
    \ compositional data (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al.,\
    \ 2023), which are samples of non-negative multivariate data that are expressed\
    \ relative to a fixed total (typically unity or percentages summing to 100%).\
    \ The analysis of compositional data is called “compositional data analysis” (CoDA;\
    \ Aitchison, 1984).\n\nIn compositional data, the sample space is represented\
    \ by the Aitchison simplex $s^D$:\n\n$$s^D = \\left\\{ \\mathbf{x} = [x_1, x_2,\
    \ x_i, \\dots, x_D] \\mid x_i > 0, \\; i = 1, 2, \\dots, D; \\; \\sum_{i=1}^D\
    \ x_i = C \\right\\},$$\n\nwhere $C$ is a constant, typically 1 or 100. Compositional\
    \ data typically share two characteristics: (1) the data are always positive and\
    \ (2) the data sum to a constant (i.e., they are not independent). These characteristics\
    \ hinder the application of many statistical methods because they often assume\
    \ independent input samples in the interval $[-\\infty, \\infty]$. From the topological\
    \ point of view, the simplex (i.e., the sample space for compositional vectors)\
    \ differs radically from the Euclidean space associated with unconstrained data\
    \ (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023). Therefore,\
    \ any method relying on the Euclidean distance should not be used directly with\
    \ compositional data. Four established transformations are available that attempt\
    \ to map the Aitchison simplex to Euclidean space.\n\n### Pairwise Log Ratio Transformation\
    \ (*pwlr*) (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023)\n\n\
    The *pwlr* transformation maps a composition isometrically from a $D$-dimensional\
    \ Aitchison simplex to a $D(D-1)/2$-dimensional space. In detail, it computes\
    \ each possible log ratio but accounts for the fact that $\\log(A/B) = -\\log(B/A)$,\
    \ so only one of them is needed. On data transformed by the pairwise log ratio,\
    \ we can apply multivariate methods that do not rely on the invertibility of the\
    \ covariance function. The interpretation of *pwlr*-transformed data is quite\
    \ simple because each component results from a simple operation of division and\
    \ is then transformed by a logarithm to reduce the skew of the resulting features.\n\
    \nThe *pwlr* transformation is given by\n\n$$pwlr(\\mathbf{x}) = [\\xi_{ij} \\\
    mid i < j = 1, 2, \\dots, D],$$\n\nwhere $\\xi_{ij} = \\ln(x_i/x_j)$. Note that\
    \ the redundancy of *pwlr* generates $D(D-1)/2$ features, which corresponds to\

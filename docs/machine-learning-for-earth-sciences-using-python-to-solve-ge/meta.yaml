    \nLazy evaluation differs from eager computation. Under lazy evaluation, Dask\
    \ prepares a directed acyclic graph (DAG) for the functions, operations, and transformations\
    \ involved. But it does not perform any computation. DAGs are mathematical objects\
    \ deriving from graph theory. The theory behind DAGs and graph theory is outside\
    \ the scope of this book, so please refer to specialized references to go learn\
    \ the details of DAGs (Xu, 2003; Fiore & Campos, 2013; Maurer, 2013).\n\nThis\
    \ section focuses mainly on learning the main benefits of using DAGs for our computations.\
    \ One of the most important benefits is that the structure and the complexity\
    \ of your computations can be evaluated and visualized before running them, which\
    \ brings many advantages. For example, it allows you to decide whether to run\
    \ your code on a single machine, a small cluster, or a high-performance computing\
    \ facility. Figure 10.14 shows how to perform a lazy evaluation of the\n\n```\n\

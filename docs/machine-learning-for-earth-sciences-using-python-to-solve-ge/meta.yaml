    ![](img/90d3084aebf7ededff86e49f84c52faa_19_1.png)


    图 1.3 无监督学习：(a, b) 聚类和 (c, d) 降维


    包括聚类、降维以及异常值或新颖性观测的检测。


    聚类是将“相似”的观测分组到“同质”组中（见图 1.3a 和 b），这有助于在无标签数据集中发现未知模式。在地球科学中，聚类在地震学（例如，Trugman
    and Shearer, 2017）、遥感（例如，Wang et al., 2018）、火山学（例如，Caricchi et al., 2020）和地球化学（例如，Boujibar
    et al., 2021）等领域有着广泛的应用，仅举几例。


    降低问题的维度（图 1.3c 和 d）减少了需要处理的特征数量，从而允许可视化高维数据集（例如，Morrison et al., 2017）或提高机器学习工作流的效率。


    ## 异常值检测


    ![](img/90d3084aebf7ededff86e49f84c52faa_20_0.png)


    ## 新颖性检测


    ![](img/90d3084aebf7ededff86e49f84c52faa_20_1.png)


    图 1.4 无监督学习：(a, b) 异常值和 (c, d) 新颖性检测


    Tenenbaum 等人（2000）对降维提供了一个简洁但有效的定义：“在高维观测中寻找隐藏的有意义的低维结构。”


    最后，异常值或新颖性观测的检测（图 1.4）涉及决定一个新观测是属于单一集合（即，内点）还是应被视为不同（即，异常值或新颖性）。异常值检测和新颖性检测的主要区别在于学习过程。在异常值检测（图
    1.4a 和 b）中，训练数据同时包含内点和潜在的异常值。因此，算法试图定义哪些观测偏离了其他观测。在新颖性检测（图 1.4c 和 d）中，训练数据集仅包含内点，算法试图确定新观测是否为异常值（即，新颖性）。


    ## 半监督学习


    ![](img/90d3084aebf7ededff86e49f84c52faa_21_0.png)


    ### 1.5 半监督学习


    正如你可能认为的那样，半监督学习在某种程度上介于监督和无监督训练方法之间。通常，半监督算法从少量有标签数据和大量无标签数据中学习（Zhu & Goldberg,
    2009）。更具体地说，当有标签数据稀缺或获取成本高昂时，半监督学习算法使用无标签数据来改进监督学习任务（Zhu & Goldberg, 2009）。为了更好地理解，请参见图
    1.5。详细来说，图 1.5a 报告了一个监督分类模型的结果，该模型使用两个有标签观测作为训练数据集。此外，图 1.5b 显示了一个分类模型，该模型是基于图
    1.5a 中相同的两个有标签数据集加上若干无标签观测，通过半监督学习得到的。



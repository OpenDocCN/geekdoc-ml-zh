    namely, SRE and FRE, which correspond respectively to images taken in ground reflectance
    without correcting for slope effects and images taken in ground reflectance with
    slope effects corrected. We shall work on FRE data.


    To import Sentinel2 multi-spectral data, I used Rasterio,¹¹ which is a Python

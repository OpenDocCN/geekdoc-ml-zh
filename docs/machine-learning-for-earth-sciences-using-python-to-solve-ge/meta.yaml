  mdcn: "## 12.6 示例应用\n\n**问题描述**\n作为深度学习势函数在地球科学中的一个应用示例，我们现在讨论如何训练和验证一个卷积神经网络，以从卫星记录中识别建筑物轮廓。\n\
    \n该问题属于机器学习分类子领域，称为“语义图像分割”（见图12.8）。在本例中，我们希望从航空影像标注数据集（Maggiori等人，2017）中识别出图像中被建筑物占据的区域或像素（例如，见图12.9）。图12.9的右侧面板以掩码形式展示了解决方案，其中白色和黑色分别定义了建筑物和非建筑物区域。我们想知道是否可以训练一个CNN来生成图12.9所示的解决方案。为了尝试一个简化的解决方案，我使用PyTorch训练了U-Net\
    \ CNN（Ronneberger等人，2015）。\n\n## 数据集与预处理\n\n作为起点，我下载了航空影像标注数据集（Maggiori等人，2017），该数据集包含360张经过正射校正的RGB（红、绿、蓝）图像，这些图像与官方地籍记录相关联（Maggiori等人，2017）。整个数据集覆盖了多个区域，例如奥斯汀（美国）、芝加哥（美国）、维也纳（奥地利）、东蒂罗尔和西蒂罗尔（奥地利）、旧金山（美国）和因斯布鲁克（奥地利）。横向分辨率为0.3米，每个图块为5000\
    \ × 5000像素（Maggiori等人，2017）。对于180个图块，还提供了包含建筑物和非建筑物两个语义类别的掩码（Maggiori等人，2017）。对于本文提供的案例研究，我从奥斯汀选择了10个图块。对于每个图块，我还收集了相关的掩码，用于训练和验证模型。我使用5\
    \ × 5网格从每个图块中提取了25张1000 × 1000像素的图像（对每个掩码也执行了相同的操作）。最终得到的数据集包含245张图像和245个掩码。然后，我将数据集分为两部分，分别用于训练（220张）和验证（25张）。\n\
    \n## U-Net架构\n\nU-Net是一种“全卷积网络”（Long等人，2015）。全卷积网络背后的主要概念是接受任意大小的输入，并产生相应大小的输出，同时实现高效的推理和学习（Long等人，2015）。\n\
    \n图12.10展示了U-Net架构。它由一个收缩网络（左侧）和一个扩展路径（右侧；Ronneberger等人，2015）组成。收缩路径应用了一系列两个3\
    \ × 3卷积，每个卷积后跟一个ReLU和2 × 2最大池化（Ronneberger等人，2015）。接下来，在扩展路径中，U-Net架构对特征图进行上采样，然后进行一个2\
    \ × 2卷积（“上卷积”）和两个3 × 3卷积，每个卷积后跟一个ReLU（Ronneberger等人，2015）。最后一层应用一个1 × 1卷积，将每个64分量的特征向量映射到所需的类别数（Ronneberger等人，2015）。代码清单12.1展示了U-Net的PyTorch实现。²\n\
    \n```python\n\"\"\" Full assembly of the parts to form the complete network \"\
    \"\"\n\nfrom .unet_parts import *\n\nclass UNet(nn.Module):\n    def __init__(self,\
    \ n_channels, n_classes, bilinear=False):\n        super(UNet, self).__init__()\n\
    \        self.n_channels = n_channels\n        self.n_classes = n_classes\n  \
    \      self.bilinear = bilinear\n\n        self.inc = DoubleConv(n_channels, 64)\n\
    \        self.down1 = Down(64, 128)\n        self.down2 = Down(128, 256)\n   \
    \     self.down3 = Down(256, 512)\n        factor = 2 if bilinear else 1\n   \
    \     self.down4 = Down(512, 1024 // factor)\n        self.up1 = Up(1024, 512\
    \ // factor, bilinear)\n        self.up2 = Up(512, 256 // factor, bilinear)\n\
    \        self.up3 = Up(256, 128 // factor, bilinear)\n        self.up4 = Up(128,\
    \ 64, bilinear)\n        self.outc = OutConv(64, n_classes)\n\n    def forward(self,\
    \ x):\n        x1 = self.inc(x)\n        x2 = self.down1(x1)\n        x3 = self.down2(x2)\n\
    \        x4 = self.down3(x3)\n        x5 = self.down4(x4)\n        x = self.up1(x5,\
    \ x4)\n        x = self.up2(x, x3)\n        x = self.up3(x, x2)\n        x = self.up4(x,\
    \ x1)\n        logits = self.outc(x)\n        return logits\n```\n\n**清单 12.1**\
    \ PyTorch中的U-Net实现\n\n## 结果\n\n图12.11展示了将训练好的模型（1260个周期）应用于从原始数据集中提取的25张验证图像之一的结果。右上方面板显示了原始图像（即输入的RGB矩阵），左上方面板显示了建筑物-非建筑物掩码。请记住，我们使用了建筑物-非建筑物掩码来训练模型，并在验证期间作为质量控制。图12.11的右下方面板显示了预测的掩码。最后，左下方面板将预测掩码与原始图像进行比较，以突出显示结果的质量。\n\
    \n深入探讨语义图像分割在地球科学中的应用超出了本书的范围。对于感兴趣的读者，我强烈推荐查看TorchGeo库³（Stewart等人，2021）。\n\n\
    ² https://github.com/milesial/Pytorch-UNet.\n\n³ https://pytorch.org/blog/geospatial-deep-learning-with-torchgeo/.\n\

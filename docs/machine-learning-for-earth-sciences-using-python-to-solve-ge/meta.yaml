    # 4.9 Gaussian Mixture Models


    Gaussian mixture models (GMMs) try to reconstruct the probability density function
    that underlies the investigated data set as generated by a mixture of a finite
    number of Gaussian distributions with unknown parameters (McLachlan & Peel, 2000).


    To understand how GMMs work, consider a $d$-dimensional (i.e., characterized by
    $d$ variables or features) sample set $X = \{\mathbf{x}_1, \mathbf{x}_2, \ldots,
    \mathbf{x}_n\}$ of independent and identically distributed observations (McLachlan
    & Peel, 2000). Finite mixtures models (FMMs) assume that the observations $\mathbf{x}
    \in X$ derive from a probability density function described by a mixture of $g$
    components (McLachlan & Peel, 2000; Scrucca et al., 2016):


    $$f(\mathbf{x}, \psi) = \sum_{i=1}^{g} \pi_i f_i(\mathbf{x}, \theta_i), \quad
    (4.8)$$


    where $g$ and $\psi = \{\pi_1, \ldots, \pi_{g-1}, \theta_1, \ldots, \theta_g\}$
    are the number of mixture components and the parameters of the model, respectively
    (Scrucca et al., 2016). Also, $f_i(\mathbf{x}, \theta_i)$ is the $i$th component
    density for the sample observation $\mathbf{x}$ and is parametrized by the vector
    $\theta_i$. Finally, $\{\pi_1, \ldots, \pi_{g-1}\}$ are the mixing weights (Scrucca
    et al., 2016).


    In many applications, the component densities $f_i(\mathbf{x}, \theta_i)$ are
    assumed to belong to the same parametric family (McLachlan & Peel, 2000). In some
    applications, the component densities are taken to be different. The implementation
    of a finite Gaussian mixtures model assumes $f_i(\mathbf{x}, \theta_i)$ as a multivariate
    normal, a fixed $G$, and consists of estimating the model parameters $\psi$ (McLachlan
    & Peel, 2000).


    In scikit-learn, the methods *GaussianMixture()* and *BayesianGaussianMixture()*
    implement the finite Gaussian mixture model based on expectation-maximization
    (EM) (Dempster et al., 1977) and variational Bayesian inference (Hastie et al.,
    2017; Blei & Jordan, 2006), respectively. Variational Bayesian inference is similar'
- md: 'to expectation maximization, although the former adds a regularization step
    by integrating information from prior distributions (Hastie et al., 2017; Blei
    & Jordan, 2006). The aim is to avoid pathological special cases, which often appear
    in expectation-maximization solutions (Blei & Jordan, 2006).



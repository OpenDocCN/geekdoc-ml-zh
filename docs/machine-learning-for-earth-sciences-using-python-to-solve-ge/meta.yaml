- md: "## Shared Code\n\nAll code presented in this book is tested on the Anaconda\
    \ Individual Edition ver. 2023.03 (Python 3.10.9) and is available at my GitHub\
    \ repository (petrellim):\n\nhttp://bit.ly/ml_earth_sciences\n\n## Involvement\
    \ and Collaborations\n\nI am always open to new collaborations worldwide. Feel\
    \ free to contact me by email to discuss new ideas or propose a collaboration.\
    \ You can also reach me through my personal website or by Twitter. I love sharing\
    \ the content of this book in short courses everywhere. If you are interested,\
    \ please contact me to organize a visit to your institution.\n\n## Contents\n\n\
    ### Part I Basic Concepts of Machine Learning for Earth Scientists\n\n- 1 Introduction\
    \ to Machine Learning\n  - 1.1 Machine Learning: Definitions and Terminology\n\
    \  - 1.2 The Learning Process\n  - 1.3 Supervised Learning\n  - 1.4 Unsupervised\
    \ Learning\n  - 1.5 Semisupervised Learning\n  - References\n\n- 2 Setting Up\
    \ Your Python Environments for Machine Learning\n  - 2.1 Python Modules for Machine\
    \ Learning\n  - 2.2 A Local Python Environment for Machine Learning\n  - 2.3 ML\
    \ Python Environments on Remote Linux Machines\n  - 2.4 Working with Your Remote\
    \ Instance\n  - 2.5 Preparing Isolated Deep Learning Environments\n  - 2.6 Cloud-Based\
    \ Machine Learning Environments\n  - 2.7 Speed Up Your ML Python Environment\n\
    \  - References\n\n- 3 Machine Learning Workflow\n  - 3.1 Machine Learning Step-by-Step\n\

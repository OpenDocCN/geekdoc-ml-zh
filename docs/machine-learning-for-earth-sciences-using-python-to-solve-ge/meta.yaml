    \nY = my_model.predict(scaled_X)\n\nfig, ax = plt.subplots()\n\nfor my_group in\
    \ np.unique(Y):\n    i = np.where(Y == my_group)\n    ax.scatter(scaled_X[i,0],\
    \ scaled_X[i,1],\n               color=my_colors[my_group],\n               label=my_group\
    \ + 1 ,  edgecolor='k', alpha=0.8)\n\nax.legend(title='Cluster')\n\nax.set_xlabel(r'$log_{10}[^{12}C/^{13}C]$')\n\
    ax.set_ylabel(r'$log_{10}[^{14}N/^{15}N]$')\nfig.tight_layout()\n```\n\nListing\
    \ 3.11 Application of the GaussianMixture() algorithm to SiC data\n\n# 3.4 Training\
    \ a Model\n\nFigure 3.5 shows a cheat sheet that guides us in selecting a model\
    \ for the scikit-learn library.⁹\n\nScikit-learn works in the fields of both unsupervised\
    \ learning (i.e., clustering and dimensionality reduction) and supervised learning\
    \ (i.e., regression and classification). In supervised learning, examples of classification\
    \ algorithms are the support vector classifier (see Sect. 7.9) and the K-nearest\
    \ neighbors (see Sect. 7.10). In the field of regression, examples are the stochastic\
    \ gradient descent (SGD), support vector (SVR), and ensemble regressors. Examples\
    \ of unsupervised learning, if we consider dimensionality reduction, are locally\
    \ linear embedding (LLE, see Sect. 4.3) and principal component analysis (PCA,\
    \ see Sect. 4.2). For clustering, examples are K means, Gaussian mixture models\
    \ (GMM, see Sect. 4.9), and spectral clustering.\n\n⁹ https://scikit-learn.org/stable/tutorial/machine_learning_map/."
- md: "## 3.4 Training a Model\n\n![](img/90d3084aebf7ededff86e49f84c52faa_59_0.png)\n\
    \nFig. 3.5 Scikit-learn algorithm cheat sheet. Modified from the official documentation\
    \ of scikit-learn\n\nWe discuss in detail the most popular ML algorithms in Chaps.\
    \ 4 and 7, which deal with unsupervised and supervised learning, respectively.\n\
    \nI now present a simple example of training an unsupervised algorithm for SiC\
    \ analyses that we use as a proxy for a scientific data set in the field of geochemistry\
    \ and cosmochemistry science. Code listing 3.11 shows how to cluster SiC data\
    \ by Gaussian mixtures (see Sect. 4.9) with the data previously pre-processed\
    \ by code listings 3.9 and 3.10. The core of the training is at line 12, where\
    \ I parameterized the\n\n![](img/90d3084aebf7ededff86e49f84c52faa_60_0.png)\n\n\
    Fig. 3.6 Clustering produced by applying the *GaussianMixture()* algorithm to\
    \ the SiC data (code listing 3.11)\n\n*GaussianMixture()* algorithm (i.e., defining\
    \ nine clusters and fixing the random state of the pseudo-random number generator\
    \ to allow the reader to exactly reproduce my results).\n\nGenerally speaking,\
    \ the *.fit()* method in scikit-learn launches the training of ML algorithms.\
    \ Then, using the *.predict()* method, we get the results or we transfer the knowledge\
    \ obtained to unknown data. Figure 3.6 shows the result of clustering by *GaussianMixture()*\
    \ (see lines 16–29 of code listing 3.11).\n\n## 3.5 Model Validation and Testing\n\
    \nThe validation and testing of a model is the third fundamental step in ML, after\
    \ pre-processing and training. They allow us to evaluate the “goodness” of a model.\n\
    \n### 3.5.1 Splitting the Investigated Data Set into Three Parts\n\nThe approach\
    \ of model validation and testing by splitting the investigated data set into\
    \ three parts is clearly described by Hastie et al. (2017) (Fig. 3.7): the best\
    \ approach for model assessment in ML “is to randomly divide the data set into\
    \ three parts: a training set, a validation set, and a test set. The training\
    \ set is used to fit the\n\n![](img/90d3084aebf7ededff86e49f84c52faa_61_0.png)\n\
    \nFig. 3.7 Splitting the investigated data set into three parts\n\nmodels; the\
    \ validation set is used to estimate prediction error for model selection; the\
    \ test set is used for assessment of the generalization error of the final chosen\
    \ model.”\n\n```python\nfrom sklearn import preprocessing\nfrom sklearn.model_selection\
    \ import train_test_split\n\nle = preprocessing.LabelEncoder()\nle.fit(my_data['PGD\
    \ Type'])\ny = le.transform(my_data['PGD Type'])\n\nX_train_valid, X_test, y_train_valid,\
    \ y_test = train_test_split(\n    X, y, test_size=0.20)\n\nX_train, X_valid, y_train,\
    \ y_valid = train_test_split(\n    X, y, test_size=0.25)\n```\n\nListing 3.12\
    \ Splitting the investigated data set into three parts in scikit-learn\n\nTypically,\
    \ we use the training data set to train a selection of candidate models, which\
    \ could be different algorithms, a single algorithm tuned with different hyper-parameters\
    \ (i.e., one or more variables that affect the behavior of an algorithm), or a\
    \ combination of both. We then use the validation data set to evaluate candidate\
    \ models and, based on the results, choose the best model. Finally, we check the\
    \ selected model using the test data set. As an example, the *train_test_split()*\
    \ method in scikit-learn randomly splits a data set into two parts (e.g., training\
    \ plus validation and test sets). Again applying the *train_test_split()* method\
    \ to the training plus validation set further divides it into the training and\
    \ validation sets.\n\nNote that the statements on lines 4–6 of code listing 3.12\
    \ simply convert the labels referring to a specific SiC Class (i.e., M, Y, Z,\
    \ X, AB, and N) to an integer value ranging from 0 to 5. This approach facilitates\
    \ the management of labels during the execution of supervised methods in the fields\
    \ of regressions and classification.\n\n### 3.5.2 Cross-Validation\n\nThe cross-validation\
    \ (CV) procedure may be seen as an evolution of the static division of the investigated\
    \ data set into three parts.\n\n![](img/90d3084aebf7ededff86e49f84c52faa_62_0.png)\n\
    \nFig. 3.8 Example of *k*-fold cross-validation\n\nIn the cross-validation procedure,\
    \ the initial data set is split into two parts: the test set and the training\
    \ plus validation sets. Then, in the most basic strategy of cross-validation (called\
    \ *k*-fold CV), the joint training and validation set is split into *k* smaller\
    \ batches (Fig. 3.8). The following steps consist of repeating the training and\
    \ the validation for the candidate model as follows: (1) we use *k* − 1 folds\
    \ as the training set; (2) the result of the training is validated against the\
    \ remaining fold of the data; and (3) we repeat the procedure for the next split.\n\
    \n```python\nfrom sklearn import svm\nfrom sklearn import preprocessing\nfrom\
    \ sklearn.model_selection import cross_validate\n\nle = preprocessing.LabelEncoder()\n\
    le.fit(my_data['PGD Type'])\ny = le.transform(my_data['PGD Type'])\n\nmy_model\
    \ = svm.SVC(kernel='linear', C=1, random_state=42)\n\ncv_results = cross_validate(my_model,\
    \ scaled_X, y, cv=5,\n                            scoring='accuracy')\n\nprint(cv_results['test_score'])\n\
    \n'''\nOutput:\n[0.98529412 0.97785978 0.9704797  0.98154982 0.95940959]\n'''\n\
    ```\n\nListing 3.13 Application of a linear support vector classifier to SiC data\n\
    \n```python\nfrom sklearn import svm\nfrom sklearn import preprocessing\nfrom\
    \ sklearn.model_selection import GridSearchCV\n\nle = preprocessing.LabelEncoder()\n\
    le.fit(my_data['PGD Type'])\ny = le.transform(my_data['PGD Type'])\n\nparameters\
    \ = {'kernel':('linear', 'rbf'), 'C':[0.1, 1, 10]}\nmy_model = svm.SVC()\n\nmy_grid_search\
    \ = GridSearchCV(my_model, parameters,\n                             cv = 4, scoring='accuracy')\n\
    \nmy_grid_search.fit(scaled_X, y)\n```\n\n**Listing 3.14** Model evaluation and\
    \ selection by *k*-fold CV\n\nThe performance of the candidate model can be estimated\
    \ by using the selected metrics and averaging the *k* results obtained. As an\
    \ example, code listing **3.13** shows how to perform *k*-fold CV in scikit-learn\
    \ using the *cross_validate()* method. After converting the five labels in the\
    \ “PGD Type” columns (i.e., M, Y, Z, X, AB, N to a numeric index ranging from\
    \ 0 to 5; see lines 5 to 7), we define a linear support vector classifier (see\
    \ Sect. **7.9**) characterized by a *C* = 1 hyperparameter (line 9). Finally,\
    \ we perform the *k*-fold CV by dividing the data set into fivefold and using\
    \ accuracy as a metric. As expected, we obtain five estimates for the accuracy,\
    \ one for each split.\n\n```\nIn [01]: my_grid_search.best_estimator_\nOut[01]:\
    \ SVC(C=10, kernel='linear')\n\nIn [02]: my_grid_search.best_score_\nOut[02]:\
    \ 0.9778761061946903\n\nIn [03]: my_grid_search.cv_results_\nOut[03]:\n{'mean_fit_time':\
    \ array([0.00605977, 0.02105349, 0.00482285,\n                0.01113951, 0.00554657,\
    \ 0.00662667]),\n 'std_fit_time': array([3.7539e-04, 6.0314e-04, 2.1346e-04,\n\
    \                7.0395e-04, 5.5384e-04, 3.1989e-05]),\n 'mean_score_time': array([0.00242817,\
    \ 0.01987976, 0.00181627,\n                0.00979719, 0.00133586, 0.00618142]),\n\
    \ 'std_score_time': array([7.4277e-05, 1.6316e-03, 1.6929e-04,\n             \
    \   2.7074e-04, 2.2063e-04, 6.4881e-04]),\n 'param_C': masked_array(data=[0.1,\
    \ 0.1, 1, 1, 10, 10],\n                mask=[False, False, False, False, False,\
    \ False],\n                fill_value='?', dtype=object),\n 'param_kernel': masked_array(data=['linear',\
    \ 'rbf', 'linear',\n                                    'rbf', 'linear', 'rbf'],\n\
    \                mask=[False, False, False, False, False, False],\n          \
    \      fill_value='?', dtype=object),\n 'params':    [{'C': 0.1, 'kernel': 'linear'},\n\
    \              {'C': 0.1, 'kernel': 'rbf'},\n              {'C': 1, 'kernel':\
    \ 'linear'},\n              {'C': 1, 'kernel': 'rbf'},\n              {'C': 10,\
    \ 'kernel': 'linear'},\n              {'C': 10, 'kernel': 'rbf'}],\n 'split0_test_score':\
    \ array([0.92330383, 0.8879056 , 0.98230088,\n              0.91150442, 0.97935103,\
    \ 0.97050147]),\n 'split1_test_score': array([0.9380531 , 0.88495575, 0.97935103,\n\
    \              0.92625369, 0.98525074, 0.97935103]),\n 'split2_test_score': array([0.92330383,\
    \ 0.89380531, 0.97345133,\n              0.91740413, 0.97640118, 0.96460177]),\n\
    \ 'split3_test_score': array([0.91740413, 0.88495575, 0.96755162,\n          \
    \    0.90560472, 0.97050147, 0.96460177]),\n 'mean_test_score': array([0.92551622,\
    \ 0.8879056 , 0.97566372,\n              0.91519174, 0.97787611, 0.96976401]),\n\
    \ 'std_test_score': array([0.00762838, 0.00361282, 0.00566456,\n             \
    \ 0.00762838, 0.00531792, 0.0060364 ]),\n 'rank_test_score': array([4, 6, 2, 5,\
    \ 1, 3], dtype=int32)}\n```\n\n**Listing 3.15** How to get the results of *GridSearchCV()*\n\
    \nUsing the *k*-fold cross-validation, *n* different candidate models can be evaluated\
    \ by repeating *n* times the *k*-fold CV. As an example, the *GridSearchCV()*\
    \ method in scikit-learn performs an exhaustive search (i.e., it evaluates all\
    \ possible combinations of the proposed parameters) over a range of parameter\
    \ values for a specific estimator (i.e., a ML algorithm). As an example, the method\
    \ *GridSearchCV()* can be used to determine the best choice for the hyperparameters\
    \ of a ML algorithm, such as the *C* parameter and the “kernel function” of a\
    \ support vector machine (see Sect. 7.9). The code listing 3.14 shows in detail\
    \ how to define the grid for the selected hyperparameters (line 9). On line 10,\
    \ we define the model (i.e., a support vector classifier). On line 12, we define\
    \ the grid search for our support vector classifier model, using the parameters\
    \ defined on line 9, a fourfold cross-validation, and accuracy as a metric. Finally,\
    \ on line 15 we physically perform the grid search for all combinations among\
    \ the defined parameters. In detail, line 9 defines two kernel functions and three\
    \ values for *C*. Therefore, the grid search performs six cross-validations and\
    \ splits the *scaled_X* data set into four folds.\n\nCode listing 3.15 shows how\
    \ to get the results of a *GridSearchCV()*. More specifically, the *best_estimator_*,\
    \ *best_score_*, and *cv_results_* attributes provide us with the optimal combination\
    \ of hyperparameters, the best score, and a dictionary containing all the results,\
    \ respectively.\n\n### 3.5.3 Leave-One-Out Cross-Validation\n\nThe Leave-one-out\
    \ (or LOO) cross-validation is a limiting case of the *k*-fold CV. When using\
    \ the LOO approach, each training set is created by taking all the samples except\
    \ one. The test set is then created by using the sample left out."
  mdcn: "## 3.4 训练模型\n\n![](img/90d3084aebf7ededff86e49f84c52faa_59_0.png)\n\n图 3.5\
    \ Scikit-learn 算法速查表。改编自 scikit-learn 官方文档\n\n我们将在第 4 章和第 7 章详细讨论最受欢迎的机器学习算法，这两章分别涉及无监督学习和监督学习。\n\
    \n现在，我将展示一个训练无监督算法的简单示例，用于 SiC 分析，我们将其作为地球化学和宇宙化学科学领域科学数据集的代理。代码清单 3.11 展示了如何使用高斯混合模型（见第\
    \ 4.9 节）对 SiC 数据进行聚类，数据已通过代码清单 3.9 和 3.10 进行了预处理。训练的核心在第 12 行，我在此参数化了\n\n![](img/90d3084aebf7ededff86e49f84c52faa_60_0.png)\n\
    \n图 3.6 对 SiC 数据应用 *GaussianMixture()* 算法（代码清单 3.11）产生的聚类结果\n\n*GaussianMixture()*\
    \ 算法（即定义九个聚类，并固定伪随机数生成器的随机状态，以便读者能够完全重现我的结果）。\n\n一般来说，scikit-learn 中的 *.fit()*\
    \ 方法启动机器学习算法的训练。然后，使用 *.predict()* 方法，我们获得结果或将获得的知识转移到未知数据上。图 3.6 展示了使用 *GaussianMixture()*\
    \ 进行聚类的结果（见代码清单 3.11 的第 16-29 行）。\n\n## 3.5 模型验证与测试\n\n模型的验证和测试是机器学习中继预处理和训练之后的第三个基本步骤。它们使我们能够评估模型的“优劣”。\n\
    \n### 3.5.1 将研究数据集划分为三部分\n\nHastie 等人（2017）清晰地描述了通过将研究数据集划分为三部分来进行模型验证和测试的方法（图\
    \ 3.7）：机器学习中模型评估的最佳方法“是将数据集随机划分为三部分：一个训练集、一个验证集和一个测试集。训练集用于拟合\n\n![](img/90d3084aebf7ededff86e49f84c52faa_61_0.png)\n\
    \n图 3.7 将研究数据集划分为三部分\n\n模型；验证集用于估计预测误差以进行模型选择；测试集用于评估最终选定模型的泛化误差。”\n\n```python\n\
    from sklearn import preprocessing\nfrom sklearn.model_selection import train_test_split\n\
    \nle = preprocessing.LabelEncoder()\nle.fit(my_data['PGD Type'])\ny = le.transform(my_data['PGD\
    \ Type'])\n\nX_train_valid, X_test, y_train_valid, y_test = train_test_split(\n\
    \    X, y, test_size=0.20)\n\nX_train, X_valid, y_train, y_valid = train_test_split(\n\
    \    X, y, test_size=0.25)\n```\n\n代码清单 3.12 在 scikit-learn 中将研究数据集划分为三部分\n\n\
    通常，我们使用训练数据集来训练一组候选模型，这些模型可以是不同的算法、一个使用不同超参数（即影响算法行为的一个或多个变量）调整的单一算法，或者两者的组合。然后，我们使用验证数据集来评估候选模型，并根据结果选择最佳模型。最后，我们使用测试数据集检查所选模型。例如，scikit-learn\
    \ 中的 *train_test_split()* 方法将数据集随机划分为两部分（例如，训练集加验证集和测试集）。再次对训练集加验证集应用 *train_test_split()*\
    \ 方法，可进一步将其划分为训练集和验证集。\n\n请注意，代码清单 3.12 的第 4-6 行语句只是将与特定 SiC 类别（即 M、Y、Z、X、AB 和\
    \ N）相关的标签转换为 0 到 5 之间的整数值。这种方法便于在回归和分类领域的监督方法执行过程中管理标签。\n\n### 3.5.2 交叉验证\n\n\
    交叉验证（CV）过程可以看作是将研究数据集静态划分为三部分的演进。\n\n![](img/90d3084aebf7ededff86e49f84c52faa_62_0.png)\n\
    \n图 3.8 *k* 折交叉验证示例\n\n在交叉验证过程中，初始数据集被划分为两部分：测试集和训练集加验证集。然后，在最基本的交叉验证策略（称为 *k*\
    \ 折 CV）中，联合的训练集和验证集被划分为 *k* 个更小的批次（图 3.8）。以下步骤包括重复进行候选模型的训练和验证，如下所示：(1) 我们使用 *k*\
    \ − 1 折作为训练集；(2) 训练结果使用剩余的一折数据进行验证；(3) 我们对下一个划分重复此过程。\n\n```python\nfrom sklearn\
    \ import svm\nfrom sklearn import preprocessing\nfrom sklearn.model_selection\
    \ import cross_validate\n\nle = preprocessing.LabelEncoder()\nle.fit(my_data['PGD\
    \ Type'])\ny = le.transform(my_data['PGD Type'])\n\nmy_model = svm.SVC(kernel='linear',\
    \ C=1, random_state=42)\n\ncv_results = cross_validate(my_model, scaled_X, y,\
    \ cv=5,\n                            scoring='accuracy')\n\nprint(cv_results['test_score'])\n\
    \n'''\nOutput:\n[0.98529412 0.97785978 0.9704797  0.98154982 0.95940959]\n'''\n\
    ```\n\n代码清单 3.13 将线性支持向量分类器应用于 SiC 数据\n\n```python\nfrom sklearn import svm\n\
    from sklearn import preprocessing\nfrom sklearn.model_selection import GridSearchCV\n\
    \nle = preprocessing.LabelEncoder()\nle.fit(my_data['PGD Type'])\ny = le.transform(my_data['PGD\
    \ Type'])\n\nparameters = {'kernel':('linear', 'rbf'), 'C':[0.1, 1, 10]}\nmy_model\
    \ = svm.SVC()\n\nmy_grid_search = GridSearchCV(my_model, parameters,\n       \
    \                      cv = 4, scoring='accuracy')\n\nmy_grid_search.fit(scaled_X,\
    \ y)\n```\n\n**代码清单 3.14** 通过 *k* 折 CV 进行模型评估和选择\n\n候选模型的性能可以通过使用选定的指标并平均获得的 *k*\
    \ 个结果来估计。例如，代码清单 **3.13** 展示了如何在 scikit-learn 中使用 *cross_validate()* 方法执行 *k*\
    \ 折 CV。在将“PGD Type”列中的五个标签（即 M、Y、Z、X、AB、N）转换为 0 到 5 的数值索引后（见第 5 至 7 行），我们定义了一个线性支持向量分类器（见第\
    \ **7.9** 节），其特征为超参数 *C* = 1（第 9 行）。最后，我们通过将数据集划分为五折并使用准确率作为指标来执行 *k* 折 CV。正如预期，我们获得了五个准确率估计值，每个划分一个。\n\
    \n```\nIn [01]: my_grid_search.best_estimator_\nOut[01]: SVC(C=10, kernel='linear')\n\
    \nIn [02]: my_grid_search.best_score_\nOut[02]: 0.9778761061946903\n\nIn [03]:\
    \ my_grid_search.cv_results_\nOut[03]:\n{'mean_fit_time': array([0.00605977, 0.02105349,\

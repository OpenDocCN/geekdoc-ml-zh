- md: "## 8.4 Final Evaluation\n\nTo evaluate the goodness of each model, the FORCE2020\
    \ challenge used a custom scoring strategy based on a penalty matrix (code listing\
    \ 8.12).\n\n```python\nimport numpy as np\n\nA = np.load('penalty_matrix.npy')\n\
    def score(y_true, y_pred):\n    S = 0.0\n    y_true = y_true.astype(int)\n   \
    \ y_pred = y_pred.astype(int)\n    for i in range(0, y_true.shape[0]):\n     \
    \   S -= A[y_true[i], y_pred[i]]\n    return S/y_true.shape[0]\n```\n\nListing\
    \ 8.12 Custom scoring function\n\nIn code listing 8.12, `y_true` and `y_pred`\
    \ are the expected (i.e., correct) and predicted values, respectively, converted\
    \ into integer indexes ranging from 0 to 11, as reported in Table 8.2.\n\nThe\
    \ main objective of the FORCE2020 scoring strategy is to penalize errors made\
    \ on easy-to-recognize lithologies more strongly than those made on difficult-to-recognize\
    \ lithologies. To achieve this goal, the `score()` function weights each true-value–predicted-value\
    \ pair by using the penalty matrix (code listing 8.13) reported in Fig. 8.7. More\
    \ specifically, the score() function returns the value of the penalty matrix corresponding\
    \ to each true-value–predicted-value pair (e.g., 4 if you confuse a Halite for\
    \ a Sandstone; see Fig. 8.7). Next, the function sums all the scoring values and\
    \ then calculates an “average” score by dividing the resulting value by the number\
    \ of predictions.\n\nTable 8.2 Connecting the labeling in the target files with\
    \ lithofacie names and the indexing of the score function\n\n| Label | Lithofacie\
    \ | Index |\n|---|---|---|\n| 30000 | 'Sandstone' | 0 |\n| 65030 | 'Sandstone/Shale'\
    \ | 1 |\n| 65000 | 'Shale' | 2 |\n| 80000 | 'Marl' | 3 |\n| 74000 | 'Dolomite'\
    \ | 4 |\n| 70000 | 'Limestone' | 5 |\n| 70032 | 'Chalk' | 6 |\n| 88000 | 'Halite'\
    \ | 7 |\n| 86000 | 'Anhydrite' | 8 |\n| 99000 | 'Tuff' | 9 |\n| 90000 | 'Coal'\
    \ | 10 |\n| 93000 | 'Basement' | 11 |\n\n```python\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nimport seaborn as sns\n\nA = np.load('penalty_matrix.npy')\n\
    \nmy_labels = ['Sandstone','Sandstone/Shale','Shale','Marl', 'Dolomite',\n   \
    \         'Limestone','Chalk','Halite','Anhydrite','Tuff','Coal','Basement']\n\
    \nfig, ax = plt.subplots(figsize=(15, 12))\nax.imshow(A)\nax = sns.heatmap(A,\
    \ annot=True, xticklabels = my_labels, yticklabels = my_labels)\nfig.tight_layout()\n\
    ```\n\nListing 8.13 Penalty matrix\n\n```python\nimport numpy as np\nimport pandas\
    \ as pd\n\nA = np.load('penalty_matrix.npy')\ndef score(y_true, y_pred):\n   \
    \ S = 0.0\n    y_true = y_true.astype(int)\n    y_pred = y_pred.astype(int)\n\
    \    for i in range(0, y_true.shape[0]):\n        S -= A[y_true[i], y_pred[i]]\n\
    \    return S/y_true.shape[0]\n\ntarget = np.full(1000, 5) # Limestone\npredicted\
    \ = np.full(1000, 5)  # Limestone\nprint(\"Case 1: \" + str(score(target, predicted)))\n\
    \npredicted = np.full(1000, 6)  # Chalk\nprint(\"Case 2: \" + str(score(target,\
    \ predicted)))\n\npredicted = np.full(1000, 7) # Halite\nprint(\"Case 3: \" +\
    \ str(score(target, predicted)))\n\nhidden_test_target = pd.read_hdf('ml_data.h5',\n\
    \                                 'hidden_test_target').values\npredicted = np.random.randint(0,\
    \ high=12,\n                    size=1000) # Random predictions\nprint(\"Case\
    \ 4: \" + str(score(target, predicted)))\n\n''' Output:\n\nCase 1: 0.0\nCase 2:\
    \ -1.375\nCase 3: -4.0\nCase 4: -3.04625\n\n'''\n```\n\n**Listing 8.14** Custom\
    \ scoring function\n\nBased on Fig. 8.7 and code listing 8.12, we can argue that\
    \ a correct prediction contributes zero to the score. Therefore, if you correctly\
    \ guess all the predictions, the score function returns zero (see code listing\
    \ 8.14, Case 1). In contrast, systematically predicting chalk on a data set of\
    \ limestone samples returns −1.375 (code listing 8.14, Case 2). Systematically\
    \ predicting halite on a data set of limestone samples returns −4.0 (code listing\
    \ 8.14, Case 3), which is much more penalized than Case 2. Finally, considering\
    \ the hidden test data set, a dummy model providing random predictions produces\
    \ a score close to −3 (code listing 8.14, Case 4).\n\nFigure 8.8 shows the result\
    \ of applying the scoring strategy described above to the leaderboard and hidden\
    \ test data sets. Despite their simplicity, the two best-performing models produced\
    \ by the grid search implemented in code listing 8.9, shows similar performances\
    \ (i.e., > - 0.50) of top-ranked models in the FORCE2020 challenge.\n\n```python\n\
    import matplotlib.pyplot as plt\nimport pandas as pd\nimport numpy as np\n\nA\
    \ = np.load('penalty_matrix.npy')\ndef score(y_true, y_pred):\n    S = 0.0\n \
    \   y_true = y_true.astype(int)\n    y_pred = y_pred.astype(int)\n    for i in\
    \ range(0, y_true.shape[0]):\n        S -= A[y_true[i], y_pred[i]]\n    return\
    \ S/y_true.shape[0]\n\nlithology_numbers = {30000: 0, 65030: 1, 65000: 2, 80000:\
    \ 3,\n    74000: 4, 70000: 5,\n    70032: 6, 88000: 7, 86000: 8, 99000: 9,\n \
    \   90000: 10, 93000: 11}\n\n# Load test data\nleaderboard_test_res = pd.read_hdf('ml_data.h5',\
    \ 'leaderboard_test_res')\nhidden_test_res = pd.read_hdf('ml_data.h5', 'hidden_test_res')\n\
    \nleaderboard_test_target = pd.read_hdf('ml_data.h5', 'leaderboard_test_features_target').values\n\
    leaderboard_test_target = np.vectorize(lithology_numbers.get)(leaderboard_test_target)\n\
    hidden_test_target = pd.read_hdf('ml_data.h5', 'hidden_test_target').values\n\
    hidden_test_target = np.vectorize(lithology_numbers.get)(hidden_test_target)\n\
    \nleaderboard_accuracy_scores = []\nhidden_accuracy_scores = []\nfor (leaderboard_column,\
    \ leaderboard_data), (hidden_column, hidden_data) in zip(leaderboard_test_res.iteritems(),\
    \ hidden_test_res.iteritems()):\n\n    leaderboard_data = np.vectorize(lithology_numbers.get)(leaderboard_data)\n\
    \    leaderboard_accuracy_scores.append(np.around(score(leaderboard_data, leaderboard_test_target),4))\n\
    \    hidden_data = np.vectorize(lithology_numbers.get)(hidden_data)\n    hidden_accuracy_scores.append(np.around(score(hidden_data,\n\
    \    hidden_test_target),4))\n\n# plot the results\nplt, ax1 = plt.subplots()\n\
    labels = leaderboard_test_res.columns\nx = np.arange(len(labels))\nwidth = 0.35\n\
    rects1 = ax1.bar(x - width/2, leaderboard_accuracy_scores, width,\n    label='Leaderboard\
    \ test data set', color='#C82127')\nrects2 = ax1.bar(x + width/2, hidden_accuracy_scores,\
    \ width,\n    label='Hidden test est data set', color='#0A3A54')\nax1.set_ylabel('Accuracy\
    \ scores')\nax1.set_ylim(0,-0.7)\nax1.set_xticks(x, labels)\nax1.legend()\nax1.bar_label(rects1,\
    \ padding=-12)\nax1.bar_label(rects2, padding=-12)\n```\n\n**Listing 8.15** Final\
    \ scoring on the leaderboard and hidden test data set\n\n# References\n\nBestagini,\
    \ P., Lipari, V., & Tubaro, S. (2017). A machine learning approach to facies classification\
    \ using well logs. SEG Technical Program Expanded Abstracts, pp. 2137–2142. https://doi.org/10.1190/SEGAM2017-17729805.1\n\
    \nBormann, P., Aursand, P., Dilib, F., Manral, S., & Dischington, P. (2020). FORCE\
    \ 2020 Well well log and lithofacies dataset for machine learning competition.\
    \ Dataset on Zenodo. https://doi.org/10.5281/ZENODO.4351156\n\nHall, B. (2016).\
    \ Facies classification using machine learning. *Leading Edge*, 35(10), 906–909.\
    \ https://doi.org/10.1190/TLE35100906.1/ASSET/IMAGES/LARGE/TLE35100906.1FIG2.JPEG\n\
    \nHall, M., & Hall, B. (2017). Distributed collaborative prediction: Results of\
    \ the machine learning contest. *The Leading Edge*, 36(3), 267–269. https://doi.org/10.1190/TLE36030267.1\n\
    \nHernandez-Martinez, E., Perez-Muñoz, T., Velasco-Hernandez, J. X., Altamira-Areyan,\
    \ A., & Velasquillo-Martinez, L. (2013). Facies recognition using multifractal\
    \ hurst analysis: Applications to well-log data. *Mathematical Geosciences*, 45(4),\
    \ 471–486. https://doi.org/10.1007/S11004-013-9445-6/FIGURES/9\n\nLemaître, G.,\
    \ Nogueira, F., & Aridas, C. K. (2017). Imbalanced-learn: A python toolbox to\
    \ tackle the curse of imbalanced datasets in machine learning. *Journal of Machine\
    \ Learning Research*, 18(17), 1–5.\n\nWood, D. A. (2021). Enhancing lithofacies\
    \ machine learning predictions with gamma-ray attributes for boreholes with limited\
    \ diversity of recorded well logs. *Artificial Intelligence in Geosciences*, 2,\
    \ 148–164. https://doi.org/10.1016/J.AIG.2022.02.007\n\nZou, Q., Ni, L., Zhang,\
    \ T., & Wang, Q. (2015). Deep learning based feature selection for remote sensing\
    \ scene classification. *IEEE Geoscience and Remote Sensing Letters*, 12(11),\
    \ 2321–2325. https://doi.org/10.1190/LGRS.2015.2475299"
  mdcn: "## 8.4 最终评估\n\n为了评估每个模型的优劣，FORCE2020 挑战赛采用了一种基于惩罚矩阵的自定义评分策略（代码清单 8.12）。\n\
    \n```python\nimport numpy as np\n\nA = np.load('penalty_matrix.npy')\ndef score(y_true,\
    \ y_pred):\n    S = 0.0\n    y_true = y_true.astype(int)\n    y_pred = y_pred.astype(int)\n\
    \    for i in range(0, y_true.shape[0]):\n        S -= A[y_true[i], y_pred[i]]\n\
    \    return S/y_true.shape[0]\n```\n\n代码清单 8.12 自定义评分函数\n\n在代码清单 8.12 中，`y_true`\
    \ 和 `y_pred` 分别是预期（即正确）值和预测值，它们被转换为 0 到 11 的整数索引，如表 8.2 所示。\n\nFORCE2020 评分策略的主要目标是，对易于识别的岩性的预测错误施加比对难以识别的岩性的预测错误更重的惩罚。为实现此目标，`score()`\
    \ 函数使用图 8.7 所示的惩罚矩阵（代码清单 8.13）对每个真实值-预测值对进行加权。更具体地说，`score()` 函数返回与每个真实值-预测值对相对应的惩罚矩阵值（例如，如果你将岩盐误判为砂岩，则返回\
    \ 4；参见图 8.7）。接下来，该函数对所有评分值求和，然后通过将结果值除以预测数量来计算“平均”分数。\n\n表 8.2 将目标文件中的标签与岩相名称及评分函数的索引对应起来\n\
    \n| 标签 | 岩相 | 索引 |\n|---|---|---|\n| 30000 | '砂岩' | 0 |\n| 65030 | '砂岩/页岩' | 1\
    \ |\n| 65000 | '页岩' | 2 |\n| 80000 | '泥灰岩' | 3 |\n| 74000 | '白云岩' | 4 |\n| 70000\
    \ | '石灰岩' | 5 |\n| 70032 | '白垩' | 6 |\n| 88000 | '岩盐' | 7 |\n| 86000 | '硬石膏' |\
    \ 8 |\n| 99000 | '凝灰岩' | 9 |\n| 90000 | '煤' | 10 |\n| 93000 | '基底' | 11 |\n\n\
    ```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport seaborn\
    \ as sns\n\nA = np.load('penalty_matrix.npy')\n\nmy_labels = ['Sandstone','Sandstone/Shale','Shale','Marl',\
    \ 'Dolomite',\n            'Limestone','Chalk','Halite','Anhydrite','Tuff','Coal','Basement']\n\
    \nfig, ax = plt.subplots(figsize=(15, 12))\nax.imshow(A)\nax = sns.heatmap(A,\
    \ annot=True, xticklabels = my_labels, yticklabels = my_labels)\nfig.tight_layout()\n\
    ```\n\n代码清单 8.13 惩罚矩阵\n\n```python\nimport numpy as np\nimport pandas as pd\n\n\
    A = np.load('penalty_matrix.npy')\ndef score(y_true, y_pred):\n    S = 0.0\n \
    \   y_true = y_true.astype(int)\n    y_pred = y_pred.astype(int)\n    for i in\
    \ range(0, y_true.shape[0]):\n        S -= A[y_true[i], y_pred[i]]\n    return\
    \ S/y_true.shape[0]\n\ntarget = np.full(1000, 5) # Limestone\npredicted = np.full(1000,\
    \ 5)  # Limestone\nprint(\"Case 1: \" + str(score(target, predicted)))\n\npredicted\
    \ = np.full(1000, 6)  # Chalk\nprint(\"Case 2: \" + str(score(target, predicted)))\n\
    \npredicted = np.full(1000, 7) # Halite\nprint(\"Case 3: \" + str(score(target,\
    \ predicted)))\n\nhidden_test_target = pd.read_hdf('ml_data.h5',\n           \
    \                      'hidden_test_target').values\npredicted = np.random.randint(0,\
    \ high=12,\n                    size=1000) # Random predictions\nprint(\"Case\
    \ 4: \" + str(score(target, predicted)))\n\n''' Output:\n\nCase 1: 0.0\nCase 2:\
    \ -1.375\nCase 3: -4.0\nCase 4: -3.04625\n\n'''\n```\n\n**代码清单 8.14** 自定义评分函数\n\
    \n基于图 8.7 和代码清单 8.12，我们可以认为正确的预测对分数的贡献为零。因此，如果你正确猜出了所有预测，评分函数将返回零（参见代码清单 8.14，案例\
    \ 1）。相反，在石灰岩样本数据集上系统性地预测白垩，会返回 −1.375（代码清单 8.14，案例 2）。在石灰岩样本数据集上系统性地预测岩盐，会返回 −4.0（代码清单\
    \ 8.14，案例 3），这比案例 2 受到的惩罚要重得多。最后，考虑隐藏测试数据集，一个提供随机预测的虚拟模型产生的分数接近 −3（代码清单 8.14，案例\
    \ 4）。\n\n图 8.8 显示了将上述评分策略应用于排行榜和隐藏测试数据集的结果。尽管很简单，但通过代码清单 8.9 中实现的网格搜索产生的两个性能最佳的模型，其表现（即\
    \ > -0.50）与 FORCE2020 挑战赛中排名靠前的模型相似。\n\n```python\nimport matplotlib.pyplot as\
    \ plt\nimport pandas as pd\nimport numpy as np\n\nA = np.load('penalty_matrix.npy')\n\
    def score(y_true, y_pred):\n    S = 0.0\n    y_true = y_true.astype(int)\n   \
    \ y_pred = y_pred.astype(int)\n    for i in range(0, y_true.shape[0]):\n     \
    \   S -= A[y_true[i], y_pred[i]]\n    return S/y_true.shape[0]\n\nlithology_numbers\
    \ = {30000: 0, 65030: 1, 65000: 2, 80000: 3,\n    74000: 4, 70000: 5,\n    70032:\
    \ 6, 88000: 7, 86000: 8, 99000: 9,\n    90000: 10, 93000: 11}\n\n# Load test data\n\
    leaderboard_test_res = pd.read_hdf('ml_data.h5', 'leaderboard_test_res')\nhidden_test_res\
    \ = pd.read_hdf('ml_data.h5', 'hidden_test_res')\n\nleaderboard_test_target =\
    \ pd.read_hdf('ml_data.h5', 'leaderboard_test_features_target').values\nleaderboard_test_target\
    \ = np.vectorize(lithology_numbers.get)(leaderboard_test_target)\nhidden_test_target\
    \ = pd.read_hdf('ml_data.h5', 'hidden_test_target').values\nhidden_test_target\
    \ = np.vectorize(lithology_numbers.get)(hidden_test_target)\n\nleaderboard_accuracy_scores\
    \ = []\nhidden_accuracy_scores = []\nfor (leaderboard_column, leaderboard_data),\
    \ (hidden_column, hidden_data) in zip(leaderboard_test_res.iteritems(), hidden_test_res.iteritems()):\n\
    \n    leaderboard_data = np.vectorize(lithology_numbers.get)(leaderboard_data)\n\
    \    leaderboard_accuracy_scores.append(np.around(score(leaderboard_data, leaderboard_test_target),4))\n\
    \    hidden_data = np.vectorize(lithology_numbers.get)(hidden_data)\n    hidden_accuracy_scores.append(np.around(score(hidden_data,\n\
    \    hidden_test_target),4))\n\n# plot the results\nplt, ax1 = plt.subplots()\n\
    labels = leaderboard_test_res.columns\nx = np.arange(len(labels))\nwidth = 0.35\n\
    rects1 = ax1.bar(x - width/2, leaderboard_accuracy_scores, width,\n    label='Leaderboard\
    \ test data set', color='#C82127')\nrects2 = ax1.bar(x + width/2, hidden_accuracy_scores,\
    \ width,\n    label='Hidden test est data set', color='#0A3A54')\nax1.set_ylabel('Accuracy\
    \ scores')\nax1.set_ylim(0,-0.7)\nax1.set_xticks(x, labels)\nax1.legend()\nax1.bar_label(rects1,\
    \ padding=-12)\nax1.bar_label(rects2, padding=-12)\n```\n\n**代码清单 8.15** 在排行榜和隐藏测试数据集上的最终评分\n\
    \n# 参考文献\n\nBestagini, P., Lipari, V., & Tubaro, S. (2017). A machine learning\
    \ approach to facies classification using well logs. SEG Technical Program Expanded\
    \ Abstracts, pp. 2137–2142. https://doi.org/10.1190/SEGAM2017-17729805.1\n\nBormann,\
    \ P., Aursand, P., Dilib, F., Manral, S., & Dischington, P. (2020). FORCE 2020\

    ## 7.11 基于树的方法


    **决策树** 在描述决策树如何工作之前，让我先介绍图7.5中强调的几个定义。*根节点*是决策树的起始节点，包含参与过程的整个数据集。*父节点*是被分割成子节点的节点。*子节点*是父节点的子节点。最后，*叶节点*或*终端节点*是终止树的节点，它们不会被分割以生成额外的子节点。


    决策树算法（Breiman et al., 1984）及其变体（如随机森林和极端随机树）将输入空间分割成子区域，从而允许执行回归和分类任务（见图7.5）（Kubat,
    2017）。具体来说，每个节点映射输入空间中的一个区域，该区域在节点内使用分割标准进一步划分为子区域。因此，决策树的工作流程是



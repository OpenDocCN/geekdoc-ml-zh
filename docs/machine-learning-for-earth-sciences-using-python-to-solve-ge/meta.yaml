    \ the remote instance, we need a SSH client (e.g., a Mac OS Terminal or PuTTY<sup>11</sup>)\
    \ and into which we enter the following command:\n\n```\nssh -i local_path/aws.pem\
    \ user@user_name@host\n```\n\nwhere the *ssh* command initializes the SSH connection\
    \ from the *user* account to the *host* (i.e., an IP or a domain name) remote\
    \ instance. The -i option selects a specific private key (i.e., *aws.pem*) to\
    \ pair with the public key in the *host* instance. For the specific case shown\
    \ in Fig. 2.7, I enter:\n\n```\nssh -i /Users/maurizio/.ssh/aws.pem admin@ec2-52-91-26-146.compute-1.amazonaws.com\n\
    ```\n\nWe are now connected to the remote instance in one AWS computing facility\
    \ (Fig. 2.8) and we are ready to install the Anaconda Python Individual Edition\
    \ from the command line. Before starting the install procedure for the Anaconda\
    \ Python Individual edition, I suggest upgrading the Debian packages as follows:\n\
    \n```\n$ sudo apt-get update\n$ sudo apt-get dist-upgrade\n```\n\nThe *sudo apt-get\
    \ update* command gets you an updated list of packages. Then the *sudo apt-get\
    \ dist-upgrade* will “intelligently” upgrade these packages, without upgrading\
    \ the current Debian release. Now download the latest Anaconda Python distribution<sup>12</sup>\
    \ for Linux-x86_64 using *curl*:\n\n```\n$ curl -O https://repo.anaconda.com/archive/Anaconda3-2023.03-Linux-x86_64.sh\n\
    ```\n\nif *curl* does not work, install it as follows:\n\n```\n$ sudo apt-get\
    \ install curl\n```\n\nAt this point, we need to verify the data integrity of\
    \ the installer with cryptographic hash verification through the SHA-256 checksum.\
    \ We use the *sha256sum* command along with the filename of the script:\n\n```\n\
    $ sha256sum Anaconda3-2023.03-Linux-x86_64.sh\n```\n\nThe result is\n\n```\n19737d5c27b23a1d8740c5cb2414bf6253184ce745d0a912bb235a212a15e075\n\
    ```\n\nand must match the cryptographic hash verification code in the Anaconda\
    \ repository.<sup>13</sup> As a final step, we run the installation script:\n\n\
    ```\n$ bash Anaconda3-2023.03-Linux-x86_64.sh\n```\n\nIt starts a step-by-step\
    \ guided procedure starting with\n\n```\nWelcome to Anaconda3 py310_2023.03-0\n\
    \nIn order to continue the installation process, please review the license\nagreement.\n\
    Please, press ENTER to continue\n```\n\nPress “ENTER” to access the license information\
    \ and continue clicking “ENTER” until you get the following question:\n\n```\n\
    Do you approve the license terms? [yes|no]\n```\n\nType “yes” to get to the next\
    \ step, which is the selection of the location for the installation:\n\n```\n\
    Anaconda3 will now be installed into this location:\n/home/admin/anaconda3\n\n\
    \  - Press ENTER to confirm the location\n  - Press CTRL-C to abort the installation\n\
    \  - Or specify a different location below\n```\n\nI suggest pressing “ENTER”\
    \ to retain the default location. At the end of the installation, you receive\
    \ the following output:\n\n```\n...\ninstallation finished.\nDo you wish the installer\
    \ to initialize Anaconda3\nby running conda init? [yes|no]\n[no] >>>\n```\n\n\
    Type “yes”. For changes to take effect, close and re-open the shell. Now, the\
    \ base conda environment, highlighted by (base) at the beginning of the prompt\
    \ command, should be active:\n\n```\n(base)  [ec2-user@ip-172-31-35-226 ~]$\n\
    ```\n\nThe base environment for ML in Python is now ready for use in your remote\
    \ instance.\n\n## 2.4 Working with Your Remote Instance\n\nOnce you are connected\
    \ to your remote instance, for example, by\n\n```\n$ ssh -i local_path/aws.pem\
    \ user@user_name@host\n```\n\nknowledge of the basic Linux OS commands is mandatory.\
    \ However, a detailed explanation of the architecture, commands, and operations\
    \ of the Linux OS is again beyond the scope of this book. Consequently, I suggest\
    \ reading specialized books (Ward, 2021; Negus, 2015) to acquire the requisite\
    \ skills. Table 2.1 lists common commands that allow you to transfer files between\
    \ a local machine and remote instances. In addition, it provides basic tools for\
    \ file management in a Linux environment.\n\nTo copy a file from your local machine\
    \ to the remote instance and vice versa I suggest using the scp command, which\
    \ is based on the SSH protocol. Specifically, the command is\n\n```\n$ scp  -i\
    \ local_path/aws.pem filename user@host:/home/user/\n    filename\n```\n\n<sup>10</sup>\
    \ https://aws.amazon.com/ec2/.\n<sup>11</sup> https://www.putty.org.\n<sup>12</sup>\
    \ https://repo.anaconda.com/archive/.\n<sup>13</sup> https://docs.anaconda.com/anaconda/install/hashes/lin-3-64/."
  mdcn: "## 2 为机器学习设置你的Python环境\n\n![](img/90d3084aebf7ededff86e49f84c52faa_25_0.png)\n\
    \n图 2.1 Spyder集成开发环境截图。左侧是用于编写代码的文本编辑器。右下方面板是IPython交互式控制台，右上方面板是变量资源管理器。\n\n\
    在亚马逊云科技™（AWS）设施上设置一个Debian实例。接下来，它将展示如何在你的AWS Debian实例上设置Anaconda个人版Python环境。\n\
    \n图2.3展示了“弹性计算云”（EC2）的亚马逊管理控制台。<sup>10</sup> 从EC2管理控制台，可以通过点击“启动新实例”按钮来启动一个新的计算实例。随后是一个引导式的分步流程。用户定义其计算实例的每个细节[即，（1）选择亚马逊机器镜像；（2）选择实例类型，（3）定义密钥对；进一步配置实例、添加存储、添加标签、配置安全组，以及（4）启动实例]。在步骤（1-4）（见图2.4）中，我选择了Debian\
    \ 10 64位（x86）亚马逊机器镜像。同时，我选择了t2.micro实例类型，因为它符合“免费套餐”资格。请注意，其他选项也可能作为“免费套餐”提供，并且也可以选择大量的实例类型。例如，g5.48xlarge实例类型包含192个虚拟CPU、768\
    \ GiB内存和100 Gigabit的网络性能。总的计算能力仅取决于你可用的预算。步骤3（见图2.5）包括选择一个现有的密钥对或创建一个新的密钥对。“密钥对”提供安全凭证，以在连接到远程实例时证明你的身份。它由一个存储在远程实例中的“公钥”和一个托管在你机器上的“私钥”组成。任何拥有特定密钥对私钥的人都可以连接到存储关联公钥的实例。从你的Linux和Unix操作系统（包括Mac\
    \ OS），你可以使用`ssh-keygen`命令创建密钥对。然而，EC2管理控制台允许你通过单击来创建和管理密钥对（图2.5）。我们可以安全地将所有其他实例参数设置为默认值，然后点击“启动实例”按钮。\n\
    \n最后一步是启动实例，初始化后，它会出现在EC2管理控制台中（图2.6）。要访问一个实例，在EC2管理控制台中选择它并点击“连接”按钮（图2.6），这将打开“连接到实例”窗口，显示所有可用的访问实例选项（图2.7）。我们的选择是使用安全外壳（SSH）协议访问实例（图2.7）。SSH协议是一种加密通信系统，用于在不安全的网络上进行安全的远程登录和网络服务。它允许你从办公桌或沙发上“安全地”连接并操作远程实例。要连接到远程实例，我们需要一个SSH客户端（例如，Mac\
    \ OS终端或PuTTY<sup>11</sup>），并在其中输入以下命令：\n\n```\nssh -i local_path/aws.pem user@user_name@host\n\
    ```\n\n其中，*ssh*命令从*user*账户初始化到*host*（即IP地址或域名）远程实例的SSH连接。-i选项选择一个特定的私钥（即*aws.pem*）与*host*实例中的公钥配对。对于图2.7所示的具体情况，我输入：\n\
    \n```\nssh -i /Users/maurizio/.ssh/aws.pem admin@ec2-52-91-26-146.compute-1.amazonaws.com\n\
    ```\n\n我们现在已连接到AWS计算设施中的远程实例（图2.8），并准备从命令行安装Anaconda Python个人版。在开始安装Anaconda Python个人版之前，我建议按如下方式升级Debian软件包：\n\
    \n```\n$ sudo apt-get update\n$ sudo apt-get dist-upgrade\n```\n\n*sudo apt-get\
    \ update*命令获取更新的软件包列表。然后，*sudo apt-get dist-upgrade*将“智能地”升级这些软件包，而不会升级当前的Debian版本。现在使用*curl*下载最新的Anaconda\
    \ Python发行版<sup>12</sup>（适用于Linux-x86_64）：\n\n```\n$ curl -O https://repo.anaconda.com/archive/Anaconda3-2023.03-Linux-x86_64.sh\n\
    ```\n\n如果*curl*不工作，请按如下方式安装它：\n\n```\n$ sudo apt-get install curl\n```\n\n此时，我们需要通过SHA-256校验和进行加密哈希验证，以验证安装程序的数据完整性。我们使用*sha256sum*命令和脚本文件名：\n\
    \n```\n$ sha256sum Anaconda3-2023.03-Linux-x86_64.sh\n```\n\n结果是\n\n```\n19737d5c27b23a1d8740c5cb2414bf6253184ce745d0a912bb235a212a15e075\n\
    ```\n\n并且必须与Anaconda存储库中的加密哈希验证码匹配。<sup>13</sup> 最后一步，我们运行安装脚本：\n\n```\n$ bash\
    \ Anaconda3-2023.03-Linux-x86_64.sh\n```\n\n它启动一个分步引导流程，从以下内容开始：\n\n```\nWelcome\
    \ to Anaconda3 py310_2023.03-0\n\nIn order to continue the installation process,\
    \ please review the license\nagreement.\nPlease, press ENTER to continue\n```\n\
    \n按“ENTER”键访问许可信息，并继续点击“ENTER”直到出现以下问题：\n\n```\nDo you approve the license terms?\
    \ [yes|no]\n```\n\n输入“yes”进入下一步，即选择安装位置：\n\n```\nAnaconda3 will now be installed\
    \ into this location:\n/home/admin/anaconda3\n\n  - Press ENTER to confirm the\
    \ location\n  - Press CTRL-C to abort the installation\n  - Or specify a different\
    \ location below\n```\n\n我建议按“ENTER”键保留默认位置。安装结束后，你会收到以下输出：\n\n```\n...\ninstallation\
    \ finished.\nDo you wish the installer to initialize Anaconda3\nby running conda\
    \ init? [yes|no]\n[no] >>>\n```\n\n输入“yes”。为使更改生效，请关闭并重新打开shell。现在，基础conda环境（由提示命令开头的(base)标识）应该已激活：\n\
    \n```\n(base)  [ec2-user@ip-172-31-35-226 ~]$\n```\n\n用于Python中机器学习的基础环境现在已准备好在你的远程实例中使用。\n\
    \n## 2.4 使用你的远程实例\n\n一旦你连接到远程实例，例如，通过\n\n```\n$ ssh -i local_path/aws.pem user@user_name@host\n\
    ```\n\n掌握基本的Linux操作系统命令是必须的。然而，对Linux操作系统的架构、命令和操作的详细解释再次超出了本书的范围。因此，我建议阅读专业书籍（Ward,\
    \ 2021; Negus, 2015）以获得必要的技能。表2.1列出了允许你在本地机器和远程实例之间传输文件的常用命令。此外，它还提供了在Linux环境中进行文件管理的基本工具。\n\
    \n要将文件从本地机器复制到远程实例，反之亦然，我建议使用基于SSH协议的scp命令。具体来说，该命令是\n\n```\n$ scp  -i local_path/aws.pem\
    \ filename user@host:/home/user/\n    filename\n```\n\n<sup>10</sup> https://aws.amazon.com/ec2/.\n\
    <sup>11</sup> https://www.putty.org.\n<sup>12</sup> https://repo.anaconda.com/archive/.\n\
    <sup>13</sup> https://docs.anaconda.com/anaconda/install/hashes/lin-3-64/."

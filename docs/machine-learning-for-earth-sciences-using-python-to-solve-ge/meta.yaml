    ### 2.2 A Local Python Environment for Machine Learning


    The Individual Edition of the Anaconda Python Distribution<sup>5</sup> provides
    an example of a “ready-to-use” scientific Python environment to perform basic
    ML tasks with the scikit-learn module. It also allows advanced tasks such as installing
    libraries that are specifically developed for DL (e.g., PyTorch and TensorFlow).
    To install the Individual Edition of the Anaconda Python distribution, I suggest
    following the directives given in the official documentation.<sup>6</sup>


    First, download and run the most recent stable installer for your operating system
    (i.e., Windows, Mac, or Linux). For Windows or Mac users, a graphical installer
    is also available. The installation procedure using the graphical installer is
    the same as for any other software application. The Anaconda installer automatically
    installs the Python core and Anaconda Navigator, plus about 250 packages defining
    a complete environment for scientific visualization, analysis, and modeling. Over
    7500 additional packages, including PyTorch and TensorFlow, can be installed individually
    as needed from the Anaconda repository with the “conda”<sup>7</sup> package-management
    system. The basic tools to start learning and developing small- to medium-scale
    ML projects are the same as those used for any scientific Python Scientific project.
    Consequently, I suggest using Spyder and JupyterLab.


    Spyder<sup>8</sup> is an integrated development environment that combines a text
    editor to write code, inspection tools for debugging, and interactive Python consoles
    for code execution (Fig. 2.1).


    JupyterLab<sup>9</sup> is a web-based development environment to manage Jupyter
    Notebooks (i.e., web applications for creating and sharing computational documents,
    see Fig. 2.2).



    Table 4.1 Linkage options in AgglomerativeClustering()


    | Parameter | Equation | Note |

    | :--- | :--- | :--- |

    | linkage=''single'' | $d_{cl}(G, H) = \min_{i \in G, j \in H} d_{ij}$ | Uses
    the minimum of the distances between all observations of the two sets |

    | linkage=''complete'' | $d_{cl}(G, H) = \max_{i \in G, j \in H} d_{ij}$ | Uses
    the maximum distance between all observations of the two sets |

    | linkage=''average'' | $d_{ga}(G, H) = \frac{1}{n_g n_h} \sum_{i \in G} \sum_{j
    \in H} d_{ij}$ | Uses the average of the distances of each observation of the
    two sets |


    is in $H$ (Hastie et al., 2017). Using *AgglomerativeClustering()*, the linkage
    criterion could be single, complete, group average, or Ward (Table 4.1).


    Finally, Ward''s linkage criterion (the default in scikit-learn) states that the
    distance between two clusters $G$ and $H$ is how much the sum of squares increases
    when they are merged:


    $$\Delta(G, H) = \frac{|G| |H|}{|G| + |H|} \|\boldsymbol{m}_G + \boldsymbol{m}_H\|^2,
    \quad (4.5)$$


    where $\Delta$ is the "merging cost" of combining clusters $G$ and $H$. Also,
    $\boldsymbol{m}$, $|G|$ and $|H|$ are the center of clusters and the cardinal
    of $G$ and $H$, respectively.


    The dissimilarities $d_{ij}$ can be estimated by using different metrics. Using
    the method *AgglomerativeClustering()*, they can be "Euclidean" or "Manhattan,"
    among others. For Ward linkage, the only metric accepted is "Euclidean" [see Eq.
    (4.5)].


    ## 4.5 Density-Based Spatial Clustering of Applications with Noise


    The algorithm density-based spatial clustering of applications with noise (DBSCAN)
    relies on a "density-based notion of clusters which is designed to discover clusters
    of arbitrary shape" (Ester et al., 1996). Topologically, DBSCAN identifies a core
    sample if there exists a pre-defined minimum number of other (i.e., neighbors
    of the core sample) within a distance of $\epsilon$ (Ester et al., 1996). A cluster
    is a set of core samples plus their neighbors. Any sample that is neither a core
    sample nor a neighbor (i.e., it is at least a distance $\epsilon$ from any core
    sample) is marked as an outlier (Ester et al., 1996). Note that DBSCAN does not
    require the number of clusters to be specified.


    ## 4.6 Mean Shift


    The mean shift algorithm is a nonparametric technique for clustering analysis
    (Comaniciu & Meer, 2002); it estimates the kernel density in the investigated
    $d$-dimensional feature space (Derpanis, 2005). As a result, the kernel density
    estimation defines an empirical probability density function where “dense regions”
    identify local maxima (i.e., modes) of the underlying distribution (Derpanis,
    2005). Finally, the mean shift algorithm performs a gradient ascent (i.e., it
    searches until convergence for these maxima in the empirical probability density
    function) (Derpanis, 2005). In detail, the mean shift procedure for a given observation
    $\mathbf{x}_i$ is as follows (Derpanis, 2005; Comaniciu & Meer, 2002):


    - 1. Compute the mean shift vector $\mathbf{m}(\mathbf{x}_i^t)$ at the step $t$;

    - 2. Translate the density-estimation window: $\mathbf{x}_i^{t+1} = \mathbf{x}_i^t
    + m(\mathbf{x}_i^t)$;

    - 3. Iterate steps 1 and 2 until convergence.


    The mean shift vector is defined as follows [Eq. (17) in Comaniciu and Meer (2002)]:


    $$\mathbf{m}(\mathbf{x}_i) = \left[ \frac{\sum_{i=1}^n \mathbf{x}_i g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)}{\sum_{i=1}^n
    g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)} - \mathbf{x}
    \right],$$


    where the function $g(x)$ is the derivative of the selected kernel estimator and
    $h$ (i.e., the bandwidth parameter) defines the radius of the kernel (Comaniciu
    & Meer, 2002).


    In scikit-learn, the *MeanShift()* method uses a flat kernel to perform mean shift
    clustering. Note that the default scikit-learn parametrization of the mean shift
    algorithm automatically sets the number of clusters and the optimal $h$ (i.e.,
    the bandwidth). However, $h$ can be manually adjusted by using the *bandwidth*
    parameter.


    ## 4.7 K-Means


    The $K$-means is a clustering technique that seeks to minimize the average squared
    distance between points in the same cluster (Arthur & Vassilvitskii, 2007). Note
    that the $K$-means algorithm requires the number of clusters to be specified.
    Mathematically, the $K$-means algorithm can be expressed as follows: given an
    integer $k$ and a set of $n$ data points in $\mathbb{R}^d$, the goal is to choose
    $k$ centers to minimize the total squared distance between each point and its
    closest center (i.e., the inertia $\phi$) (Arthur & Vassilvitskii, 2007):


    $$\phi = \sum_{\mathbf{x} \in X} \min_{\mathbf{c} \in C} \|\mathbf{x} - \mathbf{c}\|^2.
    \tag{4.7}$$


    Usually, the $K$-means implementation (e.g., in scikit-learn) refers to the solution
    of the problem proposed by Lloyd (1982). In detail, the algorithm proposed by
    Arthur and Vassilvitskii (2007) consists of four steps:


    - 1. Arbitrarily choose an initial $k$ centers $C = \{\mathbf{c}_1, \mathbf{c}_2,
    \dots, \mathbf{c}_k, \}$;

    - 2. For each $i \in \{1, \dots, k\}$, set the cluster $Y_i$ to be the set of
    points in $X$ that are closer to $\mathbf{c}_i$;

    - 3. Define new centroids $\mathbf{c}_i$ by averaging all the samples assigned
    to each previous centroid;

    - 4. Repeat steps 2 and 3 until $C$ no longer changes significantly.


    In scikit-learn, the method $KMeans()$ implements $K$-means clustering. Also,
    $MiniBatchKMeans()$ modifies the $K$-means algorithm by using minibatches to save
    computation time.


    ## 4.8 Spectral Clustering


    Spectral clustering (Von Luxburg, 2007) is a ML technique that combines clustering
    with dimensionality reduction (Sugiyama, 2015). In detail, spectral clustering
    uses a kernel function to transform samples into a feature space and then applies
    a locality-preserving projection to reduce the dimensionality (see Fig. 4.1).
    Note that a locality-preserving projection in the feature space is equivalent
    to the Laplacian eigenmap manifold method described in Sect. 4.3.3 (Sugiyama,
    2015). In practice, spectral clustering performs a low-dimensional embedding of
    the similarity (or affinity) matrix between samples (Von Luxburg, 2007). Finally,
    spectral clustering uses a clustering method (e.g., $K$ means) to obtain cluster
    labels (Sugiyama, 2015; Von Luxburg, 2007).


    In scikit-learn the method $SpectralClustering()$ applies spectral clustering.
    Note that $SpectralClustering()$ requires the number of clusters to be specified
    in advance.


    ![](img/90d3084aebf7ededff86e49f84c52faa_79_0.png)


    ## 4.9 Gaussian Mixture Models


    Gaussian mixture models (GMMs) try to reconstruct the probability density function
    that underlies the investigated data set as generated by a mixture of a finite
    number of Gaussian distributions with unknown parameters (McLachlan & Peel, 2000).


    To understand how GMMs work, consider a $d$-dimensional (i.e., characterized by
    $d$ variables or features) sample set $X = \{\mathbf{x}_1, \mathbf{x}_2, \ldots,
    \mathbf{x}_n\}$ of independent and identically distributed observations (McLachlan
    & Peel, 2000). Finite mixtures models (FMMs) assume that the observations $\mathbf{x}
    \in X$ derive from a probability density function described by a mixture of $g$
    components (McLachlan & Peel, 2000; Scrucca et al., 2016):


    $$f(\mathbf{x}, \psi) = \sum_{i=1}^{g} \pi_i f_i(\mathbf{x}, \theta_i), \quad
    (4.8)$$


    where $g$ and $\psi = \{\pi_1, \ldots, \pi_{g-1}, \theta_1, \ldots, \theta_g\}$
    are the number of mixture components and the parameters of the model, respectively
    (Scrucca et al., 2016). Also, $f_i(\mathbf{x}, \theta_i)$ is the $i$th component
    density for the sample observation $\mathbf{x}$ and is parametrized by the vector
    $\theta_i$. Finally, $\{\pi_1, \ldots, \pi_{g-1}\}$ are the mixing weights (Scrucca
    et al., 2016).


    In many applications, the component densities $f_i(\mathbf{x}, \theta_i)$ are
    assumed to belong to the same parametric family (McLachlan & Peel, 2000). In some
    applications, the component densities are taken to be different. The implementation
    of a finite Gaussian mixtures model assumes $f_i(\mathbf{x}, \theta_i)$ as a multivariate
    normal, a fixed $G$, and consists of estimating the model parameters $\psi$ (McLachlan
    & Peel, 2000).


    In scikit-learn, the methods *GaussianMixture()* and *BayesianGaussianMixture()*
    implement the finite Gaussian mixture model based on expectation-maximization
    (EM) (Dempster et al., 1977) and variational Bayesian inference (Hastie et al.,
    2017; Blei & Jordan, 2006), respectively. Variational Bayesian inference is similar'

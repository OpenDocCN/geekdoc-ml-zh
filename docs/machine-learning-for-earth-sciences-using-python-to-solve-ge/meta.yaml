    Machine Learning Workflow


    # 3.1 Machine Learning Step-by-Step


    Figure 3.1 shows a generalized workflow that is common to most ML projects. The
    first step is obtaining the data. In Earth Sciences, data can come from large-scale
    geological or geochemical samplings, remote-sensing platforms, well log analyses,
    or petrological experiments, to cite a few sources. The second step is pre-processing,
    which consists of all the operations required to prepare your data set for the
    successive steps of training and validation. Training the model involves running
    ML algorithms, which is the core business of a ML workflow. The validation step
    checks the quality of the training and ensures that the model is generalizable.
    Steps 3 and 4 are often closely connected and iterated many times to improve the
    quality of the results. Finally, the last step consists of deploying and securing
    your model.

    We shall now evaluate each step and provide insights into how to successfully
    run a ML model in the field of Earth Sciences.



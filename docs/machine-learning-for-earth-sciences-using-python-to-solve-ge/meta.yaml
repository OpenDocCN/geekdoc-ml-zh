    \ from 0 to 100 (or from 0 to 1) and are not independent because changing the\
    \ value of one element automatically affects the abundance of the other components\
    \ (Aitchison, 1982). Decision-tree ensembles such as random forest (Song & Lu,\
    \ 2015) and extremely randomized trees (Geurts et al., 2006) make no specific\
    \ assumption about the data structure. Therefore, they can be applied to un-transformed\
    \ data (Aitchison, 1982). However, recent studies report that tree ensembles perform\
    \ better when applied to log-ratio pairwise-transformed data (Tolosana-Delgado\

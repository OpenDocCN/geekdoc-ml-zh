    ```

    conda env create -f env_ml.yml

    ```


    更多关于环境管理的详细信息，请参阅 conda 官方文档。15 以下列表总结了创建基于 PyTorch 的具有深度学习功能的 ML 环境所涉及的所有步骤：


    ```


    \n### 8.2 数据集检查与预处理\n\n对于FORCE 2020机器学习竞赛，⁴一个入门Jupyter笔记本已与标记的训练数据集（即包含单个文件train.csv的压缩train.zip文件）和两个测试集（即leaderboard_test_features.csv和hidden_test.csv）一起在GitHub上提供。⁵如今，所有三个文件都已标记，这意味着它们也包含正确的解决方案，要么在名为FORCE_2020_LITHOFACIES_LITHOLOGY的列中，要么在单独的文件中（Bormann\

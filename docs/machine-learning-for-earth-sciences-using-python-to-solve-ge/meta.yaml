    \nIf not addressed correctly, large outliers could affect the results of your\
    \ ML model. Consequently, I suggest implementing a strategy to remove the outliers\
    \ based on robust statistics (see, e.g., Petrelli, 2021) or applying a robust\
    \ scaler (cf. paragraph 3.3.5).\n\n## 6.4 Pre-processing and Clustering\n\nThis\
    \ section presents a simplified workflow to cluster our Sentinel2 data. As input\

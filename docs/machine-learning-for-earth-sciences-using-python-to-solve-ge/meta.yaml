- md: "In our specific case, the *ExtraTreesClassifier()* depends on many hyperparameters\
    \ such as the number of trees, the number of investigated features, and the splitting\
    \ criterion.\n\n```python\nimport pandas as pd\nfrom sklearn.ensemble import ExtraTreesClassifier\n\
    from sklearn.model_selection import train_test_split\nfrom sklearn.model_selection\
    \ import GridSearchCV\nimport joblib as jb\nfrom sklearn.preprocessing import\
    \ StandardScaler\n\nX = pd.read_hdf('ml_data.h5', 'train').values\ny = pd.read_hdf('ml_data.h5',\
    \ 'train_target').values\n\nX_train, X_test, y_train, y_test = train_test_split(\n\
    \    X, y, test_size=0.2, random_state=10, stratify=y)\n\nscaler = StandardScaler()\n\
    X_train = scaler.fit_transform(X_train)\n\nparam_grid = {\n    'criterion': ['entropy',\
    \ 'gini'],\n    'min_samples_split': [2, 5, 8, 10],\n    'max_features': ['sqrt',\
    \ 'log2', None],\n    'class_weight': ['balanced', None]\n    }\n\nclassifier\
    \ = ExtraTreesClassifier(n_estimators=250,\n                                 \
    \  n_jobs=-1)\n\nCV_rfc = GridSearchCV(estimator=classifier, param_grid=param_grid\n\
    \                       , cv= 3, verbose=10)\nCV_rfc.fit(X_train, y_train)\n\n\
    jb.dump(CV_rfc, 'ETC_grid_search_results_rev_2.pkl')\n```\n\n**Listing 8.9** Grid\
    \ search using *GridSearchCV()*\n\nAll these hyperparameters may assume different\
    \ values, which may positively or negatively affect the classification capability\
    \ of the model. The easiest way to find the best combination of the investigated\
    \ hyperparameters is to do a grid search, which consists of defining the most\
    \ relevant values for each hyperparameter and then training and evaluating a model\
    \ for each possible combination. Table 8.1 lists the hyperparameters selected\
    \ for the grid search. The *GridSearchCV()* method in scikit-learn is used to\
    \ do a grid search in Python (code listing 8.9). After importing all required\
    \ libraries (lines 1–6), the pre-processed training data set is imported (line\
    \ 8) with labels (line 9). Next, the training data set is split into two, with\
    \ one part (i.e., *X_train*) for the training and validation within the grid search,\
    \ and another part (i.e., *X_test*), never involved in the training, to test the\
    \ results obtained during the grid search and for further testing against potential\
    \ issues such as overfitting. The next step (lines 14 and 15) consists of scaling\
    \ the data set involved in the grid search to zero mean and unit variance (cf.\
    \ paragraph 3.3.5). Lines 17–22 define the set of parameters involved in the grid\
    \ search. The combination of the selected hyperparameters results in a grid of\
    \ 48 models, each repeated three times (cv = 3 at line 27) through cross validation\
    \ (see Sect. 3.5.2) for a total of 144 attempts.\n\nRunning the code listing 8.9\
    \ on my MacBook pro, equipped with a 2.3 GHz Quad-Core Intel™ Core i7 and 32 GB\
    \ of RAM, takes about 8 hours. The top panel of Fig. 8.5 displays the accuracy\
    \ scores of all 48 models, ordered by their ranking (code listing 8.10), and highlights\
    \ that the best-performing models produce accuracy scores greater than 0.95. Such\
    \ a strong performance may suggest that we are overfitting the training data set,\
    \ so, as a first step, we use the three best-performing models (code listing 8.10)\
    \ on the test data set (i.e., X_test). The bottom panel of Fig. 8.5 shows that\
    \ the accuracy scores for X_test are of the same order of magnitude as those resulting\
    \ from the grid search cross validation (i.e., ≈0.96), which does not support\
    \ the idea of strong overfitting.\n\n```python\nfrom joblib import load\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nimport pandas as pd\nfrom sklearn.ensemble\
    \ import ExtraTreesClassifier\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.preprocessing import StandardScaler\n\nCV_rfc = load('ETC_grid_search_results_rev_2.pkl')\n\
    \nmy_results = pd.DataFrame.from_dict(CV_rfc.cv_results_)\nmy_results = my_results.sort_values(by=['rank_test_score'])\n\
    \n# Plot the results of the GridSearch\nfig = plt.figure()\nax1 = fig.add_subplot(2,1,1)\n\
    ax1.plot(my_results['rank_test_score'], my_results['mean_test_score'], marker='o',\n\
    \         markeredgecolor='#0A3A54', markerfacecolor='#C82127',\n         color='#0A3A54',\n\
    \         label='Grid Search Results')\nax1.set_xticks(np.arange(1,50,4))\nax1.invert_xaxis()\n\
    ax1.set_xlabel('Model ranking')\nax1.set_ylabel('Accuracy scores')\nax1.legend()\n\
    \n# Selecting the best three performing models\nmy_results = my_results[my_results['mean_test_score']>0.956]\n\
    \n# Load and scaling\nX = pd.read_hdf('ml_data.h5', 'train').values\ny = pd.read_hdf('ml_data.h5',\
    \ 'train_target').values\n\nX_train, X_test, y_train, y_test = train_test_split(\n\
    \    X, y, test_size=0.2, random_state=10, stratify=y)\n\nscaler = StandardScaler()\n\
    X_train = scaler.fit_transform(X_train)\nX_test = scaler.transform(X_test)\n\n\
    leaderboard_test_features = pd.read_hdf('ml_data.h5', 'leaderboard_test_features').values\n\
    hidden_test = pd.read_hdf('ml_data.h5', 'hidden_test').values\n\nleaderboard_test_features_scaled\
    \ = scaler.transform(leaderboard_test_features)\nhidden_test_scaled = scaler.transform(hidden_test)\n\
    \n# Apply the three best performing model on the test dataset and on the unknowns\n\
    leaderboard_test_res = {}\nhidden_test_res  = {}\ntest_score  = []\nrank_model\
    \  = []\nfor index, row in my_results.iterrows():\n    classifier = ExtraTreesClassifier(n_estimators=250,\
    \ n_jobs=8,\n    random_state=64, **row['params'])\n    classifier.fit(X_train,\
    \ y_train)\n    my_score = classifier.score(X_test,y_test)\n    test_score.append(my_score)\n\
    \    rank_model.append(row['rank_test_score'])\n\n    my_leaderboard_test_res\
    \ = classifier.predict(\n    leaderboard_test_features_scaled)\n    my_hidden_test_res\
    \ = classifier.predict(hidden_test_scaled)\n    leaderboard_test_res['model_ranked_'\
    \ + str(row[\n    'rank_test_score'])] = my_leaderboard_test_res\n    hidden_test_res['model_ranked_'\
    \ + str(row['rank_test_score'])\n    ] = my_hidden_test_res\n\nleaderboard_test_res_pd\
    \ = pd.DataFrame.from_dict(\n    leaderboard_test_res)\nhidden_test_res_pd = pd.DataFrame.from_dict(hidden_test_res)\n\
    leaderboard_test_res_pd.to_hdf('ml_data.h5', key= 'leaderboard_test_res')\nhidden_test_res_pd.to_hdf('ml_data.h5',\
    \ key= 'hidden_test_res')\n\n# plot the resultson the test dataset\nax2 = fig.add_subplot(2,1,2)\n\
    labels = my_results['rank_test_score']\nvalidation_res = np.around(my_results['mean_test_score'],\
    \ 2)\ntest_res = np.around(np.array(test_score),2)\nx = np.arange(len(labels))\n\
    width = 0.35\nrects1 = ax2.bar(x - width/2, validation_res, width, label='Validation\
    \ data set', color='#C82127')\nrects2 = ax2.bar(x + width/2, test_res, width,\
    \ label='Test data set', color='#0A3A54')\nax2.set_ylabel('Accuracy scores')\n\
    ax2.set_xlabel('Model ranking')\nax2.set_ylim(0,1.7)\nax2.set_xticks(x, labels)\n\
    ax2.legend()\nax2.bar_label(rects1, padding=3)\nax2.bar_label(rects2, padding=3)\n\
    fig.align_ylabels()\nfig.tight_layout()\n```\n\n**Listing 8.10** Applying the\

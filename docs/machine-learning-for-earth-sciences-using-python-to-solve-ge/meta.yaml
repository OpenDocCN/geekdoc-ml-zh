    \ to the presence of large outliers, I opted for the *RobustScaler()* algorithm\
    \ (line 6 of code listings 6.6 and 6.7) in scikit-learn.\n\n```\n1 from sklearn.preprocessing\
    \ import RobustScaler\n2 from sklearn import cluster\n3 import matplotlib.colors\

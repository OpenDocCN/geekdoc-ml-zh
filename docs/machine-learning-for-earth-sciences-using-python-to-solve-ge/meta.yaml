    \ 数据，图 3.3 显示了结果。\n\n表 3.2 scikit-learn 中的缩放器和转换器。描述摘自 scikit-learn 官方文档\n\n|\
    \ | 描述 |\n|---|---|\n| **缩放器** | |\n| sklearn.preprocessing.StandardScaler() |\
    \ 通过移除均值并缩放到单位方差来标准化特征 [公式 (3.1)] |\n| sklearn.preprocessing.MinMaxScaler() |\
    \ 通过将每个特征缩放到给定范围来转换特征。默认范围是 [0,1] |\n| sklearn.preprocessing.RobustScaler() |\
    \ 使用对异常值稳健的统计量来缩放特征。此缩放器移除中位数，并根据分位数范围缩放数据。默认分位数范围是四分位距 |\n| **转换器** | |\n| sklearn.preprocessing.PowerTransformer()\
    \ | 逐特征应用幂变换，使数据更接近高斯分布 |\n| sklearn.preprocessing.QuantileTransformer() | 使用分位数信息转换特征。此方法将特征转换为遵循均匀分布或正态分布。因此，对于给定特征，此转换倾向于分散最频繁的值\
    \ |\n\n![](img/90d3084aebf7ededff86e49f84c52faa_51_0.png)\n\n图 3.3 由代码清单 3.8 缩放和转换的数据集\n\
    \n## 3.3.6 成分数据分析 (CoDA)\n\n在应用任何统计方法（包括机器学习算法）之前，必须验证其基本假设。例如，正态性假设是许多方法的基础。其他假设可能涉及样本空间的拓扑结构。地球化学测定是所谓成分数据的一个例子（Aitchison,\
    \ 1982；Aitchison & Egozcue, 2005；Razum 等人, 2023），它们是非负多元数据的样本，表示为相对于一个固定总量（通常是总和为\
    \ 1 或 100% 的百分比）的比例。成分数据的分析被称为“成分数据分析”（CoDA；Aitchison, 1984）。\n\n在成分数据中，样本空间由\
    \ Aitchison 单形 $s^D$ 表示：\n\n$$s^D = \\left\\{ \\mathbf{x} = [x_1, x_2, x_i, \\\
    dots, x_D] \\mid x_i > 0, \\; i = 1, 2, \\dots, D; \\; \\sum_{i=1}^D x_i = C \\\
    right\\},$$\n\n其中 $C$ 是一个常数，通常为 1 或 100。成分数据通常具有两个特征：(1) 数据始终为正；(2) 数据总和为常数（即它们不是独立的）。这些特征阻碍了许多统计方法的应用，因为这些方法通常假设输入样本在区间\
    \ $[-\\infty, \\infty]$ 内是独立的。从拓扑学的角度来看，单形（即成分向量的样本空间）与无约束数据相关的欧几里得空间有根本的不同（Aitchison,\
    \ 1982；Aitchison & Egozcue, 2005；Razum 等人, 2023）。因此，任何依赖于欧几里得距离的方法都不应直接用于成分数据。有四种既定的变换可用于尝试将\
    \ Aitchison 单形映射到欧几里得空间。\n\n### 成对对数比变换 (*pwlr*) (Aitchison, 1982; Aitchison &\
    \ Egozcue, 2005; Razum et al., 2023)\n\n*pwlr* 变换将成分从 $D$ 维 Aitchison 单形等距映射到\
    \ $D(D-1)/2$ 维空间。具体来说，它计算每个可能的对数比，但考虑到 $\\log(A/B) = -\\log(B/A)$，因此只需要其中一个。在经过成对对数比变换的数据上，我们可以应用不依赖于协方差函数可逆性的多元方法。*pwlr*\
    \ 变换后数据的解释相当简单，因为每个分量都源于一个简单的除法运算，然后通过对数变换来减少所得特征的偏度。\n\n*pwlr* 变换由下式给出\n\n$$pwlr(\\\
    mathbf{x}) = [\\xi_{ij} \\mid i < j = 1, 2, \\dots, D],$$\n\n其中 $\\xi_{ij} = \\\
    ln(x_i/x_j)$。请注意，*pwlr* 的冗余性产生了 $D(D-1)/2$ 个特征，这对应于一个极高维的空间。\n\n### 加法对数比变换 (alr)\
    \ (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023)\n\nalr 变换由下式给出\n\
    \n$$alr(\\mathbf{x}) = \\left[ \\ln \\frac{x_1}{x_D}, \\ln \\frac{x_2}{x_D}, \\\
    dots, \\ln \\frac{x_{D-1}}{x_D} \\right].$$\n\nalr 变换将向量从 D 维 Aitchison 单形非等距地映射到\
    \ (D-1) 维空间。\n\n与 pwlr 的情况类似，alr 数据的解释相当简单，因为它们也源于一个简单的除法运算，然后通过对数变换来减少所得特征的偏度。\n\
    \n### 中心化对数比变换 (clr)\n\n此变换由下式给出\n\n$$clr(\\mathbf{x}) = \\left[ \\ln \\frac{x_1}{g(\\\
    mathbf{x})}, \\ln \\frac{x_2}{g(\\mathbf{x})}, \\dots, \\ln \\frac{x_D}{g(\\mathbf{x})}\
    \ \\right],$$\n\n其中 $g_m(\\mathbf{x})$ 是 $\\mathbf{x}$ 各部分的几何平均值。clr 变换将向量从 D\
    \ 维 Aitchison 单形等距映射到 D 维欧几里得空间。然后，clr 变换后的数据可以由所有不依赖于协方差满秩的多元工具进行分析（Aitchison,\
    \ 1982；Aitchison & Egozcue, 2005；Razum 等人, 2023）。\n\n### 正交对数比变换 (olr)\n\n此变换也称为等距对数比变换\
    \ (ilr)。$\\mathbf{x}$ 相对于基元素 $\\mathbf{e}_l$（$l = 1, 2, \\dots, n-1$）的 olr 坐标定义为（Egozcue\
    \ & Pawlowsky-Glahn, 2005）\n\n$$x_l^* = \\sqrt{\\frac{rs}{r+s}} \\ln \\left[ \\\
    frac{g(x_{k+1}, \\dots, x_{k+r})}{g(x_{k+r+1}, \\dots, x_{k+r+s})} \\right],$$\n\
    \n其中 $x_l^*$ 是部分组 $x_{k+1}, \\dots, x_{k+r}$ 和 $g(x_{k+r+1}, \\dots, x_{k+r+s})$\
    \ 之间的平衡，而 $\\mathbf{e}_l$ 是这两组部分的平衡元素（Egozcue & Pawlowsky-Glahn, 2005）。\n\n请注意，“通过定义与单形中正交坐标系直接相关的平衡，每种多元统计技术都可以不受任何限制地使用，并且数据可以得到适当的统计评估”（Razum\
    \ 等人, 2023）。上述每种变换都具有独特的属性，可用于成分数据分析。clr 变换通常用于构建成分双标图和进行聚类分析（van den Boogaart\
    \ & Tolosana-Delgado, 2013）。尽管 alr 变换后的数据可以使用多元统计工具进行分析，但 alr 变换定义了“斜基中的坐标，如果从\
    \ alr 坐标计算通常的欧几里得距离，这会影响距离”（van den Boogaart & Tolosana-Delgado, 2013）。因此，alr\
    \ 变换“不应"

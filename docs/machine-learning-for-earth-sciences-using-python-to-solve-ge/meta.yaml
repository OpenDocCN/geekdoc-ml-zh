    # # Chapter 1

    Introduction to Machine Learning


    # ## 1.1 Machine Learning: Definitions and Terminology


    Shai and Shai (2014) define machine learning (ML) as “the automated detection
    of meaningful patterns in data.” Since this is a broad definition, I am going
    to narrow it down by providing additional definitions from various authors (e.g.,
    Samuel, 1959; Jordan & Mitchell, 2015; Géron, 2017; Murphy, 2012).


    As example, Murphy (2012) defines ML as “the application of algorithms and methods
    to detect patterns in large data sets and the use of these patterns to predict
    future trends, to classify, or to make other types of strategic decisions.”


    In one of the earliest attempts to define ML, Samuel (1959) outlined one of the
    primary goals as “a computer that can learn how to solve a specific task, without
    being explicitly programmed.” We can also take advantage of a more formal definition
    by Mitchell (1997): “A computer program is said to learn from experience E with
    respect to some task T and some performance measure P if its performance on T,
    as measured by P, improves with experience E.” But what is “experience” for a
    computer program? In the physical sciences, experience for a computer program
    almost always coincides with data, so we can reword the definition by Mitchell
    (1997) to “A computer program is said to learn from data D with respect to some
    task T and some performance measure P if its performance on T, as measured by
    P, improves with the analysis of D.”


    One shared feature of ML methods is that they attempt to solve problems without
    requiring a detailed specification of the tasks to execute (Shai & Shai, 2014).
    Especially when a human programmer cannot provide an explicit pathway to'
  - '[PAGE 16]


    ![](img/90d3084aebf7ededff86e49f84c52faa_16_0.png)


    achieve the solution to the problem, these methods can often unravel the complexity
    of hidden patterns in the investigated data set and solve it.


    By using set theory, we can define ML as a subset of artificial intelligence (AI),
    which is the effort to automate intellectual tasks normally performed by humans
    (Chollet, 2021) (Fig. 1.1). Note that AI covers a broad domain involving both
    ML and deep learning (DL). However, the AI set also includes numerous other approaches
    and techniques, some of which do not involve learning.


    To summarize, the following are the key features of ML algorithms:


    +   - ML methods try to extract meaningful patterns from a data set;

    - ML algorithms are not explicitly programmed to solve a specific task;

    - The learning process is a fundamental task in ML;

    - ML methods learn from data;

    - ML is a subset of AI;

    - DL is a subset of ML.


    When we start a new discipline, the first task is to learn the basic concepts
    and terminology. Table 1.1 gives a basic glossary to familiarize the geoscientist
    with the “language” used by data scientists, which is often difficult and sometimes
    misleading for a novice.


    # 1.2 The Learning Process


    As stated above, ML algorithms are not programmed to process a conceptual model
    defined a priori but instead attempt to uncover the complexities of large data
    sets through a so-called learning process (Bishop, 2007; Shai & Shai, 2014). In
    other words, the main goal of ML algorithms is to transform experience (i.e.,
    data) into “knowledge” (Shai & Shai, 2014).


    To better understand, we can compare the learning process of ML algorithms to
    that of humans. For example, humans begin learning to use the alphabet by'
  - '[PAGE 17]


    observing the world around them where they find sounds, written letters, words,
    or phrases. Then, at school, they understand the significance of the alphabet
    and how to combine the different letters. Similarly, ML algorithms use the training
    data to learn significant patterns and then use the learned expertise to provide
    an output (Shai & Shai, 2014). One way to classify ML algorithms is by their degree
    of “supervision” (i.e., supervised, unsupervised, or semisupervised; Shai & Shai,
    2014).


    # 1.3 Supervised Learning


    The training of supervised ML methods always provides both the input data and
    the desired solutions (i.e., the labels) to the algorithm. As an example, regression
    and classification tasks are suitable problems for supervised learning methods.

    In classification tasks (Figs. 1.2a and b), ML algorithms try to assign a new
    observation to a specific class (i.e., a set of instances characterized by the
    same label) (Lee, 2019). If you do not understand some terms, please refer to
    Table 1.1. In regression problems (Fig. 1.2c and d), ML algorithms try, in response
    to an observation, to guess the value for one or more dependent variables.

    Later in the book, we discuss extensively the application of regression and classification
    tasks in earth science problems (cf. Part III). However, Fig. 1.2 outlines two
    geological examples of supervised learning in the field of classification and



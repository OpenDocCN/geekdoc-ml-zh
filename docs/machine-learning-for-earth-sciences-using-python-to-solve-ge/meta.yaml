  md: "# 9.3 Compositional Data Analysis\n\nIn Sect. 3.3.6, we introduced the basic\
    \ concept of compositional data analysis and discussed why most of the advanced\
    \ statistical techniques cannot be applied to compositional data without a proper\
    \ transformation. In fact, many statistical methods assume independent data in\
    \ the range $-\\infty$ to $+\\infty$. Intrinsically, compositional features range\
    \ from 0 to 100 (or from 0 to 1) and are not independent because changing the\
    \ value of one element automatically affects the abundance of the other components\
    \ (Aitchison, 1982). Decision-tree ensembles such as random forest (Song & Lu,\
    \ 2015) and extremely randomized trees (Geurts et al., 2006) make no specific\
    \ assumption about the data structure. Therefore, they can be applied to un-transformed\
    \ data (Aitchison, 1982). However, recent studies report that tree ensembles perform\
    \ better when applied to log-ratio pairwise-transformed data (Tolosana-Delgado\
    \ et al., 2019). Although tree-based ensembles do not strictly require a CoDA\
    \ transformation, they benefit from the introduction of new features (i.e., pairwise\
    \ log-ratios) derived from existing features such as the augmentation of the feature\
    \ input space. The result is reduced overfitting, which improves generalization.\
    \ This chapter compares the results of the extremely randomized trees algorithm\
    \ applied to both un-transformed and un-transformed plus log-ratio pairwise transformed\
    \ data, as suggested by Tolosana-Delgado et al. (2019). To add the log-ratio pairwise\
    \ transformation to our pre-processing strategy, we simply add a new function\
    \ to code listing 9.1. Code listing 9.3 shows the final version of our pre-processing\
    \ strategy, which now includes the log-ratio pairwise transformation.\n\n```\n\

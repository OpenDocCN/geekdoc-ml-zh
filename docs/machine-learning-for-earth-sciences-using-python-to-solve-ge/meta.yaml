    依赖于用更高性能语言（主要是 C 和 C++）开发的库，以及像 CUDA 这样的并行计算平台。¹⁸ 例如，用于科学计算的核心 Python 库 NumPy
    就是基于优化的 C 代码。¹⁹ 对于 ML 用途，所有 scikit-learn、PyTorch 和 Tensorflow 都提供了一个基础版本的库，可以安全地安装在任何本地机器上，用于快速原型设计和中小规模问题。此外，也提供了针对密集计算应用的优化版本。例如，Intel™

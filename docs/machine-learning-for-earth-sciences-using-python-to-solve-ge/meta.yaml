  md: "Typically, our aim is to minimize the cost function $C(\\boldsymbol{\\theta})$,\
    \ and the gradient descent (GD) is an appropriate method to do this. GD works\
    \ by updating the parameters (in our case $\\boldsymbol{\\theta}$) governing our\
    \ model [i.e., $f_{\\boldsymbol{\\theta}}(\\mathbf{x})$], in the direction opposite\
    \ that of the cost-function gradient $\\nabla C(\\boldsymbol{\\theta})$ (Sugiyama,\
    \ 2015):\n\n$$\\boldsymbol{\\theta}^{t+1} = \\boldsymbol{\\theta}^{t} - \\gamma\
    \ \\nabla C(\\boldsymbol{\\theta}^{t}).$$\n\nIn the simplest example of linear\
    \ regression with $\\mathbf{x} \\in \\mathbb{R}$,\n\n$$f_{\\boldsymbol{\\theta}}(\\\
    mathbf{x}) = \\theta_1 + \\theta_2 x,$$\n\nthe mean squared-error cost function\
    \ is\n\n$$C(\\boldsymbol{\\theta}) = \\frac{1}{n} \\sum_{i=1}^{n} [y_i - (\\theta_1\
    \ + \\theta_2 x_i)]^2.$$\n\nNote that the simple linear example in $\\mathbb{R}$\
    \ can be easily generalized to $\\mathbb{R}^d$. Also, note that the example of\
    \ linear regression proposed here has a well-known and easy-to-apply least squares\
    \ analytical solution in the case of linearity (i.e., $x$ is linear in the mean\
    \ of $y$), independence (i.e., the observations are independent of each other),\
    \ and normality [i.e., for any fixed value of $x$, $y$ is normally distributed\
    \ (Maronna et al., 2006)]. However, this self-explanatory example shows how GD\
    \ works.\n\nTo develop a GD, the first step is to compute the partial derivative\
    \ of $C(\\boldsymbol{\\theta})$ with respect to $\\theta_1$ and $\\theta_2$. Therefore,\
    \ we write\n\n$$D_{\\theta_1} = \\frac{-2}{n} \\sum_{i=1}^{n} [y_i - (\\theta_1\
    \ + \\theta_2 x_i)],$$\n\n$$D_{\\theta_2} = \\frac{-2}{n} \\sum_{i=1}^{n} [y_i\
    \ - (\\theta_1 + \\theta_2 x_i)]x_i.$$\n\n```\n1 import numpy as np\n2 import\
    \ matplotlib.pyplot as plt\n3 line_colors = ['#F15C61','#0F7F8B','#0A3A54','#C82127']\n\
    4 \n5 # linear data set with noise\n6 n = 100\n7 theta_1, theta_2 = 3, 1 # target\

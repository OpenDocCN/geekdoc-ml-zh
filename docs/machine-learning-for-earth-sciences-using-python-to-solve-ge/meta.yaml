    # Chapter 8

    Classification of Well Log Data Facies by Machine Learning


    # 8.1 Motivation


    Recognizing facies in wells through well-log data analysis is a common task in
    many geological fields such as trap reservoir characterization, sedimentology
    analysis, and depositional-environment interpretation (Hernandez-Martinez et al.,
    2013; Wood, 2021). I started conceiving this chapter when I discovered the FORCE
    2020¹ ML competition (Bormann et al., 2020) and the SEG 2016² ML contest (M. Hall
    & Hall, 2017). In these two contests, students and early-career researchers attempt
    to identify lithofacies in a blind data set of well-log data (i.e., gamma-ray,
    resistivity, photoelectric effect, etc. . . . ) by using a ML algorithm of their
    selection to be trained on a labeled data set made available to all competitors.
    The competitors of the 2016 edition were supported by a tutorial by Brendon Hall
    (B. Hall, 2016) and Hall and Hall (M. Hall & Hall, 2017). Also, Bestagini et al.
    (2017) described a strategy to achieve the final goal for the 2016 edition. Note
    that the starter notebook³ of the FORCE 2020 ML competition contains all you need
    to begin: it shows how to import the training data set, inspect the imported data
    set, and start developing a model based on the random forest algorithm.


    This chapter focuses on the FORCE 2020 Machine Learning competition by progressively
    developing a ML workflow (i.e., descriptive statistics, algorithm selection, model
    optimization, model training, and application of the model to the blind data set)
    and discussing each step to make everything as simple as possible.


    ¹ https://github.com/bolgebrygg/Force-2020-Machine-Learning-competition.

    ² https://github.com/seg/2016-ml-contest.

    ³ https://bit.ly/force2020_ml_start.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2023


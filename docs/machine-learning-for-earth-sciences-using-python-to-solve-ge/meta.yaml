    of the core sample) within a distance of $\epsilon$ (Ester et al., 1996). A cluster
    is a set of core samples plus their neighbors. Any sample that is neither a core
    sample nor a neighbor (i.e., it is at least a distance $\epsilon$ from any core
    sample) is marked as an outlier (Ester et al., 1996). Note that DBSCAN does not
    require the number of clusters to be specified.'
  - '[PAGE 77]


    # 4.6 Mean Shift


    The mean shift algorithm is a nonparametric technique for clustering analysis
    (Comaniciu & Meer, 2002); it estimates the kernel density in the investigated
    $d$-dimensional feature space (Derpanis, 2005). As a result, the kernel density
    estimation defines an empirical probability density function where “dense regions”
    identify local maxima (i.e., modes) of the underlying distribution (Derpanis,
    2005). Finally, the mean shift algorithm performs a gradient ascent (i.e., it
    searches until convergence for these maxima in the empirical probability density
    function) (Derpanis, 2005). In detail, the mean shift procedure for a given observation
    $\mathbf{x}_i$ is as follows (Derpanis, 2005; Comaniciu & Meer, 2002):


    +   1. Compute the mean shift vector $\mathbf{m}(\mathbf{x}_i^t)$ at the step
    $t$;

    2. Translate the density-estimation window: $\mathbf{x}_i^{t+1} = \mathbf{x}_i^t
    + m(\mathbf{x}_i^t)$;

    3. Iterate steps 1 and 2 until convergence.


    The mean shift vector is defined as follows [Eq. (17) in Comaniciu and Meer (2002)]:


    ```

    $$\mathbf{m}(\mathbf{x}_i) = \left[ \frac{\sum_{i=1}^n \mathbf{x}_i g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)}{\sum_{i=1}^n
    g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)} - \mathbf{x}
    \right],$$

    ```


    where the function $g(x)$ is the derivative of the selected kernel estimator and
    $h$ (i.e., the bandwidth parameter) defines the radius of the kernel (Comaniciu
    & Meer, 2002).


    In scikit-learn, the *MeanShift()* method uses a flat kernel to perform mean shift
    clustering. Note that the default scikit-learn parametrization of the mean shift
    algorithm automatically sets the number of clusters and the optimal $h$ (i.e.,
    the bandwidth). However, $h$ can be manually adjusted by using the *bandwidth*
    parameter.


    # 4.7 K-Means


    The $K$-means is a clustering technique that seeks to minimize the average squared
    distance between points in the same cluster (Arthur & Vassilvitskii, 2007). Note
    that the $K$-means algorithm requires the number of clusters to be specified.
    Mathematically, the $K$-means algorithm can be expressed as follows: given an
    integer $k$ and a set of $n$ data points in $\mathbb{R}^d$, the goal is to choose
    $k$ centers to minimize'
  - '[PAGE 78]


    the total squared distance between each point and its closest center (i.e., the
    inertia $\phi$) (Arthur & Vassilvitskii, 2007):


    $$\phi = \sum_{\mathbf{x} \in X} \min_{\mathbf{c} \in C} \|\mathbf{x} - \mathbf{c}\|^2.
    \tag{4.7}$$


    Usually, the $K$-means implementation (e.g., in scikit-learn) refers to the solution
    of the problem proposed by Lloyd (1982). In detail, the algorithm proposed by
    Arthur and Vassilvitskii (2007) consists of four steps:


    +   1. Arbitrarily choose an initial $k$ centers $C = \{\mathbf{c}_1, \mathbf{c}_2,
    \dots, \mathbf{c}_k, \}$;

    2. For each $i \in \{1, \dots, k\}$, set the cluster $Y_i$ to be the set of points
    in $X$ that are closer to $\mathbf{c}_i$;

    3. Define new centroids $\mathbf{c}_i$ by averaging all the samples assigned to
    each previous centroid;

    4. Repeat steps 2 and 3 until $C$ no longer changes significantly.


    In scikit-learn, the method $KMeans()$ implements $K$-means clustering. Also,
    $MiniBatchKMeans()$ modifies the $K$-means algorithm by using minibatches to save
    computation time.


    # 4.8 Spectral Clustering


    Spectral clustering (Von Luxburg, 2007) is a ML technique that combines clustering
    with dimensionality reduction (Sugiyama, 2015). In detail, spectral clustering
    uses a kernel function to transform samples into a feature space and then applies
    a locality-preserving projection to reduce the dimensionality (see Fig. 4.1).
    Note that a locality-preserving projection in the feature space is equivalent
    to the Laplacian eigenmap manifold method described in Sect. 4.3.3 (Sugiyama,
    2015). In practice, spectral clustering performs a low-dimensional embedding low-dimensional
    embedding of the similarity (or affinity) matrix between samples (Von Luxburg,
    2007). Finally, spectral clustering uses a clustering method (e.g., $K$ means)
    to obtain cluster labels (Sugiyama, 2015; Von Luxburg, 2007).


    In scikit-learn the method $SpectralClustering()$ applies spectral clustering.
    Note that $SpectralClustering()$ requires the number of clusters to be specified
    in advance.'

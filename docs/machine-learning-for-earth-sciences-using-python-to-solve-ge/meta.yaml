    The engine *torch.autograd* is PyTorch’s automatic differentiation engine. It
    defines a directed acyclic graph whose leaves are the input tensors and whose
    roots are the output tensors. In this way, it computes gradients via the chain
    rule.


    # 12.5.4 Optimization


    Once defined, the optim submodule of torch (i.e. *torch.optim*) stores the optimization
    algorithms (Table 12.2).


    # 12.5.5 Network Architectures


    This section provides a quick overview of some popular neural network architectures.


    # Multilayer Perceptron


    A multilayer perceptron is the neural network structure depicted in Fig. 12.2.
    It consists of fully connected layers of perceptrons (i.e., artificial neurons).
    Selecting the optimal number of hidden layers is not always straightforward and
    is commonly driven by background knowledge and experimentation (Hastie et al.,
    2017). With too few hidden units, the model might not have enough flexibility
    to capture the nonlinearities in the data; with too many hidden units, the extra
    weights can be'
  - '[PAGE 206]


    shrunk toward zero if appropriate regularization is used.” Common applications
    typically use 5–100 hidden layers (Hastie et al., 2017). Most ML models described
    in Chap. 7 (e.g., support vector machines or logistic regression) can be simulated
    by multilayer perceptrons containing only one or two layers (Aggarwal, 2018).


    # Radial Basis Function Networks


    Radial basis function networks consist of shallow (i.e., only two layers) neural
    networks where the first and the second layers are unsupervised and supervised,
    respectively (Aggarwal, 2018). Radial basis function networks are based on Cover’s
    theorem on the separability of patterns (Cover, 1965), stating that pattern classification
    problems are more likely to be linearly separable when cast into a high-dimensional
    space with a nonlinear transformation. The idea behind radial basis function networks
    is close to that of nearest-neighbor classifiers with the addition of a supervised
    step in the second layer (Aggarwal, 2018). Also, they are similar to support vector
    machines trained with radial basis functions as the kernel. However, radial basis
    function networks are more general than kernel support vector machines (Aggarwal,
    2018).


    # Restricted Boltzmann Machines


    Restricted Boltzmann machines (RBMs) are unsupervised neural network architectures
    that rely on energy minimization (Fischer & Igel, 2012). Although RBMs were introduced
    in the 1980s (Aggarwal, 2018), the increase in computational power and the development
    of new learning strategies has made RBMs significantly more appealing in recent
    years (Fischer & Igel, 2012). RBMs are useful for creating generative models (Fischer
    & Igel, 2012) and are closely related to probabilistic graphical models (Koller
    & Friedman, 2009). Also, RBMs have been proposed as building blocks for so-called
    “deep belief networks” ((Hinton et al., 2006). Training a RBM is rather different
    from training a feedforward network because it cannot use backpropagation (Fischer
    & Igel, 2012). On the contrary, RBMs rely on Monte Carlo sampling for the training
    (Fischer & Igel, 2012).


    # Recurrent Neural Networks


    Recurrent neural networks (RNNs) are designed to investigate sequential data such
    as text sentences, time series, and other discrete sequences (Abraham and Tyagi,
    2022). An important point about RNNs is that they account for the potential dependence
    of subsequent inputs on previous inputs, making them well suited, for example,
    for time series forecasting or speech recognition (Kumar & Abraham, 2022; Aggarwal,
    2018). RNNs use a specific backpropagation algorithm called “backpropagation through
    time” (Aggarwal, 2018), which accounts for the sequential nature of the inputs
    during the learning process. A drawback of RNNs is their complex optimization
    and training processes, making them difficult to access, especially for novices
    (Kumar & Abraham, 2022; Aggarwal, 2018). Specialized variants of the recurrent
    neural network architecture have also been proposed to'
  - '[PAGE 207]


    solve specific problems, such as handling long-term dependencies using long short-term
    memory networks (Hochreiter & Schmidhuber, 1997)


    # Convolutional Neural Networks


    Convolutional neural networks (CNNs) are biologically inspired networks that find
    applications in video and speech recognition, recommendation systems, image classification
    and segmentation, natural language processing, and time series forecasting (see,
    e.g., Yamashita et al., 2018). CNNs mimic the visual cortex functionalities of
    animals (Fukushima, 1980) and aim to “automatically and adaptively learn spatial
    hierarchies of features through backpropagation by using multiple building blocks,
    such as convolution layers, pooling layers, and fully connected layers” (Fukushima,
    1980).


    CNNs are well suited to process grid-shaped data such as RGB images or spectral
    maps by using three main types of layers: convolution, pooling, and fully connected
    (Fukushima, 1980). The first two layer types extract features and the third layer
    maps the extracted features to the final output.


    Convolution layers play a fundamental role in CNNs (Yamashita et al., 2018). They
    typically consist of three components: input data, a filter (or kernel), and a
    feature map (Yamashita et al., 2018). To better understand, consider the example
    shown in Fig. 12.7, where the input and the kernel are 6 × 6 and 3 × 3 arrays,
    respectively. The output is a 4 × 4 array named “feature map,” “activation map,”
    or “convolved feature” and derives from the systematic application of the filter
    (i.e., a dot product) to different portions of the input. After each convolution,
    the CNN applies an activation function such as a rectified linear unit (ReLU)
    to the output and then moves to the next layer (Yamashita et al., 2018).


    Pooling layers reduce the dimensionality (or downsample), which reduces the number
    of parameters in the input. They typically consist of a filter that applies an
    aggregation function such as the max or average pooling (Fukushima, 1980). Max
    pooling selects the pixel with the maximum output of the filter and sends it to
    the output array. Similarly, average pooling calculates the average value within
    the filter and sends it to the output array. If you complain that a huge amount
    of information is lost in the pooling layers, you would be right. However, pooling
    layers reduce the complexity of the model, improve its efficiency, and limit the
    risk of overfitting (Fukushima, 1980). Finally, fully connected layers mimic a
    multilayer perceptron. For example, CNNs are widely used in semantic image segmentation
    (see, e.g., Badrinarayanan et al., 2017; Long et al., 2015; Milletari et al.,
    2016). Semantic image segmentation consists of identifying the areas (i.e., the
    pixels) of the image occupied by a specific subject, such as a person, as in the
    case of Fig. 12.8.'

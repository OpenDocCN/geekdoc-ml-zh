    ## 12.5 How to Train a Feedforward Network


    Table 12.2 Optimization algorithms in PyTorch: https://bit.ly/pytorch-optim


    | Optimization algorithm | Description |

    | --- | --- |

    | Adadelta | Implements Adadelta algorithm |


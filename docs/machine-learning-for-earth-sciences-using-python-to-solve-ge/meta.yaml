    \n## 12.4 Structuring a Feedforward Network in PyTorch\n\nFigure 12.6 shows how\
    \ to develop in PyTorch the feedforward neural network (i.e., a multilayer perceptron)\
    \ shown in Fig. 12.2.\n\nThe feedforward neural network consists of an input layer\
    \ (layer 1) that accepts input vectors with four features. ReLU functions process\
    \ the input features and forward the results to a hidden layer (layer 2), which\
    \ is characterized by four neurons and a ReLU activation function (i.e., the ReLU\
    \ function). Finally, the output layer returns a scalar as output.\n\nIn PyTorch,\
    \ a neural network is a module with a nested structure. In other words, a neural\
    \ network consists of a module that contains other modules (i.e., layers). The\n\
    \n```python\n[1]: import torch\nfrom torch import nn\nLast executed at 2022-08-17\
    \ 16:34:00 in 571ms\n```\n\n```python\n[2]: class MultilayerPerceptron(nn.Module):\n\
    \    '''\n    Example of Multilayer Perceptron\n    '''\n    def __init__(self):\n\
    \        super().__init__()\n        self.layers = nn.Sequential(\n          \
    \  nn.Linear(4, 4),\n            nn.ReLU(),\n            nn.Linear(4, 4),\n  \
    \          nn.ReLU(),\n            nn.Linear(4, 1)\n        )\n\n    def forward(self,\
    \ x):\n        return self.layers(x)\nLast executed at 2022-08-17 16:34:00 in\
    \ 4ms\n```\n\n```python\n[3]: device = \"cuda\" if torch.cuda.is_available() else\
    \ \"cpu\"\n\nprint(f\"Using {device} device\")\nLast executed at 2022-08-17 16:34:00\
    \ in 4ms\nUsing cpu device\n```\n\n```python\n[4]: model = MultilayerPerceptron().to(device)\n\

- md: "## 3.3 Data Pre-processing\n\nPre-processing consists of all operations required\
    \ to prepare your data set for the next steps (e.g., training and validation;\
    \ Maharana et al., 2022). This step is crucial because it converts raw data into\
    \ a form suitable to build a ML model. While developing a ML project, you will\
    \ likely spend most of your time preparing your data for the training. In detail,\
    \ pre-processing refers to preparing (e.g., cleaning, organizing, normalizing)\
    \ the raw data before moving to the training. In addition, pre-processing includes\
    \ the preliminary steps to allow validation (e.g., train-test splitting).\n\n\
    ## 3.3.1 Data Inspection\n\nData inspection is the qualitative investigation of\
    \ a data set and allows one to become familiarized with the data set. A fundamental\
    \ task of data inspection is descriptive statistics, which provides a clear understanding\
    \ of the “shape” and structure of the data. To see how descriptive statistics\
    \ can help, consider the following example: By looking at the histogram distributions,\
    \ you can start arguing whether methods that require specific assumptions (e.g.,\
    \ a Gaussian structure) are well suited to analyze your data.\n\nCode listing\
    \ 3.5 shows how to undertake a preliminary determination of the main descriptive\
    \ indexes of location, such as the mean and the median (e.g., $p_{50}$ or the\
    \ 50% percentile), and dispersion, such as the standard deviation and range (e.g.,\
    \ $range = max - min$) or the interquartile range (e.g., $iqr = p_{75} - p_{25}$).\n\
    \n```\nIn [1]: sub_data = my_data[['12C/13C', '14N/15N']]\n\nIn [2]: sub_data.describe().applymap(\"\
    {0:.0f}\".format)\n\nOut[2]:\n        12C/13C  14N/15N\ncount    19581     2544\n\
    mean        66     1496\nstd        207     1901\nmin          1        4\n25%\
    \         44      336\n50%         55      833\n75%         69     2006\nmax \
    \     21400    19023\n```\n\n**Listing 3.5** Determining descriptive statistics\
    \ in Python\n\nFigure 3.2 and code listing 3.6 show how Python can be used to\
    \ statistically visualize a data set. In more detail, Fig. 3.2 shows the distribution\
    \ of data in the $^{14}N/^{15}N$ versus $^{12}C/^{13}C$ projection (left panel)\
    \ and the histogram distribution of $^{12}C/^{13}C$ (right panel).\n\n![](img/90d3084aebf7ededff86e49f84c52faa_47_0.png)\n\
    \n**Fig. 3.2** Descriptive statistics (code listing 3.6)\n\n```python\nimport\
    \ matplotlib.pyplot as plt\n\nfig = plt.figure(figsize=(9,4))\nax1 = fig.add_subplot(1,2,1)\n\
    ax1.plot(my_data['12C/13C'], my_data['14N/15N'],\n         marker='o', markeredgecolor='k',\n\
    \         markerfacecolor='#BFD7EA', linestyle='',\n         color='#7d7d7d',\n\
    \         markersize=6)\nax1.set_yscale('log')\nax1.set_xscale('log')\nax1.set_xlabel(r'$^{12}C/^{13}C$')\n\
    ax1.set_ylabel(r'$^{14}N/^{15}N$')\n\nax2 = fig.add_subplot(1,2,2)\nax2.hist(my_data['12C/13C'],\
    \ density=True, bins='auto',\n         histtype='stepfilled', color='#BFD7EA',\
    \ edgecolor='black',)\nax2.set_xlim(-1,250)\nax2.set_xlabel(r'$^{12}C/^{13}C$')\n\
    ax2.set_ylabel('Probability Density')\n\nfig.set_tight_layout(True)\n```\n\n**Listing\
    \ 3.6** Obtaining descriptive statistics in Python\n\n## 3.3.2 Data Cleaning and\
    \ Imputation\n\nIn real-world data sets such as geological data sets, “unwanted”\
    \ entries are ubiquitous (Zhang, 2016). Examples include voids (i.e., missing\
    \ data), “Not a Number” (NaN) entries, and large outliers. Cleaning a data set\
    \ mainly consists of removing such unwanted entries. For example, the methods\
    \ .dropna() and .fillna() help when working with missing data; these are imported\
    \ by pandas as NaN (see code listing 3.7).\n\n```python\nimport pandas as pd\n\
    \ncleaned_data = my_data.dropna(\n    subset=['d(135Ba/136Ba)', 'd(138Ba/136Ba)'])\n\
    \nprint(\"Before cleaning: {} cols\".format(my_data.shape[0]))\nprint(\"After\
    \ cleaning: {} cols\".format(cleaned_data.shape[0]))\n\n'''\nOutput:\nBefore cleaning:\
    \ 19978 cols\nAfter cleaning: 206 cols\n'''\n```\n\n**Listing 3.7** Removing NaN\
    \ values\n\nIn detail, the .dropna() at line 3 removes all the rows where the\
    \ isotopic value of $\\delta^{135}Ba_{136}$ [‰] or $\\delta^{138}Ba_{136}$ [‰]\
    \ are missing.\n\nAlthough appealing for its simplicity, removing entries containing\
    \ missing values has some drawbacks, the most significant of which is the loss\
    \ of information (Zhang, 2016). In particular, when dealing with a large number\
    \ of features, a substantial number of observations may be removed because a single\
    \ feature is missing, potentially introducing large biases (Zhang, 2016). A possible\
    \ solution is data imputation, which is the replacement of missing values with\
    \ imputed values. Several methods have been developed for data imputation, the\
    \ easiest of which consists of replacing missing values with the mean, median,\
    \ or mode of the investigated feature (Zhang, 2016). In pandas, .fillna() replaces\
    \ NaN entries with text or a specific value. Also, the SimpleImputer() in scikit-learn\
    \ imputes missing values with the mean, median, or mode.\n\nA more evolved strategy\
    \ consists of data imputation with regression (Zhang, 2016). In this case, you\
    \ first fit a regression model (e.g., linear or polynomial) and then use the model\
    \ to impute missing values (Zhang, 2016). In scikit-learn, the function IterativeImputer()\
    \ develops an imputation strategy based on multiple regressions.\n\n## 3.3.3 Encoding\
    \ Categorical Features\n\nMost available machine learning algorithms do not support\
    \ the use of categorical (i.e., nominal) features. Therefore, categorical data\
    \ must be encoded (i.e., converted to a sequence of numbers). In scikit-learn,\
    \ OrdinalEncoder() encodes categorical features such as integers (i.e., 0 to $n_{categories}\
    \ - 1$).\n\n## 3.3.4 Data Augmentation\n\nData augmentation aims to increase the\
    \ generalizability of ML models by increasing the amount of information in our\
    \ data sets (Maharana et al., 2022), which consists of either adding modified\
    \ copies of the available data (e.g., flipped or rotated images in the case of\
    \ image classification) or combining existing features to generate new features.\
    \ For example, Maharana et al. (2022) describe six data augmentation techniques\
    \ for image analysis: (1) symbolic augmentation, (2) rule-based augmentation,\
    \ (3) graph-structured augmentation, (4) mixup augmentation, (5) feature-space\
    \ augmentation, and (6) neural augmentation (Maharana et al., 2022). Although\
    \ the details of feature augmentation are far beyond the scope of this book, we\
    \ will exploit data augmentation in Chap. 8 by following the strategy proposed\
    \ by Bestagini et al. (2017).\n\n## 3.3.5 Data Scaling and Transformation\n\n\
    The scaling and transformation of a data set is often a crucial step in ML workflows.\
    \ Many ML algorithms strongly benefit from a preliminary “standardization” of\
    \ the investigated data set. For example, all algorithms that use the Euclidean\
    \ distance (and there are many of them!) as fundamental metrics may be significantly\
    \ biased upon introducing features that differ significantly in magnitude.\n\n\
    **Definition** In a standardized data set, all features are centered on zero and\
    \ their variance is of the same order of magnitude.\n\nIf a feature variance is\
    \ orders of magnitude greater than the other feature variances, it might play\
    \ a dominant role and prevent the algorithm from correctly learning the other\
    \ features. The easiest way to standardize a data set is to subtract the mean\
    \ and scale to unit variance:\n\n$$\\tilde{x}_e^i = \\frac{x_e^i - \\mu^e}{\\\
    sigma_s^e}$$\n\nIn Eq. (3.1), $\\tilde{x}_e^i$ and $x_e^i$ are the transformed\
    \ and original components, respectively. For example, they could belong to the\
    \ sample distribution of a chemical element $e$ such as $\\text{SiO}_2$ or $\\\
    text{TiO}_2$ characterized by a mean $\\mu^e$ and a standard deviation $\\sigma_s^e$.\n\
    \nScikit-learn implements Eq. (3.1) in the `sklearn.preprocessing.StandardScaler()`\
    \ method.\n\nIn addition, scikit-learn implements additional scalers and transformers,\
    \ which perform linear and nonlinear transformations, respectively. For example,\
    \ `MinMaxScaler()` scales each feature belonging to a data set to a given range\
    \ (e.g., between 0 and 1)."
  mdcn: "## 3.3 数据预处理\n\n预处理包含为数据集准备后续步骤（例如，训练和验证；Maharana 等人，2022）所需的所有操作。这一步至关重要，因为它将原始数据转换为适合构建机器学习模型的形式。在开发机器学习项目时，你很可能会将大部分时间用于为训练准备数据。具体来说，预处理指的是在进入训练阶段之前，对原始数据进行准备（例如，清理、组织、归一化）。此外，预处理还包括允许验证的初步步骤（例如，训练-测试集划分）。\n\
    \n## 3.3.1 数据检查\n\n数据检查是对数据集的定性研究，有助于熟悉数据集。数据检查的一项基本任务是描述性统计，它提供了对数据“形状”和结构的清晰理解。为了了解描述性统计如何提供帮助，请考虑以下示例：通过查看直方图分布，你可以开始判断那些需要特定假设（例如，高斯结构）的方法是否适合分析你的数据。\n\
    \n代码清单 3.5 展示了如何对主要的位置描述性指标（如均值和中位数，例如 $p_{50}$ 或第 50 百分位数）以及离散度指标（如标准差和范围，例如\
    \ $range = max - min$ 或四分位距，例如 $iqr = p_{75} - p_{25}$）进行初步确定。\n\n```\nIn [1]:\
    \ sub_data = my_data[['12C/13C', '14N/15N']]\n\nIn [2]: sub_data.describe().applymap(\"\
    {0:.0f}\".format)\n\nOut[2]:\n        12C/13C  14N/15N\ncount    19581     2544\n\
    mean        66     1496\nstd        207     1901\nmin          1        4\n25%\
    \         44      336\n50%         55      833\n75%         69     2006\nmax \
    \     21400    19023\n```\n\n**清单 3.5** 在 Python 中确定描述性统计量\n\n图 3.2 和代码清单 3.6\
    \ 展示了如何使用 Python 对数据集进行统计可视化。更具体地说，图 3.2 显示了数据在 $^{14}N/^{15}N$ 对 $^{12}C/^{13}C$\
    \ 投影中的分布（左图）以及 $^{12}C/^{13}C$ 的直方图分布（右图）。\n\n![](img/90d3084aebf7ededff86e49f84c52faa_47_0.png)\n\
    \n**图 3.2** 描述性统计（代码清单 3.6）\n\n```python\nimport matplotlib.pyplot as plt\n\n\
    fig = plt.figure(figsize=(9,4))\nax1 = fig.add_subplot(1,2,1)\nax1.plot(my_data['12C/13C'],\
    \ my_data['14N/15N'],\n         marker='o', markeredgecolor='k',\n         markerfacecolor='#BFD7EA',\
    \ linestyle='',\n         color='#7d7d7d',\n         markersize=6)\nax1.set_yscale('log')\n\
    ax1.set_xscale('log')\nax1.set_xlabel(r'$^{12}C/^{13}C$')\nax1.set_ylabel(r'$^{14}N/^{15}N$')\n\
    \nax2 = fig.add_subplot(1,2,2)\nax2.hist(my_data['12C/13C'], density=True, bins='auto',\n\
    \         histtype='stepfilled', color='#BFD7EA', edgecolor='black',)\nax2.set_xlim(-1,250)\n\
    ax2.set_xlabel(r'$^{12}C/^{13}C$')\nax2.set_ylabel('Probability Density')\n\n\
    fig.set_tight_layout(True)\n```\n\n**清单 3.6** 在 Python 中获取描述性统计量\n\n## 3.3.2 数据清洗与插补\n\
    \n在现实世界的数据集（如地质数据集）中，“不想要”的条目无处不在（Zhang, 2016）。例子包括空值（即缺失数据）、“非数字”（NaN）条目和大的异常值。清洗数据集主要包括移除这些不想要的条目。例如，`.dropna()`\
    \ 和 `.fillna()` 方法在处理缺失数据时很有帮助；这些在 pandas 中被导入为 NaN（参见代码清单 3.7）。\n\n```python\n\
    import pandas as pd\n\ncleaned_data = my_data.dropna(\n    subset=['d(135Ba/136Ba)',\
    \ 'd(138Ba/136Ba)'])\n\nprint(\"Before cleaning: {} cols\".format(my_data.shape[0]))\n\
    print(\"After cleaning: {} cols\".format(cleaned_data.shape[0]))\n\n'''\nOutput:\n\
    Before cleaning: 19978 cols\nAfter cleaning: 206 cols\n'''\n```\n\n**清单 3.7**\
    \ 移除 NaN 值\n\n具体来说，第 3 行的 `.dropna()` 移除了所有 $\\delta^{135}Ba_{136}$ [‰] 或 $\\\
    delta^{138}Ba_{136}$ [‰] 同位素值缺失的行。\n\n尽管移除包含缺失值的条目因其简单性而具有吸引力，但它也有一些缺点，其中最显著的是信息的丢失（Zhang,\
    \ 2016）。特别是，当处理大量特征时，由于单个特征缺失，可能会移除大量的观测值，从而可能引入较大的偏差（Zhang, 2016）。一个可能的解决方案是数据插补，即用插补值替换缺失值。已经开发了几种数据插补方法，其中最简单的是用所研究特征的均值、中位数或众数替换缺失值（Zhang,\
    \ 2016）。在 pandas 中，`.fillna()` 用文本或特定值替换 NaN 条目。此外，scikit-learn 中的 `SimpleImputer()`\
    \ 用均值、中位数或众数插补缺失值。\n\n一个更复杂的策略是使用回归进行数据插补（Zhang, 2016）。在这种情况下，你首先拟合一个回归模型（例如，线性或多项式），然后使用该模型来插补缺失值（Zhang,\
    \ 2016）。在 scikit-learn 中，`IterativeImputer()` 函数开发了一种基于多重回归的插补策略。\n\n## 3.3.3\
    \ 类别特征编码\n\n大多数可用的机器学习算法不支持使用类别（即，名义）特征。因此，类别数据必须被编码（即，转换为数字序列）。在 scikit-learn\
    \ 中，`OrdinalEncoder()` 将类别特征编码为整数（即，从 0 到 $n_{categories} - 1$）。\n\n## 3.3.4 数据增强\n\
    \n数据增强旨在通过增加数据集中的信息量来提高机器学习模型的泛化能力（Maharana 等人，2022），这包括添加现有数据的修改副本（例如，在图像分类中翻转或旋转的图像）或组合现有特征以生成新特征。例如，Maharana\
    \ 等人（2022）描述了六种用于图像分析的数据增强技术：（1）符号增强，（2）基于规则的增强，（3）图结构增强，（4）混合增强，（5）特征空间增强，以及（6）神经增强（Maharana\
    \ 等人，2022）。尽管特征增强的细节远超本书范围，但我们将在第 8 章中遵循 Bestagini 等人（2017）提出的策略来利用数据增强。\n\n##\

- md: "## 10.3 Eager Computation Versus Lazy Evaluation\n\nPython usually uses the\
    \ so-called “eager” computation, which simply means that Python immediately performs\
    \ each operation such as transformations and calculations. For example, Fig. 10.11\
    \ shows the definition of the eager function simple_lithopress() (line 2) that\
    \ estimates the lithostatic pressure assuming both the density and acceleration\
    \ due to gravity are constants. We disclose the eager nature of the function at\
    \ lines 3 and 4, since simple_lithopress() returns a computed value as soon as\
    \ we call it in the code workflow; in other words, the calculations is done immediately.\n\
    \n```python\n[1]: def simple_lithopress(z, ro, g):\n        p_MPa = z*g*ro/1e6\
    \ # return the pressure in MPa\n        return p_MPa\n\n[3]: my_pressure = simple_lithopress(z=2000,\
    \ ro=2900, g=9.8)\n\n[3]: my_pressure\n\n[3]: 56.84\n```\n\n**Fig. 10.11** Defining\
    \ the eager function simple_lithopress()\n\n```python\n[4]: import numpy as np\n\
    ```\n\n```python\n[5]: %%time\nz_dist = np.random.normal(loc=2000, scale=200,\
    \ size= 10000000)\nro_dist = np.random.normal(loc=2900, scale=290, size= 10000000)\n\
    g_dist = np.random.normal(loc=9.8, scale=0.1, size= 10000000)\nmy_pressure_dist\
    \ = simple_lithopress(z=z_dist, ro = ro_dist, g = g_dist)\nCPU times: user 854\
    \ ms, sys: 106 ms, total: 960 ms\nWall time: 963 ms\n```\n\n```python\n[6]: my_pressure_dist.nbytes\
    \ / 1024**2 # size in MB\n```\n\n```python\n[6]: 76.2939453125\n```\n\n**Fig.\
    \ 10.12** Performing a Monte Carlo error propagation using the ‘Eager’ *simple_lithopress()*\n\
    \n![](img/90d3084aebf7ededff86e49f84c52faa_176_0.png)\n\nSimilarly, if we perform\
    \ a Monte Carlo error propagation (Fig. 10.12) combining NumPy arrays and the\
    \ *simple_lithopress()* function, we get an immediate execution lasting less than\
    \ one second and that generates an array of 10^7 elements (≈76 MB).\nTo be aware\
    \ of what we are doing, Fig. 10.13 shows the distribution of the computed pressures\
    \ resulting from estimates of depth, density, and acceleration due to gravity\
    \ and also accounting for the error estimates.\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nmy_pressure_mean = np.mean(my_pressure_dist)\nmy_pressure_std = np.std(my_pressure_dist)\n\
    \nfig, ax = plt.subplots()\nax.hist(my_pressure_dist, density=True, bins='auto',\n\
    \        color='#0F7F8B', label='Pressure estimates')\nax.axvline(my_pressure_mean,\
    \ color='#C82127', label='mean value')\nax.axvspan(my_pressure_mean - my_pressure_std,\n\
    \           my_pressure_mean + my_pressure_std,\n           color='#F15C61', alpha=0.4,\n\
    \           label=r'1$\\sigma$ estimate')\nax.set_xlabel('Pressure [MPa]')\nax.set_ylabel('Probability\
    \ Density')\nax.legend()\nplt.show()\n```\n\n**Listing 10.1** Plotting the results\
    \ of the Monte Carlo error propagation.\n\nLazy evaluation differs from eager\
    \ computation. Under lazy evaluation, Dask prepares a directed acyclic graph (DAG)\
    \ for the functions, operations, and transformations involved. But it does not\
    \ perform any computation. DAGs are mathematical objects deriving from graph theory.\
    \ The theory behind DAGs and graph theory is outside the scope of this book, so\
    \ please refer to specialized references to go learn the details of DAGs (Xu,\
    \ 2003; Fiore & Campos, 2013; Maurer, 2013).\n\nThis section focuses mainly on\
    \ learning the main benefits of using DAGs for our computations. One of the most\
    \ important benefits is that the structure and the complexity of your computations\
    \ can be evaluated and visualized before running them, which brings many advantages.\
    \ For example, it allows you to decide whether to run your code on a single machine,\
    \ a small cluster, or a high-performance computing facility. Figure 10.14 shows\
    \ how to perform a lazy evaluation of the Monte Carlo error propagation performed\
    \ in Fig. 10.12, and the resulting DAG is shown in Fig. 10.15. It is a simple\
    \ structure showing that, after generating three normal distributions for the\
    \ depth, density, and acceleration due to gravity, the *simple_lithopress()* function\
    \ uses them as input and generates an output. If we increase the size of the three\
    \ input arrays from 10^7 to 10^8, the structure of the DAG changes (Fig. 10.16).\
    \ In detail, we defined a so-called “embarrassingly parallel” workload (Fig. 10.17).\n\
    \n```python\n[1]: import dask.array as da\n    from dask import delayed\n\n[2]:\
    \ def simple_lithopress(z, ro, g):\n        p_MPa = z*g*ro/1e6 # return the pressure\
    \ in MPa\n        return p_MPa\n\n    z_da = da.random.normal(loc=2000, scale=200,\
    \ size= 10000000)\n    ro_da = da.random.normal(loc=2900, scale=290, size= 10000000)\n\
    \    g_da = da.random.normal(loc=9.8, scale=0.1, size= 10000000)\n\n    my_pressure_da\
    \ = da.map_blocks(simple_lithopress, z_da, g_da, ro_da)\n\n[3]: my_pressure_da\
    \ = simple_lithopress(z=z_da, ro = ro_da, g = g_da)\n\n[4]: my_pressure_da.visualize(filename='my_DAG.pdf')\n\
    ```\n\n**Fig. 10.14** How to visualize a DAG in Dask\n\n**Fig. 10.15** A simple\
    \ DAG resulting from the code listing reported above\n\n![](img/90d3084aebf7ededff86e49f84c52faa_178_0.png)\n\
    \n**Fig. 10.16** The DAG that I obtain in my MacBook Pro if I increase the dimension\
    \ of the input arrays from $10^7$ to $10^8$\n\n![](img/90d3084aebf7ededff86e49f84c52faa_179_0.png)\n\
    \n![](img/90d3084aebf7ededff86e49f84c52faa_180_0.png)\n\n## 10.4 Diagnostic and\
    \ Feedback\n\nThe Dask distributed scheduler provides an effective interactive\
    \ dashboard that consists of a rich ecosystem of monitoring and profiling tools\
    \ that can be accessed by a web browser (Fig. 10.18). The left and right panels\
    \ of Fig. 10.18 display a Jupyter Notebook and the Dask interactive dashboard,\
    \ respectively. The Jupyter Notebook starts the Dask client and its interactive\
    \ dashboard at line 2 and then defines (lines 3 and 4), evaluates (line 5), and\
    \ finally triggers (line 6, in progress and therefore displayed as *) the computations.\
    \ The right portion of the monitor shows the Dask interactive dashboard during\
    \ the ongoing process triggered by the Jupyter Notebook at line 6.\n\n![](img/90d3084aebf7ededff86e49f84c52faa_181_0.png)\n\
    \n## References\n\nCaesar Wu, R. B. (2015). *Cloud data centers and cost modeling:\
    \ A complete guide to planning, designing and building a cloud data center*, (1st\
    \ ed.). Burlington: Morgan Kaufmann.\n\nDaniel, J. C. (2019). *Data science with\
    \ python DASK*. New York: Manning Publications.\n\nDavid, P. (2011). *Encyclopedia\
    \ of parallel computing*. New York: Springer. https://doi.org/10.1007/978-0-387-09766-4\n\
    \nFiore, M., & Devesas Campos, M. (2013). The algebra of directed acyclic graphs.\
    \ In B. Coecke, L. Ong, & P. Panangaden (Eds.), *Computation, logic, games, and\
    \ quantum foundations. The many facets of Samson Abramsky*. Lecture notes in computer\
    \ science (Vol. 7860). Berlin, Heidelberg: Springer. https://doi.org/10.1007/978-3-642-38164-5_4\n\
    \nMaurer, S. B. (2013). *Directed acyclic graphs*. Routledge Handbooks Online.\
    \ Milton Park: Routledge. https://doi.org/10.1201/B16132-10\n\nPedregosa, F.,\
    \ Varoquaux, G. G., Gramfort, A., Michel, V., Thirion, B., Grisel, O., Blondel,\
    \ M., Prettenhofer, P., Weiss, R., Dubourg, V., Vanderplas, J., Passos, A., Cournapeau,\
    \ D., Brucher, M., Perrot, M., & Duchesnay, É. (2011). Scikit-learn: Machine learning\
    \ in python. *Journal of Machine Learning Research*, 12, 2825–2830.\n\nPeter Pacheco,\
    \ M. M. (2020). *An introduction to parallel programming* (2nd ed.). Burlington:\
    \ Morgan Kaufmann.\n\nXu, J. (2003). *Theory and application of graphs* (vol.\
    \ 10). New York: Springer. https://doi.org/10.1007/978-1-4419-8698-6"
  mdcn: "## 10.3 即时计算与惰性求值\n\nPython 通常使用所谓的“即时”计算，这简单意味着 Python 会立即执行每个操作，例如转换和计算。例如，图\
    \ 10.11 展示了即时函数 `simple_lithopress()`（第 2 行）的定义，该函数在假设密度和重力加速度均为常数的情况下估算岩石静压力。我们在第\
    \ 3 行和第 4 行揭示了该函数的即时特性，因为一旦我们在代码工作流中调用 `simple_lithopress()`，它就会返回一个计算好的值；换句话说，计算是立即完成的。\n\
    \n```python\n[1]: def simple_lithopress(z, ro, g):\n        p_MPa = z*g*ro/1e6\
    \ # return the pressure in MPa\n        return p_MPa\n\n[3]: my_pressure = simple_lithopress(z=2000,\
    \ ro=2900, g=9.8)\n\n[3]: my_pressure\n\n[3]: 56.84\n```\n\n**图 10.11** 定义即时函数\
    \ `simple_lithopress()`\n\n```python\n[4]: import numpy as np\n```\n\n```python\n\
    [5]: %%time\nz_dist = np.random.normal(loc=2000, scale=200, size= 10000000)\n\
    ro_dist = np.random.normal(loc=2900, scale=290, size= 10000000)\ng_dist = np.random.normal(loc=9.8,\
    \ scale=0.1, size= 10000000)\nmy_pressure_dist = simple_lithopress(z=z_dist, ro\
    \ = ro_dist, g = g_dist)\nCPU times: user 854 ms, sys: 106 ms, total: 960 ms\n\
    Wall time: 963 ms\n```\n\n```python\n[6]: my_pressure_dist.nbytes / 1024**2 #\
    \ size in MB\n```\n\n```python\n[6]: 76.2939453125\n```\n\n**图 10.12** 使用“即时”\
    \ *simple_lithopress()* 执行蒙特卡洛误差传播\n\n![](img/90d3084aebf7ededff86e49f84c52faa_176_0.png)\n\
    \n类似地，如果我们结合 NumPy 数组和 *simple_lithopress()* 函数执行蒙特卡洛误差传播（图 10.12），我们会得到一个持续时间不到一秒的即时执行，并生成一个包含\
    \ 10^7 个元素（≈76 MB）的数组。\n为了了解我们正在做什么，图 10.13 展示了由深度、密度和重力加速度估算值计算出的压力分布，同时也考虑了误差估计。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\nmy_pressure_mean = np.mean(my_pressure_dist)\n\
    my_pressure_std = np.std(my_pressure_dist)\n\nfig, ax = plt.subplots()\nax.hist(my_pressure_dist,\
    \ density=True, bins='auto',\n        color='#0F7F8B', label='Pressure estimates')\n\
    ax.axvline(my_pressure_mean, color='#C82127', label='mean value')\nax.axvspan(my_pressure_mean\
    \ - my_pressure_std,\n           my_pressure_mean + my_pressure_std,\n       \
    \    color='#F15C61', alpha=0.4,\n           label=r'1$\\sigma$ estimate')\nax.set_xlabel('Pressure\
    \ [MPa]')\nax.set_ylabel('Probability Density')\nax.legend()\nplt.show()\n```\n\
    \n**代码清单 10.1** 绘制蒙特卡洛误差传播的结果。\n\n惰性求值与即时计算不同。在惰性求值下，Dask 会为涉及的函数、操作和转换准备一个有向无环图（DAG）。但它不会执行任何计算。DAG\
    \ 是源自图论的数学对象。DAG 和图论背后的理论超出了本书的范围，因此请参考专业文献来学习 DAG 的详细信息（Xu, 2003; Fiore & Campos,\
    \ 2013; Maurer, 2013）。\n\n本节主要关注学习使用 DAG 进行计算的主要好处。最重要的好处之一是，你的计算的结构和复杂性可以在运行之前进行评估和可视化，这带来了许多优势。例如，它允许你决定是在单台机器、小型集群还是高性能计算设施上运行你的代码。图\
    \ 10.14 展示了如何对图 10.12 中执行的蒙特卡洛误差传播进行惰性求值，生成的 DAG 如图 10.15 所示。这是一个简单的结构，显示在为深度、密度和重力加速度生成三个正态分布后，*simple_lithopress()*\
    \ 函数将它们作为输入并生成输出。如果我们把三个输入数组的大小从 10^7 增加到 10^8，DAG 的结构会发生变化（图 10.16）。具体来说，我们定义了一个所谓的“易并行”工作负载（图\
    \ 10.17）。\n\n```python\n[1]: import dask.array as da\n    from dask import delayed\n\
    \n[2]: def simple_lithopress(z, ro, g):\n        p_MPa = z*g*ro/1e6 # return the\
    \ pressure in MPa\n        return p_MPa\n\n    z_da = da.random.normal(loc=2000,\
    \ scale=200, size= 10000000)\n    ro_da = da.random.normal(loc=2900, scale=290,\
    \ size= 10000000)\n    g_da = da.random.normal(loc=9.8, scale=0.1, size= 10000000)\n\
    \n    my_pressure_da = da.map_blocks(simple_lithopress, z_da, g_da, ro_da)\n\n\
    [3]: my_pressure_da = simple_lithopress(z=z_da, ro = ro_da, g = g_da)\n\n[4]:\
    \ my_pressure_da.visualize(filename='my_DAG.pdf')\n```\n\n**图 10.14** 如何在 Dask\
    \ 中可视化 DAG\n\n**图 10.15** 由上述代码清单生成的简单 DAG\n\n![](img/90d3084aebf7ededff86e49f84c52faa_178_0.png)\n\
    \n**图 10.16** 如果我将输入数组的维度从 $10^7$ 增加到 $10^8$，我在我的 MacBook Pro 上得到的 DAG\n\n![](img/90d3084aebf7ededff86e49f84c52faa_179_0.png)\n\
    \n![](img/90d3084aebf7ededff86e49f84c52faa_180_0.png)\n\n## 10.4 诊断与反馈\n\nDask\
    \ 分布式调度器提供了一个有效的交互式仪表板，它由丰富的监控和性能分析工具生态系统组成，可以通过 Web 浏览器访问（图 10.18）。图 10.18 的左侧面板和右侧面板分别显示了一个\
    \ Jupyter Notebook 和 Dask 交互式仪表板。Jupyter Notebook 在第 2 行启动 Dask 客户端及其交互式仪表板，然后定义（第\
    \ 3 行和第 4 行）、评估（第 5 行），最后触发（第 6 行，正在进行中，因此显示为 *）计算。监控器的右侧部分显示了由 Jupyter Notebook\
    \ 在第 6 行触发的正在进行的进程期间的 Dask 交互式仪表板。\n\n![](img/90d3084aebf7ededff86e49f84c52faa_181_0.png)\n\
    \n## 参考文献\n\nCaesar Wu, R. B. (2015). *Cloud data centers and cost modeling: A\
    \ complete guide to planning, designing and building a cloud data center*, (1st\
    \ ed.). Burlington: Morgan Kaufmann.\n\nDaniel, J. C. (2019). *Data science with\
    \ python DASK*. New York: Manning Publications.\n\nDavid, P. (2011). *Encyclopedia\
    \ of parallel computing*. New York: Springer. https://doi.org/10.1007/978-0-387-09766-4\n\
    \nFiore, M., & Devesas Campos, M. (2013). The algebra of directed acyclic graphs.\
    \ In B. Coecke, L. Ong, & P. Panangaden (Eds.), *Computation, logic, games, and\
    \ quantum foundations. The many facets of Samson Abramsky*. Lecture notes in computer\
    \ science (Vol. 7860). Berlin, Heidelberg: Springer. https://doi.org/10.1007/978-3-642-38164-5_4\n\
    \nMaurer, S. B. (2013). *Directed acyclic graphs*. Routledge Handbooks Online.\
    \ Milton Park: Routledge. https://doi.org/10.1201/B16132-10\n\nPedregosa, F.,\
    \ Varoquaux, G. G., Gramfort, A., Michel, V., Thirion, B., Grisel, O., Blondel,\
    \ M., Prettenhofer, P., Weiss, R., Dubourg, V., Vanderplas, J., Passos, A., Cournapeau,\
    \ D., Brucher, M., Perrot, M., & Duchesnay, É. (2011). Scikit-learn: Machine learning\

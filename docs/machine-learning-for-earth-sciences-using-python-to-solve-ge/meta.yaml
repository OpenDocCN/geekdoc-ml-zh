    ax1.set_xticks(x, labels)\nax1.legend()\nax1.bar_label(rects1, padding=3)\nax1.bar_label(rects2,\
    \ padding=3)\n```\n\n**Listing 8.11** Plotting the results obtained from the Leaderboard\
    \ and the hidden test data sets\n\nThe three best-performing models were also\

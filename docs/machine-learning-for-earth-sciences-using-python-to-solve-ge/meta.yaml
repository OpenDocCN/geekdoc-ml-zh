  md: '# Chapter 4

    Unsupervised Machine Learning Methods


    # 4.1 Unsupervised Algorithms


    As introduced in Chap. 1, the unsupervised learning process acts on unlabeled
    data and attempts to extract significant patterns from the investigated data set.
    In the present chapter, I gently introduce the unsupervised algorithms for dimensionality
    reduction and clustering reported in Fig. 3.5. Finally, I provide some specific
    references to allow readers to delve deeper into the mathematics that governs
    these ML methods. In detail, I start by describing the algorithms for dimensionality
    reduction, which include the principal component analysis and methods based on
    manifold learning. I then describe clustering methods, such as hierarchical clustering,
    DBSCAN, mean shift, $K$ means, spectral clustering, and Gaussian mixtures models.


    # 4.2 Principal Component Analysis


    Principal component analysis (PCA) is a multivariate statistical method that extracts
    relevant information from a data set and represents it in a lower-dimensional
    space (Jollife & Cadima, 2016). It strives to increase the interpretability of
    a data set by reducing the dimensionality of the problem while at the same time
    minimizing information loss (Jollife & Cadima, 2016). In detail, it creates new
    uncorrelated variables (i.e., through a linear combination of the original variables),
    called “principal components,” that maximize variance (Jollife & Cadima, 2016).'
  merge: -1
  pgno: 72
- img_proc: true
  md: 'Mathematically, PCA is an eigenvalue-eigenvector problem (Jolliffe & Cadima,
    2016). Consider a $d$-dimensional sample set $X = \{\mathbf{x}_1, \mathbf{x}_2,
    \mathbf{x}_j, \dots, \mathbf{x}_p\}$ made of $n$ observations on $p$ numerical
    variables. The sample set $X$ is equivalent to an $n \times p$ data matrix $\mathbf{X}$,
    whose $j$th column is the vector $\mathbf{x}_j$ of observations on the $j$th variable
    (Jolliffe & Cadima, 2016). We look for a linear combination of the columns of
    matrix $\mathbf{X}$ with maximum variance (Jolliffe & Cadima, 2016). Such linear
    combinations are given by


    $$\sum_{j=1}^{p} a_j \mathbf{x}_j = \mathbf{X}\mathbf{a}, \quad (4.1)$$


    where $\mathbf{a} = \{a_1, a_2, \dots, a_p\}$ is a vector of constants (Jolliffe
    & Cadima, 2016). The variance of any linear combination defined by Eq. (4.1) is
    given by Jolliffe and Cadima (2016)


    $$var(\mathbf{X}\mathbf{a}) = \mathbf{a}^T \mathbf{S} \mathbf{a}, \quad (4.2)$$


    where $\mathbf{S}$ is the sample covariance matrix associated with the data set
    (Jolliffe & Cadima, 2016).


    The solution to the problem (i.e., identifying the linear combination with maximum
    variance) consists of finding a $d$-dimensional vector $\mathbf{a}$ that maximizes
    the quadratic form $\mathbf{a}^T \mathbf{S} \mathbf{a}$ (Jolliffe & Cadima, 2016).
    To obtain a defined solution, the most common restriction assumes working with
    unit-norm vectors (i.e., requiring $\mathbf{a}^T \mathbf{a} = 1$). Now the problem
    is equivalent to maximizing the relation (Jolliffe & Cadima, 2016)


    $$\mathbf{a}^T \mathbf{S} \mathbf{a} - \lambda \left( \mathbf{a}^T \mathbf{a}
    - 1 \right). \quad (4.3)$$


    After differentiating with respect to the vector $\mathbf{a}$ and equating to
    the null vector, we have (Jolliffe & Cadima, 2016)


    $$\mathbf{S}\mathbf{a} = \lambda \mathbf{a}. \quad (4.4)$$


    In Eq. (4.4), $\mathbf{a}$ is a unit-norm eigenvector and $\lambda$ is the corresponding
    eigenvalue of $\mathbf{S}$ (Jolliffe & Cadima, 2016). The full set of eigenvectors
    of $\mathbf{S}$ are the solutions to the problem of obtaining up to $d$ new linear
    combinations $\mathbf{X}\mathbf{a}_k = \sum_{j=1}^{d} a_{jk} \mathbf{x}_j$, which
    successively maximize variance subject to noncorrelation with previous linear
    combinations (Jolliffe, 2002; Jolliffe & Cadima, 2016).


    # 4.3 Manifold Learning


    The main idea behind manifold learning methods is that, although natural data
    sets are often depicted in very-high-dimensional spaces, they can be described
    in lower'
  merge: -1
  pgno: 73
- img_proc: true
  md: 'dimensions because the processes generating the data are often characterized
    by few degrees of freedom (Zheng & Xue, 2009). From the mathematical point of
    view, manifold learning methods try to model the data as “lying on or near a low-dimensional
    manifold embedded in a higher-dimensional space” (Zheng & Xue, 2009). In the following,
    I introduce the basic concepts of manifold learning, but I strongly encourage
    you to go deeper into the details if you plan to use these techniques in your
    research (Zheng & Xue, 2009).


    **Manifold** A $d$-dimensional manifold $\mathbb{M}$ is a topological space that
    is locally homeomorphic with respect to $\mathbb{R}^d$.


    **Homomorphism** A map from one algebraic structure to another of the same type
    that preserves all the relevant structures.


    **Embedding** An embedding of a manifold $\mathbb{M}$ into $\mathbb{R}^d$ is a
    smooth homeomorphism from $\mathbb{M}$ to a subset of $\mathbb{R}^d$.


    # 4.3.1 Isometric Feature Mapping


    The Isometric feature mapping (Isomap) is an ML algorithm that is “capable of
    discovering the nonlinear degrees of freedom that underlie complex natural observations”
    (Tenenbaum et al., 2000). It consists of three main steps: (1) construct a neighborhood
    graph, (2) compute the shortest paths, and (3) construct a $d$-dimensional embedding
    (Tenenbaum et al., 2000). In practice, Isomap searches for a lower-dimensional
    embedding while maintaining geodesic distances between all points. In scikit-learn,
    the method *Isomap()* performs the Isometric feature mapping.


    # 4.3.2 Locally Linear Embedding


    Locally linear embedding (LLE) (Roweis & Saul, 2000) is a ML algorithm that “computes
    low-dimensional, neighborhood-preserving embeddings of high-dimensional inputs”
    (Roweis & Saul, 2000). In practice, LLE maps the inputs onto a single global coordinate
    system of lower dimensionality (Roweis & Saul, 2000). Also, its optimizations
    do not involve local minima (Roweis & Saul, 2000). In other words, LLE searches
    for a lower-dimensional projection of the data while preserving distances within
    local neighborhoods. In scikit-learn, LLE is implemented in the method *LocallyLinearEmbedding()*.'
  merge: -1

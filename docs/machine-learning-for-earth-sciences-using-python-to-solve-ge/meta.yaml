    \ (i.e., splittings) into non-overlapping regions, with a one-to-one correspondence\
    \ between leaf nodes and input regions (Kubat, 2017). Unfortunately, the decision\
    \ tree algorithm, despite the appeal of the simplicity of its formulation, is\
    \ often prone to overfitting and underfitting (cf. Sect. 3.5.5), making it less\
    \ accurate than other predictors (Song & Lu, 2015).\n\nTo avoid overfitting and\
    \ underfitting, more robust algorithms called ensemble predictors have been developed.\
    \ Examples are random forest, gradient boosting, and extremely randomized tree\
    \ methods. More details on the decision tree model are available from Breiman\
    \ et al. (1984).\n\n### Random Forest\n\nThe random forest algorithm (Breiman,\
    \ 2001) is based on the “bagging” technique, which is a bootstrap aggregation\
    \ technique that averages the prediction over a collection of bootstrap samples,\
    \ thereby reducing the variance (Hastie et al., 2017). In detail, the random forest\
    \ algorithm uses bagging to create multiple versions of a predictor (i.e., multiples\
    \ trees), then evaluates the predictors to obtain an aggregated predictor (Hastie\
    \ et al., 2017). Specifically, for a given training data set with sample size\
    \ $n$, bagging produces $k$ new training sets by uniformly sampling from the original\
    \ training data set with replacement (i.e., by bootstrapping) (Hastie et al.,\
    \ 2017). Next, $k$ decision trees are trained by using the $k$ newly created training\
    \ sets and are typically coupled by averaging for regression or majority voting\
    \ for classification (Hastie et al., 2017). A detailed description of the random\
    \ forest algorithm is available from Breiman (2001) and Hastie et al. (2017).\n\
    \n### Extremely Randomized Trees\n\nThe extremely randomized trees algorithm (Geurts\
    \ et al., 2006) is similar to the random forest algorithm with two main differences:\
    \ (i) it splits nodes by choosing fully random cut points and (ii) it uses the\
    \ entire training sample rather than a bootstrapped replica to grow the trees\
    \ (Geurts et al., 2006). The predictions of the trees are typically aggregated\
    \ to yield the final prediction by majority vote in the classification and by\
    \ arithmetic averaging in the regression (Geurts et al., 2006). A complete description\
    \ of the extremely randomized trees algorithm is given by Geurts et al. (2006).\n\

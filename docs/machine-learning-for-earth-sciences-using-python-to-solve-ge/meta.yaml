  md: '# Chapter 6

    Clustering of Multi-Spectral Data


    # 6.1 Spectral Data from Earth-Observing Satellites


    Earth-observing satellite missions such as Sentinel¹ and Landsat² provide us with
    multispectral, hyperspectral, and panchromatic data. The Sentinel earth-observing
    satellite missions are part of the Copernicus program, developed by the European
    Space Agency,³ whereas the Landsat Program is jointly managed by NASA and the
    U.S. Geological Survey (see footnote 2).


    Spectral images are two-dimensional representations of surface reflectance or
    radiation in different bands of the electromagnetic spectrum. Multi-spectral and
    hyper-spectral data are acquired by multiple sensors operating over wide and narrow
    (sometimes quasi-continuous) wavelength ranges, respectively. In contrast, panchromatic
    images are acquired by detectors covering the entire visible range.


    Multi-spectral, hyper-spectral, and panchromatic data can be combined and modulated
    to produce new indexes⁴ (e.g., the Generalized Difference Vegetation Index or
    the Normalized Difference Snow Index), which highlight specific phenomena and
    facilitate data interpretation.


    For example, the Sentinel-2 Multi-spectral Instrument operates over 13 spectral
    bands. Four bands labeled B2, B3, B4, and B8 provide a spatial resolution of 10
    m, six bands labeled B5, B6, B7, B8a, B11, and B12 provide a spatial resolution
    of


    ¹ https://sentinels.copernicus.eu.

    ² https://landsat.gsfc.nasa.gov.

    ³ https://www.esa.int.

    ⁴ https://www.usgs.gov/landsat-missions/landsat-surface-reflectance-derived-spectral-indices.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2023

    M. Petrelli, *Machine Learning for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment,

    https://doi.org/10.1007/978-3-031-35114-3_6'

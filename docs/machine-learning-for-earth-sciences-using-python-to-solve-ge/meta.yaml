    # The U-Net Architecture


    The U-Net is a “fully convolutional network” (Long et al., 2015). The main concept
    behind fully convolutional networks is to take an input of arbitrary size and
    produce a correspondingly sized output with efficient inference and learning (Long
    et al., 2015).



  md: 'Combining the data from the *bands_dict* dictionary allows many different representations
    to be achieved. For example, Sovdat et al. (2019) explain how to obtain the “natural
    color” representation of Sentinel-2 data.


    Explaining how to obtain a perfectly balanced image with natural colors is beyond
    the scope of this book, so we limit ourselves to combining bands B2, B3, and B4,
    which roughly correspond to blue, green, and red as perceived by our eyes.


    In detail, a bright, possibly overly saturated (Sovdat et al., 2019) image (i.e.,
    *r_g_b*) can be easily derived and plotted (see code listing 6.2 and Fig. 6.2).
    We start from the *bands_dict* dictionary after contrast stretching (lines 11–17)
    and scale the values in the interval [0,1]. This is the so-called “true color”
    representation. Sometimes, bands B3 (red) and B4 (green) are combined with B8
    (near-infrared) to achieve a “false color” representation. False color composite
    images are often used to highlight plant density and health (see, e.g., Fig. 6.4).
    Code listing 6.3 shows how to construct a false-color representation (i.e., *nir_r_g*)
    of Sentinel2 data.


    ```

    1 import numpy as np

    2 from skimage import exposure, io

    3 from skimage.transform import resize

    4 import matplotlib.pyplot as plt

    5

    6 r_g_b = np.dstack([bands_dict[''B4''],

    7                     bands_dict[''B3''],

    8                     bands_dict[''B2'']])

    9

    10 # contrast stretching and rescaling between [0,1]

    11 p2, p98 = np.percentile(r_g_b, (2,98))

    12 r_g_b = exposure.rescale_intensity(r_g_b, in_range=(p2, p98))

    13 r_g_b = r_g_b / r_g_b.max()

    14

    15 fig, ax = plt.subplots(figsize=(8, 8))

    16 ax.imshow(r_g_b)

    17 ax.axis(''off'')

    ```


    **Listing 6.2** Plotting a RGB image using bands B4, B3, and B2


    ```

    1 import numpy as np

    2 from skimage import exposure, io

    3 from skimage.transform import resize

    4 import matplotlib.pyplot as plt

    5

    6 nir_r_g = np.dstack([bands_dict[''B8''],

    7                      bands_dict[''B4''],

    8                      bands_dict[''B3'']])

    9

    10 # contrast stretching and rescaling between [0,1]

    11 p2, p98 = np.percentile(nir_r_g, (2,98))

    ```'

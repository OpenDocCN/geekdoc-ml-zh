    # 12.6 Example Application


    **The Problem**

    As an example application of deep learning potentials in the Earth Sciences, we
    now discuss the training and validation of a CNN to identify building footprints
    from satellite records.


    The problem falls in the ML classification sub-field called “semantic image segmentation”
    (see Fig. 12.8). In this specific case, we want to identify the areas or the pixels
    of an image occupied by buildings in the aerial image labeling data set (Maggiori
    et al., 2017) (see, e.g., Fig. 12.9). The right panel of Fig. 12.9 shows the solution
    to the problem in the form of a mask where white and black define'
  - '[PAGE 209]


    12.6 Example Application


    205


    ![](img/90d3084aebf7ededff86e49f84c52faa_209_0.png)


    Fig. 12.8 Convolutional neural networks for image segmentation. Modified from
    Long et al., 2015


    ![](img/90d3084aebf7ededff86e49f84c52faa_209_1.png)


    Fig. 12.9 The aerial image labeling data set (Maggiori et al., 2017)


    building and non-building areas, respectively. We want to know whether we can
    train a CNN to produce the solution reported in Fig. 12.9. To attempt a simplified
    solution, I trained the U-Net CNN (Ronneberger et al., 2015) using PyTorch.


    # Data Set and Pre-processing


    As a starting point, I downloaded the aerial image labeling data set (Maggiori
    et al., 2017), which consists of 360 orthorectified RGB (Red, Green, Blue) images
    linked to official cadastral records (Maggiori et al., 2017). The entire data
    set covers several areas, such as Austin (USA), Chicago (USA), Vienna (Austria),
    East and West Tyrol (Austria), San Francisco (USA), and Innsbruck (Austria). The
    lateral resolution is 0.3 m, and each tile is 5000 × 5000 pixels (Maggiori et
    al., 2017). For 180 tiles, a mask containing two semantic classes, building and
    non-building, is also provided (Maggiori et al., 2017). For the case study provided
    herein, I selected 10 tiles from'
  - '[PAGE 210]


    ![](img/90d3084aebf7ededff86e49f84c52faa_210_0.png)


    Fig. 12.10 Architecture of a U-net convolutional neural network (modified from
    Ronneberger et al., 2015)


    Austin. For each tile, I also collected the associated masks to train and validate
    the model. From each tile, I extracted 25 images of 1000 × 1000 pixels each by
    using a 5 × 5 grid (the same operation was done for each mask). The resulting
    data set consisted of 245 images and 245 masks. I then split the data set into
    two parts for use in training (220) and validation (25).


    # The U-Net Architecture


    The U-Net is a “fully convolutional network” (Long et al., 2015). The main concept
    behind fully convolutional networks is to take an input of arbitrary size and
    produce a correspondingly sized output with efficient inference and learning (Long
    et al., 2015).


    Figure 12.10 shows the U-Net architecture. It consists of a contracting network
    (left side) followed by an expansive path (right side; Ronneberger et al., 2015).
    The contracting path applies a sequence of two 3 × 3 convolutions, each followed
    by a ReLU and 2 × 2 max pooling (Ronneberger et al., 2015). Next, in the expansive
    path, the U-net architecture upsamples the feature map, followed by a 2 × 2 convolution
    (“up-convolution”), and two 3 × 3 convolutions, each followed by a ReLU (Ronneberger
    et al., 2015). The final layer applies a 1 × 1 convolution to map'

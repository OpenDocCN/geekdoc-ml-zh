    Unsupervised Learning


    ## Chapter 4

    Unsupervised Machine Learning Methods


    ### 4.1 Unsupervised Algorithms


    As introduced in Chap. 1, the unsupervised learning process acts on unlabeled
    data and attempts to extract significant patterns from the investigated data set.
    In the present chapter, I gently introduce the unsupervised algorithms for dimensionality
    reduction and clustering reported in Fig. 3.5. Finally, I provide some specific
    references to allow readers to delve deeper into the mathematics that governs
    these ML methods. In detail, I start by describing the algorithms for dimensionality
    reduction, which include the principal component analysis and methods based on
    manifold learning. I then describe clustering methods, such as hierarchical clustering,
    DBSCAN, mean shift, $K$ means, spectral clustering, and Gaussian mixtures models.


    ### 4.2 Principal Component Analysis


    Principal component analysis (PCA) is a multivariate statistical method that extracts
    relevant information from a data set and represents it in a lower-dimensional
    space (Jolliffe & Cadima, 2016). It strives to increase the interpretability of
    a data set by reducing the dimensionality of the problem while at the same time
    minimizing information loss (Jolliffe & Cadima, 2016). In detail, it creates new
    uncorrelated variables (i.e., through a linear combination of the original variables),
    called “principal components,” that maximize variance (Jolliffe & Cadima, 2016).


    Mathematically, PCA is an eigenvalue-eigenvector problem (Jolliffe & Cadima, 2016).
    Consider a $d$-dimensional sample set $X = \{\mathbf{x}_1, \mathbf{x}_2, \mathbf{x}_j,
    \dots, \mathbf{x}_p\}$ made of $n$ observations on $p$ numerical variables. The
    sample set $X$ is equivalent to an $n \times p$ data matrix $\mathbf{X}$, whose
    $j$th column is the vector $\mathbf{x}_j$ of observations on the $j$th variable
    (Jolliffe & Cadima, 2016). We look for a linear combination of the columns of
    matrix $\mathbf{X}$ with maximum variance (Jolliffe & Cadima, 2016). Such linear
    combinations are given by


    $$\sum_{j=1}^{p} a_j \mathbf{x}_j = \mathbf{X}\mathbf{a}, \quad (4.1)$$


    where $\mathbf{a} = \{a_1, a_2, \dots, a_p\}$ is a vector of constants (Jolliffe
    & Cadima, 2016). The variance of any linear combination defined by Eq. (4.1) is
    given by Jolliffe and Cadima (2016)


    $$var(\mathbf{X}\mathbf{a}) = \mathbf{a}^T \mathbf{S} \mathbf{a}, \quad (4.2)$$


    where $\mathbf{S}$ is the sample covariance matrix associated with the data set
    (Jolliffe & Cadima, 2016).


    The solution to the problem (i.e., identifying the linear combination with maximum
    variance) consists of finding a $d$-dimensional vector $\mathbf{a}$ that maximizes
    the quadratic form $\mathbf{a}^T \mathbf{S} \mathbf{a}$ (Jolliffe & Cadima, 2016).
    To obtain a defined solution, the most common restriction assumes working with
    unit-norm vectors (i.e., requiring $\mathbf{a}^T \mathbf{a} = 1$). Now the problem
    is equivalent to maximizing the relation (Jolliffe & Cadima, 2016)


    $$\mathbf{a}^T \mathbf{S} \mathbf{a} - \lambda \left( \mathbf{a}^T \mathbf{a}
    - 1 \right). \quad (4.3)$$


    After differentiating with respect to the vector $\mathbf{a}$ and equating to
    the null vector, we have (Jolliffe & Cadima, 2016)


    $$\mathbf{S}\mathbf{a} = \lambda \mathbf{a}. \quad (4.4)$$


    In Eq. (4.4), $\mathbf{a}$ is a unit-norm eigenvector and $\lambda$ is the corresponding
    eigenvalue of $\mathbf{S}$ (Jolliffe & Cadima, 2016). The full set of eigenvectors
    of $\mathbf{S}$ are the solutions to the problem of obtaining up to $d$ new linear
    combinations $\mathbf{X}\mathbf{a}_k = \sum_{j=1}^{d} a_{jk} \mathbf{x}_j$, which
    successively maximize variance subject to noncorrelation with previous linear
    combinations (Jolliffe, 2002; Jolliffe & Cadima, 2016).


    ### 4.3 Manifold Learning


    The main idea behind manifold learning methods is that, although natural data
    sets are often depicted in very-high-dimensional spaces, they can be described
    in lower dimensions because the processes generating the data are often characterized
    by few degrees of freedom (Zheng & Xue, 2009). From the mathematical point of
    view, manifold learning methods try to model the data as “lying on or near a low-dimensional
    manifold embedded in a higher-dimensional space” (Zheng & Xue, 2009). In the following,
    I introduce the basic concepts of manifold learning, but I strongly encourage
    you to go deeper into the details if you plan to use these techniques in your
    research (Zheng & Xue, 2009).


    **Manifold** A $d$-dimensional manifold $\mathbb{M}$ is a topological space that
    is locally homeomorphic with respect to $\mathbb{R}^d$.


    **Homomorphism** A map from one algebraic structure to another of the same type
    that preserves all the relevant structures.


    **Embedding** An embedding of a manifold $\mathbb{M}$ into $\mathbb{R}^d$ is a
    smooth homeomorphism from $\mathbb{M}$ to a subset of $\mathbb{R}^d$.


    #### 4.3.1 Isometric Feature Mapping


    The Isometric feature mapping (Isomap) is an ML algorithm that is “capable of
    discovering the nonlinear degrees of freedom that underlie complex natural observations”
    (Tenenbaum et al., 2000). It consists of three main steps: (1) construct a neighborhood
    graph, (2) compute the shortest paths, and (3) construct a $d$-dimensional embedding
    (Tenenbaum et al., 2000). In practice, Isomap searches for a lower-dimensional
    embedding while maintaining geodesic distances between all points. In scikit-learn,
    the method *Isomap()* performs the Isometric feature mapping.


    #### 4.3.2 Locally Linear Embedding


    Locally linear embedding (LLE) (Roweis & Saul, 2000) is a ML algorithm that “computes
    low-dimensional, neighborhood-preserving embeddings of high-dimensional inputs”
    (Roweis & Saul, 2000). In practice, LLE maps the inputs onto a single global coordinate
    system of lower dimensionality (Roweis & Saul, 2000). Also, its optimizations
    do not involve local minima (Roweis & Saul, 2000). In other words, LLE searches
    for a lower-dimensional projection of the data while preserving distances within
    local neighborhoods. In scikit-learn, LLE is implemented in the method *LocallyLinearEmbedding()*.


    #### 4.3.3 Laplacian Eigenmaps


    A Laplacian eigenmap (Belkin & Niyogi, 2003) first develops a graph incorporating
    neighborhood information starting from a data set in $\mathbb{R}^d$ and then uses
    the Laplacian to compute a low-dimensional representation. Practically, Laplacian
    eigenmaps consist of three main steps: (1) constructing the adjacency graph, (2)
    choosing the weights, and (3) computing the eigenmaps.


    #### 4.3.4 Hessian Eigenmaps


    Hessian eigenmaps (Donoho & Grimes, 2003) are similar to Laplacian eigenmaps but
    replace the Laplacian operator with the Hessian operator. The main difference
    between Laplacian and Hessian eigenmaps relies on the capability of Hessian eigenmaps
    to overcome the ‘convexity limitation’ of Laplacian eigenmaps (Zheng & Xue, 2009).
    In scikit-learn, Hessian eigenmaps can be performed with the *LocallyLinearEmbedding()*,
    i.e., the same that we use for the LLE, but specifying *method = ‘hessian’*.


    ### 4.4 Hierarchical Clustering


    Hierarchical clustering algorithms (Johnson, 1967) build a hierarchical representation
    of the data set structure where clusters at each level of the hierarchy are assembled
    by merging or splitting clusters at the next lower or upper level, respectively
    (Johnson, 1967; Hastie et al., 2017). Two main paradigms of hierarchical clustering
    exist: agglomerative (i.e., bottom-up) and divisive (i.e., top-down). Agglomerative
    strategies start from the bottom where every observation forms a cluster (Johnson,
    1967; Hastie et al., 2017). Next, at each successive level, the algorithm recursively
    merges a selected pair of clusters into a single cluster. The criterion for merging
    (i.e., linkage) is based on specific metrics (Johnson, 1967; Hastie et al., 2017).


    In contrast, the divisive approach starts from a single cluster containing all
    observations and, at each subsequent level, recursively splits one of the existent
    clusters into two new clusters using a dissimilarity metric (Johnson, 1967; Hastie
    et al., 2017). In scikit-learn, the method *AgglomerativeClustering()* performs
    the agglomerative hierarchical clustering using a bottom-up approach. The linkage
    criterion is based on the concept of dissimilarity. To understand this concept,
    consider two sets of observations; clusters $G$ and $H$. Hierarchical clustering
    estimates the dissimilarity $d(G, H)$ between $G$ and $H$ on the set of pairwise-observation
    dissimilarities $d_{ij}$, where member $i$ of the pair is in $G$ and member $j$'
  mdcn: '## 第二部分

    无监督学习


    ## 第4章

    无监督机器学习方法


    ### 4.1 无监督算法


    如第1章所述，无监督学习过程作用于无标签数据，并试图从所研究的数据集中提取显著模式。在本章中，我将简要介绍图3.5中报告的用于降维和聚类的无监督算法。最后，我提供一些具体的参考文献，以便读者能够更深入地了解支配这些机器学习方法的数学原理。具体来说，我首先描述降维算法，包括主成分分析和基于流形学习的方法。然后，我描述聚类方法，如层次聚类、DBSCAN、均值漂移、$K$均值、谱聚类和高斯混合模型。


    ### 4.2 主成分分析


    主成分分析（PCA）是一种多元统计方法，它从数据集中提取相关信息，并将其表示在低维空间中（Jolliffe & Cadima, 2016）。它旨在通过降低问题的维度来提高数据集的可解释性，同时最小化信息损失（Jolliffe
    & Cadima, 2016）。具体来说，它创建新的不相关变量（即通过原始变量的线性组合），称为“主成分”，这些变量最大化方差（Jolliffe & Cadima,
    2016）。


    从数学上讲，PCA是一个特征值-特征向量问题（Jolliffe & Cadima, 2016）。考虑一个由$p$个数值变量上的$n$个观测值组成的$d$维样本集$X
    = \{\mathbf{x}_1, \mathbf{x}_2, \mathbf{x}_j, \dots, \mathbf{x}_p\}$。样本集$X$等价于一个$n
    \times p$的数据矩阵$\mathbf{X}$，其第$j$列是第$j$个变量的观测向量$\mathbf{x}_j$（Jolliffe & Cadima,
    2016）。我们寻找矩阵$\mathbf{X}$的列的具有最大方差的线性组合（Jolliffe & Cadima, 2016）。这样的线性组合由下式给出


    $$\sum_{j=1}^{p} a_j \mathbf{x}_j = \mathbf{X}\mathbf{a}, \quad (4.1)$$


    其中$\mathbf{a} = \{a_1, a_2, \dots, a_p\}$是一个常数向量（Jolliffe & Cadima, 2016）。由公式(4.1)定义的任何线性组合的方差由Jolliffe和Cadima
    (2016)给出


    $$var(\mathbf{X}\mathbf{a}) = \mathbf{a}^T \mathbf{S} \mathbf{a}, \quad (4.2)$$


    其中$\mathbf{S}$是与数据集相关的样本协方差矩阵（Jolliffe & Cadima, 2016）。


    该问题的解决方案（即识别具有最大方差的线性组合）包括找到一个$d$维向量$\mathbf{a}$，使二次型$\mathbf{a}^T \mathbf{S}
    \mathbf{a}$最大化（Jolliffe & Cadima, 2016）。为了获得确定的解，最常见的限制是假设使用单位范数向量（即要求$\mathbf{a}^T
    \mathbf{a} = 1$）。现在问题等价于最大化关系式（Jolliffe & Cadima, 2016）


    $$\mathbf{a}^T \mathbf{S} \mathbf{a} - \lambda \left( \mathbf{a}^T \mathbf{a}
    - 1 \right). \quad (4.3)$$


    对向量$\mathbf{a}$求导并令其等于零向量后，我们得到（Jolliffe & Cadima, 2016）


    $$\mathbf{S}\mathbf{a} = \lambda \mathbf{a}. \quad (4.4)$$


    在公式(4.4)中，$\mathbf{a}$是单位范数特征向量，$\lambda$是$\mathbf{S}$的对应特征值（Jolliffe & Cadima,
    2016）。$\mathbf{S}$的全部特征向量是解决以下问题的解：获得最多$d$个新的线性组合$\mathbf{X}\mathbf{a}_k = \sum_{j=1}^{d}
    a_{jk} \mathbf{x}_j$，这些组合在与先前线性组合不相关的条件下依次最大化方差（Jolliffe, 2002; Jolliffe & Cadima,
    2016）。


    ### 4.3 流形学习


    流形学习方法背后的主要思想是，尽管自然数据集通常被描绘在非常高维的空间中，但由于生成数据的过程通常具有很少的自由度，因此它们可以在低维中被描述（Zheng
    & Xue, 2009）。从数学角度来看，流形学习方法试图将数据建模为“位于或接近嵌入在高维空间中的低维流形”（Zheng & Xue, 2009）。下面，我将介绍流形学习的基本概念，但如果你计划在研究中使用这些技术，我强烈建议你更深入地了解细节（Zheng
    & Xue, 2009）。


    **流形** 一个$d$维流形$\mathbb{M}$是一个拓扑空间，它在局部上同胚于$\mathbb{R}^d$。


    **同胚映射** 从一个代数结构到另一个相同类型的映射，它保留所有相关结构。


    **嵌入** 流形$\mathbb{M}$到$\mathbb{R}^d$的嵌入是从$\mathbb{M}$到$\mathbb{R}^d$子集的光滑同胚映射。


    #### 4.3.1 等距特征映射


    等距特征映射（Isomap）是一种机器学习算法，它“能够发现支撑复杂自然观测的非线性自由度”（Tenenbaum et al., 2000）。它包括三个主要步骤：(1)
    构建邻域图，(2) 计算最短路径，(3) 构建$d$维嵌入（Tenenbaum et al., 2000）。实际上，Isomap在保持所有点之间测地线距离的同时，寻找低维嵌入。在scikit-learn中，方法*Isomap()*执行等距特征映射。


    #### 4.3.2 局部线性嵌入


    局部线性嵌入（LLE）（Roweis & Saul, 2000）是一种机器学习算法，它“计算高维输入的低维、保持邻域的嵌入”（Roweis & Saul,
    2000）。实际上，LLE将输入映射到一个单一的全局低维坐标系（Roweis & Saul, 2000）。此外，其优化过程不涉及局部最小值（Roweis &
    Saul, 2000）。换句话说，LLE在保持局部邻域内距离的同时，寻找数据的低维投影。在scikit-learn中，LLE在方法*LocallyLinearEmbedding()*中实现。


    #### 4.3.3 拉普拉斯特征映射


    拉普拉斯特征映射（Belkin & Niyogi, 2003）首先从$\mathbb{R}^d$中的数据集开始，构建一个包含邻域信息的图，然后使用拉普拉斯算子计算低维表示。实际上，拉普拉斯特征映射包括三个主要步骤：(1)
    构建邻接图，(2) 选择权重，(3) 计算特征映射。


    #### 4.3.4 海森特征映射


    海森特征映射（Donoho & Grimes, 2003）与拉普拉斯特征映射类似，但用海森算子替换了拉普拉斯算子。拉普拉斯和海森特征映射之间的主要区别在于海森特征映射能够克服拉普拉斯特征映射的“凸性限制”（Zheng
    & Xue, 2009）。在scikit-learn中，海森特征映射可以通过*LocallyLinearEmbedding()*执行，即与LLE相同的方法，但指定*method
    = ‘hessian''*。


    ### 4.4 层次聚类


    层次聚类算法（Johnson, 1967）构建数据集结构的层次表示，其中层次结构中每一层的聚类是通过合并或拆分下一层或上一层的聚类来组装的（Johnson,
    1967; Hastie et al., 2017）。存在两种主要的层次聚类范式：凝聚式（即自底向上）和分裂式（即自顶向下）。凝聚式策略从底部开始，每个观测值形成一个聚类（Johnson,
    1967; Hastie et al., 2017）。接下来，在每个后续层级，算法递归地将选定的一对聚类合并为一个聚类。合并（即连接）的标准基于特定的度量（Johnson,
    1967; Hastie et al., 2017）。


    相比之下，分裂式方法从一个包含所有观测值的单个聚类开始，在每个后续层级，使用相异性度量递归地将一个现有聚类拆分为两个新聚类（Johnson, 1967; Hastie
    et al., 2017）。在scikit-learn中，方法*AgglomerativeClustering()*使用自底向上的方法执行凝聚式层次聚类。连接标准基于相异性的概念。要理解这个概念，考虑两组观测值；聚类$G$和$H$。层次聚类基于成对观测相异性$d_{ij}$的集合来估计$G$和$H$之间的相异性$d(G,
    H)$，其中对中的成员$i$在$G$中，成员$j$在$H$中。'

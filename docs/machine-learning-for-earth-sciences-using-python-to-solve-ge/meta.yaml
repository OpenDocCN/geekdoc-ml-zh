    # Chapter 9

    Machine Learning Regression

    in Petrology


    ![](img/90d3084aebf7ededff86e49f84c52faa_149_0.png)


    # 9.1 Motivation


    Deciphering magma storage depths and temperatures in the feeding systems of active
    volcanoes is a central issue in volcanology and petrology (see, e.g., Putirka,
    2008). For example, magma storage depths help to characterize volcanic plumbing
    systems (see, e.g., Petrelli et al., 2018; Ubide and Kamber, 2018; Ubide et al.,
    2021). Also, the magma temperature must be estimated in order to use diffusion-based
    geo-chronometers (see, e.g., Costa et al., 2020). To date, a robust and widely
    applied strategy to design geo-barometers or geo-thermometers is mainly based
    on changes in entropy and volume during equilibrium reactions between melts and
    crystals (see Putirka, 2008 and Putirka, 2008, and references therein). For example,
    the calibration of a mineral-melt or mineral-only thermometer or of a barometer
    consists of five main steps: (1) determine the chemical equilibria associated
    with significant changes in entropy and volume (Putirka, 2008); (2) procure a
    suitable experimental data set for which temperature and pressure are known (e.g.,
    the data set of the Library of Experimental Phase Relations; Hirschmann et al.,
    2008); (3) compute the components of the crystal phase from chemical analyses;
    (4) choose the regression strategy; and (5) validate the model (Putirka, 2008).
    Recently, numerous authors have demonstrated the potential of thermo-barometry
    based on ML (see, e.g., Petrelli et al., 2020; Jorgenson et al., 2022). This chapter
    discusses how to calibrate ML thermo-barometers based on ortopyroxenes in equilibrium
    with the melt phase and with orthopyroxenes alone.'
  - '[PAGE 150]


    # 9.2 LEPR Data Set and Data Pre-processing


    The Library of Experimental Phase Relations (LEPR) (Hirschmann et al., 2008) includes
    >5000 petrological experiments simulating igneous systems at temperatures between
    500 and 2500 °C and pressures up to 25 GPa or more. The LEPR data set can be downloaded
    from a dedicated portal.¹ In the LEPR data set, the entries corresponding to each
    experiment include both experimental data (i.e., the composition of starting materials,
    the experimental temperature and pressure, the phases at the end of the experiments
    and related compositions) and metadata (e.g., author, laboratory, device, oxygen
    fugacity). For this chapter, I downloaded an Excel™ file and I named it LEPR_download.xls.
    In the Excel™ file, the sheet named “Experiments” contains all the meta data and
    relevant information such as the composition of starting materials, the experimental
    temperature and pressure, and the phases present at the end of the experiment.
    The sheets named with a phase name (e.g., Liquid, Clinopyroxene, Olivine) contain
    the chemical compositions for that specific phase in each experiment. An index
    characterizes each experiment, linking the information in the different sheets.


    As a pre-processing strategy (see code listing 9.1), we define the function *data_pre_processing()*,
    which (1) imports the LEPR data set from Excel™ (lines 103 and 104), (2) creates
    a pandas *pipe()* for basic operations such as adjusting column names, converting
    all Fe data such as FeO<sub>tot</sub>, filtering the features, and imputing NaN
    to zero (lines from 115 to 120); (3) start storing phase information in a .hd5
    file (lines 123, 153, and 154); (4) combine all relevant data in a single pandas
    DataFrame (lines 128–130); (5) filter based on SiO<sub>2</sub>, pressure *P* (GPa),
    and temperature *T* (°C) (lines 132–141); (6) remove the entries characterized
    by chemical analysis that do not fit the chemical formula of the orthopyroxene
    (lines 143–145); (7) shuffle the data set (lines 147 and 148); (8) separate the
    labels from the input features (lines 150 and 151); and (9) store everything in
    a .hd5 file (lines 153 and 154).


    The statement at line 157 triggers the data pre-processing. The result is a hdf5
    file named ml_data.h5 that contains a DataFrame named “Liquid_Orthopyroxene” hosting
    the pre-processed experimental data from the LEPR data set. In addition, it stores
    the labels *T* and *P* in a DataFrame named “labels.” Finally, it contains all
    the original data of interest in three DataFrames named “Liquid,” “Orthopyroxene,”
    and “starting_material.”


    Figures 9.1 and 9.2 show the probability densities for the different chemical
    elements in the melt and orthopyroxene phases, respectively (code listing 9.2).
    Code listing 9.2 imports the Liquid_Orthopyroxene DataFrame from the hdf5 file
    ml_data.h5 (line 5).


    ¹ https://lepr.earthchem.org/.'

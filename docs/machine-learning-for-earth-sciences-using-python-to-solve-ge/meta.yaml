    \ & Langford, J. (2012). *扩展机器学习：并行与分布式方法*. 剑桥：剑桥大学出版社。\n\n## 第五部分\n\n## 下一步：深度学习\n\
    \n## 第 12 章\n深度学习简介\n\n### 12.1 深度学习意味着什么？\n\n如第 1 章所述，机器学习算法通过从数据中提取模式来获取知识。\n\
    \n换句话说，它们试图将所研究特征提供的表示映射以产生输出（Goodfellow 等人，2016）。因此，特征在机器学习中至关重要，因为它们提供了构建表示的信息。然而，仅仅将表示映射以提供输出通常是不够的。因此，我们必须训练机器学习系统，不仅要发现从表示到输出的映射，还要发现表示本身（Goodfellow\
    \ 等人，2016）。这种方法被称为表示学习。在复杂问题中（例如，具有许多特征或极大数据集的问题），学习表示并非易事。\n\n> “深度学习通过引入用其他更简单表示来表达的表示，解决了表示学习中的这个核心问题。深度学习使计算机能够从简单的概念中构建复杂的概念”（Goodfellow\
    \ 等人，2016）。\n\n深度学习的一个典型例子是多层感知器，它是一个将一组输入映射到输出值的数学函数（Goodfellow 等人，2016）。该函数由许多更简单的函数组合而成（图\
    \ 12.1）。为了更好地理解，图 12.1 展示了深度学习方法如何通过组合更简单的概念（如角点和轮廓）来表示图像的概念，而这些概念又由边缘定义（Goodfellow\
    \ 等人，2016）。在图 12.1 中，输入馈送到可见层，然后一系列隐藏层从初始输入中逐步提取和处理抽象特征。最后一层提供输出（例如，学习过程中开发的表示的映射结果）（Goodfellow\
    \ 等人，2016）。\n\n从数学角度来看，深度前馈网络（或多层感知器）旨在近似某个函数 $f^*$（Goodfellow 等人，2016）。具体来说，它定义了一个映射\
    \ $\\mathbf{y} = f(\\mathbf{x}; \\boldsymbol{\\theta})$，并学习参数 $\\boldsymbol{\\\
    theta}$ 的值，以实现对函数最准确的近似（Goodfellow 等人，2016）（图 12.2）。为什么是前馈？因为数据通过函数从输入 $\\mathbf{x}$\
    \ 流经用于定义 $f$ 的中间计算，最终到达输出 $\\mathbf{y}$。为什么是网络？因为网络通常通过组合许多不同的函数来表达。例如，我们可以将三个函数\
    \ $f^{(1)}$、$f^{(2)}$ 和 $f^{(3)}$ 组合成一个链来定义 $f(x) = f^{(3)}(f^{(2)}(f^{(1)}(x)))$（Goodfellow\
    \ 等人，2016）。具体来说，$f^{(1)}$ 是网络的第一层，$f^{(2)}$ 是第二层，依此类推（Goodfellow 等人，2016）。链的总长度定义了模型的深度。这就是它们被称为“深度”的原因。前馈网络的最后一层提供输出。在训练过程中，我们调整\
    \ $f(\\mathbf{x}; \\boldsymbol{\\theta})$ 中的 $\\boldsymbol{\\theta}$ 参数，以匹配 $f^*(\\\
    mathbf{x})$（Goodfellow 等人，2016）。"

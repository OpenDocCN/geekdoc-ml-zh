    \n# Part IV\nScaling Machine Learning Models\n\n# Chapter 10\nParallel Computing\
    \ and Scaling with Dask\n\n## 10.1 Warming Up: Basic Definitions\n\n**Processor,\
    \ CPU, Core** The traditional definition of “processor” and “central processing\
    \ unit” (CPU) is “a microprocessor chip that sequentially (i.e., one by one) executes\
    \ a series of basic processing tasks based on an input” (Caesar Wu, 2015). However,\
    \ modern CPUs largely exceed this traditional definition by integrating many components\
    \ and hosting a cache memory. Modern CPUs duplicate and execute the most basic\
    \ processing tasks by applying self-contained execution blocks that fit the traditional\
    \ definition of a processor (Caesar Wu, 2015). These self-contained execution\
    \ blocks are typically called “cores” (Caesar Wu, 2015).\n\n**Multi-Core Processor\
    \ and Parallel Hardware** Multi-core processors, chip multi-processors (CMPs),\
    \ and parallel hardware are often used as synonyms (Peter Pacheco, 2020). A CMP\
    \ incorporates many processors and cache memory on a chip. Parallel hardware is\
    \ ubiquitous now—it is almost impossible to find a modern laptop, desktop, or\
    \ server that does not use a multi-core processor (Peter Pacheco, 2020).\n\n**Graphics\
    \ Processing Unit (GPU)** “GPUs are multi-core processing units made of massively\
    \ parallel, smaller, and more specialized cores than those generally found in\
    \ high-performance CPUs. GPU architecture efficiently processes vector data (an\
    \ array of numbers) and is often referred to as vector architecture.”¹\n\n**Field\
    \ Programmable Gate Array (FPGA)** “FPGAs are integrated circuits with a programmable\
    \ hardware fabric. Unlike CPUs and GPUs, which are software-programmable fixed\
    \ architectures, FPGAs are reconfigurable. When writing software for a FPGA, compiled\
    \ instructions become hardware components that are spatially laid out on the FPGA\
    \ fabric, and those components can all execute in parallel.” (see footnote 1).\n\
    \n**Distributed Computing** Distributed computing is “[a] computer system consisting\
    \ of a multiplicity of processors, each with its own local memory, connected via\
    \ a network. Loading or store instructions issued by a processor can only address\
    \ the local memory and different mechanisms are provided for global communication”\
    \ (David, 2011).\n\n**Serial Codes** Serial codes are codes that were conceived\
    \ and written for a single processor (Peter Pacheco, 2020). If you run a serial\
    \ code on multiple processors or a distributed architecture, the performance does\
    \ not magically improve because the instructions are executed sequentially by\
    \ one of the available cores.\n\n**Parallel Computing** Parallel computing is\
    \ a computation strategy whereby many calculations or processes are executed simultaneously\
    \ (Peter Pacheco, 2020). Parallel computing exploits multiple processors (i.e.,\
    \ CMP, GPU, and FPGA) or a distributed architecture (Peter Pacheco, 2020).\n\n\
    ## 10.2 Basics of Dask\n\nThe goal of Dask² is to overcome single-machine restrictions\
    \ by adding object scalability to Python scientific libraries such as pandas,\
    \ NumPy, and scikit-learn (Daniel, 2019). Dask consists of three main layers:\
    \ (1) scheduler, (2) low-level application programming interfaces (APIs), and\
    \ (3) high-level APIs (Fig. 10.1). This chapter discusses mainly the high-level\
    \ APIs that govern Dask arrays, Dask DataFrames, and Dask ML, which allow us to\
    \ scale NumPy, pandas, and scikit-learn objects, respectively. In using Dask,\
    \ our main goal is to extend the capabilities of single machines so that they\
    \ can work with data sets that exceed their native RAM capabilities and deploy\
    \ clusters to exploit big data sets or extremely complex models.\n\n**Dask Array**\
    \ Dask arrays combine many NumPy arrays arranged into chunks (i.e., a single NumPy\
    \ array) within a grid (Fig. 10.2). They are the parallel-friendly version of\
    \ NumPy arrays. Defining a Dask array is as simple as defining a NumPy array;\
    \ the only difference being that you need to import dask.array instead of NumPy\
    \ (Fig. 10.3). For example, Fig. 10.3 shows how to create a 10⁵ × 10⁵ Dask array\
    \ containing random numbers. In Jupyter Notebooks, you can easily retrieve copious\
    \ information on the Dask array you created (Fig. 10.3).\n\n¹ https://intel.ly/39XimzH.\n\
    ² https://www.dask.org."

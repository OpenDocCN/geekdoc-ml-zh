    # 7.5 Loss Functions, Cost Functions, and Gradient Descent


    Most ML algorithms involve model optimization [e.g., $f_{\theta}(\boldsymbol{x})$
    in Eq. (7.13)]. For the purposes of this book, the term “optimization” shall refer
    to adjusting the model parameters $\boldsymbol{\theta}$ to minimize or maximize
    a function that measures the consistency between model predictions and training
    data.


    In general, the function we want to minimize or maximize is called the **objective
    function** (Goodfellow et al., 2016). In the case of minimization, the objective
    function takes names such as cost function, loss function, and error function.
    These terms are often interchangeable Goodfellow et al. (2016), but sometimes
    a specific term is used such as loss or cost function to describe a specific task.


    As an example, some authors use the term **loss function** to measure how well
    a model agrees with a single label in the training data set (Goodfellow et al.,
    2016). The square loss is an example of a loss function:


    $$L(\boldsymbol{\theta}) = [y_i - f_{\theta}(\boldsymbol{x}_i)]^2, \quad (7.25)$$


    where $y_i$ and $f_{\theta}(\boldsymbol{x}_i)$ are the labeled (i.e., true or
    measured) values and those predicted by our model, respectively. Also, $\boldsymbol{x}$
    and $\boldsymbol{\theta}$ are the inputs and the parameters governing the model,
    respectively.


    Similarly, the **cost function** evaluates the loss function over the entire data
    set and helps to evaluate the overall performance of the model (Goodfellow et
    al., 2016). The mean squared error is an example of a cost function:


    $$C(\boldsymbol{\theta}) = \frac{1}{n} \sum_{i=1}^{n} [y_i - f_{\theta}(\boldsymbol{x}_i)]^2,
    \quad (7.26)$$


    where $n$ is the number of elements in the training data set.'

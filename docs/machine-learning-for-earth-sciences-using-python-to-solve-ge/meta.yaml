  mdcn: "在我们的具体案例中，*ExtraTreesClassifier()* 依赖于许多超参数，例如树的数量、考察的特征数量以及分裂准则。\n\n```python\n\
    import pandas as pd\nfrom sklearn.ensemble import ExtraTreesClassifier\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.model_selection import GridSearchCV\n\
    import joblib as jb\nfrom sklearn.preprocessing import StandardScaler\n\nX = pd.read_hdf('ml_data.h5',\
    \ 'train').values\ny = pd.read_hdf('ml_data.h5', 'train_target').values\n\nX_train,\
    \ X_test, y_train, y_test = train_test_split(\n    X, y, test_size=0.2, random_state=10,\
    \ stratify=y)\n\nscaler = StandardScaler()\nX_train = scaler.fit_transform(X_train)\n\
    \nparam_grid = {\n    'criterion': ['entropy', 'gini'],\n    'min_samples_split':\
    \ [2, 5, 8, 10],\n    'max_features': ['sqrt', 'log2', None],\n    'class_weight':\
    \ ['balanced', None]\n    }\n\nclassifier = ExtraTreesClassifier(n_estimators=250,\n\
    \                                   n_jobs=-1)\n\nCV_rfc = GridSearchCV(estimator=classifier,\
    \ param_grid=param_grid\n                       , cv= 3, verbose=10)\nCV_rfc.fit(X_train,\
    \ y_train)\n\njb.dump(CV_rfc, 'ETC_grid_search_results_rev_2.pkl')\n```\n\n**代码清单\
    \ 8.9** 使用 *GridSearchCV()* 进行网格搜索\n\n所有这些超参数可以取不同的值，这些值可能对模型的分类能力产生正面或负面影响。寻找所考察超参数最佳组合的最简单方法是进行网格搜索，其过程包括为每个超参数定义最相关的值，然后为每种可能的组合训练和评估一个模型。表\
    \ 8.1 列出了为网格搜索选择的超参数。scikit-learn 中的 *GridSearchCV()* 方法用于在 Python 中进行网格搜索（代码清单\
    \ 8.9）。导入所有必需的库（第 1-6 行）后，导入预处理后的训练数据集（第 8 行）及其标签（第 9 行）。接下来，训练数据集被分成两部分：一部分（即\
    \ *X_train*）用于网格搜索内的训练和验证，另一部分（即 *X_test*）不参与训练，用于测试网格搜索期间获得的结果，并进一步测试是否存在过拟合等潜在问题。下一步（第\
    \ 14 和 15 行）包括将网格搜索涉及的数据集缩放为零均值和单位方差（参见第 3.3.5 段）。第 17-22 行定义了网格搜索涉及的参数集。所选超参数的组合形成了一个包含\
    \ 48 个模型的网格，每个模型通过交叉验证（见第 3.5.2 节）重复三次（第 27 行的 cv = 3），总共进行 144 次尝试。\n\n在我的配备\
    \ 2.3 GHz 四核 Intel™ Core i7 处理器和 32 GB 内存的 MacBook Pro 上运行代码清单 8.9 大约需要 8 小时。图\
    \ 8.5 的上图显示了所有 48 个模型的准确率分数，按其排名排序（代码清单 8.10），并突出显示了表现最佳的模型产生的准确率分数大于 0.95。如此强劲的表现可能表明我们对训练数据集存在过拟合，因此，作为第一步，我们将三个表现最佳的模型（代码清单\
    \ 8.10）应用于测试数据集（即 X_test）。图 8.5 的下图显示，X_test 的准确率分数与网格搜索交叉验证得到的结果（即 ≈0.96）处于同一数量级，这并不支持存在严重过拟合的观点。\n\
    \n```python\nfrom joblib import load\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nimport pandas as pd\nfrom sklearn.ensemble import ExtraTreesClassifier\n\
    from sklearn.model_selection import train_test_split\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\nCV_rfc = load('ETC_grid_search_results_rev_2.pkl')\n\
    \nmy_results = pd.DataFrame.from_dict(CV_rfc.cv_results_)\nmy_results = my_results.sort_values(by=['rank_test_score'])\n\
    \n# Plot the results of the GridSearch\nfig = plt.figure()\nax1 = fig.add_subplot(2,1,1)\n\
    ax1.plot(my_results['rank_test_score'], my_results['mean_test_score'], marker='o',\n\
    \         markeredgecolor='#0A3A54', markerfacecolor='#C82127',\n         color='#0A3A54',\n\
    \         label='Grid Search Results')\nax1.set_xticks(np.arange(1,50,4))\nax1.invert_xaxis()\n\
    ax1.set_xlabel('Model ranking')\nax1.set_ylabel('Accuracy scores')\nax1.legend()\n\
    \n# Selecting the best three performing models\nmy_results = my_results[my_results['mean_test_score']>0.956]\n\
    \n# Load and scaling\nX = pd.read_hdf('ml_data.h5', 'train').values\ny = pd.read_hdf('ml_data.h5',\
    \ 'train_target').values\n\nX_train, X_test, y_train, y_test = train_test_split(\n\
    \    X, y, test_size=0.2, random_state=10, stratify=y)\n\nscaler = StandardScaler()\n\
    X_train = scaler.fit_transform(X_train)\nX_test = scaler.transform(X_test)\n\n\
    leaderboard_test_features = pd.read_hdf('ml_data.h5', 'leaderboard_test_features').values\n\
    hidden_test = pd.read_hdf('ml_data.h5', 'hidden_test').values\n\nleaderboard_test_features_scaled\
    \ = scaler.transform(leaderboard_test_features)\nhidden_test_scaled = scaler.transform(hidden_test)\n\
    \n# Apply the three best performing model on the test dataset and on the unknowns\n\
    leaderboard_test_res = {}\nhidden_test_res  = {}\ntest_score  = []\nrank_model\
    \  = []\nfor index, row in my_results.iterrows():\n    classifier = ExtraTreesClassifier(n_estimators=250,\
    \ n_jobs=8,\n    random_state=64, **row['params'])\n    classifier.fit(X_train,\
    \ y_train)\n    my_score = classifier.score(X_test,y_test)\n    test_score.append(my_score)\n\
    \    rank_model.append(row['rank_test_score'])\n\n    my_leaderboard_test_res\
    \ = classifier.predict(\n    leaderboard_test_features_scaled)\n    my_hidden_test_res\
    \ = classifier.predict(hidden_test_scaled)\n    leaderboard_test_res['model_ranked_'\
    \ + str(row[\n    'rank_test_score'])] = my_leaderboard_test_res\n    hidden_test_res['model_ranked_'\
    \ + str(row['rank_test_score'])\n    ] = my_hidden_test_res\n\nleaderboard_test_res_pd\
    \ = pd.DataFrame.from_dict(\n    leaderboard_test_res)\nhidden_test_res_pd = pd.DataFrame.from_dict(hidden_test_res)\n\
    leaderboard_test_res_pd.to_hdf('ml_data.h5', key= 'leaderboard_test_res')\nhidden_test_res_pd.to_hdf('ml_data.h5',\
    \ key= 'hidden_test_res')\n\n# plot the resultson the test dataset\nax2 = fig.add_subplot(2,1,2)\n\
    labels = my_results['rank_test_score']\nvalidation_res = np.around(my_results['mean_test_score'],\
    \ 2)\ntest_res = np.around(np.array(test_score),2)\nx = np.arange(len(labels))\n\
    width = 0.35\nrects1 = ax2.bar(x - width/2, validation_res, width, label='Validation\
    \ data set', color='#C82127')\nrects2 = ax2.bar(x + width/2, test_res, width,\
    \ label='Test data set', color='#0A3A54')\nax2.set_ylabel('Accuracy scores')\n\
    ax2.set_xlabel('Model ranking')\nax2.set_ylim(0,1.7)\nax2.set_xticks(x, labels)\n\
    ax2.legend()\nax2.bar_label(rects1, padding=3)\nax2.bar_label(rects2, padding=3)\n\
    fig.align_ylabels()\nfig.tight_layout()\n```\n\n**代码清单 8.10** 将三个表现最佳的模型应用于测试数据集和未知样本\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn.metrics\
    \ import accuracy_score\nimport pandas as pd\n\nleaderboard_test_res= pd.read_hdf('ml_data.h5',\
    \ 'leaderboard_test_res')\nhidden_test_res = pd.read_hdf('ml_data.h5', 'hidden_test_res')\n\
    \nleaderboard_test_target = pd.read_hdf('ml_data.h5', 'leaderboard_test_features_target').values\n\
    hidden_test_target = pd.read_hdf('ml_data.h5', 'hidden_test_target').values\n\n\
    leaderboard_accuracy_scores = []\nhidden_accuracy_scores = []\n\nfor (leaderboard_column,\
    \ leaderboard_data), (hidden_column, hidden_data) in zip(leaderboard_test_res.iteritems(),\
    \ hidden_test_res.iteritems()):\n    leaderboard_accuracy_scores.append(np.around(accuracy_score(leaderboard_data,\
    \ leaderboard_test_target),2))\n    hidden_accuracy_scores.append(np.around(accuracy_score(hidden_data,\
    \ hidden_test_target),2))\n\n# plot the resultson the test dataset\nplt, ax1 =\
    \ plt.subplots()\nlabels = leaderboard_test_res.columns\nx = np.arange(len(labels))\n\
    width = 0.35\nrects1 = ax1.bar(x - width/2, leaderboard_accuracy_scores, width,\
    \ label='Leaderboard test data set', color='#C82127')\nrects2 = ax1.bar(x + width/2,\
    \ hidden_accuracy_scores, width, label='Hidden test data set', color='#0A3A54')\n\
    ax1.set_ylabel('Accuracy scores')\n#ax1.set_xlabel('Model ranking')\nax1.set_ylim(0,1.1)\n\
    ax1.set_xticks(x, labels)\nax1.legend()\nax1.bar_label(rects1, padding=3)\nax1.bar_label(rects2,\
    \ padding=3)\n```\n\n**代码清单 8.11** 绘制从排行榜和隐藏测试数据集获得的结果\n\n三个表现最佳的模型也被运行以预测未知样本（即排行榜和隐藏测试数据集）。排行榜和隐藏测试数据集的准确率分数（图\
    \ 8.6）（即从 0.79 到 0.81）突出表明，我们的机器学习模型在独立测试数据集上仍然表现令人满意，因此我们进入下一节，在那里我们根据 FORCE2020\
    \ 挑战赛的评估标准来检查模型。"

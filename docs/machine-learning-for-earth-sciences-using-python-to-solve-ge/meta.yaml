    In a geochemical data set, observations consist of one sample |

    | Class | A set of observations characterized by the same label |

    | Prediction | The output of a ML algorithm for a specific input observation |

    | Model | What a ML algorithm has learned after training |

    | Training a model | Process of determining the best model. Is is synonymous with

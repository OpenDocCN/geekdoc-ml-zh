    和 Saturn Cloud。前两项服务，Google™ Colaboratory 和 Kaggle，均由 Google™ 管理，并提供具有有限计算资源的免费计划。最后，Saturn
    Cloud 提供包含 30 小时计算时间的免费计划。所有服务都允许在线使用 Jupyter Notebooks。



    # 2.7 Speed Up Your ML Python Environment


    A common argument by Python detractors is that Python is slow when compared with
    other established programming languages such as C or FORTRAN. We all agree with
    this argument but, in my opinion, this is not the point. In scientific computations,
    Python relies on libraries developed in higher-performing languages, mainly C
    and C++, and on parallel computing platforms such as CUDA.¹⁸ For example, NumPy,
    the core Python library for scientific computing, is based on an optimized C code.¹⁹
    For ML purposes, all scikit-learn, PyTorch, and Tensorflow provide a base version
    of the library that can be safely installed in any local machine for rapid prototyping
    and small- to mid-scale problems. In addition, optimized versions for intensive
    computing applications are also available. For example, the Intel™ extension for
    scikit-learn accelerates ML applications in Python for Intel-based hardware by
    a factor 10–100×.²⁰ The Intel™ extension for scikit-learn is easily installed
    by using *conda*. To prevent conflicts, I strongly recommend creating a new conda
    environment such as *env_ml_intel*:


    ```

    $ conda create -n env_ml_intel -c conda-forge python=3.9 scikit-learn-intelex
    scikit-learn rasterio matplotlib pandas spyder scikit-image seaborn

    ```


    Listing my local environments now gives


    ```

    $ conda info --envs

    Output:

    # conda environments:

    #

    base                     *  /opt/anaconda3

    env_ml                      /opt/anaconda3/envs/env_ml

    env_pt                      /opt/anaconda3/envs/env_pt

    env_tf                      /opt/anaconda3/envs/env_tf

    env_ml_intel                /opt/anaconda3/envs/env_ml_intel

    ```


    I left the *base* environment untouched. Then I created two general-purpose ML
    environments, *env_ml* and *env_ml_intel*, with the latter optimized by Intel.
    Finally, I created two DL environments *env_pt* and *env_tf*, which are based
    on PyTorch and Tensorflow, respectively.

    Note that DL libraries such as PyTorch and Tensorflow are highly optimized to
    support GPU computing (e.g., CUDA²¹ and ROCm²²). For example, a Pytorch CUDA-optimized
    version for the Linux OS can be easily installed by conda as follows (April, 2023):


    ¹⁸ https://developer.nvidia.com/cuda-zone.

    ¹⁹ https://numpy.org.

    ²⁰ https://github.com/intel/scikit-learn-intelex.

    ²¹ https://developer.nvidia.com/cuda-zone.

    ²² https://rocmdocs.amd.com/en/latest/.'

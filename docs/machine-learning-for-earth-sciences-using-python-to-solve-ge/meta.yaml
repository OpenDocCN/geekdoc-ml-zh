    The contracting path applies a sequence of two 3 × 3 convolutions, each followed
    by a ReLU and 2 × 2 max pooling (Ronneberger et al., 2015). Next, in the expansive
    path, the U-net architecture upsamples the feature map, followed by a 2 × 2 convolution
    (“up-convolution”), and two 3 × 3 convolutions, each followed by a ReLU (Ronneberger
    et al., 2015). The final layer applies a 1 × 1 convolution to map'

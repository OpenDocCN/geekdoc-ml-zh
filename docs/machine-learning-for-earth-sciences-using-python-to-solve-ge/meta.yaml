- md: "## Chapter 6\nClustering of Multi-Spectral Data\n\n## 6.1 Spectral Data from\
    \ Earth-Observing Satellites\n\nEarth-observing satellite missions such as Sentinel¹\
    \ and Landsat² provide us with multispectral, hyperspectral, and panchromatic\
    \ data. The Sentinel earth-observing satellite missions are part of the Copernicus\
    \ program, developed by the European Space Agency,³ whereas the Landsat Program\
    \ is jointly managed by NASA and the U.S. Geological Survey (see footnote 2).\n\
    \nSpectral images are two-dimensional representations of surface reflectance or\
    \ radiation in different bands of the electromagnetic spectrum. Multi-spectral\
    \ and hyper-spectral data are acquired by multiple sensors operating over wide\
    \ and narrow (sometimes quasi-continuous) wavelength ranges, respectively. In\
    \ contrast, panchromatic images are acquired by detectors covering the entire\
    \ visible range.\n\nMulti-spectral, hyper-spectral, and panchromatic data can\
    \ be combined and modulated to produce new indexes⁴ (e.g., the Generalized Difference\
    \ Vegetation Index or the Normalized Difference Snow Index), which highlight specific\
    \ phenomena and facilitate data interpretation.\n\nFor example, the Sentinel-2\
    \ Multi-spectral Instrument operates over 13 spectral bands. Four bands labeled\
    \ B2, B3, B4, and B8 provide a spatial resolution of 10 m, six bands labeled B5,\
    \ B6, B7, B8a, B11, and B12 provide a spatial resolution of 20 m, and three bands\
    \ labeled B1, B9, and B10 provide a spatial resolution of 60 m (Fig. 6.1).\n\n\
    ¹ https://sentinels.copernicus.eu.\n² https://landsat.gsfc.nasa.gov.\n³ https://www.esa.int.\n\
    ⁴ https://www.usgs.gov/landsat-missions/landsat-surface-reflectance-derived-spectral-indices.\n\
    \n© The Author(s), under exclusive license to Springer Nature Switzerland AG 2023\n\
    M. Petrelli, *Machine Learning for Earth Sciences*, Springer Textbooks in Earth\
    \ Sciences, Geography and Environment,\nhttps://doi.org/10.1007/978-3-031-35114-3_6\n\
    \n![](img/90d3084aebf7ededff86e49f84c52faa_96_0.png)\n\nFig. 6.1 Spectral bands\
    \ of Sentinel2 satellites. Modified from Majidi Nezhad et al. (2021)\n\n## 6.2\
    \ Import Multi-Spectral Data to Python\n\nMulti-spectral data can be downloaded\
    \ from numerous access points, such as the USGS Earth Explorer,⁵ the Copernicus\
    \ Open Access Hub,⁶ and Theia.⁷\n\nAs an example, consider Fig. 6.2, which represents\
    \ the recombination of the B4, B3, and B2 bands to form a RGB (i.e., red, green,\
    \ blue) image from a Sentinel2 acquisition downloaded from the Theia portal. The\
    \ image location is southern New South Wales (Australia).⁸ Each side of the square\
    \ image measures about 110 km.\n\nFigure 6.3 shows the data structure of a Sentinel2\
    \ repository downloaded from Theia. The repository follows the MUSCATE⁹ nomenclature\
    \ and contains a metadata file, a quick-look file, numerous Geo-Tiff image files,\
    \ and two sub-repositories MASKS and DATA, which contain supplementary data. The\
    \ naming enables us to uniquely identify each product and consists of many tags,\
    \ starting with a platform identification (i.e., Sentinel2B) followed by the date\
    \ of acquisition in the format YYYYMMDD-HHmmSS-sss (e.g., 20210621-001635-722),\
    \ with YYYY being the year, MM the month, DD the day, HH the hour in 24 hour format,\
    \ mm the minutes, SS the seconds, and sss the milliseconds. The subsequent tags\
    \ refer to product level (e.g., L2A), geographical zone (e.g., T55HDB_C), and\
    \ product version (e.g., V2-2). The letter L, a number, and another letter characterize\
    \ different product levels with the exception of level L0, which is compressed\
    \ raw data and is not followed by any letter. Levels L1A, L1B, and L2A correspond\
    \ to uncompressed raw data, radiometrically corrected radiance data, and orthorectified\
    \ bottom-of-atmosphere reflectance, respectively.¹⁰ Spectral Geo-Tiff files also\
    \ use an additional tag, namely, SRE and FRE, which correspond respectively to\
    \ images taken in ground reflectance without correcting for slope effects and\
    \ images taken in ground reflectance with slope effects corrected. We shall work\
    \ on FRE data.\n\nTo import Sentinel2 multi-spectral data, I used Rasterio,¹¹\
    \ which is a Python API based on Numpy and GeoJSON (i.e., an open standard format\
    \ designed for representing geographical features, along with their non-spatial\
    \ attributes) to read, write, and manage Geo-Tiff data.\n\n⁵ https://earthexplorer.usgs.gov.\n\
    ⁶ https://scihub.copernicus.eu.\n⁷ https://catalogue.theia-land.fr.\n⁸ https://bit.ly/ml_geart.\n\
    ⁹ https://www.theia-land.fr/en/product/sentinel-2-surface-reflectance/.\n¹⁰ https://sentinels.copernicus.eu/web/sentinel/technical-guides/sentinel-2-msi.\n\
    ¹¹ https://rasterio.readthedocs.io/.\n\n![](img/90d3084aebf7ededff86e49f84c52faa_97_0.png)\n\
    \n**Fig. 6.2** RGB composite image where the B4, B3, and B2 bands regulate the\
    \ intensities of the red, green, and blue channels, respectively\n\n![](img/90d3084aebf7ededff86e49f84c52faa_98_0.png)\n\
    \nFig. 6.3 Sentinel2 data structure\n\nIf you followed the instructions in Chap.\
    \ 2, your Python machine learning environments named *env_ml* and *env_ml_intel*\
    \ already contain Rasterio. With Rasterio, opening Geo-Tiff files is straightforward\
    \ (see code listing 6.1).\n\n```python\nimport rasterio\nimport numpy as np\n\n\
    imagePath = 'SENTINEL2B_20210621-001635-722_L2A_T55HDB_C_V2-2/SENTINEL2B_20210621-001635-722_L2A_T55HDB_C_V2-2_FRE_'\n\
    \nbands_to_be_imported = ['B2', 'B3', 'B4', 'B8']\n\nbands_dict = {}\nfor band\
    \ in bands_to_be_imported:\n    with rasterio.open(imagePath+ band +'.tif', 'r',\n\
    \                       driver='GTiff') as my_band:\n        bands_dict[band]\
    \ = my_band.read(1)\n```\n\nListing 6.1 Using Rasterio to import Sentinel2 data\
    \ in Python\n\nCode listing 6.1 creates a dictionary of NumPy arrays (i.e., *bands_dict*)\
    \ containing spectral information from B2, B3, B4, and B8 corresponding to the\
    \ blue, green, red, and near-infrared bands, respectively. In code listing 6.1,\
    \ we limit the import to four bands, all acquired at the same spatial resolution\
    \ of 10 m. However, the script can be easily extended to import more bands.\n\n\
    Combining the data from the *bands_dict* dictionary allows many different representations\
    \ to be achieved. For example, Sovdat et al. (2019) explain how to obtain the\
    \ “natural color” representation of Sentinel-2 data.\n\nExplaining how to obtain\
    \ a perfectly balanced image with natural colors is beyond the scope of this book,\
    \ so we limit ourselves to combining bands B2, B3, and B4, which roughly correspond\
    \ to blue, green, and red as perceived by our eyes.\n\nIn detail, a bright, possibly\
    \ overly saturated (Sovdat et al., 2019) image (i.e., *r_g_b*) can be easily derived\
    \ and plotted (see code listing 6.2 and Fig. 6.2). We start from the *bands_dict*\
    \ dictionary after contrast stretching (lines 11–17) and scale the values in the\
    \ interval [0,1]. This is the so-called “true color” representation. Sometimes,\
    \ bands B3 (red) and B4 (green) are combined with B8 (near-infrared) to achieve\
    \ a “false color” representation. False color composite images are often used\
    \ to highlight plant density and health (see, e.g., Fig. 6.4). Code listing 6.3\
    \ shows how to construct a false-color representation (i.e., *nir_r_g*) of Sentinel2\
    \ data.\n\n```python\n1 import numpy as np\n2 from skimage import exposure, io\n\
    3 from skimage.transform import resize\n4 import matplotlib.pyplot as plt\n5\n\
    6 r_g_b = np.dstack([bands_dict['B4'],\n7                     bands_dict['B3'],\n\
    8                     bands_dict['B2']])\n9\n10 # contrast stretching and rescaling\
    \ between [0,1]\n11 p2, p98 = np.percentile(r_g_b, (2,98))\n12 r_g_b = exposure.rescale_intensity(r_g_b,\
    \ in_range=(p2, p98))\n13 r_g_b = r_g_b / r_g_b.max()\n14\n15 fig, ax = plt.subplots(figsize=(8,\
    \ 8))\n16 ax.imshow(r_g_b)\n17 ax.axis('off')\n```\n\n**Listing 6.2** Plotting\
    \ a RGB image using bands B4, B3, and B2\n\n```python\n1 import numpy as np\n\
    2 from skimage import exposure, io\n3 from skimage.transform import resize\n4\
    \ import matplotlib.pyplot as plt\n5\n6 nir_r_g = np.dstack([bands_dict['B8'],\n\
    7                      bands_dict['B4'],\n8                      bands_dict['B3']])\n\
    9\n10 # contrast stretching and rescaling between [0,1]\n11 p2, p98 = np.percentile(nir_r_g,\
    \ (2,98))\n```"
  mdcn: "## 第六章\n多光谱数据的聚类分析\n\n## 6.1 来自对地观测卫星的光谱数据\n\n诸如Sentinel¹和Landsat²等对地观测卫星任务为我们提供了多光谱、高光谱和全色数据。Sentinel对地观测卫星任务是欧洲航天局³开发的哥白尼计划的一部分，而Landsat计划则由美国国家航空航天局（NASA）和美国地质调查局（USGS）共同管理（参见脚注2）。\n\

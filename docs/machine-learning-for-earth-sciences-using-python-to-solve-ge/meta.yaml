    表 4.1 凝聚聚类中的连接选项


    | 参数 | 方程 | 备注 |

    | :--- | :--- | :--- |

    | linkage=''single'' | $d_{cl}(G, H) = \min_{i \in G, j \in H} d_{ij}$ | 使用两个集合中所有观测值之间的最小距离
    |

    | linkage=''complete'' | $d_{cl}(G, H) = \max_{i \in G, j \in H} d_{ij}$ | 使用两个集合中所有观测值之间的最大距离
    |

    | linkage=''average'' | $d_{ga}(G, H) = \frac{1}{n_g n_h} \sum_{i \in G} \sum_{j
    \in H} d_{ij}$ | 使用两个集合中每个观测值距离的平均值 |


    属于 $H$ (Hastie et al., 2017)。使用 *AgglomerativeClustering()* 时，连接准则可以是单连接、完全连接、组平均或
    Ward 连接（表 4.1）。


    最后，Ward 连接准则（scikit-learn 中的默认选项）指出，两个簇 $G$ 和 $H$ 之间的距离是它们合并时平方和的增加量：


    $$\Delta(G, H) = \frac{|G| |H|}{|G| + |H|} \|\boldsymbol{m}_G + \boldsymbol{m}_H\|^2,
    \quad (4.5)$$


    其中 $\Delta$ 是合并簇 $G$ 和 $H$ 的“合并成本”。同时，$\boldsymbol{m}$、$|G|$ 和 $|H|$ 分别是簇的中心以及
    $G$ 和 $H$ 的基数。


    不相似度 $d_{ij}$ 可以通过使用不同的度量来估计。使用 *AgglomerativeClustering()* 方法时，它们可以是“欧几里得”或“曼哈顿”等。对于
    Ward 连接，唯一接受的度量是“欧几里得”[见公式 (4.5)]。


    ## 4.5 基于密度的带噪声应用空间聚类


    基于密度的带噪声应用空间聚类算法（DBSCAN）依赖于“一种旨在发现任意形状簇的基于密度的簇概念”（Ester et al., 1996）。从拓扑学角度看，如果在距离
    $\epsilon$ 内存在预定义的最小数量的其他样本（即核心样本的邻居），则 DBSCAN 将其识别为核心样本（Ester et al., 1996）。一个簇是一组核心样本及其邻居。任何既不是核心样本也不是邻居的样本（即它与任何核心样本的距离至少为
    $\epsilon$）被标记为异常值（Ester et al., 1996）。请注意，DBSCAN 不需要指定簇的数量。


    ## 4.6 均值漂移


    均值漂移算法是一种用于聚类分析的非参数技术（Comaniciu & Meer, 2002）；它估计所研究的 $d$ 维特征空间中的核密度（Derpanis,
    2005）。因此，核密度估计定义了一个经验概率密度函数，其中“密集区域”标识了底层分布的局部最大值（即众数）（Derpanis, 2005）。最后，均值漂移算法执行梯度上升（即，它搜索直到收敛于经验概率密度函数中的这些最大值）（Derpanis,
    2005）。详细来说，对于给定观测值 $\mathbf{x}_i$ 的均值漂移过程如下（Derpanis, 2005; Comaniciu & Meer,
    2002）：


    - 1. 计算步骤 $t$ 处的均值漂移向量 $\mathbf{m}(\mathbf{x}_i^t)$；

    - 2. 平移密度估计窗口：$\mathbf{x}_i^{t+1} = \mathbf{x}_i^t + m(\mathbf{x}_i^t)$；

    - 3. 重复步骤 1 和 2 直到收敛。


    均值漂移向量定义如下[Comaniciu and Meer (2002) 中的公式 (17)]：


    $$\mathbf{m}(\mathbf{x}_i) = \left[ \frac{\sum_{i=1}^n \mathbf{x}_i g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)}{\sum_{i=1}^n
    g\left(\left\|\frac{\mathbf{x}-\mathbf{x}_i}{h}\right\|^2\right)} - \mathbf{x}
    \right],$$


    其中函数 $g(x)$ 是所选核估计的导数，$h$（即带宽参数）定义了核的半径（Comaniciu & Meer, 2002）。


    在 scikit-learn 中，*MeanShift()* 方法使用平坦核执行均值漂移聚类。请注意，scikit-learn 中均值漂移算法的默认参数设置会自动确定簇的数量和最优的
    $h$（即带宽）。但是，可以通过使用 *bandwidth* 参数手动调整 $h$。


    ## 4.7 K-均值


    $K$-均值是一种聚类技术，旨在最小化同一簇中点之间的平均平方距离（Arthur & Vassilvitskii, 2007）。请注意，$K$-均值算法需要指定簇的数量。从数学上讲，$K$-均值算法可以表示如下：给定一个整数
    $k$ 和 $\mathbb{R}^d$ 中的 $n$ 个数据点的集合，目标是选择 $k$ 个中心，以最小化每个点与其最近中心之间的总平方距离（即惯性 $\phi$）（Arthur
    & Vassilvitskii, 2007）：


    $$\phi = \sum_{\mathbf{x} \in X} \min_{\mathbf{c} \in C} \|\mathbf{x} - \mathbf{c}\|^2.
    \tag{4.7}$$


    通常，$K$-均值实现（例如，在 scikit-learn 中）指的是 Lloyd (1982) 提出的解决方案。详细来说，Arthur 和 Vassilvitskii
    (2007) 提出的算法包括四个步骤：


    - 1. 任意选择初始 $k$ 个中心 $C = \{\mathbf{c}_1, \mathbf{c}_2, \dots, \mathbf{c}_k, \}$；

    - 2. 对于每个 $i \in \{1, \dots, k\}$，将簇 $Y_i$ 设置为 $X$ 中更接近 $\mathbf{c}_i$ 的点的集合；

    - 3. 通过平均分配给每个先前中心的所有样本来定义新的质心 $\mathbf{c}_i$；

    - 4. 重复步骤 2 和 3，直到 $C$ 不再显著变化。


    在 scikit-learn 中，方法 $KMeans()$ 实现了 $K$-均值聚类。此外，$MiniBatchKMeans()$ 通过使用小批量来节省计算时间，从而修改了
    $K$-均值算法。


    ## 4.8 谱聚类


    谱聚类（Von Luxburg, 2007）是一种将聚类与降维相结合的机器学习技术（Sugiyama, 2015）。详细来说，谱聚类使用核函数将样本转换到特征空间，然后应用保持局部性的投影来降低维度（见图
    4.1）。请注意，特征空间中的保持局部性投影等同于第 4.3.3 节中描述的拉普拉斯特征映射流形方法（Sugiyama, 2015）。在实践中，谱聚类执行样本之间相似性（或亲和性）矩阵的低维嵌入（Von
    Luxburg, 2007）。最后，谱聚类使用聚类方法（例如，$K$ 均值）来获得簇标签（Sugiyama, 2015; Von Luxburg, 2007）。


    在 scikit-learn 中，方法 $SpectralClustering()$ 应用谱聚类。请注意，$SpectralClustering()$ 需要预先指定簇的数量。


    ![](img/90d3084aebf7ededff86e49f84c52faa_79_0.png)


    ## 4.9 高斯混合模型


    高斯混合模型（GMM）试图将所研究数据集的底层概率密度函数重构为由有限数量的具有未知参数的高斯分布混合生成的（McLachlan & Peel, 2000）。


    为了理解 GMM 的工作原理，考虑一个 $d$ 维（即由 $d$ 个变量或特征表征）的独立同分布观测样本集 $X = \{\mathbf{x}_1, \mathbf{x}_2,
    \ldots, \mathbf{x}_n\}$（McLachlan & Peel, 2000）。有限混合模型（FMM）假设观测值 $\mathbf{x} \in
    X$ 源自一个由 $g$ 个分量混合描述的概率密度函数（McLachlan & Peel, 2000; Scrucca et al., 2016）：


    $$f(\mathbf{x}, \psi) = \sum_{i=1}^{g} \pi_i f_i(\mathbf{x}, \theta_i), \quad
    (4.8)$$


    其中 $g$ 和 $\psi = \{\pi_1, \ldots, \pi_{g-1}, \theta_1, \ldots, \theta_g\}$ 分别是混合分量的数量和模型的参数（Scrucca
    et al., 2016）。同时，$f_i(\mathbf{x}, \theta_i)$ 是样本观测值 $\mathbf{x}$ 的第 $i$ 个分量密度，并由向量
    $\theta_i$ 参数化。最后，$\{\pi_1, \ldots, \pi_{g-1}\}$ 是混合权重（Scrucca et al., 2016）。


    在许多应用中，分量密度 $f_i(\mathbf{x}, \theta_i)$ 被假定属于同一参数族（McLachlan & Peel, 2000）。在某些应用中，分量密度被取为不同的。有限高斯混合模型的实现假设
    $f_i(\mathbf{x}, \theta_i)$ 为多元正态分布，$G$ 固定，并包括估计模型参数 $\psi$（McLachlan & Peel,
    2000）。


    在 scikit-learn 中，方法 *GaussianMixture()* 和 *BayesianGaussianMixture()* 分别实现了基于期望最大化（EM）（Dempster
    et al., 1977）和变分贝叶斯推断（Hastie et al., 2017; Blei & Jordan, 2006）的有限高斯混合模型。变分贝叶斯推断类似于'

    \ 机器学习简介\n\n### 1.1 机器学习：定义与术语\n\nShai 和 Shai (2014) 将机器学习（ML）定义为“在数据中自动检测有意义的模式”。由于这是一个宽泛的定义，我将通过引用不同作者（例如，Samuel,\

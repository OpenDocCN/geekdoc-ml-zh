- md: "# Machine Learning for Earth Sciences\n\nUsing Python to Solve Geological Problems\n\
    \n# Springer Textbooks in Earth Sciences, Geography and Environment\n\nThe Springer\
    \ Textbooks series publishes a broad portfolio of textbooks on Earth Sciences,\
    \ Geography and Environmental Science. Springer textbooks provide comprehensive\
    \ introductions as well as in-depth knowledge for advanced studies. A clear, reader-friendly\
    \ layout and features such as end-of-chapter summaries, work examples, exercises,\
    \ and glossaries help the reader to access the subject. Springer textbooks are\
    \ essential for students, researchers and applied scientists.\n\nMaurizio Petrelli\n\
    \n# Machine Learning for Earth Sciences\n\nUsing Python to Solve Geological Problems\n\
    \nMaurizio Petrelli\nDepartment of Physics and Geology\nUniversity of Perugia\n\
    Perugia, Italy\n\nISSN 2510-1307\nISSN 2510-1315 (electronic)\nSpringer Textbooks\
    \ in Earth Sciences, Geography and Environment\nISBN 978-3-031-35113-6\nISBN 978-3-031-35114-3\
    \ (eBook)\nhttps://doi.org/10.1007/978-3-031-35114-3\n\nThis work was supported\
    \ by University of Perugia\n\n© The Editor(s) (if applicable) and The Author(s),\
    \ under exclusive license to Springer Nature Switzerland AG 2023\nThis work is\
    \ subject to copyright. All rights are solely and exclusively licensed by the\
    \ Publisher, whether the whole or part of the material is concerned, specifically\
    \ the rights of translation, reprinting, reuse of illustrations, recitation, broadcasting,\
    \ reproduction on microfilms or in any other physical way, and transmission or\
    \ information storage and retrieval, electronic adaptation, computer software,\
    \ or by similar or dissimilar methodology now known or hereafter developed.\n\
    The use of general descriptive names, registered names, trademarks, service marks,\
    \ etc. in this publication does not imply, even in the absence of a specific statement,\
    \ that such names are exempt from the relevant protective laws and regulations\
    \ and therefore free for general use.\nThe publisher, the authors, and the editors\
    \ are safe to assume that the advice and information in this book are believed\
    \ to be true and accurate at the date of publication. Neither the publisher nor\
    \ the authors or the editors give a warranty, expressed or implied, with respect\
    \ to the material contained herein or for any errors or omissions that may have\
    \ been made. The publisher remains neutral with regard to jurisdictional claims\
    \ in published maps and institutional affiliations.\n\nCover illustration: ipopba\
    \ / stock.adobe.com\n\nThis Springer imprint is published by the registered company\
    \ Springer Nature Switzerland AG\nThe registered company address is: Gewerbestrasse\
    \ 11, 6330 Cham, Switzerland\n\nPaper in this product is recyclable.\n\nTo my\
    \ family and friends\n\n# Preface\n\n*Machine Learning for the Earth Sciences*\
    \ provides Earth Scientists with a progressive partway from zero to machine learning,\
    \ with examples in Python aimed at the solution of geological problems. This book\
    \ is devoted to Earth Scientists, at any level, from students to academics and\
    \ professionals who would like to be introduced to machine learning. Basic knowledge\
    \ of Python programming is necessary to fully benefit from this book. If you are\
    \ a complete novice to Python, I suggest you start with Python introductory books\
    \ such as *Introduction to Python in Earth Science Data Analysis*.[^1] *Machine\
    \ Learning for the Earth Sciences* is divided into five parts and attempts to\
    \ be geologist-friendly. Machine learning mathematics is gently provided and technical\
    \ parts are limited to the essentials. Part I introduces the basics of machine\
    \ learning with a geologist-friendly language. It starts by introducing definitions,\
    \ terminology, and fundamental concepts (e.g., the types of learning paradigms).\
    \ It then shows how to set up a Python environment for machine learning applications\
    \ and finally describes the typical machine learning workflow. Parts II and III\
    \ are about unsupervised and supervised learning, respectively. They start by\
    \ describing some widely used algorithms and then provide examples of applications\
    \ to Earth Sciences such as the clustering and dimensionality reduction in petro-volcanological\
    \ applications, the clustering of multi-spectral data, classification of well-log\
    \ data facies, and machine learning regression in petrology. Part IV deals with\
    \ the scaling of machine learning models. When your PC starts suffering from the\
    \ dimension of the data set or the complexity of the model, you need scaling!\
    \ Finally, Part V introduces deep learning. It starts by describing the PyTorch\
    \ library and provides an example application for Earth Sciences. If you are working\
    \ in Earth Science and would like to start exploiting the power of machine learning\
    \ in your projects, this is the right place for you.\n\nAssisi, Italy\n28 July,\
    \ 2023\n\nMaurizio Petrelli\n\n[^1]: https://bit.ly/python-mp.\n\n# Acknowledgments\n\
    \nI would like to acknowledge all the people who encouraged me when I decided\
    \ to begin this new challenging adventure, arriving just after the satisfying\
    \ but extremely strenuous challenge that was the book *Introduction to Python\
    \ in Earth Science Data Analysis: From Descriptive Statistics to Machine Learning*.\
    \ First, I would like to thank my colleagues in the Department of Physics and\
    \ Geology at the University of Perugia. I would also like to thank the Erasmus\
    \ Plus (E+) program that supported my new foreign teaching excursions in Hungary,\
    \ Azores, and Germany. Namely, Professor Francois Holtz (Leibniz Universität Hannover),\
    \ José Manuel Pacheco (Universidade dos Açores), and Professor Szabolcs Harangi\
    \ (Eötvös University Budapest) are also kindly acknowledged for allowing me to\
    \ teach the “Introduction to Machine Learning” courses at their institutions.\
    \ In addition, I thank J. ZhangZhou (Zhejiang University) and Kunfeng Qiu (China\
    \ University of Geosciences) who invited me to give lectures and short courses\
    \ on topics related to the application of machine learning to Earth Sciences.\
    \ I would like to acknowledge the “Piano delle azioni collaborative e trasversali”\
    \ at the University of Perugia with emphasis on the working packages “3.1 - Disastri\
    \ e crisi complesse”, “4.1 - IA Data management e Data Science”, and “4.4 - Scienza\
    \ dell’Informazione e Calcolo ad alta prestazione.” Professor Giampiero Poli is\
    \ kindly acknowledged, thanks for being a great mentor during my early career.\
    \ Finally, I give my heartfelt thanks to my family, who, once more, put up with\
    \ me as I completed this book.\n\n# Overview\n\n# Let Me Introduce Myself\n\n\
    Hi and welcome, my name is Maurizio Petrelli and I currently work at the Department\
    \ of Physics and Geology, University of Perugia (UniPg) in Italy. My research\
    \ focuses on the petrological characterization of volcanoes with an emphasis on\
    \ the dynamics and timescales of pre-eruptive events. For this work, I combine\
    \ classical and unconventional techniques. Since 2002, I’ve worked intensely in\
    \ the laboratory, mainly focusing on the development of UniPg’s facility for Laser\
    \ Ablation Inductively Coupled Plasma Mass Spectrometry (LA-ICP-MS). In February\
    \ 2006, I obtained my Ph.D. degree with a thesis entitled “Nonlinear Dynamics\
    \ in Magma Interaction Processes and Their Implications on Magma Hybridization.”\
    \ In September 2021, I authored the book titled *Introduction to Python in Earth\
    \ Science Data Analysis: From Descriptive Statistics to Machine Learning* published\
    \ by Springer Nature. Since December 2021, I have been an Associate Professor\
    \ at the Department of Physics and Geology at UniPg, and I am now developing a\
    \ new line of research for applying machine learning techniques in Geology.\n\n\
    # Styling Conventions\n\nI use conventions throughout this book to identify different\
    \ types of information. For example, Python statements, commands, and variables\
    \ used within the main body of the text are set in italics. A block of Python\
    \ code is highlighted as follows:\n\n```\n1 import numpy as np\n2 \n3 def sum(a,b):\n\
    4     return a + b\n5 \n6 c = sum(3,4)\n```"
  mdcn: "# 面向地球科学的机器学习\n\n运用 Python 解决地质问题\n\n# Springer 地球科学、地理与环境教材系列\n\nSpringer\
    \ 教材系列出版了涵盖地球科学、地理与环境科学的广泛教材。Springer 教材既提供全面的入门介绍，也为深入学习提供详尽的知识。清晰、易读的版式设计，以及章末总结、实例讲解、练习题和术语表等特色内容，帮助读者更好地掌握学科知识。Springer\
    \ 教材是学生、研究人员和应用科学家的必备读物。\n\nMaurizio Petrelli\n\n# 面向地球科学的机器学习\n\n运用 Python 解决地质问题\n\
    \nMaurizio Petrelli\n物理与地质系\n佩鲁贾大学\n佩鲁贾，意大利\n\nISSN 2510-1307\nISSN 2510-1315（电子版）\n\
    Springer 地球科学、地理与环境教材系列\nISBN 978-3-031-35113-6\nISBN 978-3-031-35114-3（电子书）\n\
    https://doi.org/10.1007/978-3-031-35114-3\n\n本研究由佩鲁贾大学支持\n\n© 编者（如适用）及作者，经 Springer\
    \ Nature Switzerland AG 2023 独家许可\n本作品受版权保护。所有权利均由出版商独家许可，无论涉及材料的全部或部分，特别是翻译、转载、插图重用、朗诵、广播、以缩微胶片或任何其他物理方式复制，以及信息存储与检索、电子改编、计算机软件，或以目前已知或未来开发的类似或不同方法进行传输的权利。\n\
    本出版物中使用的一般性描述名称、注册名称、商标、服务标志等，即使没有具体声明，也不意味着这些名称不受相关保护性法律法规的约束，因此可以自由使用。\n出版商、作者和编辑有理由相信，本书中的建议和信息在出版之日是真实准确的。无论是出版商还是作者或编辑，均不对本文所含材料或可能存在的任何错误或遗漏提供任何明示或暗示的保证。出版商对已出版地图中的管辖权主张和机构隶属关系保持中立。\n\
    \n封面插图：ipopba / stock.adobe.com\n\n本 Springer 印刷品由注册公司 Springer Nature Switzerland\
    \ AG 出版\n注册公司地址为：Gewerbestrasse 11, 6330 Cham, Switzerland\n\n本产品中的纸张可回收利用。\n\n\
    献给我的家人和朋友\n\n# 前言\n\n*面向地球科学的机器学习* 为地球科学家提供了一条从零开始逐步学习机器学习的路径，并包含运用 Python 解决地质问题的示例。本书面向所有层次的地球科学家，从学生到希望了解机器学习的学者和专业人士。要充分利用本书，需要具备\
    \ Python 编程的基础知识。如果您是 Python 的完全新手，我建议您从 Python 入门书籍开始，例如 *《地球科学数据分析中的 Python\
    \ 入门》*。[^1] *面向地球科学的机器学习* 分为五个部分，并力求对地质学家友好。机器学习的数学知识以温和的方式提供，技术部分仅限于核心内容。第一部分以对地质学家友好的语言介绍机器学习的基础知识。它首先介绍定义、术语和基本概念（例如，学习范式的类型）。然后展示如何为机器学习应用设置\
    \ Python 环境，最后描述典型的机器学习工作流程。第二部分和第三部分分别关于无监督学习和监督学习。它们首先描述一些广泛使用的算法，然后提供应用于地球科学的示例，例如岩石火山学应用中的聚类和降维、多光谱数据聚类、测井数据相分类以及岩石学中的机器学习回归。第四部分涉及机器学习模型的扩展。当您的个人电脑开始因数据集的规模或模型的复杂性而吃力时，您就需要扩展了！最后，第五部分介绍深度学习。它首先描述\
    \ PyTorch 库，并提供一个地球科学的应用示例。如果您从事地球科学工作，并希望开始在项目中利用机器学习的力量，那么这里正是适合您的地方。\n\n阿西西，意大利\n\
    2023年7月28日\n\nMaurizio Petrelli\n\n[^1]: https://bit.ly/python-mp.\n\n# 致谢\n\n\
    我想感谢所有在我决定开始这项新的、充满挑战的冒险时鼓励我的人，这项冒险紧随那本令人满意但极其艰苦的挑战——*《地球科学数据分析中的 Python 入门：从描述性统计到机器学习》*\
    \ 之后。首先，我要感谢佩鲁贾大学物理与地质系的同事们。我还要感谢 Erasmus Plus (E+) 项目，它支持了我在匈牙利、亚速尔群岛和德国的新海外教学之旅。特别感谢\
    \ Francois Holtz 教授（汉诺威莱布尼茨大学）、José Manuel Pacheco（亚速尔大学）和 Szabolcs Harangi 教授（布达佩斯厄特沃什大学），感谢他们允许我在他们的机构教授“机器学习入门”课程。此外，我感谢张周（浙江大学）和邱坤峰（中国地质大学），他们邀请我就机器学习在地球科学中的应用相关主题进行讲座和短期课程。我想感谢佩鲁贾大学的“合作与横向行动计划”，特别强调“3.1\
    \ - 灾害与复杂危机”、“4.1 - 人工智能数据管理与数据科学”和“4.4 - 信息科学与高性能计算”等工作包。特别感谢 Giampiero Poli\
    \ 教授，感谢他在我职业生涯早期成为一位伟大的导师。最后，我衷心感谢我的家人，他们再次容忍我完成了这本书。\n\n# 概述\n\n# 请允许我自我介绍\n\n\
    大家好，欢迎阅读，我叫 Maurizio Petrelli，目前在意大利佩鲁贾大学（UniPg）物理与地质系工作。我的研究重点是火山的岩石学特征，特别关注喷发前事件的动力学和时间尺度。为此，我结合了经典和非常规的技术。自\
    \ 2002 年以来，我一直在实验室进行深入工作，主要专注于发展 UniPg 的激光剥蚀电感耦合等离子体质谱（LA-ICP-MS）设施。2006 年 2 月，我获得了博士学位，论文题为“岩浆相互作用过程中的非动力学及其对岩浆混合作用的启示”。2021\
    \ 年 9 月，我撰写了由 Springer Nature 出版的 *《地球科学数据分析中的 Python 入门：从描述性统计到机器学习》* 一书。自 2021\
    \ 年 12 月起，我担任 UniPg 物理与地质系的副教授，目前正在开发一条新的研究方向，将机器学习技术应用于地质学。\n\n# 排版约定\n\n我在全书中使用特定的约定来标识不同类型的信息。例如，正文主体中使用的\
    \ Python 语句、命令和变量以斜体表示。Python 代码块高亮显示如下：\n\n```\n1 import numpy as np\n2 \n3 def\
    \ sum(a,b):\n4     return a + b\n5 \n6 c = sum(3,4)\n```"

    # 11.2 Scaling in the Cloud: The Hard Way


    The “hard way” of scaling consists of managing all configurations and taking all
    the technical steps in either Amazon Web Services (AWS), the Google Compute Engine,
    Microsoft Azure, or other providers.


    Scaling up is quite easy with cloud providers. It consists simply of selecting
    larger or smaller instances to scale up and down, respectively (Fig. 11.2). Also,
    some providers offer specific services for auto-scaling; for example, Amazon claims
    that “AWS Auto Scaling monitors your applications and automatically adjusts capacity'

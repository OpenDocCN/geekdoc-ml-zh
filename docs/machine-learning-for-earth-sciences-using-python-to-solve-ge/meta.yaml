    \ attempt a simplified solution, I trained the U-Net CNN (Ronneberger et al.,\
    \ 2015) using PyTorch.\n\n## Data Set and Pre-processing\n\nAs a starting point,\
    \ I downloaded the aerial image labeling data set (Maggiori et al., 2017), which\
    \ consists of 360 orthorectified RGB (Red, Green, Blue) images linked to official\
    \ cadastral records (Maggiori et al., 2017). The entire data set covers several\
    \ areas, such as Austin (USA), Chicago (USA), Vienna (Austria), East and West\
    \ Tyrol (Austria), San Francisco (USA), and Innsbruck (Austria). The lateral resolution\
    \ is 0.3 m, and each tile is 5000 × 5000 pixels (Maggiori et al., 2017). For 180\
    \ tiles, a mask containing two semantic classes, building and non-building, is\
    \ also provided (Maggiori et al., 2017). For the case study provided herein, I\
    \ selected 10 tiles from Austin. For each tile, I also collected the associated\

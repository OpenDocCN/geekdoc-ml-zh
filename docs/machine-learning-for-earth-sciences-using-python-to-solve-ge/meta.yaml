    # 3.3.4 Data Augmentation


    Data augmentation aims to increase the generalizability of ML models by increasing
    the amount of information in our data sets (Maharana et al., 2022), which consists
    of either adding modified copies of the available data (e.g., flipped or rotated
    images in the case of image classification) or combining existing features to
    generate new features. For example, Maharana et al. (2022) describe six data augmentation
    techniques for image analysis: (1) symbolic augmentation, (2) rule-based augmentation,
    (3) graph-structured augmentation, (4) mixup augmentation, (5) feature-space augmentation,
    and (6) neural augmentation (Maharana et al., 2022). Although the details of feature
    augmentation are far beyond the scope of this book, we will exploit data augmentation
    in Chap. 8 by following the strategy proposed by Bestagini et al. (2017).


    # 3.3.5 Data Scaling and Transformation


    The scaling and transformation of a data set is often a crucial step in ML workflows.
    Many ML algorithms strongly benefit from a preliminary “standardization” of the
    investigated data set. For example, all algorithms that use the Euclidean distance
    (and there are many of them!) as fundamental metrics may be significantly biased
    upon introducing features that differ significantly in magnitude.


    **Definition** In a standardized data set, all features are centered on zero and
    their variance is of the same order of magnitude.


    If a feature variance is orders of magnitude greater than the other feature variances,
    it might play a dominant role and prevent the algorithm from correctly learning
    the other features. The easiest way to standardize a data set is to subtract the
    mean and scale to unit variance:


    $$\tilde{x}_e^i = \frac{x_e^i - \mu^e}{\sigma_s^e}$$


    In Eq. (3.1), $\tilde{x}_e^i$ and $x_e^i$ are the transformed and original components,
    respectively. For example, they could belong to the sample distribution of a chemical
    element $e$ such as $\text{SiO}_2$ or $\text{TiO}_2$ characterized by a mean $\mu^e$
    and a standard deviation $\sigma_s^e$.


    Scikit-learn implements Eq. (3.1) in the `sklearn.preprocessing.StandardScaler()`
    method.


    In addition, scikit-learn implements additional scalers and transformers, which
    perform linear and nonlinear transformations, respectively. For example, `MinMaxScaler()`
    scales each feature belonging to a data set to a given range (e.g., between 0
    and 1).'

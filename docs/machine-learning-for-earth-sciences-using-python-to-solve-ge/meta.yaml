- md: "## 8 Classification of Well Log Data Facies by Machine Learning\n\nFigure 8.1\
    \ shows that the wells are distributed in three main clusters. As geologists,\
    \ we would expect wells that are close together to have similar distributions\
    \ of lithofacies. Therefore, well position could significantly impact the training\
    \ of our ML model. Many strategies are available to include the spatial distribution\
    \ of wells in a ML model; including X_LOC and Y_LOC as model features is the easiest\
    \ strategy. More refined strategies may include a preliminary clustering of the\
    \ spatial distribution of wells and a learning approach based on the result of\
    \ the clustering. To develop a smart and simple workflow, we select the first\
    \ option (i.e., simply including X_LOC and Y_LOC as model features).\n\nFigure\
    \ 8.2 shows the results of code listing 8.2, which reveal two main characteristics\
    \ of the investigated data sets. The first characteristic relates to feature persistence.\
    \ Many features such as Spectral Gamma Ray (SGR), Shear wave sonic log (DTS),\
    \ Micro Resistivity measurement (RMIC), and Average Rate of Penetration (ROPA)\
    \ contain more than 60% missing values (see the upper panel of Fig. 8.2). Consequently,\
    \ a strategy to deal with missing values is mandatory. Given our desire to maintain\
    \ the simplicity of the ML workflow presented in the present chapter, only features\
    \ containing less than 40% missing values are used. In addition, all missing values\
    \ are replaced with the average of each feature. In statistics, the procedure\
    \ of substituting missing values with other values is called “feature imputation”\
    \ (Zou et al., 2015). In scikit-learn, *SimpleImputer()* and *IterativeImputer()*\
    \ are useful for feature imputation (cf. Sect. 3.3.2).\n\nFig. 8.2 Result of code\
    \ listing 8.2. Inspect feature persistence and class balancing\n\n```python\n\
    import pandas as pd\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nlithology_keys\
    \ = {30000: 'Sandstone',\n                  65030: 'Sandstone/Shale',\n      \
    \            65000: 'Shale',\n                  80000: 'Marl',\n             \
    \     74000: 'Dolomite',\n                  70000: 'Limestone',\n            \
    \      70032: 'Chalk',\n                  88000: 'Halite',\n                 \
    \ 86000: 'Anhydrite',\n                  99000: 'Tuff',\n                  90000:\
    \ 'Coal',\n                  93000: 'Basement'}\n\ntrain_data = pd.read_csv('train.csv',\
    \ sep=';')\n\nclass_abundance = np.vectorize(lithology_keys.get)(\n    train_data['FORCE_2020_LITHOFACIES_LITHOLOGY'].values)\n\
    unique, counts = np.unique(class_abundance, return_counts=True)\n\nmy_colors =\
    \ ['#0F7F8B'] * len(unique)\nmy_colors[np.argmax(counts)] = '#C82127'\nmy_colors[np.argmin(counts)]\
    \ = '#0A3A54'\n\nfig, (ax1, ax2) = plt.subplots(2,1, figsize=(7,14))\n\nax2.barh(unique,counts,\
    \ color=my_colors)\nax2.set_xscale(\"log\")\nax2.set_xlim(1e1,1e6)\nax2.set_xlabel('Number\
    \ of Occurrences')\nax2.set_title('Class Inspection')\n\nFeature_presence = train_data.isna().sum()/train_data.shape[0]*100\n\
    \nFeature_presence = Feature_presence.drop(\n    labels=['FORCE_2020_LITHOFACIES_LITHOLOGY',\n\
    \           'FORCE_2020_LITHOFACIES_CONFIDENCE', 'WELL'])\n\nFeature_presence.sort_values().plot.barh(color='#0F7F8B',ax=ax1)\n\
    ax1.axvline(40, color='#C82127', linestyle='--')\nax1.set_xlabel('Percentage of\
    \ Missing Values')\nax1.set_title('Feature Inspection')\n\nplt.tight_layout()\n\
    ```\n\n**Listing 8.2** Inspect feature persistence and class balancing\n\nThe\
    \ second key characteristic of the investigated data set appears clearly upon\
    \ observing the class distribution (see lower panel of Fig. 8.2): the training\
    \ data set is highly imbalanced, with some classes exceeding 10^5 occurrences\
    \ and others such as Anhydrite and Basement occurring only 10^3 or 10^2 times,\
    \ respectively. A strategy to account for the imbalance of training data set is\
    \ thus also mandatory.\n\nSome ML algorithms, such as those discussed in the present\
    \ chapter, try to account for imbalance in their training data set by tuning their\
    \ hyperparameters. More refined strategies may involve (1) under-sampling majority\
    \ classes, (2) over-sampling minority classes, (3) combining over- and under-sampling\
    \ methods, and (4) creating ensemble balanced sets (Lemaître et al., 2017).\n\n\
    ```python\nimport numpy as np\n\nfig = plt.figure(figsize=(8,4))\n\ntrain_data['log_RDEP']\
    \ = np.log10(train_data['RDEP'])\n\nto_be_plotted = ['RDEP', 'log_RDEP']\n\nfor\
    \ index, my_feature in enumerate(to_be_plotted):\n    ax = fig.add_subplot(1,2,index+1)\n\
    \    min_val = np.nanpercentile(train_data[my_feature],1)\n    max_val = np.nanpercentile(train_data[my_feature],99)\n\
    \    my_bins = np.linspace(min_val,max_val,30)\n    ax.hist(train_data[my_feature],\
    \ bins=my_bins,\n            density = True,  color='#BFD7EA',\n            edgecolor='k')\n\
    \    ax.set_ylabel('Probability Density')\n    ax.set_xlabel(my_feature)\n\nplt.tight_layout()\n\
    ```\n\n**Listing 8.3** Log-transformation of selected features\n\nThe histogram\
    \ distribution of some features (code listing 8.3 and Fig. 8.3) shows that they\
    \ are highly skewed, which could be a problem for some ML algorithms (e.g., those\
    \ assuming a normal distribution for the investigated features). Consequently,\
    \ we apply a log-transformation to selected features to reduce the skewness (see\
    \ Fig. 8.3, right panel).\n\n**Fig. 8.3** Result of code listing 8.3. Log-transformation\
    \ of selected features\n\nAs discussed in Chap. 3.3, the goal of data augmentation\
    \ is to improve the generalizability of ML models by increasing the amount of\
    \ information in their data sets. This approach consists of adding modified copies\
    \ (e.g., flipper or rotated images in the case of image classification) of the\
    \ available data or combining the existing features to generate new features.\
    \ For example, Bestagini et al. (2017) suggest three approaches for data augmentation:\
    \ quadratically expanding the feature vector, considering second-order interaction\
    \ terms, and defining an augmented gradient feature vector. In an attempt to partially\
    \ mimic the data augmentation strategy proposed by Bestagini et al. (2017), we\
    \ report a code listing to calculate the augmented gradient feature vector (code\
    \ listing 8.4).\n\n```python\ndef calculate_delta(dataFrame):\n    delta_features\
    \ = ['CALI', 'log_RMED', 'log_RDEP', 'RHOB', 'DTC', 'DRHO', 'log_GR', 'NPHI',\
    \ 'log_PEF', 'SP']\n    wells = dataFrame['WELL'].unique()\n    for my_feature\
    \ in delta_features:\n        values = []\n        for well in wells:\n      \
    \      col_values = dataFrame[dataFrame['WELL'] == well][my_feature].values\n\
    \            col_values_ = np.array([col_values[0]]+list(col_values[:-1]))\n \
    \           delta_col_values = col_values-col_values_\n            values = values\
    \ + list(delta_col_values)\n        dataFrame['Delta_' + my_feature] = values\n\
    \    return dataFrame\n```\n\n**Listing 8.4** Function to calculate the augmented\
    \ gradient feature vector\n\nTo summarize, our pre-processing strategy starts\
    \ with (i) selecting the features characterized by fewer than 40% missing values,\
    \ (ii) replacing missing values with the average of each feature within each data\
    \ set, (iii) applying a log-transformation of the features with highly skewed\
    \ distributions, and (iv) augmenting the data. Steps (i)–(iv) are implemented\
    \ in a series of functions (see code listing 8.5) and are combined in a pandas\
    \ pipe() chain to automate pre-processing (code listing 8.6). Also, the pre_processing_pipeline()\
    \ function (code listing 8.6) stores the imported .csv files in a single HDF5\
    \ file (hierarchical data format version 5). As introduced in Sect. 3.3, HDF5\
    \ is a high-performance library to manage, process, and store heterogeneous data.\
    \ All data sets of interest are stored in HDF5 files as pandas DataFrames, ready\
    \ for fast reading and writing. At lines 3–6, the function checks that the output\
    \ file exists. If so, the function removes the existing file. At line 16, the\
    \ function appends each processed data set to a newly created file."
  mdcn: "## 8 通过机器学习进行测井数据相分类\n\n图8.1显示，井位主要分布在三个集群中。作为地质学家，我们预期距离较近的井应具有相似的岩相分布。因此，井位可能显著影响我们机器学习模型的训练。有多种策略可将井的空间分布纳入机器学习模型；其中最简单的策略是将X_LOC和Y_LOC作为模型特征。更精细的策略可能包括对井的空间分布进行初步聚类，并基于聚类结果采用学习方法。为开发一个智能且简单的工作流程，我们选择了第一种方案（即直接将X_LOC和Y_LOC作为模型特征）。\n\
    \n图8.2展示了代码清单8.2的结果，揭示了所研究数据集的两个主要特征。第一个特征与特征持续性相关。许多特征，如自然伽马能谱（SGR）、横波声波测井（DTS）、微电阻率测量（RMIC）和平均机械钻速（ROPA），包含超过60%的缺失值（见图8.2上图）。因此，处理缺失值的策略是必需的。鉴于我们希望保持本章所介绍的机器学习工作流程的简单性，仅使用缺失值少于40%的特征。此外，所有缺失值均用各特征的平均值替代。在统计学中，用其他值替代缺失值的过程称为“特征插补”（Zou等人，2015）。在scikit-learn中，*SimpleImputer()*和*IterativeImputer()*可用于特征插补（参见第3.3.2节）。\n\
    \n图8.2 代码清单8.2的结果。检查特征持续性和类别平衡\n\n```python\nimport pandas as pd\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\nlithology_keys = {30000: 'Sandstone',\n\
    \                  65030: 'Sandstone/Shale',\n                  65000: 'Shale',\n\
    \                  80000: 'Marl',\n                  74000: 'Dolomite',\n    \
    \              70000: 'Limestone',\n                  70032: 'Chalk',\n      \
    \            88000: 'Halite',\n                  86000: 'Anhydrite',\n       \
    \           99000: 'Tuff',\n                  90000: 'Coal',\n               \
    \   93000: 'Basement'}\n\ntrain_data = pd.read_csv('train.csv', sep=';')\n\nclass_abundance\
    \ = np.vectorize(lithology_keys.get)(\n    train_data['FORCE_2020_LITHOFACIES_LITHOLOGY'].values)\n\
    unique, counts = np.unique(class_abundance, return_counts=True)\n\nmy_colors =\
    \ ['#0F7F8B'] * len(unique)\nmy_colors[np.argmax(counts)] = '#C82127'\nmy_colors[np.argmin(counts)]\
    \ = '#0A3A54'\n\nfig, (ax1, ax2) = plt.subplots(2,1, figsize=(7,14))\n\nax2.barh(unique,counts,\
    \ color=my_colors)\nax2.set_xscale(\"log\")\nax2.set_xlim(1e1,1e6)\nax2.set_xlabel('Number\
    \ of Occurrences')\nax2.set_title('Class Inspection')\n\nFeature_presence = train_data.isna().sum()/train_data.shape[0]*100\n\
    \nFeature_presence = Feature_presence.drop(\n    labels=['FORCE_2020_LITHOFACIES_LITHOLOGY',\n\
    \           'FORCE_2020_LITHOFACIES_CONFIDENCE', 'WELL'])\n\nFeature_presence.sort_values().plot.barh(color='#0F7F8B',ax=ax1)\n\
    ax1.axvline(40, color='#C82127', linestyle='--')\nax1.set_xlabel('Percentage of\
    \ Missing Values')\nax1.set_title('Feature Inspection')\n\nplt.tight_layout()\n\
    ```\n\n**清单8.2** 检查特征持续性和类别平衡\n\n所研究数据集的第二个关键特征在观察类别分布时清晰显现（见图8.2下图）：训练数据集高度不平衡，部分类别出现次数超过10^5次，而其他类别如硬石膏和基底岩仅出现10^3或10^2次。因此，处理训练数据集不平衡的策略也是必需的。\n\
    \n一些机器学习算法，如本章讨论的算法，试图通过调整其超参数来应对训练数据集的不平衡。更精细的策略可能涉及：（1）对多数类进行欠采样，（2）对少数类进行过采样，（3）结合过采样和欠采样方法，以及（4）创建集成平衡集（Lemaître等人，2017）。\n\
    \n```python\nimport numpy as np\n\nfig = plt.figure(figsize=(8,4))\n\ntrain_data['log_RDEP']\
    \ = np.log10(train_data['RDEP'])\n\nto_be_plotted = ['RDEP', 'log_RDEP']\n\nfor\
    \ index, my_feature in enumerate(to_be_plotted):\n    ax = fig.add_subplot(1,2,index+1)\n\
    \    min_val = np.nanpercentile(train_data[my_feature],1)\n    max_val = np.nanpercentile(train_data[my_feature],99)\n\
    \    my_bins = np.linspace(min_val,max_val,30)\n    ax.hist(train_data[my_feature],\
    \ bins=my_bins,\n            density = True,  color='#BFD7EA',\n            edgecolor='k')\n\
    \    ax.set_ylabel('Probability Density')\n    ax.set_xlabel(my_feature)\n\nplt.tight_layout()\n\
    ```\n\n**清单8.3** 所选特征的对数变换\n\n某些特征的直方图分布（代码清单8.3和图8.3）显示它们高度偏斜，这对于某些机器学习算法（例如，假设所研究特征服从正态分布的算法）可能是一个问题。因此，我们对选定的特征应用对数变换以减少偏斜度（见图8.3右图）。\n\
    \n**图8.3** 代码清单8.3的结果。所选特征的对数变换\n\n如第3.3章所讨论，数据增强的目标是通过增加数据集中的信息量来提高机器学习模型的泛化能力。这种方法包括添加可用数据的修改副本（例如，在图像分类中翻转或旋转图像）或组合现有特征以生成新特征。例如，Bestagini等人（2017）提出了三种数据增强方法：二次扩展特征向量、考虑二阶交互项以及定义增强梯度特征向量。为了部分模仿Bestagini等人（2017）提出的数据增强策略，我们提供了一个计算增强梯度特征向量的代码清单（代码清单8.4）。\n\
    \n```python\ndef calculate_delta(dataFrame):\n    delta_features = ['CALI', 'log_RMED',\
    \ 'log_RDEP', 'RHOB', 'DTC', 'DRHO', 'log_GR', 'NPHI', 'log_PEF', 'SP']\n    wells\
    \ = dataFrame['WELL'].unique()\n    for my_feature in delta_features:\n      \
    \  values = []\n        for well in wells:\n            col_values = dataFrame[dataFrame['WELL']\
    \ == well][my_feature].values\n            col_values_ = np.array([col_values[0]]+list(col_values[:-1]))\n\
    \            delta_col_values = col_values-col_values_\n            values = values\
    \ + list(delta_col_values)\n        dataFrame['Delta_' + my_feature] = values\n\
    \    return dataFrame\n```\n\n**清单8.4** 计算增强梯度特征向量的函数\n\n总结来说，我们的预处理策略始于：（i）选择缺失值少于40%的特征，（ii）用每个数据集中各特征的平均值替换缺失值，（iii）对高度偏斜分布的特征应用对数变换，以及（iv）增强数据。步骤（i）至（iv）在一系列函数中实现（见代码清单8.5），并组合在pandas的pipe()链中以自动化预处理（代码清单8.6）。此外，pre_processing_pipeline()函数（代码清单8.6）将导入的.csv文件存储在单个HDF5文件（分层数据格式第5版）中。如第3.3节所述，HDF5是一个用于管理、处理和存储异构数据的高性能库。所有相关数据集都以pandas\
    \ DataFrame的形式存储在HDF5文件中，便于快速读写。在第3-6行，函数检查输出文件是否存在。如果存在，函数会删除现有文件。在第16行，函数将每个处理后的数据集追加到新创建的文件中。"

    # 1.4 Unsupervised Learning


    Unsupervised learning acts on unlabeled training data. In other words, the ML
    algorithm tries to identify significant patterns from the investigated data set
    without the benefit of being fed external solutions. Fields that apply unsupervised
    learning'

    # 3.3.6 Compositional Data Analysis (CoDA)


    Before applying any statistical method, including ML algorithms, the underlying
    assumptions must be verified. An example is the assumption of normality, which
    is behind many methods. Other assumptions may regard the topology of the sample
    space. Geochemical determinations are an example of so-called compositional data
    (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023), which are samples
    of non-negative multivariate data that are expressed relative to a fixed total
    (typically unity or percentages summing to 100%). The analysis of compositional
    data is called “compositional data analysis” (CoDA; Aitchison, 1984).


    In compositional data, the sample space is represented by the Aitchison simplex
    $s^D$:


    $$s^D = \left\{ \mathbf{x} = [x_1, x_2, x_i, \dots, x_D] \mid x_i > 0, \; i =
    1, 2, \dots, D; \; \sum_{i=1}^D x_i = C \right\},$$


    where $C$ is a constant, typically 1 or 100. Compositional data typically share
    two characteristics: (1) the data are always positive and (2) the data sum to
    a constant (i.e., they are not independent). These characteristics hinder the
    application of many statistical methods because they often assume independent
    input samples in the interval $[-\infty, \infty]$. From the topological point
    of view, the simplex (i.e., the sample space for compositional vectors) differs
    radically from the Euclidean space associated with unconstrained data (Aitchison,
    1982; Aitchison & Egozcue, 2005; Razum et al., 2023). Therefore, any method relying
    on the Euclidean distance should not be used directly with compositional data.
    Four established transformations are available that attempt to map the Aitchison
    simplex to Euclidean space.


    **Pairwise Log Ratio Transformation (*pwlr*)** (Aitchison, 1982; Aitchison & Egozcue,
    2005; Razum et al., 2023) The *pwlr* transformation maps a composition isometrically
    from a $D$-dimensional Aitchison simplex to a $D(D-1)/2$-dimensional space. In
    detail, it computes each possible log ratio but accounts for the fact that $\log(A/B)
    = -\log(B/A)$, so only one of them is needed. On data transformed by the pairwise
    log ratio, we can apply multivariate methods that do not rely on the invertibility
    of the covariance function. The interpretation of *pwlr*-transformed data is quite
    simple because each component results from a simple operation of division and
    is then transformed by a logarithm to reduce the skew of the resulting features.


    The *pwlr* transformation is given by


    $$pwlr(\mathbf{x}) = [\xi_{ij} \mid i < j = 1, 2, \dots, D],$$


    where $\xi_{ij} = \ln(x_i/x_j)$. Note that the redundancy of *pwlr* generates
    $D(D-1)/2$ features, which corresponds to an extremely-high-dimensional space.'
  - '[PAGE 53]


    Additive Log Ratio Transformation (alr) (Aitchison, 1982; Aitchison & Egozcue,
    2005; Razum et al., 2023) The alr transformation is given by


    $$alr(\mathbf{x}) = \left[ \ln \frac{x_1}{x_D}, \ln \frac{x_2}{x_D}, \dots, \ln
    \frac{x_{D-1}}{x_D} \right].$$


    The alr transformation nonisometrically maps vectors from the D-dimensional Aitchison
    simplex to a (D-1)-dimensional space.


    As in the case of pwlr, the interpretation of alr data is quite simple because
    they also derive from a simple operation of division followed by a logarithm to
    reduce the skew of the resulting features.


    Centered Log Ratio Transformation (clr) This transformation is given by


    $$clr(\mathbf{x}) = \left[ \ln \frac{x_1}{g(\mathbf{x})}, \ln \frac{x_2}{g(\mathbf{x})},
    \dots, \ln \frac{x_D}{g(\mathbf{x})} \right],$$


    where $g_m(\mathbf{x})$ is the geometric mean of the parts of $\mathbf{x}$. The
    clr transformation isometrically maps the vectors from the D-dimensional Aitchison
    simplex to a D-dimensional Euclidean space. The clr-transformed data can then
    be analyzed by all multivariate tools that do not rely on a full rank of the covariance
    (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023).


    Orthonormal Log Ratio Transformation (olr) This transformation is also known as
    the isometric log ratio transformation (ilr). The olr coordinates of $\mathbf{x}$
    with respect to the basis elements $\mathbf{e}_l$, $l = 1, 2, \dots, n-1$, are
    defined as (Egozcue & Pawlowsky-Glahn, 2005)


    $$x_l^* = \sqrt{\frac{rs}{r+s}} \ln \left[ \frac{g(x_{k+1}, \dots, x_{k+r})}{g(x_{k+r+1},
    \dots, x_{k+r+s})} \right],$$


    where $x_l^*$ is the balance between the groups of parts $x_{k+1}, \dots, x_{k+r}$
    and $g(x_{k+r+1}, \dots, x_{k+r+s})$ and $\mathbf{e}_l$ is the balancing element
    for the two sets of parts (Egozcue & Pawlowsky-Glahn, 2005).


    Note that “with defined balances, which are directly associated with an orthogonal
    coordinate system in the simplex, every multivariate statistical technique is
    available without any restriction and data can be properly statistically evaluated”
    (Razum et al., 2023). Each of the above-mentioned transformations is endowed with
    unique properties that can be used for compositional data analysis. The clr transformation
    is often used to construct compositional biplots and for cluster analysis (van
    den Boogaart & Tolosana-Delgado, 2013). Although alr-transformed data can be analyzed
    by using multivariate statistical tools, the alr transformation defines “coordinates
    in an oblique basis, something that affects distances if the usual Euclidean distance
    is computed from the alr coordinate” (van den Boogaart & Tolosana-Delgado, 2013).
    Consequently, the alr transformation “should not be'
- md: "used in cases in which distances, angles, and shapes are involved, as it deforms\
    \ them” (Pawlowsky-Glahn & Buccianti, 2011). Any multivariate technique can be\
    \ applied safely to *ilr*-transformed data because it is related to the orthonormal\
    \ basis of the simplex (Razum et al., 2023).\nIn Python, both scikit-bio<sup>7</sup>\
    \ and pyrolite<sup>8</sup> provide us with methods in the framework of CoDA.\n\
    \n## 3.3.7 A Working Example of Data Pre-processing\n\nThe code listings 3.9 and\

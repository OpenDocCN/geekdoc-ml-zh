    # ### 3.5.5 Overfitting and Underfitting


    Over- and under-fitting should definitively be avoided when training a ML model.
    Over-fitting is when the trained models work suspiciously well in fitting the
    training set, whereas the performance with real-world data is poor (Shai & Shai,
    2014). In other words, over-fitting occurs “when our hypothesis fits the training
    data *too well* (Shai & Shai, 2014).” Conversely, when our hypothesis is too simplistic
    (e.g., we try training a linear model to fit a nonlinear pattern; see Fig. 3.10)
    we have under-fitting, meaning a large approximation error (Shai & Shai, 2014).


    ¹⁰ https://scikit-learn.org/stable/modules/model_evaluation.html.'

    \ of 1000 × 1000 pixels each by using a 5 × 5 grid (the same operation was done\
    \ for each mask). The resulting data set consisted of 245 images and 245 masks.\
    \ I then split the data set into two parts for use in training (220) and validation\
    \ (25).\n\n## The U-Net Architecture\n\nThe U-Net is a “fully convolutional network”\
    \ (Long et al., 2015). The main concept behind fully convolutional networks is\
    \ to take an input of arbitrary size and produce a correspondingly sized output\
    \ with efficient inference and learning (Long et al., 2015).\n\nFigure 12.10 shows\
    \ the U-Net architecture. It consists of a contracting network (left side) followed\
    \ by an expansive path (right side; Ronneberger et al., 2015). The contracting\
    \ path applies a sequence of two 3 × 3 convolutions, each followed by a ReLU and\
    \ 2 × 2 max pooling (Ronneberger et al., 2015). Next, in the expansive path, the\
    \ U-net architecture upsamples the feature map, followed by a 2 × 2 convolution\

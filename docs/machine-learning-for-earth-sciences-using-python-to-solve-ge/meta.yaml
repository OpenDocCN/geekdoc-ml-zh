  md: 'As discussed in Chap. 3.3, the goal of data augmentation is to improve the
    generalizability of ML models by increasing the amount of information in their
    data sets. This approach consists of adding modified copies (e.g., flipper or
    rotated images in the case of image classification) of the available data or combining
    the existing features to generate new features. For example, Bestagini et al.
    (2017) suggest three approaches for data augmentation: quadratically expanding
    the feature vector, considering second-order interaction terms, and defining an
    augmented gradient feature vector. In an attempt to partially mimic the data augmentation
    strategy proposed by Bestagini et al. (2017), we report a code listing to calculate
    the augmented gradient feature vector (code listing 8.4).


    ```

    1 def calculate_delta(dataFrame):

    2     delta_features = [''CALI'', ''log_RMED'', ''log_RDEP'', ''RHOB'', ''DTC'',
    ''DRHO'', ''log_GR'', ''NPHI'', ''log_PEF'', ''SP'']

    3     wells = dataFrame[''WELL''].unique()

    4     for my_feature in delta_features:

    5         values = []

    6         for well in wells:

    7             col_values = dataFrame[dataFrame[''WELL''] == well][my_feature].values

    8             col_values_ = np.array([col_values[0]]+list(col_values[:-1]))

    9             delta_col_values = col_values-col_values_

    10            values = values + list(delta_col_values)

    11        dataFrame[''Delta_'' + my_feature] = values

    12    return dataFrame

    ```


    Listing 8.4 Function to calculate the augmented gradient feature vector


    To summarize, our pre-processing strategy starts with (i) selecting the features
    characterized by fewer than 40% missing values, (ii) replacing missing values
    with the average of each feature within each data set, (iii) applying a log-transformation
    of the features with highly skewed distributions, and (iv) augmenting the data.
    Steps (i)–(iv) are implemented in a series of functions (see code listing 8.5)
    and are combined in a pandas pipe() chain to automate pre-processing (code listing
    8.6). Also, the pre_processing_pipeline() function (code listing 8.6) stores the
    imported .csv files in a single HDF5 file (hierarchical data format version 5).
    As introduced in Sect. 3.3, HDF5 is a high-performance library to manage, process,
    and store heterogeneous data. All data sets of interest are stored in HDF5 files
    as pandas DataFrames, ready for fast reading and writing. At lines 3–6, the function
    checks that the output file exists. If so, the function removes the existing file.
    At line 16, the function appends each processed data set to a newly created file.'

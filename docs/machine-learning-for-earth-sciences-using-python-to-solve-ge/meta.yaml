    \ to isotopic ratios.\n- Lines 7–10 Apply a log transformation, consistent with\
    \ the *alr* CoDA transformation.\n- Line 13 Save *my_data* to Excel™ to record\
    \ the results of pre-processing before scaling.\n- Line 16 Define *X*, a four-feature\
    \ numpy array in the shape accepted by most scikit-learn ML algorithms.\n- Line\
    \ 18 Defines three scenarios: (1) unscaled data, (2) scaling with StandardScaler(),\
    \ and (3) scaling with RobustScaler().\n- Lines 24–42 Perform the scaling (line\
    \ 27) and show the diagrams in Fig. 3.4.\n\n![](img/90d3084aebf7ededff86e49f84c52faa_57_0.png)\n\
    \nFigure 3.4 shows the results of code listings 3.9 and 3.10. As expected, the\
    \ application of various scalers and transformers does not change the data structure.\
    \ However, it strongly affects the position and the spread of the features investigated.\
    \ For example, the logarithm of $^{12}C/^{13}C$ ranges from 0 to 4 when unscaled,\
    \ with a mean at about 1.7 (see also Fig. 3.3). Both the standard and the robust\
    \ scalers center the data set on zero by using the mean and the median, respectively,\
    \ but they produce different spreads because the robust scaler also accounts for\
    \ the presence of outliers. For symmetric distributions in the absence of outliers,\
    \ we expect similar results from the standard and robust scalers.\n\n```\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn.preprocessing import\
    \ StandardScaler\nfrom sklearn.mixture import GaussianMixture as GMM\n\nmy_colors\

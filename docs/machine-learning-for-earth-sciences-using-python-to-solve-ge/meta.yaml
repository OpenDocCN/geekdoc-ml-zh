    ## 第5章

    岩石学中的聚类与降维


    ### 5.1 揭示火山喷发的化学记录


    无监督机器学习方法可以帮助我们解读存储在单次喷发或多次火山事件晶体载荷中的化学记录（Caricchi et al., 2020b; Boschetty et
    al., 2022; Musu et al., 2023）。该记录通常包括不同晶体相（如橄榄石、单斜辉石、斜方辉石、角闪石、斜长石、石榴石和石英）的主量元素化学成分（即多元成分数据）（Boschetty
    et al., 2022; Aitchison & Egozcue, 2005; Aitchison, 1982, 1984）。这些相中的每一个都为揭示火山管道系统的复杂动力学（Ubide
    et al., 2021）及其演化（Costa et al., 2020; Petrelli & Zellmer, 2020）提供了线索。


    在结晶过程中（图5.1），矿物生长并调整其结构特征和化学成分，以适应熔体成分和岩浆系统的热力学条件（Ubide et al., 2021）。例如，从晶体核心到边缘的同心化学环带反映了岩浆系统随时间施加的序列变化（图5.1）。在中等至高度过冷度（$\Delta
    T = T_{\text{液相线}} - T_{\text{结晶}}$）下的中等至快速生长，可能导致自形晶体中的扇形分带或骨架状至树枝状结构（图5.1）。此外，成分梯度的扩散再平衡可以进一步改变晶体中的化学模式（Costa
    et al., 2020; Petrelli & Zellmer, 2020）。


    在浅部地壳层位（图5.1），喷发前和喷发期间的动力学包括一系列复杂的过程，如岩浆分异、补给、混合、同化和脱气（Ubide et al., 2021）。探究喷发的晶体载荷为我们提供了必要的信息，以揭示火山管道系统在喷发前和喷发期间的复杂动力学（Ubide
    et al., 2021）。


    在本章中，我重点关注Musu等人（2023）报告的数据集，该数据集包含2021年2月至4月期间埃特纳山东南火山口连续熔岩喷泉喷发的单斜辉石（cpx）分析数据（Musu
    et al., 2023）。


    Musu等人（2023）专注于cpx分析，因为（1）cpx通常存在于基性至中性岩浆中，（2）cpx在广泛的温度$T$和压力$P$范围内结晶，（3）cpx化学成分取决于岩浆成分、含水量、压力和温度（Musu
    et al., 2023），这使得cpx成为一个稳健的温压计（Putirka, 2008; Petrelli et al., 2020; Jorgenson
    et al., 2022; Higgins et al., 2021）和岩浆系统化学演化的精细记录器（Ubide & Kamber, 2018; Caricchi
    et al., 2020b; Boschetty et al., 2022）。


    ### 5.2 地质背景


    埃特纳山位于意大利半岛南端的西西里岛东部（图5.2），是欧洲最大的活火山（Branca & Del Carlo, 2004），也是世界上最活跃的火山之一（Cappello
    et al., 2013; Corsaro & Miraglia, 2022）。


    埃特纳火山表现出不同的喷发行为，从溢流式到爆炸式，包括斯特朗博利式和剧烈的熔岩喷泉事件（Branca & Del Carlo, 2004; Ferlito
    et al., 2014; Corsaro & Miraglia, 2022）。喷发来自山顶火山口和侧翼的裂缝喷口（Musu et al., 2023; Branca
    & Del Carlo, 2004; Di Renzo et al., 2019）。山顶区域由四个活动喷口组成：Voragine (VOR)、Bocca Nuova
    (BN)、东北火山口 (NEC) 和东南火山口 (SEC)。其中，SEC是最年轻且最活跃的喷口（Andronico & Corsaro, 2011; Di
    Renzo et al., 2019; Corsaro & Miraglia, 2022）。


    一个周期性的喷发序列于2020年12月13日在SEC开始，并产生了超过60次阵发性喷发；换句话说，这是“火山特别剧烈的喷发，是这个喷发周期中最危险和最紧张的阶段，此时整个火山口空腔都被打开”（Paffengoltz,
    1978）。


    ### 5.3 研究数据集


    该数据集包含沿单斜辉石边缘到核心剖面收集的主量元素化学分析数据，点间距为2 μm（Musu et al., 2023）。总共采集了1250个分析数据（Musu

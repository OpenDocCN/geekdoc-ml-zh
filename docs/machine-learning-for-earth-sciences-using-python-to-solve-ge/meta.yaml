  md: "# 5.5 Clustering Analyses\n\nCode listing 5.3 shows how to develop a hierarchical\
    \ clustering dendrogram in Python (Fig. 5.4). A dendrogram is a tree diagram used\
    \ to report the result of a hierarchical clustering estimation (see Sect. 4.4).\n\
    \n```\nimport numpy as np\nfrom sklearn.cluster import AgglomerativeClustering\n\
    from scipy.cluster.hierarchy import dendrogram, set_link_color_palette\n\ndef\
    \ plot_dendrogram(model, **kwargs):\n    counts = np.zeros(model.children_.shape[0])\n\
    \    n_samples = len(model.labels_)\n    for i, merge in enumerate(model.children_):\n\
    \        current_count = 0\n        for child_idx in merge:\n            if child_idx\
    \ < n_samples:\n                current_count +=1\n            else:\n       \
    \         current_count += counts[child_idx-n_samples]\n        counts[i] = current_count\n\
    \n    linkage_matrix = np.column_stack([model.children_,\n                   \
    \                   model.distances_,\n                                      counts]).astype(float)\n\
    \n    dendrogram(linkage_matrix, **kwargs)\n\nmodel = AgglomerativeClustering(linkage='ward',\n\
    \                                affinity='euclidean',\n                     \
    \           distance_threshold = 0,\n                                n_clusters=None)\n\
    \nmodel.fit(my_dataset_ilr_scaled)\n\nfig, ax = plt.subplots(figsize = (10,6))\n\
    ax.set_title('Hierarchical clustering dendrogram')\n\nplot_dendrogram(model, truncate_mode='level',\
    \ p=5,\n                color_threshold=0,\n                above_threshold_color='black')\n\
    \nax.set_xlabel('Number of points in node')\nax.set_ylabel('Height')\n```\n\n\
    Listing 5.3 Developing a hierarchical clustering dendrogram in Python"

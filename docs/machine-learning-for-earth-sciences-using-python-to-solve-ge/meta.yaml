    \    my_dataset < my_dataset.quantile(0.001)) |\n    (my_dataset > my_dataset.quantile(0.999))).any(axis=1)]\n\
    \nmy_dataset_ilr = ilr(my_dataset)\n\ntransformer = RobustScaler(\n    quantile_range=(25.0,\
    \ 75.0)).fit(my_dataset_ilr)\n\nmy_dataset_ilr_scaled = transformer.transform(my_dataset_ilr)\n\
    \nfig = plt.figure(figsize=(8, 8))\n\nfor i in range(0, 6):\n    ax1 = fig.add_subplot(3,\
    \ 2, i+1)\n    sns.kdeplot(my_dataset_ilr_scaled[:, i], fill=True,\n         \
    \       color='k', facecolor='#c7ddf4', ax=ax1)\n    ax1.set_xlabel('scaled ilr_'\
    \ + str(i+1))\nfig.align_ylabels()\nfig.tight_layout()\n```\n\nListing 5.2 Compositional\
    \ data analysis (CoDA)\n\nAs we know from Sect. 3.3.6, performing multivariate\
    \ statistical analysis directly on compositional data sets is not formally correct\
    \ and can bias the results or cause other problems (Aitchison, 1982; Aitchison\
    \ & Egozcue, 2005; Aitchison, 1984). Different data transformations have been\
    \ proposed to apply standard and advanced statistical methods to compositional\
    \ data sets. Examples are the additive log-ratio (*alr*), the centered log-ratio\
    \ (*clr*), and the isometric log-ratio (*ilr*) transformations (Aitchison, 1982;\
    \ Aitchison & Egozcue, 2005; Aitchison, 1984). I briefly introduced CoDA analysis\
    \ in Sect. 3.3.6, where I also presented the equations to perform the *alr*, *clr*,\
    \ and *ilr* transformations.\n\nAt line 15 of code listing 5.2, we apply the *ilr*\
    \ transformation to our data, then scale in agreement with the median and the\
    \ inter-quartile range (lines 17–20); that is, we apply *RobustScaler()*. We then\
    \ visualize the resulting features (Fig. 5.3).\n\n![](img/90d3084aebf7ededff86e49f84c52faa_87_0.png)\n\
    \n**Fig. 5.3** Inspecting *ilr*-transformed data\n\n## 5.5 Clustering Analyses\n\

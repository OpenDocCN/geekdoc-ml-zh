  md: 'Additive Log Ratio Transformation (alr) (Aitchison, 1982; Aitchison & Egozcue,
    2005; Razum et al., 2023) The alr transformation is given by


    $$alr(\mathbf{x}) = \left[ \ln \frac{x_1}{x_D}, \ln \frac{x_2}{x_D}, \dots, \ln
    \frac{x_{D-1}}{x_D} \right].$$


    The alr transformation nonisometrically maps vectors from the D-dimensional Aitchison
    simplex to a (D-1)-dimensional space.


    As in the case of pwlr, the interpretation of alr data is quite simple because
    they also derive from a simple operation of division followed by a logarithm to
    reduce the skew of the resulting features.


    Centered Log Ratio Transformation (clr) This transformation is given by


    $$clr(\mathbf{x}) = \left[ \ln \frac{x_1}{g(\mathbf{x})}, \ln \frac{x_2}{g(\mathbf{x})},
    \dots, \ln \frac{x_D}{g(\mathbf{x})} \right],$$


    where $g_m(\mathbf{x})$ is the geometric mean of the parts of $\mathbf{x}$. The
    clr transformation isometrically maps the vectors from the D-dimensional Aitchison
    simplex to a D-dimensional Euclidean space. The clr-transformed data can then
    be analyzed by all multivariate tools that do not rely on a full rank of the covariance
    (Aitchison, 1982; Aitchison & Egozcue, 2005; Razum et al., 2023).


    Orthonormal Log Ratio Transformation (olr) This transformation is also known as
    the isometric log ratio transformation (ilr). The olr coordinates of $\mathbf{x}$
    with respect to the basis elements $\mathbf{e}_l$, $l = 1, 2, \dots, n-1$, are
    defined as (Egozcue & Pawlowsky-Glahn, 2005)


    $$x_l^* = \sqrt{\frac{rs}{r+s}} \ln \left[ \frac{g(x_{k+1}, \dots, x_{k+r})}{g(x_{k+r+1},
    \dots, x_{k+r+s})} \right],$$


    where $x_l^*$ is the balance between the groups of parts $x_{k+1}, \dots, x_{k+r}$
    and $g(x_{k+r+1}, \dots, x_{k+r+s})$ and $\mathbf{e}_l$ is the balancing element
    for the two sets of parts (Egozcue & Pawlowsky-Glahn, 2005).


    Note that “with defined balances, which are directly associated with an orthogonal
    coordinate system in the simplex, every multivariate statistical technique is
    available without any restriction and data can be properly statistically evaluated”
    (Razum et al., 2023). Each of the above-mentioned transformations is endowed with
    unique properties that can be used for compositional data analysis. The clr transformation
    is often used to construct compositional biplots and for cluster analysis (van
    den Boogaart & Tolosana-Delgado, 2013). Although alr-transformed data can be analyzed
    by using multivariate statistical tools, the alr transformation defines “coordinates
    in an oblique basis, something that affects distances if the usual Euclidean distance
    is computed from the alr coordinate” (van den Boogaart & Tolosana-Delgado, 2013).
    Consequently, the alr transformation “should not be'

    \    (1): ReLU()\n    (2): Linear(in_features=4, out_features=4, bias=True)\n\
    \    (3): ReLU()\n    (4): Linear(in_features=4, out_features=1, bias=True)\n\
    \  )\n)\n```\n\nFig. 12.6 Developing a multilayer perceptron in PyTorch\n\nmodel\
    \ can live either in the CPU or in the GPU (Blocks 3 and 4 in Fig. 12.6), if available.\n\
    \n## 12.5 How to Train a Feedforward Network\n\n### 12.5.1 The Universal Approximation\
    \ Theorem\n\nThe universal approximation theorem (Hornik et al., 1989; Cybenko,\
    \ 1989) states that feedforward networks with a linear output layer and at least\
    \ one hidden layer can approximate any continuous function on a closed and bounded\
    \ subset of $\\mathbb{R}^n$ (Goodfellow et al., 2016), which means that feedforward\
    \ networks with hidden layers are universal approximators (Goodfellow et al.,\
    \ 2016). In other words, “the universal approximation theorem means that regardless\
    \ of what function we are trying to learn, we know that a large [multilayer perceptron]\
    \ will be able to represent this function” (Goodfellow et al., 2016). However,\
    \ despite what is affirmed by the universal approximation theorem, there is no\
    \ guarantee that the training process will correctly learn the target function\
    \ (Goodfellow et al., 2016). For example, the optimization algorithm used for\
    \ training may not be able to find the correct values for the theta parameters\
    \ that describe the desired function. Also, the training process might choose\
    \ the wrong function because of overfitting (Goodfellow et al., 2016). To avoid\
    \ these issues, we want to find (1) a robust loss function $L(\\theta)$, (2) a\
    \ strategy to compute the gradient with respect to model parameters [i.e., $\\\
    Delta_{\\theta}L(\\theta)$ of $L(\\theta)$], and (3) an efficient optimization\
    \ algorithm to descend $\\Delta_{\\theta}L(\\theta)$ and find the minimum of $L(\\\
    theta)$.\n\n### 12.5.2 Loss Functions in PyTorch\n\nA loss function (or cost function)\
    \ computes a numerical value that the learning process will attempt to minimize\
    \ (cf. Sect. 7.5). Typically, a loss function compares (e.g., by subtraction)\
    \ the desired outputs (i.e., the labels) and the current outputs of our model\
    \ (Stevens et al., 2020). Table 12.1 reports the loss functions available in PyTorch.\n\
    \n### 12.5.3 The Back-Propagation and its Implementation in PyTorch\n\nIn feedforward\
    \ neural networks, the information starts from the input $\\mathbf{x}$, flows\
    \ through the hidden layers, and finally produces an output $\\mathbf{y}$ (Goodfellow\
    \ et al., 2016). The name of this process is forward propagation. At the beginning\
    \ of training, forward propagation produces an output $\\mathbf{y}$ and an associated\
    \ cost function $J(\\theta)$ that relies on the non-optimized $\\theta$ parameters\
    \ (Goodfellow et al., 2016).\n\nThe back-propagation algorithm computes the gradient\
    \ of $L(\\theta)$ by propagating the information from the output (i.e., the cost\
    \ function), backward through the network (Goodfellow et al., 2016). Note that\
    \ back-propagation only allows us to define the gradient of $L(\\theta)$. We then\
    \ need an optimization algorithm such as the stochastic gradient descent algorithm\
    \ (Sect. 7.5) to learn along this gradient (Goodfellow et al., 2016). Describing\
    \ in detail the back-propagation algorithm is beyond the scope of the present\
    \ book, so please refer to Goodfellow et al. (2016) or other specialized books\
    \ for further details."

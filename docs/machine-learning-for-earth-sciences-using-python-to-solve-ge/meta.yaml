    \     nn.Linear(4, 1)\n        )\n\n    def forward(self, x):\n        return\
    \ self.layers(x)\nLast executed at 2022-08-17 16:34:00 in 4ms\n```\n\n```python\n\
    [3]: device = \"cuda\" if torch.cuda.is_available() else \"cpu\"\n\nprint(f\"\

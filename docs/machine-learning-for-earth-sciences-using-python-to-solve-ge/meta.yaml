    masks to train the model and as quality control during validation. The bottom-right
    panel of Fig. 12.11 shows the predicted mask. Finally, the bottom-left panel compares
    the predicted mask with the original image to highlight the quality of the results.


    Going into more detail on the application of semantic image segmentation to Earth
    Sciences is beyond the scope of this book. For those interested, I strongly recommend
    to see the TorchGeo library³ (Stewart et al., 2021).


    ³ https://pytorch.org/blog/geospatial-deep-learning-with-torchgeo/.'

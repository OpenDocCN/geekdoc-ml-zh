    # 7.6 Ridge Regression


    Ridge regression is a least squares method that shrinks the regression coefficients
    via a penalty on their size (Hastie et al., 2017). The regression starts with
    a labeled data set ($\mathbf{x}_i$, $y_i$), where $y_i$ are the labels and $\mathbf{x}_i
    = (x_{i1}, x_{i2}, \dots, x_{ip})^T$ are the predictor variables (i.e., the inputs)
    (Hastie et al., 2017; Tibshirani, 1996).

    The cost function in ridge regression can be expressed as (Hastie et al., 2017;
    Tibshirani, 1996)


    $$C(\theta_0, \boldsymbol{\theta}) = \frac{1}{2n} \sum_{i=1}^{n} \left( y_i -
    \theta_0 - \sum_{j=1}^{p} x_{ij} \theta_j \right)^2 + \lambda \sum_{j=1}^{p} \theta_j^2,
    \quad (7.35)$$


    where the parameter $\lambda$ is called the “regularization penalty.” The ridge
    regression performs the so-called L2-norm regularization by adding a penalty equivalent
    to the square of the magnitude of coefficients [i.e., the second term of Eq. (7.35)].

    In the limiting case of $\lambda = 0$, the ridge regression reduces to an ordinary
    least squares regression. A correct choice of $\lambda$ helps avoid overfitting
    issues. In contrast, underfitting becomes a problem for large $\lambda$.


    # 7.7 Least Absolute Shrinkage and Selection Operator


    The “least absolute shrinkage and selection operator,” also known as the LASSO,
    is a method to solve linear problems by minimizing the residual sum of squares
    subject to the constraint that the sum of the absolute value of the coefficients
    must be less than a given constant (Tibshirani, 1996). The main characteristic
    of LASSO is its tendency to prefer solutions with fewer nonzero coefficients,
    thus reducing the number of parameters governing the predictor. The LASSO cost
    function can be'
- md: 'expressed as (Tibshirani, 1996)


    $$C(\theta_0, \boldsymbol{\theta}) = \frac{1}{2n} \sum_{i=1}^{n} \left( y_i -
    \theta_0 - \sum_{j=1}^{p} x_{ij} \theta_j \right)^2 + \lambda \sum_{j=1}^{p} |\theta_j|.
    \quad (7.36)$$


    In contrast with ridge regression, the LASSO algorithm performs the so-called
    L1-norm regularization by adding a penalty equivalent to the sum of the absolute
    values of the coefficients [i.e., the second term of Eq. (7.36)].


    Note that the LASSO reduces shrinkage and the dimensionality; in other words,
    it reduces the number of features of the solution, whereas ridge regression only
    shrinks (Hastie et al., 2017; Tibshirani, 1996).


    ## 7.8 Elastic Net


    Elastic net (Zou & Hastie, 2005) is a linear regression model that performs both
    L1- and L2-norm regularization (Friedman et al., 2010):


    $$C(\theta_0, \boldsymbol{\theta}) = \frac{1}{2n} \sum_{i=1}^{n} \left( y_i -
    \theta_0 - \sum_{j=1}^{p} x_{ij} \theta_j \right)^2 + \lambda \sum_{j=1}^{p} \left[
    \frac{1-\alpha}{2} \theta_j^2 + \alpha |\theta_j| \right]. \quad (7.37)$$


    For $\alpha = 1$, elastic net is the same as the LASSO, whereas for $\alpha =
    0$, elastic net approaches ridge regression. For $0 < \alpha < 1$, the penalty
    term [i.e., the second term of Eq. (7.37)] is between the L1- and L2-norm regularization.


    ## 7.9 Support Vector Machines


    Support vector machines (SVMs) are a set of supervised ML algorithms that work
    remarkably well for classification (Cortes & Vapnik, 1995). The strength of SVMs
    relies on three features: (1) SVMs are efficient in high-dimensional spaces, (2)
    SVMs effectively model real-world problems, (3) SVMs perform well on data sets
    with many attributes, even if few cases are available to train the model (Cortes
    & Vapnik, 1995). SVMs numerically implement the following idea: inputs are nonlinearly
    mapped to a high-dimension feature space $F$ (Cortes & Vapnik, 1995), and a linear
    decision surface is constructed in the space $F$ (Cortes & Vapnik, 1995).


    To start, consider a labeled training data set $(y_i, \boldsymbol{x}_i)$, where
    $\boldsymbol{x}_i$ is $p$-dimensional [i.e., $\boldsymbol{x}_i = (x_{1i}, x_{2i},
    \ldots, x_{pi})$], with $i = 1, 2, \ldots, n$, where $n$ is the number of samples.
    Also, assume that the label $y_i = 1$ for the first class and $y_i = -1$ for the
    second class, defining a two-class classification problem (i.e., $y_i \in \{-1,
    1\}$).


    Now define a linear classifier based on the following linear-in-inputs discriminant
    function:


    $$f(\boldsymbol{x}) = \boldsymbol{w}^T \cdot \boldsymbol{x} + b. \quad (7.38)$$


    The decision boundary between the two classes (i.e., the regions classified as
    positive or negative) defined by Eq. (7.38) is a hyperplane.


    The two classes are linearly separable if there exists a vector $\boldsymbol{w}$
    and a scalar $b$ such that


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1, \quad \forall i = 1, 2, \ldots,
    n. \quad (7.39)$$


    This means that we can correctly classify all samples. The definition of the optimal
    hyperplane follows as that which separates the training data set with a maximal
    margin


    $$m(\boldsymbol{w}) = \frac{1}{\|\boldsymbol{w}\|}. \quad (7.40)$$


    Finally, the maximum-margin classifier (i.e., the hard margin SVM) is the discriminant
    function that maximizes $m(\boldsymbol{w})$, which is equivalent to minimizing
    $\|\boldsymbol{w}\|^2$:


    $$\min_{\boldsymbol{w}, b} \frac{1}{2} \|\boldsymbol{w}\|^2 \quad (7.41)$$


    subject to


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1, \quad \forall i = 1, 2, \ldots,
    n. \quad (7.42)$$


    The hard margin SVM requires the strong assumption of the linear separability
    of classes, which can be considered as an exception, not the rule. To allow errors
    [i.e., $\boldsymbol{\xi} = (\xi_1, \xi_2, \ldots, \xi_n)$], we can introduce the
    concept of soft margin SVM:


    $$\min_{\boldsymbol{w}, b, \boldsymbol{\xi}} \left[ \frac{1}{2} \|\boldsymbol{w}\|^2
    + C \sum_{i=1}^n \xi_i \right] \quad (7.43)$$


    subject to


    $$(\boldsymbol{w}^T \boldsymbol{x}_i + b)y_i \geq 1 - \xi_i, \quad \xi_i \geq
    0, \quad \forall i = 1, 2, \ldots, n, \quad (7.44)$$


    where $C > 0$ is a tunable parameter that controls the margin errors. The linear
    classifier defined by Eq. (7.38) can be generalized to nonlinear inputs by defining
    the discriminant function (Cortes & Vapnik, 1995)


    $$f(\mathbf{x}) = \mathbf{w}^T \cdot \phi(\mathbf{x}) + b, \quad (7.45)$$


    where $\phi(\mathbf{x})$ is a function that maps nonlinearly separable inputs
    $\mathbf{x}$ to a feature space $F$ of higher dimension. If we express the weight
    vector $\mathbf{w}$ as a linear combination of the training examples (i.e., $\mathbf{w}
    = \sum_{i=1}^n \alpha_i \mathbf{x}_i$), it follows that, in feature space $F$,
    we have


    $$f(\mathbf{x}) = \sum_{i=1}^n \alpha_i \phi(\mathbf{x}_i)^T \phi(\mathbf{x})
    + b. \quad (7.46)$$


    The idea behind Eqs. (7.45) and (7.46) is to map a nonlinear classification function
    to a feature space $F$ of higher dimensions, where the classification function
    is linear (Fig. 7.4). Defining a kernel function $K(\mathbf{x}_i, \mathbf{x})$
    as


    $$K(\mathbf{x}_i, \mathbf{x}) = \phi(\mathbf{x}_i)^T \phi(\mathbf{x}), \quad (7.47)$$


    we have


    $$f(\mathbf{x}) = \sum_{i=1}^n \alpha_i K(\mathbf{x}_i, \mathbf{x}) + b. \quad
    (7.48)$$


    When using the kernel function, we do not need to know or compute $\phi()$, which
    allows us to apply a linear transformation to the problem at higher dimensions.
    The scikit-learn implementation of SVMs [e.g., $SVC()$ and $SVR()$] allows the
    use of linear, polynomial, sigmoid, and radial basis kernel functions [$K(\mathbf{x}_i,
    \mathbf{x})$, Table 7.1].


    ## 7.10 Supervised Nearest Neighbors


    Supervised $k$-nearest neighbors is a ML algorithm that uses similarities such
    as distance functions (Bentley, 1975) to regress and classify. In detail, the
    $k$-nearest-neighbors method predicts numerical targets by using a metric that
    is typically the inverse-distance-weighted average of the $k$-nearest neighbors
    (Bentley, 1975). The weights can be uniform or calculated by a kernel function.
    The Euclidean distance metric is commonly used to measure the distance between
    two instances, although other metrics are available (see Table 7.2). Note that
    the Minkowski distance reduces to the Manhattan and Euclidean distances when $p
    = 1$ and $2$, respectively. Bentley (1975) gives an extensive and detailed description
    of the $k$-nearest neighbors algorithm.


    In scikit-learn, the $KNeighborsClassifier()$ and $KNeighborsRegressor()$ methods
    perform classification and regression, respectively, based on the $k$-nearest
    neighbors.



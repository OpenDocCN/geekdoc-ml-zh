    # An Artificial Neural Network’s training procedure


    Neural networks compute a weighted total of inputs and apply an activation function
    at each layer, as was stated at the beginning of this chapter. The output layer
    is then given the end result. Forward propagation is a frequent name for this
    process. Weights must be tuned in order to create the most accurate outputs when
    training these artificial neural networks. The following steps are involved in
    training an artificial neural network:


    +   - Set the weights at zero

    - Use the process of forward propagation

    - Assess the effectiveness of the neural network

    - Use the backward propagation technique

    - Refresh the weights

    - Continue with steps 2 through 6 until the maximum number of iterations is reached
    or neural network performance is not enhanced.'
- md: 'We need a performance metric that defines how accurate the neural network is,
    as we can see from the procedures of training an artificial neural network that
    was previously described. The loss function or cost function is the name of this
    function. The cost function we discussed in the previous chapter could be the
    same as this function:


    $$J = \frac{1}{N} \sum (y_{\text{predicted}} - y_{\text{target}})^2$$


    where $y_{\text{predicted}}$ is the output, N is the number of outputs, and $y_{\text{target}}$
    is the output’s actual value. The neural network error is provided by this function.
    The neural network’s great accuracy is reflected by small values of J.


    We have thus far described loss function and the general operation of neural networks.
    Let’s now discuss each stage of the training process in more depth.


    Let’s think about a group of X inputs and Y outputs. We start out with a null
    matrix for W (the weights) and B (the bias). Applying the feed-forward propagation,
    which entails feeding each layer of data with the artificial neural network’s
    bias and input weights added together. Think about the fact that there are two
    layers. The output of the first hidden layer can be calculated using the equation
    below:


    $$Z_1 = W_1X + b_1$$


    Where W1 and b1 are the neural network’s parameters for the first layer’s weights
    and bias, respectively.


    The activation function F1, which can be any activation from the function previously
    discussed in this chapter, is then applied.


    $$A_1 = F_1(Z_1)$$


    The output of the first layer is the final product, which is then fed to the second
    layer as follows:


    $$Z_2 = W_2A_1 + b_2$$


    The second layer’s weights and bias are represented by W2 and b2, respectively.


    We then use an activation function F2 to this outcome:


    $$A_2 = F_2(Z_2)$$


    The artificial neural network’s output is now meant to be A2. Depending on the
    dataset and the desired result, the activation functions F1 and F2 may have the
    same activation function or be separate activation functions.


    Following feedforward propagation, we use the loss function to compare the neural
    network output to the desired output. At this point, there is a very good chance
    that the discrepancy between the estimated output and the actual data is substantial.
    As a result, we must modify the weights using the backpropagation method. With
    regard to biases and weights, we calculate the gradient of each activation function.
    Prior to assessing the derivative of the input layer, we first evaluate the derivative
    of the previous layer. The weights should then be updated based on the gradient
    or derivative of the activation function. Applying these methods to our two-layer
    neural network example yields the following results:


    $$W_2 = W_2 - \alpha \frac{d}{dW} F_2(W,b)$$


    $$b_2 = b_2 - \alpha \frac{d}{db} F_2(W,b)$$


    $$W_1 = W_1 - \alpha \frac{d}{dW} F_2(W,b)$$


    $$b_1 = b_1 - \alpha \frac{d}{db} F_2(W,b)$$


    The learning rate parameter is the parameter. The weights’ update frequency is
    determined by this parameter. The gradient descent algorithm is the name of the
    procedure we just described. The procedure is repeated until the predetermined
    maximum number of iterations has been reached. In Chapter 4, using Python, we
    will construct an example to demonstrate a perceptron and multi-layer neural network.
    A classifier based on an artificial neural network will be created. Let’s now
    look at the benefits of applying artificial neural networks to machine learning
    applications.


    ## Use of artificial neural networks: advantages and disadvantages


    Artificial neural networks are used today practically everywhere. Numerous artificial
    neural networks have emerged to fully utilize this Artificial Intelligence methodology
    as a result of the intense research activity in this field. Artificial neural
    networks offer a number of benefits.


    Structures can be mapped by artificial neural networks, which can also learn from
    data more quickly. Additionally, as is the case in many real-world applications,
    they are able to map the intricate linkages and structures that link the output
    datasets to the input datasets. An artificial neural network can be generalized
    after it has been created and trained. In other words, it may be used to predict
    outcomes for new datasets or map associations between data that it hasn’t been
    exposed to. Furthermore, there are no presumptions about the distribution or structure
    of the input data made by the artificial neural network. Unlike conventional statistical
    methods, it does not place restrictions on the data or make assumptions about
    how the data are related. Artificial Neural Networks are a useful tool since they
    can process a lot of data. Artificial neural networks are a non-parametric method
    that enables model development with a reduced error that is brought on by parameter
    estimation. Artificial neural networks have certain appealing qualities, but they
    also have some disadvantages.


    Artificial neural networks have the drawback of frequently operating in the dark.
    As a result, we are unable to properly comprehend the connection between inputs
    and outputs as well as the interdependence between particular input variables
    and the output. In other words, we are unable to quantify the influence of each
    input variable on the outcome. Computationally, the training procedure may be
    inefficient. By employing parallel computing and making effective use of the computing
    capacity of computers, we may solve this issue.



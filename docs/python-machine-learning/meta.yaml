    ## Chapter 7: Neural Networks With Convolutions


    Convolutional Neural Networks (CNNs) are one of the main types of deep neural
    networks that have demonstrated excellent performance in a wide range of computer
    science fields, including object recognition, object classification, and computer
    vision. ConvNets have been used for many years to separate different faces, identify
    objects, and power robot and self-driving car vision systems.


    A ConvNet can quickly identify numerous photographic sequences and offer pertinent
    caption suggestions. ConvNets can also recognize commonplace items, animals, or
    people. Convolutional neural networks have recently been successfully used for
    NLP issues like sentence classification.


    Convolutional Neural Networks are therefore among the most crucial tools for Deep
    Learning and machine learning applications. LeNet was the first Convolutional
    Neural Network to be introduced, and it considerably advanced the Deep Learning
    field as a whole. Yann LeCun first suggested this type of convolutional neural
    network in 1988. It was mostly used to solve character recognition issues like
    reading codes and numerals.


    This first Convolutional Neural Network proposed back in 1988 is extremely similar
    to Convolutional Neural Networks that are frequently used nowadays for numerous
    computer science tasks.


    LeNet was employed for a variety of character recognition applications, just like
    modern convolutional neural networks. Similar to LeNet, the commonly used convolutional
    neural networks have four basic operations: classification of their fully-connected
    layers, sub-sampling or pooling, ReLU non-linearity activation functions, and
    convolution.


    Every Convolutional Neural Network is constructed using these operations as their
    cornerstones. We must delve further into these four fundamental functions in order
    to move on to working with convolutional neural networks in Python and gain a
    better knowledge of the logic that underlies convolutional neural networks.


    Every image, as you are aware, may be simply represented as a matrix with various
    values. When referring to a particular aspect of photographs, we will use the
    common word “channel.” Commonly, an image produced by a conventional camera has
    three channels: blue, red, and green. These pictures can be thought of as three
    stacked two-dimensional matrices. Additionally, each of these matrices has specified
    pixel values between 0 and 255.


    However, since there are only black and white pixels in a grayscale image, there
    is only one channel available. The sample we are examining is only a single-2D
    matrix that depicts a grayscale image because, in this situation, we are just
    going to be thinking about grayscale images. Each pixel in the matrix must have
    a value between 0 and 255. In this instance, 0 denotes a black color whereas 255
    denotes a white hue.



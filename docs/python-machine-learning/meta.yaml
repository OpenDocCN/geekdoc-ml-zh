    ## Chapter 5: Linear Regression with Python


    ### One-variable linear regression


    We will first concentrate on the case in which there is just one variable in linear
    regression. This will make things a little bit simpler to deal with and ensure
    that we can master some of the fundamentals before attempting some of the more
    challenging tasks. We’ll concentrate on issues with just one independent variable
    and one dependent variable.


    We will utilize the data set for car_price.csv to get started on this one so that
    we can determine what the price of the vehicle will be. The cost of the car will
    serve as our dependent variable, and the year of the car will serve as our independent
    variable. These files are located in the Data sets directories that we previously
    discussed. We will need to use the Scikit Learn package from Python to help us
    find the correct linear regression technique so that we can produce an accurate
    forecast about the cost of the autos. Once everything is set up, we need to employ
    the next several procedures to assist.


    ### Bringing in the proper libraries


    To begin, we must confirm that we have the appropriate libraries on hand. The
    following codes are required to obtain the libraries for this section:


    ```

    import pandas as pd

    ```


    ```

    import numpy as np

    ```


    ```

    import matplotlib.pyplot as plt

    ```


    ```

    %matplotlib inline

    ```


    This script can be used in a Jupyter Notebook. If you’re using the Jupyter Notebook,
    the final line must be present; however, if you’re using Spyder, you can omit
    the final line since Spyder will process and complete this step on its own.


    ### Bringing the dataset in


    The next stage will be importing the data sets you want to employ for this training
    method after the libraries have been imported using the codes you already had.
    We’ll use the dataset “car_price.csv” for our task. To assist you in placing the
    data set correctly, you can run the script below:


    ```

    car_data = pd.read_csv("D:/Datasets/car_price.csv")

    ```


    ### Studying the information


    It is always better to practice and examine the data for any scaling or missing
    value issues before using the data to aid in training. We must first look at the
    information. The first five rows of the data set that you want to display will
    be returned by the head method. To make this one work, you can use the script
    below:


    ```

    car_data.head()

    ```


    Additionally, you can get all of the dataset’s statistical details back via the
    described function.


    ```

    car_data.describe()

    ```


    Let’s look at the linear regression procedure one last time to determine if it
    will work for this kind of activity. The data points will be taken and plotted
    on the graph. This will enable us to determine whether the price and the year
    are related. Use the script below to test whether this will succeed:


    ```

    plt.scatter(car_data[''Year''], car_data[''Price''])

    plt.title("Year vs. Price")

    plt.xlabel("Year")

    plt.ylabel("Price")

    plt.show()

    ```


    When we employ the aforementioned script, we are attempting to deal with a scatterplot
    that we can later locate on the Matplotlib package. This will be helpful because
    the year will be on the x-axis of the scatter plot and the price will be over
    on the y-axis. We can see from the output figure that the price of the car will
    climb in tandem with an increase in the year. This demonstrates the existence
    of a linear link between the price and the year. This is a useful example of how
    this kind of method might be applied to address the issue at hand.


    ### Relating to data preparation


    Now that we have that knowledge, we need to use it to accomplish these two tasks.
    You must use the script below to begin dividing the data into features and labels:


    ```

    characteristics = car_data.iloc[:,0:1].values

    ```


    ```

    labels = car_data.iloc[:,1].values

    ```


    Since there are just two columns here, the feature set will be in the 0th column,
    and the label will be in the first. The data can then be split in half, with 20%
    going to the training set and the rest going to the test set. Use the scripts
    listed below to assist you in completing this:


    ```

    from sklearn.model_selection import train_test_split

    train_features, test_features, train_labels, test_labels = train_test_split(characteristics,
    labels, test_size = 0.2, random_state = 0)

    ```


    We can go back and review the data set after this section. When we do this, it
    is simple to see that there won’t be a significant discrepancy between the values
    of the prices and the years. These two will ultimately cost hundreds of dollars
    each. This means that you can use the data as it is right now without the need
    for any scaling. In the long term, that saves you some time and work.


    ### How to program the algorithm to predict certain events


    It’s time to train the algorithm a little bit so that it can provide accurate
    forecasts for you. The LinearRegression class will be useful in this situation
    as it has all the labels and other training features you’ll need to enter and
    train your models.


    You just need to follow the script below to get started, and it’s easy to do:


    ```

    from sklearn.linear_model import LinearRegression

    lin_reg = LinearRegression()

    lin_reg.fit(train_features, train_labels)

    ```


    We will check the coefficient for just the independent variable using the same
    example of automobile prices and the prior years. To do it, we must employ the
    script that follows:


    ```

    print(lin_reg.coef_)

    ```


    This technique will produce the number 204.815 as a result. This demonstrates
    that the car price will rise by 204.815 (at least in this example) with every
    change in units during the year.


    Predicting the new instance that you will work with is the last step to perform
    after spending the time to train this model. To make this happen, the anticipated
    method will be applied to this kind of class. The approach will use the test features
    you select as an input and then forecast the output that most closely resembles
    that input. The script that you may use to accomplish this is as follows:


    ```

    predictions = lin_reg.predict(test_features)

    ```


    When you use this script, you’ll discover that it’s going to accurately anticipate
    what the future holds for us. Based on the information we now have, we can make
    an educated judgment as to how much a car will be worth depending on the year
    it is built in the future. Future changes might affect some things, and it does
    appear to impact based on the features that come with the automobile. However,
    this is a useful approach to have a look at the cars and get a general idea of
    how much they currently cost and how much they will cost moving forward.


    So, let’s check out how this functions. Now that we have examined this linear
    regression, we want to determine how much a car will cost us in 2025. Perhaps
    you’re planning to save money for a car and want to know how much it will cost
    you once you have that money. You could utilize the details we provided.'

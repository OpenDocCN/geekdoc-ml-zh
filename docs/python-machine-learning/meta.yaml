- md: '## Building a Machine Learning System: Steps


    Here are the typical processes that are involved in creating a machine learning
    system, regardless of the model being used.


    ### Describe the Goal


    The first step, as with anything in life, is to identify your goals. Knowing what
    you hope to achieve with your system is crucial. The type of prediction you want
    the system to make will determine the type of data you use, the algorithm, and
    other variables.


    ### 1. Gather Information


    Perhaps the longest step in the development of a machine learning system is this
    one. To prepare the algorithm for use, you must gather all the pertinent data.


    ### 2. Prepare the Data


    This is a crucial step that is frequently skipped. Ignoring this step could end
    up costing you money. The output will be more accurate the cleaner and the more
    pertinent the data you are using.


    ### 3. Choose a Method


    You can select from a variety of algorithms, including Structured Vector Machine
    (SVM), k-mean, Naive-Bayes, Apriori, etc. The algorithm you choose will mostly
    depend on the goal you want the model to help you achieve.


    ### 4. Develop Your Model


    Once all the data are prepared, the machine must be fed with them so that the
    algorithm may be trained to forecast.


    ### 5. Examine the Model


    Your model is now prepared to start reading the input and producing the desired
    outputs when it has been trained.


    ### 6. Foresee


    The algorithm will go through several iterations, and you may also give it input
    to help it make better predictions over time.


    ### 7. Send out


    The model will be sanitized and ready for integration into any application when
    you test it and are satisfied with how it performs. This indicates that it is
    prepared for deployment.


    Depending on the application and the kind of algorithm (supervised or unsupervised)
    you’re employing, all these phases can change. They do, however, participate in
    every step of creating a machine learning system. Each of these levels allows
    you to employ a variety of languages and technologies. This book teaches us how
    to use Python to create a machine-learning system. Let’s examine the examples
    from the preceding section:


    ### Scenario No. 1


    Facebook detects a friend’s image in a photo from a tagged album.


    This is an illustration of supervised learning. Facebook in this instance is using
    tagged images to identify the person. The images’ labels will be created from
    the tagged images. Supervised learning is the process through which a computer
    learns from any type of labeled data.


    ### Scenario No. 2


    Fresh song recommendations based on listener history.


    This is an illustration of supervised learning. The music genre is one of the
    pre-existing or categorized labels that the model is being trained on. Exactly
    this is what Netflix, Pandora, and Spotify do: they compile the music and movies
    you enjoy, assess the qualities based on your preferences, and then recommend
    songs and movies based on features that are comparable.


    ### Scenario No. 3


    To identify any questionable or fraudulent transactions by analyzing bank data.


    This is an illustration of unsupervised learning. There are no explicit classifications
    like “fraud” or “not a fraud” in this instance because the suspicious transaction
    cannot be completely specified. The model will look for abnormal transactions
    in an effort to spot any outliers.


    ### Scenario No. 4


    The cost of an Uber ride, which fluctuates according to the time of day that you
    utilize the service.


    Explanation: The Uber surge pricing function combines several machine learning
    models, such as the forecast of peak hours, traffic in particular areas, and the
    availability of cabs. The usage patterns of people in different parts of the city
    are identified using clustering.



    库在现代的主要功能是作为通用爬虫。该库鼓励广泛使用和使用全球代码等。


    ## Statsmodels


    一个名为 Statsmodels 的库旨在使用各种统计计算和断言技术来探索数据。它包含许多功能，包括区分属性和结果数据。它可以使用多种模型来执行此功能，包括线性回归、多个估计器、时间序列分析，甚至更多线性模型。其他模型，包括离散选择，也适用。



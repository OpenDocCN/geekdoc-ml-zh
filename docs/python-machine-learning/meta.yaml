- md: '## Decide on a category.


    After analyzing the input data, the machine learning model forecasts which category
    the output will fall into. In these situations, the forecast is frequently a “yes”
    or “no” binary response. Examples of questions that will be feasible to answer
    include “Will it rain today or not?” “Is this a fruit?” and “Is this email spam
    or not?” and so forth. This is accomplished by making use of a set of data (training
    dataset) that determines whether or not a certain email qualifies as spam based
    on particular keywords. This method is referred to as classification.


    ## Determine a quantity.


    In this instance, the technique is typically used to forecast a value, such as
    the intensity of rainfall, based on various weather variables, such as temperature,
    humidity %, air pressure, and so on. Regression is the term used to describe this
    type of prediction. There are many subgroups of the regression method, including
    linear regression, multiple regression, etc.


    ## Systems that Detect Anomalies


    A model’s job in anomaly detection is to find any outliers in the available data.
    In banking and e-commerce systems, where the system is designed to flag any anomalous
    transactions, these applications are employed. All of this aids in the detection
    of phony transactions.


    ## Clustering


    These technologies are still in their infancy, but they have a wide range of applications
    that have the potential to fundamentally alter how business is conducted.


    For instance, it is feasible to organize people into several clusters based on
    various behavioral characteristics, such as their age group, the area they live
    in, or even the types of programs they prefer to watch. Because of this, businesses
    are now able to recommend various shows or programs based on the cluster to which
    the user belongs.


    ## Machine Learning System Categories


    In the case of conventional machines, the programmer will provide the machine
    with specific commands along with a set of instructions and input parameters,
    which the machine will utilize to perform computations and generate an output.
    However, with machine learning systems, the system is never constrained by any
    instruction that the programmer gives. The machine will select the algorithm that
    it can use to accurately process the dataset and determine the outcome. The training
    dataset, which comprises previous data and outputs, is used to accomplish this.


    As a result, in the traditional world, we would provide a machine a set of instructions
    for how to process data, however in a machine learning setup, we would never give
    a system instructions. In order to produce an output, the computer must interact
    with the dataset, create an algorithm utilizing the historical data, make decisions
    similar to how a human would, and analyze the data. In contrast to a human, a
    computer can quickly process massive datasets and produce highly accurate findings.


    Machine learning algorithms come in a variety of forms, and they are categorized
    according to their intended use. Machine learning systems fall into three categories:


    - Supervised Education

    - Unsupervised Education

    - Reward-Based Learning


    ## Supervised education


    These models feed labeled data into the computer. This is done in order to predict
    what particular datasets’ (or new data’s) results will be. Predictive algorithms
    are another name for this kind of algorithm.


    Take the following table, for instance:


    | Money (label) | Dimension (feature) |

    |---|---|

    | 1USD | 10 gm |

    | 1EUR | 5 gram |

    | 1INR | 3 gm |

    | 1RU | 7 gm |


    Each currency has a weight attribute in the table above. In this case, the weight
    is the property or feature, and the currency is the label.


    With this training dataset as its first input, the supervised machine learning
    system will then predict that any input containing 3 grams is a coin weighing
    1 INR. A 10-gram coin fits into the same category.


    Algorithms for classification and regression analysis are within the category
    of supervised machine learning. While classification algorithms determine which
    category the data should fall under, regression techniques are used to forecast
    match results or home prices.


    In the latter sections of the book, where we will also teach you how to construct
    or implement these algorithms using Python, we will go into more detail about
    a few of these algorithms.


    ## Unsupervised Education


    These models have a more sophisticated system since they can learn to find patterns
    in unlabeled data and generate an output. This type of approach is used to extract
    any significant inference from huge datasets. Since it uses data and summarizes
    it to create a description (or overview) of a given dataset, this model is also
    known as the descriptive model. Applications for data mining that require substantial
    amounts of unstructured input data frequently use this technique.


    You can display the numerical data on a two-dimensional graph and perhaps spot
    clusters, for instance if the input data are names, runs, and wickets (the latter
    two being of a numeric kind). There will be two clusters in our scenario, one
    for the bowlers and one for the batsman. Additionally, it will be possible to
    associate a particular name with each point on the graph. When a new input will
    be available (provided by name, run, and wicket) can be linked to one of the two
    clusters to determine if the new input (player) is a bowler or a batsman.


    The sample dataset for a match is in Table 1. This allows the cluster model to
    classify the players as bowlers or batters.


    In unsupervised machine learning, popular algorithms including density estimation,
    clustering, data reduction, and compression are used.


    The data are summarized and presented differently by the clustering method. This
    method is applied in data mining software. When the goal is to display any sizable
    data collection and produce an insightful summary, density estimation is performed.
    This will inevitably lead to the ideas of dimensionality and data reduction. These
    ideas clarify that the analysis or output must always provide a concise summary
    of the dataset without losing any important details. Simply said, if the derived
    result is valuable, the complexity of the data can be decreased.


    The distinctions between supervised and unsupervised machine learning are outlined
    and summarized in the table below. Additionally, it will include the widely used
    algorithms of today.


    We’ll take a quick look at each of these algorithms and discover how to use Python
    to implement them.


    ## Supervised Learning


    - Works with labeled data

    - Takes Direct feedback

    - Predicts output based on input data. Therefore also called “Predictive Algorithm”


    Some common classes of supervised algorithms include:


    - Logistic Regression

    - Linear Regression (Numeric prediction)

    - Polynomial Regression

    - Regression trees (Numeric prediction)

    - Gradient Descent

    - Random Forest

    - Decision Trees (classification)

    - K-Nearest Algorithm (classification)

    - Naive Bayes

    - Support Vector Machines


    ## Unsupervised Learning


    - Works with unlabeled data

    - No feedback loop

    - Finds the hidden structure/pattern from input data. Sometimes called as “Descriptive
    Model”


    Some common classes of unsupervised algorithms include:


    - Clustering, Compressing, density estimation & data Reduction

    - K-means Clustering (Clustering)

    - Association Rules (Pattern Detection)

    - Singular Value Decomposition

    - Fuzzy Means

    - Partial Least Squares

    - Hierarchical Clustering

    - Principal Component Analysis


    ## Reinforced education


    In that the system will learn how to behave in a particular environment and take
    actions based on that environment, this form of learning is comparable to how
    humans learn. Humans, for instance, avoid touching fire because they are aware
    that it will hurt and have been told that it will harm them. We may occasionally
    stick our fingers into a fire out of curiosity and discover that it will burn.
    This indicates that going forward, we’ll exercise caution around the fire.


    Now let’s look at some real-world applications of machine learning. It is wise
    to know what kind of machine you are dealing with.'
  mdcn: '## 确定类别。


    在分析输入数据后，机器学习模型会预测输出将属于哪个类别。在这些情况下，预测通常是一个“是”或“否”的二元响应。可以回答的问题示例包括“今天会下雨吗？”、“这是水果吗？”以及“这封电子邮件是垃圾邮件吗？”等等。这是通过利用一组数据（训练数据集）来实现的，该数据集根据特定关键词确定某封电子邮件是否属于垃圾邮件。这种方法被称为分类。


    ## 确定数量。


    在这种情况下，该技术通常用于根据各种天气变量（如温度、湿度百分比、气压等）来预测一个值，例如降雨强度。这种类型的预测被称为回归。回归方法有许多子类别，包括线性回归、多元回归等。


    ## 异常检测系统


    模型在异常检测中的任务是找出可用数据中的任何异常值。在银行和电子商务系统中，这些应用被用于标记任何异常交易。所有这些都有助于检测虚假交易。


    ## 聚类


    这些技术仍处于起步阶段，但它们具有广泛的应用潜力，有可能从根本上改变业务的开展方式。


    例如，可以根据不同的行为特征（如年龄组、居住地区，甚至喜欢观看的节目类型）将人们组织成不同的群体。因此，企业现在能够根据用户所属的群体来推荐不同的节目或节目。


    ## 机器学习系统类别


    对于传统机器，程序员会向机器提供特定的命令以及一组指令和输入参数，机器将利用这些进行计算并生成输出。然而，对于机器学习系统，系统永远不会受到程序员给出的任何指令的限制。机器将选择它可以用来准确处理数据集并确定结果的算法。这是通过使用包含先前数据和输出的训练数据集来完成的。


    因此，在传统世界中，我们会为机器提供一套如何处理数据的指令，但在机器学习设置中，我们永远不会给系统指令。为了产生输出，计算机必须与数据集交互，利用历史数据创建算法，像人类一样做出决策，并分析数据。与人类相比，计算机可以快速处理大量数据集并产生高度准确的结果。


    机器学习算法有多种形式，它们根据其预期用途进行分类。机器学习系统分为三类：


    - 监督学习

    - 无监督学习

    - 强化学习


    ## 监督学习


    这些模型将标记数据输入计算机。这样做是为了预测特定数据集（或新数据）的结果将是什么。这类算法也被称为预测算法。


    以以下表格为例：


    | 货币（标签） | 尺寸（特征） |

    |---|---|

    | 1美元 | 10克 |

    | 1欧元 | 5克 |

    | 1印度卢比 | 3克 |

    | 1俄罗斯卢布 | 7克 |


    在上表中，每种货币都有一个重量属性。在这种情况下，重量是属性或特征，而货币是标签。


    以这个训练数据集作为第一个输入，监督机器学习系统随后将预测任何包含3克的输入是1印度卢比的硬币。10克的硬币也属于同一类别。


    分类和回归分析算法属于监督机器学习的范畴。分类算法确定数据应属于哪个类别，而回归技术用于预测比赛结果或房屋价格。


    在本书的后续章节中，我们还将教你如何使用Python构建或实现这些算法，我们将更详细地介绍其中的一些算法。


    ## 无监督学习


    这些模型具有更复杂的系统，因为它们可以学习在未标记的数据中发现模式并生成输出。这种方法用于从大型数据集中提取任何重要的推论。由于它使用数据并对其进行总结以创建给定数据集的描述（或概述），因此该模型也被称为描述性模型。需要大量非结构化输入数据的数据挖掘应用程序经常使用此技术。


    例如，如果输入数据是姓名、得分和三柱门数（后两者是数字类型），你可以将数值数据显示在二维图上，并可能发现聚类。在我们的场景中，将有两个聚类，一个用于投球手，一个用于击球手。此外，还可以将特定名称与图上的每个点关联起来。当有新的输入可用时（由姓名、得分和三柱门提供），可以将其链接到两个聚类之一，以确定新输入（球员）是投球手还是击球手。


    比赛的样本数据集在表1中。这使得聚类模型可以将球员分类为投球手或击球手。


    在无监督机器学习中，使用流行的算法，包括密度估计、聚类、数据缩减和压缩。


    聚类方法以不同的方式总结和呈现数据。这种方法应用于数据挖掘软件中。当目标是显示任何大型数据集并生成有见地的摘要时，会执行密度估计。这不可避免地会引出维度和数据缩减的概念。这些概念阐明了分析或输出必须始终提供数据集的简明摘要，而不会丢失任何重要细节。简单地说，如果得出的结果有价值，数据的复杂性就可以降低。


    下表概述并总结了监督学习和无监督学习之间的区别。此外，它还将包括当今广泛使用的算法。


    我们将快速了解每种算法，并学习如何使用Python来实现它们。


    ## 监督学习


    - 处理标记数据

    - 接受直接反馈

    - 根据输入数据预测输出。因此也称为“预测算法”


    一些常见的监督算法类别包括：


    - 逻辑回归

    - 线性回归（数值预测）

    - 多项式回归

    - 回归树（数值预测）

    - 梯度下降

    - 随机森林

    - 决策树（分类）

    - K近邻算法（分类）

    - 朴素贝叶斯

    - 支持向量机


    ## 无监督学习


    - 处理未标记数据

    - 无反馈循环

    - 从输入数据中发现隐藏的结构/模式。有时称为“描述性模型”


    一些常见的无监督算法类别包括：


    - 聚类、压缩、密度估计和数据缩减

    - K均值聚类（聚类）

    - 关联规则（模式检测）

    - 奇异值分解

    - 模糊均值

    - 偏最小二乘法

    - 层次聚类

    - 主成分分析


    ## 强化学习


    这种学习形式与人类的学习方式有相似之处，即系统将学习如何在特定环境中表现并根据该环境采取行动。例如，人类避免触摸火，因为他们知道这会受伤，并且被告知这会伤害他们。我们有时可能会出于好奇将手指伸入火中，结果发现它会烧伤。这表明，今后我们会对火保持谨慎。


    现在让我们看看一些机器学习的实际应用。明智的做法是了解你正在处理的是哪种类型的机器。'

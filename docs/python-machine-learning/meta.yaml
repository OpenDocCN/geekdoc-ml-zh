  md: '# Chapter 6: Neural Networks


    The essential feature of artificial and convolutional neural networks is covered
    in this chapter. It also discusses their constituent parts, in particular the
    activation functions, how artificial neural networks are trained, as well as the
    various benefits of employing them.


    # Artificial Neural Network Definition


    A common strategy in machine learning is the deployment of artificial neural networks.
    It takes its cues from the human brain. Neural networks aim to imitate the way
    the human brain learns. The neural network system consists of input, output, and
    a hidden layer that converts data from the input layer into information that is
    helpful to the output layer. Typically, an artificial neural network has numerous
    hidden layers. An illustration of a neural network system with two hidden layers
    is shown in the image below:


    ![](img/3501b7325ec10b54bf4f8034f58413f9_59_0.png)


    Example of an artificial neural network'
  merge: -1
  pgno: 59
- img_proc: true
  md: 'Before going further and explaining how Neural Networks work, let’s first define
    what a neuron is. A neuron is simply a mathematical equation expressed as the
    sum of the weighted inputs. Let’s consider


    $$X = \{x_1, x_2, ..., x_M\}$$


    A vector of M inputs, the neuron is a linear combination of all inputs defined
    as follows:


    $$F(X = \{x_1, x_2, ..., x_M\}) = w_1x_1 + w_2x_2 + ... + w_Mx_M$$


    being the weights assigned to each input. The function F can also be represented
    as:


    $$F(X) = WX$$


    Where W is a weight matrix and X a vector of data. The second formulation is very
    convenient when programming a neural network model. The weights are determined
    during the training procedure. Training an artificial neural network means finding
    the optimal weights W that provide the most accurate output.


    To each neuron, an activation function is applied the resulted weighted sum of
    inputs X. The role of the activation function is deciding whether the neuron should
    be activated or not according to the model’s prediction. This process is applied
    to each layer of the network. In the following sub-sections, we will discuss in
    detail the role and types of activation functions as well as the different types
    of Neural Networks.


    What is the purpose of an activation function in neural network models?'
  merge: -1
  pgno: 60
- img_proc: true
  md: 'Mathematical functions are used to formulate activation functions. A model
    of an artificial neural network must have these features. An activation function
    is connected to every neuron. The decision to activate the neuron or not is made
    by the activation function. For illustration, have a look at what a neuron produces,
    which is:


    $$Y = \sum \text{weight} \times \text{input} + \text{bias}$$


    Any value may be the output Y. The reasonable range of values that Y can have
    is not known to the neuron. In order to accomplish this, the activation function
    has been incorporated into the neural network to evaluate Y values and determine
    whether or not the neural connections should regard this neuron as activated.


    Different activation functions come in various forms. The step function is the
    most natural function. If a specific threshold is exceeded, this function determines
    whether or not to activate a neuron. In other words, if Y exceeds a certain threshold,
    this function returns 1; otherwise, it returns 0. The activation function is official:


    $$F = \begin{cases} 1, & \text{if } Y > \text{threshold} \ 0, & \text{otherwise}
    \end{cases}$$


    where 1 denotes activation and 0 denotes inactivation.


    For a classification issue where the output should be yes or no (i.e., 1 or 0),
    this activation function can be employed. But it has several shortcomings. Let’s

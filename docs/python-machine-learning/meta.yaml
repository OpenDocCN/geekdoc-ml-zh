    # Sharing Parametrics'
- md: 'You may completely regulate the number of used parameters by using parameter-sharing
    strategies in your convolutional layers. You can force the neurons contained in
    each depth slice to utilize the same bias and weights if you designate a single
    two-dimensional slice of depth as your depth slice. One of every depth slice will
    be obtained using parameter-sharing procedures, and you will also obtain a unique
    set of weights. As a result, you can greatly minimize the number of parameters
    in the ConvNet’s first layer. By completing this step, your ConvNet’s neurons
    in every depth slice will use the same settings.


    In other words, each neuron in the volume will autonomously calculate the gradient
    for each of its weights during backpropagation.


    You only need to update one collection of weights per depth slice because these
    computed gradients will accumulate throughout all depth slices. By doing this,
    the weight vector for each neuron in a depth slice will be the same. As a result,
    the forward pass of the convolutional layers is computed as a convolution of the
    input volume and weights from all neurons for each depth slice. For this reason,
    the set of weights we obtain —which is convolved with your input—is referred to
    as a kernel or filter.


    However, there are some situations in which the assumption of parameter sharing
    is absurd. This is frequently the case when there are numerous input images to
    a convolutional layer that has a specific centered structure; in this situation,
    you must learn various characteristics depending on the location of your image.


    For instance, you would anticipate receiving various hair- or eye-specific traits
    when you have an input of several faces that have been centered in your image.
    These properties could be easily learned at numerous spatial positions. It is
    fairly typical to just loosen this parameter-sharing technique and employ a locally-connected
    layer in these circumstances.


    ## Multiplication of Matrix


    These dot products between the local input regions and the filters are frequently
    carried out via the convolution process. In these circumstances, one typical method
    of convolutional layer implementation is to make full use of this feature and
    formulate the primary convolutional layer’s forward passed as a single massive
    matrix multiply.


    When the local regions of an input image are entirely extended out into various
    columns during the procedure known as im2col, matrix multiplication is implemented.
    For instance, if your input is 227x227x3 and your filter is 11x11x3 with a stride
    of 4, you must extract blocks of pixels from the input that are 11x11x3 and extend
    each one into a column vector that is 363 pixels wide.


    However, if you repeat this process with a 4-stride input, you will have 55 locations,
    along with weight and height, which will result in an output matrix with x columns,
    each of which has a maximally stretched-out receptive field and a total of 3025
    fields.


    Your input volume’s numbers can be repeated in numerous separate columns. Also,
    keep in mind that the convolutional layer weights are similarly stretched out
    into certain rows. For instance, if you have 95 filters that are each 11 by 11
    by 3, you will obtain a matrix with w rows and a 96 by 363 dimension.


    When it comes to matrix multiplications, the output of your dot production of
    every filter at every location will be the same as the result of performing one
    massive matrix multiply that evaluates the dot products between every receptive
    field and between every filter. When you have your desired outcome, you must reformat
    it to fit the desired output dimension, in this example 55x55x96.


    Although this strategy is excellent, there is a drawback. Due to several replications
    of the values in your input volume, the biggest drawback is that it consumes a
    lot of memory. However, the primary advantage of multiple matrix multiplication
    implementations can enhance your model. In addition, when you conduct a pooling
    operation, this im2col can be used repeatedly.



  mdcn: '通过在卷积层中使用参数共享策略，你可以完全控制所使用参数的数量。如果你将深度的单个二维切片指定为深度切片，就可以强制每个深度切片中的神经元使用相同的偏置和权重。每个深度切片将通过参数共享程序获得，并且你还将获得一组独特的权重。因此，你可以大幅减少卷积神经网络第一层中的参数数量。完成此步骤后，你的卷积神经网络中每个深度切片的神经元将使用相同的设置。


    换句话说，在反向传播过程中，体积中的每个神经元将自主计算其每个权重的梯度。


    由于这些计算出的梯度将在所有深度切片中累积，因此你只需要为每个深度切片更新一组权重。通过这样做，深度切片中每个神经元的权重向量将是相同的。因此，卷积层的前向传播被计算为输入体积与每个深度切片中所有神经元的权重的卷积。因此，我们获得的这组权重——与你的输入进行卷积——被称为卷积核或滤波器。


    然而，在某些情况下，参数共享的假设是荒谬的。当卷积层具有特定的中心结构，并且有大量输入图像时，通常会出现这种情况；在这种情况下，你必须根据图像的位置学习不同的特征。


    例如，当你输入多张居中的人脸图像时，你会预期获得不同的头发或眼睛特定特征。这些特征可以很容易地在多个空间位置学习。在这种情况下，放宽这种参数共享技术并使用局部连接层是相当常见的。


    ## 矩阵乘法


    局部输入区域与滤波器之间的这些点积通常通过卷积过程执行。在这种情况下，卷积层实现的一种典型方法是充分利用这一特性，并将主卷积层的前向传播表述为单个大规模矩阵乘法。


    在称为 im2col 的过程中，当输入图像的局部区域被完全扩展成不同的列时，就实现了矩阵乘法。例如，如果你的输入是 227x227x3，你的滤波器是 11x11x3，步幅为
    4，你必须从输入中提取 11x11x3 的像素块，并将每个块扩展成一个宽度为 363 像素的列向量。


    然而，如果你对步幅为 4 的输入重复此过程，你将有 55 个位置（包括宽度和高度），这将导致输出矩阵有 x 列，每列都有一个最大扩展的感受野，总共有 3025
    个感受野。


    你的输入体积中的数字可以在多个单独的列中重复。另外，请记住，卷积层权重同样被扩展成某些行。例如，如果你有 95 个滤波器，每个滤波器是 11x11x3，你将获得一个具有
    w 行和 96x363 维度的矩阵。


    就矩阵乘法而言，你在每个位置对每个滤波器进行点积的输出，将与执行一次大规模矩阵乘法（该乘法评估每个感受野与每个滤波器之间的点积）的结果相同。当你得到所需的结果时，你必须重新格式化它以适应所需的输出维度，在本例中为
    55x55x96。


    尽管这个策略很好，但它有一个缺点。由于输入体积中的值被多次复制，最大的缺点是它消耗大量内存。然而，多矩阵乘法实现的主要优点可以增强你的模型。此外，当你执行池化操作时，这个
    im2col 可以重复使用。



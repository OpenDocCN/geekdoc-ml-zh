    what a neuron is. A neuron is simply a mathematical equation expressed as the
    sum of the weighted inputs. Let’s consider


    $$X = \{x_1, x_2, ..., x_M\}$$


    A vector of M inputs, the neuron is a linear combination of all inputs defined
    as follows:


    $$F(X = \{x_1, x_2, ..., x_M\}) = w_1x_1 + w_2x_2 + ... + w_Mx_M$$


    being the weights assigned to each input. The function F can also be represented
    as:


    $$F(X) = WX$$


    Where W is a weight matrix and X a vector of data. The second formulation is very
    convenient when programming a neural network model. The weights are determined
    during the training procedure. Training an artificial neural network means finding
    the optimal weights W that provide the most accurate output.


    To each neuron, an activation function is applied the resulted weighted sum of
    inputs X. The role of the activation function is deciding whether the neuron should
    be activated or not according to the model’s prediction. This process is applied
    to each layer of the network. In the following sub-sections, we will discuss in
    detail the role and types of activation functions as well as the different types
    of Neural Networks.


    What is the purpose of an activation function in neural network models?'
  - '[PAGE 61]


    Mathematical functions are used to formulate activation functions. A model of
    an artificial neural network must have these features. An activation function
    is connected to every neuron. The decision to activate the neuron or not is made
    by the activation function. For illustration, have a look at what a neuron produces,
    which is:


    $$Y = \sum \text{weight} \times \text{input} + \text{bias}$$


    Any value may be the output Y. The reasonable range of values that Y can have
    is not known to the neuron. In order to accomplish this, the activation function
    has been incorporated into the neural network to evaluate Y values and determine
    whether or not the neural connections should regard this neuron as activated.


    Different activation functions come in various forms. The step function is the
    most natural function. If a specific threshold is exceeded, this function determines
    whether or not to activate a neuron. In other words, if Y exceeds a certain threshold,
    this function returns 1; otherwise, it returns 0. The activation function is official:


    $$F = \begin{cases} 1, & \text{if } Y > \text{threshold} \ 0, & \text{otherwise}
    \end{cases}$$


    where 1 denotes activation and 0 denotes inactivation.


    For a classification issue where the output should be yes or no (i.e., 1 or 0),
    this activation function can be employed. But it has several shortcomings. Let’s
    take a collection of possible input categories (such as class1, class2,…, etc.)
    as an example. The output will be 1 for all neurons if this activation function
    is utilized when more than one neuron is activated. Because all neuron outputs
    in this scenario are 1, it is challenging to distinguish between the classes and
    determine which class the input belongs to. In other words, the step function
    does not permit classification into multiple classes or numerous output values.'
  - '[PAGE 62]


    In contrast to the step function, the linear activation function offers a variety
    of activation values. The output is computed to be proportional to the input.
    Formally:


    **F(X) = WX**


    where the input is X.


    Instead of only supporting 1 or 0, this function also accepts multiple outputs.
    This function does not allow backpropagation for model training because it is
    linear. Backpropagation is a method for updating the parameters, in particular
    the weights, by using a function derivative or gradient. The linear activation
    function’s derivative, or gradient, has a fixed value of W and is unaffected by
    changes in the input X. As a result, it does not disclose which weights applied
    to the input can produce reliable predictions.


    Additionally, when applying the linear function, all layers can be condensed into
    a single layer. The last layer is a linear function of the first layer due to
    the fact that all layers use a linear function. As a result, using more than one
    layer in a neural network serves no use because they are all equivalent to the
    first layer. The intricacy of the input data cannot be supported by a linear regression
    model, which is what a neural network with numerous layers coupled by a linear
    activation function is.


    Because relationships between the output and the input features are typically
    non-linear in real-world applications, the majority of neural networks employ
    non-linear activation functions. The irregular'
  - '[PAGE 63]


    The neural network’s functionalities enable it to map intricate patterns between
    inputs and outputs. Additionally, they enable the neural network to learn the
    intricate procedures governing complicated or high dimension input, including
    images and audio, among others. The limitations of step functions and linear functions
    can be overcome by using non-linear functions. They permit stacking several layers
    (i.e., the combination of non-linear functions is non-linear) and backpropagation
    (i.e., the derivative is not a constant and depends on the changes of the input).
    A neural network can employ a variety of non-linear functions. The most popular
    non-linear activation functions in machine learning applications will be covered
    in this book.


    # Sigmoid Operation


    One of the most popular activation functions in an artificial neural network is
    the sigmoid function. Formally, a sigmoid function is equal to the product of
    the exponential of the inputs and the inverse of the sum of one:


    $$F(X) = \frac{1}{1 + \exp(-X)}$$


    A sigmoid function’s outputs have a range between 0 and 1. The outputs, to be
    more specific, take any value between 0 and 1 and offer precise predictions. In
    fact, the value of Y is close to the curve’s edge (i.e., closer to 0 or 1) when
    the X is bigger than 2 or lower than -2.


    The drawback of this activation function is the minimal change in output for input
    values, as shown in the figure above.


    to a maximum of 4. The term “vanishing gradient” refers to an issue when the gradient
    is very minimal on the horizontal extrema of the curve. As a'
  - '[PAGE 64]


    result, sigmoid neural networks learn relatively slowly as they get closer to
    the edges and are computationally expensive.


    # The tanh process


    Another activation function that is employed that is comparable to the sigmoid
    function is the tanh function. This function’s mathematical description is as
    follows:


    $$F(X) = \tanh(X) = \frac{2}{1 + \exp(-2X)} - 1$$


    The scaled sigmoid function describes this function. As a result, it shares the
    sigmoid function’s properties. The gradient of this function is more prominent
    than the gradient of the sigmoid function, although its outputs span from -1 to
    1. The tanh function is zero-centered, unlike the sigmoid function, which makes
    it ideal for inputs with negative, neutral, and positive values. Similar to the
    sigmoid function, this function has the problem of vanishing gradients and is
    computationally expensive.


    # The ReLu feature


    Another popular and effective activation function is the Rectified Linear Unit
    function, sometimes referred to as the ReLu function. Compared to the sigmoid
    and tanh functions, this function is effective and enables the neural network
    to converge fast. This is due to the fact that it uses straightforward mathematical
    formulations. If X is positive, ReLu outputs X; else, 0 is returned. This activation
    function is described in formal terms as


    $$F(X) = \max(0, X)$$


    This activation function accepts values between 0 and +inf and is not bounded.
    The ReLu function has a derivative even though it resembles a'
- md: 'linear function in shape (i.e., this function equals zero for positive values).
    The ReLU has the flaw that when the inputs are negative, the derivative (i.e.,
    the gradient) is 0. This indicates that the backpropagation cannot be processed
    for linear functions.


    And without inputs greater than 0, the neural network cannot learn. The dying
    ReLU problem refers to the ReLU feature where the gradient is equal to 0 when
    the inputs are negative.


    Two ReLU variants, the Leaky ReLU function, and the Parametric ReLU function,
    can be utilized to avoid the dying ReLU problem. The maximum of X and X by 0.1
    is the output of the Leaky ReLU function. In other words, when X is greater than
    0, the Leaky ReLU equals the identity function, and when X is lower than 0, it
    equals the product of 0.1 and X. The following service is offered:


    F(X) = max(0.1X, X)


    This function supports backpropagation for negative values since it has a tiny
    positive gradient (0.1) when X contains negative values. It might not, however,
    offer a reliable forecast for these negative values.


    The Leaky ReLU function, which uses the gradient as a parameter to the neural
    network to define the output when X is negative, is comparable to the Parametric
    ReLU function. This function’s mathematical description is as follows:


    F(X) = max(aX, X)


    The exponential linear ReLU function is one of several versions of the ReLU function.
    The log curve for negative values of X is used in this function rather than the
    linear curves used in the Leaky ReLU and the Parametric ReLU functions, which
    are the other two versions of the ReLU. This function’s drawback is that it saturates
    for very large negative values of X. There are more variations that share the
    fundamental idea of defining a gradient as larger than zero when X has negative
    values.


    ## The Softmax component


    A different kind of activation function than the one just described is the Softmax
    function. When it’s necessary to divide the inputs into numerous classes, this
    function is often only applied to the output layer. In fact, the Softmax function
    offers the likelihood of input to multiple classes and supports belong to a certain
    group. To calculate the likelihood, it first normalizes the outputs of each category
    between 0 and 1, then divides them by the sum of those outputs.


    Which of these activation functions, each of which has advantages and disadvantages,
    should be applied to a neural network? The response is that especially if the
    properties of the function being approximated are known beforehand, merely having
    a better understanding of the problem at hand will help direct into a certain
    activation function. For a classification issue, a sigmoid function is an excellent
    option. It is strongly advised to start with a ReLU function rather than attempting
    alternative activation functions if the type of the function being approximated
    is uncertain. Overall, a variety of applications benefit from the ReLU feature.
    You could use your activation function to participate in the ongoing research.


    The sparsity of the activation is a crucial consideration when selecting an activation
    function. Not all neurons are activated in a sparse population. This is a beneficial
    feature in a neural network since it speeds up learning and reduces the risk of
    overfitting. Imagine a vast neural network with many neurons, all of which are
    processed to describe the output if all of them are triggered. Because of this,
    processing the neural network requires a lot of computation. Since practically
    all neurons are activated by the sigmoid and tanh activation functions, they are
    computationally less effective than the ReLU function and its variants, which
    inactivate some negative values. Because of this, it is advised to begin by approximating
    a function with known features using the ReLU function.


    ## What different kinds of artificial neural networks are there?


    There are numerous types of artificial neural networks, each with unique characteristics
    and levels of complexity. The perceptron is the earliest and most basic neural
    network ever created. The output layer receives the result from the perceptron
    after it has added up the inputs and applied an activation function.


    The feedforward neural network is another dated and straightforward method. There
    is only one layer in this particular artificial neural network type. It is a category
    that has complete connectivity to the layer below, where each node is connected
    to every other node. Through the hidden layer, it propagates information in a
    single way from the inputs to the outputs. The front propagating wave, which often
    employs the activation function, is the technical term for this phenomenon. Each
    layer’s node’s data is processed by this activation function. This neural network
    outputs a weighted sum of the inputs computed using the activation function of
    the hidden layer. The backpropagation method and the logistic function are typically
    used in feedforward neural network training and activation, respectively.


    This kind of network is a derived type of several other Neural Networks. The radial-basis-function
    Neural Networks, as an illustration. With this feedforward neural network, the
    logistic function is replaced by the radial basis function. This kind of neural
    network contains two layers, the inner layer of which combines the radial basis
    function with the features. Each point’s distance from the relative center is
    calculated using the radial function. For calculating the distance from the target
    value for continuous variables, this neural network is helpful.


    The logistic function, in contrast, is used to map any binary value, such as yes
    or no (0 or 1). A multilayer feedforward neural network is a deep feedforward
    network. Since they produce better results, they have become the most often utilized
    type of neural network in machine learning. From these varieties of Neural Networks,
    a brand-new learning paradigm known as Deep Learning has developed.


    Another category that employs various node types is recurrent neural networks.
    Each hidden layer processes the information for the subsequent layer, much like
    a feedforward neural network. Outputs from concealed layers are nonetheless saved
    and processed back to the top layer. The input layer’s first layer is processed
    as the product of the weighted features added together. The recurrent process
    is used in layers that are not visible. Every node will save data from the preceding
    phase at each step. While the computation is underway, memory is used. In order
    to enhance the predictions, the recurrent neural network uses forward propagation
    and backpropagation to self-learn from the prior time steps. In contrast to feedforward
    neural networks, information is processed in two ways here.


    A neural network with three or more layers is known as a multilayer perceptron
    or multilayer neural network. Every node in this group of networks is connected
    to every other node in the layers below, making them fully connected.


    Convolutional neural networks are frequently helpful for classifying or identifying
    images. This particular artificial neural network’s processing is made to handle
    pixel data. Convolutions, which operate as filters for neuron activation, are
    the foundation of multi-layer convolutional neural networks. The same feature
    is activated when the same filter is applied to a neuron, creating what is known
    as a feature map. The strength and significance of a feature in the input data
    are reflected in the feature map.


    Multiple connected neural networks combine to build modular neural networks. These
    networks rely on the “divide and conquer” strategy. They are useful for solving
    extremely complicated issues because they let different kinds of neural networks
    be combined. As a result, they enable the combination of the advantages of several
    neural networks to address complicated problems where each neural network is capable
    of handling a particular task.


    ## An Artificial Neural Network’s training procedure


    Neural networks compute a weighted total of inputs and apply an activation function
    at each layer, as was stated at the beginning of this chapter. The output layer
    is then given the end result. Forward propagation is a frequent name for this
    process. Weights must be tuned in order to create the most accurate outputs when
    training these artificial neural networks. The following steps are involved in
    training an artificial neural network:


    - Set the weights at zero

    - Use the process of forward propagation

    - Assess the effectiveness of the neural network

    - Use the backward propagation technique

    - Refresh the weights

    - Continue with steps 2 through 6 until the maximum number of iterations is reached
    or neural network performance is not enhanced.'
  mdcn: '线性函数在形状上（即，该函数对正值等于零）。ReLU 的缺陷在于，当输入为负时，导数（即梯度）为 0。这表明无法对线性函数进行反向传播。


    并且，如果没有大于 0 的输入，神经网络就无法学习。死亡 ReLU 问题指的是当输入为负时，ReLU 特征的梯度等于 0。


    可以使用两种 ReLU 变体，即 Leaky ReLU 函数和 Parametric ReLU 函数，来避免死亡 ReLU 问题。Leaky ReLU 函数的输出是
    X 和 0.1X 中的最大值。换句话说，当 X 大于 0 时，Leaky ReLU 等于恒等函数；当 X 小于 0 时，它等于 0.1 与 X 的乘积。其表达式如下：


    F(X) = max(0.1X, X)


    该函数支持对负值进行反向传播，因为当 X 包含负值时，它具有一个微小的正梯度（0.1）。然而，它可能无法为这些负值提供可靠的预测。


    Leaky ReLU 函数与 Parametric ReLU 函数类似，后者使用梯度作为神经网络的一个参数来定义当 X 为负时的输出。该函数的数学描述如下：


    F(X) = max(aX, X)


    指数线性 ReLU 函数是 ReLU 函数的几种版本之一。该函数对负值的 X 使用对数曲线，而不是 Leaky ReLU 和 Parametric ReLU
    函数中使用的线性曲线。该函数的缺点是，对于非常大的负值 X，它会饱和。还有更多变体共享一个基本思想，即当 X 为负值时，将梯度定义为大于零。


    ## Softmax 组件


    Softmax 函数是一种与上述不同的激活函数。当需要将输入划分为多个类别时，该函数通常仅应用于输出层。实际上，Softmax 函数提供了输入属于多个类别的可能性，并支持其属于某个特定组。为了计算可能性，它首先将每个类别的输出归一化到
    0 和 1 之间，然后将它们除以这些输出的总和。


    这些激活函数各有优缺点，应该将哪一种应用于神经网络？答案是，特别是如果事先知道被逼近函数的特性，仅仅更好地理解手头的问题将有助于指导选择某种激活函数。对于分类问题，sigmoid
    函数是一个很好的选择。如果被逼近函数的类型不确定，强烈建议从 ReLU 函数开始，而不是尝试其他激活函数。总的来说，ReLU 特征在各种应用中都有益处。你可以使用你的激活函数参与正在进行的研究。


    激活的稀疏性是选择激活函数时的一个关键考虑因素。在稀疏群体中，并非所有神经元都被激活。这是神经网络中的一个有益特征，因为它可以加速学习并降低过拟合的风险。想象一个拥有许多神经元的庞大神经网络，如果所有神经元都被触发，那么所有神经元都会被处理以描述输出。因此，处理神经网络需要大量的计算。由于
    sigmoid 和 tanh 激活函数几乎激活所有神经元，因此它们在计算上不如 ReLU 函数及其变体有效，后者会使一些负值失活。因此，建议首先使用 ReLU
    函数来逼近具有已知特性的函数。


    ## 有哪些不同种类的人工神经网络？


    人工神经网络有多种类型，每种都有独特的特性和复杂程度。感知器是有史以来最早、最基本的神经网络。感知器将输入相加并应用激活函数后，将结果传递给输出层。


    前馈神经网络是另一种过时且简单的方法。这种特定的人工神经网络类型只有一层。它是一个完全连接到下一层的类别，其中每个节点都连接到其他每个节点。它通过隐藏层以单向方式将信息从输入传播到输出。这种现象的技术术语是前向传播波，通常使用激活函数。该激活函数处理每一层节点的数据。该神经网络输出使用隐藏层激活函数计算的输入的加权和。反向传播方法和逻辑函数通常分别用于前馈神经网络的训练和激活。


    这种网络是其他几种神经网络的派生类型。例如，径向基函数神经网络。在这种前馈神经网络中，逻辑函数被径向基函数取代。这种神经网络包含两层，其内层将径向基函数与特征相结合。径向函数计算每个点到相对中心的距离。该神经网络有助于计算连续变量到目标值的距离。


    相比之下，逻辑函数用于映射任何二进制值，例如是或否（0 或 1）。多层前馈神经网络是一种深度前馈网络。由于它们产生更好的结果，它们已成为机器学习中最常用的神经网络类型。从这些神经网络的变体中，发展出了一种名为深度学习的全新学习范式。


    另一类使用不同节点类型的是循环神经网络。每个隐藏层处理下一层的信息，就像前馈神经网络一样。然而，隐藏层的输出会被保存并处理回顶层。输入层的第一层被处理为加权特征相加的乘积。在不可见层中使用循环过程。在每个步骤中，每个节点将保存前一阶段的数据。在计算进行时，会使用内存。为了增强预测，循环神经网络使用前向传播和反向传播从先前的时间步进行自我学习。与前馈神经网络不同，信息在这里以两种方式处理。


    具有三层或更多层的神经网络称为多层感知器或多层神经网络。这组网络中的每个节点都连接到下层中的每个其他节点，因此它们是完全连接的。


    卷积神经网络通常对分类或识别图像很有帮助。这种特定的人工神经网络的处理旨在处理像素数据。卷积作为神经元激活的过滤器，是多层卷积神经网络的基础。当相同的过滤器应用于神经元时，会激活相同的特征，从而创建所谓的特征图。特征图反映了输入数据中特征的强度和重要性。


    多个连接的神经网络组合在一起构建模块化神经网络。这些网络依赖于“分而治之”的策略。它们对于解决极其复杂的问题非常有用，因为它们允许结合不同类型的神经网络。因此，它们能够结合多种神经网络的优势来解决每个神经网络都能处理特定任务的复杂问题。


    ## 人工神经网络的训练过程


    如本章开头所述，神经网络在每一层计算输入的加权总和并应用激活函数。然后将最终结果传递给输出层。这个过程通常被称为前向传播。在训练这些人工神经网络时，必须调整权重以产生最准确的输出。训练人工神经网络涉及以下步骤：


    -   将权重设置为零

    -   使用前向传播过程

    -   评估神经网络的有效性

    -   使用反向传播技术

    -   刷新权重

    -   继续执行步骤 2 到 6，直到达到最大迭代次数或神经网络性能不再提高。'

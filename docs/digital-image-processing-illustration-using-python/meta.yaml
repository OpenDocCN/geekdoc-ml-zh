    $$Z(k,l) = F(k,l) + KF(k,l)H_{hp}(k,l)$$ (4.33)


    The above equation can be expressed as


    $$Z(k,l) = F(k,l)\left[1 + KH_{hp}(k,l)\right]$$ (4.34)


    The constant "K" can be split as


    $$Z(k,l) = F(k,l)\left[K_1 + K_2H_{hp}(k,l)\right]$$ (4.35)



- img_proc: true
  md: 'In the above expression, "k" represents the curvature of the curve which makes
    it smoother, the parameter V₀ controls the shrinking or expansion of the curve,
    ∇ψ is the gradient of the level-set "ψ". The term c(k + V₀) determines the speed
    of the curve''s evolution along its normal direction. The expression for the factor
    "c" in Eq. (7.40) is given by


    $$c = \frac{1}{1 + |\nabla(G_\sigma * I)|}$$ (7.41)


    In the above expression, ∇(G_σ * I) is the gradient of the Gaussian blurred image.
    An additional term is included in Eq. (7.40) to pull back the curve in case it
    overpasses a weak object boundary. After including the addition term Eq. (7.40)
    is given by


    $$\frac{\partial \psi}{\partial t} = c(k + V_0)|\nabla \psi| + \nabla c \nabla
    \psi$$ (7.42)


    Morphological geodesic active contour algorithm has four parameters, namely, (1)
    Preprocessed image, (2) Balloon force, (3) Smoothing parameter, and (4) Number
    of iterations. The inverse Gaussian gradient operator is used to preprocess the
    image. The balloon force is used to inflate or deflate the initial contour towards
    the edges of the image. Smoothing parameter is used to convert the jagged lines
    into a curve. The algorithm iteratively alters the initial contour to move towards
    the actual contour of the image.


    The advantage of geodesic active contour model is its ability to change a curve''s
    topology in accordance with the shape of the object during the curve evolution
    process. Geodesic active contour model is useful in applications like object tracking
    and motion detection.



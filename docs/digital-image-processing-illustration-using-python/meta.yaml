  md: '# ## 2.8 Application of Correlation


    Template matching is one of the applications of autocorrelation function. The
    template is basically a subimage that contains the shape or the object one wishes
    to find in an image. The process of searching the template within an input image
    is called as "template matching".


    Figure 2.27 has a source image with different shapes such as triangle, pentagon,
    square, and hexagon. The template is basically a subimage; in this illustration,
    it is a square shape. The objective is to find where exactly in the source image
    the template matches, which is termed as template matching. The process involves
    moving the template over the source image and noting the positions at which a
    match occurs.


    Let the source image be denoted by $s[m, n]$ and the template be represented by
    $t[m, n]$. The objective is to minimize the energy that will lead to the matching
    of the template over the source image. The energy to be minimized is expressed
    as


    $$E[i,j] = \sum_m \sum_n (s[m,n] - t[m-i, n-j])^2 \qquad (2.15)$$


    The above equation can be expanded as


    $$E[i,j] = \sum_m \sum_n (s^2[m,n] + t^2[m-i, n-j] - 2s[m,n]t[m-i, n-j]) \qquad
    (2.16)$$


    Minimizing the energy is now equivalent to maximizing the term $2s[m,n]t[m-i,
    n-j]$ in the above expression. The expression


    $$R_{st}[i,j] = \sum_m \sum_n s[m,n]t[m-i, n-j] \qquad (2.17)$$


    The above expression is the cross-correlation between the source image and the
    template. The template will be matched with the source image in the location where
    cross-correlation is the maximum value. Normalized cross-correlation is considered
    if the template matching has to be insensitive to changes in brightness. The expression
    for normalized cross-correlation is given by


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_139_0.png)'

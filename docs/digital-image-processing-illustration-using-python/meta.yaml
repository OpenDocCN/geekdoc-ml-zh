  md: 'The above equation can be written in the matrix form, we get


    $$E(x,y) = \sum_{m,n} w(m,n) \begin{bmatrix} x & y \end{bmatrix} \begin{bmatrix}
    I_m^2 & I_m I_n \ I_m I_n & I_n^2 \end{bmatrix} \begin{bmatrix} x \ y \end{bmatrix}$$
    (8.37)


    The above equation can be rewritten as


    $$E(x,y) = \begin{bmatrix} x & y \end{bmatrix} \sum_{m,n} w(m,n) \begin{bmatrix}
    I_m^2 & I_m I_n \ I_m I_n & I_n^2 \end{bmatrix} \begin{bmatrix} x \ y \end{bmatrix}$$
    (8.38)


    For small shifts [x, y], using a bilinear approximation,


    $$E(x,y) \cong \begin{bmatrix} x & y \end{bmatrix} M \begin{bmatrix} x \ y \end{bmatrix}$$
    (8.39)


    where M is a 2 × 2 matrix computed from image derivatives, which represented as


    $$M = \sum_{m,n} w(m,n) \begin{bmatrix} I_m^2 & I_m I_n \ I_m I_n & I_n^2 \end{bmatrix}$$
    (8.40)


    Note that the change of intensity measure *E* is closely related to the local
    autocorrelation function, with *M* denotes shape at the origin. Let λ₁ and λ₂
    be the eigenvalues of *M*. λ₁ and λ₂ will be proportional to the principal curvatures
    of the local autocorrelation function and form a rotationally invariant description
    of *M*. The following three cases are to be considered:


    +   1. If both curvatures are small, the local correlation function is flat, and
    then the windowed image portion is of approximately constant intensity values.
    Here, arbitrary shifts of the image patch cause little change in the intensity
    measure *E*.

    2. If one curvature is high and the other one is low, the local autocorrelation
    is ridge-shaped and then only shifts along the edge; it indicates an edge.

    3. If both curvatures are high, the local autocorrelation function sharply peaks
    and then shifts in any direction will, increase measure *E*. This highlights a
    corner.


    The above discussions are illustrated in Fig. 8.42.



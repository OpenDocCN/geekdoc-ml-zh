    \ lightness or darkness of the image. Contrast is the difference in brightness\
    \ between regions of the image.\n3. Simultaneous contrast is a phenomenon in which\
    \ a gray patch looks lighter when it is next to a darker patch. It is a phenomenon\
    \ that manifests when two similar colours mutually influence one other, changing\
    \ the way one perceives them.\n4. For an 8-bit image, the expression for image\
    \ negative is given by $y[m, n] = 255 - x[m, n]$. Image negative is also termed\
    \ as an inversion of gray level values in a digital image whose operation is similar\
    \ to that of NOT gate in digital electronics.\n5. Histogram of an image is a plot\
    \ of gray level values versus the number of pixels at that value. Shape of the\
    \ histogram gives information about the nature of the image.\n   (i) Very narrow\
    \ histogram implies that the image could be low-contrast image.\n   (ii) Histogram\
    \ with widespread corresponds to high-contrast image.\n   (iii) Histogram skewed\
    \ towards higher end of gray level indicate that the image is a bright image.\n\
    \   (iv) Histogram skewed towards lower end of gray level indicate that the image\
    \ is a dark image.\n6. Yes, multiple images can have same histogram. Histogram\
    \ gives the frequency of occurrence of the gray level. It does not convey information\
    \ related to the location of the pixel. Hence, multiple images can have the same\
    \ histogram.\n7. From the histogram, it is not possible to derive the image in\
    \ a unique way, because multiple images can have the same histogram.\n8. A high-pass\
    \ filter is basically a change detector that will not preserve the background\
    \ information, which is normally smooth or has many low-frequency components.\
    \ A high-boost filter is a high-frequency emphasis filters that will preserve\
    \ the background information in the digital image.\n9. An idempotent operation\
    \ is an operation that can be performed multiple times without changing the result\
    \ beyond the initial application. Histogram equalization result will not alter\
    \ beyond the initial application even if it is repeated many times, hence it is\
    \ considered as an idempotent operation.\n10. When a grayscale image is fed to\
    \ thresholding operation, binary image will be obtained as the output. Thresholding\
    \ is basically a logical operation that gives binary result.\n11. Averaging filter\
    \ or mean filter has the tendency to smooth the edges of the image that will result\
    \ in blurring of the image. Averaging filter is a tool to minimize the impact\
    \ of additive noise in digital image. Even though it has the tendency to blur\
    \ the image, it has the ability to minimize the impact of additive noise, hence\
    \ it is preferred."

  md: '# ### 11.4.9 Random Forest Algorithm


    Random forest is a supervised machine learning algorithm that can be used for
    classification and regression. The basic concept of the random forest algorithm
    is based on ensemble learning. It is a process of combining multiple classifiers
    to solve a complex problem and to improve the performance of the model. The name
    of random forest suggests that it is a classifier that contains a number of decision
    trees on various subsets of the given dataset and takes the average to improve
    the predictive accuracy of that dataset. That is, the decision tree algorithm
    contains a single tree, whereas the random forest takes the prediction from each
    decision tree and is based on the majority votes of predictions, which gives a
    final output. Therefore, the higher number of trees in the forest leads to higher
    accuracy and prevents the problem of overfitting. The block diagram of the random
    forest algorithm is shown in Fig. 11.40.


    From Fig. 11.40, it is possible to observe that the input dataset is divided into
    M number of training sets, and each training set is applied to the decision tree
    algorithm. The output of each decision tree is used for the majority voting to
    identify the class. The majority class will be the final output of the random
    forest algorithm.


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_785_0.png)


    **Fig. 11.40** Flowchart of the random forest algorithm'

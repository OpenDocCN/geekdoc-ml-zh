  md: 'Equation (5.59) is a maximization problem and it is converted into a minimization
    problem, the above equation can be rewritten as


    $$z^* = \underset{|z| \leq 1}{\text{argmin}} z^T D D^T z - \frac{4}{\lambda} z^T
    D y$$ (5.60)


    To obtain the optimum value of $z^*$, differentiating the above equation with
    respect to "$z$" and equating the result it to zero, we get


    $$\frac{\partial z^*}{\partial z} = 2 D D^T z - \frac{4}{\lambda} D y = 0$$ (5.61)


    and


    $$D D^T z = \frac{2}{\lambda} D y$$ (5.62)


    Solving Eq. (5.62) requires a potentially large system of linear equations and,
    furthermore, does not yield a solution "$z$" satisfying the constraint $|z| \leq
    1$. Therefore, to find "$z$", this problem has to be treated as a constraint minimization
    problem and it can be achieved by using majorization–minimization approach. Hence,
    let us consider the function in Eq. (5.60) as


    $$A(z) = z^T D D^T z - \frac{4}{\lambda} z^T D y$$ (5.63)


    And setting "$z^{(i)}$" as point of coincidence, a separable majorizer of $A(z)$
    by adding the non-negative function, $(z - z^{(i)})^T (\alpha I - D D^T)(z - z^{(i)})$
    to $A(z)$, we get


    $$A(z) + \left(z - z^{(i)}\right)^T \left(\alpha I - D D^T\right) \left(z - z^{(i)}\right)$$
    (5.64)


    where $\alpha$ is greater than or equal to the maximum eigenvalue of $D D^T$.
    Using the majorization–minimization method, the update equation for "$z$" is given
    by


    $$z^{(i+1)} = \underset{|z| \leq 1}{\text{argmin}} A(z) + \left(z - z^{(i)}\right)^T
    \left(\alpha I - D D^T\right) \left(z - z^{(i)}\right)$$ (5.65)


    Simplifying the above equation, we get


    $$z^{(i+1)} = \underset{|z| \leq 1}{\text{argmin}} z z^T - 2\left(\frac{1}{\alpha}
    D \left(\frac{2}{\lambda} y - D^T z^{(i)}\right) + z^{(i)}\right)^T z$$ (5.66)


    To find the optimum value of "$z$" with the constraint of $|z| \leq 1$, first
    let us consider the scalar form of above equation, we get


    $$J_1(z) = \underset{|z| \leq 1}{\text{argmin}} z^2 - 2 b z$$ (5.67)'

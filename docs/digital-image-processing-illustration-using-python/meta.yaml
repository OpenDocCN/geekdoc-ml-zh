  md: '+   4. (a) Non-maxima suppression: Non-maximum suppression is used to thin
    out the edges. The image is scanned along the image gradient direction, and if
    pixels are not part of the local maxima they are set to zero. (b) Hysteresis thresholding:
    Hysteresis Thresholding is achieved by setting the lower and upper threshold values.
    Any edges with an intensity gradient above the upper threshold are sure to be
    edges, and those below the lower threshold are sure to be non-edges, so they are
    discarded. Those who lie between these two thresholds are classified as edges
    or non-edges based on their connectivity. If they are connected to "sure-edge"
    pixels, they are considered to be part of edges.


    +   5. Active contour is based on deforming an initial contour towards the boundary
    of the object to be detected. The deformation is obtained by trying to minimize
    a functional design such that minimum is obtained at the boundary of the object.
    The energy functional is basically composed of two components: one controls the
    smoothness of the curve, and another attracts the curve towards the boundary.


    +   6. The basic idea in active contour is to initialize a position for the contour,
    then define image forces acting on the contour, making it change its position
    and adapt to the image features. Active contour is an energy-minimization method
    of image segmentation. The minimization of the energy leads to dynamic behaviour
    in the segmentation, and because of the way the contours slither while minimizing
    energy, the active contour method is also termed as a "snake" algorithm.


    +   7. The advantages of active contour over conventional image segmentation are.


    (a) After proper initialization, the active contour or snake converges iteratively
    to an energy minimum state.


    (b) Energy minimization from a coarse to fine in scale space can enlarge the capture
    region around the features of interest and decrease the computational complexity.


    The drawbacks of active contour method are


    +   (a) Careful initialization of the contour is necessary to get the desired
    result. Generally, the initial contour must be close enough to the true contour.
    Snakes cannot automatically split or merge based on changes in the topology of
    the image.


    (b) The active contour model cannot handle topological changes, making it difficult
    to extract multiple objects in an image.


    (c) Active contour algorithm is sensitive to noise. The noise can attract the
    active contour, deviating it from the actual contour.



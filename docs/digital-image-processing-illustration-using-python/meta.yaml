    # Filtering the image

    import cv2

    import matplotlib.pyplot as plt

    import numpy as np

    #Step 1: Reading the input image

    img=cv2.imread(''A.png'',0)

    #Step 2: Adding noise to the input image

    mean,variance=0,1000

    sigma=np.sqrt(variance)

    gauss = np.random.normal(mean, sigma, img.shape)

    img_noise=img+gauss

    #Step 3: Defining different mask size

    size1,size2=5,11

    kernel1=np.ones((size1, size1)) / (size1 ** 2)

    kernel2=np.ones((size2, size2)) / (size2 ** 2)

    #Step 4: Filtering the noisy image

    img_filt1=cv2.filter2D(img_noise,-1,kernel1)

    img_filt2=cv2.filter2D(img_noise,-1,kernel2)


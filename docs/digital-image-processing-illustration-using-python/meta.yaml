    # ### 11.6.11 *CycleGAN*


    CycleGAN (Cycle-Consistent Generative Adversarial Network) is a type of GAN architecture
    designed for unsupervised image-to-image translation. It enables the conversion
    of images from one domain to another (e.g. Horses to Zebras, Summer to Winter
    landscapes) without requiring paired examples for training. This is particularly
    useful in situations where paired data is unavailable or impractical to collect.


    CycleGAN is designed to transfer the characteristics of one set of images to another
    or map the distribution of images from one domain to another. It frames the task
    as an image reconstruction problem. First, an input image (*X*) is processed through
    a generator "*G*" to create a translated version. Then, this translated image
    is passed through another generator "*F*" to reconstruct the original image. The
    mean squared error (MSE) loss is calculated between the original image and its
    reconstruction to evaluate the quality of the process. A key feature of CycleGAN
    is its ability to perform image translation with unpaired datasets, where no direct
    correspondence exists between the input and output images.


    There are two key features of Cycle GAN as compared to Vanilla GAN. Those are
    as follows. Unlike traditional GANs, which require paired images (e.g. a horse
    image and its zebra equivalent), CycleGAN learns the mapping between two image
    domains (e.g. horses and zebras) using unpaired datasets. The core innovation
    of CycleGAN lies in its cycle consistency loss. It ensures that when an image
    from domain "*A*" is translated to domain "*B*" and then back to domain "*A*",
    the resulting image should closely resemble the original. This constraint stabilizes
    the training'
  - '[PAGE 860]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_860_0.png)


    **Fig. 11.91** Training procedure for CycleGAN


    process and preserves essential details. CycleGAN is a powerful framework for
    unsupervised image-to-image translation, leveraging adversarial training and cycle
    consistency to achieve remarkable results in unpaired datasets. Its flexibility
    and versatility make it a popular choice for tasks spanning art, medical imaging,
    and data augmentation. The training procedure of CycleGAN is illustrated in Fig.
    11.91.


    CycleGAN consists of two main components: a generator and a discriminator. The
    generator''s role is to produce samples that mimic the desired distribution, while
    the discriminator''s job is to distinguish whether a given sample is from the
    actual distribution (real) or generated by the generator (fake). The basic difference
    between the CycleGAN apart from Vanilla GAN architectures is its use of two mapping
    functions ($G$ and $F$), which serve as generators, along with their corresponding
    discriminators ($D_B$ and $D_A$). These mapping functions are defined as:


    $$G: X \rightarrow Y \quad \text{and} \quad F: Y \rightarrow X, G: X \rightarrow
    Y \qquad (11.22)$$


    Here, $X$ represents the input image distribution, and $Y$ denotes the target
    output distribution. The discriminators corresponding to these mappings are designed
    to evaluate the authenticity of samples in their respective domains.


    # ### Cycle GAN Architecture


    The CycleGAN architecture consists of two generators and two discriminators. The
    first generator ($G$) transforms images from domain A to domain B and the second
    generator ($F$) transforms images from domain B to domain A. Similarly, the first
    discriminator ($D_B$) distinguishes real images from domain B and fake images
    generated by $G(G(A))$. The second discriminator ($D_A$) distinguishes real images
    from domain A and fake images generated by $F(F(B))$.


    The CycleGAN framework combines several loss functions to achieve its objectives:
    They are (1) adversarial loss, (2) cycle consistency loss, and (3) total loss.


    +   1. **Adversarial Loss**: Each generator aims to produce images that can fool
    the corresponding discriminator, while each discriminator learns to distinguish
    between real and fake images. The adversarial loss function is given by


    $$L_{\text{GAN}}(G, D_B, A, B) = E_{b \sim p_{data}(b)}\left[\log D_B(b)\right]
    + E_{a \sim p_{data}(a)}\left[1 - \log D_B(G(a))\right] \quad (11.23)$$'
  - '[PAGE 861]


    Similarly, FF and DAD_A have their adversarial loss.


    +   2. Cycle Consistency Loss: Ensures that the translation process preserves
    the original content. This is achieved by minimizing the discrepancy between the
    original image and the image reconstructed after a round-trip translation.


    $$L_{cyc}(G, F) = E_{a \sim pdata(a)}\Big[F\big(G(a)\big) - a_1\Big] + E_{b \sim
    pdata(b)}\Big[G\big(F(b)\big) - b_1\Big]$$ (11.24)


    +   3. Total Loss: The total objective combines adversarial loss and cycle consistency
    loss, which is mathematically written as


    $$L(G, F, DA, DB) = L_{GAN}(G, DB, A, B) + L_{GAN}(G, DA, B, A) + \lambda L_{cyc}(G,
    F)$$ (11.25)


    where $\lambda$ is a weight factor that balances the two losses.


    # **Training Process of CycleGAN**


    The training process of the cycle GAN is as follows:


    +   **Step 1:** Initialization: Two generators, $G$ and $F$, and two discriminators,
    DAD_A and DBD_B, are initialized. Random noise or real images are used as inputs
    to the generators.


    +   **Step 2:** Adversarial training: Generators $G$ and $F$ are trained to produce
    images that can deceive discriminators DBD_B and DAD_A, respectively. Discriminators
    are trained to improve their ability to classify real and fake images.


    +   **Step 3:** Cycle consistency: For each input image, the round-trip consistency
    is enforced by minimizing the cycle consistency loss.


    +   **Step 4:** Iterative updates: The generator and discriminator networks are
    updated alternately in a competitive process until convergence.


    # **Advantages of Cycle GAN**


    +   - No Need for Paired Data: CycleGAN is highly effective in scenarios where
    collecting paired datasets is infeasible.


    +   - Cycle Consistency: Ensures that the transformation preserves the semantic
    content of the original image.


    +   - Versatility: Can be applied across various domains, including medical imaging,
    art, and data augmentation.


    # *11.6.12 StyleGAN*


    StyleGAN (Style Generative Adversarial Network) is an advanced variant of GANs
    that focuses on generating high-quality images with controllable visual features.
    It was introduced by NVIDIA in 2018 and has since become a popular tool for generating
    realistic images, such as human faces, artworks, and more. The key feature of
    StyleGAN is its ability to generate images by separating different levels of control,'
  - '[PAGE 862]


    allowing for greater flexibility in controlling fine-grained visual aspects, such
    as facial features, background, and overall style.


    The StyleGAN algorithm follows four major steps:


    +   **Step 1:** Separation of Latent Space: StyleGAN introduces a new approach
    to manipulating the latent space, where instead of directly mapping a random noise
    vector to the output, the model operates in a hierarchical manner by controlling
    different aspects of image generation at multiple layers.


    +   **Step 2:** Style Modulation: In StyleGAN, the input latent vector "z" is
    first mapped to an intermediate latent space "w", which is then used to modulate
    the feature maps in the generator at different scales. This modulation, known
    as "style", allows the model to control different levels of image attributes.


    +   **Step 3:** Progressive Growing: StyleGAN uses a technique called progressive
    growing, where the network starts by generating low-resolution images and gradually
    increases the resolution during training. This process helps improve the quality
    of generated images by allowing the model to learn coarse features first before
    refining them at higher resolutions.


    +   **Step 4:** Adaptive Instance Normalization (AdaIN): To apply style at each
    layer, StyleGAN uses AdaIN, a method that normalizes feature maps at each layer
    of the generator by scaling and shifting them using parameters derived from the
    latent vector "w". This allows the model to control the style of the generated
    image at different levels of detail, leading to more refined control over the
    final output.


    StyleGAN consists of two main components: the Generator and the Discriminator.
    However, the generator in StyleGAN operates differently compared to the other
    versions of the GANs due to the style-based approach. The architecture of StyleGAN
    is shown in Fig. 11.92.


    **Generator:** The generator takes in a latent vector "z" and processes it through
    a mapping network, which outputs an intermediate latent vector "w". This vector
    is then used to modulate the feature maps in the generator. The generator''s architecture
    progressively adds layers to produce higher-resolution images. Key features include:


    +   - Mapping Network: Transforms the random noise vector z into an intermediate
    latent space w.


    +   - Style Modulation: The intermediate latent vector w is used to modulate the
    features at each layer, allowing for control over the generated image''s style.


    +   - Progressive Upsampling: The image is generated in a series of stages, starting
    from low resolution and gradually increasing in size, with each stage progressively
    refining the image.


    **Discriminator:** The discriminator evaluates the authenticity of the images
    produced by the generator. It distinguishes between real images (from the training
    set) and fake images (generated by the generator). The discriminator is typically
    a convolutional neural network (CNN) that outputs a probability indicating whether
    an image is real or fake.'

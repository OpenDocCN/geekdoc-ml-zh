  md: '+   14. An autoencoder essentially contains an (1) Encoder layer (2) Bottleneck
    layer and (3) Decoder layer. The encoder layer compress the input data into a
    compressed representation. The bottle neck layer is used to represent the compressed
    input. The decoder layer reconstructs the encoded information (image) back to
    the original dimension.


    +   15. Different types of autoencoders include (1) Vanilla autoencoder which
    is the basic autoencoder that efficiently encodes and decodes data (2) Sparse
    autoencoder which can learn more compact and efficient data representations (3)
    Variational autoencoder which can generate new data points that resemble in some
    form of the training data (4) Denoising autoencoder which has improved robustness
    to noise and irrelevant information. Autoencoders can be used for (1) Dimensionality
    reduction (2) Feature extraction (3) Image denoising (4) Image Compression (5)
    Anomaly detection.



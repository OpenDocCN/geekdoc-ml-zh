    # ## Information Gain


    The information gain is the measurement of entropy changes after the dataset segmentation
    based on an attribute, which calculates information a feature provides for the
    classes. The information gain is calculated by


    $$\text{Information gain} = \text{Entropy}\left(\text{Parent}\right) - \left[W_{\text{avg}}
    * \text{Entropy}\left(\text{Children}\right)\right] \quad (11.8)$$


    where "Entropy" is a metric to measure the impurity in a given attribute. It specifies
    randomness in the dataset. In a decision tree, the goal is to decrease the entropy
    of the dataset by creating more pure subsets of data. Since entropy is a measure
    of impurity, decreasing the entropy increases the purity of the data. $W_{\text{avg}}$
    is the average weight of each child (class or feature) in the dataset.


    The entropy can be computed as


    $$\text{Entropy}\left(E\right) = -\sum_{i=1}^{N} p_i \log_2\left(p_i\right) \quad
    (11.9)$$


    where "$p_i$" is the probability of randomly selected class ''$i$''.



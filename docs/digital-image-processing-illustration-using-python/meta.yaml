    #Step 2: Perform the Convolution

    img3=convolve2d(img1,img2,mode=''same'')

    #Step 3: Obtain the spectrum of the two images

    IMG1=np.fft.fftshift(np.fft.fft2(img1))

    IMG2=np.fft.fftshift(np.fft.fft2(img2))


    # ## 1.5 Image File Format


    Image file formats provide a standardized method of organizing and storing image
    data. Standardization helps to share the images in different systems. Different
    types of file formats include (1) tagged image file format (TIFF), (2) portable
    network graphics (PNG), (3) joint photographic expert group (JPEG), and (4) bitmap
    file format (BMP). Each file format offers different levels of quality, performance,
    and scalability. The choice of image file format will depend on the intended use
    of the image, balance between file size and image quality, and the type of image
    being stored.


    # ### 1.5.1 *Tagged Image File Format*


    Tagged image file format has either ".tif" or ".tiff" extension. Tiff file format
    was originally created for storing scanned photos. TIFF is used as a lossless
    image storage format that uses no compression at all.'
  merge: -1
  pgno: 32
- img_proc: true
  md: '# Advantage of Tagged Image File Format


    TIFF files are compatible with software such as Adobe Illustrator and Photoshop.
    Professional photographers and editors use this file format to produce and store
    high-quality photos.


    # Drawback of TIFF File Format


    TIFF files are large due to incredible details and resolution. Because of this
    reason, it is not a suitable file format for use on the web.


    # 1.5.2 Bitmap Image File Format


    Bitmap image file format has an extension of ".bmp". It is a native image format
    in Microsoft Windows operating system. There is no compression or information
    loss with bitmap image file format, which allows images to have high quality at
    the expense of large file size.


    # Advantages of Bitmap File Format


    BMP files are device independent and can be stored across multiple devices without
    loss in quality. They can handle multiple colour depths.


    # Drawbacks of Bitmap File Format


    BMP files are larger in size as they store the pixel data without any compression.
    BMP file formats are not preferable when sharing images online or storing large
    number of images on a device with limited storage capacity.


    # 1.5.3 Joint Photographic Experts Group


    Joint photographic expert group (JPEG) file format has an extension of ".jpg"
    or ".jpeg". It employs lossy compression algorithm to make the file size smaller.
    The compression creates a loss in quality but is not visually perceivable. JPEG
    file format is widely employed in digital cameras. JPEG2000 offers a lossless
    and lossy compression scheme.'
  merge: -1
  pgno: 33
- img_proc: true
  md: '# ## Advantages of JPEG File Format


    JPEG file format is supported by all browsers and image viewers. Because of lossy
    compression, the file size of JPEG files is less; hence, the image files can be
    effectively stored and efficiently transmitted.


    # ## Drawback of JPEG File Format


    Lossy compression of JPEG files may cause the appearance of artefacts such as
    blocking artefacts and ringing artefacts, thus affecting the image quality.


    # ### 1.5.4 *Portable Network Graphics*


    Portable network graphics (PNG) employs a lossless compression algorithm. PNG
    files are able to handle up to 16 million colours. The PNG format is widely used
    on websites to display high-quality digital images.


    # ## Advantages of PNG File Format


    PNG employs a lossless compression algorithm; hence, the image quality is well
    preserved in PNG file format. PNG file format supports for transparent backgrounds.
    This feature is useful for creating images that need to be placed over different
    backgrounds.


    # ## Drawback of PNG File Format


    PNG file format tends to create large files due to their lossless compression
    method. PNG file format does not support animation.



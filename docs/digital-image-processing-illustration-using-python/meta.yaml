    # ### 11.4.4 Decision Tree


    A decision tree is a supervised machine-learning approach that can be used for
    both classification and regression problems. However, it is widely preferred for
    solving classification problems. This approach is a tree-structured classifier,
    containing internal nodes, branches, and leaf nodes. The internal nodes represent
    the features or input of a dataset. Branches denote the decision rules and the
    leaf node gives the final outcome of the classifier. There are two nodes in the
    decision tree approach. They are called the decision node and leaf node. The decision
    node is used to make any decision with multiple branches, whereas leaf nodes are
    the output of those decisions and do not contain any further branches. The structure
    of the decision tree looks like tree, which starts from the root node and it expands
    on further branches and constructs a tree-like structure; hence it is called as
    a decision tree. The structure of the decision tree is shown in Fig. 11.23. From
    this figure, it is possible to observe that the decision tree contains decision
    nodes, branches, and leaf nodes.


    The decision tree contains the following terminologies. They are


    +   1. Root Node: The starting of the decision node of the decision tree is called
    as Root Node. It represents the entire dataset, which is further divided into
    two or more homogeneous sets.

    2. Leaf Node: This is the end of the decision tree and it cannot be further divided.

    3. Splitting: Splitting is the process of dividing the decision node or root node
    into sub-nodes according to the decision rule.

    4. Branch/Sub tree: A tree formed by splitting the tree.'
  - '[PAGE 767]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_767_0.png)


    **Fig. 11.23** General structure of decision tree


    +   5. Pruning: It is the process of removing unwanted branches from the tree.

    6. Parent/Child node: The root node of the tree is called the parent node, and
    other nodes are called the child nodes.


    Decision tree algorithm is used for predicting the class of the given input dataset.
    The algorithm starts with the root node of the tree, and the algorithm compares
    the values of the root attribute with the real dataset attribute. Based on the
    comparison results, the branch jumps to the next node. For the next node, the
    decision tree algorithm again compares the attribute value with the other sub-nodes,
    and it repeats this further. Therefore, the decision tree algorithm is a continuous
    process; it continues until it reaches the leaf node of the tree.


    # ## Decision Tree Algorithm


    The steps involved in the decision tree algorithm are as follows:


    +   **Step 1:** Start the tree with the root node (R), which contains the complete
    dataset.


    **Step 2:** Obtain the best attribute in the dataset using Attribute Selection
    Measure (ASM).


    **Step 3:** Split the Set (R) into subsets that contain possible values for the
    best attributes.


    **Step 4:** Generate the decision tree node, which contains the best attribute.


    **Step 5:** Repeatedly make new decision trees using the subsets of the dataset
    created in Step 3. Repeat this process until a stage is reached where it cannot
    further classify the nodes and call the final node a leaf node.


    **Attribute Selection Measure (ASM)** is an important factor in the Decision tree
    algorithm. Information gain and Gini Index are the two popular measures for ASM.'

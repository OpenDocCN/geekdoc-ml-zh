    Important wavelet families include Haar, Daubechies, Symlet, Coiflet, and biorthogonal
    wavelets. Wavelet selection for a particular application depends on properties
    of wavelets such as orthogonal, symmetry, vanishing moments, regularity, and so
    on. Orthogonal basis allows one to reconstruct the signal from its transform coefficients
    by summing the basis functions weighted by the transform coefficients. The regularity
    of wavelet is associated with the rate of decay of scaling functions and ultimately
    with the number of vanishing moments of scaling and wavelet functions.


    In Table 3.3, the terms "*d*" and "*r*" represent decomposition and reconstruction,
    respectively. *Nr*, *N*, *Nd* refer to the order.


    Wavelet transform has good energy compaction, which implies that the signal energy
    is concentrated in a small fraction of wavelet coefficients. This sparse representation
    property of wavelet transform makes it a good tool for data compression and denoising.
    Wavelet transform is used in JPEG 2000 compression standard.



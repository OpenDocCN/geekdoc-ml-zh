    # ## 8.1 Introduction


    Features of an image depict a set of measurements describing the "physical" objects
    in an image. Features in the image are the prominent properties that represent
    an image''s visual information. The image features are employed for several image
    processing and analysis tasks. Image features are used in different image analysis/processing
    tasks, including segmentation, object detection and tracking, object recognition,
    classification, etc.


    The complete features can be categorized into the following categories: visual
    appearance features, textual features, shape features, domain-specific features,
    frequency domain features, and deep features.


    # ### 8.1.1 Visual Appearance Features


    Generally, the most important property of any visual appearance feature is its
    uniqueness, distinguishing the objects in any image in the feature space. Many
    image processing/analysis tasks include using single or combinations of multiple
    visual appearance features. A few of such features are described as follows:


    # ### 8.1.2 Channel Mean Pixel Values


    Channel mean pixel values are one of the simple features used by users in image
    processing industrial applications: thumbnail creation, image compression, and
    resizing. The channel mean pixel value computes the mean intensity of each colour
    channel (red, green, and blue) in an image.'
  - '[PAGE 537]


    The channel mean value of the image is computed as


    $$\text{Channel\_Mean}\left(X[:,:,i]\right) = \frac{\text{Sum of all Pixels in
    image } X[:,:,i]}{\text{Total number of Pixels in image } X[:,:,i]} \quad (8.1)$$


    The mean value of the image is calculated using


    $$\text{Mean}\left(X\right) = \frac{\text{Sum of all Pixels in image } X}{\text{Total
    number of Pixels in image } X} = \frac{1}{3}\sum_{i=0}^{3}\text{Channel\_Mean}\left(X[:,:,i]\right)
    \quad (8.2)$$


    The colour image can be converted into grayscale image using "rgb2gray" conversion.
    This method uses the equation is given by


    $$\text{Gray}\left(X\right) = 0.299 \times R + 0.587 \times G + 0.114 \times B
    \quad (8.3)$$


    where *R*, *G*, and *B* represent the *R*, *G*, and *B* channels of colour image
    (*X*). The mean value of the grayscale image (*GX*) is computed as


    $$\text{Mean}\left(GX\right) = \frac{\text{Sum of all Pixels in image } GX}{\text{Total
    number of Pixels in image } GX} \quad (8.4)$$


    where "*GX*" denotes the grayscale image, which is converted from colour image
    using Eq. (8.3).



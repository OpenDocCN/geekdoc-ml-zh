    # ## 7.8 Morphological Geodesic Active Contour


    Morphological snakes are a family of image segmentation algorithms whose behaviours
    are similar to active contours, such as geodesic active contours or active contours
    without edges. Morphological snakes employ operators such as dilation and erosion,
    whereas traditional active contour employ partial differential equations over
    image arrays. A geometric curve is represented implicitly as a level set and is
    evolved based on geometric computations. The level-set refers to a set of point
    variables for which their function is equal to some constant value. In the geometric
    model, the curve is represented with a zero level set $\psi(x,y,t)$. The geometric
    curve evolves in time "$t$" on an image with a speed function which is given by


    ```

    $$\frac{\partial \psi}{\partial t} = c\left(k + V_0\right)|\nabla \psi|$$

    (7.40)

    ```'

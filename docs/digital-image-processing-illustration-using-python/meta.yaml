    component of the input image (i.e. it carries more information about the input
    image). Whereas U and V are the chrominance components, they carry colour information,
    and these two are non-redundant.

    - Therefore from this experiment, the redundant information in RGB image can be
    removed by using RGB to YUV conversion.'

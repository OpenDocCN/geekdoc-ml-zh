    # ## 1.7 Image Sampling


    Analog images must be sampled and quantized to store and process using a computer.
    Before sampling, it is necessary to ensure that the signal is band-limited. The
    analog image is sampled on a discrete grid, and each sample is quantized to an
    integer value representing a gray level. The digitized image can be processed
    by means of a computer. This process is illustrated in Fig. 1.45.


    In Fig. 1.45, $f(x,y)$ represents the input analog image, $f_s[m,n]$ represents
    the sampled image, and after quantization, the digital image is represented as
    $f[m,n]$.


    # ### 1.7.1 *Band Limited Image*


    An image is band-limited if its Fourier transform is zero outside the bounded
    region in the frequency plane. Let $f(x,y)$ represents the input image in the
    spatial domain; upon taking Fourier transform, let its spectrum be represented
    by $F(\omega_1, \omega_2)$. If one assumes that the spectrum is circularly symmetric,
    then the spectrum of the input image is depicted in Fig. 1.46. From Fig. 1.46,
    it is possible to observe that


    $$F(\omega_1, \omega_2) = 0, |\omega_1| > \omega_{10}, |\omega_2| > \omega_{20}$$
    (1.6)'
  - '[PAGE 55]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_55_0.png)


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_55_1.png)


    If an image satisfies the above-mentioned criterion, it is claimed to be a band-limited
    image.


    # ### 1.7.2 *Spectrum of the Sampled Image*


    The Fourier transform of the sampled image is a scaled, periodic replication of
    the spectrum of the input image. This is illustrated in Fig. 1.47. From the figure,
    it is possible to observe the spectrum replication in $\omega_1$ and $\omega_2$
    axes. The expression for the sampled spectrum is given by


    ```

    $$F_s(\omega_1, \omega_2) = \frac{1}{\Delta x \Delta y} \sum_{k=-\infty}^{\infty}
    \sum_{l=-\infty}^{\infty} F\left(\omega_1 - \frac{2\pi k}{\Delta x}, \omega_2
    - \frac{2\pi l}{\Delta y}\right) \tag{1.7}$$

    ```


    where $\Delta x = \frac{1}{\omega_{xs}}$ and $\Delta y = \frac{1}{\omega_{ys}}$.
    Equation (1.7) can be expressed as


    ```

    $$F_s(\omega_1, \omega_2) = \frac{1}{4\pi^2} \omega_{xs} \omega_{ys} \sum_{k=-\infty}^{\infty}
    \sum_{l=-\infty}^{\infty} F(\omega_1 - k\omega_{xs}, \omega_2 - l\omega_{ys})
    \tag{1.8}$$

    ```


    Equation (1.8) justifies that the sampled signal spectrum gets replicated along
    $\omega_1$ and $\omega_2$ axes. The frequencies $2\omega_{10}$ and $2\omega_{20}$
    are termed as Nyquist frequencies. In order to reconstruct the image exactly from
    the samples, the sampling frequency should be greater than or equal to twice the
    frequency associated with the finest detail in the image. Violation of the sampling
    theorem results in overlapping the spectrum in the frequency domain, termed "aliasing".'

    # ### 3.2 Properties of Fourier Transform


    The properties of Fourier transform discussed in this section include (1) linearity
    property, (2) spatial shift property, (3) scaling property, (4) rotation property,
    (5) frequency shift property, and (6) convolution property.


    # #### 3.2.1 Linearity Property


    Transform is linear if it obeys the superposition principle. The superposition
    principle involves satisfying homogeneity and additivity properties. Let $f_1[m,
    n]$ and $f_2[m, n]$ represent two matrices or images and their corresponding Fourier
    transform are represented as $F_1[k, l]$ and $F_2[k, l]$, respectively. Fourier
    transform is linear if the following criterion is satisfied:


    $$FT\left\{af_1[m,n]+bf_2[m,n]\right\}=aF_1[k,l]+bF_2[k,l] \qquad (3.10)$$


    # **Experiment 3.8: Linearity Property of Fourier Transform**


    To verify the linearity property, the scaling factors are chosen as $a = 1$ and
    $b = 2$, respectively. The matrices $f_1[m, n]$ and $f_2[m, n]$ are chosen as
    $f_1[m,n]=\begin{bmatrix} 1 & 0 \ 0 & 1 \end{bmatrix}$ and $f_2[m,n]=\begin{bmatrix}
    1 & 1 \ 1 & 1 \end{bmatrix}$. The objective is to verify that Eq. (3.10) is true.
    The Python code that performs this operation is shown in Figure 3.20a, and the
    corresponding output is shown in Figure 3.20b.


    # **Inference**


    +   - From Figure 3.20b, it is possible to interpret that the Fourier transform
    satisfied both homogeneity and additive properties; hence, the Fourier transform
    is a linear transform.


    # #### 3.2.2 Spatial Shift Property


    The spatial shift of an image results in a phase shift in the Fourier domain.
    This is represented as


    $$2D\_DFT\left\{f[m-m_0,n]\right\}=e^{-j\frac{2\pi}{N}m_0 k}F[k,l] \qquad (3.11)$$


    If the shift is along "$n$", then the spatial shift property is expressed as'

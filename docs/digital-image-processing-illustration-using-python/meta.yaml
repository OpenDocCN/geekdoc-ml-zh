    # ## 6.11 Morphological Operation on Grayscale Image


    The morphological operations such as dilation, erosion, opening, and closing can
    be applied on grayscale images. The binary morphological operations can be extended
    to grayscale images using minimum and maximum operations. This section discusses
    how to apply morphological operations on grayscale images.


    # ### 6.11.1 Dilation


    The grayscale dilation operation on grayscale image involves assigning to each
    pixel in an image by the maximum value of the neighbourhood pixels corresponding
    to the structuring element. The dilation operation on grayscale image is mathematically
    written as



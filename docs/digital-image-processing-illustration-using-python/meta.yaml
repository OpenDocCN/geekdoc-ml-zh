    \ approach for TV denoising of a grayscale image\n\n**Input:** A noisy image $y[i,\
    \ j]$ with a size of $N \\times N$, a trade-off parameter $\\lambda > 0$, a time\
    \ step parameter ($\\delta_t > 0$) and an algorithm tolerance ($\\tau > 0$).\n\
    \n$p = 0$\n\n**while** $\\max\\limits_{1 \\leq i, j \\leq N} \\{|p^{n+1}[i, j]\
    \ - p^n[i, j]|\\} > \\tau$ **do**\n    **for** all pixel $[i, j]$ in the image\
    \ **do**\n        $p(i, j) \\leftarrow \\frac{p[i, j] + \\delta_t D(div\\ p -\
    \ \\lambda \\eta)[i, j]}{1 + \\delta_t |D(div\\ p - \\lambda \\eta)[i, j]|}$\n\
    \    end **for**\nend **while**\n\nReturn $z = \\eta - \\frac{1}{\\lambda} div\\\
    \ p$.\n\n**Output:** The denoised image $z[i, j]$ as a $N \\times N$ matrix.\n\
    ```\n\n**Fig. 5.96** Chambolle's projection algorithm for TV denoising"

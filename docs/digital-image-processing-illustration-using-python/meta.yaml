    the observed image, $w[m, n]$ represents the restoration filter, and $f''[m, n]$
    represents the restored image.


    If the point spread function (PSF) of the degradation is assumed to be linear
    and space invariant, the expression for the observed image in spatial domain is
    expressed as


    $$g[m,n] = f[m,n] * h[m,n] + \eta[m,n] \qquad (5.25)$$


    Upon taking Fourier transform on both sides, we get


    $$G[k,l] = F[k,l] \times H[k,l] + N[k,l] \qquad (5.26)$$


    If the degradation model is known, the expression for the inverse filter is given
    by


    $$w[m,n] = \frac{1}{h[m,n]} \qquad (5.27)$$


    In the frequency domain, the above expression is given by


    $$W[k,l] = \frac{1}{H[k,l]} \qquad (5.28)$$


    From Fig. 5.71, the expression for the restored image is given by


    $$f''[m,n] = g[m,n] * w[m,n] \qquad (5.29)$$


    Upon taking the Fourier transform on both sides, we get


    $$F''[k,l] = G[k,l] \times W[k,l] \qquad (5.30)$$


    Substituting Eq. (5.26) in Eq. (5.30), we get


    $$F''[k,l] = (F[k,l]H[k,l] + N[k,l])W[k,l] \qquad (5.31)$$'
  - '[PAGE 373]


    Substituting Eq. (5.28) in Eq. (5.31), we get


    $$F''[k,l] = \frac{F[k,l]H[k,l]+N[k,l]}{H[k,l]}$$ (5.32)


    The above equation can be simplified as


    $$F''[k,l] = F[k,l] + \frac{N[k,l]}{H[k,l]}$$ (5.33)


    In the absence of noise, the second term in Eq. (5.33) vanishes, and the restored
    image is identical to the noise-free image.


    # ## Drawbacks of Inverse Filter


    +   1. The noise component is a random function whose Fourier transform ($N[k,
    l]$) is unknown.

    2. If the degradation filter $H[k, l]$ is zero at some selected frequencies $(k,
    l)$, then inverse filter may not exist. This is possible in the case of linear
    motion blur and out-of-focus blur.

    3. Inverse filter performs well in the absence of noise. In the presence of noise,
    noise values can have influence in $H[k, l]$ that has small magnitude. This in
    general corresponds to high frequencies, which result in blurring of fine details
    of the image.



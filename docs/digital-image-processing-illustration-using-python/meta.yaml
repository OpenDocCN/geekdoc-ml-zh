    # ### 11.5.5 *Kernel PCA*


    The Kernel PCA (KPCA) is an extension algorithm of traditional PCA. It is used
    to reduce the dimensionality of the non-linear dataset with the help of kernels,
    which implicitly map inputs into high-dimensional feature spaces. Kernels are
    functions'
  - '[PAGE 798]


    that compute the dot product between image data points in a high-dimensional feature
    space without requiring the coordinates of the data in that space. The steps followed
    in the computation of Kernel PCA as follows:


    +   **Step 1:** Select a kernel function: Choose the appropriate kernel function
    based on the properties of the dataset.


    +   **Step 2:** Compute the kernel matrix: Using the selected kernel function,
    compute the pairwise similarity between data points in the dataset. The resultant
    matrix will be a symmetric positive semi-definite matrix.


    +   **Step 3:** Select the eigenvalues and eigenvectors: The greatest eigenvalues
    and top "k" eigenvectors are the primary components of the given input dataset
    and are the reduced dimensional representation of the given dataset.



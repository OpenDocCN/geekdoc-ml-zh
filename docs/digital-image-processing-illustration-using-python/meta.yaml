  md: 'image can be improved by removing undesirable noise, edge sharpening, pseudo-colouring,
    interpolation, geometric operations, and so on. Image enhancement results are
    evaluated subjectively by human observers.


    Image enhancement can be achieved in two broad ways: (1) spatial domain methods
    and (2) frequency domain methods. Spatial domain techniques are based on direct
    manipulation of pixels in an image. Frequency domain techniques are based on modifying
    the coefficients of an image. This is depicted in Fig. 4.1. The spatial domain
    methods can be classified as point operation, mask operation, and histogram-based
    operation. In frequency domain method, the spectrum of the input image is modified
    to realize low-pass, high-pass, and band-pass filters. Three different approaches
    to realize low-pass and high-pass filters are ideal filters, Butterworth filter,
    and Gaussian filter.


    # ## 4.2 Image Brightness


    Brightness is the intensity of a pixel in an image relative to another pixel.
    The brightness of the image can be increased by adding a constant value to each
    pixel of the image. The darkness of an image can be decreased by subtracting a
    constant value from each pixel of the image.



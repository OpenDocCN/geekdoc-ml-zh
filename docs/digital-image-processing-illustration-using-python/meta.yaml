    # ## 1.8 Quantization of the Image


    The process of representing a continuous function with discrete values is termed
    as "quantization". It is the process of mapping a large set of values into a smaller
    set of values. It is a many-to-one mapping, hence it is an irreversible operation.
    Quantization leads to loss of information. Quantization is performed to represent
    an image with a minimum number of bits so that the image can be effectively stored
    and easily transmitted. Quantization converts the continuously varying brightness
    of an image into a discrete set of levels. This is represented in Fig. 1.53. In
    the figure x-axis represents the input values and the y-axis represents the output
    values. Here T₁ to T₄ represents the threshold values. If the spacing between
    the threshold and the quantization levels is constant, then the quantization is
    termed as uniform quantization.


    # ### 1.8.1 *Terminologies Related to the Quantization of the Image*


    Some terminologies that are common in image quantization are (1) dynamic range,
    (2) reconstruction level, and (3) step size of the quantizer. Dynamic range is
    the difference between the maximum and minimum gray levels of the image. If "b"
    is the number of bits used to represent the gray level of the image, then the
    reconstruction level is given by L = 2ᵇ. The bit depth that implies the number
    of bits used to represent the image determines the accuracy and the quality of
    the quantized value.'
  - '[PAGE 62]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_62_0.png)


    Quantizing an image with lesser number of bits introduces "false contours". The
    step size of the quantizer is given by $\Delta = \frac{DR}{L}$, where "$DR$" represents
    the dynamic range and "$L$" represents the reconstruction level. The reconstruction
    level is provided by $L = 2^b$, where "$b$" is the number of bits used to represent
    the pixel value. Equal distances between adjacent decision levels and adjacent
    reconstruction levels lead to uniform quantization.


    # **Experiment 1.26: Transfer Characteristics of Uniform Quantization**


    The Python code that plots the transfer characteristics of uniform quantization
    for different reconstruction levels is shown in Fig. 1.54, and the corresponding
    output is shown in Fig. 1.55.


    # **Inferences**


    From the transfer characteristics shown in Fig. 1.55, it is possible to infer
    the following:


    +   - The transfer characteristics of uniform quantizer follow stair step waveform.

    - With the increase in the number of reconstruction levels, it is possible to
    observe that the transfer characteristics are a straight line. This implies that
    the output signal follows the input signal when the number of reconstruction levels
    is high.


    # **Experiment 1.27: Python Illustration of Uniform Quantization**


    This experiment illustrates the uniform quantization using Python. The Python
    code that performs uniform quantization of the input image with different reconstruction
    levels is shown in Fig. 1.56, and the corresponding output is shown in Fig. 1.57.'

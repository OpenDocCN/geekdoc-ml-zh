    # 11.6.13 *Conditional GAN*


    A Conditional Generative Adversarial Network (CGAN) is an advanced variation of
    the standard Generative Adversarial Network (GAN), where the generation of output
    is conditioned on specific input data. A GAN can be adapted into a conditional
    model by introducing additional information (denoted as *y*) to both the generator
    and discriminator. This extra information could be anything from class labels
    to data from other sources, which is provided alongside the usual input to guide
    the generation process.


    **Generator Architecture**: In a CGAN, the generator receives two inputs: the
    prior input noise (*z*) and the conditioning information (*y*). These are combined
    into a joint hidden representation, from which the generator produces synthetic
    data. The adversarial training framework allows flexibility in how this hidden
    representation is constructed.


    **Discriminator Architecture**: Similarly, the discriminator receives both real
    data (*x*) and the conditioning information (*y*) as inputs. Its task is to distinguish
    between real data and synthetic data generated by the generator, based on the
    given condition (*y*).


    **Loss Function**: The objective function for the conditional GAN is framed as
    a two-player minimax game:


    $$\min_G \max_D V(D,G) = E_{x \sim p_{data}(x)}\left[\log D(x|y)\right] + E_{z
    \sim p(z)}\left[\log\left(1 - D\left(G(z|y)\right)\right)\right] \quad (11.27)$$'

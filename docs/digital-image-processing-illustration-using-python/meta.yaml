    import numpy as np

    import matplotlib.pyplot as plt

    import cv2

    #Reading the input image

    img=cv2.imread(''cameraman.tif'')

    #Defining the parameters of GrabCut algorithm

    mask = np.zeros(img.shape[:2],np.uint8)

    bgdModel = np.zeros((1,65),np.float64)

    fgdModel = np.zeros((1,65),np.float64)

    rect = (25,25,159,250) #Retangular area which encloses the area of FG

    #Grab cut algorithm

    new_mask, fg, bg = cv2.grabCut(img,mask,rect,bgdModel,fgdModel,10,cv2.GC_INIT_WITH_RECT)

    mask2 = np.where((new_mask==2)|(new_mask==0),0,1).astype(''uint8'')

    #Segmented image

    seg_img = img*mask2[:,:,np.newaxis]

    #Displaying the result

    plt.subplot(1,2,1),plt.imshow(img,cmap=''gray'')

    plt.title(''Input image''),plt.xticks([]),plt.yticks([])

    plt.subplot(1,2,2),plt.imshow(seg_img,cmap=''gray'')


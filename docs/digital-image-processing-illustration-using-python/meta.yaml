    # ### Properties of Laplacian Matrix


    The following are the properties of Laplacian matrix.


    +   - The Laplacian matrix is a real symmetric matrix.

    - Since the Laplacian matrix is real and symmetric, its eigenvalues are real,
    and its eigenvectors are orthogonal.

    - The row sum of Laplacian matrix is zero.

    - The column sum of the Laplacian matrix is zero.

    - Laplacian matrix is a positive semi-definite matrix.

    - The number of zero eigenvalues of Laplacian matrix is equal to the number of
    connected components in the graph.


    # ### 7.9.4 Graph Partitioning


    The central idea in graph partitioning is that the vertices are partitioned into
    disjoint sets. The graph is partitioned such that the edges within the group have
    high weights, and the edges between groups have small weights. In graph-theoretic
    language, it is termed as "cut". In graph theory, a cut is a partition of nodes
    that divides the graph into two disjoint subsets. It is expressed as


    ```

    $$\text{cut}(A,B) = \sum_{u \in A, v \in B} w(u,v)$$ (7.50)

    ```


    The Graph "$G$" is divided into two disjoint sets "$A$" and "$B$" such that $A
    \cup B = V$ and $A \cap B = \varphi$. The degree of dissimilarity between these
    two sets can be computed as the total weight of the edges that have been removed.
    The optimal bipartitioning of a graph minimizes the *cut* value. The *cut* algorithm
    can be classified as (1) minimum cut (Min-Cut), (2) maximum cut, and (3) normalized
    cut. Min-Cut of a weighted graph is defined as the minimum sum of weights of edges
    that, when'

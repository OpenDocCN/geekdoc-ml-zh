  md: '# ### 4.11.6 *Laplacian Operator in the Frequency Domain*


    Laplacian is a differential operator that approximates the second-order derivative
    as


    $$\nabla^2 f = \frac{\partial^2 f}{\partial x^2} + \frac{\partial^2 f}{\partial
    y^2}$$ (4.39)


    In the above expression, "*f*" denotes the input image. The Laplacian filter highlights
    the regions of rapid intensity change. The Laplacian operator in the frequency
    domain is given by


    $$H[k,l] = -4\pi^2 D^2[k,l]$$ (4.40)


    # **Experiment 4.51: Laplacian in Frequency Domain**


    This experiment aims to implement Laplacian operator in the frequency domain.
    Then, the Laplacian operator is applied to the input test image. The test image
    is of size 250 × 250 with alternate black and white stripe, with the stripe width
    being 25.


    The following steps are involved in this experiment:


    +   - Step 1: Generation of test image.

    - Step 2: Obtaining the spectrum of the input image.

    - Step 3: Generation of Laplacian mask in the frequency domain.

    - Step 4: Multiplying the spectrum of the input image with Laplacian mask.

    - Step 5: Taking the Inverse Fourier transform of Step 4 result to obtain the
    filtered image.


    The Python code that performs the above-mentioned task is shown in Fig. 4.117,
    and the corresponding output is shown in Fig. 4.118.


    # **Inferences**


    The following observations can be made from Fig. 4.118:


    +   - The input image has alternate stripes of black and white pixels. The width
    of the stripe is 25.

    - Upon passing the input image to the Laplacian operator, the filtered image is
    obtained, which is a vertical line on a black background. Wherever there is a
    change from the gray level white to black and vice versa, the output will be high.
    Thus, the Laplacian operator acts as a change detector.



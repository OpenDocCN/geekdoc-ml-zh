  md: '# ## Legendre Moment


    Legendre moment is an orthogonal moment and it can be used to represent an image
    with minimum amount of information redundancy. The 2D Legendre moment can be computed
    using the recursive formula of 1D Legendre polynomials. The Legendre moment for
    a 2D digital image with a size of $N \times N$ can be computed as


    $$L_{pq} = \frac{(2p+1)(2q+1)}{(N-1)^2} \sum_{i=1}^{N} \sum_{j=1}^{N} P_p(x_i)
    P_q(y_j) f(x_i, y_j) \quad (8.12)$$


    where $x_i = \frac{2i-N-1}{N-1}$, $y_i = \frac{2j-N-1}{N-1}$.


    The recursive relation for the Legendre polynomial is given by


    $$P_{p+1}(x) = \frac{2p+1}{p+1} x P_p(x) - \frac{p}{p+1} P_{p-1}(x), p \geq 1
    \quad (8.13)$$


    With $P_0(x) = 1$, $P_1(x) = x$.



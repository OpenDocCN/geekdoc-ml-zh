    # ## 7.5 Clustering-Based Segmentation


    Clustering algorithms divide data into clusters of pixels with similar values.
    Two clustering algorithms discussed in this section include (1) K-means clustering
    algorithm and (2) Fuzzy C-means clustering algorithm.


    # ### 7.5.1 *K-Means Clustering Algorithm*


    In the "*k*-means" clustering algorithm, pixel values are plotted as data points,
    and "*k*" random points are selected as the centre of a cluster. Each pixel is
    assigned to a cluster based on the nearest centroid. Centroids are then relocated
    to the mean of each cluster, and the process is repeated, with centroids being
    relocated with each iteration until clusters have stabilized. The objective function
    of *k*-means algorithm is given by


    ```

    $$J = \sum_{i=1}^{n} \sum_{k=1}^{K} w_{ik} x^i - \mu_k^2$$ (7.31)

    ```


    In the above expression, the first summation is with respect to a number of data
    points, and the second summation is with respect to a number of clusters; $\mu_k$
    represents the cluster centre. From the expression (7.31), it is possible to interpret
    that the data point $x_i$ is assigned to the closest cluster by computing the
    sum of squared distance from the cluster''s centroid.


    In Eq. (7.31)


    ```

    $$w_{ik} = \begin{cases} 1, & \text{data point belong to the cluster } k \ 0,
    & \text{otherwise} \end{cases}$$ (7.32)

    ```


    The above expression can also be written as


    ```

    $$w_{ik} = \begin{cases} 1, & \text{if } k = \argmin_j x^i - \mu_j^2 \ 0, & \text{otherwise}
    \end{cases}$$ (7.33)

    ```



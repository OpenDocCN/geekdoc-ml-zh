    The expression for inverse Fourier transform is given by


    $$f(x,y)=\frac{1}{(2\pi)^2}\int_{-\infty}^{\infty}\int_{-\infty}^{\infty}f(k,l)e^{j2\pi(xk+yl)}dkdl$$
    (3.2)


    Fourier transform is a complex-valued function, hence it can be represented as


    $$F(k,l)=R(k,l)+jI(k,l)$$ (3.3)


    The magnitude of the transform is given by


    $$|F(k,l)|=\sqrt{R^2(k,l)+I^2(k,l)}$$ (3.4)


    The phase of the transform is given by


    $$\varphi(k,l)=\tan^{-1}\left[\frac{I(k,l)}{R(k,l)}\right]$$ (3.5)


    # ### 3.1.2 Discrete Space and Continuous Frequency Fourier Transform


    Discrete space and continuous frequency two-dimensional Fourier transform is equivalent
    to discrete-time Fourier transform (DTFT) of one-dimensional signal. The expression
    for the forward transform is given by


    $$F(k,l)=\sum_{m=0}^{N-1}\sum_{n=0}^{N-1}f(m,n)e^{-j\frac{2\pi}{N}(mk+nl)}$$ (3.6)


    The expression for the inverse Fourier transform is given by


    $$f(m,n)=\frac{1}{(2\pi)^2}\int_{k=-\pi}^{\pi}\int_{l=-\pi}^{\pi}F(k,l)e^{j(mk+nl)}dkdl$$
    (3.7)


    # ### 3.1.3 Discrete Space and Discrete Frequency Fourier Transform


    The expression for the forward discrete space and discrete frequency Fourier transform
    is given by


    $$F(k,l)=\sum_{m=0}^{N-1}\sum_{n=0}^{N-1}f(m,n)e^{-j\frac{2\pi}{N}(mk+nl)}$$ (3.8)'

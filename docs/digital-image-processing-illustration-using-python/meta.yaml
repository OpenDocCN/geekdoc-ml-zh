  md: '+   3. Fractal dimension does not need to be an integer.

    4. Most of the time fractal has some simple mathematical or algorithmic description.


    Fractal is a self-repeating geometrical figure. Examples of fractal include Sierpinski
    triangle, Koch curve, Spiral, Barnsley''s fern, fractal tree, pentagon pattern,
    etc. All these fractals can be generated by iterated function system (IFS). An
    iterated function system is a finite set of contraction mappings on a complete
    metric space (X, d), which is mathematically written as


    $$\left\{\omega_i : X \rightarrow X \mid i = 1,2,\ldots,N\right\}$$ (9.30)


    Each contraction mapping $\omega_i$ has a corresponding contractivity factor $c_i$.
    An alternative notation for the same IFS is given by


    $$\left\{X; \omega_1, \omega_2, \ldots, \omega_N\right\}.$$ (9.31)


    The fractal image generation can be achieved by using affine transformations,
    which are mathematically written as


    $$w_i\begin{bmatrix} m \ n \end{bmatrix} = \begin{bmatrix} a_i & b_i \ c_i & d_i
    \end{bmatrix}\begin{bmatrix} m \ n \end{bmatrix} + \begin{bmatrix} e_i \ f_i \end{bmatrix}$$
    (9.32)


    where (m, n) denotes the location of the pixel, $a_i$, $b_i$, $c_i$, $d_i$, $e_i$
    and $f_i$ are the parameters that translate, skew, stretch, rotate, and scale
    an input image pixel.



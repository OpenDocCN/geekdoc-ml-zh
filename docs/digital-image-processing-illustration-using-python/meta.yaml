  md: '# ## Advantages


    +   1. The random forest algorithm can be used to solve both classification and
    regression problems.

    2. It is considered as very accurate and robust model because it uses large number
    of decision tree to make predictions.

    3. It takes the average of all the decision tree predictions and nullifies the
    biases. Hence, it does not affect the overfitting problem.

    4. It can handle the missing values. There are two ways to handle the missing
    values they are (a) to use median values to replace continuous variables and (b)
    to compute the proximity-weighted average of missing values.

    5. Random forest algorithm can be used for feature selection.


    # ## Disadvantages


    +   1. Random forest takes more computational complexity. That is, it is very
    slow in making predictions because a large number of decision trees are used to
    make predictions. All the trees in the forest have to make a prediction for the
    same input and then perform majority voting on it. Hence, it is a time-consuming
    process.

    2. The model is difficult to interpret as compared to a decision tree. The predictions
    can easily be made as compared to decision tree.



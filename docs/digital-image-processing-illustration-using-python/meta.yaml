  md: "# ## 7.7 Chan–Vese Method for Image Segmentation\n\nThe Chan–Vese model is\
    \ a piecewise constant approximation of global region information based on the\
    \ Mumford–Shah model. The Chan–Vese model assumes that each region is homogenous\
    \ with respect to grayscale intensities within a region, and it uses the mean\
    \ of grayscale intensities within a region as a region descriptor to generate\
    \ a force that pulls the shape model towards the region of interest. Chan–Vese\
    \ model is based on the edge function to stop the evolution curve at the desired\
    \ edge. The Chan–Vese model partitions an input image into foreground ($\\Omega_1$)\
    \ and background ($\\Omega_2$) of low intra-region variance and separated by a\
    \ smooth closed contour. The mathematical model of the Chan–Vese algorithm is\
    \ given by\n\n$$E = \\mu|C| + \\lambda_1\\int_{\\Omega_1}\\left(u_0(X)-c_1\\right)^2\
    \ dx + \\lambda_2\\int_{\\Omega_2}\\left(u_0(X)-c_2\\right)^2 dx \\qquad (7.39)$$\n\
    \nIn the above equation, $c_1$ and $c_2$ represent the average intensity levels\
    \ inside $\\Omega_1$ and $\\Omega_2$ respectively. In the equation, $\\mu$, $\\\
    lambda_1$ and $\\lambda_2$ are user-defined parameters. $u_0$ represents the input\
    \ image and \"$C$\" represents the boundary between the two regions. The optimal\
    \ segmentation corresponds to the global minimum of the expression given in Eq.\
    \ (7.39).\n\n# ### Experiment 7.27: Chan–Vese Method for Image Segmentation\n\n\
    This experiment focuses on the segmentation of \"coin\" image using the Chan–Vese\
    \ algorithm. The Python code that performs the task of segmentation is shown in\
    \ Fig. 7.60, and the corresponding output is shown in Fig. 7.61. Chan–Vese segmentation\
    \ algorithm is an iterative segmentation algorithm. In this experiment, the number\
    \ of iterations is fixed as 200. Typical values of $\\lambda_1$ and $\\lambda_2$\
    \ are 1. The value of \"$\\mu$\" is between 0 and 1. Higher values of \"$\\mu$\"\
    \ are preferable while dealing with ill-defined contours. The \"init-level_set\"\
    \ defines the starting level set used by the algorithm. The custom level sets\
    \ available in the built-in function are \"checkerboard\", \"disk\" and \"small\
    \ disk\". The \"checkerboard\" initial level set has fast convergence, but it\n\
    \n```\npython\nimport cv2\nimport matplotlib.pyplot as plt\nfrom skimage.segmentation\
    \ import chan_vese\n#Read the input image\nimg=cv2.imread('coin_testimg10.jpg',0)\n\
    #Apply Chan-Vese algorithm\ncv = chan_vese(img, mu=0.09, lambda1=1, lambda2=1,\
    \ tol=1e-3, max_num_iter=100,\n        dt=0.2, init_level_set=\"checkerboard\"\
    , extended_output=True)\n#Displaying the result\nplt.subplot(1,2,1),plt.imshow(img,cmap='gray'),plt.title('Input\
    \ image')\nplt.xticks([]),plt.yticks([]),plt.subplot(1,2,2),plt.imshow(cv[1],cmap='gray'),\n\
    plt.title('Output image'),plt.xticks([]),plt.yticks([])\nplt.tight_layout()\n\
    ```\n\n**Fig. 7.60** Python code to perform segmentation using Chan–Vese algorithm"

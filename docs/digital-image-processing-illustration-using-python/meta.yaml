    #Transform domain ideal LPF

    import cv2

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Reading the input image

    img=cv2.imread(''cameraman.tif'',0)

    #Step 2: Spectrum of the input image

    IMG=np.fft.fft2(img)

    IMG=np.fft.fftshift(IMG)


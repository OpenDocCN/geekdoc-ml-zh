    policy. In the policy-based approach, the final task is to obtain the optimal
    policy for the maximum future rewards without using the value function. In this
    method, the agent tries to apply such a policy that the action performed in each
    step helps to maximize the future reward. There are two types of policy-based
    approaches; the first one is deterministic, in which the policy produces the same
    action in any state. The second one is stochastic; here, the probability determines
    the produced action. In the model-based approach, a virtual model is created for
    the environment, and the agent explores that environment to learn it. Therefore,
    this approach has no particular solution or algorithm since the model representation
    is different for each environment.



    \ * y_pred), axis=[1,2,3])\n  union = K.sum(y_true,[1,2,3])+K.sum(y_pred,[1,2,3])-intersection\n\
    \  iou = K.mean((intersection + smooth) / (union + smooth), axis=0)\n  return\
    \ iou\n\ndef iou_coef_loss(y_true, y_pred):\n  return -iou_coef(y_true, y_pred)\n\
    \ndef iou_metric(y_true_in, y_pred_in, print_table=False):\n  labels = label(y_true_in\
    \ > 0.5)\n  y_pred = label(y_pred_in > 0.5)\n  true_objects = len(np.unique(labels))\n\
    \  pred_objects = len(np.unique(y_pred))\n  intersection = np.histogram2d(labels.flatten(),\
    \ y_pred.flatten(), bins=(true_objects, pred_objects))[0]\n  # Compute areas (needed\
    \ for finding the union between all objects)\n  area_true = np.histogram(labels,\
    \ bins = true_objects)[0]\n  area_pred = np.histogram(y_pred, bins = pred_objects)[0]\n\
    \  area_true = np.expand_dims(area_true, -1)\n  area_pred = np.expand_dims(area_pred,\
    \ 0)\n  union = area_true + area_pred - intersection;# Compute union\n  intersection\
    \ = intersection[1:,1:]\n  union = union[1:,1:]\n  union[union == 0] = 1e-9\n\
    \  iou = intersection / union; # Compute the intersection over union\n  # Precision\
    \ helper function\n  def precision_at(threshold, iou):\n    matches = iou > threshold\n\
    \    true_positives = np.sum(matches, axis=1) == 1  # Correct objects\n    false_positives\
    \ = np.sum(matches, axis=0) == 0 # Missed objects\n    false_negatives = np.sum(matches,\
    \ axis=1) == 0 # Extra objects\n    tp, fp, fn = np.sum(true_positives), np.sum(false_positives),\
    \ np.sum(false_negatives)\n    return tp, fp, fn\n  prec = []\n  if print_table:\n\
    \    print(\"Thresh\\tTP\\tFP\\tFN\\tPrec.\")\n  for t in np.arange(0.5, 1.0,\
    \ 0.05):\n    tp, fp, fn = precision_at(t, iou)\n    if (tp + fp + fn) > 0:\n\

  md: 'not be generated. Two broad classifications of filters are (1) spatial domain
    filters and (2) transform domain filters. Spatial domain filters can be further
    classified as (1) linear filters and (2) non-linear filters. The mean filter is
    an example of a linear filter, whereas the median filter is an example of a non-linear
    filter. The mean filter is effective in minimizing the impact of Gaussian noise,
    and the median filter is an effective tool to minimize the impact of salt and
    pepper noise.


    # ### 5.3.1 *Mean Filter or Averaging Filter*


    In mean filter, the output image is obtained by replacing each pixel in the input
    image with the mean value of each pixel in a local neighbourhood. The commonly
    used neighbourhood or kernels are 3 × 3, 5 × 5, 7 × 7, and so on.


    # **Experiment 5.11: Average Filtering of Noisy Image**



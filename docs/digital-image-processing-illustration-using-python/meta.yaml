    # ### 3.2.3 *Scaling Property of Fourier Transform*


    If *F*[*k*, *l*] represents the spectrum of the image *f*[*m*, *n*], then the
    scaled version of the signal *f*[*am*, *bn*] has the following Fourier transform:


    $$\text{2D\_DFT}\left\{f[am,bn]\right\} = \frac{1}{|ab|}F\left[\frac{k}{a}, \frac{l}{b}\right]$$
    (3.14)


    Equation (3.14) can be interpreted as "Compression in spatial domain is equivalent
    to expansion in frequency domain and vice versa".


    # **Experiment 3.10: Fourier Transform of Gaussian Function**



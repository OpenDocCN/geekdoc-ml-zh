    # ## 4.8 Contrast Limited Adaptive Histogram Equalization (CLAHE)


    CLAHE stands for "contrast limited, adaptive histogram equalization". In CLAHE,
    the image is divided into several regions, and the histogram is computed for the
    segmented region. Multiple histograms are utilized to redistribute gray level
    values of the image. The interpolation technique is used to correct inconsistencies
    between borders. CLAHE is an effective tool for improving the local contrast in
    each region of an image. CLAHE has some important hyperparameters, which are (1)
    clip limit and (b) number of tiles. The clip limit or contrast factor is defined
    as a multiple of the average histogram contents. Clip limit controls the noise
    amplification. Number of tiles controls the amount of non-overlapping sub-areas.
    Improper hyperparameter selection leads to a decrease in image quality.



    # ### 6.11.4 Closing


    The grayscale closing operation of an image can be performed by the grayscale
    dilation operation followed by grayscale erosion operation. The closing output
    value is the minimum of the maximum value of the image in the surrounding neighbourhood
    pixels defined by the structuring element.


    The closing operation can be mathematically written as


    $$(X \oplus B)(m, n) = \max \left\{ \begin{array}{l} X(m-s, n-y) + B(x, y) \mid
    \ (m-s), (n-y) \in W_X; \; (x, y) \in W_B \end{array} \right\} \qquad (6.31)$$


    $$(X \bullet B)(m, n) = \min \left\{ \begin{array}{l} (X \oplus B)[(m-s, n-y)]
    + B(x, y) \mid \ (m-s), (n-y) \in W_X; \; (x, y) \in W_B \end{array} \right\}
    \qquad (6.32)$$


    From the above equations, it is possible to infer that dilation operation is done
    first, followed by erosion operation.



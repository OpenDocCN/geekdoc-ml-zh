    # ResNet18


    ResNet18 is a residual network family with a 72-layer architecture with 18 deep
    layers. The aim of this architecture is to enable large amounts of convolutional
    layers to function efficiently. The addition of multiple deep layers to a network
    creates degradation in the output. This is known as the problem of vanishing gradient
    where neural networks, while getting trained through the backpropagation mechanism,
    rely on gradient descent, descending the loss function to find the minimizing
    weights. The primary idea of ResNet is the use of jumping connections, which are
    mostly referred to as shortcut connections or identity connections. These shortcut
    connections remove the vanishing gradient issue by again using the activations
    of the previous layer. ResNet18 uses batch normalization and ReLU activation functions
    in the process.



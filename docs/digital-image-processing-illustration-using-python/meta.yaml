    # ## 10.10 Colour Image Compression Using PCA


    PCA stands for principal component analysis. PCA is widely used in dimensionality
    reduction. PCA represents the data in a new coordinate system in which basis vectors
    follow modes of greatest variance in the data. The steps followed in image compression
    using PCA are represented in the form of a block diagram, which is given in Fig.
    10.70.


    The steps followed in PCA-based colour image compression which is depicted in
    Fig. 10.70 is summarized below:


    +   - **Step 1:** First the three components of the RGB image are extracted.

    - **Step 2:** For reach channel, first "*n*" principal components are retained.

    - **Step 3:** The forward transform projects the image matrix along the principal
    components.

    - **Step 4:** The inverse transform is used to reconstruct the image using only
    "*n*" principal components.


    # ### Experiment 10.29: PCA-Based Colour Image Compression


    The objective of this experiment is to compress the input colour image using PCA.
    First, the colour image in BGR format is converted to RGB format. Then PCA is
    applied to red, green, and blue components to compress the image. After that image
    is reconstructed using modified red, green, and blue components. The Python code
    that performs this task is given in Fig. 10.71, and the corresponding output is
    shown in Fig. 10.72.


    The built-in functions used in the program and its purpose are summarized in Table
    10.2.'

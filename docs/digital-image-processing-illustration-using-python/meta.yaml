    filters discussed in this chapter are order statistics filters, which include
    minimum filter, maximum filter, and median filter.


    # ### 5.4.1 Alpha Trimmed Mean Filter


    Alpha trimmed mean filter removes the *d*/2 lowest and *d*/2 highest gray levels
    to process the remaining "*mn − d* pixels" where "*m*" and "*n*" represent the
    number of rows and columns of the mask. The expression for alpha-trimmed mean
    filter is given by


    $$g(x,y) = \frac{1}{mn-d} \sum_{(s,t) \in S_{xy}} f_r(s,t)$$ (5.9)


    Alpha-trimmed mean filter is a balance between a median filter and a mean filter.



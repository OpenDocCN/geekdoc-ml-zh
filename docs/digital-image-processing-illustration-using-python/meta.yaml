    # ## 5.8 Transform Domain-Based Image Denoising


    The basic idea in transform-based image denoising is that the characteristics
    of image information and noise are different in the transform domain. In transform
    domain filtering methods, the noisy image is transformed to another domain, then
    the denoising procedure is applied on the transformed image, and then the coefficients
    are passed through inverse transform to obtain the denoised image. The block diagram
    representation of transform domain-based image denoising is given in Fig. 5.49.


    # ### 5.8.1 *Fourier Transform-Based Image Denoising*


    Fourier transform is a very good tool to identify the presence of periodic noise.
    After identifying the location of periodic noise, notch filter can be used to
    minimize the impact of periodic section.


    # **Experiment 5.24: Minimization of Periodic Noise**


    In this experiment, a test image is generated. The test image is a white square
    in a black background. Then sinusoidal grating pattern is generated. This pattern
    is considered as the noise. The noisy image is obtained by adding the test image
    with the sinusoidal grating pattern. Then, the spectrum of the noisy image is
    observed to find the peaks corresponding to the sinusoidal grating pattern. The
    inverse Fourier transform is applied to obtain the filtered image after nullifying
    the peak (notch filtering) corresponding to the grating pattern.'

    # ## 2.5 Correlation


    Correlation is a mathematical operation that is used to obtain the relative similarity
    between two signals. Two types of correlation include (1) autocorrelation and
    (2) cross-correlation. If one finds the relative similarity between two signals
    that originated from the same source, it is termed autocorrelation. On the other
    hand, if one is interested in finding the relative similarity between two signals
    from different sources, then it is termed cross-correlation. The mathematical
    expression for the correlation between two signals is represented as $f[m, n]$
    and $g[m, n]$ is expressed as


    $$f[m,n] \circ g[m,n] = \sum_a \sum_b f[a,b] g[m+a,n+b]$$ (2.12)


    where "$\circ$" denotes correlation operation. Mathematically, convolution and
    correlation are similar operations. Convolution is used to extract features from
    the input image, whereas correlation is used to obtain the relative similarity
    between the two images. Correlation is used for template matching.'

    # ### 2.3.2 *Spatial Shift Operation*


    The spatial shift of an input image can be done by convolving an input image with
    a shifted 2D impulse function. The mathematical expression of a spatial shift
    operation is given by


    $$y[m,n] = x[m,n] * \delta[m-m_0,n]$$ (2.7)


    The above expression is simplified as


    $$y[m,n] = x[m-m_0,n]$$ (2.8)


    Similarly,


    $$y[m,n] = x[m,n] * \delta[m,n-n_0] = x[m,n-n_0]$$ (2.9)


    The shift along both "*m*" and "*n*" direction is accomplished using the relation


    $$y[m,n] = x[m,n] * \delta[m-m_0,n-n_0] = x[m-m_0,n-n_0]$$ (2.10)


    # **Experiment 2.3: Implementation of Spatial Shift Operation**


    This experiment discusses the implementation of spatial shift operation on given
    input image using Python. The spatial shift operation on input image is performed

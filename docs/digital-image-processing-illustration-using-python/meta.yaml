  md: 'possible to observe that in the training phase input data or training data
    are stored. For the new data, which is to be classified into a particular category
    or class, the similarity between the new data and the available training data
    is computed, which is shown in Fig. 11.34b and based on the similarity value.
    For this, K numbers of neighbours are chosen and distance between the new data
    and K neighbours is calculated. The maximum number of neighbours (the circled
    training data are closest neighbours) from particular class is close to the new
    data then the new data is assigned to the particular class, which is shown in
    Fig. 11.34c. The K numbers of neighbours are utilized to classify the new data
    into a particular class, hence this algorithm is named as "K Nearest Neighbour"
    (KNN) algorithm.


    # KNN Algorithm


    The steps of KNN algorithm are as follows:


    +   **Step 1:** Select the number K of the neighbours to calculate the similarity
    between the new data and K-neighbours.


    **Step 2:** Calculate the Euclidean distance or some other distance measure between
    the new data and K neighbours.


    **Step 3:** Take the K-nearest neighbours as the calculated distance measure.


    **Step 4:** Count the number of data points in each class or category among these
    K neighbours.


    **Step 5:** Assign the new data to that class or category for which the number
    of the neighbour is maximum.


    **Step 6:** Repeat Steps (2)–(5) for the new data.


    Different distance metrics can be used for the KNN classifier modelling. They
    are (1) Euclidean distance, (2) Minkowski distance, (3) Manhattan distance, (4)
    Cosine distance, (5) Jaccard distance, (6) Hamming distance, etc. The expression
    for the different distance metrics is given in Table 11.1.


    | S. no. | Name of the distance metric | Mathematical expression | Significance
    |

    |--------|----------------------------|------------------------|--------------|

    | 1. | Euclidean | $d(x,y)=\sqrt{\sum_{i=1}^{n}(x_i-y_i)^2}$ | It is a measure
    of the true straight-line distance between two points in Euclidean space |

    | 2. | Minkowski | $d(x,y)=\left(\sum_{i=1}^{n}|x_i-y_i|^p\right)^{1/p}$ | It
    is a metric intended for real-valued vector spaces |

    | 3. | Manhattan | $d(x,y)=\sum_{i=1}^{n}|x_i-y_i|$ | This distance is preferred
    over Euclidean distance for the high-dimensionality dataset |

    | 4. | Cosine | $\cos(x,y)=\frac{\vec{x}\cdot\vec{y}}{\|\vec{x}\|\|\vec{y}\|}$
    | It is measured by the cosine of the angle between two vectors and determines
    whether two vectors are pointing in the same direction |

    | 5. | Jaccard | $d(x,y)=1-J(x,y)=1-\frac{|x \cap y|}{|x \cup y|}$ | The Jaccard
    approach looks at the two datasets and finds the incident where both values are
    equal to 1 |'

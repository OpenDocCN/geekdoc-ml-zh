    # ### 11.6.6 *ResNet-50*


    ResNet-50 is a deep convolutional neural network architecture that belongs to
    the Residual Networks (ResNet) family, introduced by Microsoft Research in 2015.
    The "50" in ResNet-50 refers to the number of layers, including convolutional
    layers and residual blocks. ResNet-50 sets itself apart from other deep networks
    by using residual connections, or skip connections, which helps to address the
    problem of vanishing gradients that can occur in very deep networks. In a typical
    neural network, as the network depth increases, gradients can become too small
    to update weights during training effectively. ResNet overcomes this by adding
    shortcut connections that allow the input of a layer to bypass one or more intermediate
    layers and be added directly to the output. This "residual learning" allows the
    model to focus on learning only the difference (residuals) between the input and
    output, making it easier to train very deep models. The "residual learning block"
    is shown in Fig. 11.75. The overall architecture of ResNet50 is displayed in Fig.
    11.76.'

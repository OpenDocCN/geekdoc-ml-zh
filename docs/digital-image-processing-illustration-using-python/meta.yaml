    # ## Marr–Hildreth Edge Detection\n\nIn Maar–Hildreth method of edge detection,\
    \ the input image is first smoothened by a Gaussian filter. Then, the Laplacian\
    \ operator is used to obtain the second-order derivative. When the second-order\
    \ derivative crosses zero, then that particular location corresponds to the edge\
    \ location. Marr–Hildreth operator is also termed as Laplacian of Gaussian (LoG)\
    \ filter. The expression for two-dimensional Gaussian function which is applied\
    \ to the input image to smoothen the image is expressed as\n\n$$f(x,y) = e^{-\\\
    left(\\frac{x^2+y^2}{2\\sigma^2}\\right)} \\quad (7.6)$$\n\nTaking partial derivative\
    \ of the above Gaussian function with respect to \"x\"\n\n$$\\frac{\\partial f(x,y)}{\\\
    partial x} = e^{-\\left(\\frac{x^2+y^2}{2\\sigma^2}\\right)} \\times \\left(-\\\
    frac{2x}{2\\sigma^2}\\right) \\quad (7.7)$$"

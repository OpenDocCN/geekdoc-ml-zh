    **Fig. 8.30** LBP calculation


    histogram bins will be 2^8 or equal to 256. Instead of centre pixel as a threshold,
    any other value may be chosen as a threshold.


    The basic version of the LBP operator uses the centre pixel value as a threshold
    to the 3 × 3 neighbour pixels. The threshold operation will create a binary pattern
    representing texture characteristics. The mathematical computation of LBP for
    3 × 3 neighbourhood pixels can be written as


    $$\text{LBP}(i,j) = \sum_{n=0}^{7} 2^n f\{X_n - X(i,j)\}$$ (8.14)


    where LBP(*i, j*) is a LBP value at the centre pixel of the image **X**(*i, j*).
    *X*<sub>*n*</sub> is the neighbourhood pixels. "*n*" denotes the index of neighbourhood
    pixels. The function *f*{*x*} can be mathematically written as


    $$f(x) = \begin{cases} 0, & \text{if } x < 0 \ 1, & \text{if } x \geq 0 \end{cases}$$
    (8.15)


    For example (see Fig. 8.30), the centre pixel, 78, will be selected as a threshold
    value. The neighbourhood pixels are assigned 0 if their values are less than the
    threshold. The neighbourhood pixels are assigned to 1 if their values are greater
    than or equal to the threshold. The LBP value is computed by applying scalar multiplication
    between the binary and weight matrices. Finally, the sum of all multiplication
    results is used to represent the LBP value.



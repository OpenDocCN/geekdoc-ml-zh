  md: '# ## 10.5 CLAHE to Colour Image


    Contrast enhancement techniques are devised to enhance the visual quality of the
    image so as to provide better details for different image processing tasks. Histogram
    equalization is a widely adopted technique to enhance the contrast of the images.
    The objective of histogram equalization is to distribute the intensity values
    in an image such that lower contrast areas can gain higher contrast. Contrast
    Limited Adaptive Histogram Equalization (CLAHE) is a local histogram equalization
    method. The performance of CLAHE depends on two parameters, namely, the number
    of tiles and clip limit. Proper choice of these two parameters ensures better
    visual quality after the application of CLAHE. This section deals with the application
    of CLAHE algorithm to the colour image, in which the input colour image is converted
    to HSV format, and CLAHE is applied to the "V" plane. After enhancing the contrast
    of "V" plane, the image is again converted back to RGB plane for visualization.


    # ### Experiment 10.22: Colour Image Enhancement Using CLAHE


    In this experiment, the input colour image is read, and it is then converted to
    HSV colour space. After conversion, the contrast-limited adaptive histogram equalization
    (CLAHE) is applied to "V" channel. Then, the image is converted back to RGB for
    display. The Python code which performs the above-mentioned task is given in Fig.
    10.54, and the corresponding output is shown in Fig. 10.55.


    # ### Inferences


    +   - From Fig. 10.55, the visual quality of the processed image using CLAHE algorithm
    is better than the input image.

    - The "Laptop" on the table is blurred in the input image, but it is clearly visible
    in the processed image.


    ```

    python

    import cv2

    from matplotlib import pyplot as plt

    #Step 1: Reading the colour image

    img = cv2.imread(''testimg3.jpg'')

    #Step 2: Converting the image to HSV format

    HSV = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)

    #Step 3: Applying CLAHE to ''V'' plane

    clahe = cv2.createCLAHE(clipLimit=10,tileGridSize=(4,4))

    HSV[:,:,2] = clahe.apply(HSV[:,:,2])

    #Step 4: Converting the image back to RGB

    im_out = cv2.cvtColor(HSV, cv2.COLOR_HSV2RGB)

    #Step 5: Displaying the results

    plt.subplot(1,2,1),plt.imshow(img),plt.title(''Input image''),plt.xticks([]),plt.yticks([]),

    plt.subplot(1,2,2),plt.imshow(im_out),plt.title(''CLAHE output image''),

    plt.xticks([]),plt.yticks([]),plt.tight_layout()

    ```



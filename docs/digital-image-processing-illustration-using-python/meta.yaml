    the whole cost function with the stochastic gradient descent (SGD) algorithm.
    Generally, the convolutional layers act upon the input feature maps with the sliding
    convolutional kernels to generate the convolved feature maps, and the pooling
    layers operate on the convolved feature maps to aggregate the information within
    the given neighbourhood window with a max pooling operation or average pooling

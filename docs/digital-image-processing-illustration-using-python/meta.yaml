    # ## 10.5 CLAHE to Colour Image


    Contrast enhancement techniques are devised to enhance the visual quality of the
    image so as to provide better details for different image processing tasks. Histogram
    equalization is a widely adopted technique to enhance the contrast of the images.
    The objective of histogram equalization is to distribute the intensity values
    in an image such that lower contrast areas can gain higher contrast. Contrast
    Limited Adaptive Histogram Equalization (CLAHE) is a local histogram equalization
    method. The performance of CLAHE depends on two parameters, namely, the number
    of tiles and clip limit. Proper choice of these two parameters ensures better
    visual quality after the application of CLAHE. This section deals with the application
    of CLAHE algorithm to the colour image, in which the input colour image is converted
    to HSV format, and CLAHE is applied to the "V" plane. After enhancing the contrast
    of "V" plane, the image is again converted back to RGB plane for visualization.



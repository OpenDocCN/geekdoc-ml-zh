  md: '| S. No. | Name of the feature | Mathematical expression | Significance |

    |---|---|---|---|

    | 1. | Contrast | $$\sum_{i,j=0}^{N-1} G_{i,j}(i-j)^2$$ | • It measures the local
    variations in the image<br>• A higher value indicates a large difference between
    neighbouring pixels |

    | 2. | Dissimilarity | $$\sum_{i,j=0}^{N-1} G_{i,j}|i-j|$$ | • It measures the
    average difference in the neighbouring pixels<br>• A higher value indicates greater
    heterogeneity in texture |

    | 3. | Homogeneity | $$\sum_{i,j=0}^{N-1} \frac{G_{i,j}}{1+(i-j)^2}$$ | • It reflects
    the closeness of the distribution of elements in the GLCM to the GLCM diagonal<br>•
    A higher value reflects that elements are concentrated along the diagonal and
    that texture is uniform |

    | 4. | Angular second moment (ASM) or energy (E) | $$\text{ASM} = \sum_{i,j=0}^{N-1}
    G_{i,j}^2$$<br>$$E = \sqrt{\text{ASM}}$$ | • It denotes the orderliness or homogeneity
    of the image<br>• A higher value indicates that the texture is more uniform |

    | 5. | Correlation | $$\sum_{i,j=0}^{N-1} \frac{G_{i,j}(i-\mu_i)(j-\mu_j)}{\sqrt{\sigma_i^2
    \sigma_j^2}}$$<br>where<br>$$\mu_i = \sum_{i,j=0}^{N-1} iG_{i,j}$$<br>$$\mu_j
    = \sum_{i,j=0}^{N-1} jG_{i,j}$$<br>$$\sigma_i^2 = \sum_{i,j=0}^{N-1} G_{i,j}(i-\mu_i)^2$$<br>$$\sigma_j^2
    = \sum_{i,j=0}^{N-1} G_{i,j}(j-\mu_j)^2$$ | • It measures the linear dependency
    of pixels on those of neighbouring pixels<br>• The higher value indicates a more
    predictable texture |


    tances" parameter decides whether the neighbouring pixel is either a direct neighbour
    or next neighbour and so on.



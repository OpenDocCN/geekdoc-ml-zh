  md: '# ## 9.4 Coding Redundancy


    In general, data can be in the form of symbols, which will be the pixel value
    of the image data. Those symbols are encoded by the codes, and the length of the
    codes plays a major role in the image compression. The smaller length code is
    used to encode the more frequently occurring symbols, and the larger length of
    the code is used for the symbols that rarely occur. This will achieve the image
    compression. For example, the probability of the symbols is denoted by


    $$P(X_k) = \frac{m_k}{M}, \quad \text{for } k = 0, 1, 2, \ldots, L-1$$ (9.1)


    where $X_k$ is the symbol, $m_k$ denotes the number of occurrences, and $M$ is
    the length of the data. Total number of unique symbols is $L$. The length of the
    code for each symbol is denoted as $l(X_k)$. The average number of bits needed
    to represent the whole data is measured by


    $$L_{\text{avg}} = \sum_{k=0}^{L-1} l(X_k) P(X_k)$$ (9.2)


    Use the variable length code like Huffman coding to represent each symbol. The
    average length of the code will be less than the actual length of the code. Therefore,
    the Huffman coding can be used to reduce the coding redundancy by the lesser number
    of bits allotted to the more probability symbol and a larger number of bits allotted
    to the less probability symbol. For example, the word to be encoded is "SUCCESS".
    The probability of each symbol is given by {$C = 2/7$, $E = 1/7$, $S = 3/7$, $U
    = 1/7$}. Based on the higher probability, the following binary code is assigned
    for each symbol {$S = "1"$, $C = "00"$, $E = "010"$, $U = "011"$}. The encoded
    bitstream of word "SUCCESS" based on the above binary code, we get {"1011000001011"}.
    The total number of bits in the encoded bitstream is 13. Assume that the symbol
    uses 8-bit ASCII code, and to transmit the word "SUCCESS", it takes $(7 \times
    8)$ 56 bits, whereas by using the binary code assigned for each symbol based on
    its probability; it takes only 13 bits. Now, the compression ratio will be $(56/13
    = 4.3077)$, achieved by the coding redundancy in the input data. Using proper
    coding techniques like Shannon Fano, Huffman, and Runlength Coding will reduce
    the coding redundancy.


    # ## 9.5 Psychovisual Redundancy


    Psychovisual redundancy exists due to the inability of human perception to slight
    variations in the original data. The human visual system is more responsive to
    slow variations and gradual changes of illumination than perceiving finer details
    and rapid variations of intensities. For example, the human eye is more sensitive
    to'
  merge: -1

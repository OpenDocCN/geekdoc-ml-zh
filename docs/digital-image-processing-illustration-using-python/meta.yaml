    # ## 6.1 Introduction


    Morphological image processing is a set of non-linear operations that are related
    to the shape or morphology features in an image. Morphological approaches probe
    an image with a small shape or template known as a structuring element. The structuring
    element is positioned at all possible locations in the image, and it is compared
    with the corresponding neighbourhood of pixels. A morphological operation on a
    binary image generates a new binary image in which the pixel has a non-zero value
    only if the test is successful at that location in the input image. Some form
    of morphological operation on image with a structuring element is shown in Fig.
    6.2. From this figure, it is possible to observe that all the pixels in the structuring
    element fit on the image; it will create a new binary image as an output, and
    a few pixels in the structuring element fit with the image pixels, which will
    create a new binary image.'
  merge: -1

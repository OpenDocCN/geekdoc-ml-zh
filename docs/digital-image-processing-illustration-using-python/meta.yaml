    # ## 5.4 Non-linear Spatial Domain Filters


    A filter is non-linear if it is not obeying the superposition principle. The filter
    will violate either additivity property or homogeneity property. The non-linear
    filters discussed in this chapter are order statistics filters, which include
    minimum filter, maximum filter, and median filter.


    # ### 5.4.1 Alpha Trimmed Mean Filter


    Alpha trimmed mean filter removes the *d*/2 lowest and *d*/2 highest gray levels
    to process the remaining "*mn − d* pixels" where "*m*" and "*n*" represent the
    number of rows and columns of the mask. The expression for alpha-trimmed mean
    filter is given by


    $$g(x,y) = \frac{1}{mn-d} \sum_{(s,t) \in S_{xy}} f_r(s,t)$$ (5.9)


    Alpha-trimmed mean filter is a balance between a median filter and a mean filter.


    # **Experiment 5.13: Alpha Trimmed Mean Filter Versus Mean Filter**


    In this experiment, the input "Cameraman" image is corrupted with salt and pepper
    noise. The noisy image is then passed through mean and alpha trimmed mean filter.
    The mask for mean and alpha trimmed mean filter is 5 × 5 mask. The Python code
    that performs this task is shown in Fig. 5.27, and the corresponding result is
    shown in Fig. 5.28.


    # **Inference**


    +   - From Fig. 5.28, the visual quality of alpha trimmed mean filter is marginally
    better than mean filter in minimizing the impact of salt and pepper noise in digital
    image.



    \ segmented using fuzzy C-means clustering algorithm.\n\n# ### 7.5.3 *Mean Shift\
    \ Algorithm-Based Image Segmentation*\n\nThe mean shift algorithm belongs to density-based\
    \ clustering. Here, density refers to probability density function. Given a set\
    \ of data points from an unknown probability distribution, density estimation\
    \ refers to the problem of estimating density function of the given data. Density\
    \ estimation can be broadly classified into parametric and non-parametric. Parametric\
    \ density estimation is a model-based approach. The advantage of the parametric\
    \ method is that the estimates of the values can be made using a small amount\
    \ of data. In non-parametric method, no assumption is made about the distribution\
    \ of the data. The density is estimated based only on the available data. The\
    \ mean shift (MS) algorithm is a non-parametric iterative method introduced by\
    \ Fukunaga and Hostetler for locating modes of a probability density function\
    \ via a kernel density estimate from a given dataset. The algorithm was generalized\
    \ by Cheng to illustrate that mean shift algorithm is a mode-seeking process on\
    \ a surface constructed with a shadow kernel. The mean shift algorithm iteratively\
    \ shifts each data point to a weighted average of neighbouring points to find\
    \ stationary points of the estimated probability density function. The mean shift\
    \ algorithm can be used as a clustering tool, where each mode represents a cluster.\
    \ In contrast to the k-mean clustering approach, the mean shift algorithm does\
    \ not require prior knowledge of the number of clusters, and there is no assumption\
    \ of the shape of the clusters. The mean shift algorithm can be applied to image\
    \ segmentation, object tracking, edge detection, and information fusion applications.\
    \ The steps involved in mean shift algorithm are summarised below:\n\n+   1. Given\
    \ a distribution of \"*N*\" data in feature space, set $m_i = f_i$ as the initial\
    \ mean for each data \"*I*\".\n2. Repeat the following for each mean $m_i$:\n\
    \   (a) Place window of size *W* around $m_i$.\n   (b) Compute centroid (*m*)\
    \ within the window. Set $m_i = m$.\n   (c) Stop if the shift in $m_i$ is less\
    \ than a threshold."

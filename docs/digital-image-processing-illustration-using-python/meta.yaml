    # ## 5.9 Image Restoration


    Digital image restoration is a field of engineering that studies methods used
    to recover an original scene from degraded observations. Due to imperfections
    in the image capturing process, the recorded image represents the degraded version
    of the original scene. In this process, mathematical model of degradation is obtained
    first, then the inverse of the degradation is applied to recover the original
    image. The image degradation model is shown in Fig. 5.57. In the figure, $f[m,
    n]$ represents noise-free image, $h[m, n]$ represents degradation function, $\eta[m,
    n]$ represents the additive noise, and $g[m, n]$ represents the degraded image.


    If the degradation function is assumed to be linear and shift invariant, then
    the expression for the degraded image is given by


    $$g[m,n] = f[m,n] * h[m,n] + \eta[m,n] \qquad (5.19)$$'
  - '[PAGE 363]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_363_0.png)


    **Fig. 5.58** Model of image restoration


    In Eq. (5.19), "*" represents the convolution operation. Upon taking Fourier transform
    on both sides, the expression for the degraded image in frequency domain is expressed
    as


    $$G[k,l] = F[k,l]H[k,l] + N[k,l]$$ (5.20)


    The objective of image restoration is to design a system ($w[m, n]$) that operates
    on the observed image $g[m, n]$ to obtain the estimate of the input image $f[m,
    n]$, which is represented as $f''[m, n]$. This is depicted in Fig. 5.58.


    In the figure, $f''[m, n]$ is the restored image, which should be as close as
    possible to the noise-free image $f[m, n]$.


    # ## 5.10 Classification of Image Restoration Methods


    Image restoration methods can be classified based on the type and amount of information
    related to the images involved in the problem and also the distortion. One way
    to classify image restoration methods is (1) deterministic or (2) stochastic methods.
    It can also be classified as (1) non-blind, (2) semi-blind, and (3) blind methods.


    Deterministic methods work directly on image values in either spatial domain or
    frequency domain. Stochastic methods work on statistical properties of image of
    interest. In the non-blind method, it is assumed that the cause of degradation
    is known. In semi-blind methods, the degradation process is partly known. In blind
    methods, the degradation process is unknown.


    # ## 5.11 Point Spread Function (PSF)


    The PSF identifies the response, which is the output of the imaging system, to
    a point source that is the input. The pattern of the PSF is influenced by the
    optical device that is used to record the blurred image or by other physical or
    environmental events. Some of the assumptions in PSF are summarized as follows:


    +   1. The PSF is spatially invariant in many applications but not all. The PSF
    is equally distributed along the spatial coordinates in the blurred image. Spatially
    variant PSF is computationally difficult to construct because each pixel has a
    different PSF.'
  - '[PAGE 364]


    +   2. The blurring is a local phenomenon. This implies that the light intensity
    of the PSF is confined to a small area around its centre and is zero beyond a
    given distance from its centre.

    3. The PSF can be represented as a matrix that contains all the information about
    the blurring function, and its size, in general, is less than the size of the
    image.

    4. The sum of the pixel values of the PSF array is equal to 1. This is represented
    as $\sum_{m=0}^{N-1}\sum_{n=0}^{N-1}h[m,n]=1$.

    5. The coefficients of the matrix of the PSF have only positive values since the
    nature of image formation cannot be negative.


    Blurring is a form of bandwidth reduction of an ideal image owing to the imperfect
    image formation process. It can be caused by an optical system that is out-of-focus,
    or it can be caused by relative motion between the camera and the scene, or it
    may be due to atmospheric turbulence. This section discusses the mathematical
    model of different types of blurs.


    # ### 5.11.1 No Blur


    If the image is recorded perfectly, no blur will appear in the digital image.
    The point spread function (PSF), in this case, can be modelled as a delta function,
    which is represented as


    $$h[m,n]=\begin{cases}1, & \text{if } m=n=0 \ 0, & \text{Otherwise}\end{cases}$$
    (5.21)



    # Answers to PreLab Questions


    1. Examples of non-linear filters include median filter, Bilateral filter, non-local
    mean filter, and morphological filter. The non-linear filters effectively suppress
    non-Gaussian noise, such as spike noise, while preserving the edge information.


    2. A filter is considered as a non-linear filter if it does not obey superposition
    principle. Superposition principle involves (1) homogeneity property and (2) additivity
    property. The median filter violates the additivity property; hence it is non-linear.


    3. Bilateral filter considers both spatial and depth statistics. It can smooth
    the image as well as it can preserve the edge information in the image. The smoothing
    effect allows it to minimize the impact of Gaussian noise and salt and pepper
    noise.



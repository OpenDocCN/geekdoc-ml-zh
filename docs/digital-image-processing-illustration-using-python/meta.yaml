    \ 1.44** Result of translation of the image\n\n## 1.7 Image Sampling\n\nAnalog\
    \ images must be sampled and quantized to store and process using a computer.\
    \ Before sampling, it is necessary to ensure that the signal is band-limited.\
    \ The analog image is sampled on a discrete grid, and each sample is quantized\
    \ to an integer value representing a gray level. The digitized image can be processed\
    \ by means of a computer. This process is illustrated in Fig. 1.45.\n\nIn Fig.\
    \ 1.45, $f(x,y)$ represents the input analog image, $f_s[m,n]$ represents the\
    \ sampled image, and after quantization, the digital image is represented as $f[m,n]$.\n\
    \n### 1.7.1 *Band Limited Image*\n\nAn image is band-limited if its Fourier transform\
    \ is zero outside the bounded region in the frequency plane. Let $f(x,y)$ represents\
    \ the input image in the spatial domain; upon taking Fourier transform, let its\
    \ spectrum be represented by $F(\\omega_1, \\omega_2)$. If one assumes that the\
    \ spectrum is circularly symmetric, then the spectrum of the input image is depicted\
    \ in Fig. 1.46. From Fig. 1.46, it is possible to observe that\n\n$$F(\\omega_1,\
    \ \\omega_2) = 0, |\\omega_1| > \\omega_{10}, |\\omega_2| > \\omega_{20}$$ (1.6)\n\
    \n![](img/f88e6a966edb922bd0b2ae87662c6c4b_55_0.png)\n\n![](img/f88e6a966edb922bd0b2ae87662c6c4b_55_1.png)\n\
    \nIf an image satisfies the above-mentioned criterion, it is claimed to be a band-limited\
    \ image.\n\n### 1.7.2 *Spectrum of the Sampled Image*\n\nThe Fourier transform\
    \ of the sampled image is a scaled, periodic replication of the spectrum of the\
    \ input image. This is illustrated in Fig. 1.47. From the figure, it is possible\
    \ to observe the spectrum replication in $\\omega_1$ and $\\omega_2$ axes. The\
    \ expression for the sampled spectrum is given by\n\n$$F_s(\\omega_1, \\omega_2)\
    \ = \\frac{1}{\\Delta x \\Delta y} \\sum_{k=-\\infty}^{\\infty} \\sum_{l=-\\infty}^{\\\
    infty} F\\left(\\omega_1 - \\frac{2\\pi k}{\\Delta x}, \\omega_2 - \\frac{2\\\
    pi l}{\\Delta y}\\right) \\tag{1.7}$$\n\nwhere $\\Delta x = \\frac{1}{\\omega_{xs}}$\
    \ and $\\Delta y = \\frac{1}{\\omega_{ys}}$. Equation (1.7) can be expressed as\n\
    \n$$F_s(\\omega_1, \\omega_2) = \\frac{1}{4\\pi^2} \\omega_{xs} \\omega_{ys} \\\
    sum_{k=-\\infty}^{\\infty} \\sum_{l=-\\infty}^{\\infty} F(\\omega_1 - k\\omega_{xs},\
    \ \\omega_2 - l\\omega_{ys}) \\tag{1.8}$$\n\nEquation (1.8) justifies that the\
    \ sampled signal spectrum gets replicated along $\\omega_1$ and $\\omega_2$ axes.\
    \ The frequencies $2\\omega_{10}$ and $2\\omega_{20}$ are termed as Nyquist frequencies.\
    \ In order to reconstruct the image exactly from the samples, the sampling frequency\
    \ should be greater than or equal to twice the frequency associated with the finest\
    \ detail in the image. Violation of the sampling theorem results in overlapping\
    \ the spectrum in the frequency domain, termed \"aliasing\".\n\n![](img/f88e6a966edb922bd0b2ae87662c6c4b_56_0.png)\n\
    \n**Fig. 1.47** Spectrum of sampled image\n\n### 1.7.3 *Reconstruction of the\
    \ Image*\n\nIf the sampling frequencies along the \"x\" and \"y\" directions are\
    \ chosen in such a way that $\\omega_{xs} > 2\\omega_{10}$ and $\\omega_{ys} >\
    \ 2\\omega_{20}$, then it is possible to recover $F(\\omega_1, \\omega_2)$ from\
    \ $F_s(\\omega_1, \\omega_2)$ using 2D ideal low-pass filter whose frequency response\
    \ is given by\n\n$$H(\\omega_1, \\omega_2) = \\begin{cases} \\Delta x \\Delta\
    \ y, & \\omega_1, \\omega_2 \\in R, \\\\ 0, & \\text{otherwise}. \\end{cases}$$\
    \ (1.9)\n\nThe spectrum of the reconstructed image is given by\n\n$$\\hat{F}(\\\
    omega_1, \\omega_2) = H(\\omega_1, \\omega_2) F_s(\\omega_1, \\omega_2)$$ (1.10)\n\
    \nA typical choice of \"$R$\" is a rectangular region for which the impulse response\
    \ is a \"sinc\" function, which is given by\n\n$$h(x,y) = sinc(x\\omega_{xs})\
    \ sinc(y\\omega_{ys})$$ (1.11)\n\nWe know that convolution in the spatial domain\
    \ is equivalent to multiplication in the frequency domain and vice versa. Using\
    \ this idea, Eq. (1.10) can be expressed as\n\n$$\\hat{f}(x,y) = h(x,y) * f_s(x,y)$$\
    \ (1.12)\n\nIn the above equation, \"*\" represents two-dimensional convolution.\
    \ Equation (1.12) can be expressed as\n\n$$\\hat{f}(x,y) = \\sum_{m=-\\infty}^{\\\
    infty} \\sum_{n=-\\infty}^{\\infty} f(m\\Delta x, n\\Delta y) \\text{ sinc}\\\
    left(\\omega_{xs}(x-m\\Delta x)\\right) \\text{ sinc}\\left(\\omega_{ys}(y-n\\\
    Delta y)\\right)$$ (1.13)\n\n### 1.7.4 Aliasing Problem\n\n*Case (i): Sampling\
    \ Frequency ($\\omega_{xs} < 2\\omega_{10}$)*\n\nIf the sampling frequency $\\\
    omega_{xs} < 2\\omega_{10}$, then spectral overlapping occurs along $\\omega_1$\
    \ axis, which results in aliasing. This is illustrated in Fig. 1.48.\n\n*Case\
    \ (ii): Sampling Frequency ($\\omega_{ys} < 2\\omega_{20}$)*\n\nIf the sampling\
    \ frequency $\\omega_{ys} < 2\\omega_{20}$, then spectral overlapping occurs along\
    \ $\\omega_2$ axis, which results in aliasing. This is illustrated in Fig. 1.49.\n\
    \n*Case (iii): Sampling Frequency ($\\omega_{xs} < 2\\omega_{10}$ and $\\omega_{ys}\
    \ < 2\\omega_{20}$)*\n\nIf the sampling frequency $\\omega_{xs} < 2\\omega_{10}$\
    \ and $\\omega_{ys} < 2\\omega_{20}$, then spectral overlapping occurs along $\\\
    omega_1$ and $\\omega_2$ axes, which results in aliasing. This is illustrated\
    \ in Fig. 1.50.\n\n## **Experiment 1.25: Image Sampling**\n\nIn this experiment,\

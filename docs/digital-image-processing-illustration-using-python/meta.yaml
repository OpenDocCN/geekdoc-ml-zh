    The following inferences can be drawn from Fig. 2.7:


    +   - $x[m, n]$ represents the input signal, which is a "Cameraman image".

    - $y_1[m, n]$ represents the spatial shift along the column, which is obtained
    by convolving the input image with $\delta[m, n - n_0]$.

    - $y_2[m, n]$ represents spatial shift along the row, which is obtained by convolving
    the input image with $\delta[m - m_0, n]$.

    - $y_3[m, n]$ represents the spatial shift along both row and column, which is
    obtained by convolving the input image with $\delta[m - m_0, n - n_0]$.



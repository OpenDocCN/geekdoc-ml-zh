    # ## 5.3 Filters for Noise Minimization


    The objective of denoising is to minimize the impact of noise so as to restore
    the true image. The major challenges in image denoising are as follows: (1) Edges
    of the image should be preserved; (2) Flat areas in the digital image should remain
    smooth; (3) Textures in the image should be preserved; and (4) New artifacts should'

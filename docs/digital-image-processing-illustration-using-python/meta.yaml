    # ### 7.2.2 Line Detection


    There are three different types of line edges such as (1) Step edge, (2) Ramp
    edge, and (3) Roof edge. Step edge refers to a sudden change in gray level value.
    Ramp edge refers to a gradual change in the gray level value. For the roof edge
    profile, the intensity value should first increase, and then proportionately,
    it should decrease. The image that exhibits step edge can be generated by the
    black and white image in which 50% of the image exhibits a low gray level value
    (0), and the remaining 50% should exhibit a high gray level value (255). The image
    that exhibits a ramp edge is obtained by performing a smoothing operation on the
    image that exhibits a step edge profile. Smoothing operation converts sudden change
    in gray level value to gradual change in the gray level value.


    # **Experiment 7.2: Types of Edges in Digital Image**


    This experiment aims to generate the three types of line edge images and display
    their edge profile. The Python code that generates the edge images and their edge
    profile is shown in Figs. 7.6 and 7.7, respectively.


    # **Inferences**


    The following inferences can be drawn from this experiment:


    +   - Image-1 exhibits step edge profile. Sudden change results in a step-edge
    profile. Upon observing image-1, it is possible to infer that Image-1 has a gray
    level value of "1", which immediately takes a value of ''0''. This results in
    discontinuity in the image.

    - Image-2 exhibits a ramp edge profile. Image-2 is obtained from Image-1 by passing
    Image-1 through a low pass filter. The size of the low pass filter mask used in
    this experiment is 19 × 19. The sudden change is converted into a gradual change
    upon performing low-pass filtering.

    - Image-3 exhibits the roof edge profile. At the centre, the gray level value
    is high and is gradually decreasing at both ends from the centre, which results
    in a roof edge.'

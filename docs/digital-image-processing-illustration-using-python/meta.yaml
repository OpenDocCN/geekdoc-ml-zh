  md: '![](img/f88e6a966edb922bd0b2ae87662c6c4b_62_0.png)


    Quantizing an image with lesser number of bits introduces "false contours". The
    step size of the quantizer is given by $\Delta = \frac{DR}{L}$, where "$DR$" represents
    the dynamic range and "$L$" represents the reconstruction level. The reconstruction
    level is provided by $L = 2^b$, where "$b$" is the number of bits used to represent
    the pixel value. Equal distances between adjacent decision levels and adjacent
    reconstruction levels lead to uniform quantization.



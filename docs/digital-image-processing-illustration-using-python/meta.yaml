    frequencies and (2) constraint division approach. These two approaches are termed
    as pseudo-inverse filtering. Pseudo-inverse filter is a stabilized version of
    the inverse filter. To mitigate the effect of zeros in the degradation function,
    the expression for the restoration filter is given by'

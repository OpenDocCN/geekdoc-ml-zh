    The mathematical operations performed in the digital image can be classified as
    (1) arithmetic operation, (2) logical operation, and (3) geometric transformation.
    The arithmetic operation includes addition, subtraction, multiplication, and division.
    The logical operations include AND, OR, XOR, and NOT operations. The geometric
    transformation includes rotation, scaling, and translation.'

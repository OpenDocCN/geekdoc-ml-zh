    # ### 6.11.7 *Second-Order Derivative of Morphological Operation*


    This section discusses the morphological second-order derivatives. It can be achieved
    by subtracting the smoothed image from its original image. For the variety of
    smooth operations in the morphological processing, there are three types of second-order
    derivative morphological operations.


    # #### Dynamic Edge Gradient (DYG)


    The mathematical expression of dynamic edge gradient (DYG) is defined as


    $$\text{DYG}(X) = X - \text{DYT}(X) \qquad (6.39)$$


    where DYT(*X*) denotes the dynamic smoothing of image *X*. This function will
    isolate all the edges in the input image.


    # #### Texture Edge Gradient (TEG)


    The texture edge gradient will isolate only non-ramp edges instead of all edges.
    The mathematical expression for the texture edge gradient is given by


    $$\text{TEG}(X) = X - \text{TET}(X) \qquad (6.40)$$


    where TET(*X*) denotes the texture smoothing of image *X*.'

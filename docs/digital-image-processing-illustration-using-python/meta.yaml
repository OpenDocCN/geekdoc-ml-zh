    # ### 9.14.1 Fractal Image Compression Algorithm


    Fractal image compression is a lossy image compression approach. It was developed
    by Hutchinson, Barnsley, and Demko. This approach searches the self-similarities
    among the diverse image blocks and only stores the parameters of the contractual
    transformation in place of the image pixels. The fractal image compression can
    be achieved by using affine transformations, which are mathematically written
    as


    ```

    $$w_i\begin{bmatrix} m \ n \end{bmatrix} = \begin{bmatrix} a_i & b_i \ c_i & d_i
    \end{bmatrix}\begin{bmatrix} m \ n \end{bmatrix} + \begin{bmatrix} e_i \ f_i \end{bmatrix}$$
    (9.37)

    ```


    where (*m*, *n*) denotes the location of the pixel, *a*<sub>*i*</sub>, *b*<sub>*i*</sub>,
    *c*<sub>*i*</sub>, *d*<sub>*i*</sub>, *e*<sub>*i*</sub>, and *f*<sub>*i*</sub>
    are the parameters, which translate, skew, stretch, rotate, and scale an input
    image pixel. Let us consider an image shown in Fig. 9.71a. From this figure, we
    can make a copy of images, which is depicted in Fig. 9.71b. Comparing these two
    images, the source image is shown in Fig. 9.71a, and multiple copies of the image
    are shown in Fig. 9.71b. Now, if we want to store or represent an image shown
    in Fig. 9.71b, only the original input image, along with the affine transform
    constants, is enough. That is the advantage of fractal image compression.


    The fractal image compression algorithm starts with the partioning of the image
    into "*M*" non-overlapping range blocks "*R*<sub>*i*</sub>". Another partition
    of the image is made this time into "*N*" non overlapping domain blocks "*D*<sub>*j*</sub>".
    Each domain block has the size of twice the size of the range blocks. The domain
    and range block of an image is illustrated in Fig. 9.72. With these two image
    partitions, the fractal block coding algorithm searches each range block "*R*<sub>*i*</sub>"
    for the best match amongst the domain blocks "*D*<sub>*j*</sub>". In order to
    compare a domain block with a range block, the size of both'

    # ## 5.9 Image Restoration


    Digital image restoration is a field of engineering that studies methods used
    to recover an original scene from degraded observations. Due to imperfections
    in the image capturing process, the recorded image represents the degraded version
    of the original scene. In this process, mathematical model of degradation is obtained
    first, then the inverse of the degradation is applied to recover the original
    image. The image degradation model is shown in Fig. 5.57. In the figure, $f[m,
    n]$ represents noise-free image, $h[m, n]$ represents degradation function, $\eta[m,
    n]$ represents the additive noise, and $g[m, n]$ represents the degraded image.


    If the degradation function is assumed to be linear and shift invariant, then
    the expression for the degraded image is given by


    $$g[m,n] = f[m,n] * h[m,n] + \eta[m,n] \qquad (5.19)$$'

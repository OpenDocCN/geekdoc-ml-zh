    Based on nature of basis function, transform can be broadly classified into transform
    with sinusoidal basis function and transform with non-sinusoidal basis function.
    Examples of transforms with sinusoidal basis functions are (1) Fourier transform,
    whose basis function is a complex exponential function and (2) Discrete Cosine
    Transform, whose basis function is a cosine function. Haar and Hadamard transform
    belongs to the category of transform with non-sinusoidal basis function. Transform
    that has the ability to perform multi-resolution analysis of the signal are "wavelet
    and wavelet packet transform". The transforms that express a signal in terms of
    its projections are the Radon transform and Hough transform. Radon transform is
    widely used in computed tomography; Hough transform is widely used to detect lines
    and shapes in an image.



    # ## 5.7 Anisotropic Diffusion Filter


    Noise filtering is a smoothing process that tends to blur important image structures
    such as edges and lines. Perona and Malik proposed an anisotropic diffusion equation
    that tends to preserve edges in the image. Anisotropic diffusion is a non-linear
    partial differential equation-based diffusion process. Anisotropic diffusion filtering
    can successfully smooth noise while preserving the region boundaries and small
    structures within the image if the crucial parameters are estimated correctly.
    The anisotropic equation is given by


    ```

    $$\frac{\partial I(x,y,t)}{\partial t} = div\left[g\left(\nabla I(x,y,t)\right)\nabla
    I(x,y,t)\right]$$ (5.14)

    ```


    where "t" is the time parameter, I(x, y, 0) is the original image, ∇I(x, y, t)
    is the gradient of the image at time "t", and g(.) is the conductance function.
    This function is chosen in such a way that $\lim_{x \to 0} g(x) = 1$, which implies
    that the diffusion is maximal within the uniform region and $\lim_{x \to \infty}
    g(x) = 0$, which implies that the diffusion is stopped across edges. The diffusion
    function proposed by Perona and Malik is given by


    ```

    $$g(x) = \frac{1}{1 + \left(\frac{x}{K}\right)^2}$$ (5.15)

    ```


    where "K" is the gradient magnitude threshold parameter that controls the rate
    of diffusion. The discrete version of anisotropic diffusion equation proposed
    by Perona and Malik is given by'

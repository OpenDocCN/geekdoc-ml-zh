  md: "Now, differentiating the above equation with respect to \"$z$\" and equating\
    \ it to zero, we get\n\n$$\\frac{\\partial J_1(z)}{\\partial z} = 2z - 2b = 0;$$\n\
    \n$$z = b \\tag{5.68}$$\n\nTherefore, the minimum of the function, $z^2 - 2bz$,\
    \ is at $z = b$. If $|b| \\leq 1$, then the solution is $z = b$, and this solution\
    \ also can be seen as $z = \\text{ sign }(b)$. Therefore, the final solution of\
    \ this function is in the form of a \"Clip function\", and it is defined as\n\n\
    $$\\text{Clip}(b, T) = \\begin{cases} b, & \\text{for } |b| \\leq T \\ T \\text{sign}(b),\
    \ & \\text{for } |b| > T \\end{cases} \\tag{5.69}$$\n\nBased on Eq. (5.69), the\
    \ \"$z$\" update equation can be written as\n\n$$z^{(i+1)} = \\text{Clip}\\left(z^{(i)}\
    \ + \\frac{1}{\\alpha} D\\left(\\frac{2}{\\lambda} y - D^T z^{(i)}\\right), 1\\\
    right) \\tag{5.70}$$\n\nwhere \"$i$\" is the iteration index and once the $z^{(i)}$\
    \ is converged then the signal $x = y - \\lambda \\dfrac{D^T z}{2}$. The optimization\
    \ problem is convex and the iteration will converge from any initialization. This\
    \ algorithm is also called as \"*iterative clipping algorithm*\".\n\n# ### Chambolle's\
    \ Projection Algorithm\n\nThe Chambolle's project algorithm can be used for minimizing\
    \ the total variation of a grayscale image. This algorithm is working based on\
    \ a dual formulation method. The algorithm of Chambolle's projection method for\
    \ grayscale image denoising is given in Fig. 5.96. From this figure, it is possible\
    \ to observe that $y$ is the noisy input image and $z$ is the denoised image.\n\
    \n```\n**Algorithm:** Chambolle's Projection approach for TV denoising of a grayscale\
    \ image\n\n**Input:** A noisy image $y[i, j]$ with a size of $N \\times N$, a\
    \ trade-off parameter $\\lambda > 0$, a time step parameter ($\\delta_t > 0$)\
    \ and an algorithm tolerance ($\\tau > 0$).\n\n$p = 0$\n\n**while** $\\max\\limits_{1\
    \ \\leq i, j \\leq N} \\{|p^{n+1}[i, j] - p^n[i, j]|\\} > \\tau$ **do**\n    **for**\
    \ all pixel $[i, j]$ in the image **do**\n        $p(i, j) \\leftarrow \\frac{p[i,\
    \ j] + \\delta_t D(div\\ p - \\lambda \\eta)[i, j]}{1 + \\delta_t |D(div\\ p -\
    \ \\lambda \\eta)[i, j]|}$\n    end **for**\nend **while**\n\nReturn $z = \\eta\
    \ - \\frac{1}{\\lambda} div\\ p$.\n\n**Output:** The denoised image $z[i, j]$\
    \ as a $N \\times N$ matrix.\n```\n\n**Fig. 5.96** Chambolle's projection algorithm\
    \ for TV denoising"

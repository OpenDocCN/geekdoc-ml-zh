    # ## 9.1 Introduction


    Image compression is an algorithm that represents image data with fewer bits without
    degrading the image quality or information. Image compression can be achieved
    by reducing the redundancy present in an image. The redundancy of the image is
    classified into four types (1) Spatial redundancy, (2) Spectral redundancy, (3)
    Coding redundancy, and (4) Psychovisual redundancy.


    # ## 9.2 Spatial Redundancy or Interpixel Redundancy


    Spatial redundancy exploits the similarity or correlation across different pixels
    of an image. It is also known as interpixel redundancy. This allows a pixel value
    to be estimated from its neighbouring pixel. If the neighbouring pixel values
    are the same, then it contains high spatial redundancy, which will be reduced
    by any transform technique or run length coding.


    An image block is shown in Fig. 9.2, which highlights the high and low spatial
    redundant information. From this figure, it is possible to observe that the encircled'
  - '[PAGE 603]


    pixel value, and its closest neighbours take a similar value, which has high spatial
    redundancy, whereas the pixel marked as square and its neighbouring pixels are
    different. It shows that the pixel has less spatial redundancy with its neighbourhoods.
    Generally, a smooth region in an image contains high spatial redundancy, and the
    edge portion has very less spatial redundancy.


    # 9.3 Spectral Redundancy


    Spectral redundancy exists in the colour images. In general, the colour image
    is a combination of three primary colours like red, green, and blue. Each colour
    component can represent the information of the image content. The correlation
    between the colour bands is called spectral redundancy. The spectral redundancy
    can be minimized by using the sub-sampling process and converting the RGB to YUV,
    RGB to YCbCr, and RGB to HSI.



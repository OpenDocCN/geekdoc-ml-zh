  md: '# ### 5.2.5 Poisson Noise


    Poisson noise can be modelled by a Poisson process. The Poisson distribution is
    expressed as


    $$P(f(x=k)) = \frac{\lambda^k e^{-\lambda}}{k!}$$ (5.5)


    The above model assumes that each pixel of the image *f(x)* is drawn from Poisson
    distribution. In Eq. (5.5), "$\lambda$" is proportional to the number of photons
    that hit the receptor during the exposition time. The Poisson noise is also termed
    as "Shot noise".



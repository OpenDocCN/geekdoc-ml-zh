    # ### 4.13.1 Single-Scale Retinex Algorithm


    Single-scale retinex considers Gaussian-filtered image as the illumination. The
    single-scale retinex algorithm produces a reflection image by evaluating the ambient
    brightness, which is represented as


    $$\log\left[R_i(x,y)\right] = \log\left[I_i(x,y)\right] - \log\left[G(x,y) * I_i(x,y)\right]$$
    (4.42)


    In the above expression, $I(x, y)$ represents the input image, $R(x, y)$ represents
    the reflection image, and "$i$" represents the various colour channels. $G(x,
    y)$ represents the Gaussian function and "*" represents the convolution operation.
    The Gaussian function is given by


    $$G(x,y) = ke^{-\frac{x^2+y^2}{\sigma^2}}$$ (4.43)


    In the above expression, "$\sigma$" represents the scaling factor. The smaller
    the scaling factor, the greater the image''s dynamic range compression and the
    clearer the local values.


    # **Experiment 4.53: Single-Scale Retinex Algorithm**


    This experiment deals with the implementation of a single-scale retinex algorithm
    using Python. The Python code that performs a single-scale retinex algorithm is
    shown in Fig. 4.122, and the corresponding output is shown in Fig. 4.123.


    # **Inferences**


    The following inferences can be made from Fig. 4.123:'
  - '[PAGE 308]



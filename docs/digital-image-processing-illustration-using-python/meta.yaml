    # ## 11.5 Dimensionality Reduction


    Dimensionality reduction is a method used to reduce the number of features in
    a dataset. The reduced number of features is enough to represent the information
    about the actual dataset. It can also be defined as "the process of converting
    the higher dimensional dataset into lesser dimensions dataset ensuring that it
    provides similar information". In machine learning, higher dimensional data refers
    to data with a large number of features. Therefore, the curse of dimensionality
    is a common issue in machine learning, where the performance of the model weakens
    as the number of features increases. Also, the complexity of the model increases
    with the'
  - '[PAGE 792]


    number of features increases. It may also lead to overfitting, where the model
    fits the training data too closely and does not generalize well to new data.


    The dimensionality reduction methods are widely used in machine learning for obtaining
    a better-fit predictive model while solving classification and regression problems.
    Dimensionality reduction techniques are majorly classified into feature selection
    and dimensionality reduction. There are several ways to select features: missing
    value ratio, low variance filter, high correlation filter, random forest, backward
    feature extraction, and forward feature selection. Dimensionality reduction can
    be done through components or factors-based and projection-based reduction. The
    components or factors-based reduction methods are factor analysis, principal component
    analysis (PCA), and independent component analysis (ICA). Some of the projection-based
    reduction methods are ISOMAP (Isometric Mapping), t-SNE (t-distributed Stochastic
    Neighbour Embedding), and UMAP (Uniform Manifold Approximation and Projection).


    # 11.5.1 Feature Selection


    The process of selecting the subset of the relevant features and leaving out the
    irrelevant features from the dataset is called as feature selection. The selection
    of relevant features in a dataset plays a major role in building a high-accuracy
    model. The process of selecting the optimal features from the input dataset is
    known as feature selection. Three possible methods can be used for the feature
    selection: (1) Filters method, (2) Wrappers method, and (3) Embedded method. In
    the filters method, the irrelevant features in the dataset are filtered out, and
    only the relevant features are retained in the dataset. The most commonly used
    filter methods are correlation, chi-square test, ANOVA (Analysis of Variance),
    information gain, etc. In the wrappers method, some features are given as input
    to the machine learning algorithm and evaluate the performance. If the performance
    improves, then those features are added; otherwise, they are removed from the
    list. This method is more accurate than the filtering method, but it is complex.
    Some examples of wrapper methods are forward selection, backward selection, and
    bi-directional elimination. Embedded approaches use the feature in the different
    training iterations and evaluate the importance of each feature. The used feature
    has some importance; that feature is added to the feature selection list or else
    not included in the feature selection list. Examples of the embedded methods are
    LASSO, Elastic Net, Ridge Regression, etc.


    # 11.5.2 Feature Extraction


    Feature extraction is an algorithm that transforms the higher-dimensional space
    input data into lower-dimensional space. In other words, the feature extraction
    algorithm involves creating new features by combining or transforming the original'

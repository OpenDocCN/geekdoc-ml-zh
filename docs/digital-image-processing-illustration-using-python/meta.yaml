    # ### 7.3.2 Otsu Thresholding


    The main idea behind Otsu''s algorithm is to minimize within-class variance or
    maximize the between-class variance to determine the optimal threshold value.
    Otsu method assumes a bimodal distribution of gray level values.


    The expression for within class variance at specific threshold value "T" is given
    by


    ```

    $$\sigma_w^2 = c_1\sigma_1^2 + (1-c_1)\sigma_2^2$$ (7.16)

    ```


    In the above expression, $\sigma_1^2$ and $\sigma_2^2$ are the variance of the
    first and second class, respectively, and $c_1$ is the cumulative sum at threshold
    "T". Thus, $\sigma_w^2$ is the weighted sum of variances of both classes.


    The expression for between-class variance at specific value of threshold "T" is
    given by


    ```

    $$\sigma_b^2 = c_1(1-c_1)(\mu_1-\mu_2)^2$$ (7.17)

    ```


    In the above expression, $\sigma_b^2$ represents between class variance, and $\mu_1$
    and $\mu_2$ are the mean of classes 1 and 2, respectively.


    Assuming that the range of grayscale of image is $i = 0, 1, 2, ..., L-1$, and
    the pixels number with grayscale "k" is $n_k$, the total number of pixels in the
    image is given by


    ```

    $$N = \sum_{k=0}^{L-1} n_k$$ (7.18)

    ```


    The probability of occurrence of the gray level "k" is given by


    ```

    $$p_k = \frac{n_k}{N}$$ (7.19)

    ```


    The gray level threshold "T" can be used to divide the gray level of the image
    into two parts: $C_1 = (0, 1, 2, ..., T)$, $C_2 = (T+1, T+2, ..., L-1)$, then
    the probability and the mean of the class $C_1$ and $C_2$ are given by


    ```

    $$P_r(C_1) = \sum_{i=0}^{T} p_i = C_1$$ (7.20)

    ```


    ```

    $$P_r(C_2) = \sum_{i=T+1}^{L-1} p_i = 1-C_1$$ (7.21)

    ```


    ```

    $$\mu_1 = \sum_{i=0}^{T} \frac{ip_i}{C_1}$$ (7.22)

    ```


    ```

    $$\mu_2 = \sum_{i=T+1}^{L-1} \frac{ip_i}{1-C_1}$$ (7.23)

    ```'
  - '[PAGE 489]


    The expression for the variance of the classes $C_1$ and $C_2$ are expressed as


    $$\sigma_1^2 = \sum_{i=1}^{T} \frac{(i-\mu_1)^2 p_i}{C_1}$$ (7.24)


    $$\sigma_2^2 = \sum_{i=T+1}^{L-1} \frac{(i-\mu_1)^2 p_i}{1-C_1}$$ (7.25)


    The expression for within-class variance at specific threshold value "$T$" is
    given by


    $$\sigma_w^2 = c_1\sigma_1^2 + (1-c_1)\sigma_2^2$$ (7.26)


    The expression for between-class variance at specific value of threshold "$T$"
    is given by


    $$\sigma_b^2 = c_1(1-c_1)(\mu_1-\mu_2)^2$$ (7.27)


    The objective of Otsu algorithm is to minimize the within-class variance or maximize
    the between-class variance. The optimum threshold is the value $k^*$ that maximizes
    $\sigma_b^2(k^*)$, where


    $$\sigma_b^2(k^*) = \max_{0 \leq k \leq L-1} \sigma_b^2(k)$$ (7.28)


    Thus, the segmented image based on the threshold value is given by


    $$g(m,n) = \begin{cases} 1, & \text{if } f(m,n) \geq k^* \ 0, & \text{if } f(m,n)
    < k^* \end{cases}$$ (7.29)


    The separability measure is expressed as


    $$\eta(k^*) = \frac{\sigma_b^2(k^*)}{\sigma^2(G)}$$ (7.30)


    In the above expression, $\sigma^2(G)$ represents the global variance. $\eta(k^*)$
    takes value between 0 and 1.


    In summary, Otsu''s method looks at every possible value for the threshold between
    the background and foreground, calculates the variance within each of the two
    clusters, and selects the value for which the weighted sum of these variances
    is the least.



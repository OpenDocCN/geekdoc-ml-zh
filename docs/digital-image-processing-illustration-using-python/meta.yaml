    $$\frac{1}{16}\begin{pmatrix} 0 & 8 & 2 & 10 \ 12 & 4 & 14 & 6 \ 3 & 11 & 1 &
    9 \ 15 & 7 & 13 & 5 \end{pmatrix}$$



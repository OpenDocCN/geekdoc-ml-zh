  md: '# # Preface


    This book represents the culmination of over a decade of teaching experience in
    the field of digital image processing. It results from the combined expertise
    of three authors. Image processing is a rapidly growing field with widespread
    applications in science and engineering. Digital images play a crucial role in
    various areas, including medical imaging, multimedia communications, and autonomous
    vehicle navigation. The primary aim of this book is to implement a wide range
    of image processing algorithms using Python, bringing a practical approach to
    the theory of digital image processing. Each chapter begins with clearly defined
    learning objectives and includes a rich collection of Python programs to illustrate
    key concepts. Additionally, exercises and objective questions enhance the learning
    experience, followed by a bibliography for further reading. A distinctive feature
    of this book is the collection of Python programs that effectively demonstrate
    digital image processing concepts. Throughout the text, physical interpretations
    of mathematical concepts are provided to aid understanding. While there are numerous
    software options for mathematical analysis, this book chooses to utilize Python
    for implementing digital image processing algorithms. Python is an open-source
    programming language with robust scientific computing libraries, making it an
    essential tool in both teaching and research. The libraries employed in this text
    include OpenCV, NumPy, SciPy, scikit-learn, Pillow, Matplotlib, and TensorFlow.
    The objective is not to teach Python programming per se, but rather to use it
    as a tool to illustrate image processing concepts. Each chapter features carefully
    selected examples and sample problems that reinforce the fundamental concepts
    presented.


    # ## Target Audience


    This book is suited for undergraduate students, postgraduate students, research
    scholars, practicing engineers, and faculty members working in image processing
    and computer vision. The reader is assumed to be familiar with basic Python programming.'
  merge: -1
  pgno: 4
- img_proc: true
  md: '# ## Highlights of the Book


    The salient features of the book are summarized below:


    +   - Wide range of topics covered starting from the concept of pixels to image
    analysis using deep learning.


    +   - Step-by-step implementation of digital image processing algorithms in Python
    with detailed inference of results.


    +   - Exercise at the end of each chapter to enhance the understanding of concepts.
    This will help the reader to implement digital image processing algorithms using
    Python.


    +   - Objective-type questions at the end of each chapter. This will help the
    reader to prepare for a competitive examination.


    # ## Chapter Organization


    The book comprises of 11 chapters. Chapter 1 introduces the basics of digital
    images, including image sampling, quantization, dithering, image resolution, and
    image file formats. Generation of different types of test image patterns is discussed
    in depth in this chapter. Chapter 2 focuses on two-dimensional convolution and
    correlation. Convolution is a powerful mathematical operation that is used to
    extract information from images. The spatial and frequency domain method of performing
    convolution and correlation is discussed in this chapter. This chapter also discusses
    template matching as one of the important applications of correlation. Chapter
    3 is devoted to image transforms. Different transforms discussed in this chapter
    include Fourier transform, discrete cosine transform, Hadamard transform, Wavelet
    transform, Hough transform, and Radon transform. The properties and applications
    of the above-mentioned transforms are discussed in detail in this chapter.


    A detailed discussion on spatial domain and transform domain image enhancement
    is done in Chapter 4. The concepts discussed in this chapter include gray-level
    transformation, contrast enhancement using histogram processing, and spatial and
    frequency domain filtering of the image. Chapter 5 deals with image denoising
    and image restoration. This chapter examines different types of noises that can
    get into a digital image and methods to mitigate the noise. This chapter also
    discusses different types of degradations and methods to restore the degraded
    image. Binary and grayscale morphological operations are discussed in Chapter
    6. Morphological operations like dilation, erosion, opening, and closing are illustrated
    with Python examples. In addition to morphological operations, morphological algorithms
    like hit or miss transform, top-hat transform, black-hat transform, and thinning
    are discussed with suitable Python examples.


    Chapter 7 is dedicated to image segmentation. Edge-based segmentation, threshold-based
    segmentation, region-based segmentation, and graph-based segmentation are discussed
    in depth in this chapter. Chapter 8 focuses on feature'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'extraction. Both conventional and modern feature extraction techniques are
    covered in this chapter. Conventional techniques include Gray level co-occurrence
    matrix (GLCM), local binary pattern (LBP), scale invariant feature transform (SIFT),
    and histogram of oriented gradient (HOG). Modern techniques of feature extraction
    discussed in this chapter are convolutional neural network based deep feature
    extraction, and auto encoder based feature extraction. Detailed discussion on
    lossless and lossy compression algorithms are given in Chapter 9. Lossless compression
    algorithms discussed in this chapter are run length coding, Huffman coding, arithmetic
    coding, and dictionary based coding. Lossy compression algorithms discussed in
    this chapter are transform based coding. Chapter 10 is devoted to colour image
    processing. The concepts discussed in this chapter are colour models, pseudo-colouring,
    colour image enhancement, segmentation, and compression. Chapter 11 performs image
    analysis using machine learning and deep learning approaches. Both supervised
    and unsupervised machine and deep learning algorithms are covered in this chapter.



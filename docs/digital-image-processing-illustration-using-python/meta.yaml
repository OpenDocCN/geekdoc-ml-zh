    # ### 11.4.7 *K-Nearest Neighbour (KNN)*


    K-nearest neighbour algorithm is a machine learning algorithm that works both
    the supervised and unsupervised leanings. The KNN algorithm assumes the similarity
    between the new data and the available training data and puts the new data into
    the category that is most similar to the available training categories. Initially,
    the KNN algorithm stores all the training data and classifies the new data based
    on the similarity between the new data and training data. KNN is a non-parametric
    approach; it does not make any assumption on underlying data, and it is also known
    as lazy learner algorithm because it does not learn from the training data. This
    algorithm works directly on the input dataset. In the training phase of the KNN
    algorithm stores the dataset and when it gets new data, then it classifies that
    data into a particular category based on the similarity between the new data and
    the training data. The illustration of KNN algorithm is shown in Fig. 11.34. From
    Fig. 11.34a, it is


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_778_0.png)


    **Fig. 11.34** Illustration of KNN algorithm. **(a)** Training phase. **(b)**
    Testing phase. **(c)** After testing the new data'

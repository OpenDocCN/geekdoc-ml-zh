    # ### 11.4.10 AdaBoost Algorithm


    AdaBoost stands for Adaptive Boosting, which is a machine-learning algorithm that
    works for classification and regression tasks. It uses the ensemble learning process
    to iteratively train the weak classifier on the training dataset, with each successive
    classifier giving more weight to the data points that are misclassified. The final
    output of the AdaBoost model is decided by combining all the weak classifiers
    that have been used for training with the weightage given to the models according
    to their performance metrics, such as accuracies. The model that has the highest
    accuracy is assigned the highest weightage, and the lowest weightage is given
    to the model that has the lowest accuracy. The illustration of the AdaBoost classifier
    is shown in Fig. 11.45. From Fig. 11.45, it is possible to observe that the size
    of the initial training data is the same, which is the input to the "Classifier-1".
    From the output of Classifier-1, the misclassified training data are weighted
    and given as input to "Classifier-2". The size of the misclassified weighted data
    is bigger than the correctly classified input data. The misclassified weighted
    training data of Classifier-2 is further weighted before giving as input to the
    next classifier (i.e. Classifier-3). From Fig. 11.45, it is possible to see that
    the size of the misclassified weighted training data of Classifier-2 is larger
    than the previously correctly classified data. In the final stage of the Classifier-N,
    only one input training data is larger than the other training data because in
    the previous classifier output, there is only one input data is misclassified,
    and that training data alone weighted further, which can be seen in Fig. 11.45.'
  - '[PAGE 790]


    The AdaBoost algorithm combines many weak machine learning classifier models to
    create a powerful classification model. The step-by-step approach of the AdaBoost
    classifier is given below:


    **Step 1:** Initialize the weights.


    Let us consider the input and output pairs of the training dataset containing
    "n" data points, which are given by $D = \{(X_i, y_i)\}_{i=1}^{n}$ and these data
    points are uniformly weighted by $\omega_i = \frac{1}{n}$.


    **Step 2:** Train the weak classifiers.


    Assume that there are "N" weak classifiers {$C_k$} and all these weak classifiers
    are trained with the uniformly weighted training dataset.


    **Step 3:** After the training process of Step 2, compute the error rate ($\varepsilon_k$)
    of each weak classifier by using


    $$\varepsilon_k = \sum_{C_k(X_i) \neq y_i} \frac{\omega_i}{\sum_{X_i} \omega_i},
    1 \leq i \leq n \quad (11.16)$$


    **Step 4:** From the error rate obtained from Step (3), the weight of the weak
    classifier for the ensemble output ($\alpha_k$) is calculated as:


    $$\alpha_k = \log\left(\frac{1-\varepsilon_k}{\varepsilon_k}\right) \quad (11.17)$$


    **Step 5:** Finally, the distribution of the weights $\omega_i$ corresponding
    to each $X_i$, which will be used as training data for the next weak classifier,
    is proportionally adjusted to the probability that a sample is correctly estimated
    and inversely proportional to the error rate of the weak classifier ($\varepsilon_k$).


    **Step 6:** The final output of the AdaBoost classifier is defined as


    $$\hat{y}(X) = \sum_{k=1}^{N} \left[\alpha_k \left(C_k(X) = l\right)\right] \quad
    (11.18)$$



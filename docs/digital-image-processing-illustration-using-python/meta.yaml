    # **3.6 Hough Transform**


    Hough transform is widely used to detect shapes such as lines, circles, and ellipses
    in images. The Hough transform was introduced by Paul Hough in 1962. Hough transform
    is a mapping from Cartesian coordinate to Polar coordinate. The polar coordinate
    is termed as "parameter plane" or "parameter space". A line in the Cartesian plane
    is a point in the parameter plane. Similarly, a point in the Cartesian plane is
    a line in the parameter plane.'

    # ## Kirsch Compass Edge Detector


    Kirsch edge detector is named after computer scientist Russell A. Kirsch. Kirsch
    edge detection is used to find the maximum edge strength in its eight predetermined
    compass directions. Kirsch edge detector uses eight 3 × 3 directional convolutional
    kernels. The eight directions are North, North-East, East, South-East, South,
    South-West, West and North-West. The 3 × 3 Kirsch kernel in eight directions is
    given in Fig. 7.22. In Kirsch edge detector, the weights are assigned to all pixel
    positions except the centre pixel.'

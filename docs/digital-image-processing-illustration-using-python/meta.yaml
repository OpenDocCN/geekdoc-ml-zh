    #Homomorphic filter

    import numpy as np

    import matplotlib.pyplot as plt

    import cv2

    #Step 1: Reading the input image

    img=cv2.imread(''Clock.tiff'',0)

    #Step 2: Logarithm of input image

    img_log = np.log(np.float64(img), dtype=np.float64)

    #Step 3: Spectrum of log transformed image

    IMG = np.fft.fft2(img_log, axes=(0,1))

    IMG = np.fft.fftshift(IMG)

    #Step 5: Generating the mask

    gH, gL, N= 1.5, 0.5, 256

    x=np.arange(-N/2,N/2,1)

    y=np.arange(-N/2,N/2,1)

    k,l=np.meshgrid(x,y)

    D=np.sqrt(k**2+l**2)

    D0=30

    H=(gH-gL)*(1-np.exp(-(D**2)/(2*D0**2)))+gL

    #Step 6: Multiplication

    IMG_out=np.multiply(IMG, H)

    #Step 7: Taking Inverse Fourier transform

    img_res = np.fft.ifft2(IMG_out, axes=(0,1))

    img_res = np.abs(img_res)

    # Step 8: Apply exp to reverse the earlier log

    img_homomorphic = np.exp(img_res, dtype=np.float64)

    img_homomorphic = cv2.normalize(img_homomorphic, None, alpha=0, beta=255,

    norm_type=cv2.NORM_MINMAX, dtype=cv2.CV_8U)

    #Step 9: Displaying the result

    plt.figure(figsize=(10, 8)),plt.subplot(1,2,1),plt.imshow(img,cmap=''gray'')

    plt.title(''Input image''),plt.axis(''off'')

    plt.subplot(1,2,2),plt.imshow(img_homomorphic,cmap=''gray'')

    plt.title(''Filtered image''),plt.axis(''off'')


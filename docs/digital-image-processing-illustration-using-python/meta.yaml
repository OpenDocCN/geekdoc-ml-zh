    If $x[m, n]$ and $y[m, n]$ represent the input and output image, then the gray
    level transformation is expressed as


    $$y[m,n] = T\{x[m,n]\}$$

    (4.1)


    In the above expression, "$T$" represents the mapping between the input and output
    image. The mapping could be either linear, non-linear, and piecewise linear mapping.
    Example of linear mapping include identity operation and image negative. Examples
    of non-linear mapping are logarithmic transformation and power-law transformation.
    Examples of piecewise linear mapping include contrast stretching and gray level
    slicing.


    # ### 4.4.1 *Identity Operation*


    If $x[m, n]$ represents the input image and $y[m, n]$ represents the output image,
    then the identity operation is expressed as


    $$y[m,n] = x[m,n]$$

    (4.2)


    Expression (4.2) indicates that the output image is exactly equal to the input
    image. This operation is similar to that of a "voltage follower or buffer" in
    electronics, where the output signal exactly resembles the input signal.'

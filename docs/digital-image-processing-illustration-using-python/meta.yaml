    # ### 4.13.2 Multiscale Retinex Algorithm


    Multiscale retinex is realized by averaging single-scale retinex for different
    value of the scale factor. The expression for multiscale retinex is given by


    ```

    $$MSR = \sum_{n=1}^{N} w_n \left[\log(I_i(x,y)) - \log(F_n(x,y) * I_i(x,y))\right]$$
    (4.44)

    ```


    In the above expression, "$N$" is the number of scales and "$w_n$" is the weight
    of each scale and $F_n(x,y) = C_n e^{\left[-\frac{x^2+y^2}{2\sigma_n^2}\right]}$.
    The real challenge is to choose the scale values, number of scale values, and
    the choice of weighting factor for each scale.


    # **Experiment 4.54: Single-Scale Retinex Versus Multiscale Retinex**


    This experiment compares single-scale retinex with multiscale retinex algorithm.
    The Python code that performs the single-scale retinex and multiscale retinex
    algorithms is shown in Fig. 4.124, and the corresponding result is displayed in
    Fig. 4.125.


    # **Inferences**


    +   - The single-scale retinex algorithms are realized for the values of $\sigma
    = 1, 5, 10,$ and 15. The multiscale retinex is obtained by adding the results
    of single-scale retinex and then dividing the result by a factor of 4.'

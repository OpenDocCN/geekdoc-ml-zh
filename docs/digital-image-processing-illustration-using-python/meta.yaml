    # ## 4.11 Transform Domain-Based Image Enhancement


    The basic steps in transform domain-based image enhancement are depicted in Fig.
    4.89.


    The input image is represented as $f[m, n]$. Let $F[k, l]$ represents the spectrum
    of the input image. The spectrum is obtained by taking Fourier transform of the
    input image. The filter function is represented as $H[k, l]$. The basic model
    of filtering in frequency domain is expressed as'
  - '[PAGE 281]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_281_0.png)


    **Fig. 4.89** Steps in transform domain-based image enhancement


    ```

    $$G[k,l] = F[k,l] \times H[k,l]$$ (4.18)

    ```


    Upon taking Inverse Fourier transform, the enhanced image is given by


    ```

    $$g[m,n] = F^{-1}\{G[k,l]\}$$ (4.19)

    ```


    In the above expression, $F^{-1}$ represents the Inverse Fourier transform. The
    nature of filtering is decided by the filter function $H[k, l]$. Two broad classifications
    of filtering are low-pass filtering and high-pass filtering. Low-pass filtering
    is also termed a smoothing operation, and high-pass filtering operation is termed
    a sharpening operation.


    # ### 4.11.1 *Generation of Low-Pass Filter Mask*


    There are three types of low-pass filters considered in this section: (1) ideal
    filter, (2) Butterworth filter, and (3) Gaussian filter.


    # #### Ideal Low-Pass Filter


    The expression for the ideal low-pass filter mask is given by


    ```

    $$H[k,l] = \begin{cases} 1, & \text{if } D[k,l] \leq D_0, \ 0, & \text{if } D[k,l]
    > D_0 \end{cases}$$ (4.20)

    ```


    where $D[k,l] = \left[\left(k - \frac{M}{2}\right)^2 + \left(l - \frac{N}{2}\right)^2\right]^{\frac{1}{2}}$.
    In this expression, "$D_0$" represents the cut-off frequency. The ideal low-pass
    filters are radially symmetric about the origin.


    # #### Butterworth Filter


    The expression for the Butterworth low-pass filter mask is given by'
  - '[PAGE 282]


    $$H[k,l] = \frac{1}{1+\left[\frac{D[k,l]}{D_0}\right]^{2n}} \quad (4.21)$$


    In the above expression, "$n$" refers to the order of the Butterworth filter.
    $D[k,l] = \left[\left(k-\frac{M}{2}\right)^2 + \left(l-\frac{N}{2}\right)^2\right]^{\frac{1}{2}}$.
    In this expression, "$D_0$" represents the cut-off frequency.


    # ### Gaussian Filter


    The expression for Gaussian low-pass filter mask is given by


    $$H[k,l] = e^{-D^2[k,l]/2D_0^2} \quad (4.22)$$


    where $D[k,l] = \left[\left(k-\frac{M}{2}\right)^2 + \left(l-\frac{N}{2}\right)^2\right]^{\frac{1}{2}}$.
    In this expression, "$D_0$" represents the cut-off frequency.



    # **9.7.7 *Bitplane Coding***


    The image with more than two intensity levels can be coded using bit-plane coding.
    An image with $N$ bits intensity value contains $N$ numbers of binary images.
    Therefore, using gray value to binary converter converts the gray intensity value
    to its equivalent binary "$N$" bits. Each binary image is called as a bitplane.
    Now, flatten each binary image and compress it using run length encoding or any
    lossless compression scheme. The flow diagram of bitplane coding is shown in Fig.
    9.41.'

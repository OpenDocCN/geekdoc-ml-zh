    # ### 3.7 Wavelet Transform


    Wavelets are oscillatory functions of finite duration. Wavelet transform provides
    localization in both the spatial domain as well as in the frequency domain. It
    can perform multi-resolution analysis of the signal. The main advantage of wavelet
    transforms is the ability to obtain information on the time, location, and frequency
    of a signal simultaneously. The wavelet transform of the signal $x(t)$ is given
    by


    $$W_x(a,b) = \langle x(t), \psi_{a,b}(t) \rangle$$

    (3.49)


    The above equation implies that obtaining wavelet transform of the signal $x(t)$
    is equivalent to taking the inner product of the signal $x(t)$ with wavelet function
    $\psi_{a,b}(t)$. The expression for $\psi_{a,b}(t)$ is given by


    $$\psi_{a,b}(t) = \frac{1}{\sqrt{a}} \psi\left(\frac{t-b}{a}\right)$$

    (3.50)


    In Eq. (3.50), $\psi(t)$ represents the mother wavelet, the daughter wavelet is
    obtained by scaling and shifting the mother wavelet. In Eq. (3.50), "$b$" represents
    the shifting parameter and "$a$" represents the scaling parameter. Lower scale
    results in a compressed wavelet, which is suitable to analyse the high-frequency
    content of the signal, whereas large scale corresponds to stretched wavelet, which
    is suitable to analyse low-frequency information content in the signal.


    Two broad categories of wavelet transform are (1) continuous wavelet transform
    and (2) discrete wavelet transform. Continuous wavelet transform (CWT) takes every
    possible set of scale and translation parameter value. Hence, it is a redundant
    transform. In discrete wavelet transform (DWT), the scaling and shifting are chosen
    to the power of 2, which is termed as "dyadic scaling and shifting". DWT can be
    realized through filterbank or lifting scheme. Multi-level wavelet analysis of
    the signal is shown in Fig. 3.79.


    In Fig. 3.79, A$_1$ and D$_1$ represent the approximation and detail in the first
    level of decomposition. A$_2$ and D$_2$ represent the approximation and detail
    in the second level of decomposition and so on. Here, the approximation and details
    are the subbands'

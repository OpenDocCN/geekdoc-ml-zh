  md: '# ## Answers to PreLab Questions


    +   1. Pixel stands for "picture element". It is the smallest unit of a digital
    image. Each pixel is characterized by a location and a value.

    2. The value taken by the pixel is termed as gray level. Binary image takes the
    value of either "0" or "1". An 8-bit grayscale image can take value from 0 to
    255, where "0" corresponds to black and "255" corresponds to white.

    3. The spatial resolution depends on the density of the pixels that constitutes
    the digital image. The spatial resolution refers to the number of pixels utilized
    in construction of the image.

    4. Gray level resolution refers to the smallest discernible change in gray level.
    Digital images having higher gray level resolution are composed with a larger
    number of shades of gray are displayed at a greater bit depth than with lower
    gray level resolution.

    5. The steps involved in converting the analog image to a digital image are (1)
    sampling, (2) quantization, and (3) encoding.

    6. Aliasing is an undesirable effect that occurs one under sample an image. Here
    under sampling refers to the choice of the sampling rate, which is less than twice
    the highest frequency present in the signal.

    7. Quantization is mapping large set of values to a smaller set of values. Because
    of this uniqueness is lost, hence quantization is considered as irreversible phenomenon.

    8. Brightness refers to the overall lightness or darkness of the image. Contrast
    is defined as a separation in intensity level between the dark and bright areas
    of an image.

    9. Dithering is a process by which image with a finite number of gray levels is
    made to appear as continuous-tone image. Broadly, image dithering can be classified
    as (1) average dithering or thresholding, (2) random dithering, (3) ordered dithering,
    and (4) error diffusion dithering.

    10. The popular image file formats employed to store the image include (1) tagged
    image file format (TIFF), (2) joint photographic expert group (JPEG), (3) bitmap
    file format, (BMP), (4) portable network graphics (PNG), and (5) encapsulated
    post script (EPS).



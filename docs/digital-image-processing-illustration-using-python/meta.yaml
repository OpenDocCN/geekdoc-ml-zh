    # ### 8.3.3 Kirsch Gradient Operator


    The Kirsch gradient operator is a non-linear edge detector that detects the maximum
    edge strength in a few predetermined directions. This operator takes a single
    kernel and rotates in 45° increments through all 8 directions such as {North (N),
    South (S), East (E), West (W), North-West (NW), South-West (SW), North-East (NE)
    and South-East (SE)}. The edge magnitude is calculated as the maximum magnitude
    across all 8 directions. Each pixel of images uses these 8 kernels to obtain convolution.


    Let us consider a 3 × 3 image, and its centre pixel is denoted as A*, which is
    given by


    $$\begin{bmatrix} A_3 & A_2 & A_1 \ A_4 & A^* & A_0 \ A_5 & A_6 & A_7 \end{bmatrix}$$
    (8.29)


    The gradient magnitude of the centre pixel is computed as


    $$M(i,j) = \max\left(1, \max_{k=0}^{7}\left\{\left|5S_k - 3T_k\right|\right\}\right)$$
    (8.30)


    where $S_k = A_k + A_{k+1} + A_{k+2}$ and $T_k = A_{k+3} + A_{k+4} + \cdots +
    A_{k+7}$. In the computation of S and T modulo-8 operation has to be performed.


    # **Experiment 8.18: Computation of Kirsch Gradient Operator**


    This experiment discusses the computation of the Kirsch gradient operator of an
    image using Python. The Python code to compute the gradient of an image using
    Kirsch operator is given in Fig. 8.40, and its simulation result is shown in Fig.
    8.41.


    # **Inferences**


    +   - Figure 8.41 shows that the boundary of the objects in a given image is obtained
    by the Kirsch gradient operator.'

    where "I" denotes the input image, "w" is the window function, which is either
    a rectangular or Gaussian window and "E" is the corner points. Using Taylor series
    expansion for 2D function, the term I(m + x, n + y) in the above equation can
    be written as


    ```

    $$\begin{aligned} &I(m+x,n+y)=I(m,n)+xI_m(m,n)+yI_n(m,n) \ &\quad +\frac{1}{2!}\left\{\begin{aligned}
    &x^2I_{mm}(m,n) \ &+xyI_{mn}(m,n)+y^2I_{nn}(m,n) \end{aligned}\right\} \ &\quad
    +\frac{1}{3!}\left\{\begin{aligned} &x^3I_{mmm}(m,n)+x^2yI_{mmn}(m,n) \ &+xy^2I_{mnn}(m,n)+y^3I_{nnn}(m,n)
    \end{aligned}\right\}+\cdots \end{aligned}$$ (8.32)

    ```


    Using the first-order approximation, the above Eq. (8.32) can be written as


    ```

    $$I(m+x,n+y) \approx I(m,n)+xI_m(m,n)+yI_n(m,n)$$ (8.33)

    ```


    Now substituting Eq. (8.33) in (8.31), we get


    ```

    $$E(x,y)=\sum_{m,n}w(m,n)\left[I(m,n)+xI_m(m,n)+yI_n(m,n)-I(m,n)\right]^2$$ (8.34)

    ```


    The above equation can be further simplified as


    ```

    $$E(x,y)=\sum_{m,n}w(m,n)\left[xI_m(m,n)+yI_n(m,n)\right]^2$$ (8.35)

    ```


    The above equation can be rewritten as


    ```

    $$E(x,y)=\sum_{m,n}w(m,n)\left[x^2I_m^2(m,n)+y^2I_n^2(m,n)+2xyI_m(m,n)I_n(m,n)\right]$$
    (8.36)

    ```'

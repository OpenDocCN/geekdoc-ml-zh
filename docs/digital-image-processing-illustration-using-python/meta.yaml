    # ## 4.10 Spatial Domain Filtering


    In linear spatial filtering, each output pixel is a weighted sum of neighbouring
    pixels. It is equivalent to the convolution of the image with the mask. This is
    represented in Fig. 4.65.'
  - '[PAGE 264]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_264_0.png)


    In Fig. 4.65, $f[m, n]$ represents the input image, $w[m, n]$ represents the mask
    of the window and $g[m, n]$ represents the output image. $F[k, l]$, $W[k, l]$,
    and $G[k, l]$ represent the Fourier transform of input image, window function,
    and output image, respectively. In spatial domain, the relationship between the
    input image $f[m, n]$ and the output image $g[m, n]$ is given by


    $$g[m,n] = f[m,n] * w[m,n]$$


    (4.11)


    In Eq. (4.11), "*" represents the convolution operation. In the frequency domain,
    the relationship between the input and output image is given by


    $$G[k,l] = F[k,l] \times W[k,l]$$


    (4.12)


    The above equation is due to the fact that convolution in the spatial domain is
    equivalent to multiplication in the frequency domain.


    A linear spatially invariant filter can be represented with a mask that is convolved
    with the image pixels. The weight of $3 \times 3$ mask is represented as $\begin{bmatrix}
    w_1 & w_2 & w_3 \ w_4 & w_5 & w_6 \ w_7 & w_8 & w_9 \end{bmatrix}$, if the gray
    level of the image pixels under the mask are represented as $i_1, i_2, \ldots,
    i_9$. The response of the linear mask is given by $R = i_1w_1 + i_2w_2 + i_3w_3
    + \cdots + i_9w_9$. Masks are usually chosen to have odd dimensions to provide
    a centre pixel location.



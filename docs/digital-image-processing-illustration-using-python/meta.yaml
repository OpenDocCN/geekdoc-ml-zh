    # ### 6.11.11 *Directional Gradients*


    The directional gradient is defined by replacing the isotropic structuring element
    with a line segment (*L*) (horizontal, vertical, and diagonal) in a specific direction
    (α). The mathematical expression for the directional gradient is written as


    $$\text{Directional Gradient}\left(\rho_{L\alpha}\right)(X) = \{X \oplus L\alpha\}
    - \{X \ominus L\alpha\} \quad (6.48)$$


    where "*Lα*" is the directional line segment structuring element.



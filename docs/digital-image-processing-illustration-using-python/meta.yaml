    $$F[k,l] = \alpha[k]\alpha[l]\sum_{m=0}^{N-1}\sum_{n=0}^{N-1}f[m,n]\cos\left(\frac{[2m+1]\pi
    k}{2N}\right)\cos\left(\frac{[2n+1]\pi l}{2N}\right) \quad (3.22)$$


    where


    $$\alpha[p] = \begin{cases} \sqrt{\dfrac{1}{N}}, & p = 0, \ \sqrt{\dfrac{2}{N}},
    & 1 \leq p \leq N-1. \end{cases} \quad (3.23)$$



  md: '# ### 7.9.2 Terminologies in Graph Theory


    Some of the common terminologies associated with graph theory are summarized below:


    **Vertex**: Geometrically, small solid circles represent vertices. The number
    of distinct vertices is represented as |V|.


    **Edge**: Edge either joins one vertex to another or joins a vertex to itself.
    Curves or straight-line segments represent geometrical edges. The number of distinct
    edges in a graph is represented by |E|.


    **Adjacency**: In a graph, two vertices are adjacent if they are the endpoints
    of an edge.


    **Order of the graph**: The number of vertices of a graph is the order of the
    graph.


    **Size of the graph**: The number of edges of a graph is termed as the size of
    the graph.


    **Directed graph:** A directed graph has a set of nodes connected by edges, with
    each node having a direction associated with it. An example of a directed graph
    is illustrated in Fig. 7.68a.


    In Fig. 7.68a, "P" and "Q" represent two nodes. The graph can be traversed from
    node "P" to node "Q" and not vice-versa.


    **Cycles:** In a directed graph, a cycle is a path that starts and ends at the
    same vertex.


    **Degree of a vertex (valency):** The degree of a vertex is the number of edges
    incident to the vertex. It is denoted as deg(v).


    For the graph shown in Fig. 7.68b:


    +   - deg(P) = 3, since the node "P" has three edges. Hence, deg(P) is equal to
    three.

    - deg(R) = 2, because node "R" has two edges.

    - deg(Q) = 2, because two edges are meeting at the node "Q",

    - deg(S) = 1, since only one edge meets the node "S".


    **Undirected graph:** In an undirected graph, the edges are bidirectional with
    no direction associated with them. An example of undirected graph is illustrated
    in Fig. 7.68c. From this figure, it is possible to observe that the nodes "P"
    and "Q" are connected by an edge without arrow. This implies that the graph can
    be traversed from node "P" to node "Q" and vice-versa.



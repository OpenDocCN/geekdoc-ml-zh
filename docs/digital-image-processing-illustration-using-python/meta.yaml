    An arithmetic coder contains an encoding and decoding algorithm; the encoder will
    generate the tag value as an output based on a given input word. The decoder will
    get back the original word from the tag value, symbol, probability, and length
    of the word. The steps of the arithmetic decoding algorithm are as follows:


    +   **Step 1:** Get the tag value, dictionary of the symbol and its probability,
    and the length of the word.



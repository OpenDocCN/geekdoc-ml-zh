    The Zernike moment of the input image $f(x, y)$ for the value of $n$ and $m$ is
    computed as


    $$ZM_{nm} = \frac{n+1}{\pi} \sum_x \sum_y f(x,y) V_{nm}^*(x,y)$$ (8.11)


    The positive Zernike moment is computed for the positive value of "$m$" because
    $V_{nm}(x,y) = V_{nm}^*(x,y)$. The centre of the unit circle is located at the
    origin of the coordinate; hence, the Zernike moment is independent of scaling
    and rotation operations.



  md: '# ### 11.4.8 K-Means Algorithm


    The K-means clustering algorithm is an unsupervised machine-learning technique
    used for data classification and segmentation. The unlabelled dataset is grouped
    into different clusters based on the value of "K". Here, K denotes the number
    of pre-defined clusters that need to be created in the process of clustering the
    dataset. It is an iterative approach that separates the unlabelled dataset into
    K different clusters so that each dataset belongs to only one group with similar
    properties. Each cluster is associated with its own centre, which is called as
    "centroid". The K-means cluster algorithm is to minimize the distance between
    the datapoint and their corresponding cluster centroid.


    # #### K-Means Clustering Algorithm


    The step-by-step approach of the K-means clustering algorithm is given below:


    +   1. **Step 1:** Choose the number of clusters (i.e. K).

    2. **Step 2:** Select the random K points in the given training dataset, which
    are the initial centroid of the cluster.

    3. **Step 3:** Assign each data point to its closest centroid, which forms the
    predefined K clusters.

    4. **Step 4:** Calculate the variance and update the position of the new centroid
    for each cluster.

    5. **Step 5:** Repeat Step 3 until each data point is assigned to the new nearest
    centroid of each cluster.

    6. **Step 6:** If any reassignment occurs, then go to Step 4. Else, stop the assigning
    process, and the obtained centroids are the final centroid for each cluster.


    # #### Illustration of the K-Means Clustering Algorithm


    This section discusses the illustration of K-means clustering algorithm. The initial
    dataset is called as "training dataset", which is shown in Fig. 11.37. Then, the
    number of clusters is chosen as 3, and the 3 numbers of cluster centroid are fixed
    randomly in the given dataset, which is displayed in Fig. 11.37b. Figure 11.37c
    shows the random centroid''s movement in each cluster to the actual cluster centre.
    Figure 11.37d displays the final centroid of each cluster. The final clustering
    output is shown in Fig. 11.37e. The Elbow method can be used to find the optimum
    number of clusters in the given dataset. This approach uses the "Within Cluster
    Sum of Squares" concept to obtain the optimum "K" value. Distance measures like
    Euclidean, Manhattan, Minkowski, etc., can be used to find the gap between the
    data points and the cluster centroid.



    # ## 7.4 Region-Based Image Segmentation


    Region-based approach attempts to split the image into connected disjoint regions
    such that their union results in the whole image. The partition of the image into
    regions is based on some logical predicate that is true for each region but false
    for any union of them.


    # ### 7.4.1 Region-Growing Algorithm


    The region-growing algorithm starts with one or group of pixels which are termed
    as seed pixels. The seed pixels are compared with neighbouring pixels. If a neighbouring
    pixel meets certain criteria, it is added to the group, else it is not added.
    This process is continued until no more neighbouring pixels can be added to the
    group.



    as


    $$D_{i,j} = \begin{cases} \text{degree}(v_i), & \text{if } i = j, \ 0, & \text{otherwise}.
    \end{cases} \qquad (7.45)$$


    Let us consider an undirected graph shown in Fig. 7.72a, the Laplacian matrix
    is computed as follows:


    Step 1: Computation of degree matrix "$D$".


    The degree matrix is a diagonal matrix with the entries of the diagonal equal
    to the number of edges connected to the node. The degree matrix for the undirected

    # ## 9.6 Performance Metrics


    There are many performance metrics that are currently available to verify the
    performance of the image compression algorithms. In this section, a few performance
    metrics like compression ratio, compression factor, mean square error, peak signal-to-noise
    ratio, and mean structural similarity index measure are discussed. These metrics
    are widely used to analyze the performance of the compression algorithm.


    # ### 9.6.1 *Compression Ratio*


    Compression ratio (CR) is a measure that is used to quantify the amount of data
    or input compressed. It is the ratio between the size of the original image and
    the size of the compressed (encoded) image. The mathematical expression for the
    compression ratio is given by


    $$\text{Compression Ratio (CR)} = \frac{\text{Size of the original image}}{\text{Size
    of the Compressed image}} \qquad (9.3)$$'
  merge: -1
  pgno: 606
- img_proc: true
  md: '# ### 9.6.2 Relative Data Redundancy (R)


    The relative data redundancy is a quantifiable measure of compression that gives
    a range of values from 0 to 1. The relative data redundancy is calculated as


    $$\text{Relative data redundancy}(R) = \left(1 - \frac{1}{\text{CR}}\right)$$
    (9.4)


    # ### 9.6.3 PSNR


    The performance of the decompressed image can be quantified by using Peak Signal
    to Noise Ratio (PSNR) in dB. The mathematical expression for the PSNR in dB is
    given by


    $$\text{PSNR in dB} = 20 \log_{10}\left(\frac{\max(X)}{\sqrt{\text{MSE}}}\right)$$
    (9.5)


    where "X" represents the input original image and max(X) denotes the maximum pixel
    value of the original image. MSE indicates the mean square error between the original
    image (X) and the reconstructed or decompressed image (Y). The MSE can be obtained
    by using


    $$\text{MSE} = \frac{1}{MN}\sum_{m=0}^{M-1}\sum_{n=0}^{N-1}\left(X(m,n) - Y(m,n)\right)^2$$
    (9.6)


    where "M" and "N" denote the number of rows and columns of the image, respectively.


    # ### 9.6.4 MSSIM


    The structural similarity index measure is a perception-based model. In this measure,
    image degradation is considered as the change of perception in structural information.
    It measures the similarity between two images. It compares the similarity between
    the local regions of the two images. The mathematical expression used to compute
    SSIM is given by


    $$\text{SSIM}_i(X,Y) = \frac{(2\mu_X\mu_Y + C_1)(2\sigma_X\sigma_Y + C_2)}{(\mu_X^2
    + \mu_Y^2 + C_1)(\sigma_X^2 + \sigma_Y^2 + C_2)}$$ (9.7)'
  merge: -1
  pgno: 607
- img_proc: true
  md: 'where $\mu_X$ and $\mu_Y$ are local means of the image $X$ and $Y$, respectively.
    $\sigma_X$ and $\sigma_Y$ are the local standard deviations of the images $X$
    and $Y$, respectively. $C_1$ and $C_2$ are the constants. "$i$" represents the
    $i$th local region or block of the image. From Eq. (9.7), it is possible to observe
    that the input images are subdivided into multiple blocks, SSIM is measured for
    each block, and the overall SSIM of the image is calculated by the average of
    the SSIMs. It is called as Mean SSIM and computed as


    $$\text{MSSIM}(X,Y) = \frac{1}{K}\sum_{i=1}^{K}\text{SSIM}_i(X,Y)$$ (9.8)


    where "$K$" is the number of blocks or local regions.


    # ## 9.7 Lossless Compression Scheme


    The lossless compression scheme is used to compress the input data and get back
    the original data from the compressed data. In this scheme, there is no loss between
    the input and reconstructed data. Hence, it is called a "Lossless compression
    scheme". Some of the lossless schemes are Run Length Encoding, Huffman Coding,
    Arithmetic Coding, Lembel Ziv coding, Differential Pulse Code Modulation without
    quantizer, etc.


    # ### 9.7.1 *Entropy*


    Entropy is a measure, which gives the average number of bits needed to code the
    symbol in the source. The entropy can be measured by using


    $$H = -\sum_{i=1}^{N}p_i\log_2(p_i)\text{ bits/symbol}$$ (9.9)


    where $p_i$ denotes the probability of the $i$th symbol and $N$ denotes the number
    of unique symbols in the source data. The sum of the probability of the symbols
    in the source must be equal to one.



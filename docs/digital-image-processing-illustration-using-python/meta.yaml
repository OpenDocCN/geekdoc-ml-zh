    where $X_0$ is the input binary image, $B$ is the structuring element, $X_i =
    X_{i-1} \Theta B$, and "$\otimes$" denotes the thinning operation. $S_i$ is the
    subset result of erosion and opening operation. Here, "$i$" indicates the iteration

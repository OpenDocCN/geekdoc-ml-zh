    simplifies the creation of computational graphs and efficient execution on various
    hardware platforms. TensorFlow is basically a software library for numerical computation
    using data flow graphs, which contain nodes and edges. The nodes in the graph
    denote the mathematical operations, whereas edges in the graph represent the multidimensional
    data arrays, which are called as "tensors" communicated between them. Let us consider
    a TensorFlow diagram, which is shown in Fig. 11.56. In this figure "multiply"
    is a node, which denotes multiplication operation and **x** and **y** are input
    edges or tensors and **z** is the result edge or tensor. This flexible architecture
    permits us to deploy computation to one or more CPUs or GPUs in PC, server, or
    mobile device with a single application programming interface (API).


    The important terminologies in TensorFlow are as follows:


    +   1. **Computational Graph:** It is a series of TensorFlow operations arranged
    into a graph of nodes. Running the computational graph is to evaluate the nodes,
    it should be run the computational graph within a session. The computational graph
    is created using "*node = tensorflow.constant*(10, dtype=tf.int32)" Python command.


    +   2. **Session:** It summarizes the control and state of the TensorFlow runtime.
    To run the computational graph, "*session*" must be created by using "ss = tensorflow.Session()"
    and after the execution of the computational graph, the session must be closed
    by using "ss.close()".


    +   3. **Variables:** TensorFlow has variable nodes, which are used to hold variable
    data. These variables are used to hold and update the parameters of a training
    model. Variables are in memory buffers containing tensors. It must be explicitly
    initialized and saved to disk during and after training. The difference between
    a constant and a variable is that a constant value is stored in the graph, and
    its value is replicated wherever the graph is loaded, whereas a variable is stored
    separately and may live on a parameter server. The variable can be created using
    "*tensorflow.Variable()*" command.


    +   4. **Placeholder:** A graph can be parameterized to accept external inputs,
    called as "placeholders". A placeholder is a promise to provide a value later.
    While evaluating the graph involving placeholder nodes, a feed_dict parameter
    is passed to the session''s run method to specify tensors that provide concrete
    values to the placeholders. The "*tensorflow.placeholder()*" command creates a
    placeholder.'

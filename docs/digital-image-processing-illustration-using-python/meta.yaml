    # ## 10.1 Colour


    We are living in a world of colour images in the form of print, displays, photographs,
    the Internet, and movies. Colour is a subjective sensation one can observe when
    the visible region of electromagnetic radiation reaches the eyes. The perception
    of colour is important in applications like digital imaging, computer vision,
    entertainment, consumer electronics, etc. Humans can perceive thousands of colours
    but only about two dozen shades of gray. The sensors in the human eye, namely,
    rods and cones, operate in different ways and at various light levels. The rods
    are utilized for monochromatic vision at low light levels which is termed as "scotopic
    vision". The cones are the primary source of colour vision in bright light which
    is termed as "photopic vision". Three types of cones, namely, short (S), medium
    (M), and long (L), are sensitive to blue, green and green light, respectively.'

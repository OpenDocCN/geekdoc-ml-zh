    # ### 11.4.3 Logistic Regression


    Logistic regression is a supervised machine learning algorithm that uses logistic
    functions to predict the probability of a binary outcome. The logistic regression
    model delivers a binary output like yes or no, 1 or 0, true or false. The logistic
    regression analyses the relationship between one or more independent variables
    and classifies data into discrete classes. Therefore, it is mostly used in predictive
    modelling, where the model estimates the mathematical probability of whether an
    instance belongs to a specific category or not. The logistic function uses the
    "S" shaped fitted line to predict two maximum values, either 0 or 1. The curve
    from the logistic function indicates the likelihood of something such as whether
    the cells are cancerous or not, ripped fruits or not, etc.


    Logistic regression uses the sigmoid mathematical function to map the predicted
    values to probabilities. It maps any real value into another value between 0 and
    1. The values of the logistic regression must be between 0 and 1, which cannot
    cross the limit. Hence, it forms a curve like the "S" form. The S-form curve is
    called the Sigmoid or logistic function, as shown in Fig. 11.18. From this figure,
    it is possible to observe that the threshold value is fixed as 0.5. If the function
    *f(x)* is greater than 0.5, then the output will be one or else the output will
    be zero.


    The logistic regression equation can be derived from the linear regression equation.
    The straight-line linear equation is given by


    ```

    $$y = \alpha_0 + \alpha_1 x_1 + \alpha_2 x_2 + \cdots + \alpha_n x_n$$ (11.5)

    ```


    The output of the logistic regression takes a value between 0 and 1, hence the
    above equation can be written as


    ```

    $$f(y) = \begin{cases} \dfrac{y}{1-y}; & y \neq 1 \ \infty, & y = 1 \end{cases}$$
    (11.6)

    ```


    The logarithmic function is used to convert the range of values of logistic regression
    from 0 to 1 into $-\infty$ to $+\infty$. The following equation can be used:


    ```

    $$\log\bigl(f(y)\bigr) = \alpha_0 + \alpha_1 x_1 + \alpha_2 x_2 + \cdots + \alpha_n
    x_n$$ (11.7)

    ```


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_762_0.png)'

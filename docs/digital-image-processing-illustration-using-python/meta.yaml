    # ### 8.6.2 Autoencoders


    Autoencoders can be used for feature extraction in scenarios where the CNN architecture
    is too computationally expensive or where the amount of labelled data is limited.
    In this application, the autoencoder is trained on a dataset of images and used
    to extract features that can be used in downstream machine-learning models. Autoencoders
    are generally used for unsupervised learning tasks such as anomaly detection,
    dimensionality reduction, image denoising, compression, and generation of new
    data points, the goal of which is to learn a compact representation of the input
    data. They are particularly useful when the input data is high-dimensional and
    noisy, as they can help to remove noise and extract relevant features. If the
    task requires supervised learning, such as image classification or object detection,
    CNNs are the better choice. In some cases, autoencoders and CNNs can be used together'

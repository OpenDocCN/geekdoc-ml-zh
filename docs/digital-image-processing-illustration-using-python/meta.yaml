    # ### 8.3.5 *Laplacian Edge Detection*


    This experiment deals with the extraction of the Laplacian edge feature using
    Python. The Laplacian is a second-order derivative filter. It detects the edge
    points if there is a change in adjacent pixel values. The 3 × 3 kernel of the
    Laplacian filter is given by


    ```


    [ 0  -1   0 ]

    [-1   4  -1 ]

    [ 0  -1   0 ]

    ```


    The Laplacian filter kernels usually contain negative values in a cross pattern
    centred within the array. The corners are either zero or positive values. The
    centre value can be either positive or negative based on the neighbouring values,
    and the sum of the kernel will always be zero.



    - For $\theta = 0$ to 360°.

    - $a = x - r*\cos \theta$,

    - $b = y - r*\sin \theta$,

    - $H[a, b, r] = H[a, b, r] + 1$.

    - Find the $[a, b, r]$ value(s), where $H[a, b, r]$ is above a suitable threshold
    value.



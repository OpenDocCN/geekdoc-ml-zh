    # ### 6.11.8 Morphological Gradient


    The high grayscale differences in the image defines the boundary or edge of the
    region of interest or object. The edges can be enhanced by gradient operation.
    The edge enhancement using morphological operation is called as morphological
    gradient. The basic morphological gradient computation can be achieved by taking
    the difference between dilation and erosion outputs. This method highlights the
    sharp gray level transitions in an image. The output depends on the selection
    of the structuring element. The basic difference between the gradients obtained
    using Sobel, Prewitt, and morphological gradients is that results tend to depend
    less on edge directionality due to symmetrical structuring elements.


    The basic morphology gradient is also called as "Beucher gradient" and it is defined
    as the arithmetic difference between the dilation and erosion outputs by the same
    structuring element. The mathematical expression for the morphological gradient
    (ρ) is given by


    $$\rho_B(X) = (X \oplus B) - (X \ominus B)$$ (6.42)


    where *B* denotes the structuring element and *X* represents the input image.



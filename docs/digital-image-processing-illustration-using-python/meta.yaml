    # ## 9.12 Wavelet-Based Compression


    The wavelet compression approach is used to compress the image and retain the
    image quality better by removing the high-frequency components. Wavelet transform
    has the ability to perform multi-resolution analysis of the image. Wavelet family
    contains rich set of wavelet filters, which can provide better image compression
    than other transform-based coding like DCT. The drawback of JPEG standard is the
    blocking artefact due to block processing of DCT. The wavelet transform can remove
    blocking artefact; therefore, it is used in JPEG2000 image compression standard.


    # ### Experiment 9.28: Wavelet Transform-Based Image Compression


    This experiment discusses wavelet transform-based compression. The input image
    is decomposed into wavelet subbands using 2D wavelet transform. These wavelet
    subbands hold a variety of coefficients, such as approximation, vertical, horizontal,
    and diagonal details. To achieve the compression in this algorithm, few insignificant
    wavelet coefficients are made as zero by using thresholding technique. The significant
    coefficients are used to reconstruct the original image. The block diagram for
    the above-mentioned task is shown in Fig. 9.60. The Python code to perform this
    task is shown in Fig. 9.61, and its simulation result is depicted in Fig. 9.62.'

    blocks should be the same. For this, it may use the average the pixels in the
    domain block and reduce its size to the size of the range block. Some transformation
    methods, such as flipping, rotation, change contrast, and brightness operation,
    can be performed to find the best match between the domain and range blocks. Flipping
    is a reflection of the scaled-down domain block, and the rotations contain rotating
    the domain block with 0°, 90°, 180°, or 270°. For these transformations, there
    are eight variants of each domain block to compare with each range block. That
    is the domain block may flip or not flip with the four rotation transformations,
    total eight transformations variants.


    Using the root mean square error between the range block and flipping and rotation
    of the down-scaled domain block with a contrast scaling constant and brightness
    controlling constant. The function of the domain block is obtained as


    ```

    $$\omega_i\left(D_{j(i)}\right) = \alpha \times \text{rotate}\left(\text{flip}\left(\hat{D}_{j(i)}\right)\right)
    + \beta$$ (9.38)

    ```


    That minimizes using the following equation


    ```

    $$e_{\text{rms}}(I,G) = \sqrt{\sum_{m=1}^{P}\sum_{n=1}^{Q}\left|I(m,n) - G(m,n)\right|^2}$$
    (9.39)

    ```'

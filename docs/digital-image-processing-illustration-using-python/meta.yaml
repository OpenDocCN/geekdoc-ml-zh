    # ### 6.4.4 Opening


    Opening is another important morphological operation and it can be performed by
    erosion followed by dilation operation with the same structuring element. The
    mathematical expression for the opening operation is defined as


    $$X \circ B = (X \Theta B) \oplus B$$ (6.12)


    The symbol "∘" represents the opening operation. The erosion operation hits all
    the places where the structuring element fits inside the image and the resultant
    image, but it only marks these positions at the origin of the structuring element.
    The erosion followed by dilation operation fills back the full structuring element
    at places where the structuring element fits inside the object. Therefore, an
    opening operation is the union of all translated copies of the structuring element
    that can fit inside the object.'

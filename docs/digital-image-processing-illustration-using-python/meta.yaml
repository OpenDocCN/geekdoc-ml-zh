    # **6.11.2 *Erosion***


    The grayscale erosion operation on a grayscale image can be performed by assigning
    each pixel in an image by the minimum value obtained over the neighbourhood of
    the structuring element. The grayscale erosion operation on grayscale image is
    mathematically written as


    $$(X \Theta B)(m,n) = \min \left\{ \begin{array}{l} X(m-s,n-y) + B(x,y) \mid \
    (m-s),(n-y) \in W_X; (x,y) \in W_B \end{array} \right\} \qquad (6.27)$$


    where $X$ is the input greyscale image, $B$ is the structuring element, and $W_X$
    and $W_B$ are the size of the neighbourhood and the size of the structuring element,
    respectively.


    The grayscale erosion can be performed by the maximum operation as well. However,
    the above equation can be modified as


    $$(X \Theta B)(m,n) = \max \left\{ \begin{array}{l} X(m-s,n-y) - B(x,y) \mid \
    (m-s),(n-y) \in W_X; (x,y) \in W_B \end{array} \right\} \qquad (6.28)$$


    The erosion output depends on the values of the structuring element. If all the
    values of the structuring element are positive then the erosion output is darker.

    \    | 10\n128   | 0.1875      | 11\n```\n\n# 9.7.4 *Arithmetic Coding*\n\nArithmetic\
    \ coding is a lossless compression scheme to compress the data based on the probability\
    \ of occurrence of each unique symbol in the data.\n\n# Arithmetic Encoding\n\n\
    The following steps are involved in the arithmetic encoding algorithm:\n\n+  \
    \ **Step 1:** Calculate the frequency of occurrence of each unique symbol in the\
    \ data. Then, the frequency of occurrence is used to compute the probability of\
    \ occurrence for each unique symbol.\n\n+   **Step 2:** Initially, the entire\
    \ range will [0, 1). Calculate the cumulative sum using the probability of occurrence\
    \ calculated in Step 1 and assign each unique symbol to an interval of probabilities.\n\
    \n+   **Step 3:** For each symbol in the data, narrow down the entire interval\
    \ based on the upper bound and lower bound of the interval of probabilities of\
    \ that symbol.\n\nThe new lower and upper bound of the symbol (*X*) can be obtained\
    \ as\n\n$$\\text{low}_{\\text{new}}(X) = \\text{low} + \\text{interval} \\times\
    \ \\left(\\text{low}_{\\text{range}}(X)\\right)$$ (9.11)\n\n$$\\text{high}_{\\\
    text{new}}(X) = \\text{low} + \\text{interval} \\times \\left(\\text{high}_{\\\
    text{range}}(X)\\right)$$ (9.12)\n\nwhere low$_{\\text{range}}$ refers to the\
    \ symbol(*X*) low range and high$_{\\text{range}}$ indicates the symbol (*X*)\
    \ high range. Interval can be obtained from the difference between high range\
    \ and low range of the symbol (*X*). Then, calculate the new cumulative sum and\

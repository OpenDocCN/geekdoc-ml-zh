    # ### 1.9.3 *Ordered Dithering*


    In ordered dithering, a comparison of blocks of the original to a two-dimensional
    grid of threshold called a dither pattern is done. Each element of the original
    block is quantized according to the corresponding threshold value in the dither
    pattern. Ordered dithering uses a fixed pattern. This means that the values in
    the dither matrix are fixed. For every pixel in the image, the value of the pattern
    at the corresponding location is used as a threshold. Different patterns can generate
    different dithering effects. 2 × 2 dither matrix generates 5 gray levels, which
    is illustrated in Fig. 1.63. 3 × 3 dither matrix exhibits 10 gray levels, which
    is shown in Fig. 1.64. A "*n* × *n*" dither matrix exhibits *n*² + 1 gray levels.


    The dither pattern through "Bayer" matrix is obtained according to the recurrence
    $B_k = \begin{pmatrix} B_{k-1} & B_{k-1} + 2.2^{-2k} \ B_{k-1} + 3.2^{-2k} & B_{k-1}
    + 1.2^{-2k} \end{pmatrix}$ with $B_0 = (0)$. With this relation, the Bayer matrix
    of size 2 × 2 is given by


    $$B_1 = \frac{1}{4} \begin{pmatrix} 0 & 2 \ 3 & 1 \end{pmatrix}$$'

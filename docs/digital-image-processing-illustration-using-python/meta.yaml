    Gaussian function. The Python code that obtains the spectrum of 2D-Gaussian function
    is discussed as follows.


    The general expression for Gaussian function is


    $$f[m,n] = \frac{1}{2\pi\sigma_m\sigma_n}e^{-\frac{(m-\mu_m)^2}{2\sigma_m^2}}e^{-\frac{(n-\mu_n)^2}{2\sigma_n^2}}$$

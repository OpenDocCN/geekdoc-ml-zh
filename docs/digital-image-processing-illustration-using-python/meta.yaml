    # ## 4.3 Image Contrast


    Contrast is a measure of the difference in brightness between the light and dark
    areas of an image. In a low-contrast image, the image values are concentrated
    in a narrow range. Contrast enhancement techniques attempt to change the pixel
    values such that the pixel values are distributed over a wide range. Low-contrast
    images are due to insufficient lighting, the small dynamic range of the optical
    sensors, and natural phenomena such as fog, mist, and so on. It is difficult to
    extract information from low-contrast image, hence it is necessary to perform
    contrast enhancement. Contrast enhancement provides meaningful information for
    real-time image processing applications.


    # ### 4.3.1 *Simultaneous Contrast*


    The human visual system does not possess an absolute sense of gray levels in an
    image. The brightness or darkness of a region in an image depends on the gray
    level in the adjoining regions. This is termed as simultaneous contrast.'

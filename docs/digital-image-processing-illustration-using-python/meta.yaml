    # 11.6.7 UNET


    UNet is a convolutional neural network architecture developed for image segmentation.
    It consists of the contracting path (encoder) and an expansive path (decoder).
    The contracting path contains encoder layers that extract high-level features
    in the input image and reduce the spatial dimension of the input image. This encoder
    layer consists of repeated blocks of convolutional layers followed by max pooling
    layers. The max pooling layer effectively reduces the spatial dimension of the
    input image. The expansive path contains the decoder, which is responsible for
    upsampling or upscaling the low-resolution feature maps to bring back the original
    size of the input image. The decoder layer has repeated blocks of transposed convolutions
    followed by concatenation with corresponding feature maps from the contracting
    path. The UNet has a bottleneck layer, which exists between the encoder and decoder
    paths. This bottleneck layer captures the most critical features while maintaining
    the'

    # ### 11.3.4 Reinforcement Learning


    Reinforcement learning is a feedback-based machine learning technique. The agent
    learns to behave in an environment by performing the actions and looking at the
    outcomes of actions. For each good action, the agent gets positive feedback or
    reward, and for each bad action, the agent gets negative feedback or penalty.
    In reinforcement learning, the agent learns automatically using feedback without
    labelled data. Since the unlabelled data, the agent is bound to learn only by
    experience. Reinforcement learning solves a specific type of problem where decision-making
    is sequential, and the goal is long-term, such as automatic car driving, robotics,
    and game playing like a chess game, mazes, etc. In this learning, the agent interacts
    with and explores the environment by itself. The primary goal of an agent in reinforcement
    learning is to improve performance by getting the maximum positive rewards. The
    agent learns with the process of hit and trial, and based on the experience, it
    learns to perform the task in a better way. The reinforcement learning procedure
    is shown in Fig. 11.10.


    Agent is an entity that can perceive or explore the environment and act upon it.
    Environment is a situation in which an agent is present or surrounded by. It may
    be assumed that stochastic or random environment. Action is the move taken by
    an agent within the environment. State is a situation returned by the environment
    after each action taken by the agent. Reward is feedback returned to the agent
    from the environment to evaluate the action of the agent. Policy is a strategy
    the agent applies for the following action based on the current state. Value is
    expected long-term return with the discount factor and opposite to the short-term
    reward. Q-value is similar to the Value, but it takes one additional parameter
    as a current action.


    The implementation of reinforcement learning in machine learning is value-based,
    policy-based, and model-based. In the value-based approach, the final task is
    to find the optimal value function, which is the maximum value at a state under
    any'

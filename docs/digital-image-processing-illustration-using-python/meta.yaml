    **Fig. 5.87** Framework of image restoration


    Upon taking Fourier transform of Eq. (5.35), we get


    $$G[k,l] = F[k,l] \times H[k,l] + N[k,l]$$ (5.37)


    Equation (5.37) is obtained using the fact that convolution in spatial domain
    is equivalent to multiplication in the frequency domain.


    The expression for the Wiener filter can be written as


    $$W[k,l] = \frac{H^*[k,l]}{H[k,l]H^*[k,l] + \frac{S_N[k,l]}{S_f[k,l]}}$$ (5.38)


    where $H[k,l]$ represents the Fourier transform of the blurring filter, $S_N[k,l]$
    denotes the power spectral density of noisy components, and $S_f[k,l]$ indicates
    the power spectral density of the original input image.


    Let $K = \frac{S_N[k,l]}{S_f[k,l]}$, then Eq. (5.38) can be written as


    $$W[k,l] = \frac{H^*[k,l]}{H[k,l]H^*[k,l] + K}$$ (5.39)


    If $K = 0$, the above equation can be written as


    $$W[k,l] = \frac{1}{H[k,l]}$$ (5.40)


    From Eq. (5.40), it is possible to state that Wiener filter behaves like inverse
    filter in the absence of noise.


    # **Drawback of Wiener Filter**


    To construct Wiener filter, the power spectral density of the undegraded image
    and the power spectral density of the noise must be known, which is not often
    known.



    ### 1.1 图像和像素的定义


    本节从数字图像的定义开始。图像由称为像素的小元素组成。像素的定义也在本节中讨论。


    #### 1.1.1 图像


    图像是多维函数。它表示为$f(x,y,z,\lambda)$。$f(x,y,z,\lambda)$表示三维彩色图像，而$f(x,y,\lambda)$表示二维"彩色图像"，$f(x,y)$表示"灰度图像"。如果图像$f(x,y)$只取两个值，即"0"或"1"，则称为"二值图像"。图像是视觉信息的数值表示。


    #### 1.1.2 像素


    像素是数字图像中最小的单位。Pixel代表"Picture element"（图像元素）。每个像素由位置和值指定。像素的值称为"灰度级"。



  md: 'dealing with limited datasets or constrained computational resources, opting
    for HOG may prove advantageous. Its simplicity and effectiveness in feature extraction
    make it seamlessly compatible with traditional machine learning techniques such
    as Support Vector Machines (SVM). Additionally, HOG shines in cases where images
    exhibit low resolution or significant pixelation. In these instances, gradients
    often furnish more reliable features than raw pixel values, making HOG a preferred
    choice for robust feature extraction.


    **Approach**: The steps involved in the computation of the HOG feature in the
    image are as follows:


    +   Step 1: Read the image and resize it to 64 × 128 the image into 8 × 8 or 16
    × 16 image patches to extract the features.


    Step 2: Calculate the gradient in the "x" and "y" directions.


    The gradient of the input image in "x" and "y" directions is obtained for each
    and every pixel in an image with the window size of 3 × 3, and it is calculated
    using the Eqs. (8.16) and (8.17):


    $$G_x(m,n) = I(m,n+1) - I(m,n-1)$$ (8.16)


    $$G_y(m,n) = I(m-1,n) - I(m+1,n)$$ (8.17)


    where $G_x(m,n)$ and $G_y(m,n)$ denote the gradient in the "x" and "y" directions
    of the pixel located at $(m, n)$.


    +   Step 3: Compute the magnitude and orientation or angle of each gradient pixel.


    The magnitude (H) and orientation or angle (θ) of each pixel are calculated from
    the gradient of the image, which is computed in Step 2. The computation of the
    magnitude and angle of each pixel is given by


    $$\text{Magnitude}\left(H(m,n)\right) = \sqrt{G_x^2(m,n) + G_y^2(m,n)}$$ (8.18)


    $$\text{Orientation or angle}\left(\theta(m,n)\right) = \left|tan^{-1}\left(\frac{G_y(m,n)}{G_x(m,n)}\right)\right|$$
    (8.19)


    +   Step 4: Calculate the histogram of gradient.


    After obtaining the gradient of each pixel in an image, the magnitude gradient
    matrix and angle gradient matrix are divided into either 8 × 8 blocks or 16 ×
    16 blocks. For example, an 8 × 8 block contains a 9 element, and the 9-point histogram
    can be computed from it. The 9-point histogram develops a histogram with 9 bins,
    and each bin has an information of angle range of 20°. Therefore, the number of
    bins in a histogram can be calculated by using the Eq. (8.20):


    $$\text{Number of bins} = 9 \left(\text{ranging from } 0° \text{ to } 180°\right)$$
    (8.20)


    $$\text{Step size}\left(\Delta\theta\right) = \frac{180°}{\text{Number of bins}}
    = \frac{180°}{9} = 20°$$


    The above equation indicates that for the 9-point histogram, the number of bins
    is ''9'' with a distance of an angle of 20°.'

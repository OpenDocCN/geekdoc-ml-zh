    # ## 6.4 Morphological Operations


    This section discusses the basic morphological operations such as (1) erosion,
    (2) dilation, (3) opening, and (4) closing.


    # ### 6.4.1 Erosion


    The erosion operation is the basic operation of morphological image processing,
    which decreases the number of pixels "1" in the input binary image. The erosion
    operation is defined as


    $$X \ominus B = \{x : B_x \subseteq X\}$$ (6.5)


    where *X* denotes the input image, *B* represents the structuring element, and
    "*x*" is the pixels of the selected window of "*X*". The size of the selected
    window will be the size of the structuring element "*B*". The symbol "$\ominus$"
    denotes the erosion operation.


    # #### Depth of Operation


    The depth of the morphological operation is defined as the number of iterations
    of a particular morphological operation. That is, the same operation can be performed
    again and again of the output.



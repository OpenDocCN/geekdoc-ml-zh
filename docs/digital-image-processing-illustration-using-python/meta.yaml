    # ## 3.1 Fourier Transform


    The three flavours of two-dimensional Fourier transform are (1) continuous space
    and continuous frequency Fourier transform, (2) discrete space and continuous
    frequency Fourier transform, and (3) discrete space and discrete frequency Fourier
    transform.


    # ### 3.1.1 *Continuous Space and Continuous Frequency Fourier Transform*


    Let *f*(x, y) represent continuous space 2D signal (image), then the Fourier transform
    of continuous space signal is continuous frequency signal, which is represented
    as


    ```

    $$F(k,l) = \int_{-\infty}^{\infty}\int_{-\infty}^{\infty} f(x,y) e^{-j2\pi(xk+yl)}
    dxdy \qquad (3.1)$$

    ```'

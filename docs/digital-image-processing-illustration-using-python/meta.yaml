    # ### 10.2.4 L*a*b* Colour Space


    The letters *L\**, *a\**, and *b\** represent each of the three values the CIELAB
    colour space uses to measure objective colour and calculate colour differences.
    In *L\*a\*b\** colour space, "*L\**" represents the lightness from black to white
    on a scale of 0–100, whereas "*a\**" and "*b\**" represent the chromaticity. "*a\**"
    value represents the colour from red to green. The negative axis is green, and
    the positive is red. "*b\**" value goes from yellow to blue. Blue lies on the
    negative side, and yellow is on the positive side. *L\*a\*b\** colour space is
    device independent.


    # #### *Experiment 10.11: Conversion of RGB to L*a*b* Colour Space*


    This experiment discusses the conversion of RGB colour image into *L\*a\*b\**
    colour space. Set the "*L\**", "*a\**", and "*b\**" components to zero. After

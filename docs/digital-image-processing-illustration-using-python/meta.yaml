    # 11.6.13 *Conditional GAN*


    A Conditional Generative Adversarial Network (CGAN) is an advanced variation of
    the standard Generative Adversarial Network (GAN), where the generation of output
    is conditioned on specific input data. A GAN can be adapted into a conditional
    model by introducing additional information (denoted as *y*) to both the generator
    and discriminator. This extra information could be anything from class labels
    to data from other sources, which is provided alongside the usual input to guide
    the generation process.


    **Generator Architecture**: In a CGAN, the generator receives two inputs: the
    prior input noise (*z*) and the conditioning information (*y*). These are combined
    into a joint hidden representation, from which the generator produces synthetic
    data. The adversarial training framework allows flexibility in how this hidden
    representation is constructed.


    **Discriminator Architecture**: Similarly, the discriminator receives both real
    data (*x*) and the conditioning information (*y*) as inputs. Its task is to distinguish
    between real data and synthetic data generated by the generator, based on the
    given condition (*y*).


    **Loss Function**: The objective function for the conditional GAN is framed as
    a two-player minimax game:


    $$\min_G \max_D V(D,G) = E_{x \sim p_{data}(x)}\left[\log D(x|y)\right] + E_{z
    \sim p(z)}\left[\log\left(1 - D\left(G(z|y)\right)\right)\right] \quad (11.27)$$'
  - '[PAGE 865]


    Here, $E$ represents the expected operator, which denotes the expected value of
    a random variable. $E_{X \sim pdata(X)}$ denotes the expected value with respect
    to the real data distribution $pdata(x)$, while $E_{Z \sim pz(Z)}$ denotes the
    expected value with respect to the prior noise distribution $pz(Z)$.


    The goal is to balance the generator and discriminator''s abilities. The first
    term $\log D(x|y)$ encourages the discriminator to correctly classify real data.
    The second term $\log(1 - D(G(z|y)))$ encourages the generator to create data
    that the discriminator will classify as real. This balance helps the generator
    improve its ability to produce realistic data, while the discriminator becomes
    more adept at distinguishing between real and generated data based on the given
    conditions.


    # ### 11.6.14 Variational Autoencoder (VAE)


    The Variational Autoencoders (VAEs) are generative models used in machine learning
    to generate new data in the form of variations of the input data trained in the
    model. Autoencoder is a neural architecture that consists of two parts: encoder
    and decoder. The decoder follows the encoder, and in the middle, there is the
    so-called hidden layer that has various names and can sometimes be referred to
    as the bottleneck layer, latent space, hidden layer, encoding layer, or code layer.
    Like autoencoders (AE), the VAEs are deep learning models that consist of an encoder
    and a decoder. The encoder learns to isolate the important latent variables from
    the training dataset, and a decoder uses those latent variables to reconstruct
    the original input data. The VAE architecture was originally developed by Diederik
    O. Kingma and Max Welling in 2013. Most autoencoder architectures encode a discrete
    dataset with a fixed representation of latent variables, whereas VAE architecture
    encodes a continuous dataset with the probabilistic representation of that latent
    space. The advantage of VAE over AE is that VAE not only reconstructs the exact
    original input but also uses variational inference to generate new data output
    that resembles the original input data. VAEs are probabilistic models. VAEs encode
    latent variables of training data not as a fixed discrete value $z$ but as a continuous
    range of possibilities expressed as a probability distribution $p(z)$. The VAEs
    encode two latent vectors: a vector of means ($\mu$) and standard deviations ($\sigma$).
    These two vectors represent the range of possibilities for each latent variable
    and the expected variance within each range of possibilities. Using the methodologies,
    reconstruction loss, Kullback-Leibler (KL) divergence, evidence lower bound, and
    reparameterization trick, VAEs can synthesize new data samples that are unique
    and original unto themselves and resemble the original training data.


    **Reconstruction Loss:** VAEs use reconstruction loss, also called reconstruction
    error, as a primary loss function in training. Reconstruction loss measures the
    difference between the original input data and the reconstructed output by the
    decoder. The cross-entropy loss or mean squared error (MSE) can be used as the
    reconstruction loss function in the training of VAE. In general, the autoencoder'
  - '[PAGE 866]


    model creates a bottleneck that allows only a subset of the original input data
    to pass through to the decoder. The training process starts with a randomized
    initialization of model parameters; the encoder has not yet learned which parts
    of the data to weigh more heavily. As a result, it will initially output a suboptimal
    latent representation, and the decoder will output a somewhat inaccurate or incomplete
    reconstruction of the original input. By minimizing reconstruction loss through
    gradient descent over the parameters of the encode and decoder blocks, the weights
    of the autoencoder model will be adjusted to yield a more useful encoding of latent
    space. The reconstruction loss alone is sufficient to optimize the encoders. However,
    a variational autoencoder aims to reconstruct the original input and generate
    new samples that resemble the original input. An additional optimization algorithm
    like Kullback-Leibler (KL) divergence can be utilized for this.


    **Kullback-Leibler (KL) Divergence:** The KL divergence is a metric used to compare
    two probability distributions. Minimizing the KL divergence between the learned
    distribution of latent variables and a simple Gaussian distribution whose values
    range from 0 to 1 forces the learned encoding of latent variables to follow a
    normal distribution. This distribution helps smooth the interpolation of any point
    in latent space, thereby generating new images. The issue with using KL divergence
    for variational inference is that the denominator of the equation is intractable,
    meaning it would take a theoretically infinite amount of time to compute directly.
    VAEs approximate the minimization of KL divergence by maximizing the evidence
    lower bound (ELBO).


    **Evidence Lower Bound (ELBO):** Evidence Lower Bound (ELBO) refers to the probability
    of observable input data, which is responsible for the reconstruction. Those observable
    variables in the input data are the "evidence" for the latent variables discovered
    by the autoencoder. The "lower bound" refers to the worst-case estimate for the
    log-likelihood of a given distribution. The actual log-likelihood may be higher
    than the ELBO. A specific output of the autoencoder is conditioned by both the
    KL divergence loss term and the reconstruction loss term, which fits the "evidence"
    of the training data. Hence, training a model for variational inference can be
    referred to as maximizing the ELBO. The variation autoencoder aims to generate
    new output data in random variations of the training dataset. VAE uses a function
    that selects a random value for the latent variable, which the decoder can then
    use to generate an approximate reconstruction of the input data. However, an inherent
    randomness property cannot be optimized because there is no best random or vector
    of random values. Therefore, using any gradient descent approach, such a random
    vector cannot be optimized through backpropagation. To overcome this issue, VAE
    uses the reparameterization trick.


    **Reparameterization Trick:** The reparameterization trick introduces a new parameter
    ($\varepsilon$), a random value selected from the normal distribution between
    0 and 1. This new parameter modifies the latent variable ($z$) as $=\mu_x + \varepsilon\sigma_x$
    . Because the random value $\varepsilon$ is not derived from and has no relation
    to the autoencoder model''s parameters, it can be ignored during backpropagation.
    This model is updated'

    ## Chapter 1

    ## Elements of Digital Image Processing


    ### Learning Objectives


    After completing this chapter, the reader should be able to


    - Read and display images of different file formats

    - Perform basic mathematical operations on the input image

    - Perform sampling and quantization of the image

    - Implement different dithering algorithms on the input image

    - Generation of different types of test patterns as images


    ### Roadmap of the Chapter


    The concepts discussed in this chapter are illustrated in the form of a roadmap,
    which is given in Fig. 1.1.


    The concepts to be discussed in this chapter include the resolution of digital
    images, sampling and quantization of images, different mathematical operations
    that can be performed on the image, and the generation of various types of test
    image patterns.


    ### PreLab Questions


    1. What is a pixel?

    2. What is gray level with respect to digital image?

    3. Mention the factor that decides the spatial resolution of a digital image.

    4. Define gray level resolution of the digital image.

    5. Mention the steps involved in the image digitization.

    6. What is aliasing in digital image processing?

    7. Why quantization is considered as an irreversible phenomenon?

    8. Explain the terms "brightness" and "contrast" of a digital image.



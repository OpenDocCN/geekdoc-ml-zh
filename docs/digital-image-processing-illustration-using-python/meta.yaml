    to the real data distribution $pdata(x)$, while $E_{Z \sim pz(Z)}$ denotes the
    expected value with respect to the prior noise distribution $pz(Z)$.


    The goal is to balance the generator and discriminator''s abilities. The first
    term $\log D(x|y)$ encourages the discriminator to correctly classify real data.
    The second term $\log(1 - D(G(z|y)))$ encourages the generator to create data
    that the discriminator will classify as real. This balance helps the generator
    improve its ability to produce realistic data, while the discriminator becomes
    more adept at distinguishing between real and generated data based on the given
    conditions.


    # ### 11.6.14 Variational Autoencoder (VAE)


    The Variational Autoencoders (VAEs) are generative models used in machine learning
    to generate new data in the form of variations of the input data trained in the
    model. Autoencoder is a neural architecture that consists of two parts: encoder
    and decoder. The decoder follows the encoder, and in the middle, there is the
    so-called hidden layer that has various names and can sometimes be referred to
    as the bottleneck layer, latent space, hidden layer, encoding layer, or code layer.
    Like autoencoders (AE), the VAEs are deep learning models that consist of an encoder
    and a decoder. The encoder learns to isolate the important latent variables from
    the training dataset, and a decoder uses those latent variables to reconstruct
    the original input data. The VAE architecture was originally developed by Diederik
    O. Kingma and Max Welling in 2013. Most autoencoder architectures encode a discrete
    dataset with a fixed representation of latent variables, whereas VAE architecture
    encodes a continuous dataset with the probabilistic representation of that latent
    space. The advantage of VAE over AE is that VAE not only reconstructs the exact
    original input but also uses variational inference to generate new data output
    that resembles the original input data. VAEs are probabilistic models. VAEs encode
    latent variables of training data not as a fixed discrete value $z$ but as a continuous
    range of possibilities expressed as a probability distribution $p(z)$. The VAEs
    encode two latent vectors: a vector of means ($\mu$) and standard deviations ($\sigma$).
    These two vectors represent the range of possibilities for each latent variable
    and the expected variance within each range of possibilities. Using the methodologies,
    reconstruction loss, Kullback-Leibler (KL) divergence, evidence lower bound, and
    reparameterization trick, VAEs can synthesize new data samples that are unique
    and original unto themselves and resemble the original training data.


    **Reconstruction Loss:** VAEs use reconstruction loss, also called reconstruction
    error, as a primary loss function in training. Reconstruction loss measures the
    difference between the original input data and the reconstructed output by the
    decoder. The cross-entropy loss or mean squared error (MSE) can be used as the
    reconstruction loss function in the training of VAE. In general, the autoencoder'

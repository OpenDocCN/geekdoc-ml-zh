    # Bayes Theorem


    Bayes theorem is used to determine the probability of a hypothesis with prior
    knowledge, and it depends on the conditional probability. The Bayes theorem states
    that the given class variable (y) and dependent feature vector (X), which contains
    the features {x₁, x₂, x₃, …, xₙ}:


    $$P(X) = \frac{P(y)P(y)}{P(x_1, x_2, \cdots, x_n)}$$ (11.11)'

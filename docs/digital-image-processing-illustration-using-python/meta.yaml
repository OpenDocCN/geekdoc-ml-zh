    # ## 6.9 Thinning


    Thinning is a morphological operation, which reduces the foreground of the object.
    This reduction may be accomplished by obtaining the skeleton of the region. Skeletonization
    is the process of extracting the skeletons of an object in an image. In this operation,
    it removes foreground pixels iteratively layer by layer until the thickness of
    the skeleton is one pixel width. Also, it preserves the topology of the actual
    shape while removing away most of the foreground pixels. There are many methods
    currently available to implement the thinning operation such as (1) Zhang Suen
    fast parallel thinning algorithm, (2) non-max suppression in Canny edge detector,
    (3) Guo and Hall''s two sub-iteration parallel thinning method, and (4) iterative
    methods using morphological operations.


    Thinning operation is similar to operation of erosion or opening and also it can
    be performed by using hit-or-miss transform. The thinning operation can be implemented
    by using erosion and opening operations given by


    $$S_i(X) = (X_{i-1} \Theta B) - ((X_{i-1} \Theta B) \circ B)$$ (6.22)


    $$X \otimes B = \bigcup_{i=0}^{N} S_i(X)$$ (6.23)


    where $X_0$ is the input binary image, $B$ is the structuring element, $X_i =
    X_{i-1} \Theta B$, $\otimes$ denotes the thinning operation. $S_i$ is the subset
    result of erosion and opening operation. Here, "$i$" indicates the iteration number
    of erosion. $N$ is the last iterative step before $Xi$ erodes to the empty set
    is a stopping criterion.


    Thinning operation can be implemented by using hit-or-miss transform, which is
    mathematically written as


    $$X \otimes B = X - (X \circledast B)$$ (6.24)'

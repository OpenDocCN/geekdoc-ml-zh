  md: 'The channel mean value of the image is computed as


    $$\text{Channel\_Mean}\left(X[:,:,i]\right) = \frac{\text{Sum of all Pixels in
    image } X[:,:,i]}{\text{Total number of Pixels in image } X[:,:,i]} \quad (8.1)$$


    The mean value of the image is calculated using


    $$\text{Mean}\left(X\right) = \frac{\text{Sum of all Pixels in image } X}{\text{Total
    number of Pixels in image } X} = \frac{1}{3}\sum_{i=0}^{3}\text{Channel\_Mean}\left(X[:,:,i]\right)
    \quad (8.2)$$


    The colour image can be converted into grayscale image using "rgb2gray" conversion.
    This method uses the equation is given by


    $$\text{Gray}\left(X\right) = 0.299 \times R + 0.587 \times G + 0.114 \times B
    \quad (8.3)$$


    where *R*, *G*, and *B* represent the *R*, *G*, and *B* channels of colour image
    (*X*). The mean value of the grayscale image (*GX*) is computed as


    $$\text{Mean}\left(GX\right) = \frac{\text{Sum of all Pixels in image } GX}{\text{Total
    number of Pixels in image } GX} \quad (8.4)$$


    where "*GX*" denotes the grayscale image, which is converted from colour image
    using Eq. (8.3).



    The expression for weighted addition of two images $f_1[m,n]$ and $f_2[m,n]$ is
    given by


    $$g[m,n] = \alpha f_1[m,n] + \beta f_2[m,n]$$ (1.2)


    In the above expression, "$\alpha$" and "$\beta$" are the weights associated with
    the images $f_1[m,n]$ and $f_2[m,n]$, respectively.



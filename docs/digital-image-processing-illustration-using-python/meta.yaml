    # ## 6.5 Hit-or-Miss Transform


    The hit-or-miss transform is a morphological algorithm that can be used to look
    for particular patterns of foreground and background pixels in an image, and also
    it can be used for template matching. Here, two structuring elements are used
    to obtain the template matching in the input image. The structuring element "$B$"
    acts as a template and "$W-B$" is the background of the template "$B$". In other
    words, "$B$" is the foreground of the template. The size of the "$W$" will always
    be greater than the size of the "$B$". This transform is basically an intersection
    of the erosion of the input image with the structuring element "$B$" and the erosion
    of the complement of the input image with the structuring element "$W-B$".


    The mathematical equation of the hit-or-miss transform is given by


    $$X \circledast B = (X \Theta B) \cap \left(X^c \Theta (W-B)\right)$$


    (6.18)


    where the symbol "$\circledast$" denotes the hit-or-miss transform.



  md: '![](img/f88e6a966edb922bd0b2ae87662c6c4b_839_0.png)


    **Fig. 11.82** YOLO architecture


    The YOLO algorithm uses several techniques, such as residual blocks, bounding
    box regression, intersection over union (IoU), and non-maximum suppression, to
    detect objects. YOLO divides the input image into a grid of S × S sections. If
    an object''s centre falls within a grid section, that section is responsible for
    detecting the object. Each grid section can predict multiple bounding boxes and
    associated confidence scores, indicating how likely it is that an object is present.
    During training, only one bounding box predictor is assigned to each object. The
    IoU metric helps the model to determine how well the predicted boxes match the
    actual objects. YOLO selects the predictor that has the highest IoU with the ground
    truth for each object, enabling it to improve its accuracy over time for different
    sizes and shapes of objects. This approach helps to enhance the overall effectiveness
    of object detection in images.



    # 11.6.5 VGG-16


    VGG16 means "Visual Geometry Group" with 16 layers network. The Visual Geometry
    Group from the University of Oxford developed this deep neural network. VGG16
    has the distinctive features of architectural simplicity. The network consists
    of several convolutional layers, followed by max-pooling layers, and ends with
    three fully connected layers. VGG16 primarily uses 3 × 3 filters for its convolutional
    layers, which is a key design choice. By using smaller filters, the model can
    learn finer details in the image while still capturing complex patterns as the
    network deepens. A notable benefit of this approach is that stacking multiple
    small 3 × 3 filters results in a receptive field equivalent to larger filters
    (e.g. 5 × 5 or 7 × 7), but with fewer parameters. For example, three consecutive
    3 × 3 convolutional layers have the same receptive field as a single 7 × 7 layer
    but require fewer parameters and computational resources. The architecture of
    VGG16 is shown in Fig. 11.71.'

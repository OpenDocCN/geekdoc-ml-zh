  md: 'The boundary of the $j^{\text{th}}$ bin is computed as $[\Delta\theta \times
    j, \Delta\theta \times (j+1)]$. Similarly, the centre value of the $j^{\text{th}}$
    bin is computed by


    $$C_j = \Delta\theta \times \left(j + \frac{1}{2}\right)$$ (8.21)


    For each cell in a block, the value of $j^{\text{th}}$ and $(j+1)^{\text{th}}$
    bin is calculated by


    $$j = \frac{\theta}{\Delta\theta} - \frac{1}{2}$$ (8.22)


    $$V_j = H \times \left[\frac{\theta}{\Delta\theta} - \frac{1}{2}\right]$$ (8.23)


    $$V_{j+1} = H \times \left[\frac{\theta - C_j}{\Delta\theta}\right]$$ (8.24)


    The values of $V_j$ and $V_{j+1}$ are appended in the array at the index of $j^{\text{th}}$
    and $(j+1)^{\text{th}}$ bin in the histogram.


    Once the histogram of each block is computed, then 4 blocks from 9-point histogram
    matrix are clubbed together to form a new block ($2 \times 2$). This clubbing
    can be done overlappingly with a stride of 8 pixels. The total number of features
    in a vector ($4 \times 9$) 36, which is arranged in the form of


    $$f_{b_i} = \left[b_1, b_2, \cdots, b_{36}\right]$$ (8.25)


    **Step 5:** Normalize the gradients in $16 \times 16$ cell.


    The value of $f_b$ for each block is normalized by the L$_2$ norm which is mathematically
    written as


    $$f_{b_i} = \frac{f_{b_i}}{\sqrt{\|f_{b_i}\|_2^2 + \varepsilon^2}}$$ (8.26)


    where $\varepsilon$ is a small value to avoid zero division error during the normalization
    process.


    The normalizing constant "$k$" is obtained as


    $$k = \sqrt{b_1^2 + b_2^2 + \ldots + b_{36}^2}$$ (8.27)


    The normalized $f_{b_i}$ is used to reduce the effect of changes in the contrast
    between images of the same object, and it is calculated as


    $$f_{b_i} = \left[\frac{b_1}{k}, \frac{b_2}{k}, \cdots, \frac{b_{36}}{k}\right]$$
    (8.28)'

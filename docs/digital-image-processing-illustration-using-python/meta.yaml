    # ## 9.8 Lossy Compression Scheme


    In the lossy compression scheme, the exact information in the input data cannot
    be recovered from the compressed file or data. There are some insignificant details
    in the input data, which will be removed by the compression algorithm to achieve
    a high compression ratio. In lossy compression, the reconstructed image has some
    loss, which is completely imperceptible to a human viewer. For this reason, lossy
    compression algorithms on images can often get a factor of 2 better compression
    than lossless compression schemes with an imperceptible loss in quality.


    # ## 9.9 Transform Coding


    Transform coding is a lossy compression technique; it converts the spatial domain
    image into the frequency domain using transformation techniques. The suitable
    image transform can be chosen to decorrelate the interpixel redundancy within
    in the image. The transformed coefficients are coded to achieve high compression.
    For'
  merge: -1
  pgno: 651
- img_proc: true
  md: 'the decorrelation of the image, orthogonal transforms are preferred so that
    reconstruction of the original image from the compressed file can be possible.
    Also, the orthogonal transform has the property of energy preservation while converting
    from spatial domain to frequency domain. The transform operation itself does not
    provide any compression; it will decorrelate the original data and compact a large
    fraction of the signal energy into a relatively small set of transform coefficients.
    Due to the energy compaction of the transformed coefficients, many of the coefficients
    hold less information which has to be removed by using a quantization process.
    Then, lossless coding techniques like Huffman, run length, and arithmetic coding
    can be used as an entropy encoder to get a compressed file. The block diagram
    of transform coding encoder is shown in Fig. 9.44. From this figure, it is possible
    to observe that transform coding scheme contains three major blocks in encoder,
    such as (1) Forward transform, (2) Quantization, and (3) Entropy coding. The reverse
    processes followed to reconstruct the image from the compressed file, which is
    depicted in Fig. 9.45. The major blocks in decoder are (1) Entropy decoding, (2)
    Inverse quantization, and (3) Inverse transform.



    # ### 9.7.5 LZW Coding


    LZW coding is a lossless data compression scheme, which was developed by Abraham
    Lempel, Jakob Ziv, and Terry Welch. Therefore, it is named as LZW. It is a dictionary-based
    lossless compression algorithm that scans an input pattern that occurs more than
    once. The repeated patterns are then saved in a dictionary, and references are
    placed within the compressed file wherever repetitive input occurs. LZW algorithm
    is used in the GIF image format and is part of the widely used Unix file compression
    utility compress.


    The LZW algorithm consists of encoding and decoding processes. In the encoding
    process, the input data string is converted into an integer code; whereas decoding
    process gets back the input data string from the encoded integer codes. Both encoding
    and decoding algorithms have a default table that serves as the initial dictionary.
    While executing the algorithm, this initial dictionary is updated with the new
    integers and its corresponding string pattern.


    # #### Experiment 9.17: Encode the Word "AMMAAPPA" Using LZW Algorithm


    This experiment explains the encoding and decoding of word "AMMAAPPA" using LZW
    algorithm. The unique characters in the word in the given word is {"A", "M", "P"}.
    The initial dictionary by default will be {A—0, M—1, P—2}.


    | String | Integer code |

    |--------|-------------|

    | A | 0 |

    | M | 1 |

    | P | 2 |



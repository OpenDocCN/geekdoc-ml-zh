    # ## Colour Segmentation in HSV Space


    The HSV colour space can be used to filter a particular colour. In order to filter
    a colour, it is necessary to set boundaries for which colour needs to be detected.
    The objective is to detect specific regions in specific colours. To identify a
    region of a specific colour, the first step is to fix the threshold and create
    a mask to separate the different colours. HSV colour space is much more useful
    for this purpose as the colours in HSV space are much more localized and thus
    can be easily separated.



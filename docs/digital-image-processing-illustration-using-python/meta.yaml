    # ## 8.5 Frequency-Based Features


    Frequency-based features, such as Fourier descriptors, are a type of feature extraction
    method that captures the frequency content of an image. These features are often
    used in computer vision applications such as object recognition, texture analysis,
    data compression, and image retrieval. Frequency-based features are used in places
    with limited data and a requirement of rotational and spatial invariance.


    # ### 8.5.1 *Fourier Transform-Based Features*


    Fourier transform is a mathematical tool that converts the time domain signal
    into the frequency domain and vice versa. It uses the Fourier basis function for
    the conversion. The output of the Fourier transform contains the magnitude and
    phase information of the input image. It decomposes the input signal into multiple
    sines, cosines, and a constant signal. The output gives information about the
    signal at a particular frequency. Therefore, it is capable of converting the highly
    correlated signal into an uncorrelated spectrum. This uncorrelated spectrum can
    be used as a feature to represent an input signal.


    # **Experiment 8.25: Fourier Transform-Based Feature Extraction**


    This experiment extracts the Fourier transform features from an image using Python.
    The Python code to extract the Fourier transform features is given in Fig. 8.58,
    and its simulation result is shown in Fig. 8.59.


    # **Inferences**


    The following inferences can be drawn from this experiment:


    +   - From Fig. 8.58, it is possible to observe that the "cv2.dft" Python command
    is used to find the Fourier features.

    - *fftshift()* command rearranges all frequency components into ascending order
    from negative to positive with the zero-frequency term in the centre. *fftshift()*
    always puts the Nyquist term at the 0-index.

    - For the reduction of the Fourier features, the mask within the certain radius
    is assigned to be one, and outside the radius is assumed to be zero, and it is
    multiplied with the fftshift output.

    - Based on the radius of the mask, the reconstructed output will vary; if the
    radius of the mask is small, it blurs the image due to the loss of the high-frequency
    components, which is shown in Fig. 8.59.'
  - '[PAGE 587]


    ```

    python

    import numpy as np

    import cv2

    from matplotlib import pyplot as plt

    I = cv2.imread(''Clock.tiff'', 0)

    DFT = cv2.dft(np.float32(I), flags=cv2.DFT_COMPLEX_OUTPUT)

    shift = np.fft.fftshift(DFT)

    rad=10

    row, col = I.shape

    center_row, center_col = row // 2, col // 2

    mask = np.zeros((row, col, 2), np.uint8)

    mask[center_row - rad:center_row + rad, center_col - rad:center_col + rad] = 1

    fft_shift = shift * mask

    fft_ifft_shift = np.fft.ifftshift(fft_shift)

    I_Rec = cv2.idft(fft_ifft_shift)

    M_IRec = cv2.magnitude(I_Rec[:,:,0], I_Rec[:,:,1])

    P_IRec = cv2.phase(I_Rec[:,:,0], I_Rec[:,:,1])

    plt.figure(figsize=(10,10))

    plt.subplot(131), plt.imshow(I, cmap=''gray'')

    plt.title(''Input Image''), plt.xticks([]), plt.yticks([])

    plt.subplot(132),plt.imshow(M_IRec, cmap=''gray'')

    plt.title(''Magnitude Output''), plt.xticks([]), plt.yticks([])

    plt.subplot(133), plt.imshow(P_IRec, cmap=''gray'')

    plt.title(''Phase Output''), plt.xticks([]), plt.yticks([])

    plt.show()

    ```



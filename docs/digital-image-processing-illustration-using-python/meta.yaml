    set and is a stopping criterion.


    Thinning operation can be implemented by using hit-or-miss transform, which is
    mathematically written as


    $$X \otimes B = X - (X \circledast B)$$


    where "$\circledast$" represents the hit-or-miss transform output of the input
    binary image $X$, and $B$ is set of structuring elements denoted as $B = \{B_1,
    B_2, ..., B_N\}$. In general, $B_i$ is the rotated version of the $B_{i-1}$. Here,
    sequence of structuring elements is used to produce symmetric results, and this
    operation is mostly applied in an iterative manner until no further changes occur.


    +   9. Thickening is the duality of the thinning operation, which can be used
    to thicken the width of the thinned image. The mathematical expression for the
    thickening operation "$\odot$" is given by


    $$A \odot B = \bigcup_{i=0}^{N} (A_i \oplus B)$$


    where "$\oplus$" denotes dilation operation, "$\odot$" represents thickening operation,
    and $N$ is the number of iterations for the dilation operation. $A$ is the skeleton
    input image, which is to be thickened.


    +   10. Yes. The morphological operations such as dilation, erosion, opening,
    closing, and so on can be applied on the grayscale image. The minimum and maximum
    non-linear operations can be used to perform the grayscale morphological operations.


    +   11. The morphological smoothing on grayscale image is performed by opening
    operation followed by closing operation. The morphological smoothing can be obtained
    by taking average of erosion and dilation output, which is called as dynamic smoothing.
    The arithmetic average of opening and closing operations will give texture smoothing
    result.


    +   12. The edge enhancement using morphological operation is termed as morphological
    gradient. The morphological gradient can be implemented by taking difference between
    dilation and erosion outputs with the same structuring element. The basic morphology

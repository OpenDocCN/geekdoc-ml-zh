    # ## 7.10 GrabCut Algorithm for Image Segmentation


    GrabCut algorithm is used to segment the input image into foreground and background.
    It is a semi-automatic image segmentation method that user intervention is required
    to perform the segmentation task. The user input is a rectangle on an image. The
    rectangle should include the subjects of the image. The area lying outside the
    rectangle is defined as the background. The algorithm defines the area in the
    rectangle as a colour distribution model using the Gaussian Mixture Model (GMM),
    where each pixel will be labelled as foreground or background. GrabCut segmentation
    technique uses graph cuts to perform segmentation. GrabCut makes use of both edge
    and region information. To perform the segmentation, a graph is built where nodes
    or vertex in the graph represent pixels in the image. Two special nodes are created
    which are termed as Source and Sink nodes. The Source node represents the foreground
    of the image, and the Sink node represents the background. Now, segmentation task
    is to separate the Source and Sink node. The energy function is incorporated into
    the graph as weights between pixel nodes and weights between pixel and Source
    or Sink nodes. Weights between pixel nodes are determined by edge information
    in the image. A strong indication of the edge between two pixels results in a
    minimal weight between two-pixel nodes. The region information determines the
    weights between pixel nodes and the Source and Sink nodes. These weights are calculated
    by determining the probability of pixel node being part of the background'
  - '[PAGE 528]



    convolutional kernels to generate the convolved feature maps, and the pooling
    layers operate on the convolved feature maps to aggregate the information within
    the given neighbourhood window with a max pooling operation or average pooling
    operation. The reason why AlexNet is successful can be attributed to some practical
    strategies, such as the ReLU non-linearity layer and the dropout regularization
    technique. The ReLU is a half-wave rectifier function, which can significantly
    accelerate the training phase and prevent overfitting. The dropout technique can
    be regarded as a kind of regularization by stochastically setting a number of
    the input neurons or hidden neurons to be zero to reduce the co-adaptations of
    the neurons, which is usually utilized in the fully connected layers in the AlexNet
    architecture. The important features of AlexNet are as follows: (1) The input
    image size could be 227 × 227 × 3; if the input image is other than this size,
    it could be resized by using some padding approach. (2) The Batch size is fixed
    as 128. (3) Stochastic Gradient Descent optimization algorithm is used as a learning
    algorithm.



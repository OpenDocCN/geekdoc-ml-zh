    import cv2

    import numpy as np

    import matplotlib.pyplot as plt

    I = cv2.imread(''Clock.tiff'', 0)

    Blur = cv2.GaussianBlur(I, (5, 5), 0)

    G_x = cv2.Sobel(Blur, cv2.CV_64F, 1, 0, ksize=3)

    G_y = cv2.Sobel(Blur, cv2.CV_64F, 0, 1, ksize=3)

    M = np.sqrt(G_x**2 + G_y**2)

    D = np.arctan2(G_y, G_x) * (180 / np.pi);# direction

    G_D = np.zeros_like(D); # Gradient direction

    G_D[((D >= 0) & (D < 22.5)) | ((D >= 157.5) & (D < 180))] = 0

    G_D[(D >= 22.5) & (D < 67.5)] = 45

    G_D[(D >= 67.5) & (D < 112.5)] = 90

    G_D[(D >= 112.5) & (D < 157.5)] = 135

    Lth = 0; # Lower threshold (Direction)

    Hth = 100;# Higher threshold

    E = np.zeros_like(I);# Edges

    E[(M >= Hth) & (G_D == Lth)] = 255

    plt.figure(figsize=(6,6))

    plt.subplot(121),plt.imshow(I,cmap="gray"),plt.title("Original image")

    plt.axis(''off''),plt.subplot(122),plt.imshow(E,cmap="gray")

    plt.title("Canny Edge Detection"),plt.axis(''off'')


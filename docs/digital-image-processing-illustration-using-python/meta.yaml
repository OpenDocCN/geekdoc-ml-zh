    H_Ideal=D>D0    #H(k,l)

    #Step 3b: Butterworth HPF

    n=5  #Order of Butterworth filter

    H_Butter=1/(1+D0/D)**2*n

    #Step 3c: Gaussian HPF

    H_Gaussian=1-np.exp(-(D**2)/(2*D0**2))

    #Step4: Multiplying spectrum of input image with H(k,l)

    IMG_out1=np.multiply(IMG, H_Ideal)

    IMG_out2=np.multiply(IMG, H_Butter)

    IMG_out3=np.multiply(IMG, H_Gaussian)

    #Step 5:Inverse Fourier transform

    img_out1=np.fft.ifft2(IMG_out1)

    img_out2=np.fft.ifft2(IMG_out2)

    img_out3=np.fft.ifft2(IMG_out3)

    #Step 6: Displaying the results

    plt.figure(figsize=(9, 9))

    plt.subplot(3,3,1),plt.axis(''off''),plt.subplot(3,3,2),plt.imshow(H_Ideal,cmap=''gray''),

    plt.title(''Ideal HPF mask''),plt.xticks([]),plt.yticks([]),plt.subplot(3,3,3),

    plt.imshow(np.abs(img_out1),cmap=''gray''),plt.title(''Ideal HPF image''),plt.axis(''off'')

    plt.subplot(3,3,4),plt.imshow(img,cmap=''gray'',vmin=0,vmax=256),plt.title(''Input
    image''),

    plt.axis(''off''),plt.subplot(3,3,5),plt.imshow(H_Butter,cmap=''gray''),plt.title(''Butterworth
    HPF mask'')

    plt.xticks([]),plt.yticks([]),plt.subplot(3,3,6),plt.imshow(np.abs(img_out2),cmap=''gray''),

    plt.title(''Butterworth HPF image''),plt.axis(''off''),plt.subplot(3,3,7),plt.axis(''off''),

    plt.subplot(3,3,8),plt.imshow(H_Gaussian,cmap=''gray''),plt.title(''Gaussian HPF
    mask'')


    # ## 9.13 SVD Based Compression


    The singular value decomposition (SVD) is a transform, which decomposes the input
    matrix "A" with the size (m × n) into three matrices such as U, S, and V. The
    relationship between the input matrix and decomposed matrices is given by


    $$A = USV^T$$ (9.29)


    where U and V are the orthonormal matrices with the size of (m × m) and (n × n),
    respectively. S represents the diagonal singular value matrix with the size of
    (m × n). The SVD representation of matrix A is shown in Fig. 9.63.


    The singular values matrix in the form of


    ```

    $$S = \begin{bmatrix} \sigma_1 & 0 & \cdots & 0 & 0 & \cdots & 0 \ 0 & \sigma_2
    & \cdots & 0 & 0 & \cdots & 0 \ \vdots & \vdots & \ddots & \vdots & \vdots & \cdots
    & \vdots \ 0 & 0 & \cdots & \sigma_r & 0 & \cdots & 0 \ 0 & 0 & \cdots & 0 & \sigma_{r+1}
    & \cdots & 0 \ \vdots & \vdots & \cdots & \vdots & \vdots & \ddots & \vdots \
    0 & 0 & \cdots & 0 & 0 & \cdots & \sigma_n \ 0 & 0 & \cdots & 0 & 0 & \cdots &
    0 \end{bmatrix}$$

    ```


    For i = 1, 2, 3, ..., n, σi are called singular values of a matrix A. For example,
    the rank of the matrix A is "r", then the singular values in the form of {σ1 ≥
    σ2 ≥ σ3··· ≥ σr > 0 and σr+1 = σr+2 = ··· = σn = 0}. That is the "r" numbers of
    singular values are non-zero for "n" singular values.'

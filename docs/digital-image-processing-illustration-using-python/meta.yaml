    get


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_546_0.png)


    Assume the threshold τ = 4, and for colour "0", there are two connected components
    (see red line), in that one connected component has more than 4 components, which
    is more than τ = 4. Therefore, all the pixels that correspond to these connected
    components are considered coherent pixels. The other connected component has two
    components, which is less than τ = 4. Therefore, the two pixels in an image corresponding
    to these two components are classified as incoherent pixels for colour "0". Similarly,
    for the colour "1", there are two connected components; one has four components,
    and another has two components. The first one satisfies the coherent component,
    and the other does not satisfy the condition of the coherent component; hence,
    its corresponding pixels are incoherent pixels. There is one connected component
    for the colour "2"; the number of components is 6, which satisfies the coherent
    pixel condition. Hence, the pixels corresponding to these components are considered
    coherent pixels.


    The final colour-coherent feature vector is given by


    | Colour | 0 | 1 | 2 |

    |--------|---|---|---|

    | Coherent (C) | 11 | 4 | 6 |

    | Incoherent (N) | 2 | 2 | 0 |


    The number of coherent and incoherent pixels is 21 and 4, respectively. The total
    number of pixels in the considered image is 25, and the total number of coherent
    and incoherent pixels is also 25. Hence, no pixel is missed in this computation.



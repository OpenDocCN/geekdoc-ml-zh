    # ### 8.2.1 GLCM


    GLCM stands for Gray Level Co-occurrence Matrix; it is also called the Gray Tone
    Spatial Dependency Matrix. The GLCM is a tabulation of how often different combinations
    of pixel occur in an image. GLCM texture depends on the relationship between two
    pixels at a time. The two pixels are named the "reference pixel (R)" and the "neighbourhood
    pixel". The relation between reference and neighbouring pixels with the window
    size is 3 × 3, as shown in Fig. 8.20. From Fig. 8.20, it is possible to infer
    that the relation between the reference and its neighbourhood pixels is in the
    form of horizontal (West (W) or East (E)), vertical (North (N) or south (S)),
    diagonal (North-East (NE), North-West (NW), South-East (SE), and South-West (SW)).
    Therefore, there are eight directions; among the eight directions, only four directions
    are used for the GLCM computation. W is the opposite of E, and N is the opposite
    of S, and so on.


    Therefore, spatial invariant relations will be chosen by counting in four directions
    (N, NE, E, SE). Based on these four directions, four GLCM tables or matrices can
    be obtained for an image. The computation of four GLCM matrices for an image (X)
    is illustrated as follows:'

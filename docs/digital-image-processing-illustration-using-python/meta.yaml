  md: 'The expression for the Laplacian is given by


    $$\nabla^2 f(x,y) = \frac{\partial^2 f(x,y)}{\partial x^2} + \frac{\partial^2
    f(x,y)}{\partial y^2}$$ (7.11)


    Adding Eqs. (7.9) and (7.10), we get


    $$\nabla^2 f(x,y) = \frac{e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}}{\sigma^2}\left(\frac{x^2}{\sigma^2}-1\right)
    + \frac{e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}}{\sigma^2}\left(\frac{y^2}{\sigma^2}-1\right)$$
    (7.12)


    The above equation can be simplified as


    $$\nabla^2 f(x,y) = e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}\left(\frac{x^2+y^2-2\sigma^2}{\sigma^4}\right)$$
    (7.13)


    In Marr–Hildreth edge detection, the input image is first convolved with a Gaussian
    filter to perform a smoothing operation; then the Laplacian operator is applied
    to the smoothened image. This is expressed as


    $$\nabla^2\left(f(x,y) * g(x,y)\right)$$ (7.14)


    In the above expression, *f*(x,y) represents the input image, *g*(x,y) represents
    the Gaussian kernel. Since convolution is associative, the above expression can
    be written as


    $$f(x,y) * \nabla^2\left(g(x,y)\right)$$ (7.15)


    In the above expression, ∇²(*g*(x,y)) represents the Laplacian of Gaussian function
    which is termed as LoG operator.


    # **Experiment 7.11: Laplacian of Gaussian (LoG) filtering or Marr–Hildreth edge
    detection**


    The objective of this experiment is to obtain the edge of the input image using
    Laplacian of Gaussian. The steps followed in Laplacian of Gaussian (LoG) filtering
    are as follows:


    +   1. The input image is passed through Gaussian low-pass filter to smoothen
    the image.

    2. The second-order derivative of the smoothened image is obtained by applying
    Laplacian filter.


    The Python code that accomplishes the above-mentioned task is shown in Fig. 7.28,
    and the corresponding output is shown in Fig. 7.29.'

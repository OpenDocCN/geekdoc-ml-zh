    # ### 1.9.5 *Image Interpolation*


    Interpolation is based on the principle of using known data to estimate values
    at unknown points. Widely used interpolation techniques are (1) nearest neighbour,
    (2) bilinear, (3) bicubic, and (4) cubic spline. Each method of interpolation
    has its own advantages and drawbacks.


    # ### 1.9.6 *Nearest Neighbour Interpolation*


    In nearest neighbour interpolation, each interpolated output pixel is assigned
    the value of the nearest sample point in the input image. The illustration of
    nearest neighbour interpolation technique is given in Fig. 1.73.


    In Fig. 1.73, the input image is a 2 × 2 image, which is interpolated to 4 × 4
    output image by assigning the value of the nearest pixel to the new pixel.


    Nearest neighbour interpolation is very simple, and it uses the nearest neighbour''s
    pixel to fill the interpolated point. The nearest neighbour method of interpolation
    is easy to implement. The drawback is that this method of interpolation results'
  merge: -1
  pgno: 76
- img_proc: true
  md: 'in blocky or pixelated results. The details and smoothness of the image is
    lost in nearest neighbour method of interpolation.


    # ### 1.9.7 Bilinear Interpolation


    In bilinear interpolation, the interpolated point is filled with four closest
    pixel''s weighted average. This method uses two linear interpolations in horizontal
    and vertical directions; hence, it is termed as bilinear interpolation technique.
    The result obtained by the bilinear interpolation technique is smoother when compared
    to the result obtained using nearest neighbour interpolation.


    # ### 1.9.8 Bicubic Interpolation


    Bicubic interpolation uses cubic polynomials to interpolate pixel values. Bicubic
    interpolation is a method for image resizing that calculates new pixel values
    using the nearest 16 pixels. The algorithm assigns different weights to the neighbouring
    pixels based on their distance from the target pixel, allowing closer pixels to
    influence the interpolated value more. This technique produces smoother and higher
    quality results compared to nearest neighbour and bilinear interpolation. This
    is achieved at the expense of complexity to perform mathematical evaluation.



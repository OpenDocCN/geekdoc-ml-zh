  md: '# ### 11.6.9 Recurrent Neural Network (RNN)


    A recurrent neural network (RNN) is a type of artificial neural network designed
    for processing and analyzing sequential data, where the order of inputs matters.
    Unlike traditional feedforward neural networks, RNNs have connections that loop
    back on themselves, enabling them to maintain an internal state or memory of past
    inputs. This ability to "remember" previous information allows RNNs to model temporal
    dependencies in sequential data, making them particularly effective for tasks
    such as time series forecasting, natural language processing, speech recognition,
    and video analysis. In an RNN, the output of each time step is not only influenced
    by the current input but also by the hidden state, which encodes information from
    prior time steps.


    A recurrent neural network (RNN) is composed of multiple fixed activation function
    units, each corresponding to a specific time step in the sequence. The architecture
    of RNN is shown in Fig. 11.85. From this figure, it is possible to observe that
    the architecture contains an input layer ($X$), a hidden layer ($h$) with a loop,
    an output layer ($Y$), and weights ($U$, $V$, and $W$). At each time step, these
    units maintain an internal state known as the hidden state ($h$), which stores
    the knowledge that the network has accumulated from previous time steps. The hidden
    state essentially represents the "memory" of the network, encoding past information
    that influences the current output ($Y$). As the network processes the sequence,
    the hidden state is updated at every time step, reflecting changes in the network''s
    understanding of the input data over time. The input layer ($X$) receives and
    processes the external input before passing it onto the next layer. In the middle
    layer, the hidden layers ($h$) contain multiple units, each equipped with its
    own activation function, weights, and biases. These hidden layers work together
    to transform the input data into a form that allows the network to make predictions
    or generate outputs based on the temporal patterns in the sequence. As information
    flows through the RNN, each hidden layer updates its activation based on both
    the current input and the previous hidden state, allowing the network to capture
    dependencies and relationships over time. This unique structure enables RNNs to
    handle sequential data, making them effective for speech recognition, language
    modelling, and time series forecasting tasks.


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_848_0.png)'

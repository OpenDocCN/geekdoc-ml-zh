- img_proc: true
  md: '# ### 3.5.2 *Central Slice Theorem*


    The Central Slice Theorem, also termed as Projection-Slice Theorem or Fourier
    Slice Theorem, relates the Fourier transform of a projection to the Fourier transform
    of the original object.


    The Fourier transform of the projection (R(ρ, θ)) is represented as G(ω, θ), which
    is represented as


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} R(\rho, \theta) e^{-j2\pi\rho\omega}
    d\rho$$ (3.36)


    Substituting the expression for R(ρ, θ) from Eq. (3.33), we get


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} \int_{-\infty}^{\infty} \int_{-\infty}^{\infty}
    f(x,y) \delta(\rho - x\cos\theta - y\sin\theta) dx\, dy \left(e^{-j2\pi\rho\omega}\right)
    d\rho$$ (3.37)


    Rearranging the above equation, we get


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} \left\{\int_{-\infty}^{\infty} \int_{-\infty}^{\infty}
    f(x,y) \delta(\rho - x\cos\theta - y\sin\theta) dx\, dy\right\} e^{-j2\pi\rho\omega}
    d\rho$$ (3.38)


    The above equation can be written as


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} \int_{-\infty}^{\infty} f(x,y) \left\{\int_{-\infty}^{\infty}
    \delta(\rho - x\cos\theta - y\sin\theta) e^{-j2\pi\rho\omega}\right\} dx\, dy$$
    (3.39)


    The impulse function is represented as


    $$\delta(\rho - x\cos\theta - y\sin\theta) = \begin{cases} 1, & \rho = x\cos\theta
    + y\sin\theta \ 0, & \text{otherwise} \end{cases}$$ (3.40)


    Evaluating the delta function in Eq. (3.39), we get


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} \int_{-\infty}^{\infty} f(x,y) e^{-j2\pi\omega(x\cos\theta
    + y\sin\theta)} dx\, dy$$ (3.41)


    Substituting u = ωcosθ and v = ωsinθ in the above expression, we get


    $$G(\omega, \theta) = \int_{-\infty}^{\infty} \int_{-\infty}^{\infty} f(x,y) e^{-j2\pi(ux
    + vy)} dx\, dy$$ (3.42)


    The above expression is 2D-Fourier transform of f(x, y) along the line u = ωcosθ
    and v = ωsinθ.


    Computing Inverse Radon transform involves the following steps:


    +   1. Obtain Radon transform R(ρ, θ) of the input image f(x, y).

    2. Back project the Radon transform data.'

    # ## 1.1 Definition of Image and Pixel


    This section begins with the definition of the digital image. An image is composed
    of small elements called pixels. The definition of the pixel is also discussed
    in this section.


    # ### 1.1.1 Image


    Image is a multidimensional function. It is represented as $f(x,y,z,\lambda)$.
    $f(x,y,z,\lambda)$ represents three-dimensional colour image, whereas $f(x,y,\lambda)$
    represents two-dimensional "colour image" and $f(x,y)$ represents the "grayscale
    image". If the image $f(x,y)$ takes only two values, either "0" or "1", it is
    called a "binary image". An image is a numerical representation of visual information.


    # ### 1.1.2 Pixel


    Pixel is the smallest unit in a digital image. Pixel stands for "Picture element".
    Each pixel is specified by a location and the value. The pixel''s value is termed
    the "gray level".'

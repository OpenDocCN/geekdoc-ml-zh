    # ## 9.11 Vector Quantization


    Quantization is a key element for data or image compression, and it is a lossy
    compression method. Generally, it can be seen as many-to-one mapping. That is
    set of values is represented by a finite set of symbols. Quantization techniques
    are useful to minimize the psychovisual redundancy in the image. For example,
    if the data values are between 0 and 0.5, it can be represented by the symbol
    of "0". From this symbol, the original value cannot be reconstructed, the result
    will be an approximate value. Hence, this method is a lossy compression approach.
    The quantization can be classified into scalar and vector quantization. In the
    scalar quantization, each input data sample is quantized individually, whereas
    in the vector quantization, the set of input data samples is grouped together
    to form a cluster and a unique symbol encodes this cluster. From this unique symbol,
    set of data samples can be decoded.


    The vector quantization is a block-based spatial domain approach, and it is used
    for the image coding. In the vector quantization, the input image is split into
    L-dimensional input vectors. In the vector quantization, code book plays a major
    role for the compression. The code book contains code vectors. The number of code
    vectors in the code book represents the size of the code book. The function of
    the encoder is to search for the code vector that best matches the input vector
    according to some distortion measure. The index of this code vector is then transmitted
    to the'
  - '[PAGE 660]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_660_0.png)


    **Fig. 9.55** Vector quantization process. **(a)** Encoder. **(b)** Decoder


    receiver. The received index is used to look up the code vector from the code
    book. The identified code vector is the replacement of input vector. The block
    diagram of the vector quantization encoder and the decoder is shown in Fig. 9.55.
    Code book design and searching strategies are the important process for the vector
    quantization approach. The commonly used code book generation method is Linde
    Buzo Gray (LBG) algorithm, which computes a code book with a locally minimum average
    distortion for a given training set and given code book size. Entropy-constrained
    vector quantization (ECVQ) extends the LBG algorithm for code book creation under
    an entropy constraint.



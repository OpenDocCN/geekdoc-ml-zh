    # ### 7.3.4 Adaptive Threshold


    Global threshold uses fixed threshold value for all the pixels in the image. Global
    threshold will not work properly if an image has different lighting conditions
    in different areas. In adaptive threshold, the input image is divided into regions
    or local neighbourhood. The threshold value is computed for each pixel based on
    the range of intensity values in its local neighbourhood. Thus, in adaptive thresholding,
    the threshold values are dynamically calculated for smaller regions of the image.
    Adaptive thresholding can be broadly classified as (1) Adaptive mean thresholding
    and (2) Adaptive Gaussian thresholding. In adaptive mean thresholding, the threshold
    value is computed by taking the mean of the pixel values in the window. In adaptive
    Gaussian thresholding, the threshold value is computed by taking the weighted
    sum of pixel values in the neighbourhood area where the weights are assigned using
    the Gaussian window technique.



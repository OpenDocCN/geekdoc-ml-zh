    # ## 9.10 Lossy DPCM


    Generally, image is a 2D matrix, which consists of pixels, the neighbouring pixels
    may be highly correlated. A high correlation implies that a pixel is predictable
    based on its neighbourhood pixels. Therefore, one can transmit or store the pixel
    differences rather than actual pixels. This difference value takes a lesser value
    than the actual pixel value. Therefore, it helps to achieve compression. The encoder
    transmits only the difference value instead of the actual pixel value, so a smaller
    number of bits are allocated for transmission or storage. This concept is called
    as predictive coding. The block diagram of lossy predictive coding is shown in
    Fig. 9.52.


    From Fig. 9.52, the input signal is $x[n]$ and $\hat{x}[n]$ is the predicted value,
    the difference is called as error signal, which is computed as


    $$e[n] = x[n] - \hat{x}[n] \qquad (9.24)$$


    The error signal $e[n]$ is passed through the quantizer, the quantized error signal
    is the encoder output, which is sent through channel to the decoder section.


    The predicted or estimated value of $x[n]$ is computed by


    $$\hat{x}[n] = f\{x[n-1], x[n-2], \cdots, x[n-N]\} \qquad (9.25)$$'

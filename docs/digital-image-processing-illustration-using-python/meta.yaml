    # **Experiment 4.30: Impact of Smoothing Filters**


    This experiment discusses the impact of various smoothing filters. Read an input
    image and add additive white Gaussian noise to the input image. Pass the noisy
    image to 5 × 5 and 11 × 11 smoothing filters. The objective of this experiment
    is to illustrate the fact that the low-pass filter characteristic of smoothing
    filters reduces high-frequency noise.


    The steps involved in this experiment are as follows:


    +   - Step 1: Reading the input image.

    - Step 2: Adding additive white Gaussian noise to the input image. The two parameters
    to be considered into account in additive white Gaussian noise are mean and variance.
    In this example, the mean value is chosen as 0 and variance is fixed as 1000.

    - Step 3: Pass the noisy image to the smoothing filter. The nature of kernel used
    in smoothing is box kernel. The kernel size chosen in this experiment are 5 ×
    5 and 11 × 11.'

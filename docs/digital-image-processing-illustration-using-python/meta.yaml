    include thresholding, edge-based segmentation, region-based approach, and cluster-based
    approach. Threshold segmentation is suitable for images where the target and background
    occupy different gray level ranges. This section discusses image segmentation
    using k-means clustering algorithm. Clustering is an unsupervised learning method.
    The purpose of clustering is to divide the data points into several categories.


    # ### 10.9.1 *k*-Means Clustering Algorithm


    The steps in k-means clustering algorithm are summarized below:


    +   **Step 1:** Initialize number of cluster "*k*" and centre.


    **Step 2:** For each pixel of an image, calculate the Euclidean distance "*d*"
    between the center and each pixel of an image using the formula


    $$d = p(x,y) - c_k$$


    (10.12)


    In the above expression, *p*(*x*, *y*) represents the pixels, *c*<sub>*k*</sub>
    represents the cluster centre.


    +   **Step 3:** Assign all the pixels to the nearest centre based on distance
    "*d*".


    **Step 4:** After all pixels have been assigned, recalculate the new position
    of the centre using the relation


    $$c_k = \frac{1}{k} \sum_{y \in c_k} \sum_{x \in c_k} p(x,y)$$


    (10.13)


    +   **Step 5:** Repeat the process until it satisfies the tolerance or error value.


    **Step 6:** Reshape the cluster pixels into image.


    # **Experiment 10.28: k-Means Clustering Algorithm for Colour Image Segmentation**


    In this experiment, the retinal image is read, and then it is passed through the
    k-means clustering algorithm. The k-means clustering algorithm is an iterative
    algorithm. The termination of the algorithm can be fixed either as the number
    of iterations or if the specified accuracy is reached. In this experiment, the
    number of iterations is specified as 100 and the accuracy is specified as 0.85.
    The number of clusters "k" varies as 2, 3, 4, and 5. The Python code that performs
    the task of image segmentation using k-means clustering is shown in Fig. 10.68,

    # ### 8.2.2 *Local Binary Pattern (LBP)*


    LBP is a texture-based feature, which is based on the signs of differences between
    neighbourhood pixels and centre pixel. The calculation of the LBP of a particular
    pixel is illustrated in Fig. 8.30. From this figure, it is possible to observe
    that the centre pixel is compared with the 8 neighbourhoods of it. If the centre
    pixel value is greater than or equal to neighbourhood pixel, then the output is
    assigned as 1; otherwise, the output is assigned to 0. For each 3 × 3 neighbourhood
    pixel, the output is an eight-bit binary code. This binary code can be considered
    as a binary pattern. This binary code is multiplied by the respective weight,
    which is shown in Fig. 8.30. Finally, it sums up all the values in the window
    after the respective weight is multiplied. The resultant value is the LBP value
    for the centre pixel. Any odd value can be chosen for the size of the neighbourhood
    window to avoid the centre pixel issue for the computation. The histogram will
    be constructed to determine the frequency values of binary patterns. Each pattern
    represents the possibility of a binary pattern found in the image. The number
    of histogram bins depends on the number of involved pixels in the LBP calculation.
    If LBP uses 8 pixels, the number of'

  md: '# ## 5.6 Non-local Mean Filter


    Non-local mean filter tends to minimize the impact of noise by making use of the
    redundancy in natural image. Redundancy exists because of repeated patterns. The
    non-local mean filter estimates the coefficients for averaging by comparing the
    similarity of patches of pixels. It is an attempt to identify the features to
    be preserved while eliminating the noise by averaging. To implement a non-local
    mean filter, weights to all other pixels must be computed at each pixel. The computational
    complexity of non-local mean filter is $O(DN^2)$, where "$N$" is the number of
    pixels in the image and "$D$" is the patch size. The computational complexity
    can be minimized by restricting the search to patches in a local neighbourhood.


    Let the search window around the pixel be represented by $\Omega_s$ for a given
    image $f(m, n)$, the filtered image $\hat{f}[m, n]$ is represented as


    $$\hat{f}(m,n) = \sum_{\forall k,l \in \Omega_s} w\big((m,n),(k,l)\big) \cdot
    f(k,l)$$


    (5.12)


    The weights $w(m,n)(k,l)$ is based on the similarity between the neighbourhoods
    $(N_{m,n})$ and $(N_{k,l})$ of pixels $(m, n)$ and $(k, l)$, where $N_p$ is a
    square sub-image window centred pixel $p$ with radius $R_p$. The weights are calculated
    using the formula


    $$w(m,n)(k,l) = \frac{K\big(N_{m,n} - N_{k,l2}/h\big)}{\sum_{\forall k,l \in \Omega_s}
    K\big(N_{m,n} - N_{k,l2}/h\big)}$$


    (5.13)


    where $K(\chi)$ is kernel function and "$h$" is exponential decay control.


    # ### Experiment 5.22: Non-local Mean Filter


    The built-in function "fastNlMeansDenoising()" available in computer vision library
    can be used to implement the non-local mean filter. The syntax of the built-in
    function is *cv2.fastNlMeansDenoising (''Input image'', ''Output image'', ''h'',
    template window size, search window size)*


    +   - *Input image*: Grayscale image

    - *Output image*: Grayscale image

    - *h*: Parameter regulating filter strength.

    - *template window size*: Size in pixels of the template patch that is used to
    compute weights.

    - *search window size*: Size in pixels of the window that is used to calculate
    the weighted average for a given pixel.


    In this experiment, the input image is read, and it is then corrupted with additive
    Gaussian noise with zero mean and standard deviation of 100. The noisy image is
    fed through non-local mean (NLM) filter. The template window size and the search
    window size of the NLM filter is fixed as 7 and 21, respectively, whereas the
    filter strength is varied as 10, 20, 40, and 80. The Python code that performs
    this task is shown in Fig. 5.45, and the corresponding output is shown in Fig.
    5.46.'

  md: "# ### 5.11.3 *Atmospheric Turbulence Blur*\n\nAtmospheric turbulence blur is\
    \ due to the turbulent atmosphere of the earth. Atmosphere is an unstable random\
    \ medium. Its temperature, pressure, density, and water vapour content are constantly\
    \ changing. When a light is propagated in the atmosphere, it is affected by molecular\
    \ absorption, scattering of aerosol, and turbulence disturbances. This leads to\
    \ change in the refractive index of a layer that distorts the image to be observed.\
    \ This affects the quality of the captured image. The mathematical model of atmospheric\
    \ turbulence blur is given as Gaussian function. The expression for the point\
    \ spread function of Gaussian blur with zero mean and variance $\\sigma^2$ is\
    \ given by\n\n$$h[m,n] = \\frac{1}{2\\pi\\sigma^2} e^{\\frac{-(m^2+n^2)}{2\\sigma^2}}$$\
    \ (5.23)\n\n# **Experiment 5.30: PSF of Gaussian Blur**\n\nThe Python code to\

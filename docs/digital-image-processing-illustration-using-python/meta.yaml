    # ### 8.4.1 Scale-Invariant Feature Transform (SIFT)


    SIFT extracts features that are based on detecting key points and extracting local
    feature descriptors. SIFT features are invariant to scale, orientation, and affine
    transformations and are widely used in computer vision tasks such as object recognition,
    image stitching, and 3D reconstruction.


    The steps followed to compute SIFT are as follows:


    **Step 1: Scale-space extrema detection.**


    The scale space of an image is a function *I(m, n, σ)*, which is produced by using
    Gaussian filtering at different scales of the input image. The scale space is
    separated into octaves, and the number of octaves and scale depends on the size
    of the original image. The size of the octave''s image is half the size of the
    previous image.


    The blurred octave images are used to find another set of images called the "Difference
    of Gaussian" (DoG). These DoG images are very useful for finding interesting key
    points in the image. The Difference of Gaussian blurring image is obtained from
    two different "σ" blurred images (σ and kσ). This process is done for different
    octaves of the image in the Gaussian pyramid.


    The interesting key points are computed based on the pixel, which is compared
    with its 8 neighbouring pixels, 9 pixels in the next scale, and 9 pixels in the
    previous scales. Here, 26 checks are made to decide whether a particular pixel
    is a key point. If the pixel is a local extrema, then it is a potential key point.


    **Step 2: Key point localization.**


    In the previous step, lots of key points are identified in an image. Some key
    points lie along an edge, or they do not have enough contrast. In these two cases,
    these key points are not useful as features. The low contrast points are removed
    based on the Taylor series expansion of scale space to get a more accurate location
    of extrema if the pixel value at this extrema is less than a threshold value.
    The Hessian (2 × 2) matrix is used to remove the key points that lie on the edges.


    **Step 3: Orientation assignment.**


    A neighbourhood is considered around the key point location, depending on the
    scale, gradient magnitude, and direction. An orientation histogram with 36 bins
    covering 360° is created. The highest peak in the histogram is taken, and any
    peak above 80% is also considered to calculate the orientation. It creates key
    points with the same location and scale but in different directions.


    **Step 4: Key point descriptor.**


    In the computation of the key point descriptor, a 16 × 16 window around the key
    point is considered. Furthermore, it is split into 16 subblocks with the size
    of 4 × 4. For each subblock, 8 bin histogram orientation is computed. Therefore,
    a total of 128 bin values (4 × 4 × 8) are represented as a feature vector to form
    a key point descriptor. Lastly, to compute the rotation and illumination invariant
    key points, the key point''s rotation is subtracted from each orientation. The
    normalized key points greater than 0.2 give the illumination invariant key points.


    **Step 5: Key point matching.**'

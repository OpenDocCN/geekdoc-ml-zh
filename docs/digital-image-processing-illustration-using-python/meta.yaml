- img_proc: true
  md: '![](img/f88e6a966edb922bd0b2ae87662c6c4b_400_0.png)


    **Fig. 6.2** Morphological operation using structuring element


    If the pixels in the structuring element do not fit with the pixels in the input
    image, it will not create a new image (i.e. there is no impact of the morphological
    operation on the image). Therefore, a morphological operation on a binary image
    creates a new binary image in which the pixel has a non-zero value only if the
    operation is successful at that location in the input image.


    # ## 6.2 Structuring Element


    The structuring element is a small binary image that takes the value as either
    0s or 1s. The matrix dimension specifies the size of the structuring element.
    The pattern of 1s and 0s represents the shape of the structuring element. The
    origin of the structuring element is usually one of its pixels, although generally,
    the origin can be outside the structuring element. In general, the centre of the
    element in the structuring element acts as an origin for the odd dimensions of
    the structuring elements. The structuring elements play an important role in morphological
    image processing, which is the same role as convolution kernels in linear image
    filtering. When a structuring element is placed on a binary image, each of its
    pixels is associated with the corresponding pixel of the neighbourhood under the
    structuring element. The structuring element is said to fit the image if the value
    1 of the structuring element exactly fits into the value of 1 in the image. Similarly,
    a structuring element is said to hit or intersect an image if, at least for one
    of its pixels set to 1, the corresponding image pixel is also 1. Zero-valued pixels
    of the structuring element are ignored, where the corresponding image value is
    irrelevant.'

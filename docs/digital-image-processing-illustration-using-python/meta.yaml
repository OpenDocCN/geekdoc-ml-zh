    # ## Answers to PreLab Questions


    +   1. The objective of the image compression is to reduce irrelevant and redundant
    information in an image data to store and transmit it effectively. Image compression
    algorithm minimize the number of bits to represent the image data.

    2. The image compression scheme is classified into lossless and lossy compression
    scheme. In the lossless compression scheme, the original image can be reconstructed
    from its compressed file without any loss of information, whereas the lossy compression
    scheme cannot reconstruct the original image from its compressed file without
    the loss of information. In this scheme there will be deviation between the original
    and reconstructed image. However, these deviations may not be noticed by the human
    eye.

    3. Examples of lossless coding are Run length coding, Huffman coding, arithmetic
    coding, dictionary-based coding, DPCM without quantizer, etc.

    4. The examples of lossy image compression algorithms are transform coding, lossy
    DPCM, wavelet based compression, scalar quantization, vector quantization, SVD
    based image compression, fractal based image compression, etc.

    5. The spatial redundancy exploits the similarity across the different pixels
    of an image. It is also called as interpixel redundancy. The spatial redundancy
    can be removed by the image transform.

    6. The spectral redundancy exploits the correlation between the different colour
    planes like (R, G, B) or colour bands. Colour conversion approaches like, RGB
    to YUV, RGB to YCbCr, RGB to HSI, RGB to HSV, etc., minimizes the spectral redundancy
    in the color image.

    7. Certain information in an image or data has less relative importance than other
    information in a normal human visual system. This information is said to be psychovisual
    redundant. The less relative information in the image will not affect the human
    perception of the image. Thus, the less relative information can be eliminated
    by using vector quantization scheme.

    8. Coding redundancy normally is present in any natural binary encoding of the
    gray levels in an image. It can be eliminated by coding the gray level as having
    a higher probability with the shortest code word and the gray level as having
    the least probability with a lengthier code word.'
  - '[PAGE 685]


    +   9. Entropy is a measure, which gives the average number of bits needed to
    code the symbol in the source. The entropy can be measured by using


    $$H = -\sum_{i=1}^{N} p_i \log_2(p_i) \text{ bits/symbol}$$


    It gives a fundamental limit on the amount of data compression that can be achieved
    for the input image data.


    +   10. The lossless compression algorithm''s reconstructed image always has good
    quality. Hence, the performance of the lossless compression algorithm is measured
    by the compression ratio and compression factor.


    +   11. The lossy image compression algorithm always compromises the quality of
    the image to achieve high compression. Therefore, PSNR, MSE, MSSIM, compression
    ratio, and compression factor can be used to evaluate the performance of the lossy
    compression algorithms.


    +   12. The JPEG standard is widely used for image compression; DCT is used as
    a transform in this standard and the input image is split by 8 × 8 or 16 × 16
    sub-blocks, and DCT, quantization, zig-zag scan and entropy coding in the encoder
    block process each subblock. The reverse process like entropy decoder, inverse
    quantization and IDCT is used in the decoder block to decompress the original
    image from the compressed file.


    +   13. Fractal image compression is a lossy compression scheme based on fractals.
    Fractals are complex objects which has property of self-similarity. That is, a
    small section of fractal object is similar to whole object, hence fractal is the
    repetition of the same structural form. Fractal image compression can be achieved
    based on affine contractive transforms, which utilize the existence of self-symmetry
    in the image.



  md: '# ## 10.7 Colour Image Filtering: Median Filter


    Digital images are corrupted by noise during acquisition, storage, processing,
    and transmission. Different types of noises in digital images include additive
    white Gaussian noise, speckle noise, which is multiplicative in nature, impulse
    noise, and periodic noise. This section discusses the minimization of impact of
    impulse noise in colour image. Impulse noise appears as isolated bright or dark
    pixels in the image. It is due to random bit errors during transmission. Median
    filter is effective in minimizing the impact of salt and pepper noise. The principle
    of median filter is to replace the gray level of each pixel by the median of the
    gray levels in a neighbourhood of the pixels.


    # ### Experiment 10.24: Median Filtering of Colour Image


    This experiment discusses the median filtering of colour image. Read a colour
    image, and add salt and pepper noise to the colour image. Pass the noisy image
    through a median filter whose kernel size is varied as 3, 7, 9, and 11. The Python
    code, which performs the task of adding salt and pepper noise to the colour image
    and filtering it using a median filter of different kernel sizes, is shown in
    Fig. 10.59, and the corresponding outputs are shown in Fig. 10.60.


    # ### Inferences


    +   - From Fig. 10.60, it is possible to observe that the impact of salt and pepper
    noise is minimized by increasing the size of the kernel of median filter.

    - The 11 × 11 kernel minimizes the impact of salt and pepper noise than 3 × 3
    kernel.'

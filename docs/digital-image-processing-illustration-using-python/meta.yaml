    | 3 | Region-based segmentation | (1) Region growing<br>(2) Region splitting<br>(3)
    Split and merge technique<br>(4) Watershed algorithm |

    | 4 | Clustering-based segmentation | (1) K-means clustering<br>(2) Mean shift
    algorithm |

    | 5 | Active contour-based segmentation | (1) Snake algorithm<br>(2) Gradient
    vector flow<br>(3) Geodesic active contour |

    | 6 | Graph-based algorithm for image segmentation | (1) Spectral clustering<br>(2)
    Normalized cut<br>(3) Minimum cut |

    | 7 | Artificial intelligence-based segmentation | (1) Neural network<br>(2) Fuzzy
    logic<br>(3) Evolutionary computation |


    +   3. An isotropic operator is an operator that has no bias to any particular
    direction in an image. Laplacian is a second-order derivative filter that is used
    to find edges in an image. Laplacian operator is isotropic because the response
    of the operator is independent of the direction of discontinuities in the image.


    | S. No. | Canny edge detector | Laplacian-of-Gaussian edge detector |

    |--------|---------------------|-------------------------------------|

    | 1 | Canny edge detector is anisotropic | LoG edge detector is isotropic |

    | 2 | Canny is a first derivative operator | LoG is a second derivative operator

    # ### 3.2.3 *Scaling Property of Fourier Transform*


    If *F*[*k*, *l*] represents the spectrum of the image *f*[*m*, *n*], then the
    scaled version of the signal *f*[*am*, *bn*] has the following Fourier transform:


    $$\text{2D\_DFT}\left\{f[am,bn]\right\} = \frac{1}{|ab|}F\left[\frac{k}{a}, \frac{l}{b}\right]$$
    (3.14)


    Equation (3.14) can be interpreted as "Compression in spatial domain is equivalent
    to expansion in frequency domain and vice versa".


    # **Experiment 3.10: Fourier Transform of Gaussian Function**


    Scaling property can be illustrated by taking Fourier transform of a two-dimensional
    Gaussian function. The Python code that obtains the spectrum of 2D-Gaussian function
    is discussed as follows.


    The general expression for Gaussian function is


    $$f[m,n] = \frac{1}{2\pi\sigma_m\sigma_n}e^{-\frac{(m-\mu_m)^2}{2\sigma_m^2}}e^{-\frac{(n-\mu_n)^2}{2\sigma_n^2}}$$
    (3.15)


    The above expression can be written as


    $$f[m,n] = \frac{1}{2\pi\sigma_m\sigma_n}e^{-\left(\frac{(m-\mu_m)^2}{2\sigma_m^2}
    + \frac{(n-\mu_n)^2}{2\sigma_n^2}\right)}$$ (3.16)


    If $\mu_m = \mu_n = 0$ and $\sigma_m = \sigma_n = \sigma$, the above expression
    can be written as


    $$f[m,n] = \frac{1}{2\pi\sigma^2}e^{-\left(\frac{(m)^2}{2\sigma^2} + \frac{(n)^2}{2\sigma^2}\right)}$$
    (3.17)


    The above equation can be simplified as


    $$f[m,n] = \frac{1}{2\pi\sigma^2}e^{-\left(\frac{m^2+n^2}{2\sigma^2}\right)}$$
    (3.18)


    The objective of this experiment is to obtain the spectrum of the 2D Gaussian
    function for two different values of standard deviations. The values chosen are
    $\sigma = 2$ and $\sigma = 20$, respectively. That is, two Gaussian functions
    with different values of'

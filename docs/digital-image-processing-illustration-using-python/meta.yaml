  md: 'where $\lambda$ is the regularization parameter, which controls the smoothness
    of the output signal. If the noise content is large, then $\lambda$ value will
    be chosen as large.


    # ### Total Variation Denoising Algorithm


    The main objective function of the total variation denoising algorithm is given
    by


    $$J(x) = y - x_2^2 + \lambda Dx_1$$


    where $D$ is the $M \times N$ matrix, and the optimal value of the objective function
    is defined as


    $$J^*(x) = \min_x y - x_2^2 + \lambda Dx_1 \qquad (5.46)$$


    The objective function in Eq. (5.46) is a minimization function and is complicated
    because differentiation of $l_1$ norm is not possible. Hence, the dual formulation
    method can minimize the objective function $J(x)$.


    Let us consider the absolute value of a signal "$x$" is a scalar for deriving
    the dual formulation, which is written as


    $$|x| = \max_{|z| \leq 1} zx \qquad (5.47)$$


    Equation (5.47) is a circuitous form and its advantage is that the non-differentiability
    of the function is converted to the feasible set. Hence, Eq. (5.47) can be written
    as


    $$x_1 = \max_{|z| \leq 1} z^T x \qquad (5.48)$$


    where the condition $|z| \leq 1$ is considered as element wise. Similarly,


    $$Dx_1 = \max_{|z| \leq 1} z^T Dx \qquad (5.49)$$


    Substituting Eq. (5.49) in the Eq. (5.45), we get


    $$J(x) = y - x_2^2 + \lambda \max_{|z| \leq 1} z^T Dx \qquad (5.50)$$


    The above equation can be rewritten as


    $$J(x) = \max_{|z| \leq 1} y - x_2^2 + \lambda z^T Dx \qquad (5.51)$$


    The optimal value of the objective function can be written as


    $$J^*(x) = \min_x \max_{|z| \leq 1} y - x_2^2 + \lambda z^T Dx \qquad (5.52)$$'
  merge: -1
  pgno: 388
- img_proc: true
  md: 'To obtain the minimizing vector "x", it has to be obtained both "x" and auxiliary
    vector "z". The function of the vector (x, z) in Eq. (5.52) is defined as


    $$F(x,z) = y - x_2^2 + \lambda z^T Dx$$ (5.53)


    Substituting Eq. (5.53) in Eq. (5.52), we get


    $$J^*(x) = \min_x \max_{|z| \leq 1} F(x,z)$$ (5.54)


    The function (F(x, z)) is convex in "x" and concave in "z", the optimal value
    J*(x) is a saddle point of F(x, z). Using min-max property, Eq. (5.54) can be
    rewritten as


    $$J^*(x) = \max_{|z| \leq 1} \min_x F(x,z)$$ (5.55)


    Now, substituting Eq. (5.53) in Eq. (5.55), we get


    $$J^*(x) = \max_{|z| \leq 1} \min_x y - x_2^2 + \lambda z^T Dx$$ (5.56)


    Equation (5.56) denotes the dual formulation of the total variation denoising
    problem. To obtain the optimal value J*(x), taking the partial derivative of Eq.
    (5.56) with respect to "x" and equating the result to zero, we get


    $$\frac{\partial J(x)}{\partial x} = -2(y-x) + \lambda D^T z = 0$$


    Simplifying the above equation, we get


    $$(y-x) = \frac{\lambda D^T z}{2}$$ (5.57)


    and


    $$x = y - \frac{\lambda D^T z}{2}$$ (5.58)


    Substituting Eqs. (5.57) and (5.58) in Eq. (5.56), we get


    $$J^*(x) = \max_{|z| \leq 1} \frac{\lambda D^T z^2}{2} + \lambda z^T D\left(y
    - \frac{\lambda D^T z}{2}\right)$$


    Simplifying the above equation, we get


    $$J^*(x) = \max_{|z| \leq 1} -\frac{\lambda^2}{4} z^T DD^T z + \lambda z^T Dy$$
    (5.59)'

    # 6.6 Top-Hat Transform


    The top-hat transform is morphological operation in digital image processing,
    which is used to extract the small elements and details in the given input images.
    Top-hat transform is defined by some kernel as the difference between the input
    image and its opening result. The top-hat transform is mathematically represented
    as


    $$\text{Top\_hat}(X) = X - (X \circ B)$$

    (6.19)


    where "X" is the input image, "B" denotes the structuring element or kernel, and
    "∘" represents the opening operation.



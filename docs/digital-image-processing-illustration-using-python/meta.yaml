    Simplifying the above expression, we get


    $$\frac{\partial f(x,y)}{\partial x} = \left(-\frac{x}{\sigma^2}\right)e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}
    \qquad (7.8)$$


    Taking partial derivative of the above expression with respect to "x", we get


    $$\frac{\partial^2 f(x,y)}{\partial x^2} = \frac{e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}}{\sigma^2}\left(\frac{x^2}{\sigma^2}-1\right)
    \qquad (7.9)$$


    Similarly, taking second-order partial derivative of the Gaussian function with
    respect to the variable "y", we get


    $$\frac{\partial^2 f(x,y)}{\partial y^2} = \frac{e^{-\left(\frac{x^2+y^2}{2\sigma^2}\right)}}{\sigma^2}\left(\frac{y^2}{\sigma^2}-1\right)
    \qquad (7.10)$$'

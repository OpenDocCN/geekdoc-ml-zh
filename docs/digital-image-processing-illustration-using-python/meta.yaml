    # ### 11.6.4 *GoogleNet*


    GoogleNet, also called Inception-v1, is a convolutional neural network architecture
    created by Google specifically for image classification tasks. It was unveiled
    in 2014 and achieved notable success by winning the ImageNet Large Scale Visual
    Recognition Challenge (ILSVRC) 2014, attaining a top-5 error rate of 6.67%, which
    marked a substantial improvement over the prior year''s winner. The overall architecture
    of GoogleNet is shown in Fig. 11.67. The GoogleNet architecture is composed of
    22 layers, which include convolutional layers, pooling layers, Inception modules,
    fully connected layers, and softmax layers. It takes a 224 × 224 × 3 RGB image
    as input and produces a probability distribution across 1000 classes as output.
    The main contribution of GoogleNet was the development of the Inception module,
    which allows for the efficient use of network depth and width, leading to improved
    accuracy with fewer parameters and reduced computational cost. Inception module
    of GoogleNet is displayed in Fig. 11.68.


    Summary of the GoogleNet architecture is as follows:


    +   - **Input Layer:** The input network receives a 224 × 224 × 3 RGB image.

    - **Convolutional Layer:** The first layer applies convolution with 64 filters
    of size 7 × 7 and a stride of 2, focusing on local feature extraction from the
    input image.

    - **Max Pooling Layer:** The output from the initial convolutional layer is processed
    through a max pooling layer with a 3 × 3 filter size and a stride of 2, reducing
    the spatial dimensions and providing translation invariance.


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_816_0.png)


    **Fig. 11.67** GoogleNet architecture'
  - '[PAGE 817]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_817_0.png)


    **Fig. 11.68** Inception size-reduction module


    **Local Response Normalization Layer:** This layer normalizes the responses of
    neighbouring neurons to help prevent overfitting.


    **Convolutional Layer:** The output is then passed through another convolutional
    layer that utilizes 64 filters of size 1 × 1, effectively reducing dimensionality.


    **Convolutional Layer:** The next step involves another convolutional layer with
    192 filters of size 3 × 3.


    **Max Pooling Layer:** Following this, the output undergoes another max pooling
    operation with a 3 × 3 filter size and a stride of 2.


    **Inception Modules:** The result is then processed through a series of nine inception
    modules, where multiple branches of convolutional and pooling layers with varying
    filter sizes are concatenated before moving to the subsequent layer. This setup
    leverages the network''s depth and width efficiently.


    **Auxiliary Classifiers:** Three intermediate layers incorporate auxiliary classifiers
    to facilitate the learning of discriminative features and reduce overfitting.
    Each consists of a global average pooling layer, a fully connected layer, a softmax
    layer, and a cross-entropy loss layer.


    **Average Pooling Layer:** The output from the last Inception module proceeds
    to an average pooling layer with a 7 × 7 filter size and a stride of 1, which
    calculates the average value for each feature map, yielding a single scalar per
    map.


    **Dropout Layer:** The output is then passed through a dropout layer that randomly
    omits some neurons to help prevent overfitting.


    **Fully Connected Layer:** The dropout layer''s output is flattened and transmitted
    through a fully connected layer with 1000 neurons, corresponding to each class
    in the dataset.


    **Softmax Layer:** The output here goes into a softmax layer, which calculates
    the probability distribution over the 1000 classes.


    **Output Layer:** The final layer produces the predicted class label based on
    the highest probability from the softmax outcomes.'

    # ### 8.5.3 Gabor Feature


    The Gabor feature extraction process starts with the 2D Gabor filter being applied
    to the input image. The Gabor filter is a combination of the "Gaussian filter"
    and a "sinusoidal term". The process of the Gabor filter is guided by Gabor''s
    uncertainty principle, which states that the product of frequency and time resolution
    must be greater than a constant. This principle helps in the selection of orientation
    and frequencies in a better way. The Gabor filter is mathematically defined as


    ```

    $$G(x, y; \lambda, \theta, \psi, \sigma, \gamma) = e^{\left(-\frac{x''^2+\gamma^2
    y''^2}{2\sigma^2}\right)} e^{\left(j\left(2\pi\frac{x''}{\lambda}+\psi\right)\right)}$$


    (8.44)

    ```


    where x'' = x cos θ + y sin θ, y'' = − x sin θ + y cos θ. λ represents the wavelength
    of the sinusoidal factor, θ denotes the orientation, ψ represents phase offset,
    σ denotes the standard deviation of the Gaussian function, γ represents the aspect
    ratio of the spatial coordinates, and (x, y) is the spatial coordinates of the
    Gabor filter.



    # ### 6.11.9 Boundary Extraction


    This section discusses the boundary extraction of region of interest using basic
    morphological operations. Here, dilation and erosion operations are used to extract
    the boundary of the object or region of interest.


    # ### Internal Boundary Extraction


    The internal boundary of the object is obtained by erosion operation and it is
    also called as internal gradient or half gradient by erosion. The mathematical
    expression for the internal gradient of the object is obtained as


    ```

    Internal Gradient (ρ_B^-)(X) = X - {X ⊖ B}  (6.45)

    ```


    where *B* is the structuring element and *X* is the input image. The internal
    gradient is obtained by taking difference between input image and its eroded version.
    The internal gradient enhances the internal boundary of the object brighter than
    its background and the external boundaries of the object darker than the object.


    # ### External Boundary Extraction


    The external boundary of the object can be obtained by using dilation operation,
    and it is termed as external gradient or half gradient by dilation. It can be
    obtained by taking the difference between the dilated version of the input image
    and the original input image. The mathematical expression for the external gradient
    of the object is written as


    ```

    External Gradient (ρ_B^+)(X) = {X ⊕ B} - X  (6.46)

    ```


    The external gradient enhances the internal boundary of the objects darker than
    their background and external boundary of the objects brighter than their background.


    # ### Experiment 6.31: Boundary Extraction of an Object


    The aim of this experiment is to obtain the internal and external boundary of
    the object using erosion and dilation operations. The Python code to extract the
    internal and external boundaries of an object is given in Fig. 6.66, and its simulation
    result is depicted in Fig. 6.67.


    # ### Inferences


    From this experiment, the following inferences can be observed:'

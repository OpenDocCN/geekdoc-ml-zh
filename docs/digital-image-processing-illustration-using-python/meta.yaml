    training data. **(b)** Visualization of testing data. **(c)** Confusion matrix


    Using the naïve conditional independence assumption that


    $$P(y, x_1, x_2, \cdots, x_n) = P(y) \text{ for all } i$$ (11.12)


    The above equation can be simplified as


    $$P(x_1, x_2, \cdots, x_n) = \frac{P(y) \prod_{i=1}^{n} P(y)}{P(x_1, x_2, \cdots,
    x_n)}$$ (11.13)


    Since $P(x_1, x_2, \cdots, x_n)$ is constant given the input vector, the classification
    rule can be written as


    $$P(x_1, x_2, \cdots, x_n) \propto P(y) \prod_{i=1}^{n} P(y)$$ (11.14)


    The final predicted class output can be obtained by using


    $$\hat{y} = \arg P(y) \prod_{i=1}^{n} P(y)$$ (11.15)'

    # ## 5.2 Noises in Digital Image


    Image noise is a random variation in the intensity values of the pixels. Noise
    occurs in digital image during acquisition, transmission, and processing. Different
    types of noises in digital images include (1) Gaussian noise, (2) impulse noise,
    (3) speckle noise, and (4) periodic noise. The classification of noise in digital
    images is given in Fig. 5.2.


    # ### 5.2.1 *Gaussian Noise*


    Common factors of Gaussian noise include amplifier noise, shot noise, and grain
    noise of film. The probability density function of Gaussian distribution is given
    by


    ```

    $$f(x) = \frac{1}{\sqrt{2\pi}\sigma} e^{-\frac{(x-\mu)^2}{2\sigma^2}}, x \geq
    0 \tag{5.1}$$

    ```


    The Gaussian noise is characterized by mean "*μ*" and standard deviation "*σ*".



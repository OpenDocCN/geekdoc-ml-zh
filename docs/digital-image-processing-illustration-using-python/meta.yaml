  md: '# Experiment 7.5: Robert Edge Detection


    The aim of this experiment is to implement Robert edge detection approach in a
    Python environment. The Python code that performs edge detection using the Robert
    operator is given in Fig. 7.14, and the corresponding output is shown in Fig.
    7.15. The steps followed in Robert edge detection are as follows:


    +   Step 1: Generation of test image. The test image is black-and-white, which
    has a sharp transition from black to white. This implies that the test image exhibits
    edges along the x and y-directions.


    +   Step 2: Computing the gradient of the input image along x and y directions
    using Robert operator.


    +   Step 3: Computing the Magnitude of the edge.


    +   Step 4: Computing the Direction of the edge.


    +   Step 5: Displaying the results.


    # Inferences


    +   The gradient along *the* x-direction detects the change in intensity of the
    image along *the* x-direction.


    ```

    # Robert Edge Detection

    import numpy as np

    import matplotlib.pyplot as plt

    import cv2

    #Step 1: Generation of test image

    img=np.zeros([256,256])

    img[78:178,78:178]=255

    rows,cols=img.shape

    M = cv2.getRotationMatrix2D((cols/2,rows/2),-45,1)

    img_input = cv2.warpAffine(img,M,(cols,rows))

    #Step2: Defining the Robert mask

    gx=np.array([[1,0],[0,-1]])

    gy=np.array([[0,1],[-1,0]])

    #Step 3: Determining the gradient along x and y direction

    Gx=cv2.filter2D(img_input,-1,gx)

    Gy=cv2.filter2D(img_input,-1,gy)

    #Step 4: Determining the magnitude and direction

    magnitude=np.sqrt(np.square(Gx)+np.square(Gy))

    direction=np.arctan2(Gy,Gx)/(180*np.pi)

    #Step 5: Displaying the results

    plt.figure(figsize=(8,6)),plt.subplot(2,3,1),plt.imshow(img_input,cmap=''gray'')

    plt.title(''Input image''),plt.xticks([]),plt.yticks([]),plt.subplot(2,3,2),

    plt.imshow(Gx,cmap=''gray''),plt.title(''Gradient along x-direction''),plt.xticks([]),


    # ## 1.5 Image File Format


    Image file formats provide a standardized method of organizing and storing image
    data. Standardization helps to share the images in different systems. Different
    types of file formats include (1) tagged image file format (TIFF), (2) portable
    network graphics (PNG), (3) joint photographic expert group (JPEG), and (4) bitmap
    file format (BMP). Each file format offers different levels of quality, performance,
    and scalability. The choice of image file format will depend on the intended use
    of the image, balance between file size and image quality, and the type of image
    being stored.


    # ### 1.5.1 *Tagged Image File Format*


    Tagged image file format has either ".tif" or ".tiff" extension. Tiff file format
    was originally created for storing scanned photos. TIFF is used as a lossless
    image storage format that uses no compression at all.'

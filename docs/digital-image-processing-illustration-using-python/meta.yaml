  md: '+   3. The basic morphological operations are (1) dilation and (2) erosion.
    Dilation is a process in which the binary image is expanded from its shape. The
    expansion of the output image is decided by the size of the structuring element.
    Erosion is the counter process of dilation; it shrinks the input image (i.e. the
    number of ones in the output binary image is always lesser than a number of ones
    in the input binary image). These two operations are used for the other morphological
    operations such as opening, closing, boundary extraction, and so on.


    | S. No. | Closing | Opening |

    |--------|---------|---------|

    | 1. | Dilation followed by erosion operation | Erosion followed by dilation operation
    |

    | 2. | It fills the small holes and gaps in a single pixel object | It smooths
    the inside of the object contour, breaks narrow strips, and eliminates thin portions
    in the image |

    | 3. | It protects coarse structures, closes small gaps, and rounds off concave
    corners | It is used to remove noise in the image |


    +   4. The dilation and erosion operations can be used to extract the boundary
    of the object. The following equations can be used for the boundary extraction:


    Boundary $(X) = (X \oplus B) - X$


    Boundary $(X) = X - (X \Theta B)$


    The dilated output is subtracted by the original input image, providing the boundary
    output. Similarly, the original input image is subtracted by the eroded output,
    resulting in boundary output.


    +   5. The operation applies more than once, and it does not affect or change
    the output. That operation is an idempotent operation. The opening and closing
    operations are idempotent operations, which do not change the output applied more
    than once.


    +   6. The hit-or-miss transform (HMT) is a morphological algorithm that can be
    used to look for particular patterns of foreground and background pixels in an
    image. The HMT is used for the template matching applications. For example, any
    missing parts in the PCB can be identified by the HMT using proper structuring
    element.


    +   7. Top-hat transform is defined as the difference between input image and
    its opening output or the difference between closing output and the input image.
    The first one is called the white top-hat transform, and the second one is the
    black top-hat transform. This can be used to enhance the very thin details in
    an input image.


    +   8. Thinning operation is a morphological operation, which reduces the foreground

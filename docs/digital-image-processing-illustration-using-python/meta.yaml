    # ### 6.11.10 Thick Gradients


    The morphological gradient is termed as thick gradient when the size of the structuring
    element is greater than 1. Thick gradient of an image is computed by dilation
    and erosion operations, which is expressed as


    $$\text{Thick Gradient}\left(X_{nB}\right)=\{X \oplus nB\}-\{X \Theta nB\}$$ (6.47)'

    # ### 1.7.3 *Reconstruction of the Image*


    If the sampling frequencies along the "x" and "y" directions are chosen in such
    a way that $\omega_{xs} > 2\omega_{10}$ and $\omega_{ys} > 2\omega_{20}$, then
    it is possible to recover $F(\omega_1, \omega_2)$ from $F_s(\omega_1, \omega_2)$
    using 2D ideal low-pass filter whose frequency response is given by


    ```

    $$H(\omega_1, \omega_2) = \begin{cases} \Delta x \Delta y, & \omega_1, \omega_2
    \in R, \ 0, & \text{otherwise}. \end{cases}$$ (1.9)

    ```


    The spectrum of the reconstructed image is given by


    ```

    $$\hat{F}(\omega_1, \omega_2) = H(\omega_1, \omega_2) F_s(\omega_1, \omega_2)$$
    (1.10)

    ```


    A typical choice of "$R$" is a rectangular region for which the impulse response
    is a "sinc" function, which is given by


    ```

    $$h(x,y) = sinc(x\omega_{xs}) sinc(y\omega_{ys})$$ (1.11)

    ```'
  - '[PAGE 57]


    We know that convolution in the spatial domain is equivalent to multiplication
    in the frequency domain and vice versa. Using this idea, Eq. (1.10) can be expressed
    as


    $$\hat{f}(x,y) = h(x,y) * f_s(x,y)$$ (1.12)


    In the above equation, "*" represents two-dimensional convolution. Equation (1.12)
    can be expressed as


    $$\hat{f}(x,y) = \sum_{m=-\infty}^{\infty} \sum_{n=-\infty}^{\infty} f(m\Delta
    x, n\Delta y) \text{ sinc}\left(\omega_{xs}(x-m\Delta x)\right) \text{ sinc}\left(\omega_{ys}(y-n\Delta
    y)\right)$$ (1.13)


    # ### 1.7.4 Aliasing Problem


    *Case (i): Sampling Frequency ($\omega_{xs} < 2\omega_{10}$)*


    If the sampling frequency $\omega_{xs} < 2\omega_{10}$, then spectral overlapping
    occurs along $\omega_1$ axis, which results in aliasing. This is illustrated in
    Fig. 1.48.


    *Case (ii): Sampling Frequency ($\omega_{ys} < 2\omega_{20}$)*


    If the sampling frequency $\omega_{ys} < 2\omega_{20}$, then spectral overlapping
    occurs along $\omega_2$ axis, which results in aliasing. This is illustrated in
    Fig. 1.49.


    *Case (iii): Sampling Frequency ($\omega_{xs} < 2\omega_{10}$ and $\omega_{ys}
    < 2\omega_{20}$)*


    If the sampling frequency $\omega_{xs} < 2\omega_{10}$ and $\omega_{ys} < 2\omega_{20}$,
    then spectral overlapping occurs along $\omega_1$ and $\omega_2$ axes, which results
    in aliasing. This is illustrated in Fig. 1.50.


    # **Experiment 1.25: Image Sampling**


    In this experiment, a sinusoidal grating pattern with horizontal frequency $fx
    = 4$ Hz and $fy = 5$ Hz is generated. This image is sampled at four different
    sampling frequencies, namely, 10 Hz, 20 Hz, 50 Hz, and 100 Hz. The Python code
    that performs this task is shown in Fig. 1.51. The original and the reconstructed
    image are shown in Fig. 1.52.


    # **Inferences**


    From Fig. 1.52, it is possible to observe the following:


    +   - The input signal is a sinusoidal grating pattern. The frequencies along
    $x$ and $y$ directions are different.

    - The input image is sampled at four different sampling frequencies.

    - When the sampling frequency is less, the reconstructed image differs from the
    original image. This is termed as "aliasing".

    - With increasing sampling frequency, the reconstructed image resembles the original
    image. This means there is no aliasing.'

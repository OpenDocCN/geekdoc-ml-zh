    # ## Colour Moments


    Colour moments are measures that can be used to differentiate images based on
    their colour features. These colour moments provide a measurement for colour similarity
    between images. These colour moments can be used for image retrieval applications.
    The colour moments are mean, standard deviation, and skewness. A colour pixel
    can be defined by 3 or more values. Let us consider the RGB colour image, which
    contains three colour channels. For each colour channel, three colour moments,
    therefore a total of nine colour moments for the colour image.


    # ### Moment 1 (Mean)


    The p<sup>th</sup> channel colour moment mean is computed as


    ```

    $$CM_p = \frac{1}{MN} \sum_{i=0}^{M-1} \sum_{j=0}^{N-1} X_p(i,j)$$ (8.5)

    ```


    where CM<sub>p</sub> represents the average value of the p<sup>th</sup> channel.
    MN denotes the size of the image, X<sub>p</sub> represents the p<sup>th</sup>
    channel of colour image X.


    # ### Moment 2 (Standard Deviation (Std))


    The p<sup>th</sup> channel colour moment (standard deviation (std)) is calculated
    as


    ```

    $$C\sigma_p = \sqrt{\frac{1}{MN} \sum_{i=0}^{M-1} \sum_{j=0}^{N-1} \left(X_p(i,j)
    - CM_p\right)^2}$$ (8.6)

    ```'

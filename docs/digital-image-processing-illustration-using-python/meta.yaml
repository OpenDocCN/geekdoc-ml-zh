    $$(x-a)^2 + (y-b)^2 = r^2 \tag{3.46}$$


    In Eq. (3.46), "$a$" and "$b$" represent the centre of the circle and "$r$" represents
    the radius of the circle. The equation of the circle in the parameter plane is
    given by


    $$x = a + r\cos(\theta) \tag{3.47}$$


    $$y = b + r\sin(\theta) \tag{3.48}$$


    The circle detection problem is reduced to a triplet ($a$, $b$, and $r$) search
    problem. The angle ($\theta$) sweeps through the full 360° range of the points
    ($x$, $y$).


    The pseudo-code for circle detection using Hough transform is given as follows:


    +   - Initialize the accumulator ($H[a, b, r]$) to all zeros.

    - Find the edge image using any edge detector.

    - For $r = 0$ to diagonal image length.

    - For each edge pixel ($x$, $y$) in the image.

    - For $\theta = 0$ to 360°.

    - $a = x - r*\cos \theta$,

    - $b = y - r*\sin \theta$,

    - $H[a, b, r] = H[a, b, r] + 1$.

    - Find the $[a, b, r]$ value(s), where $H[a, b, r]$ is above a suitable threshold
    value.



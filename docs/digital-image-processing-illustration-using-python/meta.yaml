  md: '# ### 11.6.1 Feedforward Neural Networks


    The feedforward neural network is the core of many other neural networks, such
    as convolution neural networks, RNN, etc. The process of getting an input to produce
    some output to make some kind of prediction is known as "feed forward". The feedforward
    neural network has no feedback loops or connections in the network architecture.
    It has an input layer, hidden layers, and an output layer. The important terminologies
    of Neural Network are as follows:


    +   - **Activation Functions:** Activation functions are used to introduce the
    non-linearity into the network, enabling it to learn and model complex data patterns.
    The commonly used activation functions are sigmoid, tanh, ReLU, and Leaky ReLU.

    - **Training Process:** Training a feedforward neural network involves adjusting
    the weights of the neurons to minimize the error between the predicted output
    and the true output. This process is typically performed using backpropagation
    and gradient descent approaches. The training phase of FNN consists of forward
    propagation, loss calculation, backpropagation, and weight optimization.

    - **Forward Propagation:** The input data passes through the network, and output
    is calculated during the forward propagation process.

    - **Loss Calculation:** The loss or error is calculated using the loss function
    like mean square error (MSE) for regression problems and Cross entropy for classification
    problems during the Loss calculation process.

    - **Backpropagation Process:** In backpropagation process, the loss is propagated
    back through the network to update the weights of the neural network.

    - **Optimization of the weights** of the neural network is done by the gradient
    descent approach based on the loss function. The gradient descent approach is
    an optimization algorithm used to minimize the error function in an iterative
    manner to update the weights in the direction of the negative gradient. The variants
    of the gradient descent approach are Batch gradient descent, stochastic gradient
    descent, mini-batch gradient descent, etc.

    - **Batch Gradient Descent:** The batch gradient descent approach updates the
    weights after computing the gradient over the entire dataset.

    - **Stochastic Gradient Descent** updates the weights for each training sample
    individually.

    - **Min-batch Gradient Descent** updates weights after computing the gradient
    over a small batch of training samples.


    After the training process, the evaluation of the feedforward neural network is
    based on metrics like accuracy, precision, recall, F1 score, and confusion matrix.



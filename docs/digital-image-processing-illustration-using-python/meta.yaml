    regression. It is a linear model with some modifications to increase the accuracy
    of the regression model. It makes use of a linear regression model to fit the
    complicated and non-linear functions and datasets. Therefore, in polynomial regression,
    the original input features or data are converted into polynomial features or
    data of the required degree and then modelled using a linear model. Thus, polynomial
    regression can be used for the data in a non-linear fashion.



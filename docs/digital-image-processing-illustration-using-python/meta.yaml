    # ## 7.1 Introduction


    Image segmentation partitions the image into its constituent regions. One view
    of image segmentation is to divide an image into multiple non-overlapping regions.
    The other view considers it the process of grouping pixels together that have
    similar attributes. Segmentation algorithms can be grouped into two categories:
    (1) Segmentation based on discontinuity and (2) Segmentation based on similarity.
    Segmentation based on discontinuity detects local discontinuity in intensity.
    Segmentation based on similarity partitions an image into regions that are similar
    according to a set of predefined criteria. The overall view of different types
    of image segmentation methods is given in Fig. 7.2.


    Image segmentation is an essential building block for most image processing and
    computer vision tasks. Image segmentation is widely used in medical imaging, face
    recognition, pedestrian detection, etc.'

  md: '5. HOG means a histogram of gradient features or descriptors, and it can be
    obtained at a specified location. The following steps are involved in HOG computation:


    +   (a) Compute image gradient magnitudes and orientations or directions over
    the whole image. Using thresholding, make small gradient magnitudes as zero.


    +   (b) Centre the cell grid on an image location.


    +   (c) For each cell, form an orientation histogram by quantizing the gradient
    directions; add the thresholded gradient magnitudes for each such orientation
    bin.


    +   (d) Stack the histograms into a 1D array of length [number of orientation
    bins × number of cells].


    +   (e) Normalize the 1D array values, which will be HOG features.


    6. The important GLCM features are (1) Contrast, (2) Dissimilarity, (3) Homogeneity,
    (4) Angular second moment, and (5) Correlation.


    7. SIFT stands for scale invariant feature transform features based on detecting
    key points and extracting local feature descriptors. SIFT features are invariant
    to scale, orientation, and affine transformations. Therefore, it can be preferred
    for computer vision applications like object recognition, image stitching, and
    3D reconstruction.


    8. The advantages of local features are as follows:


    +   (a) Locality: The features are local and robust to occlusion and clutter.


    +   (b) Distinctiveness: It can easily differentiate an extensive database of
    objects.


    +   (c) Quantity: A single image has hundreds or thousands of features.


    +   (d) Efficiency: It is used in real-time environment.


    +   (e) Generality: It can exploit different features in different situations.


    9. Handcrafted features refer to manually designed, domain-specific features that
    are extracted from images for a specific task which include techniques like scale-invariant
    feature transform (SIFT), histogram of oriented gradients (HOG), speeded-up robust
    features (SURF), local binary pattern (LBP), etc. Deep features are learned features
    that are automatically obtained from deep learning algorithms.


    10. An autoencoder is a type of neural network designed to learn data representations,
    typically for unsupervised learning tasks. The autoencoders can capture meaningful
    patterns in data by compressing the data into a lower-dimensional space and then
    reconstructing it.


    11. The major components of the autoencoder are (1) Encoder, (2) Decoder, and
    (3) Latent space representation. The encoder compresses data into a lower-dimensional
    space. The latent space, or the bottleneck layer, is the layer where data is compressed
    and from where the decoder generates the reconstruction. The decoder reconstructs
    the compressed data back to the original input space.


    12. Feature extraction transforms arbitrary data into a numerical feature. Feature
    selection is a dimensionality reduction technique. Dimensionality reduction is
    the process of reducing the number of features in a dataset while retaining the
    salient features. The feature selection is necessary to reduce the computational
    complexity, and avoid overfitting problems.'

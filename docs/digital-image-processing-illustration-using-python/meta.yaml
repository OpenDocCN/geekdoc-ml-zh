    import tensorflow as tf

    from tensorflow.keras.layers import Input, Dense, Flatten

    from tensorflow.keras.models import Model

    from tensorflow.keras.utils import to_categorical

    mnist = tf.keras.datasets.mnist;# Load MNIST dataset

    (x_train, y_train), (x_test, y_test) = mnist.load_data()

    x_train, x_test = x_train / 255.0, x_test / 255.0; # Normalise the dataset

    y_train = to_categorical(y_train, num_classes=10)

    y_test = to_categorical(y_test, num_classes=10)

    # Define input layer

    input_layer = Input(shape=(28, 28))

    flatten_layer=Flatten()(input_layer)

    # Create hidden layer 1

    hidden_layer = Dense(units=128, activation=''relu'')(flatten_layer)

    # Create hidden layer 2

    hidden_layer1 = Dense(units=64, activation=''relu'')(hidden_layer)

    # Create output layer

    output_layer = Dense(units=10, activation=''softmax'')(hidden_layer1)

    # Define the model

    FNN = Model(inputs=input_layer, outputs=output_layer)

    # Compile the model and specify loss, optimizer, etc.


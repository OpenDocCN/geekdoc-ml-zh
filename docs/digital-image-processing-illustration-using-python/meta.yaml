    # Illustration of Huffman Code


    Let us consider a word "COLLEGE" and encode this word using Huffman coding. From
    the given word, it is possible to observe that the alphabets "C", "E", "G", "L",
    and "O" are used. The probability of each alphabet is obtained as


    $$P(X) = \frac{\text{Number of Alphabet } X}{\text{Length of input string}}$$
    (9.10)


    For the character "C", $P(C)$ is calculated as


    $$P(C) = \frac{1}{7}$$


    Similarly, for other characters, as follows: $P(E) = \frac{2}{7}$, $P(G) = \frac{1}{7}$,
    $P(L) = \frac{2}{7}$, $P(O) = \frac{1}{7}$. Arrange these probabilities in descending
    order, and the result is shown in Table 9.1 in the first column. Take the least
    two probabilities from the bottom and add them together, then perform the descending
    order, which is depicted in the second column of Table 9.1. Repeat this process
    till the end of the two probabilities.



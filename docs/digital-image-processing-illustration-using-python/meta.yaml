    # ### 6.4.3 *Boundary Extraction Using Erosion and Dilation*


    The boundary of the objects can be obtained by erosion and dilation operations.
    The erosion operation used to extract the boundary of the object is given by


    $$\text{Boundary}(X) = X - (X \ominus B) \tag{6.10}$$


    where *X* is the input image, *B* is the structuring element, and Boundary (*X*)
    denotes the boundary of the input image (*X*). The result will be all the foreground
    pixels that are surrounded by the background. This will be called as "interior
    boundary" of the object.


    The dilation operation can be used to obtain the boundary of the object, which
    is mathematically written as


    $$\text{Boundary}(X) = (X \oplus B) - X \tag{6.11}$$


    The resultant boundary is all the background pixels, which are bordered by the
    foreground pixels. This will be called as "exterior boundary" of the object.



    # ### 5.12.4 *Total Variation Filter*


    Total variation filter was developed by Rudin, Osher, and Fatemi in the year 1992.
    Total variation denoising algorithm is an effective filtering method for recovering
    piece-wise constant signals. Total variation filter is often used for image denoising
    and image restoration.


    # **Total Variation**


    The total variation (TV) of a signal measures how much the signal changes between
    signal values. For the total variation of the 1D signal ($x[n]$) with a length
    of $N$ is written as


    ```

    $$TV(x) = \sum_{n=2}^{N} |x[n] - x[n-1]|$$

    (5.41)

    ```


    The total variation of "x" can also be written as using $l_1$ norm, which is given
    by


    ```

    $$TV(x) = Dx_1$$

    (5.42)

    ```


    where the matrix $D$ is written as


    ```

    $$D = \begin{bmatrix} -1 & 1 & 0 & \cdots & 0 \ 0 & -1 & 1 & \cdots & 0 \ \vdots
    & \vdots & \ddots & \vdots & \vdots \ 0 & 0 & \cdots & 1 & 0 \ 0 & 0 & \cdots
    & -1 & 1 \end{bmatrix}$$

    (5.43)

    ```


    with a size of $(N-1) \times N$.


    # **Total Variation Denoising**


    Let us assume the signal "x" is corrupted by additive white Gaussian noise ($\eta$).
    The corrupted signal is denoted as "y". The mathematical expression of the corrupted
    image is given by


    ```

    $$y = x + \eta, \quad y, x, \eta \in \mathbb{R}^N$$

    (5.44)

    ```


    The objective of the total variation denoising algorithm is to estimate "x" from
    "y" by minimizing the objective function, which is given as follows:'
  - '[PAGE 388]


    where $\lambda$ is the regularization parameter, which controls the smoothness
    of the output signal. If the noise content is large, then $\lambda$ value will
    be chosen as large.


    # ### Total Variation Denoising Algorithm


    The main objective function of the total variation denoising algorithm is given
    by


    $$J(x) = y - x_2^2 + \lambda Dx_1$$


    where $D$ is the $M \times N$ matrix, and the optimal value of the objective function
    is defined as


    $$J^*(x) = \min_x y - x_2^2 + \lambda Dx_1 \qquad (5.46)$$


    The objective function in Eq. (5.46) is a minimization function and is complicated
    because differentiation of $l_1$ norm is not possible. Hence, the dual formulation
    method can minimize the objective function $J(x)$.


    Let us consider the absolute value of a signal "$x$" is a scalar for deriving
    the dual formulation, which is written as


    $$|x| = \max_{|z| \leq 1} zx \qquad (5.47)$$


    Equation (5.47) is a circuitous form and its advantage is that the non-differentiability
    of the function is converted to the feasible set. Hence, Eq. (5.47) can be written
    as


    $$x_1 = \max_{|z| \leq 1} z^T x \qquad (5.48)$$


    where the condition $|z| \leq 1$ is considered as element wise. Similarly,


    $$Dx_1 = \max_{|z| \leq 1} z^T Dx \qquad (5.49)$$


    Substituting Eq. (5.49) in the Eq. (5.45), we get


    $$J(x) = y - x_2^2 + \lambda \max_{|z| \leq 1} z^T Dx \qquad (5.50)$$


    The above equation can be rewritten as


    $$J(x) = \max_{|z| \leq 1} y - x_2^2 + \lambda z^T Dx \qquad (5.51)$$


    The optimal value of the objective function can be written as


    $$J^*(x) = \min_x \max_{|z| \leq 1} y - x_2^2 + \lambda z^T Dx \qquad (5.52)$$'
  - '[PAGE 389]


    To obtain the minimizing vector "x", it has to be obtained both "x" and auxiliary
    vector "z". The function of the vector (x, z) in Eq. (5.52) is defined as


    $$F(x,z) = y - x_2^2 + \lambda z^T Dx$$ (5.53)


    Substituting Eq. (5.53) in Eq. (5.52), we get


    $$J^*(x) = \min_x \max_{|z| \leq 1} F(x,z)$$ (5.54)


    The function (F(x, z)) is convex in "x" and concave in "z", the optimal value
    J*(x) is a saddle point of F(x, z). Using min-max property, Eq. (5.54) can be
    rewritten as


    $$J^*(x) = \max_{|z| \leq 1} \min_x F(x,z)$$ (5.55)


    Now, substituting Eq. (5.53) in Eq. (5.55), we get


    $$J^*(x) = \max_{|z| \leq 1} \min_x y - x_2^2 + \lambda z^T Dx$$ (5.56)


    Equation (5.56) denotes the dual formulation of the total variation denoising
    problem. To obtain the optimal value J*(x), taking the partial derivative of Eq.
    (5.56) with respect to "x" and equating the result to zero, we get


    $$\frac{\partial J(x)}{\partial x} = -2(y-x) + \lambda D^T z = 0$$


    Simplifying the above equation, we get


    $$(y-x) = \frac{\lambda D^T z}{2}$$ (5.57)


    and


    $$x = y - \frac{\lambda D^T z}{2}$$ (5.58)


    Substituting Eqs. (5.57) and (5.58) in Eq. (5.56), we get


    $$J^*(x) = \max_{|z| \leq 1} \frac{\lambda D^T z^2}{2} + \lambda z^T D\left(y
    - \frac{\lambda D^T z}{2}\right)$$


    Simplifying the above equation, we get


    $$J^*(x) = \max_{|z| \leq 1} -\frac{\lambda^2}{4} z^T DD^T z + \lambda z^T Dy$$
    (5.59)'
  - '[PAGE 390]


    Equation (5.59) is a maximization problem and it is converted into a minimization
    problem, the above equation can be rewritten as


    $$z^* = \underset{|z| \leq 1}{\text{argmin}} z^T D D^T z - \frac{4}{\lambda} z^T
    D y$$ (5.60)


    To obtain the optimum value of $z^*$, differentiating the above equation with
    respect to "$z$" and equating the result it to zero, we get


    $$\frac{\partial z^*}{\partial z} = 2 D D^T z - \frac{4}{\lambda} D y = 0$$ (5.61)


    and


    $$D D^T z = \frac{2}{\lambda} D y$$ (5.62)


    Solving Eq. (5.62) requires a potentially large system of linear equations and,
    furthermore, does not yield a solution "$z$" satisfying the constraint $|z| \leq
    1$. Therefore, to find "$z$", this problem has to be treated as a constraint minimization
    problem and it can be achieved by using majorization–minimization approach. Hence,
    let us consider the function in Eq. (5.60) as


    $$A(z) = z^T D D^T z - \frac{4}{\lambda} z^T D y$$ (5.63)


    And setting "$z^{(i)}$" as point of coincidence, a separable majorizer of $A(z)$
    by adding the non-negative function, $(z - z^{(i)})^T (\alpha I - D D^T)(z - z^{(i)})$
    to $A(z)$, we get


    $$A(z) + \left(z - z^{(i)}\right)^T \left(\alpha I - D D^T\right) \left(z - z^{(i)}\right)$$
    (5.64)


    where $\alpha$ is greater than or equal to the maximum eigenvalue of $D D^T$.
    Using the majorization–minimization method, the update equation for "$z$" is given
    by


    $$z^{(i+1)} = \underset{|z| \leq 1}{\text{argmin}} A(z) + \left(z - z^{(i)}\right)^T
    \left(\alpha I - D D^T\right) \left(z - z^{(i)}\right)$$ (5.65)


    Simplifying the above equation, we get


    $$z^{(i+1)} = \underset{|z| \leq 1}{\text{argmin}} z z^T - 2\left(\frac{1}{\alpha}
    D \left(\frac{2}{\lambda} y - D^T z^{(i)}\right) + z^{(i)}\right)^T z$$ (5.66)


    To find the optimum value of "$z$" with the constraint of $|z| \leq 1$, first
    let us consider the scalar form of above equation, we get


    $$J_1(z) = \underset{|z| \leq 1}{\text{argmin}} z^2 - 2 b z$$ (5.67)'

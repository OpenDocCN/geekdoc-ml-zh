    # ### 11.6.8 YOLO


    You Only Look Once, or YOLO, is a type of convolutional neural network (CNN) similar
    to GoogleNet. It is designed to detect objects in images using a single-step process.
    YOLO takes an image as input and processes it through a deep convolutional neural
    network to find and categorize objects all at once. The YOLO architecture has
    24 convolutional layers, 4 max-pooling layers, and 2 fully connected layers, which
    are shown in Fig. 11.82. First, the input image is resized to 448 × 448 pixels.
    Then, a 1 × 1 convolution is applied to reduce the number of channels in the image,
    followed by a 3 × 3 convolution to create a three-dimensional output. Most layers
    use the ReLU activation function, but the final layer uses a linear activation
    function. Methods like batch normalization and dropout are included to prevent
    overfitting.'
  - '[PAGE 839]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_839_0.png)


    **Fig. 11.82** YOLO architecture


    The YOLO algorithm uses several techniques, such as residual blocks, bounding
    box regression, intersection over union (IoU), and non-maximum suppression, to
    detect objects. YOLO divides the input image into a grid of S × S sections. If
    an object''s centre falls within a grid section, that section is responsible for
    detecting the object. Each grid section can predict multiple bounding boxes and
    associated confidence scores, indicating how likely it is that an object is present.
    During training, only one bounding box predictor is assigned to each object. The
    IoU metric helps the model to determine how well the predicted boxes match the
    actual objects. YOLO selects the predictor that has the highest IoU with the ground
    truth for each object, enabling it to improve its accuracy over time for different
    sizes and shapes of objects. This approach helps to enhance the overall effectiveness
    of object detection in images.


    # **Experiment 11.30: Object Detection Using YOLOv3 Model**


    YOLO has been developed in several versions, such as YOLOv1, YOLOv2, YOLOv3, YOLOv4,
    YOLOv5, YOLOv6, and YOLOv7. Each version has been built on top of the previous
    version with enhanced features such as improved accuracy, faster processing, and
    better handling of small objects. This experiment uses YOLOv3 model to detect
    the objects in the input image. The Python code for the object detection using
    YOLOv3 is given in Fig. 11.83, and its simulation result is shown in Fig. 11.84.


    # **Inferences**



    # ## 10.6 Quantization of Colour Image


    Quantization is mapping a large set of values to a smaller set of values. Quantization
    is a non-linear and irreversible process. Quantization can be broadly classified
    into (1) Scalar quantization and (2) Vector quantization. Scalar quantization
    deals with the approximation of scalar values, whereas vector quantization deals
    with the approximation of a group of values.


    # **Experiment 10.23: Quantization of Colour Image**


    In this experiment, an RGB image is read, and it is then divided into red, green,
    and blue planes. Scalar quantization is applied to individual red, green, and
    blue planes. The quantized colour planes are merged to obtain the quantized colour
    image. The block diagram which depicts the problem statement is shown in Fig.
    10.56. The Python code which performs the scalar quantization of the colour image
    is shown in Fig. 10.57, and the corresponding output is shown in Fig. 10.60.


    # **Inferences**


    The following inferences can be made from Fig. 10.58:


    +   - The input image is quantized by varying the bit rate as 1, 2, 4, 6, and
    8.

    - When the bit rate is 1, the quality of the reconstructed image is poor.

    - With the increase in bit rate, the reconstructed or quantized image quality
    increases. When the bit rate is 8, the quantized image resembles the input image.

    - To get the better quality image, the bit rate has to be higher; with an increase
    in bit rate, the storage complexity increases. There should be a compromise between
    the storage space and the quality of the image.'

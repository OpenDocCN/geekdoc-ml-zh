    # ### 4.10.5 *High-Boost Filter*


    The high-pass filter emphasizes the high-frequency component of the image, but
    the background information is lost in the high-pass filter. A high-boost filter
    is used to enhance the high-frequency component of the input image. At the same
    time, it preserves the background information. The 3 × 3 mask used to perform
    high-pass filter is

    $$\begin{bmatrix} -1 & -1 & -1 \ -1 & 8 & -1 \ -1 & -1 & -1 \end{bmatrix}$$

    , whereas the mask used to perform high-boost filtering operation is given by

    $$\begin{bmatrix} -1 & -1 & -1 \ -1 & 9A-1 & -1 \ -1 & -1 & -1 \end{bmatrix}$$

    , where $A = 1$ results in high-pass filter output and $A > 1$ results in high-boost
    filtering of the input image.



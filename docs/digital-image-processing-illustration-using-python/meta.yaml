    # Computation of linear convolution in transform

    import numpy as np

    from scipy import signal

    #Step 1: Defining the input matrices

    x=np.array([[1,2],[3,4]])

    h=np.array([[5,6],[7,8]])

    print(''x:'',x),print(''h:'',h)

    #Step 2: Linear convolution in spatial domain

    y=signal.convolve2d(x,h)

    #Step 3: Zero padding of the input matrices

    x1=np.pad(x, [(0, 1), (0, 1)], mode=''constant'')

    h1=np.pad(h, [(0, 1), (0, 1)], mode=''constant'')

    print(''x after padding:'',x1),print(''h after padding:'',h1)

    #Step 4: Taking Forward transform

    X1=np.fft.fft2(x1)

    H1=np.fft.fft2(h1)

    #Step 5: Multiplication of the spectrum

    Y1=np.multiply(X1,H1)

    #Step 6: Taking Inverse Fourier transform

    y1=np.fft.ifft2(Y1)

    #Step 7: Comparing the result

    print(''Result of linear convolution in spatial domain:'',y)

    print("Result of linear convolution in transform domain:",np.abs(y1))


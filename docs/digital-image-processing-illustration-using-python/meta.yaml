    # ### 7.5.4 SLIC Algorithm-Based Image Segmentation


    SLIC stands for Simple Linear Iterative Clustering. The goal is to cluster image
    pixels into segments (clusters) based on their colour similarity and proximity
    in the image plane. This algorithm is inspired by the k-means algorithm, as in
    the k-means, SLIC takes as input a desired number of segments *K*. For an image
    with *N* pixels, the approximate size of each segment is therefore *N/K* pixels.
    There would be a segment centre "C" for roughly equally sized segments at every
    grid interval $S = \sqrt{\frac{N}{k}}$. The segment centre "$C_k$" is represented
    as a 5D vector [$R_k$, $G_k$, $B_k$, $x_k$, $y_k$] for *k* = 1, 2, ..., *K*.


    In the SLIC algorithm, as a first step, "*K*" segment centres are regularly sampled
    on the image plane and moved to the locations corresponding to the lowest gradient
    position in a 3 × 3 neighbourhood. Afterwards, each image pixel is assigned to
    one of the segments based on the distance, i.e. the distance from a pixel "*i*"
    to all the segment centres is computed, and the pixel is assigned to the segment
    whose centre has the lowest distance to "*i*". The algorithm assumes that pixels
    that are associated with a segment lie within a 2*S* × 2*S* area around the centre
    of this segment on the *xy* plane. After all the pixels are associated with the
    nearest cluster centre, a new centre is computed as the average [*R*, *G*, *B*,
    *x*, *y*] vector of all the pixels belonging to the cluster. This process of associating
    pixels with the nearest cluster centre and recomputing the centre is iteratively
    repeated until convergence.'

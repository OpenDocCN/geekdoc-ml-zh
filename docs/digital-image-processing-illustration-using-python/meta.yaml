  md: "```\npython\n# CCV computation of grayscale image\nimport cv2\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\ndef grayscale_ccv(I, Q, th):\n  Q_I\
    \ = (I // Q) * Q\n  # Initialise the coherence vectors\n  c_v = [0] * (Q_I.max()\
    \ + 1);# Coherent Vector\n  ic_v = [0] * (Q_I.max() + 1);# Incoherent Vector\n\
    \  for value in range(Q_I.max()+1):\n    mask = Q_I == value\n    connected_components\
    \ = cv2.connectedComponentsWithStats(mask.astype(np.uint8),\n                \
    \            4, cv2.CV_32S)\n    num_labels = connected_components[0]\n    stats\
    \ = connected_components[2]\n    for label in range(1, num_labels):\n      count\
    \ = stats[label, cv2.CC_STAT_AREA]\n      if count >= th:\n        c_v[value]\
    \ += count\n      else:\n        ic_v[value] += count\n  return Q_I, c_v, ic_v\n\
    I = cv2.imread('Clock.tiff', 0);# Load the grayscale image\nQ,th=16,8;\nQ_I,c_v,\
    \ ic_v = grayscale_ccv(I, Q, th)\nplt.subplot(1,2,1),plt.imshow(I,cmap='gray'),plt.title('Input\
    \ Image'),plt.axis('off')\nplt.subplot(1,2,2),plt.imshow(Q_I,cmap='gray'),\nplt.title('Quantized\
    \ with Q = {}'.format(Q)),plt.axis('off')\nprint(\"Coherent Vector:\", c_v)\n\
    print(\"Incoherent Vector:\", ic_v)\n```\n\n**Fig. 8.14** Computation of coherent\
    \ and incoherent vector. **(a)** Input and quantized image. **(b)** Coherent and\
    \ incoherent vectors\n\n**Task:** Vary the $Q$ and threshold values in the Python\
    \ code given in Fig. 8.14 and comment on the observed result.\n\n# ## Zernike\
    \ Moment\n\nThe Zernike moment is a geometric-based moment, and it is a 2D orthogonal\
    \ polynomial function on a unit circle. The orthogonal moments of Zernike moment\
    \ are scaling and rotation invariant. The Zernike moment contains several orthogonal\
    \ sets of complex-valued polynomials, which is defined as\n\n$$V_{nm}(x,y) = R_{nm}(x,y)\\\
    exp\\left(jm \\times \\tan^{-1}\\left(\\frac{y}{x}\\right)\\right)$$ (8.8)"

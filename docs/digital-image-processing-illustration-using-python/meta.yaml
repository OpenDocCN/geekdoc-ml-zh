    # ### 6.11.3 *Opening*


    The grayscale opening operation of an image can be performed by the grayscale
    erosion operation followed by grayscale dilation operation. The opening output
    value is the maximum of the minimum value of the image in the surrounding neighbourhood
    pixels defined by the structuring element.


    The opening operation can be mathematically written as


    $$(X \Theta B)(m,n) = \min \begin{Bmatrix} X(m-s, n-y) + B(x,y) | \ (m-s), (n-y)
    \in W_X; \ (x,y) \in W_B \end{Bmatrix} \quad (6.29)$$


    $$(X \circ B)(m,n) = \max \begin{Bmatrix} (X \Theta B)\big[(m-s, n-y)\big] + B(x,y)
    | \ (m-s), (n-y) \in W_X; \ (x,y) \in W_B \end{Bmatrix} \quad (6.30)$$'

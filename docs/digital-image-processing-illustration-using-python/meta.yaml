    \nGenerative Adversarial Networks (GANs) are a revolutionary concept in deep learning,\
    \ introduced by Ian Goodfellow and his collaborators in 2014. The primary aim\
    \ of generative modelling is to autonomously learn patterns from input data, allowing\

    # ### 8.4.2 FAST (Features from Accelerated Segment Test)


    FAST stands for Features from Accelerated Segment Test. It is a corner detection
    approach introduced by Edward Rosten and Tom Drummond in 2006. The FAST corner
    detector is computationally efficient; hence, it is very suitable for real-time
    video processing applications.


    The steps involved in the FAST feature extraction algorithm are as follows:


    +   Step 1: Select a pixel ($I_p$) in the image to be identified as a corner pixel
    and choose the appropriate threshold value ($t$).


    +   Step 2: Select 16 neighbouring pixels of pixel ($I_p$) as per the diagram
    shown in Fig. 8.51.


    +   Step 3: Compare the 16 neighbouring pixels with the pixel ($I_p$) and threshold
    ($t$) using the Eq. (8.41) and identify the numbers of dark, brighter, and similar
    pixels among 16.


    ```

    $$S_p = \begin{cases} \text{darker}, & I_p \leq I_p - t \ \text{similar}, & I_p
    - t < I_p < I_p + t \ \text{brighter}, & I_p \geq I_p + t \end{cases}$$ (8.41)

    ```


    +   Step 4: Speed up the process of the algorithm. Initially, four pixels located
    at the positions (1, 5, 9, and 13) are compared with pixel ($I_p$). If at least
    three pixels out of four are not below $I_p - t$ or above $I_p + t$, then the
    pixel ($I_p$) cannot be considered as a corner pixel. Hence, reject the pixel
    ($I_p$) as a possible interest point.


    +   Step 5: If at least three pixels out of four are below $I_p - t$ or above
    $I_p + t$, then check all remaining 12 neighbouring pixels by using Eq. (8.41).


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_581_0.png)



    # ### 7.4.2 Watershed-Based Image Segmentation


    Watershed segmentation is a region-based image segmentation technique. Watershed
    algorithm considers image as a topographic map. It considers the brightness of
    a pixel as its height. The dark pixels represent the valleys. Water placed on
    any pixel enclosed by a common watershed line flows downhill to a common local
    intensity minimum. Pixels draining to a common minimum form a catchment basin,
    which represents a segment. The watershed transform computes catchment basins
    and watershed lines (ridgelines), where catchment basins correspond to image regions
    and ridgelines relate to region boundaries.



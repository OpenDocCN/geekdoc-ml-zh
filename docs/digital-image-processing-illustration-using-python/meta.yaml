    # ## 10.8 Pseudo Colour


    In general, human eye cannot distinguish more than 50 gray levels in an image.
    Subtle details can easily be lost when looking at grayscale images. To enhance
    the variations in gray level and make them more intuitive, grayscale images are
    pseudo-coloured, where each grayscale is mapped to a colour level through Look
    Up Table (LUT).


    # ### Experiment 10.25: Conversion of Binary Image to Two Colours


    This experiment discusses the input grayscale image is converted into two colours
    output image. The two colours $C_1$ and $C_2$ chosen for the intensity levels
    in the grayscale image are illustrated in Fig. 10.61.


    In Fig. 10.61, the *x*-axis represents the gray level of the input image, the
    *y*-axis represents the colour. If the gray level of the input image is from 0
    to L$_1$, the output colour is $C_1$. If the input gray level is beyond L$_1$,
    the output colour is $C_2$.


    To verify this concept, the checkerboard pattern is generated, and it is the input
    binary image. The checkerboard pattern takes only two gray levels, which are either
    0 or 255. If the gray level is greater than zero, the output colour is red; otherwise,
    the output colour is green. The Python code that performs this operation is given
    in Fig. 10.62, and the corresponding output is shown in Fig. 10.63.


    # ### Inferences


    From Fig. 10.63, the following inference can be drawn:


    +   - The input image is a 256 × 256 checkerboard pattern, which is a binary image.

    - The input image takes only two gray levels which are either 0 or 255.'

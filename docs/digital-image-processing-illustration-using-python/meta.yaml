    # Answers to PreLab Questions


    +   1. A feedforward neural network is a type of neural network where data or
    information flows in one direction from the input layer to the output layers.
    It does not contain any cycles or loops within it.

    2. The activation function is a mathematical equation that computes the output
    of each node of the neural network. Mostly the activation function maps the linear
    data into non-linear manner, because of its non-linear nature property, which
    enables the neural network to learn complex patterns. Some of the common activation
    functions are ReLU, Sigmoid and Tanh.

    3. The loss function quantifies the measure of neural network predictions with
    the actual target values. This loss function can be used while training the neural
    network model. This quantifiable result fine tunes the optimization process to
    obtain the optimum weights of the neural networks. Some of the examples of loss
    functions are mean squared error, Cross entropy loss, etc.

    4. Backpropagation is an algorithm used to train Feedforward Neural Networks.
    It consists of calculating the gradient of the loss function with respect to each
    weight by the chain rule and updating the weights to minimize the loss using an
    optimization algorithm like Gradient Descent or Adam optimizer.

    5. VGG16 is a convolutional neural network model that''s used for image recognition.
    It''s unique in that it has only 16 layers that have weights, as opposed to relying
    on a large number of hyper-parameters. It''s considered one of the best vision
    model architectures.'
  - '[PAGE 879]


    +   6. Data augmentation can be achieved through (1) Flipping the image (2) Cropping
    the image (3) Rotating the image (4) More images can be generated by adding noise
    to the image.


    +   7. The bias is the difference between the prediction of the model and the
    correct value. The variability of model prediction for a given data points is
    the spread of the data termed as the variance of the model. If the algorithm is
    too simple, then it may be on high bias and low variance condition. If algorithms
    fit too complex then it may be on high variance and low bias. Bias-variance trade
    off in machine learning is crucial as it directly impacts a model''s predictive
    performance. The goal of bias-variance trade-off is the delicate equilibrium between
    under fitting and over fitting. The goal is to find the optimal level of complexity
    that allows a model to generalize effectively to an unseen data.


    +   8. Dropout refers to dropping out of some nodes either in the input or hidden
    layer in a neural network so that all the forward and backwards connections with
    a dropped node are temporarily removed. Dropout is used to reduce the overfitting
    problem. By randomly dropping a few units, it forces the layers to take more or
    less responsibility for the input by taking a probabilistic approach. This ensures
    that the model is getting generalized hence reducing the problem of overfitting.


    +   9. The three main layers of CNN are (1) Convolution layer (2) Polling layer
    and (3) Fully connected layer. The convolution layer performs feature extraction,
    the polling layer performs dimensionality reduction and extracts the dominant
    features, whereas the fully connected layer is responsible for mapping extracted
    features into a final output such as classification.


    +   10. The vanishing gradient problem occurs when the gradients used to update
    the network''s weight become very small or vanish as they are backpropagated through
    the network. The problem of vanishing gradient is due to the nature of certain
    activation functions and the chain rule of calculus. Vanishing gradient problem
    can lead to (1) slow convergence (2) Network getting stuck to local minima (3)
    Poor learning performance.


    +   11. In deep neural network, training is complicated due to the fact that the
    distribution of each layer''s inputs changes during training, as the parameters
    of the previous layers change. This phenomenon is termed as internal covariate
    shift. Batch normalization is a technique to normalize activations in intermediate
    layers of deep neural networks. Batch normalization avoids activation explosion
    by repeatedly correcting all activations to be zero-mean and of unit standard
    deviation. The advantages of performing batch normalization are (1) Networks train
    faster (2) Batch normalization allows one to use high learning rates which increases
    the speed at which networks train.


    +   12. PCA is a linear transformation to the subspace whereas autoencoder is
    a non-linear transformation to the hidden units. If the autoencoder''s activation
    functions are linear, then its function will be very similar to that of PCA.


    +   13. Transfer learning is a machine learning method that reuses a trained model
    designed for a particular task to accomplish a different yet related task.'

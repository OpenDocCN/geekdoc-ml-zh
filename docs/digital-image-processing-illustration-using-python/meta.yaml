    # 9.7.6 *DPCM-Based Compression*


    Differential Pulse Code Modulation (DPCM) is a predictive technique that removes
    the inter-pixel redundancy of a given input. It predicts the next value based
    on the values of the previous neighbouring input data elements. It computes the
    residual value between the actual and predicted value, which is given by


    Residue = actual value − predicted value


    (9.18)


    The residue data is losslessly compressed by using RLE, Huffman coding, etc. This
    DPCM decorrelates the data and causes the residual to have lower entropy so that
    a minimum number of bits are spent to transmit or store the compressed file. This
    DPCM technique is used in the JPEG lossless compression standard.


    # Prediction Approach


    Let us consider a 1D signal, which is given by *X* = {*x*₁, *x*₂, *x*₃, …, *x*ₙ}.
    The predicted value of *x*ₖ is obtained as


    *p*ₖ = *αx*ₖ₋₁


    (9.19)'
  - '[PAGE 642]


    where $\alpha$ is the predictive parameter, which decides the prediction of the
    current value of the input based on the previous value of the input. In general,
    the predictive parameter $\alpha$ can be chosen as 1.0 or 0.99. $p_k$ denotes
    the predicted value.


    The residue value ($e_k$) is calculated by


    $$e_k = x_k - p_k$$ (9.20)


    where $y_k$ is obtained from Eq. (9.19) with the initial $x_0$ assumed as 0. The
    residue is passed through entropy encoder. For the decoding, the original input
    from the encoder output, entropy decoder is used, and the decoded residue is added
    with predicted value, which is given by


    $$z_k = e_k + p_k$$ (9.21)


    The predicted value of the decoder DPCM is calculated as


    $$p_k = \alpha z_{k-1}$$ (9.22)


    The block diagram of the DPCM is shown in Fig. 9.35.



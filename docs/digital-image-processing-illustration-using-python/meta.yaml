    $$y[0,2] = \sum_{k=0}^{1}\sum_{l=0}^{1} x[k,l]h[-k,2-l]$$ (2.6)


    Upon observing Eqs. (2.4), (2.5), and (2.6), it is possible to interpret that
    while performing 2D convolution between two inputs $x[m,n]$ and $h[m,n]$, one
    matrix is unaltered while the other matrix is folded and shifted. This idea is
    used to perform 2D convolution operation.


    # **Step 1: Folding of the second input $h[m,n]$ to obtain $h[-m,-n]$**


    The input $h[m,n]$ is given by $h[m,n] = \begin{bmatrix} 5 & 6 \ 7 & 8 \end{bmatrix}$.

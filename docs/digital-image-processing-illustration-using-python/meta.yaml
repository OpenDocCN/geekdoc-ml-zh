    # ### 3.6.1 Line Detection


    The equation of a straight line in the image space with slope "m" and y-intercept
    "b" is given by


    $$y = mx + b$$


    (3.43)


    The expression of the line in polar coordinate is given by


    $$\rho = x\cos(\theta) + y\sin(\theta)$$


    (3.44)


    In the above equation, "ρ" is the norm distance of the line from origin and "θ"
    is the angle between the norm and the horizontal x-axis. This is illustrated in
    Fig. 3.66. The angle "θ" in polar coordinate takes a value in the range of −90°
    to +90°. The maximum norm distance is expressed as


    $$\rho_{\max} = \sqrt{x^2 + y^2}$$


    (3.45)


    Steps followed in Hough transform in line detection are summarized as follows:


    Extract the edges of the image using a suitable edge detection algorithm.


    +   - Step 1: Initialize the parameter space "r"s and "θ"s.

    - Step 2: Create the accumulator array and initialize it to zero.

    - Step 3: For each edge pixel.

    - Step 4: For each theta (θ).

    - Step 5: Compute r = x*cos(θ) + y*sin(θ).

    - Step 6: Increment the accumulator at "r" and "θ".

    - Step 7: Find maximum values in the accumulator that correspond to the line.



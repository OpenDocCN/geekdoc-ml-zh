    # ### 5.2.6 *Rayleigh Noise*


    Rayleigh noise follows Rayleigh distribution. The probability density function
    of Rayleigh distribution is given by


    $$f(x) = \frac{x}{\sigma^2} e^{-\frac{x^2}{2\sigma^2}}, x \geq 0$$ (5.6)



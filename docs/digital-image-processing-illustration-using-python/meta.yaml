    removed from the graph, divides the graph into two groups. Given an undirected
    graph $G = (V, E)$, if the objective is to partition "$V$" into two subsets, $V_1$
    and $V_2$, such that the number of edges between $V_1$ and $V_2$ is maximum, is
    termed as max-cut. The normalized cut is represented as


    $$N_{cut}(A,B) = \frac{\text{cut}(A,B)}{\text{asso}(A,V)} + \frac{\text{cut}(A,B)}{\text{asso}(B,V)}
    \quad (7.51)$$


    In the above expression, $cut(A, B)$ is the sum of all the edge weights associated
    with the cut and $asso(A, V)$ is the sum of all the edge weights associated with
    the cut and all the points in the graph. $asso(B, V)$ is the total connection
    from nodes in "$B$" to all the nodes in the graph.


    Steps in normalized cut algorithm for image segmentation are summarized below:


    +   Step 1: Generate a graph $G = (V, E)$ for the given image. Here "$V$" represents
    the vertex, and "$E$" denotes the edge. Calculate the weights on each edge.


    Step 2: Solve $(D - W)x = \lambda Dx$ for eigenvectors with the smallest eigenvalues.
    Here, "$W$" is the affine matrix of the graph, and "$D$" is a diagonal matrix
    in which each element along the diagonal represents the degree of correspondent
    vertex.


    Step 3: Use the eigenvector with the second smallest eigenvalue to bipartition
    the graph.


    Step 4: Decide if the current partition should be subdivided, and recursively
    repartition the segmented parts if necessary.



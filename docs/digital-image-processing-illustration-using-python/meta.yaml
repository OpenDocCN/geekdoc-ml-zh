    # #Extraction of bitplanes

    import cv2

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Reading the input image

    img=cv2.imread(''cameraman.tif'',0)

    #Step 2: Extracting the 8 bit planes


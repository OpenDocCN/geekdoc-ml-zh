    import numpy as np

    import matplotlib.pyplot as plt

    import cv2

    #Step 1: Reading the input image

    img=cv2.imread(''cameraman.tif'',0)

    m,n=img.shape

    #Step 2: Adding white Gaussian noise to the image

    gauss_noise=np.zeros((m,n),dtype=np.uint8)

    mean,std1,std2,std3=0,50,75,150

    gauss_noise1=(cv2.randn(gauss_noise,mean,std1)).astype(np.uint8)

    gauss_noise2=(cv2.randn(gauss_noise,mean,std2)).astype(np.uint8)

    gauss_noise3=(cv2.randn(gauss_noise,mean,std3)).astype(np.uint8)

    noisy_img1=cv2.add(img,gauss_noise1)

    noisy_img2=cv2.add(img,gauss_noise2)

    noisy_img3=cv2.add(img,gauss_noise3)

    #Step 3: Displaying the results

    fig = plt.figure(figsize=(8,6))

    plt.subplot(1,4,1),plt.imshow(img,cmap=''gray''),plt.title(''Input image'')

    plt.axis(''off''),plt.subplot(1,4,2),plt.imshow(noisy_img1,cmap=''gray''),

    plt.title(''NI:"$\sigma={}$''.format(std1)),plt.axis(''off'')

    plt.subplot(1,4,3),plt.imshow(noisy_img2,cmap=''gray''),

    plt.title(''NI:"$\sigma={}$''.format(std2)),plt.axis(''off'')

    plt.subplot(1,4,4),plt.imshow(noisy_img3,cmap=''gray''),

    plt.title(''NI:"$\sigma={}$''.format(std3)),plt.axis(''off'')


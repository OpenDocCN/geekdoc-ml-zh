    # ## Canny Edge Detection


    John F. Canny proposed the Canny edge detection algorithm in the year 1986. Canny
    edge detection is one of the most widely used algorithms to detect edges in a
    grayscale image. It is a multi-stage edge detection algorithm. The steps involved
    in Canny edge detection are summarized below:


    +   1. Perform Gaussian smoothing of the input image.

    2. Compute gradient along horizontal and vertical directions using the Sobel operator.

    3. Perform non-maximum suppression. In non-maximum suppression, the image is scanned
    along the image gradient direction. If the pixels are not part of the local maxima,
    they are set to zero. Non-maximum suppression is done to thin out the edges.

    4. Hysteresis thresholding is used to classify the edge. Two thresholds are employed
    in hysteresis thresholding, namely, upper and lower thresholds. Higher threshold
    is used to identify the strong pixels. Lower threshold is used to identify non-relevant
    pixels. Pixels having intensity between the upper and lower thresholds are flagged
    as weak.


    # ## Experiment 7.8: Canny Edge Detection


    The aim of this experiment is to compute the Canny edge detection using Python.
    The Python code, which performs the step-by-step edge detection using the Canny
    edge detection algorithm, is given in Fig. 7.20, and the corresponding output
    is shown in Fig. 7.21.


    # ## Inferences


    From Fig. 7.21, the following inferences can be drawn:


    +   - Gaussian smoothing results in smoothing of edge information.

    - Sobel operator is used to detect the intensity variation along horizontal and
    vertical direction.

    - Non-maximum suppression is used to remove weak edges in the input image.

    - The final result is obtained by performing hysteresis thresholding to the result
    of non-maximum suppression.'

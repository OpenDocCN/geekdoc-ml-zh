    # ### 7.5.2 *Fuzzy C-Means Clustering Algorithm*


    In k-means clustering algorithm, the data points exclusively belong to one cluster,
    whereas in fuzzy c-means clustering algorithm, the data points can belong to more
    than one cluster with a likelihood. Fuzzy c-means clustering involves two processes
    (1) Calculation of cluster centres (2) Assignment of data points to the cluster
    centres using a form of Euclidean distance. The above two steps are repeated until
    the cluster centres stabilize. The algorithm is similar to k-means clustering
    but it incorporates fuzzy set concepts of partial membership by allowing data
    points to belong to more than one cluster. The objective function of fuzzy C-means
    algorithm is given by


    ```

    $$J = \sum_{i=1}^{n} \sum_{j=1}^{K} \mu_{ij} \| x^i - c_j \|^2$$


    (7.34)

    ```


    In the above expression, $\mu_{ij}$ represents the fuzzy membership of the pixel
    or the data point to the cluster centre. The objective function can reach the
    global minimum when pixels near the centroid of corresponding clusters are assigned
    higher membership values, while lower membership values are assigned to pixels
    far from the centroid.'

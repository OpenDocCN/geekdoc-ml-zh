  md: '# Fig. 11.11 Linear regression model


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_755_0.png)


    the relationship between the dependent and independent variables, which is shown
    in Fig. 11.11. The mathematical representation of linear regression is given by


    ```

    $$y = \alpha_0 + \alpha_1 x + \varepsilon$$ (11.1)

    ```


    where $y$ represents the dependent variable or output or target, $x$ is an independent
    variable or predictor variable, $\alpha_0$ is a weight or coefficient that gives
    an additional degree of freedom, $\alpha_1$ is a linear regression coefficient,
    and $\varepsilon$ is a random error. The values of $x$ and $y$ act as training
    datasets.


    The linear regression is classified into simple linear regression and multiple
    linear regression. In a simple linear regression, a single independent variable
    is used to predict the value of a numerical target variable. In multiple linear
    regression, more than one independent variable is used to predict the value of
    a numerical target. The linear line, which shows the relationship between the
    dependent and independent variables, is called a regression line. The slope of
    the regression line is positive, then it is called a positive linear relationship,
    whereas the slope of the regression line is negative, which is called a negative
    linear relationship.


    The linear regression algorithm aims to find the best-fitted line of regression
    for the given data points. The different values of the weights or coefficients
    ($\alpha_0$ and $\alpha_1$) give a different line of regression. Hence, linear
    regression is used to calculate the best values for $\alpha_0$ and $\alpha_1$
    so that it can give the best-fit line of regression for the dataset. The cost
    function is used to find the best values for $\alpha_0$ and $\alpha_1$. The cost
    function optimizes the linear regression coefficients or weights. Therefore, the
    cost function can be used to find the accuracy of the mapping function, which
    maps the input variable to the output variable. This mapping function is called
    the Hypothesis function. The cost function for the linear regression approach
    is the mean squared error (MSE), which is the average squared error between the
    predicted output and actual output. The mathematical expression for the MSE cost
    function is given by


    ```

    $$\text{MSE} = \frac{1}{N} \sum_{i=1}^{N} \left( y_i - (\alpha_0 + \alpha_1 x_i)
    \right)^2$$ (11.2)

    ```


    where $y_i$ is the actual value, $\alpha_0 + \alpha_1 x_i$ is the predicted value,
    and $N$ denotes the number of observations.'

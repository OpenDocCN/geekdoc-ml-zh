    The fundamental parameter in mean shift algorithm is the bandwidth, which determines
    the number of clusters. Bandwidth refers to the size of the window across which
    the mean is calculated. Some of the common approaches to select the bandwidth
    are (1) Scott''s rule, (2) Silverman''s rule, and (3) Expert''s knowledge. The
    Scott''s rule selects a bandwidth that is proportional to the standard deviation
    of the data. The Silverman''s rule selects a bandwidth that is proportional to
    the median interquartile range of the data. Expert knowledge rule, the bandwidth
    selection is done manually with rich domain-specific information. The Python "*sklearn*"
    module offers "*estimate_bandwidth*" function based on nearest neighbour analysis.



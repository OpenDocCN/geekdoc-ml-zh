  md: '# ## 7.6 Active Contour-Based Image Segmentation


    The active contour model is one of the most successful methods of region-of-interest
    segmentation. It is also referred as snake model. Kass et al. defined the active
    contour model as an elastic curve that moves through the spatial domain of an
    image under the influence of internal and external forces. The internal force
    is computed from the geometrical properties of the contours, and the external
    force is computed from the image data so that the snake will conform to the object
    boundary. The internal force is responsible for shrinking and smoothing the snake,
    and the external force is responsible for pulling the snake to the contour points.
    The active contour model is based on energy minimization technique. Active contour
    models can be broadly categorized into (1) Edge-based active contour model and
    (2) Region based active contour model. Edge-based model uses image gradient to
    force the active contours to move towards the desired object boundary. Region-based
    active contour model uses image statistical information to attract the active
    contours to the object boundaries. Region-based models are more robust when weak
    edges exist and less sensitive to initialization, but more computationally expensive
    than edge-based models.


    The traditional snake is a curve $v(s) = [x(s), y(s)]$ defined to minimize the
    energy given by the following equation


    ```

    $$E = \int_0^1 \left[ E_{int}\left(v(s)\right) + E_{ext}\left(v(s)\right) \right]
    ds$$ (7.35)

    ```


    where


    ```

    $$E_{int}\left(v(s)\right) = \frac{1}{2}\alpha\left|v''(s)\right| + \beta\left|v''''(s)\right|$$
    (7.36)

    ```


    In the above Eq. (7.36), $\alpha$ and $\beta$ are weights that control the tension
    and rigidity of the snake, respectively, and are applied to the first and second
    derivative of $v(s)$. The external energy is obtained from the image. The expression
    for the external energy is given by


    ```

    $$E_{ext}(x,y) = -\left|\nabla(G_\sigma(x,y) * I(x,y))\right|^2$$ (7.37)

    ```


    In the above expression (7.37), $G_\sigma(x,y)$ represents the Gaussian function,
    which is used to smoothen the image and $\nabla$ is the gradient operator.


    A snake that minimizes the external and internal energy should satisfy the following
    Euler equation:


    ```

    $$\alpha v''''(s) - \beta v''''''''(s) - \nabla E_{ext} = 0$$ (7.38)

    ```


    The above equation can be viewed as a force equilibrium, where the internal force
    is responsible for shrinking and smoothing the snake, and the external force is
    for pulling the snake to the contour points. The major challenge is to decide
    the'

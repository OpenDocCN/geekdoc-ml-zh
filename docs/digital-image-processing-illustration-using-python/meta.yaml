    # ### 6.11.6 *Morphological Edge Detection*


    The basic morphological operations can be used to distinguish the smooth "ramp"
    edges from ripple "texture" edges. There are three variations of Lee edge detectors:
    (1) dynamic Lee edge detector, (2) texture Lee edge detector, and (3) ramp Lee
    edge detector.


    # #### Dynamic Lee Edge Detector


    It is an edge detector that gives the output similar to the result of the linear
    Laplacian filter. The mathematical expression for this detector is given by


    $$\text{Dynamic Lee}(X) = \min\left(\rho_B^+, \rho_B^-\right)$$ (6.36)


    where $\rho_B^+ = X \oplus B - X$ and $\rho_B^- = X - (X \ominus B)$. Dynamic
    Lee edge detector uses the dilation and erosion operations to compute its result.


    # #### Texture Lee Edge Detector


    The texture Lee edge detector is used to detect the texture edges in an image,
    which is mathematically defined as


    $$\text{Texture Lee}(X) = \min\left\{(X \circ B), (X \bullet B)\right\}$$ (6.37)


    The above equation shows that the texture Lee edge detector computes the texture
    edge using opening and closing operations.'

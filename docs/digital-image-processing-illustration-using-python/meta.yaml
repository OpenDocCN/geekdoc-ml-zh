    # ### 5.8.2 *Wavelet Transform-Based Image Denoising*


    Wavelet transform, due to its localization property, is an effective tool widely
    used in the area of image denoising and compression. Wavelets are used to decompose
    the image into different frequency regions called subbands. After decomposition,
    a thresholding operation is used to minimize the impact of noise. Different ways
    to modify the wavelet coefficients to minimize the impact of noise is termed as
    "shrinkage" techniques. The universal threshold commonly known as "VisuShrink"
    is given by


    $$\lambda = \sigma\sqrt{2\log(N)}$$ (5.18)'

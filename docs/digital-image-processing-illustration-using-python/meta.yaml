  - '[PAGE 238]


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_238_0.png)


    **Fig. 4.27** Piecewise linear contrast stretching


    There are three lines: one line from 0 to "a", the next line is from "a" to "b",
    and the third line is from "b" to "L − 1". The slopes of the three lines are represented
    as "α", "β", and "δ", respectively. From the figure, it is possible to observe
    that a small change in the gray level of the input image from "a" to "b" results
    in a large change in the gray level of the output image from "v" to "w". The relationship
    between the input image (x) and the output image (y) is given by


    ```

    $$y = \begin{cases} \alpha x, & \text{for } 0 \leq x < a \ \beta(x-a)+v, & \text{for
    } a \leq x < b \ \delta(x-b)+w, & \text{for } b \leq x < L-1 \end{cases}$$ (4.7)

    ```


    The expressions for the slopes of the line are given by


    ```

    $$\alpha = \frac{v}{a}$$ (4.8)

    ```


    ```

    $$\beta = \frac{w-v}{b-a}$$ (4.9)

    ```


    and


    ```

    $$\delta = \frac{L-1-w}{L-1-b}$$ (4.10)

    ```



  md: '# ## 10.2 Colour Models


    A colour model is a multidimensional representation of the colour spectrum. A
    colour model uses three primary colours to produce a wide array of colours. Colour
    space is the range of colours a colour model can produce. Colour spaces are used
    to define a standardized method of representing colours in digital images. Different
    colour spaces are useful for different purposes.


    # ### 10.2.1 RGB Colour Model


    The RGB colour cube is given in Fig. 10.2. From this figure, it is possible to
    observe that each colour is represented as a single point. If each colour is represented
    using 8 bits, then 24 bits will be required to represent an RGB image. Mixing
    an equal proportion of red, green and blue components will result in a white colour.
    RGB colour model is a device-dependent colour model. Every device can have its
    own set of primaries, which may look red, green and blue, but it could be slightly
    different from primaries used elsewhere.


    From the colour cube shown in Fig. 10.2, it is possible to interpret the following:


    Green + Red = Yellow (10.1)


    Green + Blue = Cyan (10.2)


    Red + Blue = Magenta (10.3)


    Red + Green + Blue = White (10.4)


    ![](img/f88e6a966edb922bd0b2ae87662c6c4b_688_0.png)



    # #### Addition of Two Images


    Let $f_1[m,n]$ and $f_2[m,n]$ represent the two images, then the addition of these
    two images is represented as


    $$g[m,n] = f_1[m,n] + f_2[m,n]$$ (1.1)


    # #### Experiment 1.14: Write a Python Code to Perform the Addition of Two Images


    The built-in function "*add*" in "cv2" library can perform the arithmetic addition
    operation of two images. While performing the arithmetic addition operation between
    two images, it is necessary to ensure that the dimensions of the two images should
    be the same. The Python code that performs the task of image addition is shown
    in Fig. 1.20, and the corresponding output is shown in Fig. 1.21.



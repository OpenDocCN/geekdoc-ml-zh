    # Answers to PreLab Questions


    +   1. Image features are parts or patterns of an object in an image that help
    to identify it. They contain edges and interest points of an object in an image,
    which provides rich information about the object in an image.


    2. The image features are broadly classified into (1) General and (2) Domain-specific
    features. The general features include colour, texture, and shape features. Domain-specific
    features are further classified into (1) fingerprint, (2) human face, and (3)
    conceptual features.


    3. Colour is an important feature that helps humans recognize images easily. It
    is also one of the most widely used low-level visual features, and it is invariant
    to image size and orientation.


    4. Texture is a low-level visual feature that can distinguish the regions of interest
    in an image. It refers to an object''s instinctive surface properties and contains
    information about the structural arrangement of surfaces and their relationship
    with the surroundings. For example, texture features can identify whether an object
    is soft or rough.'

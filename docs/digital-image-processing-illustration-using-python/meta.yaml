    python

    #Template matching

    import numpy as np

    import matplotlib.pyplot as plt

    import cv2

    #Step 1: Reading the input image and template

    img = cv2.imread(''A-Z.png'',0)

    template = cv2.imread(''template.png'',0)

    #Displaying the input and template

    plt.figure(1),plt.subplot(2,1,1),plt.imshow(img,cmap=''gray'')

    plt.title(''Test image''),plt.xticks([]),plt.yticks([])

    plt.subplot(2,1,2),plt.imshow(template,cmap=''gray'')

    plt.title(''Template image''),plt.xticks([]),plt.yticks([])

    #Step 2: Perform template matching

    img_copy = img.copy()

    res = cv2.matchTemplate(img, template,cv2.TM_CCORR_NORMED)

    #Step 3: Bounding box for matched character

    min_val, max_val, min_loc, max_loc = cv2.minMaxLoc(res)

    top_left = max_loc

    h,w=template.shape

    bottom_right = (top_left[0] + w, top_left[1] + h)

    cv2.rectangle(img, top_left, bottom_right, 0, 2)

    plt.figure(2),plt.imshow(img, cmap="gray"),plt.xticks([]),plt.yticks([])

    plt.title(''Image after template matching''),

    plt.tight_layout()


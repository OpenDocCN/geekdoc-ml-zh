    # ## 11.1 Introduction


    Artificial intelligence (AI) is the study of computers or machines that attempt
    to model and apply the intelligence of the human mind. AI can perform the task
    on its own or combine it with other technologies like sensors, robotics, etc.
    AI can improve their problem-solving skills by encompassing machine learning and
    deep learning. The AI can be categorized into weak AI and strong AI. The weak
    AI is trained and focused to perform specific tasks. Hence, it is also known as
    artificial narrow intelligence or narrow AI. Some examples of the narrow AI used
    in real-time applications are Apple''s Siri, Amazon''s Alexa, IBM Watsonx, Gemini,
    ChatGPT, and self-driving vehicles. Strong AI is made up of artificial general
    intelligence and artificial super intelligence. It is a theoretical form of AI
    where a machine can behave as intelligent as human. This AI would be self-aware
    with a consciousness that would have the ability to solve problems, learn, and
    plan for the future.


    # ## 11.2 Classical Programming


    In classical programming, input and the predefined rules or algorithm are given
    to the computer or machine, and the computer or machine produces output based
    on the input and algorithm. The flow diagram of classical programming is shown
    in Fig. 11.2a. From this figure, it is possible to infer that the computer or
    machine receives the input data and the predefined rule algorithm and produces
    the output. Hence, in classical programming, the computer or machine is used for
    only computation; it does not learn from the input data, which will give the output
    based on the predefined rule.



    # ## 1.9 Image Dithering


    Dithering is a process by which images with a finite number of gray levels appear
    as continuous-tone images. That is, an attempt is made to create an illusion.
    Broadly, image dithering can be classified as (1) average dithering or thresholding,
    (2) random dithering, (3) ordered dithering, and (4) error diffusion dithering.


    # ### 1.9.1 Average Dithering or Thresholding


    In average dithering or thresholding, each input image pixel is compared with
    a fixed threshold value. Thresholding results in a binary image. Three different
    types of thresholding include (1) global threshold, (2) local threshold, and (3)
    adaptive threshold. In the global threshold, a single threshold value is used
    for the entire image.


    If $f(x,y)$ represents the input image, "$T$" represents the threshold value,
    then the expression for the thresholded image ($g(x,y)$) is given by


    ```

    $$g(x,y) = \begin{cases} 1, & \text{if } f(x,y) > T, \ 0, & \text{if } f(x,y)
    \leq T. \end{cases}$$

    ```


    If the value of "$T$" is fixed for the entire image, it is termed as "global threshold".
    Thus, thresholding can be considered as two-level or one-bit quantization.


    In local thresholding technique, unique threshold value is chosen for subimage,
    which is obtained by partitioning the whole image. In adaptive thresholding, a
    threshold has to be calculated for each pixel in the image. It is the simplest
    dithering algorithm but it results in loss of detail and contouring.



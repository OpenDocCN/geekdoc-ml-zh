    # ## 7.2 Edge-Based Image Segmentation


    Edges correspond to drastic changes in the gray level of the image. First-order
    and second-order differential operators are used to detect the discontinuities
    in the gray level of the image. This section discusses different edge detection
    algorithms.


    # ### 7.2.1 *Isolated Point Detection*


    The fundamental idea employed in isolated point detection is that second-order
    derivatives respond stronger at isolated points and thin lines than first-order
    derivatives. Hence, the Laplacian mask, which is based on a second-order derivative,
    is used to detect the isolated points. The steps involved in isolated point detection
    are


    +   Step 1: Apply Laplacian mask over the input image to detect the isolated points.
    This is shown in Fig. 7.3.


    By applying the 3 × 3 mask over the image one gets


    ```

    $$\nabla^2 f(x,y) = \sum_{i=1}^{9} w_i I_i$$ (7.1)

    ```'

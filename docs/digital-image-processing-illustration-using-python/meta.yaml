    # ### 4.10.4 *Unsharp Masking*


    Unsharp masking is used to crispen the edges of the digital image. Unsharp masking
    is done by subtracting the blurred version of the image from the input image and
    then adding the result to the input image. This is represented in the form of
    a block diagram in Fig. 4.84.


    From Fig. 4.84, the expression for the image $g(x, y)$ is given by


    $$g(x,y) = f(x,y) - f_{\text{smooth}}(x,y)$$ (4.16)


    The expression for the output image $z(x, y)$ is given by


    $$z(x,y) = f(x,y) + kg(x,y)$$ (4.17)


    In the above expression, "$k$" represents the scaling constant.'

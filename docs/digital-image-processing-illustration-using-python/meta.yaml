    # ## 5.5 Bilateral Filter


    Tomasi and Manduchi (1998) first proposed the bilateral filter as a non-linear
    edge-preserving filter that combines range and domain filtering. This method is
    non-iterative, local, and simple. The bilateral filter takes the weighted sum
    of pixels in a local neighbourhood; the weights depend on both spatial and intensity
    distances. Mathematically, the output of the bilateral filter at a pixel location
    "x" is calculated as


    $$\tilde{I}(x) = \frac{1}{C} \sum_{y \in N(x)} e^{-\frac{\|y-x\|^2}{2\sigma_d^2}}
    e^{-\frac{|I(y)-I(x)|^2}{2\sigma_r^2}} I(y)$$ (5.10)


    where "$\sigma_d$" and "$\sigma_r$" are parameters controlling the fall-off of
    weights in spatial and intensity domains, respectively, $N(x)$ is a spatial neighbourhood
    of pixel $I(x)$, and $C$ is the normalization constant that is given by


    $$C = \sum_{y \in N(x)} e^{-\frac{\|y-x\|^2}{2\sigma_d^2}} e^{-\frac{|I(y)-I(x)|^2}{2\sigma_r^2}}$$
    (5.11)


    The first exponential term in Eq. (5.10) is a domain filtering term, and the second
    is an exponential term, a range filtering term. Thus, bilateral filtering is a
    combination of domain and range filtering. In domain filters like Gaussian filters,
    the filter weights are assigned using the spatial closeness, which has the tendency
    to blur the edges. In range filters, the filter weights are assigned according
    to the intensity difference. Here, the pixels with similar intensity to the central
    pixel are considered for blurring. Bilateral filter combines both domain and range
    filtering. Thus, a bilateral filter effectively smoothens the input image while
    preserving its edge information.


    Bilateral filtering replaces the pixel value at "x" with an average of similar
    and nearby pixel values. In smooth regions, the bilateral filter acts as a standard
    domain filter, but in the case of sharp boundaries, the range filter comes into
    the picture. When a bilateral filter is centred on a pixel on the bright side
    of the boundary, for example, the range term assumes a value close to "1" for
    pixels on the same side and close to "0" for pixels on the dark side. Thus, the
    filter replaces the centre bright pixel with an average of the bright pixels in
    its vicinity and ignores the dark pixels. Conversely, bright pixels are ignored
    when the filter is centred on a dark pixel. Thus, the bilateral filter effectively
    preserves the edges. The two parameters "$\sigma_d$" and "$\sigma_r$" control
    the behaviour of the bilateral filter.'

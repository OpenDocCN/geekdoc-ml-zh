    # ### 4.10.2 Low-Pass Filtering Using Gaussian Filter


    Gaussian filter is considered as weighted average filter. The Gaussian filter
    smooths by replacing each image pixel with a weighted average of the neighbouring
    pixels such that the weight given to a neighbour decreases monotonically with
    distance from the central pixel. The two-dimensional zero mean discrete Gaussian
    function is expressed as


    $$g[m,n] = e^{-\frac{(m^2+n^2)}{2\sigma^2}} \quad (4.13)$$


    In the above expression, $\sigma^2$ represents the variance of the Gaussian function.
    A larger variance implies a wider Gaussian filter and greater smoothing.



    **Fig. 4.119** Steps in homomorphic filter


    In the above expression, $i[m, n]$ and $r[m, n]$ represent the illumination and
    reflectance component. In general, slow spatial variation is exhibited by the
    illumination component and drastic spatial variation is exhibited by the reflectance
    component. Logarithmic transformation is used to separate the illumination and
    reflectance components. After separating the illumination and reflectance components,
    the Fourier transform of both components is taken. This spectrum is multiplied
    with filter transfer function $H[k, l]$ to obtain the filtered image. However,
    the filtered image is in frequency domain. To bring the result back to the spatial
    domain, the Inverse Fourier transform is applied. The final result is obtained
    by applying the exponential transformation. The steps followed in the homomorphic
    filter is illustrated in Fig. 4.119.



- md: "## Running the RLlib CLI\n\nNow that we have our `GymEnvironment` implemented\
    \ as a `gym.Env`, here's how you can use it with RLlib. You've seen the RLlib\
    \ CLI in action in Chapter 1 before, but this time the situation is a bit different.\
    \ In the first chapter we simply referenced the Pendulum-v1 environment from by\
    \ *name* in a YAML file, along with other RL training configuration. This time\
    \ around we want to bring our own `gym` environment class, namely the class `GymEnvironment`\
    \ that we defined in `maze_gym_env.py`. To specify this class in Ray RLlib, you\
    \ use the full qualifying name of the class from where you're referencing it,\
    \ i.e. in our case `maze_gym_env.GymEnvironment`. If you had a more complicated\
    \ Python project and your environment is stored in another module, you'd simply\
    \ add the module name accordingly.\n\nThe following YAML file specifies the minimal\
    \ configuration needed to train an RLlib algorithm on the `GymEnvironment` class.\
    \ To align as closely as possible with our experiment from Chapter 3, in which\
    \ we used Q-learning, we use DQN as the algorithm for our training run. Also,\
    \ to make sure we can control the time of training, we set an explicit stop condition,\
    \ namely by setting `timesteps_total` to 10000.\n\n```yaml\n# maze.yml\nmaze_env:\n\
    \    env: maze_gym_env.GymEnvironment ①\n    run: DQN\n    checkpoint_freq: 1\
    \ ②\n    stop:\n        timesteps_total: 10000 ③\n```\n\n- ① We specify the relative\
    \ Python path to our environment class here.\n- ② We store checkpoints of our\
    \ model after each training iteration.\n- ③ We can also specify a stopping condition\
    \ for training, here a maximum of 10000 steps.\n\nAssuming you store this configuration\
    \ in a file called `maze.yml` you can now kick off an RLlib training run by running\
    \ the following `train` command:\n\n```bash\nrllib train -f maze.yml\n```\n\n\
    This single line of code basically takes care of everything we did in Chapter\
    \ 3, but better. It runs a more sophisticated version of Q-Learning for us (DQN),\
    \ takes care of scaling out to multiple workers under the hood, and even creates\
    \ checkpoints of the algorithm automatically for us.\n\nFrom the output of that\
    \ training script you should see that Ray will write training results to a `logdir`\
    \ directory located at `~/ray_results/maze_env`. Within that folder you'll find\
    \ another directory that starts with `DQN_maze_gym_env.GymEnvironment_` and contains\
    \ both an identifier for this experiment (0ae8d in my case) and the current date\
    \ and time. Within that directory you should find several other subdirectories\
    \ starting with a checkpoint prefix. For the training run on my computer there\
    \ are a total of 10 checkpoints available and we're using the last one (checkpoint_000010/checkpoint-10)\
    \ to evaluate our trained RLlib algorithm with it. With the folders and checkpoints\
    \ generated on my machine the `rllib evaluate` command you can use reads as follows\
    \ (adapt the checkpoint path to what you see on your machine):\n\n```bash\nrllib\
    \ evaluate ~/ray_results/maze_env/DQN_maze_gym_env.Environment_0ae8d_00000_0_2022-02-08_13-52-59/checkpoint_000010/checkpoint-10\
    \ \\\n    --run DQN \\\n    --env maze_gym_env.Environment \\\n    --steps 100\n\
    ```\n\nThe algorithm used in `--run` and the environment specified with `--env`\
    \ have to match the ones used in the training run, and we evaluate the trained\
    \ algorithm for a total of 100 steps. This should lead to output of the following\
    \ form:\n\n```\nEpisode #1: reward: 1.0\nEpisode #2: reward: 1.0\nEpisode #3:\
    \ reward: 1.0\n...\nEpisode #13: reward: 1.0\n```\n\nIt should not come as a big\
    \ surprise that the DQN algorithm from RLlib gets the maximum reward of 1 for\
    \ the simple maze environment we tasked it with every single time.\n\nBefore moving\
    \ on to the Python API of RLlib, it should be noted that the `train` and `evaluate`\
    \ CLI commands can come in handy even for more complex environments. The YAML\
    \ configuration can take any parameter the Python API would, so in that sense\
    \ there is no limit for training your experiments on the command line².\n\n##\
    \ Using the RLlib Python API\n\nHaving said that, you will likely spend most of\
    \ your time coding your reinforcement learning experiments in Python. In the end\
    \ the RLlib CLI is merely a wrapper around the underlying Python library that\
    \ we're going to look at now.\n\nTo run RL workloads with RLlib from Python, your\
    \ main entrypoint is that of the `Trainer` class. Specifically, for the algorithm\
    \ of your choice you want to use the corresponding `Trainer` of it. In our case,\
    \ since we decided to use Deep Q-Learning (DQN) for demonstration purposes, we'll\
    \ use the `DQNTrainer` class.\n\n## Training RLlib models\n\nRLlib has good defaults\
    \ for all its Trainer implementations, meaning that you can initialize them without\
    \ having to tweak any configuration parameters for these trainers³. For instance,\
    \ to generate a DQN trainer you can simply use `DQNTrainer(env=GymEnvironment)`.\
    \ That said, it's worth noting that RLlib trainers are highly configurable, as\
    \ you will see in the following example. Specifically, we pass a config dictionary\
    \ to the Trainer constructor and tell it to use four workers in total. What that\
    \ means is that the DQNTrainer will spawn four Ray actors, each using a CPU kernel,\
    \ to train our DQN algorithm in parallel.\n\nAfter you've initialized your trainer\
    \ with the env you want to train on, and pass in the config you want, you can\
    \ simply call the train method. Let's use this method to train the algorithm for\
    \ ten iterations in total:\n\n```python\nfrom ray.tune.logger import pretty_print\n\
    from maze_gym_env import GymEnvironment\nfrom ray.rllib.agents.dqn import DQNTrainer\n\
    \ntrainer = DQNTrainer(env=GymEnvironment, config={\"num_workers\": 4}) ①\n\n\
    config = trainer.get_config() ②\nprint(pretty_print(config))\n\nfor i in range(10):\n\
    \    result = trainer.train() ③\n\nprint(pretty_print(result)) ④\n```\n\n- ① We\
    \ use the DQNTrainer from RLlib to use Deep-Q-Networks (DQN) for training, using\
    \ 4 parallel workers (Ray actors).\n- ② Each Trainer has a complex default configuration.\n\
    - ③ We can then simply call the train method to train the agent for ten iterations.\n\
    - ④ With the pretty_print utility we can generate human-readable output of the\
    \ training results.\n\nNote that the number 10 training iterations has no special\
    \ meaning, but it should be enough for the algorithm to learn to solve the maze\
    \ problem adequately. The example just goes to show you that you have full control\
    \ over the training process.\n\n> ³ Of course, configuring your models is a crucial\
    \ part of RL experiments. We will discuss configuration of RLlib trainers in more\
    \ detail in the next section.\n\n² We should mention that the RLlib CLI uses Ray\
    \ Tune under the hood, among many other things for checkpointing models. You will\
    \ learn more about this integration in Chapter 5."
  mdcn: "## 运行 RLlib 命令行工具\n\n既然我们已经将 `GymEnvironment` 实现为一个 `gym.Env`，下面介绍如何将其与 RLlib\
    \ 配合使用。你之前在第一章已经见过 RLlib 命令行工具的实际应用，但这次情况略有不同。在第一章中，我们只是在 YAML 文件中通过*名称*引用了 Pendulum-v1\
    \ 环境以及其他强化学习训练配置。而这次，我们希望引入自己的 `gym` 环境类，即我们在 `maze_gym_env.py` 中定义的 `GymEnvironment`\
    \ 类。要在 Ray RLlib 中指定这个类，你需要使用从引用位置开始的完整限定类名，在我们的例子中就是 `maze_gym_env.GymEnvironment`。如果你的\
    \ Python 项目更复杂，环境存储在另一个模块中，只需相应地添加模块名即可。\n\n以下 YAML 文件指定了在 `GymEnvironment` 类上训练\
    \ RLlib 算法所需的最小配置。为了尽可能贴近我们在第三章中使用 Q-learning 的实验，我们选择 DQN 作为训练运行的算法。同时，为了确保能控制训练时长，我们设置了一个明确的停止条件，即将\
    \ `timesteps_total` 设置为 10000。\n\n```yaml\n# maze.yml\nmaze_env:\n    env: maze_gym_env.GymEnvironment\
    \ ①\n    run: DQN\n    checkpoint_freq: 1 ②\n    stop:\n        timesteps_total:\
    \ 10000 ③\n```\n\n- ① 我们在此指定了环境类的相对 Python 路径。\n- ② 我们在每次训练迭代后保存模型的检查点。\n- ③ 我们还可以指定训练的停止条件，这里是最大\
    \ 10000 步。\n\n假设你将此配置存储在名为 `maze.yml` 的文件中，现在可以通过运行以下 `train` 命令来启动 RLlib 训练：\n\
    \n```bash\nrllib train -f maze.yml\n```\n\n这行代码基本上完成了我们在第三章中所做的所有工作，但效果更好。它为我们运行了一个更复杂的\
    \ Q-Learning 版本（DQN），在底层自动处理了扩展到多个工作节点的问题，甚至自动为我们创建了算法的检查点。\n\n从该训练脚本的输出中，你应该会看到\
    \ Ray 将训练结果写入位于 `~/ray_results/maze_env` 的 `logdir` 目录。在该文件夹内，你会找到另一个以 `DQN_maze_gym_env.GymEnvironment_`\
    \ 开头的目录，其中包含此实验的标识符（在我的例子中是 0ae8d）以及当前日期和时间。在该目录内，你应该能找到几个以检查点前缀开头的其他子目录。在我计算机上的训练运行中，总共有\
    \ 10 个可用的检查点，我们使用最后一个（checkpoint_000010/checkpoint-10）来评估我们训练好的 RLlib 算法。根据我机器上生成的文件夹和检查点，你可以使用的\
    \ `rllib evaluate` 命令如下所示（请根据你机器上看到的情况调整检查点路径）：\n\n```bash\nrllib evaluate ~/ray_results/maze_env/DQN_maze_gym_env.Environment_0ae8d_00000_0_2022-02-08_13-52-59/checkpoint_000010/checkpoint-10\
    \ \\\n    --run DQN \\\n    --env maze_gym_env.Environment \\\n    --steps 100\n\
    ```\n\n`--run` 中使用的算法和 `--env` 指定的环境必须与训练运行中使用的相匹配，我们将训练好的算法评估总共 100 步。这应该会产生如下形式的输出：\n\
    \n```\nEpisode #1: reward: 1.0\nEpisode #2: reward: 1.0\nEpisode #3: reward: 1.0\n\
    ...\nEpisode #13: reward: 1.0\n```\n\nRLlib 的 DQN 算法在我们为其设定的简单迷宫环境中，每次都能获得最大奖励\
    \ 1，这应该不会让人感到太意外。\n\n在继续介绍 RLlib 的 Python API 之前，需要指出的是，`train` 和 `evaluate` 命令行工具即使对于更复杂的环境也能派上用场。YAML\
    \ 配置可以接受 Python API 能接受的任何参数，因此从这个意义上说，在命令行上训练你的实验是没有限制的²。\n\n## 使用 RLlib Python\
    \ API\n\n话虽如此，你很可能会将大部分时间花在用 Python 编写强化学习实验上。毕竟，RLlib 命令行工具只是我们接下来要介绍的底层 Python\
    \ 库的一个封装。\n\n要从 Python 使用 RLlib 运行强化学习工作负载，你的主要入口点是 `Trainer` 类。具体来说，对于你选择的算法，你需要使用其对应的\
    \ `Trainer`。在我们的例子中，由于我们决定使用深度 Q-Learning（DQN）进行演示，我们将使用 `DQNTrainer` 类。\n\n##\
    \ 训练 RLlib 模型\n\nRLlib 为其所有 Trainer 实现提供了良好的默认设置，这意味着你可以初始化它们而无需调整这些 Trainer 的任何配置参数³。例如，要生成一个\
    \ DQN Trainer，你只需使用 `DQNTrainer(env=GymEnvironment)`。话虽如此，值得注意的是 RLlib Trainer\
    \ 是高度可配置的，正如你将在以下示例中看到的。具体来说，我们向 Trainer 构造函数传递一个配置字典，并告诉它总共使用四个工作节点。这意味着 DQNTrainer\
    \ 将生成四个 Ray actor，每个使用一个 CPU 核心，来并行训练我们的 DQN 算法。\n\n在你用想要训练的环境初始化 Trainer 并传入所需的配置后，你只需调用\
    \ train 方法。让我们使用此方法总共训练算法十次迭代：\n\n```python\nfrom ray.tune.logger import pretty_print\n\
    from maze_gym_env import GymEnvironment\nfrom ray.rllib.agents.dqn import DQNTrainer\n\
    \ntrainer = DQNTrainer(env=GymEnvironment, config={\"num_workers\": 4}) ①\n\n\
    config = trainer.get_config() ②\nprint(pretty_print(config))\n\nfor i in range(10):\n\
    \    result = trainer.train() ③\n\nprint(pretty_print(result)) ④\n```\n\n- ① 我们使用\
    \ RLlib 的 DQNTrainer 来使用深度 Q 网络（DQN）进行训练，使用 4 个并行工作节点（Ray actor）。\n- ② 每个 Trainer\
    \ 都有一个复杂的默认配置。\n- ③ 然后我们可以简单地调用 train 方法来训练智能体十次迭代。\n- ④ 使用 pretty_print 工具，我们可以生成训练结果的人类可读输出。\n\
    \n请注意，数字 10 次训练迭代没有特殊含义，但它应该足以让算法学会充分解决迷宫问题。这个例子只是为了向你展示你对训练过程拥有完全的控制权。\n\n> ³\
    \ 当然，配置你的模型是强化学习实验的关键部分。我们将在下一节更详细地讨论 RLlib Trainer 的配置。\n\n² 我们应该提到，RLlib 命令行工具在底层使用了\
    \ Ray Tune，以及许多其他功能，例如模型检查点。你将在第五章中了解更多关于此集成的信息。"

  - '[PAGE 64]


    +   1. This task defers to the original `update_policy` function by passing a
    reference to a policy and experiences retrieved from the object store.

    2. To train in parallel, we first create a policy remotely, which returns a reference
    we call `policy`.

    3. Instead of one simulation, we create four simulation actors.

    4. Experiences now get collected from remote roll-outs on simulation actors.

    5. Then we can update our policy remotely. Note that `experiences` is a nested
    list of experiences.

    6. Finally, we return the trained policy by retrieving it from the object store
    again.


    This allows us to take the last step and run the training procedure in parallel
    and then evaluate the resulting as before.


    *Example 3-15.*


    ```

    parallel_policy = train_policy_parallel()

    evaluate_policy(environment, parallel_policy)

    ```


    The result of those two lines is the same as before, when we ran the serial version
    of the RL training for the maze. I hope you appreciate how `train_policy_parallel`
    has the exact same high-level structure as `train_policy`. It’s a good exercise
    to compare the two line-by-line. Essentially, all it took to parallelize the training
    process was to use the `ray.remote` decorator three times in a suitable way. Of
    course, you need some experience to get this right. But notice how little time
    we spent on thinking about distributed computing, and how much time we could spend
    on the actual application code. We didn’t need to adopt an entirely new programming
    paradigm and could simply approach the problem in the most natural way. Ultimately,
    that’s what you want — and Ray is great at giving you this kind of flexibility.


    To wrap things up, let’s have a quick look at the task execution graph of the
    Ray application that we’ve just built. To recap, what we did was:


    +   - The `train_policy_parallel` function creates several `SimulationActor` actors
    and a policy with `create_policy`

    - The simulation actors create roll-outs with the policy and thereby collect experiences
    that `update_policy_task` uses to update the policy.

    - This works, because of the way updating the policy is designed. It doesn’t matter
    if the experiences were collected by one or multiple simulations.'

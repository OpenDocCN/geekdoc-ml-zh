    \ = '|X'\n    grid[self.goal[0]][self.goal[1]] = '|G'\n    grid[self.seeker[0]][self.seeker[1]]\
    \ = '|S'\n    print(''.join([''.join(grid_row) for grid_row in grid]))\n```\n\n\
    There are many other ways you could make this environment harder, like making\
    \ it much bigger, introducing a negative reward for every step the agent takes\
    \ in a certain direction, or punishing the agent for trying to walk off the grid.\
    \ By now you should understand the problem setting well enough to customize the\
    \ maze yourself further.\n\nWhile you might have success training this environment,\
    \ this is a good opportunity to introduce some advanced concepts that you can\
    \ apply to other RL problems.\n\n# Applying Curriculum Learning\n\nOne of the\
    \ most interesting features of RLlib is to provide a Trainer with a *curriculum*\
    \ to learn from. What that means is that, instead of letting the trainer learn\
    \ from arbitrary environment setups, we cherry pick states that are much easier\
    \ to learn from and then slowly but surely introduce more difficult states. Building\
    \ a learning curriculum this way is a great way to make your experiments converge\
    \ on solutions quicker. The only thing you need to apply curriculum learning is\
    \ a view on which starting states are easier than others. For many environments\
    \ that can actually be a challenge, but it's easy to come up with a simple curriculum\
    \ for our advanced maze. Namely, the distance of the seeker from the goal can\
    \ be used as a measure of difficulty. The distance measure we'll use for simplicity\
    \ is the sum of the absolute distance of both seeker coordinates from the goal\
    \ to define a difficulty.\n\nTo run curriculum learning with RLlib, we define\
    \ a `CurriculumEnv` that extends both our `AdvancedEnv` and a so-called `TaskSettableEnv`\
    \ from RLLib. The interface of `TaskSettableEnv` is very simple, in that you only\
    \ have to define how get the current difficulty."

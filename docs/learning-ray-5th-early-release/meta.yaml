  - "[PAGE 32]\n\n# Python’s Global Interpreter Lock\n\nThe Global Interpreter Lock\
    \ or GIL¹ is undoubtedly one of the most infamous features of the Python language.\
    \ In a nutshell it’s a lock that makes sure only one thread on your computer can\
    \ ever execute your Python code at a time. If you use multi-threading, the threads\
    \ need to take turns controlling the Python interpreter.\n\nThe GIL has been implemented\
    \ for good reasons. For one, it makes memory management that much easier in Python.\
    \ Another key advantage is that it makes single-threaded programs quite fast.\
    \ Programs that primarily use lots of system input and output (we say they are\
    \ I/O-bound), like reading files or databases, benefit as well. One of the major\
    \ downsides is that CPU-bound programs are essentially single-threaded. In fact,\
    \ CPU-bound tasks might even run *faster* when not using multi-threading, as the\
    \ latter incurs write-lock overheads on top of the GIL.\n\nGiven all that, the\
    \ GIL might somewhat paradoxically be one of the reasons for Python’s popularity,\
    \ if you believe [Larry Hastings](https://larryhastings.com/). Interestingly,\
    \ Hastings also led (unsuccessful) efforts to remove it in a project called *GILectomy*,\
    \ which is exactly the kind of complicated surgery that it sounds like. The jury\
    \ is still out, but [Sam Gross](https://github.com/colesbury) might just have\
    \ found a way to remove the GIL in his nogil branch of Python 3.9. For now, if\
    \ you absolutely have to work around the GIL, consider using an implementation\
    \ different from CPython. CPython is Python’s standard implementation, and if\
    \ you don’t know that you’re using it, you’re definitely using it. Implementations\
    \ like Jython, IronPython or PyPy don’t have a GIL, but come with their own drawbacks.\n\
    \n# Functions and Remote Ray Tasks\n\nIt’s reasonable to assume that such a task\
    \ can benefit from parallelization. Perfectly distributed, the runtime should\
    \ not take much longer than the longest subtask, namely 7/10. = 0.7 seconds. So,\
    \ let’s see how you can extend this example to run on Ray. To do so, you start\
    \ by using the `@ray.remote` decorator as follows:\n\n*Example 2-4.*\n\n```\n\
    @ray.remote ❶\ndef retrieve_task(item):\n    return retrieve(item) ❷\n```\n\n\
    +   ❶ With just this decorator we make any Python function a Ray task.\n❷ All\
    \ else remains unchanged. retrieve_task just passes through to retrieve.\n\n1\
    \ I still don’t know how to pronounce this acronym, but I get the feeling that\
    \ the same people who pronounce GIF like “giraffe” also say GIL like “guitar”.\
    \ Just pick one, or spell it out, if you feel insecure."

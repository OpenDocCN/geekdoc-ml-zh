  md: "How should we compare the knowledge of this value to the current state-action\
    \ value, which is value = policy.state_action_table[state][action]? There are\
    \ many ways to go about this, but we clearly can't completely discard the current\
    \ value and put too much trust in next_max. After all, this is just a single piece\
    \ of experience we're using here. So as a first approximation, why don't we simply\
    \ compute a weighted sum of the old and the expected value and go with new_value\
    \ = 0.9 * value + 0.1 * next_max? Here, the values 0.9 and 0.1 have been chosen\
    \ somewhat arbitrarily, the only important piece is that the first value is high\
    \ enough to reflect our preference to keep the old value, and that both weights\
    \ sum to 1. That formula is a good starting point, but the problem is that we're\
    \ not at all factoring in the crucial information that we're getting from the\
    \ reward. In fact, we should put more trust in the current reward value than in\
    \ the projected next_max value, so it's a good idea to discount the latter a little,\
    \ let's say by 10%. Updating the state-action value would then look like this:\n\
    \n```\nnew_value = 0.9 * value + 0.1 * (reward + 0.9 * next_max)\n```\n\nDepending\
    \ on your level of experience with this kind of reasoning, the last few paragraphs\
    \ might be a lot to digest. The good thing is that, if you've understood the explanations\
    \ up to this point, the remainder of this chapter will likely come easy to you.\
    \ Mathematically, this was the last (and only) hard part of this example. If you've\
    \ worked with RL before, you will have noticed by now that this is an implementation\
    \ of the so-called Q-Learning algorithm. It's called that, because the state-action\
    \ table can be described as a function Q(state, action) that returns values for\
    \ these pairs.\n\nWe're almost there, so let's formalize this procedure by implementing\
    \ an update_policy function for a policy and collected experiences:\n\nExample\
    \ 3-10.\n\n```\nimport numpy as np\n\ndef update_policy(policy, experiences, weight=0.1,\
    \ discount_factor=0.9):\n    \"\"\"Updates a given policy with a list of (state,\
    \ action, reward, state) experiences.\"\"\"\n    for state, action, reward, next_state\
    \ in experiences: ①\n        next_max = np.max(policy.state_action_table[next_state])\
    \ ②\n        value = policy.state_action_table[state][action] ③\n        new_value\
    \ = (1 - weight) * value + weight * (reward + discount_factor * next_max) ④\n\
    \        policy.state_action_table[state][action] = new_value ⑤\n```\n\n+   1.\
    \ We loop through all experiences in order.\n2. Then we choose the maximum value\
    \ among all possible actions in the next state.\n3. We then extract the current\
    \ state-action value."

    \ 的机器学习应用。\n\n## 使用 Tune 进行机器学习\n\n正如我们所看到的，Tune 功能多样，允许你为你给定的任何目标调整超参数。特别是，你可以将其与你感兴趣的任何机器学习框架一起使用。在本节中，我们将给你两个例子来说明这一点。\n\
    \n首先，我们将使用 Tune 来优化 RLlib 强化学习实验的参数，然后我们使用 Optuna 通过 Tune 调整 Keras 模型。\n\n###\
    \ 将 RLlib 与 Tune 结合使用\n\nRLlib 和 Tune 被设计为协同工作，因此你可以相当容易地为你现有的 RLlib 代码设置一个 HPO\
    \ 实验。事实上，RLlib Trainers 可以作为 Trainable 传递给 `tune.run` 的第一个参数。你可以选择实际的 Trainer\
    \ 类（如 DQNTrainer）或其字符串表示（如 \"DQN\"）。作为 Tune 指标，你可以传递你的 RLlib 实验跟踪的任何指标，例如 \"episode_reward_mean\"\
    。而 `tune.run` 的 config 参数就是你的 RLlib Trainer 配置，但你可以充分利用 Tune 的搜索空间 API 来采样超参数，如学习率或训练批大小¹。以下是我们刚刚描述的完整示例，在\
    \ CartPole-v0 gym 环境上运行一个调优的 RLlib 实验：\n\n示例 5-16。\n\n```\nfrom ray import tune\n\
    \nanalysis = tune.run(\n    \"DQN\",\n    metric=\"episode_reward_mean\",\n  \
    \  mode=\"max\",\n    config={\n        \"env\": \"CartPole-v0\",\n        \"\
    lr\": tune.uniform(1e-5, 1e-4),\n        \"train_batch_size\": tune.choice([10000,\
    \ 20000, 40000]),\n    },\n)\n```\n\n¹ 如果你好奇为什么 `tune.run` 中的 \"config\" 参数不叫\
    \ search_space，历史原因在于与 RLlib 配置对象的互操作性。\n\n### 调整 Keras 模型\n\n为了结束本章，让我们看一个稍微复杂一点的例子。正如我们之前提到的，这主要不是一本机器学习书籍，而是\

  - '[PAGE 137]


    Under the hood, Datasets implements Distributed Apache Arrow. Apache Arrow is
    a unified columnar data format for data processing libraries and applications,
    so integrating with it means that Datasets get interoperability with many of the
    most popular processing libraries such as NumPy and pandas out of the box.


    A Dataset consists of a list of Ray object references, each of which points at
    a “block” of data. These blocks are either Arrow tables or Python lists (for data
    that isn’t supported by the Arrow format) in Ray’s shared memory object store,
    and compute over the data such as for map or filter operations happens in Ray
    tasks (and sometimes actors).


    Because Datasets relies on the core Ray primitives of tasks and objects in the
    shared memory object store, it inherits key benefits of Ray: scalability to hundreds
    of nodes, efficient memory usage due to sharing memory across processes on the
    same node, and object spilling + recovery to gracefully handle failures. Additionally,
    because Datasets are just lists of object references, they can also be passed
    between tasks and actors efficiently without needing to make a copy of the data,
    which is crucial for making data-intensive applications and libraries scalable.


    # Datasets Basics


    This section will give a basic overview of Ray Datasets, covering how to get started
    reading, writing, and transforming datasets. This is not meant to be a comprehensive
    reference, but rather to introduce you to the basic concepts so we can build up
    to some interesting examples of what makes Ray Datasets powerful in later sections.
    For up-to-date information on what’s supported and exact syntax, see the Datasets
    documentation.


    To follow along with the examples in this section, please make sure you have Ray
    Data installed locally:


    ```

    pip install "ray[data]"==1.9.0

    ```


    # Creating a dataset


    First, let’s create a simple Dataset and perform some basic operations on it:


    Example 7-1.


    ```

    import ray


    # Create a dataset containing integers in the range [0, 10000).

    ds = ray.data.range(10000)


    # Basic operations: show the size of the dataset, get a few samples, print the
    schema.

    print(ds.count())  # -> 10000

    ```'

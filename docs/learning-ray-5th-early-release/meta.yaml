    \ of Tune runs that we'll discuss next.\n\n## Checkpoints, Stopping, and Resuming\n\
    \nThe more Tune trials you kick off and the longer they each run individually,\
    \ especially in a distributed setting, the more you need a mechanism to protect\
    \ you against failures, to stop a run, or pick a run up again from previous results.\
    \ Tune makes this possible by periodically creating *checkpoints* for you. The\
    \ checkpoint cadence is dynamically adjusted by Tune to ensure at least 95% of\
    \ the time is spent on running trials, and not too many resources are devoted\
    \ to storing checkpoints.\n\nIn the example we just computed, the checkpoint directory,\
    \ or `logdir`, used was `/Users/maxpumperla/ray_results/objective_2022-05-23_15-52-01`.\
    \ If you ran this example on your machine, by default its structure would be `~/ray_results/<your-objective>_<date>_<time>`.\
    \ If you know this name of your experiment, you can easily resume it like so:\n\
    \nExample 5-12.\n\n```\nanalysis = tune.run(\n    objective,\n    name=\"/Users/maxpumperla/ray_results/objective_2022-05-23_15-52-01\"\
    ,\n    resume=True,\n    config=search_space)\n```\n\nSimilarly, you can *stop*\
    \ your trials by defining stopping conditions and explicitly passing them to your\
    \ `tune.run`. The easiest option to do that, and we've already seen this option\
    \ before, is by providing a dictionary with a stopping condition. Here's how you\
    \ stop running our objective analysis after reaching a `training_iteration` count\
    \ of 10, a built-in metric of all Tune runs:\n\nExample 5-13.\n\n```\ntune.run(\n\
    \    objective,\n    config=search_space,\n    stop={\"training_iteration\": 10})\n\
    ```\n\nOne of the drawbacks of this way of specifying a stopping condition is\
    \ that it assumes the metric in question is *increasing*. For instance, the score\
    \ we compute starts high and is something we want to minimize. To formulate a\
    \ flexible stopping condition for our score, the best way is to provide a stopping\
    \ function as follows.\n\nExample 5-14.\n\n```\ndef stopper(trial_id, result):\n\
    \    return result[\"score\"] < 2\n\ntune.run(\n    objective,\n    config=search_space,\n\
    \    stop=stopper)\n```\n\nIn situations that require a stopping condition with\
    \ more context or explicit state, you can also define a custom Stopper class to\
    \ pass into the stop argument of your Tune run, but we won't cover this case here.\n\
    \n## Custom and conditional search spaces\n\nThe last more advanced topic we're\
    \ going to cover here is that of complex search spaces. So far, we've only looked\
    \ at hyperparameters that were independent of each other, but in practice it happens\
    \ quite often that some depend on others. Also, while Tune's built-in search spaces\
    \ have quite a lot to offer, sometimes you might want to sample parameters from\
    \ a more exotic distribution or your own modules.\n\nHere's how you can handle\
    \ both situations in Tune. Continuing with our simple objective example, let's\
    \ say that instead of Tune's tune.uniform you want to use the random.uniform sampler\
    \ from the numpy package for your weight parameter. And then your bias parameter\
    \ should be weight times a standard normal variable. Using tune.sample_from you\
    \ can tackle this situation (or more complex and nested ones) as follows:\n\n\
    Example 5-15.\n\n```\nfrom ray import tune\nimport numpy as np\n\nsearch_space\
    \ = {\n    \"weight\": tune.sample_from(lambda context: np.random.uniform(low=0.0,\
    \ high=1.0)),\n    \"bias\": tune.sample_from(lambda context: context.config.alpha\
    \ * np.random.normal())\n}\n\ntune.run(objective, config=search_space)\n```\n\n\
    There are many more interesting features to explore in Ray Tune, but let's switch\

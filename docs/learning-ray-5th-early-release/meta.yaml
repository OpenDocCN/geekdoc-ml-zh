    \ images of handwritten digits. We normalize the pixel values to be between 0\
    \ and 1, and make the labels for those ten digits categorical variables. Here's\
    \ how you can do this purely with Keras' built-in functionality (make sure to\
    \ pip install tensorflow before running this):\n\nExample 5-17.\n\n```\nfrom tensorflow.keras.datasets\

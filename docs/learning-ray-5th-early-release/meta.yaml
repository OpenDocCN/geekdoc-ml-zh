    dataset = from_pandas(dataset_df)

    ```


    +   ❶ Load breast cancer data into a Pandas DataFrame.

    ❷ Create a Ray Dataset from the DataFrame.


    > 2 Ray can handle much larger datasets than that. In Chapter 7 we''ll take a
    closer look at the Ray Data library to see how to handle huge datasets.'

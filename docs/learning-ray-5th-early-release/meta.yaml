    Machine learning models have parameters that are tuned in the model training step.
    Most ML models also have another set of parameters, called *hyperparameters* that
    can be modified prior to training. These parameters can heavily influence the
    performance of your resulting ML model and need to be tuned properly. There are
    good tools to help automate that process.


    Model serving

    Trained models need to be deployed. To serve a model means to make it available
    to whoever needs access by whatever means necessary. In prototypes, you often'

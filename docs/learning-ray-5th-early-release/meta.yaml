    \ ②\n        value = policy.state_action_table[state][action] ③\n        new_value\
    \ = (1 - weight) * value + weight * (reward + discount_factor * next_max) ④\n\
    \        policy.state_action_table[state][action] = new_value ⑤\n```\n\n+   1.\
    \ We loop through all experiences in order.\n2. Then we choose the maximum value\
    \ among all possible actions in the next state.\n3. We then extract the current\
    \ state-action value.\n4. The new value is the weighted sum of the old value and\
    \ the expected value, which is the sum of the current reward and the discounted\
    \ next_max.\n5. After updating, we set the new state_action_table value.\n\nHaving\
    \ this function in place now makes it really simple to train a policy to make\
    \ better decisions. We can use the following procedure:\n\n- Initialize a policy\
    \ and a simulation.\n- Run the simulation many times, let's say for a total of\
    \ 10000 runs.\n- For each game, first collect the experiences by running a rollout.\n\
    - Then update the policy by calling update_policy on the collected experiences.\n\
    \nThat's it! The following train_policy function implements the above procedure\
    \ straight up.\n\nExample 3-11.\n\n```\ndef train_policy(env, num_episodes=10000,\
    \ weight=0.1, discount_factor=0.9):\n    \"\"\"Training a policy by updating it\
    \ with rollout experiences.\"\"\"\n    policy = Policy(env)\n    sim = Simulation(env)\n\
    \    for _ in range(num_episodes):\n        experiences = sim.rollout(policy)\
    \ ①\n        update_policy(policy, experiences, weight, discount_factor) ②\n\n\
    \    return policy\n\ntrained_policy = train_policy(environment) ③\n```\n\n+ \
    \  ① Collect experiences for each game.\n② Update our policy with those experiences.\n\
    ③ Finally, train and return a policy for our environment from before.\n\nNote\
    \ that the high-brow way of speaking of a full play-through of the maze game is\
    \ an episode in the RL literature. That's why we call the argument num_episodes\
    \ in the train_policy function, rather than num_games.\n\n## Q-Learning\n\nThe\
    \ Q-Learning algorithm we just implemented is often the first algorithm taught\
    \ in RL classes, mostly because it is relatively easy to reason about. You collect\
    \ and tabulate experience data that shows you how well state-action pairs work,\
    \ and update the table according to the Q-learning update rule.\n\nFor RL problems\
    \ that either have a huge number of states or actions, the Q-table can become\
    \ excessively large. The algorithm then becomes inefficient, because it would\
    \ take too much time to collect enough experience data for all (relevant) state-action\
    \ pairs.\n\nOne way to address this issue is to use a neural network to approximate\
    \ the Q-table. By this we mean that you can employ a deep neural network to learn\
    \ a function that maps states to actions. This approach is called Deep Q-Learning\
    \ and the networks used for learning are called Deep Q-Networks (DQN). From Chapter\
    \ 4 on out we will exclusively use deep learning to tackle RL problems in this\
    \ book.\n\nNow that we have a trained policy, let's see how well it performs.\
    \ We've run random policies twice before in this chapter, just to get an idea\
    \ of how well they work for the maze problem. But let's now properly evaluate\
    \ our trained policy on several games and see how it does on average. Specifically,\

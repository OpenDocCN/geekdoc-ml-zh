  md: "# Training RLlib models\n\nRLlib has good defaults for all its Trainer implementations,\
    \ meaning that you can initialize them without having to tweak any configuration\
    \ parameters for these trainers³. For instance, to generate a DQN trainer you\
    \ can simply use DQNTrainer(env=GymEnvironment). That said, it's worth noting\
    \ that RLlib trainers are highly configurable, as you will see in the following\
    \ example. Specifically, we pass a config dictionary to the Trainer constructor\
    \ and tell it to use four workers in total. What that means is that the DQNTrainer\
    \ will spawn four Ray actors, each using a CPU kernel, to train our DQN algorithm\
    \ in parallel.\n\nAfter you've initialized your trainer with the env you want\
    \ to train on, and pass in the config you want, you can simply call the train\
    \ method. Let's use this method to train the algorithm for ten iterations in total:\n\

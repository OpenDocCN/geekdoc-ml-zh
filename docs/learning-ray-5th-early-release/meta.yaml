  md: "Next, we define a Tune objective function, or Trainable, by loading the data\
    \ we just defined, setting up a sequential Keras model with hyperparameters selected\
    \ from the config we pass into our objective, and then compile and fit the model.\
    \ To define our deep learning model, we first flatten the MNIST input images to\
    \ vectors and then add two fully-connected layers (called Dense in Keras) and\
    \ a Dropout layer in between. The hyperparameters we want to tune are the activation\
    \ function of the first Dense layer, the Dropout rate, and the number of “hidden”\
    \ output units of the first layer. We could tune any other hyperparameter of this\
    \ model the same way, this selection is just an example.\n\nWe could manually\
    \ report a metric of interest in the same way we did in other examples in this\
    \ chapter (e.g. by returning a dictionary in our objective or using tune.report(...)).\
    \ But since Tune comes with a proper Keras integration, we can use the so-called\
    \ TuneReportCallback as a custom Keras callback that we pass into our model’s\
    \ fit method. This is what our Keras objective function looks like:\n\nExample\
    \ 5-18.\n\n```\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Flatten, Dense, Dropout\nfrom ray.tune.integration.keras import TuneReportCallback\n\
    \ndef objective(config):\n    (x_train, y_train), (x_test, y_test) = load_data()\n\
    \    model = Sequential()\n    model.add(Flatten(input_shape=(28, 28)))\n    model.add(Dense(config[\"\
    hidden\"], activation=config[\"activation\"]))\n    model.add(Dropout(config[\"\
    rate\"]))\n    model.add(Dense(10, activation=\"softmax\"))\n\n    model.compile(loss=\"\
    categorical_crossentropy\", metrics=[\"accuracy\"])\n    model.fit(x_train, y_train,\
    \ batch_size=128, epochs=10,\n              validation_data=(x_test, y_test),\n\
    \              callbacks=[TuneReportCallback({\"mean_accuracy\": \"accuracy\"\
    })])\n```\n\nNext, let’s use a custom search algorithm to tune this objective.\
    \ Specifically, we’re using the HyperOptSearch algorithm, which gives us access\
    \ to HyperOpt’s TPE algorithm through Tune. To use this integration, make sure\
    \ to install HyperOpt on your machine (for instance with pip install hyperopt==0.2.5).\
    \ HyperOptSearch allows us to define a list of promising, initial hyperparameter\
    \ choices to investigate. This is entirely optional, but sometimes you might have\
    \ good guesses to start from. In our case, we go with a dropout \"rate\" of 0.2,\
    \ 128 \"hidden\" units, and a rectified linear unit (ReLU) \"activation\" function\

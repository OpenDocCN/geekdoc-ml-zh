  mdcn: "具有*连续*动作空间，第1章中的摆锤示例就是其中一个例子。特别是当有多个智能体时，动作空间可能更复杂，你可能需要动作元组，甚至相应地嵌套它们。我们为迷宫游戏考虑的*观察空间*也相当简单，被建模为离散的状态集。你可以很容易地想象到，像机器人这样与环境交互的复杂智能体可能会使用图像或视频数据作为观察，这也将需要更复杂的观察空间。\n\

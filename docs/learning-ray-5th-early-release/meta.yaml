    \    \"env\": \"CartPole-v0\",\n        \"lr\": tune.uniform(1e-5, 1e-4),\n  \
    \      \"train_batch_size\": tune.choice([10000, 20000, 40000]),\n    },\n)\n\
    ```\n\n¹ In case you were wondering why the \"config\" argument in tune.run was\
    \ not called search_space, the historical reason lies in this interoperability\
    \ with RLlib config objects.\n\n### Tuning Keras Models\n\nTo wrap up this chapter,\

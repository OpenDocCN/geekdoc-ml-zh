    : 4, \"epochs\": 3}\ntrainer.start()\nresults = trainer.run(\n    train_func,\n\
    \    config,\n    dataset=datasets,\n    callbacks=[JsonLoggerCallback(), TBXLoggerCallback()],\n\
    )\ntrainer.shutdown()\nprint(results)\n```\n\n# Ray Train Features\n\n# Checkpoints\n\
    \nRay Train will generate **model checkpoints** to checkpoint intermediate state\
    \ for training. These model checkpoints provide the trained model and fitted preprocessor\
    \ for usage in downstream applications like serving and inference.\n\nExample\
    \ 6-14.\n\n```\nresult = trainer.fit()\nmodel: ray.train.Model = result.checkpoint.load_model()\n\
    ```\n\nThe goal of the model checkpoints is to abstract away the actual physical\
    \ representation of the model and preprocessor. As a result, you should be able\
    \ to generate a checkpoint from a cloud storage location, and convert it into\
    \ an in-memory representation or on-disk representation, and vice versa.\n\nExample\
    \ 6-15.\n\n```\nchkpt = Checkpoint.from_directory(dir)\nchkpt.to_bytes() -> bytes\n\
    ```\n\n# Callbacks\n\nYou may want to plug in your training code with your favorite\
    \ experiment management framework. Ray Train provides an interface to fetch intermediate\

- img_proc: true
  md: "The main benefits of Datasets are:\n\n*Flexibility*\n    Datasets support a\
    \ wide range of data formats, work seamlessly with library integrations like Dask\
    \ on Ray, and can be passed between Ray tasks and actors without copying data.\n\
    \n*Performance for ML workloads*\n    Datasets offers important features like\
    \ accelerator support, pipelining, and global random shuffles that accelerate\
    \ ML training and inference workloads.\n\nThis chapter is intended to get you\
    \ familiar with the core concepts for doing data processing on Ray and to help\
    \ you understand how to accomplish common patterns and why you would choose to\
    \ use different pieces to accomplish a task. The chapter assumes a basic familiarity\
    \ with data processing concepts such as map, filter, groupby, and partitions,\
    \ but it's not to be a tutorial on data science in general nor a deep dive into\
    \ the internals of how these operations are implemented. Readers with a limited\
    \ data processing / data science background should not have a problem following\
    \ along.\n\nWe'll start by giving a basic introduction to the core building block:\
    \ Ray Datasets. This will cover the architecture, basics of the API, and an example\
    \ how Datasets can be used to making building complex data-intensive applications\
    \ easy. Then, we'll briefly cover external library integrations on Ray, focusing\
    \ on Dask on Ray. Finally, we'll bring it all together by building a scalable\
    \ end-to-end machine learning pipeline in a single Python script.\n\nThe notebook\
    \ for this chapter [is also available online](https://github.com/ray-project/ray/tree/master/doc/source/data/examples).\n\
    \n# # Ray Datasets\n\n# ## An Overview of Datasets\n\nThe main goal of Datasets\
    \ is to support a scalable, flexible abstraction for data processing on Ray. Datasets\
    \ are intended to be the standard way to read, write, and transfer data across\
    \ the full ecosystem of Ray libraries. One of the most powerful uses of Datasets\
    \ is acting as the data ingest and preprocessing layer for machine learning workloads,\
    \ allowing you to efficiently scale up training using Ray Train and Ray Tune.\
    \ This will be explored in more detail in the last section of the chapter.\n\n\
    If you've worked with other distributed data processing APIs such as Apache Spark's\
    \ RDDs in the past, you will find the Datasets API very familiar. The core of\
    \ the API leans on functional programming and offers standard functionality such\
    \ as reading/writing many different data sources, performing basic transformations\
    \ like map, filter, and sort, as well as some simple aggregations such as groupby."

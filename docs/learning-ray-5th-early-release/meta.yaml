    from ray.rllib.agents.dqn import DQNTrainer\n\ntrainer = DQNTrainer(env=GymEnvironment,\
    \ config={\"num_workers\": 4}) ①\n\nconfig = trainer.get_config() ②\nprint(pretty_print(config))\n\

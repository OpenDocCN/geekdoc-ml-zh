    Getting Started With Ray Core


    > **A Note for Early Release Readers**

    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    For a book on distributed Python, it’s not without a certain irony that Python
    on its own is largely ineffective for distributed computing. Its interpreter is
    effectively single threaded which makes it difficult to, for example, leverage
    multiple CPUs on the same machine, let alone a whole cluster of machines, using
    plain Python. That means you need extra tooling, and luckily the Python ecosystem
    has some options for you. For instance, libraries like multiprocessing can help
    you distribute work on a single machine, but not beyond.


    In this chapter you’ll understand how Ray core handles distributed computing by
    spinning up a local cluster, and you’ll learn how to use Ray’s lean and powerful
    API to parallelize some interesting computations. For instance, you’ll build an
    example that runs a data-parallel task efficiently and asynchronously on Ray,
    in a convenient way that’s not easily replicable with other tooling. We discuss
    how tasks and actors work as distributed versions of functions and classes in
    Python. You’ll also learn about all the fundamental concepts underlying Ray and
    what its architecture looks like. In other words, we’ll give you a look under
    the hood of Ray’s engine.


    # An Introduction To Ray Core


    The bulk of this chapter is an extended Ray core example that we’ll build together.
    Many of Ray’s concepts can be explained with a good example, so that’s exactly
    what'

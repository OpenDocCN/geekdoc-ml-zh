    \nFinally, once we've computed our preprocessed Dask DataFrame, we transform it\
    \ into a Ray Dataset so we can pass it into our training and inference processes\
    \ later.\n\n# Defining a PyTorch model\n\nNow that we've cleaned and prepared\
    \ the data, we need to define a model architecture that we'll use for the model.\
    \ In practice, this would likely be an iterative process and involve researching\
    \ the state of the art for similar problems. For the sake of our example, we'll\
    \ keep things simple and use use a basic PyTorch neural network. The neural network\
    \ has three linear transformations starting with the dimension of our feature\
    \ vector and then outputs a value between 0 and 1 using a Sigmoid activation function.\
    \ This output value will be rounded to produce the binary prediction of if the\
    \ ride will result in a big tip or not.\n\nExample 7-21.\n\n```\nimport torch\n\
    import torch.nn as nn\nimport torch.nn.functional as F\n\nNUM_FEATURES = 6\n\n\
    class FarePredictor(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.fc1 = nn.Linear(NUM_FEATURES, 256)\n        self.fc2 = nn.Linear(256,\
    \ 16)\n        self.fc3 = nn.Linear(16, 1)\n\n        self.bn1 = nn.BatchNorm1d(256)\n\
    \        self.bn2 = nn.BatchNorm1d(16)\n\n    def forward(self, *x):\n       \
    \ x = torch.cat(x, dim=1)\n        x = F.relu(self.fc1(x))\n        x = self.bn1(x)\n\
    \        x = F.relu(self.fc2(x))\n        x = self.bn2(x)\n        x = F.sigmoid(self.fc3(x))\n\
    \n        return x\n```"
  merge: -1
  pgno: 154
- img_proc: true
  md: "# Distributed training with Ray Train\n\nNow that we've defined the neural\
    \ network architecture, we need a way to efficiently train this on our data. This\
    \ data set is very large (hundreds of gigabytes in total), so our best bet is\
    \ probably to perform distributed data-parallel training. We will use Ray Train,\
    \ which you learned about in Chapter 6, to define a scalable training process\
    \ that will use PyTorch DataParallel under the hood.\n\nThe first thing we need\
    \ to do is define the logic that will happen to train on a batch of data on each\
    \ worker in each epoch. This will take in a local shard of the full dataset, run\
    \ it through the local copy of the model, and perform backpropagation.\n\nExample\
    \ 7-22.\n\n```\nimport ray.train as train\n\ndef train_epoch(iterable_dataset,\
    \ model, loss_fn, optimizer, device):\n    model.train()\n    for X, y in iterable_dataset:\n\
    \        X = X.to(device)\n        y = y.to(device)\n\n        # Compute prediction\
    \ error.\n        pred = torch.round(model(X.float()))\n        loss = loss_fn(pred,\
    \ y)\n\n        # Backpropagation.\n        optimizer.zero_grad()\n        loss.backward()\n\
    \        optimizer.step()\n```\n\nNext, we also need to define the logic for each\
    \ worker to validate its current copy of the model in each epoch. This will run\
    \ a local batch of data through the model, compare the predictions to the actual\
    \ label values, and compute the subsequent loss using a provided loss function.\n\
    \nExample 7-23.\n\n```\ndef validate_epoch(iterable_dataset, model, loss_fn, device):\n\
    \    num_batches = 0\n    model.eval()\n    loss = 0\n    with torch.no_grad():\n\
    \        for X, y in iterable_dataset:\n            X = X.to(device)\n       \
    \     y = y.to(device)\n            num_batches += 1\n            pred = torch.round(model(X.float()))\n\
    ```"
  merge: -1
  pgno: 155
- img_proc: true
  md: "```\nloss += loss_fn(pred, y).item()\nloss /= num_batches\nresult = {\"loss\"\
    : loss}\nreturn result\n```\n\nFinally, we define the core training logic. This\
    \ will take in a variety of configuration options (such as a batch size and other\
    \ model hyperparameters), instantiate the model, loss function, and optimizer,\
    \ and then run the core training loop. In each epoch, each worker will get its\
    \ shard of the training and validation datasets, convert it to a local PyTorch\
    \ Dataset, and run the validation and training code we defined above. After each\
    \ epoch, the worker will using Ray Train utilities to report the result and save\
    \ the current model weights for use later.\n\nExample 7-24.\n\n```\ndef train_func(config):\n\
    \    batch_size = config.get(\"batch_size\", 32)\n    lr = config.get(\"lr\",\
    \ 1e-2)\n    epochs = config.get(\"epochs\", 3)\n\n    train_dataset_pipeline_shard\
    \ = train.get_dataset_shard(\"train\")\n    validation_dataset_pipeline_shard\
    \ = train.get_dataset_shard(\"validation\")\n\n    model = train.torch.prepare_model(FarePredictor())\n\
    \n    loss_fn = nn.SmoothL1Loss()\n    optimizer = torch.optim.Adam(model.parameters(),\
    \ lr=lr)\n\n    train_dataset_iterator = train_dataset_pipeline_shard.iter_epochs()\n\
    \    validation_dataset_iterator = \\n        validation_dataset_pipeline_shard.iter_epochs()\n\
    \n    for epoch in range(epochs):\n        train_dataset = next(train_dataset_iterator)\n\
    \        validation_dataset = next(validation_dataset_iterator)\n\n        train_torch_dataset\
    \ = train_dataset.to_torch(\n            label_column=LABEL_COLUMN,\n        \
    \    batch_size=batch_size,\n        )\n        validation_torch_dataset = validation_dataset.to_torch(\n\
    \            label_column=LABEL_COLUMN,\n            batch_size=batch_size)\n\n\
    \        device = train.torch.get_device()\n\n        train_epoch(train_torch_dataset,\
    \ model, loss_fn, optimizer, device)\n        result = validate_epoch(validation_torch_dataset,\
    \ model, loss_fn,\n                               device)\n```"
  merge: -1
  pgno: 156
- img_proc: true
  md: "```\ntrain.report(**result)\ntrain.save_checkpoint(epoch=epoch, model_weights=model.module.state_dict())\n\
    ```\n\nNow that the full training process has been defined, we need to load the\
    \ training and validation data to feed into our training workers. Here, we call\
    \ the load_dataset function we defined earlier that will do preprocessing and\
    \ featurization, then split the dataset into a training and validation Dataset¹.\
    \ Finally, we want to convert both Datasets into Dataset Pipelines for efficiency\
    \ and make sure that the training dataset is globally shuffled between all of\
    \ the workers in each epoch.\n\nExample 7-25.\n\n```\ndef get_training_datasets(*,\
    \ test_pct=0.8):\n    ds = load_dataset(\"nyc_tlc_data/yellow_tripdata_2020-01.csv\"\
    )\n    ds, _ = ds.split_at_indices([int(0.01 * ds.count())])\n    train_ds, test_ds\
    \ = ds.split_at_indices([int(test_pct * ds.count())])\n    train_ds_pipeline =\
    \ train_ds.repeat().random_shuffle_each_window()\n    test_ds_pipeline = test_ds.repeat()\n\
    \    return {\"train\": train_ds_pipeline, \"validation\": test_ds_pipeline}\n\
    ```\n\nEverything is set, and it's time to run our distributed training process!\
    \ All that's left is to create a Trainer, pass in our Datasets, and let the training\
    \ scale up and run across the configured number of workers. After training has\
    \ completed, we fetch the latest model weights using the checkpoint API.\n\nExample\
    \ 7-26.\n\n```\ntrainer = train.Trainer(\"torch\", num_workers=4)\nconfig = {\"\
    lr\": 1e-2, \"epochs\": 3, \"batch_size\": 64}\ntrainer.start()\ntrainer.run(train_func,\
    \ config, dataset=get_training_datasets())\nmodel_weights = trainer.latest_checkpoint.get(\"\
    model_weights\")\ntrainer.shutdown()\n```\n\n# Distributed batch inference with\
    \ Ray datasets\n\nOnce we've trained a model and gotten the best accuracy that\
    \ we can, the next step is to actually apply it in practice. Sometimes this means\
    \ powering a low-latency service, which we'll explore in ???, but often the task\
    \ is to apply the model across batches of data as they come in.\n\nLet's use the\
    \ trained model weights from the training process above and apply them across\
    \ a new batch of data (in this case, it'll just be another chunk of the same public\n\
    \n1 The code only loads a subset of the data for testing, to test at scale use\
    \ all partitions of the data when calling load_dataset and increase num_workers\
    \ when training the model."
  merge: -1
  pgno: 157
- img_proc: true
  md: "data set). To do this, first we need to load, preprocess, and featurize the\
    \ data in the same way we did for training. Then we will load our model and map\
    \ it across the whole data set. As discussed in the section above, Datasets allows\
    \ us to do this efficiently with Ray Actors, even using GPUs just by changing\
    \ one parameter. We simply wrap our trained model weights in a class that will\
    \ load them and configure a model for inference, then call map_batches and pass\
    \ in the inference model class:\n\nExample 7-27.\n\n```\nclass InferenceWrapper:\n\
    \    def __init__(self):\n        self._model = FarePredictor()\n        self._model.load_state_dict(model_weights)\n\
    \        self._model.eval()\n\n    def __call__(self, df):\n        tensor = torch.as_tensor(df.to_numpy(),\
    \ dtype=torch.float32)\n        with torch.no_grad():\n            predictions\
    \ = torch.round(self._model(tensor))\n        df[LABEL_COLUMN] = predictions.numpy()\n\
    \        return df\n\nds = load_dataset(\"nyc_tlc_data/yellow_tripdata_2021-01.csv\"\
    , include_label=False)\nds.map_batches(InferenceWrapper, compute=\"actors\").write_csv(\"\
    output\")\n```"
  merge: -1
  pgno: 158

    # Model Training


    Moving on to the next set of libraries, let''s look at the distributed training
    capabilities of Ray. For that, you have access to two libraries. One is dedicated
    to reinforcement learning specifically, the other one has a different scope and
    is aimed primarily at supervised learning tasks.


    # Reinforcement learning with Ray RLlib


    Let''s start with *Ray RLlib* for reinforcement learning. This library is powered
    by the modern ML frameworks TensorFlow and PyTorch, and you can choose which one
    to use. Both frameworks seem to converge more and more conceptually, so you can
    pick the one you like most without losing much in the process. Throughout the
    book we use TensorFlow for consistency. Go ahead and install it with `pip install
    tensorflow` right now.


    One of the easiest ways to run examples with RLlib is to use the command line
    tool `rllib`, which we''ve already implicitly installed earlier with pip. Once
    you run more complex examples in Chapter 4, you will mostly rely on its Python
    API, but for now we just want to get a first taste of running RL experiments.


    We''ll look at a fairly classical control problem of balancing a pendulum. Imagine
    you have a pendulum like the one in figure Figure 1-3, fixed at as single point
    and subject to gravity. You can manipulate that pendulum by giving it a push from
    the left or the right. If you assert just the right amount of force, the pendulum
    might remain in an upright position. That''s our goal - and the question is whether
    we can teach a reinforcement learning algorithm to do so for us.'

  - "[PAGE 107]\n\nand whether to minimize or optimize this metric. As we've argued\
    \ before, we want to achieve a \"min\" \"score\".\n\n# Schedulers\n\nLet's next\
    \ discuss how to use *trial schedulers* in Tune to make your runs more efficient.\
    \ We also use this section to introduce a slightly different way to report your\
    \ metrics to Tune within an objective function.\n\nSo, let's say that instead\
    \ of computing a score straight-up, like we did in all examples in this chapter\
    \ so far, we compute an *intermediate score* in a loop. This is a situation that\
    \ often occurs in supervised machine learning scenarios, when training a model\
    \ for several iterations (we'll see concrete applications of this later in this\
    \ chapter). With good hyperparameter choices selected, this immediate score might\
    \ stagnate way before the loop in which it is computed. In other words, if we\
    \ don't see enough incremental changes anymore, why not stop the trial early?\
    \ This is exactly one of the cases Tune's schedulers are built for.\n\nHere's\
    \ a quick example of such an objective function. This is a toy example, but it\
    \ will help us reason about the optimal hyperparameters we want Tune to find much\
    \ better than if we were discussing a black-box scenario.\n\n*Example 5-8.*\n\n\
    ```\ndef objective(config):\n    for step in range(30):  ①\n        score = config[\"\
    weight\"] * (step ** 0.5) + config[\"bias\"]\n        tune.report(score=score)\
    \  ②\n\nsearch_space = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0,\
    \ 1)}\n```\n\n+   ① Often you may want to compute intermediate scores, e.g. in\
    \ a “training loop”.\n② You can use `tune.report` to let Tune know about these\
    \ intermediate scores.\n\nThe score we want to minimize here is the square root\
    \ of a positive number times a weight, plus adding a bias term. It's clear that\
    \ both of these hyperparameters need to be as small as possible to minimize the\
    \ score for any positive x. Given that the square root function “flattens out”,\
    \ we might not have to compute all 30 passes through the loop to find sufficiently\
    \ good values for our two hyperparameters. If you imagine that each score computation\
    \ took an hour, stopping early can be a huge boost to make your experiments run\
    \ quicker."

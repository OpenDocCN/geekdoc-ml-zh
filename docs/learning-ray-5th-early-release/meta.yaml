- md: 'The model we''ve just had a look at has a dedicated output, in deep learning
    terms called a *head*, for predicting Q-values. You can access and summarize this
    part of the model through `model.q_value_head.summary()`.


    In contrast to that, it''s also possible to ask of how valuable a particular *state*
    is, without specifying an action that pairs with it. This leads to the concept
    of state-value functions, or simply value functions, that are very important in
    the RL literature. We can''t go into more detail in this RLlib introduction, but
    note that you have access to a *value function head* as well through `model.state_value_head.summary()`.


    Next, let''s see if we can take some observations from our environment and pass
    them to the model we just extracted from our policy. This part is a bit technically
    involved, because models are a bit more difficult to access directly in RLlib.
    The reason is that normally you would only interface with a model through your
    policy, which takes care of preprocessing the observations and passing them to
    the model (among other things).


    Luckily, we can simply access the preprocessor used by the policy, transform the
    observations from our environment, and then pass them to the model:


    ```

    from ray.rllib.models.preprocessors import get_preprocessor

    env = GymEnvironment()

    obs_space = env.observation_space

    preprocessor = get_preprocessor(obs_space)(obs_space) ❶


    observations = env.reset()

    transformed = preprocessor.transform(observations).reshape(1, -1) ❷


    model_output, _ = model.from_batch({"obs": transformed}) ❸

    ```


    - ❶ You can use `get_preprocessor` to access the preprocessor used by the policy.

    - ❷ For any observations obtained from your env you can use `transform` them to
    the format expected by the model. Note that we need to reshape the observations,
    too.

    - ❸ You get the model output by using the `from_batch` method of the model on
    a preprocessed observation dictionary.


    Having computed our `model_output`, we can now both access the Q-values, as well
    as the action distribution of the model for this output like this:


    ```

    q_values = model.get_q_value_distributions(model_output) ❶

    print(q_values)


    action_distribution = policy.dist_class(model_output, model) ❷

    sample = action_distribution.sample()

    print(sample)

    ```


    - ❶ The `get_q_value_distributions` method is specific to DQN models only.

    - ❷ By accessing `dist_class` we get the policy''s action distribution class.

    - ❸ Action distributions can be sampled from.


    ## Configuring RLlib Experiments


    Now that you''ve seen the basic Python training API of RLlib in an example, let''s
    take a step back and discuss in more depth how to configure and run RLlib experiments.
    By now you know that your Trainer takes a config argument, which so far we''ve
    only used to set the number of Ray workers to 4.


    If you want to alter the behaviour of your RLlib training run, the way to do this
    is to change the config argument of your Trainer. This is at the same time relatively
    simple, as you can add configuration properties quickly, and a bit tricky, as
    you have to know which key-words the config dictionary expects. Finding and tweaking
    the right configuration properties becomes easier once you have a good grasp of
    what''s available and what to expect.


    RLlib configuration splits in two parts, namely algorithm-specific and common
    configuration. We''ve used DQN as our algorithm in the examples so far, which
    has certain properties that are only available to this choice⁶. Algorithm-specific
    configuration only becomes more relevant once you''ve settled on an algorithm
    and want to squeeze it for performance, but in practice RLlib provides you with
    good defaults to get started. You can look up configuration arguments in the [API
    reference for RLlib algorithms](https://docs.ray.io/en/latest/rllib/rllib-training.html#common-parameters).


    The common configuration of algorithms can be further split into the following
    types.


    ### Resource Configuration


    Whether you use Ray RLlib locally or on a cluster, you can specify the resources
    used for the training process. Here are the most important options to consider:


    ⁶ For the experts, our DQNs are dueling double Q-learning models via the "dueling":
    True and "double_q": True default arguments, for example.


    - `num_gpus`: Specify the number of GPUs to use for training. It''s important
    to check whether your algorithm of choice supports GPUs first. This value can
    also be fractional. For example, if using four rollout workers in DQN (`num_workers
    = 4`), you can set `num_gpus=0.25` to pack all four workers on the same GPU, so
    that all trainers benefit from the potential speedup.

    - `num_cpus_per_worker`: Set the number of CPUs to use for each worker.


    ### Debugging and Logging Configuration


    Debugging your applications is crucial for any project, and machine learning is
    no exception. RLlib allows you to configure the way it logs information and how
    you can access it.


    - `log_level`: Set the level of logging to use. This can be either DEBUG, INFO,
    WARN, or ERROR and defaults to WARN. You should experiment with the different
    levels to see what suits your needs best in practice.

    - `callbacks`: You can specify custom callback functions to be called at various
    points during training. We will take a closer look at this topic in Chapter 5.

    - `ignore_worker_failures`: For testing it might be useful to ignore worker failures
    by setting this property to True (defaults to False).

    - `logger_config`: You can specify a custom logger configuration, passed in as
    a nested dictionary.


    ### Rollout Worker and Evaluation Configuration


    Of course, you can also specify how many workers are used for rollouts during
    training and evaluation.


    - `num_workers`: You''ve seen this one already. It''s used to specify the number
    of Ray workers to use.

    - `num_envs_per_worker`: Specify the number of environments to evaluate per worker.
    This setting allows you to “batch” evaluation of environments. In particular,
    if your models take a long time to evaluate, grouping environments like this can
    speed up training.

    - `create_env_on_driver`: If you''ve set `num_workers` at least to 1, then the
    driver process does not need to create an environment, since there are rollout
    workers for that. If you set this property to True you create an additional environment
    on the driver.

    - `explore`: Set to True by default, this property allows you to turn off exploration,
    for instance during evaluation of your algorithms.

    - `evaluation_num_workers`: Specify the number of parallel evaluation workers
    to use, which defaults to 0.


    ### Environment Configuration


    - `env`: Specify the environment you want to use for training. This can either
    be a string of an environment known to Ray RLlib, such as any gym environment,
    or the class name of a custom environment you''ve implemented. There''s also a
    way to register your environments so that you can refer to them by name, but this
    requires using Ray Tune. We will learn about this feature in Chapter 5.

    - `observation_space` and `action_space`: You can specify the observation and
    action spaces of your environment. If you don''t specify them, they will be inferred
    from the environment.

    - `env_config`: You can optionally specify a dictionary of configuration options
    for your environment that will be passed to the environment constructor.

    - `render_env`: False by default, this property allows you to turn on rendering
    of the environment, which requires you to implement the `render` method of your
    environment.


    Note that we left out many available configuration options for each of the types
    we listed. On top of that, there''s a class of common configuration options to
    modify the behavior of the RL training procedure, like modifying the underlying
    model to use. These properties are the most important in a sense, while at the
    same time require the most specific knowledge of reinforcement learning. For this
    introduction to RLlib, we can''t go into any more details. But the good news is
    that if you''re a regular user of RL software, you will have no trouble identifying
    the relevant training configuration options.'
  mdcn: '我们刚刚查看的模型有一个专门的输出，在深度学习术语中称为*头*，用于预测Q值。你可以通过 `model.q_value_head.summary()`
    访问并总结模型的这一部分。


    与此相对，我们也可以询问一个特定*状态*的价值，而无需指定与之配对的动作。这引出了状态价值函数，或简称价值函数的概念，这在强化学习文献中非常重要。在这个RLlib简介中，我们无法深入更多细节，但请注意，你也可以通过
    `model.state_value_head.summary()` 访问一个*价值函数头*。


    接下来，让我们看看是否可以从环境中获取一些观测值，并将它们传递给我们刚刚从策略中提取的模型。这部分在技术上有点复杂，因为在RLlib中直接访问模型稍微困难一些。原因是通常你只能通过策略与模型交互，策略负责预处理观测值并将其传递给模型（以及其他事情）。


    幸运的是，我们可以简单地访问策略使用的预处理器，转换来自环境的观测值，然后将它们传递给模型：


    ```

    from ray.rllib.models.preprocessors import get_preprocessor

    env = GymEnvironment()

    obs_space = env.observation_space

    preprocessor = get_preprocessor(obs_space)(obs_space) ❶


    observations = env.reset()

    transformed = preprocessor.transform(observations).reshape(1, -1) ❷


    model_output, _ = model.from_batch({"obs": transformed}) ❸

    ```


    - ❶ 你可以使用 `get_preprocessor` 来访问策略使用的预处理器。

    - ❷ 对于从你的环境中获得的任何观测值，你可以使用 `transform` 将它们转换为模型期望的格式。注意，我们还需要重塑观测值。

    - ❸ 通过在预处理后的观测字典上使用模型的 `from_batch` 方法，你可以获得模型输出。


    计算出我们的 `model_output` 后，我们现在既可以访问Q值，也可以访问模型针对此输出的动作分布，如下所示：


    ```

    q_values = model.get_q_value_distributions(model_output) ❶

    print(q_values)


    action_distribution = policy.dist_class(model_output, model) ❷

    sample = action_distribution.sample()

    print(sample)

    ```


    - ❶ `get_q_value_distributions` 方法仅适用于DQN模型。

    - ❷ 通过访问 `dist_class`，我们获得了策略的动作分布类。

    - ❸ 动作分布可以被采样。


    ## 配置RLlib实验


    既然你已经通过一个示例了解了RLlib的基本Python训练API，让我们退一步，更深入地讨论如何配置和运行RLlib实验。到现在为止，你知道你的Trainer接受一个config参数，到目前为止我们只用它来将Ray
    workers的数量设置为4。


    如果你想改变RLlib训练运行的行为，方法就是改变Trainer的config参数。这同时相对简单，因为你可以快速添加配置属性，但也有些棘手，因为你必须知道config字典期望哪些关键字。一旦你很好地掌握了有哪些可用选项以及预期效果，找到并调整正确的配置属性就会变得更容易。


    RLlib配置分为两部分，即特定于算法的配置和通用配置。到目前为止，我们在示例中使用DQN作为我们的算法，它具有某些仅适用于此选择的属性⁶。特定于算法的配置只有在你确定了算法并想要优化其性能时才变得更加相关，但在实践中，RLlib为你提供了良好的默认设置来入门。你可以在
    [RLlib算法的API参考](https://docs.ray.io/en/latest/rllib/rllib-training.html#common-parameters)
    中查找配置参数。


    算法的通用配置可以进一步分为以下类型。


    ### 资源配置


    无论你是在本地还是在集群上使用Ray RLlib，你都可以指定用于训练过程的资源。以下是需要考虑的最重要选项：


    ⁶ 对于专家来说，我们的DQN是通过默认参数 "dueling": True 和 "double_q": True 实现的决斗双Q学习模型。


    - `num_gpus`：指定用于训练的GPU数量。首先检查你选择的算法是否支持GPU很重要。这个值也可以是小数。例如，如果在DQN中使用四个rollout
    workers（`num_workers = 4`），你可以设置 `num_gpus=0.25`，将所有四个workers打包到同一个GPU上，这样所有训练器都能从潜在的加速中受益。

    - `num_cpus_per_worker`：设置每个worker使用的CPU数量。


    ### 调试和日志配置


    调试你的应用程序对任何项目都至关重要，机器学习也不例外。RLlib允许你配置它记录信息的方式以及你如何访问这些信息。


    - `log_level`：设置要使用的日志级别。可以是DEBUG、INFO、WARN或ERROR，默认为WARN。你应该尝试不同的级别，看看在实践中哪个最适合你的需求。

    - `callbacks`：你可以指定在训练期间各个点调用的自定义回调函数。我们将在第5章更仔细地探讨这个主题。

    - `ignore_worker_failures`：对于测试，将此属性设置为True（默认为False）以忽略worker失败可能很有用。

    - `logger_config`：你可以指定一个自定义的日志记录器配置，作为嵌套字典传入。


    ### Rollout Worker和评估配置


    当然，你也可以指定在训练和评估期间用于rollout的worker数量。


    - `num_workers`：你已经见过这个了。它用于指定要使用的Ray worker数量。

    - `num_envs_per_worker`：指定每个worker评估的环境数量。此设置允许你“批量”评估环境。特别是，如果你的模型评估时间很长，像这样对环境进行分组可以加速训练。

    - `create_env_on_driver`：如果你将 `num_workers` 至少设置为1，那么驱动程序进程就不需要创建环境，因为有rollout
    workers负责这个。如果你将此属性设置为True，你会在驱动程序上创建一个额外的环境。

    - `explore`：默认设置为True，此属性允许你关闭探索，例如在评估你的算法时。

    - `evaluation_num_workers`：指定要使用的并行评估worker数量，默认为0。


    ### 环境配置


    - `env`：指定你想要用于训练的环境。这可以是Ray RLlib已知环境的字符串，例如任何gym环境，或者你实现的自定义环境的类名。还有一种方法可以注册你的环境，以便你可以通过名称引用它们，但这需要使用Ray
    Tune。我们将在第5章学习这个功能。

    - `observation_space` 和 `action_space`：你可以指定环境的观测空间和动作空间。如果你不指定它们，它们将从环境中推断出来。

    - `env_config`：你可以选择性地为你的环境指定一个配置选项字典，该字典将传递给环境构造函数。

    - `render_env`：默认为False，此属性允许你开启环境渲染，这需要你实现环境的 `render` 方法。


    请注意，我们省略了我们列出的每种类型的许多可用配置选项。除此之外，还有一类通用配置选项可以修改RL训练过程的行为，例如修改要使用的底层模型。从某种意义上说，这些属性是最重要的，同时需要最具体的强化学习知识。对于这个RLlib简介，我们无法深入更多细节。但好消息是，如果你是RL软件的常规用户，你将能够轻松识别相关的训练配置选项。'

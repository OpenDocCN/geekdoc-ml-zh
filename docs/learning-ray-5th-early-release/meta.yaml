  - "[PAGE 153]\n\n# Example 7-20.\n\n```\nimport ray\nfrom ray.util.dask import enable_dask_on_ray\n\
    \nimport dask.dataframe as dd\n\nLABEL_COLUMN = \"is_big_tip\"\n\nenable_dask_on_ray()\n\
    \ndef load_dataset(path: str, *, include_label=True):\n    # Load the data and\
    \ drop unused columns.\n    df = dd.read_csv(path, assume_missing=True,\n    \
    \                 usecols=[\"tpep_pickup_datetime\", \"tpep_dropoff_datetime\"\
    ,\n                              \"passenger_count\", \"trip_distance\", \"fare_amount\"\
    ,\n                              \"tip_amount\"])\n\n    # Basic cleaning, drop\
    \ nulls and outliers.\n    df = df.dropna()\n    df = df[(df[\"passenger_count\"\
    ] <= 4) &\n            (df[\"trip_distance\"] < 100) &\n            (df[\"fare_amount\"\
    ] < 1000)]\n\n    # Convert datetime strings to datetime objects.\n    df[\"tpep_pickup_datetime\"\
    ] = dd.to_datetime(df[\"tpep_pickup_datetime\"])\n    df[\"tpep_dropoff_datetime\"\
    ] = dd.to_datetime(df[\"tpep_dropoff_datetime\"])\n\n    # Add three new features:\
    \ trip duration, hour the trip started, and day of the week.\n    df[\"trip_duration\"\
    ] = (df[\"tpep_dropoff_datetime\"] -\n                           df[\"tpep_pickup_datetime\"\
    ]).dt.seconds\n    df = df[df[\"trip_duration\"] < 4 * 60 * 60] # 4 hours.\n \
    \   df[\"hour\"] = df[\"tpep_pickup_datetime\"].dt.hour\n    df[\"day_of_week\"\
    ] = df[\"tpep_pickup_datetime\"].dt.weekday\n\n    if include_label:\n       \
    \ # Calculate label column: if tip was more or less than 20% of the fare.\n  \

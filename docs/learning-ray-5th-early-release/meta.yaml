    # Building a Simulation


    With the `Environment` class implemented, what does it take to tackle the problem
    of “teaching” the seeker to play the game well? How can it find the goal consistently
    in the minimum number of 8 steps necessary? We''ve equipped the maze environment
    with reward information, so that the seeker can use this signal to learn to play
    the game. In reinforcement learning, you play games repeatedly and learn from
    the experience you made in the process. The player of the game is often referred
    to as *agent* that takes *actions* in the environment, observes its *state* and
    receives a *reward*.¹ The better an agent learns, the better it becomes at interpreting
    the current game state (observations) and finding actions that lead to more rewarding
    outcomes.


    Regardless of the RL algorithm you want to use (in case you know any), you need
    to have a way of simulating the game repeatedly, to collect experience data. For
    this reason we''re going to implement a simple `Simulation` class in just a bit.


    The other useful abstraction we need to proceed is that of a `Policy`, a way of
    specifying actions. Right now the only thing we can do to play the game is sampling
    random actions for our seeker. What a `Policy` allows us to do is to get better
    actions for the current state of the game. In fact, we define a `Policy` to be
    a class with a `get_action` method that takes a game state and returns an action.


    Remember that in our game the seeker has a total of 25 possible states on the
    grid, and can carry out 4 actions. A simple idea would be to look at pairs of
    states and actions and assign a high value to a pair if carrying out this action
    in this state will lead to a high reward, and a low value otherwise. For instance,
    from your intuition of the game it should be clear that going down or right is
    always a good idea, whereas going left or up is not. Then, create a 25x4 lookup
    table of all possible state-action pairs and store it in our `Policy`. Then we
    could simply ask our policy to return the highest value of any action given a
    state. Of course, implementing an algorithm that


    > ¹ As we''ll see in chapter Chapter 4, you can run RL on multi-player games,
    too. Making the maze environment a so-called multi-agent environment, in which
    multiple seekers compete for the goal, is an interesting exercise.'

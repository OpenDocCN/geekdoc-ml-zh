  md: 'The nice thing about the Ray Train preprocessors is that they’re serializable.
    This makes it so that you can easily get consistency from training to serving
    just by serializing these operators.


    *Example 6-5.*


    ```

    pickle.dumps(prep) ①

    ```


    ① We can serialize and save preprocessors.


    # Trainers in Ray Train


    Trainers are framework-specific classes that run model training in a distributed
    fashion. Trainers all share a common interface:


    | Method | Description |

    |---|---|

    | fit(self) | Fit this trainer with the given dataset. |

    | get_checkpoints(self) | Return list of recent model checkpoints. |

    | as_trainable(self) | Get a wrapper of this as a Tune trainable class. |


    Ray Train supports a variety of different trainers on a variety of frameworks,
    namely XGBoost, LightGBM, Pytorch, HuggingFace, Tensorflow, Horovod, Scikit-learn,
    RLlib, and more.


    Next, we’ll dive into two specific classes of Trainers: Gradient Boosted Tree
    Framework Trainers, and Deep Learning Framework Trainers.


    # Distributed Training for Gradient Boosted Trees


    Ray Train offers Trainers for LightGBM and XGBoost.


    XGBoost is an optimized distributed gradient boosting library designed to be highly
    efficient, flexible and portable. It implements machine learning algorithms under
    the Gradient Boosting framework. XGBoost provides a parallel tree boosting (also
    known as GBDT, GBM) that solve many data science problems in a fast and accurate
    way.


    LightGBM is a gradient boosting framework based on tree-based learning algorithms.
    Compared to XGBoost, it is a relatively new framework, but one that is quickly
    becoming popular in both academic and production use cases.


    By leveraging Ray Train’s XGBoost or LightGBM trainer, you can take a large dataset
    and train a XGBoost Booster across multiple machines.'

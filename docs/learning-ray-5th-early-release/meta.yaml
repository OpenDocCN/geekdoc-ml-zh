  md: "# Building an Advanced Environment\n\nLet's make our maze GymEnvironment a\
    \ bit more challenging. First, we increase its size from a 5x5 to a 11x11 grid.\
    \ Then we introduce obstacles in the maze that the agent can pass through, but\
    \ only by incurring a penalty, a negative reward of -1. This way our seeker agent\
    \ will have to learn to avoid obstacles, while still finding the goal. Also, we\
    \ randomize the starting position of the agent. All of this makes the RL problem\
    \ harder to solve. Let's have a look at the initialization of this new AdvancedEnv\
    \ first:\n\n```\nfrom gym.spaces import Discrete\nimport random\nimport os\n\n\
    class AdvancedEnv(GymEnvironment):\n    def __init__(self, seeker=None, *args,\
    \ **kwargs):\n        super().__init__(*args, **kwargs)\n        self.maze_len\
    \ = 11\n        self.action_space = Discrete(4)\n        self.observation_space\
    \ = Discrete(self.maze_len * self.maze_len)\n\n        if seeker: ①\n        \
    \    assert 0 <= seeker[0] < self.maze_len and 0 <= seeker[1] < self.maze_len\n\
    \            self.seeker = seeker\n        else:\n            self.reset()\n\n\
    \        self.goal = (self.maze_len-1, self.maze_len-1)\n        self.info = {'seeker':\
    \ self.seeker, 'goal': self.goal}\n\n        self.punish_states = [ ②\n      \
    \      (i, j) for i in range(self.maze_len) for j in range(self.maze_len)\n  \
    \          if i % 2 == 1 and j % 2 == 0\n        ]\n```\n\n+   1. We can now set\
    \ the seeker position upon initialization.\n2. We introduce punish_states as obstacles\
    \ for the agent.\n\nNext, when resetting the environment, we want to make sure\
    \ to reset the agent's position to a random state. We also increase the positive\
    \ reward for reaching the goal to 5, to offset the negative reward for passing\
    \ through an obstacle (which will happen a lot before the RL trainer picks up\
    \ on the obstacle locations). Balancing rewards like this is a crucial task in\
    \ calibrating your RL experiments.\n\n```\ndef reset(self):\n    \"\"\"Reset seeker\
    \ position randomly, return observations.\"\"\"\n    self.seeker = (random.randint(0,\
    \ self.maze_len - 1), random.randint(0, self.maze_len - 1))\n```"

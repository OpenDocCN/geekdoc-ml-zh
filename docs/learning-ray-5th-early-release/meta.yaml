  md: "Serving such a model is a good way to make it accessible. You may not now how\
    \ to load and run a TensorFlow model on your computer, but you do now how to ask\
    \ a question in plain English. Model serving hides the implementation details\
    \ of a solution and lets users focus on providing inputs and understanding outputs\
    \ of a model.\n\nTo proceed, make sure to run `pip install transformers` to install\
    \ the Hugging Face library that has the model we want to use. With that we can\
    \ now import and start an instance of Ray's serve library, load and deploy a GPT-2\
    \ model and ask it for the meaning of life, like so:\n\nExample 1-8.\n\n```\n\
    from ray import serve\nfrom transformers import pipeline\nimport requests\n\n\
    serve.start() ❶\n\n@serve.deployment ❷\ndef model(request):\n    language_model\
    \ = pipeline(\"text-generation\", model=\"gpt2\") ❸\n    query = request.query_params[\"\
    query\"]\n    return language_model(query, max_length=100) ❹\n\nmodel.deploy()\
    \ ❺\n\nquery = \"What's the meaning of life?\"\nresponse = requests.get(f\"http://localhost:8000/model?query={query}\"\
    ) ❻\nprint(response.text)\n```\n\n+   ❶ We start serve locally.\n❷ The @serve.deployment\
    \ decorator turns a function with a request parameter into a serve deployment.\n\
    ❸ Loading language_model inside the model function for every request is inefficient,\
    \ but it's the quickest way to show you a deployment.\n❹ We ask the model to give\
    \ us at most 100 characters to continue our query.\n❺ Then we formally deploy\
    \ the model so that it can start receiving requests over HTTP.\n❻ We use the indispensable\
    \ requests library to get a response for any question you might have."

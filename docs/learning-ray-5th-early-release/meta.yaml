    4. We return both score and hyperparameter choice together for later analysis.


    Finally, we can run the objective function in parallel using Ray, by iterating
    over the search space and collecting the results:


    Example 5-3.


    ```

    result_objects = [objective.remote(choice) for choice in search_space]

    results = ray.get(result_objects)


    results.sort(key=lambda x: x[0])

    print(results[-1])


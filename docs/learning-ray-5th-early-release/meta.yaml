- md: "## Setting Up A Simple Maze Problem\n\nAs with the chapters before, I encourage\
    \ you to code this chapter with me and build this application together as we go.\
    \ In case you don't want to do that, you can also simply follow [the notebook\
    \ for this chapter](the notebook for this chapter).\n\nTo give you an idea, the\
    \ app we're building is structured as follows:\n\n- You implement a simple 2D-maze\
    \ game in which a single player can move around in the four major directions.\n\
    - You initialize the maze as a 5x5 grid to which the player is confined.\n- One\
    \ of the 25 grid cells is the “goal” that a player called the “seeker” must reach.\n\
    - Instead of hard-coding a solution, you will employ a reinforcement learning\
    \ algorithm, so that the seeker learns to find the goal.\n- This is done by repeatedly\
    \ running simulations of the maze, rewarding the seeker for finding the goal and\
    \ smartly keeping track of which decisions of the seeker worked and which didn't.\n\
    - As running simulations can be parallelized and our RL algorithm can also be\
    \ trained in parallel, we utilize the Ray API to parallelize the whole process.\n\
    \nWe're not quite ready to deploy this application on an actual Ray cluster comprised\
    \ of multiple nodes just yet, so for now we'll continue to work with local clusters.\
    \ If you're interested in infrastructure topics and want to learn how to set up\
    \ Ray clusters, jump ahead to ???, and to see a fully deployed Ray application\
    \ you can go to ???.\n\nLet's start by implementing the 2D maze we just sketched.\
    \ The idea is to implement a simple grid in Python that spans a 5x5 grid starting\
    \ at (0, 0) and ending at (4, 4) and properly define how a player can move around\
    \ the grid. To do this, we first need an abstraction for moving in the four cardinal\
    \ directions. These four actions, namely moving up, down, left, and right, can\
    \ be encoded in Python as a class we call `Discrete`. The abstraction of moving\
    \ in several discrete actions is so useful that we'll generalize it to n directions,\
    \ instead of just four. In case you're worried, this is not premature - we'll\
    \ actually need a general `Discrete` class in a moment.\n\nExample 3-1.\n\n```python\n\
    import random\n\nclass Discrete:\n    def __init__(self, num_actions: int):\n\
    \        \"\"\" Discrete action space for num_actions.\n        Discrete(4) can\
    \ be used as encoding moving in one of the cardinal directions.\n        \"\"\"\
    \n        self.n = num_actions\n\n    def sample(self):\n        return random.randint(0,\
    \ self.n - 1) ❶\n\nspace = Discrete(4)\nprint(space.sample()) ❷\n```\n\n❶ A discrete\
    \ action can be uniformly sampled between 0 and n-1.\n❷ For instance, a Discrete(4)\
    \ sample will give you 0, 1, 2, or 3.\n\nSampling from a Discrete(4) like in this\
    \ example will randomly return 0, 1, 2, or 3. How we interpret these numbers is\
    \ up to us, so let’s say we go for “down”, “left”, “right”, and “up” in that order.\n\
    \nNow that we know how to encode moving around the maze, let’s code the maze itself,\
    \ including the goal cell and the position of the seeker player that tries to\
    \ find the goal. To this end we’re going to implement a Python class called Environment.\
    \ It’s called that, because the maze is the environment in which the player “lives”.\
    \ To make matters easy, we’ll always put the seeker at (0, 0) and the goal at\
    \ (4, 4). To make the seeker move and find its goal, we initialize the Environment\
    \ with an action_space of Discrete(4).\n\nThere is one last bit of information\
    \ we need to set up for our maze environment, namely an encoding of the seeker\
    \ position. The reason for that is that we’re going to implement an algorithm\
    \ later that keeps track of which actions led to good results for which seeker\
    \ positions. By encoding the seeker position as a Discrete(5*5), it becomes a\
    \ single number that’s much easier to work with. In RL lingo it is common to call\
    \ the information of the game that is accessible to the player an observation.\
    \ So, in analogy to the actions we can carry out for our seeker, we can also define\
    \ an observation_space for it. Here’s the implementation of what we’ve just discussed:\n\
    \nExample 3-2.\n\n```python\nimport os\n\nclass Environment:\n    seeker, goal\
    \ = (0, 0), (4, 4) ❶\n    info = {'seeker': seeker, 'goal': goal}\n\n    def __init__(self,\
    \ *args, **kwargs):\n        self.action_space = Discrete(4) ❷\n        self.observation_space\
    \ = Discrete(5*5) ❸\n```\n\n❶ The seeker gets initialized in the top left, the\
    \ goal in the bottom right of the maze.\n❷ Our seeker can move down, left, up\
    \ and right.\n❸ And it can be in a total of 25 states, one for each position on\
    \ the grid.\n\nNote that we defined an info variable as well, which can be used\
    \ to print information about the current state of the maze, for instance for debugging\
    \ purposes. To play an actual game of find-the-goal from the perspective of the\
    \ seeker, we have to define a few helper methods. Clearly, the game should be\
    \ considered “done” when the seeker finds the goal. Also, we should reward the\
    \ seeker for finding the goal. And when the game is over, we should be able to\
    \ reset it to its initial state, to play again. To round things off, we also define\
    \ a get_observation method that returns the encoded seeker position. Continuing\
    \ our implementation of the Environment class, this translates into the following\
    \ four methods.\n\nExample 3-3.\n\n```python\ndef reset(self): ❶\n    \"\"\"Reset\
    \ seeker and goal positions, return observations.\"\"\"\n    self.seeker = (0,\
    \ 0)\n    self.goal = (4, 4)\n\n    return self.get_observation()\n\ndef get_observation(self):\n\
    \    \"\"\"Encode the seeker position as integer\"\"\"\n    return 5 * self.seeker[0]\
    \ + self.seeker[1] ❷\n\ndef get_reward(self):\n    \"\"\"Reward finding the goal\"\
    \"\"\n    return 1 if self.seeker == self.goal else 0 ❸\n\ndef is_done(self):\n\
    \    \"\"\"We're done if we found the goal\"\"\"\n    return self.seeker == self.goal\
    \ ❹\n```\n\n❶ To play a new game, we'll have to reset the grid to its original\
    \ state.\n❷ Converting the seeker tuple to a value from the environment's observation_space.\n\
    ❸ The seeker is only rewarded when reaching the goal.\n❹ If the seeker is at the\
    \ goal, the game is over.\n\nThe last essential method to implement is the step\
    \ method. Imagine you're playing our maze game and decide to go right as your\
    \ next move. The step method will take this action (namely 3, the encoding of\
    \ “right”) and apply it to the internal state of the game. To reflect what changed,\
    \ the step method will then return the seeker's observations, its reward, whether\
    \ the game is over, and the info value of the game. Here's how the step method\
    \ works:\n\nExample 3-4.\n\n```python\ndef step(self, action):\n    \"\"\"Take\
    \ a step in a direction and return all available information.\"\"\"\n    if action\
    \ == 0:  # move down\n        self.seeker = (min(self.seeker[0] + 1, 4), self.seeker[1])\n\
    \    elif action == 1:  # move left\n        self.seeker = (self.seeker[0], max(self.seeker[1]\
    \ - 1, 0))\n    elif action == 2:  # move up\n        self.seeker = (max(self.seeker[0]\
    \ - 1, 0), self.seeker[1])\n    elif action == 3:  # move right\n        self.seeker\
    \ = (self.seeker[0], min(self.seeker[1] + 1, 4))\n    else:\n        raise ValueError(\"\
    Invalid action\")\n\n    return self.get_observation(), self.get_reward(), self.is_done(),\
    \ self.info ❶\n```\n\n❶ After taking a step in the specified direction, we return\
    \ observation, reward, whether we're done, and any additional information we might\
    \ find useful.\n\nI said the step method was the last essential method, but we\
    \ actually want to define one more helper method that's extremely helpful to visualize\
    \ the game and help us understand it. This render method will print the current\
    \ state of the game to the command line.\n\nExample 3-5.\n\n```python\ndef render(self,\
    \ *args, **kwargs):\n    \"\"\"Render the environment, e.g. by printing its representation.\"\
    \"\"\n    os.system('cls' if os.name == 'nt' else 'clear') ❶\n    grid = [['|\
    \ ' for _ in range(5)] + ['|\\n'] for _ in range(5)]\n    grid[self.goal[0]][self.goal[1]]\
    \ = '|G'\n    grid[self.seeker[0]][self.seeker[1]] = '|S' ❷\n    print(''.join([''.join(grid_row)\
    \ for grid_row in grid])) ❸\n```\n\n❶ First we clear the screen."

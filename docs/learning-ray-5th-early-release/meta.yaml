    \ `tune.run` 和我们想要的配置。\n\n为了定义一个训练数据集，让我们编写一个简单的 `load_data` 实用函数，加载 Keras 附带的著名\
    \ MNIST 数据。MNIST 包含 28x28 像素的手写数字图像。我们将像素值归一化到 0 和 1 之间，并将这十个数字的标签设为分类变量。以下是如何纯粹使用\

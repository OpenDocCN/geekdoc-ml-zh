    \ but for now I encourage you to play around with this example and test different\
    \ queries. Running the last two lines of code repeatedly will give you different\
    \ answers practically every time. Here’s a darkly poetic gem, raising more questions,\
    \ that I queried on my machine and slightly censored for underaged readers:\n\n\
    ```\n[{\n    \"generated_text\": \"What's the meaning of life?\\n\\nIs there one\
    \ way or another of living?\\n\\nHow does it feel to be trapped in a relationship?\\\
    n\\nHow can it be changed before it's too late?\\n\\nWhat did we call it in our\
    \ time?\\n\\nWhere do we fit within this world and what are we going to live for?\\\
    n\\nMy life as a person has been shaped by the love I've received from others.\"\
    \n}]\n```\n\nThis concludes our whirlwind tour of Ray’s data science libraries,\
    \ the second of Ray’s layers. Before we wrap up this chapter, let’s have a very\
    \ brief look at the third layer, the growing ecosystem around Ray.\n\n# A Growing\
    \ Ecosystem\n\nRay’s high-level libraries are powerful and deserve a much deeper\
    \ treatment throughout the book. While their usefulness for the data science experimentation\
    \ lifecycle is undeniable, I also don’t want to give off the impression that Ray\
    \ is all you need from now on. In fact, I believe the best and most successful\
    \ frameworks are the ones that integrate well with existing solutions and ideas.\
    \ It’s better to focus on your core strengths and leverage other tools for what’s\
    \ missing in your solution. There’s usually no reason to re-invent the wheel.\n\
    \n# How Ray Integrates and Extends\n\nTo give you an example for how Ray integrates\
    \ with other tools, consider that Ray Data is a relatively new addition to its\
    \ libraries. If you want to boil it down, and maybe oversimplify a little, Ray\
    \ is a compute-first framework. In contrast, distributed frameworks like Apache\
    \ Spark⁷ or Dask can be considered data-first. Pretty much anything you do with\
    \ Spark starts with the definition of a distributed dataset and transformations\
    \ thereof. Dask bets on bringing common data structures like Pandas dataframes\
    \ or Numpy arrays to a distributed setup. Both are immensely powerful in their\
    \ own regard, and we’ll give you a more detailed and fair comparison to Ray\n\n\
    7 Spark has been created by another lab in Berkeley, AMPLab. The internet is full\
    \ of blog posts claiming that Ray should therefore be seen as a replacement of\
    \ Spark. It’s better to think of them as tools with different strengths that are\

    : \"approx\",\n    \"eval_metric\": [\"logloss\", \"error\"],\n    \"eta\": tune.loguniform(1e-4,\
    \ 1e-1),\n    \"subsample\": tune.uniform(0.5, 1.0),\n    \"max_depth\": tune.randint(1,\
    \ 9),\n},\n}\nif fail_after_finished > 0:\n    callbacks = [StopperCallback(fail_after_finished=fail_after_finished)]\n\
    else:\n    callbacks = None\ntuner = tune.Tuner(\n    XGBoostTrainer(\n      \

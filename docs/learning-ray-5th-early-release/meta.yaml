    \ It's a simple wrapper around the `SGDClassifier` and instantiates it with a\
    \ given alpha value. - The main training function happens in the `train` method.\
    \ For each epoch, it trains the classifier on the data available. - We also have\
    \ a `test` method that can be used to run the trained model against a testing\
    \ set.\nNow, let's instantiate a number of `TrainingWorker`s with different hyperparameters\
    \ (alpha values):\n\nExample 7-13.\n\n```\nALPHA_VALS = [0.00008, 0.00009, 0.0001,\
    \ 0.00011, 0.00012]\n\nprint(f\"Starting {len(ALPHA_VALS)} training workers.\"\
    )\nworkers = [TrainingWorker.remote(alpha) for alpha in ALPHA_VALS]\n```\n\nNext,\
    \ we generate training and validation data and convert the training data to a\
    \ Dataset. Here, we're using `.repeat()` to create a `DatasetPipeline`. This defines\
    \ the number of epochs that our training will run for. In each epoch, the subsequent\
    \ operations will be applied to the Dataset and the workers will be able to iterate\
    \ over the"
  - '[PAGE 147]


    resulting data. We also shuffle the data randomly and shard it to be passed to
    the training workers, each getting an equal chunk.


    Example 7-14.


    ```

    # Generate training & validation data for a classification problem.

    X_train, X_test, Y_train, Y_test = train_test_split(*datasets.make_classification())


    # Create a dataset pipeline out of the training data. The data will be randomly

    # shuffled and split across the workers for 10 iterations.

    train_ds = ray.data.from_items(list(zip(X_train, Y_train)))

    shards = train_ds.repeat(10)\n                .random_shuffle_each_window()\n                .split(len(workers),
    locality_hints=workers)

    ```


    To run the training on the workers, we invoke their train method and pass in one
    shard of the DatasetPipeline to each. We then block waiting for training to complete
    across all of the workers. To summarize what happens during this phase: - Each
    epoch, each worker gets a random shard of the data. - The worker trains its local
    model on the shard of data assigned to it. - Once a worker has finished training
    on the current shard, it blocks until the other workers have finished. - The above
    repeats for the remaining epochs (in this case, 10 total).


    Example 7-15.


    ```

    # Wait for training to complete on all of the workers.

    ray.get([worker.train.remote(shard) for worker, shard in zip(workers, shards)])

    ```


    Finally, we can test out the trained models from each worker on some test data
    to determine which alpha value produced the most accurate model.


    Example 7-16.


    ```

    # Get validation results from each worker.

    print(ray.get([worker.test.remote(X_test, Y_test) for worker in workers]))

    ```


    While this not be a real-world ML task and in reality you should likely reach
    for Ray Tune or Ray Train, this example conveys the power of Ray Datasets, especially
    for machine learning workloads. In just a few 10s of lines of Python code, we
    were able to implement a complex distributed hyperparameter tuning and training
    workflow that could easily be scaled up to 10s or 100s of machines and is agnostic
    to any framework or specific ML task.'
- md: '## External Library Integrations


    ### Overview


    While Ray Datasets supports a number of common data processing functionalities
    out of the box, as mentioned above it''s not a replacement for full data processing
    systems. Instead, it''s more focused on performing "last mile" processing such
    as basic data loading, cleaning, and featurization before ML training or inference.


    ![](img/58c832795222840423ffeca1357b40a7_148_0.png)


    Figure 7-3. A typical workflow using Ray for machine learning: use external systems
    for primary data processing and ETL, use Ray Datasets for last-mile preprocessing


    However, there are a number of other more fully-featured DataFrame and relational
    data processing systems that integrate with Ray:

    - Dask on Ray

    - RayDP (Spark on Ray)

    - Modin (Pandas on Ray)

    - Mars on Ray


    These are all standalone data processing libraries that you may be familiar with
    outside the context of Ray. Each of these tools has an integration with Ray core
    that enables more expressive data processing than comes with the built-in Datasets
    while still using Ray''s deployment tooling, scalable scheduling, and shared memory
    object store for exchanging data.


    ![](img/58c832795222840423ffeca1357b40a7_149_0.png)


    Figure 7-4. The benefit of Ray data ecosystem integrations, enabling more expressive
    data processing on Ray. These libraries integrate with Ray Datasets to feed into
    downstream libraries such as Ray Train.


    For the purposes of this book, we''ll explore Dask on Ray in slightly more depth
    to give you a feel for what these integrations look like. If you''re interested
    in the details of a specific integration, please see the latest [Ray documentation](https://docs.ray.io/)
    for up-to-date information.


    ### Dask on Ray


    To follow along with the examples in this section, please install Ray and Dask:


    ```

    pip install ray["data"]==1.9.0 dask

    ```


    [Dask](https://dask.org/) is a Python library for parallel computing that is specifically
    targeted at scaling analytics and scientific computing workloads to a cluster.
    One of the most popular features of Dask is [Dask DataFrames](https://docs.dask.org/en/stable/dataframe.html),
    which offers a subset of the pandas DataFrame API that can be scaled to a cluster
    of machines in cases where processing in memory on a single node is not feasible.
    DataFrames work by creating a *task graph* that is submitted to a scheduler for
    execution. The most typical way to execute Dask DataFrames operations is using
    the Dask Distributed scheduler, but there is also a pluggable API that allows
    other schedulers to execute these task graphs as well.


    Ray comes packaged with a Dask scheduler backend, allowing Dask DataFrame task
    graphs to be executed as Ray tasks and therefore make use of the Ray scheduler
    and shared memory object store. This doesn''t require modifying the core DataFrames
    code at all; instead, in order to run using Ray all you need to do is first connect
    to a running Ray cluster (or run Ray locally) and then enable the Ray scheduler
    backend:


    Example 7-17.


    ```

    import ray

    from ray.util.dask import enable_dask_on_ray


    ray.init()  # Start or connect to Ray.

    enable_dask_on_ray()  # Enable the Ray scheduler backend for Dask.

    ```


    Now we can run regular Dask DataFrames code and have it scaled across the Ray
    cluster. For example, we might want to do some time series analysis using standard
    DataFrame operations like filter, groupby, and computing the standard deviation
    (example taken from Dask documentation).


    Example 7-18.


    ```

    import dask


    df = dask.datasets.timeseries()

    df = df[df.y > 0].groupby("name").x.std()

    df.compute()  # Trigger the task graph to be evaluated.

    ```


    If you''re used to pandas or other DataFrame libraries, you might wonder why we
    need to call df.compute(). This is because Dask is lazy by default, and will only
    compute results on demand, allowing it to optimize the task graph that will be
    executed across the cluster.


    One of the most powerful aspects of this integration is that it integrates very
    nicely with Ray Datasets. We can convert a Ray Dataset to a Dask DataFrame and
    vice versa using built-in utilities:


    Example 7-19.


    ```

    import ray

    ds = ray.data.range(10000)


    # Convert the Dataset to a Dask DataFrame.

    df = ds.to_dask()

    print(df.std().compute())  # -> 2886.89568


    # Convert the Dask DataFrame back to a Dataset.

    ds = ray.data.from_dask(df)

    print(ds.std())  # -> 2886.89568

    ```


    This simple example might not look too impressive because we''re able to compute
    the standard deviation using either Dask DataFrames or Ray Datasets. However,
    as you''ll see in the next section when we build an end-to-end ML pipeline, this
    enables really powerful workflows. For example, we can use the full expressiveness
    of DataFrames to do our featurization and preprocessing, then pass the data directly
    into downstream operations such as distributed training or inference while keeping
    everything in memory. This highlights how Datasets enables a wide range of use
    cases on top of Ray, and how integrations like Dask on Ray make the ecosystem
    even more powerful.


    ### Building an ML Pipeline


    Although we were able to build a simple distributed training application from
    scratch in the previous section, there were many edge cases, opportunities for
    performance optimization, and usability features that we would want to address
    to build a real-world application. As you''ve learned in the previous chapters
    about Ray RLlib, Ray Tune, and Ray Train, Ray has an ecosystem of libraries that
    enable us to build production-ready ML applications. In this section, we''ll explore
    how to use Datasets as the "glue layer" to build an ML pipeline end-to-end.


    ### Background


    To successfully productionize a machine learning model, one first needs to collect
    and catalog data using standard ETL processes. However, that''s not the end of
    the story: in order to train a model, we also often need to do featurization of
    the data before feeding into our training process, and how we feed the data into
    training can make a big impact on cost and performance. After training a model,
    we''ll also want to run inference across many different datasets — that''s the
    whole point of training the model after all! This end-to-end process is summarized
    in the figure below.


    Though this might look like just a chain of steps, in practice the data processing
    workflow for machine learning is an iterative process of experimentation to define
    the right set of features and train a high-performing model on them. Efficiently
    loading, transforming, and feeding the data into training and inference is also
    crucial for performance, which translates directly to cost for compute-intensive
    models. Often times, implementing these ML pipelines means stitching together
    multiple different systems and materializing intermediate results to remote storage
    between the stages. This has two major downsides:


    1. First, it requires orchestrating many different systems and programs for a
    single workflow. This can be a lot to handle for any ML practitioner, so many
    people reach to workflow orchestration systems like Apache Airflow. While Airflow
    has some great benefits, it''s also a lot of complexity to introduce (especially
    in development).

    2. Second, running our ML workflow across multiple different systems means we
    need to read from and write to storage between each stage. This incurs significant
    overhead and cost due to data transfer and serialization.


    In contrast, using Ray we are able to build a complete machine learning pipeline
    as a single application that can be run as a single Python script. The ecosystem
    of built-in and third party libraries make it possible to mix-and-match the right
    functionality for a given use case and build scalable, production-ready pipelines.
    Ray Datasets acts as the glue layer, enabling us to efficiently load, preprocess,
    and compute over the data while avoiding expensive serialization costs and keeping
    intermediate data in shared memory.


    ### End-to-End Example: Predicting Big Tips in NYC Taxi Rides


    This section walks through a practical, end-to-end example of building a deep
    learning pipeline using Ray. We will build a binary classification model to predict
    if a taxi ride will result in a big tip (>20% of the fare) using the public [New
    York City Taxi and Limousine Commission (TLC) Trip Record Data](https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page).
    Our workflow will closely resemble that of a typical ML practitioner:

    - First, we will load the data, do some basic preprocessing, and compute features
    we''ll use in our model.

    - Then, we will define a neural network and train it using distributed data-parallel
    training.

    - Finally, we will apply the trained neural network to a fresh batch of data.


    The example will use Dask on Ray and train a PyTorch neural network, but note
    that nothing here is specific to either of those libraries, Ray Datasets and Ray
    Train can be used with a wide range of popular machine learning tools. To follow
    along with the example code in this section, please install Ray, PyTorch, and
    Dask:


    ```

    pip install ray["data"]==1.9.0 torch dask

    ```


    In the examples below, we''ll be loading the data from local disk to make it easy
    to run the examples on your machine. You can download the data to your local machine
    from the [AWS Registry of Open Data](https://registry.opendata.aws/nyc-tlc-trip-records-pds/)
    using the AWS CLI:


    ```

    pip install awscli==1.22.1

    aws s3 cp --no-sign-request "s3://nyc-tlc/trip data/" ./nyc_tlc_data/

    ```


    If you''d like to try loading the data directly from cloud storage, simply replace
    the local paths in the examples with the corresponding S3 URL.


    ### Loading, preprocessing, and featurizing with Dask on Ray


    The first step in training our model is to load and preprocess it. To do this,
    we''ll be using Dask on Ray, which as discussed above gives us a convenient DataFrames
    API and the ability to scale up the preprocessing across a cluster and efficiently
    pass it into our training and inference operations.


    Below is our code for preprocessing and featurization:'
  mdcn: '## 外部库集成


    ### 概述


    虽然 Ray Datasets 开箱即支持许多常见的数据处理功能，但如上所述，它并不能替代完整的数据处理系统。相反，它更专注于执行“最后一公里”的处理，例如在机器学习训练或推理之前进行基本的数据加载、清洗和特征化。


    ![](img/58c832795222840423ffeca1357b40a7_148_0.png)


    图 7-3. 使用 Ray 进行机器学习的典型工作流：使用外部系统进行主要数据处理和 ETL，使用 Ray Datasets 进行最后一公里的预处理


    然而，还有许多其他功能更全面的 DataFrame 和关系型数据处理系统与 Ray 集成：

    - Dask on Ray

    - RayDP (Spark on Ray)

    - Modin (Pandas on Ray)

    - Mars on Ray


    这些都是独立的数据处理库，你可能在 Ray 之外的环境中已经熟悉它们。这些工具中的每一个都与 Ray 核心集成了，使得它们能够提供比内置 Datasets
    更具表现力的数据处理能力，同时仍然利用 Ray 的部署工具、可扩展调度和用于数据交换的共享内存对象存储。


    ![](img/58c832795222840423ffeca1357b40a7_149_0.png)


    图 7-4. Ray 数据生态系统集成的好处，使得在 Ray 上进行更具表现力的数据处理成为可能。这些库与 Ray Datasets 集成，将数据馈送到下游库，例如
    Ray Train。


    就本书而言，我们将更深入地探讨 Dask on Ray，以便让你了解这些集成是什么样子的。如果你对特定集成的细节感兴趣，请参阅最新的 [Ray 文档](https://docs.ray.io/)
    以获取最新信息。


    ### Dask on Ray


    要跟随本节中的示例操作，请安装 Ray 和 Dask：


    ```

    pip install ray["data"]==1.9.0 dask

    ```


    [Dask](https://dask.org/) 是一个用于并行计算的 Python 库，专门针对将分析和科学计算工作负载扩展到集群。Dask 最受欢迎的功能之一是
    [Dask DataFrames](https://docs.dask.org/en/stable/dataframe.html)，它提供了 pandas
    DataFrame API 的一个子集，可以在单节点内存处理不可行的情况下，扩展到机器集群。DataFrames 通过创建一个*任务图*来工作，该任务图被提交给调度器执行。执行
    Dask DataFrames 操作最典型的方式是使用 Dask Distributed 调度器，但也存在一个可插拔的 API，允许其他调度器执行这些任务图。


    Ray 自带了一个 Dask 调度器后端，允许 Dask DataFrame 任务图作为 Ray 任务执行，从而利用 Ray 调度器和共享内存对象存储。这完全不需要修改核心的
    DataFrames 代码；相反，为了使用 Ray 运行，你只需要先连接到一个正在运行的 Ray 集群（或在本地运行 Ray），然后启用 Ray 调度器后端：


    示例 7-17.


    ```

    import ray

    from ray.util.dask import enable_dask_on_ray


    ray.init()  # 启动或连接到 Ray。

    enable_dask_on_ray()  # 为 Dask 启用 Ray 调度器后端。

    ```


    现在我们可以运行常规的 Dask DataFrames 代码，并让它在 Ray 集群上进行扩展。例如，我们可能想使用标准的 DataFrame 操作（如 filter、groupby
    和计算标准差）进行一些时间序列分析（示例取自 Dask 文档）。


    示例 7-18.


    ```

    import dask


    df = dask.datasets.timeseries()

    df = df[df.y > 0].groupby("name").x.std()

    df.compute()  # 触发任务图进行评估。

    ```


    如果你习惯使用 pandas 或其他 DataFrame 库，你可能会想知道为什么我们需要调用 `df.compute()`。这是因为 Dask 默认是惰性的，只会在需要时计算结果，从而允许它优化将在集群上执行的任务图。


    这种集成最强大的方面之一是它与 Ray Datasets 集成得非常好。我们可以使用内置工具将 Ray Dataset 转换为 Dask DataFrame，反之亦然：


    示例 7-19.


    ```

    import ray

    ds = ray.data.range(10000)


    # 将 Dataset 转换为 Dask DataFrame。

    df = ds.to_dask()

    print(df.std().compute())  # -> 2886.89568


    # 将 Dask DataFrame 转换回 Dataset。

    ds = ray.data.from_dask(df)

    print(ds.std())  # -> 2886.89568

    ```


    这个简单的例子可能看起来不太令人印象深刻，因为我们能够使用 Dask DataFrames 或 Ray Datasets 来计算标准差。然而，正如你将在下一节构建端到端机器学习管道时所看到的，这使得真正强大的工作流成为可能。例如，我们可以使用
    DataFrames 的全部表现力来进行特征化和预处理，然后将数据直接传递给下游操作，如分布式训练或推理，同时将所有内容保持在内存中。这突显了 Datasets
    如何在 Ray 之上支持广泛的用例，以及像 Dask on Ray 这样的集成如何使生态系统更加强大。


    ### 构建机器学习管道


    尽管我们在上一节中能够从头开始构建一个简单的分布式训练应用程序，但要构建一个真实世界的应用程序，我们需要解决许多边缘情况、性能优化机会和可用性功能。正如你在前面关于
    Ray RLlib、Ray Tune 和 Ray Train 的章节中所学到的，Ray 拥有一个库生态系统，使我们能够构建生产就绪的机器学习应用程序。在本节中，我们将探讨如何使用
    Datasets 作为“粘合层”来端到端地构建机器学习管道。


    ### 背景


    要成功地将机器学习模型投入生产，首先需要使用标准的 ETL 流程收集和编目数据。然而，这还不是全部：为了训练模型，我们通常还需要在将数据馈送到训练过程之前进行特征化，而我们如何将数据馈送到训练过程会对成本和性能产生重大影响。训练模型后，我们还希望在许多不同的数据集上运行推理——毕竟，这就是训练模型的全部意义！这个端到端的过程总结在下图中。


    虽然这看起来可能只是一系列步骤，但在实践中，机器学习的数据处理工作流是一个迭代的实验过程，旨在定义正确的特征集并在其上训练高性能的模型。高效地加载、转换并将数据馈送到训练和推理中对于性能也至关重要，这直接转化为计算密集型模型的成本。通常，实现这些机器学习管道意味着将多个不同的系统拼接在一起，并在各阶段之间将中间结果物化到远程存储中。这有两个主要缺点：


    1.  首先，它需要为单个工作流编排许多不同的系统和程序。这对任何机器学习从业者来说都可能难以应付，因此许多人转向使用像 Apache Airflow 这样的工作流编排系统。虽然
    Airflow 有一些很棒的优点，但它也引入了很大的复杂性（尤其是在开发过程中）。

    2.  其次，在多个不同的系统上运行我们的机器学习工作流意味着我们需要在每个阶段之间从存储读取和写入存储。由于数据传输和序列化，这会带来显著的开销和成本。


    相比之下，使用 Ray，我们能够将完整的机器学习管道构建为一个可以作为单个 Python 脚本运行的单一应用程序。内置和第三方库的生态系统使得为给定用例混合搭配正确的功能并构建可扩展、生产就绪的管道成为可能。Ray
    Datasets 充当粘合层，使我们能够高效地加载、预处理和计算数据，同时避免昂贵的序列化成本并将中间数据保持在共享内存中。


    ### 端到端示例：预测纽约市出租车行程中的大额小费


    本节将通过一个实际的端到端示例，介绍如何使用 Ray 构建深度学习管道。我们将构建一个二元分类模型，使用公开的[纽约市出租车和豪华轿车委员会 (TLC) 行程记录数据](https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page)来预测一次出租车行程是否会产生大额小费（超过车费的
    20%）。我们的工作流将与典型的机器学习从业者的工作流非常相似：

    - 首先，我们将加载数据，进行一些基本的预处理，并计算我们将用于模型的特征。

    - 然后，我们将定义一个神经网络，并使用分布式数据并行训练来训练它。

    - 最后，我们将训练好的神经网络应用于一批新的数据。


    该示例将使用 Dask on Ray 并训练一个 PyTorch 神经网络，但请注意，这里没有任何内容是特定于这两个库的，Ray Datasets 和 Ray
    Train 可以与各种流行的机器学习工具一起使用。要跟随本节中的示例代码，请安装 Ray、PyTorch 和 Dask：


    ```

    pip install ray["data"]==1.9.0 torch dask

    ```


    在下面的示例中，我们将从本地磁盘加载数据，以便于在你的机器上运行示例。你可以使用 AWS CLI 从 [AWS 开放数据注册表](https://registry.opendata.aws/nyc-tlc-trip-records-pds/)
    将数据下载到本地机器：


    ```

    pip install awscli==1.22.1

    aws s3 cp --no-sign-request "s3://nyc-tlc/trip data/" ./nyc_tlc_data/

    ```


    如果你想尝试直接从云存储加载数据，只需将示例中的本地路径替换为相应的 S3 URL 即可。


    ### 使用 Dask on Ray 进行加载、预处理和特征化


    训练模型的第一步是加载和预处理数据。为此，我们将使用 Dask on Ray，如上所述，它为我们提供了方便的 DataFrames API，以及将预处理扩展到集群并高效地将其传递给训练和推理操作的能力。


    以下是我们用于预处理和特征化的代码：'

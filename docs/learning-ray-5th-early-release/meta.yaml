    # CHAPTER 6


    # Distributed Training with Ray Train


    Richard Liaw


    > **A Note for Early Release Readers**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    In previous chapters, you’ve learned how to build and scale reinforcement learning
    applications with Ray, and how to optimize hyperparameters for such applications.
    As we indicated in Chapter 1, Ray also comes with the Ray Train library, which
    provides an extensive suite of machine learning training integrations and allows
    them to scale seamlessly.


    We will start this chapter by providing context about why you might need to scale
    out your machine learning training. Then we’ll cover some key concepts you need
    to know in order to use Ray Train. Finally, we’ll cover some of the more advanced
    functionality that Ray Train provides.


    As always, you can follow along using the notebook for this chapter.


    # The Basics of Distributed Model Training


    Machine learning often requires a lot of heavy computation. Depending on the type
    of model that you’re training, whether it be a gradient boosted tree or a neural
    network, you may face a couple common problems with training machine learning
    models causing you to investigate distributed training solutions:


    +   1. The time it takes to finish training is too long.'
  - '[PAGE 120]


    +   2. The size of data is too large to fit into one machine.

    3. The model itself is too large to fit into a single machine.


    For the first case, training can be accelerated by processing data with increased
    throughput. Some machine learning algorithms, such as neural networks, can parallelize
    parts of the computation to speed up training¹.


    In the second case, your choice of algorithm may require you to fit all the available
    data from a dataset into memory, but the given single node memory may not be sufficient.
    In this case, you will need to split the data across multiple nodes and train
    in a distributed manner. On the other hand, sometimes your algorithm may not require
    data to be distributed, but if you’re using a distributed database system to begin
    with, you still want a training framework that can leverage your distributed data.


    In the third case, when your model doesn’t fit into a single machine, you may
    need to split up the model into multiple parts, spread across multiple machines.
    The approach of splitting models across multiple machines is called model parallelism.
    To run into this issue, you first need a model that is large enough to not fit
    into a single machine anymore. Usually, large companies like Google or Facebook
    tend to have the need for model-parallelism, and also rely on in-house solutions
    to handle the distributed training.


    In contrast, the first two problems often arise much earlier in the journey to
    machine learning practitioners. The solutions we just sketched for these problems
    fall under the umbrella of data-parallel training. Instead of splitting up the
    model across multiple machines, you instead rely on distributed data to speed
    up training.


    Specifically for the first problem, if you can speed up your training process,
    hopefully with minimal or no loss in accuracy, and you can do so cost-efficiently,
    why not go for it? And if you have distributed data, whether by necessity of your
    algorithm or the way you store your data, you need a training solution to deal
    with it. As you will see, Ray Train is built for efficient, data-parallel training.


    # Introduction to Ray Train


    Ray Train is a library for distributed training on Ray. It offers key tools for
    different parts of the training workflow, from feature processing, to scalable
    training, to integrations with ML tracking tools, to export mechanisms for models.


    In a typical ML training pipeline you will use the following key components of
    Ray Train:


    1 This applies specifically to the gradient computation in neural networks.'
  - '[PAGE 121]


    Preprocessors

    Ray Train provides several common preprocessor objects and utilities to process
    dataset objects into consumable features for Trainers.


    Trainers

    Ray Train has several Trainer classes that make it possible to do distributed
    training. Trainers are wrapper classes around third-party training frameworks
    like XGBoost, providing integration with core Ray actors (for distribution), Tune,
    and Datasets.


    Models

    Each trainer can produce a model. The model can be used in serving.


    Let''s see how to put these concepts in practice by computing a first example
    with Ray Train.


    # Creating an End-To-End Example for Ray Train


    In the below example, we demonstrate the ability to load, process, and train a
    machine learning model using Ray Train.


    We''ll be using a simple dataset for this example, using the `load_breast_cancer`
    function from the scikit-learn datasets package. We load the data into a Pandas
    DataFrame first and then convert it into a so-called Ray Dataset. Chapter 7 is
    entirely devoted to the Ray Data library, we just use it here to illustrate the
    Ray Train API.


    Example 6-1.


    ```

    from ray.data import from_pandas


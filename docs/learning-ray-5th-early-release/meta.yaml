  md: "Example 5-13.\n\n```\ntune.run(\n    objective,\n    config=search_space,\n\
    \    stop={\"training_iteration\": 10})\n```\n\nOne of the drawbacks of this way\
    \ of specifying a stopping condition is that it assumes the metric in question\
    \ is *increasing*. For instance, the score we compute starts high and is something\
    \ we want to minimize. To formulate a flexible stopping condition for our score,\
    \ the best way is to provide a stopping function as follows.\n\nExample 5-14.\n\

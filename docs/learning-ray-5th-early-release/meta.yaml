    # Preprocessors in Ray Train


    The Preprocessor is the core class for handling data preprocessing. Each preprocessor
    has the following APIs:


    | API | Description |

    |---|---|

    | `transform` | Used to process and apply a processing transformation to a Dataset.
    |

    | `fit` | Used to calculate and store aggregate state about the Dataset on Preprocessor.
    Returns self for chaining. |

    | `fit_transform` | Syntactic sugar for performing transformations that require
    aggregate state. May be optimized at the implementation level for specific Preprocessors.
    |

    | `transform_batch` | Used to apply the same transformation on batches for prediction.
    |


    Currently, Ray Train offers the following encoders


    | Encoder | Description |

    |---|---|

    | `FunctionTransformer` | Custom Transformers |

    | `Pipeline` | Sequential Preprocessing |

    | `StandardScaler` | Standardization |

    | `MinMaxScaler` | Standardization |

    | `OrdinalEncoder` | Encoding Categorical Features |

    | `OneHotEncoder` | Encoding Categorical Features |

    | `SimpleImputer` | Missing Value Imputation |

    | `LabelEncoder` | Label Encoding |


    You will often want to make sure you can use the same data preprocessing operations
    at training time and at serving time.


    # Usage of Preprocessors


    You can use these preprocessors by passing them to a trainer. Ray Train will take
    care of applying the preprocessor to the dataset in a distributed fashion.


    Example 6-4.


    ```

    result = trainer.fit(dataset=dataset, preprocessor=preprocessor)

    ```


    # Serialization of Preprocessors


    Now, some preprocessing operators such as one-hot encoders are easy to run in
    training and transfer to serving. However, other operators such as those that
    do standardization are a bit trickier, since you don''t want to do large data
    crunching (to find the mean of a particular column) during serving time.'

  - "[PAGE 109]\n\nWhat's interesting is that this does not stop with CPUs, you can\
    \ also determine the number of GPUs used per trial. Plus, Tune allows you to use\
    \ *fractional resources*, i.e., you can share resources between trials. So, let's\
    \ say that you have a machine with 12 CPUs and two GPUs and you request the following\
    \ resources for your objective:\n\n```\nfrom ray import tune\n\ntune.run(objective,\
    \ num_samples=10, resources_per_trial={\"cpu\": 2, \"gpu\": 0.5})\n```\n\nThat\
    \ means Tune can schedule and execute up to four concurrent trials on your machine,\
    \ as this would max out GPU utilization on this machine (while you'd still have\
    \ 4 idle CPUs for other tasks). If you want, you can also specify the amount of\
    \ \"memory\" used by a trial by passing the number of bytes into `resources_per_trial`.\
    \ Also note that should you have the need to explicitly *restrict* the number\
    \ of concurrent trials, you can do so by passing in the `max_concurrent_trials`\
    \ parameter to your `tune.run(...)`. In the above example, let's say you want\
    \ to always keep one GPU available for other tasks, you can limit the number of\
    \ concurrent trials to two by setting `max_concurrent_trials = 2`.\n\nNote that\
    \ everything we just exemplified for resources on a single machine naturally extends\
    \ to any Ray cluster and its available resources. In any case, Ray will always\
    \ try to schedule the next trials, but will wait and ensure enough resources are\

  md: '# CHAPTER 7


    # Data Processing with Ray


    Edward Oakes


    > **A Note for Early Release Readers**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    In the previous chapter, you learned how to scale machine learning training using
    Ray Train. Of course, the key component to applying machine learning in practice
    is data. In this chapter, we’ll explore the core set of data processing capabilities
    on Ray: Ray Data.


    While not meant to be a replacement for more general data processing systems such
    as Apache Spark or Apache Hadoop, Ray Data offers basic data processing capabilities
    and a standard way to load, transform, and pass data to different parts of a Ray
    application. This enables an ecosystem of libraries on Ray to all speak the same
    language so users can mix and match functionality in a framework-agnostic way
    to meet their needs.


    The central component of the Ray Data ecosystem is the aptly-named “Datasets,”
    which offers the core abstractions for loading, transforming, and passing references
    to data in a Ray cluster. Datasets are the “glue” that enable different libraries
    to interoperate on top of Ray. You’ll see this in action later in the chapter,
    as we show how you can do dataframe processing using the full expressiveness of
    the Dask API using Dask on Ray and transform the result into a Dataset, as well
    as how a Dataset can be used to efficiently do distributed deep learning training
    at scale using Ray Train and Ray Tune.'

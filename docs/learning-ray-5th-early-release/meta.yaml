  - '[PAGE 133]


    Example 6-18.


    ```

    result = trainer.fit(dataset=dataset, preprocessor=preprocessor)

    print(result)


    this_checkpoint = result.checkpoint

    this_model = this_checkpoint.load_model()

    predicted = this_model.predict(predict_ds)

    print(predicted.to_pandas())

    ```


    # Some Caveats


    In particular, recall that standard neural network training works by iterating
    through a dataset in separate batches of data (usually called minibatch gradient
    descent).


    To speed this up, you can parallelize the gradient computation of every minibatch
    update. This means that the batch should be split across multiple machines.


    One complication is that if you hold the size of the batch constant, the system
    utilization and efficiency reduces as you increase the number of workers.


    To compensate, practitioners typically increase the amount of data per batch.


    As a result, the time it takes to go through a single pass of the data (one epoch)
    should ideally reduce, since the number of total batches decreases.'
- md: "## CHAPTER 7\n\n## Data Processing with Ray\n\nEdward Oakes\n\n> **A Note for\
    \ Early Release Readers**\n\nWith Early Release ebooks, you get books in their\
    \ earliest form—the author’s raw and unedited content as they write—so you can\
    \ take advantage of these technologies long before the official release of these\
    \ titles.\n\nIn the previous chapter, you learned how to scale machine learning\
    \ training using Ray Train. Of course, the key component to applying machine learning\
    \ in practice is data. In this chapter, we’ll explore the core set of data processing\
    \ capabilities on Ray: Ray Data.\n\nWhile not meant to be a replacement for more\
    \ general data processing systems such as Apache Spark or Apache Hadoop, Ray Data\
    \ offers basic data processing capabilities and a standard way to load, transform,\
    \ and pass data to different parts of a Ray application. This enables an ecosystem\
    \ of libraries on Ray to all speak the same language so users can mix and match\
    \ functionality in a framework-agnostic way to meet their needs.\n\nThe central\
    \ component of the Ray Data ecosystem is the aptly-named “Datasets,” which offers\
    \ the core abstractions for loading, transforming, and passing references to data\
    \ in a Ray cluster. Datasets are the “glue” that enable different libraries to\
    \ interoperate on top of Ray. You’ll see this in action later in the chapter,\
    \ as we show how you can do dataframe processing using the full expressiveness\
    \ of the Dask API using Dask on Ray and transform the result into a Dataset, as\
    \ well as how a Dataset can be used to efficiently do distributed deep learning\
    \ training at scale using Ray Train and Ray Tune.\n\nThe main benefits of Datasets\
    \ are:\n\n*Flexibility*\n    Datasets support a wide range of data formats, work\
    \ seamlessly with library integrations like Dask on Ray, and can be passed between\
    \ Ray tasks and actors without copying data.\n\n*Performance for ML workloads*\n\
    \    Datasets offers important features like accelerator support, pipelining,\
    \ and global random shuffles that accelerate ML training and inference workloads.\n\
    \nThis chapter is intended to get you familiar with the core concepts for doing\
    \ data processing on Ray and to help you understand how to accomplish common patterns\
    \ and why you would choose to use different pieces to accomplish a task. The chapter\
    \ assumes a basic familiarity with data processing concepts such as map, filter,\
    \ groupby, and partitions, but it's not to be a tutorial on data science in general\
    \ nor a deep dive into the internals of how these operations are implemented.\
    \ Readers with a limited data processing / data science background should not\
    \ have a problem following along.\n\nWe'll start by giving a basic introduction\
    \ to the core building block: Ray Datasets. This will cover the architecture,\
    \ basics of the API, and an example how Datasets can be used to making building\
    \ complex data-intensive applications easy. Then, we'll briefly cover external\
    \ library integrations on Ray, focusing on Dask on Ray. Finally, we'll bring it\
    \ all together by building a scalable end-to-end machine learning pipeline in\
    \ a single Python script.\n\nThe notebook for this chapter [is also available\
    \ online](https://github.com/ray-project/ray/tree/master/doc/source/data/examples).\n\
    \n## Ray Datasets\n\n### An Overview of Datasets\n\nThe main goal of Datasets\
    \ is to support a scalable, flexible abstraction for data processing on Ray. Datasets\
    \ are intended to be the standard way to read, write, and transfer data across\
    \ the full ecosystem of Ray libraries. One of the most powerful uses of Datasets\
    \ is acting as the data ingest and preprocessing layer for machine learning workloads,\
    \ allowing you to efficiently scale up training using Ray Train and Ray Tune.\
    \ This will be explored in more detail in the last section of the chapter.\n\n\
    If you've worked with other distributed data processing APIs such as Apache Spark's\
    \ RDDs in the past, you will find the Datasets API very familiar. The core of\
    \ the API leans on functional programming and offers standard functionality such\
    \ as reading/writing many different data sources, performing basic transformations\
    \ like map, filter, and sort, as well as some simple aggregations such as groupby.\n\
    \nUnder the hood, Datasets implements Distributed Apache Arrow. Apache Arrow is\
    \ a unified columnar data format for data processing libraries and applications,\
    \ so integrating with it means that Datasets get interoperability with many of\
    \ the most popular processing libraries such as NumPy and pandas out of the box.\n\
    \nA Dataset consists of a list of Ray object references, each of which points\
    \ at a “block” of data. These blocks are either Arrow tables or Python lists (for\
    \ data that isn’t supported by the Arrow format) in Ray’s shared memory object\
    \ store, and compute over the data such as for map or filter operations happens\
    \ in Ray tasks (and sometimes actors).\n\nBecause Datasets relies on the core\
    \ Ray primitives of tasks and objects in the shared memory object store, it inherits\
    \ key benefits of Ray: scalability to hundreds of nodes, efficient memory usage\
    \ due to sharing memory across processes on the same node, and object spilling\
    \ + recovery to gracefully handle failures. Additionally, because Datasets are\
    \ just lists of object references, they can also be passed between tasks and actors\
    \ efficiently without needing to make a copy of the data, which is crucial for\
    \ making data-intensive applications and libraries scalable.\n\n### Datasets Basics\n\
    \nThis section will give a basic overview of Ray Datasets, covering how to get\
    \ started reading, writing, and transforming datasets. This is not meant to be\
    \ a comprehensive reference, but rather to introduce you to the basic concepts\
    \ so we can build up to some interesting examples of what makes Ray Datasets powerful\
    \ in later sections. For up-to-date information on what’s supported and exact\
    \ syntax, see the Datasets documentation.\n\nTo follow along with the examples\
    \ in this section, please make sure you have Ray Data installed locally:\n\n```\n\
    pip install \"ray[data]\"==1.9.0\n```\n\n### Creating a dataset\n\nFirst, let’s\
    \ create a simple Dataset and perform some basic operations on it:\n\nExample\
    \ 7-1.\n\n```\nimport ray\n\n# Create a dataset containing integers in the range\
    \ [0, 10000).\nds = ray.data.range(10000)\n\n# Basic operations: show the size\
    \ of the dataset, get a few samples, print the schema.\nprint(ds.count())  # ->\
    \ 10000\nprint(ds.take(5))  # -> [0, 1, 2, 3, 4]\nprint(ds.schema())  # -> <class\
    \ 'int'>\n```\n\nHere we created a Dataset containing the numbers from 0 to 10000,\
    \ then printed some basic information about it: the total number of records, a\
    \ few samples, and the schema (we will discuss this in more detail later).\n\n\
    ### Reading from and writing to storage\n\nOf course, for real workloads you'll\
    \ often want to read from and write to persistent storage to load your data and\
    \ write the results. Writing and reading Datasets is simple; for example, to write\
    \ a Dataset to a CSV file and then load it back into memory, we just need to use\
    \ the builtin write_csv and read_csv utilities:\n\nExample 7-2.\n\n```\n# Save\
    \ the dataset to a local file and load it back.\nray.data.range(10000).write_csv(\"\
    local_dir\")\nds = ray.data.read_csv(\"local_dir\")\nprint(ds.count())\n```\n\n\
    Datasets supports a number of common serialization formats such as CSV, JSON,\
    \ and Parquet and can read from or write to local disk as well as remote storage\
    \ like HDFS or AWS S3.\n\nIn the example above, we provided just a local file\
    \ path (\"local_dir\") so the Dataset was written to a directory on the local\
    \ machine. If we wanted to write to and read from S3 instead, we would instead\
    \ provide a path like \"s3://my_bucket/\" and Datasets would automatically handle\
    \ efficiently reading/writing remote storage, parallelizing the requests across\
    \ many tasks to improve throughput.\n\nNote that Datasets also supports custom\
    \ datasources that you can use to write to any external data storage system that\
    \ isn't supported out-of-the-box.\n\n### Built-in transformations\n\nNow that\
    \ we understand the basic APIs around how to create and inspect Datasets, let's\
    \ take a look at some of the builtin operations we can do on them. The code sample\
    \ below shows three basic operations that Datasets support:\n\n- First, we union\
    \ two Datasets together. The result is a new Dataset that contains all of the\
    \ records of both.\n- Then, we filter the elements of a Dataset to only include\
    \ even integers by providing a custom filter function.\n- Finally, we sort the\
    \ Dataset."
  mdcn: "## 第7章\n\n## 使用Ray进行数据处理\n\nEdward Oakes\n\n> **致早期发布读者的说明**\n\n通过早期发布的电子书，您可以在书籍的最早期形式——作者撰写时未经编辑的原始内容——中获取书籍，从而在这些书籍正式发布之前就能利用这些技术。\n\
    \n在上一章中，您学习了如何使用Ray Train扩展机器学习训练。当然，在实践中应用机器学习的关键组件是数据。在本章中，我们将探讨Ray上的核心数据处理功能集：Ray\
    \ Data。\n\n虽然Ray Data并非旨在替代更通用的数据处理系统（如Apache Spark或Apache Hadoop），但它提供了基本的数据处理能力，以及一种标准方式来加载、转换数据，并将数据传递到Ray应用程序的不同部分。这使得Ray上的生态系统中的所有库都能使用相同的语言，从而允许用户以与框架无关的方式混合和匹配功能，以满足他们的需求。\n\
    \nRay Data生态系统的核心组件是恰如其名的“数据集”，它提供了在Ray集群中加载、转换和传递数据引用的核心抽象。数据集是“粘合剂”，使不同的库能够在Ray之上进行互操作。我们将在本章后面看到实际应用，展示如何使用Dask\
    \ on Ray利用Dask API的全部表达能力进行数据框处理，并将结果转换为数据集，以及如何使用数据集通过Ray Train和Ray Tune高效地进行大规模分布式深度学习训练。\n\
    \n数据集的主要优势是：\n\n*灵活性*\n    数据集支持广泛的数据格式，与Dask on Ray等库集成无缝，并且可以在Ray任务和参与者之间传递，无需复制数据。\n\
    \n*针对机器学习工作负载的性能*\n    数据集提供了重要功能，如加速器支持、流水线化和全局随机洗牌，这些功能可加速机器学习训练和推理工作负载。\n\n\
    本章旨在让您熟悉在Ray上进行数据处理的核心概念，并帮助您理解如何实现常见模式以及为何选择使用不同的组件来完成任务。本章假设您对数据处理概念（如map、filter、groupby和分区）有基本的了解，但并非数据科学的通用教程，也不是对这些操作内部实现的深入探讨。数据处理/数据科学背景有限的读者应该能够轻松跟上。\n\
    \n我们将首先对核心构建块：Ray数据集进行基本介绍。这将涵盖架构、API的基础知识，以及一个示例，展示如何使用数据集轻松构建复杂的数据密集型应用程序。然后，我们将简要介绍Ray上的外部库集成，重点关注Dask\
    \ on Ray。最后，我们将通过在一个Python脚本中构建一个可扩展的端到端机器学习管道，将所有内容整合在一起。\n\n本章的笔记本[也可在线获取](https://github.com/ray-project/ray/tree/master/doc/source/data/examples)。\n\
    \n## Ray数据集\n\n### 数据集概述\n\n数据集的主要目标是支持在Ray上进行可扩展、灵活的数据处理抽象。数据集旨在成为在Ray整个生态系统中读取、写入和传输数据的标准方式。数据集最强大的用途之一是作为机器学习工作负载的数据摄取和预处理层，允许您使用Ray\
    \ Train和Ray Tune高效地扩展训练。这将在本章的最后一节中更详细地探讨。\n\n如果您过去使用过其他分布式数据处理API（如Apache Spark的RDD），您会发现数据集API非常熟悉。该API的核心依赖于函数式编程，并提供标准功能，如读取/写入多种不同的数据源、执行基本转换（如map、filter和sort），以及一些简单的聚合（如groupby）。\n\
    \n在底层，数据集实现了分布式Apache Arrow。Apache Arrow是一种统一的列式数据格式，用于数据处理库和应用程序，因此与之集成意味着数据集开箱即用地与许多最流行的处理库（如NumPy和pandas）互操作。\n\
    \n一个数据集由一系列Ray对象引用组成，每个引用指向一个数据“块”。这些块要么是Arrow表，要么是Python列表（用于Arrow格式不支持的数据），存储在Ray的共享内存对象存储中，而对数据的计算（如map或filter操作）发生在Ray任务（有时是参与者）中。\n\
    \n由于数据集依赖于Ray的核心原语——任务和共享内存对象存储中的对象，它继承了Ray的关键优势：可扩展到数百个节点、由于在同一节点上的进程间共享内存而实现高效的内存使用，以及对象溢出+恢复以优雅地处理故障。此外，由于数据集只是对象引用的列表，它们也可以在任务和参与者之间高效传递，而无需复制数据，这对于使数据密集型应用程序和库具有可扩展性至关重要。\n\
    \n### 数据集基础\n\n本节将对Ray数据集进行基本概述，涵盖如何开始读取、写入和转换数据集。这并非全面的参考，而是向您介绍基本概念，以便我们可以在后续章节中构建一些有趣的示例，展示Ray数据集的强大之处。有关支持的内容和确切语法的最新信息，请参阅数据集文档。\n\
    \n要跟随本节中的示例，请确保您已在本地安装Ray Data：\n\n```\npip install \"ray[data]\"==1.9.0\n```\n\
    \n### 创建数据集\n\n首先，让我们创建一个简单的数据集并对其执行一些基本操作：\n\n示例7-1。\n\n```\nimport ray\n\n#\
    \ 创建一个包含[0, 10000)范围内整数的数据集。\nds = ray.data.range(10000)\n\n# 基本操作：显示数据集的大小，获取一些样本，打印模式。\n\
    print(ds.count())  # -> 10000\nprint(ds.take(5))  # -> [0, 1, 2, 3, 4]\nprint(ds.schema())\
    \  # -> <class 'int'>\n```\n\n这里我们创建了一个包含从0到10000的数字的数据集，然后打印了一些基本信息：记录总数、一些样本和模式（我们稍后将更详细地讨论）。\n\
    \n### 从存储读取和写入存储\n\n当然，对于实际工作负载，您通常希望从持久存储读取和写入持久存储以加载数据和写入结果。写入和读取数据集很简单；例如，要将数据集写入CSV文件然后将其加载回内存，我们只需使用内置的write_csv和read_csv实用程序：\n\
    \n示例7-2。\n\n```\n# 将数据集保存到本地文件并加载回来。\nray.data.range(10000).write_csv(\"local_dir\"\
    )\nds = ray.data.read_csv(\"local_dir\")\nprint(ds.count())\n```\n\n数据集支持多种常见的序列化格式，如CSV、JSON和Parquet，并且可以从本地磁盘以及远程存储（如HDFS或AWS\
    \ S3）读取或写入。\n\n在上面的示例中，我们只提供了一个本地文件路径（\"local_dir\"），因此数据集被写入本地机器上的目录。如果我们想改为写入和读取S3，我们将提供类似\"\
    s3://my_bucket/\"的路径，数据集将自动处理高效读取/远程存储，将请求并行化到多个任务以提高吞吐量。\n\n请注意，数据集还支持自定义数据源，您可以使用它们写入任何未开箱即用支持的外部数据存储系统。\n\
    \n### 内置转换\n\n现在我们了解了如何创建和检查数据集的基本API，让我们看看我们可以对它们执行的一些内置操作。下面的代码示例展示了数据集支持的三个基本操作：\n\
    \n- 首先，我们将两个数据集联合在一起。结果是一个包含两者所有记录的新数据集。\n- 然后，我们通过提供自定义过滤函数来过滤数据集的元素，仅包含偶数整数。\n\
    - 最后，我们对数据集进行排序。"

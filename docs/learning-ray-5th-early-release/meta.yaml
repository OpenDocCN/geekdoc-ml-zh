    enable us to build production-ready ML applications. In this section, we''ll explore
    how to use Datasets as the "glue layer" to build an ML pipeline end-to-end.


    # Background


    To successfully productionize a machine learning model, one first needs to collect
    and catalog data using standard ETL processes. However, that''s not the end of
    the story: in order to train a model, we also often need to do featurization of
    the data before feeding into our training process, and how we feed the data into
    training can make a big impact on cost and performance. After training a model,
    we''ll also want to run inference across many different datasets — that''s the
    whole point of training the model after all! This end-to-end process is summarized
    in the figure below.


    Though this might look like just a chain of steps, in practice the data processing
    workflow for machine learning is an iterative process of experimentation to define
    the right set of features and train a high-performing model on them. Efficiently
    loading, transforming, and feeding the data into training and inference is also
    crucial for performance, which translates directly to cost for compute-intensive
    models. Often times, implementing these ML pipelines means stitching together
    multiple different systems and materializing intermediate results to remote storage
    between the stages. This has two major downsides: 1. First, it requires orchestrating
    many different systems and programs for a single workflow. This can be a lot to
    handle for any ML practitioner, so many people reach to workflow orchestration
    systems like Apache Airflow. While Airflow has some great benefits, it''s also
    a lot of complexity to introduce (especially in development). 2. Second, running
    our ML workflow across multi-'

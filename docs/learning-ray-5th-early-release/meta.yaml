    The actual results of this hyperparameter run are not very interesting, as the
    problem is so easy to solve (most runs will return the optimum of 8 steps, regardless
    of the hyperparameters chosen). But in case I haven''t sold you on Ray''s capabilities
    yet, what''s more interesting here is how easy it is to parallelize the objective
    function with Ray. In fact, I''d like to encourage you to rewrite the above example
    to simply loop through the search space and call the objective function for each
    sample, just to confirm how painfully slow such a serial loop can be.


    Conceptually, the three steps we took to run the above example are representative
    of how hyperparameter tuning works in general. First, you define a search space,
    then you define an objective function, and finally you run an analysis to find
    the best hyperparameters. In HPO it is common to speak of one evaluation of the
    objective function per hyperparameter sample as a *trial*, and all trials form
    the basis for your analysis. How exactly parameters are sampled from the search
    space (in our case, randomly) is up to a *search algorithm* to decide. In practice,
    finding good hyperparameters is easier said than done, so let''s have a closer
    look at why this problem is so hard.


    # Why is HPO hard?


    If you zoom out from the above example just enough, you can see that there are
    several intricacies in making the process of hyperparameter tuning work well.
    Here''s a quick overview of the most important ones:


    +   - Your search space can be composed of a large number of hyperparameters.
    These parameters might have different data types and ranges. Some parameters might
    be correlated, or even depend on others. Sampling good candidates from complex,
    high-dimensional spaces is a difficult task.'
  merge: -1
  pgno: 102
- img_proc: true
  md: "+   - Picking parameters at random can work surprisingly well, but it's not\
    \ always the best option. In general, you need to test more complex search algorithms\
    \ to find the best parameters.\n- In particular, even if you parallelize your\
    \ hyperparameter search like we just did, a single run of your objective function\
    \ can take a long time to complete. That means you can't afford to run too many\
    \ searches overall. For instance, training neural networks can take hours to complete,\
    \ so your hyperparameter search better be efficient.\n- When distributing search,\
    \ you need to make sure to have enough compute resources available to run searches\
    \ over the objective function effectively. For instance, you might need a GPU\
    \ to compute your objective function fast enough, so all your search runs need\
    \ to have access to a GPU. Allocating the necessary resources for each trial is\
    \ critical to speeding up your search.\n- You want to have convenient tooling\
    \ for your HPO experiments, like stopping bad runs early, saving intermediate\
    \ results, restarting from previous trials, or pausing and resuming runs, etc.\n\
    \nAs a mature, distributed HPO framework, Ray Tune takes addresses all these topics\
    \ and provides you with a simple interface for running hyperparameter tuning experiments.\
    \ Before we look into how Tune works, let's rewrite our above example to use Tune.\n\
    \n# An introduction to Tune\n\nTo get your first taste of Tune, porting over our\
    \ naive Ray Core implementation of random search to Tune is straightforward and\
    \ follows the same three steps as before. First, we define a search space, but\
    \ this time using `tune.uniform`, instead of the random library:\n\nExample 5-4.\n\
    \n```\nfrom ray import tune\n\nsearch_space = {\n    \"weight\": tune.uniform(0,\
    \ 1),\n    \"discount_factor\": tune.uniform(0, 1),\n}\n```\n\nNext, we can define\
    \ an objective function that almost looks the same as before. We designed it like\
    \ that. The only differences are that this time we return the score as a dictionary,\
    \ and that we don't need a `ray.remote` decorator, as Tune will take care of distributing\
    \ this objective function for us internally."
  merge: -1
  pgno: 103
- img_proc: true
  md: "Example 5-5.\n\n```\ndef tune_objective(config):\n    environment = Environment()\n\
    \    policy = train_policy(\n        environment, weight=config[\"weight\"], discount_factor=config[\"\
    discount_factor\"]\n    )\n    score = evaluate_policy(environment, policy)\n\n\
    \    return {\"score\": score}\n```\n\nWith this `tune_objective` function defined,\
    \ we can pass is into a `tune.run` call, together with the search space we defined.\
    \ By default, Tune will run random search for you, but you can also specify other\
    \ search algorithms, as you will see soon. Calling `tune.run` generates random\
    \ search trials for your objective and returns an analysis object that contains\
    \ information about the hyperparameter search. We can get the best hyperparameters\
    \ found by calling `get_best_config` and specifying the metric and mode arguments\
    \ (we want to minimize our score):\n\nExample 5-6.\n\n```\nanalysis = tune.run(tune_objective,\
    \ config=search_space)\nprint(analysis.get_best_config(metric=\"score\", mode=\"\
    min\"))\n```\n\nThis quick example covers the very basics of Tune, but there's\
    \ a lot more to unpack. The `tune.run` function is quite powerful and takes a\
    \ lot of arguments for you to configure your runs. To understand these different\
    \ configuration options, we first need to introduce you to the key concepts of\
    \ Tune.\n\n# How does Tune work?\n\nTo effectively work with Tune, you have to\
    \ understand a total of six key concepts, four of which you have already used\
    \ in the last example. Here's an informal overview of Ray Tune's components and\
    \ how you should think about them:\n\n+   - *Search spaces*: These spaces determine\
    \ which parameters to select. Search spaces define the range of values for each\
    \ parameter, and how they should be sampled. They are defined as dictionaries\
    \ and use Tune's sampling functions to specify valid hyperparameter values. You\
    \ have already seen `tune.uniform`, but there are many more options to choose\
    \ from.\n- *Trainables*: A `Trainable` is Tune's formal representation of an objective\
    \ you want to \"tune\". Tune has class-based API as well, but we will only use\
    \ the function-based API in this book. For us, a `Trainable` is a function with\
    \ a single argument, a search space, which reports scores to Tune. The easiest\
    \ way to do so is by returning a dictionary with the score you're interested in."
  merge: -1
  pgno: 104
- img_proc: true
  md: '+   - *Trials*: By triggering `tune.run(...)`, Tune will make sure to set up
    trials and schedule them for execution on your cluster. A trial contains all necessary
    information about a single run of your objective, given a set of hyperparameters.

    - *Analyses*: Completing a `tune.run` call returns an `ExperimentAnalysis` object,
    with the results of all trials. You can use this object to drill down into the
    results of your trials.

    - *Search Algorithms*: Tune supports a large variety of search algorithms, which
    are at the core of how to tune your hyperparameters. So far you''ve only implicitly
    encountered Tune''s default search algorithm, which randomly selects hyperparameters
    from the search space.

    - *Schedulers*: The last, crucial component of a Tune experiment is that of a
    *scheduler*. Schedulers plan and execute what the search algorithm selects. By
    default, Tune schedules trials selected by your search algorithm on a first-in-first-out
    (FIFO) basis. In practice, you can think of schedulers as a way to speed up your
    experiments, for instance by stopping unsuccessful trials early.


    Figure Figure 5-1 sums up these major components of Tune, and their relationship
    in one diagram:


    ![](img/58c832795222840423ffeca1357b40a7_105_0.png)


    Note that internally Tune runs are started on the driver process of your Ray cluster,
    which spawns several worker processes (using Ray actors) that execute individual
    trials of your HPO experiment. Your trainables, defined on the driver, have to
    be sent to the workers, and trial results need to be communicated to the driver
    running `tune.run(...)`.


    Search spaces, Trainables, trials, and analyses don''t need much additional explanation,
    and we''ll see more examples of each of those components in the rest of this chapter.
    But search algorithms, or simply *searchers* for short, and schedulers need a
    bit more elaboration.'
  merge: -1
  pgno: 105
- img_proc: true
  md: "# Search Algorithms\n\nAll advanced search algorithms provided by Tune, and\
    \ the many third-party HPO libraries it integrates with, fall under the umbrella\
    \ of *Bayesian Optimization*. Unfortunately, going into the details of specific\
    \ Bayesian search algorithms is far beyond the scope of this book. The basic idea\
    \ is that you update your beliefs about which hyperparameter ranges are worth\
    \ exploring based on the results of your previous trials. Techniques using this\
    \ principle make more informed decisions and hence tend to be more efficient than\
    \ independently sampling parameters (e.g. at random).\n\nApart from the basic\
    \ random search we’ve seen already, and *grid search*, which picks hyperparameters\
    \ from a predefined “grid” of choices, Tune offers a wide range of Bayesian optimization\
    \ searchers. For instance, Tune integrates with the popular HyperOpt and Optuna\
    \ libraries, and you can use the popular TPE (Tree-structured Parzen Estimator)\
    \ searcher with Tune through both of these libraries. Not only that, Tune also\
    \ integrates with tools such as Ax, BlendSearch, FLAML, Dragonfly, Scikit-Optimize,\
    \ BayesianOptimization, HpBandSter, Nevergrad, ZOOpt, SigOpt, and HEBO. If you\
    \ need to run HPO experiments with any of these tools on a cluster, or want to\
    \ easily switch between them, Tune is the way to go.\n\nTo make things more concrete,\
    \ let’s rewrite our basic random search Tune example from earlier to use the bayesian-optimization\
    \ library. To do so, make sure you install this library in your Python environment\
    \ first, e.g. with `pip install bayesian-optimization`.\n\n*Example 5-7.*\n\n\
    ```\nfrom ray.tune.suggest.bayesopt import BayesOptSearch\n\nalgo = BayesOptSearch(random_search_steps=4)\n\
    \ntune.run(\n    tune_objective,\n    config=search_space,\n    metric=\"score\"\
    ,\n    mode=\"min\",\n    search_alg=algo,\n    stop={\"training_iteration\":\
    \ 10},\n)\n```\n\nNote that we “warm start” our Bayesian optimization with four\
    \ random steps at the beginning, and we explicitly stop the trial runs after 10\
    \ training iterations.\n\nNote that since we’re not just randomly selecting parameters\
    \ with BayesOptSearch, the `search_alg` we use in our Tune run needs to know which\
    \ `metric` to optimize for"
  merge: -1
  pgno: 106
- img_proc: true
  md: "and whether to minimize or optimize this metric. As we've argued before, we\
    \ want to achieve a \"min\" \"score\".\n\n# Schedulers\n\nLet's next discuss how\
    \ to use *trial schedulers* in Tune to make your runs more efficient. We also\
    \ use this section to introduce a slightly different way to report your metrics\
    \ to Tune within an objective function.\n\nSo, let's say that instead of computing\
    \ a score straight-up, like we did in all examples in this chapter so far, we\
    \ compute an *intermediate score* in a loop. This is a situation that often occurs\
    \ in supervised machine learning scenarios, when training a model for several\
    \ iterations (we'll see concrete applications of this later in this chapter).\
    \ With good hyperparameter choices selected, this immediate score might stagnate\
    \ way before the loop in which it is computed. In other words, if we don't see\
    \ enough incremental changes anymore, why not stop the trial early? This is exactly\
    \ one of the cases Tune's schedulers are built for.\n\nHere's a quick example\
    \ of such an objective function. This is a toy example, but it will help us reason\
    \ about the optimal hyperparameters we want Tune to find much better than if we\
    \ were discussing a black-box scenario.\n\n*Example 5-8.*\n\n```\ndef objective(config):\n\
    \    for step in range(30):  ①\n        score = config[\"weight\"] * (step **\
    \ 0.5) + config[\"bias\"]\n        tune.report(score=score)  ②\n\nsearch_space\
    \ = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n```\n\n+ \
    \  ① Often you may want to compute intermediate scores, e.g. in a “training loop”.\n\
    ② You can use `tune.report` to let Tune know about these intermediate scores.\n\
    \nThe score we want to minimize here is the square root of a positive number times\
    \ a weight, plus adding a bias term. It's clear that both of these hyperparameters\
    \ need to be as small as possible to minimize the score for any positive x. Given\
    \ that the square root function “flattens out”, we might not have to compute all\
    \ 30 passes through the loop to find sufficiently good values for our two hyperparameters.\
    \ If you imagine that each score computation took an hour, stopping early can\
    \ be a huge boost to make your experiments run quicker."
  merge: -1
  pgno: 107
- img_proc: true
  md: "Let's illustrate this idea by using the popular Hyperband algorithm as our\
    \ trial scheduler. This scheduler needs to be passed a metric and mode (again,\
    \ we minimize our score). We also make sure to run for 10 samples so as not to\
    \ stop too prematurely:\n\nExample 5-9.\n\n```\nfrom ray.tune.schedulers import\
    \ HyperBandScheduler\n\nscheduler = HyperBandScheduler(metric=\"score\", mode=\"\
    min\")\n\nanalysis = tune.run(\n    objective,\n    config=search_space,\n   \
    \ scheduler=scheduler,\n    num_samples=10,\n)\n\nprint(analysis.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\nNote that in this case we did not specify a search\
    \ algorithm, which means that Hyperband will run on parameters selected by random\
    \ search. We could also have *combined* this scheduler with another search algorithm\
    \ instead. This would have allowed us to pick better trial hyperparameters and\
    \ stop bad trials early. However, note that not every scheduler can be combined\
    \ with search algorithms. You're advised to check [Tune's scheduler compatibility\
    \ matrix](https://docs.ray.io/en/latest/tune/faq.html#which-search-algorithm-scheduler-should-i-use)\
    \ for more information.\n\nTo wrap this discussion up, apart from Hyperband Tune\
    \ includes distributed implementations of early stopping algorithms such as the\
    \ Median Stopping Rule, ASHA, Population Based Training (PBT) and Population Based\
    \ Bandits (PB2).\n\n# Configuring and running Tune\n\nBefore looking into more\
    \ concrete machine learning examples using Ray Tune, let's dive into some useful\
    \ topics that help you get more out of your Tune experiments, such as properly\
    \ utilizing resources, stopping and resuming trials, adding callbacks to your\
    \ Tune runs, or defining custom and conditional search spaces.\n\n# Specifying\
    \ resources\n\nBy default, each Tune trial will run on one CPU and leverage as\
    \ many CPUs as available for concurrent trials. For instance, if you run Tune\
    \ on a laptop with 8 CPUs, any of the experiments we computed so far in this chapter\
    \ will spawn 8 concurrent trials and allocate one CPU each for each trial. Changing\
    \ this behaviour can be controlled using the `resources_per_trial` argument of\
    \ a Tune run."
  merge: -1
  pgno: 108
- img_proc: true
  md: "What's interesting is that this does not stop with CPUs, you can also determine\
    \ the number of GPUs used per trial. Plus, Tune allows you to use *fractional\
    \ resources*, i.e., you can share resources between trials. So, let's say that\
    \ you have a machine with 12 CPUs and two GPUs and you request the following resources\
    \ for your objective:\n\n```\nfrom ray import tune\n\ntune.run(objective, num_samples=10,\
    \ resources_per_trial={\"cpu\": 2, \"gpu\": 0.5})\n```\n\nThat means Tune can\
    \ schedule and execute up to four concurrent trials on your machine, as this would\
    \ max out GPU utilization on this machine (while you'd still have 4 idle CPUs\
    \ for other tasks). If you want, you can also specify the amount of \"memory\"\
    \ used by a trial by passing the number of bytes into `resources_per_trial`. Also\
    \ note that should you have the need to explicitly *restrict* the number of concurrent\
    \ trials, you can do so by passing in the `max_concurrent_trials` parameter to\
    \ your `tune.run(...)`. In the above example, let's say you want to always keep\
    \ one GPU available for other tasks, you can limit the number of concurrent trials\
    \ to two by setting `max_concurrent_trials = 2`.\n\nNote that everything we just\
    \ exemplified for resources on a single machine naturally extends to any Ray cluster\
    \ and its available resources. In any case, Ray will always try to schedule the\
    \ next trials, but will wait and ensure enough resources are available before\
    \ executing them.\n\n# Callbacks and Metrics\n\nIf you've spent some time investigating\
    \ the outputs of the Tune runs we've started in this chapter so far, you'll have\
    \ noticed that each trial comes equipped with a lot of information by default,\
    \ such as the trial ID, its execution date, and much more. What's interesting\
    \ is that Tune not only allows you to customize the metrics you want to report,\
    \ you can also hook into a `tune.run` by providing *callbacks*. Let's compute\
    \ a quick, representative example that does both.\n\nSlightly modifying a previous\
    \ example, let's say we want to log a specific message whenever a trial returns\
    \ a result. To do so, all you need to do is implement the `on_trial_result` method\
    \ on a Callback object from the `ray.tune` package. Here's how that would look\
    \ like for an objective function that reports a score:\n\n*Example 5-10.*\n\n\
    ```\nfrom ray import tune\nfrom ray.tune import Callback\nfrom ray.tune.logger\
    \ import pretty_print\n\nclass PrintResultCallback(Callback):\n    def on_trial_result(self,\
    \ iteration, trials, trial, result, **info):\n```"

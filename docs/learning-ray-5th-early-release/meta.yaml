    # An Overview of RLlib


    Before we dive into some examples, let’s take a quick overview of what RLlib is
    and what it can do. As part of the Ray ecosystem, RLlib inherits all the performance
    and scalability benefits of Ray. In particular, RLlib is distributed by default,
    so you can scale out your RL training to as many nodes as you want. Other RL libraries
    can potentially scale out experiments, but it’s usually not straightforward to
    do so.


    Another benefit of being built on top of Ray is that RLlib integrates tightly
    with other Ray libraries. For instance, all RLlib algorithms can be tuned with
    Ray Tune, as we will see in Chapter 5, and you can seamlessly deploy your RLlib
    models with Ray Serve, as we will discuss in ???.


    What’s extremely useful is that RLlib works with both of the predominant deep
    learning frameworks at the time of this writing, namely PyTorch and TensorFlow.
    You can use either one of them as your backend and can easily switch between them,
    often by just changing one line of code. That’s a huge benefit, as companies are
    often locked into their underlying deep learning framework and can’t afford to
    switch to another system and rewrite their code.


    RLlib also has a track record of solving real-world problems and is a mature library
    used by many companies to bring their RL workloads to production. I often recommend
    RLlib to engineers, because its API tends to appeal to them. One of the reasons
    for that is that the RLlib API offers the right level of abstraction for many
    applications, while still being flexible enough to be extended, if necessary.



    \n| Method | Description |\n|---|---|\n| fit(self) | Fit this trainer with the\
    \ given dataset. |\n| get_checkpoints(self) | Return list of recent model checkpoints.\
    \ |\n| as_trainable(self) | Get a wrapper of this as a Tune trainable class. |\n\
    \nRay Train supports a variety of different trainers on a variety of frameworks,\
    \ namely XGBoost, LightGBM, Pytorch, HuggingFace, Tensorflow, Horovod, Scikit-learn,\
    \ RLlib, and more.\n\nNext, we’ll dive into two specific classes of Trainers:\
    \ Gradient Boosted Tree Framework Trainers, and Deep Learning Framework Trainers.\n\
    \n## Distributed Training for Gradient Boosted Trees\n\nRay Train offers Trainers\
    \ for LightGBM and XGBoost.\n\nXGBoost is an optimized distributed gradient boosting\
    \ library designed to be highly efficient, flexible and portable. It implements\
    \ machine learning algorithms under the Gradient Boosting framework. XGBoost provides\
    \ a parallel tree boosting (also known as GBDT, GBM) that solve many data science\
    \ problems in a fast and accurate way.\n\nLightGBM is a gradient boosting framework\
    \ based on tree-based learning algorithms. Compared to XGBoost, it is a relatively\
    \ new framework, but one that is quickly becoming popular in both academic and\
    \ production use cases.\n\nBy leveraging Ray Train’s XGBoost or LightGBM trainer,\
    \ you can take a large dataset and train a XGBoost Booster across multiple machines.\n\
    \n## Distributed Training for Deep Learning\n\nRay Train offers Deep Learning\
    \ Trainers, for instance supporting frameworks such as Tensorflow, Horovod, and\
    \ Pytorch.\n\nUnlike Gradient Boosted Trees Trainers, these Deep Learning frameworks\
    \ often give more control to the user. For example, Pytorch provides a set of\
    \ primitives that the user can use to construct their training loop.\n\nAs such,\
    \ the Deep Learning Trainer API allows the user to pass in a training function\
    \ and provides callback functions for the user to report metrics and checkpoint.\
    \ Let's take a look at an example Pytorch training script.\n\nBelow, we construct\
    \ a standard training function:\n\nExample 6-6.\n\n```\nimport torch\nimport torch.nn\
    \ as nn\n\nnum_samples = 20\ninput_size = 10\nlayer_size = 15\noutput_size = 5\n\
    \nclass NeuralNetwork(nn.Module):\n    def __init__(self):\n        super(NeuralNetwork,\
    \ self).__init__()\n        self.layer1 = nn.Linear(input_size, layer_size)\n\
    \        self.relu = nn.ReLU()\n        self.layer2 = nn.Linear(layer_size, output_size)\n\
    \n    def forward(self, input_data):\n        return self.layer2(self.relu(self.layer1(input_data)))\n\
    \ninput = torch.randn(num_samples, input_size) ①\nlabels = torch.randn(num_samples,\
    \ output_size)\n\ndef train_func(): ②\n    num_epochs = 3\n    model = NeuralNetwork()\n\
    \    loss_fn = nn.MSELoss()\n    optimizer = optim.SGD(model.parameters(), lr=0.1)\n\
    \    for epoch in range(num_epochs):\n        output = model(input)\n        loss\
    \ = loss_fn(output, labels)\n        optimizer.zero_grad()\n        loss.backward()\n\
    \        optimizer.step()\n```\n\n① In this example we use a randomly generated\
    \ dataset.\n\n② Define a training function.\n\nWe construct a training script\
    \ for Pytorch, where we create a small neural network and use a Mean Squared Error\
    \ (MSELoss) objective to optimize the model. The input to the model here is random\
    \ noise, but you can imagine that to be generated from a Torch Dataset.\n\nNow,\
    \ there are two key things that Ray Train will take care of for you.\n\n1. The\
    \ establishment of a backend that coordinates interprocess communication.\n2.\
    \ Instantiation of multiple parallel processes.\n\nSo, in short, you just need\
    \ to make a one-line change to your code:\n\nExample 6-7.\n\n```\nimport ray.train.torch\n\
    \ndef train_func_distributed():\n    num_epochs = 3\n    model = NeuralNetwork()\n\
    \    model = train.torch.prepare_model(model) ①\n    loss_fn = nn.MSELoss()\n\
    \    optimizer = optim.SGD(model.parameters(), lr=0.1)\n    for epoch in range(num_epochs):\n\
    \        output = model(input)\n        loss = loss_fn(output, labels)\n     \
    \   optimizer.zero_grad()\n        loss.backward()\n        optimizer.step()\n\
    ```\n\n① Prepare the model for distributed training.\n\nThen, you can plug this\
    \ into Ray Train:\n\nExample 6-8.\n\n```\nfrom ray.train import Trainer\n\ntrainer\
    \ = Trainer(backend=\"torch\", num_workers=4, use_gpu=False) ①\ntrainer.start()\n\
    results = trainer.run(train_func_distributed)\ntrainer.shutdown()\n```\n\n① Create\
    \ a trainer. For GPU Training, set use_gpu to True.\n\nThis code will work on\
    \ both a single machine or a distributed cluster.\n\n## Scaling Out Training with\
    \ Ray Train Trainers\n\nThe general philosophy of Ray Train is that the user should\
    \ not need to think about **how** to parallelize their code.\n\nWith Ray Train\
    \ Trainers, you can specify a `scaling_config` which allows you to scale out your\

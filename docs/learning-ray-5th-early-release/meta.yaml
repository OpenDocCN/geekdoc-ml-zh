    \ you should still be able to follow along and focus on the Ray Tune specific\
    \ parts. You can view the following example as a more realistic scenario of applying\
    \ Tune to machine learning workloads.\n\nFrom a bird's eye view, we're going to\
    \ load a common data set, prepare it for an ML task, define a Tune objective by\
    \ creating a deep learning model with Keras that reports an accuracy metric to\
    \ Tune, and use Tune's HyperOpt integration to define a search algorithm that\
    \ tunes a set of hyperparameters of our Keras model. The workflow remains the\
    \ same - we define an objective, a search space, and then use tune.run with the\
    \ configuration we want.\n\nTo define a data set to train on, let's write a simple\
    \ load_data utility function that loads the famous MNIST data that ships with\
    \ Keras. MNIST consists of 28 times 28 pixel images of handwritten digits. We\
    \ normalize the pixel values to be between 0 and 1, and make the labels for those\
    \ ten digits categorical variables. Here's how you can do this purely with Keras'\
    \ built-in functionality (make sure to pip install tensorflow before running this):\n\
    \nExample 5-17.\n\n```\nfrom tensorflow.keras.datasets import mnist\nfrom tensorflow.keras.utils\
    \ import to_categorical\n\ndef load_data():\n    (x_train, y_train), (x_test,\
    \ y_test) = mnist.load_data()\n    num_classes = 10\n    x_train, x_test = x_train\
    \ / 255.0, x_test / 255.0\n    y_train = to_categorical(y_train, num_classes)\n\
    \    y_test = to_categorical(y_test, num_classes)\n    return (x_train, y_train),\
    \ (x_test, y_test)\n```\n\nNext, we define a Tune objective function, or Trainable,\
    \ by loading the data we just defined, setting up a sequential Keras model with\
    \ hyperparameters selected from the config we pass into our objective, and then\
    \ compile and fit the model. To define our deep learning model, we first flatten\
    \ the MNIST input images to vectors and then add two fully-connected layers (called\
    \ Dense in Keras) and a Dropout layer in between. The hyperparameters we want\

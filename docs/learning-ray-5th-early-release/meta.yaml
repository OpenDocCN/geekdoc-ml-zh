    The actual results of this hyperparameter run are not very interesting, as the
    problem is so easy to solve (most runs will return the optimum of 8 steps, regardless
    of the hyperparameters chosen). But in case I haven''t sold you on Ray''s capabilities
    yet, what''s more interesting here is how easy it is to parallelize the objective
    function with Ray. In fact, I''d like to encourage you to rewrite the above example
    to simply loop through the search space and call the objective function for each
    sample, just to confirm how painfully slow such a serial loop can be.


    Conceptually, the three steps we took to run the above example are representative
    of how hyperparameter tuning works in general. First, you define a search space,
    then you define an objective function, and finally you run an analysis to find
    the best hyperparameters. In HPO it is common to speak of one evaluation of the
    objective function per hyperparameter sample as a *trial*, and all trials form
    the basis for your analysis. How exactly parameters are sampled from the search
    space (in our case, randomly) is up to a *search algorithm* to decide. In practice,
    finding good hyperparameters is easier said than done, so let''s have a closer
    look at why this problem is so hard.


    # Why is HPO hard?


    If you zoom out from the above example just enough, you can see that there are
    several intricacies in making the process of hyperparameter tuning work well.
    Here''s a quick overview of the most important ones:


    +   - Your search space can be composed of a large number of hyperparameters.
    These parameters might have different data types and ranges. Some parameters might
    be correlated, or even depend on others. Sampling good candidates from complex,
    high-dimensional spaces is a difficult task.'
- md: "- Picking parameters at random can work surprisingly well, but it's not always\
    \ the best option. In general, you need to test more complex search algorithms\
    \ to find the best parameters.\n- In particular, even if you parallelize your\
    \ hyperparameter search like we just did, a single run of your objective function\
    \ can take a long time to complete. That means you can't afford to run too many\
    \ searches overall. For instance, training neural networks can take hours to complete,\
    \ so your hyperparameter search better be efficient.\n- When distributing search,\
    \ you need to make sure to have enough compute resources available to run searches\
    \ over the objective function effectively. For instance, you might need a GPU\
    \ to compute your objective function fast enough, so all your search runs need\
    \ to have access to a GPU. Allocating the necessary resources for each trial is\
    \ critical to speeding up your search.\n- You want to have convenient tooling\
    \ for your HPO experiments, like stopping bad runs early, saving intermediate\
    \ results, restarting from previous trials, or pausing and resuming runs, etc.\n\
    \nAs a mature, distributed HPO framework, Ray Tune addresses all these topics\
    \ and provides you with a simple interface for running hyperparameter tuning experiments.\
    \ Before we look into how Tune works, let's rewrite our above example to use Tune.\n\
    \n## An introduction to Tune\n\nTo get your first taste of Tune, porting over\
    \ our naive Ray Core implementation of random search to Tune is straightforward\
    \ and follows the same three steps as before. First, we define a search space,\
    \ but this time using `tune.uniform`, instead of the random library:\n\nExample\
    \ 5-4.\n\n```\nfrom ray import tune\n\nsearch_space = {\n    \"weight\": tune.uniform(0,\
    \ 1),\n    \"discount_factor\": tune.uniform(0, 1),\n}\n```\n\nNext, we can define\
    \ an objective function that almost looks the same as before. We designed it like\
    \ that. The only differences are that this time we return the score as a dictionary,\
    \ and that we don't need a `ray.remote` decorator, as Tune will take care of distributing\
    \ this objective function for us internally.\n\nExample 5-5.\n\n```\ndef tune_objective(config):\n\
    \    environment = Environment()\n    policy = train_policy(\n        environment,\
    \ weight=config[\"weight\"], discount_factor=config[\"discount_factor\"]\n   \
    \ )\n    score = evaluate_policy(environment, policy)\n\n    return {\"score\"\
    : score}\n```\n\nWith this `tune_objective` function defined, we can pass it into\
    \ a `tune.run` call, together with the search space we defined. By default, Tune\
    \ will run random search for you, but you can also specify other search algorithms,\
    \ as you will see soon. Calling `tune.run` generates random search trials for\
    \ your objective and returns an analysis object that contains information about\
    \ the hyperparameter search. We can get the best hyperparameters found by calling\
    \ `get_best_config` and specifying the metric and mode arguments (we want to minimize\
    \ our score):\n\nExample 5-6.\n\n```\nanalysis = tune.run(tune_objective, config=search_space)\n\
    print(analysis.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\nThis quick\
    \ example covers the very basics of Tune, but there's a lot more to unpack. The\
    \ `tune.run` function is quite powerful and takes a lot of arguments for you to\
    \ configure your runs. To understand these different configuration options, we\
    \ first need to introduce you to the key concepts of Tune.\n\n## How does Tune\
    \ work?\n\nTo effectively work with Tune, you have to understand a total of six\
    \ key concepts, four of which you have already used in the last example. Here's\
    \ an informal overview of Ray Tune's components and how you should think about\
    \ them:\n\n- *Search spaces*: These spaces determine which parameters to select.\
    \ Search spaces define the range of values for each parameter, and how they should\
    \ be sampled. They are defined as dictionaries and use Tune's sampling functions\
    \ to specify valid hyperparameter values. You have already seen `tune.uniform`,\
    \ but there are many more options to choose from.\n- *Trainables*: A `Trainable`\
    \ is Tune's formal representation of an objective you want to \"tune\". Tune has\
    \ a class-based API as well, but we will only use the function-based API in this\
    \ book. For us, a `Trainable` is a function with a single argument, a search space,\
    \ which reports scores to Tune. The easiest way to do so is by returning a dictionary\
    \ with the score you're interested in.\n- *Trials*: By triggering `tune.run(...)`,\
    \ Tune will make sure to set up trials and schedule them for execution on your\
    \ cluster. A trial contains all necessary information about a single run of your\
    \ objective, given a set of hyperparameters.\n- *Analyses*: Completing a `tune.run`\
    \ call returns an `ExperimentAnalysis` object, with the results of all trials.\
    \ You can use this object to drill down into the results of your trials.\n- *Search\
    \ Algorithms*: Tune supports a large variety of search algorithms, which are at\
    \ the core of how to tune your hyperparameters. So far you've only implicitly\
    \ encountered Tune's default search algorithm, which randomly selects hyperparameters\
    \ from the search space.\n- *Schedulers*: The last, crucial component of a Tune\
    \ experiment is that of a *scheduler*. Schedulers plan and execute what the search\
    \ algorithm selects. By default, Tune schedules trials selected by your search\
    \ algorithm on a first-in-first-out (FIFO) basis. In practice, you can think of\
    \ schedulers as a way to speed up your experiments, for instance by stopping unsuccessful\
    \ trials early.\n\nFigure 5-1 sums up these major components of Tune, and their\
    \ relationship in one diagram:\n\n![](img/58c832795222840423ffeca1357b40a7_105_0.png)\n\
    \nNote that internally Tune runs are started on the driver process of your Ray\
    \ cluster, which spawns several worker processes (using Ray actors) that execute\
    \ individual trials of your HPO experiment. Your trainables, defined on the driver,\
    \ have to be sent to the workers, and trial results need to be communicated to\
    \ the driver running `tune.run(...)`.\n\nSearch spaces, Trainables, trials, and\
    \ analyses don't need much additional explanation, and we'll see more examples\
    \ of each of those components in the rest of this chapter. But search algorithms,\
    \ or simply *searchers* for short, and schedulers need a bit more elaboration.\n\
    \n## Search Algorithms\n\nAll advanced search algorithms provided by Tune, and\
    \ the many third-party HPO libraries it integrates with, fall under the umbrella\
    \ of *Bayesian Optimization*. Unfortunately, going into the details of specific\
    \ Bayesian search algorithms is far beyond the scope of this book. The basic idea\
    \ is that you update your beliefs about which hyperparameter ranges are worth\
    \ exploring based on the results of your previous trials. Techniques using this\
    \ principle make more informed decisions and hence tend to be more efficient than\
    \ independently sampling parameters (e.g. at random).\n\nApart from the basic\
    \ random search we’ve seen already, and *grid search*, which picks hyperparameters\
    \ from a predefined “grid” of choices, Tune offers a wide range of Bayesian optimization\
    \ searchers. For instance, Tune integrates with the popular HyperOpt and Optuna\
    \ libraries, and you can use the popular TPE (Tree-structured Parzen Estimator)\
    \ searcher with Tune through both of these libraries. Not only that, Tune also\
    \ integrates with tools such as Ax, BlendSearch, FLAML, Dragonfly, Scikit-Optimize,\
    \ BayesianOptimization, HpBandSter, Nevergrad, ZOOpt, SigOpt, and HEBO. If you\
    \ need to run HPO experiments with any of these tools on a cluster, or want to\
    \ easily switch between them, Tune is the way to go.\n\nTo make things more concrete,\
    \ let’s rewrite our basic random search Tune example from earlier to use the bayesian-optimization\
    \ library. To do so, make sure you install this library in your Python environment\
    \ first, e.g. with `pip install bayesian-optimization`.\n\nExample 5-7.\n\n```\n\
    from ray.tune.suggest.bayesopt import BayesOptSearch\n\nalgo = BayesOptSearch(random_search_steps=4)\n\
    \ntune.run(\n    tune_objective,\n    config=search_space,\n    metric=\"score\"\
    ,\n    mode=\"min\",\n    search_alg=algo,\n    stop={\"training_iteration\":\
    \ 10},\n)\n```\n\nNote that we “warm start” our Bayesian optimization with four\
    \ random steps at the beginning, and we explicitly stop the trial runs after 10\
    \ training iterations.\n\nNote that since we’re not just randomly selecting parameters\
    \ with BayesOptSearch, the `search_alg` we use in our Tune run needs to know which\
    \ `metric` to optimize for."
  mdcn: "- 随机选择参数有时效果出奇地好，但这并非总是最佳选择。通常，你需要测试更复杂的搜索算法来找到最优参数。\n- 特别是，即使你像我们刚才那样并行化超参数搜索，单次目标函数运行也可能耗时很长。这意味着你无法承担过多的搜索次数。例如，训练神经网络可能需要数小时才能完成，因此你的超参数搜索必须高效。\n\
    - 在分布式搜索中，你需要确保有足够的计算资源来有效运行目标函数搜索。例如，你可能需要GPU来快速计算目标函数，因此所有搜索运行都需要访问GPU。为每次试验分配必要资源对于加速搜索至关重要。\n\
    - 你需要为HPO实验提供便捷的工具支持，例如提前终止不佳的运行、保存中间结果、从之前的试验重启，或暂停和恢复运行等。\n\n作为一个成熟的分布式HPO框架，Ray\
    \ Tune解决了所有这些问题，并为你提供了一个简洁的接口来运行超参数调优实验。在深入了解Tune的工作原理之前，让我们先用Tune重写上面的示例。\n\n\
    ## Tune简介\n\n要初步体验Tune，将我们之前基于Ray Core的随机搜索简单实现移植到Tune非常直接，遵循与之前相同的三个步骤。首先，我们定义搜索空间，但这次使用`tune.uniform`，而不是random库：\n\
    \n示例5-4。\n\n```\nfrom ray import tune\n\nsearch_space = {\n    \"weight\": tune.uniform(0,\
    \ 1),\n    \"discount_factor\": tune.uniform(0, 1),\n}\n```\n\n接下来，我们可以定义一个目标函数，它看起来几乎和之前一样。我们就是这样设计的。唯一的区别是这次我们以字典形式返回分数，并且不需要`ray.remote`装饰器，因为Tune会在内部负责分发这个目标函数。\n\
    \n示例5-5。\n\n```\ndef tune_objective(config):\n    environment = Environment()\n\
    \    policy = train_policy(\n        environment, weight=config[\"weight\"], discount_factor=config[\"\
    discount_factor\"]\n    )\n    score = evaluate_policy(environment, policy)\n\n\
    \    return {\"score\": score}\n```\n\n定义好这个`tune_objective`函数后，我们可以将其与定义的搜索空间一起传递给`tune.run`调用。默认情况下，Tune会为你运行随机搜索，但你也可以指定其他搜索算法，稍后你会看到。调用`tune.run`会为你的目标函数生成随机搜索试验，并返回一个包含超参数搜索信息的分析对象。我们可以通过调用`get_best_config`并指定metric和mode参数来获取找到的最佳超参数（我们希望最小化分数）：\n\
    \n示例5-6。\n\n```\nanalysis = tune.run(tune_objective, config=search_space)\nprint(analysis.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\n这个快速示例涵盖了Tune的基础知识，但还有很多内容需要深入探讨。`tune.run`函数功能强大，接受许多参数来配置你的运行。要理解这些不同的配置选项，我们首先需要向你介绍Tune的关键概念。\n\
    \n## Tune如何工作？\n\n要有效使用Tune，你需要理解总共六个关键概念，其中四个你已经在上一个例子中使用过。以下是Ray Tune组件的非正式概述以及你应该如何理解它们：\n\
    \n- *搜索空间*：这些空间决定了选择哪些参数。搜索空间定义了每个参数的值范围以及如何采样。它们被定义为字典，并使用Tune的采样函数来指定有效的超参数值。你已经见过`tune.uniform`，但还有很多其他选择。\n\
    - *可训练对象*：`Trainable`是Tune对你想要“调优”的目标的正式表示。Tune也有基于类的API，但本书中我们只使用基于函数的API。对我们来说，`Trainable`是一个接受单个参数（搜索空间）的函数，它向Tune报告分数。最简单的方法是返回一个包含你感兴趣分数的字典。\n\
    - *试验*：通过触发`tune.run(...)`，Tune会确保设置试验并在你的集群上调度执行。试验包含关于给定一组超参数的单次目标函数运行的所有必要信息。\n\
    - *分析*：完成`tune.run`调用会返回一个`ExperimentAnalysis`对象，其中包含所有试验的结果。你可以使用此对象深入查看试验结果。\n\
    - *搜索算法*：Tune支持多种搜索算法，这些算法是调优超参数的核心。到目前为止，你只是隐式地遇到了Tune的默认搜索算法，它从搜索空间中随机选择超参数。\n\
    - *调度器*：Tune实验的最后一个关键组件是*调度器*。调度器规划并执行搜索算法选择的内容。默认情况下，Tune按照先进先出（FIFO）原则调度搜索算法选择的试验。实际上，你可以将调度器视为加速实验的一种方式，例如提前停止不成功的试验。\n\
    \n图5-1在一个图表中总结了Tune的这些主要组件及其关系：\n\n![](img/58c832795222840423ffeca1357b40a7_105_0.png)\n\
    \n请注意，在内部，Tune运行是在Ray集群的驱动程序进程上启动的，该进程会生成多个工作进程（使用Ray actors）来执行HPO实验的各个试验。你在驱动程序上定义的可训练对象必须发送到工作进程，试验结果需要与运行`tune.run(...)`的驱动程序通信。\n\
    \n搜索空间、可训练对象、试验和分析不需要太多额外解释，我们将在本章的其余部分看到更多关于这些组件的示例。但搜索算法（简称*搜索器*）和调度器需要更详细的阐述。\n\
    \n## 搜索算法\n\nTune提供的所有高级搜索算法，以及它集成的许多第三方HPO库，都属于*贝叶斯优化*的范畴。不幸的是，深入探讨特定贝叶斯搜索算法的细节远远超出了本书的范围。基本思想是根据之前试验的结果更新你对哪些超参数范围值得探索的信念。使用此原则的技术能做出更明智的决策，因此往往比独立采样参数（例如随机采样）更高效。\n\
    \n除了我们已经看到的基本随机搜索和*网格搜索*（从预定义的“网格”中选择超参数）之外，Tune还提供了广泛的贝叶斯优化搜索器。例如，Tune集成了流行的HyperOpt和Optuna库，你可以通过这两个库在Tune中使用流行的TPE（树结构Parzen估计器）搜索器。不仅如此，Tune还集成了Ax、BlendSearch、FLAML、Dragonfly、Scikit-Optimize、BayesianOptimization、HpBandSter、Nevergrad、ZOOpt、SigOpt和HEBO等工具。如果你需要在集群上使用这些工具中的任何一个运行HPO实验，或者想轻松地在它们之间切换，Tune是最佳选择。\n\
    \n为了更具体，让我们用bayesian-optimization库重写之前的基本随机搜索Tune示例。为此，请确保首先在你的Python环境中安装此库，例如使用`pip\
    \ install bayesian-optimization`。\n\n示例5-7。\n\n```\nfrom ray.tune.suggest.bayesopt\
    \ import BayesOptSearch\n\nalgo = BayesOptSearch(random_search_steps=4)\n\ntune.run(\n\
    \    tune_objective,\n    config=search_space,\n    metric=\"score\",\n    mode=\"\
    min\",\n    search_alg=algo,\n    stop={\"training_iteration\": 10},\n)\n```\n\
    \n请注意，我们以四个随机步骤“热启动”贝叶斯优化，并在10次训练迭代后明确停止试验运行。\n\n请注意，由于我们使用BayesOptSearch时并非随机选择参数，因此我们在Tune运行中使用的`search_alg`需要知道要优化哪个`metric`。"

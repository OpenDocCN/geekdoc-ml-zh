    \ RLlib 环境的实际应用示例。\n\n## RLlib 环境概述\n\n所有可用的 RLlib 环境都扩展了一个共同的 BaseEnv 类。如果您想使用同一个\
    \ gym.Env 环境的多个副本，可以使用 RLlib 的 VectorEnv 包装器。向量化环境很有用，但也是对您已经见过的内容的简单推广。RLlib\
    \ 中可用的另外两种环境类型更有趣，也更值得关注。\n\n第一种称为 MultiAgentEnv，它允许您训练一个包含多个智能体的模型。使用多个智能体可能很棘手，因为您必须注意在环境中为您的智能体定义合适的接口，并考虑到每个智能体可能与其环境交互的方式完全不同。更重要的是，智能体之间可能会相互交互，并且必须尊重彼此的动作。在更高级的设置中，甚至可能存在一个显式相互依赖的智能体层次结构。简而言之，运行多智能体强化学习实验是困难的，我们将在下一个示例中看到\
    \ RLlib 如何处理这个问题。\n\n我们将要研究的另一种环境类型称为 ExternalEnv，可用于将外部模拟器连接到 RLlib。例如，想象一下我们之前简单的迷宫问题是一个实际机器人在迷宫中导航的模拟。在这种场景下，将机器人（或其在不同软件栈中实现的模拟）与\
    \ RLlib 的学习智能体放在一起可能并不合适。为此，RLlib 为您提供了一个简单的客户端-服务器架构，用于与外部模拟器通信，允许通过 REST API\
    \ 进行通信。\n\n在图 4-1 中，我们为您总结了所有可用的 RLlib 环境：\n\n![](img/58c832795222840423ffeca1357b40a7_85_0.png)\n\
    \n图 4-1. 所有可用 RLlib 环境概述\n\n## 使用多个智能体\n\n在 RLlib 中定义多智能体环境的基本思想很简单。无论您在 gym 环境中定义为单个值的内容，现在都定义为一个字典，其中包含每个智能体的值，并且每个智能体都有其唯一的键。当然，实际细节比这稍微复杂一些。但是一旦您定义了一个托管多个智能体的环境，接下来需要定义的是这些智能体应该如何学习。\n\
    \n在单智能体环境中，有一个智能体和一个策略需要学习。在多智能体环境中，有多个智能体可能映射到一个或多个策略。例如，如果您环境中有一组同质智能体，那么您可以为它们所有定义一个单一策略。如果它们都以相同的方式*行动*，那么它们的行为可以以相同的方式学习。相反，您可能会遇到异质智能体的情况，其中每个智能体都必须学习一个单独的策略。在这两种极端情况之间，存在一系列可能性，如图\
    \ 4-2 所示：\n\n![](img/58c832795222840423ffeca1357b40a7_86_0.png)\n\n图 4-2. 多智能体强化学习问题中智能体到策略的映射\n\
    \n我们继续使用我们的迷宫游戏作为本章的运行示例。这样您就可以自己检查接口在实践中是如何不同的。因此，为了将我们刚刚概述的想法转化为代码，让我们定义一个 GymEnvironment\
    \ 类的多智能体版本。我们的 MultiAgentEnv 类将恰好有两个智能体，我们将其编码在一个名为 agents 的 Python 字典中，但原则上这适用于任意数量的智能体。我们首先初始化并重置我们的新环境：\n\
    \n```python\nfrom ray.rllib.env.multi_agent_env import MultiAgentEnv\nfrom gym.spaces\
    \ import Discrete\nimport os\n```\n\n```python\nclass MultiAgentMaze(MultiAgentEnv):\n\
    \n    agents = {1: (4, 0), 2: (0, 4)} ①\n    goal = (4, 4)\n    info = {1: {'obs':\
    \ agents[1]}, 2: {'obs': agents[2]}} ②\n\n    def __init__(self, *args, **kwargs):\
    \ ③\n        self.action_space = Discrete(4)\n        self.observation_space =\
    \ Discrete(5*5)\n\n    def reset(self):\n        self.agents = {1: (4, 0), 2:\
    \ (0, 4)}\n        return {1: self.get_observation(1), 2: self.get_observation(2)}\n\
    ```\n\n① 我们现在有一个 agents 字典，其中包含两个起始位置分别为 (0, 4) 和 (4, 0) 的搜索者。\n\n② 对于 info 对象，我们使用智能体\
    \ ID 作为键。\n\n③ 动作空间和观察空间与之前完全相同。\n\n④ 观察现在是按智能体划分的字典。\n\n请注意，与单智能体情况相比，我们既不需要修改动作空间也不需要修改观察空间，因为我们这里使用的是两个本质上相同的智能体，它们可以使用相同的空间。在更复杂的情况下，您必须考虑到某些智能体的动作和观察可能看起来不同。\n\

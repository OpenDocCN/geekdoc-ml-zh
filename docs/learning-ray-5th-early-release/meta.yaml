    \ a good opportunity to introduce some advanced concepts that you can apply to\
    \ other RL problems.\n\n## Applying Curriculum Learning\n\nOne of the most interesting\
    \ features of RLlib is to provide a Trainer with a *curriculum* to learn from.\
    \ What that means is that, instead of letting the trainer learn from arbitrary\
    \ environment setups, we cherry pick states that are much easier to learn from\
    \ and then slowly but surely introduce more difficult states. Building a learning\
    \ curriculum this way is a great way to make your experiments converge on solutions\
    \ quicker. The only thing you need to apply curriculum learning is a view on which\
    \ starting states are easier than others. For many environments that can actually\
    \ be a challenge, but it's easy to come up with a simple curriculum for our advanced\
    \ maze. Namely, the distance of the seeker from the goal can be used as a measure\
    \ of difficulty. The distance measure we'll use for simplicity is the sum of the\
    \ absolute distance of both seeker coordinates from the goal to define a difficulty.\n\
    \nTo run curriculum learning with RLlib, we define a `CurriculumEnv` that extends\
    \ both our `AdvancedEnv` and a so-called `TaskSettableEnv` from RLLib. The interface\
    \ of `TaskSettableEnv` is very simple, in that you only have to define how to\
    \ get the current difficulty (get_task) and how to set a required difficulty (set_task).\
    \ Here's the full definition of this CurriculumEnv:\n\n```python\nfrom ray.rllib.env.apis.task_settable_env\
    \ import TaskSettableEnv\n\nclass CurriculumEnv(AdvancedEnv, TaskSettableEnv):\n\
    \n    def __init__(self, *args, **kwargs):\n        AdvancedEnv.__init__(self)\n\
    \n    def difficulty(self):\n        return abs(self.seeker[0] - self.goal[0])\
    \ + abs(self.seeker[1] - self.goal[1])\n\n    def get_task(self):\n        return\
    \ self.difficulty()\n\n    def set_task(self, task_difficulty):\n        while\
    \ not self.difficulty() <= task_difficulty:\n            self.reset()\n```\n\n\
    To use this environment for curriculum learning, we need to define a curriculum\
    \ function that tells the trainer when and how to set the task difficulty. We\
    \ have many options here, but we use a schedule that simply increases the difficulty\
    \ by one every 1000 time steps trained:\n\n```python\ndef curriculum_fn(train_results,\
    \ task_settable_env, env_ctx):\n    time_steps = train_results.get(\"timesteps_total\"\
    )\n    difficulty = time_steps // 1000\n    print(f\"Current difficulty: {difficulty}\"\
    )\n    return difficulty\n```\n\nTo test this curriculum function, we need to\
    \ add it to our RLlib trainer config, namely by setting the env_task_fn property\
    \ to our curriculum_fn. Note that before training a DQNTrainer for 15 iterations,\
    \ we also set an output folder in our config. This will store experience data\
    \ of our training run to the specified temp folder.\n\n```python\nconfig = {\n\
    \    \"env\": CurriculumEnv,\n    \"env_task_fn\": curriculum_fn,\n    \"output\"\
    : \"/tmp/env-out\",\n}\n\nfrom ray.rllib.agents.dqn import DQNTrainer\n\ntrainer\
    \ = DQNTrainer(env=CurriculumEnv, config=config)\n\nfor i in range(15):\n    trainer.train()\n\
    ```\n\nRunning this trainer, you should see how the task difficulty increases\
    \ over time, thereby giving the trainer easy examples to start with so that it\
    \ can learn from them and progress to more difficult tasks as it progresses.\n\
    \nCurriculum learning is a great technique to be aware of and RLlib allows you\
    \ to easily incorporate it into your experiments through the curriculum API we\
    \ just discussed.\n\n## Working with Offline Data\n\nIn our previous curriculum\
    \ learning example we stored training data to a temporary folder. What's interesting\
    \ is that you already know from Chapter 3 that in Q-learning you can collect experience\
    \ data first, and decide when to use it in a training step later. This separation\
    \ of data collection and training opens up many possibilities. For instance, maybe\
    \ you have a good heuristic that can solve your problem in an imperfect, yet reasonable\
    \ manner. Or you have records of human interaction with your environment, demonstrating\
    \ how to solve the problem by example.\n\nThe topic of collecting experience data\
    \ for later training is often discussed as working with *offline data*. It's called\
    \ offline, as it's not directly generated by a policy interacting online with\
    \ the environment. Algorithms that don't rely on training on their own policy\
    \ output are called off-policy algorithms, and Q-Learning, respectively DQN, is\
    \ just one such example. Algorithms that don't share this property are accordingly\
    \ called on-policy algorithms. In other words, off-policy algorithms can be used\
    \ to train on offline data⁹.\n\nTo use the data we stored in the /tmp/env-out\
    \ folder before, we can create a new training configuration that takes this folder\
    \ as input. Note how we set exploration to False in the following configuration,\
    \ since we simply want to exploit the data previously collected for training -\
    \ the algorithm will not explore according to its own policy.\n\n```python\ninput_config\
    \ = {\n    \"input\": \"/tmp/env-out\",\n    \"input_evaluation\": [],\n    \"\
    explore\": False\n}\n```\n\nUsing this `input_config` for training works exactly\
    \ as before, which we demonstrate by training an agent for 10 iterations and evaluating\
    \ it:\n\n```python\nimitation_trainer = DQNTrainer(env=AdvancedEnv, config=input_config)\n\
    for i in range(10):\n    imitation_trainer.train()\nimitation_trainer.evaluate()\n\
    ```\n\nNote that we called the trainer `imitation_trainer`. That's because this\
    \ training procedure intends to *imitate* the behavior reflected in the data we\
    \ collected before. This type of learning by demonstration in RL is therefore\
    \ often called *imitation learning* or *behavior cloning*.\n\n⁹ Note that RLlib\
    \ has a wide range of on-policy algorithms like PPO as well.\n\n## Other Advanced\

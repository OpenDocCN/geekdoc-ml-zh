  md: "references). Also, anything that gets registered through ray.put() is owned\
    \ by the caller. You should understand ownership in contrast to dependency, which\
    \ we've already covered by example when discussing task dependencies.\n\nTo give\
    \ you a concrete example, let's say we have a program that starts a task which\
    \ takes an input value val and internally calls another task. That could look\
    \ as follows:\n\nExample 2-11.\n\n```\n@ray.remote\ndef task_owned():\n    return\n\
    \n@ray.remote\ndef task(dependency):\n    res_owned = task_owned.remote()\n  \
    \  return\n\nval = ray.put(\"value\")\nres = task.remote(dependency=val)\n```\n\
    \nFrom this point on we won't mention it again, but this example assumes that\
    \ you have a running Ray cluster started with ray.init(). Let's quickly analyse\
    \ ownership and dependency for this example. We defined two tasks in task and\
    \ task_owned, and we have three variables in total, namely val, res and rew_owned.\
    \ Our main program defines both val (which puts \"value\" into the object store)\
    \ and res, the final result of th whole program, and it also calls task. In other\
    \ words, the driver owns task, val and res according to Ray's ownership definition.\
    \ In contrast, res depends on task, but there's no ownership relationship between\
    \ the two. When task gets called, it takes val as a dependency. It then calls\
    \ task_owned and assigns res_owned, and hence owns them both. Lastly, task_owned\
    \ itself does not own anything, but certainly rew_owned depends on it.\n\nOwnership\
    \ is important to know about, but it's not a concept you encounter all that often\
    \ when working with Ray. The reason we brought it up in this context is that worker\
    \ processes need to track what they own. In fact, they possess a so-called ownership\
    \ table exactly for that reason. If a task fails and needs to be recomputed, the\
    \ worker already owns all the information it needs to do so. On top of that, workers\
    \ also have an in-process store for small objects, which has a default limit of\
    \ 100KB. Workers have that store so that small data can be directly accessed and\
    \ stored without incurring communication overhead with the Raylet object store,\
    \ which is reserved for large objects."

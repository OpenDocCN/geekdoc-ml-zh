  - "[PAGE 72]\n\n+   1. The gym.Env interface has an action and an observation space.\n\
    2. The Env can run a step and returns a tuple of observations, reward, done condition,\
    \ and further info.\n3. An Env can reset itself, which will return the current\
    \ observations\n4. We can render an Env for different purposes, like for human\
    \ display or as string representation.\n\nIf you've read Chapter 3 carefully,\
    \ you'll notice that this is very similar to the interface of the maze Environment\
    \ we built there. In fact, gym has a so-called Discrete space implemented in gym.spaces,\
    \ which means that we can make our maze Environment a gym.Env as follows. We assume\
    \ that you store this code in a file called maze_gym_env.py and that the code\
    \ for the Discrete space and the Environment from Chapter 3 is either located\
    \ at the top of that file (or is imported there).\n\n```\n# Original definition\
    \ of `Environment` and `Discrete` go here.\n\nimport gym\nfrom gym.spaces import\
    \ Discrete ①\n\nclass GymEnvironment(Environment, gym.Env): ②\n    def __init__(self,\
    \ *args, **kwargs):\n        \"\"\"Make our original `Environment` a gym `Env`.\"\
    \"\"\n        super().__init__(*args, **kwargs)\n\ngym_env = GymEnvironment()\n\
    ```\n\n+   1. We override our own Discrete implementation with that of gym.\n\
    2. We then simply make our GymEnvironment implement a gym.Env. The interface is\
    \ essentially the same as before.\n\nOf course, we could have made our original\
    \ Environment implement gym.Env by simply inheriting from it in the first place.\
    \ But the point is that the gym.Env interface comes up so naturally in the context\
    \ of RL that it is a good exercise to implement it without having to resort to\
    \ external libraries.\n\nNotably, the gym.Env interface also comes with helpful\
    \ utility functionality and many interesting example implementations. For instance,\
    \ the Pendulum-v1 environment we used in Chapter 1 is an example from gym, and\
    \ there are many other environments available to test your RL algorithms."
  - "[PAGE 73]\n\n# Running the RLlib CLI\n\nNow that we have our `GymEnvironment`\
    \ implemented as a `gym.Env`, here's how you can use it with RLlib. You've seen\
    \ the RLlib CLI in action in Chapter 1 before, but this time the situation is\
    \ a bit different. In the first chapter we simply referenced the Pendulum-v1 environment\
    \ from by *name* in a YAML file, along with other RL training configuration. This\
    \ time around we want to bring our own `gym` environment class, namely the class\
    \ `GymEnvironment` that we defined in `maze_gym_env.py`. To specify this class\
    \ in Ray RLlib, you use the full qualifying name of the class from where you're\
    \ referencing it, i.e. in our case `maze_gym_env.GymEnvironment`. If you had a\
    \ more complicated Python project and your environment is stored in another module,\
    \ you'd simply add the module name accordingly.\n\nThe following YAML file specifies\
    \ the minimal configuration needed to train an RLlib algorithm on the `GymEnvironment`\
    \ class. To align as closely as possible with our experiment from Chapter 3, in\
    \ which we used Q-learning, we use DQN as the algorithm for our training run.\
    \ Also, to make sure we can control the time of training, we set an explicit stop\
    \ condition, namely by setting `timesteps_total` to 10000.\n\n```\n# maze.yml\n\
    maze_env:\n    env: maze_gym_env.GymEnvironment ①\n    run: DQN\n    checkpoint_freq:\
    \ 1 ②\n    stop:\n        timesteps_total: 10000 ③\n```\n\n+   ① We specify the\
    \ relative Python path to our environment class here.\n② We store checkpoints\
    \ of our model after each training iteration.\n③ We can also specify a stopping\
    \ condition for training, here a maximum of 10000 steps.\n\nAssuming you store\
    \ this configuration in a file called `maze.yml` you can now kick off an RLlib\
    \ training run by running the following `train` command:\n\n```\nrllib train -f\
    \ maze.yml\n```\n\nThis single line of code basically takes care of everything\
    \ we did in Chapter 3, but better. It runs a more sophisticated version of Q-Learning\
    \ for us (DQN), takes care of scaling out to multiple workers under the hood,\
    \ and even creates checkpoints of the algorithm automatically for us.\n\nFrom\
    \ the output of that training script you should see that Ray will write training\
    \ results to a `logdir` directory located at `~/ray_results/maze_env`. Within\
    \ that folder you'll find another directory that starts with `DQN_maze_gym_env.GymEnvironment_`"

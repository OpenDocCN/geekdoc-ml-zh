    \ for choice in search_space]\nresults = ray.get(result_objects)\n\nresults.sort(key=lambda\
    \ x: x[0])\nprint(results[-1])\n```\n\n这次超参数运行的实际结果并不十分有趣，因为这个问题太容易解决了（大多数运行都会返回最优的\
    \ 8 步，无论选择什么超参数）。但如果我还没有说服您 Ray 的能力，这里更有趣的是使用 Ray 并行化目标函数是多么容易。事实上，我鼓励您重写上面的示例，简单地遍历搜索空间并为每个样本调用目标函数，以确认这样的串行循环会慢得多么痛苦。\n\
    \n从概念上讲，我们运行上述示例所采取的三个步骤代表了超参数调整的一般工作方式。首先，您定义一个搜索空间，然后定义一个目标函数，最后运行分析以找到最佳超参数。在\
    \ HPO 中，通常将目标函数的一次评估（针对一个超参数样本）称为一次*试验*，所有试验构成了您分析的基础。参数如何从搜索空间中采样（在我们的例子中是随机的）由*搜索算法*决定。在实践中，找到好的超参数说起来容易做起来难，所以让我们更仔细地看看为什么这个问题如此困难。\n\
    \n## 为什么 HPO 很难？\n\n如果您从上面的例子中稍微退一步，您会发现使超参数调整过程良好运作存在一些复杂性。以下是最重要的几点概述：\n\n-\
    \ 您的搜索空间可能由大量超参数组成。这些参数可能具有不同的数据类型和范围。一些参数可能相关，甚至依赖于其他参数。从复杂的高维空间中采样好的候选参数是一项艰巨的任务。"

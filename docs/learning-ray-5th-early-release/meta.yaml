    pass our actor into any dependent task, or even pass it into the constructor of
    yet another actor. There is no limitation to what you can do, and it’s this flexibility
    that makes the Ray API so powerful. It’s also worth mentioning that it’s not very
    common for distributed Python tools to allow for stateful computations like this.
    This feature can come in very handy, especially when running complex distributed
    algorithms, for instance when using reinforcement learning. This completes our
    extensive first Ray API example. Let’s see if we can concisely summarize the Ray
    API next.


    # An Overview of the Ray Core API


    If you recall what exactly we did in the previous example, you’ll notice that
    we used a total of just six API methods⁵. You used `ray.init()` to start the cluster
    and `@ray.remote` to turn functions and classes into tasks and actors. Then we
    used `ray.put()` to pass data into Ray’s object store and `ray.get()` to retrieve
    data from the cluster. Finally, we used `.remote()` on actor methods or tasks
    to run code on our cluster, and `ray.wait()` to avoid blocking calls.


    While six API methods might not seem like much, those are the only ones you’ll
    likely ever care about when using the Ray API⁶. Let’s briefly summarize them in
    a table, so you can easily reference them in the future.


    Table 2-1. The six major API methods of Ray Core


    | API call | Description |

    |---|---|

    | `ray.init()` | Initializes your Ray cluster. Pass in an address to connect to
    an existing cluster. |

    | `@ray.remote` | Turns functions into tasks and classes into actors. |

    | `ray.put()` | Puts data into Ray’s object store. |

    | `ray.get()` | Gets data from the object store. Returns data you’ve put there
    or that was computed by a task or actor. |

    | `.remote()` | Runs actor methods or tasks on your Ray cluster and is used to
    instantiate actors. |

    | `ray.wait()` | Returns two lists of object references, one with finished tasks
    we’re waiting for and one with unfinished tasks. |


    Now that you’ve seen the Ray API in action, let’s quickly discuss Ray’s design
    philosophy, before moving on to discussing its system architecture.


    > 5 To paraphrase Alan Kay, to get simplicity, you need to find slightly more
    sophisticated building blocks. In my eyes, the Ray API does just that for distributed
    Python.

    6 You can check out the API reference to see that there are in fact quite a bit
    more methods available. At some point you should invest in understanding the arguments
    of init, but all other methods likely won’t be of interest to you, if you’re not
    an administrator of your Ray cluster.'
- md: '## Design Principles


    Ray is built with several design principles in mind, most of which you’ve got
    a taste of already. Its API is designed for simplicity and generality. Its compute
    model banks on flexibility. And its system architecture is designed for performance
    and scalability. Let’s look at each of these in more detail.


    ## Simplicity and abstraction


    As you’ve seen, Ray’s API does not only bank on simplicity, it’s also intuitive
    to pick up. It doesn’t matter whether you just want to use all the CPU cores on
    your laptop or leverage all the machines in your cluster. You might have to change
    a line of code or two, but the Ray code you use stays essentially the same. And
    as with any good distributed system, Ray manages task distribution and coordination
    under the hood. That’s great, because you’re not bogged down by reasoning about
    the mechanics of distributed computing. A good abstraction layer allows you to
    focus on your work, and I think Ray has done a great job of giving you one.


    Since Ray’s API is so generally applicable and pythonic, it’s easy to integrate
    with other tools. For instance, Ray actors can call into or be called by existing
    distributed Python workloads. In that sense Ray makes for good “glue code” for
    distributed workloads, too, as its performant and flexible enough to communicate
    between different systems and frameworks.


    ## Flexibility


    For AI workloads, in particular when dealing with paradigms like reinforcement
    learning, you need a flexible programming model. Ray’s API is designed to make
    it easy to write flexible and composable code. Simply put, if you can express
    your workload in Python, you can distribute it with Ray. Of course, you still
    need to make sure you have enough resources available and be mindful of what you
    want to distribute. But Ray doesn’t limit you in what you can do with it.


    Ray is also flexible when it comes to *heterogeneity* of computations. For instance,
    let’s say you work on a complex simulation. Simulations can usually be decomposed
    into several tasks or steps. Some of these steps might take hours to run, others
    just a few milliseconds, but they always need to be scheduled and executed quickly.
    Sometimes a single task in a simulation can take a long time, but other, smaller
    tasks should be able to run in parallel without blocking it. Also, subsequent
    tasks may depend on the outcome of an upstream task, so you need a framework to
    allow for *dynamic execution* that deals well with task dependencies. In the example
    we discussed in this chapter you’ve seen that Ray’s API is built for that.


    You also need to ensure you are flexible in your resource usage. For instance,
    some tasks might have to run on a GPU, while others run best on a couple of CPU
    cores. Ray provides you with that flexibility.


    ## Speed and scalability


    Another of Ray’s design principles is the speed at which Ray executes its heterogeneous
    tasks. It can handle millions of tasks per second. What’s more is that you only
    incur very low latencies with Ray. It’s built to execute its tasks with just milliseconds
    of latency.


    For a distributed system to be fast, it also needs to scale well. Ray is efficient
    at distributing and scheduling your tasks across your compute cluster. And it
    does so in a fault tolerant way, too. In distributed systems it’s not a question
    of if, but when things go wrong. A machine might have an outage, abort a task
    or simply go up in flames.⁷ In any case, Ray is built to recover quickly from
    failures, which contributes to its overall speed.


    ## Understanding Ray System Components


    You’ve seen how the Ray API can be used and understand the design philosophy behind
    Ray. Now it’s time to get a better understanding of the underlying system components.
    In other words, how does Ray work and how does it achieve what it does?


    ## Scheduling and Executing Work on a Node


    You know that Ray clusters consist of nodes. We’ll first look at what happens
    on individual nodes, before we zoom out and discuss how the whole cluster interoperates.


    As we’ve already discussed, a worker node consists of several worker processes
    or simply workers. Each worker has a unique ID, an IP address and a port by which
    they can be referenced. Workers are called as they are for a reason, they’re components
    that blindly execute the work you give them. But who tells them what to do and
    when? A worker might be busy already, it may not have the proper resources to
    run a task (e.g. access to a GPU), and it might not even have the data it needs
    to run a given task. On top of that, workers have no knowledge of what happens
    before or after they’ve executed their workload, there’s no coordination.


    > 7 This might sound drastic, but it’s not a joke. To name just one example, in
    March 2021 a French data center powering millions of websites burnt down completely,
    which you can read about in this article. If your whole cluster burns down, I’m
    afraid Ray can’t help you.


    To address these issues, each worker node has a component called *Raylet*. Think
    of Raylets as the smart components of a node, which manage the worker processes.
    Raylets are shared between jobs and consist of two components, namely a task scheduler
    and an object store.


    Let''s talk about object stores first. In the running example in this chapter
    we''ve already used the concept of an object store loosely, without really specifying
    it. Each node of a Ray cluster is equipped with an object store, within that node''s
    Raylet, and all object stores collectively form the distributed object store of
    a cluster. An object store has *shared memory* across the node, so that each worker
    process has easy access to it. The object store is implemented in **Plasma**,
    which now belongs to the Apache Arrow project. Functionally, the object store
    takes care of memory management and ultimately makes sure workers have access
    to the data they need.


    The second component of a Raylet is its scheduler. The scheduler takes care of
    resource management, among other things. For instance, if a task requires access
    to 4 CPUs, the scheduler needs to make sure it can find a free worker process
    that it can *grant access* to said resources. By default, the scheduler knows
    about and acquires information about the number of CPUs and GPUs and the amount
    of memory available on its node, but you can register custom resources, if you
    want to. If it can''t provide the required resources, it can''t schedule execution
    of a task.


    Apart from resources, the other requirement the scheduler takes care of is *dependency
    resolution*. That means it needs to ensure that each worker has all the input
    data it needs to execute a task. For that to work, the scheduler will first resolve
    local dependencies by looking up data in its object store. If the required data
    is not available on this node''s object store, the scheduler will have to communicate
    with other nodes (we''ll tell you how in a bit) and pull in remote dependencies.
    Once the scheduler has ensured enough resources for a task, resolved all needed
    dependencies, and found a worker for a task, it can schedule said task for execution.


    Task scheduling is a very difficult topic, even if we''re only talking about single
    nodes. I think you can easily imagine scenarios in which an incorrectly or naively
    planned task execution can "block" downstream tasks because there are not enough
    resources left. Especially in a distributed context assigning work like this can
    become very tricky very quickly.


    Now that you know about Raylets, let''s briefly come back to worker processes,
    so that we can wrap up the discussion around worker nodes. An important concept
    that contributed to the performance of Ray overall is that of *ownership*.


    Ownership means that a process that runs something is responsible for it. This
    makes for a decentralized overall design, since individual tasks have a unique
    owner. In concrete terms this means that each worker process owns the tasks it
    submits, which includes proper execution and availability of results (i.e., correct
    resolution of object'
  mdcn: '## 设计原则


    Ray 的构建基于若干设计原则，其中大部分你已有所体会。其 API 旨在实现简洁性与通用性。其计算模型依托于灵活性。而其系统架构则为性能与可扩展性而设计。让我们逐一深入探讨。


    ## 简洁性与抽象


    正如你所见，Ray 的 API 不仅追求简洁，而且易于上手。无论你是想利用笔记本电脑的所有 CPU 核心，还是想调用集群中的所有机器，都无需大费周章。你可能只需修改一两行代码，但所使用的
    Ray 代码本质上保持不变。与任何优秀的分布式系统一样，Ray 在底层管理着任务分发与协调。这非常棒，因为它让你不必深陷于分布式计算机制的推理之中。一个良好的抽象层使你能够专注于工作本身，我认为
    Ray 在提供这层抽象方面做得非常出色。


    由于 Ray 的 API 具有高度的通用性和 Python 风格，它很容易与其他工具集成。例如，Ray 的 actor 可以调用现有的分布式 Python
    工作负载，也可以被其调用。从这个意义上说，Ray 也充当了分布式工作负载的优秀“粘合代码”，因为它足够高效和灵活，能够在不同的系统和框架之间进行通信。


    ## 灵活性


    对于 AI 工作负载，尤其是在处理强化学习等范式时，你需要一个灵活的编程模型。Ray 的 API 旨在轻松编写灵活且可组合的代码。简而言之，如果你能用 Python
    表达你的工作负载，你就能用 Ray 来分发它。当然，你仍然需要确保有足够的资源可用，并注意你想要分发的内容。但 Ray 并不限制你能用它做什么。


    Ray 在计算的*异构性*方面也具有灵活性。例如，假设你正在处理一个复杂的模拟。模拟通常可以分解为多个任务或步骤。其中一些步骤可能需要数小时运行，而另一些只需几毫秒，但它们都需要被快速调度和执行。有时模拟中的单个任务可能耗时很长，但其他较小的任务应该能够并行运行而不阻塞它。此外，后续任务可能依赖于上游任务的结果，因此你需要一个框架来支持*动态执行*，并能妥善处理任务依赖关系。在本章讨论的示例中，你已经看到
    Ray 的 API 正是为此而构建的。


    你还需要确保在资源使用上保持灵活性。例如，某些任务可能必须在 GPU 上运行，而其他任务在几个 CPU 核心上运行效果最佳。Ray 为你提供了这种灵活性。


    ## 速度与可扩展性


    Ray 的另一个设计原则是其执行异构任务的速度。它每秒可以处理数百万个任务。更重要的是，使用 Ray 只会产生非常低的延迟。它的构建目标就是以毫秒级的延迟执行任务。


    对于一个分布式系统要快，它还需要具备良好的可扩展性。Ray 能够高效地在你的计算集群中分发和调度任务。并且它还以容错的方式做到这一点。在分布式系统中，问题不在于是否会发生故障，而在于何时发生。一台机器可能会宕机、中止任务，或者直接烧毁。⁷
    无论如何，Ray 的构建目标就是能够从故障中快速恢复，这有助于其整体速度。


    ## 理解 Ray 系统组件


    你已经了解了 Ray API 的使用方式以及其背后的设计理念。现在是时候更好地理解底层系统组件了。换句话说，Ray 是如何工作的，以及它是如何实现其功能的？


    ## 在节点上调度和执行工作


    你知道 Ray 集群由节点组成。我们将首先看看单个节点上发生了什么，然后再放大视角讨论整个集群如何协同工作。


    正如我们已经讨论过的，一个工作节点由多个工作进程或简称工作进程组成。每个工作进程都有一个唯一的 ID、一个 IP 地址和一个端口，通过这些可以引用它们。工作进程之所以被称为工作进程是有原因的，它们是盲目执行你交给它们的工作的组件。但是，谁告诉它们该做什么以及何时做呢？一个工作进程可能已经很忙，它可能没有运行某个任务所需的适当资源（例如，访问
    GPU），它甚至可能没有运行给定任务所需的数据。除此之外，工作进程不知道在它们执行工作负载之前或之后发生了什么，没有协调。


    > 7 这听起来可能很极端，但这不是开玩笑。仅举一例，2021 年 3 月，一个为数百万网站提供服务的法国数据中心完全烧毁，你可以在这篇文章中读到相关信息。如果你的整个集群都烧毁了，恐怕
    Ray 也帮不了你。


    为了解决这些问题，每个工作节点都有一个称为 *Raylet* 的组件。可以将 Raylet 视为节点的智能组件，负责管理工作进程。Raylet 在作业之间共享，由两个组件组成，即任务调度器和对象存储。


    让我们先谈谈对象存储。在本章的运行示例中，我们已经粗略地使用了对象存储的概念，但没有真正具体说明。Ray 集群的每个节点都配备了一个对象存储，位于该节点的
    Raylet 内，所有对象存储共同构成了集群的分布式对象存储。对象存储在节点内具有*共享内存*，因此每个工作进程都可以轻松访问它。对象存储在 **Plasma**
    中实现，现在属于 Apache Arrow 项目。从功能上讲，对象存储负责内存管理，并最终确保工作进程能够访问它们需要的数据。


    Raylet 的第二个组件是其调度器。调度器负责资源管理等事项。例如，如果一个任务需要访问 4 个 CPU，调度器需要确保它能找到一个空闲的工作进程，并可以*授予其访问*上述资源的权限。默认情况下，调度器知道并获取其节点上可用的
    CPU 和 GPU 数量以及内存量，但如果你愿意，也可以注册自定义资源。如果它无法提供所需的资源，它就无法调度任务的执行。


    除了资源，调度器负责的另一个要求是*依赖解析*。这意味着它需要确保每个工作进程都拥有执行任务所需的所有输入数据。为此，调度器将首先通过在其对象存储中查找数据来解析本地依赖项。如果所需数据在此节点的对象存储中不可用，调度器将不得不与其他节点通信（我们稍后会告诉你如何操作）并拉取远程依赖项。一旦调度器确保了任务有足够的资源，解析了所有需要的依赖项，并为任务找到了一个工作进程，它就可以调度该任务执行。


    任务调度是一个非常困难的话题，即使我们只讨论单个节点。我想你可以很容易地想象到，不正确或简单粗暴的任务执行计划可能会因为资源不足而“阻塞”下游任务。尤其是在分布式环境中，像这样分配工作可能很快就会变得非常棘手。


    现在你了解了 Raylet，让我们简要回到工作进程，以便我们可以结束关于工作节点的讨论。一个对 Ray 整体性能有贡献的重要概念是*所有权*。


    所有权意味着运行某个进程的进程对其负责。这使得整体设计是去中心化的，因为单个任务有一个唯一的所有者。具体来说，这意味着每个工作进程拥有它提交的任务，这包括正确执行和结果的可用性（即，正确解析对象'

    # Schemas and data formats


    Up until this point, we''ve been operating on simple Datasets made up only of
    integers. However, for more complex data processing we often want to have a schema,
    allowing us to more easily comprehend the data and enforce types on each column.


    Given that datasets are meant to be the point of interoperation for applications
    and libraries on Ray, they are designed to be agnostic to a specific datatype
    and offer flexibility to read, write, and convert between many popular data formats.
    Datasets by supporting Arrow''s columnar format, which enables converting between
    different types of structured data such as Python dictionaries, DataFrames, and
    serialized parquet files.


    The simplest way to create a Dataset with a schema is to create it from a list
    of Python dictionaries:


    Example 7-5.


    ```

    ds = ray.data.from_items([{"id": "abc", "value": 1}, {"id": "def", "value": 2}])

    print(ds.schema())  # -> id: string, value: int64

    ```


    In this case, the schema was inferred from the keys in the dictionaries we passed
    in. We can also convert to/from data types from popular libraries such as pandas:


    Example 7-6.


    ```

    pandas_df = ds.to_pandas()  # pandas_df will inherit the schema from our Dataset.

    ```


    Here we went from a Dataset to a pandas DataFrame, but this also works in reverse:
    if you create a Dataset from a dataframe, it will automatically inherit the schema
    from the DataFrame.


    # Computing Over Datasets



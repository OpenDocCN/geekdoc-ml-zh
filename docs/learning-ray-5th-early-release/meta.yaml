- img_proc: true
  md: 'Example 7-3.


    ```

    # Basic transformations: join two datasets, filter, and sort.

    ds1 = ray.data.range(10000)

    ds2 = ray.data.range(10000)

    ds3 = ds1.union(ds2)

    print(ds3.count())  # -> 20000


    # Filter the combined dataset to only the even elements.

    ds3 = ds3.filter(lambda x: x % 2 == 0)

    print(ds3.count())  # -> 10000

    print(ds3.take(5))  # -> [0, 2, 4, 6, 8]


    # Sort the filtered dataset.

    ds3 = ds3.sort()

    print(ds3.take(5))  # -> [0, 0, 2, 2, 4]

    ```


    In addition to the operations above, Datasets also support common aggregations
    you might expect such as groupby, sum, min, etc. You can also pass a user-defined
    function for custom aggregations.


    # Blocks and repartitioning


    One of the important things to keep in mind when using Datasets is the concept
    of blocks discussed earlier in the section. Blocks are the underlying chunks of
    data that make up a Dataset; operations are applied to the underlying data one
    block at a time. If the number of blocks in a Dataset is too high, each block
    will be small and there will be a lot of overhead for each operation. If the number
    of blocks is too small, operations won''t be able to be parallelized as efficiently.


    If we take a peek under the hood from the example above, we can see that the initial
    datasets we created each had 200 blocks by default and when we combined them,
    the resulting Dataset had 400 blocks. In this case, we may want to repartition
    the Dataset to bring it back to the original 200 blocks that we started with:


    Example 7-4.


    ```

    ds1 = ray.data.range(10000)

    print(ds1.num_blocks())  # -> 200

    ds2 = ray.data.range(10000)

    print(ds2.num_blocks())  # -> 200

    ds3 = ds1.union(ds2)

    print(ds3.num_blocks())  # -> 400


    print(ds3.repartition(200).num_blocks())  # -> 200

    ```'

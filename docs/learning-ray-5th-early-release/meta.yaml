  - '[PAGE 7]


    # CHAPTER 1


    # An Overview of Ray


    > A distributed system is one in which the failure of a computer you didn''t even
    know existed can render your own computer unusable.

    —Leslie Lamport


    ## A Note for Early Release Readers

    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    One of the reasons we need efficient distributed computing is that we’re collecting
    ever more data with a large variety at increasing speeds. The storage systems,
    data processing and analytics engines that have emerged in the last decade are
    crucially important to the success of many companies. Interestingly, most “big
    data” technologies are built for and operated by (data) engineers, that are in
    charge of data collection and processing tasks. The rationale is to free up data
    scientists to do what they’re best at. As a data science practitioner you might
    want to focus on training complex machine learning models, running efficient hyperparameter
    selection, building entirely new and custom models or simulations, or serving
    your models to showcase them. At the same time you simply might *have to* scale
    them to a compute cluster. To do that, the distributed system of your choice needs
    to support all of these fine-grained “big compute” tasks, potentially on specialized
    hardware. Ideally, it also fits into the big data tool chain you’re using and
    is fast enough to meet your latency requirements. In other words, distributed
    computing has to be powerful and flexible enough for complex data science workloads
    — and Ray can help you with that.'
  - '[PAGE 8]


    Python is likely the most popular language for data science today, and it''s certainly
    the one I find the most useful for my daily work. By now it''s over 30 years old,
    but has a still growing and active community. The rich PyData ecosystem is an
    essential part of a data scientist''s toolbox. How can you make sure to scale
    out your workloads while still leveraging the tools you need? That''s a difficult
    problem, especially since communities can''t be forced to just toss their toolbox,
    or programming language. That means distributed computing tools for data science
    have to be built for their existing community.


    # What Is Ray?


    What I like about Ray is that it checks all the above boxes. It''s a flexible
    distributed computing framework build for the Python data science community. Ray
    is easy to get started and keeps simple things simple. Its core API is as lean
    as it gets and helps you reason effectively about the distributed programs you
    want to write. You can efficiently parallelize Python programs on your laptop,
    and run the code you tested locally on a cluster practically without any changes.
    Its high-level libraries are easy to configure and can seamlessly be used together.
    Some of them, like Ray''s reinforcement learning library, would have a bright
    future as standalone projects, distributed or not. While Ray''s core is built
    in C++, it''s been a Python-first framework since day one, integrates with many
    important data science tools, and can count on a growing ecosystem.


    Distributed Python is not new, and Ray is not the first framework in this space
    (nor will it be the last), but it is special in what it has to offer. Ray is particularly
    strong when you combine several of its modules and have custom, machine learning
    heavy workloads that would be difficult to implement otherwise. It makes distributed
    computing easy enough to run your complex workloads flexibly by leveraging the
    Python tools you know and want to use. In other words, by *learning Ray* you get
    to know *flexible distributed Python for data science*.


    In this chapter you''ll get a first glimpse at what Ray can do for you. We will
    discuss the three layers that make up Ray, namely its core engine, its high-level
    libraries and its ecosystem. Throughout the chapter we''ll show you first code
    examples to give you a feel for Ray, but we defer any in-depth treatment of Ray''s
    APIs and components to later chapters. You can view this chapter as an overview
    of the whole book as well.


    # What Led to Ray?


    Programming distributed systems is hard. It requires specific knowledge and experience
    you might not have. Ideally, such systems get out of your way and provide abstractions
    to let you focus on your job. But in practice “all non-trivial abstractions, to
    some degree, are leaky” (Spolsky), and getting clusters of computers to do what'
- md: 'you want is undoubtedly difficult. Many software systems require resources
    that far exceed what single servers can do. Even if one server was enough, modern
    systems need to be failsafe and provide features like high availability. That
    means your applications might have to run on multiple machines, or even datacenters,
    just to make sure they’re running reliably.


    Even if you’re not too familiar with machine learning (ML) or more generally artificial
    intelligence (AI) as such, you must have heard of recent breakthroughs in the
    field. To name just two, systems like Deepmind’s AlphaFold for solving the protein
    folding problem, or OpenAI’s Codex that’s helping software developers with the
    tedious parts of their job, have made the news lately. You might also have heard
    that ML systems generally require large amounts of data to be trained. OpenAI
    has shown exponential growth in compute needed to train AI models in their paper
    “AI and Compute”. The operations needed for AI systems in their study is measured
    in petaflops (thousands of trillion operations per second), and has been doubling
    every 3.4 months since 2012.


    Compare this to Moore’s Law¹, which states that the number of transistors in computers
    would double every two years. Even if you’re bullish on Moore’s law, you can see
    how there’s a clear need for distributed computing in ML. You should also understand
    that many tasks in ML can be naturally decomposed to run in parallel. So, why
    not speed things up if you can?


    Distributed computing is generally perceived as hard. But why is that? Shouldn’t
    it be realistic to find good abstractions to run your code on clusters, without
    having to constantly think about individual machines and how they interoperate?
    What if we specifically focused on AI workloads?


    Researchers at RISELab at UC Berkeley created Ray to address these questions.
    None of the tools existing at the time met their needs. They were looking for
    easy ways to speed up their workloads by distributing them to compute clusters.
    The workloads they had in mind were quite flexible in nature and didn’t fit into
    the analytics engines available. At the same time, RISELab wanted to build a system
    that took care of how the work was distributed. With reasonable default behaviors
    in place, researchers should be able to focus on their work. And ideally they
    should have access to all their favorite tools in Python. For this reason, Ray
    was built with an emphasis on high-performance and heterogeneous workloads. Anyscale,
    the company behind Ray, is building a managed Ray Platform and offers hosted solutions
    for your Ray applications. Let’s have a look at an example of what kinds of applications
    Ray was designed for.


    ¹ Moore’s Law held for a long time, but there might be signs that it’s slowing
    down. We’re not here to argue it, though. What’s important is not that our computers
    generally keep getting faster, but the relation to the amount of compute we need.


    ## Flexible Workloads in Python and Reinforcement Learning


    One of my favorite apps on my phone can automatically classify or “label” individual
    plants in our garden. It works by simply showing it a picture of the plant in
    question. That’s immensely helpful, as I’m terrible at distinguishing them all.
    (I’m not bragging about the size of my garden, I’m just bad at it.) In the last
    couple of years we’ve seen a surge of impressive applications like that.


    Ultimately, the promise of AI is to build intelligent agents that go far beyond
    classifying objects. Imagine an AI application that not only knows your plants,
    but can take care of them, too. Such an application would have to


    - Operate in dynamic environments (like the change of seasons)

    - React to changes in the environment (like a heavy storm or pests attacking your
    plants)

    - Take sequences of actions (like watering and fertilizing plants)

    - Accomplish long-term goals (like prioritizing plant health)


    By observing its environment such an AI would also learn to explore the possible
    actions it could take and come up with better solutions over time. If you feel
    like this example is artificial or too far out, it’s not difficult to come up
    with examples on your own that share all the above requirements. Think of managing
    and optimizing a supply chain, strategically restocking a warehouse considering
    fluctuating demands, or orchestrating the processing steps in an assembly line.
    Another famous example of what you could expect from an AI would be Stephen Wozniak’s
    famous “Coffee Test”. If you’re invited to a friend’s house, you can navigate
    to the kitchen, spot the coffee machine and all necessary ingredients, figure
    out how to brew a cup of coffee, and sit down to enjoy it. A machine should be
    able to do the same, except the last part might be a bit of a stretch. What other
    examples can you think of?


    You can frame all the above requirements naturally in a subfield of machine learning
    called reinforcement learning (RL). We’ve dedicated all of Chapter 4 to RL. For
    now, it’s enough to understand that it’s about agents interacting with their environment
    by observing it and emitting actions. In RL, agents evaluate their environments
    by attributing a reward (e.g., how healthy is my plant on a scale from 1 to 10).
    The term “reinforcement” comes from the fact that agents will hopefully learn
    to seek out behaviour that leads to good outcomes (high reward), and shy away
    from punishing situations (low or negative reward). The interaction of agents
    with their environment is usually modeled by creating a computer simulation of
    it. These simulations can become complicated quite quickly, as you might imagine
    from the examples we’ve given.


    We don''t have gardening robots like the one I''ve sketched yet. And we don''t
    know which AI paradigm will get us there.² What I do know is that the world is
    full of complex, dynamic and interesting examples that we need to tackle. For
    that we need computational frameworks that help us do that, and Ray was built
    to do exactly that. RISELab created Ray to build and run complex AI applications
    at scale, and reinforcement learning has been an integral part of Ray from the
    start.


    ## Three Layers: Core, Libraries and Ecosystem


    Now that you know why Ray was built and what its creators had in mind, let''s
    look at the three layers of Ray.


    - A low-level, distributed computing framework for Python with a concise core
    API.³

    - A set of high-level libraries for data science built and maintained by the creators
    of Ray.

    - A growing ecosystem of integrations and partnerships with other notable projects.


    There''s a lot to unpack here, and we''ll look into each of these layers individually
    in the remainder of this chapter. You can imagine Ray''s core engine with its
    API at the center of things, on which everything else builds. Ray''s data science
    libraries build on top of it. In practice, most data scientists will use these
    higher level libraries directly and won''t often need to resort to the core API.
    The growing number of third-party integrations for Ray is another great entrypoint
    for experienced practitioners. Let''s look into each one of the layers one by
    one.


    ## A Distributed Computing Framework


    At its core, Ray is a distributed computing framework. We''ll provide you with
    just the basic terminology here, and talk about Ray''s architecture in depth in
    Chapter 2. In short, Ray sets up and manages clusters of computers so that you
    can run distributed tasks on them. A ray cluster consists of nodes that are connected
    to each other via a network. You program against the so-called *driver*, the program
    root, which lives on the *head node*. The driver can run *jobs*, that is a collection
    of tasks, that are run on the nodes in the cluster. Specifically, the individual
    tasks of a job are run on *worker* pro-


    ² For the experts among you, I don''t claim that RL is the answer. RL is just
    a paradigm that naturally fits into this discussion of AI goals.


    ³ This is a Python book, so we''ll exclusively focus on it. But you should at
    least know that Ray also has a Java API, which at this point is less mature than
    its Python equivalent.'
  mdcn: '你想要的无疑是困难的。许多软件系统所需的资源远远超出了单台服务器的能力。即使一台服务器足够，现代系统也需要具备故障安全能力，并提供诸如高可用性之类的特性。这意味着你的应用程序可能需要在多台机器甚至数据中心上运行，以确保其可靠运行。


    即使你对机器学习（ML）或更广泛的人工智能（AI）本身不太熟悉，你也一定听说过该领域的最新突破。仅举两例，像DeepMind的AlphaFold解决蛋白质折叠问题，或OpenAI的Codex帮助软件开发者处理工作中繁琐部分的系统，最近都登上了新闻。你可能也听说过，机器学习系统通常需要大量数据进行训练。OpenAI在其论文《AI
    and Compute》中展示了训练AI模型所需计算能力的指数级增长。他们研究中AI系统所需的运算量以petaflops（每秒千万亿次运算）为单位，自2012年以来每3.4个月翻一番。


    将其与摩尔定律¹进行比较，该定律指出计算机中的晶体管数量每两年翻一番。即使你对摩尔定律持乐观态度，你也能看出在机器学习中对分布式计算的明确需求。你还应该理解，机器学习中的许多任务可以自然地分解为并行运行。那么，如果可以，为什么不加速呢？


    分布式计算通常被认为很难。但为什么呢？难道不应该可以找到好的抽象，让你的代码在集群上运行，而无需不断考虑单个机器及其如何协同工作吗？如果我们专门关注AI工作负载会怎样？


    加州大学伯克利分校RISELab的研究人员创建了Ray来解决这些问题。当时存在的工具都无法满足他们的需求。他们正在寻找简单的方法，通过将工作负载分布到计算集群来加速它们。他们考虑的工作负载在性质上相当灵活，不符合当时可用的分析引擎。同时，RISELab希望构建一个系统来处理工作如何分布的问题。通过设置合理的默认行为，研究人员应该能够专注于他们的工作。理想情况下，他们应该能够访问Python中所有他们喜欢的工具。因此，Ray的构建重点是高性能和异构工作负载。Ray背后的公司Anyscale正在构建一个托管的Ray平台，并为你的Ray应用程序提供托管解决方案。让我们看看Ray设计用于哪些类型应用程序的一个示例。


    ¹ 摩尔定律在很长一段时间内都成立，但可能有迹象表明它正在放缓。我们在此并非要争论这一点。重要的不是我们的计算机通常变得更快，而是与我们所需计算量的关系。


    ## Python和强化学习中的灵活工作负载


    我手机上最喜欢的应用之一可以自动分类或“标记”我们花园里的单个植物。它的工作原理只是向它展示相关植物的照片。这非常有帮助，因为我完全不擅长区分它们。（我并不是在炫耀花园的大小，我只是不擅长这个。）在过去的几年里，我们看到了许多像这样令人印象深刻的应用程序的涌现。


    最终，AI的承诺是构建超越物体分类的智能代理。想象一个AI应用程序，它不仅认识你的植物，还能照顾它们。这样的应用程序必须


    - 在动态环境中运行（如季节变化）

    - 对环境变化做出反应（如暴风雨或害虫侵袭你的植物）

    - 执行一系列动作（如给植物浇水和施肥）

    - 实现长期目标（如优先考虑植物健康）


    通过观察其环境，这样的AI也将学会探索它可能采取的行动，并随着时间的推移提出更好的解决方案。如果你觉得这个例子是人为的或太遥远，你自己也不难想出符合所有上述要求的例子。想想管理和优化供应链、根据波动的需求战略性地补充仓库库存，或协调装配线中的处理步骤。另一个著名的例子，你可以期待AI做什么，是Stephen
    Wozniak著名的“咖啡测试”。如果你被邀请到朋友家，你可以导航到厨房，找到咖啡机和所有必要的原料，弄清楚如何煮一杯咖啡，然后坐下来享用。机器应该能够做同样的事情，只是最后一步可能有点勉强。你还能想到其他例子吗？


    你可以将所有上述要求自然地置于机器学习的一个子领域——强化学习（RL）中。我们将在第4章专门讨论RL。目前，只需理解它涉及代理通过观察环境并发出动作来与环境互动。在RL中，代理通过赋予奖励（例如，我的植物健康程度从1到10的评分）来评估其环境。“强化”一词源于代理有望学会寻求能带来好结果（高奖励）的行为，并回避会受到惩罚的情况（低或负奖励）。代理与环境的互动通常通过创建其计算机模拟来建模。正如你从我们给出的例子中可以想象的那样，这些模拟可能很快变得复杂。


    我们还没有我所描绘的那种园艺机器人。我们也不知道哪种AI范式能让我们实现它。² 我所知道的是，世界充满了复杂、动态和有趣的例子，我们需要去解决。为此，我们需要能够帮助我们做到这一点的计算框架，而Ray正是为此而构建的。RISELab创建Ray是为了大规模构建和运行复杂的AI应用程序，而强化学习从一开始就是Ray不可或缺的一部分。


    ## 三层结构：核心、库和生态系统


    现在你知道了Ray为什么被构建以及其创建者的初衷，让我们来看看Ray的三层结构。


    - 一个用于Python的底层分布式计算框架，具有简洁的核心API。³

    - 一组由Ray创建者构建和维护的高级数据科学库。

    - 一个不断增长的生态系统，包含与其他知名项目的集成和合作。


    这里有很多内容需要解析，我们将在本章的剩余部分分别探讨这些层中的每一层。你可以想象Ray的核心引擎及其API位于中心位置，其他一切都建立在此之上。Ray的数据科学库构建于其上。在实践中，大多数数据科学家将直接使用这些高级库，而无需经常使用核心API。Ray不断增长的第三方集成数量是经验丰富的从业者的另一个绝佳切入点。让我们逐一探讨每一层。


    ## 分布式计算框架


    从核心上看，Ray是一个分布式计算框架。我们在此只提供基本术语，并在第2章深入讨论Ray的架构。简而言之，Ray设置和管理计算机集群，以便你可以在其上运行分布式任务。一个Ray集群由通过网络相互连接的节点组成。你针对所谓的*驱动程序*（即程序根）进行编程，它位于*头节点*上。驱动程序可以运行*作业*，即在集群节点上运行的任务集合。具体来说，作业的各个任务在*工作*节点上运行。


    ² 对于你们中的专家，我并非声称RL是答案。RL只是一个自然地融入这个AI目标讨论的范式。


    ³ 这是一本Python书籍，因此我们将专门关注它。但你至少应该知道Ray也有一个Java API，目前它不如其Python对应版本成熟。'

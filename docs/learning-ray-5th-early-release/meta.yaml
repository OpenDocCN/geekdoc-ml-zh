    Set the number of CPUs to use for each worker.


    # Debugging and Logging Configuration


    Debugging your applications is crucial for any project, and machine learning is
    no exception. RLlib allows you to configure the way it logs information and how
    you can access it.


    log_level

    Set the level of logging to use. This can be either DEBUG, INFO, WARN, or ERROR
    and defaults to WARN. You should experiment with the different levels to see what
    suits your needs best in practice.



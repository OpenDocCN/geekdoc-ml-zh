    \n基于你目前建立的理解，你认为将探索者置于随机起始位置，然后运行这个评估函数是否仍然有效？你何不着手进行必要的修改呢？\n\n另一个值得思考的问题是，我们所使用的算法基于哪些假设。例如，该算法的一个明显前提是所有状态-动作对都可以被制成表格。你认为如果我们有数百万个状态和数千个动作，这还能很好地工作吗？\n\
    \n## 构建分布式 Ray 应用\n\n让我们在这里稍作回顾。如果你是强化学习专家，你会明白我们一直在做什么。如果你是强化学习新手，你可能有点不知所措。如果你介于两者之间，你可能喜欢这个例子，但可能想知道我们目前所做的与\
    \ Ray 有何关联。这是一个很好的问题。正如你很快将看到的，要将上述强化学习实验变成一个分布式 Ray 应用，我们只需要编写三个简短的代码片段。这就是我们将要做的：\n\
    \n- 我们创建一个可以远程初始化策略的 Ray 任务。\n- 然后我们只需几行代码就将模拟器变成一个 Ray actor。\n- 之后我们将 `update_policy`\
    \ 函数包装在一个 Ray 任务中。\n- 最后，我们定义一个与原始版本结构相同的并行版本 `train_policy`。\n\n让我们通过实现一个 `create_policy`\
    \ 任务和一个名为 `SimulationActor` 的 Ray actor 来完成这个计划的前两个步骤：\n\n示例 3-13。\n\n```python\n\
    import ray\n\nray.init()\nenvironment = Environment()\nenv_ref = ray.put(environment)\
    \ ①\n```\n\n```python\n@ray.remote\ndef create_policy():\n    env = ray.get(env_ref)\n\
    \    return Policy(env) ②\n```\n\n```python\n@ray.remote\nclass SimulationActor(Simulation):\
    \ ③\n    \"\"\"Ray actor for a Simulation.\"\"\"\n    def __init__(self):\n  \
    \      env = ray.get(env_ref)\n        super().__init__(env)\n```\n\n① 初始化后，我们将环境放入\
    \ Ray 对象存储。\n② 这个远程任务返回一个新的 Policy 对象。\n③ 这个 Ray actor 以直接的方式包装了我们的 Simulation\
    \ 类。\n\n基于你在第 2 章建立的 Ray Core 基础，你应该能毫无困难地阅读这段代码。自己编写可能需要一些习惯，但概念上你应该能掌握这个例子。\n\
    \n接下来，让我们定义一个分布式的 `update_policy_task` Ray 任务，然后将所有内容（两个任务和一个 actor）包装在一个 `train_policy_parallel`\
    \ 函数中，该函数将这个强化学习工作负载分配到你的本地 Ray 集群上：\n\n示例 3-14。\n\n```python\n@ray.remote\ndef\
    \ update_policy_task(policy_ref, experiences_list):\n    \"\"\"Remote Ray task\
    \ for updating a policy with experiences in parallel.\"\"\"\n    [update_policy(policy_ref,\
    \ ray.get(xp)) for xp in experiences_list] ①\n    return policy_ref\n```\n\n```python\n\
    def train_policy_parallel(num_episodes=1000, num_simulations=4):\n    \"\"\"Parallel\
    \ policy training function.\"\"\"\n    policy = create_policy.remote() ②\n   \
    \ simulations = [SimulationActor.remote() for _ in range(num_simulations)] ③\n\
    \n    for _ in range(num_episodes):\n        experiences = [sim.rollout.remote(policy)\
    \ for sim in simulations] ④\n        policy = update_policy_task.remote(policy,\
    \ experiences) ⑤\n\n    return ray.get(policy) ⑥\n```\n\n1.  这个任务通过传递策略引用和从对象存储检索的经验，委托给原始的\
    \ `update_policy` 函数。\n2.  为了并行训练，我们首先远程创建一个策略，返回一个我们称为 `policy` 的引用。\n3.  我们创建四个模拟\
    \ actor，而不是一个。\n4.  现在经验是从模拟 actor 的远程 rollout 中收集的。\n5.  然后我们可以远程更新我们的策略。注意 `experiences`\
    \ 是一个嵌套的经验列表。\n6.  最后，我们通过再次从对象存储中检索来返回训练好的策略。\n\n这使我们能够采取最后一步，并行运行训练过程，然后像之前一样评估结果。\n\
    \n示例 3-15。\n\n```python\nparallel_policy = train_policy_parallel()\nevaluate_policy(environment,\
    \ parallel_policy)\n```\n\n这两行的结果与之前运行串行版本的强化学习训练迷宫时相同。我希望你欣赏 `train_policy_parallel`\
    \ 与 `train_policy` 具有完全相同的高级结构。逐行比较两者是一个很好的练习。本质上，要并行化训练过程，只需要以合适的方式使用 `ray.remote`\
    \ 装饰器三次。当然，你需要一些经验才能正确完成。但请注意，我们在思考分布式计算上花了多少时间，而在实际应用代码上花了多少时间。我们不需要采用全新的编程范式，可以简单地以最自然的方式处理问题。最终，这就是你想要的——而\
    \ Ray 非常擅长为你提供这种灵活性。\n\n最后，让我们快速看一下我们刚刚构建的 Ray 应用程序的任务执行图。回顾一下，我们所做的是：\n\n- `train_policy_parallel`\
    \ 函数创建了几个 `SimulationActor` actor 和一个通过 `create_policy` 创建的策略。\n- 模拟 actor 使用策略创建\
    \ rollout，从而收集 `update_policy_task` 用于更新策略的经验。\n- 这之所以有效，是因为策略更新的设计方式。经验是由一个还是多个模拟收集的并不重要。\n\
    - rollout 和更新持续进行，直到达到我们想要训练的 episode 数量，然后返回最终的 `trained_policy`。\n\n图 3-1 以紧凑的方式总结了这个任务图：\n\
    \n![图 3-1. 使用 Ray 并行训练强化学习策略](img/58c832795222840423ffeca1357b40a7_66_0.png)\n\
    \n关于本章运行示例的一个有趣旁注是，它是其创建者在初始论文中用于说明 Ray 灵活性的伪代码示例的实现。该论文有一幅类似于图 3-1 的图，值得阅读以了解背景。\n\
    \n## 回顾强化学习术语\n\n在结束本章之前，让我们在更广泛的背景下讨论我们在迷宫示例中遇到的概念。这样做将为你在下一章中处理更复杂的强化学习设置做好准备，并向你展示我们在本章的运行示例中简化了哪些地方。\n\
    \n每个强化学习问题都始于*环境*的表述，它描述了你想玩的“游戏”的动态。环境托管一个玩家或*智能体*，它通过一个简单的接口与其环境交互。智能体可以向环境请求信息，即它在环境中的当前*状态*、在此状态下收到的*奖励*，以及游戏是否*结束*。在观察状态和奖励时，智能体可以学习根据接收到的信息做出决策。具体来说，智能体会发出一个*动作*，环境可以通过执行下一步来执行该动作。\n\
    \n智能体为给定状态产生动作的机制称为*策略*，我们有时会说智能体遵循给定的策略。给定一个策略，我们可以使用该策略模拟或*rollout*几步或整个游戏。在\
    \ rollout 期间，我们可以收集*经验*，其中包含关于当前状态和奖励、下一个动作以及由此产生的状态的信息。从开始到结束的整个步骤序列称为一个*episode*，环境可以*重置*为其初始状态以开始新的\
    \ episode。\n\n我们在本章中使用的策略基于将*状态-动作值*（也称为 *Q 值*）制成表格的简单想法，而用于根据 rollout 期间收集的经验更新策略的算法称为\
    \ *Q 学习*。更一般地说，你可以将我们实现的状态-动作表视为策略使用的*模型*。在下一章中，你将看到更复杂模型的示例，例如用于学习状态-动作值的神经网络。策略可以决定通过选择其模型的最佳可用值来*利用*它对环境的了解，或者通过选择随机动作来*探索*环境。\n\
    \n这里介绍的许多基本概念适用于任何强化学习问题，但我们做了一些简化的假设。例如，可能有*多个智能体*在环境中行动（想象有多个探索者竞争首先到达目标），我们将在下一章研究所谓的多智能体环境和多智能体强化学习。此外，我们假设智能体的*动作空间*是*离散的*，这意味着智能体只能采取固定的一组动作。当然，你也可以"

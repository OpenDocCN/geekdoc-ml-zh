- md: "## Working with Policy Servers and Clients\n\nFor the last example in this\
    \ section on environments, let's assume our original GymEnvironment can only be\
    \ simulated on a machine that can't run RLlib, for instance because it doesn't\
    \ have enough resources available. We can run the environment on a PolicyClient\
    \ that can ask a respective *server* for suitable next actions to apply to the\
    \ environment. The server, in turn, does not know about the environment. It only\
    \ knows how to ingest input data from a PolicyClient, and it is responsible for\
    \ running all RL related code, in particular it defines an RLlib config object\
    \ and trains a Trainer.\n\n## Defining a server\n\nLet's start by defining the\
    \ server-side of such an application first. We define a so-called PolicyServerInput\
    \ that runs on localhost on port 9900. This policy input is what the client will\
    \ provide later on. With this policy_input defined as input to our trainer configuration,\
    \ we can define yet another DQNTrainer to run on the server:\n\n```python\n# policy_server.py\n\
    import ray\nfrom ray.rllib.agents.dqn import DQNTrainer\nfrom ray.rllib.env.policy_server_input\
    \ import PolicyServerInput\nimport gym\n\nray.init()\n\ndef policy_input(context):\n\
    \    return PolicyServerInput(context, \"localhost\", 9900) ❶\n\nconfig = {\n\
    \    \"env\": None, ❷\n    \"observation_space\": gym.spaces.Discrete(5*5),\n\
    \    \"action_space\": gym.spaces.Discrete(4),\n    \"input\": policy_input, ❸\n\
    \    \"num_workers\": 0,\n    \"input_evaluation\": [],\n    \"log_level\": \"\
    INFO\",\n}\n\ntrainer = DQNTrainer(config=config)\n```\n\n❶ The policy_input function\
    \ returns a PolicyServerInput object running on localhost on port 9900.\n\n❷ We\
    \ explicitly set the env to None because this server does not need one.\n\n❸ To\
    \ make this work, we need to feed our `policy_input` into the experiment's input.\n\
    \nWith this `trainer` defined, we can now start a training session on the server\
    \ like so:\n\n```python\n# policy_server.py\nif __name__ == \"__main__\":\n\n\
    \    time_steps = 0\n    for _ in range(100):\n        results = trainer.train()\n\
    \        checkpoint = trainer.save() ①\n        if time_steps >= 10000: ②\n  \
    \          break\n        time_steps += results[\"timesteps_total\"]\n```\n\n\
    ① We train for a maximum of 100 iterations and store checkpoints after each iteration.\n\
    \n② If training surpasses 10,000 time steps, we stop the training.\n\nIn what\
    \ follows we assume that you store the last two code snippets in a file called\
    \ `policy_server.py`. If you want to, you can now start this policy server on\
    \ your local machine by running `python policy_server.py` in a terminal.\n\n##\
    \ Defining a client\n\nNext, to define the corresponding client-side of the application,\
    \ we define a Policy Client that connects to the server we just started. Since\
    \ we can't assume that you have several computers at home (or available in the\
    \ cloud), contrary to what we said prior, we will start this client on the same\
    \ machine. In other words, the client will connect to `http://localhost:9900`,\
    \ but if you can run the server on different machine, you could replace `localhost`\
    \ with the IP address of that machine, provided it's available in the network.\n\
    \nPolicy clients have a fairly lean interface. They can trigger the server to\
    \ start or end an episode, get next actions from it, and log reward information\
    \ to it (that it would otherwise not have). With that said, here's how you define\
    \ such a client.\n\n```python\n# policy_client.py\nimport gym\nfrom ray.rllib.env.policy_client\
    \ import PolicyClient\nfrom maze_gym_env import GymEnvironment\n\nif __name__\
    \ == \"__main__\":\n    env = GymEnvironment()\n    client = PolicyClient(\"http://localhost:9900\"\
    , inference_mode=\"remote\") ❶\n\n    obs = env.reset()\n    episode_id = client.start_episode(training_enabled=True)\
    \ ❷\n\n    while True:\n        action = client.get_action(episode_id, obs) ❸\n\
    \n        obs, reward, done, info = env.step(action)\n\n        client.log_returns(episode_id,\
    \ reward, info=info) ❹\n\n        if done:\n            client.end_episode(episode_id,\
    \ obs) ❺\n            obs = env.reset()\n\n            exit(0) ❻\n```\n\n❶ We\
    \ start a policy client on the server address with remote inference mode.\n\n\
    ❷ Then we tell the server to start an episode.\n\n❸ For given environment observations,\

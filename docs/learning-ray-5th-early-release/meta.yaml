    \ you'd like to track there, and Tune would add it to its trial metrics. Here's\
    \ how you'd run a Tune experiment with our custom callback, and print the custom\
    \ metrics we just defined:\n\nExample 5-11.\n\n```\nsearch_space = {\"weight\"\
    : tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n\nanalysis = tune.run(\n\
    \    objective,\n    config=search_space,\n    mode=\"min\",\n    metric=\"score\"\
    ,\n    callbacks=[PrintResultCallback()])\n\nbest = analysis.best_trial\nprint(pretty_print(best.last_result))\n\
    ```\n\nRunning this code will result in the following outputs (additional to what\
    \ you'll see in any other Tune run). Note that we need to specify mode and metric\
    \ explicitly here, so that Tune knows what we mean by best_result. First, you\
    \ should see the output of our callback, while the trials are running:\n\n```\n\
    ...\nTrial objective_85955_00000 in iteration 57, got result: 1.5379782083952644\n\

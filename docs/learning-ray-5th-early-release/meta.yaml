    # Some Caveats


    In particular, recall that standard neural network training works by iterating
    through a dataset in separate batches of data (usually called minibatch gradient
    descent).


    To speed this up, you can parallelize the gradient computation of every minibatch
    update. This means that the batch should be split across multiple machines.


    One complication is that if you hold the size of the batch constant, the system
    utilization and efficiency reduces as you increase the number of workers.


    To compensate, practitioners typically increase the amount of data per batch.


    As a result, the time it takes to go through a single pass of the data (one epoch)
    should ideally reduce, since the number of total batches decreases.'

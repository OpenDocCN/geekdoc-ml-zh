    # Configuring RLlib Experiments


    Now that you''ve seen the basic Python training API of RLlib in an example, let''s
    take a step back and discuss in more depth how to configure and run RLlib experiments.
    By now you know that your Trainer takes a config argument, which so far we''ve
    only used to set the number of Ray workers to 4.


    If you want to alter the behaviour of your RLlib training run, the way to do this
    is to change the config argument of your Trainer. This is at the same time relatively
    simple, as you can add configuration properties quickly, and a bit tricky, as
    you have to know which key-words the config dictionary expects. Finding and tweaking
    the right configuration properties becomes easier once you have a good grasp of
    what''s available and what to expect.


    RLlib configuration splits in two parts, namely algorithm-specific and common
    configuration. We''ve used DQN as our algorithm in the examples so far, which
    has certain properties that are only available to this choice⁶. Algorithm-specific
    configuration only becomes more relevant once you''ve settled on an algorithm
    and want to squeeze it for performance, but in practice RLlib provides you with
    good defaults to get started. You can look up configuration arguments in the [API
    reference for RLlib algorithms](https://docs.ray.io/en/latest/rllib/rllib-training.html#common-parameters).


    The common configuration of algorithms can be further split into the following
    types.


    # Resource Configuration


    Whether you use Ray RLlib locally or on a cluster, you can specify the resources
    used for the training process. Here are the most important options to consider:


    6 For the experts, our DQNs are dueling double Q-learning models via the "dueling":
    True and "double_q": True default arguments, for example.'

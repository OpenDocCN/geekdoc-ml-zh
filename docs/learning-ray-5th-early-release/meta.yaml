    as in supervised learning, but still a vital part of running advanced experiments
    successfully.

    - You can change the way your observations are preprocessed by providing custom
    preprocessors. For our simple maze examples there was nothing to preprocess, but
    when working with image or video data, preprocessing is often a crucial step.

    - In our `AdvancedEnv` we introduced states to avoid. Our agents had to learn
    to do this, but RLlib has a feature to automatically avoid them through so-called
    *parametric action spaces*. Loosely speaking, what you can do is to "mask out"
    all undesired actions from the action space for each point in time.

    - In some cases it can also be necessary to have variable observation spaces,
    which is also fully supported by RLlib.

    - We only briefly touched on the topic of offline data. Rllib has a full-fledged
    Python API for reading and writing experience data that can be used in various
    situation.

    - Lastly, I want to stress again that we have solely worked with `DQNTrainer`
    here for simplicity, but RLlib has an impressive range of training algorithms.
    To name just one, the MARWIL algorithm is a complex hybrid algorithm with which
    you can run imitation learning from offline data, while also mixing in regular
    training on data generated "online".'
- md: "## Summary\n\nTo summarize, you've seen a selection of interesting features\
    \ of RLlib in this chapter. We covered training multi-agent environments, working\
    \ with offline data generated by another agent, setting up a client-server architecture\
    \ to split simulations from RL training, and using curriculum learning to specify\
    \ increasingly difficult tasks.\n\nWe've also given you a quick overview of the\
    \ main concepts underlying RLlib, and how to use its CLI and Python API. In particular,\
    \ we've shown how to configure your RLlib trainers and environments to your needs.\
    \ As we've only covered a small part of the possibilities of RLlib, we encourage\
    \ you to read its [documentation and explore its API](https://docs.ray.io/en/latest/rllib/index.html).\n\
    \nIn the next chapter you're going to learn how to tune the hyperparameters of\
    \ your RLlib models and policies with Ray Tune.\n\n## CHAPTER 5\nHyperparameter\
    \ Optimization with Ray Tune\n\n> **A Note for Early Release Readers**\n> With\
    \ Early Release ebooks, you get books in their earliest form—the author’s raw\
    \ and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nIn the last chapter we’ve\
    \ seen how to build and run various reinforcement learning experiments. Running\
    \ such experiments can be expensive, both in terms of compute resources and the\
    \ time it takes to run them. This only gets amplified as you move on to more challenging\
    \ tasks, since it’s unlikely to just pick an algorithm out of the box and run\
    \ it to get a good result. In other words, at some point you’ll need to tune the\
    \ hyperparameters of your algorithms to get the best results. As we’ll see in\
    \ this chapter, tuning machine learning models is hard, but Ray Tune is an excellent\
    \ choice to help you tackle this task.\n\nRay Tune is an incredibly powerful tool\
    \ for hyperparameter optimization. Not only does it work in a distributed manner\
    \ by default, such as any other library built on top of Ray, it’s also one of\
    \ the most feature-rich hyperparameter optimization (HPO) libraries available.\
    \ To top this off, Tune integrates with some of the most prominent HPO libraries\
    \ out there, such as HyperOpt, Optuna, and many more. This is remarkable, since\
    \ it makes Tune an ideal candidate for distributed HPO experiments, practically\
    \ no matter what other libraries you’re coming from or if you start from scratch.\n\
    \nIn this chapter we’ll first revisit in a bit more depth why HPO is hard to do,\
    \ and how you could naively implement it yourself with Ray. We then teach you\
    \ the core concepts of Ray Tune and how you can use it to tune the RLlib models\
    \ we’ve built in the previous chapter. To wrap things up, we'll also have a look\
    \ at how to use Tune for supervised learning tasks, using frameworks like PyTorch\
    \ and TensorFlow. Along the way, we demonstrate how Tune integrates with other\
    \ HPO libraries and introduce you to some of its more advanced features.\n\n##\
    \ Tuning Hyperparameters\n\nLet's recap the basics of hyperparameter optimization\
    \ briefly. If you're familiar with this topic, you can skip this section, but\
    \ since we're also discussing aspects of distributed HPO, you might still benefit\
    \ from following along. The notebook for this chapter can be found in the GitHub\
    \ repository of this book.\n\nIf you recall our first RL experiment introduced\
    \ in Chapter 3, we defined a very basic Q-learning algorithm whose internal *state-action\
    \ values* were updated according to an explicit update rule. After initialization,\
    \ we never touched these *model parameters* directly, they were learnt by the\
    \ algorithm. By contrast, in setting up the algorithm, we explicitly chose a *weight*\
    \ and a *discount_factor* parameter prior to training. I didn't tell you how we\
    \ chose to set these parameters back then, we simply accepted the fact that they\
    \ were good enough to crack the problem at hand. In the same way, in Chapter 4\
    \ we initialized an RLlib algorithm with a config that used a total of four rollout\
    \ workers for our DQN algorithm by setting `num_workers=4`. Parameters like these\
    \ are called *hyperparameters*, and finding good choices for them can be crucial\
    \ for successful experiments. The field of hyperparameter optimization entirely\
    \ is devoted to efficiently finding such good choices.\n\n## Building a random\
    \ search example with Ray\n\nHyperparameters like the *weight* or the *discount_factor*\
    \ of our Q-learning algorithm are *continuous* parameters, so we can't possibly\
    \ test all combinations of them. What's more, these parameter choices may not\
    \ be independent of each other. If we want them to be selected for us, we also\
    \ need to specify a *value range* for each of them (both hyperparameters need\
    \ to be chosen between 0 and 1 in this case). So, how do we determine good or\
    \ even optimal hyperparameters?\n\nLet's take a look at a quick example that implements\
    \ a naive, yet effective approach to tuning hyperparameters. This example will\
    \ also allow us to introduce some terminology that we'll use later on. The core\
    \ idea is that we can attempt to *randomly sample* hyperparameters, run the algorithm\
    \ for each sample, and then select the best run based on the results we got. But\
    \ to do the theme of this book justice, we don't just want to run this in a sequential\
    \ loop, we want to compute our runs in parallel using Ray.\n\nTo keep things simple\
    \ we'll revisit our simple Q-learning algorithm from Chapter 3 again. If you don't\
    \ recall the signature of the main training function, we defined it as `train_policy(env,\
    \ num_episodes=10000, weight=0.1, discount_factor=0.9)`. That means we can tune\
    \ the weight and discount_factor parameters of our algorithm by passing in different\
    \ values to the train_policy function and see how the algorithm performs. To do\
    \ that, let's define a so-called search space for our hyperparameters. For both\
    \ parameters in question we simply uniformly sample values between 0 and 1, for\
    \ a total of 10 choices. Here's what that looks like:\n\nExample 5-1.\n\n```python\n\
    import random\nsearch_space = []\nfor i in range(10):\n    random_choice = {\n\
    \        'weight': random.uniform(0, 1),\n        'discount_factor': random.uniform(0,\
    \ 1)\n    }\n    search_space.append(random_choice)\n```\n\nNext, we define an\
    \ objective function, or simply objective. The role of an objective function is\
    \ to evaluate the performance of a given set of hyperparameters for the task we're\
    \ interested in. In our case, we want to train our RL algorithm and evaluate the\
    \ trained policy. Recall that in Chapter 3 we also defined an evaluate_policy\
    \ function for precisely this purpose. The evaluate_policy function was defined\
    \ to return the average number of steps it took for an agent to reach the goal\
    \ in the underlying maze environment. In other words, we want to find a set of\
    \ hyperparameters that minimizes the result of our objective function. To parallelize\
    \ the objective function, we'll use the ray.remote decorator to make our objective\
    \ a Ray task.\n\nExample 5-2.\n\n```python\nimport ray\n\n@ray.remote\ndef objective(config):\
    \ ①\n    environment = Environment()\n    policy = train_policy( ②\n        environment,\
    \ weight=config[\"weight\"], discount_factor=config[\"discount_factor\"]\n   \
    \ )\n    score = evaluate_policy(environment, policy) ③\n    return [score, config]\
    \ ④\n```\n\n1. We pass in a dictionary with a hyperparameter sample into our objective.\n\
    2. Then we train our RL policy using the chosen hyperparameters.\n3. Afterwards\
    \ we can evaluate the policy to retrieve the score we want to minimize.\n4. We\
    \ return both score and hyperparameter choice together for later analysis.\n\n\
    Finally, we can run the objective function in parallel using Ray, by iterating\
    \ over the search space and collecting the results:\n\nExample 5-3.\n\n```python\n\
    result_objects = [objective.remote(choice) for choice in search_space]\nresults\
    \ = ray.get(result_objects)\n\nresults.sort(key=lambda x: x[0])\nprint(results[-1])\n\
    ```\n\nThe actual results of this hyperparameter run are not very interesting,\
    \ as the problem is so easy to solve (most runs will return the optimum of 8 steps,\
    \ regardless of the hyperparameters chosen). But in case I haven't sold you on\
    \ Ray's capabilities yet, what's more interesting here is how easy it is to parallelize\
    \ the objective function with Ray. In fact, I'd like to encourage you to rewrite\
    \ the above example to simply loop through the search space and call the objective\
    \ function for each sample, just to confirm how painfully slow such a serial loop\
    \ can be.\n\nConceptually, the three steps we took to run the above example are\
    \ representative of how hyperparameter tuning works in general. First, you define\
    \ a search space, then you define an objective function, and finally you run an\
    \ analysis to find the best hyperparameters. In HPO it is common to speak of one\
    \ evaluation of the objective function per hyperparameter sample as a *trial*,\
    \ and all trials form the basis for your analysis. How exactly parameters are\
    \ sampled from the search space (in our case, randomly) is up to a *search algorithm*\
    \ to decide. In practice, finding good hyperparameters is easier said than done,\
    \ so let's have a closer look at why this problem is so hard.\n\n## Why is HPO\
    \ hard?\n\nIf you zoom out from the above example just enough, you can see that\
    \ there are several intricacies in making the process of hyperparameter tuning\
    \ work well. Here's a quick overview of the most important ones:\n\n- Your search\
    \ space can be composed of a large number of hyperparameters. These parameters\
    \ might have different data types and ranges. Some parameters might be correlated,\
    \ or even depend on others. Sampling good candidates from complex, high-dimensional\
    \ spaces is a difficult task."

    \n本书是 O’Reilly 与 Anyscale 合作的一部分。请参见我们的编辑独立性声明。\n\n978-1-098-11716-0\n\n# 目录\n\
    \n1. Ray 概览\n   什么是 Ray？\n   是什么催生了 Ray？\n      Python 和强化学习中的灵活工作负载\n      三层结构：核心、库和生态系统\n\
    \   一个分布式计算框架\n   一套数据科学库\n      机器学习与数据科学工作流\n      使用 Ray Data 进行数据处理\n    \
    \  模型训练\n      超参数调优\n      模型服务\n   不断增长的生态系统\n      Ray 如何集成与扩展\n      Ray 作为分布式接口\n\
    \   总结\n2. Ray Core 入门\n   Ray Core 简介\n      使用 Ray API 的第一个示例\n      Ray Core\
    \ API 概览\n      设计原则\n   理解 Ray 系统组件\n      在节点上调度和执行工作\n      头节点\n      分布式调度与执行\n\
    \   总结\n3. 构建你的第一个分布式应用\n   设置一个简单的迷宫问题\n   构建一个模拟\n   训练一个强化学习模型\n   构建一个分布式\
    \ Ray 应用\n   回顾强化学习术语\n   总结\n4. 使用 Ray RLlib 进行强化学习\n   RLlib 概览\n   RLlib 入门\n\
    \      构建一个 Gym 环境\n      运行 RLlib CLI\n      使用 RLlib Python API\n   配置 RLlib\
    \ 实验\n      资源配置\n      调试和日志配置\n      Rollout Worker 和评估配置\n      环境配置\n   使用\
    \ RLlib 环境\n      RLlib 环境概览\n      使用多个代理\n      使用策略服务器和客户端\n   高级概念\n     \
    \ 构建一个高级环境\n      应用课程学习\n      使用离线数据\n      其他高级主题\n   总结\n5. 使用 Ray Tune 进行超参数优化\n\
    \   调优超参数\n      使用 Ray 构建一个随机搜索示例\n      为什么 HPO 很难？\n   Tune 简介\n      Tune\
    \ 如何工作？\n      配置和运行 Tune\n   使用 Tune 进行机器学习\n      将 RLlib 与 Tune 结合使用\n    \
    \  调优 Keras 模型\n   总结\n6. 使用 Ray Train 进行分布式训练\n   分布式模型训练基础\n   Ray Train 简介\n\
    \      为 Ray Train 创建一个端到端示例\n   Ray Train 中的预处理器\n      预处理器的使用\n      预处理器的序列化\n\
    \   Ray Train 中的训练器\n      梯度提升树的分布式训练\n      深度学习的分布式训练\n      使用 Ray Train 训练器扩展训练\n\
    \      将数据连接到分布式训练\n   Ray Train 特性\n      检查点\n      回调\n      与 Ray Tune 集成\n\
    \      导出模型\n      一些注意事项\n7. 使用 Ray 进行数据处理\n   Ray 数据集\n      数据集概览\n      数据集基础\n\
    \      在数据集上计算\n      数据集管道\n      示例：从头开始并行 SGD\n   外部库集成\n      概览\n      Ray\
    \ 上的 Dask\n   构建一个机器学习管道\n      背景\n      端到端示例：预测纽约市出租车行程中的高额小费\n\n# 第 1 章\n\n\
    # Ray 概览\n\n> 分布式系统就是这样一种系统：一台你甚至不知道存在的计算机的故障，就能让你自己的计算机无法使用。\n—Leslie Lamport\n\
    \n## 给早期发布读者的说明\n\n通过早期发布电子书，您可以在书籍的最早期形式——作者撰写时的原始未编辑内容——中获取书籍，因此您可以在这些书籍正式发布之前很久就利用这些技术。\n\
    \n我们需要高效分布式计算的原因之一是，我们正在以越来越快的速度收集越来越多、种类繁多的数据。过去十年出现的存储系统、数据处理和分析引擎对许多公司的成功至关重要。有趣的是，大多数“大数据”技术都是为（数据）工程师构建和操作的，他们负责数据收集和处理任务。其基本原理是解放数据科学家，让他们做自己最擅长的事情。作为数据科学从业者，您可能希望专注于训练复杂的机器学习模型、运行高效的超参数选择、构建全新的定制模型或模拟，或者提供模型服务以展示它们。与此同时，您可能*不得不*将它们扩展到计算集群。为此，您选择的分布式系统需要支持所有这些细粒度的“大计算”任务，可能还需要在专用硬件上运行。理想情况下，它还应融入您正在使用的大数据工具链，并且足够快以满足您的延迟要求。换句话说，分布式计算必须足够强大和灵活，以应对复杂的数据科学工作负载——而\
    \ Ray 可以帮助您做到这一点。\n\nPython 可能是当今数据科学最流行的语言，它无疑是我日常工作中发现最有用的语言。如今它已有 30 多年的历史，但其社区仍在不断增长和活跃。丰富的\
    \ PyData 生态系统是数据科学家工具箱的重要组成部分。如何确保在扩展工作负载的同时，仍然利用您需要的工具？这是一个难题，特别是因为不能强迫社区直接抛弃他们的工具箱或编程语言。这意味着数据科学的分布式计算工具必须为他们现有的社区而构建。\n\
    \n# 什么是 Ray？\n\n我喜欢 Ray 的地方在于它满足了上述所有要求。它是一个为 Python 数据科学社区构建的灵活分布式计算框架。Ray 易于上手，并让简单的事情保持简单。其核心\
    \ API 尽可能精简，帮助您有效地理解您想要编写的分布式程序。您可以在笔记本电脑上高效地并行化 Python 程序，并且几乎无需任何更改即可在集群上运行您在本地测试过的代码。其高级库易于配置，并且可以无缝地一起使用。其中一些库，如\
    \ Ray 的强化学习库，即使作为独立项目（无论是否分布式）也将有光明的未来。虽然 Ray 的核心是用 C++ 构建的，但从第一天起它就是一个 Python\
    \ 优先的框架，与许多重要的数据科学工具集成，并且可以依靠不断增长的生态系统。\n\n分布式 Python 并不新鲜，Ray 也不是这个领域的第一个框架（也不会是最后一个），但它所提供的东西是特别的。当您组合其多个模块并拥有自定义的、机器学习密集型的工作负载时，Ray\
    \ 尤其强大，否则这些工作负载将难以实现。它使分布式计算变得足够简单，让您能够灵活地运行复杂的工作负载，同时利用您熟悉并希望使用的 Python 工具。换句话说，通过*学习\
    \ Ray*，您将了解*用于数据科学的灵活分布式 Python*。\n\n在本章中，您将首次了解 Ray 能为您做什么。我们将讨论构成 Ray 的三个层次，即其核心引擎、高级库和生态系统。在本章中，我们将首先向您展示一些代码示例，让您感受一下\
    \ Ray，但我们将 Ray API 和组件的深入讨论推迟到后面的章节。您也可以将本章视为整本书的概览。\n\n# 是什么催生了 Ray？\n\n编程分布式系统很难。它需要您可能不具备的特定知识和经验。理想情况下，这样的系统不会妨碍您，并提供抽象让您专注于自己的工作。但在实践中，“所有非平凡的抽象在某种程度上都是有漏洞的”（Spolsky），并且让计算机集群按照"

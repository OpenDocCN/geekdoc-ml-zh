  - "[PAGE 131]\n\ncallbacks to process, or log, your intermediate results (the values\
    \ passed into train.report(...)).\n\nRay Train contains built-in callbacks for\
    \ popular tracking frameworks, or you can implement your own callback via the\
    \ TrainingCallback interface. Available callbacks include:\n\n+   - Json Logging\n\
    - Tensorboard Logging\n- MLflow Logging\n- Torch Profiler\n\nExample 6-16.\n\n\
    ```\n# Run the training function, logging all the intermediate results\n# to MLflow\
    \ and Tensorboard.\n\nresult = trainer.run(\n    train_func,\n    callbacks=[\n\
    \        MLflowLoggerCallback(experiment_name=\"train_experiment\"),\n       \
    \ TBXLoggerCallback(),\n    ],\n)\n```\n\n# Integration with Ray Tune\n\nRay Train\
    \ provides an integration with Ray Tune that allows you to perform hyper-parameter\
    \ optimization in just a few lines of code. Tune will create one Trial per hyperparameter\
    \ configuration. In each Trial, a new Trainer will be initialized and run the\
    \ training function with its generated configuration.\n\nExample 6-17.\n\n```\n\
    from ray import tune\n\nfail_after_finished = True\nprep_v1 = preprocessor\nprep_v2\
    \ = preprocessor\n\nparam_space = {\n    \"scaling_config\": {\n        \"num_actors\"\
    : tune.grid_search([2, 4]),\n        \"cpus_per_actor\": 2,\n        \"gpus_per_actor\"\
    : 0,\n    },\n```"

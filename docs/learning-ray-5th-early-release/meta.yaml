    \ 层的激活函数、Dropout 率以及第一层的“隐藏”输出单元数。我们可以用同样的方式调整此模型的任何其他超参数，此选择只是一个示例。\n\n我们可以像本章其他示例中那样手动报告感兴趣的指标（例如，通过在目标中返回字典或使用\

    ```\n\n接下来，我们定义一个目标函数，或简称目标。目标函数的作用是评估给定超参数集在我们感兴趣的任务上的性能。在我们的例子中，我们想要训练我们的 RL\
    \ 算法并评估训练好的策略。回想一下，在第 3 章中，我们也定义了一个 evaluate_policy 函数，正是为了这个目的。evaluate_policy\

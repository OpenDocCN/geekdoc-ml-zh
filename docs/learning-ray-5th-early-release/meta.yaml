    \ We could have done much better, and if you're interested to scan Ray's tuned\
    \ examples for the Pendulum-v1 environment, you'll find an abundance of solutions\
    \ to this exercise. The point of this example was to show you how simple it can\
    \ be to train and evaluate reinforcement learning tasks with RLlib, using just\
    \ two command line calls to rllib.\n\n## Distributed training with Ray Train\n\
    \nRay RLlib is dedicated to reinforcement learning, but what do you do if you\
    \ need to train models for other types of machine learning, like supervised learning?\
    \ You can use another Ray library for distributed training in this case, called\
    \ *Ray Train*. At this point, we don't have built up enough knowledge of frameworks\
    \ such as TensorFlow to give you a concrete and informative example for Ray Train.\
    \ We'll discuss all of that in [Chapter 6](#), when it's time to. But we can at\
    \ least roughly sketch what a distributed training \"wrapper\" for an ML model\
    \ would look like, which is simple enough conceptually:\n\n*Example 1-6.*\n\n\
    ```\nfrom ray.train import Trainer\n\ndef training_function():\n    pass\n\ntrainer\
    \ = Trainer(backend=\"tensorflow\", num_workers=4)\ntrainer.start()\n\nresults\
    \ = trainer.run(training_function)\ntrainer.shutdown()\n```\n\n1. First, define\
    \ your ML model training function. We simply pass here.\n2. Then initialize a\
    \ Trainer instance with TensorFlow as the backend.\n3. Lastly, scale out your\
    \ training function on a Ray cluster.\n\nIf you're interested in distributed training,\
    \ you could jump ahead to [Chapter 6](#).\n\n## Hyperparameter Tuning\n\nNaming\
    \ things is hard, but the Ray team hit the spot with *Ray Tune*, which you can\
    \ use to tune all sorts of parameters. Specifically, it was built to find good\
    \ hyperparameters for machine learning models. The typical setup is as follows:\n\
    \n- You want to run an extremely computationally expensive training function.\
    \ In ML it's not uncommon to run training procedures that take days, if not weeks,\
    \ but let's say you're dealing with just a couple of minutes.\n- As result of\
    \ training, you compute a so-called objective function. Usually you either want\
    \ to maximize your gains or minimize your losses in terms of performance of your\
    \ experiment.\n- The tricky bit is that your training function might depend on\
    \ certain parameters, hyperparameters, that influence the value of your objective\
    \ function.\n- You may have a hunch what individual hyperparameters should be,\
    \ but tuning them all can be difficult. Even if you can restrict these parameters\
    \ to a sensible range, it's usually prohibitive to test a wide range of combinations.\
    \ Your training function is simply too expensive.\n\nWhat can you do to efficiently\
    \ sample hyperparameters and get \"good enough\" results on your objective? The\
    \ field concerned with solving this problem is called *hyperparameter optimization*\
    \ (HPO), and Ray Tune has an enormous suite of algorithms for tackling it. Let's\
    \ look at a first example of Ray Tune used for the situation we just explained.\
    \ The focus is yet again on Ray and its API, and not on a specific ML task (which\
    \ we simply simulate for now).\n\n*Example 1-7. Minimizing an objective for an\
    \ expensive training function with Ray Tune*\n\n```\nfrom ray import tune\nimport\
    \ math\nimport time\n\ndef training_function(config): ①\n    x, y = config[\"\
    x\"], config[\"y\"]\n    time.sleep(10)\n    score = objective(x, y)\n    tune.report(score=score)\
    \ ②\n\ndef objective(x, y):\n    return math.sqrt((x**2 + y**2)/2) ③\n\nresult\
    \ = tune.run( ④\n    training_function,\n    config={\n        \"x\": tune.grid_search([-1,\
    \ -.5, 0, .5, 1]), ⑤\n        \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n \
    \   })\n\nprint(result.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\
    \n1. We simulate an expensive training function that depends on two hyperparameters\
    \ x and y, read from a config.\n2. After sleeping for 5 seconds to simulate training\
    \ and computing the objective we report back the score to tune.\n3. The objective\
    \ computes the mean of the squares of x and y and returns the square root of this\
    \ term. This type of objective is fairly common in ML.\n4. We then use tune.run\
    \ to initialize hyperparameter optimization on our training_function.\n5. A key\
    \ part is to provide a parameter space for x and y for tune to search over.\n\n\
    The Tune example in Example 1-7 finds the best possible choices of parameters\
    \ x and y for a training_function with a given objective we want to minimize.\
    \ Even though the objective function might look a little intimidating at first,\
    \ since we compute the sum of squares of x and y, all values will be non-negative.\
    \ That means the smallest value is obtained at x=0 and y=0 which evaluates the\
    \ objective function to 0.\n\nWe do a so-called grid search over all possible\
    \ parameter combinations. As we explicitly pass in five possible values for both\
    \ x and y that's a total of 25 combinations that get fed into the training function.\
    \ Since we instruct training_function to sleep for 10 seconds, testing all combinations\
    \ of hyperparameters sequentially would take more than four minutes total. Since\
    \ Ray is smart about parallelizing this workload, on my laptop this whole experiment\
    \ only takes about 35 seconds. Now, imagine each training run would have taken\
    \ several hours, and we'd have 20 instead of two hyperparameters. That makes grid\
    \ search infeasible, especially if you don't have educated guesses on the parameter\
    \ range. In such situations you'll have to use more elaborate HPO methods from\
    \ Ray Tune, as discussed in Chapter 5.\n\n## Model Serving\n\nThe last of Ray's\
    \ high-level libraries we'll discuss specializes on model serving and is simply\
    \ called Ray Serve. To see an example of it in action, you need a trained ML model\
    \ to serve. Luckily, nowadays you can find many interesting models on the internet\
    \ that have already been trained for you. For instance, Hugging Face has a variety\
    \ of models available for you to download directly in Python. The model we'll\
    \ use is a language model called GPT-2 that takes text as input and produces text\
    \ to continue or complete the input. For example, you can prompt a question and\
    \ GPT-2 will try to complete it.\n\nServing such a model is a good way to make\
    \ it accessible. You may not know how to load and run a TensorFlow model on your\
    \ computer, but you do know how to ask a question in plain English. Model serving\
    \ hides the implementation details of a solution and lets users focus on providing\
    \ inputs and understanding outputs of a model.\n\nTo proceed, make sure to run\
    \ `pip install transformers` to install the Hugging Face library that has the\
    \ model we want to use. With that we can now import and start an instance of Ray's\
    \ serve library, load and deploy a GPT-2 model and ask it for the meaning of life,\
    \ like so:\n\n*Example 1-8.*\n\n```\nfrom ray import serve\nfrom transformers\
    \ import pipeline\nimport requests\n\nserve.start() ❶\n\n@serve.deployment ❷\n\
    def model(request):\n    language_model = pipeline(\"text-generation\", model=\"\
    gpt2\") ❸\n    query = request.query_params[\"query\"]\n    return language_model(query,\
    \ max_length=100) ❹\n\nmodel.deploy() ❺\n\nquery = \"What's the meaning of life?\"\
    \nresponse = requests.get(f\"http://localhost:8000/model?query={query}\") ❻\n\
    print(response.text)\n```\n\n❶ We start serve locally.\n❷ The @serve.deployment\
    \ decorator turns a function with a request parameter into a serve deployment.\n\
    ❸ Loading language_model inside the model function for every request is inefficient,\
    \ but it's the quickest way to show you a deployment.\n❹ We ask the model to give\
    \ us at most 100 characters to continue our query.\n❺ Then we formally deploy\
    \ the model so that it can start receiving requests over HTTP.\n❻ We use the indispensable\
    \ requests library to get a response for any question you might have.\n\nIn ???\
    \ you will learn how to properly deploy models in various scenarios, but for now\
    \ I encourage you to play around with this example and test different queries.\
    \ Running the last two lines of code repeatedly will give you different answers\
    \ practically every time. Here’s a darkly poetic gem, raising more questions,\
    \ that I queried on my machine and slightly censored for underaged readers:\n\n\
    ```\n[{\n    \"generated_text\": \"What's the meaning of life?\\n\\nIs there one\
    \ way or another of living?\\n\\nHow does it feel to be trapped in a relationship?\\\
    n\\nHow can it be changed before it's too late?\\n\\nWhat did we call it in our\
    \ time?\\n\\nWhere do we fit within this world and what are we going to live for?\\\
    n\\nMy life as a person has been shaped by the love I've received from others.\"\
    \n}]\n```\n\nThis concludes our whirlwind tour of Ray’s data science libraries,\
    \ the second of Ray’s layers. Before we wrap up this chapter, let’s have a very\
    \ brief look at the third layer, the growing ecosystem around Ray.\n\n## A Growing\
    \ Ecosystem\n\nRay’s high-level libraries are powerful and deserve a much deeper\
    \ treatment throughout the book. While their usefulness for the data science experimentation\
    \ lifecycle is undeniable, I also don’t want to give off the impression that Ray\
    \ is all you need from now on. In fact, I believe the best and most successful\
    \ frameworks are the ones that integrate well with existing solutions and ideas.\
    \ It’s better to focus on your core strengths and leverage other tools for what’s\
    \ missing in your solution. There’s usually no reason to re-invent the wheel.\n\
    \n## How Ray Integrates and Extends\n\nTo give you an example for how Ray integrates\
    \ with other tools, consider that Ray Data is a relatively new addition to its\
    \ libraries. If you want to boil it down, and maybe oversimplify a little, Ray\
    \ is a compute-first framework. In contrast, distributed frameworks like Apache\
    \ Spark⁷ or Dask can be considered data-first. Pretty much anything you do with\
    \ Spark starts with the definition of a distributed dataset and transformations\
    \ thereof. Dask bets on bringing common data structures like Pandas dataframes\
    \ or Numpy arrays to a distributed setup. Both are immensely powerful in their\
    \ own regard, and we’ll give you a more detailed and fair comparison to Ray\n\n\
    7 Spark has been created by another lab in Berkeley, AMPLab. The internet is full\
    \ of blog posts claiming that Ray should therefore be seen as a replacement of\
    \ Spark. It’s better to think of them as tools with different strengths that are\
    \ both likely here to stay."
  mdcn: "在观察性能时，你应该会看到智能体在摆锤练习中挣扎。我们本可以做得更好，如果你有兴趣查看Ray针对Pendulum-v1环境调优的示例，你会发现大量关于此练习的解决方案。这个例子的重点是向你展示，使用RLlib训练和评估强化学习任务可以多么简单，只需对`rllib`进行两次命令行调用即可。\n\
    \n## 使用Ray Train进行分布式训练\n\nRay RLlib专注于强化学习，但如果你需要为其他类型的机器学习（如监督学习）训练模型该怎么办？在这种情况下，你可以使用另一个Ray库进行分布式训练，称为*Ray\
    \ Train*。目前，我们对TensorFlow等框架的知识积累还不够，无法为你提供一个具体且信息丰富的Ray Train示例。我们将在[第6章](#)中讨论所有这些内容，届时会详细展开。但我们可以至少粗略勾勒出一个用于机器学习模型的分布式训练“包装器”会是什么样子，其概念上相当简单：\n\
    \n*示例1-6.*\n\n```\nfrom ray.train import Trainer\n\ndef training_function():\n\
    \    pass\n\ntrainer = Trainer(backend=\"tensorflow\", num_workers=4)\ntrainer.start()\n\
    \nresults = trainer.run(training_function)\ntrainer.shutdown()\n```\n\n1.  首先，定义你的机器学习模型训练函数。这里我们简单地跳过。\n\
    2.  然后，使用TensorFlow作为后端初始化一个Trainer实例。\n3.  最后，在Ray集群上扩展你的训练函数。\n\n如果你对分布式训练感兴趣，可以提前跳转到[第6章](#)。\n\
    \n## 超参数调优\n\n命名事物很难，但Ray团队在*Ray Tune*上做到了恰到好处，你可以用它来调整各种参数。具体来说，它是为寻找机器学习模型的良好超参数而构建的。典型设置如下：\n\
    \n-   你想运行一个计算成本极高的训练函数。在机器学习中，运行需要数天甚至数周的训练过程并不少见，但假设你处理的只是几分钟。\n-   作为训练的结果，你计算一个所谓的**目标函数**。通常，你希望根据实验性能最大化收益或最小化损失。\n\
    -   棘手的是，你的训练函数可能依赖于某些参数，即**超参数**，它们会影响目标函数的值。\n-   你可能对各个超参数应该是什么有一个直觉，但同时调整它们可能很困难。即使你可以将这些参数限制在一个合理的范围内，测试广泛的组合通常也是不可行的。你的训练函数成本太高了。\n\
    \n你能做些什么来高效地采样超参数，并在目标函数上获得“足够好”的结果？解决这个问题的领域被称为*超参数优化*（HPO），Ray Tune拥有庞大的算法套件来解决它。让我们看一个Ray\
    \ Tune用于我们刚才解释的情况的第一个例子。重点再次放在Ray及其API上，而不是特定的机器学习任务（我们目前只是模拟它）。\n\n*示例1-7. 使用Ray\
    \ Tune为昂贵的训练函数最小化目标*\n\n```\nfrom ray import tune\nimport math\nimport time\n\n\
    def training_function(config): ①\n    x, y = config[\"x\"], config[\"y\"]\n  \
    \  time.sleep(10)\n    score = objective(x, y)\n    tune.report(score=score) ②\n\
    \ndef objective(x, y):\n    return math.sqrt((x**2 + y**2)/2) ③\n\nresult = tune.run(\
    \ ④\n    training_function,\n    config={\n        \"x\": tune.grid_search([-1,\
    \ -.5, 0, .5, 1]), ⑤\n        \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n \
    \   })\n\nprint(result.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\
    \n1.  我们模拟一个依赖于两个超参数x和y的昂贵训练函数，从配置中读取。\n2.  休眠5秒以模拟训练并计算目标后，我们将分数报告给tune。\n3.\
    \  目标函数计算x和y的平方和的平均值，并返回该项的平方根。这种类型的目标在机器学习中相当常见。\n4.  然后我们使用`tune.run`在我们的`training_function`上初始化超参数优化。\n\
    5.  一个关键部分是为x和y提供一个参数空间供tune搜索。\n\n示例1-7中的Tune示例为具有给定目标（我们希望最小化）的`training_function`找到了参数x和y的最佳可能选择。尽管目标函数起初可能看起来有点令人生畏，因为我们计算x和y的平方和，但所有值都是非负的。这意味着最小值在x=0和y=0处获得，此时目标函数的值为0。\n\
    \n我们对所有可能的参数组合进行所谓的**网格搜索**。由于我们明确地为x和y传递了五个可能的值，总共有25种组合被输入到训练函数中。由于我们指示`training_function`休眠10秒，顺序测试所有超参数组合总共需要超过四分钟。由于Ray在并行化此工作负载方面很智能，在我的笔记本电脑上，整个实验只需要大约35秒。现在，想象一下每次训练运行需要几个小时，而且我们有20个而不是两个超参数。这使得网格搜索变得不可行，特别是如果你对参数范围没有合理的猜测。在这种情况下，你将不得不使用Ray\
    \ Tune中更复杂的HPO方法，如第5章所述。\n\n## 模型服务\n\n我们将讨论的Ray高级库中的最后一个专门用于模型服务，简单地称为Ray Serve。要看到它实际运行的例子，你需要一个训练好的机器学习模型来提供服务。幸运的是，如今你可以在互联网上找到许多已经为你训练好的有趣模型。例如，Hugging\
    \ Face有各种模型可供你直接在Python中下载。我们将使用的模型是一个名为GPT-2的语言模型，它以文本作为输入，并生成文本以继续或完成输入。例如，你可以提示一个问题，GPT-2会尝试完成它。\n\
    \n提供这样的模型是使其可访问的好方法。你可能不知道如何在你的计算机上加载和运行TensorFlow模型，但你确实知道如何用简单的英语提问。模型服务隐藏了解决方案的实现细节，让用户专注于提供输入和理解模型的输出。\n\
    \n要继续，请确保运行`pip install transformers`来安装包含我们想要使用的模型的Hugging Face库。有了它，我们现在可以导入并启动Ray的serve库实例，加载并部署一个GPT-2模型，并询问它生命的意义，如下所示：\n\
    \n*示例1-8.*\n\n```\nfrom ray import serve\nfrom transformers import pipeline\n\
    import requests\n\nserve.start() ❶\n\n@serve.deployment ❷\ndef model(request):\n\
    \    language_model = pipeline(\"text-generation\", model=\"gpt2\") ❸\n    query\
    \ = request.query_params[\"query\"]\n    return language_model(query, max_length=100)\
    \ ❹\n\nmodel.deploy() ❺\n\nquery = \"What's the meaning of life?\"\nresponse =\
    \ requests.get(f\"http://localhost:8000/model?query={query}\") ❻\nprint(response.text)\n\
    ```\n\n❶ 我们在本地启动serve。\n❷ `@serve.deployment`装饰器将一个带有`request`参数的函数转换为一个serve部署。\n\
    ❸ 在`model`函数内部为每个请求加载`language_model`效率低下，但这是向你展示部署的最快方式。\n❹ 我们要求模型最多给我们100个字符来继续我们的查询。\n\
    ❺ 然后我们正式部署模型，使其可以通过HTTP开始接收请求。\n❻ 我们使用不可或缺的`requests`库来获取你可能有的任何问题的响应。\n\n在???中，你将学习如何在各种场景中正确部署模型，但现在我鼓励你尝试这个例子并测试不同的查询。反复运行最后两行代码几乎每次都会给你不同的答案。这里有一个黑暗而富有诗意的宝石，提出了更多问题，这是我在我的机器上查询的，并为未成年读者稍作审查：\n\
    \n```\n[{\n    \"generated_text\": \"What's the meaning of life?\\n\\nIs there\
    \ one way or another of living?\\n\\nHow does it feel to be trapped in a relationship?\\\
    n\\nHow can it be changed before it's too late?\\n\\nWhat did we call it in our\
    \ time?\\n\\nWhere do we fit within this world and what are we going to live for?\\\
    n\\nMy life as a person has been shaped by the love I've received from others.\"\
    \n}]\n```\n\n这结束了我们对Ray数据科学库的旋风之旅，这是Ray的第二层。在结束本章之前，让我们非常简要地看一下第三层，即围绕Ray不断增长的生态系统。\n\
    \n## 不断增长的生态系统\n\nRay的高级库功能强大，值得在本书中进行更深入的探讨。虽然它们对数据科学生命周期的有用性是不可否认的，但我不想给人留下Ray是你现在唯一需要的印象。事实上，我相信最好和最成功的框架是那些与现有解决方案和思想集成良好的框架。最好专注于你的核心优势，并利用其他工具来弥补你解决方案中的不足。通常没有理由重新发明轮子。\n\
    \n## Ray如何集成和扩展\n\n为了给你一个Ray如何与其他工具集成的例子，考虑Ray Data是其库中相对较新的补充。如果你想将其简化，也许有点过度简化，Ray是一个**计算优先**的框架。相比之下，像Apache\
    \ Spark⁷或Dask这样的分布式框架可以被认为是**数据优先**的。几乎你用Spark做的任何事情都始于定义一个分布式数据集及其转换。Dask致力于将常见的数据结构（如Pandas数据帧或Numpy数组）引入分布式设置。两者在其自身方面都非常强大，我们将给你一个更详细和公平的与Ray的比较。\n\
    \n7 Spark是由伯克利的另一个实验室AMPLab创建的。互联网上充斥着博客文章声称Ray因此应该被视为Spark的替代品。最好将它们视为具有不同优势的工具，两者都可能长期存在。"

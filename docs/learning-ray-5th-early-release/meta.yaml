    \ transformations that might be used to do batch inference for a machine learning\
    \ model:\n\nExample 7-10.\n\n```\nds = ray.data.read_parquet(\"s3://my_bucket/input_data\"\
    )\\n    .map(cpu_intensive_preprocessing)\\n    .map_batches(gpu_intensive_inference,\
    \ compute=\"actors\", num_gpus=1)\\n    .repartition(10)\\n    .write_parquet(\"\
    s3://my_bucket/output_predictions\")\n```\n\nThere are five stages to this pipeline,\
    \ and each of them stresses different parts of the system: - Reading from remote\
    \ storage requires ingress bandwidth to the cluster and may be limited by the\
    \ throughput of the storage system. - Preprocessing the inputs requires CPU resources.\
    \ - Vectorized inference on the model requires GPU resources. - Repartitioning\
    \ requires network bandwidth within the cluster. - Writing to remote storage requires\
    \ egress bandwidth from the cluster and may be limited by the throughput of storage\
    \ once again."

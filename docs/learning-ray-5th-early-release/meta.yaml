  md: "# Connecting Data to Distributed Training\n\nRay Train provides utilities to\
    \ train on large datasets.\n\nAlong the same philosophy that the user should not\
    \ need to think about **how** to parallelize their code, you can simply “connect”\
    \ your large dataset to Ray Train without thinking about how to ingest and feed\
    \ your data into different parallel workers.\n\nHere, we create a dataset from\
    \ random data. However, you can use other data APIs to read a large amount of\
    \ data (with `read_parquet`, which reads data from the Parquet format).\n\nExample\
    \ 6-11.\n\n```\nfrom typing import Dict\nimport torch\nimport torch.nn as nn\n\
    \nimport ray\nimport ray.train as train\nfrom ray.train import Trainer\n\ndef\
    \ get_datasets(a=5, b=10, size=1000, split=0.8):\n\n    def get_dataset(a, b,\
    \ size):\n        items = [i / size for i in range(size)]\n        dataset = ray.data.from_items([{\"\
    x\": x, \"y\": a * x + b} for x in items])\n        return dataset\n\n    dataset\
    \ = get_dataset(a, b, size)\n    split_index = int(dataset.count() * split)\n\
    \    train_dataset, validation_dataset = dataset.random_shuffle().split_at_indices(\n\
    \        [split_index]\n    )\n    train_dataset_pipeline = train_dataset.repeat().random_shuffle_each_window()\n\
    \    validation_dataset_pipeline = validation_dataset.repeat()\n    datasets =\
    \ {\n        \"train\": train_dataset_pipeline,\n        \"validation\": validation_dataset_pipeline,\n\
    \    }\n    return datasets\n```\n\nYou can then specify a training function that\
    \ accesses these datapoints. Note that we use a specific `get_dataset_shard` function\
    \ here. Under the hood, Ray Train will automatically shard the provided dataset\
    \ so that individual workers can train on a different subset of the data at once.\
    \ This avoids training on duplicate data within the same epoch. The `get_dataset_shard`\
    \ function passes a subset of the data from the data source to each individual\
    \ parallel training worker."

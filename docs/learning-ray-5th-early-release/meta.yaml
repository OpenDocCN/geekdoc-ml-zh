  - "[PAGE 75]\n\n# Training RLlib models\n\nRLlib has good defaults for all its Trainer\
    \ implementations, meaning that you can initialize them without having to tweak\
    \ any configuration parameters for these trainers³. For instance, to generate\
    \ a DQN trainer you can simply use DQNTrainer(env=GymEnvironment). That said,\
    \ it's worth noting that RLlib trainers are highly configurable, as you will see\
    \ in the following example. Specifically, we pass a config dictionary to the Trainer\
    \ constructor and tell it to use four workers in total. What that means is that\
    \ the DQNTrainer will spawn four Ray actors, each using a CPU kernel, to train\
    \ our DQN algorithm in parallel.\n\nAfter you've initialized your trainer with\
    \ the env you want to train on, and pass in the config you want, you can simply\
    \ call the train method. Let's use this method to train the algorithm for ten\
    \ iterations in total:\n\n```\nfrom ray.tune.logger import pretty_print\nfrom\
    \ maze_gym_env import GymEnvironment\nfrom ray.rllib.agents.dqn import DQNTrainer\n\
    \ntrainer = DQNTrainer(env=GymEnvironment, config={\"num_workers\": 4}) ①\n\n\
    config = trainer.get_config() ②\nprint(pretty_print(config))\n\nfor i in range(10):\n\
    \    result = trainer.train() ③\n\nprint(pretty_print(result)) ④\n```\n\n+   ①\
    \ We use the DQNTrainer from RLlib to use Deep-Q-Networks (DQN) for training,\
    \ using 4 parallel workers (Ray actors).\n② Each Trainer has a complex default\
    \ configuration.\n③ We can then simply call the train method to train the agent\
    \ for ten iterations.\n④ With the pretty_print utility we can generate human-readable\
    \ output of the training results.\n\nNote that the number 10 training iterations\
    \ has no special meaning, but it should be enough for the algorithm to learn to\
    \ solve the maze problem adequately. The example just goes to show you that you\
    \ have full control over the training process.\n\n> 3 Of course, configuring your\
    \ models is a crucial part of RL experiments. We will discuss configuration of\
    \ RLlib trainers in more detail in the next section."
- md: "From printing the config dictionary, you can verify that the `num_workers`\
    \ parameter is set to 4. Similarly, if you run this training script, the `result`\
    \ contains detailed information about the state of the `Trainer` and the training\
    \ results that's too verbose to put here. The part that's most relevant for us\
    \ right now is information about the reward of the algorithm, which hopefully\
    \ indicates that the algorithm learned to solve the maze problem. You should see\
    \ output of the following form:\n\n```\n...\nepisode_reward_max: 1.0\nepisode_reward_mean:\
    \ 1.0\nepisode_reward_min: 1.0\nepisodes_this_iter: 15\nepisodes_total: 19\n...\n\
    timesteps_total: 10000\ntraining_iteration: 10\n...\n```\n\nIn particular, this\
    \ output shows that the minimum reward attained on average per episode is 1.0,\
    \ which in turn means that the agent always reached the goal and collected the\
    \ maximum reward (1.0).\n\n## Saving, loading, and evaluating RLlib models\n\n\
    Reaching the goal for this simple example isn't too hard, but let's see if evaluating\
    \ the trained algorithm confirms that the agent can also do so in an optimal way,\
    \ namely by only taking the minimum number of eight steps to reach the goal.\n\
    \nTo do so, we utilize another mechanism that you've already seen from the RLlib\
    \ CLI, namely *checkpointing*. Creating model checkpoints is very useful to ensure\
    \ you can recover your work in case of a crash, or simply to track training progress\
    \ persistently. You can simply create a checkpoint of your RLlib trainers at any\
    \ point in the training process by calling `trainer.save()`. Once you have a checkpoint,\
    \ you can easily restore your Trainer with it. And evaluating a model is as simple\
    \ as calling `trainer.evaluate(checkpoint)` with the checkpoint you created. Here's\
    \ how that looks like if you put it all together:\n\n```\ncheckpoint = trainer.save()\
    \ ①\nprint(checkpoint)\n\nevaluation = trainer.evaluate(checkpoint) ②\nprint(pretty_print(evaluation))\n\
    \nrestored_trainer = DQNTrainer(env=GymEnvironment)\nrestored_trainer.restore(checkpoint)\
    \ ③\n```\n\n- ① You can save trainers to create checkpoints.\n- ② RLlib trainers\
    \ can be evaluated at your checkpoints.\n- ③ And you can also restore any Trainer\
    \ from a given checkpoint.\n\nI should mention that you can also just call `trainer.evaluate()`\
    \ without creating a checkpoint first, but it's usually good practice to use checkpoints\
    \ anyway. Looking at the output, we can now confirm that the trained RLlib algorithm\
    \ did indeed converge to a good solution for the maze problem, as indicated by\
    \ episodes of length 8 in evaluation:\n\n```\n~/ray_results/DQN_GymEnvironment_2022-02-09_10-19-301o3m9r6d/checkpoint_000010/\n\
    checkpoint-10 evaluation:\n...\nepisodes_this_iter: 5\nhist_stats:\n  episode_lengths:\n\
    \  - 8\n  - 8\n  ...\n```\n\n## Computing actions\n\nRLlib trainers have much\
    \ more functionality than just the train, evaluate, save and restore methods we've\
    \ seen so far. For example, you can directly compute actions given the current\
    \ state of an environment. In Chapter 3 we implemented episode roll-outs by stepping\
    \ through an environment and collecting rewards. We can easily do the same with\
    \ RLlib for our GymEnvironment as follows:\n\n```\nenv = GymEnvironment()\ndone\
    \ = False\ntotal_reward = 0\nobservations = env.reset()\n\nwhile not done:\n \
    \   action = trainer.compute_single_action(observations) ①\n    observations,\
    \ reward, done, info = env.step(action)\n    total_reward += reward\n```\n\n-\
    \ ① To compute actions for given observations use `compute_single_action`.\n\n\
    In case you should need to compute many actions at once, not just a single one,\
    \ you can use the `compute_actions` method instead, which takes dictionaries of\
    \ observations as input and produces dictionaries of actions with the same dictionary\
    \ keys as output.\n\n```\naction = trainer.compute_actions({\"obs_1\": observations,\
    \ \"obs_2\": observations})\nprint(action)\n# {'obs_1': 0, 'obs_2': 1}\n```\n\n\
    ## Accessing policy and model states\n\nRemember that each reinforcement learning\
    \ algorithm is based on a *policy* that chooses next actions given the current\
    \ observations the agent has of the environment. Each policy is in turn based\
    \ on an underlying *model*.\n\nIn the case of vanilla Q-Learning that we discussed\
    \ in Chapter 3 the model was a simple look-up table of state-action values, also\
    \ called Q-values. And that policy used this model for predicting next actions\
    \ in case it decided to *exploit* what the model had learned so far, or to *explore*\
    \ the environment with random actions otherwise.\n\nWhen using Deep Q-Learning,\
    \ the underlying model of the policy is a neural network that, loosely speaking,\
    \ maps observations to actions. Note that for choosing next actions in an environment,\
    \ we're ultimately not interested in the concrete values of the approximated Q-values,\
    \ but rather in the *probabilities* of taking each action. The probability distribution\
    \ over all possible actions is called an *action distribution*. In the maze example\
    \ we're using here as a running example we can move up, right, down or left, so\
    \ in that case an action distribution is a vector of four probabilities, one for\
    \ each action.\n\nTo make things concrete, let's have a look at how you access\
    \ policies and models in RLlib:\n\n```\npolicy = trainer.get_policy()\nprint(policy.get_weights())\n\
    \nmodel = policy.model\n```\n\nBoth policy and model have many useful methods\
    \ to explore. In this example we use get_weights to inspect the parameters of\
    \ the model underlying the policy (which are called \"weights\" by standard convention).\n\
    \nTo convince you that there is in fact not just one model at play here, but in\

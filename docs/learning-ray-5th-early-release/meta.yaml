    # Accessing policy and model states


    Remember that each reinforcement learning algorithm is based on a *policy* that
    chooses next actions given the current observations the agent has of the environment.
    Each policy is in turn based on an underlying *model*.


    In the case of vanilla Q-Learning that we discussed in Chapter 3 the model was
    a simple look-up table of state-action values, also called Q-values. And that
    policy used this model for predicting next actions in case it decided to *exploit*
    what the model had learned so far, or to *explore* the environment with random
    actions otherwise.


    When using Deep Q-Learning, the underlying model of the policy is a neural network
    that, loosely speaking, maps observations to actions. Note that for choosing next
    actions in an environment, we''re ultimately we''re not interested in the concrete
    values of the approximated Q-values, but rather in the *probabilities* of taking
    each action. The probability distribution over all possible actions is called
    an *action distribution*. In the maze example we''re using here as a running examples
    we can move up, right, down or left, so in that case an action distribution is
    a vector of four probabilities, one for each action.


    To make things concrete, let''s have a look at how you access policies and models
    in RLlib:


    ```

    policy = trainer.get_policy()

    print(policy.get_weights())


    model = policy.model

    ```


    Both policy and model have many useful methods to explore. In this example we
    use get_weights to inspect the parameters of the model underlying the policy (which
    are called "weights" by standard convention).


    To convince you that there is in fact not just one model at play here, but in
    fact a collection of four models that we trained on separate Ray workers, we can
    access all the workers we used in training - and then ask each worker''s policy
    for their weights like this:


    ```

    workers = trainer.workers

    workers.foreach_worker(lambda remote_trainer: remote_trainer.get_policy().get_weights())

    ```


    In this way, you can access every method available on a Trainer instance on each
    of your workers. In principle, you can use this to *set* model parameters as well,
    or otherwise configure your workers. RLlib workers are ultimately Ray actors,
    so you can alter and manipulate them in almost any way you like.'

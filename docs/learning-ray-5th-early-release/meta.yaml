    To run the training on the workers, we invoke their train method and pass in one
    shard of the DatasetPipeline to each. We then block waiting for training to complete
    across all of the workers. To summarize what happens during this phase: - Each
    epoch, each worker gets a random shard of the data. - The worker trains its local
    model on the shard of data assigned to it. - Once a worker has finished training
    on the current shard, it blocks until the other workers have finished. - The above
    repeats for the remaining epochs (in this case, 10 total).



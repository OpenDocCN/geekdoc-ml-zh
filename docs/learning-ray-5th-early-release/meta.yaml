    \ and takes a lot of arguments for you to configure your runs. To understand these\
    \ different configuration options, we first need to introduce you to the key concepts\
    \ of Tune.\n\n# How does Tune work?\n\nTo effectively work with Tune, you have\
    \ to understand a total of six key concepts, four of which you have already used\
    \ in the last example. Here's an informal overview of Ray Tune's components and\
    \ how you should think about them:\n\n+   - *Search spaces*: These spaces determine\
    \ which parameters to select. Search spaces define the range of values for each\
    \ parameter, and how they should be sampled. They are defined as dictionaries\
    \ and use Tune's sampling functions to specify valid hyperparameter values. You\
    \ have already seen `tune.uniform`, but there are many more options to choose\
    \ from.\n- *Trainables*: A `Trainable` is Tune's formal representation of an objective\
    \ you want to \"tune\". Tune has class-based API as well, but we will only use\
    \ the function-based API in this book. For us, a `Trainable` is a function with\
    \ a single argument, a search space, which reports scores to Tune. The easiest\
    \ way to do so is by returning a dictionary with the score you're interested in."
  - '[PAGE 105]


    +   - *Trials*: By triggering `tune.run(...)`, Tune will make sure to set up trials
    and schedule them for execution on your cluster. A trial contains all necessary
    information about a single run of your objective, given a set of hyperparameters.

    - *Analyses*: Completing a `tune.run` call returns an `ExperimentAnalysis` object,
    with the results of all trials. You can use this object to drill down into the
    results of your trials.

    - *Search Algorithms*: Tune supports a large variety of search algorithms, which
    are at the core of how to tune your hyperparameters. So far you''ve only implicitly
    encountered Tune''s default search algorithm, which randomly selects hyperparameters
    from the search space.

    - *Schedulers*: The last, crucial component of a Tune experiment is that of a
    *scheduler*. Schedulers plan and execute what the search algorithm selects. By
    default, Tune schedules trials selected by your search algorithm on a first-in-first-out
    (FIFO) basis. In practice, you can think of schedulers as a way to speed up your
    experiments, for instance by stopping unsuccessful trials early.


    Figure Figure 5-1 sums up these major components of Tune, and their relationship
    in one diagram:


    ![](img/58c832795222840423ffeca1357b40a7_105_0.png)


    Note that internally Tune runs are started on the driver process of your Ray cluster,
    which spawns several worker processes (using Ray actors) that execute individual
    trials of your HPO experiment. Your trainables, defined on the driver, have to
    be sent to the workers, and trial results need to be communicated to the driver
    running `tune.run(...)`.


    Search spaces, Trainables, trials, and analyses don''t need much additional explanation,
    and we''ll see more examples of each of those components in the rest of this chapter.
    But search algorithms, or simply *searchers* for short, and schedulers need a
    bit more elaboration.'
  - "[PAGE 106]\n\n# Search Algorithms\n\nAll advanced search algorithms provided\
    \ by Tune, and the many third-party HPO libraries it integrates with, fall under\
    \ the umbrella of *Bayesian Optimization*. Unfortunately, going into the details\
    \ of specific Bayesian search algorithms is far beyond the scope of this book.\
    \ The basic idea is that you update your beliefs about which hyperparameter ranges\
    \ are worth exploring based on the results of your previous trials. Techniques\
    \ using this principle make more informed decisions and hence tend to be more\
    \ efficient than independently sampling parameters (e.g. at random).\n\nApart\
    \ from the basic random search we’ve seen already, and *grid search*, which picks\
    \ hyperparameters from a predefined “grid” of choices, Tune offers a wide range\
    \ of Bayesian optimization searchers. For instance, Tune integrates with the popular\
    \ HyperOpt and Optuna libraries, and you can use the popular TPE (Tree-structured\
    \ Parzen Estimator) searcher with Tune through both of these libraries. Not only\
    \ that, Tune also integrates with tools such as Ax, BlendSearch, FLAML, Dragonfly,\
    \ Scikit-Optimize, BayesianOptimization, HpBandSter, Nevergrad, ZOOpt, SigOpt,\
    \ and HEBO. If you need to run HPO experiments with any of these tools on a cluster,\
    \ or want to easily switch between them, Tune is the way to go.\n\nTo make things\
    \ more concrete, let’s rewrite our basic random search Tune example from earlier\
    \ to use the bayesian-optimization library. To do so, make sure you install this\
    \ library in your Python environment first, e.g. with `pip install bayesian-optimization`.\n\
    \n*Example 5-7.*\n\n```\nfrom ray.tune.suggest.bayesopt import BayesOptSearch\n\
    \nalgo = BayesOptSearch(random_search_steps=4)\n\ntune.run(\n    tune_objective,\n\
    \    config=search_space,\n    metric=\"score\",\n    mode=\"min\",\n    search_alg=algo,\n\
    \    stop={\"training_iteration\": 10},\n)\n```\n\nNote that we “warm start” our\
    \ Bayesian optimization with four random steps at the beginning, and we explicitly\
    \ stop the trial runs after 10 training iterations.\n\nNote that since we’re not\
    \ just randomly selecting parameters with BayesOptSearch, the `search_alg` we\
    \ use in our Tune run needs to know which `metric` to optimize for"
- md: "and whether to minimize or optimize this metric. As we've argued before, we\
    \ want to achieve a \"min\" \"score\".\n\n## Schedulers\n\nLet's next discuss\
    \ how to use *trial schedulers* in Tune to make your runs more efficient. We also\
    \ use this section to introduce a slightly different way to report your metrics\
    \ to Tune within an objective function.\n\nSo, let's say that instead of computing\
    \ a score straight-up, like we did in all examples in this chapter so far, we\
    \ compute an *intermediate score* in a loop. This is a situation that often occurs\
    \ in supervised machine learning scenarios, when training a model for several\
    \ iterations (we'll see concrete applications of this later in this chapter).\
    \ With good hyperparameter choices selected, this immediate score might stagnate\
    \ way before the loop in which it is computed. In other words, if we don't see\
    \ enough incremental changes anymore, why not stop the trial early? This is exactly\
    \ one of the cases Tune's schedulers are built for.\n\nHere's a quick example\
    \ of such an objective function. This is a toy example, but it will help us reason\
    \ about the optimal hyperparameters we want Tune to find much better than if we\
    \ were discussing a black-box scenario.\n\n*Example 5-8.*\n\n```\ndef objective(config):\n\
    \    for step in range(30):  ①\n        score = config[\"weight\"] * (step **\
    \ 0.5) + config[\"bias\"]\n        tune.report(score=score)  ②\n\nsearch_space\
    \ = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n```\n\n- ①\
    \ Often you may want to compute intermediate scores, e.g. in a “training loop”.\n\
    - ② You can use `tune.report` to let Tune know about these intermediate scores.\n\
    \nThe score we want to minimize here is the square root of a positive number times\
    \ a weight, plus adding a bias term. It's clear that both of these hyperparameters\
    \ need to be as small as possible to minimize the score for any positive x. Given\
    \ that the square root function “flattens out”, we might not have to compute all\
    \ 30 passes through the loop to find sufficiently good values for our two hyperparameters.\
    \ If you imagine that each score computation took an hour, stopping early can\
    \ be a huge boost to make your experiments run quicker.\n\nLet's illustrate this\
    \ idea by using the popular Hyperband algorithm as our trial scheduler. This scheduler\
    \ needs to be passed a metric and mode (again, we minimize our score). We also\
    \ make sure to run for 10 samples so as not to stop too prematurely:\n\n*Example\
    \ 5-9.*\n\n```\nfrom ray.tune.schedulers import HyperBandScheduler\n\nscheduler\
    \ = HyperBandScheduler(metric=\"score\", mode=\"min\")\n\nanalysis = tune.run(\n\
    \    objective,\n    config=search_space,\n    scheduler=scheduler,\n    num_samples=10,\n\
    )\n\nprint(analysis.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\n\
    Note that in this case we did not specify a search algorithm, which means that\
    \ Hyperband will run on parameters selected by random search. We could also have\
    \ *combined* this scheduler with another search algorithm instead. This would\
    \ have allowed us to pick better trial hyperparameters and stop bad trials early.\
    \ However, note that not every scheduler can be combined with search algorithms.\
    \ You're advised to check [Tune's scheduler compatibility matrix](https://docs.ray.io/en/latest/tune/faq.html#which-search-algorithm-scheduler-should-i-use)\
    \ for more information.\n\nTo wrap this discussion up, apart from Hyperband Tune\
    \ includes distributed implementations of early stopping algorithms such as the\
    \ Median Stopping Rule, ASHA, Population Based Training (PBT) and Population Based\
    \ Bandits (PB2).\n\n## Configuring and running Tune\n\nBefore looking into more\
    \ concrete machine learning examples using Ray Tune, let's dive into some useful\
    \ topics that help you get more out of your Tune experiments, such as properly\
    \ utilizing resources, stopping and resuming trials, adding callbacks to your\
    \ Tune runs, or defining custom and conditional search spaces.\n\n## Specifying\
    \ resources\n\nBy default, each Tune trial will run on one CPU and leverage as\
    \ many CPUs as available for concurrent trials. For instance, if you run Tune\
    \ on a laptop with 8 CPUs, any of the experiments we computed so far in this chapter\
    \ will spawn 8 concurrent trials and allocate one CPU each for each trial. Changing\
    \ this behaviour can be controlled using the `resources_per_trial` argument of\
    \ a Tune run.\n\nWhat's interesting is that this does not stop with CPUs, you\
    \ can also determine the number of GPUs used per trial. Plus, Tune allows you\
    \ to use *fractional resources*, i.e., you can share resources between trials.\
    \ So, let's say that you have a machine with 12 CPUs and two GPUs and you request\
    \ the following resources for your objective:\n\n```\nfrom ray import tune\n\n\
    tune.run(objective, num_samples=10, resources_per_trial={\"cpu\": 2, \"gpu\":\
    \ 0.5})\n```\n\nThat means Tune can schedule and execute up to four concurrent\
    \ trials on your machine, as this would max out GPU utilization on this machine\
    \ (while you'd still have 4 idle CPUs for other tasks). If you want, you can also\
    \ specify the amount of \"memory\" used by a trial by passing the number of bytes\
    \ into `resources_per_trial`. Also note that should you have the need to explicitly\
    \ *restrict* the number of concurrent trials, you can do so by passing in the\
    \ `max_concurrent_trials` parameter to your `tune.run(...)`. In the above example,\
    \ let's say you want to always keep one GPU available for other tasks, you can\
    \ limit the number of concurrent trials to two by setting `max_concurrent_trials\
    \ = 2`.\n\nNote that everything we just exemplified for resources on a single\
    \ machine naturally extends to any Ray cluster and its available resources. In\
    \ any case, Ray will always try to schedule the next trials, but will wait and\
    \ ensure enough resources are available before executing them.\n\n## Callbacks\
    \ and Metrics\n\nIf you've spent some time investigating the outputs of the Tune\
    \ runs we've started in this chapter so far, you'll have noticed that each trial\
    \ comes equipped with a lot of information by default, such as the trial ID, its\
    \ execution date, and much more. What's interesting is that Tune not only allows\
    \ you to customize the metrics you want to report, you can also hook into a `tune.run`\
    \ by providing *callbacks*. Let's compute a quick, representative example that\
    \ does both.\n\nSlightly modifying a previous example, let's say we want to log\
    \ a specific message whenever a trial returns a result. To do so, all you need\
    \ to do is implement the `on_trial_result` method on a Callback object from the\
    \ `ray.tune` package. Here's how that would look like for an objective function\
    \ that reports a score:\n\n*Example 5-10.*\n\n```\nfrom ray import tune\nfrom\
    \ ray.tune import Callback\nfrom ray.tune.logger import pretty_print\n\nclass\
    \ PrintResultCallback(Callback):\n    def on_trial_result(self, iteration, trials,\
    \ trial, result, **info):\n        print(f\"Trial {trial} in iteration {iteration},\
    \ got result: {result['score']}\")\n```\n\n```\ndef objective(config):\n    for\
    \ step in range(30):\n        score = config[\"weight\"] * (step ** 0.5) + config[\"\
    bias\"]\n        tune.report(score=score, step=step, more_metrics={})\n```\n\n\
    Note that, apart from the score, we also report step and more_metrics to Tune.\
    \ In fact, you could expose any other metric you'd like to track there, and Tune\
    \ would add it to its trial metrics. Here's how you'd run a Tune experiment with\
    \ our custom callback, and print the custom metrics we just defined:\n\n*Example\
    \ 5-11.*\n\n```\nsearch_space = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0,\
    \ 1)}\n\nanalysis = tune.run(\n    objective,\n    config=search_space,\n    mode=\"\
    min\",\n    metric=\"score\",\n    callbacks=[PrintResultCallback()])\n\nbest\
    \ = analysis.best_trial\nprint(pretty_print(best.last_result))\n```\n\nRunning\
    \ this code will result in the following outputs (additional to what you'll see\
    \ in any other Tune run). Note that we need to specify mode and metric explicitly\
    \ here, so that Tune knows what we mean by best_result. First, you should see\
    \ the output of our callback, while the trials are running:\n\n```\n...\nTrial\
    \ objective_85955_00000 in iteration 57, got result: 1.5379782083952644\nTrial\
    \ objective_85955_00000 in iteration 58, got result: 1.5539087627537493\nTrial\
    \ objective_85955_00000 in iteration 59, got result: 1.569535794562848\nTrial\
    \ objective_85955_00000 in iteration 60, got result: 1.5848760187255326\nTrial\
    \ objective_85955_00000 in iteration 61, got result: 1.5999446700996236\n...\n\
    ```\n\nThen, at the very end of the program, we print the metrics of the best\
    \ available trial, which includes the three custom metrics we defined. The following\
    \ output omits some default metrics to make it more readable. We recommend that\
    \ you run an example like this on your own, in particular to get used to reading\
    \ the outputs of Tune trials (which can be a bit overwhelming due to their concurrent\
    \ nature).\n\n```\nResult logdir: /Users/maxpumperla/ray_results/objective_2022-05-23_15-52-01\n\
    ...\ndone: true\nexperiment_id: ea5d89c2018f483183a005a1b5d47302\n```"
  mdcn: "以及是应该最小化还是优化这个指标。正如我们之前所论证的，我们希望实现一个“最小”“分数”。\n\n## 调度器\n\n接下来，我们讨论如何在 Tune\
    \ 中使用*试验调度器*来使你的运行更高效。我们也将利用这一节介绍一种在目标函数中向 Tune 报告指标的略有不同的方式。\n\n那么，假设我们不是像本章到目前为止的所有示例那样直接计算分数，而是在一个循环中计算一个*中间分数*。这种情况在监督式机器学习场景中经常出现，当训练一个模型进行多次迭代时（我们将在本章后面看到具体的应用）。如果选择了好的超参数组合，这个中间分数可能在计算它的循环结束之前就停滞不前了。换句话说，如果我们不再看到足够的增量变化，为什么不提前停止试验呢？这正是\
    \ Tune 调度器旨在解决的情况之一。\n\n这是一个此类目标函数的快速示例。这是一个简单的例子，但它将帮助我们比讨论黑盒场景更好地推理我们希望 Tune\
    \ 找到的最佳超参数。\n\n*示例 5-8.*\n\n```\ndef objective(config):\n    for step in range(30):\
    \  ①\n        score = config[\"weight\"] * (step ** 0.5) + config[\"bias\"]\n\
    \        tune.report(score=score)  ②\n\nsearch_space = {\"weight\": tune.uniform(0,\
    \ 1), \"bias\": tune.uniform(0, 1)}\n```\n\n- ① 你可能经常想要计算中间分数，例如在“训练循环”中。\n- ②\
    \ 你可以使用 `tune.report` 让 Tune 知道这些中间分数。\n\n我们这里想要最小化的分数是一个正数的平方根乘以一个权重，再加上一个偏置项。很明显，为了最小化任何正数\
    \ x 的分数，这两个超参数都需要尽可能小。考虑到平方根函数会“趋于平缓”，我们可能不必计算所有 30 次循环就能为我们的两个超参数找到足够好的值。如果你想象每次分数计算需要一个小时，提前停止可以极大地加快你的实验运行速度。\n\
    \n让我们通过使用流行的 Hyperband 算法作为我们的试验调度器来说明这个想法。这个调度器需要传入一个指标和模式（同样，我们最小化我们的分数）。我们还确保运行\
    \ 10 个样本，以免过早停止：\n\n*示例 5-9.*\n\n```\nfrom ray.tune.schedulers import HyperBandScheduler\n\
    \nscheduler = HyperBandScheduler(metric=\"score\", mode=\"min\")\n\nanalysis =\
    \ tune.run(\n    objective,\n    config=search_space,\n    scheduler=scheduler,\n\
    \    num_samples=10,\n)\n\nprint(analysis.get_best_config(metric=\"score\", mode=\"\
    min\"))\n```\n\n请注意，在这种情况下，我们没有指定搜索算法，这意味着 Hyperband 将在随机搜索选择的参数上运行。我们也可以将此调度器与另一种搜索算法*结合*使用。这将允许我们选择更好的试验超参数并提前停止不良试验。然而，请注意，并非每个调度器都可以与搜索算法结合使用。建议你查看\
    \ [Tune 的调度器兼容性矩阵](https://docs.ray.io/en/latest/tune/faq.html#which-search-algorithm-scheduler-should-i-use)\
    \ 以获取更多信息。\n\n总结一下这个讨论，除了 Hyperband，Tune 还包括分布式实现的早停算法，例如中位数停止规则、ASHA、基于种群的训练（PBT）和基于种群的强盗算法（PB2）。\n\
    \n## 配置和运行 Tune\n\n在深入研究使用 Ray Tune 的更具体的机器学习示例之前，让我们先探讨一些有用的主题，这些主题可以帮助你从 Tune\
    \ 实验中获得更多收益，例如正确利用资源、停止和恢复试验、向你的 Tune 运行添加回调，或定义自定义和条件搜索空间。\n\n## 指定资源\n\n默认情况下，每个\
    \ Tune 试验将在一个 CPU 上运行，并利用尽可能多的可用 CPU 进行并发试验。例如，如果你在具有 8 个 CPU 的笔记本电脑上运行 Tune，本章到目前为止我们计算的任何实验都将生成\
    \ 8 个并发试验，并为每个试验分配一个 CPU。可以使用 Tune 运行的 `resources_per_trial` 参数来控制这种行为。\n\n有趣的是，这不仅限于\
    \ CPU，你还可以确定每个试验使用的 GPU 数量。此外，Tune 允许你使用*分数资源*，即你可以在试验之间共享资源。那么，假设你有一台具有 12 个\
    \ CPU 和两个 GPU 的机器，并且你为你的目标请求以下资源：\n\n```\nfrom ray import tune\n\ntune.run(objective,\
    \ num_samples=10, resources_per_trial={\"cpu\": 2, \"gpu\": 0.5})\n```\n\n这意味着\
    \ Tune 可以在你的机器上调度和执行最多四个并发试验，因为这将使该机器上的 GPU 利用率达到最大（同时你仍然有 4 个空闲的 CPU 用于其他任务）。如果你愿意，你也可以通过将字节数传递给\
    \ `resources_per_trial` 来指定一个试验使用的“内存量”。另请注意，如果你需要明确*限制*并发试验的数量，你可以通过将 `max_concurrent_trials`\
    \ 参数传递给你的 `tune.run(...)` 来实现。在上面的例子中，假设你希望始终保留一个 GPU 用于其他任务，你可以通过设置 `max_concurrent_trials\
    \ = 2` 将并发试验的数量限制为两个。\n\n请注意，我们刚刚在单机资源方面举例说明的所有内容自然地扩展到任何 Ray 集群及其可用资源。无论如何，Ray\
    \ 总是会尝试调度下一个试验，但会等待并确保有足够的资源可用，然后再执行它们。\n\n## 回调和指标\n\n如果你花了一些时间研究本章到目前为止我们启动的\
    \ Tune 运行的输出，你会注意到每个试验默认都附带了大量信息，例如试验 ID、执行日期等等。有趣的是，Tune 不仅允许你自定义要报告的指标，你还可以通过提供*回调*来接入\
    \ `tune.run`。让我们计算一个快速、有代表性的示例，同时做到这两点。\n\n稍微修改一下之前的例子，假设我们希望在每次试验返回结果时记录一条特定的消息。为此，你需要做的就是在\
    \ `ray.tune` 包中的一个 Callback 对象上实现 `on_trial_result` 方法。对于一个报告分数的目标函数，它看起来会是这样：\n\
    \n*示例 5-10.*\n\n```\nfrom ray import tune\nfrom ray.tune import Callback\nfrom\
    \ ray.tune.logger import pretty_print\n\nclass PrintResultCallback(Callback):\n\
    \    def on_trial_result(self, iteration, trials, trial, result, **info):\n  \
    \      print(f\"Trial {trial} in iteration {iteration}, got result: {result['score']}\"\
    )\n```\n\n```\ndef objective(config):\n    for step in range(30):\n        score\
    \ = config[\"weight\"] * (step ** 0.5) + config[\"bias\"]\n        tune.report(score=score,\
    \ step=step, more_metrics={})\n```\n\n请注意，除了分数，我们还向 Tune 报告了 step 和 more_metrics。事实上，你可以在此处暴露任何你想要跟踪的其他指标，Tune\
    \ 会将其添加到其试验指标中。以下是你如何使用我们的自定义回调运行 Tune 实验，并打印我们刚刚定义的自定义指标：\n\n*示例 5-11.*\n\n```\n\
    search_space = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n\
    \nanalysis = tune.run(\n    objective,\n    config=search_space,\n    mode=\"\
    min\",\n    metric=\"score\",\n    callbacks=[PrintResultCallback()])\n\nbest\
    \ = analysis.best_trial\nprint(pretty_print(best.last_result))\n```\n\n运行此代码将产生以下输出（除了你在任何其他\
    \ Tune 运行中看到的输出之外）。请注意，我们需要在这里明确指定 mode 和 metric，以便 Tune 知道我们所说的 best_result 是什么意思。首先，你应该看到我们回调的输出，同时试验正在运行：\n\
    \n```\n...\nTrial objective_85955_00000 in iteration 57, got result: 1.5379782083952644\n\
    Trial objective_85955_00000 in iteration 58, got result: 1.5539087627537493\n\
    Trial objective_85955_00000 in iteration 59, got result: 1.569535794562848\nTrial\
    \ objective_85955_00000 in iteration 60, got result: 1.5848760187255326\nTrial\
    \ objective_85955_00000 in iteration 61, got result: 1.5999446700996236\n...\n\
    ```\n\n然后，在程序的最后，我们打印最佳可用试验的指标，其中包括我们定义的三个自定义指标。以下输出省略了一些默认指标以使其更易读。我们建议你自己运行一个这样的示例，特别是为了习惯阅读\
    \ Tune 试验的输出（由于其并发性质，这些输出可能有点令人不知所措）。\n\n```\nResult logdir: /Users/maxpumperla/ray_results/objective_2022-05-23_15-52-01\n\

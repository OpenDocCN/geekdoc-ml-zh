- md: "## Python’s Global Interpreter Lock\n\nThe Global Interpreter Lock or GIL¹\
    \ is undoubtedly one of the most infamous features of the Python language. In\
    \ a nutshell it’s a lock that makes sure only one thread on your computer can\
    \ ever execute your Python code at a time. If you use multi-threading, the threads\
    \ need to take turns controlling the Python interpreter.\n\nThe GIL has been implemented\
    \ for good reasons. For one, it makes memory management that much easier in Python.\
    \ Another key advantage is that it makes single-threaded programs quite fast.\
    \ Programs that primarily use lots of system input and output (we say they are\
    \ I/O-bound), like reading files or databases, benefit as well. One of the major\
    \ downsides is that CPU-bound programs are essentially single-threaded. In fact,\
    \ CPU-bound tasks might even run *faster* when not using multi-threading, as the\
    \ latter incurs write-lock overheads on top of the GIL.\n\nGiven all that, the\
    \ GIL might somewhat paradoxically be one of the reasons for Python’s popularity,\
    \ if you believe [Larry Hastings](https://larryhastings.com/). Interestingly,\
    \ Hastings also led (unsuccessful) efforts to remove it in a project called *GILectomy*,\
    \ which is exactly the kind of complicated surgery that it sounds like. The jury\
    \ is still out, but [Sam Gross](https://github.com/colesbury) might just have\
    \ found a way to remove the GIL in his nogil branch of Python 3.9. For now, if\
    \ you absolutely have to work around the GIL, consider using an implementation\
    \ different from CPython. CPython is Python’s standard implementation, and if\
    \ you don’t know that you’re using it, you’re definitely using it. Implementations\
    \ like Jython, IronPython or PyPy don’t have a GIL, but come with their own drawbacks.\n\
    \n## Functions and Remote Ray Tasks\n\nIt’s reasonable to assume that such a task\
    \ can benefit from parallelization. Perfectly distributed, the runtime should\
    \ not take much longer than the longest subtask, namely 7/10 = 0.7 seconds. So,\
    \ let’s see how you can extend this example to run on Ray. To do so, you start\
    \ by using the `@ray.remote` decorator as follows:\n\n*Example 2-4.*\n\n```\n\
    @ray.remote ❶\ndef retrieve_task(item):\n    return retrieve(item) ❷\n```\n\n\
    - ❶ With just this decorator we make any Python function a Ray task.\n- ❷ All\
    \ else remains unchanged. retrieve_task just passes through to retrieve.\n\n¹\
    \ I still don’t know how to pronounce this acronym, but I get the feeling that\
    \ the same people who pronounce GIF like “giraffe” also say GIL like “guitar”.\
    \ Just pick one, or spell it out, if you feel insecure.\n\nIn this way, the function\
    \ `retrieve_task` becomes a so-called Ray task. That's an extremely convenient\
    \ design choice, as you can focus on your Python code first, and don't have to\
    \ completely change your mindset or programming paradigm to use Ray. Note that\
    \ in practice you would have simply added the `@ray.remote` decorator to your\
    \ original `retrieve` function (after all, that's the intended use of decorators),\
    \ but we didn't want to touch previous code to keep things as clear as possible.\n\
    \nEasy enough, so what do you have to change in the code that retrieves the data\
    \ and measures performance? It turns out, not much. Let's have a look at how you'd\
    \ do that:\n\n*Example 2-5. Measuring performance of your Ray task.*\n\n```\n\
    start = time.time()\ndata_references = [retrieve_task.remote(item) for item in\
    \ range(8)] ❶\ndata = ray.get(data_references) ❷\nprint_runtime(data, start, 2)\n\
    ```\n\n- ❶ To run `retrieve_task` on your local Ray cluster, you use `.remote()`\
    \ and pass in your data as before. You'll get a list of object references.\n-\
    \ ❷ To get back data, and not just Ray object references, you use `ray.get`.\n\
    \nDid you spot the differences? You have to execute your Ray task remotely using\
    \ the `remote` function. When tasks get executed remotely, even on your local\
    \ cluster, Ray does so *asynchronously*. The list items in `data_references` in\
    \ the last code snippet do not contain the results directly. In fact, if you check\
    \ the Python type of the first item with `type(data_references[0])` you'll see\
    \ that it's in fact an `ObjectRef`. These object references correspond to *futures*\
    \ which you need to ask the result of. This is what the call to `ray.get(...)`\
    \ is for.\n\nWe still want to work more on this example², but let's take a step\
    \ back here and recap what we did so far. You started with a Python function and\
    \ decorated it with `@ray.remote`. This made your function a Ray task. Then, instead\
    \ of calling the original function in your code straight-up, you called `.remote(...)`\
    \ on the Ray task. The last step was to `.get(...)` the results back from your\
    \ Ray cluster. I think this procedure is so intuitive that I'd bet you could already\
    \ create your own Ray task from another function without having to look back at\
    \ this example. Why don't you give it a try right now?\n\nComing back to our example,\
    \ by using Ray tasks, what did we gain in terms of performance? On my machine\
    \ the runtime clocks in at 0.71 seconds, which is just slightly more than the\
    \ longest subtask, which comes in at 0.7 seconds. That’s great and much better\
    \ than before, but we can further improve our program by leveraging more of Ray’s\
    \ API.\n\n## Using the object store with put and get\n\nOne thing you might have\
    \ noticed is that in the definition of retrieve we *directly* accessed items from\
    \ our database. Working on a local Ray cluster this is fine, but imagine you’re\
    \ running on an actual cluster comprising several computers. How would all those\
    \ computers access the same data? Remember from Chapter 1 that in a Ray cluster\
    \ there is one head node with a driver process (running `ray.init()`) and many\
    \ worker nodes with worker processes executing your tasks. My laptop has a total\
    \ of 8 CPU cores, so Ray will create 8 worker processes on my one-node local cluster.\
    \ Our database is currently defined on the driver only, but the workers running\
    \ your tasks need to have access to it to run the retrieve task. Luckily, Ray\
    \ provides an easy way to share data between the driver and workers (or between\
    \ workers). You can simply use put to place your data into Ray’s *distributed\
    \ object store* and then use get on the workers to retrieve it as follows.\n\n\
    *Example 2-6.*\n\n```\ndatabase_object_ref = ray.put(database) ❶\n\n@ray.remote\n\
    def retrieve_task(item):\n    obj_store_data = ray.get(database_object_ref) ❷\n\
    \    time.sleep(item / 10.)\n    return item, obj_store_data[item]\n```\n\n- ❶\
    \ put your database into the object store and receive a reference to it.\n- ❷\
    \ This allows your workers to get the data, no matter where they are located in\
    \ the cluster.\n\nBy using the object store this way, you can let Ray handle data\
    \ access across the whole cluster. We’ll talk about how exactly data is passed\
    \ between nodes and within workers when talking about Ray’s infrastructure. While\
    \ the interaction with the object store requires some overhead, Ray is really\
    \ smart about storing the data, which gives you performance gains when working\
    \ with larger, more realistic datasets. For now, the important part is that this\
    \ step is essential in a truly distributed setting. If you like, try to re-run\
    \ Example 2-5 with this new retrieve_task function and confirm that it still runs,\
    \ as expected.\n\n## Using Ray’s wait function for non-blocking calls\n\nNote\
    \ how in Example 2-5 we used `ray.get(data_references)` to access results. This\
    \ call is *blocking*, which means that our driver has to wait for all the results\
    \ to be available. That’s not a big deal in our case, the program now finishes\
    \ in under a second. But imagine processing of each data item would take several\
    \ minutes. In that case you would want to free up the driver process for other\
    \ tasks, instead of sitting idly by. Also, it would be great to process results\
    \ as they come in (some finish much quicker than others), rather than waiting\
    \ for all data to be processed. One more question to keep in mind is what happens\
    \ if one of the data items can’t be retrieved as expected? Let’s say there’s a\
    \ deadlock somewhere in the database connection. In that case, the driver will\
    \ simply hang and never retrieve all items. For that reason it’s a good idea to\
    \ work with reasonable timeouts. In our scenario, we should not wait longer than\
    \ 10 times the longest data retrieval task before stopping the task. Here’s how\
    \ you can do that with Ray by using wait:\n\n*Example 2-7.*\n\n```\nstart = time.time()\n\
    data_references = [retrieve_task.remote(item) for item in range(8)]\nall_data\
    \ = []\n\nwhile len(data_references) > 0: ①\n    finished, data_references = ray.wait(data_references,\
    \ num_returns=2, timeout=7.0) ②\n    data = ray.get(finished)\n    print_runtime(data,\
    \ start, 3) ③\n    all_data.extend(data) ④\n```\n\n- ① Instead of blocking, we\
    \ loop through unfinished data_references.\n- ② We asynchronously wait for finished\
    \ data with a reasonable timeout. data_references gets overridden here, to prevent\
    \ an infinite loop.\n- ③ We print results as they come in, namely in blocks of\
    \ two.\n- ④ Then we append new data to the all_data until finished.\n\nAs you\
    \ can see `ray.wait` returns two arguments, namely finished data and futures that\
    \ still need to be processed. We use the `num_returns` argument, which defaults\
    \ to 1, to let wait return whenever a new pair of data items is available. On\
    \ my laptop this results in the following output:\n\n```\nRuntime: 0.108 seconds,\
    \ data:\n(0, 'Learning')\n(1, 'Ray')\nRuntime: 0.308 seconds, data:\n```"
  mdcn: "## Python 的全局解释器锁\n\n全局解释器锁（GIL¹）无疑是 Python 语言中最臭名昭著的特性之一。简而言之，它是一把锁，确保你的计算机上同一时间只有一个线程能够执行\
    \ Python 代码。如果你使用多线程，这些线程需要轮流控制 Python 解释器。\n\nGIL 的存在有其充分的理由。首先，它使得 Python 中的内存管理变得简单得多。另一个关键优势是它让单线程程序运行得相当快。主要使用大量系统输入/输出（我们称之为\
    \ I/O 密集型）的程序，例如读取文件或数据库，也能从中受益。主要的缺点之一是 CPU 密集型程序本质上是单线程的。事实上，CPU 密集型任务在不使用多线程时甚至可能运行得*更快*，因为后者在\
    \ GIL 之上还会带来写锁开销。\n\n考虑到所有这些，如果你相信 [Larry Hastings](https://larryhastings.com/)\
    \ 的观点，GIL 可能有些矛盾地成为了 Python 流行的原因之一。有趣的是，Hastings 也曾领导（未成功的）努力在一个名为 *GILectomy*\
    \ 的项目中移除它，这听起来就像是一种复杂的外科手术。目前尚无定论，但 [Sam Gross](https://github.com/colesbury)\
    \ 可能已经在他的 Python 3.9 nogil 分支中找到了移除 GIL 的方法。目前，如果你绝对需要绕过 GIL，可以考虑使用 CPython 之外的其他实现。CPython\
    \ 是 Python 的标准实现，如果你不知道自己在用什么，那你肯定用的就是它。像 Jython、IronPython 或 PyPy 这样的实现没有 GIL，但它们也有各自的缺点。\n\
    \n## 函数与远程 Ray 任务\n\n可以合理地假设，这样的任务可以从并行化中受益。如果完美地进行分布式处理，运行时间不应比最长的子任务长太多，即 7/10\
    \ = 0.7 秒。那么，让我们看看如何将这个示例扩展到在 Ray 上运行。为此，你首先需要使用 `@ray.remote` 装饰器，如下所示：\n\n*示例\
    \ 2-4.*\n\n```\n@ray.remote ❶\ndef retrieve_task(item):\n    return retrieve(item)\
    \ ❷\n```\n\n- ❶ 仅通过这个装饰器，我们就将任何 Python 函数变成了一个 Ray 任务。\n- ❷ 其他一切保持不变。retrieve_task\
    \ 只是直接调用 retrieve。\n\n¹ 我仍然不知道这个缩写词怎么发音，但我感觉那些把 GIF 读成“长颈鹿”的人，也会把 GIL 读成“吉他”。如果你不确定，就选一个读法，或者直接拼出来。\n\
    \n通过这种方式，函数 `retrieve_task` 就变成了一个所谓的 Ray 任务。这是一个极其方便的设计选择，因为你可以先专注于你的 Python\
    \ 代码，而无需完全改变你的思维方式或编程范式来使用 Ray。注意，在实践中，你本可以直接在原始的 `retrieve` 函数上添加 `@ray.remote`\
    \ 装饰器（毕竟，这就是装饰器的预期用途），但我们不想修改之前的代码，以尽可能保持清晰。\n\n这很简单，那么你需要在检索数据和测量性能的代码中改变什么呢？事实证明，改变不多。让我们看看你会怎么做：\n\
    \n*示例 2-5. 测量你的 Ray 任务的性能。*\n\n```\nstart = time.time()\ndata_references = [retrieve_task.remote(item)\
    \ for item in range(8)] ❶\ndata = ray.get(data_references) ❷\nprint_runtime(data,\
    \ start, 2)\n```\n\n- ❶ 要在本地 Ray 集群上运行 `retrieve_task`，你需要使用 `.remote()` 并像以前一样传入数据。你会得到一个对象引用列表。\n\
    - ❷ 要获取回数据，而不仅仅是 Ray 对象引用，你需要使用 `ray.get`。\n\n你发现区别了吗？你必须使用 `remote` 函数远程执行你的\
    \ Ray 任务。当任务被远程执行时，即使是在你的本地集群上，Ray 也是*异步*执行的。上一个代码片段中 `data_references` 的列表项并不直接包含结果。事实上，如果你用\
    \ `type(data_references[0])` 检查第一个项目的 Python 类型，你会看到它实际上是一个 `ObjectRef`。这些对象引用对应于*未来对象*，你需要向它们请求结果。这就是调用\
    \ `ray.get(...)` 的目的。\n\n我们仍然想在这个例子²上做更多工作，但让我们退一步，回顾一下我们到目前为止做了什么。你从一个 Python\
    \ 函数开始，并用 `@ray.remote` 装饰它。这使你的函数成为一个 Ray 任务。然后，你没有在代码中直接调用原始函数，而是在 Ray 任务上调用了\
    \ `.remote(...)`。最后一步是从你的 Ray 集群中 `.get(...)` 结果。我认为这个过程非常直观，我敢打赌你已经可以从另一个函数创建自己的\
    \ Ray 任务，而无需回顾这个例子。为什么不现在就试试呢？\n\n回到我们的例子，通过使用 Ray 任务，我们在性能方面获得了什么？在我的机器上，运行时间约为\
    \ 0.71 秒，仅比最长的子任务（0.7 秒）稍长一点。这很棒，比以前好得多，但我们可以通过利用更多 Ray 的 API 来进一步改进我们的程序。\n\n\
    ## 使用 put 和 get 操作对象存储\n\n你可能注意到的一件事是，在 retrieve 的定义中，我们*直接*从数据库中访问项目。在本地 Ray\
    \ 集群上这样做没问题，但想象一下你在一个由多台计算机组成的实际集群上运行。所有这些计算机如何访问相同的数据？回想一下第 1 章，在 Ray 集群中，有一个头节点运行着驱动程序进程（执行\
    \ `ray.init()`），以及许多工作节点运行着执行你任务的工作进程。我的笔记本电脑总共有 8 个 CPU 核心，所以 Ray 会在我的单节点本地集群上创建\
    \ 8 个工作进程。我们的数据库目前仅在驱动程序上定义，但运行你任务的工作进程需要访问它才能运行 retrieve 任务。幸运的是，Ray 提供了一种简单的方法在驱动程序和工作进程之间（或在工作进程之间）共享数据。你可以简单地使用\
    \ put 将你的数据放入 Ray 的*分布式对象存储*中，然后在工作进程上使用 get 来检索它，如下所示。\n\n*示例 2-6.*\n\n```\n\
    database_object_ref = ray.put(database) ❶\n\n@ray.remote\ndef retrieve_task(item):\n\
    \    obj_store_data = ray.get(database_object_ref) ❷\n    time.sleep(item / 10.)\n\
    \    return item, obj_store_data[item]\n```\n\n- ❶ 将你的数据库放入对象存储并接收一个引用。\n- ❷ 这允许你的工作进程获取数据，无论它们在集群中的哪个位置。\n\
    \n通过这种方式使用对象存储，你可以让 Ray 处理整个集群的数据访问。我们将在讨论 Ray 的基础设施时，详细说明数据如何在节点之间以及工作进程内部传递。虽然与对象存储的交互需要一些开销，但\
    \ Ray 在存储数据方面非常智能，这在处理更大、更真实的数据集时能为你带来性能提升。目前，重要的是这一步在真正的分布式环境中是必不可少的。如果你愿意，可以尝试用这个新的\
    \ retrieve_task 函数重新运行示例 2-5，并确认它仍然按预期运行。\n\n## 使用 Ray 的 wait 函数进行非阻塞调用\n\n注意在示例\
    \ 2-5 中，我们使用了 `ray.get(data_references)` 来访问结果。这个调用是*阻塞*的，这意味着我们的驱动程序必须等待所有结果都可用。在我们的情况下这没什么大不了的，程序现在不到一秒就完成了。但想象一下，处理每个数据项需要几分钟。在这种情况下，你会希望释放驱动程序进程以执行其他任务，而不是无所事事地坐着。此外，如果能在结果产生时就处理它们（有些完成得比其他快得多），而不是等待所有数据处理完毕，那就更好了。还有一个需要记住的问题是，如果某个数据项无法按预期检索到会发生什么？假设数据库连接中某处出现了死锁。那样的话，驱动程序就会挂起，永远无法检索所有项目。因此，使用合理的超时时间是个好主意。在我们的场景中，我们不应该等待超过最长数据检索任务\
    \ 10 倍的时间才停止任务。以下是你可以如何使用 Ray 的 wait 来做到这一点：\n\n*示例 2-7.*\n\n```\nstart = time.time()\n\
    data_references = [retrieve_task.remote(item) for item in range(8)]\nall_data\
    \ = []\n\nwhile len(data_references) > 0: ①\n    finished, data_references = ray.wait(data_references,\
    \ num_returns=2, timeout=7.0) ②\n    data = ray.get(finished)\n    print_runtime(data,\
    \ start, 3) ③\n    all_data.extend(data) ④\n```\n\n- ① 我们没有阻塞，而是循环处理未完成的 data_references。\n\
    - ② 我们异步等待完成的数据，并设置合理的超时时间。这里 data_references 被覆盖，以防止无限循环。\n- ③ 我们在结果产生时就打印它们，即每两个一组。\n\
    - ④ 然后我们将新数据追加到 all_data 中，直到完成。\n\n如你所见，`ray.wait` 返回两个参数，即已完成的数据和仍需处理的未来对象。我们使用\
    \ `num_returns` 参数（默认为 1），让 wait 在每对新数据项可用时返回。在我的笔记本电脑上，这会产生以下输出：\n\n```\nRuntime:\
    \ 0.108 seconds, data:\n(0, 'Learning')\n(1, 'Ray')\nRuntime: 0.308 seconds, data:\n\
    ```"

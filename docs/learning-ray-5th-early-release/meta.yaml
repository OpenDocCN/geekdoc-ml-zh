  md: "method that computes experiences for a full game and returns them. Here's what\
    \ the implementation of the Simulation class looks like:\n\nExample 3-8.\n\n```\n\
    class Simulation(object):\n    def __init__(self, env):\n        \"\"\"Simulates\
    \ rollouts of an environment, given a policy to follow.\"\"\"\n        self.env\
    \ = env\n\n    def rollout(self, policy, render=False, explore=True, epsilon=0.1):\
    \ ❶\n        \"\"\"Returns experiences for a policy rollout.\"\"\"\n        experiences\
    \ = []\n        state = self.env.reset() ❷\n        done = False\n        while\
    \ not done:\n            action = policy.get_action(state, explore, epsilon) ❸\n\
    \            next_state, reward, done, info = self.env.step(action) ❹\n      \
    \      experiences.append([state, action, reward, next_state]) ❺\n           \
    \ state = next_state\n            if render: ❻\n                time.sleep(0.05)\n\
    \                self.env.render()\n\n        return experiences\n```\n\n+   ❶\
    \ We compute a game “roll-out” by following the actions of a policy, and we can\
    \ optionally render the simulation.\n❷ To be sure, we reset the environment before\

    \ device):\n    num_batches = 0\n    model.eval()\n    loss = 0\n    with torch.no_grad():\n\
    \        for X, y in iterable_dataset:\n            X = X.to(device)\n       \
    \     y = y.to(device)\n            num_batches += 1\n            pred = torch.round(model(X.float()))\n\
    \            loss += loss_fn(pred, y).item()\n    loss /= num_batches\n    result\
    \ = {\"loss\": loss}\n    return result\n```\n\n最后，我们定义核心训练逻辑。这将接收各种配置选项（如批大小和其他模型超参数），实例化模型、损失函数和优化器，然后运行核心训练循环。在每个\
    \ epoch 中，每个 worker 将获取其训练和验证数据集的分片，将其转换为本地 PyTorch Dataset，并运行我们上面定义的验证和训练代码。每个\
    \ epoch 后，worker 将使用 Ray Train 工具报告结果并保存当前模型权重以供稍后使用。\n\n### 示例 7-24。\n\n```python\n\
    def train_func(config):\n    batch_size = config.get(\"batch_size\", 32)\n   \
    \ lr = config.get(\"lr\", 1e-2)\n    epochs = config.get(\"epochs\", 3)\n\n  \
    \  train_dataset_pipeline_shard = train.get_dataset_shard(\"train\")\n    validation_dataset_pipeline_shard\
    \ = train.get_dataset_shard(\"validation\")\n\n    model = train.torch.prepare_model(FarePredictor())\n\
    \n    loss_fn = nn.SmoothL1Loss()\n    optimizer = torch.optim.Adam(model.parameters(),\
    \ lr=lr)\n\n    train_dataset_iterator = train_dataset_pipeline_shard.iter_epochs()\n\
    \    validation_dataset_iterator = \\\n        validation_dataset_pipeline_shard.iter_epochs()\n\
    \n    for epoch in range(epochs):\n        train_dataset = next(train_dataset_iterator)\n\
    \        validation_dataset = next(validation_dataset_iterator)\n\n        train_torch_dataset\
    \ = train_dataset.to_torch(\n            label_column=LABEL_COLUMN,\n        \
    \    batch_size=batch_size,\n        )\n        validation_torch_dataset = validation_dataset.to_torch(\n\
    \            label_column=LABEL_COLUMN,\n            batch_size=batch_size)\n\n\
    \        device = train.torch.get_device()\n\n        train_epoch(train_torch_dataset,\
    \ model, loss_fn, optimizer, device)\n        result = validate_epoch(validation_torch_dataset,\
    \ model, loss_fn,\n                               device)\n\n        train.report(**result)\n\
    \        train.save_checkpoint(epoch=epoch, model_weights=model.module.state_dict())\n\
    ```\n\n现在完整的训练过程已经定义好了，我们需要加载训练和验证数据来馈送到我们的训练 worker 中。在这里，我们调用之前定义的 `load_dataset`\
    \ 函数，该函数将进行预处理和特征化，然后将数据集拆分为训练和验证 Dataset¹。最后，我们希望将两个 Dataset 都转换为 Dataset Pipeline\
    \ 以提高效率，并确保训练数据集在每个 epoch 中在所有 worker 之间全局随机打乱。\n\n### 示例 7-25。\n\n```python\n\
    def get_training_datasets(*, test_pct=0.8):\n    ds = load_dataset(\"nyc_tlc_data/yellow_tripdata_2020-01.csv\"\
    )\n    ds, _ = ds.split_at_indices([int(0.01 * ds.count())])\n    train_ds, test_ds\
    \ = ds.split_at_indices([int(test_pct * ds.count())])\n    train_ds_pipeline =\
    \ train_ds.repeat().random_shuffle_each_window()\n    test_ds_pipeline = test_ds.repeat()\n\
    \    return {\"train\": train_ds_pipeline, \"validation\": test_ds_pipeline}\n\
    ```\n\n一切就绪，是时候运行我们的分布式训练过程了！剩下的就是创建一个 Trainer，传入我们的 Dataset，并让训练扩展并在配置的 worker\
    \ 数量上运行。训练完成后，我们使用 checkpoint API 获取最新的模型权重。\n\n### 示例 7-26。\n\n```python\ntrainer\
    \ = train.Trainer(\"torch\", num_workers=4)\nconfig = {\"lr\": 1e-2, \"epochs\"\
    : 3, \"batch_size\": 64}\ntrainer.start()\ntrainer.run(train_func, config, dataset=get_training_datasets())\n\
    model_weights = trainer.latest_checkpoint.get(\"model_weights\")\ntrainer.shutdown()\n\
    ```\n\n## 使用 Ray Dataset 进行分布式批量推理\n\n一旦我们训练了一个模型并获得了我们能达到的最佳准确度，下一步就是在实践中应用它。有时这意味着驱动一个低延迟服务，我们将在\
    \ ??? 中探讨，但通常任务是将模型应用于传入的批量数据。\n\n让我们使用上面训练过程中的训练模型权重，并将它们应用于一批新数据（在这种情况下，它只是同一公共数据集的另一部分\n\
    \n¹ 该代码仅加载了数据的一个子集用于测试。要进行大规模测试，请在调用 `load_dataset` 时使用所有数据分区，并在训练模型时增加 `num_workers`。"

    # Ray as Distributed Interface


    One aspect of Ray that’s vastly understated in my eyes is that its libraries seamlessly
    integrate common tools as *backends*. Ray often creates common interfaces, instead
    of trying to create new standards⁸. These interfaces allow you to run tasks in
    a distributed fashion, a property most of the respective backends don’t have,
    or not to the same extent. For instance, Ray RLlib and Train are backed by the
    full power of TensorFlow and PyTorch. Ray Tune supports algorithms from practically
    every notable HPO tool available, including Hyperopt, Optuna, Nevergrad, Ax, SigOpt
    and many others. None of these tools are distributed by default, but Tune unifies
    them in a common interface. Ray Serve can be used with frameworks such as FastAPI,
    and Ray Data is backed by Arrow and comes with many integrations to other frameworks,
    such as Spark and Dask. Overall this seems to be a robust design pattern that
    can be used to extend current Ray projects or integrate new backends in the future.


    # Summary


    To sum up what we’ve discussed in this chapter, Figure 1-4 gives you an overview
    of the three layers of Ray as we laid them out. Ray’s core distributed execution
    engine sits at the center of the framework. For practical data science workflows
    you can use Ray Data for data processing, Ray RLlib for reinforcement learning,
    Ray Train for distributed model training, Ray Tune for hyperparameter tuning and
    Ray Serve for model serving. You’ve seen examples for each of these libraries
    and have an idea of what their APIs entail. On top of that, Ray’s ecosystem has
    many extensions that we’ll look more into later on. Maybe you can already spot
    a few tools you know and like in Figure 1-4⁹?


    8 Before the deep learning framework Keras became an official part of a corporate
    flagship, it started out as a convenient API specification for various lower-level
    frameworks such as Theano, CNTK, or TensorFlow. In that sense Ray RLlib has the
    chance to become Keras for RL. Ray Tune might just be Keras for HPO. The missing
    piece for more adoption is probably a more elegant API for both.


    9 Note that “Ray Train” has been called “raysgd” in older versions of Ray, and
    does not have a new logo yet.'

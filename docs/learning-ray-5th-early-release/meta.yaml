- md: "## Working With RLlib Environments\n\nSo far we've only introduced you to gym\
    \ environments, but RLlib supports a wide variety of environments. After giving\
    \ you a quick overview of all available options, we'll show you two concrete examples\
    \ of advanced RLlib environments in action.\n\n## An Overview of RLlib Environments\n\
    \nAll available RLlib Environments extend a common BaseEnv class. If you want\
    \ to work with several copies of the same gym.Env environment, you can use RLlib's\
    \ VectorEnv wrapper. Vectorized environments are useful, but also straightforward\
    \ generalizations of what you've seen already. The two other types of environments\
    \ available in RLlib are more interesting and deserve more attention.\n\nThe first\
    \ is called MultiAgentEnv, which allows you to train a model with multiple agents.\
    \ Working with multiple agents can be tricky, because you have to take care of\
    \ defining your agents within your environment with a suitable interface and account\
    \ for the fact that each agent might have a completely different way of interacting\
    \ with its environment. What's more is that agents might interact with each other,\
    \ and have to respect each other's actions. In more advanced setting there might\
    \ even be a hierarchy of agents, which explicitly depend on each other. In short,\
    \ running multi-agent RL experiments is difficult, and we'll see how RLlib handles\
    \ this in the next example.\n\nThe other type of environment we will look at is\
    \ called ExternalEnv, which can be used to connect external simulators to RLlib.\
    \ For instance, imagine our simple maze problem from earlier was a simulation\
    \ of an actual robot navigating a maze. It might not be suitable in such scenarios\
    \ to co-locate the robot (or its simulation, implemented in a different software\
    \ stack) with RLlib's learning agents. To account for that, RLlib provides you\
    \ with a simple client-server architecture for communicating with external simulators,\
    \ which allows communication over a REST API.\n\nIn figure Figure 4-1 we summarize\
    \ all available RLlib environments for you:\n\n![](img/58c832795222840423ffeca1357b40a7_85_0.png)\n\
    \nFigure 4-1. An overview of all available RLlib environments\n\n## Working with\
    \ Multiple Agents\n\nThe basic idea of defining multi-agent environments in RLlib\
    \ is simple. Whatever you define as a single value in a gym environment, you now\
    \ define as a dictionary with values for each agent, and each agent has its unique\
    \ key. Of course, the details are a little more complicated than that in practice.\
    \ But once you have defined an environment hosting several agents, what’s necessary\
    \ is to define how these agents should learn.\n\nIn a single-agent environment\
    \ there’s one agent and one policy to learn. In a multi-agent environment there\
    \ are multiple agents that might map to one or several policies. For instance,\
    \ if you have a group of homogenous agents in your environment, then you could\
    \ define a single policy for all of them. If they all *act* the same way, then\
    \ their behavior can be learnt the same way. In contrast, you might have situations\
    \ with heterogeneous agents in which each of them has to learn a separate policy.\
    \ Between these two extremes, there’s a spectrum of possibilities displayed in\
    \ figure Figure 4-2:\n\n![](img/58c832795222840423ffeca1357b40a7_86_0.png)\n\n\
    Figure 4-2. Mapping agents to policies in multi-agent reinforcement learning problems\n\
    \nWe continue to use our maze game as a running example for this chapter. This\
    \ way you can check for yourself how the interfaces differ in practice. So, to\
    \ put the ideas we just outlined into code, let's define a multi-agent version\
    \ of the GymEnvironment class. Our MultiAgentEnv class will have precisely two\
    \ agents, which we encode in a Python dictionary called agents, but in principle\
    \ this works with any number of agents. We start by initializing and resetting\
    \ our new environment:\n\n```python\nfrom ray.rllib.env.multi_agent_env import\
    \ MultiAgentEnv\nfrom gym.spaces import Discrete\nimport os\n```\n\n```python\n\
    class MultiAgentMaze(MultiAgentEnv):\n\n    agents = {1: (4, 0), 2: (0, 4)} ①\n\
    \    goal = (4, 4)\n    info = {1: {'obs': agents[1]}, 2: {'obs': agents[2]}}\
    \ ②\n\n    def __init__(self, *args, **kwargs): ③\n        self.action_space =\
    \ Discrete(4)\n        self.observation_space = Discrete(5*5)\n\n    def reset(self):\n\
    \        self.agents = {1: (4, 0), 2: (0, 4)}\n        return {1: self.get_observation(1),\
    \ 2: self.get_observation(2)}\n```\n\n① We now have two seekers with (0, 4) and\
    \ (4, 0) starting positions in an agents dictionary.\n\n② For the info object\
    \ we're using agent IDs as keys.\n\n③ Action and observation spaces stay exactly\
    \ the same as before.\n\n④ Observations are now per-agent dictionaries.\n\nNotice\
    \ that compared to the single-agent situation we had to modify neither action\
    \ nor observation spaces, since we're using two essentially identical agents here\
    \ that can use the same spaces. In more complex situations you'd have to account\
    \ for the fact that the actions and observations might look different for some\
    \ agents.\n\nTo continue, let's generalize our helper methods get_observation,\
    \ get_reward, and is_done to work with multiple agents. We do this by passing\
    \ in an agent_id to their signatures and handling each agent the same way as before.\n\
    \n```python\ndef get_observation(self, agent_id):\n    seeker = self.agents[agent_id]\n\
    \    return 5 * seeker[0] + seeker[1]\n\ndef get_reward(self, agent_id):\n   \
    \ return 1 if self.agents[agent_id] == self.goal else 0\n\ndef is_done(self, agent_id):\n\
    \    return self.agents[agent_id] == self.goal\n```\n\n① Getting a specific agent\
    \ from its ID.\n\n② Redefining each helper method to work per-agent.\n\nNext,\
    \ to port the step method to our multi-agent setup, you have to know that MultiAgentEnv\
    \ now expects the action passed to a step to be a dictionary with keys corresponding\
    \ to the agent IDs, too. We define a step by looping through all available agents\
    \ and acting on their behalf.\n\n```python\ndef step(self, action):\n    agent_ids\
    \ = action.keys()\n\n    for agent_id in agent_ids:\n        seeker = self.agents[agent_id]\n\
    \        if action[agent_id] == 0:  # move down\n            seeker = (min(seeker[0]\
    \ + 1, 4), seeker[1])\n        elif action[agent_id] == 1:  # move left\n    \
    \        seeker = (seeker[0], max(seeker[1] - 1, 0))\n        elif action[agent_id]\
    \ == 2:  # move up\n            seeker = (max(seeker[0] - 1, 0), seeker[1])\n\
    \        elif action[agent_id] == 3:  # move right\n            seeker = (seeker[0],\
    \ min(seeker[1] + 1, 4))\n        else:\n            raise ValueError(\"Invalid\
    \ action\")\n        self.agents[agent_id] = seeker ②\n\n    observations = {i:\
    \ self.get_observation(i) for i in agent_ids} ③\n    rewards = {i: self.get_reward(i)\
    \ for i in agent_ids}\n    done = {i: self.is_done(i) for i in agent_ids}\n\n\
    \    done[\"__all__\"] = all(done.values()) ④\n\n    return observations, rewards,\
    \ done, self.info\n```\n\n① Actions in a step are now per-agent dictionaries.\n\
    \n② After applying the correct action for each seeker, we set the correct states\
    \ of all agents.\n\n③ observations, rewards, and dones are also dictionaries with\
    \ agent IDs as keys.\n\n④ Additionally, RLlib needs to know when all agents are\
    \ done.\n\nNote how this can lead to issues like deciding which agent gets to\
    \ act first. In our simple maze problem the order of actions is irrelevant, but\
    \ in more complex scenarios this becomes a crucial part of modeling the RL problem\

    \   policy.state_action_table[state][action] = new_value ⑤\n```\n\n+   1. We loop\
    \ through all experiences in order.\n2. Then we choose the maximum value among\
    \ all possible actions in the next state.\n3. We then extract the current state-action\
    \ value."

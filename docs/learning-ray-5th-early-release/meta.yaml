    \nEarly Release\nRaw & Unedited\nCompliments of\nanyscale\n\nMax Pumperla,\nEdward\
    \ Oakes\n& Richard Liaw\n\n# Learning Ray\n\nFlexible Distributed Python for Data\
    \ Science\n\n> With Early Release ebooks, you get books in their earliest form—the\
    \ author’s raw and unedited content as they write—so you can take advantage of\
    \ these technologies long before the official release of these titles.\n\nMax\
    \ Pumperla, Edward Oakes, and Richard Liaw\n\n# Learning Ray\n\nby Max Pumperla,\
    \ Edward Oakes, and Richard Liaw\n\nCopyright © 2023 Max Pumperla and O’Reilly\
    \ Media inc. All rights reserved.\n\nPrinted in the United States of America.\n\
    \nPublished by O’Reilly Media, Inc., 1005 Gravenstein Highway North, Sebastopol,\
    \ CA 95472.\n\nO’Reilly books may be purchased for educational, business, or sales\
    \ promotional use. Online editions are also available for most titles ( http://oreilly.com\
    \ ). For more information, contact our corporate/institutional sales department:\
    \ 800-998-9938 or corporate@oreilly.com .\n\n**Editors:** Jeff Bleiel and Jessica\
    \ Haberman\n**Production Editor:** Katherine Tozer\n**Interior Designer:** David\
    \ Futato\n\n**Cover Designer:** Karen Montgomery\n**Illustrator:** Kate Dullea\n\
    \nApril 2023: First Edition\n\n# Revision History for the Early Release\n\n- 2022-01-21:\
    \ First Release\n- 2022-03-11: Second Release\n- 2022-04-21: Third Release\n-\
    \ 2022-06-06: Fourth Release\n- 2022-07-13: Fifth Release\n\nSee http://oreilly.com/catalog/errata.csp?isbn=9781098117221\
    \ for release details.\n\nThe O’Reilly logo is a registered trademark of O’Reilly\
    \ Media, Inc. *Learning Ray*, the cover image, and related trade dress are trademarks\
    \ of O’Reilly Media, Inc.\n\nThe views expressed in this work are those of the\
    \ authors, and do not represent the publisher’s views. While the publisher and\
    \ the authors have used good faith efforts to ensure that the information and\
    \ instructions contained in this work are accurate, the publisher and the authors\
    \ disclaim all responsibility for errors or omissions, including without limitation\
    \ responsibility for damages resulting from the use of or reliance on this work.\
    \ Use of the information and instructions contained in this work is at your own\
    \ risk. If any code samples or other technology this work contains or describes\
    \ is subject to open source licenses or the intellectual property rights of others,\
    \ it is your responsibility to ensure that your use thereof complies with such\
    \ licenses and/or rights.\n\nThis work is part of a collaboration between O’Reilly\
    \ and Anyscale. See our statement of editorial independence.\n\n978-1-098-11716-0\n\
    \n# Table of Contents\n\n1. An Overview of Ray\n   What Is Ray?\n   What Led to\
    \ Ray?\n      Flexible Workloads in Python and Reinforcement Learning\n      Three\
    \ Layers: Core, Libraries and Ecosystem\n   A Distributed Computing Framework\n\
    \   A Suite of Data Science Libraries\n      Machine Learning and the Data Science\
    \ Workflow\n      Data Processing with Ray Data\n      Model Training\n      Hyperparameter\
    \ Tuning\n      Model Serving\n   A Growing Ecosystem\n      How Ray Integrates\
    \ and Extends\n      Ray as Distributed Interface\n   Summary\n2. Getting Started\
    \ With Ray Core\n   An Introduction To Ray Core\n      A First Example Using the\
    \ Ray API\n      An Overview of the Ray Core API\n      Design Principles\n  \
    \ Understanding Ray System Components\n      Scheduling and Executing Work on\
    \ a Node\n      The Head Node\n      Distributed Scheduling and Execution\n  \
    \ Summary\n3. Building Your First Distributed Application\n   Setting Up A Simple\
    \ Maze Problem\n   Building a Simulation\n   Training a Reinforcement Learning\
    \ Model\n   Building a Distributed Ray App\n   Recapping RL Terminology\n   Summary\n\
    4. Reinforcement Learning with Ray RLlib\n   An Overview of RLlib\n   Getting\
    \ Started With RLlib\n      Building A Gym Environment\n      Running the RLlib\
    \ CLI\n      Using the RLlib Python API\n   Configuring RLlib Experiments\n  \
    \    Resource Configuration\n      Debugging and Logging Configuration\n     \
    \ Rollout Worker and Evaluation Configuration\n      Environment Configuration\n\
    \   Working With RLlib Environments\n      An Overview of RLlib Environments\n\
    \      Working with Multiple Agents\n      Working with Policy Servers and Clients\n\
    \   Advanced Concepts\n      Building an Advanced Environment\n      Applying\
    \ Curriculum Learning\n      Working with Offline Data\n      Other Advanced Topics\n\
    \   Summary\n5. Hyperparameter Optimization with Ray Tune\n   Tuning Hyperparameters\n\
    \      Building a random search example with Ray\n      Why is HPO hard?\n   An\
    \ introduction to Tune\n      How does Tune work?\n      Configuring and running\
    \ Tune\n   Machine Learning with Tune\n      Using RLlib with Tune\n      Tuning\
    \ Keras Models\n   Summary\n6. Distributed Training with Ray Train\n   The Basics\
    \ of Distributed Model Training\n   Introduction to Ray Train\n      Creating\
    \ an End-To-End Example for Ray Train\n   Preprocessors in Ray Train\n      Usage\
    \ of Preprocessors\n      Serialization of Preprocessors\n   Trainers in Ray Train\n\
    \      Distributed Training for Gradient Boosted Trees\n      Distributed Training\
    \ for Deep Learning\n      Scaling Out Training with Ray Train Trainers\n    \
    \  Connecting Data to Distributed Training\n   Ray Train Features\n      Checkpoints\n\
    \      Callbacks\n      Integration with Ray Tune\n      Exporting Models\n  \
    \    Some Caveats\n7. Data Processing with Ray\n   Ray Datasets\n      An Overview\
    \ of Datasets\n      Datasets Basics\n      Computing Over Datasets\n      Dataset\
    \ Pipelines\n      Example: Parallel SGD from Scratch\n   External Library Integrations\n\
    \      Overview\n      Dask on Ray\n   Building an ML Pipeline\n      Background\n\
    \      End-to-End Example: Predicting Big Tips in Nyc Taxi Rides\n\n# CHAPTER\
    \ 1\n\n# An Overview of Ray\n\n> A distributed system is one in which the failure\
    \ of a computer you didn't even know existed can render your own computer unusable.\n\
    —Leslie Lamport\n\n## A Note for Early Release Readers\n\nWith Early Release ebooks,\
    \ you get books in their earliest form—the author’s raw and unedited content as\
    \ they write—so you can take advantage of these technologies long before the official\
    \ release of these titles.\n\nOne of the reasons we need efficient distributed\
    \ computing is that we’re collecting ever more data with a large variety at increasing\
    \ speeds. The storage systems, data processing and analytics engines that have\
    \ emerged in the last decade are crucially important to the success of many companies.\
    \ Interestingly, most “big data” technologies are built for and operated by (data)\
    \ engineers, that are in charge of data collection and processing tasks. The rationale\
    \ is to free up data scientists to do what they’re best at. As a data science\
    \ practitioner you might want to focus on training complex machine learning models,\
    \ running efficient hyperparameter selection, building entirely new and custom\
    \ models or simulations, or serving your models to showcase them. At the same\
    \ time you simply might *have to* scale them to a compute cluster. To do that,\
    \ the distributed system of your choice needs to support all of these fine-grained\
    \ “big compute” tasks, potentially on specialized hardware. Ideally, it also fits\
    \ into the big data tool chain you’re using and is fast enough to meet your latency\
    \ requirements. In other words, distributed computing has to be powerful and flexible\
    \ enough for complex data science workloads — and Ray can help you with that.\n\
    \nPython is likely the most popular language for data science today, and it's\
    \ certainly the one I find the most useful for my daily work. By now it's over\
    \ 30 years old, but has a still growing and active community. The rich PyData\
    \ ecosystem is an essential part of a data scientist's toolbox. How can you make\
    \ sure to scale out your workloads while still leveraging the tools you need?\
    \ That's a difficult problem, especially since communities can't be forced to\
    \ just toss their toolbox, or programming language. That means distributed computing\
    \ tools for data science have to be built for their existing community.\n\n# What\
    \ Is Ray?\n\nWhat I like about Ray is that it checks all the above boxes. It's\
    \ a flexible distributed computing framework build for the Python data science\
    \ community. Ray is easy to get started and keeps simple things simple. Its core\
    \ API is as lean as it gets and helps you reason effectively about the distributed\
    \ programs you want to write. You can efficiently parallelize Python programs\
    \ on your laptop, and run the code you tested locally on a cluster practically\
    \ without any changes. Its high-level libraries are easy to configure and can\
    \ seamlessly be used together. Some of them, like Ray's reinforcement learning\
    \ library, would have a bright future as standalone projects, distributed or not.\
    \ While Ray's core is built in C++, it's been a Python-first framework since day\
    \ one, integrates with many important data science tools, and can count on a growing\
    \ ecosystem.\n\nDistributed Python is not new, and Ray is not the first framework\
    \ in this space (nor will it be the last), but it is special in what it has to\
    \ offer. Ray is particularly strong when you combine several of its modules and\
    \ have custom, machine learning heavy workloads that would be difficult to implement\
    \ otherwise. It makes distributed computing easy enough to run your complex workloads\
    \ flexibly by leveraging the Python tools you know and want to use. In other words,\
    \ by *learning Ray* you get to know *flexible distributed Python for data science*.\n\
    \nIn this chapter you'll get a first glimpse at what Ray can do for you. We will\
    \ discuss the three layers that make up Ray, namely its core engine, its high-level\
    \ libraries and its ecosystem. Throughout the chapter we'll show you first code\
    \ examples to give you a feel for Ray, but we defer any in-depth treatment of\
    \ Ray's APIs and components to later chapters. You can view this chapter as an\
    \ overview of the whole book as well.\n\n# What Led to Ray?\n\nProgramming distributed\
    \ systems is hard. It requires specific knowledge and experience you might not\
    \ have. Ideally, such systems get out of your way and provide abstractions to\
    \ let you focus on your job. But in practice “all non-trivial abstractions, to\
    \ some degree, are leaky” (Spolsky), and getting clusters of computers to do what"

  md: "# Working with Policy Servers and Clients\n\nFor the last example in this section\
    \ on environments, let's assume our original GymEnvironment can only be simulated\
    \ on a machine that can't run RLlib, for instance because it doesn't have enough\
    \ resources available. We can run the environment on a PolicyClient that can ask\
    \ a respective *server* for suitable next actions to apply to the environment.\
    \ The server, in turn, does not know about the environment. It only knows how\
    \ to ingest input data from a PolicyClient, and it is responsible for running\
    \ all RL related code, in particular it defines an RLlib config object and trains\
    \ a Trainer.\n\n# Defining a server\n\nLet's start by defining the server-side\
    \ of such an application first. We define a so-called PolicyServerInput that runs\
    \ on localhost on port 9900. This policy input is what the client will provide\
    \ later on. With this policy_input defined as input to our trainer configuration,\
    \ we can define yet another DQNTrainer to run on the server:\n\n```\n# policy_server.py\n\
    import ray\nfrom ray.rllib.agents.dqn import DQNTrainer\nfrom ray.rllib.env.policy_server_input\
    \ import PolicyServerInput\nimport gym\n\nray.init()\n\ndef policy_input(context):\n\
    \    return PolicyServerInput(context, \"localhost\", 9900) ❶\n\nconfig = {\n\
    \    \"env\": None, ❷\n    \"observation_space\": gym.spaces.Discrete(5*5),\n\
    \    \"action_space\": gym.spaces.Discrete(4),\n    \"input\": policy_input, ❸\n\
    \    \"num_workers\": 0,\n    \"input_evaluation\": [],\n    \"log_level\": \"\
    INFO\",\n}\n\ntrainer = DQNTrainer(config=config)\n```\n\n❶ The policy_input function\
    \ returns a PolicyServerInput object running on localhost on port 9900.\n\n❷ We\
    \ explicitly set the env to None because this server does not need one."

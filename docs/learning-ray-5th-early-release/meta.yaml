  md: "4 The new value is the weighted sum of the old value and the expected value,\
    \ which is the sum of the current reward and the discounted next_max.\n\n5 After\
    \ updating, we set the new state_action_table value.\n\nHaving this function in\
    \ place now makes it really simple to train a policy to make better decisions.\
    \ We can use the following procedure:\n\n+   - Initialize a policy and a simulation.\n\
    - Run the simulation many times, let's say for a total of 10000 runs.\n- For each\
    \ game, first collect the experiences by running a rollout.\n- Then update the\
    \ policy by calling update_policy on the collected experiences.\n\nThat's it!\
    \ The following train_policy function implements the above procedure straight\
    \ up.\n\nExample 3-11.\n\n```\ndef train_policy(env, num_episodes=10000, weight=0.1,\
    \ discount_factor=0.9):\n    \"\"\"Training a policy by updating it with rollout\
    \ experiences.\"\"\"\n    policy = Policy(env)\n    sim = Simulation(env)\n  \
    \  for _ in range(num_episodes):\n        experiences = sim.rollout(policy) ①\n\
    \        update_policy(policy, experiences, weight, discount_factor) ②\n\n   \
    \ return policy\n\ntrained_policy = train_policy(environment) ③\n```\n\n+   ①\
    \ Collect experiences for each game.\n② Update our policy with those experiences.\n\
    ③ Finally, train and return a policy for our environment from before.\n\nNote\
    \ that the high-brow way of speaking of a full play-through of the maze game is\
    \ an episode in the RL literature. That's why we call the argument num_episodes\
    \ in the train_policy function, rather than num_games."

    \    scaling_config=scaling_config,\n    # ...\n)\n```"
- md: "## Connecting Data to Distributed Training\n\nRay Train provides utilities\
    \ to train on large datasets.\n\nAlong the same philosophy that the user should\
    \ not need to think about **how** to parallelize their code, you can simply “connect”\
    \ your large dataset to Ray Train without thinking about how to ingest and feed\
    \ your data into different parallel workers.\n\nHere, we create a dataset from\
    \ random data. However, you can use other data APIs to read a large amount of\
    \ data (with `read_parquet`, which reads data from the Parquet format).\n\nExample\
    \ 6-11.\n\n```python\nfrom typing import Dict\nimport torch\nimport torch.nn as\
    \ nn\n\nimport ray\nimport ray.train as train\nfrom ray.train import Trainer\n\
    \ndef get_datasets(a=5, b=10, size=1000, split=0.8):\n\n    def get_dataset(a,\
    \ b, size):\n        items = [i / size for i in range(size)]\n        dataset\
    \ = ray.data.from_items([{\"x\": x, \"y\": a * x + b} for x in items])\n     \
    \   return dataset\n\n    dataset = get_dataset(a, b, size)\n    split_index =\
    \ int(dataset.count() * split)\n    train_dataset, validation_dataset = dataset.random_shuffle().split_at_indices(\n\
    \        [split_index]\n    )\n    train_dataset_pipeline = train_dataset.repeat().random_shuffle_each_window()\n\
    \    validation_dataset_pipeline = validation_dataset.repeat()\n    datasets =\
    \ {\n        \"train\": train_dataset_pipeline,\n        \"validation\": validation_dataset_pipeline,\n\
    \    }\n    return datasets\n```\n\nYou can then specify a training function that\
    \ accesses these datapoints. Note that we use a specific `get_dataset_shard` function\
    \ here. Under the hood, Ray Train will automatically shard the provided dataset\
    \ so that individual workers can train on a different subset of the data at once.\
    \ This avoids training on duplicate data within the same epoch. The `get_dataset_shard`\
    \ function passes a subset of the data from the data source to each individual\
    \ parallel training worker.\n\nNext, we make an `iter_epochs` and `to_torch` call\
    \ on each shard. `iter_epochs` will produce an iterator. This iterator will produce\
    \ Dataset objects that will possess 1 shard of the entire epoch (named `train_dataset_iterator`\
    \ and `validation_dataset_iterator`).\n\n`to_torch` will convert the Dataset object\
    \ into a PyTorch iterator. There is an equivalent `to_tf` function that converts\
    \ it to a TensorFlow Data iterator.\n\nWhen the epoch is finished, the PyTorch\
    \ iterator will raise a `StopIteration`, and the `train_dataset_iterator` will\
    \ be queried again for a new shard on a new epoch.\n\nExample 6-12.\n\n```python\n\
    def train_func(config):\n    batch_size = config[\"batch_size\"]\n    # hidden_size\
    \ = config[\"hidden_size\"]\n    # lr = config.get(\"lr\", 1e-2)\n    epochs =\
    \ config.get(\"epochs\", 3)\n\n    train_dataset_pipeline_shard = train.get_dataset_shard(\"\
    train\")\n    validation_dataset_pipeline_shard = train.get_dataset_shard(\"validation\"\
    )\n    train_dataset_iterator = train_dataset_pipeline_shard.iter_epochs()\n \
    \   validation_dataset_iterator = validation_dataset_pipeline_shard.iter_epochs()\n\
    \n    for _ in range(epochs):\n        train_dataset = next(train_dataset_iterator)\n\
    \        validation_dataset = next(validation_dataset_iterator)\n        train_torch_dataset\
    \ = train_dataset.to_torch(\n            label_column=\"y\",\n            feature_columns=[\"\
    x\"],\n            label_column_dtype=torch.float,\n            feature_column_dtypes=torch.float,\n\
    \            batch_size=batch_size,\n        )\n        validation_torch_dataset\
    \ = validation_dataset.to_torch(\n            label_column=\"y\",\n          \
    \  feature_columns=[\"x\"],\n            label_column_dtype=torch.float,\n   \
    \         feature_column_dtypes=torch.float,\n            batch_size=batch_size,\n\
    \        )\n        # ... training\n\n    return results\n```\n\nYou can put things\
    \ together by using the Trainer in the following way:\n\nExample 6-13.\n\n```python\n\
    num_workers = 4\nuse_gpu = False\n\ndatasets = get_datasets()\ntrainer = Trainer(\"\
    torch\", num_workers=num_workers, use_gpu=use_gpu)\nconfig = {\"lr\": 1e-2, \"\
    hidden_size\": 1, \"batch_size\": 4, \"epochs\": 3}\ntrainer.start()\nresults\
    \ = trainer.run(\n    train_func,\n    config,\n    dataset=datasets,\n    callbacks=[JsonLoggerCallback(),\
    \ TBXLoggerCallback()],\n)\ntrainer.shutdown()\nprint(results)\n```\n\n## Ray\
    \ Train Features\n\n### Checkpoints\n\nRay Train will generate **model checkpoints**\
    \ to checkpoint intermediate state for training. These model checkpoints provide\
    \ the trained model and fitted preprocessor for usage in downstream applications\
    \ like serving and inference.\n\nExample 6-14.\n\n```python\nresult = trainer.fit()\n\
    model: ray.train.Model = result.checkpoint.load_model()\n```\n\nThe goal of the\
    \ model checkpoints is to abstract away the actual physical representation of\
    \ the model and preprocessor. As a result, you should be able to generate a checkpoint\
    \ from a cloud storage location, and convert it into an in-memory representation\
    \ or on-disk representation, and vice versa.\n\nExample 6-15.\n\n```python\nchkpt\
    \ = Checkpoint.from_directory(dir)\nchkpt.to_bytes() -> bytes\n```\n\n### Callbacks\n\
    \nYou may want to plug in your training code with your favorite experiment management\
    \ framework. Ray Train provides an interface to fetch intermediate results and\
    \ callbacks to process, or log, your intermediate results (the values passed into\
    \ `train.report(...)`).\n\nRay Train contains built-in callbacks for popular tracking\
    \ frameworks, or you can implement your own callback via the `TrainingCallback`\
    \ interface. Available callbacks include:\n\n- Json Logging\n- Tensorboard Logging\n\
    - MLflow Logging\n- Torch Profiler\n\nExample 6-16.\n\n```python\n# Run the training\
    \ function, logging all the intermediate results\n# to MLflow and Tensorboard.\n\
    \nresult = trainer.run(\n    train_func,\n    callbacks=[\n        MLflowLoggerCallback(experiment_name=\"\
    train_experiment\"),\n        TBXLoggerCallback(),\n    ],\n)\n```\n\n### Integration\
    \ with Ray Tune\n\nRay Train provides an integration with Ray Tune that allows\
    \ you to perform hyper-parameter optimization in just a few lines of code. Tune\
    \ will create one Trial per hyperparameter configuration. In each Trial, a new\
    \ Trainer will be initialized and run the training function with its generated\
    \ configuration.\n\nExample 6-17.\n\n```python\nfrom ray import tune\n\nfail_after_finished\
    \ = True\nprep_v1 = preprocessor\nprep_v2 = preprocessor\n\nparam_space = {\n\
    \    \"scaling_config\": {\n        \"num_actors\": tune.grid_search([2, 4]),\n\
    \        \"cpus_per_actor\": 2,\n        \"gpus_per_actor\": 0,\n    },\n    \"\
    preprocessor\": tune.grid_search([prep_v1, prep_v2]),\n    # \"datasets\": {\n\
    \    #     \"train_dataset\": tune.grid_search([dataset_v1, dataset_v2]),\n  \
    \  # },\n    \"params\": {\n        \"objective\": \"binary:logistic\",\n    \
    \    \"tree_method\": \"approx\",\n        \"eval_metric\": [\"logloss\", \"error\"\
    ],\n        \"eta\": tune.loguniform(1e-4, 1e-1),\n        \"subsample\": tune.uniform(0.5,\
    \ 1.0),\n        \"max_depth\": tune.randint(1, 9),\n    },\n}\nif fail_after_finished\
    \ > 0:\n    callbacks = [StopperCallback(fail_after_finished=fail_after_finished)]\n\
    else:\n    callbacks = None\ntuner = tune.Tuner(\n    XGBoostTrainer(\n      \
    \  run_config={\"max_actor_restarts\": 1},\n        scaling_config=None,\n   \
    \     resume_from_checkpoint=None,\n        label=\"target\",\n    ),\n    run_config={},\n\
    \    param_space=param_space,\n    name=\"tuner_resume\",\n    callbacks=callbacks,\n\
    )\nresults = tuner.fit(datasets={\"train_dataset\": dataset})\nprint(results.results)\n\
    ```\n\nCompared to other distributed hyperparameter tuning solutions, Ray Tune\
    \ and Ray Train has a couple unique features:\n\n- Ability to specify the dataset\
    \ and preprocessor as a parameter\n- Fault tolerance\n- Ability to adjust the\
    \ number of workers during training time.\n\n### Exporting Models\n\nYou may want\
    \ to export the model trained to Ray Serve or a model registry after you've trained\
    \ it with Ray Train.\n\nTo do so, you can fetch the model using a `load_model`\
    \ API:\n\nExample 6-18.\n\n```python\nresult = trainer.fit(dataset=dataset, preprocessor=preprocessor)\n\
    print(result)\n\nthis_checkpoint = result.checkpoint\nthis_model = this_checkpoint.load_model()\n\
    predicted = this_model.predict(predict_ds)\nprint(predicted.to_pandas())\n```\n\
    \n### Some Caveats\n\nIn particular, recall that standard neural network training\
    \ works by iterating through a dataset in separate batches of data (usually called\
    \ minibatch gradient descent).\n\nTo speed this up, you can parallelize the gradient\
    \ computation of every minibatch update. This means that the batch should be split\
    \ across multiple machines.\n\nOne complication is that if you hold the size of\
    \ the batch constant, the system utilization and efficiency reduces as you increase\
    \ the number of workers.\n\nTo compensate, practitioners typically increase the\
    \ amount of data per batch.\n\nAs a result, the time it takes to go through a\
    \ single pass of the data (one epoch) should ideally reduce, since the number\
    \ of total batches decreases."
  mdcn: "## 将数据连接到分布式训练\n\nRay Train 提供了在大型数据集上进行训练的实用工具。\n\n秉持着用户无需考虑**如何**并行化代码的理念，你可以简单地将你的大型数据集“连接”到\
    \ Ray Train，而无需考虑如何将数据摄入并馈送到不同的并行工作进程中。\n\n在此，我们从随机数据创建一个数据集。不过，你可以使用其他数据 API\
    \ 来读取大量数据（例如使用 `read_parquet`，它可以从 Parquet 格式读取数据）。\n\n示例 6-11。\n\n```python\n\
    from typing import Dict\nimport torch\nimport torch.nn as nn\n\nimport ray\nimport\
    \ ray.train as train\nfrom ray.train import Trainer\n\ndef get_datasets(a=5, b=10,\
    \ size=1000, split=0.8):\n\n    def get_dataset(a, b, size):\n        items =\
    \ [i / size for i in range(size)]\n        dataset = ray.data.from_items([{\"\
    x\": x, \"y\": a * x + b} for x in items])\n        return dataset\n\n    dataset\
    \ = get_dataset(a, b, size)\n    split_index = int(dataset.count() * split)\n\
    \    train_dataset, validation_dataset = dataset.random_shuffle().split_at_indices(\n\
    \        [split_index]\n    )\n    train_dataset_pipeline = train_dataset.repeat().random_shuffle_each_window()\n\
    \    validation_dataset_pipeline = validation_dataset.repeat()\n    datasets =\
    \ {\n        \"train\": train_dataset_pipeline,\n        \"validation\": validation_dataset_pipeline,\n\
    \    }\n    return datasets\n```\n\n然后，你可以指定一个训练函数来访问这些数据点。请注意，我们在这里使用了一个特定的 `get_dataset_shard`\
    \ 函数。在底层，Ray Train 会自动对提供的数据集进行分片，以便各个工作进程可以同时在不同的数据子集上进行训练。这避免了在同一个训练周期内对重复数据进行训练。`get_dataset_shard`\
    \ 函数将数据源的一个子集传递给每个独立的并行训练工作进程。\n\n接下来，我们对每个分片进行 `iter_epochs` 和 `to_torch` 调用。`iter_epochs`\
    \ 将生成一个迭代器。该迭代器将生成 Dataset 对象，每个对象包含整个训练周期的一个分片（命名为 `train_dataset_iterator` 和\
    \ `validation_dataset_iterator`）。\n\n`to_torch` 将 Dataset 对象转换为 PyTorch 迭代器。有一个等效的\
    \ `to_tf` 函数可以将其转换为 TensorFlow Data 迭代器。\n\n当一个训练周期结束时，PyTorch 迭代器将引发 `StopIteration`，然后\
    \ `train_dataset_iterator` 将被再次查询，以获取新训练周期的新分片。\n\n示例 6-12。\n\n```python\ndef\
    \ train_func(config):\n    batch_size = config[\"batch_size\"]\n    # hidden_size\
    \ = config[\"hidden_size\"]\n    # lr = config.get(\"lr\", 1e-2)\n    epochs =\
    \ config.get(\"epochs\", 3)\n\n    train_dataset_pipeline_shard = train.get_dataset_shard(\"\
    train\")\n    validation_dataset_pipeline_shard = train.get_dataset_shard(\"validation\"\
    )\n    train_dataset_iterator = train_dataset_pipeline_shard.iter_epochs()\n \
    \   validation_dataset_iterator = validation_dataset_pipeline_shard.iter_epochs()\n\
    \n    for _ in range(epochs):\n        train_dataset = next(train_dataset_iterator)\n\
    \        validation_dataset = next(validation_dataset_iterator)\n        train_torch_dataset\
    \ = train_dataset.to_torch(\n            label_column=\"y\",\n            feature_columns=[\"\
    x\"],\n            label_column_dtype=torch.float,\n            feature_column_dtypes=torch.float,\n\
    \            batch_size=batch_size,\n        )\n        validation_torch_dataset\
    \ = validation_dataset.to_torch(\n            label_column=\"y\",\n          \
    \  feature_columns=[\"x\"],\n            label_column_dtype=torch.float,\n   \
    \         feature_column_dtypes=torch.float,\n            batch_size=batch_size,\n\
    \        )\n        # ... training\n\n    return results\n```\n\n你可以通过以下方式使用 Trainer\
    \ 将各部分组合起来：\n\n示例 6-13。\n\n```python\nnum_workers = 4\nuse_gpu = False\n\ndatasets\
    \ = get_datasets()\ntrainer = Trainer(\"torch\", num_workers=num_workers, use_gpu=use_gpu)\n\
    config = {\"lr\": 1e-2, \"hidden_size\": 1, \"batch_size\": 4, \"epochs\": 3}\n\
    trainer.start()\nresults = trainer.run(\n    train_func,\n    config,\n    dataset=datasets,\n\
    \    callbacks=[JsonLoggerCallback(), TBXLoggerCallback()],\n)\ntrainer.shutdown()\n\
    print(results)\n```\n\n## Ray Train 功能特性\n\n### 检查点\n\nRay Train 会生成**模型检查点**来保存训练的中间状态。这些模型检查点提供了训练好的模型和拟合好的预处理器，可用于服务和推理等下游应用。\n\
    \n示例 6-14。\n\n```python\nresult = trainer.fit()\nmodel: ray.train.Model = result.checkpoint.load_model()\n\
    ```\n\n模型检查点的目标是抽象掉模型和预处理器的实际物理表示。因此，你应该能够从云存储位置生成一个检查点，并将其转换为内存表示或磁盘表示，反之亦然。\n\
    \n示例 6-15。\n\n```python\nchkpt = Checkpoint.from_directory(dir)\nchkpt.to_bytes()\
    \ -> bytes\n```\n\n### 回调\n\n你可能希望将你的训练代码与你最喜欢的实验管理框架集成。Ray Train 提供了一个接口来获取中间结果，以及回调来处理或记录你的中间结果（传递给\
    \ `train.report(...)` 的值）。\n\nRay Train 包含用于流行跟踪框架的内置回调，或者你可以通过 `TrainingCallback`\
    \ 接口实现自己的回调。可用的回调包括：\n\n-   Json 日志记录\n-   Tensorboard 日志记录\n-   MLflow 日志记录\n\
    -   Torch 性能分析器\n\n示例 6-16。\n\n```python\n# 运行训练函数，将所有中间结果记录到\n# MLflow 和 Tensorboard。\n\
    \nresult = trainer.run(\n    train_func,\n    callbacks=[\n        MLflowLoggerCallback(experiment_name=\"\
    train_experiment\"),\n        TBXLoggerCallback(),\n    ],\n)\n```\n\n### 与 Ray\
    \ Tune 集成\n\nRay Train 提供了与 Ray Tune 的集成，允许你只需几行代码即可执行超参数优化。Tune 将为每个超参数配置创建一个\
    \ Trial。在每个 Trial 中，将初始化一个新的 Trainer，并使用其生成的配置运行训练函数。\n\n示例 6-17。\n\n```python\n\
    from ray import tune\n\nfail_after_finished = True\nprep_v1 = preprocessor\nprep_v2\
    \ = preprocessor\n\nparam_space = {\n    \"scaling_config\": {\n        \"num_actors\"\
    : tune.grid_search([2, 4]),\n        \"cpus_per_actor\": 2,\n        \"gpus_per_actor\"\
    : 0,\n    },\n    \"preprocessor\": tune.grid_search([prep_v1, prep_v2]),\n  \
    \  # \"datasets\": {\n    #     \"train_dataset\": tune.grid_search([dataset_v1,\
    \ dataset_v2]),\n    # },\n    \"params\": {\n        \"objective\": \"binary:logistic\"\
    ,\n        \"tree_method\": \"approx\",\n        \"eval_metric\": [\"logloss\"\
    , \"error\"],\n        \"eta\": tune.loguniform(1e-4, 1e-1),\n        \"subsample\"\
    : tune.uniform(0.5, 1.0),\n        \"max_depth\": tune.randint(1, 9),\n    },\n\
    }\nif fail_after_finished > 0:\n    callbacks = [StopperCallback(fail_after_finished=fail_after_finished)]\n\
    else:\n    callbacks = None\ntuner = tune.Tuner(\n    XGBoostTrainer(\n      \
    \  run_config={\"max_actor_restarts\": 1},\n        scaling_config=None,\n   \
    \     resume_from_checkpoint=None,\n        label=\"target\",\n    ),\n    run_config={},\n\
    \    param_space=param_space,\n    name=\"tuner_resume\",\n    callbacks=callbacks,\n\
    )\nresults = tuner.fit(datasets={\"train_dataset\": dataset})\nprint(results.results)\n\
    ```\n\n与其他分布式超参数调优解决方案相比，Ray Tune 和 Ray Train 具有几个独特的功能：\n\n-   能够将数据集和预处理器指定为参数\n\
    -   容错能力\n-   能够在训练期间调整工作进程的数量。\n\n### 导出模型\n\n在使用 Ray Train 训练模型后，你可能希望将训练好的模型导出到\
    \ Ray Serve 或模型注册表。\n\n为此，你可以使用 `load_model` API 获取模型：\n\n示例 6-18。\n\n```python\n\
    result = trainer.fit(dataset=dataset, preprocessor=preprocessor)\nprint(result)\n\
    \nthis_checkpoint = result.checkpoint\nthis_model = this_checkpoint.load_model()\n\
    predicted = this_model.predict(predict_ds)\nprint(predicted.to_pandas())\n```\n\
    \n### 一些注意事项\n\n特别要记住，标准的神经网络训练是通过将数据集分成单独的数据批次（通常称为小批量梯度下降）来迭代进行的。\n\n为了加速这一过程，你可以并行化每次小批量更新的梯度计算。这意味着批次应该被分割到多台机器上。\n\
    \n一个复杂的情况是，如果你保持批次大小不变，随着工作进程数量的增加，系统利用率和效率会降低。\n\n为了补偿这一点，从业者通常会增加每个批次的数据量。\n\
    \n因此，理想情况下，遍历一次数据（一个训练周期）所需的时间应该减少，因为总批次数量减少了。"

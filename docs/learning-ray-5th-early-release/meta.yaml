    \ with larger, more realistic datasets. For now, the important part is that this\
    \ step is essential in a truly distributed setting. If you like, try to re-run\
    \ Example 2-5 with this new retrieve_task function and confirm that it still runs,\
    \ as expected."
  - "[PAGE 35]\n\n# Using Ray’s wait function for non-blocking calls\n\nNote how in\
    \ Example 2-5 we used `ray.get(data_references)` to access results. This call\
    \ is *blocking*, which means that our driver has to wait for all the results to\
    \ be available. That’s not a big deal in our case, the program now finishes in\
    \ under a second. But imagine processing of each data item would take several\
    \ minutes. In that case you would want to free up the driver process for other\
    \ tasks, instead of sitting idly by. Also, it would be great to process results\
    \ as they come in (some finish much quicker than others), rather than waiting\
    \ for all data to be processed. One more question to keep in mind is what happens\
    \ if one of the data items can’t be retrieved as expected? Let’s say there’s a\
    \ deadlock somewhere in the database connection. In that case, the driver will\
    \ simply hang and never retrieve all items. For that reason it’s a good idea to\
    \ work with reasonable timeouts. In our scenario, we should not wait longer than\
    \ 10 times the longest data retrieval task before stopping the task. Here’s how\
    \ you can do that with Ray by using wait:\n\nExample 2-7.\n\n```\nstart = time.time()\n\
    data_references = [retrieve_task.remote(item) for item in range(8)]\nall_data\
    \ = []\n\nwhile len(data_references) > 0: ①\n    finished, data_references = ray.wait(data_references,\
    \ num_returns=2, timeout=7.0) ②\n    data = ray.get(finished)\n    print_runtime(data,\
    \ start, 3) ③\n    all_data.extend(data) ④\n```\n\n+   ① Instead of blocking,\
    \ we loop through unfinished data_references.\n② We asynchronously wait for finished\
    \ data with a reasonable timeout. data_references gets overridden here, to prevent\
    \ an infinite loop.\n③ We print results as they come in, namely in blocks of two.\n\
    ④ Then we append new data to the all_data until finished.\n\nAs you can see `ray.wait`\
    \ returns two arguments, namely finished data and futures that still need to be\
    \ processed. We use the `num_returns` argument, which defaults to 1, to let wait\
    \ return whenever a new pair of data items is available. On my laptop this results\
    \ in the following output:\n\n```\nRuntime: 0.108 seconds, data:\n(0, 'Learning')\n\
    (1, 'Ray')\nRuntime: 0.308 seconds, data:\n```"
- md: "## Handling task dependencies\n\nSo far our example program has been fairly\
    \ easy on a conceptual level. It consists of a single step, namely retrieving\
    \ a bunch of data. Now, imagine that once your data is loaded you want to run\
    \ a follow-up processing task on it. To be more concrete, let's say we want to\
    \ use the result of our first retrieve task to query other, related data (pretend\
    \ that you're querying data from a different table in the same database). The\
    \ following code sets up such a task and runs both our retrieve_task and follow_up_task\
    \ consecutively.\n\nExample 2-8. Running a follow-up task that depends on another\
    \ Ray task\n\n```python\n@ray.remote\ndef follow_up_task(retrieve_result): ①\n\
    \    original_item, _ = retrieve_result\n    follow_up_result = retrieve(original_item\
    \ + 1) ②\n    return retrieve_result, follow_up_result ③\n\nretrieve_refs = [retrieve_task.remote(item)\
    \ for item in [0, 2, 4, 6]]\nfollow_up_refs = [follow_up_task.remote(ref) for\
    \ ref in retrieve_refs] ④\n\nresult = [print(data) for data in ray.get(follow_up_refs)]\n\
    ```\n\n① Using the result of retrieve_task we compute another Ray task on top\
    \ of it.\n② Leveraging the original_item from the first task, we retrieve more\
    \ data.\n③ Then we return both the original and the follow-up data.\n④ We pass\
    \ the object references from the first task into the second task.\n\nRunning this\
    \ code results in the following output.\n\n```\n((0, 'Learning'), (1, 'Ray'))\n\
    ((2, 'Flexible'), (3, 'Distributed'))\n((4, 'Python'), (5, 'for'))\n((6, 'Data'),\
    \ (7, 'Science'))\n```\n\nIf you don't have a lot of experience with asynchronous\
    \ programming, you might not be impressed by Example 2-8. But I hope to convince\
    \ you that it's at least a bit surprising³ that this code snippet runs at all.\
    \ So, what's the big deal? After all, the code reads like regular Python - a function\
    \ definition and a few list comprehensions. The point is that the function body\
    \ of `follow_up_task` expects a Python tuple for its input argument `retrieve_result`,\
    \ which we unpack in the first line of the function definition.\n\nBut by invoking\
    \ `[follow_up_task.remote(ref) for ref in retrieve_refs]` we do *not* pass in\
    \ tuples to the follow-up task at all. Instead, we pass in Ray *object references*\
    \ with `retrieve_refs`. What happens under the hood is that Ray knows that `follow_up_task`\
    \ requires actual values, so internally in this task it will call `ray.get` to\
    \ resolve the futures. Ray builds a dependency graph for all tasks and executes\
    \ them in an order that respects the dependencies. You do not have to tell Ray\
    \ explicitly when to wait for a previous task to finish, it will infer that information\
    \ for you.\n\nThe follow-up tasks will only be scheduled, once the individual\
    \ retrieve tasks have finished. If you ask me, that's an incredible feature. In\
    \ fact, if I had called `retrieve_refs` something like `retrieve_result`, you\
    \ may not even have noticed this important detail. That's by design. Ray wants\
    \ you to focus on your work, not on the details of cluster computing. In figure\
    \ Figure 2-1 you can see the dependency graph for the two tasks visualized.\n\n\
    > ³ According to Clarke's third law any sufficiently advanced technology is indistinguishable\
    \ from magic. For me, this example has a bit of magic to it.\n\n![](img/58c832795222840423ffeca1357b40a7_38_0.png)\n\
    \nFigure 2-1. Running two dependent tasks asynchronously and in parallel with\
    \ Ray\n\nIf you feel like it, try to rewrite Example 2-8 so that it explicitly\
    \ uses get on the first task before passing values into the follow-up task. That\
    \ does not only introduce more boilerplate code, but it's also a bit less intuitive\
    \ to write and understand.\n\n## From classes to actors\n\nBefore wrapping up\
    \ this example, let's discuss one more important concept of Ray Core. Notice how\
    \ in our example everything is essentially a function. We just used the ray.remote\
    \ decorator to make some of them remote functions, and other than that simply\
    \ used plain Python. Let's say we wanted to track how often our database has been\
    \ queried? Sure, we could simply count the results of our retrieve tasks, but\
    \ is there a better way to do this? We want to track this in a “distributed” way\
    \ that will scale. For that, Ray has the concept of actors. Actors allow you to\
    \ run stateful computations on your cluster. They can also communicate between\
    \ each other¹. Much like Ray tasks were simply decorated functions, Ray actors\
    \ are decorated Python classes. Let's write a simple counter to track our database\
    \ calls.\n\nExample 2-9.\n\n```python\n@ray.remote\nclass DataTracker:\n    def\
    \ __init__(self):\n        self._counts = 0\n\n    def increment(self):\n    \
    \    self._counts += 1\n\n    def counts(self):\n        return self._counts\n\
    ```\n\n> 4 The actor model is an established concept in computer science, which\
    \ you can find implemented e.g. in Akka or Erlang. However, the history and specifics\
    \ of actors are not relevant to our discussion.\n\nWe can make any Python class\
    \ a Ray actor by using the same `ray.remote` decorator as before.\n\nThis DataTracker\
    \ class is already an actor, since we equipped it with the `ray.remote` decorator.\
    \ This actor can track state, here just a simple counter, and its methods are\
    \ Ray tasks that get invoked precisely like we did with functions before, namely\
    \ using `.remote()`. Let's see how we can modify our existing `retrieve_task`\
    \ to incorporate this new actor.\n\nExample 2-10.\n\n```python\n@ray.remote\n\
    def retrieve_tracker_task(item, tracker): ❶\n    obj_store_data = ray.get(database_object_ref)\n\
    \    time.sleep(item / 10.)\n    tracker.increment.remote() ❷\n    return item,\
    \ obj_store_data[item]\n\ntracker = DataTracker.remote() ❸\ndata_references =\
    \ [retrieve_tracker_task.remote(item, tracker) for item in range(8)] ❹\ndata =\
    \ ray.get(data_references)\nprint(ray.get(tracker.counts.remote())) ❺\n```\n\n\
    ❶ We pass in the tracker actor into this task.\n❷ The tracker receives an increment\
    \ for each call.\n❸ We instantiate our DataTracker actor by calling `.remote()`\
    \ on the class.\n❹ The actor gets passed into the retrieve task.\n❺ Afterwards\
    \ we can get the counts state from our tracker from another remote invocation.\n\
    \nUnsurprisingly, the result of this computation is in fact 8. We didn't need\
    \ actors to compute this, but I hope you can see how useful it can be to have\
    \ a mechanism to track state across the cluster, potentially spanning multiple\
    \ tasks. In fact, we could pass our actor into any dependent task, or even pass\
    \ it into the constructor of yet another actor. There is no limitation to what\
    \ you can do, and it’s this flexibility that makes the Ray API so powerful. It’s\
    \ also worth mentioning that it’s not very common for distributed Python tools\
    \ to allow for stateful computations like this. This feature can come in very\
    \ handy, especially when running complex distributed algorithms, for instance\
    \ when using reinforcement learning. This completes our extensive first Ray API\
    \ example. Let’s see if we can concisely summarize the Ray API next.\n\n## An\
    \ Overview of the Ray Core API\n\nIf you recall what exactly we did in the previous\
    \ example, you’ll notice that we used a total of just six API methods⁵. You used\
    \ `ray.init()` to start the cluster and `@ray.remote` to turn functions and classes\
    \ into tasks and actors. Then we used `ray.put()` to pass data into Ray’s object\
    \ store and `ray.get()` to retrieve data from the cluster. Finally, we used `.remote()`\
    \ on actor methods or tasks to run code on our cluster, and `ray.wait()` to avoid\
    \ blocking calls.\n\nWhile six API methods might not seem like much, those are\
    \ the only ones you’ll likely ever care about when using the Ray API⁶. Let’s briefly\
    \ summarize them in a table, so you can easily reference them in the future.\n\
    \nTable 2-1. The six major API methods of Ray Core\n\n| API call | Description\
    \ |\n|---|---|\n| `ray.init()` | Initializes your Ray cluster. Pass in an address\
    \ to connect to an existing cluster. |\n| `@ray.remote` | Turns functions into\
    \ tasks and classes into actors. |\n| `ray.put()` | Puts data into Ray’s object\
    \ store. |\n| `ray.get()` | Gets data from the object store. Returns data you’ve\
    \ put there or that was computed by a task or actor. |\n| `.remote()` | Runs actor\
    \ methods or tasks on your Ray cluster and is used to instantiate actors. |\n\
    | `ray.wait()` | Returns two lists of object references, one with finished tasks\
    \ we’re waiting for and one with unfinished tasks. |\n\nNow that you’ve seen the\
    \ Ray API in action, let’s quickly discuss Ray’s design philosophy, before moving\
    \ on to discussing its system architecture.\n\n> 5 To paraphrase Alan Kay, to\
    \ get simplicity, you need to find slightly more sophisticated building blocks.\
    \ In my eyes, the Ray API does just that for distributed Python.\n> 6 You can\
    \ check out the API reference to see that there are in fact quite a bit more methods\
    \ available. At some point you should invest in understanding the arguments of\
    \ init, but all other methods likely won’t be of interest to you, if you’re not\
    \ an administrator of your Ray cluster."
  mdcn: "## 处理任务依赖关系\n\n到目前为止，我们的示例程序在概念层面上相当简单。它只包含一个步骤，即检索一批数据。现在，想象一下，一旦数据加载完成，你想在其上运行一个后续处理任务。更具体地说，假设我们想使用第一个检索任务的结果来查询其他相关数据（假装你正在查询同一数据库中不同表的数据）。以下代码设置了这样一个任务，并连续运行了我们的\
    \ `retrieve_task` 和 `follow_up_task`。\n\n示例 2-8. 运行一个依赖于另一个 Ray 任务的后续任务\n\n```python\n\
    @ray.remote\ndef follow_up_task(retrieve_result): ①\n    original_item, _ = retrieve_result\n\
    \    follow_up_result = retrieve(original_item + 1) ②\n    return retrieve_result,\
    \ follow_up_result ③\n\nretrieve_refs = [retrieve_task.remote(item) for item in\
    \ [0, 2, 4, 6]]\nfollow_up_refs = [follow_up_task.remote(ref) for ref in retrieve_refs]\
    \ ④\n\nresult = [print(data) for data in ray.get(follow_up_refs)]\n```\n\n① 使用\
    \ `retrieve_task` 的结果，我们在此基础上计算另一个 Ray 任务。\n② 利用第一个任务中的 `original_item`，我们检索更多数据。\n\
    ③ 然后我们返回原始数据和后续数据。\n④ 我们将第一个任务的对象引用传递给第二个任务。\n\n运行此代码将产生以下输出。\n\n```\n((0, 'Learning'),\
    \ (1, 'Ray'))\n((2, 'Flexible'), (3, 'Distributed'))\n((4, 'Python'), (5, 'for'))\n\
    ((6, 'Data'), (7, 'Science'))\n```\n\n如果你没有太多异步编程经验，你可能对示例 2-8 并不感到惊讶。但我希望说服你，这段代码片段能够运行本身至少有点令人惊讶³。那么，这有什么大不了的呢？毕竟，代码读起来就像普通的\
    \ Python——一个函数定义和几个列表推导式。关键在于，`follow_up_task` 的函数体期望其输入参数 `retrieve_result` 是一个\
    \ Python 元组，我们在函数定义的第一行中对其进行了拆包。\n\n但是通过调用 `[follow_up_task.remote(ref) for ref\
    \ in retrieve_refs]`，我们*并没有*向后续任务传递元组。相反，我们传递的是带有 `retrieve_refs` 的 Ray *对象引用*。底层发生的情况是，Ray\
    \ 知道 `follow_up_task` 需要实际值，因此在此任务内部，它将调用 `ray.get` 来解析 futures。Ray 为所有任务构建一个依赖图，并按照尊重依赖关系的顺序执行它们。你不必显式地告诉\
    \ Ray 何时等待前一个任务完成，它会为你推断出这些信息。\n\n后续任务只有在各个检索任务完成后才会被调度。如果你问我，这是一个令人难以置信的功能。事实上，如果我将\
    \ `retrieve_refs` 命名为类似 `retrieve_result` 的名字，你可能甚至没有注意到这个重要的细节。这是设计使然。Ray 希望你专注于你的工作，而不是集群计算的细节。在图\
    \ 2-1 中，你可以看到这两个任务的依赖关系图可视化。\n\n> ³ 根据克拉克第三定律，任何足够先进的技术都与魔法无异。对我来说，这个例子就有点魔法的味道。\n\
    \n![](img/58c832795222840423ffeca1357b40a7_38_0.png)\n\n图 2-1. 使用 Ray 异步并行运行两个相互依赖的任务\n\
    \n如果你愿意，可以尝试重写示例 2-8，使其在将值传递给后续任务之前显式地对第一个任务使用 `get`。这不仅会引入更多样板代码，而且编写和理解起来也更不直观。\n\
    \n## 从类到 Actor\n\n在结束这个示例之前，让我们讨论一下 Ray Core 的另一个重要概念。注意在我们的示例中，所有东西本质上都是一个函数。我们只是使用了\
    \ `ray.remote` 装饰器将其中一些变成了远程函数，除此之外只是使用了普通的 Python。假设我们想跟踪数据库被查询了多少次？当然，我们可以简单地计算检索任务的结果，但有没有更好的方法呢？我们希望以一种可扩展的“分布式”方式来跟踪这一点。为此，Ray\
    \ 引入了 actor 的概念。Actor 允许你在集群上运行有状态的计算。它们也可以相互通信¹。就像 Ray 任务只是被装饰的函数一样，Ray actor\
    \ 是被装饰的 Python 类。让我们编写一个简单的计数器来跟踪我们的数据库调用。\n\n示例 2-9.\n\n```python\n@ray.remote\n\
    class DataTracker:\n    def __init__(self):\n        self._counts = 0\n\n    def\
    \ increment(self):\n        self._counts += 1\n\n    def counts(self):\n     \
    \   return self._counts\n```\n\n> 4 Actor 模型是计算机科学中一个成熟的概念，你可以在 Akka 或 Erlang\
    \ 等框架中找到它的实现。然而，actor 的历史和具体细节与我们的讨论无关。\n\n我们可以使用与之前相同的 `@ray.remote` 装饰器将任何 Python\
    \ 类变成 Ray actor。\n\n这个 `DataTracker` 类已经是一个 actor 了，因为我们为它配备了 `@ray.remote` 装饰器。这个\
    \ actor 可以跟踪状态，这里只是一个简单的计数器，它的方法是 Ray 任务，调用方式与我们之前调用函数完全一样，即使用 `.remote()`。让我们看看如何修改我们现有的\
    \ `retrieve_task` 来整合这个新的 actor。\n\n示例 2-10.\n\n```python\n@ray.remote\ndef retrieve_tracker_task(item,\
    \ tracker): ❶\n    obj_store_data = ray.get(database_object_ref)\n    time.sleep(item\
    \ / 10.)\n    tracker.increment.remote() ❷\n    return item, obj_store_data[item]\n\
    \ntracker = DataTracker.remote() ❸\ndata_references = [retrieve_tracker_task.remote(item,\
    \ tracker) for item in range(8)] ❹\ndata = ray.get(data_references)\nprint(ray.get(tracker.counts.remote()))\
    \ ❺\n```\n\n❶ 我们将 tracker actor 传递给这个任务。\n❷ 每次调用，tracker 都会收到一个增量。\n❸ 我们通过调用类上的\
    \ `.remote()` 来实例化我们的 `DataTracker` actor。\n❹ actor 被传递给检索任务。\n❺ 之后，我们可以通过另一个远程调用从\
    \ tracker 获取计数状态。\n\n毫不奇怪，这个计算的结果实际上是 8。我们不需要 actor 来计算这个，但我希望你能看到，拥有一个跨集群跟踪状态的机制（可能跨越多个任务）是多么有用。事实上，我们可以将我们的\
    \ actor 传递给任何依赖任务，甚至传递给另一个 actor 的构造函数。你能做的事情没有限制，正是这种灵活性使得 Ray API 如此强大。同样值得一提的是，分布式\
    \ Python 工具允许进行像这样的有状态计算并不常见。这个功能非常方便，尤其是在运行复杂的分布式算法时，例如使用强化学习时。这完成了我们广泛的第一个 Ray\
    \ API 示例。接下来让我们看看是否可以简洁地总结一下 Ray API。\n\n## Ray Core API 概览\n\n如果你回想一下我们在前面的示例中到底做了什么，你会注意到我们总共只使用了六个\
    \ API 方法⁵。你使用了 `ray.init()` 来启动集群，使用 `@ray.remote` 将函数和类转换为任务和 actor。然后我们使用 `ray.put()`\
    \ 将数据放入 Ray 的对象存储，使用 `ray.get()` 从集群检索数据。最后，我们在 actor 方法或任务上使用 `.remote()` 在集群上运行代码，并使用\
    \ `ray.wait()` 来避免阻塞调用。\n\n虽然六个 API 方法看起来不多，但当你使用 Ray API 时，这些可能是你唯一需要关心的⁶。让我们在表格中简要总结一下它们，以便你将来可以轻松参考。\n\
    \n表 2-1. Ray Core 的六个主要 API 方法\n\n| API 调用 | 描述 |\n|---|---|\n| `ray.init()` |\
    \ 初始化你的 Ray 集群。传入一个地址以连接到现有集群。 |\n| `@ray.remote` | 将函数转换为任务，将类转换为 actor。 |\n\
    | `ray.put()` | 将数据放入 Ray 的对象存储。 |\n| `ray.get()` | 从对象存储获取数据。返回你放入其中的数据或由任务或\
    \ actor 计算的数据。 |\n| `.remote()` | 在你的 Ray 集群上运行 actor 方法或任务，并用于实例化 actor。 |\n\
    | `ray.wait()` | 返回两个对象引用列表，一个包含我们正在等待的已完成任务，另一个包含未完成的任务。 |\n\n既然你已经看到了 Ray API\
    \ 的实际应用，让我们在讨论其系统架构之前，快速讨论一下 Ray 的设计哲学。\n\n> 5 引用 Alan Kay 的话，要获得简单性，你需要找到稍微复杂一点的构建块。在我看来，Ray\
    \ API 为分布式 Python 做到了这一点。\n> 6 你可以查看 API 参考，看看实际上还有更多可用的方法。在某个时候，你应该花时间了解 `init`\
    \ 的参数，但如果你不是 Ray 集群的管理员，其他所有方法可能都不会引起你的兴趣。"

  md: '# External Library Integrations


    # Overview


    While Ray Datasets supports a number of common data processing functionalities
    out of the box, as mentioned above it''s not a replacement for full data processing
    systems. Instead, it''s more focused on performing “last mile” processing such
    as basic data loading, cleaning, and featurization before ML training or inference.


    ![](img/58c832795222840423ffeca1357b40a7_148_0.png)


    Figure 7-3. A typical workflow using Ray for machine learning: use external systems
    for primary data processing and ETL, use Ray Datasets for last-mile preprocessing


    However, there are a number of other more fully-featured DataFrame and relational
    data processing systems that integrate with Ray: - Dask on Ray - RayDP (Spark
    on Ray) - Modin (Pandas on Ray) - Mars on Ray


    These are all standalone data processing libraries that you may be familiar with
    outside the context of Ray. Each of these tools has an integration with Ray core
    that enables more expressive data processing than comes with the built-in Datasets
    while still using Ray''s deployment tooling, scalable scheduling, and shared memory
    object store for exchanging data.'

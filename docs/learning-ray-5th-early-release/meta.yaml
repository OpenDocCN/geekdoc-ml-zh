  md: "+   - You want to run an extremely computationally expensive training function.\
    \ In ML it's not uncommon to run training procedures that take days, if not weeks,\
    \ but let's say you're dealing with just a couple of minutes.\n- As result of\
    \ training, you compute a so-called objective function. Usually you either want\
    \ to maximize your gains or minimize your losses in terms of performance of your\
    \ experiment.\n- The tricky bit is that your training function might depend on\
    \ certain parameters, hyperparameters, that influence the value of your objective\
    \ function.\n- You may have a hunch what individual hyperparameters should be,\
    \ but tuning them all can be difficult. Even if you can restrict these parameters\
    \ to a sensible range, it's usually prohibitive to test a wide range of combinations.\
    \ Your training function is simply too expensive.\n\nWhat can you do to efficiently\
    \ sample hyperparameters and get “good enough” results on your objective? The\
    \ field concerned with solving this problem is called *hyperparameter optimization*\
    \ (HPO), and Ray Tune has an enormous suite of algorithms for tackling it. Let's\
    \ look at a first example of Ray Tune used for the situation we just explained.\
    \ The focus is yet again on Ray and its API, and not on a specific ML task (which\
    \ we simply simulate for now).\n\n*Example 1-7. Minimizing an objective for an\
    \ expensive training function with Ray Tune*\n\n```\nfrom ray import tune\nimport\
    \ math\nimport time\n\ndef training_function(config): ①\n    x, y = config[\"\
    x\"], config[\"y\"]\n    time.sleep(10)\n    score = objective(x, y)\n    tune.report(score=score)\
    \ ②\n\ndef objective(x, y):\n    return math.sqrt((x**2 + y**2)/2) ③\n\nresult\
    \ = tune.run( ④\n    training_function,\n    config={\n        \"x\": tune.grid_search([-1,\
    \ -.5, 0, .5, 1]), ⑤\n        \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n \
    \   })\n\nprint(result.get_best_config(metric=\"score\", mode=\"min\"))\n```"

    \ worker already owns all the information it needs to do so. On top of that, workers\
    \ also have an in-process store for small objects, which has a default limit of\
    \ 100KB. Workers have that store so that small data can be directly accessed and\
    \ stored without incurring communication overhead with the Raylet object store,\
    \ which is reserved for large objects."
  - '[PAGE 45]


    To sum up this discussion about worker nodes, figure Figure 2-2 gives you an overview
    of all involved components.


    ![](img/58c832795222840423ffeca1357b40a7_45_0.png)


    *Figure 2-2. The system components comprising a Ray worker node*


    # ## The Head Node


    We''ve already indicated in Chapter 1 that each Ray cluster has one special node
    called head node. So far you know that this is the node that has the driver process⁸.
    Drivers can submit tasks themselves, but can''t execute them. You also know that
    the head node can have some worker processes, which is important to be able to
    run local clusters consisting of a single node. In other words, the head node
    has everything a worker node has (including a Raylet), but it also has a driver
    process.


    Additionally, the head node comes with a component called *Global Control Store*
    (GCS). The GCS is a key-value store currently implemented in Redis. It''s an important
    component that carries global information about the cluster, such as system-level
    metadata. For instance, it has a table with heart beat signals for each Raylet,
    to ensure they are still reachable. Raylets, in turn, send heart beat signals
    to the GCS to indicate that they are alive. The GCS also stores the locations
    of Ray actors and large objects in respective tables, and knows about the dependencies
    between objects.


    8 In fact, it could have multiple drivers, but this is inessential for our discussion.'
  - '[PAGE 46]


    # Distributed Scheduling and Execution


    Let''s briefly talk about cluster orchestration and how nodes manage, plan and
    execute tasks. When talking about worker nodes, we''ve indicated that there are
    several components to distributing workloads with Ray. Here''s an overview of
    the steps and intricacies involved in this process.


    Distributed memory: The object stores of individual Raylets share their memory
    on a node. But sometimes data needs to be transferred between nodes, which is
    called *distributed object transfer*. This is needed for remote dependency resolution,
    so that workers have the data they need to run tasks.


    *Communication*

    Most of the communication in a Ray cluster, such as object transfer, takes place
    via the `gRPC` protocol.


    *Resource management and fulfillment*

    On a node, Raylets are responsible to grant resources and *lease* worker processes
    to task owners. All schedulers across nodes form the distributed scheduler. Through
    communication with the GCS, local schedulers know about other nodes'' resources.


    *Task execution*

    Once a task has been submitted for execution, all its dependencies (local and
    remote data) need to be resolved, e.g. by retrieving large data from the object
    store, before execution can begin.


    If the last few sections seem a bit involved technically, that''s because they
    are. In my view it''s important to understand the basic patterns and ideas of
    the software you''re using, but I''ll admit that the details of Ray''s architecture
    can be a bit tough to wrap your head around in the beginning. In fact, it''s one
    of Ray''s design principles to trade-off usability for architectural complexity.
    If you want to delve deeper into Ray''s architecture, a good place to start is
    [their architecture white paper](https://docs.ray.io/en/latest/ray-contribute/whitepaper.html).


    To wrap things up, let''s summarize all we know in a concise architecture overview
    with figure Figure 2-3:'
  - '[PAGE 47]


    ![](img/58c832795222840423ffeca1357b40a7_47_0.png)


    Figure 2-3. An overview of Ray''s architectural components


    # Systems Related to Ray


    With the architecture and functionality of it in mind, how does Ray relate to
    other systems? We''re not going into the details here, but just touch on the most
    important topics in broad strokes. Ray can be used as a parallelization framework
    for Python, and shares properties with tools like celery or multiprocessing. In
    fact, there''s a drop-in replacement for the latter implemented in Ray. Ray is
    also related to data processing frameworks such as Spark, Dask, Flink or MARS.
    We''ll explore this relationship in ???, when talking about Ray''s ecosystem.


    As a distributed computing tool, Ray also has to deal with the problems of cluster
    management and orchestration, and we''ll see how Ray does that in relation to
    tools like Kubernetes in ???. Since Ray is implementing the actor model of concurrency,
    it''s also interesting to explore its relationship with frameworks like Akka.
    Lastly, since Ray banks on a performant, low-level API for communication, there''s
    a certain rela-'
  - '[PAGE 48]


    tionship with high-performance computing (HPC) frameworks and communication protocols
    like the message passing interface (MPI).


    # Summary


    You''ve seen the basics of the Ray API in action in this chapter. You know how
    to put data to the object store, and how to get it back. Also, you''re familiar
    with declaring Python functions as Ray tasks with the `@ray.remote` decorator,
    and you know how to run them on a Ray cluster with the `.remote()` call. In much
    the same way, you understand how to declare a Ray actor from a Python class, how
    to instantiate it and leverage it for stateful, distributed computations.


    On top of that, you also know the basics of Ray clusters. After starting them
    with `ray.init(...)` you know that you can submit jobs consisting of tasks to
    your cluster. The driver process, sitting on the head node, will then distribute
    the tasks to the worker nodes. Raylets on each node will schedule the tasks and
    worker processes will execute them. This quick tour through Ray core should get
    you started with writing your own distributed programs, and in the next chapter
    we''ll test your knowledge by implementing a basic machine learning application
    together.'

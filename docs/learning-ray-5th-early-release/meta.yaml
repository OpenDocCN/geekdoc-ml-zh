  - "[PAGE 22]\n\ning performance, you should see the agent struggle with the pendulum\
    \ exercise. We could have done much better, and if you're interested to scan Ray's\
    \ tuned examples for the Pendulum-v1 environment, you'll find an abundance of\
    \ solutions to this exercise. The point of this example was to show you how simple\
    \ it can be to train and evaluate reinforcement learning tasks with RLlib, using\
    \ just two command line calls to rllib.\n\n# Distributed training with Ray Train\n\
    \nRay RLlib is dedicated to reinforcement learning, but what do you do if you\
    \ need to train models for other types of machine learning, like supervised learning?\
    \ You can use another Ray library for distributed training in this case, called\
    \ *Ray Train*. At this point, we don't have built up enough knowledge of frameworks\
    \ such as TensorFlow to give you a concrete and informative example for Ray Train.\
    \ We'll discuss all of that in [Chapter 6](#), when it's time to. But we can at\
    \ least roughly sketch what a distributed training \"wrapper\" for an ML model\
    \ would look like, which is simple enough conceptually:\n\n*Example 1-6.*\n\n\
    ```\nfrom ray.train import Trainer\n\ndef training_function():\n    pass\n\ntrainer\
    \ = Trainer(backend=\"tensorflow\", num_workers=4)\ntrainer.start()\n\nresults\
    \ = trainer.run(training_function)\ntrainer.shutdown()\n```\n\n+   1. First, define\
    \ your ML model training function. We simply pass here.\n2. Then initialize a\
    \ Trainer instance with TensorFlow as the backend.\n3. Lastly, scale out your\
    \ training function on a Ray cluster.\n\nIf you're interested in distributed training,\
    \ you could jump ahead to [Chapter 6](#).\n\n# Hyperparameter Tuning\n\nNaming\
    \ things is hard, but the Ray team hit the spot with *Ray Tune*, which you can\
    \ use to tune all sorts of parameters. Specifically, it was built to find good\
    \ hyperparameters for machine learning models. The typical setup is as follows:"
  - "[PAGE 23]\n\n+   - You want to run an extremely computationally expensive training\
    \ function. In ML it's not uncommon to run training procedures that take days,\
    \ if not weeks, but let's say you're dealing with just a couple of minutes.\n\
    - As result of training, you compute a so-called objective function. Usually you\
    \ either want to maximize your gains or minimize your losses in terms of performance\
    \ of your experiment.\n- The tricky bit is that your training function might depend\
    \ on certain parameters, hyperparameters, that influence the value of your objective\
    \ function.\n- You may have a hunch what individual hyperparameters should be,\
    \ but tuning them all can be difficult. Even if you can restrict these parameters\
    \ to a sensible range, it's usually prohibitive to test a wide range of combinations.\
    \ Your training function is simply too expensive.\n\nWhat can you do to efficiently\
    \ sample hyperparameters and get “good enough” results on your objective? The\
    \ field concerned with solving this problem is called *hyperparameter optimization*\
    \ (HPO), and Ray Tune has an enormous suite of algorithms for tackling it. Let's\
    \ look at a first example of Ray Tune used for the situation we just explained.\
    \ The focus is yet again on Ray and its API, and not on a specific ML task (which\
    \ we simply simulate for now).\n\n*Example 1-7. Minimizing an objective for an\
    \ expensive training function with Ray Tune*\n\n```\nfrom ray import tune\nimport\
    \ math\nimport time\n\ndef training_function(config): ①\n    x, y = config[\"\
    x\"], config[\"y\"]\n    time.sleep(10)\n    score = objective(x, y)\n    tune.report(score=score)\
    \ ②\n\ndef objective(x, y):\n    return math.sqrt((x**2 + y**2)/2) ③\n\nresult\
    \ = tune.run( ④\n    training_function,\n    config={\n        \"x\": tune.grid_search([-1,\
    \ -.5, 0, .5, 1]), ⑤\n        \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n \
    \   })\n\nprint(result.get_best_config(metric=\"score\", mode=\"min\"))\n```"
  - '[PAGE 24]


    +   1. We simulate an expensive training function that depends on two hyperparameters
    x and y, read from a config.

    2. After sleeping for 5 seconds to simulate training and computing the objective
    we report back the score to tune.

    3. The objective computes the mean of the squares of x and y and returns the square
    root of this term. This type of objective is fairly common in ML.

    4. We then use tune.run to initialize hyperparameter optimization on our training_function.

    5. A key part is to provide a parameter space for x and y for tune to search over.


    The Tune example in Example 1-7 finds the best possible choices of parameters
    x and y for a training_function with a given objective we want to minimize. Even
    though the objective function might look a little intimidating at first, since
    we compute the sum of squares of x and y, all values will be non-negative. That
    means the smallest value is obtained at x=0 and y=0 which evaluates the objective
    function to 0.


    We do a so-called grid search over all possible parameter combinations. As we
    explicitly pass in five possible values for both x and y that''s a total of 25
    combinations that get fed into the training function. Since we instruct training_function
    to sleep for 10 seconds, testing all combinations of hyperparameters sequentially
    would take more than four minutes total. Since Ray is smart about parallelizing
    this workload, on my laptop this whole experiment only takes about 35 seconds.
    Now, imagine each training run would have taken several hours, and we''d have
    20 instead of two hyperparameters. That makes grid search infeasible, especially
    if you don''t have educated guesses on the parameter range. In such situations
    you''ll have to use more elaborate HPO methods from Ray Tune, as discussed in
    Chapter 5.


    # Model Serving


    The last of Ray''s high-level libraries we''ll discuss specializes on model serving
    and is simply called Ray Serve. To see an example of it in action, you need a
    trained ML model to serve. Luckily, nowadays you can find many interesting models
    on the internet that have already been trained for you. For instance, Hugging
    Face has a variety of models available for you to download directly in Python.
    The model we''ll use is a language model called GPT-2 that takes text as input
    and produces text to continue or complete the input. For example, you can prompt
    a question and GPT-2 will try to complete it.'
  - "[PAGE 25]\n\nServing such a model is a good way to make it accessible. You may\
    \ not now how to load and run a TensorFlow model on your computer, but you do\
    \ now how to ask a question in plain English. Model serving hides the implementation\
    \ details of a solution and lets users focus on providing inputs and understanding\
    \ outputs of a model.\n\nTo proceed, make sure to run `pip install transformers`\
    \ to install the Hugging Face library that has the model we want to use. With\
    \ that we can now import and start an instance of Ray's serve library, load and\
    \ deploy a GPT-2 model and ask it for the meaning of life, like so:\n\nExample\
    \ 1-8.\n\n```\nfrom ray import serve\nfrom transformers import pipeline\nimport\
    \ requests\n\nserve.start() ❶\n\n@serve.deployment ❷\ndef model(request):\n  \
    \  language_model = pipeline(\"text-generation\", model=\"gpt2\") ❸\n    query\
    \ = request.query_params[\"query\"]\n    return language_model(query, max_length=100)\
    \ ❹\n\nmodel.deploy() ❺\n\nquery = \"What's the meaning of life?\"\nresponse =\
    \ requests.get(f\"http://localhost:8000/model?query={query}\") ❻\nprint(response.text)\n\
    ```\n\n+   ❶ We start serve locally.\n❷ The @serve.deployment decorator turns\
    \ a function with a request parameter into a serve deployment.\n❸ Loading language_model\
    \ inside the model function for every request is inefficient, but it's the quickest\
    \ way to show you a deployment.\n❹ We ask the model to give us at most 100 characters\
    \ to continue our query.\n❺ Then we formally deploy the model so that it can start\
    \ receiving requests over HTTP.\n❻ We use the indispensable requests library to\
    \ get a response for any question you might have."

- md: "## Ray as Distributed Interface\n\nOne aspect of Ray that’s vastly understated\
    \ in my eyes is that its libraries seamlessly integrate common tools as *backends*.\
    \ Ray often creates common interfaces, instead of trying to create new standards⁸.\
    \ These interfaces allow you to run tasks in a distributed fashion, a property\
    \ most of the respective backends don’t have, or not to the same extent. For instance,\
    \ Ray RLlib and Train are backed by the full power of TensorFlow and PyTorch.\
    \ Ray Tune supports algorithms from practically every notable HPO tool available,\
    \ including Hyperopt, Optuna, Nevergrad, Ax, SigOpt and many others. None of these\
    \ tools are distributed by default, but Tune unifies them in a common interface.\
    \ Ray Serve can be used with frameworks such as FastAPI, and Ray Data is backed\
    \ by Arrow and comes with many integrations to other frameworks, such as Spark\
    \ and Dask. Overall this seems to be a robust design pattern that can be used\
    \ to extend current Ray projects or integrate new backends in the future.\n\n\
    ## Summary\n\nTo sum up what we’ve discussed in this chapter, Figure 1-4 gives\
    \ you an overview of the three layers of Ray as we laid them out. Ray’s core distributed\
    \ execution engine sits at the center of the framework. For practical data science\
    \ workflows you can use Ray Data for data processing, Ray RLlib for reinforcement\
    \ learning, Ray Train for distributed model training, Ray Tune for hyperparameter\
    \ tuning and Ray Serve for model serving. You’ve seen examples for each of these\
    \ libraries and have an idea of what their APIs entail. On top of that, Ray’s\
    \ ecosystem has many extensions that we’ll look more into later on. Maybe you\
    \ can already spot a few tools you know and like in Figure 1-4⁹?\n\n8 Before the\
    \ deep learning framework Keras became an official part of a corporate flagship,\
    \ it started out as a convenient API specification for various lower-level frameworks\
    \ such as Theano, CNTK, or TensorFlow. In that sense Ray RLlib has the chance\
    \ to become Keras for RL. Ray Tune might just be Keras for HPO. The missing piece\
    \ for more adoption is probably a more elegant API for both.\n\n9 Note that “Ray\
    \ Train” has been called “raysgd” in older versions of Ray, and does not have\
    \ a new logo yet.\n\n![](img/58c832795222840423ffeca1357b40a7_28_0.png)\n\nFigure\
    \ 1-4. Ray in three layers: its core API, the libraries RLlib, Tune, Ray Train,\
    \ Ray Serve, Ray Data, and some of the many third-party integrations\n\n# CHAPTER\
    \ 2\nGetting Started With Ray Core\n\n> **A Note for Early Release Readers**\n\
    > With Early Release ebooks, you get books in their earliest form—the author’s\
    \ raw and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nFor a book on distributed\
    \ Python, it’s not without a certain irony that Python on its own is largely ineffective\
    \ for distributed computing. Its interpreter is effectively single threaded which\
    \ makes it difficult to, for example, leverage multiple CPUs on the same machine,\
    \ let alone a whole cluster of machines, using plain Python. That means you need\
    \ extra tooling, and luckily the Python ecosystem has some options for you. For\
    \ instance, libraries like multiprocessing can help you distribute work on a single\
    \ machine, but not beyond.\n\nIn this chapter you’ll understand how Ray core handles\
    \ distributed computing by spinning up a local cluster, and you’ll learn how to\
    \ use Ray’s lean and powerful API to parallelize some interesting computations.\
    \ For instance, you’ll build an example that runs a data-parallel task efficiently\
    \ and asynchronously on Ray, in a convenient way that’s not easily replicable\
    \ with other tooling. We discuss how tasks and actors work as distributed versions\
    \ of functions and classes in Python. You’ll also learn about all the fundamental\
    \ concepts underlying Ray and what its architecture looks like. In other words,\
    \ we’ll give you a look under the hood of Ray’s engine.\n\n## An Introduction\
    \ To Ray Core\n\nThe bulk of this chapter is an extended Ray core example that\
    \ we’ll build together. Many of Ray’s concepts can be explained with a good example,\
    \ so that’s exactly what we’ll do. As before, you can follow this example by typing\
    \ the code yourself (which is highly recommended), or by following the notebook\
    \ for this chapter.\n\nIn Chapter 1 we’ve introduced you to the very basics of\
    \ Ray clusters and showed you how to start a local cluster simply by typing\n\n\
    Example 2-1.\n\n```\nimport ray\nray.init()\n```\n\nYou’ll need a running Ray\
    \ cluster to run the examples in this chapter, so make sure you’ve started one\
    \ before continuing. The goal of this section is to give you a quick introduction\
    \ to the Ray Core API, which we’ll simply refer to as the Ray API from now on.\n\
    \nAs a Python programmer, the great thing about the Ray API is that it hits so\
    \ close to home. It uses familiar concepts such as decorators, functions and classes\
    \ to provide you with a fast learning experience. The Ray API aims to provide\
    \ a universal programming interface for distributed computing. That’s certainly\
    \ no easy feat, but I think Ray succeeds in this respect, as it provides you with\
    \ good abstractions that are intuitive to learn and use. Ray’s engine does all\
    \ the heavy lifting for you in the background. This design philosophy is what\
    \ enables Ray to be used with existing Python libraries and systems.\n\n## A First\
    \ Example Using the Ray API\n\nTo give you an example, take the following function\
    \ which retrieves and processes data from a database. Our dummy database is a\
    \ plain Python list containing the words of the title of this book. We act as\
    \ if retrieving an individual item from this database and further processing it\
    \ is expensive by letting Python sleep.\n\nExample 2-2.\n\n```\nimport time\n\n\
    database = [\n    \"Learning\", \"Ray\",\n    \"Flexible\", \"Distributed\", \"\
    Python\", \"for\", \"Data\", \"Science\"\n]\n\ndef retrieve(item):\n    time.sleep(item\
    \ / 10.)\n    return item, database[item]\n```\n\n1. A dummy database containing\
    \ string data with the title of this book.\n2. We emulate a data-crunching operation\
    \ that takes a long time.\n\nOur database has eight items, from database[0] for\
    \ “Learning” to database[7] for “Science”. If we were to retrieve all items sequentially,\
    \ how long should that take? For the item with index 5 we wait for half a second\
    \ (5 / 10.) and so on. In total, we can expect a runtime of around (0+1+2+3+4+5+6+7)/10.\
    \ = 2.8 seconds. Let’s see if that’s what we actually get:\n\nExample 2-3.\n\n\
    ```\ndef print_runtime(input_data, start_time, decimals=1):\n    print(f'Runtime:\
    \ {time.time() - start_time:.{decimals}f} seconds, data:')\n    print(*input_data,\
    \ sep=\"\\n\")\n\nstart = time.time()\ndata = [retrieve(item) for item in range(8)]\
    \ ❶\nprint_runtime(data, start) ❷\n```\n\n1. We use a list comprehension to retrieve\
    \ all eight items.\n2. Then we unpack the data to print each item on its own line.\n\
    \nIf you run this code, you should see the following output:\n\n```\nRuntime:\
    \ 2.8 seconds, data:\n(0, 'Learning')\n(1, 'Ray')\n(2, 'Flexible')\n(3, 'Distributed')\n\
    (4, 'Python')\n(5, 'for')\n(6, 'Data')\n(7, 'Science')\n```\n\nWe cut off the\
    \ output of the program after one decimal number. There’s a little overhead that\
    \ brings the total closer to 2.82 seconds. On your end this might be slightly\
    \ less, or much more, depending on your computer. The important take-away is that\
    \ our naive Python implementation is not able to run this function in parallel.\
    \ This may not come as a surprise to you, but you could have at least suspected\
    \ that Python list comprehensions are more efficient in that regard. The runtime\
    \ we got is pretty much the worst case scenario, namely the 2.8 seconds we calculated\
    \ prior to running the code. If you think about it, it might even be a bit frustrating\
    \ to see that a program that essentially sleeps most of its runtime is that slow\
    \ overall. Ultimately you can blame the Global Interpreter Lock (GIL) for that,\
    \ but it gets enough of it already."

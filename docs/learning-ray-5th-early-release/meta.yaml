  md: "# Example 1-1.\n\n```\nimport ray\nray.init()\n```\n\nWith those two lines\
    \ of code you've started a Ray cluster on your local machine. This cluster can\
    \ utilize all the cores available on your computer as workers. In this case you\
    \ didn't provide any arguments to the `init` function. If you wanted to run Ray\
    \ on a “real” cluster, you'd have to pass more arguments to `init`. The rest of\
    \ your code would stay the same.\n\nAfter running this code you should see output\
    \ of the following form (we use ellipses to remove the clutter):\n\n```\n... INFO\
    \ services.py:1263 -- View the Ray dashboard at http://127.0.0.1:8265\n{'node_ip_address':\
    \ '192.168.1.41',\n 'raylet_ip_address': '192.168.1.41',\n 'redis_address': '192.168.1.41:6379',\n\
    \ 'object_store_address': '.../sockets/plasma_store',\n 'raylet_socket_name':\
    \ '.../sockets/raylet',\n 'webui_url': '127.0.0.1:8265',\n 'session_dir': '...',\n\
    \ 'metrics_export_port': 61794,\n 'node_id': '...'}\n```\n\nThis indicates that\
    \ your Ray cluster is up and running. As you can see from the first line of the\
    \ output, Ray comes with its own, pre-packaged dashboard. In all likelihood you\
    \ can check it out at `http://127.0.0.1:8265`, unless your output shows a different\
    \ port. If you want you can take your time to explore the dashboard for a little.\
    \ For instance, you should see all your CPU cores listed and the total utilization\
    \ of your (trivial) Ray application. We'll come back to the dashboard in later\
    \ chapters.\n\nWe're not quite ready to dive into all the details of a Ray cluster\
    \ here. To jump ahead just a little, you might see the `raylet_ip_address`, which\
    \ is a reference to a so-called *Raylet*, which is responsible for scheduling\
    \ tasks on your worker nodes. Each Raylet has a store for distributed objects,\
    \ which is hinted at by the `object_store_address` above. Once tasks are scheduled,\
    \ they get executed by worker processes. In Chapter 2 you'll get a much better\
    \ understanding of all these components and how they make up a Ray cluster.\n\n\
    Before moving on, we should also briefly mention that the Ray core API is very\
    \ accessible and easy to use. But since it is also a rather low-level interface,\
    \ it takes time to build interesting examples with it. Chapter 2 has an extensive\
    \ first example to get you started with the Ray core API, and in Chapter 3 you'll\
    \ see how to build a more interesting Ray application for reinforcement learning."

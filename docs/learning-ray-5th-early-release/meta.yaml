    \ In the first chapter we simply referenced the Pendulum-v1 environment from by\
    \ *name* in a YAML file, along with other RL training configuration. This time\
    \ around we want to bring our own `gym` environment class, namely the class `GymEnvironment`\
    \ that we defined in `maze_gym_env.py`. To specify this class in Ray RLlib, you\
    \ use the full qualifying name of the class from where you're referencing it,\
    \ i.e. in our case `maze_gym_env.GymEnvironment`. If you had a more complicated\
    \ Python project and your environment is stored in another module, you'd simply\
    \ add the module name accordingly.\n\nThe following YAML file specifies the minimal\
    \ configuration needed to train an RLlib algorithm on the `GymEnvironment` class.\
    \ To align as closely as possible with our experiment from Chapter 3, in which\
    \ we used Q-learning, we use DQN as the algorithm for our training run. Also,\
    \ to make sure we can control the time of training, we set an explicit stop condition,\
    \ namely by setting `timesteps_total` to 10000.\n\n```\n# maze.yml\nmaze_env:\n\
    \    env: maze_gym_env.GymEnvironment ①\n    run: DQN\n    checkpoint_freq: 1\
    \ ②\n    stop:\n        timesteps_total: 10000 ③\n```\n\n+   ① We specify the\
    \ relative Python path to our environment class here.\n② We store checkpoints\
    \ of our model after each training iteration.\n③ We can also specify a stopping\
    \ condition for training, here a maximum of 10000 steps.\n\nAssuming you store\
    \ this configuration in a file called `maze.yml` you can now kick off an RLlib\
    \ training run by running the following `train` command:\n\n```\nrllib train -f\
    \ maze.yml\n```\n\nThis single line of code basically takes care of everything\
    \ we did in Chapter 3, but better. It runs a more sophisticated version of Q-Learning\
    \ for us (DQN), takes care of scaling out to multiple workers under the hood,\
    \ and even creates checkpoints of the algorithm automatically for us.\n\nFrom\

- md: "The length of the experiences is the number of steps we took to finish the\
    \ game.\n\nApart from seeing the trained policy crush the maze problem ten times\
    \ in a row, as we hoped it would, you should also see the following prompt:\n\n\
    ```\n8.0 steps on average for a total of 10 episodes.\n```\n\nIn other words,\
    \ the trained policy is able to find optimal solutions for the maze game. That\
    \ means you've successfully implemented your first RL algorithm from scratch!\n\
    \nWith the understanding you've built up by now, do you think placing the seeker\
    \ into randomized starting positions and then running this evaluation function\
    \ would still work? Why don't you go ahead and make the changes necessary for\
    \ that?\n\nAnother interesting question to ask yourself is what assumptions went\
    \ into the algorithm we used. For instance, it's clearly a prerequisite for the\
    \ algorithm that all state-action pairs can be tabulated. Do you think this would\
    \ still work well if we had millions of states and thousands of actions?\n\n##\
    \ Building a Distributed Ray App\n\nLet's take a step back here. If you're an\
    \ RL expert, you'll know what we've been doing the whole time. If you're completely\
    \ new to RL, you might just be a little overwhelmed. If you're somewhere in between,\
    \ you hopefully like the example but might be wondering how what we've done so\
    \ far relates to Ray. That's a great question. As you'll see shortly, all we need\
    \ to make the above RL experiment a distributed Ray app is writing three short\
    \ code snippets. This is what we're going to do:\n\n- We create a Ray task that\
    \ can initialize a Policy remotely.\n- Then we make the Simulation a Ray actor\
    \ in just a few lines of code.\n- After that we wrap the update_policy function\
    \ in a Ray task.\n- Finally, we define a parallel version of train_policy that's\
    \ structurally identical to its original version.\n\nLet's tackle the first two\
    \ steps of this plan by implementing a create_policy task and a Ray actor called\
    \ SimulationActor:\n\nExample 3-13.\n\n```python\nimport ray\n\nray.init()\nenvironment\
    \ = Environment()\nenv_ref = ray.put(environment) ①\n```\n\n```python\n@ray.remote\n\
    def create_policy():\n    env = ray.get(env_ref)\n    return Policy(env) ②\n```\n\
    \n```python\n@ray.remote\nclass SimulationActor(Simulation): ③\n    \"\"\"Ray\
    \ actor for a Simulation.\"\"\"\n    def __init__(self):\n        env = ray.get(env_ref)\n\
    \        super().__init__(env)\n```\n\n① After initializing it, we put our environment\
    \ into the Ray object store.\n② This remote task returns a new Policy object.\n\
    ③ This Ray actor wraps our Simulation class in a straightforward way.\n\nWith\
    \ the foundations on Ray Core you've developed in chapter Chapter 2 you should\
    \ have no problems reading this code. It might take some getting used to writing\
    \ it yourself, but conceptually you should be on top of this example.\n\nMoving\
    \ on, let's define a distributed update_policy_task Ray task and then wrap everything\
    \ (two tasks and one actor) in a train_policy_parallel function that distributes\
    \ this RL workload on your local Ray cluster:\n\nExample 3-14.\n\n```python\n\
    @ray.remote\ndef update_policy_task(policy_ref, experiences_list):\n    \"\"\"\
    Remote Ray task for updating a policy with experiences in parallel.\"\"\"\n  \
    \  [update_policy(policy_ref, ray.get(xp)) for xp in experiences_list] ①\n   \
    \ return policy_ref\n```\n\n```python\ndef train_policy_parallel(num_episodes=1000,\
    \ num_simulations=4):\n    \"\"\"Parallel policy training function.\"\"\"\n  \
    \  policy = create_policy.remote() ②\n    simulations = [SimulationActor.remote()\
    \ for _ in range(num_simulations)] ③\n\n    for _ in range(num_episodes):\n  \
    \      experiences = [sim.rollout.remote(policy) for sim in simulations] ④\n \
    \       policy = update_policy_task.remote(policy, experiences) ⑤\n\n    return\
    \ ray.get(policy) ⑥\n```\n\n1. This task defers to the original `update_policy`\
    \ function by passing a reference to a policy and experiences retrieved from the\
    \ object store.\n2. To train in parallel, we first create a policy remotely, which\
    \ returns a reference we call `policy`.\n3. Instead of one simulation, we create\
    \ four simulation actors.\n4. Experiences now get collected from remote roll-outs\
    \ on simulation actors.\n5. Then we can update our policy remotely. Note that\
    \ `experiences` is a nested list of experiences.\n6. Finally, we return the trained\
    \ policy by retrieving it from the object store again.\n\nThis allows us to take\
    \ the last step and run the training procedure in parallel and then evaluate the\
    \ resulting as before.\n\nExample 3-15.\n\n```python\nparallel_policy = train_policy_parallel()\n\
    evaluate_policy(environment, parallel_policy)\n```\n\nThe result of those two\
    \ lines is the same as before, when we ran the serial version of the RL training\
    \ for the maze. I hope you appreciate how `train_policy_parallel` has the exact\
    \ same high-level structure as `train_policy`. It’s a good exercise to compare\
    \ the two line-by-line. Essentially, all it took to parallelize the training process\
    \ was to use the `ray.remote` decorator three times in a suitable way. Of course,\
    \ you need some experience to get this right. But notice how little time we spent\
    \ on thinking about distributed computing, and how much time we could spend on\
    \ the actual application code. We didn’t need to adopt an entirely new programming\
    \ paradigm and could simply approach the problem in the most natural way. Ultimately,\
    \ that’s what you want — and Ray is great at giving you this kind of flexibility.\n\
    \nTo wrap things up, let’s have a quick look at the task execution graph of the\
    \ Ray application that we’ve just built. To recap, what we did was:\n\n- The `train_policy_parallel`\
    \ function creates several `SimulationActor` actors and a policy with `create_policy`.\n\
    - The simulation actors create roll-outs with the policy and thereby collect experiences\
    \ that `update_policy_task` uses to update the policy.\n- This works, because\
    \ of the way updating the policy is designed. It doesn’t matter if the experiences\
    \ were collected by one or multiple simulations.\n- The rolling out and updating\
    \ continues until we reached the number of episodes we wanted to train for, then\
    \ the final `trained_policy` is returned.\n\nFigure 3-1 summarizes this task graph\
    \ in a compact way:\n\n![Figure 3-1. Parallel training of a reinforcement learning\
    \ policy with Ray](img/58c832795222840423ffeca1357b40a7_66_0.png)\n\nAn interesting\
    \ side note about the running example of this chapter is that it’s an implementation\
    \ of the pseudo-code example used to illustrate the flexibility of Ray in the\
    \ initial paper by its creators. That paper has a figure similar to Figure 3-1\
    \ and is worth reading for context.\n\n## Recapping RL Terminology\n\nBefore we\
    \ wrap up this chapter, let’s discuss the concepts we’ve encountered in the maze\
    \ example in a broader context. Doing so will prepare you for more complex RL\
    \ settings in the next chapter and show you where we simplified things a little\
    \ for the running example of this chapter.\n\nEvery RL problem starts with the\
    \ formulation of an *environment*, which describes the dynamics of the “game”\
    \ you want to play. The environment hosts a player or *agent* which interacts\
    \ with its environment through a simple interface. The agent can request information\
    \ from the environment, namely its current *state* within the environment, the\
    \ *reward* it has received in this state, and whether the game is *done* or not.\
    \ In observing states and rewards, the agent can learn to make decisions based\
    \ on the information it receives. Specifically, the agent will emit an *action*\
    \ that can be executed by the environment by taking the next step.\n\nThe mechanism\
    \ used by an agent to produce actions for a given state is called a *policy*,\
    \ and we will sometimes say that the agent follows a given policy. Given a policy,\
    \ we can simulate or *roll-out* a few steps or an entire game using said policy.\
    \ During a roll-out we can collect *experiences*, which we collect information\
    \ about the current state and reward, the next action and the resulting state.\
    \ An entire sequence of steps from start to finish is referred to as an *episode*,\
    \ and the environment can be *reset* to its initial state to start a new episode.\n\
    \nThe policy we used in this chapter was based on the simple idea of tabulating\
    \ *state-action values* (also called *Q-values*), and the algorithm used to update\
    \ the policy from the experiences collected during roll-outs is called *Q-learning*.\
    \ More generally, you can consider the state-action table we implemented as the\
    \ *model* used by the policy. In the next chapter you will see examples of more\
    \ complex models, such as a neural network to learn state-action values. The policy\
    \ can decide to *exploit* what it has learnt about the environment by choosing\
    \ the best available value of its model, or *explore* the environment by choosing\
    \ a random action.\n\nMany of the basic concepts introduced here hold for any\
    \ RL problem, but we’ve made a few simplifying assumptions. For instance, there\
    \ could be *multiple agents* acting in the environment (imagine having multiple\
    \ seekers competing for reaching the goal first), and we’ll look into so-called\
    \ multi-agent environments and multi-agent RL in the next chapter. Also, we assumed\
    \ that the *action space* of an agent was *discrete*, meaning that the agent could\
    \ only take a fixed set of actions. You can, of course, also"

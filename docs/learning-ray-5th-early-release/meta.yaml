  md: "```\n@ray.remote\ndef create_policy():\n    env = ray.get(env_ref)\n    return\
    \ Policy(env) ②\n```\n\n```\n@ray.remote\nclass SimulationActor(Simulation): ③\n\
    \    \"\"\"Ray actor for a Simulation.\"\"\"\n    def __init__(self):\n      \
    \  env = ray.get(env_ref)\n        super().__init__(env)\n```\n\n+   ① After initializing\
    \ it, we put our environment into the Ray object store.\n② This remote task returns\
    \ a new Policy object.\n③ This Ray actor wraps our Simulation class in a straightforward\
    \ way.\n\nWith the foundations on Ray Core you've developed in chapter Chapter\
    \ 2 you should have no problems reading this code. It might take some getting\
    \ used to writing it yourself, but conceptually you should be on top of this example.\n\
    \nMoving on, let's define a distributed update_policy_task Ray task and then wrap\
    \ everything (two tasks and one actor) in a train_policy_parallel function that\
    \ distributes this RL workload on your local Ray cluster:\n\n# Example 3-14.\n\
    \n```\n@ray.remote\ndef update_policy_task(policy_ref, experiences_list):\n  \
    \  \"\"\"Remote Ray task for updating a policy with experiences in parallel.\"\
    \"\"\n    [update_policy(policy_ref, ray.get(xp)) for xp in experiences_list]\
    \ ①\n    return policy_ref\n```\n\n```\ndef train_policy_parallel(num_episodes=1000,\
    \ num_simulations=4):\n    \"\"\"Parallel policy training function.\"\"\"\n  \
    \  policy = create_policy.remote() ②\n    simulations = [SimulationActor.remote()\
    \ for _ in range(num_simulations)] ③\n\n    for _ in range(num_episodes):\n  \
    \      experiences = [sim.rollout.remote(policy) for sim in simulations] ④\n \
    \       policy = update_policy_task.remote(policy, experiences) ⑤\n\n    return\
    \ ray.get(policy) ⑥\n```"

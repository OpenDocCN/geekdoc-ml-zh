  md: "# Using Ray’s wait function for non-blocking calls\n\nNote how in Example 2-5\
    \ we used `ray.get(data_references)` to access results. This call is *blocking*,\
    \ which means that our driver has to wait for all the results to be available.\
    \ That’s not a big deal in our case, the program now finishes in under a second.\
    \ But imagine processing of each data item would take several minutes. In that\
    \ case you would want to free up the driver process for other tasks, instead of\
    \ sitting idly by. Also, it would be great to process results as they come in\
    \ (some finish much quicker than others), rather than waiting for all data to\
    \ be processed. One more question to keep in mind is what happens if one of the\
    \ data items can’t be retrieved as expected? Let’s say there’s a deadlock somewhere\
    \ in the database connection. In that case, the driver will simply hang and never\
    \ retrieve all items. For that reason it’s a good idea to work with reasonable\
    \ timeouts. In our scenario, we should not wait longer than 10 times the longest\
    \ data retrieval task before stopping the task. Here’s how you can do that with\
    \ Ray by using wait:\n\nExample 2-7.\n\n```\nstart = time.time()\ndata_references\
    \ = [retrieve_task.remote(item) for item in range(8)]\nall_data = []\n\nwhile\
    \ len(data_references) > 0: ①\n    finished, data_references = ray.wait(data_references,\
    \ num_returns=2, timeout=7.0) ②\n    data = ray.get(finished)\n    print_runtime(data,\
    \ start, 3) ③\n    all_data.extend(data) ④\n```\n\n+   ① Instead of blocking,\
    \ we loop through unfinished data_references.\n② We asynchronously wait for finished\
    \ data with a reasonable timeout. data_references gets overridden here, to prevent\
    \ an infinite loop.\n③ We print results as they come in, namely in blocks of two.\n\
    ④ Then we append new data to the all_data until finished.\n\nAs you can see `ray.wait`\
    \ returns two arguments, namely finished data and futures that still need to be\
    \ processed. We use the `num_returns` argument, which defaults to 1, to let wait\
    \ return whenever a new pair of data items is available. On my laptop this results\
    \ in the following output:\n\n```\nRuntime: 0.108 seconds, data:\n(0, 'Learning')\n\
    (1, 'Ray')\nRuntime: 0.308 seconds, data:\n```"

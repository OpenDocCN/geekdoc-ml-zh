    \ and then we're tuning a Keras model using Optuna through Tune.\n\n### Using\
    \ RLlib with Tune\n\nRLlib and Tune have been designed to work together, so you\
    \ can quite easily set up an HPO experiment for your existing RLlib code. In fact,\
    \ RLlib Trainers can be passed into the first argument of tune.run, as Trainable.\
    \ You can choose between the actual Trainer class, like DQNTrainer, or its string\
    \ representation, like \"DQN\". As Tune metric you can pass any metric tracked\
    \ by your RLlib experiment, for instance \"episode_reward_mean\". And the config\
    \ argument to tune.run is just your RLlib Trainer configuration, but you can use\
    \ the full power of Tune's search space API to sample hyperparameters like the\
    \ learning rate or training batch size¹. Here's a full example of what we just\
    \ described, running a tuned RLlib experiment on the CartPole-v0 gym environment:\n\
    \nExample 5-16.\n\n```\nfrom ray import tune\n\nanalysis = tune.run(\n    \"DQN\"\

  md: "# Q-Learning\n\nThe Q-Learning algorithm we just implemented is often the first\
    \ algorithm taught in RL classes, mostly because it is relatively easy to reason\
    \ about. You collect and tabulate experience data that shows you how well state-action\
    \ pairs work, and update the table according to the Q-learning update rule.\n\n\
    For RL problems that either have a huge number of states or actions, the Q-table\
    \ can become excessively large. The algorithm then becomes inefficient, because\
    \ it would take too much time to collect enough experience data for all (relevant)\
    \ state-action pairs.\n\nOne way to address this issue is to use a neural network\
    \ to approximate the Q-table. By this we mean that you can employ a deep neural\
    \ network to learn a function that maps states to actions. This approach is called\
    \ Deep Q-Learning and the networks used for learning are called Deep Q-Networks\
    \ (DQN). From Chapter 4 on out we will exclusively use deep learning to tackle\
    \ RL problems in this book.\n\nNow that we have a trained policy, let's see how\
    \ well it performs. We've run random policies twice before in this chapter, just\
    \ to get an idea of how well they work for the maze problem. But let's now properly\
    \ evaluate our trained policy on several games and see how it does on average.\
    \ Specifically, we'll run our simulation for a couple of episodes and count how\
    \ many steps it took per episode to reach the goal. So, let's implement an evaluate_policy\
    \ function that does precisely that:\n\nExample 3-12.\n\n```\ndef evaluate_policy(env,\
    \ policy, num_episodes=10):\n    \"\"\"Evaluate a trained policy through rollouts.\"\
    \"\"\n    simulation = Simulation(env)\n    steps = 0\n\n    for _ in range(num_episodes):\n\
    \        experiences = simulation.rollout(policy, render=True, explore=False)\
    \ ❶\n        steps += len(experiences) ❷\n\n    print(f\"{steps / num_episodes}\
    \ steps on average \"\n          f\"for a total of {num_episodes} episodes.\"\
    )\n\n    return steps / num_episodes\n\nevaluate_policy(environment, trained_policy)\n\
    ```\n\n❶ This time we set explore to False to fully exploit the learnings of the\
    \ trained policy."

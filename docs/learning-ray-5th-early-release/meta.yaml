    \ a set of hyperparameters that minimizes the result of our objective function.\
    \ To parallelize the objective function, we'll use the ray.remote decorator to\
    \ make our objective a Ray task.\n\nExample 5-2.\n\n```\nimport ray\n\n@ray.remote\n\
    def objective(config): ①\n    environment = Environment()\n    policy = train_policy(\
    \ ②\n        environment, weight=config[\"weight\"], discount_factor=config[\"\
    discount_factor\"]\n    )\n    score = evaluate_policy(environment, policy) ③\n\
    \    return [score, config] ④\n```\n\n+   1. We pass in a dictionary with a hyperparameter\
    \ sample into our objective.\n2. Then we train our RL policy using the chosen\
    \ hyperparameters."

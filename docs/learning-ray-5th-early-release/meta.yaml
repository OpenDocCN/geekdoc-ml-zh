    \ 0.9 * value + 0.1 * next_max 呢？这里，0.9 和 0.1 这两个值的选择有些随意，唯一重要的是第一个值足够高，以反映我们保留旧值的偏好，并且两个权重之和为\
    \ 1。这个公式是一个很好的起点，但问题在于我们完全没有考虑从奖励中获得的关键信息。事实上，我们应该比预测的 next_max 值更信任当前的奖励值，因此对后者进行一点折扣是个好主意，比如打九折。更新状态-动作值将如下所示：\n\
    \n```\nnew_value = 0.9 * value + 0.1 * (reward + 0.9 * next_max)\n```\n\n根据你对这种推理的经验水平，最后几段可能需要消化很多。好消息是，如果你已经理解了到目前为止的解释，本章的其余部分对你来说可能会很容易。从数学上讲，这是本示例中最后一个（也是唯一一个）难点。如果你以前使用过\
    \ RL，你到现在应该已经注意到这是所谓的 Q-Learning 算法的实现。它之所以这样命名，是因为状态-动作表可以被描述为一个函数 Q(state, action)，该函数返回这些对的值。\n\
    \n我们快完成了，所以让我们通过为策略和收集的经验实现一个 update_policy 函数来形式化这个过程：\n\n示例 3-10。\n\n```\nimport\
    \ numpy as np\n\ndef update_policy(policy, experiences, weight=0.1, discount_factor=0.9):\n\
    \    \"\"\"Updates a given policy with a list of (state, action, reward, state)\
    \ experiences.\"\"\"\n    for state, action, reward, next_state in experiences:\
    \ ①\n        next_max = np.max(policy.state_action_table[next_state]) ②\n    \
    \    value = policy.state_action_table[state][action] ③\n        new_value = (1\
    \ - weight) * value + weight * (reward + discount_factor * next_max) ④\n     \
    \   policy.state_action_table[state][action] = new_value ⑤\n```\n\n+   1. 我们按顺序遍历所有经验。\n\
    2. 然后我们选择下一个状态中所有可能动作的最大值。\n3. 然后我们提取当前的状态-动作值。\n4. 新值是旧值和预期值的加权和，预期值是当前奖励和折扣后的\
    \ next_max 之和。\n5. 更新后，我们设置新的 state_action_table 值。\n\n有了这个函数，训练策略以做出更好的决策就变得非常简单。我们可以使用以下过程：\n\
    \n- 初始化一个策略和一个模拟。\n- 多次运行模拟，假设总共运行 10000 次。\n- 对于每场游戏，首先通过运行一次推演来收集经验。\n- 然后通过调用\
    \ update_policy 来更新收集到的经验的策略。\n\n就是这样！下面的 train_policy 函数直接实现了上述过程。\n\n示例 3-11。\n\
    \n```\ndef train_policy(env, num_episodes=10000, weight=0.1, discount_factor=0.9):\n\
    \    \"\"\"Training a policy by updating it with rollout experiences.\"\"\"\n\
    \    policy = Policy(env)\n    sim = Simulation(env)\n    for _ in range(num_episodes):\n\
    \        experiences = sim.rollout(policy) ①\n        update_policy(policy, experiences,\
    \ weight, discount_factor) ②\n\n    return policy\n\ntrained_policy = train_policy(environment)\
    \ ③\n```\n\n+   ① 为每场游戏收集经验。\n② 用这些经验更新我们的策略。\n③ 最后，为我们之前的环境训练并返回一个策略。\n\n请注意，在\
    \ RL 文献中，对迷宫游戏进行一次完整游玩的高级说法是“episode”。这就是为什么我们在 train_policy 函数中调用参数 num_episodes，而不是\
    \ num_games。\n\n## Q-Learning\n\n我们刚刚实现的 Q-Learning 算法通常是 RL 课程中教授的第一个算法，主要是因为它相对容易理解。你收集并制表经验数据，这些数据显示状态-动作对的效果如何，并根据\
    \ Q-learning 更新规则更新表格。\n\n对于具有大量状态或动作的 RL 问题，Q 表可能会变得过大。然后算法变得低效，因为收集所有（相关）状态-动作对的足够经验数据需要太长时间。\n\
    \n解决这个问题的一种方法是使用神经网络来近似 Q 表。我们的意思是，你可以使用深度神经网络来学习一个将状态映射到动作的函数。这种方法被称为 Deep Q-Learning，用于学习的网络被称为\
    \ Deep Q-Networks (DQN)。从第 4 章开始，本书将专门使用深度学习来解决 RL 问题。\n\n现在我们有了一个训练好的策略，让我们看看它的表现如何。我们在本章中已经运行了两次随机策略，只是为了了解它们在迷宫问题上的效果如何。但现在让我们在几场游戏中正式评估我们训练好的策略，看看它的平均表现如何。具体来说，我们将运行我们的模拟几个\
    \ episode，并计算每个 episode 到达目标所需的步数。所以，让我们实现一个 evaluate_policy 函数来精确地做到这一点：\n\n\
    示例 3-12。\n\n```\ndef evaluate_policy(env, policy, num_episodes=10):\n    \"\"\"\
    Evaluate a trained policy through rollouts.\"\"\"\n    simulation = Simulation(env)\n\
    \    steps = 0\n\n    for _ in range(num_episodes):\n        experiences = simulation.rollout(policy,\
    \ render=True, explore=False) ❶\n        steps += len(experiences) ❷\n\n    print(f\"\
    {steps / num_episodes} steps on average \"\n          f\"for a total of {num_episodes}\
    \ episodes.\")\n\n    return steps / num_episodes\n\nevaluate_policy(environment,\
    \ trained_policy)\n```\n\n❶ 这次我们将 explore 设置为 False，以充分利用训练策略的学习成果。"

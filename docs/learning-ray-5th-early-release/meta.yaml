    \n更一般地说，假设你处于一个给定的状态，你决定采取一个动作，获得一个奖励，然后你进入 next_state。请记住，这就是我们定义经验的方式。通过我们的\
    \ policy.state_action_table，我们可以稍微向前看，看看是否可以期望从 next_state 采取的行动中获得任何收益。也就是说，我们可以计算\n\
    \n```\nnext_max = np.max(policy.state_action_table[next_state])\n```\n\n我们应该如何将这个值的知识与当前的状态-动作值（即\

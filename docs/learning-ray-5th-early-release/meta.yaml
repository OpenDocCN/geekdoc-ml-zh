  - "[PAGE 50]\n\n# Setting Up A Simple Maze Problem\n\nAs with the chapters before,\
    \ I encourage you to code this chapter with me and build this application together\
    \ as we go. In case you don't want to do that, you can also simply follow [the\
    \ notebook for this chapter](the notebook for this chapter).\n\nTo give you an\
    \ idea, the app we're building is structured as follows:\n\n+   - You implement\
    \ a simple 2D-maze game in which a single player can move around in the four major\
    \ directions.\n- You initialize the maze as a 5x5 grid to which the player is\
    \ confined.\n- One of the 25 grid cells is the “goal” that a player called the\
    \ “seeker” must reach.\n- Instead of hard-coding a solution, you will employ a\
    \ reinforcement learning algorithm, so that the seeker learns to find the goal.\n\
    - This is done by repeatedly running simulations of the maze, rewarding the seeker\
    \ for finding the goal and smartly keeping track of which decisions of the seeker\
    \ worked and which didn't.\n- As running simulations can be parallelized and our\
    \ RL algorithm can also be trained in parallel, we utilize the Ray API to parallelize\
    \ the whole process.\n\nWe're not quite ready to deploy this application on an\
    \ actual Ray cluster comprised of multiple nodes just yet, so for now we'll continue\
    \ to work with local clusters. If you're interested in infrastructure topics and\
    \ want to learn how to set up Ray clusters, jump ahead to ???, and to see a fully\
    \ deployed Ray application you can go to ???.\n\nLet's start by implementing the\
    \ 2D maze we just sketched. The idea is to implement a simple grid in Python that\
    \ spans a 5x5 grid starting at (0, 0) and ending at (4, 4) and properly define\
    \ how a player can move around the grid. To do this, we first need an abstraction\
    \ for moving in the four cardinal directions. These four actions, namely moving\
    \ up, down, left, and right, can be encoded in Python as a class we call `Discrete`.\
    \ The abstraction of moving in several discrete actions is so useful that we'll\
    \ generalize it to n directions, instead of just four. In case you're worried,\
    \ this is not premature - we'll actually need a general `Discrete` class in a\
    \ moment.\n\nExample 3-1.\n\n```\nimport random\n\nclass Discrete:\n    def __init__(self,\
    \ num_actions: int):\n        \"\"\" Discrete action space for num_actions.\n\
    \        Discrete(4) can be used as encoding moving in one of the cardinal directions.\n\
    ```"
  - "[PAGE 51]\n\n```\n\"\"\"\n    self.n = num_actions\n\ndef sample(self):\n   \
    \ return random.randint(0, self.n - 1) ❶\n\nspace = Discrete(4)\nprint(space.sample())\
    \ ❷\n```\n\n+   ❶ A discrete action can be uniformly sampled between 0 and n-1.\n\
    ❷ For instance, a Discrete(4) sample will give you 0, 1, 2, or 3.\n\nSampling\
    \ from a Discrete(4) like in this example will randomly return 0, 1, 2, or 3.\
    \ How we interpret these numbers is up to us, so let’s say we go for “down”, “left”,\
    \ “right”, and “up” in that order.\n\nNow that we know how to encode moving around\
    \ the maze, let’s code the maze itself, including the goal cell and the position\
    \ of the seeker player that tries to find the goal. To this end we’re going to\
    \ implement a Python class called Environment. It’s called that, because the maze\
    \ is the environment in which the player “lives”. To make matters easy, we’ll\
    \ always put the seeker at (0, 0) and the goal at (4, 4). To make the seeker move\
    \ and find its goal, we initialize the Environment with an action_space of Discrete(4).\n\
    \nThere is one last bit of information we need to set up for our maze environment,\
    \ namely an encoding of the seeker position. The reason for that is that we’re\
    \ going to implement an algorithm later that keeps track of which actions led\
    \ to good results for which seeker positions. By encoding the seeker position\
    \ as a Discrete(5*5), it becomes a single number that’s much easier to work with.\
    \ In RL lingo it is common to call the information of the game that is accessible\
    \ to the player an observation. So, in analogy to the actions we can carry out\
    \ for our seeker, we can also define an observation_space for it. Here’s the implementation\
    \ of what we’ve just discussed:\n\nExample 3-2.\n\n```\nimport os\n\nclass Environment:\n\
    \    seeker, goal = (0, 0), (4, 4) ❶\n    info = {'seeker': seeker, 'goal': goal}\n\
    \n    def __init__(self, *args, **kwargs):\n```"
  - "[PAGE 52]\n\n```\nself.action_space = Discrete(4) ②\nself.observation_space =\
    \ Discrete(5*5) ③\n```\n\n+   ① The seeker gets initialized in the top left, the\
    \ goal in the bottom right of the maze.\n② Our seeker can move down, left, up\
    \ and right.\n③ And it can be in a total of 25 states, one for each position on\
    \ the grid.\n\nNote that we defined an info variable as well, which can be used\
    \ to print information about the current state of the maze, for instance for debugging\
    \ purposes. To play an actual game of find-the-goal from the perspective of the\
    \ seeker, we have to define a few helper methods. Clearly, the game should be\
    \ considered “done” when the seeker finds the goal. Also, we should reward the\
    \ seeker for finding the goal. And when the game is over, we should be able to\
    \ reset it to its initial state, to play again. To round things off, we also define\
    \ a get_observation method that returns the encoded seeker position. Continuing\
    \ our implementation of the Environment class, this translates into the following\
    \ four methods.\n\nExample 3-3.\n\n```\ndef reset(self): ①\n    \"\"\"Reset seeker\
    \ and goal positions, return observations.\"\"\"\n    self.seeker = (0, 0)\n \
    \   self.goal = (4, 4)\n\n    return self.get_observation()\n\ndef get_observation(self):\n\
    \    \"\"\"Encode the seeker position as integer\"\"\"\n    return 5 * self.seeker[0]\
    \ + self.seeker[1] ②\n\ndef get_reward(self):\n    \"\"\"Reward finding the goal\"\
    \"\"\n    return 1 if self.seeker == self.goal else 0 ③\n\ndef is_done(self):\n\
    \    \"\"\"We're done if we found the goal\"\"\"\n    return self.seeker == self.goal\
    \ ④\n```\n\n+   ① To play a new game, we'll have to reset the grid to its original\
    \ state.\n② Converting the seeker tuple to a value from the environment's observation_space.\n\
    ③ The seeker is only rewarded when reaching the goal."
  - "[PAGE 53]\n\n4 If the seeker is at the goal, the game is over.\n\nThe last essential\
    \ method to implement is the step method. Imagine you're playing our maze game\
    \ and decide to go right as your next move. The step method will take this action\
    \ (namely 3, the encoding of “right”) and apply it to the internal state of the\
    \ game. To reflect what changed, the step method will then return the seeker's\
    \ observations, its reward, whether the game is over, and the info value of the\
    \ game. Here's how the step method works:\n\nExample 3-4.\n\n```\ndef step(self,\
    \ action):\n    \"\"\"Take a step in a direction and return all available information.\"\
    \"\"\n    if action == 0:  # move down\n        self.seeker = (min(self.seeker[0]\
    \ + 1, 4), self.seeker[1])\n    elif action == 1:  # move left\n        self.seeker\
    \ = (self.seeker[0], max(self.seeker[1] - 1, 0))\n    elif action == 2:  # move\
    \ up\n        self.seeker = (max(self.seeker[0] - 1, 0), self.seeker[1])\n   \
    \ elif action == 3:  # move right\n        self.seeker = (self.seeker[0], min(self.seeker[1]\
    \ + 1, 4))\n    else:\n        raise ValueError(\"Invalid action\")\n\n    return\
    \ self.get_observation(), self.get_reward(), self.is_done(), self.info ①\n```\n\
    \n① After taking a step in the specified direction, we return observation, reward,\
    \ whether we're done, and any additional information we might find useful.\n\n\
    I said the step method was the last essential method, but we actually want to\
    \ define one more helper method that's extremely helpful to visualize the game\
    \ and help us understand it. This render method will print the current state of\
    \ the game to the command line.\n\nExample 3-5.\n\n```\ndef render(self, *args,\
    \ **kwargs):\n    \"\"\"Render the environment, e.g. by printing its representation.\"\
    \"\"\n    os.system('cls' if os.name == 'nt' else 'clear') ①\n    grid = [['|\
    \ ' for _ in range(5)] + ['|\\n'] for _ in range(5)]\n    grid[self.goal[0]][self.goal[1]]\
    \ = '|G'\n    grid[self.seeker[0]][self.seeker[1]] = '|S' ②\n    print(''.join([''.join(grid_row)\
    \ for grid_row in grid])) ③\n```\n\n① First we clear the screen."
- md: "## Building a Simulation\n\nWith the `Environment` class implemented, what\
    \ does it take to tackle the problem of “teaching” the seeker to play the game\
    \ well? How can it find the goal consistently in the minimum number of 8 steps\
    \ necessary? We've equipped the maze environment with reward information, so that\
    \ the seeker can use this signal to learn to play the game. In reinforcement learning,\
    \ you play games repeatedly and learn from the experience you made in the process.\
    \ The player of the game is often referred to as *agent* that takes *actions*\
    \ in the environment, observes its *state* and receives a *reward*.¹ The better\
    \ an agent learns, the better it becomes at interpreting the current game state\
    \ (observations) and finding actions that lead to more rewarding outcomes.\n\n\
    Regardless of the RL algorithm you want to use (in case you know any), you need\
    \ to have a way of simulating the game repeatedly, to collect experience data.\
    \ For this reason we're going to implement a simple `Simulation` class in just\
    \ a bit.\n\nThe other useful abstraction we need to proceed is that of a `Policy`,\
    \ a way of specifying actions. Right now the only thing we can do to play the\
    \ game is sampling random actions for our seeker. What a `Policy` allows us to\
    \ do is to get better actions for the current state of the game. In fact, we define\
    \ a `Policy` to be a class with a `get_action` method that takes a game state\
    \ and returns an action.\n\nRemember that in our game the seeker has a total of\
    \ 25 possible states on the grid, and can carry out 4 actions. A simple idea would\
    \ be to look at pairs of states and actions and assign a high value to a pair\
    \ if carrying out this action in this state will lead to a high reward, and a\
    \ low value otherwise. For instance, from your intuition of the game it should\
    \ be clear that going down or right is always a good idea, whereas going left\
    \ or up is not. Then, create a 25x4 lookup table of all possible state-action\
    \ pairs and store it in our `Policy`. Then we could simply ask our policy to return\
    \ the highest value of any action given a state. Of course, implementing an algorithm\
    \ that finds good values for these state-action pairs is the challenging part.\
    \ Let's implement this idea of a Policy in first and worry about a suitable algorithm\
    \ later.\n\nExample 3-7.\n\n```python\nclass Policy:\n\n    def __init__(self,\
    \ env):\n        \"\"\"A Policy suggests actions based on the current state.\n\
    \        We do this by tracking the value of each state-action pair.\n       \
    \ \"\"\"\n        self.state_action_table = [\n            [0 for _ in range(env.action_space.n)]for\
    \ _ in range(env.observation_space.n)\n        ]\n        self.action_space =\
    \ env.action_space\n\n    def get_action(self, state, explore=True, epsilon=0.1):\n\
    \        \"\"\"Explore randomly or exploit the best value currently available.\"\
    \"\"\n        if explore and random.uniform(0, 1) < epsilon:\n            return\
    \ self.action_space.sample()\n        return np.argmax(self.state_action_table[state])\n\
    ```\n\n1. We define a nested list of values for each state-action pair, initialized\
    \ to zero.\n2. On demand, we can explore random actions so that we don't get stuck\
    \ in suboptimal behavior.\n3. Sometimes we might want to randomly explore actions\
    \ in the game, which is why we introduce an explore parameter to the get_action\
    \ method. By default, this happens 10% of the time.\n\nWe return the action with\
    \ the highest value in the lookup table, given the current state.\n\nI've snuck\
    \ in a little implementation detail into the Policy definition that might be a\
    \ bit confusing. The get_action method has an explore parameter. The reason for\
    \ this is that if you learn an extremely poor policy, e.g. one that always wants\
    \ you to move left, you have no chance of ever finding better solutions. In other\
    \ words, sometimes you need to explore new ways, and not \"exploit\" your current\
    \ understanding of the game. As indicated before, we haven't discussed how to\
    \ learn to improve the values in the state_action_table of our policy. For now,\
    \ just keep in mind that the policy gives us the actions we want to follow when\
    \ simulating the maze game.\n\nMoving on to the Simulation class we spoke about\
    \ earlier, a simulation should take an Environment and compute actions of a given\
    \ Policy until the goal is reached and the game ends. The data we observe when\
    \ \"rolling out\" a full game like this is what we call the experience we gained.\
    \ Accordingly, our Simulation class has a rollout method that computes experiences\
    \ for a full game and returns them. Here's what the implementation of the Simulation\
    \ class looks like:\n\nExample 3-8.\n\n```python\nclass Simulation(object):\n\
    \    def __init__(self, env):\n        \"\"\"Simulates rollouts of an environment,\
    \ given a policy to follow.\"\"\"\n        self.env = env\n\n    def rollout(self,\
    \ policy, render=False, explore=True, epsilon=0.1): ❶\n        \"\"\"Returns experiences\
    \ for a policy rollout.\"\"\"\n        experiences = []\n        state = self.env.reset()\
    \ ❷\n        done = False\n        while not done:\n            action = policy.get_action(state,\
    \ explore, epsilon) ❸\n            next_state, reward, done, info = self.env.step(action)\
    \ ❹\n            experiences.append([state, action, reward, next_state]) ❺\n \
    \           state = next_state\n            if render: ❻\n                time.sleep(0.05)\n\
    \                self.env.render()\n\n        return experiences\n```\n\n❶ We\
    \ compute a game “roll-out” by following the actions of a policy, and we can optionally\
    \ render the simulation.\n❷ To be sure, we reset the environment before each rollout.\n\
    ❸ The passed in policy drives the actions we take. The explore and epsilon parameters\
    \ are passed through.\n❹ We step through the environment by applying the policy’s\
    \ action.\n❺ We define an experience as a (state, action, reward, next_state)\
    \ quadruple.\n❻ Optionally render the environment at each step.\n\nNote that each\
    \ entry of the experiences we collect in a rollout consists of four values: the\
    \ current state, the action taken, the reward received, and the next state. The\
    \ algorithm we’re going to implement in a moment will use these experiences to\
    \ learn from them. Other algorithms might use other experience values, but those\
    \ are the ones we need to proceed.\n\n---\n\n2. Then we draw the grid and mark\
    \ the goal as G and the seeker as S on it.\n3. The grid then gets rendered by\
    \ printing it to your screen.\n\nGreat, now we have completed the implementation\
    \ of our Environment class that's defining our 2D-maze game. We can step through\
    \ this game, know when it's done and reset it again. The player of the game, the\
    \ seeker, can also observe its environment and gets rewarded for finding the goal.\n\
    \nLet's use this implementation to play a game of find-the-goal for a seeker that\
    \ simply takes random actions. This can be done by creating a new Environment,\
    \ sampling and applying actions to it, and rendering the environment until the\
    \ game is over:\n\nExample 3-6.\n\n```python\nimport time\n\nenvironment = Environment()\n\
    \nwhile not environment.is_done():\n    random_action = environment.action_space.sample()\
    \ ❶\n    environment.step(random_action)\n    time.sleep(0.1)\n    environment.render()\
    \ ❷\n```\n\n❶ We can test our environment by applying sampled actions until we're\
    \ done.\n❷ To visualize the environment we render it after waiting for a tenth\
    \ of a second (otherwise the code runs too fast to follow).\n\nIf you run this\
    \ on your computer, eventually you'll see that the game is over and the seeker\
    \ has found the goal. It might take a while if you're unlucky.\n\nIn case you're\
    \ objecting that this is an extremely simple problem, and to solve it all you\
    \ have to do is take a total of 8 steps, namely going right and down four times\
    \ each in arbitrary order, I'm not arguing with you. The point is that we want\
    \ to tackle this problem using machine learning, so that we can take on much harder\
    \ problems later. Specifically, we want to implement an algorithm that figures\
    \ out on its own how to play the game, merely by playing the game repeatedly:\
    \ observing what's happening, deciding what to do next, and getting rewarded for\
    \ your actions.\n\nIf you want to, now is a good time to make the game more complex\
    \ yourself. As long as you do not change the interface we defined for the Environment\
    \ class, you could modify this game in many ways. Here are a few suggestions:\n\
    \n- Make it a 10x10 grid or randomize the initial position of the seeker.\n- Make\
    \ the outer walls of the grid dangerous. Whenever you try to touch them, you'll\
    \ incur a reward of -100, i.e. a steep penalty.\n- Introduce obstacles in the\
    \ grid that the seeker cannot pass through.\n\nIf you're feeling really adventurous,\
    \ you could also randomize the goal position. This requires extra care, as currently\
    \ the seeker has no information about the goal position in terms of the `get_observation`\
    \ method. Maybe come back to tackling this last exercise after you've finished\
    \ reading this chapter.\n\n---\n\n¹ As we'll see in chapter Chapter 4, you can\
    \ run RL on multi-player games, too. Making the maze environment a so-called multi-agent\
    \ environment, in which multiple seekers compete for the goal, is an interesting\
    \ exercise."
  mdcn: "## 构建模拟\n\n在实现了 `Environment` 类之后，要解决“教会”探索者玩好游戏的问题，需要什么？如何才能在最少的8步内持续找到目标？我们为迷宫环境配备了奖励信息，这样探索者就能利用这个信号来学习玩游戏。在强化学习中，你会反复玩游戏，并从过程中获得的经验中学习。游戏的玩家通常被称为*智能体*，它在环境中执行*动作*，观察其*状态*并获得*奖励*。¹\
    \ 智能体学得越好，它就越擅长解读当前的游戏状态（观察），并找到能带来更丰厚回报的动作。\n\n无论你想使用哪种强化学习算法（如果你知道的话），你都需要一种方法来反复模拟游戏，以收集经验数据。因此，我们稍后将实现一个简单的\
    \ `Simulation` 类。\n\n我们继续进行所需的另一个有用的抽象是 `Policy`，即指定动作的方式。目前，我们玩这个游戏唯一能做的就是为我们的探索者随机采样动作。`Policy`\
    \ 允许我们做的是为当前游戏状态获取更好的动作。事实上，我们定义一个 `Policy` 为一个类，它有一个 `get_action` 方法，该方法接受一个游戏状态并返回一个动作。\n\
    \n请记住，在我们的游戏中，探索者在网格上总共有25种可能的状态，并可以执行4种动作。一个简单的想法是查看状态-动作对，并为每对分配一个值：如果在该状态下执行此动作能带来高奖励，则赋予高值；否则赋予低值。例如，根据你对游戏的直觉，向下或向右走总是一个好主意，而向左或向上走则不是。然后，创建一个25x4的查找表，包含所有可能的状态-动作对，并将其存储在我们的\
    \ `Policy` 中。这样，我们就可以简单地要求我们的策略在给定状态下返回任何动作中的最高值。当然，实现一个算法来为这些状态-动作对找到好的值才是具有挑战性的部分。让我们先实现这个策略的想法，稍后再考虑合适的算法。\n\
    \n示例 3-7。\n\n```python\nclass Policy:\n\n    def __init__(self, env):\n      \
    \  \"\"\"A Policy suggests actions based on the current state.\n        We do\
    \ this by tracking the value of each state-action pair.\n        \"\"\"\n    \
    \    self.state_action_table = [\n            [0 for _ in range(env.action_space.n)]for\
    \ _ in range(env.observation_space.n)\n        ]\n        self.action_space =\
    \ env.action_space\n\n    def get_action(self, state, explore=True, epsilon=0.1):\n\
    \        \"\"\"Explore randomly or exploit the best value currently available.\"\
    \"\"\n        if explore and random.uniform(0, 1) < epsilon:\n            return\
    \ self.action_space.sample()\n        return np.argmax(self.state_action_table[state])\n\
    ```\n\n1. 我们定义了一个嵌套列表，用于存储每个状态-动作对的值，初始化为零。\n2. 根据需要，我们可以探索随机动作，这样就不会陷入次优行为。\n\
    3. 有时我们可能想在游戏中随机探索动作，这就是为什么我们在 `get_action` 方法中引入了一个 `explore` 参数。默认情况下，这种情况发生的概率是10%。\n\
    \n给定当前状态，我们返回查找表中值最高的动作。\n\n我在策略定义中悄悄加入了一个可能有点令人困惑的实现细节。`get_action` 方法有一个 `explore`\
    \ 参数。这样做的原因是，如果你学到了一个极其糟糕的策略，例如一个总是让你向左移动的策略，你就永远没有机会找到更好的解决方案。换句话说，有时你需要探索新的方法，而不是“利用”你当前对游戏的理解。如前所述，我们还没有讨论如何学习改进我们策略中\
    \ `state_action_table` 的值。目前，只需记住策略在模拟迷宫游戏时为我们提供了想要遵循的动作。\n\n回到我们之前谈到的 `Simulation`\
    \ 类，模拟应该接受一个 `Environment` 并计算给定 `Policy` 的动作，直到达到目标并结束游戏。当我们像这样“展开”一个完整游戏时观察到的数据，就是我们所说获得的经验。因此，我们的\
    \ `Simulation` 类有一个 `rollout` 方法，它计算一个完整游戏的经验并返回它们。`Simulation` 类的实现如下所示：\n\n\
    示例 3-8。\n\n```python\nclass Simulation(object):\n    def __init__(self, env):\n\
    \        \"\"\"Simulates rollouts of an environment, given a policy to follow.\"\
    \"\"\n        self.env = env\n\n    def rollout(self, policy, render=False, explore=True,\
    \ epsilon=0.1): ❶\n        \"\"\"Returns experiences for a policy rollout.\"\"\
    \"\n        experiences = []\n        state = self.env.reset() ❷\n        done\
    \ = False\n        while not done:\n            action = policy.get_action(state,\
    \ explore, epsilon) ❸\n            next_state, reward, done, info = self.env.step(action)\
    \ ❹\n            experiences.append([state, action, reward, next_state]) ❺\n \
    \           state = next_state\n            if render: ❻\n                time.sleep(0.05)\n\
    \                self.env.render()\n\n        return experiences\n```\n\n❶ 我们通过遵循策略的动作来计算游戏的“展开”，并且可以选择渲染模拟。\n\
    ❷ 为了确保，在每次展开之前，我们重置环境。\n❸ 传入的策略驱动我们采取的动作。`explore` 和 `epsilon` 参数被传递下去。\n❹ 我们通过应用策略的动作在环境中逐步推进。\n\
    ❺ 我们将一个经验定义为（状态，动作，奖励，下一个状态）四元组。\n❻ 可选地在每一步渲染环境。\n\n请注意，我们在一次展开中收集的经验的每个条目都包含四个值：当前状态、采取的动作、获得的奖励和下一个状态。我们即将实现的算法将使用这些经验来从中学习。其他算法可能会使用其他的经验值，但这些是我们继续进行所需的。\n\
    \n---\n\n2. 然后我们绘制网格，并将目标标记为 G，探索者标记为 S。\n3. 然后通过将其打印到屏幕上来渲染网格。\n\n很好，现在我们已经完成了定义我们二维迷宫游戏的\

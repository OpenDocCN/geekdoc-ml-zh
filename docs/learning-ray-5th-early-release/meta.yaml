  md: '# Data Processing with Ray Data


    The first high-level library of Ray we talk about is called “Ray Data”. This library
    contains a data structure aptly called Dataset, a multitude of connectors for
    loading data from various formats and systems, an API for transforming such datasets,
    a way to build data processing pipelines with them, and many integrations with
    other data processing frameworks. The Dataset abstraction builds on the powerful
    Arrow framework.


    To use Ray Data, you need to install Arrow for Python, for instance by running
    `pip install pyarrow`. We''ll now discuss a simple example that creates a distributed
    Dataset on your local Ray cluster from a Python data structure. Specifically,
    you''ll create a dataset from a Python dictionary containing a string `name` and
    an integer-valued `data` for 10000 entries:


    Example 1-2.


    ```

    import ray


    items = [{"name": str(i), "data": i} for i in range(10000)]

    ds = ray.data.from_items(items) ❶

    ds.show(5) ❷

    ```


    +   ❶ Creating a Dataset by using `from_items` from the `ray.data` module.

    ❷ Printing the first 10 items of the Dataset.


    To show a Dataset means to print some of its values. You should see precisely
    5 so-called ArrowRow elements on your command line, like this:


    ```

    ArrowRow({''name'': ''0'', ''data'': 0})

    ArrowRow({''name'': ''1'', ''data'': 1})

    ArrowRow({''name'': ''2'', ''data'': 2})

    ArrowRow({''name'': ''3'', ''data'': 3})

    ArrowRow({''name'': ''4'', ''data'': 4})

    ```


    Great, now you have some distributed rows, but what can you do with that data?
    The Dataset API bets heavily on functional programming, as it is very well suited
    for data transformations. Even though Python 3 made a point of hiding some of
    its functional programming capabilities, you''re probably familiar with functionality
    such as `map`, `filter` and others. If not, it''s easy enough to pick up. `map`
    takes each element of your dataset and transforms is into something else, in parallel.
    `filter` removes data points according to a boolean filter function. And the slightly
    more elaborate `flat_map` first maps values similarly to `map`, but then also
    “flattens” the result. For instance, if `map` would produce a list of lists, `flat_map`
    would flatten out the nested lists and give you'

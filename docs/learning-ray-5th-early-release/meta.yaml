- md: "## Preprocessors in Ray Train\n\nThe Preprocessor is the core class for handling\
    \ data preprocessing. Each preprocessor has the following APIs:\n\n| API | Description\
    \ |\n|---|---|\n| `transform` | Used to process and apply a processing transformation\
    \ to a Dataset. |\n| `fit` | Used to calculate and store aggregate state about\
    \ the Dataset on Preprocessor. Returns self for chaining. |\n| `fit_transform`\
    \ | Syntactic sugar for performing transformations that require aggregate state.\
    \ May be optimized at the implementation level for specific Preprocessors. |\n\
    | `transform_batch` | Used to apply the same transformation on batches for prediction.\
    \ |\n\nCurrently, Ray Train offers the following encoders:\n\n| Encoder | Description\
    \ |\n|---|---|\n| `FunctionTransformer` | Custom Transformers |\n| `Pipeline`\
    \ | Sequential Preprocessing |\n| `StandardScaler` | Standardization |\n| `MinMaxScaler`\
    \ | Standardization |\n| `OrdinalEncoder` | Encoding Categorical Features |\n\
    | `OneHotEncoder` | Encoding Categorical Features |\n| `SimpleImputer` | Missing\
    \ Value Imputation |\n| `LabelEncoder` | Label Encoding |\n\nYou will often want\
    \ to make sure you can use the same data preprocessing operations at training\
    \ time and at serving time.\n\n## Usage of Preprocessors\n\nYou can use these\
    \ preprocessors by passing them to a trainer. Ray Train will take care of applying\
    \ the preprocessor to the dataset in a distributed fashion.\n\nExample 6-4.\n\n\
    ```\nresult = trainer.fit(dataset=dataset, preprocessor=preprocessor)\n```\n\n\
    ## Serialization of Preprocessors\n\nNow, some preprocessing operators such as\
    \ one-hot encoders are easy to run in training and transfer to serving. However,\
    \ other operators such as those that do standardization are a bit trickier, since\
    \ you don't want to do large data crunching (to find the mean of a particular\
    \ column) during serving time.\n\nThe nice thing about the Ray Train preprocessors\
    \ is that they’re serializable. This makes it so that you can easily get consistency\
    \ from training to serving just by serializing these operators.\n\n*Example 6-5.*\n\
    \n```\npickle.dumps(prep) ①\n```\n\n① We can serialize and save preprocessors.\n\
    \n## Trainers in Ray Train\n\nTrainers are framework-specific classes that run\

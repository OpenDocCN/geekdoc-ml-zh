    ## Machine Learning with Tune\n\nAs we've seen, Tune is versatile and allows you\
    \ to tune hyperparameters for any objective you give it. In particular, you can\
    \ use it with any machine learning framework you're interested in. In this section\
    \ we're going to give you two examples to illustrate this.\n\nFirst, we're going\

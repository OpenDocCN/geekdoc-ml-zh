  md: 'We don''t have gardening robots like the one I''ve sketched yet. And we don''t
    know which AI paradigm will get us there.² What I do know is that the world is
    full of complex, dynamic and interesting examples that we need to tackle. For
    that we need computational frameworks that help us do that, and Ray was built
    to do exactly that. RISELab created Ray to build and run complex AI applications
    at scale, and reinforcement learning has been an integral part of Ray from the
    start.


    # Three Layers: Core, Libraries and Ecosystem


    Now that you know why Ray was built and what its creators had in mind, let''s
    look at the three layers of Ray.


    +   - A low-level, distributed computing framework for Python with a concise core
    API.³

    - A set of high-level libraries for data science built and maintained by the creators
    of Ray.

    - A growing ecosystem of integrations and partnerships with other notable projects.


    There''s a lot to unpack here, and we''ll look into each of these layers individually
    in the remainder of this chapter. You can imagine Ray''s core engine with its
    API at the center of things, on which everything else builds. Ray''s data science
    libraries build on top of it. In practice, most data scientists will use these
    higher level libraries directly and won''t often need to resort to the core API.
    The growing number of third-party integrations for Ray is another great entrypoint
    for experienced practitioners. Let''s look into each one of the layers one by
    one.


    # A Distributed Computing Framework


    At its core, Ray is a distributed computing framework. We''ll provide you with
    just the basic terminology here, and talk about Ray''s architecture in depth in
    Chapter 2. In short, Ray sets up and manages clusters of computers so that you
    can run distributed tasks on them. A ray cluster consists of nodes that are connected
    to each other via a network. You program against the so-called *driver*, the program
    root, which lives on the *head node*. The driver can run *jobs*, that is a collection
    of tasks, that are run on the nodes in the cluster. Specifically, the individual
    tasks of a job are run on *worker* pro-


    2 For the experts among you, I don''t claim that RL is the answer. RL is just
    a paradigm that naturally fits into this discussion of AI goals.


    3 This is a Python book, so we''ll exclusively focus on it. But you should at
    least know that Ray also has a Java API, which at this point is less mature than
    its Python equivalent.'

    \ If you're interested in diving deeper into any of the many other integrations\
    \ Tune has to offer, check out the Ray Tune documentation examples.\n\n## Summary\n\
    \nTune is arguably one of the most versatile HPO tools you can choose today. It's\
    \ very feature-rich, offering many search algorithms, advanced schedulers, complex\
    \ search spaces, custom stoppers and many other features that we couldn't cover\
    \ in this chapter. Also, it seamlessly integrates with most notable HPO tools,\
    \ such as Optuna or HyperOpt, making it easy to either migrate from these tools,\
    \ or simply leverage their features through Tune. Since Tune, as part of the Ray\
    \ ecosystem, is distributed by default, it has an edge over many of its competitors.\
    \ You can view Ray Tune as a flexible, distributed HPO framework that *extends*\
    \ others that might only work on single machines. Seen that way, and given that\
    \ you have a need to scale out your HPO experiments, there’s very little speaking\
    \ against adopting Tune.\n\n# CHAPTER 6\n\n## Distributed Training with Ray Train\n\
    \nRichard Liaw\n\n> **A Note for Early Release Readers**\n\nWith Early Release\
    \ ebooks, you get books in their earliest form—the author’s raw and unedited content\
    \ as they write—so you can take advantage of these technologies long before the\
    \ official release of these titles.\n\nIn previous chapters, you’ve learned how\
    \ to build and scale reinforcement learning applications with Ray, and how to\
    \ optimize hyperparameters for such applications. As we indicated in Chapter 1,\
    \ Ray also comes with the Ray Train library, which provides an extensive suite\
    \ of machine learning training integrations and allows them to scale seamlessly.\n\
    \nWe will start this chapter by providing context about why you might need to\
    \ scale out your machine learning training. Then we’ll cover some key concepts\
    \ you need to know in order to use Ray Train. Finally, we’ll cover some of the\
    \ more advanced functionality that Ray Train provides.\n\nAs always, you can follow\
    \ along using the notebook for this chapter.\n\n## The Basics of Distributed Model\
    \ Training\n\nMachine learning often requires a lot of heavy computation. Depending\
    \ on the type of model that you’re training, whether it be a gradient boosted\
    \ tree or a neural network, you may face a couple common problems with training\
    \ machine learning models causing you to investigate distributed training solutions:\n\
    \n1.  The time it takes to finish training is too long.\n2.  The size of data\
    \ is too large to fit into one machine.\n3.  The model itself is too large to\
    \ fit into a single machine.\n\nFor the first case, training can be accelerated\
    \ by processing data with increased throughput. Some machine learning algorithms,\
    \ such as neural networks, can parallelize parts of the computation to speed up\
    \ training¹.\n\nIn the second case, your choice of algorithm may require you to\
    \ fit all the available data from a dataset into memory, but the given single\
    \ node memory may not be sufficient. In this case, you will need to split the\
    \ data across multiple nodes and train in a distributed manner. On the other hand,\
    \ sometimes your algorithm may not require data to be distributed, but if you’re\
    \ using a distributed database system to begin with, you still want a training\
    \ framework that can leverage your distributed data.\n\nIn the third case, when\
    \ your model doesn’t fit into a single machine, you may need to split up the model\
    \ into multiple parts, spread across multiple machines. The approach of splitting\
    \ models across multiple machines is called model parallelism. To run into this\
    \ issue, you first need a model that is large enough to not fit into a single\
    \ machine anymore. Usually, large companies like Google or Facebook tend to have\
    \ the need for model-parallelism, and also rely on in-house solutions to handle\
    \ the distributed training.\n\nIn contrast, the first two problems often arise\
    \ much earlier in the journey to machine learning practitioners. The solutions\
    \ we just sketched for these problems fall under the umbrella of data-parallel\
    \ training. Instead of splitting up the model across multiple machines, you instead\
    \ rely on distributed data to speed up training.\n\nSpecifically for the first\
    \ problem, if you can speed up your training process, hopefully with minimal or\
    \ no loss in accuracy, and you can do so cost-efficiently, why not go for it?\
    \ And if you have distributed data, whether by necessity of your algorithm or\
    \ the way you store your data, you need a training solution to deal with it. As\
    \ you will see, Ray Train is built for efficient, data-parallel training.\n\n\
    ## Introduction to Ray Train\n\nRay Train is a library for distributed training\
    \ on Ray. It offers key tools for different parts of the training workflow, from\
    \ feature processing, to scalable training, to integrations with ML tracking tools,\
    \ to export mechanisms for models.\n\nIn a typical ML training pipeline you will\
    \ use the following key components of Ray Train:\n\n¹ This applies specifically\
    \ to the gradient computation in neural networks.\n\n**Preprocessors**\nRay Train\
    \ provides several common preprocessor objects and utilities to process dataset\
    \ objects into consumable features for Trainers.\n\n**Trainers**\nRay Train has\
    \ several Trainer classes that make it possible to do distributed training. Trainers\
    \ are wrapper classes around third-party training frameworks like XGBoost, providing\

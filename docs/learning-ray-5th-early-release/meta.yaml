- md: "## Example: Parallel SGD from Scratch\n\nOne of the key benefits of Datasets\
    \ is that they can be passed between tasks and actors. In this section, we'll\
    \ explore how this can be used to write efficient implementations of complex distributed\
    \ workloads like distributed hyperparameter tuning and machine learning training.\n\
    \nAs discussed in Chapter 5, a common pattern in machine learning training is\
    \ to explore a range of \"hyperparameters\" to find the ones that result in the\
    \ best model. We may want to run across a wide range of hyperparameters, and doing\
    \ this naively could be very expensive. Datasets allows us to easily share the\
    \ same in-memory data across a range of parallel training runs in a single Python\
    \ script: we can load and pre-process the data once, then pass a reference to\
    \ it to many downstream actors who can read the data from shared memory.\n\nAdditionally,\
    \ sometimes when working with very large data sets it can be infeasible to load\
    \ the full training data into memory in a single process or on a single machine.\
    \ It's common in distributed training to instead shard the data across many different\
    \ workers to train in parallel and combining the results either synchronously\
    \ or asynchronously using a parameter server. There are some important considerations\
    \ that can make this tricky:\n\n1.  Many distributed training algorithms take\
    \ a synchronous approach, requiring the workers to synchronize their weights after\
    \ each training epoch. This means there needs to be some coordination between\
    \ the workers to maintain consistency between which batch of data they are operating\
    \ on.\n2.  It's important that each worker gets a random sample of the data during\
    \ each epoch. A global random shuffle has been shown to perform better than local\
    \ shuffle or no shuffle.\n\nLet's walk through an example of how we can implement\
    \ this type of pattern using Ray Datasets. In the example, we will training multiple\
    \ copies of an SGD classifier using different hyperparameters across different\
    \ workers in parallel. This isn't exactly the same, but it is a similar pattern\
    \ that focuses on the flexibility and power of Ray Datasets for ML training workloads.\n\
    \nWe'll be training a scikit-learn `SGDClassifier` on a generated binary classification\
    \ dataset and the hyperparameter we'll tune is the regularization term (alpha\
    \ value). The actual details of the ML task and model aren't too important to\
    \ this example, you could replace the model and data with any number of examples.\
    \ The main thing to focus on here is how we orchestrate the data loading and computation\
    \ using Datasets.\n\nFirst, let's define our `TrainingWorker` that will train\
    \ a copy of the classifier on the data:\n\nExample 7-12.\n\n```python\nfrom sklearn\
    \ import datasets\nfrom sklearn.linear_model import SGDClassifier\nfrom sklearn.model_selection\
    \ import train_test_split\n\n@ray.remote\nclass TrainingWorker:\n    def __init__(self,\
    \ alpha: float):\n        self._model = SGDClassifier(alpha=alpha)\n\n    def\
    \ train(self, train_shard: ray.data.Dataset):\n        for i, epoch in enumerate(train_shard.iter_epochs()):\n\
    \            X, Y = zip(*list(epoch.iter_rows()))\n            self._model.partial_fit(X,\
    \ Y, classes=[0, 1])\n\n        return self._model\n\n    def test(self, X_test:\
    \ np.ndarray, Y_test: np.ndarray):\n        return self._model.score(X_test, Y_test)\n\
    ```\n\nThere are a few important things to note about the `TrainingWorker`:\n\n\
    - It's a simple wrapper around the `SGDClassifier` and instantiates it with a\
    \ given alpha value.\n- The main training function happens in the `train` method.\
    \ For each epoch, it trains the classifier on the data available.\n- We also have\
    \ a `test` method that can be used to run the trained model against a testing\
    \ set.\n\nNow, let's instantiate a number of `TrainingWorker`s with different\
    \ hyperparameters (alpha values):\n\nExample 7-13.\n\n```python\nALPHA_VALS =\
    \ [0.00008, 0.00009, 0.0001, 0.00011, 0.00012]\n\nprint(f\"Starting {len(ALPHA_VALS)}\
    \ training workers.\")\nworkers = [TrainingWorker.remote(alpha) for alpha in ALPHA_VALS]\n\
    ```\n\nNext, we generate training and validation data and convert the training\
    \ data to a Dataset. Here, we're using `.repeat()` to create a `DatasetPipeline`.\
    \ This defines the number of epochs that our training will run for. In each epoch,\
    \ the subsequent operations will be applied to the Dataset and the workers will\
    \ be able to iterate over the resulting data. We also shuffle the data randomly\
    \ and shard it to be passed to the training workers, each getting an equal chunk.\n\
    \nExample 7-14.\n\n```python\n# Generate training & validation data for a classification\
    \ problem.\nX_train, X_test, Y_train, Y_test = train_test_split(*datasets.make_classification())\n\
    \n# Create a dataset pipeline out of the training data. The data will be randomly\n\
    # shuffled and split across the workers for 10 iterations.\ntrain_ds = ray.data.from_items(list(zip(X_train,\
    \ Y_train)))\nshards = train_ds.repeat(10)\n                .random_shuffle_each_window()\n\
    \                .split(len(workers), locality_hints=workers)\n```\n\nTo run the\
    \ training on the workers, we invoke their train method and pass in one shard\
    \ of the DatasetPipeline to each. We then block waiting for training to complete\
    \ across all of the workers. To summarize what happens during this phase:\n\n\
    - Each epoch, each worker gets a random shard of the data.\n- The worker trains\
    \ its local model on the shard of data assigned to it.\n- Once a worker has finished\
    \ training on the current shard, it blocks until the other workers have finished.\n\
    - The above repeats for the remaining epochs (in this case, 10 total).\n\nExample\
    \ 7-15.\n\n```python\n# Wait for training to complete on all of the workers.\n\
    ray.get([worker.train.remote(shard) for worker, shard in zip(workers, shards)])\n\
    ```\n\nFinally, we can test out the trained models from each worker on some test\
    \ data to determine which alpha value produced the most accurate model.\n\nExample\
    \ 7-16.\n\n```python\n# Get validation results from each worker.\nprint(ray.get([worker.test.remote(X_test,\
    \ Y_test) for worker in workers]))\n```\n\nWhile this not be a real-world ML task\
    \ and in reality you should likely reach for Ray Tune or Ray Train, this example\
    \ conveys the power of Ray Datasets, especially for machine learning workloads.\
    \ In just a few 10s of lines of Python code, we were able to implement a complex\
    \ distributed hyperparameter tuning and training workflow that could easily be\
    \ scaled up to 10s or 100s of machines and is agnostic to any framework or specific\
    \ ML task."
  mdcn: "## 示例：从零开始实现并行SGD\n\n数据集（Datasets）的一个关键优势在于它们可以在任务和参与者（actors）之间传递。在本节中，我们将探讨如何利用这一特性来编写高效的分布式复杂工作负载实现，例如分布式超参数调优和机器学习训练。\n\
    \n如第5章所述，机器学习训练中的一个常见模式是探索一系列“超参数”，以找到能产生最佳模型的参数组合。我们可能希望在广泛的超参数范围内进行尝试，而采用朴素方法可能代价高昂。数据集允许我们在单个Python脚本中，轻松地将相同的内存中数据共享给一系列并行训练运行：我们可以加载并预处理一次数据，然后将其引用传递给许多下游参与者，这些参与者可以从共享内存中读取数据。\n\
    \n此外，当处理非常大的数据集时，有时在单个进程或单台机器上将全部训练数据加载到内存中是不可行的。在分布式训练中，常见的做法是将数据分片（shard）到许多不同的工作者（workers）上进行并行训练，然后使用参数服务器（parameter\
    \ server）同步或异步地合并结果。有一些重要的考虑因素可能使这变得棘手：\n\n1.  许多分布式训练算法采用同步方法，要求工作者在每个训练周期（epoch）后同步其权重。这意味着工作者之间需要进行某种协调，以维持它们所操作的数据批次的一致性。\n\
    2.  确保每个工作者在每个周期获得数据的随机样本非常重要。全局随机洗牌（shuffle）已被证明比局部洗牌或不洗牌表现更好。\n\n让我们通过一个示例，了解如何使用Ray\
    \ Datasets实现这种模式。在这个例子中，我们将使用不同的超参数，在不同的工作者上并行训练多个SGD分类器副本。虽然这不完全相同，但它是一个类似的模式，重点展示了Ray\
    \ Datasets在机器学习训练工作负载中的灵活性和强大功能。\n\n我们将在一个生成的二分类数据集上训练一个scikit-learn的`SGDClassifier`，我们将调整的超参数是正则化项（alpha值）。这个示例中机器学习任务和模型的实际细节并不太重要，你可以用任何其他示例替换模型和数据。这里主要关注的是我们如何使用数据集来编排数据加载和计算。\n\
    \n首先，让我们定义`TrainingWorker`，它将在数据上训练分类器的一个副本：\n\n示例 7-12。\n\n```python\nfrom sklearn\
    \ import datasets\nfrom sklearn.linear_model import SGDClassifier\nfrom sklearn.model_selection\
    \ import train_test_split\n\n@ray.remote\nclass TrainingWorker:\n    def __init__(self,\
    \ alpha: float):\n        self._model = SGDClassifier(alpha=alpha)\n\n    def\
    \ train(self, train_shard: ray.data.Dataset):\n        for i, epoch in enumerate(train_shard.iter_epochs()):\n\
    \            X, Y = zip(*list(epoch.iter_rows()))\n            self._model.partial_fit(X,\
    \ Y, classes=[0, 1])\n\n        return self._model\n\n    def test(self, X_test:\
    \ np.ndarray, Y_test: np.ndarray):\n        return self._model.score(X_test, Y_test)\n\
    ```\n\n关于`TrainingWorker`，有几点需要注意：\n\n-   它是`SGDClassifier`的一个简单包装器，并使用给定的alpha值进行实例化。\n\
    -   主要的训练函数发生在`train`方法中。对于每个周期，它在可用数据上训练分类器。\n-   我们还有一个`test`方法，可用于在测试集上运行训练好的模型。\n\
    \n现在，让我们使用不同的超参数（alpha值）实例化多个`TrainingWorker`：\n\n示例 7-13。\n\n```python\nALPHA_VALS\
    \ = [0.00008, 0.00009, 0.0001, 0.00011, 0.00012]\n\nprint(f\"Starting {len(ALPHA_VALS)}\
    \ training workers.\")\nworkers = [TrainingWorker.remote(alpha) for alpha in ALPHA_VALS]\n\
    ```\n\n接下来，我们生成训练和验证数据，并将训练数据转换为数据集。这里，我们使用`.repeat()`创建一个`DatasetPipeline`。这定义了我们的训练将运行的周期数。在每个周期中，后续操作将应用于数据集，参与者将能够迭代处理结果数据。我们还随机洗牌数据并将其分片传递给训练工作者，每个工作者获得相等的一块。\n\
    \n示例 7-14。\n\n```python\n# Generate training & validation data for a classification\
    \ problem.\nX_train, X_test, Y_train, Y_test = train_test_split(*datasets.make_classification())\n\
    \n# Create a dataset pipeline out of the training data. The data will be randomly\n\
    # shuffled and split across the workers for 10 iterations.\ntrain_ds = ray.data.from_items(list(zip(X_train,\
    \ Y_train)))\nshards = train_ds.repeat(10)\n                .random_shuffle_each_window()\n\
    \                .split(len(workers), locality_hints=workers)\n```\n\n要在工作者上运行训练，我们调用它们的train方法，并将数据集管道的一个分片传递给每个工作者。然后，我们阻塞等待所有工作者完成训练。总结一下这个阶段发生的事情：\n\
    \n-   每个周期，每个工作者获得数据的一个随机分片。\n-   工作者在其分配的数据分片上训练其本地模型。\n-   一旦一个工作者完成了当前分片的训练，它会阻塞直到其他工作者完成。\n\
    -   对于剩余的周期（在本例中，总共10个周期），重复上述过程。\n\n示例 7-15。\n\n```python\n# Wait for training\
    \ to complete on all of the workers.\nray.get([worker.train.remote(shard) for\
    \ worker, shard in zip(workers, shards)])\n```\n\n最后，我们可以在一些测试数据上测试每个工作者训练好的模型，以确定哪个alpha值产生了最准确的模型。\n\
    \n示例 7-16。\n\n```python\n# Get validation results from each worker.\nprint(ray.get([worker.test.remote(X_test,\
    \ Y_test) for worker in workers]))\n```\n\n虽然这可能不是一个真实的机器学习任务，实际上你可能应该使用Ray Tune或Ray\
    \ Train，但这个例子传达了Ray Datasets的强大功能，特别是在机器学习工作负载方面。仅仅几十行Python代码，我们就实现了一个复杂的分布式超参数调优和训练工作流，它可以轻松扩展到数十或数百台机器，并且与任何框架或特定的机器学习任务无关。"

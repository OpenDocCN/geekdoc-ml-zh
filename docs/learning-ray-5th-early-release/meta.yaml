  md: "Running this trainer, you should see how the task difficulty increases over\
    \ time, thereby giving the trainer easy examples to start with so that in can\
    \ learn from them and progress to more difficult tasks as it progresses.\n\nCurriculum\
    \ learning is a great technique to be aware of and RLlib allows you to easily\

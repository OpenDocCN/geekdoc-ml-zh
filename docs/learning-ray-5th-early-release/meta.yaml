- img_proc: true
  md: 'previous chapter. To wrap things up, we''ll also have a look at how to use
    Tune for supervised learning tasks, using frameworks like PyTorch and TensorFlow.
    Along the way, we demonstrate how Tune integrates with other HPO libraries and
    introduce you to some of its more advanced features.


    # Tuning Hyperparameters


    Let''s recap the basics of hyperparameter optimization briefly. If you''re familiar
    with this topic, you can skip this section, but since we''re also discussing aspects
    of distributed HPO, you might still benefit from following along. The notebook
    for this chapter can be found in the GitHub repository of this book.


    If you recall our first RL experiment introduced in Chapter 3, we defined a very
    basic Q-learning algorithm whose internal *state-action values* were updated according
    to an explicit update rule. After initialization, we never touched these *model
    parameters* directly, they were learnt by the algorithm. By contrast, in setting
    up the algorithm, we explicitly chose a *weight* and a *discount_factor* parameter
    prior to training. I didn''t tell you how we chose to set these parameters back
    then, we simply accepted the fact that they were good enough to crack the problem
    at hand. In the same way, in Chapter 4 we initialized an RLlib algorithm with
    a config that used a total of four rollout workers for our DQN algorithm by setting
    `num_workers=4`. Parameters like these are called *hyperparameters*, and finding
    good choices for them can be crucial for successful experiments. The field of
    hyperparameter optimization entirely is devoted to efficiently finding such good
    choices.


    # Building a random search example with Ray


    Hyperparameters like the *weight* or the *discount_factor* of our Q-learning algorithm
    are *continuous* parameters, so we can''t possibly test all combinations of them.
    What''s more, these parameter choices may not be independent of each other. If
    we want them to be selected for us, we also need to specify a *value range* for
    each of them (both hyperparameters need to be chosen between 0 and 1 in this case).
    So, how do we determine good or even optimal hyperparameters?


    Let''s take a look at a quick example that implements a naive, yet effective approach
    to tuning hyperparameters. This example will also allow us to introduce some terminology
    that we''ll use later on. The core idea is that we can attempt to *randomly sample*
    hyperparameters, run the algorithm for each sample, and then select the best run
    based on the results we got. But to do the theme of this book justice, we don''t
    just want to run this in a sequential loop, we want to compute our runs in parallel
    using Ray.


    To keep things simple we''ll revisit our simple Q-learning algorithm from Chapter
    3 again. If you don''t recall the signature of the main training function, we
    defined it as'
  merge: -1
  pgno: 100
- img_proc: true
  md: "train_policy(env, num_episodes=10000, weight=0.1, discount_factor=0.9). That\
    \ means we can tune the weight and discount_factor parameters of our algorithm\
    \ by passing in different values to the train_policy function and see how the\
    \ algorithm performs. To do that, let's define a so-called search space for our\
    \ hyperparameters. For both parameters in question we simply uniformly sample\
    \ values between 0 and 1, for a total of 10 choices. Here's what that looks like:\n\
    \nExample 5-1.\n\n```\nimport random\nsearch_space = []\nfor i in range(10):\n\
    \    random_choice = {\n        'weight': random.uniform(0, 1),\n        'discount_factor':\
    \ random.uniform(0, 1)\n    }\n    search_space.append(random_choice)\n```\n\n\
    Next, we define an objective function, or simply objective. The role of an objective\
    \ function is to evaluate the performance of a given set of hyperparameters for\
    \ the task we're interested in. In our case, we want to train our RL algorithm\
    \ and evaluate the trained policy. Recall that in Chapter 3> we also defined an\
    \ evaluate_policy function for precisely this purpose. The evaluate_policy function\
    \ was defined to return the average number of steps it took for an agent to reach\

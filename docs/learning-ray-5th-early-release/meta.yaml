  md: 'Right now your Ray cluster doesn''t do much, but that''s about to change. After
    giving you a quick introduction to the data science workflow in the following
    section, you''ll run your first concrete Ray examples.


    # A Suite of Data Science Libraries


    Moving on to the second layer of Ray, in this section we''ll introduce all the
    data science libraries that Ray comes with. To do so, let''s first take a bird''s
    eye view on what it means to do data science. Once you understand this context,
    it''s much easier to place Ray''s higher-level libraries and see how they can
    be useful to you. If you have a good idea of the data science process, you can
    safely skip ahead to section "Data Processing with Ray Data" on page 17.


    # Machine Learning and the Data Science Workflow


    The somewhat elusive term "data science" (DS) evolved quite a bit in recent years,
    and you can find many definitions of varying usefulness online.⁵ To me, it''s
    *the practice of gaining insights and building real-world applications by leveraging
    data*. That''s quite a broad definition, and you don''t have to agree with me.
    My point is that data science is an inherently practical and applied field that
    centers around building and understanding things, which makes fairly little sense
    in a *purely* academic context. In that sense, describing practitioners of this
    field as "data scientists" is about as bad of a misnomer as describing hackers
    as "computer scientists".⁶


    Since you are familiar with Python and hopefully bring a certain craftsmanship
    attitude with you, we can approach the Ray''s data science libraries from a very
    pragmatic angle. Doing data science in practice is an iterative process that goes
    something like this:


    +   *Requirements engineering*

    You talk to stakeholders to identify the problems you need to solve and clarify
    the requirements for this project.


    *Data collection*

    Then you source, collect and inspect the data.


    > 5 I never liked the categorization of data science as an intersection of disciplines,
    like maths, coding and business. Ultimately, that doesn''t tell you what practitioners
    *do*. It doesn''t do a cook justice to tell them they sit at the intersection
    of agriculture, thermodynamics and human relations. It''s not wrong, but also
    not very helpful.


    6 As a fun exercise, I recommend reading Paul Graham''s famous "Hackers and Painters"
    essay on this topic and replace "computer science" with "data science". What would
    hacking 2.0 be?'

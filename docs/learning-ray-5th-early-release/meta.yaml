    \ network has three linear transformations starting with the dimension of our\
    \ feature vector and then outputs a value between 0 and 1 using a Sigmoid activation\
    \ function. This output value will be rounded to produce the binary prediction\
    \ of if the ride will result in a big tip or not.\n\nExample 7-21.\n\n```\nimport\
    \ torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\nNUM_FEATURES\
    \ = 6\n\nclass FarePredictor(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.fc1 = nn.Linear(NUM_FEATURES, 256)\n        self.fc2 = nn.Linear(256,\

    # Chapter 32


    # Cross-Validation Techniques


    # Introduction


    In machine learning, it is crucial to evaluate the performance of a model on unseen
    data to assess its generalization ability. However, simply training and testing
    a model on a single dataset may lead to overfitting or biased performance estimates.
    Cross-validation techniques provide a solution to this problem by partitioning
    the available data into multiple subsets and repeatedly evaluating the model on
    different combinations of these subsets. This chapter focuses on discussing various
    cross-validation techniques and their mathematical foundations.


    # k-Fold Cross-Validation


    $k$-fold cross-validation is one of the most widely used cross-validation techniques.
    It involves splitting the dataset into $k$ equally sized folds or subsets. The
    model is then trained $k$ times, where each time it uses $k - 1$ folds for training
    and the remaining fold for testing. The performance metric of interest is computed
    as the average across the $k$ test folds.


    Mathematically, given a dataset $\mathcal{D}$ with $m$ samples, $k$-fold cross-validation
    partitions $\mathcal{D}$ into $k$ folds $\mathcal{D}_1, \mathcal{D}_2, \ldots,
    \mathcal{D}_k$. For each fold $\mathcal{D}_i$, the model $\mathcal{M}$ is trained
    on the remaining $k - 1$ folds and evaluated on $\mathcal{D}_i$. The performance
    metric $\mathcal{P}$ is then computed as:'
  - '[PAGE 142]


    $$\mathcal{P} = \frac{1}{k} \sum_{i=1}^{k} \mathcal{L}(\mathcal{M}_{\mathcal{D}_i}),$$


    where $\mathcal{L}$ is a predefined loss or scoring function.


    # Leave-One-Out Cross-Validation


    Leave-One-Out (LOO) cross-validation is a special case of $k$-fold cross-validation
    where $k = m$, i.e., each fold contains only one sample. In this technique, the
    model is trained $m$ times, leaving out one sample for testing at each iteration.
    The performance metric is then computed as the average across all iterations.


    Mathematically, given a dataset $\mathcal{D}$ with $m$ samples, LOO cross-validation
    trains the model $\mathcal{M}$ on all but one sample, and evaluates its performance
    on the left-out sample for each iteration $i$. The performance metric $\mathcal{P}$
    is computed as:


    $$\mathcal{P} = \frac{1}{m} \sum_{i=1}^{m} \mathcal{L}(\mathcal{M}_{\mathcal{D}_{\setminus
    i}}),$$


    where $\mathcal{D}_{\setminus i}$ denotes the dataset with the $i$th sample removed.


    # Stratified Cross-Validation


    Stratified cross-validation is particularly useful when dealing with imbalanced
    datasets, where the distribution of classes is uneven. It ensures that the class
    distribution in each fold remains consistent with the original dataset, reducing
    the risk of biased performance estimation.


    Mathematically, given a dataset $\mathcal{D}$ with $m$ samples and $c$ classes,
    stratified cross-validation partitions $\mathcal{D}$ into $k$ folds $\mathcal{D}_1,
    \mathcal{D}_2, \ldots, \mathcal{D}_k$. The class proportions in each fold are
    maintained approximately equal to the original dataset $\mathcal{D}$. The performance
    metric $\mathcal{P}$ is then computed as:


    $$\mathcal{P} = \frac{1}{k} \sum_{i=1}^{k} \mathcal{L}(\mathcal{M}_{\mathcal{D}_i}),$$


    where $\mathcal{L}$ is a predefined loss or scoring function.'

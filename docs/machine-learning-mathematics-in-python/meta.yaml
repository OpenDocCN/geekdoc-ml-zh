    # Mini-Batch Gradient Descent


    The mini-batch gradient descent (MBGD) algorithm, an extension of stochastic gradient
    descent (SGD), addresses the issue of noisy and unstable updates associated with
    stochastic gradient descent. Instead of using a single training example (as done
    in SGD) or the entire training dataset (as done in batch gradient descent), MBGD
    computes the gradient based on a small batch of training examples.

    The update rule for MBGD can be described as follows:

    $$\mathbf{x}^{(t+1)} = \mathbf{x}^{(t)} - \alpha \cdot \nabla f_{\text{batch}}(\mathbf{x}^{(t)})$$


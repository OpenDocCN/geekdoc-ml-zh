    # Expectation-Maximization (EM)


    # Gaussian Mixture Models


    A Gaussian Mixture Model (GMM) is a probabilistic model that represents a set
    of data points as a mixture of Gaussian distributions. It is widely used for clustering
    and density estimation tasks. Let $\mathbf{X} = \{\mathbf{x}_1, \mathbf{x}_2,
    ..., \mathbf{x}_n\}$ be the observed data, where $\mathbf{x}_i \in \mathbb{R}^d$
    represents a $d$-dimensional data point.


    The GMM assumes that each data point $\mathbf{x}_i$ is generated from one of $K$
    Gaussian components, with each component characterized by a mean vector $\boldsymbol{\mu}_k$
    and a covariance matrix $\boldsymbol{\Sigma}_k$. The GMM also introduces a latent
    variable $\mathbf{z}_i$ to indicate the component from which $\mathbf{x}_i$ is
    generated. $\mathbf{z}_i$ is a one-hot vector, with the $k$-th element being 1
    if $\mathbf{x}_i$ is generated from the $k$-th Gaussian component, and 0 otherwise.


    $$p(\mathbf{X}, \mathbf{Z}, \boldsymbol{\theta}) = \prod_{i=1}^n \prod_{k=1}^K
    [\pi_k \mathcal{N}(\mathbf{x}_i | \boldsymbol{\mu}_k, \boldsymbol{\Sigma}_k)]^{z_{ik}}$$


    where $\mathbf{Z} = \{\mathbf{z}_1, \mathbf{z}_2, ..., \mathbf{z}_n\}$ is the
    set of latent variables, and $\boldsymbol{\theta} = \{\boldsymbol{\mu}_1, ...,
    \boldsymbol{\mu}_K, \boldsymbol{\Sigma}_1, ..., \boldsymbol{\Sigma}_K, \pi_1,
    ..., \pi_K\}$ is the set of model parameters. Here, $\pi_k$ represents the mixing
    coefficient for the $k$-th Gaussian component, satisfying $\sum_{k=1}^K \pi_k
    = 1$.'

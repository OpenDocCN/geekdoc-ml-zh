    # Basic Notations and Terminology


    In order to understand machine learning concepts and algorithms, it is important
    to be familiar with some basic notations and terminology used in this field.


    # 1 Datasets


    A dataset is a collection of instances or examples that are used to train, validate,
    and test machine learning models. In mathematical notation, a dataset can be represented
    as follows:


    $$\mathcal{D} = \{(\mathbf{x}_1, y_1), (\mathbf{x}_2, y_2), \ldots, (\mathbf{x}_n,
    y_n)\}$$


    where $\mathbf{x}_i$ denotes the $i$-th input instance and $y_i$ denotes the corresponding
    output or target value. The dataset $\mathcal{D}$ typically consists of a training
    set, a validation set, and a test set.



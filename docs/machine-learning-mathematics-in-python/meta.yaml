    \ = np.zeros((T, N))\n    backtracking_variables = np.zeros((T, N), dtype=int)\n\
    \n    viterbi_variables[0] = initial_state_probs * emission_probs[:, observed_sequence[0]]\n\
    \n    for t in range(1, T):\n        for j in range(N):\n            viterbi_variables[t,\

  md: '# Chapter 39


    # Sequence Modeling


    # Introduction


    Sequence modeling is a fundamental concept in machine learning that focuses on
    modeling and predicting sequences of data. Sequences can be found in various domains
    such as natural language processing, speech recognition, and genomics, where the
    order of elements plays a crucial role. In this chapter, we will delve into the
    mathematics behind sequence modeling and explore various models used in this field.


    # 1 Hidden State Representation


    One of the key components in sequence modeling is the hidden state representation.
    A hidden state serves as an internal memory of the model that captures the information
    from the previous elements in the sequence. It summarizes the relevant information
    needed to make predictions for the current element in the sequence.


    Mathematically, for a sequence $\mathbf{x} = \{x_1, x_2, \dots, x_T\}$, the hidden
    state representation $\mathbf{h}_t$ at time step $t$ is computed based on the
    previous hidden state $\mathbf{h}_{t-1}$ and the current input $\mathbf{x}_t$
    as follows:


    $$\mathbf{h}_t = f(\mathbf{h}_{t-1}, \mathbf{x}_t)$$


    Here, $f(\cdot)$ denotes the mapping function that captures the dependency between
    the hidden state and the input.'
  merge: -1
  pgno: 171
- img_proc: true
  md: "# 2 Beam Search\n\nBeam search is a decoding technique commonly used in sequence\
    \ modeling tasks like machine translation and speech recognition. It is used to\
    \ generate the most likely sequence of outputs given a trained sequence model.\n\
    \nThe basic idea behind beam search is to maintain a fixed-size set of candidate\
    \ sequences, known as the beam. At each time step, the beam is expanded by considering\
    \ all possible extensions of the current candidate sequences, up to a certain\
    \ predefined size. The candidate sequences are then scored based on a scoring\
    \ function, and the top-k sequences with the highest scores are retained in the\
    \ beam.\n\nMathematically, the beam search algorithm can be defined as follows:\n\
    \n```\nInput: Sequence model $P(y_t|\\mathbf{h}_t, y_{t-1})$\nOutput: Optimal\
    \ sequence $y^*$\nProcedure:\n    Initialize beam $B$ with initial sequence $y_0$\n\
    \    for each time step $t$ from 1 to $T$ do:\n        Create an empty set $B'$\n\
    \        for each sequence $y$ in beam $B$ do:\n            Compute the hidden\
    \ state $\\mathbf{h}_t$ using $f(\\mathbf{h}_{t-1}, y_{t-1})$\n            Generate\
    \ the distribution $P(y_t|\\mathbf{h}_t, y_{t-1})$\n            for each possible\
    \ next output $o$ do:\n                Compute the score $\\text{score}(y \\cdot\
    \ o)$ using a scoring function\n                Select the top-k sequences with\
    \ the highest scores and add them to $B'$\n        Set beam $B$ to $B'$\n    Select\
    \ the sequence with the highest score from beam $B$ as the optimal sequence $y^*$\n\
    ```\n\nIn practice, beam search greatly improves the quality of output sequences\
    \ by considering multiple hypotheses during the decoding process.\n\n# 3 Sequence-to-Sequence\
    \ Models\n\nSequence-to-sequence (seq2seq) models, also known as encoder-decoder\
    \ models, are widely used in various sequence modeling tasks"
  merge: -1
  pgno: 172
- img_proc: true
  md: 'like machine translation, text summarization, and speech recognition. These
    models consist of two main components: an encoder and a decoder.


    The encoder takes an input sequence $\mathbf{x} = \{x_1, x_2, \dots, x_T\}$ and
    maps it to a fixed-dimensional vector representation called the context or thought
    vector $\mathbf{c}$. The context vector captures the information from the input
    sequence that is relevant for the decoding process.


    The decoder, on the other hand, takes the context vector $\mathbf{c}$ and generates
    the output sequence $\mathbf{y} = \{y_1, y_2, \dots, y_{T''}\}$, where $T''$ may
    differ from $T$. At each time step $t$, the decoder generates an output $y_t$
    based on the context vector $\mathbf{c}$ and the hidden state $\mathbf{h}_t$.


    Mathematically, for an input sequence $\mathbf{x}$ and an output sequence $\mathbf{y}$,
    the sequence-to-sequence model can be formulated as follows:


    ```

    $$\begin{aligned}

    \mathbf{c} &= \text{Encoder}(\mathbf{x}) \n\mathbf{h}_t &= f(\mathbf{h}_{t-1},
    y_{t-1}, \mathbf{c}) \nP(y_t|\mathbf{h}_t, y_{t-1}, \mathbf{c}) &= \text{Decoder}(\mathbf{h}_t,
    y_{t-1}, \mathbf{c})

    \end{aligned}$$

    ```


    where $\text{Encoder}(\cdot)$ and $\text{Decoder}(\cdot)$ represent the encoder
    and decoder functions, respectively, and $f(\cdot)$ is the hidden state mapping
    function as defined in Section 1.'

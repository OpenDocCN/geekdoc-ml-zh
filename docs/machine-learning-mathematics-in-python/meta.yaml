    # Chapter 8


    # Logistic Regression


    # Introduction


    In this chapter, we will delve into the mathematical foundations of logistic regression.
    Logistic regression is a powerful classification algorithm that is widely used
    in machine learning and statistics. We will explore its underlying mathematics
    and discuss how it can be used to model the relationship between a set of independent
    variables and a binary dependent variable.


    # Model Formulation


    Logistic regression aims to model the probability of a binary outcome, typically
    denoted as $y \in \{0, 1\}$, based on a set of independent variables denoted as
    $\mathbf{x} = (x_1, x_2, \ldots, x_p)$. The logistic regression model can be formulated
    as follows:


    $$P(y = 1|\mathbf{x}) = \frac{1}{1 + e^{-(\beta_0 + \beta_1 x_1 + \beta_2 x_2
    + \ldots + \beta_p x_p)}} \quad (8.1)$$


    where $P(y = 1|\mathbf{x})$ represents the conditional probability of $y$ being
    1 given the values of the independent variables $\mathbf{x}$. The term $e$ denotes
    the base of the natural logarithm, and $\beta_0, \beta_1, \ldots, \beta_p$ represent
    the model''s coefficients or parameters.


    The odds ratio can be defined as the ratio of the probability of an event occurring
    to the probability of it not occurring. In the case of logistic regression, the
    odds ratio can be written as:'
  - '[PAGE 50]


    $$\text{Odds} = \frac{P(y=1|\mathbf{x})}{P(y=0|\mathbf{x})} = e^{\beta_0 + \beta_1
    x_1 + \beta_2 x_2 + \dots + \beta_p x_p} \quad (8.2)$$


    # Maximum Likelihood Estimation


    To estimate the coefficients in logistic regression, the maximum likelihood estimation
    (MLE) method is commonly used. The goal is to find the values of the coefficients
    that maximize the likelihood function. The likelihood function can be written
    as:


    $$L(\beta_0, \beta_1, \dots, \beta_p) = \prod_{i=1}^n P(y_i|\mathbf{x}_i) \quad
    (8.3)$$


    To simplify calculations, it is common to maximize the log-likelihood function
    instead:


    $$\ell(\beta_0, \beta_1, \dots, \beta_p) = \sum_{i=1}^n \log(P(y_i|\mathbf{x}_i))
    \quad (8.4)$$


    The coefficients that maximize the log-likelihood function can be obtained using
    numerical optimization techniques such as gradient descent or Newton''s method.


    # Model Interpretation


    In logistic regression, the coefficients can be interpreted as the change in the
    logarithm of the odds ratio for a one-unit change in the corresponding independent
    variable, holding all other variables constant. Mathematically, the interpretation
    of the coefficients can be written as follows:


    $$\frac{d}{dx_i} \log \left( \frac{P(y=1|\mathbf{x})}{P(y=0|\mathbf{x})} \right)
    = \beta_i \quad (8.5)$$


    This implies that a positive coefficient $\beta_i$ indicates that an increase
    in the corresponding independent variable $x_i$ leads to an increase in the odds
    ratio, and vice versa.'

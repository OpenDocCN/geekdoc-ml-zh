    # 第 15 章：K-近邻算法（K-NN）


    ## 简介


    K-近邻（K-NN）算法是一种非参数分类算法，在机器学习中被广泛使用。其核心思想是通过从训练数据中找到 K 个最近邻来对输入样本进行分类，并根据邻居的多数投票或加权投票分配标签。在本章中，我们将深入探讨
    K-NN 算法的数学基础，讨论用于衡量相似性的距离度量，并探索该算法的计算复杂度。


    ## 距离度量


    距离度量的选择在 K-NN 算法中起着至关重要的作用，因为它决定了如何衡量样本之间的相似性。常见的距离度量包括欧几里得距离、曼哈顿距离和闵可夫斯基距离。对于给定的特征向量
    $\mathbf{x} = (x_1, x_2, ..., x_n)$ 和 $\mathbf{y} = (y_1, y_2, ..., y_n)$，这些距离度量可以正式定义如下：


    ### 1. 欧几里得距离


    $\mathbf{x}$ 和 $\mathbf{y}$ 之间的欧几里得距离由以下公式给出：


    $$\text{Euclidean}(\mathbf{x}, \mathbf{y}) = \sqrt{\sum_{i=1}^{n} (x_i - y_i)^2}
    \quad (15.1)$$


    ### 2. 曼哈顿距离


    $\mathbf{x}$ 和 $\mathbf{y}$ 之间的曼哈顿距离由以下公式给出：


    $$\text{Manhattan}(\mathbf{x}, \mathbf{y}) = \sum_{i=1}^{n} |x_i - y_i| \quad
    (15.2)$$


    ### 3. 闵可夫斯基距离


    $\mathbf{x}$ 和 $\mathbf{y}$ 之间的闵可夫斯基距离是一种广义形式，包含了欧几里得距离和曼哈顿距离。其定义为：


    $$\text{Minkowski}(\mathbf{x}, \mathbf{y}) = \left( \sum_{i=1}^{n} |x_i - y_i|^p
    \right)^{\frac{1}{p}} \quad (15.3)$$


    其中 $p$ 是一个参数，用于确定距离度量的形式。当 $p = 1$ 时，闵可夫斯基距离等同于曼哈顿距离；当 $p = 2$ 时，它简化为欧几里得距离。


    ## K-NN 算法


    K-NN 算法通过考虑训练数据中 K 个最近邻的标签来为输入样本分配类别标签。该算法包含以下步骤：


    ### 1. 步骤 1：选择 K


    选择一个正整数 K，它对应于要考虑的最近邻数量。


    ### 2. 步骤 2：计算距离


    使用距离度量（如欧几里得距离或曼哈顿距离）计算输入样本 $\mathbf{x}$ 与每个训练样本 $\mathbf{x}_i$ 之间的距离。


    ### 3. 步骤 3：找到 K 个最近邻


    选择与输入样本距离最小的 K 个训练样本。


    ### 4. 步骤 4：分配类别标签


    根据 K 个最近邻的多数投票或加权投票为输入样本分配类别标签。如果使用多数投票，则分配 K 个邻居中计数最高的类别标签。如果使用加权投票，则根据投票的加权和分配类别标签，其中每个邻居的权重由其与输入样本的反距离决定。


    K 的选择影响 K-NN 算法的偏差-方差权衡。较小的 K 值往往具有低偏差但高方差，导致更灵活的决策边界。另一方面，较大的 K 值具有较高的偏差但较低的方差，导致更平滑的决策边界。


    ## 计算复杂度


    K-NN 算法的计算复杂度主要由计算输入样本与所有训练样本之间的距离决定。假设有 $m$ 个训练样本和 $n$ 个特征，计算两个样本之间的距离的时间复杂度为
    $O(n)$。因此，K-NN 算法进行单次预测的总体时间复杂度为 $O(mn)$。


    在预测期间，算法需要计算所有 $m$ 个训练样本的距离。因此，预测所有测试样本的类别标签的总体时间复杂度为 $O(kmn)$，其中 $k$ 是测试样本的数量。


    值得注意的是，对于大型数据集或高维特征空间，K-NN 算法可能计算量很大，因为它需要计算每对样本之间的距离。'

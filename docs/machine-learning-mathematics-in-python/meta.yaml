    \n## 凝聚式与分裂式层次聚类\n\n层次聚类可以使用两种主要策略执行：凝聚式和分裂式。\n\n在**凝聚式聚类**中，所有数据点最初都是独立的簇，并根据它们的相似性逐步合并在一起。这种自底向上的方法从每个数据点作为一个单独的簇开始，并迭代地合并两个最近的簇，直到满足停止准则。该算法构建一个簇的层次结构，称为树状图，可以进一步分析以确定簇的数量。\n\

  - '[PAGE 147]


    $$\text{Output} = \gamma \left( \frac{\text{Input} - \mu}{\sqrt{\sigma^2 + \epsilon}}
    \right) + \beta,$$


    where $\gamma$ and $\beta$ are learnable parameters, $\mu$ is the mean of the

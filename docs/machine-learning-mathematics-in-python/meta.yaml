  md: '# Chapter 19


    # Principal Component Analysis (PCA)


    # Covariance Matrix


    The covariance matrix provides important information about the relationships between
    different features in a dataset. Given a data matrix $\mathbf{X} \in \mathbb{R}^{n
    \times p}$, where each row represents a data point and each column represents
    a feature, the covariance matrix $\mathbf{\Sigma}$ is defined as:


    $$\mathbf{\Sigma} = \frac{1}{n} (\mathbf{X} - \mu)^T (\mathbf{X} - \mu)$$


    where $\mu$ is the mean vector of $\mathbf{X}$, obtained by subtracting the mean
    of each column from the respective column.


    # 1 Python Code


    ```

    import numpy as np


    # Calculate the covariance matrix

    cov_matrix = np.cov(X.T)

    ```


    # Eigen Decomposition


    Eigen decomposition is a key step in Principal Component Analysis (PCA) and is
    used to obtain the principal components of a dataset.'
  merge: -1
  pgno: 94
- img_proc: true
  md: 'The eigen decomposition of the covariance matrix $\Sigma$ is given by:


    $$\Sigma = \mathbf{V}\Lambda\mathbf{V}^T$$


    where $\mathbf{V}$ is a matrix whose columns are the eigenvectors of $\Sigma$,
    and $\Lambda$ is a diagonal matrix containing the corresponding eigenvalues.


    # 1 Python Code


    ```

    eigenvals, eigenvects = np.linalg.eig(cov_matrix)

    ```


    # Dimensionality Reduction


    PCA allows for dimensionality reduction by selecting a subset of the principal
    components. The principal components of a dataset are the eigenvectors of the
    covariance matrix, ordered by their corresponding eigenvalues in descending order.
    By selecting the first $k$ principal components, we obtain a lower-dimensional
    representation of the data.


    # 1 Python Code



    # Basic Gradient Descent Algorithm


    At its core, gradient descent is an iterative optimization algorithm used to find
    the minimum of a function. Given a function $f : \mathbb{R}^n \to \mathbb{R}$,
    the goal of gradient descent is to find the values of the input variables $\mathbf{x}
    = (x_1, x_2, \ldots, x_n)$ that minimize $f(\mathbf{x})$.

    The basic gradient descent algorithm can be summarized as follows:


    # 1 Algorithm


    **Step 1: Initialization**


    Pick an initial guess for the input variables $\mathbf{x}^{(0)} = (x_1^{(0)},
    x_2^{(0)}, \ldots, x_n^{(0)})$. This initial guess can be arbitrary or, in some
    cases, chosen based on domain knowledge.'

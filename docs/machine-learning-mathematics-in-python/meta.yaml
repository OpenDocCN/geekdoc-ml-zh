    \ in a time series is expressed as a linear combination of its $p$ previous observations,\
    \ weighted by certain coefficients. The general form of an AR(p) model is given\
    \ by the equation:\n\n$$X_t = c + \\phi_1 X_{t-1} + \\phi_2 X_{t-2} + \\dots +\
    \ \\phi_p X_{t-p} + \\varepsilon_t,$$\n\nwhere $X_t$ is the value of the time\
    \ series at time $t$, $c$ is a constant term, $\\phi_1, \\phi_2, \\dots, \\phi_p$\
    \ are the autoregressive coefficients, and $\\varepsilon_t$ is the white noise\

    ## 3 错误类型\n\n假设检验涉及犯两种错误的可能性：第一类错误和第二类错误。\n\n第一类错误发生在原假设被拒绝，即使它是真的。它代表假阳性结论。第一类错误的概率记为\
    \ $\\alpha$，在进行检验之前设定（例如，设为 0.05 或 0.01）。\n\n第二类错误发生在原假设未被拒绝，即使它是假的。它代表假阴性结论。第二类错误的概率记为\
    \ $\\beta$，取决于各种因素，如样本量、效应大小和显著性水平。\n\n## 4 Python 实现\n\n在 Python 中，`scipy.stats`\
    \ 模块提供了进行假设检验的函数。以下代码片段演示了如何执行单样本 t 检验：\n\n```\nimport numpy as np\nfrom scipy.stats\
    \ import ttest_1samp\n\ndata = np.array([3, 5, 7, 8, 9, 10, 11, 14, 15, 17])\n\
    \nt_statistic, p_value = ttest_1samp(data, 10)\n\nprint(\"T-Statistic:\", t_statistic)\n\
    print(\"P-Value:\", p_value)\n```\n\n在此代码中，我们使用 `scipy.stats` 模块中的 `ttest_1samp()`\
    \ 函数执行单样本 t 检验。检验统计量和 P 值作为函数的输出获得。\n\n## 置信区间\n\n在本节中，我们将探讨置信区间，这是一种估计总体参数合理值范围的方法。置信区间提供了与估计相关的精度和不确定性的度量。\n\
    \n## 1 解释置信区间\n\n置信区间是从样本数据计算出的一系列值，很可能包含感兴趣的总体参数。置信水平（记为 $(1 - \\alpha)$）表示如果重复相同的抽样过程多次，将包含真实总体参数的置信区间的比例。\n\
    \n例如，如果我们为均值构建一个 95% 的置信区间，我们有 95% 的把握认为该区间包含真实的总体均值。\n\n## 2 构建置信区间\n\n置信区间的构建取决于样本数据和所需的置信水平。构建置信区间最常用的方法是使用标准正态分布或\
    \ t 分布的临界值。\n\n例如，如果我们正在构建一个已知总体标准差的均值的置信区间，我们可以使用标准正态分布和以下公式：\n\n$$\\text{Confidence\
    \ interval} = \\bar{x} \\pm z \\cdot \\frac{\\sigma}{\\sqrt{n}}$$\n\n其中 $\\bar{x}$\
    \ 代表样本均值，$z$ 是与所需置信水平对应的标准正态分布的临界值，$\\sigma$ 是总体标准差，$n$ 是样本量。\n\n如果总体标准差未知，我们可以使用\
    \ t 分布和以下公式：\n\n$$\\text{Confidence interval} = \\bar{x} \\pm t \\cdot \\frac{s}{\\\
    sqrt{n}}$$\n\n其中 $s$ 是样本标准差，$t$ 是与所需置信水平和样本量减一自由度对应的 t 分布的临界值。\n\n## 3 Python\
    \ 实现\n\n在 Python 中，`scipy.stats` 模块提供了计算置信区间的函数。以下代码片段演示了如何使用 t 分布计算均值的置信区间：\n\
    \n```\nimport numpy as np\nfrom scipy.stats import t\n\ndata = np.array([3, 5,\
    \ 7, 8, 9, 10, 11, 14, 15, 17])\n\nsample_mean = np.mean(data)\nsample_std = np.std(data)\n\
    sample_size = len(data)\n\nconfidence_level = 0.95\ndegree_of_freedom = sample_size\
    \ - 1\n\ncritical_value = t.ppf((1 + confidence_level) / 2,\n                \
    \        df=degree_of_freedom)\nmargin_of_error = critical_value * (sample_std\
    \ /\n                                    np.sqrt(sample_size))\n\nconfidence_interval\
    \ = (sample_mean - margin_of_error,\n                       sample_mean + margin_of_error)\n\
    ```"

    # Convex Sets


    A convex set is a set $\Omega \subset \mathbb{R}^n$ that satisfies the following
    inequality for all $x, y \in \Omega$ and $0 \le \lambda \le 1$:


    $$\lambda x + (1 - \lambda)y \in \Omega.$$


    Geometrically, this inequality states that for any two points in the set, the
    line segment connecting them is entirely contained within the set. Convex sets
    play a crucial role in formulating constraints in optimization problems.


    # Convex Optimization Problem


    A convex optimization problem can be formulated as follows:


    $$\begin{aligned} &\text{Minimize} \quad f(x) \ &\text{subject to} \quad g_i(x)
    \le 0, \quad i = 1, 2, \ldots, m \ &\qquad\qquad\qquad h_j(x) = 0, \quad j = 1,
    2, \ldots, p \end{aligned}$$


    where $f(x)$ is a convex objective function, $g_i(x)$ are convex inequality constraints,
    and $h_j(x)$ are affine equality constraints.


    The goal of convex optimization is to find a feasible point $x^*$ that minimizes
    the objective function $f(x)$. It is important to note that any local minimum
    of a convex optimization problem is also a global minimum.


    # Optimality Conditions


    A point $x^*$ is said to be optimal if it satisfies the following conditions:


    +   - **Feasibility:** $x^*$ satisfies all the inequality and equality constraints.

    - **Lagrange Multiplier Condition:** There exist Lagrange multipliers $\lambda^*$
    and $\nu^*$ such that the following conditions hold:


    $$\nabla f(x^*) + \sum_{i=1}^m \lambda_i^* \nabla g_i(x^*) + \sum_{j=1}^p \nu_j^*
    \nabla h_j(x^*) = 0$$

    $$g_i(x^*) \le 0, \quad \lambda_i^* \ge 0, \quad \lambda_i^* g_i(x^*) = 0$$

    $$h_j(x^*) = 0$$'

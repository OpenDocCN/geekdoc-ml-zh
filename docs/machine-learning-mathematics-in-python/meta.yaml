    # Chapter 34


    # Dimensionality Reduction Techniques


    # Introduction


    Dimensionality reduction is a fundamental technique used in machine learning to
    reduce the number of features or variables while preserving the essential information
    and structure of the data. In this chapter, we explore three popular dimensionality
    reduction techniques: t-SNE (t-Distributed Stochastic Neighbor Embedding), UMAP
    (Uniform Manifold Approximation and Projection), and ICA (Independent Component
    Analysis).


    # t-SNE


    t-SNE is a nonlinear dimensionality reduction technique commonly used for visualizing
    high-dimensional data. It aims to map the original data points to a lower-dimensional
    space while preserving the pairwise similarities between data points. The t-SNE
    algorithm constructs a probability distribution over pairs of high-dimensional
    objects such that similar objects have a higher probability of being chosen. It
    also constructs a probability distribution over pairs of low-dimensional points,
    attempting to match the pairwise similarities from the high-dimensional space.
    The objective is to minimize the Kullback-Leibler divergence between these two
    distributions. The t-SNE objective function can be expressed as follows:'
  - '[PAGE 150]


    $$C = \sum_{i=1}^{N} KL(P_i || Q_i),$$

    where $N$ is the number of data points, $P_i$ is the probability distribution
    over pairwise similarities in the high-dimensional space, and $Q_i$ is the probability
    distribution over pairwise similarities in the low-dimensional space.


    # 1 Python Code: t-SNE


    The following Python code snippet demonstrates the usage of t-SNE for dimensionality
    reduction and visualization using the scikit-learn library:


    ```

    from sklearn.manifold import TSNE


    # t-SNE

    tsne = TSNE(n_components=2, random_state=42)

    X_tsne = tsne.fit_transform(X)

    ```


    In this code snippet, the scikit-learn library''s TSNE class is utilized to perform
    t-SNE dimensionality reduction. The parameter `n_components` specifies the number
    of dimensions in the low-dimensional space.


    # UMAP


    UMAP is a dimensionality reduction technique that aims to preserve the local and
    global structure of the data. Unlike t-SNE, UMAP uses a different optimization
    objective based on fuzzy simplicial sets and is known for its scalability to large
    datasets. UMAP constructs a high-dimensional graph representation of the data,
    capturing complex relationships between data points. It then optimizes low-dimensional
    embeddings to match the graph structure, utilizing a cross-entropy loss function.

    The UMAP optimization objective function can be expressed as follows:


    $$C = \sum_{i=1}^{N} \left( \alpha \sum_{j \in \mathcal{N}_i} \left( w_{ij} \log
    \frac{w_{ij}}{q_{ij}} + (1 - w_{ij}) \log \frac{1 - w_{ij}}{1 - q_{ij}} \right)
    + (1 - \alpha) \sum_{j \in \mathcal{N}_i} d_{ij}^2 \right),$$'
  - "[PAGE 151]\n\nwhere $N$ is the number of data points, $\\mathcal{N}_i$ represents\
    \ the neighborhood of data point $i$, $w_{ij}$ is the weight of the directed edge\
    \ from $i$ to $j$, $q_{ij}$ denotes the membership probability of $j$ being in\
    \ the neighborhood of $i$, $d_{ij}$ represents the distance between $i$ and $j$,\
    \ and $\\alpha$ is a trade-off parameter that balances the importance of preserving\
    \ the graph structure and the distribution of distances.\n\n# 1 Python Code: UMAP\n\
    \nThe following Python code snippet demonstrates the usage of UMAP for dimensionality\
    \ reduction and visualization using the umap-learn library:\n\n```\nimport umap\n\
    \n# UMAP\numap_model = umap.UMAP(n_components=2,\n                       random_state=42)\n\
    umap_embedding = umap_model.fit_transform(X)\n```\n\nIn this code snippet, the\
    \ umap-learn library's UMAP class is utilized to perform UMAP dimensionality reduction.\
    \ The parameter `n_components` specifies the number of dimensions in the low-dimensional\
    \ space.\n\n# ICA\n\nICA is a dimensionality reduction technique based on the\
    \ statistical method of blind source separation. It aims to recover the original\
    \ independent sources of the observed data and is particularly useful when the\
    \ sources are statistically independent and non-Gaussian. ICA assumes that the\
    \ observed data is a linear mixture of the sources, and it aims to estimate a\
    \ linear transformation matrix to recover the sources.\n\nThe ICA model can be\
    \ expressed as follows:\n\n$$\\mathbf{X} = \\mathbf{A}\\mathbf{S},$$\n\nwhere\
    \ $\\mathbf{X}$ represents the observed data, $\\mathbf{A}$ is the mixing matrix,\
    \ and $\\mathbf{S}$ denotes the independent sources.\n\nICA aims to find an unmixing\
    \ matrix $\\mathbf{W}$ such that the estimated sources $\\hat{\\mathbf{S}}$ can\
    \ be obtained as:"
  - '[PAGE 152]


    $\hat{\mathbf{S}} = \mathbf{W}\mathbf{X}$.


    # 1 Python Code: ICA


    The following Python code snippet demonstrates the usage of ICA for dimensionality
    reduction using the scikit-learn library:


    ```

    from sklearn.decomposition import FastICA


    # ICA

    ica = FastICA(n_components=2, random_state=42)

    X_ica = ica.fit_transform(X)

    ```


    In this code snippet, the scikit-learn library''s `FastICA` class is utilized
    to perform ICA dimensionality reduction. The parameter `n_components` specifies
    the number of independent sources to estimate.


    In this chapter, we explored three dimensionality reduction techniques: t-SNE,
    UMAP, and ICA. These techniques enable us to represent high-dimensional data in
    a lower-dimensional space without losing critical information. By reducing the
    dimensionality of the data, we can simplify the learning process, visualize complex
    datasets, and enhance the performance of machine learning models.'
- md: "## Chapter 35\n\n## Markov Chain Monte Carlo (MCMC)\n\n### Introduction\n\n\
    Markov Chain Monte Carlo (MCMC) methods are widely used in statistical inference\
    \ and Bayesian analysis. These methods allow us to efficiently sample from a target\
    \ distribution, even when the distribution is complex and its exact form is unknown.\
    \ In this chapter, we explore MCMC methods, specifically the Metropolis-Hastings\
    \ algorithm and Gibbs sampling. We also discuss the applications of MCMC in Bayesian\
    \ inference.\n\n### Metropolis-Hastings Algorithm\n\nThe Metropolis-Hastings algorithm\
    \ is a general-purpose MCMC algorithm used to sample from a target probability\
    \ distribution $p(\\mathbf{x})$. Given an initial state $\\mathbf{x}_0$, the algorithm\
    \ iteratively generates a sequence of states $\\mathbf{x}_1, \\mathbf{x}_2, \\\
    dots$ according to a Markov chain.\n\nAt each iteration, a proposal state $\\\
    mathbf{x}^*$ is sampled from a proposal distribution $q(\\mathbf{x}^*|\\mathbf{x}_{\\\
    text{current}})$, where $\\mathbf{x}_{\\text{current}}$ is the current state of\
    \ the Markov chain. The proposal distribution defines the probability of moving\
    \ from the current state to a new proposed state.\n\nThe acceptance probability\
    \ $\\alpha$ is then calculated as follows:\n\n$$\\alpha = \\min\\left(1, \\frac{p(\\\
    mathbf{x}^*) \\cdot q(\\mathbf{x}_{\\text{current}}|\\mathbf{x}^*)}{p(\\mathbf{x}_{\\\
    text{current}}) \\cdot q(\\mathbf{x}^*|\\mathbf{x}_{\\text{current}})}\\right).$$\n\
    \nThe proposed state $\\mathbf{x}^*$ is accepted with probability $\\alpha$. If\
    \ the proposed state is accepted, $\\mathbf{x}_{\\text{current}}$ is updated to\
    \ $\\mathbf{x}^*$. Otherwise, $\\mathbf{x}_{\\text{current}}$ remains unchanged.\
    \ This ensures that the Markov chain converges to the target distribution $p(\\\
    mathbf{x})$ in the long run.\n\n### Python Code: Metropolis-Hastings Algorithm\n\
    \nThe following Python code snippet demonstrates the implementation of the Metropolis-Hastings\
    \ algorithm for sampling from a target probability distribution:\n\n```python\n\
    import numpy as np\n\ndef metropolis_hastings(target_distribution,\n         \
    \               proposal_distribution, num_iterations):\n    samples = []\n  \
    \  current_state = initial_state\n\n    for i in range(num_iterations):\n    \
    \    proposed_state = proposal_distribution(current_state)\n        acceptance_prob\
    \ = min(1,\n                              (target_distribution(proposed_state)\
    \ *\n                               proposal_distribution(current_state, proposed_state))\
    \ /\n                              (target_distribution(current_state) *\n   \
    \                            proposal_distribution(proposed_state, current_state)))\n\
    \        if np.random.rand() < acceptance_prob:\n            samples.append(proposed_state)\n\
    \            current_state = proposed_state\n        else:\n            samples.append(current_state)\n\
    \n    return samples\n```\n\nIn this code snippet, the `metropolis_hastings` function\
    \ implements the Metropolis-Hastings algorithm. The target distribution is specified\
    \ by the `target_distribution` function, and the proposal distribution is specified\
    \ by the `proposal_distribution` function.\n\n### Gibbs Sampling\n\nGibbs sampling\
    \ is another MCMC algorithm that is particularly useful for sampling from high-dimensional\
    \ distributions. Gibbs sampling samples from the conditional distributions of\
    \ each variable given the current values of the other variables.\n\nGiven a joint\
    \ distribution $p(\\mathbf{x}) = p(x_1, x_2, \\dots, x_n)$, the Gibbs sampling\
    \ algorithm iteratively updates the variables as follows:\n\n$$x_1^{(t+1)} \\\
    sim p(x_1 | x_2^{(t)}, \\dots, x_n^{(t)}),$$\n$$x_2^{(t+1)} \\sim p(x_2 | x_1^{(t+1)},\
    \ x_3^{(t)}, \\dots, x_n^{(t)}),$$\n$$\\dots$$\n$$x_n^{(t+1)} \\sim p(x_n | x_1^{(t+1)},\
    \ x_2^{(t+1)}, \\dots, x_{n-1}^{(t+1)}).$$\n\nIn each iteration, a single variable\
    \ is updated while holding the remaining variables fixed. The process is repeated\
    \ until convergence to the joint distribution is achieved.\n\n### Python Code:\
    \ Gibbs Sampling\n\nThe following Python code snippet demonstrates the implementation\
    \ of the Gibbs sampling algorithm for sampling from a joint distribution:\n\n\
    ```python\ndef gibbs_sampling(joint_distribution,\n                   num_iterations):\n\
    \    samples = []\n    current_state = initial_state\n\n    for i in range(num_iterations):\n\
    \        for j, variable in enumerate(current_state):\n            current_state[j]\
    \ = joint_distribution(variable,\n                                  current_state[:j],\n\
    \                                  current_state[j+1:])\n        samples.append(current_state)\n\
    \n    return samples\n```\n\nIn this code snippet, the `gibbs_sampling` function\
    \ implements the Gibbs sampling algorithm. The joint distribution is specified\
    \ by the `joint_distribution` function.\n\n### Applications in Bayesian Inference\n\
    \nMCMC methods, such as the Metropolis-Hastings algorithm and Gibbs sampling,\
    \ are commonly used in Bayesian inference. Bayesian inference allows us to estimate\
    \ the posterior distribution of model parameters given observed data. However,\
    \ in many cases, the posterior distribution cannot be analytically calculated\
    \ and must be approximated using MCMC methods.\n\nBy sampling from the posterior\
    \ distribution, MCMC methods enable us to make inferences about the values of\
    \ model parameters. These samples can be used to estimate posterior means, variances,\
    \ quantiles, and other summary statistics.\n\nMCMC methods also allow us to perform\
    \ model comparison by calculating the marginal likelihood or the Bayes factor.\
    \ By comparing the posterior probabilities of different models, we can select\
    \ the most suitable model for the observed data.\n\nFurthermore, MCMC methods\
    \ are crucial for conducting Bayesian hierarchical modeling, where model parameters\
    \ are assumed to follow certain prior distributions. The joint distribution of\
    \ the parameters and hyperparameters can be explored using MCMC methods.\n\nIn\
    \ summary, MCMC methods provide a powerful tool for Bayesian inference, enabling\
    \ us to estimate posterior distributions, make inferences about model parameters,\
    \ conduct model comparison, and perform hierarchical modeling.\n\n## Chapter 36\n\
    \n## Hidden Markov Models (HMM)\n\n### Introduction\n\nHidden Markov Models (HMMs)\
    \ are probabilistic models that are widely used for modeling sequential data.\
    \ HMMs are particularly useful when the underlying process generating the data\
    \ is assumed to be a Markov process, where the future state depends only on the\
    \ current state. In this chapter, we discuss the fundamentals of HMMs, including\
    \ the forward-backward algorithm, the Viterbi algorithm, and their applications\
    \ in time-series data.\n\n### Hidden Markov Model\n\nA Hidden Markov Model consists\
    \ of a set of hidden states $S = \\{s_1, s_2, \\dots, s_N\\}$, a set of observed\
    \ symbols $V = \\{v_1, v_2, \\dots, v_M\\}$, and a set of transition probabilities\
    \ $A = \\{a_{ij}\\}$ representing the probabilities of transitioning between hidden\
    \ states. Additionally, HMMs include a set of emission probabilities $B = \\{b_i(\\\
    mathbf{v})\\}$, where $b_i(\\mathbf{v})$ represents the probability of emitting\
    \ symbol $\\mathbf{v}$ when in hidden state $s_i$.\n\n### HMM Notation\n\nLet\
    \ $N$ be the number of hidden states, and $M$ be the number of observed symbols.\
    \ The transition probability matrix $\\mathbf{A}$ is defined as:\n\n$$\\mathbf{A}\
    \ = \\begin{bmatrix} a_{11} & a_{12} & \\dots & a_{1N} \\\\ a_{21} & a_{22} &\
    \ \\dots & a_{2N} \\\\ \\vdots & \\vdots & \\ddots & \\vdots \\\\ a_{N1} & a_{N2}\
    \ & \\dots & a_{NN} \\end{bmatrix}.$$\n\nThe emission probability matrix $\\mathbf{B}$\
    \ is defined as:\n\n$$\\mathbf{B} = \\begin{bmatrix} b_1(v_1) & b_1(v_2) & \\\
    dots & b_1(v_M) \\\\ b_2(v_1) & b_2(v_2) & \\dots & b_2(v_M) \\\\ \\vdots & \\\
    vdots & \\ddots & \\vdots \\\\ b_N(v_1) & b_N(v_2) & \\dots & b_N(v_M) \\end{bmatrix}.$$\n\
    \nThe initial state distribution $\\pi$ is a vector of length $N$ representing\
    \ the probabilities of starting in each hidden state:\n\n$$\\pi = [\\pi_1, \\\
    pi_2, \\dots, \\pi_N].$$\n\n### HMM Probabilities\n\nGiven an HMM model and a\
    \ sequence of observed symbols $\\mathbf{O} = (O_1, O_2, \\dots, O_T)$, where\
    \ $T$ is the length of the sequence, there are three fundamental probabilities\

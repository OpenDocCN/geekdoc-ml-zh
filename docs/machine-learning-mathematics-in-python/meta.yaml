    In this code, we import the `LinearRegression` class from the scikit-learn library.
    We then create an instance of the `LinearRegression` class and fit the model to
    the predictor variables X and the response variable y. The `fit()` method estimates
    the coefficients and the intercept using the OLS method. The estimated coefficients
    can be accessed using the `coef_` attribute, and the intercept can be accessed
    using the `intercept_` attribute.


    # Chapter 12


    ## Ordinary Least Squares (OLS)


    ### Introduction


    Linear regression is a fundamental tool in statistics and machine learning for
    modeling the relationship between a response variable and one or more predictor
    variables. The ordinary least squares (OLS) method is a widely used approach for
    estimating the parameters in a linear regression model. In this chapter, we present
    the derivation of the OLS estimator and discuss its properties.


    ### Derivation and Explanation


    Consider a linear regression model with $n$ observations and $p$ predictor variables.
    We represent the model as follows:


    $$y_i = \beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2} + \cdots + \beta_p x_{ip} +
    \epsilon_i \quad (12.1)$$


    where $y_i$ represents the response variable for the $i$th observation, $\beta_0$
    is the intercept, $\beta_j$ ($j = 1, 2, \ldots, p$) are the coefficients for the
    predictor variables $x_{ij}$, and $\epsilon_i$ is the error term for the $i$th
    observation.


    To estimate the unknown coefficients $\beta_j$, the OLS method minimizes the sum
    of squared residuals (SSR), which is the sum of the squared differences between
    the observed response values and the values predicted by the model:


    $$\text{SSR}(\beta) = \sum_{i=1}^{n} (y_i - (\beta_0 + \beta_1 x_{i1} + \beta_2
    x_{i2} + \cdots + \beta_p x_{ip}))^2 \quad (12.2)$$


    Mathematically, we can express the OLS estimator $\hat{\beta}$ as the solution
    to the following optimization problem:


    $$\hat{\beta} = \arg \min_{\beta} \left\{ \sum_{i=1}^{n} (y_i - (\beta_0 + \beta_1
    x_{i1} + \beta_2 x_{i2} + \cdots + \beta_p x_{ip}))^2 \right\} \quad (12.3)$$


    To find the minimum, we take the partial derivatives of the SSR with respect to
    each coefficient $\beta_j$ and set them equal to zero:


    $$\frac{\partial \text{SSR}}{\partial \beta_0} = -2 \sum_{i=1}^{n} (y_i - (\beta_0
    + \beta_1 x_{i1} + \beta_2 x_{i2} + \cdots + \beta_p x_{ip})) = 0 \quad (12.4)$$


    $$\frac{\partial \text{SSR}}{\partial \beta_1} = -2 \sum_{i=1}^{n} x_{i1} (y_i
    - (\beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2} + \cdots + \beta_p x_{ip})) = 0 \quad
    (12.5)$$


    $$\vdots \quad (12.6)$$


    $$\frac{\partial \text{SSR}}{\partial \beta_p} = -2 \sum_{i=1}^{n} x_{ip} (y_i
    - (\beta_0 + \beta_1 x_{i1} + \beta_2 x_{i2} + \cdots + \beta_p x_{ip})) = 0 \quad
    (12.7)$$


    Expanding and simplifying these equations, we obtain the normal equations:


    $$\begin{bmatrix} n & \sum_{i=1}^{n} x_{i1} & \sum_{i=1}^{n} x_{i2} & \cdots &
    \sum_{i=1}^{n} x_{ip} \\ \sum_{i=1}^{n} x_{i1} & \sum_{i=1}^{n} x_{i1}^2 & \sum_{i=1}^{n}
    x_{i1} x_{i2} & \cdots & \sum_{i=1}^{n} x_{i1} x_{ip} \\ \sum_{i=1}^{n} x_{i2}
    & \sum_{i=1}^{n} x_{i1} x_{i2} & \sum_{i=1}^{n} x_{i2}^2 & \cdots & \sum_{i=1}^{n}
    x_{i2} x_{ip} \\ \vdots & \vdots & \vdots & \ddots & \vdots \\ \sum_{i=1}^{n}
    x_{ip} & \sum_{i=1}^{n} x_{i1} x_{ip} & \sum_{i=1}^{n} x_{i2} x_{ip} & \cdots
    & \sum_{i=1}^{n} x_{ip}^2 \end{bmatrix} \begin{bmatrix} \beta_0 \\ \beta_1 \\
    \beta_2 \\ \vdots \\ \beta_p \end{bmatrix} = \begin{bmatrix} \sum_{i=1}^{n} y_i
    \\ \sum_{i=1}^{n} x_{i1} y_i \\ \sum_{i=1}^{n} x_{i2} y_i \\ \vdots \\ \sum_{i=1}^{n}
    x_{ip} y_i \end{bmatrix} \quad (12.8)$$


    Solving these equations, we obtain the OLS estimator:


    $$\hat{\beta} = \begin{bmatrix} \hat{\beta}_0 \\ \hat{\beta}_1 \\ \hat{\beta}_2
    \\ \vdots \\ \hat{\beta}_p \end{bmatrix} = (\mathbf{X}^T\mathbf{X})^{-1}\mathbf{X}^T\mathbf{y}
    \quad (12.9)$$


    where $\mathbf{X}$ is the design matrix consisting of the predictor variables,
    $\mathbf{X}^T$ is its transpose, and $\mathbf{y}$ is the vector of observed responses.


    ### Applications in Regression


    OLS regression is commonly used in various fields for modeling the relationship
    between variables and making predictions. The OLS estimator provides the best
    linear unbiased estimates of the regression coefficients under certain assumptions.
    It allows researchers to investigate the impact of different predictor variables
    on the response variable, perform hypothesis tests on the coefficients, and assess
    the overall fit of the model.


    Python provides several libraries that offer efficient implementations of OLS
    regression, such as NumPy and scikit-learn. These libraries handle the matrix
    computations efficiently and provide tools for model fitting, coefficient estimation,
    prediction, and diagnostics.


    ### 1 Python Implementation


    Here is an example implementation of OLS regression in Python using the NumPy
    library to estimate the coefficients:


    ```

    import numpy as np


    # Define the predictor variables X and the response variable y


    # Add a column of ones to X for the intercept term

    X = np.column_stack((np.ones(len(X)), X))


    # Compute the OLS estimator

    beta_hat = np.linalg.inv(X.T @ X) @ X.T @ y

    ```


    In this code, we first add a column of ones to the design matrix $\mathbf{X}$
    to account for the intercept term. Then, we compute the OLS estimator $\hat{\beta}$
    using the formula $\hat{\beta} = (\mathbf{X}^T\mathbf{X})^{-1}\mathbf{X}^T\mathbf{y}$.
    The `@` operator is used for matrix multiplication, and the `np.linalg.inv()`
    function computes the inverse of a matrix.'

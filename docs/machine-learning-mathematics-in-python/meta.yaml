    $i$ in the Nash equilibrium $\mathbf{s}^*$. In other words, no player has an incentive
    to deviate from their strategy in a Nash equilibrium. It represents a state of
    mutual consistency in strategies where each player''s strategy is the best response
    to the strategies chosen by the other players.


    To illustrate the concept of Nash equilibrium, consider the famous Prisoner''s
    Dilemma game, represented by the following payoff'

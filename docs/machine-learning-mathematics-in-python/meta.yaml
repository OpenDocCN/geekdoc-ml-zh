- md: '## 20 K-Means Clustering


    ### Introduction


    K-Means Clustering is one of the most popular and straightforward unsupervised
    machine learning algorithms. Its primary goal is to partition a dataset into K
    distinct, non-overlapping subgroups (clusters) where each data point belongs to
    the cluster with the nearest mean. The "means" in K-Means refers to the average
    of the data points in a cluster, which serves as the cluster''s center or centroid.


    The algorithm works iteratively to assign each data point to one of the K clusters
    based on the features provided. The steps are as follows:


    1.  **Initialization**: Randomly select K data points from the dataset to serve
    as the initial cluster centroids.

    2.  **Assignment Step**: For each data point in the dataset, calculate its distance
    (commonly Euclidean distance) to each of the K centroids. Assign the data point
    to the cluster whose centroid is the closest.

    3.  **Update Step**: After all points have been assigned, recalculate the position
    of each centroid. The new centroid is the mean (average) of all data points currently
    assigned to that cluster.

    4.  **Convergence Check**: Repeat the Assignment and Update steps until the centroids
    no longer change significantly, or a maximum number of iterations is reached.
    This indicates that the algorithm has converged.


    **Key Characteristics and Considerations:**


    *   **Simplicity and Speed**: K-Means is computationally efficient and easy to
    implement, making it suitable for large datasets.

    *   **Sensitivity to Initialization**: The final clusters can depend heavily on
    the initial random choice of centroids. A common solution is to run the algorithm
    multiple times with different initializations and select the result with the lowest
    total within-cluster variance.

    *   **Assumption of Spherical Clusters**: The algorithm assumes clusters are spherical
    and equally sized, which may not hold for complex, real-world data distributions.

    *   **Choosing K**: Determining the optimal number of clusters (K) is a critical
    step. Techniques like the Elbow Method (plotting the within-cluster sum of squares
    against K) or the Silhouette Score are often used to guide this choice.


    **Applications:**


    K-Means clustering is widely used in various fields, including:

    *   **Customer Segmentation**: Grouping customers based on purchasing behavior
    for targeted marketing.

    *   **Image Compression**: Reducing the number of colors in an image by clustering
    pixel colors.

    *   **Document Clustering**: Organizing a large collection of documents into topics.

    *   **Anomaly Detection**: Identifying data points that do not belong to any cluster
    as potential outliers.


    In summary, K-Means is a foundational clustering algorithm that provides a simple
    yet powerful way to discover inherent groupings in data, serving as a building
    block for more complex analytical tasks.'
  mdcn: '## 20 K-Means 聚类


    ### 简介


    K-Means 聚类是最流行且最直接的无监督机器学习算法之一。其主要目标是将数据集划分为 K 个不同的、不重叠的子组（簇），其中每个数据点都属于离其均值最近的簇。K-Means
    中的“均值”指的是簇中数据点的平均值，它作为簇的中心或质心。


    该算法通过迭代方式，根据提供的特征将每个数据点分配到 K 个簇中的一个。步骤如下：


    1.  **初始化**：从数据集中随机选择 K 个数据点作为初始簇质心。

    2.  **分配步骤**：对于数据集中的每个数据点，计算其到 K 个质心的距离（通常是欧几里得距离）。将该数据点分配给质心最近的簇。

    3.  **更新步骤**：所有点分配完毕后，重新计算每个质心的位置。新的质心是当前分配给该簇的所有数据点的均值（平均值）。

    4.  **收敛检查**：重复分配和更新步骤，直到质心不再发生显著变化，或达到最大迭代次数。这表明算法已经收敛。


    **关键特性与考量：**


    *   **简单快速**：K-Means 计算效率高且易于实现，适用于大型数据集。

    *   **对初始化敏感**：最终的聚类结果可能严重依赖于质心的初始随机选择。一个常见的解决方案是使用不同的初始化多次运行算法，并选择簇内方差总和最低的结果。

    *   **球形簇假设**：该算法假设簇是球形且大小相等的，这可能不适用于复杂的现实世界数据分布。

    *   **选择 K 值**：确定最佳簇数（K）是关键一步。通常使用肘部法则（绘制簇内平方和与 K 的关系图）或轮廓系数等技术来指导这一选择。


    **应用：**


    K-Means 聚类广泛应用于各个领域，包括：

    *   **客户细分**：根据购买行为对客户进行分组，以实现精准营销。

    *   **图像压缩**：通过对像素颜色进行聚类来减少图像中的颜色数量。

    *   **文档聚类**：将大量文档按主题组织起来。

    *   **异常检测**：识别不属于任何簇的数据点，将其视为潜在的异常值。


    总之，K-Means 是一种基础的聚类算法，它提供了一种简单而强大的方法来发现数据中固有的分组，是更复杂分析任务的基石。'

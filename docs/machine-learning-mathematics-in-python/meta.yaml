  md: '# # Chapter 5


    # # Statistics Fundamentals


    # ## Descriptive Statistics


    In this chapter, we will delve into the fundamentals of statistics. Statistics
    is a branch of mathematics that deals with the collection, analysis, interpretation,
    presentation, and organization of data. Descriptive statistics is the branch that
    focuses on summarizing and describing the main features of a dataset.


    # ### 1 Measures of Central Tendency


    Measures of central tendency provide a summary of the typical or central value
    in a dataset. The most commonly used measures of central tendency are the mean,
    median, and mode.


    The mean, denoted by $\mu$, is the sum of all values in a dataset divided by the
    number of observations. It is calculated as:


    $$\mu = \frac{1}{n} \sum_{i=1}^{n} x_i$$


    where $x_i$ represents each observation and $n$ is the total number of observations.


    The median is the middle value in an ordered dataset. It is often used for datasets
    with outliers or skewed distributions. If the number of observations, $n$, is
    odd, the median is the middle value. If $n$ is even, the median is the average
    of the two middle values.'
  merge: -1
  pgno: 35
- img_proc: true
  md: 'The mode is the most frequently occurring value in a dataset. It is used for
    categorical or discrete datasets to identify the most common category or value.


    # 2 Measures of Variability


    Measures of variability describe the spread or dispersion of the values in a dataset.
    The most commonly used measures of variability are the range, variance, and standard
    deviation.


    The range is the difference between the maximum and minimum values in a dataset:


    $$\text{range} = \max(x) - \min(x)$$


    where $x$ represents the values in the dataset.


    The variance, denoted by $\sigma^2$, measures the average squared deviation from
    the mean. It is calculated as:


    $$\sigma^2 = \frac{1}{n} \sum_{i=1}^{n} (x_i - \mu)^2$$


    where $x_i$ represents each observation, $\mu$ is the mean, and $n$ is the total
    number of observations.


    The standard deviation, denoted by $\sigma$, is the square root of the variance.
    It provides a measure of the average distance between each data point and the
    mean.


    # 3 Percentiles and Quartiles


    Percentiles and quartiles divide a dataset into equal parts, providing insights
    into how data are distributed. The $p$th percentile is the value below which $p$
    percent of the data falls. For example, the median represents the 50th percentile.


    Quartiles, which divide the dataset into quarters, are commonly used measures
    of variability. The first quartile ($Q1$) represents the 25th percentile, the
    second quartile ($Q2$) represents the median, and the third quartile ($Q3$) represents
    the 75th percentile.


    # 4 Box Plots


    Box plots, also known as box-and-whisker plots, visualize the distribution of
    a dataset using quartiles. They provide a graphical'
  merge: -1

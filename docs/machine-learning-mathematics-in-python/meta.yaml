- md: '## 24 Q-Learning


    ### Introduction


    Q-Learning 是一种无模型的强化学习算法，用于学习在给定状态下采取何种动作以最大化累积奖励。它通过迭代更新 Q 值（状态-动作值函数）来学习最优策略。Q-Learning
    的核心更新公式为：


    $$Q(s, a) \leftarrow Q(s, a) + \alpha \left[ r + \gamma \max_{a''} Q(s'', a'')
    - Q(s, a) \right]$$


    其中：

    - $s$ 是当前状态，$a$ 是采取的动作。

    - $r$ 是执行动作 $a$ 后获得的即时奖励。

    - $s''$ 是执行动作 $a$ 后转移到的下一个状态。

    - $\alpha$ 是学习率，控制新信息覆盖旧信息的程度。

    - $\gamma$ 是折扣因子，决定了未来奖励的当前价值。


    Q-Learning 的关键特性是它能够学习最优策略，即使该策略不是智能体当前正在遵循的策略（即它具有离策略性）。这使得 Q-Learning 在探索和利用之间能够取得平衡。


    算法通常使用 Q 表（一个表格，存储每个状态-动作对的 Q 值）来实现。对于状态或动作空间较大的问题，可以使用函数近似（如神经网络）来估计 Q 值，这被称为深度
    Q 网络（DQN）。'

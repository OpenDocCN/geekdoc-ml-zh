    # Chapter 6


    # Simple Linear Regression


    # Introduction


    Linear regression is a fundamental statistical technique used to model the relationship
    between a dependent variable and one independent variable. In this chapter, we
    will focus on simple linear regression, which involves predicting a continuous
    dependent variable based on a single independent variable.


    # Model Formulation


    The simple linear regression model can be represented mathematically as:


    $$y = \beta_0 + \beta_1x + \epsilon$$


    where $y$ is the dependent variable, $x$ is the independent variable, $\beta_0$
    is the intercept, $\beta_1$ is the slope, and $\epsilon$ is the error term (residual).
    The error term captures the variability in the dependent variable that is not
    explained by the independent variable.


    # Least Squares Estimation


    The goal of simple linear regression is to estimate the intercept ($\beta_0$)
    and slope ($\beta_1$) that minimize the sum of squared differences'
  - '[PAGE 43]


    between the observed and predicted values.

    The least squares estimates of the intercept and slope can be calculated as:


    $$\hat{\beta}_1 = \frac{\sum_{i=1}^n (x_i - \bar{x})(y_i - \bar{y})}{\sum_{i=1}^n
    (x_i - \bar{x})^2}$$


    $$\hat{\beta}_0 = \bar{y} - \hat{\beta}_1 \bar{x}$$


    where $n$ is the number of observations, $x_i$ and $y_i$ are the individual observations
    of the independent and dependent variables, and $\bar{x}$ and $\bar{y}$ are the
    sample means of $x$ and $y$.


    # Model Evaluation


    To evaluate the fit of the simple linear regression model, we consider the residual
    sum of squares (RSS), total sum of squares (TSS), and R-squared ($R^2$) statistic.

    The RSS represents the sum of squared residuals and can be calculated as:


    $$\text{RSS} = \sum_{i=1}^n (y_i - \hat{y}_i)^2$$


    where $y_i$ is the observed value of the dependent variable and $\hat{y}_i$ is
    the predicted value based on the model.

    The TSS represents the total variability in the dependent variable and can be
    calculated as:


    $$\text{TSS} = \sum_{i=1}^n (y_i - \bar{y})^2$$


    The $R^2$ statistic measures the proportion of the total variability in the dependent
    variable that is explained by the independent variable and can be calculated as:


    $$R^2 = 1 - \frac{\text{RSS}}{\text{TSS}}$$


    A higher value of $R^2$ indicates a better fit of the model to the data.'
  - '[PAGE 44]


    # Python Implementation


    In Python, the ‘scikit-learn’ library provides functions for fitting a simple

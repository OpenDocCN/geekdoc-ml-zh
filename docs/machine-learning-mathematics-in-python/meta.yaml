- md: "## Chapter 10\n\n## Gradient Descent Variants\n\n## Introduction\n\nIn this\
    \ chapter, we explore various variants of the gradient descent algorithm. We begin\
    \ by discussing the limitations of the basic gradient descent algorithm and then\
    \ delve into different variations that address these limitations. These variants\
    \ include mini-batch gradient descent, adaptive learning rates, and momentum-based\
    \ methods.\n\n## Mini-Batch Gradient Descent\n\nThe mini-batch gradient descent\
    \ (MBGD) algorithm, an extension of stochastic gradient descent (SGD), addresses\
    \ the issue of noisy and unstable updates associated with stochastic gradient\
    \ descent. Instead of using a single training example (as done in SGD) or the\
    \ entire training dataset (as done in batch gradient descent), MBGD computes the\
    \ gradient based on a small batch of training examples.\n\nThe update rule for\
    \ MBGD can be described as follows:\n$$\\mathbf{x}^{(t+1)} = \\mathbf{x}^{(t)}\
    \ - \\alpha \\cdot \\nabla f_{\\text{batch}}(\\mathbf{x}^{(t)})$$\nwhere $\\nabla\
    \ f_{\\text{batch}}(\\mathbf{x}^{(t)})$ represents the gradient of the objective\
    \ function $f$ computed over a mini-batch of training examples.\n\n### Python\
    \ Implementation\n\nHere is an example implementation of mini-batch gradient descent\
    \ in Python:\n\n```python\nimport numpy as np\n\n# Initialize variables\nlearning_rate\
    \ = 0.01\nbatch_size = 32\nmax_iterations = 1000\nepsilon = 1e-6\n\n# Initialize\
    \ x\nx = np.array([1.0, 1.0])\n\n# Define the gradient function\ndef gradient(x,\
    \ batch):\n    return np.sum(2 * batch, axis=0)\n\n# Perform mini-batch gradient\
    \ descent\nfor iteration in range(max_iterations):\n    # Randomly select mini-batch\n\
    \    indices = np.random.choice(len(X),\n                               size=batch_size,\
    \ replace=False)\n    batch = X[indices]\n\n    # Update x\n    x_new = x - learning_rate\
    \ * gradient(x, batch)\n\n    # Check for convergence\n    if np.linalg.norm(x_new\
    \ - x) < epsilon:\n        break\n\n    x = x_new\n```\n\nIn this code, we initialize\
    \ the learning rate, batch size, maximum number of iterations, and a small value\
    \ for convergence check. We also initialize the input variables x.\n\nThe gradient()\
    \ function represents the gradient of the objective function f computed over a\
    \ mini-batch batch. In each iteration, we randomly select a mini-batch of training\
    \ examples batch and update the input variables x using the learning rate and\
    \ the computed gradient. We then check for convergence by computing the norm of\
    \ the difference between the updated and previous x, and if it falls below the\
    \ threshold, the algorithm terminates.\n\n## Adaptive Learning Rates\n\nOne of\
    \ the challenges with gradient descent is finding an appropriate learning rate\
    \ that allows for efficient convergence. Setting a fixed learning rate can lead\
    \ to slow convergence or instability.\n\nAdaptive learning rate algorithms aim\
    \ to address this challenge by automatically adjusting the learning rate during\
    \ the optimization process. One such algorithm is AdaGrad.\n\nThe update rule\
    \ for AdaGrad can be expressed as follows:\n\n$$\\mathbf{x}^{(t+1)} = \\mathbf{x}^{(t)}\
    \ - \\frac{\\alpha}{\\sqrt{G^{(t)} + \\epsilon}} \\odot \\nabla f(\\mathbf{x}^{(t)})\
    \ \\quad (10.2)$$\n\nwhere $G^{(t)}$ represents the diagonal matrix of the sum\
    \ of the element-wise squares of the gradients up to iteration $t$, $\\alpha$\
    \ denotes the initial learning rate, $\\epsilon$ is a small constant to prevent\
    \ division by zero, and $\\odot$ represents element-wise multiplication.\n\n###\
    \ Python Implementation\n\nHere is an example implementation of AdaGrad in Python:\n\
    \n```python\nimport numpy as np\n\n# Initialize variables\nlearning_rate = 0.1\n\
    max_iterations = 1000\nepsilon = 1e-6\n\n# Initialize x\nx = np.array([1.0, 1.0])\n\

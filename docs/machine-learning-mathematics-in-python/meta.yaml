    # Chapter 47


    # Bayesian Networks


    # Introduction


    Bayesian Networks (BNs) are probabilistic graphical models that represent dependencies
    among a set of random variables using a directed acyclic graph (DAG). In this
    chapter, we will explore the mathematical foundations and properties of Bayesian
    Networks.


    # Formal Definition


    Let $\mathcal{X} = \{X_1, X_2, ..., X_n\}$ be a set of random variables. A Bayesian
    Network for $\mathcal{X}$ is defined as a directed acyclic graph $G = (\mathcal{X},
    E)$, where $E$ is a set of directed edges $(X_i, X_j)$ representing the dependencies
    among random variables.


    # Conditional Probability Distribution


    The strength of Bayesian Networks lies in their ability to model joint probability
    distributions using conditional probability distributions (CPDs). A CPD specifies
    the conditional probability of a random variable given its parents in the graph.


    For each random variable $X_i$, we define a CPD $\mathcal{P}(X_i|\text{Pa}_i)$,
    where $\text{Pa}_i$ represents the parents of $X_i$. The CPD defines the conditional
    probabilities for all possible assignments of values to $X_i$ and its parents.'
  - '[PAGE 208]


    # Bayesian Network Inference


    Given a Bayesian Network, we are often interested in making inferences about the
    probability distribution of certain variables, given observed evidence. This can
    be done using both exact and approximate inference methods.


    # 1 Exact Inference: Variable Elimination


    One popular exact inference method for BNs is variable elimination. The idea behind
    variable elimination is to sequentially eliminate variables from the joint distribution
    by summing (or integrating) over their possible values, until the desired variables
    are obtained.


    # 2 Approximate Inference: Markov Chain Monte Carlo


    When exact inference is intractable due to the size or complexity of the BN, we
    can resort to approximate methods such as Markov Chain Monte Carlo (MCMC). MCMC
    methods, like Gibbs Sampling and Metropolis-Hastings, provide efficient ways to
    generate samples from the posterior distribution of interest.


    # Learning Bayesian Networks


    Learning Bayesian Networks involves estimating the structure (i.e., the graph)
    and the parameters (i.e., the CPDs) of the network from observational or experimental
    data. This can be done using various algorithms such as constraint-based, score-based,
    or hybrid approaches.


    # 1 Constraint-Based Methods: PC Algorithm


    The PC algorithm is a widely used constraint-based method that infers the structure
    of a BN using conditional independence tests. Starting with an empty graph, the
    algorithm iteratively adds edges based on statistical tests until the Markov equivalence
    class is identified.'

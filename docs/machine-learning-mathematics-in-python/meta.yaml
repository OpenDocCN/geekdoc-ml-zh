    \ using ordinary least squares (OLS):\n\n```python\nimport numpy as np\nfrom statsmodels.regression.linear_model\
    \ import OLS\n\ndef estimate_ar_parameters(X, p):\n    X_lagged = np.column_stack([np.roll(X,\
    \ i) for i in range(p)])\n    X_lagged = X_lagged[p:]\n    X = X[p:]\n\n    model\

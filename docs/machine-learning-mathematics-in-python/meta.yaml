    # Hidden Markov Models (HMM)


    # Introduction


    Hidden Markov Models (HMMs) are probabilistic models that are widely used for
    modeling sequential data. HMMs are particularly useful when the underlying process
    generating the data is assumed to be a Markov process, where the future state
    depends only on the current state. In this chapter, we discuss the fundamentals
    of HMMs, including the forward-backward algorithm, the Viterbi algorithm, and
    their applications in time-series data.


    # Hidden Markov Model


    A Hidden Markov Model consists of a set of hidden states $S = \{s_1, s_2, \dots,
    s_N\}$, a set of observed symbols $V = \{v_1, v_2, \dots, v_M\}$, and a set of
    transition probabilities $A = \{a_{ij}\}$ representing the probabilities of transitioning
    between hidden states. Additionally, HMMs include a set of emission probabilities
    $B = \{b_i(\mathbf{v})\}$, where $b_i(\mathbf{v})$ represents the probability
    of emitting symbol $\mathbf{v}$ when in hidden state $s_i$.


    # 1 HMM Notation


    Let $N$ be the number of hidden states, and $M$ be the number of observed symbols.
    The transition probability matrix $\mathbf{A}$ is defined'
  merge: -1
  pgno: 157
- img_proc: true
  md: 'as:


    $$\mathbf{A} = \begin{bmatrix} a_{11} & a_{12} & \dots & a_{1N} \ a_{21} & a_{22}
    & \dots & a_{2N} \ \vdots & \vdots & \ddots & \vdots \ a_{N1} & a_{N2} & \dots
    & a_{NN} \end{bmatrix}.$


    The emission probability matrix $\mathbf{B}$ is defined as:


    $$\mathbf{B} = \begin{bmatrix} b_1(v_1) & b_1(v_2) & \dots & b_1(v_M) \ b_2(v_1)
    & b_2(v_2) & \dots & b_2(v_M) \ \vdots & \vdots & \ddots & \vdots \ b_N(v_1) &
    b_N(v_2) & \dots & b_N(v_M) \end{bmatrix}.$


    The initial state distribution $\pi$ is a vector of length $N$ representing the
    probabilities of starting in each hidden state:


    $$\pi = [\pi_1, \pi_2, \dots, \pi_N].$$


    # 2 HMM Probabilities


    Given an HMM model and a sequence of observed symbols $\mathbf{O} = (O_1, O_2,
    \dots, O_T)$, where $T$ is the length of the sequence, there are three fundamental
    probabilities of interest:


    +   1. The probability of the observed sequence $\mathbf{O}$ given the model $\lambda
    = (\mathbf{A}, \mathbf{B}, \pi)$, denoted as $P(\mathbf{O}|\lambda)$.

    2. The probability of being in a particular hidden state $s_i$ at time $t$, denoted
    as $P(X_t = s_i | \mathbf{O}, \lambda)$.

    3. The probability of being in state $s_i$ at time $t$, and state $s_j$ at time
    $t+1$, denoted as $P(X_t = s_i, X_{t+1} = s_j | \mathbf{O}, \lambda)$.


    These probabilities can be computed efficiently using the forward-backward algorithm
    and the Viterbi algorithm.


    # Forward-Backward Algorithm


    The forward-backward algorithm, also called the Baum-Welch algorithm, is used
    to compute the probability of the observed sequence $P(\mathbf{O}|\lambda)$ and
    to estimate the model parameters $\mathbf{A}$, $\mathbf{B}$, and $\pi$ given the
    observed sequence.



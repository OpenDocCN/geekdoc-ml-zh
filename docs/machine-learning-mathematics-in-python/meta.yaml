    In this section, we introduce the concept of random variables, which are used
    to represent uncertain quantities in probability theory. We also discuss probability
    distributions, which describe the likelihood of different values that a random
    variable can take.


    ## 1 Random Variables


    A random variable is a variable that takes on different values depending on the
    outcome of a random event. It can be discrete or continuous, depending on whether
    its possible values are countable or uncountable, respectively.


    Formally, a random variable $X$ is a function that maps each outcome in the sample
    space to a real number. The probability of a random variable taking on a particular
    value or falling within a certain range is quantified by its probability distribution.


    ## 2 Probability Mass Function (PMF)


    For a discrete random variable $X$, the probability mass function (PMF) gives
    the probability of each possible value. The PMF is defined as $p_X(x) = P(X =
    x)$, where $x$ belongs to the range of the random variable.


    The PMF provides a complete description of the underlying probability distribution
    of a discrete random variable. It allows us to calculate the probability of specific
    events and compute various statistical measures.


    ## 3 Probability Density Function (PDF)


    For a continuous random variable $X$, the probability density function (PDF) describes
    the probability of the random variable taking on different values. Unlike the
    PMF, the PDF does not directly give the probability at a specific value, but rather
    the likelihood of observing a value in a certain range.


    Mathematically, the PDF of a continuous random variable $X$ is denoted by $f_X(x)$
    and satisfies the following properties:


    1. $f_X(x) \geq 0$ for all $x$ in the range of $X$.

    2. $\int_{-\infty}^{\infty} f_X(x) \, dx = 1$.

    3. The probability of $X$ falling within a specific interval $[a, b]$ is given
    by $\int_a^b f_X(x) \, dx$.


    The PDF characterizes the shape of the probability distribution of a continuous
    random variable. It is often used to analyze and calculate probabilities of events.


    ## 4 Cumulative Distribution Function (CDF)


    The cumulative distribution function (CDF) of a random variable $X$ is defined
    as $F_X(x) = P(X \leq x)$. It gives the probability that $X$ takes on a value
    less than or equal to $x$.


    The CDF provides a complete description of the probability distribution for both
    discrete and continuous random variables. It can be used to compute probabilities
    of specific events and calculate various statistical measures, such as percentiles
    and moments.


    ## 5 Expected Value and Variance


    The expected value and variance are important measures of central tendency and
    dispersion, respectively, for a random variable.


    The expected value, denoted by $\mathbb{E}[X]$, is a weighted average of the possible
    values of the random variable, where the weights are determined by the probabilities.
    For a discrete random variable $X$ with PMF $p_X(x)$, the expected value is computed
    as:


    $$\mathbb{E}[X] = \sum_x x \cdot p_X(x)$$


    For a continuous random variable $X$ with PDF $f_X(x)$, the expected value is
    given by:


    $$\mathbb{E}[X] = \int_{-\infty}^{\infty} x \cdot f_X(x) \, dx$$


    The variance measures the dispersion or spread of the random variable around its
    expected value. It is denoted by $\text{Var}[X]$ and is computed as:


    $$\text{Var}[X] = \mathbb{E}\left[(X - \mathbb{E}[X])^2\right]$$


    The standard deviation, $\text{SD}[X]$, is the square root of the variance.


    ## 6 Common Probability Distributions


    In probability theory, several common probability distributions are widely used
    to model random variables in various applications. Some important distributions
    include:


    - **Bernoulli distribution**: Models the probability of a binary outcome (success
    or failure) with a single parameter.

    - **Binomial distribution**: Generalizes the Bernoulli distribution to multiple
    independent trials.

    - **Normal distribution**: A continuous distribution that is widely used due to
    the central limit theorem. It is characterized by its mean and variance.

    - **Poisson distribution**: Models the number of events occurring in a fixed interval
    of time or space.

    - **Exponential distribution**: Describes the time between events occurring in
    a Poisson process.

    - **Uniform distribution**: Represents a constant probability over a fixed interval.

    - **Gamma distribution**: Generalizes the exponential distribution to accommodate
    a shape parameter.

    - **Beta distribution**: Models the probabilities of events with unknown proportions.


    Understanding these common probability distributions is crucial for analyzing
    and modeling a wide range of random phenomena. In Python, probability distributions
    and related functions are available in the `scipy.stats` module. The following
    code snippet demonstrates how to compute the probability density function (PDF)

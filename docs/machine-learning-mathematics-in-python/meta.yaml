    \n## SNN架构\n\n### 1 描述前馈架构\n\n前馈脉冲神经网络（SNN）架构由以层状方式连接的神经元组成，没有任何循环连接。信息从输入层流向输出层，每一层中的每个神经元只接收来自前一层的输入。\n\

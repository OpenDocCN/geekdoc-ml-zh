    \ is a widely used algorithm for partitioning data into clusters. It is an unsupervised\
    \ learning method that aims to find a set of cluster centroids that minimize the\
    \ within-cluster variance. In this chapter, we will discuss the key concepts and\
    \ steps involved in the K-means algorithm.\n\n### Distance Metrics\n\nTo measure\
    \ the similarity between data points, a distance metric is needed. The most common\
    \ distance metric used in K-means clustering is the Euclidean distance. For two\
    \ data points $\\mathbf{x}_i$ and $\\mathbf{x}_j$ in a $d$-dimensional space,\
    \ the Euclidean distance is calculated as follows:\n\n$$\\text{Euclidean Distance}(\\\
    mathbf{x}_i, \\mathbf{x}_j) = \\sqrt{\\sum_{k=1}^{d} (x_{ik} - x_{jk})^2}$$\n\n\
    where $x_{ik}$ and $x_{jk}$ represent the $k$-th feature values of $\\mathbf{x}_i$\
    \ and $\\mathbf{x}_j$ respectively.\n\n### Python Code\n\n```python\nfrom scipy.spatial.distance\
    \ import euclidean\n\n# Calculate the Euclidean distance between two data points\n\
    distance = euclidean(x_i, x_j)\n```\n\n### Algorithm Steps\n\nThe K-means clustering\
    \ algorithm consists of the following steps:\n\n1.  **Initialization**: Randomly\
    \ select $K$ data points as initial cluster centroids.\n2.  **Assignment**: Assign\
    \ each data point to the nearest cluster centroid based on the chosen distance\
    \ metric.\n3.  **Update**: Update the cluster centroids by computing the mean\
    \ of the data points assigned to each cluster.\n4.  **Iteration**: Repeat the\
    \ assignment and update steps until convergence, i.e., there is no change in the\
    \ assignment of data points to clusters or a specified number of iterations is\
    \ reached.\n\n### Python Code\n\n```python\nfrom sklearn.cluster import KMeans\n\
    \n# Create a KMeans instance and specify the desired number of clusters\nkmeans\
    \ = KMeans(n_clusters=K, random_state=0)\n\n# Fit the KMeans model to the data\n\
    kmeans.fit(X)\n\n# Retrieve the cluster assignments for each data point\ncluster_labels\
    \ = kmeans.labels_\n```\n\n### Computational Complexity\n\nThe computational complexity\
    \ of the K-means algorithm depends on the number of data points $n$, the number\
    \ of features $d$, and the number of clusters $K$. The time complexity is typically\
    \ denoted as $\\mathcal{O}(n \\cdot d \\cdot K \\cdot I \\cdot t)$, where $I$\
    \ is the number of iterations required to converge and $t$ is the average time\
    \ complexity of computing the distance metric.\n\n### Choosing the Number of Clusters\n\
    \nDetermining the optimal number of clusters, $K$, is an important task in K-means\
    \ clustering. There are various methods available, such as the elbow method and\
    \ silhouette analysis, to guide this selection process.\n\n#### Elbow Method\n\
    \nThe elbow method involves plotting the within-cluster sum of squared distances\
    \ against different values of $K$. The optimal number of clusters is chosen at\
    \ the \"elbow\" point, where the rate of decrease in the sum of squared distances\
    \ significantly diminishes.\n\n#### Python Code\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\n# Calculate the sum of squared distances for different values of K\n\
    ssd = []\nfor k in range(1, max_k+1):\n    kmeans = KMeans(n_clusters=k, random_state=0)\n\
    \    kmeans.fit(X)\n    ssd.append(kmeans.inertia_)\n\n# Plot the sum of squared\
    \ distances against different values of K\nplt.plot(range(1, max_k+1), ssd)\n\
    plt.xlabel('Number of Clusters (K)')\nplt.ylabel('Sum of Squared Distances')\n\
    plt.show()\n```\n\n### Conclusion\n\nIn this chapter, we discussed the K-means\
    \ clustering algorithm, including the distance metric, algorithm steps, computational\
    \ complexity, and methods for choosing the number of clusters. K-means clustering\
    \ is a powerful tool for discovering patterns and structures within data, making\
    \ it widely applicable in various domains.\n\n## Chapter 21\n\n## Expectation-Maximization\
    \ (EM)\n\n### Gaussian Mixture Models\n\nA Gaussian Mixture Model (GMM) is a probabilistic\
    \ model that represents a set of data points as a mixture of Gaussian distributions.\
    \ It is widely used for clustering and density estimation tasks. Let $\\mathbf{X}\
    \ = \\{\\mathbf{x}_1, \\mathbf{x}_2, ..., \\mathbf{x}_n\\}$ be the observed data,\
    \ where $\\mathbf{x}_i \\in \\mathbb{R}^d$ represents a $d$-dimensional data point.\n\
    \nThe GMM assumes that each data point $\\mathbf{x}_i$ is generated from one of\
    \ $K$ Gaussian components, with each component characterized by a mean vector\
    \ $\\boldsymbol{\\mu}_k$ and a covariance matrix $\\boldsymbol{\\Sigma}_k$. The\
    \ GMM also introduces a latent variable $\\mathbf{z}_i$ to indicate the component\
    \ from which $\\mathbf{x}_i$ is generated. $\\mathbf{z}_i$ is a one-hot vector,\
    \ with the $k$-th element being 1 if $\\mathbf{x}_i$ is generated from the $k$-th\
    \ Gaussian component, and 0 otherwise.\n\n$$p(\\mathbf{X}, \\mathbf{Z}, \\boldsymbol{\\\
    theta}) = \\prod_{i=1}^n \\prod_{k=1}^K [\\pi_k \\mathcal{N}(\\mathbf{x}_i | \\\
    boldsymbol{\\mu}_k, \\boldsymbol{\\Sigma}_k)]^{z_{ik}}$$\n\nwhere $\\mathbf{Z}\
    \ = \\{\\mathbf{z}_1, \\mathbf{z}_2, ..., \\mathbf{z}_n\\}$ is the set of latent\
    \ variables, and $\\boldsymbol{\\theta} = \\{\\boldsymbol{\\mu}_1, ..., \\boldsymbol{\\\
    mu}_K, \\boldsymbol{\\Sigma}_1, ..., \\boldsymbol{\\Sigma}_K, \\pi_1, ..., \\\
    pi_K\\}$ is the set of model parameters. Here, $\\pi_k$ represents the mixing\
    \ coefficient for the $k$-th Gaussian component, satisfying $\\sum_{k=1}^K \\\
    pi_k = 1$.\n\n### Python Code\n\n```python\nfrom sklearn.mixture import GaussianMixture\n\
    \n# Create a GaussianMixture instance and specify the desired number of components\n\
    gmm = GaussianMixture(n_components=K, random_state=0)\n\n# Fit the GaussianMixture\
    \ model to the data\ngmm.fit(X)\n\n# Retrieve the cluster assignments for each\
    \ data point\ncluster_labels = gmm.predict(X)\n```\n\n### The Expectation-Maximization\
    \ Algorithm\n\nThe Expectation-Maximization (EM) algorithm is an iterative algorithm\
    \ used to estimate the parameters of models with latent variables. In the case\
    \ of GMMs, EM is used to estimate the unknown model parameters $\\theta$ given\
    \ the observed data $\\mathbf{X}$.\nThe EM algorithm consists of two main steps:\
    \ the E-step and the M-step.\n\n#### The E-step\n\nIn the E-step, the posterior\
    \ probabilities of the latent variables $\\mathbf{Z}$ are calculated given the\
    \ current estimate of the model parameters $\\theta^{(t)}$.\n\n$$\\gamma_{ik}^{(t)}\
    \ = \\frac{\\pi_k^{(t)} \\mathcal{N}(\\mathbf{x}_i | \\mu_k^{(t)}, \\Sigma_k^{(t)})}{\\\
    sum_{j=1}^K \\pi_j^{(t)} \\mathcal{N}(\\mathbf{x}_i | \\mu_j^{(t)}, \\Sigma_j^{(t)})}$$\n\
    \nwhere $\\gamma_{ik}^{(t)}$ is the responsibility of the $k$-th component for\
    \ the $i$-th data point under the model parameters $\\theta^{(t)}$.\n\n#### The\
    \ M-step\n\nIn the M-step, the model parameters $\\theta$ are updated by maximizing\
    \ the expected complete log-likelihood with respect to $\\theta$, using the responsibilities\
    \ calculated in the E-step.\n\n$$\\boldsymbol{\\mu}_k^{(t+1)} = \\frac{1}{N_k}\
    \ \\sum_{i=1}^N \\gamma_{ik}^{(t)} \\mathbf{x}_i$$\n\n$$\\boldsymbol{\\Sigma}_k^{(t+1)}\
    \ = \\frac{1}{N_k} \\sum_{i=1}^N \\gamma_{ik}^{(t)} (\\mathbf{x}_i - \\boldsymbol{\\\
    mu}_k^{(t+1)})(\\mathbf{x}_i - \\boldsymbol{\\mu}_k^{(t+1)})^T$$\n\n$$\\pi_k^{(t+1)}\
    \ = \\frac{N_k}{N}$$\n\nwhere $N_k = \\sum_{i=1}^N \\gamma_{ik}^{(t)}$ is the\
    \ effective number of data points assigned to the $k$-th component.\n\n#### Python\
    \ Code\n\n```python\n# Perform the E-step: calculate the responsibilities\nresponsibilities\
    \ = gmm.predict_proba(X)\n\n# Perform the M-step: update the model parameters\n\
    gmm.means_ = np.dot(responsibilities.T, X) / \\\n    np.sum(responsibilities,\
    \ axis=0)[:, np.newaxis]\ngmm.covariances_ = np.einsum('ijk,ikl->ijl', \\\n  \
    \  responsibilities * (X[:, :, np.newaxis] - \\\n    gmm.means_), \\\n    X[:,\
    \ :, np.newaxis] - \\\n    gmm.means_) / \\\n    np.sum(responsibilities, \\\n\
    \    axis=0)[:, \\\n    np.newaxis, \\\n    np.newaxis]\ngmm.weights_ = np.mean(responsibilities,\
    \ axis=0)\n```\n\n### Convergence Criteria\n\nThe EM algorithm iterates between\
    \ the E-step and the M-step until convergence. One common convergence criterion\
    \ is the change in the value of the log-likelihood between iterations. The algorithm\
    \ terminates when the change in the log-likelihood falls below a predefined threshold.\n\
    \n### Python Code\n\n```python\n# Specify the convergence threshold\ntolerance\
    \ = 1e-3\n\n# Initialize the previous log-likelihood value\nprev_log_likelihood\

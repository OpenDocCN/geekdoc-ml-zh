    We assume that every player''s goal is to maximize their payoff.


    A strategy profile $\mathbf{s}^*$ is a Nash equilibrium if and only if, for every
    player $i$ and every alternative strategy $s''_i \in S_i$, the following inequality
    holds:


    $$u_i(s''_i, \mathbf{s}^*_{-i}) \leq u_i(\mathbf{s}^*),$$



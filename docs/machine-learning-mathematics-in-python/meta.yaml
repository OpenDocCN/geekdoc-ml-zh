    # Chapter 35


    # Markov Chain Monte Carlo (MCMC)


    # Introduction


    Markov Chain Monte Carlo (MCMC) methods are widely used in statistical inference
    and Bayesian analysis. These methods allow us to efficiently sample from a target
    distribution, even when the distribution is complex and its exact form is unknown.
    In this chapter, we explore MCMC methods, specifically the Metropolis-Hastings
    algorithm and Gibbs sampling. We also discuss the applications of MCMC in Bayesian
    inference.


    # Metropolis-Hastings Algorithm


    The Metropolis-Hastings algorithm is a general-purpose MCMC algorithm used to
    sample from a target probability distribution $p(\mathbf{x})$. Given an initial
    state $\mathbf{x}_0$, the algorithm iteratively generates a sequence of states
    $\mathbf{x}_1, \mathbf{x}_2, \dots$ according to a Markov chain.


    At each iteration, a proposal state $\mathbf{x}^*$ is sampled from a proposal
    distribution $q(\mathbf{x}^*|\mathbf{x}_{\text{current}})$, where $\mathbf{x}_{\text{current}}$
    is the current state of the Markov chain. The proposal distribution defines the
    probability of moving from the current state to a new proposed state.


    The acceptance probability $\alpha$ is then calculated as follows:


    ```

    $$\alpha = \min\left(1, \frac{p(\mathbf{x}^*) \cdot q(\mathbf{x}_{\text{current}}|\mathbf{x}^*)}{p(\mathbf{x}_{\text{current}})
    \cdot q(\mathbf{x}^*|\mathbf{x}_{\text{current}})}\right).$$

    ```'

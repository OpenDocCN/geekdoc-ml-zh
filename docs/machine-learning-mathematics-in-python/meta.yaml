    # Hierarchical Clustering


    Hierarchical clustering is a popular method for clustering analysis that aims
    to group similar data points into nested clusters. This chapter provides an overview
    of hierarchical clustering, including the agglomerative and divisive approaches,
    different linkage criteria, and the interpretation of dendrograms.


    # Agglomerative vs. Divisive Hierarchical Clustering


    Hierarchical clustering can be performed using two main strategies: agglomerative
    and divisive.


    In **agglomerative clustering**, all data points start as individual clusters
    and are successively merged together based on their similarity. This bottom-up
    approach begins with each data point as a separate cluster and iteratively merges
    the two closest clusters until a stopping criterion is met. The algorithm builds
    a hierarchy of clusters, known as a dendrogram, which can be further analyzed
    to determine the number of clusters.


    In **divisive clustering**, all data points initially belong to a single cluster,
    and the algorithm proceeds to divide the clusters into smaller subclusters until
    a stopping criterion is met. This top-down approach starts with one cluster and
    recursively splits it into two clusters using a specified algorithm until the
    desired number of clusters or another stopping criterion is reached.


    While agglomerative clustering is generally more common, divisive clustering may
    be useful in certain scenarios where the division'
  merge: -1
  pgno: 104
- img_proc: true
  md: 'process is easier than the agglomeration process.


    # Linkage Criteria


    One crucial aspect of hierarchical clustering is the choice of linkage criteria,
    which measure the dissimilarity or similarity between clusters. There are several
    commonly used linkage criteria:


    +   - **Single Linkage:** The distance between two clusters is defined as the
    minimum distance between any two points in the two clusters. It tends to create
    long, straggly clusters.

    - **Complete Linkage:** The distance between two clusters is defined as the maximum
    distance between any two points in the two clusters. It tends to create compact,
    spherical clusters.

    - **Average Linkage:** The distance between two clusters is defined as the average
    distance between every pair of points from different clusters. It provides a balance
    between single and complete linkage, suppressing the impact of outliers.

    - **Ward''s Linkage:** The distance between two clusters is defined as the increase
    in the error sum of squares (ESS) that would result from merging the two clusters.
    Ward''s method aims to minimize within-cluster variance.


    The choice of linkage criteria depends on the nature of the data and the intended
    interpretation of the clusters.


    # Dendrograms Interpretation


    A dendrogram is a hierarchical tree-like structure that represents the relationships
    between clusters during agglomerative clustering. It illustrates the merging process
    and helps determine the number of clusters in the dataset.


    A dendrogram is typically plotted with the dissimilarity or similarity measure
    on the vertical axis and the data points on the horizontal axis. The height of
    the linkage between two clusters represents the dissimilarity or distance between
    them. The longer the linkage, the more dissimilar the clusters.'
  merge: -1

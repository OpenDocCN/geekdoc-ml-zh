    # Convolutional Neural Networks (CNNs)


    # Introduction


    In this chapter, we explore Convolutional Neural Networks (CNNs), a class of artificial
    neural networks specifically designed for processing grid-like data such as images.
    CNNs have achieved remarkable success in image recognition tasks, demonstrating
    their ability to learn hierarchical representations directly from raw pixel data.
    We will discuss the mathematical foundations and key components of CNNs, including
    convolutional layers, pooling layers, and activation functions.


    # Convolution Operation


    The convolution operation is a fundamental building block of CNNs. It involves
    sliding a filter (or kernel) over the input image, computing element-wise multiplications
    between the filter weights and the corresponding image patch, and summing the
    results to produce a single output. Mathematically, the convolution operation
    can be defined as follows:


    $$\text{Output}[i, j] = \sum_{m} \sum_{n} \text{Input}[i + m, j + n] \cdot \text{Filter}[m,
    n]$$'
  merge: -1
  pgno: 120
- img_proc: true
  md: "where Input is the input image, Filter is the filter or kernel, and Output\
    \ is the resulting feature map.\n\n# 1 Python Code\n\nThe following Python code\
    \ snippet demonstrates the convolution operation using the NumPy library:\n\n\
    ```\nimport numpy as np\n\ndef convolution(image, filter):\n    height, width\
    \ = image.shape\n    f_height, f_width = filter.shape\n    output = np.zeros((height\
    \ - f_height + 1, width - f_width + 1))\n\n    for i in range(output.shape[0]):\n\
    \        for j in range(output.shape[1]):\n            output[i, j] = np.sum(image[i:i+f_height,\
    \ j:j+f_width] * filter)\n\n    return output\n```\n\n# Pooling Layers\n\nPooling\
    \ layers are another vital component of CNNs, used to reduce the spatial dimensions\
    \ of the input and extract the most salient features. The most common pooling\
    \ operation is max pooling, which selects the maximum value within a specified\
    \ window. Mathematically, max pooling can be defined as:\n\n> Output[i, j] = max(Input[i\
    \ × stride, j × stride])\n\nwhere Input is the input feature map, Output is the\
    \ resulting downsampled feature map, and stride is the stride length.\n\n# 1 Python\
    \ Code\n\nThe following Python code snippet illustrates the max pooling operation:"

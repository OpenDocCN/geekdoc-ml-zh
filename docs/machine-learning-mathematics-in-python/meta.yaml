    # 2 Hessian


    The Hessian matrix of a function $f(\mathbf{x})$ is a square matrix that consists
    of the second-order partial derivatives of $f$. The $(i, j)$-th element of the
    Hessian matrix is defined as:

    $$\frac{\partial^2 f}{\partial x_i \partial x_j}$$

    The Hessian matrix provides information about the curvature and the rate of change
    of the gradient. By analyzing the eigenvalues of the Hessian matrix, we can determine
    whether a given point is a maximum, minimum, or saddle point.

    To compute the Hessian matrix using SymPy, we can modify our previous code snippet
    as follows:


    ```

    import sympy as sp


    x, y = sp.symbols(''x y'')  # Define the variables

    f = x**2 + 2*y**2 + 3*x*y  # Define the function



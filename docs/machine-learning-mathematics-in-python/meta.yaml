  md: '# 1 Formulating Hypotheses


    Hypothesis testing involves formulating a null hypothesis ($H_0$) and an alternative
    hypothesis ($H_1$). The null hypothesis represents the status quo or the absence
    of an effect, while the alternative hypothesis represents the claim or the presence
    of an effect.


    For example, suppose we want to test whether a new drug is effective in reducing
    blood pressure. The null hypothesis would be that the drug has no effect ($H_0
    : \mu = \mu_0$), where $\mu_0$ represents the population mean blood pressure.
    The alternative hypothesis would be that the drug has an effect ($H_1 : \mu \neq
    \mu_0$).


    # 2 Test Statistic and P-value


    The test statistic is a numerical summary calculated from the sample data that
    is used to assess the evidence against the null hypothesis. The choice of test
    statistic depends on the nature of the hypothesis being tested.


    The p-value is a probability that measures the evidence against the null hypothesis.
    It represents the probability of obtaining a test statistic as extreme as the
    one observed, assuming the null hypothesis is true. The smaller the p-value, the
    stronger the evidence against the null hypothesis.


    # 3 Types of Errors


    Hypothesis testing involves the possibility of making two types of errors: Type
    I and Type II errors.


    A Type I error occurs when the null hypothesis is rejected, even though it is
    true. It represents a false positive conclusion. The probability of a Type I error
    is denoted by $\alpha$ and is set prior to conducting the test (e.g., at 0.05
    or 0.01).


    A Type II error occurs when the null hypothesis is not rejected, even though it
    is false. It represents a false negative conclusion. The probability of a Type
    II error is denoted by $\beta$ and depends on various factors, such as sample
    size, effect size, and significance level.



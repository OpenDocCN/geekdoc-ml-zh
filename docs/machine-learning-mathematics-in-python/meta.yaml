    # Hyperparameter Tuning


    # Introduction


    In machine learning, hyperparameters play a crucial role in determining the performance
    of a model. The process of selecting the optimal values for these hyperparameters
    is known as hyperparameter tuning. In this chapter, we will explore different
    techniques for hyperparameter tuning and discuss their mathematical foundations.


    # Problem Formulation


    Let $\boldsymbol{X}$ denote the input features matrix with dimensions $m \times
    n$, where $m$ is the number of samples and $n$ is the number of features. Let
    $\boldsymbol{y}$ denote the corresponding target vector with dimensions $m \times
    1$.


    A machine learning model $\mathcal{M}$ with hyperparameters $\boldsymbol{\theta}$
    takes $\boldsymbol{X}$ as input and outputs a prediction vector $\hat{\boldsymbol{y}}$.
    The goal of hyperparameter tuning is to find the optimal values for $\boldsymbol{\theta}$
    that minimize a predefined loss function $\mathcal{L}(\boldsymbol{y}, \hat{\boldsymbol{y}})$.'
  - '[PAGE 139]


    # Grid Search


    Grid search is a commonly used technique for hyperparameter tuning. It involves
    defining a grid of hyperparameter values and exhaustively evaluating the model''s
    performance for each combination of these values. The optimal set of hyperparameters
    is selected based on the performance metric, such as accuracy or mean squared
    error.


    Mathematically, let $\Theta$ denote the grid of hyperparameter values with dimensions
    $p \times q$, where $p$ is the number of hyperparameters and $q$ is the number
    of candidate values for each hyperparameter. The optimal hyperparameters $\theta^*$
    are selected by solving the following optimization problem:


    $$\theta^* = \arg \min_{\theta \in \Theta} \mathcal{L}(y, \hat{y}).$$


    # Random Search


    Random search is an alternative approach to hyperparameter tuning that addresses
    some of the limitations of grid search. Instead of evaluating all possible combinations
    of hyperparameter values, random search randomly samples from the predefined hyperparameter
    space. The number of samples is determined in advance.


    Mathematically, let $N$ denote the number of random samples. The optimal hyperparameters
    $\theta^*$ are selected by solving the following optimization problem:


    $$\theta^* = \arg \min_{\theta} \frac{1}{N} \sum_{i=1}^{N} \mathcal{L}(y, \hat{y}).$$


    # Bayesian Optimization


    Bayesian optimization is a sequential model-based optimization technique that
    leverages previous observations to select the next set of hyperparameters to evaluate.
    It builds a probabilistic model, such as a Gaussian Process (GP), to model the
    performance of the model as a function of its hyperparameters. The GP model is
    updated as new observations are made.


    The acquisition function guides the selection of the next hyperparameters to evaluate
    based on the current GP model. Commonly'
- md: 'used acquisition functions include Upper Confidence Bound (UCB) and Expected
    Improvement (EI).


    Mathematically, let $D$ denote the set of observed hyperparameters and their corresponding
    performance values. The optimal hyperparameters $\theta^*$ are selected by solving
    the following optimization problem:


    $$\theta^* = \arg\max_{\theta} \text{acquisition\_function}(\theta|D).$$



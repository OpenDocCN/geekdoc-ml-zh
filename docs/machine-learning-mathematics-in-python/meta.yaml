    $$\gamma_{ik}^{(t)} = \frac{\pi_k^{(t)} \mathcal{N}(\mathbf{x}_i | \mu_k^{(t)},
    \Sigma_k^{(t)})}{\sum_{j=1}^K \pi_j^{(t)} \mathcal{N}(\mathbf{x}_i | \mu_j^{(t)},
    \Sigma_j^{(t)})}$$


    where $\gamma_{ik}^{(t)}$ is the responsibility of the $k$-th component for the
    $i$-th data point under the model parameters $\theta^{(t)}$.


    # 2 The M-step


    In the M-step, the model parameters $\theta$ are updated by maximizing the expected
    complete log-likelihood with respect to $\theta$, using the responsibilities calculated
    in the E-step.'

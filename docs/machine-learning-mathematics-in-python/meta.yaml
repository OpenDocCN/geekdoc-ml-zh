    & a_{NN} \end{bmatrix}.$


    The emission probability matrix $\mathbf{B}$ is defined as:


    $$\mathbf{B} = \begin{bmatrix} b_1(v_1) & b_1(v_2) & \dots & b_1(v_M) \ b_2(v_1)
    & b_2(v_2) & \dots & b_2(v_M) \ \vdots & \vdots & \ddots & \vdots \ b_N(v_1) &
    b_N(v_2) & \dots & b_N(v_M) \end{bmatrix}.$


    The initial state distribution $\pi$ is a vector of length $N$ representing the
    probabilities of starting in each hidden state:



    \n## 计算复杂性\n\n### 引言\n\n在本章中，我们将深入探讨计算复杂性领域，该领域专注于研究解决计算问题所需的资源。我们将考察算法的时间和空间复杂度，根据复杂性探索不同的计算问题类别，并概述用于表达这些复杂性的符号表示法。\n\
    \n### 时间复杂度\n\n时间复杂度是衡量算法运行时间随输入规模增长的函数。它提供了算法在执行过程中执行的基本操作或步骤数量的估计。我们使用大O符号来表示时间复杂度，它捕捉了算法在最坏情况下的渐近行为。\n\
    \n#### 1 大O符号\n\n大O符号，记为 $O(\\cdot)$，描述了函数增长率的上界。例如，时间复杂度为 $O(n)$ 表示算法的运行时间随输入规模\
    \ $n$ 线性增长。大O符号提供了一种简洁的方式来表示时间复杂度的数量级，而无需深入探讨精确的常数因子。\n\n#### 2 常见时间复杂度\n\n在算法分析中，常会遇到以下几种常见的时间复杂度类别：\n\
    \n- $O(1)$：常数时间复杂度，算法的运行时间与输入规模无关，保持恒定。\n- $O(\\log n)$：对数时间复杂度，通常出现在每一步都将输入规模除以一个常数因子的算法中，例如二分查找。\n\
    - $O(n)$：线性时间复杂度，算法的运行时间与输入规模成线性关系。\n- $O(n^2)$：二次时间复杂度，常见于涉及嵌套循环的算法。\n- $O(2^n)$：指数时间复杂度，通常与遍历所有可能输入组合的暴力算法相关。\n\
    - $O(n!)$：阶乘时间复杂度，出现在需要检查输入所有排列的算法中。\n\n选择合适的算法通常需要在时间复杂度和问题的内在要求之间进行权衡。\n\n###\
    \ 空间复杂度\n\n空间复杂度是衡量算法所需内存或存储空间随输入规模增长的函数。与时间复杂度类似，我们使用大O符号来表示空间复杂度。\n\n#### 1\
    \ 常见空间复杂度\n\n几种常见的空间复杂度类别包括：\n\n- $O(1)$：常数空间复杂度，内存使用量与输入规模无关，保持恒定。\n- $O(n)$：线性空间复杂度，内存使用量与输入规模成线性关系。\n\

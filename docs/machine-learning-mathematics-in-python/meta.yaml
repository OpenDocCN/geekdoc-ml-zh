    \ 和 $y_{k,i}$ 分别表示任务 $k$ 的样本 $i$ 的输入特征和目标值。\n\n多任务学习的目标是学习一组 $K$ 个函数 $\\{f_k :\
    \ \\mathcal{X} \\rightarrow \\mathcal{Y}_k\\}_{k=1}^K$，其中 $\\mathcal{Y}_k$ 是任务\
    \ $k$ 的输出空间。换句话说，我们的目标是学习将输入空间 $\\mathcal{X}$ 映射到每个任务特定输出空间的模型。\n\n### 多任务学习的优势\n\
    \n与单任务学习相比，使用多任务学习有几个优点：\n\n#### 1 提升泛化能力\n\n通过联合学习多个任务，多任务学习可以利用任务间的共享信息。这使得模型能够学习到更鲁棒、更具泛化性的数据表示。共享知识有助于正则化学习过程，从而提升每个单独任务的泛化性能。\n\

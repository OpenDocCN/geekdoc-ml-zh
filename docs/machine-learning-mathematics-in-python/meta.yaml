    \ `solve_ivp(dynamics, t_span, x0)` 求解动态系统。得到的解存储在 `sol` 对象中，该对象包含时间点 `sol.t`\
    \ 和相应的状态变量值 `sol.y`。可以根据需要访问并进一步分析这些数据。\n\n# 第 50 章\n\n# 拓扑数据分析 (TDA)\n\n## 持续同调\n\
    \n持续同调是拓扑数据分析中使用的一种数学工具，用于从数据中提取稳健的拓扑特征。它提供了一个框架，用于识别和量化在不同空间尺度上持续存在的拓扑结构，例如连通分量、孔洞和空洞。这些特征的持续性可以用持续图的概念来表示。\n\
    \n### 1 持续图的定义\n\n给定一个过滤单纯复形 $K$ 和一个域 $\\mathbb{F}$（通常取为实数域或整数域），一个拓扑特征（如连通分量或孔洞）的持续性由一对实数表示，这对实数表示该特征诞生和消亡时的过滤值。这对实数被称为一个持续点。\n\
    \n一组持续点的集合称为持续图，记为 $D$。图中的每个点 $(b, d)$ 对应一个在过滤值 $b$ 处出现、在过滤值 $d$ 处消失的特征。持续同调旨在分析持续图中持续点的分布，以表征数据的底层拓扑结构。\n\
    \n### 2 持续同调的计算\n\n持续同调的计算涉及构建单纯复形的过滤，然后计算过滤每个阶段的同调群。这个过程依赖于边界算子的概念和持续贝蒂数的概念。\n\
    \n#### 边界算子\n\n给定一个单纯复形，边界算子（记为 $\\partial_k$）将 $k$-单纯形映射到 $(k - 1)$-单纯形。例如，在一个二维单纯复形中，边界算子\
    \ $\\partial_2$ 将三角形映射到边，而 $\\partial_1$ 将边映射到顶点。\n\n#### 持续贝蒂数\n\n持续贝蒂数（记为 $\\\
    beta_k$）衡量在过滤的每个阶段，单纯复形中存在的 $k$ 维拓扑特征（例如连通分量、孔洞）的数量。\n\n要计算持续贝蒂数，需要构建一个边界矩阵 $B_k$，将边界算子\
    \ $\\partial_k$ 表示为矩阵。通过对 $B_k$ 进行高斯消元，得到其简化行阶梯形 $R_k$。然后，通过计算 $R_k$ 中非零行的数量即可得到持续贝蒂数\
    \ $\\beta_k$。\n\n### 3 持续同调的应用\n\n持续同调已在多个领域得到应用，包括计算机视觉、计算生物学和材料科学。一些具体应用包括：\n\
    \n#### 形状识别与分类\n\n持续同调可用于从形状中提取拓扑特征，并为形状识别和分类任务提供稳健的表示。通过分析持续图，可以识别独特的拓扑特征并区分不同的形状类别。\n\
    \n#### 点云分析\n\n在点云数据中，持续同调可以识别和量化拓扑特征，例如环和空洞，这些特征对于表征数据的几何属性可能至关重要。这种分析有助于开发用于点云分割、去噪和异常检测的算法。\n\
    \n#### 神经影像分析\n\n在神经影像学中，持续同调已被应用于研究大脑的结构连接网络。通过将大脑区域表示为节点、纤维束表示为边，持续图可以捕获反映大脑组织结构的拓扑特征，例如簇、桥和隧道。\n\
    \n## 贝蒂数\n\n贝蒂数（记为 $\\beta_k$）是基本的拓扑不变量，提供了关于拓扑空间中 $k$ 维孔洞的数量和连通性的信息。持续同调利用贝蒂数的概念来捕获数据中存在的拓扑特征。\n\
    \n### 1 贝蒂数的定义\n\n考虑一个拓扑空间 $X$ 及其相关的单纯复形 $K$。第 $k$ 个贝蒂数（记为 $\\beta_k$）表示 $K$ 的第\
    \ $k$ 个同调群的秩。直观地说，它计算 $X$ 中 $k$ 维孔洞的数量。\n\n形式上，第 $k$ 个同调群 $H_k(X)$ 定义为 $k$-闭链（$k$\
    \ 维闭合环）模 $k$-边界（无边界的 $k$ 维环）的商群。数学上，我们可以将其表示为：\n\n$$H_k(X) = \\frac{\\ker(\\partial_k)}{\\\
    text{im}(\\partial_{k+1})}$$\n\n其中 $\\partial_k$ 是将 $k$-单纯形映射到 $(k-1)$-单纯形的边界算子。\n\
    \n### 2 计算贝蒂数\n\n计算贝蒂数通常涉及构建边界矩阵 $B_k$ 并应用线性代数技术分析其结构。\n\n给定一个单纯复形，边界矩阵 $B_k$\
    \ 将边界算子 $\\partial_k$ 表示为矩阵。通过对 $B_k$ 进行高斯消元，得到其简化行阶梯形 $R_k$。$R_k$ 中非零行的数量对应于边界矩阵的秩，从而提供贝蒂数\
    \ $\\beta_k$。\n\n### 3 贝蒂数的解释\n\n贝蒂数提供了对空间拓扑性质的洞察。以下是不同 $k$ 值下贝蒂数的一些解释：\n\n- $\\\
    beta_0$：第一个贝蒂数 $\\beta_0$ 表示空间中连通分量的数量。例如，在一个单一的连通形状中，$\\beta_0 = 1$。\n- $\\beta_1$：第二个贝蒂数\
    \ $\\beta_1$ 对应于空间中不可收缩环的数量。在一个没有孔洞的单连通形状中，$\\beta_1 = 0$。\n- $\\beta_2$：第三个贝蒂数\
    \ $\\beta_2$ 表示空间中存在的空洞或腔体的数量。例如，在一个实心环面中，$\\beta_2 = 1$。\n\n通过检查不同维度的贝蒂数，可以识别和表征空间的拓扑特征，这些特征可以进一步使用持续同调进行分析。\n\
    \n## Python 实现\n\n以下是一个 Python 代码片段，展示了如何使用 Gudhi 库计算持续同调：\n\n```python\nimport\
    \ gudhi\n\n# Create the simplicial complex\nsimplicial_complex = gudhi.SimplexTree()\n\
    ```"

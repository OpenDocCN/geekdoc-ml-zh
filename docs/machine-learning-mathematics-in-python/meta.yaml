  md: "```\npython\ndef estimate_ar_parameters(X, p):\n    X_lagged = np.column_stack([np.roll(X,\
    \ i) for i in range(p)])\n    X_lagged = X_lagged[p:]\n    X = X[p:]\n\n    model\
    \ = OLS(X, X_lagged)\n    results = model.fit()\n\n    ar_parameters = results.params\n\
    \    return ar_parameters\n```\n\n# 2 Moving Average Model\n\nNext, we consider\
    \ the moving average (MA) model of order $q$, denoted as MA($q$). In an MA($q$)\
    \ model, each observation in a time series is expressed as a linear combination\
    \ of $q$ previous error terms, weighted by certain coefficients. The general form\
    \ of an MA($q$) model is given by the equation:\n\n$$X_t = \\mu + \\varepsilon_t\
    \ + \\theta_1\\varepsilon_{t-1} + \\theta_2\\varepsilon_{t-2} + \\dots + \\theta_q\\\
    varepsilon_{t-q},$$\n\nwhere $X_t$ is the value of the time series at time $t$,\
    \ $\\mu$ is the mean of the series, $\\varepsilon_t$ is the white noise error\
    \ term at time $t$, and $\\theta_1, \\theta_2, \\dots, \\theta_q$ are the moving\
    \ average coefficients.\n\nPython code snippet for estimating MA($q$) model parameters\
    \ using ordinary least squares (OLS):\n\n```\npython\nfrom statsmodels.tsa.arima.model\
    \ import ARIMA\n\ndef estimate_ma_parameters(X, q):\n    model = ARIMA(X, order=(0,\
    \ 0, q))\n    results = model.fit()\n\n    ma_parameters = results.params\n  \
    \  return ma_parameters\n```\n\n# 3 ARIMA Model\n\nFinally, we introduce the integrated\
    \ component of ARIMA models. The integrated component takes into account the differencing\
    \ of the"

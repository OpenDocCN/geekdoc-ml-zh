    # Q-Learning


    # Introduction


    In this chapter, we delve into the mathematical foundations of Q-Learning, a popular
    reinforcement learning algorithm. Q-Learning is a model-free, off-policy method
    that enables an agent to learn an optimal policy by iteratively updating its action-value
    function, known as the Q-function. We begin by defining the Q-function and its
    update rule, and then explore its convergence properties.


    # Q-Function


    The Q-function, denoted as $Q(s, a)$, represents the expected cumulative discounted
    reward if the agent takes action $a$ in state $s$ and then follows a certain policy
    $\pi$. This function is defined for all state-action pairs $(s, a)$.


    # Bellman Update


    The key idea behind Q-Learning is to iteratively update the Q-function based on
    observed rewards. The update rule, known as the Bellman update, is given by the
    following equation:


    ```

    $$Q(s, a) \leftarrow Q(s, a) + \alpha \left[ R(s, a) + \gamma \max_{a''} Q(s'',
    a'') - Q(s, a) \right]$$

    ```


    where:'
  merge: -1
  pgno: 111
- img_proc: true
  md: "+   - $\\alpha$ is the learning rate, which determines the extent to which\
    \ newly observed information overrides existing knowledge.\n- $R(s, a)$ is the\
    \ immediate reward received when taking action $a$ in state $s$.\n- $\\gamma$\
    \ is the discount factor, which controls the importance of future rewards.\n-\
    \ $\\max_{a'} Q(s', a')$ represents the maximum Q-value among all possible actions\
    \ in the next state $s'$.\n\n# 1 Python Code\n\n```\nimport numpy as np\n\ndef\
    \ q_learning(Q, s, a, r, s_prime, alpha, gamma):\n    max_q_prime = np.max(Q[s_prime])\n\
    \    Q[s, a] += alpha * (r + gamma * max_q_prime - Q[s, a])\n```\n\n# Convergence\n\
    \nUnder certain conditions, Q-Learning has been shown to converge to the optimal\
    \ Q-function as the number of iterations approaches infinity. Convergence is guaranteed\
    \ if the agent explores all state-action pairs infinitely often, a property known\
    \ as *exploration with probability one*.\n\n# Conclusion\n\nQ-Learning is a powerful\
    \ algorithm that can enable an agent to learn an optimal policy without requiring\
    \ a model of the environment. By iteratively updating the Q-function based on\

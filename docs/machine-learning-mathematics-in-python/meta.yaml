    # Entropy and Information Theory


    # Introduction


    In this chapter, we will explore the concept of entropy and its applications in
    information theory. Entropy is a fundamental measure of uncertainty or randomness,
    and it plays a crucial role in various areas, including communication theory,
    data compression, and statistical inference. We will delve into the mathematical
    formulation of entropy, discuss its properties, and examine its applications in
    the context of information theory.


    # Shannon Entropy


    Shannon entropy, named after Claude Shannon, is a measure of the average amount
    of information contained in a random variable or a probability distribution. It
    provides a quantitative measure of uncertainty or randomness associated with the
    outcomes of the random variable.


    Given a discrete random variable $X$ with a probability mass function $P(X)$,
    the Shannon entropy $H(X)$ is defined as:


    ```

    $$H(X) = -\sum_{x} P(x) \log_2 P(x)$$

    ```


    where $x$ represents the possible outcomes of the random variable $X$.'
  - '[PAGE 179]


    The term $P(x) \log_2 P(x)$ is known as the self-information of an outcome $x$,
    which quantifies the amount of surprise associated with that outcome. The negative
    sign in front of the summation ensures that the entropy is always non-negative.


    The Shannon entropy satisfies several important properties:


    +   - **Non-negativity**: The entropy is always non-negative, i.e., $H(X) \geq
    0$.

    - **Maximum entropy for uniform distribution**: The maximum value of entropy is
    achieved when all outcomes are equally likely, i.e., $H(X) \leq \log_2 n$, where
    $n$ is the number of possible outcomes.

    - **Additivity**: The entropy of the joint distribution of two random variables
    is equal to the sum of the entropies of the individual random variables if they
    are independent.


    Shannon entropy has various applications, such as quantifying the information
    content of a message, measuring the average number of bits required to encode
    symbols from a given distribution, and characterizing the amount of uncertainty
    in a system.


    # KL Divergence


    Kullback-Leibler (KL) divergence, also known as relative entropy, is a measure
    of the difference between two probability distributions. It quantifies how one
    distribution differs from another in terms of information content.


    Given two discrete probability distributions $P(X)$ and $Q(X)$ defined over the
    same set of outcomes, the KL divergence $D_{KL}(P \| Q)$ from $Q$ to $P$ is defined
    as:


    $$D_{KL}(P \| Q) = \sum_{x} P(x) \log_2 \left( \frac{P(x)}{Q(x)} \right)$$


    KL divergence is not a symmetric measure, i.e., $D_{KL}(P \| Q) \neq D_{KL}(Q
    \| P)$ in general. It is always non-negative and is equal to zero if and only
    if $P$ and $Q$ are identical.


    KL divergence has several important properties:


    +   - **Non-negativity**: KL divergence is always non-negative, i.e., $D_{KL}(P
    \| Q) \geq 0$.'
  - '[PAGE 180]


    +   - **Zero divergence for identical distributions**: KL divergence is equal
    to zero only if $P$ and $Q$ are identical.

    - **Lack of symmetry**: KL divergence is not symmetric, i.e., $D_{KL}(P\|Q) \neq
    D_{KL}(Q\|P)$.

    - **Additivity**: The KL divergence between two distributions $P$ and $Q$ is additive,
    i.e., $D_{KL}(P\|Q) + D_{KL}(Q\|R) = D_{KL}(P\|R)$.


    KL divergence is widely used in various applications, including information theory,
    statistics, machine learning, and data science. It serves as a measure of dissimilarity
    between probability distributions and is frequently utilized in tasks such as
    model comparison, hypothesis testing, and model selection.


    # Mutual Information


    Mutual information is a measure of the dependence between two random variables.
    It quantifies how much knowing the value of one variable reduces the uncertainty
    about the other variable.


    Given two discrete random variables $X$ and $Y$ with joint probability mass function
    $P(X, Y)$ and marginal probability mass functions $P(X)$ and $P(Y)$, the mutual
    information $I(X; Y)$ between $X$ and $Y$ is defined as:


    $$I(X; Y) = \sum_{x,y} P(x, y) \log_2 \left( \frac{P(x, y)}{P(x)P(y)} \right)$$


    Mutual information is always non-negative and is equal to zero if and only if
    $X$ and $Y$ are statistically independent.


    Mutual information satisfies several important properties:


    +   - **Non-negativity**: Mutual information is always non-negative, i.e., $I(X;
    Y) \geq 0$.

    - **Zero for independent variables**: Mutual information is equal to zero if and
    only if $X$ and $Y$ are statistically independent.

    - **Symmetry**: Mutual information is symmetric, i.e., $I(X; Y) = I(Y; X)$.

    - **Chain rule**: The mutual information between multiple random variables can
    be decomposed using the chain rule of mutual information.'

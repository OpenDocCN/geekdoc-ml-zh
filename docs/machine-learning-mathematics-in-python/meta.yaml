    In the field of game theory, the concept of Nash equilibrium plays a fundamental
    role. Named after the mathematician John Nash, a Nash equilibrium represents a
    stable state in a game where no player can improve their outcome by unilaterally
    changing their strategy. In this section, we define Nash equilibrium mathematically
    and explore its significance.


    Consider a strategic game with $N$ players. Each player $i$ has a set of strategies
    $S_i$, and their strategy profile is denoted by $\mathbf{s} = (s_1, s_2, \ldots,
    s_N)$, where $s_i \in S_i$ represents the strategy chosen by player $i$. The payoff
    received by player $i$ under strategy profile $\mathbf{s}$ is denoted by $u_i(\mathbf{s})$.
    We assume that every player''s goal is to maximize their payoff.


    A strategy profile $\mathbf{s}^*$ is a Nash equilibrium if and only if, for every
    player $i$ and every alternative strategy $s''_i \in S_i$, the following inequality
    holds:


    $$u_i(s''_i, \mathbf{s}^*_{-i}) \leq u_i(\mathbf{s}^*),$$


    where $\mathbf{s}^*_{-i}$ denotes the strategy profile of all players except player
    $i$ in the Nash equilibrium $\mathbf{s}^*$. In other words, no player has an incentive
    to deviate from their strategy in a Nash equilibrium. It represents a state of
    mutual consistency in strategies where each player''s strategy is the best response
    to the strategies chosen by the other players.


    To illustrate the concept of Nash equilibrium, consider the famous Prisoner''s
    Dilemma game, represented by the following payoff'

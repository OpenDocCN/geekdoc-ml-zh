    # Algorithm Steps


    The K-means clustering algorithm consists of the following steps:


    # 1 Initialization


    Randomly select $K$ data points as initial cluster centroids.


    # 2 Assignment


    Assign each data point to the nearest cluster centroid based on the chosen distance
    metric.


    # 3 Update


    Update the cluster centroids by computing the mean of the data points assigned
    to each cluster.


    # 4 Iteration


    Repeat the assignment and update steps until convergence, i.e., there is no change
    in the assignment of data points to clusters or a specified number of iterations
    is reached.



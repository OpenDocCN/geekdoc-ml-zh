  md: '# Chapter 51


    # Spiking Neural Networks (SNN)


    # Neuron Models


    # 1 Introduce Leaky Integrate-and-Fire (LIF) model


    The Leaky Integrate-and-Fire (LIF) model is a widely used neuron model in the
    field of spiking neural networks. It captures the basic behavior of a neuron by
    simulating the integration and generation of action potentials (spikes) in response
    to incoming stimuli.

    The LIF model describes the membrane potential of a neuron as a function of time.
    It incorporates the leakage of charge through the membrane and the generation
    of spikes when the membrane potential exceeds a certain threshold. Mathematically,
    the membrane potential of a LIF neuron can be represented as:


    ```

    $$\tau_m \frac{dV}{dt} = -(V - V_{\text{rest}}) + RI$$

    ```


    where $\tau_m$ is the membrane time constant, $V$ is the membrane potential, $V_{\text{rest}}$
    is the resting potential, $R$ is the membrane resistance, and $I$ is the input
    current to the neuron.


    # 2 Describe Spike Generation and Resetting


    When the membrane potential $V$ exceeds a predefined threshold $V_{\text{th}}$,
    the neuron generates a spike and the membrane potential is'
  merge: -1
  pgno: 223
- img_proc: true
  md: 'reset to a reset potential $V_{\text{reset}}$. This spike generation and resetting
    behavior can be represented mathematically as:


    $$\text{if } V \ge V_{\text{th}}, \text{ then } V \leftarrow V_{\text{reset}}$$


    Additionally, a refractory period can be introduced after each spike, during which
    the neuron is temporarily insensitive to incoming stimuli. This can be represented
    as:


    $$\text{if } V \ge V_{\text{th}}, \text{ then } V \leftarrow V_{\text{reset}},
    \text{ and the neuron enters a refractory period}$$


    # 3 Describe Spike-Timing-Dependent Plasticity (STDP)


    Spike-Timing-Dependent Plasticity (STDP) is a synaptic plasticity rule that modulates
    the strengths of connections between neurons based on the timing of their spikes.
    It is a Hebbian learning rule that strengthens or weakens synapses depending on
    the relative timing of pre-synaptic and post-synaptic spikes.


    Mathematically, the weight update rule for STDP can be represented as:


    $$\Delta w = \begin{cases} A_+ \cdot \exp\left(-\frac{\Delta t}{\tau_+}\right)
    & \text{if } \Delta t > 0 \ -A_- \cdot \exp\left(\frac{\Delta t}{\tau_-}\right)
    & \text{if } \Delta t < 0 \ 0 & \text{if } \Delta t = 0 \end{cases}$$


    where $\Delta w$ is the weight change, $\Delta t$ is the time difference of the
    pre- and post-synaptic spikes, $A_+$ and $A_-$ control the magnitude of weight
    changes for pre- and post-synaptic spikes, and $\tau_+$ and $\tau_-$ control the
    decay rates of weight changes.


    # SNN Architecture


    # 1 Describe Feedforward Architecture


    A feedforward spiking neural network (SNN) architecture consists of layers of
    neurons connected in a feedforward manner, without any recurrent connections.
    The information flows from the input layer to the output layer, with each neuron
    in a layer receiving inputs only from the previous layer.


    Mathematically, the activation $a_j^l$ of a neuron $j$ in layer $l$ can be computed
    as:'
  merge: -1
  pgno: 224
- img_proc: true
  md: '$$a_j^l = \sum_{k=1}^{n_{l-1}} w_{jk}^l \cdot s_k^{l-1}$$


    where $w_{jk}^l$ is the weight connecting neuron $k$ in layer $l-1$ to neuron
    $j$ in layer $l$, and $s_k^{l-1}$ is the spike train of neuron $k$ in layer $l-1$.


    # 2 Describe Spiking Activation Functions


    Spiking activation functions determine when a neuron in an SNN generates a spike
    based on its membrane potential. These functions are typically non-linear and
    model the spiking behavior of biological neurons.


    The most commonly used spiking activation function is the thresholding function,
    which generates an output spike when the input potential exceeds a predefined
    threshold. Mathematically, this can be represented as:


    $$y = \begin{cases} 1 & \text{if } V \geq V_{\text{th}} \ 0 & \text{otherwise}
    \end{cases}$$


    where $y$ is the output spike and $V$ is the membrane potential.

    Other spiking activation functions, such as the sigmoidal function or the rectified
    linear function, can also be used depending on the specific requirements of the
    SNN.


    # 3 Describe Spike-Time Encoding for Inputs


    In spiking neural networks, inputs are typically encoded as spike trains, representing
    the timing of spikes rather than the magnitudes of inputs. This spike-time encoding
    allows for the efficient representation and processing of temporal information.


    The encoding of an input $x(t)$ as a spike train can be accomplished using various
    methods, such as rate-based encoding or temporal coding. Rate-based encoding maps
    the input magnitude to the firing rate of the neuron, while temporal coding encodes
    the input value based on the timing of spikes.


    For example, a spike-time encoding scheme based on the Integrate-and-Fire model
    can be represented as:


    $$x(t) \rightarrow s(t) = \sum_{i=1}^{N} \delta(t - t_i)$$'

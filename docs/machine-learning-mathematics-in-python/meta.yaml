    # Generative Adversarial Networks (GAN)


    # Introduction


    Generative Adversarial Networks (GANs) have emerged as a powerful framework for
    generative modeling, capable of learning to generate synthetic data that closely
    resembles real data distributions. In this chapter, we will explore the mathematical
    foundations of GANs and their training procedure, which involves a game-theoretic
    approach between two neural networks: the generator and the discriminator.


    # The GAN Framework


    At the core of the GAN framework lies a minimax game between the generator and
    the discriminator. The generator, denoted as $G$, aims to generate realistic samples
    that resemble real data, while the discriminator, denoted as $D$, tries to distinguish
    between real and fake samples. The ultimate goal is to train $G$ to generate samples
    that are indistinguishable from real data by $D$.


    # 1 Generator


    The generator takes as input a random noise vector $z$ sampled from a known prior
    distribution, typically a Gaussian distribution,'
  merge: -1
  pgno: 130
- img_proc: true
  md: 'and maps it to a high-dimensional data space to generate synthetic samples.
    Mathematically, the generator can be represented by a neural network with parameters
    $\theta_G$ and is denoted as $G(z; \theta_G)$.


    # 2 Discriminator


    The discriminator is responsible for classifying samples as real or fake. It takes
    either a real sample $x$ or a generated sample $G(z; \theta_G)$ as input and outputs
    a probability $D(x; \theta_D)$, where $\theta_D$ represents the discriminator''s
    parameters.


    # 3 Objective Function


    The objective of the GAN framework is to find a Nash equilibrium between the generator
    and the discriminator. This can be achieved by solving the following minimax game:


    $$\min_{\theta_G} \max_{\theta_D} V(D, G) = \mathbb{E}_{x \sim p_{\text{real}}(x)}
    [\log D(x; \theta_D)] + \mathbb{E}_{z \sim p_{\text{noise}}(z)} [\log(1 - D(G(z;
    \theta_G)); \theta_D)]$$


    where $p_{\text{real}}(x)$ denotes the true data distribution, and $p_{\text{noise}}(z)$
    represents the prior noise distribution.


    # GAN Training Procedure


    GANs are typically trained using an alternating optimization procedure. In each
    training iteration, the discriminator and generator are updated in sequence.


    # 1 Discriminator Updates


    To update the discriminator, we sample a batch of real data $\{x_1, \dots, x_m\}$
    from the true data distribution and a batch of noise samples $\{z_1, \dots, z_m\}$
    from the prior noise distribution. The discriminator''s parameters $\theta_D$
    are updated by performing gradient ascent on the objective function $V(D, G)$:


    $$\nabla_{\theta_D} \frac{1}{m} \sum_{i=1}^{m} [\log D(x_i; \theta_D) + \log(1
    - D(G(z_i; \theta_G)); \theta_D)].$$'
  merge: -1
  pgno: 131
- img_proc: true
  md: "# 2 Generator Updates\n\nOnce the discriminator is updated, we fix its parameters\
    \ and update the generator by performing gradient descent on the objective function\
    \ $V(D, G)$:\n\n$\\nabla_{\\theta_G} \\frac{1}{m} \\sum_{i=1}^{m} \\log(1 - D(G(z_i;\
    \ \\theta_G)); \\theta_D)$.\n\n# Python Code: GAN Training Procedure\n\nThe following\
    \ Python code snippet showcases the training procedure for GANs:\n\n```\nimport\
    \ numpy as np\n\ndef train_gan(generator, discriminator, real_data, noise_data):\n\
    \    discriminator.train()\n    generator.train()\n\n    optimizer_D = torch.optim.Adam(discriminator.parameters(),\
    \ lr=0.001)\n    optimizer_G = torch.optim.Adam(generator.parameters(), lr=0.001)\n\
    \n    # Discriminator update\n    optimizer_D.zero_grad()\n    real_loss = torch.mean(torch.log(discriminator(real_data)))\n\
    \    fake_loss = torch.mean(torch.log(1 - discriminator(generator(noise_data))))\n\
    \    D_loss = -(real_loss + fake_loss)\n    D_loss.backward()\n    optimizer_D.step()\n\
    \n    # Generator update\n    optimizer_G.zero_grad()\n    G_loss = torch.mean(torch.log(1\
    \ - discriminator(generator(noise_data))))\n```"

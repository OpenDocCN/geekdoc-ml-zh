  md: '+   - **Zero divergence for identical distributions**: KL divergence is equal
    to zero only if $P$ and $Q$ are identical.

    - **Lack of symmetry**: KL divergence is not symmetric, i.e., $D_{KL}(P\|Q) \neq
    D_{KL}(Q\|P)$.

    - **Additivity**: The KL divergence between two distributions $P$ and $Q$ is additive,
    i.e., $D_{KL}(P\|Q) + D_{KL}(Q\|R) = D_{KL}(P\|R)$.


    KL divergence is widely used in various applications, including information theory,
    statistics, machine learning, and data science. It serves as a measure of dissimilarity
    between probability distributions and is frequently utilized in tasks such as
    model comparison, hypothesis testing, and model selection.


    # Mutual Information


    Mutual information is a measure of the dependence between two random variables.
    It quantifies how much knowing the value of one variable reduces the uncertainty
    about the other variable.


    Given two discrete random variables $X$ and $Y$ with joint probability mass function
    $P(X, Y)$ and marginal probability mass functions $P(X)$ and $P(Y)$, the mutual
    information $I(X; Y)$ between $X$ and $Y$ is defined as:


    $$I(X; Y) = \sum_{x,y} P(x, y) \log_2 \left( \frac{P(x, y)}{P(x)P(y)} \right)$$


    Mutual information is always non-negative and is equal to zero if and only if
    $X$ and $Y$ are statistically independent.


    Mutual information satisfies several important properties:


    +   - **Non-negativity**: Mutual information is always non-negative, i.e., $I(X;
    Y) \geq 0$.

    - **Zero for independent variables**: Mutual information is equal to zero if and
    only if $X$ and $Y$ are statistically independent.

    - **Symmetry**: Mutual information is symmetric, i.e., $I(X; Y) = I(Y; X)$.

    - **Chain rule**: The mutual information between multiple random variables can
    be decomposed using the chain rule of mutual information.'

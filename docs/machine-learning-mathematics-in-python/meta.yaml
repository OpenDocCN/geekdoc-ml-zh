    bar{y}$是$x$和$y$的样本均值。\n\n### 模型评估\n\n为了评估简单线性回归模型的拟合度，我们考虑残差平方和（RSS）、总平方和（TSS）和R平方（$R^2$）统计量。\n\
    \nRSS代表残差平方和，可以计算为：\n\n$$\\text{RSS} = \\sum_{i=1}^n (y_i - \\hat{y}_i)^2$$\n\n\
    其中$y_i$是因变量的观测值，$\\hat{y}_i$是基于模型的预测值。\n\nTSS代表因变量的总变异性，可以计算为：\n\n$$\\text{TSS}\
    \ = \\sum_{i=1}^n (y_i - \\bar{y})^2$$\n\n$R^2$统计量衡量因变量总变异性中被自变量解释的比例，可以计算为：\n\
    \n$$R^2 = 1 - \\frac{\\text{RSS}}{\\text{TSS}}$$\n\n$R^2$值越高，表明模型对数据的拟合越好。\n\n\
    ### Python实现\n\n在Python中，‘scikit-learn’库提供了拟合简单线性回归模型和评估其性能的函数。以下代码片段演示了如何使用‘scikit-learn’执行简单线性回归并计算RSS、TSS和$R^2$：\n\
    \n```\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.metrics\
    \ import mean_squared_error, r2_score\n\n# 自变量\nX = np.array([3, 5, 7, 8, 9, 10,\
    \ 11, 14, 15, 17]).reshape(-1, 1)\n\n# 因变量\ny = np.array([4, 7, 5, 12, 11, 13,\
    \ 19, 20, 21, 25])\n\n# 创建线性回归对象\nmodel = LinearRegression()\n\n# 拟合模型\nmodel.fit(X,\
    \ y)\n\n# 预测因变量\ny_pred = model.predict(X)\n\n# 计算RSS、TSS和R^2\nRSS = mean_squared_error(y,\
    \ y_pred) * len(y)\nTSS = mean_squared_error(y, np.mean(y)) * len(y)\nR_squared\
    \ = r2_score(y, y_pred)\n```\n\n在这段代码中，我们首先将自变量（$X$）和因变量（$y$）定义为numpy数组。然后，我们创建‘LinearRegression’类的实例，并使用‘fit()’方法拟合模型。‘predict()’方法用于基于自变量生成预测值。\n\
    \n最后，我们使用‘scikit-learn’中的‘mean_squared_error()’函数计算RSS，该函数计算观测值（$y$）和预测值（$\\hat{y}$）之间的均方误差。类似地，通过将观测值与其均值进行比较来计算TSS。$R^2$统计量使用`r2_score()`函数计算。\n\
    \n通过评估RSS、TSS和$R^2$，我们可以评估简单线性回归模型的性能和拟合优度。\n\n## 第7章\n\n## 多元线性回归\n\n### 简介\n\
    \n多元线性回归是简单线性回归的扩展，允许基于多个自变量预测连续的因变量。在本章中，我们将深入探讨多元线性回归背后的数学原理，并探索其各种细微差别。\n\n\
    ### 模型公式\n\n多元线性回归模型可以用数学公式表示为：\n\n$$y = \\beta_0 + \\beta_1 x_1 + \\beta_2 x_2\
    \ + \\dots + \\beta_p x_p + \\epsilon$$\n\n其中$y$是因变量，$x_1, x_2, \\dots, x_p$是自变量，$\\\
    beta_0$是截距，$\\beta_1, \\beta_2, \\dots, \\beta_p$是系数，$p$是自变量的数量，$\\epsilon$是误差项。\n\
    \n### 普通最小二乘估计\n\n普通最小二乘（OLS）方法通常用于估计多元线性回归中的系数。目标是找到估计量$\\hat{\\beta} = (\\hat{\\\
    beta}_0, \\hat{\\beta}_1, \\dots, \\hat{\\beta}_p)$，使观测值和预测值之间的平方差之和最小化。这可以通过最小化残差平方和（RSS）来实现：\n\
    \n$$\\text{RSS} = \\sum_{i=1}^{n} (y_i - \\hat{y}_i)^2$$\n\n其中$n$是观测数量，$y_i$是因变量的观测值，$\\\
    hat{y}_i$是基于模型的预测值。\n\nOLS估计量$\\hat{\\beta}$可以通过求解正规方程得到：\n\n$$\\mathbf{X}^T \\\
    mathbf{X} \\hat{\\beta} = \\mathbf{X}^T \\mathbf{y}$$\n\n其中$\\mathbf{X}$是自变量的设计矩阵，维度为$n\
    \ \\times (p + 1)$，$\\mathbf{y}$是因变量观测值的向量，维度为$n \\times 1$。设计矩阵$\\mathbf{X}$增加了一列1以考虑截距项。最小二乘估计量由下式给出：\n\
    \n$$\\hat{\\beta} = (\\mathbf{X}^T \\mathbf{X})^{-1} \\mathbf{X}^T \\mathbf{y}$$\n\
    \n### 模型评估\n\n为了评估多元线性回归模型的拟合度，可以考虑各种指标。一个常见的度量是决定系数（$R^2$），它量化了因变量总变异性中被自变量解释的比例。$R^2$可以计算为：\n\
    \n$$R^2 = \\frac{\\text{TSS} - \\text{RSS}}{\\text{TSS}}$$\n\n其中TSS代表总平方和：\n\n\
    $$\\text{TSS} = \\sum_{i=1}^{n} (y_i - \\bar{y})^2$$\n\n$\\bar{y}$是因变量观测值的均值。$R^2$值越高，表明模型对数据的拟合越好。另一个需要考虑的指标是调整后的$R^2$，它考虑了自变量的数量和样本大小：\n\
    \n$$\\text{Adjusted } R^2 = 1 - (1 - R^2) \\frac{n - 1}{n - p - 1}$$\n\n其中$n$是样本大小，$p$是自变量的数量。\n\
    \n### Python实现\n\n在Python中，可以使用‘statsmodels’库执行多元线性回归。以下代码片段演示了如何拟合多元线性回归模型并获取系数、残差和$R^2$统计量：\n\
    \n```\nimport statsmodels.api as sm\n\n# 自变量\nX = np.array([[1, 3], [1, 5], [1,\
    \ 7], [1, 8], [1, 9],\n              [1, 10], [1, 11], [1, 14], [1, 15], [1, 17]])\n\
    \n# 因变量\ny = np.array([4, 7, 5, 12, 11, 13, 19, 20, 21, 25])\n\n# 拟合模型\nmodel\
    \ = sm.OLS(y, X)\nresults = model.fit()\n\n# 获取系数\ncoefficients = results.params\n\
    \n# 获取残差\nresiduals = results.resid\n\n# 获取R平方统计量\nR_squared = results.rsquared\n\
    ```\n\n在这段代码中，我们创建了一个矩阵$\\mathbf{X}$，它由增加了一列1的设计矩阵组成。因变量$\\mathbf{y}$被定义为numpy数组。然后，我们使用‘sm.OLS()’函数创建一个‘OLS’模型对象，并使用‘fit()’方法拟合模型。‘results’对象的‘params’属性提供估计的系数，‘resid’属性给出残差，‘rsquared’属性提供$R^2$统计量。\n\
    \n通过评估系数、残差和$R^2$，我们可以深入了解多元线性回归中自变量和因变量之间的关系。"

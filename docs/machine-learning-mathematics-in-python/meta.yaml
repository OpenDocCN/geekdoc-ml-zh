    # Support Vector Machines (SVM)


    Support Vector Machines (SVM) are powerful machine learning models that are widely
    used for classification and regression tasks. In this chapter, we will explore
    the mathematical foundations of SVM and understand how they work.


    # Margin and Hyperplanes


    In SVM, the goal is to find a hyperplane that separates the data points of different
    classes such that the margin, which is the distance between the hyperplane and
    the closest data points, is maximized. The hyperplane is defined as:


    ```

    $$f(\mathbf{x}) = \mathbf{w} \cdot \mathbf{x} + b = 0$$

    ```


    where $\mathbf{w}$ is the normal vector to the hyperplane and $b$ is the bias
    or intercept term.


    # 1 Margin Maximization


    To maximize the margin, SVM aims to solve the following optimization problem:


    ```

    $$\begin{aligned}

    \text{minimize}_{\mathbf{w}, b} \quad & \|\mathbf{w}\| \n\text{subject to} \quad
    & y_i(\mathbf{w} \cdot \mathbf{x}_i + b) \geq 1, \forall i

    \end{aligned}$$

    ```'
  merge: -1
  pgno: 90
- img_proc: true
  md: 'where $\mathbf{x}_i$ is a data point and $y_i$ is its corresponding class label.
    The inequality constraint ensures that all data points are correctly classified
    and lie on the correct side of the margin.


    # 2 Soft Margin SVM


    In many cases, the data may not be linearly separable. To handle such cases, a
    slack variable $\xi_i$ is introduced, allowing some data points to be misclassified
    or fall within the margin. This leads to the formulation of the soft margin SVM:


    $$\begin{aligned} \min_{\mathbf{w},b,\boldsymbol{\xi}} \quad & \frac{1}{2}\|\mathbf{w}\|^2
    + C \sum_{i=1}^{n} \xi_i \ \text{subject to} \quad & y_i(\mathbf{w} \cdot \mathbf{x}_i
    + b) \geq 1 - \xi_i, \forall i \ & \xi_i \geq 0, \forall i \end{aligned}$$


    where $C$ is the regularization parameter that controls the trade-off between
    maximizing the margin and minimizing the misclassification.


    # Kernel Trick


    The kernel trick is a fundamental concept in SVM that allows us to handle nonlinearly
    separable data by implicitly mapping the original input space into a higher-dimensional
    feature space. This is achieved by defining a kernel function $K(\mathbf{x}, \mathbf{x}'')$
    that computes the inner product between the feature vectors of two data points
    without explicitly computing the transformation.


    # 1 Commonly Used Kernels


    Some commonly used kernels in SVM include:


    +   - Linear Kernel: $K(\mathbf{x}, \mathbf{x}'') = \mathbf{x} \cdot \mathbf{x}''$

    - Polynomial Kernel: $K(\mathbf{x}, \mathbf{x}'') = (\gamma \mathbf{x} \cdot \mathbf{x}''
    + r)^d$

    - Gaussian RBF Kernel: $K(\mathbf{x}, \mathbf{x}'') = \exp(-\gamma \|\mathbf{x}
    - \mathbf{x}''\|^2)$


    Here, $\gamma$, $r$, and $d$ are kernel parameters.'
  merge: -1
  pgno: 91
- img_proc: true
  md: '# 2 Kernel Trick in Dual Formulation


    Using the kernel trick, the soft margin SVM problem can be rewritten in the dual
    form:


    $$\text{maximize}_{\alpha} \sum_{i=1}^{n} \alpha_i - \frac{1}{2} \sum_{i=1}^{n}
    \sum_{j=1}^{n} \alpha_i \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j)$$

    $$\text{subject to} \sum_{i=1}^{n} \alpha_i y_i = 0$$

    $$0 \le \alpha_i \le C, \forall i$$


    where $\boldsymbol{\alpha} = [\alpha_1, \alpha_2, \dots, \alpha_n]$ are the Lagrange
    multipliers associated with the constraints.



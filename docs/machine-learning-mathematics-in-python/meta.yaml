    maps states to actions, in order to maximize its cumulative discounted reward
    over time.'
  - '[PAGE 108]


    # Bellman Equations


    The Bellman equations are a set of mathematical equations that decompose the value
    function into more manageable sub-problems. These equations are central to reinforcement
    learning algorithms.


    # 1 Value function


    The value function $V^{\pi}(s)$ for a policy $\pi$ represents the expected cumulative
    discounted reward starting from a state $s$ and following policy $\pi$ thereafter.
    It can be expressed using the Bellman expectation equation:


    $$V^{\pi}(s) = \sum_{a \in A} \pi(a|s) \sum_{s'' \in S} P(s, a, s'') [R(s, a,
    s'') + \gamma V^{\pi}(s'')]$$


    # 2 Action-value function


    The action-value function $Q^{\pi}(s, a)$ for a policy $\pi$ represents the expected
    cumulative discounted reward starting from a state $s$, taking action $a$, and
    then following policy $\pi$ thereafter. It can be expressed using the Bellman
    expectation equation:


    $$Q^{\pi}(s, a) = \sum_{s'' \in S} P(s, a, s'') \left[ R(s, a, s'') + \gamma \sum_{a''
    \in A} \pi(a''|s'') Q^{\pi}(s'', a'') \right]$$


    # Policy and Value Iterations


    Policy iteration and value iteration are two fundamental algorithms used to solve
    the reinforcement learning problem.


    # 1 Policy Iteration


    Policy iteration is an iterative algorithm that alternates between policy evaluation
    and policy improvement until convergence. In each iteration, the value function
    is first updated using the Bellman expectation equation. Then, the policy is improved
    by acting greedily with respect to the current value function.'

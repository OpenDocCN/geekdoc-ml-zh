    # Chapter 7


    # Multiple Linear Regression


    # Introduction


    Multiple linear regression is an extension of simple linear regression that allows
    for the prediction of a continuous dependent variable based on multiple independent
    variables. In this chapter, we will delve into the mathematics behind multiple
    linear regression and explore its various nuances.


    # Model Formulation


    The multiple linear regression model can be represented mathematically as:


    $$y = \beta_0 + \beta_1 x_1 + \beta_2 x_2 + \dots + \beta_p x_p + \epsilon$$


    where $y$ is the dependent variable, $x_1, x_2, \dots, x_p$ are the independent
    variables, $\beta_0$ is the intercept, $\beta_1, \beta_2, \dots, \beta_p$ are
    the coefficients, $p$ is the number of independent variables, and $\epsilon$ is
    the error term.


    # Ordinary Least Squares Estimation


    The ordinary least squares (OLS) method is commonly used to estimate the coefficients
    in multiple linear regression. The goal is'
  - '[PAGE 47]


    to find the estimators $\hat{\beta} = (\hat{\beta}_0, \hat{\beta}_1, \dots, \hat{\beta}_p)$
    that minimize the sum of squared differences between the observed and predicted
    values. This can be achieved by minimizing the residual sum of squares (RSS):


    $$\text{RSS} = \sum_{i=1}^{n} (y_i - \hat{y}_i)^2$$


    where $n$ is the number of observations, $y_i$ is the observed value of the dependent
    variable, and $\hat{y}_i$ is the predicted value based on the model.


    The OLS estimators $\hat{\beta}$ can be obtained by solving the normal equations:


    $$\mathbf{X}^T \mathbf{X} \hat{\beta} = \mathbf{X}^T \mathbf{y}$$


    where $\mathbf{X}$ is the design matrix of independent variables with dimensions
    $n \times (p + 1)$, and $\mathbf{y}$ is the vector of observed values of the dependent
    variable with dimensions $n \times 1$. The design matrix $\mathbf{X}$ is augmented
    with a column of ones to account for the intercept term. The least squares estimators
    are given by:


    $$\hat{\beta} = (\mathbf{X}^T \mathbf{X})^{-1} \mathbf{X}^T \mathbf{y}$$


    # Model Evaluation


    To evaluate the fit of the multiple linear regression model, various metrics can
    be considered. One common measure is the coefficient of determination ($R^2$)
    which quantifies the proportion of the total variability in the dependent variable
    explained by the independent variables. $R^2$ can be calculated as:


    $$R^2 = \frac{\text{TSS} - \text{RSS}}{\text{TSS}}$$


    where TSS represents the total sum of squares:


    $$\text{TSS} = \sum_{i=1}^{n} (y_i - \bar{y})^2$$


    and $\bar{y}$ is the mean of the observed values of the dependent variable. A
    higher value of $R^2$ indicates a better fit of the model to the data. Another
    metric to consider is the adjusted $R^2$, which takes into account the number
    of independent variables and sample size:


    $$\text{Adjusted } R^2 = 1 - (1 - R^2) \frac{n - 1}{n - p - 1}$$'

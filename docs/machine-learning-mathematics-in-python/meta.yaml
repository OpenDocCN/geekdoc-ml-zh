    # The Expectation-Maximization Algorithm


    The Expectation-Maximization (EM) algorithm is an iterative algorithm used to
    estimate the parameters of models with latent variables. In the case of GMMs,
    EM is used to estimate the unknown model parameters $\theta$ given the observed
    data $\mathbf{X}$.

    The EM algorithm consists of two main steps: the E-step and the M-step.


    # 1 The E-step


    In the E-step, the posterior probabilities of the latent variables $\mathbf{Z}$
    are calculated given the current estimate of the model parameters $\theta^{(t)}$.


    $$\gamma_{ik}^{(t)} = \frac{\pi_k^{(t)} \mathcal{N}(\mathbf{x}_i | \mu_k^{(t)},
    \Sigma_k^{(t)})}{\sum_{j=1}^K \pi_j^{(t)} \mathcal{N}(\mathbf{x}_i | \mu_j^{(t)},
    \Sigma_j^{(t)})}$$


    where $\gamma_{ik}^{(t)}$ is the responsibility of the $k$-th component for the
    $i$-th data point under the model parameters $\theta^{(t)}$.


    # 2 The M-step


    In the M-step, the model parameters $\theta$ are updated by maximizing the expected
    complete log-likelihood with respect to $\theta$, using the responsibilities calculated
    in the E-step.'
  merge: -1
  pgno: 101
- img_proc: true
  md: '$$\boldsymbol{\mu}_k^{(t+1)} = \frac{1}{N_k} \sum_{i=1}^N \gamma_{ik}^{(t)}
    \mathbf{x}_i$$


    $$\boldsymbol{\Sigma}_k^{(t+1)} = \frac{1}{N_k} \sum_{i=1}^N \gamma_{ik}^{(t)}
    (\mathbf{x}_i - \boldsymbol{\mu}_k^{(t+1)})(\mathbf{x}_i - \boldsymbol{\mu}_k^{(t+1)})^T$$


    $$\pi_k^{(t+1)} = \frac{N_k}{N}$$


    where $N_k = \sum_{i=1}^N \gamma_{ik}^{(t)}$ is the effective number of data points
    assigned to the $k$-th component.


    # 3 Python Code


    ```

    # Perform the E-step: calculate the responsibilities

    responsibilities = gmm.predict_proba(X)


    # Perform the M-step: update the model parameters

    gmm.means_ = np.dot(responsibilities.T, X) / \n    np.sum(responsibilities, axis=0)[:,
    np.newaxis]

    gmm.covariances_ = np.einsum(''ijk,ikl->ijl'', \n    responsibilities * (X[:,
    :, np.newaxis] - \n    gmm.means_), \n    X[:, :, np.newaxis] - \n    gmm.means_)
    / \n    np.sum(responsibilities, \n    axis=0)[:, \n    np.newaxis, \n    np.newaxis]

    gmm.weights_ = np.mean(responsibilities, axis=0)

    ```


    # Convergence Criteria


    The EM algorithm iterates between the E-step and the M-step until convergence.
    One common convergence criterion is the change in the value of the log-likelihood
    between iterations. The algorithm terminates when the change in the log-likelihood
    falls below a predefined threshold.'

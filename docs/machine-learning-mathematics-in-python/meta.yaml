    \n- **单连接：** 两个簇之间的距离定义为两个簇中任意两点之间的最小距离。它倾向于创建长而分散的簇。\n- **全连接：** 两个簇之间的距离定义为两个簇中任意两点之间的最大距离。它倾向于创建紧凑的球形簇。\n\

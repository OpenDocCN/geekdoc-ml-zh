    # # Decision Trees


    # ## Introduction


    Decision trees are widely used in machine learning for both classification and
    regression tasks. They are intuitive and provide transparent decision-making processes.
    In this chapter, we will discuss the mathematical foundations of decision trees,
    explore the information gain criterion, and examine the algorithm''s computational
    complexity.


    # ## Entropy and Information Gain


    Entropy is a measure of impurity or unpredictability in a set of samples. In the
    context of decision trees, entropy is used to evaluate the homogeneity of a target
    variable within a node. Given a set of samples $S$, with $p(i)$ denoting the probability
    of class $i$ within $S$, the entropy $H(S)$ is calculated as:


    $$H(S) = -\sum_{i} p(i) \log_2 p(i)$$


    The information gain criterion is used to select the best feature for splitting
    the data. It measures the reduction in entropy achieved by splitting the data
    based on a specific feature. Given a feature $A$ with $v$ distinct values and
    a set of subsets $S_1, S_2, ..., S_v$, obtained by splitting the data based on
    $A$, the information gain $IG(A)$ is computed using the following equation:'
  merge: -1
  pgno: 83
- img_proc: true
  md: '$$IG(A) = H(S) - \sum_{i=1}^{v} \frac{|S_i|}{|S|} H(S_i)$$


    where $|S_i|$ and $|S|$ denote the number of samples in $S_i$ and $S$, respectively.


    # Decision Tree Algorithm


    The decision tree algorithm constructs a tree-like structure in which each internal
    node represents a test on a feature, each branch represents an outcome of the
    test, and each leaf node represents a class label. The algorithm follows these
    steps:


    +   1. **Step 1: Select Best Split**

    Choose the feature that maximizes the information gain or minimizes the Gini impurity
    to determine the best split.


    2. **Step 2: Assign Leaf Node or Recurse**

    If the stopping criteria are met (e.g., maximum depth or minimum number of samples),
    assign a leaf node with the majority class of the samples. Otherwise, split the
    data based on the selected feature and repeat the process recursively for each
    child node.


    # Computational Complexity


    The computational complexity of the decision tree algorithm depends on the number
    of samples $m$ and the number of features $n$ in the dataset. Let $f(n)$ denote
    the complexity of finding the best split at each node. The overall time complexity
    for building a decision tree is given by:


    $$T(m, n) = \text{depth} \times f(n)$$


    During prediction, the decision tree takes $O(\log m)$ time to traverse the tree
    and assign a class label to a new sample.'

    # Chapter 18


    ## Support Vector Machines (SVM)


    Support Vector Machines (SVM) are powerful machine learning models that are widely
    used for classification and regression tasks. In this chapter, we will explore
    the mathematical foundations of SVM and understand how they work.


    ## Margin and Hyperplanes


    In SVM, the goal is to find a hyperplane that separates the data points of different
    classes such that the margin, which is the distance between the hyperplane and
    the closest data points, is maximized. The hyperplane is defined as:


    $$f(\mathbf{x}) = \mathbf{w} \cdot \mathbf{x} + b = 0$$


    where $\mathbf{w}$ is the normal vector to the hyperplane and $b$ is the bias
    or intercept term.


    ### 1 Margin Maximization


    To maximize the margin, SVM aims to solve the following optimization problem:


    $$\begin{aligned}

    \text{minimize}_{\mathbf{w}, b} \quad & \|\mathbf{w}\| \\

    \text{subject to} \quad & y_i(\mathbf{w} \cdot \mathbf{x}_i + b) \geq 1, \forall
    i

    \end{aligned}$$


    where $\mathbf{x}_i$ is a data point and $y_i$ is its corresponding class label.
    The inequality constraint ensures that all data points are correctly classified
    and lie on the correct side of the margin.


    ### 2 Soft Margin SVM


    In many cases, the data may not be linearly separable. To handle such cases, a
    slack variable $\xi_i$ is introduced, allowing some data points to be misclassified
    or fall within the margin. This leads to the formulation of the soft margin SVM:


    $$\begin{aligned}

    \min_{\mathbf{w},b,\boldsymbol{\xi}} \quad & \frac{1}{2}\|\mathbf{w}\|^2 + C \sum_{i=1}^{n}
    \xi_i \\

    \text{subject to} \quad & y_i(\mathbf{w} \cdot \mathbf{x}_i + b) \geq 1 - \xi_i,
    \forall i \\

    & \xi_i \geq 0, \forall i

    \end{aligned}$$


    where $C$ is the regularization parameter that controls the trade-off between
    maximizing the margin and minimizing the misclassification.


    ## Kernel Trick


    The kernel trick is a fundamental concept in SVM that allows us to handle nonlinearly
    separable data by implicitly mapping the original input space into a higher-dimensional
    feature space. This is achieved by defining a kernel function $K(\mathbf{x}, \mathbf{x}'')$
    that computes the inner product between the feature vectors of two data points
    without explicitly computing the transformation.


    ### 1 Commonly Used Kernels


    Some commonly used kernels in SVM include:


    - Linear Kernel: $K(\mathbf{x}, \mathbf{x}'') = \mathbf{x} \cdot \mathbf{x}''$

    - Polynomial Kernel: $K(\mathbf{x}, \mathbf{x}'') = (\gamma \mathbf{x} \cdot \mathbf{x}''
    + r)^d$

    - Gaussian RBF Kernel: $K(\mathbf{x}, \mathbf{x}'') = \exp(-\gamma \|\mathbf{x}
    - \mathbf{x}''\|^2)$


    Here, $\gamma$, $r$, and $d$ are kernel parameters.


    ### 2 Kernel Trick in Dual Formulation


    Using the kernel trick, the soft margin SVM problem can be rewritten in the dual
    form:


    $$\text{maximize}_{\alpha} \sum_{i=1}^{n} \alpha_i - \frac{1}{2} \sum_{i=1}^{n}
    \sum_{j=1}^{n} \alpha_i \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j)$$

    $$\text{subject to} \sum_{i=1}^{n} \alpha_i y_i = 0$$

    $$0 \le \alpha_i \le C, \forall i$$


    where $\boldsymbol{\alpha} = [\alpha_1, \alpha_2, \dots, \alpha_n]$ are the Lagrange
    multipliers associated with the constraints.


    ## Python Code


    Let''s illustrate the usage of the SVM classifier in scikit-learn with a Python
    code snippet:


    ```python

    from sklearn.svm import SVC


    # Create an SVM classifier with a radial basis function (RBF) kernel

    svm_classifier = SVC(kernel=''rbf'')


    # Fit the classifier to the training data

    svm_classifier.fit(X_train, y_train)


    # Predict class labels for the test data

    y_pred = svm_classifier.predict(X_test)

    ```


    In this example, `X_train` and `y_train` represent the training features and labels,
    respectively, while `X_test` represents the test features.


    ### 1 Code Explanation


    - Line 3: Create an SVM classifier using the SVC() class from scikit-learn. The
    `kernel=''rbf''` parameter specifies the radial basis function (RBF) kernel, which
    is commonly used for SVM classification tasks.

    - Line 6: Fit the SVM classifier to the training data using the `fit()` method.
    The algorithm finds the optimal separating hyperplane that maximizes the margin.

    - Line 9: Predict class labels for the test data using the `predict()` method.
    The SVM classifier uses the learned model to make predictions for unseen data
    points.


    This code snippet demonstrates the usage of the SVM classifier in scikit-learn
    for classification tasks.


    # Chapter 19


    ## Principal Component Analysis (PCA)


    ## Covariance Matrix


    The covariance matrix provides important information about the relationships between
    different features in a dataset. Given a data matrix $\mathbf{X} \in \mathbb{R}^{n
    \times p}$, where each row represents a data point and each column represents
    a feature, the covariance matrix $\mathbf{\Sigma}$ is defined as:


    $$\mathbf{\Sigma} = \frac{1}{n} (\mathbf{X} - \mu)^T (\mathbf{X} - \mu)$$


    where $\mu$ is the mean vector of $\mathbf{X}$, obtained by subtracting the mean
    of each column from the respective column.


    ### 1 Python Code


    ```python

    import numpy as np


    # Calculate the covariance matrix

    cov_matrix = np.cov(X.T)

    ```


    ## Eigen Decomposition


    Eigen decomposition is a key step in Principal Component Analysis (PCA) and is
    used to obtain the principal components of a dataset.


    The eigen decomposition of the covariance matrix $\Sigma$ is given by:


    $$\Sigma = \mathbf{V}\Lambda\mathbf{V}^T$$


    where $\mathbf{V}$ is a matrix whose columns are the eigenvectors of $\Sigma$,
    and $\Lambda$ is a diagonal matrix containing the corresponding eigenvalues.


    ### 1 Python Code


    ```python

    eigenvals, eigenvects = np.linalg.eig(cov_matrix)

    ```


    ## Dimensionality Reduction


    PCA allows for dimensionality reduction by selecting a subset of the principal
    components. The principal components of a dataset are the eigenvectors of the
    covariance matrix, ordered by their corresponding eigenvalues in descending order.
    By selecting the first $k$ principal components, we obtain a lower-dimensional
    representation of the data.


    ### 1 Python Code


    ```python

    from sklearn.decomposition import PCA


    # Create a PCA instance and specify the desired

    # number of components

    pca = PCA(n_components=k)


    # Fit the PCA model to the data

    pca.fit(X)


    # Transform the data to the lower-dimensional space

    X_reduced = pca.transform(X)

    ```'

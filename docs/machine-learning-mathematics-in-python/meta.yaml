    # Chapter 33


    # Regularization Techniques


    # Introduction


    In the field of machine learning, regularization techniques play a vital role
    in preventing overfitting and improving the generalization performance of models.
    Overfitting occurs when a model becomes too complex and starts to fit the noise
    in the training data, resulting in poor performance on new, unseen data. Regularization
    methods aim to address this issue by adding a penalty term to the model''s objective
    function, discouraging overly complex solutions and promoting simpler ones.


    This chapter focuses on discussing various regularization techniques employed
    in machine learning, including L1 and L2 regularization, dropout, and batch normalization.
    These techniques aid in optimizing model performance and mitigating the risk of
    overfitting on training data.


    # L1 (Lasso) and L2 (Ridge) Regularization


    L1 and L2 regularization are two widely used techniques that modify the cost or
    loss function of a machine learning model by adding a penalty term. Both these
    techniques are commonly applied to linear and logistic regression models.'
  - '[PAGE 145]


    # 1 L1 Regularization (Lasso)


    L1 regularization, also known as Lasso regularization, adds the sum of the absolute
    values of the model''s coefficients multiplied by a regularization parameter,
    λ, to the objective function. The objective function with L1 regularization is
    given as:


    Objective function = Loss function + $\lambda \sum_{i=1}^{n} |\theta_i|$


    where $\theta_i$ represents the $i$th coefficient of the model and $\lambda$ controls
    the strength of the regularization.


    L1 regularization acts as a feature selector by encouraging sparsity in the model,
    i.e., driving some coefficients to zero and eliminating the corresponding features
    from the model.


    # 2 L2 Regularization (Ridge)


    L2 regularization, also known as Ridge regularization, adds the sum of the squared
    values of the model''s coefficients multiplied by a regularization parameter,
    λ, to the objective function. The objective function with L2 regularization is
    given as:


    Objective function = Loss function + $\lambda \sum_{i=1}^{n} \theta_i^2$


    Similar to L1 regularization, $\theta_i$ represents the $i$th coefficient of the
    model, and $\lambda$ controls the strength of the regularization.


    L2 regularization shrinks the coefficients towards zero, but does not drive them
    to exactly zero. This encourages co-adaptation of features within the model, leading
    to better generalization performance.


    # Dropout


    Dropout is a regularization technique that combats overfitting by randomly dropping
    out (setting to zero) a fraction of the input units or nodes during training.
    This prevents the model from relying too heavily on individual nodes and encourages
    the network to learn more robust and generalized features.



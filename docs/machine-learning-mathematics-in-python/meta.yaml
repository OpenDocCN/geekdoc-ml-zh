    # Chapter 15: K-Nearest Neighbors (K-NN)


    ## Introduction


    The K-Nearest Neighbors (K-NN) algorithm is a non-parametric classification algorithm
    that is widely used in machine learning. At its core, K-NN classifies an input
    sample by finding the K nearest neighbors from the training data and assigns a
    label based on the majority vote or weighted vote of the neighbors. In this chapter,
    we will delve into the mathematical foundations of the K-NN algorithm, discuss
    the distance metrics used to measure similarity, and explore the algorithm''s
    computational complexity.


    ## Distance Metrics


    The choice of distance metric plays a crucial role in the K-NN algorithm as it
    determines how similarity is measured between samples. Common distance metrics
    include Euclidean distance, Manhattan distance, and Minkowski distance. For a
    given feature vector $\mathbf{x} = (x_1, x_2, ..., x_n)$ and $\mathbf{y} = (y_1,
    y_2, ..., y_n)$, these distance metrics can be formally defined as follows:


    ### 1. Euclidean Distance


    The Euclidean distance between $\mathbf{x}$ and $\mathbf{y}$ is given by the following
    formula:


    $$\text{Euclidean}(\mathbf{x}, \mathbf{y}) = \sqrt{\sum_{i=1}^{n} (x_i - y_i)^2}
    \quad (15.1)$$


    ### 2. Manhattan Distance


    The Manhattan distance between $\mathbf{x}$ and $\mathbf{y}$ is given by the following
    formula:


    $$\text{Manhattan}(\mathbf{x}, \mathbf{y}) = \sum_{i=1}^{n} |x_i - y_i| \quad
    (15.2)$$


    ### 3. Minkowski Distance


    The Minkowski distance between $\mathbf{x}$ and $\mathbf{y}$ is a generalized
    form that includes both Euclidean and Manhattan distances. It is defined as:


    $$\text{Minkowski}(\mathbf{x}, \mathbf{y}) = \left( \sum_{i=1}^{n} |x_i - y_i|^p
    \right)^{\frac{1}{p}} \quad (15.3)$$


    where $p$ is a parameter that determines the form of the distance metric. When
    $p = 1$, the Minkowski distance is equivalent to the Manhattan distance, and when
    $p = 2$, it reduces to the Euclidean distance.


    ## K-NN Algorithm


    The K-NN algorithm assigns a class label to an input sample by considering the
    labels of its K nearest neighbors from the training data. The algorithm consists
    of the following steps:


    ### 1. Step 1: Select K


    Choose a positive integer K, which corresponds to the number of nearest neighbors
    to consider.


    ### 2. Step 2: Calculate Distances


    Calculate the distance between the input sample $\mathbf{x}$ and each training
    sample $\mathbf{x}_i$ using a distance metric, such as Euclidean distance or Manhattan
    distance.


    ### 3. Step 3: Find K Nearest Neighbors


    Select the K training samples with the smallest distances to the input sample.


    ### 4. Step 4: Assign Class Label


    Assign the class label to the input sample based on the majority vote or weighted
    vote of the K nearest neighbors. If majority voting is used, the class label with
    the highest count among the K neighbors is assigned. If weighted voting is used,
    the class label is assigned based on a weighted sum of the votes, where the weight
    for each neighbor is determined by its inverse distance to the input sample.


    The choice of K influences the bias-variance trade-off of the K-NN algorithm.
    Smaller values of K tend to have low bias but high variance, resulting in a more
    flexible decision boundary. On the other hand, larger values of K have higher
    bias but lower variance, leading to a smoother decision boundary.


    ## Computational Complexity


    The computational complexity of the K-NN algorithm is primarily determined by
    the calculation of distances between the input sample and all training samples.
    Assuming there are $m$ training samples and $n$ features, calculating the distance
    between two samples has a time complexity of $O(n)$. Therefore, the overall time
    complexity of the K-NN algorithm for a single prediction is $O(mn)$.


    During prediction, the algorithm needs to compute distances for all $m$ training
    samples. As a result, the overall time complexity of predicting the class labels
    for all test samples is $O(kmn)$, where $k$ is the number of test samples.


    It is worth noting that the K-NN algorithm can be computationally demanding for
    large datasets or high-dimensional feature spaces since it requires computing
    distances between each pair of samples.'

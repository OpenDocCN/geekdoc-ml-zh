  md: '# Step 2: Iteration


    Iteratively update the values of $\mathbf{x}$ until convergence is reached. The
    update rule is given by:


    $$\mathbf{x}^{(t+1)} = \mathbf{x}^{(t)} - \alpha \nabla f(\mathbf{x}^{(t)}) \quad
    (9.1)$$


    where $\alpha$ is the learning rate, $t$ represents the iteration number, and
    $\nabla f(\mathbf{x}^{(t)})$ denotes the gradient of $f$ evaluated at $\mathbf{x}^{(t)}$.


    # Step 3: Convergence Check


    Repeat Step 2 until a stopping criterion is met. This criterion can be the maximum
    number of iterations or reaching a desired level of precision.


    # Stochastic Gradient Descent


    Stochastic gradient descent (SGD) is a variant of gradient descent that is commonly
    used in large-scale machine learning problems. Rather than computing the gradient
    of the entire training dataset at each iteration, SGD approximates the gradient
    using a single or a small batch of randomly sampled training examples.


    The update rule for SGD can be written as follows:


    $$\mathbf{x}^{(t+1)} = \mathbf{x}^{(t)} - \alpha \nabla f_i(\mathbf{x}^{(t)})
    \quad (9.2)$$


    where $f_i(\mathbf{x}^{(t)})$ represents the loss function computed on a randomly
    selected training example.



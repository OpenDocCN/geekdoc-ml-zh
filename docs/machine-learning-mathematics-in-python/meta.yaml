    # Ordinary Least Squares (OLS)


    # Introduction


    In this chapter, we focus on ordinary least squares (OLS), a widely used method
    for estimating the parameters in linear regression models. We begin by providing
    a theoretical background for OLS, followed by the derivation of the estimator
    and its properties.


    # Derivation and Explanation


    Consider a linear regression model with $n$ observations and $p$ predictors, represented
    by the following equations:


    ```

    $$\mathbf{y} = \mathbf{X}\beta + \epsilon$$


    $$\mathbf{y} = \begin{bmatrix} y_1 \ y_2 \ \vdots \ y_n \end{bmatrix}, \mathbf{X}
    = \begin{bmatrix} 1 & x_{11} & \cdots & x_{1p} \ 1 & x_{21} & \cdots & x_{2p}
    \ \vdots & \vdots & \ddots & \vdots \ 1 & x_{n1} & \cdots & x_{np} \end{bmatrix},
    \beta = \begin{bmatrix} \beta_0 \ \beta_1 \ \vdots \ \beta_p \end{bmatrix}, \epsilon
    = \begin{bmatrix} \epsilon_1 \ \epsilon_2 \ \vdots \ \epsilon_n \end{bmatrix}$$

    ```


    Here, $\mathbf{y}$ represents the response variable, $\mathbf{X}$ denotes the
    matrix of predictor variables (including an intercept term), $\beta$ represents'
  merge: -1
  pgno: 62
- img_proc: true
  md: 'the vector of unknown parameters, and $\epsilon$ represents the vector of error
    terms.


    The ordinary least squares (OLS) estimator $\hat{\beta}$ is obtained by minimizing
    the sum of squared residuals:


    $$\hat{\beta} = \arg \min_{\beta} \|\mathbf{y} - \mathbf{X}\beta\|^2 \quad (11.3)$$


    To find the minimum, we take the derivative with respect to $\beta$:


    $$\frac{\partial}{\partial \beta} (\mathbf{y} - \mathbf{X}\beta)^T (\mathbf{y}
    - \mathbf{X}\beta) = 0 \quad (11.4)$$


    Expanding and simplifying, we obtain the normal equations:


    $$\mathbf{X}^T\mathbf{X}\beta = \mathbf{X}^T\mathbf{y} \quad (11.5)$$


    Solving this equation for $\beta$, we find the OLS estimator:


    $$\hat{\beta} = (\mathbf{X}^T\mathbf{X})^{-1}\mathbf{X}^T\mathbf{y} \quad (11.6)$$


    This estimator minimizes the sum of squared residuals and provides the best linear
    unbiased estimates of the parameters in the model.


    # Gauss-Markov Theorem


    The Gauss-Markov theorem states that under the assumptions of the linear regression
    model (linearity, independence, and homoscedasticity of residuals, and absence
    of multicollinearity), the OLS estimator $\hat{\beta}$ is the Best Linear Unbiased
    Estimator (BLUE) of the true parameter vector $\beta$.


    The BLUE property means that among all linear unbiased estimators, the OLS estimator
    has the smallest variance. This result holds even if the error terms are not normally
    distributed.


    # Applications in Regression Analysis


    OLS regression is extensively used in various fields, including economics, social
    sciences, finance, and engineering. It allows us to estimate the relationships
    between predictor variables and a response variable, make predictions, and infer
    the significance of the predictors.'

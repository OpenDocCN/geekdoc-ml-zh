    ## Calculus for Machine Learning


    ### Derivatives and Integrals


    In this section, we will review the concepts of derivatives and integrals, which
    form the basis of calculus. These concepts are essential in machine learning for
    optimizing models and understanding the behavior of functions.


    ### 1 Derivatives


    The derivative of a function measures how the function changes as its input changes.
    Geometrically, it represents the slope of the tangent line to the curve at a given
    point. Mathematically, the derivative of a function $f(x)$ at a point $x$ is defined
    as:


    $$f''(x) = \lim_{h \to 0} \frac{f(x+h) - f(x)}{h}$$


    To compute derivatives in Python, we can use the SymPy library. The following
    code snippet demonstrates how to calculate the derivative of a function:


    ```python

    import sympy as sp


    x = sp.symbols(''x'')  # Define the variable

    f = x**2 + 2*x + 1  # Define the function

    derivative = sp.diff(f, x)  # Calculate the derivative

    print("Derivative of f(x):")

    print(derivative)

    ```


    The code above defines the function $f(x) = x^2 + 2x + 1$ and calculates its derivative
    with respect to $x$. The result is $f''(x) = 2x + 2$.


    ### 2 Integrals


    The integral of a function measures the area under the curve defined by the function.
    It is the reverse process of differentiation. Mathematically, the integral of
    a function $f(x)$ over an interval $[a, b]$ is denoted as:


    $$\int_a^b f(x) dx$$


    To compute integrals in Python, we can again use the SymPy library. The following
    code snippet demonstrates how to calculate the integral of a function:


    ```python

    import sympy as sp


    x = sp.symbols(''x'')  # Define the variable

    f = x**2 + 2*x + 1  # Define the function


    integral = sp.integrate(f, (x, 0, 1))  # Calculate the integral from 0 to 1


    print("Integral of f(x) from 0 to 1:")

    print(integral)

    ```


    The code above defines the function $f(x) = x^2 + 2x + 1$ and calculates its integral
    from 0 to 1. The result is $\int_0^1 (x^2+2x+1) dx = \frac{7}{3}$.


    ### 3 Partial Derivatives


    In machine learning, it is common to deal with functions that depend on multiple
    variables. In such cases, we can compute partial derivatives to measure the rate
    of change of the function with respect to each variable individually.


    The partial derivative of a function $f(x, y)$ with respect to $x$ is denoted
    as $\frac{\partial f}{\partial x}$, and it measures how $f$ changes as $x$ changes
    while keeping $y$ constant. Similarly, the partial derivative of $f$ with respect
    to $y$ is denoted as $\frac{\partial f}{\partial y}$.


    To compute partial derivatives using SymPy, we can modify our previous code snippet
    as follows:


    ```python

    import sympy as sp


    x, y = sp.symbols(''x y'')  # Define the variables

    f = x**2 + 2*x*y + y**2  # Define the function


    partial_x = sp.diff(f, x)  # Calculate the partial derivative with respect to
    x

    partial_y = sp.diff(f, y)  # Calculate the partial derivative with respect to
    y


    print("Partial derivative of f with respect to x:")

    print(partial_x)


    print("Partial derivative of f with respect to y:")

    print(partial_y)

    ```


    In this code, we define the function $f(x, y) = x^2 + 2xy + y^2$ and calculate
    its partial derivatives with respect to $x$ and $y$.


    ### Gradient and Hessian


    The gradient and Hessian matrix are important concepts in calculus, particularly
    in optimization. They provide information about the rate of change and curvature
    of a function, respectively.


    #### 1 Gradient


    The gradient of a function $f(\mathbf{x})$ is a vector that consists of the partial
    derivatives of $f$ with respect to each variable. Mathematically, the gradient
    is defined as:


    $$\nabla f(\mathbf{x}) = \left[ \frac{\partial f}{\partial x_1}, \frac{\partial
    f}{\partial x_2}, \dots, \frac{\partial f}{\partial x_n} \right]^T$$


    The gradient provides the direction of the steepest ascent of the function. By
    taking steps in the opposite direction of the gradient, we can iteratively approach
    the minimum of a function.


    In Python, we can compute the gradient using SymPy:


    ```python

    import sympy as sp


    x, y = sp.symbols(''x y'')  # Define the variables

    f = x**2 + 2*y**2 + 3*x*y  # Define the function


    gradient = [sp.diff(f, var) for var in (x, y)]  # Calculate the gradient


    print("Gradient of f(x, y):")

    print(gradient)

    ```


    The code above defines the function $f(x, y) = x^2 + 2y^2 + 3xy$ and computes
    its gradient with respect to $x$ and $y$.


    #### 2 Hessian


    The Hessian matrix of a function $f(\mathbf{x})$ is a square matrix that consists
    of the second-order partial derivatives of $f$. The $(i, j)$-th element of the
    Hessian matrix is defined as:


    $$\frac{\partial^2 f}{\partial x_i \partial x_j}$$


    The Hessian matrix provides information about the curvature and the rate of change
    of the gradient. By analyzing the eigenvalues of the Hessian matrix, we can determine
    whether a given point is a maximum, minimum, or saddle point.


    To compute the Hessian matrix using SymPy, we can modify our previous code snippet
    as follows:


    ```python

    import sympy as sp


    x, y = sp.symbols(''x y'')  # Define the variables

    f = x**2 + 2*y**2 + 3*x*y  # Define the function


    hessian = sp.hessian(f, (x, y))  # Calculate the Hessian matrix

    print("Hessian Matrix of f(x, y):")

    print(hessian)

    ```


    In this code, we define the function $f(x, y) = x^2 + 2y^2 + 3xy$ and compute
    its Hessian matrix.


    ### Conclusion


    In this chapter, we reviewed the concepts of derivatives and integrals, which
    are fundamental in calculus. We also discussed partial derivatives and their applications
    in multivariable functions. Finally, we introduced the gradient and Hessian matrix,
    which provide valuable information about the behavior of functions. Understanding
    these concepts is crucial for optimizing machine learning models and comprehending
    the underlying mathematics.


    ## Chapter 4


    ## Probability Theory


    ### Basic Probability Rules


    In this chapter, we will explore the fundamental principles of probability theory.
    Probability theory is a branch of mathematics that deals with uncertainty and
    randomness. It provides a framework for quantifying and analyzing the likelihood
    of events.


    ### 1 Sample Space and Events


    We begin by defining the concepts of the sample space and events. The sample space,
    denoted by $\Omega$, is the set of all possible outcomes of an experiment. An
    event is a subset of the sample space.


    For example, consider the rolling of a fair six-sided die. The sample space is
    $\Omega = \{1, 2, 3, 4, 5, 6\}$, and an event can be, for instance, "rolling an
    even number", which corresponds to the subset $\{2, 4, 6\}$.


    ### 2 Probability Axioms


    Probability is defined as a function that assigns a numerical value to each event.
    It satisfies the following axioms:


    1.  **Non-negativity**: For any event $A$, the probability $P(A)$ is greater than
    or equal to zero: $P(A) \geq 0$.

    2.  **Normalization**: The probability of the entire sample space is equal to
    one: $P(\Omega) = 1$.

    3.  **Additivity**: For any collection of mutually exclusive events $A_1, A_2,
    \dots$, the probability of their union is equal to the sum of their individual
    probabilities: $P(A_1 \cup A_2 \cup \dots) = P(A_1) + P(A_2) + \dots$


    These axioms form the foundation of probability theory, allowing us to assign
    probabilities and reason about uncertain events.


    ### 3 Conditional Probability


    Conditional probability considers the probability of an event occurring given
    that another event has already occurred. The conditional probability of event
    $A$ given event $B$, denoted by $P(A|B)$, is defined as:


    $$P(A|B) = \frac{P(A \cap B)}{P(B)}$$


    where $P(A \cap B)$ represents the probability of both $A$ and $B$ occurring.


    ### 4 Independence



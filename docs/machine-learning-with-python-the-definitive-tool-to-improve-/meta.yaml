    In other words, you can limit the decision tree with higher values.

    2.  min_samples_leaf: This is the parameter you need to tweak to determine how
    many observations are required by a node, or in other words, a leaf. The overfitting
    control mechanism works the same way as for the sample split parameter.

    3.  max_features: Adjust this parameter to control the features that are selected
    randomly. These features are the ones that are used to perform the best split.
    To determine the most efficient value, you should calculate the square root of
    the total features. Just keep in mind that the higher value tends to lead to the
    overfitting problem we are trying to fix in this case. Therefore, you should experiment
    with the value you set. Furthermore, not all cases are the same. Sometimes a higher
    value will work without resulting in overfitting.

    4.  max_depth: Finally, we have the depth parameter, which consists of the decision
    tree''s depth value. To limit the overfitting problem, however, we are only interested
    in the maximum depth value. Take note that a high value translates to many splits,
    therefore a high amount of information. By tweaking this value, you will control
    how the training model learns the sample''s connections.


    Modifying these parameters is only one aspect of gaining control of our decision
    trees to reduce overfitting, boost performance, and accuracy. The following step
    after applying these limits is to prune the trees.



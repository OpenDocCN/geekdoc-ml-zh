    # Chapter 6. Combining Different Models for Ensemble Learning


    When making important decisions, we generally prefer to collate multiple opinions
    instead of listening to a single voice or the first person to add their opinion.
    Similarly, it’s essential to consider and trial more than one algorithm to find
    your data''s best prediction. In advanced machine learning, it can be advantageous
    to combine models using ensemble modeling, which amalgamates outputs to build
    a unified prediction model. By combining the output of different models (instead
    of relying on a single estimate), ensemble modeling helps build a consensus on
    the data''s meaning. Aggregated estimates are also generally more accurate than
    any one technique. It’s vital, though, for the ensemble models to display variation
    to avoid mishandling the same errors.


    In classification, multiple models are consolidated into a single prediction using
    a voting system based on frequency or numeric averaging in regression problems.
    Ensemble models can also be divided into sequential or parallel and homogenous
    or heterogeneous.


    Let’s start by looking at sequential and parallel models. In the former''s case,
    the model’s prediction error is reduced by adding weights to classifiers that
    previously misclassified data. Gradient boosting and AdaBoost (designed for classification
    problems) are both examples of sequential models. Conversely, parallel ensemble
    models work concurrently and reduce error by averaging. Random forests are an
    example of this technique.


    Ensemble models can be generated using a single technique with numerous variations,
    known as a homogeneous ensemble, or through different techniques, known as a heterogeneous
    ensemble. An example of a homogeneous ensemble model would be multiple decision
    trees to form a single prediction (i.e., bagging). Meanwhile,'
- md: 'an example of a heterogeneous ensemble would be the usage of k-means clustering
    or a neural network in collaboration with a decision tree algorithm.


    Naturally, it’s crucial to select techniques that complement each other. For instance,
    neural networks require complete data for analysis, whereas decision trees are
    competent at handling missing values. Together, these two techniques provide added
    benefit over a homogeneous model. The neural network accurately predicts the majority
    of instances where a value is provided. The decision tree ensures no “null” results
    that would otherwise materialize from missing values using a neural network.


    While an ensemble model''s performance outperforms a single algorithm in most
    cases, the degree of model complexity and sophistication can pose a potential
    drawback. An ensemble model triggers the same trade-off in benefits as a single
    decision tree and a collection of trees. The transparency and ease of interpretation
    of, say, decision trees are sacrificed for the accuracy of a more complex algorithm
    such as random forests, bagging, or boosting. The model''s performance will win
    out in most cases, but interpretability is a crucial factor to consider when choosing
    the right algorithm(s) for your data.


    In terms of selecting a suitable ensemble modeling technique, there are four main
    methods: bagging, boosting, a bucket of models, and stacking.


    A bucket of models trains multiple different algorithmic models using the same
    training data as a heterogeneous ensemble technique. It then picks the one that
    performed most accurately on the test data.


    Bagging, as we know, is an example of a parallel model averaging using a homogenous
    ensemble, which draws upon randomly drawn data and combines predictions to design
    a unified model.


    Boosting is a popular alternative technique that is still a homogenous ensemble
    but addresses error and data misclassified by the previous iteration to produce
    a sequential model. Gradient boosting and AdaBoost are both examples of boosting
    algorithms.


    Stacking runs multiple models simultaneously on the data and combines those results
    to produce a final model. Unlike boosting and bagging, stacking usually combines
    outputs from different algorithms (heterogenous) rather than altering the same
    algorithm''s hyperparameters (homogenous). Also, rather than assigning equal trust
    to each model using averaging or voting, stacking attempts to identify, and emphasize
    well-performing models. This is achieved by smoothing out the error rate of models
    at the base level (known as level-0) using a weighting system before pushing those
    outputs to the level-1 model. They are combined and consolidated into a final
    prediction.


    ![](img/146e392d749d280bb2ac2d7c77d32d47_51_0.png)


    While this technique is sometimes used in industry, the gains of using a stacking
    technique are marginal in line with the complexity level, and organizations usually
    opt for the ease and efficiency of boosting or bagging. However, stacking is a
    go-to technique for machine learning competitions like the Kaggle Challenges and
    the Netflix Prize. The Netflix competition, held between 2006 and 2009, offered
    a prize for a machine learning model that could significantly improve Netflix''s
    content recommender system. From the team BellKor''s Pragmatic Chaos, one of the
    winning techniques adopted linear stacking that blended predictions from hundreds
    of different models using different algorithms.


    ## Chapter 7. Applying Machine Learning to Sentiments Analysis


    Natural Language Processing (NLP) is a widely used field within Artificial Intelligence,
    which mainly involves the interactions between the human language and the computer.
    You can find its applications in a large variety of areas such as Sentiment analysis,
    Spam detecting, POS (Part-Of-Speech) Tagging, Text summarization, Language translation,
    Chatbots, and so on.


    ### 1. How Would you Explain NLP to a Layman? Why Is it Difficult to Implement?


    NLP stands for Natural Language Processing, the ability of a computer program
    to understand the human language. It is an extremely challenging field for obvious
    reasons. NLP requires a computer to understand what humans speak. But human speech
    is very often not precise. Humans use slang, pronounce the words differently,
    and have the context in their sentences, which is very hard for a computer to
    process correctly.


    ### 2. What Is the Use of NLP in Machine Learning?


    At present, NLP is based on Deep Learning. Deep Learning algorithms are a subset
    of Machine Learning, which needs a large amount of data to learn high-level features
    from data independently. NLP also works on the same approach, uses deep learning
    techniques to learn human language, and improve upon itself.


    ### 3. What Are the Different Steps in Performing Text Classification?


    Text classification is an NLP task used to classify text documents into one or
    more categories. Classifying whether an email is spam or not, analyzing a person''s
    sentiments from his post, etc., are text classification problems.


    A Text classification pipeline involves the following steps in order:


    - A. Text cleaning

    - B. Text annotation to create the features

    - C. Converting those features into actual predictors

    - D. Using the predictors to train the model

    - E. Fine-tune the model to improve its accuracy.


    ### 4. What Do you Understand by Keyword Normalization? Why Is it Needed?


    Keyword normalization, also known as text normalization, is a crucial step in
    NLP. It is used to transform the keyword into its canonical form, making it easier
    to process. It removes stop words such as punctuation marks, words like "a," "an,"
    "the" because these words generally do not carry any weight. After that, it converts
    the keywords into their standard forms, which improves text matching.


    For instance, reducing all words to lower cases, converting all tenses to simple
    present tense. So, if you have "decoration" in one document and "Decorated" in
    the other, then both of them would be indexed as "decorate." Now, you can easily
    apply a text-matching algorithm on these documents, and a query containing the
    keyword "decorates" would match with both of the documents. Keyword normalization
    is an excellent means of reducing dimensionality.


    ### 5. Tell me about Part-Of-Speech (POS) Tagging.


    Part-of-speech tagging is a process of marking the words in a given text as a
    part of speech, such as nouns, prepositions, adjectives, verbs, etc. It is an
    extremely challenging task because of its complexity and because the same word
    could represent a different part of speech in different sentences.


    There are generally two techniques used to develop POS tagging algorithms. The
    first technique is stochastic, which assumes that each word is known and can have
    a finite set of tags that are learned during training. The second technique is
    rule-based tagging, which uses contextual information to tag each word.


    ### 6. Have you Heard of the Dependency Parsing Algorithm?


    Dependency Parsing algorithm is a grammar-based text parsing technique used to
    detect noun phrases, noun phrases, subjects, and objects in the text. "Dependency"
    implies the relations between the words in a sentence. There are various methods
    to parse a sentence and analyze its grammatical structure. Some of the standard
    methods include Shift-Reduce and Maximum Spanning Tree.


    ### 7. Explain the Vector Space Model and its Use.


    Vector Space Model is an algebraic model used to represent an object as a vector
    of identifiers. Each object (such as a text document) is written as a vector of
    terms (words) present in it with their weights.


    For instance, you have a document "d" with the text "This is an amazing journal
    for the interview preparation."


    The corresponding vector for this document is:


    There exist many ways to calculate these weights. They can be as simple as just
    the frequency (count) of the words in a document. Similarly, any query is also
    written in the same fashion. The vector operations are used to compare the query
    with the documents to find the most relevant documents that satisfy the query.


    Vector Space Model is used extensively in the fields of Information Retrieval
    and Indexing. It provides a structure to the unstructured datasets, thereby making
    it easier to interpret and analyze them.



    ### 2. 大数据分析


    许多公司花费时间收集所谓的“大数据”，现在他们必须找到一种方法，在短时间内对这些数据进行分类和学习。这些公司可以利用这些数据来更多地了解客户如何消费，甚至帮助他们做出关于未来的重要决策。如果我们让人手动完成这项工作，那将花费太长时间。但有了机器学习，我们就能完成所有工作。医疗领域、选举活动甚至零售商店等选项已经开始转向机器学习以获得这些好处。



    Machine Learning to figure out what your target audience will respond to, and
    you can make sure that the products you are releasing work for what the customer
    wants.


    The medical field is always busy, and it is believed that a lot of the current
    job openings are going to be left unfilled. Even a regular doctor with no specialties
    will need to deal with lots of patients throughout the day. Keeping up with all
    of this can be a hassle. But with the help of Machine learning, we can create
    a model that can look at images and recognize when something is wrong or not.
    This can save doctors a lot of time, hassle, and can make them more efficient
    at their jobs.


    This is just one area where Machine learning will be able to help out with the
    medical field. It can assist with surgeries, take notes for a doctor, look for
    things in x-rays and other imaging, and even help with front desk operations.


    ## 3. Can Make Data Entry Easier


    There are times when we need to make sure that all the information is entered
    into a database efficiently and quickly. If there is a ton of data to sort through
    and short on time, this can seem like an impossible task. But with Machine Learning
    and the tools that come with it, we can get it all done in no time.


    ## 4. Helps with Spam Detection


    Thanks to some of the learning processes that come with Machine Learning, we find
    that this can prevent spam. Most of the primary email servers right now will use
    some form of Machine learning to handle spam and keep it away from your regular
    inbox.


    ## 5. Can Improve the Financial World


    Machine Learning can come in and work with many different financial world tasks.
    It helps with detecting fraud, offering new products to customers, approving loans,
    and so much more.


    ## 6. Can Make Manufacturing More Efficient


    Those in the manufacturing world can use Machine Learning to help them be more
    competent and better at their job. It can figure out when things will be slowing
    the process down and need to be fixed, and it will look at when a piece of a machine
    is likely to die out, and so much more.


    ## 7. It Requires us with a Better Understanding of the Customer


    All companies want to know as much about their customers as possible, ensuring
    that they can learn how to market to these individuals, what products to offer,
    and which methods they can take to make the customer as happy as possible.


    ## Supervised Machine Learning


    The first type of Machine learning algorithm that we will take a look at is supervised
    Machine learning. This Machine learning type is the kind where someone is going
    to train the system, and the way they do this is by making sure to provide input,
    with the corresponding output, to the system to know the right answers. You also
    have to take the time to furnish the feedback into the system, based on whether
    the system or the machine was accurate in the predictions that it made.


    ## Unsupervised Machine Learning


    Now we can move on to the idea of Unsupervised Machine learning and see how this
    one is going to work compared to supervised learning. With unsupervised Machine
    learning, we will find that there will be a big difference when compared to the
    other methods but can train the system how to behave without all of the examples
    and labeled data along the way.


    With unsupervised learning, the model will not be provided with the output for
    it to be taught how to behave. This is because the goal of this kind of knowledge
    is that we want the machine to learn what is there, based on the unknown input.
    The device can know how to do this all on its own, rather than having the programmer
    come in and do all of the work on it.


    ## Reinforcement Machine Learning


    The third type of Machine learning method that we need to take a look at here
    will be reinforcement Machine learning. This algorithm type is newer than the
    other two, and it is going to be the one that we work with any time that the presented
    algorithm has examples, but these examples are not going to have any labels on
    them at all.


    ## Chapter 2. Giving the Computers the Ability to Learn From Data


    We need a programming language to provide instruction to the machine to execute
    the code to use machine learning. We will learn the basics of the Python language,
    how to install and launch python. We are also going to learn some Python syntax
    and some useful tools to run Python. We also cover some necessary Python libraries
    that useful for machine learning. First of all, why would we use Python and not
    another programming language?


    ## Why Use Python for Machine Learning?


    Python is a programming language extensively used for many reasons. It is a free
    and open-source language, which means it is accessible to everybody. Although
    it is free, it is a community-based language, meaning that it is developed and
    supported by a community that gathers its effort through the internet to improve
    the language features.


    Other reasons people would use Python are:


    - 1. Quality as a readable language with a simple syntax

    - 2. Program portability to any operating system (e.g., Windows, Unix) without
    or with little modifications

    - 3. Speed of execution: Python does not need compilation and run faster than
    similar programming languages

    - 4. Component integration which means that Python can be integrated with other
    programs, can be called from C and C++ libraries, or call another programming
    language.


    Python comes with basic and powerful standard operations and advanced pre-coded
    libraries like NumPy for numeric programming. Another advantage of Python is automatic
    memory management and does not require variable and size declaration. Moreover,
    Python allows developing different applications such as developing Graphical User
    Interface (GUI), doing numeric programming, do game programming, database programming,
    internet scripting, and much more.


    ## How to Get Started with Python?


    Python is a scripting language, and like any other programming language, needs
    an interpreter. The latter is a program that executes other language programs.
    As its name indicates, it works as an interpreter for computer hardware to execute
    Python programming instructions. Python comes as a software package and can be
    downloaded from Python’s website. When installing Python, the interpreter is usually
    an executable program. If you use UNIX and LINUX, Python might be already installed,
    and it probably is in the /usr directory. Now that you have Python installed let’s
    explore how we can run some necessary code.


    To run Python, you can open your operating system’s prompt (on Windows, open a
    DOS console Window) and type python. If it does not work, you don’t have python
    in Shell’s path Environment variable. In this case, you should type the full path
    of the Python executable. On Windows, it should be something similar to C:\Python3.7\python,
    and in UNIX or LINUX is installed in the bin folder: /usr/local/bin/python (or
    /usr/bin/python).


    When you launch Python, it provides two lines of information, with the first line
    is the Python version used as in the example below:


    ```

    Python 3.7.1 (default, Dec 10 2018, 22:54:23) [MSC v.1915 64 bit (AMD64)]: Anaconda,
    Inc. on win32

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    Once a session is launched, Python prompts >>>, which means it is ready. It is
    prepared to run the line codes you write in. The following is an example of a
    printing statement:


    ```

    >>> print (''Hello World!'')

    Hello World!

    >>>

    ```


    When running Python in an interactive session as we did, it displays the results
    after >>>, as shown in the example. The code is executed interactively. To exit
    the interactive Python session, type Ctrl-Z on Windows or Ctrl-D on Unix/Linux
    machine.


    Now we learned how to launch Python and run codes in an interactive session. This
    is a good way to experiment and test codes. However, the code is never saved,
    and it needs to be typed again to rerun the statement. To store the code, we need
    to type it in a file called a module. Files that contain Python statements are

  md: '# Chapter 5. Building Good Training Datasets


    We introduce managing data as a Pandas dataframe and typical exploratory data
    analysis (EDA) techniques for querying your data.

    As a crucial part of data inspection, EDA summarizes your dataset''s critical
    characteristics in preparation for further processing. This includes understanding
    the data''s shape and distribution, scanning for missing values, learning which
    features are most relevant based on correlation, and familiarizing yourself with
    the dataset''s contents. Gathering this intel helps inform algorithm selection
    and highlight aspects of the dataset that require cleaning to prepare for further
    processing.

    Using Pandas, we can use a range of simple techniques to summarize the data and
    additional options to visualize the data using Seaborn and Matplotlib.

    Let''s begin by importing Pandas, Seaborn, and Matplotlib inline using the following
    code in Jupyter Notebook.


    ```

    import pandas as pd

    import seaborn as sns

    %matplotlib inline

    ```


    Note that using the inline feature of Matplotlib, we can display plots directly
    below the applicable code cell within Jupyter Notebook or other frontends.


    # Import Dataset


    Datasets can be imported from various sources, including internal and external
    files, and random self-generated datasets called blobs.

    The following sample dataset is an external dataset downloaded from Kaggle, called
    the Berlin Airbnb dataset. This data was scraped'

    Shared Sensing is an emerging service offered by a mix of established cloud providers
    and emerging smart city service providers. It refers to the ability for multiple
    smart city stakeholders to share live information from their networks, resources,
    and devices for the benefit of the wider community. This will bring numerous benefits,
    including operational efficiency.


    Modern companies recognize the importance of big data for their success, not only
    to compete with others but also to strengthen their business relation, attract
    customers. It has already changed the way how the business works, and consumers
    use the service or buy the products.


    For example, Amazon collects data from its customers to provide the most relevant

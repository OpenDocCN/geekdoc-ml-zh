    all of that information in a certain format that makes the most sense, that will
    be easy for those in charge of making decisions to read through and understand.


    While we are on this topic, we need to work on data warehousing and mining software.
    The different programs that you decide to use with data mining will be responsible
    for analyzing the patterns and the relationships that we can find in the data.
    All of this is going to be done based on the requests that the user sends out.
    A company may use this software to help them create some new classes on that information.


    We can go through and illustrate this point a bit more, as well. Imagine that
    we are a restaurant that would like to work with all of the data mining steps
    to determine the right times to offer some specials. The restaurant would be able
    to do this by looking at all of the information they have been able to collect
    on the specials, and then see how the specials do at different times of the day
    and on different days of the week. They can then create classes based on when
    the customers visit and what the customer is most likely to order when they come
    to the restaurant to eat.


    We can take this to the following level as well. In some cases, a data miner will
    find clusters of information based on a logical relationship, or they may take
    some time to see if there are sequential patterns and associations that they can
    draw some conclusions to learn more about their customers in the long run.'

    The Bag-of-Words model is a widespread technique used in Information Retrieval
    and Natural Language Processing. It is also known as the Vector Space Model, described
    in detail in question 6 above. It uses the frequency of occurrence of the words
    in a document as the feature value.


    One of the limitations of this method is that it does not take into account the
    order of the words in a document, due to which you cannot infer the context of
    the words. For instance, if you take these two sentences, "Apple has become a
    trillion-dollar company" and "You should eat an apple every day," the Bag-of-Words
    model won''t be able to differentiate between Apple as a company and Apple as
    a fruit. To address this limitation, you can use the N-gram model, which stores
    the words'' spatial information. Bag-of-Words is a particular case of the N-gram
    method with n=1.'

  md: '# Chapter 12. Data Mining and Applications


    What’s the point of ads? They’re on our monitors, TV screens, smartphone displays,
    inside our favorite radio broadcasts, and mailboxes. No matter where we turn,
    we’ll find ads constantly hawking something we’re not interested in. Those ads
    represent the traditional shotgun approach where companies simply propel as many
    as they can in our general direction and hope at least one hits. As we can imagine,
    this kind of marketing costs a lot. Still, companies don’t know any better and
    keep pumping money into wacky, bizarre, and embarrassing ads, hoping anything
    works. Thanks to Machine Learning, we might be nearing a future where computers
    produce dirt-cheap ads that are scarily tailored to our behavior and applied at
    the exact moment when they’ll have the strongest effect. We might already be living
    in one such future.


    One thing about consumer behavior is that most purchases are made automatically,
    but major life events can break these habits and put us on the cusp of trying
    new things. This means Fig Newtons ads aren’t necessarily aimed at people who’d
    never try Fig Newtons but at those who like sweets and might try something different
    because they’re undergoing a major life event, such as divorce, car purchase,
    or pregnancy. How does the advertising company know which person is which? Enter
    data mining, harvesting as much data about people to have computers try to predict
    their behavior, desires, and motivations to target them with just the right kind
    of ad at just the right moment. Of course, ads would never work for us, but machines
    can learn to be persuasive.


    One thing to note here is that data mining processes are going to be used to help
    us build up Machine Learning models. These models that rely on Machine Learning
    can power up applications, including the recommendation programs found on many
    websites and the technology that can keep search engines running.'

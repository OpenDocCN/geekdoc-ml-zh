    现在我们学会了如何启动Python并在交互式会话中运行代码。这是实验和测试代码的好方法。然而，代码永远不会被保存，需要重新输入才能再次运行语句。要存储代码，我们需要将其输入到一个称为模块的文件中。包含Python语句的文件称为模块。这些文件的扩展名是‘.py’。只需输入模块名称即可执行模块。可以使用像Notepad++这样的文本编辑器来创建模块文件。例如，让我们创建一个名为test.py的模块，它打印‘Hello
    World’并计算3^2。该文件应包含以下语句：



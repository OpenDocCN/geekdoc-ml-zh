    imbalance, despite the score, leads to terrible prediction accuracy in the result.
    Why does this happen? In this case, the decision trees grow many branches, and
    that''s the cause of overfitting. To solve this use, you need to impose limitations
    on how much the decision tree can develop and how many branches it can spawn.
    Furthermore, you can also prune the tree to keep it under control, much like how
    you would do with a real tree to make sure it produces plenty of fruit.


    To limit the decision tree''s size, you need to determine new parameters during
    the tree''s definition. Let''s analyze these parameters:


    1.  min_samples_split: The first thing you can do is change this parameter to
    specify how many observations a node will require to perform the splitting. You

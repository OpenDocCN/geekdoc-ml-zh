    mining. In the first step, the company will spend some time collecting the data
    they want to use, and then they will make sure'
- md: 'that all of this will be loaded up properly to their data warehouse. When this
    is all done, the company can then store and manage the data. Sometimes, this is
    done on the company''s in-house servers, and other times it is going to be sent
    to the cloud.


    When we go through with this, the management teams, IT professionals, and even
    business analysts will gain access to this data. Then they can determine the way
    that they would like to organize all of this information. We can then work with
    application software to sort out the data based on the results that the user is
    going to put in. In the last step, our end-user will present their findings and
    all of that information in a certain format that makes the most sense, that will
    be easy for those in charge of making decisions to read through and understand.


    While we are on this topic, we need to work on data warehousing and mining software.
    The different programs that you decide to use with data mining will be responsible
    for analyzing the patterns and the relationships that we can find in the data.
    All of this is going to be done based on the requests that the user sends out.
    A company may use this software to help them create some new classes on that information.


    We can go through and illustrate this point a bit more, as well. Imagine that
    we are a restaurant that would like to work with all of the data mining steps
    to determine the right times to offer some specials. The restaurant would be able
    to do this by looking at all of the information they have been able to collect
    on the specials, and then see how the specials do at different times of the day
    and on different days of the week. They can then create classes based on when
    the customers visit and what the customer is most likely to order when they come
    to the restaurant to eat.


    We can take this to the following level as well. In some cases, a data miner will
    find clusters of information based on a logical relationship, or they may take
    some time to see if there are sequential patterns and associations that they can
    draw some conclusions to learn more about their customers in the long run.


    Warehousing is going to be another important part that we see in the data mining
    process. This is a pretty simple process to work with, and it is going to include
    when a company can centralize their data into one database or one program, rather
    than spreading out the information in more than one place. With the warehouse
    for data, an organization can spinoff some of the data segments for the right
    users to analyze regularly and for the specific users to gain access to when they
    need it.


    However, there are also times when we will see that the analyst will take the
    work on a different course during this process. For example, the analyst may choose
    to start with some of the most useful data, and then they will be able to create
    their warehouse for the data based on the specifications there. No matter how
    a business wants to organize their data, they will use it to help support some
    of the decision processes that the company''s management is going to make.


    With this in mind, we also need to take some time to explore data mining examples
    along the way. A good example of this is grocery stores. Many of the supermarkets
    that we visit regularly give away free loyalty cards to customers. These are beneficial
    to the customers because it provides them with access to reduced prices and other
    special deals that non-members at that store will not be able to get.


    This is a great way for both parties to win. The customer will enjoy that they
    can potentially save money so that they will sign up for it. The store will enjoy
    that they get a chance to learn more about the customers, set prices to bring
    in more people, and make them the most money possible.


    Here, we need to keep in mind that there are a few concerns that data mining can
    bring up for the customer and a company. Some customers are concerned about this
    data mining process because they worry about the company not being ethical with
    their use. It could even be an issue with a legitimate and honest company because
    the sampling they use could be wrong, and then they will use the wrong kind of
    information to make their decisions.


    Most companies need to take some caution when they decide to work with the data
    mining process to ensure that they will reach their customers better and do well
    in their industry through some useful insights and more that they can learn along
    the way. You need to focus on when learning what patterns and insights are found
    in all of that data.


    All of this data is going to be important when it comes to working in the process
    of data science. But we have to make sure that we understand how this data is
    supposed to work and what is found inside of all that data. When we can learn
    all of this, we will find that it is easier than we may think to handle the data
    and work for our needs.


    ## Unbalanced Data Set


    Although imbalanced data is a common problem with datasets, there is no universal
    technique for dealing with this issue. Generally, when classifiers are fed imbalanced
    data, the classification output will be biased, resulting in always predicting
    the majority class and incorrectly classifying the minority class. Therefore,
    we need to detect when the output is biased and deal with this issue, to improve
    its accuracy. We will over-sample the minority class by employing the Synthetic
    Minority Over-Sampling Technique (SMOTE) and the stratified K-Fold cross-validation
    method for dealing with the class imbalance.


    ## Conclusion


    Machine learning is an exciting and rapidly evolving field. While mastery of the
    subject can involve many years of study, it is possible to get started quickly
    by gaining some basic familiarity with machine learning methods and goals.


    Despite the mysterious aura surrounding the field, many of the machine learning
    methods are relatively simple mathematical tools that have been around for centuries.
    It is just now that they are being applied to the massive amounts of data, the
    so-called big data, that is being collected by companies and other large organizations.


    Python is an excellent tool to use for learning about machine learning. Python
    is a very simple programming language that most people can pick up rather quickly.
    Libraries have been developed for Python that are specifically designed for machine
    learning. So it is easy for a developer to play around with the tools and solve
    simple machine learning problems.


    The way to go forward is actually to practice and study more. Begin by going through
    any exercises that you can find that entail covering all of the major algorithms
    used in machine learning. Using both supervised and unsupervised learning is important,
    as anyone who wants to understand machine learning needs to become intimately
    familiar with both. You should also practice by using many of the standard algorithms
    like linear regression and k-nearest neighbors.


    Something that I would suggest is to avoid getting trapped into only using generated
    test data. To enhance your learning and development, get a hold of real-world
    data sets that you can run your algorithms on to gain an even greater familiarity
    with the practice of data science.


    Many people who are new to the concept of machine learning ask what specific educational
    credentials they need to get into the field. While there are some general guidelines,
    the truth is there are no specific rules. We can begin by saying that in all likelihood,
    anyone who is involved in a scientific or technical field of study would be in
    a position to get involved in machine learning. That certainly applies to electrical
    or computer engineers.


    However, some people who might be better placed to get into machine learning are
    mathematicians experts in statistics and probability. Some crossover knowledge
    can be helpful, but in some ways, machine learning is a statistical field when
    it comes down to a data scientist''s day-to-day practice. Certainly, a high level
    of knowledge of statistics and probability is helpful.


    Since it is considered a crossover discipline background in computer science can
    be helpful. The ideal candidate would have a substantial computer science background
    that has also demonstrated a high-level education in statistics. The more advanced
    your education, the more deeply you can go into the field, including doing AI
    research and designing more advanced systems. If you are playing around with some
    models, you will not be designing machine learning systems for use in some new
    robotic systems. That will require advanced education in computer science.


    However, there are varying roles and levels of machine learning. Those who study
    computer systems in business school provided that they have a good understanding
    of statistics will be well-suited for doing machine learning tasks as a data scientist
    at many companies. Simply analyzing customer data or internal company data for
    trends and patterns is not something that requires a deep understanding of artificial
    intelligence. Your role is to use machine learning tools available to extract
    the kind of information useful for the enterprise.


    So, machine learning and data science are fields that have a wide range of complexity
    and application. There is virtually some level of expertise suitable for many
    different levels and types of education, background, and taste. It is a growing
    field for the future.


    We have learned what machine learning is and how it is applied today by businesses
    to many different tasks. We learned that there is supervised, unsupervised learning
    and how they are different.'
  mdcn: '确保所有这些数据都能被正确加载到他们的数据仓库中。当这一切完成后，公司就可以存储和管理数据了。有时，这是在公司内部服务器上完成的，而有时则会发送到云端。


    当我们完成这个过程后，管理团队、IT专业人员甚至业务分析师都将获得访问这些数据的权限。然后他们可以确定如何组织所有这些信息。接着，我们可以使用应用软件根据用户输入的结果对数据进行排序。在最后一步，我们的最终用户将以最合理、最容易让决策者阅读和理解的格式呈现他们的发现和所有信息。


    既然谈到这个话题，我们需要研究数据仓库和挖掘软件。你决定用于数据挖掘的不同程序将负责分析我们能在数据中找到的模式和关系。所有这些都将根据用户发出的请求来完成。公司可能会使用这些软件来帮助他们基于这些信息创建一些新的类别。


    我们也可以进一步阐述这一点。想象一下，我们是一家餐厅，希望利用所有数据挖掘步骤来确定提供特价优惠的最佳时机。餐厅可以通过查看他们收集到的所有关于特价优惠的信息，然后观察这些特价在一天中的不同时间和一周的不同日期的表现如何来实现这一点。然后，他们可以根据顾客光顾的时间以及顾客来餐厅就餐时最可能点的菜品来创建类别。


    我们也可以将此提升到下一个层次。在某些情况下，数据挖掘者会根据逻辑关系找到信息簇，或者他们可能会花一些时间看看是否存在可以得出结论的序列模式和关联，以便从长远角度更好地了解他们的客户。


    数据仓库将是我们看到的数据挖掘过程中的另一个重要部分。这是一个相当简单的过程，它将包括公司能够将他们的数据集中到一个数据库或一个程序中，而不是将信息分散在多个地方。通过数据仓库，组织可以为合适的用户定期分析某些数据片段，并在特定用户需要时让他们访问。


    然而，有时我们也会看到分析师在这个过程中会采取不同的路径。例如，分析师可能会选择从一些最有用的数据开始，然后他们可以根据那里的规格创建他们的数据仓库。无论企业希望如何组织他们的数据，他们都会用它来帮助支持公司管理层将要做出的一些决策。


    考虑到这一点，我们还需要花一些时间来探索数据挖掘的例子。一个很好的例子是杂货店。我们经常光顾的许多超市会向顾客发放免费的忠诚卡。这对顾客很有好处，因为它让他们能够享受降价和其他该店非会员无法获得的特别优惠。


    这是一个双赢的好方法。顾客会因为他们有可能省钱而乐于注册。商店则会因为他们有机会更多地了解顾客、设定价格以吸引更多人并赚取尽可能多的钱而受益。


    在这里，我们需要记住，数据挖掘可能会给顾客和公司带来一些担忧。一些顾客对这个数据挖掘过程感到担忧，因为他们担心公司在使用数据时不道德。即使是一家合法诚实的公司也可能存在问题，因为他们使用的样本可能是错误的，然后他们会使用错误的信息来做出决策。


    大多数公司在决定使用数据挖掘过程时需要谨慎一些，以确保他们能更好地接触客户，并通过一些有用的见解以及他们在过程中学到的更多东西在行业中取得成功。你需要专注于学习在所有这些数据中发现了哪些模式和见解。


    所有这些数据在数据科学的过程中都很重要。但我们必须确保我们理解这些数据应该如何工作以及所有这些数据中包含了什么。当我们能学到所有这些时，我们会发现处理数据并为我们的需求工作比我们想象的要容易。


    ## 不平衡数据集


    尽管不平衡数据是数据集中的一个常见问题，但处理这个问题没有通用的技术。通常，当分类器接收到不平衡数据时，分类输出会有偏差，导致总是预测多数类并错误分类少数类。因此，我们需要检测输出何时存在偏差并处理这个问题，以提高其准确性。我们将通过采用合成少数类过采样技术（SMOTE）和分层K折交叉验证方法来处理类别不平衡，对少数类进行过采样。


    ## 结论


    机器学习是一个令人兴奋且快速发展的领域。虽然精通这个主题可能需要多年的学习，但通过获得对机器学习方法和目标的基本熟悉，可以快速入门。


    尽管这个领域笼罩着神秘的光环，但许多机器学习方法都是相对简单的数学工具，已经存在了几个世纪。只是现在它们正被应用于公司和其他大型组织收集的大量数据，即所谓的“大数据”。


    Python是学习机器学习的绝佳工具。Python是一种非常简单的编程语言，大多数人可以相当快地掌握。已经为Python开发了专门用于机器学习的库。因此，开发者可以轻松地使用这些工具并解决简单的机器学习问题。


    前进的方法实际上是多加练习和学习。首先，通过完成你能找到的任何涵盖机器学习中使用的所有主要算法的练习。使用监督学习和无监督学习都很重要，因为任何想理解机器学习的人都需要对两者都非常熟悉。你还应该通过使用许多标准算法（如线性回归和k近邻）来练习。


    我建议的一点是避免陷入只使用生成的测试数据。为了增强你的学习和发展，获取真实世界的数据集，你可以在上面运行你的算法，以进一步熟悉数据科学的实践。


    许多刚接触机器学习概念的人会问，进入这个领域需要什么特定的教育资格。虽然有一些通用的指导方针，但事实是没有具体的规则。我们可以首先说，很可能任何参与科学或技术领域的人都有机会参与机器学习。这当然适用于电气或计算机工程师。


    然而，一些可能更适合进入机器学习领域的人是数学家、统计学和概率学专家。一些交叉知识会有所帮助，但在某些方面，当涉及到数据科学家的日常实践时，机器学习是一个统计领域。当然，高水平的统计学和概率学知识是有帮助的。


    由于它被认为是一个交叉学科，计算机科学背景会有所帮助。理想的候选人应该有扎实的计算机科学背景，并且也展示了高水平的统计学教育。你的教育水平越高，你就能越深入地进入这个领域，包括进行人工智能研究和设计更先进的系统。如果你只是在摆弄一些模型，你不会为一些新的机器人系统设计机器学习系统。那将需要计算机科学的高级教育。


    然而，机器学习有不同的角色和层次。那些在商学院学习计算机系统的人，只要他们对统计学有很好的理解，就非常适合在许多公司担任数据科学家，执行机器学习任务。仅仅分析客户数据或公司内部数据以寻找趋势和模式，并不需要对人工智能有深入的理解。你的角色是使用可用的机器学习工具来提取对企业有用的那种信息。


    所以，机器学习和数据科学是具有广泛复杂性和应用的领域。实际上，有适合许多不同层次和类型教育、背景和品味的专业水平。这是一个面向未来的不断发展的领域。


    我们已经了解了什么是机器学习以及当今企业如何将其应用于许多不同的任务。我们了解到有监督学习和无监督学习，以及它们的不同之处。'

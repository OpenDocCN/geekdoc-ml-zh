    and work for our needs.


    # Unbalanced Data Set


    Although imbalanced data is a common problem with datasets, there is no universal
    technique for dealing with this issue. Generally, when classifiers are fed imbalanced
    data, the classification output will be biased, resulting in always predicting
    the majority class and incorrectly classifying the minority class. Therefore,
    we need to detect when the output is biased and deal with this issue, to improve
    its accuracy. We will over-sample the minority class by employing the Synthetic
    Minority Over-Sampling Technique (SMOTE) and the stratified K-Fold cross-validation
    method for dealing with the class imbalance.'

    ## 无监督式机器学习


    现在我们可以转向无监督式机器学习的概念，看看它与监督式学习相比是如何运作的。在无监督式机器学习中，我们会发现它与其他方法有很大不同，但它可以在没有所有示例和标记数据的情况下训练系统如何表现。



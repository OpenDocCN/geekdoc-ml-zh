    ## Python Syntax


    Before we learn some Python syntax, we will explore the main types of data used
    in Python and how a program is structured. A plan is a set of modules, which are
    a series of statements that contain expressions. These expressions create and
    process objects, which are variables that represent data.


    ## Python Variables


    In Python, we can use built-in objects, namely numbers, strings, lists, dictionaries,
    tuples, and files. Python supports the usual numeric types, the integer, and float,
    as well as complex numbers. Strings are character chains, whereas lists and dictionaries
    are ensembles of other objects like a number or a string or other lists or dictionaries.
    Lists and dictionaries are indexed, and they can be iterated through.


    ![](img/146e392d749d280bb2ac2d7c77d32d47_22_0.png)


    The main difference between lists and dictionaries is how items are stored, and
    how they can be fetched. Items in a list are ordered and can be fetched by position,
    whereas they are stored and fetched in dictionaries by key. Tuples like lists
    are positionally ordered set of objects. Finally, Python also allows creating
    and reading files as objects. Python provides all the tools and mathematical functions
    to process these objects.


    Python does not require variable declaration, size, or type declaration. Variables
    are created once they are assigned a value. For example:


    ```

    >>> x=5

    >>> print (x) 5

    >>> x= ''Hello World! ''

    Hello World!

    ```


    In the example above, x was assigned a number then it was assigned a string. In
    fact, Python allows changing the type of variables after they are declared. We
    can verify the type of any Python object using the type () function.


    ```

    >>> x, y, z=10,''Banana'',2.4

    >>> print (type(x))

    <class ''int''>

    >>> print(type(y))

    <class ''str''>

    >>> print (type(z))

    <class ''float''>

    ```


    To declare a string variable, both single and double quotes can be used.


    Only alpha-numeric characters and underscores can be used (e.g., A_9). Note that
    the variable names are case-sensitive and should not start with a number. For
    instance, price, Price, and PRICE are three different variables. Multiple variables
    can be affirmed in one line, as seen in the example above.


    ## Chapter 3. Basic Terminology and Notations


    ## Mathematical Notation for Machine Learning


    You will realize that mathematical nomenclature and notations go hand in hand
    throughout your project in your machine learning process. There are various signs,
    symbols, values, and variables used in mathematics to describe whatever algorithms
    you may be trying to accomplish.


    You will find yourself using some of the mathematical notations within this field
    of model development. You will find that values that deal with data and the process
    of learning or memory formation will always take precedence. Therefore, the following
    six examples are the most commonly used notations. Each of these notations has
    a description for which its algorithm explains:


    ### Algebra


    - To indicate a change or difference: Delta.

    - To give the total summation of all values: Summation.

    - To describe a nested function: Composite function.

    - To indicate Euler''s number and Epsilon where necessary.

    - To describe the product of all values: Capital pi.


    ### Calculus


    - To describe a particular gradient: Nabla.

    - To describe the first derivative: Derivative.

    - To describe the second derivative: Second derivative.

    - To describe a function value as x approaches zero: Limit.


    ### Linear Algebra


    - To describe capitalized variables are matrices: Matrix.

    - To describe matrix transpose: Transpose.

    - To describe a matrix or vector: Brackets.

    - To describe a dot product: Dot.

    - To describe a Hadamard product: Hadamard.

    - To describe a vector: Vector.

    - To describe a vector of magnitude 1: Unit vector.


    ### Probability


    - The probability of an event: Probability.


    ### Set Theory


    - To describe a list of distinct elements: Set.


    ### Statistics


    - To describe the median value of variable x: Median.

    - To describe the correlation between variables X and Y: Correlation.

    - To describe the standard deviation of a sample set: Sample standard deviation.

    - To describe the population standard deviation: Standard deviation.

    - To describe the variance of a subset of a population: Sample variance.

    - To describe the variance of a population value: Population variance.

    - To describe the mean of a subset of a population: Sample mean.

    - To describe the mean of population values: Population means.


    ## Terminologies Used for Machine Learning


    The following terminologies are what you will encounter most often during machine
    learning. You may be getting into machine learning for professional purposes or
    even as an artificial intelligence (AI) enthusiast. Anyway, whatever your reasons,
    the following are categories and subcategories of terminologies that you will
    need to know and probably understand getting along with your colleagues. Here
    are machine-learning terms that you need to know:


    ### 1. Natural Language Processing (NLP)


    Natural language is what you, as a human, use, i.e., human language. By definition,
    NLP is a way of machine learning where the machine learns your human form of communication.
    NLP is the standard base for all, if not most, machine languages that allow your
    device to use human (natural) language. This NLP enables your machine to hear
    your natural (human) input, understand it, execute it, and then give a data output.
    The device can realize humans and interact appropriately or as close to appropriate
    as possible.


    There are five primary stages in NLP: machine translation, information retrieval,
    sentiment analysis, information extraction, and finally, question answering. It
    begins with the human query, which straight-up leads to machine translation, then
    through all the four other processes, and finally ending up in question explaining
    itself. You can now break down these five stages into subcategories as suggested
    earlier:


    - Text classification and ranking - This step is a filtering mechanism that determines
    the class of importance based on relevance algorithms that filter out unwanted
    stuff such as spam or junk mail. It filters out what needs precedence and the
    order of execution up to the final task.


    - Sentiment analysis - This analysis predicts the emotional reaction towards the
    feedback provided by the machine. Customer relations and satisfaction are factors
    that may benefit from sentiment analysis.


    - Document summarization - As the phrase suggests, this is a means of developing
    short and precise definitions of complex and complicated descriptions. The overall
    purpose is to make it easy to understand.


    - Named-Entity Recognition (NER) - This activity involves getting structured and
    identifiable data from an unstructured set of words. The machine learning process
    learns to identify the most appropriate keywords, apply those words to the speech
    context, and try to develop the most appropriate response. Keywords are things
    like company name, employee name, calendar date, and time.


    - Speech recognition - An example of this mechanism can easily be appliances such
    as Alexa. The machine learns to associate the spoken text to the speech originator.
    The device can identify audio signals from human speech and vocal sources.


    - It understands Natural language and generation - As opposed to Named-Entity
    Recognition; these two concepts deal with human to computer and vice versa conversions.
    Natural language understanding allows the machine to convert and interpret the
    human form of spoken text into a coherent set of understandable computer format.
    On the other hand, natural language generation does the reverse function, i.e.,
    transforming the incorrect computer format to the human-understandable audio format.



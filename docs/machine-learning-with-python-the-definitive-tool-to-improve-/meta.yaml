    # 7. It Requires us with a Better Understanding of the Customer


    All companies want to know as much about their customers as possible, ensuring
    that they can learn how to market to these individuals, what products to offer,
    and which methods they can take to make the customer as happy as possible.


    # Supervised Machine Learning


    The first type of Machine learning algorithm that we will take a look at is supervised
    Machine learning. This Machine learning type is the kind where someone is going
    to train the system, and the way they do this is by making sure to provide input,
    with the corresponding output, to the system to know the right answers. You also
    have to take the time to furnish the feedback into the system, based on whether

  md: 'No one can be to blame when a machine makes a mistake. A machine cannot be
    to blame. A machine can only follow the rules that are given to it.


    # Relation Between Big Data and Machine Learning (ML)


    Big Data is the data too complex and scattered in such a way, that it needs special
    algorithms and methodologies to process them, so that they can be properly analyzed.
    The traditional processing system cannot analyze extremely large volumes of data.
    Machine learning is a refined type of class of algorithms that will process big
    data. The algorithms like predictive analytics, Text algorithms, Social network
    mining, etc., play an important role in the Machine Learning process. Machine
    learning algorithms are based on the algorithms which are capable of analyzing
    large volumes of data, structured or unstructured. The process to use ML is to
    prepare the data by cleaning the data to prepare it for the machine learning algorithms,
    and train the machine learning algorithms to perform the algorithm by making effective
    combinations of the machine learning algorithms, pre-processing the data to form
    the input for the machine learning algorithms, passing the output obtained to
    the Machine Learning algorithms, and training them to perform the function. The
    ultimate objective is to obtain the best result in the best time, and these are
    achieved by creating effective algorithms.


    # Uses of Machine Learning


    The applications of Machine Learning include real-time decisions, clinical medicine,
    fraud detection, search engine results, and oil analysis to name just a few.


    Implementing Machine Learning is a very powerful way of making predictions using
    the algorithms that follow. The algorithms developed have constantly provided
    better predictions over time so that the performance of the machine learning algorithms
    is constantly improving.'
  merge: -1
  pgno: 9

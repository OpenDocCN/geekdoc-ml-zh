    \n## 第8章. 条件或决策语句\n\n这些将是我们编写的代码的重要组成部分，因为它们将确保你的系统能够响应用户提供的输入。很难预测用户将如何使用系统。但是，你可以设置一些你希望查看的条件，并在此基础上开发程序的工作方式。\n\

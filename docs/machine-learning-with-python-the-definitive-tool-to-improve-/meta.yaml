    Take note that classification decision trees are implemented when there’s a categorical
    dependent variable. On the other side, a regression tree is only implemented in
    a continuous dependent variable. Furthermore, in the case of a classification
    tree, the training data result is the mode of the total relevant observations.
    This means that any observations that we cannot define will be predicted based
    on this value, representing the observation we identify most frequently.


    Regression trees, on the other hand, work slightly differently. The value that
    results from the training stage is not the mode value but the total observations''
    mean. This way, the unidentified observations are declared with the mean value,
    which results from the known observations.


    Both types of decision trees undergo a binary split, however, going from the top
    to bottom. This means that the observations in one area will spawn two branches
    divided inside the predictor space. This is also known as a greedy approach because
    the learning algorithm seeks the most relevant variable in the split while ignoring
    the future splits that could lead to an even more powerful and accurate decision
    tree.


    As you can see, there are some differences as well as similarities between the
    two. However, what you should note from all of this is that the splitting affects
    the accuracy scores of the decision tree implementation. Decision tree nodes are
    divided into subnodes, no matter the type of tree. This tree split is performed
    to lead to a more uniform set of nodes.


    Now that you understand the fundamentals behind decision trees, let’s dig a bit
    deeper into overfitting.


    # The Overfitting Problem


    You learned earlier that overfitting is one of the main problems when working
    with decision trees, and sometimes it can have a severe impact on the results.
    Decision trees can lead to a 100% accuracy score for the training set if we do
    not impose any limits. However, the major downside here is that overfitting creeps
    when the algorithm'
